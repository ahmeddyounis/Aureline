# Pinned Rust toolchain.
#
# Every local and CI build of this workspace uses this exact channel and
# component set. See docs/build/reproducible_build_baseline.md for the
# reproducibility contract that depends on this pin.
#
# Upgrade policy: bump `channel` in the same change that records the bump
# rationale in the baseline doc and refreshes Cargo.lock.

[toolchain]
channel    = "1.84.0"
profile    = "minimal"
components = ["rustfmt", "clippy", "rust-src"]
targets    = [
  "aarch64-apple-darwin",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
  "aarch64-unknown-linux-gnu",
  "x86_64-pc-windows-msvc",
]
