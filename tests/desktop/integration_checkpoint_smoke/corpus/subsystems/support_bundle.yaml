# Support bundle — integration-checkpoint input.
#
# One posture per corpus case. Degrades only in its own case; in every other
# degraded case it stays healthy but MUST acknowledge the peer degradation.

schema_version: 1
subsystem_id: support_bundle
title: Support bundle
maturity: beta
source_module_ref: crates/aureline-support/src/bundle

degradation_reason_vocabulary:
  - bundle_redaction_incomplete
  - bundle_export_blocked
  - bundle_collection_partial

case_postures:
  all_healthy_go:
    self_health: healthy
    verdict_contribution: go
    peer_degradation_observed: false

  extension_update_revoked:
    self_health: healthy
    verdict_contribution: go
    peer_degradation_observed: true
    peer_acknowledgement: >-
      Extension update revoked; the bundle records the revoked extension state
      in the joint checkpoint.

  workspace_restricted_active:
    self_health: healthy
    verdict_contribution: go
    peer_degradation_observed: true
    peer_acknowledgement: >-
      Workspace restricted mode active; the bundle records the restricted
      authority in the joint checkpoint.

  update_rolled_back:
    self_health: healthy
    verdict_contribution: go
    peer_degradation_observed: true
    peer_acknowledgement: >-
      Update rolled back to the prior admitted build; the bundle captures the
      rollback in the joint checkpoint.

  proxy_policy_unreachable:
    self_health: healthy
    verdict_contribution: go
    peer_degradation_observed: true
    peer_acknowledgement: >-
      Enterprise proxy unreachable; the bundle records the blocked policy path
      and the joint checkpoint blocks.

  support_bundle_redaction_incomplete:
    self_health: degraded
    degradation_reason: bundle_redaction_incomplete
    verdict_contribution: conditional_go
    peer_degradation_observed: false
    self_degradation_detail: >-
      Redaction pass did not complete for every captured artifact; export is
      held to local-only and the incomplete redaction is surfaced.

  remote_attach_skew_blocked:
    self_health: healthy
    verdict_contribution: go
    peer_degradation_observed: true
    peer_acknowledgement: >-
      Remote attach blocked on helper skew; the bundle records the blocked
      attach and the joint checkpoint blocks.
