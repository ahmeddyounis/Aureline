name: nightly_integrated_flow_smoke

on:
  schedule:
    - cron: "43 8 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-integrated-flow-smoke-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  integrated_flow_smoke:
    name: Integrated flow smoke
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Cache cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integrated-flow-smoke-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integrated-flow-smoke-

      - name: Build shell binary
        run: cargo build -p aureline-shell --bin aureline_shell --locked

      - name: Run integrated flow smoke
        run: >
          python3 tests/desktop/m1_integrated_flow_smoke/run_integrated_flow_smoke.py
          --repo-root .
          --binary target/debug/aureline_shell

      - name: Upload validation capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integrated-flow-smoke-${{ github.run_id }}
          path: artifacts/milestones/m1/captures/integrated_flow_smoke_validation_capture.json
          if-no-files-found: error
          retention-days: 30
