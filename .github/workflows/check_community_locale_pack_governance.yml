# Community locale-pack governance register gate.
#
# Validates the checked-in community locale-pack governance register: every pack
# channel (core locale, community pack, partner pack, machine-assisted) binds a
# stable claim, a translation-governance scorecard with one cell per dimension
# (string coverage, critical-state coverage, terminology, translation review,
# locale parity, source sync), the disclosed translation governance and trust
# tier, an owner-manifest sign-off, and an explicit base-locale rollback/downgrade
# automation record bound to a verified fallback plan; a lane whose governance
# dimension failed or is missing, whose untranslated-string fallback is not
# disclosed, whose packet is stale or missing, whose owner manifest is unsigned,
# whose fallback plan is unverified, whose downgrade automation is undefined, or
# whose waiver expired must drop below the stable cutline; the promotion verdict
# and summary agree with the firing stop rules. The gate runs the checked-in
# fixture cases proving those rejections fire. The typed Rust consumer reads the
# same register, so `cargo test -p aureline-release` enforces the same structural
# invariants.

name: check_community_locale_pack_governance

on:
  pull_request:
    paths:
      - ".github/workflows/check_community_locale_pack_governance.yml"
      - "artifacts/release/m5/add_community_locale_pack_lifecycle_translation_governance_and_parity_audits_for_new_m5_surfaces.json"
      - "artifacts/release/captures/add_community_locale_pack_lifecycle_translation_governance_and_parity_audits_for_new_m5_surfaces_validation_capture.json"
      - "schemas/governance/add_community_locale_pack_lifecycle_translation_governance_and_parity_audits_for_new_m5_surfaces.schema.json"
      - "docs/m5/add_community_locale_pack_lifecycle_translation_governance_and_parity_audits_for_new_m5_surfaces.md"
      - "fixtures/release/m5/add_community_locale_pack_lifecycle_translation_governance_and_parity_audits_for_new_m5_surfaces/**"
      - "crates/aureline-release/src/add_community_locale_pack_lifecycle_translation_governance_and_parity_audits_for_new_m5_surfaces/**"
      - "crates/aureline-release/src/lib.rs"
      - "crates/aureline-release/tests/add_community_locale_pack_lifecycle_translation_governance_and_parity_audits_for_new_m5_surfaces.rs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-community-locale-pack-governance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  community_locale_pack_governance:
    name: Community Locale-Pack Governance
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Run community locale-pack governance register contract tests
        run: |
          cargo test -p aureline-release --test add_community_locale_pack_lifecycle_translation_governance_and_parity_audits_for_new_m5_surfaces

      - name: Upload validation capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: community-locale-pack-governance-${{ github.run_id }}
          path: artifacts/release/captures/add_community_locale_pack_lifecycle_translation_governance_and_parity_audits_for_new_m5_surfaces_validation_capture.json
          if-no-files-found: error
          retention-days: 30
