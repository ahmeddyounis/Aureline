# Generated-artifact lineage register gate.
#
# Validates the checked-in generated-artifact lineage register: every
# generated-artifact family (scaffolded, AI-generated, notebook-derived,
# preview-derived) binds a stable claim, a lineage scorecard with one cell per
# dimension (provenance, inputs, generator identity, transform, reproducibility,
# disclosure), the disclosed artifact provenance and trust tier, an owner-manifest
# sign-off, and an explicit rollback/downgrade automation record bound to a
# verified rollback plan; a surface whose lineage dimension failed or is missing,
# whose artifact is not labeled as generated, whose packet is stale or missing,
# whose owner manifest is unsigned, whose rollback plan is unverified, whose
# downgrade automation is undefined, or whose waiver expired must drop below the
# stable cutline; the promotion verdict and summary agree with the firing stop
# rules. The gate runs the checked-in fixture cases proving those rejections fire.
# The typed Rust consumer reads the same register, so
# `cargo test -p aureline-release` enforces the same structural invariants.

name: check_generated_artifact_lineage

on:
  pull_request:
    paths:
      - ".github/workflows/check_generated_artifact_lineage.yml"
      - "artifacts/release/m5/ship_generated_artifact_lineage_surfaces_for_scaffolded_ai_generated_notebook_derived_and_preview_derived_outputs.json"
      - "artifacts/release/captures/ship_generated_artifact_lineage_surfaces_for_scaffolded_ai_generated_notebook_derived_and_preview_derived_outputs_validation_capture.json"
      - "schemas/governance/ship_generated_artifact_lineage_surfaces_for_scaffolded_ai_generated_notebook_derived_and_preview_derived_outputs.schema.json"
      - "docs/m5/ship_generated_artifact_lineage_surfaces_for_scaffolded_ai_generated_notebook_derived_and_preview_derived_outputs.md"
      - "fixtures/release/m5/ship_generated_artifact_lineage_surfaces_for_scaffolded_ai_generated_notebook_derived_and_preview_derived_outputs/**"
      - "crates/aureline-release/src/ship_generated_artifact_lineage_surfaces_for_scaffolded_ai_generated_notebook_derived_and_preview_derived_outputs/**"
      - "crates/aureline-release/src/lib.rs"
      - "crates/aureline-release/tests/ship_generated_artifact_lineage_surfaces_for_scaffolded_ai_generated_notebook_derived_and_preview_derived_outputs.rs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-generated-artifact-lineage-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generated_artifact_lineage:
    name: Generated-Artifact Lineage
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Run generated-artifact lineage register contract tests
        run: |
          cargo test -p aureline-release --test ship_generated_artifact_lineage_surfaces_for_scaffolded_ai_generated_notebook_derived_and_preview_derived_outputs

      - name: Upload validation capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generated-artifact-lineage-${{ github.run_id }}
          path: artifacts/release/captures/ship_generated_artifact_lineage_surfaces_for_scaffolded_ai_generated_notebook_derived_and_preview_derived_outputs_validation_capture.json
          if-no-files-found: error
          retention-days: 30
