# Stable qualification matrix gate.
#
# Validates the checked-in stable qualification matrix: every lane that is not
# stable-qualified narrows below the launch cutline; every cross-binary lane
# carries a mixed-version section publishing the negotiated fields, supported
# skew window, upgrade order, rollback order, and unsupported-state behavior; a
# boundary lacking complete data is coordinated-upgrade-only and may not inherit
# a Stable mixed-version claim; waiver-expiry and evidence freshness are enforced
# against the matrix as_of date; and the promotion verdict agrees with the firing
# downgrade rules. The gate runs negative drills proving those rejections fire.
# The typed Rust consumer reads the same matrix, so `cargo test -p aureline-release`
# enforces the same structural invariants.

name: check_stable_qualification_matrix

on:
  pull_request:
    paths:
      - ".github/workflows/check_stable_qualification_matrix.yml"
      - "ci/check_stable_qualification_matrix.py"
      - "artifacts/release/stable_qualification_matrix.json"
      - "artifacts/release/captures/stable_qualification_matrix_validation_capture.json"
      - "schemas/release/stable_qualification_matrix.schema.json"
      - "docs/release/stable_qualification_matrix.md"
      - "artifacts/release/m4/stable_qualification_matrix_proof_packet.md"
      - "crates/aureline-release/src/stable_qualification_matrix/**"
      - "crates/aureline-release/src/lib.rs"
      - "crates/aureline-release/tests/stable_qualification_matrix.rs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-stable-qualification-matrix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stable_qualification_matrix:
    name: Stable qualification matrix
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Validate stable qualification matrix
        run: |
          python3 ci/check_stable_qualification_matrix.py --repo-root . --check

      - name: Run stable-qualification-matrix contract tests
        run: |
          cargo test -p aureline-release

      - name: Upload validation capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stable-qualification-matrix-${{ github.run_id }}
          path: artifacts/release/captures/stable_qualification_matrix_validation_capture.json
          if-no-files-found: error
          retention-days: 30
