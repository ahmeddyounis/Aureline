# External alpha launch-bundle gate.

name: check_alpha_launch_bundles

on:
  pull_request:
    paths:
      - ".github/workflows/check_alpha_launch_bundles.yml"
      - "ci/check_alpha_launch_bundles.py"
      - "artifacts/bundles/**"
      - "artifacts/certification/m2_archetype_seed_rows.yaml"
      - "artifacts/benchmarks/m2_fixture_register.yaml"
      - "artifacts/milestones/m2/alpha_wedge_matrix.yaml"
      - "artifacts/milestones/m2/exit_gate_scoreboard.yaml"
      - "artifacts/milestones/m2/dependency_graph.yaml"
      - "artifacts/milestones/m2/artifact_index.yaml"
      - "artifacts/milestones/m2/proof_packets/launch_bundles_and_archetypes.md"
      - "artifacts/milestones/m2/captures/launch_bundle_validation_capture.json"
      - "crates/aureline-shell/src/start_center/mod.rs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-alpha-launch-bundles-${{ github.ref }}
  cancel-in-progress: false

jobs:
  launch_bundles:
    name: Alpha launch bundles
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Run alpha launch-bundle validator
        run: |
          python3 ci/check_alpha_launch_bundles.py --repo-root . --report target/alpha-launch-bundles/report.json --render-gallery

      - name: Upload alpha launch-bundle report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpha-launch-bundles-${{ github.run_id }}
          path: target/alpha-launch-bundles
          if-no-files-found: error
          retention-days: 30
