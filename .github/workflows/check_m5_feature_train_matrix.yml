# M5 feature-train matrix gate.
#
# Validates the checked-in M5 feature-train matrix: every M5 depth lane binds a
# stable claim, a scorecard (proof, compatibility, admin/policy, rollback path),
# a proof packet with freshness SLO, owner sign-off, and hard/soft dependency
# edges; a lane whose scorecard is incomplete, whose packet is stale or missing,
# whose waiver expired, whose owner sign-off is absent, or whose upstream hard
# dependency is narrowed must drop below the stable cutline; the promotion
# verdict and summary agree with the firing stop rules. The gate runs negative
# drills and the checked-in fixture cases proving those rejections fire. The
# typed Rust consumer reads the same matrix, so `cargo test -p aureline-release`
# enforces the same structural invariants.

name: check_m5_feature_train_matrix

on:
  pull_request:
    paths:
      - ".github/workflows/check_m5_feature_train_matrix.yml"
      - "artifacts/release/m5/freeze_the_m5_feature_train_matrix_scorecards_and_dependency_graph.json"
      - "artifacts/release/captures/freeze_the_m5_feature_train_matrix_scorecards_and_dependency_graph_validation_capture.json"
      - "schemas/governance/freeze_the_m5_feature_train_matrix_scorecards_and_dependency_graph.schema.json"
      - "docs/m5/freeze_the_m5_feature_train_matrix_scorecards_and_dependency_graph.md"
      - "fixtures/release/m5/freeze_the_m5_feature_train_matrix_scorecards_and_dependency_graph/**"
      - "crates/aureline-release/src/freeze_the_m5_feature_train_matrix_scorecards_and_dependency_graph/**"
      - "crates/aureline-release/src/lib.rs"
      - "crates/aureline-release/tests/freeze_the_m5_feature_train_matrix_scorecards_and_dependency_graph.rs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-m5-feature-train-matrix-${{ github.ref }}
  cancel-in-progress: false

jobs:
  m5_feature_train_matrix:
    name: M5 Feature-Train Matrix
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Run M5 feature-train matrix contract tests
        run: |
          cargo test -p aureline-release --test freeze_the_m5_feature_train_matrix_scorecards_and_dependency_graph

      - name: Upload validation capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m5-feature-train-matrix-${{ github.run_id }}
          path: artifacts/release/captures/freeze_the_m5_feature_train_matrix_scorecards_and_dependency_graph_validation_capture.json
          if-no-files-found: error
          retention-days: 30
