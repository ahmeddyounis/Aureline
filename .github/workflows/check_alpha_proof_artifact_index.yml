# External alpha proof artifact index gate.

name: check_alpha_proof_artifact_index

on:
  pull_request:
    paths:
      - ".github/workflows/check_alpha_proof_artifact_index.yml"
      - "ci/check_alpha_proof_artifact_index.py"
      - "docs/review/m2_review_packet_template.md"
      - "docs/governance/m2_truth_update_workflow.md"
      - "docs/milestones/m2_alpha_scope.md"
      - "artifacts/milestones/m2/artifact_index.yaml"
      - "artifacts/milestones/m2/dependency_graph.yaml"
      - "artifacts/milestones/m2/exit_gate_scoreboard.yaml"
      - "artifacts/milestones/m2/proof_packets/artifact_index.md"
      - "artifacts/milestones/m2/proof_packets/launch_bundles_and_archetypes.md"
      - "artifacts/milestones/m2/proof_packets/migration_parity.md"
      - "artifacts/milestones/m2/reference_workspace_dry_run.md"
      - "artifacts/benchmarks/m2_publication_rehearsal.md"
      - "artifacts/milestones/m2/known_limits_alpha.yaml"
      - "fixtures/reference_workspaces/m2/dry_run_rehearsal_cases.yaml"
      - "ci/check_reference_workspace_dry_run.py"
      - "artifacts/milestones/m2/captures/artifact_index_validation_capture.json"
      - "artifacts/milestones/m2/captures/launch_bundle_validation_capture.json"
      - "artifacts/milestones/m2/captures/migration_parity_validation_capture.json"
      - "artifacts/milestones/m2/captures/reference_workspace_dry_run_validation_capture.json"
      - "artifacts/migration/m2_parity_scoreboard.yaml"
      - "artifacts/migration/import_gap_taxonomy.yaml"
      - "docs/migration/import_diagnostics_packet.md"
      - "fixtures/migration/parity_alpha_cases/**"
      - "artifacts/feedback/external_alpha_known_limits.md"
      - "ci/check_migration_parity_alpha.py"
      - "artifacts/bundles/**"
      - "artifacts/certification/m2_archetype_seed_rows.yaml"
      - "ci/check_alpha_launch_bundles.py"
      - "crates/aureline-shell/src/start_center/mod.rs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-alpha-proof-artifact-index-${{ github.ref }}
  cancel-in-progress: false

jobs:
  artifact_index:
    name: Alpha proof artifact index
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Run alpha proof artifact index validator
        run: |
          python3 ci/check_alpha_proof_artifact_index.py --repo-root . --report target/alpha-proof-artifact-index/report.json

      - name: Upload alpha proof artifact index report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: alpha-proof-artifact-index-${{ github.run_id }}
          path: target/alpha-proof-artifact-index
          if-no-files-found: error
          retention-days: 30
