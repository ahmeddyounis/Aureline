# Shell/editor/workspace integration checkpoint gate.
#
# Validates the canonical dependency graph plus its proof-index consumer and
# uploads a machine-readable report for review.

name: check_m1_checkpoint

on:
  pull_request:
    paths:
      - ".github/workflows/check_m1_checkpoint.yml"
      - "ci/check_m1_checkpoint.py"
      - "docs/milestones/m1/integration_checkpoint.md"
      - "artifacts/milestones/m1/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-m1-checkpoint-${{ github.ref }}
  cancel-in-progress: false

jobs:
  m1_checkpoint:
    name: Integration checkpoint
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Run integration checkpoint validator
        run: |
          python3 ci/check_m1_checkpoint.py --repo-root . --report target/m1-checkpoint/report.json

      - name: Upload integration checkpoint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m1-checkpoint-${{ github.run_id }}
          path: target/m1-checkpoint
          if-no-files-found: error
          retention-days: 30
