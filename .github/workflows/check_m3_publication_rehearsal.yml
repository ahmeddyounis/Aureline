# M3 publication and clean-room rebuild rehearsal gate.
#
# Validates the M3 benchmark publication dry-run packet, the M3
# clean-room rebuild rehearsal packet, and the M3 proof-consumption
# walkthrough together; refreshes the checked-in validation captures.

name: check_m3_publication_rehearsal

on:
  pull_request:
    paths:
      - ".github/workflows/check_m3_publication_rehearsal.yml"
      - "ci/check_m3_publication_rehearsal.py"
      - "artifacts/benchmarks/m3/publication_dry_run/packet.md"
      - "artifacts/benchmarks/m3/publication_dry_run/captures/publication_dry_run_validation_capture.json"
      - "artifacts/release/m3/clean_room_rebuild_rehearsal/packet.md"
      - "artifacts/release/m3/clean_room_rebuild_rehearsal/captures/clean_room_rebuild_rehearsal_validation_capture.json"
      - "artifacts/milestones/m3/proof_consumption_walkthrough.md"
      - "artifacts/milestones/m3/public_proof_index.md"
      - "artifacts/governance/evidence_freshness_slos.yaml"
      - "artifacts/governance/evidence_rerun_triggers.yaml"
      - "artifacts/build/build_identity.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-m3-publication-rehearsal-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publication_rehearsal:
    name: M3 publication and rebuild rehearsal
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Run M3 publication and rebuild rehearsal validator
        run: |
          python3 ci/check_m3_publication_rehearsal.py --repo-root . --check

      - name: Upload publication dry-run capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m3-publication-dry-run-${{ github.run_id }}
          path: artifacts/benchmarks/m3/publication_dry_run/captures/publication_dry_run_validation_capture.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload clean-room rebuild rehearsal capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m3-clean-room-rebuild-rehearsal-${{ github.run_id }}
          path: artifacts/release/m3/clean_room_rebuild_rehearsal/captures/clean_room_rebuild_rehearsal_validation_capture.json
          if-no-files-found: error
          retention-days: 30
