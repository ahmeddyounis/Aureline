# M3 runtime/ecosystem preview-row packet gate.
#
# Validates notebook trust, repair, install-review, compatibility-label,
# activation-budget, and support-export projection truth for every claimed
# runtime-heavy or ecosystem-heavy beta row.

name: check_m3_preview_row_packets

on:
  pull_request:
    paths:
      - ".github/workflows/check_m3_preview_row_packets.yml"
      - "ci/check_m3_preview_row_packets.py"
      - "schemas/compat/m3_preview_row_packet.schema.json"
      - "artifacts/compat/m3/preview_row_packets/**"
      - "artifacts/compat/m3/captures/preview_row_packet_validation_capture.json"
      - "fixtures/ai/m3/preview_row_inputs/**"
      - "docs/release/m3/preview_row_requirements.md"
      - "docs/help/m3/release_truth_surfaces.md"
      - "artifacts/release/m3/claim_manifest.json"
      - "artifacts/milestones/m3/claimed_surface_register.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-m3-preview-row-packets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  preview_row_packets:
    name: M3 preview-row packets
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run preview-row packet validator
        run: |
          python3 ci/check_m3_preview_row_packets.py --repo-root . --check

      - name: Upload validation capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m3-preview-row-packets-${{ github.run_id }}
          path: artifacts/compat/m3/captures/preview_row_packet_validation_capture.json
          if-no-files-found: error
          retention-days: 30

