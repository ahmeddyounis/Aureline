# M5 cross-surface hardening register gate.
#
# Validates the checked-in M5 cross-surface hardening register: every M5 depth
# surface (notebook, data/API, profiler, docs/browser, pipeline, preview,
# framework-pack, companion, sync, offboarding) binds a stable claim, a readiness
# scorecard with one cell per dimension (onboarding/migration truth, design-token
# and component-state parity, durable-attention semantics, embedded-boundary
# integrity, exact-target reopen expectations, qualification currency), the
# disclosed support posture and trust tier, an owner-manifest sign-off, and an
# explicit downgrade-automation record bound to a verified frozen-fallback
# rollback plan; a surface whose readiness dimension failed or is missing, whose
# redaction posture is not disclosed, whose packet is stale or missing, whose owner
# manifest is unsigned, whose frozen-fallback rollback plan is unverified, whose
# downgrade automation is undefined, or whose waiver expired must drop below the
# stable cutline; the promotion verdict and summary agree with the firing stop
# rules. The gate runs the checked-in fixture cases proving those rejections fire.
# The typed Rust consumer reads the same register, so `cargo test -p
# aureline-release` enforces the same structural invariants.

name: check_m5_cross_surface_hardening_register

on:
  pull_request:
    paths:
      - ".github/workflows/check_m5_cross_surface_hardening_register.yml"
      - "artifacts/release/m5/freeze_the_cross_surface_hardening_matrix_scorecards_and_evidence_bindings_for_every_m5_depth_surface.json"
      - "artifacts/release/captures/freeze_the_cross_surface_hardening_matrix_scorecards_and_evidence_bindings_for_every_m5_depth_surface_validation_capture.json"
      - "schemas/governance/freeze_the_cross_surface_hardening_matrix_scorecards_and_evidence_bindings_for_every_m5_depth_surface.schema.json"
      - "docs/m5/freeze_the_cross_surface_hardening_matrix_scorecards_and_evidence_bindings_for_every_m5_depth_surface.md"
      - "fixtures/release/m5/freeze_the_cross_surface_hardening_matrix_scorecards_and_evidence_bindings_for_every_m5_depth_surface/**"
      - "crates/aureline-release/src/freeze_the_cross_surface_hardening_matrix_scorecards_and_evidence_bindings_for_every_m5_depth_surface/**"
      - "crates/aureline-release/src/lib.rs"
      - "crates/aureline-release/tests/freeze_the_cross_surface_hardening_matrix_scorecards_and_evidence_bindings_for_every_m5_depth_surface.rs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-m5-cross-surface-hardening-register-${{ github.ref }}
  cancel-in-progress: false

jobs:
  m5_cross_surface_hardening_register:
    name: M5 Cross-Surface Hardening Register
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Run M5 cross-surface hardening register contract tests
        run: |
          cargo test -p aureline-release --test freeze_the_cross_surface_hardening_matrix_scorecards_and_evidence_bindings_for_every_m5_depth_surface

      - name: Upload validation capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m5-cross-surface-hardening-register-${{ github.run_id }}
          path: artifacts/release/captures/freeze_the_cross_surface_hardening_matrix_scorecards_and_evidence_bindings_for_every_m5_depth_surface_validation_capture.json
          if-no-files-found: error
          retention-days: 30
