# M5 publication-pack register gate.
#
# Validates the checked-in publication-pack register: every pack kind (docs pack,
# migration pack, known-limits pack, publication index) binds a stable claim, a
# readiness scorecard with one cell per dimension (docs coverage, migration
# completeness, known-limits disclosure, redaction safety, proof freshness, locale
# parity), the disclosed support posture and trust tier, an owner-manifest
# sign-off, and an explicit downgrade-automation record bound to a verified
# frozen-fallback rollback plan; a pack whose readiness dimension failed or is
# missing, whose redaction posture is not disclosed, whose packet is stale or
# missing, whose owner manifest is unsigned, whose frozen-fallback rollback plan
# is unverified, whose downgrade automation is undefined, or whose waiver expired
# must drop below the stable cutline; the promotion verdict and summary agree with
# the firing stop rules. The gate runs the checked-in fixture cases proving those
# rejections fire. The typed Rust consumer reads the same register, so
# `cargo test -p aureline-release` enforces the same structural invariants.

name: check_publication_pack_register

on:
  pull_request:
    paths:
      - ".github/workflows/check_publication_pack_register.yml"
      - "artifacts/release/m5/publish_docs_migration_and_known_limits_packs_for_m5_feature_families.json"
      - "artifacts/release/captures/publish_docs_migration_and_known_limits_packs_for_m5_feature_families_validation_capture.json"
      - "schemas/governance/publish_docs_migration_and_known_limits_packs_for_m5_feature_families.schema.json"
      - "docs/m5/publish_docs_migration_and_known_limits_packs_for_m5_feature_families.md"
      - "fixtures/release/m5/publish_docs_migration_and_known_limits_packs_for_m5_feature_families/**"
      - "crates/aureline-release/src/publish_docs_migration_and_known_limits_packs_for_m5_feature_families/**"
      - "crates/aureline-release/src/lib.rs"
      - "crates/aureline-release/tests/publish_docs_migration_and_known_limits_packs_for_m5_feature_families.rs"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-publication-pack-register-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publication_pack_register:
    name: M5 Publication-Pack Register
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Run publication-pack register contract tests
        run: |
          cargo test -p aureline-release --test publish_docs_migration_and_known_limits_packs_for_m5_feature_families

      - name: Upload validation capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publication-pack-register-${{ github.run_id }}
          path: artifacts/release/captures/publish_docs_migration_and_known_limits_packs_for_m5_feature_families_validation_capture.json
          if-no-files-found: error
          retention-days: 30
