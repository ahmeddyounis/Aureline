# M3 public-proof artifact index gate.
#
# Validates the canonical public-proof artifact index, the review-packet
# template, and the publication shelf-life policy together, and refreshes
# the checked-in validation capture (which carries the derived downgrade
# matrix downstream surfaces consume).

name: check_m3_public_proof_index

on:
  pull_request:
    paths:
      - ".github/workflows/check_m3_public_proof_index.yml"
      - "ci/check_m3_public_proof_index.py"
      - "artifacts/milestones/m3/public_proof_index.md"
      - "artifacts/milestones/m3/review_packet_template.md"
      - "docs/governance/m3/publication_shelf_life_policy.md"
      - "artifacts/milestones/m3/captures/public_proof_index_validation_capture.json"
      - "artifacts/release/m3/claim_manifest.json"
      - "artifacts/governance/evidence_freshness_slos.yaml"
      - "artifacts/governance/evidence_rerun_triggers.yaml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-m3-public-proof-index-${{ github.ref }}
  cancel-in-progress: false

jobs:
  public_proof_index:
    name: M3 public-proof artifact index
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Run M3 public-proof index validator
        run: |
          python3 ci/check_m3_public_proof_index.py --repo-root . --check

      - name: Upload validation capture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m3-public-proof-index-${{ github.run_id }}
          path: artifacts/milestones/m3/captures/public_proof_index_validation_capture.json
          if-no-files-found: error
          retention-days: 30
