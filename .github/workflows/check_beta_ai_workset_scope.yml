# AI composer / context-inspector workset / scope beta gate.
#
# Promotes named-workset, sparse-slice, and policy-limited-view scope truth to
# beta on the AI surface. Runs the Rust drill that replays the frozen corpus
# through the AI composer / context-inspector projection (in-scope context stays
# drawn, out-of-scope and policy-limited context is labeled, and the same scope
# truth flows into the evidence handoff and spend receipt), then runs the data
# gate that re-derives the workspace scope vocabulary from crate source and fails
# closed if the shared 1:1 scope vocabulary, the corpus labeling, or the required
# scope-class coverage drift.

name: check_beta_ai_workset_scope

on:
  pull_request:
    paths:
      - ".github/workflows/check_beta_ai_workset_scope.yml"
      - "ci/check_beta_ai_workset_scope.py"
      - "fixtures/ai/workset_scope_beta/**"
      - "crates/aureline-ai/tests/workset_scope_beta.rs"
      - "crates/aureline-ai/**"
      - "crates/aureline-workspace/src/worksets/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-beta-ai-workset-scope-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  beta_ai_workset_scope:
    name: Beta AI workset scope
    runs-on: ubuntu-latest
    env:
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
          rustflags: ""

      - name: Run AI workset scope beta drill
        run: cargo test -p aureline-ai --test workset_scope_beta --locked

      - name: Run AI workset scope gate
        run: |
          python3 ci/check_beta_ai_workset_scope.py --repo-root . --report target/beta-ai-workset-scope/report.json

      - name: Upload AI workset scope gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: beta-ai-workset-scope-${{ github.run_id }}
          path: target/beta-ai-workset-scope
          if-no-files-found: error
          retention-days: 30
