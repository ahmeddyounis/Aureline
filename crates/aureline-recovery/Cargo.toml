[package]
name = "aureline-recovery"
description = "Crash journals, dirty-buffer recovery, and session-restore skeleton persistence."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
aureline-history = { path = "../aureline-history" }
aureline-settings = { path = "../aureline-settings" }
aureline-support = { path = "../aureline-support" }
aureline-workspace = { path = "../aureline-workspace" }
blake3 = "1.8.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

[dev-dependencies]
tempfile = "3"
