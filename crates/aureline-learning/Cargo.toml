[package]
name = "aureline-learning"
description = "Qualification layer for learning-mode surfaces, guided tours, exercise rails, glossary packs, and teaching-session flows."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "aureline_learning_qualify"
path = "src/bin/aureline_learning_qualify.rs"

[[bin]]
name = "aureline_learning_m5_feature_family_rails"
path = "src/bin/aureline_learning_m5_feature_family_rails.rs"

[lints]
workspace = true

[dependencies]
aureline-commands = { path = "../aureline-commands" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

[dev-dependencies]
serde_json = "1"
