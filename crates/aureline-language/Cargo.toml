[package]
name = "aureline-language"
description = "Tree-sitter grammar registry and parser lifecycle runtime for launch-language syntax."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "aureline_language_tree_sitter"
path = "src/bin/aureline_language_tree_sitter.rs"

[lints]
workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tree-sitter = "=0.24.7"
tree-sitter-css = "0.23.2"
tree-sitter-html = "0.23.2"
tree-sitter-javascript = "0.23.1"
tree-sitter-json = "0.24.8"
tree-sitter-md = { version = "0.3.2", default-features = false }
tree-sitter-python = "0.23.6"
tree-sitter-typescript = "0.23.2"
tree-sitter-yaml = "0.6.1"
