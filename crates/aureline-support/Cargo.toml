[package]
name = "aureline-support"
description = "Support-bundle manifest, redaction defaults, local preview, and exact-build capture for the live shell."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
aureline-build-info = { path = "../aureline-build-info" }
aureline-doctor = { path = "../aureline-doctor" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

[dev-dependencies]
tempfile = "3"
