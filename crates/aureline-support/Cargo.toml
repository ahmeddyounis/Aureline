[package]
name = "aureline-support"
description = "Support-bundle manifest, redaction defaults, local preview, and exact-build capture for the live shell."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
aureline-build-info = { path = "../aureline-build-info" }
aureline-build-farm = { path = "../aureline-build-farm" }
aureline-crash = { path = "../aureline-crash" }
aureline-doctor = { path = "../aureline-doctor" }
aureline-graph = { path = "../aureline-graph" }
aureline-history = { path = "../aureline-history" }
aureline-language = { path = "../aureline-language" }
aureline-notices = { path = "../aureline-notices" }
aureline-policy = { path = "../aureline-policy" }
aureline-reactive-state = { path = "../aureline-reactive-state" }
aureline-records = { path = "../aureline-records" }
aureline-runtime = { path = "../aureline-runtime" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
time = { version = "0.3", features = ["parsing"] }

[dev-dependencies]
tempfile = "3"
