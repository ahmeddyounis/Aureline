[package]
name = "aureline-release"
description = "Release-center object model for candidates, publish targets, promotion history, rollback, and revocation."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "aureline_release_finalize_experiments_labs_inventory"
path = "src/bin/aureline_release_finalize_experiments_labs_inventory.rs"

[lints]
workspace = true

[dependencies]
aureline-settings = { path = "../aureline-settings" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
serde_json = "1"
