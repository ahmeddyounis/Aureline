[package]
name = "aureline-release"
description = "Release-center object model for candidates, publish targets, promotion history, rollback, and revocation."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
