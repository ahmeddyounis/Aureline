[package]
name = "aureline-service-health"
description = "Scheduled maintenance, read-only/drain windows, tenant migration/failover communication, and publish-later/local-draft continuity for managed and provider-linked surfaces."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "aureline_service_health_inspect"
path = "src/bin/aureline_service_health_inspect.rs"

[lints]
workspace = true

[dependencies]
aureline-continuity = { path = "../aureline-continuity" }
aureline-provider = { path = "../aureline-provider" }
aureline-support = { path = "../aureline-support" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
