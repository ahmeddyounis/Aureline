[package]
name = "aureline-i18n"
description = "Localization message identity, locale-pack governance, fallback inspection, and support-export projections."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "aureline_i18n_locale_pack_beta"
path = "src/bin/aureline_i18n_locale_pack_beta.rs"

[lints]
workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
serde_yaml = "0.9"
