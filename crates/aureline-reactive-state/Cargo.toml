[package]
name = "aureline-reactive-state"
description = "Reactive state and subscription-envelope prototype. Validates the ADR 0005 subscription envelope, lifecycle, freshness / completeness / stale-reason vocabulary, authority / derivation split, materialized-view classes, and protected-hot-path hooks against a frozen scenario table with byte-stable invalidation traces."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[[bin]]
name = "reactive_proto"
path = "src/bin/reactive_proto.rs"

[lints]
workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"

[dev-dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
