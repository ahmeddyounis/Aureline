[package]
name = "aureline-notebook"
description = "Retained notebook preview runtime-truth model: kernel/session/output truth, restart/reconnect review, variable-explorer freshness, rich-output trust classes, debugger-bridge state, round-trip fixtures, heavy-output corpora, and canonical support packet."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
serde_yaml = "0.9"
