[package]
name = "aureline-settings"
description = "Effective-settings schema registry, precedence engine, and locked-write flow."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "aureline_settings_design_token_runtime_stable"
path = "src/bin/aureline_settings_design_token_runtime_stable.rs"

[[bin]]
name = "aureline_settings_component_state_registry_stable"
path = "src/bin/aureline_settings_component_state_registry_stable.rs"

[[bin]]
name = "aureline_settings_finalize_settings_ui_stable"
path = "src/bin/aureline_settings_finalize_settings_ui_stable.rs"

[[bin]]
name = "aureline_settings_sync_device_registry_stable"
path = "src/bin/aureline_settings_sync_device_registry_stable.rs"

[[bin]]
name = "aureline_settings_finalize_appearance_session_theme_packages_token_overlays"
path = "src/bin/aureline_settings_finalize_appearance_session_theme_packages_token_overlays.rs"

[[bin]]
name = "aureline_settings_finalize_settings_definition_registry"
path = "src/bin/aureline_settings_finalize_settings_definition_registry.rs"

[[bin]]
name = "aureline_settings_stabilize_profile_sync_snapshot_backup_restore"
path = "src/bin/aureline_settings_stabilize_profile_sync_snapshot_backup_restore.rs"

[[bin]]
name = "aureline_settings_stabilize_profile_switch_review_and_temporary_profile_lifecycle"
path = "src/bin/aureline_settings_stabilize_profile_switch_review_and_temporary_profile_lifecycle.rs"

[lints]
workspace = true

[dependencies]
aureline-i18n = { path = "../aureline-i18n" }
aureline-ui = { path = "../aureline-ui" }
aureline-design-system = { path = "../aureline-design-system" }
aureline-extensions = { path = "../aureline-extensions" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
