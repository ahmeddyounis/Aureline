[package]
name = "aureline-provider"
description = "Connected-provider registry alpha for external provider descriptors, publish-later queue truth, and CI overlay disclosures."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "aureline_provider_alpha"
path = "src/bin/aureline_provider_alpha.rs"

[[bin]]
name = "aureline_provider_route_resolution_beta"
path = "src/bin/aureline_provider_route_resolution_beta.rs"

[[bin]]
name = "aureline_provider_infrastructure_intelligence_alpha"
path = "src/bin/aureline_provider_infrastructure_intelligence_alpha.rs"

[[bin]]
name = "aureline_provider_work_item_transition_beta"
path = "src/bin/aureline_provider_work_item_transition_beta.rs"

[[bin]]
name = "aureline_provider_event_reconciliation"
path = "src/bin/aureline_provider_event_reconciliation.rs"

[[bin]]
name = "aureline_provider_work_item_sync_beta"
path = "src/bin/aureline_provider_work_item_sync_beta.rs"

[lints]
workspace = true

[dependencies]
aureline-auth = { path = "../aureline-auth" }
aureline-support = { path = "../aureline-support" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
