[package]
name = "aureline-review"
description = "Review and diff surface contracts for launch-wedge local Git review."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
aureline-content-safety = { path = "../aureline-content-safety" }
aureline-git = { path = "../aureline-git" }
aureline-graph = { path = "../aureline-graph" }
aureline-provider = { path = "../aureline-provider" }
aureline-search = { path = "../aureline-search" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
serde_json = "1"
serde_yaml = "0.9"
