[package]
name = "aureline-profiler"
description = "Profile launcher, attach sheets, capture-mode descriptors, and storage-location truth for profiler and trace surfaces."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
aureline-build-info = { path = "../aureline-build-info" }
aureline-runtime = { path = "../aureline-runtime" }
aureline-support = { path = "../aureline-support" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = "3"
