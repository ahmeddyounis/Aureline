[package]
name = "aureline-runtime"
description = "Execution-context object model and resolver seed shared by terminal, task, and debug-prep lanes."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
aureline-language = { path = "../aureline-language" }
aureline-workspace = { path = "../aureline-workspace" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
aureline-terminal = { path = "../aureline-terminal" }
