[package]
name = "aureline-install"
description = "Install-topology alpha contract for channel, state-root, handler, silent deployment, and support-export truth."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
aureline-recovery = { path = "../aureline-recovery" }
aureline-release = { path = "../aureline-release" }
tempfile = "3"
