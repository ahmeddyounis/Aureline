[package]
name = "aureline-shell"
description = "Desktop shell: canonical zone registry and live desktop frame."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "aureline_shell"
path = "src/bin/aureline_shell.rs"

[lints]
workspace = true

[dependencies]
arboard = "3.6"
aureline-build-info = { path = "../aureline-build-info" }
aureline-commands = { path = "../aureline-commands" }
aureline-input = { path = "../aureline-input" }
font8x8 = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
softbuffer = "0.4"
winit = { version = "0.29", features = ["rwh_06"] }
