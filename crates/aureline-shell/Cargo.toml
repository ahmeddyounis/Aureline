[package]
name = "aureline-shell"
description = "Desktop shell: canonical zone registry and live desktop frame."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[[bin]]
name = "aureline_shell"
path = "src/bin/aureline_shell.rs"

[lints]
workspace = true

[dependencies]
arboard = "3.6"
aureline-ai = { path = "../aureline-ai" }
aureline-auth = { path = "../aureline-auth" }
aureline-build-info = { path = "../aureline-build-info" }
aureline-buffer = { path = "../aureline-buffer" }
aureline-commands = { path = "../aureline-commands" }
aureline-content-safety = { path = "../aureline-content-safety" }
aureline-docs = { path = "../aureline-docs" }
aureline-editor = { path = "../aureline-editor" }
aureline-extensions = { path = "../aureline-extensions" }
aureline-git = { path = "../aureline-git" }
aureline-graph = { path = "../aureline-graph" }
aureline-graph-proto = { path = "../aureline-graph-proto" }
aureline-history = { path = "../aureline-history" }
aureline-input = { path = "../aureline-input" }
aureline-language = { path = "../aureline-language" }
aureline-preview = { path = "../aureline-preview" }
aureline-provider = { path = "../aureline-provider" }
aureline-reactive-state = { path = "../aureline-reactive-state" }
aureline-recovery = { path = "../aureline-recovery" }
aureline-review = { path = "../aureline-review" }
aureline-search = { path = "../aureline-search" }
aureline-settings = { path = "../aureline-settings" }
aureline-render = { path = "../aureline-render" }
aureline-runtime = { path = "../aureline-runtime" }
aureline-support = { path = "../aureline-support" }
aureline-terminal = { path = "../aureline-terminal" }
aureline-telemetry = { path = "../aureline-telemetry" }
aureline-text = { path = "../aureline-text" }
aureline-ui = { path = "../aureline-ui" }
aureline-vfs = { path = "../aureline-vfs" }
aureline-workspace = { path = "../aureline-workspace" }

font8x8 = "0.3"
png = "0.17"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
softbuffer = "0.4"
unicode-segmentation = "1"
webbrowser = "=1.1.0"
winit = { version = "0.29", features = ["rwh_06"] }

[target.'cfg(target_os = "linux")'.dependencies]
rfd = { version = "0.14.1", default-features = false, features = ["xdg-portal", "async-std"] }

[target.'cfg(not(target_os = "linux"))'.dependencies]
rfd = { version = "0.14.1", default-features = false }

[dev-dependencies]
tempfile = "3"
