[package]
name = "aureline-search"
description = "Workspace search foundations: lexical filename/path search shell with scope and partiality truth."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[lib]
path = "src/lib.rs"

[lints]
workspace = true

[dependencies]
aureline-graph = { path = "../aureline-graph" }
aureline-language = { path = "../aureline-language" }
aureline-reactive-state = { path = "../aureline-reactive-state" }
aureline-vfs = { path = "../aureline-vfs" }
aureline-workspace = { path = "../aureline-workspace" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
aureline-graph-proto = { path = "../aureline-graph-proto" }
