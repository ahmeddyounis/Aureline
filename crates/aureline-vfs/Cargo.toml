[package]
name = "aureline-vfs"
description = "Virtual filesystem, watcher, canonical-path, alias-set, and save-target prototype. Validates the ADR 0006 filesystem-identity, watcher, and save-pipeline contracts against a synthetic-root fixture table."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
publish.workspace = true

[[bin]]
name = "vfs_proto"
path = "src/bin/vfs_proto.rs"

[lints]
workspace = true

[dependencies]
notify = "6.1.1"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"

[dev-dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
