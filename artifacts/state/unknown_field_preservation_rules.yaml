# Unknown-field preservation rules for state-bearing artifacts.
#
# This file freezes which unknown-field posture applies to each
# artifact family class discussed in docs/state/feature_scoped_migration_failure_contract.md.
# It is intentionally smaller than artifacts/config/format_selection_matrix.yaml:
# the format matrix binds *file formats*; this file binds *failure routing*
# expectations for state-bearing artifacts on workspace open and repair paths.

schema_version: 1
artifact_id: aureline.state.unknown_field_preservation_rules
title: Unknown-field preservation rules for state-bearing artifacts
contract_source: docs/state/feature_scoped_migration_failure_contract.md

unknown_field_posture_vocabulary:
  - preserve_verbatim
  - preserve_under_namespaced_key
  - drop_with_disclosure
  - refuse_read

artifact_family_class_vocabulary:
  - user_owned_durable
  - workspace_owned_durable
  - admin_or_control
  - cache_or_index
  - generated_or_structured
  - evidence_or_support

rules:
  - id: user_owned_durable_default
    artifact_family_class: user_owned_durable
    unknown_field_posture: preserve_verbatim
    applies_to_state_object_ids:
      - user_global_settings
      - keybindings
      - snippets
      - themes_and_design_tokens
      - command_aliases
      - terminal_preferences
      - machine_specific_settings
      - extension_selection_inventory
      - ai_preset_selection
    read_rule: >
      Accept unknown additive fields and preserve them verbatim. Unknown
      fields may be surfaced as diagnostics, but the reader must not drop
      or reorder them in a no-op read/write cycle.
    write_rule: >
      Writers preserve comments and unknown fields. If the writer cannot
      guarantee preservation, it refuses the write or routes through an
      explicit preview + rollback checkpoint.
    rationale: >
      User-owned durable truth is hand-authored and forward-looking.
      Unknown fields are expected to appear via extension namespaces and
      staged rollouts; dropping them would be irreversible data loss.

  - id: workspace_owned_durable_tasks_launch
    artifact_family_class: workspace_owned_durable
    unknown_field_posture: preserve_verbatim
    applies_to_state_object_ids:
      - tasks_and_launch_configs
    read_rule: >
      Accept and preserve unknown fields. Unknown tasks/launch members
      may be treated as inert and must not be silently removed.
    write_rule: >
      Any rewrite that would drop unknown fields is forbidden without a
      preview. Task execution is gated on schema validity; editing may
      continue in text mode with preserved unknown fields.
    rationale: >
      Task and launch files are project-owned and often shared in VCS.
      Forward-looking fields must survive round-trips even when the
      current build cannot execute them.

  - id: workspace_owned_durable_lockfiles_strict
    artifact_family_class: workspace_owned_durable
    unknown_field_posture: refuse_read
    applies_to_state_object_ids:
      - extension_lockfile
    read_rule: >
      Refuse unknown fields. If an unknown field is present, the lockfile
      is treated as unreadable for semantic operations until it is
      regenerated by a compatible resolver.
    write_rule: >
      Lockfiles are generator-owned. The product does not perform best-
      effort rewrites; it regenerates through an explicit preview and
      preserves the prior lockfile for compare/export.
    rationale: >
      Lockfiles are integrity-sensitive evidence. Guessing on unknown
      members risks silently widening scope or masking drift.

  - id: admin_or_control_signed_policy_strict
    artifact_family_class: admin_or_control
    unknown_field_posture: refuse_read
    applies_to_state_object_ids:
      - admin_policy_bundle
      - policy_bundle_cache
      - trust_approvals
    read_rule: >
      Refuse unknown fields and refuse unverifiable epochs. Fall back to
      last-known-good signed authority for local-safe operations.
    write_rule: >
      Privileged policy/trust writes are denied until a fresh signed epoch
      is fetched and verified. No best-effort mutations.
    rationale: >
      Policy and trust artifacts are authority boundaries. Unknown fields
      cannot be treated as benign extensions without explicit signing and
      verification rules.

  - id: cache_or_index_rebuildable
    artifact_family_class: cache_or_index
    unknown_field_posture: refuse_read
    applies_to_state_object_ids:
      - index_cache
      - execution_context_cache
      - knowledge_cache
      - interactive_hot_cache
    read_rule: >
      Cache/index artifacts are derived state. Schema mismatch triggers
      discard + rebuild rather than unknown-field preservation.
    write_rule: >
      Rebuild from authoritative truth; never overwrite user/workspace
      durable artifacts as part of cache repair.
    rationale: >
      Derived stores exist to accelerate workflows. When they drift, the
      correct response is to rebuild, not to pretend the drifted payload
      is authoritative.

  - id: generated_or_structured_inspect_only
    artifact_family_class: generated_or_structured
    unknown_field_posture: refuse_read
    applies_to_state_object_ids: []
    read_rule: >
      Readers may inspect or compare generated structured artifacts, but
      they must not claim safe mutation when schema support is absent.
    write_rule: >
      Generated artifacts are regenerated, not edited in place, unless a
      dedicated round-trip-safe editor exists and is proven by corpus.
    rationale: >
      Generated structured views (graphs, render atlases, structured
      summaries) are not the authoritative truth; they degrade to compare
      and read-only rather than silent rewrites.

  - id: evidence_or_support_content_addressed
    artifact_family_class: evidence_or_support
    unknown_field_posture: refuse_read
    applies_to_state_object_ids:
      - support_bundles
      - crash_envelopes
    read_rule: >
      Evidence bundles are content-addressed. Unknown fields or schema
      mismatches render the bundle unreadable; the product re-emits a new
      bundle rather than mutating the old one.
    write_rule: >
      Never migrate bundles in place. The bundle is replaced by generating
      a new instance with a new identity and provenance.
    rationale: >
      Support and evidence artifacts are immutable exports. Mutation would
      break provenance and invalidate incident correlation.
