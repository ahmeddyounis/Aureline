# State migration / recovery playbook index.
#
# Tooling reads this file. The narrative companion is
# docs/state/state_migration_coverage_matrix.md. If they disagree, this
# file is authoritative and the narrative is updated in the same change.
#
# Scope:
#   - One row per durable state object in artifacts/state/state_objects.yaml.
#   - Additional rows for state-bearing artifact families outside the
#     state-object registry that still participate in migration/recovery
#     reviews (portable-state packages, restore-artifact-family packets,
#     provider-linked drafts, AI retained artifacts, notebook artifacts).
#   - Per-family obligations: schema owner, stability label, backup rule,
#     downgrade behavior, compare/export posture, corruption fallback, and
#     the evidence profile the family requires after migration or recovery.

schema_version: 1
status: seeded

overview_page: docs/state/state_migration_coverage_matrix.md

companion_refs:
  state_object_inventory_ref: artifacts/state/state_objects.yaml
  profile_and_state_map_ref: docs/state/profile_and_state_map.md
  durable_state_compatibility_contract_ref: docs/state/durable_state_compatibility_contract.md
  migration_and_restore_playbook_ref: docs/state/migration_and_restore_playbook.md
  portable_state_package_contract_ref: docs/state/portable_state_package_contract.md
  restore_artifact_family_contract_ref: docs/state/restore_artifact_family_contract.md
  ai_memory_contract_ref: docs/ai/memory_and_reconciliation_contract.md
  recovery_evidence_packet_schema_ref: schemas/state/recovery_evidence_packet.schema.json

coverage_category_vocabulary:
  - user_authored_or_user_owned
  - regenerateable_cache_or_derived
  - imported_or_authority_owned

compare_export_ability_vocabulary:
  - compare_and_export_supported
  - compare_supported_export_optional
  - compare_supported_export_metadata_only
  - compare_not_applicable_export_not_applicable

migration_support_vocabulary:
  - migrate_in_place
  - rebuild_only
  - authority_refresh_only
  - no_migration_supported

evidence_profiles:
  durable_truth_migration:
    required_fields:
      - before
      - after
      - backup_reference
      - dry_run_diff
      - retained_artifacts
      - warnings
      - manual_follow_ups
      - rollback_result
    notes: >
      Used for user-authored durable truth and other families where schema
      meaning changes can lose intent. Backup and rollback evidence is
      mandatory even when the apply succeeds.

  recovery_journal_replay:
    required_fields:
      - before
      - after
      - backup_reference
      - dry_run_diff
      - retained_artifacts
      - warnings
      - manual_follow_ups
      - rollback_result
    notes: >
      Used for recovery journals and replayable state: evidence must
      disclose truncation, fallback, and any degraded restore posture.

  derived_cache_rebuild:
    required_fields:
      - before
      - after
      - backup_reference
      - dry_run_diff
      - retained_artifacts
      - warnings
      - manual_follow_ups
      - rollback_result
    notes: >
      Used for regenerate-able derived caches. The packet must explicitly
      state when the cache was rebuilt, and must not imply durable truth
      existed beyond the authoritative sources.

  authority_owned_refresh:
    required_fields:
      - before
      - after
      - backup_reference
      - dry_run_diff
      - retained_artifacts
      - warnings
      - manual_follow_ups
      - rollback_result
    notes: >
      Used for admin / credential-store / provider-owned artifacts where
      "migration" is a refresh, reauth, or signed-epoch replacement.

  evidence_bundle_readonly:
    required_fields:
      - before
      - after
      - backup_reference
      - dry_run_diff
      - retained_artifacts
      - warnings
      - manual_follow_ups
      - rollback_result
    notes: >
      Used for content-addressed evidence bundles. Evidence must describe
      any unreadable items and the effect on export/review surfaces.

