schema_version: 1
example_id: state.query_family.graph_projection_variants
summary: >
  One graph family spans live/cached, replayed, and imported review
  postures without forking the identifier.
family:
  query_family: graph.neighborhood
  scope_classes:
    - workspace
    - review_workspace
  authority_class: derived_knowledge
  derivation_class: derived
  view_class: exportable_snapshot
  surfaces:
    - graph_panel
    - support_bundle_viewer
    - review_bundle_viewer
    - cli_graph_export
  support_export_tag: state.query_family.graph.neighborhood
  benchmark_tag: reactive_state.query_family.graph.neighborhood
variants:
  - variant_id: cached_live_projection
    freshness: cached
    stale_reason: cache_served
    meaning: current derivation against a named upstream digest
  - variant_id: replay_review
    freshness: replayed
    stale_reason: replayed_from_bundle
    meaning: replayed history remains separate from the live snapshot epoch
  - variant_id: imported_bundle
    freshness: imported
    stale_reason: imported_from_external
    meaning: imported LSIF or bundle data remains reviewable but never canonical
cross_surface_contract:
  - Replay and import posture change freshness and stale reason, not the
    query-family identifier.
  - Live graph panels, review exports, and support bundles all quote the
    same family id and disclose posture separately.
