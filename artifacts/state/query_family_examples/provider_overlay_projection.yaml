schema_version: 1
example_id: state.query_family.provider_overlay_projection
summary: >
  Provider-overlay family for review and CI status surfaces. The family
  remains an overlay and never silently becomes local workspace
  authority.
family:
  query_family: provider.ci_checks
  scope_classes:
    - workspace
    - review_workspace
    - companion_surface
  authority_class: provider_overlay
  derivation_class: derived
  view_class: managed_replicated_view
  surfaces:
    - review_checks_strip
    - status_center
    - companion_review_summary
    - cli_review_status
  support_export_tag: state.query_family.provider.ci_checks
  benchmark_tag: reactive_state.query_family.provider.ci_checks
required_labels:
  cached: last validated provider state is visible with source attribution
  stale: provider continuity or watcher fidelity was lost
  failed_refresh: terminal unavailable state preserves last-known projection but does not claim current truth
terminal_behavior:
  terminal_reason: unavailable
  required_stale_reason: watcher_dropped
  support_export_fields:
    - query_family
    - scope_ref
    - snapshot_epoch
    - delta_seq
    - terminal_reason
    - stale_reason
cross_surface_contract:
  - Companion and CLI surfaces quote the same provider family id as the
    desktop review surface.
  - Provider overlay state never overwrites local canonical truth; it
    remains a scoped overlay with explicit freshness and failure posture.
