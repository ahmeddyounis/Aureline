    display_name: User settings
    artifact_class: user_authored_durable_truth
    scope_tags: [user, profile]
    location_root: AURELINE_CONFIG
    location_concept: "$AURELINE_CONFIG/settings.jsonc"
    authority_owner: user_authored_durable_truth
    portability_class: portable
    retention_class: durable_until_user_deletes
    clear_class: clear_requires_preview_and_rollback
    secret_posture: may_include_user_content
    exportability: portable_profile_default
    backup_posture: backup_by_default
    low_disk_posture: never_evict_silently
    supportability: support_metadata_default
    never_delete_silently: true
    source_refs:
      - docs/state/profile_and_state_map.md#6-state-map-rows-appendix-f-style
      - artifacts/state/state_objects.yaml:user_global_settings
    support_notes: >
      Support bundles include source, schema, and selected effective
      setting metadata by default. Raw values use the row redaction
      class before inclusion.

