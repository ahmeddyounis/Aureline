# Path-level configuration and state seed map.
#
# Companion to docs/state/config_and_state_path_map.md. This artifact is
# the shared selector source for support, backup, portability, recovery,
# policy, low-disk, and clear-data tooling. Consumers select rows by
# path_row_id and posture fields; they MUST NOT infer semantics from
# path strings alone.

schema_version: 1
artifact_id: aureline.state.path_level_seed_map
record_kind: path_level_seed_map
title: Path-level configuration and state seed map
contract_source: docs/state/config_and_state_path_map.md

related_docs:
  - docs/state/profile_and_state_map.md
  - docs/state/state_object_inventory.md
  - docs/state/migration_and_restore_playbook.md
  - docs/runtime/storage_classes_and_gc.md
  - docs/support/support_bundle_contract.md
  - docs/identity/offline_entitlement_and_policy_seed.md
  - docs/ai/memory_and_reconciliation_contract.md
  - docs/execution/terminal_truth_contract.md
  - docs/reliability/local_history_contract.md

companion_refs:
