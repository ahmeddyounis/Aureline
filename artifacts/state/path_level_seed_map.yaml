invariants:
  - id: no_path_semantics_without_row
    description: >
      Support, backup, clear-data, portability, policy, and low-disk
      flows MUST select by path_row_id and posture fields. Inferring
      behavior from a path prefix alone is non-conforming.
  - id: no_silent_delete_for_protected_rows
    description: >
      Rows with never_delete_silently = true MUST NOT be removed by
      generic reset, low-disk reclamation, or cache clear without the
      row's declared preview or authority-specific flow.
  - id: recovery_state_not_cache
    description: >
      user_owned_recovery_state rows, including local history,
      recovery journals, terminal restore, conflict journals, and
      deferred intents, MUST NOT be targeted by ordinary cache clear.
  - id: admin_control_not_user_preference
    description: >
      admin_or_tenant_control_artifact rows are refreshed, revoked, or
      replaced through signed authority. User preference import/export
      never edits them.
  - id: raw_secret_export_forbidden
    description: >
      Rows with secret_posture = raw_secret_external_store_only or
      credential_handle_only never export raw material. Exporters emit
      opaque refs, missing-secret notes, or redacted metadata.
