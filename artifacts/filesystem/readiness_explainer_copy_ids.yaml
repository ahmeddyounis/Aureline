# Semantic-readiness not-ready explainer copy ids.
#
# Machine-readable companion to docs/filesystem/semantic_readiness_projection.md.
# Surfaces quote the same copy_id so UI chrome, CLI output, migration reports,
# and support exports can prove they rendered the same approved explanation.

schema_version: 1
registry_id: filesystem.copy.semantic_readiness_explainer.v1
contract_doc_ref: docs/filesystem/semantic_readiness_projection.md
vocabulary_doc_ref: docs/filesystem/filesystem_identity_vocabulary.md
vocabulary_schema_ref: schemas/filesystem/save_target_token.schema.json
readiness_view_schema_ref: schemas/filesystem/semantic_readiness_view.schema.json
fixtures_ref: fixtures/filesystem/semantic_readiness_cases/
edge_fixtures_ref: fixtures/filesystem/semantic_readiness_edge_cases/

change_rules:
  - Adding a copy id is additive-minor when it narrows meaning and fixtures reference it.
  - Repurposing an existing copy id is breaking; add a new id and keep the old one as deprecated.
  - Copy must not collapse partial, stale, imported, heuristic, policy-blocked, and out-of-scope into one generic label.
  - Copy ids must not embed milestone slugs or planning identifiers.

copy_entries:
  - copy_id: filesystem.readiness.explainer.cold_index
    state: partial
    not_ready_reason: producer_warming
    title: Search index warming
    body: >
      Initial indexing is in progress. Results widen as enumeration completes.
      Editing and saving files continue unchanged.
    what_still_works:
      - Quick open by path
      - Opening, editing, and saving files
      - Searching files already enumerated

  - copy_id: filesystem.readiness.explainer.stale_graph
    state: stale
    not_ready_reason: input_digest_stale
    title: Semantic graph stale
    body: >
      The semantic graph was built against inputs that have changed. Navigation,
      refactors, and diagnostics that depend on the graph may be incomplete until
      the graph refresh completes.
    what_still_works:
      - Opening, editing, and saving files
      - Lexical search
      - Previously cached navigation with stale labels

  - copy_id: filesystem.readiness.explainer.watcher_degraded
    state: partial
    not_ready_reason: watcher_degraded
    title: Watch fidelity degraded
    body: >
      File watching is degraded on this root. Aureline may not notice external
      changes promptly, so freshness-sensitive claims are downgraded until watch
      fidelity recovers.
    what_still_works:
      - Opening, editing, and saving files (compare-before-write remains the floor)
      - Manual refresh or reload

  - copy_id: filesystem.readiness.explainer.moved_root
    state: stale
    not_ready_reason: input_digest_stale
    title: Workspace root moved
    body: >
      The workspace root identity changed since these claims were produced.
      Cached results are marked stale until the affected producers re-anchor to
      the new root identity.
    what_still_works:
      - Opening, editing, and saving files
      - Quick open by path

  - copy_id: filesystem.readiness.explainer.generated_imported_hybrid
    state: partial
    not_ready_reason: manually_diverged
    title: Generated content diverged
    body: >
      This content is generated or imported but was edited directly. Lineage-
      based claims are downgraded until the artifact is regenerated or reviewed.
    what_still_works:
      - Viewing the current content
      - Regeneration or review flows (where allowed)

  - copy_id: filesystem.readiness.explainer.detached_remote_target
    state: unavailable
    not_ready_reason: offline_unreachable
    title: Remote target disconnected
    body: >
      The producer depends on a remote target that is currently unreachable.
      Local-core editing continues; remote-backed claims remain unavailable until
      the target reconnects.
    what_still_works:
      - Opening, editing, and saving local files
      - Viewing cached results with unavailable labels

  - copy_id: filesystem.readiness.explainer.partial_semantic_hydration
    state: partial
    not_ready_reason: partial_enumeration
    title: Semantic hydration partial
    body: >
      Only part of the workspace has been enumerated for semantic indexing.
      Results outside the enumerated scope fall back to lexical matching until
      hydration completes.
    what_still_works:
      - Lexical search across the full workspace
      - Semantic navigation inside the enumerated scope

  - copy_id: filesystem.readiness.explainer.canonical_target_mismatch
    state: stale
    not_ready_reason: review_required
    title: Path resolves to a different file
    body: >
      The path you opened no longer resolves to the same underlying file.
      Review the canonical target and aliases before saving to avoid writing to
      the wrong file.
    what_still_works:
      - Opening and reading the file
      - Saving via Save As
      - Reviewing alias details

  - copy_id: filesystem.readiness.explainer.alias_evidence_changed
    state: stale
    not_ready_reason: input_digest_stale
    title: Alias evidence changed
    body: >
      Additional paths to the same underlying file were discovered or changed
      since this record was captured. Review alias details before acting on
      path-sensitive operations.
    what_still_works:
      - Opening and reading the file
      - Editing with path-truth disclosure
      - Saving via Save As
