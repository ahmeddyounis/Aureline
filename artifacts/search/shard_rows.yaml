# -----------------------------------------------------------------------------
# Planner-stage vocabulary. Re-exported for tooling and referenced by the
# fusion schema. The ordering field on each lane grouping above names the
# subset each lane MUST honour; omitting cancellation / streaming stages is
# only permitted for shards whose cancellation_participation or
# streaming_posture declares the stage absent (e.g. palette's
# uninterruptible_short_prefix).
# -----------------------------------------------------------------------------

planner_stage_vocabulary:
  - stage_id: candidate_acquisition
    description: >
      Generate candidate rows from each shard that the scope
      filter admits. Every candidate carries the shard row id
      it was drawn from; candidates outside the shard registry
      are non-conforming.
  - stage_id: shard_selection
    description: >
      Narrow candidates to the shards the query family allows.
      Respects admin policy narrowing, trust-state exclusions,
      and client-scope filtering; emits a hidden-scope disclosure
      when rows are withheld.
  - stage_id: cancellation
    description: >
      Cooperative cancellation checkpoint. Every shard whose
      cancellation_participation is cooperative_cancellation MUST
      deliver an ack at this stage; best_effort_cancellation
      shards MAY drop in-flight work without an ack.
  - stage_id: streaming_partial_results
    description: >
      Stream partial results from streams_partial_with_marker
      shards. Every streamed frame carries a partial-truth cause
      and, when hot-set-only, the hot_set_only cause on the fused
      packet.
  - stage_id: duplicate_merge
    description: >
      Collapse duplicates across shards. Emits one fused row per
      canonical entity with a typed duplicate_collapse_rationale;
      every collapsed input retains its shard row id.
  - stage_id: ranking_explanation
    description: >
      Emit the ranking_reason_classes contribution for the row.
      Hybrid rows MUST enumerate at least two contributors; a
      semantic contributor MAY appear only when
      semantic_fallback_state is semantic_available_as_supplement.
  - stage_id: final_presentation
    description: >
      Project the fused row into a search_result_packet_record
      (ADR-0014) for rendering. This stage owns the readiness /
      freshness / truth-class / hidden-scope ceilings computed
      across contributors.

# -----------------------------------------------------------------------------
# Conformance rules. Tooling may iterate this list to refuse a shard row
# whose declared fields disagree with the rules below.
# -----------------------------------------------------------------------------

conformance_rules:
  - rule_id: accelerator_only_must_not_render_as_sole_exact
    description: >
      A shard row whose accelerator_or_source is accelerator_only
      MUST NOT appear as the sole contributor to a fused row
      rendered as result_truth_class = exact. Violations refuse
      with denial_reason = result_truth_class_unresolved
      (ADR-0014).
  - rule_id: imported_pack_must_cite_anchor
    description: >
      A shard row whose remote_or_imported_posture is imported_pack
      MUST cite at least one citation_anchor_ref on every fused
      row drawn from it. Violations refuse with denial_reason =
      result_truth_class_unresolved.
  - rule_id: semantic_only_row_non_conforming
    description: >
      A fused row whose only contributor is a shard in the
      semantic_embedding class is non-conforming. The fused
      packet MUST be refused with denial_reason =
      semantic_fallback_state_unlabelled.
  - rule_id: readiness_ceiling_downgrade
    description: >
      The fused packet's readiness_state MUST be the lowest
      readiness_state_ceiling among the shard rows that
      contributed to it. Reporting a higher readiness than the
      lowest ceiling is refused with denial_reason =
      readiness_state_unresolved.
  - rule_id: hot_set_only_must_disclose_partial
    description: >
      A fused row whose only contributor is a shard whose
      readiness_state_ceiling is ceiling_hot_set_ready MUST
      carry partial_truth_causes including hot_set_only and MUST
      quote copy.partial_index_still_loading or
      copy.heuristic_only from the ADR-0014 copy guidance.
  - rule_id: provider_unauthorised_surfaces_hidden_disclosure
    description: >
      A shard row in the provider_overlay class that the user is
      not authorised for MUST emit a hidden_result_disclosure
      with hidden_scope_reasons containing
      provider_overlay_unauthorised rather than silently dropping
      the row.
  - rule_id: cancellation_ack_required_on_cooperative
    description: >
      Every shard row whose cancellation_participation is
      cooperative_cancellation MUST deliver a cancellation ack
      to the planner before the planner may close the query
      session. Missing acks refuse the session with denial_reason
      = readiness_state_unresolved and require a repair.
  - rule_id: no_raw_bodies_in_rows
    description: >
      No shard row may project raw query bodies, raw document
      bodies, raw symbol definitions, or raw URLs onto the fused
      packet. Violations refuse with denial_reason =
      raw_document_body_forbidden_on_boundary (ADR-0014).
