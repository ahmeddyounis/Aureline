#   - docs/adr/0012-extension-manifest-permission-publisher-policy.md
#   - docs/extensions/publisher_lifecycle_and_registry_parity_contract.md
#
# The goal is to keep publisher continuity inspectable (install/update/
# restore/support export) even when the backing registry is offline or
# registry-specific metadata would otherwise hide signer lineage,
# transfer/successor state, revocation/quarantine posture, mirror
# promotion, or private-registry parity truth.
#
# This file is a seed corpus, not an implementation. It carries refs
# only — raw signing keys, raw signatures, raw policy bundles, raw URLs,
# raw publisher-private data, and raw artifact bytes MUST NOT appear.

