schema_version: 1
metrics_file_id: aureline.protected_metrics
metrics_file_revision: 1
overview_document: docs/benchmarks/corpus_governance.md
change_control_policy: artifacts/bench/corpus_change_control.yaml
fitness_function_catalog_source:
  catalog_id: aureline.protected_fitness_function_catalog
  catalog_revision: 1
corpus_manifest_source:
  manifest_id: aureline.protected_benchmark_corpus
  manifest_revision: 1
default_review_cadence: each_change
default_ci_review_rule: protected_metric_diff_check

required_metadata:
  - fitness_row_id
  - metric_name
  - threshold_mode
  - threshold_value
  - rationale
  - comparability_note
  - calibration_state
  - last_calibrated_on
  - change_authority
  - ci_review_rule
  - public_reporting_posture

calibration_state_vocabulary:
  - calibrated
  - partial_boolean_gate_only
  - partial_contract_gate_only
  - provisional_not_yet_calibrated

public_reporting_posture_vocabulary:
  - internal_gate_only
  - methodology_only_until_reference_capture
  - claim_bearing_with_reference_capture_only
  - not_public_until_wired

threshold_easing_requirements:
  - structured_rationale
  - before_after_evidence_ref
  - comparability_note
  - release_evidence_ref
  - performance_owner_approval
  - architecture_board_approval

rows:
  - fitness_row_id: ff.warm_start_to_first_paint
    metric_name: warm_start_to_first_paint
    threshold_mode: to_be_set_by_benchmark_council
    threshold_value:
      p50_ms: to_be_set_by_benchmark_council
      p95_ms: to_be_set_by_benchmark_council
      release_bar_ms: to_be_set_by_benchmark_council
    rationale: Startup claims stay bound to the protected warm-start workflow corpus, not to isolated renderer wins.
    comparability_note: Compare only against the same corpus-manifest revision, protected-metrics revision, hardware definition, and warm-start capture posture.
    calibration_state: provisional_not_yet_calibrated
    last_calibrated_on: null
    change_authority:
      - performance_owner
      - aureline-render
      - architecture_board_for_threshold_easing
    ci_review_rule: protected_metric_diff_check
    corpus_refs:
      - corpus.workflow.startup_warm_to_first_paint
      - corpus.reference.micro_local_folder
    release_evidence_required: true
    public_reporting_posture: methodology_only_until_reference_capture

  - fitness_row_id: ff.first_paint
    metric_name: first_paint
    threshold_mode: absolute_p50_and_p95
    threshold_value:
      p50_ms: to_be_set_by_benchmark_council
      p95_ms: to_be_set_by_benchmark_council
      release_bar_ms: to_be_set_by_benchmark_council
    rationale: First-paint posture is part of the startup claim and cannot be narrowed silently when hidden-pane or accessibility work regresses.
    comparability_note: Comparable only when the same surfaces, corpus-manifest revision, hardware definition, and protected-metrics revision are held constant.
    calibration_state: provisional_not_yet_calibrated
    last_calibrated_on: null
    change_authority:
      - performance_owner
      - aureline-render
      - architecture_board_for_threshold_easing
    ci_review_rule: protected_metric_diff_check
    corpus_refs:
      - corpus.workflow.startup_warm_to_first_paint
      - corpus.workflow.first_useful_edit_rust_self_host
      - corpus.reference.micro_local_folder
    release_evidence_required: true
    public_reporting_posture: methodology_only_until_reference_capture

  - fitness_row_id: ff.input_to_paint
    metric_name: input_to_paint
    threshold_mode: absolute_p50_and_p95
    threshold_value:
      p50_ms: to_be_set_by_benchmark_council
      p95_ms: to_be_set_by_benchmark_council
      release_bar_ms: to_be_set_by_benchmark_council
    rationale: Input responsiveness is a protected interactive workflow claim and must not be traded away by microbenchmark-only wins.
    comparability_note: Comparable only with the same input corpus, protected hook bucket, hardware definition, corpus-manifest revision, and protected-metrics revision.
    calibration_state: provisional_not_yet_calibrated
    last_calibrated_on: null
    change_authority:
      - performance_owner
      - aureline-render
      - architecture_board_for_threshold_easing
    ci_review_rule: protected_metric_diff_check
    corpus_refs:
      - corpus.micro.interaction_safety_cases
      - corpus.workflow.startup_warm_to_first_paint
    release_evidence_required: true
    public_reporting_posture: methodology_only_until_reference_capture

  - fitness_row_id: ff.buffer_operations
    metric_name: buffer_operations
    threshold_mode: absolute_p50_and_p95
    threshold_value:
      p50_ms: to_be_set_by_benchmark_council
      p95_ms: to_be_set_by_benchmark_council
      release_bar_ms: to_be_set_by_benchmark_council
      undo_class_correctness_gate: boolean_must_pass
    rationale: Buffer correctness is protected even before the latency bar is fully calibrated; undo-class failures are release-blocking.
    comparability_note: Latency comparisons require the same corpus set and hardware definition; undo-class correctness comparisons additionally require the same ADR-0003 taxonomy revision.
    calibration_state: partial_boolean_gate_only
    last_calibrated_on: "2026-04-21"
    change_authority:
      - performance_owner
      - aureline-buffer
      - architecture_board_for_threshold_easing
    ci_review_rule: protected_metric_diff_check
    corpus_refs:
      - corpus.micro.interaction_safety_cases
      - corpus.workflow.first_useful_edit_rust_self_host
      - corpus.large_file.decode_recovery
    release_evidence_required: true
    public_reporting_posture: claim_bearing_with_reference_capture_only

  - fitness_row_id: ff.vfs_save_conflict_handling
    metric_name: vfs_save_conflict_handling
    threshold_mode: boolean_gate
    threshold_value:
      compare_before_write_floor: must_hold
      save_mode_downgrade_without_envelope_permission: must_not_occur
      conflict_outcome_taxonomy_completeness: must_match_ADR_0006_closed_set
      save_pipeline_p50_ms: to_be_set_by_benchmark_council
      save_pipeline_p95_ms: to_be_set_by_benchmark_council
    rationale: Save-pipeline correctness is a protected contract claim; it cannot be relaxed to hide filesystem regressions.
    comparability_note: Contract-gate comparisons require the same ADR-0006 taxonomy, corpus-manifest revision, protected-metrics revision, and hardware/image posture.
    calibration_state: partial_contract_gate_only
    last_calibrated_on: "2026-04-21"
    change_authority:
      - performance_owner
      - aureline-vfs
      - architecture_board_for_threshold_easing
    ci_review_rule: protected_metric_diff_check
    corpus_refs:
      - corpus.boundary.filesystem_identity_cases
      - corpus.boundary.mutation_lineage_cases
      - corpus.workflow.first_useful_edit_rust_self_host
    release_evidence_required: true
    public_reporting_posture: claim_bearing_with_reference_capture_only

  - fitness_row_id: ff.benchmark_lab_health
    metric_name: benchmark_lab_health
    threshold_mode: boolean_gate
    threshold_value:
      corpus_id_resolution: must_be_total
      trace_schema_conformance: must_be_total
      hardware_baseline_is_approved: must_hold
      ad_hoc_metric_names: must_not_occur
      reproducible_build_identity_recorded: must_hold
    rationale: The benchmark harness must prove its own integrity before any downstream benchmark claim is admissible.
    comparability_note: This row is a precondition for comparison, not a public performance claim; compare only within the same governance asset revisions.
    calibration_state: calibrated
    last_calibrated_on: "2026-04-21"
    change_authority:
      - performance_owner
      - benchmark_lab
      - architecture_board_for_threshold_easing
    ci_review_rule: protected_metric_diff_check
    corpus_refs:
      - corpus.workflow.startup_warm_to_first_paint
      - corpus.workflow.first_useful_edit_rust_self_host
      - corpus.workflow.plain_open_unknown_archetype
    release_evidence_required: true
    public_reporting_posture: internal_gate_only

  - fitness_row_id: ff.power_thermal_posture
    metric_name: power_thermal_posture
    threshold_mode: to_be_set_by_benchmark_council
    threshold_value:
      hot_path_budget_preserved_under_thermal_constrained: to_be_set_by_benchmark_council
      hot_path_budget_preserved_under_protect_core: to_be_set_by_benchmark_council
      background_workload_shed_order_matches_TAD_8_7: to_be_set_by_benchmark_council
    rationale: Power and thermal posture is reserved now so later calibration does not mint a new metric identity.
    comparability_note: Not comparable until the harness, hardware baseline, and calibration note are all ratified.
    calibration_state: provisional_not_yet_calibrated
    last_calibrated_on: null
    change_authority:
      - performance_owner
      - aureline-render
      - architecture_board_for_threshold_easing
    ci_review_rule: protected_metric_diff_check
    corpus_refs:
      - corpus.workflow.startup_warm_to_first_paint
      - corpus.workflow.first_useful_edit_rust_self_host
    release_evidence_required: true
    public_reporting_posture: not_public_until_wired

  - fitness_row_id: ff.restore_fidelity
    metric_name: restore_fidelity_match_rate
    threshold_mode: ratio_gate
    threshold_value:
      min_match_rate: to_be_set_by_benchmark_council
      floor_label: compatible
      exact_restore_no_replay_rate: to_be_set_by_benchmark_council
    rationale: Restore fidelity must stay tied to the advertised restore classes rather than being reinterpreted per release.
    comparability_note: Not comparable until the entry-restore harness is wired and the protected corpus is measured under a ratified baseline.
    calibration_state: provisional_not_yet_calibrated
    last_calibrated_on: null
    change_authority:
      - performance_owner
      - aureline-vfs
      - architecture_board_for_threshold_easing
    ci_review_rule: protected_metric_diff_check
    corpus_refs:
      - corpus.recovery.restore_last_session_compatible
      - corpus.recovery.recent_work_missing_target
      - corpus.recovery.resume_managed_workspace_reauth
    release_evidence_required: true
    public_reporting_posture: not_public_until_wired

  - fitness_row_id: ff.command_parity
    metric_name: command_graph_parity
    threshold_mode: boolean_gate
    threshold_value:
      stable_command_id_resolution_across_surfaces: must_be_total
      typed_argument_contract_divergence: must_not_occur
      accessibility_label_path_divergence: must_not_occur
      disabled_reason_outside_closed_set: must_not_occur
    rationale: The one-command-graph contract is protected and cannot become a per-surface best-effort claim.
    comparability_note: Not comparable until the command-descriptor harness is wired and the surface matrix is frozen for the claimed release.
    calibration_state: provisional_not_yet_calibrated
    last_calibrated_on: null
    change_authority:
      - performance_owner
      - shell_command_system
      - architecture_board_for_threshold_easing
    ci_review_rule: protected_metric_diff_check
    corpus_refs: []
    release_evidence_required: true
    public_reporting_posture: not_public_until_wired
