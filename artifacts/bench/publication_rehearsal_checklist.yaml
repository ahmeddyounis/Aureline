# Benchmark, compatibility, migration, and public-proof publication rehearsal.
#
# This checklist is run before any public-proof or benchmark publication
# packet is widened beyond methodology-only language. It shares bundle
# refs and approval-step names with
# artifacts/program/design_partner_intake_checklist.yaml.

schema_version: 1
checklist_id: aureline.bench.publication_rehearsal
status: seeded
overview_doc: docs/program/design_partner_and_public_proof_packet.md

authoritative_sources:
  design_partner_intake_checklist: artifacts/program/design_partner_intake_checklist.yaml
  public_proof_register: artifacts/qe/workflow_bundle_ids.yaml
  public_proof_packet_schema: schemas/qe/public_proof_packet.schema.json
  benchmark_publication_pack_template: docs/benchmarks/benchmark_publication_pack_template.md
  public_comparison_rules: docs/benchmarks/public_comparison_rules.md
  benchmark_corpus_manifest: fixtures/benchmarks/corpus_manifest.yaml
  protected_metrics: artifacts/bench/protected_metrics.yaml
  fitness_function_catalog: artifacts/bench/fitness_function_catalog.yaml
  reference_hardware_manifest: artifacts/perf/reference_hardware_manifest.yaml
  lab_image_manifest: artifacts/perf/lab_image_manifest.yaml
  protected_path_ledger: artifacts/perf/protected_path_ledger.yaml
  latency_budget_ledger: artifacts/perf/latency_budget_ledger.yaml
  evidence_linkage_seed: artifacts/perf/evidence_linkage_seed.yaml
  exact_build_identity_model: docs/build/exact_build_identity_model.md
  compatibility_report_template: docs/release/compatibility_report_template.md
  certified_archetype_report_template: docs/release/certified_archetype_report_template.md
  known_limits_contract: docs/product/known_limits_contract.md
  claim_manifest_seed: artifacts/governance/claim_manifest_seed.yaml
  evidence_freshness_slos: artifacts/governance/evidence_freshness_slos.yaml
  evidence_rerun_triggers: artifacts/governance/evidence_rerun_triggers.yaml

publication_lane_vocabulary:
  - benchmark
  - compatibility
  - migration
  - public_proof
  - docs_known_limits_support

approval_step_vocabulary:
  - bundle_identity_bound
  - source_lineage_recorded
  - license_review_complete
  - privacy_clearance_complete
  - retention_and_access_review_complete
  - owner_and_backup_coverage_recorded
  - corpus_or_reference_workspace_row_prepared
  - benchmark_rehearsal_linked
  - publication_owner_signoff

result_vocabulary:
  - ready
  - methodology_only
  - narrow_claim_before_publish
  - retest_pending
  - quarantined
  - blocked

dry_run_owner_lanes:
  benchmark:
    primary_owner_lane: lane:benchmark_lab
    publication_owner_lane: lane:release_evidence
    docs_owner_lane: lane:docs_public_truth
  compatibility:
    primary_owner_lane: lane:release_evidence
    evidence_owner_lane: lane:benchmark_lab
    docs_owner_lane: lane:docs_public_truth
  migration:
    primary_owner_lane: lane:docs_public_truth
    evidence_owner_lane: lane:release_evidence
    benchmark_owner_lane: lane:benchmark_lab
  public_proof:
    primary_owner_lane: lane:release_evidence
    evidence_owner_lane: lane:benchmark_lab
    docs_owner_lane: lane:docs_public_truth
  docs_known_limits_support:
    primary_owner_lane: lane:docs_public_truth
    evidence_owner_lane: lane:release_evidence
    support_owner_lane: lane:support_export

bundle_bindings:
  - workflow_bundle_ref:
      bundle_id: launch_bundle:typescript_web_app.seed
      bundle_revision: 1
    archetype_row_ref:
      archetype_row_id: archetype_row:ts_web_app_or_service
      archetype_revision: 1
    required_scoreboard_families:
      - benchmark_and_public_proof_packet_scoreboard
      - workflow_bundle_or_archetype_proof_scoreboard
      - docs_known_limits_support_copy_alignment_scoreboard
  - workflow_bundle_ref:
      bundle_id: launch_bundle:python_service_or_data_app.seed
      bundle_revision: 1
    archetype_row_ref:
      archetype_row_id: archetype_row:python_service_or_data_app
      archetype_revision: 1
    required_scoreboard_families:
      - benchmark_and_public_proof_packet_scoreboard
      - workflow_bundle_or_archetype_proof_scoreboard
      - docs_known_limits_support_copy_alignment_scoreboard
  - workflow_bundle_ref:
      bundle_id: launch_bundle:rust_workspace.seed
      bundle_revision: 1
    archetype_row_ref:
      archetype_row_id: archetype_row:rust_workspace
      archetype_revision: 1
    required_scoreboard_families:
      - benchmark_and_public_proof_packet_scoreboard
      - workflow_bundle_or_archetype_proof_scoreboard
      - docs_known_limits_support_copy_alignment_scoreboard

check_groups:
  - group_id: reproducibility_inputs
    title: Reproducibility inputs
    blocking: true
    applies_to_lanes:
      - benchmark
      - public_proof
    required_artifacts:
      - exact_command_line
      - config_refs_or_digests
      - environment_variable_overrides_or_none
      - corpus_manifest_revision
      - protected_metrics_revision
      - fitness_function_catalog_revision
      - hardware_definition_ref
      - benchmark_environment_ref
      - lab_image_revision
      - task_script_or_success_criterion
      - raw_run_metadata_stable_ref
    failure_result: methodology_only

  - group_id: exact_build_and_artifact_graph
    title: Exact-build and artifact graph linkage
    blocking: true
    applies_to_lanes:
      - benchmark
      - compatibility
      - migration
      - public_proof
      - docs_known_limits_support
    required_artifacts:
      - exact_build_identity_ref
      - release_channel_class
      - workspace_version
      - artifact_graph_node_ref
      - docs_pack_revision_or_not_applicable
      - release_evidence_packet_ref_or_not_applicable
    failure_result: blocked

  - group_id: packet_identity_and_prior_claim_diff
    title: Public-proof packet identity and prior-claim diff
    blocking: true
    applies_to_lanes:
      - benchmark
      - compatibility
      - migration
      - public_proof
      - docs_known_limits_support
    required_artifacts:
      - scoreboard_family_id
      - packet_shape
      - workflow_bundle_ref
      - archetype_row_ref
      - prior_claim_state_class
      - prior_claim_state_ref_or_first_emission
      - result_class
      - active_downgrade_reasons
      - freshness_envelope
      - rerun_trigger_refs
    failure_result: retest_pending

  - group_id: privacy_license_and_lineage
    title: Privacy, license, and corpus lineage
    blocking: true
    applies_to_lanes:
      - benchmark
      - compatibility
      - migration
      - public_proof
    required_artifacts:
      - design_partner_intake_ref_or_not_applicable
      - privacy_clearance_decision
      - license_review_ref
      - retention_review_ref
      - corpus_lineage_ref
      - raw_private_bytes_omission_note
    pass_decisions:
      - admit_public
      - redact_then_admit
    narrow_decisions:
      - admit_internal_only
    blocking_decisions:
      - exclude_until_replaced
      - withdraw_existing_use
    failure_result: narrow_claim_before_publish

  - group_id: docs_known_limits_and_support_copy
    title: Docs, known-limits, and support-copy alignment
    blocking: true
    applies_to_lanes:
      - benchmark
      - compatibility
      - migration
      - public_proof
      - docs_known_limits_support
    required_artifacts:
      - docs_help_version_match_state
      - docs_pack_revision_ref_or_not_applicable
      - known_limits_and_exclusions_block
      - release_notes_pack_ref_or_not_applicable
      - support_export_redaction_result
      - claim_manifest_row_refs
      - public_truth_parity_check_ref
    failure_result: narrow_claim_before_publish

  - group_id: lane_specific_publication_inputs
    title: Lane-specific publication inputs
    blocking: true
    lane_requirements:
      benchmark:
        - benchmark_publication_pack_ref
        - public_comparison_posture
        - competitor_settings_or_not_applicable
        - comparability_or_quarantine_note
      compatibility:
        - compatibility_report_ref
        - qualification_row_refs
        - version_skew_register_refs
        - certified_archetype_report_ref_or_not_applicable
      migration:
        - migration_packet_ref
        - migration_note_ref
        - importer_outcome_refs
        - rollback_or_recovery_evidence_refs
      public_proof:
        - public_proof_packet_ref
        - scoreboard_row_ref
        - release_evidence_packet_ref
        - publication_destination_refs
      docs_known_limits_support:
        - docs_reference_page_refs
        - known_limit_note_refs
        - support_export_bundle_ref
        - help_about_or_service_health_ref
    failure_result: retest_pending

  - group_id: dry_run_signoff
    title: Dry-run publication owners and signoff
    blocking: true
    applies_to_lanes:
      - benchmark
      - compatibility
      - migration
      - public_proof
      - docs_known_limits_support
    required_artifacts:
      - dry_run_owner_ref
      - dry_run_backup_owner_ref_or_waiver
      - dry_run_completed_at
      - dry_run_decision
      - publication_owner_signoff_ref
      - rollback_or_withdrawal_trigger
    allowed_decisions:
      - publish_packet
      - keep_methodology_only
      - narrow_claim_before_publish
      - quarantine_packet
      - withdraw_packet
    failure_result: blocked

publication_readiness_rules:
  - rule_id: public_head_to_head_requires_competitor_settings
    applies_to_lanes:
      - benchmark
    summary: >
      A public head-to-head comparison is blocked unless competitor
      product, version, plugin set, launch posture, and task-parity note
      are disclosed.
  - rule_id: exact_build_required_before_claim_bearing_publication
    applies_to_lanes:
      - benchmark
      - compatibility
      - migration
      - public_proof
    summary: >
      Claim-bearing packets require exact_build_identity_ref and docs/help
      version-match state; otherwise the packet remains methodology-only
      or retest-pending.
  - rule_id: known_limits_follow_narrowed_evidence
    applies_to_lanes:
      - benchmark
      - compatibility
      - migration
      - public_proof
      - docs_known_limits_support
    summary: >
      Any privacy, corpus, compatibility, migration, or support-export
      narrowing must land a known-limit or exclusion note before wider
      public wording is admitted.
  - rule_id: rehearsal_result_must_match_public_proof_packet_result
    applies_to_lanes:
      - public_proof
    summary: >
      The dry-run result cannot be broader than the packet result_class
      and active_downgrade_reasons carried by the public-proof packet.
