    protected_slo_family: benchmark_lab_operational_health
    metric:
      name: benchmark_lab_health
      protected_path_bucket: observability
      description: >
        Self-health of the benchmark harness itself: every fixture cited by
        a benchmark report resolves to an id in the corpus manifest; every
        emitted trace conforms to the protected-path schema; the hardware
        baseline recorded in the report is one the benchmark council has
        approved; reports are reproducible on the pinned toolchain; no
        ad-hoc metric name escapes the spike-metric-names.md vocabulary
        without an accompanying decision row.
    threshold_mode: boolean_gate
    threshold:
      corpus_id_resolution: must_be_total
      trace_schema_conformance: must_be_total
      hardware_baseline_is_approved: must_hold
      ad_hoc_metric_names: must_not_occur
      reproducible_build_identity_recorded: must_hold
    data_source:
      kind: governance_packet_self_audit
      schema: schemas/governance/governance_packet.schema.json
      packet_family: benchmark_report
      corpus_refs:
        - corpus.workflow.startup_warm_to_first_paint
        - corpus.workflow.first_useful_edit_rust_self_host
        - corpus.workflow.plain_open_unknown_archetype
      supporting_artifacts:
        - artifacts/governance/governance_packet_template.yaml
        - artifacts/governance/control_artifact_index.yaml
        - fixtures/benchmarks/corpus_manifest.yaml
        - docs/benchmarks/fixture_classes.md
        - docs/benchmarks/spike_metric_names.md
      evidence_consumer_channels:
        - release_evidence.claim_manifest
        - support_bundle.performance_summary
    cadence:
      review_cadence: each_change
      measurement_cadence: each_release
      re_baseline_trigger: benchmark_council_charter_supersession
    waiver_authority: performance_council
    co_waiver_authority: benchmark_lab
    waiver_rules:
      default_expiry_window_days: 30
      renewal_requires_correction_program: true
      escalation_path:
        - performance_council
        - architecture_council
        - shiproom_executive_scope_review
    linked_adrs: []
    linked_decisions: []
    notes: >
      This row exists because a fitness catalog that cannot audit itself is
      not an evidence source. A failure on this row does not just fail the
      benchmark report — it fails the release-evidence claim manifest that
      cites the benchmark report, because the claim manifest's evidence
      owner cannot sign a report the harness cannot vouch for.

  # ---------------------------------------------------------------------------
  # Provisional rows. Each one carries an explicit owner for completion,
  # an explicit row_status: provisional, and a data_source.kind of
  # to_be_wired_by_benchmark_council so no downstream lane mistakes them
  # for seeded.
  # ---------------------------------------------------------------------------
  - id: ff.power_thermal_posture
    title: Power and thermal posture (provisional)
    row_status: provisional
    owner: "@ahmeddyounis"
    owning_lane: benchmark_lab
    co_owning_lane: aureline-render
    completion_owner: "@ahmeddyounis"
    backup_waiver: single-maintainer-backup
    architecture_drivers:
      - latency
      - portability
      - supportability
      - scalability
    architecture_principles:
      - local_first_shell_remote_capable_services
      - heavy_work_out_of_process
      - optional_services_additive
    protected_journeys:
      - observability
      - frame_budget
    protected_slo_family: power_and_thermal_posture
    metric:
      name: power_thermal_posture
      protected_path_bucket: frame_budget
      description: >
        Governed posture from TAD §8.7 "Power, thermal, and battery-
        efficiency architecture": under ThermalConstrained and ProtectCore
        states the shell must shed the declared workloads (indexing and
        embedding parallelism, optional prefetch, non-essential visual
        effects, extension and AI background budgets, marketplace refresh,
        prebuild warming, non-critical uploads) before touching the
        protected hot path. The fitness function is "typing / save /
        navigation hot path remains inside its absolute budget while
        ThermalConstrained and ProtectCore are asserted on the reference
        hardware matrix".
    threshold_mode: to_be_set_by_benchmark_council
    threshold:
      hot_path_budget_preserved_under_thermal_constrained: to_be_set_by_benchmark_council
      hot_path_budget_preserved_under_protect_core: to_be_set_by_benchmark_council
      background_workload_shed_order_matches_TAD_8_7: to_be_set_by_benchmark_council
    data_source:
      kind: to_be_wired_by_benchmark_council
      intended_kind: corpus_fixture_measurement
      intended_harness: crates/aureline-bench
      intended_corpus_refs:
        - corpus.workflow.startup_warm_to_first_paint
        - corpus.workflow.first_useful_edit_rust_self_host
      intended_supporting_artifacts:
        - .t2/docs/Aureline_Technical_Architecture_Document.md  # §8.7 and Appendix BB
        - docs/perf/efficiency_state_policy.md
        - artifacts/perf/worker_budget_rules.yaml
        - fixtures/perf/hidden_pane_cases/
      intended_evidence_consumer_channels:
        - benchmark_lab.bootstrap_entry_parity
        - support_bundle.performance_summary
    cadence:
      review_cadence: per_milestone
      measurement_cadence: deferred_until_wired
      re_baseline_trigger: efficiency_state_policy_or_harness_revision
    waiver_authority: performance_council
    co_waiver_authority: aureline-render
    waiver_rules:
      default_expiry_window_days: 180
      renewal_requires_correction_program: false
      escalation_path:
        - performance_council
        - architecture_council
    linked_adrs: []
    linked_decisions: []
    notes: >
      Provisional. The efficiency-state policy, worker-budget rules, and
      hidden-pane scenarios are frozen, but the benchmark harness, hardware
      baseline, and release thresholds are not. The row reserves the id so
      later lanes wire against one identity; it does not gate releases
      until row_status moves to seeded and the completion_owner lands a
      data source.

  - id: ff.restore_fidelity
    title: Restore fidelity (provisional)
    row_status: provisional
    owner: "@ahmeddyounis"
    owning_lane: benchmark_lab
    co_owning_lane: aureline-vfs
    completion_owner: "@ahmeddyounis"
    backup_waiver: single-maintainer-backup
    architecture_drivers:
      - recoverability
      - correctness
      - portability
    architecture_principles:
      - every_write_is_reversible
      - caches_disposable_user_state_durable
      - local_first_shell_remote_capable_services
    protected_journeys:
      - recovery_journal_write
      - recovery_journal_restore
      - boundary_truth_contract
    protected_slo_family: recoverability_and_restore
    metric:
      name: restore_fidelity_match_rate
      protected_path_bucket: recovery_journal_restore
      description: >
        Delivered-versus-advertised restore fidelity across the four
        restore-fidelity labels frozen by the portable-profile and entry-
        restore object models (exact, compatible, layout_only,
        manual_review). Metric is the ratio of restores that deliver at
        least the advertised label, across the frozen corpus of recovery /
        restore scenarios. Matches the derived metric named by the
        onboarding measurement plan ("restore_fidelity_match_rate").
    threshold_mode: ratio_gate
    threshold:
      min_match_rate: to_be_set_by_benchmark_council
      floor_label: compatible
      exact_restore_no_replay_rate: to_be_set_by_benchmark_council
    data_source:
      kind: to_be_wired_by_benchmark_council
      intended_kind: entry_restore_record
      intended_schema: schemas/workspace/entry_and_restore_result.schema.json
      intended_supporting_artifacts:
        - docs/workspace/entry_restore_object_model.md
        - docs/state/profile_and_state_map.md
        - schemas/profile/portable_profile.schema.json
        - fixtures/profile/restore_provenance_examples/
      intended_corpus_refs:
        - corpus.recovery.restore_last_session_compatible
        - corpus.recovery.recent_work_missing_target
        - corpus.recovery.resume_managed_workspace_reauth
      intended_evidence_consumer_channels:
        - benchmark_lab.recovery_ladder
        - support_bundle.crash_recovery_summary
        - support_bundle.recent_work_summary
    cadence:
      review_cadence: per_milestone
      measurement_cadence: deferred_until_wired
      re_baseline_trigger: entry_restore_or_portable_profile_contract_supersession
    waiver_authority: performance_council
    co_waiver_authority: aureline-vfs
    waiver_rules:
      default_expiry_window_days: 180
      renewal_requires_correction_program: false
      escalation_path:
        - performance_council
        - architecture_council
        - release_council
    linked_adrs: []
    linked_decisions: []
    notes: >
      Provisional. The contracts are frozen (entry_restore and
      portable_profile), but the harness that measures delivered-versus-
      advertised fidelity across the corpus is not yet wired. The row
      names the onboarding-measurement-plan metric identifier
      ("restore_fidelity_match_rate") so downstream lanes do not invent a
      parallel name while the row is provisional.

  - id: ff.command_parity
    title: Command-graph parity (provisional)
    row_status: provisional
    owner: "@ahmeddyounis"
    owning_lane: benchmark_lab
    co_owning_lane: shell_command_system
    completion_owner: "@ahmeddyounis"
    backup_waiver: single-maintainer-backup
    architecture_drivers:
      - correctness
      - extensibility
      - accessibility
      - supportability
    architecture_principles:
      - one_command_graph
      - one_execution_context_model
      - accessibility_and_trust_are_system_qualities
    protected_journeys:
      - observability
      - boundary_truth_contract
    protected_slo_family: command_graph_parity
    metric:
      name: command_graph_parity
      protected_path_bucket: observability
      description: >
        Parity gate defending the "one command graph" principle. Every
        first-party command descriptor resolvable from one surface
        (palette, application menu, context menu, keybinding layer, CLI,
        AI-tool surface, automation recipe) MUST be resolvable from every
        other surface with the same stable command id, same typed argument
        contract, same accessibility label path, and same lifecycle
        metadata — or carry a typed disabled_reason from the closed set.
        Measured across the command-descriptor fixtures and the
        invocation-session packet fixtures.
    threshold_mode: boolean_gate
    threshold:
      stable_command_id_resolution_across_surfaces: must_be_total
      typed_argument_contract_divergence: must_not_occur
      accessibility_label_path_divergence: must_not_occur
      disabled_reason_outside_closed_set: must_not_occur
    data_source:
      kind: to_be_wired_by_benchmark_council
      intended_kind: corpus_fixture_measurement
      intended_schema: schemas/commands/command_descriptor.schema.json
      intended_supporting_artifacts:
        - docs/commands/command_descriptor_contract.md
        - fixtures/commands/command_descriptor_examples/
      intended_corpus_refs: []
      intended_evidence_consumer_channels:
        - release_evidence.claim_manifest
        - support_bundle.performance_summary
    cadence:
      review_cadence: per_milestone
      measurement_cadence: deferred_until_wired
      re_baseline_trigger: command_graph_ADR_landing
    waiver_authority: performance_council
    co_waiver_authority: shell_command_system
    waiver_rules:
      default_expiry_window_days: 180
      renewal_requires_correction_program: false
      escalation_path:
        - performance_council
        - architecture_council
    linked_adrs: []
    linked_decisions:
      - D-0007
    notes: >
      Provisional. The command-descriptor contract is frozen; the parity
      harness that enforces it across every surface is not yet wired.
      Completion requires a command-graph ADR landing so the fitness
      function has a stable hook vocabulary to measure against.

