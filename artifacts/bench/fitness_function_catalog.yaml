  # ---------------------------------------------------------------------------
  # save_and_filesystem_correctness (covers buffer operations and VFS save /
  # conflict handling as two rows that share the family)
  # ---------------------------------------------------------------------------
  - id: ff.buffer_operations
    title: Buffer operations latency and undo-class correctness
    row_status: seeded
    owner: "@ahmeddyounis"
    owning_lane: benchmark_lab
    co_owning_lane: aureline-buffer
    backup_waiver: single-maintainer-backup
    architecture_drivers:
      - latency
      - correctness
      - recoverability
    architecture_principles:
      - every_write_is_reversible
      - caches_disposable_user_state_durable
      - one_semantic_workspace_graph
    protected_journeys:
      - input_to_paint
      - placeholder_edit
      - placeholder_save
    protected_slo_family: save_and_filesystem_correctness
    metric:
      name: buffer_operations
      protected_path_bucket: input_to_paint
      hook_list_source: docs/adr/0003-buffer-undo-large-file.md
      description: >
        Latency and undo-class correctness for buffer operations: text
        insert / delete, selection change, transaction-grouped undo / redo,
        structural edit, refactor, formatter run, save-participant group,
        imported change, machine-generated change, external reload, and
        decode recovery. Correctness means each operation lands under its
        ADR-0003 undo-class with the declared compensatable /
        only-revertible posture.
    threshold_mode: absolute_p50_and_p95
    threshold:
      p50_ms: to_be_set_by_benchmark_council
      p95_ms: to_be_set_by_benchmark_council
      release_bar_ms: to_be_set_by_benchmark_council
      undo_class_correctness_gate: boolean_must_pass
      slo_family_bar_source:
        doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        section: §3.4 Quality-attribute scenarios and measurable SLOs
        journey: "Keystroke to screen in active editor"
    data_source:
      kind: corpus_fixture_measurement
      harness: crates/aureline-bench
      corpus_refs:
        - corpus.micro.interaction_safety_cases
        - corpus.workflow.first_useful_edit_rust_self_host
        - corpus.large_file.decode_recovery
      supporting_artifacts:
        - artifacts/architecture/undo_class_rows.yaml
        - fixtures/text/buffer_decision_cases/
      evidence_consumer_channels:
        - benchmark_lab.text_stack
        - benchmark_lab.large_file
        - support_bundle.performance_summary
    cadence:
      review_cadence: per_milestone
      measurement_cadence: each_release
      re_baseline_trigger: buffer_ADR_supersession_or_undo_class_taxonomy_change
    waiver_authority: performance_council
    co_waiver_authority: aureline-buffer
    waiver_rules:
      default_expiry_window_days: 60
      renewal_requires_correction_program: true
      escalation_path:
        - performance_council
        - architecture_council
        - shiproom_executive_scope_review
    linked_adrs:
      - docs/adr/0003-buffer-undo-large-file.md
    linked_decisions:
      - D-0002
    notes: >
      The correctness half of this row is a boolean contract gate, not a
      latency number: undo-class misassignment is release-blocking regardless
      of how fast the operation was. The latency half uses the same
      to_be_set_by_benchmark_council placeholder as the renderer rows; the
      numeric bar is governed by artifacts/bench/protected_metrics.yaml.

  - id: ff.vfs_save_conflict_handling
    title: VFS save pipeline and conflict handling
    row_status: seeded
    owner: "@ahmeddyounis"
    owning_lane: benchmark_lab
    co_owning_lane: aureline-vfs
    backup_waiver: single-maintainer-backup
    architecture_drivers:
      - correctness
      - recoverability
      - portability
      - latency
    architecture_principles:
      - every_write_is_reversible
      - caches_disposable_user_state_durable
      - local_first_shell_remote_capable_services
    protected_journeys:
      - save_pipeline
      - vfs_root_enumeration
      - placeholder_save
      - boundary_truth_contract
    protected_slo_family: save_and_filesystem_correctness
    metric:
      name: vfs_save_conflict_handling
      protected_path_bucket: save_pipeline
      hook_list_source: docs/adr/0006-vfs-save-cache-identity.md
      description: >
        Correctness of the ADR-0006 save pipeline under every declared
        failure reason: external_change_detected, watcher_uncertainty,
        save_conflict, wrong_target_prevention, save_participant_failed,
        degraded_guarantee_declared, generated_or_managed_write_blocked,
        read_only_or_policy_blocked, review_required_before_save,
        review_required_before_rename. Compare-before-write on the strongest
        identity token is the correctness floor; atomic-replace is the
        preferred commit mode with named degraded classes for in-place and
        conditional-remote writes.
    threshold_mode: boolean_gate
    threshold:
      compare_before_write_floor: must_hold
      save_mode_downgrade_without_envelope_permission: must_not_occur
      conflict_outcome_taxonomy_completeness: must_match_ADR_0006_closed_set
      save_pipeline_p50_ms: to_be_set_by_benchmark_council
      save_pipeline_p95_ms: to_be_set_by_benchmark_council
    data_source:
      kind: corpus_fixture_measurement
      harness: crates/aureline-bench
      schema: schemas/runtime/vfs_save_envelope.schema.json
      corpus_refs:
        - corpus.boundary.filesystem_identity_cases
        - corpus.boundary.mutation_lineage_cases
        - corpus.workflow.first_useful_edit_rust_self_host
      supporting_artifacts:
        - artifacts/architecture/vfs_tradeoff_rows.yaml
        - artifacts/io/root_capability_matrix.yaml
        - fixtures/runtime/vfs_decision_examples/
      evidence_consumer_channels:
        - benchmark_lab.vfs_save_pipeline
        - boundary_truth.save_target_token
        - boundary_truth.mutation_journal
        - support_bundle.performance_summary
    cadence:
      review_cadence: per_milestone
      measurement_cadence: each_release
      re_baseline_trigger: vfs_ADR_supersession_or_failure_reason_vocabulary_change
    waiver_authority: performance_council
    co_waiver_authority: aureline-vfs
    waiver_rules:
      default_expiry_window_days: 45
      renewal_requires_correction_program: true
      escalation_path:
        - performance_council
        - architecture_council
        - release_council
        - shiproom_executive_scope_review
    linked_adrs:
      - docs/adr/0006-vfs-save-cache-identity.md
    linked_decisions:
      - D-0003
    notes: >
      This row gates the save contract, not just save latency. A waiver
      that relaxes compare-before-write or silently demotes an atomic save
      into in-place or conditional-remote requires release-council co-sign
      in addition to the performance council; that is why the escalation
      path names the release council explicitly.

