# Protected fitness-function catalog.
#
# Single machine-readable register of every protected fitness function the
# benchmark lab, the journey harness, the release-evidence shiproom packets,
# and the performance-council waiver log resolve against by stable id.
#
# Consumers MUST resolve fitness functions by stable id from this file, not
# by guessing metric names. A row that no downstream lane reads is
# non-conforming; a row whose metric is cited by release evidence but does
# not exist here is a validation failure.
#
# The human-readable companion is docs/benchmarks/fitness_function_catalog.md;
# that document is normative for the architecture-driver, architecture-
# principle, protected-journey, protected-SLO-family, threshold-mode, data-
# source-kind, waiver-authority, and review-cadence vocabularies. If the two
# disagree, the document wins and this file is updated in the same change.
#
# Ownership rules.
#   - Every row MUST name an `owner` (primary DRI) and an `owning_lane` drawn
#     from artifacts/governance/ownership_matrix.yaml#scorecard_lane_index.
#   - Every row MUST name at least one `architecture_driver`, at least one
#     `architecture_principle`, and at least one `protected_journey` so the
#     catalog can be sliced by driver, principle, and journey without
#     creating a parallel scoreboard.
#   - Every row MUST name a `waiver_authority` (the forum that may waive
#     the fitness function) and a `review_cadence`.
#   - A `row_status: seeded` row MUST name a concrete `data_source`. A
#     `row_status: provisional` row is explicitly marked provisional and
#     MUST name the owner for completion.
#   - Waiver fields and review cadence are explicit on every row; silent
#     blanks are validation failures.
#
# Planning / milestone slugs MUST NOT appear in any id, metric name, tag, or
# note on this file. Identities here ride into product-adjacent surfaces
# (benchmark reports, shiproom packets, claim manifests, support bundles).

schema_version: 1
catalog_id: aureline.protected_fitness_function_catalog
catalog_revision: 1
vocabulary_source: docs/benchmarks/fitness_function_catalog.md

# -----------------------------------------------------------------------------
# Row-status vocabulary.
#
# Mirrors artifacts/governance/control_artifact_index.yaml#status_values so the
# same closure applies: a `provisional` row is named, owned, and slotted but
# does not yet gate anything; a `seeded` row has a concrete data source and
# waiver rule; a `not_yet_seeded` row is a reservation that has not acquired
# a home.
# -----------------------------------------------------------------------------
row_statuses:
  - seeded
  - provisional
  - not_yet_seeded

# -----------------------------------------------------------------------------
# Architecture-driver vocabulary (closed).
#
# The nine quality-attribute drivers from the Technical Architecture Document
# §3.2 "Quality attribute drivers". Every row MUST cite at least one driver.
# Adding a driver here requires an architecture-council decision; this set is
# otherwise closed.
# -----------------------------------------------------------------------------
architecture_drivers:
  - latency
  - scalability
  - correctness
  - recoverability
  - security
  - portability
  - extensibility
  - supportability
  - accessibility

# -----------------------------------------------------------------------------
# Architecture-principle vocabulary (closed).
#
# The ten architecture principles from the Technical Architecture Document
# §4.1 "Architecture principles". Every row MUST cite at least one principle
# the fitness function defends. Adding a principle is an architecture-council
# decision.
# -----------------------------------------------------------------------------
architecture_principles:
  - local_first_shell_remote_capable_services
  - one_command_graph
  - one_execution_context_model
  - one_semantic_workspace_graph
  - heavy_work_out_of_process
  - every_write_is_reversible
  - caches_disposable_user_state_durable
  - open_standards_over_bespoke_lock_in
  - optional_services_additive
  - accessibility_and_trust_are_system_qualities

# -----------------------------------------------------------------------------
# Protected-journey vocabulary (aligned, not invented).
#
# Union of the protected-path bucket set frozen by
# docs/benchmarks/spike_metric_names.md and the corpus-manifest
# `protected_journeys` set at
# fixtures/benchmarks/corpus_manifest.yaml#protected_journeys. A row MUST
# cite at least one journey; the set is shared with the corpus manifest so
# corpus fixtures and fitness functions cross-reference one vocabulary.
# -----------------------------------------------------------------------------
protected_journeys:
  - startup
  - first_useful_chrome
  - first_paint
  - input_to_paint
  - render_submission
  - frame_budget
  - placeholder_open
  - placeholder_edit
  - placeholder_save
  - fallback_resolution
  - observability
  - vfs_root_enumeration
  - save_pipeline
  - recovery_journal_write
  - recovery_journal_restore
  - boundary_truth_contract

# -----------------------------------------------------------------------------
# Protected-SLO-family vocabulary (closed).
#
# Cross-cutting SLO families from the Technical Architecture Document §3.4
# "Quality-attribute scenarios and measurable SLOs" plus the operational /
# harness families the benchmark lab is explicitly responsible for. A row
# MUST cite exactly one family so release evidence can group rows by family
# without re-deriving the mapping.
# -----------------------------------------------------------------------------
protected_slo_families:
  - startup_and_first_useful_work      # TAD §3.4 "Open repository to first useful navigation/edit"
  - input_response                     # TAD §3.4 "Keystroke to screen in active editor"
  - render_submission                  # protected-path bucket, per-frame submission budget
  - quick_open_and_command_dispatch    # TAD §3.4 "Quick open file/symbol/command"
  - save_and_filesystem_correctness    # save pipeline, compare-before-write, conflict handling
  - recoverability_and_restore         # recovery journal, entry restore fidelity
  - remote_reconnect                   # TAD §3.4 "Attach/reconnect to remote workspace"
  - rename_with_preview                # TAD §3.4 "Rename with preview"
  - ai_first_response                  # TAD §3.4 "AI explain selected failure"
  - power_and_thermal_posture          # TAD §8.7 power / thermal architecture
  - command_graph_parity               # "one command graph" principle defended by parity gate
  - benchmark_lab_operational_health   # harness self-health, not a user journey

# -----------------------------------------------------------------------------
# Threshold-mode vocabulary (closed).
#
# How a row's threshold field is interpreted. Adding a mode requires a
# benchmark-council decision; the vocabulary is otherwise closed.
# -----------------------------------------------------------------------------
threshold_modes:
  - absolute_p50_and_p95               # latency rows — two numeric targets on a named SLI
  - absolute_p95_only                  # tail-only rows
  - ratio_gate                         # pass / fail on a ratio (e.g. match rate, parity rate)
  - counts_only                        # event counters; zero unless noted
  - boolean_gate                       # hard must-pass contract assertion
  - to_be_set_by_benchmark_council     # provisional placeholder; mirrors the scoreboard-seed convention

# -----------------------------------------------------------------------------
# Data-source-kind vocabulary (closed).
#
# How a row's measurement is captured today. `to_be_wired_by_benchmark_council`
# marks a provisional row whose measurement path is not yet wired.
# -----------------------------------------------------------------------------
data_source_kinds:
  - shell_spike_timing_trace           # schemas/traces/spike_timing.schema.json + artifacts/traces/examples/
  - benchmark_lab_harness_run          # crates/aureline-bench harness output
  - corpus_fixture_measurement         # direct fixture-backed measurement against a corpus id
  - support_bundle_summary             # evidence-consumer channel from corpus_manifest
  - entry_restore_record               # schemas/workspace/entry_and_restore_result.schema.json
  - governance_packet_self_audit       # benchmark-report packet family reading itself
  - to_be_wired_by_benchmark_council   # provisional placeholder

# -----------------------------------------------------------------------------
# Waiver-authority vocabulary.
#
# Forum ids from artifacts/governance/ownership_matrix.yaml#decision_forums.
# The primary waiver authority for every protected fitness function is
# `performance_council` per docs/governance/dri_map.md §Authority. The lane
# DRI is named as `co_waiver_authority` on every row so the lane cannot be
# bypassed by the forum alone.
# -----------------------------------------------------------------------------
waiver_authorities:
  - performance_council
  - architecture_council
  - release_council
  - shiproom_executive_scope_review

# -----------------------------------------------------------------------------
# Review-cadence vocabulary.
#
# Mirrors artifacts/governance/control_artifact_index.yaml#review_cadences so
# tooling can validate cadence values against one closed set.
# -----------------------------------------------------------------------------
review_cadences:
  - each_change
  - per_milestone
  - each_release

# -----------------------------------------------------------------------------
# Export shape for shiproom / review packets.
#
# Every benchmark-report and shiproom packet that cites a protected fitness
# function MUST carry a fitness_function_snapshot block with the fields
# below. The block is defined here so release-evidence and shiproom packets
# consume one frozen shape, and so a packet cannot claim a fitness-function
# result without naming the catalog row, the data-source identity, and the
# waiver / expiry posture.
# -----------------------------------------------------------------------------
packet_export_shape:
  fitness_function_snapshot:
    required_fields:
      - row_id                         # must resolve to rows[].id below
      - catalog_revision               # this file's catalog_revision at packet time
      - measured_on                    # YYYY-MM-DD
      - measurement_run_id             # opaque run identifier from the harness
      - data_source_ref                # path or channel id resolved at run time
      - corpus_refs                    # list of corpus ids from corpus_manifest.yaml
      - host_platform_class            # host_independent | host_dependent | host_os_pinned
      - host_os                        # required when host_platform_class != host_independent
      - rustc_target_triple            # required when host_platform_class != host_independent
      - threshold_at_measurement       # copy of rows[].threshold at packet time
      - result                         # pass | fail | not_measured | waived | provisional
      - waiver_refs                    # list of waiver ids from ownership_matrix.yaml#waivers
      - expires_on                     # required when result == waived
    optional_fields:
      - notes
      - evidence_consumer_channels_touched

# =============================================================================
# Fitness-function rows.
#
# Ordered by protected-SLO family (startup → input response → render
# submission → save & filesystem → recoverability → operational health →
# provisional placeholders). Every row carries explicit owner, data source,
# cadence, waiver authority, and expiry / review rules.
# =============================================================================
rows:
  # ---------------------------------------------------------------------------
  # startup_and_first_useful_work
  # ---------------------------------------------------------------------------
  - id: ff.warm_start_to_first_paint
    title: Warm start to first paint
    row_status: seeded
    owner: "@ahmeddyounis"
    owning_lane: benchmark_lab
    co_owning_lane: aureline-render
    backup_waiver: single-maintainer-backup
    architecture_drivers:
      - latency
      - recoverability
    architecture_principles:
      - local_first_shell_remote_capable_services
      - heavy_work_out_of_process
    protected_journeys:
      - startup
      - first_paint
    protected_slo_family: startup_and_first_useful_work
    metric:
      name: warm_start_to_first_paint
      protected_path_bucket: startup
      hook_list_source: docs/adr/0002-renderer-text-stack-and-shaping-fallback.md
      description: >
        Time from the warm-start marker (process already resident, workspace
        already opened once) to the first non-blank frame rendered by the
        shell on the claimed hardware matrix. This is the single startup mark
        the shell spike always emits before any input action.
    threshold_mode: to_be_set_by_benchmark_council
    threshold:
      p50_ms: to_be_set_by_benchmark_council
      p95_ms: to_be_set_by_benchmark_council
      release_bar_ms: to_be_set_by_benchmark_council
      slo_family_bar_source:
        doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        section: §3.4 Quality-attribute scenarios and measurable SLOs
        journey: "Open repository to first useful navigation/edit"
    data_source:
      kind: shell_spike_timing_trace
      schema: schemas/traces/spike_timing.schema.json
      example_artifacts: artifacts/traces/examples/
      corpus_refs:
        - corpus.workflow.startup_warm_to_first_paint
        - corpus.reference.micro_local_folder
      evidence_consumer_channels:
        - benchmark_lab.bootstrap_entry_parity
        - support_bundle.performance_summary
        - release_evidence.claim_manifest
    cadence:
      review_cadence: per_milestone
      measurement_cadence: each_release
      re_baseline_trigger: hardware_baseline_change_or_renderer_ADR_supersession
    waiver_authority: performance_council
    co_waiver_authority: aureline-render
    waiver_rules:
      default_expiry_window_days: 90
      renewal_requires_correction_program: true
      escalation_path:
        - performance_council
        - architecture_council
        - shiproom_executive_scope_review
    linked_adrs:
      - docs/adr/0002-renderer-text-stack-and-shaping-fallback.md
    linked_decisions:
      - D-0001
    notes: >
      The threshold pair is deliberately left to_be_set_by_benchmark_council
      at this revision; the benchmark council charter §3 owns threshold
      changes and the foundations milestone does not promote numeric bars.
      The metric name is not provisional — it matches the ADR-0002 hook list
      and the spike-metric-names mapping, so traces and reports converge on
      one identity.

