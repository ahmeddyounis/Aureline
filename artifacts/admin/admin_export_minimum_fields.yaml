# Admin-audit export minimum field set.
#
# Machine-readable companion to docs/admin/admin_audit_export_contract.md.
# Freezes the minimum fields every admin_audit_export_record MUST preserve
# for material admin-audit event categories.
#
# Rules:
#   - Field paths are relative to admin_audit_export_record.included_event_rows[].
#   - If this file and the contract disagree, the contract wins and this file
#     MUST be updated in the same change.
#   - Adding a field is additive-minor; removing or repurposing a field is
#     breaking and requires governance review.
#   - Milestone slugs MUST NOT appear in any id, path, description, or note.

schema_version: 1
status: seeded

contract_ref: docs/admin/admin_audit_export_contract.md
schema_ref: schemas/admin/admin_audit_export.schema.json

minimum_fields_global:
  - event_id_ref
  - event_class
  - origin_class
  - actor_class
  - actor_ref
  - actor_label
  - tenant_or_org_ref
  - scope_kind
  - scope_label
  - subject.subject_kind
  - subject.subject_id
  - subject.subject_label
  - decision_class
  - outcome_class
  - decision_reason_class
  - decision_reason_note
  - event_at_utc
  - mirror_or_offline_posture
  - policy_epoch_ref
  - entitlement_epoch_ref
  - redaction_summary.redaction_class
  - redaction_summary.included_data_classes
  - redaction_summary.omitted_data_classes
  - vendor_console_independence_class
  - browser_handoff.handoff_class
  - browser_handoff.handoff_ref
  - browser_handoff.handoff_note
  - related_object_refs
  - reviewable_summary

categories:
  policy_changes:
    event_classes:
      - policy_bundle_change
    required_fields:
      - subject.subject_kind
      - subject.subject_id
      - policy_epoch_ref
      - decision_reason_class
      - policy_state_at_action_time.policy_epoch
      - policy_state_at_action_time.bundle_ref
      - policy_state_at_export_time.policy_epoch
      - related_object_refs
  policy_simulation_and_expiry:
    event_classes:
      - policy_bundle_change
      - settings_lock_change
      - failed_privileged_action
    required_fields:
      - subject.subject_kind
      - subject.subject_id
      - policy_epoch_ref
      - decision_reason_class
      - related_object_refs
      - policy_state_at_action_time.policy_epoch
      - policy_state_at_action_time.bundle_ref
      - policy_state_at_export_time.policy_epoch
      - exception_refs
      - remembered_decision_refs
      - expiry_or_reapproval_at
  deprovision_events:
    event_classes:
      - entitlement_lifecycle_transition
      - seat_action
    required_fields:
      - subject.subject_kind
      - subject.subject_id
      - entitlement_epoch_ref
      - decision_reason_class
  seat_or_role_changes:
    event_classes:
      - seat_action
    required_fields:
      - subject.subject_kind
      - subject.subject_id
      - decision_reason_class
  device_rebind:
    event_classes:
      - device_action
    required_fields:
      - subject.subject_kind
      - subject.subject_id
      - decision_reason_class
  approval_narrowing:
    event_classes:
      - collaboration_control_grant
      - collaboration_control_revoke
      - failed_privileged_action
    required_fields:
      - decision_class
      - decision_reason_class
      - policy_epoch_ref
  emergency_disable_actions:
    event_classes:
      - revocation_event
      - policy_bundle_change
    required_fields:
      - decision_reason_class
      - policy_epoch_ref
  delete_or_export_lifecycle_events:
    event_classes:
      - record_delete_requested
      - record_delete_completed
      - record_hold_applied
      - record_hold_released
      - record_export_ready
      - record_export_consumed
    required_fields:
      - subject.subject_kind
      - subject.subject_id
      - decision_reason_class
