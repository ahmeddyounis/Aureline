# Proof index for the protected small-project dogfood matrix.
#
# This file is a lightweight registry intended to be consumed by review
# packets and future dashboards so they can link to one canonical
# dogfood-matrix artifact (and its validator) without copying the fixture list.

schema_version: 1
as_of: "2026-05-08"
owner: "@ahmeddyounis"

index_id: small_project_dogfood_matrix_proof_index
human_entrypoint_ref: docs/dogfood/m1_small_project_guide.md

canonical_artifacts:
  - artifact_id: dogfood_matrix
    title: Small-project dogfood matrix (canonical)
    artifact_ref: artifacts/milestones/m1/dogfood_matrix.yaml
    owner_dri: "@ahmeddyounis"
    validation_command: python3 ci/check_m1_dogfood_matrix.py --repo-root .

  - artifact_id: validator
    title: Dogfood-matrix validator script
    artifact_ref: ci/check_m1_dogfood_matrix.py
    owner_dri: "@ahmeddyounis"

  - artifact_id: fixture_repos
    title: Protected small-project fixture repositories
    artifact_ref: fixtures/repos/m1/
    owner_dri: "@ahmeddyounis"

validation_lane:
  protected_fixture_root: fixtures/repos/m1/
  proof_lane_refs:
    - artifacts/qe/test_lane_registry.yaml#fixture_repo_integration

exact_build_identity:
  contract_ref: docs/build/exact_build_identity_model.md
  baseline_ref: docs/build/reproducible_build_baseline.md
  latest_identity_ref: not_yet_seeded

latest_validation_capture:
  captured_at: "2026-05-08T01:29:03Z"
  command: python3 ci/check_m1_dogfood_matrix.py --repo-root .
  report_ref: artifacts/milestones/m1/dogfood_matrix_validation_capture.json
