# Late-M1 public-truth checkpoint pack.
#
# This artifact is the canonical checklist of public-truth items that must
# exist (and remain consistent) before the program hardens external-facing or
# support-facing claims.
#
# Downstream packets and dashboards should cite this file (and its linked
# proof artifacts) rather than maintaining parallel “late-M1 public truth”
# lists in local notes.

schema_version: 1
as_of: "2026-05-08"
owner: "@ahmeddyounis"

pack_id: late_m1_public_truth_checkpoint_pack
title: Late-M1 public-truth checkpoint pack
human_entrypoint_ref: docs/milestones/m1/late_freeze_pack.md
review_packet_ref: docs/review/m1_public_truth_packet.md
artifact_index_ref: artifacts/milestones/m1/artifact_index.yaml

validator:
  script_ref: ci/check_m1_late_freeze_pack.py
  command: python3 ci/check_m1_late_freeze_pack.py --repo-root .
  ci_gate_ref: .github/workflows/check_m1_late_freeze_pack.yml

seed_state_vocabulary:
  - seeded
  - planned_not_yet_seeded

outputs:
  - output_id: command_diagnostics_skeleton
    title: Command diagnostics skeleton
    seed_state: seeded
    owner_dri: "@ahmeddyounis"
    review_forum_ref: artifacts/governance/ownership_matrix.yaml#decision_forums:architecture_council
    proof_artifact_refs:
      - docs/ux/command_diagnostics_contract.md
      - docs/commands/command_surface_projection.md
      - docs/ux/disabled_reason_grammar.md
      - schemas/commands/diagnostic_projection.schema.json

  - output_id: help_about_skeleton
