# Blocker taxonomy for known-gaps and exit-gate tracking.
#
# This file is the canonical vocabulary for classifying blockers and known gaps
# so review packets, dashboards, and exit-gate checklists can join on stable
# class ids instead of prose labels.

schema_version: 1
as_of: "2026-05-08"
owner: "@ahmeddyounis"

taxonomy_id: blocker_taxonomy

severity_vocabulary:
  - critical
  - high
  - medium
  - low

waiver_status_vocabulary:
  - none
  - active
  - expired_silent
  - expired_with_reprompt
  - renewed
  - superseded
  - retired
  - force_retired_by_policy

blocker_classes:
  - class_id: source_fidelity
    title: Source fidelity
    description: >
      Blockers that could cause silent source changes, corruption, unintended
      rewrites, or incorrect save/restore behavior.
    default_escalation_sla_hours: 48

  - class_id: hot_path
    title: Hot path
    description: >
      Blockers on typing, file switching, rendering, quick open, and other
      protected interaction paths.
    default_escalation_sla_hours: 48

  - class_id: recovery
    title: Recovery
    description: >
      Blockers on crash restore, safe mode, repair ladders, or supportability
      flows required to keep dogfood honest.
    default_escalation_sla_hours: 48

  - class_id: trust
    title: Trust
    description: >
      Blockers on permission prompts, trust boundaries, policy posture, or
      surfaces that could mislead users about what actions are safe.
    default_escalation_sla_hours: 48

  - class_id: accessibility
    title: Accessibility
    description: >
      Blockers that make protected workflows unusable for assistive tech,
      keyboard-only use, or reduced-motion requirements.
    default_escalation_sla_hours: 48

  - class_id: onboarding
    title: Onboarding
    description: >
      Blockers on first-run, project entry, Open/Clone/Import/Restore flows, or
      other learnability-critical paths that must stay honest.
    default_escalation_sla_hours: 72

  - class_id: boundary_truth
    title: Boundary truth
    description: >
      Blockers where provenance, lifecycle labels, scope truth, or boundary
      manifests are missing or misleading.
    default_escalation_sla_hours: 72

  - class_id: public_proof
    title: Public proof
    description: >
      Blockers on proof assets (evidence capture, index integrity, docs/public
      truth parity) that must be correct before widening claims.
    default_escalation_sla_hours: 72

