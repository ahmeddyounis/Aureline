# Known-gaps ledger for proof and exit tracking.
#
# This ledger is the canonical place to record intentional gaps, release
# blockers, and exit-gate exceptions discovered during daily dogfood work. Review
# packets and dashboards should cite these rows (and the linked taxonomy and
# checklist ids) instead of carrying private caveat lists.

schema_version: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

ledger_id: known_gaps_ledger
human_entrypoint_ref: docs/milestones/m1/known_gaps.md

inputs:
  blocker_taxonomy_ref: artifacts/milestones/m1/blocker_taxonomy.yaml
  exit_gate_checklist_ref: artifacts/milestones/m1/exit_gate_checklist.yaml
  dependency_graph_ref: artifacts/milestones/m1/dependency_graph.yaml
  dogfood_matrix_ref: artifacts/milestones/m1/dogfood_matrix.yaml
  build_identity_ref: artifacts/build/build_identity.json

row_kind_vocabulary:
  - blocker
  - known_gap

row_status_vocabulary:
  - open
  - mitigated
  - waived
  - closed

rows:
  - row_id: gap.dogfood.plain_text_notes.terminal_contract
    kind: known_gap
    status: open
    title: Terminal action remains pending in the protected smoke contract
    owner_dri: "@ahmeddyounis"
    severity: high
    waiver_status: none
    blocker_class: public_proof
    blocked_exit_gate_items:
      - exit_gate.daily_dogfood_small_projects
      - exit_gate.real_daily_use_not_demos
      - exit_gate.protected_fitness_functions
    fixture_ref: fixtures/repos/m1/plain_text_notes
    build_identity_ref: artifacts/build/build_identity.json
    evidence_refs:
      - artifacts/milestones/m1/captures/integrated_flow_smoke_validation_capture.json#dogfood.fixture_repo.plain_text_notes:terminal
      - artifacts/milestones/m1/screenshots/gap.dogfood.plain_text_notes.terminal_contract.txt
    observed_action_refs:
      - dogfood.fixture_repo.plain_text_notes:terminal
      - dogfood.fixture_repo.nested_source_tree:terminal
      - dogfood.fixture_repo.path_and_encoding:terminal
      - dogfood.fixture_repo.missing_target_restore:terminal
    next_action: >
      @ahmeddyounis follow-up: extend the integrated-flow smoke to execute the
      terminal toggle and assert command output against each protected fixture.

  - row_id: gap.dogfood.nested_source_tree.restore_contract
    kind: known_gap
    status: open
    title: Restore-session action is not yet claim-bearing in binary smoke
    owner_dri: "@ahmeddyounis"
    severity: high
    waiver_status: none
    blocker_class: recovery
    blocked_exit_gate_items:
      - exit_gate.core_flow_protected_fixtures
      - exit_gate.daily_dogfood_small_projects
      - exit_gate.entry_surface_honesty
      - exit_gate.real_daily_use_not_demos
    fixture_ref: fixtures/repos/m1/nested_source_tree
    build_identity_ref: artifacts/build/build_identity.json
    evidence_refs:
      - artifacts/milestones/m1/captures/integrated_flow_smoke_validation_capture.json#dogfood.fixture_repo.nested_source_tree:restore_session
      - artifacts/milestones/m1/screenshots/gap.dogfood.nested_source_tree.restore_contract.txt
    observed_action_refs:
      - dogfood.fixture_repo.plain_text_notes:restore_session
      - dogfood.fixture_repo.nested_source_tree:restore_session
      - dogfood.fixture_repo.path_and_encoding:restore_session
      - dogfood.fixture_repo.missing_target_restore:restore_session
    next_action: >
      @ahmeddyounis follow-up: promote restore_session from pending_upstream in
      the integrated-flow smoke by relaunching the shell and validating restored
      editor state against each protected fixture.

  - row_id: gap.dogfood.path_and_encoding.missing_target_recovery_contract
    kind: known_gap
    status: open
    title: Missing-target recovery is pending for path and encoding fixtures
    owner_dri: "@ahmeddyounis"
    severity: high
    waiver_status: none
    blocker_class: source_fidelity
    blocked_exit_gate_items:
      - exit_gate.core_flow_protected_fixtures
      - exit_gate.entry_surface_honesty
      - exit_gate.real_daily_use_not_demos
    fixture_ref: fixtures/repos/m1/path_and_encoding_cases
    build_identity_ref: artifacts/build/build_identity.json
    evidence_refs:
      - artifacts/milestones/m1/captures/integrated_flow_smoke_validation_capture.json#dogfood.fixture_repo.path_and_encoding:missing_target_recovery
      - artifacts/milestones/m1/screenshots/gap.dogfood.path_and_encoding.missing_target_recovery_contract.txt
    observed_action_refs:
      - dogfood.fixture_repo.plain_text_notes:missing_target_recovery
      - dogfood.fixture_repo.nested_source_tree:missing_target_recovery
      - dogfood.fixture_repo.path_and_encoding:missing_target_recovery
      - dogfood.fixture_repo.missing_target_restore:missing_target_recovery
    next_action: >
      @ahmeddyounis follow-up: add a binary smoke drill that moves or deletes the
      target file, relaunches restore, and verifies the missing-target recovery
      path without silently dropping the file.

  - row_id: gap.dogfood.missing_target_restore.recovery_drill_contract
    kind: known_gap
    status: open
    title: Missing-target fixture restore drill still reports pending upstream
    owner_dri: "@ahmeddyounis"
    severity: high
    waiver_status: none
    blocker_class: recovery
    blocked_exit_gate_items:
      - exit_gate.core_flow_protected_fixtures
      - exit_gate.daily_dogfood_small_projects
      - exit_gate.entry_surface_honesty
      - exit_gate.real_daily_use_not_demos
    fixture_ref: fixtures/repos/m1/missing_target_restore
    build_identity_ref: artifacts/build/build_identity.json
    evidence_refs:
      - artifacts/milestones/m1/captures/integrated_flow_smoke_validation_capture.json#dogfood.fixture_repo.missing_target_restore:restore_session
      - artifacts/milestones/m1/captures/integrated_flow_smoke_validation_capture.json#dogfood.fixture_repo.missing_target_restore:missing_target_recovery
      - artifacts/milestones/m1/screenshots/gap.dogfood.missing_target_restore.recovery_drill_contract.txt
    observed_action_refs:
      - dogfood.fixture_repo.missing_target_restore:restore_session
      - dogfood.fixture_repo.missing_target_restore:missing_target_recovery
    next_action: >
      @ahmeddyounis follow-up: wire the missing-target restore fixture into the
      restore execution smoke so the drill proves fallback UI and no-crash
      behavior from the running binary.

  - row_id: gap.entry.import_execution
    kind: blocker
    status: open
    title: Import entry action is review-shaped but execution is still unsupported
    owner_dri: "@ahmeddyounis"
    severity: medium
    waiver_status: none
    blocker_class: onboarding
    blocked_exit_gate_items:
      - exit_gate.entry_surface_honesty
      - exit_gate.real_daily_use_not_demos
      - exit_gate.first_run_token_state_attention_embedded_boundary
    fixture_ref: fixtures/repos/m1/nested_source_tree
    build_identity_ref: artifacts/build/build_identity.json
    evidence_refs:
      - artifacts/milestones/m1/captures/integrated_flow_smoke_validation_capture.json
      - artifacts/milestones/m1/screenshots/gap.entry.import_execution.txt
      - crates/aureline-shell/src/bootstrap/native_shell.rs#cmd:workspace.import_profile
    next_action: >
      @ahmeddyounis follow-up: implement the first import execution path behind
      the existing review sheet and retire the unsupported Import Start Center
      note.

