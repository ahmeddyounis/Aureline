#     blocked_exit_gate_items:
#       - exit_gate.core_flow_protected_fixtures
#     fixture_ref: fixtures/repos/m1/<fixture_name>
#     build_identity_ref: artifacts/build/build_identity.json
#     next_action: Describe the next concrete action and who owns it.
