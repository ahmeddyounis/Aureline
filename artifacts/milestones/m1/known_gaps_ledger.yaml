# Known-gaps ledger for proof and exit tracking.
#
# This ledger is the canonical place to record intentional gaps, release
# blockers, and exit-gate exceptions discovered during daily dogfood work. Review
# packets and dashboards should cite these rows (and the linked taxonomy and
# checklist ids) instead of carrying private caveat lists.

schema_version: 1
as_of: "2026-05-08"
owner: "@ahmeddyounis"

ledger_id: known_gaps_ledger
human_entrypoint_ref: docs/milestones/m1/known_gaps.md

inputs:
  blocker_taxonomy_ref: artifacts/milestones/m1/blocker_taxonomy.yaml
  exit_gate_checklist_ref: artifacts/milestones/m1/exit_gate_checklist.yaml
  dependency_graph_ref: artifacts/milestones/m1/dependency_graph.yaml
  dogfood_matrix_ref: artifacts/milestones/m1/dogfood_matrix.yaml
  build_identity_ref: artifacts/build/build_identity.json

row_kind_vocabulary:
  - blocker
  - known_gap

row_status_vocabulary:
  - open
  - mitigated
  - waived
  - closed

rows: []

# Row template (example only):
#
# rows:
#   - row_id: gap:example
#     kind: blocker
#     status: open
#     title: Brief summary of the gap
