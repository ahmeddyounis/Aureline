# Exit-gate checklist for the core editor prototype.
#
# This checklist mirrors the exit-gate conditions in the source milestone
# document and provides a machine-readable surface for CI, shiproom review, and
# downstream proof packets.

schema_version: 1
as_of: "2026-05-08"
owner: "@ahmeddyounis"

checklist_id: core_editor_prototype_exit_gate
human_entrypoint_ref: docs/milestones/m1/known_gaps.md

inputs:
  known_gaps_ledger_ref: artifacts/milestones/m1/known_gaps_ledger.yaml
  blocker_taxonomy_ref: artifacts/milestones/m1/blocker_taxonomy.yaml
  dependency_graph_ref: artifacts/milestones/m1/dependency_graph.yaml
  dogfood_matrix_ref: artifacts/milestones/m1/dogfood_matrix.yaml
  build_identity_ref: artifacts/build/build_identity.json

status_vocabulary:
  - unknown
  - green
  - yellow
  - red
  - not_applicable

items:
  - item_id: exit_gate.core_flow_protected_fixtures
    title: Core edit/save/restore works on protected fixtures
    status: unknown
    definition_of_green: >
      The integrated flow (open -> edit -> save -> restore) succeeds on protected
      fixture repos without violating source fidelity or recovery contracts.
    evidence_refs:
      - artifacts/milestones/m1/dependency_graph.yaml
      - artifacts/milestones/m1/dogfood_matrix.yaml

  - item_id: exit_gate.daily_dogfood_small_projects
    title: Daily dogfooding works on small projects
    status: unknown
    definition_of_green: >
      Daily dogfooding is possible on the governed small-project fixture set,
      with failures recorded as explicit ledger rows rather than informal notes.
    evidence_refs:
      - artifacts/milestones/m1/dogfood_matrix.yaml
      - artifacts/milestones/m1/known_gaps_ledger.yaml

  - item_id: exit_gate.hot_path_latency_guardrails
    title: Typing and navigation stay within protected expectations
    status: unknown
    definition_of_green: >
      Typing, file switching, and quick-open behavior remain within protected
      expectations on the governed fixture lane.
    evidence_refs:
      - artifacts/milestones/m1/dogfood_matrix.yaml

  - item_id: exit_gate.entry_surface_honesty
    title: Entry surfaces stay honest about project acquisition and restore
    status: unknown
    definition_of_green: >
      Primary entry flows distinguish Open/Clone/Import/Restore and do not hide
      missing-target or crash-recovery state on protected paths.
    evidence_refs:
      - artifacts/milestones/m1/dependency_graph.yaml

  - item_id: exit_gate.real_daily_use_not_demos
    title: Tool is usable for real daily work
    status: unknown
    definition_of_green: >
      The tool can be used honestly for hours on protected internal repos, not
      only in demos, without recurring untracked failures.
    evidence_refs:
      - artifacts/milestones/m1/known_gaps_ledger.yaml

  - item_id: exit_gate.lifecycle_and_boundary_seeds
    title: Lifecycle labels and boundary-truth seeds exist on protected surfaces
    status: unknown
    definition_of_green: >
      Lifecycle labels, schema ownership, and boundary-truth seeds exist for the
      protected surfaces exercised by the daily dogfood lane.
    evidence_refs:
      - artifacts/milestones/m1/dependency_graph.yaml

  - item_id: exit_gate.protected_fitness_functions
    title: Protected fitness functions are automated release controls
    status: unknown
    definition_of_green: >
      Protected fitness functions that guard the daily lane exist as automated
      release controls (not ad hoc dashboards) and are kept current.
    evidence_refs:
      - artifacts/milestones/m1/artifact_index.yaml

  - item_id: exit_gate.install_trust_and_safe_preview_posture
    title: Install/trust/safe-preview posture is explicit on protected paths
    status: unknown
    definition_of_green: >
      Install/state-root truth, safe-preview posture, and extension permission
      baseline are explicit on protected dogfood surfaces.
    evidence_refs:
      - artifacts/milestones/m1/known_gaps_ledger.yaml

  - item_id: exit_gate.first_run_token_state_attention_embedded_boundary
    title: First-run truth and shell token/state vocabulary are present
    status: unknown
    definition_of_green: >
      First-run/open/import/restore truth, token/state vocabulary, durable
      progress, and embedded-boundary chrome exist in real surfaces rather than
      only in design artifacts.
    evidence_refs:
      - artifacts/milestones/m1/known_gaps_ledger.yaml

