edges:
  - from: workflow_bundle_register
    to: alpha_wedge_matrix
    rationale: >
      Wedge rows cite shared workflow-bundle and scoreboard-family IDs rather
      than minting local proof vocabulary.

  - from: launch_language_bundles
    to: alpha_wedge_matrix
    rationale: >
      Alpha wedge rows bind to existing launch-language bundle rows.

  - from: p0_persona_rows
    to: alpha_wedge_matrix
    rationale: >
      Wedge rows cite the persona rows whose daily workflows define the alpha
      task surface.

  - from: reference_workspace_rows
    to: alpha_wedge_matrix
    rationale: >
      Wedge rows inherit archetype scope and reference workspace IDs from the
      compatibility inventory.

  - from: deployment_locality_matrix
    to: alpha_wedge_matrix
    rationale: >
      Deployment claims are limited to declared local/helper-backed rows and
      must not silently widen to managed or cloud parity.

  - from: known_limits_contract
    to: alpha_exit_gate_scoreboard
    rationale: >
      Any claim widening or known limitation must propagate through one docs and
      known-limits scoreboard row.

  - from: design_partner_intake
    to: alpha_exit_gate_scoreboard
    rationale: >
      External alpha inputs enter through the governed intake checklist before
      they become fixture, support, benchmark, or publication evidence.

  - from: design_partner_intake
    to: external_alpha_design_partner_intake_packet
    rationale: >
      The external alpha packet applies the shared intake checklist to partner
      role, stack, privacy posture, task script, completion, and blocker fields.

  - from: alpha_wedge_matrix
    to: external_alpha_design_partner_task_pack
    rationale: >
      The task pack derives its task scripts from the protected workflows and
      fixtures already named by the alpha wedge matrix.

  - from: alpha_exit_gate_scoreboard
    to: external_alpha_feedback_taxonomy
    rationale: >
      Partner feedback routes to existing scoreboard rows rather than creating
      local issue labels or proof states.

  - from: known_limits_contract
    to: external_alpha_known_limits
    rationale: >
      External alpha caveats use the shared known-limits contract and narrow
      public/support copy through one packet.

  - from: external_alpha_design_partner_intake_packet
    to: external_alpha_design_partner_validator
    rationale: >
      The validator checks that the intake packet carries the required partner,
      privacy, task, severity, and rollback fields.

  - from: external_alpha_design_partner_task_pack
    to: external_alpha_design_partner_validator
    rationale: >
      The validator checks that every protected alpha workflow has a task script
      and fixture binding.

  - from: external_alpha_feedback_taxonomy
    to: external_alpha_design_partner_validator
    rationale: >
      The validator checks feedback categories, route classes, severity
      vocabulary, and known-limit routing.

  - from: external_alpha_known_limits
    to: external_alpha_design_partner_validator
    rationale: >
      The validator checks that scope, deployment, notebook, companion,
      migration, support-export, and raw-content known limits exist.

  - from: external_alpha_feedback_cases
    to: external_alpha_design_partner_validator
    rationale: >
      Protected feedback cases exercise task completion, redaction blocking, and
      known-limit routing states.

  - from: benchmark_corpus_manifest
    to: alpha_exit_gate_scoreboard
    rationale: >
      Benchmark and task-success proof rows must resolve to a governed fixture
      register before they can move a go/no-go row to green.

  - from: alpha_wedge_matrix
    to: external_alpha_fixture_register
    rationale: >
      The fixture register binds each alpha reference workspace to the protected
      workflows and scoreboard rows already frozen in the matrix.

  - from: benchmark_corpus_manifest
    to: external_alpha_fixture_register
    rationale: >
      Register rows cite stable corpus ids from the protected manifest rather
      than hardcoding workspace paths in benchmark packets.

  - from: reference_workspace_fixtures
    to: external_alpha_fixture_register
    rationale: >
      Existing reference workspace descriptors remain the canonical workspace
      shapes; the register adds privacy, provenance, proof-lane, and
      repeatability bindings.

  - from: design_partner_intake
    to: external_alpha_fixture_register
    rationale: >
      Any partner-derived fixture must pass the shared intake, privacy,
      license, retention, and owner-coverage workflow before it can become a
      register row.

  - from: external_alpha_fixture_workflow_packets
    to: external_alpha_fixture_register
    rationale: >
      Workflow packets carry the task scripts and repeatability notes the
      register row exposes to benchmark packets.

  - from: external_alpha_fixture_register
    to: external_alpha_fixture_register_validator
    rationale: >
      The validator is the first consumer and fails when register rows lose
      provenance, privacy review, repeatability notes, corpus refs, or
      scoreboard bindings.

  - from: external_alpha_fixture_register
    to: alpha_exit_gate_scoreboard
    rationale: >
      The benchmark fixture scoreboard row reads this register before allowing
      benchmark packets to cite alpha reference workspaces.

  - from: external_alpha_fixture_register_proof_packet
    to: external_alpha_fixture_register_docs
    rationale: >
      The workflow page links the proof packet, validator, capture, and register
      into one reviewable corpus-admission path.

  - from: alpha_wedge_matrix
    to: external_alpha_tsjs_launch_bundle_manifest
    rationale: >
      The bundle manifest consumes the declared TypeScript / JavaScript wedge
      id, launch bundle id, and scoped workflow rows instead of restating alpha
      scope locally.

  - from: alpha_wedge_matrix
    to: external_alpha_python_launch_bundle_manifest
    rationale: >
      The bundle manifest consumes the declared Python wedge id, launch bundle
      id, and scoped workflow rows instead of restating alpha scope locally.

  - from: external_alpha_fixture_register
    to: external_alpha_tsjs_launch_bundle_manifest
    rationale: >
      The manifest links to the benchmark fixture register row before citing
      workspace descriptors or corpus ids.

  - from: external_alpha_fixture_register
    to: external_alpha_python_launch_bundle_manifest
    rationale: >
      The manifest links to the benchmark fixture register row before citing
      workspace descriptors or corpus ids.

  - from: reference_workspace_rows
    to: external_alpha_archetype_seed_rows
    rationale: >
      Archetype seed rows quote the canonical reference-workspace archetype ids
      and support class vocabulary.

  - from: external_alpha_tsjs_launch_bundle_manifest
    to: external_alpha_archetype_seed_rows
    rationale: >
      The TypeScript / JavaScript bundle binds to exactly one archetype seed row
      and one benchmark fixture row.

  - from: external_alpha_python_launch_bundle_manifest
    to: external_alpha_archetype_seed_rows
    rationale: >
      The Python bundle binds to exactly one archetype seed row and one
      benchmark fixture row.

  - from: external_alpha_tsjs_launch_bundle_manifest
    to: start_center_bundle_gallery
    rationale: >
      The Start Center projects bundle id, persona or stack label,
      signer/source, channel, compatible range, certification state, and mirror
      availability from the manifest.

  - from: external_alpha_python_launch_bundle_manifest
    to: start_center_bundle_gallery
    rationale: >
      The Start Center projects bundle id, persona or stack label,
      signer/source, channel, compatible range, certification state, and mirror
      availability from the manifest.

  - from: external_alpha_archetype_seed_rows
    to: external_alpha_launch_bundle_validator
    rationale: >
      The validator checks that bundle badging opens underlying archetype or
      compatibility evidence and that seed rows do not overclaim certification.

  - from: external_alpha_launch_bundle_validator
    to: external_alpha_launch_bundle_validation_capture
    rationale: >
      The checked-in capture records the protected validation path for bundle
      manifests, archetype seed rows, mirror/offline vocabulary, and Start
      Center gallery projection.

  - from: external_alpha_launch_bundle_proof_packet
    to: alpha_review_packet_template
    rationale: >
      Review packets can cite the bundle/archetype packet when launch-bundle
      setup or certification seed truth changes.

  - from: alpha_wedge_matrix
    to: alpha_exit_gate_scoreboard
    rationale: >
      Every claimed workflow and deployment row names a scoreboard row.

  - from: alpha_exit_gate_scoreboard
    to: alpha_scope_validator
    rationale: >
      The validator is the first consuming surface and fails when scoreboard row
      references drift from the matrix.

  - from: alpha_wedge_matrix
    to: alpha_scope_validator
    rationale: >
      The validator enforces launch-wedge presence, proof-packet refs, and
      scope-review requirements for held rows.

  - from: alpha_scope_proof_packet
    to: alpha_scope_entrypoint
    rationale: >
      The reviewer-facing page links the proof packet, validator, and canonical
      artifacts together.

  - from: alpha_exit_gate_scoreboard
    to: alpha_proof_artifact_index
    rationale: >
      Proof lanes cite scoreboard rows before moving alpha claim or go/no-go
      state.

  - from: alpha_wedge_matrix
    to: alpha_proof_artifact_index
    rationale: >
      The proof index consumes wedge and workflow scope rather than restating
      launch claims locally.

  - from: known_limits_contract
    to: alpha_truth_update_workflow
    rationale: >
      Same-change-set review keeps known-limit copy aligned with docs,
      migration, Help/About, and support-export truth.

  - from: alpha_proof_artifact_index
    to: alpha_review_packet_template
    rationale: >
      Review packets take their owner, freshness, exact-build, and truth-ref
      fields from the canonical index contract.

  - from: alpha_proof_artifact_index
    to: alpha_truth_update_workflow
    rationale: >
      The workflow defines when index changes require docs, migration,
      Help/About, known-limit, and support-export refs in the same change.

  - from: alpha_proof_artifact_index
    to: alpha_proof_artifact_index_validator
    rationale: >
      The validator is the first consumer and fails when proof lanes, freshness
      metadata, or same-change truth refs drift.

  - from: alpha_proof_artifact_index_packet
    to: alpha_review_packet_template
    rationale: >
      The proof packet links the index, validator, capture, and review packet
      template into one protected proof path.

  - from: external_alpha_design_partner_proof_packet
    to: external_alpha_design_partner_guide
    rationale: >
      The guide links the partner-facing packet, task pack, feedback taxonomy,
      known limits, validator, and capture into one onboarding path.

consumer_surfaces:
  - consumer_id: alpha_scope_validator
    title: Alpha scope artifact validator
    reads:
      - alpha_wedge_matrix
      - alpha_exit_gate_scoreboard
      - alpha_scope_dependency_graph
    command: python3 ci/check_alpha_scope.py --repo-root .
    report_ref: artifacts/milestones/m2/captures/alpha_scope_validation_capture.json

  - consumer_id: downstream_alpha_proof_lanes
    title: Downstream alpha proof packets and dashboards
    reads:
      - alpha_exit_gate_scoreboard
    command: cite scoreboard_row values before adding local scope text
    report_ref: artifacts/milestones/m2/exit_gate_scoreboard.yaml

  - consumer_id: external_alpha_design_partner_validator
    title: External alpha design-partner intake validator
    reads:
      - external_alpha_design_partner_intake_packet
      - external_alpha_design_partner_task_pack
      - external_alpha_feedback_taxonomy
      - external_alpha_known_limits
      - external_alpha_feedback_cases
      - alpha_wedge_matrix
      - alpha_exit_gate_scoreboard
    command: python3 ci/check_design_partner_alpha.py --repo-root .
    report_ref: artifacts/milestones/m2/captures/design_partner_intake_validation_capture.json

  - consumer_id: alpha_proof_artifact_index_validator
    title: External alpha proof artifact index validator
    reads:
      - alpha_proof_artifact_index
      - alpha_exit_gate_scoreboard
      - alpha_review_packet_template
      - alpha_truth_update_workflow
    command: python3 ci/check_alpha_proof_artifact_index.py --repo-root .
    report_ref: artifacts/milestones/m2/captures/artifact_index_validation_capture.json

  - consumer_id: external_alpha_fixture_register_validator
    title: External alpha benchmark fixture-register validator
    reads:
      - external_alpha_fixture_register
      - external_alpha_fixture_workflow_packets
      - benchmark_corpus_manifest
      - reference_workspace_fixtures
      - alpha_wedge_matrix
      - alpha_exit_gate_scoreboard
    command: python3 ci/check_benchmark_fixture_register.py --repo-root .
    report_ref: artifacts/milestones/m2/captures/benchmark_fixture_register_validation_capture.json

  - consumer_id: external_alpha_launch_bundle_validator
    title: External alpha launch-bundle validator and CLI gallery
    reads:
      - external_alpha_tsjs_launch_bundle_manifest
      - external_alpha_python_launch_bundle_manifest
      - external_alpha_archetype_seed_rows
      - external_alpha_fixture_register
      - alpha_wedge_matrix
    command: python3 ci/check_alpha_launch_bundles.py --repo-root . --render-gallery
    report_ref: artifacts/milestones/m2/captures/launch_bundle_validation_capture.json

  - consumer_id: start_center_bundle_gallery
    title: Start Center launch-bundle gallery projection
    reads:
      - external_alpha_tsjs_launch_bundle_manifest
      - external_alpha_python_launch_bundle_manifest
    command: cargo test -p aureline-shell start_center::tests::alpha_bundle_gallery_projects_manifest_rows_for_start_center
    report_ref: crates/aureline-shell/src/start_center/mod.rs
