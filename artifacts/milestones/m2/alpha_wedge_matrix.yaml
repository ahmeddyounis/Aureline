# External alpha launch-wedge matrix.
#
# Canonical scope surface for the external alpha claim set. Reviewers and
# downstream proof lanes should cite these rows instead of restating scope in
# local packets.

schema_version: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

matrix_id: alpha_launch_wedge_matrix
scope_state: frozen
human_entrypoint_ref: docs/milestones/m2_alpha_scope.md
scoreboard_ref: artifacts/milestones/m2/exit_gate_scoreboard.yaml
dependency_graph_ref: artifacts/milestones/m2/dependency_graph.yaml
validator:
  script_ref: ci/check_alpha_scope.py
  command: python3 ci/check_alpha_scope.py --repo-root .

source_contract_refs:
  - artifacts/product/language_bundle_rows.yaml
  - artifacts/product/p0_persona_rows.yaml
  - artifacts/product/replacement_grade_cutlines.yaml
  - artifacts/compat/reference_workspace_rows.yaml
  - artifacts/qe/workflow_bundle_ids.yaml
  - docs/product/known_limits_contract.md
  - artifacts/program/design_partner_intake_checklist.yaml

change_control:
  late_addition_policy: explicit_scope_review_or_waiver
  addition_requires_refs:
    - artifacts/milestones/m2/alpha_wedge_matrix.yaml
    - artifacts/milestones/m2/exit_gate_scoreboard.yaml
    - artifacts/milestones/m2/dependency_graph.yaml
    - artifacts/milestones/m2/proof_packets/alpha_scope.md#known-limits
  waiver_fields_required:
    - requested_change
    - affected_claim_surface
    - rollback_or_narrowing_path
    - fresh_evidence_required
    - docs_support_migration_impact
    - owner
    - expiry
  default_decision_for_unlisted_wedge: no_alpha_claim

scope_state_vocabulary:
  - in_scope_alpha
  - held_for_later
  - out_of_scope_alpha

claim_posture_vocabulary:
  - alpha_claim
  - seed_only
  - explicitly_out_of_scope

deployment_claim_vocabulary:
  - local_desktop
  - helper_backed_local
  - devcontainer_helper_backed
  - remote_helper_backed_seed_only
  - managed_cloud_out_of_scope

support_state_vocabulary:
  - alpha_supported
  - alpha_limited
  - evidence_pending
  - out_of_scope

protected_fixture_refs:
  - fixture_id: fixture.alpha.ts_js_reference_workspace
    wedge_ref: alpha_wedge:typescript_javascript
    fixture_ref: fixtures/workspaces/reference/ts_web_app_archetype_seed.json
    exercises_scoreboard_rows:
      - scoreboard_row:alpha_scope.ts_js_navigation
      - scoreboard_row:alpha_scope.ts_js_run_test_debug
      - scoreboard_row:alpha_scope.local_deployment
      - scoreboard_row:alpha_scope.helper_backed_deployment

  - fixture_id: fixture.alpha.python_reference_workspace
    wedge_ref: alpha_wedge:python
    fixture_ref: fixtures/workspaces/reference/python_data_app_archetype_seed.json
    exercises_scoreboard_rows:
      - scoreboard_row:alpha_scope.python_environment_tests
      - scoreboard_row:alpha_scope.python_debug_refactor
      - scoreboard_row:alpha_scope.local_deployment
      - scoreboard_row:alpha_scope.helper_backed_deployment

  - fixture_id: fixture.alpha.shared_benchmark_manifest
    wedge_ref: alpha_wedge:shared
    fixture_ref: fixtures/benchmarks/corpus_manifest.yaml
    exercises_scoreboard_rows:
      - scoreboard_row:alpha_scope.benchmark_fixtures
      - scoreboard_row:alpha_scope.migration_parity

wedge_rows:
  - wedge_id: alpha_wedge:typescript_javascript
    title: TypeScript / JavaScript web app or service
    scope_state: in_scope_alpha
    claim_posture: alpha_claim
    public_claim_summary: >
      External alpha can claim a narrow TS/JS web-app or service workflow
      where navigation is useful before full indexing, basic LSP and task/test
      loops are present, and Git review basics are inspectable.
    launch_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    persona_refs:
      - persona:p0.typescript_web_app_developer
    required_scoreboard_rows:
      - scoreboard_row:alpha_scope.ts_js_navigation
      - scoreboard_row:alpha_scope.ts_js_run_test_debug
      - scoreboard_row:alpha_scope.ts_js_git_review
      - scoreboard_row:alpha_scope.local_deployment
      - scoreboard_row:alpha_scope.helper_backed_deployment
      - scoreboard_row:alpha_scope.docs_known_limits
      - scoreboard_row:alpha_scope.supportability
    protected_workflows:
      - workflow_id: workflow.alpha.ts_js.open_to_first_useful_result
        title: Open repo to first useful file, symbol, or route result
        acceptance_refs:
          - artifacts/compat/ts_js_acceptance_rows.yaml#ts_js_acceptance_row:monorepo_first_useful_result
        scoreboard_row_ref: scoreboard_row:alpha_scope.ts_js_navigation
        proof_packet_required: proof_packet:alpha.ts_js_navigation
        required_surfaces:
          - start_center_and_open_flow
          - reference_workspace_checkout
          - docs_reference_page
          - support_export_bundle

      - workflow_id: workflow.alpha.ts_js.rename_preview
        title: Project-reference rename preview with explicit partial-index truth
        acceptance_refs:
          - artifacts/compat/ts_js_acceptance_rows.yaml#ts_js_acceptance_row:rename_across_project_references
        scoreboard_row_ref: scoreboard_row:alpha_scope.ts_js_navigation
        proof_packet_required: proof_packet:alpha.ts_js_navigation
        required_surfaces:
          - reference_workspace_checkout
          - release_evidence_packet
          - support_export_bundle

      - workflow_id: workflow.alpha.ts_js.test_debug_loop
        title: Discover, run, rerun, and debug targeted tests
        acceptance_refs:
          - artifacts/compat/ts_js_acceptance_rows.yaml#ts_js_acceptance_row:test_discover_run_rerun_debug
        scoreboard_row_ref: scoreboard_row:alpha_scope.ts_js_run_test_debug
        proof_packet_required: proof_packet:alpha.ts_js_run_test_debug
        required_surfaces:
          - task_event_run_panel
          - test_runner_panel
          - debug_session_panel
          - terminal_and_repl_panel

      - workflow_id: workflow.alpha.ts_js.git_review_basics
        title: Clone or open, branch, diff, commit, and review local changes
        acceptance_refs:
          - artifacts/product/p0_persona_rows.yaml#persona:p0.typescript_web_app_developer
        scoreboard_row_ref: scoreboard_row:alpha_scope.ts_js_git_review
        proof_packet_required: proof_packet:alpha.ts_js_git_review
        required_surfaces:
          - reference_workspace_checkout
          - release_evidence_packet
          - support_export_bundle
    claimed_deployment_rows:
      - deployment_claim_id: deployment.alpha.ts_js.local_desktop
        title: Local desktop with local repo state
        claim_class: local_desktop
        support_state: alpha_supported
        deployment_profile_ref: artifacts/deployment/locality_matrix.yaml#individual_local
        scoreboard_row_ref: scoreboard_row:alpha_scope.local_deployment

      - deployment_claim_id: deployment.alpha.ts_js.helper_backed_language_services
        title: Local desktop with helper-backed parser, language, task, and Git services
        claim_class: helper_backed_local
        support_state: alpha_limited
        deployment_profile_ref: artifacts/deployment/locality_matrix.yaml#individual_local
        scoreboard_row_ref: scoreboard_row:alpha_scope.helper_backed_deployment
    explicit_out_of_scope:
      - out_of_scope_id: out_of_scope.alpha.ts_js.managed_cloud_daily_driver
        title: Managed-cloud daily-driver parity
        claim_class: managed_cloud_out_of_scope
        reason: >
          Managed-cloud workspace parity is not part of the external alpha
          claim. Any managed row must arrive through scope review, dependency
          graph update, and known-limit publication.
        reopening_requires:
          - waiver_or_scope_review_ref
          - scoreboard_row_ref
          - known_limit_note_ref
    required_packet_refs:
      - proof_packet:alpha.ts_js_navigation
      - proof_packet:alpha.ts_js_run_test_debug
      - proof_packet:alpha.ts_js_git_review
      - proof_packet:alpha.docs_known_limits
      - proof_packet:alpha.supportability

  - wedge_id: alpha_wedge:python
    title: Python service or data app
    scope_state: in_scope_alpha
    claim_posture: alpha_claim
    public_claim_summary: >
      External alpha can claim a narrow Python service or data-app workflow
      with interpreter selection, pytest-oriented run/test basics, debug
      launch, refactor basics, notebook handoff disclosure, and Git review.
    launch_bundle_refs:
      - launch_bundle:python_service_or_data_app.seed
    archetype_row_refs:
      - archetype_row:python_service_or_data_app
    persona_refs:
      - persona:p0.python_service_or_data_app_developer
    required_scoreboard_rows:
      - scoreboard_row:alpha_scope.python_environment_tests
      - scoreboard_row:alpha_scope.python_debug_refactor
      - scoreboard_row:alpha_scope.local_deployment
      - scoreboard_row:alpha_scope.helper_backed_deployment
      - scoreboard_row:alpha_scope.docs_known_limits
      - scoreboard_row:alpha_scope.supportability
    protected_workflows:
      - workflow_id: workflow.alpha.python.interpreter_and_tests
        title: Select interpreter, discover tests, run targeted pytest
        acceptance_refs:
          - artifacts/compat/reference_workspace_rows.yaml#archetype_row:python_service_or_data_app
        scoreboard_row_ref: scoreboard_row:alpha_scope.python_environment_tests
        proof_packet_required: proof_packet:alpha.python_environment_tests
        required_surfaces:
          - reference_workspace_checkout
          - task_event_run_panel
          - test_runner_panel
          - support_export_bundle

      - workflow_id: workflow.alpha.python.debug_and_refactor
        title: Debug launch, refactor basics, and notebook handoff honesty
        acceptance_refs:
          - artifacts/compat/reference_workspace_rows.yaml#archetype_row:python_service_or_data_app
        scoreboard_row_ref: scoreboard_row:alpha_scope.python_debug_refactor
        proof_packet_required: proof_packet:alpha.python_debug_refactor
        required_surfaces:
          - debug_session_panel
          - release_evidence_packet
          - known_limits_note_page
          - support_export_bundle

      - workflow_id: workflow.alpha.python.git_review_basics
        title: Clone or open, branch, diff, commit, and review local changes
        acceptance_refs:
          - artifacts/product/p0_persona_rows.yaml#persona:p0.python_service_or_data_app_developer
        scoreboard_row_ref: scoreboard_row:alpha_scope.python_debug_refactor
        proof_packet_required: proof_packet:alpha.python_debug_refactor
        required_surfaces:
          - reference_workspace_checkout
          - release_evidence_packet
          - support_export_bundle
    claimed_deployment_rows:
      - deployment_claim_id: deployment.alpha.python.local_desktop
        title: Local desktop with local repo state
        claim_class: local_desktop
        support_state: alpha_supported
        deployment_profile_ref: artifacts/deployment/locality_matrix.yaml#individual_local
        scoreboard_row_ref: scoreboard_row:alpha_scope.local_deployment

      - deployment_claim_id: deployment.alpha.python.devcontainer_helper
        title: Local desktop with helper-backed Python environment or devcontainer
        claim_class: devcontainer_helper_backed
        support_state: alpha_limited
        deployment_profile_ref: artifacts/deployment/locality_matrix.yaml#individual_local
        scoreboard_row_ref: scoreboard_row:alpha_scope.helper_backed_deployment
    explicit_out_of_scope:
      - out_of_scope_id: out_of_scope.alpha.python.managed_cloud_daily_driver
        title: Managed-cloud daily-driver parity
        claim_class: managed_cloud_out_of_scope
        reason: >
          Managed-cloud workspace parity and hosted notebook/kernel parity are
          not alpha claims. Any widening must update the matrix, scoreboard,
          dependency graph, and known-limit packet together.
        reopening_requires:
          - waiver_or_scope_review_ref
          - scoreboard_row_ref
          - known_limit_note_ref
    required_packet_refs:
      - proof_packet:alpha.python_environment_tests
      - proof_packet:alpha.python_debug_refactor
      - proof_packet:alpha.docs_known_limits
      - proof_packet:alpha.supportability

non_claimed_rows:
  - row_id: alpha_scope.hold.java_kotlin_service
    title: Java / Kotlin service
    scope_state: held_for_later
    claim_posture: seed_only
    existing_seed_refs:
      - artifacts/compat/reference_workspace_rows.yaml#archetype_row:java_or_kotlin_service
    widening_requires:
      - scope_review
      - scoreboard_row
      - proof_packet
      - known_limit_note

  - row_id: alpha_scope.hold.rust_workspace
    title: Rust workspace
    scope_state: held_for_later
    claim_posture: seed_only
    existing_seed_refs:
      - artifacts/compat/reference_workspace_rows.yaml#archetype_row:rust_workspace
    widening_requires:
      - scope_review
      - scoreboard_row
      - proof_packet
      - known_limit_note

  - row_id: alpha_scope.hold.go_service
    title: Go service or monorepo slice
    scope_state: held_for_later
    claim_posture: seed_only
    existing_seed_refs:
      - artifacts/compat/reference_workspace_rows.yaml
    widening_requires:
      - scope_review
      - scoreboard_row
      - proof_packet
      - known_limit_note

  - row_id: alpha_scope.out.browser_or_mobile_companion_parity
    title: Browser or mobile companion parity
    scope_state: out_of_scope_alpha
    claim_posture: explicitly_out_of_scope
    reason: >
      Companion surfaces remain scoped handoff or inspection surfaces and are
      not daily-driver alpha parity claims.
    widening_requires:
      - scope_review
      - scoreboard_row
      - proof_packet
      - known_limit_note

