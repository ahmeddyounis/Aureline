# External alpha proof artifact index.
#
# Canonical join point for alpha proof lanes, freshness metadata, exact-build
# identity, review packets, and same-change-set public-truth updates.

schema_version: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

index_id: alpha_proof_artifact_index
human_entrypoint_ref: docs/review/m2_review_packet_template.md
truth_update_workflow_ref: docs/governance/m2_truth_update_workflow.md
matrix_ref: artifacts/milestones/m2/alpha_wedge_matrix.yaml
scoreboard_ref: artifacts/milestones/m2/exit_gate_scoreboard.yaml
dependency_graph_ref: artifacts/milestones/m2/dependency_graph.yaml

validator:
  script_ref: ci/check_alpha_proof_artifact_index.py
  command: python3 ci/check_alpha_proof_artifact_index.py --repo-root .

upstream_scope_contract_refs:
  - artifacts/milestones/m2/alpha_wedge_matrix.yaml
  - artifacts/milestones/m2/exit_gate_scoreboard.yaml
  - artifacts/milestones/m2/dependency_graph.yaml

freshness_policy:
  policy_ref: docs/governance/evidence_freshness_policy.md
  slo_catalog_ref: artifacts/governance/evidence_freshness_slos.yaml
  rerun_trigger_catalog_ref: artifacts/governance/evidence_rerun_triggers.yaml
  metadata_catalog_ref: artifacts/evidence/evidence_metadata_fields.yaml
  shared_header_schema_ref: schemas/governance/evidence_packet_header.schema.json
  default_stale_after: P14D
  required_metadata_fields:
    - packet_id
    - evidence_id
    - captured_at
    - stale_after
    - source_revision
    - trigger_revision
    - channel_context
    - deployment_context
    - exact_build_identity_ref
    - owner_dri
    - claim_row_refs

storage_roots:
  - root_id: alpha_proof_packets
    root_ref: artifacts/milestones/m2/proof_packets/
  - root_id: alpha_validation_captures
    root_ref: artifacts/milestones/m2/captures/
  - root_id: alpha_milestone_artifacts
    root_ref: artifacts/milestones/m2/

registration_coverage:
  plan_source_glob: .plans/M02-*.md
  registration_rule: every_plan_ref_has_claimable_or_seed_lane
  required_plan_refs:
    - .plans/M02-001.md
    - .plans/M02-002.md
    - .plans/M02-003.md
    - .plans/M02-004.md
    - .plans/M02-005.md
    - .plans/M02-006.md
  blocked_without_lane_message: >
    Alpha work cannot claim readiness until its evidence is registered in this
    index with owner, freshness, exact-build identity, and same-change-set
    truth refs.

claim_truth_surfaces:
  - surface_id: alpha_docs_public_truth
    category: docs_ref
    artifact_ref: docs/milestones/m2_alpha_scope.md
    required_for_claim_change: true

  - surface_id: alpha_migration_notes
    category: migration_ref
    artifact_ref: docs/migration/source_ecosystem_coverage_matrix.md
    required_for_claim_change: true

  - surface_id: alpha_help_truth
    category: help_truth_ref
    artifact_ref: docs/docs/help_about_service_health_routes.md
    required_for_claim_change: true

  - surface_id: alpha_known_limits
    category: known_limits_ref
    artifact_ref: artifacts/feedback/external_alpha_known_limits.md
    required_for_claim_change: true

  - surface_id: alpha_support_export_truth
    category: support_export_ref
    artifact_ref: docs/support/support_bundle_contract.md
    required_for_claim_change: true

