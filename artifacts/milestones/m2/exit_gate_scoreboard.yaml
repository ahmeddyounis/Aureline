# External alpha go/no-go scoreboard.
#
# This file names the rows later alpha proof lanes must cite. It is a scope and
# evidence routing surface, not a statement that alpha feature proof is already
# complete.

schema_version: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

scoreboard_id: alpha_exit_gate_scoreboard
human_entrypoint_ref: docs/milestones/m2_alpha_scope.md
matrix_ref: artifacts/milestones/m2/alpha_wedge_matrix.yaml
dependency_graph_ref: artifacts/milestones/m2/dependency_graph.yaml
validator:
  script_ref: ci/check_alpha_scope.py
  command: python3 ci/check_alpha_scope.py --repo-root .

current_state_vocabulary:
  - seeded
  - not_yet_measured
  - blocked_pending_packet
  - green
  - yellow
  - red
  - waived_with_expiry

go_no_go_vocabulary:
  - scope_go
  - conditional_go
  - no_go
  - blocked_until_packet_current

proof_lane_class_vocabulary:
  - wedge_workflow
  - deployment_claim
  - migration_and_entry
  - supportability
  - docs_and_known_limits
  - design_partner_intake
  - schema_record_registry
  - benchmark_fixture_register
  - proof_artifact_index
  - scope_change_control

scoreboard_rows:
  - row_id: scoreboard_row:alpha_scope.scope_change_control
    title: Scope freeze and late addition guard
    proof_lane_class: scope_change_control
    lane: lane:product_scope_review
    owner_dri: "@ahmeddyounis"
    current_state: seeded
    go_no_go_state: scope_go
    wedge_refs:
      - alpha_wedge:shared
    required_evidence_refs:
      - artifacts/milestones/m2/alpha_wedge_matrix.yaml
      - artifacts/milestones/m2/exit_gate_scoreboard.yaml
      - artifacts/milestones/m2/dependency_graph.yaml
    proof_packet_refs:
      - proof_packet:alpha.scope_freeze
    waiver_required_for_green: false
    consumer_rule: >
      Any new alpha wedge, deployment row, or public-facing claim widening must
      update this row and carry an explicit scope review or waiver.

  - row_id: scoreboard_row:alpha_scope.proof_artifact_index
    title: Proof artifact index and same-change truth workflow
    proof_lane_class: proof_artifact_index
    lane: lane:docs_public_truth
    owner_dri: "@ahmeddyounis"
    current_state: green
    go_no_go_state: scope_go
    wedge_refs:
      - alpha_wedge:shared
    required_evidence_refs:
      - artifacts/milestones/m2/artifact_index.yaml
      - docs/review/m2_review_packet_template.md
      - docs/governance/m2_truth_update_workflow.md
      - artifacts/milestones/m2/proof_packets/artifact_index.md
      - ci/check_alpha_proof_artifact_index.py
      - artifacts/milestones/m2/captures/artifact_index_validation_capture.json
    proof_packet_refs:
      - proof_packet:alpha.proof_artifact_index
    waiver_required_for_green: false
    consumer_rule: >
      Alpha proof lanes register evidence here before claiming readiness.
      Claim-bearing rows must carry owner, freshness, exact-build identity, and
      same-change docs, migration, Help/About, known-limits, and support-export
      refs.

  - row_id: scoreboard_row:alpha_scope.ts_js_navigation
    title: TS/JS navigation and rename-preview floor
    proof_lane_class: wedge_workflow
    lane: lane:benchmark_lab
    owner_dri: "@ahmeddyounis"
    current_state: not_yet_measured
    go_no_go_state: blocked_until_packet_current
    wedge_refs:
      - alpha_wedge:typescript_javascript
    scoreboard_family_ref: workflow_bundle_or_archetype_proof_scoreboard
    required_evidence_refs:
      - artifacts/compat/ts_js_acceptance_rows.yaml
      - fixtures/workspaces/reference/ts_web_app_archetype_seed.json
    proof_packet_refs:
      - proof_packet:alpha.ts_js_navigation
    waiver_required_for_green: true
    consumer_rule: >
      TS/JS navigation, quick-open, route, symbol, and rename-preview proof
      lanes cite this row rather than widening the wedge locally.

  - row_id: scoreboard_row:alpha_scope.ts_js_run_test_debug
    title: TS/JS task, test, and debug loop floor
    proof_lane_class: wedge_workflow
    lane: lane:benchmark_lab
    owner_dri: "@ahmeddyounis"
    current_state: not_yet_measured
    go_no_go_state: blocked_until_packet_current
    wedge_refs:
      - alpha_wedge:typescript_javascript
    scoreboard_family_ref: task_run_test_debug_parity_scoreboard
    required_evidence_refs:
      - artifacts/compat/ts_js_acceptance_rows.yaml
      - artifacts/bench/fitness_function_catalog.yaml
    proof_packet_refs:
      - proof_packet:alpha.ts_js_run_test_debug
    waiver_required_for_green: true
    consumer_rule: >
      TS/JS task, test, terminal, and debug proof packets cite this row and keep
      their proof scoped to the declared local/helper-backed rows.

  - row_id: scoreboard_row:alpha_scope.ts_js_git_review
    title: TS/JS Git and review basics floor
    proof_lane_class: wedge_workflow
    lane: lane:release_evidence
    owner_dri: "@ahmeddyounis"
    current_state: not_yet_measured
    go_no_go_state: blocked_until_packet_current
    wedge_refs:
      - alpha_wedge:typescript_javascript
    scoreboard_family_ref: bootstrap_and_entry_parity_scoreboard
    required_evidence_refs:
      - artifacts/product/p0_persona_rows.yaml
      - fixtures/workspaces/reference/ts_web_app_archetype_seed.json
    proof_packet_refs:
      - proof_packet:alpha.ts_js_git_review
    waiver_required_for_green: true
    consumer_rule: >
      Git basics can prove clone/open, branch, diff, commit, and review for the
      TS/JS alpha wedge without implying full hosted-provider parity.

  - row_id: scoreboard_row:alpha_scope.python_environment_tests
    title: Python interpreter, environment, and pytest floor
    proof_lane_class: wedge_workflow
    lane: lane:benchmark_lab
    owner_dri: "@ahmeddyounis"
    current_state: not_yet_measured
    go_no_go_state: blocked_until_packet_current
    wedge_refs:
      - alpha_wedge:python
    scoreboard_family_ref: task_run_test_debug_parity_scoreboard
    required_evidence_refs:
      - artifacts/compat/reference_workspace_rows.yaml
      - fixtures/workspaces/reference/python_data_app_archetype_seed.json
    proof_packet_refs:
      - proof_packet:alpha.python_environment_tests
    waiver_required_for_green: true
    consumer_rule: >
      Python environment, interpreter, test discovery, and pytest lanes cite
      this row and keep notebook claims to the handoff caveat.

  - row_id: scoreboard_row:alpha_scope.python_debug_refactor
    title: Python debug, refactor basics, notebook handoff, and Git floor
    proof_lane_class: wedge_workflow
    lane: lane:release_evidence
    owner_dri: "@ahmeddyounis"
    current_state: not_yet_measured
    go_no_go_state: blocked_until_packet_current
    wedge_refs:
      - alpha_wedge:python
    scoreboard_family_ref: workflow_bundle_or_archetype_proof_scoreboard
    required_evidence_refs:
      - artifacts/compat/reference_workspace_rows.yaml
      - fixtures/workspaces/reference/python_data_app_archetype_seed.json
    proof_packet_refs:
      - proof_packet:alpha.python_debug_refactor
    waiver_required_for_green: true
    consumer_rule: >
      Python debug/refactor/Git proof lanes cite this row and disclose notebook
      adjacency as handoff scope, not full notebook parity.

  - row_id: scoreboard_row:alpha_scope.local_deployment
    title: Local desktop deployment claim
    proof_lane_class: deployment_claim
    lane: lane:release_evidence
    owner_dri: "@ahmeddyounis"
    current_state: seeded
    go_no_go_state: conditional_go
    wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    required_evidence_refs:
      - artifacts/deployment/locality_matrix.yaml
      - artifacts/compat/qualification_matrix_seed.yaml
    proof_packet_refs:
      - proof_packet:alpha.local_deployment
    waiver_required_for_green: true
    consumer_rule: >
      Alpha deployment claims default to local desktop. Any managed, cloud, or
      broad remote claim must open a new scope review.

  - row_id: scoreboard_row:alpha_scope.helper_backed_deployment
    title: Helper-backed local service claim
    proof_lane_class: deployment_claim
    lane: lane:release_evidence
    owner_dri: "@ahmeddyounis"
    current_state: seeded
    go_no_go_state: conditional_go
    wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    required_evidence_refs:
      - artifacts/remote/host_boundary_matrix.yaml
      - artifacts/deployment/locality_matrix.yaml
    proof_packet_refs:
      - proof_packet:alpha.helper_backed_deployment
    waiver_required_for_green: true
    consumer_rule: >
      Helper-backed rows cover local parser, language, task, Git, and
      environment helpers only. They do not imply managed workspace parity.

  - row_id: scoreboard_row:alpha_scope.migration_parity
    title: Migration and first-run parity routing
    proof_lane_class: migration_and_entry
    lane: lane:docs_public_truth
    owner_dri: "@ahmeddyounis"
    current_state: seeded
    go_no_go_state: conditional_go
    wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    scoreboard_family_ref: migration_fidelity_scoreboard
    required_evidence_refs:
      - artifacts/qe/workflow_bundle_ids.yaml
      - artifacts/program/design_partner_intake_checklist.yaml
      - fixtures/benchmarks/corpus_manifest.yaml
      - artifacts/bundles/tsjs_launch_bundle_alpha.yaml
      - artifacts/bundles/python_launch_bundle_alpha.yaml
      - artifacts/certification/m2_archetype_seed_rows.yaml
      - artifacts/migration/m2_parity_scoreboard.yaml
      - artifacts/migration/import_gap_taxonomy.yaml
      - docs/migration/import_diagnostics_packet.md
      - fixtures/migration/parity_alpha_cases/manifest.yaml
      - artifacts/feedback/external_alpha_known_limits.md
      - ci/check_migration_parity_alpha.py
      - artifacts/milestones/m2/proof_packets/migration_parity.md
      - artifacts/milestones/m2/captures/migration_parity_validation_capture.json
    proof_packet_refs:
      - proof_packet:alpha.migration_parity
    waiver_required_for_green: true
    consumer_rule: >
      Migration, first-run, import, issue-template, and design-partner feedback
      lanes cite this row for switching truth instead of creating per-tool
      scoreboards.

  - row_id: scoreboard_row:alpha_scope.design_partner_intake
    title: Design-partner intake readiness
    proof_lane_class: design_partner_intake
    lane: lane:product_scope_review
    owner_dri: "@ahmeddyounis"
    current_state: green
    go_no_go_state: scope_go
    wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    required_evidence_refs:
      - artifacts/program/design_partner_intake_checklist.yaml
      - docs/program/design_partner_and_public_proof_packet.md
      - docs/alpha/design_partner_guide.md
      - artifacts/milestones/m2/design_partner_intake_packet.md
      - artifacts/milestones/m2/design_partner_task_pack.md
      - artifacts/feedback/design_partner_feedback_taxonomy.yaml
      - artifacts/feedback/external_alpha_known_limits.md
      - fixtures/feedback/external_alpha_cases/
      - ci/check_design_partner_alpha.py
      - artifacts/milestones/m2/captures/design_partner_intake_validation_capture.json
    proof_packet_refs:
      - proof_packet:alpha.design_partner_intake
    waiver_required_for_green: false
    consumer_rule: >
      Design-partner repositories, support packets, reference workspaces,
      feedback reports, and known-limit updates must enter through the shared
      intake checklist, external alpha packet, and feedback taxonomy before
      citing this scoreboard row.

  - row_id: scoreboard_row:alpha_scope.benchmark_fixtures
    title: Benchmark fixture register readiness
    proof_lane_class: benchmark_fixture_register
    lane: lane:benchmark_lab
    owner_dri: "@ahmeddyounis"
    current_state: green
    go_no_go_state: conditional_go
    wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    required_evidence_refs:
      - artifacts/benchmarks/m2_fixture_register.yaml
      - docs/benchmarks/privacy_cleared_corpus_workflow.md
      - fixtures/reference_workspaces/m2/
      - fixtures/benchmarks/corpus_manifest.yaml
      - artifacts/qe/workflow_bundle_ids.yaml
      - artifacts/bench/fitness_function_catalog.yaml
      - ci/check_benchmark_fixture_register.py
      - artifacts/milestones/m2/captures/benchmark_fixture_register_validation_capture.json
      - artifacts/certification/m2_archetype_seed_rows.yaml
      - artifacts/milestones/m2/captures/launch_bundle_validation_capture.json
    proof_packet_refs:
      - proof_packet:alpha.benchmark_fixtures
    waiver_required_for_green: true
    consumer_rule: >
      Benchmark and task-success proof lanes cite this row before making a
      publishable performance, first-useful-work, or replacement-grade claim.
      Packets cite the fixture register row before citing workspace descriptor
      paths or corpus ids.

  - row_id: scoreboard_row:alpha_scope.schema_record_registry
    title: Schema and record registry readiness
    proof_lane_class: schema_record_registry
    lane: lane:release_evidence
    owner_dri: "@ahmeddyounis"
    current_state: green
    go_no_go_state: conditional_go
    wedge_refs:
      - alpha_wedge:shared
    required_evidence_refs:
      - artifacts/contracts/contract_families.yaml
      - artifacts/contracts/frozen_surface_manifest.yaml
      - schemas/governance/evidence_packet_header.schema.json
      - artifacts/governance/schema_registry_alpha.yaml
      - artifacts/governance/record_class_registry_alpha.yaml
      - docs/governance/managed_copy_vs_local_truth.md
      - fixtures/governance/schema_record_registry_alpha_cases/manifest.yaml
      - ci/check_schema_record_registry_alpha.py
      - artifacts/milestones/m2/proof_packets/schema_record_registry_alpha.md
      - artifacts/milestones/m2/captures/schema_record_registry_alpha_validation_capture.json
    proof_packet_refs:
      - proof_packet:alpha.schema_record_registry
    waiver_required_for_green: true
    consumer_rule: >
      Schema, record-registry, and proof-packet rows cite this row so alpha
      evidence stays versioned and exportable.

  - row_id: scoreboard_row:alpha_scope.docs_known_limits
    title: Docs, known limits, and support copy alignment
    proof_lane_class: docs_and_known_limits
    lane: lane:docs_public_truth
    owner_dri: "@ahmeddyounis"
    current_state: seeded
    go_no_go_state: conditional_go
    wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    scoreboard_family_ref: docs_known_limits_support_copy_alignment_scoreboard
    required_evidence_refs:
      - docs/product/known_limits_contract.md
      - artifacts/product/known_limit_classes.yaml
      - artifacts/milestones/m2/proof_packets/alpha_scope.md
      - artifacts/feedback/external_alpha_known_limits.md
      - artifacts/milestones/m2/proof_packets/launch_bundles_and_archetypes.md
    proof_packet_refs:
      - proof_packet:alpha.docs_known_limits
    waiver_required_for_green: true
    consumer_rule: >
      Docs, Help/About, release notes, issue templates, support copy, and known
      limits must cite this row before widening an alpha claim.

  - row_id: scoreboard_row:alpha_scope.supportability
    title: Supportability and support-export alpha floor
    proof_lane_class: supportability
    lane: lane:support_export
    owner_dri: "@ahmeddyounis"
    current_state: not_yet_measured
    go_no_go_state: blocked_until_packet_current
    wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    required_evidence_refs:
      - docs/support/support_bundle_contract.md
      - docs/support/project_doctor_packet.md
      - artifacts/program/design_partner_intake_checklist.yaml
    proof_packet_refs:
      - proof_packet:alpha.supportability
    waiver_required_for_green: true
    consumer_rule: >
      Safe mode, Project Doctor, support export, issue intake, and redaction
      proof lanes cite this row before external alpha can widen.

acceptance_state_coverage:
  - case_id: alpha_scope_seeded_rows_validate
    exercises_state: seeded
    fixture_ref: artifacts/milestones/m2/alpha_wedge_matrix.yaml
    expected_validator_result: pass

  - case_id: alpha_scope_missing_packet_blocks_go
    exercises_state: blocked_pending_packet
    fixture_ref: artifacts/milestones/m2/exit_gate_scoreboard.yaml#scoreboard_rows
    expected_validator_result: pass_with_blocked_go_no_go

  - case_id: alpha_scope_late_wedge_requires_review
    exercises_state: scope_review_required
    fixture_ref: artifacts/milestones/m2/alpha_wedge_matrix.yaml#non_claimed_rows
    expected_validator_result: pass_only_when_widening_requires_scope_review

  - case_id: alpha_scope_claim_truth_requires_same_change_refs
    exercises_state: same_change_truth_refs_required
    fixture_ref: artifacts/milestones/m2/artifact_index.yaml#proof_lanes
    expected_validator_result: pass_only_when_claim_rows_name_docs_migration_help_known_limits_and_support_refs
