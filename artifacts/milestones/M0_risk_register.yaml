schema_version: 1
milestone_id: pre-implementation-foundations
as_of: "2026-04-21"
overall_posture: yellow

explicit_calls:
  renderer_viability: yellow
  benchmark_governance: yellow
  ownership: yellow
  public_truth_seeds: yellow
  unresolved_narrowing_decisions: red

risks:
  - risk_id: RISK-001
    title: Renderer direction is frozen before native-window viability is proven
    severity: medium
    likelihood: medium
    posture: yellow
    owner: "@ahmeddyounis"
    affected_lanes:
      - aureline-render
      - aureline-shell-spike
    dependency_ids:
      - progdep.renderer_native_window_viability
    correction_trigger_ids:
      - corr.renderer_scope_descoping
    summary: >
      The spike proves trace hooks, damage classification, and surface
      ownership, but it still runs headless and therefore does not yet prove
      full native-window or accessibility-bridge behavior.
    evidence_refs:
      - docs/adr/0002-renderer-text-stack-and-shaping-fallback.md
      - artifacts/render/spike_capabilities.json
      - docs/design/shell_spike_composition_notes.md
    mitigation:
      - Keep renderer viability yellow in the M0 pack rather than claiming green.
      - Make native-window wiring one of the first M1 shell tasks.
    contingency: Narrow M1 shell claims to spike-proven surfaces until native binding lands.

  - risk_id: RISK-002
    title: Benchmark governance may overstate maturity if the seed is treated as release-grade
    severity: high
    likelihood: medium
    posture: yellow
    owner: "@ahmeddyounis"
    affected_lanes:
      - benchmark_lab
      - governance_packets
    dependency_ids:
      - progdep.benchmark_hardware_baseline
    correction_trigger_ids:
      - corr.benchmark_claim_requires_exception
    summary: >
      The benchmark lab, nightly workflow, and dashboard seed are real, but no
      council-approved hardware baseline exists yet.
    evidence_refs:
      - docs/governance/benchmark_council_charter.md
      - docs/benchmarks/corpus_governance.md
      - artifacts/bench/protected_metrics.yaml
      - artifacts/benchmarks/dashboard_seed/dashboard.json
      - .github/workflows/nightly_benchmark.yml
    mitigation:
      - Keep all benchmark outputs labeled as self-capture or provisional where applicable.
      - Treat the dashboard as a seed and block release-grade comparability claims.
    contingency: Hold benchmark-governed claims to seed-only language until the council ratifies a hardware baseline.

  - risk_id: RISK-003
    title: Protected-lane backup coverage remains a single-maintainer waiver
    severity: high
    likelihood: medium
    posture: yellow
    owner: "@ahmeddyounis"
    affected_lanes:
      - governance_packets
      - release_evidence
      - benchmark_lab
    dependency_ids:
      - progdep.protected_backup_owner_coverage
    correction_trigger_ids:
      - corr.protected_waiver_rebaseline
    summary: >
      Every protected lane has a DRI, but every protected lane still relies on
      the same backup waiver that expires on 2026-10-19.
    evidence_refs:
      - artifacts/governance/ownership_matrix.yaml
      - docs/governance/dri_map.md
    mitigation:
      - Keep ownership yellow in the scorecard.
      - Preserve self-escalation and public contributor-thread routes in the waiver.
    contingency: Narrow release-bearing lanes if the waiver approaches expiry without new backup coverage.

  - risk_id: RISK-004
    title: Exact-build and clean-room evidence remain below the claimed closure bar
    severity: high
    likelihood: high
    posture: red
    owner: "@ahmeddyounis"
    affected_lanes:
      - release_evidence
      - docs_public_truth
    dependency_ids:
      - progdep.exact_build_cleanroom_parity
    correction_trigger_ids:
      - corr.exact_build_slip_rebaseline
    summary: >
      The exact-build identity decision is still open and the clean-room lane
      remains needs-review because of repo-wide build failures in prior
      verification.
    evidence_refs:
      - artifacts/governance/decision_index.yaml
      - docs/build/exact_build_identity_model.md
      - docs/build/cleanroom_rebuild_lane.md
    mitigation:
      - Keep release-evidence yellow and unresolved narrowing decisions red.
      - Preserve the clean-room lane as a seed rather than a green gate.
    contingency: Hold any M1/M2 public-proof or supportability claim that depends on exact-build parity.

  - risk_id: RISK-005
    title: Accessibility review is seeded, but claim-bearing proof and locale follow-through are still incomplete
    severity: high
    likelihood: medium
    posture: yellow
    owner: "@ahmeddyounis"
    affected_lanes:
      - accessibility_input_review
      - design_system_seeds
    dependency_ids: []
    correction_trigger_ids:
      - corr.accessibility_hook_only_descoping
    summary: >
      The packet home now exists, but D-0008 is still unresolved, locale
      governance remains deferred, and the new acceptance-pack family is
      still seed-only rather than claim-bearing proof.
    evidence_refs:
      - docs/accessibility/review_charter.md
      - artifacts/accessibility/assistive_tech_matrix.yaml
      - fixtures/accessibility/task_corpus_manifest.yaml
    mitigation:
      - Keep the lane yellow in the scorecard until current acceptance-pack evidence exists.
      - Preserve locale-governance and stable-facing accessibility claims as narrowed scope rather than implied parity.
    contingency: Freeze accessibility claims and keep keyboard/input work out of green milestone-close language until current evidence lands.

  - risk_id: RISK-006
    title: Shell home and keyboard model remain open while M1 work starts
    severity: medium
    likelihood: high
    posture: yellow
    owner: "@ahmeddyounis"
    affected_lanes:
      - shell_command_system
      - aureline-shell-spike
    dependency_ids:
      - progdep.shell_host_keyboard_freeze
    correction_trigger_ids:
      - corr.shell_host_keyboard_descoping
    summary: >
      Command identity, route taxonomy, and shell safety rules are seeded, but
      the long-term shell home and the keyboard-complete model are still open
      decisions.
    evidence_refs:
      - docs/commands/command_descriptor_contract.md
      - artifacts/governance/decision_index.yaml
      - docs/planning/m1_m2_dependency_backlog.md
    mitigation:
      - Start M1 on the narrowed spike-hosted posture.
      - Keep command parity and keyboard completeness out of green claims until the decisions close.
    contingency: Re-narrow M1 shell breadth if D-0006 or D-0007 slip.

  - risk_id: RISK-007
    title: Extension publication and hosted review policy are not yet reliable control surfaces
    severity: medium
    likelihood: medium
    posture: yellow
    owner: "@ahmeddyounis"
    affected_lanes:
      - docs_public_truth
      - governance_packets
    dependency_ids:
      - progdep.extension_publication_policy
    correction_trigger_ids:
      - corr.extension_claim_requires_exception
    summary: >
      Extension permission and publication vocabulary is only proposed and the
      hosted review merge policy family is entirely deferred.
    evidence_refs:
      - docs/adr/0012-extension-manifest-permission-publisher-policy.md
      - artifacts/milestones/M0_architecture_pack/coverage_and_freeze_exceptions.yaml
    mitigation:
      - Keep extension-install and publication work hook-only.
      - Record hosted-review merge policy as an explicit freeze exception.
    contingency: Narrow extension and review claims to local-only/internal-only scope until accepted contracts exist.

  - risk_id: RISK-008
    title: M1 may invent missing contract families in code if freeze exceptions are ignored
    severity: high
    likelihood: high
    posture: red
    owner: "@ahmeddyounis"
    affected_lanes:
      - shell_command_system
      - benchmark_lab
      - docs_public_truth
    dependency_ids:
      - progdep.contract_family_freeze_exceptions
    correction_trigger_ids:
      - corr.deferred_contract_family_requires_exception
    summary: >
      Language/provider arbitration, diagnostics convergence, completion truth,
      connectivity reconciliation, locale-pack governance, repair transactions,
      and several other families are still explicit freeze exceptions rather
      than landed contracts.
    evidence_refs:
      - artifacts/milestones/M0_architecture_pack/coverage_and_freeze_exceptions.yaml
      - docs/planning/m1_m2_dependency_backlog.md
      - artifacts/milestones/M0_architecture_pack/packet_index.yaml
    mitigation:
      - Keep every missing family listed in the packet rather than implied.
      - Require downstream work to attach to a named freeze exception or land the missing contract first.
    contingency: Stop scope expansion on the affected lane and open a contract task before implementation continues.

  - risk_id: RISK-009
    title: Public-truth seeds can drift before exact-build and docs parity automation exist
    severity: medium
    likelihood: medium
    posture: yellow
    owner: "@ahmeddyounis"
    affected_lanes:
      - docs_public_truth
      - support_export
      - design_system_seeds
    dependency_ids:
      - progdep.public_truth_freshness_automation
    correction_trigger_ids:
      - corr.public_truth_descoping
    summary: >
      The docs/help truth vocabulary, docs-pack contract, support-center
      concept, portability model, and theme rows are seeded, but automated
      parity and freshness enforcement are not yet active.
    evidence_refs:
      - docs/adr/0013-docs-help-service-health-truth.md
      - docs/docs/docs_pack_manifest_contract.md
      - docs/support/support_center_concept.md
      - artifacts/design/theme_support_rows.yaml
    mitigation:
      - Keep public-truth seeds yellow.
      - Route later docs/help/migration work back to this milestone packet.
    contingency: Narrow public copy immediately if evidence or docs drift is discovered.
