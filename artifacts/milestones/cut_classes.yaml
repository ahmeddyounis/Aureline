descending_cut_order:
  - rule_id: rule.ai_before_core_workflows
    priority: 1
    rule: nice-to-have AI affordances before core language and developer workflows
  - rule_id: rule.collaboration_before_single_user_quality
    priority: 2
    rule: collaboration polish before single-user correctness and performance
  - rule_id: rule.long_tail_breadth_before_launch_depth
    priority: 3
    rule: long-tail framework and language breadth before launch-language excellence
  - rule_id: rule.built_in_convenience_before_core_workflows
    priority: 4
    rule: built-in convenience tools before extension-based, CLI, or external-tool routes
  - rule_id: rule.new_surfaces_before_existing_paths
    priority: 5
    rule: new surfaces before command-palette, keyboard, and existing-pane workflows
  - rule_id: rule.polish_before_protected_quality
    priority: 6
    rule: polish, extra chrome, and thematic depth before protected quality bars

cut_class_registry:
  - cut_class_id: cut_class:hard_block_never_cut
    description: >
      Protected quality bar or control surface that does not trade away
      safety, latency, trust, recovery, accessibility, or truth for
      schedule.
    default_actions:
      - cut_other_breadth
      - narrow_claims_elsewhere
      - slip_or_rebaseline
    downgrade_claim_allowed: false
    experimentalize_allowed: false
    hard_block_if_missed: true
  - cut_class_id: cut_class:claim_narrowing_before_quality_trade
    description: >
      Narrow support class, launch bundle, archetype set, or channel
      posture before cutting evidence, safety, or core workflow depth.
    default_actions:
      - downgrade_claim
      - reduce_supported_scope
      - keep_core_quality_bar
    downgrade_claim_allowed: true
    experimentalize_allowed: true
    hard_block_if_missed: true
  - cut_class_id: cut_class:breadth_before_depth
    description: >
      Cut secondary languages, frameworks, or ecosystem breadth before
      reducing the quality of the staffed launch wedge.
    default_actions:
      - cut_long_tail_rows
      - lower_support_class
      - hold_primary_wedge_depth
    downgrade_claim_allowed: true
    experimentalize_allowed: true
    hard_block_if_missed: true
  - cut_class_id: cut_class:surface_and_convenience_before_existing_workflows
    description: >
      Cut net-new surfaces, alternate entry points, and convenience chrome
      before degrading command-palette, keyboard-first, or existing-pane
      flows.
    default_actions:
      - cut_new_surface
      - keep_existing_path
      - preserve_degraded_state_honesty
    downgrade_claim_allowed: true
    experimentalize_allowed: true
    hard_block_if_missed: false
  - cut_class_id: cut_class:optional_service_before_desktop_core
    description: >
      Defer provider-linked, managed, remote/cloud, or other service-plane
      ambition before desktop-core quality pays for it.
    default_actions:
      - defer_service_scope
      - narrow_to_local_first
      - keep_service_row_preview_or_hook_only
    downgrade_claim_allowed: true
    experimentalize_allowed: true
    hard_block_if_missed: false
  - cut_class_id: cut_class:polish_and_secondary_chrome_first
    description: >
      Cut theming depth, minimap-like flourish, extra onboarding gloss, and
      secondary chrome before workflow substance.
    default_actions:
      - cut_polish
      - keep_semantic_behavior
      - keep_accessibility_and_truth_cues
    downgrade_claim_allowed: true
    experimentalize_allowed: true
    hard_block_if_missed: false
  - cut_class_id: cut_class:hooks_only_until_contracts_close
    description: >
      Preserve the seam and truthful labels, but do not promote the row
      beyond hook-only, experimental, or internal scaffolding until its
      governing contract and evidence family close.
    default_actions:
      - keep_hook
      - block_promotion
      - do_not_inflate_claim
    downgrade_claim_allowed: false
    experimentalize_allowed: true
    hard_block_if_missed: false

