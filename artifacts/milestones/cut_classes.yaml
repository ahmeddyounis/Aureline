milestone_at_risk_defaults:
  - milestone: M0
    cut_first:
      - release-grade wording and public-proof ambition
      - deferred contract-family breadth without landed packet homes
      - extension and managed-surface scope beyond current seeds
      - extra shell polish and non-essential scaffolding
    hold_line_on:
      - architecture pack and ADR closure
      - benchmark corpus and protected ledgers
      - requirement register, scorecard, and risk register truth
      - exact-build and public-truth narrowing rules
  - milestone: M1
    cut_first:
      - theming depth
      - minimap and non-essential shell chrome
      - AI surfaces
    hold_line_on:
      - renderer latency
      - buffer correctness
      - VFS and watcher honesty
      - command system
  - milestone: M2
    cut_first:
      - collaboration groundwork
      - notebooks and database tools
      - advanced framework packs
      - provider breadth that weakens desktop quality
    hold_line_on:
      - search usefulness
      - launch-language seed depth
      - Git and terminal basics
      - crash recovery
      - onboarding honesty
  - milestone: M3
    cut_first:
      - cloud-workspace ambition
      - visual designers
      - voice coding
      - secondary importers
    hold_line_on:
      - extension host truth
      - trust and restricted mode
      - packaging and migration path
      - compatibility and release evidence
  - milestone: M4
    cut_first:
      - long-tail language expansion
      - deep built-in ops tooling
      - premium differentiators
    hold_line_on:
      - quality bars
      - launch language bundles
      - docs and benchmark proofs
      - security and accessibility readiness

