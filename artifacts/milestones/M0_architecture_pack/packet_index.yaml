review_summary:
  milestone_objective: >
    Freeze enough architecture, benchmark, ownership, and public-truth
    vocabulary in Milestone 0 that Milestone 1 can implement against one
    canonical packet tree instead of reconstructing assumptions from chat,
    side notes, or partially overlapping docs.
  hero_proof:
    - docs/adr/0002-renderer-text-stack-and-shaping-fallback.md
    - artifacts/render/spike_capabilities.json
    - artifacts/bench/fitness_function_catalog.yaml
    - artifacts/benchmarks/dashboard_seed/dashboard.json
    - artifacts/governance/ownership_matrix.yaml
    - docs/governance/verification_packet_template.md
    - artifacts/governance/evidence_id_conventions.md
    - schemas/governance/evidence_packet_header.schema.json
  current_blockers:
    - Accessibility review family is seeded, but D-0008 keeps readiness frozen and locale governance remains deferred.
    - D-0006 and D-0007 keep the shell lane narrowed to the spike-hosted posture.
    - D-0011 keeps exact-build identity and cross-family release evidence joins open.
    - The benchmark council charter is still seed-only and no council-approved hardware baseline exists.
    - Multiple M1-facing contract families exist only as explicit freeze exceptions in this packet.

