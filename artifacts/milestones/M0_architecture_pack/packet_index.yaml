m0_to_m1_cutline_summary:
  ready_now:
    - editor/save/recovery core may start on the accepted buffer and VFS contracts plus the landed prototypes and fixtures.
    - navigation, search, workset, and route truth may start on ADR 0014, ADR 0009, semantic-readiness vocabulary, and the route taxonomy.
    - supportability, docs truth, and benchmark evidence may start on the benchmark catalog, dashboard seed, docs/help truth ADR, support-center concept, and evidence metadata fields.
    - settings, design-token, activity-center, and portability work may start on ADR 0008, theme rows, attention taxonomy, and the portable-profile/state-map contract.
  narrowed_until_closed:
    - shell lane remains spike-hosted until D-0006 closes.
    - keyboard-complete claims remain narrowed until D-0007 closes and current accessibility acceptance-pack evidence lands.
    - exact-build joins, clean-room confidence, and release-room parity remain yellow until D-0011 and the clean-room review close.
    - extension install, publication, and review surfaces remain hook-only until D-0018 accepts.
  intentionally_deferred:
    - collaboration session contracts and hosted review merge policy
    - language-intelligence/provider arbitration and diagnostics/code-action convergence
    - completion/signature-help/snippet truth and localization/locale-pack governance
    - repair transactions and voice-surface contracts

