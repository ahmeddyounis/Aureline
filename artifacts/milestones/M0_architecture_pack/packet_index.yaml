freeze_calendar:
  - checkpoint_id: architecture_freeze
    target_window: "2026-04-01 to 2026-04-30"
    call: yellow
    locked_now:
      - renderer direction and hook vocabulary
      - buffer model and undo taxonomy
      - VFS identity and save semantics
      - internal RPC and subscription envelopes
      - repository/package topology and ownership map
      - benchmark corpus, catalog, nightly lane, and dashboard seed
    carry_forward:
      - benchmark hardware baseline
      - shell non-throwaway home
      - keyboard-complete command graph
      - exact-build identity across artifact families
    refs:
      - .t2/docs/Aureline_Milestones_Document.md
      - .t2/docs/Aureline_Technical_Architecture_Document.md
  - checkpoint_id: late_m0_docs_route_rebuild_freeze
    target_window: "2026-04-21 to 2026-04-30"
    call: yellow
    locked_now:
      - docs/help/service-health truth vocabulary
      - command-descriptor schema and examples
      - origin/target/route taxonomy
      - benchmark publication pack template
      - build baseline and clean-room lane seed
    carry_forward:
      - exact-build symbolication closure
      - stale-example gating automation
      - release-center parity and mirror/offline drills
    refs:
      - .t2/docs/Aureline_Milestones_Document.md
      - docs/docs/docs_pack_manifest_contract.md
      - docs/build/cleanroom_rebuild_lane.md
  - checkpoint_id: prototype_lock
    target_window: "2026-08-31"
    call: upcoming
    required_before_lock:
      - shell and command system move out of the throwaway host or narrow explicitly again
      - accessibility/input packet family lands
      - exact-build identity closes
      - first public-truth and supportability packets are current
    refs:
      - .t2/docs/Aureline_Milestones_Document.md

