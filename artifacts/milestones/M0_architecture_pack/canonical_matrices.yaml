scheduling_worker_class_contract:
  source_ref: .t2/docs/Aureline_Technical_Architecture_Document.md
  worker_classes:
    - worker_class: UI / input
      scheduling_policy: highest_priority
      current_bindings:
        - docs/adr/0002-renderer-text-stack-and-shaping-fallback.md
        - artifacts/render/spike_capabilities.json
    - worker_class: Render submission
      scheduling_policy: high_priority_bounded
      current_bindings:
        - docs/adr/0002-renderer-text-stack-and-shaping-fallback.md
        - docs/design/shell_spike_composition_notes.md
    - worker_class: Foreground user intent
      scheduling_policy: high
      current_bindings:
        - docs/commands/command_descriptor_contract.md
        - docs/adr/0014-search-readiness-ranking-result-truth.md
    - worker_class: Interactive language actions
      scheduling_policy: high
      current_bindings:
        - docs/adr/0009-execution-context-and-scope.md
        - artifacts/milestones/M0_architecture_pack/coverage_and_freeze_exceptions.yaml
    - worker_class: Task/debug control paths
      scheduling_policy: medium_high
      current_bindings:
        - docs/adr/0009-execution-context-and-scope.md
        - docs/planning/m1_m2_dependency_backlog.md
    - worker_class: Indexing and search maintenance
      scheduling_policy: medium_yieldable
      current_bindings:
        - docs/adr/0014-search-readiness-ranking-result-truth.md
        - .t2/docs/Aureline_Technical_Architecture_Document.md
    - worker_class: Extension background work
      scheduling_policy: low_capped
      current_bindings:
        - docs/adr/0011-capability-lifecycle-and-dependency-markers.md
        - docs/adr/0012-extension-manifest-permission-publisher-policy.md
    - worker_class: AI background jobs
      scheduling_policy: low_to_medium_budgeted
      current_bindings:
        - docs/ai/context_assembly_contract.md
        - docs/governance/feature_flag_policy.md
    - worker_class: Sync / metadata refresh
      scheduling_policy: low
      current_bindings:
        - docs/state/profile_and_state_map.md
        - docs/runtime/origin_target_route_taxonomy.md
  runtime_efficiency_states:
    - state: Nominal
      required_behavior: full budgets allowed within normal latency and memory guards
    - state: EfficiencyAware
      required_behavior: reduce speculative work and favor hot-local data
    - state: ThermalConstrained
      required_behavior: cut indexing and optional animation budgets first
    - state: ProtectCore
      required_behavior: preserve typing, save, and navigation; pause optional AI and refresh work
    - state: Recovery
      required_behavior: re-enable deferred work gradually with bounded ramp-up
  queue_lanes:
    - lane: foreground
      contract: user-visible requests preempt maintenance lanes
    - lane: interactive_background
      contract: visible search, hover, and refresh work remain cancellable
    - lane: maintenance
      contract: checkpoint or coalesce rather than duplicate
    - lane: provider_overlay
      contract: separate retry budgets and never consume reserved interactive capacity
    - lane: upload_or_replication
      contract: back off under power, thermal, or trust constraints

