# M3 beta enablement starter pack.
#
# Canonical machine source for the extension-author, design-partner /
# managed-pilot, and community / issue-routing lanes of the M3 beta
# enablement starter pack. The reviewer-facing entry points are the
# three docs named under `human_entrypoint_refs`; this file is the
# truth they read from. Downstream packets, support exports, partner
# evaluation kits, and onboarding surfaces MUST cite lane_id rows
# from here rather than restating SDK links, escalation lanes, or
# routing classes locally.
#
# Scope.
#   - One lane per audience surface (extension authors, design
#     partners / managed pilots, community / public-private issue
#     routing). Each lane names one entrypoint doc, the cohorts and
#     beta surfaces it covers, the SDK / compatibility / scorecard
#     refs reviewers consume, the known-limits vocabulary it inherits,
#     the escalation routes it cites, and the issue-routing classes
#     it admits.
#   - The shared `expectations_vocabulary` block enumerates the
#     archetype / cohort lifecycle words every lane reuses so the
#     starter pack reads the same language as the beta admission
#     matrix, public-proof index, and shelf-life policy.
#
# Contract.
#   - Every cohort_ref MUST resolve to a cohort_id in
#     artifacts/milestones/m3/cohort_guardrails.yaml.
#   - Every beta_surface_ref MUST resolve to a surface_id in
#     artifacts/milestones/m3/claimed_surface_register.json.
#   - Every issue_class_ref MUST resolve to an issue_classes[].id in
#     artifacts/governance/issue_routing.yaml.
#   - Every path-shaped ref MUST exist on disk.
#   - The validator at ci/check_m3_beta_enablement_starter_pack.py
#     enforces these rules and writes the validation capture at
#     artifacts/milestones/m3/captures/beta_enablement_starter_pack_validation_capture.json.

