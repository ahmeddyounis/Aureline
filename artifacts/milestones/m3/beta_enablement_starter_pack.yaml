change_control:
  late_addition_policy: release_council_or_waiver
  addition_requires_refs:
    - artifacts/milestones/m3/beta_enablement_starter_pack.yaml
    - artifacts/milestones/m3/claimed_surface_register.json
    - artifacts/milestones/m3/cohort_guardrails.yaml
    - docs/milestones/m3/beta_admission_matrix.md
    - artifacts/milestones/m3/dependency_graph.mmd
    - docs/extensions/m3/beta_starter_pack.md
    - docs/partners/m3/design_partner_beta_pack.md
    - docs/community/m3/issue_rfc_routing_beta.md
    - artifacts/milestones/m3/open_project_beta_packet.md
    - docs/governance/m3/standards_interchange_matrix.md
  refresh_rules:
    - When a starter-pack lane changes its cohort, surface, scorecard, or
      issue-routing bindings, refresh the matching entrypoint doc and run
      the validator in the same change set.
    - When the claimed-surface register or cohort guardrails change a
      cohort_id or surface_id this pack cites, update the pack in the
      same change set.
    - When a new issue class lands in artifacts/governance/issue_routing.yaml,
      decide which lane (or lanes) admit it in the same change set.

