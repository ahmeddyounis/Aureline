# Shared vocabulary every lane reuses. Names match
# artifacts/milestones/m3/claimed_surface_register.json so downstream
# surfaces never invent a parallel chip set.
expectations_vocabulary:
  release_channels:
    - nightly
    - preview
    - beta
    - stable
  lifecycle_labels:
    - preview
    - beta
  support_classes:
    - certified
    - supported
    - limited
    - experimental
    - community
    - retest_pending
    - evidence_stale
    - unsupported
  downgrade_states:
    - retest_pending
    - limited
    - policy_blocked
    - unsupported
    - evidence_stale

