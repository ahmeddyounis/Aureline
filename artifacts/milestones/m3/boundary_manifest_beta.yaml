# Beta managed-boundary and offboarding manifest.
#
# Canonical machine-readable boundary manifest for the M3 beta train.
# Joins open/local, mirrored, self-hosted, managed, and paid/seat-bound
# rows under one vocabulary so docs/help, admin, CLI/headless,
# support-export, and release-evidence surfaces consume one source of
# truth before labelling a beta capability. Each row names org-switch
# behavior, grace-window posture, seat or quota state, and
# offboarding/export semantics so absence narrows a claim rather than
# silently failing. The alpha boundary manifest remains the long-tail
# alpha contract; this manifest extends it with explicit beta
# org-switch, grace-window, and seat/quota truth.
#
# Conformance: conforms to
#   schemas/governance/boundary_manifest_beta.schema.json
#
# Rules:
#   - Rows MUST NOT make pricing decisions. The manifest classifies
#     boundary, org-switch, grace, seat/quota, and offboarding posture;
#     pricing tiers belong elsewhere.
#   - No managed or paid_seat_bound row widens without an entry here
#     and a linked beta-era evidence packet.
#   - Milestone task ids MUST NOT appear in this file.

schema_version: 1
manifest_id: boundary_manifest.beta_managed_truth
as_of: "2026-05-15"
owner_dri: "@ahmeddyounis"
backup_owner: null
backup_waiver: single-maintainer-backup
schema_ref: schemas/governance/boundary_manifest_beta.schema.json
status: seeded
release_channel_scope: beta
milestone_id: m3

source_contract_refs:
  claimed_surface_register_ref: artifacts/milestones/m3/claimed_surface_register.json
  cohort_guardrails_ref: artifacts/milestones/m3/cohort_guardrails.yaml
  alpha_boundary_manifest_ref: artifacts/governance/boundary_manifest_alpha.yaml
  open_paid_boundary_rows_ref: artifacts/governance/open_paid_boundary_rows.yaml
  usage_offboarding_contract_ref: docs/governance/usage_export_and_offboarding_contract.md
  boundary_strawman_ref: docs/product/boundary_manifest_strawman.md
  release_doc_ref: docs/release/m3/managed_boundary_beta.md
  claim_manifest_ref: artifacts/release/m3/claim_manifest.json
  additional_refs:
    - docs/managed/metering_and_usage_export_contract.md
    - docs/governance/open_paid_boundary_and_antilockin_matrix.md

consumer_bindings:
  first_consumer:
    consumer_id: beta_boundary_manifest_validator
    consumer_kind: ci_validator
    consumer_ref: ci/check_m3_boundary_manifest_beta.py
    render_command: python3 ci/check_m3_boundary_manifest_beta.py --repo-root .
  consumer_surfaces:
    - docs_help
    - admin
    - support_export
    - cli
    - release_evidence

boundary_class_vocabulary:
  - local_only
  - mirrored
  - self_hosted
  - managed
  - paid_seat_bound
  - explicitly_out_of_scope

deployment_profile_vocabulary:
  - individual_local
  - self_hosted
  - enterprise_online
  - air_gapped
  - managed_cloud

entitlement_state_vocabulary:
  - active
  - signed_out
  - grace
  - restricted_managed_only
  - offboarded

seat_quota_state_vocabulary:
  - not_applicable
  - seat_active
  - seat_unassigned
  - seat_revoked
  - quota_within_window
  - quota_grace
  - quota_exhausted

org_switch_behavior_vocabulary:
  - not_applicable
  - preserves_local_state
  - scopes_to_new_org
  - denies_until_resolved
  - requires_admin_handoff

grace_window_class_vocabulary:
  - not_applicable
  - short_lived
  - policy_pinned
  - audit_only
  - denied_for_beta

offboarding_phase_vocabulary:
  - not_applicable
  - announce
  - freeze_writes
  - export_available
  - managed_access_end
  - destruction_receipt_issued

export_packet_class_vocabulary:
  - not_applicable
  - local_support_bundle
  - managed_usage_export
  - entitlement_snapshot
  - destruction_receipt

claim_state_vocabulary:
  - beta_claim
  - preview_claim
  - held_for_later
  - explicitly_out_of_scope

required_boundary_class_coverage:
  - local_only
  - mirrored
  - self_hosted
  - managed
  - paid_seat_bound

rows:
  - row_id: beta_boundary_row:local_core_editor
    title: Local editor, command, Git, and configuration core
    summary: >
      Editing, command surfaces, local Git, and layered configuration
      remain available with no account, no managed control plane, and
      no seat assignment. Org-switch and seat-quota state do not gate
      this row.
    boundary_class: local_only
    claim_state: beta_claim
    deployment_profiles:
      - individual_local
      - self_hosted
      - enterprise_online
      - air_gapped
      - managed_cloud
    alpha_capability_refs:
      - editor_core
      - command_plane
      - local_git
      - configuration_profiles
    local_core_continuity: >
      Local editor, command, Git, and configuration core work without
      managed identity, network reachability, seat assignment, or
      quota budget.
    org_switch_behavior:
      behavior_class: preserves_local_state
      summary: >
        Switching organizations leaves open buffers, local Git state,
        and on-disk profile files untouched. Managed projections rebind
        on the next managed action.
      local_state_preserved: true
    grace_window:
      window_class: not_applicable
      duration_iso8601: null
      summary: Local core does not consume a managed grace window.
    seat_quota:
      quota_state: not_applicable
      states_observed:
        - not_applicable
      meter_refs: []
      summary: Local core is not seat- or quota-gated.
    offboarding:
      phases_observed:
        - not_applicable
      export_packet_class: local_support_bundle
      destruction_receipt_required: false
      summary: >
        Offboarding from a managed org does not remove local files,
        local Git state, or already-generated support bundles.
    linked_evidence_class: alpha_seed
    evidence_refs:
      - artifacts/governance/boundary_manifest_alpha.yaml#editor_core
      - docs/product/boundary_manifest_strawman.md#local-core
    notes: >
      The local-only floor that every other row narrows against. Beta
      managed/paid surfaces MUST NOT widen so they erode this row.

  - row_id: beta_boundary_row:extension_registry_mirror
    title: Extension registry and signed mirror
    summary: >
      Registry browsing and install routes reach the public registry,
      a customer-operated mirror, or an air-gapped signed bundle.
      Already-installed extensions continue to execute when the
      registry is unreachable.
    boundary_class: mirrored
    claim_state: beta_claim
    deployment_profiles:
      - individual_local
      - self_hosted
      - enterprise_online
      - air_gapped
      - managed_cloud
    alpha_capability_refs:
      - extension_registry_mirror
      - hosted_marketplace_ui
    local_core_continuity: >
      Already-installed extensions execute regardless of registry or
      marketplace reachability; local discovery via CLI or local
      bundle remains available.
    org_switch_behavior:
      behavior_class: scopes_to_new_org
      summary: >
        Org switch rebinds the active mirror and any signed policy
        bundle to the new org; cached registry metadata is invalidated
        and re-resolved.
      local_state_preserved: true
    grace_window:
      window_class: short_lived
      duration_iso8601: P7D
      summary: >
        When the live registry is unreachable, cached metadata stays
        usable for browsing/install for a short window before clients
        fall back to mirror or file import only.
    seat_quota:
      quota_state: not_applicable
      states_observed:
        - not_applicable
        - quota_within_window
      meter_refs:
        - meter.registry.downloads
      summary: >
        Registry downloads are metered as service metadata; no per-seat
        gate is applied for browsing or install.
    offboarding:
      phases_observed:
        - announce
        - export_available
        - managed_access_end
      export_packet_class: entitlement_snapshot
      destruction_receipt_required: false
      summary: >
        On managed-access end, hosted marketplace access stops; local,
        mirror, and file-import install routes remain.
    absence_narrows_to: >
      With no live registry, install narrows to mirror, file import,
      and CLI-attached local bundles; discovery falls back to the
      registry strawman index until the next mirror sync.
    linked_evidence_class: beta_partner_packet
    evidence_refs:
      - artifacts/milestones/m3/claimed_surface_register.json#beta_surface:extension_runtime
      - artifacts/governance/boundary_manifest_alpha.yaml#extension_registry_mirror
      - docs/product/boundary_manifest_strawman.md#self-host-friendly
    notes: >
      Mirror posture is the air-gap floor for beta extension
      publication.

  - row_id: beta_boundary_row:identity_policy_service
    title: Identity envelope and signed policy distribution
    summary: >
      Standards-based identity (OIDC) and signed policy bundles can be
      customer-operated, mirrored, or vendor-managed. Local core
      continues under last-known policy when the policy service is
      unreachable.
    boundary_class: self_hosted
    claim_state: beta_claim
    deployment_profiles:
      - self_hosted
      - enterprise_online
      - air_gapped
      - managed_cloud
    alpha_capability_refs:
      - identity_policy_service
      - configuration_profiles
    local_core_continuity: >
      Local editing, search, Git, tasks, and local AI continue under
      local configuration or last-known policy when the policy service
      is unreachable.
    org_switch_behavior:
      behavior_class: requires_admin_handoff
      summary: >
        Switching organizations requires the new org's signed identity
        envelope and policy bundle. Managed actions deny until the
        handoff completes; local core is unaffected.
      local_state_preserved: true
    grace_window:
      window_class: policy_pinned
      duration_iso8601: P14D
      summary: >
        Last-known signed policy stays in effect during the grace
        window; managed actions degrade to restricted-managed-only
        until the policy bundle refreshes or the window expires.
    seat_quota:
      quota_state: not_applicable
      states_observed:
        - not_applicable
      meter_refs: []
      summary: >
        The identity envelope itself is not seat-metered; downstream
        managed surfaces may still be.
    offboarding:
      phases_observed:
        - announce
        - freeze_writes
        - export_available
        - managed_access_end
      export_packet_class: entitlement_snapshot
      destruction_receipt_required: true
      summary: >
        Offboarding snapshots the entitlement state, freezes managed
        writes, exposes export windows, and issues a destruction
        receipt when managed access ends. Local files remain.
    absence_narrows_to: >
      Without a live policy service, managed actions narrow to
      restricted-managed-only until a fresh signed bundle is imported
      or the grace window expires.
    linked_evidence_class: beta_partner_packet
    evidence_refs:
      - artifacts/governance/boundary_manifest_alpha.yaml#identity_policy_service
      - artifacts/milestones/m3/claimed_surface_register.json#beta_surface:policy_proxy_transport
      - docs/governance/usage_export_and_offboarding_contract.md
    notes: >
      The self-hostable floor under every managed surface that needs
      org identity.

  - row_id: beta_boundary_row:workspace_control_plane
    title: Remote workspace control plane
    summary: >
      Managed workspace orchestration is a hosted convenience layered
      on a self-hostable protocol. Direct local workspaces and direct
      SSH or container attach remain available outside the control
      plane.
    boundary_class: managed
    claim_state: beta_claim
    deployment_profiles:
      - enterprise_online
      - managed_cloud
    alpha_capability_refs:
      - workspace_control_plane
      - editor_core
    local_core_continuity: >
      Local folders, direct SSH or container attach, and local Git
      remain user-controlled. Workspace orchestration loss does not
      block local editing.
    org_switch_behavior:
      behavior_class: scopes_to_new_org
      summary: >
        Org switch rebinds the workspace fleet to the new org's
        control plane. Live sessions in the prior org freeze and
        export rather than transfer.
      local_state_preserved: true
    grace_window:
      window_class: short_lived
      duration_iso8601: P7D
      summary: >
        On entitlement loss, running workspaces enter a short export
        window before managed access ends.
    seat_quota:
      quota_state: quota_within_window
      states_observed:
        - seat_active
        - quota_within_window
        - quota_grace
        - quota_exhausted
      meter_refs:
        - meter.remote_workspace.workspace_hours
      summary: >
        Workspace hours are metered. Quota exhaustion pauses new
        managed sessions; running sessions degrade to export-only.
    offboarding:
      phases_observed:
        - announce
        - freeze_writes
        - export_available
        - managed_access_end
        - destruction_receipt_issued
      export_packet_class: managed_usage_export
      destruction_receipt_required: true
      summary: >
        Offboarding announces the cutoff, freezes managed writes,
        exposes a usage export window, ends managed access, and
        issues a destruction receipt.
    absence_narrows_to: >
      Without a managed control plane, work narrows to local folders
      and direct SSH or container attach. Managed workspace hour
      meters do not transfer to local work.
    linked_evidence_class: beta_partner_packet
    evidence_refs:
      - artifacts/governance/boundary_manifest_alpha.yaml#workspace_control_plane
      - artifacts/milestones/m3/claimed_surface_register.json#beta_surface:debug_test_task_model
      - artifacts/milestones/m3/cohorts/managed_pilot_scorecard.md
      - docs/managed/metering_and_usage_export_contract.md
    notes: >
      Managed workspace beta gates seat and quota state on managed
      sessions only; local core continues.

  - row_id: beta_boundary_row:model_gateway
    title: AI provider routing and policy gateway
    summary: >
      Managed AI gateway provides quota, redaction, and audit on top
      of provider routing. Local and BYOK AI routes remain
      distinct.
    boundary_class: managed
    claim_state: beta_claim
    deployment_profiles:
      - self_hosted
      - enterprise_online
      - managed_cloud
    alpha_capability_refs:
      - model_gateway
      - local_ai_byok
    local_core_continuity: >
      Local and BYOK AI routes continue independent of the managed
      gateway. Loss of managed AI does not disable edit, search, Git,
      or tasks.
    org_switch_behavior:
      behavior_class: scopes_to_new_org
      summary: >
        Org switch rebinds gateway routing, redaction, and audit to
        the new org's policy. In-flight requests complete under the
        prior org's policy and are not silently re-attributed.
      local_state_preserved: true
    grace_window:
      window_class: audit_only
      duration_iso8601: P7D
      summary: >
        On entitlement loss, audit and export remain accessible for a
        short window; new gateway-routed requests deny.
    seat_quota:
      quota_state: quota_within_window
      states_observed:
        - seat_active
        - quota_within_window
        - quota_grace
        - quota_exhausted
      meter_refs:
        - meter.ai_gateway.tokens
        - meter.ai_gateway.tool_invocations
      summary: >
        Gateway tokens and tool invocations are metered. Quota
        exhaustion denies new managed requests; local and BYOK routes
        remain available.
    offboarding:
      phases_observed:
        - announce
        - freeze_writes
        - export_available
        - managed_access_end
      export_packet_class: managed_usage_export
      destruction_receipt_required: false
      summary: >
        Managed AI offboarding exposes the usage export and audit
        snapshot; local and BYOK paths persist after managed access
        ends.
    absence_narrows_to: >
      With no managed gateway, AI narrows to BYOK and local model
      routes. Managed redaction and audit no longer apply.
    linked_evidence_class: beta_partner_packet
    evidence_refs:
      - artifacts/governance/boundary_manifest_alpha.yaml#model_gateway
      - artifacts/milestones/m3/claimed_surface_register.json#beta_surface:policy_proxy_transport
      - docs/managed/metering_and_usage_export_contract.md
    notes: >
      Gateway quota narrows the managed request only; the local AI
      contract is separate.

  - row_id: beta_boundary_row:managed_ai_quota_billing
    title: Managed AI quota, audit, and billing surface
    summary: >
      Hosted UI for managed AI quota, audit, and seat-bound billing.
      Denial pauses managed AI for the affected seat; local and BYOK
      AI routes are unaffected.
    boundary_class: paid_seat_bound
    claim_state: beta_claim
    deployment_profiles:
      - enterprise_online
      - managed_cloud
    alpha_capability_refs:
      - managed_ai_quota_billing
      - model_gateway
    local_core_continuity: >
      Loss of paid AI seat narrows managed AI only. Edit, search,
      Git, tasks, and BYOK AI remain available.
    org_switch_behavior:
      behavior_class: denies_until_resolved
      summary: >
        Switching to an organization with no paid AI seat denies
        managed AI until a seat is assigned. The prior org's audit
        export remains downloadable for the grace window.
      local_state_preserved: true
    grace_window:
      window_class: short_lived
      duration_iso8601: P3D
      summary: >
        On seat revocation, audit and export are available for a
        short window before managed-access end. New managed AI
        requests deny immediately.
    seat_quota:
      quota_state: seat_active
      states_observed:
        - seat_active
        - seat_unassigned
        - seat_revoked
        - quota_within_window
        - quota_grace
        - quota_exhausted
      meter_refs:
        - meter.ai_gateway.tokens
        - meter.ai_gateway.tool_invocations
      summary: >
        Paid AI is gated by an assigned seat and a per-seat quota.
        Seat revocation denies managed AI; quota exhaustion denies
        new managed requests but preserves audit/export.
    offboarding:
      phases_observed:
        - announce
        - freeze_writes
        - export_available
        - managed_access_end
        - destruction_receipt_issued
      export_packet_class: managed_usage_export
      destruction_receipt_required: true
      summary: >
        Offboarding announces the cutoff, freezes new managed AI
        writes, exposes the usage export window, ends managed
        access, and issues a destruction receipt for usage records.
    absence_narrows_to: >
      With no paid seat, managed AI narrows to denied. BYOK and
      local AI routes remain available.
    linked_evidence_class: beta_partner_packet
    evidence_refs:
      - artifacts/governance/boundary_manifest_alpha.yaml#managed_ai_quota_billing
      - artifacts/milestones/m3/cohorts/managed_pilot_scorecard.md
      - docs/managed/metering_and_usage_export_contract.md
      - docs/governance/usage_export_and_offboarding_contract.md
    notes: >
      The canonical paid/seat-bound beta row; every later paid seat
      surface inherits its org-switch, grace-window, and offboarding
      semantics from this row unless it declares its own.

  - row_id: beta_boundary_row:managed_sync_profile
    title: Managed settings sync
    summary: >
      Hosted profile and settings sync on top of customer-managed
      storage or local profile files. Sync is optional; local files
      remain authoritative.
    boundary_class: paid_seat_bound
    claim_state: beta_claim
    deployment_profiles:
      - enterprise_online
      - managed_cloud
    alpha_capability_refs:
      - managed_sync_profile
      - configuration_profiles
    local_core_continuity: >
      Local profile files remain the source of truth. Sync disable
      or seat revocation does not mutate or remove local files.
    org_switch_behavior:
      behavior_class: scopes_to_new_org
      summary: >
        Org switch rebinds sync to the new org's storage and policy.
        Profiles from the prior org are exportable but not silently
        merged into the new org.
      local_state_preserved: true
    grace_window:
      window_class: policy_pinned
      duration_iso8601: P30D
      summary: >
        On seat loss, last-synced profile remains usable locally.
        Managed writes are frozen until the seat is reinstated or
        the export window expires.
    seat_quota:
      quota_state: seat_active
      states_observed:
        - seat_active
        - seat_unassigned
        - seat_revoked
        - quota_within_window
        - quota_grace
      meter_refs:
        - meter.profile_sync.bytes
      summary: >
        Sync is gated by a seat and a per-seat byte quota; quota
        exhaustion freezes managed sync writes only.
    offboarding:
      phases_observed:
        - announce
        - freeze_writes
        - export_available
        - managed_access_end
        - destruction_receipt_issued
      export_packet_class: managed_usage_export
      destruction_receipt_required: true
      summary: >
        Offboarding exposes the profile export, ends managed sync,
        and issues a destruction receipt; local profile files
        remain on disk.
    absence_narrows_to: >
      With no paid seat, managed sync narrows to local profile
      files only. Export and file-import remain available.
    linked_evidence_class: beta_partner_packet
    evidence_refs:
      - artifacts/governance/boundary_manifest_alpha.yaml#managed_sync_profile
      - docs/governance/usage_export_and_offboarding_contract.md
    notes: >
      Paid sync rows MUST preserve local profile files at every
      seat state.

  - row_id: beta_boundary_row:support_telemetry_pipeline
    title: Support ingest and telemetry pipeline
    summary: >
      Hosted or customer-operated support ingest carries opt-in
      support uploads. Local and offline support bundles remain the
      canonical fallback.
    boundary_class: managed
    claim_state: beta_claim
    deployment_profiles:
      - self_hosted
      - enterprise_online
      - managed_cloud
    alpha_capability_refs:
      - telemetry_support_pipeline
      - local_support_bundle
    local_core_continuity: >
      Local and offline support bundles can always be generated and
      inspected without upload.
    org_switch_behavior:
      behavior_class: scopes_to_new_org
      summary: >
        Org switch rebinds support ingest routing. Already-uploaded
        bundles stay with the prior org's retention window and are
        not silently re-attributed.
      local_state_preserved: true
    grace_window:
      window_class: short_lived
      duration_iso8601: P14D
      summary: >
        On entitlement loss, existing bundles remain downloadable
        for a short window; new uploads deny.
    seat_quota:
      quota_state: quota_within_window
      states_observed:
        - not_applicable
        - quota_within_window
        - quota_grace
        - quota_exhausted
      meter_refs:
        - meter.support_ingest.bundle_count
      summary: >
        Support ingest is metered by bundle count, not by seat;
        quota exhaustion pauses new uploads.
    offboarding:
      phases_observed:
        - announce
        - export_available
        - managed_access_end
      export_packet_class: local_support_bundle
      destruction_receipt_required: false
      summary: >
        Offboarding announces the cutoff, exposes existing bundles
        for download, then ends managed access. Local bundle
        generation persists.
    absence_narrows_to: >
      With no managed ingest, support narrows to local bundle
      generation and manual transfer.
    linked_evidence_class: beta_partner_packet
    evidence_refs:
      - artifacts/governance/boundary_manifest_alpha.yaml#telemetry_support_pipeline
      - artifacts/milestones/m3/claimed_surface_register.json#beta_surface:support_export_diagnostics
      - docs/governance/usage_export_and_offboarding_contract.md
    notes: >
      Managed support ingest is an upload convenience; local export
      remains the supportability floor.

  - row_id: beta_boundary_row:fleet_admin_ui
    title: Fleet admin UI and SCIM dashboards
    summary: >
      Hosted admin UI for fleet identity, policy, and entitlement
      review. Self-hosted identity and signed policy bundles remain
      the standards-based fallback.
    boundary_class: managed
    claim_state: beta_claim
    deployment_profiles:
      - enterprise_online
      - managed_cloud
    alpha_capability_refs:
      - fleet_admin_ui_scim
      - identity_policy_service
    local_core_continuity: >
      Removing admin UI access does not corrupt local clones,
      unsaved buffers, or already-exported policy bundles.
    org_switch_behavior:
      behavior_class: requires_admin_handoff
      summary: >
        Admin handoff is required to bind the dashboard to a new
        org. Without admin handoff, the dashboard denies until
        resolved; self-hosted identity continues.
      local_state_preserved: true
    grace_window:
      window_class: audit_only
      duration_iso8601: P14D
      summary: >
        Audit and entitlement snapshot remain accessible for a
        short window after admin access ends; mutation denies.
    seat_quota:
      quota_state: not_applicable
      states_observed:
        - not_applicable
      meter_refs: []
      summary: Admin dashboard is not seat-metered.
    offboarding:
      phases_observed:
        - announce
        - freeze_writes
        - export_available
        - managed_access_end
      export_packet_class: entitlement_snapshot
      destruction_receipt_required: true
      summary: >
        Offboarding exposes the entitlement snapshot export window,
        ends admin access, and issues a destruction receipt.
    absence_narrows_to: >
      Without admin UI access, fleet posture narrows to file-based
      signed bundles and standards-based identity.
    linked_evidence_class: beta_partner_packet
    evidence_refs:
      - artifacts/governance/boundary_manifest_alpha.yaml#fleet_admin_ui_scim
      - artifacts/milestones/m3/cohorts/managed_pilot_scorecard.md
      - docs/governance/usage_export_and_offboarding_contract.md
    notes: >
      Admin actions are admin-identity-bound; user surfaces narrow
      independently.

  - row_id: beta_boundary_row:managed_cloud_daily_driver_reserved
    title: Managed cloud daily-driver parity (reserved)
    summary: >
      Reserved out-of-scope row preventing managed-cloud daily
      driver from being implied by other beta managed rows.
    boundary_class: explicitly_out_of_scope
    claim_state: explicitly_out_of_scope
    deployment_profiles:
      - managed_cloud
    alpha_capability_refs:
      - managed_cloud_daily_driver
    local_core_continuity: >
      Local-first beta scope continues; managed-cloud daily-driver
      parity is not claimed.
    org_switch_behavior:
      behavior_class: not_applicable
      summary: Not applicable; row is reserved.
    grace_window:
      window_class: denied_for_beta
