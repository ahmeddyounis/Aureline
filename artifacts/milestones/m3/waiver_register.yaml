# M3 waiver register (beta protected fitness functions).
#
# Milestone-scoped projection of waiver posture for every M3 protected
# fitness-function lane in
# artifacts/benchmarks/m3/protected_fitness_catalog.yaml. The generator
# at ci/check_m3_protected_fitness_catalog.py reads this file together
# with the protected fitness-function catalog so the dashboard snapshot
# and downstream release packets quote one waiver posture per lane
# instead of restating waiver prose.
#
# Each row pins one M3 protected lane to:
#   - its waiver-record ref (or no_active_waiver when no waiver has been
#     minted);
#   - typed waiver_kind, waiver_authority, register_status,
#     expiry_proximity, current_evidence_gap, renewal_requested_state,
#     repeated_path_grouping, claim_scope_narrowing, and mitigation
#     posture classes mirrored from
#     docs/governance/waiver_register_contract.md;
#   - the M3 protected-lane id, the canonical fitness-function-catalog
#     row(s) the lane resolves through, and the beta-surface ids the
#     waiver affects; and
#   - bounded reviewable summaries the dashboard, the release packet,
#     the support export, and the public claim manifest render verbatim.
#
# The full canonical waiver_register_entry_record fixture corpus lives
# at fixtures/governance/waiver_cases/. This file is the milestone-
# scoped register that downstream M3 lanes cite; the canonical schema
# is schemas/governance/waiver_register.schema.json.

schema_version: 1
register_id: m3_waiver_register
register_revision: 1
milestone_id: m3
release_channel_scope: beta
register_state: draft
as_of: "2026-05-15"
owner: "@ahmeddyounis"
backup_owner: null
backup_waiver: single-maintainer-backup

# Authoritative source seeds. The generator refuses to run if any of
# these is missing, malformed, or names an unknown id.
protected_fitness_catalog_source: artifacts/benchmarks/m3/protected_fitness_catalog.yaml
canonical_catalog_source: artifacts/bench/fitness_function_catalog.yaml
ownership_matrix_source: artifacts/governance/ownership_matrix.yaml
waiver_contract_doc_ref: docs/governance/waiver_register_contract.md
waiver_schema_ref: schemas/governance/waiver_register.schema.json

# Surfaces that consume this register verbatim.
consuming_surfaces:
  - docs/milestones/m3/beta_admission_matrix.md
  - docs/milestones/m3/protected_fitness_catalog.md
  - docs/release/release_evidence_packet_template.md
  - docs/release/shiproom_dashboard_contract.md
  - docs/release/protected_fitness_review_alpha.md
  - docs/governance/fitness_dashboard_contract.md
  - docs/governance/waiver_register_contract.md
  - docs/support/support_center_concept.md

# Closed vocabularies mirrored from the waiver register contract.
vocabularies:
  waiver_kind_class:
    - freeze_exception
    - policy_narrowing
    - retention_exception
    - release_floor_breach_waiver
    - support_drill_pending_waiver
    - compatibility_window_waiver
    - claim_attestation_pending_waiver
    - single_maintainer_backup
    - other_named_in_summary
  waiver_authority_class:
    - performance_council
    - architecture_council
    - release_council
    - shiproom_executive_scope_review
    - not_applicable_no_active_waiver
  register_status_class:
    - register_active_within_expiry
    - register_expired_pending_decision
    - register_renewed
    - register_closed_correction_landed
    - register_narrowed_claim
  expiry_proximity_class:
    - not_yet_due_review_window_open
    - approaching_expiry_review_window_closing
    - past_expiry_pending_decision
    - not_applicable_no_active_waiver
  current_evidence_gap_class:
    - evidence_gap_none_audit_only
    - evidence_gap_missing_observation
    - evidence_gap_partial_profile
    - evidence_gap_stale_by_time
    - evidence_gap_stale_by_trigger
    - evidence_gap_not_applicable_no_active_waiver
  renewal_requested_state_class:
    - not_yet_due
    - renewal_requested_under_review
    - renewal_granted_pending_decision_record
    - renewal_not_requested_correction_in_flight
    - renewal_not_applicable_no_active_waiver
  repeated_path_grouping_class:
    - not_repeated_first_milestone
    - repeated_across_milestones
    - repeated_across_release_trains
  claim_scope_narrowing_class:
    - internal_only_no_marketed_claim
    - marketed_claim_narrowed_to_subset
    - marketed_claim_withdrawn_to_internal_only
    - not_applicable_no_active_waiver
  mitigation_compensating_control_class:
    - none_required_audit_only
    - additional_monitoring_in_flight
    - manual_release_gate_in_flight
    - degraded_path_active
    - not_applicable_no_active_waiver

# Each row binds one M3 protected lane to its waiver posture. A row
# with active_waiver_ref = null and register_status_class =
# register_active_within_expiry indicates "no active waiver"; the
# generator renders the dashboard tile and release packet accordingly.

rows:
  # ---------------------------------------------------------------------------
  # Startup
  # ---------------------------------------------------------------------------
  - row_id: m3_waiver_register:protected_function:startup
    protected_function_ref: m3_protected_function:startup
    affected_target_class: protected_path
    protected_path_ref: ff.warm_start_to_first_paint
    waiver_kind_class: single_maintainer_backup
    waiver_authority_class: architecture_council
    active_waiver_ref: waiver:single_maintainer_backup
    previous_waiver_ref: null
    register_status_class: register_active_within_expiry
    expiry_proximity_class: not_yet_due_review_window_open
    expires_at: "2026-10-19T23:59:59Z"
    current_evidence_gap_class: evidence_gap_missing_observation
    renewal_requested_state_class: not_yet_due
    repeated_path_grouping_class: not_repeated_first_milestone
    claim_scope_narrowing_class: internal_only_no_marketed_claim
    mitigation:
      compensating_control_class: additional_monitoring_in_flight
      compensating_controls_summary: >
        Warm-start observations are tracked on the protected-fitness
        review packet; the dashboard tile renders evidence_stale until
        the benchmark-lab harness lands fresh captures on the reference
        hardware matrix.
      target_correction_work_summary: >
        Capture warm-start observations on each reference-hardware row
        and rerun the benchmark-lab harness in the same change set as
        the dashboard snapshot refresh.
      residual_risk_summary: >
        Startup latency posture is not yet verifiable on M3 reference
        hardware; downstream claim manifest narrows accordingly until
        observations land.
    decision_history: []
    headline_label: Startup warm-start observation gap (single-maintainer audit-only)
    register_summary: >
      The single-maintainer-backup waiver covers the absence of a
      named backup owner on aureline-render; the dashboard tile
      renders evidence_stale and the release packet narrows the
      startup claim until warm-start observations land on the
      reference hardware matrix.

  # ---------------------------------------------------------------------------
  # Typing
  # ---------------------------------------------------------------------------
  - row_id: m3_waiver_register:protected_function:typing
    protected_function_ref: m3_protected_function:typing
    affected_target_class: protected_path
    protected_path_ref: ff.input_to_paint
    waiver_kind_class: single_maintainer_backup
    waiver_authority_class: architecture_council
    active_waiver_ref: waiver:single_maintainer_backup
    previous_waiver_ref: null
    register_status_class: register_active_within_expiry
    expiry_proximity_class: not_yet_due_review_window_open
    expires_at: "2026-10-19T23:59:59Z"
    current_evidence_gap_class: evidence_gap_missing_observation
    renewal_requested_state_class: not_yet_due
    repeated_path_grouping_class: not_repeated_first_milestone
    claim_scope_narrowing_class: internal_only_no_marketed_claim
    mitigation:
      compensating_control_class: additional_monitoring_in_flight
      compensating_controls_summary: >
        Input-to-paint and buffer-operations observations are tracked on
        the protected-fitness review packet; the dashboard tile renders
        evidence_stale until the benchmark-lab harness lands fresh
        captures.
      target_correction_work_summary: >
        Capture input-to-paint and buffer-operation observations on
        each reference-hardware row, confirm the undo-class
        correctness boolean gate, and refresh the dashboard snapshot in
        the same change set.
      residual_risk_summary: >
        Typing latency and undo-class correctness are not yet verifiable
        on M3 reference hardware; downstream claim manifest narrows
        accordingly until observations land.
    decision_history: []
    headline_label: Typing input-to-paint observation gap (single-maintainer audit-only)
    register_summary: >
      The single-maintainer-backup waiver covers the absence of a
      named backup owner on aureline-render; the dashboard tile
      renders evidence_stale and the release packet narrows the typing
      claim until input-to-paint observations land.

  # ---------------------------------------------------------------------------
  # Search
  # ---------------------------------------------------------------------------
  - row_id: m3_waiver_register:protected_function:search
    protected_function_ref: m3_protected_function:search
    affected_target_class: protected_path
    protected_path_ref: ff.command_parity
    waiver_kind_class: single_maintainer_backup
    waiver_authority_class: architecture_council
    active_waiver_ref: waiver:single_maintainer_backup
    previous_waiver_ref: null
    register_status_class: register_active_within_expiry
    expiry_proximity_class: not_yet_due_review_window_open
    expires_at: "2026-10-19T23:59:59Z"
    current_evidence_gap_class: evidence_gap_not_applicable_no_active_waiver
    renewal_requested_state_class: not_yet_due
    repeated_path_grouping_class: not_repeated_first_milestone
    claim_scope_narrowing_class: internal_only_no_marketed_claim
    mitigation:
      compensating_control_class: none_required_audit_only
      compensating_controls_summary: >
        Search is provisional pending the command-graph ADR landing and
        search harness wiring; no compensating control is required while
        the canonical catalog row remains row_status=provisional.
      target_correction_work_summary: >
        Land the command-graph ADR, wire the parity harness, and move
        the canonical catalog row to row_status=seeded in the same
        change set that flips the M3 protected lane to seeded.
      residual_risk_summary: >
        Search parity is not yet release-bearing; the dashboard tile
        renders provisional and the release packet does not cite the
        row.
    decision_history: []
    headline_label: Search and command-graph parity (provisional, single-maintainer audit-only)
    register_summary: >
      The single-maintainer-backup waiver covers the absence of a
      named backup owner on shell_command_system; the row remains
      provisional pending the command-graph ADR landing and harness
      wiring.

  # ---------------------------------------------------------------------------
  # Rollback
  # ---------------------------------------------------------------------------
  - row_id: m3_waiver_register:protected_function:rollback
    protected_function_ref: m3_protected_function:rollback
    affected_target_class: protected_path
    protected_path_ref: ff.vfs_save_conflict_handling
    waiver_kind_class: single_maintainer_backup
    waiver_authority_class: architecture_council
    active_waiver_ref: waiver:single_maintainer_backup
    previous_waiver_ref: null
    register_status_class: register_active_within_expiry
    expiry_proximity_class: not_yet_due_review_window_open
    expires_at: "2026-10-19T23:59:59Z"
    current_evidence_gap_class: evidence_gap_missing_observation
    renewal_requested_state_class: not_yet_due
    repeated_path_grouping_class: not_repeated_first_milestone
    claim_scope_narrowing_class: marketed_claim_narrowed_to_subset
    mitigation:
      compensating_control_class: manual_release_gate_in_flight
      compensating_controls_summary: >
        The rollback drill and save-pipeline conflict scenarios run
        manually on partner workspace fixtures; the dashboard tile
        renders evidence_stale until the drill capture lands. The
        restore-fidelity row is provisional in the canonical catalog
        and renders alongside.
      target_correction_work_summary: >
        Run the rollback drill on the partner workspace fixture corpus,
        attach the capture to the dashboard snapshot, refresh the
        save-pipeline conflict-handling envelope, and move the
        restore-fidelity canonical row toward row_status=seeded.
      residual_risk_summary: >
        Rollback fidelity is the highest-blast-radius gap; partner
        managed pilots narrow the marketed rollback claim until the
        drill capture lands.
    decision_history: []
    headline_label: Rollback drill capture gap (single-maintainer audit-only, marketed claim narrowed)
    register_summary: >
      The single-maintainer-backup waiver covers the absence of a
      named backup owner on aureline-vfs; the rollback dashboard tile
      renders evidence_stale and the release packet narrows the
      marketed rollback claim until the drill capture lands.

  # ---------------------------------------------------------------------------
  # Supportability
  # ---------------------------------------------------------------------------
  - row_id: m3_waiver_register:protected_function:supportability
    protected_function_ref: m3_protected_function:supportability
    affected_target_class: protected_path
    protected_path_ref: ff.benchmark_lab_health
    waiver_kind_class: single_maintainer_backup
    waiver_authority_class: architecture_council
    active_waiver_ref: waiver:single_maintainer_backup
    previous_waiver_ref: null
    register_status_class: register_active_within_expiry
    expiry_proximity_class: not_yet_due_review_window_open
    expires_at: "2026-10-19T23:59:59Z"
    current_evidence_gap_class: evidence_gap_missing_observation
    renewal_requested_state_class: not_yet_due
    repeated_path_grouping_class: not_repeated_first_milestone
    claim_scope_narrowing_class: internal_only_no_marketed_claim
    mitigation:
      compensating_control_class: additional_monitoring_in_flight
      compensating_controls_summary: >
        Benchmark-lab self-audit is captured on the protected-fitness
        review packet; the dashboard tile renders evidence_stale until
        a fresh self-audit packet lands on the pinned toolchain.
      target_correction_work_summary: >
        Refresh the benchmark-lab self-audit packet on each release
        train, attach the exact-build identity, and refresh the
        dashboard snapshot in the same change set.
      residual_risk_summary: >
        Supportability gates the release-evidence claim manifest; the
        manifest's evidence owner refuses to sign a benchmark report
        the harness cannot vouch for, so the release packet narrows
        accordingly.
    decision_history: []
    headline_label: Benchmark-lab self-audit gap (single-maintainer audit-only)
    register_summary: >
      The single-maintainer-backup waiver covers the absence of a
      named backup owner on governance_packets; the supportability
      tile renders evidence_stale and gates the release-evidence claim
      manifest until the self-audit packet lands.

  # ---------------------------------------------------------------------------
  # Extension isolation
  # ---------------------------------------------------------------------------
  - row_id: m3_waiver_register:protected_function:extension_isolation
    protected_function_ref: m3_protected_function:extension_isolation
    affected_target_class: protected_path
    protected_path_ref: null
    waiver_kind_class: single_maintainer_backup
    waiver_authority_class: architecture_council
    active_waiver_ref: waiver:single_maintainer_backup
    previous_waiver_ref: null
    register_status_class: register_active_within_expiry
    expiry_proximity_class: not_yet_due_review_window_open
    expires_at: "2026-10-19T23:59:59Z"
    current_evidence_gap_class: evidence_gap_not_applicable_no_active_waiver
    renewal_requested_state_class: not_yet_due
    repeated_path_grouping_class: not_repeated_first_milestone
    claim_scope_narrowing_class: internal_only_no_marketed_claim
    mitigation:
      compensating_control_class: none_required_audit_only
      compensating_controls_summary: >
        Extension isolation is provisional pending the extension-host
        isolation ADR landing and a canonical fitness-function-catalog
        row; downgrade rules in the claimed-surface register hold the
        beta scope inspectable in the meantime.
      target_correction_work_summary: >
        Land the extension-host isolation ADR, wire the isolation
        drill, add the canonical catalog row, and move the M3
        protected lane to row_status=seeded in the same change set.
      residual_risk_summary: >
        Extension isolation has no canonical catalog row; the dashboard
        tile renders provisional and the release packet does not cite
        the row.
    decision_history: []
    headline_label: Extension isolation (provisional, single-maintainer audit-only)
    register_summary: >
      The single-maintainer-backup waiver covers the absence of a
      named backup owner on extension_host; the row remains
      provisional pending the extension-host isolation ADR landing
      and a canonical catalog row.

  # ---------------------------------------------------------------------------
  # Policy / trust
  # ---------------------------------------------------------------------------
  - row_id: m3_waiver_register:protected_function:policy_trust
    protected_function_ref: m3_protected_function:policy_trust
    affected_target_class: protected_path
    protected_path_ref: null
    waiver_kind_class: single_maintainer_backup
    waiver_authority_class: architecture_council
    active_waiver_ref: waiver:single_maintainer_backup
    previous_waiver_ref: null
    register_status_class: register_active_within_expiry
    expiry_proximity_class: not_yet_due_review_window_open
    expires_at: "2026-10-19T23:59:59Z"
    current_evidence_gap_class: evidence_gap_not_applicable_no_active_waiver
    renewal_requested_state_class: not_yet_due
    repeated_path_grouping_class: not_repeated_first_milestone
    claim_scope_narrowing_class: internal_only_no_marketed_claim
    mitigation:
      compensating_control_class: none_required_audit_only
      compensating_controls_summary: >
        Policy / trust is provisional pending the policy-trust ADR
        landing and a canonical fitness-function-catalog row; the
        claimed-surface register's policy-bundle-schema-break and
        proxy-lab-unavailable downgrade rules hold the beta scope
        inspectable in the meantime.
      target_correction_work_summary: >
        Land the policy-trust ADR, wire the enterprise proxy lab and
        identity envelope captures, add the canonical catalog row, and
        move the M3 protected lane to row_status=seeded in the same
        change set.
      residual_risk_summary: >
        Policy / trust has no canonical catalog row; the dashboard tile
        renders provisional and the release packet does not cite the
        row.
    decision_history: []
    headline_label: Policy bundle and trust envelope (provisional, single-maintainer audit-only)
    register_summary: >
      The single-maintainer-backup waiver covers the absence of a
      named backup owner on policy_and_trust; the row remains
      provisional pending the policy-trust ADR landing and a canonical
      catalog row.
