# M3 beta cohort scorecard index.
#
# Canonical index of cohort-facing scorecards. The validator reads this file,
# discovers each named scorecard, and derives the current effective state.
# Docs, release, support, and migration packets should consume the derived
# register at:
#   artifacts/milestones/m3/captures/cohort_archetype_scorecard_register.json
# rather than restating cohort freshness or downgrade rules locally.

schema_version: 1
as_of: "2026-05-15"
owner: "@ahmeddyounis"

index_id: m3_cohort_scorecard_index
human_entrypoint_ref: docs/milestones/m3/beta_admission_matrix.md
claimed_surface_register_ref: artifacts/milestones/m3/claimed_surface_register.json
cohort_guardrails_ref: artifacts/milestones/m3/cohort_guardrails.yaml

validator:
  script_ref: ci/check_cohort_archetype_scorecards.py
  command: python3 ci/check_cohort_archetype_scorecards.py --repo-root .

derived_register_ref: artifacts/milestones/m3/captures/cohort_archetype_scorecard_register.json
validation_capture_ref: artifacts/milestones/m3/captures/cohort_archetype_scorecard_validation_capture.json

consuming_surfaces:
  - docs/milestones/m3/beta_admission_matrix.md
  - docs/release/release_evidence_packet_template.md
  - docs/product/known_limits_contract.md
  - artifacts/feedback/external_alpha_known_limits.md

# Downgrade automation thresholds.
# evidence_age = as_of - evidence_date (days).
# review_window_days is declared per scorecard.
# Automatic derivations:
#   - evidence_age > review_window_days * 3 -> evidence_stale
#   - evidence_age > review_window_days     -> retest_pending
#   - any open_waivers with state=active    -> limited (or preview if declared)
# These derivations win against the declared support class.
downgrade_automation:
  retest_pending_multiplier: 1.0
  evidence_stale_multiplier: 3.0
  waiver_state_active_label: active
  derived_state_vocabulary:
    - current
    - retest_pending
    - limited
    - preview
    - evidence_stale

scorecards:
  - scorecard_id: cohort_scorecard:design_partner
    scorecard_ref: artifacts/milestones/m3/cohorts/design_partner_scorecard.md
    cohort_id: cohort:design_partner_managed_pilot
    cohort_sub_focus: design_partner
  - scorecard_id: cohort_scorecard:extension_author
    scorecard_ref: artifacts/milestones/m3/cohorts/extension_author_scorecard.md
    cohort_id: cohort:extension_author
    cohort_sub_focus: extension_author
  - scorecard_id: cohort_scorecard:managed_pilot
    scorecard_ref: artifacts/milestones/m3/cohorts/managed_pilot_scorecard.md
    cohort_id: cohort:design_partner_managed_pilot
    cohort_sub_focus: managed_pilot
