# Feedback intake taxonomy for internal dogfood and blocker routing.
#
# This file is the canonical mapping between dogfood feedback categories,
# blocker classes, and the label/field vocabulary used when filing issues.
# Downstream automation and dashboards should consume this mapping instead of
# inventing local category lists.

schema_version: 1
as_of: "2026-05-08"
owner: "@ahmeddyounis"

taxonomy_id: dogfood_feedback_taxonomy
human_entrypoint_ref: docs/dogfood/m1_internal_dogfood.md

inputs:
  blocker_taxonomy_ref: artifacts/milestones/m1/blocker_taxonomy.yaml
  known_gaps_ledger_ref: artifacts/milestones/m1/known_gaps_ledger.yaml
  dogfood_matrix_ref: artifacts/milestones/m1/dogfood_matrix.yaml
  issue_taxonomy_ref: docs/governance/dogfood_issue_taxonomy.md
  build_identity_ref: artifacts/build/build_identity.json

# When a dogfood report blocks the protected lane, these fields are the minimum
# required for mechanical triage and later proof review.
required_issue_fields_for_blocker:
  - issue_route_class
  - dogfood_category
  - severity
  - exact_build_identity_ref
  - workspace_archetype
  - os_arch_profile
  - evidence_refs

# Severity crosswalk for translating dogfood issue severity into the blocker
# severity vocabulary used by the known-gaps ledger.
severity_crosswalk:
  - issue_severity: daily_blocker
    blocker_severity: critical
  - issue_severity: major
    blocker_severity: high
  - issue_severity: scoped
    blocker_severity: medium
  - issue_severity: clarity_gap
    blocker_severity: low

feedback_categories:
  - category_id: hot_path
    title: Hot path
    description: >
      Breaks or regresses a protected interaction path (typing, switching,
      quick open, rendering, keybindings) in the daily lane.
    dogfood_category: hot_path
    default_issue_labels: ["dogfood:hot-path"]
    blocker_class_id: hot_path

  - category_id: fidelity
    title: Source fidelity
    description: >
      Risks corruption, silent rewrite, encoding drift, or save/restore
      incorrectness (including missing-target recovery and journaling truth).
    dogfood_category: fidelity
    default_issue_labels: ["dogfood:fidelity"]
    blocker_class_id: source_fidelity

  - category_id: recovery
    title: Recovery
    description: >
      Breaks crash restore, safe mode, or recovery ladders required to keep
      dogfood honest.
    dogfood_category: recovery
    default_issue_labels: ["dogfood:recovery"]
    blocker_class_id: recovery

  - category_id: trust
    title: Trust
    description: >
      Misleads users about permission, policy posture, or boundary safety;
      incorrect trust prompts or capability gating failures.
    dogfood_category: trust
    default_issue_labels: ["dogfood:trust"]
    blocker_class_id: trust

  - category_id: boundary
    title: Boundary truth
    description: >
      A stable-facing workflow depends on undeclared previews, managed services,
      missing mirrors, or dependency markers (hidden prerequisites).
    dogfood_category: hidden_dependency
    default_issue_labels: ["dogfood:hidden-dependency"]
    blocker_class_id: boundary_truth

  - category_id: onboarding
    title: Onboarding
    description: >
      Breaks first-run, entry, open/clone/import/restore, or learnability-critical
      guidance required to make the daily lane executable.
    dogfood_category: ux
    default_issue_labels: ["dogfood:ux"]
    blocker_class_id: onboarding

  - category_id: accessibility
    title: Accessibility
    description: >
      Makes protected workflows unusable for assistive tech, keyboard-only use,
      reduced motion, or other required accessibility postures.
    dogfood_category: accessibility
    default_issue_labels: ["dogfood:accessibility"]
    blocker_class_id: accessibility

  - category_id: public_proof
    title: Public proof
    description: >
      Breaks proof assets, evidence capture, or docs/truth parity required before
      widening claims.
    dogfood_category: public_proof
    default_issue_labels: ["dogfood:public-proof"]
    blocker_class_id: public_proof
