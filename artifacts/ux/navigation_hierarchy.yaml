# Navigation-hierarchy, escalation-tier, progressive-disclosure,
# and worked-example seed.
#
# Machine-readable companion to
# docs/ux/navigation_and_escalation_contract.md. Shell, palette,
# review, AI, install/attach, support, onboarding, and parity-audit
# surfaces read this file by id — navigation-route ids, escalation
# tiers, disclosure depths, and example ids — rather than minting
# local copies.
#
# Rules:
#   - If this file and the contract doc disagree, the contract doc
#     wins and this file MUST update in the same change.
#   - Navigation-route ids, escalation-tier ids, and disclosure-depth
#     ids mirror docs/ux/navigation_and_escalation_contract.md §3.
#     This file does not mint new values.
#   - Slot-family and slot-key citations are re-exported verbatim
#     from docs/commands/command_graph_and_ui_slots_seed.md. Do not
#     re-mint.
#   - Issuing-surface, ui-slot-class, capability-scope-class,
#     preview-class, approval-posture-class, and
#     palette-visibility-class values are re-exported verbatim from
#     schemas/commands/command_descriptor.schema.json. Do not
#     re-mint.
#   - Consequence-class, authority-class, recovery-class,
#     responsive-fallback-mode, required-visible-field-class, and
#     focus-return-state values are re-exported verbatim from
#     docs/ux/shell_interaction_safety_contract.md. Do not re-mint.
#   - Adding a new navigation route, escalation tier, disclosure
#     depth, or worked example is additive-minor and bumps
#     navigation_hierarchy_schema_version. Repurposing an existing
#     value is breaking and requires a new decision row in
#     artifacts/governance/decision_index.yaml.
#   - Worked-example rows quote command_ids from the canonical
#     registry (artifacts/commands/command_registry_seed.yaml and
#     fixtures/commands/seed_commands/) or leave command_id_refs
#     null and cite scenario_class plus preview_class /
#     approval_posture_class / consequence_class_label instead.
#     Inventing a surface-local command id is non-conforming.

navigation_hierarchy_schema_version: 1

sources:
  contract_doc_ref: docs/ux/navigation_and_escalation_contract.md
  shell_zone_contract_ref: docs/ux/shell_zone_and_density_contract.md
  shell_metrics_ref: artifacts/ux/shell_metrics.yaml
  interaction_safety_contract_ref: docs/ux/shell_interaction_safety_contract.md
  interaction_safety_schema_ref: schemas/ux/interaction_safety.schema.json
  command_descriptor_contract_ref: docs/commands/command_descriptor_contract.md
  command_descriptor_schema_ref: schemas/commands/command_descriptor.schema.json
  command_graph_and_ui_slots_seed_ref: docs/commands/command_graph_and_ui_slots_seed.md
  ui_slot_taxonomy_schema_ref: schemas/commands/ui_slot_taxonomy.schema.json
  command_registry_seed_ref: artifacts/commands/command_registry_seed.yaml
  seed_commands_fixture_root: fixtures/commands/seed_commands
  keybinding_resolver_contract_ref: docs/ux/keybinding_resolver_contract.md
  keybinding_resolver_schema_ref: schemas/commands/keybinding_resolver.schema.json
  attention_activity_taxonomy_ref: docs/ux/attention_activity_taxonomy.md
  activity_event_envelope_schema_ref: schemas/ux/activity_event_envelope.schema.json
  adr_source_ref: docs/adr/0016-shell-windowing-input-accessibility-boundary.md
  decision_register_ref: artifacts/governance/decision_index.yaml
  decision_id: D-0022
  ui_ux_spec_sections:
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#4.1
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.2
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#7.1
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#7.2
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#7.3
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#7.4
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#7.5
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#7.6
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#9.14
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#10
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#AppendixW

