# ---------------------------------------------------------------------------
# Route rows. One row per navigation_route_id in §5 of the contract doc.
# ---------------------------------------------------------------------------
route_rows:

  - record_kind: navigation_route_row
    route_id: route.command_palette
    scope_class: global
    primary_job: >
      Universal known-or-unknown action entry. Fastest route for
      commands users know by name or description; also the
      fallback route for any command the user cannot currently
      find in chrome.
    attach_slot_families:
      - command_palette
    attach_slot_keys:
      - command_palette.result_row
      - command_palette.inline_action
    typical_issuing_surface: command_palette
    keyboard_first: true
    must_not_be_only_path_for:
      - persistent_browsing_of_trees_or_lists
      - dense_structural_exploration
      - multi_step_authoring
    default_escalation_tier: tier.contextual_inline_overlay
    may_escalate_to:
      - tier.panel_attached_to_surface
      - tier.sheet_attached_to_window
      - tier.dialog_modal
    disclosure_depth_default: depth.summary
    narrowing_posture: policy_aware_not_opinion_aware
    notes: >
      Every command in the registry MUST project a palette_row
      discoverability record. Palette visibility narrows via
      palette_visibility_class / disabled_reason_code, not
      surface preference.

  - record_kind: navigation_route_row
    route_id: route.quick_open
    scope_class: lookup
    primary_job: >
      Fastest path to known files, symbols, recent places,
      settings, and commands. Palette-hosted mode predicate;
      does not mint its own issuing surface.
    attach_slot_families:
      - command_palette
    attach_slot_keys:
      - command_palette.result_row
    typical_issuing_surface: command_palette
    keyboard_first: true
    must_not_be_only_path_for:
      - settings_explanation
      - batch_review
      - authority_sensitive_setup
    default_escalation_tier: tier.contextual_inline_overlay
    may_escalate_to:
      - tier.panel_attached_to_surface
    disclosure_depth_default: depth.summary
    narrowing_posture: policy_aware_not_opinion_aware
    notes: >
      Quick-open is a palette mode, not a separate invocation
      surface. Focus-return on dismiss follows the palette's
      focus_return_state rules.

  - record_kind: navigation_route_row
    route_id: route.activity_rail
    scope_class: mirror
    primary_job: >
      Durable mode switching across top-level sections. Mirror /
      handoff family — focuses an existing structural route or
      seeds the palette; does not own a new direct command path.
    attach_slot_families:
      - activity_rail
    attach_slot_keys:
      - rail.primary_route_entry
      - rail.handoff_entry
    typical_issuing_surface: null
    keyboard_first: true
    must_not_be_only_path_for:
      - direct_command_invocation
      - minting_a_new_command_path
    default_escalation_tier: tier.inline_in_target_surface
    may_escalate_to:
      - tier.panel_attached_to_surface
    disclosure_depth_default: depth.summary
    narrowing_posture: mirror_handoff_never_widens_authority
    notes: >
      Rail entries focus the canonical sidebar or bottom-panel
      tab, or seed the palette with a category query. Rail
      dispatching a destructive action directly is non-conforming.

  - record_kind: navigation_route_row
    route_id: route.sidebar
    scope_class: structural
    primary_job: >
      Durable exploration of trees, lists, queues, and
      structural views (explorer, search, source control, run /
      test, extensions, collaboration, support / admin).
    attach_slot_families:
      - sidebar
    attach_slot_keys:
      - sidebar.section_action
      - sidebar.selection_action
    typical_issuing_surface: toolbar_button
    keyboard_first: true
    must_not_be_only_path_for:
      - one_off_destructive_or_credentialed_actions
      - primary_palette_or_search_entry
    default_escalation_tier: tier.inline_in_target_surface
    may_escalate_to:
      - tier.contextual_inline_overlay
      - tier.panel_attached_to_surface
      - tier.sheet_attached_to_window
    disclosure_depth_default: depth.summary
    narrowing_posture: policy_aware_not_opinion_aware
    notes: >
      Section and selection actions are launch-bearing only when
      the descriptor admits secondary_toolbar. Row bodies (trees,
      queues, lists) remain owned by their own surface contracts.

  - record_kind: navigation_route_row
    route_id: route.breadcrumbs
    scope_class: local
    primary_job: >
      Local file / folder / symbol ancestry close to the editor.
      Quick hop up the containing hierarchy without losing the
      active editor target.
    attach_slot_families:
      - editor_chrome
    attach_slot_keys:
      - editor_chrome.breadcrumb_action
    typical_issuing_surface: toolbar_button
    keyboard_first: true
    must_not_be_only_path_for:
      - broad_workspace_search
      - structural_exploration_outside_the_active_editor
    default_escalation_tier: tier.inline_in_target_surface
    may_escalate_to:
      - tier.contextual_inline_overlay
    disclosure_depth_default: depth.summary
    narrowing_posture: local_scope_not_global
    notes: >
      Segment overflow and per-segment context menus run at
      tier.contextual_inline_overlay. Breadcrumbs MUST NOT
      silently replace search or sidebar exploration.

  - record_kind: navigation_route_row
    route_id: route.editor_tabs
    scope_class: working_set
    primary_job: >
      Rapid switching among already-open editors, diffs, and
      notebooks within an editor group.
    attach_slot_families:
      - editor_chrome
    attach_slot_keys: []
    typical_issuing_surface: toolbar_button
    keyboard_first: true
    must_not_be_only_path_for:
      - discovery_of_unopened_resources
      - primary_command_invocation
    default_escalation_tier: tier.inline_in_target_surface
    may_escalate_to:
      - tier.contextual_inline_overlay
    disclosure_depth_default: depth.summary
    narrowing_posture: working_set_scope_not_discovery
    notes: >
      Tab strip lives inside main_workspace. Overflow menu and
      per-tab context menu run at tier.contextual_inline_overlay
      and narrate, not replace, canonical commands.

  - record_kind: navigation_route_row
    route_id: route.editor_group
    scope_class: working_set
    primary_job: >
      Split, compare, and diff layout within the active
      main_workspace region.
    attach_slot_families:
      - editor_chrome
    attach_slot_keys: []
    typical_issuing_surface: toolbar_button
    keyboard_first: true
    must_not_be_only_path_for:
      - minting_a_non_editor_surface_family
      - replacing_sidebar_or_panel_routes
    default_escalation_tier: tier.inline_in_target_surface
    may_escalate_to:
      - tier.contextual_inline_overlay
      - tier.panel_attached_to_surface
    disclosure_depth_default: depth.summary
    narrowing_posture: working_set_scope_not_discovery
    notes: >
      Group splits, merges, and move-between actions ride the
      same commands as editor / diff routes; they do not mint
      a new issuing surface.

  - record_kind: navigation_route_row
    route_id: route.status_bar_link
    scope_class: contextual
    primary_job: >
      Jump from a persistent state cue (trust, sync, problems,
      runtime, collaboration presence, reminders) to the surface
      that owns or repairs the state.
    attach_slot_families:
      - status_bar
    attach_slot_keys:
      - status_bar.primary_status_item
      - status_bar.quick_action
    typical_issuing_surface: toolbar_button
    keyboard_first: true
    must_not_be_only_path_for:
      - hidden_primary_navigation
      - multi_step_authoring
      - modal_escalation_without_panel_intermediate
    default_escalation_tier: tier.inline_in_target_surface
    may_escalate_to:
      - tier.contextual_inline_overlay
      - tier.panel_attached_to_surface
      - tier.sheet_attached_to_window
    disclosure_depth_default: depth.summary
    narrowing_posture: contextual_scope_resolves_to_owner
    notes: >
      Status items MUST jump to the narrowest useful surface.
      Opening a generic settings page when a per-state inspector
      exists is non-conforming.

  - record_kind: navigation_route_row
    route_id: route.inspector_link
    scope_class: contextual
    primary_job: >
      Open contextual explanation, evidence, or detail attached
      to the active workspace target (diagnostic, quick-fix,
      provider handoff, evidence packet, policy explanation).
    attach_slot_families:
      - inspector
    attach_slot_keys:
      - inspector.header_action
      - inspector.footer_action
    typical_issuing_surface: toolbar_button
    keyboard_first: true
    must_not_be_only_path_for:
      - dominant_task_surface_ownership
      - primary_navigation_route
    default_escalation_tier: tier.inline_in_target_surface
    may_escalate_to:
      - tier.contextual_inline_overlay
      - tier.panel_attached_to_surface
      - tier.sheet_attached_to_window
    disclosure_depth_default: depth.detail
    narrowing_posture: contextual_scope_resolves_to_owner
    notes: >
      Inspector defaults to depth.detail because the pane exists
      to explain a selected target. Auto-revealing
      depth.evidence or depth.inspection on focus is non-conforming.

  - record_kind: navigation_route_row
    route_id: route.global_menu
    scope_class: global
    primary_job: >
      Menubar / global-application menu entry for canonical
      commands (File / Edit / Selection / View / Go / Run /
      Terminal / Help).
    attach_slot_families:
      - global_menu
    attach_slot_keys:
      - global_menu.command_item
    typical_issuing_surface: global_application_menu
    keyboard_first: true
    must_not_be_only_path_for:
      - hidden_only_entry_for_high_frequency_commands
      - replacing_palette_as_the_only_entry
    default_escalation_tier: tier.contextual_inline_overlay
    may_escalate_to:
      - tier.dialog_modal
      - tier.sheet_attached_to_window
      - tier.full_surface_takeover
    disclosure_depth_default: depth.summary
    narrowing_posture: global_scope_policy_aware
    notes: >
      menu_path_refs are required per descriptor-slot mapping
      rules. Accelerators narrate existing key routes; the menu
      row does not mint a new issuing surface.

  - record_kind: navigation_route_row
    route_id: route.context_menu
    scope_class: local
    primary_job: >
      Right-click / Shift+F10 actions scoped to the current
      target across editor, explorer, review, source-control,
      terminal, and search surfaces.
    attach_slot_families:
      - context_menu
    attach_slot_keys:
      - context_menu.editor_item
      - context_menu.explorer_item
      - context_menu.review_item
      - context_menu.source_control_item
      - context_menu.terminal_item
      - context_menu.search_item
    typical_issuing_surface: context_menu
    keyboard_first: true
    must_not_be_only_path_for:
      - global_authority_sensitive_flows
      - only_visible_path_for_a_destructive_action
    default_escalation_tier: tier.contextual_inline_overlay
    may_escalate_to:
      - tier.panel_attached_to_surface
      - tier.sheet_attached_to_window
      - tier.dialog_modal
    disclosure_depth_default: depth.summary
    narrowing_posture: local_scope_contextual_filter_required
    notes: >
      menu_path_refs and the contextual_filter_class_ref are
      required per descriptor-slot mapping rules. Destructive
      actions MUST also appear in the palette or global menu to
      satisfy the two-route minimum.

  - record_kind: navigation_route_row
    route_id: route.notification_or_banner
    scope_class: mirror
    primary_job: >
      Acknowledgement and escalation cue for activity /
      attention items. Quotes commands minted elsewhere; does
      not own a new issuing surface.
    attach_slot_families: []
    attach_slot_keys: []
    typical_issuing_surface: null
    keyboard_first: true
    must_not_be_only_path_for:
      - primary_entry_for_any_command
      - replacing_inspectable_activity_rows
    default_escalation_tier: tier.inline_in_target_surface
    may_escalate_to:
      - tier.panel_attached_to_surface
      - tier.sheet_attached_to_window
    disclosure_depth_default: depth.summary
    narrowing_posture: mirror_handoff_never_widens_authority
    notes: >
      Interruption tier, quiet-hours posture, and delivery
      surface rules are owned by
      docs/ux/attention_activity_taxonomy.md. This row only
      names the navigation role.

  - record_kind: navigation_route_row
    route_id: route.deep_link_or_protocol
    scope_class: external
    primary_job: >
      OS / browser / collaborator-initiated entry into a known
      target through a registered protocol handler. Mirror /
      handoff onto an existing route after trust + scope review.
    attach_slot_families: []
    attach_slot_keys: []
    typical_issuing_surface: null
    keyboard_first: null
    must_not_be_only_path_for:
      - minting_a_fresh_execution_path
      - bypassing_trust_profile_or_scope_review
    default_escalation_tier: tier.contextual_inline_overlay
    may_escalate_to:
      - tier.dialog_modal
      - tier.sheet_attached_to_window
      - tier.full_surface_takeover
    disclosure_depth_default: depth.summary
    narrowing_posture: external_scope_trust_reviewed
    notes: >
      Browser handoff rides the browser_handoff_packet per ADR
      0010. Raw URL launches are forbidden; every deep-link
      target resolves to a canonical command_id.

  - record_kind: navigation_route_row
    route_id: route.cli_invocation
    scope_class: external
    primary_job: >
      Command-line / headless entry resolving the same command
      graph as the shell. Used by scripts, CI, and power users.
    attach_slot_families:
      - cli_help
    attach_slot_keys:
      - cli_help.command_row
    typical_issuing_surface: cli_surface
    keyboard_first: true
    must_not_be_only_path_for:
      - implicit_modal_escalation
    default_escalation_tier: tier.inline_in_target_surface
    may_escalate_to:
      - tier.dialog_modal
    disclosure_depth_default: depth.summary
    narrowing_posture: external_scope_same_approval_rules
    notes: >
      CLI prompts ride the same approval / preview rules as UI
      flows. An interactive CLI confirmation is the equivalent
      of tier.dialog_modal; silent apply on a non-trivial scope
      denies with preview_required_not_shown.

  - record_kind: navigation_route_row
    route_id: route.ai_tool_invocation
    scope_class: external
    primary_job: >
      AI-callable command entry under the descriptor's
      ai_tool_surfacing_class. Surfaces in the AI tool-call
      catalog and in AI-proposed previews.
    attach_slot_families:
      - ai_tool_surface
    attach_slot_keys:
      - ai_tool_surface.tool_entry
    typical_issuing_surface: ai_tool_surface
    keyboard_first: null
    must_not_be_only_path_for:
      - irreversible_or_high_blast_paths
      - replacing_user_initiated_review
    default_escalation_tier: tier.contextual_inline_overlay
    may_escalate_to:
      - tier.sheet_attached_to_window
      - tier.dialog_modal
    disclosure_depth_default: depth.detail
    narrowing_posture: external_scope_descriptor_gated
    notes: >
      ai_callable_irreversible_high_blast_denied commands never
      expose on this route; externally-visible mutations
      require second_party_review_required approval before apply.

# ---------------------------------------------------------------------------
# Escalation-tier rows. One row per escalation_tier in §6 of the contract
# doc. Entry requires at least one admissible criterion; monotonic climb
# only; focus return MUST match shell_interaction_safety_contract.md on any
# dismiss above tier.inline_in_target_surface.
# ---------------------------------------------------------------------------
escalation_tier_rows:

  - record_kind: escalation_tier_row
    tier_id: tier.inline_in_target_surface
    render_surfaces:
      - editor_row
      - tree_row
      - list_row
      - breadcrumb_segment
      - tab_strip
      - status_item
      - editor_selection
    admissible_entry_criteria:
      - low_stakes_default_action_no_scan_space_needed
      - no_preview_required
      - no_approval_required
      - target_is_active_selection_or_focus
    required_attribution:
      - none_beyond_standard_component_contract
    focus_return_on_dismiss_required: false
    citation_fields_required: []
    forbidden_uses:
      - destructive_without_consequence_block
      - credential_reveal_without_step_up
      - modal_gate_without_dialog

  - record_kind: escalation_tier_row
    tier_id: tier.contextual_inline_overlay
    render_surfaces:
      - popover
      - hovercard_with_keyboard_equivalent
      - palette_result_preview
      - breadcrumb_overflow_menu
      - tab_overflow_menu
      - segment_context_menu
    admissible_entry_criteria:
      - user_needs_richer_choice_than_row_allows
      - supporting_metadata_does_not_justify_panel
      - rendering_preserves_workspace_context_and_focus
    required_attribution:
      - resolves_to_command_id
      - records_focus_return_state_on_dismiss
    focus_return_on_dismiss_required: true
    citation_fields_required:
      - command_id
    forbidden_uses:
      - global_focus_steal
      - hidden_modal_confirmation_beneath_expand

  - record_kind: escalation_tier_row
    tier_id: tier.panel_attached_to_surface
    render_surfaces:
      - sidebar_tab
      - bottom_panel_tab
      - right_inspector_pane
      - activity_center_entry
    admissible_entry_criteria:
      - sustained_scan_space_required
      - multi_row_review_or_longitudinal_state
      - concurrent_inspection_of_evidence_needed
      - does_not_gate_rest_of_workspace
    required_attribution:
      - quotes_slot_family_and_slot_key
      - records_focus_return_state_on_dismiss
    focus_return_on_dismiss_required: true
    citation_fields_required:
      - slot_family
      - slot_key
    forbidden_uses:
      - hidden_trust_review_skipped_at_commit
      - implicit_apply_without_preview_on_non_trivial_scope

  - record_kind: escalation_tier_row
    tier_id: tier.sheet_attached_to_window
    render_surfaces:
      - window_attached_sheet
    admissible_entry_criteria:
      - keep_workspace_identity_visible
      - batch_or_structured_or_preview_content
      - user_can_still_see_target_underneath
    required_attribution:
      - cites_preview_class_or_responsive_fallback_mode
      - preserves_owning_window_dialog_rules
      - records_focus_return_state_on_dismiss
    focus_return_on_dismiss_required: true
    citation_fields_required:
      - preview_class_or_responsive_fallback_mode
      - owning_window_id
    forbidden_uses:
      - implicit_owner_window_drift
      - silent_escalation_past_sheet_to_takeover

  - record_kind: escalation_tier_row
    tier_id: tier.dialog_modal
    render_surfaces:
      - window_modal_dialog
    admissible_entry_criteria:
      - user_authority_or_trust_posture_must_be_reviewed
      - capability_scope_class_crosses_boundary
      - user_cannot_safely_continue_without_explicit_decision
      - preview_class_or_approval_posture_class_denies_non_modal_apply
    required_attribution:
      - cites_consequence_class_label
      - cites_preview_class
      - cites_approval_posture_class
      - satisfies_required_visible_field_class_at_commit
      - records_focus_return_state_on_dismiss
    focus_return_on_dismiss_required: true
    citation_fields_required:
      - consequence_class_label
      - preview_class
      - approval_posture_class
    forbidden_uses:
      - unattributed_modal
      - collapsed_warning_beneath_expand_affordance
      - skip_tier_from_inline_to_modal_without_sheet_justification

  - record_kind: escalation_tier_row
    tier_id: tier.full_surface_takeover
    render_surfaces:
      - structured_diff_or_merge_surface
      - evidence_packet_surface
      - recovery_surface_project_doctor_or_safe_mode_or_restore
      - governance_review_surface_policy_diff_or_release_center
    admissible_entry_criteria:
      - structured_diff_or_merge_scope
      - evidence_packet_scope
      - recovery_scope
      - governance_review_scope
    required_attribution:
      - cites_originating_command_id
      - cites_preview_class
      - cites_result_contract_class
      - exposes_back_to_source_route
    focus_return_on_dismiss_required: true
    citation_fields_required:
      - originating_command_id
      - preview_class
      - result_contract_class
      - back_to_source_route_id
    forbidden_uses:
      - takeover_without_diff_evidence_recovery_or_governance_scope
      - hidden_origin_breadcrumb
      - suppressed_back_to_source_path

# ---------------------------------------------------------------------------
# Progressive-disclosure rows. One row per disclosure_depth in §7 of the
# contract doc. Every depth resolves to an inspectable command path; depth
# rises only on user request; depth never changes consequence.
# ---------------------------------------------------------------------------
disclosure_depth_rows:

  - record_kind: disclosure_depth_row
    depth_id: depth.summary
    visible_content:
      - one_line_claim
      - primary_identity
      - severity_or_freshness_chip
      - one_or_two_primary_actions
    required_command_backed_paths:
      - cmd:command_palette.open
      - open_details_action_quoting_canonical_command_id
    required_keyboard_completeness: true
    may_auto_reveal_on_focus_or_hover: true
    consequence_must_remain_truthful: true
    forbidden_uses:
      - hiding_destructive_consequence_beneath_summary
      - hiding_policy_blocked_state_beneath_summary

  - record_kind: disclosure_depth_row
    depth_id: depth.detail
    visible_content:
      - structured_fields
      - scope_statement
      - blocked_or_hidden_counts
      - target_identity
      - actor_identity
      - supporting_badges
    required_command_backed_paths:
      - copy_command_id_action
      - open_inspector_action
      - route_to_docs_help_anchor_ref
      - route_to_owning_surface_for_state
    required_keyboard_completeness: true
    may_auto_reveal_on_focus_or_hover: false
    consequence_must_remain_truthful: true
    forbidden_uses:
      - substituting_surface_local_labels_for_registry_labels
      - hiding_authority_or_recovery_class_beneath_expand

  - record_kind: disclosure_depth_row
    depth_id: depth.evidence
    visible_content:
      - diff_or_log_excerpt
      - citation_anchor
      - evidence_packet
      - raw_or_rendered_toggle
      - representation_class_label
    required_command_backed_paths:
      - open_evidence_action
      - open_citation_action
      - copy_raw_action_with_representation_class_label
      - copy_rendered_action_with_representation_class_label
    required_keyboard_completeness: true
    may_auto_reveal_on_focus_or_hover: false
    consequence_must_remain_truthful: true
    forbidden_uses:
      - copy_or_export_without_representation_class_label
      - evidence_view_with_no_command_backed_path_to_journal

  - record_kind: disclosure_depth_row
    depth_id: depth.inspection
    visible_content:
      - full_mutation_journal
      - invocation_session_packet
      - route_source
      - policy_diff
      - ownership_card
      - support_handoff
    required_command_backed_paths:
      - open_invocation_session_action
      - open_route_source_action
      - open_policy_rule_action
      - open_support_handoff_action
      - cmd:labs.open_command_trace  # Labs projection when lifecycle_bounds allow
    required_keyboard_completeness: true
    may_auto_reveal_on_focus_or_hover: false
    consequence_must_remain_truthful: true
    forbidden_uses:
      - inspection_surface_without_registered_command_attach
      - raw_bodies_or_paths_on_logs_local_or_traces_local_sinks

# ---------------------------------------------------------------------------
# Worked example rows. Cover the six scenario classes called out in §6.1 of
# the contract doc: search, review, fixes, destructive actions, credentialed
# flows, and high-risk approvals.
#
# Each row names:
#   - scenario_class (closed set mirrored from §6.1)
#   - invoking_routes (one or more navigation_route_ids)
#   - escalation_ladder (monotonic list of escalation_tiers the flow may
#     traverse; the first entry is the default; later entries are admissible
#     under the criteria named in escalation_tier_rows)
#   - preview_class_refs / approval_posture_class_refs /
#     consequence_class_refs / capability_scope_class_refs (values from the
#     frozen vocabularies above; null when the scenario class does not
#     require one)
#   - disclosure_depth_default (the depth the scenario renders at first)
#   - command_id_refs (from the canonical registry when a concrete entry
#     exists; null when the scenario covers a class of commands not yet
#     seeded)
# ---------------------------------------------------------------------------
example_rows:

  - record_kind: navigation_example_row
    example_id: example.search_in_palette_and_quick_open
    scenario_class: search
    invoking_routes:
      - route.command_palette
      - route.quick_open
    escalation_ladder:
      - tier.inline_in_target_surface
      - tier.contextual_inline_overlay
    preview_class_refs: []
    approval_posture_class_refs:
      - no_approval_required
    consequence_class_refs:
      - reversible_local
    capability_scope_class_refs:
      - inert_metadata_only
      - reversible_local_read
    disclosure_depth_default: depth.summary
    command_id_refs:
      - cmd:command_palette.open
    notes: >
      Search renders typing inline and result rows at the
      contextual overlay tier. Modal escalation belongs to the
      destination, not to search. A quick-open preview pane
      stays inside the overlay; a preview that commits a
      mutation on hover is non-conforming.

  - record_kind: navigation_example_row
    example_id: example.review_inline_diagnostic_and_quick_fix
    scenario_class: review
    invoking_routes:
      - route.inspector_link
      - route.editor_tabs
      - route.context_menu
    escalation_ladder:
      - tier.inline_in_target_surface
      - tier.contextual_inline_overlay
      - tier.panel_attached_to_surface
      - tier.sheet_attached_to_window
      - tier.dialog_modal
    preview_class_refs:
      - inline_summary_preview
      - structured_diff_preview
      - batch_scope_preview
      - broad_workspace_scope_preview
    approval_posture_class_refs:
      - no_approval_required
      - explicit_confirmation_required
    consequence_class_refs:
      - reversible_local
      - recoverable_durable
    capability_scope_class_refs:
      - reversible_local_mutation
      - recoverable_durable_mutation
    disclosure_depth_default: depth.detail
    command_id_refs: []
    notes: >
      Inline squiggle and gutter action stay at
      tier.inline_in_target_surface. Quick-fix list renders at
      tier.contextual_inline_overlay. Multi-file review escalates
      to tier.panel_attached_to_surface; apply preview escalates
      to tier.sheet_attached_to_window on structured_diff or batch
      scope. tier.dialog_modal is reserved for the explicit-
      confirmation step when the sheet cannot stage the apply.

  - record_kind: navigation_example_row
    example_id: example.apply_fix_or_rename
    scenario_class: fixes
    invoking_routes:
      - route.context_menu
      - route.command_palette
    escalation_ladder:
      - tier.contextual_inline_overlay
      - tier.panel_attached_to_surface
      - tier.sheet_attached_to_window
      - tier.dialog_modal
    preview_class_refs:
      - inline_summary_preview
      - structured_diff_preview
      - broad_workspace_scope_preview
    approval_posture_class_refs:
      - no_approval_required
      - explicit_confirmation_required
    consequence_class_refs:
      - reversible_local
      - recoverable_durable
    capability_scope_class_refs:
      - reversible_local_mutation
      - recoverable_durable_mutation
    disclosure_depth_default: depth.detail
    command_id_refs: []
    notes: >
      Single-file inline rename stays at
      tier.contextual_inline_overlay. Multi-file rename escalates
      to tier.panel_attached_to_surface (rename preview panel) and
      tier.sheet_attached_to_window for preview / apply / revert
      review. tier.dialog_modal is reserved for
      explicit_confirmation_required on
      recoverable_durable_mutation with non-trivial scope.

  - record_kind: navigation_example_row
    example_id: example.destructive_action
    scenario_class: destructive
    invoking_routes:
      - route.context_menu
      - route.global_menu
      - route.command_palette
    escalation_ladder:
      - tier.inline_in_target_surface
      - tier.contextual_inline_overlay
      - tier.sheet_attached_to_window
      - tier.dialog_modal
    preview_class_refs:
      - destructive_bulk_mutation_preview
      - batch_scope_preview
      - irreversible_publish_preview
    approval_posture_class_refs:
      - explicit_confirmation_required
      - admin_policy_approval_required
    consequence_class_refs:
      - recoverable_durable
      - external_shared
      - irreversible_high_blast
    capability_scope_class_refs:
      - recoverable_durable_mutation
      - externally_visible_mutation
      - irreversible_high_blast_mutation
    disclosure_depth_default: depth.detail
    command_id_refs: []
    notes: >
      Single-row destructive action on recoverable_durable_mutation
      with narrow scope MAY escalate directly from
      tier.contextual_inline_overlay to tier.dialog_modal with
      explicit_confirmation_required. Bulk destructive review
      MUST enter tier.sheet_attached_to_window (batch_scope_review
      per shell_interaction_safety_contract.md) before the modal
      confirm. The modal MUST cite consequence_class_label,
      preview_class, and approval_posture_class; a modal that
      cites none of these is non-conforming.

  - record_kind: navigation_example_row
    example_id: example.credentialed_flow
    scenario_class: credentialed
    invoking_routes:
      - route.command_palette
      - route.status_bar_link
      - route.deep_link_or_protocol
    escalation_ladder:
      - tier.contextual_inline_overlay
      - tier.sheet_attached_to_window
      - tier.dialog_modal
    preview_class_refs:
      - credential_or_secret_access_preview
      - browser_handoff_preview
    approval_posture_class_refs:
      - step_up_authentication_required
    consequence_class_refs:
      - external_shared
    capability_scope_class_refs:
      - credential_or_secret_bearing
    disclosure_depth_default: depth.detail
    command_id_refs: []
    notes: >
      Credential picker and account chip render at
      tier.contextual_inline_overlay. Reveal / step-up enters
      tier.sheet_attached_to_window so the workspace remains
      visible. tier.dialog_modal is reserved for
      step_up_authentication_required and
      credential_or_secret_access_preview. Browser handoff rides
      route.deep_link_or_protocol and the browser_handoff_packet
      (ADR 0010); raw URL launches are forbidden.

  - record_kind: navigation_example_row
    example_id: example.high_risk_approval
    scenario_class: high_risk_approval
    invoking_routes:
      - route.command_palette
      - route.global_menu
      - route.notification_or_banner
      - route.inspector_link
    escalation_ladder:
      - tier.panel_attached_to_surface
      - tier.sheet_attached_to_window
      - tier.dialog_modal
      - tier.full_surface_takeover
    preview_class_refs:
      - structured_diff_preview
      - irreversible_publish_preview
      - externally_mutating_preview
      - policy_authoring_or_waiver_preview
      - managed_workspace_control_preview
      - install_or_update_preview
      - remote_attach_preview
      - collaboration_invite_preview
    approval_posture_class_refs:
      - admin_policy_approval_required
      - second_party_review_required
      - managed_only_approval_required
    consequence_class_refs:
      - external_shared
      - irreversible_high_blast
    capability_scope_class_refs:
      - externally_visible_mutation
      - irreversible_high_blast_mutation
      - managed_workspace_control
      - policy_authoring_or_waiver
    disclosure_depth_default: depth.evidence
    command_id_refs:
      - cmd:workspace.restore_from_checkpoint
    notes: >
      Default tier is tier.panel_attached_to_surface (review
      packet, evidence panel). Apply preview escalates to
      tier.sheet_attached_to_window (preview / apply / revert
      with representation labels). tier.dialog_modal is required
      on admin_policy_approval_required, second_party_review_required,
      or managed_only_approval_required. tier.full_surface_takeover
      is admissible when the review surface is a structured diff,
      evidence packet, or governance review that exceeds sheet
      capacity, and the takeover MUST expose a back-to-source
      route.

# ---------------------------------------------------------------------------
# Handoff rules for onboarding, docs / help, migration, and companion
# surfaces. Mirrors §8 of the contract doc.
# ---------------------------------------------------------------------------
handoff_rules:
  permitted:
    - quote_command_id_from_registry
    - quote_primary_label_ref_from_registry
    - quote_accessibility_label_path_from_registry
    - quote_docs_help_anchor_ref_from_registry
    - quote_current_shortcut_from_registry
    - quote_disabled_state_reason_from_registry
    - deep_link_to_route_command_palette
    - deep_link_to_route_global_menu
    - deep_link_to_route_context_menu
    - deep_link_to_route_sidebar
    - deep_link_to_route_status_bar_link
    - deep_link_to_route_inspector_link
    - deep_link_to_route_cli_invocation
    - deep_link_to_route_deep_link_or_protocol
    - present_short_lived_migration_diff_for_high_frequency_commands
  forbidden:
    - mint_new_issuing_surface_value
    - run_command_without_entering_canonical_route
    - substitute_surface_local_label_or_docs_anchor_for_registry_values
    - bypass_trust_preview_approval_or_focus_return_rules
  denial_reasons_when_violated:
    - issuing_surface_unresolved
    - command_version_unknown

# ---------------------------------------------------------------------------
# Reuse guarantee (mirrors §12 of the contract doc). A new shell, command,
# support, or onboarding surface is conforming only if every bullet below
# is satisfied. Parity audits read this block mechanically.
# ---------------------------------------------------------------------------
reuse_guarantee:
  surface_must:
    - cite_at_least_one_navigation_route_id_from_route_rows
    - resolve_every_launch_bearing_affordance_through_a_registry_command_id
    - declare_default_escalation_tier_and_highest_admissible_tier
    - cite_consequence_class_preview_class_or_approval_posture_class_for_any_tier_above_tier_contextual_inline_overlay
    - declare_default_disclosure_depth_and_command_backed_inspection_path_for_every_higher_depth
    - honor_focus_return_rules_on_every_dismiss_above_tier_inline_in_target_surface
    - refuse_to_widen_into_a_route_slot_or_issuing_surface_outside_the_published_taxonomy

# ---------------------------------------------------------------------------
# Change discipline (mirrors §10 of the contract doc).
# ---------------------------------------------------------------------------
change_discipline:
  additive_minor_changes:
    - add_new_navigation_route_row
    - add_new_escalation_tier_row
    - add_new_disclosure_depth_row
    - add_new_example_row
    - extend_notes_fields_without_changing_ids
  breaking_changes:
    - repurpose_existing_navigation_route_id
    - repurpose_existing_escalation_tier_id
    - repurpose_existing_disclosure_depth_id
    - widen_admissible_entry_criteria_for_an_existing_tier
    - drop_required_attribution_from_an_existing_tier
  breaking_change_gate:
    - open_new_decision_row_in_artifacts_governance_decision_index_yaml
    - update_contract_doc_and_this_file_in_same_change
    - update_command_descriptor_or_slot_taxonomy_schema_when_vocabulary_crosses_the_boundary
