# Undo-group lineage examples.
#
# Machine-readable companion to
#   docs/ux/clipboard_history_contract.md
#
# This file pins worked examples for undo-group lineage across
# the high-frequency editing and navigation surfaces. Every row
# cites an undo class from artifacts/architecture/undo_class_rows.yaml,
# a recovery class from artifacts/io/save_rewrite_classes.yaml /
# docs/verification/source_fidelity_and_undo_packet.md, and the
# failure-tier / lifecycle / delivery-surface vocabularies
# already frozen elsewhere. The examples seed the contract's
# acceptance expectations:
#
#   - grouped multi-file actions expose attribution and
#     workspace-scoped lineage;
#   - AI / extension apply rows name agent + invocation ids;
#   - no-undo paths (only_revertible) take a preview +
#     checkpoint before commit;
#   - reopen-history rows cite the same mutation_journal_entry_ref
#     as the undo-history row and the local-history compare row
#     (the lineage-cross-link invariants in §7.6);
#   - at least one example exercises undo, reopen-history, and
#     local-history checkpoint truth for the same mutating
#     operation (see row 'ai_apply_multi_file_with_reopen_and_checkpoint').
#
# Conformance:
#   - Every row below conforms to this file's structural shape;
#     there is no separate JSON schema yet. Adding a row is
#     additive-minor and lands here, in the contract doc, and
#     in the fixture corpus in the same change. Repurposing a
#     row id, an undo_class_id, a recovery_class, or an
#     invariant id is breaking and opens a new decision row.
#
# If this file and docs/ux/clipboard_history_contract.md
# disagree, the contract doc wins and this file updates in the
# same change.

undo_group_examples_schema_version: 1

sources:
  contract_doc_ref: docs/ux/clipboard_history_contract.md
  shell_interaction_safety_contract_ref: docs/ux/shell_interaction_safety_contract.md
  buffer_undo_adr_ref: docs/adr/0003-buffer-undo-large-file.md
  undo_class_rows_ref: artifacts/architecture/undo_class_rows.yaml
  save_rewrite_classes_ref: artifacts/io/save_rewrite_classes.yaml
  source_fidelity_and_undo_packet_ref: docs/verification/source_fidelity_and_undo_packet.md
  text_fidelity_packet_ref: docs/verification/text_fidelity_packet.md
  state_and_recovery_taxonomy_ref: docs/ux/state_and_recovery_taxonomy.md
  failure_tier_matrix_ref: artifacts/ux/failure_tier_matrix.yaml
  navigation_and_escalation_contract_ref: docs/ux/navigation_and_escalation_contract.md
  attention_activity_taxonomy_ref: docs/ux/attention_activity_taxonomy.md
  suspicious_content_packet_ref: docs/security/suspicious_content_packet.md
  browser_handoff_adr_ref: docs/adr/0010-connected-provider-browser-handoff-approval-ticket.md
  a11y_ime_packet_template_ref: docs/accessibility/a11y_ime_packet_template.md

