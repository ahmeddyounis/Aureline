# ---------------------------------------------------------------------------
# Rows.
# ---------------------------------------------------------------------------
undo_group_examples:

  # -------------------------------------------------------------------------
  # 1. Single-cursor typing coalesces into one undo group.
  # -------------------------------------------------------------------------
  - record_kind: undo_group_example_row
    undo_group_examples_schema_version: 1
    row_id: undo_group:text_edit:single_cursor_typing
    scenario_summary: >
      The user types into a single buffer across a few seconds.
      Keystrokes coalesce into one undo group per the text_edit
      coalescing rule (word boundary, caret jump, selection
      change, or configurable idle window). Undo reverses the
      entire coalesced group atomically.
    contract_section_ref: docs/ux/clipboard_history_contract.md#7.1
    surfaces:
      - editor_canvas
    authority_class: user_initiated_local
    consequence_class: reversible_local
    undo_class_id: text_edit
    compensation_posture: compensatable
    recovery_class: exact_undo
    originator: user_keystroke
    attribution:
      originator_identity_ref: is:actor:user:me
      agent_id: null
      invocation_id: null
      preview_handle_ref: null
      checkpoint_ref: null
      review_artifact_ref: null
    preview_and_checkpoint_required: false
    preview_phase_required: false
    checkpoint_required: false
    mutation_journal_entry_ref: mutation:example:text_edit:01
    workspace_group_id_ref: null
    per_buffer_undo_group_id_ref: ug:buffer:editor-01:42
    preview_apply_revert_phases_emitted:
      - apply
      - keep_or_revert
    history_rows:
      - surface: editor_canvas
        row_kind: undo_history_row
        label_rule: >
          Labelled by the originator; when the originator is
          user_keystroke the row renders as "Undo typing" (the
          UX Style Guide owns final wording) and reveals the
          coalesced byte range on focus.
        mutation_journal_entry_ref: mutation:example:text_edit:01
      - surface: activity_center
        row_kind: reopen_history_row
        label_rule: >
          Activity-centre digest card cites the same
          mutation_journal_entry_ref; reopen restores focus to
          the originating editor pane (returned_exact).
        mutation_journal_entry_ref: mutation:example:text_edit:01
    lineage_cross_link_invariants:
      - one_mutation_journal_entry_per_operation
      - same_id_on_every_derived_row
      - recovery_class_agreement_across_surfaces
    failure_tier_mapping: []
    forbidden_rendering:
      - "Flat 'Undo' label on a coalesced group that spans a selection replacement without disclosing the structural edit on focus"
    journey_trace_class: open_edit_save
    overclaims_reversibility: false
    minted_at: "2026-04-23T00:00:00Z"

  # -------------------------------------------------------------------------
  # 2. Workspace-scope refactor with preview + checkpoint.
  # -------------------------------------------------------------------------
  - record_kind: undo_group_example_row
    undo_group_examples_schema_version: 1
    row_id: undo_group:refactor_multi_file:rename_symbol_workspace
    scenario_summary: >
      The user invokes a workspace-scope rename that touches 42
      buffers. The review surface renders a preview against a
      basis snapshot; the user approves; a checkpoint is taken
      before apply. A divergent edit in any member buffer after
      the apply drops the redo stack for the workspace group;
      the surface labels redo as invalidated rather than
      silently dropping it. Rollback resolves via
      restore_from_checkpoint, NOT exact_undo.
    contract_section_ref: docs/ux/clipboard_history_contract.md#7.2
    surfaces:
      - review_and_diff_canvas
      - editor_canvas
    authority_class: user_initiated_local
    consequence_class: recoverable_durable
    undo_class_id: refactor_multi_file
    compensation_posture: only_revertible
    recovery_class: restore_from_checkpoint
    originator: "command:rename_symbol_workspace"
    attribution:
      originator_identity_ref: is:actor:user:me
      agent_id: null
      invocation_id: null
      preview_handle_ref: preview:rename-symbol:01
      checkpoint_ref: checkpoint:rename-symbol:01
      review_artifact_ref: review:rename-symbol:01
    preview_and_checkpoint_required: true
    preview_phase_required: true
    checkpoint_required: true
    mutation_journal_entry_ref: mutation:example:refactor_multi_file:01
    workspace_group_id_ref: ws-group:rename-symbol:01
    per_buffer_undo_group_id_ref: null
    preview_apply_revert_phases_emitted:
      - propose
      - preview
      - apply
      - validate
      - keep_or_revert
    history_rows:
      - surface: editor_canvas
        row_kind: undo_history_row
        label_rule: >
          Per-buffer undo rows label the change as "Roll back
          rename across workspace" (UX Style Guide owns final
          wording). Flat 'Undo' is forbidden on
          only_revertible groups.
        mutation_journal_entry_ref: mutation:example:refactor_multi_file:01
      - surface: review_and_diff_canvas
        row_kind: durable_job_row
        label_rule: >
          Durable job row in the activity centre cites the
          preview_handle, checkpoint handle, review artifact,
          and the workspace_group_id.
        mutation_journal_entry_ref: mutation:example:refactor_multi_file:01
      - surface: activity_center
        row_kind: reopen_history_row
        label_rule: >
          Reopen-history row surfaces "Compare with local
          history" and "Restore from checkpoint" affordances;
          both resolve back to the same mutation journal entry.
        mutation_journal_entry_ref: mutation:example:refactor_multi_file:01
    lineage_cross_link_invariants:
      - one_mutation_journal_entry_per_operation
      - same_id_on_every_derived_row
      - checkpoint_identity_follows_the_same_id
      - recovery_class_agreement_across_surfaces
    failure_tier_mapping:
      - state_token_ref: refactor.partial_apply
        failure_tier_id: tier.contextual_degraded
        delivery_surface_class: contextual_banner
        rationale: >
          Partial apply on a multi-file refactor renders a
          surface-level banner plus the partial-outcome row on
          the review surface; never a toast.
    forbidden_rendering:
      - "'Undo' label on an only_revertible group without recovery class disclosure"
      - "silent redo-stack drop after a divergent edit in any member buffer"
      - "toast-only progress rendering for the broad apply"
    journey_trace_class: open_refactor_review
    overclaims_reversibility: false
    minted_at: "2026-04-23T00:00:00Z"

  # -------------------------------------------------------------------------
  # 3. AI apply — canonical full-coverage example:
  #    demonstrates undo + reopen-history + local-history
  #    checkpoint truth for the SAME mutating operation.
  #    Satisfies contract acceptance §7.6 / §13.
  # -------------------------------------------------------------------------
  - record_kind: undo_group_example_row
    undo_group_examples_schema_version: 1
    row_id: undo_group:machine_generated_change:ai_apply_multi_file_with_reopen_and_checkpoint
    scenario_summary: >
      The user approves an AI apply that mutates 14 buffers
      (extract a shared helper across tests and production
      code). The apply takes a preview, a checkpoint, and a
      review artifact before commit. After apply, the user
      closes the review surface. Reopening the apply from the
      activity centre MUST resolve to the same mutation
      journal entry; the editor's undo-history row for each
      buffer MUST cite the same entry; the local-history
      compare / restore surface MUST cite the same checkpoint
      and the same entry. Rollback resolves via
      restore_from_checkpoint.
    contract_section_ref: docs/ux/clipboard_history_contract.md#7.6
    surfaces:
      - ai_apply_canvas
      - review_and_diff_canvas
      - editor_canvas
    authority_class: ai_initiated
    consequence_class: recoverable_durable
    undo_class_id: machine_generated_change
    compensation_posture: only_revertible
    recovery_class: restore_from_checkpoint
    originator: "ai_apply"
    attribution:
      originator_identity_ref: is:actor:agent:coding-assist
      agent_id: "agent:coding-assist"
      invocation_id: "inv:2026-04-23:ai-apply:01"
      preview_handle_ref: preview:ai-apply:01
      checkpoint_ref: checkpoint:ai-apply:01
      review_artifact_ref: review:ai-apply:01
      citation_anchor_refs:
        - anchor:docs:refactor-guide:helper-extraction
    preview_and_checkpoint_required: true
    preview_phase_required: true
    checkpoint_required: true
    mutation_journal_entry_ref: mutation:example:ai_apply:01
    workspace_group_id_ref: ws-group:ai-apply:01
    per_buffer_undo_group_id_ref: null
    preview_apply_revert_phases_emitted:
      - propose
      - preview
      - apply
      - validate
      - keep_or_revert
    history_rows:
      - surface: editor_canvas
        row_kind: undo_history_row
        label_rule: >
          Per-buffer history rows label the change as "Roll
          back AI apply" with agent id + invocation id on
          reveal. Flat 'Undo' on the machine group denies
          with undo_label_hides_recovery_class.
        mutation_journal_entry_ref: mutation:example:ai_apply:01
      - surface: activity_center
        row_kind: reopen_history_row
        label_rule: >
          Reopen-history row pins agent + invocation + preview
          handle. Reopening returns focus to the AI apply
          canvas (returned_exact) and re-attaches to the same
          workspace_group_id; a reopen that mints a fresh id
          denies with reopen_history_lineage_forked_per_surface.
        mutation_journal_entry_ref: mutation:example:ai_apply:01
      - surface: local_history_inspector
        row_kind: local_history_compare_row
        label_rule: >
          "Compare with local history" and "Restore from
          checkpoint" render the same checkpoint_ref and the
          same mutation_journal_entry_ref; compare surfaces
          display the invoker / agent / invocation ids from
          the shared entry.
        mutation_journal_entry_ref: mutation:example:ai_apply:01
      - surface: support_export_canvas
        row_kind: evidence_packet_row
        label_rule: >
          Support bundle cites mutation_journal_entry_ref,
          checkpoint handle, agent id, invocation id; raw
          prompt text is redacted per
          secret-broker / redaction contract.
        mutation_journal_entry_ref: mutation:example:ai_apply:01
    lineage_cross_link_invariants:
      - one_mutation_journal_entry_per_operation
      - same_id_on_every_derived_row
      - checkpoint_identity_follows_the_same_id
      - recovery_class_agreement_across_surfaces
    failure_tier_mapping:
      - state_token_ref: ai.partial_results
        failure_tier_id: tier.inline_issue
        delivery_surface_class: inline_row_chrome
        rationale: >
          Per-buffer apply failures render inline on the
          failing row; cross-buffer partials promote to
          contextual_degraded per the lifecycle:ai_action
          mapping.
      - state_token_ref: ai.rolled_back
        failure_tier_id: tier.contextual_degraded
        delivery_surface_class: activity_center_digest_card
        rationale: >
          Rolled-back apply preserves the evidence on the
          digest card; label resolves to
          prior_work_preserved_but_not_rerun user-impact
          class.
    forbidden_rendering:
      - "reopen-history row that mints a fresh invocation id rather than re-citing the same mutation_journal_entry_ref"
      - "undo row rendered as 'Undo' without agent attribution"
      - "local-history compare row that cites a different checkpoint than the one the mutation journal entry references"
      - "AI-generated copy without citation_anchor_refs when quoting authoritative material"
    journey_trace_class: ai_apply_review
    overclaims_reversibility: false
    minted_at: "2026-04-23T00:00:00Z"

  # -------------------------------------------------------------------------
  # 4. Save participant group — format-on-save + organise-imports.
  # -------------------------------------------------------------------------
  - record_kind: undo_group_example_row
    undo_group_examples_schema_version: 1
    row_id: undo_group:save_participant_group:format_and_organize_imports
    scenario_summary: >
      The user saves a buffer. The save pipeline runs
      format-on-save and organise-imports as participants; both
      complete under the same save group id. Any participant
      rebase or abort (on-disk bytes changed mid-flight) rolls
      the buffer back to the pre-pipeline snapshot rather than
      committing a partial save; the history row labels the
      outcome as compensating_rollback when a rebase happened.
    contract_section_ref: docs/ux/clipboard_history_contract.md#7.4
    surfaces:
      - editor_canvas
    authority_class: user_initiated_local
    consequence_class: recoverable_durable
    undo_class_id: save_participant_group
    compensation_posture: only_revertible
    recovery_class: restore_from_checkpoint
    originator: "command:save (format_on_save + organise_imports)"
    attribution:
      originator_identity_ref: is:actor:user:me
      agent_id: null
      invocation_id: null
      preview_handle_ref: null
      checkpoint_ref: checkpoint:save:01
      review_artifact_ref: null
      participants:
        - save_participant:format_on_save
        - save_participant:organise_imports
      save_mode: atomic_rename
      rebased_or_aborted: false
    preview_and_checkpoint_required: true
    preview_phase_required: false
    checkpoint_required: true
    mutation_journal_entry_ref: mutation:example:save_participant_group:01
    workspace_group_id_ref: null
    per_buffer_undo_group_id_ref: ug:buffer:editor-03:101
    preview_apply_revert_phases_emitted:
      - apply
      - validate
      - keep_or_revert
    history_rows:
      - surface: editor_canvas
        row_kind: undo_history_row
        label_rule: >
          "Roll back save (format + organize imports)" names
          both participants; rebase / abort outcomes surface as
          partial_outcome rows rather than 'Failed' banners.
        mutation_journal_entry_ref: mutation:example:save_participant_group:01
    lineage_cross_link_invariants:
      - one_mutation_journal_entry_per_operation
      - same_id_on_every_derived_row
      - checkpoint_identity_follows_the_same_id
      - recovery_class_agreement_across_surfaces
    failure_tier_mapping:
      - state_token_ref: save.participant_rebased
        failure_tier_id: tier.inline_issue
        delivery_surface_class: inline_row_chrome
        rationale: >
          Participant rebase renders inline on the failing
          file's row with Retry this / Reveal last failure;
          repeats promote per the save-pipeline escalation
          rules.
    forbidden_rendering:
      - "partial save committed to disk without rollback when a participant aborted"
      - "'Undo' label on the save group without naming participants"
    journey_trace_class: open_edit_save
    overclaims_reversibility: false
    minted_at: "2026-04-23T00:00:00Z"

  # -------------------------------------------------------------------------
  # 5. Settings import — only_revertible imported change.
  # -------------------------------------------------------------------------
  - record_kind: undo_group_example_row
    undo_group_examples_schema_version: 1
    row_id: undo_group:imported_change:settings_import
    scenario_summary: >
      The user imports a settings bundle. The settings-import
      surface renders a preview (the migration report) and
      takes a checkpoint before apply. The history row labels
      the outcome as restore_from_checkpoint; reopen surfaces
      a migration report row with review_migration_report /
      roll_back_import / keep_imported_state hooks from the
      frozen next-step decision set.
    contract_section_ref: docs/ux/clipboard_history_contract.md#7.4
    surfaces:
      - settings_import_canvas
    authority_class: user_initiated_local
    consequence_class: recoverable_durable
    undo_class_id: imported_change
    compensation_posture: only_revertible
    recovery_class: restore_from_checkpoint
    originator: "settings_import"
    attribution:
      originator_identity_ref: is:actor:user:me
      agent_id: null
      invocation_id: null
      preview_handle_ref: preview:settings-import:01
      checkpoint_ref: checkpoint:settings-import:01
      review_artifact_ref: review:settings-import:01
      import_source: "settings-bundle-ref:01"
      import_kind: "workspace_settings_bundle"
    preview_and_checkpoint_required: true
    preview_phase_required: true
    checkpoint_required: true
    mutation_journal_entry_ref: mutation:example:imported_change:01
    workspace_group_id_ref: ws-group:settings-import:01
    per_buffer_undo_group_id_ref: null
    preview_apply_revert_phases_emitted:
      - propose
      - preview
      - apply
      - validate
      - keep_or_revert
    history_rows:
      - surface: settings_import_canvas
        row_kind: migration_report_row
        label_rule: >
          Migration-report row names the import source, the
          review artifact, and the checkpoint; reveals
          review_migration_report / roll_back_import /
          keep_imported_state hooks on keyboard focus.
        mutation_journal_entry_ref: mutation:example:imported_change:01
      - surface: activity_center
        row_kind: reopen_history_row
        label_rule: >
          Reopen-history digest card re-cites the same
          mutation_journal_entry_ref; reopening resolves back
          to the migration report with focus returned to the
          invoker.
        mutation_journal_entry_ref: mutation:example:imported_change:01
    lineage_cross_link_invariants:
      - one_mutation_journal_entry_per_operation
      - same_id_on_every_derived_row
      - checkpoint_identity_follows_the_same_id
      - recovery_class_agreement_across_surfaces
    failure_tier_mapping:
      - state_token_ref: import.partial_apply
        failure_tier_id: tier.contextual_degraded
        delivery_surface_class: contextual_banner
        rationale: >
          Partial apply on settings import renders a surface-
