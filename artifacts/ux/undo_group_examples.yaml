    forbidden_rendering:
      - "silent import without a preview or checkpoint"
      - "'Undo' label hiding that rollback resolves via checkpoint restore"
    journey_trace_class: settings_import
    overclaims_reversibility: false
    minted_at: "2026-04-23T00:00:00Z"

  # -------------------------------------------------------------------------
  # 6. Terminal multiline paste — evidence_only_no_rerun lineage.
  # -------------------------------------------------------------------------
  - record_kind: undo_group_example_row
    undo_group_examples_schema_version: 1
    row_id: undo_group:terminal_multiline_paste_then_run
    scenario_summary: >
      The user pastes a 120-line payload into a terminal
      connected to a production host. The paste-classification
      surface renders the multiline_terminal_paste +
      paste_then_run preview; the host identity is visible in
      the required-visible-field set. On commit the paste
      emits no mutation journal entry (terminal output is
      evidence_only_no_rerun); a silent re-run on session
      restore denies with overclaiming reversibility.
    contract_section_ref: docs/ux/clipboard_history_contract.md#8
    surfaces:
      - terminal_canvas
    authority_class: user_initiated_local
    consequence_class: external_shared
    undo_class_id: null
    compensation_posture: null
    recovery_class: evidence_only_no_rerun
    originator: "terminal_paste"
    attribution:
      originator_identity_ref: is:actor:user:me
      agent_id: null
      invocation_id: null
      preview_handle_ref: preview:terminal-paste:01
      checkpoint_ref: null
      review_artifact_ref: null
      high_risk_preview_classes:
        - multiline_terminal_paste
        - paste_then_run
    preview_and_checkpoint_required: false
    preview_phase_required: true
    checkpoint_required: false
    mutation_journal_entry_ref: null
    workspace_group_id_ref: null
    per_buffer_undo_group_id_ref: null
    preview_apply_revert_phases_emitted:
      - preview
      - apply
    history_rows:
      - surface: terminal_canvas
        row_kind: terminal_transcript_row
        label_rule: >
          Terminal transcript row marks the paste as
          evidence-only; the row cannot be silently replayed
          on a restored session. A surface that replays
          transcript rows without user consent denies per the
          interaction-safety contract.
        mutation_journal_entry_ref: null
    lineage_cross_link_invariants:
      - recovery_class_agreement_across_surfaces
    failure_tier_mapping:
      - state_token_ref: terminal.paste_refused
        failure_tier_id: tier.workflow_block
        delivery_surface_class: window_attached_sheet
        rationale: >
          A refused paste (policy / host boundary mismatch)
          renders a workflow-block sheet with safe-abandon
          and focus-return on dismiss.
    forbidden_rendering:
      - "tooltip-only disclosure of multiline terminal paste"
      - "silent re-run of a restored transcript row"
    journey_trace_class: terminal_paste_run
    overclaims_reversibility: false
    minted_at: "2026-04-23T00:00:00Z"

  # -------------------------------------------------------------------------
  # 7. Large paste into editor — durable mirror, basis-drift refusal.
  # -------------------------------------------------------------------------
  - record_kind: undo_group_example_row
    undo_group_examples_schema_version: 1
    row_id: undo_group:editor_large_paste_with_durable_mirror
    scenario_summary: >
      The user pastes 180,000 lines into an editor buffer.
      The paste is above the tier_durable threshold; the
      editor renders a top-of-pane progress indicator and
      mirrors progress to a durable job row in the activity
      centre. Cancellation resolves to cancelled_by_user; a
      basis drift on the destination (external edit landed
      mid-paste) refuses to silently widen and reopens
      preview.
    contract_section_ref: docs/ux/clipboard_history_contract.md#8
    surfaces:
      - editor_canvas
    authority_class: user_initiated_local
    consequence_class: recoverable_durable
    undo_class_id: text_edit
    compensation_posture: compensatable
    recovery_class: exact_undo
    originator: "editor_paste"
    attribution:
      originator_identity_ref: is:actor:user:me
      agent_id: null
      invocation_id: null
      preview_handle_ref: preview:editor-paste:01
      checkpoint_ref: null
      review_artifact_ref: null
      high_risk_preview_classes:
        - oversized_generated_artifact
    preview_and_checkpoint_required: false
    preview_phase_required: false
    checkpoint_required: false
    mutation_journal_entry_ref: mutation:example:editor_paste:01
    workspace_group_id_ref: null
    per_buffer_undo_group_id_ref: ug:buffer:editor-04:512
    preview_apply_revert_phases_emitted:
      - apply
      - validate
      - keep_or_revert
    history_rows:
      - surface: editor_canvas
        row_kind: undo_history_row
        label_rule: >
          "Undo paste" coalesces into one group per the
          text_edit rule (no word-boundary coalescing within
          the single paste operation).
        mutation_journal_entry_ref: mutation:example:editor_paste:01
      - surface: activity_center
        row_kind: durable_job_row
        label_rule: >
          Durable job row names the item count and byte
          estimate, the resolved consequence class
          (recoverable_durable), and the typed cancel route.
          Closing the editor tab MUST NOT cancel the transfer.
        mutation_journal_entry_ref: mutation:example:editor_paste:01
    lineage_cross_link_invariants:
      - one_mutation_journal_entry_per_operation
      - same_id_on_every_derived_row
      - recovery_class_agreement_across_surfaces
    failure_tier_mapping:
      - state_token_ref: paste.basis_drifted
        failure_tier_id: tier.workflow_block
        delivery_surface_class: window_attached_sheet
        rationale: >
          Basis drift between preview and apply opens a
          window-attached sheet to reopen review; silent
          widen denies with apply_basis_drifted.
      - state_token_ref: paste.cancelled_by_user
        failure_tier_id: tier.inline_issue
        delivery_surface_class: inline_row_chrome
        rationale: >
          Cancel resolves inline; the durable mirror records
          the cancelled outcome for export.
    forbidden_rendering:
      - "toast-only rendering of a multi-minute paste"
      - "closing the origin tab cancels the transfer silently"
    journey_trace_class: open_edit_save
    overclaims_reversibility: false
    minted_at: "2026-04-23T00:00:00Z"

# ---------------------------------------------------------------------------
# Invariants reviewed by later conformance gates.
# ---------------------------------------------------------------------------
invariants:

  - id: one_mutation_journal_entry_per_operation
    description: >
      Every mutating clipboard / drop / apply operation writes
      exactly one mutation journal entry whose mutation_id is
      the canonical lineage id. A surface that mints parallel
      ids for the same operation denies with
      reopen_history_lineage_forked_per_surface.
    failure_denial_reason: reopen_history_lineage_forked_per_surface

  - id: same_id_on_every_derived_row
    description: >
      The undo-history row, the reopen-history row, the
      durable job row, the local-history compare row, and the
      support-bundle / evidence-packet export all cite the
      same mutation_journal_entry_ref.
    failure_denial_reason: reopen_history_lineage_forked_per_surface

  - id: checkpoint_identity_follows_the_same_id
    description: >
      Every checkpoint created for an operation cites the
      same mutation_id through its checkpoint_ref.mutation_id
      binding. A reopen that restores from the checkpoint
      resolves back to the same entry.
    failure_denial_reason: reopen_history_lineage_forked_per_surface

  - id: recovery_class_agreement_across_surfaces
    description: >
      The recovery class on the mutation journal entry, on
      the undo-history row, on the reopen-history row, and
      on the local-history compare row MUST match. A
      mismatch denies with
      recovery_class_disagreement_across_surfaces.
    failure_denial_reason: recovery_class_disagreement_across_surfaces

  - id: only_revertible_paths_require_preview_and_checkpoint
    description: >
      Every row whose undo_class_id falls in the
      only_revertible set (refactor_multi_file,
      save_participant_group, imported_change,
      machine_generated_change, migration_change,
      external_reload, decode_recovery_change) sets
      preview_phase_required and checkpoint_required to true
      (save_participant_group skips preview but keeps
      checkpoint). Rows that violate the rule deny with
      no_undo_path_missing_preview_or_checkpoint.
    failure_denial_reason: no_undo_path_missing_preview_or_checkpoint

  - id: machine_generated_rows_carry_attribution
    description: >
      Every row with undo_class_id = machine_generated_change
      names agent_id and invocation_id; rows without deny
      with agent_attribution_lost.
    failure_denial_reason: agent_attribution_lost

  - id: undo_label_names_recovery_class_on_only_revertible
    description: >
      History rows for only_revertible groups MUST name the
      recovery class (restore_from_checkpoint,
      compensating_rollback,
      regenerate_from_canonical_source,
      evidence_only_no_rerun, no_recovery_available) rather
      than rendering a flat 'Undo' label. Rows that flatten
      deny with undo_label_hides_recovery_class.
    failure_denial_reason: undo_label_hides_recovery_class

  - id: terminal_transcript_is_evidence_only_no_rerun
    description: >
      Terminal transcript rows resolve to
      recovery_class = evidence_only_no_rerun; a surface that
      replays them on session restore denies per the
      interaction-safety contract.
    failure_denial_reason: evidence_only_no_rerun_replay_forbidden

  - id: schema_version_alignment
    description: >
      All rows share undo_group_examples_schema_version with
      this registry. Rows lagging behind a schema bump deny
      with undo_group_examples_schema_version_lagging.
    failure_denial_reason: undo_group_examples_schema_version_lagging
