# Shared status-icon, badge, and decoration legend.
#
# Machine-readable companion to docs/ux/decoration_precedence_contract.md.
# This file freezes semantic state families, precedence bands, required
# text pairs, collapse behavior, and no-hue-only requirements. It does
# not define final icon artwork or color tokens.

status_icon_legend_schema_version: 1

sources:
  contract_doc_ref: docs/ux/decoration_precedence_contract.md
  ui_ux_spec_refs:
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#appendix-ba
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#appendix-er
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#appendix-es
  component_state_taxonomy_ref: docs/design/component_state_taxonomy.md
  design_token_state_vocabulary_ref: docs/design/design_token_component_state_vocabulary.md
  status_bar_contract_ref: docs/ux/status_bar_contract.md
  tabs_contract_ref: docs/ux/tabs_editor_groups_contract.md
  safe_preview_trust_classes_ref: docs/security/safe_preview_trust_classes.md
  inline_hint_contract_ref: docs/language/completion_and_inline_hint_contract.md
  diagnostic_contract_ref: docs/language/diagnostics_and_code_action_contract.md
  fixture_corpus_ref: fixtures/ux/decoration_cases/

rules:
  hue_only_forbidden: true
  high_contrast_first_party: true
  forced_colors_preserve_shape_icon_text: true
  reduced_motion_uses_static_state_labels: true
  pointer_hover_only_details_forbidden: true
  icon_only_allowed_only_with_accessible_name_and_details: true
  high_severity_and_trust_critical_need_visible_text_at_normal_density: true
  compact_summary_must_name_state_families: true

state_families:
  - family_id: trust
    family_label: Trust
    question_answered: >
      Is this object or surface safe to trust, execute, preview, copy,
      export, or mutate?
    default_state: trusted_full
    non_default_must_preserve: true
    values:
      - state_id: trusted_full
        label: Trusted
        required_text_pair: Trusted
        visible_by_default: false
        accessible_phrase: trusted
      - state_id: restricted_workspace
        label: Restricted workspace
        required_text_pair: Restricted workspace
        visible_by_default: true
        accessible_phrase: restricted workspace
      - state_id: policy_locked
        label: Policy locked
        required_text_pair: Policy locked
        visible_by_default: true
        accessible_phrase: policy locked
      - state_id: unsafe_active_content
        label: Active content blocked
        required_text_pair: Active content blocked
        visible_by_default: true
        accessible_phrase: active content blocked
      - state_id: suspicious_content
        label: Suspicious content
        required_text_pair: Suspicious content
        visible_by_default: true
        accessible_phrase: suspicious content present

  - family_id: blocked_degraded
    family_label: Blocked or degraded
    question_answered: >
      Can the user continue, and if so through which reduced, read-only,
      partial, or fallback path?
    default_state: unblocked
    non_default_must_preserve: true
    values:
      - state_id: unblocked
        label: Unblocked
        required_text_pair: Unblocked
        visible_by_default: false
        accessible_phrase: unblocked
      - state_id: blocked
        label: Blocked
        required_text_pair: Blocked
        visible_by_default: true
        accessible_phrase: blocked
      - state_id: policy_blocked
        label: Policy blocked
        required_text_pair: Policy blocked
        visible_by_default: true
        accessible_phrase: policy blocked
      - state_id: read_only_degraded
        label: Read-only degraded
        required_text_pair: Read-only degraded
        visible_by_default: true
        accessible_phrase: read-only degraded
      - state_id: degraded
        label: Degraded
        required_text_pair: Degraded
        visible_by_default: true
        accessible_phrase: degraded
      - state_id: partial
        label: Partial
        required_text_pair: Partial
        visible_by_default: true
        accessible_phrase: partial
      - state_id: unsupported
        label: Unsupported
        required_text_pair: Unsupported
        visible_by_default: true
        accessible_phrase: unsupported

  - family_id: danger_severity
    family_label: Severity
    question_answered: >
      How severe is the finding, warning, consequence, or review
      outcome?
    default_state: none
    non_default_must_preserve: true
    values:
      - state_id: none
        label: No severity
        required_text_pair: No severity
        visible_by_default: false
        accessible_phrase: no severity
      - state_id: critical
        label: Critical
        required_text_pair: Critical
        visible_by_default: true
        accessible_phrase: critical severity
      - state_id: danger
        label: Danger
        required_text_pair: Danger
        visible_by_default: true
        accessible_phrase: danger
      - state_id: error
        label: Error
        required_text_pair: Error
        visible_by_default: true
        accessible_phrase: error
      - state_id: warning
        label: Warning
        required_text_pair: Warning
        visible_by_default: true
        accessible_phrase: warning
      - state_id: info
        label: Info
        required_text_pair: Info
        visible_by_default: false
        accessible_phrase: information

  - family_id: review_conflict
    family_label: Review, diff, or conflict
    question_answered: >
      Does a review thread, diff, merge conflict, or comment anchor
      affect interpretation of this object or line?
    default_state: none
    non_default_must_preserve: true
    values:
      - none
      - review_anchor
      - diff_hunk
      - merge_conflict
      - comment_thread
      - changed_item

  - family_id: execution_test
    family_label: Execution, debug, test, or coverage
    question_answered: >
      Does current execution, debug position, task state, test state,
      benchmark state, or coverage affect this object or line?
    default_state: none
    non_default_must_preserve: true
    values:
      - none
      - debug_current_frame
      - breakpoint
      - run_state
      - task_state
      - test_state
      - coverage_state

  - family_id: inline_metadata
    family_label: Inline metadata
    question_answered: >
      Is advisory inline metadata competing for editor space with
      higher-priority decorations?
    default_state: none
    non_default_must_preserve: false
    values:
      - none
      - code_lens
      - inlay_hint
      - type_hint
      - reference_count
      - decorative_qualifier

  - family_id: lifecycle
    family_label: Lifecycle
    question_answered: >
      What readiness posture has the owning lane declared for this
      capability, object, or contribution?
    default_state: stable
    non_default_must_preserve: true
    values:
      - labs
      - preview
      - beta
      - stable
      - lts_facing
      - deprecated
      - disabled_by_policy
      - retired

  - family_id: support_class
    family_label: Support
    question_answered: >
      What support commitment applies independently of lifecycle,
      channel, or freshness?
    default_state: standard_support
    non_default_must_preserve: true
    values:
      - best_effort
      - community_supported
      - standard_support
      - extended_support
      - operator_only_support
      - no_support

  - family_id: freshness
    family_label: Freshness
    question_answered: >
      How current is the evidence, claim, result, or provider-backed
      view?
    default_state: authoritative_live
    non_default_must_preserve: true
    values:
      - authoritative_live
      - warm_cached
      - degraded_cached
      - stale
      - unverified

  - family_id: imported_snapshot
    family_label: Imported or snapshot
    question_answered: >
      Is this object live source, imported evidence, a captured
      snapshot, provider overlay, static preview, or metadata-only
      substitute?
    default_state: live_source
    non_default_must_preserve: true
    values:
      - live_source
      - imported_evidence
      - captured_snapshot
      - static_snapshot
      - mirrored_snapshot
      - provider_overlay
      - metadata_only

  - family_id: generated
    family_label: Generated
    question_answered: >
      Is this object authored source, generated output, derived
      material, or editable only through lineage?
    default_state: authored_source
    non_default_must_preserve: true
    values:
      - authored_source
      - generated_read_only
      - generated_edit_blocked
      - generated_editable_with_lineage
      - derived_rendered

  - family_id: ambient
    family_label: Ambient
    question_answered: >
      Does the cue aid scanning without changing safety, authority,
      support, freshness, or action availability?
    default_state: none
    non_default_must_preserve: false
    values:
      - none
      - favorite
      - recent
      - ordinary_file_type
      - decorative_group

precedence_bands:
  - band_id: trust_or_policy_critical
    rank: 1
    families:
      - trust
      - blocked_degraded
    state_subset:
      - restricted_workspace
      - policy_locked
      - unsafe_active_content
      - suspicious_content
      - policy_blocked
    visual_rule: icon_and_visible_text_required
    collapse_rule: may_collapse_only_to_visible_family_summary
    detail_sections:
      - trust_and_policy
      - primary_state_reason

  - band_id: blocked_or_high_severity
    rank: 2
    families:
      - blocked_degraded
      - danger_severity
    state_subset:
      - blocked
      - critical
      - danger
      - error
    visual_rule: visible_text_required_at_normal_density
    collapse_rule: may_collapse_only_to_visible_family_summary
    detail_sections:
      - blockers_and_degradation
      - severity_and_review
      - primary_state_reason

  - band_id: diagnostic_or_debug
    rank: 3
    families:
      - danger_severity
      - execution_test
    state_subset:
      - warning
      - info
      - debug_current_frame
      - breakpoint
    visual_rule: use_editor_or_review_lane_precedence
    collapse_rule: preserve_in_detail_when_displaced
    detail_sections:
      - severity_and_review

  - band_id: merge_diff_review
    rank: 4
    families:
      - review_conflict
    state_subset:
      - review_anchor
      - diff_hunk
      - merge_conflict
    visual_rule: visible_on_review_bearing_rows
    collapse_rule: preserve_anchor_count_and_detail_route
    detail_sections:
      - severity_and_review
      - hidden_by_precedence

  - band_id: test_coverage_execution
    rank: 5
    families:
      - execution_test
    state_subset:
      - test_state
      - coverage_state
      - run_state
    visual_rule: visible_unless_displaced_by_higher_band
    collapse_rule: aggregate_by_owner_with_detail_refs
    detail_sections:
      - hidden_by_precedence

  - band_id: degraded_partial_readonly
    rank: 6
    families:
      - blocked_degraded
      - freshness
    state_subset:
      - read_only_degraded
      - degraded
      - partial
      - unsupported
      - degraded_cached
      - unverified
    visual_rule: visible_when_actions_or_certainty_change
    collapse_rule: summary_must_name_reduced_capability
    detail_sections:
      - blockers_and_degradation
      - freshness_and_snapshot

  - band_id: lifecycle_support
    rank: 7
    families:
      - lifecycle
      - support_class
    state_subset:
      - labs
      - preview
      - beta
      - deprecated
      - disabled_by_policy
      - retired
      - best_effort
      - community_supported
      - operator_only_support
      - no_support
    visual_rule: independent_axis_badges_when_decision_bearing
    collapse_rule: summary_must_preserve_axis_names
    detail_sections:
      - lifecycle_and_support

  - band_id: freshness_import_snapshot
    rank: 8
    families:
      - freshness
      - imported_snapshot
    state_subset:
      - warm_cached
      - degraded_cached
      - stale
      - unverified
      - imported_evidence
      - captured_snapshot
      - static_snapshot
      - mirrored_snapshot
      - provider_overlay
      - metadata_only
    visual_rule: visible_for_mutation_review_support_or_trust
    collapse_rule: summary_must_name_freshness_or_snapshot
    detail_sections:
      - freshness_and_snapshot

  - band_id: generated_derived
    rank: 9
    families:
      - generated
    state_subset:
      - generated_read_only
      - generated_edit_blocked
      - generated_editable_with_lineage
      - derived_rendered
    visual_rule: visible_for_edit_refactor_review_and_export
    collapse_rule: summary_must_name_generated_posture
    detail_sections:
      - generated_and_lineage

  - band_id: code_lens_or_inlay
    rank: 10
    families:
      - inline_metadata
    state_subset:
      - code_lens
      - inlay_hint
      - type_hint
      - reference_count
    visual_rule: hidden_before_consequence_bearing_decorations
    collapse_rule: record_suppression_reason
    detail_sections:
      - hidden_by_precedence

  - band_id: ambient_decorative
    rank: 11
    families:
      - ambient
      - inline_metadata
    state_subset:
      - decorative_qualifier
      - favorite
      - recent
      - ordinary_file_type
      - decorative_group
    visual_rule: collapses_first
    collapse_rule: may_omit_when_budget_constrained
    detail_sections:
      - hidden_by_precedence

surface_projection_rules:
  - surface_family: table_row
    primary_slot: leading_state_cell
    max_secondary_visible_states: 2
    summary_affordance: counted_more_states_row_action
    accessible_name_order: primary_secondary_summary
  - surface_family: tab
    primary_slot: compact_label_adjacent_cue
    max_secondary_visible_states: 1
    summary_affordance: overflow_row_state_list
    accessible_name_order: active_dirty_primary_secondary_summary
  - surface_family: card
    primary_slot: header_badge
    max_secondary_visible_states: 3
    summary_affordance: expandable_detail_footer
    accessible_name_order: primary_secondary_summary
  - surface_family: badge_list
    primary_slot: first_badge_by_precedence
    max_secondary_visible_states: 4
    summary_affordance: expandable_counted_summary
    accessible_name_order: ordered_badge_list_then_summary
  - surface_family: editor_gutter
    primary_slot: highest_precedence_lane
    max_secondary_visible_states: 3
    summary_affordance: keyboard_reachable_line_detail
    accessible_name_order: line_primary_hidden_by_precedence
  - surface_family: editor_inline
    primary_slot: inline_metadata_slot
    max_secondary_visible_states: 1
    summary_affordance: suppression_reason_detail
    accessible_name_order: inline_primary_suppression_reason
  - surface_family: review_row
    primary_slot: review_state_cell
    max_secondary_visible_states: 3
    summary_affordance: collapsed_evidence_summary
    accessible_name_order: primary_evidence_summary
  - surface_family: support_export
    primary_slot: ordered_fact_list
    max_secondary_visible_states: unlimited
    summary_affordance: none
    accessible_name_order: ordered_fact_list

editor_decoration_precedence:
  inline_bands:
    - diagnostic_or_debug
    - merge_diff_review
    - test_coverage_execution
    - code_lens_or_inlay
    - decorative_qualifier
  gutter_lanes:
    - breakpoint_or_execution
    - diagnostics
    - change_markers
    - fold_controls
    - supplemental_cues
  suppression_reasons:
    - higher_priority_decoration
    - large_file_mode
    - high_zoom
    - reduced_motion
    - low_certainty
    - read_only_or_generated
    - policy_blocked
    - typing_budget_protection

mandatory_text_rules:
  - rule_id: trust_critical_visible_text
    applies_to_families:
      - trust
      - blocked_degraded
    applies_to_states:
      - restricted_workspace
      - policy_locked
      - unsafe_active_content
      - suspicious_content
      - blocked
      - policy_blocked
    requirement: visible_text_at_normal_density
  - rule_id: high_severity_visible_text
    applies_to_families:
      - danger_severity
    applies_to_states:
      - critical
      - danger
      - error
    requirement: visible_text_at_normal_density
  - rule_id: non_live_evidence_named
    applies_to_families:
      - freshness
      - imported_snapshot
    applies_to_states:
      - stale
      - unverified
      - imported_evidence
      - captured_snapshot
      - static_snapshot
      - metadata_only
    requirement: text_or_summary_names_non_live_basis
  - rule_id: generated_edit_posture_named
    applies_to_families:
      - generated
    applies_to_states:
      - generated_read_only
      - generated_edit_blocked
      - generated_editable_with_lineage
    requirement: edit_or_review_surfaces_name_generated_posture

forbidden_collapses:
  - stable_plus_stale_as_ready
  - preview_plus_no_support_as_experimental
  - generated_plus_read_only_as_one_badge
  - imported_snapshot_plus_stale_as_generic_cached
  - policy_locked_as_ordinary_disabled
  - critical_severity_as_color_only_dot
  - trust_restricted_hidden_behind_ambient_icon
  - provider_overlay_as_authoritative_live

fixture_refs:
  - fixtures/ux/decoration_cases/policy_blocked_generated_stale_table_row.json
  - fixtures/ux/decoration_cases/same_object_multi_surface_projection.json
  - fixtures/ux/decoration_cases/editor_inline_precedence_conflict.json
  - fixtures/ux/decoration_cases/review_high_severity_over_freshness.json
  - fixtures/ux/decoration_cases/lifecycle_support_axes_not_collapsed.json
  - fixtures/ux/decoration_cases/compact_high_contrast_summary.json
