# Onboarding hint-source ledger.
#
# This file is the single source-of-truth ledger that onboarding
# cards, guided tour steps, contextual tips, glossary cards,
# learning-mode cards, migration bridge cards, current-shortcut
# displays, and why-unavailable explainers read for canonical
# anchors. The contract that frames it is:
#
#   docs/ux/command_discoverability_coverage_matrix.md
#
# Rules:
#   - Every ledger entry is keyed by canonical command_id and MUST
#     resolve through a registry entry on
#     artifacts/commands/command_registry_seed.yaml.
#   - Every cited ref lives upstream of this ledger. The ledger
#     does not mint new docs anchors, glossary terms, tour steps,
#     keymap-bridge ids, shortcut rows, or disabled-reason
#     explainers; it only catalogues which existing refs onboarding
#     and learnability surfaces are allowed to cite.
#   - Onboarding hint authors who want to attach a new hint to an
#     action MUST first land an upstream record (registry alias,
#     docs anchor, keymap bridge record, learning-mode profile)
#     and add the ref to this ledger; minting hint copy without a
#     ledger entry is parity_violation_orphan_action.
#   - Coverage rows in artifacts/ux/discoverability_coverage_rows.yaml
#     reference these ledger entries; new ledger entries land in the
#     same change as the coverage row that exercises them.

schema_version: 1
ledger_id: aureline.command_discoverability.hint_source_ledger.v1
status: seeded

source_refs:
  contract: docs/ux/command_discoverability_coverage_matrix.md
  coverage_rows: artifacts/ux/discoverability_coverage_rows.yaml
  command_registry_seed: artifacts/commands/command_registry_seed.yaml
  command_descriptor_contract: docs/commands/command_descriptor_contract.md
  learnability_contract: docs/ux/learnability_contract.md
  contextual_teaching_contract: docs/ux/contextual_teaching_contract.md
  keybinding_resolver_contract: docs/ux/keybinding_resolver_contract.md
  citation_and_reference_contract: docs/docs_integrity/citation_and_reference_contract.md
  migration_center_object_model: docs/migration/migration_center_object_model.md
  start_center_contract: docs/ux/start_center_contract.md
  no_account_local_entry_contract: docs/ux/no_account_local_entry_contract.md

# Closed sets:
ref_kind_vocabulary:
  - canonical_command_id
  - alias_record_ref
  - docs_help_anchor_ref
  - glossary_pack_anchor_ref
  - guided_tour_step_anchor_ref
  - keymap_bridge_ref
  - migration_bridge_ref
  - current_shortcut_display_ref
  - why_unavailable_explainer_ref
  - learning_mode_profile_ref
  - origin_badge_ref
  - target_badge_ref

eligibility_state_vocabulary:
  - eligible_for_new_hints
  - frozen_no_new_hints
  - explain_only_when_disabled
