# A coverage row whose parity_floor_state is below_floor_violation
# blocks the discoverability review gate. Rows registered under
# below_floor_known_gap MUST cite an open waiver_ref.
review_gate_policy:
  block_classes:
    - below_floor_violation
    - parity_violation_orphan_action
    - parity_violation_alias_drift
    - parity_violation_anchor_missing
    - parity_violation_route_route_drift
  warn_classes:
    - below_floor_known_gap
    - parity_partial_known_gap
  pass_classes:
    - meets_floor
    - meets_floor_with_disclosed_exception
    - parity_complete
    - parity_complete_with_disclosed_exception
