# Command discoverability coverage rows.
#
# This file is the machine-readable coverage matrix mapping each
# launch-critical command to the routes that must (or must not)
# discoverably project it. Closed vocabularies, route floor, and
# exception classes are defined in:
#
#   docs/ux/command_discoverability_coverage_matrix.md
#
# Every row resolves through canonical anchors on the command
# registry seed:
#
#   artifacts/commands/command_registry_seed.yaml
#   schemas/commands/command_registry_entry.schema.json
#
# Rules:
#   - command_id MUST exist on the registry seed.
#   - alias_record_refs MUST resolve to alias_records[*].alias_id on
#     the same registry entry.
#   - For each surface_route_class value listed in the closed set in
#     the contract, the row carries a route_entry with a non-null
#     route_role_class. A route the command does not project to is
#     declared route_role_class = not_applicable with a typed
#     exception_class.
#   - source_anchor_refs cite the same projection_refs (palette_row,
#     help_search, onboarding_hint, migration_bridge_card,
#     current_shortcut_display, why_unavailable_explainer,
#     key_sequence_discoverability) the registry entry exports.
#   - Coverage rows do not mint new shortcut copy; current shortcut
#     hints are read off current_keybinding_refs on the registry.
#
# Reading this file:
#   - parity_floor_state names whether the row meets the
#     multi-route floor declared by the contract; rows that fall
#     below the floor MUST resolve to a typed exception_class
#     other than `none`.
#   - parity_finding_class summarises whether the row is conforming.
#   - reviewer_notes are advisory and do not substitute for typed
#     fields; closed-vocab fields are the record of truth.

schema_version: 1
coverage_matrix_id: aureline.command_discoverability_coverage.v1
status: seeded

source_refs:
  contract: docs/ux/command_discoverability_coverage_matrix.md
  command_registry_seed: artifacts/commands/command_registry_seed.yaml
  command_registry_entry_schema: schemas/commands/command_registry_entry.schema.json
  command_descriptor_contract: docs/commands/command_descriptor_contract.md
  ui_slot_taxonomy_schema: schemas/commands/ui_slot_taxonomy.schema.json
  palette_row_contract: docs/commands/palette_row_and_modifier_contract.md
  learnability_contract: docs/ux/learnability_contract.md
  contextual_teaching_contract: docs/ux/contextual_teaching_contract.md
  keybinding_resolver_contract: docs/ux/keybinding_resolver_contract.md
  migration_center_object_model: docs/migration/migration_center_object_model.md
  hint_source_ledger: artifacts/ux/hint_source_ledger.yaml

surface_route_class_vocabulary:
  - command_palette
  - global_application_menu
  - context_menu
  - primary_toolbar
  - inline_affordance
  - current_shortcut_display
  - keybinding_help
  - key_sequence_help
  - help_search
  - docs_help_anchor
  - onboarding_card
  - guided_tour_step
  - contextual_tip_card
  - migration_bridge_card
  - why_unavailable_explainer
  - glossary_card
  - cli_help

route_role_class_vocabulary:
  - entry
  - mirror
  - contextual
  - explain_only
  - not_applicable

source_anchor_kind_vocabulary:
  - canonical_command_id
  - alias_record
  - docs_help_anchor
  - glossary_pack_anchor
  - guided_tour_step_anchor
  - keybinding_resolver_ref
  - migration_bridge_ref
  - why_unavailable_explainer_ref
  - current_shortcut_display_ref
  - learning_mode_profile_ref

exception_class_vocabulary:
  - none
  - deliberately_palette_only
  - deliberately_menu_only
  - deliberately_keybinding_only
  - deliberately_inline_only
  - deliberately_unbound_keybinding
  - deliberately_disabled_until_capability_enabled
  - deliberately_help_only
  - deliberately_migration_only
  - deliberately_guided_only
  - deliberately_diagnostics_only

parity_finding_class_vocabulary:
  - parity_complete
  - parity_complete_with_disclosed_exception
  - parity_partial_known_gap
  - parity_violation_orphan_action
  - parity_violation_alias_drift
  - parity_violation_anchor_missing
  - parity_violation_route_route_drift

parity_floor_state_vocabulary:
  - meets_floor
  - meets_floor_with_disclosed_exception
  - below_floor_known_gap
  - below_floor_violation

