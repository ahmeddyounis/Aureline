# Service-opt-in boundary rows.
#
# Reviewer-readable companion to:
#   - artifacts/ux/no_account_startup_rehearsal_packet.md
#   - artifacts/ux/no_account_switching_scoreboard.yaml
#   - artifacts/product/no_account_switching_scoreboard_seed.yaml
#   - docs/ux/no_account_local_entry_contract.md
#   - docs/product/boundary_manifest_strawman.md
#
# Purpose. Each row pins one (surface × deployment_profile_id) pair
# to exactly one closed surface_posture_class so reviewers can read
# which surfaces stay fully local, which degrade gracefully, which
# are deferred, and which are unavailable until opt-in. The rows
# make the no-account / local-first claim mechanical at the
# surface granularity that docs / help / support packets quote.
#
# This file does NOT mint new vocabulary for boundary identity:
# every boundary_manifest_row_id resolves verbatim against
# docs/product/boundary_manifest_strawman.md and every
# deployment_profile_id resolves against
# artifacts/governance/deployment_profiles.yaml. The file mints
# one closed vocabulary — surface_posture_class — and re-exports
# every other axis from upstream contracts.
#
# Rules (frozen):
#   1. Every row pins exactly one boundary_manifest_row_id, exactly
#      one deployment_profile_id, exactly one
#      surface_posture_class, and exactly one
#      account_prompt_class drawn from the no-account local-entry
#      contract §3.2 closed set.
#   2. Every row cites at least one corpus-row, scoreboard-row, or
#      fixture ref (or marks the row reserved with a typed reason
#      under reserved_pair_policy below). Rows that no upstream
#      reads are non-conforming.
#   3. surface_posture_class values are drawn from the closed set
#      below. Free-form posture labels are non-conforming.
#   4. A row whose surface_posture_class is fully_local MUST set
#      account_prompt_class to no_prompt and MUST set
#      decline_path_class to no_decline_path_required. The row's
#      claim is "no opt-in is presented; first-useful-work is
#      reachable on this surface".
#   5. A row whose surface_posture_class is degrade_gracefully or
#      deferred MUST set account_prompt_class to optional_prompt
#      or deferrable_prompt; declining the prompt MUST NOT
#      retroactively degrade prior local capability (see no-account
#      contract §5.2 rule 1).
#   6. A row whose surface_posture_class is unavailable_until_opt_in
#      names the typed reason under
#      unavailable_until_opt_in_reason_class and MUST cite the
#      decline_path_class that keeps Continue local /
#      Continue in restricted mode reachable. The row's primary
#      surface action genuinely needs the opt-in (clone of a
#      private remote, resume of a managed-cloud workspace).
#   7. A row whose surface_posture_class is unavailable_in_envelope
#      names the unavailable_envelope_class (from the no-account
#      contract §5.1 closed set) and renders the absence-narrows-to
#      consequence inline; an opt-in affordance that will silently
#      fail in this envelope is non-conforming.
#   8. Milestone or task identifiers MUST NOT appear in any row id,
#      slug, or notes string.

schema_version: 1

sources:
  no_account_local_entry_contract: docs/ux/no_account_local_entry_contract.md
  no_account_switching_scoreboard: artifacts/ux/no_account_switching_scoreboard.yaml
  no_account_switching_scoreboard_seed: artifacts/product/no_account_switching_scoreboard_seed.yaml
  rehearsal_packet: artifacts/ux/no_account_startup_rehearsal_packet.md
  rehearsal_packet_broader: artifacts/ux/startup_route_rehearsal_packet.md
  corpus_dir: artifacts/ux/first_useful_work_corpus/
  fixtures_dir_no_account_startup: fixtures/ux/no_account_startup_cases/
  fixtures_dir_first_useful_work: fixtures/ux/first_useful_work_cases/
  boundary_manifest: docs/product/boundary_manifest_strawman.md
  deployment_profiles: artifacts/governance/deployment_profiles.yaml

# -----------------------------------------------------------------------------
# Closed vocabularies (one new; others re-exported from upstream).
# -----------------------------------------------------------------------------

surface_posture_class_vocabulary:
  - fully_local
  - degrade_gracefully
  - deferred
  - unavailable_until_opt_in
  - unavailable_in_envelope

unavailable_until_opt_in_reason_class_vocabulary:
  - account_required_for_remote_authority
  - account_required_for_managed_workspace
  - account_required_for_private_remote_clone
  - account_required_for_managed_quota
  - policy_required_for_managed_fleet
  - policy_required_for_consent_acknowledgement

# Re-exported (do not redeclare; resolve verbatim from sources).
#
# - account_prompt_class — no-account contract §3.2.
# - account_prompt_timing_class — no-account contract §3.3.
# - boundary_crossing_class — no-account contract §3.4.
# - decline_path_class — corpus README §1.5.
# - deployment_profile_id — deployment-profile register.
# - boundary_manifest_row_id — boundary manifest §145ff.
# - unavailable_envelope_class — no-account contract §5.1.
# - measurement_surface — onboarding measurement plan §3.

# -----------------------------------------------------------------------------
# Family 1: Fully local surfaces.
#
# These surfaces stay reachable without account creation, sign-in,
# managed-service connectivity, or network. Every row resolves
# account_prompt_class = no_prompt. The family is the
# no-account floor's anchor across the rehearsal lanes.
# -----------------------------------------------------------------------------
fully_local_surfaces:
  rows:

    - row_id: service_opt_in_boundary_row:start_center_first_run_individual_local
      surface_posture_class: fully_local
      surface_label: start_center_first_run
      boundary_manifest_row_id: editor_core
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
        - offline
        - mirror_only
      account_prompt_class: no_prompt
      account_prompt_timing_class: never_shown
      boundary_crossing_class: no_boundary_crossed
      decline_path_class: no_decline_path_required
      measurement_surface: surface_first_run
      supporting_corpus_rows:
        - fuw_row:local_open.first_run_start_center_local_folder
      supporting_scoreboard_rows:
        - scoreboard_row:fuw_no_account_by_route.start_center_individual_local
        - scoreboard_row:no_account_local_work.first_useful_edit_without_opt_in
      supporting_fixture_refs:
        - fixtures/ux/no_account_startup_cases/fresh_install_first_run_no_account.yaml
        - fixtures/ux/first_useful_work_cases/first_run_start_center_local_folder.yaml
      notes: >
        Floor row. On individual_local first-run, Start Center
        renders Open / Open Workspace / Clone / Restore / Import
        as no_prompt rows; first-useful-edit is reachable with
        no opt-in card and no network call.

    - row_id: service_opt_in_boundary_row:open_local_folder_individual_local
      surface_posture_class: fully_local
      surface_label: open_local_folder
      boundary_manifest_row_id: workspace_vfs
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
        - offline
        - mirror_only
      account_prompt_class: no_prompt
      account_prompt_timing_class: never_shown
      boundary_crossing_class: no_boundary_crossed
      decline_path_class: no_decline_path_required
      measurement_surface: surface_first_open
      supporting_corpus_rows:
        - fuw_row:local_open.plain_open_unknown_archetype
        - fuw_row:local_open.protocol_handler_single_file
      supporting_scoreboard_rows:
        - scoreboard_row:fuw_no_account_by_route.plain_open_individual_local
        - scoreboard_row:fuw_no_account_by_route.protocol_handler_individual_local
      supporting_fixture_refs:
        - fixtures/ux/no_account_startup_cases/open_local_folder_no_account.yaml
        - fixtures/ux/first_useful_work_cases/plain_open_unknown_archetype.yaml
      notes: >
        File > Open / palette open / OS file association of a
        local folder MUST reach first-useful-work without an
        opt-in prompt and without widening trust as a side
        effect.

    - row_id: service_opt_in_boundary_row:open_local_workspace_individual_local
      surface_posture_class: fully_local
      surface_label: open_local_workspace
      boundary_manifest_row_id: workspace_vfs
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
        - offline
        - mirror_only
      account_prompt_class: no_prompt
      account_prompt_timing_class: never_shown
      boundary_crossing_class: no_boundary_crossed
      decline_path_class: no_decline_path_required
      measurement_surface: surface_first_open
      supporting_corpus_rows: []
      supporting_scoreboard_rows:
        - scoreboard_row:fuw_no_account_by_route.start_center_individual_local
      supporting_fixture_refs:
        - fixtures/ux/no_account_startup_cases/open_local_workspace_no_account.yaml
      reserved: false
      notes: >
        Multi-root local workspace open (`.code-workspace` /
        multi-folder file) on individual_local. The shell admits
        every root through the same trust-confirmation flow as
        single-folder open; no opt-in is presented.

    - row_id: service_opt_in_boundary_row:warm_start_individual_local
      surface_posture_class: fully_local
      surface_label: warm_start
      boundary_manifest_row_id: editor_core
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
        - offline
      account_prompt_class: no_prompt
      account_prompt_timing_class: never_shown
      boundary_crossing_class: no_boundary_crossed
      decline_path_class: no_decline_path_required
      measurement_surface: surface_first_open
      supporting_corpus_rows:
        - fuw_row:offline_or_mirror_open.individual_local_offline_warm_start
      supporting_scoreboard_rows:
        - scoreboard_row:fuw_no_account_by_route.warm_start_individual_local
        - scoreboard_row:no_account_local_work.local_git_available_offline
      supporting_fixture_refs:
        - fixtures/ux/no_account_startup_cases/offline_first_run_no_account.yaml
        - fixtures/ux/first_useful_work_cases/offline_warm_start_individual_local.yaml
      notes: >
        Warm-start (no restore prompt) reaches first-useful-edit
        with no network and no opt-in. Local git remains
        available offline.

    - row_id: service_opt_in_boundary_row:import_local_pack_individual_local
      surface_posture_class: fully_local
      surface_label: import_local_pack
      boundary_manifest_row_id: local_support_bundle
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
        - offline
        - mirror_only
      account_prompt_class: no_prompt
      account_prompt_timing_class: never_shown
      boundary_crossing_class: no_boundary_crossed
      decline_path_class: roll_back_import_available
      measurement_surface: surface_migration_review
      supporting_corpus_rows:
        - fuw_row:import.handoff_packet_inspect_only_no_apply
        - fuw_row:import.vs_code_settings_dry_run_then_apply
      supporting_scoreboard_rows:
        - scoreboard_row:fuw_no_account_by_route.clone_or_import_individual_local
        - scoreboard_row:no_account_local_work.migration_without_opt_in
      supporting_fixture_refs:
        - fixtures/ux/no_account_startup_cases/import_local_pack_no_account.yaml
        - fixtures/ux/first_useful_work_cases/import_handoff_packet_inspect_only.yaml
        - fixtures/ux/first_useful_work_cases/import_vs_code_settings_dry_run.yaml
      notes: >
        Import of a local portable-state package, handoff packet,
        competitor-config root, or template snapshot already on
        disk. No remote fetch is performed; dry-run and rollback
        checkpoint are reachable without opt-in.

    - row_id: service_opt_in_boundary_row:restore_prompt_local_session_individual_local
      surface_posture_class: fully_local
      surface_label: restore_prompt
      boundary_manifest_row_id: editor_core
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
        - offline
        - mirror_only
      account_prompt_class: no_prompt
      account_prompt_timing_class: never_shown
      boundary_crossing_class: no_boundary_crossed
      decline_path_class: open_without_restore_same_weight
      measurement_surface: surface_restore_success
      supporting_corpus_rows:
        - fuw_row:restore.compatible_restore_after_crash
      supporting_scoreboard_rows:
        - scoreboard_row:fuw_no_account_by_route.restore_prompt_individual_local
        - scoreboard_row:intentionally_narrowed_capability.layout_only_when_extension_host_missing
      supporting_fixture_refs:
        - fixtures/ux/no_account_startup_cases/restore_previous_local_session_no_account.yaml
        - fixtures/ux/first_useful_work_cases/compatible_restore_after_crash.yaml
      notes: >
        Restore prompt on a local-only session names the
        recovery class, resulting mode, and primary actions
        (Restore now, Skip once / Open without restore, Safe
        mode) without invoking any account or service opt-in.

# -----------------------------------------------------------------------------
# Family 2: Gracefully degrading surfaces.
#
# These surfaces present an optional opt-in (telemetry, model
# gateway, marketplace browse, sync, collaboration relay) that
# narrows when declined. Declining MUST NOT retroactively
# degrade prior local capability; the absence-narrows-to claim
# from the boundary manifest is rendered before commit.
# -----------------------------------------------------------------------------
degrade_gracefully_surfaces:
  rows:

    - row_id: service_opt_in_boundary_row:telemetry_first_run_individual_local
      surface_posture_class: degrade_gracefully
      surface_label: telemetry_opt_in_card
      boundary_manifest_row_id: telemetry_support_pipeline
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
        - offline
        - mirror_only
      account_prompt_class: optional_prompt
      account_prompt_timing_class: shown_at_first_run_declinable
      boundary_crossing_class: emits_managed_telemetry
      decline_path_class: continue_local_same_weight
      measurement_surface: surface_opt_in_boundary
      absence_narrows_to_reference: >
        telemetry_support_pipeline absence_narrows_to "aggregated
        dashboards are unavailable; local bundles remain the
        canonical supportability artefact".
      supporting_corpus_rows:
        - fuw_row:service_opt_in_declined.telemetry_optional_at_first_run
      supporting_scoreboard_rows:
        - scoreboard_row:service_opt_in_boundary.telemetry_optional_at_first_run
        - scoreboard_row:fuw_service_opt_in_decline_outcomes.telemetry_individual_local
      supporting_fixture_refs:
        - fixtures/ux/no_account_startup_cases/decline_service_opt_in_telemetry.yaml
        - fixtures/ux/first_useful_work_cases/service_opt_in_declined_telemetry.yaml
      notes: >
        Open-source builds default telemetry to opt-in.
        Declining keeps local bundles canonical and never
        blocks first-useful-work.

    - row_id: service_opt_in_boundary_row:model_gateway_post_clone_individual_local
      surface_posture_class: degrade_gracefully
      surface_label: model_gateway_opt_in_card
      boundary_manifest_row_id: model_gateway
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
      account_prompt_class: optional_prompt
      account_prompt_timing_class: shown_at_entry_declinable
      boundary_crossing_class: reaches_remote_resource
      decline_path_class: continue_local_same_weight
      measurement_surface: surface_opt_in_boundary
      absence_narrows_to_reference: >
        model_gateway absence_narrows_to "AI requests fall back
        to BYOK or local models; managed quotas and audit are
        unavailable".
      supporting_corpus_rows:
        - fuw_row:service_opt_in_declined.model_gateway_optional_at_clone
      supporting_scoreboard_rows:
        - scoreboard_row:service_opt_in_boundary.clone_without_model_gateway
        - scoreboard_row:fuw_service_opt_in_decline_outcomes.model_gateway_individual_local
      supporting_fixture_refs:
        - fixtures/ux/first_useful_work_cases/service_opt_in_declined_model_gateway.yaml
      notes: >
        Model-gateway opt-in offered after clone. Decline
        narrows to BYOK / local-only as advertised; no
        retroactive lockout.

    - row_id: service_opt_in_boundary_row:managed_sync_first_open_individual_local
      surface_posture_class: degrade_gracefully
      surface_label: managed_sync_opt_in_card
      boundary_manifest_row_id: managed_sync_profile
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
      account_prompt_class: optional_prompt
      account_prompt_timing_class: shown_at_entry_declinable
      boundary_crossing_class: reaches_remote_resource
      decline_path_class: continue_local_same_weight
      measurement_surface: surface_opt_in_boundary
      absence_narrows_to_reference: >
        managed_sync_profile absence_narrows_to "settings do
        not sync across devices; each device keeps its local
        configuration".
      supporting_corpus_rows: []
      supporting_scoreboard_rows:
        - scoreboard_row:service_opt_in_boundary.sync_optional_for_first_useful_edit
      supporting_fixture_refs: []
      reserved: true
      reserved_reason: >
        Managed-sync surface seeds when the sync-opt-in fixture
        lands; row reserved so the posture is visible before
        the fixture exists.
      notes: >
        Decline keeps device-local configuration canonical;
        first-useful-edit is unaffected.

    - row_id: service_opt_in_boundary_row:managed_sign_in_first_run_individual_local
      surface_posture_class: degrade_gracefully
      surface_label: managed_sign_in_card
      boundary_manifest_row_id: identity_policy_service
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
      account_prompt_class: optional_prompt
      account_prompt_timing_class: shown_at_first_run_declinable
      boundary_crossing_class: opens_browser_handoff
      decline_path_class: continue_local_same_weight
      measurement_surface: surface_opt_in_boundary
      absence_narrows_to_reference: >
        identity_policy_service absence_narrows_to "managed-org
        identity / policy is unavailable; local profile and
        local trust evaluation continue".
      supporting_corpus_rows:
        - fuw_row:managed_sign_in_available_but_skipped.individual_local_first_run_managed_sign_in_offered_skipped
      supporting_scoreboard_rows:
        - scoreboard_row:fuw_managed_sign_in_skipped.individual_local_local_flow_continued
      supporting_fixture_refs:
        - fixtures/ux/no_account_startup_cases/decline_sign_in_at_first_run.yaml
        - fixtures/ux/first_useful_work_cases/managed_sign_in_offered_skipped_individual_local.yaml
      notes: >
        Managed-organisation sign-in card is offered same-weight
        with Continue local; declining is a first-class outcome
        and never gates first-useful-edit.

# -----------------------------------------------------------------------------
# Family 3: Deferred surfaces.
#
# These surfaces present a deferrable opt-in (set up later,
# remind me, review on next open). Deferral MUST NOT widen
# admission silently; the next render reads the same row state.
# -----------------------------------------------------------------------------
deferred_surfaces:
  rows:

    - row_id: service_opt_in_boundary_row:hosted_marketplace_first_run_individual_local
      surface_posture_class: deferred
      surface_label: marketplace_browse_invitation
      boundary_manifest_row_id: hosted_marketplace_ui
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
      account_prompt_class: deferrable_prompt
      account_prompt_timing_class: shown_at_first_run_declinable
      boundary_crossing_class: reaches_remote_resource
      decline_path_class: continue_local_same_weight
      measurement_surface: surface_opt_in_boundary
      absence_narrows_to_reference: >
        hosted_marketplace_ui absence_narrows_to "browse UI is
        unavailable; CLI and mirror installs remain available".
      supporting_corpus_rows:
        - fuw_row:service_opt_in_declined.marketplace_browse_declined_first_run
      supporting_scoreboard_rows:
        - scoreboard_row:service_opt_in_boundary.marketplace_browse_declined
        - scoreboard_row:fuw_service_opt_in_decline_outcomes.marketplace_individual_local
      supporting_fixture_refs:
        - fixtures/ux/first_useful_work_cases/service_opt_in_declined_marketplace.yaml
      notes: >
        Marketplace browse is invited but not required.
        Deferring keeps CLI / mirror install paths advertised
        and never blocks first-useful-edit.

    - row_id: service_opt_in_boundary_row:archetype_recommendation_first_open_individual_local
      surface_posture_class: deferred
      surface_label: archetype_recommendation_card
      boundary_manifest_row_id: command_plane
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
        - offline
        - mirror_only
      account_prompt_class: deferrable_prompt
      account_prompt_timing_class: shown_at_entry_declinable
      boundary_crossing_class: no_boundary_crossed
      decline_path_class: continue_local_same_weight
      measurement_surface: surface_first_open
      supporting_corpus_rows:
        - fuw_row:local_open.start_from_prebuild_minimal_bypass
      supporting_scoreboard_rows:
        - scoreboard_row:no_account_local_work.prebuild_minimal_bypass_same_weight
      supporting_fixture_refs:
        - fixtures/ux/first_useful_work_cases/start_from_prebuild_minimal_bypass.yaml
      notes: >
        Archetype-detection / prebuild recommendations render as
        deferrable invitations; open_prebuild_minimal is
        same-weight with open_prebuild_with_setup_actions, so
        deferral reaches first-useful-navigation without
        running the recommended setup actions.

    - row_id: service_opt_in_boundary_row:onboarding_tour_first_run_individual_local
      surface_posture_class: deferred
      surface_label: first_run_tour_invitation
      boundary_manifest_row_id: editor_core
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
        - offline
        - mirror_only
      account_prompt_class: deferrable_prompt
      account_prompt_timing_class: shown_at_first_run_declinable
      boundary_crossing_class: no_boundary_crossed
      decline_path_class: continue_local_same_weight
      measurement_surface: surface_first_run
      supporting_corpus_rows: []
      supporting_scoreboard_rows:
        - scoreboard_row:fuw_no_account_by_route.start_center_individual_local
      supporting_fixture_refs: []
      reserved: true
      reserved_reason: >
        First-run tour is reserved until the tour-step fixture
        seeds. Deferring is the documented happy path so the
        floor row stays at fully_local.
      notes: >
        Tour invitations MUST NOT replace or hide any of the
        five first-launch primary actions; deferring keeps the
        floor intact.

# -----------------------------------------------------------------------------
# Family 4: Unavailable until opt-in surfaces.
#
# These surfaces genuinely require account creation, sign-in,
# managed-service connectivity, or policy attestation to run.
# Every row names the typed reason and the decline_path_class
# that keeps Continue local / Continue in restricted mode
# reachable; declining never retroactively degrades prior
# local capability.
# -----------------------------------------------------------------------------
unavailable_until_opt_in_surfaces:
  rows:

    - row_id: service_opt_in_boundary_row:clone_private_remote_individual_local
      surface_posture_class: unavailable_until_opt_in
      surface_label: clone_private_remote
      boundary_manifest_row_id: model_gateway
      deployment_profile_id: individual_local
      network_posture_supported:
        - online
      account_prompt_class: required_prompt
      account_prompt_timing_class: shown_only_on_boundary_crossing
      boundary_crossing_class: opens_browser_handoff
      decline_path_class: continue_local_same_weight
      unavailable_until_opt_in_reason_class: account_required_for_private_remote_clone
      measurement_surface: surface_opt_in_boundary
      supporting_corpus_rows: []
      supporting_scoreboard_rows: []
      supporting_fixture_refs: []
      reserved: true
      reserved_reason: >
        Private-remote clone fixture seeds when the OAuth
        handoff fixture lands; row reserved so the posture is
        visible before the fixture exists.
      notes: >
        Clone of a private remote needs an OAuth handle.
        Continue local (clone of a public mirror or open a
        local pack instead) is offered same-weight; declining
        the OAuth prompt does not degrade prior local work.

    - row_id: service_opt_in_boundary_row:resume_managed_cloud_workspace_managed_cloud
      surface_posture_class: unavailable_until_opt_in
      surface_label: resume_managed_cloud_workspace
      boundary_manifest_row_id: workspace_control_plane
      deployment_profile_id: managed_cloud
      network_posture_supported:
        - online
      account_prompt_class: required_prompt
      account_prompt_timing_class: shown_at_entry_declinable
      boundary_crossing_class: reaches_remote_resource
      decline_path_class: continue_in_restricted_mode_same_weight
      unavailable_until_opt_in_reason_class: account_required_for_managed_workspace
      measurement_surface: surface_opt_in_boundary
      supporting_corpus_rows:
        - fuw_row:managed_sign_in_available_but_skipped.managed_cloud_resume_reauth_required_declined
      supporting_scoreboard_rows:
        - scoreboard_row:service_opt_in_boundary.resume_managed_reauth_required
        - scoreboard_row:fuw_managed_sign_in_skipped.managed_cloud_local_flow_continued
      supporting_fixture_refs:
        - fixtures/ux/first_useful_work_cases/managed_cloud_resume_reauth_required_declined.yaml
      notes: >
        Managed-cloud resume genuinely requires reauth; the
        workspace cannot be re-evaluated locally. Continue in
        restricted mode is offered same-weight; prior local
        work is preserved.

    - row_id: service_opt_in_boundary_row:managed_fleet_sso_enterprise_online
      surface_posture_class: unavailable_until_opt_in
      surface_label: managed_fleet_sso_card
      boundary_manifest_row_id: identity_policy_service
      deployment_profile_id: enterprise_online
      network_posture_supported:
        - online
      account_prompt_class: policy_forced_prompt
      account_prompt_timing_class: forced_by_policy
      boundary_crossing_class: opens_browser_handoff
      decline_path_class: continue_in_restricted_mode_same_weight
      unavailable_until_opt_in_reason_class: policy_required_for_managed_fleet
      policy_forced_reason_code: managed_fleet_sso
      measurement_surface: surface_opt_in_boundary
      supporting_corpus_rows: []
      supporting_scoreboard_rows: []
      supporting_fixture_refs: []
      reserved: true
      reserved_reason: >
        Managed-fleet SSO scenario seeds when the
        active-policy-bundle fixture lands; row reserved so
        the posture is visible before the fixture exists.
      notes: >
        Active policy bundle on enterprise_online may force SSO
        before any workspace opens. Continue in restricted mode
        is offered same-weight when the bundle permits;
        Open folder for local-only folders may still resolve
        no_prompt depending on the bundle.

    - row_id: service_opt_in_boundary_row:managed_ai_quota_billing_enterprise_online
      surface_posture_class: unavailable_until_opt_in
      surface_label: managed_ai_quota_billing
      boundary_manifest_row_id: managed_ai_quota_billing
      deployment_profile_id: enterprise_online
      network_posture_supported:
        - online
      account_prompt_class: required_prompt
      account_prompt_timing_class: shown_only_on_boundary_crossing
      boundary_crossing_class: reaches_remote_resource
      decline_path_class: continue_local_same_weight
      unavailable_until_opt_in_reason_class: account_required_for_managed_quota
      measurement_surface: surface_opt_in_boundary
      supporting_corpus_rows: []
      supporting_scoreboard_rows: []
      supporting_fixture_refs: []
      reserved: true
      reserved_reason: >
        Managed-AI quota / billing UI is reserved on the
        rehearsal lane; the surface only appears when the
        managed-AI tenant attaches. Row exists so the posture
        is visible before the fixture seeds.
      notes: >
        Managed-AI quota / billing UI requires an account
        bound to the tenant. Continue local (BYOK or local
        models) is offered same-weight.

# -----------------------------------------------------------------------------
# Family 5: Unavailable in envelope surfaces.
#
# These surfaces cannot be attempted in the deployment profile
# because the envelope class forbids the underlying boundary
# crossing (air-gapped, mirror-only, restricted-mode). The row
# names the unavailable_envelope_class and renders the
# absence-narrows-to consequence inline; an opt-in affordance
# that will silently fail is non-conforming.
# -----------------------------------------------------------------------------
unavailable_in_envelope_surfaces:
  rows:

    - row_id: service_opt_in_boundary_row:hosted_marketplace_air_gapped
      surface_posture_class: unavailable_in_envelope
      surface_label: marketplace_browse_unavailable
      boundary_manifest_row_id: hosted_marketplace_ui
      deployment_profile_id: air_gapped
      network_posture_supported:
        - offline
        - mirror_only
      account_prompt_class: unavailable_prompt
      account_prompt_timing_class: unavailable_in_envelope
      boundary_crossing_class: no_boundary_crossed
      decline_path_class: no_decline_path_required
      unavailable_envelope_class: air_gapped
      measurement_surface: surface_first_run
      absence_narrows_to_reference: >
        hosted_marketplace_ui absence_narrows_to "browse UI is
        unavailable; CLI and mirror installs remain available".
      supporting_corpus_rows:
        - fuw_row:offline_or_mirror_open.air_gapped_first_run_no_marketplace
      supporting_scoreboard_rows:
        - scoreboard_row:fuw_no_account_by_route.start_center_air_gapped
        - scoreboard_row:intentionally_narrowed_capability.air_gapped_first_run_no_marketplace_prompt
      supporting_fixture_refs:
        - fixtures/ux/first_useful_work_cases/air_gapped_first_run_no_marketplace.yaml
      notes: >
        Air-gapped first-run never presents the marketplace
        browse UI; narrowing to CLI / offline-bundle install
        is advertised before commit.

    - row_id: service_opt_in_boundary_row:managed_sync_air_gapped_mirror_only
      surface_posture_class: unavailable_in_envelope
      surface_label: managed_sync_unavailable
      boundary_manifest_row_id: managed_sync_profile
      deployment_profile_id: air_gapped_mirror_only
      network_posture_supported:
        - mirror_only
      account_prompt_class: unavailable_prompt
      account_prompt_timing_class: unavailable_in_envelope
      boundary_crossing_class: no_boundary_crossed
      decline_path_class: no_decline_path_required
      unavailable_envelope_class: air_gapped_mirror_only
      measurement_surface: surface_first_open
      absence_narrows_to_reference: >
        managed_sync_profile absence_narrows_to "settings do
        not sync across devices; each device keeps its local
        configuration".
      supporting_corpus_rows: []
      supporting_scoreboard_rows: []
      supporting_fixture_refs: []
      reserved: true
      reserved_reason: >
        Mirror-only-profile fixture seeds with the air-gapped
        mirror corpus; row reserved so the posture is visible
        before the fixture exists.
      notes: >
        Managed sync cannot reach a managed control plane in
        a mirror-only envelope; the row renders the
        envelope-class consequence rather than a silently
        failing opt-in card.

    - row_id: service_opt_in_boundary_row:browser_handoff_restricted_mode
      surface_posture_class: unavailable_in_envelope
      surface_label: browser_handoff_unavailable
      boundary_manifest_row_id: identity_policy_service
      deployment_profile_id: enterprise_online
      network_posture_supported:
        - online
      account_prompt_class: unavailable_prompt
      account_prompt_timing_class: unavailable_in_envelope
      boundary_crossing_class: no_boundary_crossed
      decline_path_class: no_decline_path_required
      unavailable_envelope_class: restricted_mode
      measurement_surface: surface_opt_in_boundary
      supporting_corpus_rows: []
      supporting_scoreboard_rows: []
      supporting_fixture_refs: []
      reserved: true
      reserved_reason: >
        Restricted-mode policy fixture seeds when the
        policy-bundle envelope corpus row lands; row reserved
        so the posture is visible before the fixture exists.
      notes: >
        Restricted-mode envelope blocks browser handoff for
        OAuth / managed sign-in. The row renders the
        envelope-class consequence; Continue local on
        no_boundary_crossed surfaces remains reachable.

# -----------------------------------------------------------------------------
# Coverage summary.
#
# Cross-check that every (boundary_manifest_row_id,
# deployment_profile_id) pair the rehearsal exercises has at
# least one boundary row. Tooling can validate this section
# without re-parsing rows.
# -----------------------------------------------------------------------------
coverage:
  by_boundary_manifest_row_and_profile:
    editor_core:
      individual_local:
        - service_opt_in_boundary_row:start_center_first_run_individual_local
        - service_opt_in_boundary_row:warm_start_individual_local
        - service_opt_in_boundary_row:restore_prompt_local_session_individual_local
        - service_opt_in_boundary_row:onboarding_tour_first_run_individual_local
    workspace_vfs:
      individual_local:
        - service_opt_in_boundary_row:open_local_folder_individual_local
        - service_opt_in_boundary_row:open_local_workspace_individual_local
    local_support_bundle:
      individual_local:
        - service_opt_in_boundary_row:import_local_pack_individual_local
    command_plane:
      individual_local:
        - service_opt_in_boundary_row:archetype_recommendation_first_open_individual_local
    telemetry_support_pipeline:
      individual_local:
        - service_opt_in_boundary_row:telemetry_first_run_individual_local
    model_gateway:
      individual_local:
        - service_opt_in_boundary_row:model_gateway_post_clone_individual_local
        - service_opt_in_boundary_row:clone_private_remote_individual_local
    managed_sync_profile:
      individual_local:
        - service_opt_in_boundary_row:managed_sync_first_open_individual_local
      air_gapped_mirror_only:
        - service_opt_in_boundary_row:managed_sync_air_gapped_mirror_only
    identity_policy_service:
      individual_local:
        - service_opt_in_boundary_row:managed_sign_in_first_run_individual_local
      enterprise_online:
        - service_opt_in_boundary_row:managed_fleet_sso_enterprise_online
        - service_opt_in_boundary_row:browser_handoff_restricted_mode
    workspace_control_plane:
      managed_cloud:
        - service_opt_in_boundary_row:resume_managed_cloud_workspace_managed_cloud
    managed_ai_quota_billing:
      enterprise_online:
        - service_opt_in_boundary_row:managed_ai_quota_billing_enterprise_online
    hosted_marketplace_ui:
      individual_local:
        - service_opt_in_boundary_row:hosted_marketplace_first_run_individual_local
      air_gapped:
        - service_opt_in_boundary_row:hosted_marketplace_air_gapped

  reserved_pair_policy: >
    Reserved (boundary_manifest_row_id, deployment_profile_id)
    pairs are scoreboarded in shape only and are not counted
    against rehearsal-packet coverage thresholds until a
    supporting corpus row and fixture land. Reserving a row
    is additive-minor; reusing a released row id for a
    different surface is breaking.

# -----------------------------------------------------------------------------
# Promotion process.
#
# This file composes over the no-account local-entry contract,
# the no-account switching scoreboard, the boundary manifest,
# and the rehearsal packet. Adding a new
# surface_posture_class is breaking and opens a decision row
# in artifacts/governance/decision_index.yaml. Adding a new
# row in any family is additive-minor and lands here, in at
# least one fixture under
# fixtures/ux/no_account_startup_cases/ or
# fixtures/ux/first_useful_work_cases/, and in the rehearsal
# packet's coverage roll-up.
# -----------------------------------------------------------------------------
promotion_process:
  promotion_forum: ux_evidence_review
  upstream_contracts:
    - docs/ux/no_account_local_entry_contract.md
    - docs/product/boundary_manifest_strawman.md
    - artifacts/product/no_account_switching_scoreboard_seed.yaml
  promotion_rule: >
    surface_posture_class_vocabulary and
    unavailable_until_opt_in_reason_class_vocabulary are
    closed sets. Adding a value is breaking and opens a
    decision row in artifacts/governance/decision_index.yaml.
    Adding a row, citing a new boundary_manifest_row_id, or
    adding a deployment_profile_id is additive-minor and
    lands here plus a fixture in the same change.
