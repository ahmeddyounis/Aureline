example_id: ux.focus_return.multi_window_transfer_placeholder_announced
title: Multi-window transfer returns to a visible placeholder with an announcement
surface_group: dense_collection_batch_review
related_manifest_case: selection_scope.multi_window_transfer.focus_locality
related_refs:
  - docs/qa/multi_window_verification.md
  - fixtures/platform/window_display_cases/offscreen_dialog_owner_recenter.json
  - fixtures/accessibility/ime_and_text_cases/multi_window_mixed_dpi_composition.yaml
context:
  collection_shape: multi_window_transfer
  detachment_context: other_window
  selection_scope_class: explicit_custom_set
  selected_count: 128
  hidden_selected_count: 11
  blocked_count: 4
  skipped_count: 0
  not_loaded_selected_count: 9
focus_return_record:
  record_kind: focus_return_record
  interaction_safety_schema_version: 1
  focus_return_id: ux:focus:return:dense-collection:placeholder:01
  invoker_identity_ref: row:incident_queue:inc_118
  return_target_identity_ref: region:batch_placeholder:incident_queue
  focus_return_state: returned_placeholder_announced
  announcement_label: >
    The original review row moved to a different window. Focus returned
    to the batch placeholder in the owning window so you can continue or
    reopen the moved batch.
  responsive_fallback_mode: split_shell
  minted_at: "2026-04-23T00:00:00Z"
packet_verdict_if_other_fields_hold: degraded
pass_condition: >
  The placeholder names the moved owner window, preserves selected and
  hidden-selected truth, and keeps focus local to the current window.
degraded_condition: >
  This is lawful only when the placeholder is visible immediately and
  explains why exact return is impossible.
fail_conditions:
  - background transfer steals focus to the other window
  - the placeholder exists but does not carry the batch scope summary
