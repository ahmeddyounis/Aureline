# Template-source-class matrix.
#
# Machine-readable companion to
#   docs/ux/template_and_prebuild_contract.md
#
# This file freezes the cross-surface vocabulary every template
# gallery, prebuild / warm-start picker, environment-starter
# summary, resume-live card, post-create handoff summary,
# template-health row, and starter policy notice resolves against
# when it names source class, support class, runtime / toolchain
# scope, template-lifecycle lane, declared freshness, setup-cost
# class, availability-narrowing class, bypass-path id, template-
# health signal and check class, generation-preflight axes,
# post-create handoff axes, and policy-notice class. Designers,
# docs writers, template authors, prebuild service owners,
# support, measurement, and compatibility authors all read this
# file by id so no surface mints parallel vocabulary.
#
# Conformance:
#   - Every template_source_class_row, lifecycle_row,
#     freshness_row, setup_cost_row, availability_narrowing_row,
#     bypass_path_row, health_row, preflight_axis_row,
#     handoff_axis_row, and policy_notice_row below quotes exactly
#     one value from each vocabulary it cites.
#   - Adding a row is additive-minor and lands here, in the
#     contract document, and as a fixture in the same change.
#   - Repurposing a class or id is breaking and opens a new
#     decision row in artifacts/governance/decision_index.yaml.
#   - This file composes already-frozen vocabularies from the
#     entry-restore object model, the source-acquisition seed,
#     and the start-center contract. It mints no parallel
#     vocabulary.
#
# Rules (frozen):
#   1. Every template_source_class_row names exactly one
#      template_source_class from template_source_class_vocabulary.
#      Rows that straddle classes deny with
#      template_source_class_unresolved.
#   2. Every row cites at least one allowed_support_class and at
#      least one allowed_runtime_and_toolchain_scope; rows that
#      omit either deny with template_row_axis_missing.
#   3. Every row cites at least one required_preflight_axis and
#      at least one required_bypass_path_id; rows that drop the
#      bypass path deny with bypass_path_narrowed_below_equal_weight.
#   4. Every row cites at least one forbidden_silent_side_effect
#      drawn from the blocked-execution-path vocabulary (source-
#      acquisition seed §2.3).
#   5. Every row cites at least one fixture_ref pinning the seed
#      fixture under fixtures/ux/template_and_prebuild_states/.
#   6. Rows whose template_source_class is community, uncertified,
#      or mirror_cached MUST cite a signer_continuity_class; silent
#      elision is non-conforming.
#
# If this file and docs/ux/template_and_prebuild_contract.md
# disagree, the contract doc wins and this file updates in the
# same change.

