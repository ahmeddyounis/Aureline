    canonical_reopen_target_ref: ux:reopen:build:debug-profile:durable
    retention_packet_ref: dur:retention:build_run:current_work
    retention_partition: current_work
    fixture_ref: fixtures/ux/durable_attention_cases/build_run.yaml
    drill_map_section_ref: docs/ux/exact_reopen_drill_map.md#row-build-run
    notes_label: >
      Build is one of the long-running classes that MUST live on a
      durable surface; toast and badge mirror the row but do not
