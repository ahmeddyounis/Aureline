# Durable-attention corpus.
#
# This corpus binds every long-running, reviewable, held, or suppressed
# scenario the attention-routing, durable-job, activity-center, quiet-
# hours, and reopen-semantics contracts call out to one canonical
# durable object, one closed retention packet, and one closed reopen
# drill. It exists so reviewers can trace any transient toast, badge,
# OS notification, lock-screen summary, status-strip mirror, or
# companion push back to the same durable identity rather than
# trusting that the routing contracts will be interpreted
# consistently surface by surface.
#
# Source contracts (read these first; this file does not re-mint
# their vocabularies):
#   - docs/ux/attention_activity_taxonomy.md
#   - docs/ux/notification_delivery_contract.md
#   - docs/ux/durable_work_contract.md
#   - docs/ux/durable_job_envelope_contract.md
#   - docs/ux/os_notification_and_quiet_hours_contract.md
#   - docs/ux/exact_reopen_drill_map.md
#
# Companion artifacts:
#   - schemas/ux/job_row.schema.json
#   - schemas/ux/job_row_retention.schema.json
#   - schemas/ux/activity_event_envelope.schema.json
#   - schemas/ux/event_lineage.schema.json
#   - artifacts/ux/quiet_hours_policy_matrix.yaml
#   - fixtures/ux/durable_attention_cases/*.yaml
#
# Rules (frozen):
#   1. Every row resolves to exactly one source_subsystem,
#      target_kind, state_class, and activity_partition from the
#      schema vocabularies; rows MUST NOT mint local synonyms.
#   2. Every row names exactly one canonical_object_target_ref and
#      one durable_job_id_ref. Notification, badge, and OS-level
#      deliveries reopen to that target identity or deny with
#      reopen_denied_requires_revalidation; reopen to a generic
#      home screen is non-conforming.
#   3. Every row pins a retention_packet_ref resolved through
#      schemas/ux/job_row_retention.schema.json and a fixture under
#      fixtures/ux/durable_attention_cases/.
#   4. Transient chrome classes (toast, badge, OS notification,
#      lock-screen summary, companion push, digest group row) MAY
#      be dismissed without clearing the durable row; the row's
#      partition only changes on the named release_trigger_class.
#   5. Adding a row is additive-minor; renaming a row id is
#      breaking and requires a new decision row.

schema_version: 1
corpus_id: aureline.durable_attention_corpus.v1
status: seeded

source_doc_refs:
  attention_activity_taxonomy: docs/ux/attention_activity_taxonomy.md
  notification_delivery_contract: docs/ux/notification_delivery_contract.md
  durable_work_contract: docs/ux/durable_work_contract.md
  durable_job_envelope_contract: docs/ux/durable_job_envelope_contract.md
  os_notification_and_quiet_hours_contract: docs/ux/os_notification_and_quiet_hours_contract.md
  exact_reopen_drill_map: docs/ux/exact_reopen_drill_map.md

companion_artifact_refs:
  job_row_schema: schemas/ux/job_row.schema.json
  job_row_retention_schema: schemas/ux/job_row_retention.schema.json
  activity_event_envelope_schema: schemas/ux/activity_event_envelope.schema.json
  event_lineage_schema: schemas/ux/event_lineage.schema.json
  quiet_hours_policy_matrix: artifacts/ux/quiet_hours_policy_matrix.yaml
  durable_attention_cases: fixtures/ux/durable_attention_cases/

