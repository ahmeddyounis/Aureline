# ---------------------------------------------------------------------------
# Convergence assertions. Tooling reads each block to verify that every
# transient or OS-level delivery surface for a row resolves to one
# canonical reopen target identity, not a generic home screen.
# ---------------------------------------------------------------------------
convergence_assertions:
  - assertion_id: dur:assert:reopen_target_identity_singular
    statement: >
      For every corpus row, every delivery_surfaces[*].delivery_surface_class
      MUST converge on canonical_reopen_target_ref or deny with
      reopen_denied_requires_revalidation. Reopen to a generic home
      screen is non-conforming.
  - assertion_id: dur:assert:transient_dismissal_preserves_durable_row
    statement: >
      Dismissing toast, OS notification, badge, lock-screen summary,
      digest group row, or companion push MUST NOT clear the durable
      row, the canonical event lineage, the audit trail, or the
      held / suppressed count. Only the row's named release_trigger_class
      satisfies retention.
  - assertion_id: dur:assert:retention_partition_aligned_with_state_class
    statement: >
      Each row's activity_partition MUST agree with the state_class
      mapping in schemas/ux/job_row.schema.json and the partition
      rule in schemas/ux/job_row_retention.schema.json.
  - assertion_id: dur:assert:held_or_suppressed_audit_trail
    statement: >
      Held and policy-suppressed rows MUST emit a not_delivered_held
      envelope and an audit_event_id even when no interruption was
      delivered; durable history is preserved across every quiet
      hours mode.
  - assertion_id: dur:assert:cross_client_lineage_singular
    statement: >
      Cross-client deliveries (companion push, managed admin
      surface, remote agent) MUST share one
      cross_client_canonical_event_id with the desktop attention
      item; per-device durable identities are forbidden.
