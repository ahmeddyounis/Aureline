# Shell metrics, density, adaptive classes, collapse policy,
# and window-restore rules.
#
# Machine-readable companion to
# docs/ux/shell_zone_and_density_contract.md. Renderer, layout,
# restore, review, AI, extension, and provider surfaces read
# this file by id — zone ids, density-mode ids, adaptive-class
# ids, identity-cue fallback ids, and lifecycle-event ids —
# rather than minting local copies.
#
# Rules:
#   - If this file and the contract doc disagree, the contract
#     doc wins and this file MUST update in the same change.
#   - Zone ids mirror the canonical shell-zone model from
#     ADR 0016 and the ADR-0016 boundary matrix. This file does
#     not mint new zone ids.
#   - Responsive-fallback modes and required-visible-field
#     classes are re-exported verbatim from the shell-
#     interaction-safety contract; this file does not re-mint
#     them.
#   - Restore phases are re-exported verbatim from the layout-
#     serialization contract; this file does not re-mint them.
#   - Adding a new zone, density mode, adaptive class, identity
#     cue, fallback surface, or lifecycle rule is additive-minor
#     and bumps shell_metrics_schema_version. Repurposing an
#     existing value is breaking and requires a new decision
#     row in artifacts/governance/decision_index.yaml.

shell_metrics_schema_version: 1

sources:
  contract_doc_ref: docs/ux/shell_zone_and_density_contract.md
  adr_source_ref: docs/adr/0016-shell-windowing-input-accessibility-boundary.md
  decision_id: D-0022
  decision_register_ref: artifacts/governance/decision_index.yaml
  boundary_matrix_ref: artifacts/ux/desktop_shell_boundary_matrix.yaml
  interaction_safety_contract_ref: docs/ux/shell_interaction_safety_contract.md
  layout_serialization_contract_ref: docs/workspace/layout_serialization_contract.md
  multi_window_verification_ref: docs/qa/multi_window_verification.md
  multi_window_matrix_ref: artifacts/qa/window_display_matrix.yaml
  input_adapter_failure_modes_ref: docs/architecture/input_adapter_failure_modes.md
  ui_ux_spec_sections:
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.1
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.3
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.4
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.5
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.6
    - .t2/docs/Aureline_UI_UX_Spec_Document.md#EP
  ux_style_guide_sections:
    - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#12.1
    - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#12.3
    - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#12.4
    - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#12.5
    - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#12.6

