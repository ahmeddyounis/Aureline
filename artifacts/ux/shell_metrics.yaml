identity_cue_rules:
  - rule_id: cue.every_cue_has_typed_fallback
    statement: A responsive fallback may collapse secondary chrome but must not drop any field in the required_visible_field_class set for the active consequence class and must disclose collapsed cues through one of the fallback surfaces above.
  - rule_id: cue.fallback_is_keyboard_complete
    statement: Every collapse has a keyboard-reachable re-entry affordance — overflow menu, sheet open, pin-back action, or command-palette route.
  - rule_id: cue.overflow_explains_hidden_items
    statement: A compact shell menu names its hidden items (e.g. "3 more status items") rather than presenting an empty trigger.
  - rule_id: cue.identity_before_ornament
    statement: When space runs out, the shell truncates labels and drops ornament (icons-only, badge hidden) in that order; it does not drop identity text until the declared fallback surface takes over.

# ---------------------------------------------------------------------------
# Multi-window and window-restore rules. Re-export scenario ids from the
# multi-window verification seed without duplicating claimed-profile notes.
# ---------------------------------------------------------------------------
multi_window_rules:

  - rule_id: multi_window.one_window_one_native_top_level
    statement: One Aureline top-level window maps to one native top-level window, one renderer surface root, and one accessibility root. Many windows may still share one workspace authority.
    adr_anchor: docs/adr/0016-shell-windowing-input-accessibility-boundary.md#decision
  - rule_id: multi_window.every_window_is_a_full_shell
    statement: Every window retains the canonical command graph, workspace identity, trust state, remote / host identity, profile, and recovery-critical status cues.
  - rule_id: multi_window.cross_window_operations_advertise_verb
    statement: Cross-window drag-and-drop advertises the resulting verb (Move tab / Copy editor / Open compare here / Create window) before drop.
  - rule_id: multi_window.closing_never_orphans_durable_state
    statement: Closing a secondary window must not orphan dirty buffers, active approvals, shared-session control, or long-running evidence review without an explicit continuation path.
  - rule_id: multi_window.dialogs_window_local
    statement: Dialogs, permission sheets, trust prompts, and destructive confirmations attach to the owning window and return focus to the invoker on dismiss.
  - rule_id: multi_window.notifications_route_to_owner
    statement: Notifications route to the owning window when context matters and degrade to badges or activity-center entries instead of stealing focus from the active typing surface.

restore_rules:

  - rule_id: restore.layout_intent_over_pixels
    statement: Session restore preserves window role, editor-group composition, pinned / dirty tabs, panel visibility, and dominant monitor rather than brittle pixel-perfect coordinates.
    restore_phases_exercised: [chooser, skeleton, hydrate]
  - rule_id: restore.safe_bounds_remap_on_topology_change
    statement: When monitor topology, DPI, fullscreen / space state, snapped layout, or window-manager rules change, the shell remaps windows into reachable bounds and records the adjustment on restore provenance.
    restore_phases_exercised: [skeleton, hydrate]
    lifecycle_events_exercised: [display_reconnect]
  - rule_id: restore.scale_bucket_update_silent_on_identity
    statement: A display-scale change updates safe bounds, scale bucket, and owner-dialog placement without changing window ownership, focus owner, or command routes.
    lifecycle_events_exercised: [display_reconnect]
  - rule_id: restore.dialogs_follow_their_window
    statement: An orphaned dialog, sheet, or prompt recenters with its owning window and must not survive on a detached or hidden display.
    restore_phases_exercised: [skeleton]
  - rule_id: restore.typed_lifecycle_not_silent_resume
    statement: Off-screen restore records the typed lifecycle event (display_reconnect / wake_from_sleep / removable_volume_return) and preserves restore provenance; live authority requires explicit rebind.
    restore_phases_exercised: [rebind, evidence_only_fallback]
    lifecycle_events_exercised: [wake_from_sleep, removable_volume_return, restart_or_reopen]
  - rule_id: restore.recovery_actions_reachable
    statement: After recentre, the active pane, owner dialog, and safe-recovery actions (Move to primary display / Review layout / Restore detached window) remain reachable by keyboard.
    restore_phases_exercised: [hydrate]
  - rule_id: restore.provenance_inspectable
    statement: Topology adjustments, missing dependencies, and continuity level remain inspectable after reopen or wake via the layout_restore_provenance_record.
    restore_phases_exercised: [chooser, skeleton, hydrate, rebind]

