# ---------------------------------------------------------------------------
# Invariants reviewed by later conformance gates.
# ---------------------------------------------------------------------------
invariants:

  - id: no_vague_copy_on_protected_paths
    description: >
      Every empty_state_row, loading_state_row, failure_tier_row,
      and lifecycle_state_row avoids vague "Working...",
      "Loading...", "Something went wrong", "Error", "Failed",
      "Try again", "Unavailable" copy on protected paths when a
      precise token is known. Rows that allow vague copy deny
      with vague_state_copy_on_protected_path.
    failure_denial_reason: vague_state_copy_on_protected_path

  - id: every_row_names_preserved_narrowed_next_action
    description: >
      Every degraded / restricted / paused / failed row names
      preserved capability, narrowed capability, and at least
      one next-safe action hook. Rows that omit any leg deny
      with state_row_axis_missing.
    failure_denial_reason: state_row_axis_missing

  - id: last_failure_reason_keyboard_reachable
    description: >
      Every lifecycle_state_row sets keyboard_reveal = true on
      its last_failure_reason_visibility block. Rows that render
      recovery only on hover or only via a pointer affordance
      deny with state_row_recovery_not_keyboard_reachable.
    failure_denial_reason: state_row_recovery_not_keyboard_reachable

  - id: last_failure_reason_preserved_on_export
    description: >
      Every lifecycle_state_row sets support_export_field = true
      and names at least one support_packet_family_ref. Rows that
      discard the last-failure reason on dismiss or export deny
      with last_failure_reason_discarded_on_dismiss.
    failure_denial_reason: last_failure_reason_discarded_on_dismiss

  - id: failure_tier_promotion_is_monotonic
    description: >
      Every failure_tier_row promotes to the next tier in the
      frozen order only via a promotion_trigger_class value.
      Silent skips deny with
      failure_tier_escalated_without_trigger; silent demotion
      without a resolution event denies with
      failure_tier_demoted_without_resolution_event.
    failure_denial_reason: failure_tier_escalated_without_trigger

  - id: recovery_routes_cited_by_id
    description: >
      Every row cites at least one recovery_ladder_rung_ref (or
      rung.none_required) and at least one support_packet_family_
      ref. Rows that rely on free-text troubleshooting deny with
      recovery_route_by_freetext_only.
    failure_denial_reason: recovery_route_by_freetext_only

  - id: controlled_labels_are_typed
    description: >
      The strings "Partially ready", "Degraded", and "Read-only
      degraded" are reserved for lifecycle_state_rows. Surfaces
      that render them outside the lifecycle rows deny with
      controlled_label_misapplied.
    failure_denial_reason: controlled_label_misapplied

  - id: toast_only_forbidden_for_durable_work
    description: >
      Long-running loads (past the tier_durable threshold) MUST
      mirror to a durable surface. Toast-only rendering denies
      with toast_only_forbidden_for_durable_work per the
      attention/activity taxonomy.
    failure_denial_reason: toast_only_forbidden_for_durable_work

  - id: whole_shell_spinner_forbidden
    description: >
      No loading state occludes the activity rail, palette, menu,
      inspector, or breadcrumbs; the useful-now chrome remains
      keyboard-reachable. Rows that allow a whole-shell spinner
      deny with whole_shell_spinner_forbidden.
    failure_denial_reason: whole_shell_spinner_forbidden

  - id: escalation_language_stable_across_surfaces
    description: >
      State-row ids, lifecycle tokens, failure-tier ids, and
      recovery-rung refs are the stable keys onboarding, docs,
      support, diagnostics, and release evidence import. A
      surface that restates the basics in free-form copy or
      loses a controlled label on export denies with
      escalation_language_forked_per_surface or
      controlled_label_lost_on_export.
    failure_denial_reason: escalation_language_forked_per_surface

  - id: schema_version_alignment
    description: >
      All emitted rows share failure_tier_matrix_schema_version
      with the registry. Rows lagging behind a schema bump deny
      with failure_tier_matrix_schema_version_lagging.
    failure_denial_reason: failure_tier_matrix_schema_version_lagging
