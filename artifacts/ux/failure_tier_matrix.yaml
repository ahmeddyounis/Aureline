# Failure-tier matrix.
#
# Machine-readable companion to
#   docs/ux/state_and_recovery_taxonomy.md
#
# This file freezes the five-tier failure-placement matrix used by
# every protected shell surface to decide where a failure-bearing
# row lives, what delivery surfaces it may inhabit, what minimum
# recovery affordance it MUST offer, and how promotion between
# tiers resolves. Designers, docs writers, implementation owners,
# support, diagnostics, and release-evidence surfaces all read
# this file by id (failure_tier_id, lifecycle_row_id) so placement
# is not minted per surface.
#
# Conformance:
#   - Every failure_tier_row and lifecycle_row below conforms to
#     this file's structural shape. There is no separate JSON
#     schema yet; this file composes already-frozen vocabularies
#     from the attention/activity taxonomy, the recovery-ladder
#     packet, the entry/restore object model, and the truth /
#     degraded-state vocabulary.
#   - Adding a lifecycle row or a recovery-surface binding is
#     additive-minor and lands here, in the taxonomy doc, and as
#     a fixture in the same change; repurposing a tier id,
#     controlled label, or lifecycle state token is breaking and
#     opens a new decision row.
#
# Rules (frozen):
#   1. Every row names exactly one failure_tier_id from the closed
#      set in failure_tier_vocabulary. Rows that straddle tiers
#      are non-conforming and deny with failure_tier_unresolved.
#   2. Every row cites at least one delivery_surface_class from
#      the frozen attention/activity taxonomy set; rows that mint
#      new delivery surfaces deny with delivery_surface_unresolved.
#   3. Every row cites at least one minimum_recovery_affordance
#      naming what the user can do on the row; rows that omit the
#      affordance deny with state_row_axis_missing.
#   4. Every row cites at least one recovery_ladder_rung_ref (or
#      rung.none_required) and at least one support_packet_family_
#      ref so support / recovery / handoff resolve by id.
#   5. Every row cites at least one interruptibility_tier; a row
#      that cannot resolve its tier denies with
#      interruptibility_tier_unresolved.
#   6. Promotion between failure tiers is monotonic; tier skips
#      require a promotion_trigger_class value. Silent skips deny
#      with failure_tier_escalated_without_trigger.
#   7. Every lifecycle row names last_failure_reason_visibility
#      axes (keyboard_reveal, support_export_field,
#      export_safe_description). Rows that omit any axis deny
#      with last_failure_reason_discarded_on_dismiss.
#   8. Every row cites at least one fixture_ref pinning the seed
#      fixture under fixtures/ux/state_copy_examples/.
#
# If this file and docs/ux/state_and_recovery_taxonomy.md disagree,
# the taxonomy doc wins and this file updates in the same change.

failure_tier_matrix_schema_version: 1

sources:
  taxonomy_doc_ref: docs/ux/state_and_recovery_taxonomy.md
  fixture_corpus_dir: fixtures/ux/state_copy_examples/
  attention_activity_taxonomy_ref: docs/ux/attention_activity_taxonomy.md
  shell_interaction_safety_contract_ref: docs/ux/shell_interaction_safety_contract.md
  navigation_and_escalation_contract_ref: docs/ux/navigation_and_escalation_contract.md
  entry_restore_truth_audit_ref: docs/ux/entry_restore_truth_audit.md
  startup_state_copy_review_ref: artifacts/ux/startup_state_copy_review.yaml
  recovery_ladder_packet_ref: docs/support/recovery_ladder_packet.md
  truth_and_degraded_state_vocabulary_ref: docs/governance/truth_and_degraded_state_vocabulary.md
  truth_class_matrix_ref: artifacts/governance/truth_class_matrix.yaml
  a11y_ime_packet_template_ref: docs/accessibility/a11y_ime_packet_template.md

ui_ux_spec_refs:
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.1
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.10
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#9.4
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#9.11
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#9.15
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#22.20
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#23.26

# ---------------------------------------------------------------------------
# Frozen vocabularies re-exported for tooling discovery. Rows below MUST
# quote exactly one value (or the listed subset) from each vocabulary.
# ---------------------------------------------------------------------------

failure_tier_vocabulary:
  - tier.inline_issue
  - tier.contextual_degraded
  - tier.workflow_block
  - tier.session_recovery
  - tier.escalation_surface

# Re-export of the attention/activity taxonomy delivery-surface classes.
# Rows may cite any subset; rows that mint new surfaces are non-conforming.
delivery_surface_class_vocabulary:
  - toast
  - contextual_banner
  - status_item
  - durable_job_row
  - attention_item
  - activity_center_digest_card
  - digest_group_row
  - os_notification
  - os_badge_app_icon
  - lock_screen_summary
  - companion_push
  - not_delivered_held
  - window_attached_sheet
  - dialog_modal
  - full_surface_takeover
  - inline_row_chrome
  - panel
  - support_center_surface
  - object_handoff_surface

interruptibility_tier_vocabulary:
  - tier_ambient
  - tier_transient
  - tier_durable
  - tier_actionable
  - tier_blocking_trust
  - tier_critical_safety

# Recovery-ladder rung ids re-exported from
# docs/support/recovery_ladder_packet.md. Rows cite by id.
recovery_ladder_rung_ref_vocabulary:
  - rung.safe_mode
  - rung.extension_quarantine
  - rung.open_without_restore
  - rung.cache_index_repair
  - rung.restricted_mode_fallback
  - rung.none_required

# Support-packet family registry re-export.
support_packet_family_ref_vocabulary:
  - recovery_ladder_packet
  - object_issue_handoff
  - managed_workspace_evidence
  - auth_evidence_packet
  - policy_audit_evidence
  - performance_evidence_packet
  - crash_recovery_evidence
  - first_run_evidence
  - restore_prompt_evidence
  - empty_state_audit_evidence

# Closed emptiness-cause set per taxonomy §5.1.
emptiness_cause_vocabulary:
  - no_work_started
  - filter_narrowed_to_zero
  - permission_or_policy_blocked
  - not_ready_warming
  - not_ready_partial
  - offline_local_only_view
  - unsupported_on_this_surface
  - failed_last_attempt

# Closed loading-pattern set per taxonomy §6.1.
loading_pattern_vocabulary:
  - skeleton_row
  - progressive_partial_results
  - top_of_pane_progress_indicator
  - inline_placeholder
  - not_delivered_held_placeholder

# Forbidden loading patterns (non-conforming on protected paths).
forbidden_loading_pattern_vocabulary:
  - whole_shell_spinner
  - indeterminate_spinner_in_place_of_cause
  - bare_vague_loading_copy
  - content_reflow_during_load
  - hiding_useful_now_chrome

# Lifecycle subsystems per taxonomy §8.
lifecycle_subsystem_vocabulary:
  - workspace
  - extension
  - remote_session
  - ai_action
  - update_rollback

# Reserved controlled labels per taxonomy §8.6.
controlled_label_vocabulary:
  - "Partially ready"
  - "Degraded"
  - "Read-only degraded"

# Ten-token cross-surface degraded-state vocabulary, re-exported from
# docs/governance/truth_and_degraded_state_vocabulary.md.
degraded_state_token_vocabulary:
  - Warming
  - Cached
  - Partial
  - Stale
  - Offline
  - PolicyBlocked
  - Limited
  - Unsupported
  - Experimental
  - RetestPending

# Closed promotion-trigger classes per taxonomy §7.6.
promotion_trigger_class_vocabulary:
  - severity_change
  - duration_threshold_crossed
  - required_authority_change
  - irreversible_consequence_path_entered
  - repeated_recovery_failure
  - user_elected_escalation
  - subsystem_crash_loop
  - policy_or_admin_required
  - rung_failed_across_threshold
  - workflow_cannot_continue_safely

# User-impact label classes, re-exported from
# docs/ux/entry_restore_truth_audit.md §5.
user_impact_label_class_vocabulary:
  - no_durable_work_yet
  - pending_user_review
  - work_continues_with_narrowed_capability
  - prior_work_preserved_but_not_rerun
  - prior_work_not_recoverable_by_automation
  - no_recovery_on_irreversible_path

# Next-step decision hooks, re-exported from entry-restore object model §1.7.
next_step_decision_hook_vocabulary:
  - continue_in_restricted_mode
  - review_trust_and_open
  - open_minimal
  - set_up_later
  - review_archetype_match
  - compare_before_restore
  - open_without_restore
  - safe_mode
  - reconnect_required
  - reauth_required
  - locate_missing_target
  - remove_from_recents
  - review_migration_report
  - roll_back_import
  - keep_imported_state
  - adopt_recommended_bundle
  - review_unsupported_items

# Axes every lifecycle row must pin for last-failure visibility.
last_failure_reason_visibility_axis_vocabulary:
  - keyboard_reveal
  - support_export_field
  - export_safe_description

# ---------------------------------------------------------------------------
# Failure-tier rows. One row per value in failure_tier_vocabulary.
# ---------------------------------------------------------------------------
failure_tier_rows:

  - record_kind: failure_tier_row
    failure_tier_matrix_schema_version: 1
    failure_tier_id: tier.inline_issue
    doc_section_ref: docs/ux/state_and_recovery_taxonomy.md#7.1
    scope_description: >
      One row, cell, or line-range on the owning surface. A
      single-row failure, a per-field partial, or a
      per-suggestion apply miss lives here.
    allowed_delivery_surface_classes:
      - inline_row_chrome
      - status_item
    allowed_interruptibility_tiers:
      - tier_ambient
      - tier_transient
    minimum_recovery_affordances:
      - retry_this
      - reveal_last_failure
      - locate_alternate_target
    recovery_ladder_rung_refs:
      - rung.none_required
      - rung.cache_index_repair
    support_packet_family_refs:
      - recovery_ladder_packet
      - performance_evidence_packet
    next_tier_on_promotion: tier.contextual_degraded
    promotion_trigger_classes:
      - severity_change
      - duration_threshold_crossed
      - repeated_recovery_failure
    forbidden_placements:
      - "toast-only rendering of a repeated failure"
      - "silent reflow of the row on recovery"
    overclaims_readiness: false
    fixture_refs:
      - fixtures/ux/state_copy_examples/inline_issue_save_error.md
    minted_at: "2026-04-23T00:00:00Z"

  - record_kind: failure_tier_row
    failure_tier_matrix_schema_version: 1
    failure_tier_id: tier.contextual_degraded
    doc_section_ref: docs/ux/state_and_recovery_taxonomy.md#7.2
    scope_description: >
      The surface as a whole is degraded (not just one row).
      Controlled labels Partially ready / Degraded / Read-only
      degraded render here.
    allowed_delivery_surface_classes:
      - contextual_banner
      - status_item
      - activity_center_digest_card
      - durable_job_row
    allowed_interruptibility_tiers:
      - tier_durable
    minimum_recovery_affordances:
      - reveal_last_failure
      - controlled_label_render
      - named_next_safe_action_hook
    recovery_ladder_rung_refs:
      - rung.cache_index_repair
      - rung.extension_quarantine
      - rung.open_without_restore
      - rung.restricted_mode_fallback
    support_packet_family_refs:
      - recovery_ladder_packet
      - managed_workspace_evidence
      - auth_evidence_packet
      - policy_audit_evidence
    next_tier_on_promotion: tier.workflow_block
    promotion_trigger_classes:
      - workflow_cannot_continue_safely
      - required_authority_change
      - irreversible_consequence_path_entered
      - repeated_recovery_failure
    forbidden_placements:
      - "toast-only rendering of workspace-wide degraded state"
      - "undifferentiated Offline banner hiding which rows are affected"
    overclaims_readiness: false
    fixture_refs:
      - fixtures/ux/state_copy_examples/contextual_degraded_workspace_partially_ready.md
      - fixtures/ux/state_copy_examples/contextual_degraded_remote_read_only.md
    minted_at: "2026-04-23T00:00:00Z"

  - record_kind: failure_tier_row
    failure_tier_matrix_schema_version: 1
    failure_tier_id: tier.workflow_block
    doc_section_ref: docs/ux/state_and_recovery_taxonomy.md#7.3
    scope_description: >
      The user's active workflow cannot safely continue on the
      current posture. Reached through the navigation/escalation
      ladder; dialog_modal only when the consequence is
      irreversible.
    allowed_delivery_surface_classes:
      - window_attached_sheet
      - panel
      - dialog_modal
    allowed_interruptibility_tiers:
      - tier_actionable
      - tier_blocking_trust
    minimum_recovery_affordances:
      - named_cause_token
      - named_next_safe_action_hook
      - focus_return_on_dismiss
      - safe_abandon
    recovery_ladder_rung_refs:
      - rung.restricted_mode_fallback
      - rung.open_without_restore
      - rung.cache_index_repair
      - rung.extension_quarantine
    support_packet_family_refs:
      - recovery_ladder_packet
      - object_issue_handoff
    next_tier_on_promotion: tier.session_recovery
    promotion_trigger_classes:
      - subsystem_crash_loop
      - repeated_recovery_failure
      - user_elected_escalation
    forbidden_placements:
      - "surprise dialog_modal that the user did not reach through an explicit affordance"
      - "sheet that hides the triggering row so focus-return has no anchor"
    overclaims_readiness: false
    fixture_refs:
      - fixtures/ux/state_copy_examples/workflow_block_ai_apply_blocked.md
    minted_at: "2026-04-23T00:00:00Z"

  - record_kind: failure_tier_row
    failure_tier_matrix_schema_version: 1
    failure_tier_id: tier.session_recovery
    doc_section_ref: docs/ux/state_and_recovery_taxonomy.md#7.4
    scope_description: >
      The whole session needs a repair pass. Crash-loop safe mode,
      extension quarantine after repeated crash, corrupt restore,
      cache/index repair, restricted-mode fallback.
    allowed_delivery_surface_classes:
      - dialog_modal
      - full_surface_takeover
    allowed_interruptibility_tiers:
      - tier_blocking_trust
    minimum_recovery_affordances:
      - named_rung_id
      - evidence_packet_family_ref
      - session_recovery_outcome_token
      - focus_return_to_startup_surface
    recovery_ladder_rung_refs:
      - rung.safe_mode
      - rung.extension_quarantine
      - rung.open_without_restore
      - rung.cache_index_repair
      - rung.restricted_mode_fallback
    support_packet_family_refs:
      - recovery_ladder_packet
      - crash_recovery_evidence
      - object_issue_handoff
    next_tier_on_promotion: tier.escalation_surface
    promotion_trigger_classes:
      - rung_failed_across_threshold
      - policy_or_admin_required
      - user_elected_escalation
    forbidden_placements:
      - "toast or contextual_banner as the entry step for session recovery"
      - "Undo verb on compensating_rollback / regenerate_from_canonical_source rung classes"
    overclaims_readiness: false
    fixture_refs:
      - fixtures/ux/state_copy_examples/session_recovery_crash_loop_safe_mode.md
    minted_at: "2026-04-23T00:00:00Z"

  - record_kind: failure_tier_row
    failure_tier_matrix_schema_version: 1
    failure_tier_id: tier.escalation_surface
    doc_section_ref: docs/ux/state_and_recovery_taxonomy.md#7.5
    scope_description: >
      The failure exceeds what the product can resolve
      autonomously; support, admin policy, platform help, or
      issue handoff is required.
    allowed_delivery_surface_classes:
      - support_center_surface
      - object_handoff_surface
      - os_notification
      - lock_screen_summary
      - companion_push
    allowed_interruptibility_tiers:
      - tier_critical_safety
    minimum_recovery_affordances:
      - packet_ref
      - escalation_outcome_token
      - recovery_rung_history_by_id
    recovery_ladder_rung_refs:
      - rung.none_required
    support_packet_family_refs:
      - recovery_ladder_packet
      - object_issue_handoff
      - policy_audit_evidence
    next_tier_on_promotion: null
    promotion_trigger_classes:
      - policy_or_admin_required
      - user_elected_escalation
    forbidden_placements:
      - "os_notification carrying raw secret material or raw external content"
      - "lock_screen_summary violating the privacy-payload class"
    overclaims_readiness: false
    fixture_refs:
      - fixtures/ux/state_copy_examples/escalation_surface_policy_blocked.md
    minted_at: "2026-04-23T00:00:00Z"

# ---------------------------------------------------------------------------
# Lifecycle rows. One row per lifecycle_subsystem value, with closed state
# set, minimum recovery actions, last-failure reason visibility, and
# failure-tier mapping per taxonomy §8.
# ---------------------------------------------------------------------------
lifecycle_rows:

  - record_kind: lifecycle_state_row
    failure_tier_matrix_schema_version: 1
    lifecycle_row_id: lifecycle:workspace
    lifecycle_subsystem: workspace
    doc_section_ref: docs/ux/state_and_recovery_taxonomy.md#8.1
    state_tokens:
      - workspace.starting
      - workspace.ready
      - workspace.partially_ready
      - workspace.degraded
      - workspace.read_only_degraded
      - workspace.recovering
      - workspace.quarantined
      - workspace.stopped
    minimum_recovery_actions:
      - action_id: workspace.open_without_restore
        next_step_decision_hook: open_without_restore
        recovery_ladder_rung_ref: rung.open_without_restore
        keyboard_reachable: true
      - action_id: workspace.enter_safe_mode
        next_step_decision_hook: safe_mode
        recovery_ladder_rung_ref: rung.safe_mode
        keyboard_reachable: true
      - action_id: workspace.repair_cache_index
        next_step_decision_hook: continue_in_restricted_mode
        recovery_ladder_rung_ref: rung.cache_index_repair
        keyboard_reachable: true
      - action_id: workspace.continue_in_restricted_mode
        next_step_decision_hook: continue_in_restricted_mode
        recovery_ladder_rung_ref: rung.restricted_mode_fallback
        keyboard_reachable: true
      - action_id: workspace.locate_missing_target
        next_step_decision_hook: locate_missing_target
        recovery_ladder_rung_ref: rung.none_required
        keyboard_reachable: true
    last_failure_reason_visibility:
      keyboard_reveal: true
      reveal_surface: status_item
      support_export_field: true
      support_packet_family_refs:
        - recovery_ladder_packet
        - managed_workspace_evidence
      export_safe_description: true
    controlled_labels_allowed:
      - "Partially ready"
      - "Degraded"
      - "Read-only degraded"
    degraded_state_tokens_allowed:
      - Warming
      - Partial
      - Stale
      - Offline
      - PolicyBlocked
      - Limited
      - RetestPending
    failure_tier_mapping:
      - state_token_ref: workspace.partially_ready
        failure_tier_id: tier.contextual_degraded
        user_impact_label_class: work_continues_with_narrowed_capability
      - state_token_ref: workspace.degraded
        failure_tier_id: tier.contextual_degraded
        user_impact_label_class: work_continues_with_narrowed_capability
      - state_token_ref: workspace.read_only_degraded
        failure_tier_id: tier.contextual_degraded
        user_impact_label_class: work_continues_with_narrowed_capability
      - state_token_ref: workspace.recovering
        failure_tier_id: tier.session_recovery
        user_impact_label_class: prior_work_not_recoverable_by_automation
      - state_token_ref: workspace.quarantined
        failure_tier_id: tier.session_recovery
        user_impact_label_class: prior_work_not_recoverable_by_automation
      - state_token_ref: workspace.stopped
        failure_tier_id: tier.escalation_surface
        user_impact_label_class: prior_work_not_recoverable_by_automation
    startup_state_intersections:
      - startup_state:partial_startup
      - startup_state:warming_startup
      - startup_state:unsupported_startup
    fixture_refs:
      - fixtures/ux/state_copy_examples/contextual_degraded_workspace_partially_ready.md
    overclaims_readiness: false
    minted_at: "2026-04-23T00:00:00Z"

  - record_kind: lifecycle_state_row
    failure_tier_matrix_schema_version: 1
    lifecycle_row_id: lifecycle:extension
    lifecycle_subsystem: extension
    doc_section_ref: docs/ux/state_and_recovery_taxonomy.md#8.2
    state_tokens:
      - extension.loading
      - extension.activated
      - extension.partially_activated
      - extension.degraded
      - extension.read_only_degraded
      - extension.quarantined
      - extension.unactivated_by_policy
      - extension.uninstalled
    minimum_recovery_actions:
      - action_id: extension.reload
        next_step_decision_hook: continue_in_restricted_mode
        recovery_ladder_rung_ref: rung.none_required
        keyboard_reachable: true
      - action_id: extension.quarantine
        next_step_decision_hook: safe_mode
        recovery_ladder_rung_ref: rung.extension_quarantine
        keyboard_reachable: true
      - action_id: extension.reveal_last_failure
        next_step_decision_hook: review_trust_and_open
        recovery_ladder_rung_ref: rung.none_required
        keyboard_reachable: true
      - action_id: extension.open_details
        next_step_decision_hook: review_archetype_match
        recovery_ladder_rung_ref: rung.none_required
        keyboard_reachable: true
      - action_id: extension.continue_without
        next_step_decision_hook: continue_in_restricted_mode
        recovery_ladder_rung_ref: rung.restricted_mode_fallback
        keyboard_reachable: true
    last_failure_reason_visibility:
      keyboard_reveal: true
      reveal_surface: activity_center_digest_card
      support_export_field: true
      support_packet_family_refs:
        - recovery_ladder_packet
        - object_issue_handoff
      export_safe_description: true
    controlled_labels_allowed:
      - "Partially ready"
      - "Degraded"
      - "Read-only degraded"
    degraded_state_tokens_allowed:
      - Warming
      - Partial
      - PolicyBlocked
      - Limited
      - Experimental
      - RetestPending
    failure_tier_mapping:
      - state_token_ref: extension.partially_activated
        failure_tier_id: tier.contextual_degraded
        user_impact_label_class: work_continues_with_narrowed_capability
      - state_token_ref: extension.degraded
        failure_tier_id: tier.contextual_degraded
        user_impact_label_class: work_continues_with_narrowed_capability
      - state_token_ref: extension.read_only_degraded
        failure_tier_id: tier.contextual_degraded
        user_impact_label_class: work_continues_with_narrowed_capability
      - state_token_ref: extension.quarantined
        failure_tier_id: tier.session_recovery
        user_impact_label_class: work_continues_with_narrowed_capability
      - state_token_ref: extension.unactivated_by_policy
        failure_tier_id: tier.contextual_degraded
        user_impact_label_class: work_continues_with_narrowed_capability
    startup_state_intersections:
      - startup_state:partial_startup
      - startup_state:unsupported_startup
      - startup_state:empty_state_or_placeholder_transition
    fixture_refs:
      - fixtures/ux/state_copy_examples/contextual_degraded_extension_quarantined.md
    overclaims_readiness: false
    minted_at: "2026-04-23T00:00:00Z"

  - record_kind: lifecycle_state_row
    failure_tier_matrix_schema_version: 1
    lifecycle_row_id: lifecycle:remote_session
    lifecycle_subsystem: remote_session
    doc_section_ref: docs/ux/state_and_recovery_taxonomy.md#8.3
    state_tokens:
      - remote.reachable
      - remote.reconnecting
      - remote.reauth_pending
      - remote.read_only_degraded
      - remote.offline
      - remote.policy_blocked
    minimum_recovery_actions:
      - action_id: remote.reconnect
        next_step_decision_hook: reconnect_required
        recovery_ladder_rung_ref: rung.none_required
        keyboard_reachable: true
      - action_id: remote.reauthenticate
        next_step_decision_hook: reauth_required
        recovery_ladder_rung_ref: rung.none_required
        keyboard_reachable: true
      - action_id: remote.continue_locally
        next_step_decision_hook: continue_in_restricted_mode
        recovery_ladder_rung_ref: rung.restricted_mode_fallback
        keyboard_reachable: true
