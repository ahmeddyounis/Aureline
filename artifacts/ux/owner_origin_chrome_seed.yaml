# Embedded-surface owner/origin chrome seed.
#
# Companion to ADR 0015
# (docs/adr/0015-embedded-surface-boundary-and-auth-handoff.md)
# and the boundary schema at
# schemas/ux/embedded_surface_boundary.schema.json.
#
# This file freezes the owner/origin chrome and auth-handoff cue
# vocabulary that later embedded docs/help, marketplace/account,
# service-dashboard, auth, support-export, and release-evidence lanes
# reuse. The host shell owns this chrome; embedded bodies do not.
#
# Rules:
#   - If this file and ADR 0015 disagree, ADR 0015 wins and this
#     file MUST be updated in the same change.
#   - Every token listed below is mirrored from the ADR/schema.
#   - Adding a new token requires a schema bump and a parallel
#     decision-row / ADR update.
#   - Compact layouts may rearrange these fields but may not hide
#     the required field set for the surface family.

schema_version: 1

adr_source: docs/adr/0015-embedded-surface-boundary-and-auth-handoff.md
decision_id: D-0021
decision_register: artifacts/governance/decision_index.yaml
boundary_schema: schemas/ux/embedded_surface_boundary.schema.json
linked_packets:
  safe_preview: schemas/security/trust_class.schema.json
  browser_handoff_packet: schemas/integration/browser_handoff_packet.schema.json
  approval_ticket: schemas/integration/approval_ticket.schema.json
  help_status_badge: schemas/docs/help_status_badge.schema.json

axes:
  surface_family:
    values:
      - embedded_docs_help
      - embedded_marketplace_or_account
      - embedded_service_dashboard
      - embedded_auth_confirmation
      - extension_hosted_surface

  boundary_state:
    values:
      - live_verified
      - stale_snapshot
      - policy_blocked
      - certificate_failed
      - cross_origin_limited
      - offline_snapshot
      - external_open_only

  auth_flow_class:
    values:
      - not_applicable
      - system_browser
      - device_code
      - platform_authenticator_native
      - embedded_session_refresh
      - embedded_password_exception

  credential_collection_mode:
    values:
      - no_embedded_collection
      - device_code_copy_only
      - session_refresh_without_password
      - password_entry_exception

  required_chrome_field:
    values:
      - owner_label
      - origin_label
      - publisher_or_service_label
      - data_boundary_label
      - boundary_state_label
      - primary_actions
      - source_version_freshness
      - provider_scope_and_actor
      - flow_type_and_return_target
      - fallback_state
      - capability_limitations

  native_reserved_surface:
    values:
      - product_security_messaging
      - update_verification
      - workspace_trust_elevation
      - rollback_or_restore_confirmation
      - ai_apply_review
      - high_risk_approval_sheet

  capability_limitation:
    values:
      - cannot_issue_native_approval
      - cannot_verify_updates_or_signatures
      - cannot_raise_workspace_trust
      - cannot_perform_rollback_or_restore
      - cannot_apply_ai_changes
      - cookies_or_storage_outside_product_boundary
      - cross_origin_dom_or_storage_hidden
      - live_network_mutation_disabled_when_offline
      - provider_scope_may_be_narrower_than_page_claims
      - embedded_auth_lower_trust

  lower_trust_cue:
    values:
      - lower_trust_badge
      - system_browser_preferred_note
      - device_code_alternative_note
      - credential_entry_not_saved_note
      - host_native_approval_still_required
      - exception_id_visible
      - exportable_exception_record

required_fields_by_surface_family:
  - surface_family: embedded_docs_help
    required_fields:
      - owner_label
      - origin_label
      - publisher_or_service_label
      - data_boundary_label
      - boundary_state_label
      - primary_actions
      - source_version_freshness
      - fallback_state
      - capability_limitations
  - surface_family: embedded_marketplace_or_account
    required_fields:
      - owner_label
      - origin_label
      - publisher_or_service_label
      - data_boundary_label
      - boundary_state_label
      - primary_actions
      - provider_scope_and_actor
      - fallback_state
      - capability_limitations
  - surface_family: embedded_service_dashboard
    required_fields:
      - owner_label
      - origin_label
      - publisher_or_service_label
      - data_boundary_label
      - boundary_state_label
      - primary_actions
      - provider_scope_and_actor
      - fallback_state
      - capability_limitations
  - surface_family: embedded_auth_confirmation
    required_fields:
      - owner_label
      - origin_label
      - publisher_or_service_label
      - data_boundary_label
      - boundary_state_label
      - primary_actions
      - flow_type_and_return_target
      - fallback_state
      - capability_limitations
  - surface_family: extension_hosted_surface
    required_fields:
      - owner_label
      - origin_label
      - publisher_or_service_label
      - data_boundary_label
      - boundary_state_label
      - primary_actions
      - provider_scope_and_actor
      - fallback_state
      - capability_limitations

boundary_card_templates:
  docs_help:
    owner_label: "Aureline docs"
    origin_label: "local signed docs pack"
    publisher_or_service_label: "Aureline project"
    data_boundary_label: "local mirrored docs snapshot"
    state_label: "Build-matched and fresh"
    source_version_freshness_label: "Project docs · Exact build match · Authoritative live"
    primary_actions:
      - reload_embedded_surface
      - open_in_system_browser
    capability_limitations_label: "This pane cannot verify updates or sign release trust."

  marketplace_or_account:
    owner_label: "Marketplace account"
    origin_label: "https://marketplace.aureline.dev"
    publisher_or_service_label: "Aureline marketplace service"
    data_boundary_label: "provider account surface"
    state_label: "Limited scope"
    provider_scope_and_actor_label: "Human account on acme-prod · read/install only"
    primary_actions:
      - open_in_system_browser
      - inspect_policy_reason
    capability_limitations_label: "High-risk approvals stay in host-native review."

  service_dashboard:
    owner_label: "Payments dashboard"
    origin_label: "https://console.acme.example"
    publisher_or_service_label: "Acme Cloud"
    data_boundary_label: "hosted dashboard"
    state_label: "Cross-origin limited"
    provider_scope_and_actor_label: "Delegated session on payments-prod"
    fallback_state_label: "Open page externally for the missing controls"
    primary_actions:
      - reload_embedded_surface
      - open_in_system_browser
    capability_limitations_label: "DOM inspection unavailable; trust and rollback actions stay native."

  auth_handoff:
    owner_label: "Aureline sign-in"
    origin_label: "login.acme.example"
    publisher_or_service_label: "Acme IdP"
    data_boundary_label: "identity-provider auth"
    state_label: "Continue in your browser"
    flow_type_label: "System browser"
    return_target_label: "Return to Aureline desktop"
    fallback_state_label: "Use device code if browser launch is blocked"
    primary_actions:
      - open_in_system_browser
      - switch_to_device_code
    capability_limitations_label: "Approval for protected actions still happens in host-native chrome."

auth_flow_defaults:
  preferred_order:
    - system_browser
    - device_code
    - platform_authenticator_native
  embedded_only_flows:
    - embedded_session_refresh
    - embedded_password_exception
  rules:
    - "System browser is the default primary path for supported auth rows."
    - "Device code is the preferred degraded fallback when browser launch is blocked or a return path is unavailable."
    - "Platform authenticator step-up remains host-native or browser/platform-managed, not a generic embedded page."
    - "Embedded session refresh may not collect a password or widen scope."
    - "Embedded password collection is never the default and requires an exception-register row plus lower-trust cues."

embedded_password_exception_requirements:
  required_lower_trust_cues:
    - lower_trust_badge
    - system_browser_preferred_note
    - credential_entry_not_saved_note
    - host_native_approval_still_required
    - exception_id_visible
    - exportable_exception_record
  hard_rules:
    - "The exception row must stay visible from the same auth cue family."
    - "Remembered approval may not survive route, scope, provider, or boundary drift."
    - "The embedded form may not claim update verification, trust elevation, rollback, or AI-apply authority."

downgrade_matrix:
  - state: stale_snapshot
    user_visible_truth: "Showing a dated snapshot; live provider or auth state may have changed."
    required_actions:
      - reload_embedded_surface
      - open_in_system_browser
  - state: policy_blocked
    user_visible_truth: "Policy allows the card to render but blocks the embedded surface or one of its capabilities."
    required_actions:
      - inspect_policy_reason
      - open_support_evidence
  - state: certificate_failed
    user_visible_truth: "Aureline did not render the embedded body because certificate or trust verification failed."
    required_actions:
      - inspect_certificate_details
      - open_in_system_browser
  - state: cross_origin_limited
    user_visible_truth: "The page rendered only the capability subset that survived origin policy."
    required_actions:
      - open_in_system_browser
      - open_support_evidence
  - state: offline_snapshot
    user_visible_truth: "The page is offline and snapshot-only; live mutation and auth claims are removed."
    required_actions:
      - continue_local_without_surface
      - open_support_evidence
  - state: external_open_only
    user_visible_truth: "Aureline is preserving context and object identity, but the live body only opens externally."
    required_actions:
      - open_in_system_browser
      - switch_to_device_code

native_reserved_surface_rules:
  - surface: product_security_messaging
    host_only_reason: "Security posture must come from the host authority, not embedded bytes."
  - surface: update_verification
    host_only_reason: "Signature/provenance verification is product-owned truth."
  - surface: workspace_trust_elevation
    host_only_reason: "Trust widening changes local authority and must remain attributable."
  - surface: rollback_or_restore_confirmation
    host_only_reason: "Rollback/restore changes durable local state and keeps checkpoint lineage."
  - surface: ai_apply_review
    host_only_reason: "AI apply review and evidence/rollback stay on protected product trust surfaces."
  - surface: high_risk_approval_sheet
    host_only_reason: "High-risk approvals remain bound to host-native review and ticket issuance."

worked_examples:
  - fixture: fixtures/ux/embedded_boundary_cases/docs_help_embedded_build_match.json
    summary: "Fresh embedded docs/help pane quoting ADR-0013 source/version/freshness truth."
  - fixture: fixtures/ux/embedded_boundary_cases/marketplace_account_stale_scope.json
    summary: "Marketplace/account page with provider scope/actor chrome and a stale snapshot downgrade."
  - fixture: fixtures/ux/embedded_boundary_cases/service_dashboard_certificate_failed.json
    summary: "Certificate-failed service dashboard that withholds the body and keeps only host-native recovery paths."
  - fixture: fixtures/ux/embedded_boundary_cases/auth_confirmation_device_code_fallback.json
    summary: "Auth handoff card showing system-browser-first with explicit device-code fallback."
  - fixture: fixtures/ux/embedded_boundary_cases/legacy_embedded_password_exception.json
    summary: "Explicit lower-trust exception-register row for a legacy embedded password flow."
  - fixture: fixtures/ux/embedded_boundary_cases/native_impersonation_denied_event.json
    summary: "Audit event proving an embedded page was denied when it attempted to request a native-reserved surface."
