  - contextual_banner
  - status_item
  - durable_job_row
  - attention_item
  - activity_center_digest_card
  - digest_group_row
  - os_notification
  - os_badge_app_icon
  - lock_screen_summary
  - companion_push
  - not_delivered_held

escalation_tiers:
  - tier.inline_in_target_surface
  - tier.contextual_inline_overlay
  - tier.panel_attached_to_surface
  - tier.sheet_attached_to_window
  - tier.dialog_modal
  - tier.full_surface_takeover

quiet_hours_modes:
  - mode_none
  - mode_quiet_hours_user
  - mode_do_not_disturb_user
  - mode_focus_mode_user
  - mode_presentation
  - mode_screen_share
  - mode_privacy_mode
  - mode_reduced_attention_policy
  - mode_power_saver_runtime
