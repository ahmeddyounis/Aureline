# Interruptibility arbitration / escalation-surface matrix.
#
# Companion to docs/ux/interruptibility_arbitration_contract.md and to
# the upstream attention, notification, navigation, dialog / sheet, OS
# notification / quiet-hours, durable-work, and quiet-hours-override
# contracts. This file binds every (active_flow_class,
# interruptibility_tier, quiet_hours_mode) triple to one row that
# names: the allowed delivery_surface_class set, the allowed
# escalation_tier, the typed escalation_required_triggers, the
# arbitration_outcome_class, the focus_steal_attempt_class set the row
# denies, and the upstream denial_reason the row resolves to when the
# arbitration refuses.
#
# Rules (frozen):
#   - This file does not mint new interruptibility tiers, quiet-hours
#     modes, delivery-surface classes, attention classes, escalation
#     triggers, escalation tiers, dedupe schemes, reopen-target kinds,
#     dismissal verbs, suppression reasons, privacy payload classes,
#     or denial reasons. Every value is re-exported from upstream.
#   - The three matrix-local closed vocabularies are
#     active_flow_class, arbitration_outcome_class, and
#     focus_steal_attempt_class. New values are additive-minor and
#     require a decision row; repurposing a value is breaking.
#   - Every row asserts preserves_durable_history = true and
#     preserves_critical_safety_tier = true. A row that discards
#     either is non-conforming.
#   - Surfaces quote rows by arbitration_row_id; they MUST NOT re-mint
#     per-flow surface sets locally.

schema_version: 1
matrix_id: aureline.ux.escalation_matrix.v1
status: seeded

source_doc_refs:
  interruptibility_arbitration_contract: docs/ux/interruptibility_arbitration_contract.md
  attention_activity_taxonomy: docs/ux/attention_activity_taxonomy.md
  shell_interaction_safety_contract: docs/ux/shell_interaction_safety_contract.md
  dialog_sheet_contract: docs/ux/dialog_sheet_contract.md
  navigation_and_escalation_contract: docs/ux/navigation_and_escalation_contract.md
  notification_contract: docs/ux/notification_contract.md
  notification_delivery_contract: docs/ux/notification_delivery_contract.md
  os_notification_and_quiet_hours_contract: docs/ux/os_notification_and_quiet_hours_contract.md
  voice_and_dictation_contract: docs/ux/voice_and_dictation_contract.md
  durable_work_contract: docs/ux/durable_work_contract.md
  exact_reopen_drill_map: docs/ux/exact_reopen_drill_map.md
  quiet_hours_policy_matrix: artifacts/ux/quiet_hours_policy_matrix.yaml
  quiet_hours_override_matrix: artifacts/ux/quiet_hours_override_matrix.yaml
  interruptibility_escalation_seed: artifacts/ux/interruptibility_escalation_seed.yaml
  navigation_hierarchy: artifacts/ux/navigation_hierarchy.yaml

companion_artifact_refs:
  activity_event_envelope_schema: schemas/ux/activity_event_envelope.schema.json
  notification_event_schema: schemas/ux/notification_event.schema.json
  notification_suppression_record_schema: schemas/ux/notification_suppression_record.schema.json
  event_lineage_schema: schemas/ux/event_lineage.schema.json
  interaction_safety_schema: schemas/ux/interaction_safety.schema.json
  job_row_schema: schemas/ux/job_row.schema.json
  interruptibility_cases: fixtures/ux/interruptibility_cases/

# ---------------------------------------------------------------------------
# Frozen vocabularies mirrored from upstream. Tooling reads these blocks;
# rows MUST NOT use values outside the enumerations below.
# ---------------------------------------------------------------------------

interruptibility_tiers:
  - tier_ambient
  - tier_transient
  - tier_durable
  - tier_actionable
  - tier_blocking_trust
  - tier_critical_safety

delivery_surface_classes:
