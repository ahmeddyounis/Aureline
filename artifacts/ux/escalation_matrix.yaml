    arbitration_row_id: ux:arbitration:review_canvas_active
    active_flow_class: review_canvas_active
    binds_upstream_protected_paths:
      - patch_approval
      - ai_apply
    binds_upstream_quiet_hours_modes: []
    allowed_interruptibility_tiers:
      - tier_ambient
      - tier_blocking_trust
      - tier_critical_safety
    forbidden_interruptibility_tiers:
