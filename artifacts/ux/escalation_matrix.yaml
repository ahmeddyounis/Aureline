# ---------------------------------------------------------------------------
# Active-flow rows. One row per active_flow_class. Each row binds the
# upstream protected_path / quiet_hours_mode it composes with, the
# allowed-tier set, the allowed-surface set, the forbidden-tier set
# (which deny with focus_steal_on_protected_path), and the
# focus_steal_attempt_class set the row denies.
# ---------------------------------------------------------------------------

active_flow_rows:

  - record_kind: active_flow_row_record
    arbitration_row_id: ux:arbitration:editor_typing_active
    active_flow_class: editor_typing_active
    binds_upstream_protected_paths: []
    binds_upstream_quiet_hours_modes: []
    allowed_interruptibility_tiers:
      - tier_ambient
      - tier_blocking_trust
      - tier_critical_safety
    forbidden_interruptibility_tiers:
      - tier_transient
      - tier_durable
      - tier_actionable
    allowed_delivery_surfaces:
      - status_item
      - os_badge_app_icon
      - durable_job_row
      - attention_item
      - contextual_banner
      - not_delivered_held
    forbidden_delivery_surfaces:
      - toast
      - lock_screen_summary
    allowed_escalation_tiers:
      - tier.inline_in_target_surface
      - tier.contextual_inline_overlay
      - tier.panel_attached_to_surface
      - tier.sheet_attached_to_window
      - tier.full_surface_takeover
    forbidden_escalation_tiers:
      - tier.dialog_modal
    denies_focus_steal_attempts:
      - product_owned_modal_attempted_during_typing
      - product_owned_banner_replaced_typing_focus
      - activity_item_burst_attempted_during_typing
      - update_install_modal_attempted_during_typing
    denial_reason_when_violated: focus_steal_on_protected_path
    notes_label: >
      Keystrokes are reaching a buffer. Transient toasts hold and
      release as a digest when typing pauses; durable rows update
      silently. Modal dialogs are forbidden during typing; trust /
      auth / update / repair escalations route via the review sheet.

