# ---------------------------------------------------------------------------
# Per-tier escalation rows. One row per (interruptibility_tier,
# representative active_flow_class) combination demonstrating the
# arbitration_outcome_class produced and the escalation_required_triggers
# that justify advancing past tier.contextual_inline_overlay.
# ---------------------------------------------------------------------------

tier_escalation_rows:

  - record_kind: tier_escalation_row_record
    escalation_row_id: ux:escalation:tier_ambient:default
    interruptibility_tier: tier_ambient
    representative_active_flow_class: any
    default_escalation_tier: tier.inline_in_target_surface
    default_arbitration_outcome_class: delivered_status_item
    requires_escalation_trigger_to_advance: false
    forbidden_escalation_tiers:
      - tier.dialog_modal
      - tier.full_surface_takeover
    notes_label: >
      Passive ambient state. status_item / os_badge_app_icon only.

  - record_kind: tier_escalation_row_record
    escalation_row_id: ux:escalation:tier_transient:none
    interruptibility_tier: tier_transient
    representative_active_flow_class: none
    default_escalation_tier: tier.contextual_inline_overlay
    default_arbitration_outcome_class: delivered_inline_in_target_surface
    requires_escalation_trigger_to_advance: true
    required_escalation_triggers_to_advance:
      - severity_increased
      - duration_threshold_crossed
      - repeated_dedupe_threshold_crossed
    forbidden_escalation_tiers:
      - tier.dialog_modal
      - tier.full_surface_takeover
    notes_label: >
      Toast or inline acknowledgement. Escalation to durable / actionable
      requires a typed trigger.

  - record_kind: tier_escalation_row_record
    escalation_row_id: ux:escalation:tier_transient:protected_flow_held
    interruptibility_tier: tier_transient
    representative_active_flow_class: editor_typing_active
    default_escalation_tier: tier.inline_in_target_surface
    default_arbitration_outcome_class: held_not_delivered_release_pending
    requires_escalation_trigger_to_advance: true
    required_escalation_triggers_to_advance:
      - severity_increased
      - required_authority_changed
      - trust_state_changed
    forbidden_escalation_tiers:
      - tier.dialog_modal
      - tier.full_surface_takeover
    notes_label: >
      Transient deliveries hold under any protected flow and release
      as a digest when the flow ends.

  - record_kind: tier_escalation_row_record
    escalation_row_id: ux:escalation:tier_durable:default
    interruptibility_tier: tier_durable
    representative_active_flow_class: any
    default_escalation_tier: tier.panel_attached_to_surface
    default_arbitration_outcome_class: delivered_durable_job_row
    requires_escalation_trigger_to_advance: true
    required_escalation_triggers_to_advance:
      - severity_increased
      - duration_threshold_crossed
      - required_authority_changed
      - consequence_class_escalated
      - basis_snapshot_drifted
      - provider_grant_narrowed
    forbidden_escalation_tiers:
      - tier.dialog_modal
    notes_label: >
      Long-running work lives on a durable row. Toast may mirror but
      MUST NOT replace the durable row.

  - record_kind: tier_escalation_row_record
    escalation_row_id: ux:escalation:tier_actionable:default
    interruptibility_tier: tier_actionable
    representative_active_flow_class: none
    default_escalation_tier: tier.panel_attached_to_surface
    default_arbitration_outcome_class: delivered_attention_item
    requires_escalation_trigger_to_advance: true
    required_escalation_triggers_to_advance:
      - severity_increased
      - duration_threshold_crossed
      - required_authority_changed
      - consequence_class_escalated
      - policy_epoch_changed
      - trust_state_changed
      - provider_grant_narrowed
      - recovery_class_downgraded_to_no_recovery
    forbidden_escalation_tiers:
      - tier.dialog_modal
    notes_label: >
      Item that needs a named human action. Attention-item with
      next_action_label; advances to review sheet on typed trigger.

  - record_kind: tier_escalation_row_record
    escalation_row_id: ux:escalation:tier_blocking_trust:default
    interruptibility_tier: tier_blocking_trust
    representative_active_flow_class: any
    default_escalation_tier: tier.sheet_attached_to_window
    default_arbitration_outcome_class: routed_via_review_sheet
    requires_escalation_trigger_to_advance: true
    required_escalation_triggers_to_advance:
      - severity_increased
      - consequence_class_escalated
      - policy_epoch_changed
      - trust_state_changed
      - recovery_class_downgraded_to_no_recovery
    forbidden_escalation_tiers:
      - tier.dialog_modal
    notes_label: >
      Trust / policy / authority decision routes through the
      interaction-safety review sheet. A product-owned generic
      modal denies with focus_steal_on_protected_path.

  - record_kind: tier_escalation_row_record
    escalation_row_id: ux:escalation:tier_critical_safety:default
    interruptibility_tier: tier_critical_safety
    representative_active_flow_class: any
    default_escalation_tier: tier.sheet_attached_to_window
    default_arbitration_outcome_class: routed_via_review_sheet
    requires_escalation_trigger_to_advance: false
    required_escalation_triggers_to_advance: []
    forbidden_escalation_tiers: []
    notes_label: >
      tier_critical_safety always renders. The arbitration outcome
      is routed_via_review_sheet (default), delivered_contextual_banner
      (when the review sheet is open on target), delivered_attention_item
      (when away from target), or delivered_os_notification_lock_screen_safe
      / delivered_companion_push_lock_screen_safe (when away from
      product). A generic product-owned modal with no review-sheet
      origin denies with focus_steal_on_protected_path.

# ---------------------------------------------------------------------------
# Reopen-and-revalidation rows. One row per reopen path the matrix
# admits. Rows binding the reopen_target_kind, the active_flow_class
# under which reopen lands, and the revalidation posture.
# ---------------------------------------------------------------------------

reopen_rows:

  - record_kind: reopen_row_record
    reopen_row_id: ux:reopen:durable_job_row_exact
    reopen_target_kind: durable_job_row_exact
    requires_revalidation: false
    delivered_via:
      - durable_job_row
      - status_item
      - os_badge_app_icon
      - toast
    forbidden_when:
      - active_flow_class: trust_review_active
        denial_reason: focus_steal_on_protected_path
    notes_label: >
      Toast / badge / status-item invocations reopen to the durable
      job row exactly; reopening to a generic home screen denies
      with reopen_to_generic_home_forbidden.

  - record_kind: reopen_row_record
    reopen_row_id: ux:reopen:attention_item_exact
    reopen_target_kind: attention_item_exact
    requires_revalidation: false
    delivered_via:
      - attention_item
      - os_notification
      - companion_push
    forbidden_when:
      - active_flow_class: review_canvas_active
        denial_reason: focus_steal_on_protected_path
    notes_label: >
      OS notification / companion push reopens to the canonical
      attention item; cross-client divergence denies with
      companion_cross_client_divergence.

  - record_kind: reopen_row_record
    reopen_row_id: ux:reopen:review_sheet
    reopen_target_kind: review_sheet
    requires_revalidation: false
    delivered_via:
      - contextual_banner
      - attention_item
      - os_notification
    forbidden_when: []
    notes_label: >
      Trust / blocking-trust / critical-safety deliveries reopen to
      the interaction-safety review sheet on the canonical target.

  - record_kind: reopen_row_record
    reopen_row_id: ux:reopen:reopen_denied_requires_revalidation
    reopen_target_kind: reopen_denied_requires_revalidation
    requires_revalidation: true
    delivered_via:
      - durable_job_row
      - attention_item
      - contextual_banner
      - os_notification
      - companion_push
    forbidden_when: []
    notes_label: >
      Wake from sleep, display reconnect, policy-epoch change,
      provider grant narrowed. Reopen denies rather than silently
      replaying a mutating action; the durable row exposes the
      revalidation route.

  - record_kind: reopen_row_record
    reopen_row_id: ux:reopen:placeholder_announced
    reopen_target_kind: placeholder_announced
    requires_revalidation: false
    delivered_via:
      - durable_job_row
      - attention_item
      - contextual_banner
    forbidden_when: []
    notes_label: >
      Target missing / moved / policy-blocked / extension
      unavailable / display topology lost. The surface renders a
      placeholder whose announcement explains why reopen could not
      return to the exact target.

# ---------------------------------------------------------------------------
# Invariants reviewed by later conformance gates.
# ---------------------------------------------------------------------------

invariants:

  - id: protected_path_focus_steal_denied
    description: >
      A delivery whose interruptibility_tier is on the
      forbidden_interruptibility_tiers list for the current
      active_flow_class denies with focus_steal_on_protected_path
      and routes to the activity center rather than interrupting.
    failure_event: activity_event_denial_emitted
    failure_denial_reason: focus_steal_on_protected_path

  - id: escalation_requires_typed_trigger
    description: >
      Advancing past tier.contextual_inline_overlay requires naming
      one escalation_required_triggers value on the lineage.
      Decorative escalation denies with
      interruption_tier_escalated_without_trigger.
    failure_event: activity_event_denial_emitted
    failure_denial_reason: interruption_tier_escalated_without_trigger

  - id: product_owned_nested_overlay_forbidden
    description: >
      A product-owned modal MUST NOT stack on a product-owned sheet,
      modal, or full-surface takeover. Stacking denies with
      product_owned_nested_overlay_forbidden; the platform-auth-
      dialog and platform-file-picker-dialog exception is the only
      allowed nested overlay.
    failure_event: activity_event_denial_emitted
    failure_denial_reason: focus_steal_on_protected_path

  - id: critical_safety_always_renders
    description: >
      tier_critical_safety renders regardless of quiet_hours_mode
      or active_flow_class. A row that suppresses
      tier_critical_safety denies with
      quiet_hours_hold_discarded_critical_safety_tier; an admin
      policy that silently blocks it denies with
      admin_suppression_blocked_critical_safety.
    failure_event: activity_event_denial_emitted
    failure_denial_reason: quiet_hours_hold_discarded_critical_safety_tier

  - id: durable_history_always_preserved
    description: >
      Every arbitration outcome (delivered, held, denied) emits an
      activity_event_envelope_record. A delivery that bypassed the
      audit trail denies with held_event_missing_audit_trail.
    failure_event: activity_event_denial_emitted
    failure_denial_reason: held_event_missing_audit_trail

  - id: reopen_lands_on_canonical_durable_identity
    description: >
      Invoking a notification / badge / toast / banner / OS
      notification / companion push reopens to the narrowest
      truthful destination named on the reopen_target_record.
      Reopening to a generic home screen denies with
      reopen_to_generic_home_forbidden.
    failure_event: activity_event_denial_emitted
    failure_denial_reason: reopen_to_generic_home_forbidden

  - id: reopen_revalidation_denies_silent_replay
    description: >
      When the originating target requires fresh user intent,
      reopen denies with reopen_denied_requires_revalidation rather
      than silently replaying a mutating action.
    failure_event: activity_event_denial_emitted
    failure_denial_reason: reopen_requires_revalidation

  - id: dismiss_authoritative_across_clients
    description: >
      An OS notification or companion push that replays the same
      canonical_event_id after the user dismissed it in-product
      denies with os_notification_replay_after_dismiss /
      companion_push_replay_after_dismiss; cross-client divergence
      denies with companion_cross_client_divergence.
    failure_event: activity_event_denial_emitted
    failure_denial_reason: companion_cross_client_divergence

  - id: voice_command_lands_on_keyboard_preview_lane
    description: >
      A voice-issued privileged action lands on the same preview /
      apply / revert posture a keyboard-issued action lands on.
      Inline apply outside the review-sheet preview lane denies
      with focus_steal_on_protected_path and routes back to the
      review sheet.
    failure_event: activity_event_denial_emitted
    failure_denial_reason: focus_steal_on_protected_path

  - id: durable_only_states_do_not_escalate_to_modal
    description: >
      Long-running work, held bursts, suppressed security notices,
      update download, extension repair, voice-mode mic state, and
      auth-callback pending stay on durable_job_row /
      attention_item / contextual_banner / status_item /
      digest_group_row. Escalation to dialog_modal /
      full_surface_takeover requires the upstream tier rules and
      the active_flow_row to both admit it.
    failure_event: activity_event_denial_emitted
    failure_denial_reason: toast_only_forbidden_for_durable_work

  - id: schema_version_alignment
    description: >
      All emitted interruptibility_arbitration_decision_record
      instances share schema_version with the registry; surfaces
      lagging behind a schema bump are denied.
    failure_event: activity_event_envelope_schema_version_bumped
    failure_denial_reason: activity_event_envelope_schema_version_lagging
