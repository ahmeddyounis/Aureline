      - tier_durable
      - tier_actionable
    allowed_delivery_surfaces:
      - status_item
      - os_badge_app_icon
      - durable_job_row
      - attention_item
      - activity_center_digest_card
      - contextual_banner
      - not_delivered_held
    forbidden_delivery_surfaces:
      - toast
      - lock_screen_summary
    allowed_escalation_tiers:
      - tier.inline_in_target_surface
      - tier.contextual_inline_overlay
      - tier.panel_attached_to_surface
      - tier.sheet_attached_to_window
      - tier.full_surface_takeover
    forbidden_escalation_tiers:
      - tier.dialog_modal
    denies_focus_steal_attempts:
      - product_owned_modal_attempted_during_review
      - product_owned_banner_replaced_review_focus
      - nested_product_overlay_stacked_on_sheet
    denial_reason_when_violated: focus_steal_on_protected_path
    notes_label: >
      Review / diff / approval canvas is on screen. The sheet may
      update in place or hand off to a dedicated review surface; a
      product-owned modal stacked on the sheet denies with
      product_owned_nested_overlay_forbidden.

  - record_kind: active_flow_row_record
