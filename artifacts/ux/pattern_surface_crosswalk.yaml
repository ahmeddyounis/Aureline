      - surface_id: surface.docs_help
        planned: false
        participation_role: [disclosure, recovery]
        obligation_class: may_narrow_with_disclosure
      - surface_id: surface.activity_banner
        planned: false
        participation_role: [disclosure]
        obligation_class: must_announce
      - surface_id: surface.command_palette
        planned: false
        participation_role: [entry]
        obligation_class: must_reuse
    governing_schema_refs:
