  - pattern_id: pattern.deferred_intent_reconciliation
    title: Deferred-intent and reconciliation
    spec_section_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22.10
    governing_contract_ref: docs/runtime/connectivity_and_reconciliation_contract.md
