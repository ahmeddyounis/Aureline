      Any action that survives a disconnect behaves like a reviewed
      intent; reconnect does not silently replay drifted intents.
    surface_refs:
      - surface_id: surface.deferred_intent_outbox
        planned: true
        participation_role: [entry, review, apply, recovery]
        obligation_class: must_reuse
      - surface_id: surface.activity_banner
