# Pattern-to-surface crosswalk.
#
# This file is the machine-readable mapping between the required shared
# UX patterns frozen in /docs/ux/pattern_inventory.md and the surfaces
# that must reuse them. It joins:
#
#   - the pattern inventory                          docs/ux/pattern_inventory.md
#   - the pattern contract template                  docs/ux/pattern_contract_template.md
#   - the launch-critical surface traceability       artifacts/ux/surface_traceability_matrix.yaml
#   - the design-complete review gate manifest       artifacts/ux/review_gate_manifest.yaml
#
# Rules:
#   - Surface ids in surface_refs that already exist in
#     surface_traceability_matrix.yaml MUST reuse the same id verbatim.
#   - Planned surfaces (planned: true) are forward refs to surfaces
#     named in spec but not yet rowed in surface_traceability_matrix.
#     Adding a planned surface here does not mint product truth; it
#     declares the pattern obligation that will apply when the
#     traceability row lands.
#   - A surface that wishes to opt out of a pattern MUST raise a
#     freeze exception or waiver against the corresponding row in
#     this file. Silent local exceptions are non-conforming.
#   - participation_role values: entry, review, apply, recovery,
#     disclosure, escalation, journal_citation. A surface may take
#     more than one role; each role is listed explicitly.
#   - obligation_class values: must_reuse, must_handoff,
#     may_narrow_with_disclosure, must_announce.
#   - waiver_state values: none, pending_review, granted, expired.

schema_version: 1
crosswalk_id: aureline.required_ux_pattern_crosswalk
status: seeded

overview_doc: docs/ux/pattern_inventory.md
contract_template_doc: docs/ux/pattern_contract_template.md

source_refs:
  pattern_inventory: docs/ux/pattern_inventory.md
  pattern_contract_template: docs/ux/pattern_contract_template.md
  surface_traceability_matrix: artifacts/ux/surface_traceability_matrix.yaml
  surface_traceability_overview: docs/ux/surface_traceability.md
  component_contract_template: docs/ux/component_contract_template.md
  review_gate_manifest: artifacts/ux/review_gate_manifest.yaml
  evidence_id_conventions: artifacts/governance/evidence_id_conventions.md
  ux_spec_required_pattern_inventory: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22

participation_role_vocabulary:
  - entry
  - review
  - apply
  - recovery
  - disclosure
  - escalation
  - journal_citation

obligation_class_vocabulary:
  - must_reuse
  - must_handoff
  - may_narrow_with_disclosure
  - must_announce

waiver_state_vocabulary:
  - none
  - pending_review
  - granted
  - expired

# Planned surfaces are forward refs to surfaces named in the UX spec
# (sections 18.6, 18.21, 18.32, 22.x, etc.) that do not yet have a row
# in surface_traceability_matrix.yaml. They are listed here so M1+
# implementation work cannot land a pattern obligation against an
# untracked surface; adding the row to the traceability matrix is a
# precondition for promoting `planned: true` to `planned: false`.
planned_surfaces:
  - surface_id: surface.project_doctor
    title: Project Doctor surface
    spec_anchor_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-18.6
    governing_doc_ref: docs/support/project_doctor_packet.md
  - surface_id: surface.refactor_preview_sheet
    title: Refactor preview and write-scope sheet
    spec_anchor_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22.4
    governing_doc_ref: docs/editor/refactor_and_replace_transaction_contract.md
  - surface_id: surface.exposed_route_banner
    title: Exposed-route active banner and revocation summary
    spec_anchor_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22.7
    governing_doc_ref: docs/governance/control_artifact_index.md
  - surface_id: surface.shared_session_authority
    title: Shared-session role, control, and consent surface
    spec_anchor_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22.8
    governing_doc_ref: docs/collaboration/session_authority_contract.md
  - surface_id: surface.mutation_journal
    title: Unified mutation-journal history surface
    spec_anchor_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22.9
    governing_doc_ref: docs/workspace/mutation_lineage_model.md
  - surface_id: surface.deferred_intent_outbox
    title: Deferred-intent outbox and reconciliation queue
    spec_anchor_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22.10
    governing_doc_ref: docs/runtime/connectivity_and_reconciliation_contract.md
  - surface_id: surface.persistence_inspector
    title: Remembered-state inspector and restore-provenance card
    spec_anchor_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22.11
    governing_doc_ref: docs/ux/persistence_inspector_contract.md
  - surface_id: surface.support_bundle_preview
    title: Support bundle preview and escalation packet sheet
    spec_anchor_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22.12
    governing_doc_ref: docs/support/support_bundle_preview_contract.md
  - surface_id: surface.outage_notice
    title: Control-plane / data-plane outage notice surface
    spec_anchor_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22.5
    governing_doc_ref: docs/ux/control_data_plane_status_contract.md

pattern_rows:
  - pattern_id: pattern.project_doctor
    title: Project Doctor
    spec_section_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22.3
    governing_contract_ref: docs/support/project_doctor_packet.md
    family_class: recovery
    stability_label: provisional
    summary: >-
      Read-only-by-default diagnosis of workspace, runtime, extension,
      and trust failures with stable finding codes, repair previews,
      and an equally prominent local-only path.
    surface_refs:
      - surface_id: surface.project_doctor
        planned: true
        participation_role: [entry, review, apply, recovery, disclosure]
        obligation_class: must_reuse
        notes: >-
          Primary host surface; declared planned until the traceability
          matrix row is added.
      - surface_id: surface.command_palette
        planned: false
        participation_role: [entry]
        obligation_class: must_reuse
        notes: >-
          `cmd:doctor.run` and recovery commands enter the pattern
          through the palette result-row contract.
      - surface_id: surface.activity_banner
        planned: false
        participation_role: [disclosure, escalation]
        obligation_class: must_announce
        notes: >-
          Durable job-row family carries `blocked`, `degraded`, and
          escalation tier classes named by the doctor pattern.
      - surface_id: surface.trust_permission_prompt
        planned: false
        participation_role: [recovery]
        obligation_class: may_narrow_with_disclosure
        notes: >-
          Trust-class findings escalate through the permission prompt;
          policy_blocked and restricted_path remain distinct.
      - surface_id: surface.support_report_handoff
        planned: false
        participation_role: [escalation]
        obligation_class: must_handoff
        notes: >-
          Findings and repair history flow into the support bundle
          preview without losing finding ids.
      - surface_id: surface.support_bundle_preview
        planned: true
        participation_role: [escalation]
        obligation_class: must_reuse
    governing_schema_refs:
      - schemas/support/doctor_finding.schema.json
      - schemas/support/doctor_explanation.schema.json
      - schemas/support/repair_transaction.schema.json
      - schemas/support/repair_outcome.schema.json
      - schemas/support/repair_preview.schema.json
    governing_artifact_refs:
      - artifacts/support/diagnosis_latency_scoreboard.yaml
      - artifacts/support/diagnosis_slo_targets.yaml
    governing_fixture_refs:
      - fixtures/support/project_doctor_cases/
      - fixtures/support/repair_cases/
      - fixtures/support/recovery_ladder_cases/
    requirement_refs:
      - REL-SUPPORT-001
      - REL-REPAIR-015
      - OPS-SUP-005
      - GOV-EVID-901
      - GOV-CORPUS-901
    accessibility_hooks:
      announcement_rule_refs:
        - finding_severity_announcement_polite
        - blocked_finding_announcement_assertive
      keyboard_path_refs:
        - corpus.accessibility.execution.task_run_review
      assistive_technology_refs:
        - shell_conformance.run_task_and_review_output
    forbidden_shortcuts:
      - run_mutating_repair_without_preview
      - collapse_repair_class_into_generic_fix
      - promote_upload_path_above_local_only
      - drop_evidence_ids_across_navigation
    waiver_state: none
    waiver_refs: []
    dependency_pattern_refs:
      - pattern.mutation_journal_compensation
      - pattern.support_intake_escalation

  - pattern_id: pattern.refactor_preview_write_scope
    title: Refactor preview and write scope
    spec_section_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22.4
    governing_contract_ref: docs/editor/refactor_and_replace_transaction_contract.md
    family_class: write_review
    stability_label: provisional
    summary: >-
      Reviews any broad write before commit with file-class disclosure,
      scope attribution, generated/protected/read-only counts, and an
      explicit reversal class.
    surface_refs:
      - surface_id: surface.refactor_preview_sheet
        planned: true
        participation_role: [review, apply, disclosure]
        obligation_class: must_reuse
      - surface_id: surface.command_palette
        planned: false
        participation_role: [entry]
        obligation_class: must_reuse
      - surface_id: surface.entry_open_import_restore
        planned: false
        participation_role: [entry, review, apply, recovery]
        obligation_class: must_reuse
        notes: >-
          Importer apply, restore-from-checkpoint, and roll-back-import
          inherit the write-scope review contract.
      - surface_id: surface.activity_banner
        planned: false
        participation_role: [disclosure, journal_citation]
        obligation_class: must_announce
      - surface_id: surface.mutation_journal
        planned: true
        participation_role: [journal_citation]
        obligation_class: must_reuse
    governing_schema_refs:
      - schemas/recovery/restore_preview.schema.json
      - schemas/ecosystem/package_restore_preview.schema.json
    governing_artifact_refs: []
    governing_fixture_refs:
      - fixtures/recovery/restore_preview_cases/
      - fixtures/settings/precedence_cases/
    requirement_refs:
      - TOOL-CTX-002
      - REL-MUT-014
      - REL-CORE-003
      - SEC-TRUST-001
    accessibility_hooks:
      announcement_rule_refs:
        - changed_file_class_announcement_polite
        - reversal_class_announcement_polite
      keyboard_path_refs:
        - corpus.accessibility.project_entry.open_import_restore
      assistive_technology_refs:
        - shell_conformance.open_repo_from_launcher
    forbidden_shortcuts:
      - hide_generated_or_protected_counts_inside_aggregate
      - collapse_actor_attribution_into_system
      - defer_scope_review_to_post_apply
      - rename_reversal_class_during_preview
    waiver_state: none
    waiver_refs: []
    dependency_pattern_refs:
      - pattern.mutation_journal_compensation
      - pattern.generated_artifact_drift_regenerate_first

  - pattern_id: pattern.optional_cloud_outage_local_first
    title: Optional-cloud outage and local-first continuity
    spec_section_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md#section-22.5
    governing_contract_ref: docs/ux/control_data_plane_status_contract.md
    family_class: continuity
    stability_label: seeded
    summary: >-
      Names the failing managed capability specifically, keeps the
      local-first core inspectable, and forbids implying that local
      history or active work is at risk because of a service-plane
      event.
    surface_refs:
      - surface_id: surface.outage_notice
        planned: true
        participation_role: [entry, disclosure, escalation]
        obligation_class: must_reuse
      - surface_id: surface.activity_banner
        planned: false
        participation_role: [disclosure, escalation]
        obligation_class: must_announce
      - surface_id: surface.docs_help
        planned: false
        participation_role: [recovery, disclosure]
        obligation_class: may_narrow_with_disclosure
        notes: >-
          Cached-snapshot freshness and policy-blocked routes inherit
          the outage-class vocabulary.
      - surface_id: surface.command_palette
        planned: false
        participation_role: [entry]
        obligation_class: must_reuse
        notes: >-
          Disabled-reason rows must cite the failing capability rather
          than collapsing into "service unavailable".
      - surface_id: surface.deferred_intent_outbox
        planned: true
        participation_role: [recovery]
        obligation_class: must_reuse
    governing_schema_refs:
      - schemas/ops/outage_notice.schema.json
      - schemas/runtime/connectivity_state.schema.json
      - schemas/ecosystem/offline_continuity_card.schema.json
      - schemas/work_items/offline_handoff_packet.schema.json
    governing_artifact_refs:
      - artifacts/ux/quiet_hours_policy_matrix.yaml
      - artifacts/ux/interruptibility_escalation_seed.yaml
    governing_fixture_refs:
      - fixtures/ops/outage_notices/
      - fixtures/runtime/connectivity_cases/
    requirement_refs:
      - OPS-CLOUD-002
      - REL-CORE-003
      - OPS-SUP-005
      - ARCH-UX-005
    accessibility_hooks:
      announcement_rule_refs:
        - failing_capability_announcement_polite
        - still_working_scope_announcement_polite
      keyboard_path_refs:
        - corpus.accessibility.execution.task_run_review
      assistive_technology_refs:
        - shell_conformance.run_task_and_review_output
    forbidden_shortcuts:
      - imply_total_loss_of_function
      - merge_control_plane_and_data_plane_scope
      - hide_local_history_during_service_event
      - rename_optional_cloud_outage_to_generic_error
    waiver_state: none
    waiver_refs: []
    dependency_pattern_refs:
