      - artifacts/artifacts/debug_fidelity_rows.yaml
      - artifacts/artifacts/merge_resolution_policy_rows.yaml
    governing_fixture_refs:
      - fixtures/artifacts/fidelity_examples/
      - fixtures/runtime/resource_drift_cases/
    requirement_refs:
      - REL-REPAIR-015
      - REL-MUT-014
      - TOOL-CTX-002
      - GOV-DATA-002
    accessibility_hooks:
      announcement_rule_refs:
        - drift_class_announcement_polite
        - generator_unavailable_announcement_assertive
      keyboard_path_refs:
        - corpus.accessibility.docs.docs_help_reading
      assistive_technology_refs:
        - shell_conformance.read_docs_surface
    forbidden_shortcuts:
      - default_to_raw_edit_when_canonical_source_is_authoritative
      - collapse_generator_unavailable_and_policy_blocked
      - hide_drift_state_behind_iconography_only
      - suppress_detach_action_for_text_like_artifact
