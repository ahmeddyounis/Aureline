# ---------------------------------------------------------------------------
# Invariants reviewed by later conformance gates.
# ---------------------------------------------------------------------------
invariants:

  - id: no_row_overclaims_readiness
    description: >
      Every startup_state_copy_review_row asserts
      overclaims_readiness = false. A row whose audited
      placeholder implies readiness while the underlying state
      is warming, partial, degraded, skipped, or failed is
      non-conforming and denies with
      startup_state_overclaims_readiness.
    failure_denial_reason: startup_state_overclaims_readiness

  - id: every_row_has_next_safe_action
    description: >
      Every row cites at least one value from
      next_step_decision_hook_vocabulary. Free-form action
      labels are non-conforming and deny with
      startup_state_next_safe_action_missing.
    failure_denial_reason: startup_state_next_safe_action_missing

  - id: every_row_has_blocked_capability
    description: >
      Every non-first_run row cites at least one value from
      blocked_capability_token_vocabulary naming what the
      placeholder blocks. Rows that imply full capability
      under a narrowed state deny with
      startup_state_blocked_capability_missing.
    failure_denial_reason: startup_state_blocked_capability_missing

  - id: every_row_links_recovery_and_support
    description: >
      Every row cites at least one recovery_ladder_rung_ref
      and at least one support_packet_family_ref so support /
      recovery / handoff surfaces resolve by id. Rows that
      omit either side deny with
      startup_state_recovery_or_support_ref_missing.
    failure_denial_reason: startup_state_recovery_or_support_ref_missing

  - id: every_row_pins_measurement_hook
    description: >
      Every row cites at least one journey_class and at least
      one protected_metric_ref and a concrete fixture_ref so
      the future telemetry / journey-trace lane fires without
      inventing names. Rows that omit the hook deny with
      startup_state_measurement_hook_missing.
    failure_denial_reason: startup_state_measurement_hook_missing

  - id: every_row_names_copy_owners
    description: >
      Every row names exactly one shell_owner, one docs_owner,
      and one implementation_owner so designers, docs, and
      implementation share audited state names. Rows missing
      any owner deny with
      startup_state_copy_owner_missing.
    failure_denial_reason: startup_state_copy_owner_missing

  - id: forbidden_labels_block_overclaim
    description: >
      Every row enumerates at least one forbidden_label
      pattern ("Workspace ready", "Session restored", "All
      extensions loaded", etc.) so reviewers can spot
      regressions against truth at copy-review time. Rows that
      omit forbidden labels deny with
      startup_state_forbidden_label_enumeration_missing.
    failure_denial_reason: startup_state_forbidden_label_enumeration_missing

  - id: schema_version_alignment
    description: >
      All emitted startup_state_copy_review_row instances share
      startup_state_copy_review_schema_version with the
      registry. Rows lagging behind a schema bump are denied
      with startup_state_copy_review_schema_version_lagging.
    failure_denial_reason: startup_state_copy_review_schema_version_lagging
