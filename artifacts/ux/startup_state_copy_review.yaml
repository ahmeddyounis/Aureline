# Startup-state copy review.
#
# Machine-readable copy-review matrix binding every audited
# placeholder startup state (per docs/ux/entry_restore_truth_
# audit.md §6) to its truthful cause, user impact, next-safe
# action hooks, blocked-capability tokens, recovery-ladder /
# support-packet linkage, and measurement hooks. Designers,
# docs writers, and implementation owners all read this file by
# id (startup_state_row_id); surfaces MUST NOT mint private
# state tokens or free-form placeholder labels.
#
# Companion to docs/ux/entry_restore_truth_audit.md and the
# fixture corpus under fixtures/ux/entry_restore_states/.
# Every row validates against the vocabularies re-exported
# from:
#   - schemas/workspace/entry_and_restore_result.schema.json
#     (entry_verb, target_kind, resulting_mode, admission_class,
#     restore_level, missing_target_state, session_execution_
#     posture, checkpoint_linked_recovery_class, next_step_
#     decision_hook, target_state, portability_class,
#     restore_availability, safe_recovery_action).
#   - docs/product/onboarding_measurement_plan.md (entry_route,
#     readiness_bucket, measurement_surface, failure_category).
#   - schemas/traces/journey_trace.schema.json (journey_class,
#     checkpoint_class, segment_class, degraded_posture_class,
#     fallback_posture_class).
#   - docs/support/recovery_ladder_packet.md (recovery_rung_ids).
#
# Rules (frozen):
#   1. Every row names at least one next_safe_action_hook from
#      the frozen next_step_decision_hook set. A row that offers
#      free-form action text is non-conforming.
#   2. Every row names at least one blocked_capability_token
#      from the closed set below; over-claiming a capability the
#      state does not support, or over-blocking a capability the
#      state still admits, is non-conforming.
#   3. Every row asserts overclaims_readiness = false. A row
#      whose audited placeholder implies "ready" while the
#      underlying state is warming / partial / degraded /
#      skipped / failed is non-conforming and denies with
#      startup_state_overclaims_readiness.
#   4. Every row cites at least one recovery_ladder_rung_ref
#      (or rung.none_required) and at least one support_packet_
#      family_ref so support / recovery / handoff surfaces
#      resolve by id, not by free-text guess.
#   5. Every row cites at least one journey_class and at least
#      one protected_metric_ref the future dogfood telemetry or
#      journey-trace lane will fire against, with a fixture_ref
#      pinning the seeded fixture.
#   6. Every row names the shell / docs / implementation
#      copy-responsibility owners so the three audiences share
#      the same audited state names; copy-only shadow
#      registries are non-conforming.
#   7. Adding a startup_state_row is additive-minor and lands
#      here, in the audit doc, and as a fixture in the same
#      change. Repurposing an existing row is breaking and
#      opens a new decision row.
#
# If this file and docs/ux/entry_restore_truth_audit.md disagree,
# the audit doc wins and this file updates in the same change.

startup_state_copy_review_schema_version: 1

sources:
  audit_doc_ref: docs/ux/entry_restore_truth_audit.md
  fixture_corpus_dir: fixtures/ux/entry_restore_states/
  entry_restore_object_model_ref: docs/workspace/entry_restore_object_model.md
  entry_restore_schema_ref: schemas/workspace/entry_and_restore_result.schema.json
  onboarding_measurement_plan_ref: docs/product/onboarding_measurement_plan.md
  journey_trace_schema_ref: schemas/traces/journey_trace.schema.json
  recovery_ladder_packet_ref: docs/support/recovery_ladder_packet.md
  protected_metrics_ref: artifacts/bench/protected_metrics.yaml
  attention_activity_taxonomy_ref: docs/ux/attention_activity_taxonomy.md
  shell_interaction_safety_contract_ref: docs/ux/shell_interaction_safety_contract.md

ui_ux_spec_refs:
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.10
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.1
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#9.4
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#9.11
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#19.4

# ---------------------------------------------------------------------------
# Frozen vocabularies re-exported for tooling discovery. Rows below MUST
# quote exactly one value (or the listed subset) from each vocabulary.
# ---------------------------------------------------------------------------

startup_state_token_vocabulary:
  - startup_state:first_run
  - startup_state:reopen_with_pending_restore
  - startup_state:restore_failed
  - startup_state:restore_skipped
  - startup_state:open_without_restore
  - startup_state:warming_startup
  - startup_state:partial_startup
  - startup_state:offline_startup
  - startup_state:unsupported_startup
  - startup_state:empty_state_or_placeholder_transition

user_impact_label_class_vocabulary:
