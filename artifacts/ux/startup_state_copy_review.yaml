  - managed_workspace_not_ready
  - provider_paths_offline
  - remote_target_unreachable
  - terminal_transcripts_not_rerun
  - debug_session_ended
  - prior_work_preserved_as_evidence_only
  - prior_work_requires_manual_recovery
  - placeholder_surface_no_capability
  - policy_restricted_mode
  - unsupported_platform_feature
  - schema_migration_required
  - migration_rollback_pending
  - start_from_snapshot_setup_pending

recovery_ladder_rung_ref_vocabulary:
  - rung.safe_mode
  - rung.extension_quarantine
  - rung.open_without_restore
  - rung.cache_index_repair
  - rung.restricted_mode_fallback
  - rung.none_required

support_packet_family_ref_vocabulary:
  - first_run_evidence
  - restore_prompt_evidence
  - crash_recovery_evidence
  - recovery_ladder_packet
  - object_issue_handoff
  - performance_evidence_packet
  - managed_workspace_evidence
  - auth_evidence_packet
  - policy_audit_evidence
  - empty_state_audit_evidence

# Next-step decision hooks quoted verbatim from the frozen
# next_step_decision_hook set in docs/workspace/entry_restore_
# object_model.md §1.7. Rows MUST NOT quote values outside this
# set.
next_step_decision_hook_vocabulary:
  - continue_in_restricted_mode
  - review_trust_and_open
  - open_minimal
  - set_up_later
  - review_archetype_match
  - compare_before_restore
  - open_without_restore
  - safe_mode
  - reconnect_required
  - reauth_required
  - locate_missing_target
  - remove_from_recents
  - review_migration_report
  - roll_back_import
  - keep_imported_state
  - adopt_recommended_bundle
  - review_unsupported_items

# Journey-trace journey_class values the audit rows cite. Re-exported
# from schemas/traces/journey_trace.schema.json.
journey_class_vocabulary:
  - startup_to_first_useful_chrome
  - startup_to_first_paint
  - shell_open
  - placeholder_open
  - placeholder_edit
  - placeholder_save
  - open_edit_save
  - restore_adjacent
  - recovery_journal_restore_flow
  - boundary_truth_contract_replay

# Entry routes re-exported from docs/product/onboarding_
# measurement_plan.md §4.
entry_route_id_vocabulary:
  - er.start_center
  - er.recent_work_reopen
  - er.restore_prompt
  - er.protocol_handler_reentry
  - er.clone_or_import
  - er.plain_open
  - er.workspace_switch
  - er.warm_start

# Copy-responsibility owners. A row names exactly one
# shell_owner, one docs_owner, and one implementation_owner so
# designers, docs, and implementation all read the same state
# names.
copy_responsibility_owner_vocabulary:
  - shell:product-writer
  - shell:ux-designer
  - docs:docs-writer
  - impl:aureline-shell
  - impl:aureline-buffer
  - impl:aureline-vfs
  - impl:aureline-recovery-journal
  - impl:aureline-support-export
  - impl:aureline-migration-center

# ---------------------------------------------------------------------------
# Copy-review rows. One row per startup_state_token.
# ---------------------------------------------------------------------------
copy_review_rows:

  - record_kind: startup_state_copy_review_row
    startup_state_copy_review_schema_version: 1
    startup_state_row_id: ux:startup-state:first_run
    startup_state_token: startup_state:first_run
    doc_section_ref: docs/ux/entry_restore_truth_audit.md#6.1
    fixture_ref: fixtures/ux/entry_restore_states/first_run.yaml
    truthful_cause_tokens:
      entry_verb_candidate: [open, clone, import, start_from_snapshot]
      target_kind_candidate: null
      admission_class: admitted
      authority_reevaluation_required: false
    user_impact_label_class: no_durable_work_yet
    next_safe_action_hooks:
      - review_archetype_match
      - set_up_later
      - open_minimal
    blocked_capability_tokens:
      - no_durable_edits_yet
    recovery_ladder_rung_refs:
      - rung.restricted_mode_fallback
    support_packet_family_refs:
      - first_run_evidence
    measurement_hooks:
      journey_classes:
        - startup_to_first_useful_chrome
        - startup_to_first_paint
      protected_metric_refs:
        - ff.warm_start_to_first_paint
        - ff.first_paint
      entry_route_id: er.start_center
      measurement_surface: surface_first_run
    copy_responsibility_owners:
      shell_owner: shell:product-writer
      docs_owner: docs:docs-writer
      implementation_owner: impl:aureline-shell
    required_labels:
      - label_class: start_center_entry_verbs_distinct
        notes: >
          Start Center MUST render Open / Clone / Import /
          Restore / Recent work distinctly. No Get-started
          collapse.
      - label_class: no_account_required_affordance
        notes: >
          The no-account local-first path is advertised with
          set_up_later / open_minimal hooks; declining opt-in
          never blocks reaching a useful local state.
    forbidden_labels:
      - "Workspace ready"
      - "All extensions loaded"
      - "Index complete"
      - "Get started"
    overclaims_readiness: false
    policy_context:
      policy_epoch: "pe:2026-04-23:01"
      trust_state: pending_evaluation
    minted_at: "2026-04-23T00:00:00Z"

  - record_kind: startup_state_copy_review_row
    startup_state_copy_review_schema_version: 1
    startup_state_row_id: ux:startup-state:reopen_with_pending_restore
    startup_state_token: startup_state:reopen_with_pending_restore
    doc_section_ref: docs/ux/entry_restore_truth_audit.md#6.2
    fixture_ref: fixtures/ux/entry_restore_states/reopen_with_pending_restore.yaml
    truthful_cause_tokens:
      entry_verb_candidate: [restore, open]
      restore_level_advertised: compatible_restore
      restore_level_committed_yet: false
      missing_target_states:
        - binary_or_extension_version_changed
        - missing_extension_host
      session_execution_postures:
        - transcript_restored_not_rerun
        - rerun_required
    user_impact_label_class: pending_user_review
    next_safe_action_hooks:
      - compare_before_restore
      - open_without_restore
      - safe_mode
    blocked_capability_tokens:
      - index_not_authoritative
      - terminal_transcripts_not_rerun
      - debug_session_ended
    recovery_ladder_rung_refs:
      - rung.open_without_restore
      - rung.safe_mode
    support_packet_family_refs:
      - restore_prompt_evidence
      - recovery_ladder_packet
    measurement_hooks:
      journey_classes:
        - restore_adjacent
      protected_metric_refs:
        - ff.warm_start_to_first_paint
      entry_route_id: er.restore_prompt
      measurement_surface: surface_restore_success
    copy_responsibility_owners:
      shell_owner: shell:product-writer
      docs_owner: docs:docs-writer
      implementation_owner: impl:aureline-shell
    required_labels:
      - label_class: restore_level_advertised_verbatim
        notes: >
          The advertised restore_level value renders verbatim
          in the prompt header; Compatible restore / Layout
          only / Recovered drafts / Evidence only are the
          frozen controlled terms.
      - label_class: session_execution_posture_per_pane
        notes: >
          Each restored pane names its posture
          (transcript_restored_not_rerun / rerun_required /
          session_ended / reconnect_available) so users see
          what did not rerun.
    forbidden_labels:
      - "Session restored"
      - "Welcome back — everything is ready"
      - "Exact restore complete"
    overclaims_readiness: false
    policy_context:
      policy_epoch: "pe:2026-04-23:01"
      trust_state: trusted
    minted_at: "2026-04-23T00:00:00Z"

  - record_kind: startup_state_copy_review_row
    startup_state_copy_review_schema_version: 1
    startup_state_row_id: ux:startup-state:restore_failed
    startup_state_token: startup_state:restore_failed
    doc_section_ref: docs/ux/entry_restore_truth_audit.md#6.3
    fixture_ref: fixtures/ux/entry_restore_states/restore_failed.yaml
    truthful_cause_tokens:
      entry_verb_candidate: [restore, open]
      restore_level_advertised: compatible_restore
      restore_level_delivered: no_restore
      missing_target_states:
        - corrupt_restorable_state
        - schema_migrated
      checkpoint_linked_recovery_classes:
        - restore_from_recovery_journal
        - manual_recovery_required
    user_impact_label_class: prior_work_not_recoverable_by_automation
    next_safe_action_hooks:
      - open_without_restore
      - safe_mode
      - locate_missing_target
      - compare_before_restore
    blocked_capability_tokens:
      - index_not_authoritative
      - prior_work_requires_manual_recovery
    recovery_ladder_rung_refs:
      - rung.open_without_restore
      - rung.cache_index_repair
      - rung.safe_mode
    support_packet_family_refs:
      - crash_recovery_evidence
      - recovery_ladder_packet
      - object_issue_handoff
    measurement_hooks:
      journey_classes:
        - restore_adjacent
      protected_metric_refs:
        - ff.warm_start_to_first_paint
      entry_route_id: er.restore_prompt
      measurement_surface: surface_restore_success
      degraded_posture_class: missing_target_recovered_to_layout_only
    copy_responsibility_owners:
      shell_owner: shell:product-writer
      docs_owner: docs:docs-writer
      implementation_owner: impl:aureline-recovery-journal
    required_labels:
      - label_class: delivered_less_than_advertised_disclosed
        notes: >
          The prompt MUST name the delivered restore level when
          it falls short of the advertised level; promising a
          higher level than delivered is non-conforming per
          entry-restore object model §7.4.
      - label_class: recovery_class_verb_verbatim
        notes: >
          Restore-from-recovery-journal renders as Restore
          (journal); manual_recovery_required renders as
          Manual recovery. Undo is forbidden on these classes.
    forbidden_labels:
      - "Session restored"
      - "Everything is back to where you left it"
      - "Automatic recovery complete"
    overclaims_readiness: false
    policy_context:
      policy_epoch: "pe:2026-04-23:01"
      trust_state: trusted
    minted_at: "2026-04-23T00:00:00Z"

  - record_kind: startup_state_copy_review_row
    startup_state_copy_review_schema_version: 1
    startup_state_row_id: ux:startup-state:restore_skipped
    startup_state_token: startup_state:restore_skipped
    doc_section_ref: docs/ux/entry_restore_truth_audit.md#6.4
    fixture_ref: fixtures/ux/entry_restore_states/restore_skipped.yaml
    truthful_cause_tokens:
      entry_verb_candidate: [open]
      missing_target_states:
        - policy_blocked_restore
      restore_level_delivered: no_restore
    user_impact_label_class: work_continues_with_narrowed_capability
    next_safe_action_hooks:
      - open_without_restore
      - review_trust_and_open
      - set_up_later
      - continue_in_restricted_mode
    blocked_capability_tokens:
      - prior_work_preserved_as_evidence_only
      - terminal_transcripts_not_rerun
      - debug_session_ended
    recovery_ladder_rung_refs:
      - rung.open_without_restore
      - rung.restricted_mode_fallback
    support_packet_family_refs:
      - restore_prompt_evidence
      - policy_audit_evidence
    measurement_hooks:
      journey_classes:
        - restore_adjacent
        - shell_open
      protected_metric_refs:
        - ff.warm_start_to_first_paint
      entry_route_id: er.plain_open
      measurement_surface: surface_restore_success
    copy_responsibility_owners:
      shell_owner: shell:product-writer
      docs_owner: docs:docs-writer
      implementation_owner: impl:aureline-support-export
    required_labels:
      - label_class: policy_source_named_when_policy_blocked_restore
        notes: >
          When policy blocks restore, the policy source label
          is visible (admin policy vs user preference) and the
          user can still continue with continue_in_restricted_
          mode / set_up_later.
      - label_class: recovery_journal_still_available
        notes: >
          The recovery journal remains available for compare /
          discard / open-journal review even when restore was
          skipped.
    forbidden_labels:
      - "Session restored"
      - "Last session loaded automatically"
    overclaims_readiness: false
    policy_context:
      policy_epoch: "pe:2026-04-23:01"
      trust_state: trusted
    minted_at: "2026-04-23T00:00:00Z"

  - record_kind: startup_state_copy_review_row
    startup_state_copy_review_schema_version: 1
    startup_state_row_id: ux:startup-state:open_without_restore
    startup_state_token: startup_state:open_without_restore
    doc_section_ref: docs/ux/entry_restore_truth_audit.md#6.5
    fixture_ref: fixtures/ux/entry_restore_states/open_without_restore.yaml
    truthful_cause_tokens:
      entry_verb_candidate: [open]
      next_step_decision_hook_fired: open_without_restore
      restore_level_delivered: no_restore
    user_impact_label_class: work_continues_with_narrowed_capability
    next_safe_action_hooks:
      - open_without_restore
      - compare_before_restore
    blocked_capability_tokens:
      - prior_work_preserved_as_evidence_only
      - index_not_authoritative
    recovery_ladder_rung_refs:
      - rung.open_without_restore
      - rung.cache_index_repair
    support_packet_family_refs:
      - restore_prompt_evidence
      - recovery_ladder_packet
    measurement_hooks:
      journey_classes:
        - restore_adjacent
        - startup_to_first_useful_chrome
      protected_metric_refs:
        - ff.warm_start_to_first_paint
        - ff.first_paint
      entry_route_id: er.restore_prompt
      measurement_surface: surface_restore_success
    copy_responsibility_owners:
      shell_owner: shell:product-writer
      docs_owner: docs:docs-writer
      implementation_owner: impl:aureline-support-export
    required_labels:
      - label_class: user_decision_named_verbatim_on_support_export
        notes: >
          The support export and evidence packet name the
          user's open_without_restore decision verbatim so the
          choice is auditable, not reconstructed.
      - label_class: prior_prompt_retained_by_reference
        notes: >
          The prior restore_prompt_record is retained by id;
          the decision is evidence, not a silent discard.
    forbidden_labels:
      - "Session restored"
      - "Recovered drafts applied"
      - "Last session loaded"
    overclaims_readiness: false
    policy_context:
      policy_epoch: "pe:2026-04-23:01"
      trust_state: trusted
    minted_at: "2026-04-23T00:00:00Z"

  - record_kind: startup_state_copy_review_row
    startup_state_copy_review_schema_version: 1
    startup_state_row_id: ux:startup-state:warming_startup
    startup_state_token: startup_state:warming_startup
    doc_section_ref: docs/ux/entry_restore_truth_audit.md#6.6
    fixture_ref: fixtures/ux/entry_restore_states/warming_startup.yaml
    truthful_cause_tokens:
      entry_verb_candidate: [open]
      first_useful_navigation_reached: true
      semantic_warmup_completed: false
      recent_work_target_state_candidate: stale_metadata
    user_impact_label_class: work_continues_with_narrowed_capability
    next_safe_action_hooks:
      - open_minimal
      - set_up_later
      - continue_in_restricted_mode
    blocked_capability_tokens:
      - index_not_authoritative
      - semantic_lookups_pending
      - extensions_not_yet_activated
    recovery_ladder_rung_refs:
      - rung.cache_index_repair
    support_packet_family_refs:
      - performance_evidence_packet
    measurement_hooks:
      journey_classes:
        - startup_to_first_useful_chrome
        - open_edit_save
      segment_classes:
        - first_useful_chrome
        - placeholder_open
        - placeholder_edit
        - placeholder_save
      protected_metric_refs:
        - ff.warm_start_to_first_paint
        - ff.first_paint
      entry_route_id: er.warm_start
      measurement_surface: surface_first_useful_edit
    copy_responsibility_owners:
      shell_owner: shell:ux-designer
      docs_owner: docs:docs-writer
      implementation_owner: impl:aureline-shell
    required_labels:
      - label_class: warming_posture_explicit
        notes: >
          The shell renders the warming posture explicitly
          (chip / status item). Editor interactivity, buffer
          editability, and save pipeline durability are
          preserved per onboarding plan §3.3.
      - label_class: index_not_authoritative_disclosed
        notes: >
          Search / semantic-lookup surfaces name the partial_
          index / stale_index truth per the search-readiness
          vocabulary; quick open does not silently imply full
          truth.
    forbidden_labels:
      - "Index complete"
      - "All extensions loaded"
      - "Workspace ready"
      - "Semantic search ready"
    overclaims_readiness: false
    policy_context:
      policy_epoch: "pe:2026-04-23:01"
      trust_state: trusted
    minted_at: "2026-04-23T00:00:00Z"

  - record_kind: startup_state_copy_review_row
    startup_state_copy_review_schema_version: 1
    startup_state_row_id: ux:startup-state:partial_startup
    startup_state_token: startup_state:partial_startup
    doc_section_ref: docs/ux/entry_restore_truth_audit.md#6.7
    fixture_ref: fixtures/ux/entry_restore_states/partial_startup.yaml
    truthful_cause_tokens:
      entry_verb_candidate: [resume, open]
      missing_target_states:
        - missing_extension_host
        - quarantined_extension
        - missing_managed_workspace
        - missing_devcontainer
      recent_work_target_state_candidate: mode_downgraded
    user_impact_label_class: work_continues_with_narrowed_capability
    next_safe_action_hooks:
      - safe_mode
      - continue_in_restricted_mode
      - locate_missing_target
      - open_minimal
    blocked_capability_tokens:
      - extension_host_offline
      - language_server_unattached
      - managed_workspace_not_ready
    recovery_ladder_rung_refs:
      - rung.extension_quarantine
      - rung.cache_index_repair
      - rung.restricted_mode_fallback
    support_packet_family_refs:
      - recovery_ladder_packet
      - object_issue_handoff
      - managed_workspace_evidence
    measurement_hooks:
      journey_classes:
        - shell_open
        - startup_to_first_useful_chrome
      protected_metric_refs:
        - ff.warm_start_to_first_paint
      entry_route_id: er.recent_work_reopen
      measurement_surface: surface_first_open
      degraded_posture_class: reduced_chrome_only
    copy_responsibility_owners:
      shell_owner: shell:product-writer
      docs_owner: docs:docs-writer
      implementation_owner: impl:aureline-shell
    required_labels:
      - label_class: missing_target_enumerated
        notes: >
          Every missing_target_state (missing_extension_host,
          quarantined_extension, missing_managed_workspace,
          missing_devcontainer) is named on its own row; a
          generic "Something failed" label is non-conforming.
      - label_class: durable_edits_preserved_disclosed
        notes: >
          Copy names that the editor, buffer, save pipeline,
          and recovery journal remain durable so the user
          keeps working locally.
    forbidden_labels:
      - "Workspace ready"
