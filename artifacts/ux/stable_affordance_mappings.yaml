# Stable affordance mapping seed catalog.
#
# Machine-readable companion to docs/ux/stable_affordance_mapping_contract.md.
# Each entry under rows conforms to schemas/ux/stable_affordance_row.schema.json
# as a stable_affordance_row_record.
#
# The goal of this catalog is to keep follow-up affordances grounded in
# stable ids (command ids, canonical verbs, schema refs, docs anchors,
# migration report ids, support packet ids) rather than surface-local prose.

schema_version: 1
contract_ref: docs/ux/stable_affordance_mapping_contract.md
row_schema_ref: schemas/ux/stable_affordance_row.schema.json

rows:
  - $schema: ../../schemas/ux/stable_affordance_row.schema.json
    record_kind: stable_affordance_row_record
    stable_affordance_schema_version: 1
    row_id: ux:stable_affordance:command_result:command:01
    surface_class: command_result
    subject_kind: command
    subject_ref: cmd:workspace.open_folder
    projection_surfaces:
      - desktop_ui
      - cli_headless
      - docs_help
      - support_export
    fallback_contract_ref: docs/ux/stable_affordance_mapping_contract.md#explicit-degradation-fallback-behavior
    affordances:
      copy_command_id:
        slot_class: copy_command_id
        availability_class: available
        fallback_behavior: show_disabled_with_reason_and_contract_link
        target_refs:
          - ref_kind: command_id
            ref_id: cmd:workspace.open_folder
        disabled_reason_summary: null
      copy_cli_equivalent:
        slot_class: copy_cli_equivalent
        availability_class: available
        fallback_behavior: show_disabled_with_reason_and_contract_link
        target_refs:
          - ref_kind: canonical_verb
            ref_id: workspace.open_folder
        disabled_reason_summary: null
      open_schema_docs:
        slot_class: open_schema_docs
        availability_class: available
        fallback_behavior: show_disabled_with_reason_and_contract_link
        target_refs:
          - ref_kind: docs_ref
            ref_id: docs/commands/invocation_result_and_parity_contract.md
          - ref_kind: schema_ref
            ref_id: schemas/commands/result_packet.schema.json
        disabled_reason_summary: null
      run_migration_check:
        slot_class: run_migration_check
        availability_class: disabled_not_applicable
        fallback_behavior: show_disabled_with_reason_and_contract_link
        target_refs:
          - ref_kind: contract_ref
            ref_id: docs/ux/stable_affordance_mapping_contract.md
        disabled_reason_summary: No migration check mapping is defined for this command result subject.
      open_support_packet:
        slot_class: open_support_packet
        availability_class: available
        fallback_behavior: show_disabled_with_reason_and_contract_link
        target_refs:
          - ref_kind: support_packet_ref
            ref_id: support_center_card:support_bundle
          - ref_kind: schema_ref
            ref_id: schemas/support/support_bundle.schema.json
        disabled_reason_summary: null
      copy_issue_or_advisory_ref:
        slot_class: copy_issue_or_advisory_ref
        availability_class: disabled_missing_mapping
        fallback_behavior: show_disabled_with_reason_and_contract_link
        target_refs:
          - ref_kind: contract_ref
            ref_id: docs/ux/stable_affordance_mapping_contract.md
        disabled_reason_summary: No stable issue or advisory ref is associated with this command result subject.
    redaction_class: metadata_safe_default
    notes: >
      Command-backed result cards can always expose canonical identity and the
      command's contract surfaces (result schema and docs) without embedding
      raw output or ephemeral UI ids.
    minted_at: "2026-05-06T00:00:00Z"

