# Launch-critical surface traceability matrix.
#
# This matrix joins the launch-critical shell surfaces to the canonical
# requirement ids, command ids, component contracts, token/state
# dependencies, accessibility packets, degraded states, recovery paths,
# and evidence packets that currently back them.
#
# Rules:
#   - This file reuses canonical ids from the requirement register,
#     command registry, component contracts, packet schemas, and packet
#     fixtures. It MUST NOT mint parallel product ids.
#   - coverage_status = canonical means the named artifact exists and is
#     directly attributable to the surface.
#   - coverage_status = provisional means the artifact exists, but the
#     proof is seeded, reserved, stitched, or broader than the exact
#     surface.
#   - coverage_status = missing means no dedicated canonical artifact is
#     checked in yet; review must treat the gap as real instead of
#     assuming coverage.

schema_version: 1
matrix_id: aureline.launch_critical_surface_traceability
status: seeded

overview_doc: docs/ux/surface_traceability.md

