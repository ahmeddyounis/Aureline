# ---------------------------------------------------------------------------
# Forbidden generic copy.
#
# A row that renders any of these as the entire visible label or
# explanation sentence is non-conforming. The schema rejects any of
# these tokens as the entire reviewable_sentence body.
# ---------------------------------------------------------------------------

forbidden_generic_copy:
  - Available
  - Unavailable
  - Supported
  - Coming soon
  - Sometimes
  - Maybe
  - In progress
  - Try again later
  - See docs
  - Generic error

# ---------------------------------------------------------------------------
# Explanation-rule summary.
#
# Re-stated here for tooling that wants to enforce the rules without
# parsing the doc. Authoritative narrative lives in
# docs/ux/feature_availability_contract.md.
# ---------------------------------------------------------------------------

explanation_rules:
  archetype_scoping_required: >
    Every availability row that names a language, framework, or tool
    MUST cite an archetype_row_ref or render the explicit
    archetype_not_applicable sentinel. A row that asserts a "supports
    Python" / "supports Rust" / "supports Bazel" claim with no row in
    artifacts/compat/reference_workspace_rows.yaml is non-conforming.
  toolchain_scoping_required: >
    Every claim row MUST cite a non-empty
    toolchain_or_runtime_dependency_refs list. A row that asserts a
    language claim with no toolchain dependency is non-conforming.
  environment_mode_set_non_empty: >
    Every claim row MUST cite a non-empty
    effective_environment_mode_set. The empty set is rendered as the
    explicit unsupported_in_every_observed_mode sentinel and forces
    availability_state to not_supported or
    not_certified_in_this_mode.
  support_class_evidence_required: >
    standard_support and extended_support badges MUST cite a non-null
    archetype_row_ref and a non-null support_window_ref. Lower
    classes (best_effort, community_supported) MAY omit the support
    window only when an explicit known-limit note carries the caveat.
  no_collapsed_chips: >
    A surface MUST NOT collapse two axes into one chip. A "stable"
    chip that asserts both lifecycle_state = stable and support_class
    = standard_support without naming both tokens is non-conforming.
  no_generic_copy: >
    The forbidden_generic_copy list above is rejected as the entire
    visible label or explanation sentence body.
