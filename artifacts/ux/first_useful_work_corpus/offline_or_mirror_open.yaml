# First-useful-work qualification corpus — offline / mirror open.
#
# Case category: offline_or_mirror_open. Startup on a device
# offline, or on the air-gapped / mirror-only profile, where the
# qualification floor is "local-core paths remain useful with no
# public internet, mirrors and offline bundles only".
#
# Vocab sources, rules, and the row shape are frozen in
# artifacts/ux/first_useful_work_corpus/README.md.

schema_version: 1
case_category: offline_or_mirror_open
case_category_description: >
  Startup with no reachable public network or on the air-gapped
  / mirror-only profile. The floor is "no row silently promotes
  unreachable into reachable; local-only rows stay fully useful;
  network-required entry is non-conforming". Air-gapped first
  run never presents a marketplace prompt.

sources:
  corpus_readme: artifacts/ux/first_useful_work_corpus/README.md
  scoreboard: artifacts/ux/no_account_switching_scoreboard.yaml
  rehearsal_packet: artifacts/ux/startup_route_rehearsal_packet.md
  task_success_corpus_seed: artifacts/product/task_success_corpus_seed.yaml
  deployment_profiles: artifacts/governance/deployment_profiles.yaml

rows:

  - row_id: fuw_row:offline_or_mirror_open.individual_local_offline_warm_start
    case_category: offline_or_mirror_open
    entry_verb: open
    target_kind: local_folder
    resulting_mode: folder
    entry_route_id: er.warm_start
    archetype_detection_outcome: certified_archetype_match
    deployment_profile_id: individual_local
    startup_state_token: startup_state:offline_startup
    boundary_manifest_row_id: editor_core
    first_useful_work_target_surface: tree_plus_readme_or_changed_files
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: exact
    safe_exit_actions:
      - continue_in_restricted_mode
      - set_up_later
    decline_path_class: continue_local_same_weight
    local_first_claim_class: local_first_floor
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 0
      recommended_soon_count: 1
      optional_later_count: 1
    readiness_bucket_task_rows:
      - task_id: detect_network_state
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: reads_network_reachability_only
        expected_outcome: detected_offline_no_remote_calls
      - task_id: docs_pack_freshness_disclosure
        bucket: optional_later
        execution_boundary: local_machine
        side_effect_class: reads_docs_pack_freshness_only
        expected_outcome: cached_label_advertised_if_present
    measurement_surface: surface_first_open
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - shell_open
      - startup_to_first_useful_chrome
    support_packet_family_refs:
      - first_run_evidence
    recovery_ladder_rung_refs:
      - rung.none_required
    supporting_corpus_scenario_refs: []
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/offline_warm_start_individual_local.yaml
      - fixtures/ux/entry_restore_states/offline_startup.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_no_account_by_route.warm_start_individual_local
      - scoreboard_row:no_account_local_work.local_git_available_offline
    evidence_consumer:
      - benchmark_family:bootstrap_entry_parity
    notes: >
      Local folder warm-start with no network. Qualifies that
      the device-local path keeps editor / save / search / local
      git fully useful, with optional docs-pack freshness label
      surfaced if a cached pack is present.

  - row_id: fuw_row:offline_or_mirror_open.air_gapped_first_run_no_marketplace
    case_category: offline_or_mirror_open
    entry_verb: open
    target_kind: local_folder
    resulting_mode: folder
    entry_route_id: er.start_center
    archetype_detection_outcome: archetype_detection_unavailable
    deployment_profile_id: air_gapped
    startup_state_token: startup_state:first_run
    boundary_manifest_row_id: extension_registry_mirror
    first_useful_work_target_surface: tree_plus_readme_or_changed_files
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: compatible
    safe_exit_actions:
      - set_up_later
      - open_minimal
      - review_unsupported_items
    decline_path_class: continue_local_same_weight
    local_first_claim_class: local_first_narrowed_advertised
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 1
      optional_later_count: 0
    readiness_bucket_task_rows:
      - task_id: mirror_freshness_disclosure
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_mirror_metadata_only
        expected_outcome: mirror_freshness_advertised_before_commit
      - task_id: extension_install_path_disclosure
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: reads_offline_bundle_metadata_only
        expected_outcome: cli_or_offline_bundle_install_advertised
    measurement_surface: surface_first_run
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - shell_open
      - startup_to_first_useful_chrome
    support_packet_family_refs:
      - first_run_evidence
    recovery_ladder_rung_refs:
      - rung.restricted_mode_fallback
    supporting_corpus_scenario_refs: []
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/air_gapped_first_run_no_marketplace.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_no_account_by_route.start_center_air_gapped
      - scoreboard_row:intentionally_narrowed_capability.air_gapped_first_run_no_marketplace_prompt
    evidence_consumer:
      - benchmark_family:bootstrap_entry_parity
      - support_bundle:managed_workspace_summary
    notes: >
      Air-gapped first run MUST NOT present a marketplace prompt;
      the row qualifies that narrowing to CLI / offline-bundle
      install is advertised before commit and the public-internet
      forbidden invariant holds.

  - row_id: fuw_row:offline_or_mirror_open.network_required_for_local_entry_negative
    case_category: offline_or_mirror_open
    entry_verb: open
    target_kind: local_folder
    resulting_mode: folder
    entry_route_id: er.start_center
    archetype_detection_outcome: archetype_detection_unavailable
    deployment_profile_id: individual_local
    startup_state_token: startup_state:offline_startup
    boundary_manifest_row_id: editor_core
    first_useful_work_target_surface: tree_plus_readme_or_changed_files
    restore_class: not_applicable
    expected_blocker_class: hidden_setup
    rehearsal_qualification_class: failed
    safe_exit_actions:
      - continue_in_restricted_mode
      - set_up_later
    decline_path_class: continue_local_same_weight
    local_first_claim_class: account_required_route
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 0
      optional_later_count: 0
    readiness_bucket_task_rows:
      - task_id: detect_hidden_network_dependency
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_startup_dependency_graph_only
        expected_outcome: hidden_network_required_for_local_entry_non_conforming
    measurement_surface: surface_first_run
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - shell_open
    support_packet_family_refs:
      - first_run_evidence
    recovery_ladder_rung_refs:
      - rung.restricted_mode_fallback
    supporting_corpus_scenario_refs: []
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/offline_network_required_for_local_entry_negative.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_account_required_exception.start_center_individual_local
    evidence_consumer:
      - support_bundle:first_run_summary
    notes: >
      Negative-test row. Qualifies that the rehearsal packet
      records `failed` when a local-folder Start Center entry
      requires public network reachability to admit. Hidden
      network dependency on `individual_local` is non-conforming
      and the row exists so reviewers see the failed shape.
