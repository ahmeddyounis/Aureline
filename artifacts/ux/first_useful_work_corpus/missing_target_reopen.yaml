# First-useful-work qualification corpus — missing-target reopen.
#
# Case category: missing_target_reopen. Recent-work reopen
# against a target whose folder, repo, or remote moved or
# became unreachable.
#
# Vocab sources, rules, and the row shape are frozen in
# artifacts/ux/first_useful_work_corpus/README.md.

schema_version: 1
case_category: missing_target_reopen
case_category_description: >
  Reopen of a recent-work row whose target is no longer
  reachable. The qualification floor is "the row advertises
  target_state != reachable, offers Locate / Remove from recents
  same-weight with Open anyway, and never silently promotes
  unreachable into reachable".

sources:
  corpus_readme: artifacts/ux/first_useful_work_corpus/README.md
  scoreboard: artifacts/ux/no_account_switching_scoreboard.yaml
  rehearsal_packet: artifacts/ux/startup_route_rehearsal_packet.md
  task_success_corpus_seed: artifacts/product/task_success_corpus_seed.yaml
  start_center_contract: docs/ux/start_center_contract.md

rows:

  - row_id: fuw_row:missing_target_reopen.local_repo_root_moved_on_disk
    case_category: missing_target_reopen
    entry_verb: open
    target_kind: local_repo_root
    resulting_mode: repo_root
    entry_route_id: er.recent_work_reopen
    archetype_detection_outcome: probable_archetype_partial
    deployment_profile_id: individual_local
    startup_state_token: startup_state:open_without_restore
    boundary_manifest_row_id: workspace_vfs
    first_useful_work_target_surface: locate_missing_target_prompt
    restore_class: evidence_only
    expected_blocker_class: missing_target
    rehearsal_qualification_class: partial
    safe_exit_actions:
      - locate_missing_target
      - remove_from_recents
      - open_without_restore
    decline_path_class: locate_or_remove_recents_same_weight
    local_first_claim_class: local_first_floor
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 2
      recommended_soon_count: 0
      optional_later_count: 1
    readiness_bucket_task_rows:
      - task_id: missing_target_classification
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_recent_work_row_only
        expected_outcome: missing_target_advertised_not_reachable
      - task_id: locate_missing_target
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_filesystem_identity_only
        expected_outcome: user_relocates_or_removes_recent
      - task_id: remove_from_recents
        bucket: optional_later
        execution_boundary: local_machine
        side_effect_class: writes_recent_work_registry_only
        expected_outcome: removed_if_chosen
    measurement_surface: surface_first_open
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - shell_open
    support_packet_family_refs:
      - first_run_evidence
    recovery_ladder_rung_refs:
      - rung.open_without_restore
    supporting_corpus_scenario_refs:
      - tsc.recent_work_reopen_missing_target_locate
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/missing_target_local_repo_moved.yaml
      - fixtures/ux/entry_restore_states/offline_startup.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_no_account_by_route.recent_work_reopen_individual_local
      - scoreboard_row:intentionally_narrowed_capability.recent_row_missing_target_advertised
    evidence_consumer:
      - support_bundle:recent_work_summary
    notes: >
      Local repo root moved or was renamed; the recent-work row
      classifies missing_target before the user clicks. Partial
      class because reaching first-useful-work requires the user
      to invoke Locate or Remove from recents (the row's
      blocking_now task `locate_missing_target`).

  - row_id: fuw_row:missing_target_reopen.remote_repo_unreachable_offline
    case_category: missing_target_reopen
    entry_verb: open
    target_kind: remote_repository
    resulting_mode: clone_then_review
    entry_route_id: er.recent_work_reopen
    archetype_detection_outcome: archetype_detection_unavailable
    deployment_profile_id: individual_local
    startup_state_token: startup_state:offline_startup
    boundary_manifest_row_id: workspace_vfs
    first_useful_work_target_surface: locate_missing_target_prompt
    restore_class: evidence_only
    expected_blocker_class: missing_target
    rehearsal_qualification_class: partial
    safe_exit_actions:
      - reconnect_required
      - remove_from_recents
      - continue_in_restricted_mode
    decline_path_class: locate_or_remove_recents_same_weight
    local_first_claim_class: local_first_narrowed_advertised
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 2
      recommended_soon_count: 0
      optional_later_count: 1
    readiness_bucket_task_rows:
      - task_id: missing_target_classification
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_recent_work_row_only
        expected_outcome: remote_unreachable_advertised
      - task_id: continue_in_restricted_mode
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: local_only_after_decline
        expected_outcome: local_flow_continued_after_decline
      - task_id: remove_from_recents
        bucket: optional_later
        execution_boundary: local_machine
        side_effect_class: writes_recent_work_registry_only
        expected_outcome: removed_if_chosen
    measurement_surface: surface_first_open
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - shell_open
    support_packet_family_refs:
      - first_run_evidence
      - auth_evidence_packet
    recovery_ladder_rung_refs:
      - rung.restricted_mode_fallback
      - rung.open_without_restore
    supporting_corpus_scenario_refs:
      - tsc.recent_work_reopen_missing_target_locate
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/missing_target_remote_repo_offline.yaml
      - fixtures/ux/entry_restore_states/offline_startup.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_no_account_by_route.recent_work_reopen_individual_local
      - scoreboard_row:intentionally_narrowed_capability.recent_row_missing_target_advertised
    evidence_consumer:
      - support_bundle:recent_work_summary
    notes: >
      Remote repository recent row is offline / unreachable. The
      row qualifies that the recent-work row advertises
      remote_unreachable, that local-only sibling rows remain
      reachable, and that Continue in restricted mode keeps the
      shell useful.
