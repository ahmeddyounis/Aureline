# First-useful-work qualification corpus — import.
#
# Case category: import. Competitor-config / portable-state /
# handoff-packet import through the migration center with
# dry-run, per-item attribution, and a rollback checkpoint.
#
# Vocab sources, rules, and the row shape are frozen in
# artifacts/ux/first_useful_work_corpus/README.md.

schema_version: 1
case_category: import
case_category_description: >
  Import of a competitor configuration, portable-state package,
  or handoff packet. The qualification floor is "user sees a
  per-item outcome before commit, is offered at least one
  migration next-step hook, and can roll back". Free-form
  blocked-reasons are non-conforming.

sources:
  corpus_readme: artifacts/ux/first_useful_work_corpus/README.md
  scoreboard: artifacts/ux/no_account_switching_scoreboard.yaml
  rehearsal_packet: artifacts/ux/startup_route_rehearsal_packet.md
  task_success_corpus_seed: artifacts/product/task_success_corpus_seed.yaml
  import_handoff_review_contract: docs/ux/import_handoff_review_contract.md

rows:

  - row_id: fuw_row:import.vs_code_settings_dry_run_then_apply
    case_category: import
    entry_verb: import
    target_kind: competitor_config_root
    resulting_mode: apply_to_active_workspace
    entry_route_id: er.clone_or_import
    archetype_detection_outcome: supported_archetype_match
    deployment_profile_id: individual_local
    startup_state_token: startup_state:open_without_restore
    boundary_manifest_row_id: configuration_profiles
    first_useful_work_target_surface: migration_center_before_commit
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: compatible
    safe_exit_actions:
      - review_unsupported_items
      - keep_imported_state
      - roll_back_import
      - adopt_recommended_bundle
    decline_path_class: roll_back_import_available
    local_first_claim_class: local_first_with_optional_decline
    declined_opt_ins:
      - managed_sync_profile
    readiness_bucket_summary:
      blocking_now_count: 2
      recommended_soon_count: 1
      optional_later_count: 1
    readiness_bucket_task_rows:
      - task_id: dry_run_diff_review
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_competitor_config_root_only
        expected_outcome: per_item_outcome_rendered_before_commit
      - task_id: rollback_checkpoint_write
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: writes_labelled_staging_only
        expected_outcome: pre_apply_checkpoint_retained
      - task_id: review_unsupported_items
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: reads_equivalence_map_only
        expected_outcome: review_completed_or_deferred
      - task_id: adopt_recommended_bundle
        bucket: optional_later
        execution_boundary: local_machine
        side_effect_class: writes_bundle_adoption_ref_only
        expected_outcome: deferred_to_set_up_later
    measurement_surface: surface_migration_review
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - startup_to_first_useful_chrome
      - shell_open
    support_packet_family_refs:
      - first_run_evidence
      - object_issue_handoff
    recovery_ladder_rung_refs:
      - rung.none_required
    supporting_corpus_scenario_refs:
      - tsc.import_vs_code_settings_dry_run_then_apply
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/import_vs_code_settings_dry_run.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_no_account_by_route.clone_or_import_individual_local
      - scoreboard_row:no_account_local_work.migration_without_opt_in
      - scoreboard_row:intentionally_narrowed_capability.migration_blocked_item_advertises_reason
    evidence_consumer:
      - benchmark_family:migration_keymap_settings_theme_profile
      - ux_evidence:migration_dry_run_diff_packet
    notes: >
      Import qualifies the migration-center before-commit floor:
      per-item outcomes render with typed (closed-set) reasons,
      a rollback checkpoint is written, and managed-sync opt-in
      can be declined without losing the import path.

  - row_id: fuw_row:import.handoff_packet_inspect_only_no_apply
    case_category: import
    entry_verb: import
    target_kind: handoff_packet_archive
    resulting_mode: inspect_only
    entry_route_id: er.clone_or_import
    archetype_detection_outcome: archetype_detection_unavailable
    deployment_profile_id: individual_local
    startup_state_token: startup_state:open_without_restore
    boundary_manifest_row_id: local_support_bundle
    first_useful_work_target_surface: migration_center_before_commit
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: exact
    safe_exit_actions:
      - review_unsupported_items
      - set_up_later
      - roll_back_import
    decline_path_class: roll_back_import_available
    local_first_claim_class: local_first_floor
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 2
      recommended_soon_count: 0
      optional_later_count: 0
    readiness_bucket_task_rows:
      - task_id: artifact_class_disclosure
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_handoff_packet_only
        expected_outcome: artifact_class_advertised_before_commit
      - task_id: extraction_target_disclosure
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: writes_labelled_staging_only
        expected_outcome: temporary_extraction_advertised_no_durable_write
    measurement_surface: surface_migration_review
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - startup_to_first_useful_chrome
      - shell_open
    support_packet_family_refs:
      - first_run_evidence
      - object_issue_handoff
    recovery_ladder_rung_refs:
      - rung.none_required
    supporting_corpus_scenario_refs: []
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/import_handoff_packet_inspect_only.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_no_account_by_route.clone_or_import_individual_local
    evidence_consumer:
      - benchmark_family:migration_keymap_settings_theme_profile
      - support_bundle:object_issue_handoff
    notes: >
      Inspect-only handoff-packet import qualifies the floor that
      a handoff artifact can be opened, inspected, and walked
      without writing to the durable target.

  - row_id: fuw_row:import.hidden_setup_post_apply_discovered
    case_category: import
    entry_verb: import
    target_kind: competitor_config_root
    resulting_mode: apply_to_active_workspace
    entry_route_id: er.clone_or_import
    archetype_detection_outcome: probable_archetype_partial
    deployment_profile_id: individual_local
    startup_state_token: startup_state:open_without_restore
    boundary_manifest_row_id: configuration_profiles
    first_useful_work_target_surface: migration_center_before_commit
    restore_class: not_applicable
    expected_blocker_class: hidden_setup
    rehearsal_qualification_class: failed
    safe_exit_actions:
      - roll_back_import
      - review_unsupported_items
    decline_path_class: roll_back_import_available
    local_first_claim_class: account_required_route
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 0
      optional_later_count: 0
    readiness_bucket_task_rows:
      - task_id: post_apply_discovery_audit
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_post_apply_diff_only
        expected_outcome: hidden_setup_discovered_after_commit_non_conforming
    measurement_surface: surface_migration_review
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - shell_open
    support_packet_family_refs:
      - object_issue_handoff
    recovery_ladder_rung_refs:
      - rung.cache_index_repair
    supporting_corpus_scenario_refs: []
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/import_hidden_setup_post_apply.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_account_required_exception.clone_or_import_individual_local
    evidence_consumer:
      - ux_evidence:migration_dry_run_diff_packet
    notes: >
      Negative-test row. Qualifies that the rehearsal packet
      records a `failed` outcome when the user discovers
      undisclosed setup work after commit (silent extension
      activation, silent toolchain mutation). The row exists so
      the rehearsal packet has a worked example of `failed` for
      the import route.
