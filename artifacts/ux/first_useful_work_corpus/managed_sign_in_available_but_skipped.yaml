# First-useful-work qualification corpus —
# managed sign-in available but skipped.
#
# Case category: managed_sign_in_available_but_skipped. Managed
# (vendor-IdP / customer-IdP) sign-in is offered, the user
# declines, the local path stays useful.
#
# Vocab sources, rules, and the row shape are frozen in
# artifacts/ux/first_useful_work_corpus/README.md.

schema_version: 1
case_category: managed_sign_in_available_but_skipped
case_category_description: >
  Sign-in for the managed control plane (managed_cloud,
  enterprise_online, self_hosted) is presented and the user
  declines. The qualification floor is "declining managed
  sign-in MUST NOT retroactively degrade prior local work, MUST
  offer Continue local / Continue in restricted mode same-
  weight, and MUST advertise the absence_narrows_to claim of
  the affected boundary row".

sources:
  corpus_readme: artifacts/ux/first_useful_work_corpus/README.md
  scoreboard: artifacts/ux/no_account_switching_scoreboard.yaml
  rehearsal_packet: artifacts/ux/startup_route_rehearsal_packet.md
  task_success_corpus_seed: artifacts/product/task_success_corpus_seed.yaml
  no_account_local_entry_contract: docs/ux/no_account_local_entry_contract.md
  boundary_manifest: docs/product/boundary_manifest_strawman.md

rows:

  - row_id: fuw_row:managed_sign_in_available_but_skipped.individual_local_first_run_managed_sign_in_offered_skipped
    case_category: managed_sign_in_available_but_skipped
    entry_verb: open
    target_kind: local_folder
    resulting_mode: folder
    entry_route_id: er.start_center
    archetype_detection_outcome: certified_archetype_match
    deployment_profile_id: individual_local
    startup_state_token: startup_state:first_run
    boundary_manifest_row_id: identity_policy_service
    first_useful_work_target_surface: tree_plus_readme_or_changed_files
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: compatible
    safe_exit_actions:
      - set_up_later
      - open_minimal
      - continue_in_restricted_mode
    decline_path_class: continue_local_same_weight
    local_first_claim_class: local_first_with_optional_decline
    declined_opt_ins:
      - identity_policy_service
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 1
      optional_later_count: 1
    readiness_bucket_task_rows:
      - task_id: workspace_trust_confirmation
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: trust_widening_review_only
        expected_outcome: admitted_without_widening
      - task_id: managed_sign_in_offered
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: prompt_only_no_credentials_persisted
        expected_outcome: declined_no_degradation
      - task_id: install_recommended_extensions
        bucket: optional_later
        execution_boundary: local_machine
        side_effect_class: extension_install_if_accepted
        expected_outcome: deferred_to_set_up_later
    measurement_surface: surface_opt_in_boundary
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - startup_to_first_useful_chrome
      - shell_open
    support_packet_family_refs:
      - first_run_evidence
      - auth_evidence_packet
    recovery_ladder_rung_refs:
      - rung.none_required
    supporting_corpus_scenario_refs:
      - tsc.first_run_start_center_local_folder
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/managed_sign_in_offered_skipped_individual_local.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_no_account_by_route.start_center_individual_local
      - scoreboard_row:fuw_managed_sign_in_skipped.individual_local_local_flow_continued
    evidence_consumer:
      - ux_evidence:first_run_audit_packet
      - support_bundle:auth_evidence_packet
    notes: >
      Managed (vendor or customer IdP) sign-in card is offered
      same-weight with Continue local; declining reaches
      first-useful-edit on `individual_local` without retroactive
      degradation. The opt-in is recorded against
      identity_policy_service.absence_narrows_to.

  - row_id: fuw_row:managed_sign_in_available_but_skipped.managed_cloud_resume_reauth_required_declined
    case_category: managed_sign_in_available_but_skipped
    entry_verb: resume
    target_kind: managed_cloud_workspace
    resulting_mode: resume_live_session
    entry_route_id: er.protocol_handler_reentry
    archetype_detection_outcome: supported_archetype_match
    deployment_profile_id: managed_cloud
    startup_state_token: startup_state:partial_startup
    boundary_manifest_row_id: workspace_control_plane
    first_useful_work_target_surface: review_or_work_item_anchor
    restore_class: not_applicable
    expected_blocker_class: blocked_prerequisite
    rehearsal_qualification_class: partial
    safe_exit_actions:
      - reauth_required
      - continue_in_restricted_mode
      - set_up_later
    decline_path_class: continue_in_restricted_mode_same_weight
    local_first_claim_class: account_required_route
    declined_opt_ins:
      - workspace_control_plane
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 1
      optional_later_count: 0
    readiness_bucket_task_rows:
      - task_id: authority_reevaluation
        bucket: blocking_now
        execution_boundary: managed_workspace
        side_effect_class: authority_ticket_re_evaluation_only
        expected_outcome: reauth_required_prompted
      - task_id: continue_in_restricted_mode
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: local_only_after_decline
        expected_outcome: local_flow_continued_after_decline
    measurement_surface: surface_opt_in_boundary
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - shell_open
    support_packet_family_refs:
      - auth_evidence_packet
      - managed_workspace_evidence
    recovery_ladder_rung_refs:
      - rung.restricted_mode_fallback
    supporting_corpus_scenario_refs:
      - tsc.resume_managed_cloud_workspace_reauth_required
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/managed_cloud_resume_reauth_required_declined.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_managed_sign_in_skipped.managed_cloud_local_flow_continued
      - scoreboard_row:service_opt_in_boundary.resume_managed_reauth_required
    evidence_consumer:
      - support_bundle:managed_workspace_summary
      - support_bundle:auth_evidence_packet
    notes: >
      Managed cloud workspace cannot be re-evaluated locally; the
      route is genuinely account-required. Declining the reauth
      keeps Continue in restricted mode same-weight, and prior
      local work is not retroactively degraded.
