# First-useful-work qualification corpus —
# service-opt-in declined.
#
# Case category: service_opt_in_declined. A non-identity service
# opt-in (telemetry, model gateway, hosted marketplace UI,
# managed-sync profile, collaboration relay, extension registry
# mirror, model gateway) is offered, the user declines, the
# local flow stays useful.
#
# Vocab sources, rules, and the row shape are frozen in
# artifacts/ux/first_useful_work_corpus/README.md.

schema_version: 1
case_category: service_opt_in_declined
case_category_description: >
  Non-identity service opt-in is offered and declined. The
  qualification floor is "Continue local is offered same-weight,
  the absence_narrows_to claim is advertised before the prompt
  resolves, and declining never produces retroactive lockout".

sources:
  corpus_readme: artifacts/ux/first_useful_work_corpus/README.md
  scoreboard: artifacts/ux/no_account_switching_scoreboard.yaml
  rehearsal_packet: artifacts/ux/startup_route_rehearsal_packet.md
  task_success_corpus_seed: artifacts/product/task_success_corpus_seed.yaml
  no_account_local_entry_contract: docs/ux/no_account_local_entry_contract.md
  boundary_manifest: docs/product/boundary_manifest_strawman.md

rows:

  - row_id: fuw_row:service_opt_in_declined.telemetry_optional_at_first_run
    case_category: service_opt_in_declined
    entry_verb: open
    target_kind: local_folder
    resulting_mode: folder
    entry_route_id: er.start_center
    archetype_detection_outcome: certified_archetype_match
    deployment_profile_id: individual_local
    startup_state_token: startup_state:first_run
    boundary_manifest_row_id: telemetry_support_pipeline
    first_useful_work_target_surface: tree_plus_readme_or_changed_files
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: compatible
    safe_exit_actions:
      - set_up_later
      - open_minimal
    decline_path_class: continue_local_same_weight
    local_first_claim_class: local_first_with_optional_decline
    declined_opt_ins:
      - telemetry_support_pipeline
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 1
      optional_later_count: 0
    readiness_bucket_task_rows:
      - task_id: workspace_trust_confirmation
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: trust_widening_review_only
        expected_outcome: admitted_without_widening
      - task_id: telemetry_opt_in_offered
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: prompt_only_no_data_persisted
        expected_outcome: declined_local_bundles_remain_canonical
    measurement_surface: surface_opt_in_boundary
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - startup_to_first_useful_chrome
      - shell_open
    support_packet_family_refs:
      - first_run_evidence
    recovery_ladder_rung_refs:
      - rung.none_required
    supporting_corpus_scenario_refs:
      - tsc.first_run_start_center_local_folder
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/service_opt_in_declined_telemetry.yaml
    scoreboard_row_refs:
      - scoreboard_row:service_opt_in_boundary.telemetry_optional_at_first_run
      - scoreboard_row:fuw_service_opt_in_decline_outcomes.telemetry_individual_local
    evidence_consumer:
      - ux_evidence:first_run_audit_packet
    notes: >
      Telemetry opt-in defaults to off on open-source builds.
      Declining MUST NOT block first-useful-work; local
      bundles remain the canonical supportability artefact.

  - row_id: fuw_row:service_opt_in_declined.model_gateway_optional_at_clone
    case_category: service_opt_in_declined
    entry_verb: clone
    target_kind: remote_repository
    resulting_mode: clone_then_review
    entry_route_id: er.clone_or_import
    archetype_detection_outcome: probable_archetype_partial
    deployment_profile_id: individual_local
    startup_state_token: startup_state:open_without_restore
    boundary_manifest_row_id: model_gateway
    first_useful_work_target_surface: post_clone_handoff
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: compatible
    safe_exit_actions:
      - set_up_later
      - open_minimal
      - review_archetype_match
    decline_path_class: continue_local_same_weight
    local_first_claim_class: local_first_with_optional_decline
    declined_opt_ins:
      - model_gateway
    readiness_bucket_summary:
      blocking_now_count: 0
      recommended_soon_count: 1
      optional_later_count: 1
    readiness_bucket_task_rows:
      - task_id: model_gateway_opt_in_offered
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: prompt_only_no_credentials_persisted
        expected_outcome: declined_local_or_byok_path_advertised
      - task_id: dependency_restore
        bucket: optional_later
        execution_boundary: local_machine
        side_effect_class: package_install_if_accepted
        expected_outcome: deferred_to_set_up_later
    measurement_surface: surface_opt_in_boundary
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - startup_to_first_useful_chrome
      - shell_open
    support_packet_family_refs:
      - first_run_evidence
    recovery_ladder_rung_refs:
      - rung.none_required
    supporting_corpus_scenario_refs:
      - tsc.clone_then_review_remote_repo
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/service_opt_in_declined_model_gateway.yaml
    scoreboard_row_refs:
      - scoreboard_row:service_opt_in_boundary.clone_without_model_gateway
      - scoreboard_row:fuw_service_opt_in_decline_outcomes.model_gateway_individual_local
    evidence_consumer:
      - benchmark_family:bootstrap_entry_parity
    notes: >
      Model-gateway opt-in is offered after clone and is declined
      same-weight with Continue local. The user reaches the
      post-clone handoff card; AI workflows narrow to BYOK or
      local-only as advertised by the model_gateway boundary row.

  - row_id: fuw_row:service_opt_in_declined.marketplace_browse_declined_first_run
    case_category: service_opt_in_declined
    entry_verb: open
    target_kind: local_folder
    resulting_mode: folder
    entry_route_id: er.start_center
    archetype_detection_outcome: certified_archetype_match
    deployment_profile_id: individual_local
    startup_state_token: startup_state:first_run
    boundary_manifest_row_id: hosted_marketplace_ui
    first_useful_work_target_surface: tree_plus_readme_or_changed_files
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: exact
    safe_exit_actions:
      - set_up_later
      - open_minimal
    decline_path_class: continue_local_same_weight
    local_first_claim_class: local_first_with_optional_decline
    declined_opt_ins:
      - hosted_marketplace_ui
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 0
      optional_later_count: 1
    readiness_bucket_task_rows:
      - task_id: workspace_trust_confirmation
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: trust_widening_review_only
        expected_outcome: admitted_without_widening
      - task_id: marketplace_browse_offered
        bucket: optional_later
        execution_boundary: local_machine
        side_effect_class: prompt_only_no_navigation_persisted
        expected_outcome: declined_cli_or_mirror_install_advertised
    measurement_surface: surface_opt_in_boundary
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - startup_to_first_useful_chrome
      - shell_open
    support_packet_family_refs:
      - first_run_evidence
    recovery_ladder_rung_refs:
      - rung.none_required
    supporting_corpus_scenario_refs:
      - tsc.first_run_start_center_local_folder
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/service_opt_in_declined_marketplace.yaml
    scoreboard_row_refs:
      - scoreboard_row:service_opt_in_boundary.marketplace_browse_declined
      - scoreboard_row:fuw_service_opt_in_decline_outcomes.marketplace_individual_local
    evidence_consumer:
      - ux_evidence:first_run_audit_packet
    notes: >
      Hosted marketplace browse UI is offered as an
      `optional_later` task; declining keeps CLI / mirror install
      paths advertised. No marketplace prompt is forced before
      first-useful-edit.
