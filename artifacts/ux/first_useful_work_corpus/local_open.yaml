# First-useful-work qualification corpus — local open.
#
# Case category: local_open. Start Center first-run, plain Open,
# OS file association, and Recent-work reopen of a local target.
#
# Each row qualifies one protected startup route × deployment
# profile combination as exact / compatible / partial / failed
# under one packet format
# (artifacts/ux/startup_route_rehearsal_packet.md). Free-form
# axes are non-conforming; every value resolves to a closed
# vocabulary listed in artifacts/ux/first_useful_work_corpus/README.md
# §1.
#
# Vocab sources, rules, and the row shape are frozen in
# artifacts/ux/first_useful_work_corpus/README.md and re-exported
# here for tooling discovery. If this file disagrees with the
# README, the README wins and this file updates in the same
# change.

schema_version: 1
case_category: local_open
case_category_description: >
  Start Center first-run, plain File > Open, OS file association,
  and Recent-work reopen of a target whose primary store is the
  local workspace (folder, single file, repo root). The
  qualification floor for this category is "no account, no
  managed service, no network reaches first-useful-work on every
  row".

sources:
  corpus_readme: artifacts/ux/first_useful_work_corpus/README.md
  scoreboard: artifacts/ux/no_account_switching_scoreboard.yaml
  rehearsal_packet: artifacts/ux/startup_route_rehearsal_packet.md
  task_success_corpus_seed: artifacts/product/task_success_corpus_seed.yaml
  measurement_plan: docs/product/onboarding_measurement_plan.md
  entry_restore_object_model: docs/workspace/entry_restore_object_model.md
  startup_state_copy_review: artifacts/ux/startup_state_copy_review.yaml
  boundary_manifest: docs/product/boundary_manifest_strawman.md
  deployment_profiles: artifacts/governance/deployment_profiles.yaml

rows:

  - row_id: fuw_row:local_open.first_run_start_center_local_folder
    case_category: local_open
    entry_verb: open
    target_kind: local_folder
    resulting_mode: folder
    entry_route_id: er.start_center
    archetype_detection_outcome: certified_archetype_match
    archetype_hint: ts_web_app
    deployment_profile_id: individual_local
    startup_state_token: startup_state:first_run
    boundary_manifest_row_id: editor_core
    first_useful_work_target_surface: tree_plus_readme_or_changed_files
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: exact
    safe_exit_actions:
      - set_up_later
      - open_minimal
    decline_path_class: continue_local_same_weight
    local_first_claim_class: local_first_floor
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 1
      optional_later_count: 1
    readiness_bucket_task_rows:
      - task_id: workspace_trust_confirmation
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: trust_widening_review_only
        expected_outcome: admitted_without_widening
      - task_id: detect_node_toolchain
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: reads_package_manager_state_only
        expected_outcome: detected_no_install
      - task_id: install_recommended_extensions
        bucket: optional_later
        execution_boundary: local_machine
        side_effect_class: extension_install_if_accepted
        expected_outcome: deferred_to_set_up_later
    measurement_surface: surface_first_run
    protected_metric_refs:
      - ff.warm_start_to_first_paint
      - ff.first_paint
    journey_classes:
      - startup_to_first_useful_chrome
      - startup_to_first_paint
      - placeholder_open
    support_packet_family_refs:
      - first_run_evidence
    recovery_ladder_rung_refs:
      - rung.none_required
    supporting_corpus_scenario_refs:
      - tsc.first_run_start_center_local_folder
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/first_run_start_center_local_folder.yaml
      - fixtures/ux/entry_restore_states/first_run.yaml
    scoreboard_row_refs:
      - scoreboard_row:no_account_local_work.first_useful_edit_without_opt_in
      - scoreboard_row:no_account_local_work.local_git_available_offline
    evidence_consumer:
      - benchmark_family:bootstrap_entry_parity
      - benchmark_family:certified_archetype_workflows
      - ux_evidence:first_run_audit_packet
    notes: >
      Floor row for the local-first claim. Start Center renders
      Open / Clone / Import / Restore / Recent work distinctly;
      no opt-in is presented; first-useful-edit is reachable on
      `individual_local`.

  - row_id: fuw_row:local_open.plain_open_unknown_archetype
    case_category: local_open
    entry_verb: open
    target_kind: local_folder
    resulting_mode: folder
    entry_route_id: er.plain_open
    archetype_detection_outcome: unrecognised_archetype
    deployment_profile_id: individual_local
    startup_state_token: startup_state:open_without_restore
    boundary_manifest_row_id: editor_core
    first_useful_work_target_surface: tree_plus_readme_or_changed_files
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: exact
    safe_exit_actions:
      - set_up_later
      - open_minimal
    decline_path_class: no_decline_path_required
    local_first_claim_class: local_first_floor
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 0
      optional_later_count: 1
    readiness_bucket_task_rows:
      - task_id: workspace_trust_confirmation
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: trust_widening_review_only
        expected_outcome: admitted_without_widening
      - task_id: archetype_probe_retry
        bucket: optional_later
        execution_boundary: local_machine
        side_effect_class: reads_workspace_manifest_only
        expected_outcome: declined_no_archetype_match
    measurement_surface: surface_first_open
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - startup_to_first_useful_chrome
      - shell_open
    support_packet_family_refs:
      - first_run_evidence
    recovery_ladder_rung_refs:
      - rung.none_required
    supporting_corpus_scenario_refs:
      - tsc.plain_open_local_folder_unknown_archetype
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/plain_open_unknown_archetype.yaml
    scoreboard_row_refs:
      - scoreboard_row:no_account_local_work.first_useful_edit_without_opt_in
    evidence_consumer:
      - benchmark_family:bootstrap_entry_parity
    notes: >
      Plain File > Open on a folder with no archetype evidence.
      Qualifies the unrecognised-archetype path stays on the
      no-account floor.

  - row_id: fuw_row:local_open.protocol_handler_single_file
    case_category: local_open
    entry_verb: open
    target_kind: local_file
    resulting_mode: single_file
    entry_route_id: er.protocol_handler_reentry
    archetype_detection_outcome: archetype_detection_unavailable
    deployment_profile_id: individual_local
    startup_state_token: startup_state:open_without_restore
    boundary_manifest_row_id: workspace_vfs
    first_useful_work_target_surface: editor_with_root_discovery_cues
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: exact
    safe_exit_actions:
      - set_up_later
      - open_minimal
    decline_path_class: no_decline_path_required
    local_first_claim_class: local_first_floor
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 1
      optional_later_count: 0
    readiness_bucket_task_rows:
      - task_id: root_discovery_cue_render
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_nearby_manifests_only
        expected_outcome: cue_rendered_standalone_file
      - task_id: workspace_trust_confirmation
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: trust_widening_review_only
        expected_outcome: deferred_single_file_restricted_ok
    measurement_surface: surface_first_open
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - shell_open
      - placeholder_open
    support_packet_family_refs:
      - first_run_evidence
    recovery_ladder_rung_refs:
      - rung.none_required
    supporting_corpus_scenario_refs:
      - tsc.protocol_handler_reentry_single_file
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/protocol_handler_single_file.yaml
    scoreboard_row_refs:
      - scoreboard_row:no_account_local_work.protocol_handler_no_trust_widening
    evidence_consumer:
      - benchmark_family:bootstrap_entry_parity
    notes: >
      OS file association / drag-and-drop / deep-link single-file
      open MUST NOT widen trust as a side effect; the
      workspace_vfs boundary row underwrites the no-trust-widening
      claim.

  - row_id: fuw_row:local_open.start_from_prebuild_minimal_bypass
    case_category: local_open
    entry_verb: start_from_snapshot
    target_kind: template_or_prebuild_snapshot
    resulting_mode: open_prebuild_with_setup_actions
    entry_route_id: er.start_center
    archetype_detection_outcome: certified_archetype_match
    archetype_hint: ts_web_app
    deployment_profile_id: individual_local
    startup_state_token: startup_state:first_run
    boundary_manifest_row_id: command_plane
    first_useful_work_target_surface: prebuild_setup_envelope
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: compatible
    safe_exit_actions:
      - set_up_later
      - open_minimal
    decline_path_class: continue_local_same_weight
    local_first_claim_class: local_first_narrowed_advertised
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 1
      optional_later_count: 2
    readiness_bucket_task_rows:
      - task_id: side_effect_envelope_disclosure
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_template_manifest_only
        expected_outcome: envelope_advertised_before_commit
      - task_id: node_toolchain_detect
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: reads_package_manager_state_only
        expected_outcome: detected_no_install
      - task_id: dependency_install
        bucket: optional_later
        execution_boundary: local_machine
        side_effect_class: package_install_if_accepted
        expected_outcome: bypassed_via_open_prebuild_minimal
      - task_id: devcontainer_attach
        bucket: optional_later
        execution_boundary: container
        side_effect_class: devcontainer_attach_if_accepted
        expected_outcome: bypassed_via_open_prebuild_minimal
    measurement_surface: surface_first_open
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - startup_to_first_useful_chrome
      - placeholder_open
    support_packet_family_refs:
      - first_run_evidence
    recovery_ladder_rung_refs:
      - rung.none_required
    supporting_corpus_scenario_refs:
      - tsc.start_from_prebuild_ts_web_app_bypass
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/start_from_prebuild_minimal_bypass.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_no_account_by_route.start_center_individual_local
      - scoreboard_row:no_account_local_work.prebuild_minimal_bypass_same_weight
    evidence_consumer:
      - benchmark_family:certified_archetype_workflows
    notes: >
      Start-from-snapshot path qualifies the open_prebuild_minimal
      bypass same-weight with the full setup path. Compatible
      class because the row reaches first-useful-navigation by
      narrowing scope; no dependency install is performed.
