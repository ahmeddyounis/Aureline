# First-useful-work qualification corpus — restore.
#
# Case category: restore. Session / crash / topology restore
# through the restore prompt.
#
# Vocab sources, rules, and the row shape are frozen in
# artifacts/ux/first_useful_work_corpus/README.md.

schema_version: 1
case_category: restore
case_category_description: >
  Restore prompts presented after crash, topology change, schema
  drift, or explicit reopen. The qualification floor is "the
  prompt advertises a restore_level, the materialised result
  does not exceed the advertised level, and every non-fully-
  present missing-target state pairs with a typed recovery
  class". Silent re-execution of mutating commands is
  non-conforming.

sources:
  corpus_readme: artifacts/ux/first_useful_work_corpus/README.md
  scoreboard: artifacts/ux/no_account_switching_scoreboard.yaml
  rehearsal_packet: artifacts/ux/startup_route_rehearsal_packet.md
  task_success_corpus_seed: artifacts/product/task_success_corpus_seed.yaml
  entry_restore_truth_audit: docs/ux/entry_restore_truth_audit.md
  startup_state_copy_review: artifacts/ux/startup_state_copy_review.yaml

rows:

  - row_id: fuw_row:restore.compatible_restore_after_crash
    case_category: restore
    entry_verb: restore
    target_kind: recovery_checkpoint
    resulting_mode: restore_last_session
    entry_route_id: er.restore_prompt
    archetype_detection_outcome: certified_archetype_match
    deployment_profile_id: individual_local
    startup_state_token: startup_state:reopen_with_pending_restore
    boundary_manifest_row_id: editor_core
    first_useful_work_target_surface: prior_layout_with_placeholders
    restore_class: compatible_restore
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: compatible
    safe_exit_actions:
      - compare_before_restore
      - open_without_restore
      - safe_mode
    decline_path_class: open_without_restore_same_weight
    local_first_claim_class: local_first_narrowed_advertised
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 2
      optional_later_count: 0
    readiness_bucket_task_rows:
      - task_id: restore_level_disclosure
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_session_checkpoint_only
        expected_outcome: level_advertised_before_commit
      - task_id: missing_extension_host_repair
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: extension_quarantine_review_only
        expected_outcome: safe_mode_available
      - task_id: dirty_buffer_compare
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: reads_recovery_journal_only
        expected_outcome: compare_completed_or_deferred
    measurement_surface: surface_restore_success
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - restore_adjacent
      - shell_open
    support_packet_family_refs:
      - restore_prompt_evidence
      - crash_recovery_evidence
    recovery_ladder_rung_refs:
      - rung.open_without_restore
      - rung.safe_mode
    supporting_corpus_scenario_refs:
      - tsc.restore_prompt_after_crash_compatible
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/compatible_restore_after_crash.yaml
      - fixtures/ux/entry_restore_states/reopen_with_pending_restore.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_no_account_by_route.restore_prompt_individual_local
      - scoreboard_row:intentionally_narrowed_capability.layout_only_when_extension_host_missing
    evidence_consumer:
      - support_bundle:crash_recovery_summary
      - benchmark_family:bootstrap_entry_parity
    notes: >
      Compatible restore qualifies the narrowing-advertised floor:
      the prompt advertises compatible_restore explicitly, the
      delivered level matches, and the user has same-weight
      Restore / Open without restore / Safe mode actions.

  - row_id: fuw_row:restore.failed_restore_corrupt_checkpoint
    case_category: restore
    entry_verb: restore
    target_kind: recovery_checkpoint
    resulting_mode: restore_last_session
    entry_route_id: er.restore_prompt
    archetype_detection_outcome: archetype_detection_unavailable
    deployment_profile_id: individual_local
    startup_state_token: startup_state:restore_failed
    boundary_manifest_row_id: editor_core
    first_useful_work_target_surface: restore_or_compare_sheet
    restore_class: no_restore
    expected_blocker_class: blocked_prerequisite
    rehearsal_qualification_class: partial
    safe_exit_actions:
      - open_without_restore
      - safe_mode
      - locate_missing_target
      - compare_before_restore
    decline_path_class: open_without_restore_same_weight
    local_first_claim_class: local_first_narrowed_advertised
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 1
      optional_later_count: 0
    readiness_bucket_task_rows:
      - task_id: restore_level_disclosure
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_session_checkpoint_only
        expected_outcome: level_degraded_advertised_before_commit
      - task_id: dirty_buffer_compare
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: reads_recovery_journal_only
        expected_outcome: compare_completed_or_deferred
    measurement_surface: surface_restore_success
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - restore_adjacent
    support_packet_family_refs:
      - crash_recovery_evidence
      - recovery_ladder_packet
    recovery_ladder_rung_refs:
      - rung.open_without_restore
      - rung.cache_index_repair
      - rung.safe_mode
    supporting_corpus_scenario_refs: []
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/failed_restore_corrupt_checkpoint.yaml
      - fixtures/ux/entry_restore_states/restore_failed.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_no_account_by_route.restore_prompt_individual_local
    evidence_consumer:
      - support_bundle:crash_recovery_summary
    notes: >
      Restore advertised compatible_restore and degraded to
      no_restore. The row qualifies that the degradation is
      advertised before commit and recovery routes (Open
      without restore / Safe mode / Cache repair) remain
      reachable. Partial class because first-useful-work is
      reached only through Open without restore.

  - row_id: fuw_row:restore.restore_drift_overclaim_negative
    case_category: restore
    entry_verb: restore
    target_kind: recovery_checkpoint
    resulting_mode: restore_last_session
    entry_route_id: er.restore_prompt
    archetype_detection_outcome: archetype_detection_unavailable
    deployment_profile_id: individual_local
    startup_state_token: startup_state:reopen_with_pending_restore
    boundary_manifest_row_id: editor_core
    first_useful_work_target_surface: prior_layout_with_placeholders
    restore_class: layout_only
    expected_blocker_class: restore_drift
    rehearsal_qualification_class: failed
    safe_exit_actions:
      - open_without_restore
      - safe_mode
    decline_path_class: open_without_restore_same_weight
    local_first_claim_class: account_required_route
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 1
      recommended_soon_count: 0
      optional_later_count: 0
    readiness_bucket_task_rows:
      - task_id: restore_level_disclosure
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_session_checkpoint_only
        expected_outcome: advertised_higher_than_delivered_non_conforming
    measurement_surface: surface_restore_success
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - restore_adjacent
    support_packet_family_refs:
      - crash_recovery_evidence
    recovery_ladder_rung_refs:
      - rung.open_without_restore
      - rung.safe_mode
    supporting_corpus_scenario_refs: []
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/restore_drift_overclaim.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_account_required_exception.restore_prompt_individual_local
    evidence_consumer:
      - support_bundle:crash_recovery_summary
    notes: >
      Negative-test row. Qualifies that a restore prompt
      advertising compatible_restore and silently delivering
      layout_only (or quietly running mutating replay on an
      exact_restore promise) scores `failed` on the rehearsal
      packet. The row exists so reviewers can compare
      `compatible` and `failed` shapes for the same route.
