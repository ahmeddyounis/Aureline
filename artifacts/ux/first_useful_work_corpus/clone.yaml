# First-useful-work qualification corpus — clone.
#
# Case category: clone. Palette / Start Center clone of a remote
# repository. Post-clone trust, install, and execution stay
# separated from materialisation per the clone-review contract.
#
# Vocab sources, rules, and the row shape are frozen in
# artifacts/ux/first_useful_work_corpus/README.md.

schema_version: 1
case_category: clone
case_category_description: >
  Clone of a remote repository through the clone-review sheet.
  The qualification floor is "materialisation does not imply
  trust grant, dependency restore, extension recommendation, or
  hook execution"; the row qualifies the post-clone trust-stage
  contract.

sources:
  corpus_readme: artifacts/ux/first_useful_work_corpus/README.md
  scoreboard: artifacts/ux/no_account_switching_scoreboard.yaml
  rehearsal_packet: artifacts/ux/startup_route_rehearsal_packet.md
  task_success_corpus_seed: artifacts/product/task_success_corpus_seed.yaml
  clone_review_contract: docs/ux/clone_review_contract.md

rows:

  - row_id: fuw_row:clone.clone_then_review_remote_repo
    case_category: clone
    entry_verb: clone
    target_kind: remote_repository
    resulting_mode: clone_then_review
    entry_route_id: er.clone_or_import
    archetype_detection_outcome: probable_archetype_partial
    deployment_profile_id: individual_local
    startup_state_token: startup_state:open_without_restore
    boundary_manifest_row_id: local_git
    first_useful_work_target_surface: post_clone_handoff
    restore_class: not_applicable
    expected_blocker_class: no_blocker
    rehearsal_qualification_class: compatible
    safe_exit_actions:
      - set_up_later
      - open_minimal
      - review_archetype_match
    decline_path_class: continue_local_same_weight
    local_first_claim_class: local_first_with_optional_decline
    declined_opt_ins:
      - model_gateway
    readiness_bucket_summary:
      blocking_now_count: 2
      recommended_soon_count: 1
      optional_later_count: 0
    readiness_bucket_task_rows:
      - task_id: remote_authority_review
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: reads_credential_handle_ref_only
        expected_outcome: authority_reevaluation_completed
      - task_id: post_clone_trust_review
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: trust_widening_review_only
        expected_outcome: review_required_not_widened
      - task_id: dependency_restore
        bucket: recommended_soon
        execution_boundary: local_machine
        side_effect_class: package_install_if_accepted
        expected_outcome: deferred_to_set_up_later
    measurement_surface: surface_first_open
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - startup_to_first_useful_chrome
      - shell_open
    support_packet_family_refs:
      - first_run_evidence
    recovery_ladder_rung_refs:
      - rung.none_required
    supporting_corpus_scenario_refs:
      - tsc.clone_then_review_remote_repo
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/clone_then_review_remote_repo.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_no_account_by_route.clone_or_import_individual_local
      - scoreboard_row:service_opt_in_boundary.clone_without_model_gateway
    evidence_consumer:
      - benchmark_family:bootstrap_entry_parity
    notes: >
      Clone reaches the post-clone handoff card with trust review
      pending and dependency restore deferred. Model-gateway opt-in
      is offered same-weight with continue local; declining keeps
      the clone-review handoff useful.

  - row_id: fuw_row:clone.clone_admission_denied_policy
    case_category: clone
    entry_verb: clone
    target_kind: remote_repository
    resulting_mode: clone_then_review
    entry_route_id: er.clone_or_import
    archetype_detection_outcome: archetype_detection_unavailable
    deployment_profile_id: enterprise_online
    startup_state_token: startup_state:unsupported_startup
    boundary_manifest_row_id: local_git
    first_useful_work_target_surface: post_clone_handoff
    restore_class: not_applicable
    expected_blocker_class: policy_gate
    rehearsal_qualification_class: partial
    safe_exit_actions:
      - continue_in_restricted_mode
      - set_up_later
      - review_archetype_match
    decline_path_class: continue_in_restricted_mode_same_weight
    local_first_claim_class: account_required_route
    declined_opt_ins: []
    readiness_bucket_summary:
      blocking_now_count: 2
      recommended_soon_count: 0
      optional_later_count: 0
    readiness_bucket_task_rows:
      - task_id: managed_policy_evaluation
        bucket: blocking_now
        execution_boundary: managed_workspace
        side_effect_class: policy_audit_review_only
        expected_outcome: policy_blocked_with_typed_reason
      - task_id: continue_in_restricted_mode
        bucket: blocking_now
        execution_boundary: local_machine
        side_effect_class: local_only_after_decline
        expected_outcome: local_flow_continued_after_decline
    measurement_surface: surface_first_open
    protected_metric_refs:
      - ff.warm_start_to_first_paint
    journey_classes:
      - shell_open
    support_packet_family_refs:
      - policy_audit_evidence
    recovery_ladder_rung_refs:
      - rung.restricted_mode_fallback
    supporting_corpus_scenario_refs: []
    supporting_fixture_refs:
      - fixtures/ux/first_useful_work_cases/clone_admission_denied_policy.yaml
    scoreboard_row_refs:
      - scoreboard_row:fuw_account_required_exception.clone_or_import_enterprise_online
    evidence_consumer:
      - support_bundle:managed_workspace_summary
    notes: >
      Managed-fleet policy denies the clone destination; the row
      qualifies that the policy reason is typed (closed set,
      not free-form) and that Continue in restricted mode is
      offered same-weight with the gated action.
