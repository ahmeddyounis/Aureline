# External-alpha archetype certification seed rows.
#
# These rows bind launch bundles to reference-workspace, benchmark, and
# compatibility evidence without implying that the archetype is certified yet.

schema_version: 1
register_id: archetype_certification_seed.external_alpha
register_revision: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

source_contract_refs:
  alpha_wedge_matrix: artifacts/milestones/m2/alpha_wedge_matrix.yaml
  launch_language_bundle_rows: artifacts/product/language_bundle_rows.yaml
  reference_workspace_rows: artifacts/compat/reference_workspace_rows.yaml
  benchmark_fixture_register: artifacts/benchmarks/m2_fixture_register.yaml
  known_limits: artifacts/feedback/external_alpha_known_limits.md
  proof_packet: artifacts/milestones/m2/proof_packets/launch_bundles_and_archetypes.md

support_class_vocabulary:
  - certified
  - supported
  - community
  - experimental

certification_state_vocabulary:
  - seed_not_certified
  - retest_pending
  - evidence_stale
  - certified

mirror_review_source_vocabulary:
  - public_registry
  - approved_mirror
  - offline_bundle

archetype_seed_rows:
  - row_id: archetype_certification_seed:ts_web_app_or_service
    archetype_row_ref: archetype_row:ts_web_app_or_service
    public_label: TypeScript / JavaScript web app or service
    representative_stack: >
      TypeScript on Node.js with pnpm or npm, React or Vite or Next.js,
      and Vitest or Jest as the in-repo test runner.
    bundle_ref: launch_bundle:typescript_web_app.seed
    bundle_manifest_ref: artifacts/bundles/tsjs_launch_bundle_alpha.yaml
    benchmark_fixture_register_row_ref: fixture_register:external_alpha.ts_web_app_reference
    reference_workspace_id: refws.ts_web_app_archetype_seed
    fixture_packet_ref: fixtures/reference_workspaces/m2/ts_web_app_workflows.yaml
    current_support_class: experimental
    target_support_class: certified
    certification_state: seed_not_certified
    current_claim_state: alpha_limited
    compatibility_scorecard_ref: compat_row:certification.launch_archetype_matrix
    evidence_packet_ref: artifacts/milestones/m2/proof_packets/launch_bundles_and_archetypes.md#typescript-javascript-web-app-or-service
    freshness:
      state: current_seed
      reviewed_on: "2026-05-12"
      stale_after: P14D
      next_review_trigger:
        - bundle_manifest_changes
        - benchmark_fixture_register_changes
        - alpha_wedge_scope_changes
    workflow_scope:
      included_workflows:
        - workflow.alpha.ts_js.open_to_first_useful_result
        - workflow.alpha.ts_js.rename_preview
        - workflow.alpha.ts_js.test_debug_loop
        - workflow.alpha.ts_js.git_review_basics
      excluded_or_limited:
        - managed_cloud_daily_driver
        - broad_remote_parity
        - replacement_grade_claim
    platform_and_mode_scope:
      platform_dimensions:
        - macos_arm64
        - macos_x86_64
        - linux_x86_64
        - windows_x86_64
      claimed_modes:
        - local_desktop
        - helper_backed_local
      limited_modes:
        - local_plus_one_remote_mode_seed_only
    evidence_refs:
      - artifacts/bundles/tsjs_launch_bundle_alpha.yaml
      - artifacts/benchmarks/m2_fixture_register.yaml#fixture_register:external_alpha.ts_web_app_reference
      - fixtures/reference_workspaces/m2/ts_web_app_workflows.yaml
      - artifacts/milestones/m2/alpha_wedge_matrix.yaml#alpha_wedge:typescript_javascript
      - artifacts/feedback/external_alpha_known_limits.md
    badge_projection:
      launch_bundle_badge_label: Launch bundle
      archetype_badge_label: Archetype seed
      certification_state_label: Seed not certified
      launch_bundle_badge_opens: artifacts/bundles/tsjs_launch_bundle_alpha.yaml
      archetype_badge_opens: artifacts/milestones/m2/proof_packets/launch_bundles_and_archetypes.md#typescript-javascript-web-app-or-service
      compatibility_badge_opens: artifacts/certification/m2_archetype_seed_rows.yaml#archetype_certification_seed:ts_web_app_or_service
    mirror_review:
      source_vocabulary:
        - public_registry
        - approved_mirror
        - offline_bundle
      review_vocabulary_matches_bundle_manifest: true
      offline_review_notes: offline review shows the same diff section names as online install review

  - row_id: archetype_certification_seed:python_service_or_data_app
    archetype_row_ref: archetype_row:python_service_or_data_app
    public_label: Python service or data app
    representative_stack: >
      Python with uv, venv, or Poetry; pytest as the in-repo test runner;
      FastAPI or Django as the service framework; notebook adjacency is a
      handoff disclosure only.
    bundle_ref: launch_bundle:python_service_or_data_app.seed
    bundle_manifest_ref: artifacts/bundles/python_launch_bundle_alpha.yaml
    benchmark_fixture_register_row_ref: fixture_register:external_alpha.python_service_data_reference
    reference_workspace_id: refws.python_data_app_archetype_seed
    fixture_packet_ref: fixtures/reference_workspaces/m2/python_service_data_workflows.yaml
    current_support_class: experimental
    target_support_class: certified
    certification_state: seed_not_certified
    current_claim_state: alpha_limited
    compatibility_scorecard_ref: compat_row:certification.launch_archetype_matrix
    evidence_packet_ref: artifacts/milestones/m2/proof_packets/launch_bundles_and_archetypes.md#python-service-or-data-app
    freshness:
      state: current_seed
      reviewed_on: "2026-05-12"
      stale_after: P14D
      next_review_trigger:
        - bundle_manifest_changes
        - benchmark_fixture_register_changes
        - alpha_wedge_scope_changes
    workflow_scope:
      included_workflows:
        - workflow.alpha.python.interpreter_and_tests
        - workflow.alpha.python.debug_and_refactor
        - workflow.alpha.python.git_review_basics
      excluded_or_limited:
        - full_notebook_parity
        - managed_cloud_daily_driver
        - replacement_grade_claim
    platform_and_mode_scope:
      platform_dimensions:
        - macos_arm64
        - macos_x86_64
        - linux_x86_64
        - windows_x86_64
      claimed_modes:
        - local_desktop
        - helper_backed_local
      limited_modes:
        - devcontainer_or_container_seed_only
    evidence_refs:
      - artifacts/bundles/python_launch_bundle_alpha.yaml
      - artifacts/benchmarks/m2_fixture_register.yaml#fixture_register:external_alpha.python_service_data_reference
      - fixtures/reference_workspaces/m2/python_service_data_workflows.yaml
      - artifacts/milestones/m2/alpha_wedge_matrix.yaml#alpha_wedge:python
      - artifacts/feedback/external_alpha_known_limits.md
    badge_projection:
      launch_bundle_badge_label: Launch bundle
      archetype_badge_label: Archetype seed
      certification_state_label: Seed not certified
      launch_bundle_badge_opens: artifacts/bundles/python_launch_bundle_alpha.yaml
      archetype_badge_opens: artifacts/milestones/m2/proof_packets/launch_bundles_and_archetypes.md#python-service-or-data-app
      compatibility_badge_opens: artifacts/certification/m2_archetype_seed_rows.yaml#archetype_certification_seed:python_service_or_data_app
    mirror_review:
      source_vocabulary:
        - public_registry
        - approved_mirror
        - offline_bundle
      review_vocabulary_matches_bundle_manifest: true
      offline_review_notes: offline review shows the same diff section names as online install review

acceptance_state_coverage:
  - case_id: archetype_seed_rows_bind_bundles_to_evidence
    exercises_state: archetype_rows_link_bundle_fixture_and_packet
    fixture_ref: artifacts/certification/m2_archetype_seed_rows.yaml#archetype_seed_rows
    expected_validator_result: pass
  - case_id: archetype_seed_rows_do_not_overclaim_certification
    exercises_state: certification_state_is_seed_not_certified
    fixture_ref: artifacts/certification/m2_archetype_seed_rows.yaml#certification_state
    expected_validator_result: pass
  - case_id: archetype_seed_badges_open_evidence
    exercises_state: badges_open_underlying_packet
    fixture_ref: artifacts/certification/m2_archetype_seed_rows.yaml#badge_projection
    expected_validator_result: pass
