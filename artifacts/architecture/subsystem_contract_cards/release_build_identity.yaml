schema_version: 1
card_id: release_build_identity
title: Exact-build identity, provenance, release evidence, and promotion truth
freeze_status: provisional
purpose: >
  Bind binaries, symbols, docs/help truth, SBOMs, attestations, release
  evidence, support bundles, benchmark evidence, rollback metadata, and
  release-center copy to one exact identity instead of ambiguous version-only
  strings.
owned_objects:
  - exact-build identity fields, artifact family links, provenance, signing posture, and release channel joins
  - release artifact graph, promotion gates, qualification schedule, ring matrix, and release evidence packet templates
  - clean-room rebuild lane and build identity capture skeleton
  - release notices and claim rows where they depend on artifact identity
non_owned_objects:
  - docs-pack publication semantics beyond build identity consumption
  - support bundle redaction and incident intake content
  - command, settings, route, or record-class vocabularies
entry_points:
  command_entry_points:
    - print build identity, release evidence assemble, clean-room rebuild, qualification, rollback, support-symbolication commands
  event_entry_points:
    - build identity minted, artifact family linked, provenance captured, rebuild compared
    - promotion gate evaluated, release evidence packet assembled, rollback candidate selected
  schema_or_packet_refs:
    - schemas/build/exact_build_identity.schema.json
    - docs/release/release_evidence_packet_template.md
    - artifacts/release/artifact_graph_rules.yaml
dependencies:
  allowed_direct:
    - card:quality_benchmark_claims
    - card:docs_public_truth
    - card:security_policy_support
    - card:governance_ownership_lifecycle
  routed_through:
    route_and_execution_context: card:execution_context_tooling
    record_retention: card:record_class_governance
    command_identity: card:command_plane
  forbidden_shortcuts:
    - version-only fallback when exact identity is required
    - release evidence without provenance, artifact-family, channel, and support-window joins
    - promotion based on stale or seed-only benchmark evidence
budgets:
  - budget_ref: artifacts/governance/evidence_freshness_slos.yaml
    obligation: release evidence freshness windows are explicit and fail closed.
  - budget_ref: artifacts/compat/qualification_matrix_seed.yaml
    obligation: qualification and skew claims cite exact compatible artifact sets.
failure_modes:
  - mode: exact_identity_mismatch
    required_behavior: fail closed, rebuild, roll back, or narrow the claim; do not accept ambiguous identity.
  - mode: clean_room_parity_pending
    required_behavior: keep release posture yellow/provisional.
  - mode: symbol_or_support_artifact_missing
    required_behavior: mark symbolication/support proof partial and route to support smoke packet.
proof_packets:
  - docs/build/exact_build_identity_model.md
  - docs/build/cleanroom_rebuild_lane.md
  - docs/release/release_evidence_packet_template.md
  - docs/release/release_artifact_graph.md
  - artifacts/release/artifact_graph_rules.yaml
  - artifacts/release/provenance_capture_seed.json
  - schemas/build/exact_build_identity.schema.json
  - artifacts/contracts/frozen_surface_manifest.yaml#build.exact_build_identity_fields
owners:
  owner_dri: "@ahmeddyounis"
  owning_lanes:
    - release_evidence
  protected_packages:
    - aureline-rpc
    - aureline-telemetry
  backup_owner: null
  backup_waiver: single-maintainer-backup
  review_forums:
    - release_council
    - architecture_council
shared_contract_refs:
  command_ids: card:command_plane
  route_truth: card:execution_context_tooling
  record_classes: card:record_class_governance
  lifecycle_deprecation: card:governance_ownership_lifecycle
freeze_basis_refs:
  - artifacts/governance/interface_freeze_matrix.yaml#docs_route_and_exact_build_truth
  - artifacts/governance/stable_surface_inventory.yaml#build.exact_build_identity_fields
explicit_gaps:
  - gap_id: clean_room_parity
    status: needs_review
    impact: release evidence remains below green until clean-room confidence closes.
  - gap_id: exact_build_symbolication_closure
    status: open
    impact: support and field diagnosis joins remain partial.

