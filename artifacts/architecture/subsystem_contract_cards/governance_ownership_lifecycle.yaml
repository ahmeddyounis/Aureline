schema_version: 1
card_id: governance_ownership_lifecycle
title: Ownership, protected dependency rules, lifecycle, deprecation, and frozen surfaces
freeze_status: provisional
purpose: >
  Keep protected-path ownership, package layering, dependency rules, decision
  routing, lifecycle/deprecation policy, frozen-surface change control, and
  scorecard joins explicit enough that implementation cannot rely on hidden
  shared responsibility or private migration rules.
owned_objects:
  - ownership matrix, backup waivers, scorecard lane index, forum ownership, and issue routing
  - package inventory, protected-path dependency rules, process placement, and service ownership join tables
  - interface-freeze matrix, stable-surface inventory, frozen-surface manifest, lifecycle/deprecation policy
  - control-artifact index, requirement register joins, decision/dependency ledgers, waiver templates
non_owned_objects:
  - implementation semantics owned by subsystem cards
  - release evidence content, benchmark data, support export content, or command descriptors
entry_points:
  command_entry_points:
    - control artifact validation, protected dependency check, frozen-surface check, scorecard update commands
  event_entry_points:
    - protected path changed, owner missing, waiver opened/expired, frozen surface changed, lifecycle state changed
  schema_or_packet_refs:
    - artifacts/governance/ownership_matrix.yaml
    - artifacts/governance/package_inventory.yaml
    - artifacts/contracts/frozen_surface_manifest.yaml
dependencies:
  allowed_direct:
    - card:quality_benchmark_claims
    - card:record_class_governance
  routed_through:
    all_subsystem_contracts: docs/architecture/subsystem_contract_cards.md
  forbidden_shortcuts:
    - ownerless protected work
    - hidden protected dependency exceptions
    - stable id deprecation without replacement, support-window, docs, and evidence updates
    - waiver or freeze-exception handling only in chat or task-local notes
budgets:
  - budget_ref: artifacts/governance/protected_change_budget.yaml
    obligation: protected-path changes stay inside the approved change budget or waiver path.
  - budget_ref: artifacts/governance/evidence_freshness_slos.yaml
    obligation: governance proof and signoff packets expose stale rows.
failure_modes:
  - mode: owner_gap
    required_behavior: freeze dependent protected work or assign owner; do not mark shared by default.
  - mode: backup_waiver_active
    required_behavior: keep ownership posture yellow/provisional until backup coverage closes.
  - mode: forbidden_dependency_detected
    required_behavior: block or require explicit dependency-rule and review update.
  - mode: lifecycle_break
    required_behavior: require migration, alias, support-window, docs/help, and evidence updates in the same change.
proof_packets:
  - artifacts/governance/ownership_matrix.yaml
  - artifacts/governance/package_inventory.yaml
  - docs/repo/dependency_rules.md
  - docs/architecture/service_topology_and_process_placement.md
  - artifacts/architecture/protected_path_dependency_rules.yaml
  - artifacts/governance/interface_freeze_matrix.yaml
  - artifacts/governance/stable_surface_inventory.yaml
  - docs/governance/interface_lifecycle_policy.md
  - artifacts/contracts/frozen_surface_manifest.yaml
  - tools/ci/validate_contract_artifacts.py
owners:
  owner_dri: "@ahmeddyounis"
  owning_lanes:
    - governance_packets
  protected_packages: []
  backup_owner: null
  backup_waiver: single-maintainer-backup
  review_forums:
    - architecture_council
    - release_council
shared_contract_refs:
  lifecycle_deprecation: card:governance_ownership_lifecycle
  record_classes: card:record_class_governance
  exact_build_identity: card:release_build_identity
freeze_basis_refs:
  - artifacts/governance/interface_freeze_matrix.yaml#repo_topology_and_work_package_ownership
  - artifacts/contracts/frozen_surface_manifest.yaml#repo.protected_path_dependency_rules
explicit_gaps:
  - gap_id: backup_owner_coverage
    status: active_waiver
    impact: protected ownership remains yellow until named backup coverage lands.
  - gap_id: permanent_shell_home
    status: open
    impact: package and shell-host topology remains provisional for the shell lane.

