schema_version: 1
card_id: workspace_vfs_persistence
title: Workspace identity, VFS, persistence, watchers, and recovery lineage
freeze_status: provisional
purpose: >
  Keep file, workspace, save, watcher, restore, cache, and mutation-lineage
  truth centralized so higher-level surfaces never improvise path identity,
  hidden writes, or recovery semantics.
owned_objects:
  - workspace roots, canonical paths, alias sets, path-truth chips, and save-target tokens
  - watcher events, degraded watcher state, polling fallback, and external-change merge prompts
  - save envelopes, rewrite classes, save participants, and durable save outcomes
  - mutation journal, grouped write lineage, recovery checkpoints, restore levels, and state roots
  - VFS cache identity and storage class posture
non_owned_objects:
  - shell rendering or input focus
  - buffer edit operation semantics before save handoff
  - task/test/debug execution, Git history-edit authority, AI context assembly, or release signing
entry_points:
  command_entry_points:
    - open, clone, import, restore, save, save-as, and trust/review commands from command descriptors
  event_entry_points:
    - filesystem or agent watcher events
    - save requested, save planned, save completed, save conflicted, watcher degraded
    - mutation-journal and recovery-checkpoint records
  schema_or_packet_refs:
    - schemas/runtime/vfs_save_envelope.schema.json
    - schemas/workspace/mutation_journal.schema.json
    - docs/fs/path_truth_packet.md
dependencies:
  allowed_direct:
    - card:editor_buffer_text
    - card:rpc_reactive_truth
    - card:settings_effective_configuration
    - card:record_class_governance
    - card:quality_benchmark_claims
  routed_through:
    shell_view_state: card:shell_renderer
    search_and_graph_projection: card:search_navigation_graph
    execution_or_remote_authority: card:execution_context_tooling
    support_export: card:security_policy_support
  forbidden_shortcuts:
    - feature-local path canonicalization or save behavior
    - hidden writes that bypass save-target or policy review
    - shell-inline watcher bootstrap or merge resolution
    - pretending remote and local file semantics are identical without route/capability proof
budgets:
  - budget_ref: artifacts/perf/latency_budget_ledger.yaml#budget.path.editor.save
    obligation: save completes or degrades through a typed outcome without hidden corruption.
  - budget_ref: artifacts/perf/latency_budget_ledger.yaml#budget.path.workspace.restore
    obligation: restore level and latency stay independently reviewable.
  - budget_ref: artifacts/io/save_rewrite_classes.yaml
    obligation: whole-file rewrite or unsupported save behavior is disclosed.
failure_modes:
  - mode: watcher_degraded_or_missing_events
    required_behavior: degrade to polling or reduced metadata fidelity with an explicit state.
  - mode: save_token_mismatch_or_external_change
    required_behavior: require merge/review or conflict path; no silent overwrite.
  - mode: alias_or_case_normalization_drift
    required_behavior: surface alias inspector/path truth and require review before mutation.
  - mode: recovery_checkpoint_unavailable
    required_behavior: narrow recovery claim and preserve the mutation-lineage evidence gap.
proof_packets:
  - docs/adr/0006-vfs-save-cache-identity.md
  - docs/workspace/mutation_lineage_model.md
  - artifacts/fs/save_coordination_examples/README.md
  - artifacts/fs/path_truth_examples/README.md
  - artifacts/io/undo_recovery_examples/README.md
  - artifacts/io/save_rewrite_classes.yaml
  - schemas/runtime/vfs_save_envelope.schema.json
owners:
  owner_dri: "@ahmeddyounis"
  owning_lanes:
    - package:aureline-vfs
  protected_packages:
    - aureline-vfs
  backup_owner: null
  backup_waiver: single-maintainer-backup
  review_forums:
    - architecture_council
    - performance_council
shared_contract_refs:
  command_ids: card:command_plane
  route_truth: card:execution_context_tooling
  record_classes: card:record_class_governance
  settings_ids: card:settings_effective_configuration
  rpc_subscription: card:rpc_reactive_truth
freeze_basis_refs:
  - artifacts/governance/interface_freeze_matrix.yaml#workspace_identity_save_recovery_lineage
  - artifacts/governance/stable_surface_inventory.yaml#runtime.subscription_envelope
explicit_gaps:
  - gap_id: local_history_product_surfaces
    status: seed_only
    impact: compare/restore surfaces and release-grade local-history evidence are not complete.
  - gap_id: remote_file_semantic_parity
    status: provisional
    impact: remote persistence must cite route/capability truth before claiming parity.

