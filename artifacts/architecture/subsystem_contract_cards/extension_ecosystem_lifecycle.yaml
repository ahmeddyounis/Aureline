schema_version: 1
card_id: extension_ecosystem_lifecycle
title: Extension permissions, host worlds, lifecycle, marketplace, and activation budgets
freeze_status: provisional
purpose: >
  Keep third-party and first-party extension power mediated through declared
  permissions, capability worlds, host negotiation, lifecycle states, budget
  rows, quarantine rules, and compatibility labels before ecosystem claims
  widen.
owned_objects:
  - extension manifests, declared/effective permissions, publisher continuity, capability lifecycle, and dependency markers
  - WIT host-world package seeds, host negotiation posture, SDK/publication contract refs
  - activation budget rows, runtime budget reports, quarantine and crash-loop rules
  - registry, mirror, compatibility labels, offline bundle, and install-review vocabulary
non_owned_objects:
  - shell command identity and route truth
  - policy/trust decisions beyond consuming effective policy
  - AI provider routing or direct workspace graph truth
entry_points:
  command_entry_points:
    - extension install, disable, update, quarantine, inspect permission, registry refresh, offline bundle commands
  event_entry_points:
    - manifest read, permission resolved, host negotiated, activation started, budget exceeded
    - extension quarantined, publisher revoked, compatibility label changed, offline bundle imported
  schema_or_packet_refs:
    - schemas/extensions/effective_permission.schema.json
    - schemas/extensions/host_negotiation.schema.json
    - artifacts/extensions/capability_worlds.yaml
dependencies:
  allowed_direct:
    - card:settings_effective_configuration
    - card:security_policy_support
    - card:execution_context_tooling
    - card:governance_ownership_lifecycle
  routed_through:
    command_identity: card:command_plane
    shell_projection: card:shell_renderer
    ai_tools: card:ai_context_runtime
    release_or_registry_identity: card:release_build_identity
  forbidden_shortcuts:
    - ambient network, file, credential, or host powers
    - hidden first-party privilege not visible in capability rows
    - partial loading after incompatible host/world negotiation
    - activation work stealing protected shell/editor budget
budgets:
  - budget_ref: artifacts/extensions/runtime_budget_rows.yaml
    obligation: activation and runtime cost bands stay inspectable and enforceable.
  - budget_ref: artifacts/extensions/quarantine_rules.yaml
    obligation: crash loops or revoked publishers degrade by quarantine/disable paths.
failure_modes:
  - mode: incompatible_host_contract
    required_behavior: refuse or quarantine; do not partially load an ambiguous ABI.
  - mode: budget_or_crash_loop
    required_behavior: quarantine or disable the extension/host without destabilizing the shell.
  - mode: permission_delta_or_revocation
    required_behavior: require install/review flow and policy-visible reason.
proof_packets:
  - docs/adr/0011-capability-lifecycle-and-dependency-markers.md
  - docs/adr/0012-extension-manifest-permission-publisher-policy.md
  - docs/adr/0019-wasm-wit-extension-host-and-capability-worlds.md
  - docs/extensions/runtime_budget_packet.md
  - docs/extensions/sdk_publication_contract.md
  - artifacts/extensions/capability_worlds.yaml
  - artifacts/extensions/runtime_budget_rows.yaml
  - schemas/extensions/effective_permission.schema.json
owners:
  owner_dri: "@ahmeddyounis"
  owning_lanes:
    - governance_packets
  protected_packages: []
  backup_owner: null
  backup_waiver: single-maintainer-backup
  review_forums:
    - compatibility_ecosystem_review
    - security_trust_review
shared_contract_refs:
  command_ids: card:command_plane
  route_truth: card:execution_context_tooling
  settings_ids: card:settings_effective_configuration
  lifecycle_deprecation: card:governance_ownership_lifecycle
  record_classes: card:record_class_governance
freeze_basis_refs:
  - artifacts/governance/stable_surface_inventory.yaml#extensions.wit_host_worlds
  - artifacts/milestones/M0_architecture_pack/coverage_and_freeze_exceptions.yaml#extension_sdk_publication
explicit_gaps:
  - gap_id: publication_pipeline
    status: proposed_only
    impact: SDK surface, publication pipeline, and moderation are not accepted yet.
  - gap_id: sdk_support_window
    status: not_seeded
    impact: stable SDK support-window claims cannot widen.

