schema_version: 1
card_id: remote_collaboration_runtime
title: Remote attach, transport governance, collaboration session authority, and presence
freeze_status: provisional
purpose: >
  Preserve the same logical product contract when work moves across local,
  SSH/container/agent, managed, or collaboration boundaries: explicit route,
  capability, session, authority, reconnect, locality, and audit truth instead
  of alternate remote semantics.
owned_objects:
  - remote attach, tunnel, port-forward, target capability negotiation, route/locality and transport posture
  - collaboration session authority, shared control, presence, follow/presenter state, retention/consent evidence
  - reconnect, relay degraded state, split-brain prevention, and exportable session audit rows
non_owned_objects:
  - VFS save semantics, buffer ownership, command descriptors, or release signing
  - hosted review merge policy and change-stack authority
  - provider-specific identity or billing state beyond route/locality truth
entry_points:
  command_entry_points:
    - remote attach, tunnel, reconnect, share session, end session, grant/revoke control, export session evidence commands
  event_entry_points:
    - capability negotiated, route degraded, connector disconnected, reconnect attempted
    - collaboration session started, downgraded, ended, archived, control grant changed
  schema_or_packet_refs:
    - schemas/remote/attach_session.schema.json
    - schemas/collaboration/session_state.schema.json
    - schemas/collaboration/control_grant.schema.json
dependencies:
  allowed_direct:
    - card:execution_context_tooling
    - card:workspace_vfs_persistence
    - card:rpc_reactive_truth
    - card:security_policy_support
    - card:record_class_governance
  routed_through:
    command_identity: card:command_plane
    shell_projection: card:shell_renderer
    release_or_support_identity: card:release_build_identity
    docs_or_public_truth: card:docs_public_truth
  forbidden_shortcuts:
    - alternate file/network semantics exposed as if they were local contracts
    - freezing local editing during session loss
    - provider/raw endpoint payloads in export or support evidence
    - hosted review or merge semantics inferred from collaboration/session packets
budgets:
  - budget_ref: artifacts/network/proxy_lab_matrix.yaml
    obligation: transport and proxy behavior remains explicit for enterprise/lab claims.
  - budget_ref: artifacts/runtime/restart_budgets.yaml
    obligation: connector failures degrade remote state without destabilizing local shell.
failure_modes:
  - mode: remote_disconnect_or_relay_partition
    required_behavior: local shell stays usable; session/remote state becomes degraded, resumable, and auditable.
  - mode: capability_mismatch
    required_behavior: deny or narrow action with route and capability reason.
  - mode: collaboration_anchor_drift
    required_behavior: mark drift and require review before asserting shared-control exactness.
proof_packets:
  - docs/adr/0020-remote-agent-contract.md
  - docs/remote/attach_tunnel_port_forward_contract.md
  - docs/runtime/origin_target_route_taxonomy.md
  - docs/architecture/collaboration_session_layer_adr.md
  - docs/collaboration/session_authority_contract.md
  - docs/collaboration/shared_control_contract.md
  - docs/collaboration/consent_retention_contract.md
  - schemas/collaboration/session_state.schema.json
  - artifacts/remote/host_boundary_matrix.yaml
owners:
  owner_dri: "@ahmeddyounis"
  owning_lanes:
    - governance_packets
  protected_packages:
    - aureline-rpc
  backup_owner: null
  backup_waiver: single-maintainer-backup
  review_forums:
    - architecture_council
    - security_trust_review
shared_contract_refs:
  command_ids: card:command_plane
  route_truth: card:execution_context_tooling
  record_classes: card:record_class_governance
  rpc_subscription: card:rpc_reactive_truth
  exact_build_identity: card:release_build_identity
  lifecycle_deprecation: card:governance_ownership_lifecycle
freeze_basis_refs:
  - artifacts/governance/interface_freeze_matrix.yaml#collaboration_session_and_presence_contracts
  - artifacts/governance/interface_freeze_matrix.yaml#docs_route_and_exact_build_truth
explicit_gaps:
  - gap_id: live_relay_and_service_implementation
    status: implementation_pending
    impact: contracts are seeded/frozen, but live service and relay implementation remain separate work.
  - gap_id: hosted_review_merge_policy
    status: blocked
    impact: review/change-stack authority must not be inferred from remote/collaboration contracts.

