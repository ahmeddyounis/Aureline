schema_version: 1
card_id: execution_context_tooling
title: Execution context, tooling, terminal, debug, target, and route truth
freeze_status: provisional
purpose: >
  Resolve where an action runs, which target it affects, which authority and
  environment apply, and how task/test/debug/terminal/Git outcomes become
  supportable evidence without shell-local process launches or ambiguous route
  truth.
owned_objects:
  - execution-context ids, scope descriptors, environment provenance, degraded-field reasons
  - origin, target, route, exposure, approval, and traffic-origin truth for runtime actions
  - target discovery confidence, managed-workspace lifecycle cues, and wrong-target reapproval posture
  - terminal, task, test, debug, Git-helper, and artifact-attribution launch intents
non_owned_objects:
  - command descriptor identity and palette/menu projection
  - VFS path authority and save outcomes
  - provider-specific AI routing, extension host permissions, or release signing
entry_points:
  command_entry_points:
    - task, test, debug, terminal, Git, target-discovery, and environment-inspect commands
  event_entry_points:
    - execution context resolved, launch requested, target discovered, approval required
    - task/test/debug/terminal session started, stopped, failed, degraded, or exported
  schema_or_packet_refs:
    - schemas/runtime/execution_context.schema.json
    - artifacts/runtime/action_origin_target_labels.yaml
    - docs/runtime/origin_target_route_taxonomy.md
dependencies:
  allowed_direct:
    - card:command_plane
    - card:workspace_vfs_persistence
    - card:rpc_reactive_truth
    - card:settings_effective_configuration
    - card:security_policy_support
  routed_through:
    shell_projection: card:shell_renderer
    support_export: card:security_policy_support
    remote_targets: card:remote_collaboration_runtime
    ai_tool_plans: card:ai_context_runtime
  forbidden_shortcuts:
    - ad hoc process launch from shell, extension, or feature-local code
    - task/test/debug/Git state without route, target, scope, and provenance
    - silently widening an execution scope or degraded field
    - raw command lines, environment bodies, secrets, or provider payloads crossing support boundaries
budgets:
  - budget_ref: artifacts/runtime/queue_lane_matrix.yaml
    obligation: launch and helper work uses the declared queue lane rather than protected input budget.
  - budget_ref: artifacts/runtime/restart_budgets.yaml
    obligation: helper crash or stall behavior is bounded and surfaced.
failure_modes:
  - mode: wrong_target_or_changed_context
    required_behavior: block or require reapproval with route/target evidence.
  - mode: execution_context_incomplete
    required_behavior: surface typed degraded fields and narrow available actions.
  - mode: adapter_or_helper_unavailable
    required_behavior: fall back from native protocol to structured adapter to heuristic parser with confidence labels where allowed.
  - mode: task_event_semantics_missing
    required_behavior: keep the card provisional and avoid stable task/test/debug claims.
proof_packets:
  - docs/adr/0009-execution-context-and-scope.md
  - docs/runtime/execution_context_vocabulary.md
  - docs/runtime/origin_target_route_taxonomy.md
  - docs/execution/context_inspector_packet.md
  - artifacts/execution/context_examples/README.md
  - artifacts/runtime/action_origin_target_labels.yaml
  - schemas/runtime/execution_context.schema.json
owners:
  owner_dri: "@ahmeddyounis"
  owning_lanes:
    - governance_packets
  protected_packages: []
  backup_owner: null
  backup_waiver: single-maintainer-backup
  review_forums:
    - architecture_council
    - security_trust_review
shared_contract_refs:
  command_ids: card:command_plane
  route_truth: card:execution_context_tooling
  settings_ids: card:settings_effective_configuration
  record_classes: card:record_class_governance
  rpc_subscription: card:rpc_reactive_truth
freeze_basis_refs:
  - artifacts/governance/interface_freeze_matrix.yaml#operator_truth_search_safety_and_install_review
  - artifacts/governance/interface_freeze_matrix.yaml#ipc_event_and_reactive_truth
  - artifacts/governance/stable_surface_inventory.yaml#runtime.execution_context_records
explicit_gaps:
  - gap_id: unified_task_test_debug_events
    status: partial_seed
    impact: terminal/run/test/debug semantics remain frozen only at execution-context and route-truth level.

