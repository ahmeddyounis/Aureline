schema_version: 1
card_id: security_policy_support
title: Security, policy, identity, supportability, redaction, and incident intake
freeze_status: provisional
purpose: >
  Keep trust state, policy decisions, secrets, credentials, support export,
  safe mode, redaction, security intake, and incident evidence inspectable and
  recoverable without hidden privilege widening or raw sensitive data crossing
  support boundaries.
owned_objects:
  - workspace trust, policy explanation, locked settings, safe mode, emergency/security posture
  - secret broker, credential-handle classes, trust-store classes, and redaction defaults
  - support bundle, object handoff, Project Doctor, recovery ladder, repair transaction, and reconstruction packets
  - security severity vocabulary, advisory record, incident workspace packet, and emergency action seeds
non_owned_objects:
  - exact-build identity and release promotion
  - command descriptor identity and route origin taxonomy
  - record-class registry ownership
  - extension host ABI and SDK versioning
entry_points:
  command_entry_points:
    - support bundle, doctor, safe mode, policy explain, trust review, credential review, security report commands
  event_entry_points:
    - policy denied, trust narrowed, support export requested, redaction profile applied
    - incident packet opened, severity assigned, emergency action linked, recovery action completed
  schema_or_packet_refs:
    - schemas/support/support_bundle.schema.json
    - schemas/support/object_handoff_packet.schema.json
    - schemas/security/advisory_record.schema.json
    - schemas/security/incident_workspace_packet.schema.json
dependencies:
  allowed_direct:
    - card:settings_effective_configuration
    - card:record_class_governance
    - card:execution_context_tooling
    - card:release_build_identity
    - card:governance_ownership_lifecycle
  routed_through:
    shell_or_command_projection: card:shell_renderer
    command_identity: card:command_plane
    extension_capabilities: card:extension_ecosystem_lifecycle
    remote_route_or_transport: card:remote_collaboration_runtime
    ai_evidence_or_provider_state: card:ai_context_runtime
  forbidden_shortcuts:
    - hidden privilege escalation or silent telemetry widening
    - raw secret, raw credential, raw source, or raw provider payload export without explicit widened capture
    - support or incident packets assembled outside the support/diagnostic owner
    - severity or incident routing that bypasses the security intake vocabulary
budgets:
  - budget_ref: artifacts/support/diagnosis_latency_scoreboard.yaml
    obligation: support paths preserve time-to-diagnosis evidence.
  - budget_ref: artifacts/security/redaction_posture_matrix.yaml
    obligation: support and incident exports remain redaction-aware by default.
  - budget_ref: artifacts/governance/evidence_freshness_slos.yaml
    obligation: support/security proof cannot silently age into green readiness.
failure_modes:
  - mode: policy_or_trust_denial
    required_behavior: deny with inspectable reason and recovery path; do not widen locally.
  - mode: redaction_uncertain
    required_behavior: block or require explicit include-samples consent and packet review.
  - mode: incident_routing_incomplete
    required_behavior: keep intake seed provisional and do not claim live monitored response.
  - mode: support_bundle_source_mismatch
    required_behavior: require exact-build and route evidence before field diagnosis claim.
proof_packets:
  - docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md
  - docs/security/severity_matrix.md
  - docs/security/emergency_action_model.md
  - docs/support/support_bundle_contract.md
  - docs/support/object_handoff_packet.md
  - docs/support/project_doctor_packet.md
  - docs/support/recovery_ladder_packet.md
  - fixtures/support/supportability_cases/manifest.yaml
  - schemas/security/incident_workspace_packet.schema.json
owners:
  owner_dri: "@ahmeddyounis"
  owning_lanes:
    - support_export
    - governance_packets
  protected_packages:
    - aureline-telemetry
  backup_owner: null
  backup_waiver: single-maintainer-backup
  review_forums:
    - security_trust_review
    - release_council
shared_contract_refs:
  exact_build_identity: card:release_build_identity
  command_ids: card:command_plane
  route_truth: card:execution_context_tooling
  record_classes: card:record_class_governance
  settings_ids: card:settings_effective_configuration
  lifecycle_deprecation: card:governance_ownership_lifecycle
freeze_basis_refs:
  - artifacts/governance/interface_freeze_matrix.yaml#incident_intake_and_workspace_packet
  - artifacts/milestones/M0_architecture_pack/coverage_and_freeze_exceptions.yaml#security_intake_baseline
explicit_gaps:
  - gap_id: live_monitored_contact_path
    status: deferred
    impact: intake vocabulary is seeded, but live incident routing remains future work.
  - gap_id: operational_incident_tooling
    status: deferred
    impact: support and release incident handoff tooling is not green.

