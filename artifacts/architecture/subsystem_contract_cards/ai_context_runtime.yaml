schema_version: 1
card_id: ai_context_runtime
title: AI context assembly, provider routing, evidence, budget, and taint fences
freeze_status: provisional
purpose: >
  Keep AI context assembly, provider/model routing, omitted/pinned context,
  tool plans, evidence packets, spend truth, and tainted-content handling
  inspectable so AI help cannot silently crawl, mutate, spend, or egress beyond
  policy.
owned_objects:
  - AI context assembly records, included/omitted/pinned context, evidence packets, and taint fences
  - provider/model registry, rollout states, budget bands, route/spend truth, and provider handoff posture
  - tool-plan review, apply/revert evidence, and audit links
non_owned_objects:
  - command descriptors and route/origin taxonomy
  - workspace graph, VFS identity, or task execution mechanics
  - record-class registry and policy/identity decisions
entry_points:
  command_entry_points:
    - AI explain, chat, inline assist, propose patch, tool plan, evidence export, provider select commands
  event_entry_points:
    - context assembled, context omitted, provider route selected, budget checked, tool plan proposed
    - evidence packet captured, tainted content blocked, apply/revert requested
  schema_or_packet_refs:
    - schemas/ai/context_assembly.schema.json
    - schemas/ai/evidence_packet.schema.json
    - artifacts/ai/model_rollout_states.yaml
dependencies:
  allowed_direct:
    - card:search_navigation_graph
    - card:execution_context_tooling
    - card:command_plane
    - card:security_policy_support
    - card:record_class_governance
  routed_through:
    workspace_file_truth: card:workspace_vfs_persistence
    shell_projection: card:shell_renderer
    exact_build_or_release_evidence: card:release_build_identity
    extension_tools: card:extension_ecosystem_lifecycle
  forbidden_shortcuts:
    - raw workspace traversal outside context assembly and policy checks
    - hidden edits or provider/tool calls without audit and approval posture
    - direct credential access or unclassified network egress
    - treating AI-inferred ownership or result truth as curated fact
budgets:
  - budget_ref: docs/ai/model_graduation_and_budget_contract.md
    obligation: AI routes stay inside declared budget and graduation state.
  - budget_ref: artifacts/ai/model_rollout_states.yaml
    obligation: model availability and rollout state remain inspectable before invocation.
failure_modes:
  - mode: provider_unavailable_or_over_budget
    required_behavior: degrade to explain-only, local-only, or disabled with reason.
  - mode: tainted_or_untrusted_context
    required_behavior: omit, fence, or require explicit review before use.
  - mode: hidden_mutation_risk
    required_behavior: block apply until command, route, and approval evidence exist.
proof_packets:
  - docs/ai/context_assembly_contract.md
  - docs/ai/evidence_replayability_contract.md
  - docs/ai/model_graduation_and_budget_contract.md
  - docs/ai/provider_model_registry_contract.md
  - schemas/ai/context_assembly.schema.json
  - schemas/ai/evidence_packet.schema.json
  - artifacts/ai/model_rollout_states.yaml
owners:
  owner_dri: "@ahmeddyounis"
  owning_lanes:
    - governance_packets
  protected_packages: []
  backup_owner: null
  backup_waiver: single-maintainer-backup
  review_forums:
    - security_trust_review
    - architecture_council
shared_contract_refs:
  command_ids: card:command_plane
  route_truth: card:execution_context_tooling
  record_classes: card:record_class_governance
  settings_ids: card:settings_effective_configuration
  lifecycle_deprecation: card:governance_ownership_lifecycle
freeze_basis_refs:
  - artifacts/governance/interface_freeze_matrix.yaml#ai_provider_context_assembly_and_route_truth
explicit_gaps:
  - gap_id: provider_arbitration
    status: deferred
    impact: broad language-provider and AI provider arbitration remains a later contract family.
  - gap_id: branch_agent_policy
    status: deferred
    impact: long-running branch-agent widening remains out of scope for this freeze.

