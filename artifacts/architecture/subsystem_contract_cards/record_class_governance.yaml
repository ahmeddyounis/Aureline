schema_version: 1
card_id: record_class_governance
title: Record-class registry, retention, export, delete, hold, and chronology posture
freeze_status: frozen
purpose: >
  Provide one record-class vocabulary for retention, export, delete, legal
  hold, offboarding, support export, managed copies, and chronology so support,
  release, collaboration, AI, and governance packets do not invent private data
  handling labels.
owned_objects:
  - record class ids, schema version, delete posture, export posture, hold posture, retention posture
  - chronology and record-state policy simulation vocabulary where packets cite record classes
  - registry evolution, replacement rows, and downstream packet update requirements
non_owned_objects:
  - the content of support, AI, collaboration, telemetry, or incident records
  - exact-build identity, route truth, or command ids
entry_points:
  command_entry_points:
    - export, delete, hold, offboarding, support bundle, incident export, AI evidence retention commands
  event_entry_points:
    - record class registered, export requested, delete denied, hold applied, retention expired, chronology packet emitted
  schema_or_packet_refs:
    - artifacts/governance/record_class_registry.yaml
    - schemas/governance/record_class.schema.json
    - schemas/governance/record_state.schema.json
dependencies:
  allowed_direct:
    - card:governance_ownership_lifecycle
    - card:settings_effective_configuration
  routed_through:
    support_export: card:security_policy_support
    release_or_exact_build: card:release_build_identity
    ai_evidence: card:ai_context_runtime
    collaboration_exports: card:remote_collaboration_runtime
    docs_public_copy: card:docs_public_truth
  forbidden_shortcuts:
    - private retention, export, delete, or hold labels
    - support/export claims when a row is missing or incompatible
    - deleting or replacing a class without successor row and downstream packet updates
budgets:
  - budget_ref: docs/governance/interface_lifecycle_policy.md
    obligation: record ids follow stable-id lifecycle and deprecation rules.
  - budget_ref: artifacts/governance/evidence_freshness_slos.yaml
    obligation: claim-bearing record/export proof must stay current.
failure_modes:
  - mode: record_class_missing
    required_behavior: refuse export/delete/support claim rather than defaulting privately.
  - mode: hold_or_delete_conflict
    required_behavior: surface hold/delete posture and policy source.
  - mode: schema_epoch_incompatible
    required_behavior: fail closed until migration or compatibility row resolves.
proof_packets:
  - artifacts/governance/record_class_registry.yaml
  - docs/governance/record_class_governance.md
  - docs/governance/record_state_and_policy_simulation_models.md
  - schemas/governance/record_class.schema.json
  - schemas/governance/record_state.schema.json
  - artifacts/governance/stable_surface_inventory.yaml#governance.record_class_registry_rows
owners:
  owner_dri: "@ahmeddyounis"
  owning_lanes:
    - governance_packets
  protected_packages: []
  backup_owner: null
  backup_waiver: single-maintainer-backup
  review_forums:
    - security_trust_review
    - release_council
shared_contract_refs:
  lifecycle_deprecation: card:governance_ownership_lifecycle
  settings_ids: card:settings_effective_configuration
  exact_build_identity: card:release_build_identity
freeze_basis_refs:
  - artifacts/governance/stable_surface_inventory.yaml#governance.record_class_registry_rows
  - artifacts/milestones/M0_architecture_pack/coverage_and_freeze_exceptions.yaml#notification_and_chronology_primitives
explicit_gaps: []

