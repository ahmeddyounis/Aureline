schema_version: 1
card_id: quality_benchmark_claims
title: Benchmark lab, protected metrics, certification, and claim publication
freeze_status: provisional
purpose: >
  Keep performance, correctness, compatibility, certification, and claim
  evidence tied to protected paths, corpora, current proof packets, freshness
  rules, and explicit waivers before any stable or launch-bearing claim widens.
owned_objects:
  - protected path ledger, latency budget ledger, warm-path budget ledger, and evidence-linkage seed
  - benchmark corpus governance, protected metrics, fitness catalog, quarantine and variance rules
  - certification/qualification matrix rows and claim publication proof joins
  - evidence freshness, rerun triggers, benchmark dashboard seed, and scorecard evidence rows
non_owned_objects:
  - implementation of shell, editor, VFS, search, release, or support features
  - release artifact identity, signing, and promotion decisions
  - command, route, settings, or record-class vocabulary
entry_points:
  command_entry_points:
    - bench run, certification run, proof packet assemble, claim manifest update, evidence rerun commands
  event_entry_points:
    - benchmark captured, variance classified, quarantine applied, evidence stale, proof packet reviewed
  schema_or_packet_refs:
    - artifacts/perf/protected_path_ledger.yaml
    - artifacts/bench/fitness_function_catalog.yaml
    - schemas/governance/evidence_packet_header.schema.json
dependencies:
  allowed_direct:
    - card:shell_renderer
    - card:editor_buffer_text
    - card:workspace_vfs_persistence
    - card:release_build_identity
    - card:governance_ownership_lifecycle
  routed_through:
    route_or_execution_context: card:execution_context_tooling
    exact_build_identity: card:release_build_identity
    docs_claim_publication: card:docs_public_truth
  forbidden_shortcuts:
    - public or stable claim from seed-only dashboard data
    - stale evidence treated as current
    - benchmark or proof rows without owner, threshold, data source, cadence, and waiver path
budgets:
  - budget_ref: artifacts/perf/protected_path_ledger.yaml
    obligation: protected paths remain stable citation ids for journey and benchmark evidence.
  - budget_ref: artifacts/perf/latency_budget_ledger.yaml
    obligation: path-level thresholds and waiver authority stay explicit.
  - budget_ref: artifacts/governance/evidence_freshness_slos.yaml
    obligation: stale claim-bearing evidence fails review or narrows the claim.
failure_modes:
  - mode: hardware_baseline_missing
    required_behavior: keep benchmark governance provisional and disclose seed-only scope.
  - mode: stale_or_quarantined_run
    required_behavior: mark claim yellow/blocked until rerun or accepted waiver lands.
  - mode: protected_path_budget_breach
    required_behavior: block widening or require time-bounded waiver and correction plan.
proof_packets:
  - artifacts/bench/fitness_function_catalog.yaml
  - artifacts/bench/protected_metrics.yaml
  - artifacts/perf/protected_path_ledger.yaml
  - artifacts/perf/latency_budget_ledger.yaml
  - artifacts/perf/warm_path_budget_ledger.yaml
  - artifacts/benchmarks/dashboard_seed/dashboard.json
  - docs/benchmarks/corpus_governance.md
  - docs/governance/benchmark_council_charter.md
owners:
  owner_dri: "@ahmeddyounis"
  owning_lanes:
    - benchmark_lab
  protected_packages:
    - aureline-telemetry
  backup_owner: null
  backup_waiver: single-maintainer-backup
  review_forums:
    - performance_council
    - release_council
shared_contract_refs:
  exact_build_identity: card:release_build_identity
  route_truth: card:execution_context_tooling
  lifecycle_deprecation: card:governance_ownership_lifecycle
freeze_basis_refs:
  - artifacts/governance/interface_freeze_matrix.yaml#benchmark_hardware_corpus_and_fit_catalog
explicit_gaps:
  - gap_id: council_approved_hardware_baseline
    status: open
    impact: benchmark rows are usable but not green release-grade evidence.

