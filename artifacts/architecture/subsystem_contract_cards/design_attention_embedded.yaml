schema_version: 1
card_id: design_attention_embedded
title: Design tokens, durable attention, activity rows, and embedded boundaries
freeze_status: frozen
purpose: >
  Keep shell visual vocabulary, component states, layer/scrim semantics,
  durable work, interruptibility, quiet-hours, and embedded owner/origin
  boundaries consistent instead of letting surfaces invent local UI truth.
owned_objects:
  - design token vocabulary, component-state taxonomy, theme support rows, and layer/scrim tokens
  - durable job/activity rows, quiet-hours policy, interruptibility tiers, dedupe lineage, and reopen semantics
  - embedded surface boundary records, owner/origin chrome, degraded states, and native-reserved approval boundaries
non_owned_objects:
  - command ids, route truth, and execution approval records
  - accessibility claim-bearing evidence and locale-pack lifecycle proof
  - docs content or release evidence identity
entry_points:
  command_entry_points:
    - activity open, job details, cancel/retry, embedded auth handoff, help/service route commands
  event_entry_points:
    - activity/job row created, phase changed, quiet-hours rule applied, embedded boundary degraded
    - owner/origin chrome rendered, auth handoff requested
  schema_or_packet_refs:
    - schemas/design/token_export_manifest.schema.json
    - schemas/ux/activity_event_envelope.schema.json
    - schemas/ux/job_row.schema.json
    - schemas/ux/embedded_surface_boundary.schema.json
dependencies:
  allowed_direct:
    - card:command_plane
    - card:execution_context_tooling
    - card:settings_effective_configuration
    - card:security_policy_support
  routed_through:
    shell_rendering: card:shell_renderer
    docs_help_routes: card:docs_public_truth
    exact_build_truth: card:release_build_identity
  forbidden_shortcuts:
    - one-off component state names, warning colors, or local token forks
    - toast-only truth for durable or reviewable work
    - embedded webview/auth surfaces without owner/origin chrome and system-browser handoff rules
budgets:
  - budget_ref: artifacts/design/theme_support_rows.yaml
    obligation: theme and contrast posture stays explicit for launch-critical shell rows.
  - budget_ref: artifacts/ux/quiet_hours_policy_matrix.yaml
    obligation: attention routing honors quiet-hours and interruptibility semantics.
failure_modes:
  - mode: durable_job_degraded
    required_behavior: show durable activity state with actor/subsystem, phase, and retry/open details where possible.
  - mode: embedded_auth_or_origin_unclear
    required_behavior: degrade or hand off to system browser; never hide owner/origin boundary.
  - mode: accessibility_or_locale_proof_missing
    required_behavior: keep accessibility/locale claim rows blocked or exception-scoped.
proof_packets:
  - docs/design/design_token_component_state_vocabulary.md
  - artifacts/design/theme_support_rows.yaml
  - artifacts/design/layer_and_scrim_tokens.yaml
  - docs/ux/attention_activity_taxonomy.md
  - artifacts/ux/quiet_hours_policy_matrix.yaml
  - docs/adr/0015-embedded-surface-boundary-and-auth-handoff.md
  - schemas/ux/embedded_surface_boundary.schema.json
owners:
  owner_dri: "@ahmeddyounis"
  owning_lanes:
    - design_system_seeds
    - accessibility_input_review
  protected_packages: []
  backup_owner: null
  backup_waiver: single-maintainer-backup
  review_forums:
    - accessibility_review
    - architecture_council
shared_contract_refs:
  command_ids: card:command_plane
  route_truth: card:execution_context_tooling
  settings_ids: card:settings_effective_configuration
  record_classes: card:record_class_governance
  lifecycle_deprecation: card:governance_ownership_lifecycle
freeze_basis_refs:
  - artifacts/governance/interface_freeze_matrix.yaml#design_token_and_component_state_vocabulary
  - artifacts/governance/interface_freeze_matrix.yaml#attention_routing_and_activity_taxonomy
  - artifacts/governance/interface_freeze_matrix.yaml#embedded_surface_boundary_and_auth_handoff
explicit_gaps:
  - gap_id: accessibility_locale_claim_proof
    status: blocked_from_green
    impact: accessibility and locale review lanes are seeded but not claim-bearing green evidence.

