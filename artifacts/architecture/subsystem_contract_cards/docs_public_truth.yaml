schema_version: 1
card_id: docs_public_truth
title: Docs packs, Help/About, service health, and public truth
freeze_status: provisional
purpose: >
  Keep docs, Help/About, service-health, mirrored docs, generated reference,
  stale-example handling, and public claim copy tied to source identity,
  freshness, command ids, route truth, and exact-build identity.
owned_objects:
  - docs-pack manifest records, freshness states, publishable blockers, mirror lineage, and citation posture
  - Help/About/service-health route vocabulary and badge truth
  - stale-example rules and reviewed-pack/late-copy policy
  - public-truth parity and docs/support destination descriptor seeds
non_owned_objects:
  - exact-build identity field ownership
  - command descriptor ids and invocation evidence
  - record-class registry and retention/export semantics
  - release evidence signing and promotion gates
entry_points:
  command_entry_points:
    - open help, open docs pack, report docs feedback, About/build info, service-health commands
  event_entry_points:
    - docs pack published, pack stale, pack blocked, mirror drift detected, late-copy packet applied
  schema_or_packet_refs:
    - schemas/docs/docs_pack_manifest.schema.json
    - schemas/docs/help_status_badge.schema.json
    - artifacts/docs/stale_example_rules.yaml
dependencies:
  allowed_direct:
    - card:command_plane
    - card:release_build_identity
    - card:record_class_governance
    - card:governance_ownership_lifecycle
  routed_through:
    shell_projection: card:shell_renderer
    service_route_truth: card:execution_context_tooling
    support_handoff: card:security_policy_support
  forbidden_shortcuts:
    - rendering stale, blocked, quarantined, or incompatible docs as authoritative
    - public claim copy that bypasses claim manifest, exact build, or release evidence
    - docs/help route ids that diverge from command and route truth
budgets:
  - budget_ref: artifacts/governance/evidence_freshness_slos.yaml
    obligation: claim-bearing docs evidence fails stale instead of silently passing.
  - budget_ref: artifacts/docs/stale_example_rules.yaml
    obligation: stale examples stay visible and reviewable.
failure_modes:
  - mode: docs_pack_stale_or_blocked
    required_behavior: downgrade render authority and show freshness/blocker state.
  - mode: exact_build_mismatch
    required_behavior: avoid authoritative Help/About claim until build identity resolves.
  - mode: mirror_or_generated_reference_drift
    required_behavior: show mirror/generated lineage state and route to support/report path.
proof_packets:
  - docs/adr/0013-docs-help-service-health-truth.md
  - docs/docs/docs_pack_manifest_contract.md
  - docs/docs/reviewed_pack_and_late_copy_policy.md
  - docs/docs/help_about_service_health_routes.md
  - artifacts/docs/stale_example_rules.yaml
  - artifacts/governance/public_truth_parity_matrix.yaml
  - artifacts/contracts/frozen_surface_manifest.yaml#docs.docs_pack_manifest
owners:
  owner_dri: "@ahmeddyounis"
  owning_lanes:
    - docs_public_truth
  protected_packages: []
  backup_owner: null
  backup_waiver: single-maintainer-backup
  review_forums:
    - open_community_sync
    - release_council
shared_contract_refs:
  exact_build_identity: card:release_build_identity
  command_ids: card:command_plane
  route_truth: card:execution_context_tooling
  record_classes: card:record_class_governance
  lifecycle_deprecation: card:governance_ownership_lifecycle
freeze_basis_refs:
  - artifacts/governance/interface_freeze_matrix.yaml#docs_route_and_exact_build_truth
  - artifacts/governance/stable_surface_inventory.yaml#docs.docs_pack_manifest
explicit_gaps:
  - gap_id: exact_build_join
    status: open
    impact: docs/help exact-build joins are not green.
  - gap_id: stale_example_enforcement
    status: seed_only
    impact: stale-example policy exists but enforcement remains carry-forward.

