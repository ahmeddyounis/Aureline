# Protected journey traceability map.
#
# One join table linking:
#   - business/product drivers and hard constraints (TAD §3.1 + §3.3),
#   - quality-attribute drivers (TAD §3.2),
#   - quality-attribute SLO rows (artifacts/architecture/quality_attribute_slos.yaml),
#   - protected-path ids + budgets + evidence lanes (artifacts/perf/*),
#   - QE scenario ids (artifacts/qe/quality_scenario_hooks.yaml), and
#   - rejected patterns / prohibited shortcuts (artifacts/architecture/driver_to_rejected_pattern_refs.yaml).
#
# This file intentionally does NOT replace the protected-path ledgers, budget
# ledgers, fitness catalog, or QE registry. It is the traceability join that
# lets a reviewer challenge a claim or architecture exception against named
# driver rows and named evidence lanes without re-interpreting prose.

schema_version: 1
artifact_id: aureline.protected_journey_traceability_map
title: Driver ↔ SLO ↔ protected journey evidence join
overview_document: docs/architecture/driver_traceability_matrix.md

companion_refs:
  quality_attribute_slos_ref: artifacts/architecture/quality_attribute_slos.yaml
  rejected_patterns_ref: artifacts/architecture/driver_to_rejected_pattern_refs.yaml
  fitness_function_catalog_ref: artifacts/bench/fitness_function_catalog.yaml
  protected_path_ledger_ref: artifacts/perf/protected_path_ledger.yaml
  latency_budget_ledger_ref: artifacts/perf/latency_budget_ledger.yaml
  evidence_linkage_seed_ref: artifacts/perf/evidence_linkage_seed.yaml
  critical_sequence_latencies_ref: artifacts/perf/critical_sequence_latencies.yaml
  quality_scenario_hooks_ref: artifacts/qe/quality_scenario_hooks.yaml
  m0_architecture_pack_ref: artifacts/milestones/M0_architecture_pack/
  correction_trigger_table_ref: artifacts/governance/correction_trigger_table.yaml
  ownership_matrix_ref: artifacts/governance/ownership_matrix.yaml

critical_path_epoch_vocabulary:
  - foundations_seed
  - implementation_alpha

row_status_vocabulary:
  - seeded
  - provisional

# -----------------------------------------------------------------------------
# Driver vocabulary (stable ids).
# -----------------------------------------------------------------------------
business_drivers:
  - driver_id: bd.beat_incumbent_tradeoffs
    title: Beat incumbent trade-offs
    source_ref: .t2/docs/Aureline_Technical_Architecture_Document.md §3.1
  - driver_id: bd.win_switching_moments
    title: Win specific switching moments
    source_ref: .t2/docs/Aureline_Technical_Architecture_Document.md §3.1
  - driver_id: bd.open_and_portable
    title: Remain open and portable
    source_ref: .t2/docs/Aureline_Technical_Architecture_Document.md §3.1
  - driver_id: bd.enterprise_deployment_scale
    title: Scale from individual use to enterprise deployment
    source_ref: .t2/docs/Aureline_Technical_Architecture_Document.md §3.1

hard_constraints:
  - constraint_id: hc.native_desktop_shell
    title: Native desktop flagship
    source_ref: .t2/docs/Aureline_Technical_Architecture_Document.md §3.3
  - constraint_id: hc.no_blocking_io_on_ui_hot_path
    title: UI hot path performs no blocking I/O
    source_ref: .t2/docs/Aureline_Technical_Architecture_Document.md §3.3
  - constraint_id: hc.no_mandatory_hosted_service_for_core_workflows
    title: Core workflows remain available without mandatory hosted services
    source_ref: .t2/docs/Aureline_Technical_Architecture_Document.md §3.3
  - constraint_id: hc.unified_command_and_execution_contracts
    title: Automation/CLI/AI/extensions use shared command + execution contracts
    source_ref: .t2/docs/Aureline_Technical_Architecture_Document.md §3.3
  - constraint_id: hc.multi_deployment_modes_supported
    title: Supports local/remote/managed/self-hosted/air-gapped modes
    source_ref: .t2/docs/Aureline_Technical_Architecture_Document.md §3.3
  - constraint_id: hc.signed_mirrorable_revocable_artifacts
    title: Extension and update artifacts are signed, mirrorable, revocable
    source_ref: .t2/docs/Aureline_Technical_Architecture_Document.md §3.3
  - constraint_id: hc.monthly_release_with_optional_lts
    title: Monthly stable releases and optional LTS lines
    source_ref: .t2/docs/Aureline_Technical_Architecture_Document.md §3.3

# -----------------------------------------------------------------------------
# Journey rows.
#
# For seeded protected paths, SLI targets and evidence refs come from the
# perf ledgers (latency_budget_ledger + evidence_linkage_seed).
# For provisional future journeys, this join records the driver/SLO intent
# and the seeded evidence lanes (QE scenarios, sequence packs) that must be
# wired before claims widen.
# -----------------------------------------------------------------------------
journey_rows:
