    hard_constraint_refs:
      - hc.native_desktop_shell
      - hc.no_blocking_io_on_ui_hot_path
      - hc.no_mandatory_hosted_service_for_core_workflows
    quality_attribute_driver_refs:
      - latency
      - recoverability
    primary_sli: first_paint_warm_ms
    targets:
      release_bar_ms: 150
      source_ref: artifacts/perf/latency_budget_ledger.yaml#budget.path.shell.launch
    degradation_posture_ref: artifacts/perf/latency_budget_ledger.yaml#budget.path.shell.launch
    measurement_lane_ref: lane:benchmark_lab
    journey_owner_refs:
      - lane:shell_command_system
      - package:aureline-render
    evidence_row_ref: evidence.path.shell.launch
    benchmark_corpus_refs:
      - corpus.workflow.startup_warm_to_first_paint
      - corpus.reference.micro_local_folder
    fitness_function_refs:
      - ff.warm_start_to_first_paint
      - ff.first_paint
    quality_scenario_refs: []
    architecture_pack_refs:
      - artifacts/milestones/M0_architecture_pack/canonical_matrices.yaml
      - artifacts/milestones/M0_architecture_pack/packet_index.yaml
    release_evidence_packet_refs:
      - docs/release/release_evidence_packet_template.md
    waiver_and_descope_consequences:
      waiver_authority_ref: performance_council
      waiver_packet_expected: true
      correction_trigger_refs:
        - corr.protected_waiver_rebaseline
      consequence_notes: >
        Release-grade claims that cite this bar require current evidence or a
        time-bounded waiver; repeated waivers trigger rebaseline routing.
    rejected_pattern_refs:
      - rp.blocking_io_on_hot_path
      - rp.optional_service_on_core_path

