    runtime_notes: >
      Logs, traces, perf counters, support bundles. Bounded retention
      and non-blocking writes; a slow collector never backs up onto
      protected paths.

# Host-class invariants. Downstream tooling joins to these rules by id.
invariants:
  - id: shell_owned_state_is_authoritative
    summary: >
      Host classes other than desktop_shell MUST NOT mutate shell-owned
      view state, focus, caret/selection, or local layout through shared
      memory, globals, or side channels. Visible-state changes arrive
      through typed RPC or subscription envelopes.
  - id: worker_owned_state_is_disposable_unless_declared_knowledge
    summary: >
      Cache, hot-set, and derived-artifact state on worker pools is
      disposable. Canonical-path identity, save-pipeline truth, and
      watcher state are declared worker_owned_authoritative_knowledge
      and surface a freshness lane rather than overwrite shell state.
  - id: supervisor_never_owns_content
    summary: >
      The local supervisor owns lifecycle and typed RPC routing. It MUST
      NOT own workspace content, visible view state, or provider
      conversation state.
  - id: helper_sessions_isolate_failure
    summary: >
      Per-session helpers (language hosts, debug hosts, Git worker, PTY
      host) MUST fail in isolation; one session loss MUST NOT degrade
      another session or the shell.
  - id: sandbox_and_external_hosts_carry_no_ambient_trust
    summary: >
      Wasm and external extension hosts MUST NOT inherit ambient shell,
      workspace, identity, or transport privilege. Every capability
      passes through declared manifest + admission + permission gates.
  - id: ai_and_remote_failures_never_block_editing
    summary: >
      AI runtime and remote connector failure MUST narrow capability and
      surface a disclosure; they MUST NOT block visible edits, saves, or
      caret/selection.
  - id: collector_is_non_blocking
    summary: >
      Observability collector writes MUST be non-blocking on protected
      paths. Back-pressure drops or buffers bounded data; it never
      serializes behind the input or render path.
