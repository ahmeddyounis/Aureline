    visibility_surfaces:
      - remote_versus_local_target_origin
      - transport_disconnect_or_capability_negotiation_posture
      - service_reachability_and_mirror_state
    runtime_notes: >
      SSH/container/agent transport, mount metadata, remote service
      bridging. Disconnect degrades remote capability, never local
      stability.

  - host_class_id: observability_collector
    title: Observability collector
    canonical_process_role: Observability collector
    process_role_ref: support_collector
    owning_service_planes:
