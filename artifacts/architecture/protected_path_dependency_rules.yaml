modules:
  - path: crates/aureline-shell-spike/src/input_path.rs
    owner_dependency_class: shell_ui
    protected_path: true
    allowed_local_modules:
      - hooks
    forbidden_sentinel_classes:
      - blocking_fs_io
      - blocking_network_io
      - blocking_process_launch
      - blocking_wait
      - spawn_blocking

  - path: crates/aureline-shell-spike/src/render_path.rs
    owner_dependency_class: renderer
    protected_path: true
    allowed_local_modules:
      - hooks
      - input_path
      - zones
    forbidden_sentinel_classes:
      - blocking_fs_io
      - blocking_network_io
      - blocking_process_launch
      - blocking_wait
      - spawn_blocking
