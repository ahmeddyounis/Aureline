# Quality-attribute scenario row register.
#
# Turns journey-level SLO bars + UX degradation posture into named,
# mechanically consumable scenario rows. Scenario IDs from this file
# are the stable handles that benchmark, QE, and design-review lanes
# cite in evidence packets, waiver packets, and claim manifests.
#
# Rules:
#   - `scenario_id` values are stable identifiers. Renaming is breaking.
#   - Every scenario MUST cite at least one protected journey row ref
#     (artifacts/architecture/protected_journey_map.yaml) and/or one
#     critical-sequence ref (artifacts/perf/critical_sequence_latencies.yaml).
#   - Every scenario MUST cite a primary evidence lane and a waiver authority.
#   - Planning identifiers MUST NOT appear in any id, title, or notes.

schema_version: 1
artifact_id: aureline.quality_scenario_rows
title: Quality-attribute scenario library (machine-readable)
overview_document: docs/architecture/quality_attribute_scenarios.md

source_documents:
  - ref: .t2/docs/Aureline_Technical_Architecture_Document.md
    sections:
      - "§3.4 Quality-attribute scenarios and measurable SLOs"
      - "Appendix T Critical Sequence Diagrams"
  - ref: .t2/docs/Aureline_UI_UX_Spec_Document.md
    sections:
      - "§3.3 Success-critical journeys"
      - "§3.4 Protected journey latency and responsiveness budgets"
      - "§5.4 Safe preview and content-integrity trust classes"
  - ref: .t2/docs/Aureline_PRD.md
    sections:
      - "5.52 Lifecycle state machines and recovery rules"
      - "5.53 Critical sequence diagrams and latency allocation"
      - "Appendix K Success-critical user journeys and latency budgets"

companion_refs:
  protected_journey_map_ref: artifacts/architecture/protected_journey_map.yaml
  quality_attribute_slos_ref: artifacts/architecture/quality_attribute_slos.yaml
  latency_budget_ledger_ref: artifacts/perf/latency_budget_ledger.yaml
  evidence_linkage_seed_ref: artifacts/perf/evidence_linkage_seed.yaml
  critical_sequence_latencies_ref: artifacts/perf/critical_sequence_latencies.yaml
  protected_metrics_ref: artifacts/bench/protected_metrics.yaml
  test_lane_registry_ref: artifacts/qe/test_lane_registry.yaml
  scenario_lane_map_ref: artifacts/qe/quality_scenario_to_lane_map.yaml
  scenario_case_fixtures_dir: fixtures/qe/quality_scenario_cases/

bar_posture_vocabulary:
  - release_blocking
  - advisory
  - investigative

scenario_rows:
