    title: Warm startup to first paint
    bar_posture: release_blocking
    actor: user
    stimulus: Launch Aureline and open an existing workspace.
    environment: Warm start on reference hardware; typical project; no mandatory network.
    protected_journey_row_refs:
      - journey_row:path.shell.launch
    protected_path_refs:
      - path.shell.launch
    critical_sequence_refs:
      - artifacts/perf/critical_sequence_latencies.yaml#seq.warm_start.first_edit
    slo_row_refs:
      - slo.open_repo_to_first_useful_navigation_or_edit
    target_response:
      primary_sli: first_paint_warm_ms
      release_bar_ms: 150
      source_ref: artifacts/perf/latency_budget_ledger.yaml#budget.path.shell.launch
    measure_window:
      window_description: launch intent to first non-blank frame
      measurement_ref: artifacts/perf/latency_budget_ledger.yaml#budget.path.shell.launch
    degradation_posture:
      required: Shell paint wins over indexing, tree hydration, and cache warm-up.
      source_ref: artifacts/perf/latency_budget_ledger.yaml#budget.path.shell.launch
    primary_evidence_lane_ref: lane:benchmark_lab
    waiver_authority_ref: performance_council

