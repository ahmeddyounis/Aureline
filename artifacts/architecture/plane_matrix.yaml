# Allowed runtime data/control paths between primary planes. Rows
# here are the authoritative "who may call whom" view at the plane
# level. Sub-plane direction is already captured by
# process_placement_map.yaml and protected_path_dependency_rules.
runtime_plane_allowed_call_directions:
  - source_plane: interaction_plane
    allowed_target_planes:
      - knowledge_plane
      - execution_plane
      - extensibility_plane
      - trust_and_control_plane
      - optional_services_plane
    call_form: typed_request_or_subscription_only
  - source_plane: knowledge_plane
    allowed_target_planes:
      - execution_plane
      - trust_and_control_plane
    call_form: typed_request_or_event_stream
  - source_plane: execution_plane
    allowed_target_planes:
      - knowledge_plane
      - extensibility_plane
      - trust_and_control_plane
      - optional_services_plane
    call_form: typed_request_or_event_stream
  - source_plane: extensibility_plane
    allowed_target_planes:
      - knowledge_plane
      - execution_plane
      - trust_and_control_plane
      - optional_services_plane
    call_form: typed_request_under_declared_permissions
  - source_plane: trust_and_control_plane
    allowed_target_planes:
      - interaction_plane
      - knowledge_plane
      - execution_plane
      - extensibility_plane
      - optional_services_plane
    call_form: policy_decision_or_audit_event_only
    note: >
      Trust/control never imposes state on interaction or knowledge
      outside explicit decision, badge, or safe-mode entry events.
  - source_plane: optional_services_plane
    allowed_target_planes:
      - trust_and_control_plane
    call_form: managed_egress_through_transport_governance_only

# Compile-time direction. Plane-level summary; exact crate edges
# remain authoritative in package_inventory.yaml and the protected
# path rules file.
compile_time_allowed_plane_directions:
  - source_plane: interaction_plane
    allowed_target_planes:
      - knowledge_plane
      - execution_plane
      - trust_and_control_plane
  - source_plane: knowledge_plane
    allowed_target_planes:
      - trust_and_control_plane
  - source_plane: execution_plane
    allowed_target_planes:
      - trust_and_control_plane
  - source_plane: extensibility_plane
    allowed_target_planes:
      - knowledge_plane
      - execution_plane
      - trust_and_control_plane
  - source_plane: trust_and_control_plane
    allowed_target_planes: []
  - source_plane: optional_services_plane
    allowed_target_planes:
      - trust_and_control_plane

# What a plane must make visible to the user or the support surface
# when it acts. These are the visibility expectations that later
# surfaces (badges, banners, support bundles) compose without
# inventing parallel language.
visibility_expectations:
  - plane: interaction_plane
    must_surface:
      - focus_and_input_state
      - command_target_disambiguation
      - degraded_decoration_or_reduced_motion_notice
      - safe_mode_or_restricted_workspace_banner
  - plane: knowledge_plane
    must_surface:
      - indexing_or_rebuilding_badge
      - stale_partial_or_verified_truth_lane
      - watcher_or_external_change_state
      - ignore_rule_explainability
  - plane: execution_plane
    must_surface:
      - execution_context_and_scope_disclosure
      - remote_versus_local_target_origin
      - task_or_debug_session_lifecycle_state
      - transport_disconnect_or_capability_negotiation_posture
  - plane: extensibility_plane
    must_surface:
      - extension_permission_scope_and_trust_posture
      - ai_provider_route_and_policy_posture
      - recipe_or_automation_preview_and_approval_state
      - ambient_privilege_denial_disclosure
  - plane: trust_and_control_plane
    must_surface:
      - workspace_trust_state
      - policy_allow_or_deny_reason
      - update_and_provenance_state
      - safe_mode_entry_reason
      - support_bundle_redaction_posture
  - plane: optional_services_plane
    must_surface:
      - service_reachability_and_mirror_state
      - residency_and_region_posture
      - narrowed_claim_when_service_absent

# Forbidden implicit crossings. Each row is a concrete failure
# pattern that must never ship silently. Most are already prohibited
# by the process-placement rules or the dependency rules; this
# block collects them at the plane level for review and drift
# detection.
forbidden_implicit_crossings:
  - id: shell_direct_io
    summary: >
      interaction_plane directly opening files, sockets, or
      subprocesses instead of routing through knowledge_plane,
      execution_plane, or trust_and_control_plane contracts.
    triggered_by_rule_refs:
      - artifacts/architecture/protected_path_dependency_rules.yaml#packages.shell_ui.forbidden_dependency_classes
      - artifacts/architecture/process_placement_map.yaml#service_planes.shell_ui.inline_work_policy.forbidden
  - id: feature_local_path_canonicalization
    summary: >
      Any plane minting its own canonical path, file identity,
      save lane, or ignore rule outside vfs_watchers.
    triggered_by_rule_refs:
      - docs/filesystem/filesystem_identity_vocabulary.md
  - id: alternate_transport_bypass
    summary: >
      extensibility_plane or optional_services_plane reaching the
      network outside remote_helper / transport governance.
    triggered_by_rule_refs:
      - artifacts/architecture/process_placement_map.yaml#service_planes.remote_helper
  - id: ambient_extension_privilege
    summary: >
      extensibility_plane inheriting shell, workspace, or identity
      privilege that was not declared in an extension manifest or
      approval ticket.
    triggered_by_rule_refs:
      - docs/adr/0012-extension-manifest-permission-publisher-policy.md
      - docs/security/safe_preview_trust_classes.md
  - id: silent_policy_widening
    summary: >
      Any plane silently widening trust, permissions, entitlements,
      or AI/network egress through import, sync, restore, or
      extension install.
    triggered_by_rule_refs:
      - .t2/docs/Aureline_Technical_Architecture_Document.md#124-profile-portability
  - id: hidden_update_or_install_on_hot_path
    summary: >
      Update check, download, install, or rollback running on the
      interaction_plane inline path.
    triggered_by_rule_refs:
      - artifacts/architecture/process_placement_map.yaml#service_planes.updater_release
  - id: support_export_on_interaction_path
    summary: >
      Archive creation, symbolication, or support-bundle assembly
      running synchronously on the shell or renderer.
    triggered_by_rule_refs:
      - artifacts/architecture/process_placement_map.yaml#service_planes.support_diagnostics
  - id: managed_service_hard_dependency
    summary: >
      A capability classed as local_core or self_host_friendly
      hard-failing when the optional_services_plane is absent.
    triggered_by_rule_refs:
      - docs/product/boundary_manifest_strawman.md
  - id: cross_plane_state_mutation_without_typed_contract
    summary: >
      A plane mutating another plane's authoritative state through
      shared memory, globals, or side channels instead of the
      typed RPC, subscription, or command contract.
    triggered_by_rule_refs:
      - docs/adr/0004-rpc-transport-and-schema-toolchain.md
      - docs/adr/0005-subscription-envelope-and-invalidation-semantics.md

# Where downstream tasks must cite this matrix. The acceptance bar
# says service-topology, authority, provider, transport, and
# boundary-manifest work references this map. These are the exact
# link targets each consumer preserves.
consumer_integration_refs:
  - consumer: service_topology
    ref_document: docs/architecture/service_topology_and_process_placement.md
    expected_citation:
      - plane_matrix_ref
      - trust_boundary_matrix_ref
  - consumer: authority_projection
    ref_document: .t2/docs/Aureline_Technical_Architecture_Document.md
    expected_citation:
      - plane_matrix_ref
  - consumer: provider_and_browser_handoff
    ref_document: docs/adr/0010-connected-provider-browser-handoff-approval-ticket.md
    expected_citation:
      - trust_boundary_matrix_ref
  - consumer: transport_governance
    ref_document: docs/adr/0004-rpc-transport-and-schema-toolchain.md
    expected_citation:
      - plane_matrix_ref
      - trust_boundary_matrix_ref
  - consumer: boundary_manifest
    ref_document: docs/product/boundary_manifest_strawman.md
    expected_citation:
      - plane_matrix_ref
      - trust_boundary_matrix_ref
