schema_version: 1
artifact_id: aureline.plane_matrix
title: Logical plane map and cross-plane interaction rules
overview_document: docs/architecture/logical_planes_and_trust_boundaries.md

# Companion artifacts this map composes with. Do not fork the
# vocabulary defined by these files; rows in this matrix must join
# back to them by the ids defined there.
companion_refs:
  process_placement_map_ref: artifacts/architecture/process_placement_map.yaml
  dependency_rules_ref: artifacts/architecture/protected_path_dependency_rules.yaml
  trust_boundary_matrix_ref: artifacts/architecture/trust_boundaries.yaml
  package_inventory_ref: artifacts/governance/package_inventory.yaml
  boundary_manifest_ref: docs/product/boundary_manifest_strawman.md
  service_topology_doc_ref: docs/architecture/service_topology_and_process_placement.md
  tad_ref: .t2/docs/Aureline_Technical_Architecture_Document.md

# Primary logical planes. Six top-level planes, frozen to match the
# Technical Architecture Document container view. New planes must be
# added by ADR; code and documentation may not invent parallel ones.
primary_logical_planes:
  - plane_id: interaction_plane
    title: Interaction plane
    summary: >
      Shell, editor surfaces, and the renderer/accessibility tree.
      Owns everything the user can see, type into, or focus. Must
      never perform blocking filesystem, network, or process-launch
      work on the input/render path.
    child_service_planes:
      - shell_ui
      - renderer
      - text_buffer
    degraded_mode_rule: >
      Decoration and non-critical surfaces may degrade before input
      latency or caret/selection fidelity. Rendering may fall back
      to a simpler pipeline, but typing, save intent, and focus
      must never be held behind optional work.

  - plane_id: knowledge_plane
    title: Knowledge plane
    summary: >
      Workspace identity, canonical paths, watchers, index/search,
      and the semantic workspace graph. Authoritative for "what is
      in this workspace, what do we know about it, and how fresh
      is that knowledge".
    child_service_planes:
      - vfs_watchers
      - index_search
    degraded_mode_rule: >
      Partial, stale, or rebuilding states must be surfaced rather
      than blocking input. Lexical, structural, semantic, and
      runtime-verified truth lanes stay distinguishable under
      degradation.

  - plane_id: execution_plane
    title: Execution plane
    summary: >
      Task, test, debug, terminal, and Git orchestration. Everything
      that launches or attaches to an external process or runtime.
      Also owns the execution-context/scope model that every
      launch, attach, or run path resolves through.
    child_service_planes:
      - task_execution
      - remote_helper
    degraded_mode_rule: >
      Transport disconnect degrades remote-attached capability, not
      local shell stability. Launch or attach work is helper-owned;
      the shell never spawns child processes inline.

  - plane_id: extensibility_plane
    title: Extensibility plane
    summary: >
      Extension runtime hosts (Wasm and external), automation and
      recipe runtimes, AI tool brokers, and the VS Code
      compatibility bridge scope. Everything that carries
      third-party or generated code into the product and must run
      under declared, enforceable permissions.
    child_service_planes:
      - ai_control_plane
    additional_responsibility_anchors:
      - extension_runtime_manager
      - wasm_capability_host
      - external_extension_host
      - recipe_and_automation_runtime
      - vscode_compatibility_bridge
    degraded_mode_rule: >
      Extension or AI failure may degrade assistance or automation,
      never core editing. Higher-risk integrations run out of
      process and under declarative permissions; no ambient
      privilege is ever inherited from the shell.

  - plane_id: trust_and_control_plane
    title: Trust and control plane
    summary: >
      Workspace trust, restricted-mode posture, policy evaluation,
      identity and session state, network/egress/proxy governance,
      update and provenance verification, observability,
      diagnostics, safe mode, and support-export gating. The
      integrity layer that every other plane consults before
      widening privilege.
    child_service_planes:
      - updater_release
      - support_diagnostics
    additional_responsibility_anchors:
      - workspace_trust_and_restricted_mode
      - policy_and_identity
      - transport_governance
      - provenance_and_signature_verification
      - safe_mode_and_recovery
    degraded_mode_rule: >
      Control-plane outages degrade optional capability, never core
      local editing. Last-known-good policy and metadata caches
      keep offline resilience; explainability for allow/deny
      decisions is always preserved.

  - plane_id: optional_services_plane
    title: Optional managed-services plane
    summary: >
      Managed or self-hostable services that are additive to the
      desktop core: collaboration relay and session brokering,
      remote workspace control plane, extension/update/docs
      registry and mirror APIs, AI gateway and org-policy
      enforcement, optional profile or org-metadata sync.
    child_service_planes: []
    additional_responsibility_anchors:
      - collaboration_relay
      - workspace_control_plane
      - extension_update_docs_registry
      - ai_gateway
      - profile_and_metadata_sync
    degraded_mode_rule: >
      Desktop core must remain valuable without any of these
      services. Outages narrow the optional capability and
      preserve a mirror, self-host, or documented fallback where
      one is promised.

# Service sub-planes. Identities and runtime rules are authoritative
# in artifacts/architecture/process_placement_map.yaml; this row set
# records parent-plane placement and the M0 artifact/crate
# ownership that the process-placement map does not carry.
service_sub_planes:
  - sub_plane_id: shell_ui
    parent_plane_id: interaction_plane
    process_placement_ref: shell_ui
    seeded_packages:
      - aureline-shell-spike
    monitored_modules:
      - crates/aureline-shell-spike/src/input_path.rs
    owned_responsibility_anchors:
      - window_layout_and_focus
      - command_palette_and_dispatch
      - keyboard_routing
      - accessibility_tree_entry
      - visible_status_and_progress

  - sub_plane_id: renderer
    parent_plane_id: interaction_plane
    process_placement_ref: renderer
    seeded_packages:
      - aureline-render
    monitored_modules:
      - crates/aureline-shell-spike/src/render_path.rs
    owned_responsibility_anchors:
      - scene_composition
      - damage_classification
      - visible_text_shaping_and_layout
      - frame_submission
      - reduced_motion_and_power_saver_compliance

  - sub_plane_id: text_buffer
    parent_plane_id: interaction_plane
    process_placement_ref: text_buffer
    seeded_packages:
      - aureline-text
      - aureline-buffer
    owned_responsibility_anchors:
      - text_primitives_and_unicode
      - selections_and_multi_caret
      - undo_redo_classes
      - visible_edit_state
      - large_file_mode_rules

  - sub_plane_id: vfs_watchers
    parent_plane_id: knowledge_plane
    process_placement_ref: vfs_watchers
    seeded_packages:
      - aureline-vfs
    owned_responsibility_anchors:
      - canonical_path_identity
      - save_pipeline
      - watcher_state_and_external_change_truth
      - ignore_resolution
      - workspace_roots

  - sub_plane_id: index_search
    parent_plane_id: knowledge_plane
    process_placement_ref: index_search
    seeded_packages: []
    owned_responsibility_anchors:
      - lexical_index
      - symbol_extraction_and_ranking
      - semantic_workspace_graph
      - freshness_and_confidence_model
      - search_readiness_and_result_truth

  - sub_plane_id: task_execution
    parent_plane_id: execution_plane
    process_placement_ref: task_execution
    seeded_packages: []
    owned_responsibility_anchors:
      - task_and_test_launch
      - debug_orchestration
      - terminal_pty_lifecycle
      - git_worker_operations
      - execution_context_resolution

  - sub_plane_id: remote_helper
    parent_plane_id: execution_plane
    process_placement_ref: remote_helper
    seeded_packages:
      - aureline-rpc
    owned_responsibility_anchors:
      - typed_rpc_fabric
      - helper_bridges
      - remote_connector_transport
      - capability_negotiation

  - sub_plane_id: ai_control_plane
    parent_plane_id: extensibility_plane
    process_placement_ref: ai_control_plane
    seeded_packages: []
    owned_responsibility_anchors:
      - ai_routing_and_provider_policy
      - context_assembly_broker
      - ai_tool_mediation
      - entitlement_state
      - hosted_metadata_posture

  - sub_plane_id: updater_release
    parent_plane_id: trust_and_control_plane
    process_placement_ref: updater_release
    seeded_packages: []
    owned_responsibility_anchors:
      - update_check_and_download
      - install_and_rollback
      - package_and_release_metadata
      - provenance_and_signature_verification

  - sub_plane_id: support_diagnostics
    parent_plane_id: trust_and_control_plane
    process_placement_ref: support_diagnostics
    seeded_packages:
      - aureline-telemetry
      - aureline-bench
    owned_responsibility_anchors:
      - bounded_tracing_and_metrics
      - crash_capture_and_symbolication
      - support_export_packet_assembly
      - benchmark_evidence_pipeline

# Every seeded crate and monitored protected module resolves to one
# primary service sub-plane. Off-cone prototypes resolve to a null
# production plane and a named carry-forward row.
seeded_crate_placements:
  - crate: aureline-shell-spike
    primary_sub_plane: shell_ui
    primary_plane: interaction_plane
    production_cone: false
    notes: >
      Throwaway integration spike. Protected hot-path modules
      input_path.rs and render_path.rs remain the only shell-ui
      and renderer sentinels until the shell lane closes.
  - crate: aureline-render
    primary_sub_plane: renderer
    primary_plane: interaction_plane
    production_cone: true
  - crate: aureline-text
    primary_sub_plane: text_buffer
    primary_plane: interaction_plane
    production_cone: true
  - crate: aureline-buffer
    primary_sub_plane: text_buffer
    primary_plane: interaction_plane
    production_cone: true
  - crate: aureline-vfs
    primary_sub_plane: vfs_watchers
    primary_plane: knowledge_plane
    production_cone: true
  - crate: aureline-rpc
    primary_sub_plane: remote_helper
    primary_plane: execution_plane
    production_cone: true
  - crate: aureline-telemetry
    primary_sub_plane: support_diagnostics
    primary_plane: trust_and_control_plane
    production_cone: true
  - crate: aureline-bench
    primary_sub_plane: support_diagnostics
    primary_plane: trust_and_control_plane
    production_cone: false
    notes: >
      Off-cone benchmark harness. Counts under support_diagnostics
      only for placement purposes; protected crates must not
      depend on it.
  - crate: aureline-graph-proto
    primary_sub_plane: index_search
    primary_plane: knowledge_plane
    production_cone: false
    notes: Off-cone semantic-workspace-graph prototype.
  - crate: aureline-largefile-proto
    primary_sub_plane: text_buffer
    primary_plane: interaction_plane
    production_cone: false
    notes: Off-cone large-file capability prototype.
  - crate: aureline-reactive-state
    primary_sub_plane: vfs_watchers
    primary_plane: knowledge_plane
    production_cone: false
    notes: >
      Off-cone reactive-state and subscription-envelope prototype.
      Carries subscription/materialized-view contract; primary
      authority projection is workspace state, so it places under
      the knowledge plane.

