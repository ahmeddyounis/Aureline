# Structured-artifact and debug-fidelity rows.
#
# Machine-readable companion to
# docs/artifacts/structured_artifact_and_debug_fidelity_matrix.md.
# These rows bind each high-value artifact family to one first-class
# view, one default open mode, one interaction posture, provenance
# requirements, build/tool linkage, support targets, and the existing
# contracts that own the detailed behavior.
#
# Scope. This file does not implement viewers, merge drivers, symbol
# resolvers, or coverage/profile tools. It freezes the shared fidelity
# language those later surfaces must preserve.

debug_fidelity_matrix_schema_version: 1
matrix_id: aureline.structured_artifact_and_debug_fidelity_matrix
status: seeded

docs_ref: docs/artifacts/structured_artifact_and_debug_fidelity_matrix.md
merge_resolution_policy_rows_ref: artifacts/artifacts/merge_resolution_policy_rows.yaml
fixtures_ref: fixtures/artifacts/fidelity_examples

source_contract_refs:
  structured_artifact_review_seed: docs/review/structured_artifact_review_seed.md
  structured_artifact_review_matrix: artifacts/review/structured_artifact_classes.yaml
  notebook_adr: docs/adr/0022-notebook-document-model-kernel-transport-trust-and-diff-merge.md
  notebook_trust_matrix: artifacts/notebook/kernels_and_trust_matrix.yaml
  notebook_output_truth: docs/notebooks/output_viewer_truth_contract.md
  debug_artifact_resolution_seed: docs/debug/artifact_resolution_seed.md
  debug_artifact_manifest_schema: schemas/debug/debug_artifact_manifest.schema.json
  debug_truth_contract: docs/execution/debug_truth_contract.md
  exact_build_identity_schema: schemas/build/exact_build_identity.schema.json
  exact_build_symbolication_smoke: docs/support/exact_build_symbolication_smoke.md
  crash_artifact_retention: artifacts/support/crash_artifact_retention_seed.json
  generated_artifact_safe_edit_policy: docs/architecture/generated_artifact_safe_edit_policy.md

artifact_family_vocabulary:
  - jupyter_notebook
  - structured_config_json
  - structured_config_yaml
  - structured_config_toml
  - lockfile_or_dependency_manifest
  - native_symbol_artifact
  - source_map
  - crash_dump_or_core
  - coverage_profile_artifact

first_class_view_vocabulary:
  - notebook_cell_aware_view
  - structured_config_semantic_view
  - package_graph_compare
  - native_symbol_inspector
  - source_map_inspector
  - crash_viewer_symbolication_report
  - coverage_profile_compare

default_open_mode_vocabulary:
  - semantic_view
  - compare_view
  - read_only_inspector
  - regenerate_review_flow

artifact_interaction_posture_vocabulary:
  - editable
  - read_only
  - regenerate_first
  - compare_only

initial_support_target_vocabulary:
  - v1_0
  - v1_x

fidelity_rows:
  - fidelity_row_id: artifact_fidelity:jupyter_notebook
    artifact_family: jupyter_notebook
    covered_formats:
      - ipynb
    first_class_view: notebook_cell_aware_view
    default_open_mode: semantic_view
    artifact_interaction_posture: editable
    merge_resolution_policy_ref: merge_policy:jupyter_notebook
    provenance_requirements:
      required:
        - notebook_format_version
        - stable_cell_ids
        - notebook_document_trust_state
        - notebook_metadata_survival_report_ref
      required_when_known:
        - kernelspec_ref
        - kernel_session_ref
        - execution_context_ref
        - environment_fingerprint_ref
        - output_lineage_refs
      forbidden_inline_payloads:
        - raw_notebook_json
        - raw_cell_source
        - raw_output_bytes
        - raw_widget_state
    build_or_tool_version_linkage:
      linkage_class: linked_when_available
      required_fields:
        - jupyter_nbformat_version
        - aureline_notebook_protocol_schema_version
      conditional_fields:
        - kernelspec_version
        - kernel_runtime_version
        - environment_fingerprint
        - last_successful_run_context_ref
    support_target:
      initial_support_target: v1_x
      support_posture: metadata_and_policy_by_default_payload_opt_in
      support_evidence_requirements:
        - schema_version
        - kernel_identity_when_known
        - trust_transition_refs
        - output_truncation_or_omission_refs
    linked_surface_refs:
      - docs/adr/0022-notebook-document-model-kernel-transport-trust-and-diff-merge.md
      - artifacts/notebook/kernels_and_trust_matrix.yaml
      - docs/notebooks/output_viewer_truth_contract.md
      - artifacts/review/structured_artifact_classes.yaml#review.surface.jupyter_notebook
    summary: >
      Jupyter notebooks are editable canonical documents that open in a
      cell-aware semantic view; active outputs and widgets remain governed
      by trust, sandboxing, and output-lineage records.

  - fidelity_row_id: artifact_fidelity:structured_config_json
    artifact_family: structured_config_json
    covered_formats:
      - json
      - jsonc_when_declared_by_schema
    first_class_view: structured_config_semantic_view
    default_open_mode: semantic_view
    artifact_interaction_posture: editable
    merge_resolution_policy_ref: merge_policy:structured_config_json
    provenance_requirements:
      required:
        - file_identity_ref
        - schema_or_validator_ref
        - unknown_key_survival_report_ref
        - redaction_class
      required_when_known:
        - policy_epoch_ref
        - owner_surface_ref
      forbidden_inline_payloads:
        - raw_secret_values
        - raw_policy_payloads
    build_or_tool_version_linkage:
      linkage_class: schema_and_parser_versioned
      required_fields:
        - schema_version_or_validator_version
        - parser_version
      conditional_fields:
        - formatter_version
        - policy_bundle_epoch
    support_target:
      initial_support_target: v1_0
      support_posture: structured_metadata_default_raw_body_opt_in
      support_evidence_requirements:
        - schema_or_validator_ref
        - unknown_key_survival_report_ref
        - redaction_class
    linked_surface_refs:
      - docs/review/structured_artifact_review_seed.md
      - artifacts/review/structured_artifact_classes.yaml#review.surface.structured_config_json
      - docs/config/human_edited_artifact_contract.md
    summary: >
      JSON configs are editable semantic artifacts only where schema
      support and unknown-key survival are proven; private values and
      policy bodies stay behind redaction refs.

  - fidelity_row_id: artifact_fidelity:structured_config_yaml
    artifact_family: structured_config_yaml
    covered_formats:
      - yaml
      - yml
    first_class_view: structured_config_semantic_view
    default_open_mode: semantic_view
    artifact_interaction_posture: editable
    merge_resolution_policy_ref: merge_policy:structured_config_yaml
    provenance_requirements:
      required:
        - file_identity_ref
        - schema_or_validator_ref
        - unknown_key_survival_report_ref
        - comment_and_order_preservation_report_ref
        - redaction_class
      required_when_known:
        - policy_epoch_ref
        - owner_surface_ref
      forbidden_inline_payloads:
        - raw_secret_values
        - raw_policy_payloads
    build_or_tool_version_linkage:
      linkage_class: schema_parser_and_formatter_versioned
      required_fields:
        - schema_version_or_validator_version
        - yaml_parser_version
      conditional_fields:
        - formatter_version
        - policy_bundle_epoch
    support_target:
      initial_support_target: v1_0
      support_posture: structured_metadata_default_raw_body_opt_in
      support_evidence_requirements:
        - schema_or_validator_ref
        - comment_and_order_preservation_report_ref
        - redaction_class
    linked_surface_refs:
      - docs/review/structured_artifact_review_seed.md
      - artifacts/review/structured_artifact_classes.yaml#review.surface.structured_config_yaml
      - docs/config/human_edited_artifact_contract.md
    summary: >
      YAML configs are editable through a semantic view where known keys
      are schema-backed and unknown sections retain comments, ordering,
      and vendor extensions.

  - fidelity_row_id: artifact_fidelity:structured_config_toml
    artifact_family: structured_config_toml
    covered_formats:
      - toml
    first_class_view: structured_config_semantic_view
    default_open_mode: semantic_view
    artifact_interaction_posture: editable
    merge_resolution_policy_ref: merge_policy:structured_config_toml
    provenance_requirements:
      required:
        - file_identity_ref
        - schema_or_validator_ref
        - unknown_table_survival_report_ref
        - comment_and_order_preservation_report_ref
        - redaction_class
      required_when_known:
        - package_or_build_tool_ref
        - policy_epoch_ref
      forbidden_inline_payloads:
        - raw_secret_values
        - raw_policy_payloads
    build_or_tool_version_linkage:
      linkage_class: schema_parser_and_tool_versioned
      required_fields:
        - schema_version_or_validator_version
        - toml_parser_version
      conditional_fields:
        - formatter_version
        - package_or_build_tool_version
    support_target:
      initial_support_target: v1_0
      support_posture: structured_metadata_default_raw_body_opt_in
      support_evidence_requirements:
        - schema_or_validator_ref
        - unknown_table_survival_report_ref
        - redaction_class
    linked_surface_refs:
      - docs/review/structured_artifact_review_seed.md
      - artifacts/review/structured_artifact_classes.yaml#review.surface.structured_config_toml
      - docs/config/human_edited_artifact_contract.md
    summary: >
      TOML configs are editable semantic artifacts where table semantics,
      comments, and unknown tables survive round trip.

  - fidelity_row_id: artifact_fidelity:lockfile_or_dependency_manifest
    artifact_family: lockfile_or_dependency_manifest
    covered_formats:
      - package_lock_json
      - pnpm_lock_yaml
      - yarn_lock
      - cargo_lock
      - poetry_lock
      - composer_lock
      - dependency_manifest
    first_class_view: package_graph_compare
    default_open_mode: regenerate_review_flow
    artifact_interaction_posture: regenerate_first
    merge_resolution_policy_ref: merge_policy:lockfile_or_dependency_manifest
    provenance_requirements:
      required:
        - canonical_manifest_refs
        - resolver_state_ref
        - dependency_graph_hash
        - integrity_hashes_when_available
      required_when_known:
        - advisory_feed_snapshot_ref
        - license_summary_ref
        - private_registry_redaction_ref
      forbidden_inline_payloads:
        - private_registry_urls
        - package_names_from_private_registries
        - raw_auth_tokens
    build_or_tool_version_linkage:
      linkage_class: resolver_and_environment_versioned
      required_fields:
        - package_manager_name
        - package_manager_version
        - resolver_version_or_lockfile_format_version
        - lockfile_digest
      conditional_fields:
        - platform_factors
        - environment_fingerprint
        - registry_mirror_snapshot_ref
    support_target:
      initial_support_target: v1_x
      support_posture: graph_summary_default_raw_lockfile_opt_in
      support_evidence_requirements:
        - canonical_manifest_refs
        - resolver_version_or_lockfile_format_version
        - dependency_graph_hash
    linked_surface_refs:
      - docs/review/structured_artifact_review_seed.md
      - artifacts/review/structured_artifact_classes.yaml#review.surface.lockfile_or_dependency_manifest
      - docs/architecture/generated_artifact_safe_edit_policy.md
      - docs/package/package_action_contract.md
    summary: >
      Lockfiles and dependency manifests open in a package-centric
      regenerate/review flow; solver output is not byte-merged because
      normalization can change dependency meaning.

  - fidelity_row_id: artifact_fidelity:native_symbol_artifact
    artifact_family: native_symbol_artifact
    covered_formats:
      - pdb
      - dsym
      - dwarf
      - split_dwarf_archive
    first_class_view: native_symbol_inspector
    default_open_mode: read_only_inspector
    artifact_interaction_posture: read_only
    merge_resolution_policy_ref: merge_policy:native_symbol_artifact
    provenance_requirements:
      required:
        - debug_artifact_ref
        - module_build_id_or_debug_id
        - target_triple
        - artifact_digest
        - storage_mode
        - redaction_class
      required_when_known:
        - release_artifact_graph_node_ref
        - exact_build_identity_ref
        - symbol_package_signature_ref
      forbidden_inline_payloads:
        - raw_symbol_bytes
        - raw_private_symbol_names
        - raw_absolute_paths
    build_or_tool_version_linkage:
      linkage_class: exact_build_identity_required
      required_fields:
        - module_identity.build_id_or_debug_id_or_uuid
        - target.target_triple
        - profile.debug_info_class
        - artifact_digest
      conditional_fields:
        - compiler_version
        - debugger_format_version
        - release_artifact_graph_node_ref
    support_target:
      initial_support_target: v1_x
      support_posture: metadata_reference_default_raw_symbols_excluded
      support_evidence_requirements:
        - debug_artifact_ref
        - resolution_state
        - mismatch_reason_class_when_unresolved
        - exact_build_identity_ref_when_release_bearing
    linked_surface_refs:
      - docs/debug/artifact_resolution_seed.md
      - docs/execution/debug_truth_contract.md
      - docs/support/exact_build_symbolication_smoke.md
    summary: >
      Native symbol artifacts are read-only resolution inputs; a
      matching filename never clears the row without exact module and
      build identity verification.

  - fidelity_row_id: artifact_fidelity:source_map
    artifact_family: source_map
    covered_formats:
      - js_map
      - ts_map
      - css_map
    first_class_view: source_map_inspector
    default_open_mode: compare_view
    artifact_interaction_posture: compare_only
    merge_resolution_policy_ref: merge_policy:source_map
    provenance_requirements:
      required:
        - debug_artifact_ref
        - source_map_digest
        - generated_bundle_ref
        - mapping_quality_state
      required_when_known:
        - generated_source_refs
        - bundler_or_transpiler_ref
        - release_artifact_graph_node_ref
      forbidden_inline_payloads:
        - raw_source_map_body
        - raw_source_bodies
        - raw_absolute_paths
    build_or_tool_version_linkage:
      linkage_class: bundle_and_generator_versioned
      required_fields:
        - module_identity.source_map_digest
        - generated_bundle_digest
        - generator_identity.owner_class
      conditional_fields:
        - bundler_version
        - transpiler_version
        - generator_command_digest
        - exact_build_identity_ref
    support_target:
      initial_support_target: v1_x
      support_posture: mapping_summary_default_raw_map_excluded
      support_evidence_requirements:
        - debug_artifact_ref
        - mapping_quality_state
        - stale_or_partial_reason_when_degraded
    linked_surface_refs:
      - docs/debug/artifact_resolution_seed.md
      - artifacts/review/structured_artifact_classes.yaml#review.surface.source_map_or_debug_sidecar
      - docs/execution/debug_truth_contract.md
    summary: >
      Source maps open in validation/compare mode and stay compare-only;
      stale or partial mappings are visible resolution states, not
      editable fixes.

  - fidelity_row_id: artifact_fidelity:crash_dump_or_core
    artifact_family: crash_dump_or_core
    covered_formats:
      - minidump
      - core_dump
      - crash_snapshot
    first_class_view: crash_viewer_symbolication_report
    default_open_mode: read_only_inspector
    artifact_interaction_posture: read_only
    merge_resolution_policy_ref: merge_policy:crash_dump_or_core
    provenance_requirements:
      required:
        - crash_id
        - dump_format
        - module_list_summary
        - build_id_or_module_identity_refs
        - redaction_class
        - support_export_posture
      required_when_known:
        - symbolication_report_ref
        - symbol_manifest_ref
        - crash_envelope_ref
        - policy_epoch_ref
      forbidden_inline_payloads:
        - raw_dump_bytes
        - raw_memory_bytes
        - raw_register_state
        - raw_stack_frame_arguments
        - raw_absolute_paths
    build_or_tool_version_linkage:
      linkage_class: exact_build_symbolication_required
      required_fields:
        - module_identity.build_id_or_uuid_set
        - dump_format_version
        - target_or_host_lane
      conditional_fields:
        - symbol_manifest_version
        - source_map_manifest_version
        - exact_build_identity_ref
    support_target:
      initial_support_target: v1_x
      support_posture: manifest_and_symbolication_report_default_raw_dump_opt_in
      support_evidence_requirements:
        - crash_envelope_ref
        - symbolication_report_ref_when_available
        - redaction_class
        - upload_or_export_consent_state
    linked_surface_refs:
      - docs/debug/artifact_resolution_seed.md
      - docs/support/exact_build_symbolication_smoke.md
      - artifacts/support/crash_artifact_retention_seed.json
      - docs/execution/debug_truth_contract.md
    summary: >
      Crash dumps and cores are read-only evidence; symbolication must
      stay exact-build and raw payload export is opt-in or policy-bound.

  - fidelity_row_id: artifact_fidelity:coverage_profile_artifact
    artifact_family: coverage_profile_artifact
    covered_formats:
      - lcov
      - gcov
      - llvm_profraw
      - pprof
      - perfetto_trace
      - flamegraph_input
    first_class_view: coverage_profile_compare
    default_open_mode: compare_view
    artifact_interaction_posture: compare_only
    merge_resolution_policy_ref: merge_policy:coverage_profile_artifact
    provenance_requirements:
      required:
        - run_context_ref
        - target_ref
        - execution_context_ref
        - capture_source_class
        - freshness_class
      required_when_known:
        - build_identity_ref
        - commit_ref
        - included_run_set_ref
        - excluded_run_set_refs
        - mapping_quality_state
      forbidden_inline_payloads:
        - raw_trace_payload
        - raw_profile_samples
        - raw_coverage_payload
        - process_identifiers
        - raw_absolute_paths
    build_or_tool_version_linkage:
      linkage_class: run_and_tool_versioned
      required_fields:
        - capture_tool_name
        - capture_tool_version
        - run_context_ref
        - target_ref
      conditional_fields:
        - exact_or_baseline_build_identity_ref
        - sample_rate
        - branch_coverage_availability
        - profiler_dictionary_ref
    support_target:
      initial_support_target: v1_x
      support_posture: metadata_and_summary_default_raw_capture_opt_in
      support_evidence_requirements:
        - run_context_ref
        - capture_tool_version
        - included_excluded_run_set_summary
        - degradation_reason_when_partial
    linked_surface_refs:
      - docs/debug/artifact_resolution_seed.md
      - artifacts/review/structured_artifact_classes.yaml#review.surface.coverage_profile_artifact
      - docs/execution/test_truth_contract.md
      - docs/perf/self_capture_parity.md
    summary: >
      Coverage and profile artifacts are compare-only evidence bound to
      run, target, and tool version; aggregating run sets is explicit
      analysis, never raw artifact write-back.

matrix_invariants:
  - id: inv.artifact_fidelity.one_row_per_family
    statement: >
      Every artifact_family_vocabulary value has exactly one
      fidelity_rows entry.
  - id: inv.artifact_fidelity.posture_and_open_mode_declared
    statement: >
      Every fidelity row declares exactly one default_open_mode and one
      artifact_interaction_posture.
  - id: inv.artifact_fidelity.editable_rows_need_round_trip_truth
    statement: >
      Rows with artifact_interaction_posture = editable must cite schema,
      notebook, or unknown-metadata survival evidence before semantic
      view may offer write-back.
  - id: inv.artifact_fidelity.debug_rows_resolve_by_identity
    statement: >
      Native symbol, source map, crash, coverage, and profile rows must
      join the debug artifact or exact-build identity vocabulary rather
      than inventing surface-local resolution states.
  - id: inv.artifact_fidelity.support_exports_keep_provenance
    statement: >
      Support posture may omit raw bodies, but the row must still expose
      provenance, redaction, and omission state.
