# -----------------------------------------------------------------------------
# Excluded inventory rows.
#
# Rows the reference-workspace program intentionally leaves outside the
# foundations milestone. Each row records the exclusion reason and the
# inclusion target so the inventory is complete and downgrade paths are
# explicit when a future milestone admits the row.
# -----------------------------------------------------------------------------
excluded_archetype_rows:
  - archetype_row_id: archetype_row:misc_local_folder_no_archetype
    archetype_id: misc_folder
    public_label: Plain local folder with no archetype evidence
    exclusion_reason: not_a_first_party_support_archetype
    inclusion_target: post_stable
    compat_row_ref: compat_row:certification.launch_archetype_matrix
    version_skew_register_ref: skew_register:certification.launch_archetype_matrix
    reference_workspace_refs:
      - refws.micro_local_folder
      - refws.misc_folder_unknown_archetype
    benchmark_corpus_refs: []
    seed_notes_ref: fixtures/compat/archetype_seed_notes/misc_local_folder_no_archetype.md
    notes: >
      The plain local-folder row exists as a corpus fixture for the
      unrecognised-archetype path. It is not an archetype the program
      certifies, so it is intentionally excluded from the support
      ladder. The row is kept here so the inventory is complete and so
      future surfaces cannot accidentally promote it to a support class.

# -----------------------------------------------------------------------------
# Inventory invariants.
#
# Validators that read this file should treat each invariant as a
# closed-world rule. Adding an invariant is breaking; removing one is a
# decision row.
# -----------------------------------------------------------------------------
invariants:
  - invariant_id: invariant:every_active_row_has_one_class
    statement: >
      Every entry in archetype_rows resolves to one initial_support_class_id
      from artifacts/compat/archetype_rubric.yaml.
  - invariant_id: invariant:every_active_row_has_workspace_or_reservation
    statement: >
      Every entry in archetype_rows has at least one reference_workspace_ref
      that resolves to a fixture in fixtures/workspaces/reference/ or to a
      reservation slot under that directory.
  - invariant_id: invariant:every_active_row_has_corpus_link
    statement: >
      Every entry in archetype_rows references at least one scenario id
      from fixtures/benchmarks/corpus_manifest.yaml or reserves one under
      the same vocabulary.
  - invariant_id: invariant:every_active_row_targets_certification_compat_row
    statement: >
      Every entry in archetype_rows binds to
      compat_row:certification.launch_archetype_matrix and to the matching
      skew_register entry.
  - invariant_id: invariant:every_excluded_row_states_reason_and_target
    statement: >
      Every entry in excluded_archetype_rows carries an exclusion_reason
      and an inclusion_target so the row is not a silent omission.
  - invariant_id: invariant:every_active_row_has_seed_notes_ref
    statement: >
      Every entry in archetype_rows points at a per-archetype seed notes
      file under fixtures/compat/archetype_seed_notes/.
  - invariant_id: invariant:dotnet_and_notebook_rows_present
    statement: >
      The inventory carries archetype_row:dotnet_service_or_app and
      archetype_row:notebook_first_data_workflow at supported as the
      target class with explicit reference-workspace and corpus
      reservations.
