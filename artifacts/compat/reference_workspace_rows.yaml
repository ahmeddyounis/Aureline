# Reference-workspace seed rows.
#
# One row per archetype the reference-workspace program is committing to
# scope at v1.0, plus explicit reservation rows for archetypes that are
# intentionally excluded from the foundations milestone.
#
# Tooling reads this file. The narrative companion is
# docs/compat/reference_workspace_program_seed.md. If the two disagree,
# this file is authoritative and the narrative is updated in the same
# change.
#
# Rules.
#   - Every row carries a stable archetype_row_id and an archetype_id from
#     the closed archetype-tag set in docs/benchmarks/fixture_classes.md
#     §8 (or a reservation that explicitly cites an out-of-set tag).
#   - Every row binds to support_class_id from
#     artifacts/compat/archetype_rubric.yaml. Rows are not free to invent
#     a class outside that vocabulary.
#   - Every row cites compat_row:certification.launch_archetype_matrix as
#     its compatibility-row backbone and skew_register:certification.
#     launch_archetype_matrix as its skew-register backbone. Per-archetype
#     drift goes through this one row family, not parallel ids.
#   - reference_workspace_refs MAY be reservation slots when the fixture
#     does not yet exist; reservations cite a fixtures/workspaces/
#     reference path so later milestones can materialise them without
#     renaming the row.
#   - benchmark_corpus_refs cite scenario ids from
#     fixtures/benchmarks/corpus_manifest.yaml; reserved scenario ids are
#     allowed and named explicitly.
#   - Every row names exactly one initial support_class_id. Promotion or
#     demotion goes through artifacts/compat/archetype_rubric.yaml.
#   - Excluded rows carry exclusion_reason and inclusion_target so the
#     inventory is complete without implying support that is not seeded.

schema_version: 1
status: seeded

overview_page: docs/compat/reference_workspace_program_seed.md
archetype_rubric_source: artifacts/compat/archetype_rubric.yaml
qualification_matrix_source: artifacts/compat/qualification_matrix_seed.yaml
version_skew_register_source: artifacts/compat/version_skew_register.yaml
benchmark_corpus_source: fixtures/benchmarks/corpus_manifest.yaml
reference_workspace_directory: fixtures/workspaces/reference/
ownership_matrix_source: artifacts/governance/ownership_matrix.yaml
report_template_source: docs/release/certified_archetype_report_template.md
seed_notes_directory: fixtures/compat/archetype_seed_notes/

# -----------------------------------------------------------------------------
# Closed vocabularies that bind reference-workspace rows together.
#
# These mirror the production-side vocabularies the PRD already names.
# Adding a value is breaking; tightening wording is additive-minor.
# -----------------------------------------------------------------------------

required_mode_vocabulary:
  - local_only
  - local_plus_one_remote_mode
  - local_plus_devcontainer_or_container
  - local_plus_remote_attach
  - notebook_kernel_local_only

platform_dimension_vocabulary:
  - macos_arm64
  - macos_x86_64
  - linux_x86_64
  - linux_arm64
  - windows_x86_64

design_partner_input_class_vocabulary:
  - none_yet
  - sanitised_repo_admissible
  - synthetic_only_until_partner_signed
  - existing_repo_slice_self_host

inclusion_target_vocabulary:
  - foundations
  - first_beta
  - first_stable
  - post_stable

# -----------------------------------------------------------------------------
# Active archetype rows.
#
# Each row is the canonical reference-workspace inventory entry for one
# archetype id. The initial support_class_id is the entry point on the
# graduation ladder; promotion and demotion run through the rubric.
# -----------------------------------------------------------------------------
