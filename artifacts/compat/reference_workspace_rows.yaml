    representative_stack: >
      TypeScript on Node.js with pnpm or npm, React or Vite or Next.js,
      and Vitest or Jest as the in-repo test runner.
    core_workflows:
      - open
      - search
      - rename
      - run_tests
      - debug
      - git_review
      - api_request_run
    minimum_matrix_dimensions:
      platform_dimensions:
        - macos_arm64
        - macos_x86_64
        - linux_x86_64
        - windows_x86_64
      required_modes:
        - local_only
        - local_plus_one_remote_mode
    initial_support_class_id: experimental
    target_support_class_id: certified
    inclusion_target: first_stable
    compat_row_ref: compat_row:certification.launch_archetype_matrix
    version_skew_register_ref: skew_register:certification.launch_archetype_matrix
    reference_workspace_refs:
      - refws.ts_web_app_archetype_seed
    benchmark_corpus_refs:
      - archetype.ts_web_app_first_open_certified
      - archetype.ts_web_app_start_from_prebuild_bypass
      - workflow.first_useful_edit_ts_web_app
    claim_manifest_row_refs:
      - claim_row:certification.launch_wedge_typescript_web
    design_partner_input_class: synthetic_only_until_partner_signed
    seed_notes_ref: fixtures/compat/archetype_seed_notes/ts_web_app_or_service.md
    owner_allocation:
      selection_owner: lane:compatibility_ecosystem_review
      evidence_owner: lane:benchmark_lab
      publication_owner: lane:release_evidence
    notes: >
      The TypeScript web-app row is the launch-wedge archetype that the
      published claim-manifest row already extends. Promotion to certified
      requires a certified-archetype report that names a sanitised or
      synthetic workspace, the local-plus-one-remote matrix dimension, and
      the corresponding workflow scenarios.

