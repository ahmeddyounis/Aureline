# Compatibility version-skew register seed.
#
# Machine-readable companion to artifacts/compat/qualification_matrix_seed.yaml.
# The qualification matrix says which boundary rows exist and what they
# claim; this register decomposes each row into supported, best-effort,
# untested, and unsupported skew cases without collapsing them into one
# vague status.
#
# Rules.
#   - Each register entry MUST point at exactly one qualification_row_ref.
#   - Every skew_case_id is stable and may be cited by later
#     compatibility_report or claim-manifest tooling.
#   - supported, best_effort, untested, and unsupported are distinct
#     buckets. A case may appear in only one bucket.
#   - outside_window_posture names what the system should do once the
#     case's claimed window is exceeded; "unsupported" is not implied by
#     omission.

schema_version: 1
status: seeded

qualification_matrix_source: artifacts/compat/qualification_matrix_seed.yaml
overview_page: docs/compat/compatibility_row_seed.md

skew_status_vocabulary:
  - supported
  - best_effort
  - untested
  - unsupported

outside_window_posture_vocabulary:
  - fail_closed
  - read_only
  - degraded
  - explicitly_unsupported

register:
  - register_id: skew_register:desktop_benchmark_lab.exact_build_identity
    qualification_row_ref: compat_row:desktop_benchmark_lab.exact_build_identity
    artifact_or_protocol_boundary_label: boundary.build.exact_build_identity
    supported:
      - skew_case_id: skew_case:desktop_benchmark_lab.same_identity
        combination_label: same exact_build_identity_ref across trace, run result, dashboard, and report
        window_class: exact_match
        outside_window_posture: fail_closed
        notes: >
          Claim-bearing benchmark evidence resolves to one identity chain,
          including clean-room rebuilds that explicitly name
          rebuild_of_identity_ref.
    best_effort:
      - skew_case_id: skew_case:desktop_benchmark_lab.minimum_build_identity_only
        combination_label: trace carries only the minimum build stamp while release-evidence linkage is pending
        window_class: exact_match
        outside_window_posture: degraded
        notes: >
          Diagnostic-only local comparison is allowed; release promotion,
          public claims, and certified-archetype packets must not use it.
    untested:
      - skew_case_id: skew_case:desktop_benchmark_lab.cross_channel_same_commit
        combination_label: same commit but different release channel used as the comparison peer
        window_class: exact_match
        outside_window_posture: degraded
        notes: >
          The seed does not yet claim benchmark comparability across
          channel moves, even when the commit hash matches.
    unsupported:
      - skew_case_id: skew_case:desktop_benchmark_lab.identity_missing_or_conflicting
        combination_label: run result or dashboard resolves to no exact_build_identity_ref or to a conflicting commit/target/profile
        window_class: exact_match
        outside_window_posture: explicitly_unsupported
        notes: >
          Report generation must refuse the claim-bearing path rather than
          render a best guess.

  - register_id: skew_register:command_plane.command_descriptor_schema
    qualification_row_ref: compat_row:command_plane.command_descriptor_schema
    artifact_or_protocol_boundary_label: boundary.commands.command_descriptor
    supported:
      - skew_case_id: skew_case:command_plane.same_schema_epoch
        combination_label: command_descriptor_schema_version and invocation payload contract stay in the same additive epoch
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed
        notes: >
          Unknown additive fields are preserved, and disabled-reason /
          preview / approval semantics retain their original meanings.
    best_effort:
      - skew_case_id: skew_case:command_plane.render_only_unknown_slot_hint
        combination_label: a consumer sees an additive ui_slot_hint it can ignore while still preserving the record
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
        notes: >
          Render-only consumers may narrow their UI projection without
          claiming full parity on the new slot.
    untested:
      - skew_case_id: skew_case:command_plane.preview_channel_descriptor_consumer_lag
        combination_label: preview-channel surface lags a newly added additive field without updated fixtures
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
        notes: >
          The seed reserves the case explicitly instead of treating it as
          silently supported.
    unsupported:
      - skew_case_id: skew_case:command_plane.required_field_or_meaning_change
        combination_label: required field removed, repurposed, or interpreted differently across producers and consumers
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed
        notes: >
          Breaking command-shape drift blocks execution and claim
          publication; it is not a warning-only condition.

  - register_id: skew_register:release_identity.exact_build_propagation
    qualification_row_ref: compat_row:release_identity.exact_build_propagation
    artifact_or_protocol_boundary_label: boundary.build.exact_build_identity_propagation
    supported:
      - skew_case_id: skew_case:release_identity.same_artifact_set
        combination_label: binaries, symbols, docs/help, and release-evidence rows resolve through one coordinated artifact set
        window_class: coordinated_artifact_set_only
        outside_window_posture: fail_closed
    best_effort:
      - skew_case_id: skew_case:release_identity.same_commit_missing_optional_help_linkage
        combination_label: commit and toolchain match but optional help/about or support-export linkage is not yet wired
        window_class: coordinated_artifact_set_only
        outside_window_posture: degraded
        notes: >
          Internal diagnosis may proceed; public release wording and
          automated parity claims may not.
    untested:
      - skew_case_id: skew_case:release_identity.same_semver_different_producer_lane
        combination_label: same semver and channel but different producer lane and no coordinating artifact graph
        window_class: coordinated_artifact_set_only
        outside_window_posture: degraded
    unsupported:
      - skew_case_id: skew_case:release_identity.version_only_fallback
        combination_label: consumer relies on a version string without the exact_build_identity axes
        window_class: coordinated_artifact_set_only
        outside_window_posture: fail_closed
        notes: >
          "Version only" fallback is outside the compatibility promise by
          rule.

  - register_id: skew_register:state.profile_layout_schema
    qualification_row_ref: compat_row:state.profile_layout_schema
    artifact_or_protocol_boundary_label: boundary.profile.portable_profile_and_layout_restore
    supported:
      - skew_case_id: skew_case:state.profile_same_epoch_or_additive
        combination_label: source and destination preserve one profile schema epoch with additive-field tolerance
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
        notes: >
          Supported restore may still truthfully downgrade from exact to
          compatible depending on validator outcomes.
    best_effort:
      - skew_case_id: skew_case:state.profile_layout_only_downgrade
        combination_label: destination preserves layout and user-authored durable truth but cannot claim exact state parity
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
        notes: >
          Layout-only and manual-review restores are explicit best-effort
          paths, not silent support.
    untested:
      - skew_case_id: skew_case:state.profile_cross_profile_machine_addendum
        combination_label: machine-local addendum crosses a differently managed deployment profile
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
    unsupported:
      - skew_case_id: skew_case:state.profile_excluded_or_admin_owned_treated_as_portable
        combination_label: excluded or admin-owned state is presented as portable user truth
        window_class: same_schema_epoch_additive_only
        outside_window_posture: explicitly_unsupported

  - register_id: skew_register:extension_host.sdk_wit_permission_window
    qualification_row_ref: compat_row:extension_host.sdk_wit_permission_window
    artifact_or_protocol_boundary_label: boundary.extensions.host_contract_and_permission_vocab
    supported:
      - skew_case_id: skew_case:extension_host.within_sdk_wit_permission_window
        combination_label: manifest SDK range, WIT ABI version, and permission vocabulary all fall within the published support window
        window_class: published_sdk_support_window
        outside_window_posture: explicitly_unsupported
        notes: >
          The extension may run only when all three axes line up; the
          resulting posture remains strict even for supported cases.
    best_effort:
      - skew_case_id: skew_case:extension_host.bridge_profile_with_caveats
        combination_label: compatibility_bridge profile is in-range but carries declared caveats or partial-state notes
        window_class: published_sdk_support_window
        outside_window_posture: degraded
        notes: >
          The row remains claim-bearing only on surfaces that render the
          bridge/native state and caveat set explicitly.
    untested:
      - skew_case_id: skew_case:extension_host_helper_or_remote_family_reserved
        combination_label: helper_binary or remote_side_component host families use the reserved seed values before the runtime lands
        window_class: published_sdk_support_window
        outside_window_posture: explicitly_unsupported
    unsupported:
      - skew_case_id: skew_case:extension_host_unknown_required_contract
        combination_label: required WIT world, permission version, or SDK floor is unknown or outside range
        window_class: published_sdk_support_window
        outside_window_posture: explicitly_unsupported
        notes: >
          The extension is disabled or quarantined, never partially loaded
          in ambiguous mode.

  - register_id: skew_register:launcher.local_helper_contracts
    qualification_row_ref: compat_row:launcher.local_helper_contracts
    artifact_or_protocol_boundary_label: boundary.runtime.launcher_local_sidecars
    supported:
      - skew_case_id: skew_case:launcher.local_helper_same_artifact_set
        combination_label: launcher and helper binaries come from one coordinated artifact set
        window_class: coordinated_artifact_set_only
        outside_window_posture: fail_closed
    best_effort: []
    untested:
      - skew_case_id: skew_case:launcher.local_helper_same_contract_version_different_build
        combination_label: helper declares the same contract version but not the same coordinated build provenance
        window_class: coordinated_artifact_set_only
        outside_window_posture: fail_closed
        notes: >
          Explicitly reserved as untested so "same contract string"
          cannot drift into an accidental support promise.
    unsupported:
      - skew_case_id: skew_case:launcher.local_helper_mixed_startup
        combination_label: mixed launcher/helper startup outside the coordinated artifact set
        window_class: coordinated_artifact_set_only
        outside_window_posture: fail_closed

  - register_id: skew_register:remote.attach_envelope_and_drift
    qualification_row_ref: compat_row:remote.attach_envelope_and_drift
    artifact_or_protocol_boundary_label: boundary.remote.agent_attach_envelope
    supported:
      - skew_case_id: skew_case:remote.attach_adjacent_window
        combination_label: client and agent stay within the declared adjacent support window and negotiate only the capability intersection
        window_class: declared_adjacent_window
        outside_window_posture: degraded
        notes: >
          Supported does not mean identical. Capability intersection and
          visible drift state remain mandatory.
    best_effort:
      - skew_case_id: skew_case:remote.attach_review_only_downgrade
        combination_label: skew permits review-only or file-only attach but not full mutation parity
        window_class: declared_adjacent_window
        outside_window_posture: degraded
    untested:
      - skew_case_id: skew_case:remote.attach_beyond_adjacent_same_major
        combination_label: same major line but outside the explicitly declared adjacent window
        window_class: declared_adjacent_window
        outside_window_posture: degraded
        notes: >
          The seed records this as untested rather than assuming the PRD's
          future target window has already been ratified.
    unsupported:
      - skew_case_id: skew_case:remote.attach_unknown_required_feature
        combination_label: required capability or protocol floor is absent, unknown, or outside the published window
        window_class: declared_adjacent_window
        outside_window_posture: explicitly_unsupported

  - register_id: skew_register:tooling.task_event_envelope
    qualification_row_ref: compat_row:tooling.task_event_envelope
    artifact_or_protocol_boundary_label: boundary.tooling.task_event_envelope
    supported:
      - skew_case_id: skew_case:tooling.task_event_additive_epoch
        combination_label: task-event producers and consumers preserve one stable epoch with additive-only field evolution
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed
    best_effort:
      - skew_case_id: skew_case:tooling.task_event_heuristic_source_kind
        combination_label: heuristic parser producers emit canonical envelope fields with lower confidence
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
        notes: >
          The envelope stays consumable, but the producer does not claim
          full source parity with native or structured adapters.
    untested:
      - skew_case_id: skew_case:tooling.task_event_appendix_only_clients
        combination_label: downstream consumer relies on appendix-defined envelope text before a dedicated schema export lands
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
    unsupported:
      - skew_case_id: skew_case:tooling.task_event_required_kind_or_retention_mismatch
        combination_label: consumer cannot attribute a required payload kind or retention class
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed

  - register_id: skew_register:provider.service_api_and_browser_handoff
    qualification_row_ref: compat_row:provider.service_api_and_browser_handoff
    artifact_or_protocol_boundary_label: boundary.provider.service_api_family
    supported:
      - skew_case_id: skew_case:provider.current_plus_previous_minor_or_lts
        combination_label: provider-linked client stays within the current published family plus the declared previous minor or LTS window
        window_class: current_plus_previous_minor_or_lts
        outside_window_posture: read_only
    best_effort:
      - skew_case_id: skew_case:provider.cached_metadata_only
        combination_label: client can still render cached metadata and safe read paths while write-capable APIs are out of window
        window_class: current_plus_previous_minor_or_lts
        outside_window_posture: read_only
    untested:
      - skew_case_id: skew_case:provider_self_hosted_or_air_gap_family_before_openapi
        combination_label: self-hosted or air-gapped service family claimed before a dedicated OpenAPI contract lands
        window_class: current_plus_previous_minor_or_lts
        outside_window_posture: read_only
    unsupported:
      - skew_case_id: skew_case:provider_privileged_write_out_of_window
        combination_label: privileged write or approval-bearing action targets an API family outside the published window
        window_class: current_plus_previous_minor_or_lts
        outside_window_posture: explicitly_unsupported

  - register_id: skew_register:certification.launch_archetype_matrix
    qualification_row_ref: compat_row:certification.launch_archetype_matrix
    artifact_or_protocol_boundary_label: boundary.certification.launch_archetype_matrix
    supported:
      - skew_case_id: skew_case:certification.current_report_and_row_ids
        combination_label: current reference workspace report and linked archetype ids are in-window for the named build/profile set
        window_class: certified_report_freshness_window
        outside_window_posture: degraded
        notes: >
          Even certified rows may narrow to caveated support when the
          evidence changes; freshness is part of the support window.
    best_effort:
      - skew_case_id: skew_case:certification_supported_with_caveats
        combination_label: archetype or launch-language row remains supported with explicit caveats but not certified
        window_class: certified_report_freshness_window
        outside_window_posture: degraded
    untested:
      - skew_case_id: skew_case:certification_new_archetype_not_in_corpus
        combination_label: new archetype id appears before a reference workspace report or corpus entry exists
        window_class: certified_report_freshness_window
        outside_window_posture: explicitly_unsupported
    unsupported:
      - skew_case_id: skew_case:certification_stale_or_missing_report_claimed_as_certified
        combination_label: claim surface renders certified wording after the report window expired or without a linked row
        window_class: certified_report_freshness_window
        outside_window_posture: explicitly_unsupported

  - register_id: skew_register:desktop.platform_conformance_profiles
    qualification_row_ref: compat_row:desktop.platform_conformance_profiles
    artifact_or_protocol_boundary_label: boundary.desktop.claimed_platform_profiles
    supported:
      - skew_case_id: skew_case:desktop.platform.current_claimed_profile_revision
        combination_label: release, support, and claim surfaces cite one current claimed_desktop_profiles revision with matching profile ids and deployment narrowings
        window_class: certified_report_freshness_window
        outside_window_posture: degraded
        notes: >
          Claim-bearing desktop wording stays bounded to the published
          profile roster and its platform-owned primitive rows.
    best_effort:
      - skew_case_id: skew_case:desktop.platform.named_browser_or_package_manager_outside_normative_path
        combination_label: host matches a named OS profile but uses a browser brand or package-manager lane marked best_effort in the profile registry
        window_class: certified_report_freshness_window
        outside_window_posture: degraded
        notes: >
          The user may continue locally, but release/support copy may not
          promote the path to a defended claim.
    untested:
      - skew_case_id: skew_case:desktop.platform.new_os_minor_or_desktop_variant_without_row
        combination_label: newer OS minor, different Linux desktop environment, different display stack, or different secret-store implementation appears without a published profile row
        window_class: certified_report_freshness_window
        outside_window_posture: degraded
        notes: >
          Explicitly reserved so "close enough" host similarity does not
          silently become a stable platform claim.
    unsupported:
      - skew_case_id: skew_case:desktop.platform.unclaimed_architecture_or_lane_rendered_as_supported
        combination_label: Windows ARM64, Linux ARM64, an unclaimed package/deployment lane, or an unnamed Linux desktop profile is rendered with claim-bearing desktop wording
        window_class: certified_report_freshness_window
        outside_window_posture: explicitly_unsupported
        notes: >
          Claim surfaces must narrow or refuse the wording rather than
          silently widen the profile set.

  - register_id: skew_register:deployment_profiles.boundary_manifest_truth
    qualification_row_ref: compat_row:deployment_profiles.boundary_manifest_truth
    artifact_or_protocol_boundary_label: boundary.deployment.profile_truth
    supported:
      - skew_case_id: skew_case:deployment_profiles.shared_profile_ids_and_drill_refs
        combination_label: boundary rows, continuity drills, and review packets quote one shared deployment-profile vocabulary
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed
    best_effort:
      - skew_case_id: skew_case:deployment_profiles.profile_seed_with_narrowed_claim_language
        combination_label: boundary manifest remains a strawman while signoff and release packets still narrow claims explicitly
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
    untested: []
    unsupported:
      - skew_case_id: skew_case:deployment_profiles.packet_local_alias
        combination_label: packet invents a deployment-profile alias or locality label not present in the canonical vocabulary
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed

  - register_id: skew_register:governance.canonical_decision_register
    qualification_row_ref: compat_row:governance.canonical_decision_register
    artifact_or_protocol_boundary_label: boundary.governance.decision_register
    supported:
      - skew_case_id: skew_case:governance.decision_ids_cited_verbatim
        combination_label: review packets, scorecards, and risk registers cite decision and dependency ids verbatim
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed
    best_effort: []
    untested: []
    unsupported:
      - skew_case_id: skew_case:governance.packet_parallel_decision_alias
        combination_label: milestone or release packet creates a parallel decision id instead of quoting the canonical register
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed

  - register_id: skew_register:attention.notification_and_chronology_primitives
    qualification_row_ref: compat_row:attention.notification_and_chronology_primitives
    artifact_or_protocol_boundary_label: boundary.attention.notification_and_chronology
    supported:
      - skew_case_id: skew_case:attention.shared_notification_and_chronology_vocab
        combination_label: attention taxonomy, quiet-hours rows, and chronology packet stay in one additive epoch
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
    best_effort:
      - skew_case_id: skew_case:attention.taxonomy_seed_without_product_activity_center
        combination_label: milestone packet quotes the seed vocabulary before product activity-center artifacts land
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
    untested: []
    unsupported:
      - skew_case_id: skew_case:attention.parallel_timeline_or_notification_labels
        combination_label: packet or support export invents notification or chronology labels outside the canonical vocabularies
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed

  - register_id: skew_register:workspace.local_history_and_mutation_lineage
    qualification_row_ref: compat_row:workspace.local_history_and_mutation_lineage
    artifact_or_protocol_boundary_label: boundary.workspace.local_history_and_mutation_lineage
    supported:
      - skew_case_id: skew_case:workspace.local_history_same_epoch
        combination_label: local-history, mutation-journal, and restore-facing exports stay in one additive schema epoch
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
    best_effort:
      - skew_case_id: skew_case:workspace.seeded_restore_without_full_ui_projection
        combination_label: support/export packets preserve lineage truth before compare/restore product surfaces land
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
    untested: []
    unsupported:
      - skew_case_id: skew_case:workspace.recovery_packet_without_mutation_identity
        combination_label: packet claims local-history or restore truth without mutation ids or checkpoint identity
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed

  - register_id: skew_register:security.intake_and_incident_workspace
    qualification_row_ref: compat_row:security.intake_and_incident_workspace
    artifact_or_protocol_boundary_label: boundary.security.intake_and_incident_workspace
    supported:
      - skew_case_id: skew_case:security.seeded_intake_schema_epoch
        combination_label: severity matrix, advisory schema, and incident packet schema stay in one additive epoch
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
    best_effort:
      - skew_case_id: skew_case:security.monitored_contact_reserved_not_landed
        combination_label: packet keeps the monitored SECURITY.md path as an explicit reserved dependency rather than claiming it is live
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
    untested: []
    unsupported:
      - skew_case_id: skew_case:security.parallel_incident_or_advisory_identity
        combination_label: incident or advisory packet uses ids or severity labels outside the seeded vocabulary
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed

  - register_id: skew_register:automation.cli_headless_contract
    qualification_row_ref: compat_row:automation.cli_headless_contract
    artifact_or_protocol_boundary_label: boundary.automation.cli_headless_contract
    supported:
      - skew_case_id: skew_case:automation.command_and_return_code_seed_aligned
        combination_label: command descriptors, invocation packets, and unattended return-code families stay aligned
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed
    best_effort:
      - skew_case_id: skew_case:automation.posture_declared_without_runtime_surface
        combination_label: milestone packet quotes the declared CLI/headless posture before the runtime surface fully lands
        window_class: same_schema_epoch_additive_only
        outside_window_posture: degraded
    untested: []
    unsupported:
      - skew_case_id: skew_case:automation.parallel_exit_or_command_vocab
        combination_label: a packet or tool invents a command or return-code family outside the canonical seed
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed

  - register_id: skew_register:ux.accessibility_and_locale_review_lanes
    qualification_row_ref: compat_row:ux.accessibility_and_locale_review_lanes
    artifact_or_protocol_boundary_label: boundary.ux.accessibility_and_locale_review_lanes
    supported:
      - skew_case_id: skew_case:ux.explicitly_deferred_with_signed_exception
        combination_label: packet names the missing accessibility review home and locale-governance lane as explicit deferred exceptions
        window_class: same_schema_epoch_additive_only
        outside_window_posture: explicitly_unsupported
    best_effort: []
    untested: []
    unsupported:
      - skew_case_id: skew_case:ux.blocker_omitted_from_signoff_packet
        combination_label: packet omits the accessibility or locale blocker entirely
        window_class: same_schema_epoch_additive_only
        outside_window_posture: fail_closed
