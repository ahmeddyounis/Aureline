# Skew-window and upgrade-order declaration seed.
#
# Machine-readable companion to artifacts/compat/qualification_matrix_seed.yaml
# and artifacts/compat/version_skew_register.yaml. This file is the
# authoritative declaration of supported skew windows, upgrade order,
# rollback order, downgrade behavior, and unsupported-state behavior
# for each named distributed or file/schema boundary.
#
# Rules.
#   - Every entry names exactly one boundary_family from the reserved
#     vocabulary in schemas/compat/mixed_version_envelope.schema.json and
#     binds to exactly one compat_row:<id> and exactly one
#     skew_register:<id>.
#   - Supported skew is a positive window. Best-effort and untested are
#     explicit reserved states, not a silent fallback. Unsupported is a
#     closed verdict with a visible reason and a declared posture
#     (fail_closed, read_only, degraded, explicitly_unsupported).
#   - upgrade_order and rollback_order are lists of component families.
#     Boundaries that only promote the whole artifact set together keep
#     one entry and set compliance semantics to
#     not_applicable_coordinated_set_only in the envelope.
#   - downgrade behavior is declared explicitly (supported,
#     best_effort, untested, unsupported, requires_coordinated_artifact_set)
#     so downgrade is never an accidental capability.
#   - reserved_boundary_fields lists the per-boundary negotiated fields
#     an envelope carries for this family. Tooling reads this list to
#     validate that a mixed-version envelope instance carries the
#     expected fields; it does not invent boundary-local field aliases.
#   - unsupported_state_behavior carries a contract rule the boundary
#     applies whenever the current combination is unsupported. This is
#     not prose commentary; it is the rule release-evidence and support
#     tooling render verbatim.
#   - A seed entry may be added for a future boundary before the
#     runtime lands; its evidence_status stays reserved_no_fixture_yet
#     and its unsupported-state behavior still fails closed.

schema_version: 1
status: seeded

qualification_matrix_source: artifacts/compat/qualification_matrix_seed.yaml
version_skew_register_source: artifacts/compat/version_skew_register.yaml
envelope_schema_source: schemas/compat/mixed_version_envelope.schema.json
overview_page: docs/compat/upgrade_order_contract.md

boundary_family_vocabulary:
  - launcher_and_local_sidecars
  - desktop_cli_and_remote_agent
  - managed_control_plane
  - extension_host_and_sdk
  - schema_or_state_bundle
  - provider_linked_packet
  - audit_or_event_producer_consumer
  - cli_or_export_boundary
  - browser_companion_and_remote_or_review_session

support_state_vocabulary:
  - supported
  - best_effort
  - untested
  - unsupported
  - explicitly_unsupported

outside_window_posture_vocabulary:
  - fail_closed
  - read_only
  - degraded
  - explicitly_unsupported

downgrade_support_class_vocabulary:
  - downgrade_supported
  - downgrade_best_effort
  - downgrade_untested
  - downgrade_unsupported
  - downgrade_requires_coordinated_artifact_set

declarations:

  - skew_window_id: skew_window:launcher_and_local_sidecars.coordinated_artifact_set
    boundary_family: launcher_and_local_sidecars
    qualification_row_ref: compat_row:launcher.local_helper_contracts
    artifact_or_protocol_boundary_label: boundary.runtime.launcher_local_sidecars
    version_skew_register_ref: skew_register:launcher.local_helper_contracts
    claimed_deployment_profiles:
      - individual_local
      - self_hosted
      - enterprise_online
      - air_gapped
      - managed_cloud
    supported_window:
      window_class: coordinated_artifact_set_only
      summary: >
        Launcher and helper binaries come from one coordinated artifact
        set with shared build identity, contract version, and schema
        epoch. Rolling upgrades are not a claim on this boundary.
    upgrade_order:
      declared_order:
        - coordinated_artifact_set.launcher_and_helpers
      notes: >
        Promote the full launcher-plus-helpers artifact graph together.
        Mixed startup outside the coordinated set is refused, not
        warned.
    rollback_order:
      declared_order:
        - coordinated_artifact_set.launcher_and_helpers
      notes: Rollback restores the prior coordinated set, never a partial mix.
    downgrade_behavior:
      support_class: downgrade_requires_coordinated_artifact_set
      state_preservation_note: >
        Local-only workspace state preserved across rollback; mid-flight
        helper sessions are refused rather than migrated.
      note: >
        Downgrade is a coordinated rollback; individual helpers cannot
        downgrade while the launcher stays forward.
    unsupported_state_behavior:
      state_class: unsupported
      out_of_window_posture: fail_closed
      contract_rule: >
        Refuse mixed launcher/helper startup with a visible reason;
        offer rollback to the prior coordinated artifact set.
    reserved_boundary_fields:
      - coordinated_artifact_set_ref
      - contract_version
      - schema_epoch
    default_repair_hints:
      - rollback_artifact_set
      - contact_admin_or_support
    downstream_consumers:
      - compatibility_report
      - support_bundle
      - claim_manifest

  - skew_window_id: skew_window:desktop_cli_and_remote_agent.declared_adjacent_window
    boundary_family: desktop_cli_and_remote_agent
    qualification_row_ref: compat_row:remote.attach_envelope_and_drift
    artifact_or_protocol_boundary_label: boundary.remote.agent_attach_envelope
    version_skew_register_ref: skew_register:remote.attach_envelope_and_drift
    claimed_deployment_profiles:
      - individual_local
      - self_hosted
      - enterprise_online
      - managed_cloud
    supported_window:
      window_class: declared_adjacent_window
      summary: >
        Client and agent stay within the declared adjacent support
        window and negotiate the capability intersection, never the
        optimistic superset.
    upgrade_order:
      declared_order:
        - desktop_or_cli_client
        - remote_agent
      notes: >
        Upgrade the control surface first where possible. Violation
        surfaces as a visible reason and a typed repair hint.
    rollback_order:
      declared_order:
        - remote_agent
        - desktop_or_cli_client
      notes: >
        Roll the agent back first on regressions so the control surface
        stays adjacent to the last known-good agent.
    downgrade_behavior:
      support_class: downgrade_best_effort
      state_preservation_note: >
        Review-only and file-only attach remain available during
        downgrade; mutating attach may narrow.
      note: >
        Downgrade to the declared previous adjacent window is a
        best-effort path, never a silent support claim beyond the
        declared window.
    unsupported_state_behavior:
      state_class: unsupported
      out_of_window_posture: degraded
      contract_rule: >
        Refuse attach or degrade to file-or-review-only mode with a
        visible upgrade or downgrade hint. Never partially load the
        mutating session.
    reserved_boundary_fields:
      - client_version
      - agent_version
      - min_protocol
      - max_protocol
      - toolchain_manifest_epoch
    default_repair_hints:
      - upgrade_component
      - downgrade_component
      - use_file_or_review_only_mode
      - reattach_session
    downstream_consumers:
      - compatibility_report
      - claim_manifest
      - support_bundle

  - skew_window_id: skew_window:managed_control_plane.current_plus_previous_minor_or_lts
    boundary_family: managed_control_plane
    qualification_row_ref: compat_row:provider.service_api_and_browser_handoff
    artifact_or_protocol_boundary_label: boundary.provider.service_api_family
    version_skew_register_ref: skew_register:provider.service_api_and_browser_handoff
    claimed_deployment_profiles:
      - enterprise_online
      - managed_cloud
    supported_window:
      window_class: current_plus_previous_minor_or_lts
      summary: >
        Current published service family plus the declared previous
        minor or LTS window. Control-plane additive evolution may
        move ahead of clients; breaking moves must stage by region or
        ring.
    upgrade_order:
      declared_order:
        - managed_control_plane
        - desktop_cli_or_browser_client
      notes: >
        Control plane ahead of clients only for additive evolution;
        breaking moves stage by region or ring before any client
        update.
    rollback_order:
      declared_order:
        - managed_control_plane
        - desktop_cli_or_browser_client
      notes: >
        Roll control plane back first when a region or ring regresses;
        clients stay on the cached read-only posture until the rollback
        completes.
    downgrade_behavior:
      support_class: downgrade_best_effort
      state_preservation_note: >
        Cached read-only state remains usable; privileged write paths
        are refused rather than partially executed.
      note: Downgrade to the prior minor or LTS is a best-effort lane.
    unsupported_state_behavior:
      state_class: unsupported
      out_of_window_posture: read_only
      contract_rule: >
        Cached read-only safe operations only; privileged writes are
        blocked with an explicit incompatibility reason.
    reserved_boundary_fields:
      - api_version
      - tenancy_region_epoch
      - capability_policy_ref
    default_repair_hints:
      - use_cached_read_only_mode
      - upgrade_component
      - refresh_policy_bundle
      - wait_for_staged_rollout
      - contact_admin_or_support
    downstream_consumers:
      - compatibility_report
      - claim_manifest

  - skew_window_id: skew_window:extension_host_and_sdk.published_sdk_support_window
    boundary_family: extension_host_and_sdk
    qualification_row_ref: compat_row:extension_host.sdk_wit_permission_window
    artifact_or_protocol_boundary_label: boundary.extensions.host_contract_and_permission_vocab
    version_skew_register_ref: skew_register:extension_host.sdk_wit_permission_window
    claimed_deployment_profiles:
      - individual_local
      - self_hosted
      - enterprise_online
      - air_gapped
      - managed_cloud
    supported_window:
      window_class: published_sdk_support_window
      summary: >
        Manifest SDK range, WIT ABI version, and permission vocabulary
        all fall within the published support window.
    upgrade_order:
      declared_order:
        - extension_host_and_runtime
        - extension
      notes: >
        Upgrade host and runtime before extensions so the host can
        still parse or quarantine older extensions; extensions never
        lead host upgrades on this boundary.
    rollback_order:
      declared_order:
        - extension
        - extension_host_and_runtime
      notes: >
        Roll the extension back first on regressions; only roll the
        host back when the regression is host-owned.
    downgrade_behavior:
      support_class: downgrade_unsupported
      state_preservation_note: >
        Host downgrade disables or quarantines extensions that expect
        newer permission vocabulary rather than partially loading
        them.
      note: >
        Host downgrade is not a supported lane; extensions that
        required the newer window become disabled or quarantined.
    unsupported_state_behavior:
      state_class: explicitly_unsupported
      out_of_window_posture: explicitly_unsupported
      contract_rule: >
        Extension is disabled or quarantined. Never partially loaded
        in ambiguous mode. Required WIT world, permission version, or
        SDK floor outside the published window is a refusal, not a
        warning.
    reserved_boundary_fields:
      - sdk_range
      - wit_abi_version
      - permission_vocabulary_version
    default_repair_hints:
      - disable_or_quarantine_extension
      - upgrade_component
      - contact_admin_or_support
    downstream_consumers:
      - compatibility_report
      - claim_manifest
      - support_bundle

  - skew_window_id: skew_window:schema_or_state_bundle.additive_epoch
    boundary_family: schema_or_state_bundle
    qualification_row_ref: compat_row:state.profile_layout_schema
    artifact_or_protocol_boundary_label: boundary.profile.portable_profile_and_layout_restore
    version_skew_register_ref: skew_register:state.profile_layout_schema
    claimed_deployment_profiles:
      - individual_local
      - self_hosted
      - enterprise_online
      - air_gapped
      - managed_cloud
    supported_window:
      window_class: same_schema_epoch_additive_only
      summary: >
        Producer and consumer preserve one schema epoch with
        additive-field tolerance; unknown additive fields are
        preserved, required-field or meaning-changing drift is out of
        window.
    upgrade_order:
      declared_order:
        - schema_producer
        - schema_consumer
      notes: >
        Producers may ship additive fields ahead of consumers provided
        consumers preserve unknown additive fields. Breaking epoch
        moves require consumer upgrades first.
    rollback_order:
      declared_order:
        - schema_producer
        - schema_consumer
      notes: >
        Roll the producer back to the prior additive frontier before
        rolling the consumer back, so the consumer is never asked to
        parse a future-only field during rollback.
    downgrade_behavior:
      support_class: downgrade_supported
      state_preservation_note: >
        Additive-only downgrade preserves user-authored durable truth.
        Meaning-changing downgrades refuse rather than rewrite state.
      note: >
        Downgrade is supported across one additive epoch. Cross-epoch
        downgrade is a separate migration packet.
    unsupported_state_behavior:
      state_class: unsupported
      out_of_window_posture: fail_closed
      contract_rule: >
        Consumers that cannot attribute a required field refuse the
        payload with an attributed error. Silent truncation is
        forbidden. Explicitly excluded or admin-owned state rendered
        as portable user truth fails closed.
    reserved_boundary_fields:
      - schema_family
      - schema_epoch
      - additive_field_posture
    default_repair_hints:
      - upgrade_component
      - downgrade_component
      - import_compatible_bundle
      - reissue_skew_snapshot
    downstream_consumers:
      - compatibility_report
      - support_bundle

  - skew_window_id: skew_window:provider_linked_packet.service_family_window
    boundary_family: provider_linked_packet
    qualification_row_ref: compat_row:provider.service_api_and_browser_handoff
    artifact_or_protocol_boundary_label: boundary.provider.service_api_family
    version_skew_register_ref: skew_register:provider.service_api_and_browser_handoff
    claimed_deployment_profiles:
      - individual_local
      - self_hosted
      - enterprise_online
      - managed_cloud
    supported_window:
      window_class: current_plus_previous_minor_or_lts
      summary: >
        Provider-linked packet lanes stay within the current published
        service family plus the declared previous minor or LTS
        window.
    upgrade_order:
      declared_order:
        - provider_service_family
        - provider_linked_client
      notes: >
        Provider service upgrades ahead of clients only for additive
        evolution.
    rollback_order:
      declared_order:
        - provider_service_family
        - provider_linked_client
      notes: >
        Roll the service family back first when a privileged-write
        lane regresses; clients retain cached metadata in the
        meantime.
    downgrade_behavior:
      support_class: downgrade_best_effort
      state_preservation_note: >
        Cached metadata and safe read paths remain rendered; privileged
        writes refuse.
      note: >
        Downgrade to the prior minor or LTS is a best-effort read-path
        lane.
    unsupported_state_behavior:
      state_class: unsupported
      out_of_window_posture: read_only
      contract_rule: >
        Privileged or approval-bearing writes targeting an API family
        outside the window fail closed; cached reads remain available
        where the prior window supported them.
    reserved_boundary_fields:
      - provider_service_family_ref
      - service_api_version
      - previous_minor_or_lts_window
    default_repair_hints:
      - use_cached_read_only_mode
      - wait_for_staged_rollout
      - upgrade_component
      - contact_admin_or_support
    downstream_consumers:
      - compatibility_report
      - claim_manifest
      - support_bundle

  - skew_window_id: skew_window:audit_or_event_producer_consumer.additive_epoch
    boundary_family: audit_or_event_producer_consumer
    qualification_row_ref: compat_row:tooling.task_event_envelope
    artifact_or_protocol_boundary_label: boundary.tooling.task_event_envelope
    version_skew_register_ref: skew_register:tooling.task_event_envelope
    claimed_deployment_profiles:
      - individual_local
      - self_hosted
      - enterprise_online
      - air_gapped
      - managed_cloud
    supported_window:
      window_class: same_schema_epoch_additive_only
      summary: >
        Task-event and audit-event producers and consumers preserve
        one stable epoch with additive-only evolution. Consumers may
        lag producers within an epoch if unknown fields are
        preserved.
    upgrade_order:
      declared_order:
        - event_producer
        - event_consumer
      notes: >
        Producers may ship additive fields ahead of consumers.
        Consumers that cannot preserve unknown additive fields must
        upgrade before the producer moves.
    rollback_order:
      declared_order:
        - event_producer
        - event_consumer
      notes: >
        Roll producers back to the prior additive frontier before
        rolling consumers back so retention and privacy class remain
        attributable.
    downgrade_behavior:
      support_class: downgrade_supported
      state_preservation_note: >
        Audit continuity preserved across additive downgrades; no
        silent truncation.
      note: Additive-only downgrade preserves event lineage.
    unsupported_state_behavior:
      state_class: unsupported
      out_of_window_posture: fail_closed
      contract_rule: >
        Consumers that cannot attribute required payload kind or
        retention class refuse ingest with an attributed error.
        Silent truncation is forbidden.
    reserved_boundary_fields:
      - event_schema_epoch
      - required_capability_set
      - retention_class
    default_repair_hints:
      - upgrade_component
      - reissue_skew_snapshot
      - contact_admin_or_support
    downstream_consumers:
      - compatibility_report
      - support_bundle

  - skew_window_id: skew_window:cli_or_export_boundary.additive_epoch
    boundary_family: cli_or_export_boundary
    qualification_row_ref: compat_row:automation.cli_headless_contract
    artifact_or_protocol_boundary_label: boundary.automation.cli_headless_contract
    version_skew_register_ref: skew_register:automation.cli_headless_contract
    claimed_deployment_profiles:
      - individual_local
      - self_hosted
      - enterprise_online
      - air_gapped
      - managed_cloud
    supported_window:
      window_class: same_schema_epoch_additive_only
      summary: >
        CLI structured output and export schemas stay within one
        additive epoch; return-code family and command descriptors
        remain aligned.
    upgrade_order:
      declared_order:
        - cli_export_producer
        - cli_export_reader
      notes: >
        Producers may emit additive fields ahead of readers when the
        reader preserves unknown additive fields.
    rollback_order:
      declared_order:
        - cli_export_producer
        - cli_export_reader
      notes: Roll producers back first so readers never parse a future-only field.
    downgrade_behavior:
      support_class: downgrade_supported
      state_preservation_note: >
        Export payloads preserve structured truth across additive
        downgrade; no field meanings change silently.
      note: Downgrade within one additive epoch is a supported lane.
    unsupported_state_behavior:
      state_class: unsupported
      out_of_window_posture: fail_closed
      contract_rule: >
        A packet or tool that invents a return-code family or command
        family outside the canonical seed fails closed. Readers
        refuse the export with an attributed reason.
    reserved_boundary_fields:
      - export_schema_family
      - export_schema_version
      - return_code_family_ref
    default_repair_hints:
      - upgrade_component
      - import_compatible_bundle
      - contact_admin_or_support
    downstream_consumers:
      - compatibility_report
      - support_bundle

  - skew_window_id: skew_window:browser_companion_and_remote_or_review_session.service_family_window
    boundary_family: browser_companion_and_remote_or_review_session
    qualification_row_ref: compat_row:remote.attach_envelope_and_drift
    artifact_or_protocol_boundary_label: boundary.remote.agent_attach_envelope
    version_skew_register_ref: skew_register:remote.attach_envelope_and_drift
    claimed_deployment_profiles:
      - individual_local
      - enterprise_online
      - managed_cloud
    supported_window:
      window_class: current_plus_previous_minor_or_lts
      summary: >
        Browser companion stays within the current service family plus
        the declared previous service-family window; session protocol
        and scoped capability manifest negotiate the intersection.
    upgrade_order:
      declared_order:
        - remote_or_review_service
        - browser_companion
      notes: >
        Upgrade the remote or review service ahead of the companion
        surface so the companion can degrade to a handoff path rather
        than a partial session.
    rollback_order:
      declared_order:
        - remote_or_review_service
        - browser_companion
      notes: >
        Roll the service back first on session regressions; the
        companion falls back to desktop handoff in the meantime.
    downgrade_behavior:
      support_class: downgrade_best_effort
      state_preservation_note: >
        Review-only continuity preserved; mutating session paths
        refuse.
      note: Downgrade is a best-effort review-only lane.
    unsupported_state_behavior:
      state_class: unsupported
      out_of_window_posture: degraded
      contract_rule: >
        Hand off to desktop or degrade to a review-only fallback
        rather than continuing a partial session.
    reserved_boundary_fields:
      - session_protocol_version
      - scoped_capability_manifest_ref
      - previous_service_family_window
    default_repair_hints:
      - use_file_or_review_only_mode
      - reattach_session
      - contact_admin_or_support
    downstream_consumers:
      - compatibility_report
      - support_bundle
