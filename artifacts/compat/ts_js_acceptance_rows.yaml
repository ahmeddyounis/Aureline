acceptance_rows:
  - acceptance_row_id: ts_js_acceptance_row:monorepo_first_useful_result
    requirement_class: required_launch
    workflow_axis: monorepo_navigation
    public_label: Open large TS/JS monorepo to first useful result
    minimum_expectation: >
      Quick open, tree population, and initial symbol/search results are
      useful before full semantic/typegraph completion. Index completeness,
      confidence, and freshness labels remain honest while warm-up
      continues.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs:
      - framework_pack:typescript_web.react
      - framework_pack:typescript_web.vite
    evidence_hooks:
      - hook_class: reference_scenario
        refs:
          - fixtures/compat/ts_js_reference_scenarios/large_monorepo_navigation.md
      - hook_class: reference_workspace_row
        refs:
          - archetype_row:ts_web_app_or_service
      - hook_class: benchmark_corpus_scenario
        refs:
          - archetype.ts_web_app_first_open_certified
          - workflow.first_useful_edit_ts_web_app
      - hook_class: docs_contract
        refs:
          - docs/graph/project_graph_and_indexing_seed.md
      - hook_class: claim_manifest_row
        refs:
          - claim_row:certification.launch_wedge_typescript_web
    notes: >
      This is the minimal acceptance row behind any "replacement-grade
      TS/JS" statement. It is explicitly not blocked on full background
      indexing, but it is blocked on honest labeling of incomplete results.

  - acceptance_row_id: ts_js_acceptance_row:rename_across_project_references
    requirement_class: required_launch
    workflow_axis: refactor_rename_and_references
    public_label: Project-references rename across packages
    minimum_expectation: >
      Rename and find-references honor project boundaries, path aliases,
      and generated declaration relationships with attributable confidence.
      Preview and rollback posture is explicit when index completeness is
      partial or when edits touch generated/protected artifacts.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs:
      - framework_pack:typescript_web.react
      - framework_pack:typescript_web.next_js
    evidence_hooks:
      - hook_class: reference_scenario
        refs:
          - fixtures/compat/ts_js_reference_scenarios/project_references_rename.md
      - hook_class: benchmark_corpus_scenario
        refs:
          - workflow.ts_js_project_references_rename_across_packages
      - hook_class: docs_contract
        refs:
          - docs/editor/refactor_and_replace_transaction_contract.md
          - docs/architecture/generated_artifact_safe_edit_policy.md
    notes: >
      A rename that crosses package boundaries must remain reviewable.
      Partial-index conditions downgrade preview completeness rather than
      silently dropping matches.

  - acceptance_row_id: ts_js_acceptance_row:framework_route_to_component_workflow
    requirement_class: required_launch
    workflow_axis: framework_route_and_component_graph
    public_label: React/Next route and component workflow
    minimum_expectation: >
      Navigate from routes to components, tests, and configuration with
      framework-aware context. The framework-derived graph is visible as a
      project-graph fact, and gaps are labeled rather than inferred as
      authoritative.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs:
      - framework_pack:typescript_web.react
      - framework_pack:typescript_web.next_js
    evidence_hooks:
      - hook_class: reference_scenario
        refs:
          - fixtures/compat/ts_js_reference_scenarios/framework_route_component_navigation.md
      - hook_class: benchmark_corpus_scenario
        refs:
          - workflow.ts_js_next_route_to_component_navigation
      - hook_class: docs_contract
        refs:
          - docs/graph/project_graph_and_indexing_seed.md
    notes: >
      "Framework-aware context" is a contract: it must cite the framework
      pack and the project-graph nodes it materializes instead of relying
      on ad hoc heuristics.

  - acceptance_row_id: ts_js_acceptance_row:test_discover_run_rerun_debug
    requirement_class: required_launch
    workflow_axis: test_debug_build_loop
    public_label: Vitest/Jest targeted test run and debug loop
    minimum_expectation: >
      Discover, run, rerun-failed, and debug targeted tests with correct
      execution-context provenance. Test runners do not widen trust,
      package-manager egress, or lifecycle-script execution without an
      explicit reviewable plan.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs:
      - framework_pack:typescript_web.vitest
      - framework_pack:typescript_web.jest
    evidence_hooks:
      - hook_class: reference_scenario
        refs:
          - fixtures/compat/ts_js_reference_scenarios/test_debug_build_loop.md
      - hook_class: benchmark_corpus_scenario
        refs:
          - workflow.ts_js_targeted_test_run_and_debug
      - hook_class: docs_contract
        refs:
          - docs/execution/run_and_attempt_contract.md
          - docs/commands/invocation_result_and_parity_contract.md
          - docs/execution/package_manager_and_lockfile_safety_contract.md
      - hook_class: support_packet_family
        refs:
          - docs/support/project_doctor_packet.md
    notes: >
      This row is satisfied only when the test/debug loop remains
      attributable and reviewable across local and remote execution modes.

  - acceptance_row_id: ts_js_acceptance_row:node_debug_sourcemaps_stability
    requirement_class: required_launch
    workflow_axis: test_debug_build_loop
    public_label: Node service debug loop with stable source maps
    minimum_expectation: >
      Run, attach, breakpoints, stack variables, and source-map mapping
      remain stable across dev and production-like builds. Artifact
      resolution never guesses; it cites the resolution packet and names
      the build identity and symbol/source-map lineage.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs:
      - framework_pack:typescript_web.next_js
    evidence_hooks:
      - hook_class: reference_scenario
        refs:
          - fixtures/compat/ts_js_reference_scenarios/node_debug_sourcemaps.md
      - hook_class: benchmark_corpus_scenario
        refs:
          - workflow.ts_js_node_debug_attach_and_sourcemaps
      - hook_class: docs_contract
        refs:
          - docs/debug/artifact_resolution_seed.md
          - docs/debug/chronology_and_reverse_execution_contract.md
    notes: >
      "Stable across dev/prod-like builds" is measured by comparing
      artifact-resolution packets, not by free-text release notes.

  - acceptance_row_id: ts_js_acceptance_row:browser_preview_and_hmr
    requirement_class: required_launch
    workflow_axis: browser_preview_and_source_maps
    public_label: Browser preview runtime, HMR, and source mapping
    minimum_expectation: >
      Browser preview and dev-server flows are attributable: route truth
      (local-only vs shareable), tunnel disclosure, and source-map mapping
      are visible. If a workflow requires a system-browser handoff, the
      handoff is explicit with a reviewable authority envelope.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs:
      - framework_pack:typescript_web.vite
      - framework_pack:typescript_web.next_js
    evidence_hooks:
      - hook_class: reference_scenario
        refs:
          - fixtures/compat/ts_js_reference_scenarios/browser_preview_runtime.md
      - hook_class: benchmark_corpus_scenario
        refs:
          - workflow.ts_js_browser_preview_and_hmr
      - hook_class: docs_contract
        refs:
          - docs/remote/attach_tunnel_port_forward_contract.md
          - docs/runtime/browser_runtime_contract.md
          - schemas/runtime/preview_route.schema.json
    notes: >
      This row blocks any claim that TS/JS workflows are "fully supported"
      in remote or shared preview modes unless route truth and disclosure
      are implemented and evidence-linked.

  - acceptance_row_id: ts_js_acceptance_row:generated_artifacts_safe_handling
    requirement_class: required_launch
    workflow_axis: generated_artifacts_and_provenance
    public_label: Generated artifacts, lockfiles, and build outputs stay honest
    minimum_expectation: >
      Generated artifacts (lockfiles, build outputs, type declarations,
      framework caches) cannot masquerade as canonical source. Search, open,
      review, AI, and export surfaces preserve the same generated-artifact
      lineage and safe-edit posture.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs:
      - framework_pack:typescript_web.npm_pnpm_toolchain
    evidence_hooks:
      - hook_class: reference_scenario
        refs:
          - fixtures/compat/ts_js_reference_scenarios/generated_artifacts_and_lineage.md
      - hook_class: docs_contract
        refs:
          - docs/architecture/generated_artifact_safe_edit_policy.md
          - docs/execution/package_manager_and_lockfile_safety_contract.md
      - hook_class: fixture_directory
        refs:
          - fixtures/generated/drift_regeneration_manifest.yaml
    notes: >
      Lockfiles are generated artifacts. Any "quick fix" or AI patch that
      edits a lockfile must be framed as a reviewed regeneration intent,
      not as an ordinary source edit.

  - acceptance_row_id: ts_js_acceptance_row:package_manager_safety_plans
    requirement_class: required_launch
    workflow_axis: package_manager_and_lockfile_safety
    public_label: Package-manager safety (npm/pnpm) and no-hidden-mutation guards
    minimum_expectation: >
      Any install/update/remove/audit/fix workflow produces a reviewable
      package-change plan with explicit lockfile impact, lifecycle script
      posture, registry source, network egress class, and rollback/checkpoint
      strategy before writes or network actions occur.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs:
      - framework_pack:typescript_web.npm_pnpm_toolchain
    evidence_hooks:
      - hook_class: reference_scenario
        refs:
          - fixtures/compat/ts_js_reference_scenarios/package_manager_lockfile_safety.md
      - hook_class: docs_contract
        refs:
          - docs/execution/package_manager_and_lockfile_safety_contract.md
          - docs/package/package_action_contract.md
      - hook_class: fixture_directory
        refs:
          - fixtures/execution/package_manager_cases/
    notes: >
      This row exists to prevent "helpful" TS workflows from widening
      network/script authority via implicit package-manager operations.

  - acceptance_row_id: ts_js_acceptance_row:mixed_js_ts_path_aliases
    requirement_class: required_launch
    workflow_axis: monorepo_navigation
    public_label: Mixed JS/TS workspace with path aliases stays coherent
    minimum_expectation: >
      Diagnostics, navigation, and edits remain coherent despite mixed
      module systems or transitional typing states. Stale or partial
      semantic answers are labeled; the UI never implies false certainty.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs:
      - framework_pack:typescript_web.react
    evidence_hooks:
      - hook_class: reference_scenario
        refs:
          - fixtures/compat/ts_js_reference_scenarios/mixed_js_ts_workspace.md
      - hook_class: benchmark_corpus_scenario
        refs:
          - workflow.ts_js_mixed_workspace_path_aliases
      - hook_class: docs_contract
        refs:
          - docs/graph/project_graph_and_indexing_seed.md

  - acceptance_row_id: ts_js_acceptance_row:remote_container_identity_and_attribution
    requirement_class: required_launch
    workflow_axis: remote_or_container_mode
    public_label: Remote/container TS workflow remains attributable
    minimum_expectation: >
      Toolchain identity, package-manager posture, config root, and route
      truth remain inspectable and attributable when remote execution is
      active. Remote attach narrows capabilities explicitly when trust,
      policy, or missing tools block the workflow.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs:
      - framework_pack:typescript_web.vite
      - framework_pack:typescript_web.npm_pnpm_toolchain
    evidence_hooks:
      - hook_class: reference_scenario
        refs:
          - fixtures/compat/ts_js_reference_scenarios/remote_container_workflow.md
      - hook_class: docs_contract
        refs:
          - docs/remote/attach_tunnel_port_forward_contract.md
          - docs/verification/target_and_host_boundary_packet.md
          - docs/execution/package_manager_and_lockfile_safety_contract.md
      - hook_class: fixture_directory
        refs:
          - fixtures/remote/attach_cases/
    notes: >
      The certified archetype requires at least one remote mode; this row
      records the acceptance floor for that requirement without assuming a
      specific remote runtime vendor.

  - acceptance_row_id: ts_js_acceptance_row:migration_import_vscode_expectations
    requirement_class: required_launch
    workflow_axis: migration_and_import
    public_label: Migration/import expectations for TS/JS users switching from VS Code
    minimum_expectation: >
      Import is previewable and reversible: settings, keybindings, snippets,
      tasks, launch/debug configs, themes, and extension recommendations are
      translated where canonical equivalents exist, and unsupported semantics
      are reported explicitly (no silent drops, no silent trust widening).
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs:
      - framework_pack:typescript_web.npm_pnpm_toolchain
    evidence_hooks:
      - hook_class: reference_scenario
        refs:
          - fixtures/compat/ts_js_reference_scenarios/migration_import_vscode.md
      - hook_class: migration_source_row
        refs:
          - migration_source:vs_code_code_oss
      - hook_class: docs_contract
        refs:
          - docs/migration/source_ecosystem_coverage_matrix.md
          - docs/migration/first_run_import_diff_and_rollback_contract.md
      - hook_class: support_packet_family
        refs:
          - docs/support/object_handoff_packet.md
    notes: >
      This row is scoped to marketed migration lanes. It does not imply
      extension-runtime parity.

  - acceptance_row_id: ts_js_acceptance_row:ai_patch_evidence_across_projects
    requirement_class: required_launch
    workflow_axis: ai_patch_evidence_and_rollback
    public_label: AI patch over TS codebase stays attributable and rollbackable
    minimum_expectation: >
      AI patches name affected symbols/files, validation results, and a
      rollback checkpoint across TS project boundaries. Generated and
      protected artifacts are never mutated without explicit reviewable
      override posture.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs:
      - framework_pack:typescript_web.react
    evidence_hooks:
      - hook_class: reference_scenario
        refs:
          - fixtures/compat/ts_js_reference_scenarios/ai_patch_evidence_hooks.md
      - hook_class: docs_contract
        refs:
          - docs/ai/evidence_replayability_contract.md
          - docs/ai/review_assist_publish_contract.md
          - docs/editor/refactor_and_replace_transaction_contract.md
          - docs/architecture/generated_artifact_safe_edit_policy.md
    notes: >
      This row is about evidence and rollback posture, not about endorsing
      any specific model or provider.

  # -- aspirational -----------------------------------------------------------

  - acceptance_row_id: ts_js_acceptance_row:monorepo_build_systems_turbo_nx_bazel
    requirement_class: aspirational_first_party
    workflow_axis: monorepo_navigation
    public_label: Monorepo build systems (turborepo/Nx/Bazel) remain inspectable
    minimum_expectation: >
      Task discovery and execution tie to the project-graph identity model.
      Build-system-specific configuration is treated as imported/derived
      truth with explicit completeness labeling.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs: []
    evidence_hooks:
      - hook_class: docs_contract
        refs:
          - docs/graph/project_graph_and_indexing_seed.md
          - docs/execution/task_event_and_evidence_contract.md
    notes: >
      This row is aspirational because it requires additional adapters and
      corpus coverage beyond the seeded framework packs.

  - acceptance_row_id: ts_js_acceptance_row:yarn_pnp_and_alt_runtimes
    requirement_class: community_only
    workflow_axis: package_manager_and_lockfile_safety
    public_label: Yarn PnP and alternate runtimes (Bun/Deno) are community-only
    minimum_expectation: >
      If a community lane exists, it must preserve the same lockfile safety
      and network/script disclosure rules as first-party package-manager
      flows. Absent that evidence, the surface must narrow honestly.
    primary_bundle_refs:
      - launch_bundle:typescript_web_app.seed
    archetype_row_refs:
      - archetype_row:ts_web_app_or_service
    framework_pack_refs: []
    evidence_hooks:
      - hook_class: docs_contract
        refs:
          - docs/execution/package_manager_and_lockfile_safety_contract.md
    notes: >
      This row exists to prevent accidental widening of the launch-wedge
      claim through "works on my machine" community paths.
