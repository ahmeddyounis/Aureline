# TypeScript / JavaScript expert acceptance matrix rows.
#
# Machine-readable acceptance rows that translate the launch-wedge
# language posture into concrete scenarios. These rows exist so launch
# bundles, framework packs, compatibility reports, benchmark packets,
# migration claims, support exports, and docs pages can cite stable ids
# instead of repeating "TS/JS first" marketing prose.
#
# The narrative companion lives in:
#   docs/compat/typescript_javascript_expert_acceptance_matrix.md
#
# Rules.
#   - Every acceptance row has a stable acceptance_row_id. Renaming a row
#     after publication is breaking and must run through the decision
#     index.
#   - required_launch rows are the minimum acceptance floor for claiming
#     replacement-grade TypeScript/JavaScript support through the
#     TypeScript web-app launch bundle and the reference-workspace program.
#   - aspirational_first_party rows document planned uplift but do not
#     block launch copy.
#   - community_only rows may be satisfied through extensions or
#     community tooling; they are not admissible for replacement-grade
#     first-party launch claims.
#   - Evidence hooks cite concrete artifacts (rows, packets, schemas,
#     fixtures, and docs contracts). A prose-only reference is not an
#     admissible evidence hook.
#
# This file is an acceptance inventory, not an implementation claim.
# Rows may remain pending until the referenced evidence packets land.

