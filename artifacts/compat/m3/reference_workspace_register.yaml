# Beta reference-workspace corpus register.
#
# This register is the machine source for the beta reference-workspace corpus.
# It binds each named workspace to an owner, descriptor, toolchain manifest,
# privacy/license posture, workflow harness, corpus refs, and consuming
# evidence surfaces. Compatibility reports, archetype scorecards, partner
# packets, and release evidence cite this file instead of restating workspace
# scope locally.

schema_version: 1
register_id: beta_reference_workspace_corpus
register_revision: 1
as_of: "2026-05-17"
owner: "@ahmeddyounis"

human_entrypoint_ref: docs/compat/m3/reference_workspaces_beta.md
validator:
  script_ref: ci/check_m3_reference_workspace_register.py
  command: python3 ci/check_m3_reference_workspace_register.py --repo-root .
latest_capture_ref: artifacts/compat/m3/captures/reference_workspace_register_validation_capture.json

source_contract_refs:
  prd_reference_workspace_rule: .t2/docs/Aureline_PRD.md#5.38
  technical_design_reference_workspace_rule: .t2/docs/Aureline_Technical_Design_Document.md#7.13.7
  reference_workspace_rows: artifacts/compat/reference_workspace_rows.yaml
  archetype_scorecard_index: artifacts/compat/m3/archetype_scorecards/scorecard_index.yaml
  protected_benchmark_corpus: fixtures/benchmarks/corpus_manifest.yaml
  claimed_surface_register: artifacts/milestones/m3/claimed_surface_register.json
  language_bundle_rows: artifacts/product/language_bundle_rows.yaml
  migration_rows: artifacts/migration/source_ecosystem_rows.yaml
  public_benchmark_packet: artifacts/benchmarks/m3/publication_packet/packet.md

privacy_class_vocabulary:
  - public_synthetic
  - public_sanitised
privacy_decision_vocabulary:
  - admit_public
source_class_vocabulary:
  - synthetic
  - self_host_slice
mode_vocabulary:
  - local_only
  - devcontainer
  - remote_attach
  - managed_workspace
workflow_class_vocabulary:
  - benchmark
  - run
  - test
  - debug
  - migration
  - supportability
result_vocabulary:
  - pass
  - fail
  - blocked
  - not_run

required_workflow_classes:
  - benchmark
  - run
  - test
  - debug
  - migration
  - supportability

corpus_governance:
  asset_state: protected_product_asset
  addition_gate:
    - owner_named
    - descriptor_materialised
    - toolchain_manifest_declares_exact_versions
    - os_arch_and_mode_scope_declared
    - privacy_and_license_posture_cleared
    - pass_fail_harness_entries_present
    - benchmark_migration_support_release_consumers_bound
  freshness_cadence: each_release
  stale_defaults:
    workspace_descriptor_changes: retest_pending
    toolchain_manifest_changes: retest_pending
    harness_entry_changes: retest_pending
    privacy_review_expires_or_changes: blocked
    owner_missing: blocked

