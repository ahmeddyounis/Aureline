# M3 certified-archetype scorecard index.
#
# Canonical index of archetype-facing scorecards. The validator reads this
# file, discovers each named archetype scorecard, and derives the current
# effective support class. Release evidence packets, compatibility reports,
# and migration packets should consume the derived register rather than
# restating archetype freshness or downgrade rules locally.

schema_version: 1
as_of: "2026-05-15"
owner: "@ahmeddyounis"

index_id: m3_archetype_scorecard_index
human_entrypoint_ref: docs/milestones/m3/beta_admission_matrix.md
claimed_surface_register_ref: artifacts/milestones/m3/claimed_surface_register.json
archetype_rubric_ref: artifacts/compat/archetype_rubric.yaml
reference_workspace_rows_ref: artifacts/compat/reference_workspace_rows.yaml
reference_workspace_register_ref: artifacts/compat/m3/reference_workspace_register.yaml
report_template_ref: docs/release/certified_archetype_report_template.md

validator:
  script_ref: ci/check_cohort_archetype_scorecards.py
  command: python3 ci/check_cohort_archetype_scorecards.py --repo-root .

derived_register_ref: artifacts/milestones/m3/captures/cohort_archetype_scorecard_register.json
validation_capture_ref: artifacts/milestones/m3/captures/cohort_archetype_scorecard_validation_capture.json

consuming_surfaces:
  - docs/milestones/m3/beta_admission_matrix.md
  - docs/compat/m3/reference_workspaces_beta.md
  - docs/release/certified_archetype_report_template.md
  - docs/release/compatibility_report_template.md
  - docs/migration/compatibility_scorecard_contract.md

scorecards:
  - scorecard_id: archetype_scorecard:ts_web_app_or_service
    scorecard_ref: artifacts/compat/m3/archetype_scorecards/ts_web_app_or_service.md
    archetype_row_ref: archetype_row:ts_web_app_or_service
  - scorecard_id: archetype_scorecard:python_service_or_data_app
    scorecard_ref: artifacts/compat/m3/archetype_scorecards/python_service_or_data_app.md
    archetype_row_ref: archetype_row:python_service_or_data_app
  - scorecard_id: archetype_scorecard:java_or_kotlin_service
    scorecard_ref: artifacts/compat/m3/archetype_scorecards/java_or_kotlin_service.md
    archetype_row_ref: archetype_row:java_or_kotlin_service
  - scorecard_id: archetype_scorecard:rust_workspace
    scorecard_ref: artifacts/compat/m3/archetype_scorecards/rust_workspace.md
    archetype_row_ref: archetype_row:rust_workspace
  - scorecard_id: archetype_scorecard:go_service_or_monorepo_slice
    scorecard_ref: artifacts/compat/m3/archetype_scorecards/go_service_or_monorepo_slice.md
    archetype_row_ref: archetype_row:go_service_or_monorepo_slice
  - scorecard_id: archetype_scorecard:c_or_cpp_native_project
    scorecard_ref: artifacts/compat/m3/archetype_scorecards/c_or_cpp_native_project.md
    archetype_row_ref: archetype_row:c_or_cpp_native_project
