# M3 compatibility-report skew-window matrix.
#
# Milestone-scoped manifest for the M3 governed compatibility report.
# Each row binds:
#   - the canonical compat_row_id (must exist in
#     artifacts/compat/qualification_matrix_seed.yaml);
#   - a row_scope from the spec-mandated set
#     (desktop, helper, extension, schema, provider, deployment_profile);
#   - the canonical skew_window_id from artifacts/compat/skew_windows.yaml
#     (or null when the row's skew window is declared inline by the
#     qualification matrix and version-skew register only);
#   - the primary M3 cohort and claimed beta-surface ids that route this
#     row's claim through the cohort guardrails and claimed-surface
#     register; and
#   - an optional scorecard_ref so the report row inherits the derived
#     effective support class from the cohort/archetype scorecard
#     register.
#
# Tooling reads this file. The generator at
# ci/check_m3_compatibility_report.py composes the report rows from this
# matrix plus the canonical seeds; reviewers should not hand-edit the
# generated JSON or markdown.

schema_version: 1
matrix_id: m3_compatibility_report_matrix
matrix_revision: 1
milestone_id: m3
release_channel_scope: beta
report_id: compat_report:m3.beta
report_state: draft
as_of: "2026-05-15"
owner: "@ahmeddyounis"
backup_owner: null
backup_waiver: single-maintainer-backup

# Authoritative source seeds. The generator refuses to run if any of
# these is missing, malformed, or names an unknown id.
qualification_matrix_source: artifacts/compat/qualification_matrix_seed.yaml
skew_windows_source: artifacts/compat/skew_windows.yaml
version_skew_register_source: artifacts/compat/version_skew_register.yaml
scorecard_register_source: artifacts/milestones/m3/captures/cohort_archetype_scorecard_register.json
claimed_surface_register_source: artifacts/milestones/m3/claimed_surface_register.json

# Spec-mandated row-scope vocabulary. Every M3 row must declare exactly
# one row_scope from this set so the report keeps desktop, helper,
# extension, schema, provider, and deployment-profile lanes nameable.
row_scope_vocabulary:
  - desktop
  - helper
  - extension
  - schema
  - provider
  - deployment_profile

# Surfaces that consume the generated report verbatim. Help/About,
# docs, partner packets, and release evidence read this list rather than
# restating compatibility prose.
consuming_surfaces:
  - docs/milestones/m3/beta_admission_matrix.md
  - docs/release/compatibility_report_template.md
  - docs/release/certified_archetype_report_template.md
  - docs/release/release_evidence_packet_template.md
  - docs/help/help_about_truth_source.md
  - docs/about/about_provenance_and_boundary_contract.md

# Generator and validation outputs.
generator:
  script_ref: ci/check_m3_compatibility_report.py
  command: python3 ci/check_m3_compatibility_report.py --repo-root .

generated_report_md_ref: artifacts/compat/m3/compatibility_report.md
generated_report_json_ref: artifacts/compat/m3/compatibility_report.json
validation_capture_ref: artifacts/compat/m3/captures/compatibility_report_validation_capture.json

rows:
  # --- desktop scope -------------------------------------------------------
  - report_row_id: m3_compat_report_row:desktop.platform_conformance_profiles
    row_id: compat_row:desktop.platform_conformance_profiles
    row_scope: desktop
    skew_window_id: null
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    claimed_beta_surface_refs:
      - beta_surface:packaging_update_rollback
      - beta_surface:support_export_diagnostics
    scorecard_ref: null
    notes: >
      Desktop shell, IME, secret-store, browser-callback, and package-path
      claims must resolve through the named claimed_desktop_profiles
      revision; new OS/desktop variants stay untested or unsupported until
      a profile row exists.

  - report_row_id: m3_compat_report_row:desktop.exact_build_identity
    row_id: compat_row:desktop_benchmark_lab.exact_build_identity
    row_scope: desktop
    skew_window_id: null
    primary_cohort_refs:
      - cohort:certified_archetype
    claimed_beta_surface_refs:
      - beta_surface:debug_test_task_model
      - beta_surface:compatibility_publication
    scorecard_ref: null
    notes: >
      Benchmark trace, run-result record, and dashboard snapshot must
      resolve through one exact_build_identity_ref; cross-channel
      same-commit comparison stays out of window for claim-bearing rows.

  - report_row_id: m3_compat_report_row:desktop.release_identity_propagation
    row_id: compat_row:release_identity.exact_build_propagation
    row_scope: desktop
    skew_window_id: null
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    claimed_beta_surface_refs:
      - beta_surface:packaging_update_rollback
      - beta_surface:support_export_diagnostics
    scorecard_ref: null
    notes: >
      Binaries, symbols, docs/help, and release-evidence rows must resolve
      through one coordinated artifact set; "version only" fallback is
      explicitly out of contract.

  # --- helper scope --------------------------------------------------------
  - report_row_id: m3_compat_report_row:helper.launcher_local_sidecars
    row_id: compat_row:launcher.local_helper_contracts
    row_scope: helper
    skew_window_id: skew_window:launcher_and_local_sidecars.coordinated_artifact_set
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    claimed_beta_surface_refs:
      - beta_surface:packaging_update_rollback
      - beta_surface:support_export_diagnostics
    scorecard_ref: null
    notes: >
      Launcher and helper binaries promote together as one coordinated
      artifact set; mixed-launcher/helper startup is refused, not warned.

  - report_row_id: m3_compat_report_row:helper.remote_attach_envelope
    row_id: compat_row:remote.attach_envelope_and_drift
    row_scope: helper
    skew_window_id: skew_window:desktop_cli_and_remote_agent.declared_adjacent_window
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    claimed_beta_surface_refs:
      - beta_surface:debug_test_task_model
      - beta_surface:support_export_diagnostics
    scorecard_ref: null
    notes: >
      Client and remote agent stay within the declared adjacent window
      and negotiate the capability intersection; out-of-window attach
      degrades to file-or-review-only or refuses outright.

  # --- extension scope -----------------------------------------------------
  - report_row_id: m3_compat_report_row:extension.host_sdk_permission_window
    row_id: compat_row:extension_host.sdk_wit_permission_window
    row_scope: extension
    skew_window_id: skew_window:extension_host_and_sdk.published_sdk_support_window
    primary_cohort_refs:
      - cohort:extension_author
    claimed_beta_surface_refs:
      - beta_surface:extension_runtime
    scorecard_ref: null
    notes: >
      Manifest SDK range, WIT ABI version, and permission vocabulary must
      all fall inside the published support window or the extension is
      disabled or quarantined; never partially loaded.

  # --- schema scope --------------------------------------------------------
  - report_row_id: m3_compat_report_row:schema.profile_layout
    row_id: compat_row:state.profile_layout_schema
    row_scope: schema
    skew_window_id: skew_window:schema_or_state_bundle.additive_epoch
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    claimed_beta_surface_refs:
      - beta_surface:support_export_diagnostics
      - beta_surface:importer_and_migration
    scorecard_ref: null
    notes: >
      Profile, state-map, and restore-provenance records preserve one
      schema epoch with additive-only tolerance; meaning-changing
      downgrades refuse rather than rewrite state.

  - report_row_id: m3_compat_report_row:schema.task_event_envelope
    row_id: compat_row:tooling.task_event_envelope
    row_scope: schema
    skew_window_id: skew_window:audit_or_event_producer_consumer.additive_epoch
    primary_cohort_refs:
      - cohort:certified_archetype
    claimed_beta_surface_refs:
      - beta_surface:debug_test_task_model
      - beta_surface:support_export_diagnostics
    scorecard_ref: null
    notes: >
      Task-event producers and consumers preserve one stable epoch with
      additive-only field evolution; required-kind drift fails closed.

  - report_row_id: m3_compat_report_row:schema.command_descriptor
    row_id: compat_row:command_plane.command_descriptor_schema
    row_scope: schema
    skew_window_id: null
    primary_cohort_refs:
      - cohort:certified_archetype
    claimed_beta_surface_refs:
      - beta_surface:debug_test_task_model
    scorecard_ref: null
    notes: >
      Descriptor and invocation-session consumers stay inside one command
      descriptor schema epoch and preserve unknown additive fields.

  # --- provider scope ------------------------------------------------------
  - report_row_id: m3_compat_report_row:provider.service_api_and_handoff
    row_id: compat_row:provider.service_api_and_browser_handoff
    row_scope: provider
    skew_window_id: skew_window:managed_control_plane.current_plus_previous_minor_or_lts
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    claimed_beta_surface_refs:
      - beta_surface:policy_proxy_transport
      - beta_surface:support_export_diagnostics
    scorecard_ref: null
    notes: >
      Provider-linked clients stay inside the current published family
      plus the declared previous minor or LTS window; out-of-window
      privileged writes fail closed while cached reads remain available.

  # --- deployment-profile scope -------------------------------------------
  - report_row_id: m3_compat_report_row:deployment_profile.boundary_manifest_truth
    row_id: compat_row:deployment_profiles.boundary_manifest_truth
    row_scope: deployment_profile
    skew_window_id: null
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    claimed_beta_surface_refs:
      - beta_surface:policy_proxy_transport
      - beta_surface:packaging_update_rollback
      - beta_surface:support_export_diagnostics
    scorecard_ref: null
    notes: >
      Boundary rows, continuity drills, and signoff/release packets
      preserve one deployment-profile vocabulary; packet-local profile
      aliases fail closed.
