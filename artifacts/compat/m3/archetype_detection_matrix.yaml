# Workspace archetype detection matrix.
#
# This matrix is the detector-facing catalog for beta workspace archetype
# routing. It joins marker-based detection to support scorecards, compatible
# launch bundles or framework packs, and evidence freshness without implying
# setup may run automatically.

schema_version: 1
matrix_id: workspace_archetype_detection_matrix
as_of: "2026-05-17"
owner: "@ahmeddyounis"

source_contract_refs:
  route_contract: docs/ux/archetype_detection_contract.md
  schema: schemas/workspace/archetype_detection.schema.json
  scorecard_index: artifacts/compat/m3/archetype_scorecards/scorecard_index.yaml
  scorecard_register: artifacts/milestones/m3/captures/cohort_archetype_scorecard_register.json
  bundle_rows: artifacts/product/language_bundle_rows.yaml

detection_outcome_vocabulary:
  - certified_archetype_match
  - probable_archetype
  - mixed_or_ambiguous_workspace
  - unknown_or_generic_workspace
  - restricted_or_policy_blocked
  - missing_prerequisite

readiness_bucket_vocabulary:
  - blocking_now
  - recommended_soon
  - optional_later

first_useful_entry_source_vocabulary:
  - single_file_open
  - folder_or_repo_open
  - repository_clone
  - review_or_incident_deep_link
  - restore_last_session
  - imported_state_or_handoff_packet

same_weight_bypass_required_when_setup_is_suggested:
  - set_up_later
  - open_minimal
  - dismiss_recommendation

mixed_workspace_boundary_choices:
  - open_whole_repo
  - open_probable_project
  - open_current_folder_only
  - create_workset_or_slice

archetype_seed_rows:
  - row_id: archetype_detection:ts_web_app_or_service
    archetype_row_ref: archetype_row:ts_web_app_or_service
    public_label: TypeScript / JavaScript web app or service
    representative_stack: >
      TypeScript or JavaScript on Node.js with pnpm, npm, Yarn, or Bun;
      React, Vite, Next.js, Vue, Svelte, Astro, Express, or Fastify; and
      Vitest, Jest, Playwright, or Cypress.
    bundle_ref: launch_bundle:typescript_web_app.seed
    bundle_manifest_ref: artifacts/bundles/tsjs_launch_bundle_alpha.yaml
    current_support_class: experimental
    certification_state: seed_not_certified
    scorecard_ref: artifacts/compat/m3/archetype_scorecards/ts_web_app_or_service.md
    evidence_packet_ref: artifacts/compat/m3/archetype_scorecards/ts_web_app_or_service.md
    freshness:
      state: current
      reviewed_on: "2026-05-15"
      stale_after: P21D
    suggested_setup_refs:
      - framework_pack:typescript_web_app.typescript_language
      - framework_pack:typescript_web_app.test_runner
    first_useful_route_defaults:
      folder_or_repo_open: explorer_plus_readme_or_changed_files
      repository_clone: post_clone_handoff

  - row_id: archetype_detection:python_service_or_data_app
    archetype_row_ref: archetype_row:python_service_or_data_app
    public_label: Python service or data app
    representative_stack: >
      Python with uv, venv, Poetry, pip, pytest, FastAPI, Django, Flask,
      pandas, NumPy, SciPy, or adjacent notebooks.
    bundle_ref: launch_bundle:python_service_or_data_app.seed
    bundle_manifest_ref: artifacts/bundles/python_launch_bundle_alpha.yaml
    current_support_class: experimental
    certification_state: seed_not_certified
    scorecard_ref: artifacts/compat/m3/archetype_scorecards/python_service_or_data_app.md
    evidence_packet_ref: artifacts/compat/m3/archetype_scorecards/python_service_or_data_app.md
    freshness:
      state: current
      reviewed_on: "2026-05-15"
      stale_after: P21D
    suggested_setup_refs:
      - framework_pack:python_service.pytest
      - framework_pack:python_service.uv_toolchain
      - framework_pack:python_service.poetry_toolchain
    first_useful_route_defaults:
      single_file_open: file_editor_with_root_cues
      folder_or_repo_open: explorer_plus_readme_or_changed_files

  - row_id: archetype_detection:rust_workspace
    archetype_row_ref: archetype_row:rust_workspace
    public_label: Rust workspace
    representative_stack: >
      Rust Cargo package or workspace with Cargo.toml, Cargo.lock, rustfmt,
      clippy, and cargo test as the first useful workflow.
    bundle_ref: launch_bundle:rust_workspace.seed
    bundle_manifest_ref: artifacts/product/language_bundle_rows.yaml#launch_bundle:rust_workspace.seed
    current_support_class: supported
    certification_state: seed_not_certified
    scorecard_ref: artifacts/compat/m3/archetype_scorecards/rust_workspace.md
    evidence_packet_ref: artifacts/compat/m3/archetype_scorecards/rust_workspace.md
    reference_workspace_register_ref: artifacts/compat/m3/reference_workspace_register.yaml#m3_reference_workspace:rust_workspace
    freshness:
      state: current
      reviewed_on: "2026-05-15"
      stale_after: P21D
    suggested_setup_refs:
      - framework_pack:rust_workspace.cargo_toolchain
      - framework_pack:rust_workspace.clippy_rustfmt
    first_useful_route_defaults:
      folder_or_repo_open: explorer_plus_readme_or_changed_files

  - row_id: archetype_detection:java_or_kotlin_service
    archetype_row_ref: archetype_row:java_or_kotlin_service
    public_label: Java or Kotlin service
    representative_stack: >
      Gradle or Maven build, Spring Boot or comparable JVM application,
      JUnit or Kotest, and Java or Kotlin source files.
    bundle_ref: launch_bundle:java_or_kotlin_service.seed
    bundle_manifest_ref: artifacts/product/language_bundle_rows.yaml#launch_bundle:java_or_kotlin_service.seed
    current_support_class: experimental
    certification_state: seed_not_certified
    scorecard_ref: artifacts/compat/m3/archetype_scorecards/java_or_kotlin_service.md
    evidence_packet_ref: artifacts/compat/m3/archetype_scorecards/java_or_kotlin_service.md
    reference_workspace_register_ref: artifacts/compat/m3/reference_workspace_register.yaml#m3_reference_workspace:jvm_service
    freshness:
      state: current
      reviewed_on: "2026-05-15"
      stale_after: P21D
    suggested_setup_refs:
      - framework_pack:java_kotlin_service.gradle_toolchain
      - framework_pack:java_kotlin_service.maven_toolchain
      - framework_pack:java_kotlin_service.junit
    first_useful_route_defaults:
      folder_or_repo_open: explorer_plus_readme_or_changed_files

  - row_id: archetype_detection:go_service_or_monorepo_slice
    archetype_row_ref: archetype_row:go_service_or_monorepo_slice
    public_label: Go service or monorepo slice
    representative_stack: >
      Go module or service slice with go.mod, go.sum, Go source files,
      go test, and optional Delve debugger wiring.
    bundle_ref: launch_bundle:go_service_or_monorepo_slice.seed
    bundle_manifest_ref: artifacts/product/language_bundle_rows.yaml#launch_bundle:go_service_or_monorepo_slice.seed
    current_support_class: experimental
    certification_state: seed_not_certified
    scorecard_ref: artifacts/compat/m3/archetype_scorecards/go_service_or_monorepo_slice.md
    evidence_packet_ref: artifacts/compat/m3/archetype_scorecards/go_service_or_monorepo_slice.md
    reference_workspace_register_ref: artifacts/compat/m3/reference_workspace_register.yaml#m3_reference_workspace:go_service
    freshness:
      state: current
      reviewed_on: "2026-05-15"
      stale_after: P21D
    suggested_setup_refs:
      - framework_pack:go_service.go_modules_toolchain
      - framework_pack:go_service.go_test
      - framework_pack:go_service.delve
    first_useful_route_defaults:
      folder_or_repo_open: explorer_plus_readme_or_changed_files

  - row_id: archetype_detection:c_or_cpp_native_project
    archetype_row_ref: archetype_row:c_or_cpp_native_project
    public_label: C / C++ native project
    representative_stack: >
      CMake, Meson, Make, compile_commands.json, C or C++ source files,
      clangd, LLDB, GDB, or native build tooling.
    bundle_ref: launch_bundle:c_or_cpp_native_project.seed
    bundle_manifest_ref: artifacts/product/language_bundle_rows.yaml#launch_bundle:c_or_cpp_native_project.seed
    current_support_class: experimental
    certification_state: seed_not_certified
    scorecard_ref: artifacts/compat/m3/archetype_scorecards/c_or_cpp_native_project.md
    evidence_packet_ref: artifacts/compat/m3/archetype_scorecards/c_or_cpp_native_project.md
    reference_workspace_register_ref: artifacts/compat/m3/reference_workspace_register.yaml#m3_reference_workspace:cpp_native
    freshness:
      state: current
      reviewed_on: "2026-05-15"
      stale_after: P21D
    suggested_setup_refs:
      - framework_pack:c_cpp_native.cmake_ninja
      - framework_pack:c_cpp_native.clangd
      - framework_pack:c_cpp_native.lldb_gdb
    first_useful_route_defaults:
      folder_or_repo_open: explorer_plus_readme_or_changed_files

route_guardrails:
  - guardrail_id: no_auto_install_from_detection
    applies_to:
      - certified_archetype_match
      - probable_archetype
    invariant: Detection may recommend or compare setup, but it may not install packages or extensions.
  - guardrail_id: probable_keeps_plain_open_equal_weight
    applies_to:
      - probable_archetype
    invariant: Probable states keep plain open, Set up later, and Dismiss recommendation available.
  - guardrail_id: mixed_requires_boundary_choice
    applies_to:
      - mixed_or_ambiguous_workspace
    invariant: Mixed states offer whole repo, probable project, current folder only, and workset choices.
  - guardrail_id: prerequisites_do_not_block_reading
    applies_to:
      - missing_prerequisite
    invariant: Missing runtime, toolchain, container, or remote agent prerequisites do not block ordinary file reading.
