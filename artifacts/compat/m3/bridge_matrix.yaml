    report_row_ref: compat_row:extension_host.sdk_wit_permission_window
    support_class: unsupported
    runtime_window:
      window_id: runtime_window:unsupported_foreign_webview_runtime
      version_range: no supported beta runtime window
      support_window_class: unsupported
      downgrade_behavior: refuse_activation
      out_of_window_posture: explicitly_unsupported
      contract_rule: >
        Aureline does not execute foreign workbench DOM, private API, or
        ambient Node.js extension runtimes in the beta lane.
    sdk_window:
      window_id: sdk_window:unsupported_foreign_webview_runtime
      version_range: no SDK line
      support_window_class: unsupported
      downgrade_behavior: no_sdk_publication_path
      out_of_window_posture: explicitly_unsupported
      contract_rule: >
        Authors must port to native Aureline APIs or keep the extension
        unsupported.
    manifest_window:
      window_id: manifest_window:unsupported_foreign_webview_runtime
      version_range: no admissible manifest window for private workbench runtime
      support_window_class: unsupported
      downgrade_behavior: refuse_registry_ingest
      out_of_window_posture: explicitly_unsupported
      contract_rule: >
        A manifest that depends on unsupported runtime authority is refused
        rather than narrowed into a hidden bridge.
    bridge_window:
      window_id: bridge_window:unsupported_webview_private_api
      bridge_state_class: unsupported
      compatibility_label: unsupported
      parity_claim_class: unsupported_no_parity
      source_ecosystem: vscode_code_oss
      supported_artifact_classes: []
      known_limits:
