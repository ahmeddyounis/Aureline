      - lifecycle_row:manifest_schema.extension_manifest_beta_v1
      - lifecycle_row:permission_vocabulary.extension_permissions_v1
    marketplace_surface_refs: []
    sdk_doc_refs:
      - docs/extensions/m3/sdk_v1/README.md
      - docs/extensions/m3/runtime_v1_beta.md
    release_packet_refs:
      - artifacts/extensions/m3/publication_pipeline/publication_pipeline_record.json
    support_export_refs: []
    notes: >
      This is native Aureline support for supervised external hosts, not
      ambient process privilege.

  - row_id: extension_bridge_row:vscode_api_bridge_beta
    claimed_lane: vscode_selected_api_bridge
    package_or_lane_id: bridge_lane:vscode_selected_api
    report_row_ref: compat_row:extension_host.sdk_wit_permission_window
    support_class: limited
    runtime_window:
      window_id: runtime_window:extension_host_v1_beta.compat_bridge
      version_range: bridge profile 2026-05 for host-runtime 1.0.0-beta.1
      support_window_class: published_sdk_support_window
      downgrade_behavior: disable_bridge_profile_when_profile_or_host_drifts
      out_of_window_posture: degraded
      contract_rule: >
        The bridge negotiates only the declared capability-world subset and
        never inherits ambient Node.js, workbench DOM, or private API access.
    sdk_window:
      window_id: sdk_window:aureline_sdk_beta.compat_bridge
      version_range: compatibility analyzer profile 2026-05 with SDK 1.0.0-beta.1
      support_window_class: published_sdk_support_window
      downgrade_behavior: retest_pending_until_analyzer_profile_refreshes
      out_of_window_posture: degraded
      contract_rule: >
        Analyzer output must name each translated, skipped, or unsupported
        API before marketplace or migration surfaces may render the row.
    manifest_window:
      window_id: manifest_window:extension_manifest_beta.compat_bridge
      version_range: manifest schema 1 plus bridge profile ref and caveat labels
      support_window_class: same_schema_epoch_additive_only
      downgrade_behavior: bridge_profile_required_or_publication_hold
      out_of_window_posture: fail_closed
      contract_rule: >
        Bridge-backed packages must declare bridge profile, permission delta,
        performance delta, caveats, and rollback path.
    bridge_window:
      window_id: bridge_window:vscode_selected_api_bridge
      bridge_state_class: bridge
      compatibility_label: translated
      parity_claim_class: bridge_no_exact_parity
      source_ecosystem: vscode_code_oss
      supported_artifact_classes:
        - selected_command_mapping
        - selected_settings_mapping
        - read_only_editor_api_subset
      known_limits:
        - No workbench DOM injection.
        - No undocumented private API compatibility.
        - No ambient Node.js privilege inside the shell.
      permission_delta: bridge_profile_and_native_review_required
      performance_delta: bridge_activation_budget_applies
      report_action_ref: docs/extensions/m3/compatibility_matrix_beta.md#vs-code-selected-api-bridge
    downgrade_behavior:
      support_class: downgrade_best_effort
      out_of_window_posture: degraded
      state_preservation_note: >
        Imported settings and user data remain readable; bridge activation
        narrows or pauses until the analyzer profile is current.
      contract_rule: >
        A bridge-backed row may be installed only when the bridge state and
        caveat set are shown in marketplace, install review, support export,
        SDK docs, and release packets.
      default_repair_hints:
        - run_compatibility_analyzer
        - open_bridge_report
        - install_native_alternative
    evidence_refs:
