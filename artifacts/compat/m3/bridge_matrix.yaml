      - docs/extensions/marketplace_ranking_and_trust_contract.md
      - docs/migration/source_ecosystem_coverage_matrix.md
    lifecycle_row_refs:
      - lifecycle_row:manifest_schema.extension_manifest_beta_v1
      - lifecycle_row:permission_vocabulary.extension_permissions_v1
    marketplace_surface_refs:
      - marketplace_truth_row:dev.aureline.samples/wasm-notes:mirror-retest-pending
    sdk_doc_refs:
      - docs/extensions/m3/sdk_v1/README.md
      - docs/extensions/m3/compatibility_matrix_beta.md
    release_packet_refs:
      - artifacts/extensions/m3/publication_pipeline/publication_pipeline_record.json
      - artifacts/release/m3/release_notes_draft.md
    support_export_refs:
      - marketplace_truth_support_export:marketplace_truth_row:dev.aureline.samples/wasm-notes:mirror-retest-pending
    notes: >
      Bridge support is a migration aid. It is limited, inspectable, and
      never advertised as native or exact parity.

  - row_id: extension_bridge_row:vscode_theme_snippet_shim_beta
    claimed_lane: vscode_theme_snippet_shim
    package_or_lane_id: bridge_lane:vscode_theme_snippet_assets
    report_row_ref: compat_row:extension_host.sdk_wit_permission_window
    support_class: limited
    runtime_window:
      window_id: runtime_window:asset_shim_beta.theme_snippet
      version_range: asset shim profile 2026-05 with host-runtime 1.0.0-beta.1
      support_window_class: published_sdk_support_window
      downgrade_behavior: keep_imported_assets_readable_without_runtime_activation
      out_of_window_posture: degraded
      contract_rule: >
        Static assets may remain readable when the runtime narrows, but
        generated commands or runtime hooks stay disabled.
    sdk_window:
      window_id: sdk_window:aureline_sdk_beta.asset_shim
      version_range: compatibility analyzer profile 2026-05 with SDK 1.0.0-beta.1
      support_window_class: published_sdk_support_window
      downgrade_behavior: reimport_or_hold_until_asset_mapper_refreshes
      out_of_window_posture: degraded
      contract_rule: >
        Asset shims are produced by the compatibility analyzer and must cite
        mapped and skipped fields.
    manifest_window:
      window_id: manifest_window:extension_manifest_beta.asset_shim
      version_range: manifest schema 1 plus imported-source provenance
      support_window_class: same_schema_epoch_additive_only
      downgrade_behavior: preserve_imported_asset_provenance
      out_of_window_posture: fail_closed
      contract_rule: >
        Unknown source metadata is preserved; lossy asset transforms must be
        reviewable before apply.
    bridge_window:
      window_id: bridge_window:vscode_theme_snippet_shim
      bridge_state_class: shimmed
      compatibility_label: shimmed
      parity_claim_class: shimmed_no_exact_parity
      source_ecosystem: vscode_code_oss
      supported_artifact_classes:
        - theme_token_mapping
        - icon_theme_mapping
        - snippet_mapping
      known_limits:
        - Token families outside the Aureline design system are approximated.
        - Extension-contributed commands are not carried by the asset shim.
        - Runtime hooks and webviews are not executed.
      permission_delta: none_for_static_assets
      performance_delta: none_after_import
      report_action_ref: docs/extensions/m3/compatibility_matrix_beta.md#vs-code-theme-and-snippet-shim
    downgrade_behavior:
      support_class: downgrade_best_effort
      out_of_window_posture: degraded
      state_preservation_note: >
        Imported assets remain inspectable and reversible; unsupported
        runtime behavior stays disabled.
      contract_rule: >
        Shimmed assets must render as shimmed, with known limits and source
        provenance, everywhere the row appears.
      default_repair_hints:
        - review_import_diff
        - restore_previous_asset
        - install_native_alternative
    evidence_refs:
      - fixtures/design/token_export_cases/extension_partial_high_contrast_inheritance_pass.json
      - docs/migration/source_ecosystem_coverage_matrix.md
      - docs/extensions/m3/compatibility_matrix_beta.md
    lifecycle_row_refs:
      - lifecycle_row:manifest_schema.extension_manifest_beta_v1
    marketplace_surface_refs: []
    sdk_doc_refs:
      - docs/extensions/m3/compatibility_matrix_beta.md
    release_packet_refs:
      - artifacts/release/m3/release_notes_draft.md
    support_export_refs: []
    notes: >
      The shim preserves high-value static assets, not a foreign extension
      runtime.

