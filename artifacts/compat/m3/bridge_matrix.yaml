rows:
  - row_id: extension_bridge_row:wasm_component_native_beta
    claimed_lane: wasm_component_native
    package_or_lane_id: dev.aureline.samples/wasm-notes
    report_row_ref: compat_row:extension_host.sdk_wit_permission_window
    support_class: experimental
    runtime_window:
      window_id: runtime_window:extension_host_v1_beta.wasm_component
      version_range: host-runtime 1.0.0-beta.1..1.0.x
      support_window_class: published_sdk_support_window
      downgrade_behavior: disable_or_quarantine_when_host_floor_not_met
      out_of_window_posture: explicitly_unsupported
      contract_rule: >
        The host admits the extension only when the runtime contract,
        capability-world set, and permission vocabulary are all in range.
    sdk_window:
      window_id: sdk_window:aureline_sdk_beta.wasm_component
      version_range: aureline.sdk.beta 1.0.0-beta.1..1.0.x
      support_window_class: published_sdk_support_window
      downgrade_behavior: sdk_lint_warning_then_publication_hold
      out_of_window_posture: explicitly_unsupported
      contract_rule: >
        Stable beta APIs require typed docs, WIT-world refs, sample-pack
        coverage, and conformance results before publication.
    manifest_window:
      window_id: manifest_window:extension_manifest_beta.v1
      version_range: manifest schema 1 with permission vocabulary 1
      support_window_class: same_schema_epoch_additive_only
      downgrade_behavior: preserve_unknown_additive_fields
      out_of_window_posture: fail_closed
      contract_rule: >
        Required field removal, permission vocabulary drift, or unknown
        privileged behavior refuses registry ingest and runtime activation.
    bridge_window:
      window_id: bridge_window:native_wasm_component
      bridge_state_class: native
      compatibility_label: exact
      parity_claim_class: native_exact_where_declared
      source_ecosystem: aureline_native
      supported_artifact_classes:
        - wasm_component_model
        - wit_world_binding
      known_limits: []
      permission_delta: none
      performance_delta: none
      report_action_ref: docs/extensions/m3/compatibility_matrix_beta.md#wasm-component-native
    downgrade_behavior:
      support_class: downgrade_unsupported
      out_of_window_posture: explicitly_unsupported
      state_preservation_note: >
        Installed state and user data remain on disk; activation is
        disabled or quarantined until the host/runtime window matches.
      contract_rule: >
        Never partially load a native extension when the required WIT
        world, SDK floor, or permission vocabulary is outside the window.
      default_repair_hints:
        - upgrade_component
        - disable_or_quarantine_extension
        - open_compatibility_report
    evidence_refs:
      - artifacts/compat/m3/extension_conformance_kit_report.json
      - docs/extensions/m3/runtime_v1_beta.md
      - docs/extensions/m3/sdk_v1/README.md
