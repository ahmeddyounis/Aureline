        - Workbench DOM injection is unsupported.
        - Undocumented private APIs are unsupported.
      permission_delta: unsupported_privilege_model
      performance_delta: unsupported_runtime_model
      report_action_ref: docs/extensions/m3/compatibility_matrix_beta.md#unsupported-webview-and-private-runtime
    downgrade_behavior:
      support_class: downgrade_unsupported
      out_of_window_posture: explicitly_unsupported
      state_preservation_note: >
        Existing imported metadata may remain visible for review, but
        activation, installation, or publication is refused.
      contract_rule: >
        Unsupported is an explicit row, not an omitted bridge promise.
      default_repair_hints:
