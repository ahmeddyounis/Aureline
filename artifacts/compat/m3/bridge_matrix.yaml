      This row is native only for the declared WIT worlds and targets.
      Exact does not extend to helper binaries, remote-side components, or
      undocumented host calls.

  - row_id: extension_bridge_row:external_host_supervised_beta
    claimed_lane: external_host_supervised
    package_or_lane_id: extension_lane:external_host_supervised
    report_row_ref: compat_row:extension_host.sdk_wit_permission_window
    support_class: experimental
    runtime_window:
      window_id: runtime_window:extension_host_v1_beta.external_host
      version_range: host-runtime 1.0.0-beta.1..1.0.x with supervisor envelope 1
      support_window_class: published_sdk_support_window
      downgrade_behavior: restart_or_disable_external_host
      out_of_window_posture: explicitly_unsupported
      contract_rule: >
        The supervisor admits the external host only when its executable
        identity, platform envelope, restart budget, and capability worlds
        match the declared contract.
    sdk_window:
      window_id: sdk_window:aureline_sdk_beta.external_host
      version_range: aureline.sdk.beta 1.0.0-beta.1..1.0.x
      support_window_class: published_sdk_support_window
      downgrade_behavior: publication_hold_until_external_host_contract_retests
      out_of_window_posture: explicitly_unsupported
      contract_rule: >
        External-host SDK use requires typed contract refs, sample-pack
        coverage, and a supervision evidence packet.
    manifest_window:
      window_id: manifest_window:extension_manifest_beta.external_host
      version_range: manifest schema 1 with executable disclosure and permission vocabulary 1
      support_window_class: same_schema_epoch_additive_only
      downgrade_behavior: refuse_missing_executable_or_permission_disclosure
      out_of_window_posture: fail_closed
      contract_rule: >
        Missing helper/executable identity, platform support, trust-mode
        behavior, or permission rationale refuses publication and activation.
    bridge_window:
      window_id: bridge_window:native_external_host_supervised
      bridge_state_class: native
      compatibility_label: exact
      parity_claim_class: native_exact_where_declared
      source_ecosystem: aureline_native
      supported_artifact_classes:
        - external_host_envelope
        - supervised_helper_process
      known_limits: []
      permission_delta: explicit_subprocess_or_network_prompt_when_declared
      performance_delta: supervised_process_budget_applies
      report_action_ref: docs/extensions/m3/compatibility_matrix_beta.md#external-host-supervised
    downgrade_behavior:
      support_class: downgrade_unsupported
      out_of_window_posture: explicitly_unsupported
      state_preservation_note: >
        User-authored state remains available; the external host is stopped
        or quarantined rather than allowed to run outside its envelope.
      contract_rule: >
        Supervisor/runtime drift disables the external host first and keeps
        the shell usable.
      default_repair_hints:
        - restart_extension_host
        - disable_or_quarantine_extension
        - upgrade_component
    evidence_refs:
      - artifacts/compat/m3/extension_conformance_kit_report.json
      - docs/extensions/m3/host_isolation_beta.md
      - fixtures/extensions/m3/conformance_kit/external_host_degraded_disable_rollback_pass.json
    lifecycle_row_refs:
