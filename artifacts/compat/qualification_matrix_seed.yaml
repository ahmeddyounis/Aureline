      - self_hosted
      - enterprise_online
      - air_gapped
      - managed_cloud
    support_class: supported
    skew_window_class: exact_match
    supported_skew_window: >
      The benchmark trace, run-result record, dashboard snapshot, and any
      later report resolve to one exact_build_identity_ref or to an
      explicit rebuild_of_identity_ref chain back to that identity.
    out_of_window_posture: fail_closed
    owner_ref: lane:benchmark_lab
    review_cadence: each_change
    evidence_status: benchmark_seed_available
    next_review_milestone: foundations
    version_skew_register_ref: skew_register:desktop_benchmark_lab.exact_build_identity
    downstream_consumers:
