  - schema_and_fixture_seeded
  - normative_doc_seed_only
  - reserved_no_fixture_yet

downstream_consumer_vocabulary:
  - benchmark_report
  - compatibility_report
  - claim_manifest
  - certified_archetype_packet
  - deployment_profile_artifact
  - shiproom
  - support_bundle

projection_contract:
  compatibility_report:
    extends_rows_by_reference: true
    required_reference_fields:
      - row_id
      - artifact_or_protocol_boundary_label
      - claimed_deployment_profiles
      - version_skew_register_ref
    notes: >
      A release-time compatibility report attaches fresh evidence,
      migration notes, and verdicts to these row ids. It does not rename
      row families or collapse multiple boundaries into prose-only status.
  claim_manifest:
    extends_rows_by_reference: true
    required_reference_fields:
      - row_id
      - artifact_or_protocol_boundary_label
      - support_class
    notes: >
      Public wording resolves through the compatibility row first and then
      cites release evidence. A claim without a row reference is
      non-conforming.
  certified_archetype_packet:
    extends_rows_by_reference: true
    required_reference_fields:
      - row_id
      - artifact_or_protocol_boundary_label
      - claimed_surface
    notes: >
      Archetype packets cite the same row ids the compatibility report
      and claim-manifest lanes cite, so "certified" and "supported"
      statements stay mechanically aligned.
  deployment_profile_artifact:
    extends_rows_by_reference: true
    required_reference_fields:
      - row_id
      - claimed_deployment_profiles
    notes: >
      Install, boundary, and deployment-profile artifacts cite the row id
      and named deployment profile instead of inventing profile-local
      aliases for the same boundary.

