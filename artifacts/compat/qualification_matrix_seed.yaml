  - supported
  - community
  - experimental

review_cadence_vocabulary:
  - each_change
  - per_milestone
  - each_release

next_review_milestone_vocabulary:
  - foundations
  - first_beta
  - first_stable

skew_window_class_vocabulary:
  - coordinated_artifact_set_only
  - exact_match
  - same_schema_epoch_additive_only
  - declared_adjacent_window
  - published_sdk_support_window
  - current_plus_previous_minor_or_lts
  - certified_report_freshness_window

out_of_window_posture_vocabulary:
