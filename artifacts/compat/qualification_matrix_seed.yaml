# Compatibility qualification matrix seed.
#
# Machine-readable seed for the cross-boundary compatibility rows every
# later compatibility report, claim manifest, certified-archetype packet,
# deployment-profile artifact, benchmark packet, and support surface
# extends by reference. Tooling reads this file; the narrative companion
# lives in docs/compat/compatibility_row_seed.md. If the two disagree,
# this file is authoritative and the narrative must be updated in the
# same change.
#
# Scope. One row per claim-bearing boundary. Rows pin a stable row_id,
# an explicit artifact-or-protocol boundary label, named deployment
# profiles, support class, skew window, out-of-window posture, owner,
# evidence state, and next review milestone. Later reports attach fresh
# evidence snapshots to these row ids; they do not rename or replace the
# rows in ad hoc spreadsheets.
#
# Rules.
#   - row_id and artifact_or_protocol_boundary_label are stable ids.
#   - claimed_deployment_profiles MUST name one or more profile ids from
#     docs/product/boundary_manifest_strawman.md.
#   - owner_ref resolves to either lane:<id> in
#     artifacts/governance/ownership_matrix.yaml governance_lanes or
#     package:<name> in the packages section there.
#   - Each row MUST name exactly one support_class, skew_window_class,
#     out_of_window_posture, review_cadence, evidence_status, and
#     next_review_milestone.
#   - Experimental or reserved boundaries still need qualification rows:
#     "not ready yet" is expressed via support_class and evidence_status,
#     not by omitting the row.
#   - Later compatibility reports, claim manifests,
#     certified-archetype packets, benchmark packets, and
#     deployment-profile artifacts cite row_id verbatim; free-text aliasing
#     is non-conforming.

schema_version: 1
status: seeded

overview_page: docs/compat/compatibility_row_seed.md
version_skew_register_source: artifacts/compat/version_skew_register.yaml
ownership_matrix_source: artifacts/governance/ownership_matrix.yaml
boundary_manifest_source: docs/product/boundary_manifest_strawman.md
benchmark_corpus_source: fixtures/benchmarks/corpus_manifest.yaml
compatibility_report_packet_family_source: artifacts/governance/governance_packet_template.yaml

