# TypeScript and JavaScript external-alpha launch bundle manifest.
#
# Canonical manifest for the web-app/service launch bundle. Review,
# Start Center, CLI, support, and mirror consumers should read this row
# instead of cloning bundle status text.

schema_version: 1
manifest_id: bundle_manifest:external_alpha.typescript_web_app
bundle_id: launch_bundle:typescript_web_app.seed
bundle_revision: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

source_contract_refs:
  alpha_wedge_matrix: artifacts/milestones/m2/alpha_wedge_matrix.yaml
  language_bundle_row: artifacts/product/language_bundle_rows.yaml#launch_bundle:typescript_web_app.seed
  archetype_row: artifacts/compat/reference_workspace_rows.yaml#archetype_row:ts_web_app_or_service
  benchmark_fixture_row: artifacts/benchmarks/m2_fixture_register.yaml#fixture_register:external_alpha.ts_web_app_reference
  certification_seed_rows: artifacts/certification/m2_archetype_seed_rows.yaml
  known_limits: artifacts/feedback/external_alpha_known_limits.md

stack_identity:
  wedge_ref: alpha_wedge:typescript_javascript
  persona_ref: persona:p0.typescript_web_app_developer
  persona_label: Full-stack web developer
  stack_label: TypeScript / JavaScript web app or service
  channel: external_alpha
  compatible_aureline_range: ">=0.0.0-alpha <0.1.0"
  current_support_class: experimental
  current_claim_state: alpha_limited
  claim_boundary: >
    This bundle is an external-alpha setup seed. It does not claim certified,
    daily-driver, or replacement-grade status until the linked compatibility
    and benchmark packets move out of seeded evidence.

source:
  source_class: first_party
  source_label: Aureline first-party external-alpha bundle
  signer: aureline_project_seed_signer
  signer_label: Aureline project seed signer
  signature_state: seed_unsigned_review_required
  publisher_continuity: first_party_seed

mirror_availability:
  online_source: public_registry
  approved_mirror: mirrorable_manifest_and_docs
  offline_bundle: offline_metadata_and_docs_pack
  mirror_state: mirror_ready_metadata_only
  offline_review_uses_same_vocabulary: true

extensions:
  required:
    - extension_id: ext.aureline.typescript_language
      display_name: TypeScript language service
      version_requirement: ">=0.1.0-alpha <0.2.0"
      runtime_origin: helper_binary
      trust_tier: first_party_seed
      compatibility_floor: aureline_sdk_0_alpha
      permission_notes:
        - workspace_read_for_project_model
        - local_helper_process_for_language_service
    - extension_id: ext.aureline.web_runtime_tools
      display_name: Web runtime tools
      version_requirement: ">=0.1.0-alpha <0.2.0"
      runtime_origin: wasm_or_helper_bridge
      trust_tier: first_party_seed
      compatibility_floor: aureline_sdk_0_alpha
      permission_notes:
        - workspace_read_for_routes_and_preview_metadata
        - network_metadata_only_when_user_runs_preview
    - extension_id: ext.aureline.git_review_basics
      display_name: Git review basics
      version_requirement: ">=0.1.0-alpha <0.2.0"
      runtime_origin: native_shell_component
      trust_tier: first_party_seed
      compatibility_floor: built_in_alpha_surface
      permission_notes:
        - local_repository_read_write_after_review
  optional:
    - extension_id: ext.aureline.rest_client_seed
      display_name: API request runner seed
      version_requirement: ">=0.1.0-alpha <0.2.0"
      runtime_origin: wasm_component
      trust_tier: first_party_seed
      compatibility_floor: aureline_sdk_0_alpha
      permission_notes:
        - network_egress_requires_per_request_review

settings_profile_preset:
  preset_id: profile_preset:external_alpha.typescript_web
  keymap_mode: preserve_imported_or_aureline_default
  theme_mode: follow_user_theme
  terminal_profile: inherit_user_shell
  settings:
    - setting_id: editor.format_on_save
      bundle_value: review_required
      local_override_policy: keep_local_by_default
    - setting_id: language.typescript.package_manager
      bundle_value: detect_pnpm_then_npm
      local_override_policy: keep_local_by_default
    - setting_id: tasks.rerun_last.visible
      bundle_value: true
      local_override_policy: adopt_bundle_when_missing
    - setting_id: preview.web.source_map_mode
      bundle_value: source_linked_when_available
      local_override_policy: keep_local_by_default

tasks_and_recipes:
  - task_id: task.alpha.ts_web.install_dependencies
    label: Install declared dependencies
    command_ref: cmd:tasks.run_declared_dependency_install
    execution_context_ref: execution_context:local_node_project
    review_required: true
  - task_id: task.alpha.ts_web.run_tests
    label: Run targeted tests
    command_ref: cmd:tasks.run_test_target
    execution_context_ref: execution_context:local_node_project
    review_required: false
  - task_id: task.alpha.ts_web.debug_browser_or_node
    label: Debug browser or Node target
    command_ref: cmd:debug.launch_target
    execution_context_ref: execution_context:local_node_project
    review_required: true
  - recipe_id: recipe.alpha.ts_web.first_useful_result
    label: Open to first useful file, symbol, or route result
    command_refs:
      - cmd:workspace.open_folder
      - cmd:search.quick_open
      - cmd:symbols.open_route_or_symbol

docs_tour_packs:
  - pack_id: docs_pack.alpha.ts_web.start
    label: TypeScript web alpha setup notes
    version: "2026.05.12"
    source_ref: docs/milestones/m2_alpha_scope.md
    mirrorable: true
  - pack_id: docs_pack.alpha.ts_web.known_limits
    label: TypeScript web known limits
    version: "2026.05.12"
    source_ref: artifacts/feedback/external_alpha_known_limits.md
    mirrorable: true
  - tour_id: tour.alpha.ts_web.test_debug_loop
    label: Test and debug loop tour seed
    source_ref: artifacts/milestones/m2/design_partner_task_pack.md
    mirrorable: true

scaffold_template_refs:
  - template_ref: template.alpha.ts_web.vite_react_seed
    label: Vite React seed reference
    source_class: signed_template_ref
    compatibility_ref: artifacts/compat/reference_workspace_rows.yaml#archetype_row:ts_web_app_or_service
    install_behavior: reference_only_no_files_created_without_review
  - template_ref: template.alpha.ts_web.node_service_seed
    label: Node service seed reference
    source_class: signed_template_ref
    compatibility_ref: artifacts/compat/reference_workspace_rows.yaml#archetype_row:ts_web_app_or_service
    install_behavior: reference_only_no_files_created_without_review

migration_mappings:
  source_product: vs_code
  mapping_packet_ref: artifacts/milestones/m2/alpha_wedge_matrix.yaml#scoreboard_row:alpha_scope.migration_parity
  confidence: seeded_partial
  unsupported_gap_refs:
    - known_limit:external_alpha.migration_evidence_seeded

install_update_review:
  review_sheet_id: review_sheet:bundle.external_alpha.typescript_web
  coherent_diff:
    summary: >
      One review sheet shows package, profile, task, docs, scaffold, trust, and
      rollback deltas before any bundle-owned state is applied.
    sections:
      - extensions
      - settings_profile_presets
      - keymap_mode
      - tasks_recipes
      - docs_tour_packs
      - scaffold_template_refs
      - trust_permission_notes
      - rollback_checkpoint
    rows:
      extensions:
        added:
          - ext.aureline.typescript_language
          - ext.aureline.web_runtime_tools
          - ext.aureline.git_review_basics
        optional:
          - ext.aureline.rest_client_seed
      settings_profile_presets:
        keymap_mode: preserve_imported_or_aureline_default
        changed_settings:
          - editor.format_on_save
          - language.typescript.package_manager
          - tasks.rerun_last.visible
          - preview.web.source_map_mode
      tasks_recipes:
        added:
          - task.alpha.ts_web.install_dependencies
          - task.alpha.ts_web.run_tests
          - task.alpha.ts_web.debug_browser_or_node
          - recipe.alpha.ts_web.first_useful_result
      docs_tour_packs:
        added:
          - docs_pack.alpha.ts_web.start
          - docs_pack.alpha.ts_web.known_limits
          - tour.alpha.ts_web.test_debug_loop
      scaffold_template_refs:
        referenced:
          - template.alpha.ts_web.vite_react_seed
          - template.alpha.ts_web.node_service_seed
      trust_permission_notes:
        egress_changes:
          - network_metadata_only_when_user_runs_preview
          - network_egress_requires_per_request_review
        local_mutation_changes:
          - local_repository_read_write_after_review
        permission_widening_requires_review: true
      rollback_checkpoint:
        checkpoint_policy: create_before_apply_update_remove_or_rebase
        checkpoint_ref_pattern: checkpoint:bundle:typescript_web:{timestamp}
  action_vocabulary:
    - apply
    - compare
    - dismiss
    - keep_local
    - adopt_bundle
    - compare_again_later
  mirror_offline_review:
    source_vocabulary:
      - public_registry
      - approved_mirror
      - offline_bundle
    coherent_diff_sections_match_online: true
    offline_missing_artifact_behavior: block_apply_show_compare_only

recommendation_and_drift:
  recommendation_states:
    - recommended
    - dismissed_until_changed
    - installed_current
    - update_available
    - drift_detected
    - mirror_available
    - offline_review_available
  drift_states:
    - no_drift
    - local_overrides_present
    - bundle_update_available
    - bundle_removed_preserve_local_artifacts
    - rebase_available
  user_choices:
    - apply
    - compare
    - dismiss
    - keep_local
    - adopt_bundle
    - compare_again_later
  preservation_guarantees:
    - preserve_user_created_files
    - preserve_imported_mappings
    - preserve_local_history
    - preserve_non_bundle_owned_artifacts
    - remove_only_bundle_owned_state_after_review

rollback_semantics:
  checkpoint_creation: create_before_apply_update_remove_or_rebase
  removal_behavior: remove_bundle_owned_state_only
  local_history_behavior: preserved
  user_files_behavior: preserved
  imported_mapping_behavior: preserved
  restore_preview_required: true

evidence_binding:
  archetype_row_ref: archetype_row:ts_web_app_or_service
  archetype_seed_row_ref: archetype_certification_seed:ts_web_app_or_service
  archetype_evidence_packet_ref: artifacts/milestones/m2/proof_packets/launch_bundles_and_archetypes.md#typescript-javascript-web-app-or-service
  benchmark_fixture_register_row_ref: fixture_register:external_alpha.ts_web_app_reference
  reference_workspace_id: refws.ts_web_app_archetype_seed
  fixture_packet_ref: fixtures/reference_workspaces/m2/ts_web_app_workflows.yaml
  compatibility_scorecard_ref: compat_row:certification.launch_archetype_matrix
  known_limits_ref: artifacts/feedback/external_alpha_known_limits.md
  certification_state: seed_not_certified
  evidence_freshness_state: current_seed

badge_actions:
  launch_bundle_badge_opens: artifacts/bundles/tsjs_launch_bundle_alpha.yaml
  certified_or_archetype_badge_opens: artifacts/milestones/m2/proof_packets/launch_bundles_and_archetypes.md#typescript-javascript-web-app-or-service
  compatibility_badge_opens: artifacts/certification/m2_archetype_seed_rows.yaml#archetype_certification_seed:ts_web_app_or_service

consumer_projection:
  start_center_gallery:
    row_id: start_center.bundle_gallery.typescript_web
    surface_ref: crates/aureline-shell/src/start_center/mod.rs
    exposes:
      - bundle_id
      - persona_label
      - signer
      - channel
      - compatible_aureline_range
      - archetype_certification_state
      - mirror_availability
  cli_summary:
    command: python3 ci/check_alpha_launch_bundles.py --repo-root . --render-gallery
    exposes_same_fields_as_start_center: true

acceptance_state_coverage:
  - case_id: bundle_manifest_names_required_setup_classes
    exercises_state: bundle_has_extensions_settings_tasks_docs_and_rollback
    expected_validator_result: pass
  - case_id: bundle_manifest_links_archetype_and_fixture
    exercises_state: bundle_links_one_archetype_and_one_benchmark_fixture
    expected_validator_result: pass
  - case_id: bundle_manifest_claim_is_seed_limited
    exercises_state: bundle_scope_does_not_exceed_current_evidence
    expected_validator_result: pass
