# -----------------------------------------------------------------------------
# Invariants.
#
# Validators that read this file should treat each invariant as a
# closed-world rule. Adding an invariant is breaking; removing one is a
# decision row.
# -----------------------------------------------------------------------------
invariants:
  - invariant_id: invariant:every_pack_in_bundle_rows_has_owner_row
    statement: >
      Every pack_id listed in artifacts/product/language_bundle_rows.yaml
      framework_packs has exactly one matching row here.
  - invariant_id: invariant:every_owner_row_names_three_roles
    statement: >
      Every row carries exactly three owner roles (selection_owner,
      evidence_owner, publication_owner) drawn from the set in
      owner_role_class_vocabulary.
  - invariant_id: invariant:every_owner_value_is_lane_prefixed
    statement: >
      Every owner value, and every co_required_approvers entry, uses the
      lane: prefix and resolves through
      artifacts/governance/ownership_matrix.yaml.
  - invariant_id: invariant:every_row_has_review_cadence
    statement: >
      Every row carries exactly one value from review_cadence_vocabulary.
  - invariant_id: invariant:every_row_has_non_default_owner_note
    statement: >
      Every row carries an owner_note that explains why the lane is
      carrying the pack. Bare "by default" notes are non-conforming.
