# Framework-pack owner allocation.
#
# One row per framework pack listed in
# artifacts/product/language_bundle_rows.yaml. Rows are the machine form of
# "who carries this pack?" — selection owner (is it in scope), evidence owner
# (does the corpus carry it), and publication owner (who signs off on the
# public copy). Every pack named in language_bundle_rows.yaml must have a
# row here; a pack without an owner row is non-conforming.
#
# Tooling reads this file. The narrative companion is
# docs/product/launch_language_bundle_rubric.md §"Framework-pack ownership".
# If the two disagree, this file is authoritative and the narrative is
# updated in the same change.
#
# Rules.
#   - Every row names exactly three lane-prefixed owners (selection,
#     evidence, publication) drawn from the lanes in
#     artifacts/governance/ownership_matrix.yaml.
#   - co_required_approvers MAY list additional lanes that must sign off
#     on graduation. A missing co-required lane fails the graduation step.
#   - review_cadence is one of each_change, per_milestone, or each_release.
#   - Every row cites the pack_id verbatim from
#     artifacts/product/language_bundle_rows.yaml.
#   - Every row carries an owner_note explaining why the lane is carrying
#     the pack. Bare "by default" notes are non-conforming.

schema_version: 1
status: seeded

language_bundle_rows_source: artifacts/product/language_bundle_rows.yaml
ownership_matrix_source: artifacts/governance/ownership_matrix.yaml
archetype_rubric_source: artifacts/compat/archetype_rubric.yaml
overview_page: docs/product/launch_language_bundle_rubric.md

# -----------------------------------------------------------------------------
# Closed vocabularies.
# -----------------------------------------------------------------------------

owner_role_class_vocabulary:
  - selection_owner
  - evidence_owner
  - publication_owner

review_cadence_vocabulary:
  - each_change
  - per_milestone
  - each_release

graduation_approver_lane_vocabulary:
  - lane:compatibility_ecosystem_review
  - lane:product_scope_review
  - lane:release_council
  - lane:shiproom_executive_scope_review
  - lane:docs_public_truth
  - lane:benchmark_lab
  - lane:release_evidence
  - lane:open_community_sync

# -----------------------------------------------------------------------------
# Framework-pack owner rows.
#
# Ordered by parent bundle so reviewers can scan one bundle's pack set in
# one pass. Rows quote the pack_id verbatim.
# -----------------------------------------------------------------------------
framework_pack_owners:

  # --- launch_bundle:typescript_web_app.seed ---------------------------------
  - pack_id: framework_pack:typescript_web.react
    parent_bundle_ref: launch_bundle:typescript_web_app.seed
    owner_allocation:
      selection_owner: lane:compatibility_ecosystem_review
      evidence_owner: lane:benchmark_lab
      publication_owner: lane:release_evidence
    co_required_approvers:
      - lane:docs_public_truth
      - lane:shiproom_executive_scope_review
    review_cadence: each_release
    owner_note: >
      React is the default UI pack inside the launch wedge, so
      compatibility-ecosystem-review selects the pack, benchmark-lab
      carries the corpus rows, and release-evidence publishes the
      certified claim row.

