# -----------------------------------------------------------------------------
# Persona inventory invariants.
#
# Validators that read this file should treat each invariant as a
# closed-world rule. Adding an invariant is breaking; removing one is a
# decision row.
# -----------------------------------------------------------------------------
invariants:
  - invariant_id: invariant:every_active_persona_binds_launch_bundle_and_archetype
    statement: >
      Every entry in p0_personas carries at least one
      launch_bundle_ref resolving to a bundle_id in
      artifacts/product/language_bundle_rows.yaml#language_bundles and
      at least one archetype_row_ref resolving to an archetype_row_id
      in artifacts/compat/reference_workspace_rows.yaml.
  - invariant_id: invariant:every_active_persona_has_capability_families
    statement: >
      Every entry in p0_personas carries a non-empty
      required_capability_families list drawn from
      capability_family_vocabulary. Missing capability families are
      non-conforming.
  - invariant_id: invariant:every_active_persona_has_workflow_floor
    statement: >
      Every entry in p0_personas carries a non-empty
      daily_driver_criteria.workflow_floor drawn from
      workflow_vocabulary. The floor is the closed set of workflows
      the persona MUST run every day.
  - invariant_id: invariant:every_active_persona_states_replacement_grade_proof
    statement: >
      Every entry in p0_personas carries a
      replacement_grade_criteria.required_proof list drawn from
      replacement_grade_evidence_vocabulary. A persona that is
      intentionally ineligible for one proof item (for example the
      Rust self-host persona and migration_evidence_linked) records
      the omission explicitly in replacement_target_note rather than
      silently dropping the item from the list.
  - invariant_id: invariant:every_active_persona_has_cut_first_posture
    statement: >
      Every entry in p0_personas carries exactly one value from
      cut_first_posture_vocabulary. Silent removal is non-conforming.
  - invariant_id: invariant:every_held_persona_states_held_reason
    statement: >
      Every entry in held_personas carries a non-empty held_reasons
      list drawn from held_reason_vocabulary and an
      inclusion_target_if_admitted so the row is never a silent
      omission.
  - invariant_id: invariant:top_level_claims_quote_persona_id
    statement: >
      Top-level product claims that name a persona (daily-driver or
      replacement-grade wording) cite exactly one persona_id. Free-
      text "built for <role>" wording without the cite is non-
      conforming.
  - invariant_id: invariant:scope_expansion_requires_decision_row
    statement: >
      Adding an active P0 persona row, promoting a held_persona to
      P0, widening a persona's target_workflows list, or lowering a
      persona's support_class_floor opens a decision row in
      artifacts/governance/decision_index.yaml. Silent expansion is
      non-conforming.
  - invariant_id: invariant:persona_support_class_floor_matches_bound_bundle_target
    statement: >
      A persona's daily_driver_criteria.support_class_floor MUST be
      a value from support_class_vocabulary and MUST NOT exceed the
      target_support_class_id of any bundle the persona binds to.
      replacement_grade_criteria.support_class_floor MUST be
      certified for every active P0 persona.
