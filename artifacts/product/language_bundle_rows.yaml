# Launch-language bundle rows.
#
# Machine-readable inventory of the launch-language bundles and framework
# packs the product is willing to name in top-level claims, plus the
# reservation rows the program keeps visible rather than hidden.
#
# Tooling reads this file. The narrative companion is
# docs/product/launch_language_bundle_rubric.md. If the two disagree,
# this file is authoritative and the narrative is updated in the same
# change.
#
# Rules.
#   - Every row carries a stable bundle_id or pack_id. Renaming a row
#     after publication is breaking and opens a decision row in
#     artifacts/governance/decision_index.yaml.
#   - Every language bundle binds to at least one archetype_row_id from
#     artifacts/compat/reference_workspace_rows.yaml. Bundles cannot
#     invent their own support ladder; the support_class vocabulary is
#     quoted verbatim from artifacts/compat/archetype_rubric.yaml.
#   - Every framework pack binds to exactly one parent bundle and carries
#     an entry in artifacts/product/framework_pack_owners.yaml.
#   - Every row carries a selection_scores block populated with one value
#     per criterion in selection_criterion_vocabulary. Missing criteria
#     are non-conforming.
#   - Every row carries exactly one cut_first_posture value. A row that
#     slips out of scope must fall to the named posture, not to silent
#     removal.
#   - replacement_grade_evidence_required enumerates the closed proof
#     set a row needs before it may be wording-eligible for
#     replacement-grade claims. A missing item demotes the row through
#     the archetype rubric demotion rules rather than lowering the
#     proof bar locally.
#   - Top-level product claims cite one bundle_id or pack_id. Free-text
#     "supports X" wording without the cite is non-conforming.

schema_version: 1
status: seeded

overview_page: docs/product/launch_language_bundle_rubric.md
archetype_rubric_source: artifacts/compat/archetype_rubric.yaml
archetype_rows_source: artifacts/compat/reference_workspace_rows.yaml
framework_pack_owners_source: artifacts/product/framework_pack_owners.yaml
claim_manifest_source: artifacts/governance/claim_manifest_seed.yaml
qualification_matrix_source: artifacts/compat/qualification_matrix_seed.yaml
version_skew_register_source: artifacts/compat/version_skew_register.yaml
benchmark_corpus_source: fixtures/benchmarks/corpus_manifest.yaml
descoping_policy_source: docs/governance/descoping_policy.md
cut_class_registry_source: artifacts/milestones/cut_classes.yaml
kill_criteria_source: artifacts/milestones/kill_criteria.yaml

# -----------------------------------------------------------------------------
# Closed vocabularies.
#
# Adding a value is breaking and opens a decision row in
# artifacts/governance/decision_index.yaml. Tightening the wording on a
# value already in the set is additive-minor and lands here in the same
# change as the rule update.
# -----------------------------------------------------------------------------

selection_criterion_vocabulary:
  - user_wedge_fit            # does the bundle land on the product's stated wedge
  - p0_persona_fit            # does the bundle carry a P0 persona's daily workflow
  - reference_workspace_proof # is there a reviewable reference workspace today
  - benchmark_cost            # what does the benchmark corpus have to carry
  - tooling_depth             # how deep is the first-party tooling commitment
  - docs_burden               # what does docs_public_truth have to keep current
  - migration_importance      # how load-bearing is the "switch to Aureline" story
  - supportability            # can support_export carry the row without inflation

selection_score_vocabulary:
  - strong       # evidence and commitment are in place today
  - moderate     # partial evidence; named owner and a reserved path
  - weak         # speculative; named but not yet funded
  - unseeded     # row reserved but not scored at this milestone

support_class_vocabulary:
  - certified
  - supported
  - community
  - experimental

pack_kind_vocabulary:
  - language_bundle             # full language+runtime commitment (one per archetype)
  - runtime_variant_pack        # alternate runtime / packaging inside a bundle
  - framework_pack              # service or UI framework inside a bundle
  - test_runner_pack            # test runner inside a bundle
  - toolchain_pack              # linter, formatter, package manager inside a bundle
  - notebook_kernel_pack        # notebook-kernel specific pack

cut_first_posture_vocabulary:
  - protect_through_m1_m2                        # cut other breadth before cutting this row
  - narrow_support_class_before_cutting          # fall one class first, do not delete
  - cut_first_if_m1_slips                        # primary cut target if M1 scope slips
  - cut_first_if_m2_slips                        # primary cut target if M2 scope slips
  - preview_label_only_if_either_slips           # keep the row but demote to preview only
  - remove_from_launch_set_if_either_slips       # withdraw the bundle from public launch

replacement_grade_evidence_vocabulary:
  - benchmark_corpus_linked        # protected corpus scenario rows cite the bundle
  - compatibility_report_linked    # a current compatibility_report row names the bundle
  - migration_evidence_linked      # a migration corpus or notes row cites the bundle
  - docs_version_match_linked      # docs pages carry an exact-build identity match
  - known_limit_note_linked        # known-limits row names the bundle's scope caveats

unresolved_blocker_class_vocabulary:
  - reference_workspace_reservation_only     # workspace slot reserved but not materialised
  - benchmark_corpus_reservation_only        # scenario ids reserved but not seeded
  - claim_manifest_row_not_yet_seeded        # no claim_row publishing the bundle yet
  - design_partner_signal_required           # promotion needs a design-partner row
  - remote_mode_proof_pending                # required non-local mode not yet demonstrated
  - tooling_choice_pending                   # canonical package manager or toolchain unresolved
  - docs_pack_version_match_pending          # docs-version match not yet demonstrated
  - framework_pack_owner_not_yet_assigned    # at least one dependent pack lacks an owner

inclusion_target_vocabulary:
  - foundations     # in scope for the foundations milestone
  - first_beta      # named for the first beta cut
  - first_stable    # named for the first stable cut
  - post_stable     # intentionally deferred past first stable

# -----------------------------------------------------------------------------
# Rubric gate.
#
# The closed set of tests a candidate language bundle must pass before it
# may be added to launch_bundles. The gate is read by reviewers; new rows
# that do not answer every gate are non-conforming.
# -----------------------------------------------------------------------------
rubric_gate:
  - gate_id: gate:wedge_and_persona_fit
    question: >
      Does the bundle sit on the stated product wedge, and does at least
      one P0 persona carry this bundle in their daily workflow?
    uses_criteria:
      - user_wedge_fit
      - p0_persona_fit
  - gate_id: gate:reference_workspace_proof
    question: >
      Is there a reviewable reference workspace or a named reservation
      slot under fixtures/workspaces/reference/ that the bundle resolves
      through?
    uses_criteria:
      - reference_workspace_proof
  - gate_id: gate:benchmark_and_tooling_cost
    question: >
      Are the benchmark corpus rows and the first-party tooling depth
      sized so the bundle can meet the support_class it is aiming for
      without borrowing from another bundle's evidence?
    uses_criteria:
      - benchmark_cost
      - tooling_depth
  - gate_id: gate:docs_and_migration_load
    question: >
      Can docs_public_truth keep the bundle's docs pages current, and is
      the migration story load-bearing enough to justify committing the
      row rather than routing users through an extension?
    uses_criteria:
      - docs_burden
      - migration_importance
  - gate_id: gate:supportability
    question: >
      Can support_export carry the bundle's failure modes without
      inflating the claim? A bundle that cannot be supported honestly is
      non-conforming at any class above experimental.
    uses_criteria:
      - supportability

