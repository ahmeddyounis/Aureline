# -----------------------------------------------------------------------------
# Framework packs.
#
# Framework packs are the finer-grained claim surfaces inside a language
# bundle. Each pack binds to exactly one parent bundle, carries its own
# support_class target, and must have an entry in
# artifacts/product/framework_pack_owners.yaml. A pack MAY carry a
# narrower support_class than its parent bundle; it MAY NOT carry a
# higher one.
# -----------------------------------------------------------------------------
framework_packs:
  - pack_id: framework_pack:typescript_web.react
    public_label: React
    pack_kind: framework_pack
    parent_bundle_ref: launch_bundle:typescript_web_app.seed
    initial_support_class_id: experimental
    target_support_class_id: certified
    inclusion_target: first_stable
    cut_first_posture: protect_through_m1_m2
    unresolved_blockers:
      - reference_workspace_reservation_only
      - remote_mode_proof_pending
    notes: >
      React is the default UI pack inside the TypeScript launch wedge.
      Promotion past supported requires a workflow scenario row on the
      reference workspace, not a bare library ref.

