    inclusion_target: post_stable
    notes: >
      Apple-platform-only native Swift is a post-stable reservation —
      the foundations milestone commits to cross-platform bundles.

# -----------------------------------------------------------------------------
# Rubric invariants.
#
# Validators that read this file should treat each invariant as a
# closed-world rule. Adding an invariant is breaking; removing one is a
# decision row.
# -----------------------------------------------------------------------------
invariants:
  - invariant_id: invariant:every_bundle_has_archetype_binding
    statement: >
      Every entry in language_bundles has at least one
      archetype_row_ref that resolves to a row in
      artifacts/compat/reference_workspace_rows.yaml.
  - invariant_id: invariant:every_bundle_has_selection_scores
    statement: >
      Every entry in language_bundles carries a selection_scores map
      with one value per id in selection_criterion_vocabulary drawn from
      selection_score_vocabulary.
  - invariant_id: invariant:every_bundle_has_cut_first_posture
    statement: >
      Every entry in language_bundles carries exactly one value from
      cut_first_posture_vocabulary. Silent removal is non-conforming.
  - invariant_id: invariant:every_pack_has_parent_bundle
    statement: >
      Every entry in framework_packs carries exactly one
      parent_bundle_ref that resolves to a bundle_id in language_bundles.
  - invariant_id: invariant:every_pack_has_owner_row
    statement: >
      Every entry in framework_packs has a matching entry in
      artifacts/product/framework_pack_owners.yaml.
  - invariant_id: invariant:pack_class_not_higher_than_parent
    statement: >
      A framework pack MAY carry a narrower target_support_class_id
      than its parent bundle; it MAY NOT carry a higher one.
  - invariant_id: invariant:replacement_grade_requires_full_proof
    statement: >
      A bundle that carries replacement_grade_evidence_required must
      list every value in replacement_grade_evidence_vocabulary the
      rubric flags as required for its target class. Missing items
      demote the bundle through the archetype rubric rather than
      lowering the proof bar.
  - invariant_id: invariant:top_level_claims_quote_bundle_or_pack_id
    statement: >
      Top-level launch claims cite one bundle_id or pack_id. Free-text
      "supports <language>" or "supports <framework>" wording without
      that cite is non-conforming.
  - invariant_id: invariant:excluded_rows_state_reason_and_target
    statement: >
      Every entry in excluded_language_bundles carries an
      exclusion_reason and an inclusion_target so the row is not a
      silent omission.
