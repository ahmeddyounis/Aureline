# -----------------------------------------------------------------------------
# Excluded bundle rows.
#
# Bundles the rubric explicitly leaves outside the foundations milestone.
# Each row records the exclusion reason and the inclusion target so the
# inventory is complete without implying support that is not seeded.
# -----------------------------------------------------------------------------
excluded_language_bundles:
  - bundle_id: launch_bundle:ruby_rails_service.reserved
    public_label: Ruby / Rails service
    exclusion_reason: not_on_stated_wedge_for_foundations
    inclusion_target: post_stable
    notes: >
      A Ruby/Rails bundle is named as a reservation so the inventory is
      complete. It is intentionally excluded from the foundations
      milestone; no claim-manifest row or reference workspace is seeded.

  - bundle_id: launch_bundle:php_service.reserved
    public_label: PHP service
    exclusion_reason: not_on_stated_wedge_for_foundations
    inclusion_target: post_stable
    notes: >
      PHP is named as a reservation row; it is out of foundations scope
      and will enter through the community archetype class first.

  - bundle_id: launch_bundle:swift_native_apple.reserved
    public_label: Swift native (Apple platforms)
