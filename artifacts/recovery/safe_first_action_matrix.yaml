# Recovery-scenario closed vocabularies and safe-first-action rows.
#
# Companion to docs/reliability/recovery_scenario_contract.md and
# schemas/recovery/recovery_scenario_card.schema.json. Every recovery
# surface (Project Doctor, repair-transaction preview, support-intake
# scenario picker, export-before-reset path, recovery-ladder packet,
# CLI listing, evidence packet) MUST project back to the scenario-
# family, affected-scope, safe-remainder, first-action, verb, and
# destructive-risk ids declared here. No surface invents a private
# "profile failure", "index broken", or "reset" class on its own.

schema_version: 1
artifact_id: aureline.recovery.safe_first_action_matrix
title: Recovery-scenario card vocabulary and safe-first-action matrix

contract_source: docs/reliability/recovery_scenario_contract.md

