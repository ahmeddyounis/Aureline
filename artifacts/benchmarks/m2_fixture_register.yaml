# External alpha benchmark fixture register.
#
# Canonical register for reference workspaces and workflow fixture packets used
# by alpha benchmark, public-proof, release-evidence, and support-export lanes.

schema_version: 1
register_id: aureline.external_alpha_fixture_register
register_revision: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

human_entrypoint_ref: docs/benchmarks/privacy_cleared_corpus_workflow.md
validator:
  script_ref: ci/check_benchmark_fixture_register.py
  command: python3 ci/check_benchmark_fixture_register.py --repo-root .
latest_capture_ref: artifacts/milestones/m2/captures/benchmark_fixture_register_validation_capture.json

source_contract_refs:
  alpha_wedge_matrix: artifacts/milestones/m2/alpha_wedge_matrix.yaml
  alpha_exit_gate_scoreboard: artifacts/milestones/m2/exit_gate_scoreboard.yaml
  alpha_dependency_graph: artifacts/milestones/m2/dependency_graph.yaml
  benchmark_corpus_manifest: fixtures/benchmarks/corpus_manifest.yaml
  reference_workspace_rows: artifacts/compat/reference_workspace_rows.yaml
  reference_workspace_descriptors: fixtures/workspaces/reference/
  design_partner_intake: artifacts/program/design_partner_intake_checklist.yaml
  design_partner_public_proof_packet: docs/program/design_partner_and_public_proof_packet.md
  corpus_change_control: artifacts/bench/corpus_change_control.yaml
  benchmark_publication_pack_template: docs/benchmarks/benchmark_publication_pack_template.md
  publication_rehearsal_checklist: artifacts/bench/publication_rehearsal_checklist.yaml
  privacy_clearance_cases: fixtures/bench/privacy_clearance_cases/

privacy_class_vocabulary:
  - public_synthetic
  - public_sanitised
  - internal_redacted
  - restricted_excluded

privacy_decision_vocabulary:
  - admit_public
  - admit_internal_only
  - redact_then_admit
  - exclude_until_replaced
  - withdraw_existing_use

source_class_vocabulary:
  - synthetic
  - design_partner_derived
  - third_party_with_attribution
  - self_host_slice

admission_state_vocabulary:
  - proposed
  - privacy_review
  - license_review
  - redaction_required
  - admitted_public
  - admitted_internal_only
  - excluded_until_replaced
  - withdrawn

fixture_packet_directory: fixtures/reference_workspaces/m2/

addition_gate:
  gate_id: fixture_register.addition_gate.external_alpha
  new_corpus_addition_required_fields:
    - register_row_id
    - reference_workspace_id
    - owner_dri
    - corpus_refs
    - intended_proof_lanes
    - provenance
    - privacy_review
    - repeatability
    - benchmark_packet_binding
  review_steps:
    - bundle_identity_bound
    - source_lineage_recorded
    - license_review_complete
    - privacy_clearance_complete
    - retention_and_access_review_complete
    - owner_and_backup_coverage_recorded
    - corpus_or_reference_workspace_row_prepared
    - benchmark_rehearsal_linked
    - validator_passed
  default_for_missing_privacy_review: exclude_until_replaced
  default_for_missing_repeatability_notes: proposed
  packet_citation_rule: >
    Benchmark and public-proof packets cite register_row_id, corpus_refs,
    privacy_decision, and repeatability_notes from this register rather than
    hardcoding workspace descriptor paths.

reference_workspaces:
  - register_row_id: fixture_register:external_alpha.ts_web_app_reference
    title: TypeScript / JavaScript web app or service reference workspace
    reference_workspace_id: refws.ts_web_app_archetype_seed
    wedge_ref: alpha_wedge:typescript_javascript
    archetype_row_ref: archetype_row:ts_web_app_or_service
    workflow_bundle_ref: launch_bundle:typescript_web_app.seed
    workspace_descriptor_ref: fixtures/workspaces/reference/ts_web_app_archetype_seed.json
    fixture_packet_ref: fixtures/reference_workspaces/m2/ts_web_app_workflows.yaml
    corpus_refs:
      - corpus.reference.ts_web_app_archetype_seed
      - corpus.archetype.ts_web_app_seed
    intended_proof_lanes:
      - scoreboard_row:alpha_scope.ts_js_navigation
      - scoreboard_row:alpha_scope.ts_js_run_test_debug
      - scoreboard_row:alpha_scope.ts_js_git_review
      - scoreboard_row:alpha_scope.local_deployment
      - scoreboard_row:alpha_scope.helper_backed_deployment
      - scoreboard_row:alpha_scope.benchmark_fixtures
    protected_workflow_refs:
      - workflow.alpha.ts_js.open_to_first_useful_result
      - workflow.alpha.ts_js.rename_preview
      - workflow.alpha.ts_js.test_debug_loop
      - workflow.alpha.ts_js.git_review_basics
    owner:
      owner_dri: "@ahmeddyounis"
      selection_owner_ref: lane:compatibility_ecosystem_review
      evidence_owner_ref: lane:benchmark_lab
      publication_owner_ref: lane:release_evidence
      privacy_reviewer_ref: lane:docs_public_truth
      backup_owner_ref_or_waiver: waiver:single-maintainer-backup
    provenance:
      source_class: synthetic
      origin: original_author_aureline_project
      source_revision_ref: fixtures/workspaces/reference/ts_web_app_archetype_seed.json
      license_status: synthetic_no_real_content
      lineage_summary_ref: fixtures/reference_workspaces/m2/ts_web_app_workflows.yaml#provenance
    privacy_review:
      privacy_class: public_synthetic
      privacy_decision: admit_public
      reviewed_on: "2026-05-12"
      reviewer_ref: lane:docs_public_truth
      review_evidence_refs:
        - review:privacy.synthetic_fixture_author_review.ts_web_app_reference
      raw_private_bytes_omission_note: not_applicable_synthetic_no_private_source
    repeatability:
      resolution_mode: described_bytes
      host_platform_class: host_independent
      toolchain_assumption: node_js_declared_only
      deterministic_inputs:
        - fixtures/workspaces/reference/ts_web_app_archetype_seed.json
      repeatability_notes:
        - descriptor_carries_total_file_count_and_byte_count
        - dependency_population_is_out_of_band_and_packet_recorded
        - no_real_repository_or_partner_bytes_are_required
    benchmark_packet_binding:
      packet_family: benchmark_public_proof_packet
      scoreboard_family_id: benchmark_and_public_proof_packet_scoreboard
      citation_fields:
        - register_row_id
        - corpus_refs
        - privacy_decision
        - repeatability_notes
      packet_template_ref: docs/benchmarks/benchmark_publication_pack_template.md
    admission:
      state: admitted_public
      freshness_cadence: each_release
      stale_when:
        - workspace_descriptor_changes
        - fixture_packet_changes
        - corpus_manifest_revision_changes
        - alpha_wedge_scope_changes

  - register_row_id: fixture_register:external_alpha.python_service_data_reference
    title: Python service or data app reference workspace
    reference_workspace_id: refws.python_data_app_archetype_seed
    wedge_ref: alpha_wedge:python
    archetype_row_ref: archetype_row:python_service_or_data_app
    workflow_bundle_ref: launch_bundle:python_service_or_data_app.seed
    workspace_descriptor_ref: fixtures/workspaces/reference/python_data_app_archetype_seed.json
    fixture_packet_ref: fixtures/reference_workspaces/m2/python_service_data_workflows.yaml
    corpus_refs:
      - corpus.reference.python_data_app_archetype_seed
      - corpus.archetype.python_data_app_seed
    intended_proof_lanes:
      - scoreboard_row:alpha_scope.python_environment_tests
      - scoreboard_row:alpha_scope.python_debug_refactor
      - scoreboard_row:alpha_scope.local_deployment
      - scoreboard_row:alpha_scope.helper_backed_deployment
      - scoreboard_row:alpha_scope.benchmark_fixtures
    protected_workflow_refs:
      - workflow.alpha.python.interpreter_and_tests
      - workflow.alpha.python.debug_and_refactor
      - workflow.alpha.python.git_review_basics
    owner:
      owner_dri: "@ahmeddyounis"
      selection_owner_ref: lane:compatibility_ecosystem_review
      evidence_owner_ref: lane:benchmark_lab
      publication_owner_ref: lane:release_evidence
      privacy_reviewer_ref: lane:docs_public_truth
      backup_owner_ref_or_waiver: waiver:single-maintainer-backup
    provenance:
      source_class: synthetic
      origin: original_author_aureline_project
      source_revision_ref: fixtures/workspaces/reference/python_data_app_archetype_seed.json
      license_status: synthetic_no_real_content
      lineage_summary_ref: fixtures/reference_workspaces/m2/python_service_data_workflows.yaml#provenance
    privacy_review:
      privacy_class: public_synthetic
      privacy_decision: admit_public
      reviewed_on: "2026-05-12"
      reviewer_ref: lane:docs_public_truth
      review_evidence_refs:
        - review:privacy.synthetic_fixture_author_review.python_service_data_reference
      raw_private_bytes_omission_note: not_applicable_synthetic_no_private_source
    repeatability:
      resolution_mode: described_bytes
      host_platform_class: host_independent
      toolchain_assumption: python_interpreter_declared_only
      deterministic_inputs:
        - fixtures/workspaces/reference/python_data_app_archetype_seed.json
      repeatability_notes:
        - descriptor_carries_total_file_count_and_byte_count
        - environment_population_is_out_of_band_and_packet_recorded
        - no_real_repository_or_partner_bytes_are_required
    benchmark_packet_binding:
      packet_family: benchmark_public_proof_packet
      scoreboard_family_id: benchmark_and_public_proof_packet_scoreboard
      citation_fields:
        - register_row_id
        - corpus_refs
        - privacy_decision
        - repeatability_notes
      packet_template_ref: docs/benchmarks/benchmark_publication_pack_template.md
    admission:
      state: admitted_public
      freshness_cadence: each_release
      stale_when:
        - workspace_descriptor_changes
        - fixture_packet_changes
        - corpus_manifest_revision_changes
        - alpha_wedge_scope_changes

supporting_privacy_clearance_cases:
  - case_ref: fixtures/bench/privacy_clearance_cases/sanitised_partner_workspace_admitted.yaml
    exercises: redact_then_admit_reference_workspace
  - case_ref: fixtures/bench/privacy_clearance_cases/fixture_repo_secret_excluded.yaml
    exercises: exclude_until_replaced_when_redaction_would_change_scenario
  - case_ref: fixtures/bench/privacy_clearance_cases/third_party_license_review_blocks_fixture.yaml
    exercises: admit_internal_only_until_license_notice_clears
  - case_ref: fixtures/bench/privacy_clearance_cases/benchmark_trace_redacted_internal_only.yaml
    exercises: aggregate_metric_public_raw_trace_internal
  - case_ref: fixtures/bench/privacy_clearance_cases/support_packet_redaction_blocks_publication.yaml
    exercises: support_export_redaction_blocks_publication

acceptance_state_coverage:
  - case_id: fixture_register_all_reference_workspaces_registered
    exercises_state: all_reference_workspaces_registered
    fixture_ref: artifacts/benchmarks/m2_fixture_register.yaml#reference_workspaces
    expected_validator_result: pass
  - case_id: fixture_register_addition_gate_requires_clearance
    exercises_state: provenance_privacy_repeatability_required
    fixture_ref: artifacts/benchmarks/m2_fixture_register.yaml#addition_gate
    expected_validator_result: pass
  - case_id: fixture_register_packets_cite_register
    exercises_state: packets_cite_register_not_paths
    fixture_ref: docs/benchmarks/benchmark_publication_pack_template.md#corpus-and-task-definition
    expected_validator_result: pass

