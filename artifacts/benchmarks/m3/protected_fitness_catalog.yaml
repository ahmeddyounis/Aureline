# M3 protected fitness-function catalog (beta train).
#
# Milestone-scoped catalog for the M3 beta train. The generator at
# ci/check_m3_protected_fitness_catalog.py reads this file together with
# the canonical fitness-function catalog
# (artifacts/bench/fitness_function_catalog.yaml), the fitness-state
# vocabulary register (artifacts/governance/fitness_state_rows.yaml), the
# claimed-surface register
# (artifacts/milestones/m3/claimed_surface_register.json), the cohort
# guardrails (artifacts/milestones/m3/cohort_guardrails.yaml), and the
# M3 waiver register (artifacts/milestones/m3/waiver_register.yaml) to
# emit artifacts/benchmarks/m3/dashboard_snapshot.json plus the validation
# capture.
#
# Each row pins one M3 protected lane (startup, typing, search, rollback,
# supportability, extension isolation, policy/trust) to:
#   - its threshold owner (DRI, owning lane, co-owning lane, decision
#     forum) and back-up posture;
#   - the canonical fitness_function_catalog rows that supply the
#     metric identities and threshold metadata for the lane;
#   - the M3 claimed beta surfaces the lane gates;
#   - the waiver authority, default expiry window, and escalation path;
#     and
#   - the dashboard tile id, tile-state vocabulary, evidence-freshness
#     class, and mitigation-note class the snapshot renders.
#
# Tooling reads this file. Reviewers should refresh the matrix or the
# canonical catalog rather than editing the generated dashboard JSON.

schema_version: 1
catalog_id: m3_protected_fitness_catalog
catalog_revision: 1
milestone_id: m3
release_channel_scope: beta
catalog_state: draft
as_of: "2026-05-15"
owner: "@ahmeddyounis"
backup_owner: null
backup_waiver: single-maintainer-backup

# Authoritative source seeds. The generator refuses to run if any of
# these is missing, malformed, or names an unknown id.
canonical_catalog_source: artifacts/bench/fitness_function_catalog.yaml
fitness_state_rows_source: artifacts/governance/fitness_state_rows.yaml
claimed_surface_register_source: artifacts/milestones/m3/claimed_surface_register.json
cohort_guardrails_source: artifacts/milestones/m3/cohort_guardrails.yaml
waiver_register_source: artifacts/milestones/m3/waiver_register.yaml

# Generator and validation outputs.
generator:
  script_ref: ci/check_m3_protected_fitness_catalog.py
  command: python3 ci/check_m3_protected_fitness_catalog.py --repo-root .

generated_dashboard_snapshot_ref: artifacts/benchmarks/m3/dashboard_snapshot.json
validation_capture_ref: artifacts/benchmarks/m3/captures/protected_fitness_catalog_validation_capture.json

# Surfaces that consume the generated snapshot verbatim. Release
# packets, support exports, governance reviews, and the beta admission
# matrix read these refs instead of restating tile prose.
consuming_surfaces:
  - docs/milestones/m3/beta_admission_matrix.md
  - docs/milestones/m3/protected_fitness_catalog.md
  - docs/release/release_evidence_packet_template.md
  - docs/release/shiproom_dashboard_contract.md
  - docs/release/protected_fitness_review_alpha.md
  - docs/release/release_status_surface_contract.md
  - docs/governance/fitness_dashboard_contract.md
  - docs/governance/waiver_register_contract.md
  - docs/support/support_center_concept.md

# Closed vocabularies the catalog must use. These mirror the canonical
# fitness-state vocabulary and the fitness-function-catalog vocabulary
# so every consuming surface reads one dialect.
vocabularies:
  protected_lane_class:
    - startup
    - typing
    - search
    - rollback
    - supportability
    - extension_isolation
    - policy_trust
  row_status:
    - seeded
    - provisional
  tile_state:
    - passing
    - warning
    - blocked
    - waived
    - waiver_expired
    - evidence_stale
  evidence_freshness_class:
    - fresh
    - near_expiry
    - stale_by_time
    - stale_by_trigger
    - missing
    - not_applicable_provisional
  mitigation_note_class:
    - no_mitigation_required_passing
    - narrower_scope_until_refresh
    - slower_path_active_until_refresh
    - less_portable_temporarily
    - temporarily_blocked_pending_owner_action
    - waiver_holds_release_until_expiry
    - partial_profile_result_pending_full_capture
    - provisional_no_action_until_seeded
    - early_signal_drift_owner_inspecting
  waiver_authority:
    - performance_council
    - architecture_council
    - release_council
    - shiproom_executive_scope_review
    - not_applicable_no_active_waiver

# Each row binds one M3 protected lane to canonical catalog rows,
# beta-surface gates, and the dashboard tile snapshot.
#
# Required fields per row:
#   - id: stable m3 protected function id
#   - protected_lane_class: one of the seven required protected lanes
#   - title: short reviewable label
#   - row_status: seeded or provisional
#   - canonical_row_refs: ff.* row ids from the canonical catalog;
#       may be empty when the lane has no canonical row yet, in which
#       case row_status MUST be provisional and completion_owner MUST
#       be named.
#   - primary_canonical_row_ref: the canonical row whose threshold and
#       waiver metadata the dashboard tile mirrors; null for provisional
#       lanes with no canonical row yet.
#   - beta_surface_refs: claimed beta surface ids this lane gates.
#   - threshold: owner, owning lane, co-owning lane, threshold mode,
#       and decision-forum ref.
#   - waiver: waiver authority, default expiry window, renewal-requires-
#       correction-program flag, and escalation path.
#   - dashboard_tile: tile id, tile-state token, evidence-freshness
#       class, mitigation-note class, and bounded reviewable copy.

rows:
  # ---------------------------------------------------------------------------
  # Startup
  # ---------------------------------------------------------------------------
  - id: m3_protected_function:startup
    title: Startup to first useful work
    protected_lane_class: startup
    row_status: seeded
    canonical_row_refs:
      - ff.warm_start_to_first_paint
      - ff.first_paint
    primary_canonical_row_ref: ff.warm_start_to_first_paint
    beta_surface_refs:
      - beta_surface:packaging_update_rollback
      - beta_surface:support_export_diagnostics
    threshold:
      owner: "@ahmeddyounis"
      owning_lane: benchmark_lab
      co_owning_lane: aureline-render
      backup_owner: null
      backup_waiver: single-maintainer-backup
      threshold_mode: absolute_p50_and_p95
      decision_forum_ref: forum:performance_council
    waiver:
      authority: performance_council
      default_expiry_window_days: 90
      renewal_requires_correction_program: true
      escalation_path:
        - performance_council
        - architecture_council
        - shiproom_executive_scope_review
    dashboard_tile:
      tile_id: m3_dashboard_tile:protected_function:startup
      tile_state: evidence_stale
      evidence_freshness_class: missing
      mitigation_note_class: temporarily_blocked_pending_owner_action
      partial_profile_result_class: subset_of_corpus_rows_covered
      corpus_profile_identity_class: reference_hardware
      headline_label: Startup to first useful work
      threshold_label: warm_start_to_first_paint p50/p95 to be set by benchmark council
      measured_label: last seen pending warm-start observation on the reference hardware matrix
      mitigation_summary: >
        Capture warm-start observations on the reference hardware matrix
        and rerun the benchmark-lab harness before the M3 beta train
        can render the startup tile as passing.
      what_users_should_do: >
        Open repositories and observe first useful work the same way
        as today; partner reports help size the missing observation
        coverage.
      what_operators_should_do: >
        Run the benchmark-lab harness on the warm-start corpus on each
        reference-hardware row and refresh the dashboard snapshot in
        the same change set.
    notes: >
      Startup is anchored to ff.warm_start_to_first_paint with
      ff.first_paint as the co-anchor for per-surface paint timing.
      The threshold numerics remain to_be_set_by_benchmark_council per
      the canonical row; M3 publishes the dashboard tile in the
      evidence_stale state until warm-start observations land.

  # ---------------------------------------------------------------------------
  # Typing
  # ---------------------------------------------------------------------------
  - id: m3_protected_function:typing
    title: Typing latency and buffer correctness
    protected_lane_class: typing
    row_status: seeded
    canonical_row_refs:
      - ff.input_to_paint
      - ff.buffer_operations
    primary_canonical_row_ref: ff.input_to_paint
    beta_surface_refs:
      - beta_surface:debug_test_task_model
    threshold:
      owner: "@ahmeddyounis"
      owning_lane: benchmark_lab
      co_owning_lane: aureline-render
      backup_owner: null
      backup_waiver: single-maintainer-backup
      threshold_mode: absolute_p50_and_p95
      decision_forum_ref: forum:performance_council
    waiver:
      authority: performance_council
      default_expiry_window_days: 60
      renewal_requires_correction_program: true
      escalation_path:
        - performance_council
        - architecture_council
        - shiproom_executive_scope_review
    dashboard_tile:
      tile_id: m3_dashboard_tile:protected_function:typing
      tile_state: evidence_stale
      evidence_freshness_class: missing
      mitigation_note_class: temporarily_blocked_pending_owner_action
      partial_profile_result_class: subset_of_corpus_rows_covered
      corpus_profile_identity_class: reference_hardware
      headline_label: Typing latency and buffer correctness
      threshold_label: input_to_paint p50/p95 to be set by benchmark council, buffer undo-class correctness must hold
      measured_label: last seen pending input-to-paint observation on the reference hardware matrix
      mitigation_summary: >
        Capture input-to-paint and buffer-operation observations on the
        reference hardware matrix; the undo-class correctness gate is
        boolean and must hold before the typing tile can render as
        passing.
      what_users_should_do: >
        Type and edit as today; partner workspaces help size the
        observation coverage on real corpora.
      what_operators_should_do: >
        Run the benchmark-lab harness on the input-to-paint and
        buffer-operations corpora on each reference-hardware row and
        refresh the dashboard snapshot in the same change set.
    notes: >
      Typing covers both input-to-paint latency and buffer-operations
      undo-class correctness. The dashboard tile renders the boolean
      undo-class gate alongside the latency placeholder so a regression
      on either half is visible without reading the canonical catalog.

  # ---------------------------------------------------------------------------
  # Search
  # ---------------------------------------------------------------------------
  - id: m3_protected_function:search
    title: Search and command-graph parity
    protected_lane_class: search
    row_status: provisional
    canonical_row_refs:
      - ff.command_parity
    primary_canonical_row_ref: ff.command_parity
    completion_owner: "@ahmeddyounis"
    completion_target: command_graph_ADR_landing_and_search_harness_wiring
    beta_surface_refs:
      - beta_surface:debug_test_task_model
      - beta_surface:support_export_diagnostics
    threshold:
      owner: "@ahmeddyounis"
      owning_lane: benchmark_lab
      co_owning_lane: shell_command_system
      backup_owner: null
      backup_waiver: single-maintainer-backup
      threshold_mode: boolean_gate
      decision_forum_ref: forum:performance_council
    waiver:
      authority: performance_council
      default_expiry_window_days: 180
      renewal_requires_correction_program: false
      escalation_path:
        - performance_council
        - architecture_council
    dashboard_tile:
      tile_id: m3_dashboard_tile:protected_function:search
      tile_state: evidence_stale
      evidence_freshness_class: not_applicable_provisional
      mitigation_note_class: provisional_no_action_until_seeded
      partial_profile_result_class: not_partial_full_corpus_run
      corpus_profile_identity_class: general_corpus_no_profile_pin
      headline_label: Search and command-graph parity
      threshold_label: command_graph_parity must be total across palette, menu, CLI, AI-tool, and automation surfaces
      measured_label: last seen pending command-graph ADR landing
      mitigation_summary: >
        Search and command-graph parity is provisional pending the
        command-graph ADR landing and the search harness wiring;
        downstream lanes should not yet rely on the dashboard tile as
        release-bearing.
      what_users_should_do: >
        Use search and command dispatch as today; partner reports help
        size the parity coverage.
      what_operators_should_do: >
        Land the command-graph ADR, wire the parity harness, and move
        the row to row_status=seeded in the canonical catalog in the
        same change set.
    notes: >
      Search resolves through ff.command_parity (provisional in the
      canonical catalog). M3 publishes the row as provisional with a
      named completion owner so the dashboard tile renders the
      placeholder verbatim rather than projecting a fresh pass on
      missing evidence.

  # ---------------------------------------------------------------------------
  # Rollback
  # ---------------------------------------------------------------------------
  - id: m3_protected_function:rollback
    title: Rollback fidelity and save-pipeline conflict handling
    protected_lane_class: rollback
    row_status: seeded
    canonical_row_refs:
      - ff.vfs_save_conflict_handling
      - ff.restore_fidelity
    primary_canonical_row_ref: ff.vfs_save_conflict_handling
    beta_surface_refs:
      - beta_surface:packaging_update_rollback
      - beta_surface:support_export_diagnostics
      - beta_surface:importer_and_migration
    threshold:
      owner: "@ahmeddyounis"
      owning_lane: benchmark_lab
      co_owning_lane: aureline-vfs
      backup_owner: null
      backup_waiver: single-maintainer-backup
      threshold_mode: boolean_gate
      decision_forum_ref: forum:performance_council
    waiver:
      authority: performance_council
      default_expiry_window_days: 45
      renewal_requires_correction_program: true
      escalation_path:
        - performance_council
        - architecture_council
        - release_council
        - shiproom_executive_scope_review
    dashboard_tile:
      tile_id: m3_dashboard_tile:protected_function:rollback
      tile_state: evidence_stale
      evidence_freshness_class: missing
      mitigation_note_class: temporarily_blocked_pending_owner_action
      partial_profile_result_class: subset_of_corpus_rows_covered
      corpus_profile_identity_class: design_partner_workspace
      headline_label: Rollback fidelity and save-pipeline conflict handling
      threshold_label: compare-before-write must hold, save-mode downgrade without envelope permission must not occur, restore fidelity floor compatible
      measured_label: last seen pending rollback drill capture on partner workspaces
      mitigation_summary: >
        Run the rollback drill and the save-pipeline conflict scenarios
        on the partner workspace fixtures; the restore-fidelity row is
        provisional in the canonical catalog and renders alongside.
      what_users_should_do: >
        Save and revert as today; partner workspace reports help size
        the rollback fidelity coverage.
      what_operators_should_do: >
        Run the rollback drill on the partner workspace fixture corpus,
        attach the capture to the dashboard snapshot, and refresh the
        save-pipeline conflict-handling envelope in the same change set.
    notes: >
      Rollback covers the ADR-0006 save-pipeline correctness gate
      together with the provisional restore-fidelity row. The dashboard
      tile renders the boolean gate alongside the restore-fidelity
      placeholder so a regression on either half is visible without
      reading the canonical catalog.

  # ---------------------------------------------------------------------------
  # Supportability
  # ---------------------------------------------------------------------------
  - id: m3_protected_function:supportability
    title: Supportability and benchmark-lab self-audit
    protected_lane_class: supportability
    row_status: seeded
    canonical_row_refs:
      - ff.benchmark_lab_health
    primary_canonical_row_ref: ff.benchmark_lab_health
    beta_surface_refs:
      - beta_surface:support_export_diagnostics
      - beta_surface:debug_test_task_model
    threshold:
      owner: "@ahmeddyounis"
      owning_lane: benchmark_lab
      co_owning_lane: governance_packets
      backup_owner: null
      backup_waiver: single-maintainer-backup
      threshold_mode: boolean_gate
      decision_forum_ref: forum:performance_council
    waiver:
      authority: performance_council
      default_expiry_window_days: 30
      renewal_requires_correction_program: true
      escalation_path:
        - performance_council
        - architecture_council
        - shiproom_executive_scope_review
    dashboard_tile:
      tile_id: m3_dashboard_tile:protected_function:supportability
      tile_state: evidence_stale
      evidence_freshness_class: missing
      mitigation_note_class: temporarily_blocked_pending_owner_action
      partial_profile_result_class: not_partial_full_corpus_run
      corpus_profile_identity_class: general_corpus_no_profile_pin
      headline_label: Supportability and benchmark-lab self-audit
      threshold_label: corpus id resolution and trace schema conformance must be total, ad-hoc metric names must not occur, reproducible build identity must be recorded
      measured_label: last seen pending benchmark-lab self-audit capture
      mitigation_summary: >
        Run the benchmark-lab self-audit packet on the corpus and trace
        schemas; the supportability tile gates the release-evidence
        claim manifest from citing the benchmark report.
      what_users_should_do: >
        Capture support bundles as today; partner support exports help
        size the self-audit coverage.
      what_operators_should_do: >
        Refresh the benchmark-lab self-audit packet on each release
        train, attach the build identity, and refresh the dashboard
        snapshot in the same change set.
    notes: >
      Supportability anchors to ff.benchmark_lab_health. A failure on
      this row blocks the release-evidence claim manifest, since the
      claim manifest's evidence owner cannot sign a benchmark report
      that the harness cannot vouch for.

  # ---------------------------------------------------------------------------
  # Extension isolation
  # ---------------------------------------------------------------------------
  - id: m3_protected_function:extension_isolation
    title: Extension runtime isolation and SDK posture
    protected_lane_class: extension_isolation
    row_status: provisional
    canonical_row_refs: []
    primary_canonical_row_ref: null
    completion_owner: "@ahmeddyounis"
    completion_target: extension_isolation_ADR_landing_and_canonical_catalog_row
    beta_surface_refs:
      - beta_surface:extension_runtime
    threshold:
      owner: "@ahmeddyounis"
      owning_lane: benchmark_lab
      co_owning_lane: extension_host
      backup_owner: null
      backup_waiver: single-maintainer-backup
      threshold_mode: boolean_gate
      decision_forum_ref: forum:architecture_council
    waiver:
      authority: architecture_council
      default_expiry_window_days: 180
      renewal_requires_correction_program: false
      escalation_path:
        - architecture_council
        - release_council
    dashboard_tile:
      tile_id: m3_dashboard_tile:protected_function:extension_isolation
      tile_state: evidence_stale
      evidence_freshness_class: not_applicable_provisional
      mitigation_note_class: provisional_no_action_until_seeded
      partial_profile_result_class: not_partial_full_corpus_run
      corpus_profile_identity_class: general_corpus_no_profile_pin
      headline_label: Extension runtime isolation and SDK posture
      threshold_label: extension host must not exit isolation envelope, SDK breaking change without migration must not ship
      measured_label: last seen pending extension-host isolation drill
      mitigation_summary: >
        Extension isolation is provisional pending the extension-host
        isolation ADR landing and a canonical fitness-function-catalog
        row; the dashboard renders the placeholder until the row moves
        to seeded.
      what_users_should_do: >
        Use extensions as today; partner extension authors help size
        the isolation drill coverage.
      what_operators_should_do: >
        Land the extension-host isolation ADR, wire the isolation
        drill, add the canonical catalog row, and move this lane to
        row_status=seeded in the same change set.
    notes: >
      Extension isolation has no canonical fitness-function-catalog row
      yet; this M3 row reserves the lane id, names the completion owner,
      and renders the dashboard tile as provisional. Beta scope already
      gates SDK-breaking-change and publication-mirror-unavailable
      downgrade rules in the claimed-surface register.

  # ---------------------------------------------------------------------------
  # Policy / trust
  # ---------------------------------------------------------------------------
  - id: m3_protected_function:policy_trust
    title: Policy bundle, proxy, and trust envelope
    protected_lane_class: policy_trust
    row_status: provisional
    canonical_row_refs: []
    primary_canonical_row_ref: null
    completion_owner: "@ahmeddyounis"
    completion_target: policy_trust_ADR_landing_and_canonical_catalog_row
    beta_surface_refs:
      - beta_surface:policy_proxy_transport
      - beta_surface:extension_runtime
    threshold:
      owner: "@ahmeddyounis"
      owning_lane: benchmark_lab
      co_owning_lane: policy_and_trust
      backup_owner: null
      backup_waiver: single-maintainer-backup
      threshold_mode: boolean_gate
      decision_forum_ref: forum:release_council
    waiver:
      authority: release_council
      default_expiry_window_days: 180
      renewal_requires_correction_program: true
      escalation_path:
        - release_council
        - architecture_council
        - shiproom_executive_scope_review
    dashboard_tile:
      tile_id: m3_dashboard_tile:protected_function:policy_trust
      tile_state: evidence_stale
      evidence_freshness_class: not_applicable_provisional
      mitigation_note_class: provisional_no_action_until_seeded
      partial_profile_result_class: not_partial_full_corpus_run
      corpus_profile_identity_class: managed_saas_ring
      headline_label: Policy bundle, proxy, and trust envelope
      threshold_label: policy bundle schema must hold, proxy lab must remain available, trust envelope must not silently widen
      measured_label: last seen pending policy bundle packet
      mitigation_summary: >
        Policy / trust is provisional pending the policy-trust ADR
        landing and a canonical fitness-function-catalog row; the
        dashboard renders the placeholder until the row moves to
        seeded.
      what_users_should_do: >
        Use enterprise policy bundles as today; partner managed pilots
        help size the bundle coverage.
      what_operators_should_do: >
        Land the policy-trust ADR, wire the enterprise proxy lab and
        identity envelope captures, add the canonical catalog row, and
        move this lane to row_status=seeded in the same change set.
    notes: >
      Policy / trust has no canonical fitness-function-catalog row yet;
      this M3 row reserves the lane id, names the completion owner, and
      renders the dashboard tile as provisional. Beta scope already
      gates policy-bundle-schema-break and proxy-lab-unavailable
      downgrade rules in the claimed-surface register.

# =============================================================================
# Slice index.
#
# Minimal cross-reference index so tooling (and humans) can slice protected
# lanes by lane class, by beta surface, and by waiver authority without
# building a parallel scoreboard. Regenerate this block in the same change
# set that adds or renames a row.
# =============================================================================
slices:
  by_protected_lane_class:
    startup:
      - m3_protected_function:startup
    typing:
      - m3_protected_function:typing
    search:
      - m3_protected_function:search
    rollback:
      - m3_protected_function:rollback
    supportability:
      - m3_protected_function:supportability
    extension_isolation:
      - m3_protected_function:extension_isolation
    policy_trust:
      - m3_protected_function:policy_trust
  by_beta_surface:
    beta_surface:extension_runtime:
      - m3_protected_function:extension_isolation
      - m3_protected_function:policy_trust
    beta_surface:debug_test_task_model:
      - m3_protected_function:typing
      - m3_protected_function:search
      - m3_protected_function:supportability
    beta_surface:packaging_update_rollback:
      - m3_protected_function:startup
      - m3_protected_function:rollback
    beta_surface:policy_proxy_transport:
      - m3_protected_function:policy_trust
    beta_surface:support_export_diagnostics:
      - m3_protected_function:startup
      - m3_protected_function:search
      - m3_protected_function:rollback
      - m3_protected_function:supportability
    beta_surface:importer_and_migration:
      - m3_protected_function:rollback
    beta_surface:compatibility_publication: []
  by_waiver_authority:
    performance_council:
      - m3_protected_function:startup
      - m3_protected_function:typing
      - m3_protected_function:search
      - m3_protected_function:rollback
      - m3_protected_function:supportability
    architecture_council:
      - m3_protected_function:extension_isolation
    release_council:
      - m3_protected_function:policy_trust
    shiproom_executive_scope_review: []
