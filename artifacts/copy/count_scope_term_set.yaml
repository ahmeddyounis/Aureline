record_kind: microcopy_term_set_record
microcopy_term_schema_version: 1
term_set_id: copy.term_set.count_scope_freshness.v1
sources:
  - docs/copy/count_scope_freshness_grammar.md
  - docs/ux/collection_view_contract.md
  - docs/ux/selection_and_scope_contract.md
  - docs/ux/view_freshness_contract.md
  - docs/ux/chronology_row_contract.md
  - docs/ux/search_result_contract.md
controlled_terms:
  - term_id: visible
    display_label: visible
    term_kind: count_scope
    definition: Items currently rendered in the active page, viewport, or visible list window.
    required_disclosures:
      - Object counted.
      - Count status.
      - Whether loaded or all-matching counts differ.
    forbidden_uses:
      - Do not use visible for loaded, selected, or all matching items.
      - Do not imply hidden or not-loaded items are absent.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - export_header
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: loaded
    display_label: loaded
    term_kind: count_scope
    definition: Items materialized in client memory or pinned by the current provider cursor.
    required_disclosures:
      - Object counted.
      - Whether more items may match, stream, or remain outside the loaded window.
      - Count status.
    forbidden_uses:
      - Do not use loaded as a synonym for total or all matching.
      - Do not claim exact full coverage unless all_matching is exact and equal.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - dashboard_card
      - export_header
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: all_matching
    display_label: all matching
    term_kind: count_scope
    definition: The full population matching the active query, filter, provider basis, or saved view.
    required_disclosures:
      - Query, filter, provider, or snapshot basis.
      - Exact, approximate, provider-limited, stale, cached, partial, or unknown count status.
      - Hidden by policy and outside current workset counts when non-zero.
    forbidden_uses:
      - Do not use for visible rows or loaded rows.
      - Do not use if the current basis is unknown or unreviewed.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - export_header
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: selected
    display_label: selected
    term_kind: count_scope
    definition: Items explicitly admitted to the current selection by stable identity or reviewed all-matching scope.
    required_disclosures:
      - Selection scope.
      - Hidden selected, not-loaded, blocked, hidden by policy, and outside current workset counts when non-zero.
      - Count status.
    forbidden_uses:
      - Do not say selected without naming scope on consequential actions.
      - Do not collapse hidden, not-loaded, or blocked selected items into the selected total only.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - export_header
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: hidden_by_policy
    display_label: hidden by policy
    term_kind: omission_reason
    definition: Items are withheld or narrowed by trust, admin policy, redaction, entitlement, or authorization.
    required_disclosures:
      - Count status.
      - Policy or authority source where safe.
      - Inspect, explain-policy, or export-disclosure route when available.
    forbidden_uses:
      - Do not call policy-hidden items filtered out, unavailable, or zero results.
      - Do not hide policy-hidden selected items from batch review.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - dashboard_card
      - export_header
      - chronology_row
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: outside_current_workset
    display_label: outside current workset
    term_kind: omission_reason
    definition: Items exist in a broader workspace, provider, or historical scope but are outside the active workset or slice.
    required_disclosures:
      - Count status.
      - Active workset or scope label.
      - Widen-scope or keep-current-scope action where available.
    forbidden_uses:
      - Do not imply outside-workset items do not exist.
      - Do not include outside-workset items in a batch without review.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - dashboard_card
      - export_header
      - chronology_row
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: approx
    display_label: approx.
    term_kind: count_status
    definition: Visible copy marker for approximate, sampled, heuristic, provider-limited, or otherwise non-exact counts.
    required_disclosures:
      - Approximation reason.
      - Exact-source or inspect route where available.
      - Scope counted.
    forbidden_uses:
      - Do not show exact-looking totals without approximation language.
      - Do not use approx. to mask unknown counts.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - dashboard_card
      - export_header
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: exact
    display_label: exact
    term_kind: count_status
    definition: Count, target, mapping, or result is proven for the declared scope and freshness basis.
    required_disclosures:
      - Declared scope.
      - Authority or basis when the surface is derived, provider-backed, or captured.
    forbidden_uses:
      - Do not use for stale, cached, partial, sampled, heuristic, provider-limited, streaming, or unknown counts.
      - Do not use for current state when the view is imported or captured.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - dashboard_card
      - export_header
      - chronology_row
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: partial_data
    display_label: partial
    term_kind: data_state
    definition: Some requested data is missing, unloaded, blocked, provider-limited, or still computing.
    required_disclosures:
      - Covered scope.
      - Omitted scope or omission reason.
      - Action to widen, retry, finish indexing, or keep narrowed scope.
    forbidden_uses:
      - Do not collapse partial data into stale, loading, or exact result copy.
      - Do not export partial counts as exact totals.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - dashboard_card
      - export_header
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: cached_data
    display_label: cached
    term_kind: data_state
    definition: Prior known-good data is shown without fresh confirmation from the authority source.
    required_disclosures:
      - Age, captured time, or last-known-good time.
      - Refresh, requery, or inspect route.
      - Scope represented by the cached value.
    forbidden_uses:
      - Do not say current, healthy, ready, or synced from cached data alone.
      - Do not enable exact current-state mutations without refresh or review.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - dashboard_card
      - export_header
      - chronology_row
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: streaming
    display_label: streaming
    term_kind: data_state
    definition: Rows, events, or counts can still change while the current stream continues.
    required_disclosures:
      - Loaded count.
      - Whether new arrivals are included, buffered, or require review.
      - Freeze or show-new-results action for consequential batch actions.
    forbidden_uses:
      - Do not run destructive all-matching actions against a moving set without a reviewed basis.
      - Do not claim exact completion while a stream is still open.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - dashboard_card
      - export_header
      - chronology_row
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: warming
    display_label: warming
    term_kind: data_state
    definition: Background preparation is in progress and some narrower capability may already be usable.
    required_disclosures:
      - Named producer warming.
      - Available subset.
      - Expected ready signal or retry path when known.
    forbidden_uses:
      - Do not use warming as a generic failure.
      - Do not claim full readiness before warmup completes.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - dashboard_card
      - export_header
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: stale
    display_label: stale
    term_kind: data_state
    definition: Prior data is shown after its freshness floor or causal continuity was lost.
    required_disclosures:
      - Last-known-good time or invalidation cause.
      - Refresh, requery, repair, or continue-locally path.
      - Whether exact current-state actions are blocked.
    forbidden_uses:
      - Do not describe stale data as current, ready, healthy, or synced.
      - Do not omit the stale cause when the row affects policy, recovery, provider state, or export.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - dashboard_card
      - export_header
      - chronology_row
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: provider_limited
    display_label: provider-limited
    term_kind: count_status
    definition: The upstream provider capped, sampled, redacted, or otherwise narrowed the count or result set.
    required_disclosures:
      - Provider basis or provider authority label.
      - Limit, cap, or narrowing reason where safe.
      - Whether all-matching is a provider-limited claim.
    forbidden_uses:
      - Do not flatten provider-limited counts to exact.
      - Do not hide provider limits in export headers or CLI summaries.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - dashboard_card
      - export_header
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

  - term_id: unknown
    display_label: unknown
    term_kind: count_status
    definition: The producer cannot claim a count or state and refuses to invent one.
    required_disclosures:
      - Unknown axis.
      - Reason the count or state cannot be known.
      - Safe next action or denial.
    forbidden_uses:
      - Do not replace unknown with zero.
      - Do not use unknown when the producer has an approximate, cached, stale, partial, or provider-limited count.
    allowed_surface_classes:
      - batch_action
      - search_summary
      - queue_row
      - dashboard_card
      - export_header
      - selection_bar
      - accessibility_label
      - cli_summary
      - support_export

surface_grammars:
  - grammar_id: copy.grammar.search_summary
    surface_class: search_summary
    required_slots:
      - object
      - scope
      - count_status
      - freshness
      - omissions
    approved_patterns:
      - "<loaded count> loaded <object> - <all matching count> all matching <object> - <freshness or omission>"
      - "No exact <object> in <scope> - <omission count> hidden by policy"
      - "<visible count> visible <object> - more may match outside current workset"
    forbidden_patterns:
      - "<count> results"
      - "No results"
      - "All results loaded"

  - grammar_id: copy.grammar.batch_action
    surface_class: batch_action
    required_slots:
      - action
      - object
      - scope
      - count_status
      - omissions
      - recovery_or_next_action
    approved_patterns:
      - "<verb> <count status> <count> <scope> <object>"
      - "Review <selected count> selected <object> - <hidden by policy count> hidden by policy - <outside current workset count> outside current workset"
      - "Select all <all matching count> matching <object>?"
    forbidden_patterns:
      - "Apply"
      - "Rerun selected"
      - "Export all"

  - grammar_id: copy.grammar.queue_row
    surface_class: queue_row
    required_slots:
      - object
      - scope
      - count_status
      - freshness
      - recovery_or_next_action
    approved_patterns:
      - "<object> - approx. <count> queued - <loaded count> loaded - streaming from provider"
      - "<object> - <exact count> exact queued - updated <relative time>"
      - "<object> - count unknown - provider offline - inspect cached entries"
    forbidden_patterns:
      - "<count> jobs"
      - "Queue synced"
      - "All caught up"

  - grammar_id: copy.grammar.dashboard_card
    surface_class: dashboard_card
    required_slots:
      - object
      - scope
      - count_status
      - freshness
    approved_patterns:
      - "<state> - <count status> <count> <object> - <scope> - <freshness>"
      - "Health checks stale - <count> exact checks from cache - last checked <relative time>"
      - "<object> - approx. <count> in sampled dashboard window"
    forbidden_patterns:
      - "Healthy"
      - "Ready"
      - "Current"

  - grammar_id: copy.grammar.export_header
    surface_class: export_header
    required_slots:
      - object
      - scope
      - count_status
      - freshness
      - omissions
      - time
    approved_patterns:
      - "Export <object> - <scope> - <count phrases> - captured <absolute UTC time> - <freshness>"
      - "Export selected <object> - <included count> included - <hidden by policy count> hidden by policy - <outside current workset count> outside current workset"
    forbidden_patterns:
      - "Export results"
      - "Export all"
      - "Synced export"

  - grammar_id: copy.grammar.chronology_row
    surface_class: chronology_row
    required_slots:
      - actor
      - action
      - object
      - cause
      - outcome
      - time
    approved_patterns:
      - "<actor> <action> <object> because <cause> - <outcome> - <time>"
      - "<actor> recorded <outcome> <object> from <import source> - original event <absolute UTC time>"
      - "<actor> replayed <object> from <basis> because <cause>"
    forbidden_patterns:
      - "Failed"
      - "Blocked"
      - "Replayed"
      - "Imported"

denial_rules:
  - Bare results, selected, synced, ready, current, or healthy copy is denied when scope, count status, or freshness can differ.
  - Approximate, sampled, provider-limited, partial, cached, stale, streaming, warming, imported, or unknown values must not render as exact.
  - Visible and loaded counts must not render as all matching.
  - Hidden by policy, outside current workset, not-loaded, redacted, provider-limited, and unavailable populations must remain separate in review and export copy.
  - Chronology rows for failed, blocked, replayed, imported, denied, or superseded events must include actor, object, cause, outcome, and time.
  - Export copy must not strengthen the claim beyond the reviewed live or captured surface.
