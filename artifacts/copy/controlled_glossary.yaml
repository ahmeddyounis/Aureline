aliases:
  - alias_id: alias.client.desktop_only
    canonical_term_id: client.desktop
    alias_label: Desktop only
    alias_status: deprecated_alias
    allowed_surface_classes:
      - documentation
      - support_packet
    rationale: Historical copy may say Desktop only, but the canonical client-scope label is Desktop unless exclusion of companion paths is the exact object under review.
    review_requirement: Replace with Desktop on new surfaces; retain only in migration notes or comparison text with explicit rationale.
  - alias_id: alias.state.read_only_degraded_no_hyphen
    canonical_term_id: state.read_only_degraded
    alias_label: Read only degraded
    alias_status: deprecated_alias
    allowed_surface_classes:
      - cli_summary
      - support_packet
    rationale: Plain-text channels may have legacy no-hyphen spelling, but product UI and docs use Read-only degraded.
    review_requirement: New labels use Read-only degraded; existing logs may be mapped during import.
  - alias_id: alias.state.all_good
    canonical_term_id: state.ready
    alias_label: All good
    alias_status: forbidden
    allowed_surface_classes:
      - product_ui
      - command_palette
      - cli_summary
      - documentation
      - export
      - support_packet
    rationale: Decorative success copy hides scope and authority.
    review_requirement: Reject and replace with Ready only when current authority and declared scope are proven.
  - alias_id: alias.reason.try_later
    canonical_term_id: state.unavailable
    alias_label: Try later
    alias_status: forbidden
    allowed_surface_classes:
      - product_ui
      - button
      - cli_summary
      - documentation
      - support_packet
    rationale: Try later omits whether the cause is policy, trust, client scope, missing dependency, stale data, or outage.
    review_requirement: Reject and replace with a controlled state plus reason chip.
denial_rules:
  - Reject a command name that is not verb-first unless it is a reviewed platform noun phrase such as Project Doctor.
  - Reject a setting name that is an imperative or slogan instead of a noun phrase.
  - Reject a panel or view title that cannot map to a controlled term, product object, or workflow.
  - Reject any state label whose meaning differs between product UI, CLI summaries, documentation, exports, accessibility strings, telemetry dictionaries, or support packets.
  - Reject reason chips that omit policy, trust, permission, client scope, freshness, dependency, unsupported action, or local-only cause when that cause is known.
  - Reject Browser companion labels that imply full desktop capability or local runtime control.
  - Reject Local only labels when managed recall, sync, hosted evidence, or server retention participated.
  - Reject destructive buttons that rely on Yes, No, OK, Continue, or Apply without the destructive object.
