record_kind: controlled_glossary_record
label_term_schema_version: 1
glossary_id: copy.controlled_glossary.v1
sources:
  - docs/copy/naming_and_state_label_contract.md
  - docs/copy/count_scope_freshness_grammar.md
  - docs/commands/command_descriptor_contract.md
  - docs/companion/companion_surface_contract.md
  - schemas/copy/label_term.schema.json
governance:
  owner_roles:
    - Product copy owner
    - Design systems owner
    - Docs owner
    - Localization owner
    - Supportability owner
    - Owning schema or command registry owner
  change_review_rules:
    - Adding a canonical term requires display label, reserved meaning, allowed surfaces, forbidden uses, owner role, and a fixture or fixture update.
    - Repurposing a canonical term is breaking; add a new term and migration alias instead.
    - Any term used in product UI must define how CLI summaries, documentation, exports, accessibility strings, telemetry dictionaries, and support packets preserve the same meaning where those surfaces exist.
    - Destructive, policy, trust, client-scope, recovery, and degraded-state labels require product design and supportability review.
  alias_review_rules:
    - Aliases are typed records, not free-form synonyms.
    - A legacy command phrase may remain searchable only when it points to the canonical command descriptor and does not change the visible product label.
    - A deprecated alias must name the replacement label and the surfaces where the alias may still appear.
    - A forbidden alias is retained as a rejection test so reviewers can block decorative or ambiguous relabeling mechanically.
    - Trust and policy aliases must preserve the owning boundary and cannot soften Trust required, Restricted, or Policy blocked into generic unavailability.
    - Recovery aliases must preserve recovery class, scope, and whether rollback is exact, partial, or compensating.
    - Evidence aliases must preserve freshness posture, captured time or retest need, and refresh route.
    - Support-class aliases must preserve claim strength; Certified, Supported, Limited, Community, and Experimental cannot be replaced with warmer labels.
    - Client-scope aliases must preserve the qualified client and cannot imply desktop parity, managed participation, or local-only posture that the evidence does not prove.
    - Degraded-state aliases must name the remaining capability and cannot collapse Read-only degraded, Degraded, Unavailable, and Policy blocked into one label.
  localization_rules:
    - Localized labels preserve the reserved meaning even when grammar order changes.
    - Command IDs, schema keys, keyboard tokens, protocol names, and raw technical identifiers are not translated.
    - Policy, trust, recovery, support-class, client-scope, and degraded-state labels may not be softened for tone.
  parity_rules:
    - The same state label has the same meaning across product UI, CLI summaries, documentation, exports, accessibility strings, telemetry dictionaries, and support packets.
    - A surface may shorten a label only when the accessible name or adjacent detail preserves the full controlled meaning.
    - A reason chip may narrow a state label, but it may not replace the state label or reuse it with a different meaning.
label_rules:
  - rule_id: label.rule.glossary_term.sentence_case_default
    label_class: glossary_term
    rule_summary: Product labels, buttons, settings, panel headings, view headings, state chips, reason chips, and support terms default to sentence case.
    required_slots:
      - Source-language phrase.
      - Canonical casing exception when a proper noun, command ID, schema key, keyboard token, or protocol name must preserve casing.
      - Surface class.
    allowed_patterns:
      - Browser companion
      - Read-only degraded
      - Rollback available
      - Open in desktop
    rejection_tests:
      - Reject all caps except protocol identifiers or standard abbreviations.
      - Reject title case introduced only for emphasis.
      - Reject casing differences that create separate aliases without review.
  - rule_id: label.rule.command_name.verb_first
    label_class: command_name
    rule_summary: Command labels start with an outcome verb and name the acted-on object or scope when the action is consequential.
    required_slots:
      - Verb.
      - Object or destination.
      - Scope or risk class when the command mutates, publishes, deletes, grants, or exports.
      - Command descriptor or alias reference.
    allowed_patterns:
      - Open folder
      - Rebuild workspace index
      - Export support bundle
      - Open in desktop
    rejection_tests:
      - Reject labels that hide the action behind Continue, OK, or Apply on consequential paths.
      - Reject decorative verbs or slogans that cannot map to one command descriptor.
      - Reject surface-local command names that mean something different from the CLI verb or docs label.
  - rule_id: label.rule.setting_name.noun_phrase
    label_class: setting_name
    rule_summary: Settings use noun phrases that name the controlled value, source, or policy.
    required_slots:
      - Controlled value or policy.
      - Scope when the setting is workspace, profile, org, or device scoped.
    allowed_patterns:
      - Workspace trust
      - Proxy source
      - Telemetry retention
      - Command palette history
    rejection_tests:
      - Reject imperative setting names such as Turn on better sync.
      - Reject vague adjectives such as Advanced, Better, or Smart without the controlled value.
  - rule_id: label.rule.panel_view.stable_noun
    label_class: panel_title
    rule_summary: Panel and view titles are stable landmarks that name the object, workflow, or inspector.
    required_slots:
      - Product object, workflow, or inspector name.
      - Controlled term reference when the title uses a governed concept.
    allowed_patterns:
      - Project Doctor
      - Execution context
      - Support bundle preview
      - Browser companion
    rejection_tests:
      - Reject local nicknames that cannot map to a controlled term.
      - Reject promotional or decorative titles that obscure the surface purpose.
  - rule_id: label.rule.view_title.stable_noun
    label_class: view_title
    rule_summary: View titles are stable landmarks that name the current object, route, or workflow state.
    required_slots:
      - Current object, route, or workflow.
      - Controlled term reference when the title uses a governed state or scope.
    allowed_patterns:
      - Policy history
      - Support bundle preview
      - Execution context
      - Browser companion
    rejection_tests:
      - Reject view titles that duplicate a panel title with a different meaning.
      - Reject decorative titles that cannot survive docs, screenshots, accessibility landmarks, and support packets.
  - rule_id: label.rule.state_label.reserved_meaning
    label_class: state_label
    rule_summary: State labels come from the controlled glossary and keep one reserved meaning across all surfaces.
    required_slots:
      - Canonical term id.
      - Reserved meaning.
      - Surface equivalence key.
      - Recovery or detail route when the state narrows capability.
    allowed_patterns:
      - Ready
      - Stale
      - Read-only degraded
      - Policy blocked
    rejection_tests:
      - Reject reuse of a state word for a second meaning without alias review.
      - Reject Ready for cached, stale, partial, or policy-blocked state.
      - Reject Degraded for a hard denial where no capability remains.
  - rule_id: label.rule.reason_chip.boundary_named
    label_class: reason_chip
    rule_summary: Reason chips name the boundary or owner that explains why a state or action is narrowed.
    required_slots:
      - Cause family.
      - Owner or boundary source when known.
      - Next safe action or detail route when available.
    allowed_patterns:
      - Policy blocked
      - Trust required
      - Desktop required
      - Stale snapshot
    rejection_tests:
      - Reject vague chips such as Oops, Try later, Limited, or Blocked without owner.
      - Reject reason chips that replace the required state label.
  - rule_id: label.rule.client_scope.closed_set
    label_class: client_scope_label
    rule_summary: Client-scope labels use the closed glossary and remain separate from lifecycle, support class, commercial entitlement, and trust.
    required_slots:
      - Canonical client-scope term.
      - Qualified surface or workflow.
      - Handoff or unsupported-action path when capability narrows.
    allowed_patterns:
      - Desktop
      - Browser companion
      - Desktop + browser companion
      - Headless only
      - Local only
    rejection_tests:
      - Reject labels that make Browser companion sound like full desktop parity.
      - Reject Local only when managed recall, sync, or hosted evidence participated.
      - Reject lifecycle or commercial labels used as client-scope labels.
  - rule_id: label.rule.button_label.outcome_specific
    label_class: button_label
    rule_summary: Button labels name the concrete outcome, with destructive outcomes visibly distinct from safe alternatives.
    required_slots:
      - Verb.
      - Object or safe destination.
      - Destructive, recovery, or review posture when consequential.
    allowed_patterns:
      - Delete worksets
      - Revoke token
      - Continue read-only
      - Export before delete
    rejection_tests:
      - Reject Yes, No, OK, Continue, or Apply as the only labels for consequential choices.
      - Reject destructive labels that omit the object being destroyed.
controlled_terms:
  - term_id: state.ready
    display_label: Ready
    label_class: state_label
    term_domain: state
    status: canonical
    canonical_term_id: null
    definition: The declared object is usable for the declared scope with current authority.
    reserved_meaning: Current, sufficiently proven, and usable for the declared scope.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Declared object or workflow.
      - Scope and authority basis.
    forbidden_uses:
      - Do not use for cached, stale, partial, blocked, or degraded state.
      - Do not use as a generic success word after partial completion.
    owner_role: Design systems owner
    surface_equivalence_key: meaning.state.ready
  - term_id: state.warming
    display_label: Warming
    label_class: state_label
    term_domain: state
    status: canonical
    canonical_term_id: null
    definition: Background preparation is still in progress and a narrower subset may already be usable.
    reserved_meaning: Preparation has not completed; narrower capability may be usable.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Named producer or subsystem warming.
      - Currently usable subset.
    forbidden_uses:
      - Do not use as a failure word.
      - Do not imply full readiness.
    owner_role: Design systems owner
    surface_equivalence_key: meaning.state.warming
  - term_id: state.partial
    display_label: Partial
    label_class: state_label
    term_domain: state
    status: canonical
    canonical_term_id: null
    definition: Some requested data, scope, or capability is missing, blocked, unloaded, or still computing.
    reserved_meaning: The result is incomplete for the declared request or scope.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Covered scope.
      - Missing, blocked, or not-yet-loaded scope.
    forbidden_uses:
      - Do not use for hard denial where no useful capability remains.
      - Do not export partial state as exact current truth.
    owner_role: Product copy owner
    surface_equivalence_key: meaning.state.partial
  - term_id: state.stale
    display_label: Stale
    label_class: state_label
    term_domain: state
    status: canonical
    canonical_term_id: null
    definition: Previous data is shown after its freshness floor or causal continuity was lost.
    reserved_meaning: Prior known data is visible but is no longer current enough for current-state claims.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Last-known-good or captured time when available.
      - Refresh, requery, or inspect route.
    forbidden_uses:
      - Do not use to mean old, unpopular, unused, or deprecated.
      - Do not allow exact current-state mutations from stale copy alone.
    owner_role: Product copy owner
    surface_equivalence_key: meaning.state.stale
  - term_id: state.rebuilding
    display_label: Rebuilding
    label_class: state_label
    term_domain: recovery
    status: canonical
    canonical_term_id: null
    definition: Disposable derived state is being recreated while user-authored state remains protected.
    reserved_meaning: A rebuild of derived or cached state is in progress.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Derived state or cache being rebuilt.
      - What remains usable while rebuilding.
    forbidden_uses:
      - Do not use for destructive reset of user-authored state.
      - Do not use when no rebuild has started.
    owner_role: Supportability owner
    surface_equivalence_key: meaning.state.rebuilding
  - term_id: state.restricted
    display_label: Restricted
    label_class: state_label
    term_domain: trust
    status: canonical
    canonical_term_id: null
    definition: Trust, permission, or policy narrows capability while some inspection or local work remains possible.
    reserved_meaning: Capability exists but is narrowed by a named safety boundary.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Restricting boundary.
      - What remains available.
    forbidden_uses:
      - Do not use when the action is fully unavailable.
      - Do not hide policy owner or trust source when known.
    owner_role: Supportability owner
    surface_equivalence_key: meaning.state.restricted
  - term_id: state.policy_blocked
    display_label: Policy blocked
    label_class: state_label
    term_domain: policy
    status: canonical
    canonical_term_id: null
    definition: A policy authority denies the action or state transition.
    reserved_meaning: The block is policy-owned and not a generic failure.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Policy or authority source where safe.
      - Allowed next action or handoff path.
    forbidden_uses:
      - Do not use for missing dependencies, network outage, or unimplemented features.
      - Do not soften into unavailable when policy ownership matters.
    owner_role: Owning schema or command registry owner
    surface_equivalence_key: meaning.state.policy_blocked
  - term_id: state.reconnecting
    display_label: Reconnecting
    label_class: state_label
    term_domain: degraded_state
    status: canonical
    canonical_term_id: null
    definition: A previously live connection is trying to restore continuity.
    reserved_meaning: Recovery attempt in progress after connection continuity was lost.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Connection or route being restored.
      - Local or cached capability still available.
    forbidden_uses:
      - Do not use before a prior live connection existed.
      - Do not use when no retry is active.
    owner_role: Supportability owner
    surface_equivalence_key: meaning.state.reconnecting
  - term_id: state.degraded
    display_label: Degraded
    label_class: state_label
    term_domain: degraded_state
    status: canonical
    canonical_term_id: null
    definition: Partial capability remains; the degraded subset and recovery path must be visible.
    reserved_meaning: The surface still works in a narrowed way.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Affected subsystem or workflow.
      - Remaining capability.
      - Recovery or inspection route.
    forbidden_uses:
      - Do not use for hard policy denial or unsupported action where no capability remains.
      - Do not use without naming the narrowed capability in adjacent detail.
    owner_role: Design systems owner
    surface_equivalence_key: meaning.state.degraded
  - term_id: state.read_only_degraded
    display_label: Read-only degraded
    label_class: state_label
    term_domain: degraded_state
    status: canonical
    canonical_term_id: null
    definition: Inspection remains available but mutation or execution is unavailable because capability narrowed.
    reserved_meaning: The remaining capability is inspect-only.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Object or workflow still inspectable.
      - Mutation or execution capability unavailable.
      - Recovery or desktop handoff path when applicable.
    forbidden_uses:
      - Do not use when inspection is also unavailable.
      - Do not use as a synonym for disabled.
    owner_role: Product copy owner
    surface_equivalence_key: meaning.state.read_only_degraded
  - term_id: state.unavailable
    display_label: Unavailable
    label_class: state_label
    term_domain: state
    status: canonical
    canonical_term_id: null
    definition: The surface cannot provide the requested capability in the current context.
    reserved_meaning: Requested capability cannot be provided now.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Requested capability.
      - Cause or reason chip when known.
      - Retry, repair, or handoff path when available.
    forbidden_uses:
      - Do not use when read-only or degraded capability remains.
      - Do not use to hide policy, trust, or client-scope reasons.
    owner_role: Product copy owner
    surface_equivalence_key: meaning.state.unavailable
  - term_id: recovery.rollback_available
    display_label: Rollback available
    label_class: state_label
    term_domain: recovery
    status: canonical
    canonical_term_id: null
    definition: A reviewed recovery path exists for returning to a prior state.
    reserved_meaning: Rollback exists and can be inspected or invoked under the declared recovery class.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Rollback target or recovery class.
      - Scope and expected effect.
    forbidden_uses:
      - Do not use when only an unverified manual workaround exists.
      - Do not imply exact undo if the rollback is partial or compensating.
    owner_role: Supportability owner
    surface_equivalence_key: meaning.recovery.rollback_available
  - term_id: reason.trust_required
    display_label: Trust required
    label_class: reason_chip
    term_domain: trust
    status: canonical
    canonical_term_id: null
    definition: The action or surface is narrowed until workspace, profile, or object trust is granted.
    reserved_meaning: Trust boundary is the cause.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Trust boundary.
      - Safe inspect or restricted-mode path.
    forbidden_uses:
      - Do not use for policy denial.
      - Do not use without a path to inspect the trust source.
    owner_role: Supportability owner
    surface_equivalence_key: meaning.reason.trust_required
  - term_id: reason.permission_required
    display_label: Permission required
    label_class: reason_chip
    term_domain: trust
    status: canonical
    canonical_term_id: null
    definition: The user, org, or runtime must grant a specific permission before the action can continue.
    reserved_meaning: Permission grant is missing.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Permission class.
      - Grant, request, or handoff route.
    forbidden_uses:
      - Do not use for unsupported features.
      - Do not hide admin policy denial under permission wording.
    owner_role: Owning schema or command registry owner
    surface_equivalence_key: meaning.reason.permission_required
  - term_id: reason.desktop_required
    display_label: Desktop required
    label_class: reason_chip
    term_domain: client_scope
    status: canonical
    canonical_term_id: null
    definition: The current browser, companion, or headless surface cannot perform the action; the desktop client is required.
    reserved_meaning: Client scope is the cause of the blocked or narrowed action.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Blocked action.
      - Preserved context or handoff route.
    forbidden_uses:
      - Do not use for general unsupported state unrelated to client scope.
      - Do not imply the companion has full desktop parity.
    owner_role: Product copy owner
    surface_equivalence_key: meaning.reason.desktop_required
  - term_id: reason.client_scope_excludes_surface
    display_label: Client scope excludes surface
    label_class: reason_chip
    term_domain: client_scope
    status: canonical
    canonical_term_id: null
    definition: The workflow is qualified for a different client scope than the active surface.
    reserved_meaning: The active client is outside the workflow scope.
    allowed_surface_classes:
      - product_ui
      - command_palette
      - menu
      - button
      - panel
      - settings
      - cli_help
      - cli_summary
      - documentation
      - export
      - support_packet
      - accessibility
      - telemetry_dictionary
      - automation_recipe
      - browser_companion_handoff
    required_context:
      - Current client scope.
      - Qualified client scope.
    forbidden_uses:
      - Do not use when policy or trust is the actual cause.
      - Do not hide a missing implementation as scope exclusion.
    owner_role: Product copy owner
    surface_equivalence_key: meaning.reason.client_scope_excludes_surface
  - term_id: reason.unsupported_action
    display_label: Unsupported action
    label_class: reason_chip
    term_domain: reason
    status: canonical
