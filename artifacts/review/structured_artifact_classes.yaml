    review_surface_class: sidecar_bind_viewer
    merge_posture_class: no_auto_merge
    posture_reason_class: generated_from_canonical_source
    canonical_source_rule_class: derived_from_canonical_source
    paired_text_representation:
      pair_state: none
      canonical_direction_ref: null
      round_trip_corpus_ref: null
    unknown_metadata_survival_class: not_applicable
    trust_sandbox_constraints:
      - no_additional_trust_constraints
    notebook_review_presets:
      metadata_filter_preset: not_applicable
      output_handling_preset: not_applicable
      cell_id_stability_required: false
    generated_source_backlink:
      backlink_state: required_link_to_debug_artifact_manifest
    git_merge_driver_admission_class: forbidden_compare_only_surface
    conformance_corpus_ref: null
    summary: >
      Source maps and debug sidecars render a compare viewer bound to a
      debug_artifact_entry_record; review surfaces cite the debug-artifact
      manifest rather than claiming independent mapping truth.

  - review_surface_id: review.surface.image_or_design_snapshot
    review_artifact_class: image_or_design_snapshot
    review_surface_class: perceptual_or_side_by_side_viewer
    merge_posture_class: no_auto_merge
    posture_reason_class: binary_or_opaque_payload
    canonical_source_rule_class: single_canonical_source
    paired_text_representation:
      pair_state: none
      canonical_direction_ref: null
      round_trip_corpus_ref: null
    unknown_metadata_survival_class: not_applicable
    trust_sandbox_constraints:
      - binary_preview_sandboxed
    notebook_review_presets:
      metadata_filter_preset: not_applicable
      output_handling_preset: not_applicable
      cell_id_stability_required: false
    generated_source_backlink:
      backlink_state: not_applicable
    git_merge_driver_admission_class: forbidden_compare_only_surface
    conformance_corpus_ref: null
    summary: >
      Images and design snapshots render on a perceptual or side-by-side
      viewer without rewriting binary bytes; merge is never silent.

  - review_surface_id: review.surface.evidence_packet
    review_artifact_class: evidence_packet
    review_surface_class: evidence_reader_viewer
    merge_posture_class: no_auto_merge
    posture_reason_class: evidence_immutability_required
    canonical_source_rule_class: not_applicable_mirror_or_evidence
    paired_text_representation:
