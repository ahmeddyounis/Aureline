    notebook_review_presets:
      metadata_filter_preset: not_applicable
      output_handling_preset: not_applicable
      cell_id_stability_required: false
    generated_source_backlink:
      backlink_state: not_applicable
    git_merge_driver_admission_class: forbidden_compare_only_surface
    conformance_corpus_ref: null
    summary: >
      Support bundles, release-evidence, AI-evidence, and contract-gate
      evidence packets open on an immutable read-only reader; edits,
      merges, and silent rewrites are forbidden by construction.

  - review_surface_id: review.surface.generated_source_artifact
    review_artifact_class: generated_source_artifact
    review_surface_class: structure_aware_compare_viewer
    merge_posture_class: regenerate_or_review
