      round_trip_corpus_ref: null
    unknown_metadata_survival_class: survival_recommended
    trust_sandbox_constraints:
      - no_additional_trust_constraints
    notebook_review_presets:
      metadata_filter_preset: not_applicable
      output_handling_preset: not_applicable
      cell_id_stability_required: false
    generated_source_backlink:
      backlink_state: not_applicable
    git_merge_driver_admission_class: forbidden_until_round_trip_proven
    conformance_corpus_ref: null
    summary: >
      Lockfiles render on a package-centric compare with transitive impact
      hints; conflicts route to regenerate-from-manifest or to explicit
      review, never to byte-level auto-merge.

  - review_surface_id: review.surface.coverage_profile_artifact
    review_artifact_class: coverage_profile_artifact
    review_surface_class: sidecar_bind_viewer
    merge_posture_class: compare_only
    posture_reason_class: sidecar_requires_build_identity_match
    canonical_source_rule_class: derived_from_canonical_source
    paired_text_representation:
