      output_handling_preset: not_applicable
      cell_id_stability_required: false
    generated_source_backlink:
      backlink_state: required_link_to_safe_edit_posture_record
    git_merge_driver_admission_class: forbidden_until_round_trip_proven
    conformance_corpus_ref: null
    summary: >
      Generated source opens on a structure-aware compare whose posture
      is projected from the artifact_edit_posture_record; conflicts route
      to regenerate-from-canonical-source rather than silent auto-merge.

# ---------------------------------------------------------------------
# Matrix-wide invariants. Reviewers read these when auditing the rows.
# ---------------------------------------------------------------------

matrix_invariants:
  - id: inv.review.exactly_one_row_per_class
    statement: >
      Exactly one review_row is declared per review_artifact_class. Adding
      a new class is additive-minor; repurposing an existing class is
      breaking.

  - id: inv.review.single_visible_reason_per_row
    statement: >
      Every review_row names exactly one posture_reason_class. Reviewers
      reading the row see one stable token explaining the merge posture
      rather than free-text justification.

  - id: inv.review.semantic_versus_regenerate_distinguishable
    statement: >
      semantic_merge_where_safe rows carry a posture_reason of
      schema_support_proven_with_unknown_field_survival,
      schema_support_partial_structure_aware_only, or
      cell_and_output_identity_at_risk. regenerate_or_review rows carry
      solver_meaning_may_change_under_normalization or
      generated_from_canonical_source. The two postures are never reached
      through the same reason code.

  - id: inv.review.notebook_preset_required_only_on_notebooks
    statement: >
      jupyter_notebook rows MUST set metadata_filter_preset and
      output_handling_preset to non-not_applicable values and MUST set
      cell_id_stability_required = true. Every other row MUST set both
      presets to not_applicable and cell_id_stability_required = false.

  - id: inv.review.generated_source_backlink_required_on_derived_classes
    statement: >
      generated_source_artifact rows MUST carry generated_source_backlink
      = required_link_to_safe_edit_posture_record.
      source_map_or_debug_sidecar rows MUST carry generated_source_backlink
      = required_link_to_debug_artifact_manifest. Every other row MUST
      carry generated_source_backlink = not_applicable.

  - id: inv.review.paired_representation_requires_canonical_direction
    statement: >
      Any row whose paired_text_representation.pair_state is
      paired_with_canonical_direction or export_only_no_round_trip MUST
      name a non-null canonical_direction_ref so round-trip write-back
      through the derived side is explicitly forbidden.

  - id: inv.review.git_merge_driver_admission_requires_corpus
    statement: >
      Any row whose git_merge_driver_admission_class is
      permitted_with_round_trip_corpus or permitted_where_semantics_defined
      MUST carry a non-null conformance_corpus_ref and a non-null
      paired_text_representation.round_trip_corpus_ref so a merge driver
      cannot register without corpus-backed round-trip evidence.

  - id: inv.review.compare_only_classes_forbid_merge_driver
    statement: >
      Every row whose merge_posture_class is compare_only or no_auto_merge
      MUST declare git_merge_driver_admission_class =
      forbidden_compare_only_surface or forbidden_until_round_trip_proven.
      A compare-only surface never acquires a merge driver by implication.

  - id: inv.review.evidence_immutable_by_construction
    statement: >
      evidence_packet rows declare merge_posture_class = no_auto_merge,
      review_surface_class = evidence_reader_viewer, and
      trust_sandbox_constraints includes evidence_read_only_redaction_applies.
      Support bundles, release-evidence packets, AI-evidence packets, and
      contract-gate evidence packets cannot be silently rewritten by any
      review surface.

  - id: inv.review.unknown_metadata_survival_declared
    statement: >
      Every row declares unknown_metadata_survival_class. required_survival
      is mandatory on jupyter_notebook, every structured_config_*, and
      sbom_or_generated_metadata. survival_recommended is mandatory on
      lockfile_or_dependency_manifest and generated_source_artifact.
      not_applicable is admissible only on binary, sidecar, or evidence
      rows.

  - id: inv.review.trust_sandbox_constraints_declared
    statement: >
      Every row declares a non-empty trust_sandbox_constraints list drawn
      from the closed vocabulary. jupyter_notebook rows MUST include
      notebook_active_outputs_sandboxed. image_or_design_snapshot and
      coverage_profile_artifact rows MUST include binary_preview_sandboxed.
      evidence_packet rows MUST include evidence_read_only_redaction_applies.

  - id: inv.review.milestone_slugs_forbidden
    statement: >
      Milestone slugs never appear in id, path, description, or summary
      fields. Planning metadata stays in the planning tree.
