  - review_surface_id: review.surface.sbom_or_generated_metadata
    review_artifact_class: sbom_or_generated_metadata
    review_surface_class: structure_aware_compare_viewer
    merge_posture_class: compare_only
    posture_reason_class: round_trip_unproven_for_bytes
    canonical_source_rule_class: derived_from_canonical_source
    paired_text_representation:
      pair_state: none
      canonical_direction_ref: null
      round_trip_corpus_ref: null
    unknown_metadata_survival_class: required_survival
    trust_sandbox_constraints:
      - untrusted_rich_content_sanitized
    notebook_review_presets:
      metadata_filter_preset: not_applicable
      output_handling_preset: not_applicable
      cell_id_stability_required: false
    generated_source_backlink:
      backlink_state: not_applicable
    git_merge_driver_admission_class: forbidden_until_round_trip_proven
    conformance_corpus_ref: null
    summary: >
      SBOMs and generated metadata render on a structure-aware compare
