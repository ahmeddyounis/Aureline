  - record_kind: cli_output_registry_entry_record
    cli_output_registry_schema_version: 1
    registry_entry_id: cli-output-registry:support.export_bundle
    title: Export support bundle from CLI
    summary: >-
      Diagnostic / support export CLI entry. Produces a support-packet-
      index-bound JSON document on --out-file, and an SPDX SBOM export
      adapter on demand. stdout carries human-readable progress only;
      the machine payload never shares stdout with progress.
    command_id: cmd:support.export_bundle
    command_revision_ref: cmd-rev:support.export_bundle:2026.04.21-01
    canonical_verb: support.export_bundle
    cli_surface_class: doctor_or_diagnostic_export
    command_family_class: diagnostics_support_export
    capability_scope_class: read_only_no_side_effects
    authority_class: policy_admission_required
    policy_context_class: admin_policy_observed
    redaction_class: redaction_required_with_secret_broker_handles
    machine_output_stability_class: stable_schema_governed
    human_output_posture_class: human_tty_not_stable
    machine_output_envelope_class: json_document_single
    stream_ownership_class: file_out_owns_machine_output_stdout_reserved_for_human
    locale_posture_class: machine_output_locale_fixed_en_us
    nondeterminism_disclosure_class: nondeterministic_env_sampling_declared
    output_schema_binding:
      binding_kind: primary_machine_output_schema
      schema_ref: schemas/support/support_packet_index.schema.json
      schema_version_slot: support_packet_index_schema_version
      notes_ref: note:support.export_bundle:primary_schema
    exit_code_register:
      - class: success
        numeric_code: 0
        meaning_ref: >-
          Support bundle assembled; machine payload cites the packet
          families, redaction profile, and exact-build identity.
      - class: partial_success_with_warnings
        numeric_code: 3
        meaning_ref: >-
          Support bundle assembled, but one or more optional packets
          (e.g. crash_artifact_snapshot) were unavailable; the
          warnings payload lists the missing packets and repair hooks.
        warnings_payload_schema_ref: schemas/support/support_packet_index.schema.json
      - class: usage_error
        numeric_code: 2
        meaning_ref: Invalid argv or unknown --scope value.
      - class: policy_or_trust_denied
        numeric_code: 13
        meaning_ref: >-
          Admin policy denied the export (for example, redaction
          profile is unavailable on a restricted-trust workspace).
      - class: dependency_missing_or_stale
        numeric_code: 78
        meaning_ref: >-
          Required support subsystem (e.g. debug_artifact manifest,
          object handoff packet) is missing or stale; the payload
          names the missing dependency ref.
      - class: cancelled_by_user
        numeric_code: 130
        meaning_ref: User cancelled the export mid-run.
      - class: unrecoverable_internal_error
        numeric_code: 70
        meaning_ref: Internal error; consult the payload's escalation anchor.
    dry_run_support_class: dry_run_not_applicable_read_only
    explain_support_class: explain_supported
    adapter_rows:
