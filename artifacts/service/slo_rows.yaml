      continue to accumulate locally and export on recovery.
    local_core_blocking: false
    linked_record_class_ids:
      - entitlement_usage_export_packet
    linked_drill_refs: []

  - service_id: managed_offboarding_export
    title: Managed offboarding and access-end export surface
    description: >
      Optional hosted surface that assembles the offboarding exit
      packet, the associated destruction receipt ledger, and the
      access-end claims. Never a prerequisite for local-core
      operation; its absence narrows offboarding claims, not local
      work.
    owner_dri: "@ahmeddyounis"
    owning_lane: governance_packets
    scope:
      control_plane_service_class: auth_identity_service
      identity_modes_in_scope:
        - self_hosted_org
        - managed_convenience
      deployment_profiles_in_scope:
        - self_hosted
        - enterprise_online
        - managed_cloud
    service_opt_in_posture: on_when_entitled
    availability_slo: reachability_target_99_5
    freshness_slo: fresh_required
    degradation_modes:
      - healthy
      - degraded_slow
      - unavailable_retry_later
      - unavailable_policy_blocked
      - boundary_recheck_required
    recovery_cues:
      - mode: healthy
        cue: Offboarding export is live; exit packet and destruction receipts are being assembled.
      - mode: degraded_slow
        cue: Offboarding export is slow; the user or admin sees assembled partial progress.
      - mode: unavailable_retry_later
        cue: Offboarding export is unreachable; already-assembled artifacts remain available and the remaining work queues for retry.
      - mode: unavailable_policy_blocked
        cue: Offboarding export is blocked by policy; the policy explain surface names the narrowing reason.
      - mode: boundary_recheck_required
        cue: Region or tenant posture changed; export holds until the boundary recheck completes.
    last_known_good_fallback_note: >
      Local copies of the offboarding exit packet and destruction
      receipts remain available under the corresponding record
      classes. Managed-only surfaces narrow to cached exit-packet
      truth with a freshness label.
    local_core_blocking: false
    linked_record_class_ids:
      - offboarding_exit_packet
      - destruction_receipt_record
      - entitlement_usage_export_packet
    linked_drill_refs: []
