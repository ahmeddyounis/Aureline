      user-owned; this surface never reaches into local storage.
    owner_dri: "@ahmeddyounis"
    owning_lane: support_export
    scope:
      control_plane_service_class: telemetry_sink_service
      identity_modes_in_scope:
        - self_hosted_org
        - managed_convenience
      deployment_profiles_in_scope:
        - self_hosted
        - enterprise_online
        - managed_cloud
    service_opt_in_posture: on_with_per_surface_consent
    availability_slo: reachability_target_99_5
    freshness_slo: fresh_required
    degradation_modes:
      - healthy
      - degraded_slow
      - unavailable_retry_later
      - unavailable_policy_blocked
    recovery_cues:
      - mode: healthy
        cue: Support export is accepting uploads; case attachment is live.
      - mode: degraded_slow
        cue: Support export is slow; uploads queue locally with a progress label.
      - mode: unavailable_retry_later
        cue: Support export is unreachable; bundles remain local and can be attached later.
      - mode: unavailable_policy_blocked
        cue: Support export is blocked by workspace or org policy; the policy explain surface names the narrowing reason.
    last_known_good_fallback_note: >
      Local support bundle remains available. Upload is queued under
      the support_bundle_archive record class with the export-pending
      hold class applied as needed.
    local_core_blocking: false
    linked_record_class_ids:
      - support_bundle_archive
      - crash_diagnostic_payload
      - operator_truth_packet
    linked_drill_refs: []

  - service_id: managed_entitlement_usage
    title: Managed entitlement and usage export surface
    description: >
      Optional hosted surface that produces entitlement snapshots and
      usage export packets for signed-in users and admins. Local
      entitlement cache and usage counters remain authoritative for
      local work.
    owner_dri: "@ahmeddyounis"
    owning_lane: governance_packets
    scope:
      control_plane_service_class: auth_identity_service
      identity_modes_in_scope:
        - self_hosted_org
        - managed_convenience
      deployment_profiles_in_scope:
        - self_hosted
        - enterprise_online
        - managed_cloud
    service_opt_in_posture: off_until_account_created
    availability_slo: reachability_target_99_5
    freshness_slo: bounded_stale_labeled
    degradation_modes:
      - healthy
      - degraded_stale_cache
      - unavailable_retry_later
      - unavailable_entitlement_expired
      - unavailable_policy_blocked
    recovery_cues:
      - mode: healthy
        cue: Entitlement and usage export are live.
      - mode: degraded_stale_cache
        cue: Cached entitlement snapshot applies; the staleness label is surfaced on the entitlement strip.
      - mode: unavailable_retry_later
        cue: Entitlement service is unreachable; the snapshot cache continues to apply inside its freshness floor.
      - mode: unavailable_entitlement_expired
        cue: Entitlement lapsed; managed features narrow and the user or admin is pointed at renewal.
      - mode: unavailable_policy_blocked
        cue: Entitlement export is blocked by policy; the policy explain surface names the narrowing reason.
    last_known_good_fallback_note: >
      Local entitlement snapshot remains authoritative for local
