# Optional-service HTTP API capability surfaces.
#
# Machine-readable companion to docs/service/api_inventory_seed.md and the
# OpenAPI seed in openapi/service_api_seed.yaml. Each row below names one
# optional service-HTTP capability (a family of endpoints hosted on one
# managed-service surface) and binds it to an auth mode, a data class set,
# a local-fallback posture, a versioning rule, a deprecation lane, an
# offline / cache posture, and the governing SLO + retention rows.
#
# Conformance: every row is a managed_service_api_capability_row; the row
# shape is frozen by schemas/service/api_capability_row.schema.json.
#
# Rules:
#   - Every row MUST name api_surface_id, api_surface_title, summary,
#     service_id, api_family_class, maturity_lane, ownership, auth,
#     data_classes, local_fallback_posture, local_core_blocking,
#     versioning, deprecation_lane, offline_and_cache_posture,
#     compat_binding, linked_record_class_ids, linked_slo_row_ref, and
#     linked_retention_row_refs.
#   - local_core_blocking MUST be false on every row in this file.
#     Reviewers block any change that flips a row to true.
#   - Every service_id MUST resolve to a row in
#     artifacts/service/slo_rows.yaml; the api surface inherits its
#     availability, freshness, degradation, and recovery-cue contract
#     from that SLO row.
#   - Every linked_record_class_id MUST appear in the linked SLO row's
#     linked_record_class_ids field and have a matching row in
#     artifacts/service/retention_rows.yaml.
#   - maturity_lane MUST be experimental or internal at seed time.
#     Promotion to beta or stable requires a decision row in
#     artifacts/governance/decision_index.yaml plus a non-null
#     openapi_document_ref.
#   - schema_discovery_posture MUST NOT be
#     live_discovery_against_service. The desktop core never depends on
#     discovering the service schema at runtime.
#   - Adding an api_surface_id, api_family_class, auth_mode,
#     entitlement_class, policy_override_posture, data_class,
#     local_fallback_posture, versioning_rule_class,
#     url_version_segment_policy, unknown_field_policy,
#     deprecation_lane_class, sunset_posture, client_signal_header,
#     offline_behavior_class, client_cache_policy_class,
#     last_known_good_posture, or schema_discovery_posture value is
#     additive-minor and bumps schema_version. Repurposing an existing
#     value is breaking.
#   - Milestone slugs MUST NOT appear in any id, path, description, or
#     note field.

schema_version: 1
status: seeded

seed_doc: docs/service/api_inventory_seed.md
row_schema_ref: schemas/service/api_capability_row.schema.json
openapi_seed_ref: openapi/service_api_seed.yaml
slo_rows_ref: artifacts/service/slo_rows.yaml
retention_rows_ref: artifacts/service/retention_rows.yaml
record_class_registry_ref: artifacts/governance/record_class_registry.yaml
stable_surface_inventory_ref: artifacts/governance/stable_surface_inventory.yaml
contract_packet_template_ref: docs/governance/contract_packet_template.md
schema_families_ref: artifacts/governance/schema_families.yaml
standards_matrix_openapi_ref: artifacts/governance/standards_matrix.yaml#standard.openapi_3_2
managed_service_seed_ref: docs/service/managed_service_seed.md

