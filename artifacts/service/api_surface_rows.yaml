# -----------------------------------------------------------------------------
# Rows.
# One row per optional service-HTTP capability surface.
# -----------------------------------------------------------------------------

rows:
  - schema_version: 1
    row_kind: managed_service_api_capability_row
    api_surface_id: managed_marketplace.extension_catalog_read
    api_surface_title: Extension catalog read surface
    summary: >
      Read-side of the hosted extension catalog (search, topic listing,
      and manifest fetch by stable publisher or extension id). Install
      orchestration is a separate surface; browsing is read-only and is
      reachable without an account.
    service_id: managed_marketplace
    api_family_class: registry_api_family
    maturity_lane: experimental
    ownership:
      owner_dri: "@ahmeddyounis"
      owning_lane: governance_packets
      backup_owner: null
      backup_waiver: single-maintainer-backup
    auth:
      auth_mode: open_no_auth
      entitlement_class: no_entitlement_required
      policy_override_posture: narrow_only_with_emergency_disable
    data_classes:
      - public_catalog_metadata
    local_fallback_posture: signed_mirror_snapshot_resolves
    local_core_blocking: false
    versioning:
      versioning_rule_class: url_major_version_plus_additive_minor_fields
      current_major_version_tag: v1
      url_version_segment_policy: required_leading_v_segment
      unknown_field_policy: request_rejects_unknown_response_tolerates_unknown
      additive_minor_rule_summary: >
        Additive fields on response manifests and additive query
        parameters are in-epoch; publisher and extension id stability is
        preserved across every v1.x revision.
      breaking_rule_summary: >
        Removing or repurposing a response field, changing an id shape,
        or removing a stable query parameter requires a new major-version
        tag and a sunset-overlap window with the prior major.
    deprecation_lane:
      lane_class: pre_release_no_deprecation_yet
      sunset_posture: no_sunset_yet
      client_signal_headers:
        - aureline_api_version_header
        - aureline_api_freshness_floor_header
      notice_window_summary: >
        No major-version sunset is active yet. When a second major
        lands, the standard twelve-month overlap window applies and
        clients honor the Deprecation and Sunset response headers.
    offline_and_cache_posture:
      offline_behavior_class: bundled_mirror_snapshot_resolves
      client_cache_policy_class: cache_bounded_by_service_freshness_floor
      last_known_good_posture: last_known_good_catalog_mirror_snapshot
      schema_discovery_posture: embedded_openapi_pinned_to_release
      freshness_floor_summary: >
        Catalog results inside the signed mirror snapshot's freshness
        floor resolve without a live fetch; stale results are labeled.
    compat_binding:
      contract_packet_ref: artifacts/governance/stable_surface_inventory.yaml#managed_service_api.managed_marketplace.extension_catalog_read
      stable_surface_inventory_ref: artifacts/governance/stable_surface_inventory.yaml
      compatibility_window_source_ref: artifacts/compat/qualification_matrix_seed.yaml
    linked_record_class_ids: []
    linked_slo_row_ref: artifacts/service/slo_rows.yaml#service.managed_marketplace
    linked_retention_row_refs: []
    openapi_document_ref: openapi/service_api_seed.yaml
    notes: >
      Already-installed extensions run from local disk; this surface
      only narrows the browse-new claim when unreachable.

  - schema_version: 1
    row_kind: managed_service_api_capability_row
    api_surface_id: managed_marketplace.extension_install_request
    api_surface_title: Extension install-request surface
    summary: >
      Write-side of the hosted extension surface. Accepts install
      requests from signed-in users or admins, validates workspace-
      trust posture, and emits an install manifest the client applies
      against its local extension host. Never silently auto-enables.
    service_id: managed_marketplace
    api_family_class: registry_api_family
    maturity_lane: experimental
    ownership:
      owner_dri: "@ahmeddyounis"
      owning_lane: governance_packets
      backup_owner: null
      backup_waiver: single-maintainer-backup
    auth:
      auth_mode: oidc_session_token
      entitlement_class: account_required
      policy_override_posture: narrow_only_with_emergency_disable
    data_classes:
      - public_catalog_metadata
      - identity_principal_metadata
    local_fallback_posture: read_only_degraded_claim_rendered
    local_core_blocking: false
    versioning:
      versioning_rule_class: url_major_version_plus_additive_minor_fields
      current_major_version_tag: v1
      url_version_segment_policy: required_leading_v_segment
      unknown_field_policy: request_rejects_unknown_response_tolerates_unknown
      additive_minor_rule_summary: >
        Additive request fields, additive response fields, and additive
        stable error codes are in-epoch.
      breaking_rule_summary: >
        Removing a request or response field, or collapsing an error
        code, requires a new major-version tag and a sunset-overlap
        window with the prior major.
    deprecation_lane:
      lane_class: pre_release_no_deprecation_yet
      sunset_posture: no_sunset_yet
      client_signal_headers:
        - deprecation_header
        - sunset_header
        - aureline_api_version_header
      notice_window_summary: >
        Install-request removal requires a twelve-month overlap with
        the prior major and an explicit advisory row.
    offline_and_cache_posture:
      offline_behavior_class: read_only_when_reachable_and_narrows_on_unreachable
      client_cache_policy_class: no_cache_ephemeral_session_only
      last_known_good_posture: last_known_good_catalog_mirror_snapshot
      schema_discovery_posture: embedded_openapi_pinned_to_release
      freshness_floor_summary: >
        Install is an action; it is not satisfied from cache. Already-
        installed extensions continue to run when this surface is
        unreachable.
    compat_binding:
      contract_packet_ref: artifacts/governance/stable_surface_inventory.yaml#managed_service_api.managed_marketplace.extension_install_request
      stable_surface_inventory_ref: artifacts/governance/stable_surface_inventory.yaml
      compatibility_window_source_ref: artifacts/compat/qualification_matrix_seed.yaml
    linked_record_class_ids: []
    linked_slo_row_ref: artifacts/service/slo_rows.yaml#service.managed_marketplace
    linked_retention_row_refs: []
    openapi_document_ref: openapi/service_api_seed.yaml

  - schema_version: 1
    row_kind: managed_service_api_capability_row
    api_surface_id: managed_policy_distribution.policy_bundle_fetch
    api_surface_title: Signed policy-bundle distribution surface
    summary: >
      Fetches signed policy bundles for an organization or workspace.
      Clients pin to the bundle signature, not the transport; cached
      bundles remain authoritative within their freshness floor when
      the surface is unreachable.
    service_id: managed_policy_distribution
    api_family_class: policy_distribution_api_family
    maturity_lane: experimental
    ownership:
      owner_dri: "@ahmeddyounis"
      owning_lane: governance_packets
      backup_owner: null
      backup_waiver: single-maintainer-backup
    auth:
      auth_mode: bearer_token_short_lived
      entitlement_class: organization_entitlement
      policy_override_posture: policy_immutable_no_override
    data_classes:
      - signed_policy_bundle_payload
    local_fallback_posture: local_copy_authoritative_within_freshness_floor
    local_core_blocking: false
    versioning:
      versioning_rule_class: url_major_version_plus_additive_minor_fields
      current_major_version_tag: v1
      url_version_segment_policy: required_leading_v_segment
      unknown_field_policy: request_rejects_unknown_response_tolerates_unknown
      additive_minor_rule_summary: >
        Additive bundle-envelope fields and additive query parameters
        are in-epoch; bundle body shapes are versioned separately by
        their own signed schema-bundle version.
      breaking_rule_summary: >
        Changing the bundle-envelope shape or the signature algorithm
        requires a new major-version tag and an explicit overlap window.
    deprecation_lane:
      lane_class: additive_only_no_removal_window
      sunset_posture: no_sunset_yet
      client_signal_headers:
        - aureline_api_version_header
        - aureline_api_freshness_floor_header
      notice_window_summary: >
        No removal lane at seed-time; only additive fields land.
    offline_and_cache_posture:
      offline_behavior_class: last_known_good_local_cache_resolves
      client_cache_policy_class: cache_authoritative_within_signed_freshness_floor
      last_known_good_posture: last_known_good_signed_policy_bundle
      schema_discovery_posture: embedded_openapi_pinned_to_release
      freshness_floor_summary: >
        The cached signed policy bundle remains authoritative within
        its freshness floor. Stale cache is labeled; it never surfaces
        as live truth.
    compat_binding:
      contract_packet_ref: artifacts/governance/stable_surface_inventory.yaml#managed_service_api.managed_policy_distribution.policy_bundle_fetch
      stable_surface_inventory_ref: artifacts/governance/stable_surface_inventory.yaml
      compatibility_window_source_ref: artifacts/compat/qualification_matrix_seed.yaml
    linked_record_class_ids: []
    linked_slo_row_ref: artifacts/service/slo_rows.yaml#service.managed_policy_distribution
    linked_retention_row_refs: []
    openapi_document_ref: openapi/service_api_seed.yaml

  - schema_version: 1
    row_kind: managed_service_api_capability_row
    api_surface_id: managed_settings_sync.user_settings_sync
    api_surface_title: User-scope settings sync surface
    summary: >
      Reads and writes user-scope settings for signed-in users only.
      Never resolves workspace or machine-scope settings and never
      blocks local settings resolution.
    service_id: managed_settings_sync
    api_family_class: sync_api_family
    maturity_lane: experimental
    ownership:
      owner_dri: "@ahmeddyounis"
      owning_lane: docs_public_truth
      backup_owner: null
      backup_waiver: single-maintainer-backup
    auth:
      auth_mode: oidc_session_token
      entitlement_class: account_required
      policy_override_posture: narrow_only_with_emergency_disable
    data_classes:
      - user_scope_settings_payload
      - identity_principal_metadata
    local_fallback_posture: local_queue_with_replay_on_recovery
    local_core_blocking: false
    versioning:
      versioning_rule_class: url_major_version_plus_additive_minor_fields
      current_major_version_tag: v1
      url_version_segment_policy: required_leading_v_segment
      unknown_field_policy: request_ignores_unknown_response_tolerates_unknown
      additive_minor_rule_summary: >
        Additive settings keys and additive response metadata are
        in-epoch. Settings payloads forward-compatibly carry unknown
        keys.
      breaking_rule_summary: >
        Removing or repurposing an envelope field requires a new major-
        version tag.
    deprecation_lane:
      lane_class: pre_release_no_deprecation_yet
      sunset_posture: no_sunset_yet
      client_signal_headers:
        - deprecation_header
        - sunset_header
        - aureline_api_version_header
      notice_window_summary: >
        Sunset requires a twelve-month overlap with the prior major.
    offline_and_cache_posture:
      offline_behavior_class: queued_for_replay_on_recovery
      client_cache_policy_class: cache_authoritative_within_signed_freshness_floor
      last_known_good_posture: last_known_good_local_settings
      schema_discovery_posture: embedded_openapi_pinned_to_release
      freshness_floor_summary: >
        Local settings on disk are authoritative. Pending writes queue
        under the workspace and replay on recovery.
    compat_binding:
      contract_packet_ref: artifacts/governance/stable_surface_inventory.yaml#managed_service_api.managed_settings_sync.user_settings_sync
      stable_surface_inventory_ref: artifacts/governance/stable_surface_inventory.yaml
      compatibility_window_source_ref: artifacts/compat/qualification_matrix_seed.yaml
    linked_record_class_ids:
      - entitlement_usage_export_packet
    linked_slo_row_ref: artifacts/service/slo_rows.yaml#service.managed_settings_sync
    linked_retention_row_refs:
      - artifacts/service/retention_rows.yaml#record_class.entitlement_usage_export_packet
    openapi_document_ref: openapi/service_api_seed.yaml

  - schema_version: 1
    row_kind: managed_service_api_capability_row
    api_surface_id: managed_auth_identity.oidc_session_front_door
    api_surface_title: OIDC session front-door surface
    summary: >
      OIDC-facing sign-in and session-refresh surface layered over the
      self-hosted protocol. Never reclassifies local workspace trust.
      Existing local sessions continue under the entitlement snapshot
      cache when this surface is unreachable.
    service_id: managed_auth_identity
    api_family_class: identity_api_family
    maturity_lane: experimental
    ownership:
      owner_dri: "@ahmeddyounis"
      owning_lane: governance_packets
      backup_owner: null
      backup_waiver: single-maintainer-backup
    auth:
      auth_mode: oidc_plus_mtls_dual_factor
      entitlement_class: account_required
      policy_override_posture: narrow_only_with_emergency_disable
    data_classes:
      - identity_principal_metadata
      - credential_material_reference
      - entitlement_snapshot
    local_fallback_posture: local_copy_authoritative_within_freshness_floor
    local_core_blocking: false
    versioning:
      versioning_rule_class: url_major_version_plus_additive_minor_fields
      current_major_version_tag: v1
      url_version_segment_policy: required_leading_v_segment
      unknown_field_policy: request_rejects_unknown_response_tolerates_unknown
      additive_minor_rule_summary: >
        Additive claims on the session packet and additive metadata
        fields are in-epoch.
      breaking_rule_summary: >
        Removing or repurposing a claim, changing a session-id shape,
        or tightening an authentication factor class requires a new
        major-version tag and an advisory.
    deprecation_lane:
      lane_class: standard_overlap_with_sunset_header
      sunset_posture: named_overlap_window_then_remove
      client_signal_headers:
        - deprecation_header
        - sunset_header
        - aureline_api_version_header
        - aureline_api_deprecation_advisory_header
      notice_window_summary: >
        A twelve-month overlap with the prior major applies; emergency
        sunsets cite a security advisory.
    offline_and_cache_posture:
      offline_behavior_class: last_known_good_local_cache_resolves
      client_cache_policy_class: cache_authoritative_within_signed_freshness_floor
      last_known_good_posture: last_known_good_entitlement_snapshot
      schema_discovery_posture: embedded_openapi_pinned_to_release
      freshness_floor_summary: >
        Entitlement snapshot cache remains authoritative within its
        freshness floor. Local-only work runs under account-free local
        as usual.
    compat_binding:
      contract_packet_ref: artifacts/governance/stable_surface_inventory.yaml#managed_service_api.managed_auth_identity.oidc_session_front_door
      stable_surface_inventory_ref: artifacts/governance/stable_surface_inventory.yaml
      compatibility_window_source_ref: artifacts/compat/qualification_matrix_seed.yaml
    linked_record_class_ids:
      - entitlement_usage_export_packet
    linked_slo_row_ref: artifacts/service/slo_rows.yaml#service.managed_auth_identity
    linked_retention_row_refs:
      - artifacts/service/retention_rows.yaml#record_class.entitlement_usage_export_packet
    openapi_document_ref: openapi/service_api_seed.yaml

  - schema_version: 1
    row_kind: managed_service_api_capability_row
    api_surface_id: managed_auth_identity.scim_provisioning
    api_surface_title: SCIM provisioning surface
    summary: >
      SCIM 2.0 user and group provisioning endpoint for admin-scope
      identity surfaces. Never writes into local workspace trust; its
      absence pauses provisioning without blocking local work.
    service_id: managed_auth_identity
    api_family_class: identity_api_family
    maturity_lane: experimental
    ownership:
      owner_dri: "@ahmeddyounis"
      owning_lane: governance_packets
      backup_owner: null
      backup_waiver: single-maintainer-backup
    auth:
      auth_mode: scim_bearer_token
      entitlement_class: admin_scope_entitlement
      policy_override_posture: narrow_only_no_widen
    data_classes:
      - identity_principal_metadata
    local_fallback_posture: managed_only_no_local_fallback_narrows_managed_claim_only
    local_core_blocking: false
    versioning:
      versioning_rule_class: url_major_version_plus_content_negotiation
      current_major_version_tag: v2
      url_version_segment_policy: required_leading_v_segment
      unknown_field_policy: request_ignores_unknown_response_tolerates_unknown
      additive_minor_rule_summary: >
        Additive SCIM schema fields and additive search parameters are
