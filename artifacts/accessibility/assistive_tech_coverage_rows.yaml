  - vcs_stash_state_changed
  - vcs_sequence_state_changed
  - recovery_state_changed
  - conflict_state_changed

high_risk_operational_surface_rows:
  - surface_row_id: at_surface.worktree_manager
    surface_family: worktree_manager
    minimum_keyboard_routes:
      - move between worktree rows
      - inspect dirty state and target branch
      - open diff or terminal for the selected worktree
      - remove or repair only after preview
    required_plain_language_labels:
      - Continue
      - Abort
      - Restore checkpoint
      - Review conflict
    zoom_resilience: 50_to_400_percent
    live_region_rule: >
      Announce dirty, blocked, conflict, or removal-preview state changes
      once per meaning change. Do not announce every status poll.

  - surface_row_id: at_surface.stash_shelf
    surface_family: stash_shelf
    minimum_keyboard_routes:
      - move between stash entries
      - inspect path scope and untracked-state summary
      - apply, pop, drop, compare, or create branch from stash through
        distinct commands
    required_plain_language_labels:
      - Continue
      - Abort
      - Restore checkpoint
      - Review conflict
    zoom_resilience: 50_to_400_percent
    live_region_rule: >
      Applying, popping, or dropping a stash announces result and
      recovery path once. Row refreshes with unchanged meaning stay
      silent.

  - surface_row_id: at_surface.sequence_editor
    surface_family: sequence_editor
    minimum_keyboard_routes:
      - move by sequence step
      - reorder through keyboard commands
      - continue, abort, skip, edit, or restore from checkpoint
      - open conflict detail for the current step
    required_plain_language_labels:
      - Continue
      - Abort
      - Skip
      - Restore checkpoint
      - Review conflict
    zoom_resilience: 50_to_400_percent
    live_region_rule: >
      Announce operation kind, current step, conflict blockers, and
      checkpoint availability when meaning changes. Reorder paint updates
      do not announce unless focus changes to a different step.

  - surface_row_id: at_surface.recovery_pane
    surface_family: recovery_pane
    minimum_keyboard_routes:
      - move through recovery options
      - inspect checkpoint or reflog source
      - restore, continue, abort, export diagnostics, or open details
    required_plain_language_labels:
      - Continue
      - Abort
      - Restore checkpoint
      - Open details
    zoom_resilience: 50_to_400_percent
    live_region_rule: >
      Recovery posture, checkpoint expiry, and successful restore
      announce once. Visible countdown-only refreshes stay silent unless
      the safe action changes.

  - surface_row_id: at_surface.conflict_resolution_view
    surface_family: conflict_resolution_view
    minimum_keyboard_routes:
      - move between conflicts
      - inspect base, current, incoming, and result summaries
      - choose accept-left, accept-right, accept-both, manual, or
        regenerate paths where offered
      - return to the originating file or sequence step
    required_plain_language_labels:
      - Continue
      - Abort
      - Skip
      - Restore checkpoint
      - Review conflict
    zoom_resilience: 50_to_400_percent
    live_region_rule: >
      Announce unresolved-count changes and selected conflict identity.
      Do not repeat stable file chrome for every hunk movement.

