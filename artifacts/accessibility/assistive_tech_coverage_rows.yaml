# Assistive-technology coverage rows for announcement and live-region parity.
#
# Machine-readable companion to
# docs/accessibility/screen_reader_and_live_region_contract.md.
#
# Rules.
#   - Rows compose over platform_input_matrix.yaml and
#     assistive_tech_matrix.yaml. They do not widen platform claims by
#     themselves.
#   - A row must keep degraded, partial, blocked, failed, pending, and
#     unclaimed states explicit so support packets do not infer parity.
#   - JAWS is tracked as an explicit unclaimed row until a dedicated
#     current evidence row is admitted.
#   - High-risk operational surfaces are first-class coverage targets,
#     not follow-up polish.

schema_version: 1
artifact_id: aureline.assistive_tech_coverage_rows
status: seeded

contract_source: docs/accessibility/screen_reader_and_live_region_contract.md
announcement_schema_source: schemas/accessibility/announcement_event.schema.json
announcement_fixture_source_dir: fixtures/accessibility/announcement_cases
platform_input_matrix_source: artifacts/accessibility/platform_input_matrix.yaml
assistive_tech_matrix_source: artifacts/accessibility/assistive_tech_matrix.yaml
accessibility_tree_coverage_source: artifacts/accessibility/accessibility_tree_coverage_rows.yaml
shell_checklist_source: artifacts/accessibility/shell_conformance_checklist.yaml
task_corpus_manifest_source: fixtures/accessibility/task_corpus_manifest.yaml
review_charter_source: docs/accessibility/review_charter.md

support_class_vocabulary:
  - claimed
  - claimed_narrow
  - best_effort
  - unclaimed

coverage_state_vocabulary:
  - pending_evidence
  - passed
  - degraded
  - partial
  - blocked
  - failed
  - unclaimed

coverage_state_meanings:
  - state: pending_evidence
    matrix_result_state_equivalent: pending_evidence
    meaning: >
      The row and fixtures exist, but no claim-bearing packet has
      current manual or automated assistive-technology evidence yet.
  - state: passed
    matrix_result_state_equivalent: passed
    meaning: >
      The named journey completed inside the row scope and all required
      announcement, keyboard, zoom, and recovery cues remained available.
  - state: degraded
    matrix_result_state_equivalent: degraded
    meaning: >
      A usable path remained, but a live-region, keyboard, zoom, or
      recovery dimension narrowed visibly and must be recorded.
  - state: partial
    matrix_result_state_equivalent: degraded
    meaning: >
      The row covers some launch-critical journeys or surfaces, but not
      every required dimension. Older result-state vocabularies should
      map this to degraded with this note.
  - state: blocked
    matrix_result_state_equivalent: blocked
    meaning: >
      Policy, platform state, missing adapter support, or a broken
      prerequisite prevented completion. Silent fallback is forbidden.
  - state: failed
    matrix_result_state_equivalent: failed
    meaning: >
      A claimed path regressed or announced incorrect, spammy, or
      contradictory output.
  - state: unclaimed
    matrix_result_state_equivalent: unclaimed
    meaning: >
      Outside the defended support scope. Docs, support, and release
      packets must not imply parity.

launch_critical_journey_refs:
  - corpus.accessibility.command_discovery.palette_and_quick_open
  - corpus.accessibility.project_entry.open_import_restore
  - corpus.accessibility.trust.permission_prompt_recovery
