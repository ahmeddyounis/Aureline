  - diagnostic_entered_active_line
  - diagnostic_left_active_line
  - breakpoint_added
  - breakpoint_removed
  - breakpoint_verified
  - breakpoint_unverified
  - task_started
  - task_completed
  - task_failed
  - task_blocked
  - trust_entered_restricted_mode
  - trust_granted
  - trust_revoked
