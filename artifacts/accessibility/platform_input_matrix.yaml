platform_scope_rows:
  - platform_scope_id: macos_claimed_desktop
    platform_profile_refs:
      - macos_15_plus_universal
    accessibility_bridge: nsaccessibility
    display_stack_assumption: Quartz / WindowServer with Spaces and fullscreen
    text_input_assumption: macOS Text Input Services and system IMEs
    primary_assistive_technology_rows:
      - at.voiceover.macos.core_shell
    primary_input_rows:
      - input.macos.text_input_services
    locale_rows:
      - locale.shared.source_and_pseudoloc_shell
      - locale.shared.rtl_mixed_direction_technical_content
      - locale.shared.cjk_and_emoji_input
    known_narrowings:
      - Portable install rows remain narrower by design.
      - Accessibility or IME evidence does not widen Homebrew or offline-bundle claims.

  - platform_scope_id: windows_claimed_desktop
    platform_profile_refs:
      - windows_11_23h2_plus_x86_64
    accessibility_bridge: uia
    display_stack_assumption: DWM / Win32 windowing with per-monitor DPI restore
    text_input_assumption: TSF, IME, AltGr, dead keys, and emoji panel
    primary_assistive_technology_rows:
      - at.nvda.windows.core_shell
    primary_input_rows:
      - input.windows.tsf_primary
    locale_rows:
      - locale.shared.source_and_pseudoloc_shell
      - locale.shared.rtl_mixed_direction_technical_content
      - locale.shared.cjk_and_emoji_input
    known_narrowings:
      - Windows Narrator is tracked explicitly as unclaimed until a named row lands.
      - winget and Windows ARM64 remain outside the current claimed desktop envelope.

  - platform_scope_id: linux_claimed_gnome_desktop
    platform_profile_refs:
      - linux_ubuntu_24_04_gnome_wayland_x86_64
      - linux_ubuntu_24_04_gnome_x11_x86_64
      - linux_fedora_current_gnome_wayland_x86_64
      - linux_debian_stable_gnome_x11_x86_64
    accessibility_bridge: at_spi
    display_stack_assumption: claimed GNOME Wayland or X11 rows only
    text_input_assumption: IBus on the named GNOME profiles
    primary_assistive_technology_rows:
      - at.orca.linux.gnome.core_shell
    primary_input_rows:
      - input.linux.ibus_gnome
    locale_rows:
      - locale.shared.source_and_pseudoloc_shell
      - locale.shared.rtl_mixed_direction_technical_content
      - locale.shared.cjk_and_emoji_input
    known_narrowings:
      - Fcitx remains best-effort only until a named Linux profile row lands.
      - KDE, KWallet, and non-GNOME shell behaviors remain unclaimed.

