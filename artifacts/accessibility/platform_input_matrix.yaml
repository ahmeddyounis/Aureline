support_class_vocabulary:
  - claimed
  - claimed_narrow
  - best_effort
  - unclaimed

result_state_vocabulary:
  - pending_evidence
  - passed
  - degraded
  - blocked
  - failed
  - unclaimed

result_state_meanings:
  - state: pending_evidence
    meaning: >
      Seed row exists and the verification shape is frozen, but no
      claim-bearing packet has attached current evidence yet.
  - state: passed
    meaning: >
      Claimed path behaved within the named scope and all required cues
      remained available.
  - state: degraded
    meaning: >
      Usable route remained, but the path narrowed visibly and the
      packet must name the narrowed behavior and recovery path.
  - state: blocked
    meaning: >
      The path could not complete because policy, platform state, or a
      missing prerequisite blocked it. Silent fallback is forbidden.
  - state: failed
    meaning: >
      Expected behavior on a claim-bearing row regressed or behaved
      incorrectly.
  - state: unclaimed
    meaning: >
      Outside the defended support scope. Docs, support, and release
      packets must not imply parity.

