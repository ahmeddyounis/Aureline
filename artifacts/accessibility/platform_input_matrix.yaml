# Accessibility and platform-input matrix seed.
#
# Machine-readable companion to
# docs/accessibility/a11y_ime_packet_template.md.
#
# This file freezes the platform assumptions, assistive-technology rows,
# input-method paths, locale/RTL coverage rows, and shared result-state
# vocabulary used by accessibility and IME packets.
#
# Rules.
#   - Result-state names are shared across packets, checklists, and
#     fixtures. Do not mint alternate names for "degraded", "blocked",
#     "failed", or "unclaimed".
#   - A platform claim is still the tuple of platform profile,
#     assistive-technology row, input path, and surface group. "macOS",
#     "Windows", or "Linux" alone is not enough.
#   - Linux rows stay bound to the named GNOME profiles from
#     artifacts/platform/claimed_desktop_profiles.yaml; they do not widen
#     to unspecified Linux environments.
#   - Best-effort or unclaimed rows must remain explicit so later
#     accessibility packets and support exports do not infer parity.

