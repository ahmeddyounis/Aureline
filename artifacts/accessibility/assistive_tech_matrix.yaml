# Accessibility review assistive-technology matrix seed.
#
# Machine-readable planning matrix for review coverage across the claimed
# desktop platform scopes and the launch-critical shell workflows.
#
# Rules.
#   - This matrix composes over platform_input_matrix.yaml; it does not
#     replace the underlying AT, input, or locale row ids.
#   - Every platform review row MUST name one screen-reader row, one
#     keyboard-only row, one zoom row, one high-contrast row, one
#     reduced-motion row, and one input-method row or input-method
#     bundle.
#   - Support-class placeholders stay explicit. A seeded row does not
#     imply blanket parity outside its named support_class.
#   - Task refs resolve through fixtures/accessibility/task_corpus_manifest.yaml.

schema_version: 1
status: seeded

overview_page: docs/accessibility/review_charter.md
packet_template_source: docs/accessibility/a11y_ime_packet_template.md
platform_input_matrix_source: artifacts/accessibility/platform_input_matrix.yaml
shell_checklist_source: artifacts/accessibility/shell_conformance_checklist.yaml
task_corpus_manifest_source: fixtures/accessibility/task_corpus_manifest.yaml
theme_support_source: artifacts/design/theme_support_rows.yaml
desktop_profile_source: artifacts/platform/claimed_desktop_profiles.yaml

related_requirement_ids:
  - A11Y-CORE-002
  - A11Y-SR-003
  - A11Y-TEXT-004
  - A11Y-I18N-007
  - A11Y-INCL-005

support_class_vocabulary:
  - claimed
  - claimed_narrow
  - best_effort
  - unclaimed

result_state_vocabulary:
  - pending_evidence
  - passed
  - degraded
  - blocked
  - failed
  - unclaimed

consideration_class_vocabulary:
  - screen_reader
  - keyboard_only
  - zoom_review
  - high_contrast_review
  - reduced_motion_review
  - input_method_review

modality_rows:
  - modality_row_id: modality.keyboard_only.core_shell
    consideration_class: keyboard_only
    support_class: claimed
    default_result_state: pending_evidence
    shared_expectations:
      - launch-critical routes stay usable without pointer-only affordances
      - focus order, focus return, and blocked-state recovery remain explicit

  - modality_row_id: modality.zoom_200.core_shell
    consideration_class: zoom_review
    support_class: claimed_narrow
    default_result_state: pending_evidence
    shared_expectations:
      - primary state, blocked reasons, and next-step actions remain visible at 200 percent zoom
      - overflow may move secondary actions, but not hide the main recovery route

  - modality_row_id: modality.high_contrast.core_shell
    consideration_class: high_contrast_review
    support_class: claimed_narrow
    default_result_state: pending_evidence
    shared_expectations:
      - text, focus, selection, trust cues, and blocked reasons remain legible without color-only meaning
      - the review scope is limited to Aureline-owned theme and token surfaces

  - modality_row_id: modality.reduced_motion.core_shell
    consideration_class: reduced_motion_review
    support_class: claimed_narrow
    default_result_state: pending_evidence
    shared_expectations:
      - non-essential motion suppresses cleanly without hiding state transitions
      - guided overlays, palette transitions, and task or terminal state changes remain understandable

