case_id: accessibility.range_selection.hidden_selected_count_inspection
title: Inspect hidden-selected and not-loaded counts from the keyboard
acceptance_pack_family_ref: acceptance_pack.accessibility.dense_review_collection
task_ref: corpus.accessibility.review.dense_collection_batch_review
checklist_refs:
  - shell_conformance.dense_collection_batch_review
tree_row_refs:
  - tree_coverage.dense_collection_batch_review
surface_group: dense_collection_batch_review
platform_profile_scope: all_claimed_desktop_profiles
assistive_technology_refs:
  - at.voiceover.macos.core_shell
  - at.nvda.windows.core_shell
  - at.orca.linux.gnome.core_shell
related_manifest_case: selection_scope.virtualized_list.hidden_selected_after_filter
steps:
  - step_id: create_broad_selection
    action: Select all matching results from the current filter.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: all matching results selected
  - step_id: narrow_filter
    action: Apply a narrower filter that hides some selected members.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: 5 selected outside current filter, 2 not loaded
  - step_id: inspect_summary
    action: Move focus to the selection summary and inspect the counts by keyboard.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: 17 selected, 5 outside current filter, 2 not loaded
    expected_text_result: hidden-selected and not-loaded remain separate counts
result_examples:
  passed: >
    The summary exposes hidden-selected and not-loaded counts separately
    and offers reveal or clear-selection actions without requiring a
    pointer.
  degraded: >
    Matching total is approximate, but hidden-selected and not-loaded
    still remain distinct and inspectable.
  failed: >
    Hidden-selected count disappears after the filter change, or
    not-loaded members are folded into the same bucket.
failure_class_refs:
  - virtualized_selection_count_drift
  - announcement_missing
  - tree_node_missing
