case_id: accessibility.range_selection.current_row_selection
title: Select the current row without triggering activation
acceptance_pack_family_ref: acceptance_pack.accessibility.dense_review_collection
task_ref: corpus.accessibility.review.dense_collection_batch_review
checklist_refs:
  - shell_conformance.dense_collection_batch_review
tree_row_refs:
  - tree_coverage.dense_collection_batch_review
surface_group: dense_collection_batch_review
platform_profile_scope: all_claimed_desktop_profiles
assistive_technology_refs:
  - at.voiceover.macos.core_shell
  - at.nvda.windows.core_shell
  - at.orca.linux.gnome.core_shell
related_manifest_case: selection_scope.virtualized_table.select_visible_then_matching
related_fixture_refs:
  - fixtures/accessibility/ime_and_text_cases/virtualized_selection_scope.yaml
steps:
  - step_id: focus_current_row
    action: Focus row 12 in the collection with ArrowDown.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: row 12 of 120, not selected
  - step_id: select_current_row
    action: Press Space to select the current row.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: selected, 1 item selected
    expected_text_result: focus and activation remain distinct from selection
result_examples:
  passed: >
    Space selects the row, focus stays on the row, and Enter would still
    activate the row's default detail action rather than clearing the
    selection.
  degraded: >
    The platform bridge says "checked" instead of "selected", but the
    selected count and non-activation posture remain explicit.
  failed: >
    Activation fires, the selected count is omitted, or focus moves to a
    pointer-only checkbox.
failure_class_refs:
  - announcement_missing
  - focus_order_regression
  - tree_node_missing
