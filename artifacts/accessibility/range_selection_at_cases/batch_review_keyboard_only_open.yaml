case_id: accessibility.range_selection.batch_review_keyboard_only_open
title: Open batch review without pointer-only controls
acceptance_pack_family_ref: acceptance_pack.accessibility.dense_review_collection
task_ref: corpus.accessibility.review.dense_collection_batch_review
checklist_refs:
  - shell_conformance.dense_collection_batch_review
tree_row_refs:
  - tree_coverage.dense_collection_batch_review
surface_group: dense_collection_batch_review
platform_profile_scope: all_claimed_desktop_profiles
assistive_technology_refs:
  - at.voiceover.macos.core_shell
  - at.nvda.windows.core_shell
  - at.orca.linux.gnome.core_shell
related_manifest_case: selection_scope.virtualized_table.select_visible_then_matching
related_fixture_refs:
  - fixtures/accessibility/ime_and_text_cases/virtualized_selection_scope.yaml
steps:
  - step_id: reach_selection_summary
    action: Move focus from the collection rows to the selection summary by keyboard.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: selection summary with selected count and scope
  - step_id: open_review
    action: Press the batch-review command or Enter on the summary action.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: batch review sheet, included 39, blocked 3, hidden 6
  - step_id: close_review
    action: Dismiss the review sheet with Escape.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: focus returned to the originating row or summary owner
    expected_text_result: no pointer-only checkbox is required anywhere in the flow
result_examples:
  passed: >
    A complete keyboard path opens and closes batch review while keeping
    count truth and focus return explicit.
  degraded: >
    Focus returns to the selection summary instead of the exact row, but
    the summary still names the selected scope and count breakdown.
  failed: >
    Opening review depends on a hover-only or pointer-only checkbox, or
    closing review loses focus silently.
failure_class_refs:
  - focus_order_regression
  - announcement_missing
  - tree_node_missing
