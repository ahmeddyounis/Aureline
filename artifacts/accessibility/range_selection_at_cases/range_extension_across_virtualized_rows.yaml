case_id: accessibility.range_selection.range_extension_across_virtualized_rows
title: Extend a range across virtualized rows without moving the anchor
acceptance_pack_family_ref: acceptance_pack.accessibility.dense_review_collection
task_ref: corpus.accessibility.review.dense_collection_batch_review
checklist_refs:
  - shell_conformance.dense_collection_batch_review
tree_row_refs:
  - tree_coverage.dense_collection_batch_review
surface_group: dense_collection_batch_review
platform_profile_scope: all_claimed_desktop_profiles
assistive_technology_refs:
  - at.voiceover.macos.core_shell
  - at.nvda.windows.core_shell
  - at.orca.linux.gnome.core_shell
related_manifest_case: selection_scope.range_select_clear_extend.identity_anchor
related_fixture_refs:
  - fixtures/accessibility/ime_and_text_cases/range_selection_anchor_stability.yaml
steps:
  - step_id: establish_anchor
    action: Focus row 5 and press Shift+ArrowDown.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: anchor established at row 5
  - step_id: extend_range
    action: Press Shift+PageDown until focus reaches row 25.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: rows 5 through 25 selected, anchor remains row 5
  - step_id: continue_after_virtualization
    action: Scroll enough to recycle mounted rows, then press Shift+ArrowDown once more.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: rows 5 through 26 selected
    expected_text_result: anchor remains stable through virtualization churn
result_examples:
  passed: >
    The anchor remains on row 5 until the user clears selection, even as
    the mounted row set changes.
  degraded: >
    The new count is announced through a secondary summary command
    rather than inline, but the anchor still does not drift silently.
  failed: >
    Virtualization, sort, or filter changes move the anchor to another
    row without telling the user.
failure_class_refs:
  - range_anchor_drift
  - announcement_missing
  - tree_node_missing
