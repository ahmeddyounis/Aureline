# Pointer-independence inventory for launch-critical and near-critical
# interaction classes.
#
# The inventory is a debt ledger, not a feature backlog. Any row marked
# pointer_only_debt is barred from stable launch-critical use until the
# replacement path and verification fixture are present.

schema_version: 1
status: seeded

contract_ref: docs/accessibility/focus_zoom_and_pointer_independence_contract.md
schema_ref: schemas/accessibility/focus_owner.schema.json
fixture_directory: fixtures/accessibility/focus_zoom_cases/
review_charter_source: docs/accessibility/review_charter.md
owner_dri: "@ahmeddyounis"
owning_lane: accessibility_input_review

status_vocabulary:
  - covered
  - degraded_with_disclosure
  - pointer_only_debt
  - not_applicable

criticality_vocabulary:
  - launch_critical
  - claim_blocking_if_enabled
  - future_surface_debt
  - non_critical_accelerator

action_class_vocabulary:
  - reorder
  - selection
  - range_selection
  - pane_resize
  - review_action
  - drag_drop_import
  - canvas_navigation
  - timeline_range
  - visual_resize_or_position

inventory_rows:
  - row_id: no_drag.editor_tab_reorder
    action_class: reorder
    surface_group: editor_group
    criticality: launch_critical
    status: covered
    pointer_gesture: drag editor tab within or across groups
    keyboard_equivalent: move tab left, move tab right, move tab to group, and open tab actions menu
    command_refs:
      - command.tabs.move_left
      - command.tabs.move_right
      - command.tabs.move_to_group
    replacement_path: focused tab menu and command palette routes
    owner: "@ahmeddyounis"
    verification_fixture_refs:
      - fixtures/accessibility/focus_zoom_cases/no_drag_keyboard_equivalence.yaml
    remaining_debt: none

  - row_id: no_drag.dense_collection_range_selection
    action_class: range_selection
    surface_group: dense_collection_batch_review
    criticality: launch_critical
    status: covered
    pointer_gesture: shift click or drag range across visible rows
    keyboard_equivalent: arrow navigation, Space toggle, Shift plus arrows, select all visible, select all matching, inspect hidden selected count
    command_refs:
      - command.collection.toggle_current_selection
      - command.collection.extend_range_selection
      - command.collection.select_all_matching
      - command.collection.inspect_hidden_selection
    replacement_path: row focus model plus batch-selection commands
    owner: "@ahmeddyounis"
    verification_fixture_refs:
      - fixtures/accessibility/focus_zoom_cases/no_drag_keyboard_equivalence.yaml
      - fixtures/accessibility/ime_and_text_cases/virtualized_selection_scope.yaml
    remaining_debt: none

  - row_id: no_drag.pane_resize
    action_class: pane_resize
    surface_group: editor_group
    criticality: launch_critical
    status: covered
    pointer_gesture: drag splitter between editor, side surface, and bottom panel
    keyboard_equivalent: focus splitter, grow or shrink by fixed step, snap preset, reset size, move panel to sheet
    command_refs:
      - command.layout.focus_splitter
      - command.layout.resize_focused_pane
      - command.layout.reset_pane_size
      - command.layout.move_panel_to_sheet
    replacement_path: focused splitter commands and layout command palette
    owner: "@ahmeddyounis"
    verification_fixture_refs:
      - fixtures/accessibility/focus_zoom_cases/no_drag_keyboard_equivalence.yaml
      - fixtures/accessibility/focus_zoom_cases/high_zoom_launch_layout.yaml
    remaining_debt: none

  - row_id: no_drag.diff_review_actions
    action_class: review_action
    surface_group: diff_review
    criticality: launch_critical
    status: covered
    pointer_gesture: click toolbar controls, drag split handle, or hover row actions during review
    keyboard_equivalent: focused toolbar, command palette, hunk navigation, comment, approve, reject, apply, revert, export
    command_refs:
      - command.review.comment_on_current_hunk
      - command.review.approve
      - command.review.request_changes
      - command.review.apply_selected_change
      - command.review.export_evidence
    replacement_path: review action menu and command routes from current hunk
    owner: "@ahmeddyounis"
    verification_fixture_refs:
      - fixtures/accessibility/focus_zoom_cases/no_drag_keyboard_equivalence.yaml
      - fixtures/accessibility/focus_zoom_cases/overlay_focus_return.yaml
    remaining_debt: none

  - row_id: no_drag.file_import_or_attach
    action_class: drag_drop_import
    surface_group: shell_workspace_launcher
    criticality: launch_critical
    status: covered
    pointer_gesture: drag folder, file, notebook output, or support artifact into a target region
    keyboard_equivalent: open/import/attach command, choose destination, preview consequence, confirm or cancel
    command_refs:
      - command.workspace.open_folder
      - command.workspace.import_artifact
      - command.support.attach_evidence
    replacement_path: command palette import flow with preview and focus return
    owner: "@ahmeddyounis"
    verification_fixture_refs:
      - fixtures/accessibility/focus_zoom_cases/overlay_focus_return.yaml
    remaining_debt: none

  - row_id: no_drag.graph_canvas_node_reposition
    action_class: visual_resize_or_position
    surface_group: graph_or_timeline
    criticality: future_surface_debt
    status: pointer_only_debt
    pointer_gesture: drag a freeform graph or visual-designer node to a new canvas position
    keyboard_equivalent: not yet seeded
    command_refs: []
    replacement_path: >
      Add focused node move commands, arrow-key nudging, property-panel
      coordinate fields, reset layout, and equivalent list or table
      route before this surface becomes claim-bearing.
    owner: "@ahmeddyounis"
    verification_fixture_refs: []
    remaining_debt: keyboard nudge and property-field fixture required before stable claim

  - row_id: no_drag.timeline_range_scrub
    action_class: timeline_range
    surface_group: graph_or_timeline
    criticality: claim_blocking_if_enabled
    status: pointer_only_debt
    pointer_gesture: drag timeline handles to choose a trace or flamegraph range
    keyboard_equivalent: not yet seeded
    command_refs: []
    replacement_path: >
      Add focused start/end range fields, keyboard step larger/smaller,
      previous/next event commands, and summary table selection before
      timeline range selection is claim-bearing.
    owner: "@ahmeddyounis"
    verification_fixture_refs: []
    remaining_debt: range-field and keyboard-step fixture required

gates:
  - Launch-critical rows must not have status pointer_only_debt.
  - A pointer_only_debt row must name owner, replacement_path, and remaining_debt.
  - Pointer gestures may remain accelerators only when keyboard_equivalent and command_refs are populated.
  - Future visual or graph surfaces must add fixture refs before changing status to covered.
