# Accessibility shell conformance checklist seed.
#
# Launch-critical shell checklist for keyboard completeness, focus order
# and return, screen-reader labels and announcements, shortcut
# narration, zoom stability, reduced motion, high contrast, IME/input
# behavior, and accessibility-tree capture on the canonical shell
# surfaces.
#
# Rules.
#   - This checklist reuses result-state names from
#     artifacts/accessibility/platform_input_matrix.yaml.
#   - Every checklist row MUST cite one launch-critical journey, one
#     surface group, one or more AT row refs, and one or more
#     accessibility-tree row refs.
#   - Every degraded, blocked, or failed result MUST name the failure
#     class and the user-visible fallback or denial route.
#   - Checklist ids are stable review ids; later packets should cite
#     them rather than writing a fresh accessibility TODO list.

schema_version: 1
status: seeded

overview_page: docs/accessibility/a11y_ime_packet_template.md
review_charter_source: docs/accessibility/review_charter.md
platform_input_matrix_source: artifacts/accessibility/platform_input_matrix.yaml
assistive_tech_matrix_source: artifacts/accessibility/assistive_tech_matrix.yaml
tree_coverage_source: artifacts/accessibility/accessibility_tree_coverage_rows.yaml
interaction_safety_source: docs/ux/shell_interaction_safety_contract.md
shell_boundary_source: docs/adr/0016-shell-windowing-input-accessibility-boundary.md
shell_failure_modes_source: docs/architecture/input_adapter_failure_modes.md
task_corpus_manifest_source: fixtures/accessibility/task_corpus_manifest.yaml

related_requirement_ids:
  - A11Y-CORE-002
  - A11Y-SR-003
  - A11Y-TEXT-004
  - A11Y-I18N-007
  - A11Y-INCL-005

platform_profile_scope_vocabulary:
  - all_claimed_desktop_profiles

failure_class_vocabulary:
  - keyboard_route_missing
  - focus_order_regression
  - focus_return_regression
  - announcement_missing
  - shortcut_narration_missing
  - zoom_instability
  - reduced_motion_violation
  - high_contrast_breakage
  - ime_preedit_loss
  - dead_key_as_shortcut
  - altgr_as_shortcut
  - bidi_copy_drift
  - tree_node_missing
  - virtualized_selection_count_drift
  - range_anchor_drift
  - mixed_dpi_focus_loss

journey_rows:
  - checklist_id: shell_conformance.open_repo_from_launcher
    journey_label: Open repo from the launcher surface
    surface_group: shell_workspace_launcher
    platform_profile_scope: all_claimed_desktop_profiles
    assistive_technology_row_refs:
      - at.voiceover.macos.core_shell
      - at.nvda.windows.core_shell
      - at.orca.linux.gnome.core_shell
    input_row_refs:
      - input.macos.text_input_services
      - input.windows.tsf_primary
      - input.linux.ibus_gnome
    locale_row_refs:
      - locale.shared.source_and_pseudoloc_shell
      - locale.shared.rtl_mixed_direction_technical_content
    required_keyboard_actions:
      - open the launcher without pointer input
      - search for a workspace and move through recent-work entries
      - invoke the default open action and any safer alternate open route
    required_announcements:
      - launcher title, trust state, and blocked-open reasons are announced once
      - focused recent-work entries narrate identity, missing-path state, and safe-open posture
    focus_return_expectation: return to the last actionable launcher entry or the newly opened workspace root
    shortcut_narration_expectation: launcher actions expose command ids or shortcut hints without hover-only dependence
    appearance_checks:
      zoom_stability: required
      reduced_motion: required
      high_contrast: required
    tree_coverage_row_refs:
      - tree_coverage.shell_workspace_launcher
    fixture_refs:
      - fixtures/accessibility/ime_and_text_cases/platform_input_feature_unavailable.yaml
    failure_class_refs:
      - keyboard_route_missing
      - focus_order_regression
      - announcement_missing
      - shortcut_narration_missing
      - tree_node_missing
    seeded_result_state: pending_evidence

  - checklist_id: shell_conformance.quick_open_palette
    journey_label: Quick open or palette navigation
    surface_group: palette_search
    platform_profile_scope: all_claimed_desktop_profiles
    assistive_technology_row_refs:
      - at.voiceover.macos.core_shell
      - at.nvda.windows.core_shell
      - at.orca.linux.gnome.core_shell
    input_row_refs:
      - input.macos.text_input_services
      - input.windows.tsf_primary
      - input.linux.ibus_gnome
    locale_row_refs:
      - locale.shared.source_and_pseudoloc_shell
      - locale.shared.rtl_mixed_direction_technical_content
      - locale.shared.cjk_and_emoji_input
    required_keyboard_actions:
      - open quick open or palette, type while composition is active, and move through results
      - invoke the default result and any alternate action
      - dismiss the surface without losing the invoking context
    required_announcements:
      - result count, scope, and disabled reasons remain narrated as the list changes
      - composition state does not silently commit or cancel while filtering updates
    focus_return_expectation: return to the invoking context unless the chosen action intentionally changes focus
    shortcut_narration_expectation: alternate actions and shortcut hints remain reachable in the focused result row
    appearance_checks:
      zoom_stability: required
      reduced_motion: required
      high_contrast: required
    tree_coverage_row_refs:
      - tree_coverage.quick_open_palette
    fixture_refs:
      - fixtures/accessibility/ime_and_text_cases/mixed_direction_technical_strings.yaml
      - fixtures/accessibility/ime_and_text_cases/editor_ime_dead_key_altgr_emoji_commit.yaml
    failure_class_refs:
      - focus_order_regression
      - focus_return_regression
      - announcement_missing
      - ime_preedit_loss
      - dead_key_as_shortcut
      - altgr_as_shortcut
      - tree_node_missing
    seeded_result_state: pending_evidence

  - checklist_id: shell_conformance.read_docs_surface
    journey_label: Read docs and preserve citation or source-language routes
    surface_group: docs_reader
    platform_profile_scope: all_claimed_desktop_profiles
    assistive_technology_row_refs:
      - at.voiceover.macos.core_shell
      - at.nvda.windows.core_shell
      - at.orca.linux.gnome.core_shell
    locale_row_refs:
      - locale.shared.source_and_pseudoloc_shell
      - locale.shared.rtl_mixed_direction_technical_content
    required_keyboard_actions:
      - open a docs surface, move by headings or links, and open citations or source-language fallback
      - copy raw or rendered content without leaving the current review flow
    required_announcements:
      - document title, freshness or source note, and open-in-source-language action remain narrated
      - mixed-direction technical content remains understandable in speech output
    focus_return_expectation: return to the invoking context or last active docs anchor after drill-down closes
    shortcut_narration_expectation: docs actions with command routes expose the same stable names as the command graph
    appearance_checks:
      zoom_stability: required
      reduced_motion: required
      high_contrast: required
    tree_coverage_row_refs:
      - tree_coverage.docs_reader
    fixture_refs:
      - fixtures/accessibility/ime_and_text_cases/mixed_direction_technical_strings.yaml
      - fixtures/accessibility/ime_and_text_cases/copy_representation_parity.yaml
    failure_class_refs:
      - keyboard_route_missing
      - announcement_missing
      - zoom_instability
      - high_contrast_breakage
      - bidi_copy_drift
      - tree_node_missing
    seeded_result_state: pending_evidence

  - checklist_id: shell_conformance.guided_tour_or_onboarding_action
    journey_label: Guided tour or onboarding action
    surface_group: guided_tour_and_onboarding
    platform_profile_scope: all_claimed_desktop_profiles
    assistive_technology_row_refs:
      - at.voiceover.macos.core_shell
      - at.nvda.windows.core_shell
      - at.orca.linux.gnome.core_shell
    input_row_refs:
      - input.macos.text_input_services
      - input.windows.tsf_primary
      - input.linux.ibus_gnome
    locale_row_refs:
      - locale.shared.source_and_pseudoloc_shell
      - locale.shared.rtl_mixed_direction_technical_content
    required_keyboard_actions:
      - start, step forward, step backward, dismiss, and activate the highlighted action
      - recover to the prior working surface after dismiss
    required_announcements:
      - current step identity, progress, and blocked-action explanation are narrated
      - instructional text remains distinct from mutating actions
    focus_return_expectation: return to the prior working surface or the step's owning control when the overlay closes
    shortcut_narration_expectation: highlighted actions expose command or shortcut identity instead of icon-only teaching copy
    appearance_checks:
      zoom_stability: required
      reduced_motion: required
      high_contrast: required
    tree_coverage_row_refs:
      - tree_coverage.guided_tour_and_onboarding
    fixture_refs:
      - fixtures/accessibility/ime_and_text_cases/platform_input_feature_unavailable.yaml
    failure_class_refs:
      - focus_order_regression
      - focus_return_regression
      - announcement_missing
      - reduced_motion_violation
      - high_contrast_breakage
      - tree_node_missing
    seeded_result_state: pending_evidence

  - checklist_id: shell_conformance.run_task_and_review_output
    journey_label: Run a task and review task output
    surface_group: task_run_and_output
    platform_profile_scope: all_claimed_desktop_profiles
    assistive_technology_row_refs:
      - at.voiceover.macos.core_shell
      - at.nvda.windows.core_shell
      - at.orca.linux.gnome.core_shell
    input_row_refs:
      - input.macos.text_input_services
      - input.windows.tsf_primary
      - input.linux.ibus_gnome
    locale_row_refs:
      - locale.shared.source_and_pseudoloc_shell
      - locale.shared.cjk_and_emoji_input
    required_keyboard_actions:
      - start, stop, rerun, and inspect parameter or target details without pointer-only affordances
      - move from the task trigger to the output surface and back
    required_announcements:
      - target identity, run state transitions, blocked reasons, and completion summary remain narrated
      - task parameters or runtime boundary notes remain reachable when the action is denied or narrowed
    focus_return_expectation: return to the invoking editor region, task row, or output summary according to the last useful context
    shortcut_narration_expectation: rerun or open-details actions expose the same command ids as other command routes
    appearance_checks:
      zoom_stability: required
      reduced_motion: required
      high_contrast: required
    tree_coverage_row_refs:
      - tree_coverage.task_run_and_output
    fixture_refs:
      - fixtures/accessibility/ime_and_text_cases/editor_ime_dead_key_altgr_emoji_commit.yaml
      - fixtures/accessibility/ime_and_text_cases/platform_input_feature_unavailable.yaml
    failure_class_refs:
      - keyboard_route_missing
      - focus_return_regression
      - announcement_missing
      - ime_preedit_loss
      - tree_node_missing
    seeded_result_state: pending_evidence

  - checklist_id: shell_conformance.diff_review_and_comment
    journey_label: Review a diff and preserve raw or rendered copy truth
    surface_group: diff_review
    platform_profile_scope: all_claimed_desktop_profiles
    assistive_technology_row_refs:
      - at.voiceover.macos.core_shell
      - at.nvda.windows.core_shell
      - at.orca.linux.gnome.core_shell
    locale_row_refs:
      - locale.shared.rtl_mixed_direction_technical_content
      - locale.shared.source_and_pseudoloc_shell
    required_keyboard_actions:
      - move through files and hunks, open related details, comment, and return to the originating hunk
      - choose raw, rendered, or escaped copy where the surface exposes multiple representations
    required_announcements:
      - draft-versus-synced state, stale-base posture, and provider scope remain narrated
      - copy actions announce the representation that will be exported
    focus_return_expectation: return to the originating diff hunk, file row, or review card after detail sheets close
    shortcut_narration_expectation: approve, request-changes, and open-detail routes preserve the same command identity everywhere
    appearance_checks:
      zoom_stability: required
      reduced_motion: required
      high_contrast: required
    tree_coverage_row_refs:
      - tree_coverage.diff_review
    fixture_refs:
      - fixtures/accessibility/ime_and_text_cases/mixed_direction_technical_strings.yaml
      - fixtures/accessibility/ime_and_text_cases/copy_representation_parity.yaml
    failure_class_refs:
      - focus_return_regression
      - announcement_missing
      - bidi_copy_drift
      - tree_node_missing
    seeded_result_state: pending_evidence

  - checklist_id: shell_conformance.sign_in_or_trust_prompt_recovery
    journey_label: Sign-in or trust prompt with safe recovery path
    surface_group: sign_in_and_trust_prompt
    platform_profile_scope: all_claimed_desktop_profiles
    assistive_technology_row_refs:
      - at.voiceover.macos.core_shell
      - at.nvda.windows.core_shell
      - at.orca.linux.gnome.core_shell
    input_row_refs:
      - input.macos.text_input_services
      - input.windows.tsf_primary
      - input.linux.ibus_gnome
    locale_row_refs:
      - locale.shared.source_and_pseudoloc_shell
      - locale.shared.cjk_and_emoji_input
    required_keyboard_actions:
      - navigate allow, deny, help, device-code, or continue-local routes
      - leave the prompt and return to a productive local or restricted path
    required_announcements:
      - capability, owner, scope, expiry, and blocked reasons are narrated
      - browser handoff and device-code fallback remain explicit
    focus_return_expectation: return to the invoking control or the next safe working surface after dismiss or denial
    shortcut_narration_expectation: trust-changing actions expose specific labels instead of generic yes-no narration
    appearance_checks:
      zoom_stability: required
      reduced_motion: required
      high_contrast: required
    tree_coverage_row_refs:
      - tree_coverage.sign_in_and_trust_prompt
    fixture_refs:
      - fixtures/accessibility/ime_and_text_cases/platform_input_feature_unavailable.yaml
    failure_class_refs:
      - keyboard_route_missing
      - focus_return_regression
      - announcement_missing
      - zoom_instability
      - tree_node_missing
    seeded_result_state: pending_evidence

  - checklist_id: shell_conformance.terminal_output_follow_up
    journey_label: Terminal output flow and follow-up actions
    surface_group: terminal_output
    platform_profile_scope: all_claimed_desktop_profiles
    assistive_technology_row_refs:
      - at.voiceover.macos.core_shell
      - at.nvda.windows.core_shell
      - at.orca.linux.gnome.core_shell
    input_row_refs:
      - input.macos.text_input_services
      - input.windows.tsf_primary
      - input.linux.ibus_gnome
    locale_row_refs:
      - locale.shared.rtl_mixed_direction_technical_content
      - locale.shared.cjk_and_emoji_input
    required_keyboard_actions:
      - move by command boundary, inspect transcript details, copy raw or escaped content, and return to the invoking task or editor
      - keep terminal text entry and command routing distinct while composition is active
    required_announcements:
      - command boundary, target identity, exit code, reconnect or rerun requirement, and blocked reasons remain narrated
      - copy actions preserve raw versus escaped representation cues
    focus_return_expectation: return to the invoking task, editor region, or focused terminal session summary
    shortcut_narration_expectation: rerun and export-transcript actions preserve their command identity and safe consequence class
    appearance_checks:
      zoom_stability: required
      reduced_motion: required
      high_contrast: required
    tree_coverage_row_refs:
      - tree_coverage.terminal_output
    fixture_refs:
      - fixtures/accessibility/ime_and_text_cases/mixed_direction_technical_strings.yaml
      - fixtures/accessibility/ime_and_text_cases/copy_representation_parity.yaml
      - fixtures/accessibility/ime_and_text_cases/editor_ime_dead_key_altgr_emoji_commit.yaml
    failure_class_refs:
      - announcement_missing
      - ime_preedit_loss
      - bidi_copy_drift
      - tree_node_missing
    seeded_result_state: pending_evidence

  - checklist_id: shell_conformance.dense_collection_batch_review
    journey_label: Dense collection and batch-review flow
    surface_group: dense_collection_batch_review
    platform_profile_scope: all_claimed_desktop_profiles
    assistive_technology_row_refs:
      - at.voiceover.macos.core_shell
      - at.nvda.windows.core_shell
      - at.orca.linux.gnome.core_shell
    locale_row_refs:
      - locale.shared.source_and_pseudoloc_shell
      - locale.shared.rtl_mixed_direction_technical_content
    required_keyboard_actions:
      - move through a virtualized collection, select visible rows, select all matching query, extend a range, and open a batch review sheet
      - return to the originating row after the review sheet closes
    required_announcements:
      - row identity, position-in-set, selected count, blocked or hidden count, and query-backed scope remain narrated
      - range anchor changes remain explicit when the range extends across virtualized rows
    focus_return_expectation: return to the originating row or nearest visible owner after review-sheet close
    shortcut_narration_expectation: select-all-matching-query and batch-review actions preserve their stable command identity
    appearance_checks:
      zoom_stability: required
      reduced_motion: required
      high_contrast: required
    tree_coverage_row_refs:
      - tree_coverage.dense_collection_batch_review
    fixture_refs:
      - fixtures/accessibility/ime_and_text_cases/virtualized_selection_scope.yaml
      - fixtures/accessibility/ime_and_text_cases/range_selection_anchor_stability.yaml
      - fixtures/accessibility/ime_and_text_cases/multi_window_mixed_dpi_composition.yaml
    failure_class_refs:
      - focus_order_regression
      - virtualized_selection_count_drift
      - range_anchor_drift
      - mixed_dpi_focus_loss
      - tree_node_missing
    seeded_result_state: pending_evidence
