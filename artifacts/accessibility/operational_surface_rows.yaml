# Operational-surface accessibility-parity rows.
#
# Machine-readable companion to
# docs/accessibility/operational_surface_parity_contract.md and
# schemas/accessibility/operational_surface_state.schema.json.
#
# Rules.
#   - Every row covers one operational_surface_family from the closed
#     seven-class vocabulary. New families are additive-minor and bump
#     operational_surface_state_schema_version.
#   - Every row reports parity_state for all 13 closed parity dimensions.
#     Missing or pending evidence remains explicit; silent fallback is
#     forbidden.
#   - Rows reuse the existing assistive-tech, accessibility-tree, and
#     focus/zoom/pointer artifacts rather than minting new identifiers.
#   - required_actions and required_states are subsets of the closed
#     action_class and state_class vocabularies. Adding a value is
#     additive-minor and requires a schema bump and a new fixture or
#     coverage row.
#   - Rows are not platform-specific assistive-technology adapter
#     evidence; per-AT evidence still lives in
#     artifacts/accessibility/assistive_tech_coverage_rows.yaml.

