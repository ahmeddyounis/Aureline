    continuity_and_intent_preservation_hooks:
      - hook_id: restore_provenance_ref
        source_ref: schemas/state/restore_provenance.schema.json
        note: Restore packets must quote the shared restore-provenance record rather than restating fidelity in prose.
      - hook_id: mutation_group_ref
        source_ref: schemas/workspace/mutation_journal.schema.json
        note: Replay or restore actions remain attributable to the mutation lineage that created the checkpoint.
      - hook_id: local_history_snapshot_ref
        source_ref: docs/workspace/mutation_lineage_model.md
        status: reserved_until_checkpoint_record_family_lands
        note: Reserved local-history join so restore latency and recoverability stay reviewable together.
      - hook_id: entry_and_restore_result_ref
        source_ref: schemas/workspace/entry_and_restore_result.schema.json
        note: Restore-facing result packets remain the source of truth for delivered restore level.

