# Protected-path evidence-linkage seed.
#
# One machine-readable join table from protected path id to the current
# journey traces, corpus rows, qualification rows, packet families, and
# continuity hooks that review or constrain the path.

schema_version: 1
seed_id: aureline.protected_path_evidence_linkage
seed_revision: 1
status: seeded

overview_document: docs/benchmarks/protected_path_ledgers.md
protected_path_ledger_ref: artifacts/perf/protected_path_ledger.yaml
latency_budget_ledger_ref: artifacts/perf/latency_budget_ledger.yaml
journey_trace_schema_ref: schemas/traces/journey_trace.schema.json
benchmark_corpus_source: fixtures/benchmarks/corpus_manifest.yaml
fitness_function_catalog_source: artifacts/bench/fitness_function_catalog.yaml
protected_metrics_source: artifacts/bench/protected_metrics.yaml
qualification_matrix_source: artifacts/compat/qualification_matrix_seed.yaml
task_success_source: artifacts/product/task_success_corpus_seed.yaml
governance_packet_template_source: artifacts/governance/governance_packet_template.yaml
release_evidence_packet_template_source: docs/release/release_evidence_packet_template.md
support_bundle_schema_source: schemas/support/support_bundle.schema.json

review_packet_family_vocabulary:
  - benchmark_report
  - verification
  - compatibility_report
  - claim_manifest
  - shiproom
  - support_bundle
  - release_evidence_packet

link_rows:
  - evidence_row_id: evidence.path.shell.launch
    path_id: path.shell.launch
    budget_id: budget.path.shell.launch
    journey_trace_refs:
      - journey.startup_to_first_useful_chrome.micro_local_folder
    journey_trace_files:
      - fixtures/journeys/startup_to_first_useful_chrome__micro_local_folder.json
    trace_segment_refs:
      - seg.startup_to_first_useful_chrome.startup
    trace_taxonomy_refs:
      - docs/benchmarks/journey_trace_taxonomy.md
    benchmark_corpus_refs:
      - corpus.workflow.startup_warm_to_first_paint
      - corpus.reference.micro_local_folder
    supporting_seed_refs:
      - fixtures/workspaces/reference/micro_local_folder.json
      - artifacts/benchmarks/dashboard_seed/raw/benchmark_run.seed.self_capture.json
    fitness_function_refs:
      - ff.warm_start_to_first_paint
      - ff.first_paint
    protected_metrics_refs:
      - ff.warm_start_to_first_paint
      - ff.first_paint
    qualification_row_refs:
      - compat_row:desktop_benchmark_lab.exact_build_identity
      - compat_row:release_identity.exact_build_propagation
    review_packets:
      - family: benchmark_report
        source_ref: artifacts/governance/governance_packet_template.yaml
        required_when: startup_latency_or_release_bar_is_cited
      - family: claim_manifest
        source_ref: artifacts/governance/governance_packet_template.yaml
        required_when: public shell-speed wording is emitted
      - family: shiproom
        source_ref: artifacts/governance/governance_packet_template.yaml
        required_when: promotion or waiver review cites startup evidence
      - family: release_evidence_packet
        source_ref: docs/release/release_evidence_packet_template.md
        required_when: release packet aggregates startup proof
    evidence_channels:
      - benchmark_lab.bootstrap_entry_parity
      - support_bundle.performance_summary
      - release_evidence.claim_manifest

