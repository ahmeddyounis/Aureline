      - family: compatibility_report
        source_ref: artifacts/governance/governance_packet_template.yaml
        required_when: save/export lineage contracts are reviewed
      - family: shiproom
        source_ref: artifacts/governance/governance_packet_template.yaml
        required_when: save-path waiver or promotion review touches the row
      - family: support_bundle
        source_ref: schemas/support/support_bundle.schema.json
        required_when: support export cites save-path truth
      - family: release_evidence_packet
        source_ref: docs/release/release_evidence_packet_template.md
        required_when: release packet aggregates save-path proof
    evidence_channels:
      - benchmark_lab.vfs_save_pipeline
      - boundary_truth.save_target_token
      - boundary_truth.mutation_journal
      - support_bundle.performance_summary
    continuity_and_intent_preservation_hooks:
      - hook_id: mutation_journal_entry_ref
        source_ref: schemas/workspace/mutation_journal.schema.json
        note: Save evidence must point to the mutation or mutation-group that produced the bytes.
      - hook_id: save_manifest_ref
        source_ref: schemas/runtime/vfs_save_envelope.schema.json
        note: Save-path evidence carries compare-before-write and save-mode truth through the save manifest.
      - hook_id: local_history_snapshot_ref
        source_ref: docs/workspace/mutation_lineage_model.md
        status: reserved_until_checkpoint_record_family_lands
        note: Reserved local-history join so save latency and user-intent preservation can be reviewed together.
      - hook_id: generated_artifact_lineage_ref
        source_ref: schemas/workspace/generated_artifact_lineage.schema.json
        note: Generated or mirrored writes stay attributable on save paths.

