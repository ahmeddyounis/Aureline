comparability_reset_triggers:
  - profile_hardware_changed
  - lab_image_revision_changed
  - ambient_contract_changed
  - screen_configuration_changed
  - power_policy_changed
  - thermal_posture_changed
  - calibration_rule_set_changed
  - network_contract_changed
  - provisional_target_eased_or_tightened
