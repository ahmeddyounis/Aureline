# Reference hardware manifest for benchmark-lab and publication packets.
#
# This file freezes the hardware rows and display classes Aureline cites
# when a benchmark packet claims reference-hardware comparability. The
# benchmark run-result schema, power / thermal methodology, publication
# packet template, and self-capture parity guidance all resolve through
# these ids rather than inventing private machine labels per lane.

schema_version: 1
manifest_id: aureline.reference_hardware_manifest
manifest_revision: 1
status: seeded

overview_pages:
  - docs/benchmarks/benchmark_lab_run_results.md
  - docs/perf/self_capture_parity.md
  - docs/perf/power_thermal_methodology.md
lab_image_manifest_ref: artifacts/perf/lab_image_manifest.yaml
publication_refs:
  - docs/benchmarks/benchmark_publication_pack_template.md
  - docs/benchmarks/public_comparison_rules.md

display_classes:
  - id: display_class.internal_14in_retina_3024x1964_sdr60
    label: 14-inch internal Retina panel at 3024x1964 SDR 60 Hz capture
    class_kind: internal_panel
    resolution_label: 3024x1964
    capture_refresh_hz: 60
    native_refresh_hz: 120
    brightness_nits: 200
    scaling_mode: default_scaling
    color_profile: sdr_reference
    notes: >
      Internal panel only. Disable HDR, True Tone, Night Shift, and
      adaptive brightness during protected benchmark capture.

  - id: display_class.internal_14in_1920x1200_sdr60
    label: 14-inch internal 1920x1200 SDR 60 Hz capture panel
    class_kind: internal_panel
    resolution_label: 1920x1200
    capture_refresh_hz: 60
    native_refresh_hz: 60
    brightness_nits: 200
    scaling_mode: 100_percent_scale
    color_profile: sdr_reference
    notes: >
      Use the internal panel only. Disable adaptive brightness and any
      vendor dynamic refresh or HDR override before capture.

  - id: display_class.internal_13_5in_2256x1504_sdr60
    label: 13.5-inch internal 2256x1504 SDR 60 Hz capture panel
    class_kind: internal_panel
    resolution_label: 2256x1504
    capture_refresh_hz: 60
    native_refresh_hz: 60
    brightness_nits: 200
    scaling_mode: 100_percent_scale
    color_profile: sdr_reference
    notes: >
      Framework 13 internal panel only. GNOME Wayland fractional scaling
      and HDR stay disabled for protected runs.

  - id: display_class.self_capture.current_machine_reported
    label: Self-capture display reported out of band
    class_kind: self_capture_placeholder
    resolution_label: null
    capture_refresh_hz: null
    native_refresh_hz: null
    brightness_nits: null
    scaling_mode: capture_sidecar_required
    color_profile: capture_sidecar_required
    notes: >
      Use only when the run context is self_capture or provisional and the
      current machine has not been normalized into a promoted display
      class. The run summary MUST disclose the actual display state.

hardware_rows:
  - id: hardware_definition.ref.macos15.arm64.apple_silicon_14in
    label: Apple Silicon macOS 15 14-inch reference laptop
    row_class: council_reference
    operating_system: macOS 15.4
    architecture_class: arm64
    cpu: Apple M3 Pro 12-core
    gpu: Integrated Apple GPU 18-core
    memory_gib: 36
    storage: 1 TB internal NVMe SSD
    default_display_class_id: display_class.internal_14in_retina_3024x1964_sdr60
    supported_display_class_ids:
      - display_class.internal_14in_retina_3024x1964_sdr60
    default_power_posture_id: power_posture.ac_balanced
    recommended_lab_image_ref: lab_image.macos15.arm64.rev1
    benchmark_scope: primary_macos_reference
    council_status: approved_reference_baseline
    notes: >
      Primary Apple Silicon reference row for protected startup, editing,
      and public benchmark evidence on macOS.

  - id: hardware_definition.ref.windows11.x86_64.thinkpad_t14_gen5
    label: Windows 11 x86_64 mainstream reference laptop
    row_class: council_reference
    operating_system: Windows 11 24H2
    architecture_class: x86_64
    cpu: AMD Ryzen 7 PRO 8840U
    gpu: Integrated Radeon 780M
    memory_gib: 32
    storage: 1 TB internal NVMe SSD
    default_display_class_id: display_class.internal_14in_1920x1200_sdr60
    supported_display_class_ids:
      - display_class.internal_14in_1920x1200_sdr60
    default_power_posture_id: power_posture.ac_balanced
    recommended_lab_image_ref: lab_image.windows11.x86_64.rev1
    benchmark_scope: mainstream_windows_reference
    council_status: approved_reference_baseline
    notes: >
      Mainstream Windows x86_64 row for cross-release startup, typing,
      and packaging claims. Use Balanced power mode unless a narrower
      packet says otherwise.

  - id: hardware_definition.ref.ubuntu24_04.x86_64.framework13
    label: Ubuntu 24.04 x86_64 mainstream reference laptop
    row_class: council_reference
    operating_system: Ubuntu 24.04.2 LTS GNOME Wayland
    architecture_class: x86_64
    cpu: AMD Ryzen 7 7840U
    gpu: Integrated Radeon 780M
    memory_gib: 32
    storage: 1 TB internal NVMe SSD
    default_display_class_id: display_class.internal_13_5in_2256x1504_sdr60
    supported_display_class_ids:
      - display_class.internal_13_5in_2256x1504_sdr60
    default_power_posture_id: power_posture.ac_balanced
    recommended_lab_image_ref: lab_image.ubuntu24_04.x86_64.rev1
    benchmark_scope: mainstream_linux_reference
    council_status: approved_reference_baseline
    notes: >
      Mainstream Linux x86_64 row for protected benchmark and
      compatibility evidence on GNOME Wayland.

  - id: hardware_definition.self_capture.current_machine_reported
    label: Self-capture current machine reported out of band
    row_class: self_capture_placeholder
    operating_system: recorded_in_local_capture_summary
    architecture_class: recorded_in_local_capture_summary
    cpu: recorded_in_local_capture_summary
    gpu: recorded_in_local_capture_summary
    memory_gib: null
    storage: recorded_in_local_capture_summary
    default_display_class_id: display_class.self_capture.current_machine_reported
    supported_display_class_ids:
      - display_class.self_capture.current_machine_reported
    default_power_posture_id: power_posture.self_capture.reported_out_of_band
    recommended_lab_image_ref: lab_image.self_capture.unmanaged_local.rev1
    benchmark_scope: self_capture_only
    council_status: not_reference_eligible_without_promotion
    notes: >
      Keeps self-capture exports honest when the local machine has not
      been promoted to a council-approved reference row. This id alone
      MUST NOT justify comparable_to_baseline claims.
