        description: >
          A remote_ssh_target MUST stack local_host_boundary
          outermost and remote_ssh_boundary inside; collapsing the
          stack is non-conforming.
      - id: remote_ssh_adapter_confidence_recommended
        description: >
          A remote_ssh_target row SHOULD carry an
          adapter_confidence_placeholder; absence is a seed-packet
