        description: >
          A local_only_continuation row MUST preserve the prior
          managed-workspace instance ref under
          prior_target_ref so re-connection can resume later.

# Cross-walk from reviewer-facing managed_workspace_reviewer_label
# to admissible lifecycle states and admissible reapproval classes.
managed_workspace_reviewer_label_matrix:
  - reviewer_label: warming
    admissible_lifecycle_states:
      - provisioning
      - warming
    admissible_reapproval_requirement_classes:
      - no_reapproval_required
      - approval_ticket_reissue_required
      - admin_confirmation_required
    notes: >
      Capsule or prebuild warmers running. Launches queue or deny
      with a typed reason until lifecycle reaches ready.
  - reviewer_label: ready
    admissible_lifecycle_states:
      - ready
    admissible_reapproval_requirement_classes:
      - no_reapproval_required
      - session_ticket_refresh_required
    notes: >
      Normal launch target. Session-ticket refresh may still be
      required if the active ticket has aged.
  - reviewer_label: degraded
    admissible_lifecycle_states:
      - recovering
    admissible_reapproval_requirement_classes:
      - no_reapproval_required
      - session_ticket_refresh_required
      - admin_confirmation_required
    notes: >
      Control plane detected a drift; recovery in flight. Overlaying
      degraded on paused, suspended, or expired is non-conforming.
  - reviewer_label: paused
    admissible_lifecycle_states:
      - snapshot_paused
    admissible_reapproval_requirement_classes:
      - no_reapproval_required
      - session_ticket_refresh_required
    notes: >
      User or admin pause with snapshot. Resume restores from the
      snapshot.
  - reviewer_label: suspended
    admissible_lifecycle_states:
      - idle_suspended
    admissible_reapproval_requirement_classes:
      - no_reapproval_required
      - session_ticket_refresh_required
    notes: >
      Idle-window auto-suspend; filesystem preserved. Resume needs
      reactivation.
  - reviewer_label: expired
    admissible_lifecycle_states:
      - hibernated
      - retiring
      - retired
      - ready
    admissible_reapproval_requirement_classes:
      - session_ticket_refresh_required
      - approval_ticket_reissue_required
      - admin_confirmation_required
      - policy_narrowing_required
    notes: >
      Hibernated snapshot, retired instance, or live session with
      expired ticket. Distinguished by expiry_reason_class.
  - reviewer_label: local_only_continuation
    admissible_lifecycle_states:
      - undeclared
      - idle_suspended
      - recovering
      - quarantined
    admissible_reapproval_requirement_classes:
      - no_reapproval_required
      - trust_reevaluation_required
    notes: >
      Remote or managed target unreachable; editor continues in a
      reduced-scope local-only mode. Carries
      local_only_continuation_reason_class.

# Cross-walk from wrong_target_correction_class to admissible
# reapproval_requirement_class tokens. Silent swaps are non-conforming.
wrong_target_correction_matrix:
  - correction_class: no_correction_needed
    admissible_reapproval_requirement_classes:
      - no_reapproval_required
  - correction_class: corrected_before_commit
    admissible_reapproval_requirement_classes:
      - no_reapproval_required
      - session_ticket_refresh_required
      - approval_ticket_reissue_required
      - admin_confirmation_required
      - policy_narrowing_required
  - correction_class: corrected_after_partial_effect
    admissible_reapproval_requirement_classes:
      - approval_ticket_reissue_required
      - admin_confirmation_required
      - policy_narrowing_required
      - trust_reevaluation_required
  - correction_class: requires_user_confirmation
    admissible_reapproval_requirement_classes:
      - no_reapproval_required
      - trust_reevaluation_required
      - policy_narrowing_required
  - correction_class: blocked_pending_reapproval
    admissible_reapproval_requirement_classes:
      - session_ticket_refresh_required
      - approval_ticket_reissue_required
      - admin_confirmation_required
      - policy_narrowing_required
      - trust_reevaluation_required

# Surface-admissibility summary. A surface not listed for a row may
# not claim that row; it quotes one minted by a listed surface.
surface_admissibility_rules:
  - surface: shell_command_router
    may_mint_target_truth_record: true
    projection_rule: >
      MUST emit one target_truth_record per launch session; MUST
      reuse the frozen vocabularies and never widen confidence on
      projection.
  - surface: support_export
    may_mint_target_truth_record: false
    projection_rule: >
      MUST quote an existing target_truth_record; MUST preserve
      prior_target_ref and reapproval_requirement_class. MUST carry
      operator_only_restricted posture whenever cue stack contains a
      non-local boundary.
  - surface: object_handoff_packet
    may_mint_target_truth_record: false
    projection_rule: >
      Quotes the packet minted by the shell; MUST NOT re-derive.
      Carries failing object's route and boundary context and any
      wrong-target correction class.
  - surface: release_evidence_packet
    may_mint_target_truth_record: false
    projection_rule: >
      MUST quote freshness class. A stale record MAY NOT render as
      authoritative_live. Carries the target-truth record id on
      every release-blocking claim.
  - surface: ai_tool_call_plane
    may_mint_target_truth_record: true
    projection_rule: >
      MUST render cue stack inline; MUST NOT widen confidence. May
      mint target_truth_record for AI tool-call flows that resolve
      their own sandbox target.
  - surface: notebook_kernel
    may_mint_target_truth_record: true
    projection_rule: >
      Local and remote kernels mint target_truth_record for their
      kernel target. When kernel runs inside a managed workspace,
      MUST preserve notebook-kernel cue as innermost.
  - surface: doctor_repair
    may_mint_target_truth_record: true
    projection_rule: >
      Read-only probes mint target_truth_record; resolver_unavailable
      is admissible on inspection rows without blocking. Repair
      commits follow the same reapproval rules as the shell.
