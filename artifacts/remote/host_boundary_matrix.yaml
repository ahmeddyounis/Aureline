# Host-boundary matrix.
#
# Machine-readable matrix binding every admissible combination of
# action_route_class, action_target_class, host_boundary_cue_stack,
# managed_workspace_lifecycle_state, and reachability_state to the
# surfaces that MAY claim it (shell command router, support export,
# object-handoff packet, release evidence packet, AI tool-call plane,
# notebook kernel, doctor repair) and the reapproval-requirement and
# export-posture rules each row obeys.
#
# Companion to docs/verification/target_and_host_boundary_packet.md
# and fixtures/remote/target_confidence_manifest.yaml. If this file
# and the packet doc disagree, the packet doc wins for reviewer
# language and the frozen taxonomies
# (docs/runtime/target_discovery_and_install_review_taxonomy.md and
# docs/runtime/origin_target_route_taxonomy.md) win for tooling.
#
# Rules:
#   - Every row MUST quote tokens from the frozen vocabularies; no
#     new tokens. Extending the matrix with additional combinations
#     is additive-minor. Repurposing a row is breaking and requires
#     a new decision row in artifacts/governance/decision_index.yaml.
#   - Every row names at least one conformance test.
#   - A projection that falls outside this matrix is non-conforming;
#     the matrix is extended in the same change that lands the
#     projection.

host_boundary_matrix_schema_version: 1

sources:
  packet_doc: docs/verification/target_and_host_boundary_packet.md
  target_confidence_manifest: fixtures/remote/target_confidence_manifest.yaml
  reapproval_cases_dir: fixtures/remote/reapproval_and_suspend_resume_cases
  target_discovery_taxonomy: docs/runtime/target_discovery_and_install_review_taxonomy.md
  origin_target_route_taxonomy: docs/runtime/origin_target_route_taxonomy.md
  managed_workspace_lifecycle: artifacts/runtime/managed_workspace_lifecycle.yaml
  action_route_truth: artifacts/runtime/action_origin_target_labels.yaml
  execution_context_schema: schemas/runtime/execution_context.schema.json

# Frozen vocabularies re-exported for tooling.
host_boundary_cue_class_vocabulary:
  - local_host_boundary
  - user_mode_sandbox_boundary
  - container_kernel_boundary
  - devcontainer_boundary
  - remote_ssh_boundary
  - remote_agent_boundary
  - managed_workspace_boundary
  - notebook_kernel_boundary
  - ai_sandbox_boundary
  - browser_handoff_return_boundary
  - bridged_host_boundary

action_target_class_vocabulary:
  - local_host_target
  - user_mode_sandbox_target
  - container_local_target
  - devcontainer_target
  - remote_ssh_target
  - remote_agent_target
  - managed_workspace_target
  - notebook_kernel_local_target
  - notebook_kernel_remote_target
  - ai_sandbox_target
  - connected_provider_target
  - embedded_webview_target
  - system_browser_target
  - native_os_callback_target
  - publish_release_target
  - tunnel_exposed_target
  - bridged_helper_target
  - unknown_target_class

action_route_class_vocabulary:
  - in_process_route
  - local_rpc_route
  - remote_rpc_route
  - managed_control_plane_route
  - remote_agent_attach_route
  - approval_gated_route
  - browser_handoff_route
  - embedded_webview_route
  - native_callback_route
  - provider_webhook_return_route
  - publish_pipeline_route
  - tunnel_exposed_route
  - mirror_or_private_registry_route
  - bridged_helper_route
  - heuristic_unknown_route

managed_workspace_lifecycle_state_vocabulary:
  - undeclared
  - provisioning
  - warming
  - ready
  - idle_suspended
  - snapshot_paused
  - hibernated
  - recovering
  - quarantined
  - retiring
  - retired

claimant_surface_vocabulary:
  - shell_command_router
  - support_export
  - object_handoff_packet
  - release_evidence_packet
  - ai_tool_call_plane
  - notebook_kernel
  - doctor_repair

redaction_class_vocabulary:
  - metadata_and_hashes_only
  - support_bundle_scoped
  - broadened_capture

export_inclusion_posture_vocabulary:
  - metadata_safe_default
  - operator_only_restricted
  - broadened_capture_opt_in

rows:

  - id: row.local_host.in_process.read
    action_route_class: in_process_route
    action_target_class: local_host_target
    execution_target_class: local_host
    host_boundary_cue_stack:
      - local_host_boundary
    admissible_lifecycle_states: []
    admissible_reachability_states:
      - reachable
    minimum_fields:
      - target_class
      - action_route_class
      - action_target_class
      - target_discovery_confidence_class
      - host_boundary_cue_stack
      - reachability_state
      - freshness_class
    may_be_claimed_by:
      - shell_command_router
      - support_export
      - object_handoff_packet
      - release_evidence_packet
      - ai_tool_call_plane
      - notebook_kernel
      - doctor_repair
    redaction_class: metadata_and_hashes_only
    default_export_inclusion_posture: metadata_safe_default
    admissible_reapproval_requirement_classes:
      - no_reapproval_required
      - trust_reevaluation_required
    conformance_tests:
      - id: local_read_no_authority_required
        description: >
          A local_host_target + in_process_route read MAY carry
          authority_linkage_class = no_authority_required_read_only;
          any higher linkage is unnecessary and MUST NOT be minted.

  - id: row.local_host.local_rpc.mutation
    action_route_class: local_rpc_route
    action_target_class: local_host_target
    execution_target_class: local_host
    host_boundary_cue_stack:
      - local_host_boundary
    admissible_lifecycle_states: []
    admissible_reachability_states:
      - reachable
    minimum_fields:
      - target_class
      - action_route_class
      - action_target_class
      - target_discovery_confidence_class
      - host_boundary_cue_stack
      - reachability_state
      - freshness_class
      - authority_linkage_class
    may_be_claimed_by:
      - shell_command_router
      - support_export
      - object_handoff_packet
      - release_evidence_packet
      - ai_tool_call_plane
      - notebook_kernel
      - doctor_repair
    redaction_class: metadata_and_hashes_only
    default_export_inclusion_posture: metadata_safe_default
    admissible_reapproval_requirement_classes:
      - no_reapproval_required
      - trust_reevaluation_required
    conformance_tests:
      - id: local_mutation_preserves_keystroke_authority
        description: >
          A local_host_target + local_rpc_route mutation MUST carry
          authority_linkage_class = local_user_keystroke_authority
          when the origin is user_keystroke_local.

  - id: row.remote_ssh.remote_rpc.mutation
    action_route_class: remote_rpc_route
    action_target_class: remote_ssh_target
    execution_target_class: remote_ssh
    host_boundary_cue_stack:
