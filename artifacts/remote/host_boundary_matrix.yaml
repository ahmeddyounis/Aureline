          or authority_missing_denied. No silent linkage is
          admissible.
      - id: remote_agent_unreachable_forces_reapproval
        description: >
          A remote_agent_target with adapter_unreachable MUST force
          wrong_target_correction_class in {blocked_pending_reapproval,
          requires_user_confirmation}.

