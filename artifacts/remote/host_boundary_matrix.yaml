          A managed_workspace_target row MUST carry
          managed_workspace_lifecycle_state,
          managed_workspace_reviewer_label, and
          activation_budget_summary_ref. Omitting any of the three
          is non-conforming.
      - id: managed_workspace_expired_requires_expiry_reason
        description: >
          managed_workspace_reviewer_label = expired MUST carry an
          expiry_reason_class; null is non-conforming.
      - id: managed_workspace_degraded_overlays_recovering_only
        description: >
          managed_workspace_reviewer_label = degraded may overlay
          lifecycle state recovering only; overlays on paused,
          suspended, or expired are non-conforming.

