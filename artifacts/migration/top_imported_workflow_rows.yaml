publication_rules:
  - rule_id: publication_rule:quote_scorecard_id_and_caveat
    summary: >
      Every public, support, or release projection of an imported
      extension or workflow compatibility decision quotes the same
      scorecard_id, effective_status, and caveat.
    required_action: >
      Docs, migration center, compatibility reports, claim manifests,
      release notes, support exports, and issue templates may shorten the
      text but may not widen the scorecard's effective status.
    refs:
      - docs/migration/compatibility_scorecard_contract.md
      - artifacts/governance/public_truth_parity_matrix.yaml
  - rule_id: publication_rule:same_change_set_for_claim_drift
    summary: >
      A scorecard status or caveat change that affects public wording
      moves with the claim manifest, compatibility report, and docs/help
      link updates.
    required_action: >
      Widening or narrowing copy without the scorecard update is
      non-conforming; unresolved late proof must route through the
      late-proof exception packet.
    refs:
      - docs/docsops/same_changeset_policy.md
      - schemas/docs/late_proof_exception_packet.schema.json
  - rule_id: publication_rule:no_aggregate_hide_blockers
    summary: >
      Aggregated migration or workflow-bundle claims may not hide partial,
      community-only, blocked, deprecated, replaced, stale, or
      missing-evidence sub-rows.
    required_action: >
      The aggregate row keeps blocker scorecard refs attached or narrows
      the public claim before publication.
    refs:
      - docs/release/compatibility_report_template.md
      - artifacts/governance/claim_manifest_seed.yaml

scoring_semantics:
  - rule_id: scoring:supported_current_only
    summary: >
      supported means the native or bridge path is current, evidence-backed,
      documented, and linked to the relevant compatibility row.
    required_action: >
      Stale evidence, missing docs/help refs, or a narrower compatibility
      row downgrades supported to partial or blocked before publication.
    refs:
      - schemas/migration/compatibility_scorecard.schema.json#/$defs/scorecard_status
  - rule_id: scoring:partial_keeps_gaps_visible
    summary: >
      partial means some capabilities translate or run while named gaps,
      manual review, or caveats remain user-visible.
    required_action: >
      Surfaces must render affected commands, settings, workflow steps, or
      extension capabilities rather than reducing the row to a prose note.
    refs:
      - docs/migration/first_run_import_diff_and_rollback_contract.md
  - rule_id: scoring:blocked_denies_apply
    summary: >
      blocked means no safe native or bridge path is currently claimable,
      or the path would widen authority.
    required_action: >
      Import/apply is denied for the blocked object and the row must carry
      docs/help and support-export refs.
    refs:
      - docs/adr/0018-workspace-trust-and-restricted-mode.md
  - rule_id: scoring:replaced_is_not_runtime_parity
    summary: >
      replaced means a native Aureline path should be recommended instead
      of preserving the source extension or workflow runtime.
    required_action: >
      Public copy may recommend the native path, but must not imply source
      extension runtime parity or bridge compatibility.
    refs:
      - docs/ecosystem/extension_lockfile_and_recommendation_contract.md

refresh_rules:
  - rule_id: refresh:source_or_target_version_changed
    summary: >
      Source extension/plugin versions, source profile fixtures, native
      packages, native commands, and workflow-bundle revisions invalidate
      affected scorecard evidence.
    required_action: >
      Refresh the row or downgrade its effective_status before the next
      docs/help, claim-manifest, compatibility-report, or support-export
      publication.
    refs:
      - artifacts/qe/workflow_bundle_ids.yaml
      - artifacts/governance/evidence_rerun_triggers.yaml
  - rule_id: refresh:bridge_or_permission_changed
    summary: >
      Bridge profile, host ABI, permission vocabulary, or policy admission
      changes require retest before a row can stay supported.
    required_action: >
      Mark the row retest_pending, partial, or blocked until bridge and
      permission evidence are current.
    refs:
      - docs/extensions/wit_host_contract_seed.md
      - docs/adr/0012-extension-manifest-permission-publisher-policy.md
  - rule_id: refresh:docs_or_claim_projection_changed
    summary: >
      Docs/help, known-limit, migration-note, support-export,
      compatibility-report, or claim-manifest projection changes require
      scorecard review.
    required_action: >
      Keep the row caveat and effective status synchronized with every
      public-truth projection.
    refs:
      - artifacts/governance/public_truth_parity_matrix.yaml
      - artifacts/governance/claim_manifest_seed.yaml

