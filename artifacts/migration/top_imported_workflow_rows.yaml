# Imported-extension and workflow compatibility scorecard seed packet.
#
# Tooling, migration-center prototypes, docs/help publication, claim
# manifest checks, compatibility reports, and support exports read this
# packet. The narrative contract lives in
# docs/migration/compatibility_scorecard_contract.md and the schema lives at
# schemas/migration/compatibility_scorecard.schema.json. If they disagree,
# the schema and this packet are authoritative and the narrative is updated
# in the same change.

