# Migration-gap scoreboard.
#
# Tooling, migration-center prototypes, docs/help projections, claim
# manifest checks, release compatibility reports, and support exports
# read this packet. The narrative companion lives in
# docs/migration/migration_restore_and_shortcut_delta_packet.md and the
# shortcut-delta digest schema lives at
# schemas/migration/shortcut_delta_digest.schema.json. If they
# disagree, this file plus the schema are authoritative and the
# narrative is updated in the same change.
#
# Scope:
#   - Freeze ecosystem/source x affected-surface rows for the governed
#     migration claim, with one closed gap_status, docs/help fallback,
#     compatibility scorecard linkage, and claim-narrowing implication
#     per row.
#   - Keep the same row source for migration center, docs, claim
#     manifests, support exports, and release compatibility rows.
#   - A row absent from this file is absent from the marketed migration
#     claim.

