publication_rules:
  - rule_id: scoreboard_rule:row_source_parity
    summary: >
      Migration center, docs/help, claim manifests, release
      compatibility reports, and support exports read the same
      scoreboard rows. Surfaces may shorten or reorder rows but may
      not invent gap rows that did not travel through the scoreboard.
    required_action: >
      Cite the scoreboard_row_id in every projection of a gap row.
    refs:
      - docs/migration/migration_restore_and_shortcut_delta_packet.md
      - artifacts/governance/public_truth_parity_matrix.yaml
  - rule_id: scoreboard_rule:no_aggregation_hides_blockers
    summary: >
      Aggregations that report a session as 'imported successfully'
      may not hide approximated, skipped, or blocked rows.
    required_action: >
      Aggregated rows preserve the strongest non-exact gap_status and
      its claim_narrowing_implication.
    refs:
      - docs/release/compatibility_report_template.md
      - artifacts/governance/claim_manifest_seed.yaml
  - rule_id: scoreboard_rule:same_change_set_for_narrowing
    summary: >
      A scoreboard row whose claim_narrowing_implication changes the
      marketed claim moves with the docs/help, claim manifest, and
      release report updates in the same change set.
    required_action: >
      Late copy or release widening above the row implication requires
      a late-proof exception packet; otherwise the widening is held.
    refs:
      - docs/docsops/same_changeset_policy.md
      - schemas/docs/late_proof_exception_packet.schema.json

narrowing_rules:
  - rule_id: narrowing_rule:partial_or_lower_restore_narrows_keymap
    summary: >
      Restore fidelity of approximated, manual_review_after_restore,
      or partial_restore_with_visible_gaps requires at least
      narrow_to_partial_keymap_claim for keymap claims attached to
      that session.
    required_action: narrow_to_partial
    refs:
      - docs/migration/migration_restore_and_shortcut_delta_packet.md
  - rule_id: narrowing_rule:blocked_runtime_blocks_keymap_claim
    summary: >
      Daily-driver gestures whose delta_state is
      unresolved_gap_blocked_by_compatibility or
      unresolved_gap_blocked_by_policy block the marketed keymap path
      for that source ecosystem until the scorecard narrows the claim.
    required_action: block_marketed_path
    refs:
      - docs/migration/compatibility_scorecard_contract.md
      - artifacts/migration/top_imported_workflow_rows.yaml
  - rule_id: narrowing_rule:unresolved_conflict_on_daily_driver
    summary: >
      Unresolved chord conflicts on daily-driver gestures with high or
      critical muscle-memory risk require at least
      narrow_to_documented_remap_only plus a known-limit row.
    required_action: narrow_to_documented_remap_only
    refs:
      - docs/migration/migration_restore_and_shortcut_delta_packet.md

