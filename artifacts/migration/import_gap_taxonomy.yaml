# Import-gap taxonomy for external alpha migration parity.
#
# This taxonomy is the known-gap row source for the migration-parity alpha
# scoreboard. Each gap binds to claimed alpha wedges, issue-template fields,
# support-export refs, docs/help refs, and known-limit ids.

schema_version: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

taxonomy_id: import_gap_taxonomy_alpha
status: seeded
scoreboard_ref: artifacts/migration/m2_parity_scoreboard.yaml
diagnostics_packet_ref: docs/migration/import_diagnostics_packet.md
alpha_scope_matrix_ref: artifacts/milestones/m2/alpha_wedge_matrix.yaml
alpha_scoreboard_row_ref: scoreboard_row:alpha_scope.migration_parity
known_limits_ref: artifacts/feedback/external_alpha_known_limits.md

gap_class_vocabulary:
  - bridge_not_native
  - lossy_mapping
  - unsupported_runtime
  - unsupported_source_state
  - manual_follow_up
  - community_or_asset_only

severity_vocabulary:
  - info
  - moderate
  - major
  - blocking

issue_template_contract:
  template_refs:
    - docs/governance/dogfood_issue_taxonomy.md
    - artifacts/feedback/design_partner_feedback_taxonomy.yaml
  required_fields:
    - source_tool
    - source_version
    - alpha_wedge_ref
    - migration_session_ref
    - outcome_packet_ref
    - migration_report_ref
    - taxonomy_gap_refs
    - parity_scoreboard_row_ref
    - support_export_ref
    - known_limit_refs
  routing_rule: >
    Migration issues cite taxonomy_gap_refs and parity_scoreboard_row_ref so
    design-partner intake and support can distinguish seeded alpha limits from
    regressions or claim-widening requests.

taxonomy_rows:
  - gap_id: import_gap:extension_provider_bridge_not_native
    title: Extension or provider continuity depends on an explicit bridge or native alternative
    gap_class: bridge_not_native
    severity: moderate
    parity_states:
      - bridged_parity
    importer_outcome_states:
      - bridge_required
      - mapped
    source_ecosystem_ids:
      - vs_code_code_oss
    alpha_wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    affected_categories:
      - extensions_and_providers
    scoreboard_row_refs:
      - migration_parity_row:tsjs.vscode.extension_provider.bridged
    known_limit_refs:
      - known_limit:external_alpha.migration_bridged_parity_not_native
      - known_limit:external_alpha.migration_evidence_seeded
    docs_help_refs:
      - docs/migration/import_diagnostics_packet.md#bridged-parity
      - docs/migration/compatibility_scorecard_contract.md
    support_export_refs:
      - support:first-run-vscode-common
    issue_template_binding:
      template_refs:
        - docs/governance/dogfood_issue_taxonomy.md
        - artifacts/feedback/design_partner_feedback_taxonomy.yaml
      required_fields:
        - source_tool
        - source_version
        - alpha_wedge_ref
        - migration_session_ref
        - outcome_packet_ref
        - migration_report_ref
        - taxonomy_gap_refs
        - parity_scoreboard_row_ref
        - support_export_ref
        - known_limit_refs
    user_visible_rule: >
      Render as bridge-backed or native-alternative continuity. Do not call
      the row native parity.

  - gap_id: import_gap:keymap_chord_capacity_remap
    title: High-frequency shortcut maps to a different gesture or leader path
    gap_class: lossy_mapping
    severity: moderate
    parity_states:
      - lossy_mapping
    importer_outcome_states:
      - mapped
      - manual_review
    source_ecosystem_ids:
      - vs_code_code_oss
      - jetbrains_family
      - vim_neovim
      - emacs
    alpha_wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    affected_categories:
      - keymap
    scoreboard_row_refs:
      - migration_parity_row:tsjs.vscode.keymap_chord.lossy
    known_limit_refs:
      - known_limit:external_alpha.migration_lossy_mapping_visible
      - known_limit:external_alpha.migration_evidence_seeded
    docs_help_refs:
      - docs/migration/import_diagnostics_packet.md#lossy-mapping
      - docs/migration/migration_restore_and_shortcut_delta_packet.md
    support_export_refs:
      - support:first-run-vscode-common
    issue_template_binding:
      template_refs:
        - docs/governance/dogfood_issue_taxonomy.md
        - artifacts/feedback/design_partner_feedback_taxonomy.yaml
      required_fields:
        - source_tool
        - source_version
        - alpha_wedge_ref
        - migration_session_ref
        - outcome_packet_ref
        - migration_report_ref
        - taxonomy_gap_refs
        - parity_scoreboard_row_ref
        - support_export_ref
        - known_limit_refs
    user_visible_rule: >
      Keep original gesture, remapped gesture, conflict resolution, and
      muscle-memory risk visible in the shortcut digest.

  - gap_id: import_gap:tasks_run_config_execution_context_review
    title: Imported task, run, or debug record requires execution-context review
    gap_class: manual_follow_up
    severity: major
    parity_states:
      - lossy_mapping
      - manual_follow_up
    importer_outcome_states:
      - mapped
      - manual_review
    source_ecosystem_ids:
      - vs_code_code_oss
      - jetbrains_family
    alpha_wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    affected_categories:
      - tasks_and_run_configs
      - launch_debug
    scoreboard_row_refs:
      - migration_parity_row:python.jetbrains.run_debug.manual_follow_up
      - migration_parity_row:python.vscode.launch_config.lossy
    known_limit_refs:
      - known_limit:external_alpha.migration_manual_followup_required
      - known_limit:external_alpha.migration_lossy_mapping_visible
      - known_limit:external_alpha.migration_evidence_seeded
    docs_help_refs:
      - docs/migration/import_diagnostics_packet.md#manual-follow-up
      - docs/migration/post_import_validation_contract.md
    support_export_refs:
      - support:first-run-jetbrains-partial
      - support:first-run-vscode-common
    issue_template_binding:
      template_refs:
        - docs/governance/dogfood_issue_taxonomy.md
        - artifacts/feedback/design_partner_feedback_taxonomy.yaml
      required_fields:
        - source_tool
        - source_version
        - alpha_wedge_ref
        - migration_session_ref
        - outcome_packet_ref
        - migration_report_ref
        - taxonomy_gap_refs
        - parity_scoreboard_row_ref
        - support_export_ref
        - known_limit_refs
    user_visible_rule: >
      Import may stage the row, but runnable parity remains manual follow-up
      until execution-context validation records an accepted result.

  - gap_id: import_gap:extension_runtime_webview_unsupported
    title: Webview-heavy source extension state has no supported import target
    gap_class: unsupported_runtime
    severity: blocking
    parity_states:
      - unsupported_items
    importer_outcome_states:
      - unsupported
    source_ecosystem_ids:
      - vs_code_code_oss
    alpha_wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    affected_categories:
      - extensions_and_providers
    scoreboard_row_refs:
      - migration_parity_row:tsjs.vscode.webview_extension.unsupported
    known_limit_refs:
      - known_limit:external_alpha.migration_unsupported_runtime_explicit
      - known_limit:external_alpha.migration_evidence_seeded
    docs_help_refs:
      - docs/migration/import_diagnostics_packet.md#unsupported-items
      - docs/migration/compatibility_scorecard_contract.md
    support_export_refs:
      - support:first-run-vscode-common
    issue_template_binding:
      template_refs:
        - docs/governance/dogfood_issue_taxonomy.md
        - artifacts/feedback/design_partner_feedback_taxonomy.yaml
      required_fields:
        - source_tool
        - source_version
        - alpha_wedge_ref
        - migration_session_ref
        - outcome_packet_ref
        - migration_report_ref
        - taxonomy_gap_refs
        - parity_scoreboard_row_ref
        - support_export_ref
        - known_limit_refs
    user_visible_rule: >
      Keep the source extension visible as unsupported, block apply for the
      unsupported object, and offer native alternatives only through review.

  - gap_id: import_gap:extension_runtime_lua_unsupported
    title: Arbitrary Vim or Neovim Lua plugin runtime is not imported
    gap_class: unsupported_runtime
    severity: blocking
    parity_states:
      - unsupported_items
    importer_outcome_states:
      - unsupported
      - skipped
    source_ecosystem_ids:
      - vim_neovim
    alpha_wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    affected_categories:
      - extensions_and_providers
      - keymap
    scoreboard_row_refs:
      - artifacts/migration/migration_gap_scoreboard.yaml#migration_gap_row:vim_neovim.lua_runtime.blocked
    known_limit_refs:
      - known_limit:external_alpha.migration_unsupported_runtime_explicit
      - known_limit:external_alpha.migration_evidence_seeded
    docs_help_refs:
      - docs/migration/import_diagnostics_packet.md#unsupported-items
      - docs/migration/migration_restore_and_shortcut_delta_packet.md
    support_export_refs:
      - support:vim-neovim-plugin-runtime
    issue_template_binding:
      template_refs:
        - docs/governance/dogfood_issue_taxonomy.md
        - artifacts/feedback/design_partner_feedback_taxonomy.yaml
      required_fields:
        - source_tool
        - source_version
        - alpha_wedge_ref
        - migration_session_ref
        - outcome_packet_ref
        - migration_report_ref
        - taxonomy_gap_refs
        - parity_scoreboard_row_ref
        - support_export_ref
        - known_limit_refs
    user_visible_rule: >
      Native modal profile import must not imply Lua runtime compatibility.

  - gap_id: import_gap:extension_runtime_elisp_unsupported
    title: Arbitrary Emacs Elisp package runtime is not imported
    gap_class: unsupported_runtime
    severity: blocking
    parity_states:
      - unsupported_items
    importer_outcome_states:
      - unsupported
      - skipped
    source_ecosystem_ids:
      - emacs
    alpha_wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    affected_categories:
      - extensions_and_providers
      - keymap
    scoreboard_row_refs:
      - artifacts/migration/migration_gap_scoreboard.yaml#migration_gap_row:emacs.elisp_runtime.blocked
    known_limit_refs:
      - known_limit:external_alpha.migration_unsupported_runtime_explicit
      - known_limit:external_alpha.migration_evidence_seeded
    docs_help_refs:
      - docs/migration/import_diagnostics_packet.md#unsupported-items
      - docs/migration/migration_restore_and_shortcut_delta_packet.md
    support_export_refs:
      - support:emacs-elisp-plugin-runtime
    issue_template_binding:
      template_refs:
        - docs/governance/dogfood_issue_taxonomy.md
        - artifacts/feedback/design_partner_feedback_taxonomy.yaml
      required_fields:
        - source_tool
        - source_version
        - alpha_wedge_ref
        - migration_session_ref
        - outcome_packet_ref
        - migration_report_ref
        - taxonomy_gap_refs
        - parity_scoreboard_row_ref
        - support_export_ref
        - known_limit_refs
    user_visible_rule: >
      Native keyboard/navigation import must not imply Elisp runtime parity.

  - gap_id: import_gap:theme_token_slot_fallback
    title: Theme token slot maps through an explicit fallback
    gap_class: lossy_mapping
    severity: info
    parity_states:
      - lossy_mapping
    importer_outcome_states:
      - mapped
      - manual_review
    source_ecosystem_ids:
      - vs_code_code_oss
      - jetbrains_family
      - sublime_textmate
    alpha_wedge_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    affected_categories:
      - theme_and_visuals
    scoreboard_row_refs:
      - artifacts/migration/migration_gap_scoreboard.yaml#migration_gap_row:sublime_textmate.syntax_bundle.translated
    known_limit_refs:
      - known_limit:external_alpha.migration_lossy_mapping_visible
      - known_limit:external_alpha.migration_evidence_seeded
    docs_help_refs:
      - docs/migration/import_diagnostics_packet.md#lossy-mapping
      - docs/migration/source_ecosystem_coverage_matrix.md
    support_export_refs:
      - support:sublime-textmate-syntax
    issue_template_binding:
      template_refs:
        - docs/governance/dogfood_issue_taxonomy.md
        - artifacts/feedback/design_partner_feedback_taxonomy.yaml
      required_fields:
        - source_tool
        - source_version
        - alpha_wedge_ref
        - migration_session_ref
        - outcome_packet_ref
        - migration_report_ref
        - taxonomy_gap_refs
        - parity_scoreboard_row_ref
        - support_export_ref
        - known_limit_refs
    user_visible_rule: >
      Theme rows may import as mapped assets only when unsupported slots and
      fallback behavior remain visible in the report.
