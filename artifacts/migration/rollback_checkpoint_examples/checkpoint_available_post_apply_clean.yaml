__example__:
  name: checkpoint_available_post_apply_clean
  scenario: >
    A VS Code import session applied cleanly; every row landed at
    outcome_state in {imported, mapped, skipped} with no
    manual_review or bridge_required. The checkpoint is retained
    for the declared retention window so the user can still revert
    if they change their mind.
  rollback_checkpoint_outcome_class: checkpoint_available_post_apply_clean
  import_diff_manifest_case_ref: migration_and_profile.clean_import.settings_round_trip
  doc_sections:
    - "§Rollback-checkpoint expectations"

record_kind: rollback_checkpoint_example_record
example_id: rollback_checkpoint.example.checkpoint_available_post_apply_clean
schema_version: 1
rollback_checkpoint_outcome_class: checkpoint_available_post_apply_clean

migration_session_ref: migration-session:clean-import-0001
migration_session_state: applied
restore_record_ref: migration-restore-record:clean-import-0001
checkpoint_ref: rollback-checkpoint:clean-import-0001
scope: profile_only
availability_state: available
cleanup_state: retained
restore_action_hints:
  - open_restore_center
  - restore_from_checkpoint
  - compare_before_restore
  - cleanup_retained_checkpoint
partial_apply_note: null
preserved_prior_artifact_refs:
  - preserved-artifact:clean-import-prior-settings-0001
post_restore_validator_outcomes:
  - validator_class: settings_schema_migration
    outcome_class: passed
    validator_run_ref: validator-run:clean-import-settings-schema-migration-0001

compatibility_report_ref: docs/release/compatibility_report_template.md#migration.vs_code.profile_only
compatibility_row_refs:
  - compat_row:state.profile_layout_schema

host_boundary_cue: local_host_boundary
freshness_class: authoritative_live
redaction_class: ui_string_only
export_inclusion_posture: metadata_safe_default

support_packet_refs: []
export_refs:
  - migration_center.machine_readable_report

retention_window:
  retention_class: user_configurable_default_thirty_day
  retention_expires_at: 2026-05-23T12:00:00Z

conformance_tests:
  - id: clean_apply_keeps_checkpoint_available
    description: >
      checkpoint_available_post_apply_clean MUST leave
      availability_state = available and cleanup_state = retained
      for the declared retention window.
  - id: clean_apply_preserves_compatibility_linkage
    description: >
      A post-apply-clean checkpoint MUST preserve
      compatibility_report_ref and compatibility_row_refs from the
      migration session.
