__example__:
  name: checkpoint_expired_cleanup_complete
  scenario: >
    A retained rollback checkpoint's retention window elapsed. The
    cleanup job ran inside the policy window, the checkpoint is no
    longer restorable, and restore affordances are denied. The
    record remains in the migration-center history for audit
    purposes.
  rollback_checkpoint_outcome_class: checkpoint_expired_cleanup_complete
  import_diff_manifest_case_ref: null
  doc_sections:
    - "§Rollback-checkpoint expectations"

record_kind: rollback_checkpoint_example_record
example_id: rollback_checkpoint.example.checkpoint_expired_cleanup_complete
schema_version: 1
rollback_checkpoint_outcome_class: checkpoint_expired_cleanup_complete

migration_session_ref: migration-session:clean-import-legacy-0003
migration_session_state: applied
restore_record_ref: migration-restore-record:clean-import-legacy-0003
checkpoint_ref: rollback-checkpoint:clean-import-legacy-0003
scope: profile_only
availability_state: expired
cleanup_state: cleaned_up
restore_action_hints: []
partial_apply_note: null
preserved_prior_artifact_refs: []
post_restore_validator_outcomes: []

compatibility_report_ref: docs/release/compatibility_report_template.md#migration.vs_code.profile_only
compatibility_row_refs:
  - compat_row:state.profile_layout_schema

host_boundary_cue: local_host_boundary
freshness_class: warm_cached
redaction_class: ui_string_only
export_inclusion_posture: metadata_safe_default

support_packet_refs: []
export_refs:
  - migration_center.machine_readable_report

retention_window:
  retention_class: user_configurable_default_thirty_day
  retention_expired_at: 2026-03-24T12:00:00Z
  cleanup_completed_at: 2026-03-24T12:05:00Z

conformance_tests:
  - id: expired_checkpoint_denies_restore_hooks
    description: >
      checkpoint_expired_cleanup_complete MUST set restore_action_hints
      to an empty list and MUST deny restore_from_checkpoint; offering
      a restore affordance on an expired checkpoint is non-conforming.
  - id: expired_checkpoint_drops_preserved_artifacts
    description: >
      checkpoint_expired_cleanup_complete MUST leave
      preserved_prior_artifact_refs empty; expired cleanup also
      removes the preserved artifacts.
