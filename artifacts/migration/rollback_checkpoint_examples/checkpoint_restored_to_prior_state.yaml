__example__:
  name: checkpoint_restored_to_prior_state
  scenario: >
    After reviewing a partial apply, the user chose to revert. The
    restore ran, post-restore validators passed, and the prior
    state is now authoritative again. The checkpoint record stays
    reachable during a compare window so support can inspect the
    revert.
  rollback_checkpoint_outcome_class: checkpoint_restored_to_prior_state
  import_diff_manifest_case_ref: migration_and_profile.rollback_to_prior_checkpoint.partial_apply_reverted
  doc_sections:
    - "§Rollback-checkpoint expectations"

record_kind: rollback_checkpoint_example_record
example_id: rollback_checkpoint.example.checkpoint_restored_to_prior_state
schema_version: 1
rollback_checkpoint_outcome_class: checkpoint_restored_to_prior_state

migration_session_ref: migration-session:partial-import-0002
migration_session_state: restored
restore_record_ref: migration-restore-record:partial-import-0002
checkpoint_ref: rollback-checkpoint:partial-import-0002
scope: profile_and_workspace
availability_state: restored
cleanup_state: retained
restore_action_hints:
  - open_restore_center
  - compare_before_restore
  - export_for_support
  - cleanup_retained_checkpoint
partial_apply_note: >
  Restore completed. Prior profile and workspace manifest are now
  authoritative; the pre-restore checkpoint stays retained for the
  compare window so support can inspect the revert.
preserved_prior_artifact_refs:
  - preserved-artifact:partial-import-prior-workspace-manifest-0002
  - preserved-artifact:partial-import-extension-slot-0002
post_restore_validator_outcomes:
  - validator_class: settings_schema_migration
    outcome_class: passed
    validator_run_ref: validator-run:restore-settings-schema-migration-0002
  - validator_class: launch_config_sanity
    outcome_class: passed_with_warnings
    validator_run_ref: validator-run:restore-launch-config-sanity-0002
  - validator_class: keybinding_conflict
    outcome_class: passed
    validator_run_ref: validator-run:restore-keybinding-conflict-0002

compatibility_report_ref: docs/release/compatibility_report_template.md#migration.vs_code.profile_and_workspace
compatibility_row_refs:
  - compat_row:state.profile_layout_schema
  - compat_row:command_plane.command_descriptor_schema

host_boundary_cue: local_host_boundary
freshness_class: authoritative_live
redaction_class: ui_string_only
export_inclusion_posture: operator_only_restricted

support_packet_refs:
  - support_packet.rollback_review.partial-import-0002
export_refs:
  - support_bundle.migration_restore_record
  - migration_center.machine_readable_report

compare_window:
  compare_window_class: user_configurable_default_fourteen_day
  compare_window_expires_at: 2026-05-07T12:30:00Z

conformance_tests:
  - id: restored_requires_post_restore_validators
    description: >
      checkpoint_restored_to_prior_state MUST cite at least one
      post-restore validator outcome; silent revert with no
      validator evidence is non-conforming.
  - id: restored_preserves_prior_artifacts_across_compare_window
    description: >
      A restored checkpoint MUST keep preserved_prior_artifact_refs
      reachable for the declared compare window so support can
      inspect the revert.
