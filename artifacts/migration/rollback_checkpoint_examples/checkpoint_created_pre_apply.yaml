__example__:
  name: checkpoint_created_pre_apply
  scenario: >
    A first-run VS Code import session has staged a diff preview
    and created a restore checkpoint before any apply begins. The
    session is at diff_ready; apply has not started. Reviewers can
    inspect the checkpoint and run compare_before_restore.
  rollback_checkpoint_outcome_class: checkpoint_created_pre_apply
  import_diff_manifest_case_ref: null
  doc_sections:
    - "§Rollback-checkpoint expectations"

record_kind: rollback_checkpoint_example_record
example_id: rollback_checkpoint.example.checkpoint_created_pre_apply
schema_version: 1
rollback_checkpoint_outcome_class: checkpoint_created_pre_apply

migration_session_ref: migration-session:vs-code-first-run-0101
migration_session_state: diff_ready
restore_record_ref: migration-restore-record:vs-code-first-run-0101
checkpoint_ref: checkpoint:vs-code-first-run-0101
scope: profile_and_workspace
availability_state: available
cleanup_state: retained
restore_action_hints:
  - open_restore_center
  - compare_before_restore
  - restore_from_checkpoint
partial_apply_note: null
preserved_prior_artifact_refs: []
post_restore_validator_outcomes: []

compatibility_report_ref: docs/release/compatibility_report_template.md#migration.vs_code.profile_and_workspace
compatibility_row_refs:
  - compat_row:state.profile_layout_schema
  - compat_row:command_plane.command_descriptor_schema

host_boundary_cue: local_host_boundary
freshness_class: authoritative_live
redaction_class: ui_string_only
export_inclusion_posture: metadata_safe_default

support_packet_refs: []
export_refs: []

conformance_tests:
  - id: pre_apply_checkpoint_requires_available_state
    description: >
      checkpoint_created_pre_apply MUST set availability_state =
      available and cleanup_state = retained; any other pairing is
      non-conforming.
  - id: pre_apply_checkpoint_has_no_partial_apply_note
    description: >
      checkpoint_created_pre_apply MUST leave partial_apply_note
      null; a partial-apply note on a pre-apply checkpoint is
      non-conforming.
