__example__:
  name: checkpoint_available_post_apply_partial
  scenario: >
    A VS Code import session landed partially: settings and
    keybindings imported cleanly, but one extension mapping requires
    manual review and a workspace manifest needs review before
    overwrite. The checkpoint is retained, the partial-apply note
    explains why, and preserved prior artifacts stay reachable for
    compare / export.
  rollback_checkpoint_outcome_class: checkpoint_available_post_apply_partial
  import_diff_manifest_case_ref: migration_and_profile.partial_import.extension_missing
  doc_sections:
    - "§Rollback-checkpoint expectations"
    - "§Lossy-vs-exact migration labels"

record_kind: rollback_checkpoint_example_record
example_id: rollback_checkpoint.example.checkpoint_available_post_apply_partial
schema_version: 1
rollback_checkpoint_outcome_class: checkpoint_available_post_apply_partial

migration_session_ref: migration-session:partial-import-0002
migration_session_state: partially_applied
restore_record_ref: migration-restore-record:partial-import-0002
checkpoint_ref: rollback-checkpoint:partial-import-0002
scope: profile_and_workspace
availability_state: available
cleanup_state: retained
restore_action_hints:
  - open_restore_center
  - restore_from_checkpoint
  - compare_before_restore
  - keep_partial_apply_visible
  - export_for_support
partial_apply_note: >
  Extension mapping requires manual review and the workspace
  manifest still diverges; checkpoint retained so the user can
  either continue follow-up or revert to the pre-apply state.
preserved_prior_artifact_refs:
  - preserved-artifact:partial-import-extension-slot-0002
  - preserved-artifact:partial-import-prior-workspace-manifest-0002
post_restore_validator_outcomes:
  - validator_class: missing_extension_suggestion
    outcome_class: passed_with_warnings
    validator_run_ref: validator-run:partial-import-missing-extension-0002
  - validator_class: settings_schema_migration
    outcome_class: passed
    validator_run_ref: validator-run:partial-import-settings-schema-migration-0002

compatibility_report_ref: docs/release/compatibility_report_template.md#migration.vs_code.profile_and_workspace
compatibility_row_refs:
  - compat_row:state.profile_layout_schema
  - compat_row:command_plane.command_descriptor_schema

host_boundary_cue: local_host_boundary
freshness_class: warm_cached
redaction_class: redact_value_preserve_shape
export_inclusion_posture: operator_only_restricted

support_packet_refs:
  - support_packet.rollback_review.partial-import-0002
export_refs:
  - support_bundle.migration_restore_record
  - migration_center.machine_readable_report

conformance_tests:
  - id: partial_apply_requires_non_empty_partial_apply_note
    description: >
      checkpoint_available_post_apply_partial MUST carry a
      non-empty partial_apply_note explaining why the checkpoint
      stays visible.
  - id: partial_apply_requires_preserved_prior_artifacts
    description: >
      A post-apply-partial checkpoint that touched
      user_authored_durable_truth or workspace_shared_manifest
      MUST carry at least one preserved prior-artifact ref.
  - id: partial_apply_exports_operator_only
    description: >
      A post-apply-partial checkpoint MUST set
      export_inclusion_posture = operator_only_restricted; broad
      capture is non-conforming.
