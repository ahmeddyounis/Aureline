          - IDE keymap export
          - common keymap presets
        destination: Aureline command ids and keybinding resolver layers
        target_fidelity: high
      - family: themes
        source_examples:
          - color scheme export
        destination: Aureline theme package and token mapping report
        target_fidelity: medium
      - family: selected_run_debug_configs
        source_examples:
          - application run configuration
          - test run configuration
        destination: Aureline execution-context and debug launch profile records
        target_fidelity: medium
      - family: project_roots
        source_examples:
          - module content roots
          - project root list
        destination: Aureline workspace manifest roots
        target_fidelity: medium
      - family: code_style_hints
        source_examples:
          - formatter profile hints
          - indentation preferences
        destination: Aureline settings and formatter hint records
        target_fidelity: medium
