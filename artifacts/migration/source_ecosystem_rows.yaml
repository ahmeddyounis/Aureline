# Source ecosystem migration rows.
#
# Tooling and public-truth surfaces read this file. The narrative companion
# lives in docs/migration/source_ecosystem_coverage_matrix.md. If they
# disagree, this file is authoritative and the narrative is updated in the
# same change.
#
# Scope:
#   - Exactly the source ecosystems Aureline may market as migration lanes.
#   - Explicit import target families, quality bars, caveats, owners, proof
#     burden, docs/help surfaces, and downstream evidence links.
#   - Rows absent from this file are absent from the public migration claim.

schema_version: 1
status: seeded

overview_page: docs/migration/source_ecosystem_coverage_matrix.md
quality_bar_rubric_source: artifacts/migration/quality_bar_rubric.yaml
migration_center_contract_source: docs/migration/migration_center_object_model.md
source_profile_examples_directory: fixtures/migration/source_profile_examples/
ownership_matrix_source: artifacts/governance/ownership_matrix.yaml
onboarding_measurement_plan_source: docs/product/onboarding_measurement_plan.md
task_success_corpus_source: artifacts/product/task_success_corpus_seed.yaml
compatibility_matrix_source: artifacts/compat/qualification_matrix_seed.yaml
reference_workspace_rows_source: artifacts/compat/reference_workspace_rows.yaml
public_truth_parity_matrix_source: artifacts/governance/public_truth_parity_matrix.yaml
release_evidence_template_source: docs/release/release_evidence_packet_template.md

non_claimed_source_policy:
  rule: >
    A source ecosystem absent from source_ecosystem_rows is not in the
    marketed migration claim. Public docs, onboarding, release evidence,
    compatibility reports, and support exports may describe it only as a
    generic, community, or experimental import path after a new governed
    row lands.
  explicit_non_claim_examples:
    - browser_ide_profiles
    - hosted_cloud_ide_profiles
    - terminal_multiplexer_sessions
    - arbitrary_dotfile_frameworks
    - package_manager_state
    - source_editor_plugin_runtime_state

source_ecosystem_id_vocabulary:
  - vs_code_code_oss
  - jetbrains_family
  - vim_neovim
  - emacs
  - sublime_textmate

import_target_family_vocabulary:
  - settings
  - keybindings
  - snippets
  - tasks
  - launch_configs
  - themes
  - compatible_extensions
  - selected_run_debug_configs
  - project_roots
  - code_style_hints
  - modal_editing_profiles
  - command_aliases
  - clipboard_search_defaults
  - syntax_bundles
  - project_defaults
  - selected_build_task_hints
  - workspace_metadata

docs_help_surface_vocabulary:
  - first_run_onboarding
  - migration_center
  - import_diff_review
  - shortcut_digest
  - compatibility_report
  - release_notes
  - migration_notes
  - support_export
  - issue_template
  - docs_site
  - cli_help

evidence_burden_vocabulary_ref: artifacts/migration/quality_bar_rubric.yaml#evidence_burden_vocabulary
quality_bar_id_vocabulary_ref: artifacts/migration/quality_bar_rubric.yaml#quality_bar_id_vocabulary

source_ecosystem_rows:
  - source_ecosystem_row_id: migration_source:vs_code_code_oss
    source_ecosystem_id: vs_code_code_oss
    public_label: VS Code / Code-OSS
    source_session_kind: vs_code
    marketed_lane: true
    v1_stable_goal: >
      High-fidelity import for common text and daily-workflow surfaces so
      first-run migration preserves the user's ordinary editing, task,
      debug, theme, and extension-selection habits with minimal manual
      repair.
    quality_bar_refs:
      - migration_quality:high_fidelity_common_text_workflow_surfaces
    owner_allocation:
      row_owner: lane:compatibility_ecosystem_review
      evidence_owner: lane:benchmark_lab
      publication_owner: lane:docs_public_truth
      release_owner: lane:release_evidence
      support_owner: lane:support_export
    import_targets:
      - family: settings
        source_examples:
          - settings.json
          - profile settings export
        destination: Aureline user and workspace setting records
        target_fidelity: high
      - family: keybindings
        source_examples:
          - keybindings.json
          - profile keymap export
        destination: Aureline command ids and keybinding resolver layers
        target_fidelity: high
      - family: snippets
        source_examples:
          - user snippets
          - workspace snippets
        destination: Aureline snippet/template records
        target_fidelity: high
      - family: tasks
        source_examples:
          - tasks.json
          - npm script task bridge
        destination: Aureline task and execution-context records
        target_fidelity: medium
      - family: launch_configs
        source_examples:
          - launch.json
        destination: Aureline debug launch profile records
        target_fidelity: medium
      - family: themes
        source_examples:
          - color theme selection
          - theme package manifest
        destination: Aureline theme package and token mapping report
        target_fidelity: high
      - family: compatible_extensions
        source_examples:
          - extension recommendations
          - installed extension ids
        destination: Aureline-native or bridge-backed extension suggestions
        target_fidelity: medium
      - family: project_roots
        source_examples:
          - workspace file folders
          - multi-root workspace folders
        destination: Aureline workspace manifest roots
        target_fidelity: medium
    caveat: >
      Extension runtime parity, workbench layout parity, arbitrary webview
      state, and extension storage import are outside the claim. Extension
      matches are suggestions unless trust, permission, and compatibility
      review admit them.
    evidence_burden:
      - source_profile_fixture_required
      - importer_diff_packet_required
      - machine_readable_report_required
      - category_parity_scores_required
      - shortcut_digest_required
      - rollback_checkpoint_required
      - post_import_validation_required
      - docs_help_surface_required
      - compatibility_report_row_required
      - certified_archetype_link_required
      - support_export_required
      - public_truth_projection_required
    required_docs_help_surfaces:
      - first_run_onboarding
      - migration_center
      - import_diff_review
      - shortcut_digest
      - compatibility_report
      - migration_notes
      - support_export
      - issue_template
      - docs_site
      - cli_help
    compatibility_row_refs:
      - compat_row:migration.source_ecosystem_coverage
      - compat_row:state.profile_layout_schema
      - compat_row:command_plane.command_descriptor_schema
      - compat_row:tooling.task_event_envelope
      - compat_row:extension_host.sdk_wit_permission_window
      - compat_row:certification.launch_archetype_matrix
    onboarding_metric_refs:
      - docs/product/onboarding_measurement_plan.md#surface_migration_review
      - artifacts/product/task_success_corpus_seed.yaml#tsc.import_vs_code_settings_dry_run_then_apply
    certified_archetype_refs:
      - artifacts/compat/reference_workspace_rows.yaml#archetype_row:ts_web_app_or_service
      - artifacts/compat/reference_workspace_rows.yaml#archetype_row:python_service_or_data_app
      - artifacts/compat/reference_workspace_rows.yaml#archetype_row:java_or_kotlin_service
      - artifacts/compat/reference_workspace_rows.yaml#archetype_row:rust_workspace
    public_truth_refs:
