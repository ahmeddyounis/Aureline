# Migration quality-bar rubric.
#
# Tooling and release packets read this file. The narrative companion lives
# in docs/migration/source_ecosystem_coverage_matrix.md. If they disagree,
# this file is authoritative and the narrative is updated in the same change.
#
# Scope:
#   - Freeze the quality-bar vocabulary used by source ecosystem rows.
#   - Define the evidence burden and non-goals for each bar.
#   - Keep docs, onboarding, compatibility reports, release evidence, and
#     support exports on one vocabulary.

schema_version: 1
status: seeded

overview_page: docs/migration/source_ecosystem_coverage_matrix.md
source_ecosystem_rows_source: artifacts/migration/source_ecosystem_rows.yaml
migration_center_contract_source: docs/migration/migration_center_object_model.md
import_diff_manifest_source: fixtures/migration/import_diff_manifest.yaml
ownership_matrix_source: artifacts/governance/ownership_matrix.yaml
qualification_matrix_source: artifacts/compat/qualification_matrix_seed.yaml
public_truth_parity_matrix_source: artifacts/governance/public_truth_parity_matrix.yaml

quality_bar_id_vocabulary:
  - migration_quality:high_fidelity_common_text_workflow_surfaces
  - migration_quality:partial_but_polished_migration
  - migration_quality:high_fidelity_editing_feel
  - migration_quality:medium_fidelity_keyboard_navigation_migration
  - migration_quality:high_value_asset_import

evidence_burden_vocabulary:
  - source_profile_fixture_required
  - importer_diff_packet_required
  - machine_readable_report_required
  - category_parity_scores_required
  - shortcut_digest_required
  - rollback_checkpoint_required
  - post_import_validation_required
  - docs_help_surface_required
  - compatibility_report_row_required
  - certified_archetype_link_required
  - support_export_required
  - public_truth_projection_required

proof_surface_vocabulary:
  - migration_acceptance_suite
  - imported_profile_parity_report
  - keymap_parity_task_suite
  - modal_editing_acceptance_pack
  - theme_mapping_snapshot_tests
  - execution_context_validation
  - fixture_profile_corpus
  - compatibility_report_packet
  - release_evidence_packet
  - support_export_packet
  - onboarding_task_success_scoreboard

outcome_state_vocabulary:
  - imported
  - mapped
  - skipped
  - manual_review
  - bridge_required
  - unsupported

downgrade_action_vocabulary:
  - keep_claim_with_caveat
  - narrow_to_partial
  - narrow_to_asset_only
  - move_to_docs_only
  - move_to_experimental
  - remove_public_claim

quality_bars:
  - quality_bar_id: migration_quality:high_fidelity_common_text_workflow_surfaces
    public_label: High-fidelity import for common text/workflow surfaces
    summary: >
      Common text and daily-workflow assets import into Aureline-native
      records, or render explicit review rows when a semantic equivalent
      does not exist.
    admissible_source_rows:
      - migration_source:vs_code_code_oss
    required_evidence_burden:
      - source_profile_fixture_required
      - importer_diff_packet_required
      - machine_readable_report_required
      - category_parity_scores_required
      - shortcut_digest_required
      - rollback_checkpoint_required
      - post_import_validation_required
      - docs_help_surface_required
      - compatibility_report_row_required
      - certified_archetype_link_required
      - support_export_required
      - public_truth_projection_required
    required_proof_surfaces:
      - migration_acceptance_suite
      - imported_profile_parity_report
      - keymap_parity_task_suite
      - theme_mapping_snapshot_tests
      - execution_context_validation
      - fixture_profile_corpus
      - compatibility_report_packet
      - release_evidence_packet
      - support_export_packet
      - onboarding_task_success_scoreboard
    minimum_category_expectations:
      settings: high
      shortcuts: high
      snippets_and_templates: high
      tasks_and_run_configs: medium
      launch_debug: medium
      themes_and_visuals: high
      extensions_and_providers: medium
      workspace_metadata: medium
    allowed_outcome_states:
      - imported
      - mapped
      - skipped
      - manual_review
      - bridge_required
      - unsupported
    non_goals:
      - Runtime or plugin parity with the source application.
      - Silent install of source extensions or compatible replacements.
      - Importing extension storage blobs, arbitrary webviews, or source workbench layout internals.
      - Widening trust, permissions, AI egress, network egress, managed entitlements, or automation defaults.
    downgrade_rules:
      - trigger: category_score_missing
        action: narrow_to_partial
      - trigger: bridge_or_unsupported_hidden
        action: remove_public_claim
      - trigger: rollback_checkpoint_missing
        action: remove_public_claim
      - trigger: extension_permission_review_missing
        action: narrow_to_partial
    notes: >
      This bar is strict about common surfaces, not about full source-tool
      replication. Unsupported rows are acceptable only when they stay
      visible in the report and support export.

  - quality_bar_id: migration_quality:partial_but_polished_migration
    public_label: Partial but polished migration
    summary: >
      A narrower subset of source concepts imports cleanly, with no
      aggregate score hiding unsupported or manual-review categories.
    admissible_source_rows:
      - migration_source:jetbrains_family
    required_evidence_burden:
      - source_profile_fixture_required
      - importer_diff_packet_required
      - machine_readable_report_required
      - category_parity_scores_required
      - rollback_checkpoint_required
      - post_import_validation_required
      - docs_help_surface_required
      - compatibility_report_row_required
      - support_export_required
      - public_truth_projection_required
    required_proof_surfaces:
      - migration_acceptance_suite
      - imported_profile_parity_report
      - keymap_parity_task_suite
      - execution_context_validation
      - fixture_profile_corpus
      - compatibility_report_packet
      - release_evidence_packet
      - support_export_packet
      - onboarding_task_success_scoreboard
    minimum_category_expectations:
      shortcuts: high
      themes_and_visuals: medium
      tasks_and_run_configs: medium
      launch_debug: medium
      workspace_metadata: medium
      settings: medium
      extensions_and_providers: not_claimed
    allowed_outcome_states:
      - imported
      - mapped
      - skipped
      - manual_review
      - bridge_required
      - unsupported
    non_goals:
      - Full IDE plugin runtime parity.
      - Importing source indexes, caches, generated project models, or IDE internals as authoritative truth.
      - Heuristic run/debug translation without a visible unsupported-feature report.
    downgrade_rules:
      - trigger: unsupported_concepts_not_named
        action: remove_public_claim
      - trigger: run_debug_validation_missing
        action: move_to_docs_only
      - trigger: keymap_conflict_digest_missing
        action: narrow_to_partial
    notes: >
      This bar is appropriate when the row can make switching smoother
      while clearly saying which source concepts are outside native parity.

  - quality_bar_id: migration_quality:high_fidelity_editing_feel
    public_label: High-fidelity editing feel
    summary: >
      Modal editing, motions, operators, search, clipboard behavior, and
      high-frequency gestures are close enough for sustained daily use.
    admissible_source_rows:
      - migration_source:vim_neovim
    required_evidence_burden:
      - source_profile_fixture_required
      - importer_diff_packet_required
      - machine_readable_report_required
      - category_parity_scores_required
      - shortcut_digest_required
      - rollback_checkpoint_required
      - docs_help_surface_required
      - compatibility_report_row_required
      - support_export_required
      - public_truth_projection_required
    required_proof_surfaces:
      - modal_editing_acceptance_pack
      - keymap_parity_task_suite
      - fixture_profile_corpus
      - compatibility_report_packet
      - support_export_packet
      - onboarding_task_success_scoreboard
    minimum_category_expectations:
      modal_editing_profiles: high
      shortcuts: high
      clipboard_search_defaults: high
      snippets_and_templates: medium
      themes_and_visuals: not_claimed
      extensions_and_providers: not_claimed
    allowed_outcome_states:
      - imported
      - mapped
      - skipped
      - manual_review
      - unsupported
    non_goals:
      - Executing arbitrary Vimscript or Lua plugin configuration.
      - Importing register history, macro history, terminal sessions, or plugin-managed state.
      - Claiming parity outside source-editor modal surfaces.
    downgrade_rules:
      - trigger: modal_acceptance_pack_missing
        action: move_to_experimental
      - trigger: high_frequency_shortcut_conflicts_hidden
        action: remove_public_claim
      - trigger: plugin_state_implied
        action: remove_public_claim
    notes: >
      The bar measures editing feel, not general plugin compatibility.

  - quality_bar_id: migration_quality:medium_fidelity_keyboard_navigation_migration
    public_label: Medium-fidelity keyboard/navigation migration
    summary: >
      Common navigation, command-discovery, and keybinding habits map to
      semantic equivalents where they exist, with conflicts and missing
      commands visible.
    admissible_source_rows:
      - migration_source:jetbrains_family
      - migration_source:emacs
    required_evidence_burden:
      - source_profile_fixture_required
      - importer_diff_packet_required
      - machine_readable_report_required
      - category_parity_scores_required
      - shortcut_digest_required
      - rollback_checkpoint_required
      - docs_help_surface_required
      - compatibility_report_row_required
      - support_export_required
      - public_truth_projection_required
    required_proof_surfaces:
      - keymap_parity_task_suite
      - fixture_profile_corpus
      - compatibility_report_packet
      - support_export_packet
      - onboarding_task_success_scoreboard
    minimum_category_expectations:
      shortcuts: medium
      command_aliases: medium
      navigation: medium
      themes_and_visuals: medium
      project_defaults: medium
      runtime_plugins: not_claimed
    allowed_outcome_states:
      - imported
      - mapped
      - skipped
      - manual_review
      - unsupported
    non_goals:
      - Recreating every source command, package, major mode, minor mode, or editor runtime.
      - Treating name similarity as native parity without semantic review.
      - Hiding high-frequency keybinding conflicts inside an aggregate score.
    downgrade_rules:
      - trigger: shortcut_digest_missing
        action: remove_public_claim
      - trigger: command_alias_coverage_missing
        action: narrow_to_partial
      - trigger: package_runtime_implied
        action: remove_public_claim
    notes: >
      This bar favors muscle-memory and navigation continuity. It does
      not claim source-runtime compatibility.

  - quality_bar_id: migration_quality:high_value_asset_import
    public_label: High-value asset import
    summary: >
      Portable assets such as themes, snippets, and syntax bundles import
      with provenance, coverage reports, accessibility checks, and
      rollback.
    admissible_source_rows:
      - migration_source:sublime_textmate
    required_evidence_burden:
      - source_profile_fixture_required
      - importer_diff_packet_required
      - machine_readable_report_required
      - category_parity_scores_required
      - rollback_checkpoint_required
      - post_import_validation_required
      - docs_help_surface_required
      - compatibility_report_row_required
      - support_export_required
      - public_truth_projection_required
    required_proof_surfaces:
      - theme_mapping_snapshot_tests
      - fixture_profile_corpus
      - compatibility_report_packet
      - release_evidence_packet
      - support_export_packet
      - onboarding_task_success_scoreboard
    minimum_category_expectations:
      themes_and_visuals: high
      snippets_and_templates: high
      syntax_bundles: medium
      tasks_and_run_configs: low
      shortcuts: not_claimed
      extensions_and_providers: not_claimed
    allowed_outcome_states:
      - imported
      - mapped
      - skipped
      - manual_review
      - unsupported
    non_goals:
      - Running source packages, commands, plugins, or package-manager hooks.
      - Claiming full build-system parity from build-task hints.
      - Importing unsafe package code as trusted Aureline configuration.
    downgrade_rules:
      - trigger: theme_accessibility_check_missing
        action: narrow_to_asset_only
      - trigger: syntax_bundle_coverage_missing
        action: keep_claim_with_caveat
      - trigger: package_runtime_implied
        action: remove_public_claim
    notes: >
      Asset import is valuable when it is explicit about provenance and
      about which source package behaviors remain unsupported.
