# Retained migration report seed for the common VS Code import path.
record_kind: retained_migration_report_record
schema_version: 1
migration_report_id: migration-report:import-review-vscode-common-retained
migration_session_ref: migration-session:import-review-vscode-common-retained
source_descriptor: VS Code workspace root
target_descriptor: profile:default
import_diff_preview_ref: import-preview:import-review-vscode-common-retained
rollback_checkpoint_ref: rollback-checkpoint:import-review-vscode-common-retained
shortcut_delta_report_ref: shortcut_delta_digest:import-review-vscode-common-retained
classifications_present:
  - exact
  - translated
  - partial
  - shimmed
  - unsupported
outcome_summary:
  exact: 2
  translated: 2
  partial: 4
  shimmed: 1
  unsupported: 1
  total_rows: 10
retention:
  retained_after_first_run: true
  lossy_mappings_visible_after_apply: true
  unsupported_items_visible_after_apply: true
  raw_source_profile_bodies_included: false
  raw_absolute_paths_included: false
rollback_checkpoint:
  outcome_class: checkpoint_created_pre_apply
  availability_state: available
  cleanup_state: retained
  restore_action_hints:
    - compare_before_restore
    - restore_from_checkpoint
    - export_for_support
shortcut_delta_digest:
  conflicts_visible_before_apply: true
  conflict_inspector_ref: surface:help.keybinding_inspector.conflicts
  rows:
    - row_id: shortcut_delta_row:import-review-vscode-common-retained.command_palette
      classification: translated
      imported_command_ref: vscode:workbench.action.showCommands
      aureline_command_ref: cmd:command_palette.open
      visible_before_apply: true
    - row_id: shortcut_delta_row:import-review-vscode-common-retained.keybindings_open
      classification: partial
      imported_command_ref: vscode:workbench.action.openGlobalKeybindings
      aureline_command_ref: cmd:settings.open
      conflict_review_ref: keybinding-conflict-review:import:import-review-vscode-common-retained:ctrl-k-ctrl-s
      conflict_inspector_ref: surface:help.keybinding_inspector.conflicts
      visible_before_apply: true
reopen_links:
  - surface: settings
    action_ref: settings:profile.import_history.open_report:import-review-vscode-common-retained
  - surface: help
    action_ref: help:migration.open_report:import-review-vscode-common-retained
  - surface: support_export
    action_ref: support:export.include_migration_report:import-review-vscode-common-retained
docs_help_refs:
  - docs/migration/first_run_import_diff_and_rollback_contract.md
  - docs/migration/import_diagnostics_packet.md
  - docs/migration/migration_restore_and_shortcut_delta_packet.md
fixture_refs:
  - fixtures/migration/import_diff_cases/vscode_common_retained_report.yaml
