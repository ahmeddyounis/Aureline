# Migration-parity alpha scoreboard.
#
# This is the canonical alpha row source for what import can preserve,
# translate, approximate, reject, or hold for manual follow-up on the first
# switching paths. Migration center, docs, issue templates, support exports,
# and public proof packets should consume these rows instead of restating them.

schema_version: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

scoreboard_id: migration_parity_alpha_scoreboard
status: seeded
human_entrypoint_ref: docs/migration/import_diagnostics_packet.md
alpha_scope_matrix_ref: artifacts/milestones/m2/alpha_wedge_matrix.yaml
alpha_exit_scoreboard_ref: artifacts/milestones/m2/exit_gate_scoreboard.yaml
alpha_scoreboard_row_ref: scoreboard_row:alpha_scope.migration_parity
gap_taxonomy_ref: artifacts/migration/import_gap_taxonomy.yaml
known_limits_ref: artifacts/feedback/external_alpha_known_limits.md
protected_fixture_manifest_ref: fixtures/migration/parity_alpha_cases/manifest.yaml

validator:
  script_ref: ci/check_migration_parity_alpha.py
  command: python3 ci/check_migration_parity_alpha.py --repo-root .
  consumer_projection_command: python3 ci/check_migration_parity_alpha.py --repo-root . --render-retained-diagnostics

source_contract_refs:
  - artifacts/milestones/m2/alpha_wedge_matrix.yaml
  - artifacts/milestones/m2/exit_gate_scoreboard.yaml
  - docs/migration/migration_center_object_model.md
  - docs/migration/migration_equivalence_and_parity_scorecard.md
  - docs/migration/first_run_import_diff_and_rollback_contract.md
  - docs/migration/post_import_validation_contract.md
  - docs/migration/compatibility_scorecard_contract.md
  - docs/migration/migration_restore_and_shortcut_delta_packet.md
  - artifacts/migration/migration_gap_scoreboard.yaml
  - artifacts/migration/source_ecosystem_rows.yaml
  - artifacts/migration/top_imported_workflow_rows.yaml
  - artifacts/migration/quality_bar_rubric.yaml
  - schemas/migration/importer_outcome.schema.json
  - schemas/migration/migration_report.schema.json
  - schemas/migration/parity_scorecard.schema.json
  - schemas/migration/equivalence_map_row.schema.json

parity_state_vocabulary:
  - native_parity
  - bridged_parity
  - lossy_mapping
  - unsupported_items
  - manual_follow_up

importer_outcome_state_vocabulary:
  - imported
  - mapped
  - skipped
  - manual_review
  - bridge_required
  - unsupported

category_vocabulary:
  - keymap
  - theme_and_visuals
  - settings
  - snippets_and_templates
  - tasks_and_run_configs
  - launch_debug
  - extensions_and_providers
  - workspace_metadata
  - workflow_bundle_handoff
  - other

confidence_class_vocabulary:
  - high
  - medium
  - low
  - manual_review_required

evidence_state_vocabulary:
  - current_seed
  - seed_only
  - retest_pending
  - blocked

publication_rules:
  - rule_id: migration_parity_rule:no_overall_score_hides_categories
    summary: >
      Category scores stay separate. A strong keymap or settings row may not
      hide weak extension, task, run, debug, or unsupported-item rows.
    required_action: >
      Consumers render row or category status before any local summary.
    refs:
      - docs/migration/migration_equivalence_and_parity_scorecard.md
      - docs/migration/import_diagnostics_packet.md

  - rule_id: migration_parity_rule:retained_diagnostics_required
    summary: >
      Every row carries stable migration-session, outcome-packet,
      migration-report, support-export, and issue-template refs so outcomes
      can be revisited after first-run onboarding.
    required_action: >
      A row missing retained_import_diagnostics is non-conforming.
    refs:
      - docs/migration/migration_center_object_model.md
      - docs/migration/post_import_validation_contract.md
      - docs/support/support_bundle_contract.md

  - rule_id: migration_parity_rule:gaps_bind_to_wedges_and_templates
    summary: >
      Any row below native parity cites import-gap taxonomy rows, known-limit
      ids, claimed alpha wedges, and issue-template bindings.
    required_action: >
      Widening or hiding a gap requires the taxonomy, known-limits packet,
      proof packet, and issue-template fields to move in the same change set.
    refs:
      - artifacts/migration/import_gap_taxonomy.yaml
      - artifacts/feedback/external_alpha_known_limits.md
      - docs/governance/dogfood_issue_taxonomy.md

retained_import_diagnostics_contract:
  packet_ref: docs/migration/import_diagnostics_packet.md
  required_fields:
    - migration_session_ref
    - outcome_packet_ref
    - migration_report_ref
    - support_export_ref
    - export_packet_ref
    - revisit_surface_refs
  required_revisit_surfaces:
    - migration_center_history
    - support_export
    - issue_template
  redaction_rule: >
    Retained diagnostics carry refs, counts, states, caveats, and evidence
    links. They do not carry raw source profile bodies, raw paths, raw
    extension storage, secrets, credentials, or workspace file contents.
  first_consumer:
    surface_class: cli_support_projection
    consumer_ref: ci/check_migration_parity_alpha.py
    command: python3 ci/check_migration_parity_alpha.py --repo-root . --render-retained-diagnostics

