# Harness owner map for the rendering/layout golden, accessibility-tree,
# and protocol-fuzz harness plan.
#
# Single machine-readable map that binds every harness family named in
# docs/qe/golden_and_fuzz_harness_plan.md to an owner DRI, a lane in
# artifacts/qe/test_lane_registry.yaml, an artifact sink, a runner
# location, a drift-review forum, and the refresh cadence the family
# runs under. Tooling — release review, shiproom dashboard, scorecard
# generator, drift reviewer — reads this file by stable harness_id.
#
# The human-readable companion is docs/qe/golden_and_fuzz_harness_plan.md.
# The render/layout and accessibility-tree categories live in
# fixtures/qe/render_golden_manifest.yaml; the fuzz targets live in
# fixtures/qe/fuzz_target_inventory.yaml. If the narrative disagrees
# with this file, this file is authoritative for tooling and the
# narrative is updated in the same change.
#
# Rules:
#   - Every row MUST cite exactly one lane_ref from
#     artifacts/qe/test_lane_registry.yaml#lanes.
#   - Every row MUST name exactly one artifact_sink drawn from
#     artifacts/qe/test_lane_registry.yaml#artifact_sink_values.
#   - Every row MUST declare a refresh_cadence drawn from the closed
#     cadence_values below.
#   - Every row MUST declare drift_review_forum drawn from the closed
#     review_forum_values below and MAY declare co_required_forums.
#   - A row whose runner has not yet been seeded MUST set
#     runner_posture: planned_not_yet_seeded and runner_planned_path
#     MUST resolve to a repo path.
#   - Planning / milestone slugs MUST NOT appear in any id, title,
#     scope note, or tag on this file.

schema_version: 1
registry_id: aureline.qe.harness_owner_map
registry_revision: 1
overview_document: docs/qe/golden_and_fuzz_harness_plan.md
test_lane_registry_ref: artifacts/qe/test_lane_registry.yaml
quality_scenario_hooks_ref: artifacts/qe/quality_scenario_hooks.yaml
release_blocking_rules_ref: artifacts/qe/release_blocking_rules.yaml
render_golden_manifest_ref: fixtures/qe/render_golden_manifest.yaml
fuzz_target_inventory_ref: fixtures/qe/fuzz_target_inventory.yaml
ownership_matrix_ref: artifacts/governance/ownership_matrix.yaml
decision_index_ref: artifacts/governance/decision_index.yaml
benchmark_quarantine_rules_ref: artifacts/benchmarks/quarantine_rules.yaml

# -----------------------------------------------------------------------------
# Cadence vocabulary (closed).
#
# Narrower than the lane cadence vocabulary — harness runs are either
# per-change, nightly, pre-release, or on-incident. A row that reports a
# value outside this set is non-conforming.
# -----------------------------------------------------------------------------
cadence_values:
  - each_change
  - pre_merge_required
  - nightly
  - pre_release_required
  - per_milestone
  - on_incident_only

# -----------------------------------------------------------------------------
# Artifact-sink vocabulary (closed).
#
# Mirrors artifacts/qe/test_lane_registry.yaml#artifact_sink_values so
# the harness owner map composes against the lane registry.
# -----------------------------------------------------------------------------
artifact_sink_values:
  - benchmark_lab
  - release_evidence
  - support_export
  - governance_packets
  - accessibility_review
  - qe_dashboard

artifact_sink_posture_values:
  - seeded
  - planned_not_yet_seeded

# -----------------------------------------------------------------------------
# Review-forum vocabulary (closed).
# -----------------------------------------------------------------------------
review_forum_values:
  - architecture_council
  - accessibility_review
  - security_trust_review
  - performance_council
  - compatibility_ecosystem_review
  - release_council
  - ux_review
  - localization_review

# -----------------------------------------------------------------------------
# Runner posture vocabulary (closed).
# -----------------------------------------------------------------------------
runner_posture_values:
  - seeded
  - planned_not_yet_seeded

# =============================================================================
# Harness family rows.
#
# Every family named in docs/qe/golden_and_fuzz_harness_plan.md. Nine
# rendering/layout golden families, four accessibility-tree families,
# five protocol-fuzz families. Each row is the contract for one harness
# family's ownership, runner location, artifact format, and refresh
# cadence. Adding a row is additive-minor; renaming, retiring, or
# merging rows is breaking and opens a decision row in
# artifacts/governance/decision_index.yaml.
# =============================================================================
