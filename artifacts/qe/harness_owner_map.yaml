# -----------------------------------------------------------------------------
# Schema-level invariants.
# -----------------------------------------------------------------------------
invariants:
  - id: every_family_cites_one_lane
    description: >
      Every row MUST cite exactly one lane_ref resolving to
      artifacts/qe/test_lane_registry.yaml#lanes. A family that does
      not route through a declared lane does not produce review-grade
      evidence.
  - id: every_family_cites_manifest_row
    description: >
      Every row MUST cite a manifest_row_ref resolving to a row in
      manifest_source. A family without a manifest anchor is
      non-conforming.
  - id: every_family_declares_refresh_cadence
    description: >
      Every row MUST declare a refresh_cadence drawn from
      cadence_values. A family without a declared cadence cannot be
      scheduled by the runner.
  - id: every_family_declares_drift_review_forum
    description: >
      Every row MUST declare drift_review_forum drawn from
      review_forum_values. Co-required forums are additive.
  - id: planned_runner_requires_declared_path
    description: >
      A row with runner_posture planned_not_yet_seeded MUST declare
      runner_planned_path so the planned home is discoverable before
      the runner lands.
  - id: missing_backup_requires_active_waiver
    description: >
      A row without a backup_owner MUST cite a backup_waiver that
      resolves to an active waiver in
      artifacts/governance/ownership_matrix.yaml#waivers.
  - id: renaming_or_retiring_is_breaking
    description: >
      Renaming a harness_id, retiring a family, or reassigning a
      family across lane_ref is breaking and opens a decision row in
      artifacts/governance/decision_index.yaml.
