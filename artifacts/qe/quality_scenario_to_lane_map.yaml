# Quality-scenario → lane mapping.
#
# Joins each `qas:*` scenario to:
#   - benchmark slices (protected paths, budgets, corpora, fitness rows),
#   - QE test lanes (artifacts/qe/test_lane_registry.yaml),
#   - accessibility and visual-review lanes,
#   - waiver authority (artifacts/governance/ownership_matrix.yaml#decision_forums).
#
# This file is intentionally redundant with the journey map and perf ledgers:
# it provides a one-hop lookup keyed by scenario id so review packets can cite
# a scenario id and resolve the evidence lanes mechanically.

schema_version: 1
map_id: aureline.qe.quality_scenario_to_lane_map
title: Quality scenario to lane mapping
overview_document: docs/architecture/quality_attribute_scenarios.md

source_refs:
  scenario_rows_ref: artifacts/architecture/quality_scenario_rows.yaml
  protected_journey_map_ref: artifacts/architecture/protected_journey_map.yaml
  latency_budget_ledger_ref: artifacts/perf/latency_budget_ledger.yaml
  evidence_linkage_seed_ref: artifacts/perf/evidence_linkage_seed.yaml
  critical_sequence_latencies_ref: artifacts/perf/critical_sequence_latencies.yaml
  protected_metrics_ref: artifacts/bench/protected_metrics.yaml
  test_lane_registry_ref: artifacts/qe/test_lane_registry.yaml

lane_id_note: >
  `qe_lane_ids[]` values resolve to artifacts/qe/test_lane_registry.yaml#lanes[*].id.
  `primary_evidence_owner_lane` mirrors the owner-lane vocabulary (lane:*) used by
  the traceability matrices.

