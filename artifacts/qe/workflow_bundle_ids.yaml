# -----------------------------------------------------------------------------
# Closed vocabularies.
#
# Adding a value is additive-minor and lands in this file and in the
# schema/doc in the same change. Repurposing or removing a value is
# breaking and requires a decision row.
# -----------------------------------------------------------------------------

# The seven scoreboard families the launch-wedge contract reads before
# any replacement-grade wording is tentatively used. Listed in reading
# order: bootstrap first, then migration, then daily-driver parity,
# then bridge parity, then archetype proof, then the benchmark /
# public-proof family, then docs / known-limits / support alignment.
scoreboard_family_vocabulary:
  - bootstrap_and_entry_parity_scoreboard
  - migration_fidelity_scoreboard
  - task_run_test_debug_parity_scoreboard
  - extension_or_package_bridge_parity_scoreboard
  - workflow_bundle_or_archetype_proof_scoreboard
  - benchmark_and_public_proof_packet_scoreboard
  - docs_known_limits_support_copy_alignment_scoreboard

# The proof surfaces a scoreboard row MAY be qualified against. Mirrors
# the publication destinations in assurance_claim_rows.yaml but is
# expressed in the qe lane's vocabulary so scoreboard rows do not bleed
# marketing surfaces into the proof boundary.
proof_surface_vocabulary:
  - start_center_and_open_flow
  - first_useful_edit_measurement
  - migration_dry_run_review
  - task_event_run_panel
  - test_runner_panel
  - debug_session_panel
  - terminal_and_repl_panel
  - extension_or_package_bridge_surface
  - reference_workspace_checkout
  - certified_archetype_report
  - benchmark_lab_run_result
  - benchmark_publication_pack
  - release_evidence_packet
  - docs_reference_page
  - help_about_page
  - known_limits_note_page
  - release_notes_pack
  - support_export_bundle
  - service_health_page
  - claim_manifest_row_projection

# The packet-shape classes declared by schemas/qe/public_proof_packet
# .schema.json. A scoreboard family declares which shapes its rows
# MAY emit; a cutline row cites one shape when it picks an admissible
# proof packet. Emission shape names match the schema discriminator.
public_proof_packet_shape_vocabulary:
  - bootstrap_entry_parity_packet
  - migration_fidelity_packet
  - task_run_test_debug_parity_packet
  - extension_or_package_bridge_parity_packet
  - workflow_bundle_or_archetype_proof_packet
  - benchmark_public_proof_packet
  - docs_known_limits_support_copy_alignment_packet

# Result classes for one scoreboard row on one packet. Mirrors the row-
# result vocabulary on benchmark run results but narrowed so a
# scoreboard row cannot silently "pass" a narrower claim.
scoreboard_result_class_vocabulary:
  - pass_full_proof
  - pass_with_known_limit
  - pass_on_narrow_scope
  - narrow_claim_before_publish
  - retest_pending
  - fail_claim_blocked
  - quarantined
  - waived_with_expiry
  - not_yet_measured

# Support classes the scoreboard families inherit verbatim from
# artifacts/compat/archetype_rubric.yaml so no lane invents a ladder.
support_class_vocabulary:
  - certified
  - supported
  - community
  - experimental

# Closed freshness cadences the scoreboards inherit from
# artifacts/governance/evidence_freshness_slos.yaml. Rows read these
# values, never free-text durations.
freshness_cadence_vocabulary:
  - each_change
  - each_release
  - weekly_plus_release_candidate
  - per_milestone

# Downgrade-trigger vocabulary re-exported from the assurance-claim
# matrix so the scoreboards do not mint parallel narrowings.
downgrade_trigger_vocabulary:
  - required_evidence_missing
  - required_evidence_stale
  - required_evidence_narrower_than_claim
  - docs_version_match_unmet
  - docs_freshness_floor_unmet
  - unresolved_migration_gap
  - caveat_uncovered
  - proof_class_not_currently_verifiable
  - exception_window_expired
  - compatibility_row_degraded
  - support_window_expired
  - policy_blocked
  - benchmark_corpus_missing_or_stale
  - certified_archetype_report_missing_or_stale
  - compatibility_report_missing_or_stale
  - migration_note_missing_or_stale
  - known_limit_note_missing
  - support_export_cannot_redact_persona_workspace
  - persona_workflow_floor_broken
  - claim_manifest_row_missing_or_narrowed

# The proof-class vocabulary scoreboard rows cite. Aligned with
# evidence_freshness_slos.yaml proof_class list so scoreboard row
# freshness can be evaluated without re-deriving the class.
proof_class_vocabulary:
  - benchmark_publication_proof
  - compatibility_report_proof
  - docs_claim_truth_proof
  - continuity_drill_proof
  - support_scenario_quality_proof
  - migration_parity_proof
  - security_response_proof
  - transport_governance_proof

# -----------------------------------------------------------------------------
# Scoreboard families.
#
# One row per family. Every row names the packet shape it admits, the
# proof surfaces it MAY render through, the proof classes it consumes
# from the freshness SLO matrix, and the downgrade triggers that
# demote a claim reading this scoreboard before the cutline's
# narrowing_posture activates.
# -----------------------------------------------------------------------------
scoreboard_families:

  - family_id: bootstrap_and_entry_parity_scoreboard
    title: Bootstrap and entry parity scoreboard
    summary: >
      Qualifies whether first-run, Start Center, open-flow, restore-card,
      and import-picker surfaces project the same bootstrap / entry
      truth a daily-driver or replacement-grade persona depends on
      before their first useful edit. Rows cite the no-account
      switching scoreboard and the task-success corpus rather than
      re-deriving entry primitives locally.
    packet_shape: bootstrap_entry_parity_packet
    admissible_proof_surfaces:
      - start_center_and_open_flow
      - first_useful_edit_measurement
      - reference_workspace_checkout
      - docs_reference_page
      - help_about_page
      - support_export_bundle
      - service_health_page
    admissible_proof_classes:
      - docs_claim_truth_proof
      - continuity_drill_proof
      - support_scenario_quality_proof
    admissible_support_classes:
      - certified
      - supported
      - community
      - experimental
    primary_dri_lane: lane:product_scope_review
    evidence_owner_lane: lane:benchmark_lab
    publication_owner_lane: lane:release_evidence
    freshness_cadence: each_release
    upstream_corpus_refs:
      - artifacts/product/task_success_corpus_seed.yaml
      - artifacts/product/no_account_switching_scoreboard_seed.yaml
    downgrade_triggers:
      - persona_workflow_floor_broken
      - docs_freshness_floor_unmet
      - support_export_cannot_redact_persona_workspace
      - required_evidence_missing
      - required_evidence_stale
    admissible_result_classes:
      - pass_full_proof
      - pass_with_known_limit
      - pass_on_narrow_scope
      - narrow_claim_before_publish
      - retest_pending
      - fail_claim_blocked
      - not_yet_measured
    notes: >
      Rows qualify whether a persona can go from "first run" to "first
      useful edit" on a declared reference workspace under the
      declared support class without a service opt-in, and whether
      that outcome is truthfully rendered on docs / help / service-
      health copy and support exports. A row that fails here freezes
      widening on every cutline that cites it.

  - family_id: migration_fidelity_scoreboard
    title: Migration fidelity scoreboard
    summary: >
      Qualifies whether a dry-run import, recorded migration diff, or
      named migration note reproduces against the current reference
      workspace and whether the migration-notes copy, release-notes
      pack, and support-export surface read the same migration truth.
      Rows cite the migration corpus and the compatibility-row
      backbone rather than minting per-tool dialects.
    packet_shape: migration_fidelity_packet
    admissible_proof_surfaces:
      - migration_dry_run_review
      - reference_workspace_checkout
      - release_evidence_packet
      - docs_reference_page
      - known_limits_note_page
      - release_notes_pack
      - support_export_bundle
      - claim_manifest_row_projection
    admissible_proof_classes:
      - migration_parity_proof
      - compatibility_report_proof
      - docs_claim_truth_proof
      - support_scenario_quality_proof
    admissible_support_classes:
      - certified
      - supported
      - community
      - experimental
    primary_dri_lane: lane:docs_public_truth
    evidence_owner_lane: lane:benchmark_lab
    publication_owner_lane: lane:release_evidence
    freshness_cadence: each_release
    upstream_corpus_refs:
      - fixtures/migration/import_diff_manifest.yaml
      - fixtures/benchmarks/corpus_manifest.yaml
    downgrade_triggers:
      - migration_note_missing_or_stale
      - unresolved_migration_gap
      - compatibility_row_degraded
      - docs_version_match_unmet
      - required_evidence_stale
      - claim_manifest_row_missing_or_narrowed
    admissible_result_classes:
      - pass_full_proof
      - pass_with_known_limit
      - pass_on_narrow_scope
      - narrow_claim_before_publish
      - retest_pending
      - fail_claim_blocked
      - waived_with_expiry
      - not_yet_measured
    notes: >
      This family is the single scoreboard the "switch from X" cutline
      copy reads; the Rust self-host cutline intentionally does not
      cite this family because migration_note_current is waived.

  - family_id: task_run_test_debug_parity_scoreboard
    title: Task / run / test / debug parity scoreboard
    summary: >
      Qualifies whether the task-event run panel, test-runner panel,
      debug-session panel, and terminal / REPL panel reproduce the
      persona's daily-driver workflow floor on a declared workflow
      bundle. Rows cite the fitness-function catalog's task-parity
      rows rather than free-text green checks.
    packet_shape: task_run_test_debug_parity_packet
    admissible_proof_surfaces:
      - task_event_run_panel
      - test_runner_panel
      - debug_session_panel
      - terminal_and_repl_panel
      - reference_workspace_checkout
      - benchmark_lab_run_result
      - release_evidence_packet
      - support_export_bundle
    admissible_proof_classes:
      - benchmark_publication_proof
      - compatibility_report_proof
      - support_scenario_quality_proof
      - continuity_drill_proof
    admissible_support_classes:
      - certified
      - supported
      - community
      - experimental
    primary_dri_lane: lane:benchmark_lab
    evidence_owner_lane: lane:benchmark_lab
    publication_owner_lane: lane:release_evidence
    freshness_cadence: each_release
    upstream_corpus_refs:
      - artifacts/bench/fitness_function_catalog.yaml
      - fixtures/benchmarks/corpus_manifest.yaml
    downgrade_triggers:
      - benchmark_corpus_missing_or_stale
      - certified_archetype_report_missing_or_stale
      - compatibility_report_missing_or_stale
      - persona_workflow_floor_broken
      - required_evidence_stale
    admissible_result_classes:
      - pass_full_proof
      - pass_with_known_limit
      - pass_on_narrow_scope
      - narrow_claim_before_publish
      - retest_pending
      - fail_claim_blocked
      - quarantined
      - waived_with_expiry
      - not_yet_measured
    notes: >
      The task / run / test / debug family is the daily-driver parity
      gate. A row that passes here does NOT imply certified wording;
      the archetype proof and benchmark / public-proof scoreboards
      carry that burden separately.

  - family_id: extension_or_package_bridge_parity_scoreboard
    title: Extension or package bridge parity scoreboard
    summary: >
      Qualifies whether declared extension-host or package-manager
      bridges render the same capability-publisher, command-bridge,
      language-server bridge, and package-operation outcomes across
      the persona's declared bundle revision. Rows cite the extension
      manifest schema and language-bundle rows rather than minting
      per-extension dialects.
    packet_shape: extension_or_package_bridge_parity_packet
    admissible_proof_surfaces:
      - extension_or_package_bridge_surface
      - reference_workspace_checkout
      - release_evidence_packet
      - docs_reference_page
      - known_limits_note_page
      - support_export_bundle
    admissible_proof_classes:
      - compatibility_report_proof
      - docs_claim_truth_proof
      - support_scenario_quality_proof
    admissible_support_classes:
      - certified
      - supported
      - community
      - experimental
    primary_dri_lane: lane:compatibility_ecosystem_review
    evidence_owner_lane: lane:benchmark_lab
    publication_owner_lane: lane:release_evidence
    freshness_cadence: each_release
    upstream_corpus_refs:
      - fixtures/benchmarks/corpus_manifest.yaml
      - artifacts/product/language_bundle_rows.yaml
    downgrade_triggers:
      - compatibility_row_degraded
      - compatibility_report_missing_or_stale
      - known_limit_note_missing
      - required_evidence_stale
      - docs_version_match_unmet
    admissible_result_classes:
      - pass_full_proof
      - pass_with_known_limit
      - pass_on_narrow_scope
      - narrow_claim_before_publish
      - retest_pending
      - fail_claim_blocked
      - quarantined
      - waived_with_expiry
      - not_yet_measured
    notes: >
      Extension / package-bridge parity rows are narrower than
      daily-driver parity rows and wider than benchmark rows: a
      widened bridge claim forces a known-limit note and a retest,
      never silent green.

  - family_id: workflow_bundle_or_archetype_proof_scoreboard
    title: Workflow-bundle / archetype proof scoreboard
    summary: >
      Qualifies whether a certified-archetype report or a launch-
      language bundle's reference workspace is current for the
      persona at the bundle's declared support class. Rows cite the
      compatibility-row schema and the certified-archetype report
      template verbatim so the scoreboard does not re-describe the
      rubric.
    packet_shape: workflow_bundle_or_archetype_proof_packet
    admissible_proof_surfaces:
      - reference_workspace_checkout
      - certified_archetype_report
      - release_evidence_packet
      - docs_reference_page
      - claim_manifest_row_projection
      - support_export_bundle
    admissible_proof_classes:
      - compatibility_report_proof
      - benchmark_publication_proof
      - docs_claim_truth_proof
      - continuity_drill_proof
    admissible_support_classes:
      - certified
      - supported
      - community
      - experimental
    primary_dri_lane: lane:release_evidence
    evidence_owner_lane: lane:benchmark_lab
    publication_owner_lane: lane:release_evidence
    freshness_cadence: each_release
    upstream_corpus_refs:
      - artifacts/compat/reference_workspace_rows.yaml
      - artifacts/compat/qualification_matrix_seed.yaml
      - artifacts/compat/version_skew_register.yaml
    downgrade_triggers:
      - certified_archetype_report_missing_or_stale
      - compatibility_report_missing_or_stale
      - required_evidence_narrower_than_claim
      - compatibility_row_degraded
      - claim_manifest_row_missing_or_narrowed
      - support_window_expired
    admissible_result_classes:
      - pass_full_proof
      - pass_with_known_limit
      - pass_on_narrow_scope
      - narrow_claim_before_publish
      - retest_pending
      - fail_claim_blocked
      - quarantined
      - waived_with_expiry
      - not_yet_measured
    notes: >
      This is the single scoreboard "supports X" or "certified for X"
      wording reads. A row here that falls out of cadence narrows the
      support class on the bound bundle before any cutline widens a
      downstream claim.

  - family_id: benchmark_and_public_proof_packet_scoreboard
    title: Benchmark and public-proof packet scoreboard
    summary: >
      Qualifies whether a benchmark-lab run result, dashboard snapshot,
      or publishable benchmark pack is current, comparable, and
      publishable under the public-comparison rules. Rows cite the
      benchmark-publication pack template and the run-result schema
      rather than re-describing methodology.
    packet_shape: benchmark_public_proof_packet
    admissible_proof_surfaces:
      - benchmark_lab_run_result
      - benchmark_publication_pack
      - release_evidence_packet
      - claim_manifest_row_projection
      - docs_reference_page
    admissible_proof_classes:
      - benchmark_publication_proof
      - compatibility_report_proof
      - docs_claim_truth_proof
    admissible_support_classes:
      - certified
      - supported
      - community
      - experimental
    primary_dri_lane: lane:benchmark_lab
    evidence_owner_lane: lane:benchmark_lab
    publication_owner_lane: lane:release_evidence
    freshness_cadence: each_release
    upstream_corpus_refs:
      - artifacts/bench/fitness_function_catalog.yaml
      - artifacts/bench/protected_metrics.yaml
      - fixtures/benchmarks/corpus_manifest.yaml
    downgrade_triggers:
      - benchmark_corpus_missing_or_stale
      - required_evidence_stale
      - required_evidence_narrower_than_claim
      - compatibility_row_degraded
      - claim_manifest_row_missing_or_narrowed
    admissible_result_classes:
      - pass_full_proof
      - pass_with_known_limit
      - pass_on_narrow_scope
      - narrow_claim_before_publish
      - retest_pending
      - fail_claim_blocked
      - quarantined
      - waived_with_expiry
      - not_yet_measured
    notes: >
      The only scoreboard where a public head-to-head comparison is
      admissible. Rows that carry a competitor-settings block MUST
      set publication_posture to public_head_to_head_comparison in
      the packet; every other publication posture is narrower.

  - family_id: docs_known_limits_support_copy_alignment_scoreboard
    title: Docs / known-limits / support-copy alignment scoreboard
    summary: >
      Qualifies whether docs reference pages, Help / About pages,
      release-notes packs, known-limits notes, and support-export
      narrations read the same claim copy the cutline admits.
      Misalignment here narrows the cutline's claim wording before
      any surface is published.
    packet_shape: docs_known_limits_support_copy_alignment_packet
    admissible_proof_surfaces:
      - docs_reference_page
      - help_about_page
      - known_limits_note_page
      - release_notes_pack
      - support_export_bundle
      - service_health_page
      - claim_manifest_row_projection
    admissible_proof_classes:
      - docs_claim_truth_proof
      - support_scenario_quality_proof
      - compatibility_report_proof
      - migration_parity_proof
    admissible_support_classes:
      - certified
      - supported
      - community
      - experimental
    primary_dri_lane: lane:docs_public_truth
    evidence_owner_lane: lane:docs_public_truth
    publication_owner_lane: lane:release_evidence
    freshness_cadence: each_change
    upstream_corpus_refs:
      - artifacts/governance/claim_manifest_seed.yaml
      - artifacts/governance/public_truth_parity_matrix.yaml
    downgrade_triggers:
      - docs_version_match_unmet
      - docs_freshness_floor_unmet
      - known_limit_note_missing
      - required_evidence_stale
      - claim_manifest_row_missing_or_narrowed
      - caveat_uncovered
    admissible_result_classes:
      - pass_full_proof
      - pass_with_known_limit
      - pass_on_narrow_scope
      - narrow_claim_before_publish
      - retest_pending
      - fail_claim_blocked
      - not_yet_measured
    notes: >
      Every other scoreboard family is readable when stale; this
      family switches to stale, limited, or mismatch wording rather
      than continuing to present current claim copy.

# -----------------------------------------------------------------------------
# Versioned workflow-bundle rows.
#
# One row per launch-language bundle the scoreboards qualify. Every row
# carries a bundle_revision so benchmark, compatibility, migration,
# and claim rows can cite the same bundle across milestones without
# renaming. Each row names the scoreboard families that MUST qualify
# the bundle before the cutline binding it widens a claim.
# -----------------------------------------------------------------------------
workflow_bundles:

  - bundle_id: launch_bundle:typescript_web_app.seed
    bundle_revision: 1
    public_label: TypeScript / JavaScript web-app launch bundle
    persona_refs:
      - persona:p0.typescript_web_app_developer
    archetype_row_refs:
      - archetype_row_id: archetype_row:ts_web_app_or_service
        archetype_revision: 1
    cutline_refs:
      - cutline:replacement_grade.typescript_web_app_developer
    required_scoreboard_families:
      - bootstrap_and_entry_parity_scoreboard
      - migration_fidelity_scoreboard
      - task_run_test_debug_parity_scoreboard
      - extension_or_package_bridge_parity_scoreboard
      - workflow_bundle_or_archetype_proof_scoreboard
      - benchmark_and_public_proof_packet_scoreboard
      - docs_known_limits_support_copy_alignment_scoreboard
    support_class_floor: supported
    replacement_grade_support_class: certified
    notes: >
      The launch wedge. Every scoreboard family MUST carry a current
      row on this bundle before replacement-grade wording is admitted;
      migration fidelity is load-bearing because the replacement-
      target note explicitly cites a competing IDE.

  - bundle_id: launch_bundle:python_service_or_data_app.seed
    bundle_revision: 1
    public_label: Python service / data-app launch bundle
    persona_refs:
      - persona:p0.python_service_or_data_app_developer
    archetype_row_refs:
