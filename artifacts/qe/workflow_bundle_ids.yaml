# Public-proof scoreboard families and versioned workflow-bundle IDs.
#
# Machine-readable register of the seven public-proof scoreboard families
# the launch-wedge contract reads before any replacement-grade,
# daily-driver, or certified wording is even tentatively used, plus the
# versioned workflow-bundle and archetype IDs those scoreboards cite so
# benchmark, compatibility, migration, docs, support, and claim rows
# can share one set of bundle anchors rather than minting per-lane
# aliases.
#
# Tooling reads this file. The normative narrative is
# docs/qe/public_proof_scoreboards.md. If the two disagree, this file
# is authoritative for tooling and the narrative is updated in the same
# change.
#
# Scope.
#   - Seven scoreboard families bind the proof surfaces the launch-wedge
#     contract cares about: bootstrap/entry parity, migration fidelity,
#     task/run/test/debug parity, extension or package bridge parity,
#     workflow-bundle or archetype proof, benchmark/public-proof packets,
#     and docs/known-limits/support copy alignment.
#   - Versioned workflow-bundle rows carry the bundle_id, bundle_revision,
#     stable anchors into the language-bundle rows and archetype rows, the
#     proof_surfaces the bundle actively projects through, and the
#     scoreboard families that qualify the bundle's evidence.
#   - Versioned archetype rows re-export the archetype_row_id from
#     artifacts/compat/reference_workspace_rows.yaml with an archetype_
#     revision so a reviewer can tell at a glance whether a compatibility
#     report, migration note, benchmark corpus row, or claim row is
#     talking about the same archetype revision the scoreboard qualified.
#
# Rules.
#   - Every seeded launch-wedge cutline row
#     (artifacts/product/replacement_grade_cutlines.yaml) MUST point to
#     one scoreboard_family_id and one public_proof_packet_shape_ref
#     rather than inventing a bespoke proof bundle.
#   - Benchmark, migration, compatibility, docs, and support evidence MAY
#     share a workflow_bundle_id without renaming or reinterpretation:
#     every cross-surface scoreboard row cites one versioned
#     workflow_bundle_id and one archetype_row_id + archetype_revision.
#   - Top-level claim rows
#     (artifacts/release/assurance_claim_rows.yaml) quoting a cutline
#     MUST cite the scoreboard_family_id that qualifies the claim plus
#     the workflow_bundle_id the claim leans on.
#   - Bundle or archetype revisions are append-only: bumping a revision
#     is additive-minor; renaming a bundle_id or archetype_row_id is
#     breaking and requires a decision row in
#     artifacts/governance/decision_index.yaml.
#   - Scoreboard-family additions are additive-minor. Renaming or
#     repurposing an existing family_id is breaking.
#   - Milestone slugs MUST NOT appear in any id, bundle label, scoreboard
#     label, or packet-shape label.

schema_version: 1
status: seeded
register_id: aureline.qe.public_proof_scoreboard_register

