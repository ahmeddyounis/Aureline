# -----------------------------------------------------------------------------
# Scoreboard register invariants.
#
# Validators that read this file should treat each invariant as a
# closed-world rule. Adding an invariant is breaking; removing one is a
# decision row.
# -----------------------------------------------------------------------------
invariants:
  - invariant_id: invariant:every_scoreboard_family_declares_one_packet_shape
    statement: >
      Every entry in scoreboard_families carries exactly one
      packet_shape value drawn from
      public_proof_packet_shape_vocabulary. Two families sharing a
      packet_shape is non-conforming because the consumer would not
      be able to tell which family's row it is reading.
  - invariant_id: invariant:every_scoreboard_family_binds_to_proof_surface_and_class
    statement: >
      Every entry in scoreboard_families carries a non-empty
      admissible_proof_surfaces list drawn from
      proof_surface_vocabulary and a non-empty
      admissible_proof_classes list drawn from proof_class_vocabulary.
      Missing either list is non-conforming.
  - invariant_id: invariant:every_workflow_bundle_pins_revision_and_archetype
    statement: >
      Every entry in workflow_bundles carries a bundle_revision
      integer and at least one archetype_row_ref that carries both
      archetype_row_id and archetype_revision. Renaming a bundle_id
      or archetype_row_id is breaking and requires a decision row.
  - invariant_id: invariant:every_active_cutline_has_full_pairing
    statement: >
      Every entry in cutline_scoreboard_pairings names exactly one
      packet_shape per admissible scoreboard_family that the
      cutline's bound bundle requires. A cutline that intentionally
      waives a family (for example the Rust self-host cutline
      waiving migration_fidelity_scoreboard) records the waiver in
      waived_pairings with a non-empty waiver_reason rather than
      dropping the entry silently.
  - invariant_id: invariant:every_scoreboard_family_cites_ownership_lanes
    statement: >
      Every entry in scoreboard_families carries a primary_dri_lane,
      an evidence_owner_lane, and a publication_owner_lane resolving
      to ids in artifacts/governance/ownership_matrix.yaml
      scorecard_lane_index. Missing any lane is non-conforming.
  - invariant_id: invariant:every_scoreboard_family_carries_freshness_cadence
    statement: >
      Every entry in scoreboard_families carries exactly one
      freshness_cadence value drawn from
      freshness_cadence_vocabulary so packet freshness can be
      evaluated without reading prose. The cadence is quoted from
      artifacts/governance/evidence_freshness_slos.yaml.
  - invariant_id: invariant:every_scoreboard_family_lists_downgrade_triggers
    statement: >
      Every entry in scoreboard_families carries a non-empty
      downgrade_triggers list drawn from downgrade_trigger_vocabulary
      so a stale or failed row demotes downstream claim wording on a
      mechanical rule rather than by tribal memory.
  - invariant_id: invariant:top_level_claims_cite_scoreboard_and_bundle
    statement: >
      Top-level claim rows in artifacts/release/assurance_claim_rows
      .yaml that quote a cutline cite exactly one scoreboard_family_id
      plus exactly one workflow_bundle_id this register names. Free-
      text "replacement for X" wording that does not cite the pair
      is non-conforming.
  - invariant_id: invariant:scope_expansion_requires_decision_row
    statement: >
      Adding a scoreboard_family, adding a workflow_bundle, promoting
      a workflow_bundle's support_class_floor, or widening a cutline
      pairing opens a decision row in
      artifacts/governance/decision_index.yaml. Silent scope
      expansion is non-conforming.
