__example__:
  name: approaching_slice_ceiling_warming
  scenario: >
    Managed workspace mw:alpha-0302 is in the warming state; the
    warming_seconds slice has crossed the 80% warning threshold but
    has not yet crossed the budget. The review admits approval but
    MUST raise a threshold_breach_marker disclosure.
  activation_budget_class: approaching_slice_ceiling
  install_review_case_ref: null

record_kind: activation_budget_example_record
activation_budget_class: approaching_slice_ceiling
example_id: activation_budget.example.approaching_slice_ceiling_warming
schema_version: 1

managed_workspace_instance_ref: mw:alpha-0302
managed_workspace_lifecycle_state: warming
managed_workspace_reviewer_label: warming
budget_window:
  window_kind: rolling_seven_day
  window_start: 2026-04-16T00:00:00Z
  window_end: 2026-04-23T00:00:00Z
budget_slices:
  cold_start_seconds:
    budgeted: 600
    consumed: 240
    remaining: 360
    frozen_at_utc_instant: null
  warming_seconds:
    budgeted: 1800
    consumed: 1520
    remaining: 280
    frozen_at_utc_instant: null
  ready_seconds:
    budgeted: 28800
    consumed: 1200
    remaining: 27600
    frozen_at_utc_instant: null
  idle_suspend_events:
    budgeted: 40
    consumed: 3
    remaining: 37
    frozen_at_utc_instant: null
  hibernation_reactivation_events:
    budgeted: 4
    consumed: 0
    remaining: 4
    frozen_at_utc_instant: null
  recovery_seconds:
    budgeted: 600
    consumed: 0
    remaining: 600
    frozen_at_utc_instant: null
  snapshot_minutes:
    budgeted: 120
    consumed: 0
    remaining: 120
    frozen_at_utc_instant: null
degradation_markers: []
threshold_breach_markers:
  - slice: warming_seconds
    threshold_fraction: 0.80
    observed_fraction: 0.8444
    since: 2026-04-22T18:40:00Z
    reason: warming_slice_approaching_ceiling
host_boundary_cue: managed_workspace_boundary
freshness_class: authoritative_live
redaction_class: metadata_and_hashes_only

rollback_posture_interaction:
  admissible_rollback_posture_classes:
    - no_rollback_required
  notes: >
    Approaching-ceiling budgets do not imply rollback; the review
    simply raises a disclosure.

quarantine_posture_interaction:
  admissible_quarantine_posture_classes:
    - no_quarantine_active
  notes: >
    Active quarantine is inconsistent with an approaching-ceiling
    state; the budget would either freeze or drop to unknown.

install_review_disposition_projection:
  admissible_install_review_disposition_classes:
    - proposed
    - awaiting_user_confirmation
    - awaiting_admin_confirmation
    - approved
  notes: >
    Review MAY approve but MUST raise a threshold_breach_markers
    disclosure.

conformance_tests:
  - id: approaching_requires_threshold_breach_marker
    description: >
      approaching_slice_ceiling MUST carry at least one entry in
      threshold_breach_markers; empty lists are non-conforming.
  - id: approaching_keeps_empty_degradation_markers
    description: >
      approaching_slice_ceiling MUST have an empty
      degradation_markers list; crossing the budget implies
      slice_exceeded_with_degradation_marker instead.
