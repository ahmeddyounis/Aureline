__example__:
  name: healthy_under_budget_ready
  scenario: >
    Managed workspace mw:alpha-0301 is in the ready state; every
    slice's consumed value is strictly below its budgeted value; no
    degradation markers are present. An install against this state
    may render approved with no budget-related disclosure.
  activation_budget_class: healthy_under_budget
  install_review_case_ref: null

record_kind: activation_budget_example_record
activation_budget_class: healthy_under_budget
example_id: activation_budget.example.healthy_under_budget_ready
schema_version: 1

managed_workspace_instance_ref: mw:alpha-0301
managed_workspace_lifecycle_state: ready
managed_workspace_reviewer_label: ready
budget_window:
  window_kind: rolling_seven_day
  window_start: 2026-04-16T00:00:00Z
  window_end: 2026-04-23T00:00:00Z
budget_slices:
  cold_start_seconds:
    budgeted: 600
    consumed: 120
    remaining: 480
    frozen_at_utc_instant: null
  warming_seconds:
    budgeted: 1800
    consumed: 420
    remaining: 1380
    frozen_at_utc_instant: null
  ready_seconds:
    budgeted: 28800
    consumed: 12600
    remaining: 16200
    frozen_at_utc_instant: null
  idle_suspend_events:
    budgeted: 40
    consumed: 8
    remaining: 32
    frozen_at_utc_instant: null
  hibernation_reactivation_events:
    budgeted: 4
    consumed: 0
    remaining: 4
    frozen_at_utc_instant: null
  recovery_seconds:
    budgeted: 600
    consumed: 0
    remaining: 600
    frozen_at_utc_instant: null
  snapshot_minutes:
    budgeted: 120
    consumed: 30
    remaining: 90
    frozen_at_utc_instant: null
degradation_markers: []
threshold_breach_markers: []
host_boundary_cue: managed_workspace_boundary
freshness_class: authoritative_live
redaction_class: metadata_and_hashes_only

rollback_posture_interaction:
  admissible_rollback_posture_classes:
    - no_rollback_required
    - rollback_completed_verified
  notes: >
    Healthy budget admits a no_rollback_required posture or the
    verified completion of a prior rollback.

quarantine_posture_interaction:
  admissible_quarantine_posture_classes:
    - no_quarantine_active
    - quarantine_lifted_pending_reverify
  notes: >
    Healthy budget is inconsistent with any active quarantine;
    quarantine_lifted_pending_reverify may still apply if the
    review is checking a recently lifted quarantine.

install_review_disposition_projection:
  admissible_install_review_disposition_classes:
    - proposed
    - awaiting_user_confirmation
    - awaiting_admin_confirmation
    - approved
  notes: >
    Healthy budget does not force admin confirmation; approval is
    admissible.

conformance_tests:
  - id: healthy_requires_strict_under_budget
    description: >
      healthy_under_budget MUST have every slice's consumed value
      strictly below its budgeted value and an empty
      degradation_markers list.
  - id: healthy_requires_live_authoritative_freshness
    description: >
      healthy_under_budget MUST carry freshness_class =
      authoritative_live; warm_cached admits only
      budget_unknown_pending_refresh.
