__example__:
  name: not_applicable_local_host
  scenario: >
    Install targets a local_host_target with no managed-workspace
    binding. The subject does not bind any activation-budget slice;
    activation_budget_class = not_applicable is the only admissible
    value. All budget fields are null.
  activation_budget_class: not_applicable
  install_review_case_ref: install_review.clean_install.extension_public_registry

record_kind: activation_budget_example_record
activation_budget_class: not_applicable
example_id: activation_budget.example.not_applicable_local_host
schema_version: 1

managed_workspace_instance_ref: null
managed_workspace_lifecycle_state: null
managed_workspace_reviewer_label: null
budget_window: null
budget_slices: null
degradation_markers: []
threshold_breach_markers: []
host_boundary_cue: local_host_boundary
freshness_class: authoritative_live
redaction_class: metadata_and_hashes_only

rollback_posture_interaction:
  admissible_rollback_posture_classes:
    - no_rollback_required
  notes: >
    A not_applicable budget class does not constrain rollback
    posture; the install-review sheet projects no_rollback_required
    unless a prior install attempt is being reversed.

quarantine_posture_interaction:
  admissible_quarantine_posture_classes:
    - no_quarantine_active
    - quarantined_by_policy_pack
    - quarantined_publisher
  notes: >
    A not_applicable budget class admits any quarantine posture;
    the posture is driven by the extension or publisher, not the
    managed-workspace binding.

install_review_disposition_projection:
  admissible_install_review_disposition_classes:
    - proposed
    - awaiting_user_confirmation
    - awaiting_admin_confirmation
    - approved
    - denied
  notes: >
    not_applicable imposes no disposition narrowing. The managed-
    workspace-binding rules do not apply.

conformance_tests:
  - id: not_applicable_null_slices
    description: >
      activation_budget_class = not_applicable MUST carry
      budget_slices = null and budget_window = null.
  - id: not_applicable_rejects_managed_workspace_binding_install
    description: >
      A managed_workspace_binding_install review MAY NOT cite
      activation_budget_class = not_applicable.
