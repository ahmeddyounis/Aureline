    forbidden_shortcut_action_classes_enforced: *forbidden_summary_only_shortcuts
    parity_gap_disclosure_required: true
    parity_gap_notes:
      - Dock/launcher badges are not a stable primitive across the claimed GNOME profiles; treating them as claim-bearing is forbidden.
      - If a badge mirror is implemented as best-effort, it must derive from durable objects and never inflate counts beyond the badge-class review.
    upstream_fixture_refs:
      desktop_summary_affordance_record_ref: fixtures/ux/os_notification_cases/dock_taskbar_badge_read_only_mirror.json
