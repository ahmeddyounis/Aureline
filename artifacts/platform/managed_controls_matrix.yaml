explicit_control_gaps:
  - id: desktop_management.control_gap.vendor_specific_mdm_console_adapters
    summary: >
      Vendor-specific MDM console adapters, smart groups, detection
      rules, and package recipes are outside the current claim. The
      claim is the installer/control/result contract those tools can
      automate against.
    affected_controls:
      - desktop_management.control.silent_install
      - desktop_management.control.silent_uninstall
      - desktop_management.control.channel_pinning
  - id: desktop_management.control_gap.raw_proxy_or_mirror_secrets
    summary: >
      Raw proxy credentials, private keys, bearer tokens, raw mirror
      hostnames, and raw policy rule bodies are never part of the
      exported management contract.
    affected_controls:
      - desktop_management.control.proxy_settings
      - desktop_management.control.extension_mirror_location
      - desktop_management.control.policy_bundle_location
  - id: desktop_management.control_gap.package_manager_pin_semantics
    summary: >
      Package-manager pinning is delegated and does not become an
      Aureline channel-pinning claim without a dedicated install-card
      row and fixture.
    affected_controls:
      - desktop_management.control.channel_pinning
      - desktop_management.control.update_deferral
