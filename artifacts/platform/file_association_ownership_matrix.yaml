# File-association and reopen ownership matrix.
#
# Machine-readable companion to
# artifacts/platform/system_affordance_route_audit.md. One row per
# (file_extension_class, side-by-side relation, owning_channel) tuple
# that the install topology admits, plus per-relation rows for recent
# -item registration, dock / taskbar reopen, and protocol-handler
# default ownership. Each row pins which channel owns the registration,
# which review state the surface advertises if the owning channel /
# build would change, and which exact-target reopen rule applies under
# side-by-side coexistence so a reviewer can detect when an ownership
# change would strand users on the wrong file association, recent
# item, dock entry, or deep-link handler.
#
# Tooling reads this file; the route-audit packet is the narrative
# companion. If the two disagree, the route audit wins and this file
# MUST be updated in the same change.
#
# Rules.
#   - Every row resolves to exactly one
#     side_by_side_relation_class value re-exported from
#     artifacts/release/channel_ownership_audit.yaml; no row may invent
#     a new relation.
#   - Every owning_channel field cites a channel_class re-exported
#     from artifacts/release/channel_ownership_audit.yaml.
#   - Every file_association_registration_class,
#     recent_item_registration_class, and
#     protocol_handler_ownership_class field is re-exported from
#     artifacts/release/state_root_map.yaml.
#   - Every handler_ownership_class and ownership_change_review_state
#     field is re-exported from
#     schemas/platform/deep_link_intent.schema.json.
#   - Every source_surface_class field is re-exported from
#     schemas/platform/deep_link_intent.schema.json.
#   - Every audit_event_id field is re-exported from
#     schemas/platform/deep_link_intent.schema.json.
#   - Adding a row is additive-minor and requires bumping
#     schema_version and updating the route-audit packet in the same
#     change. Repurposing an existing value is breaking and opens a
#     row in artifacts/governance/decision_index.yaml.

schema_version: 1
matrix_id: aureline.file_association_ownership_matrix
status: seeded

route_audit_source: artifacts/platform/system_affordance_route_audit.md
deep_link_intent_schema: schemas/platform/deep_link_intent.schema.json
desktop_affordance_contract_source: docs/ux/desktop_affordance_contract.md
channel_ownership_audit_source: artifacts/release/channel_ownership_audit.yaml
state_root_map_source: artifacts/release/state_root_map.yaml
install_topology_matrix_source: artifacts/release/install_topology_matrix.yaml
channel_identity_state_roots_source: artifacts/release/channel_identity_and_state_roots.yaml
portable_mode_limitations_source: artifacts/release/portable_mode_limitations.yaml
claimed_desktop_profiles_source: artifacts/platform/claimed_desktop_profiles.yaml
fixtures_ref_system_affordance: fixtures/platform/system_affordance_cases
fixtures_ref_deep_link_replay: fixtures/platform/deep_link_replay_cases

related_normative_sources:
  - path: .t2/docs/Aureline_PRD.md
    anchors:
      - "§9.12 Native OS integration and desktop management requirements"
      - "§10.22 Deep-link, callback, and replay-deny contracts"
  - path: .t2/docs/Aureline_Technical_Architecture_Document.md
    anchors:
      - "§25.9 Install, portable-mode, and fleet-rollout architecture"
      - "Appendix AA Desktop-Platform Conformance Matrix"
  - path: .t2/docs/Aureline_UI_UX_Spec_Document.md
    anchors:
      - "Native desktop integration, deep-link, and system-affordance contract"

