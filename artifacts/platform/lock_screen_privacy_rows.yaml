# ---------------------------------------------------------------------------
# Conformance assertions every row above must satisfy.
# ---------------------------------------------------------------------------

conformance_assertions:
  - id: privacy_payload_class_resolved
    description: >
      Every row names exactly one privacy_payload_class from the
      closed five values; rows missing or widening this class deny.
    enforced: true
  - id: reopen_routes_to_in_product
    description: >
      Every row asserts reopen_routes_to_in_product_surface = true and
      reopen_target_kind is one of the closed seven; reopen to a
      generic home screen is forbidden.
    enforced: true
  - id: high_risk_shortcut_routed_through_review
    description: >
      Every row enumerates at least one forbidden_shortcut_action_class
      it blocks, and high-risk actions never complete from lock-screen
      quick actions, dock / taskbar shortcuts, system-tray summaries,
      or companion push surfaces.
    enforced: true
  - id: callback_window_focus_steal_forbidden
    description: >
      Every auth / device-handoff row asserts
      callback_window_focus_steal_forbidden = true and names at least
      one callback_focus_steal_denial_class it blocks.
    enforced: true
  - id: redaction_template_within_closed_set
    description: >
      Every row's redaction_template_tokens is a subset of the eight
      closed tokens defined by the upstream notification suppression
      schema.
    enforced: true
  - id: durable_history_preserved_on_dismiss
    description: >
      Lock-screen and companion dismiss never clears the durable
      attention item, the canonical event id, or the object identity;
      only transient OS chrome dismisses.
    enforced: true
  - id: admin_overridable_widening_audited
    description: >
      A row whose policy_override.admin_overridable is true names the
      single widened_payload_class admin policy may permit and the
      audit_event_id the override fires; widening into raw label
      kinds, mutation shortcuts, or generic-home reopen is forbidden.
    enforced: true

# ---------------------------------------------------------------------------
# Denial reasons every row contributes to. These names are re-exported
# from the upstream schemas; rows do not mint parallel denial reasons.
# ---------------------------------------------------------------------------

denial_reasons_enforced:
  - privacy_payload_class_missing_on_lock_screen
  - privacy_payload_class_widened_across_clients
  - raw_body_forbidden_on_os_notification
  - raw_secret_forbidden_on_any_surface
  - raw_prompt_text_forbidden_on_os_notification
  - reopen_to_generic_home_screen
  - high_risk_shortcut_bypassed_review_sheet
  - durable_history_cleared_on_transient_dismiss
  - auth_callback_window_focus_grab
  - browser_handoff_authority_widened_after_expiry
  - companion_push_replay_after_dismiss
  - lifecycle_recovery_silent_authority_rebind
