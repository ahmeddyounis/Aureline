# ---------------------------------------------------------------------------
# Auth / device-handoff rows. One row per surface that returns the user
# from the system browser, a security key, or a companion device into
# Aureline. Rows additionally pin handoff_class and restate that the
# returning window MUST NOT focus-grab over an active product surface.
# ---------------------------------------------------------------------------

auth_handoff_rows:
  - row_id: lock-screen-row:auth-handoff:default_browser_callback:01
    source_class: default_browser_auth_callback_return
    handoff_class: browser_handoff
    delivery_surface_class: os_notification
    privacy_payload_class: lock_screen_safe_generic
    allowed_label_kinds:
      - category_label_only
      - lifecycle_phase_label
    forbidden_label_kinds_enforced:
      - raw_url
      - raw_provider_payload
      - object_identity_on_lock_screen
      - actor_real_name_on_lock_screen
    redacted_summary_template_label: >
      Sign-in step required
    redaction_template_tokens:
      - "{category}"
      - "{lifecycle_phase}"
    allowed_action_kinds:
      - open_review_context_in_product
      - snooze_until_unlocked
    forbidden_shortcut_action_classes_enforced:
      - bypass_review_sheet
      - bypass_approval_workflow
      - policy_override_from_os_shortcut
      - trust_state_change_from_os_shortcut
      - provider_grant_change_from_os_shortcut
      - direct_mutation_from_lock_screen
    reopen_target_kind: review_context
    reopen_routes_to_in_product_surface: true
    must_resolve_through_in_product_surface: true
    callback_window_focus_steal_forbidden: true
    callback_focus_steal_denial_classes:
      - auth_callback_window_focus_grab
      - browser_handoff_authority_widened_after_expiry
    replay_posture_default: single_use
    expired_resolution: replay_denied_expired_routes_to_reauth_sheet
    policy_override:
      admin_overridable: false
      widened_payload_class: null
      widened_label_kinds_allowed_if_overridden: []
      override_audit_event_id: null
    audit_event_id: platform.deep_link_intent_admitted
    drill_packet_row_refs:
