conformance_rows:
  - row_id: desktop_conformance.macos.keyboard_notation_and_menu_accelerators
    surface_id: keyboard_notation_and_menu_accelerators
    platform_profile_refs: [macos_15_plus_universal]
    surface_owner:
      scope_type: governance_lane
      scope_id: shell_command_system
      dri: "@ahmeddyounis"
    review_refs:
      - scope_type: governance_lane
        scope_id: accessibility_input_review
    platform_owned_primitive: macOS modifier glyphs plus the app menu and global menu bar
    validation_method: keyboard-path review plus manual macOS menu smoke
    release_bar: stable_blocker
    claimed_behavior: Menus and accelerator labels use macOS-native notation and routing.
    known_narrowings:
      - Non-default keymap translation is outside this row.

  - row_id: desktop_conformance.macos.window_chrome_and_menu_model
    surface_id: window_chrome_and_menu_model
    platform_profile_refs: [macos_15_plus_universal]
    surface_owner:
      scope_type: package
      scope_id: aureline-render
      dri: "@ahmeddyounis"
    review_refs:
      - scope_type: governance_lane
        scope_id: accessibility_input_review
    platform_owned_primitive: titlebar traffic lights, fullscreen affordance, and menu-bar ownership
    validation_method: window chrome smoke plus fullscreen/Spaces drill
    release_bar: stable_blocker
    claimed_behavior: Window chrome and shell affordances map to host expectations.
    known_narrowings:
      - Portable lane may narrow dock ownership, but not titlebar or menu semantics.

  - row_id: desktop_conformance.macos.file_path_and_path_separator_presentation
    surface_id: file_path_and_path_separator_presentation
    platform_profile_refs: [macos_15_plus_universal]
    surface_owner:
      scope_type: package
      scope_id: aureline-vfs
      dri: "@ahmeddyounis"
    platform_owned_primitive: POSIX path grammar, volume labels, and Finder-style display naming
    validation_method: path-presentation review plus alias/canonical-path smoke
    release_bar: stable_blocker
    claimed_behavior: Human-facing path presentation stays macOS-native without hiding the literal target.
    known_narrowings:
      - Canonical-path truth still wins before risky writes.

  - row_id: desktop_conformance.macos.native_open_save_dialog_routing
    surface_id: native_open_save_dialog_routing
    platform_profile_refs: [macos_15_plus_universal]
    surface_owner:
      scope_type: package
      scope_id: aureline-vfs
      dri: "@ahmeddyounis"
    platform_owned_primitive: AppKit-native open and save dialogs
    validation_method: dialog-routing smoke plus overwrite/recovery review
    release_bar: stable_blocker
    claimed_behavior: Native open/save flows preserve overwrite, read-only, and recovery disclosure.
    known_narrowings:
      - Remote/generated-path disclosure may narrow actions but must remain explicit.

  - row_id: desktop_conformance.macos.system_open_reveal_in_shell_and_open_from_terminal
    surface_id: system_open_reveal_in_shell_and_open_from_terminal
    platform_profile_refs: [macos_15_plus_universal]
    surface_owner:
      scope_type: package
      scope_id: aureline-vfs
      dri: "@ahmeddyounis"
    platform_owned_primitive: Finder reveal, open-command handoff, and shell/drag-drop entry path
    validation_method: integration smoke plus wrong-target drill
    release_bar: stable_blocker
    claimed_behavior: OS-level open and reveal actions land on the intended object with truthful recovery.
    known_narrowings:
      - Portable rows do not claim machine-global default-open ownership.

  - row_id: desktop_conformance.macos.default_browser_callback_and_auth_return
    surface_id: default_browser_callback_and_auth_return
    platform_profile_refs: [macos_15_plus_universal]
    surface_owner:
      scope_type: governance_lane
      scope_id: shell_command_system
      dri: "@ahmeddyounis"
    review_refs:
      - scope_type: decision_forum
        scope_id: security_trust_review
    platform_owned_primitive: Launch Services callback ownership for system-browser sign-in return
    validation_method: origin-validation suite plus manual sign-in drill
    release_bar: stable_blocker
    claimed_behavior: System-browser auth return is attributable, scoped, and spoof-resistant.
    known_narrowings:
      - Named browser-family certification is best-effort outside the default-browser path.

  - row_id: desktop_conformance.macos.deep_link_protocol_handler_and_system_affordance_interstitial
    surface_id: deep_link_protocol_handler_and_system_affordance_interstitial
    platform_profile_refs: [macos_15_plus_universal]
    surface_owner:
      scope_type: governance_lane
      scope_id: shell_command_system
      dri: "@ahmeddyounis"
    review_refs:
      - scope_type: decision_forum
        scope_id: security_trust_review
    platform_owned_primitive: Launch Services protocol and file-handler validation plus widen-authority interstitial
    validation_method: deep-link spoof-resistance drill plus review-link reopen smoke
    release_bar: stable_blocker
    claimed_behavior: Protocol and system-affordance entry paths preserve origin, action class, and scope.
    known_narrowings:
      - Portable installs may open handoff links but must not silently seize shared handler ownership.

  - row_id: desktop_conformance.macos.embedded_auth_boundary_and_device_code_fallback
    surface_id: embedded_auth_boundary_and_device_code_fallback
    platform_profile_refs: [macos_15_plus_universal]
    surface_owner:
      scope_type: decision_forum
      scope_id: security_trust_review
      dri: "@ahmeddyounis"
    platform_owned_primitive: system-browser-first auth with host-owned device-code and fallback state
    validation_method: embedded-surface boundary audit plus browser/device-code drill
    release_bar: stable_blocker
    claimed_behavior: Claimed auth rows prefer the system browser and keep fallback truth host-owned.
    known_narrowings:
      - Embedded password collection is unclaimed unless an approved exception row exists.

  - row_id: desktop_conformance.macos.proxy_pac_inheritance_and_route_source
    surface_id: proxy_pac_inheritance_and_route_source
    platform_profile_refs: [macos_15_plus_universal]
    surface_owner:
      scope_type: decision_forum
      scope_id: security_trust_review
      dri: "@ahmeddyounis"
    platform_owned_primitive: System Settings proxy and PAC resolution
    validation_method: proxy/PAC lab plus route-inspection smoke
    release_bar: claimed_enterprise_support_blocker
    claimed_behavior: Enterprise proxy and PAC inheritance remain inspectable and typed.
    known_narrowings:
