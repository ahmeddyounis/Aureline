profiles:
  - profile_id: macos_15_plus_universal
    label: macOS 15+ universal desktop profile
    platform_class: macos
    architecture_class: universal_binary
    os_floor: macOS 15
    display_stack:
      assumption: Quartz / WindowServer with Spaces and fullscreen
      assurance: normative
    browser_callback:
      assumption: system default browser through Launch Services callback ownership
      assurance: normative
      best_effort_notes:
        - Named browser-family certification is not claimed separately from the default-browser path.
    proxy_source:
      assumption: System Settings proxy and PAC resolution
      assurance: normative
    trust_store:
      assumption: System Roots plus user/admin-imported keychains and configuration profiles
      assurance: normative
    secret_store:
      assumption: Keychain Services
      assurance: normative
    ime_path:
      assumption: macOS Text Input Services and system IMEs
      assurance: normative
    package_paths:
      claimed:
        - pkg_installer
        - notarized_dmg
        - portable_app_bundle_zip
      best_effort:
        - homebrew_cask
      unclaimed:
        - offline_bundle
    deployment_hooks:
      assumption: signed installer or package hooks plus previewable Launch Services ownership changes
      assurance: normative
    deployment_patterns:
      individual_install:
        support_class: claimed
        install_profile_card_refs:
          - card.macos.universal_binary.per_user_installed.stable
          - card.macos.universal_binary.per_machine_installed.stable
        field_support_notes: >
          Claim-bearing macOS direct-install row. Launch Services handler
          ownership, system-browser callback return, native dialogs, and
          Keychain-backed session claims attach here.
      managed_install:
        support_class: claimed
        install_profile_card_refs:
          - card.macos.universal_binary.managed_deployed.stable
        field_support_notes: >
          Managed macOS row uses the same desktop primitives as the direct
          row, with package ownership and admin policy injection widened.
      portable_install:
        support_class: claimed_narrow
        install_profile_card_refs:
          - card.macos.universal_binary.portable.portable_stable
        field_support_notes: >
          Portable macOS claim is narrower by design: no machine-global
          handler ownership, recent-item ownership, or package-manager
          update semantics.
      offline_bundle_or_customer_mirror:
        support_class: unclaimed
        install_profile_card_refs: []
        field_support_notes: >
          macOS offline-bundle and customer-mirror lanes are intentionally
          outside the current claimed row set.
      external_package_manager:
        support_class: best_effort
        install_profile_card_refs:
          - card.macos.universal_binary.external_package_manager.stable
        field_support_notes: >
          Homebrew-owned update and install paths may work, but they do not
          widen the claim-bearing macOS stable row or the default-handler
          ownership posture.

