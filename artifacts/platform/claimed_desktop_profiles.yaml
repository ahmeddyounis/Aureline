explicitly_unclaimed_lanes:
  - lane_id: windows_arm64
    status: unclaimed
    note: >
      Windows ARM64 is outside the current claimed row set until
      install-profile cards and per-OS conformance evidence exist.
  - lane_id: linux_arm64
    status: unclaimed
    note: >
      Linux ARM64 is outside the current claimed row set until
      install-profile cards and named distro or desktop-profile rows
      exist.
  - lane_id: linux_kde_kwallet_and_non_gnome_shell_behaviors
    status: unclaimed
    note: >
      KDE, KWallet, and non-GNOME badge, deep-link, notification, and
      secret-store behaviors are not implied by the named GNOME rows.
  - lane_id: macos_offline_bundle
    status: unclaimed
    note: >
      macOS offline-bundle deployment is intentionally outside the
      current claimed row set.
  - lane_id: windows_winget_external_package_manager
    status: unclaimed
    note: >
      winget is intentionally outside the current claimed row set until
      it has a dedicated install-profile card and support diagnostics
      path.
  - lane_id: portable_rows_as_default_handler_owner
    status: unclaimed
    note: >
      Portable installs on every OS are narrower by design and do not
      claim machine-global file-association, protocol-handler, or
      machine-global recent-item ownership.
  - lane_id: embedded_password_collection_without_exception_register_row
    status: unclaimed
    note: >
      Embedded password collection is prohibited on claimed rows unless a
      separately approved exception row exists under the embedded-surface
      boundary contract.
