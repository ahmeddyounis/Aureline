# Claimed desktop profiles and platform-conformance rows.
#
# Machine-readable companion to docs/platform/desktop_platform_conformance_matrix.md.
# This file binds one named claimed-profile roster, one deployment-pattern
# support table, and one platform-owned primitive row set so release,
# support, accessibility, and compatibility packets do not invent a second
# desktop truth model.
#
# Rules.
#   - A desktop claim is the tuple of platform profile, deployment pattern,
#     and surface row. "macOS", "Windows", or "Linux" alone is not a claim.
#   - Linux rows MUST name the tested display stack and secret-store
#     assumption explicitly; "Linux" without the profile row is
#     non-conforming.
#   - System-browser-first auth is normative on every claimed row.
#     Embedded password collection is outside the claim unless a separately
#     approved exception row exists under the embedded-surface boundary
#     contract.
#   - Portable rows MUST NOT silently widen into default-handler, machine-
#     global recent-item, or machine-global update ownership.
#   - Unsupported or unclaimed lanes are recorded explicitly; omission is
#     not support.

