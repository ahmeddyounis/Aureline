  - path_id: unsupported_path.linux.kwallet_secret_store
    category: secret_store
    support_status: unsupported
    affected_platform_profile_refs: []
    affected_package_manager_rows:
      - pkgmgr.linux.ubuntu_wayland.apt_deb_mirror
    affected_deployment_pattern_refs: []
    unsupported_summary: >
      KWallet-backed long-lived secret storage is not a current Linux
      claim. Claimed Linux rows assume Secret Service through libsecret
      and GNOME Keyring.
    does_not_widen:
      - linux_secret_store_claim
      - linux_auth_session_persistence
      - enterprise_client_certificate_claim
    still_allowed:
      - Session-only degraded operation may be offered where policy allows.
      - Diagnostics must label KWallet as unsupported rather than plaintext fallback.
    before_claim_required:
      - kwallet_secret_store_profile_row
      - credential_lock_deny_lab
      - session_only_degrade_fixture
      - security_review
    disclosure_surfaces:
