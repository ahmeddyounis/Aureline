      - linux_fedora_current_gnome_wayland_x86_64
      - linux_debian_stable_gnome_x11_x86_64
    affected_package_manager_rows:
      - pkgmgr.linux.fedora_wayland.dnf_rpm
      - pkgmgr.linux.debian_x11.apt_deb
    affected_deployment_pattern_refs:
      - desktop_management.pattern.linux_ubuntu_x11.managed
      - desktop_management.pattern.linux_fedora_wayland.managed
      - desktop_management.pattern.linux_debian_x11.managed
    unsupported_summary: >
      Linux managed, offline, and customer-mirror widening is claimed
      only on the named Ubuntu 24.04 GNOME Wayland profile.
    does_not_widen:
      - linux_ubuntu_x11_direct_install
      - linux_fedora_wayland_direct_install
      - linux_debian_x11_direct_install
      - linux_external_package_manager_detection
    still_allowed:
      - Direct local-use rows may still be supported on the named profiles.
      - Package-manager acquisition may be reported as delegated or best-effort where a row exists.
    before_claim_required:
      - per_profile_managed_install_card
      - per_profile_proxy_and_secret_store_lab
      - per_profile_uninstall_state_report_fixture
      - desktop_conformance_row_update
    disclosure_surfaces:
      - install_guide
      - docs_compatibility
      - help_center
      - project_doctor_ui
      - project_doctor_headless
      - support_bundle
      - release_notes
    fixture_refs:
