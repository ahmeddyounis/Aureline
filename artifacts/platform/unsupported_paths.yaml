    unsupported_summary: >
      Linux display stacks outside the named GNOME Wayland and GNOME X11
      profile rows are not covered by current desktop conformance or
      deployment claims.
    does_not_widen:
      - linux_windowing_claim
      - linux_native_dialog_claim
      - linux_deep_link_claim
      - linux_notification_claim
      - linux_accessibility_bridge_claim
    still_allowed:
      - The application may launch, but diagnostics must label the display stack as outside the claimed row set.
      - Local editing can remain available when other requirements are met.
    before_claim_required:
      - named_display_stack_profile_row
      - windowing_and_portal_conformance_fixture
      - accessibility_bridge_fixture
      - notification_and_deep_link_fixture
    disclosure_surfaces:
