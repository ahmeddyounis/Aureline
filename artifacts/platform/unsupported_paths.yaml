      - fixtures/platform/scriptable_install_cases/unsupported_package_manager_gap.yaml
    status: seeded

  - path_id: unsupported_path.linux.non_gnome_desktop_environment
    category: desktop_environment
    support_status: unsupported
    affected_platform_profile_refs: []
    affected_package_manager_rows:
      - pkgmgr.linux.ubuntu_wayland.apt_deb_mirror
    affected_deployment_pattern_refs: []
    unsupported_summary: >
      KDE, Xfce, Sway, Cinnamon, and unnamed Linux desktop environments
      are not covered by the current GNOME desktop profile claims.
    does_not_widen:
      - linux_notification_claim
      - linux_badge_claim
      - linux_deep_link_claim
      - linux_native_dialog_claim
      - linux_accessibility_bridge_claim
    still_allowed:
      - The application may launch, but stable desktop conformance and enterprise support wording do not apply.
      - Support may collect diagnostics and point to the nearest named profile without claiming parity.
    before_claim_required:
      - named_desktop_profile_row
      - display_stack_conformance_fixture
      - notification_badge_deep_link_lab
      - secret_store_assumption_row
    disclosure_surfaces:
      - install_guide
