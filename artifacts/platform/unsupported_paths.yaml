# Unsupported-path disclosure matrix.
#
# Machine-readable companion to
# docs/platform/deployment_and_unsupported_path_matrix.md. This file
# records paths that are unsupported, future work, or delegated so
# docs, diagnostics, Help, support bundles, and field triage can name
# non-claims before they become support surprises.

schema_version: 1
matrix_id: aureline.platform.unsupported_paths
record_kind: unsupported_path_disclosure_matrix
status: seeded

contract_doc_ref: docs/platform/deployment_and_unsupported_path_matrix.md
tested_package_managers_ref: artifacts/platform/tested_package_managers.yaml
desktop_management_contract_ref: docs/platform/desktop_management_contract.md
desktop_conformance_doc_ref: docs/platform/desktop_platform_conformance_matrix.md
claimed_desktop_profiles_ref: artifacts/platform/claimed_desktop_profiles.yaml
deployment_patterns_ref: artifacts/platform/deployment_patterns.yaml
managed_controls_matrix_ref: artifacts/platform/managed_controls_matrix.yaml
fixtures_ref: fixtures/platform/deployment_path_examples/

unsupported_category_vocabulary:
  - package_manager_variant
  - fleet_integration
  - desktop_environment
  - display_stack
  - secret_store
  - architecture
  - install_pattern
  - helper_agent_deployment
  - policy_or_transport

support_status_vocabulary:
  - unsupported
  - future_work
  - best_effort_delegated
  - not_claimed

disclosure_surface_vocabulary:
  - install_guide
  - docs_compatibility
  - help_center
  - about_update_surface
  - project_doctor_ui
  - project_doctor_headless
  - support_bundle
  - field_triage
  - release_notes

rules:
  - id: unsupported_paths_are_visible
    description: >
      Unsupported, future-work, and delegated paths are explicit rows.
      Omission must not be interpreted as support.
  - id: unsupported_path_does_not_block_safe_local_use
    description: >
      When a platform may still launch in a non-claim path, the row must
      say what still works and which claim is withheld.
  - id: every_row_projects_to_support
    description: >
      Every unsupported path names the docs/help/diagnostics/support
      surfaces that must carry the limitation.
  - id: widening_requires_evidence
    description: >
      A row can move from unsupported, future work, or delegated to
      claim-bearing only after the listed evidence and fixture refs land.

unsupported_path_rows:
  - path_id: unsupported_path.windows.winget
    category: package_manager_variant
    support_status: future_work
    affected_platform_profile_refs:
      - windows_11_23h2_plus_x86_64
    affected_package_manager_rows:
      - pkgmgr.windows.winget
    affected_deployment_pattern_refs:
      - desktop_management.pattern.windows.external_package_manager
    unsupported_summary: >
      winget deployment, update, uninstall, and channel pinning are not
      part of the current Windows support claim.
    does_not_widen:
      - windows_individual_install
      - windows_managed_install
      - windows_offline_bundle
      - in_product_update
      - silent_deployment_controls
    still_allowed:
      - User may install through the signed installer, managed MSI/MSIX, signed portable ZIP, or offline bundle rows.
      - Diagnostics may identify winget as an unsupported acquisition source.
    before_claim_required:
      - dedicated_external_package_manager_install_card
      - winget_update_and_uninstall_fixture
      - support_diagnostics_path
      - rollback_evidence_row
    disclosure_surfaces:
      - install_guide
      - docs_compatibility
      - help_center
      - project_doctor_ui
      - project_doctor_headless
      - support_bundle
      - release_notes
    fixture_refs:
      - fixtures/platform/deployment_path_examples/windows_per_user_per_machine_winget_gap.yaml
    status: seeded

  - path_id: unsupported_path.macos.homebrew_update_ownership
    category: package_manager_variant
    support_status: best_effort_delegated
    affected_platform_profile_refs:
      - macos_15_plus_universal
    affected_package_manager_rows:
      - pkgmgr.macos.homebrew_cask
    affected_deployment_pattern_refs:
      - desktop_management.pattern.macos.external_package_manager
    unsupported_summary: >
      Homebrew/cask acquisition is package-manager-owned and does not
      create product-owned update, removal, channel-pinning, or handler
      ownership claims.
    does_not_widen:
      - macos_individual_install
      - macos_managed_install
      - in_product_update
      - default_handler_ownership
      - admin_channel_pinning
    still_allowed:
      - Support may explain that Homebrew owns package update and removal.
      - User state-root diagnostics remain available.
    before_claim_required:
      - package_manager_owned_update_fixture
      - package_manager_uninstall_fixture
      - default_handler_ownership_evidence
      - dedicated_disclosure_copy
    disclosure_surfaces:
      - install_guide
      - help_center
      - about_update_surface
      - project_doctor_ui
      - project_doctor_headless
      - support_bundle
      - field_triage
    fixture_refs:
      - fixtures/platform/deployment_path_examples/macos_mdm_homebrew_boundary.yaml
    status: seeded

  - path_id: unsupported_path.macos.offline_bundle
    category: install_pattern
    support_status: unsupported
    affected_platform_profile_refs:
      - macos_15_plus_universal
    affected_package_manager_rows: []
    affected_deployment_pattern_refs:
      - desktop_management.pattern.macos.offline_or_mirror
    unsupported_summary: >
      macOS offline-bundle and customer-mirror install lanes are not
      part of the current macOS claim.
    does_not_widen:
      - macos_managed_install
      - macos_pkg_install
      - macos_notarized_dmg_install
      - mirror_or_air_gap_support
    still_allowed:
      - Managed PKG deployment remains supported through the managed macOS row.
      - Direct PKG/DMG installation remains the self-serve claim-bearing path.
    before_claim_required:
      - macos_offline_bundle_install_card
      - mirror_metadata_integrity_fixture
      - rollback_evidence_fixture
      - notarization_and_signature_verification_report
    disclosure_surfaces:
      - install_guide
      - docs_compatibility
      - help_center
      - support_bundle
      - release_notes
    fixture_refs:
      - fixtures/platform/scriptable_install_cases/unsupported_package_manager_gap.yaml
    status: seeded

  - path_id: unsupported_path.fleet.vendor_specific_console_adapters
    category: fleet_integration
    support_status: not_claimed
    affected_platform_profile_refs:
      - macos_15_plus_universal
      - windows_11_23h2_plus_x86_64
      - linux_ubuntu_24_04_gnome_wayland_x86_64
    affected_package_manager_rows:
      - pkgmgr.macos.mdm_jamf_munki_pkg
      - pkgmgr.windows.intune_gpo_msi_msix
      - pkgmgr.linux.ubuntu_wayland.apt_deb_mirror
    affected_deployment_pattern_refs:
      - desktop_management.pattern.macos.managed
      - desktop_management.pattern.windows.managed
      - desktop_management.pattern.linux_ubuntu_wayland.managed
    unsupported_summary: >
      Vendor-specific fleet-console UI flows, smart groups, detection
      rules, package recipes, Chef/Puppet/Ansible modules, and console
      adapters are outside the current claim. The claim is the package,
      policy, control, result, and inventory contract those systems can
      automate against.
    does_not_widen:
      - managed_install_contract
      - silent_install_controls
      - channel_pinning_controls
      - update_deferral_controls
    still_allowed:
      - Admins may automate the supported package and policy rows with their own fleet tooling.
      - Support may request package result records and policy bundle refs.
    before_claim_required:
      - named_vendor_adapter_row
      - adapter_fixture
      - support_triage_copy
      - vendor_specific_detection_rule_review
    disclosure_surfaces:
      - install_guide
      - docs_compatibility
      - help_center
      - support_bundle
      - field_triage
    fixture_refs:
      - fixtures/platform/deployment_path_examples/macos_mdm_homebrew_boundary.yaml
      - fixtures/platform/deployment_path_examples/windows_per_user_per_machine_winget_gap.yaml
    status: seeded

  - path_id: unsupported_path.linux.managed_outside_ubuntu_wayland
