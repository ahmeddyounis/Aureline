  - path_id: unsupported_path.remote_helper.desktop_handler_ownership
    category: helper_agent_deployment
    support_status: unsupported
    affected_platform_profile_refs:
      - remote_linux_target
      - remote_container_target
    affected_package_manager_rows:
      - pkgmgr.remote.agent_helper_distribution
    affected_deployment_pattern_refs: []
    unsupported_summary: >
      Remote helper and agent packages never claim local desktop file
      associations, protocol handlers, recent-item registration, or
      local desktop update markers.
    does_not_widen:
      - desktop_file_association_claim
      - desktop_protocol_handler_claim
      - desktop_recent_item_claim
      - desktop_update_marker_claim
    still_allowed:
      - Helper and agent runtime identity may be reported in attach and support diagnostics.
      - Runtime replacement may proceed after signature verification and capability negotiation.
    before_claim_required:
