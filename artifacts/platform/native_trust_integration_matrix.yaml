proxy_resolution_mode_vocabulary:
  - manual_proxy
  - environment_proxy
  - pac_proxy
  - system_proxy
  - direct_no_proxy
  - proxy_unknown

trust_store_source_vocabulary:
  - pinned_control_plane_trust_only
  - os_trust_store_plus_org_ca_bundle
  - os_trust_store
  - air_gap_offline_trust_root
  - trust_store_unknown

# Re-exported from ADR 0007 (trust-store classes and unlock states).
trust_store_class_vocabulary:
  - os_keychain
  - enterprise_vault_adapter
  - platform_agent
  - hsm_or_kms_backed
  - session_memory_cache
  - managed_policy_injector

unlock_state_vocabulary:
  - locked
  - unlocking
  - unlocked
  - step_up_required
  - degraded_session_only
  - unavailable

# File-local labels for reviewer readability (not cross-tool enums).
browser_return_claim_kind_vocabulary:
  - claimed_primary
  - claimed_fallback_with_explicit_disclosure
  - best_effort_repair_only

integration_rows:
  - row_id: native_trust_integration:macos_15_plus_universal
    profile_id: macos_15_plus_universal
    browser_handoff:
      outbound_launch_policy: system_default_browser_required
      callback_registration_assumption: >
        Launch Services owns system-default-browser launch and callback routing.
        Deep-link schemes and side-by-side relations follow the protocol-handler
        ownership matrix; last-writer-wins scheme takeover is non-conforming.
      return_route_claims:
        - claim_kind: claimed_primary
          return_mode_class: platform_deep_link_return
          return_origin_validation_class: deep_link_scheme_pinned
          notes: >
            Primary return route on macOS claimed profiles. The scheme must be
            pinned to the owning channel relation and validated by correlation.
        - claim_kind: best_effort_repair_only
          return_mode_class: manual_return_resume
          return_origin_validation_class: manual_resume_only
          notes: >
            Repair-only fallback for blocked returns; must preserve local work
            and never imply that editing requires sign-in.
    proxy_inheritance:
      system_proxy_authority: System Settings network proxy + OS PAC resolution.
      system_pac_authority: OS PAC / auto proxy configuration when configured.
      explicit_override_rules: >
        Manual proxy and custom CA are allowed only as typed, inspectable settings
        resolved through the shared transport governance layer; direct/no-proxy is
        not a silent fallback after proxy failure.
    trust_store_integration:
      default_trust_store_source: os_trust_store
      enterprise_ca_overlay_trust_store_source: os_trust_store_plus_org_ca_bundle
      authority_note: >
        Keychain trust roots plus user/admin-imported keychains and configuration
        profiles constitute OS trust; org CA overlays must remain inspectable.
      client_certificate_handling_note: >
        Client certificates are referenced by handle only; raw certificate bytes
        and private keys never project into UI, logs, or support export.
    credential_store_integration:
      trust_store_class: os_keychain
      backend_label: Keychain Services
      unlock_state_must_surface:
        - unlocked
        - locked
        - step_up_required
        - unavailable
        - degraded_session_only
      failure_copy_requirements: >
        Failure copy must name "Keychain" explicitly, surface a typed unlock or
        repair path, and include a continue-local path when the action is not
        required for local editing.

  - row_id: native_trust_integration:windows_11_23h2_plus_x86_64
    profile_id: windows_11_23h2_plus_x86_64
    browser_handoff:
      outbound_launch_policy: system_default_browser_required
      callback_registration_assumption: >
        Windows callback handling is claim-bearing only when it is installed and
        registered through a previewable protocol/loopback-safe path. Protocol
        handler ownership and side-by-side rules follow the protocol-handler
        ownership matrix; silent handler takeover is non-conforming.
      return_route_claims:
        - claim_kind: claimed_primary
          return_mode_class: loopback_http_return
          return_origin_validation_class: loopback_port_pinned
          notes: >
            Primary return route on Windows claimed profiles. Loopback port pinning
            is the origin validation guard; the return anchor remains export-safe.
        - claim_kind: claimed_fallback_with_explicit_disclosure
          return_mode_class: platform_deep_link_return
          return_origin_validation_class: deep_link_scheme_pinned
          notes: >
            Admissible fallback only when loopback return is unavailable and the
            surface discloses the fallback class and preserves local work.
        - claim_kind: best_effort_repair_only
          return_mode_class: manual_return_resume
          return_origin_validation_class: manual_resume_only
          notes: >
            Repair-only fallback; never a silent downgrade from loopback return.
    proxy_inheritance:
      system_proxy_authority: WinINET + WinHTTP effective proxy resolution.
      system_pac_authority: WPAD/PAC when configured; parity with CLI/headless required.
      explicit_override_rules: >
        Manual/environment/PAC/system proxy precedence follows the transport packet.
        Any WinHTTP/WinINET divergence is a typed denial that forbids direct fallback.
    trust_store_integration:
      default_trust_store_source: os_trust_store
      enterprise_ca_overlay_trust_store_source: os_trust_store_plus_org_ca_bundle
      authority_note: >
        Current User and Local Machine certificate stores are the OS trust source.
        Enterprise CA overlays and pinned control-plane trust remain inspectable.
      client_certificate_handling_note: >
        Client certificates are referenced by handle only; certificate selection is
        surfaced as a typed prompt or denial with repair actions, never as raw PEM.
    credential_store_integration:
      trust_store_class: os_keychain
      backend_label: Credential Manager / DPAPI-backed storage
      unlock_state_must_surface:
        - unlocked
        - locked
        - step_up_required
        - unavailable
        - degraded_session_only
      failure_copy_requirements: >
        Failure copy must name "Windows Credential Manager" (or equivalent) and
        include a typed repair path plus continue-local fallback where applicable.

  - row_id: native_trust_integration:linux_ubuntu_24_04_gnome_wayland_x86_64
    profile_id: linux_ubuntu_24_04_gnome_wayland_x86_64
    browser_handoff:
      outbound_launch_policy: system_default_browser_required
      callback_registration_assumption: >
        Linux claims are limited to the named GNOME desktop profiles. Default
        browser launch uses the OS default handler; callback return uses desktop-file
        or portal-backed scheme handling and must validate scheme + correlation.
      return_route_claims:
        - claim_kind: claimed_primary
          return_mode_class: platform_deep_link_return
          return_origin_validation_class: deep_link_scheme_pinned
          notes: >
            Primary return route on the claimed GNOME desktop profiles. If the
            desktop environment/session cannot provide reliable scheme return, the
            profile must degrade visibly; silent fallback is unclaimed.
        - claim_kind: best_effort_repair_only
          return_mode_class: manual_return_resume
          return_origin_validation_class: manual_resume_only
          notes: >
            Repair-only fallback for blocked returns; always preserves local work.
    proxy_inheritance:
      system_proxy_authority: GNOME proxy settings plus launcher environment proxies.
      system_pac_authority: PAC honored only when the session exposes a PAC source.
      explicit_override_rules: >
        Manual and environment proxy modes are admissible as typed overrides through
        the transport packet. If PAC is unavailable on the claimed profile, the
        effective proxy state must disclose that limitation explicitly.
    trust_store_integration:
      default_trust_store_source: os_trust_store
      enterprise_ca_overlay_trust_store_source: os_trust_store_plus_org_ca_bundle
      authority_note: >
        The distro CA bundle is the default OS trust. Enterprise CA import must use
        the distro/desktop-profile tooling and remain inspectable as an org CA overlay.
      client_certificate_handling_note: >
        Client certificates are referenced by handle only; trust failures must name
        client-certificate-required/expired states explicitly with repair actions.
    credential_store_integration:
      trust_store_class: os_keychain
      backend_label: Secret Service via libsecret / GNOME Keyring
      unlock_state_must_surface:
        - unlocked
        - locked
        - unavailable
        - degraded_session_only
      failure_copy_requirements: >
        Failure copy must name "Secret Service / Keyring" explicitly and, when the
        store is unavailable, must show visible session-only downgrade (where allowed)
        rather than implying durable secure storage still exists.

