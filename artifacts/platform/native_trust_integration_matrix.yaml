# Native browser, proxy, trust-store, and credential-store integration matrix.
#
# Machine-readable companion to:
#   - docs/platform/native_trust_and_auth_conformance.md
#
# Purpose:
#   - Freeze per-OS authoritative sources for system-browser return, proxy/PAC
#     inheritance, trust-store layering, and credential-store behavior.
#   - Prevent adapters and feature lanes from inventing per-surface definitions
#     of "system proxy", "system trust", or "secure store unavailable".
#
# Vocabulary policy:
#   - This file re-exports vocabularies from upstream schemas and packets where
#     practical. File-local labels are used only for reviewer readability; they
#     are not cross-tool contract enums.
#
# If this file and docs/platform/native_trust_and_auth_conformance.md disagree,
# this file is the tooling source and the doc must be updated in the same change.

schema_version: 1
matrix_id: aureline.platform.native_trust_integration_matrix.v1
status: seeded

source_doc: docs/platform/native_trust_and_auth_conformance.md
fixtures_ref: fixtures/platform/native_auth_trust_cases/

companion_contract_refs:
  claimed_desktop_profiles: artifacts/platform/claimed_desktop_profiles.yaml
  desktop_platform_conformance_matrix: docs/platform/desktop_platform_conformance_matrix.md
  protocol_handler_ownership_matrix: artifacts/platform/protocol_handler_ownership_matrix.yaml
  system_browser_callback_packet: docs/auth/system_browser_callback_packet.md
  auth_handoff_interstitial_contract: docs/auth/auth_handoff_interstitial_contract.md
  secret_broker_adr: docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md
  transport_governance_seed: docs/network/transport_governance_seed.md
  transport_governance_packet_seed: docs/network/transport_governance_packet_seed.md
  transport_explainability_surface_contract: docs/network/transport_explainability_surface_contract.md
  input_adapter_failure_modes: docs/architecture/input_adapter_failure_modes.md

related_normative_sources:
  - path: .t2/docs/Aureline_PRD.md
    anchors:
      - "§5.37 Desktop-platform rules"
      - "§5.42 Network, proxy, certificates, and transport-governance architecture"
  - path: .t2/docs/Aureline_Technical_Architecture_Document.md
    anchors:
      - "Network and transport governance"
      - "Identity, session, entitlement, and key-management architecture"
  - path: .t2/docs/Aureline_Technical_Design_Document.md
    anchors:
      - "Appendix AA — Native OS and fleet-deployment conformance matrix"
      - "Transport governance appendices"
  - path: .t2/docs/Aureline_UI_UX_Spec_Document.md
    anchors:
      - "System-browser-first auth guidance"
      - "Transport, proxy, certificate, and mirror-state templates"

# Policy-blocked network posture is a required disclosed state for this packet.
# The authoritative vocabulary lives in the transport governance packet; this
# note exists to ensure platform rows do not treat policy-denied egress as an
# ambiguous "offline" or "network error" state.
policy_blocked_network_posture_note: >
  When policy blocks network egress (deny-all profiles, policy-denied endpoints,
  mirror-only restrictions, or admin-enforced proxy/trust rules), surfaces must
  emit and project a typed transport governance denial (for example
  transport_decision_code = deny_policy or deny_all-class posture). Local editing
  and local-safe workflows remain available; only the specific networked
  capability is narrowed.

# -----------------------------------------------------------------------------
# Re-exported vocabularies (subset).
# -----------------------------------------------------------------------------

claimed_desktop_profile_id_vocabulary:
  - macos_15_plus_universal
  - windows_11_23h2_plus_x86_64
