conformance_case_index:
  - case_class: normal_browser_return
    fixture: normal_browser_return.yaml
    covers:
      - platform_deep_link_return
      - loopback_http_return
      - preserved_local_work_local_first
  - case_class: stale_callback_return
    fixture: stale_callback_return.yaml
    covers:
      - session_superseded_or_expired
      - replay_denied
      - reopen_required_reauth
  - case_class: wrong_tenant_or_workspace_return
    fixture: wrong_tenant_return_denied.yaml
    covers:
      - tenant_or_workspace_binding_enforced
      - origin_validation_fail_closed
  - case_class: proxy_denied
    fixture: proxy_denied.yaml
    covers:
      - deny_proxy_resolution
      - no_direct_origin_bypass
      - settings_and_diagnostics_projection
  - case_class: client_certificate_required
    fixture: client_certificate_required.yaml
    covers:
      - client_certificate_required
      - deny_trust_no_insecure_fallback
  - case_class: credential_store_locked_on_startup
    fixture: credential_store_locked_on_startup.yaml
    covers:
      - locked_store_unlock_path
      - continue_local_without_sign_in
  - case_class: trust_store_unavailable_on_claimed_profile
    fixture: trust_store_unavailable.yaml
    covers:
      - trust_store_unavailable
      - session_only_downgrade_visible
      - typed_denial_for_protected_actions
