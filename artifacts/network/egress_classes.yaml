# Egress-class, permission-class, target-class, auth-mode, route,
# proxy-resolution-mode, trust-store-source, SSH host-key provenance,
# mirror-route, offline-or-deny-all state, outcome, and deny-reason
# matrix.
#
# Machine-readable companion to docs/network/transport_governance_seed.md.
# Schema companion: schemas/network/network_attribution_record.schema.json.
# Fixture companion: fixtures/network/connectivity_cases/.
#
# This file freezes the shared transport vocabulary the desktop shell,
# CLI / headless runner, update client, extension registry, extension
# host, AI broker, docs pack, policy distribution, telemetry sink,
# remote tunnel, remote SSH, remote agent, managed control plane, git
# VCS, notebook kernel, debugger / symbol, API client, mirror refresh,
# browser handoff launcher, and provider callback receiver components
# all resolve against. One row per permission class. Every row pins
# the admissible target classes, admissible route classes, admissible
# egress classes, admissible auth modes, default redaction class, and
# the set of deny-reason classes that may be minted when the request
# is refused. Egress-class boundaries, trust posture, mirror route,
# and offline / deny-all posture are enforced by the schema companion
# and re-verified by fixture conformance tests.
#
# Rules:
#   - Every row MUST name exactly one permission_class value from the
#     frozen vocabulary and MUST list non-empty admissible target,
#     route, egress, and auth-mode sets.
#   - Adding a value to any vocabulary (permission class, target
#     class, route class, egress class, auth-mode class, proxy-mode
#     class, trust-store-source class, SSH host-key provenance
#     class, mirror-route class, offline / deny-all state class,
#     outcome class, deny-reason class, component class) is
#     additive-minor: bump schema_version, update this file, update
#     the schema companion, and update the narrative seed in the
#     same change.
#   - Repurposing any existing token is breaking and requires a new
#     decision row in artifacts/governance/decision_index.yaml
#     co-signed by security_trust_review and product_scope_review.
#   - Milestone slugs MUST NOT appear in any id, path, or
#     description field.
#   - Desktop and CLI / headless flows MUST resolve proxy, trust,
#     SSH host-key, mirror-route, and offline / deny-all postures
#     against this file. A CLI-only or desktop-only override is
#     not admissible.

