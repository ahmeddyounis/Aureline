# -----------------------------------------------------------------------------
# Proxy-resolution-mode rows.
# -----------------------------------------------------------------------------

proxy_resolution_modes:

  - proxy_resolution_mode: system_proxy
    description: >
      Use the OS-native proxy setting. Desktop and CLI / headless
      MUST resolve identically on a given platform profile; a CLI
      bypass is not admissible.
    platform_sources:
      macos: system_network_proxy_settings
      windows: winhttp_system_proxy_settings
      linux: gsettings_or_env_source_for_claimed_display_stack
    effective_proxy_disclosure: required_per_target_and_profile

  - proxy_resolution_mode: pac_proxy
    description: >
      Resolve proxy via a PAC (proxy auto-config) script. The PAC
      script fingerprint is opaque; raw PAC script bodies never
      cross the attribution boundary.
    platform_sources:
      macos: system_network_proxy_settings_auto_config
      windows: winhttp_pac_file
      linux: gsettings_auto_config
    effective_proxy_disclosure: required_per_target_and_profile

  - proxy_resolution_mode: environment_proxy
    description: >
      Resolve proxy via HTTPS_PROXY, HTTP_PROXY, ALL_PROXY, and
      NO_PROXY environment variables. CLI / headless flows
      explicitly inherit this resolution when run in an env with
      these variables set.
    platform_sources:
      all: process_environment_variables
    effective_proxy_disclosure: required_per_target_and_profile

  - proxy_resolution_mode: manual_proxy
    description: >
      User- or admin-entered proxy endpoint. Policy-bound manual
      proxies override user-entered ones; the effective proxy ref
      disclosed to diagnostics is the policy-bound one.
    platform_sources:
      all: aureline_settings_definition
    effective_proxy_disclosure: required_per_target_and_profile

  - proxy_resolution_mode: direct_no_proxy
    description: >
      Direct connection with no proxy. Admissible only when the
      egress class admits direct connection on the active
      deployment profile.
    effective_proxy_disclosure: required_per_target_and_profile

  - proxy_resolution_mode: proxy_unknown
    description: >
      Repair-only placeholder while the effective proxy is being
      resolved. Surfaces MUST display a reviewable sentence
      explaining the unknown state; silently falling back to
      direct is non-conforming.
    effective_proxy_disclosure: required_per_target_and_profile

# -----------------------------------------------------------------------------
# Trust-store-source rows.
# -----------------------------------------------------------------------------

trust_store_sources:

  - trust_store_source: os_trust_store
    description: >
      Platform-default trust store. macOS Keychain roots, Windows
      certificate store, and the claimed Linux trust-store path
      resolved by the desktop platform conformance matrix.
    org_ca_bundle_overlay_allowed: false
    pinned_control_plane_trust_overlay_allowed: false

  - trust_store_source: os_trust_store_plus_org_ca_bundle
    description: >
      Platform-default trust store overlaid with an enterprise /
      org CA bundle. org_ca_bundle_fingerprint MUST be non-null
      on any attribution under this source. Common on corporate
      networks with TLS interception.
    org_ca_bundle_overlay_allowed: true
    pinned_control_plane_trust_overlay_allowed: true

  - trust_store_source: pinned_control_plane_trust_only
    description: >
      Narrowed trust path used by the managed control plane and
      policy endpoints. The set of pinned control-plane trust
      roots MUST be non-empty and MUST be disclosed by opaque
      ref. Self-hosted and managed deployments use this source
      on the control-plane route.
    org_ca_bundle_overlay_allowed: false
    pinned_control_plane_trust_overlay_allowed: true

  - trust_store_source: air_gap_offline_trust_root
    description: >
      Offline-bundle-derived trust root. Used in air-gapped
      profiles where no live trust refresh is admissible.
    org_ca_bundle_overlay_allowed: true
    pinned_control_plane_trust_overlay_allowed: true

  - trust_store_source: trust_store_unknown
    description: >
      Repair-only placeholder while trust source is being
      classified. Any outbound request MUST be gated by an
      explicit user or policy decision before transitioning off
      this placeholder.
    org_ca_bundle_overlay_allowed: false
    pinned_control_plane_trust_overlay_allowed: false

# -----------------------------------------------------------------------------
# SSH host-key provenance rows.
# -----------------------------------------------------------------------------

ssh_host_key_provenances:

  - ssh_host_key_provenance: known_hosts_entry_trusted
    description: >
      Host-key is already trusted via a known_hosts entry. The
      fingerprint is disclosed as an opaque fingerprint in
      trust_posture.ssh_host_key_fingerprint.
    admissible_under_strict_mode: true

  - ssh_host_key_provenance: first_use_trust_on_first_use
    description: >
      Trust-on-first-use decision. Admissible only when the
      effective trust_on_first_use policy posture permits it on
      the active deployment profile. Enterprise / managed
      profiles typically forbid TOFU.
    admissible_under_strict_mode: false

  - ssh_host_key_provenance: pinned_by_policy
    description: >
      Host-key is pinned by admin policy or a policy bundle
      narrowing rule. Fingerprint mismatch on a pinned host MUST
      surface as outbound_failed_ssh_host_key_mismatch with
      mismatched_rejected.
    admissible_under_strict_mode: true

  - ssh_host_key_provenance: admin_policy_strict_required
    description: >
      Admin policy requires strict mode: TOFU is not admissible,
      every new host requires an explicit admin-supplied pin or
      a vetted known_hosts entry.
    admissible_under_strict_mode: true

  - ssh_host_key_provenance: mismatched_rejected
    description: >
      Host-key presented did not match the known or pinned
      fingerprint. Attribution MUST surface
      outbound_failed_ssh_host_key_mismatch.
    admissible_under_strict_mode: true

  - ssh_host_key_provenance: not_applicable_non_ssh
    description: >
      Set for non-SSH attributions.
    admissible_under_strict_mode: true

# -----------------------------------------------------------------------------
# Mirror-route rows.
# -----------------------------------------------------------------------------

mirror_routes:

  - mirror_route_class: no_mirror_direct_origin
    description: >
      No mirror is in play. Direct origin is reached if policy
      permits on this profile.
    air_gap_admissible: false

  - mirror_route_class: customer_operated_mirror_active
    description: >
      Customer-operated mirror is in play. Mirror endpoint ref
      and mirror snapshot ref MUST be disclosed.
    air_gap_admissible: true

  - mirror_route_class: vendor_published_mirror_active
    description: >
      Vendor-published mirror for the customer is in play.
    air_gap_admissible: true

  - mirror_route_class: offline_bundle_derived_mirror_active
    description: >
      Mirror is derived from an offline bundle (air-gap transfer
      or sneakernet). Attribution posture MUST name the offline
      bundle by opaque ref.
    air_gap_admissible: true

  - mirror_route_class: mirror_only_no_direct_allowed
    description: >
      Enforced-mirror posture: direct origin is refused. Any
      direct-origin attempt is an outbound_denied_by_policy or
      outbound_denied_by_egress_class_boundary event.
    air_gap_admissible: true

  - mirror_route_class: mirror_not_applicable
    description: >
      Mirrors do not apply (local-only or target-local classes).
    air_gap_admissible: true

# -----------------------------------------------------------------------------
# Egress-class rows with admissible route, trust posture, and
# deny-reason sets.
# -----------------------------------------------------------------------------

egress_classes:

  - egress_class: local_only
    description: >
      Device-local traffic. Loopback, process-local RPC, and
      device-local mirrors. No proxy and no trust store is
      involved; trust_store_source is typically os_trust_store
      by default and is often never exercised on the wire.
    admissible_route_classes:
      - direct_local_loopback_route
      - mirror_proxy_route
    admissible_proxy_resolution_modes:
      - direct_no_proxy
      - system_proxy
      - manual_proxy
      - environment_proxy
      - pac_proxy
      - proxy_unknown
    admissible_trust_store_sources:
      - os_trust_store
      - os_trust_store_plus_org_ca_bundle
      - pinned_control_plane_trust_only
      - air_gap_offline_trust_root
      - trust_store_unknown
    permitted_under_air_gap: true
    permitted_under_deny_all: true

  - egress_class: target_local
    description: >
      Traffic local to a remote target (remote SSH host, remote
      agent, managed workspace, devcontainer) that does not
      traverse the public internet. Proxy and trust postures
      apply when the traffic goes through the target-originated
      route.
    admissible_route_classes:
      - direct_target_local_route
      - remote_target_originated_route
      - managed_relay_route
      - mirror_proxy_route
    admissible_proxy_resolution_modes:
      - direct_no_proxy
      - system_proxy
      - manual_proxy
      - environment_proxy
      - pac_proxy
      - proxy_unknown
    admissible_trust_store_sources:
      - os_trust_store
      - os_trust_store_plus_org_ca_bundle
      - pinned_control_plane_trust_only
      - air_gap_offline_trust_root
    permitted_under_air_gap: true
    permitted_under_deny_all: false

  - egress_class: org_approved_external
    description: >
      Traffic to a customer- or admin-approved external endpoint.
      Enterprise mirrors, private registries, managed AI
      gateways, managed control planes, and customer-operated
      telemetry sinks resolve here. Typically reached through an
      enterprise proxy or a mirror.
    admissible_route_classes:
      - system_proxy_route
      - manual_proxy_route
      - pac_resolved_route
      - environment_proxy_route
      - mirror_proxy_route
      - managed_relay_route
      - direct_target_local_route
      - browser_system_route
    admissible_proxy_resolution_modes:
      - system_proxy
      - pac_proxy
      - environment_proxy
      - manual_proxy
      - direct_no_proxy
    admissible_trust_store_sources:
      - os_trust_store_plus_org_ca_bundle
      - pinned_control_plane_trust_only
      - air_gap_offline_trust_root
      - os_trust_store
    permitted_under_air_gap: false
    permitted_under_deny_all: false

  - egress_class: public_internet
    description: >
      Traffic to any endpoint outside the org-approved allowlist.
      Public package mirrors, vendor-public AI endpoints, public
      docs mirrors, tunnel-exposed routes, public provider
      callbacks, and unrestricted extension egress resolve here.
      Denied by default on air-gapped profiles and by many
      managed / self-hosted policies.
    admissible_route_classes:
      - system_proxy_route
      - manual_proxy_route
      - pac_resolved_route
      - environment_proxy_route
      - mirror_proxy_route
      - browser_system_route
    admissible_proxy_resolution_modes:
      - system_proxy
      - pac_proxy
      - environment_proxy
      - manual_proxy
      - direct_no_proxy
    admissible_trust_store_sources:
      - os_trust_store
      - os_trust_store_plus_org_ca_bundle
    permitted_under_air_gap: false
    permitted_under_deny_all: false

  - egress_class: deny_all
    description: >
      Refusal class for deny-all profiles or offline-enforced
      posture. Any outbound attempt MUST collapse to an
      outbound_denied_* outcome.
    admissible_route_classes:
      - air_gap_no_network_route
    admissible_proxy_resolution_modes:
      - proxy_unknown
      - direct_no_proxy
    admissible_trust_store_sources:
      - trust_store_unknown
      - air_gap_offline_trust_root
      - os_trust_store
      - os_trust_store_plus_org_ca_bundle
      - pinned_control_plane_trust_only
    permitted_under_air_gap: true
    permitted_under_deny_all: true

# -----------------------------------------------------------------------------
# Permission-class rows. Every row names the component classes that
# may claim the permission, the admissible target classes, the
# admissible egress classes, the admissible auth modes, the default
# egress class on a nominal online_live_allowed posture, and the set
# of deny-reason classes that may be minted when the request is
# refused.
# -----------------------------------------------------------------------------

permission_rows:

  - permission_class: core_update
    surface: Updates
    description: >
      Aureline update client checks for and fetches signed update
      artifacts from the update feed.
    canonical_components:
      - update_client_component
    admissible_target_classes:
      - update_feed_target
      - mirror_endpoint_target
    admissible_egress_classes:
      - org_approved_external
      - public_internet
      - local_only
    admissible_auth_modes:
      - no_auth_public
      - api_key_handle
      - mtls_client_cert
      - org_ca_bundle_pinned
      - managed_service_identity
    default_egress_by_profile:
      individual_local: public_internet
      self_hosted: org_approved_external
      enterprise_online: org_approved_external
      air_gapped: local_only
      managed_cloud: org_approved_external
    default_redaction_class: metadata_safe_default
    admissible_deny_reason_classes:
      - admin_policy_denied
      - user_setting_denied
      - offline_mode_denied
      - air_gap_profile_denied
      - egress_class_boundary_denied
      - trust_store_verification_failed
      - proxy_auth_required
      - proxy_auth_denied
      - proxy_unreachable
      - freshness_floor_unmet
      - deny_all_profile_enforced

  - permission_class: registry_read
    surface: Extension registry
    description: >
      Read extension metadata, publisher trust, version pins, and
      signed manifests from the registry.
    canonical_components:
      - extension_registry_component
      - desktop_shell_component
      - cli_headless_component
    admissible_target_classes:
      - private_registry_target
      - public_registry_target
      - mirror_endpoint_target
    admissible_egress_classes:
      - org_approved_external
      - public_internet
      - local_only
    admissible_auth_modes:
      - no_auth_public
      - api_key_handle
      - oauth_delegated_handle
      - mtls_client_cert
      - org_ca_bundle_pinned
    default_egress_by_profile:
      individual_local: public_internet
      self_hosted: org_approved_external
      enterprise_online: org_approved_external
      air_gapped: local_only
      managed_cloud: org_approved_external
    default_redaction_class: metadata_safe_default
    admissible_deny_reason_classes:
      - admin_policy_denied
      - user_setting_denied
      - offline_mode_denied
      - air_gap_profile_denied
      - egress_class_boundary_denied
      - trust_store_verification_failed
      - proxy_auth_required
      - proxy_auth_denied
      - deny_all_profile_enforced

  - permission_class: registry_write
    surface: Extension registry
    description: >
      Publish or update extension artifacts. Publisher-attested
      action that MUST carry an approval ticket on managed and
      enterprise profiles.
    canonical_components:
      - extension_registry_component
      - cli_headless_component
    admissible_target_classes:
      - private_registry_target
      - public_registry_target
    admissible_egress_classes:
      - org_approved_external
      - public_internet
    admissible_auth_modes:
      - oauth_delegated_handle
      - api_key_handle
      - mtls_client_cert
      - step_up_authenticator_required
    default_egress_by_profile:
      individual_local: public_internet
      self_hosted: org_approved_external
      enterprise_online: org_approved_external
      air_gapped: deny_all
      managed_cloud: org_approved_external
    default_redaction_class: operator_only_restricted
    admissible_deny_reason_classes:
      - admin_policy_denied
      - permission_not_granted
      - approval_ticket_missing
      - approval_ticket_expired
      - step_up_required_not_satisfied
      - air_gap_profile_denied
      - egress_class_boundary_denied
      - trust_store_verification_failed
      - proxy_auth_required
      - deny_all_profile_enforced

  - permission_class: ai_context_egress
    surface: AI providers
    description: >
      Send workspace context to an AI provider for completion,
      retrieval, or tool-call planning. Policy-bounded and opt-in
      by default.
    canonical_components:
      - ai_broker_component
    admissible_target_classes:
      - ai_provider_endpoint_target
      - managed_workspace_target
      - mirror_endpoint_target
    admissible_egress_classes:
      - org_approved_external
      - public_internet
      - target_local
    admissible_auth_modes:
      - api_key_handle
      - oauth_delegated_handle
      - managed_service_identity
      - mtls_client_cert
