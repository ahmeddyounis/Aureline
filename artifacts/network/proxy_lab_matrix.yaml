proxy_precedence:
  - precedence: 1
    proxy_resolution_mode: manual_proxy
    source: admin_policy_manual_proxy
    route_class: manual_proxy_route
    rule: Policy-bound manual proxy overrides every user or ambient source.
  - precedence: 2
    proxy_resolution_mode: manual_proxy
    source: user_manual_proxy
    route_class: manual_proxy_route
    rule: User manual proxy overrides environment, PAC, and system sources when policy permits it.
  - precedence: 3
    proxy_resolution_mode: environment_proxy
    source: process_environment
    route_class: environment_proxy_route
    rule: HTTPS_PROXY, HTTP_PROXY, ALL_PROXY, and NO_PROXY apply before PAC or system proxy.
  - precedence: 4
    proxy_resolution_mode: pac_proxy
    source: platform_pac_auto_config
    route_class: pac_resolved_route
    rule: PAC resolves the effective proxy when no manual or environment proxy is active.
  - precedence: 5
    proxy_resolution_mode: system_proxy
    source: platform_system_proxy
    route_class: system_proxy_route
    rule: System proxy applies before direct egress.
  - precedence: 6
    proxy_resolution_mode: direct_no_proxy
    source: policy_permitted_direct_route
    route_class: direct_target_local_route
    rule: Direct egress is selected only when the active profile and egress class permit it.

no_bypass_rules:
  - rule_id: no_bypass.silent_direct_origin_fallback
    forbidden_bypass_class: silent_direct_origin_fallback
    applies_to:
      - mirror_only_no_bypass
      - deny_all_no_bypass
      - custom_ca
      - pac_proxy
      - manual_proxy
    expectation: >
      Public or direct origin fallback is unavailable unless a published
      exception ref is attached to the decision record.
  - rule_id: no_bypass.insecure_tls_fallback
    forbidden_bypass_class: insecure_tls_fallback
    applies_to:
      - custom_ca
      - client_certificate
    expectation: >
      TLS verification, pinned trust, org CA bundle, and client-certificate
      checks never downgrade to insecure transport.
  - rule_id: no_bypass.proxy_resolution_skip
    forbidden_bypass_class: proxy_resolution_skip
    applies_to:
      - pac_proxy
      - manual_proxy
      - environment_proxy
      - system_proxy
    expectation: >
      A component cannot skip the effective proxy and retry direct after a
      proxy failure.
  - rule_id: no_bypass.cli_desktop_proxy_divergence
    forbidden_bypass_class: cli_desktop_proxy_divergence
    applies_to:
      - pac_proxy
      - manual_proxy
      - environment_proxy
      - system_proxy
    expectation: >
      Desktop and CLI/headless resolve the same effective proxy ref on the
      same platform profile.
  - rule_id: no_bypass.extension_ambient_egress
    forbidden_bypass_class: extension_ambient_egress
    applies_to:
      - pac_proxy
      - manual_proxy
      - mirror_only_no_bypass
      - deny_all_no_bypass
    expectation: >
      Extension-host egress above local_only requires a permission grant ref
      and emits the same transport decision vocabulary as core surfaces.
  - rule_id: no_bypass.destructive_offline_defer
    forbidden_bypass_class: destructive_offline_defer
    applies_to:
      - offline_deferred_idempotent
    expectation: >
      Only idempotent actions may enter the deferred queue; mutating external
      actions fail typed or request fresh approval later.

projection_requirements:
  summary_strip:
    required_fields:
      - proxy_resolution_mode
      - trust_store_source
      - mirror_public_label
      - transport_decision_code
      - no_bypass_status
      - repair_hints
  endpoint_row:
    required_fields:
      - component_class
      - permission_class
      - target_class
      - origin_scope
      - egress_class
      - auth_mode
      - route_class
      - outcome_class
  certificate_card:
    required_fields:
      - trust_store_source
      - ssh_host_key_provenance
      - client_certificate_state
      - trust_failure_state
      - repair_hints
  denied_attempt_history:
    required_fields:
      - decision_id
      - component_class
      - target_class
      - failure_reason
      - trust_failure_state
      - no_bypass_status
      - repair_hints

