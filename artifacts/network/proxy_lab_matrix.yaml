      - "Appendix CY Trust store, CA bundle, SSH host-key, and client-certificate matrix"
      - "Appendix CZ Network inspector, allow/deny event, and mirror/offline continuity matrix"
  - path: .t2/docs/Aureline_UI_UX_Spec_Document.md
    anchors:
      - "Appendix BS Transport, proxy, certificate, and mirror-state templates"

