# Enterprise proxy, trust-store, SSH host-proof, client-certificate, and
# no-bypass lab matrix.
#
# Machine-readable companion to docs/network/transport_governance_packet_seed.md
# and schemas/network/transport_decision.schema.json.
#
# The matrix names the claimed desktop and enterprise rows that must stay
# green before a release/support/compatibility artifact can claim transport
# behavior for proxy, CA, PAC, manual proxy, strict SSH host proof, client
# certificate, mirror-only, deny-all, or offline-deferred continuity.

schema_version: 1
status: seeded

packet_seed_source: docs/network/transport_governance_packet_seed.md
decision_schema_source: schemas/network/transport_decision.schema.json
egress_matrix_source: artifacts/network/egress_classes.yaml
fixture_source: fixtures/network/transport_cases/

owner_dri: "@ahmeddyounis"
owning_decision_forum: security_trust_review
review_cadence: release_candidate_and_transport_change
visibility_class: public

related_normative_sources:
  - path: .t2/docs/Aureline_PRD.md
    anchors:
      - "Network, proxy, certificates, and transport-governance architecture"
  - path: .t2/docs/Aureline_Technical_Architecture_Document.md
    anchors:
