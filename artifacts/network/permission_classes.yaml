no_bypass_rules:
  - rule_id: no_bypass.shared_transport_governance_required
    applies_to_permission_classes: all
    forbidden_bypass_class: surface_local_transport_stack
    expectation: >
      Every network-capable surface resolves a transport decision through the
      shared governance layer before any route leaves the current boundary.
  - rule_id: no_bypass.exception_and_waiver_required
    applies_to_permission_classes: all
    forbidden_bypass_class: exception_without_waiver
    expectation: >
      Any exception must attach both exception_ref and waiver_ref to the emitted
      decision or audit event. Missing, expired, or scope-mismatched refs deny.
  - rule_id: no_bypass.no_silent_public_origin_fallback
    applies_to_permission_classes:
      - core_update
      - registry_read
      - docs_fetch
      - policy_refresh
      - mirror_refresh
      - api_client_request
    forbidden_bypass_class: public_origin_on_mirror_only_profile
    expectation: >
      Mirror-only and offline-bundle rows never retry a public endpoint unless a
      policy-visible exception and waiver explicitly admit the route.
  - rule_id: no_bypass.no_extension_ambient_egress
    applies_to_permission_classes:
      - extension_network
      - ai_tool_egress
    forbidden_bypass_class: extension_ambient_egress
    expectation: >
      Extension-originated egress above local_only requires a permission grant
      and carries the same decision/audit vocabulary as core surfaces.
  - rule_id: no_bypass.no_destructive_offline_deferral
    applies_to_permission_classes:
      - registry_write
      - ai_tool_egress
      - tunnel_publish
      - provider_callback_inbound
      - browser_handoff_launch
    forbidden_bypass_class: destructive_or_externally_visible_offline_defer
    expectation: >
      Destructive, externally visible, paid, provider-mutating, or tunnel-
      exposing actions fail typed and request fresh approval after connectivity
      returns. They are not silently queued.

permission_class_rows:
  - permission_class: core_update
    source_display_token: core-update
    title: Core updates and release metadata
    surface_family: updates_release_metadata
    default_posture: channel_governed_by_policy
    canonical_component_classes:
      - update_client_component
    default_egress_by_profile:
      individual_local: public_internet
      self_hosted: org_approved_external
      enterprise_online: org_approved_external
      air_gapped: local_only
      managed_cloud: org_approved_external
    mirror_offline_support:
      mirror_support_class: required_for_enterprise_self_hosted_and_air_gap_claims
      offline_support_class: signed_offline_bundle_or_local_mirror
      allowed_mirror_route_classes:
        - customer_operated_mirror_active
        - vendor_published_mirror_active
        - offline_bundle_derived_mirror_active
        - mirror_only_no_direct_allowed
      freshness_requirement: signer_continuity_and_revocation_snapshot_current_or_typed_stale
      public_origin_fallback_when_mirror_only: forbidden
    audit_requirement_ref: audit.network.artifact_distribution
    required_permission_fields:
      - channel_ref
      - artifact_digest_ref
      - signer_or_trust_root_ref
    no_bypass_rule_refs:
      - no_bypass.shared_transport_governance_required
      - no_bypass.no_silent_public_origin_fallback

  - permission_class: registry_read
    source_display_token: registry-read
