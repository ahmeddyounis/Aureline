      public_origin_fallback_when_mirror_only: forbidden
    audit_requirement_ref: audit.network.registry_publish
    required_permission_fields:
      - approval_ticket_ref
      - publisher_identity_ref
      - publication_intent_ref
      - artifact_digest_ref
    no_bypass_rule_refs:
      - no_bypass.shared_transport_governance_required
      - no_bypass.no_destructive_offline_deferral

  - permission_class: ai_context_egress
    source_display_token: ai-context-egress
    title: AI context egress
    surface_family: ai_provider_context
    default_posture: opt_in_and_policy_bounded
