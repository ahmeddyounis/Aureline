      public_origin_fallback_when_mirror_only: forbidden
    audit_requirement_ref: audit.network.registry_artifact
    required_permission_fields:
      - registry_source_class
      - artifact_digest_ref
      - publisher_identity_ref
      - declared_permission_digest_ref
    no_bypass_rule_refs:
      - no_bypass.shared_transport_governance_required
      - no_bypass.no_silent_public_origin_fallback

  - permission_class: registry_write
    source_display_token: registry-write
    title: Extension registry write and publication
    surface_family: extension_registry_write
    default_posture: approval_or_step_up_required
    canonical_component_classes:
      - extension_registry_component
      - cli_headless_component
    default_egress_by_profile:
      individual_local: public_internet
      self_hosted: org_approved_external
      enterprise_online: org_approved_external
      air_gapped: deny_all
      managed_cloud: org_approved_external
    mirror_offline_support:
      mirror_support_class: publish_to_private_registry_when_policy_admits
