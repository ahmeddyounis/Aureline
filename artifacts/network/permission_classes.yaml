exception_path:
  required_refs_on_bypass_decision:
    - exception_ref
    - waiver_ref
  exception_template: docs/governance/templates/exception_packet_template.md
  waiver_template: docs/governance/templates/waiver_template.md
  bypass_denial_when_missing: deny_policy
  bypass_denial_reason: approval_ticket_missing
  expiry_rule: >
    Expired, scope-mismatched, or missing exception/waiver refs deny. A bypass
    may not continue under cached approval after policy epoch, target identity,
    route, trust posture, or permission class changes.
