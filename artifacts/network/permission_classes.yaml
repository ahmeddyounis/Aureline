# Shared network permission-class and audit-requirement matrix.
#
# Machine-readable companion to docs/network/transport_permission_matrix.md.
# This file publishes the permission-class rows that every network-capable
# surface resolves through before selecting a route, proxy, trust source,
# mirror, offline posture, or retry behavior.
#
# Lower-level enum source: artifacts/network/egress_classes.yaml.
# Decision packet source: docs/network/transport_governance_packet_seed.md.
# Audit fixture source: fixtures/network/audit_event_examples/.
#
# Rules:
#   - permission_class values MUST be drawn from
#     artifacts/network/egress_classes.yaml#network_permission_class_vocabulary.
#   - Every permission row MUST name default posture, mirror/offline support,
#     audit requirements, and no-bypass expectations.
#   - Every source-doc network-capable surface MUST resolve to at least one
#     permission class in surface_permission_map.
#   - Exception handling requires both an exception packet and an unexpired
#     waiver ref on the emitted decision or audit event.
#   - Planning slugs MUST NOT appear in ids, event names, or descriptions.

schema_version: 1
status: seeded

