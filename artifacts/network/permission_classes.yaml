      offline_support_class: local_capture_or_export_without_send
      allowed_mirror_route_classes:
        - customer_operated_mirror_active
        - mirror_not_applicable
      freshness_requirement: consent_or_policy_current
      public_origin_fallback_when_mirror_only: forbidden
    audit_requirement_ref: audit.network.telemetry_send
    required_permission_fields:
      - telemetry_stream_class
      - event_batch_ref
      - consent_or_policy_ref
    no_bypass_rule_refs:
      - no_bypass.shared_transport_governance_required

  - permission_class: tunnel_publish
    title: Tunnel and port exposure
    surface_family: remote_tunnel_publish
    default_posture: explicit_approval_required_for_shareable_routes
    canonical_component_classes:
      - remote_tunnel_component
    default_egress_by_profile:
      individual_local: public_internet
      self_hosted: public_internet
      enterprise_online: public_internet
      air_gapped: deny_all
      managed_cloud: public_internet
    mirror_offline_support:
      mirror_support_class: not_applicable_for_public_exposure
      offline_support_class: local_only_preview_without_share
      allowed_mirror_route_classes:
        - mirror_not_applicable
      freshness_requirement: approval_ticket_and_target_witness_current
      public_origin_fallback_when_mirror_only: forbidden
    audit_requirement_ref: audit.network.remote_route
    required_permission_fields:
      - route_exposure_class
      - approval_ticket_ref
      - target_witness_ref
      - revoke_path_ref
    no_bypass_rule_refs:
      - no_bypass.shared_transport_governance_required
      - no_bypass.no_destructive_offline_deferral

  - permission_class: provider_callback_inbound
    title: Provider callback and browser return
    surface_family: provider_callback
    default_posture: bound_to_prior_handoff_or_provider_packet
    canonical_component_classes:
      - provider_callback_receiver_component
      - browser_handoff_launcher_component
    default_egress_by_profile:
      individual_local: local_only
      self_hosted: local_only
      enterprise_online: local_only
      air_gapped: local_only
      managed_cloud: local_only
    mirror_offline_support:
      mirror_support_class: not_applicable_for_inbound_callback
      offline_support_class: local_callback_capture_only
      allowed_mirror_route_classes:
        - mirror_not_applicable
      freshness_requirement: callback_correlation_and_replay_policy_current
      public_origin_fallback_when_mirror_only: forbidden
    audit_requirement_ref: audit.network.provider_callback
    required_permission_fields:
      - callback_envelope_ref
      - provider_actor_class
      - correlation_ref
      - replay_policy_ref
    no_bypass_rule_refs:
      - no_bypass.shared_transport_governance_required
      - no_bypass.no_destructive_offline_deferral

  - permission_class: mirror_refresh
    title: Mirror snapshot refresh
    surface_family: mirror_refresh
    default_posture: idempotent_refresh_with_signer_continuity
    canonical_component_classes:
      - mirror_refresh_component
    default_egress_by_profile:
      individual_local: public_internet
      self_hosted: org_approved_external
      enterprise_online: org_approved_external
      air_gapped: local_only
      managed_cloud: org_approved_external
    mirror_offline_support:
      mirror_support_class: required
      offline_support_class: offline_deferred_only_when_idempotent
      allowed_mirror_route_classes:
        - customer_operated_mirror_active
        - vendor_published_mirror_active
        - offline_bundle_derived_mirror_active
        - mirror_only_no_direct_allowed
      freshness_requirement: mirror_snapshot_and_revocation_lag_visible
      public_origin_fallback_when_mirror_only: forbidden
    audit_requirement_ref: audit.network.artifact_distribution
    required_permission_fields:
      - artifact_family
      - mirror_endpoint_ref
      - mirror_snapshot_ref
      - mirror_freshness_class
    no_bypass_rule_refs:
      - no_bypass.shared_transport_governance_required
      - no_bypass.no_silent_public_origin_fallback

  - permission_class: browser_handoff_launch
    title: Browser handoff launch
    surface_family: browser_handoff
    default_posture: explicit_packet_with_reason_and_return_anchor
    canonical_component_classes:
      - browser_handoff_launcher_component
      - desktop_shell_component
      - cli_headless_component
    default_egress_by_profile:
      individual_local: public_internet
      self_hosted: org_approved_external
      enterprise_online: org_approved_external
      air_gapped: local_only
      managed_cloud: org_approved_external
    mirror_offline_support:
      mirror_support_class: local_file_or_self_hosted_destination_when_claimed
      offline_support_class: blocked_unless_local_destination
      allowed_mirror_route_classes:
        - mirror_not_applicable
        - customer_operated_mirror_active
      freshness_requirement: handoff_packet_and_destination_policy_current
      public_origin_fallback_when_mirror_only: forbidden
    audit_requirement_ref: audit.network.provider_callback
    required_permission_fields:
      - browser_handoff_packet_ref
      - destination_class
      - return_anchor_ref
      - provider_actor_class
    no_bypass_rule_refs:
      - no_bypass.shared_transport_governance_required
      - no_bypass.no_destructive_offline_deferral

  - permission_class: api_client_request
    title: API client and generic service request
    surface_family: api_client_request
    default_posture: explicit_user_workspace_or_policy_admitted_request
    canonical_component_classes:
      - api_client_component
      - notebook_kernel_component
      - debugger_symbol_component
      - cli_headless_component
      - desktop_shell_component
    default_egress_by_profile:
      individual_local: public_internet
      self_hosted: org_approved_external
      enterprise_online: org_approved_external
      air_gapped: local_only
      managed_cloud: org_approved_external
    mirror_offline_support:
      mirror_support_class: mirror_or_local_bundle_required_when_surface_claims_offline
      offline_support_class: local_bundle_or_cached_snapshot_only
      allowed_mirror_route_classes:
        - customer_operated_mirror_active
        - offline_bundle_derived_mirror_active
        - mirror_not_applicable
      freshness_requirement: request_document_and_auth_scope_current
      public_origin_fallback_when_mirror_only: forbidden
    audit_requirement_ref: audit.network.api_client
    required_permission_fields:
      - api_surface_class
      - request_document_ref
      - auth_handle_class
      - operation_class
    no_bypass_rule_refs:
      - no_bypass.shared_transport_governance_required
      - no_bypass.no_silent_public_origin_fallback

