    covers_profile_row: mirror_offline.air_gapped
    covers_permission_class: docs_fetch
  - fixture: fixtures/network/audit_event_examples/core_update_mirror_allowed.yaml
    covers_profile_row: mirror_offline.enterprise_mirror
    covers_permission_class: core_update
  - fixture: fixtures/network/audit_event_examples/vcs_network_enterprise_mirror_failed.yaml
    covers_profile_row: mirror_offline.enterprise_mirror
    covers_permission_class: vcs_network
  - fixture: fixtures/network/audit_event_examples/extension_network_missing_permission_denied.yaml
    covers_profile_row: mirror_offline.local_only
    covers_permission_class: extension_network
