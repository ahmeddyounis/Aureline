# Workflow-bundle successor recommendation rows.
#
# Seeded successor mapping table for workflow bundles. The primary source
# of truth remains each bundle manifest's lifecycle.successor_recommendation
# block (docs/workflow/workflow_bundle_object_model.md + bundle manifest
# schema). This table exists to support channel-train publication and
# support/export surfaces that want a single, reviewable mapping list.
#
# Rules.
#   - Milestone slugs and task ids MUST NOT appear in row ids, titles,
#     or summary fields.
#   - Every row MUST cite a decision_row_ref so successor guidance is
#     auditable and cannot silently widen claim authority.
#   - Rows are guidance only: they do not imply automatic install/update.
#
# Normative narrative: docs/workflow/bundle_lifecycle_visibility_contract.md

schema_version: 1
bundle_successor_rows_schema_version: 1
catalog_id: aureline.workflow.bundle_successor_rows
status: seeded
contract_doc_ref: docs/workflow/bundle_lifecycle_visibility_contract.md

upstream_refs:
  workflow_bundle_object_model_contract_ref: docs/workflow/workflow_bundle_object_model.md
  bundle_manifest_schema_ref: schemas/workflow/bundle_manifest.schema.json
  start_center_bundle_surfaces_contract_ref: docs/ux/start_center_bundle_surfaces.md
  bundle_drift_and_removal_contract_ref: docs/workflow/bundle_drift_and_removal_contract.md

rows:
  - row_id: bundle_successor_row:launch_bundle.rust_workspace.legacy
    predecessor_bundle_id: launch_bundle:rust_workspace.legacy
    predecessor_min_revision: 1
    predecessor_max_revision_inclusive: 1
    successor_recommendation_class: successor_recommended_first_party_native
    successor_bundle_id: launch_bundle:rust_workspace.seed
    successor_bundle_revision: 1
    successor_summary_ref: successor_summary:launch_bundle.rust_workspace.seed
    decision_row_ref: decision_row:launch_bundle.rust_workspace.legacy.demotion
    notes: >
      Seed successor mapping for a deprecated launch bundle. The predecessor
      bundle's manifest is expected to carry soft_deprecated_with_successor
      plus the same successor identity; this row exists as a channel-train
      mapping table for update and support/export surfaces.

