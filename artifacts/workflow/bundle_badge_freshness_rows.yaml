  - evidence_link_missing_from_manifest
  - mirror_or_source_signature_changed
  - mirror_or_source_canonical_revision_changed
  - mirror_or_source_mirror_mismatch
  - compatibility_narrowed_below_runtime
  - archetype_proof_stale_past_cadence
  - channel_demoted_or_branch_forked
  - policy_pinned_revision_recall
  - lifecycle_deprecation_or_removal
  - evidence_signature_invalidated_post_apply
  - freshness_unknown_review_required

badge_downgrade_target_class_vocabulary:
