# Workflow-bundle badge freshness rows.
#
# Machine-readable register of one bundle_badge_freshness_row_record per
# upstream bundle_evidence_badge_id (Start Center bundle surfaces §3.2).
# Every row binds the badge id to the manifest fields that back it, the
# required evidence link kinds, the required proof classes, the
# downgrade target when freshness fails, and the publish-gate verdict
# the claim-publication automation reads.
#
# Tooling reads this file. The normative narrative is
# docs/workflow/bundle_evidence_freshness_contract.md. If the two
# disagree, this file is authoritative for tooling and the narrative is
# updated in the same change.
#
# Scope.
#   - Six rows: badge.certified, badge.managed_approved, badge.community,
#     badge.imported, badge.local_draft, badge.retest_pending. The
#     packaging-posture badges (badge.signed_offline_bundle,
#     badge.mirror_only, badge.live_or_mirror, badge.live_origin_only,
#     badge.offline_no_bundle) and the lifecycle badges
#     (badge.deprecated, badge.status_unknown) re-export their freshness
#     posture from these six rows by reading the manifest's
#     mirror_or_offline_packaging_posture / lifecycle_state_class
#     directly; this register pins the proof-marker rows so the
#     publish gate can resolve verdicts.
#   - Each row enumerates required_evidence_links (with
#     badge_evidence_link_requirement_kind), required_proof_classes,
#     freshness gates (aging / stale / signature_break / mirror_unknown),
#     downgrade triggers, downgrade targets, disclosure surfaces, and
#     marketing separation rules.
#
# Rules.
#   - Every rendered bundle_evidence_badge_id resolves through one row
#     in this file at evaluation time.
#   - Adding a row, adding a backing status, adding a required evidence
#     link, or shifting a downgrade target is additive-minor and bumps
#     bundle_badge_freshness_rows_schema_version. Repurposing an
#     existing row's stale_publish_gate from publish_allowed* to
#     publish_fail_closed_* (or vice versa) is breaking and requires a
#     decision row in artifacts/governance/decision_index.yaml.
#   - Every row carries marketing_separation_rules with all four
#     classes from contract §3.8 verbatim.
#   - Milestone slugs MUST NOT appear in any row id, badge label,
#     trigger, or gate value.

schema_version: 1
bundle_badge_freshness_rows_schema_version: 1
catalog_id: aureline.workflow.bundle_badge_freshness_rows
status: seeded
contract_doc_ref: docs/workflow/bundle_evidence_freshness_contract.md

# -----------------------------------------------------------------------------
# Cross-references.
# -----------------------------------------------------------------------------
upstream_refs:
  workflow_bundle_object_model_contract_ref: docs/workflow/workflow_bundle_object_model.md
  bundle_manifest_schema_ref: schemas/workflow/bundle_manifest.schema.json
  bundle_change_review_contract_ref: docs/workflow/bundle_change_review_contract.md
  bundle_change_preview_schema_ref: schemas/workflow/bundle_change_preview.schema.json
  bundle_drift_and_removal_contract_ref: docs/workflow/bundle_drift_and_removal_contract.md
  bundle_drift_row_schema_ref: schemas/workflow/bundle_drift_row.schema.json
  start_center_bundle_surfaces_contract_ref: docs/ux/start_center_bundle_surfaces.md
  workflow_bundle_id_register_ref: artifacts/qe/workflow_bundle_ids.yaml
  evidence_freshness_slos_ref: artifacts/governance/evidence_freshness_slos.yaml
  claim_publication_automation_contract_ref: docs/release/claim_publication_automation_contract.md
  claim_publication_binding_schema_ref: schemas/governance/claim_publication_binding.schema.json
  template_and_prebuild_contract_ref: docs/ux/template_and_prebuild_contract.md
  waiver_register_ref: artifacts/governance/waiver_register.yaml
  stale_badge_fail_rules_ref: artifacts/workflow/stale_badge_fail_rules.yaml

