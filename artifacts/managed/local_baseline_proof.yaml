# -----------------------------------------------------------------------------
# Reusable summary block.
# Shiproom and public-proof packets quote this block verbatim when
# making a "local-first" or "graceful degradation" claim. The block is
# stable across rehearsals; it is the public-truth projection of the
# rehearsal_proof_rows above.
# -----------------------------------------------------------------------------
public_proof_summary:
  local_first_assertion: >-
    Across every rehearsal class freezed in this artifact, local edit,
    save, search, local Git, already-authorized local tasks, BYOK
    local AI, already-authorized local automation, support-bundle
    export from local evidence, offboarding export from already-
    prepared local artifacts, and read of already-exported local
    artifacts remain admissible. A surface that blocks any of these
    on managed-service loss is non-conforming.
  graceful_degradation_assertion: >-
    Every rehearsal class names what must be exported before the
    rehearsal close commits, with a typed deadline drawn from the
    bound workspace-lifecycle or account-exit record. Every rehearsal
    class names what can be reopened locally afterward, including a
    typed self-hosted or local alternative when the rehearsal narrows
    or blocks a managed workflow.
  failure_modes_disclosed:
    - notebook_kernel_state_not_preserved_across_phase_transition
    - in_progress_processes_terminals_forwarded_ports_not_durable
