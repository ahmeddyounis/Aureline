# Local-baseline proof artifact for managed continuity and account-exit rehearsals.
#
# Machine-readable companion to
# docs/verification/managed_continuity_and_account_exit_packet.md. Every
# row binds one rehearsal_class to:
#   - the closed local-baseline admissible-surface set that survives
#     the rehearsal close without an account or managed service;
#   - the export-before-suspend matrix posture per artifact kind for
#     the rehearsal class;
#   - the closed reopen-locally-afterward set;
#   - the inherited-contract refs that govern the rehearsal cell.
#
# This artifact is the single source of truth a shiproom or public-
# proof packet quotes when asserting "local-first" or "graceful
# degradation" for the rehearsal class. It is reusable by shiproom and
# public-proof work without rewording managed-continuity claims.
#
# Conformance:
#   - Every row MUST resolve to one rehearsal_class drawn from the
#     closed vocabulary in
#     docs/verification/managed_continuity_and_account_exit_packet.md.
#   - Every row MUST name a non-empty local_baseline_admissible_surfaces
#     set drawn from the closed local_baseline_admissible_surface_class
#     vocabulary.
#   - Every row MUST name an export_before_suspend_matrix entry for
#     each export_artifact_kind_class
#     (workspace_files, review_packets, evidence_packets, notebooks,
#     workflow_bundles, queued_provider_drafts, support_captures).
#   - Every row MUST name a non-empty reopen_locally_afterward set
#     drawn from the closed reopen_locally_afterward_class vocabulary.
#   - The local_only_fallback_after_service_outage row MUST claim the
#     full local-baseline admissible-surface set without narrowing.
#   - Adding a rehearsal_class, an export_artifact_kind_class, an
#     export_before_suspend_disposition_class, a
#     local_baseline_admissible_surface_class, a
#     reopen_locally_afterward_class, or a narrowing_reason_class is
#     additive-minor and bumps schema_version on this file in the same
#     change. Repurposing a value is breaking and opens a decision row
#     in artifacts/governance/decision_index.yaml.
#   - Milestone slugs MUST NOT appear in any id, path, or description
#     field on this artifact. Describe what the row covers, not which
#     planning item it came from.

schema_version: 1
artifact_kind: local_baseline_proof
contract_ref: docs/verification/managed_continuity_and_account_exit_packet.md
fixture_home: fixtures/managed/continuity_account_exit_cases/

inherited_contracts:
  - docs/managed/managed_workspace_lifecycle_contract.md
  - docs/managed/account_seat_plan_and_exit_contract.md
  - docs/admin/org_admin_seat_and_fleet_contract.md
  - docs/integrations/provider_account_mapping_and_offline_capture_contract.md
  - docs/governance/data_portability_and_exit_matrix.md
inherited_schemas:
  - schemas/managed/workspace_lifecycle_state.schema.json
  - schemas/managed/account_exit_packet.schema.json

# Closed vocabularies re-exported so tooling can discover the
# authoritative lists without parsing the contract doc.
rehearsal_class_vocabulary:
  - managed_workspace_suspended
  - managed_workspace_expired
  - account_exit
  - seat_loss
  - plan_grace_downgrade
  - policy_suspension
  - local_only_fallback_after_service_outage

export_artifact_kind_class_vocabulary:
  - workspace_files
  - review_packets
  - evidence_packets
  - notebooks
  - workflow_bundles
  - queued_provider_drafts
  - support_captures

export_before_suspend_disposition_class_vocabulary:
  - already_exported_local_artifact
  - must_export_before_suspend
  - exportable_during_access_end_window
  - exportable_post_close_via_legal_hold
  - discarded_at_close
  - policy_held_post_close
  - redacted_by_policy
  - preserved_locally_after_close
  - not_applicable

local_baseline_admissible_surface_class_vocabulary:
  - file_open_and_edit
  - file_save_to_local_disk
  - local_search
  - local_git
  - local_tasks
  - local_byok_ai
  - local_authorized_automation
  - support_bundle_export_local_only
  - offboarding_export_local_only
  - already_exported_local_artifacts

reopen_locally_afterward_class_vocabulary:
  - reopen_local_workspace_files
  - reopen_local_review_packets
  - reopen_local_evidence_packets
  - reopen_local_notebooks
  - reopen_local_workflow_bundles
  - reopen_local_queued_drafts_offline_capture
  - reopen_local_support_bundles
  - reopen_self_hosted_org_deployment
  - reopen_account_free_local_deployment
  - reopen_byok_local_ai_route
  - reopen_local_only_collaboration
  - reopen_signed_file_based_policy
  - reopen_offline_capture_continuation

narrowing_reason_class_vocabulary:
  - policy_suppressed_managed_action
  - seat_revoked_local_history_only
  - byok_route_blocked_by_budget
  - offline_capture_drained_already

# -----------------------------------------------------------------------------
# Rows.
# One row per rehearsal_class. Every row lists the local-baseline
# admissible-surface set, the export-before-suspend matrix posture per
# artifact kind, the reopen-locally-afterward set, the bound rehearsal
# fixture, and the inherited-contract refs that govern the cell.
# -----------------------------------------------------------------------------
