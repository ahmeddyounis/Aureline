      - file_save_to_local_disk
      - local_search
      - local_git
      - local_tasks
      - local_byok_ai
      - local_authorized_automation
      - support_bundle_export_local_only
      - already_exported_local_artifacts
    narrowing_reason_class: null
    export_before_suspend_matrix:
      workspace_files:
        admissible_disposition_classes:
          - must_export_before_suspend
          - preserved_locally_after_close
        deadline_at_source: workspace_lifecycle.expiry_or_rebuild_window
      review_packets:
        admissible_disposition_classes:
          - must_export_before_suspend
        deadline_at_source: workspace_lifecycle.expiry_or_rebuild_window
      evidence_packets:
        admissible_disposition_classes:
          - must_export_before_suspend
        deadline_at_source: workspace_lifecycle.expiry_or_rebuild_window
      notebooks:
        admissible_disposition_classes:
          - must_export_before_suspend
        deadline_at_source: workspace_lifecycle.expiry_or_rebuild_window
      workflow_bundles:
        admissible_disposition_classes:
          - preserved_locally_after_close
          - must_export_before_suspend
        deadline_at_source: not_applicable
      queued_provider_drafts:
        admissible_disposition_classes:
          - must_export_before_suspend
        deadline_at_source: workspace_lifecycle.expiry_or_rebuild_window
        offline_capture_continuation_required: true
      support_captures:
        admissible_disposition_classes:
          - already_exported_local_artifact
          - must_export_before_suspend
        deadline_at_source: workspace_lifecycle.expiry_or_rebuild_window
    reopen_locally_afterward:
