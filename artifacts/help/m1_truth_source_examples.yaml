# M1 docs/help/About/service-health truth-source badge-vocabulary seed.
#
# This file is the canonical, machine-readable seed for the provenance,
# freshness, client-scope, install-mode, service-health, and source-class
# badge vocabulary that Help / About / service-health / docs-browser
# surfaces project. It exists so the four surfaces and the support / export
# copy that quotes them never invent a private badge string and never
# silently blank out a row when upstream truth is missing.
#
# The boundary schema for this file is
#   schemas/help/provenance_badge_vocabulary.schema.json
# The reviewer-facing landing page is
#   docs/help/truth_source_model.md
# The badge vocabulary draft (a named runtime consumer that quotes every
# row verbatim) lives at
#   docs/help/badge_vocabulary_draft.md
# The live shell consumer that already reads these tokens is rooted at
#   crates/aureline-shell/src/help_about/mod.rs
# and
#   crates/aureline-shell/src/docs_browser/state.rs
#
# Each row in this seed freezes:
#
#   - one badge family (source class, version-match state, freshness
#     class, client-scope, install mode, provenance row state, service
#     health state);
#   - the closed token vocabulary the four surfaces MUST quote verbatim;
#   - the explicit honesty-fallback token the surface renders when
#     upstream truth is missing or unverified;
#   - the consuming surface classes that MUST stay parity-consistent
#     (help_pane, about_pane, service_health_pane, docs_browser_pane);
#   - one named runtime consumer (a real docs page, the live shell
#     module, support-export copy, or a CI validator);
#   - exactly one canonical example payload under
#     fixtures/help/m1_truth_source_examples/<row>.json that the
#     validation lane re-parses end-to-end; and
#   - a typed failure drill the runner can replay under --force-drill.
#
# Adding a new badge family is additive-minor and bumps
# truth_source_row_schema_version on every existing row; repurposing an
# existing badge_family_class, consuming_surface_class, vocabulary_role
# token, or honesty_fallback_token is breaking and requires a new
# decision row plus a superseding seed.

schema_version: 1
status: seeded
as_of: "2026-05-11"

matrix_id: m1_truth_source_badge_vocabulary_seed
owner_dri: "@ahmeddyounis"

overview_page: docs/help/truth_source_model.md
badge_vocabulary_draft_ref: docs/help/badge_vocabulary_draft.md
build_identity_ref: artifacts/build/build_identity.json
validation_lane_ref: artifacts/qe/test_lane_registry.yaml#fixture_repo_integration

badge_family_class_vocabulary:
  - docs_help_source_class
  - docs_help_version_match_state
  - docs_help_freshness_class
  - client_scope_badge_family
  - install_mode_class
  - provenance_row_state
  - service_health_state

vocabulary_role_class_vocabulary:
  - live_state_token
  - honesty_fallback_token
  - degraded_state_token
  - seed_placeholder_token

consuming_surface_class_vocabulary:
  - help_pane
  - about_pane
  - service_health_pane
  - docs_browser_pane
  - support_export_card
  - release_notes_card

consumer_class_vocabulary:
  - review_docs_landing_page
  - review_docs_badge_vocabulary_draft
  - live_shell_help_about_module
  - live_shell_docs_browser_module
  - support_export_copy
  - ci_schema_validator

failure_drill_id_vocabulary:
  - truth_source_drill.honesty_fallback_token_dropped
  - truth_source_drill.freshness_degraded_pair_widened
  - truth_source_drill.version_match_token_count_drifted
  - truth_source_drill.required_consuming_surface_help_pane_dropped
  - truth_source_drill.install_mode_unknown_token_dropped
  - truth_source_drill.provenance_seed_placeholder_dropped
  - truth_source_drill.service_health_seed_placeholder_dropped

required_badge_family_class_coverage:
  - docs_help_source_class
  - docs_help_version_match_state
  - docs_help_freshness_class
  - client_scope_badge_family
  - install_mode_class
  - provenance_row_state
  - service_health_state

required_consuming_surface_class_coverage:
  - help_pane
  - about_pane
  - service_health_pane
  - docs_browser_pane

rows:
  # 1. Docs/help source class.
  - record_kind: m1_truth_source_row
    truth_source_row_schema_version: 1
    row_id: truth_source.docs_help_source_class
    badge_family_class: docs_help_source_class
    title: Docs/help source class badge vocabulary
    description: >
      Closed source-class vocabulary every Help, About, service-health,
      and docs-browser surface MUST quote verbatim when it names where a
      docs/help row's content came from. The vocabulary mirrors the
      tokens already minted by the live docs-browser projection so the
      shell never forks a private source-class ladder. When upstream
      truth is missing the surface renders the row as 'unknown_source'
      and keeps the row visible rather than blanking it out.
    owner_dri: "@ahmeddyounis"
    vocabulary_tokens:
      - token: project_docs
        role: live_state_token
        label: Project docs (this build's authoritative pack)
      - token: generated_reference
        role: live_state_token
        label: Generated reference
      - token: mirrored_official_docs
        role: live_state_token
        label: Mirrored official docs
      - token: curated_knowledge_pack
        role: live_state_token
        label: Curated knowledge pack
      - token: derived_explanation
        role: live_state_token
        label: Derived explanation (not authoritative)
      - token: vendor_provider_docs
        role: live_state_token
        label: Vendor / provider docs
      - token: support_runbook
        role: live_state_token
        label: Support runbook
      - token: external_status_feed
        role: live_state_token
        label: External status feed
      - token: unknown_source
        role: honesty_fallback_token
        label: Unknown source (no source-of-truth disclosed)
    frozen_token_count: 9
    honesty_fallback_token: unknown_source
    consuming_surface_classes:
      - help_pane
      - about_pane
      - service_health_pane
      - docs_browser_pane
      - support_export_card
    support_export_compatible: true
    named_runtime_consumer:
      consumer_ref: crates/aureline-shell/src/docs_browser/state.rs
      consumer_class: live_shell_docs_browser_module
      consumed_fields:
        - truth_source_row.vocabulary_tokens[].token
        - truth_source_row.honesty_fallback_token
        - truth_source_row.consuming_surface_classes
    example_payload_ref: fixtures/help/m1_truth_source_examples/docs_help_source_class.json
    failure_drill:
      drill_id: truth_source_drill.honesty_fallback_token_dropped
      description: >
        Drops the row's honesty_fallback_token so the surface would have
        no token to render when upstream truth is missing; the lane MUST
        fail with truth_source.honesty_fallback_token_missing.
      forced_input:
        drop_honesty_fallback_token: true
      expected_check_id: truth_source.honesty_fallback_token_missing
      actionable_next_action: >
        Restore the row's honesty_fallback_token to the canonical token
        listed in the badge vocabulary draft, or land a new decision row
        in artifacts/governance/decision_register.yaml before removing
        it.

  # 2. Docs/help version-match state.
  - record_kind: m1_truth_source_row
    truth_source_row_schema_version: 1
    row_id: truth_source.docs_help_version_match_state
    badge_family_class: docs_help_version_match_state
    title: Docs/help version-match state badge vocabulary
    description: >
      Closed version-match-state vocabulary the four consuming surfaces
      MUST quote verbatim when they name how the docs/help row's claimed
      build relates to the running build. The vocabulary mirrors the
      tokens already minted by the docs-browser projection so the shell
      never forks a private match-state ladder. Drift and unknown
      states never collapse to 'exact_build_match'; the surface labels
      them explicitly.
    owner_dri: "@ahmeddyounis"
    vocabulary_tokens:
      - token: exact_build_match
        role: live_state_token
        label: Exact build match
      - token: compatible_minor_drift
        role: live_state_token
        label: Compatible (minor drift)
      - token: incompatible_drift_detected
        role: degraded_state_token
        label: Incompatible drift detected
      - token: pre_release_unverified
        role: degraded_state_token
        label: Pre-release (unverified)
      - token: unknown_target_build
        role: honesty_fallback_token
        label: Unknown target build
    frozen_token_count: 5
    honesty_fallback_token: unknown_target_build
    consuming_surface_classes:
      - help_pane
      - about_pane
      - service_health_pane
      - docs_browser_pane
      - support_export_card
    support_export_compatible: true
    named_runtime_consumer:
      consumer_ref: crates/aureline-shell/src/docs_browser/state.rs
      consumer_class: live_shell_docs_browser_module
      consumed_fields:
        - truth_source_row.vocabulary_tokens[].token
        - truth_source_row.honesty_fallback_token
        - truth_source_row.consuming_surface_classes
    example_payload_ref: fixtures/help/m1_truth_source_examples/docs_help_version_match_state.json
    failure_drill:
      drill_id: truth_source_drill.version_match_token_count_drifted
      description: >
        Injects a well-formed but unsanctioned token into the row's
        vocabulary_tokens, drifting the actual token count away from
        the row's frozen_token_count; the lane MUST fail with
        truth_source.vocabulary_token_count_mismatch because the seed
        forbids ad-hoc surface-local match-state tokens.
      forced_input:
        inject_unknown_token: docs_match_state_invented_label
      expected_check_id: truth_source.vocabulary_token_count_mismatch
      actionable_next_action: >
        Remove the invented token, or land a new decision row in
        artifacts/governance/decision_register.yaml that promotes it
        into the schema, bumps frozen_token_count, and adds the token
        to the badge vocabulary draft.

  # 3. Docs/help freshness class.
  - record_kind: m1_truth_source_row
    truth_source_row_schema_version: 1
    row_id: truth_source.docs_help_freshness_class
    badge_family_class: docs_help_freshness_class
    title: Docs/help freshness class badge vocabulary
    description: >
      Closed freshness-class vocabulary every Help, About, service-
      health, and docs-browser surface MUST quote verbatim. The
      degraded-state tokens ('degraded_cached', 'stale', 'unverified')
      MUST stay paired with their degraded role so a surface cannot
      silently render a stale snapshot as 'authoritative_live'. The
      honesty fallback is 'unverified'.
    owner_dri: "@ahmeddyounis"
    vocabulary_tokens:
      - token: authoritative_live
        role: live_state_token
        label: Authoritative (live)
      - token: warm_cached
        role: live_state_token
        label: Warm cached
      - token: degraded_cached
        role: degraded_state_token
        label: Degraded cached
      - token: stale
        role: degraded_state_token
        label: Stale
      - token: unverified
        role: honesty_fallback_token
        label: Unverified
    frozen_token_count: 5
    honesty_fallback_token: unverified
    consuming_surface_classes:
      - help_pane
      - about_pane
      - service_health_pane
      - docs_browser_pane
      - support_export_card
    support_export_compatible: true
    named_runtime_consumer:
      consumer_ref: crates/aureline-shell/src/docs_browser/state.rs
      consumer_class: live_shell_docs_browser_module
      consumed_fields:
        - truth_source_row.vocabulary_tokens[].token
        - truth_source_row.vocabulary_tokens[].role
        - truth_source_row.honesty_fallback_token
    example_payload_ref: fixtures/help/m1_truth_source_examples/docs_help_freshness_class.json
    failure_drill:
      drill_id: truth_source_drill.freshness_degraded_pair_widened
      description: >
        Rewrites the 'stale' token's role from degraded_state_token to
        live_state_token so a consuming surface could silently widen a
        stale snapshot into a healthy badge; the lane MUST fail with
        truth_source.degraded_state_token_widened.
      forced_input:
        rewrite_token_role:
          token: stale
          role: live_state_token
      expected_check_id: truth_source.degraded_state_token_widened
      actionable_next_action: >
        Restore the 'stale' token's role to degraded_state_token. Any
        widening of a degraded freshness token must land in a new
        decision row before the schema relaxes the pairing.

  # 4. Client-scope badge family.
  - record_kind: m1_truth_source_row
    truth_source_row_schema_version: 1
    row_id: truth_source.client_scope_badge_family
    badge_family_class: client_scope_badge_family
    title: Client-scope target / origin / identity / trust badge vocabulary
    description: >
      Closed client-scope vocabulary the Help, About, service-health,
      and docs-browser surfaces MUST quote verbatim when they name
      which client scope is in force. The vocabulary mirrors the
      target-origin badge already projected by the live shell so the
      help pane, the terminal pane, the task seed, and the provider
      chip all render the same tokens. The honesty fallback is
      'degraded_trust' for the origin axis.
    owner_dri: "@ahmeddyounis"
    vocabulary_tokens:
      - token: local_desktop
        role: live_state_token
        label: Local desktop
      - token: remote_host
        role: live_state_token
        label: Remote host
      - token: managed_workspace
        role: live_state_token
        label: Managed workspace
      - token: local_to_remote
        role: live_state_token
        label: Local desktop to remote host
      - token: local_to_managed
        role: live_state_token
        label: Local desktop to managed plane
      - token: account_free_local
        role: live_state_token
        label: Account-free local
      - token: self_hosted_org
        role: live_state_token
        label: Self-hosted organisation
      - token: trusted
        role: live_state_token
        label: Trusted
      - token: restricted
        role: degraded_state_token
        label: Restricted
      - token: degraded_trust
        role: honesty_fallback_token
        label: Trust pending — review before action
    frozen_token_count: 10
    honesty_fallback_token: degraded_trust
    consuming_surface_classes:
      - help_pane
      - about_pane
      - service_health_pane
      - docs_browser_pane
      - support_export_card
    support_export_compatible: true
    named_runtime_consumer:
      consumer_ref: crates/aureline-shell/src/help_about/mod.rs
      consumer_class: live_shell_help_about_module
      consumed_fields:
        - truth_source_row.vocabulary_tokens[].token
        - truth_source_row.honesty_fallback_token
        - truth_source_row.consuming_surface_classes
    example_payload_ref: fixtures/help/m1_truth_source_examples/client_scope_badge_family.json
    failure_drill:
      drill_id: truth_source_drill.required_consuming_surface_help_pane_dropped
      description: >
        Drops 'help_pane' from the row's consuming_surface_classes so
        the help surface could fork a private client-scope vocabulary;
        the lane MUST fail with
        truth_source.required_consuming_surface_missing because the
        seed requires every row to bind all four surfaces.
      forced_input:
        drop_consuming_surface: help_pane
      expected_check_id: truth_source.required_consuming_surface_missing
      actionable_next_action: >
        Restore help_pane to consuming_surface_classes. The seed forbids
        forking client-scope copy on any of help_pane, about_pane,
        service_health_pane, or docs_browser_pane.

  # 5. Install-mode class.
  - record_kind: m1_truth_source_row
    truth_source_row_schema_version: 1
    row_id: truth_source.install_mode_class
    badge_family_class: install_mode_class
    title: About install-mode badge vocabulary
    description: >
      Closed install-mode vocabulary the About / Help / service-health /
      docs-browser surfaces MUST quote verbatim when they name how the
      running build was installed. The vocabulary mirrors the install-
      mode class already projected by the live help/About module so the
      surface never silently renders an unknown channel as 'stable'.
      The honesty fallback is 'unknown_install_mode'.
    owner_dri: "@ahmeddyounis"
    vocabulary_tokens:
      - token: dev_local_built_from_source
        role: live_state_token
        label: Dev (built from source)
      - token: nightly_local_install
        role: live_state_token
        label: Nightly install
      - token: preview_local_install
        role: live_state_token
        label: Preview install
      - token: beta_local_install
        role: live_state_token
        label: Beta install
      - token: stable_local_install
        role: live_state_token
        label: Stable install
      - token: lts_local_install
        role: live_state_token
        label: LTS install
      - token: hotfix_local_install
        role: live_state_token
        label: Hotfix install
      - token: unknown_install_mode
        role: honesty_fallback_token
        label: Unknown install mode
    frozen_token_count: 8
    honesty_fallback_token: unknown_install_mode
    consuming_surface_classes:
      - help_pane
      - about_pane
      - service_health_pane
      - docs_browser_pane
      - support_export_card
    support_export_compatible: true
    named_runtime_consumer:
      consumer_ref: crates/aureline-shell/src/help_about/mod.rs
      consumer_class: live_shell_help_about_module
      consumed_fields:
        - truth_source_row.vocabulary_tokens[].token
        - truth_source_row.honesty_fallback_token
        - truth_source_row.consuming_surface_classes
    example_payload_ref: fixtures/help/m1_truth_source_examples/install_mode_class.json
    failure_drill:
      drill_id: truth_source_drill.install_mode_unknown_token_dropped
      description: >
        Drops 'unknown_install_mode' from the vocabulary so the surface
        would have no honesty fallback when a channel token is
        unrecognised; the lane MUST fail with
        truth_source.honesty_fallback_token_not_in_vocabulary because
        every honesty_fallback_token MUST also appear in
        vocabulary_tokens.
      forced_input:
        drop_vocabulary_token: unknown_install_mode
      expected_check_id: truth_source.honesty_fallback_token_not_in_vocabulary
      actionable_next_action: >
        Restore 'unknown_install_mode' to vocabulary_tokens with role
        honesty_fallback_token. The About surface cannot label an
        unrecognised channel without it.

  # 6. Provenance row state.
  - record_kind: m1_truth_source_row
    truth_source_row_schema_version: 1
    row_id: truth_source.provenance_row_state
    badge_family_class: provenance_row_state
    title: Provenance row-state badge vocabulary
    description: >
      Closed provenance row-state vocabulary every consuming surface
      MUST quote verbatim. The M1 seed pins every provenance row at
      'seed_placeholder_awaiting_wiring' until the live verifier lands
      so the chrome cannot fabricate 'all green' before the verifier
      exists. The honesty fallback is 'not_verified_this_seed'.
    owner_dri: "@ahmeddyounis"
    vocabulary_tokens:
      - token: seed_placeholder_awaiting_wiring
        role: seed_placeholder_token
        label: Seed placeholder (wiring pending)
      - token: signed_verified
        role: live_state_token
        label: Signed and verified
      - token: attestation_verified
        role: live_state_token
        label: Attestation verified
      - token: checksum_verified
        role: live_state_token
        label: Checksum verified
      - token: sbom_attached_verified
        role: live_state_token
        label: SBOM attached and verified
      - token: no_open_advisories
        role: live_state_token
        label: No open advisories
      - token: not_verified_this_seed
        role: honesty_fallback_token
        label: Not verified by this seed
    frozen_token_count: 7
    honesty_fallback_token: not_verified_this_seed
    consuming_surface_classes:
      - help_pane
      - about_pane
      - service_health_pane
      - docs_browser_pane
      - support_export_card
    support_export_compatible: true
    named_runtime_consumer:
      consumer_ref: crates/aureline-shell/src/help_about/mod.rs
      consumer_class: live_shell_help_about_module
      consumed_fields:
        - truth_source_row.vocabulary_tokens[].token
        - truth_source_row.vocabulary_tokens[].role
        - truth_source_row.honesty_fallback_token
    example_payload_ref: fixtures/help/m1_truth_source_examples/provenance_row_state.json
    failure_drill:
      drill_id: truth_source_drill.provenance_seed_placeholder_dropped
      description: >
        Rewrites the 'seed_placeholder_awaiting_wiring' token's role to
        live_state_token, which would let the chrome treat the
        placeholder as a verified state; the lane MUST fail with
        truth_source.seed_placeholder_role_widened.
      forced_input:
        rewrite_token_role:
          token: seed_placeholder_awaiting_wiring
          role: live_state_token
      expected_check_id: truth_source.seed_placeholder_role_widened
      actionable_next_action: >
        Restore the 'seed_placeholder_awaiting_wiring' role to
        seed_placeholder_token. The seed forbids labelling the
        placeholder as a live, verified provenance state.

  # 7. Service-health state.
  - record_kind: m1_truth_source_row
    truth_source_row_schema_version: 1
    row_id: truth_source.service_health_state
    badge_family_class: service_health_state
    title: Service-health state badge vocabulary
    description: >
      Closed service-health-state vocabulary every consuming surface
      MUST quote verbatim. The M1 seed pins every service-health row
      at 'seed_placeholder_awaiting_wiring' until the live aggregator
      lands so the chrome cannot paint 'Healthy' before the aggregator
      exists. The honesty fallback is 'stale_snapshot'.
    owner_dri: "@ahmeddyounis"
    vocabulary_tokens:
      - token: seed_placeholder_awaiting_wiring
        role: seed_placeholder_token
        label: Seed placeholder (wiring pending)
      - token: healthy
        role: live_state_token
        label: Healthy
      - token: degraded
        role: degraded_state_token
        label: Degraded
      - token: unavailable
        role: degraded_state_token
        label: Unavailable
      - token: stale_snapshot
        role: honesty_fallback_token
        label: Stale snapshot
    frozen_token_count: 5
    honesty_fallback_token: stale_snapshot
    consuming_surface_classes:
      - help_pane
      - about_pane
      - service_health_pane
      - docs_browser_pane
      - support_export_card
    support_export_compatible: true
    named_runtime_consumer:
      consumer_ref: crates/aureline-shell/src/help_about/mod.rs
      consumer_class: live_shell_help_about_module
      consumed_fields:
        - truth_source_row.vocabulary_tokens[].token
        - truth_source_row.vocabulary_tokens[].role
        - truth_source_row.honesty_fallback_token
    example_payload_ref: fixtures/help/m1_truth_source_examples/service_health_state.json
    failure_drill:
      drill_id: truth_source_drill.service_health_seed_placeholder_dropped
      description: >
        Drops the 'seed_placeholder_awaiting_wiring' token from the
        vocabulary; the lane MUST fail with
        truth_source.seed_placeholder_token_required because the M1
        seed requires every provenance / service-health row to carry
        the placeholder explicitly.
      forced_input:
        drop_vocabulary_token: seed_placeholder_awaiting_wiring
      expected_check_id: truth_source.seed_placeholder_token_required
      actionable_next_action: >
        Restore 'seed_placeholder_awaiting_wiring' to vocabulary_tokens
        with role seed_placeholder_token. M1 service-health and
        provenance rows are honest only if the placeholder is rendered
        explicitly.
