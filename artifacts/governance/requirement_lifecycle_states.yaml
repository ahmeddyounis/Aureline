# Requirement lifecycle-state catalog.
#
# Machine-readable companion to docs/governance/normative_requirement_policy.md.
# Requirement rows, waiver packets, verification packets, scorecards, and
# signoff automation consume these family and lifecycle ids rather than
# reinterpreting source-document prose.

schema_version: 1
catalog_id: aureline.requirement_lifecycle_states
status: seeded

policy_doc_ref: docs/governance/normative_requirement_policy.md
requirement_register_ref: artifacts/governance/requirement_register_seed.yaml
verification_class_catalog_ref: artifacts/governance/verification_classes.yaml
mandatory_review_artifact_catalog_ref: artifacts/governance/mandatory_review_artifacts.yaml
evidence_freshness_policy_ref: docs/governance/evidence_freshness_policy.md
waiver_template_ref: docs/governance/templates/waiver_template.md
forum_matrix_ref: artifacts/governance/forum_matrix.yaml
ownership_matrix_ref: artifacts/governance/ownership_matrix.yaml

source_specs:
  - .t2/docs/Aureline_PRD.md
  - .t2/docs/Aureline_Milestones_Document.md
  - .t2/docs/Aureline_Technical_Architecture_Document.md
  - .t2/docs/Aureline_Technical_Design_Document.md
  - .t2/docs/Aureline_UI_UX_Spec_Document.md

source_precedence:
  - precedence_rank: 1
    source_class: canonical_requirement_row_or_active_waiver
    binding_effect: >
      Approved canonical requirement rows and active approved waivers are
      the first machine-readable control point for release, scorecard,
      waiver, and signoff decisions.
  - precedence_rank: 2
    source_class: approved_adr_or_accepted_rfc
    binding_effect: >
      Decisions refine implementation and interface posture for cited
      requirement ids, but they do not silently replace the canonical row.
  - precedence_rank: 3
    source_class: technical_architecture_or_design_rule
    binding_effect: >
      Architecture and technical design rules bind implementation when
      they do not conflict with higher-precedence requirement rows,
      waivers, or decisions.
  - precedence_rank: 4
    source_class: ux_spec_or_design_system_contract
    binding_effect: >
      UX contracts bind affected user surfaces, interaction behavior,
      accessibility, and token/component semantics when not contradicted
      by higher-precedence artifacts.
  - precedence_rank: 5
    source_class: template_example_or_guidance
    binding_effect: Advisory or illustrative unless promoted by a schema, catalog, requirement row, or accepted decision.
  - precedence_rank: 6
    source_class: implementation_convenience
    binding_effect: Never overrides a higher-precedence control artifact.

classification_vocabulary:
  - classification_id: normative
    release_effect: >
      Can block merge, milestone close, release promotion, signoff, or
      claim publication when the row is binding for the affected scope.
    row_rule: >
      Canonical requirement ids, uppercase BCP 14 statements in approved
      source artifacts, required schema/catalog fields, active waivers,
      and accepted review outcomes are normative.
  - classification_id: advisory
    release_effect: >
      Can justify review questions and follow-up work, but does not block
      release by itself.
    row_rule: >
      Strategy, rationale, lower-case recommendations, and implementation
      guidance without a requirement id or accepted decision are advisory.
  - classification_id: illustrative
    release_effect: No direct release force.
    row_rule: >
      Examples, placeholders, mock packets, sample values, and diagrams
      are illustrative unless another control artifact promotes them.

normalization_rules:
  requirement_id_pattern: "<CLASS>-<DOMAIN>-<NNN>"
  lifecycle_state_field: status
  state_id_case: lower_snake_case
  display_label_case: title_case
  canonical_states:
    - proposed
    - approved
    - in_progress
    - implemented
    - verified
    - waived
    - deprecated
    - removed
  compatibility_state_aliases:
    - source_state: draft
      normalize_to: proposed
      rule: >
        Draft is legacy source wording for an unapproved candidate
        obligation. It is not a separate release-gating state.
    - source_state: replaced
      normalize_to: removed
      rule: >
        Replaced is supersession bookkeeping. For release gating, the
        old row is historical unless a current replacement requirement
        row is explicitly cited.

row_accountability_contract:
  required_on_promotion_grade_rows:
    - requirement_id
    - requirement_class
    - status
    - primary_owner
    - evidence_owner
    - verification_classes
    - source_anchors
  waiver_authority_resolution_order:
    - requirement_family.default_waiver_authority_forum
    - requirement_family.escalation_forum_refs
    - requirement_register.owners.approving_forums
  owner_rules:
    - primary_owner owns the requirement outcome and any claim narrowing.
    - evidence_owner owns proof freshness, reruns, and evidence joins.
    - waiver_authority owns accepted risk only within the waiver scope and expiry.
    - Missing owner, evidence owner, or waiver authority fails closed for signoff and release use.
  family_id_rule: >
    Fitness ids, dashboard rows, packet-local labels, and milestone exit
    labels are not requirement-family ids. They must resolve through the
    requirement register or alias crosswalk before appearing in waivers,
    release packets, or signoff automation.

requirement_families:
  - family_id: FR
    label: Functional requirement
    scope: End-user functional capabilities and user-visible workflows.
    default_verification_classes:
      - CONF
      - UXVAL
    default_waiver_authority_forum: product_scope_review
    escalation_forum_refs:
      - release_council
    release_blocker_when_designated: true

  - family_id: LANG
    label: Language and framework requirement
    scope: Language, framework, analyzer, debugger, and reference-workspace support promises.
    default_verification_classes:
      - CONF
      - DOCVAL
    default_waiver_authority_forum: compatibility_ecosystem_review
    escalation_forum_refs:
      - release_council
    release_blocker_when_designated: true

  - family_id: PERF
    label: Performance requirement
    scope: Latency, memory, throughput, indexing, startup, energy, and protected fitness budgets.
    default_verification_classes:
      - BENCH
    default_waiver_authority_forum: performance_council
    escalation_forum_refs:
      - release_council
      - shiproom_executive_scope_review
    release_blocker_when_designated: true
    heightened_waiver_controls: true

  - family_id: REL
    label: Reliability requirement
    scope: Durability, crash recovery, correctness, rollback, and operability.
    default_verification_classes:
      - RELTEST
      - OPSVAL
    default_waiver_authority_forum: release_council
    escalation_forum_refs:
      - shiproom_executive_scope_review
    release_blocker_when_designated: true
    heightened_waiver_controls: true

  - family_id: SEC
    label: Security and privacy requirement
    scope: Security, privacy, trust, permissions, credentials, egress, and supply chain.
    default_verification_classes:
      - SECREV
    default_waiver_authority_forum: security_trust_review
    escalation_forum_refs:
      - release_council
      - shiproom_executive_scope_review
    release_blocker_when_designated: true
    heightened_waiver_controls: true

  - family_id: A11Y
    label: Accessibility requirement
    scope: Accessibility, localization, keyboard, focus, IME, contrast, motion, and text/input correctness.
    default_verification_classes:
      - A11YTEST
      - UXVAL
    default_waiver_authority_forum: accessibility_review
    escalation_forum_refs:
      - release_council
    release_blocker_when_designated: true
    heightened_waiver_controls: true

  - family_id: ECOS
    label: Ecosystem requirement
    scope: Extension SDK, registry, marketplace, migration, compatibility, and bridge rules.
    default_verification_classes:
      - CONF
      - DOCVAL
    default_waiver_authority_forum: compatibility_ecosystem_review
    escalation_forum_refs:
      - release_council
    release_blocker_when_designated: true

  - family_id: AI
    label: AI requirement
    scope: AI policy, context, evidence, model routing, approval, review, and apply trust.
    default_verification_classes:
      - SECREV
      - UXVAL
      - OPSVAL
    default_waiver_authority_forum: security_trust_review
    escalation_forum_refs:
      - release_council
    release_blocker_when_designated: true

  - family_id: OPS
    label: Operations and supportability requirement
    scope: Packaging, deployment, supportability, optional managed services, outage posture, and release operation.
    default_verification_classes:
      - OPSVAL
      - DOCVAL
    default_waiver_authority_forum: release_council
    escalation_forum_refs:
      - shiproom_executive_scope_review
    release_blocker_when_designated: true

  - family_id: GOV
    label: Governance requirement
    scope: Governance, licensing, sustainability, public truth, portability, data ownership, and commercial boundaries.
    default_verification_classes:
      - DOCVAL
      - OPSVAL
    default_waiver_authority_forum: product_scope_review
    escalation_forum_refs:
      - release_council
    release_blocker_when_designated: true

  - family_id: ARCH
    label: Architecture requirement
    scope: Architecture invariants, process placement, service contracts, dependency rules, and protected-lane boundaries.
    default_verification_classes:
      - CONF
      - SECREV
      - BENCH
    default_waiver_authority_forum: architecture_council
    escalation_forum_refs:
      - release_council
      - shiproom_executive_scope_review
    release_blocker_when_designated: true
    heightened_waiver_controls: true

  - family_id: TOOL
    label: Tooling requirement
    scope: Execution context, build, test, debug, CLI, automation, shell, and task contracts.
    default_verification_classes:
      - CONF
      - RELTEST
    default_waiver_authority_forum: architecture_council
    escalation_forum_refs:
      - release_council
    release_blocker_when_designated: true

  - family_id: CERT
    label: Certification requirement
    scope: Compatibility, certification, support-class, and reference-workspace claims.
    default_verification_classes:
