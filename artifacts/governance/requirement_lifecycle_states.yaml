    release_blocker_when_designated: true

  - family_id: ENT
    label: Enterprise requirement
    scope: Enterprise identity, administration, policy distribution, fleet deployment, and managed-governance rules.
    default_verification_classes:
      - SECREV
      - OPSVAL
      - CONF
    default_waiver_authority_forum: security_trust_review
