# M1 contribution-governance seed for signoff/DCO, per-file license
# metadata, third-party import provenance, public-interface
# versioning, deprecation-packet template, and repo-hygiene
# scaffolding.
#
# This file is the canonical, machine-readable M1-bearing entry point
# into the contribution-governance contract. It is the focused subset
# every later release, compliance, and ecosystem surface MUST cite
# when it claims a contribution-governance control exists.
#
# Rows here do NOT redeclare the full contributor guide, dependency
# review policy, or supply-chain baseline; the canonical contributor
# guide remains CONTRIBUTING.md and the canonical supply-chain rules
# remain in docs/governance/dependency_review_policy.md and
# docs/governance/provenance_and_compliance_baseline.md. The reviewer
# entry point for this seed is docs/governance/contribution_and_signoff.md.
#
# Each row here freezes the M1-bearing subset:
#
#   - one control family (signoff_dco / license_metadata /
#     third_party_import_record / public_interface_versioning /
#     deprecation_packet_template / repo_hygiene_scaffold);
#   - the canonical artifact that carries the contract;
#   - the artifact-kind and enforcement-class summaries (validated
#     against a closed map keyed by control_class);
#   - lifecycle state;
#   - a canonical_artifact_marker literal substring the canonical
#     artifact MUST contain so the row cannot quietly point at the
#     wrong document;
#   - named_runtime_consumer (a real M1 surface, register, docs page,
#     or CI gate that reads the row); and
#   - exactly one canonical envelope example under
#     fixtures/governance/m1_contribution_governance_examples/<control>.json
#     that the validation lane re-parses end-to-end.
#
# Adding a new control_class, artifact_kind_class, enforcement_class,
# lifecycle_state_class, or contribution_governance_consumer_class
# value is additive-minor and bumps
# contribution_governance_seed_row_schema_version; repurposing an
# existing value is breaking and requires a new decision row plus a
# superseding seed.

schema_version: 1
status: seeded
as_of: "2026-05-11"

matrix_id: m1_contribution_governance_seed
owner_dri: "@ahmeddyounis"

overview_page: docs/governance/contribution_and_signoff.md
row_schema_ref: schemas/governance/contribution_governance_seed_row.schema.json
import_record_register_ref: artifacts/governance/import_record_seed.yaml
build_identity_ref: artifacts/build/build_identity.json
validation_lane_ref: artifacts/qe/test_lane_registry.yaml#fixture_repo_integration

control_class_vocabulary:
  - signoff_dco
  - license_metadata
  - third_party_import_record
  - public_interface_versioning
  - deprecation_packet_template
  - repo_hygiene_scaffold

artifact_kind_class_vocabulary:
  - developer_certificate_contract
  - spdx_license_metadata_policy
  - third_party_import_register
  - public_interface_versioning_policy
  - deprecation_packet_template
  - repo_hygiene_scaffolding

enforcement_class_vocabulary:
  - ci_required
  - repo_hygiene_required
  - contributor_documentation
  - release_review_required

lifecycle_state_class_vocabulary:
  - seeded
  - stabilising
  - stable

contribution_governance_consumer_class_vocabulary:
  - review_docs_landing_page
  - contributor_documentation_page
  - machine_readable_register
  - release_or_compliance_surface

failure_drill_id_vocabulary:
  - signoff_drill.enforcement_class_relaxed_to_contributor_documentation
  - license_drill.artifact_kind_class_drifted_to_third_party_import_register
  - import_record_drill.canonical_artifact_marker_cleared
  - versioning_drill.lifecycle_state_class_drifted_to_unknown
  - deprecation_drill.example_payload_pinned_canonical_artifact_ref_drifted
  - repo_hygiene_drill.named_runtime_consumer_consumed_fields_cleared

required_control_class_coverage:
  - signoff_dco
  - license_metadata
  - third_party_import_record
  - public_interface_versioning
  - deprecation_packet_template
  - repo_hygiene_scaffold

control_class_to_artifact_kind_class:
  signoff_dco: developer_certificate_contract
  license_metadata: spdx_license_metadata_policy
  third_party_import_record: third_party_import_register
  public_interface_versioning: public_interface_versioning_policy
  deprecation_packet_template: deprecation_packet_template
  repo_hygiene_scaffold: repo_hygiene_scaffolding

control_class_to_enforcement_class:
  signoff_dco: ci_required
  license_metadata: repo_hygiene_required
  third_party_import_record: repo_hygiene_required
  public_interface_versioning: release_review_required
  deprecation_packet_template: contributor_documentation
  repo_hygiene_scaffold: contributor_documentation

rows:
  # 1. Sign-off / Developer Certificate of Origin.
  - record_kind: m1_contribution_governance_seed_row
    contribution_governance_seed_row_schema_version: 1
    control_id: signoff.contribution_certificate_baseline
    control_class: signoff_dco
    title: M1 Developer Certificate of Origin sign-off baseline
    description: >
      Sign-off / Developer Certificate of Origin (DCO) baseline that
      gates every merged commit on protected branches. The canonical
      contract is the DCO section of CONTRIBUTING.md; CI enforces a
      Signed-off-by trailer on every commit. This row is NOT the
      copyright assignment, NOT the per-file license metadata
      contract, and NOT a CLA portal.
    owner_dri: "@ahmeddyounis"
    artifact_kind_class: developer_certificate_contract
    enforcement_class: ci_required
    lifecycle_state_class: seeded
    canonical_artifact_ref: CONTRIBUTING.md
    canonical_artifact_marker: "Developer Certificate of Origin (DCO)"
    supporting_artifact_refs:
      - docs/governance/contribution_and_signoff.md
      - docs/governance/dri_map.md
    named_runtime_consumer:
      consumer_ref: docs/governance/contribution_and_signoff.md
      consumer_class: review_docs_landing_page
      consumed_fields:
        - contribution_governance_seed_row.control_id
        - contribution_governance_seed_row.canonical_artifact_ref
        - contribution_governance_seed_row.enforcement_class
        - contribution_governance_seed_row.lifecycle_state_class
    example_payload_ref: fixtures/governance/m1_contribution_governance_examples/signoff_dco.json
    failure_drill:
      drill_id: signoff_drill.enforcement_class_relaxed_to_contributor_documentation
      description: >
        Forces enforcement_class to contributor_documentation while
        the closed map keyed by control_class still requires
        ci_required for signoff_dco. The lane MUST fail with
        contribution_governance.enforcement_class_disagrees_with_control_class.
      forced_input:
        rewrite_enforcement_class: contributor_documentation
      expected_check_id: contribution_governance.enforcement_class_disagrees_with_control_class
      actionable_next_action: >
        Restore enforcement_class to ci_required (the value the closed
        control_class_to_enforcement_class map requires), or land a new
        decision row in artifacts/governance/decision_register.yaml
        before changing it.

  # 2. Per-file license metadata (SPDX / REUSE).
  - record_kind: m1_contribution_governance_seed_row
    contribution_governance_seed_row_schema_version: 1
    control_id: license.spdx_per_file_baseline
    control_class: license_metadata
    title: M1 per-file SPDX/REUSE license metadata baseline
    description: >
      Per-file license metadata baseline that requires every
      maintained source file to declare its licensing in a
      machine-readable way using SPDX identifiers, following the REUSE
      Specification. The canonical contract is the per-file licensing
      hygiene section of CONTRIBUTING.md. This row is NOT the
      workspace-level license declaration (that lives in Cargo.toml's
      workspace license field) and NOT the third-party import
      register.
    owner_dri: "@ahmeddyounis"
    artifact_kind_class: spdx_license_metadata_policy
    enforcement_class: repo_hygiene_required
    lifecycle_state_class: seeded
    canonical_artifact_ref: CONTRIBUTING.md
    canonical_artifact_marker: "SPDX-License-Identifier"
    supporting_artifact_refs:
      - Cargo.toml
      - docs/governance/contribution_and_signoff.md
    named_runtime_consumer:
      consumer_ref: docs/governance/contribution_and_signoff.md
      consumer_class: review_docs_landing_page
      consumed_fields:
        - contribution_governance_seed_row.control_id
        - contribution_governance_seed_row.canonical_artifact_ref
        - contribution_governance_seed_row.artifact_kind_class
        - contribution_governance_seed_row.enforcement_class
    example_payload_ref: fixtures/governance/m1_contribution_governance_examples/license_metadata.json
    failure_drill:
      drill_id: license_drill.artifact_kind_class_drifted_to_third_party_import_register
      description: >
        Forces artifact_kind_class to third_party_import_register
        while the closed map keyed by control_class still requires
        spdx_license_metadata_policy for license_metadata. The lane
        MUST fail with
        contribution_governance.artifact_kind_class_disagrees_with_control_class.
      forced_input:
        rewrite_artifact_kind_class: third_party_import_register
      expected_check_id: contribution_governance.artifact_kind_class_disagrees_with_control_class
      actionable_next_action: >
        Restore artifact_kind_class to spdx_license_metadata_policy
        (the value the closed control_class_to_artifact_kind_class map
        requires), or land a new decision row before changing it.

  # 3. Third-party import record.
  - record_kind: m1_contribution_governance_seed_row
    contribution_governance_seed_row_schema_version: 1
    control_id: import_record.third_party_import_register_baseline
    control_class: third_party_import_record
    title: M1 third-party import-record baseline
    description: >
      Third-party import-record baseline that names the canonical
      import-record format every release evidence pack, attribution
      notice, SBOM tool, or compliance surface reuses when it claims
      an imported, bundled, or mirrored third-party byte exists. The
      canonical artifact is the M1 import-record seed at
      artifacts/governance/import_record_seed.yaml. This row is NOT
      the broader third-party admission policy (that lives in
      docs/governance/dependency_review_policy.md) and NOT the
      dependency register (that lives in
      artifacts/governance/dependency_register.yaml).
    owner_dri: "@ahmeddyounis"
    artifact_kind_class: third_party_import_register
    enforcement_class: repo_hygiene_required
    lifecycle_state_class: seeded
    canonical_artifact_ref: artifacts/governance/import_record_seed.yaml
    canonical_artifact_marker: "matrix_id: m1_import_record_seed"
    supporting_artifact_refs:
      - artifacts/governance/third_party_import_register.yaml
      - docs/governance/dependency_review_policy.md
      - docs/governance/contribution_and_signoff.md
    named_runtime_consumer:
      consumer_ref: artifacts/governance/import_record_seed.yaml
      consumer_class: machine_readable_register
      consumed_fields:
        - contribution_governance_seed_row.control_id
        - contribution_governance_seed_row.canonical_artifact_ref
        - contribution_governance_seed_row.supporting_artifact_refs
    example_payload_ref: fixtures/governance/m1_contribution_governance_examples/third_party_import_record.json
    failure_drill:
      drill_id: import_record_drill.canonical_artifact_marker_cleared
      description: >
        Clears canonical_artifact_marker so the lane cannot prove the
        seed actually points at the import-record register. The lane
        MUST fail with
        contribution_governance.canonical_artifact_marker_missing.
      forced_input:
        clear_canonical_artifact_marker: true
      expected_check_id: contribution_governance.canonical_artifact_marker_missing
      actionable_next_action: >
        Restore canonical_artifact_marker to a literal substring that
        appears in the canonical artifact; the marker exists so the
        seed cannot quietly point at the wrong document.

  # 4. Public-interface versioning policy.
  - record_kind: m1_contribution_governance_seed_row
    contribution_governance_seed_row_schema_version: 1
    control_id: versioning.public_interface_policy_baseline
    control_class: public_interface_versioning
    title: M1 public-interface versioning and deprecation policy baseline
    description: >
      Public-interface versioning and deprecation policy baseline. The
      canonical artifact is docs/governance/public_interface_versioning_policy.md.
      The policy names the versioned surfaces (schemas, manifests,
      saved artifacts, CLI surfaces, RPC envelopes, command IDs,
      public Rust API in SDK crates), the pre-stable operating rules,
      and the stabilisation prerequisites. This row is NOT the
      interface-freeze matrix (that lives in
      artifacts/governance/interface_freeze_matrix.yaml) and NOT the
      compatibility-surface inventory.
    owner_dri: "@ahmeddyounis"
    artifact_kind_class: public_interface_versioning_policy
    enforcement_class: release_review_required
    lifecycle_state_class: seeded
    canonical_artifact_ref: docs/governance/public_interface_versioning_policy.md
    canonical_artifact_marker: "Public-interface versioning and deprecation policy"
    supporting_artifact_refs:
      - docs/governance/contribution_and_signoff.md
      - docs/governance/deprecation_packet_template.md
      - artifacts/governance/interface_freeze_matrix.yaml
    named_runtime_consumer:
      consumer_ref: docs/governance/contribution_and_signoff.md
      consumer_class: review_docs_landing_page
      consumed_fields:
        - contribution_governance_seed_row.control_id
        - contribution_governance_seed_row.canonical_artifact_ref
        - contribution_governance_seed_row.enforcement_class
    example_payload_ref: fixtures/governance/m1_contribution_governance_examples/public_interface_versioning.json
    failure_drill:
      drill_id: versioning_drill.lifecycle_state_class_drifted_to_unknown
      description: >
        Drifts lifecycle_state_class to an unknown value
        (deprecated_unknown) so the row cannot resolve against the
        closed lifecycle_state_class vocabulary. The lane MUST fail
        with contribution_governance.row.lifecycle_state_class_unknown.
      forced_input:
        rewrite_lifecycle_state_class: deprecated_unknown
      expected_check_id: contribution_governance.row.lifecycle_state_class_unknown
      actionable_next_action: >
        Restore lifecycle_state_class to seeded/stabilising/stable.
        The M1 seed deliberately excludes deprecated/retired so a row
        is never silently retired without a superseding row.

  # 5. Deprecation packet template.
  - record_kind: m1_contribution_governance_seed_row
    contribution_governance_seed_row_schema_version: 1
    control_id: deprecation.packet_template_baseline
    control_class: deprecation_packet_template
    title: M1 deprecation-packet template baseline
    description: >
      Canonical deprecation-packet template that future schema,
      command, lifecycle, or interface changes reuse instead of
      inventing ad hoc release notes. The canonical artifact is
      docs/governance/deprecation_packet_template.md. The template
      lives inside the public-interface versioning policy and names
      the required sections (summary, affected surface, deprecation
      window, downgrade action, replacement, consumer notice, failure
      drill). This row is NOT the release-notice seed (that lives in
      artifacts/governance/release_notice_seed.yaml) and NOT the
      waiver template.
    owner_dri: "@ahmeddyounis"
    artifact_kind_class: deprecation_packet_template
    enforcement_class: contributor_documentation
    lifecycle_state_class: seeded
    canonical_artifact_ref: docs/governance/deprecation_packet_template.md
    canonical_artifact_marker: "Deprecation packet template"
    supporting_artifact_refs:
      - docs/governance/public_interface_versioning_policy.md
      - docs/governance/contribution_and_signoff.md
    named_runtime_consumer:
      consumer_ref: docs/governance/contribution_and_signoff.md
      consumer_class: review_docs_landing_page
      consumed_fields:
        - contribution_governance_seed_row.control_id
        - contribution_governance_seed_row.canonical_artifact_ref
        - contribution_governance_seed_row.artifact_kind_class
    example_payload_ref: fixtures/governance/m1_contribution_governance_examples/deprecation_packet_template.json
    failure_drill:
      drill_id: deprecation_drill.example_payload_pinned_canonical_artifact_ref_drifted
      description: >
        Drifts the example payload's pinned_canonical_artifact_ref so
        the registry pin and the example disagree. The lane MUST fail
        with
        contribution_governance.example_payload_pinned_canonical_artifact_ref_mismatch.
      forced_input:
        rewrite_example_pinned_canonical_artifact_ref: docs/governance/contribution_and_signoff.md
      expected_check_id: contribution_governance.example_payload_pinned_canonical_artifact_ref_mismatch
      actionable_next_action: >
        Restore the example payload's pinned_canonical_artifact_ref to
        the row's canonical_artifact_ref, or update the row and the
        example together before relanding.

  # 6. Repo-hygiene scaffolding.
  - record_kind: m1_contribution_governance_seed_row
    contribution_governance_seed_row_schema_version: 1
    control_id: repo_hygiene.scaffolding_baseline
    control_class: repo_hygiene_scaffold
    title: M1 repo-hygiene scaffolding baseline
    description: >
      Repo-hygiene scaffolding baseline that names the canonical homes
      for contributor-facing governance files, templates, and the
      canonical locations protected M1 artifacts use. The canonical
      artifact is docs/governance/repo_hygiene_scaffolding.md. The
      scaffold cross-references CONTRIBUTING.md, AGENTS.md,
      SECURITY.md, CODEOWNERS, the DRI map, the decision workflow,
      and the deprecation packet template. This row is NOT the
      package inventory (that lives in
      artifacts/governance/package_inventory.yaml) and NOT the
      ownership matrix.
    owner_dri: "@ahmeddyounis"
    artifact_kind_class: repo_hygiene_scaffolding
    enforcement_class: contributor_documentation
    lifecycle_state_class: seeded
    canonical_artifact_ref: docs/governance/repo_hygiene_scaffolding.md
    canonical_artifact_marker: "Repo-hygiene scaffolding for contributor-facing governance"
    supporting_artifact_refs:
      - CONTRIBUTING.md
      - AGENTS.md
      - SECURITY.md
      - CODEOWNERS
      - docs/governance/contribution_and_signoff.md
    named_runtime_consumer:
      consumer_ref: docs/governance/contribution_and_signoff.md
      consumer_class: review_docs_landing_page
      consumed_fields:
        - contribution_governance_seed_row.control_id
        - contribution_governance_seed_row.canonical_artifact_ref
        - contribution_governance_seed_row.supporting_artifact_refs
        - contribution_governance_seed_row.named_runtime_consumer
    example_payload_ref: fixtures/governance/m1_contribution_governance_examples/repo_hygiene_scaffold.json
    failure_drill:
      drill_id: repo_hygiene_drill.named_runtime_consumer_consumed_fields_cleared
      description: >
        Clears named_runtime_consumer.consumed_fields so the row no
        longer claims any consumed field. The lane MUST fail with
        contribution_governance.named_runtime_consumer_consumed_fields_empty.
      forced_input:
        clear_named_runtime_consumer_consumed_fields: true
      expected_check_id: contribution_governance.named_runtime_consumer_consumed_fields_empty
      actionable_next_action: >
        Restore named_runtime_consumer.consumed_fields to at least one
        non-empty field so the row's runtime consumer can prove it
        actually reads the row.
