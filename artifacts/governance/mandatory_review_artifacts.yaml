# Mandatory review-artifact catalog.
#
# Machine-readable companion to docs/governance/normative_requirement_policy.md.
# Reviewers and automation use this file to decide which artifact class is
# mandatory for a change and which minimum contents make that artifact
# reviewable.

schema_version: 1
catalog_id: aureline.mandatory_review_artifacts
status: seeded

policy_doc_ref: docs/governance/normative_requirement_policy.md
requirement_lifecycle_catalog_ref: artifacts/governance/requirement_lifecycle_states.yaml
verification_class_catalog_ref: artifacts/governance/verification_classes.yaml
forum_matrix_ref: artifacts/governance/forum_matrix.yaml
governance_packet_template_ref: artifacts/governance/governance_packet_template.yaml
verification_packet_template_ref: docs/governance/verification_packet_template.md
waiver_template_ref: docs/governance/templates/waiver_template.md

source_specs:
  - .t2/docs/Aureline_Milestones_Document.md
  - .t2/docs/Aureline_Technical_Design_Document.md
  - .t2/docs/Aureline_Technical_Architecture_Document.md
  - .t2/docs/Aureline_PRD.md

artifact_evaluation_contract:
  mandatory_means: >
    The change, row, waiver, or release decision is not reviewable until
    the required artifact exists and carries the minimum contents listed
    for the artifact class.
  missing_artifact_effect: >
    Missing mandatory artifacts block merge, milestone close, release
    readiness, or claim publication according to the affected requirement
    family and lifecycle state.
  citation_rule: >
    Review artifacts cite canonical requirement ids, verification class
    ids, affected lane ids, waiver ids, evidence ids, and decision rows.
    Meeting notes, PR comments, or screenshots may support an artifact,
    but they do not replace the artifact.
  freshness_rule: >
    An artifact outside its freshness window, invalidated by a rerun
    trigger, or contradicted by a later accepted decision is treated as
    stale for release-bearing use until refreshed or re-approved.
  fail_closed_rule: >
    Missing required contents, missing owner/signoff, expired waiver
    coverage, or unresolved verification-class ids make the artifact not
    reviewable for promotion-grade decisions.

artifact_outcome_vocabulary:
  - outcome_id: accepted
    release_effect: May satisfy the mandatory artifact requirement for its cited scope while fresh.
  - outcome_id: missing
    release_effect: Blocks or narrows the affected change, claim, milestone, or release gate.
  - outcome_id: stale
    release_effect: >
      Downgrades verified posture to implemented or re-approval pending,
      according to the lifecycle catalog and evidence freshness policy.
  - outcome_id: waived
    release_effect: >
      Allows only the cited exception scope before expiry; it is not proof
      for the underlying verification class.
  - outcome_id: rejected
    release_effect: Blocks the affected change until revised or explicitly descoped.

artifact_classes:
  - artifact_class_id: adr
    label: Architecture decision record
    canonical_locations:
      - docs/adr/
    mandatory_when:
      - architecture invariant changes
      - protected-lane contract changes
      - storage or schema changes
      - runtime boundary changes
      - trust-model or permission-boundary changes
      - durable dependency or process-placement decisions
    minimum_contents:
      - title
      - status
      - owner
      - date
      - related requirement ids
      - context
      - decision
      - alternatives considered
      - consequences and trade-offs
      - compatibility or migration impact
      - rollback or reversibility plan
      - verification impact
      - security, privacy, and accessibility impact when applicable
    required_forum_refs:
      - architecture_council
    verification_class_refs:
      - CONF
      - SECREV
      - DOCVAL
    missing_or_stale_effect: >
      The protected-lane or boundary change is not ready to merge. If
      already landed, the affected requirement returns to approved or
      in_progress review until the ADR is accepted or the scope narrows.

  - artifact_class_id: rfc
    label: Request for comments
    canonical_locations:
      - docs/rfc/
    mandatory_when:
      - broad subsystem change spanning multiple teams or packages
      - proposed public interface family before durable acceptance
      - long-lived migration, compatibility, or ecosystem cutline
      - major architecture exploration that is not obvious enough for a direct ADR
    minimum_contents:
      - proposal
      - related requirement ids
      - affected interfaces and packages
      - milestones or rollout plan
      - compatibility impact
      - owner map
      - alternatives
      - open questions
      - closure path to ADR or explicit rejection
    required_forum_refs:
      - architecture_council
      - compatibility_ecosystem_review
      - product_scope_review
    verification_class_refs:
      - CONF
      - DOCVAL
    missing_or_stale_effect: >
      The broad change cannot claim accepted architecture posture. Work
      may remain exploratory until the RFC closes or converts into an ADR.

  - artifact_class_id: design_packet
    label: Design packet
    canonical_locations:
      - docs/ux/
      - artifacts/ux/
      - docs/accessibility/
      - artifacts/accessibility/
    mandatory_when:
      - launch-critical UX surface changes
      - state-model or degraded-mode changes visible to users
      - keyboard, focus, screen-reader, IME, locale, contrast, or motion-sensitive behavior changes
      - workflow changes needing visual or interaction evidence
      - design-system token or component contract changes
    minimum_contents:
      - flows
      - states
      - degraded paths
      - empty, loading, error, disabled, and stale states when applicable
      - keyboard and accessibility notes
      - requirement mapping
      - affected surfaces and lanes
      - design evidence refs or annotated captures
      - open risks and follow-ups
      - owner and reviewer signoff
    required_forum_refs:
      - accessibility_review
      - product_scope_review
    verification_class_refs:
      - UXVAL
      - A11YTEST
    missing_or_stale_effect: >
      The UX row cannot be treated as verified. Public or release-bearing
      claims narrow until the design packet and associated verification
      evidence are current.

  - artifact_class_id: verification_packet
    label: Verification packet
    canonical_locations:
      - docs/governance/verification_packet_template.md
      - artifacts/milestones/
      - artifacts/release/
    mandatory_when:
      - milestone exit
      - release candidate review
      - major graduation from prototype, preview, beta, or stable-facing status
      - implemented requirement seeking verified state
      - claim-bearing row needs accepted proof
      - stale proof is refreshed after a rerun trigger
    minimum_contents:
      - packet id
      - subsystem, feature, release gate, or scope
      - covered requirement ids
      - verification classes used
      - build, commit, artifact, or source revision refs
      - environment or deployment matrix
      - evidence locations
      - pass or fail summary
      - known gaps and waivers
      - freshness metadata
      - reviewer or forum signoff
      - refresh trigger and next refresh window
    required_forum_refs:
      - product_scope_review
      - release_council
    verification_class_refs:
      - BENCH
      - CONF
      - RELTEST
      - SECREV
      - A11YTEST
      - UXVAL
      - OPSVAL
      - DOCVAL
    missing_or_stale_effect: >
      A requirement may not enter or remain in verified release posture.
      Release-blocking rows block unless actively waived.

  - artifact_class_id: compatibility_report
    label: Compatibility report
    canonical_locations:
      - artifacts/compat/
      - docs/state/
      - docs/release/
    mandatory_when:
      - public interface change
      - SDK, CLI, schema, file-format, protocol, importer, or bridge change
      - support-class or reference-workspace claim
      - retained support-window or deprecation decision
      - release notes make compatibility or migration claims
    minimum_contents:
      - affected interfaces or surface ids
      - diff summary
      - compatibility matrix or target set
      - deprecation posture
      - migration guidance
      - retained support window
      - known limits
      - requirement ids
      - verification classes and evidence refs
      - active waivers and expiry
      - docs or support truth updates
    required_forum_refs:
      - compatibility_ecosystem_review
      - release_council
    verification_class_refs:
      - CONF
      - DOCVAL
      - OPSVAL
    missing_or_stale_effect: >
      Compatibility, support, migration, SDK, and public interface claims
      narrow to retest pending, evidence stale, or unsupported until the
      report is current.

  - artifact_class_id: benchmark_report
    label: Benchmark report
    canonical_locations:
      - docs/benchmarks/
      - artifacts/bench/
      - artifacts/perf/
    mandatory_when:
      - performance-sensitive feature changes
      - protected metric or fitness-function gate
      - startup, typing, search, indexing, memory, energy, battery, thermal, or throughput claim
      - performance regression exceeds the protected threshold
      - release gate depends on a performance budget
      - public comparison or performance claim
    minimum_contents:
      - benchmark packet id
      - corpus or fixture ref
      - hardware, host, and power profile
      - exact command, harness, and build identity
      - protected threshold or budget ref
      - baseline and current results
      - regression summary
      - confounders and exclusions
      - approved waivers and expiry
      - freshness metadata and rerun triggers
      - owner and reviewer signoff
    required_forum_refs:
      - performance_council
      - release_council
    verification_class_refs:
      - BENCH
    missing_or_stale_effect: >
      Protected performance claims cannot be verified. Release-bearing
      regressions block unless an active waiver covers the exact metric,
      scope, and release window.

  - artifact_class_id: waiver_packet
    label: Waiver packet
    canonical_locations:
      - docs/governance/templates/waiver_template.md
      - artifacts/governance/ownership_matrix.yaml
      - artifacts/release/
    mandatory_when:
      - requirement, protected behavior, release blocker, owner requirement, or evidence gap is intentionally bypassed
      - benchmark regression is accepted temporarily
      - security, reliability, performance, accessibility, or architecture-invariant control cannot be met on time
      - waiver renewal or repeated waiver review is requested
    minimum_contents:
      - waiver id
      - cited requirement ids
      - exact scope
      - reason and justification
      - risk classification
      - mitigation
      - owner
      - evidence owner when evidence refresh is part of closure
      - approvers or forum
      - expiry date
      - planned exit
      - escalation path
      - public disclosure posture when user-facing or enterprise-relevant
    required_forum_refs:
      - architecture_council
      - performance_council
      - security_trust_review
      - accessibility_review
      - release_council
      - shiproom_executive_scope_review
    verification_class_refs:
      - DOCVAL
      - OPSVAL
    missing_or_stale_effect: >
      The exception is invalid for release-readiness. The underlying
      requirement remains blocked or narrowed until fresh proof lands or
      an authorized active waiver is recorded.

mandatory_pairings:
  - condition_id: security_or_trust_boundary_change
    required_artifact_class_ids:
      - adr
      - verification_packet
    waiver_artifact_required_if_not_met: waiver_packet
  - condition_id: launch_critical_ux_surface_change
    required_artifact_class_ids:
      - design_packet
      - verification_packet
  - condition_id: public_interface_or_sdk_change
    required_artifact_class_ids:
      - compatibility_report
      - verification_packet
  - condition_id: architecture_invariant_or_protected_boundary_change
    required_artifact_class_ids:
      - adr
      - verification_packet
    waiver_artifact_required_if_not_met: waiver_packet
  - condition_id: stale_verified_release_blocker
    required_artifact_class_ids:
      - verification_packet
    waiver_artifact_required_if_not_met: waiver_packet
  - condition_id: protected_performance_gate
    required_artifact_class_ids:
      - benchmark_report
      - verification_packet
    waiver_artifact_required_if_not_met: waiver_packet
  - condition_id: milestone_or_release_close
    required_artifact_class_ids:
      - verification_packet
    conditional_artifact_class_ids:
      - compatibility_report
      - benchmark_report
      - waiver_packet
  - condition_id: repeated_or_long_lived_waiver
    required_artifact_class_ids:
      - waiver_packet
    required_outcome:
      - close_with_fresh_proof
      - narrow_claim
      - rebaseline_scope
      - open_explicit_correction_work

waiver_escalation_thresholds:
  heightened_requirement_families:
    - SEC
    - REL
    - PERF
    - A11Y
    - ARCH
  long_lived_after: P90D
  crosses_release_train_threshold: 1
  repeated_waiver_count_threshold: 2
  escalation_forum_refs:
    - release_council
    - shiproom_executive_scope_review
  release_effects:
    - expired waiver blocks release readiness
    - out-of-scope waiver is ignored
    - repeated waiver requires correction review
    - renewed waiver needs refreshed risk, mitigation, owner, expiry, and planned exit
