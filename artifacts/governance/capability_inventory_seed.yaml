  # M1 surface seed rows. Each row carries the spec-required fields
  # (owner, customer-visible label, kill-switch path, rollout state,
  # and retirement/deprecation metadata) and a named failure drill.
  # ------------------------------------------------------------------

  - record_kind: capability_inventory_entry_record
    capability_inventory_entry_schema_version: 1
    capability_id: shell.frame
    capability_kind: workspace_capability
    surface_families:
      - help_or_about
      - docs_page
      - cli_help
      - support_export_row
    lifecycle_state: stable
    owner_dri: "@ahmeddyounis"
    owning_lane: aureline-shell
    claim_lanes:
      - docs_public_truth
      - support_export
      - release_evidence
    dependency_marker_refs: []
    rollout_gate: null
    public_label: Shell frame
    public_label_policy: public_label_required
    public_claim_posture: claimable
    export_visibility: public_exportable
    kill_switch_path: null
    retirement_metadata: null
    m1_surface_seed_membership: true
    failure_drill:
      drill_id: capability_inventory_drill.shell_frame_lifecycle_state_dropped
      forced_input:
        clear_lifecycle_state: true
      expected_check_id: capability_inventory.lifecycle_state_required
      actionable_next_action: >-
        Restore the row's lifecycle_state from the canonical
        Labs / Preview / Beta / Stable / Deprecated vocabulary; the seed
        cannot leave a claimed surface without a lifecycle posture.

