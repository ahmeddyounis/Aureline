      - docs_page
      - compatibility_report
    lifecycle_state: labs
    owner_dri: "@ahmeddyounis"
    owning_lane: aureline-rpc
    claim_lanes: []
    dependency_marker_refs:
      - cap:lifecycle:marker:sdk_extension_desktop_excluded
    rollout_gate:
      gate_kind: experiment
      gate_ref: sdk.surface.opt_in
      public_disclosure_required: true
      notes: SDK surface is reserved; desktop/CLI projections must tombstone it.
    public_label: null
    public_label_policy: public_label_forbidden
    public_claim_posture: forbidden
    export_visibility: internal_redacted

  - record_kind: capability_inventory_entry_record
    capability_inventory_entry_schema_version: 1
    capability_id: command.publish_release
    capability_kind: command
    surface_families:
      - command_palette_entry
      - install_review_step
      - cli_help
    lifecycle_state: stable
    owner_dri: "@ahmeddyounis"
    owning_lane: shell_command_system
    claim_lanes: []
    dependency_marker_refs:
      - cap:lifecycle:marker:signing_attestation_preview
      - cap:lifecycle:marker:release_publisher_narrowed
    rollout_gate:
      gate_kind: feature_flag
      gate_ref: flag:signing_attestation.preview
      public_disclosure_required: true
      notes: Publish-release is a governed maintainer path; keep claims internal.
    public_label: null
    public_label_policy: public_label_forbidden
    public_claim_posture: forbidden
    export_visibility: internal_redacted
