# Capability inventory seed.
#
# Machine-readable register of capability inventory entries. The inventory
# exists so capability state is first-class across:
#   - in-product UI surfaces (settings rows, bundle cards, inspectors),
#   - docs/help/about projections,
#   - CLI/headless help,
#   - support/export artifacts,
#   - compatibility reports, and
#   - release packets / release notes.
#
# Reviewer-facing landing page:
#   docs/governance/capability_lifecycle_seed.md
#
# Companion narrative contract:
#   docs/governance/capability_inventory_contract.md
#
# Row schema:
#   schemas/governance/capability_inventory_entry.schema.json
#
# Envelope schema:
#   schemas/governance/capability_inventory.schema.json
#
# Conformance:
#   - Every entry conforms to the row schema.
#   - capability_id is unique. Adding a row is additive-minor; removing a
#     row is breaking. Narrow or retire using lifecycle_state and policy
#     fields; do not delete.
#   - Hidden/internal capabilities must not leak into public claims. Any
#     row with public_claim_posture = forbidden must have claim_lanes = []
#     and export_visibility = internal_redacted.
#   - Rows whose lifecycle_state is in {deprecated, disabled_by_policy,
#     retired} MUST carry a non-null retirement_metadata block with a
#     reviewable retirement_target_window_note.
#   - Rows that mark m1_surface_seed_membership = true MUST carry a
#     non-null failure_drill block whose drill_id is listed in
#     failure_drill_id_vocabulary.
#   - Milestone slugs and task ids MUST NOT appear in any id, path, label,
#     or note field. Describe what the capability is, not which planning
#     item it came from.

schema_version: 1
status: seeded
as_of: "2026-05-11"

matrix_id: m1_capability_inventory_seed
owner_dri: "@ahmeddyounis"

overview_page: docs/governance/capability_lifecycle_seed.md
contract_doc_ref: docs/governance/capability_inventory_contract.md
entry_schema_ref: schemas/governance/capability_inventory_entry.schema.json
capability_lifecycle_schema_ref: schemas/governance/capability_lifecycle.schema.json
capability_projection_matrix_ref: docs/governance/capability_lifecycle_projection_matrix.md
claim_manifest_contract_ref: docs/governance/claim_manifest_contract.md
claim_propagation_rules_ref: artifacts/governance/claim_propagation_rules.yaml
ownership_matrix_ref: artifacts/governance/ownership_matrix.yaml
experiments_register_ref: artifacts/governance/experiments_register.yaml
boundary_manifest_ref: docs/product/boundary_manifest_strawman.md

build_identity_ref: artifacts/build/build_identity.json
validation_lane_ref: artifacts/qe/test_lane_registry.yaml#fixture_repo_integration

vocabulary:
  lifecycle_states:
    - labs
    - preview
    - beta
    - stable
    - lts_facing
    - deprecated
    - disabled_by_policy
    - retired
  surface_families:
    - settings_row
    - bundle_card
    - command_palette_entry
    - install_review_step
    - docs_page
    - help_or_about
    - diagnostics_panel
    - support_export_row
    - policy_explainer_row
    - cli_help
    - compatibility_report
    - release_packet
    - release_notes
  rollout_gate_kinds:
    - feature_flag
    - experiment
    - rollout
    - manual_gate
  public_label_policy_values:
    - public_label_required
    - public_label_optional
    - public_label_forbidden
  public_claim_posture_values:
    - claimable
    - visible_but_nonclaimable
    - forbidden
  export_visibility_values:
    - public_exportable
    - support_export_only
    - internal_redacted

lifecycle_state_vocabulary:
  - labs
  - preview
  - beta
  - stable
  - lts_facing
  - deprecated
  - disabled_by_policy
  - retired

required_lifecycle_state_coverage:
  - labs
  - preview
  - beta
  - stable
  - deprecated

required_m1_surface_coverage:
  - shell.frame
  - shell.start_center
  - workspace.entry
  - editor.basics
  - command.quick_open
  - search.shell_search
  - terminal.embedded_seed
  - support.export_seed
  - help.about_pane

failure_drill_id_vocabulary:
  - capability_inventory_drill.shell_frame_lifecycle_state_dropped
  - capability_inventory_drill.start_center_kill_switch_path_dropped
  - capability_inventory_drill.workspace_entry_owner_dri_dropped
  - capability_inventory_drill.editor_basics_public_label_dropped
  - capability_inventory_drill.quick_open_rollout_gate_disclosure_dropped
  - capability_inventory_drill.search_shell_lifecycle_state_drifted_to_unknown_token
  - capability_inventory_drill.terminal_seed_widened_to_retired_without_window_note
  - capability_inventory_drill.support_export_export_visibility_widened_to_public
  - capability_inventory_drill.help_about_lifecycle_state_dropped

named_runtime_consumers:
  - consumer_id: capability_lifecycle_seed_landing_page
    consumer_class: review_docs_landing_page
    consumer_ref: docs/governance/capability_lifecycle_seed.md
    consumed_fields:
      - capability_id
      - lifecycle_state
      - public_label
      - kill_switch_path
      - retirement_metadata
    notes: >-
      Reviewer-facing landing page that quotes the seeded M1 surfaces
      verbatim so docs / help / release copy reads the same lifecycle
      vocabulary as the inventory.
  - consumer_id: capability_inventory_contract_doc
    consumer_class: docs_or_help_surface
    consumer_ref: docs/governance/capability_inventory_contract.md
    consumed_fields:
      - capability_id
      - lifecycle_state
      - public_label_policy
      - public_claim_posture
      - export_visibility
    notes: >-
      Narrative contract that names the inventory as the canonical
      register for capability lifecycle and public-claim posture.
  - consumer_id: capability_inventory_ci_validator
    consumer_class: ci_schema_validator
    consumer_ref: tools/ci/validate_contract_artifacts.py
    consumed_fields:
      - capability_id
      - surface_families
      - dependency_marker_refs
      - rollout_gate
      - public_label_policy
      - public_claim_posture
      - export_visibility
    notes: >-
      Live CI consumer that already reads the inventory and fails closed
      on missing capability_ids, public-label/claim posture mismatches,
      and projection coverage gaps.

entries:
