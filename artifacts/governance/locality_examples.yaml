# Locality / tenancy / key-mode vocabulary seed (M1 governance).
#
# Machine-readable register of typed locality/tenancy/key-mode profile
# rows. The seed exists so locality (local-only, remote-target,
# provider-linked, managed/control-plane-bearing, mirrored, unknown),
# tenancy scope, key/storage mode, local-safe fallback posture, and
# data-residency disclosure are first-class on every protected M1
# surface and on every prototype surface that bears a managed or
# control-plane claim. The vocabulary is canonical for managed and
# control-plane-bearing truth labels across:
#   - the shell Help/About pane,
#   - the service-health row,
#   - the support-bundle exporter,
#   - the release-evidence pack,
#   - the docs/help truth rows, and
#   - the runtime / CI validation lane.
#
# Reviewer-facing landing page:
#   docs/governance/m1_locality_tenancy_keymode_vocabulary.md
#
# Upstream internal boundary manifest the seed projects against:
#   artifacts/governance/m1_open_local_capability_matrix.yaml
#
# Row schema:
#   schemas/governance/locality_tenancy_keymode.schema.json
#
# Envelope schema:
#   schemas/governance/m1_locality_tenancy_keymode_seed.schema.json
#
# Conformance:
#   - Every entry conforms to the row schema.
#   - locality_tenancy_keymode_profile_id is unique. Adding a row is
#     additive-minor. Removing a row is breaking; narrow by editing
#     the row, not by deletion.
#   - Every row MUST declare exactly one locality_class, tenancy_scope_class,
#     key_storage_mode_class, local_safe_fallback_class, and
#     data_residency_disclosure_class drawn from the closed vocabularies
#     in this file.
#   - local_only rows MUST publish tenancy_scope_class in
#     {not_applicable_local_only, single_user_local}, key_storage_mode_class
#     in {not_applicable_local_only, local_storage_only, os_keychain_backed},
#     data_residency_disclosure_class = residency_local_device_only, and
#     local_safe_fallback_class = local_safe_fallback_present (row-schema
#     invariant).
#   - managed_control_plane_bearing rows MUST publish tenancy_scope_class
#     in {single_user_managed_tenant, org_tenant, multi_tenant_isolated,
#     multi_tenant_shared, unknown_tenancy}, key_storage_mode_class in
#     {byok_user_managed, provider_managed_key, managed_service_kms,
#     unknown_key_mode}, data_residency_disclosure_class in
#     {residency_managed_tenant_documented_region, residency_provider_default,
#     residency_unknown}, and MUST disclose a local_safe_fallback_class
#     verbatim (row-schema invariant).
#   - unknown_locality rows MUST publish unknown_tenancy + unknown_key_mode
#     + residency_unknown so the seed cannot silently certify what it does
#     not know (row-schema invariant).
#   - provider_linked rows MUST NOT publish not_applicable_local_only on
#     tenancy_scope_class or key_storage_mode_class (row-schema invariant).
#   - Milestone slugs and task ids MUST NOT appear in any id, ref, label,
#     or note field. Describe what the profile is, not which planning item
#     it came from.

schema_version: 1
status: seeded
as_of: "2026-05-11"

matrix_id: m1_locality_tenancy_keymode_seed
owner_dri: "@ahmeddyounis"

overview_page: docs/governance/m1_locality_tenancy_keymode_vocabulary.md
upstream_boundary_manifest_ref: artifacts/governance/m1_open_local_capability_matrix.yaml
upstream_connected_provider_seed_ref: docs/providers/m1_connected_provider_seed.md

row_schema_ref: schemas/governance/locality_tenancy_keymode.schema.json
build_identity_ref: artifacts/build/build_identity.json
validation_lane_ref: artifacts/qe/test_lane_registry.yaml#fixture_repo_integration

