  - consumer_id: m1_locality_tenancy_keymode_vocabulary_landing_page
    consumer_class: review_docs_landing_page
    consumer_ref: docs/governance/m1_locality_tenancy_keymode_vocabulary.md
    consumed_fields:
      - locality_tenancy_keymode_profile_id
      - locality_class
      - tenancy_scope_class
