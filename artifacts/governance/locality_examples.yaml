    notes: >-
      Reviewer-facing landing page that quotes the seeded rows verbatim
      so the shell Help/About pane, the service-health row, the
      support-bundle exporter, the release-evidence pack, and the
      runtime CI validation lane all read the same locality / tenancy /
      key-mode vocabulary without inventing a parallel glossary.
  - consumer_id: upstream_internal_boundary_manifest_matrix
    consumer_class: upstream_governance_matrix
    consumer_ref: artifacts/governance/m1_open_local_capability_matrix.yaml
    consumed_fields:
      - boundary_class
      - residual_dependencies
      - carries_truth_fields
    notes: >-
      Upstream internal boundary manifest the M1 locality/tenancy/key-mode
      seed projects against. The seed inherits the manifest's boundary
      classes (local_only / provider_linked / managed / mirrored /
      unsupported) and re-projects them into the more granular locality
      vocabulary; the runner asserts the matrix still resolves on disk so
      the seed cannot quietly outlive its upstream.
  - consumer_id: m1_locality_tenancy_keymode_seed_ci_validator
    consumer_class: ci_schema_validator
    consumer_ref: tests/governance/m1_locality_tenancy_keymode_seed_lane/run_m1_locality_tenancy_keymode_seed_lane.py
    consumed_fields:
      - locality_tenancy_keymode_profile_id
      - locality_class
      - tenancy_scope_class
      - key_storage_mode_class
      - local_safe_fallback_class
      - data_residency_disclosure_class
      - truth_badge_classes
      - diagnostic_surface_classes
      - failure_drill
    notes: >-
      Unattended CI/review validator that replays the seed, asserts
      closed-vocabulary agreement with the row schema, structural
      invariants (local_only locked to local sentinels; managed_control_plane
      locked to managed / unknown axes with explicit local_safe_fallback
      disclosure; unknown_locality forces unknown_tenancy + unknown_key_mode +
      residency_unknown; provider_linked forbids the local-only sentinels),
      required coverage (locality classes, tenancy classes, key-mode classes,
      diagnostic surfaces), named-consumer resolution, and reproduces every
      named failure drill loudly.

entries:
  # ------------------------------------------------------------------
  # Local-only floor row. The editor buffer / save surface is the
  # product's hero local-only surface. Locality = local_only forces
  # the local sentinels on tenancy, key mode, residency, and local-safe
  # fallback so a future managed-tenancy claim cannot land on this row
  # without an explicit decision.
  # ------------------------------------------------------------------
  - record_kind: locality_tenancy_keymode_row_record
    locality_tenancy_keymode_row_schema_version: 1
    locality_tenancy_keymode_profile_id: local_only.editor_buffer_save
    surface_family_class: editor
    locality_class: local_only
    tenancy_scope_class: not_applicable_local_only
    key_storage_mode_class: not_applicable_local_only
    local_safe_fallback_class: local_safe_fallback_present
    data_residency_disclosure_class: residency_local_device_only
    truth_badge_classes:
      - client_scope_badge
      - boundary_class_badge
    diagnostic_surface_classes:
      - help_about_pane
      - support_export_section
      - release_evidence_pack
      - ci_validation
    local_core_continuity: >-
      Editing, saving, undo, and navigation continue with no network,
      no sign-in, and no managed control-plane reachability. Authored
      files are never mutated by any recovery rung. This is the floor
      the product guarantees.
    absence_narrows_to: >-
      No narrowing required; the row is the local-only baseline that
      every other row narrows against.
    upstream_boundary_manifest_row_refs:
      - boundary_row:editor.buffer_and_save
    owner_dri: "@ahmeddyounis"
    failure_drill:
      drill_id: locality_tenancy_keymode_drill.local_only_relaxed_to_managed
      forced_input:
        rewrite_tenancy_scope_class: org_tenant
      expected_check_id: locality_tenancy_keymode.local_only_invariant_relaxed_to_managed
      actionable_next_action: >-
        Restore tenancy_scope_class to not_applicable_local_only on the
        editor row; the local-only floor MUST NOT be silently widened
        into a managed-tenancy claim. A row whose locality_class is
        local_only MUST keep tenancy_scope_class in
        {not_applicable_local_only, single_user_local}; widening tenancy
        alone would let a managed-tenancy badge ride the product's hero
        local-only surface without an explicit decision row.
    notes: >-
      Local-only floor. Every axis carries its local sentinel; the
      failure drill widens tenancy_scope_class to org_tenant to prove
      the seed cannot quietly relax the editor's local-only invariant
      into a managed-tenancy claim.

  # ------------------------------------------------------------------
  # Remote-target row. A user-attached SSH / container / WSL / dev VM
  # target. Locality = remote_target with single-user-local tenancy and
  # explicit residency disclosure that data may rest on the remote
  # target the user named themselves.
  # ------------------------------------------------------------------
  - record_kind: locality_tenancy_keymode_row_record
    locality_tenancy_keymode_row_schema_version: 1
    locality_tenancy_keymode_profile_id: remote_target.workspace_remote_agent_attach
    surface_family_class: workspace
    locality_class: remote_target
    tenancy_scope_class: single_user_local
    key_storage_mode_class: os_keychain_backed
    local_safe_fallback_class: local_safe_fallback_narrowed
    data_residency_disclosure_class: residency_user_owned_remote_target
    truth_badge_classes:
      - client_scope_badge
      - boundary_class_badge
      - residual_dependency_posture_badge
    diagnostic_surface_classes:
      - help_about_pane
      - service_health_row
      - support_export_section
      - ci_validation
    local_core_continuity: >-
      File open, save, watch, and all local Git operations on the
      local workspace continue offline. Remote-attach narrows the
      workspace to local-core editing on the local workspace when the
      remote target is unreachable; the seed never claims the remote
      target is enforceable from the local device.
    absence_narrows_to: >-
      Workspace VFS and local Git continue with no remote agent;
      remote-attached workspaces narrow to local-core editing.
      Air-gapped fails closed if an attach is attempted.
    upstream_boundary_manifest_row_refs:
      - boundary_row:workspace.vfs_and_local_git
    owner_dri: "@ahmeddyounis"
    failure_drill:
      drill_id: locality_tenancy_keymode_drill.remote_target_residency_widened_to_provider_default
      forced_input:
        rewrite_data_residency_disclosure_class: residency_provider_default
      expected_check_id: locality_tenancy_keymode.remote_target_residency_disclosure_widened
      actionable_next_action: >-
        Restore data_residency_disclosure_class to
        residency_user_owned_remote_target; remote-target rows describe
        a target the user named themselves and MUST NOT widen residency
        disclosure to residency_provider_default, which would imply a
        provider's default region applies.

  # ------------------------------------------------------------------
  # Provider-linked row. A user-attached symbol service / LSP / model
  # provider. Provider-linked locality forbids the local-only tenancy
  # and key-mode sentinels; the surface either names its tenancy and
  # key mode or explicitly publishes the unknown_* uncertainty tokens.
  # ------------------------------------------------------------------
  - record_kind: locality_tenancy_keymode_row_record
    locality_tenancy_keymode_row_schema_version: 1
    locality_tenancy_keymode_profile_id: provider_linked.symbol_service_attach
    surface_family_class: symbol_service
    locality_class: provider_linked
    tenancy_scope_class: single_user_local
    key_storage_mode_class: byok_user_managed
    local_safe_fallback_class: local_safe_fallback_narrowed
    data_residency_disclosure_class: residency_provider_default
    truth_badge_classes:
      - client_scope_badge
      - boundary_class_badge
      - residual_dependency_posture_badge
      - freshness_badge
    diagnostic_surface_classes:
      - help_about_pane
      - service_health_row
      - support_export_section
      - release_evidence_pack
      - ci_validation
    local_core_continuity: >-
      Workspace find, find-in-files, and find/replace continue with no
      network. The local index is the source of truth for in-workspace
      navigation; symbol-service attach is additive.
    absence_narrows_to: >-
      Cross-repo navigation is unavailable; in-workspace search and
      find/replace continue normally with explicit freshness labels on
      any cached cross-repo result.
    upstream_boundary_manifest_row_refs:
      - boundary_row:search.local_index_and_grep
    upstream_provider_registry_refs:
      - symbol_service_provider_descriptor
    owner_dri: "@ahmeddyounis"
    failure_drill:
      drill_id: locality_tenancy_keymode_drill.provider_linked_tenancy_relaxed_to_local_only_sentinel
      forced_input:
        rewrite_tenancy_scope_class: not_applicable_local_only
      expected_check_id: locality_tenancy_keymode.provider_linked_tenancy_class_relaxed_to_local_only_sentinel
      actionable_next_action: >-
        Restore tenancy_scope_class to a provider-eligible class
        (single_user_local, single_user_managed_tenant, org_tenant,
        multi_tenant_isolated, multi_tenant_shared, or unknown_tenancy);
        provider-linked rows MUST NOT silently fall back to the
        not_applicable_local_only sentinel because the provider attaches
        outside the local-only floor.

  # ------------------------------------------------------------------
  # Managed/control-plane-bearing row with documented tenant region.
  # The surface is a prototype managed companion (notification channel
  # / hosted control plane reachability). M1 seeds the vocabulary only;
  # the managed claim is labelled, not enforced.
  # ------------------------------------------------------------------
  - record_kind: locality_tenancy_keymode_row_record
    locality_tenancy_keymode_row_schema_version: 1
    locality_tenancy_keymode_profile_id: managed_control_plane.companion_notification_channel_seed
    surface_family_class: companion_notification_channel
    locality_class: managed_control_plane_bearing
    tenancy_scope_class: org_tenant
    key_storage_mode_class: managed_service_kms
    local_safe_fallback_class: local_safe_fallback_narrowed
    data_residency_disclosure_class: residency_managed_tenant_documented_region
    truth_badge_classes:
      - client_scope_badge
      - boundary_class_badge
      - residual_dependency_posture_badge
      - managed_disclosure_badge
    diagnostic_surface_classes:
      - help_about_pane
      - service_health_row
      - support_export_section
      - release_evidence_pack
      - ci_validation
    local_core_continuity: >-
      Local shell, editor, workspace, and support-bundle export
      continue with no managed control-plane reachability. The managed
      companion is optional in M1; absence narrows companion delivery
      to local notification only and never disables the local surfaces.
    absence_narrows_to: >-
      Companion notifications narrow to local-only delivery; the local
      shell and local notification routes remain available with explicit
      service-health labels.
    upstream_boundary_manifest_row_refs:
      - boundary_row:shell.frame_and_status
    owner_dri: "@ahmeddyounis"
    failure_drill:
      drill_id: locality_tenancy_keymode_drill.managed_control_plane_drops_local_safe_fallback_disclosure
      forced_input:
        rewrite_local_safe_fallback_class: local_safe_fallback_unavailable
      expected_check_id: locality_tenancy_keymode.managed_control_plane_local_safe_fallback_must_not_be_unavailable
      actionable_next_action: >-
        Restore local_safe_fallback_class to local_safe_fallback_narrowed
        or local_safe_fallback_present; M1 managed/control-plane-bearing
        rows MUST keep their local-safe fallback explicit so the
        managed companion stays optional. A managed row that publishes
        local_safe_fallback_unavailable would silently make the surface
        non-optional and remove the local-safe floor.
    notes: >-
      Managed/control-plane prototype. The seed labels the surface; it
      does not implement managed tenancy enforcement, residency
      enforcement, or KMS custody in M1.

  # ------------------------------------------------------------------
  # Managed/control-plane-bearing row with explicit uncertainty. The
  # failure drill spec calls for entering a managed/control-plane
  # surface with unknown tenancy or key mode and confirming labels
  # show uncertainty rather than false certainty. This row is the
  # uncertainty case the seed exists to protect.
  # ------------------------------------------------------------------
  - record_kind: locality_tenancy_keymode_row_record
    locality_tenancy_keymode_row_schema_version: 1
    locality_tenancy_keymode_profile_id: managed_control_plane.hosted_control_plane_uncertainty
    surface_family_class: hosted_control_plane_prototype
    locality_class: managed_control_plane_bearing
    tenancy_scope_class: unknown_tenancy
    key_storage_mode_class: unknown_key_mode
    local_safe_fallback_class: local_safe_fallback_narrowed
    data_residency_disclosure_class: residency_unknown
    truth_badge_classes:
      - boundary_class_badge
      - managed_disclosure_badge
    diagnostic_surface_classes:
      - help_about_pane
      - service_health_row
      - support_export_section
      - release_evidence_pack
      - ci_validation
    local_core_continuity: >-
      Local shell, editor, workspace, and support-bundle export
      continue with no hosted control-plane reachability. The hosted
      control plane is a prototype optional surface; M1 cannot
      truthfully name its tenant region, key custody, or residency
      enforcement, so the surface publishes the unknown_* tokens
      verbatim rather than guess.
    absence_narrows_to: >-
      Hosted control-plane prototype is unavailable; local surfaces
      remain available with explicit unavailable labels and no
      uncertainty token is silently rewritten into a certified value.
    owner_dri: "@ahmeddyounis"
    failure_drill:
      drill_id: locality_tenancy_keymode_drill.managed_control_plane_certifies_unknown_tenancy
      forced_input:
        rewrite_tenancy_scope_class: single_user_managed_tenant
      expected_check_id: locality_tenancy_keymode.managed_control_plane_uncertainty_token_must_not_be_silently_certified
      actionable_next_action: >-
        Restore tenancy_scope_class to unknown_tenancy on the
        hosted_control_plane_uncertainty row; managed/control-plane rows
        whose tenancy is not yet known MUST NOT be silently rewritten to
        a certified single_user_managed_tenant claim, because the seed
        is the canonical source for what the product claims about
        managed tenancy and a forged certification would let an
        unverified managed surface ship under a tenant-region badge
        the product cannot back.
    notes: >-
      Uncertainty profile. Confirms the seed's primary failure-drill
      requirement: a managed/control-plane-bearing surface with unknown
      tenancy or key mode MUST publish the unknown_* tokens rather than
      false certainty. The drill mutation rewrites unknown_tenancy to
      single_user_managed_tenant and the runner reproduces the protected
      check_id.

  # ------------------------------------------------------------------
  # Unknown-locality row. A prototype surface whose locality cannot
  # yet be truthfully named (e.g. an experimental surface still under
  # design review). Row schema forces unknown_tenancy + unknown_key_mode
  # + residency_unknown so the seed cannot silently certify what it
  # does not know.
  # ------------------------------------------------------------------
  - record_kind: locality_tenancy_keymode_row_record
    locality_tenancy_keymode_row_schema_version: 1
    locality_tenancy_keymode_profile_id: unknown_locality.prototype_surface_under_review
    surface_family_class: hosted_control_plane_prototype
    locality_class: unknown_locality
    tenancy_scope_class: unknown_tenancy
    key_storage_mode_class: unknown_key_mode
    local_safe_fallback_class: local_safe_fallback_unavailable
    data_residency_disclosure_class: residency_unknown
    truth_badge_classes:
      - managed_disclosure_badge
    diagnostic_surface_classes:
      - help_about_pane
      - service_health_row
      - ci_validation
    local_core_continuity: >-
      Surface is under design review; no local-safe fallback is
      claimed. The row is reserved so reviewers can see that this
      surface is on the inventory but is NOT yet eligible to render
      a certified locality / tenancy / key-mode badge.
    absence_narrows_to: >-
      The surface is unavailable; explicit unknown labels render in
      Help/About and on the service-health row. The seed never silently
      rewrites the unknown labels into certified values.
    owner_dri: "@ahmeddyounis"
    failure_drill:
      drill_id: locality_tenancy_keymode_drill.unknown_locality_certifies_key_mode
      forced_input:
        rewrite_key_storage_mode_class: managed_service_kms
      expected_check_id: locality_tenancy_keymode.unknown_locality_key_storage_mode_must_be_unknown_key_mode
      actionable_next_action: >-
        Restore key_storage_mode_class to unknown_key_mode; rows with
        locality_class = unknown_locality MUST keep key_storage_mode_class
        = unknown_key_mode. Certifying a managed_service_kms claim on
        an unknown-locality row would let a surface whose locality the
        product cannot yet name claim KMS custody it has not vetted.
