# External alpha record-class registry for local truth, export packets, and
# managed copies.
#
# This alpha registry narrows the existing record-class and state/export
# contracts into the subset support, docs, product-boundary, and CLI/export
# consumers need before runtime features hard-code lifecycle wording.

schema_version: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

registry_id: alpha_record_class_registry_state_support_export_managed_copy_truth
human_entrypoint_ref: docs/governance/managed_copy_vs_local_truth.md
schema_registry_ref: artifacts/governance/schema_registry_alpha.yaml
base_record_class_registry_ref: artifacts/governance/record_class_registry.yaml
alpha_wedge_matrix_ref: artifacts/milestones/m2/alpha_wedge_matrix.yaml
alpha_exit_scoreboard_ref: artifacts/milestones/m2/exit_gate_scoreboard.yaml

validator:
  script_ref: ci/check_schema_record_registry_alpha.py
  command: python3 ci/check_schema_record_registry_alpha.py --repo-root .
  consumer_projection_command: python3 ci/check_schema_record_registry_alpha.py --repo-root . --render-support-export-projection

source_registry_refs:
  - artifacts/governance/record_class_registry.yaml
  - artifacts/governance/schema_registry_alpha.yaml
  - artifacts/governance/portability_artifact_matrix.yaml
  - artifacts/governance/storage_modes.yaml
  - artifacts/service/retention_rows.yaml
  - docs/governance/record_class_governance.md
  - docs/governance/record_state_and_policy_simulation_models.md
  - docs/governance/retention_deletion_matrix_contract.md
  - docs/governance/data_portability_and_exit_matrix.md
  - docs/support/support_bundle_contract.md
  - docs/state/portable_state_package_contract.md

class_scope_vocabulary:
  - durable_state
  - support_bundle
  - portable_package
  - managed_copy
  - export_packet
  - receipt
  - collaboration_session
  - audit_trail

authority_class_vocabulary:
  - local_authoritative
  - generated_packet_authoritative
  - managed_authoritative
  - mixed_local_managed
  - local_cache_only

managed_copy_posture_vocabulary:
  - forbidden
  - optional_opt_in
  - required_when_managed
  - managed_authoritative

retention_label_vocabulary:
  - local_user_owned_until_cleared
  - local_user_owned_until_export_or_delete
  - support_case_retention
  - managed_policy_retained
  - generated_packet_delivery_window
  - receipt_metadata_retained

delete_semantic_vocabulary:
  - local_delete_only
  - distinct_local_managed_delete
  - managed_delete_with_receipt
  - hold_blocks_completion
  - not_deletable_receipt
  - local_invalidate_only

export_semantic_vocabulary:
  - not_exportable
  - exportable_on_request
  - manifest_required
  - packet_is_export
  - receipt_emitted_on_action
  - inventory_only

first_consumers:
  - consumer_id: alpha_record_registry_support_export_projection
    surface_class: cli_support_export_projection
    consumer_ref: ci/check_schema_record_registry_alpha.py
    command: python3 ci/check_schema_record_registry_alpha.py --repo-root . --render-support-export-projection
    required_rendered_fields:
      - record_class_id
      - class_scope
      - owner_dri
      - schema_rows
      - local_truth_authority
      - managed_copy_posture
      - retention_label
      - export_semantics
      - delete_semantics
      - hold_semantics
    output_contract: >
      The projection is suitable for support bundle preview, docs tables,
      product-boundary reviews, and CLI/headless export explainers. The
      projection is metadata only and carries no raw content.

record_classes:
  - row_kind: alpha_record_class_row
    row_version: 1
    row_id: record_alpha:durable_workspace_state
    record_class_id: durable_workspace_state
    title: Durable workspace and restore state
    class_scope: durable_state
    owner_dri: "@ahmeddyounis"
    base_record_class_refs: []
    placeholder_record_class: true
    placeholder_exit_criteria: >
      Promote to the base record-class registry once the state-object inventory
      and portable-state package writer share one runtime row shape.
    schema_row_refs:
      - schema_alpha:durable_state.workspace_manifest
      - schema_alpha:durable_state.restore_provenance
      - schema_alpha:durable_state.pane_tree
      - schema_alpha:record_truth.record_state
    local_truth:
      authority_class: local_authoritative
      local_materialization: required_local_authoritative
      managed_copy_posture: optional_opt_in
      managed_copy_label: >
        Optional sync, backup, or support mirrors may reference this state, but
        local workspace state remains the authoritative source until a user
        exports, imports, or deletes it.
    retention:
      retention_label: local_user_owned_until_cleared
      local_owner_ref: local_user
      managed_owner_ref: local_user
      trigger_class: user_clear_workspace_or_profile_reset
      retention_artifact_refs:
        - docs/state/state_object_inventory.md
        - docs/state/portable_state_package_contract.md
    hold_semantics:
      eligible: false
      hold_classes: []
    delete_semantics:
      request_supported: true
      local_and_managed_actions_are_distinct: false
      hold_blocks_completion: false
      completion_evidence: tombstone_or_summary
      semantic_classes:
        - local_delete_only
      blocker_classes: []
    export_semantics:
      availability: exportable_on_request
      default_formats:
        - json
        - yaml
        - manifest_bundle
      manifest_required: true
      semantic_classes:
        - exportable_on_request
        - manifest_required
      local_export_copy_disclosed: true
    support_surface_refs:
      - docs/support/support_bundle_contract.md
    product_surface_refs:
      - docs/state/state_object_inventory.md
      - docs/state/portable_state_package_contract.md
    docs_refs:
      - docs/governance/managed_copy_vs_local_truth.md

  - row_kind: alpha_record_class_row
    row_version: 1
    row_id: record_alpha:portable_state_package
    record_class_id: portable_state_package
    title: Portable state package
    class_scope: portable_package
    owner_dri: "@ahmeddyounis"
    base_record_class_refs: []
    placeholder_record_class: true
    placeholder_exit_criteria: >
      Promote to the base record-class registry once profile, workspace,
      restore-provenance, and redaction manifests are emitted by one package
      assembler.
    schema_row_refs:
      - schema_alpha:portable_package.state_manifest
      - schema_alpha:portable_package.profile
      - schema_alpha:portable_package.workspace_state_alpha
      - schema_alpha:record_truth.record_state
    local_truth:
      authority_class: generated_packet_authoritative
      local_materialization: local_export_copy_only
      managed_copy_posture: forbidden
      managed_copy_label: >
        The generated package is user-controlled output. A managed service may
        ingest a copy only through a separate support or offboarding class.
    retention:
      retention_label: generated_packet_delivery_window
      local_owner_ref: local_user
      managed_owner_ref: local_user
      trigger_class: export_delivery_or_user_delete
      retention_artifact_refs:
        - docs/state/portable_state_package_contract.md
        - docs/governance/data_portability_and_exit_matrix.md
    hold_semantics:
      eligible: true
      hold_classes:
        - export_pending
    delete_semantics:
      request_supported: true
      local_and_managed_actions_are_distinct: false
      hold_blocks_completion: false
      completion_evidence: tombstone_or_summary
      semantic_classes:
        - local_delete_only
      blocker_classes: []
    export_semantics:
      availability: packet_is_export
      default_formats:
        - json
        - manifest_bundle
      manifest_required: true
      semantic_classes:
        - packet_is_export
        - manifest_required
      local_export_copy_disclosed: true
    support_surface_refs:
      - docs/support/support_bundle_contract.md
    product_surface_refs:
      - docs/state/portable_state_package_contract.md
      - docs/governance/data_portability_and_exit_matrix.md
    docs_refs:
      - docs/governance/managed_copy_vs_local_truth.md

