# Standing decision-forum matrix.
#
# Machine-readable operating contract for the standing decision forums
# seeded during the foundations milestone. Forum ids MUST reuse
# ownership_matrix.decision_forums ids. If this file and
# docs/governance/forum_charters.md disagree, this file wins for cadence,
# packet-profile ids, and output routing. ownership_matrix.yaml remains
# authoritative for chair and waiver identity.

schema_version: 1

source_specs:
  - .t2/docs/Aureline_PRD.md
  - .t2/docs/Aureline_Milestones_Document.md
  - docs/governance/dri_map.md
  - docs/governance/decision_workflow.md
  - docs/governance/benchmark_council_charter.md

ownership_matrix_ref: artifacts/governance/ownership_matrix.yaml
packet_profile_doc_ref: docs/governance/forum_packet_templates.md

decision_classes:
  - id: adr_or_rfc_linked_decision
    summary: >
      Protected-lane, stable-surface, schema/storage, trust-boundary, or
      long-lived compatibility decision that cannot land honestly as a
      scorecard note alone.
    required_links:
      - artifacts/governance/decision_index.yaml
      - docs/adr/
      - docs/rfc/
    required_recording:
      - decision_row_with_forum_and_default_if_unresolved
      - accepted_adr_or_rfc_that_closes_as_adr
    forbidden_shortcuts:
      - scorecard_note_only
      - shiproom_note_only
      - community_update_only
    used_by_forums:
      - architecture_council
      - security_trust_review
      - compatibility_ecosystem_review
      - product_scope_review

  - id: scorecard_or_packet_decision
    summary: >
      Lane-health, evidence-readiness, accessibility, compatibility, or
      community-truth decision that must land in a packet, scorecard, or
      canonical report family even when no ADR is required.
    required_links:
      - artifacts/milestones/
      - docs/governance/verification_packet_template.md
    required_recording:
      - lane_status_or_packet_outcome
      - evidence_owner_and_requirement_ids
    forbidden_shortcuts:
      - meeting_notes_only
    used_by_forums:
      - performance_council
      - accessibility_review
      - compatibility_ecosystem_review
      - product_scope_review
      - open_community_sync
      - release_council
      - shiproom_executive_scope_review

  - id: waiver_or_exception_decision
    summary: >
      Time-bounded bypass, freeze exception, release exception, or
      backup-owner waiver with named scope, mitigation, expiry, and
      escalation.
    required_links:
      - docs/governance/templates/waiver_template.md
      - docs/governance/templates/exception_packet_template.md
      - schemas/release/waiver_packet.schema.json
    required_recording:
      - waiver_or_exception_packet
      - expiry_and_renewal_rule
      - escalation_path
    forbidden_shortcuts:
      - oral_agreement
      - pr_comment_only
    used_by_forums:
      - architecture_council
      - performance_council
      - security_trust_review
      - accessibility_review
      - release_council
      - shiproom_executive_scope_review

  - id: release_or_sponsor_outcome
    summary: >
      Milestone rebaseline, stable-promotion hold or go, channel
      widening, launch-claim narrowing, or another outcome that must
      stay visible in release evidence or a product cutline record.
    required_links:
      - artifacts/milestones/
      - artifacts/release/
      - artifacts/governance/decision_index.yaml
    required_recording:
      - scorecard_or_release_packet_outcome
      - public_claim_narrowing_when_applicable
      - named_follow_up_owner
    forbidden_shortcuts:
      - schedule_momentum_only
      - roadmap_note_without_packet_update
    used_by_forums:
      - product_scope_review
      - release_council
      - shiproom_executive_scope_review

packet_profiles:
  - id: architecture_decision_bundle
    summary: >
      Decision row plus ADR or RFC draft, affected protected-lane refs,
      and any freeze-row or contract-diff context needed for an
      architecture-level ruling.
    input_artifact_refs:
      - artifacts/governance/decision_index.yaml
      - docs/adr/0000-template.md
      - docs/rfc/0000-template.md
      - artifacts/governance/interface_freeze_matrix.yaml
    output_artifact_refs:
      - artifacts/governance/decision_index.yaml
      - docs/adr/
      - docs/rfc/
      - artifacts/milestones/
    used_by_forums:
      - architecture_council

  - id: performance_readout_bundle
    summary: >
      Protected-metric delta, corpus or hardware refs, active waiver
      state, and affected-lane scoreboard context for weekly performance
      review.
    input_artifact_refs:
      - artifacts/bench/fitness_function_catalog.yaml
      - artifacts/perf/latency_budget_ledger.yaml
      - artifacts/milestones/
      - docs/governance/benchmark_council_charter.md
    output_artifact_refs:
      - artifacts/milestones/
      - artifacts/perf/
      - docs/benchmarks/
      - artifacts/governance/decision_index.yaml
    used_by_forums:
      - performance_council

  - id: security_trust_packet
    summary: >
      Permission, policy, trust-boundary, incident, or release-blocker
      packet that makes scope, risk, mitigation, and affected claim rows
      explicit before a security-trust decision closes.
    input_artifact_refs:
      - artifacts/governance/decision_index.yaml
      - artifacts/governance/issue_routing.yaml
      - docs/governance/templates/waiver_template.md
      - docs/governance/templates/exception_packet_template.md
    output_artifact_refs:
      - artifacts/governance/decision_index.yaml
      - docs/adr/
      - artifacts/release/
      - docs/security/
    used_by_forums:
      - security_trust_review

  - id: accessibility_review_packet
    summary: >
      Launch-critical accessibility packet covering keyboard,
      screen-reader, IME, focus, reduced-motion, locale, and design-signoff
      evidence for the affected surface.
    input_artifact_refs:
      - docs/accessibility/a11y_ime_packet_template.md
      - artifacts/accessibility/
      - fixtures/accessibility/
      - artifacts/milestones/
    output_artifact_refs:
      - docs/accessibility/
      - artifacts/accessibility/
      - artifacts/milestones/
      - artifacts/release/
    used_by_forums:
      - accessibility_review

  - id: compatibility_review_packet
    summary: >
      Compatibility report, migration packet, SDK or bridge diff, and
      docs-support truth delta for ecosystem and launch-archetype
      decisions.
    input_artifact_refs:
      - docs/state/migration_and_restore_playbook.md
      - artifacts/compat/
      - docs/governance/verification_packet_template.md
      - artifacts/governance/decision_index.yaml
    output_artifact_refs:
      - artifacts/compat/
      - docs/state/
      - artifacts/governance/decision_index.yaml
      - docs/
    used_by_forums:
      - compatibility_ecosystem_review

  - id: milestone_scope_packet
    summary: >
      Milestone scorecard delta, dependency health, commitment-class
      movement, and claim or staffing impact for cut, add, narrow, or
      rebaseline decisions.
    input_artifact_refs:
      - artifacts/milestones/
      - artifacts/governance/dependency_ledger.yaml
      - artifacts/governance/commitment_classes.yaml
      - docs/governance/commitment_and_rebaseline_policy.md
    output_artifact_refs:
      - artifacts/milestones/
      - artifacts/governance/decision_index.yaml
      - docs/governance/templates/exception_packet_template.md
      - artifacts/release/
    used_by_forums:
      - product_scope_review

  - id: community_sync_note
    summary: >
      Public-roadmap and governance-transparency note that links current
      scorecard, claim, and issue-routing truth without inventing new
      product claims.
    input_artifact_refs:
      - artifacts/milestones/
      - artifacts/governance/issue_routing.yaml
      - docs/
      - README.md
    output_artifact_refs:
      - docs/
      - README.md
      - artifacts/governance/issue_routing.yaml
    used_by_forums:
      - open_community_sync

  - id: release_readiness_packet
    summary: >
      Release evidence, compatibility report, waiver summary, and signoff
      roster bundle used to decide hold, narrow, or promote on an active
      release window.
    input_artifact_refs:
      - artifacts/release/
      - docs/release/release_evidence_packet_template.md
      - artifacts/compat/
      - artifacts/milestones/
    output_artifact_refs:
      - artifacts/release/
      - artifacts/milestones/
      - docs/
    used_by_forums:
      - release_council
      - shiproom_executive_scope_review

forums:
  - forum_id: architecture_council
    display_name: Architecture council
    alias_labels:
      - Architecture board
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    cadence: weekly
    scope:
      - renderer and text-stack direction
      - reactive truth model and schema ownership
      - command identity and protected-lane contract closure
      - protected-lane claim narrowing and long-lived waiver review
    decision_class_ids:
      - adr_or_rfc_linked_decision
      - waiver_or_exception_decision
      - release_or_sponsor_outcome
    required_input_packet_profile_id: architecture_decision_bundle
    required_output_artifact_refs:
      - artifacts/governance/decision_index.yaml
      - docs/adr/
      - docs/rfc/
      - artifacts/milestones/
    quorum_rule: >
      While the solo-maintainer waiver is active this forum is a
      single-attendee decision log. After the waiver closes, require the
      chair plus one affected protected-lane DRI; milestone scope, date,
      or acceptance rebaseline also requires release_council co-sign.
    escalation_forum_refs:
      - release_council
      - shiproom_executive_scope_review
    may_narrow_claims: true
    may_force_rebaseline: true
    special_rules:
      - protected-lane-visible behaviour changes must link to an ADR or RFC that closes as an ADR
      - backup-owner waivers and protected-lane narrowing cannot live only in scorecard prose

  - forum_id: performance_council
    display_name: Performance council
    alias_labels:
      - Performance council
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    cadence: weekly
    scope:
      - protected metrics and benchmark corpora
      - regression budgets and threshold changes
      - battery and thermal validation posture
      - benchmark disputes and protected-fitness waiver review
    decision_class_ids:
      - scorecard_or_packet_decision
      - waiver_or_exception_decision
      - adr_or_rfc_linked_decision
    required_input_packet_profile_id: performance_readout_bundle
    required_output_artifact_refs:
      - artifacts/milestones/
      - artifacts/perf/
      - docs/benchmarks/
      - artifacts/governance/decision_index.yaml
    quorum_rule: >
      While the solo-maintainer waiver is active this forum is a
      single-attendee decision log. After the waiver closes, require the
      chair plus the benchmark-lab DRI or the performance evidence owner.
    escalation_forum_refs:
      - architecture_council
      - shiproom_executive_scope_review
    may_narrow_claims: true
    may_force_rebaseline: false
    special_rules:
      - protected-fitness waivers must carry expiry and correction intent
      - recurring performance waivers escalate out of the weekly loop into architecture or shiproom review

  - forum_id: security_trust_review
    display_name: Security and trust review
    alias_labels:
      - Security and privacy council
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    cadence: bi-weekly
    scope:
      - permission model and trust-boundary changes
      - policy bundles, credential flows, and egress posture
      - incident follow-up and release-blocking trust gaps
      - managed-service or enterprise security claims
    decision_class_ids:
      - adr_or_rfc_linked_decision
      - waiver_or_exception_decision
      - release_or_sponsor_outcome
    required_input_packet_profile_id: security_trust_packet
    required_output_artifact_refs:
      - artifacts/governance/decision_index.yaml
      - docs/adr/
      - artifacts/release/
      - docs/security/
    quorum_rule: >
      While the solo-maintainer waiver is active this forum is a
      single-attendee decision log. After the waiver closes, require the
      chair plus the affected lane DRI or release co-signer for any
      release-bearing gap.
    escalation_forum_refs:
      - release_council
      - shiproom_executive_scope_review
    may_narrow_claims: true
    may_force_rebaseline: false
    special_rules:
      - trust-boundary or permission-model widening is never a docs-only change
      - private intake is allowed, but the typed decision or packet record is still mandatory

  - forum_id: accessibility_review
    display_name: Accessibility review
    alias_labels:
      - Accessibility gate
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    cadence: bi-weekly
    scope:
      - keyboard completeness and screen-reader behaviour
      - focus, reduced-motion, IME, and locale-sensitive behaviour
      - accessibility packet readiness and design sign-off
      - accessibility release exceptions on launch-critical surfaces
    decision_class_ids:
      - scorecard_or_packet_decision
      - waiver_or_exception_decision
    required_input_packet_profile_id: accessibility_review_packet
    required_output_artifact_refs:
      - docs/accessibility/
      - artifacts/accessibility/
      - artifacts/milestones/
      - artifacts/release/
    quorum_rule: >
      While the solo-maintainer waiver is active this forum is a
      single-attendee decision log. After the waiver closes, require the
      chair plus design co-review or the affected surface owner.
    escalation_forum_refs:
      - product_scope_review
      - release_council
    may_narrow_claims: true
    may_force_rebaseline: false
    special_rules:
      - stable-facing accessibility exceptions must update both the accessibility packet family and the release packet family
      - unresolved accessibility blockers remain visible on the scorecard rather than being hidden in design review notes

  - forum_id: compatibility_ecosystem_review
    display_name: Ecosystem and compatibility review
    alias_labels:
      - Compatibility / ecosystem review
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    cadence: bi-weekly
    scope:
      - launch archetypes and importer cutline
      - extension bridge posture and SDK freeze candidates
      - compatibility-report readiness and migration truth
      - claim-manifest governance for ecosystem-facing rows
    decision_class_ids:
      - adr_or_rfc_linked_decision
      - scorecard_or_packet_decision
    required_input_packet_profile_id: compatibility_review_packet
    required_output_artifact_refs:
      - artifacts/compat/
      - docs/state/
      - artifacts/governance/decision_index.yaml
      - docs/
    quorum_rule: >
      While the solo-maintainer waiver is active this forum is a
      single-attendee decision log. After the waiver closes, require the
      chair plus the affected bridge, SDK, or migration owner.
    escalation_forum_refs:
      - product_scope_review
      - release_council
    may_narrow_claims: true
    may_force_rebaseline: false
    special_rules:
      - migration or bridge cutline changes must update compatibility truth and docs/support language together
      - supported-row changes cannot close only in roadmap prose

  - forum_id: product_scope_review
    display_name: Milestone scope review
    alias_labels:
      - Product scope review
      - Product scope council
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    cadence: weekly
    scope:
      - milestone cut and add decisions
      - commitment-class movement and dependency health
      - language, framework, and deployment commitments
      - roadmap-visible claim narrowing or widening requests
    decision_class_ids:
      - scorecard_or_packet_decision
      - adr_or_rfc_linked_decision
      - release_or_sponsor_outcome
      - waiver_or_exception_decision
    required_input_packet_profile_id: milestone_scope_packet
    required_output_artifact_refs:
      - artifacts/milestones/
      - artifacts/governance/decision_index.yaml
      - docs/governance/templates/exception_packet_template.md
      - artifacts/release/
    quorum_rule: >
      While the solo-maintainer waiver is active this forum is a
      single-attendee decision log. After the waiver closes, require the
      chair plus the affected lane DRI or evidence owner.
    escalation_forum_refs:
      - architecture_council
      - release_council
    may_narrow_claims: true
    may_force_rebaseline: true
    special_rules:
      - weekly cutline movement must land in the scorecard or a decision row the same day
      - milestone scope, date, or acceptance rebaseline requires architecture_council and release_council co-sign

  - forum_id: open_community_sync
    display_name: Open community sync
    alias_labels:
      - Open community / partner sync
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    cadence: monthly
    scope:
      - public roadmap truth
      - contributor asks and community-facing follow-ups
      - governance transparency and current known narrowing
      - public handoff expectations when route or disclosure posture changes
    decision_class_ids:
      - scorecard_or_packet_decision
    required_input_packet_profile_id: community_sync_note
    required_output_artifact_refs:
      - docs/
      - README.md
      - artifacts/governance/issue_routing.yaml
    quorum_rule: >
      While the solo-maintainer waiver is active this forum is a
      single-attendee decision log. After the waiver closes, require the
      chair plus DevRel or the docs-public-truth DRI.
    escalation_forum_refs:
      - product_scope_review
      - release_council
    may_narrow_claims: false
    may_force_rebaseline: false
    special_rules:
      - this forum may not widen a public promise beyond the current scorecard or release packet
      - if another forum narrows scope, this forum must publish the narrower truth in the next cadence window

  - forum_id: release_council
    display_name: Release council
    alias_labels:
      - Release governance
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    cadence: per_release_candidate_window
    scope:
      - release evidence completeness and exact-build posture
      - compatibility-readiness and channel widening
      - release-bearing claim narrowing
      - milestone rebaseline co-sign when release posture changes
    decision_class_ids:
      - scorecard_or_packet_decision
      - waiver_or_exception_decision
      - release_or_sponsor_outcome
    required_input_packet_profile_id: release_readiness_packet
    required_output_artifact_refs:
      - artifacts/release/
      - artifacts/milestones/
      - docs/
    quorum_rule: >
      While the solo-maintainer waiver is active this forum is a
      single-attendee decision log. After the waiver closes, require the
      chair plus the release evidence owner, with security or
      performance co-sign when the blocking gap sits in their domain.
    escalation_forum_refs:
      - shiproom_executive_scope_review
    may_narrow_claims: true
    may_force_rebaseline: true
    special_rules:
      - release-bearing waivers must appear in the release packet family
      - channel or support-window changes must update docs truth in the same change set

  - forum_id: shiproom_executive_scope_review
    display_name: Release shiproom
    alias_labels:
      - Shiproom
      - Explicit stable go/no-go forum
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    cadence: every_rc_or_stable_gate
    scope:
      - final go, hold, or narrow decision on an active release line
      - late RC or stable feature and schema change review
      - rollback posture and named signoff roster
      - emergency escalation when a release-bearing risk cannot stay in the ordinary cadence
    decision_class_ids:
      - scorecard_or_packet_decision
      - waiver_or_exception_decision
      - release_or_sponsor_outcome
    required_input_packet_profile_id: release_readiness_packet
    required_output_artifact_refs:
      - artifacts/release/
      - artifacts/milestones/
      - docs/
    quorum_rule: >
      While the solo-maintainer waiver is active this forum is a
      single-attendee decision log. After the waiver closes, require the
      release chair plus the supportability or security owner for the
      blocking gap.
    escalation_forum_refs:
      - open_community_sync
    may_narrow_claims: true
    may_force_rebaseline: false
    special_rules:
      - default posture at RC or stable is hold or narrow, never silent broadening
      - late scope growth requires prior release_council approval and architecture_council approval when protected contracts move
