# M1 import-record seed.
#
# This file is the M1-bearing import-record seed format that later
# release evidence and provenance work can reuse. It is the focused
# subset every later release-pack, SBOM tooling, or attribution
# notice MUST cite when it claims a third-party import exists.
#
# The full third-party import register lives at
#   artifacts/governance/third_party_import_register.yaml
# and carries every row (bundled assets, mirrored packs, vendored
# source files) with the broader admission/health/criticality axes.
# This seed deliberately freezes the M1-bearing record shape:
#
#   - one record per imported, bundled, or mirrored set of bytes;
#   - a stable record id and human-readable name;
#   - the import-kind, license metadata, provenance origin, and the
#     local path the bytes live at;
#   - the named runtime consumer (release-pack, attribution notice,
#     SBOM tooling, support surface) that reads the record.
#
# Future release evidence (release-evidence pack, SBOM, attribution
# notice) reuses this record shape rather than inventing a new one.
# Adding a record_kind, import_kind_class, license_class, or
# provenance_class value is additive-minor and bumps schema_version;
# repurposing an existing value is breaking and requires a new
# decision row.

schema_version: 1
status: seeded
as_of: "2026-05-11"

matrix_id: m1_import_record_seed
owner_dri: "@ahmeddyounis"

overview_page: docs/governance/contribution_and_signoff.md
parent_register_ref: artifacts/governance/third_party_import_register.yaml
build_identity_ref: artifacts/build/build_identity.json

import_kind_class_vocabulary:
  - bundled_asset_subset
  - mirrored_pack
  - vendored_source_file

license_class_vocabulary:
  - workspace_default_apache_2_0
  - redistributable_font_expected_pending_import
  - upstream_pack_license_to_verify_on_first_mirror
  - vendored_source_upstream_license_preserved

provenance_class_vocabulary:
  - reserved_by_contract_not_imported
  - imported_with_origin_recorded
  - mirrored_with_origin_recorded

record_consumer_class_vocabulary:
  - release_evidence_pack
  - attribution_notice
  - sbom_tooling
  - support_or_compliance_surface

rows:
  # 1. Reserved bundled-asset record (seed shape).
  - record_kind: m1_import_record
    import_record_id: import_record.fonts.noto_subset_reserved
    name: Last-resort bundled Noto-class fallback subset (reserved)
    import_kind_class: bundled_asset_subset
    license_class: redistributable_font_expected_pending_import
    provenance_class: reserved_by_contract_not_imported
    local_path_ref: not_yet_seeded
    upstream_source_ref: artifacts/governance/dependency_register.yaml#dep.text.noto_class_fallback_font
    parent_register_row_ref: artifacts/governance/third_party_import_register.yaml#import.fonts.noto_subset
    notes: >
      Reserved record kept honest until the first import lands so the
      release-evidence pack and attribution notice can reuse the
      record shape without inventing a new one.
    named_runtime_consumer:
      consumer_ref: docs/governance/contribution_and_signoff.md
      consumer_class: release_evidence_pack
      consumed_fields:
        - import_record.import_record_id
        - import_record.import_kind_class
        - import_record.license_class
        - import_record.provenance_class
        - import_record.local_path_ref
        - import_record.upstream_source_ref

  # 2. Reserved mirrored-pack record (seed shape).
  - record_kind: m1_import_record
    import_record_id: import_record.docs.mirrored_official_pack_reserved
    name: Mirrored official docs pack source (reserved)
    import_kind_class: mirrored_pack
    license_class: upstream_pack_license_to_verify_on_first_mirror
    provenance_class: reserved_by_contract_not_imported
    local_path_ref: not_yet_seeded
    upstream_source_ref: docs/adr/0013-docs-help-service-health-truth.md
    parent_register_row_ref: artifacts/governance/third_party_import_register.yaml#import.docs.mirrored_official_pack
    notes: >
      Reserved record for the mirrored official docs pack; kept honest
      until the first mirror lands so attribution and SBOM tooling can
      reuse this record shape without inventing a new one.
    named_runtime_consumer:
      consumer_ref: docs/governance/contribution_and_signoff.md
      consumer_class: attribution_notice
      consumed_fields:
        - import_record.import_record_id
        - import_record.import_kind_class
        - import_record.license_class
        - import_record.provenance_class
        - import_record.upstream_source_ref
        - import_record.parent_register_row_ref
