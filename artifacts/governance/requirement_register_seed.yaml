# Canonical requirement register seed.
#
# One binding requirement-id system for milestone packets, CI labels,
# waivers, docs, scorecards, and release evidence. The canonical
# requirement id is the only binding identity. Aliases, local packet
# labels, scorecard calls, fitness rows, and milestone exit items remain
# non-authoritative references that MUST resolve back to canonical rows
# here rather than becoming parallel obligations.

schema_version: 1
register_id: aureline.canonical_requirement_register

scope:
  seed_focus: >
    Foundations-critical obligations plus the launch-facing requirement
    rows they already seed or narrow. This seed intentionally covers the
    current architecture-freeze packet, benchmark/governance controls,
    ownership, build reproducibility, fixture corpus, and boundary/truth
    artifacts rather than the full long-range requirement inventory.
  default_milestone_language: foundations
  status_vocabulary:
    - proposed
    - approved
    - in_progress
    - implemented
    - verified
    - waived
    - deprecated
    - replaced
    - removed
  verification_class_vocabulary:
    - BENCH
    - CONF
    - RELTEST
    - SECREV
    - A11YTEST
    - UXVAL
    - OPSVAL
    - DOCVAL

owners:
  primary_owner: "@ahmeddyounis"
  evidence_owner: "@ahmeddyounis"
  approving_forums:
    - architecture_council
    - performance_council
    - release_council

canonical_rules:
  id_pattern: "<CLASS>-<DOMAIN>-<NNN>"
  citation_rule: >
    Scorecards, verification packets, waiver packets, CI annotations,
    release evidence, and docs MUST cite requirement_rows[].requirement_id.
    Local labels may appear only as mapped references.
  alias_rule: >
    Aliases are non-authoritative pointers. A new alias may clarify source
    history, but it must never create a second requirement row for the same
    shipped obligation.
  non_requirement_label_rule: >
    Fitness rows, scorecard calls, milestone-exit labels, contract-family
    labels, and packet-local labels are evidence labels, not requirement
    ids. They must resolve through crosswalk_rows before they are used in
    promotion-grade packets.

source_documents:
  - doc_ref: .t2/docs/Aureline_PRD.md
    purpose: PRD requirement taxonomy, lifecycle, waiver rules, and launch-blocking seed.
  - doc_ref: .t2/docs/Aureline_Milestones_Document.md
    purpose: Canonical requirement-register and alias-crosswalk operating model for milestone evidence.
  - doc_ref: .t2/docs/Aureline_Technical_Architecture_Document.md
    purpose: Architecture-side requirement expansions and supporting requirement ids.
  - doc_ref: .t2/docs/Aureline_Technical_Design_Document.md
    purpose: Milestone-close conditions, fixture-corpus governance, and expanded quality requirement rows.
  - doc_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md
    purpose: Canonical-reference and alias-discipline rules for packets, scorecards, and waivers.

