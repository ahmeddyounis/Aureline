# Experiments / flags / Labs registry seed (M1 governance).
#
# Machine-readable register projection of every non-stable control row
# already seeded in the repository, keyed off the stable ids declared in
# artifacts/governance/experiments_register.yaml and projected, where
# contributor-visible, into artifacts/governance/labs_register.yaml.
# The seed exists so docs/help/release/support/CI consumers all key off
# the same stable governance vocabulary for owner, cohort, lifecycle
# state, expiry, kill switch, default posture, public label, telemetry
# posture, and graduation / retirement path without forking the
# upstream registers.
#
# Reviewer-facing landing page:
#   docs/governance/m1_experiments_and_labs_seed.md
#
# Companion registers the seed projects against (never forks):
#   artifacts/governance/experiments_register.yaml
#   artifacts/governance/labs_register.yaml
#
# Row schema:
#   schemas/governance/experiment_registry_entry.schema.json
#
# Envelope schema:
#   schemas/governance/experiment_registry.schema.json
#
# Conformance.
#   - Every entry conforms to the row schema.
#   - register_entry_id is unique. Adding a row is additive-minor.
#     Removing a row is breaking; narrow by editing the row, not by
#     deletion.
#   - Every row MUST cite source_register = experiments_register and a
#     source_id that resolves in artifacts/governance/experiments_register.yaml.
#     Stable ids are the only ids the seed is allowed to key on.
#   - audience_class = contributor_visible_labs rows MUST resolve in
#     artifacts/governance/labs_register.yaml via labs_projection_ref.
#     Hidden, control-stack-reserved, and CI-rollout-only rows MUST
#     NOT advertise a Labs projection.
#   - Every row MUST publish a non-null review_by or expires_on (or
#     both) so an unowned, expiry-less row is impossible. The
#     validation lane compares the dates against as_of and trips a
#     loud check on rows whose review_by or expires_on is in the past.
#   - default_posture_class = reserved_until_runtime_control_stack_lands
#     forces graduation_retirement_path_class = hold_pending_runtime_control_stack
#     and telemetry_posture_class = not_applicable_reserved_binding;
#     a reserved binding cannot quietly claim a graduation plan.
#   - Milestone slugs and task ids MUST NOT appear in any id, ref,
#     label, or note field.

schema_version: 1
status: seeded
as_of: "2026-05-11"

matrix_id: m1_experiments_and_labs_seed
owner_dri: "@ahmeddyounis"

overview_page: docs/governance/m1_experiments_and_labs_seed.md
row_schema_ref: schemas/governance/experiment_registry_entry.schema.json
build_identity_ref: artifacts/build/build_identity.json
validation_lane_ref: artifacts/qe/test_lane_registry.yaml#fixture_repo_integration

companion_registers:
  experiments_register: artifacts/governance/experiments_register.yaml
  labs_register: artifacts/governance/labs_register.yaml

# -----------------------------------------------------------------------------
# Frozen vocabularies. Closed; agreement with the row schema $defs is
# asserted by the validation lane.
# -----------------------------------------------------------------------------

row_kind_class_vocabulary:
  - experiment
  - feature_flag
  - benchmark_mode
  - rollout

audience_class_vocabulary:
  - contributor_visible_labs
  - hidden_developer_toggle
  - control_stack_reserved
  - ci_rollout_only

lifecycle_state_class_vocabulary:
  - labs
  - preview
  - beta
  - stable
  - deprecated
  - disabled_by_policy
  - retired

cohort_class_vocabulary:
  - maintainer_and_contributor_local
  - developer_local_only
  - developer_local_and_ci_preview
  - developer_local_and_ci_seed_guard
  - ci_nightly_reference_hardware
  - workflow_dispatch_only
  - reserved_for_future_settings_rollout

default_posture_class_vocabulary:
  - off_by_default
  - opt_in_only
  - enabled_when_named_on_cli
  - default_for_developer_local
  - scheduled_ci_only
  - manual_failure_drill_only
  - reserved_until_runtime_control_stack_lands

public_label_class_vocabulary:
  - public_labs_visible_label
  - hidden_developer_toggle_label
  - control_stack_reserved_label
  - ci_rollout_only_label

telemetry_posture_class_vocabulary:
  - counts_only_local
  - counts_only_local_then_optional_export
  - no_remote_telemetry
  - not_applicable_reserved_binding

graduation_retirement_path_class_vocabulary:
  - graduate_to_stable
  - graduate_to_beta
  - retire_to_disabled_by_policy
  - retire_to_deleted
  - hold_pending_runtime_control_stack
  - hold_pending_review_decision

kill_switch_source_class_vocabulary:
  - embedded_default_off
  - local_cli_argument
  - ci_workflow_input
  - signed_local_admin_bundle
  - optional_managed_override

required_row_kind_class_coverage:
  - experiment
  - feature_flag
  - benchmark_mode
  - rollout

required_audience_class_coverage:
  - contributor_visible_labs
  - hidden_developer_toggle
  - control_stack_reserved
  - ci_rollout_only

required_lifecycle_state_class_coverage:
  - labs
  - preview

failure_drill_id_vocabulary:
  - review_by_breached_into_past
  - owner_dri_dropped
  - labs_projection_ref_dropped
  - both_review_by_and_expires_on_null
  - graduation_retirement_path_class_dropped
  - kill_switch_source_ref_dropped
  - benchmark_mode_change_log_posture_relaxed_to_not_required
  - rollout_guardrails_dropped
  - audience_widened_to_contributor_visible_labs_without_public_label_alignment
  - rollback_path_rollback_ref_dropped
  - expires_on_drifted_into_past_with_null_review_by
  - reserved_default_posture_loses_runtime_control_stack_graduation

named_runtime_consumers:
  - consumer_id: review_landing_page
    consumer_class: review_docs_landing_page
    consumer_ref: docs/governance/m1_experiments_and_labs_seed.md
    consumed_fields:
      - register_entry_id
      - source_id
      - row_kind_class
      - audience_class
      - lifecycle_state_class
      - default_posture_class
      - public_label_class
      - review_by
      - expires_on
      - kill_switch
      - graduation_retirement_path_class
    notes: >
      Reviewer-facing landing page that quotes the seeded rows verbatim
      so docs / help / release / support copy reads the same
      governance vocabulary as the seed.

  - consumer_id: upstream_experiments_register
    consumer_class: upstream_governance_register
    consumer_ref: artifacts/governance/experiments_register.yaml
    consumed_fields:
      - id
      - row_kind
      - audience_class
      - lifecycle_state
      - default_posture
      - cohort_or_ring
      - review_by
      - expires_on
      - kill_switch
    notes: >
      Authoritative upstream control register. The seed projects every
      row through it without forking the stable id space.

  - consumer_id: upstream_labs_register
    consumer_class: upstream_governance_register
    consumer_ref: artifacts/governance/labs_register.yaml
    consumed_fields:
      - labs_id
      - experiment_ref
      - inventory_group
      - visibility_state
    notes: >
      Contributor-visible Labs inventory projection. Every
      audience_class = contributor_visible_labs row in this seed
      resolves to one labs_register.yaml row via labs_projection_ref.

  - consumer_id: feature_flag_policy_landing
    consumer_class: docs_or_help_surface
    consumer_ref: docs/governance/feature_flag_policy.md
    consumed_fields:
      - lifecycle_state_class
      - default_posture_class
      - kill_switch
      - rollback_path
      - graduation_retirement_path_class
    notes: >
      Existing policy doc the seed is governed by. It already defines
      the lifecycle / posture / kill-switch vocabulary the seed pins.

  - consumer_id: experiments_and_labs_seed_validator
    consumer_class: ci_schema_validator
    consumer_ref: tests/governance/m1_experiments_and_labs_seed_lane/run_m1_experiments_and_labs_seed_lane.py
    consumed_fields:
      - schema_version
      - matrix_id
      - row_kind_class_vocabulary
      - audience_class_vocabulary
      - lifecycle_state_class_vocabulary
      - public_label_class_vocabulary
      - failure_drill_id_vocabulary
      - named_runtime_consumers
      - entries
    notes: >
      Unattended validation runner that asserts envelope, row schema,
      cross-register source-id resolution, conditional invariants,
      coverage, and named runtime consumer existence on disk.

