# Program dependency ledger.
#
# Canonical blocker/dependency register for milestone and workstream
# governance. This file tracks dependencies between lanes, decisions,
# evidence, and freeze exceptions. It is distinct from
# dependency_register.yaml, which tracks third-party software choices.

schema_version: 1

policy_refs:
  blocker_aging_slas: docs/governance/blocker_aging_slas.md
  commitment_rebaseline_policy: docs/governance/commitment_and_rebaseline_policy.md
  decision_index: artifacts/governance/decision_index.yaml
  scorecard: artifacts/milestones/M0_scorecard.yaml
  risk_register: artifacts/milestones/M0_risk_register.yaml
  planning_backlog: artifacts/planning/m1_m2_work_breakdown.yaml
  architecture_pack: artifacts/milestones/M0_architecture_pack/packet_index.yaml

status_classes:
  - open
  - satisfied
  - none_required
  - watch

blocker_classes:
  - architecture_freeze_blocker
  - stale_evidence
  - owner_gap
  - unresolved_waiver

decision_points:
  - id: architecture_freeze_close
    title: M0 architecture-freeze close
    due_on: "2026-04-30"
    ref: artifacts/milestones/M0_architecture_pack/packet_index.yaml
  - id: prototype_lock
    title: M1 prototype lock
    due_on: "2026-08-31"
    ref: artifacts/milestones/M0_architecture_pack/packet_index.yaml
  - id: first_claim_widening
    title: First public, partner, or release-grade claim widening
    due_on: before_the_change_lands
    ref: docs/governance/commitment_and_rebaseline_policy.md
  - id: supportability_alpha_gate
    title: First release-evidence or supportability alpha gate beyond seed posture
    due_on: before_m2_release_evidence_alpha
    ref: artifacts/planning/m1_m2_work_breakdown.yaml

dependency_rows:
  - dependency_id: progdep.renderer_native_window_viability
    status: open
    blocker_class: architecture_freeze_blocker
    owner_dri: "@ahmeddyounis"
    blocked_asset_or_workstream: >
      Renderer viability for the first non-spike shell surface and any
      M1 shell breadth that assumes native-window proof.
    upstream_contract_or_evidence_rows:
      - artifacts/governance/decision_index.yaml#D-0001
      - docs/adr/0002-renderer-text-stack-and-shaping-fallback.md
      - artifacts/render/spike_capabilities.json
      - docs/design/shell_spike_composition_notes.md
      - artifacts/milestones/M0_risk_register.yaml#RISK-001
    latest_safe_decision_point:
      decision_point_id: prototype_lock
      due_on: "2026-08-31"
    fallback_if_slipped: >
      Keep shell breadth narrowed to the spike-proven, headless,
      single-surface posture and do not promote native-window or
      accessibility-bridge readiness.
    affected_milestone_gates:
      - M0 renderer viability may not move above yellow.
      - M1 daily-dogfood shell breadth must stay narrowed until proof exists.

  - dependency_id: progdep.shell_host_keyboard_freeze
    status: open
    blocker_class: architecture_freeze_blocker
    owner_dri: "@ahmeddyounis"
    blocked_asset_or_workstream: >
      Non-throwaway shell home, keyboard-complete command graph, and any
      M1 or CLI breadth that assumes those decisions are closed.
    upstream_contract_or_evidence_rows:
      - artifacts/governance/decision_index.yaml#D-0006
      - artifacts/governance/decision_index.yaml#D-0007
      - docs/commands/command_descriptor_contract.md
      - docs/ux/attention_activity_taxonomy.md
      - artifacts/milestones/M0_risk_register.yaml#RISK-006
    latest_safe_decision_point:
      decision_point_id: prototype_lock
      due_on: "2026-08-31"
    fallback_if_slipped: >
      Keep the shell hosted in the spike lane, ship only the default
      keyboard path with explicit unsupported-scheme copy, and block
      parity claims for broader command-system coverage.
    affected_milestone_gates:
      - M1 shell and command-system breadth stays narrowed.
      - CLI/headless parity work stays target-only until the host closes.

  - dependency_id: progdep.accessibility_review_packet_home
    status: open
    blocker_class: architecture_freeze_blocker
    owner_dri: "@ahmeddyounis"
    blocked_asset_or_workstream: >
      Accessibility and input review closure, keyboard-complete claims,
      and any install-review or accessibility surface that needs a final
      packet home.
    upstream_contract_or_evidence_rows:
      - artifacts/governance/decision_index.yaml#DEP-0003
      - artifacts/governance/decision_index.yaml#D-0008
      - docs/ux/shell_interaction_safety_contract.md
      - docs/security/safe_preview_trust_classes.md
      - artifacts/milestones/M0_risk_register.yaml#RISK-005
    latest_safe_decision_point:
      decision_point_id: prototype_lock
      due_on: "2026-08-31"
    fallback_if_slipped: >
      Keep accessibility and install-review work hook-only, freeze any
      accessibility-readiness claim, and block keyboard-complete
      language from scorecards or release truth.
    affected_milestone_gates:
      - M0 accessibility/input lane remains red.
      - M1 install-review and accessibility work may not leave hook-only posture.

  - dependency_id: progdep.benchmark_hardware_baseline
    status: open
    blocker_class: stale_evidence
    owner_dri: "@ahmeddyounis"
    blocked_asset_or_workstream: >
      Benchmark lab comparability, release-grade performance claims, and
      the M1 nightly evidence seed once it tries to rise above
      self-capture or provisional posture.
    upstream_contract_or_evidence_rows:
      - docs/governance/benchmark_council_charter.md
      - docs/benchmarks/corpus_governance.md
      - artifacts/bench/protected_metrics.yaml
      - artifacts/benchmarks/dashboard_seed/dashboard.json
      - artifacts/milestones/M0_risk_register.yaml#RISK-002
    latest_safe_decision_point:
      decision_point_id: first_claim_widening
      due_on: before_the_change_lands
    fallback_if_slipped: >
      Keep dashboards and benchmark output labeled as self-capture,
      seed, or provisional only and block public-comparison or
      release-grade performance claims.
    affected_milestone_gates:
      - M0 benchmark governance stays yellow.
      - M1 supportability/public-truth evidence may not present benchmark data as release-grade.

  - dependency_id: progdep.exact_build_cleanroom_parity
    status: open
    blocker_class: stale_evidence
    owner_dri: "@ahmeddyounis"
    blocked_asset_or_workstream: >
      Exact-build joins across release, docs, support, and clean-room
      evidence; any alpha or public-proof lane that assumes one build
      identity is already closed.
    upstream_contract_or_evidence_rows:
      - artifacts/governance/decision_index.yaml#D-0011
      - artifacts/governance/decision_index.yaml#DEP-0001
      - docs/build/exact_build_identity_model.md
      - docs/build/cleanroom_rebuild_lane.md
      - artifacts/milestones/M0_risk_register.yaml#RISK-004
    latest_safe_decision_point:
      decision_point_id: supportability_alpha_gate
      due_on: before_m2_release_evidence_alpha
    fallback_if_slipped: >
      Keep release evidence, support/export joins, and docs/build truth
      narrowed to seed posture; do not claim cross-family exact-build
      parity or field-diagnosis completeness.
    affected_milestone_gates:
      - M0 release-evidence and docs-public-truth lanes stay yellow or red.
      - M1 supportability/public-truth seed may start, but later release-evidence alpha may not widen without closure.

  - dependency_id: progdep.public_truth_freshness_automation
    status: open
    blocker_class: stale_evidence
    owner_dri: "@ahmeddyounis"
    blocked_asset_or_workstream: >
      Docs/help/service-health freshness enforcement, stale-example
      detection, and any public-truth or support-export claim that needs
      current parity rather than seed-only narrative.
    upstream_contract_or_evidence_rows:
      - docs/adr/0013-docs-help-service-health-truth.md
      - docs/docs/docs_pack_manifest_contract.md
      - docs/governance/evidence_freshness_policy.md
      - artifacts/governance/evidence_freshness_slos.yaml
      - artifacts/milestones/M0_risk_register.yaml#RISK-009
    latest_safe_decision_point:
      decision_point_id: first_claim_widening
      due_on: before_the_change_lands
    fallback_if_slipped: >
      Narrow public copy immediately to the last proven scope, mark
      stale or seed-only truth explicitly, and stop widening
      supportability or migration language.
    affected_milestone_gates:
      - M0 public-truth seeds stay yellow.
      - Later docs/help, support-export, and migration claims narrow automatically when freshness is not current.

  - dependency_id: progdep.extension_publication_policy
    status: open
    blocker_class: architecture_freeze_blocker
    owner_dri: "@ahmeddyounis"
    blocked_asset_or_workstream: >
      Extension-install review, publication, and hosted-review boundary
      claims that depend on accepted extension permission and publisher
      continuity policy.
    upstream_contract_or_evidence_rows:
      - docs/adr/0012-extension-manifest-permission-publisher-policy.md
      - artifacts/milestones/M0_architecture_pack/coverage_and_freeze_exceptions.yaml
      - artifacts/milestones/M0_risk_register.yaml#RISK-007
    latest_safe_decision_point:
      decision_point_id: first_claim_widening
      due_on: before_the_change_lands
    fallback_if_slipped: >
      Keep extension-install, publication, and hosted-review surfaces
      hook-only or local-only or internal-only and block broader trust
      or compatibility claims.
    affected_milestone_gates:
      - M1 install-review work remains hook-only.
      - Extension/publication claims may not widen without an explicit exception or accepted contract.

  - dependency_id: progdep.contract_family_freeze_exceptions
    status: open
    blocker_class: architecture_freeze_blocker
    owner_dri: "@ahmeddyounis"
    blocked_asset_or_workstream: >
      M1 and M2 breadth across contract families that are still tracked
      only as explicit freeze exceptions rather than landed packets or
      accepted ADRs.
    upstream_contract_or_evidence_rows:
      - artifacts/milestones/M0_architecture_pack/coverage_and_freeze_exceptions.yaml
      - artifacts/milestones/M0_architecture_pack/packet_index.yaml
      - artifacts/milestones/M0_risk_register.yaml#RISK-008
    latest_safe_decision_point:
      decision_point_id: first_claim_widening
      due_on: before_the_change_lands
    fallback_if_slipped: >
      Keep the affected family explicitly deferred, open a contract task
      before implementation broadens, or route the widening through an
      approved exception packet.
    affected_milestone_gates:
      - M1 breadth may not widen into deferred contract families by default.
      - M0 architecture-pack freeze exceptions remain binding until replaced.

  - dependency_id: progdep.protected_backup_owner_coverage
    status: open
    blocker_class: unresolved_waiver
    owner_dri: "@ahmeddyounis"
    blocked_asset_or_workstream: >
      Backup-owner coverage for protected lanes and any beta-or-later
      milestone that assumes protected-path ownership is no longer
      waived.
    upstream_contract_or_evidence_rows:
      - artifacts/governance/ownership_matrix.yaml
      - docs/governance/dri_map.md
      - docs/governance/maintainer_coverage_policy.md
      - artifacts/milestones/M0_risk_register.yaml#RISK-003
    latest_safe_decision_point:
      decision_point_id: first_claim_widening
      due_on: before_beta_entry_or_waiver_expiry
    fallback_if_slipped: >
      Keep protected ownership yellow, renew or close the waiver
      explicitly, and rebaseline or narrow any beta-or-later claim that
      assumes staffed backup coverage.
    affected_milestone_gates:
      - M0 ownership stays yellow while the waiver remains open.
      - Beta-entry readiness and later stable-facing protected lanes may not pass on a silent waiver carry-forward.

lane_coverage:
  source_refs:
    m0_scorecard: artifacts/milestones/M0_scorecard.yaml
    m1_workstreams: artifacts/planning/m1_m2_work_breakdown.yaml
  m0_protected_lanes:
    - lane_id: aureline-render
      dependency_ids:
        - progdep.renderer_native_window_viability
      posture: blocked_by_open_dependency
    - lane_id: aureline-buffer
      dependency_ids: []
      posture: none_required
      none_reason: >
        Accepted buffer, undo, and large-file decisions plus the
        prototype and fixture corpus already support M1 start without an
        open upstream blocker.
    - lane_id: aureline-vfs
      dependency_ids: []
      posture: none_required
      none_reason: >
        VFS identity, watcher, and save semantics are already frozen
        strongly enough for M1 implementation planning.
    - lane_id: aureline-text
      dependency_ids: []
      posture: none_required
      none_reason: >
        Text shaping and source-fidelity posture are frozen for the M0
        to M1 handoff; remaining work is execution depth, not an open
        upstream dependency.
    - lane_id: aureline-rpc
      dependency_ids: []
      posture: none_required
      none_reason: >
        RPC transport and schema-toolchain decisions are closed and do
        not depend on an unresolved milestone blocker.
    - lane_id: aureline-telemetry
      dependency_ids: []
      posture: none_required
      none_reason: >
        The telemetry seed has current scope limits, but no unresolved
        upstream decision blocks its M0 closure or M1 reuse.
    - lane_id: shell_command_system
      dependency_ids:
        - progdep.shell_host_keyboard_freeze
        - progdep.contract_family_freeze_exceptions
      posture: blocked_by_open_dependency
    - lane_id: benchmark_lab
      dependency_ids:
        - progdep.benchmark_hardware_baseline
      posture: blocked_by_open_dependency
    - lane_id: release_evidence
      dependency_ids:
        - progdep.exact_build_cleanroom_parity
      posture: blocked_by_open_dependency
    - lane_id: docs_public_truth
      dependency_ids:
        - progdep.exact_build_cleanroom_parity
        - progdep.public_truth_freshness_automation
        - progdep.extension_publication_policy
        - progdep.contract_family_freeze_exceptions
      posture: blocked_by_open_dependency
    - lane_id: support_export
      dependency_ids: []
      posture: none_required
      none_reason: >
        The current yellow posture is execution-depth and integration
        debt, not an open upstream dependency that blocks the seed from
        moving forward.
    - lane_id: design_system_seeds
      dependency_ids: []
      posture: none_required
      none_reason: >
        The remaining gaps are deferred publication breadth and
        execution depth rather than an unresolved upstream contract
        gate.
    - lane_id: accessibility_input_review
      dependency_ids:
        - progdep.accessibility_review_packet_home
      posture: blocked_by_open_dependency
    - lane_id: governance_packets
      dependency_ids: []
      posture: none_required
      none_reason: >
        Governance packet families are landed; program-wide risks still
        consume them, but the lane itself does not depend on an open
        upstream blocker for M0 closure.
  m1_workstreams:
    - workstream_id: m1.shell_command_entry_surfaces
      dependency_ids:
        - progdep.renderer_native_window_viability
        - progdep.shell_host_keyboard_freeze
      posture: partially_blocked
    - workstream_id: m1.editor_io_recovery_core
      dependency_ids: []
      posture: none_required
      none_reason: >
        The workstream depends on landed M0 prototypes and fixtures, not
        on an unresolved program blocker.
    - workstream_id: m1.navigation_search_workset_truth
      dependency_ids: []
      posture: none_required
      none_reason: >
        Search and workset truth are gated by landed M0 contracts and by
        other backlog workstreams, not by an open governance dependency.
    - workstream_id: m1.execution_terminal_target_truth
      dependency_ids:
        - progdep.shell_host_keyboard_freeze
      posture: partially_blocked
    - workstream_id: m1.settings_tokens_activity_state
      dependency_ids: []
      posture: none_required
      none_reason: >
        The workstream is structurally downstream of the shell lane but
        does not carry its own open governance dependency.
    - workstream_id: m1.supportability_public_truth_governance_seed
      dependency_ids:
        - progdep.benchmark_hardware_baseline
        - progdep.exact_build_cleanroom_parity
        - progdep.public_truth_freshness_automation
      posture: partially_blocked
    - workstream_id: m1.automation_cli_seed
      dependency_ids:
        - progdep.shell_host_keyboard_freeze
      posture: partially_blocked
    - workstream_id: m1.accessibility_install_review_hooks
      dependency_ids:
        - progdep.accessibility_review_packet_home
        - progdep.extension_publication_policy
      posture: blocked_to_hook_only
