        posture: admin_forced_enabled
        note: Managed enterprise tenants expect assurance packets on policy events.
    compatibility_horizon:
      min_readable_version: 1
      min_writable_version: 1
      deprecation_window_note: >
        Assurance packet shapes remain readable across compliance audit
        windows.
      sunset_window_note: >
        Assurance fields are retired only after downgrade rules have
        been in effect across at least one audit cycle.
    downgrade_rules:
      - from_schema_version: 2
        to_schema_version: 1
        action: preserve_as_unknown
        note: Unknown assurance fields land in the unknown bag; assurance never silently coerces shape.
      - from_schema_version: 1
        to_schema_version: 1
        action: refuse_export
        note: Assurance export refuses rather than emitting a packet that cannot be reproduced later.
    default_ux_payload_exclusions:
      - exclusion_class: raw_code_bodies
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Assurance packets never embed raw code.
      - exclusion_class: clipboard_contents
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Clipboard contents never appear.
      - exclusion_class: secret_or_token_material
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Secret material never appears.
    separation_rule:
      canonical_family_class: assurance_compliance_packet
      must_not_conflate_with_family_classes:
        - support_bundle_manifest
        - offboarding_exit_packet
        - metering_usage_export
      shared_plumbing_note: >
        Assurance rows may be cited by offboarding and support surfaces
        but are never embedded as if they were support or billing rows.
    sibling_family_links:
      - sibling_entry_ref: offboarding.exit_packet
        sibling_family_class: offboarding_exit_packet
        linkage_class: cited_by_sibling_offboarding_packet
        note: Offboarding packets cite assurance rows for retention/hold proof.
    local_only_lane_posture: local_only_not_available_requires_managed
    local_only_lane_note: >
      Assurance packets are only meaningful on managed lanes. The row
      makes the local-only boundary explicit so a local-only lane does
      not pretend an assurance posture exists.
    governance_links:
      redaction_artifact_refs:
        - docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md
      retention_artifact_refs:
        - docs/governance/record_state_and_policy_simulation_models.md
