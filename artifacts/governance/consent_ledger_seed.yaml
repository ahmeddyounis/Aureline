# Telemetry, diagnostics, and support-export schema registry + consent-ledger seed.
#
# Machine-readable seed backing
#   docs/governance/telemetry_and_support_schema_registry.md
# and conforming row-by-row to
#   schemas/governance/schema_registry_entry.schema.json
# as `schema_registry_entry_row`.
#
# Each row names one governed payload family before shared plumbing (exporter,
# upload queue, redaction profile, manifest writer, CLI stdout, offboarding
# assembler) starts hiding policy differences. The file behaves as a consent
# ledger: for every family it fixes owner, schema identity, consent class,
# endpoint class, per-build-flavor default posture, retention note, sibling
# cross-links, local-only lane posture, default UX-telemetry exclusions, and
# the downgrade rules readers/writers must honor when they encounter a
# schema_version outside the active horizon.
#
# Conformance rules:
#   - Every row conforms to
#     schemas/governance/schema_registry_entry.schema.json.
#   - Consent, endpoint, retention, build-flavor posture, compatibility horizon,
#     downgrade, and exclusion fields stay in separate objects. No row
#     collapses them into one string or one lifecycle label.
#   - Support-bundle manifests, analytics/usage payloads, and offboarding
#     packets remain separate rows even when they share transport or
#     redaction plumbing. Cross-linkage happens via `sibling_family_links`,
#     never by conflating `family_class`.
#   - Default UX-telemetry exclusions (raw code, prompts, repo names, file
#     paths, clipboard contents, full search queries, terminal command
#     payloads, voice audio, secret material, and similar) remain excluded
#     unless a separately reviewed schema, ADR, or waiver explicitly permits
#     them. Such permission is cited via
#     `permitted_by_separate_review_refs`.
#   - Each row's `record_class_id_refs` points at rows in
#     artifacts/governance/record_class_registry.yaml when a governed record
#     class already covers the retention/delete/export posture. Delete,
#     hold, export, and offboarding obligations are inherited from that
#     class rather than redeclared here.
#   - Rows naming a build-flavor posture other than
#     `local_only_safe_default` must explain, in `local_only_lane_note`,
#     why the posture is honest on a local-only lane rather than coercive
#     or ambiguous.

schema_version: 1
schema_ref: schemas/governance/schema_registry_entry.schema.json
overview_page: docs/governance/telemetry_and_support_schema_registry.md
paired_record_class_registry_ref: artifacts/governance/record_class_registry.yaml

rows:
  - record_kind: schema_registry_entry_row
    schema_registry_schema_version: 1
    entry_id: telemetry.ux_product_event
    family_class: ux_product_telemetry
    title: UX product-usage telemetry event
    description: >
      Aggregate usage signal emitted by shell, editor, search, and command
      palette surfaces to describe what broad capability was used, at
      what coarse frequency, and under which build flavor. The family
      never names raw code, raw prompts, repo names, file paths,
      clipboard contents, full search queries, or similar sensitive
      payloads. It does not stand in for crash, diagnostic, support
      bundle, usage-export, or offboarding schemas.
    owner_ref: telemetry_governance
    schema_family_binding:
      schema_ref: schemas/telemetry/ux_product_event.schema.json
      schema_version: 1
      schema_version_uri: https://aureline.dev/schemas/telemetry/ux_product_event.schema.json
      record_class_id_refs:
        - telemetry_contract_schema
    consent_class: explicit_opt_in_required
    endpoint_class: local_authoritative_with_optional_upload
    retention_note: >
      Local aggregate retention follows the telemetry descriptor record
      class; uploaded aggregates close on version-replace or user reset.
      Declining the family never degrades local product function.
    build_flavor_default_posture:
      - build_flavor: dev_local
        posture: disabled_by_default
        note: Developer builds never default-on upload.
      - build_flavor: nightly
        posture: opt_in_only
        note: Nightly may prompt once per install; never each session.
      - build_flavor: preview
        posture: opt_in_only
        note: Preview flavors treat upload as opt-in only.
      - build_flavor: beta
        posture: opt_in_only
        note: Beta flavors treat upload as opt-in only.
      - build_flavor: stable
        posture: opt_in_only
        note: Stable never default-enables upload.
      - build_flavor: lts
        posture: opt_in_only
        note: LTS never default-enables upload.
      - build_flavor: hotfix
        posture: disabled_by_default
        note: Hotfix builds disable upload unless a ticket widens it.
      - build_flavor: portable_stable
        posture: disabled_by_default
        note: Portable flavors default to disabled because there is no stable install profile to attach consent to.
      - build_flavor: portable_preview
        posture: disabled_by_default
        note: Portable preview flavors default to disabled for the same reason.
      - build_flavor: managed_enterprise
        posture: admin_forced_disabled
        note: Managed enterprise admins drive consent; the product never default-enables upload behind their back.
    compatibility_horizon:
      min_readable_version: 1
      min_writable_version: 1
      deprecation_window_note: >
        Old aggregate shapes remain readable for at least one LTS cycle
        after a breaking change is landed.
      sunset_window_note: >
        Writers drop a deprecated field only after the downgrade rule
        below has been in effect for at least one LTS cycle.
    downgrade_rules:
      - from_schema_version: 2
        to_schema_version: 1
        action: drop_field_on_read
        note: Unknown aggregate fields are dropped when projecting down to the prior shape.
      - from_schema_version: 1
        to_schema_version: 1
        action: preserve_as_unknown
        note: Unknown-at-read fields land in the envelope's unknown bag rather than being silently discarded.
    default_ux_payload_exclusions:
      - exclusion_class: raw_code_bodies
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Code bodies never travel through ux product telemetry.
      - exclusion_class: raw_ai_prompts
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: AI prompts are not part of this family.
      - exclusion_class: raw_ai_responses
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: AI responses are not part of this family.
      - exclusion_class: repo_names
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Repo names never appear in aggregates.
      - exclusion_class: file_paths
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: File paths never appear in aggregates.
      - exclusion_class: directory_names
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Directory names never appear in aggregates.
      - exclusion_class: branch_names
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Branch names never appear in aggregates.
      - exclusion_class: clipboard_contents
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Clipboard contents are never sampled.
      - exclusion_class: full_search_queries
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Full search strings are never captured.
      - exclusion_class: user_free_text_input
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Free-text input is never captured.
      - exclusion_class: terminal_command_payloads
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Terminal command payloads are never captured.
      - exclusion_class: raw_environment_variables
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Environment variables are never captured.
      - exclusion_class: raw_hostnames
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Raw hostnames are never captured.
      - exclusion_class: raw_user_identifiers
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Raw user identifiers are never captured.
      - exclusion_class: voice_or_dictation_audio
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Voice audio never travels with this family.
      - exclusion_class: voice_transcripts
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Voice transcripts never travel with this family.
      - exclusion_class: notebook_cell_contents
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Notebook cells never travel with this family.
      - exclusion_class: secret_or_token_material
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Secret/token material never travels with this family.
    separation_rule:
      canonical_family_class: ux_product_telemetry
      must_not_conflate_with_family_classes:
        - crash_diagnostic
        - support_bundle_manifest
        - metering_usage_export
        - offboarding_exit_packet
        - learning_onboarding_telemetry
      shared_plumbing_note: >
        Transport code, redaction profile, and upload queue may be shared
        with crash and support surfaces, but the manifest shape, consent
        prompt, and default posture remain separate.
    sibling_family_links:
      - sibling_entry_ref: telemetry.learning_onboarding_event
        sibling_family_class: learning_onboarding_telemetry
        linkage_class: sibling_must_never_embed_this
        note: Learning/onboarding telemetry remains its own family even if it shares the transport pipe.
    local_only_lane_posture: local_only_safe_default
    local_only_lane_note: >
      On a local-only lane the family simply does not emit. The product
      remains fully functional without any upload path being active.
    governance_links:
      redaction_artifact_refs:
        - docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md
      retention_artifact_refs:
        - docs/governance/record_state_and_policy_simulation_models.md
      source_docs:
        - docs/product/boundary_manifest_strawman.md
        - docs/governance/record_class_governance.md
      boundary_manifest_refs:
        - docs/product/boundary_manifest_strawman.md
    notes: >
      The registry entry names the family. A separately reviewed schema
      document lands the concrete event-row shape; that schema inherits
      every posture field on this row verbatim.

  - record_kind: schema_registry_entry_row
    schema_registry_schema_version: 1
    entry_id: telemetry.learning_onboarding_event
    family_class: learning_onboarding_telemetry
    title: Learning and onboarding telemetry event
    description: >
      Coarse-grained signal describing first-run tour completion,
      onboarding dismissal, docs/help opt-out, and learning-surface
      readiness. Kept separate from ux_product_telemetry so an onboarding
      posture change never leaks into steady-state product telemetry
      posture and vice versa.
    owner_ref: onboarding_governance
    schema_family_binding:
      schema_ref: schemas/telemetry/learning_onboarding_event.schema.json
      schema_version: 1
      schema_version_uri: https://aureline.dev/schemas/telemetry/learning_onboarding_event.schema.json
      record_class_id_refs:
        - telemetry_contract_schema
    consent_class: explicit_opt_in_required
    endpoint_class: local_authoritative_with_optional_upload
    retention_note: >
      Retained locally long enough to deduplicate onboarding prompts;
      uploaded aggregates share the telemetry descriptor record class
      window.
    build_flavor_default_posture:
      - build_flavor: dev_local
        posture: disabled_by_default
        note: Developer builds do not emit onboarding telemetry.
      - build_flavor: nightly
        posture: opt_in_only
        note: Nightly treats onboarding telemetry as opt-in.
      - build_flavor: preview
        posture: opt_in_only
        note: Preview flavors treat onboarding telemetry as opt-in.
      - build_flavor: beta
        posture: opt_in_only
        note: Beta flavors treat onboarding telemetry as opt-in.
      - build_flavor: stable
        posture: opt_in_only
        note: Stable never default-enables onboarding upload.
      - build_flavor: lts
        posture: opt_in_only
        note: LTS never default-enables onboarding upload.
      - build_flavor: hotfix
        posture: disabled_by_default
        note: Hotfix builds do not emit onboarding telemetry.
      - build_flavor: portable_stable
        posture: disabled_by_default
        note: Portable stable has no persistent onboarding state to emit.
      - build_flavor: portable_preview
        posture: disabled_by_default
        note: Portable preview has no persistent onboarding state to emit.
      - build_flavor: managed_enterprise
        posture: admin_forced_disabled
        note: Managed admins drive onboarding posture; the client never widens it unilaterally.
    compatibility_horizon:
      min_readable_version: 1
      min_writable_version: 1
      deprecation_window_note: >
        Old onboarding event shapes remain readable long enough to close
        out deferred first-run flows that were already in progress.
      sunset_window_note: >
        Writers stop emitting a deprecated field only after the
        downgrade rule has been in effect for at least one LTS cycle.
    downgrade_rules:
      - from_schema_version: 2
        to_schema_version: 1
        action: drop_field_on_read
        note: Unknown onboarding-event fields are dropped on read, not silently coerced.
      - from_schema_version: 1
        to_schema_version: 1
        action: preserve_as_unknown
        note: Unknown-at-read fields land in the envelope's unknown bag.
    default_ux_payload_exclusions:
      - exclusion_class: raw_code_bodies
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Never part of onboarding telemetry.
      - exclusion_class: raw_ai_prompts
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Never part of onboarding telemetry.
      - exclusion_class: raw_ai_responses
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Never part of onboarding telemetry.
      - exclusion_class: repo_names
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Repo names never appear.
      - exclusion_class: file_paths
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: File paths never appear.
      - exclusion_class: clipboard_contents
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Clipboard contents never appear.
      - exclusion_class: full_search_queries
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Full queries never appear.
      - exclusion_class: user_free_text_input
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Free-text input never appears.
      - exclusion_class: voice_or_dictation_audio
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Voice audio never travels with this family.
      - exclusion_class: voice_transcripts
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Voice transcripts never travel with this family.
      - exclusion_class: secret_or_token_material
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Secret material never travels with this family.
    separation_rule:
      canonical_family_class: learning_onboarding_telemetry
      must_not_conflate_with_family_classes:
        - ux_product_telemetry
        - crash_diagnostic
        - hosted_review_parity_record
      shared_plumbing_note: >
        Shares redaction profile with ux_product_telemetry but keeps its
        own consent surface, posture row, and audit note so onboarding
        changes never ride on top of steady-state telemetry reviews.
    sibling_family_links:
      - sibling_entry_ref: telemetry.ux_product_event
        sibling_family_class: ux_product_telemetry
        linkage_class: sibling_must_never_embed_this
        note: Onboarding events stand alone; they never inline ux_product events.
    local_only_lane_posture: local_only_safe_default
    local_only_lane_note: >
      On a local-only lane the family simply does not emit. Onboarding
      copy paths remain local and work without telemetry.
    governance_links:
      redaction_artifact_refs:
        - docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md
      retention_artifact_refs:
        - docs/governance/record_state_and_policy_simulation_models.md
      source_docs:
        - docs/governance/record_class_governance.md

  - record_kind: schema_registry_entry_row
    schema_registry_schema_version: 1
    entry_id: diagnostics.crash_payload
    family_class: crash_diagnostic
    title: Crash and diagnostic payload
    description: >
      Crash dump, doctor-probe capture, symbolication input, and
      diagnostic sidecar payloads produced while investigating a local
      or remote failure. The payload is locally authoritative; optional
      upload is explicitly user-gated. The family is distinct from UX
      telemetry, from the support-bundle manifest that may reference it,
      and from usage/offboarding exports.
    owner_ref: diagnostics_governance
    schema_family_binding:
      schema_ref: schemas/support/crash_diagnostic_payload.schema.json
      schema_version: 1
      schema_version_uri: https://aureline.dev/schemas/support/crash_diagnostic_payload.schema.json
      record_class_id_refs:
        - crash_diagnostic_payload
    consent_class: explicit_opt_in_required
    endpoint_class: local_authoritative_with_optional_upload
    retention_note: >
      Local retention is user-owned until export or attachment to a
      managed support case. Managed retention follows the
      crash_diagnostic_payload record class (case close, retention
      floor, or support-policy timer).
    build_flavor_default_posture:
      - build_flavor: dev_local
        posture: enabled_metadata_only
        note: Dev builds keep local-only crash metadata on; upload remains disabled.
      - build_flavor: nightly
        posture: opt_in_only
        note: Upload is opt-in; local capture is always available.
      - build_flavor: preview
        posture: opt_in_only
        note: Upload is opt-in; local capture is always available.
      - build_flavor: beta
        posture: opt_in_only
        note: Upload is opt-in; local capture is always available.
      - build_flavor: stable
        posture: opt_in_only
        note: Upload is opt-in; local capture is always available.
      - build_flavor: lts
        posture: opt_in_only
        note: Upload is opt-in; local capture is always available.
      - build_flavor: hotfix
        posture: opt_in_only
        note: Hotfix flavors still require opt-in before any upload.
      - build_flavor: portable_stable
        posture: opt_in_only
        note: Portable flavors keep crash payloads local-only unless the user explicitly exports.
      - build_flavor: portable_preview
        posture: opt_in_only
        note: Portable flavors keep crash payloads local-only unless the user explicitly exports.
      - build_flavor: managed_enterprise
        posture: admin_policy_gated
        note: Managed admins may route crash payloads through an internal sink with an explicit policy.
    compatibility_horizon:
      min_readable_version: 1
      min_writable_version: 1
      deprecation_window_note: >
        Older crash payload shapes must remain parseable for at least
        one full LTS cycle so retained local captures stay readable.
      sunset_window_note: >
        A deprecated crash-payload field is only removed after its
        downgrade rule has been in place long enough for LTS users to
        migrate their retained local captures.
    downgrade_rules:
      - from_schema_version: 2
        to_schema_version: 1
        action: preserve_as_unknown
        note: Unknown crash-payload fields land in the envelope's unknown bag rather than being silently dropped.
      - from_schema_version: 1
        to_schema_version: 1
        action: refuse_upload
        note: Payloads whose shape cannot be mapped to the active upload schema refuse upload and stay local.
    default_ux_payload_exclusions:
      - exclusion_class: raw_code_bodies
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Raw code bodies are redacted from crash payloads by default.
      - exclusion_class: raw_ai_prompts
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Raw prompts are redacted by default.
      - exclusion_class: raw_ai_responses
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Raw responses are redacted by default.
      - exclusion_class: repo_names
        override_policy: separately_reviewed_opt_in_required
        permitted_by_separate_review_refs:
          - docs/support/support_bundle_contract.md
        note: Repo names may appear only when a separately reviewed support-bundle redaction profile explicitly widens capture.
      - exclusion_class: file_paths
        override_policy: separately_reviewed_opt_in_required
        permitted_by_separate_review_refs:
          - docs/support/support_bundle_contract.md
        note: File paths may appear only under a separately reviewed support-bundle redaction profile.
      - exclusion_class: clipboard_contents
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Clipboard contents are never captured.
      - exclusion_class: full_search_queries
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Full search queries are never captured.
      - exclusion_class: user_free_text_input
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Free-text input is never captured.
      - exclusion_class: terminal_command_payloads
        override_policy: separately_reviewed_opt_in_required
        permitted_by_separate_review_refs:
          - docs/support/support_bundle_contract.md
        note: Terminal excerpts may appear only under a separately reviewed support-bundle redaction profile.
      - exclusion_class: raw_environment_variables
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Environment variables are never captured in raw form.
      - exclusion_class: raw_hostnames
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Raw hostnames are never captured.
      - exclusion_class: raw_user_identifiers
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Raw user identifiers are never captured.
      - exclusion_class: voice_or_dictation_audio
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Voice audio never travels with crash payloads.
      - exclusion_class: voice_transcripts
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Voice transcripts never travel with crash payloads.
      - exclusion_class: secret_or_token_material
        override_policy: never_permitted
        permitted_by_separate_review_refs: []
        note: Secret material is never embedded in crash payloads.
    separation_rule:
      canonical_family_class: crash_diagnostic
      must_not_conflate_with_family_classes:
        - ux_product_telemetry
        - support_bundle_manifest
        - repair_transaction_packet
        - metering_usage_export
      shared_plumbing_note: >
        The support-bundle manifest may embed or reference crash
        payloads, but a crash payload is never the manifest itself and
        never a UX-telemetry event.
    sibling_family_links:
      - sibling_entry_ref: support.bundle_manifest
        sibling_family_class: support_bundle_manifest
        linkage_class: cited_by_sibling_support_bundle
        note: Crash payloads appear in support bundles by reference or as embedded evidence under a reviewed profile.
      - sibling_entry_ref: diagnostics.repair_transaction_packet
        sibling_family_class: repair_transaction_packet
        linkage_class: references_sibling_in_manifest
        note: Repair transactions may cite the crash payload that motivated the repair.
    local_only_lane_posture: local_only_safe_default
    local_only_lane_note: >
      Crash capture stays local-authoritative on every build flavor.
      Upload is strictly user or admin initiated.
    governance_links:
      redaction_artifact_refs:
        - docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md
        - docs/support/support_bundle_contract.md
      retention_artifact_refs:
        - docs/governance/record_state_and_policy_simulation_models.md
      source_docs:
        - docs/support/support_bundle_contract.md
        - docs/support/project_doctor_packet.md
      supportability_refs:
        - docs/support/support_bundle_contract.md
      related_schema_refs:
        - schemas/support/support_bundle.schema.json

  - record_kind: schema_registry_entry_row
    schema_registry_schema_version: 1
    entry_id: diagnostics.repair_transaction_packet
    family_class: repair_transaction_packet
    title: Repair transaction packet
    description: >
      Packet describing a typed repair action, the checkpoint it was
      taken against, the affected storage classes, and the resulting
      destruction/rollback receipt. Kept separate from crash payloads,
      support bundles, and offboarding packets so a repair action is
      never confused with the crash that motivated it.
    owner_ref: supportability_governance
    schema_family_binding:
      schema_ref: schemas/support/recovery_action.schema.json
      schema_version: 1
      schema_version_uri: https://aureline.dev/schemas/support/recovery_action.schema.json
      record_class_id_refs:
        - destruction_receipt_record
    consent_class: implied_for_local_authoritative
    endpoint_class: local_authoritative_with_optional_upload
    retention_note: >
      Retained locally with the repair-case lineage. Managed copies
      follow destruction_receipt_record retention and case close.
    build_flavor_default_posture:
      - build_flavor: dev_local
        posture: enabled_metadata_only
        note: Dev builds keep repair packets local.
      - build_flavor: nightly
        posture: enabled_metadata_only
        note: Repair packets remain local by default on every flavor.
      - build_flavor: preview
        posture: enabled_metadata_only
        note: Repair packets remain local by default.
      - build_flavor: beta
        posture: enabled_metadata_only
        note: Repair packets remain local by default.
      - build_flavor: stable
        posture: enabled_metadata_only
        note: Repair packets remain local by default.
      - build_flavor: lts
        posture: enabled_metadata_only
        note: Repair packets remain local by default.
      - build_flavor: hotfix
        posture: enabled_metadata_only
        note: Repair packets remain local by default.
