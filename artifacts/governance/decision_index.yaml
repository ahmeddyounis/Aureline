      posture: narrow
      description: >
        Freeze the secret broker to a single projection mode
        (alias_only), no reveal affordance, no clipboard projection,
        no session-only fallback, os_keychain on desktop only, and
        block every lane that requires any broader projection
        (provider adapters that need request_header_signer, database
        connection brokers that need broker_callback, signing
        runners that need sign_only, remote-agent brokers, enterprise
        vault integration) until an ADR lands.
      applies_on: "2026-08-01"
      requires_approval_from:
        - security_trust_review
