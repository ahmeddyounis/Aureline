      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 201"
        quote: "Reactive State, Subscription, and Materialized-View Matrix"
    affected_artifacts:
      - crates/aureline-buffer
      - crates/aureline-vfs
      - crates/aureline-rpc
      - crates/aureline-telemetry
      - schemas/runtime/subscription_envelope.schema.json
      - artifacts/architecture/subscription_tradeoff_rows.yaml
      - fixtures/runtime/subscription_examples/
      - docs/adr/
    default_if_unresolved:
      posture: freeze_lane
      description: >
        Hold every cross-subsystem reactive contract at the foundations
        baseline until an ADR lands. Lanes may continue internal work
        but must not export materialized views across the RPC boundary
        until the envelope is frozen.
      applies_on: "2026-07-31"
      requires_approval_from:
        - architecture_council
    linked_assumptions: []
    linked_dependencies: []
    linked_adr: docs/adr/0005-subscription-envelope-and-invalidation-semantics.md
    linked_rfc: null
    superseded_by: []
    decision_history:
      - date: "2026-04-19"
        actor: "@ahmedyounis"
        forum: architecture_council
        outcome: opened
      - date: "2026-04-19"
        actor: "@ahmedyounis"
        forum: architecture_council
        outcome: accept
        notes: >
          Closed by
          docs/adr/0005-subscription-envelope-and-invalidation-semantics.md.
          Freezes the shared subscription envelope that rides on top of
          the event_envelope from ADR 0004 (no transport redefinition),
          the subscription lifecycle state machine (subscribe ->
          snapshot -> delta -> resync_required -> terminal), the
          authoritative-versus-derived posture with authority-class
          vocabulary (workspace_vfs, buffer_editor, derived_knowledge,
          execution, policy_entitlement, provider_overlay) and the
          derivation-class rule that every derived frame carries input
          digests, the freshness taxonomy (authoritative, warming,
          cached, stale, replayed, imported), the completeness taxonomy
          (full, partial, unloaded, unavailable), the stale-reason
          vocabulary (producer_restart, authority_epoch_rolled,
          policy_epoch_changed, watcher_dropped, queue_saturation,
          upstream_input_stale, explicit_refresh_requested,
          cache_served, replayed_from_bundle, imported_from_external,
          scope_removed, causality_lost), the monotonic
          snapshot_epoch-per-(query_family, scope_ref) and
          delta_seq-within-epoch ordering rule, the resubscribe-and-
          full-refresh behaviour after resync_required or terminal,
          the materialized-view-class vocabulary (ephemeral_projection,
          durable_local_materialization, exportable_snapshot,
          managed_replicated_view), the minimal ordering / replay /
          imported-history assumptions (replay and import frames never
          claim authoritative freshness and never advance live producer
          state), the protected-hot-path hook vocabulary
          (subscription_subscribe, subscription_snapshot_emit,
          subscription_delta_emit, subscription_delta_apply,
          subscription_resync_required_emit,
          subscription_freshness_downgrade,
          subscription_completeness_changed,
          subscription_backpressure_coalesce,
          subscription_snapshot_required_switch,
          subscription_terminate, subscription_imported_attach,
          subscription_replay_begin, subscription_replay_end), and the
          schema-of-record posture (Rust types in the subscription crate
          are the source of truth; JSON Schema export under
          schemas/runtime/subscription_envelope.schema.json is the
          cross-tool boundary; no external IDL or code generator
          toolchain at this milestone). Supporting artifacts:
          schemas/runtime/subscription_envelope.schema.json,
          artifacts/architecture/subscription_tradeoff_rows.yaml, and
          fixtures/runtime/subscription_examples/ (ready, partial,
          stale, replayed, failed, imported). The freeze-lane default
          is replaced by the ADR's frozen posture.

