# Decision index.
#
# Machine-readable register of every architecture decision in scope at the
# current milestone. Tooling reads this file; the human-readable narrative
# is in docs/governance/decision_backlog.md. If they disagree, this file is
# authoritative for tooling and the narrative must be updated in the same
# change.
#
# Conformance: this file conforms to
#   schemas/governance/decision_index.schema.json
#
# Rules:
#   - Every decision row MUST name a primary owner, a forum, a freeze date,
#     and a default_if_unresolved posture. No silent blanks.
#   - Every row whose backup_owner is null MUST cite an active waiver from
#     artifacts/governance/ownership_matrix.yaml#waivers.
#   - Superseding a decision mints a new decision_id and points
#     superseded_by at it; the original row is never deleted and its
#     decision_history is append-only.
#   - When status is decided, linked_adr MUST point at the ADR that
#     closed the decision.
#   - When the freeze_by_date passes and the row is still open or
#     deciding, default_if_unresolved applies automatically on
#     applies_on. The row status transitions to narrowed_by_default (or
#     deferred / freeze_lane / rebaselined per the posture) without
#     further approval unless requires_approval_from is populated.

schema_version: 1

# -----------------------------------------------------------------------------
# Assumptions
#
# Linked from decision rows via linked_assumptions. Assumptions are held
# open until validated; if invalidated, any decision that depends on
# them reopens.
# -----------------------------------------------------------------------------
assumptions:
  - id: A-0001
    statement: >
      The project remains in a solo-maintainer posture through the
      pre-implementation foundations milestone; the single-maintainer
      backup waiver covers every protected lane.
    owner: "@ahmedyounis"
    status: open
    validated_on: null

  - id: A-0002
    statement: >
      macOS and Linux are the minimum supported dev hosts for the
      first-beta milestone; Windows has compile parity if feasible but
      not as a blocking constraint.
    owner: "@ahmedyounis"
    status: open
    validated_on: null

  - id: A-0003
    statement: >
      One build identity covers official binaries, docs, schemas, SDK
      artifacts, SBOMs, attestations, symbols, and rollback metadata;
      artifact families do not mint their own build identities.
    owner: "@ahmedyounis"
    status: open
    validated_on: null

# -----------------------------------------------------------------------------
# Dependencies
#
# Linked from decision rows via linked_dependencies. Dependencies describe
# external-to-the-decision work whose absence blocks the decision.
# -----------------------------------------------------------------------------
dependencies:
  - id: DEP-0001
    statement: >
      Reproducible-build baseline is in place (pinned toolchain,
      bootstrap command, build-identity record) before exact-build
      identity can be frozen.
    owner: "@ahmedyounis"
    status: satisfied
    target_date: "2026-04-19"
    notes: >
      Satisfied by docs/build/reproducible_build_baseline.md and the
      bootstrap scripts landed at the foundations milestone.

  - id: DEP-0002
    statement: >
      Ownership matrix and CODEOWNERS are in place so every decision row
      can resolve a forum and an owner.
    owner: "@ahmedyounis"
    status: satisfied
    target_date: "2026-04-19"

  - id: DEP-0003
    statement: >
      Accessibility / input review packet family is seeded so
      input-model and accessibility decisions have an evidence home.
    owner: "@ahmedyounis"
    status: open
    target_date: "2026-06-01"

