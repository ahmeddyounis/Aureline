  - decision_id: D-0003
    title: Workspace VFS path identity and watcher model
    status: decided
    target_milestone: pre-implementation-foundations
    freeze_by_milestone: first-beta-milestone
    freeze_by_date: "2026-07-15"
    decision_deadline: "2026-07-01"
    owner: "@ahmedyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup
    forum: architecture_council
    related_requirement_ids: []
    source_anchors:
