          actor_subject, actor_class, issuing_surface, original_intent,
          action_class in read_only_local_analysis /
          local_workspace_mutation / external_side_effect /
          credential_projection / debug_or_privileged_inspection /
          trust_or_policy_admin_change / browser_handoff /
          deferred_publish_drain / release_publish /
          high_risk_paste_or_injection,
          command_family_or_action_ref, workspace_or_workset_scope_ref,
          target_identity_ref, sandbox_profile_or_capability_hash,
          projection_mode_ref, browser_handoff_packet_ref,
          execution_context_id, policy_epoch, trust_state, issued_at /
          expires_at, use_posture in single_use / bounded_reuse /
          session_scoped with session_scoped forbidden for
          release_publish and trust_or_policy_admin_change,
          rememberable_scope forbidden for release_publish,
          trust_or_policy_admin_change, and signing-class credential
          projection, high_risk_flags, step_up_required_flag,
          rollback_checkpoint_ref, preview_ref, ticket_lineage,
          revoke_epoch, revoke_reason, redaction_class,
          audit_metadata) with ticket minting restricted to shell /
          policy / supervisor and AI flows / extensions / recipes /
          remote helpers forbidden from granting themselves authority;
          the high-risk flag set (irreversible_external_effect,
          publishes_release_artifact, grants_admin_authority,
          widens_egress_posture, reveals_secret_material,
          mutates_shared_infrastructure, destructive_local_action,
          cross_tenant_effect) with an approval-time and spend-time
          gating rule per flag and a high_risk_gating_missing denial at
          issue when a rule is absent; the grant-resolution reason
          codes (allowed, allowed_with_downgrade,
          allowed_with_browser_handoff, allowed_with_deferred_publish,
          denied_scope_missing, denied_policy_bundle,
          denied_workspace_trust, denied_actor_class_forbidden,
          denied_target_conflict, denied_freshness_floor,
          denied_revoked, denied_suspended, denied_host_mismatch,
          denied_approval_ticket_missing,
          denied_approval_ticket_expired, denied_step_up_required,
          denied_unreachable, denied_unknown_actor_class) and the
          ticket / packet denial-reason extensions
          (approval_ticket_missing, approval_ticket_expired,
          approval_ticket_revoked, approval_ticket_step_up_required,
          ticket_widening_forbidden, ticket_lineage_broken,
          high_risk_gating_missing, browser_handoff_replay_invalid,
          browser_handoff_origin_mismatch, browser_handoff_revoked,
          origin_signature_invalid,
          ai_initiated_mutation_without_ticket,
          remote_helper_mutation_without_ticket, unknown_actor_class,
          deferred_publish_drain_unsafe) with fail-closed semantics
          that never silently downgrade mutation mode; the
          origin-disclosure and replay-safety rules (signed
          intent_signature binds packet_id, destination_class,
          destination_ref, object_identity, reason_code,
          expected_authority_on_destination, origin_disclosure,
          replay_posture, issued_at, expires_at; inbound callbacks
          validate origin_disclosure and replay_posture; single_use
          default, bounded_reuse on an explicit counter,
          read_only_resumable only for read-only anchors; idempotent by
          external delivery identity plus scoped object reference); the
          redaction-default posture across logs_local, traces_local,
          support_bundle, evidence_packet, ai_context_capture,
          recipe_manifest, profile_export / sync, crash_dump,
          mutation_journal_entry, save_manifest,
          replay_or_timeline_capture, terminal_transcript, and
          clipboard_projection with narrowing-only overrides; the
          audit-event id set on the provider_handoff stream
          (connected_provider_linked / unlinked / health_changed,
          actor_class_resolved, grant_scope_resolved, grant_revoked /
          suspended, provider_action_proposed / denied / deferred /
          published / rolled_back, browser_handoff_packet_issued /
          launched / callback_validated / callback_rejected / revoked,
          approval_ticket_issued / spent / denied / expired / revoked /
          step_up_required / rolled_back, high_risk_gating_missing,
          deferred_publish_queue_drained / rejected,
          policy_epoch_rolled_invalidations,
          provider_handoff_schema_version_bumped) with raw tokens /
          raw URLs / raw callback bodies forbidden on every audit
          event; the process-boundary constraints (raw URLs / raw
          delegated-token bytes / raw release-publish tokens / raw
          callback bodies never cross RPC; approval tickets minted in
          the host process by shell / policy / supervisor only;
          remote-agent ticket issuance forbidden; extensions, AI tool
          calls, recipes, and untrusted child processes reach provider
          mutations through the shell adapter surface and MAY NOT
          forge, cache, or forward tickets; crash dumps and core files
          MUST NOT inherit projected tickets or packets or
          delegated-token credential handles; mutation-journal entries
          and save manifests name approval_ticket_ref /
          browser_handoff_packet_ref / actor_class /
          grant_resolution_reason / connected_provider_record_id
          only); and the schema-of-record posture (Rust types in the
          eventual connected-provider / approval-ticket crates are the
          source of truth; the JSON Schema exports at
          schemas/integration/browser_handoff_packet.schema.json and
          schemas/integration/approval_ticket.schema.json are the
          cross-tool boundary; no external IDL or code-generator
          toolchain at this milestone; mirrors ADR 0004, ADR 0005,
          ADR 0006, ADR 0007, ADR 0008, and ADR 0009). Rides ADR 0001
          (identity modes cap provider-mutation execution across
          managed, self-hosted, and account-free local), ADR 0004
          (browser_handoff_packet and approval_ticket_record cross the
          RPC boundary as typed payloads), ADR 0005 (every
          provider-visible frame carries an authority class and a
          freshness hint; provider_overlay now names the
          connected-provider record class and actor-class vocabulary
          frozen here), ADR 0006 (save manifests name
          approval_ticket_ref, not raw approval state), ADR 0007
          (provider mutations reference a credential_alias handle;
          projection_mode_ref names the projection mode; raw delegated-
          token bytes never cross RPC), ADR 0008 (admin policy
          narrowing evaluated as an orthogonal ceiling that may pin a
          mutation mode, forbid an actor class, raise approval-ticket
          expiry floors, or require step-up on additional high-risk
          flags), and ADR 0009 (every approval ticket and every browser
          handoff names an execution_context_id). The narrowing
          default is replaced by the ADR's frozen posture; the
          narrowed inspect-only-and-cached-docs-only posture does not
          apply.

  - decision_id: D-0017
    title: Capability lifecycle and dependency-marker vocabulary
    status: decided
    target_milestone: pre-implementation-foundations
    freeze_by_milestone: first-beta-milestone
    freeze_by_date: "2026-09-15"
    decision_deadline: "2026-09-01"
    owner: "@ahmedyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup
    forum: product_scope_review
    related_requirement_ids: []
    source_anchors:
      - doc: .t2/docs/Aureline_PRD.md
        anchor: "lifecycle, release, and support sections"
        quote: "normative MUST / SHOULD language on lifecycle posture, support class, and release channel discipline"
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "capability-lifecycle architecture discussion"
        quote: "how capability lifecycle, support class, release channel, freshness, and client scope decompose across product, docs, support, and release"
      - doc: .t2/docs/Aureline_Technical_Design_Document.md
        anchor: "capability surfaces, dependency propagation, and disabled / deprecated / retired posture"
        quote: "detailed component discussion of capability surfaces on settings, bundles, commands, and support exports"
      - doc: .t2/docs/Aureline_Milestones_Document.md
        anchor: "lifecycle posture of milestone deliverables"
        quote: "which capabilities land in which channels, which carry extended support, and which explicitly stay in labs / preview / beta posture"
      - doc: docs/product/boundary_manifest_strawman.md
        anchor: "residual-dependency and self-hostable narrowing posture"
        quote: "residual-dependency placeholders and explicit local-core continuity notes so later claim packets do not retrofit these fields inconsistently"
    affected_artifacts:
      - docs/adr/0011-capability-lifecycle-and-dependency-markers.md
      - schemas/governance/capability_lifecycle.schema.json
      - artifacts/governance/dependency_marker_examples.yaml
      - governance_lane:product_scope_review
      - governance_lane:release_council
      - governance_lane:docs_public_truth
      - governance_lane:support_export
      - governance_lane:governance_packets
    default_if_unresolved:
      posture: narrow
      description: >
        Freeze the product to a two-state experimental / stable
        vocabulary with no dependency markers, no separate support /
        channel / freshness / client-scope axes, no disabled_by_policy
        state, and no retired state; block every lane that needs a
        broader lifecycle or dependency vocabulary (settings, bundles,
        command / install review, docs / help, support-export,
        release-evidence, claim-manifest, and the reserved SDK / API
        surface) until an ADR lands.
      applies_on: "2026-09-15"
      requires_approval_from:
        - product_scope_review
    linked_assumptions:
      - A-0001
    linked_dependencies: []
    linked_adr: docs/adr/0011-capability-lifecycle-and-dependency-markers.md
    linked_rfc: null
    superseded_by: []
    decision_history:
      - date: "2026-04-19"
        actor: "@ahmedyounis"
        forum: product_scope_review
        outcome: opened
      - date: "2026-04-19"
        actor: "@ahmedyounis"
        forum: product_scope_review
        outcome: accept
        notes: >
          Closed by
          docs/adr/0011-capability-lifecycle-and-dependency-markers.md.
          Freezes five orthogonal axes (lifecycle_state, support_class,
          release_channel, freshness_class, client_scope) that every
          capability row carries independently even when a UI chip
          collapses them visually; the lifecycle_state vocabulary
          (labs, preview, beta, stable, lts_facing, deprecated,
          disabled_by_policy, retired) with monotonic transition rules
          and two admissible non-monotonic moves (preview -> labs
          announced on the audit stream; any non-retired ->
          disabled_by_policy as an orthogonal move); the
          support_class set (best_effort, community_supported,
          standard_support, extended_support, operator_only_support,
          no_support); the release_channel set (nightly_channel,
          experimental_channel, preview_channel, stable_channel,
          lts_channel, managed_only_channel); the freshness_class set
          (authoritative_live, warm_cached, degraded_cached, stale,
          unverified); the client_scope set (desktop_product, cli,
          companion_surface, remote_agent, sdk_or_api,
          managed_admin_surface); the dependency_marker_record shape
          (dependency_marker_id, dependency_marker_schema_version,
          marker_kind, parent_capability_ref,
          dependency_capability_ref, dependency_lifecycle_state,
          dependency_support_class, dependency_release_channel,
          dependency_freshness_class, dependency_client_scope,
          effect_on_parent, reason_code, repair_hook_ref,
          disclosure_summary, declared_at, refreshed_at, cleared_at,
          policy_context, redaction_class) with the marker_kind set
          (non_stable_capability_dependency,
          disabled_by_policy_dependency, deprecated_dependency,
          retired_dependency, provider_linked_dependency,
          client_scope_restricted_dependency,
          freshness_floor_dependency, kill_switch_dependency,
          managed_only_dependency), the effect_on_parent set
          (narrows_effective_lifecycle_state,
          narrows_effective_support_class,
          narrows_effective_release_channel,
          narrows_effective_freshness_class,
          narrows_effective_client_scope, gates_entire_capability),
          the reason_code set
          (dependency_state_below_parent_declared_state,
          dependency_disabled_by_policy,
          dependency_kill_switch_tripped,
          dependency_deprecated_within_window, dependency_retired,
          provider_grant_narrowed, provider_connection_unhealthy,
          client_scope_excludes_surface, freshness_floor_unmet,
          managed_only_channel_required), and a typed repair_hook_ref
          vocabulary (enable_feature_flag,
          request_admin_policy_change, request_provider_link,
          reconnect_provider, upgrade_release_channel,
          refresh_freshness, migrate_to_replacement,
          request_managed_access, contact_support); the render-time
          downgrade rule (effective_lifecycle_state is the monotonic
          meet of declared_lifecycle_state and every live dependency
          marker's contribution along its named axis, with
          disabled_by_policy and retired absorbing; declared state is
          an upper bound and dependency markers only narrow it; the
          meet is recomputed on every render and not cached past the
          freshness window); the projection requirements for settings
          rows, bundle cards, command / install review, docs / help
          pages, support / export, claim manifests, and the reserved
          SDK / API surface with chip-collapse a UI freedom but
          record addressability mandatory; the audit-event id set on
          the capability_lifecycle audit stream
          (capability_lifecycle_row_created / updated / deprecated /
          retired / disabled_by_policy / re_enabled,
          dependency_marker_minted / updated / cleared /
          repair_unavailable / stale_not_refreshed,
          effective_lifecycle_state_narrowed / absorbed,
          kill_switch_tripped, lifecycle_claim_refused,
          capability_lifecycle_schema_version_bumped) with raw
          provider tokens, raw policy-bundle bytes, and raw
          kill-switch material forbidden on every event; the
          denial-reason set (lifecycle_state_unresolved,
          axis_value_not_in_vocabulary,
          declared_state_below_dependency_ceiling,
          dependency_marker_repair_unavailable,
          effective_state_absorbed_by_retirement,
          freshness_floor_unmet, client_scope_excludes_surface,
          disabled_by_policy_no_repair_hook, kill_switch_tripped,
          managed_only_channel_required,
          claim_effective_state_below_declared,
          review_disclosure_incomplete) with fail-closed semantics
          that never silently downgrade to a generic unavailable
          chip; the process-boundary constraints (row and marker
          records cross RPC as typed payloads; raw provider tokens,
          raw policy-bundle bytes, and raw kill-switch material never
          cross; extensions and AI tool calls read lifecycle rows
          only through the shared subscription envelope with
          authority class derived_knowledge and a declared freshness
          hint; remote-agent attach surfaces carry a remote-scoped
          capability view whose client scope is remote_agent; crash
          dumps do not inherit unresolved lifecycle projections;
          mutation-journal entries, save manifests, support bundles,
          and claim manifests name row ids and marker ids only); the
          redaction-default posture across logs_local, traces_local,
          support_bundle, evidence_packet, ai_context_capture,
          recipe_manifest, profile_export / sync, crash_dump,
          mutation_journal_entry, save_manifest, claim_manifest, and
          terminal_transcript with narrowing-only overrides; and the
          schema-of-record posture (Rust types in the eventual
          capability-lifecycle crate are the source of truth; the
          JSON Schema export at
          schemas/governance/capability_lifecycle.schema.json is the
          cross-tool boundary; no external IDL or code-generator
          toolchain at this milestone; mirrors ADR 0004, ADR 0005,
          ADR 0006, ADR 0007, ADR 0008, ADR 0009, and ADR 0010).
          Rides ADR 0008 (the settings resolver's lifecycle_label,
          control_stack, and capability_dependencies fields name the
          vocabulary frozen here), ADR 0010 (the grant-resolution-
          reason set is reused by provider_linked_dependency markers
          rather than minting parallel vocabulary), ADR 0001 (the
          managed / self-hosted / account-free-local identity modes
          gate the managed_only_channel release channel and the
          managed_admin_surface client scope), and ADR 0005
          (projected lifecycle views ride the shared subscription
          envelope with authority class derived_knowledge and a
          declared freshness hint). The narrowing default is replaced
          by the ADR's frozen posture; the experimental / stable
          toggle narrowing does not apply.

