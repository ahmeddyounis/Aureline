  # ---------------------------------------------------------------------------
  - decision_id: LR-0007
    title: Exact-build identity and signing quorum
    decision_statement: >
      Freeze the rule that one build identity covers official
      binaries, docs-pack, schemas, SDK artifacts, SBOMs,
      attestations, symbols, and rollback metadata, and freeze the
      signing quorum, key-class set, and emergency-quorum
      substitution rule that admits a release bundle to the
      distribution channel.
    decision_kind: release
    decision_vehicle_class: release_decision
    current_state: open
    commitment_class: Committed
    target_milestone: pre-implementation-foundations
    freeze_by_milestone: first-beta-milestone
    freeze_by_date: "2026-06-29"
    decision_deadline: "2026-06-15"
