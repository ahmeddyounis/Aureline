  - decision_id: LR-0001
    title: Launch language and framework bundle
    decision_statement: >
      Freeze the set of languages, runtimes, and first-party
      frameworks the first beta is built on and the set that
      first-party extensions and in-tree tooling may take a hard
      dependency on.
    decision_kind: product_scope
    decision_vehicle_class: sponsor_scope_decision
    current_state: open
    commitment_class: Committed
    target_milestone: pre-implementation-foundations
    freeze_by_milestone: first-beta-milestone
    freeze_by_date: "2026-06-29"
    decision_deadline: "2026-06-15"
    applies_on: "2026-06-29"
    owner_forum: product_scope_review
    owner_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup
    evidence_owner: "@ahmeddyounis"
    narrower_default:
      posture: narrow
      description: >
        Freeze the bundle to the minimum set the staffed lanes can
        defend: Rust as the sole implementation language for
        protected-path code, the existing Cargo workspace layout, no
        additional runtime languages or frameworks admitted into
        first-party crates or tooling, and no additional language
        server, compiler, or runtime promised as a launch-bearing
        first-party surface. Wider bundles reopen as a new launch
        row; they do not ride this row as hidden carry-forward.
      requires_approval_from: []
    public_claim_posture_while_open:
      allowed_posture: >
        Public materials may describe Aureline as a Rust-based
        desktop IDE; no additional launch-bearing languages,
        runtimes, or frameworks may be named in public copy until
        this row closes.
      forbidden_claim_surfaces:
        - "first-party SDK surface in any non-Rust language"
        - "in-tree extension host for any runtime beyond the wasm/WIT host frozen by the compatibility row"
        - "launch-bearing support for additional GUI toolkits"
    linked_assumptions:
