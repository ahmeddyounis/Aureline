  # ---------------------------------------------------------------------------
  # Open / local vs managed boundary
  # ---------------------------------------------------------------------------
  - decision_id: LR-0003
    title: Open / local versus managed boundary
    decision_statement: >
      Freeze the boundary between local-first open-source core
      behaviour and managed-cloud or hosted-service-dependent
      behaviour, including the rule that local desktop operation
      MUST NOT take a runtime dependency on hosted service-schema
      discovery or a live service-identity front door.
    decision_kind: product_scope
    decision_vehicle_class: sponsor_scope_decision
    current_state: open
    commitment_class: Committed
    target_milestone: pre-implementation-foundations
    freeze_by_milestone: first-beta-milestone
    freeze_by_date: "2026-06-29"
    decision_deadline: "2026-06-15"
    applies_on: "2026-06-29"
    owner_forum: product_scope_review
    owner_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup
    evidence_owner: "@ahmeddyounis"
    narrower_default:
      posture: narrow
      description: >
        Freeze the boundary at the residual-dependency ledger posture:
        local editing, save, search, local git, tasks, export,
        diagnostics, and docs-inspect stay at available_local_safe
        with no required hosted dependency; every optional managed
        service is gated behind the api_capability_row contract with
        local_core_blocking pinned false and live_discovery_against_service
        forbidden; AI, companion-surface, and managed-broker surfaces
        degrade to cached last-known-good under explicit stale-cache
        labels when the managed plane is unreachable. Wider
        managed-required scope reopens as a new launch row.
      requires_approval_from: []
    public_claim_posture_while_open:
      allowed_posture: >
        Public materials may claim local-first operation and that
        managed services are optional; they may not imply that
        hosted services are prerequisites for local-core value or
        that the local core takes a runtime dependency on hosted
        schema discovery.
      forbidden_claim_surfaces:
        - "any statement that the desktop requires a hosted service to boot, edit, save, search, or export"
        - "any statement implying managed-cloud is the default home"
    linked_assumptions:
