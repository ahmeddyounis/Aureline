# Launch decision register.
#
# Canonical machine-readable register of every launch-critical decision
# whose ambiguity would damage the first-beta claim if it survived the
# milestone-zero review cycle. Companion to the rolling decision index
# (artifacts/governance/decision_index.yaml): the launch register is the
# product- and sponsor-scope projection keyed on LR-NNNN ids, the
# decision index is the architecture-ADR projection keyed on D-NNNN ids.
# Architecture-pack and milestone-scorecard artifacts cite ids from
# both registers without inventing parallel status fields.
#
# Conformance: this file conforms to
#   schemas/governance/decision_register.schema.json
#
# Narrower-default automation: artifacts/governance/decision_defaults.yaml
# conforms to schemas/governance/decision_defaults.schema.json and
# describes when each row's narrower_default fires automatically on
# applies_on, when it requires forum sign-off, and how the sample
# freeze report projects unresolved rows past their deadline as
# explicit narrow-scope outcomes rather than "TBD".
#
# Rules:
#   - Every row MUST name an owner_forum, owner_dri, evidence_owner,
#     commitment_class, freeze_by_date, decision_deadline, applies_on,
#     narrower_default posture and description, a public-claim posture
#     the product may use while the row is open, an affected_artifacts
#     list with at least one entry, and at least one linked assumption
#     or dependency row (launch-register LA/LDEP or rolling-index
#     A/DEP).
#   - Every row whose backup_owner is null MUST cite an active waiver
#     from artifacts/governance/ownership_matrix.yaml#waivers.
#   - Superseding a row mints a new LR-NNNN and points superseded_by at
#     it; the original row is never deleted and decision_history is
#     append-only.
#   - When a row's freeze_by_date passes with current_state still open
#     or deciding, narrower_default applies automatically on applies_on
#     unless requires_approval_from is non-empty; the posture moves the
#     row to narrowed_by_default, deferred, a freeze_lane hold, or
#     rebaseline review per artifacts/governance/decision_defaults.yaml.

schema_version: 1

source_specs:
  - .t2/docs/Aureline_PRD.md
  - .t2/docs/Aureline_Technical_Architecture_Document.md
  - .t2/docs/Aureline_Technical_Design_Document.md
  - .t2/docs/Aureline_Milestones_Document.md
  - docs/governance/commitment_and_rebaseline_policy.md
  - docs/governance/decision_workflow.md

# -----------------------------------------------------------------------------
# Launch-register assumptions. Rolling-index A-NNNN assumptions are
# cited via linked_decision_index_assumptions; launch-specific premises
# that do not yet live in the decision index live here with LA-NNNN ids.
# -----------------------------------------------------------------------------
assumptions:
  - id: LA-0001
    statement: >
      The first-beta launch posture is desktop-local / local-first as
      the primary product home, with managed-cloud as an optional
      companion surface; hosted services are not prerequisites for
      local-core value. Invalidating this assumption reopens every
      row whose narrower default is bounded by a desktop-first scope.
    owner: "@ahmeddyounis"
    status: open
    validated_on: null

  - id: LA-0002
    statement: >
      The first-beta product claim is bounded by what the currently
      staffed lanes can defend with current evidence; wider claims
      ride an explicit claim-narrowing or rebaseline record rather
      than surviving as implied scope.
    owner: "@ahmeddyounis"
    status: open
    validated_on: null

  - id: LA-0003
    statement: >
      The launch register binds one decision id per launch-critical
      topic; downstream artifacts cite that id and do not mint
      parallel status fields. Invalidating this reopens the
      scorecard-to-register cross-reference contract.
    owner: "@ahmeddyounis"
    status: open
    validated_on: null

  - id: LA-0004
    statement: >
      Public claims bearing numeric benchmark, migration, or
      compatibility language require a linked claim-manifest row and
      current evidence; no numeric launch claim rides this register
      without that linkage.
    owner: "@ahmeddyounis"
    status: open
    validated_on: null

  - id: LA-0005
    statement: >
      The launch accessibility certification scope is WCAG AA on the
      keyboard-complete command graph and renderer-level contrast
      obligations; wider certification claims do not survive launch
      without a linked accessibility-review packet.
    owner: "@ahmeddyounis"
    status: open
    validated_on: null

