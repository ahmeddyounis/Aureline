      description: >
        Freeze signing at the foundations quorum already seeded in
        artifacts/governance/signing_quorum.yaml and the
        one-build-identity rule in decision-index A-0003: a release
        bundle admits only when the official binary, docs-pack,
        schema bundle, SDK artifacts, SBOM, attestation set, symbol
