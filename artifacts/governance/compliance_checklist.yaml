# Compliance checklist.
#
# Bridge artifact and sweep ledger for repository-wide compliance work.
# Canonical dependency rows now live in dependency_register.yaml,
# third_party_import_register.yaml, and release_notice_seed.yaml. This
# file exists so tooling and reviewers have one narrow place to find the
# canonical-register refs plus any deferred repository-wide sweeps.

schema_version: 2

canonical_registers:
  dependency_register: artifacts/governance/dependency_register.yaml
  third_party_import_register: artifacts/governance/third_party_import_register.yaml
  release_notice_seed: artifacts/governance/release_notice_seed.yaml
  dependency_review_policy: docs/governance/dependency_review_policy.md

checklist_items:
  - id: dependency_rows_live_in_canonical_register
    description: >
      Every selected or admitted third-party dependency lands in
      dependency_register.yaml; this checklist does not duplicate those
      rows.
    status: active

  - id: import_rows_live_in_canonical_register
    description: >
      Every copied, bundled, or mirrored third-party byte lands in
      third_party_import_register.yaml; this checklist does not
      duplicate those rows.
    status: active

  - id: notice_generation_reuses_source_ids
    description: >
      release_notice_seed.yaml keys off source ids from the canonical
      registers above; manual copy tables with separate notice ids are
      forbidden.
    status: active

# -----------------------------------------------------------------------------
# Sweep ledger.
# -----------------------------------------------------------------------------
sweeps:
  - id: reuse-backfill-foundations
    description: >
      One-shot SPDX header sweep across files that pre-date this
      baseline. New and modified files already comply via CONTRIBUTING.md
      and the dependency review policy; the sweep brings legacy untouched
      files into coverage so the eventual REUSE-lint gate is clean.
    target_milestone: foundations
    owner: "@ahmeddyounis"
    status: proposed
    notes: >
      Tracked here because it is a repository-wide housekeeping action,
      not a third-party dependency or import row.
