# Critical dependency register.
#
# Canonical register of third-party dependencies that either:
#   1. are already required to build, verify, or generate repository
#      artifacts; or
#   2. have been selected in an ADR for a protected path and therefore
#      need an owner, health review, and exit strategy before manifest
#      admission.
#
# This file records upstream choices and fragility. It does not track
# copied or mirrored third-party bytes; those live in
# third_party_import_register.yaml. It also does not mint a second
# notice-id system; release_notice_seed.yaml keys off the ids in this
# register and in the import register.

schema_version: 1

policy_doc: docs/governance/dependency_review_policy.md
companion_registers:
  build_vs_buy_register: artifacts/governance/build_vs_buy_register.yaml
  third_party_import_register: artifacts/governance/third_party_import_register.yaml
  release_notice_seed: artifacts/governance/release_notice_seed.yaml
  compliance_bridge: artifacts/governance/compliance_checklist.yaml
  upstream_health_scorecard: artifacts/governance/upstream_health_scorecard.yaml

update_cadence_classes:
  - per_change
  - on_pin_change
  - quarterly
  - per_release

admission_state_classes:
  - admitted_repo_tooling
  - selected_not_admitted

version_track_classes:
  - pinned_in_repo
  - selected_candidate_unpinned
  - host_runtime_unpinned

license_class_classes:
  - permissive_oss
  - permissive_oss_expected_pending_admission
  - redistributable_font_expected_pending_import
  - permissive_runtime
  - strong_copyleft_runtime
  - permissive_toolchain_runtime

provenance_status_classes:
  - pinned_in_repo_and_observed
  - selected_by_adr_not_manifested
  - host_runtime_required_not_pinned

health_status_classes:
  - machine_refresh_seeded
  - manual_review_seeded
  - pending_first_admission_review

criticality_classes:
  - protected_path_release_critical
  - release_engineering_critical
  - benchmark_lab_required
  - repo_operations_required

release_notice_classes:
  - runtime_dependency_notice_if_distributed
  - build_input_only_no_notice
  - host_runtime_not_redistributed
  - bundled_asset_notice_required

refresh_mode_classes:
  - manual_until_manifested
  - mixed_manual_machine
  - machine_observable_host_runtime

automation_seed:
  upstream_health_ingest_fields:
    - latest_release_or_tag
    - latest_release_published_at
    - default_branch_last_commit_at
    - open_security_advisory_count
    - maintainer_count_estimate
    - license_expression
  stale_threshold_profiles:
    - id: protected_path_selected
      manual_review_after_days: 30
      machine_refresh_after_days: null
    - id: admitted_repo_tooling
      manual_review_after_days: 90
      machine_refresh_after_days: 14
    - id: required_host_runtime
      manual_review_after_days: 120
      machine_refresh_after_days: 30

