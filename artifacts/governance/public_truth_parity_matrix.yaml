record_kind: public_truth_parity_matrix_record
schema_version: 1
matrix_id: public_truth.parity_matrix.seed.01
title: Public-truth propagation parity matrix
claim_manifest_ref: artifacts/governance/claim_manifest_seed.yaml
claim_manifest_schema_ref: schemas/governance/claim_manifest.schema.json

channels:
  - channel_id: docs_site
    owner_lane: docs_public_truth
    required_fields:
      - effective_claim_posture
      - requirement_ids
      - known_limit_refs
    notes: Canonical public docs and truth pages quote the row directly.
  - channel_id: migration_notes
    owner_lane: docs_public_truth
    required_fields:
      - effective_claim_posture
      - known_limit_refs
    notes: Migration and downgrade notes keep claim narrowing attached to the same row.
  - channel_id: help_about
    owner_lane: docs_public_truth
    required_fields:
      - effective_claim_posture
      - known_limit_refs
    notes: Help/About must never invent a parallel freshness or build-truth dialect.
  - channel_id: service_health
    owner_lane: docs_public_truth
    required_fields:
      - effective_claim_posture
      - service_health_state
      - known_limit_refs
    notes: Service-health rows surface stale, local-only, degraded, or policy-blocked posture explicitly.
  - channel_id: support_export
    owner_lane: support_export
    required_fields:
      - claim_row_id
      - effective_claim_posture
      - evidence_links
      - known_limit_refs
    notes: Support exports quote the same row ids and downgrade reasons.
  - channel_id: release_packet
    owner_lane: release_evidence
    required_fields:
      - claim_row_id
      - effective_claim_posture
      - requirement_ids
      - evidence_links
    notes: Release packets fail closed when the row posture is narrower than the copy.
  - channel_id: release_notes
    owner_lane: docs_public_truth
    required_fields:
      - effective_claim_posture
      - known_limit_refs
    notes: Release-note copy must reuse the same caveat or omit the claim.
  - channel_id: cli_help
    owner_lane: shell_command_system
    required_fields:
      - effective_claim_posture
      - known_limit_refs
    notes: CLI/help uses the same claim state without UI-only euphemisms.
  - channel_id: evaluation_artifact
    owner_lane: release_evidence
    required_fields:
      - claim_row_id
      - effective_claim_posture
      - evidence_links
    notes: Evaluation kits and certified-archetype packets quote the same row and evidence.
  - channel_id: marketplace_discovery
    owner_lane: docs_public_truth
    required_fields:
      - effective_claim_posture
      - known_limit_refs
    notes: Discovery cards may only widen once the same row widens.
  - channel_id: public_proof_packet
    owner_lane: benchmark_lab
    required_fields:
      - claim_row_id
      - effective_claim_posture
      - evidence_links
      - known_limit_refs
    notes: Public-proof packets are the primary publication lane for benchmark and certification proof.

posture_projection_rules:
  - posture: claim_bearing
    docs_site: Verbatim or slightly shortened canonical claim text is allowed.
    migration_notes: Mention only when the note materially changes the supported path.
    help_about: Badge or concise disclosure is allowed if the underlying row remains current.
    service_health: Render as ready or not_applicable; never as stale without a matching downgrade.
    support_export: Export the row id, current posture, and upstream evidence refs.
    release_packet: Claim-bearing wording is allowed only when required evidence is current.
    release_notes: Stable-facing copy is allowed if the row has no active downgrade reasons.
    cli_help: Summaries may stay terse but must preserve the same posture.
    evaluation_artifact: Evaluation packets may quote the row directly.
    marketplace_discovery: Discovery cards may show availability or certification only through this posture.
    public_proof_packet: Proof packets may publish the claim if the packet itself is current and in-window.
  - posture: experimental
    docs_site: Must carry explicit preview or experimental wording; no stable or certified badge.
    migration_notes: Must describe what is missing before the row becomes claim-bearing.
    help_about: May link to the experiment, but must not present it as a default supported path.
    service_health: Uses stale or not_applicable, never ready, unless the row is purely observational.
    support_export: Exports the experimental posture and the blocking evidence reason.
    release_packet: Forces preview_only or narrow_claims posture.
    release_notes: Must say preview, experimental, seed-only, or methodology-only.
    cli_help: Requires an experimental marker or caveat line.
    evaluation_artifact: Evaluation packets may include it with explicit caveats and freshness state.
    marketplace_discovery: Cards use preview-style badges only; no claim-bearing language.
    public_proof_packet: Methodology-only, caveated, or quarantined wording only.
  - posture: policy_disabled
    docs_site: Explain that the claim is policy-disabled or unavailable; never hide the reason behind silence.
    migration_notes: Route to policy or admin guidance instead of product feature copy.
    help_about: Policy-blocked or unavailable is required; silent omission is non-conforming.
    service_health: policy_blocked is required when the row has a service-health projection.
    support_export: Must export the policy-disabled posture and the policy context or blocker ref.
    release_packet: Cannot treat the row as supported without a parallel waiver or policy exception.
    release_notes: Must either omit the claim or state that policy disables the route.
    cli_help: Must explain policy-disabled or not available on this surface.
    evaluation_artifact: Carries the policy-disabled posture and any admin-only caveat.
    marketplace_discovery: Cards may show unavailable or admin-only but never available.
    public_proof_packet: Proof packets may cite the disabled posture but may not imply availability.
  - posture: limited
    docs_site: Use narrowed summaries that quote the current caveat or known-limit note.
    migration_notes: Explain what still works and what path is excluded or deferred.
    help_about: Show a caveated badge, a local-only note, or a repair route.
    service_health: stale, degraded, or local_only are allowed; ready is not.
    support_export: Preserve row id, downgrade reason, and the same known-limit refs.
    release_packet: Forces narrow_claims or equivalent packet posture.
    release_notes: Must carry the same limitation, not a softened variant.
    cli_help: Requires the same caveat or successor hint.
    evaluation_artifact: Evaluation packets remain allowed if the caveat is copied forward verbatim.
    marketplace_discovery: Cards use supported-with-caveats or preview-grade language only.
    public_proof_packet: Proof packets may only publish the limited scope they can substantiate.
  - posture: replacement_grade
    docs_site: Show the successor row or migration path before preserving any older claim text.
    migration_notes: Mandatory successor and migration guidance.
    help_about: Present the replacement path; older wording becomes legacy-only.
    service_health: not_applicable or degraded is allowed; ready is not.
    support_export: Export both the current replacement-grade row and the successor ref.
    release_packet: Requires explicit narrowing or deprecation disclosure.
    release_notes: Must announce replacement and support-window end state.
    cli_help: Must point to the successor row or command/path.
    evaluation_artifact: Evaluation packets compare the retiring row against its successor explicitly.
    marketplace_discovery: Cards redirect toward the successor or mark the old route as legacy.
    public_proof_packet: Proof packets may cite the historical row only alongside the replacement note.

failure_categories:
  - category: channel_missing_claim_row
    severity: actionable
    description: A required channel cannot point back to the canonical claim_row id.
  - category: stale_claim_rendered_as_current
    severity: actionable
    description: A channel renders claim-bearing wording after the row downgraded to experimental, limited, or stale.
  - category: known_limit_missing
    severity: actionable
    description: Required known-limit or exclusion refs were dropped on a claim-bearing or limited projection.
  - category: policy_disabled_hidden
    severity: actionable
    description: A policy-disabled row is rendered as absent or available without the explicit blocked reason.
  - category: replacement_path_missing
    severity: actionable
    description: A replacement-grade row lacks the successor or migration route on one or more channels.
  - category: version_skew_alias_drift
    severity: actionable
    description: A channel invents its own compatibility or version-skew label instead of quoting the canonical row or register.
  - category: service_health_posture_drift
    severity: actionable
    description: Service-health wording disagrees with the row's required stale, degraded, local-only, or policy-blocked state.
  - category: migration_scorecard_caveat_missing
    severity: actionable
    description: A migration, marketplace, docs/help, support, or release projection quotes an imported extension/workflow path without the scorecard caveat or effective status.

stale_claim_failure_mode:
  source_catalog_ref: artifacts/governance/claim_manifest_seed.yaml#stale_claim_failure_modes
  triggers:
    - required_evidence_missing
    - required_evidence_stale
    - required_evidence_narrower_than_claim
    - docs_version_mismatch
    - docs_freshness_floor_unmet
    - known_limit_missing
    - compatibility_row_degraded
    - migration_scorecard_stale_or_missing
    - support_window_expired
  rule: >
    Any active trigger forces the projected channel posture to be less than
    claim_bearing. A channel may narrow further for space, but it may not
    widen above the claim row's effective_claim_posture.

