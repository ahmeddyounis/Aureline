# Experiment, feature-flag, and rollout register.
#
# Canonical machine-readable register of every non-stable control row
# already seeded in this repository: contributor-visible prototype/Labs
# modes, optional benchmark-lab modes, hidden developer toggles, and
# reserved control-stack bindings that future runtime flagging will read
# rather than re-describe.
#
# Scope.
#   - This file is authoritative for experiment / flag / rollout rows
#     until a runtime control plane exists.
#   - The policy narrative lives in docs/governance/feature_flag_policy.md.
#   - The contributor-visible Labs inventory is projected into
#     artifacts/governance/labs_register.yaml so hidden developer toggles do
#     not masquerade as public preview items.
#   - If this file and the policy doc disagree, the policy doc wins and this
#     file is updated in the same change.
#
# Rules.
#   - Every row MUST name owner_dri, lifecycle_state, support_note, and
#     either review_by or expires_on.
#   - Every row MUST disclose provider_chain, embedded_default_behavior,
#     local_resolution_requirement, offline_resolution_posture, and whether
#     remote_fetch_failure_may_block_startup.
#   - editing_critical_path rows default
#     remote_fetch_failure_may_block_startup = false. Changing one to true
#     requires a new decision row because it changes protected-path startup
#     posture.
#   - Saved artifacts, schemas, fixtures, workflow seeds, or docs depending
#     on a row MUST cite that dependency here rather than relying on prose
#     alone.
#   - Hidden developer toggles stay in this register but MUST NOT appear in
#     labs_register.yaml unless they become contributor-visible on purpose.

schema_version: 1

policy_doc: docs/governance/feature_flag_policy.md
companion_registers:
  labs_register: artifacts/governance/labs_register.yaml
  control_artifact_index: artifacts/governance/control_artifact_index.yaml
  capability_lifecycle_examples: artifacts/governance/dependency_marker_examples.yaml

vocabulary_sources:
  - docs/adr/0008-settings-definition-and-effective-configuration-resolver.md
  - docs/adr/0011-capability-lifecycle-and-dependency-markers.md
  - .t2/docs/Aureline_Technical_Design_Document.md#appendix-ch-experiments-feature-flags-labs-and-capability-lifecycle-matrix
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#18.25-feature-flags-experiment-kill-switches-and-schema-governance-ux

# -----------------------------------------------------------------------------
# Register contract.
#
# This is the frozen row schema for the current milestone. The later runtime
# flag service MAY add delivery mechanics, but it must not remove or repurpose
# these fields without a new decision row.
# -----------------------------------------------------------------------------
register_contract:
  common_required_fields:
    - id
    - public_label
    - row_kind
    - audience_class
    - owner_dri
    - lifecycle_state
    - cohort_or_ring
    - default_posture
    - support_note
    - provider_chain
    - embedded_default_behavior
    - local_resolution_requirement
    - offline_resolution_posture
    - remote_fetch_failure_may_block_startup
    - policy_override_posture
    - editing_critical_path
    - default_shift_change_log_posture
    - kill_switch
    - rollback_path
    - artifact_dependencies
    - source_refs
  review_fields:
    one_of:
      - review_by
      - expires_on
  row_kind_specific_fields:
    feature_flag:
      required:
        - kill_switch
        - rollback_path
    experiment:
      required:
        - artifact_dependencies
    benchmark_mode:
      required:
        - default_shift_change_log_posture
    rollout:
      required:
        - rollout_guardrails

row_kinds:
  - experiment
  - feature_flag
  - benchmark_mode
  - rollout

audience_classes:
  - contributor_visible_labs
  - hidden_developer_toggle
  - control_stack_reserved
  - ci_rollout_only

lifecycle_states:
  - labs
  - preview
  - beta
  - stable
  - deprecated
  - disabled_by_policy
  - retired

provider_chain_steps:
  - embedded_default
  - local_cli_argument
  - ci_workflow_input
  - signed_local_admin_bundle
  - optional_managed_override

default_postures:
  - off_by_default
  - opt_in_only
  - enabled_when_named_on_cli
  - default_for_developer_local
  - scheduled_ci_only
  - manual_failure_drill_only
  - reserved_until_runtime_control_stack_lands

embedded_default_behaviors:
  - inactive_until_invoked
  - defaults_to_smoke_subset
  - inactive_except_on_reference_capture
  - inactive_until_manual_failure_drill_invoked
  - preserve_last_known_local_value

local_resolution_requirements:
  - required
  - preferred
  - not_required

offline_resolution_postures:
  - authoritative_local
  - last_known_good_signed
  - cache_only
  - unavailable_offline

policy_override_postures:
  - not_allowed
  - disable_only
  - narrowing_allowed

default_shift_change_log_postures:
  - not_required
  - docs_update_required
  - release_note_required

kill_switch_source_kinds:
  - embedded_default_off
  - local_cli_argument
  - ci_workflow_input
  - signed_local_admin_bundle
  - optional_managed_override

rollback_classes:
  - rerun_without_mode
  - revert_to_seeded_artifact
  - keep_last_known_valid_state
  - fall_back_to_local_inspection
  - follow_stable_path

artifact_dependency_classes:
  - saved_artifact
  - docs_projection
  - fixture_seed
  - workflow_seed
  - schema_contract

rows:
  - id: exp.buffer.prototype_harness
    public_label: Buffer prototype harness
    row_kind: experiment
    audience_class: contributor_visible_labs
    owner_dri: "@ahmeddyounis"
    owning_scope:
      primary: aureline-buffer
      secondary:
        - benchmark_lab
    lifecycle_state: labs
    cohort_or_ring: maintainer_and_contributor_local
    default_posture: opt_in_only
    support_note: >
      Counts-only contract prototype for buffer behavior, undo examples,
      and harness output. Not a production buffer runtime promise.
    review_by: "2026-06-30"
    expires_on: null
    provider_chain:
      - embedded_default
      - local_cli_argument
    embedded_default_behavior: inactive_until_invoked
    local_resolution_requirement: required
    offline_resolution_posture: authoritative_local
    remote_fetch_failure_may_block_startup: false
    policy_override_posture: not_allowed
    editing_critical_path: false
    default_shift_change_log_posture: docs_update_required
    kill_switch:
      source_kind: embedded_default_off
      source_ref: tools/bench_buffer.sh
      visible_disclosure: prototypes/buffer/README.md
      fallback_behavior: >
        Do not regenerate prototype metrics or undo examples; the ADR,
        committed seed, and README remain the canonical truth.
    rollback_path:
      rollback_class: revert_to_seeded_artifact
      rollback_ref: artifacts/buffer/
      operator_note: Regenerate only through the documented wrapper.
    artifact_dependencies:
      - dependency_class: saved_artifact
        artifact_ref: artifacts/buffer/buffer_metrics_seed.json
        marker_expected: true
      - dependency_class: saved_artifact
        artifact_ref: artifacts/buffer/undo_examples/
        marker_expected: true
      - dependency_class: docs_projection
        artifact_ref: prototypes/buffer/README.md
        marker_expected: true
    source_refs:
      - tools/bench_buffer.sh
      - crates/aureline-bench/src/bin/bench_buffer.rs
      - prototypes/buffer/README.md

