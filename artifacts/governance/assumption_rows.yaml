  # ---------------------------------------------------------------------------
  # One-command-system feasibility
  # ---------------------------------------------------------------------------
  - assumption_id: AL-0004
    title: One keyboard-complete command system serves palette, menubar, CLI, and automation
    statement: >
      A single command-graph, keyboard-complete identity model can serve
      the palette, menubar, CLI, and automation surfaces at launch
      without lane-local command forks. If falsified, command parity
      claims across those surfaces cannot ride one graph and MUST
      narrow per surface until a replacement graph model is accepted.
    status: open
    widening_posture: blocks_widening
    target_milestone: pre-implementation-foundations
    earliest_milestone_impact: first-beta-milestone
    owner_dri: "@ahmeddyounis"
    owner_forum: architecture_council
    backup_owner: null
    backup_waiver: single-maintainer-backup
    validation_deadline: "2026-06-15"
    validation_checkpoint:
      checkpoint_class: architecture_council_review
      description: >
        Architecture council reviews the command-graph ADR pack and a
        keyboard-complete task corpus run; this row validates only when
        the ADR pack lands and the task-corpus pass is green on every
        launch-bearing surface.
    required_proof:
      proof_class: adr_or_rfc
      description: >
        Accepted ADR covering command identity, keyboard completeness,
        and palette / menubar / CLI / automation projection rules, plus
        a task-corpus manifest showing one keyboard path per task on
        every launch-bearing surface.
      evidence_owner: "@ahmeddyounis"
      evidence_refs: []
    default_response_if_false:
      response_class: narrow_scope
      description: >
        Drop the cross-surface command-parity claim from the launch
        claim manifest; keep the palette as the authoritative surface
        and label the others as "subset" in public docs until a
        replacement command-graph model lands.
      requires_approval_from:
        - architecture_council
    linked_launch_register_rows:
      - LR-0004
    linked_decision_index_rows: []
    linked_dependency_ledger_rows:
      - progdep.shell_host_keyboard_freeze
    linked_scorecard_lanes:
