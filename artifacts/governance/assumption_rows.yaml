  # ---------------------------------------------------------------------------
  # Protected-path maintainer coverage
  # ---------------------------------------------------------------------------
  - assumption_id: AL-0008
    title: Protected-path maintainer coverage holds through launch
    statement: >
      Every protected-path lane has maintainer coverage sufficient to
      review, sign, and roll back changes on the protected-path cadence
      through launch, either with a named primary and backup or with
      an active single-maintainer waiver in good standing. If
      falsified, the affected protected-path surface MUST freeze
      changes or widen its waiver posture through an explicit exception
      packet rather than accept silent coverage gaps.
    status: open
    widening_posture: blocks_widening
    target_milestone: pre-implementation-foundations
    earliest_milestone_impact: pre-implementation-foundations
    owner_dri: "@ahmeddyounis"
    owner_forum: architecture_council
    backup_owner: null
    backup_waiver: single-maintainer-backup
    validation_deadline: "2026-05-31"
    validation_checkpoint:
      checkpoint_class: architecture_council_review
      description: >
        Architecture council reviews the protected-path coverage roster
        each cadence; this row validates only when every protected-
        path lane carries one named primary plus one named backup (or
        an explicitly renewed waiver) and the waiver register is in
        good standing.
    required_proof:
      proof_class: staffing_roster
      description: >
        Maintainer-coverage roster naming, per protected-path lane,
        the primary DRI, the backup owner, and the waiver id if backup
        is null, cross-referenced against CODEOWNERS and the
        ownership-matrix waivers register.
      evidence_owner: "@ahmeddyounis"
      evidence_refs:
        - artifacts/governance/ownership_matrix.yaml
        - docs/governance/maintainer_coverage_policy.md
        - CODEOWNERS
    default_response_if_false:
      response_class: freeze_lane
      description: >
        Freeze changes on the uncovered protected-path lane until
        coverage is restored or a renewed waiver lands; open a freeze-
        exception packet describing the coverage gap, the dated plan to
        close it, and the narrowed claim posture that applies while the
        gap is open.
      requires_approval_from:
        - architecture_council
    linked_launch_register_rows: []
    linked_decision_index_rows: []
    linked_dependency_ledger_rows:
