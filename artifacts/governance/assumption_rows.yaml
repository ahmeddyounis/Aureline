  # ---------------------------------------------------------------------------
  # Launch-bundle staffing depth
  # ---------------------------------------------------------------------------
  - assumption_id: AL-0003
    title: Launch-bundle staffing depth supports every committed lane through launch
    statement: >
      Every lane carrying a Committed claim on the launch bundle has
      enough staffing depth to respond to protected-path defects,
      refresh evidence, and hold its forum cadence through the launch
      window. If falsified, the affected Committed claim is no longer
      defensible at launch and MUST narrow, defer, or re-baseline
      through an explicit record instead of surviving as scorecard
      amber.
    status: open
    widening_posture: blocks_widening
    target_milestone: pre-implementation-foundations
    earliest_milestone_impact: first-beta-milestone
    owner_dri: "@ahmeddyounis"
    owner_forum: shiproom_executive_scope_review
    backup_owner: null
    backup_waiver: single-maintainer-backup
    validation_deadline: "2026-05-31"
    validation_checkpoint:
      checkpoint_class: shiproom_review
      description: >
        Shiproom reviews the staffing-depth roster against the scorecard
        lane index every cadence; a lane whose depth falls below one
        named primary and one named backup on any Committed claim is
        flagged here and routed to the commitment-rebaseline policy.
    required_proof:
      proof_class: staffing_roster
      description: >
        Staffing roster naming, per scorecard lane carrying a Committed
        claim, the primary DRI, the backup owner (or the active waiver
        id if backup is null), and the forum chair of record. The
        roster MUST resolve one-to-one against
        artifacts/governance/ownership_matrix.yaml entries.
      evidence_owner: "@ahmeddyounis"
      evidence_refs:
        - artifacts/governance/ownership_matrix.yaml
        - docs/governance/maintainer_coverage_policy.md
        - docs/governance/dri_map.md
    default_response_if_false:
      response_class: rebaseline_milestone
      description: >
        Move the affected lane's Committed claim to Target or Stretch,
        or open a freeze exception with a dated coverage plan. If
        multiple lanes simultaneously lose depth, escalate to shiproom
        for a milestone rebaseline covering scope, date, or acceptance
        thresholds.
      requires_approval_from:
        - shiproom_executive_scope_review
        - release_council
    linked_launch_register_rows:
      - LR-0001
      - LR-0011
    linked_decision_index_rows: []
    linked_dependency_ledger_rows:
