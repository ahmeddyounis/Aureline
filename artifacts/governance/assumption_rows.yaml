        actor: "@ahmeddyounis"
        forum: product_scope_review
        outcome: opened

  # ---------------------------------------------------------------------------
  # Local-core non-dependence
  # ---------------------------------------------------------------------------
  - assumption_id: AL-0002
    title: Local-core value does not depend on hosted services
    statement: >
      The first-beta product home is desktop-local / local-first; every
      launch-bearing local-core workflow (edit, build, run, diff,
      navigate, extend) works with no hosted services reachable. Hosted
      and managed surfaces are additive companions, not prerequisites.
      If falsified, any feature whose local path silently depends on a
      hosted service MUST be re-framed as managed-only and cut from the
      local-core claim.
    status: open
    widening_posture: blocks_widening
    target_milestone: pre-implementation-foundations
    earliest_milestone_impact: first-beta-milestone
    owner_dri: "@ahmeddyounis"
    owner_forum: product_scope_review
    backup_owner: null
    backup_waiver: single-maintainer-backup
    validation_deadline: "2026-06-29"
    validation_checkpoint:
      checkpoint_class: architecture_council_review
      description: >
        Architecture council reviews the local-core walkthrough each
        milestone; a dogfood pass with managed endpoints disabled MUST
        demonstrate full local-core workflow coverage before this row
        validates.
    required_proof:
      proof_class: evidence_packet
      description: >
        Dogfood evidence packet from a local-only profile run with
        hosted surfaces reachability disabled, covering every launch-
        bearing local-core workflow, plus the deployment-profile
        descriptor pinning local-only mode.
      evidence_owner: "@ahmeddyounis"
      evidence_refs:
        - artifacts/governance/deployment_profiles.yaml
        - artifacts/governance/residual_dependencies.yaml
    default_response_if_false:
      response_class: narrow_scope
      description: >
        Reclassify the affected workflow as managed-only, cut it from
        the local-core launch claim, and update the deployment-profile
        descriptor and claim manifest so public materials no longer
        imply local-core parity. If the affected workflow is load-
        bearing on the launch wedge, open an exception packet and
        escalate to scope review.
      requires_approval_from: []
    linked_launch_register_rows:
      - LR-0002
      - LR-0003
    linked_decision_index_rows: []
    linked_dependency_ledger_rows: []
    linked_scorecard_lanes:
      - aureline-vfs
      - aureline-buffer
      - aureline-rpc
      - governance_packets
    linked_risk_register_rows: []
    affected_artifacts:
