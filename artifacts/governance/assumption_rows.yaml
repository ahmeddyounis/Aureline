# Canonical assumption ledger.
#
# Machine-readable register of every milestone-shaping assumption whose
# invalidation would reopen product scope, re-baseline a milestone, or
# force a public-claim narrowing. Complements the rolling decision index
# (artifacts/governance/decision_index.yaml, assumptions: A-NNNN) and
# the launch decision register (artifacts/governance/decision_register.yaml,
# assumptions: LA-NNNN), which hold the decision-local premises used by
# their respective decision rows. This ledger holds the broader program-
# level assumptions that underwrite the launch wedge, the milestone scope
# envelope, the staffing model, and the protected-path posture.
#
# Conformance: this file conforms to
#   schemas/governance/assumption_row.schema.json
#
# Linkage rules (enforced by schema):
#   - Every row MUST name an owner_dri, an owner_forum drawn from
#     ownership_matrix.yaml#decision_forums, a validation_deadline, a
#     validation_checkpoint (forum or evidence-refresh surface), a
#     required_proof description with a named evidence_owner, an
#     earliest_milestone_impact, a widening_posture, a
#     default_response_if_false statement, a non-empty
#     affected_artifacts list, and at least one link into the launch
#     decision register, the rolling decision index, the dependency
#     ledger, the scorecard lane index, or the risk register.
#   - Every row whose backup_owner is null MUST cite an active waiver
#     from artifacts/governance/ownership_matrix.yaml#waivers.
#   - Superseding a row mints a new AL-NNNN and points superseded_by at
#     it; the original row is never deleted and history is append-only.
#   - When validation_deadline passes with status still open, the row
#     MUST be reviewed at the named validation_checkpoint cadence; a
#     row still open past its deadline is a validation failure and is
#     reported through the same surface used for stale evidence.
#   - Scorecards, risk rows, and dependency rows cite assumption_id
#     values directly rather than restating the assumption statement.

schema_version: 1

source_specs:
  - .t2/docs/Aureline_PRD.md
  - .t2/docs/Aureline_Technical_Architecture_Document.md
  - .t2/docs/Aureline_Milestones_Document.md
  - docs/governance/commitment_and_rebaseline_policy.md
  - docs/governance/decision_workflow.md
  - docs/governance/dri_map.md
  - docs/governance/maintainer_coverage_policy.md

# -----------------------------------------------------------------------------
# Assumptions.
# -----------------------------------------------------------------------------
assumptions:
  # ---------------------------------------------------------------------------
  # Launch-wedge narrowness
  # ---------------------------------------------------------------------------
  - assumption_id: AL-0001
    title: Launch wedge stays narrow enough for currently staffed lanes to defend
    statement: >
      The first-beta launch wedge is bounded by the surfaces the
      currently staffed lanes can defend with current evidence; wider
      product scope does not ride this milestone as carry-forward
      ambiguity. If falsified, any claim wider than the staffed-defence
      set MUST narrow through an explicit record rather than survive as
      implied scope.
    status: open
    widening_posture: blocks_widening
    target_milestone: pre-implementation-foundations
    earliest_milestone_impact: pre-implementation-foundations
    owner_dri: "@ahmeddyounis"
    owner_forum: product_scope_review
    backup_owner: null
    backup_waiver: single-maintainer-backup
    validation_deadline: "2026-06-29"
    validation_checkpoint:
      checkpoint_class: product_scope_review
      description: >
        Reviewed at every product-scope review cadence on the launch
        run-up and once more inside the shiproom pass; the row closes
        only when the claim manifest, launch-register narrower defaults,
        and scorecard lanes agree on one defended wedge.
    required_proof:
      proof_class: scope_review_packet
      description: >
        Product-scope review packet that lists every launch-bearing
        claim, names the lane that defends it, and cites the evidence
        each claim rests on. No launch-bearing claim may exist without a
        named defending lane and current evidence.
      evidence_owner: "@ahmeddyounis"
      evidence_refs: []
    default_response_if_false:
      response_class: narrow_scope
      description: >
        Narrow the public launch claim set to the surfaces each
        currently staffed lane has evidence for, retract the wider
        claims from the claim manifest, and open a rebaseline review if
        the narrowed wedge falls below the committed commitment class.
      requires_approval_from:
        - product_scope_review
    linked_launch_register_rows:
      - LR-0001
      - LR-0002
      - LR-0012
    linked_decision_index_rows: []
    linked_dependency_ledger_rows: []
    linked_scorecard_lanes:
      - governance_packets
      - release_evidence
      - docs_public_truth
    linked_risk_register_rows:
      - RISK-009
    affected_artifacts:
      - artifacts/governance/claim_manifest_seed.yaml
      - artifacts/governance/decision_register.yaml
      - artifacts/milestones/M0_scorecard.yaml
      - docs/governance/public_surface_truth_map.md
    source_anchors:
      - doc: .t2/docs/Aureline_PRD.md
        anchor: "launch wedge"
      - doc: docs/governance/commitment_and_rebaseline_policy.md
        anchor: "commitment classes"
    validated_on: null
    invalidated_on: null
    superseded_by: []
