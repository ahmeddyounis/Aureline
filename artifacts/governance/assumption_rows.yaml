  # ---------------------------------------------------------------------------
  # Exact-build identity coverage
  # ---------------------------------------------------------------------------
  - assumption_id: AL-0005
    title: One build identity covers every release artifact family
    statement: >
      One build identity ties binaries, docs, schemas, SDK artifacts,
      SBOMs, attestations, symbols, and rollback metadata together so
      that support, field diagnosis, and release rollback can resolve a
      single exact-build join. If falsified, artifact families whose
      identities diverge MUST be held to narrower support-join claims
      until the join model is re-unified.
    status: open
    widening_posture: blocks_widening
    target_milestone: pre-implementation-foundations
    earliest_milestone_impact: first-beta-milestone
    owner_dri: "@ahmeddyounis"
    owner_forum: release_council
    backup_owner: null
    backup_waiver: single-maintainer-backup
    validation_deadline: "2026-06-29"
    validation_checkpoint:
      checkpoint_class: release_council_review
      description: >
        Release council reviews the exact-build join evidence each
        release-cadence cycle; this row validates only when a full
        release-evidence packet demonstrates one identity joining every
        named artifact family with current attestations.
    required_proof:
      proof_class: evidence_packet
      description: >
        Release-evidence packet demonstrating one build identity
        joining binaries, docs, schemas, SDK artifacts, SBOMs,
        attestations, symbols, and rollback metadata, produced by a
        single reproducible pipeline run with the pinned toolchain.
      evidence_owner: "@ahmeddyounis"
      evidence_refs:
        - docs/build/reproducible_build_baseline.md
    default_response_if_false:
      response_class: narrow_scope
      description: >
        Reclassify the affected artifact family as out-of-join at
        launch, narrow the support / diagnosis / rollback claim to the
        families that still join under one identity, and open a
        release-decision record naming when the remaining families
        rejoin the exact-build identity.
      requires_approval_from:
        - release_council
    linked_launch_register_rows:
      - LR-0007
    linked_decision_index_rows:
      - D-0011
    linked_dependency_ledger_rows:
      - progdep.exact_build_cleanroom_parity
    linked_scorecard_lanes:
      - release_evidence
      - governance_packets
    linked_risk_register_rows:
      - RISK-004
    affected_artifacts:
      - docs/build/reproducible_build_baseline.md
      - artifacts/governance/signing_quorum.yaml
      - artifacts/governance/release_notice_seed.yaml
      - artifacts/governance/standards_matrix.yaml
    source_anchors:
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "build identity"
    validated_on: null
    invalidated_on: null
    superseded_by: []
    history:
      - date: "2026-04-24"
        actor: "@ahmeddyounis"
        forum: release_council
        outcome: opened
    notes: >
      This AL-NNNN row is the program-level companion to rolling-index
      A-0003 and launch-register LR-0007; it is the broader assumption
      that the single-identity join model works across every artifact
      family, not only across binaries.

  # ---------------------------------------------------------------------------
  # Docs / help publication cadence
  # ---------------------------------------------------------------------------
  - assumption_id: AL-0006
    title: Docs and in-product help can refresh on the build-identity cadence
    statement: >
      Docs site, in-product help, release notes, and public-truth seeds
      can be refreshed on the same cadence as the build identity so
      that the version-match floor holds without manual reconciliation.
      If falsified, public docs and help copy MUST fall back to a
      dated, narrower cadence and the claim manifest MUST retract the
      "help mirrors the running build" posture.
    status: open
    widening_posture: narrows_claims_only
    target_milestone: pre-implementation-foundations
    earliest_milestone_impact: first-beta-milestone
    owner_dri: "@ahmeddyounis"
    owner_forum: open_community_sync
    backup_owner: null
    backup_waiver: single-maintainer-backup
    validation_deadline: "2026-06-29"
    validation_checkpoint:
      checkpoint_class: evidence_refresh
      description: >
        Public-truth freshness automation runs each release-cadence
        cycle; this row validates only when the freshness automation
        has reported one full cycle of green against every docs and
        help-surface listed in the public-truth surface map.
    required_proof:
      proof_class: evidence_packet
      description: >
        Public-truth freshness report naming every docs and help
        surface, the build identity they matched, the freshness class
        achieved, and the time-since-build delta, with the report
        referenced from the release-evidence packet.
      evidence_owner: "@ahmeddyounis"
      evidence_refs:
        - docs/governance/public_surface_truth_map.md
        - artifacts/governance/public_truth_parity_matrix.yaml
    default_response_if_false:
      response_class: cut_public_claim
      description: >
        Retract the "help mirrors the running build" claim from the
        claim manifest, publish a dated "docs current as of build X"
        banner on affected surfaces, and narrow release notes to the
        subset of surfaces whose freshness remains in range.
      requires_approval_from: []
    linked_launch_register_rows:
