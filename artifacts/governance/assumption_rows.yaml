  # ---------------------------------------------------------------------------
  # Clean-room + mirror / offline readiness
  # ---------------------------------------------------------------------------
  - assumption_id: AL-0007
    title: Clean-room and mirror / offline builds are reproducible at launch parity
    statement: >
      The pinned toolchain, bootstrap command, and build-identity
      record reproduce byte-identical binaries in a clean-room
      environment and in a mirrored / offline environment at launch
      parity. If falsified, the clean-room / mirror / offline
      reproducibility claim MUST narrow to the environments that still
      match, and exact-build joins that transit the missing environment
      MUST be labelled as best-effort.
    status: open
    widening_posture: blocks_widening
    target_milestone: pre-implementation-foundations
    earliest_milestone_impact: first-beta-milestone
    owner_dri: "@ahmeddyounis"
    owner_forum: release_council
    backup_owner: null
    backup_waiver: single-maintainer-backup
    validation_deadline: "2026-06-29"
    validation_checkpoint:
      checkpoint_class: release_council_review
      description: >
        Release council reviews the clean-room and mirror / offline
        reproducibility results each release-cadence cycle; this row
        validates only when both environments have produced byte-
        identical binaries against the current build identity and a
        release-evidence packet captures the result.
    required_proof:
      proof_class: evidence_packet
      description: >
        Release-evidence packet showing one build-identity hash matched
        by a clean-room re-run and by a mirror / offline re-run of the
        same bootstrap command against the pinned toolchain, with
        divergences (if any) captured per artifact.
      evidence_owner: "@ahmeddyounis"
      evidence_refs:
        - docs/build/reproducible_build_baseline.md
    default_response_if_false:
      response_class: narrow_scope
      description: >
        Narrow the reproducibility claim to the environment set that
        still matches, relabel the remaining environments as "best
        effort" in public docs, and open a release-decision record
        naming when the missing environment rejoins parity.
      requires_approval_from:
        - release_council
    linked_launch_register_rows:
      - LR-0007
    linked_decision_index_rows:
      - D-0011
    linked_dependency_ledger_rows:
