    canonical_copy:
      headline: Open and local-core boundaries stay explicit across channels.
      claim_text: >
        Core editing, local workflows, and the open-versus-managed boundary
        are published from one claim row so surfaces name what remains local
        and what narrows when optional services are absent.
      experimental_text: >
        Boundary truth is still preview-grade and may narrow further while
        ratified boundary rows and launch bundles are incomplete.
      limited_text: >
        Boundary wording is currently limited to the documented local-core
        continuity and named managed dependencies; the product must not imply
        ratified boundary scope beyond the current seed.
      policy_disabled_text: >
        Boundary disclosure is policy-disabled; surfaces may describe the
        absence of managed features but may not imply verified managed scope.
      replacement_text: >
        This boundary row has been superseded; surfaces must route to the
