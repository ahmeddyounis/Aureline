publication_channels:
  - channel_id: docs_site
    owner_lane: docs_public_truth
    description: Canonical docs site, README-grade public docs, and product-facing truth pages.
    primary_surface_ref: docs/governance/claim_manifest_contract.md
  - channel_id: migration_notes
    owner_lane: docs_public_truth
    description: Migration notes, downgrade notes, and source-version guidance that carry claim caveats forward.
    primary_surface_ref: artifacts/governance/release_notice_seed.yaml
  - channel_id: help_about
    owner_lane: docs_public_truth
    description: Help/About projections that publish build, boundary, and trust state in-product.
    primary_surface_ref: docs/adr/0013-docs-help-service-health-truth.md
  - channel_id: service_health
    owner_lane: docs_public_truth
    description: Service-health rows or cards that expose stale, local-only, degraded, or policy-blocked truth.
    primary_surface_ref: artifacts/docs/help_badge_vocabulary.yaml
  - channel_id: support_export
    owner_lane: support_export
    description: Local-first support bundles and export-safe summaries that must quote the same claim rows.
    primary_surface_ref: docs/support/support_center_concept.md
  - channel_id: release_packet
    owner_lane: release_evidence
    description: Release-evidence packets and shiproom-facing publication bundles.
    primary_surface_ref: docs/release/release_evidence_packet_template.md
  - channel_id: release_notes
    owner_lane: docs_public_truth
    description: Release-note or notice-pack copy that carries public-proof disclosures and narrowed claims.
    primary_surface_ref: artifacts/governance/release_notice_seed.yaml
  - channel_id: cli_help
    owner_lane: shell_command_system
    description: CLI/help or headless inspection surfaces that expose claim state without UI-only language.
    primary_surface_ref: docs/commands/command_descriptor_contract.md
  - channel_id: evaluation_artifact
    owner_lane: release_evidence
    description: Evaluation kits, certified-archetype packets, and similar review-facing publication artifacts.
    primary_surface_ref: docs/release/certified_archetype_report_template.md
  - channel_id: marketplace_discovery
    owner_lane: docs_public_truth
    description: Marketplace-style discovery or card surfaces that must not overclaim availability or certification.
    primary_surface_ref: not_yet_seeded
  - channel_id: public_proof_packet
    owner_lane: benchmark_lab
    description: Public-proof packets such as benchmark publication packs or other evidence-bearing proof bundles.
    primary_surface_ref: docs/benchmarks/benchmark_publication_pack_template.md

stale_claim_failure_modes:
  - failure_mode_id: claim_failure:required_evidence_missing
    trigger: required_evidence_missing
    default_downgrade_to: limited
    default_route_channels:
      - release_packet
      - support_export
      - help_about
      - repair_hook
    description: >
      A required evidence packet or row ref is absent, so the claim must
      narrow and route the reader to the packet or repair path instead of
      silently preserving claim-bearing wording.
  - failure_mode_id: claim_failure:required_evidence_stale
    trigger: required_evidence_stale
    default_downgrade_to: experimental
    default_route_channels:
      - public_proof_packet
      - release_notes
      - support_export
    description: >
      Evidence exists but its freshness window expired. Public-proof,
      release-note, and support surfaces must carry the stale posture and
      stop presenting the row as current proof.
  - failure_mode_id: claim_failure:required_evidence_narrower_than_claim
    trigger: required_evidence_narrower_than_claim
    default_downgrade_to: limited
    default_route_channels:
      - docs_site
      - release_packet
      - support_export
    description: >
      The available evidence covers a smaller scope than the copy would
      imply. Surfaces must narrow the wording to the evidenced scope.
  - failure_mode_id: claim_failure:docs_version_mismatch
    trigger: docs_version_mismatch
    default_downgrade_to: limited
    default_route_channels:
      - docs_site
      - help_about
      - service_health
    description: >
      Docs/help version match fell below the row's floor, so docs and
      in-product truth surfaces downgrade to mismatch or stale wording.
  - failure_mode_id: claim_failure:docs_freshness_floor_unmet
    trigger: docs_freshness_floor_unmet
    default_downgrade_to: limited
    default_route_channels:
      - docs_site
      - help_about
      - service_health
    description: >
      Freshness dropped below the row's minimum class; cached or stale
      copy must stay explicit and cannot masquerade as authoritative.
  - failure_mode_id: claim_failure:known_limit_missing
    trigger: known_limit_missing
    default_downgrade_to: limited
    default_route_channels:
      - release_notes
      - support_export
      - release_packet
    description: >
      Required known-limit or exclusion notes are absent, so the claim
      cannot remain claim-bearing even when the evidence packet is present.
  - failure_mode_id: claim_failure:compatibility_row_degraded
    trigger: compatibility_row_degraded
    default_downgrade_to: limited
    default_route_channels:
      - migration_notes
      - release_packet
      - evaluation_artifact
    description: >
      The upstream compatibility row already degraded. Claim consumers must
      quote that degraded posture rather than widening the wording again.
  - failure_mode_id: claim_failure:support_window_expired
    trigger: support_window_expired
    default_downgrade_to: replacement_grade
    default_route_channels:
      - docs_site
      - migration_notes
      - cli_help
      - release_notes
    description: >
      The declared support window ended, so the row becomes replacement-
      grade and routes users toward the successor path instead of implying
      normal support.

