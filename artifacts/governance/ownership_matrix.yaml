# Ownership matrix.
#
# Machine-readable DRI, backup-owner, and waiver record for every protected
# lane, public-truth area, supportability artifact family, governance packet
# family, and decision forum in scope at the current milestone. Tooling reads
# this file; the human-readable narrative is in docs/governance/dri_map.md.
# If they disagree, this file is authoritative for tooling and the narrative
# must be updated in the same change.
#
# Conformance: this file conforms to
#   schemas/governance/ownership_matrix.schema.json
#
# Rules:
#   - Every entry MUST name a primary DRI.
#   - Every entry where protected is true MUST either name a backup or cite
#     an active waiver under the top-level `waivers` map.
#   - Every waiver MUST have: id, reason, named escalation path, expiry
#     (YYYY-MM-DD), and an open_decision entry (who accepted it, when).
#   - No silent blanks. A missing backup without a waiver is a validation
#     failure.

schema_version: 1

# -----------------------------------------------------------------------------
# Waivers
#
# Time-boxed exceptions. Referenced by id from entries below. Closing a waiver
# is recorded by setting `closed_on`; waiver entries are not deleted.
# -----------------------------------------------------------------------------
waivers:
  single-maintainer-backup:
    reason: >
      The project is in its pre-implementation stage with a single active
      maintainer. Every protected lane would otherwise require a named
      backup owner; instead, this single waiver covers the absence of
      named backups across protected lanes until a second maintainer is
      confirmed.
    opened_on: "2026-04-19"
    expires_on: "2026-10-19"
    escalation_path:
      - "@ahmeddyounis (self-escalation log in shiproom packet)"
      - "contributor-community thread (public)"
      - "public notice on the repository"
    open_decision:
      accepted_by: "@ahmeddyounis"
      decided_on: "2026-04-19"
      forum: architecture_council
      notes: >
        Self-approved under the solo-maintainer posture documented in
        docs/governance/dri_map.md. Closes when a named backup lands in
        this file for each covered lane.
    closed_on: null

# -----------------------------------------------------------------------------
# Packages
#
# Crate-level ownership. Pairs with artifacts/governance/package_inventory.yaml
# which carries the protected-path posture, layer, and allowed deps. This file
# does not restate those fields; it only records who owns them.
# -----------------------------------------------------------------------------
packages:
  - name: aureline-bench
    protected: false
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: null
    notes: >
      Unprotected benchmark harness. A backup is not required, but the
      benchmark-lab lane (see governance_lanes) is protected and does
      require one.

  - name: aureline-build-info
    protected: true
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - name: aureline-buffer
    protected: true
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - name: aureline-graph-proto
    protected: false
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: null

  - name: aureline-largefile-proto
    protected: false
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: null

  - name: aureline-reactive-state
    protected: false
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: null

  - name: aureline-render
    protected: true
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - name: aureline-rpc
    protected: true
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - name: aureline-shell
    protected: true
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - name: aureline-shell-spike
    protected: false
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: null
    notes: >
      Throwaway spike. The persistent shell / command-system lane is
      recorded separately under governance_lanes and is protected.

  - name: aureline-telemetry
    protected: true
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - name: aureline-text
    protected: true
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - name: aureline-vfs
    protected: true
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

# -----------------------------------------------------------------------------
# Governance lanes
#
# Non-code ownership lanes named by the milestone spec. Each is either a
# public-truth area, supportability artifact family, governance packet
# family, design-system / accessibility seed, or decision forum family.
# -----------------------------------------------------------------------------
governance_lanes:
  - id: shell_command_system
    kind: subsystem
    protected: true
    scope: >
      Command identity, action routing, and the shell contract layer.
      Hosted in `crates/aureline-shell`; the `aureline-shell-spike` crate
      remains a disposable integration probe.
    paths:
      - crates/aureline-shell
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - id: benchmark_lab
    kind: subsystem
    protected: true
    scope: >
      Benchmark harness, fixture corpora, golden traces, and the
      benchmark-council charter. Hosts protected fitness references.
    paths:
      - crates/aureline-bench
      - fixtures/
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - id: release_evidence
    kind: packet_family
    protected: true
    scope: >
      Release evidence packets: provenance, SBOMs, compatibility reports,
      claim manifests, qualification cadence and schedule records,
      rollback packets, shiproom packets, the release waiver schema, the
      shiproom runbook, and the shared evidence-metadata catalog, plus
      the compatibility qualification seed artifacts those packets
      extend by reference.
    paths:
      - artifacts/compat/
      - artifacts/evidence/
      - artifacts/release/
      - docs/release/qualification_cadence.md
      - docs/release/shiproom_runbook.md
      - schemas/release/
    primary_dri: "@ahmeddyounis"
    evidence_owner: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - id: compatibility_ecosystem_review
    kind: packet_family
    protected: true
    scope: >
      Compatibility and ecosystem scorecards, source ecosystem rows,
      extension bridge evidence, workflow-bundle compatibility handoff,
      SDK freeze inputs, importer cutline evidence, and the compatibility
      artifacts that feed docs, migration center, claim manifests,
      release evidence, support export, and issue routing.
    paths:
      - artifacts/compat/
      - artifacts/migration/
      - docs/compat/
      - docs/migration/
      - docs/extensions/
      - schemas/migration/
      - fixtures/migration/
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - id: docs_public_truth
    kind: public_truth_area
    protected: true
    scope: >
      External-facing copy, contribution guide, repo topology, build
      baseline, known-limits matrix, support-window statements, and
      migration guides.
    paths:
      - docs/
      - README.md
      - AGENTS.md
      - CLAUDE.md
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - id: support_export
    kind: supportability_family
    protected: true
    scope: >
      Support bundles with redaction rules, doctor probes, recovery
      ladder, export-safe packet schemas, the support-packet family
      index, field runbooks, and the crash-diagnostics corpus.
    paths:
      - artifacts/support/
      - schemas/support/
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - id: design_system_seeds
    kind: public_truth_area
    protected: true
    scope: >
      Design-system snapshots, token sources, and component references
      seeded at the current milestone.
    paths:
      - artifacts/ux/
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - id: accessibility_input_review
    kind: review_family
    protected: true
    scope: >
      Accessibility review charter, acceptance-pack reservations,
      assistive-tech and platform-input matrices, task corpus
      manifests, input-method review packets, and reduced-motion /
      contrast artifacts.
    paths:
      - docs/accessibility/
      - artifacts/accessibility/
      - fixtures/accessibility/
    primary_dri: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

  - id: governance_packets
    kind: packet_family
    protected: true
    scope: >
      Governance packet templates and the produced packets: verification,
      benchmark report, compatibility report, claim manifest, shiproom
      packet, waiver register.
    paths:
      - artifacts/governance/
      - schemas/governance/
    primary_dri: "@ahmeddyounis"
    evidence_owner: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup

# -----------------------------------------------------------------------------
# Decision forums
#
# Named decision forum families in scope. Each chair is the DRI for the
# forum's outputs (decisions, waivers they accept). Under the solo-maintainer
# posture, every chair resolves to the sole maintainer; adding a named
# chair per forum is part of closing the single-maintainer backup waiver.
# -----------------------------------------------------------------------------
decision_forums:
  - id: architecture_council
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    charter: >
      Owns renderer / text stack, reactive truth, schema ownership, and
      command identity. Required to approve narrowing on protected lanes
      and opening or renewing backup-owner waivers.

  - id: performance_council
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    charter: >
      Owns protected fitness functions, benchmark corpora, waiver rules,
      and regression budgets. Required to approve waivers on protected
      fitness functions.

  - id: security_trust_review
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    charter: >
      Owns workspace trust, extension capabilities, proxy / SSH model,
      and policy decisions.

  - id: accessibility_review
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    charter: >
      Owns accessibility, keyboard, screen-reader, IME, locale, and
      design sign-off decisions on launch-critical surfaces. Required to
      approve accessibility release exceptions and claim narrowing.

  - id: compatibility_ecosystem_review
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    charter: >
      Owns launch archetype selection, importer cutline, extension bridge,
      and SDK freeze decisions.

  - id: product_scope_review
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    charter: >
      Owns cutline decisions for stable versus follow-on scope, language
      support levels, and enterprise commitments.

  - id: open_community_sync
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    charter: >
      Owns public roadmap truth, contributor-facing cutline updates, and
      governance transparency summaries. It does not approve protected-
      path exceptions but must record public claim narrowing clearly.

  - id: release_council
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    charter: >
      Owns signing, publishing, rollback, and release evidence promotion.
      Co-required with architecture council to re-baseline milestone
      scope, dates, or acceptance thresholds.

  - id: shiproom_executive_scope_review
    chair: "@ahmeddyounis"
    backup_chair: null
    backup_waiver: single-maintainer-backup
    charter: >
      Final gate for release candidates and stable promotion; required to
      approve late feature additions or late schema changes inside the
      release candidate.

# -----------------------------------------------------------------------------
# Scorecard lane index
#
# Lane identifiers referenced by the milestone scorecard template
# (artifacts/governance/milestone_scorecard_template.yaml). Each lane ID here
# MUST resolve either to a package name above or to a governance_lane id.
# Tooling uses this index to fail closed when a scorecard row references an
# unknown lane.
# -----------------------------------------------------------------------------
scorecard_lane_index:
  - aureline-render
  - aureline-buffer
  - aureline-vfs
  - aureline-text
  - aureline-rpc
  - aureline-telemetry
  - aureline-shell-spike
  - aureline-bench
  - shell_command_system
  - benchmark_lab
  - release_evidence
  - compatibility_ecosystem_review
  - docs_public_truth
  - support_export
  - design_system_seeds
  - accessibility_input_review
  - governance_packets
