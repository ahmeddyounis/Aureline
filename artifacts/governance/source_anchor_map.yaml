# Source-anchor map.
#
# One binding map from canonical requirement ids, control-artifact rows,
# and governance packet families back to the source-document sections
# that authorize them. The canonical requirement register, the
# control-artifact index, and the governance packet template are the
# downstream consumers. This map is authoritative for the linter at
# tools/check_source_anchors.py and the narrative companion at
# docs/governance/canonical_reference_rules.md.
#
# Conformance: this file conforms to
#   schemas/governance/source_anchor_map.schema.json.
#
# What this map adds on top of the requirement register's
# per-row source_anchors list:
#   - Control artifacts and packet families also get explicit anchors,
#     so "which source section owns this artifact" is answerable
#     without grep.
#   - Aliases (copied prose, spec-local labels, scorecard calls, and
#     legacy ids) carry an alias_id that is unique across the whole map.
#     The linter fails when an alias is duplicated or orphaned.
#   - Every row classifies itself with artifact_class. The linter and the
#     drift-report template read that class so a change to a source
#     section can be scoped to every affected requirement row, every
#     affected control artifact, every affected packet family, or every
#     affected shiproom surface rather than only the rows that happen to
#     name the source doc in free text.
#
# Rules (enforced by the linter):
#   - claims_source_authority=true rows MUST carry at least one
#     canonical_anchor.
#   - Every alias_id MUST be unique across the whole map.
#   - Every requirement_id in
#     artifacts/governance/requirement_register_seed.yaml MUST resolve to
#     exactly one requirement_row here (orphan detection).
#   - Every canonical_anchors[].doc_id MUST resolve to a row in
#     canonical_source_documents.
#   - Every canonical_source_documents[].doc_ref MUST exist on disk.
#
# Scope:
#   The seed covers the foundations-critical requirement rows, the
#   major control artifacts that back them, and the standing governance
#   packet families. Long-range rows that have no canonical requirement
#   id yet are intentionally out of scope until their register rows land.

record_kind: source_anchor_map_record
schema_version: 1
map_id: aureline.source_anchor_map.seed.01
title: Aureline source-anchor map
overview_doc: docs/governance/canonical_reference_rules.md
drift_report_dir: artifacts/governance/source_drift_reports/
drift_report_template_ref: artifacts/governance/source_drift_reports/template.md

ownership:
  primary_owner: "@ahmeddyounis"
  evidence_owner: "@ahmeddyounis"
  owning_lane: governance_packets

# -----------------------------------------------------------------------------
# Canonical source documents.
#
# Every canonical_anchors[].doc_id below MUST resolve to one of these rows.
# -----------------------------------------------------------------------------
canonical_source_documents:
  - doc_id: aureline_prd
    doc_ref: .t2/docs/Aureline_PRD.md
    purpose: Product requirements. Normative MUST/SHOULD language and the launch-blocking requirement index.
  - doc_id: aureline_technical_architecture_document
    doc_ref: .t2/docs/Aureline_Technical_Architecture_Document.md
    purpose: System architecture and requirement summary table.
  - doc_id: aureline_technical_design_document
    doc_ref: .t2/docs/Aureline_Technical_Design_Document.md
    purpose: Detailed component designs, fixture-corpus governance, and milestone-close conditions.
  - doc_id: aureline_milestones_document
    doc_ref: .t2/docs/Aureline_Milestones_Document.md
    purpose: Milestone breakdown, canonical requirement-register operating model, and alias-discipline rules.
  - doc_id: aureline_ui_ux_spec_document
    doc_ref: .t2/docs/Aureline_UI_UX_Spec_Document.md
    purpose: UI/UX specifications and canonical-reference rules for packets, scorecards, and waivers.
  - doc_id: aureline_ux_design_system_style_guide
    doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md
    purpose: Design tokens, components, and styling rules.

# -----------------------------------------------------------------------------
# Artifact classes.
#
# Closed vocabulary. Every row MUST pick one class. The linter and the
# drift-report template group rows by class, so a change to a source
# section can be scoped to one class without repeating "what kind of
# artifact is this" on every row.
# -----------------------------------------------------------------------------
artifact_classes:
  - class_id: requirement_row
    summary: Canonical requirement id from the requirement register. Binds a shipped obligation to its source anchor.
    authority_posture: claims_source_authority
  - class_id: control_artifact
    summary: A row in the control-artifact index. Represents a governance asset that backs one or more requirement ids, packet families, or review surfaces.
    authority_posture: claims_source_authority
  - class_id: packet_family
    summary: A governance packet family (verification, benchmark_report, compatibility_report, claim_manifest, shiproom, waiver_register). Binds the packet-family contract back to the source section that authorizes it.
    authority_posture: claims_source_authority
  - class_id: shiproom_artifact
    summary: A release, shiproom, or ring-progression artifact that participates in go/no-go decisions.
    authority_posture: claims_source_authority
  - class_id: evidence_label
    summary: A non-authoritative label (scorecard call, fitness row, contract-family label, milestone-exit label) that resolves to one or more canonical rows. These rows MUST NOT claim source authority.
    authority_posture: no_source_authority

# -----------------------------------------------------------------------------
# Severity classes.
#
# Produced by the linter. Downstream reviewers use the severity_id to
# decide whether to block merge, block promotion, or file a time-boxed
# defect.
# -----------------------------------------------------------------------------
severity_classes:
  - severity_id: missing_canonical_anchor
    summary: A row claims source authority but does not carry at least one canonical_anchor.
    blocks: Blocks merge when the row already shipped with claims_source_authority=true.
  - severity_id: source_authority_without_anchor
    summary: A row's artifact class has authority_posture=claims_source_authority but the row declares claims_source_authority=false without a visible downgrade reason.
    blocks: Blocks merge. File a class downgrade or add a canonical anchor in the same change.
  - severity_id: duplicate_alias
    summary: Two or more rows carry the same alias_id, or an alias_id collides with an anchor_id from another row.
    blocks: Blocks merge. Aliases are lookup handles; they must resolve to one canonical row.
  - severity_id: alias_without_canonical_target
    summary: An alias row exists but the canonical target row is missing or does not claim source authority.
    blocks: Blocks merge. Every alias must point at a canonical row that owns the source anchor.
  - severity_id: orphaned_requirement_id
    summary: A requirement_id in the requirement register has no matching requirement_row in this map.
    blocks: Blocks merge. Every canonical requirement id must trace back to one source anchor.
  - severity_id: unknown_source_document
    summary: A canonical_anchors[].doc_id does not resolve to a row in canonical_source_documents.
    blocks: Blocks merge. Add the source-document row or correct the doc_id.
  - severity_id: missing_source_document_file
    summary: A canonical_source_documents[].doc_ref does not exist on disk.
    blocks: Blocks merge. Restore the source document or remove the row if the document was retired.
  - severity_id: class_coverage_gap
    summary: A class that is expected to have at least one row (requirement_row, control_artifact, packet_family) has zero rows.
    blocks: Blocks merge until the map covers every class that the schema declares as claims_source_authority.

