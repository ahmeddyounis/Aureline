# External alpha capability-lifecycle registry.
#
# Canonical registry for launch-wedge capability posture and dependency
# markers. Product, docs, Help/About, settings, diagnostics, marketplace, and
# support-export projections consume these rows instead of restating lifecycle
# labels locally.

schema_version: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

registry_id: external_alpha_capability_lifecycle_registry
human_entrypoint_ref: docs/governance/m2_capability_lifecycle.md
dependency_marker_schema_ref: schemas/governance/dependency_marker.schema.json
alpha_wedge_matrix_ref: artifacts/milestones/m2/alpha_wedge_matrix.yaml
alpha_exit_scoreboard_ref: artifacts/milestones/m2/exit_gate_scoreboard.yaml
known_limits_ref: artifacts/feedback/external_alpha_known_limits.md

validator:
  script_ref: ci/check_capability_lifecycle_registry.py
  command: python3 ci/check_capability_lifecycle_registry.py --repo-root .
  consumer_projection_command: python3 ci/check_capability_lifecycle_registry.py --repo-root . --render-help-projection

lifecycle_vocabulary:
  - Labs
  - Preview
  - Beta
  - Stable
  - Deprecated
  - DisabledByPolicy
  - Retired

schema_projection:
  Labs: labs
  Preview: preview
  Beta: beta
  Stable: stable
  Deprecated: deprecated
  DisabledByPolicy: disabled_by_policy
  Retired: retired

default_posture_vocabulary:
  - visible_with_lifecycle_badge
  - visible_with_marker_disclosure
  - enabled_when_fixture_current
  - disabled_until_scope_review

support_promise_vocabulary:
  - alpha_limited_support
  - alpha_best_effort
  - internal_contract_only
  - no_external_support

marker_artifact_class_vocabulary:
  - profile_artifact
  - workspace_manifest
  - saved_view
  - export
  - migration_packet
  - bundle_claim
  - archetype_claim
  - hosted_integration
  - helper_internal
  - policy_disable

source_contract_refs:
  - artifacts/milestones/m2/alpha_wedge_matrix.yaml
  - artifacts/milestones/m2/exit_gate_scoreboard.yaml
  - artifacts/bundles/tsjs_launch_bundle_alpha.yaml
  - artifacts/bundles/python_launch_bundle_alpha.yaml
  - artifacts/certification/m2_archetype_seed_rows.yaml
  - artifacts/migration/m2_parity_scoreboard.yaml
  - artifacts/feedback/external_alpha_known_limits.md
  - docs/governance/capability_lifecycle_projection_matrix.md
  - docs/adr/0011-capability-lifecycle-and-dependency-markers.md

publication_rules:
  - rule_id: capability_lifecycle_registry_rule:effective_state_wins
    summary: >
      Consumers render effective_lifecycle_state. declared_lifecycle_state is
      only shown in details when a marker narrows or gates the row.
  - rule_id: capability_lifecycle_registry_rule:no_hidden_preview_dependencies
    summary: >
      A row with a non-stable dependency marker must render the marker on
      Help/About, settings, diagnostics, marketplace, docs, and support-export
      surfaces before it can be cited as alpha-ready.
  - rule_id: capability_lifecycle_registry_rule:policy_disabled_requires_repair
    summary: >
      DisabledByPolicy rows stay visible with a typed disable reason,
      policy-disable reference, and scope-review or repair route.

first_consumers:
  - consumer_id: alpha_lifecycle_help_projection
    surface_class: help_about_diagnostics_projection
    consumer_ref: ci/check_capability_lifecycle_registry.py
    command: python3 ci/check_capability_lifecycle_registry.py --repo-root . --render-help-projection
    required_rendered_fields:
      - row_id
      - surface_ref
      - effective_lifecycle_state
      - owner
      - review_or_expiry_date
      - dependency_markers
    output_contract: >
      The projection is export-safe JSON suitable for Help/About, settings,
      diagnostics, marketplace, and support-export consumers. It carries marker
      ids and disclosure summaries, not raw paths, tokens, provider secrets, or
      workspace content.

surface_rows:
  - row_id: capability_lifecycle:alpha.ts_js.launch_wedge
    surface_ref: alpha_wedge:typescript_javascript
    surface_kind: launch_wedge
    title: TypeScript / JavaScript external alpha launch wedge
    declared_lifecycle_state: Preview
    effective_lifecycle_state: Preview
    owner: "@ahmeddyounis"
    target_persona_or_workflow: persona:p0.typescript_web_app_developer
    default_posture: visible_with_lifecycle_badge
    migration_note: >
      VS Code profile and workflow imports are seeded through the migration
      parity scoreboard; unsupported extension and task gaps remain visible.
    support_promise: alpha_limited_support
    review_or_expiry_date: "2026-06-09"
    kill_switch_or_policy_disable_ref: policy:alpha.lifecycle.ts_js_wedge.disable
    source_scope_refs:
      - alpha_wedge:typescript_javascript
      - workflow.alpha.ts_js.open_to_first_useful_result
      - workflow.alpha.ts_js.rename_preview
      - workflow.alpha.ts_js.test_debug_loop
      - workflow.alpha.ts_js.git_review_basics
    scoreboard_row_refs:
