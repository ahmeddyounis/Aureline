dependency_markers:
  - marker_id: dependency_marker:alpha.ts_js.workspace_manifest_seed
    marker_schema_version: 1
    marker_kind: NonStableCapabilityDependency
    parent_row_ref: capability_lifecycle:alpha.ts_js.launch_wedge
    artifact_classes:
      - workspace_manifest
    dependency_ref: fixtures/reference_workspaces/m2/ts_web_app_workflows.yaml
    dependency_lifecycle_state: Preview
    effect_on_parent: NarrowsLifecycle
    reason_code: dependency_state_below_parent_declared_state
    disclosure_summary: >
      The TypeScript / JavaScript workspace manifest and workflow packets are
      preview evidence. Surfaces may show the wedge as alpha-ready only with a
      preview marker and current fixture review.
    repair_or_review_ref: artifacts/benchmarks/m2_fixture_register.yaml#fixture_register:external_alpha.ts_web_app_reference
    review_or_expiry_date: "2026-06-09"
    export_visibility: export_safe_summary
    source_refs:
      - artifacts/benchmarks/m2_fixture_register.yaml
      - fixtures/reference_workspaces/m2/ts_web_app_workflows.yaml

  - marker_id: dependency_marker:alpha.python.workspace_manifest_seed
