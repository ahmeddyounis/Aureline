        - docs/state/profile_and_state_map.md
        - docs/ux/persistence_inspector_contract.md
        - docs/workspace/layout_serialization_contract.md
        - schemas/profile/profile_library_entry.schema.json
        - schemas/profile/portable_profile.schema.json
        - schemas/profile/sync_conflict_record.schema.json
        - schemas/state/portable_state_package.schema.json
        - schemas/workspace/pane_tree.schema.json
        - fixtures/profile/scope_class_cases/README.md
        - fixtures/state/restore_provenance_cards/README.md
      schema_or_interface_directory_refs:
        - docs/profile/
        - docs/state/
        - docs/ux/
        - docs/workspace/
        - schemas/profile/
        - schemas/state/
        - schemas/workspace/
    versioning:
      rule_summary: >
        Profile, state-map, export-manifest, restore-provenance, and
        pane-tree records evolve by schema epoch with explicit fidelity
        classes (`exact`, `compatible`, `layout_only`, `manual_review`)
        instead of silent loss.
      compatibility_window_source_ref: >
        artifacts/compat/qualification_matrix_seed.yaml#compat_row:state.profile_layout_schema
    reader_writer_semantics:
      canonical_writers:
        - profile_export_and_restore_producer
        - portable_state_package_producer
        - layout_restore_producer
      canonical_readers:
        - persistence_inspector_restore_layout_and_support_consumers
      reader_semantics:
        - Readers preserve portable versus local-only distinctions and surface restore fidelity labels verbatim.
        - Readers surface package exclusions, checksum state, signature state, and restore-provenance cards before users trust an export or restore result.
        - Readers treat missing or downgraded layout state as explicit `compatible`, `layout_only`, or `manual_review` outcomes rather than silent best-effort success.
      writer_semantics:
        - Writers emit explicit schema versions, stable pane ids, portability classes, package manifests, and restore-provenance labels.
        - Writers do not serialize live authority or replay unsafe execution state as if it were portable layout truth.
      downgrade_behavior: >
        Downgrade truthfully to `compatible`, `layout_only`, or
        `manual_review`; refuse mutation when fidelity would be
        misrepresented.
    compatibility:
      compatibility_window_summary: >
        Profile and layout readers stay within one schema epoch and
        preserve additive fields while downgrade labels carry the
        out-of-window honesty path.
      support_window_posture: >
        Beta today. Stable profile and layout families target twelve
        months or two minor releases of backward readability once
        promoted.
      compatibility_report_refs:
        - artifacts/compat/qualification_matrix_seed.yaml#compat_row:state.profile_layout_schema
      migration_guidance_refs:
        - docs/governance/interface_lifecycle_policy.md
        - docs/state/migration_and_restore_playbook.md
