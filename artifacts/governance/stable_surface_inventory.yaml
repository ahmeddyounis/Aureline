        - artifacts/compat/qualification_matrix_seed.yaml#compat_row:release_identity.exact_build_propagation
      migration_guidance_refs:
        - docs/build/exact_build_identity_model.md
        - artifacts/governance/stable_surface_inventory.yaml#build.exact_build_identity_fields
