    surface_id: state.portable_profile_and_layout_restore
    surface_title: Portable-profile and layout-restore schemas
    summary: >
      Profile export/import, state-map, profile-library, sync-conflict,
      restore-provenance, and window layout contracts that define
      portable versus local-only state, portable-state package review,
      non-widening sync, and honest restore downgrade labels.
