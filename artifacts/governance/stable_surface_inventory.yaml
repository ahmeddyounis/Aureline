  - schema_version: 1
    packet_kind: surface_contract_packet
    surface_id: product.boundary_manifest_rows
    surface_title: Boundary-manifest capability rows
    summary: >
      Open-core versus managed-boundary rows that release, support, and
      deployment-profile artifacts cite when claiming continuity or
      optional-service narrowing.
    maturity_lane: experimental
    contract_form: json_schema_backed_contract_doc
    ownership:
      owner_dri: "@ahmeddyounis"
      owning_lane: release_evidence
      backup_owner: null
      backup_waiver: single-maintainer-backup
    publication:
      publication_artifact_refs:
        - docs/product/boundary_manifest_strawman.md
        - schemas/product/boundary_manifest.schema.json
        - artifacts/support/deployment_drill_catalog_seed.yaml
      schema_or_interface_directory_refs:
        - docs/product/
        - schemas/product/
        - artifacts/support/
    versioning:
      rule_summary: >
        Boundary rows evolve by manifest schema version plus stable
        capability ids and deployment-profile ids; supersession replaces a
        row, deletion does not.
      compatibility_window_source_ref: >
        artifacts/compat/qualification_matrix_seed.yaml#compat_row:deployment_profiles.boundary_manifest_truth
    reader_writer_semantics:
      canonical_writers:
        - boundary_manifest_maintainers
      canonical_readers:
        - release_support_docs_and_deployment_profile_consumers
      reader_semantics:
        - Readers preserve deployment-profile ids, local-core continuity, and absence-narrows-to statements verbatim.
        - Readers treat a proposed or superseded row as explicitly non-ratified rather than silently stable.
      writer_semantics:
        - Writers emit explicit classification, continuity, portability, and data-boundary fields on every row.
        - Writers keep new managed-copy or support/export implications aligned with the record-class registry instead of burying them in prose.
      downgrade_behavior: >
        Narrow claims to the stated local-core continuity or refuse the
        claim; do not silently widen the managed boundary or invent a
        fallback classification.
    compatibility:
      compatibility_window_summary: >
        One deployment-profile vocabulary and one continuity story stay
        aligned across boundary rows, drills, and claim-bearing packets.
      support_window_posture: >
        Experimental until ratified; claim-bearing packets already cite
        the same row ids and profile ids instead of prose-only scope.
      compatibility_report_refs:
        - artifacts/compat/qualification_matrix_seed.yaml#compat_row:deployment_profiles.boundary_manifest_truth
      migration_guidance_refs:
        - docs/product/boundary_manifest_strawman.md
        - artifacts/governance/stable_surface_inventory.yaml#product.boundary_manifest_rows
    lifecycle:
      dependency_markers:
        - proposed_not_yet_ratified
      deprecation_posture: >
        Superseded rows remain inspectable; replacing a row requires a
        successor row and claim-manifest update before the old one stops
        carrying truth.
