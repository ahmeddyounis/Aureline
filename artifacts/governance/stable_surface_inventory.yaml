# Stable-surface inventory seed.
#
# Each row below is a concrete surface-contract packet using the shape in
# schemas/governance/contract_packet.schema.json. Cite a row as
# artifacts/governance/stable_surface_inventory.yaml#<surface_id>; that
# row ref is the canonical id compatibility, docs, migration,
# deprecation, release, and support work should share.
#
# Stable-facing rules:
#   - Rows in maturity_lane stable or beta must name owner, versioning,
#     reader/writer semantics, downgrade behavior, support-window
#     posture, publication artifacts, and a compatibility-window source
#     row before broad implementation proceeds.
#   - Experimental and internal rows still use the same packet shape so
#     WIT worlds, task-event envelopes, and service APIs do not wait for
#     bespoke side documents.

schema_version: 1
status: seeded
overview_page: docs/governance/interface_inventory.md
contract_packet_template_ref: docs/governance/contract_packet_template.md
contract_packet_schema_ref: schemas/governance/contract_packet.schema.json
row_reference_format: artifacts/governance/stable_surface_inventory.yaml#<surface_id>

rows:
  # ---------------------------------------------------------------------------
  # Stable-facing seed rows
  # ---------------------------------------------------------------------------
  - schema_version: 1
    packet_kind: surface_contract_packet
    surface_id: command_plane.command_descriptor_and_invocation_session
    surface_title: Command descriptors and invocation-session packets
    summary: >
      Governed command contract consumed by palette, menu, CLI, AI-tool,
      automation, and replay or audit surfaces.
    maturity_lane: beta
    contract_form: json_schema_backed_contract_doc
    ownership:
      owner_dri: "@ahmeddyounis"
      owning_lane: shell_command_system
      backup_owner: null
      backup_waiver: single-maintainer-backup
    publication:
      publication_artifact_refs:
        - docs/commands/command_descriptor_contract.md
        - docs/ux/menu_command_bar_contract.md
        - schemas/commands/command_descriptor.schema.json
        - schemas/commands/command_registry_entry.schema.json
        - schemas/commands/menu_item.schema.json
        - fixtures/commands/command_descriptor_examples/README.md
        - fixtures/commands/seed_commands/README.md
        - fixtures/commands/menu_cases/README.md
        - artifacts/commands/command_registry_seed.yaml
      schema_or_interface_directory_refs:
        - docs/commands/
        - schemas/commands/
    versioning:
      rule_summary: >
        One command-descriptor schema epoch plus stable `command_id` and
        `command_revision_ref`; additive fields remain in-epoch, while
        removed or meaning-changing fields require a schema-version bump
        and parity review.
      compatibility_window_source_ref: >
        artifacts/compat/qualification_matrix_seed.yaml#compat_row:command_plane.command_descriptor_schema
    reader_writer_semantics:
      canonical_writers:
        - command_registry_projection
        - invocation_session_emitters
      canonical_readers:
        - palette_menu_cli_ai_and_invocation_session_consumers
      reader_semantics:
        - Readers project command ids, help anchors, preview classes, approval posture, and disabled reasons verbatim.
        - Readers preserve unknown additive fields within the declared schema epoch instead of reminting per-surface copies.
      writer_semantics:
        - Writers emit explicit schema version, stable command ids, and typed enablement, preview, and approval fields on every descriptor and invocation packet.
        - Writers keep invocation-session packets pinned to the descriptor revision they quote.
      downgrade_behavior: >
        Fail closed on required-field drift; surface declared aliases,
        typed disabled reasons, and migration notes instead of silently
        widening or guessing.
    compatibility:
      compatibility_window_summary: >
        Descriptor and invocation-session producers and consumers stay
        inside one schema epoch and preserve unknown additive fields.
      support_window_posture: >
        Beta today. Once promoted to stable, command ids and machine
        surfaces target two minor releases of alias or migration
        support.
      compatibility_report_refs:
        - artifacts/compat/qualification_matrix_seed.yaml#compat_row:command_plane.command_descriptor_schema
        - docs/commands/command_parity_diff.md
      migration_guidance_refs:
        - docs/governance/interface_lifecycle_policy.md
        - docs/commands/command_parity_diff.md
        - artifacts/governance/stable_surface_inventory.yaml#command_plane.command_descriptor_and_invocation_session
    lifecycle:
      dependency_markers: []
      deprecation_posture: >
        Removal requires a replacement command id or alias, a parity
        diff, docs/help updates, a metadata row that follows
        docs/governance/interface_lifecycle_policy.md, and a typed
        migration note before the legacy id stops being honored.
    review:
      review_cadence: each_change
      docs_touchpoint_refs:
        - docs/commands/command_descriptor_contract.md
        - docs/ux/menu_command_bar_contract.md

