        - artifacts/settings/
    versioning:
      rule_summary: >
        Stable `setting_id` values, explicit schema-version fields, and
        alias or migration tables govern evolution; additive fields and
        unknown-user content are preserved where the contract allows.
      compatibility_window_source_ref: >
        artifacts/governance/stable_surface_inventory.yaml#settings.setting_ids_and_effective_values
    reader_writer_semantics:
      canonical_writers:
        - setting_definition_registry
        - effective_setting_resolver
      canonical_readers:
        - settings_ui_cli_policy_explainer_profile_and_support_consumers
      reader_semantics:
        - Readers project `setting_id`, `resolved_scope`, `shadow_chain`, and typed denial or restart posture verbatim.
        - Readers preserve unknown additive fields and do not silently discard unknown user-authored settings while round-tripping editable files.
      writer_semantics:
        - Writers emit explicit definition and envelope schema versions, stable setting ids, and typed preview or rollback posture.
        - Writers use alias and migration tables instead of repurposing an existing setting id.
      downgrade_behavior: >
        Fail closed or degrade with typed migration or alias guidance;
        never silently widen trust, policy scope, or machine-portable
        state.
    compatibility:
      compatibility_window_summary: >
        One additive schema epoch plus alias-backed migration of renamed
        settings; unknown fields remain preserved during round trip.
      support_window_posture: >
        Beta today. Stable setting ids and effective-value records target
        twelve months or two minor releases of compatibility once the
        surface is claimed stable.
      compatibility_report_refs:
        - artifacts/governance/stable_surface_inventory.yaml#settings.setting_ids_and_effective_values
      migration_guidance_refs:
        - docs/governance/interface_lifecycle_policy.md
        - docs/settings/settings_vocabulary.md
        - docs/state/migration_and_restore_playbook.md
    lifecycle:
      dependency_markers: []
      deprecation_posture: >
        Deprecated settings require a replacement id or alias path, an
        explain-why route, a metadata row that follows
        docs/governance/interface_lifecycle_policy.md, and migration
        notes before the old id is ignored or removed.
    review:
      review_cadence: each_change
      docs_touchpoint_refs:
        - docs/settings/settings_vocabulary.md

  - schema_version: 1
