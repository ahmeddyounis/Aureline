        - schemas/docs/
    versioning:
      rule_summary: >
        The manifest uses an explicit schema version plus
        `semver_version` and `compat_window_semver`; publishable state,
        citation posture, and mirror lineage are part of the contract and
        may not drift in prose only.
      compatibility_window_source_ref: >
        artifacts/governance/stable_surface_inventory.yaml#docs.docs_pack_manifest
    reader_writer_semantics:
      canonical_writers:
        - docs_pack_registry
        - generated_reference_index
        - mirrored_docs_index
      canonical_readers:
        - docs_pane_help_about_service_health_and_support_consumers
      reader_semantics:
        - Readers preserve version-match, freshness, citation, backlink, and publishable-blocker fields verbatim.
        - Readers do not render a stale, blocked, quarantined, or newer-than-client pack as authoritative.
      writer_semantics:
        - Writers emit explicit compatibility windows, signing and mirror lineage, locale coverage, and citation posture.
        - Writers use supersession or withdrawal fields instead of silently overwriting the last published pack revision.
      downgrade_behavior: >
        Degrade to typed stale, blocked, quarantined, or incompatible
        render states; never silently fall back to an authoritative
        render when the pack is out of window.
    compatibility:
      compatibility_window_summary: >
        The manifest itself is additive within a schema epoch, while
        each pack declares its own `compat_window_semver` against the
        running build identity.
      support_window_posture: >
        Beta today. Stable docs-pack publication targets the same
        twelve-month or two-minor window as the build identities the
        packs describe.
      compatibility_report_refs:
        - artifacts/governance/stable_surface_inventory.yaml#docs.docs_pack_manifest
      migration_guidance_refs:
        - docs/governance/interface_lifecycle_policy.md
        - docs/docs/docs_pack_manifest_contract.md
        - artifacts/governance/stable_surface_inventory.yaml#docs.docs_pack_manifest
    lifecycle:
      dependency_markers: []
      deprecation_posture: >
        Deprecation or withdrawal requires a superseding pack revision
        or a clearly published withdrawal state, a metadata row that
        follows docs/governance/interface_lifecycle_policy.md, plus
        docs/help visibility for the replacement or loss of authority.
    review:
      review_cadence: each_change
      docs_touchpoint_refs:
        - docs/docs/docs_pack_manifest_contract.md

