      reader_semantics:
        - Readers quote record-class ids and posture fields verbatim instead of inventing private retention or export labels.
        - Readers treat a missing or incompatible row as a contract failure, not an invitation to improvise a default policy.
      writer_semantics:
        - Writers keep delete, export, hold, offboarding, and retention posture in separate fields on every row.
        - Writers land new managed-copy or export packet classes in the registry in the same change that introduces them.
      downgrade_behavior: >
        Refuse export, delete, or support claims when the row is missing
        or the schema epoch is incompatible; no private fallback
        vocabulary is allowed.
    compatibility:
      compatibility_window_summary: >
        One schema epoch plus additive row and vocabulary growth; later
        support/export packets cite stable `record_class_id` values.
      support_window_posture: >
        Beta today. Any stable support or export surface that quotes a
        record-class id must remain inside the declared schema epoch
        until a broader support window is published.
      compatibility_report_refs:
        - artifacts/governance/stable_surface_inventory.yaml#governance.record_class_registry_rows
      migration_guidance_refs:
        - docs/governance/interface_lifecycle_policy.md
        - docs/governance/record_class_governance.md
        - artifacts/governance/stable_surface_inventory.yaml#governance.record_class_registry_rows
