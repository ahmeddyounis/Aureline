        - Writers emit one identity per artifact-family record and keep provenance, toolchain, target, and release-channel fields explicit.
        - Writers keep binaries, symbols, docs/help truth, SBOMs, and release evidence linked through the same identity instead of per-surface dialects.
      downgrade_behavior: >
        Fail closed on version-only fallback or mismatched artifact-family
        linkage; downgrade by coordinated rollback or rebuild, not by
        silently accepting ambiguous build truth.
