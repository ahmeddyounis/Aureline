      - axis: location_class
        source: collaboration_recorded_artifact_row
      - axis: export_availability_class
        source: collaboration_recorded_artifact_row
      - axis: irreversible_share_warning_class
        source: collaboration_recorded_artifact_row
      - axis: legal_hold_note_class
        source: collaboration_recorded_artifact_row
      - axis: chronology_evidence_source_class
        source: chronology_context
      - axis: current_state_class
        source: chronology_context
      - axis: timezone_basis_class
        source: chronology_context
      - axis: relative_time_basis_class
        source: chronology_context
      - axis: imported_artifact_disclosure_class
        source: chronology_context
      - axis: stable_delete_state
        source: retention_deletion_matrix
      - axis: partial_blocker_class
        source: retention_deletion_matrix
      - axis: remaining_location_class
        source: retention_deletion_matrix
      - axis: delete_path_status_class
        source: collaboration_recorded_artifact_row
      - axis: follow_up_wording_class
        source: collaboration_recorded_artifact_row
    honesty_invariants:
      held_or_retained_not_reported_destroyed: true
      raw_payloads_not_embedded: true
      imported_origin_not_silently_re_owned: true
      live_state_not_claimed_on_imported_row: true
      live_state_not_claimed_on_replay_row: true
      live_state_not_claimed_on_offline_row: true
    notes:
      - An imported row MUST cite the import-origin manifest through `chronology_context.evidence_source_ref` and MUST carry a non-null `import_declared` block when the source class is in the imported family.
      - An Aureline-internal delete request against an imported packet cannot affect the import-origin copy; the user MUST be sent back to the import origin and the row resolves to `follow_up_third_party_origin_outside_aureline_scope`.
      - A row that resolves `evidence_source_class` to `offline_local_evidence_packet` carries a non-null `chronology_context.offline_window` block and resolves the relative-time basis to `since_offline_window_end`.

# -----------------------------------------------------------------------------
# Cross-row alignment table.
# Names how each axis flows from the upstream contract through this matrix
# without renaming. A surface that mints "shared session retention",
# "support archive hold", or "imported evidence delete" wording instead
# of resolving through the table below is non-conforming.
# -----------------------------------------------------------------------------
alignment_table:
  - axis: retained_vs_ephemeral_default
    collaboration_vocabulary: recording_state_class
    governance_vocabulary: retention_matrix_row.default_retention.trigger_class_and_duration_class
    support_vocabulary: records_governance_packet.record_class_registry_diff
  - axis: local_vs_hosted
    collaboration_vocabulary: location_class
    governance_vocabulary: retention_matrix_row.location_class
    support_vocabulary: records_governance_packet.export_delete_contract_status
  - axis: stable_delete_state
    collaboration_vocabulary: delete_path_status_class
    governance_vocabulary: delete_request_state.stable_delete_state
    support_vocabulary: records_governance_packet.export_delete_contract_status.delete_request_state_status_class
  - axis: partial_blocker
    collaboration_vocabulary: hold_kind_class
    governance_vocabulary: delete_request_state.partial_blockers.blocker_class
    support_vocabulary: records_governance_packet.open_held_data_caveats.caveat_class
  - axis: remaining_location
    collaboration_vocabulary: exported_local_copy_disclosure_class
    governance_vocabulary: delete_request_state.remaining_location_disclosure.locations.location_class
    support_vocabulary: records_governance_packet.open_held_data_caveats.affected_matrix_row_refs
  - axis: imported_vs_live_distinction
    collaboration_vocabulary: default_ephemeral_versus_explicit_enable_class.imported_origin_not_subject_to_default
    governance_vocabulary: chronology_context.evidence_source_class_and_current_state_class
    support_vocabulary: records_governance_packet.linked_artifact_families.collaboration_evidence_refs_and_support_export_packet_refs

# -----------------------------------------------------------------------------
# Cross-cutting honesty invariants.
# Every row in this matrix MUST honor these invariants in addition to the
# row-level invariants listed in the `honesty_invariants` block above.
# -----------------------------------------------------------------------------
cross_cutting_invariants:
  - invariant_id: held_or_retained_not_reported_destroyed
    description: A row with a retention floor or hold eligibility MUST surface `Policy retention` or `Legal hold` rather than reporting `Delete completed`.
    inherits_from:
      - retention_deletion_matrix
      - records_governance_packet
  - invariant_id: raw_payloads_not_embedded
    description: Rows carry typed ids and reviewable sentences only. Raw payload bodies, raw credentials, raw policy bundle bytes, raw prompts, and raw hold justifications never appear.
    inherits_from:
      - retention_deletion_matrix
      - collaboration_recorded_artifact_row
      - chronology_context
      - records_governance_packet
  - invariant_id: live_state_not_claimed_on_imported_offline_or_replayed_row
    description: A row whose `evidence_source_class` is in the imported / offline / replay families MUST NOT resolve `current_state_class` to `live_current_system_state`.
    inherits_from:
      - chronology_context
  - invariant_id: imported_origin_not_silently_re_owned
    description: Imported rows preserve their `import_declared` block and never resolve `retention_owner_class` to anything other than `third_party_imported_origin`.
    inherits_from:
      - collaboration_recorded_artifact_row
      - chronology_context
  - invariant_id: local_export_copy_disclosed_when_required
    description: When a managed delete completes but a downloaded export survives, the row resolves to `exported_copy_remains_local` and lists `local_export_copy` on the remaining-location disclosure.
    inherits_from:
      - retention_deletion_matrix
      - collaboration_recorded_artifact_row
  - invariant_id: expected_next_state_change_disclosed
    description: Every delete request cites a typed `change_class`; "should be quick" / "still working on it" substitutes are non-conforming.
    inherits_from:
      - retention_deletion_matrix
  - invariant_id: handoff_does_not_widen_scope
    description: Typed support / admin / compliance handoff packets never include payloads outside the matrix rows in scope.
    inherits_from:
      - retention_deletion_matrix
      - records_governance_packet
