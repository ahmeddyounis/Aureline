      raw_payloads_not_embedded: true
      local_export_copy_disclosed_when_required: true
      recording_must_be_explicit_enable_or_policy_forced: true
      raw_code_capture_not_admitted_without_policy_ref: true
    notes:
      - A row whose `recording_state_class` rises above `default_ephemeral_no_capture` MUST resolve `default_ephemeral_versus_explicit_enable_class` to `explicit_enable_user_required` or `explicit_enable_policy_forced_admin_signed`.
      - When a managed delete completes but a downloaded export survives the row resolves to `stable_delete_state = exported_copy_remains_local`, `delete_path_status_class = deletion_completed_but_exported_local_copy_surviving`, `exported_local_copy_disclosure_class = local_copy_exported_and_disclosed`, and the remaining-location list MUST include `local_export_copy`.

