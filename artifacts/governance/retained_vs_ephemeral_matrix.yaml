    honesty_invariants:
      held_or_retained_not_reported_destroyed: true
      raw_payloads_not_embedded: true
      deletion_event_held_row_never_renders_as_completed: true
      policy_owner_named: true
    notes:
      - A deletion-event row whose `deletion_event_state_class` is `policy_retention` or `legal_hold` MUST NOT render with the `delete_completed` chip; the row remains visible and named through the bound `delete_request_state_record`.
      - Every deletion-event chronology row cites `delete_request_state_ref` through `chronology_context.deletion_event_extras.delete_request_state_ref`.

  - row_id: imported_or_support_evidence_packet_row
    record_kind: imported_or_support_evidence_packet_row
    record_class_refs:
