  - example_id: new_deployment_promise_at_alpha_escalated
    fixture_ref: fixtures/governance/change_budget_examples/escalated_new_deployment_promise_at_alpha.yaml
    phase_id_ref: m2_alpha_wedge
    representative_change: new managed-cloud deployment promise during alpha
    outcome: escalated_then_rebaselined
