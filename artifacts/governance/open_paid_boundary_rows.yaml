# -----------------------------------------------------------------------------
# Rows.
# One row per asset class or capability family this seed governs.
# -----------------------------------------------------------------------------

rows:
  - record_kind: open_paid_boundary_row
    open_paid_boundary_row_schema_version: 1
    open_paid_boundary_row_id: open_paid_boundary_row:core_desktop_client_platform
    title: Core desktop / client / platform (local-first floor)
    artifact_family_class: core_desktop_client_platform
    description: >
      The desktop IDE and its local-first core workflows: editing, search,
      local Git, tasks, local debugging baseline, local diagnostics, and
      core configuration. This row exists to make it structurally
      impossible to “paywall the editor” or quietly require sign-in for
      local usefulness.
    scope:
      deployment_profiles_in_scope:
        - individual_local
        - self_hosted
        - enterprise_online
        - air_gapped
        - managed_cloud
      boundary_manifest_capability_ids:
        - editor_core
        - renderer_shell
        - workspace_vfs
        - command_plane
        - local_git
        - configuration_profiles
        - local_support_bundle
      portability_row_refs:
        - settings_keybindings_profiles_snippets
        - workspaces_tasks_launch_policy_files
      dependency_classes_in_scope: []
    open_vs_paid:
      open_local_core_floor: >
        Core editing, navigation/search, local Git, tasks, and local
        diagnostics remain usable with no sign-in and no network.
      optional_paid_convenience_additions:
        - Hosted collaboration, sync, and admin convenience layers that remain additive.
        - Managed dashboards and aggregation for telemetry/support that do not replace local export.
        - Hosted AI routing/quotas/audit that do not replace local/BYOK AI paths.
      managed_only_controls:
        - Vendor-operated service status pages, incident comms, and hosted support case dashboards (never required to export or operate locally).
      enterprise_self_host_lane: >
        Enterprise and self-host claims must preserve the same client-visible
        capability taxonomy and provide mirror/offline paths for required
        artifacts; self-host operation must not require vendor console
        intervention for core workflows.
      prohibited_hidden_prerequisites:
        - Core editing, local navigation/search, language baseline, and local debugging MUST NOT require a paid plan, sign-in, or hosted control plane.
        - Core workflows MUST NOT depend on vendor-only metadata round trips (control-plane reachability) to remain functional locally.
        - Local exports (profiles, settings, support bundles) MUST NOT be gated on a paid support channel.
      anti_lock_in_rules:
        - User-owned state must remain exportable in open or documented formats; export/offboarding posture cites portability rows.
        - Absence of optional services must narrow claims explicitly (deployment-profile truth + claim manifest), not degrade into silent loss.
        - “Contact support” is not an acceptable replacement for scriptable export on user-owned artifacts.
      publication_controls:
        license_lane_classes:
          - mpl_2_0_public_source
        code_visibility_requirement: public_source_required
        spec_visibility_requirement: public_spec_optional
        stable_surface_schema_docs_requirement: public_schema_and_docs_required_for_stable
        sample_availability_requirement: public_samples_recommended
        issue_routing_requirement: mixed_public_private_allowed_with_matrix
        rules:
          - Public claims about “local-first” must remain traceable to the boundary manifest, deployment-profile truth, and residual-dependency ledger.
          - Maintained source must carry REUSE/SPDX metadata per the provenance baseline.

  - record_kind: open_paid_boundary_row
    open_paid_boundary_row_schema_version: 1
    open_paid_boundary_row_id: open_paid_boundary_row:sdks_schemas_wit_protocol_samples
    title: SDKs, schemas, WIT/protocol contracts, and samples
    artifact_family_class: sdks_schemas_wit_protocol_samples
    description: >
      Public contracts that external consumers and extension authors
      depend on: JSON schemas, WIT worlds, protocol envelopes, SDK
      helper libraries, and sample packs. This row exists so ecosystem
      participation never requires a hidden private contract.
    scope:
      deployment_profiles_in_scope:
        - individual_local
        - self_hosted
        - enterprise_online
        - air_gapped
        - managed_cloud
      boundary_manifest_capability_ids:
        - extension_runtime_local
        - extension_registry_mirror
      portability_row_refs:
        - extension_inventory_and_registry_policy
        - extension_lockfiles_and_recommendations
      dependency_classes_in_scope:
        - package_registry
        - remote_mirror
    open_vs_paid:
      open_local_core_floor: >
        External consumers can build, validate, and integrate against
        published schemas/contracts without vendor-hosted tooling or
        a paid subscription.
      optional_paid_convenience_additions:
        - Hosted conformance dashboards and validation runners that remain optional.
        - Managed distribution convenience for SDK bundles (mirrors and offline bundles remain supported).
      managed_only_controls:
        - None required for contract participation; control surfaces that govern contracts must have file/CLI alternatives.
      enterprise_self_host_lane: >
        Enterprises can host private mirrors for SDK/schemas/samples;
        the public contract remains authoritative and mirrorable.
      prohibited_hidden_prerequisites:
        - Stable-labeled contracts MUST NOT be shipped without public schema/contract publication and version advertisement.
        - Samples required for a stable surface MUST NOT be private-only or gated behind a vendor account.
      anti_lock_in_rules:
        - Contract changes obey the stability-label and interface-lifecycle policy; stable surfaces carry deprecation metadata and overlap windows.
        - Offline/mirror acquisition must remain supported for enterprises and air-gapped deployments.
      publication_controls:
        license_lane_classes:
          - apache_2_0_public_source
        code_visibility_requirement: public_source_required
        spec_visibility_requirement: public_spec_required
        stable_surface_schema_docs_requirement: public_schema_and_docs_required_for_stable
        sample_availability_requirement: public_samples_required_for_stable
        issue_routing_requirement: mixed_public_private_allowed_with_matrix
        rules:
          - Public schemas are the source of truth for cross-tool boundaries; prose-only “specs” are insufficient for stable-labeled surfaces.
          - Samples and conformance artifacts remain mirrorable; “run this in our cloud” is not the only validation story.

  - record_kind: open_paid_boundary_row
    open_paid_boundary_row_schema_version: 1
    open_paid_boundary_row_id: open_paid_boundary_row:documentation_and_migration_guides
    title: Documentation, help, and migration guides
    artifact_family_class: documentation_and_migration_guides
    description: >
      Documentation and migration guidance that explain how to build,
      run, and operate Aureline across local-first, managed, and
      self-hosted deployments. This row exists so the docs are
      mirrorable and not paywalled.
    scope:
      deployment_profiles_in_scope:
        - individual_local
        - self_hosted
        - enterprise_online
        - air_gapped
        - managed_cloud
      boundary_manifest_capability_ids: []
      portability_row_refs: []
      dependency_classes_in_scope:
        - docs_pack
        - remote_mirror
    open_vs_paid:
      open_local_core_floor: >
        Docs required to build, install, and export user-owned data remain
        available without a paid subscription; offline docs-pack access
        remains supported where claimed.
      optional_paid_convenience_additions:
        - Hosted docs search, analytics, and personalized onboarding that do not replace mirrorable docs packs.
      managed_only_controls:
        - None; documentation remains a public surface regardless of paid offerings.
      enterprise_self_host_lane: >
        Enterprises can mirror docs packs internally; docs packs remain
        versioned and tied to release/build identity where applicable.
      prohibited_hidden_prerequisites:
        - Docs that explain open-core buildability, export/offboarding, or mirror/offline posture MUST NOT be restricted to paid customers.
        - “Learn more” links MUST NOT be the only source of truth for stable-labeled contracts; schemas and version advertisement remain required.
      anti_lock_in_rules:
        - Offline/mirror docs packs remain supported where the deployment-profile truth allows it; cached/offline posture remains explicit.
        - Docs/help truth must fail closed via the claim-manifest and drift-blocking rules when evidence is stale or narrower than copy.
      publication_controls:
        license_lane_classes:
          - cc_by_4_0_public_docs
        code_visibility_requirement: not_applicable
        spec_visibility_requirement: public_spec_optional
        stable_surface_schema_docs_requirement: public_docs_required
        sample_availability_requirement: public_samples_recommended
        issue_routing_requirement: mixed_public_private_allowed_with_matrix
        rules:
          - Docs packs are mirrorable artifacts; they must not depend on a live vendor site to remain accessible in constrained deployments.

  - record_kind: open_paid_boundary_row
    open_paid_boundary_row_schema_version: 1
    open_paid_boundary_row_id: open_paid_boundary_row:brand_and_trademarks
    title: Brand and trademark controls (restricted where necessary)
    artifact_family_class: brand_and_trademarks
    description: >
      Brand and trademark policy is allowed to be restricted where necessary,
      but restrictions must not be used to hide code, specs, formats, or
      exit paths behind proprietary control.
    scope:
      deployment_profiles_in_scope:
        - individual_local
        - self_hosted
        - enterprise_online
        - air_gapped
        - managed_cloud
      boundary_manifest_capability_ids: []
      portability_row_refs: []
      dependency_classes_in_scope: []
    open_vs_paid:
      open_local_core_floor: >
        Brand restrictions do not prevent building, forking, or operating a
        local-first open build; they only constrain use of protected marks.
      optional_paid_convenience_additions:
        - None. Brand controls are orthogonal to paid convenience.
      managed_only_controls:
        - None.
      enterprise_self_host_lane: >
        Self-host distributions can operate under their own branding
        while preserving compatibility with public schemas and formats.
      prohibited_hidden_prerequisites:
        - Brand controls MUST NOT be used to restrict access to schemas, SDKs, or portable export formats.
        - Trademark restrictions MUST NOT be used as a substitute for license compliance or publication controls.
      anti_lock_in_rules:
        - Forks and redistributions remain able to interoperate through public contracts; brand policy must not introduce format lock-in.
      publication_controls:
        license_lane_classes:
          - restricted_exception_inventory
        code_visibility_requirement: public_source_required_with_exceptions
        spec_visibility_requirement: public_spec_required_for_stable
        stable_surface_schema_docs_requirement: public_schema_and_docs_required_for_stable
        sample_availability_requirement: public_samples_recommended
        issue_routing_requirement: mixed_public_private_allowed_with_matrix
        rules:
          - Exceptions are inventoried explicitly; they are not used to create private-only contract surfaces.

  - record_kind: open_paid_boundary_row
    open_paid_boundary_row_schema_version: 1
    open_paid_boundary_row_id: open_paid_boundary_row:hosted_control_plane_and_managed_services
    title: Hosted control plane / managed services (client-contract first)
    artifact_family_class: hosted_control_plane_and_managed_services
    description: >
      Optional hosted services (or self-hosted equivalents) that add
      collaboration, orchestration, catalogs, quotas, or admin
      convenience. This row exists so hosted expansion does not
      redefine open/local core guarantees and does not become a hidden
      prerequisite.
    scope:
      deployment_profiles_in_scope:
        - self_hosted
        - enterprise_online
        - air_gapped
        - managed_cloud
      boundary_manifest_capability_ids:
        - identity_policy_service
        - collaboration_relay
        - workspace_control_plane
        - telemetry_support_pipeline
        - model_gateway
      portability_row_refs:
        - policy_bundles
        - usage_and_billing_exports
      dependency_classes_in_scope:
        - sign_in
        - hosted_control_plane_reachability
        - remote_mirror
        - policy_bundle
    open_vs_paid:
      open_local_core_floor: >
        Loss of control-plane reachability must not block local editing,
        local export, or local diagnostics; managed-only actions pause
        and surfaces narrow explicitly.
      optional_paid_convenience_additions:
        - Vendor-hosted operation of self-hostable protocols (managed convenience).
        - Managed admin UX for catalogs, quotas, and policy distribution (without making those controls vendor-console-only).
      managed_only_controls:
        - Vendor-specific service operations (incident response, internal reliability controls) that do not gate customer export/offboarding.
      enterprise_self_host_lane: >
        Where self-host is promised, client-visible contracts (OpenAPI/WIT/schema)
        and error taxonomy remain consistent across vendor-hosted and customer-hosted
        variants; mirror/offline posture is documented.
      prohibited_hidden_prerequisites:
        - A hosted service MUST NOT become required for core local workflows or for exporting user-owned artifacts.
        - “Managed-only” controls MUST NOT be the only way to administer policy, mirrors, or exports in self-hosted deployments.
      anti_lock_in_rules:
        - Service withdrawal scenarios must preserve an explicit export/offboarding story (portability matrix + record-class governance where applicable).
        - Service-health and docs truth must remain visible even when offline (cached snapshot posture is explicit).
      publication_controls:
        license_lane_classes:
          - service_plane_contract_publication
          - apache_2_0_public_source
        code_visibility_requirement: public_source_optional
        spec_visibility_requirement: public_spec_required_for_stable
        stable_surface_schema_docs_requirement: public_schema_and_docs_required_for_stable
        sample_availability_requirement: public_samples_recommended
        issue_routing_requirement: mixed_public_private_allowed_with_matrix
        rules:
          - Managed APIs that are claimed stable publish versioned OpenAPI (or equivalent) and route truth through the destination-descriptor family.
          - “Managed-only” never means “undocumented client contract”.

  - record_kind: open_paid_boundary_row
    open_paid_boundary_row_schema_version: 1
    open_paid_boundary_row_id: open_paid_boundary_row:extensions
    title: Extensions (runtime, registry/mirror, SDK publication)
    artifact_family_class: extensions
    description: >
      The extension runtime, extension discovery/registry, offline bundles,
      and the SDK/contracts extension authors rely on. This row exists so
      extension participation does not require proprietary lock-in and so
      installed extensions keep working offline.
    scope:
      deployment_profiles_in_scope:
        - individual_local
        - self_hosted
        - enterprise_online
        - air_gapped
        - managed_cloud
      boundary_manifest_capability_ids:
        - extension_runtime_local
        - extension_registry_mirror
      portability_row_refs:
        - extension_inventory_and_registry_policy
        - extension_lockfiles_and_recommendations
      dependency_classes_in_scope:
        - package_registry
        - remote_mirror
    open_vs_paid:
      open_local_core_floor: >
        Previously installed extensions load from local disk with no
        network; local extension install and dev workflows remain
        possible without a vendor-hosted marketplace.
      optional_paid_convenience_additions:
        - Vendor-hosted marketplace UI, reputation signals, and convenience discovery.
        - Hosted scanning/attestation dashboards that do not replace offline validation or self-host alternatives.
      managed_only_controls:
        - Vendor-hosted recommendation ranking and cross-tenant analytics (never required for install or runtime).
      enterprise_self_host_lane: >
        Private mirrors and offline bundles remain supported; enterprise
        extension policy (allow/deny) is representable as signed policy
        bundles and inspectable via local CLI/UI.
      prohibited_hidden_prerequisites:
        - Local extension runtime and local install MUST NOT require sign-in.
        - Extension SDK contracts MUST NOT be private-only for stable surfaces.
      anti_lock_in_rules:
        - Offline bundles and mirrors are first-class acquisition paths for constrained deployments.
        - Extension inventories, lockfiles, and policy remain exportable and round-trippable per portability rows.
      publication_controls:
        license_lane_classes:
          - mpl_2_0_public_source
          - apache_2_0_public_source
        code_visibility_requirement: public_source_required
        spec_visibility_requirement: public_spec_required_for_stable
        stable_surface_schema_docs_requirement: public_schema_and_docs_required_for_stable
        sample_availability_requirement: public_samples_required_for_stable
        issue_routing_requirement: mixed_public_private_allowed_with_matrix
        rules:
          - Stable extension contracts publish WIT worlds/schemas and sample packs; conformance checks remain runnable without vendor hosting.

  - record_kind: open_paid_boundary_row
    open_paid_boundary_row_schema_version: 1
    open_paid_boundary_row_id: open_paid_boundary_row:policy_bundles
    title: Policy bundles (identity, admin policy, and distribution)
    artifact_family_class: policy_bundles
    description: >
      Signed policy bundles and the control surfaces that apply them:
      identity/policy distribution protocols, local policy cache, policy
      explain/diff, and admin export/handoff packets. This row exists so
      policy is not a vendor-console-only control surface.
    scope:
      deployment_profiles_in_scope:
        - self_hosted
        - enterprise_online
        - air_gapped
        - managed_cloud
      boundary_manifest_capability_ids:
        - identity_policy_service
        - configuration_profiles
      portability_row_refs:
        - policy_bundles
      dependency_classes_in_scope:
        - policy_bundle
        - sign_in
        - remote_mirror
    open_vs_paid:
      open_local_core_floor: >
        Policy can be applied and inspected locally from signed bundles;
        last-known-good policy remains cached so local-core workflows
        continue while policy refresh is impaired.
      optional_paid_convenience_additions:
        - Managed admin dashboards for fleet policy rollout, audit aggregation, and report exports.
      managed_only_controls:
        - Vendor-hosted org-management UX (optional) that does not replace file/CLI policy ingestion and export.
      enterprise_self_host_lane: >
        Policy distribution is self-hostable where claimed; air-gapped
        deployments support offline import of signed bundles.
      prohibited_hidden_prerequisites:
        - Policy configuration MUST be expressible via signed file/bundle artifacts and a headless CLI; vendor-console-only control is forbidden.
        - Exporting policy bundles for audit/offboarding MUST NOT require a paid support channel.
      anti_lock_in_rules:
        - Policy bundles are portable signed JSON/YAML; mirror/offline import is supported for constrained deployments.
        - Policy actions and changes are inspectable and exportable in a redaction-safe form.
      publication_controls:
        license_lane_classes:
          - apache_2_0_public_source
        code_visibility_requirement: public_source_required
        spec_visibility_requirement: public_spec_required_for_stable
        stable_surface_schema_docs_requirement: public_schema_and_docs_required_for_stable
        sample_availability_requirement: public_samples_recommended
        issue_routing_requirement: mixed_public_private_allowed_with_matrix
        rules:
          - Policy bundle schemas and vocabulary remain public so enterprises can validate bundles without vendor tooling.

  - record_kind: open_paid_boundary_row
    open_paid_boundary_row_schema_version: 1
    open_paid_boundary_row_id: open_paid_boundary_row:docs_service_health
    title: Docs packs, Help/About routes, and service-health truth
    artifact_family_class: docs_service_health
    description: >
      The docs-pack artifact family and the Help/About/service-health
      route/descriptor contract. This row exists to keep documentation
      and service-health disclosure truthful when offline and to prevent
      vendor-console-only “health truth”.
    scope:
      deployment_profiles_in_scope:
        - individual_local
        - self_hosted
        - enterprise_online
        - air_gapped
        - managed_cloud
      boundary_manifest_capability_ids: []
      portability_row_refs: []
      dependency_classes_in_scope:
        - docs_pack
        - browser_handoff
        - hosted_control_plane_reachability
    open_vs_paid:
      open_local_core_floor: >
        Help/About must be able to render core build/provenance/boundary
        truth locally; docs and service-health surfaces must degrade to
        explicit cached/offline posture rather than disappearing.
      optional_paid_convenience_additions:
        - Live hosted service-health dashboards and incident comms that remain optional and do not replace in-product cached/offline truth.
      managed_only_controls:
        - Vendor-operated real-time status pages (optional) that do not gate local docs access or export flows.
      enterprise_self_host_lane: >
        Docs packs and route descriptors remain mirrorable; self-hosted
        deployments can point at internal destinations with the same
        descriptor vocabulary and offline behavior rules.
      prohibited_hidden_prerequisites:
        - Viewing docs/help required for core operations (install, export, policy) MUST NOT require sign-in or a paid subscription.
        - Service-health disclosure MUST NOT require a vendor console; in-product routes must remain available with offline/cached posture.
      anti_lock_in_rules:
        - Destination descriptors encode trust, version match, freshness, and offline behavior explicitly; copy must not widen beyond those records.
        - Cached/offline posture is first-class and must remain visible while reading.
      publication_controls:
        license_lane_classes:
          - cc_by_4_0_public_docs
          - apache_2_0_public_source
        code_visibility_requirement: public_source_required_with_exceptions
        spec_visibility_requirement: public_spec_required_for_stable
        stable_surface_schema_docs_requirement: public_schema_and_docs_required_for_stable
        sample_availability_requirement: public_samples_recommended
        issue_routing_requirement: mixed_public_private_allowed_with_matrix
        rules:
          - Route/descriptor schemas are public so offline/self-host tooling can validate and render truth consistently.

  - record_kind: open_paid_boundary_row
    open_paid_boundary_row_schema_version: 1
    open_paid_boundary_row_id: open_paid_boundary_row:support_exports
    title: Support exports (local bundles) and telemetry/support pipelines
    artifact_family_class: support_exports
    description: >
      Redaction-aware support bundle export (local/offline) plus optional
      self-hostable or managed telemetry/support pipelines. This row exists
      so supportability does not become “upload to vendor” lock-in.
    scope:
      deployment_profiles_in_scope:
        - individual_local
        - self_hosted
        - enterprise_online
        - air_gapped
        - managed_cloud
      boundary_manifest_capability_ids:
        - local_support_bundle
        - telemetry_support_pipeline
      portability_row_refs:
        - execution_context_summaries
        - local_history_and_ai_evidence
      dependency_classes_in_scope:
        - remote_mirror
        - hosted_control_plane_reachability
    open_vs_paid:
      open_local_core_floor: >
        Support bundles remain creatable, inspectable, and shareable as
        local files with no paid support contract and no network.
      optional_paid_convenience_additions:
        - Managed or self-hosted ingestion, aggregation, and case workflows for support bundles and telemetry.
      managed_only_controls:
        - Vendor-only support case tooling (optional) that does not replace local bundle export and manual sharing paths.
      enterprise_self_host_lane: >
        Support/telemetry sinks are self-hostable where claimed; air-gapped
        deployments rely on offline export/import paths instead of upload.
      prohibited_hidden_prerequisites:
        - Exporting a support bundle MUST NOT require sign-in, a paid plan, or vendor-hosted endpoints.
