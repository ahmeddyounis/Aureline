# Open-vs-paid boundary rows, anti-lock-in rules, and publication controls.
#
# Machine-readable companion to
# docs/governance/open_paid_boundary_and_antilockin_matrix.md.
#
# This register turns open-core and local-first intent into inspectable
# rules so product packaging, docs/help copy, and managed-service
# expansion cannot silently erode:
#   - local-first usefulness,
#   - open-core credibility,
#   - self-host / mirror viability, or
#   - user/organization exit paths.
#
# Conformance: every row conforms to
#   schemas/governance/open_paid_boundary_row.schema.json
# as an `open_paid_boundary_row`.
#
# Rules:
#   - Rows MUST NOT make pricing decisions. The matrix classifies
#     allowed *optional paid convenience* versus prohibited hidden
#     prerequisites; it does not define product tiers or pricing.
#   - Any claimed managed or paid advantage MUST be describable without
#     making local/core workflows dependent on hidden services.
#   - Rows MUST cite portability-row ids when they speak about
#     export/offboarding, rather than inventing parallel vocabulary.
#   - Rows MUST reuse the residual-dependency class vocabulary from
#     artifacts/governance/residual_dependencies.yaml; new dependency
#     classes land there first.
#   - Rows MUST include a non-empty prohibited_hidden_prerequisites list.
#   - Milestone slugs MUST NOT appear in any id, path, description, or
#     narrative field. Describe what the row covers, not which planning
#     item it came from.
#   - The literal string "saved securely" and equivalent vague phrasing
#     ("stored safely", "kept private", "handled securely") MUST NOT
#     appear in this register or any surface that cites it.

schema_version: 1
status: seeded

schema_ref: schemas/governance/open_paid_boundary_row.schema.json
overview_page: docs/governance/open_paid_boundary_and_antilockin_matrix.md
fixture_home: fixtures/governance/publication_control_examples/

boundary_manifest_source: docs/product/boundary_manifest_strawman.md
deployment_profile_truth_source: docs/governance/deployment_profile_truth.md
residual_dependency_ledger_source: artifacts/governance/residual_dependencies.yaml
portability_matrix_source: artifacts/governance/portability_artifact_matrix.yaml
claim_manifest_contract_source: docs/governance/claim_manifest_contract.md
drift_blocking_rules_source: docs/governance/drift_blocking_rules.md
public_interface_stability_source: docs/governance/public_interface_stability_matrix.md
issue_routing_source: artifacts/governance/issue_routing.yaml
provenance_baseline_source: docs/governance/provenance_and_compliance_baseline.md

related_normative_sources:
  - path: .t2/docs/Aureline_Technical_Architecture_Document.md
    anchors:
      - "Appendix AQ — Open-vs-Paid Boundary and OSS Compliance Matrix"
  - path: .t2/docs/Aureline_Technical_Design_Document.md
    anchors:
      - "§4.6 Portability and open exit"
  - path: .t2/docs/Aureline_PRD.md
    anchors:
      - "§9.13 Air-gapped and sovereign deployment profiles"

