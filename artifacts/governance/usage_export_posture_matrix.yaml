# Usage-export default posture matrix.
#
# Purpose:
#   Make it mechanically answerable whether a given build flavor and
#   deployment profile:
#     - emits a usage-export packet,
#     - stores it locally, in a customer-operated control plane, or in a
#       vendor-operated managed plane,
#     - makes the packet customer-visible, and
#     - includes it in offboarding exit packets.
#
# Companion contract:
#   docs/governance/usage_export_and_offboarding_contract.md
#
# Notes:
#   - This matrix is a posture register, not a billing engine.
#   - Rows describe default behavior. Policy may narrow visibility, but
#     MUST NOT widen a lane to start uploading silently.
#   - Milestone slugs MUST NOT appear in any id, path, or description
#     field. Describe what the row covers, not which planning item it
#     came from.

schema_version: 1

contract_ref: docs/governance/usage_export_and_offboarding_contract.md
usage_export_packet_schema_ref: schemas/governance/usage_export_record.schema.json
usage_export_row_schema_ref: schemas/managed/usage_export_row.schema.json
offboarding_exit_packet_schema_ref: schemas/governance/offboarding_exit_packet.schema.json
consent_ledger_entry_ref: artifacts/governance/consent_ledger_seed.yaml#usage.metering_export_packet
offboarding_ledger_entry_ref: artifacts/governance/consent_ledger_seed.yaml#offboarding.exit_packet
linkage_contract_ref: artifacts/governance/consent_ledger_seed.yaml#linkage.usage_export_offboarding
deployment_profile_registry_ref: artifacts/governance/deployment_profiles.yaml
record_class_registry_ref: artifacts/governance/record_class_registry.yaml

vocab:
  build_flavors:
    source: schemas/governance/schema_registry_entry.schema.json#/$defs/build_flavor
    values:
      - dev_local
      - nightly
      - preview
      - beta
      - stable
      - lts
      - hotfix
      - portable_stable
      - portable_preview
      - managed_enterprise
  deployment_profiles:
    source: artifacts/governance/deployment_profiles.yaml#deployment_profile_vocabulary
    values:
      - individual_local
      - self_hosted
      - enterprise_online
      - air_gapped
      - managed_cloud
  emission_class:
    description: >
      Where the packet is emitted and stored by default. export_only is
      a local or customer-bound export path; vendor_managed is a
      vendor-operated managed plane; customer_managed is a customer-
      operated control plane.
    values:
      - absent_not_emitted
      - export_only_user_initiated
      - customer_managed_packet_when_enabled
      - vendor_managed_packet_when_enabled
  customer_visibility_class:
    description: >
      Whether the packet is customer-visible by default when emitted.
      A lane that emits usage export must make the packet customer-
      visible; hiding it behind support is non-conforming.
    values:
      - not_applicable_absent
      - customer_visible
  offboarding_inclusion_class:
    description: >
      Whether offboarding exit packets include a reference to the last
      contractual usage-export packet on the lane.
    values:
      - not_applicable_absent
      - referenced_by_exit_packet_when_offboarding

rows:
  # Dev/nightly/preview/beta/hotfix/portable flavors: no billing/usage-export packet surface is claimed.
  - posture_row_id: usage_export_posture.dev_local.individual_local
    build_flavor: dev_local
    deployment_profile_id: individual_local
    emission_class: absent_not_emitted
    customer_visibility_class: not_applicable_absent
    offboarding_inclusion_class: not_applicable_absent
    note: Developer local-only builds do not emit usage export packets.
  - posture_row_id: usage_export_posture.dev_local.self_hosted
    build_flavor: dev_local
    deployment_profile_id: self_hosted
