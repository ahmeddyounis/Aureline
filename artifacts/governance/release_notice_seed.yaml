# Third-party release-notice seed.
#
# Seeds notice generation from stable dependency/import ids. This file is
# about third-party attribution and publication; it is not the
# product-release-notes surface described by exact-build identity docs.
# Every row keys off `source_id` from dependency_register.yaml or
# third_party_import_register.yaml so release automation never has to
# maintain a manual copy table with its own ids.

schema_version: 1

policy_doc: docs/governance/dependency_review_policy.md
source_registers:
  dependency_register: artifacts/governance/dependency_register.yaml
  third_party_import_register: artifacts/governance/third_party_import_register.yaml

publication_target_classes:
  - third_party_notice
  - spdx_sbom
  - cyclonedx_sbom
  - provenance_statement
  - docs_pack_manifest

render_gate_classes:
  - on_first_manifest_admission
  - on_first_binary_distribution
  - on_first_import
  - on_pack_publication
  - build_tooling_only
  - host_runtime_record_only

template_classes:
  - runtime_dependency
  - bundled_asset
  - build_tooling
  - host_runtime
  - mirrored_pack

rows:
  - source_register: dependency_register
    source_id: dep.renderer.wgpu
    template_class: runtime_dependency
    render_gate_class: on_first_manifest_admission
    publication_targets:
      - third_party_notice
      - spdx_sbom
      - cyclonedx_sbom
      - provenance_statement
    machine_renderable: true
    attribution_text_source: upstream_license_or_notice_files
    notes: >
      Reuses dep.renderer.wgpu. No separate notice id is allowed.

  - source_register: dependency_register
    source_id: dep.renderer.winit
    template_class: runtime_dependency
    render_gate_class: on_first_manifest_admission
    publication_targets:
      - third_party_notice
      - spdx_sbom
      - cyclonedx_sbom
      - provenance_statement
    machine_renderable: true
    attribution_text_source: upstream_license_or_notice_files
    notes: >
      Reuses dep.renderer.winit. No separate notice id is allowed.

  - source_register: dependency_register
    source_id: dep.text.rustybuzz
    template_class: runtime_dependency
    render_gate_class: on_first_manifest_admission
    publication_targets:
      - third_party_notice
      - spdx_sbom
      - cyclonedx_sbom
      - provenance_statement
    machine_renderable: true
    attribution_text_source: upstream_license_or_notice_files
    notes: >
      Reuses dep.text.rustybuzz. No separate notice id is allowed.

  - source_register: dependency_register
    source_id: dep.text.swash
    template_class: runtime_dependency
    render_gate_class: on_first_manifest_admission
    publication_targets:
      - third_party_notice
      - spdx_sbom
      - cyclonedx_sbom
      - provenance_statement
    machine_renderable: true
    attribution_text_source: upstream_license_or_notice_files

  - source_register: dependency_register
    source_id: dep.text.fontdb
    template_class: runtime_dependency
    render_gate_class: on_first_manifest_admission
    publication_targets:
      - third_party_notice
      - spdx_sbom
      - cyclonedx_sbom
      - provenance_statement
    machine_renderable: true
    attribution_text_source: upstream_license_or_notice_files

  - source_register: dependency_register
    source_id: dep.accessibility.accesskit
    template_class: runtime_dependency
    render_gate_class: on_first_manifest_admission
    publication_targets:
      - third_party_notice
      - spdx_sbom
      - cyclonedx_sbom
      - provenance_statement
    machine_renderable: true
    attribution_text_source: upstream_license_or_notice_files

  - source_register: dependency_register
    source_id: dep.text.noto_class_fallback_font
    template_class: bundled_asset
    render_gate_class: on_first_import
    publication_targets:
      - provenance_statement
    machine_renderable: false
    attribution_text_source: import_register_row_plus_upstream_license_files
    notes: >
      The imported subset row carries the final local-path, digest, SBOM,
      and notice data. This dependency row persists only so provenance can
      point back to the selected upstream family without minting a second id.

  - source_register: third_party_import_register
    source_id: import.fonts.noto_subset
    template_class: bundled_asset
    render_gate_class: on_first_binary_distribution
    publication_targets:
      - third_party_notice
      - spdx_sbom
      - provenance_statement
    machine_renderable: true
    attribution_text_source: imported_bytes_digest_plus_upstream_notice_text

  - source_register: dependency_register
    source_id: dep.repo.rust_toolchain
    template_class: build_tooling
    render_gate_class: build_tooling_only
    publication_targets:
      - spdx_sbom
      - provenance_statement
    machine_renderable: true
    attribution_text_source: rust-toolchain.toml_plus_build_identity
    notes: >
      Build tooling is recorded for provenance and build-input SBOM
      sections; it does not emit a third-party notice row for binaries.

  - source_register: dependency_register
    source_id: dep.repo.rustup
    template_class: host_runtime
    render_gate_class: host_runtime_record_only
    publication_targets:
      - provenance_statement
    machine_renderable: false
    attribution_text_source: host_environment_capture

  - source_register: dependency_register
    source_id: dep.repo.git_cli
    template_class: host_runtime
    render_gate_class: host_runtime_record_only
    publication_targets:
      - provenance_statement
    machine_renderable: false
    attribution_text_source: host_environment_capture

  - source_register: dependency_register
    source_id: dep.repo.bash
    template_class: host_runtime
    render_gate_class: host_runtime_record_only
    publication_targets:
      - provenance_statement
    machine_renderable: false
    attribution_text_source: host_environment_capture

  - source_register: dependency_register
    source_id: dep.benchmark.python3
    template_class: host_runtime
    render_gate_class: host_runtime_record_only
    publication_targets:
      - provenance_statement
    machine_renderable: false
    attribution_text_source: host_environment_capture

  - source_register: third_party_import_register
    source_id: import.docs.mirrored_official_pack
    template_class: mirrored_pack
    render_gate_class: on_pack_publication
    publication_targets:
      - docs_pack_manifest
      - provenance_statement
    machine_renderable: true
    attribution_text_source: mirrored_pack_manifest_and_upstream_license_record
    notes: >
      Mirrors are published through pack metadata, not through the core
      binary notice document, unless a later distribution format embeds
      the mirrored bytes directly.
