    depended_on_by_production: true

  - name: aureline-vfs
    path: crates/aureline-vfs
    layer: L1
    protected_path: true
    work_packages: [WP-03]
    allowed_internal_deps:
      - aureline-text
      - aureline-telemetry
    depended_on_by_production: true

  - name: aureline-workspace
    path: crates/aureline-workspace
    layer: L1
    protected_path: true
    work_packages: [WP-03]
    allowed_internal_deps: []
    depended_on_by_production: true

work_package_index:
  WP-01:
    title: Core shell and renderer
    crates:
      [
        aureline-shell,
        aureline-shell-spike,
        aureline-render,
        aureline-text,
        aureline-ui,
        aureline-commands,
        aureline-input
      ]
  WP-02:
    title: Editor and buffer core
    crates: [aureline-buffer, aureline-editor, aureline-text, aureline-largefile-proto]
  WP-03:
    title: Workspace, VFS, and persistence
    crates: [aureline-workspace, aureline-vfs, aureline-reactive-state]
  WP-04:
    title: Search, indexing, and graph
    crates: [aureline-graph-proto]
  WP-13:
    title: Release engineering and governance
    crates: [aureline-build-info, aureline-rpc, aureline-telemetry]
  WP-14:
    title: Quality engineering, certification, and claim publication
    crates: [aureline-telemetry, aureline-bench]
