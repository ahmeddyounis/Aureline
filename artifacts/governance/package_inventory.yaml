# Package inventory.
#
# Authoritative mapping of internal crates to canonical work packages,
# protected-path posture, and allowed internal dependencies. Future governance
# tooling consumes this file directly. Keep entries sorted by `name`.
#
# Schema:
#   schema_version: int
#   packages:
#     - name: cargo crate name
#       path: repo-relative directory
#       layer: L0 | L1 | L2 | L3 | LX
#       protected_path: bool
#       work_packages: [string]   # canonical owner work-package IDs
#       allowed_internal_deps: [string]   # crate names this package may depend on
#       depended_on_by_production: bool
#       notes: free-form, optional

schema_version: 1
packages:
  - name: aureline-api
    path: crates/aureline-api
    layer: L3
    protected_path: true
    work_packages: [WP-05, WP-06]
    allowed_internal_deps:
      - aureline-auth
    depended_on_by_production: true
    notes: >
      Request-workspace and API/data-tooling contract packets. The M5
      secret-boundary adapters intentionally depend only on aureline-auth.

  - name: aureline-auth
    path: crates/aureline-auth
    layer: L2
    protected_path: true
    work_packages: [WP-10, WP-11]
    allowed_internal_deps: []
    depended_on_by_production: true
    notes: >
      Auth, approval, credential-state, secret-broker, and M5
      secret-boundary contract crate.

  - name: aureline-bench
    path: crates/aureline-bench
    layer: LX
    protected_path: false
    work_packages: [WP-14]
    allowed_internal_deps:
      - aureline-shell-spike
      - aureline-render
      - aureline-text
      - aureline-buffer
      - aureline-vfs
      - aureline-rpc
      - aureline-telemetry
    depended_on_by_production: false
    notes: >
      Benchmark harness. May depend on any internal crate to exercise it from
      a benchmark; production crates must never depend on it.

  - name: aureline-build-info
    path: crates/aureline-build-info
    layer: L0
    protected_path: true
    work_packages: [WP-13]
    allowed_internal_deps: []
    depended_on_by_production: true

  - name: aureline-buffer
    path: crates/aureline-buffer
    layer: L1
    protected_path: true
    work_packages: [WP-02]
    allowed_internal_deps:
      - aureline-text
      - aureline-telemetry
    depended_on_by_production: true

  - name: aureline-commands
    path: crates/aureline-commands
    layer: L1
    protected_path: true
    work_packages: [WP-01]
    allowed_internal_deps: []
    depended_on_by_production: true
    notes: >
      Canonical command-descriptor types and seeded registry consumed by shell,
      input, palette, and review surfaces.

  - name: aureline-data
    path: crates/aureline-data
    layer: L3
    protected_path: true
    work_packages: [WP-05, WP-06]
    allowed_internal_deps:
      - aureline-auth
    depended_on_by_production: true
    notes: >
      Database and notebook-adjacent qualification packets. M5 secret-boundary
      adapters depend only on aureline-auth.

  - name: aureline-editor
    path: crates/aureline-editor
    layer: L2
    protected_path: true
    work_packages: [WP-02]
    allowed_internal_deps:
      - aureline-buffer
      - aureline-render
      - aureline-text
      - aureline-ui
    depended_on_by_production: true

  - name: aureline-graph-proto
    path: crates/aureline-graph-proto
    layer: LX
    protected_path: false
    work_packages: [WP-04]
    allowed_internal_deps: []
    depended_on_by_production: false
    notes: >
      Experimental semantic-workspace-graph prototype. Off the production
      cone; protected crates must not depend on it.

  - name: aureline-input
    path: crates/aureline-input
    layer: L2
    protected_path: true
    work_packages: [WP-01]
    allowed_internal_deps:
      - aureline-commands
    depended_on_by_production: true

  - name: aureline-infra
    path: crates/aureline-infra
    layer: L3
    protected_path: true
    work_packages: [WP-17]
    allowed_internal_deps:
      - aureline-auth
    depended_on_by_production: true
    notes: >
      Infrastructure target-context and control-plane boundary packets. M5
      secret-boundary adapters depend only on aureline-auth.

  - name: aureline-largefile-proto
    path: crates/aureline-largefile-proto
    layer: LX
    protected_path: false
    work_packages: [WP-02]
    allowed_internal_deps: []
    depended_on_by_production: false
    notes: >
      Experimental large-file capability prototype. Off the production
      cone; protected crates must not depend on it.

  - name: aureline-reactive-state
    path: crates/aureline-reactive-state
    layer: LX
    protected_path: false
    work_packages: [WP-03]
    allowed_internal_deps: []
    depended_on_by_production: false
    notes: >
      Experimental reactive-state and subscription-envelope prototype.
      Off the production cone; protected crates must not depend on it.

  - name: aureline-provider
    path: crates/aureline-provider
    layer: L3
    protected_path: true
    work_packages: [WP-10, WP-11]
    allowed_internal_deps:
      - aureline-auth
      - aureline-support
    depended_on_by_production: true
    notes: >
      Provider, registry, delegated-scope, and route-resolution packets. The
      M5 secret-boundary lane depends on auth plus support-export vocabulary.

  - name: aureline-remote
    path: crates/aureline-remote
    layer: L3
    protected_path: true
    work_packages: [WP-14, WP-17]
    allowed_internal_deps:
      - aureline-auth
    depended_on_by_production: true
    notes: >
      Preview-route, transport-governance, and managed-runtime packets. M5
      secret-boundary adapters depend only on aureline-auth.

  - name: aureline-render
    path: crates/aureline-render
    layer: L1
    protected_path: true
    work_packages: [WP-01]
    allowed_internal_deps:
      - aureline-text
      - aureline-telemetry
    depended_on_by_production: true

  - name: aureline-rpc
    path: crates/aureline-rpc
    layer: L1
    protected_path: true
    work_packages: [WP-13]
    allowed_internal_deps:
      - aureline-telemetry
    depended_on_by_production: true

  - name: aureline-support
    path: crates/aureline-support
    layer: L2
    protected_path: true
    work_packages: [WP-14]
    allowed_internal_deps: []
    depended_on_by_production: true
    notes: >
      Support-export, redaction, and recovery packet crate consumed by
      provider-linked contract packets.

  - name: aureline-shell
    path: crates/aureline-shell
    layer: L3
    protected_path: true
    work_packages: [WP-01]
    allowed_internal_deps:
      - aureline-build-info
      - aureline-buffer
      - aureline-commands
      - aureline-editor
      - aureline-input
      - aureline-render
      - aureline-vfs
      - aureline-rpc
      - aureline-telemetry
      - aureline-text
      - aureline-ui
      - aureline-workspace
    depended_on_by_production: true
    notes: >
      Live desktop shell crate. Owns the canonical zone registry and frame
