# Governance packet template.
#
# Copy one stanza below per concrete packet instance (e.g. into
# artifacts/release/<packet-family>/<packet-id>.yaml or
# artifacts/governance/packets/<packet-id>.yaml). Every instance conforms
# to schemas/governance/governance_packet.schema.json and, independently of
# family, carries explicit `owner`, `backup_owner`, `backup_waiver`, and
# `evidence_owner` fields so protected lanes and public-truth /
# supportability families never land without named accountability.
#
# Ownership rules:
#   - `owner` is the primary DRI for the packet. Required; no silent blanks.
#   - `backup_owner` is required unless `backup_waiver` cites an active
#     waiver id from artifacts/governance/ownership_matrix.yaml.
#   - `evidence_owner` is always required; it may equal `owner`.
#   - `covered_lanes` MUST reference lane ids from
#     ownership_matrix.scorecard_lane_index.
#   - `requirement_ids` SHOULD cite canonical ids from
#     artifacts/governance/requirement_register_seed.yaml whenever a packet
#     is claiming, narrowing, or waiving a named requirement.
#   - Verification and other claim-bearing packets SHOULD pair this
#     family template with docs/governance/verification_packet_template.md
#     and the shared header at
#     schemas/governance/evidence_packet_header.schema.json.
#
# Packet families in scope:
#   verification            — milestone evidence links, waivers, risks,
#                             per-lane owner signoff.
#   benchmark_report        — corpus, hardware, thresholds, waivers,
#                             protected-fitness snapshot. The snapshot shape
#                             is frozen at
#                             artifacts/bench/fitness_function_catalog.yaml
#                             under packet_export_shape.fitness_function_snapshot;
#                             a benchmark_report that cites a fitness row
#                             without a conforming snapshot block is a
#                             validation failure.
#   compatibility_report    — diff, deprecation, migration guidance,
#                             certified-archetype outcomes.
#   claim_manifest          — public-truth claims with evidence-owner
#                             attestation per claim.
#   shiproom                — promotion / rollback decisions, incident
#                             posture, go/no-go with DRI signatures.
#   waiver_register         — active waivers with expiry and escalation.

schema_version: 1

# -----------------------------------------------------------------------------
# verification packet
# -----------------------------------------------------------------------------
verification:
  schema_version: 1
  packet_family: verification
  packet_id: "<verification-packet-id>"
  milestone_id: "<milestone-slug>"
  opened_on: "1970-01-01"      # placeholder — replace when filling in
  closed_on: null
  status: draft                         # draft | in_review | accepted | rejected | superseded
  owner: "@ahmeddyounis"
  backup_owner: null
  backup_waiver: single-maintainer-backup
  evidence_owner: "@ahmeddyounis"
  covered_lanes:
    - aureline-render
    - aureline-buffer
    - aureline-vfs
    - aureline-text
    - aureline-rpc
    - aureline-telemetry
    - shell_command_system
  requirement_ids: []
  evidence: []
  waiver_refs: []
  decisions: []

