# Critical-upstream health scorecard.
#
# Canonical health-review seed for every dependency row whose failure,
# abandonment, or trust break could materially affect protected paths,
# release engineering, or benchmark truth. Complements
# artifacts/governance/dependency_register.yaml.

schema_version: 1

policy_docs:
  dependency_review_policy: docs/governance/dependency_review_policy.md
  maintainer_coverage_policy: docs/governance/maintainer_coverage_policy.md
source_register: artifacts/governance/dependency_register.yaml

assessment_state_classes:
  - provisional_risk_only
  - scored_review

risk_class_classes:
  - low
  - medium
  - high
  - blocked

cadence_class_classes:
  - quarterly
  - quarterly_and_before_manifest_admission
  - quarterly_and_before_stable_cut
  - on_pin_change_and_quarterly

scoring_model:
  score_range:
    min: 0
    max: 5
  score_meaning:
    "5": healthy, actively maintained, and replaceable with low current concern
    "4": healthy with normal watchfulness required
    "3": acceptable but watch-listed
    "2": elevated risk that needs an explicit sustainment plan
    "1": high risk or effectively unreviewed on a critical path
    "0": blocked for admission or continued claim without explicit exception
  dimensions:
    - id: activity
      weight_percent: 20
      meaning: release cadence, branch movement, contributor continuity
    - id: responsiveness
      weight_percent: 15
      meaning: issue triage, patch acceptance, maintainer contact path
    - id: license
      weight_percent: 15
      meaning: clarity, compatibility, redistribution posture
    - id: bus_factor
      weight_percent: 20
      meaning: maintainer depth and single-point-of-failure exposure
    - id: security_posture
      weight_percent: 20
      meaning: disclosure, advisory response, release integrity signals
    - id: replacement_feasibility
      weight_percent: 10
      meaning: feasibility of fork, patch carry, or replacement
  overall_bands:
    green: 4.0-5.0
    yellow: 3.0-3.99
    orange: 2.0-2.99
    red: 0.0-1.99
  provisional_rule: >
    Until the first upstream review is captured, critical dependencies
    may carry a provisional risk class instead of an overall numeric
    score. Protected-path rows may not silently skip the scorecard.

cadence_by_criticality:
  protected_path_release_critical: quarterly_and_before_manifest_admission
  release_engineering_critical: quarterly_and_before_stable_cut
  benchmark_lab_required: quarterly
  repo_operations_required: quarterly

escalation_triggers:
  - id: provisional_high_past_gate
    when: >
      A protected-path dependency still carries provisional risk class
      high at manifest admission or stable-claim review.
    required_action: >
      Block the admission or stable claim until a scored review,
      sponsor plan, or approved replacement/fork decision lands.

  - id: license_ambiguity_or_distribution_block
    when: >
      License terms are ambiguous, incompatible with the intended
      distribution path, or no longer match the dependency row.
    required_action: >
      Freeze admission or distribution and reopen selection review.

  - id: security_posture_failure
    when: >
      A severe unresolved vulnerability, compromised release channel, or
      missing disclosure path affects a critical upstream.
    required_action: >
      Open architecture plus security review and decide freeze, fork,
      patch, or replacement before the next protected release.

  - id: bus_factor_or_maintainer_loss
    when: >
      Bus-factor evidence drops to a single unavailable maintainer or no
      responsive maintainer contact path remains.
    required_action: >
      Name a sponsor, open fork/replace planning, and shorten the
      review cadence.

  - id: review_stale
    when: >
      The row misses its cadence window or ships on a stable line
      without a current review.
    required_action: >
      Downgrade one risk band and flag the gap in release evidence.

