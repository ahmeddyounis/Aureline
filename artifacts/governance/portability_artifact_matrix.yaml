  - record_kind: portability_row
    portability_row_schema_version: 1
    portability_row_id: sync_metadata_and_conflict_journals
    title: Sync metadata and conflict journals
    description: >
      Sync engine metadata, conflict journals, and reconciliation
      provenance produced by the optional managed sync lane. Local
      copies preserve the journal so a user can replay or audit a
      conflict resolution after managed withdrawal.
    artifact_domain: sync_metadata_and_conflict_journals
    scope_posture:
      admin_user_scope: user_scope_only
      managed_local_dependency: managed_authoritative_with_local_cache
      scope_notes:
        - Sync metadata is managed-authoritative while sync is enabled; local journals are user-readable copies.
        - Disabling sync MUST NOT erase the local journal; it freezes the journal under raw_secret_excluded.
    export_posture:
      minimum_export_format: jsonl
      additional_export_formats:
        - json
        - tar_gz_archive
      scriptability: scriptable_required
      manifest_required: true
      raw_secret_excluded_required: true
    import_posture:
      unknown_field_rule: preserve_with_warning
      round_trip_supported: false
      import_notes:
        - Sync journals are diagnostic artifacts; they are not replayed into a new sync engine but remain readable for audit.
    deletion_posture:
      story_class: local_and_managed_delete_distinct
      local_and_managed_actions_are_distinct: true
      completion_evidence: destruction_receipt
      deletion_notes:
        - Clearing the local journal is a user action; deleting the managed sync metadata is governed by the sync row's retention timer and emits a destruction receipt.
    offboarding_posture:
      story_class: user_self_serve_export
      support_ticket_required: false
      offboarding_notes:
        - The sync journal export runs without a support ticket and is the canonical artifact for explaining past conflict resolutions.
    service_withdrawal_rules:
      - scenario: staged_migration
        rule_summary: Sync journal schema pinned; older journals remain interpretable after migration so a conflict explainer never silently regresses.
        local_core_workflow_remains_truthful: true
        export_api_remains_truthful: true
      - scenario: self_host_move
        rule_summary: Self-hosted sync ingests the journal export by reference; managed-cloud is not required.
        local_core_workflow_remains_truthful: true
        export_api_remains_truthful: true
      - scenario: air_gap_continuity
        rule_summary: Air-gap deployments retain the local journal; live sync is out of scope.
        local_core_workflow_remains_truthful: true
        export_api_remains_truthful: true
      - scenario: saas_cancellation
        rule_summary: Cancellation freezes the local journal and emits a destruction receipt for the managed copy.
        local_core_workflow_remains_truthful: true
        export_api_remains_truthful: true
    governance_links:
      record_class_refs:
        - telemetry_contract_schema
      storage_mode_refs:
        - sync_payload
        - retained_evidence_generic
      source_docs:
        - docs/state/profile_and_state_map.md
        - docs/governance/storage_and_retention_vocabulary.md

  - record_kind: portability_row
    portability_row_schema_version: 1
    portability_row_id: policy_bundles
    title: Policy bundles
    description: >
      Admin-distributed policy bundles, signed policy bundle caches,
      and policy-epoch metadata. Bundles ride a separate row from
      the workspace task / launch row because the admin scope and
      managed dependency posture differ.
    artifact_domain: policy_bundles
    scope_posture:
      admin_user_scope: admin_scope_only
      managed_local_dependency: managed_authoritative_with_local_cache
      scope_notes:
        - Policy bundles are admin-authoritative; local installs hold a signed cache and a policy epoch.
        - Mirroring is supported so air-gap and self-hosted deployments can replicate the canonical bundle without managed-cloud dependence.
    export_posture:
      minimum_export_format: signed_json
      additional_export_formats:
        - json
        - manifest_bundle
      scriptability: scriptable_with_admin_consent
      manifest_required: true
      raw_secret_excluded_required: true
    import_posture:
      unknown_field_rule: reject_unknown_fields
      round_trip_supported: true
      import_notes:
        - Policy bundles refuse unknown fields by default to preserve admin-policy integrity; an explicit decision row is required to soften the import rule.
    deletion_posture:
      story_class: managed_delete_with_receipt
      local_and_managed_actions_are_distinct: true
      completion_evidence: destruction_receipt
      deletion_notes:
        - Removing a policy bundle is an admin action with a destruction receipt; local caches expire under the bundle's declared retention.
    offboarding_posture:
      story_class: admin_packaged_export
      support_ticket_required: false
      offboarding_notes:
        - The signed policy bundle export is the offboarding artifact for admins; it runs without a support ticket and remains verifiable on a self-hosted destination.
    service_withdrawal_rules:
      - scenario: staged_migration
        rule_summary: Policy bundle schema and signing chain pinned across migration; older epochs remain verifiable.
        local_core_workflow_remains_truthful: true
        export_api_remains_truthful: true
      - scenario: self_host_move
        rule_summary: Self-hosted deployments verify the signed bundle without managed-cloud dependence.
        local_core_workflow_remains_truthful: true
        export_api_remains_truthful: true
      - scenario: air_gap_continuity
        rule_summary: Air-gap deployments mirror the signed bundle; live distribution is replaced by the mirrored artifact rather than failing implicitly.
        local_core_workflow_remains_truthful: true
        export_api_remains_truthful: true
      - scenario: saas_cancellation
        rule_summary: Cancellation freezes the local cache at its last admissible epoch; the destruction receipt names which managed-side state was removed.
        local_core_workflow_remains_truthful: true
        export_api_remains_truthful: true
    governance_links:
      record_class_refs:
        - telemetry_contract_schema
      storage_mode_refs:
        - retained_evidence_generic
      source_docs:
        - docs/governance/storage_and_retention_vocabulary.md
        - docs/service/managed_service_seed.md

