      - source_kind: repo_schema
        ref: schemas/governance/delete_request_state.schema.json
        notes: Delete-request-state record used to render requested/queued/blocked/completed/evidence-retained states without inventing a new lifecycle label.
    waiver_policy:
      waiver_allowed: true
      waiver_register_ref: docs/governance/waiver_register_contract.md
      waiver_authority_lane: support_export
      waiver_notes: Waivers require an explicit disclosure plan for any held or policy-retained collaboration evidence; silent “deleted” wording is forbidden.
    escalation_policy:
      escalation_owner_lane: support_export
      escalation_forum_ref: artifacts/governance/forum_matrix.yaml#forum_id:security_trust_review
      escalation_sla: P14D
