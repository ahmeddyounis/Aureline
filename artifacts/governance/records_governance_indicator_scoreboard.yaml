# Records-governance indicator scoreboard.
#
# Companion to docs/governance/records_indicator_contract.md.
# Each row below conforms to schemas/governance/indicator_row.schema.json
# as an indicator_row_record.
#
# Scope: seeded, pre-implementation indicator register. This file does not
# implement telemetry ingestion or managed-service automation; it freezes the
# row identities, evidence sources, cadence, waiver/escalation routes, and
# failure-response mapping so monthly governance review is concrete and
# repeatable.

schema_version: 1
schema_ref: schemas/governance/indicator_row.schema.json
overview_page: docs/governance/records_indicator_contract.md

ownership_matrix_ref: artifacts/governance/ownership_matrix.yaml
forum_matrix_ref: artifacts/governance/forum_matrix.yaml
waiver_register_ref: docs/governance/waiver_register_contract.md

claim_manifest_ref: artifacts/governance/claim_manifest_seed.yaml
record_class_registry_ref: artifacts/governance/record_class_registry.yaml
retention_deletion_contract_ref: docs/governance/retention_deletion_matrix_contract.md
boundary_manifest_ref: docs/product/boundary_manifest_strawman.md
public_proof_scoreboards_ref: docs/qe/public_proof_scoreboards.md
public_proof_workflow_bundle_ref: artifacts/qe/workflow_bundle_ids.yaml

rows:
  - record_kind: indicator_row_record
    indicator_row_schema_version: 1
    indicator_id: stable_claim_families_have_public_boundary_manifest_coverage
    title: Stable claim families are pinned to public boundary-manifest rows
    description: Stable-facing claim families must not widen while any record-bearing surface lacks an explicit public boundary-manifest row.
    indicator_family_id: records_governance
    indicator_kind: public_boundary_manifest_coverage
    collection_cadence: monthly
    automation: manual_only
    owner_lane: governance_packets
    measurement:
      measurement_kind: ratio
      unit_label: Percent of stable claim families (0.0..1.0)
      pass_condition: Every stable claim family has at least one public boundary-manifest row that covers its record-bearing surfaces and their portability/delete posture.
    subject:
      record_class_refs: []
      claim_row_refs:
        - claim_row:boundary.open_local_vs_managed
      boundary_manifest_row_ids: []
      schema_refs:
        - schemas/product/boundary_manifest.schema.json
      artifact_refs:
        - artifacts/milestones/cut_classes.yaml
        - artifacts/governance/claim_manifest_seed.yaml
      docs_refs:
        - docs/product/boundary_manifest_strawman.md
        - docs/governance/record_class_governance.md
      public_proof_scoreboard_family_refs: []
    evidence_sources:
      - source_kind: repo_artifact
        ref: artifacts/milestones/cut_classes.yaml
        notes: Claim-family registry used to scope which claim families are treated as stable-facing.
      - source_kind: repo_doc
        ref: docs/product/boundary_manifest_strawman.md
        notes: Public boundary-manifest rows that govern open/local versus managed boundaries and portability disclosures.
      - source_kind: repo_artifact
        ref: artifacts/governance/claim_manifest_seed.yaml
        notes: Claim-row posture that must be capped when boundary-manifest coverage is missing.
    waiver_policy:
      waiver_allowed: true
      waiver_register_ref: docs/governance/waiver_register_contract.md
      waiver_authority_lane: governance_packets
      waiver_notes: Any waiver is time-bounded and may not be used to widen stable-facing copy into claim_bearing without a public boundary-manifest row.
    escalation_policy:
      escalation_owner_lane: governance_packets
      escalation_forum_ref: artifacts/governance/forum_matrix.yaml#forum_id:release_council
      escalation_sla: P30D
      escalation_notes: Convert any missing coverage into an owned narrowing (claim-manifest cap) plus a published boundary-manifest row within the SLA.
    failure_response:
      shiproom_status_floor: hold_for_refresh
      release_readiness_cap: narrow_claims
      claim_posture_cap: limited
      followthrough_actions:
        - update_or_publish_boundary_manifest_rows
        - update_claim_manifest_effective_posture
        - add_known_limit_or_hold_disclosure
      response_summary: Hold promotion and narrow affected claim rows until a public boundary-manifest row exists and is cited by the claim family.
    contract_doc_ref: docs/governance/records_indicator_contract.md

  - record_kind: indicator_row_record
    indicator_row_schema_version: 1
    indicator_id: stable_claim_families_dependency_marker_debt_is_zero
    title: Stable claim families have no unresolved dependency-marker debt
    description: Stable-facing claim families must not depend on hidden Preview/Labs or managed-only capabilities without explicit dependency markers and narrowing.
    indicator_family_id: records_governance
    indicator_kind: dependency_marker_debt
    collection_cadence: monthly
    automation: scriptable_with_manual_review
    owner_lane: governance_packets
    measurement:
      measurement_kind: ratio
      unit_label: Percent of stable claim families (0.0..1.0)
      pass_condition: Every stable claim family has zero unresolved dependency-marker debt; any non-stable dependency is explicitly marked and paired with an approved narrowing/disclosure.
    subject:
      record_class_refs: []
      claim_row_refs: []
      boundary_manifest_row_ids: []
      schema_refs:
        - schemas/governance/capability_lifecycle.schema.json
      artifact_refs:
        - artifacts/milestones/cut_classes.yaml
        - artifacts/governance/dependency_register.yaml
        - artifacts/governance/dependency_marker_examples.yaml
      docs_refs:
        - docs/adr/0011-capability-lifecycle-and-dependency-markers.md
        - docs/governance/capability_lifecycle_projection_matrix.md
      public_proof_scoreboard_family_refs: []
    evidence_sources:
      - source_kind: repo_artifact
        ref: artifacts/governance/dependency_register.yaml
        notes: Dependency register used to enumerate unresolved dependencies and their current risk posture.
      - source_kind: repo_artifact
        ref: artifacts/governance/dependency_marker_examples.yaml
        notes: Dependency-marker shape examples used to ensure hidden dependencies become explicit markers on persisted/exported artifacts.
      - source_kind: repo_doc
        ref: docs/adr/0011-capability-lifecycle-and-dependency-markers.md
        notes: Normative dependency-marker vocabulary and rules; indicator failures must trigger explicit markers rather than implicit drift.
    waiver_policy:
      waiver_allowed: true
      waiver_register_ref: docs/governance/waiver_register_contract.md
      waiver_authority_lane: governance_packets
      waiver_notes: Waivers name the affected claim family and the explicit narrowing plan; they may not permit hidden dependencies on stable-facing publication.
    escalation_policy:
      escalation_owner_lane: governance_packets
      escalation_forum_ref: artifacts/governance/forum_matrix.yaml#forum_id:product_scope_review
      escalation_sla: P30D
      escalation_notes: Convert unresolved dependency-marker debt into either explicit dependency markers plus narrowing, or a re-scope decision with recorded follow-through.
    failure_response:
      shiproom_status_floor: hold_for_refresh
      release_readiness_cap: narrow_claims
      claim_posture_cap: experimental
      followthrough_actions:
        - add_or_update_dependency_markers
        - update_claim_manifest_effective_posture
        - add_known_limit_or_hold_disclosure
      response_summary: Narrow stable-facing claims and require explicit dependency markers before any widening that would hide Preview/Labs or managed-only dependencies.
    contract_doc_ref: docs/governance/records_indicator_contract.md

  - record_kind: indicator_row_record
    indicator_row_schema_version: 1
    indicator_id: managed_record_classes_have_export_delete_and_offboarding_contracts
    title: Contractual managed record classes have export/delete/offboarding coverage
    description: Every contractual managed record class must declare export, delete, hold, and offboarding posture in the canonical contracts before any enterprise or managed claim can widen.
    indicator_family_id: records_governance
    indicator_kind: export_completeness
    collection_cadence: monthly
    automation: scriptable_with_manual_review
    owner_lane: governance_packets
    measurement:
      measurement_kind: ratio
      unit_label: Percent of contractual managed record classes (0.0..1.0)
      pass_condition: Every contractual managed record class has documented export and delete/offboarding posture, plus schema coverage for delete-request state and portability summaries.
    subject:
      record_class_refs:
        - collaboration_evidence_packet
        - ai_retained_evidence_packet
        - support_bundle_archive
        - entitlement_usage_export_packet
        - offboarding_exit_packet
        - destruction_receipt_record
      claim_row_refs: []
      boundary_manifest_row_ids: []
      schema_refs:
        - schemas/governance/record_class.schema.json
        - schemas/governance/retention_matrix_row.schema.json
        - schemas/governance/delete_request_state.schema.json
        - schemas/governance/export_delete_request_summary.schema.json
        - schemas/governance/portability_row.schema.json
      artifact_refs:
        - artifacts/governance/record_class_registry.yaml
        - artifacts/governance/portability_artifact_matrix.yaml
      docs_refs:
        - docs/governance/record_class_governance.md
        - docs/governance/retention_deletion_matrix_contract.md
        - docs/governance/data_portability_and_exit_matrix.md
        - docs/governance/records_governance_packet_contract.md
      public_proof_scoreboard_family_refs: []
    evidence_sources:
      - source_kind: repo_artifact
        ref: artifacts/governance/record_class_registry.yaml
        notes: Record-class registry rows that define retention/export/delete/hold/offboarding posture.
      - source_kind: repo_doc
        ref: docs/governance/retention_deletion_matrix_contract.md
        notes: Deletion honesty and hold visibility vocabulary; required for any record class that supports delete or export/delete requests.
      - source_kind: repo_doc
        ref: docs/governance/data_portability_and_exit_matrix.md
        notes: Offboarding and portability contract that binds export/delete to named artifact domains and open-format expectations.
      - source_kind: repo_schema
        ref: schemas/governance/delete_request_state.schema.json
        notes: Delete-request state schema that every delete/offboarding surface must project verbatim.
    waiver_policy:
      waiver_allowed: true
      waiver_register_ref: docs/governance/waiver_register_contract.md
      waiver_authority_lane: governance_packets
      waiver_notes: Waivers may defer a specific class by name, but they must cap any dependent claim rows and include an explicit follow-up schedule to close the gap.
    escalation_policy:
      escalation_owner_lane: governance_packets
      escalation_forum_ref: artifacts/governance/forum_matrix.yaml#forum_id:release_council
      escalation_sla: P14D
      escalation_notes: Treat missing export/delete/offboarding coverage as a release-blocking governance gap for any enterprise or managed claim surface.
    failure_response:
      shiproom_status_floor: no_go
      release_readiness_cap: blocked
      claim_posture_cap: experimental
      followthrough_actions:
        - publish_or_refresh_export_delete_offboarding_evidence
        - update_contract_or_schema_for_parity
        - open_decision_register_entry
        - update_claim_manifest_effective_posture
      response_summary: Block promotion and cap dependent claim rows until export/delete/offboarding posture is fully documented for every contractual managed record class.
    contract_doc_ref: docs/governance/records_indicator_contract.md

  - record_kind: indicator_row_record
    indicator_row_schema_version: 1
    indicator_id: record_class_registry_is_current_and_linked
    title: Record-class registry links are complete and reviewed
    description: Record-class rows must stay linked to redaction, retention, boundary, and supportability artifacts so later surfaces do not invent private lifecycle labels.
    indicator_family_id: records_governance
    indicator_kind: record_class_freshness
    collection_cadence: monthly
    automation: scriptable_with_manual_review
    owner_lane: governance_packets
    measurement:
      measurement_kind: boolean
      unit_label: Pass/fail
      pass_condition: Every record-class row cites at least one redaction artifact ref and one retention artifact ref, and no consumer contract references a record class that is missing from the registry.
    subject:
      record_class_refs:
        - telemetry_contract_schema
        - crash_diagnostic_payload
        - performance_capture_evidence
        - support_bundle_archive
        - collaboration_evidence_packet
        - ai_retained_evidence_packet
        - entitlement_usage_export_packet
        - offboarding_exit_packet
        - destruction_receipt_record
      claim_row_refs: []
      boundary_manifest_row_ids: []
      schema_refs:
        - schemas/governance/record_class.schema.json
      artifact_refs:
        - artifacts/governance/record_class_registry.yaml
      docs_refs:
        - docs/governance/record_class_governance.md
        - docs/governance/record_state_and_policy_simulation_models.md
      public_proof_scoreboard_family_refs: []
    evidence_sources:
      - source_kind: repo_artifact
        ref: artifacts/governance/record_class_registry.yaml
        notes: Canonical record-class register; missing links or missing class rows are treated as freshness failures.
      - source_kind: repo_schema
        ref: schemas/governance/record_class.schema.json
        notes: Row schema that freezes required posture fields and forbids collapsing lifecycle axes into one label.
    waiver_policy:
      waiver_allowed: true
      waiver_register_ref: docs/governance/waiver_register_contract.md
      waiver_authority_lane: governance_packets
      waiver_notes: Waivers may exist only for newly introduced class families and must expire; long-lived missing links are treated as drift.
    escalation_policy:
      escalation_owner_lane: governance_packets
      escalation_forum_ref: artifacts/governance/forum_matrix.yaml#forum_id:architecture_council
      escalation_sla: P30D
      escalation_notes: Any long-lived missing links or missing class registrations escalate as an architecture governance drift issue.
    failure_response:
      shiproom_status_floor: hold_for_refresh
      release_readiness_cap: narrow_claims
      claim_posture_cap: limited
      followthrough_actions:
        - update_contract_or_schema_for_parity
        - open_decision_register_entry
      response_summary: Narrow claim-bearing surfaces that depend on unmanaged record classes until the registry is corrected and linked.
    contract_doc_ref: docs/governance/records_indicator_contract.md

