# Milestone scorecard template.
#
# Copy this file per milestone (e.g. artifacts/governance/scorecards/<slug>.yaml)
# and fill it out as the milestone progresses. Tooling validates instances
# against schemas/governance/milestone_scorecard.schema.json.
#
# Ownership rules:
#   - Every row MUST name an `owner` (primary DRI). No silent blanks.
#   - Protected lanes (per artifacts/governance/ownership_matrix.yaml) MUST
#     either name a `backup_owner` or cite an active `backup_waiver` from
#     that file.
#   - `lane_id` MUST match an entry in ownership_matrix.scorecard_lane_index.
#   - `evidence_owner` is required on release-evidence, supportability, and
#     governance-packet rows; recommended on all protected rows.
#
# Do not surface internal milestone IDs in product strings; this file is
# governance-only.

schema_version: 1

milestone_id: "<milestone-slug>"       # e.g. "pre-implementation-foundations"
scorecard_opened_on: "1970-01-01"      # placeholder — replace when filling in
scorecard_closed_on: null
scorecard_status: open                 # open | closed_green | closed_yellow | closed_red | rebaselined

lanes:
  # ---------------------------------------------------------------------------
  # Protected subsystem lanes.
  # ---------------------------------------------------------------------------
  - lane_id: aureline-render
    status: not_started                # green | yellow | red | not_started | waived
    owner: "@ahmeddyounis"
    backup_owner: null
    backup_waiver: single-maintainer-backup
    evidence: []
    waiver_refs: []

  - lane_id: aureline-buffer
