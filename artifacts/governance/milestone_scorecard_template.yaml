# Milestone scorecard template.
#
# Copy this file per milestone (e.g. artifacts/governance/scorecards/<slug>.yaml)
# and fill it out as the milestone progresses. Tooling validates instances
# against schemas/governance/milestone_scorecard.schema.json.
#
# Ownership rules:
#   - Every row MUST name an `owner` (primary DRI). No silent blanks.
#   - Every row MUST name a `commitment_class` from
#     artifacts/governance/commitment_classes.yaml so the scorecard
#     distinguishes committed cutline work from target, stretch, parked,
#     and cut rows.
#   - Protected lanes (per artifacts/governance/ownership_matrix.yaml) MUST
#     either name a `backup_owner` or cite an active `backup_waiver` from
#     that file.
#   - `lane_id` MUST match an entry in ownership_matrix.scorecard_lane_index.
#   - `evidence_owner` is required on every row. It may equal `owner`.
#   - `requirement_ids` SHOULD cite canonical ids from
#     artifacts/governance/requirement_register_seed.yaml when the lane is
#     carrying or blocking named obligations.
#   - Evidence refs SHOULD prefer packets or catalogs that expose stable
#     evidence ids through schemas/governance/evidence_packet_header.schema.json
#     and artifacts/governance/evidence_id_conventions.md.
#   - Required proof for a lane MUST remain within the freshness ceilings
#     and rerun-trigger rules in artifacts/governance/evidence_freshness_slos.yaml
#     and artifacts/governance/evidence_rerun_triggers.yaml. Expired proof
#     may not leave a lane green.
#
# Do not surface internal milestone IDs in product strings; this file is
# governance-only.

schema_version: 1

milestone_id: "<milestone-slug>"       # e.g. "pre-implementation-foundations"
scorecard_opened_on: "1970-01-01"      # placeholder — replace when filling in
scorecard_closed_on: null
scorecard_status: open                 # open | closed_green | closed_yellow | closed_red | rebaselined

lanes:
