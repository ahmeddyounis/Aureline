# Labs register.
#
# Contributor-visible projection over experiments_register.yaml for rows that
# are intentionally inspectable as prototype / Labs / preview inventory items.
# Hidden developer toggles stay in experiments_register.yaml only.
#
# Scope.
#   - This file is the visible inventory the repository can point at today.
#     A future in-product Labs surface extends this register rather than
#     creating a second inventory.
#   - Every row here MUST resolve to exactly one row in
#     experiments_register.yaml via experiment_ref.
#   - If a row becomes hidden or developer-only, remove it from this
#     projection but keep the authoritative experiment row.

schema_version: 1

source_register: artifacts/governance/experiments_register.yaml
policy_doc: docs/governance/feature_flag_policy.md

projection_contract:
  required_fields:
    - labs_id
    - experiment_ref
    - public_label
    - inventory_group
    - visibility_state
    - lifecycle_state
    - owner_dri
    - cohort_or_ring
    - support_note
    - feedback_path
    - dependency_summary
    - kill_switch_source
    - offline_resolution_posture
  review_fields:
    one_of:
      - review_by
      - expires_on

inventory_groups:
  - core_prototype
  - prototype_side_channel
  - shell_overlay
  - benchmark_mode

visibility_states:
  - documented_repo_visible
  - reserved_for_future_product_surface

rows:
  - labs_id: lab.buffer.prototype_harness
    experiment_ref: exp.buffer.prototype_harness
    public_label: Buffer prototype harness
    inventory_group: core_prototype
    visibility_state: documented_repo_visible
    lifecycle_state: labs
    owner_dri: "@ahmeddyounis"
    cohort_or_ring: maintainer_and_contributor_local
    support_note: Prototype-only buffer contract harness and undo examples.
    review_by: "2026-06-30"
    expires_on: null
    feedback_path: prototypes/buffer/README.md
    dependency_summary: >
      artifacts/buffer/buffer_metrics_seed.json and
      artifacts/buffer/undo_examples/ depend on this prototype row.
    kill_switch_source: tools/bench_buffer.sh default-off wrapper
    offline_resolution_posture: authoritative_local

  - labs_id: lab.vfs.save_prototype
    experiment_ref: exp.vfs.save_prototype
    public_label: VFS / save prototype harness
    inventory_group: core_prototype
    visibility_state: documented_repo_visible
    lifecycle_state: labs
    owner_dri: "@ahmeddyounis"
    cohort_or_ring: maintainer_and_contributor_local
    support_note: Synthetic-root save-plan and watcher-posture harness.
    review_by: "2026-06-30"
    expires_on: null
    feedback_path: prototypes/vfs/README.md
    dependency_summary: >
      artifacts/fs/save_plan_examples/ and fixtures/fs/save_truth_cases/
      depend on this prototype row.
    kill_switch_source: tools/vfs_proto.sh default-off wrapper
    offline_resolution_posture: authoritative_local

  - labs_id: lab.large_file.prototype_harness
    experiment_ref: exp.large_file.prototype_harness
    public_label: Large-file path prototype harness
    inventory_group: core_prototype
    visibility_state: documented_repo_visible
    lifecycle_state: labs
    owner_dri: "@ahmeddyounis"
    cohort_or_ring: maintainer_and_contributor_local
    support_note: Prototype-only large-file classifier and capability table.
    review_by: "2026-06-30"
    expires_on: null
    feedback_path: prototypes/large_file/README.md
    dependency_summary: >
      artifacts/bench/large_file_proto_metrics.json depends on this row,
      and benchmark corpus rows cite it as a prototype input.
    kill_switch_source: tools/largefile_proto.sh default-off wrapper
    offline_resolution_posture: authoritative_local

  - labs_id: lab.graph.prototype_harness
    experiment_ref: exp.graph.prototype_harness
    public_label: Semantic-workspace-graph prototype harness
    inventory_group: core_prototype
    visibility_state: documented_repo_visible
    lifecycle_state: labs
    owner_dri: "@ahmeddyounis"
    cohort_or_ring: maintainer_and_contributor_local
    support_note: Contract-first graph vocabulary and validation harness.
    review_by: "2026-06-30"
    expires_on: null
    feedback_path: prototypes/graph/README.md
    dependency_summary: >
      fixtures/graph/example_workspace_graphs/ and the graph schema depend
      on this row remaining named and reviewable.
    kill_switch_source: tools/graph_proto.sh default-off wrapper
    offline_resolution_posture: authoritative_local

  - labs_id: lab.reactive_state.prototype_harness
    experiment_ref: exp.reactive_state.prototype_harness
    public_label: Reactive-state prototype harness
    inventory_group: core_prototype
    visibility_state: documented_repo_visible
    lifecycle_state: labs
    owner_dri: "@ahmeddyounis"
    cohort_or_ring: maintainer_and_contributor_local
    support_note: Subscription-envelope and invalidation-trace prototype.
    review_by: "2026-06-30"
    expires_on: null
    feedback_path: prototypes/reactive_state/README.md
    dependency_summary: >
      artifacts/state/invalidation_trace_examples/ and the subscription
      envelope schema depend on this row.
    kill_switch_source: tools/reactive_proto.sh default-off wrapper
    offline_resolution_posture: authoritative_local

  - labs_id: lab.text_stack.smoke_mode
    experiment_ref: exp.text_stack.smoke_mode
    public_label: Text-stack smoke mode
    inventory_group: prototype_side_channel
    visibility_state: documented_repo_visible
    lifecycle_state: labs
    owner_dri: "@ahmeddyounis"
    cohort_or_ring: maintainer_and_contributor_local
    support_note: >
      Prototype shaping/fallback smoke path exposed through bench_text_stack
      and shell_spike --text-stack-smoke.
    review_by: "2026-06-30"
    expires_on: null
    feedback_path: prototypes/text_stack/README.md
    dependency_summary: >
      artifacts/bench/text_stack_metrics_seed.json and
      fixtures/text/shaping_smoke_cases.txt depend on this row.
    kill_switch_source: tools/bench_text_stack.sh default-off wrapper
    offline_resolution_posture: authoritative_local

  - labs_id: lab.benchmark.smoke_subset
    experiment_ref: mode.benchmark_lab.smoke_subset
    public_label: Benchmark-lab smoke subset
    inventory_group: benchmark_mode
    visibility_state: documented_repo_visible
    lifecycle_state: preview
    owner_dri: "@ahmeddyounis"
    cohort_or_ring: developer_local_and_ci_preview
    support_note: Fast lab path for harness health and contributor inspection.
    review_by: "2026-06-30"
    expires_on: null
    feedback_path: docs/benchmarks/benchmark_lab_run_results.md
    dependency_summary: >
      dashboard_seed outputs and benchmark-lab docs depend on this mode
      being explicitly non-release-evidence.
    kill_switch_source: tools/benchmark_lab.sh --corpus-subset
    offline_resolution_posture: authoritative_local

  - labs_id: lab.shell.wedge_inspector_overlay
    experiment_ref: flag.shell.wedge_inspector_overlay
    public_label: Shell wedge inspector overlay
    inventory_group: shell_overlay
    visibility_state: documented_repo_visible
    lifecycle_state: labs
    owner_dri: "@ahmeddyounis"
    cohort_or_ring: maintainer_and_contributor_local
    support_note: >
      Local read-only overlay that lists bounded wedge prototype panels in
      the running shell when the Labs setting is enabled.
    review_by: "2026-06-30"
    expires_on: null
    feedback_path: crates/aureline-shell/src/wedge_inspector/mod.rs
    dependency_summary: >
      The command-palette row cmd:labs.open_wedge_inspector and the native
      shell overlay depend on this Labs projection remaining default-off.
    kill_switch_source: shell.labs.wedge_inspector_enabled setting
    offline_resolution_posture: authoritative_local
