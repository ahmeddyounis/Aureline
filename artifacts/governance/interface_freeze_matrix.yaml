# Interface-freeze matrix.
#
# Machine-readable register of the contracts that are frozen enough,
# still provisional, or still blocked before implementation broadens
# from the foundations milestone into the core prototype milestone.
# Downstream task specs, ADRs, and packet updates should cite row ids
# here instead of re-stating the same contract prose.
#
# Status rules.
#   - frozen: downstream implementation may build on the cited
#     contract as-is; changes route through the owning contract doc.
#   - provisional: a narrowed subset is seeded strongly enough to
#     build against, but unresolved scope must stay visible and may
#     block or narrow downstream work.
#   - blocked: no implementation-broadening work should treat the row
#     as settled; the missing contract must land first.
#
# Gate-class rules.
#   - core_m1_implementation_blocker: current implementation work
#     should cite this row directly.
#   - later_surface_architecture_seed: the row exists to stop later
#     surfaces from being invented in code or UI prose while M1 stays
#     focused on the core path.

schema_version: 1
as_of: "2026-04-22"
owner: "@ahmeddyounis"

freeze_status_values:
