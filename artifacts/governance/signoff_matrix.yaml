ownership_state_vocabulary:
  - active_role_owner
  - temporary_handoff_active
  - unresolved_owner_degraded
  - temporary_handoff_expired_degraded

decision_outcome_vocabulary:
  - approved
  - approved_with_narrowing
  - held_for_packet_refresh
  - rejected
  - no_go
  - escalated
  - degraded_owner_unresolved
  - degraded_handoff_expired

concurrence_mode_vocabulary:
  - all_required
  - all_required_with_conditional_escalation
  - discipline_specific_all_required

packet_type_vocabulary:
  - architecture_freeze_packet
  - protected_metric_waiver_packet
  - discipline_waiver_packet
  - stable_cutline_change_packet
  - claim_publication_packet
  - stable_release_promotion_packet
  - lts_line_creation_packet
  - workflow_bundle_decision_packet

conservative_path_rules:
  - rule_id: conservative_path.shared_owner_disagreement
    applies_when: >
      A decision class has multiple accountable owner roles or required
      concurrence roles and those roles do not converge on the wider
      launch-bearing outcome.
    required_behavior: >
      Select the narrower or safer outcome: hold promotion, keep the
      current threshold, downgrade or withhold the public claim, or open
      a rebaseline packet. Disagreement may not silently widen public
      commitments.

  - rule_id: conservative_path.missing_packet_or_evidence
    applies_when: >
      The required packet type, packet id, signoff row ref, or linked
      evidence bundle id is missing, stale, or not reconstructable.
    required_behavior: >
      Treat the decision as held_for_packet_refresh or no_go according
      to the candidate stage; stable-facing promotion defaults to no_go.

  - rule_id: conservative_path.degraded_owner
    applies_when: >
      The accountable role cannot resolve to an active owner or the
      decision relies on a temporary handoff whose expiry has elapsed.
    required_behavior: >
      Emit degraded_owner_unresolved or degraded_handoff_expired and
      block approval until ownership is restored or a valid waiver or
      handoff packet lands.

packet_type_requirements:
  - packet_type_id: architecture_freeze_packet
    required_packet_profile_ids:
      - architecture_decision_bundle
    required_fields:
      - packet_id
      - decision_class_id
      - frozen_interface_row_refs
      - affected_lane_refs
      - architecture_decision_refs
      - evidence_bundle_ids
      - signoff_row_ref
      - unresolved_gap_summary

  - packet_type_id: protected_metric_waiver_packet
    required_packet_profile_ids:
      - performance_readout_bundle
    required_fields:
      - packet_id
      - decision_class_id
      - fitness_row_ids
      - before_after_evidence_refs
      - mitigation
      - expiry
      - renewal_limit
      - evidence_bundle_ids
      - signoff_row_ref

  - packet_type_id: discipline_waiver_packet
    required_packet_profile_ids:
      - security_trust_packet
      - accessibility_review_packet
      - release_readiness_packet
    required_fields:
      - packet_id
      - decision_class_id
      - discipline_role_id
      - affected_requirement_ids
      - affected_claim_row_refs
      - mitigation
      - release_train_crossing
      - expiry
      - evidence_bundle_ids
      - signoff_row_ref

  - packet_type_id: stable_cutline_change_packet
    required_packet_profile_ids:
      - milestone_scope_packet
    required_fields:
      - packet_id
      - decision_class_id
      - cutline_delta
      - affected_requirement_ids
      - affected_claim_row_refs
      - public_truth_update_refs
      - rebaseline_or_scope_effect
