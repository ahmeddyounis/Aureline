default_degraded_state_policy:
  active_owner_required: true
  unresolved_owner_state: unresolved_owner_degraded
  expired_temporary_handoff_state: temporary_handoff_expired_degraded
  degraded_state_effect: >
    The row is not approvable and must not be shown as equivalent to
    active ownership. Scorecards and shiproom packets render the degraded
    state explicitly and route to the escalation path before any widening.

decision_classes:
  - decision_class_id: architecture_freeze
    source_decision_label: Architecture freeze
    title: Architecture freeze
    accountable_owner_role_ids:
      - chief_architect
      - architecture_council
    ownership_mode: shared_accountability
    required_concurrence_role_ids:
      - product_lead
      - performance_owner
      - release_owner
    concurrence_mode: all_required
    required_packet_type_id: architecture_freeze_packet
    linked_evidence_bundle_ids:
      - evidence.bundle.architecture.freeze
    conservative_path_when_disputed:
      outcome: held_for_packet_refresh
      required_action: >
        Keep the affected interfaces provisional or blocked. Do not mark
        an interface row frozen until the packet names the narrower scope,
        the unresolved gaps, and every required concurrence.
    escalation_path_when_concurrence_fails:
      - product_scope_review
      - release_council
      - shiproom_executive_scope_review
    degraded_state_policy:
      unresolved_owner_state: unresolved_owner_degraded
      expired_temporary_handoff_state: temporary_handoff_expired_degraded
      decision_effect: block_freeze_and_mark_scorecard_degraded

  - decision_class_id: protected_metric_waiver
    source_decision_label: Protected-metric waiver
    title: Protected-metric waiver
    accountable_owner_role_ids:
      - performance_owner
    ownership_mode: single_accountable_role
    required_concurrence_role_ids:
      - architecture_council
      - product_lead
    conditional_concurrence_role_ids:
      repeated_waiver_or_second_renewal:
        - sponsor
        - shiproom_executive_scope_review
    concurrence_mode: all_required_with_conditional_escalation
    required_packet_type_id: protected_metric_waiver_packet
    linked_evidence_bundle_ids:
      - evidence.bundle.protected_metric.waiver
    conservative_path_when_disputed:
      outcome: rejected
      required_action: >
        Keep the existing protected threshold and block claim widening.
        If release scope is affected, open a correction or rebaseline
        packet instead of easing the metric silently.
    escalation_path_when_concurrence_fails:
      - architecture_council
      - release_council
      - shiproom_executive_scope_review
    degraded_state_policy:
      unresolved_owner_state: unresolved_owner_degraded
      expired_temporary_handoff_state: temporary_handoff_expired_degraded
      decision_effect: waiver_not_active_and_metric_remains_protected

  - decision_class_id: discipline_waiver
    source_decision_label: Security, reliability, accessibility, or trust waiver
    title: Security, reliability, accessibility, or trust waiver
    accountable_owner_role_ids:
      - security_lead
      - reliability_owner
      - accessibility_owner
      - trust_owner
    ownership_mode: discipline_specific_accountability
    required_concurrence_role_ids:
      - product_lead
      - release_owner
    conditional_concurrence_role_ids:
      crosses_release_train:
        - sponsor
        - shiproom_executive_scope_review
    concurrence_mode: discipline_specific_all_required
    required_packet_type_id: discipline_waiver_packet
    linked_evidence_bundle_ids:
      - evidence.bundle.discipline.waiver
    conservative_path_when_disputed:
      outcome: no_go
      required_action: >
        Reject or hold the waiver and narrow the affected claim. A
        release-bearing security, reliability, accessibility, or trust
        gap cannot ship as an active waiver without packeted mitigation,
        expiry, and the required concurrence.
    escalation_path_when_concurrence_fails:
      - release_council
      - shiproom_executive_scope_review
    degraded_state_policy:
      unresolved_owner_state: unresolved_owner_degraded
      expired_temporary_handoff_state: temporary_handoff_expired_degraded
      decision_effect: waiver_not_active_and_claim_narrows_or_holds

  - decision_class_id: stable_cutline_change
    source_decision_label: v1.0 cutline change
    title: v1.0 cutline change
    accountable_owner_role_ids:
      - product_lead
    ownership_mode: single_accountable_role
    required_concurrence_role_ids:
      - sponsor
      - chief_architect
      - release_owner
    concurrence_mode: all_required
    required_packet_type_id: stable_cutline_change_packet
    linked_evidence_bundle_ids:
      - evidence.bundle.cutline.scope
    conservative_path_when_disputed:
      outcome: approved_with_narrowing
      required_action: >
        Keep or narrow the current stable cutline. Late additions,
        broader language support, or wider public claims require full
        concurrence; otherwise the change records the narrower scope or
        opens a rebaseline packet.
    escalation_path_when_concurrence_fails:
      - product_scope_review
      - architecture_council
      - release_council
      - shiproom_executive_scope_review
    degraded_state_policy:
      unresolved_owner_state: unresolved_owner_degraded
      expired_temporary_handoff_state: temporary_handoff_expired_degraded
      decision_effect: cutline_change_blocked_or_scope_narrowed

  - decision_class_id: support_class_or_archetype_claim_publication
    source_decision_label: Support-class or archetype claim publication
    title: Support-class or archetype claim publication
    accountable_owner_role_ids:
      - product_lead
      - certification_qe_owner
    ownership_mode: shared_accountability
    required_concurrence_role_ids:
      - release_owner
      - docs_lead
      - affected_subsystem_lead
    concurrence_mode: all_required
    required_packet_type_id: claim_publication_packet
    linked_evidence_bundle_ids:
      - evidence.bundle.claim.publication
    conservative_path_when_disputed:
      outcome: approved_with_narrowing
      required_action: >
        Publish only the strongest claim class all required roles can
        defend from current evidence. If evidence, docs, or subsystem
        ownership disagree, downgrade or withhold the claim.
    escalation_path_when_concurrence_fails:
      - compatibility_ecosystem_review
      - release_council
      - product_scope_review
      - shiproom_executive_scope_review
    degraded_state_policy:
      unresolved_owner_state: unresolved_owner_degraded
      expired_temporary_handoff_state: temporary_handoff_expired_degraded
      decision_effect: claim_publication_blocked_or_downgraded

  - decision_class_id: stable_release_promotion
    source_decision_label: Stable release promotion
    title: Stable release promotion
    accountable_owner_role_ids:
      - release_owner
    ownership_mode: single_accountable_role
    required_concurrence_role_ids:
      - performance_owner
      - security_lead
      - accessibility_owner
      - supportability_owner
      - certification_qe_owner
      - docs_lead
    concurrence_mode: all_required
    required_packet_type_id: stable_release_promotion_packet
    linked_evidence_bundle_ids:
      - evidence.bundle.stable.promotion
      - evidence.bundle.claim.publication
    conservative_path_when_disputed:
      outcome: no_go
      required_action: >
        Hold promotion. Stable-facing candidates do not use late-proof
        placeholders or active release waivers as a substitute for the
        required concurrence set.
    escalation_path_when_concurrence_fails:
      - release_council
      - shiproom_executive_scope_review
    degraded_state_policy:
      unresolved_owner_state: unresolved_owner_degraded
      expired_temporary_handoff_state: temporary_handoff_expired_degraded
      decision_effect: stable_promotion_no_go

  - decision_class_id: lts_line_creation
    source_decision_label: LTS line creation
    title: LTS line creation
    accountable_owner_role_ids:
      - release_owner
      - enterprise_support_owner
    ownership_mode: shared_accountability
    required_concurrence_role_ids:
      - sponsor
      - security_lead
      - product_lead
    concurrence_mode: all_required
    required_packet_type_id: lts_line_creation_packet
    linked_evidence_bundle_ids:
      - evidence.bundle.lts_line.creation
      - evidence.bundle.stable.promotion
    conservative_path_when_disputed:
      outcome: rejected
      required_action: >
        Do not create or advertise the LTS line. Keep the release on
        the existing stable or hotfix support posture until backport,
        security-response, and support-window ownership are packeted.
    escalation_path_when_concurrence_fails:
      - release_council
      - security_trust_review
      - product_scope_review
      - shiproom_executive_scope_review
    degraded_state_policy:
      unresolved_owner_state: unresolved_owner_degraded
      expired_temporary_handoff_state: temporary_handoff_expired_degraded
      decision_effect: lts_line_creation_blocked

  - decision_class_id: workflow_bundle_certification_or_downgrade
    source_decision_label: Workflow-bundle certification or downgrade
    title: Workflow-bundle certification or downgrade
    accountable_owner_role_ids:
      - compatibility_ecosystem_review_owner
    ownership_mode: single_accountable_role
    required_concurrence_role_ids:
      - certification_qe_owner
      - docs_release_owner
    concurrence_mode: all_required
    required_packet_type_id: workflow_bundle_decision_packet
    linked_evidence_bundle_ids:
      - evidence.bundle.workflow_bundle.decision
      - evidence.bundle.claim.publication
    conservative_path_when_disputed:
      outcome: approved_with_narrowing
      required_action: >
        Downgrade, retest, or withhold the bundle claim. A disputed
        bundle cannot stay certified or supported simply because a prior
        row said so.
    escalation_path_when_concurrence_fails:
      - compatibility_ecosystem_review
      - release_council
      - product_scope_review
    degraded_state_policy:
      unresolved_owner_state: unresolved_owner_degraded
      expired_temporary_handoff_state: temporary_handoff_expired_degraded
      decision_effect: bundle_certification_withheld_or_downgraded
