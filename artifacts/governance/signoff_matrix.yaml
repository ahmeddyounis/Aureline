# Decision-rights and signoff matrix.
#
# Machine-readable authority matrix for launch-bearing architecture,
# waiver, claim, promotion, LTS-line, and workflow-bundle decisions.
# The narrative companion is docs/governance/decision_rights_and_signoff_matrix.md.
# Rows stay role-based: they name forums, lanes, and accountable role ids,
# not personal contact details.

schema_version: 1
matrix_id: aureline.governance.decision_rights_and_signoff_matrix
status: seeded
overview_doc: docs/governance/decision_rights_and_signoff_matrix.md

source_refs:
  - .t2/docs/Aureline_Milestones_Document.md#11.6
  - .t2/docs/Aureline_PRD.md#16.7
  - docs/governance/dri_map.md
  - docs/governance/forum_packet_templates.md
  - artifacts/governance/forum_matrix.yaml
  - artifacts/governance/ownership_matrix.yaml
  - artifacts/release/promotion_gate_map.yaml
  - docs/release/shiproom_runbook.md

companion_artifacts:
  promotion_decision_rows: artifacts/governance/promotion_decision_rows.yaml
  forum_matrix: artifacts/governance/forum_matrix.yaml
  ownership_matrix: artifacts/governance/ownership_matrix.yaml
  decision_workflow: docs/governance/decision_workflow.md
  waiver_template: docs/governance/templates/waiver_template.md
  exception_packet_template: docs/governance/templates/exception_packet_template.md
  release_evidence_packet_template: docs/release/release_evidence_packet_template.md
  release_promotion_gate_map: artifacts/release/promotion_gate_map.yaml
  signing_quorum: artifacts/governance/signing_quorum.yaml

role_contact_policy:
  matrix_rows_are_role_based: true
  allowed_identity_refs:
    - role_id
    - forum_id
    - governance_lane_id
    - packet_id
    - evidence_bundle_id
  forbidden_identity_refs:
    - personal_email
    - phone_number
    - private_calendar_link
    - chat_handle_as_primary_owner
  notes: >
    Personal handles may appear in ownership_matrix.yaml because that file
    resolves active DRIs. This matrix deliberately remains exportable to
    scorecards, shiproom packets, and public-truth reviews without exposing
    contact details.

