    boundary_class: mirrored_service
    claim_status: alpha_managed_truth_seed
    open_local_alternative:
      available: true
      capability_ref: local_support_bundle
      summary: Already installed extensions and local support export do not require registry reachability.
    self_host_alternative:
      available: true
      capability_ref: extension_registry_mirror
      summary: Registry content can be mirrored through customer-operated or offline artifact channels.
    mirrored_or_airgap_alternative:
      available: true
      mirror_class: signed_mirror
      summary: Air-gapped installs use signed registry mirrors or offline bundles.
    required_identity_boundary: optional_account
    required_network_boundary: mirror_or_file_import
    entitlement_state_refs:
