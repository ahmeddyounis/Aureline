    lifecycle_metadata:
      introduced_at: "2026-05-12"
      review_state: seeded
      owner_dri: "@ahmeddyounis"
      source_refs:
        - docs/product/boundary_manifest_strawman.md#self-host-friendly
        - docs/governance/usage_export_and_offboarding_contract.md

  - capability_id: collaboration_relay
