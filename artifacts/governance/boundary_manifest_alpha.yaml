      summary: Local profile files remain the source of truth when sync is disabled or offboarded.
    self_host_alternative:
      available: true
      capability_ref: configuration_profiles
      summary: Customer-managed storage or signed import can carry equivalent profile state without vendor sync.
    mirrored_or_airgap_alternative:
