    local_core_guardrail: Registry or marketplace unavailability pauses discovery only; local extension execution remains separate.
    lifecycle_metadata:
      introduced_at: "2026-05-12"
      review_state: seeded
      owner_dri: "@ahmeddyounis"
      source_refs:
        - docs/product/boundary_manifest_strawman.md#self-host-friendly
        - artifacts/governance/usage_export_posture_matrix.yaml

  - capability_id: telemetry_support_pipeline
    title: Telemetry and support pipeline
    boundary_class: self_hostable_service
    claim_status: alpha_managed_truth_seed
    open_local_alternative:
      available: true
      capability_ref: local_support_bundle
      summary: Local/offline support bundles remain canonical when upload or managed support ingest is unavailable.
    self_host_alternative:
      available: true
      capability_ref: telemetry_support_pipeline
      summary: Support ingest and metrics sinks can be customer operated where enabled.
    mirrored_or_airgap_alternative:
      available: true
      mirror_class: file_import
      summary: Air-gapped support handoff uses local export rather than upload.
    required_identity_boundary: optional_account
    required_network_boundary: customer_operated_control_plane
    entitlement_state_refs:
