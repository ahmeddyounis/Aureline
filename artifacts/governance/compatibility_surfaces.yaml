# Compatibility-surface inventory.
#
# One machine-readable inventory for every public-facing machine-readable
# surface likely to drift between producers and consumers: settings and
# profile JSON, workspace manifests and Project Doctor packets, extension
# manifests, CLI structured output, WIT host interfaces, optional service
# APIs, evidence or support bundles, task-event envelopes, and the longer
# list of specialized boundaries named in the deliverables section of
# this file.
#
# Tooling reads this file; the narrative companion lives in
# docs/governance/compatibility_surface_inventory.md. If the two disagree,
# this file is authoritative for tooling and the narrative must be
# updated in the same change.
#
# Relation to stable_surface_inventory.yaml.
#   - stable_surface_inventory.yaml carries the full surface-contract
#     packet shape (reader/writer semantics, downgrade behavior, typed
#     support posture) for every surface that has earned one. It is
#     authoritative for packet shape.
#   - This file casts a wider net. It gives every compatibility-bearing
#     machine-readable surface a row with the fields compatibility,
#     docs/public-truth, migration, deprecation, and qualification or
#     certified-archetype review share: owner, maturity lane, versioning
#     mechanism, compatibility promise, deprecation window, migration
#     requirement, publication artifact, and support-window notes.
#   - Rows that already have a stable_surface_inventory row cite that
#     row id verbatim (stable_surface_inventory_row_ref). Rows that do
#     not yet have a packet use outline_only or not_yet_seeded fields
#     and name the next review milestone on which a packet must land.
#
# Propagation rules.
#   - Every row MUST cite the shared packet template at
#     docs/governance/contract_packet_template.md. When a future packet
#     lands, the packet id stays equal to the row_id here so downstream
#     work does not mint parallel ids.
#   - Every row MUST name the docs/public-truth channels that may quote
#     it. Channels are drawn from
#     artifacts/governance/public_truth_parity_matrix.yaml#channels.
#   - Every row MUST name the qualification_or_certified_archetype
#     report refs it feeds. When the surface is local-only and does not
#     qualify through compatibility reports, the row names the
#     record-class, support, or archetype artifact that does carry it.
#
# Registration rule.
#   - A future public or beta surface MUST land a row here before it may
#     claim stability. Adding a row is the first registration step; the
#     second is either landing a stable_surface_inventory row with the
#     full packet shape or, for narrower surfaces, an explicit
#     outline_only posture and a next-review milestone.
#   - Removing a row is breaking. Use deprecation_window and
#     migration_requirement to narrow or supersede a row; do not delete.

schema_version: 1
status: seeded
as_of: "2026-04-24"

overview_page: docs/governance/compatibility_surface_inventory.md
contract_packet_template_ref: docs/governance/contract_packet_template.md
contract_packet_schema_ref: schemas/governance/contract_packet.schema.json
stable_surface_inventory_ref: artifacts/governance/stable_surface_inventory.yaml
ownership_matrix_ref: artifacts/governance/ownership_matrix.yaml
public_truth_parity_matrix_ref: artifacts/governance/public_truth_parity_matrix.yaml
qualification_matrix_ref: artifacts/compat/qualification_matrix_seed.yaml
reference_workspace_rows_ref: artifacts/compat/reference_workspace_rows.yaml
interface_lifecycle_policy_ref: docs/governance/interface_lifecycle_policy.md
schema_families_ref: artifacts/governance/schema_families.yaml
row_reference_format: artifacts/governance/compatibility_surfaces.yaml#<surface_id>

# -----------------------------------------------------------------------------
# Enumerations. The row schema is narrative for now; these lists fix the
# vocabulary this inventory is allowed to use so tooling can validate rows
# without minting parallel enumerations per row.
# -----------------------------------------------------------------------------
maturity_lane_values:
  - stable
  - beta
  - experimental
  - internal

contract_form_values:
  - json_schema_backed_contract_doc
  - json_schema_registry
  - record_registry
  - event_envelope_schema
  - wit_world_package
  - openapi_family
  - field_set
  - cli_structured_output
  - textual_interchange_contract
  - asset_package_manifest
  - teaching_content_pack

category_values:
  - settings_and_profile
  - workspace_and_state
  - extensions_and_host
  - command_and_automation
  - ai_and_language
  - editor_and_text
  - terminal_and_run
  - debug_and_diagnostics
  - merge_and_history
  - portability_and_migration
  - locale_and_translation
  - design_and_theme
  - accessibility_and_input
  - voice_and_consent
  - service_and_api
  - review_and_hosted
  - release_and_build
  - support_and_export
  - governance_and_policy
  - docs_and_teaching
  - notification_and_attention
  - certification_and_reference

# -----------------------------------------------------------------------------
# Rows.
#
# Ordered by category. Every row names:
#   - surface_id                          stable dot id
#   - surface_title / summary
#   - category                            for cross-row grouping
#   - contract_form                       enum above
#   - maturity_lane                       enum above
#   - ownership                           owner DRI, lane, backup, waiver
#   - publication                         publication artifact refs and
#                                         schema or interface directory refs
#   - versioning                          versioning_mechanism and
#                                         compatibility_window_source_ref
#   - compatibility                       compatibility_promise and
#                                         support_window_posture
#   - lifecycle                           deprecation_window,
#                                         migration_requirement,
#                                         dependency_markers
#   - linkage                             stable_surface_inventory_row_ref,
#                                         contract_packet_template_ref,
#                                         docs_public_truth_channels,
#                                         qualification_or_certified_archetype_report_refs
#   - review                              review_cadence and docs touchpoints
#
# Every row uses the same shape even when fields resolve to not_yet_seeded
# or outline_only. "Not yet seeded" is expressed by publication or linkage
# fields, never by omitting the row.
# -----------------------------------------------------------------------------

