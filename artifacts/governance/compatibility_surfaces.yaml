      UI, CLI, policy explainers, profile import and export, and support
      surfaces.
    contract_form: json_schema_backed_contract_doc
    maturity_lane: beta
    ownership:
      owner_dri: "@ahmeddyounis"
      owning_lane: governance_packets
      backup_owner: null
      backup_waiver: single-maintainer-backup
    publication:
      publication_artifact_refs:
        - docs/profile/profile_sync_and_conflict_contract.md
        - docs/settings/settings_vocabulary.md
        - docs/settings/schema_registry_seed.md
        - docs/settings/sync_and_device_registry_seed.md
        - schemas/profile/profile_library_entry.schema.json
        - schemas/settings/setting_definition.schema.json
        - schemas/settings/effective_setting.schema.json
        - schemas/settings/sync_conflict_packet.schema.json
        - schemas/settings/sync_device_record.schema.json
        - schemas/settings/write_intent.schema.json
        - schemas/profile/portable_profile.schema.json
        - schemas/profile/sync_conflict_record.schema.json
        - artifacts/settings/scope_precedence_rows.yaml
      schema_or_interface_directory_refs:
        - docs/profile/
        - docs/settings/
        - schemas/settings/
        - schemas/profile/
        - artifacts/settings/
    versioning:
      versioning_mechanism: >
        Stable setting ids plus explicit schema version on setting
        definitions, effective-value envelopes, scope-precedence rows,
        sync-conflict packets, and portable profiles. Additive fields
        and unknown user content are preserved; rename routes through
        alias and migration tables rather than id reuse.
      compatibility_window_source_ref: >
        artifacts/governance/stable_surface_inventory.yaml#settings.setting_ids_and_effective_values
    compatibility:
      compatibility_promise: >
        One additive schema epoch; readers preserve unknown additive
        fields and project resolved scope, shadow chain, and denial
        posture verbatim. Writers never repurpose an existing setting id.
      support_window_posture: >
        Beta today. Once promoted to stable, setting ids and effective
        values target two minor releases of alias or migration support.
    lifecycle:
      deprecation_window: >
        Deprecated settings require a replacement id or alias path, an
        explain-why route, and a deprecation-metadata row that follows
        docs/governance/interface_lifecycle_policy.md before the old id
        is ignored or removed.
      migration_requirement: >
        Rename or retire any setting via the alias / migration table in
        the registry plus a migration note in
        docs/state/migration_and_restore_playbook.md.
      dependency_markers: []
    linkage:
      stable_surface_inventory_row_ref: >
        artifacts/governance/stable_surface_inventory.yaml#settings.setting_ids_and_effective_values
      contract_packet_template_ref: docs/governance/contract_packet_template.md
      docs_public_truth_channels:
        - docs_site
        - migration_notes
        - help_about
        - support_export
        - release_notes
      qualification_or_certified_archetype_report_refs:
        - artifacts/compat/reference_workspace_rows.yaml
    review:
      review_cadence: each_change
      docs_touchpoint_refs:
        - docs/settings/settings_vocabulary.md
        - docs/state/migration_and_restore_playbook.md

