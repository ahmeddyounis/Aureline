# -----------------------------------------------------------------------------
# Mapping rules.
#
# The tables below tell tooling how a compatibility-surface row maps back to
# the shared packet template, the public-truth propagation matrix, and the
# qualification or certified-archetype report family. Every row above cites
# at least one ref from each table; adding a new row MUST extend these maps
# rather than mint parallel conventions per row.
# -----------------------------------------------------------------------------

mapping_rules:

  - rule_id: mapping.contract_packet_template
    summary: >
      Every row in rows[] MUST cite docs/governance/contract_packet_template.md
      as its contract_packet_template_ref and use the packet fields defined
      at schemas/governance/contract_packet.schema.json for any full
      surface-contract packet it later promotes into the stable-surface
      inventory. Row surface_id values are reused verbatim as the packet id;
      downstream work cites the same id.

  - rule_id: mapping.stable_surface_inventory_row
    summary: >
      When a row names a stable_surface_inventory_row_ref, the stable
      inventory row is authoritative for reader / writer semantics, downgrade
      behavior, and declared support-window posture. This file stays the
      wider map and does not restate those fields.

  - rule_id: mapping.docs_public_truth_channels
    summary: >
      Every row MUST name docs_public_truth_channels drawn from
      artifacts/governance/public_truth_parity_matrix.yaml#channels. Docs site,
      migration notes, help / about, service-health, CLI help, release notes,
      release packets, and support exports quote the row instead of minting a
      parallel freshness, build-truth, or support vocabulary.

  - rule_id: mapping.qualification_or_certified_archetype_reports
    summary: >
      Every row MUST cite at least one qualification_or_certified_archetype
      report ref. Surfaces that qualify through cross-boundary compatibility
      cite a row in artifacts/compat/qualification_matrix_seed.yaml; surfaces
      that qualify through reference-workspace certification cite a row in
      artifacts/compat/reference_workspace_rows.yaml; local-only surfaces
      cite the record-class or support packet that carries their evidence.

  - rule_id: mapping.registration_required_before_stability_claim
    summary: >
      A future public or beta surface MUST land a row here before it may
      claim stability. Adding the row is the first registration step; the
      second is either landing a stable_surface_inventory row with the full
      packet shape or, for narrower surfaces, an explicit outline_only
      posture and a next-review milestone. Rows are never deleted; narrowing
      or supersession uses the deprecation_window and migration_requirement
      fields.

# -----------------------------------------------------------------------------
# Review cadence and visibility. Matches control_artifact_index.yaml.
# -----------------------------------------------------------------------------

review_cadences:
  - each_change
  - per_milestone
  - each_release

visibility_class: public
