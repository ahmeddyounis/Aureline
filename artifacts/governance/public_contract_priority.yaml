# Public-contract stabilization order (priority register).
#
# This file ranks the highest-risk machine-readable public contract surfaces so
# stabilization work hardens the most expensive-to-change surfaces first.
#
# It is the machine-readable companion to:
#   docs/governance/public_contract_stabilization_order.md
#
# Notes:
# - This register is about contract stabilization order, not feature scope.
# - Row ids must be stable references (prefer surface_id values).
# - Planning task ids MUST NOT appear in ids.

schema_version: 1
status: seeded
as_of: "2026-05-07"

overview_page: docs/governance/public_contract_stabilization_order.md
gates_ref: artifacts/governance/public_contract_gates.yaml

authoritative_inputs:
  compatibility_surface_inventory_ref: artifacts/governance/compatibility_surfaces.yaml
  stable_surface_inventory_ref: artifacts/governance/stable_surface_inventory.yaml
  stability_label_register_ref: artifacts/governance/stability_label_rows.yaml
  interface_lifecycle_policy_ref: docs/governance/interface_lifecycle_policy.md
  standards_matrix_ref: artifacts/governance/standards_matrix.yaml
  contract_family_registry_ref: artifacts/contracts/contract_families.yaml
  example_pack_index_ref: artifacts/contracts/example_pack_index.yaml
  frozen_surface_manifest_ref: artifacts/contracts/frozen_surface_manifest.yaml

risk_scoring:
  scale:
    min: 0
    max: 5
    meaning: 0=none_or_internal_only, 5=highest_lock_in_and_breakage_risk
  criteria:
    - criterion_id: user_owned_data_impact
      weight: 3
      description: >
        Durable user/workspace state at risk when the contract drifts or is
        repurposed (portability, readability windows, migration burden).
    - criterion_id: interoperability_load
      weight: 3
      description: >
        Number of independent producers/consumers (including external ecosystems)
        that must interoperate through the contract.
    - criterion_id: deprecation_cost
      weight: 2
      description: >
        Cost of fixing mistakes once depended on (aliases, migrations, overlap
        windows, rollback constraints).
    - criterion_id: support_burden
      weight: 2
      description: >
        How directly the surface affects diagnosis, support export, and
        explainability of incidents and user-visible failures.
    - criterion_id: dependency_fan_out
      weight: 3
      description: >
        How many other contract families cite the ids/vocabulary/schemas of this
        surface (hard-to-untangle dependency graph).
  aggregation: weighted_sum
  interpretation: >
    Higher scores should stabilize earlier. Ties are broken by dependency
    fan-out and by whether the surface is already on the frozen-surface list.

priority_bands:
  - band_id: p0_launch_blocker
    label: P0 (launch-blocking public contract)
    summary: >
      Must stabilize before broad implementation or before stable-facing claims
      expand. Drift here creates ecosystem breakage or user-owned data loss.
  - band_id: p1_high_cost
    label: P1 (high-cost contract)
    summary: >
      Important surfaces that should stabilize early, but do not generally gate
      every other surface.
  - band_id: p2_defer
    label: P2 (defer until after P0/P1)
    summary: >
      Surfaces allowed to remain experimental/internal longer without blocking
      the P0 contract stabilization order.

rows:
  - contract_id: command_plane.command_graph_and_ui_slot_schema
    contract_title: Command graph, descriptors, and UI-slot schema
    priority_rank: 1
    priority_band: p0_launch_blocker
    owner_dri: "@ahmeddyounis"
    owning_lane: shell_command_system
    current_maturity_lane: beta
    stabilization_targets:
      target_maturity_lane: stable
      gate_profile_ref: launch_critical.stable_claim
    inventory_refs:
      compatibility_surface_row_ref: artifacts/governance/compatibility_surfaces.yaml#command_plane.command_graph_and_ui_slot_schema
      stable_surface_inventory_row_ref: artifacts/governance/stable_surface_inventory.yaml#command_plane.command_descriptor_and_invocation_session
      frozen_surface_manifest_row_ref: artifacts/contracts/frozen_surface_manifest.yaml#command_plane.command_descriptor_and_invocation_session
    risk_factors:
      user_owned_data_impact: 3
      interoperability_load: 4
      deprecation_cost: 5
      support_burden: 4
      dependency_fan_out: 5
    rationale: >
      Highest fan-out contract: palette/menu/CLI/automation/AI-tool/replay and
      help anchors depend on stable command ids and schema epochs. Mistakes are
      extremely expensive to unwind once command ids and automation bindings are
      referenced in docs/help, exported bundles, and scripts.
    known_prerequisites:
      - prerequisite_ref: artifacts/compat/qualification_matrix_seed.yaml#compat_row:command_plane.command_descriptor_schema
      - prerequisite_ref: docs/governance/interface_lifecycle_policy.md
      - prerequisite_ref: artifacts/contracts/example_pack_index.yaml
        note: command_metadata examples (validation_gate=ci_required).

