  - family_id: runtime
    schema_home: schemas/runtime/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/runtime/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: runtime_surface
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/runtime/browser_runtime_session.schema.json
      - schemas/runtime/preview_route.schema.json
      - schemas/runtime/container_session.schema.json
      - schemas/runtime/devcontainer_profile.schema.json
      - schemas/runtime/target_context.schema.json
      - schemas/runtime/connector_session.schema.json
      - schemas/runtime/action_safety_review.schema.json
      - schemas/runtime/resource_target.schema.json
      - schemas/runtime/drift_summary.schema.json
      - schemas/runtime/live_action_envelope.schema.json
    notes: >
      Runtime-surface boundaries (background_job, execution_context,
      environment_capsule, subscription_envelope, vfs_save_envelope,
      reconnect-decision records, etc.). Also hosts the browser-
      runtime-session and preview-route boundaries every browser-
      runtime-aware surface (live preview lane, browser companion
      handoff, inspection add-on, console / network / storage viewer,
      request-replay packet, live-style-edit packet, service-worker-
      change packet, support / export reader, hosted-review reader,
      AI tool review surface) cites: the browser_runtime_session
      schema freezes the one shape every such surface emits when it
      needs one stable answer to runtime identity, cross-origin /
      storage mutation admissibility, inspection lifecycle (live,
      imported, replayed, paused, blocked), and the bound preview
      route; the preview_route schema freezes the time-bounded,
      auditable route record (service identity, mapped port / route,
      target context, actor, duration, expiry, revoke posture, policy
      scope, share posture) every preview-route emitter projects.
      The resource_target, drift_summary, and live_action_envelope
      schemas freeze resource identity, source/rendered/live drift
      honesty, and operational action envelopes so manifest,
      resource-explorer, incident, runbook, support, CLI, and browser-
      handoff surfaces do not collapse desired source, rendered output,
      cached or imported evidence, provider overlays, and live mutation
      authority into one unlabeled runtime state.
      Re-exports the safe-preview trust-class, connectivity-state,
      and downgrade-trigger ladder from schemas/security/trust_class.
      schema.json and the workspace-trust state vocabulary from the
      identity family without redefinition; cites preview_snapshot_
      record_ref from schemas/preview/preview_snapshot.schema.json
      and execution_context_record_ref from schemas/runtime/execution
      _context.schema.json by reference. Reserves provenance fields
      for console, network, and storage evidence so later browser-
      inspection surfaces can attach to the same runtime session,
      route, and source-map truth without redefining core identity.
      Also hosts the container_session and devcontainer_profile
      boundaries every container-aware surface (terminal attach,
      task / test / debug runner bound to a container, devcontainer
      'reopen in container' lane, multi-service compose orchestrator,
      support / export reader, hosted-review reader, automation run
      review, AI tool review surface) cites: the container_session
      schema freezes the one shape every such surface emits when it
      needs one stable answer to engine identity, mount / writable-
      path / privilege / attach posture admissibility, multi-service
      topology and dependency-order labels (so API, queue, web-app,
      and database do not collapse into one opaque 'workspace
      started' state), and preflight result hooks for engine
      reachability, unsupported directives, port collisions, and
      mirror or auth prerequisites; the devcontainer_profile schema
      freezes the declared base image, declared features, lifecycle
      hooks, declared compose topology, declared remote user, mount
      declaration, capability declaration, declared unsupported
      directives, declared egress posture, and declared port forward
      fields every devcontainer-aware reader projects before a
      session is provisioned against it. Re-exports identity_mode
      and workspace_trust_state_class from the identity family,
      target_class / reachability_state from schemas/runtime/
      execution_context.schema.json, and cites preview_route_record
      _ref from schemas/runtime/preview_route.schema.json by
      reference.
      Also hosts the target_context, connector_session, and
      action_safety_review boundaries every live infrastructure,
      database, queue, preview, browser handoff, incident, support,
      CLI, runbook, automation, and AI action-review surface cites
      before it observes, previews, hands off, or mutates a live
      environment target. The target_context schema freezes explicit
      provider / account / subscription / project / region / cluster /
      namespace / runtime-host / target-scope identity, stale-context
      and mixed-authority states, and source-to-rendered-to-live
      resource relationship truth including no_source_match. The
      connector_session schema freezes local config, delegated
      identity, SSH or tunnel bridge, managed connector, browser
      handoff, and imported read-only evidence classes with typed
      downgrade and invalidation markers. The action_safety_review
      schema freezes inspect, dry-run, apply, restart, scale, delete,
      publish, and rollback review packets with target confirmation,
      approval posture, preview hashes, audit refs, and no-hidden-
      target-switch blocking.

  - family_id: scaffolding
    schema_home: schemas/scaffolding/
    publication_path_class: equal_to_schema_home
