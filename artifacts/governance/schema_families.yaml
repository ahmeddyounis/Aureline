# Schema-family registry.
#
# Canonical machine-readable register of every contract-bearing JSON
# directory under /schemas/**. Each row fixes five things so schemas
# stay a governed stack instead of per-directory ad-hoc conventions:
#
#   1. family_id         — stable dot id (usually the directory name).
#   2. schema_home       — authoritative directory containing the schemas.
#   3. publication_path  — where consumers read the family from. Equal to
#                          schema_home for most families; distinct when the
#                          family also publishes through a generated
#                          manifest, release-evidence bundle, or docs
#                          projection.
#   4. versioning_rule   — how version bumps, additive-minor changes, and
#                          breaking changes are expressed.
#   5. unknown_field_policy — additionalProperties posture. Governance /
#                             identity / security boundaries are strict;
#                             a family MAY carry a namespaced extension
#                             envelope or a property-bag convention only
#                             when the row declares it.
#   6. compatibility_owner — named surface owner (team / role / forum) who
#                            ratifies version bumps, new enum values, and
#                            cross-family crosswalks.
#
# Every schema under /schemas/** MUST belong to exactly one row here. A
# schema whose family row is missing is not ratified and may not be
# consumed by a validator or CI lane. Adding a new family row is
# additive-minor; repurposing an existing row's schema_home,
# publication_path, versioning_rule, unknown_field_policy, or
# compatibility_owner is breaking and requires a new decision row.
#
# Narrative companion: docs/governance/policy_flag_schema_stack.md.
# Standards-matrix binding:
# artifacts/governance/standards_matrix.yaml#standard.json_schema_2020_12
# and #standard.openapi_3_2.

schema_version: 1

stack_doc: docs/governance/policy_flag_schema_stack.md
standards_matrix_refs:
  - artifacts/governance/standards_matrix.yaml#standard.json_schema_2020_12
  - artifacts/governance/standards_matrix.yaml#standard.openapi_3_2

companion_registers:
  telemetry_and_support_registry: docs/governance/telemetry_and_support_schema_registry.md
  consent_ledger_seed: artifacts/governance/consent_ledger_seed.yaml
  record_class_registry: artifacts/governance/record_class_registry.yaml
  control_artifact_index: artifacts/governance/control_artifact_index.yaml
  feature_flag_provider_chain: artifacts/governance/feature_flag_provider_chain.yaml

# -----------------------------------------------------------------------------
# Cross-cutting conventions.
#
# Rules that apply to every family row. The row MAY cite these rules rather
# than re-describe them.
# -----------------------------------------------------------------------------
cross_cutting_conventions:
  json_schema_pin:
    keyword: $schema
    value: https://json-schema.org/draft/2020-12/schema
    rule: >
      Every schema file under /schemas/** MUST declare this keyword with
      this exact value. Narrowing is permitted; inventing custom keywords
      outside the JSON Schema vocabulary requires a deviation ADR that
      cites standards_matrix.yaml#standard.json_schema_2020_12.
  schema_id_pattern:
    form: https://aureline.dev/schemas/<family>/<name>.schema.json
    rule: >
      The $id URL does NOT carry a version segment. Schemas track
      version in a document-level const field (usually
      <name>_schema_version or a root schema_version property).
  additive_minor_rule: >
    Adding a new enum value, a new optional property, or a new additive
    sub-record is additive-minor and bumps the relevant
    <name>_schema_version const. Removing or repurposing an existing
    value is breaking and requires a new decision row.
  unknown_field_default: additional_properties_false_strict
  publication_discipline: >
    Consumers read from the publication_path, not directly from the
    git checkout. For most families publication_path equals schema_home.
    Families that project through a generated manifest or release bundle
    name the projection explicitly.
  service_api_description_rule: >
    When a family publishes a service HTTP surface, the description
    document is an OpenAPI 3.2+ document placed alongside the family's
    JSON Schemas. The row's notes name the OpenAPI file.

# -----------------------------------------------------------------------------
# Vocabularies.
# -----------------------------------------------------------------------------

versioning_rule_classes:
  - document_const_schema_version_bump_on_breaking
  - document_const_schema_version_bump_on_additive_minor
  - inherited_from_parent_packet_header
  - single_record_no_version_field
  - generated_artifact_versioning_follows_generator

unknown_field_policy_classes:
  - additional_properties_false_strict
  - additional_properties_false_strict_with_namespaced_extension_envelope
  - additional_properties_false_strict_with_property_bag
  - additional_properties_true_explicit_reason

publication_path_classes:
  - equal_to_schema_home
  - generated_manifest_projection
  - release_evidence_bundle_projection
  - docs_projection_only
  - inlined_in_parent_packet

compatibility_role_vocabulary:
  - governance_and_policy
  - identity_and_auth
  - security_trust
  - runtime_surface
  - ux_surface
  - docs_public_truth
  - automation_and_cli
  - telemetry_and_support
  - release_evidence
  - extensions
  - benchmark_lab

# -----------------------------------------------------------------------------
# Gates.
# -----------------------------------------------------------------------------

gates:
  - >
    Every file under /schemas/** MUST be accounted for by exactly one
    family row whose schema_home contains it. Reviewers check this before
    admitting a new schema directory.
  - >
    Changing a family row's versioning_rule or unknown_field_policy is
    breaking and requires a new decision row. New family rows are
    additive-minor.
  - >
    A family MAY declare a narrower unknown_field_policy than the
    cross-cutting default, but MAY NOT declare a looser one without
    citing the reason (the extension_envelope or property_bag namespace
    MUST be named in notes).
  - >
    A family that publishes a service HTTP description MUST name the
    OpenAPI file in notes and cite
    standards_matrix.yaml#standard.openapi_3_2 in its row.
  - >
    Retiring a family is not a delete; set the row's
    lifecycle_state to retired and record the supersede note. The audit
    trail "this posture once applied" survives.

# -----------------------------------------------------------------------------
# Family rows.
#
# Row order follows the directory listing under /schemas/. New directories
# land as new rows; they do not displace existing rows.
# -----------------------------------------------------------------------------

rows:
  - family_id: ai
    schema_home: schemas/ai/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/ai/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: runtime_surface
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/ai/context_assembly.schema.json
      - schemas/ai/evidence_packet.schema.json
      - schemas/ai/evidence_replay_packet.schema.json
      - schemas/ai/audit_storage_manifest.schema.json
      - schemas/ai/provider_registry.schema.json
      - schemas/ai/model_registry.schema.json
      - schemas/ai/external_tool_registry.schema.json
      - schemas/ai/prompt_composer_plan.schema.json
      - schemas/ai/request_workspace.schema.json
      - schemas/ai/prompt_tool_pack_manifest.schema.json
      - schemas/ai/graduation_packet.schema.json
      - schemas/ai/memory_object.schema.json
      - schemas/ai/deferred_intent_outbox.schema.json
    notes: >
      AI context-assembly, evidence-packet, replayability, audit-
      storage manifest, and provider / model / local-model-pack /
      external-tool registry boundary for the provider stack. The
      three registry schemas (provider_registry, model_registry,
      external_tool_registry) freeze the governed rows local, BYOK,
      enterprise-gateway, and vendor-hosted routes emit the same
      identity spine against, and the tainted-by-default invariant
      every external-tool (stdio / local-HTTP / remote-HTTP / MCP)
      return carries through downstream dispatch. The memory_object
      and deferred_intent_outbox schemas freeze the seven-class AI
      memory matrix, the invalidation-trigger / outcome vocabulary,
      the per-class delete / export shapes, and the eight-state
      deferred-intent reconciliation vocabulary so AI memory does not
      become a hidden retention layer. Adding a new record class is
      additive-minor and bumps the per-record schema_version const.

  - family_id: auth
    schema_home: schemas/auth/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/auth/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: identity_and_auth
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas: []
    notes: >
      Authentication-surface boundary; coordinates with the identity
      family for policy-bundle and entitlement crosswalks.

  - family_id: automation
    schema_home: schemas/automation/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/automation/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: automation_and_cli
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/automation/cli_output_registry_entry.schema.json
      - schemas/automation/recipe_manifest.schema.json
      - schemas/automation/run_record.schema.json
    notes: >
      Automation and CLI-surface schemas. Covers the CLI / headless
      machine-output registry entry, the recorded-macro / declarative-
      recipe manifest contract, and the recipe / macro run-record
      contract. Any future CLI HTTP surface is described via OpenAPI
      3.2+ co-located here.

  - family_id: benchmarks
    schema_home: schemas/benchmarks/
    publication_path_class: release_evidence_bundle_projection
    publication_path: artifacts/benchmarks/
