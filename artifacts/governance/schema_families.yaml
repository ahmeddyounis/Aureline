      action vocabularies by value while keeping this local artifact
      boundary strict. Adding a new source layer, safe-default trigger,
      active-state value, refresh-result value, decision class, or export
      data class is additive-minor and bumps the relevant schema version;
      repurposing a value or allowing policy to act like an ordinary user
      preference is breaking.

