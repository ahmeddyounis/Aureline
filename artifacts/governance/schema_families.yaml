  - family_id: commands
    schema_home: schemas/commands/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/commands/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: runtime_surface
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/commands/command_descriptor.schema.json
      - schemas/commands/invocation_session_packet.schema.json
      - schemas/commands/diagnostic_projection.schema.json
      - schemas/commands/command_registry_entry.schema.json
      - schemas/commands/shareability_metadata.schema.json
      - schemas/commands/palette_result.schema.json
      - schemas/commands/palette_action_footer.schema.json
      - schemas/commands/leader_overlay.schema.json
      - schemas/commands/menu_item.schema.json
    notes: >
      Command-dispatch boundary contracts (see ADR-0016). New command
      classes are additive-minor. The diagnostic_projection schema
      freezes the command_diagnostic_row_record, protected_entry_
      badge_record, and remediation_projection_record shapes every
      palette, menu, keybinding editor / help, CLI help, AI-tool,
      docs reference, about / service-health, diagnostics panel,
      and support-export surface reads; it re-exports authority
      class, capability scope, preview, approval posture, disabled-
      reason, docs-help anchor, shortcut narration, lifecycle /
      support / channel / freshness / client-scope / redaction, and
      provider actor class vocabularies without redefinition. The
      command_registry_entry and shareability_metadata schemas publish
      canonical discoverability, badge, current-shortcut, copy-form,
      CLI/headless, automation-safety, and why-unavailable metadata.
      The palette_result and palette_action_footer schemas freeze the
      command-palette row and selected-row action-footer projections so
      palette, docs/help, settings, keybinding help, automation, and
      support surfaces render from one command source record. The
      leader_overlay schema freezes modal-state cues, sequence-help
      rows, leader overlays, shortcut-teaching rows, and colon-style
      command parity over the same command graph. The menu_item schema
      freezes application-menu, context-menu, inline-toolbar,
      command-bar, and overflow-menu row projections so compact pointer
      surfaces keep the same command id, label, shortcut hint,
      disabled reason, target-freshness, provider disclosure, and
      destructive grouping rules as the palette and diagnostics
      projections.

  - family_id: collaboration
    schema_home: schemas/collaboration/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/collaboration/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: runtime_surface
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/collaboration/session_state.schema.json
      - schemas/collaboration/shared_object.schema.json
      - schemas/collaboration/session_policy_manifest.schema.json
      - schemas/collaboration/follow_and_presenter_state.schema.json
      - schemas/collaboration/control_grant.schema.json
    notes: >
      Collaboration session-lifecycle, shared-object authority,
      and downgrade boundary. session_state.schema.json freezes
      the seven-state collaboration_session_state_class
      vocabulary (solo, publish_pending, shared_active,
      participant_degraded, shared_degraded, ended, archived),
      the admitted-transition matrix, the four-class
      downgrade-kind vocabulary (viewer_fallback_applied,
      relay_degradation_applied, anchor_target_drift_detected,
      archive_sealing_initiated), the local-work preservation
      and recovery-path vocabularies, and the per-class sealed-
      archive inventory. shared_object.schema.json freezes the
      six-class shared-object vocabulary (editor_buffer,
      anchored_comment, follow_or_presenter_state,
      shared_terminal_control_metadata,
      shared_debug_control_metadata, sealed_session_archive),
      the authority / durability / export-posture vocabularies,
      and the anchor-drift vocabulary that forbids silent
      relocation. session_policy_manifest.schema.json freezes
      the four-mode retention vocabulary (live_only_no_retention,
      metadata_audited_no_payload_retention, replayable_review_
      or_teaching, support_or_regulated_retention_with_hold_
      eligibility), the seven-profile role-matrix vocabulary,
      the five-value guest-policy vocabulary, the four-value
      route-share vocabulary, the five-value residency-scope
      vocabulary, the five-value redaction-profile vocabulary,
      the four-value audit-level vocabulary, the seven-value
      retention-posture vocabulary, the six-value export-posture
      vocabulary, the six-value delete-posture vocabulary (with
      the deletion_completed_but_exported_local_copy_surviving
      honest-disclosure row), the six-value visible-consent-cue
      vocabulary, the fourteen-value mid-session re-consent
      trigger vocabulary, the opt-in rule for shared terminal
      and shared debugger retention, and the bound record-class
      id ref into artifacts/governance/record_class_registry.yaml.
      follow_and_presenter_state.schema.json freezes the six-
      value follow-mode vocabulary, the six-value follow-target-
      kind vocabulary, the four-value presenter-role vocabulary,
      the four-value focus-broadcast posture vocabulary, the
      six-value presenter-handoff vocabulary, and the four-value
      degraded-follow vocabulary where no value admits hidden
      input injection. control_grant.schema.json freezes the
      eight-value control-grant lane vocabulary (terminal_lane,
      debug_lane, runbook_lane, notebook_kernel_lane, build_task_
      lane, editor_buffer_lane, review_comment_lane, presenter_
      focus_lane), the four-value grant-scope vocabulary, the
      four-value duration vocabulary, the four-value authority-
      ceiling vocabulary, the closed per-lane allowed-action
