  - family_id: work_items
    schema_home: schemas/work_items/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/work_items/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: docs_public_truth
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/work_items/work_item_detail.schema.json
      - schemas/work_items/status_transition_packet.schema.json
      - schemas/work_items/offline_handoff_packet.schema.json
    notes: >
      Work-item detail header, status-transition packet, and
      offline-handoff packet boundary (see docs/work_items/work_
      item_contract.md). Composes with (and does not replace)
      the provider-mode / callback-envelope / publish-later
      contract in docs/providers/provider_mode_contract.md
      (mutation modes, surface classes, provider_actor_class,
      redaction_class, replay_posture, predicted_side_effect_
      class, irreversibility_class, conflict_policy_class,
      mode_admission_reason, queue_state, provider_callback_
      envelope_record, publish_later_queue_item_record,
      provider_consequence_preview_record, account_mapping_
      binding_record, provider_object_relation_record), the
      review-workspace / review-pack / change-stack contracts
      in docs/vcs/ (review_workspace_record, review_anchor_
      record, merge_queue_action_record, review_pack_record,
      review_evaluation_result_record, change_object_record,
      patch_stack_record), and the object-handoff packet in
      docs/support/object_handoff_packet.md (object_handoff_
      packet_record). work_item_detail.schema.json freezes the
      seven-value work_item_authority_class vocabulary
      (provider_authoritative_synced, provider_authoritative_
      stale_local_continues, local_draft_no_provider_object,
      queued_publish_local_authored, linked_review_only_no_
      provider_overlay, imported_handoff_evidence_only,
      cached_read_only_shadow_inspect_only), the six-value
      freshness_class vocabulary (live_authoritative_fresh,
      warm_within_grace, degraded_beyond_grace_local_
      continues, unverifiable_provider_unreachable, imported_
      snapshot_no_refresh_path, local_draft_never_published),
      the eleven-value write_authority_class vocabulary, the
      five-axis engineering_artifact_relations block (issue_
      to_branch_link_class six values, linked_review_class
      seven values, change_intent_class seven values,
      validation_evidence_class eight values, publish_
      preview_class five values), and the matched audit-event
      and denial-reason vocabularies under allOf gates that
      pair authority class with the matching engineering-
      artifact ref (imported_handoff_evidence_only ↔ linked_
      offline_handoff_packet_record_id_ref, queued_publish_
      local_authored ↔ linked_publish_later_queue_item_
      record_id_ref, linked_review_only_no_provider_overlay
      ↔ linked_review_workspace_record_id_ref or linked_
      review_pack_record_id_ref) and pair freshness lanes
      (local_draft_never_published, imported_snapshot_no_
      refresh_path) with the matching authority class.
      status_transition_packet.schema.json freezes the
      seventeen-value transition_kind_class vocabulary, the
      six-value transition_action_class vocabulary, the nine-
      value notification_side_effect_class vocabulary, the
      ten-value permission_scope_class vocabulary, the
      twelve-value transition_admissibility_class vocabulary,
      and the seventeen-value linked_artifact_change_class
      vocabulary under allOf gates that force mutation_mode
      = local_draft and inspect_only to forbid provider-bound
      apply refs (denies with silent_provider_mutation_under
      _local_draft_label_forbidden), force mutation_mode =
      publish_now / deferred_publish / open_in_provider to
      cite their matching apply refs, and force per-entry
      route_through_browser_handoff_open_in_provider /
      queue_for_publish_later_deferred / captured_offline_
      pending_drain to cite their matching apply refs.
      offline_handoff_packet.schema.json freezes the twelve-
      value handoff_admission_reason_class vocabulary, the
      five-value handoff_provider_acceptance_class vocabulary
      (defaulting to not_submitted_local_capture_only), the
      eight-value handoff_export_route_class vocabulary, the
      ten-value handoff_retry_route_class vocabulary, and
      the eight-value handoff_drain_state_class vocabulary
      under allOf gates that force imported_from_*
      admission to resolve provider-acceptance to evidence-
      only and retry-route to no_retry_imported_evidence_
      only, force provider_accept_confirmed_publish_later_
      drained to cite a non-empty provider-callback envelope
      ref list (denies with captured_handoff_must_not_
      advance_to_accepted_without_callback_envelope), and
      force provider_accept_rejected_with_typed_reason to
      cite a typed denial reason. Re-exports mutation_mode,
      provider_actor_class, predicted_side_effect_class,
      irreversibility_class, conflict_policy_class, mode_
      admission_reason, queue_state, surface_class, and
      relation_class from the publish-later contract;
      redaction_class from ADR-0010 / ADR-0007 without
      redefinition. Adding a new record_kind, work_item
      _authority_class, freshness_class, state_value_origin
      _class, write_authority_class, issue_to_branch_link
      _class, linked_review_class, change_intent_class,
      validation_evidence_class, publish_preview_class,
      transition_kind_class, transition_action_class,
      notification_side_effect_class, permission_scope_class,
      transition_admissibility_class, linked_artifact_change
      _class, handoff_admission_reason_class, handoff_
      provider_acceptance_class, handoff_export_route_class,
      handoff_retry_route_class, handoff_drain_state_class,
      denial_reason, or audit_event_id is additive-minor and
      bumps the per-record schema_version const; repurposing
      an existing value is breaking and requires a new
      decision row. Implementing issue-provider adapters is
      out of scope at this revision.

  - family_id: workspace
    schema_home: schemas/workspace/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/workspace/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: runtime_surface
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/workspace/entry_and_restore_result.schema.json
      - schemas/workspace/entry_route.schema.json
      - schemas/workspace/source_locator.schema.json
      - schemas/workspace/checkout_plan.schema.json
      - schemas/workspace/bootstrap_queue_item.schema.json
      - schemas/workspace/bootstrap_packet.schema.json
      - schemas/workspace/pane_tree.schema.json
      - schemas/workspace/mutation_journal.schema.json
      - schemas/workspace/workset_artifact.schema.json
      - schemas/workspace/repo_topology_state.schema.json
      - schemas/workspace/object_availability_state.schema.json
    notes: >
      Workspace-trust, source-acquisition, bootstrap-packet,
      entry/restore, workspace-layout, mutation-lineage, and
      workset-artifact / repository-topology boundary (see ADR-0018,
      docs/workspace/source_acquisition_and_bootstrap_seed.md, and
      docs/workspace/repository_topology_edge_case_contract.md).
