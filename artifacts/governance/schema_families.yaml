      role: benchmark_lab
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/qe/public_proof_packet.schema.json
    notes: >
      Public-proof scoreboard boundary. The public_proof_packet schema
      freezes the one shape every launch-wedge cutline emits through
      the seven scoreboard families registered in
      artifacts/qe/workflow_bundle_ids.yaml (bootstrap-and-entry
      parity, migration fidelity, task / run / test / debug parity,
      extension or package bridge parity, workflow-bundle or
      archetype proof, benchmark / public-proof, docs / known-limits
      / support-copy alignment). Pairs 1:1 with versioned workflow-
      bundle and archetype ids so benchmark, compatibility,
      migration, docs, and support evidence share identity without
      renaming. Re-exports the downgrade-trigger, support-class, and
      publication-destination vocabularies from the release and
      governance families rather than minting parallel values.

