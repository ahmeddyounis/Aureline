      - schemas/ux/status_strip.schema.json
      - schemas/ux/placeholder_state.schema.json
      - schemas/ux/tree_row.schema.json
      - schemas/ux/table_view_state.schema.json
    notes: >
      UX payload and accessibility-tree boundary. history_row.schema.json
      freezes the chronology primitives (history_row_record,
      timeline_group_record, narrative_summary_card_record, and
      chronology_export_preview_record) so every surface — AI evidence,
      task events, policy blocks, provider sync, publish/revoke,
      restore/recovery, and support/export previews — reads one
      structured row shape, one set of stable verbs, one time-zone
      presentation policy, and one export-preview shape rather than
      inventing per-subsystem history fields. transient_surface.schema.json
      freezes the transient-preview primitives (transient_preview_record,
      preview_escalation_rule_record, and pinned_preview_record) so
      tooltip, hovercard, popover, and peek surfaces across editor,
      docs / help, AI apply, review-and-diff, palette / search,
      provider-bearing, policy-resolver, and support / export lanes
      read one structured preview shape, one content-consequence
      ladder, one freshness / stale / mapping-quality model, one
      keyboard-route and touch-fallback rule, and one pinning /
      promotion rule that preserves canonical object identity,
      provider attribution, freshness cues, and AI-confidence
      disclosure across the transient-to-durable transition.
      overlay_stack.schema.json freezes the shell-wide overlay stack
      contract for layer tokens, portal boundaries, scrims, focus traps,
      dismissal/back-stack order, allowed nesting, stale preview
      promotion, missing-provider fallback, boundary-change banners,
      multi-window focus locality, keyboard parity, accessibility zoom,
      and the rule that transient surfaces cannot be the sole route to
      complete critical actions.
      teaching_surface.schema.json freezes contextual tip cards,
      migration bridge cards, why-unavailable explainers, and
      source-language fallback surfaces so in-context teaching
      preserves concrete command / docs / source refs, owning
      boundary, dismissal / snooze / quiet-hours behavior,
      presentation-mode deferral, imported-behavior state, and
      trust / policy / write-scope review instead of inventing
      local teaching payloads.
      notification_event.schema.json freezes the high-level
      notification-event contract for toast, banner, activity-center
      row, digest-group, and system-notification surfaces so every
      notification carries one canonical_event_id, one event-lineage
      ref, one actor/source, age, expiry, next-action, visibility-
      scope, badge-count policy, quiet-hours posture, cross-window
      rule, and exact-reopen target before lower-level delivery
      envelopes route it.
      control_state.schema.json freezes the reusable core-control
      family boundary for buttons, split buttons, checkboxes, radios,
      toggles, text inputs, selects, comboboxes, segmented controls,
      and form-level submit / review actions so settings, onboarding,
      install review, admin, package, migration, request / runtime,
      and command surfaces share one size, density, focus,
      actionability, disabled, locked, read-only, busy, pending,
      destructive, value-source, live-vs-staged, optimistic-update,
      keyboard, accessibility, and support-handoff vocabulary before
      family-specific packets add anatomy.
      output_viewer_object.schema.json freezes the one shape every
      task-output pane, shell scrollback, log viewer, result grid,
      notebook cell output area, test / build dashboard, diagnostic
      stream, and artifact preview surface emits so no viewer invents
      a local size badge, local freeze / autoscroll wording, local
      truncated label, local active-content block reason, or local
      copy / export scope story. Composes with live_set_state by
      reference for live-stream origins, re-exports trust_class /
      connectivity_state from the security family, execution_context
      _record_ref from the runtime family, preview_snapshot by
      reference from the preview family, and artifact_origin_class /
      provenance_state / default_edit_posture from the generated-
      artifact family without redefinition.
      form_probe_state.schema.json and staged_review_state.schema.json
      freeze the cross-surface form-validation and staged-review
      boundary so settings, connection setup, package actions, policy
      edits, repair actions, network / transport forms, request /
      runtime forms, and secret-bearing or external-target validation
      flows share one vocabulary for sync validation, async probes,
      probe source / target / scope / safety attribution, freshness,
      stale and skipped admission, lock / policy explanation,
      mutation-blocking tiers, apply timing, and support / issue
      handoff evidence instead of inventing per-surface validation
      badges. field_rule.schema.json freezes the per-field high-risk
      behavior used by those form rows and adjacent inspectors so
      secret handles, raw secret input, filesystem paths, endpoints,
      evaluated expressions, command templates, environment refs,
      certificate refs, and provider/resource ids share one evaluation-
      context, warning, paste/drop, duplicate, normalization,
      redaction, and export contract. editor_group_state.schema.json
      freezes tab, editor-group, dirty-state, restored/generated,
      live-preview, missing-dependency placeholder, overflow, close-
      affordance, identity-preserving transition, and compare fallback
      vocabulary so shell, restore, support export, diff, notebook, and
      generated-artifact surfaces do not mint local working-set state.
      editor_layer.schema.json freezes the editor anatomy boundary for
      document header, context layer, gutter, text viewport, inline
      assist, transient knowledge, and status layer ownership so
      renderer, shell, language, review, restore, generated-artifact,
      live-preview, accessibility, and support/export consumers share
      one accessory classification, one stable-text-column rule, and
      one large-file/degraded layer downgrade vocabulary.
      splitter_state.schema.json freezes splitter hit-target,
      keyboard-resize, no-silent-collapse, recovery-affordance, and
      proportional or preset-based persistence vocabulary so shell,
      renderer, accessibility, restore, and support surfaces do not
      invent local resizable-pane behavior.
      status_strip.schema.json freezes the top-of-surface status-strip
      and readiness-banner family so workspace, environment, provider,
      graph, and framework surfaces share one seven-value readiness
      vocabulary, one scope/count/action/details anatomy, one hidden-
      scope and partial/stale disclosure model, one export/screenshot-
      safe rule set, and typed variant blocks that reference deeper
      owner records instead of renaming state locally.
      tree_row.schema.json freezes the structural tree row and
      tree-view interaction family so file, outline, schema, package,
      component/runtime, route, dependency, write-scope preview, and
      support/export trees share row anatomy, disclosure, lazy
      hydration, keyboard navigation, active/current/selected/open
      state, virtualization counts, batch selection, drag or move
      posture, inline/deferred action exposure, provider fallback,
      hidden-scope disclosure, and identity recovery instead of
      inventing per-surface hierarchy behavior.
      table_view_state.schema.json freezes the table and grid view
      state family so review queues, result grids, schema explorers,
      support tables, admin grids, evidence tables, and variable tables
      share column presets, hidden and frozen columns, sort/filter
      basis, virtualization posture, stable range anchors, row-scope
      counts, cell truth cues, row-vs-cell action separation,
      accessibility requirements, and copy/export semantics instead of
      inventing local table-grid vocabulary.

