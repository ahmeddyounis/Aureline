      - schemas/service/api_capability_row.schema.json
    notes: >
      Managed-service SLO, retention, deletion-semantics, and
      optional-service API-capability boundary. Pairs with
      artifacts/service/slo_rows.yaml,
      artifacts/service/retention_rows.yaml, and
      artifacts/service/api_surface_rows.yaml, and narrows per-class
      posture from artifacts/governance/record_class_registry.yaml.
      The deletion_job_record schema carries typed deletion_job_state,
      deletion_blocker_class, remaining_location_notes, and
      expected_next_state_change_at fields so delete requests stay
      inspectable rather than surfaced as ad hoc support copy. The
      api_capability_row schema freezes the row shape (auth_mode,
      data_classes, local_fallback_posture, versioning, deprecation
      lane, offline-and-cache posture) consumed by openapi/
      service_api_seed.yaml — the seed OpenAPI 3.2-oriented document
      that publishes the optional-service HTTP surfaces; the service
      family therefore also cites
      artifacts/governance/standards_matrix.yaml#standard.openapi_3_2.
      Raw payload bytes never cross this boundary.

