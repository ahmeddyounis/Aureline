    notes: >
      Navigation-continuity boundary. The navigation_artifacts
      schema freezes the durable navigation artifacts every editor,
      docs, notebook, review, graph, AI, search, terminal-zone,
      output-viewer, and support-export surface reads when restoring
      back / forward, recent location, breadcrumb, outline, bookmark
      / mark, or peek context: navigation_breadcrumb_trail_record,
      navigation_outline_snapshot_record, navigation_bookmark_record
      (with the six-value bookmark_drift_state machine — bound,
      remapped, drifted, missing_target, scope_unavailable, archived
      — and the five-value bookmark_drift_required_user_action
      vocabulary so a downstream surface that re-renders a missing
      or drifted bookmark as bound denies with bookmark_drift_state_
      required_action_mismatch), navigation_history_entry_record
      (one back / forward / recent-locations entry shape across
      surfaces), navigation_peek_context_record (peek-without-jump
      with promote-to-jump), and navigation_artifact_audit_event_
      record. Re-exports surface_class, freshness_class, client_
      scope, and redaction_class from the search-result-truth and
      capability-lifecycle families without redefinition. Pairs
      with the saved-query bundle / search-collection-snapshot
      schema in the search family for the durable search-side of
      the same contract. The breadcrumb_segment schema freezes the
      renderer-facing breadcrumb projection over that durable trail:
      mode, segment anatomy, overflow, current-leaf emphasis,
      keyboard reachability, command-backed actions, source refs,
      stale / unavailable disclosure, and cursor-driven symbol update
      policy. Adding a new navigation_target_kind,
      breadcrumb_segment_class, outline_node_class, bookmark_drift_
      state, bookmark_kind_class, navigation_history_origin_class /
      direction_class, peek_projection_class, navigation_artifact_
      denial_reason, or navigation_artifact_audit_event_id is
      additive-minor and bumps navigation_artifacts_schema_version;
      adding a breadcrumb projection enum value is additive-minor and
      bumps breadcrumb_segment_schema_version; repurposing an existing
      value is breaking and requires a new decision row.

