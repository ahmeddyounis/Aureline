      Template-manifest, scaffold-run, and generated-project
      lineage boundary (see docs/scaffolding/template_and_
      scaffold_contract.md). template_manifest.schema.json
      freezes the template_manifest_record (fourteen-value
      template_archetype_class, seventeen-value supported_
      ecosystem_class, fourteen-value supported_platform_class,
      nine-value required_parameter_kind_class, fourteen-value
      generated_file_class, ten-value declared_hook_class,
      twelve-value declared_setup_task_class, six-value
      template_trust_posture_class, six-value template_egress_
      posture_class, six-value template_known_issue_class,
      seven-value template_reopen_preflight_class, six-value
      delete_generated_output_recovery_route_class) under allOf
      gates that force community / uncertified template_source_
      class to cite a non-null signer_continuity_class, force
      ai_tool_proposed_pending_review lifecycle to set the
      matching trust posture and leave admitted_at null, force
      managed_cloud_required runtime scope to include managed_
      workspace_remote_target in supported_platform_class_set,
      force restricted_mode_tolerated_read_only_only trust
      posture to resolve every declared hook's automation_
      capability_class to read_only_workspace_inspection, force
      generated_only_artifact_back_linked_to_canonical_source
      rows to cite a non-null back-link ref and force the
      manifest to cite linked_structured_artifact_review_ref,
      force script_or_executable_file_invoked_under_declared_
      hook to cite a non-null invoked_under_declared_hook_id_ref,
      and force post_create_invoke_declarative_recipe / post_
      create_invoke_recorded_macro_ui_state_replay_only hook
      classes to cite the matching non-null recipe / macro
      manifest ref. scaffold_run.schema.json freezes the
      scaffold_run_record (fifteen-value scaffold_run_outcome_
      class, four-value scaffold_dry_run_posture_class, seven-
      value dispatched_by_actor_class, seventeen-value denial_
      reason_class) and the generated_project_lineage_record
      (ten-value generated_project_lineage_state_class, ten-
      value generated_project_update_or_rebase_state_class,
      seven-value template_reopen_preflight_class) under allOf
      gates that force every invoked hook id and every invoked
      setup-task id to resolve through the manifest's declared
      rows (otherwise denying with undeclared_hook_or_setup_
      task_must_not_run), force file-producing outcomes to cite
      a non-null applied_at, a non-null delete_generated_
      output_recovery_route_ref + class, and a non-null
      created_workspace_lineage_record_ref, force rolled-back
      outcomes to cite a non-null rollback_checkpoint_ref,
      force scaffold_dry_run_posture_class = dry_run_required_
      before_apply paired with applied / rolled-back outcomes
      to cite a non-null dry_run_preview_ref, force ai_tool_
      proposed_run_pending_admission to cite a non-null review
      ticket ref and leave applied_at null, force linked /
      drifted / rebased lineage states to cite a non-null
      bound_template_revision_ref while unlinked / forked /
      lineage-unknown / AI-proposed-relink states leave it null,
      force lineage_unknown_imported_without_lineage_packet to
      resolve template_reopen_preflight_class to the matching
      unknown class, force in_sync / update_available_* update
      states to pair with linked / linked-with-overrides /
      rebased lineage states, and force ai_tool_proposed_
      relink_pending_review to leave relinked_at null. Re-
      exports template_source_class, support_class, runtime_
      and_toolchain_scope, declared_freshness_class, starter_
      setup_cost_class, template_health_check_class, template_
      health_signal_class, post_create_handoff_axis, and
      bypass_path_id from docs/ux/template_and_prebuild_
      contract.md; automation_capability_class, trust_gate_
      class, policy_gate_class, approval_posture_class, dry_
      run_posture_class, signature_class, and redaction_class
      from schemas/automation/recipe_manifest.schema.json;
      generated_file_origin_class from docs/config/artifact_
      format_and_migration_policy.md; and lineage_packet_
      export_posture_class from the recipe / macro contract
      export-posture vocabulary without redefinition. Adding a
      new template_archetype_class, supported_ecosystem_class,
      supported_platform_class, required_parameter_kind_class,
      generated_file_class, declared_hook_class, declared_
      setup_task_class, template_trust_posture_class, template
      _egress_posture_class, template_known_issue_class,
      template_reopen_preflight_class, scaffold_run_outcome_
      class, scaffold_dry_run_posture_class, dispatched_by_
      actor_class, denial_reason_class, generated_project_
      lineage_state_class, generated_project_update_or_rebase_
      state_class, or delete_generated_output_recovery_route_
      class is additive-minor and bumps the per-record schema_
      version const; repurposing an existing value is breaking
      and requires a new decision row.

  - family_id: search
    schema_home: schemas/search/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/search/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: runtime_surface
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/search/saved_query_bundle.schema.json
      - schemas/search/quick_open_result.schema.json
      - schemas/search/quick_open_explanation.schema.json
    notes: >
      Search-readiness and result-truth boundary (see ADR-0014).
      The quick_open_result and quick_open_explanation schemas freeze
      the quick-open session / result-row projection and same-surface
      explanation records that keep source lane, readiness banner,
      hidden-result count, policy / provider limit count, target truth,
      host cue, preselection, keyboard navigation, and focus-return
      behavior inspectable from quick open while composing with the
      search-result, planner-fusion, command-palette, and navigation
      contracts rather than minting a private quick-open truth model.
      The saved_query_bundle schema freezes the
      saved_query_bundle_record (a curated collection of
      saved_query_record / scope_binding_record / search_deep_link
      _binding_record entries shipped with one source-class label,
      one share-policy class, one provider-backing class, one
      sensitive-literal handling class, and one retention class so
      reopen / export / share decisions resolve against the
      bundle, not against per-record opinions), the search_
      collection_snapshot_record (a captured planner-pass-pinned
      view of what a saved query / bundle resolved to so reopen /
      export / parity surfaces can compare current versus
      captured scope honestly), and the saved_query_bundle_audit_
      event_record. allOf gates force user_authored_local source
      to resolve to local_only_no_share share + local_by_default_
      no_remote_retention retention; support_export_captured
      source to resolve to support_export_redacted_only share +
      literal_redacted_at_boundary_default or literal_hashed_with
      _local_salt handling; managed_workspace_provisioned source
      to resolve to managed_admin_published_read_only_no_export
      share + managed_provider_retention_locked retention; every
      search_collection_snapshot_record to cite at minimum
      snapshot_includes_planner_pass_ref plus snapshot_includes_
      hidden_result_count_disclosure; and reopen attempts to
      resolve exactly one reopen_honesty_state from the ten-value
      vocabulary so a reopened query that paints stale captured
      rows as the current authoritative result set denies with
      reopen_must_disclose_current_versus_captured_drift. Composes
      with the existing schemas/search/saved_query_and_scope_
      binding.schema.json (per-record family) and schemas/search/
      result_fusion_record.schema.json (planner-pass identity)
      without redeclaring their payload shape. Adding a new
      saved_query_source_class, saved_query_share_policy_class,
      saved_query_provider_backing_class, saved_query_sensitive_
      literal_handling_class, saved_query_retention_class,
      snapshot_export_field_class, reopen_honesty_state, saved_
      query_bundle_denial_reason, or saved_query_bundle_audit_
      event_id is additive-minor and bumps saved_query_bundle_
      schema_version; repurposing an existing value is breaking
      and requires a new decision row.

  - family_id: security
    schema_home: schemas/security/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/security/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: security_trust
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/security/advisory_card.schema.json
      - schemas/security/private_triage_workspace_packet.schema.json
      - schemas/security/manual_import_receipt.schema.json
      - schemas/security/break_glass_event.schema.json
      - schemas/security/audit_stream_record.schema.json
      - schemas/security/evidence_window.schema.json
    notes: >
      Security-boundary schemas (advisory_card, emergency_action_record,
      advisory_record, trust_class, secret_class_rows,
      manual_import_receipt, break_glass_event, audit_stream_record,
      evidence_window, etc.).
      Source of truth for narrowing_reason and emergency-disable
      vocabularies re-exported by the policy-decision explain schema.
      The advisory_card schema is the cross-surface projection for
      advisory cards, emergency banners, revocation notices, and
      disclosure links. It preserves advisory identity, copy-safe CVE /
      GHSA / Aureline advisory ids, severity, action-required and
      mitigation-complete states, affected-surface applies-to rows,
      exact-build and install-profile linkage, disclosure timing,
      public/private posture, acknowledgement/review state, local-only /
      managed / offline-mirror / manual-import notice behavior, linked
      rollback / revocation / support / export refs, supersedence, and
      resolved-versus-active history while reading source truth from
      advisory_record, emergency_action_record, revocation_record, and
      manual_import_receipt rather than re-keying them.
      The private_triage_workspace_packet schema is the cross-tool
      boundary for the monitored-contact intake packet: intake time,
      advisory-id aliases, affected build / artifact / install-profile /
      deployment-profile identity, current mitigation status,
      compensating-control state, break-glass state, disclosure
      posture, redaction posture, and linked advisory / emergency-
      action / revocation / postmortem refs; it pairs 1:1 with the
      incident_workspace_packet_record (evidence-capture companion)
      and shares identity vocabulary with
      schemas/security/advisory_record.schema.json rather than minting
      adapter-specific aliases. The manual_import_receipt schema is
      the cross-tool boundary for mirrored, manual, offline, and
      air-gapped emergency imports: operator identity, import path,
      source artifact and upstream chain, detached-signature
      verification envelope, observed signer continuity, freshness
      and validation on the receiving target, target scope, applied
      state, supersedence and expiry, follow-up obligations, and the
      metadata-chain stub that roots every receipt at one
      authoritative emergency_action_record or revocation_record; it
      re-exports signer_continuity_state_class,
      distribution_freshness_class, distribution_validation_state_class,
      and deadline_semantics_class from
      schemas/security/emergency_action_record.schema.json and
      deployment_profile_class / redaction_class / policy_context from
      schemas/security/advisory_record.schema.json rather than
      minting receipt-local duplicates. The break_glass_event schema
      is the cross-tool boundary for every admitted single-responder
      invocation of a high-risk action (channel freeze / resume,
      revocation / disable / kill-switch publication, emergency
      policy bundle publication, high-severity security publication);
      each row carries signing_quorum_action_ref,
      break_glass_profile_ref, invoking_actor envelope, admitted
      reason_class, urgency, affected scope, produced
      emergency_action_record / revocation_record refs, linked
      advisory / triage / incident / post-incident review refs,
      invoked_at / must_close_by (at most 24 h later) / closed_at,
      one of the five admitted lifecycle states, and the retrospective
      cosign block (profile ref plus cosigner account / role / forum
      refs); it re-exports urgency_class, deployment_profile_class,
      release_channel_class, security_subject_kind, and redaction_class
      from schemas/security/emergency_action_record.schema.json and
      schemas/security/advisory_record.schema.json rather than
      minting event-local duplicates. The audit_stream_record schema
      is the cross-tool boundary for security audit rows emitted by
      extension lifecycle, policy-bundle, workspace-trust, AI tool and
      apply, collaboration elevated-control, remote join/leave,
      advisory, emergency, and support-export surfaces; each row links
      actor, route, object, target context, decision, policy source,
      approval-ticket posture, threat refs, evidence refs, redaction
      class, export posture, and field-disposition rows. The
      evidence_window schema names current, reviewable, exportable,
      expired, redacted, and legally-retained states so support and
      advisory exports preserve the difference between blank fields,
