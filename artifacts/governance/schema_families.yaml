  - family_id: ux
    schema_home: schemas/ux/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/ux/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: ux_surface
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/ux/history_row.schema.json
      - schemas/ux/transient_surface.schema.json
      - schemas/ux/onboarding_portability_state.schema.json
      - schemas/ux/output_viewer_object.schema.json
      - schemas/ux/guided_surface_state.schema.json
    notes: >
      UX payload and accessibility-tree boundary. history_row.schema.json
      freezes the chronology primitives (history_row_record,
      timeline_group_record, narrative_summary_card_record, and
      chronology_export_preview_record) so every surface — AI evidence,
      task events, policy blocks, provider sync, publish/revoke,
      restore/recovery, and support/export previews — reads one
      structured row shape, one set of stable verbs, one time-zone
      presentation policy, and one export-preview shape rather than
      inventing per-subsystem history fields. transient_surface.schema.json
      freezes the transient-preview primitives (transient_preview_record,
      preview_escalation_rule_record, and pinned_preview_record) so
      tooltip, hovercard, popover, and peek surfaces across editor,
      docs / help, AI apply, review-and-diff, palette / search,
      provider-bearing, policy-resolver, and support / export lanes
      read one structured preview shape, one content-consequence
      ladder, one freshness / stale / mapping-quality model, one
      keyboard-route and touch-fallback rule, and one pinning /
      promotion rule that preserves canonical object identity,
      provider attribution, freshness cues, and AI-confidence
      disclosure across the transient-to-durable transition.
      output_viewer_object.schema.json freezes the one shape every
      task-output pane, shell scrollback, log viewer, result grid,
      notebook cell output area, test / build dashboard, diagnostic
      stream, and artifact preview surface emits so no viewer invents
      a local size badge, local freeze / autoscroll wording, local
      truncated label, local active-content block reason, or local
      copy / export scope story. Composes with live_set_state by
      reference for live-stream origins, re-exports trust_class /
      connectivity_state from the security family, execution_context
      _record_ref from the runtime family, preview_snapshot by
      reference from the preview family, and artifact_origin_class /
      provenance_state / default_edit_posture from the generated-
      artifact family without redefinition.

