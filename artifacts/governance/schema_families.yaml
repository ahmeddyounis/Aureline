      / ownership-policy / evaluation-result boundary (see docs/
      vcs/review_pack_contract.md), the change-object / worktree /
      patch-stack / sequence-editor boundary (see docs/vcs/change_
      stack_contract.md), plus the local-vs-provider truth, branch
      / worktree / history / stash boundary (see docs/vcs/git_
      state_and_worktree_contract.md).
      review_workspace.schema.json freezes the
      review_workspace_record (source class drawn from the
      five-value vocabulary local_branch_or_worktree, provider_
      overlay_fetched, review_bundle_imported, browser_handoff_
      token_source, composite_local_with_provider_overlay), the
      provider_overlay block (provider_class plus the four-value
      provider_overlay_freshness_class vocabulary), the
      provider_authority_class vocabulary (provider_authoritative,
      local_parity_estimate, local_truth_only_no_provider_overlay,
      imported_bundle_snapshot, browser_handoff_token_only), the
      five-value review_workspace_lifecycle_state vocabulary, the
      merge_queue_action_record (eight-value action class plus
      seven-value blocked-reason vocabulary, four-value provider_
      rule_snapshot_freshness_class, six-value lifecycle), and
      the matched audit-event-id and denial-reason vocabularies.
      review_anchor.schema.json freezes the review_anchor_record
      (seven-value anchor_target_kind, six-value anchor_drift_
      state paired through allOf with the five-value anchor_drift
      _required_user_action so silent retargeting and mismatched
      pairs deny, five-value local_vs_provider_freshness_class)
      and the matched audit-event-id and denial-reason
      vocabularies. Re-exports freshness_class / client_scope /
      redaction_class from schemas/governance/capability_lifecycle.
      schema.json, workspace_trust_state_class from the identity
      family, the connected-provider envelope from schemas/
      integration/browser_handoff_packet.schema.json, the
      structured-artifact review surface / artifact class
      vocabulary from schemas/review/review_surface_record.schema.
      json (with the line_oriented_source_artifact and line_
      oriented_compare_viewer values added on the anchor side
      to give plain source files a stable token), and the
      approval-ticket envelope from schemas/integration/approval
      _ticket.schema.json without redefinition. Pairs with the
      forthcoming hosted-review inbox contract and merge-policy
      contract through reserved hosted_review_inbox_record_id_
      ref and merge_policy_record_id_ref slots that become
      required non-null when those contracts land. Adding a new
      record_kind, source class, provider class, freshness
      class, authority class, lifecycle state, anchor target
      kind, drift state, required-action value, action class,
      blocked-reason value, denial reason, or audit-event id is
      additive-minor and bumps the per-record schema_version
      const; repurposing an existing value is breaking and
      requires a new decision row. review_pack.schema.json
      freezes the review_pack_record (six-value review_pack_class,
      four-value review_pack_lifecycle_state, twelve-value review
      _pack_check_class, five-value review_pack_check_enforcement_
      class, five-value ownership_rule_class, nine-value
      divergence_label_class, seven-value waiver_linkage_class,
      seven-value output_artifact_family_class) under allOf gates
      that pair enforced_blocking checks with no_waiver_admissible,
      enforced_blocking_unless_waived with one of the three
      waiver_required_* values, owner_supplied_pack with a non-
      empty ownership_rules list, ad_hoc_session_pack with a
      lifecycle limited to review_pack_drafting / review_pack_
      archived_tombstone, managed_admin_published_pack with a
      managed_admin_surface-only client_scopes set, and imported_
      from_bundle_pack with a non-null imported_bundle_envelope.
      review_evaluation_result.schema.json freezes the review_
      evaluation_result_record (six-value evaluation_source_class,
      six-value evaluation_lifecycle_state, ten-value parity_state
      _class, five-value evaluation_staleness_class, seven-value
      reuse_provenance_class), the review_evaluation_finding_
      record (seven-value check_outcome_class, eight-value
      ownership_outcome_class, five-value finding_severity_class),
      and the matched audit-event-id and denial-reason vocabulary
      that forbids the green_by_omission_forbidden_evaluation_must
      _be_explicit, evaluation_must_pin_running_build_identity,
      evaluation_must_pin_review_pack_id_ref, enforced_blocking_
      check_cannot_be_silently_skipped, enforced_blocking_check_
      cannot_be_silently_waived, check_enforcement_class_must_
      match_pack_declaration, divergence_label_must_match_
      evaluator_set, parity_state_must_match_workspace_overlay_
      freshness, reuse_must_pin_source_evaluator_provenance,
      required_output_artifact_family_missing, finding_outside_
      pack_scope, ownership_outcome_must_match_ownership_rule_
      class, policy_epoch_expired_re_evaluation_required, and
      workspace_trust_unset_or_restricted failure modes under
      allOf gates that force reused_from_* reuse-provenance
      classes to cite a non-null reused_from_record_id_ref plus
      reused_from_captured_build_identity_ref, force severity_
      blocker to pair with fail_blocking and vice versa, force
      skipped_waiver_admitted_active to cite a non-null waiver_
      record_id_ref, force ownership_outcome_class to be non-
      null when ownership_rule_id_ref is non-null and null
      otherwise, force completed / failed / cancelled / superseded
      results to cite a non-null completed_at, and force parity_
      match_all_evaluators_agree_* and parity_local_passes_ci_
      passes_provider_overlay_unavailable_local_continues to be
      produced only by local / CI / provider source classes.
      Both pack and result records reserve hosted_review_inbox_
      record_id_ref and merge_policy_record_id_ref forward-
      dependency slots that become required non-null when the
      hosted-review inbox contract and the merge-policy contract
      land. Adding a new record_kind, pack class, lifecycle state,
      check class, enforcement class, ownership-rule class,
      divergence-label class, waiver-linkage class, output-
      artifact-family class, evaluation-source class, evaluation-
      lifecycle state, check-outcome class, parity-state class,
      evaluation-staleness class, reuse-provenance class,
      ownership-outcome class, finding-severity class, denial
      reason, or audit-event id is additive-minor and bumps the
      per-record schema_version const. change_object.schema.json
      freezes the change_object_record (five-value change_object
      _class, five-value change_object_authorship_class, eight-
      value change_object_landing_state, seven-value worktree_
      lifecycle_state, five-value recovery_object_class, five-
      value conflict_handoff_class, four-value worktree_orphan_
      cleanup_class, six-value rollback_or_export_class) under
      allOf gates that pair authorship with class, force ai_
      branch_agent_envelope and imported_patch_bundle_envelope
      to be non-null only on the matching change-object class,
      force change_synthesized_during_history_edit to cite a
      non-null recovery_object, force abandoned_orphan_pending_
      cleanup to cite a worktree_orphan_cleanup_class, force
      cleanup_export_then_archive and cleanup_blocked_pending_
      export_for_handoff to cite a non-null exported_patch_
      stack_snapshot_ref, and force worktree_paused_pending_
      conflict to pair with a conflict_resolution_packet_*
      conflict_handoff_class. patch_stack.schema.json freezes
      the patch_stack_record (seven-value patch_stack_
      lifecycle_state), patch_stack_member_record (eight-value
      patch_stack_member_landing_state, five-value validation
      _staleness_class), sequence_editor_plan_record (eight-
      value sequence_editor_lifecycle_state), and sequence_
      editor_operation_record (eleven-value sequence_editor_
      operation_class, six-value sequence_op_status) under
      allOf gates that force every lifecycle past the draft
      state to cite a non-null recovery_object_ref, force
      sequence-editor plan admission to cite a non-null
      approval_ticket_ref, force sequence_plan_aborted_rolled_
      back_to_recovery_object to cite the rollback recovery
      object, force pick / reword / edit / squash / fixup /
      drop / merge_replay to cite a non-null target_change_
      object_id_ref, force exec / break / label / reset to
      cite null target_change_object_id_ref and null output
      _change_object_id_ref, force drop to cite a null output
      _change_object_id_ref, force op_completed reword / edit
      / squash / fixup / merge_replay to cite a non-null
      output_change_object_id_ref, force member_blocked_
      pending_conflict_resolution and member_blocked_pending_
      history_edit_recovery to pair with their respective
      conflict_handoff_class values, force member_superseded_
      by_member_rewrite to cite a non-null superseded_by_
      member_id_ref and a non-null recovery_object_ref, and
      reserve merge_conflict_class_record_id_ref and history_
      edit_recovery_record_id_ref forward-dependency slots
      that become required non-null when the merge / conflict-
      class contract and the dedicated history-edit recovery
      contract land. branch_row.schema.json freezes the branch_
      row_record (eight-value branch_class, five-value
      unpublished_commit_risk_class, four-value remote_tracking_
      freshness_class, five-value workset_cleanliness_class,
      three-value provider_overlay_visual_secondary_class,
      seven-value branch_recovery_action_class, six-value branch_
      open_action_class) and the stash_row_record (four-value
      stash_class, four-value stash_lifecycle_state) under allOf
      gates that pair branch_class with the matching unpublished_
      commit_risk_class for ahead / diverged rows, force tracking
      branch classes to cite a non-null remote_tracking_envelope
      and non-tracking branch classes to cite null, force
      unpublished_commits_present_* risk classes to resolve to a
      non-recovery_no_action_required branch_recovery_action_class,
