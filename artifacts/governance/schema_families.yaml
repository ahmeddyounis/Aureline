# Schema-family registry.
#
# Canonical machine-readable register of every contract-bearing JSON
# directory under /schemas/**. Each row fixes five things so schemas
# stay a governed stack instead of per-directory ad-hoc conventions:
#
#   1. family_id         — stable dot id (usually the directory name).
#   2. schema_home       — authoritative directory containing the schemas.
#   3. publication_path  — where consumers read the family from. Equal to
#                          schema_home for most families; distinct when the
#                          family also publishes through a generated
#                          manifest, release-evidence bundle, or docs
#                          projection.
#   4. versioning_rule   — how version bumps, additive-minor changes, and
#                          breaking changes are expressed.
#   5. unknown_field_policy — additionalProperties posture. Governance /
#                             identity / security boundaries are strict;
#                             a family MAY carry a namespaced extension
#                             envelope or a property-bag convention only
#                             when the row declares it.
#   6. compatibility_owner — named surface owner (team / role / forum) who
#                            ratifies version bumps, new enum values, and
#                            cross-family crosswalks.
#
# Every schema under /schemas/** MUST belong to exactly one row here. A
# schema whose family row is missing is not ratified and may not be
# consumed by a validator or CI lane. Adding a new family row is
# additive-minor; repurposing an existing row's schema_home,
# publication_path, versioning_rule, unknown_field_policy, or
# compatibility_owner is breaking and requires a new decision row.
#
# Narrative companion: docs/governance/policy_flag_schema_stack.md.
# Standards-matrix binding:
# artifacts/governance/standards_matrix.yaml#standard.json_schema_2020_12
# and #standard.openapi_3_2.

schema_version: 1

stack_doc: docs/governance/policy_flag_schema_stack.md
standards_matrix_refs:
  - artifacts/governance/standards_matrix.yaml#standard.json_schema_2020_12
  - artifacts/governance/standards_matrix.yaml#standard.openapi_3_2

companion_registers:
  telemetry_and_support_registry: docs/governance/telemetry_and_support_schema_registry.md
  consent_ledger_seed: artifacts/governance/consent_ledger_seed.yaml
  record_class_registry: artifacts/governance/record_class_registry.yaml
  control_artifact_index: artifacts/governance/control_artifact_index.yaml
  feature_flag_provider_chain: artifacts/governance/feature_flag_provider_chain.yaml

# -----------------------------------------------------------------------------
# Cross-cutting conventions.
#
# Rules that apply to every family row. The row MAY cite these rules rather
# than re-describe them.
# -----------------------------------------------------------------------------
cross_cutting_conventions:
  json_schema_pin:
    keyword: $schema
    value: https://json-schema.org/draft/2020-12/schema
    rule: >
      Every schema file under /schemas/** MUST declare this keyword with
      this exact value. Narrowing is permitted; inventing custom keywords
      outside the JSON Schema vocabulary requires a deviation ADR that
      cites standards_matrix.yaml#standard.json_schema_2020_12.
  schema_id_pattern:
    form: https://aureline.dev/schemas/<family>/<name>.schema.json
    rule: >
      The $id URL does NOT carry a version segment. Schemas track
      version in a document-level const field (usually
      <name>_schema_version or a root schema_version property).
  additive_minor_rule: >
    Adding a new enum value, a new optional property, or a new additive
    sub-record is additive-minor and bumps the relevant
    <name>_schema_version const. Removing or repurposing an existing
    value is breaking and requires a new decision row.
  unknown_field_default: additional_properties_false_strict
  publication_discipline: >
    Consumers read from the publication_path, not directly from the
    git checkout. For most families publication_path equals schema_home.
    Families that project through a generated manifest or release bundle
    name the projection explicitly.
  service_api_description_rule: >
    When a family publishes a service HTTP surface, the description
    document is an OpenAPI 3.2+ document placed alongside the family's
    JSON Schemas. The row's notes name the OpenAPI file.

# -----------------------------------------------------------------------------
# Vocabularies.
# -----------------------------------------------------------------------------

versioning_rule_classes:
  - document_const_schema_version_bump_on_breaking
  - document_const_schema_version_bump_on_additive_minor
  - inherited_from_parent_packet_header
  - single_record_no_version_field
  - generated_artifact_versioning_follows_generator

unknown_field_policy_classes:
  - additional_properties_false_strict
  - additional_properties_false_strict_with_namespaced_extension_envelope
  - additional_properties_false_strict_with_property_bag
  - additional_properties_true_explicit_reason

publication_path_classes:
  - equal_to_schema_home
  - generated_manifest_projection
  - release_evidence_bundle_projection
  - docs_projection_only
  - inlined_in_parent_packet

compatibility_role_vocabulary:
  - governance_and_policy
  - identity_and_auth
  - security_trust
  - runtime_surface
  - ux_surface
  - docs_public_truth
  - automation_and_cli
  - telemetry_and_support
  - release_evidence
  - extensions
  - benchmark_lab

# -----------------------------------------------------------------------------
# Gates.
# -----------------------------------------------------------------------------

gates:
  - >
    Every file under /schemas/** MUST be accounted for by exactly one
    family row whose schema_home contains it. Reviewers check this before
    admitting a new schema directory.
  - >
    Changing a family row's versioning_rule or unknown_field_policy is
    breaking and requires a new decision row. New family rows are
    additive-minor.
  - >
    A family MAY declare a narrower unknown_field_policy than the
    cross-cutting default, but MAY NOT declare a looser one without
    citing the reason (the extension_envelope or property_bag namespace
    MUST be named in notes).
  - >
    A family that publishes a service HTTP description MUST name the
    OpenAPI file in notes and cite
    standards_matrix.yaml#standard.openapi_3_2 in its row.
  - >
    Retiring a family is not a delete; set the row's
    lifecycle_state to retired and record the supersede note. The audit
    trail "this posture once applied" survives.

# -----------------------------------------------------------------------------
# Family rows.
#
# Row order follows the directory listing under /schemas/. New directories
# land as new rows; they do not displace existing rows.
# -----------------------------------------------------------------------------

rows:
  - family_id: admin
    schema_home: schemas/admin/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/admin/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: governance_and_policy
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/admin/effective_policy_card.schema.json
    notes: >
      Admin policy explainability boundary for effective-policy cards,
      endpoint-posture cards, policy-diff views, decision-history rows,
      locked-state explanations, and admin / support handoff exports.
      Reuses policy-bundle source / freshness / validation vocabulary,
      admin-audit actor / target vocabulary, settings lock vocabulary,
      support-bundle redaction vocabulary, and governed-record lifecycle
      links so managed policy explanations remain inspectable in
      current, mirrored, stale, offline, and partially managed states.

  - family_id: ai
    schema_home: schemas/ai/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/ai/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: runtime_surface
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/ai/context_assembly.schema.json
      - schemas/ai/evidence_packet.schema.json
      - schemas/ai/evidence_replay_packet.schema.json
      - schemas/ai/audit_storage_manifest.schema.json
      - schemas/ai/provider_registry.schema.json
      - schemas/ai/model_registry.schema.json
      - schemas/ai/external_tool_registry.schema.json
      - schemas/ai/prompt_composer_plan.schema.json
      - schemas/ai/request_workspace.schema.json
      - schemas/ai/prompt_tool_pack_manifest.schema.json
      - schemas/ai/graduation_packet.schema.json
      - schemas/ai/memory_object.schema.json
      - schemas/ai/deferred_intent_outbox.schema.json
    notes: >
      AI context-assembly, evidence-packet, replayability, audit-
      storage manifest, and provider / model / local-model-pack /
      external-tool registry boundary for the provider stack. The
      three registry schemas (provider_registry, model_registry,
      external_tool_registry) freeze the governed rows local, BYOK,
      enterprise-gateway, and vendor-hosted routes emit the same
      identity spine against, and the tainted-by-default invariant
      every external-tool (stdio / local-HTTP / remote-HTTP / MCP)
      return carries through downstream dispatch. The memory_object
      and deferred_intent_outbox schemas freeze the seven-class AI
      memory matrix, the invalidation-trigger / outcome vocabulary,
      the per-class delete / export shapes, and the eight-state
      deferred-intent reconciliation vocabulary so AI memory does not
      become a hidden retention layer. Adding a new record class is
      additive-minor and bumps the per-record schema_version const.

  - family_id: api
    schema_home: schemas/api/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/api/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: runtime_surface
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/api/request_document.schema.json
      - schemas/api/environment_layer.schema.json
      - schemas/api/assertion_suite.schema.json
      - schemas/api/graphql_schema_snapshot.schema.json
    notes: >
      API request-workspace, environment-layer, assertion-suite,
      and GraphQL schema-snapshot boundary (see
      docs/api/request_workspace_contract.md).
      request_document.schema.json freezes the
      request_document_record (seven-value request_class,
      eleven-value protocol_class covering REST / GraphQL query /
      mutation / subscription / gRPC unary / server-stream /
      client-stream / bidi / WebSocket / SSE / unknown,
      eleven-value http_method_class, four-value
      idempotency_class, six-value body_source_class, fourteen-
      value auth_source_class preferring secret-broker /
      delegated / managed-service-identity / mTLS / device-flow /
      AWS SigV4 / GCP service account / Azure managed identity /
      custom-signed handles over raw secrets in workspace state,
      four-value response_trust_class re-exported from the safe-
      preview vocabulary, five-value rerun_parity_class) plus the
      matched request_document_audit_event_record (eight-value
      audit_event_id and eleven-value denial_reason_class) under
      allOf gates that force ai_tool_proposed_request_pending_
      review to leave admitted_at null, force raw_secret_in_
      workspace_state_observed = true to be admissible only on
      ad_hoc_session_request or imported_from_export_bundle_
      request, force preferred-credential-handle classes to cite
      their matching non-null handle ref, force azure_managed_
      identity_handle_auth to resolve only on managed_workspace
      identity mode, force non-idempotent requests to admit only
      under workspace_trust_trusted, force GraphQL protocol
      classes to cite a non-null bound_graphql_schema_snapshot_
      ref, force desktop_and_headless_parity_proven to cite a
      non-null cli_command_id_ref and a non-null parity_proof_
      recorded_at, force parity_blocked_pending_environment_
      resolution to cite a non-null bound_environment_layer_ref,
      and force non-HTTP protocols (gRPC / WebSocket / SSE) to
      resolve http_method_class to method_not_applicable_non_
      http_protocol. environment_layer.schema.json freezes the
      environment_layer_record (eight-value environment_layer_
      class, nine-value environment_named_value_class, five-value
      layer_precedence_class, six-value variable_kind_class,
      five-value retarget_protection_class, eight-value
      environment_resolution_outcome_class) plus the matched
      environment_layer_audit_event_record (five-value audit_
      event_id and ten-value denial_reason_class) under allOf
      gates that force environment_named_layer to cite a named
      value outside named_layer_not_applicable_non_named_layer,
      force named_layer_production to resolve to retarget_locked_
      to_environment_no_silent_change or retarget_pending_user_
      admit (or one of the blocked classes), force ai_tool_
      proposed_layer_pending_review to leave resolved_at null,
      force imported_from_export_bundle_layer to set value_
      inline_in_layer_body = false on every secret_handle_ref
      variable, force secret_handle_ref variables to cite a
      non-null secret_broker_handle_ref and force value_inline_
      in_layer_body = false, and force literal_value variables
      to cite a non-null literal_value_label_ref. assertion_
      suite.schema.json freezes the assertion_suite_record, the
      assertion_evaluation_result_record (eighteen-value
      assertion_class, five-value assertion_evaluation_mode_
      class, eight-value assertion_outcome_class, six-value
      assertion_degradation_class, seven-value evaluator_
      provenance_class), and the matched assertion_suite_audit_
      event_record (five-value audit_event_id and nine-value
      denial_reason_class) under allOf gates that force enforce_
      blocking_default to never resolve to fail_advisory_non_
      blocking, force advisory mode classes to never resolve to
      fail_blocking, force informational_only_no_chip to admit
      only pass / skipped_not_in_scope, force pass_admissible to
      cite not_degraded_evaluator_admissible, force skipped_
      pending_schema_freshness_user_review_required to cite a
      typed schema-degradation reason and a non-null bound_
      graphql_schema_snapshot_ref, force skipped_evaluator_
      unavailable_user_review_required to cite degraded_
      evaluator_unavailable_user_review_required, force
      skipped_waiver_admitted_active to cite a non-null waiver_
      record_ref, force ai_tool_overlay_evaluator_advisory_only
      to admit only advisory / informational evaluation modes,
      and force graphql_field_presence and graphql_typed_
      response_match to cite a non-null bound_graphql_schema_
      snapshot_ref. graphql_schema_snapshot.schema.json freezes
      the graphql_schema_snapshot_record (seven-value graphql_
      schema_source_class, five-value graphql_schema_freshness_
      class, five-value graphql_schema_stale_label_class) plus
      the matched graphql_schema_snapshot_audit_event_record
      (four-value audit_event_id and seven-value denial_reason_
      class) under allOf gates that force snapshot_introspection_
      disabled_at_endpoint to be admissible only on SDL-sourced
      snapshots, force snapshot_fresh_within_grace to resolve
      stale label to not_stale_admissible, force snapshot_stale_
      beyond_grace_user_review_required to resolve stale label
      to stale_beyond_grace_assertions_blocked, force snapshot_
      unverifiable_user_review_required to resolve stale label
      to unverifiable_user_review_required, and force sdl_
      proposed_by_ai_tool_pending_review to leave admitted_at
      null. Re-exports identity_mode and workspace_trust_state_
      class from the identity family, redaction_class from the
      governance / capability-lifecycle family, response_trust_
      class from the safe-preview vocabulary, and the transport_
      posture object shape from the network family without
      redefinition. Adding a new request_class, protocol_class,
      idempotency_class, body_source_class, auth_source_class,
      response_trust_class, rerun_parity_class, environment_
      layer_class, environment_named_value_class, layer_
      precedence_class, variable_kind_class, retarget_protection_
      class, environment_resolution_outcome_class, assertion_
      class, assertion_evaluation_mode_class, assertion_outcome_
      class, assertion_degradation_class, evaluator_provenance_
      class, graphql_schema_source_class, graphql_schema_
      freshness_class, graphql_schema_stale_label_class, audit_
      event_id, or denial_reason_class is additive-minor and
      bumps the per-record schema_version const; repurposing an
      existing value is breaking and requires a new decision
      row co-signed by security_trust_review and product_scope_
      review. Implementing an API client or network stack
      (HTTP / gRPC / WebSocket / SSE transport, real OAuth
      dance, real introspection fetcher, real assertion
      evaluator) named explicitly out of scope at this revision.

  - family_id: auth
    schema_home: schemas/auth/
    publication_path_class: equal_to_schema_home
