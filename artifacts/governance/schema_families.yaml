  - family_id: ops
    schema_home: schemas/ops/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/ops/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: telemetry_and_support
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/ops/incident_workspace.schema.json
      - schemas/ops/runbook_packet.schema.json
      - schemas/ops/evidence_handoff_bundle.schema.json
      - schemas/ops/outage_notice.schema.json
    notes: >
      Operational incident-workspace, runbook-packet, action-ledger
      entry, evidence-handoff bundle, and outage-notice boundary
      (see docs/ops/incident_workspace_contract.md and
      docs/ux/control_data_plane_status_contract.md).
      incident_workspace.
      schema.json freezes the incident_workspace_record (incident
      header, ownership, pinned code context, alert / page snapshot,
      typed log / trace / metric signal slices with provenance,
      bounded resource snapshot pinning a forensic-packet ref,
      runbook-packet refs, append-only action-ledger entry refs,
      browser / console handoff records, and evidence-handoff bundle
      refs the workspace exports for postmortem / review / browser-
      handoff / console-handoff / last-synced-offline-view
      consumption). The workspace is read-mostly by default
      (mutating_action_admission_class resolves to
      read_mostly_default_no_mutation_admitted until a typed sandbox
      / approval posture is admitted); mutating actions inherit the
      same execution-context / workspace-trust / approval-ticket /
      break-glass posture as ordinary runtime actions and land as
      action-ledger entries. runbook_packet.schema.json freezes the
      runbook_packet_record and the append-only
      action_ledger_entry_record (typed step-intent grammar,
      sandbox-admission / approval-admission / preview-hash posture
      every mutating step inherits from ordinary runtime actions, and
      the closed outcome vocabulary every entry records after the
      step ran). evidence_handoff_bundle.schema.json freezes the
      evidence_handoff_bundle_record (immutable-snapshot rules for
      postmortem / review bundles, browser / console handoff exits,
      and last-synced offline views: bundles are
      frozen-no-post-hoc-rewrite by default, corrections supersede
      via a new bundle, the prior bundle is never deleted,
      backdated, or rewritten in place, and browser / console
      handoffs travel through this bundle so the exit transition is
      attributable rather than a hidden alternate control plane).
      outage_notice.schema.json freezes the outage_notice_record for
      scheduled, read-only, drain, migration, failover, reconciling,
      and resolved service notices: it separates control-plane from
      data-plane effects, names retained local-safe capabilities,
      blocked managed-only capabilities, blocked write classes and
      deferral paths, and preserves tenant / region / residency /
      key-ownership / endpoint-identity boundary changes with stale-
      notice retention so maintenance and recovery copy cannot imply
      all work is broken or hide changed boundaries behind a generic
      all-clear state.
      Re-exports redaction_class from ADR-0010 / ADR-0007,
      workspace-trust state from the identity family, deployment-
      profile vocabulary from artifacts/governance/deployment_
      profiles.yaml, and composes by reference with schemas/runtime/
      execution_context.schema.json (target identity / sandbox
      posture / policy epoch), schemas/runtime/forensic_packet.
      schema.json (resource counters / strike windows / heartbeat /
      fault-domain), schemas/integration/browser_handoff_packet.
      schema.json, schemas/integration/approval_ticket.schema.json,
      schemas/security/incident_workspace_packet.schema.json
      (security-side private-triage packet), schemas/security/
      emergency_action_record.schema.json, schemas/security/break_
      glass_event.schema.json, and schemas/support/support_bundle.
      schema.json without redefinition. Adding a new record_kind,
      operational_severity_class, lifecycle_state_class, alert_
      source_class, signal_slice_kind_class, signal_origin_
      provenance_class, mutating_action_admission_class, step_
      intent_class, sandbox_admission_class, approval_admission_
      class, raw_ref_class, outcome_class, bundle_kind_class,
      integrity_class, handoff_destination_class, retention_
      posture_class, notice_kind_class, notice_state_class,
      control_plane_effect_state, data_plane_effect_state,
      write_class, deferral_path_class, boundary_axis_class,
      boundary_axis_state_class, denial_reason, or audit_event_id is
      additive-minor and bumps the per-record schema_version const;
      repurposing an existing value is breaking and requires a new
      decision row. Implementing incident UIs, paging-provider
      integrations, observability collectors, runbook editors,
      action runners, postmortem editors, browser-handoff exits,
      console-handoff exits, last-synced offline-view readers, and
      admin / policy review surfaces is named explicitly out of
      scope at this revision.

  - family_id: package
    schema_home: schemas/package/
    publication_path_class: equal_to_schema_home
    publication_path: schemas/package/
    versioning_rule: document_const_schema_version_bump_on_additive_minor
    unknown_field_policy: additional_properties_false_strict
    compatibility_owner:
      role: runtime_surface
      dri: "@ahmeddyounis"
    lifecycle_state: seeded
    representative_schemas:
      - schemas/package/package_action.schema.json
      - schemas/package/package_review_packet.schema.json
    notes: >
      Package-action and package-review packet boundary (see
      docs/package/package_action_contract.md). package_action.
      schema.json freezes the package_action_record (eight-value
      package_action_class — search_for_package_metadata, install
      _new_dependency, upgrade_existing_dependency, downgrade_
      existing_dependency, remove_existing_dependency, pin_
      existing_dependency, audit_only_no_state_change, restore_
      lockfile_to_checkpoint; seven-value manifest_scope_class;
      ten-value registry_source_class; ten-value registry_auth_
      mode_class — including the preferred secret_broker_handle
      _auth, delegated_identity_auth, policy_injected_credential
      _auth, and managed_service_identity_auth values that
      replace raw secrets in workspace state; eight-value
      script_risk_class; nine-value lockfile_impact_class;
      eight-value transitive_impact_class; seven-value rollback
      _posture_class; six-value mirror_or_offline_state_class;
      ten-value apply_outcome_class; nine-value expected_
      validation_task_class; eight-value surface_class) and the
      package_action_audit_event_record (sixteen-value audit_
      event_id and fifteen-value denial_reason_class) under
      allOf gates that force read-only action classes to resolve
      to no_lockfile_change_metadata_only + no_transitive_change
      + rollback_posture_not_applicable_read_only + apply_not_
      applicable_read_only, force mutation-class actions to cite
      typed lockfile / transitive / rollback values, force
      lockfile_impact_class = no_lockfile_change_metadata_only
      paired with a script_risk_class outside the metadata-safe
      set to deny with script_or_native_build_must_not_be_
      represented_as_metadata_only, force preferred-credential-
      handle classes to cite their matching non-null handle ref
      and force managed_service_identity_auth to resolve only on
      managed_workspace identity mode, force raw_secret_in_
      workspace_state_observed = true to be admissible only on
      audit_only_no_state_change, forbid vendored-directory and
      git-or-path sources from carrying secret-broker /
      delegated / policy-injected credential refs, force
      mutation-class actions under workspace_trust_state other
      than workspace_trust_trusted to deny, force offline /
      deny-all transport posture to pair with a non-online
      mirror_or_offline_state_class, force out_of_tree_global_
      manifest_admin_only manifest scope to cite a non-null
      out_of_tree_global_manifest_envelope and resolve only on
      self_hosted_org / managed_workspace identity modes, force
      rollback_unavailable_destructive_remove_with_no_checkpoint
      to be admissible only on remove_existing_dependency, force
      rollback-via-checkpoint classes to cite the matching
      non-null checkpoint ref, force apply_failed_state_changed_
      rollback_executed to cite a non-null rollback_record_ref,
      and force every terminal apply_outcome (other than apply_
      in_flight) to cite a non-null apply_completed_at. package_
      review_packet.schema.json freezes the package_review_
      packet_record (five-value package_review_packet_class:
      pre_apply_review_packet, post_apply_evidence_packet,
      rollback_preview_packet, audit_only_review_packet, packet_
      class_unknown_requires_review; eight-value package_review
      _outcome_class) under allOf gates that force pre_apply_
      review_packet to never carry review_admitted_apply_
      proceeded, force post_apply_evidence_packet to cite a
      non-null apply_outcome_class, force rollback_preview_
      packet to resolve to package_action_class = restore_
      lockfile_to_checkpoint with a rollback_posture_class in
      the rollback-via-checkpoint set and a non-null rollback_
      checkpoint_ref, force audit_only_review_packet to mirror a
      read-only action class with read-only lockfile / transitive
      / rollback values, force mutation-class actions to never
      resolve to rollback_posture_not_applicable_read_only,
      force lockfile_impact_class = no_lockfile_change_metadata_
      only paired with a non-metadata-safe script_risk_class to
      deny, and force rollback_unavailable_destructive_remove_
      with_no_checkpoint to pair with remove_existing_dependency.
      Re-exports identity_mode and workspace_trust_state_class
      from the identity family, redaction_class from the
      governance / capability-lifecycle family, and the
      transport_posture object shape from the network family
      without redefinition. Adding a new package_action_class,
      manifest_scope_class, registry_source_class, registry_
      auth_mode_class, script_risk_class, lockfile_impact_class,
      transitive_impact_class, rollback_posture_class, mirror_
      or_offline_state_class, surface_class, expected_validation
      _task_class, apply_outcome_class, package_review_packet_
      class, package_review_outcome_class, audit_event_id, or
      denial_reason_class is additive-minor and bumps the
      per-record schema_version const; repurposing an existing
      value is breaking and requires a new decision row.
      Implementing per-adapter package managers and dependency
      intelligence (vulnerability / advisory / license /
      freshness scoring) named explicitly out of scope at this
      revision.

