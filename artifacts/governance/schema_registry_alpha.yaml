# External alpha schema registry for state, support/export, and managed-copy truth.
#
# This registry is the alpha-facing join point between existing schema families,
# record classes, support/export packets, portable packages, and managed-copy
# placeholders. Consumers read this file before naming a payload family in
# support, docs, product-boundary, CLI, or export surfaces.

schema_version: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

registry_id: alpha_schema_registry_state_support_export_managed_copy_truth
human_entrypoint_ref: docs/governance/managed_copy_vs_local_truth.md
record_registry_ref: artifacts/governance/record_class_registry_alpha.yaml
alpha_wedge_matrix_ref: artifacts/milestones/m2/alpha_wedge_matrix.yaml
alpha_exit_scoreboard_ref: artifacts/milestones/m2/exit_gate_scoreboard.yaml

validator:
  script_ref: ci/check_schema_record_registry_alpha.py
  command: python3 ci/check_schema_record_registry_alpha.py --repo-root .
  consumer_projection_command: python3 ci/check_schema_record_registry_alpha.py --repo-root . --render-support-export-projection

source_registry_refs:
  - artifacts/governance/schema_families.yaml
  - schemas/registry/schema_registry.yaml
  - artifacts/governance/consent_ledger_seed.yaml
  - artifacts/governance/record_class_registry.yaml
  - artifacts/governance/portability_artifact_matrix.yaml
  - artifacts/state/state_objects.yaml
  - docs/governance/telemetry_and_support_schema_registry.md
  - docs/governance/record_class_governance.md
  - docs/state/portable_state_package_contract.md
  - docs/support/support_bundle_contract.md

schema_status_vocabulary:
  - implemented_schema
  - seeded_schema
  - placeholder_schema
  - inherited_schema

schema_role_vocabulary:
  - durable_state_schema
  - support_export_packet_schema
  - portable_package_schema
  - managed_copy_schema
  - export_packet_schema
  - receipt_schema
  - governance_binding_schema

consumer_surface_vocabulary:
  - state
  - support
  - export
  - managed_copy
  - docs
  - product_boundary
  - cli

first_consumers:
  - consumer_id: alpha_schema_record_support_export_projection
    surface_class: cli_support_export_projection
    consumer_ref: ci/check_schema_record_registry_alpha.py
    command: python3 ci/check_schema_record_registry_alpha.py --repo-root . --render-support-export-projection
    required_rendered_fields:
      - record_class_id
      - class_scope
      - owner_dri
      - schema_rows
      - local_truth_authority
      - managed_copy_posture
      - retention_label
      - export_semantics
      - delete_semantics
      - hold_semantics
    output_contract: >
      The projection is export-safe JSON for support bundle preview, docs,
      CLI/headless explain output, and product-boundary review. It carries
      schema ids, record-class ids, owners, and lifecycle semantics; it never
      embeds raw workspace content, credentials, prompts, logs, or provider
      payloads.

