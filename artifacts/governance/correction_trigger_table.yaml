# Correction-trigger table.
#
# Current-milestone projection of the generic commitment and rebaseline
# triggers onto the active scorecard lanes, risk rows, and dependency ids.
# This file exists so scorecards and risk registers can route slips into a
# typed correction action instead of re-deriving the response from prose.

schema_version: 1

policy_refs:
  dependency_ledger: artifacts/governance/dependency_ledger.yaml
  scorecard: artifacts/milestones/M0_scorecard.yaml
  risk_register: artifacts/milestones/M0_risk_register.yaml
  commitment_class_register: artifacts/governance/commitment_classes.yaml
  commitment_rebaseline_policy: docs/governance/commitment_and_rebaseline_policy.md
  blocker_aging_slas: docs/governance/blocker_aging_slas.md

action_classes:
  - rebaseline
  - descope
  - freeze_exception

rows:
  - correction_trigger_id: corr.renderer_scope_descoping
    policy_trigger_id: launch_rows_widen_beyond_staffed_wedge
    required_action: descope
    scorecard_lane_refs:
      - aureline-render
    backlog_workstream_refs:
      - m1.shell_command_entry_surfaces
    risk_refs:
      - RISK-001
    dependency_ids:
      - progdep.renderer_native_window_viability
    fires_when:
      - the dependency is still open at the prototype-lock decision point
      - shell breadth or renderer readiness is still carried as committed without narrowed language in the same review
    reason: >
      Native-window proof has not caught up to the shell breadth being
      claimed.
    decision_forum_refs:
      - architecture_council
    response_window_business_days: 5
    required_artifact_updates:
      - artifacts/planning/m1_m2_work_breakdown.yaml
      - docs/planning/m1_m2_dependency_backlog.md
      - artifacts/milestones/M0_scorecard.yaml

  - correction_trigger_id: corr.shell_host_keyboard_descoping
    policy_trigger_id: launch_rows_widen_beyond_staffed_wedge
    required_action: descope
    scorecard_lane_refs:
      - shell_command_system
    backlog_workstream_refs:
      - m1.shell_command_entry_surfaces
      - m1.execution_terminal_target_truth
      - m1.automation_cli_seed
    risk_refs:
      - RISK-006
    dependency_ids:
      - progdep.shell_host_keyboard_freeze
    fires_when:
      - the dependency remains open at or after prototype lock
      - shell, terminal, or CLI breadth still assumes a closed host and keyboard contract
    reason: >
      Command-system breadth is wider than the frozen shell and keyboard
      contract.
    decision_forum_refs:
      - architecture_council
      - product_scope_review
    response_window_business_days: 5
    required_artifact_updates:
      - artifacts/planning/m1_m2_work_breakdown.yaml
      - docs/planning/m1_m2_dependency_backlog.md
      - artifacts/milestones/M0_scorecard.yaml

  - correction_trigger_id: corr.accessibility_hook_only_descoping
    policy_trigger_id: launch_rows_widen_beyond_staffed_wedge
    required_action: descope
    scorecard_lane_refs:
      - accessibility_input_review
    backlog_workstream_refs:
      - m1.accessibility_install_review_hooks
    risk_refs:
      - RISK-005
    dependency_ids:
      - progdep.accessibility_review_packet_home
    fires_when:
      - the dependency remains open at prototype lock
      - any lane or workstream tries to leave hook-only posture without a final review-packet home
    reason: >
      Accessibility and input claims would outrun their evidence home.
    decision_forum_refs:
      - architecture_council
    response_window_business_days: 5
    required_artifact_updates:
      - artifacts/planning/m1_m2_work_breakdown.yaml
      - docs/planning/m1_m2_dependency_backlog.md
      - artifacts/milestones/M0_scorecard.yaml

  - correction_trigger_id: corr.benchmark_claim_requires_exception
    policy_trigger_id: evidence_automation_checkpoint_missed
    required_action: freeze_exception
    scorecard_lane_refs:
      - benchmark_lab
    backlog_workstream_refs:
      - m1.supportability_public_truth_governance_seed
    risk_refs:
      - RISK-002
    dependency_ids:
      - progdep.benchmark_hardware_baseline
    fires_when:
      - the dependency remains open when a benchmark output is about to be treated as release-grade, partner-grade, or public-comparison evidence
    reason: >
      Comparability is not ratified even though claim scope is widening.
    decision_forum_refs:
      - performance_council
      - release_council
    response_window_business_days: 0
    required_packet_kind: exception_packet
    required_artifact_updates:
      - artifacts/governance/dependency_ledger.yaml
      - artifacts/milestones/M0_scorecard.yaml
      - artifacts/milestones/M0_architecture_pack/packet_index.yaml

  - correction_trigger_id: corr.exact_build_slip_rebaseline
    policy_trigger_id: evidence_automation_checkpoint_missed
    required_action: rebaseline
    scorecard_lane_refs:
      - release_evidence
      - docs_public_truth
    backlog_workstream_refs:
      - m1.supportability_public_truth_governance_seed
      - m2.release_evidence_exact_build_alpha
    risk_refs:
      - RISK-004
    dependency_ids:
      - progdep.exact_build_cleanroom_parity
    fires_when:
      - the dependency remains open when release-evidence or supportability scope wants to widen beyond seed posture
      - the backlog still treats exact-build dependent work as committed without a narrowed acceptance bar
    reason: >
      Exact-build and clean-room proof are part of the acceptance bar,
      not optional polish.
    decision_forum_refs:
      - architecture_council
      - release_council
    response_window_business_days: 5
    required_artifact_updates:
      - artifacts/planning/m1_m2_work_breakdown.yaml
      - docs/planning/m1_m2_dependency_backlog.md
      - artifacts/milestones/M0_scorecard.yaml
      - artifacts/milestones/M0_architecture_pack/packet_index.yaml

  - correction_trigger_id: corr.public_truth_descoping
    policy_trigger_id: manual_claim_publication_fragility
    required_action: descope
    scorecard_lane_refs:
      - docs_public_truth
    backlog_workstream_refs:
      - m1.supportability_public_truth_governance_seed
    risk_refs:
      - RISK-009
    dependency_ids:
      - progdep.public_truth_freshness_automation
    fires_when:
      - docs, help, or support language widens while freshness automation or stale-example enforcement is still open
      - required proof for the lane is stale or missing under the freshness policy
    reason: >
      Public truth has widened past the evidence and automation that keep
      it honest.
    decision_forum_refs:
      - product_scope_review
      - release_council
    response_window_business_days: 5
    required_artifact_updates:
      - artifacts/milestones/M0_scorecard.yaml
      - artifacts/governance/dependency_ledger.yaml
      - artifacts/milestones/M0_architecture_pack/packet_index.yaml

  - correction_trigger_id: corr.extension_claim_requires_exception
    policy_trigger_id: launch_rows_widen_beyond_staffed_wedge
    required_action: freeze_exception
    scorecard_lane_refs:
      - docs_public_truth
    backlog_workstream_refs:
      - m1.accessibility_install_review_hooks
    risk_refs:
      - RISK-007
    dependency_ids:
      - progdep.extension_publication_policy
    fires_when:
      - extension-install, publication, or hosted-review scope widens while the governing policy ADR is still proposing
    reason: >
      The claim would outrun the permission, continuity, and trust model
      that is supposed to govern it.
    decision_forum_refs:
      - architecture_council
      - product_scope_review
    response_window_business_days: 0
    required_packet_kind: exception_packet
    required_artifact_updates:
      - artifacts/governance/dependency_ledger.yaml
      - artifacts/milestones/M0_scorecard.yaml
      - artifacts/milestones/M0_architecture_pack/packet_index.yaml

  - correction_trigger_id: corr.deferred_contract_family_requires_exception
    policy_trigger_id: launch_rows_widen_beyond_staffed_wedge
    required_action: freeze_exception
    scorecard_lane_refs:
      - shell_command_system
      - benchmark_lab
      - docs_public_truth
    backlog_workstream_refs:
      - m1.shell_command_entry_surfaces
      - m1.supportability_public_truth_governance_seed
      - m1.accessibility_install_review_hooks
    risk_refs:
      - RISK-008
    dependency_ids:
      - progdep.contract_family_freeze_exceptions
    fires_when:
      - implementation or claim widening touches a family still listed as deferred in coverage_and_freeze_exceptions.yaml
      - no accepted contract packet, ADR, or replacement ledger row lands in the same change
    reason: >
      Deferred contract families are becoming product scope by
      implication rather than by an explicit review.
    decision_forum_refs:
      - architecture_council
      - product_scope_review
    response_window_business_days: 0
    required_packet_kind: exception_packet
    required_artifact_updates:
      - artifacts/governance/dependency_ledger.yaml
      - artifacts/milestones/M0_scorecard.yaml
      - artifacts/milestones/M0_architecture_pack/coverage_and_freeze_exceptions.yaml

  - correction_trigger_id: corr.protected_waiver_rebaseline
    policy_trigger_id: repeated_waiver_or_exception_same_protected_path
    required_action: rebaseline
    scorecard_lane_refs:
      - aureline-render
      - aureline-buffer
      - aureline-vfs
      - aureline-text
      - aureline-rpc
      - aureline-telemetry
      - shell_command_system
      - benchmark_lab
      - release_evidence
      - docs_public_truth
      - support_export
      - design_system_seeds
      - accessibility_input_review
      - governance_packets
    backlog_workstream_refs:
      - m1.shell_command_entry_surfaces
      - m1.editor_io_recovery_core
      - m1.navigation_search_workset_truth
      - m1.execution_terminal_target_truth
      - m1.settings_tokens_activity_state
      - m1.supportability_public_truth_governance_seed
    risk_refs:
      - RISK-003
    dependency_ids:
      - progdep.protected_backup_owner_coverage
    fires_when:
      - the backup-owner waiver expires
      - or the same protected-path waiver is renewed for a second time
    reason: >
      The waiver has become operating policy rather than a bounded
      exception.
    decision_forum_refs:
      - architecture_council
      - release_council
    response_window_business_days: 5
    required_artifact_updates:
      - artifacts/governance/ownership_matrix.yaml
      - docs/governance/dri_map.md
      - artifacts/milestones/M0_scorecard.yaml
      - artifacts/governance/dependency_ledger.yaml
