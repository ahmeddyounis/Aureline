  - id: assumption_ledger_schema
    title: Assumption-row schema
    canonical_location: schemas/governance/assumption_row.schema.json
    overview_page: docs/governance/assumption_ledger.md
    owner_dri: "@ahmeddyounis"
    owning_lane: governance_packets
    review_cadence: each_change
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      JSON Schema 2020-12 contract that assumption_rows.yaml conforms
      to. Strict additionalProperties: false at every level. Closes
      the six-state lifecycle (open, validated, invalidated, deferred,
      superseded, closed_not_applicable), the widening_posture
      vocabulary (blocks_widening, narrows_claims_only), the
      default_response_class vocabulary (narrow_scope, defer_milestone,
      freeze_lane, rebaseline_milestone, descope_feature,
      open_exception_packet, cut_public_claim), the checkpoint_class
      vocabulary covering every standing forum plus evidence_refresh
      and backlog_review, and the proof_class vocabulary. allOf gates
      force backup_waiver when backup_owner is null, superseded_by
      non-empty on superseded rows, validated_on set on validated
      rows, invalidated_on set on invalidated rows, and at least one
      downstream linkage (launch register, rolling index, dependency
      ledger, scorecard lane, or risk register) per row. Adding a new
      status value, checkpoint class, proof class, default-response
      class, or optional field is additive-minor and bumps
      schema_version; repurposing an existing value is breaking.

