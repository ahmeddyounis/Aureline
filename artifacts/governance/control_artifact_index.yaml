      additionalProperties false everywhere. allOf gates force
      editor_buffer rows to carry buffer_ref and a buffer-
      compatible authority class (host_workspace_authoritative,
      participant_authoritative_within_session_only, or local_
      authoritative_no_session_authority); force anchored_comment
      rows to carry buffer_ref plus anchor_target_class; force
      follow_or_presenter_state rows to carry presenter_
      authoritative_for_view_only authority plus ephemeral
