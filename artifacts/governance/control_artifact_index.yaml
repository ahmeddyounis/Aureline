      unfrozen invariant on every degraded / ended state, the six-
      class shared-object vocabulary (editor_buffer, anchored_
      comment, follow_or_presenter_state, shared_terminal_control_
      metadata, shared_debug_control_metadata, sealed_session_
      archive) with their owner / authority / durability / export
      posture bindings, the four-class downgrade-kind vocabulary
      (viewer_fallback_applied, relay_degradation_applied, anchor_
      target_drift_detected, archive_sealing_initiated), the five-
      value local-work preservation vocabulary (preserved_in_local_
      buffer_unchanged, preserved_in_local_journal_with_annotation,
      preserved_in_pending_outbound_proposal_queue, not_preserved_
      explicit_user_discard, not_preserved_explicit_admin_discard),
      the six-value recovery-path vocabulary (rejoin_same_session_
      same_authority, rejoin_same_session_viewer_only, rejoin_new_
      session_with_diff_to_local, rejoin_blocked_archive_only,
      recover_via_local_journal_diff_export, recover_via_sealed_
      archive_replay), the five-value anchor-drift vocabulary
      (anchor_target_match_exact, anchor_target_match_with_label_
      only, anchor_target_drift_label_unmatched_relocation_
      forbidden, anchor_target_drift_target_deleted_relocation_
      forbidden, anchor_target_drift_local_only_no_remote_
      resolution), the supersede-rather-than-relocate rule, and
      the dual audit streams (collaboration_session and
      collaboration_shared_object). Composes with — does not
      replace — the workspace-trust ADR (0018), the remote-agent
