      editor, keybinding help overlay, CLI help output, AI-tool
      surface, automation-recipe response surface, docs reference
      page surface, About / service-health panel, command-
      diagnostics panel, and support-export surface to one
      command_diagnostic_row_record that projects from a command
      descriptor plus an invocation-session packet plus policy
      context into a surface-renderable row with typed disabled /
      hidden reason, typed remediation projection, keybinding-help
      pivot, docs-help pivot, route / exposure context, authority
      class, capability scope class, preview requirement, approval
      posture, and policy source. Seats one protected_entry_badge_
      record naming protected_entry_class (nine values: terminal_
      entry, tasks_entry, debug_entry, remote_attach_entry,
      browser_handoff_entry, provider_bearing_action_entry,
      managed_workspace_control_entry, credential_broker_step_up_
      entry, policy_authoring_or_waiver_entry), target_kind_class
      (twelve values), target_trust_class (nine values),
      origin_actor_class (re-exported from ADR-0010 provider_actor_
      class), origin_authority_class, origin_client_scope, target_
      route_class (eleven values), required_trust_state_floor,
      required_grant_scope_floor, export_safe_target_label_ref,
      export_safe_origin_label_ref, and applicable_surface_classes
      so target / origin badges on protected entries (terminal,
      tasks, debug, remote attach, browser handoff, provider-
      bearing actions, managed workspace control, credential-
      broker step-up, policy authoring / waiver) read one envelope
      instead of minting per-surface target / origin dialects.
      Seats one remediation_projection_record naming reason_code
      (re-exported), repair_hook_ref, required_grant_scope
      (once / session / workspace / profile / policy_managed),
      actionability_class (seven values: actionable_by_user,
      actionable_by_workspace_admin, actionable_by_managed_fleet_
      admin, actionable_by_provider_owner, actionable_by_support,
      not_actionable_wait_for_lifecycle, not_actionable_
      deterministic), follow_up_deep_link_target_kind (re-exported
      from the shareability contract), dismissible_by_user, and
      export_safe_hint_label_ref so actionable disabled reasons
      render one typed repair path instead of per-surface guesses.
      Projection rules bind descriptor fields + invocation-session
      packet fields + policy context + rendering-surface class into
      a mechanically producible row; the row MUST re-export
      authority_class, capability_scope_class, preview_class,
      approval_posture_class, ai_tool_surfacing_class, palette_
      visibility_class, ui_slot_class, lifecycle_state, support_
      class, release_channel, declared_freshness_class, client_
      scope, redaction_class, disabled_reason_code, repair_hook_
      ref, docs_help_anchor_ref, and shortcut_narration_hint
      verbatim; minting a parallel value on any of those fields
      is non-conforming. Parity rules enumerate the thirteen
      rendering-surface classes that MUST render the same row
      field-for-field for the same (command_id, command_revision_
      ref, policy_epoch, trust_state, issuing_surface, ui_slot_
      class, execution_context_id) tuple. Export-safe wording
      classes (safe_for_public_docs, safe_for_support_export,
      operator_only_restricted, managed_only_restricted) control
      whether a row / badge may render in public docs, support
      bundles, or only under operator / managed scopes. Leaves
      room for a richer diagnostics UI later without changing the
      underlying packet or the meaning of disabled-state fields.

