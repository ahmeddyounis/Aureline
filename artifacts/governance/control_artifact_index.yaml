      additionalProperties false and allOf gates forcing a
      non-null skew block on synchronized_with_bounded_skew, a
      partial-order label family on
      unsynchronized_partial_order_only, a non-null
      import_declared block on every imported-family clock source,
      UTC and iso_8601_utc on chronology_export_preview render
      surfaces, a rendered skew label on every unsynchronized or
      bounded-skew surface, monotonic_same_epoch consistency on
      time_range_envelope_record, and a declared_gaps count that
      matches segment_completeness_class. Adding a new
      clock_source_class, clock_sync_state_class,
      partial_order_label_class, skew_direction_class,
      import_origin_class, gap_reason_class,
      absolute_time_format_class, relative_time_format_class,
      time_zone_class, or render_surface_class value is
      additive-minor and bumps timestamp_envelope_schema_version;
      repurposing an existing value is breaking.

