  - id: hosted_review_and_merge_policy_contract
    title: Hosted-review inbox, provider-authoritative state, and merge-policy contract
    canonical_location: docs/vcs/hosted_review_and_merge_policy_contract.md
    overview_page: docs/vcs/hosted_review_and_merge_policy_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative cross-tool contract binding every reviewer-facing
      surface that touches the pending-review inbox, the review-
      workspace header / checks / approval / stack / publish-sheet
      strips, or the merge-queue entry to one of three record
      families: review_inbox_row_record (review_inbox_row_class
      drawn from the seven-value vocabulary authored_by_current_
      actor, review_requested_from_current_actor, following_for_
      visibility_only, mentioned_in_thread, assigned_for_landing,
      draft_only_local_not_yet_published, imported_bundle_inbox_
      row; review_inbox_state_class drawn from the five-value
      vocabulary provider_authoritative, local_parity_estimate,
      stale_relative_to_base_or_head, not_evaluated_on_this_
      surface, draft_only_no_provider_state; inbox_freshness_
      sync_class drawn from inbox_row_fresh / _stale_within_grace
      / _stale_beyond_grace_local_continues / _unverifiable_
      provider_unreachable; offline_continuation_class drawn from
      online_synced_no_offline_state, offline_capture_pending_
      publish_later, offline_export_only_no_publish_later,
      provider_outage_local_continues_publish_blocked, provider_
      outage_local_continues_publish_queued); review_workspace_
      state_record (header strip with head / base refs and head
      / base drift_class drawn from fresh_no_drift / drifted_
      within_grace / drifted_beyond_grace_re_evaluate / drift_
      unverifiable_provider_unreachable; checks / evaluation
      strip cells citing strip_cell_authority_class drawn from
      the five-value vocabulary so a missing evaluator publishes
      a typed not_evaluated_on_this_surface cell rather than
      disappear into a green-by-omission view; approval / publish
      sheet cells citing approval_strip_state_class drawn from
      the six-value vocabulary with approval_ticket_ref required
      on provider-authoritative and publish-later-queued states
      and forbidden on draft-only-local and provider-unreachable-
      local-continues states, paired through allOf gates that
      deny approval_strip_publish_must_cite_approval_ticket and
      approval_strip_publish_state_must_match_authority_class;
      publish_sheet_publication_state_class drawn from publish_
      sheet_synced_with_provider, _draft_only_local, _publish_
      later_queued, _export_only_no_provider_publish under allOf
      gates that deny publish_sheet_publication_state_must_match
      _strip_cells; stack / dependency strip cells citing stack_
      strip_dependency_state_class drawn from the five-value
      vocabulary so a downstream entry inherits the upstream block
      reason rather than re-deriving one); and merge_queue_entry_
      record (merge_queue_entry_class drawn from queue_eligible_
      admissible, queue_blocked_pending_resolution, queue_landed,
      queue_dequeued_by_actor, queue_failed_to_land_pending_
      review; mergeability_class drawn from the seven-value
      vocabulary mergeable_clean, mergeable_with_conflicts_
      pending_resolution, not_mergeable_required_check_failing,
      not_mergeable_required_review_missing_or_dismissed, not_
      mergeable_base_drifted_re_evaluation_required, not_
      mergeable_approval_invalidated_by_force_push, not_
      mergeable_policy_or_trust_blocked; queue_entry_blocked_
      reason drawn from the nine-value vocabulary; local_vs_
      provider_rerun_authority_class drawn from local_rerun_
      admissible_provider_rerun_unavailable, provider_rerun_
      authoritative_local_rerun_advisory, both_rerun_authorities
      _admissible_user_picks, no_rerun_admissible_re_evaluation
      _required_against_fresh_base) under allOf gates that forbid
      a queue_eligible_admissible row from naming any non-not_
      blocked_entry_admissible reason or any not_mergeable_*
      mergeability class (denies with merge_queue_entry_must_not
      _appear_eligible_under_blocked_reason and merge_queue_
      entry_mergeability_must_match_class) and force a
      stack_dependency_blocked_upstream_member_blocked cell to
      pair with queue_entry_blocked_reason = upstream_stack_
      member_blocked. Reserves merge_policy_record_id_ref forward
      -dependency slot on every record that becomes required
      non-null when the merge-policy resolver lands. Composes
      with schemas/vcs/review_workspace.schema.json (the inbox
      row, workspace state, and queue entry all cite review_
      workspace_id_ref; the merge-queue entry binds to the
      review-workspace contract's provider_rule_snapshot model
      via provider_rule_snapshot_id_ref and never duplicates the
      snapshot body), schemas/vcs/review_pack.schema.json and
      schemas/vcs/review_evaluation_result.schema.json (every
      checks-strip cell that is not typed not_evaluated_on_this_
      surface or draft_only_no_provider_state cites a review_
      evaluation_result_id_ref), schemas/vcs/patch_stack.schema.
      json (every stack-strip cell cites an upstream patch_stack_
      member_id_ref), schemas/vcs/branch_row.schema.json /
      worktree_row.schema.json (header strip head / base refs),
      schemas/integration/approval_ticket.schema.json (provider-
      authoritative and publish-later-queued approval cells),
      schemas/integration/browser_handoff_packet.schema.json (no
      raw URLs), schemas/work_items/work_item_detail.schema.json
      (linked_work_item_ref / linked_work_item_refs), schemas/
      governance/capability_lifecycle.schema.json (re-exported
      freshness / client_scope / redaction vocabularies), and
      schemas/identity/policy_bundle.schema.json (workspace trust
      / policy envelope). This contract is the upstream the
      docs/vcs/review_workspace_contract.md hosted_review_inbox_
      record_id_ref and merge_policy_record_id_ref forward-
      dependency slots will resolve through. Implementing
      provider HTTP / OAuth adapters, a real merge-queue kernel
      / worker, the merge-policy resolver, and the full hosted-
      review reader UI named explicitly out of scope at this
      revision.

