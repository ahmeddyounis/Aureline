  - id: docs_same_change_set_policy
    title: Docs / help / migration same-change-set, stale-example, and late-proof exception policy
    canonical_location: docs/docsops/same_changeset_policy.md
    overview_page: docs/docsops/same_changeset_policy.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Canonical narrative policy binding the same-change-set
      workflow, stale-example detection rubric, and late-proof
      exception path together so public truth moves with product
      truth instead of lagging behind until beta or stable
      hardening. Names the nine change classes (product behavior
      change, schema version bump, route change, migration step,
      claim row change, known-limit change, compatibility scope
      change, service-health state change, lifecycle transition)
      whose in-train pairing is required on specific docs / help /
      release-note surfaces, plus the six artifact kinds the
      stale-example rubric covers (docs-pack examples, guided
      steps, migration guides, screenshots, recipes, generated
      examples) and the six action classes (label_stale_with_
      reason, label_needs_review, quarantine_example, suppress_
      from_surface, block_pack_publishable, require_late_proof_
      exception_packet) that detectors map to. Late-proof
      exception packets compose with late-copy packets: late-copy
      governs what the text says, late-proof governs what proof
      backs it and when the proof will land. Layers on top of the
      reviewed-pack / late-copy policy, the docs-pack manifest
      contract, the claim-manifest contract, the public-surface
      source-of-truth map, the change-budget workflow, the
      evidence-freshness policy, and the release promotion-gate
      map instead of replacing them. Implementing a full docs
      publishing system, localization workflow automation, CMS
      integration, and automated emission of exception packets
      from release tooling are named explicitly out of scope at
      this revision.

  - id: stale_example_detection_rubric
    title: Stale-example detection rubric and downgrade map
    canonical_location: artifacts/docs/stale_example_rules.yaml
    overview_page: docs/docsops/same_changeset_policy.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Canonical machine-readable register binding every detector
      on every covered artifact kind to exactly one action class
      and exactly one primary stale-reason class, with an
      applies_on_same_change_set list of pairing rows the
      detector ties into. Fifteen seeded detectors cover docs-pack
      example target-symbol moves, behavior changes, lifecycle
      moves, policy-blocked contexts, stale-threshold exceeded
      packs, guided-step target-missing / policy-blocked cases,
      migration-guide step supersession and known-limit widening,
      screenshot surface-anchor moves and route changes, recipe
      step-target moves and schema drift, generated-example
      contract mismatches and source withdrawal, and the
      composite release-bearing-needs-late-proof-exception
      detector that routes into the late-proof exception packet
      family. Re-exports the docs_pack_manifest stale_example_
      reason vocabulary verbatim and extends it with detector-
      scoped reasons (route_changed, schema_drift, screenshot_
      chrome_moved, recipe_step_target_moved, guided_step_target_
      moved, generator_contract_mismatch, migration_step_
      superseded, known_limit_note_added_or_widened). Override
      rules forbid silent widening, require release-bearing
      overrides to pair with a late-proof exception packet, and
      require every override to declare an expiry. Projection
      targets cover the docs-pack manifest example_summary, the
      cross-surface parity audit, the support-export preview, and
      the shiproom dashboard.

  - id: late_proof_exception_packet_schema
    title: Late-proof exception packet schema
    canonical_location: schemas/docs/late_proof_exception_packet.schema.json
    overview_page: docs/docsops/same_changeset_policy.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      JSON Schema 2020-12 contract for the late_proof_exception_
      packet family. additionalProperties false everywhere and
      allOf gates force every packet to carry the docs_public_
      truth_owner and release_owner reviewers, each cause class
      (benchmark_proof_deferred, compatibility_proof_deferred,
      migration_evidence_deferred, docs_pack_refresh_deferred,
      support_export_preview_deferred, claim_evidence_alignment_
      deferred) to carry its named proof-owner reviewer, non-
      trivial support-impact to carry the support_owner reviewer,
      approved / active / proof_landed / expired / superseded
      status to carry an approved_at timestamp, active / proof_
      landed / expired / superseded status to carry an activated_
      at timestamp, proof_landed status to carry a proof_landed_at
      timestamp plus at least one target_proof_evidence_ref with
      reversal_class = land_proof_and_drop_exception, withdrawn
      status to carry a withdrawn_at timestamp, superseded status
      to carry a successor_packet_ref plus reversal_class =
      supersede_with_new_exception, hold_until_proof_lands
      degraded posture to pair with a land_proof_and_drop_
      exception or supersede_with_new_exception reversal, and
      render_known_limit_route degraded posture to pair with one
      of withdraw_claim_and_route_to_known_limit, land_proof_
      and_drop_exception, or supersede_with_new_exception.
      Compatibility-proof-deferred packets must declare a non-
      empty impacted_compat_rows list; docs-pack-refresh-deferred
      packets must declare a non-empty impacted_docs_packs list.
      Adding a cause class, reversal class, surface id, detector
      linkage, status value, review role, degraded-wording
      posture, support-impact class, or optional field is
      additive-minor and bumps late_proof_exception_packet_
      schema_version; repurposing an existing value is breaking
      and requires a new decision row.

