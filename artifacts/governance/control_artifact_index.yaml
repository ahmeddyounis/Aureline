  - id: companion_surface_contract
    title: Browser / mobile companion surface scoped-capability, notification, and offline-triage contract
    canonical_location: docs/companion/companion_surface_contract.md
    overview_page: docs/companion/companion_surface_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: support_export
    review_cadence: each_change
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Canonical narrative contract for browser / mobile companion
      surfaces (browser web companion, browser extension, mobile
      native app, mobile web PWA, embedded inspection widget).
      Freezes companion surfaces as scoped, no-bypass clients of the
      desktop hero product so later browser / mobile work cannot
      silently become a parity shortcut around the desktop. The
      manifest pins a closed list of allowed canonical objects, a
      closed list of scoped allowed actions, an authentication
      posture, a step-up requirement, a freshness / offline posture,
      a notification policy, a quiet-hours inheritance rule, a
      target-attach posture, and a non-empty no-bypass rule set
      covering forbid_local_shell_or_kernel_launch_on_companion,
      forbid_widening_authority_beyond_remote_managed_path,
      forbid_minting_private_canonical_event_id,
      forbid_minting_private_dismissal_alias,
      forbid_minting_private_redaction_pass,
      forbid_minting_private_audit_event_id,
      forbid_silent_lock_screen_widening,
      forbid_silent_quiet_hours_widening,
      forbid_companion_only_approval_lineage_separate_from_desktop,
      forbid_pseudo_live_parity_against_offline_or_stale_object,
      forbid_raw_secret_or_token_persistence_on_companion, and
      forbid_companion_initiated_provider_mutation_outside_desktop_envelope.
      Companion approvals, comments, and acknowledgments reuse the
      same approval-ticket id, canonical_event_id, and audit_event_id
      rows as the equivalent desktop flow. Notification and quiet-
      hours behavior reuses the desktop canonical_event_id and
      suppression-reason set. Offline triage snapshots fail closed
      at captured_local_only_pending_drain until the desktop admits
      the drain through a typed envelope.

