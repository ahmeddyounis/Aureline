      model for in-context contextual tip cards, migration bridge
      cards, why-unavailable explainers, and source-language
      fallback surfaces. Freezes the requirement that teaching
      surfaces appear next to the blocked or unfamiliar action,
      carry a typed trigger, owning boundary, concrete command /
      docs / file / symbol / migration / policy / locale / source
      references, deeper-doc pivots, dismiss and snooze rules,
      quiet-hours behavior, presentation-mode behavior, and a
      reversal path through Help, the command palette, settings,
      migration-center restore, source-language toggle, or policy
      admin ownership. Defines imported behavior domains
      (keymaps, settings, snippets, task_configs, extension_
      bridges) and states (native, bridge, shimmed, partial,
      unsupported) so migration cards describe actual portability
      posture rather than hiding limits behind generic success
      copy. Requires source-language fallbacks to preserve
      requested / effective / source locale, canonical message id,
      docs/help anchor, open-source-language action, and stable
      identity. Requires every surface to preserve trust prompts,
      policy review, permission disclosure, write-scope preview,
      and explain-vs-do separation.

