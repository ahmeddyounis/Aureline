  - id: git_state_and_worktree_contract
    title: Git local-vs-provider truth, branch / worktree / history / stash contract
    canonical_location: docs/vcs/git_state_and_worktree_contract.md
    overview_page: docs/vcs/git_state_and_worktree_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative cross-tool contract binding every Git-aware surface
      (branch picker, change-stack strip, source-control panel,
      worktree picker, in-progress-operation banner, branch-switch
      and worktree-removal review sheets, AI branch-agent panel,
      support / export bundle's git section, audit lane) to one
      branch_row_record, one stash_row_record, one worktree_row_
      record, and one history_operation_state_record. Local Git
      truth is authoritative; provider PR / MR overlays appear
      visually secondary only. Pairs with the change-stack contract
      (docs/vcs/change_stack_contract.md) for change-object identity
      under each branch and with the review-workspace contract
      (docs/vcs/review_workspace_contract.md) for the provider
      overlay row a branch row layers on. Reviewers can answer
      where a change lives, which working directory owns it,
      whether there are unpublished commits, and how to recover
      before switching / removing / rebasing; worktree removal
      cannot blur metadata-only removal, filesystem deletion, and
      path-preserve behaviour behind one generic action; sparse /
      cone / partial-clone surfaces label cleanliness honestly;
      stash apply against a drifted base is mechanically forbidden;
      and in-progress merge / rebase / cherry-pick / revert /
      mailbox-apply / bisect operations escalate cleanly through
      the conflict-handoff class re-exported from the change-stack
      contract. Reserves merge_conflict_class_record_id_ref and
      history_edit_recovery_record_id_ref forward-dependency slots
      that become required non-null when the merge / conflict-class
      contract and the dedicated history-edit recovery contract
      land.

  - id: branch_row_schema
    title: Branch-row, stash-row, and remote-tracking boundary schema
    canonical_location: schemas/vcs/branch_row.schema.json
    overview_page: docs/vcs/git_state_and_worktree_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Cross-tool boundary schema for the branch_row_record,
      stash_row_record, and branch_row_audit_event_record shapes
      frozen in docs/vcs/git_state_and_worktree_contract.md.
      additionalProperties false everywhere. allOf gates pair
      tracking branch_class values (in_sync / ahead / behind /
      diverged / gone_upstream_deleted) with a non-null remote_
      tracking_envelope and pair non-tracking values (local_branch_
      no_remote_tracking / detached_head_state_no_branch_label /
      imported_or_synthetic_branch_label) with null. local_branch_
      tracking_remote_ahead is forced to pair with unpublished_
      commits_present_local_only; local_branch_tracking_remote_
      diverged is forced to pair with unpublished_commits_present_
      diverged_with_remote. unpublished_commits_present_* risk
      classes are forced to resolve branch_recovery_action_class
      to a non-recovery_no_action_required value (denies with
      branch_recovery_action_required_for_unpublished_commits).
      open_action_blocked_pending_in_progress_operation_resolution
      is forced to cite the bound worktree's in_progress_history_
      operation_state_id_ref. The provider_overlay_visual_secondary
      block is optional; when omitted, no provider chip may render
      (denies with provider_overlay_chip_required_overlay_record);
      when present, the chip is mechanically secondary (denies
      with provider_overlay_must_not_replace_local_branch_label
      on any surface that renders the overlay as the primary
      label). Stash rows are forced to cite a non-null base_
      branch_or_worktree_ref and base_revision_id_ref so apply
      against a drifted base is forbidden silently (denies with
      stash_base_ref_required_for_apply_admission); stash_archived
      _tombstone is forced to cite a non-null archived_at and null
      otherwise; stash_applied_consumed and stash_dropped_explicit
      _user_action are forced to cite a non-null approval_ticket_
      ref. Adding a new record_kind, branch class, unpublished-
      commit-risk class, remote-tracking-freshness class, workset-
      cleanliness class, provider-overlay visual-secondary class,
      branch-recovery-action class, branch-open-action class,
      stash class, stash-lifecycle state, denial reason, or audit-
      event id is additive-minor and bumps branch_row_schema_
      version; repurposing an existing value is breaking and
      requires a new decision row.

