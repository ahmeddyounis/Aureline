  - id: prompt_composer_contract
    title: AI prompt-composer plan, request-workspace, and prompt/tool-pack manifest contract (narrative)
    canonical_location: docs/ai/prompt_composer_contract.md
    overview_page: docs/ai/prompt_composer_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative contract binding every composer_plan_ref, every
      request_workspace_ref, and every prompt-pack / tool-pack a
      composer session cites to one governed record on one of three
      boundary schemas so every AI turn (inline-completion, explain,
      review, patch, test-generation, refactor, doc-generation,
      diagnostic-triage, background branch-agent, review-handoff,
      support-replay) is reconstructible from evidence alone.
      Freezes the plan shape (ordered sections with typed section_role
      / admission_policy_class / section_budget_policy_class /
      omission_reason_default_class; pinned segment refs; repo-defined
      instruction and check bundle refs; admitted source_class /
      trust_posture / data_class / provider_class / route_path_class /
      retention_stance_class sets; tool allowlist / denylist under a
      tool_narrowing_posture_class; redaction_class; plan-lifecycle
      state), the request-workspace shape (one flow_class + one
      scope_filter_class + one isolation_posture_class + one
      privacy_export_posture_class + one
      retention_stance_within_workspace_class + admitted data-class
      allowlist; typed working-set bindings; typed evidence links;
      lifecycle state), and the prompt-pack / tool-pack manifest shape
      (stable pack_id + pack_version_label + optional content_digest +
      publisher_class + publisher_identity_ref + signing_posture_class
      + signing_evidence_reference + rollout_state_class + typed
      compatibility_window + typed changelog_entries + supersedes /
      replacement pack refs). Establishes the narrowing-only discipline
      (plans, repo bundles, workspaces, and packs MAY narrow the policy
      bundle's admitted sets but MAY NOT widen; widening denies with
      plan_attempted_widening,
      workspace_privacy_posture_widening_forbidden, or the matching
      axis-typed reason), the reviewer-reconstruction invariant (every
      evidence packet MUST echo plan id + plan version + pack id +
      pack version + workspace id so the ordered sections, admitted
      sets, pinned segments, fenced tainted data slot, and repo
      bundles a turn composed are reconstructible without reading the
      final model response), the replay / downgrade explanation rule
      (pack changelog_entries name exactly one changelog_entry_class so
      support tooling can explain a downgrade mechanically), the
      tainted-placement invariant (fenced_tainted_data_block is the
      only section permitted to host tainted segments; misplacement
      denies with tainted_segment_placed_outside_fenced_section), the
      same-as-native approval / policy / audit invariant (every tool
      the plan admits still rides the external-tool invocation
      disclosure and the approval-ticket path without bypass), the
      credential_handle_denied_always / secret_projection_denied_always
      invariant (these data classes remain on every plan's and every
      workspace's denied-always set regardless of narrowing mode), and
      the additive-minor change discipline for every enum / record
      kind. Re-exports segment_class / source_class / trust_posture /
      omit_reason / block_reason / redaction_reason /
      tainted_fence_strategy / tainted_usage_constraint /
      instructional_role / mention_kind / attachment_kind /
      turn_draft_state / dispatch_target_class / provider_class /
      route_path_class / cost_visibility_class /
      instruction_bundle_kind / check_bundle_kind / tool_call_outcome
      from schemas/ai/context_assembly.schema.json, data_class /
      retention_stance_class / execution_locus_class / transport_class
      / auth_mode_class / supported_feature_class / region_posture_class
      / quota_family_class / approval_posture_class from
      schemas/ai/provider_registry.schema.json, scope_filter_class from
      schemas/runtime/execution_context.schema.json,
      deployment_profile_class / policy_context from
      schemas/identity/policy_bundle.schema.json, and redaction_class /
      freshness_class / client_scope from
      schemas/governance/capability_lifecycle.schema.json without
      redefinition. Implementing a prompt-composer UI, a pack-signing
      pipeline, a pack-distribution channel, a live request-workspace
      / patch-draft / review-thread / terminal-transcript binding
      runtime, authoring concrete prompt text, and pinning concrete
      provider / model pairings are named explicitly out of scope at
      this revision.

