  - id: model_graduation_and_budget_contract
    title: AI graduation packet, rollout-state, and spend-routing contract (narrative)
    canonical_location: docs/ai/model_graduation_and_budget_contract.md
    overview_page: docs/ai/model_graduation_and_budget_contract.md
