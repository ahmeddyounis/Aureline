  - id: preview_runtime_contract
    title: Preview-runtime, source-mapping confidence, and stale-editability contract
    canonical_location: docs/architecture/preview_runtime_contract.md
    overview_page: docs/architecture/preview_runtime_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: governance_packets
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative contract binding every static preview, live preview,
      inspectable tree/overlay, and visual-edit surface across the
      browser, native, and embedded preview lanes to one
      preview_snapshot_record that projects preview-mode + preview-
      lane + runtime identity + source revision + data/mock provenance
      + freshness + sandbox posture + target environment + device
      target + source-sync state + mapping confidence + stale-
      editability + hot-reload state + transform manifest + canonical-
      source resolution + effective allowed actions + blocked actions
      + downgrade triggers + share-sheet block into one inspectable
      record. Names the four preview modes (static_preview, live_
      preview, inspectable_tree_overlay, visual_edit), the three
      preview lanes (browser_preview_lane, native_preview_lane,
      embedded_preview_lane), the six mapping-confidence classes
      (exact_source_mapping, approximate_mapping, stale_mapping,
      unmappable_node_present, runtime_only_no_source_mapping,
      unknown_mapping), the six stale-editability classes (fully_
      editable_through_mapped_edits, inspect_only_due_to_mapping_
      uncertainty, inspect_only_due_to_stale_runtime, export_only_
      due_to_runtime_unavailable, frozen_until_resync, frozen_due_
      to_policy_or_trust), the six reserved hot-reload states
      (applied, partial, restart_required, rebuild_required, failed,
      unavailable), the seven device-target classes that distinguish
      a viewport preset from an actual browser/device target, the
      five source-sync states (source_in_sync, source_drifted_since_
      render, source_revision_unknown, source_revision_redacted,
      source_unmappable_for_runtime), and the share-sheet extension
      point (visibility_class, auth_class, revoke_path_class). Re-
      exports the safe-preview trust-class, connectivity-state, and
      downgrade-trigger ladder from schemas/security/trust_class.
      schema.json, the artifact-edit-posture origin / provenance /
      default-edit vocabulary from schemas/generated/artifact_edit_
      posture.schema.json, and the execution-context record ref from
      schemas/runtime/execution_context.schema.json by reference
      without redefinition; adds nine preview-specific downgrade
      triggers (source_revision_drifted, framework_adapter_revision_
      changed, preview_runtime_restart_required, preview_runtime_
      rebuild_required, preview_runtime_unavailable, device_target_
      mismatch, mock_data_set_changed, captured_replay_expired,
      mapping_invalidated_by_hot_reload). The contract requires a
      transform-manifest and rollback-checkpoint reference for any
      mapped edit or visual-edit flow that claims source-safe
      mutation, requires preview surfaces to disclose source sync,
      device target, and hot-reload state in the same language
      across browser, native, and embedded lanes, and forces a
      stale or partial preview to degrade to inspect-only or
      export-only without hiding why source-to-runtime mapping is
      incomplete. Building any live preview runtime, framework
      adapter, hot-reload pipeline, or visual designer is named
      explicitly out of scope at this revision.

