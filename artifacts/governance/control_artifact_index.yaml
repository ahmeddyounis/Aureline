  - id: benchmark_run_result_schema
    title: Benchmark-lab run-result boundary schema
    canonical_location: schemas/benchmarks/run_result.schema.json
    overview_page: docs/benchmarks/benchmark_lab_run_results.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Draft/2020-12 boundary schema for one benchmark-lab run-result
      record. Pins every record to a single exact-build identity, a
      single protected corpus-manifest revision, a single
      fitness-function catalog revision, a single hardware-
      definition ref, and a single benchmark-environment definition
      ref. Freezes closed vocabularies for run context
      (reference_capture / provisional_capture / self_capture /
      smoke_subset), comparability class (comparable_to_baseline /
      comparable_to_prior_run_same_host / not_yet_comparable /
      quarantined), quarantine reason, measurement status, row
      result, trend direction, threshold mode, SLI kind, data-source
      kind, lane class, trigger kind, and
      regression_trigger_ref.kind (threshold_exceeded /
      boolean_gate_failed / ratio_below_floor / corpus_row_missing /
      trace_schema_nonconforming / ad_hoc_metric_name_observed /
      toolchain_pin_drift / hardware_definition_mismatch /
      fitness_catalog_row_status_provisional). Every fail or warn
      row MUST carry exactly one regression_trigger_ref so later
      support-bundle, shiproom, and waiver-register consumers do not
      retrofit regression attribution ad hoc. Record_kind
      discriminator keeps the family composable with other packet
      families on a shared parser. Normative companion in
      docs/benchmarks/benchmark_lab_run_results.md.

