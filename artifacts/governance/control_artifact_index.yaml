      contract.md), the consent-retention contract (docs/
      collaboration/consent_retention_contract.md), the approval-
      ticket ADR (0010), the workspace-trust ADR (0018), the
      remote-agent contract (ADR-0020), the terminal-protocol and
      clipboard ADR (0021), the layout-serialization contract, the
      secret-broker redaction posture (ADR-0007), and the
      capability-lifecycle vocabularies (ADR-0011). Implementing
      collaboration transport, a shared terminal emulator, a
      shared debug adapter, a runbook engine, a notebook-kernel
      sharing protocol, a shared build-task runner, presenter-
      broadcast UI flows, and live-follow UX are named explicitly
      out of scope at this revision.

