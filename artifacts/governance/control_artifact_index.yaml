      host / provider-tenant / provider-issue / actor /
      approval-ticket / consequence-preview / queue-item /
      browser-handoff packet / callback-envelope / change-
      object / patch-stack / review-workspace / review-
      pack / review-evaluation-result / support-bundle /
      incident-workspace / object-handoff / freshness-
      floor / policy-epoch / execution-context handles
      plus monotonic placeholder timestamps and redaction-
