  - id: time_semantics_contract
    title: Cross-surface time-semantics, clock-source, and timezone/skew contract (narrative)
    canonical_location: docs/governance/time_semantics.md
    overview_page: docs/governance/time_semantics.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative companion that binds logs, metrics, traces, task
      events, incident timelines, history rows, chronology
      exports, support bundles, AI evidence packets, and
      publication proofs to one explainable time model. Fixes
      the six questions every envelope MUST answer (canonical UTC
      wall-clock storage, monotonic reference with
      monotonic_epoch_ref, clock_source_class,
      clock_sync_state_class plus measured skew when declared,
      partial_order_label_class, and import_origin_class with a
      declared import window), pins canonical_export_time_zone_
      class = utc as a closed-world constraint so exporters
      cannot silently widen to a local zone, names the rules for
      relative-time and absolute-time display across observability
      and chronology surfaces, and reserves a denial-reason set
      and a forbidden-phrase set ("just now", "a moment ago",
      "recently", "in real time", "as of now", "last known",
      "seen around") that drift scans MUST catch. Implementation
      of OS time synchronization, NTP peer configuration, and
      external observability infrastructure is explicitly out of
      scope at this revision.

