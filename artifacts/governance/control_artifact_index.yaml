  - id: memory_and_reconciliation_contract
    title: AI memory, embedding-store invalidation, delete / export, and offline-reconciliation contract (narrative)
    canonical_location: docs/ai/memory_and_reconciliation_contract.md
    overview_page: docs/ai/memory_and_reconciliation_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative contract binding every AI-derived row that survives
      the active turn — conversation history, derived caches,
      embeddings, memory rows, retained evidence-packet copies, and
      explicit user-saved memory — to one governed row on one
      boundary schema so AI memory does not become a hidden
      retention layer that violates local-first truth, delete
      honesty, or offline behavior. Freezes the seven-class memory
      matrix (turn_state_ephemeral, conversation_history_user_
      visible, derived_cache_regeneratable, embedding_row_
      regeneratable, reusable_repo_fact_workspace_scope, retained_
      evidence_packet_copy, explicit_saved_memory_user_owned), the
      five-value storage_authority_class set, the six-value delete-
      posture set, the six-value export-posture set, the six-value
      retention-posture set, the sixteen-trigger invalidation
      vocabulary (model_identity_changed, embedder_identity_changed,
      prompt_pack_changed, tool_pack_changed, workspace_trust_
      changed, workspace_identity_changed, policy_epoch_rolled,
      retention_policy_changed, delete_request_received, manual_
      admin_invalidation, schema_version_bumped, eligibility_
      revoked_pack_quarantined, eligibility_revoked_provider_
      disabled, eligibility_revoked_workspace_trust, eligibility_
      revoked_policy, rollout_state_demoted_or_withdrawn), the six-
      outcome invalidation set (row_invalidated_and_purged, row_
      invalidated_and_marked_for_regeneration, row_quarantined_
      pending_review, row_partially_invalidated_subsegment, row_
      blocked_on_hold_invalidation_deferred, row_left_intact_
      invalidation_not_required), the per-class delete-request
      shape with one row per affected ai_memory_class plus a
      preserved_reason_class on every preserved class, the per-
      class export-assembly shape with one row per included class
      plus an exclusion_reason_class on every excluded class, the
      seven-kind deferred-intent vocabulary (provider_call_
      invocation, tool_call_invocation, agent_step_invocation,
      evidence_packet_dispatch, memory_row_invalidation_cascade,
      embedder_reindex_invocation, mutation_journal_replay_
      invocation), the eight-state reconciliation vocabulary
      (queued_pending_send, queued_blocked_on_eligibility, queued_
      blocked_on_hold, queued_revalidate_before_send_required,
      replay_forbidden_against_changed_environment, fully_
      reconciled_completed, fully_reconciled_dropped_with_typed_
      disclosure, fully_reconciled_superseded_by_newer_intent),
      the bound-environment-pin shape recorded at queue time, the
      mutating-action narrowing rule (mutating_intent_replay_
      against_changed_binding_forbidden when the binding shifted),
      the agent-chained-invocation full-environment-revalidation
      requirement, the silent-send-against-changed-environment-
      forbidden invariant on every reconciliation outcome other
      than sent_against_unchanged_environment, the redaction
      posture (raw conversation text, raw prompt bodies, raw
      retrieved-document bodies, raw tool return bytes, raw
      embedding vectors, raw URLs, raw paths, raw user identifiers,
      raw billing-account ids, raw API keys, raw OAuth tokens, raw
      mTLS material, raw model weights, raw pack bytes, and raw
      provider payloads never cross either boundary on any
      surface), the dual audit streams (ai_memory and ai_deferred_
      intent), and the additive-minor change discipline. Composes
      with — does not replace — the AI context-assembly,
      evidence-replayability, provider / model registry, prompt-
      composer, and graduation-packet contracts; the ai_retained_
      evidence_packet record-class governs retained evidence-packet
      copies; the runtime storage-classes artifact governs the
      authority axis. Building the live memory store and the live
      synchronization engine for the deferred-intent outbox is
      named explicitly out of scope at this revision.

