      (owner_revoked, approver_revoked, policy_revoked, admin_
      signed_revocation, session_ended_auto_revocation, approval_
      ticket_expired, workspace_trust_narrowed, relay_outage_non_
      replayable, grantee_released_voluntary, session_transport_
      dropped_non_replayable); and the immediate-and-non-replayable
      revocation invariants (revocation_immediate_authority_
