      and work_item_detail_audit_event_record shapes frozen in
      docs/work_items/work_item_contract.md. additionalProperties
      false everywhere. allOf gates pair authority class with
      the matching engineering-artifact relation ref (imported
      _handoff_evidence_only ↔ linked_offline_handoff_packet_
      record_id_ref, queued_publish_local_authored ↔ linked_
      publish_later_queue_item_record_id_ref, linked_review_
      only_no_provider_overlay ↔ linked_review_workspace_record
      _id_ref or linked_review_pack_record_id_ref), pair
      publish_preview_pinned_provider_consequence_preview_record
      with a non-null consequence-preview ref, pair change-
      intent classes with their matching change_object / patch
      _stack refs, and pair freshness lanes (local_draft_never
      _published, imported_snapshot_no_refresh_path) with the
      matching authority class. Re-exports provider_actor_class
      from schemas/integration/browser_handoff_packet.schema.
      json and schemas/providers/publish_later_record.schema.
      json, redaction_class from ADR-0010 / ADR-0007, and
      composes with the upstream review-workspace, review-pack,
      review-evaluation-result, change-object, patch-stack,
      object-handoff, and publish-later schemas through opaque
      record_id_refs without redefinition. Adding a new record
      _kind, work_item_authority_class, freshness_class, state
      _value_origin_class, write_authority_class, issue_to_
      branch_link_class, linked_review_class, change_intent_
      class, validation_evidence_class, publish_preview_class,
      denial_reason, or audit_event_id is additive-minor and
      bumps work_item_detail_schema_version; repurposing an
      existing value is breaking and requires a new decision row.

  - id: status_transition_packet_schema
    title: Work-item status-transition packet boundary schema
    canonical_location: schemas/work_items/status_transition_packet.schema.json
    overview_page: docs/work_items/work_item_contract.md
