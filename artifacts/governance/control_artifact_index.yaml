  - id: fitness_function_catalog
    title: Protected fitness-function catalog
    canonical_location: artifacts/bench/fitness_function_catalog.yaml
    overview_page: docs/benchmarks/fitness_function_catalog.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Single machine-readable register of every protected fitness
      function the benchmark lab, journey harness, release-evidence
      shiproom packets, and performance-council waiver log resolve
      against by stable id. Seeded rows cover warm start, first
      paint, input-to-paint, buffer operations and undo-class
      correctness, VFS save / conflict handling, and benchmark-lab
      operational health. Provisional rows reserve ids for power /
      thermal posture, restore fidelity (reusing the onboarding
      measurement plan's restore_fidelity_match_rate metric name),
      and command-graph parity. Every row carries owner DRI, owning
      lane from ownership_matrix.scorecard_lane_index, architecture
      drivers and principles from TAD §3.2 and §4.1, at least one
      protected journey from the spike-metric-names and corpus-
      manifest vocabularies, exactly one protected SLO family, a
      threshold (numeric or to_be_set_by_benchmark_council), a data
      source (concrete or to_be_wired_by_benchmark_council with a
      completion_owner), waiver authority (performance_council plus
      a co-signing lane DRI per dri_map.md §Authority), waiver rules
      with default_expiry_window_days and renewal-under-correction-
      programme rule, review cadence, linked ADRs, and linked
      decisions. The catalog carries a packet_export_shape block
      that benchmark-report and shiproom packets consume as the
      fitness_function_snapshot contract, and a slices block that
      indexes every row by driver, principle, journey, waiver
      authority, and SLO family without building a parallel
      scoreboard. Benchmark-council authority over threshold
      promotion and waivers is set by the benchmark-council charter
      §3 and dri_map.md §Authority.

  - id: benchmark_run_result_schema
    title: Benchmark-lab run-result boundary schema
    canonical_location: schemas/benchmarks/run_result.schema.json
    overview_page: docs/benchmarks/benchmark_lab_run_results.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Draft/2020-12 boundary schema for one benchmark-lab run-result
      record. Pins every record to a single exact-build identity, a
      single protected corpus-manifest revision, a single
      fitness-function catalog revision, and a single hardware-
      definition ref. Freezes closed vocabularies for run context
      (reference_capture / provisional_capture / self_capture /
      smoke_subset), comparability class (comparable_to_baseline /
      comparable_to_prior_run_same_host / not_yet_comparable /
      quarantined), quarantine reason, measurement status, row
      result, trend direction, threshold mode, SLI kind, data-source
      kind, lane class, trigger kind, and
      regression_trigger_ref.kind (threshold_exceeded /
      boolean_gate_failed / ratio_below_floor / corpus_row_missing /
      trace_schema_nonconforming / ad_hoc_metric_name_observed /
      toolchain_pin_drift / hardware_definition_mismatch /
      fitness_catalog_row_status_provisional). Every fail or warn
      row MUST carry exactly one regression_trigger_ref so later
      support-bundle, shiproom, and waiver-register consumers do not
      retrofit regression attribution ad hoc. Record_kind
      discriminator keeps the family composable with other packet
      families on a shared parser. Normative companion in
      docs/benchmarks/benchmark_lab_run_results.md.

  - id: benchmark_lab_dashboard_seed
    title: Benchmark-lab dashboard seed
    canonical_location: artifacts/benchmarks/dashboard_seed/
    overview_page: docs/benchmarks/benchmark_lab_run_results.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Seed dashboard baseline covering two reference run records plus
      the rolled-up dashboard.json snapshot. The self_capture record
      (benchmark_run.seed.self_capture) carries a row per protected
      fitness function in artifacts/bench/fitness_function_catalog.yaml,
      three pass rows for the seeded data sources (buffer_operations,
      vfs_save_conflict_handling, benchmark_lab_health) and six
      provisional rows for the catalog's reserved ids. The regression
      record (benchmark_run.seed.regression_example) intentionally
      trips ff.benchmark_lab_health with
      regression_trigger_ref.kind = corpus_row_missing so the lane
      can demonstrate the failure path end to end. Every run record
      and markdown report is byte-stable under SOURCE_DATE_EPOCH / TZ
      / LC_ALL pinning; tools/benchmark_lab_emit.py --verify-seed
      re-emits under a tempdir and unified-diffs against the
      committed files so seed drift fails the nightly lane before any
      benchmark work runs. The committed seed is self_capture, NOT
      admissible as release-evidence input; a reference capture
      requires a benchmark-council-approved hardware baseline.

  - id: nightly_benchmark_ci_lane
    title: Nightly benchmark-lab CI lane
    canonical_location: .github/workflows/nightly_benchmark.yml
    overview_page: docs/benchmarks/benchmark_lab_run_results.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      GitHub Actions workflow scheduled on a daily cron and available
      on workflow_dispatch. Runs verify_seed first so committed-seed
      drift fails before the lab does any benchmark work, then drives
      tools/benchmark_lab.sh with the selected corpus_subset /
      run_context / lane / trigger. Uploads the raw/*.json run
      record, report/*.md human-readable summary, and dashboard.json
      snapshot as a workflow artifact. The lane is the single entry
      point CI and a developer running ./tools/benchmark_lab.sh
      share, so the build, corpus selection, and report shape stay
      identical across lanes. The workflow_dispatch regression_demo
      input exercises the failure path end to end; the lane exits
      non-zero after writing the record so the workflow's failure
      signal is authoritative.

  - id: journey_trace_schema
    title: Protected user-journey trace boundary schema
    canonical_location: schemas/traces/journey_trace.schema.json
    overview_page: docs/benchmarks/journey_trace_taxonomy.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Draft/2020-12 boundary schema for one protected user-journey
      trace record the journey harness emits for startup, shell open,
      placeholder file open / edit / save, and restore-adjacent flows.
      Layers over the spike-timing trace: every checkpoint and segment
      carries a protected_journey token from the same closed
      vocabulary as schemas/traces/spike_timing.schema.json and
      fixtures/benchmarks/corpus_manifest.yaml. Pins each record to
      one fixture id, one corpus-manifest revision, one minimum
      build-identity record, one degraded_posture, and one
      fallback_posture, with reserved nullable slots for
      hardware_definition_ref, environment_ref,
      exact_build_identity_ref, linked_spike_trace_refs,
      evidence_refs, and requirement_refs so reference-capture,
      release-evidence, and requirement-linkage lanes attach without
      a schema version bump. Freezes closed vocabularies for
      journey_class, checkpoint_class, segment_class,
      degraded_posture_class, fallback_posture_class, and
      backend_class. Normative companion in
      docs/benchmarks/journey_trace_taxonomy.md.

  - id: journey_harness_tool
    title: Protected user-journey trace harness
    canonical_location: tools/journey_harness.sh
    overview_page: docs/benchmarks/journey_trace_taxonomy.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Reproducibility-pinned harness (Bash wrapper plus Python stdlib
      emitter at tools/journey_harness/journey_harness.py) that emits
      one journey_trace_record per seeded journey conforming to
      schemas/traces/journey_trace.schema.json. The wrapper exports
      SOURCE_DATE_EPOCH, TZ=UTC, and LC_ALL=C so reruns on the same
      commit produce byte-stable output; the emitter uses synthetic
      monotonic ticks (0..N) so committed fixtures stay byte-stable
      across hosts. Resolves fixture_ref against the committed
      corpus manifest on every emit and fails loudly on an unknown
      id or an unresolved checkpoint / segment reference. --verify-seed
      re-emits the seeded set under a tempdir and unified-diffs
      against fixtures/journeys/ so seed drift fails the check before
      any later lane admits the record.

  - id: journey_trace_seed
    title: Protected user-journey trace seeds
    canonical_location: fixtures/journeys/
    overview_page: docs/benchmarks/journey_trace_taxonomy.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Three committed seed journey traces covering
      journey.startup_to_first_useful_chrome.micro_local_folder
      (linked to the shell-spike full-scene aggregate trace),
      journey.open_edit_save.first_useful_edit_rust_self_host
      (placeholder open / edit / save with save-pipeline and
      recovery-journal-write segments), and
      journey.restore_adjacent.restore_last_session_compatible
      (explicit degraded_transition and fallback_transition
      checkpoints, with degraded_posture
      missing_target_recovered_to_compatible and fallback_posture
      recovery_journal_replay_active). Each fixture_ref resolves
      against fixtures/benchmarks/corpus_manifest.yaml at the
      named manifest_revision. The committed seed is stamped with
      host_os=linux and rustc_target_triple=unknown-linux-gnu so
      developer-local regeneration on macOS or Windows rewrites
      only those two fields while the rest stays byte-stable.
      Emitted journeys are measurement backbone only; they are not
      themselves admissible as release-evidence input.

  - id: no_account_switching_scoreboard_seed
    title: No-account switching scoreboard seed
    canonical_location: artifacts/product/no_account_switching_scoreboard_seed.yaml
    overview_page: docs/product/onboarding_measurement_plan.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Seed scoreboard qualifying three row families: no-account
      local work (capabilities reachable with no account on the
      individual_local deployment profile, citing local_core
      boundary rows); service-opt-in boundary outcomes (decline-
      without-degradation claim against each opt-in prompt
      boundary row); and intentionally narrowed startup / import
      capability (narrowing-advertised claim at restore prompts,
      recent-work missing targets, air-gapped first run, and
      migration blocked-item reasons). Threshold values are
      deliberately left as "to_be_set_by_benchmark_council" at
      this milestone; promotion is reserved to the benchmark-
      council charter.

  - id: install_topology_plan
    title: Install-topology, fleet-ring, and state-root mapping plan
    canonical_location: docs/release/install_topology_plan.md
    overview_page: docs/release/install_topology_plan.md
    owner_dri: "@ahmeddyounis"
    owning_lane: release_evidence
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Pre-implementation plan for Aureline's install topology,
      per-channel separation rules, fleet-ring promotion ladder,
      and state-root mapping. Freezes the
      install_profile_card_record shape every release, fleet,
      About / Help, support-bundle, and diagnostics surface reads
      and the closed vocabularies for install mode, channel,
      updater owner, binary root, durable state root, side-by-
      side relation, rollback target, diagnostics export,
      rollout ring, silent-install support, managed-package
      report, publication posture, policy injection, and return-
      code family. Pins the per-channel separation rules for
      state roots, update markers, recent-item registration,
      file associations, and deep-link / protocol-handler
      ownership so no side-by-side row silently corrupts another
      row's state markers. Names the canary / pilot / broad /
      lts rollout ring vocabulary with minimum promotion
      evidence and admissible rollback target per ring. Pairs
      with artifacts/release/install_topology_matrix.yaml,
      artifacts/release/state_root_map.yaml, and
      artifacts/release/silent_deployment_seed.yaml. No
      installer, updater, or fleet tooling is implemented at
      this milestone; the plan is the vocabulary and row shape
      layer every later release-engineering, continuity, fleet-
      rollout, desktop-affordance, and endpoint-posture lane
      composes over.

  - id: install_topology_matrix
    title: Install-topology matrix
    canonical_location: artifacts/release/install_topology_matrix.yaml
    overview_page: docs/release/install_topology_plan.md
    owner_dri: "@ahmeddyounis"
    owning_lane: release_evidence
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Machine-readable install-profile card matrix. One card per
      (install_mode_class, channel_class, platform_class,
      architecture_class) tuple carries platform / architecture
      class, updater owner, binary root, durable state roots,
      side-by-side relation, rollback target, diagnostics /
      export path, rollout ring, silent-install support,
      managed-package report, publication posture, policy
      injection, CLI scriptability, repair / verify support, and
      a reserved running_build_identity_ref slot into the
      exact-build identity schema. Pins the ring_promotion_evidence
      table (canary / pilot / broad / lts with minimum evidence
      per ring) and the rules the matrix enforces (no shared
      durable state across channels; portable no machine-global
      mutation; no last-writer-wins for file associations or
      protocol handlers; managed_fleet requires a managed-
      package report; external_package_manager suppresses in-
      product auto-update; diagnostics minimum; rollback target
      must match ring; lts requires admin or managed updater;
      exact-build identity ref reserved on every row). Installer
      family choice per platform is a later lane; cards carry
      installer_family_placeholders at this milestone.

  - id: install_state_root_map
    title: Install-topology state-root map
    canonical_location: artifacts/release/state_root_map.yaml
    overview_page: docs/release/install_topology_plan.md
    owner_dri: "@ahmeddyounis"
    owning_lane: release_evidence
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Machine-readable state-root map. One state_root_record per
      (durable_state_root_class, channel_class) pair every install-
      profile card reads, plus per-channel separation rules for
      state roots, update markers, recent-item registration,
      file associations, and deep-link / protocol-handler
      ownership. Every row carries owning_channels,
      shared_across_channels flag, authority class (resolving
      into the portable-profile state-map classes frozen by
      docs/state/profile_and_state_map.md), scriptability,
      diagnostics visibility, repair / verify, and exact-build
      install diagnostic classes. The
      no_shared_durable_state_across_channels collision policy
      is pinned as a schema-level rule so no side-by-side row
      silently corrupts another row's state markers. Concrete
      per-host-OS paths are deliberately deferred to the install
      lane; this milestone pins the class set.

  - id: silent_deployment_seed
    title: Silent-deployment return-code family seed
    canonical_location: artifacts/release/silent_deployment_seed.yaml
    overview_page: docs/release/install_topology_plan.md
    owner_dri: "@ahmeddyounis"
    owning_lane: release_evidence
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Machine-readable return-code family seed every unattended
      install, update, pin, rollback, or uninstall resolves into.
      Freezes the ten return-code families (success,
      partial_success, user_config_error, trust_policy_denial,
      missing_dependency, network_transport, internal_failure,
      rollback_required, verification_failed, admin_required)
      aligned with the stable CLI exit-code model, the
      fifteen-value failure_reason_class vocabulary, the nine-
      value remediation_pointer_class vocabulary, and the
      unattended_deployment_result_record shape. Seeded with ten
      worked fixtures covering install success, update partial-
      success with reboot required, managed trust-policy denial,
      air-gap mirror metadata stale, update rollback_required
      plus its rollback follow-up, verify-failed, managed
      uninstall admin_required, portable spill detected, and
      channel-pin success. A failed unattended install / update /
      rollback is represented as a machine-readable result class
      with clear diagnostics and remediation pointers; free-text
      error strings alone are non-conforming.

