      required_user_action vocabulary, the seven bookmark_kind_
      class values, the ten-value navigation_history_origin_class
      vocabulary, the five-value navigation_history_direction_
      class vocabulary, the nine peek_projection_class values, the
      ten-value saved_query_source_class vocabulary, the six-value
      saved_query_share_policy_class vocabulary, the six-value
      saved_query_provider_backing_class vocabulary, the five-
      value saved_query_sensitive_literal_handling_class
      vocabulary (literal_redacted_at_boundary_default by default),
      the seven-value saved_query_retention_class vocabulary
