      keyboard-reachable open-details path, one variant block
      matching the surface family, export/screenshot safety
      fields, and accessibility fields. allOf gates force
      surface_family values to match their variant kind; ready
      strips to carry no blockers, warnings, hidden scope, partial
      scope, or stale notes; partial strips to carry a top-level
      partial note and screenshot cue; stale strips to carry
      freshness_class = stale plus a stale note and screenshot cue;
      degraded strips to carry at least one warning or blocker;
      blocked strips to carry blocker_count > 0 and no live claim;
      hidden-scope counts above zero to carry a hidden note and
      cue; provider-backed backing modes to disclose provider
      backing; and cached/imported/mixed backing modes to include
      a freshness cue.

