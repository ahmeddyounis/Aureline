      fifteen-value snapshot_export_field_class vocabulary, the
      ten-value reopen_honesty_state vocabulary, the per-schema
      denial-reason vocabularies, and the audit-event id
      vocabularies. Composes with docs/adr/0014-search-readiness-
      ranking-result-truth.md, docs/search/query_planner_contract_
      seed.md, schemas/search/saved_query_and_scope_binding.
      schema.json, schemas/workspace/workset_artifact.schema.json,
