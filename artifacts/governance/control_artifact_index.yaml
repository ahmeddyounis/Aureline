      / export surface reads when restoring back / forward, recent
      location, breadcrumb, outline, bookmark / mark, peek context,
      saved query, query-history entry, scope binding, search deep
      link, or search collection snapshot to one set of artifact
      shapes, one bookmark-drift state machine, one set of privacy
      / portability / sync / sharing rules for sensitive query
      literals and provider-backed search, and one set of current-
      versus-captured scope honesty rules every reopened query
      and shared deep link must honour. Names the nine
      navigation_target_kind values (file_path_target, symbol_
      declaration_target, docs_anchor_target, notebook_cell_target,
      review_diff_hunk_target, graph_node_target, search_result_
      packet_target, terminal_zone_target, output_viewer_object_
