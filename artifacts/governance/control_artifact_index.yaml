  - id: package_action_contract
    title: Package-action, registry-auth, script-risk, and lockfile-impact contract
    canonical_location: docs/package/package_action_contract.md
    overview_page: docs/package/package_action_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative cross-tool contract binding every integrated
      package operation (search, install, upgrade, downgrade,
      remove, pin, audit, restore-from-checkpoint) on the
      desktop review surface, CLI dependency-review summary, AI
      tool review, automation run review, hosted-review reader,
      support / export reader, and admin-audit reader to one
      package_action_record (eight-value package_action_class,
      seven-value manifest_scope_class, ten-value registry_
      source_class, ten-value registry_auth_mode_class, eight-
      value script_risk_class, nine-value lockfile_impact_class,
      eight-value transitive_impact_class, seven-value rollback
      _posture_class, six-value mirror_or_offline_state_class,
      ten-value apply_outcome_class, nine-value expected_
      validation_task_class, eight-value surface_class) and one
      package_review_packet_record (five-value package_review_
      packet_class, eight-value package_review_outcome_class)
      under allOf gates that force read-only action classes
      (search_for_package_metadata, audit_only_no_state_change)
      to resolve to no_lockfile_change_metadata_only + no_
      transitive_change + rollback_posture_not_applicable_read_
      only + apply_not_applicable_read_only, force mutation-
      class actions to cite typed lockfile / transitive /
      rollback values before apply, force lockfile_impact_class
      = no_lockfile_change_metadata_only paired with a script_
      risk_class outside { no_script_no_native_build, declarative_
      metadata_only } to deny with script_or_native_build_must_
      not_be_represented_as_metadata_only, force secret_broker_
      handle_auth / delegated_identity_auth / policy_injected_
      credential_auth / managed_service_identity_auth / mtls_
      client_certificate_auth / device_flow_callback_auth to
      cite a non-null matching handle ref (and force managed_
      service_identity_auth to resolve only on managed_workspace
      identity mode), forbid raw_secret_in_workspace_state_
      observed = true on every action class except audit_only_
      no_state_change, force vendored_directory_no_registry and
      git_or_path_dependency_no_registry sources to resolve to
      no_auth_public_registry or mirror_or_offline_no_auth_
      required and forbid them from carrying secret-broker /
      delegated / policy-injected credential refs, force
      mutation-class actions under workspace_trust_state other
      than workspace_trust_trusted (with restore_lockfile_to_
      checkpoint admissible under workspace_trust_session_only_
      temporary) to deny with workspace_trust_unset_or_
      restricted, force offline_or_deny_all_state in {offline_
      grace_preserved, offline_air_gapped, deny_all_enforced,
      network_disabled_by_user} to pair with a non-online
      mirror_or_offline_state_class (otherwise deny with mirror_
      or_offline_state_required_when_offline_grace_or_air_gap_
      active), force manifest_scope_class = out_of_tree_global_
      manifest_admin_only to cite a non-null out_of_tree_global_
      manifest_envelope and resolve only on self_hosted_org /
      managed_workspace identity modes, force rollback_unavail
      able_destructive_remove_with_no_checkpoint to be
      admissible only on remove_existing_dependency, force
      rollback_via_lockfile_checkpoint to cite a non-null
      lockfile_checkpoint_ref and rollback_via_workspace_
      snapshot_checkpoint to cite a non-null workspace_snapshot_
      checkpoint_ref, force apply_failed_state_changed_rollback_
      executed to cite a non-null rollback_record_ref plus a
      rollback_posture_class outside the rollback-unavailable
      set, and force every terminal apply_outcome (other than
      apply_in_flight) to cite a non-null apply_completed_at;
      and binds the matched audit-event-id vocabulary
      (sixteen values: package_action_admitted, package_action_
      apply_completed, package_action_apply_failed, package_
      action_rolled_back, package_action_blocked_pending_
      consent, package_action_blocked_pending_policy, package_
      action_blocked_pending_workspace_trust, package_action_
      blocked_pending_lockfile_resolution, package_review_packet
      _published, package_review_packet_denied, package_action_
      audit_denial_emitted, package_action_raw_secret_observed_
      denial, package_action_script_risk_misclassification_
      denial, package_action_lockfile_impact_missing_denial,
      package_action_transitive_impact_missing_denial, package_
      action_rollback_posture_missing_denial) and the closed
      denial-reason vocabulary (fifteen values: raw_secret_in_
      workspace_state_forbidden, script_or_native_build_must_
      not_be_represented_as_metadata_only, lockfile_impact_
      required_before_apply, transitive_impact_required_before_
      apply, rollback_posture_required_before_apply, registry_
      source_must_resolve_to_typed_class, registry_auth_mode_
      must_resolve_to_typed_class, mirror_or_offline_state_
      required_when_offline_grace_or_air_gap_active, delegated_
      identity_or_policy_injected_credential_preferred_over_
      raw_secret, manifest_scope_must_match_workspace_layout,
      workspace_trust_unset_or_restricted, policy_epoch_expired
      _re_evaluation_required, registry_unverifiable_user_
      review_required, destructive_remove_without_checkpoint_
      must_disclose_rollback_unavailable, out_of_tree_global_
      manifest_requires_admin_envelope). Composes with
      docs/auth/system_browser_callback_packet.md (identity-
      mode boundary), docs/governance/telemetry_and_support_
      schema_registry.md (consent / endpoint / retention),
      docs/network/transport_governance_seed.md (proxy / trust
      / mirror-route / offline-or-deny-all-state and the
      transport_posture object), docs/architecture/standards_
      interchange_matrix.md (SemVer / SPDX / OCI distribution /
      package-format families), docs/adr/0007-secret-broker-
      credential-handle-trust-store-redaction.md (secret-broker
      handle and raw-secret-forbidden boundary), docs/adr/0010-
      connected-provider-browser-handoff-approval-ticket.md
      (approval-ticket envelope), docs/adr/0011-capability-
      lifecycle-and-dependency-markers.md (freshness / client-
      scope / redaction), and docs/adr/0018-workspace-trust-
      and-restricted-mode.md (workspace-trust state). Implementing
      package-manager adapters and dependency intelligence
      (vulnerability / advisory / license / freshness scoring)
      named explicitly out of scope at this revision.

