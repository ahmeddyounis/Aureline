  - id: transport_posture_schema
    title: Transport-posture, environment-status-strip, and repair-action-card boundary schema
    canonical_location: schemas/ux/transport_posture.schema.json
    overview_page: docs/ux/transport_and_environment_status_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
