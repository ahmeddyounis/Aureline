    overview_page: docs/vcs/change_stack_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative cross-tool contract binding every surface that
      names a change (diff explorer, AI branch-agent panel,
      patch-stack panel, sequence-editor plan view, import /
      export wizard, support / export, audit lane) to one
      change_object_record (change_object_class drawn from the
      five-value vocabulary commit_authored_locally, commit_
      imported_from_remote, change_authored_by_ai_branch_agent,
      change_imported_from_patch_bundle, change_synthesized_
      during_history_edit; change_object_authorship_class drawn
      from the five-value vocabulary human_user_authored, pair_
      session_co_authored, ai_branch_agent_authored, imported_
      from_external_patch_bundle, synthesized_by_history_edit_
      operation; change_object_landing_state drawn from the
      eight-value vocabulary unsubmitted_local_only, submitted_
      review_pending, submitted_review_in_progress, accepted_
      landed_canonical, accepted_landed_via_squash_or_fixup,
      dropped_explicit_user_action, superseded_by_rewrite,
      abandoned_orphan_pending_cleanup; worktree_lifecycle_state
      drawn from the seven-value vocabulary worktree_pristine,
      worktree_active_editing, worktree_in_sequence_edit,
      worktree_paused_pending_conflict, worktree_archived_orphan
      _pending_cleanup, worktree_exported_for_handoff, worktree_
      torn_down so cross-worktree writes are mechanically
      forbidden), one patch_stack_record per ordered base-pinned
      member sequence (patch_stack_lifecycle_state drawn from
      the seven-value vocabulary patch_stack_drafting, patch_
      stack_active_review_open, patch_stack_paused_pending_
      conflict, patch_stack_paused_pending_history_edit_
      recovery, patch_stack_landed_completed, patch_stack_
      abandoned_rolled_back, patch_stack_archived_tombstone),
      one patch_stack_member_record per stack member (eight-
      value patch_stack_member_landing_state, five-value
      validation_staleness_class), one sequence_editor_plan_
      record per history-edit plan (eight-value sequence_editor
      _lifecycle_state), and one sequence_editor_operation_
      record per pick / reword / edit / squash / fixup / drop /
      exec / break / label / reset / merge_replay operation
      (six-value sequence_op_status). Forces every topology-
      changing flow to mint exactly one recovery_object before
      mutation (recovery_object_class drawn from the five-value
      vocabulary pre_mutation_reflog_anchor_minted, pre_mutation
      _local_history_checkpoint_minted, pre_mutation_patch_stack
      _snapshot_minted, pre_mutation_branch_label_anchor_minted,
      pre_mutation_combined_recovery_packet_minted) so a plan
      that admits an operation without a recovery object denies
      with sequence_editor_recovery_object_required_before_
      admission, a stack lifecycle past patch_stack_drafting
      without a recovery object denies with patch_stack_
      recovery_object_required_before_topology_change, and a
      synthesized history-edit output without a recovery object
      denies with change_object_recovery_object_required_before_
      topology_change. Forces ai_branch_agent_authored
      authorship to cite a non-null ai_branch_agent_run_ref into
      schemas/automation/run_record.schema.json (denies with ai_
      branch_agent_run_ref_required_for_ai_authored_change),
      imported_from_external_patch_bundle authorship to cite a
      non-null imported_patch_bundle_ref (denies with imported_
      patch_bundle_ref_required_for_imported_change), patch-
      stack base_identity_ref to be immutable for the stack's
      life (denies in-place mutation with patch_stack_base_
      identity_must_not_mutate_in_place), member ordering to be
      preserved through superseded_by_member_id_ref chains
      (denies silent reorder with patch_stack_member_silent_
      reorder_forbidden), and orphan-worktree cleanup under
      cleanup_export_then_archive or cleanup_blocked_pending_
      export_for_handoff to cite a non-null exported_patch_
      stack_snapshot_ref (denies silent reaping with worktree_
      orphan_silent_reap_forbidden). Defines the six-value
      rollback_or_export_class vocabulary (rollback_to_pre_
      mutation_recovery_object, export_patch_stack_snapshot_for
      _handoff, export_ai_branch_agent_run_for_review, export_
      side_branch_for_collaborator_review, export_for_support_
      bundle, import_patch_stack_snapshot_from_handoff) so
      rollback / export determinism is reviewable. Cross-
      references the merge / conflict-class contract and the
      dedicated history-edit recovery contract through the
      five-value conflict_handoff_class vocabulary and reserves
      merge_conflict_class_record_id_ref and history_edit_
      recovery_record_id_ref forward-dependency slots that
      become required non-null when those contracts land.
      Composes with schemas/vcs/review_workspace.schema.json
      (a submitted_review_* landing state cites a review_
      workspace_record), schemas/recovery/local_history_entry.
      schema.json (pre_mutation_local_history_checkpoint_minted
      recovery objects), schemas/workspace/source_locator.
      schema.json and schemas/workspace/checkout_plan.schema.
      json (opaque locators), schemas/integration/approval_
      ticket.schema.json (every rollback / export action),
      schemas/automation/run_record.schema.json (AI branch-agent
      run lineage), schemas/governance/capability_lifecycle.
      schema.json (re-exported freshness / client_scope /
      redaction vocabularies), and schemas/identity/policy_
      bundle.schema.json (workspace trust / policy envelope).
      Implementing Git plumbing, sequence editors, branch-agent
      workflows, the merge / conflict-class contract, and the
      dedicated history-edit recovery contract named explicitly
      out of scope at this revision.

