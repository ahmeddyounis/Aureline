    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Machine-readable register of the six rollout states an AI
      workflow / surface may resolve to (experimental, shadow,
      preview, stable, deprecated, disabled), each row binding the
      state to its user-visibility class, its
      requires_graduation_packet flag, its requires_admitting_
      approval_ticket flag, its requires_assurance_claim_link
      flag, its minimum_eval_evidence_set, its admitted fallback_
      postures, and its degrades_to_on_eligibility_loss target.
      Names the legal admitted_transitions between states (any
      other transition MUST be expressed as withdraw_to_disabled
      followed by a fresh packet for the next state) and the
      composition rule between rollout_state_class on
      schemas/ai/graduation_packet.schema.json and model_
      lifecycle_state_class on schemas/ai/model_registry.schema.
      json (rollout state names the rollout phase of the workflow;
      lifecycle state names the lifecycle of the model entry; the
      two compose). Adding a new rollout_state_class is additive-
      minor and requires a paired graduation_packet_schema_version
      bump on schemas/ai/graduation_packet.schema.json.

