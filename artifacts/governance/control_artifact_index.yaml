      revoke), restore/recovery (restore_applied_after_recovery), and
      a support bundle chronology export preview
      (support_export_preview) without renaming core fields per
      subsystem. Collectively exercises all four record kinds
      (history_row_record, timeline_group_record,
      narrative_summary_card_record, chronology_export_preview_
      record), the non-truncating durable detail-link rule for
      consequential and safety-critical importance, the UTC-pinned
      time-zone posture for signing_evidence_only rows and export
      previews, the observer_skew_labeled time-zone posture, AI
      confidence disclosure on narrative cards, and the structured
      excluded_row_count_by_reason accounting on export previews.

