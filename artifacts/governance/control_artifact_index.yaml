      authority-class vocabulary (8 values), one
      consent-class vocabulary (8 values), one side-effect
      vocabulary (24 values), and one evidence-link vocabulary
      (13 values) so a reviewer can tell whether the action
      alters local state, remote state, or managed / provider
      state before the action runs. Seats the companion schema
      at schemas/ux/transport_posture.schema.json and worked
      fixtures under fixtures/ux/repair_cards/ covering the
      enterprise-online posture object, an environment status
      strip on a remote SSH target, and repair cards for
