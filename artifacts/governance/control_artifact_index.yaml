  - id: history_edit_and_recovery_contract
    title: History-edit, sequence-editor, cherry-pick / revert, and recovery-path contract
    canonical_location: docs/vcs/history_edit_and_recovery_contract.md
    overview_page: docs/vcs/history_edit_and_recovery_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative cross-tool contract binding every history-edit
      surface (interactive rebase sequence review, cherry-pick
      onto alternate target review, revert commit preview, patch-
      series restack panel, single-branch history-edit review,
      change-stack panel, AI branch-agent panel, support / export
      bundle's git section, audit lane) to one history_edit_review_
      record (with ordered sequence_step_record rows) and one
      recovery_object_record. The recovery-object record is the
      dedicated downstream consumer of the history_edit_recovery_
      record_id_ref forward-dependency slots reserved on the
      change-object / patch-stack / sequence-editor contract
      (docs/vcs/change_stack_contract.md) and the branch / worktree
      / history / stash contract (docs/vcs/git_state_and_worktree_
      contract.md). Reviewers can tell what object-model change a
      history-edit operation will produce (rewrite-history vs.
      append-new-revert-commit vs. replay-onto-new-target vs.
      pick-in-place-no-change), what recovery object exists before
      confirm, and what publish / merge-queue / review-id impact
      the confirm carries. Auto-continue is structurally blocked
      while conflicts, protected-path blockers, missing signoff,
      or changed base/head identity remain unresolved. Abort
      always rolls back to the recovery object the review pinned
      at admission.

