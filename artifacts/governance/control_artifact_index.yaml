      sealed_archive_inventory_summary_label; force anchor_
      target_match_with_label_only drift rows to carry a non-
      no_match_label_available match-label kind plus a
      reviewable label value. The supersede-rather-than-relocate
      rule is encoded as a fresh shared_object_record carrying
      supersedes_shared_object_ref pointing at the prior row;
      silent in-place relocation denies with silent_anchor_
      relocation_forbidden. Re-exports freshness_class, client_
      scope, and redaction_class from schemas/governance/
      capability_lifecycle.schema.json plus deployment_profile_
      class and workspace_trust_state_class from the identity
