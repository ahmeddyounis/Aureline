    status: seeded
    notes: >
      Machine-readable register for the known-limits contract. Closed
      vocabularies for limitation_class (nine values: scope_caveat_
      noted, platform_narrowed, workflow_narrowed, persona_narrowed,
      corpus_narrowed, competitor_parity_narrowed, docs_drift_active,
      support_export_narrowed, migration_path_limited), severity_class
      (minor, moderate, major, blocking), note_state (draft, in_review,
      active, superseded, withdrawn, quarantined), review_rubric_class
      (mandatory, optional, stale, superseded, promotion_blocking),
      workaround_availability_class (available_in_product, available
      _via_recipe, available_via_policy_change, unavailable_pending_
      work, unavailable_by_design), and downgrade_trigger (twelve
      values re-exported from assurance_claim.schema.json plus
      known_limit_note_missing, known_limit_note_stale, known_limit
      _note_superseded). One limitation-class row per vocabulary value
      naming required scope fields, minimum severity floor, typical
      review rubric, and claim-class ceiling. One review-rubric row
      per class naming entry condition, effect on bound claim rows,
      escape path, and promotion-blocking flag. Eleven propagation
      rules (one per publication destination) naming render policy,
      projection, and narrowing behavior. Six detection rules naming
      the trigger, condition, effect on claim row, and effect on
      release train so promotion review can read metadata rather than
      prose. Ten invariants enforcing limitation-class singularity,
      severity-and-rubric coherence, promotion-blocking narrowing,
      stale-copy propagation, successor-only routing, required-scope-
      field population, support-window bounding, mandatory-public-
      destination coverage, freshness-driven staleness, and decision-
      row discipline on vocabulary changes. Re-exports deployment
      _profile, release_channel_class, publication_destination,
      support_class, support_window_state, proof_class, and freshness
      _cadence vocabularies by reference without redefinition.

  - id: known_limit_note_schema
    title: Known-limit note boundary schema
    canonical_location: schemas/product/known_limit_note.schema.json
    overview_page: docs/product/known_limits_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Cross-tool known-limit note schema with additionalProperties
      false everywhere and allOf gates enforcing that severity_class
      = blocking pairs with review_rubric_class = promotion_blocking;
      review_rubric_class = promotion_blocking carries promotion
      _blocking = true plus at least one downgrade_trigger plus at
      least one of affected_cutline_refs or binding_claim_row_refs;
      review_rubric_class = optional carries promotion_blocking =
      false; review_rubric_class = superseded pairs with note_state
      = superseded; note_state = active carries a non-null activated
      _at, null withdrawn_at, and null superseded_by_known_limit_ref;
      note_state = superseded names a successor via superseded_by
      _known_limit_ref; note_state = withdrawn carries a non-null
      withdrawn_at; limitation_class = platform_narrowed carries at
      least one affected_deployment_profile; limitation_class =
      workflow_narrowed carries at least one affected_workflow_
      bundle_ref; limitation_class = persona_narrowed carries at
      least one affected_persona_ref; limitation_class in
      {competitor_parity_narrowed, corpus_narrowed, migration_path_
      limited, support_export_narrowed} carries at least one
      explicit_exclusions entry; workaround_availability_class in
      {available_in_product, available_via_recipe, available_via_
      policy_change} carries a non-null workaround_ref and workaround
      _summary_ref; workaround_availability_class in {unavailable_
      pending_work, unavailable_by_design} carries a null workaround
      _ref; support_window_alignment.support_window_state = expired
      pairs with review_rubric_class in {promotion_blocking, stale,
      superseded} or note_state in {superseded, withdrawn,
      quarantined}; support_window_state in {current, narrowed,
      expired} carries a non-null support_window_ref; review_rubric
      _class in {mandatory, promotion_blocking, stale, superseded}
      lists docs_site and help_about in mandatory_publication_
      destinations; support_window_state in {narrowed, expired}
      lists support_export. Re-exports limitation_class from
      schemas/qe/public_proof_packet.schema.json#known_limit_class
      (minus no_limits_declared, which is reserved for packet-level
      declarations); support_class, release_channel_class, and
      publication_destination from schemas/release/assurance_claim
      .schema.json; support_window_state from schemas/governance/
      claim_manifest.schema.json; deployment_profile from artifacts/
      governance/deployment_profiles.yaml; and freshness_cadence
      plus proof_class from schemas/qe/public_proof_packet.schema
      .json. Adding a new class value is additive-minor and bumps
      known_limit_note_schema_version; repurposing an existing
      value is breaking.

