  - id: assurance_claim_matrix_contract
    title: Assurance-claim matrix, scope and exclusion model, and evidence-publication rules (narrative)
    canonical_location: docs/release/assurance_claim_matrix.md
    overview_page: docs/release/assurance_claim_matrix.md
    owner_dri: "@ahmeddyounis"
    owning_lane: release_evidence
    review_cadence: each_release
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative contract for launch-facing assurance language. Binds
      every row to one claim-subject family, one declared claim class,
      one effective claim class after automatic narrowing, one closed
      scope envelope (release channels, deployment profiles, client
      scopes), one closed proof-class breakdown (vendor_asserted,
      customer_provided, runtime_observed, policy_declared,
      not_currently_verifiable), explicit exclusion and known-limit
      refs, a docs-version-match floor, publication destinations, and
      downgrade triggers. Freezes the ten claim classes (certified,
      supported, limited, community, experimental, retest_pending,
      exception_recorded, evidence_stale, not_claimed, and
      replacement_grade_candidate), the automatic narrowing rules for
      the twelve reserved downgrade triggers, and the invariants that
      make replacement-grade or certified wording structurally
      impossible to ship without the required proof families. Final
      stable launch wording for every marketed row, pricing and
      commercial availability, and certification-partner naming are
      explicitly out of scope at this revision.

