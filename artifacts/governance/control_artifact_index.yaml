  - id: storage_and_retention_vocabulary
    title: Storage-mode, retention-mode, and raw-secret-exclusion vocabulary (narrative)
    canonical_location: docs/governance/storage_and_retention_vocabulary.md
    overview_page: docs/governance/storage_and_retention_vocabulary.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative companion that binds credentials, support bundles,
      sync payloads, profile exports, issue packages, incident
      bundles, AI evidence packets, and other retained artifacts to
      one explainable vocabulary along three orthogonal axes:
      credential_storage_mode (system_credential_store,
      enterprise_secret_store, session_only, handle_only, delegated,
      not_configured), artifact_storage_mode (local_only,
      uploaded_copy, mirrored_copy, embedded_evidence,
      by_reference_evidence, intentionally_excluded), and
      retention_mode (expiring, pinned, policy_held, exportable,
      audit_only, raw_secret_excluded). Pins the isomorphism with the
      support-bundle schema's artifact_storage_mode and
      evidence_embedding_state enums, inherits ADR-0007 trust-store
      classes and projection modes for credentials, and names a
      forbidden-phrase list ("saved securely", "stored safely",
      "kept private", "handled securely", "secured automatically",
      "encrypted at rest") so drift scans can find any surface that
      reintroduces them. Implementation of secret stores, upload
      services, and enterprise retention backends is explicitly out
      of scope at this revision.

