    notes: >
      Cross-tool boundary schema for the three records frozen in
      the transport-and-environment status contract:
      transport_posture_record (the inspectable posture object
      with field names and enum values isomorphic to the embedded
      transport_posture in
      schemas/network/network_attribution_record.schema.json),
      environment_status_strip_record (one ordered list of
      interpreter / SDK / shell / target cells reading one
      transport_posture_ref and one
      execution_context_snapshot_ref), and
      repair_action_card_record (one structured card naming
      what changes, where it applies, scope_class, authority_
      class, consent_class, side_effects, evidence_links, and
      transport_posture_ref). Re-exports proxy_resolution_mode_
      class (6 values), trust_store_source_class (5 values),
      ssh_host_key_provenance_class (6 values), mirror_route_
      class (6 values), offline_or_deny_all_state_class (7
      values), identity_mode (3 values from ADR-0001),
      deployment_profile_class (5 values), redaction_class (4
      values), and client_scope (6 values from ADR-0011)
      verbatim. Schema-enforced cross-field rules forbid an
      online_live_allowed posture from carrying offline_since_
      at, force a non-null degraded_or_blocked_reason on every
      non-ok / non-not_applicable strip cell, forbid mixing
      no_side_effect_inspect_only with any mutating effect on a
      repair card, forbid scope_local_only cards from declaring
      remote / managed / policy / admin / cross-machine effects,
      forbid org_admin_authority and policy_bundle_signer_
      authority cards from claiming scope_local_only, and force
      consent_blocked_* cards to link at least one evidence
      record. Adding a new vocabulary value is additive-minor
      and bumps transport_posture_schema_version; repurposing an
      existing value is breaking and requires a new decision row.

