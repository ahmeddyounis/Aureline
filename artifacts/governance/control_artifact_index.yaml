  - id: frozen_surface_manifests
    title: Frozen-surface manifests
    canonical_location: artifacts/release/
    owner_dri: "@ahmeddyounis"
    owning_lane: release_evidence
    review_cadence: each_release
    visibility_class: public
    next_milestone: first_stable
    status: not_yet_seeded
    notes: >
      Per-release manifest of which public surfaces are frozen and under
      which compatibility promise. Out of scope at this milestone beyond
      naming the home; metadata for stable-surface contracts is explicitly
      deferred.

  - id: issue_routing
    title: Issue-routing seed
    canonical_location: artifacts/governance/issue_routing.yaml
    overview_page: docs/governance/control_artifact_index.md
    owner_dri: "@ahmeddyounis"
    owning_lane: governance_packets
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Seed mapping of issue classes to public or private routes with
      privacy / disclosure class, public-summary expectation, and owning
      forum placeholder. Dispute resolution for benchmark results routes
      through the benchmark-council charter.

  - id: contribution_guide
    title: Contribution guide and DCO baseline
    canonical_location: CONTRIBUTING.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Contributor-facing rules for DCO sign-off, REUSE/SPDX file
      metadata, third-party imports, generated-code provenance, and
      public-interface versioning. Pairs with the provenance and
      compliance baseline; both update together when rules change.

  - id: provenance_compliance_baseline
    title: Provenance and compliance baseline
    canonical_location: docs/governance/provenance_and_compliance_baseline.md
    overview_page: docs/governance/provenance_and_compliance_baseline.md
    owner_dri: "@ahmeddyounis"
    owning_lane: governance_packets
    review_cadence: each_change
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Governance form of the contribution guide's IP, provenance, and
      supply-chain rules. Names the placeholder CI provenance/SBOM lane
      that real generators will replace. Release-grade SBOM emission
      and signed attestations remain explicitly out of scope here.

  - id: compliance_checklist
    title: Compliance checklist (deps, vendored sources, generators, notices)
    canonical_location: artifacts/governance/compliance_checklist.yaml
    overview_page: docs/governance/provenance_and_compliance_baseline.md
    owner_dri: "@ahmeddyounis"
    owning_lane: governance_packets
    review_cadence: each_change
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Single canonical register of every external Cargo dependency,
      vendored third-party file, code generator, and pending NOTICE
      attribution row. Consumed by ci/sbom_provenance.sh and by the
      eventual real SBOM/attestation lane.

  - id: ci_provenance_lane
    title: CI provenance / SBOM lane (placeholder)
    canonical_location: ci/sbom_provenance.sh
    overview_page: docs/governance/provenance_and_compliance_baseline.md
    owner_dri: "@ahmeddyounis"
    owning_lane: release_evidence
    review_cadence: each_change
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Placeholder lane that emits a workspace SBOM stub and a
      provenance summary stub anchored on the build identity. Replaced
      incrementally by tools/governance/spdx_sbom.sh,
      tools/governance/cyclonedx.sh, and tools/governance/attest.sh
      when those generators land.

  - id: boundary_manifest_strawman
    title: Product boundary manifest (strawman)
    canonical_location: docs/product/boundary_manifest_strawman.md
    overview_page: docs/product/boundary_manifest_strawman.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Strawman that classifies every product capability as local-core,
      self-host-friendly, managed convenience, or out-of-scope. Reserves
      deployment-profile, residual-dependency, data-boundary,
      portability, and local-core-continuity slots per row so later
      claim packets do not retrofit these fields inconsistently. Pairs
      with schemas/product/boundary_manifest.schema.json. A YAML
      machine form under artifacts/product/boundary_manifest.yaml is
      reserved for a later milestone; the strawman is narrative-only
      at this milestone.

  - id: onboarding_measurement_plan
    title: Onboarding, first-useful-work, and migration measurement plan
    canonical_location: docs/product/onboarding_measurement_plan.md
    overview_page: docs/product/onboarding_measurement_plan.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Measurement plan and seed corpus that define how switching
      success is qualified across first-run, first open, first
      useful edit, migration review, restore success, and opt-in-
      versus-continue-local behaviour. Freezes the entry-route
      taxonomy, readiness-bucket set, archetype-detection outcomes,
      per-surface success criteria with closed failure categories,
      reserved event / metric names, and a primary-DRI lane per
      surface. Pairs with
      artifacts/product/task_success_corpus_seed.yaml (nine worked
      scenarios, each carrying entry-route id, archetype-detection
      outcome, per-task readiness bucket, first-useful-work target
      surface, restore class, fixture refs, and expected event
      list) and
      artifacts/product/no_account_switching_scoreboard_seed.yaml
      (no-account local-work, service-opt-in boundary-outcome, and
      intentionally-narrowed-capability row families citing
      boundary-manifest rows and evidence-consuming lanes).
      Telemetry collection is explicitly out of scope at this
      milestone; the plan reserves the event shape and the
      scoreboard shape so later benchmark, evidence, and support
      lanes read one truth.

  - id: task_success_corpus_seed
    title: Task-success corpus seed
    canonical_location: artifacts/product/task_success_corpus_seed.yaml
    overview_page: docs/product/onboarding_measurement_plan.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Machine-readable seed corpus the measurement plan reads.
      Nine worked scenarios cover Start Center first run, plain
      open, protocol-handler reentry, clone, VS Code settings
      import with migration result, post-crash restore, managed-
      cloud resume with reauth, start-from-prebuild with minimal
      bypass, and recent-work reopen with missing target. Each
      scenario carries entry-route id, archetype-detection
      outcome, per-task readiness bucket, first-useful-work
      target surface, restore class, fixture refs, expected
      event list, and evidence-consumer list. Coverage section
      reserves entry-route slots (er.workspace_switch,
      er.warm_start) that later scenarios will populate without
      reshaping the corpus.

  - id: benchmark_corpus_manifest
    title: Protected benchmark corpus manifest
    canonical_location: fixtures/benchmarks/corpus_manifest.yaml
    overview_page: docs/benchmarks/fixture_classes.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Single machine-readable register of every fixture the benchmark
      lab, journey harness, boundary-truth validators, compatibility
      scoreboards, and support-export lanes resolve against by stable
      id. Seeds microbenchmark, workflow, archetype, large-file,
      recovery / restore, reference-workspace, and boundary-truth
      corpus classes with per-fixture size / visibility / retention
      / license posture, host-platform and toolchain assumptions,
      protected-journey tags, support-class and archetype-tag
      placeholders, evidence-consumer channels, and source / recipe
      lineage. Reference-workspace seeds live under
      /fixtures/workspaces/reference/; the normative vocabulary is
      docs/benchmarks/fixture_classes.md. Benchmark-council authority
      over material corpus changes is set by the benchmark-council
      charter §3.

  - id: fitness_function_catalog
    title: Protected fitness-function catalog
    canonical_location: artifacts/bench/fitness_function_catalog.yaml
    overview_page: docs/benchmarks/fitness_function_catalog.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Single machine-readable register of every protected fitness
      function the benchmark lab, journey harness, release-evidence
      shiproom packets, and performance-council waiver log resolve
      against by stable id. Seeded rows cover warm start, first
      paint, input-to-paint, buffer operations and undo-class
      correctness, VFS save / conflict handling, and benchmark-lab
      operational health. Provisional rows reserve ids for power /
      thermal posture, restore fidelity (reusing the onboarding
      measurement plan's restore_fidelity_match_rate metric name),
      and command-graph parity. Every row carries owner DRI, owning
      lane from ownership_matrix.scorecard_lane_index, architecture
      drivers and principles from TAD §3.2 and §4.1, at least one
      protected journey from the spike-metric-names and corpus-
      manifest vocabularies, exactly one protected SLO family, a
      threshold (numeric or to_be_set_by_benchmark_council), a data
      source (concrete or to_be_wired_by_benchmark_council with a
      completion_owner), waiver authority (performance_council plus
      a co-signing lane DRI per dri_map.md §Authority), waiver rules
      with default_expiry_window_days and renewal-under-correction-
      programme rule, review cadence, linked ADRs, and linked
      decisions. The catalog carries a packet_export_shape block
      that benchmark-report and shiproom packets consume as the
      fitness_function_snapshot contract, and a slices block that
      indexes every row by driver, principle, journey, waiver
      authority, and SLO family without building a parallel
      scoreboard. Benchmark-council authority over threshold
      promotion and waivers is set by the benchmark-council charter
      §3 and dri_map.md §Authority.

  - id: benchmark_run_result_schema
    title: Benchmark-lab run-result boundary schema
    canonical_location: schemas/benchmarks/run_result.schema.json
    overview_page: docs/benchmarks/benchmark_lab_run_results.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Draft/2020-12 boundary schema for one benchmark-lab run-result
      record. Pins every record to a single exact-build identity, a
      single protected corpus-manifest revision, a single
      fitness-function catalog revision, and a single hardware-
      definition ref. Freezes closed vocabularies for run context
      (reference_capture / provisional_capture / self_capture /
      smoke_subset), comparability class (comparable_to_baseline /
      comparable_to_prior_run_same_host / not_yet_comparable /
      quarantined), quarantine reason, measurement status, row
      result, trend direction, threshold mode, SLI kind, data-source
      kind, lane class, trigger kind, and
      regression_trigger_ref.kind (threshold_exceeded /
      boolean_gate_failed / ratio_below_floor / corpus_row_missing /
      trace_schema_nonconforming / ad_hoc_metric_name_observed /
      toolchain_pin_drift / hardware_definition_mismatch /
      fitness_catalog_row_status_provisional). Every fail or warn
      row MUST carry exactly one regression_trigger_ref so later
      support-bundle, shiproom, and waiver-register consumers do not
      retrofit regression attribution ad hoc. Record_kind
      discriminator keeps the family composable with other packet
      families on a shared parser. Normative companion in
      docs/benchmarks/benchmark_lab_run_results.md.

  - id: benchmark_lab_dashboard_seed
    title: Benchmark-lab dashboard seed
    canonical_location: artifacts/benchmarks/dashboard_seed/
    overview_page: docs/benchmarks/benchmark_lab_run_results.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Seed dashboard baseline covering two reference run records plus
      the rolled-up dashboard.json snapshot. The self_capture record
      (benchmark_run.seed.self_capture) carries a row per protected
      fitness function in artifacts/bench/fitness_function_catalog.yaml,
      three pass rows for the seeded data sources (buffer_operations,
      vfs_save_conflict_handling, benchmark_lab_health) and six
      provisional rows for the catalog's reserved ids. The regression
      record (benchmark_run.seed.regression_example) intentionally
      trips ff.benchmark_lab_health with
      regression_trigger_ref.kind = corpus_row_missing so the lane
      can demonstrate the failure path end to end. Every run record
      and markdown report is byte-stable under SOURCE_DATE_EPOCH / TZ
      / LC_ALL pinning; tools/benchmark_lab_emit.py --verify-seed
      re-emits under a tempdir and unified-diffs against the
      committed files so seed drift fails the nightly lane before any
      benchmark work runs. The committed seed is self_capture, NOT
      admissible as release-evidence input; a reference capture
      requires a benchmark-council-approved hardware baseline.

  - id: nightly_benchmark_ci_lane
    title: Nightly benchmark-lab CI lane
    canonical_location: .github/workflows/nightly_benchmark.yml
    overview_page: docs/benchmarks/benchmark_lab_run_results.md
    owner_dri: "@ahmeddyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      GitHub Actions workflow scheduled on a daily cron and available
      on workflow_dispatch. Runs verify_seed first so committed-seed
      drift fails before the lab does any benchmark work, then drives
      tools/benchmark_lab.sh with the selected corpus_subset /
      run_context / lane / trigger. Uploads the raw/*.json run
      record, report/*.md human-readable summary, and dashboard.json
      snapshot as a workflow artifact. The lane is the single entry
      point CI and a developer running ./tools/benchmark_lab.sh
      share, so the build, corpus selection, and report shape stay
      identical across lanes. The workflow_dispatch regression_demo
      input exercises the failure path end to end; the lane exits
      non-zero after writing the record so the workflow's failure
      signal is authoritative.

  - id: no_account_switching_scoreboard_seed
    title: No-account switching scoreboard seed
    canonical_location: artifacts/product/no_account_switching_scoreboard_seed.yaml
    overview_page: docs/product/onboarding_measurement_plan.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Seed scoreboard qualifying three row families: no-account
      local work (capabilities reachable with no account on the
      individual_local deployment profile, citing local_core
      boundary rows); service-opt-in boundary outcomes (decline-
      without-degradation claim against each opt-in prompt
      boundary row); and intentionally narrowed startup / import
      capability (narrowing-advertised claim at restore prompts,
      recent-work missing targets, air-gapped first run, and
      migration blocked-item reasons). Threshold values are
      deliberately left as "to_be_set_by_benchmark_council" at
      this milestone; promotion is reserved to the benchmark-
      council charter.

# -----------------------------------------------------------------------------
# Review cadence vocabulary.
#
# Enumerated so tooling can validate review_cadence values. The narrative
# overview in docs/governance/control_artifact_index.md explains what each
# cadence implies for engineering, design, QE, docs, support, and release.
# -----------------------------------------------------------------------------
review_cadences:
  - each_change
  - per_milestone
  - each_release

# -----------------------------------------------------------------------------
# Visibility vocabulary.
# -----------------------------------------------------------------------------
visibility_classes:
  - internal
  - public

# -----------------------------------------------------------------------------
# Status vocabulary.
# -----------------------------------------------------------------------------
status_values:
  - seeded
  - outline_only
  - not_yet_seeded
