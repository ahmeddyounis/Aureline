      mutation entry, force runtime_identity_unverifiable to
      strip live mutation across the board, force stale or
      missing or redacted or unknown source-map freshness to
      strip admissible_under_* on live-style-edit and modified-
      replay actions, force unknown / no-origin protocol scope
      to strip admissible_under_* on cookie / storage / service-
      worker mutations, force workspace_trust_unset / workspace_
      trust_restricted to leave admissible_under_approval_ticket
      as the only admissible path, force every admissible_under_
      approval_ticket entry to cite a non-null approval_ticket_
      ref, force remote_target_identity_unverifiable_user_review
      _required to resolve the session class into one of the
      degradation classes and force the matching downgrade
      trigger, and force viewport_preset_only_no_real_device
      device profiles to null device_handle_ref. Adding a new
      browser_runtime_session_class, runtime_identity_class,
      browser_engine_family_class, device_profile_class, theme_
      class, color_scheme_state_class, protocol_scope_class,
      cross_origin_boundary_class, source_map_freshness_class,
      mutation_action_class, mutation_admissibility_class,
      inspection_lifecycle_state, evidence_origin_class, or
      downgrade_trigger value is additive-minor and bumps
      browser_runtime_session_schema_version; repurposing an
      existing value is breaking and requires a new decision row.

