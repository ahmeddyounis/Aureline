      action_mismatch and a refactor that silently retargets
      denies with silent_anchor_relocation_forbidden;
      local_vs_provider_freshness_class drawn from the five-value
      vocabulary so the chip reads mechanically), and one
      merge_queue_action_record per landing action (action class
      drawn from the eight-value vocabulary enqueue_for_merge,
      dequeue_from_merge, attempt_landing, mark_blocked_pending_
      freshness, mark_blocked_pending_required_check, mark_blocked
      _pending_required_review, mark_landed, mark_failed_to_land;
