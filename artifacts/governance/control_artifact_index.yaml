  - id: recipe_and_macro_contract
    title: Recorded-macro, declarative-recipe, and run-record contract
    canonical_location: docs/automation/recipe_and_macro_contract.md
    overview_page: docs/automation/recipe_and_macro_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative contract separating recorded macros (strictly
      constrained to explicit UI or editor state with no ambient
      network, process, or secret access) from declarative recipes
      (ordered lists of typed, gated steps that cite command
      descriptors and declare capability, trust, policy, approval,
      dry-run, and preview posture up front). Pins the declarative-
      first posture so automation does not become an unsafe scripting
      backdoor, pins the capability-declaration vocabulary as the
      whole union of per-step capabilities, pins deferred-intent and
      queued-action hooks with a bounded replay window so queued
      actions cannot silently replay stale authority, and pairs with
      the recipe-manifest and run-record boundary schemas so the
      command graph, trust, CLI / headless, AI-tool, support-export,
      and offline-reconcile surfaces read one automation contract
      instead of inventing parallel notions of "recipe" or "macro".

