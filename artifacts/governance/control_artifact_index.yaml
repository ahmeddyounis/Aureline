      emitter at tools/journey_harness/journey_harness.py) that emits
      one journey_trace_record per seeded journey conforming to
      schemas/traces/journey_trace.schema.json. The wrapper exports
      SOURCE_DATE_EPOCH, TZ=UTC, and LC_ALL=C so reruns on the same
