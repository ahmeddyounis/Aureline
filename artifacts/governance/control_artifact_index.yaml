  - id: provider_model_registry_contract
    title: AI provider / model registry, local-model-pack, and external-tool gateway contract (narrative)
    canonical_location: docs/ai/provider_model_registry_contract.md
    overview_page: docs/ai/provider_model_registry_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative contract binding every AI provider entry (first-party
      managed, first-party self-hosted, BYOK to a vendor or self-hosted
      endpoint, enterprise-gateway-brokered, vendor-hosted first-party-
      managed, extension-provided, mocked, or disabled), every local-
      model pack (first-party bundled, first-party downloaded, user-
      imported signed, user-imported unsigned quarantined, mirror-
      imported, air-gapped imported, extension-provided, or disabled),
      every model registry entry (family / variant / capability-version
      / lifecycle-state / deprecation-lane / modality / instruction-
      following-profile / capability posture / tokeniser posture /
      context-window / determinism posture / quota family / cost
      visibility axes), and every external-tool / MCP-server entry
      (first-party native, extension-provided, MCP server, user-
      registered, enterprise-registered, mocked, or disabled) to one
      governed row on one boundary schema so local, BYOK, enterprise-
      gateway, and vendor-hosted routes emit the same provider / model
      / execution-locus identity on every evidence packet, and so
      external-tool output is tainted input by default and rides the
      same permission, policy, and audit model as native tools. Freezes
      the identity spine (provider_entry_id, model_entry_id, execution_
      locus_class, region_posture_class, retention_stance_class, quota_
      family_class, supported_feature_class subset, data_class
      allowlist) every invocation MUST emit on every route / spend /
      evidence record, the six minimum pre-invocation disclosure kinds
      (provider_identity_chip, model_identity_chip, execution_locus_
      chip, region_posture_chip, retention_stance_chip, data_class_
      allowlist_readout) every selection / tool invocation MUST surface
      before dispatch, the local-model pack verification-state and
      trust-posture rules (unverified packs may not serve turns;
      quarantined / withdrawn packs deny with typed reasons; user-
      imported packs never silently promote to trusted), the always-
      tainted-by-default rule for external-tool return bytes with the
      full tainted-usage-constraint set preserved through downstream
      dispatch, the same-as-native approval / policy / audit invariant
      (every tool invocation above allowed_without_prompt spends an
      approval ticket and emits on the ai_external_tool_registry audit
      stream; bypass attempts deny with tool_bypass_attempted_approval_
      ticket_missing / tool_bypass_attempted_policy_evaluation_skipped
      / tool_bypass_attempted_audit_event_suppressed), the side-effect
      and data-class containment rules (side effects outside the row's
      allowlist deny with tool_side_effect_class_not_in_allowlist; data
      classes outside the row's allowlist deny with tool_data_class_
      not_in_allowlist; credential_handle_denied_always and secret_
      projection_denied_always surface on every denied-always set), the
      transport / locus visibility rule (local subprocess, loopback
      HTTP, unix domain socket, remote HTTPS, and each of the three
      MCP-server variants remain mutually distinguishable on the
      invocation disclosure), the redaction posture (raw URLs, raw
      endpoint hostnames, raw spawn commands, raw environment variables,
      raw API keys, raw OAuth tokens, raw mTLS material, raw request /
      response bodies, raw stdio frames, raw model weights, and raw
      pack bytes never cross the boundary on any surface), and the
      additive-minor change discipline for adding a new provider_class,
      execution_locus_class, transport_class, auth_mode_class,
      retention_stance_class, region_posture_class, supported_feature_
      class, quota_family_class, data_class, pre_invocation_disclosure_
      kind, approval_posture_class, pack_origin_class, pack_
      verification_state_class, pack_trust_posture_class, capability_
      posture_class, tokeniser_posture_class, context_window_class,
      deprecation_lane_class, model_lifecycle_state_class, tool_class,
      tool_transport_class, tool_execution_locus_class, tool_auth_mode_
      class, tool_output_trust_posture_class, tool_lifecycle_state_
      class, tool_output_invocation_disclosure_kind, audit_event_id, or
      denial_reason. Re-exports provider_class, route_path_class, cost_
      visibility_class, trust_posture, tainted_fence_strategy, tainted_
      usage_constraint, and tool_call_outcome from schemas/ai/context_
      assembly.schema.json; predicted_side_effect_class and
      irreversibility_class from schemas/providers/publish_later_
      record.schema.json; deployment_profile_class and policy_context
      from schemas/identity/policy_bundle.schema.json; approval-ticket
      / browser-handoff vocabulary from schemas/integration/; and
      redaction_class from schemas/governance/capability_lifecycle.
      schema.json without redefinition. Live provider-arbitration
      service, model serving, local-pack install / verify pipeline,
      external-tool invocation routing, and metering runtime are named
      explicitly out of scope at this revision.

