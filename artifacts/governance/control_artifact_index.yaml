  - id: local_history_contract
    title: Local-history snapshot/index contract, attribution lineage, and clear-history scope rules (narrative)
    canonical_location: docs/reliability/local_history_contract.md
    overview_page: docs/reliability/local_history_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: support_export
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative contract for the local-history recovery timeline.
      Freezes one closed snapshot_class vocabulary (edit_save_
      checkpoint, workspace_mutation_checkpoint, automation_ai_
      checkpoint, external_state_checkpoint, restore_rollback_
      checkpoint, capture_omitted_stub, policy_redacted_stub), one
      closed capture_mode vocabulary (content_addressed_snapshot,
      metadata_plus_reference_only, group_manifest_only, external_
      cause_metadata_only) with a closed omission-reason set, one
      closed truth_source_class set (local_history, autosave_
      journal, git_history, automation_lineage, external_change_
      record, synced_or_provider_history, review_checkpoint) that
      the timeline lane renders verbatim so local history is
      visibly distinct from adjacent recovery / VCS / sync surfaces,
      a logical-document identity model with a rename / move chain
      that follows the document across identity drift, a closed
      restore-preview minimum-field set (source_entry_ref, last_
      known and current canonical identity refs, canonical_
      identity_drift, rename_move_chain_ref, body_availability,
      resulting_snapshot_class, new_checkpoint_entry_ref) so a
      restore across drift always shows what identity drifted and
      what new attributable checkpoint the restore will write, and
      the clear-history scope vocabulary (this_file, this_
      workspace, this_profile, this_device) with an export-before-
      delete decision, local-only-by-default and ordinary-cache-
      clear exclusion invariants, and the constraint that no
      ordinary cache-clear flow may author a clear-history record.
      Final storage-engine internals, diff-UI polish, and sync /
      export implementation beyond the contract are explicitly out
      of scope at this revision.

  - id: local_history_entry_schema
    title: Local-history entry, group, and clear-scope record schema
    canonical_location: schemas/recovery/local_history_entry.schema.json
    overview_page: docs/reliability/local_history_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: support_export
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Cross-tool boundary schema for local-history records with
      additionalProperties false and allOf gates enforcing that
      restore_rollback_checkpoint entries carry restore_of_ref and
      cite the source entry, external_state_checkpoint entries
      carry external_cause_metadata_only capture plus no_mutation_
      journal_entry_external_cause / no_reversal_external_event
      link classes, content_addressed_snapshot capture carries at
      least one body_object_ref and body_available = true,
      metadata_plus_reference_only capture carries a non-null
      reference_digest and body_available = false, capture_omitted_
      stub and policy_redacted_stub entries carry body_available =
      false with a non-not_omitted omission_reason, restore_
      rollback_group group records carry restore_of_ref plus
      snapshot_class = restore_rollback_checkpoint, and clear-scope
      records pair scope_class with the matching scoped target_kind
      (this_file ↔ logical_document, this_workspace ↔ workspace,
      this_profile ↔ profile, this_device ↔ device). Local-only
      posture (local_only_by_default and ordinary_cache_clear_
      exclusion) is const true on every record; reusing the
      filesystem-identity-record, mutation-journal actor / source /
      reversal / redaction vocabularies by reference avoids minting
      parallel attribution. Adding a new snapshot_class value, new
      capture_mode, new omission_reason, new truth_source_class,
      new actor_class re-export, new retention_scope, or new
      timeline_distinction_label is additive-minor and bumps the
      schema_version; repurposing an existing value is breaking.

