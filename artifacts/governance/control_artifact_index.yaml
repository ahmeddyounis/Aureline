# Control-artifact index.
#
# Canonical register of every control asset that the foundations milestone
# produces or will produce. One artifact, one home, one owner, one review
# path — this file is the machine form, the human overview is in
# docs/governance/control_artifact_index.md. If the two disagree, this file
# is authoritative for tooling and the narrative must be updated in the same
# change.
#
# Scope. This index records where each control asset lives, who owns it,
# how often it is reviewed, whether it is public or internal, and the next
# milestone on which it must exist or be refreshed. It does NOT restate the
# contents of those assets: detailed governance workflow belongs in
# docs/governance/decision_workflow.md, contract schemas belong under
# schemas/, and the claim manifest is a governance packet family defined by
# artifacts/governance/governance_packet_template.yaml. This index only
# names and routes them.
#
# Ownership rules.
#   - Every entry MUST name an owner DRI and an owning_lane drawn from
#     ownership_matrix.scorecard_lane_index.
#   - Every entry MUST name a review_cadence, a visibility_class, and a
#     next_milestone target. Missing fields are validation failures.
#   - canonical_location is either a repo-relative path (file or directory)
#     or one of the sentinels:
#       not_yet_seeded    — artifact family is declared but no concrete
#                           home has landed; next_milestone names the
#                           milestone on which the home must land.
#       outline_only      — a narrative stub exists and is named; a
#                           machine-readable form is deferred.
#   - Where the artifact already has machine form elsewhere in this
#     repository (for example ownership_matrix.yaml, decision_index.yaml),
#     canonical_location points at that file and this index does not
#     restate its rules.
#
# Rolling up visibility.
#   - visibility_class: internal means the artifact is a repository-internal
#     control record. It may still live in a public repository, but it is
#     not a published surface.
#   - visibility_class: public means the artifact is part of the project's
#     public truth: it is linked from docs intended for downstream consumers
#     and is governed by the docs_public_truth lane.
#
# Do not surface internal milestone slugs in product strings; this index is
# governance-only.

schema_version: 1

# -----------------------------------------------------------------------------
# Artifact entries.
#
# Ordered roughly by dependency: the artifact graph and interface inventory
# come first because other artifacts key off them; release, docs, and
# support evidence come later because they cite the upstream records.
# -----------------------------------------------------------------------------
artifacts:
  - id: artifact_graph
    title: Control-artifact index (this file)
    canonical_location: artifacts/governance/control_artifact_index.yaml
    overview_page: docs/governance/control_artifact_index.md
    owner_dri: "@ahmedyounis"
    owning_lane: governance_packets
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      The artifact graph is this index. It is reviewed once per milestone
      alongside the scorecard. Any new control asset introduced between
      milestones MUST land a row here in the same change.

  - id: interface_inventory
    title: Interface inventory outline
    canonical_location: docs/governance/interface_inventory.md
    overview_page: docs/governance/interface_inventory.md
    owner_dri: "@ahmedyounis"
    owning_lane: governance_packets
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: outline_only
    notes: >
      Narrative outline only at this milestone. A machine-readable
      interface inventory (stable-surface SDK, CLI, RPC, route/build-truth
      surfaces) is deferred to the first-beta milestone; until then this
      outline names the categories and owning lanes so no interface surface
      is accidentally exposed without one.

  - id: benchmark_governance
    title: Benchmark-council charter
    canonical_location: docs/governance/benchmark_council_charter.md
    owner_dri: "@ahmedyounis"
    owning_lane: benchmark_lab
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Charter seed only — names roles, decision scope, cadence, a quorum
      placeholder, and escalation route. The full metric-change policy,
      public-comparison rules, and stable-surface contract metadata are
      explicitly out of scope at this milestone.

  - id: qualification_cadence
    title: Qualification cadence and milestone scorecard
    canonical_location: artifacts/governance/milestone_scorecard_template.yaml
    owner_dri: "@ahmedyounis"
    owning_lane: governance_packets
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      The scorecard template is the existing machine form for qualification
      cadence. The control-artifact index points at it rather than
      restating its rules.

  - id: dependency_register
    title: Decision dependency register
    canonical_location: artifacts/governance/decision_index.yaml
    overview_page: docs/governance/decision_backlog.md
    owner_dri: "@ahmedyounis"
    owning_lane: governance_packets
    review_cadence: each_change
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Dependencies live under the top-level `dependencies:` map of the
      decision index. This index points at that file; it does not mint a
      parallel register.

  - id: release_evidence
    title: Release-evidence packet family
    canonical_location: artifacts/release/
    owner_dri: "@ahmedyounis"
    owning_lane: release_evidence
    review_cadence: each_release
    visibility_class: public
    next_milestone: first_beta
    status: not_yet_seeded
    notes: >
      Provenance, SBOMs, compatibility reports, claim manifests, rollback
      packets, and shiproom packets. Schemas and templates are seeded at
      the foundations milestone via governance_packet_template.yaml;
      concrete release packets land at the first-beta milestone.

  - id: docs_public_truth
    title: Docs and public-help truth
    canonical_location: docs/
    owner_dri: "@ahmedyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Includes docs/, README.md, AGENTS.md, CLAUDE.md, the known-limits
      matrix, the support-window statement, and migration guides. This
      index records the home; content rules live in docs/README.md and
      the public-truth lane's claim manifests.

  - id: route_build_truth
    title: Route-map and build-truth artifacts
    canonical_location: docs/build/reproducible_build_baseline.md
    owner_dri: "@ahmedyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: outline_only
    notes: >
      Build-truth (pinned toolchain, bootstrap, build-identity record) is
      seeded; route-map artifacts (routable command identity, action
      catalogue) are outline-only at this milestone and land under the
      shell_command_system lane on the first-beta milestone.

  - id: accessibility_review_packets
    title: Accessibility review packet family
    canonical_location: artifacts/ux/
    owner_dri: "@ahmedyounis"
    owning_lane: accessibility_input_review
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: not_yet_seeded
    notes: >
      Accessibility audits, input-method review packets, and
      reduced-motion / contrast artifacts. Seeding this family is tracked
      as dependency DEP-0003 in the decision index.

  - id: surface_traceability
    title: Surface-traceability artifacts
    canonical_location: docs/governance/interface_inventory.md
    owner_dri: "@ahmedyounis"
    owning_lane: governance_packets
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: first_beta
    status: outline_only
    notes: >
      Traceability matrix linking stable surfaces to their owning lanes,
      decision rows, and fitness functions. At this milestone only the
      outline categories are named; the matrix itself is deferred.

  - id: frozen_surface_manifests
    title: Frozen-surface manifests
    canonical_location: artifacts/release/
    owner_dri: "@ahmedyounis"
    owning_lane: release_evidence
    review_cadence: each_release
    visibility_class: public
    next_milestone: first_stable
    status: not_yet_seeded
    notes: >
      Per-release manifest of which public surfaces are frozen and under
      which compatibility promise. Out of scope at this milestone beyond
      naming the home; metadata for stable-surface contracts is explicitly
      deferred.

  - id: issue_routing
    title: Issue-routing seed
    canonical_location: artifacts/governance/issue_routing.yaml
    overview_page: docs/governance/control_artifact_index.md
    owner_dri: "@ahmedyounis"
    owning_lane: governance_packets
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Seed mapping of issue classes to public or private routes with
      privacy / disclosure class, public-summary expectation, and owning
      forum placeholder. Dispute resolution for benchmark results routes
      through the benchmark-council charter.

  - id: contribution_guide
    title: Contribution guide and DCO baseline
    canonical_location: CONTRIBUTING.md
    owner_dri: "@ahmedyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Contributor-facing rules for DCO sign-off, REUSE/SPDX file
      metadata, third-party imports, generated-code provenance, and
      public-interface versioning. Pairs with the provenance and
      compliance baseline; both update together when rules change.

  - id: provenance_compliance_baseline
    title: Provenance and compliance baseline
    canonical_location: docs/governance/provenance_and_compliance_baseline.md
    overview_page: docs/governance/provenance_and_compliance_baseline.md
    owner_dri: "@ahmedyounis"
    owning_lane: governance_packets
    review_cadence: each_change
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Governance form of the contribution guide's IP, provenance, and
      supply-chain rules. Names the placeholder CI provenance/SBOM lane
      that real generators will replace. Release-grade SBOM emission
      and signed attestations remain explicitly out of scope here.

  - id: compliance_checklist
    title: Compliance checklist (deps, vendored sources, generators, notices)
    canonical_location: artifacts/governance/compliance_checklist.yaml
    overview_page: docs/governance/provenance_and_compliance_baseline.md
    owner_dri: "@ahmedyounis"
    owning_lane: governance_packets
    review_cadence: each_change
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Single canonical register of every external Cargo dependency,
      vendored third-party file, code generator, and pending NOTICE
      attribution row. Consumed by ci/sbom_provenance.sh and by the
      eventual real SBOM/attestation lane.

  - id: ci_provenance_lane
    title: CI provenance / SBOM lane (placeholder)
    canonical_location: ci/sbom_provenance.sh
    overview_page: docs/governance/provenance_and_compliance_baseline.md
    owner_dri: "@ahmedyounis"
    owning_lane: release_evidence
    review_cadence: each_change
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Placeholder lane that emits a workspace SBOM stub and a
      provenance summary stub anchored on the build identity. Replaced
      incrementally by tools/governance/spdx_sbom.sh,
      tools/governance/cyclonedx.sh, and tools/governance/attest.sh
      when those generators land.

  - id: boundary_manifest_strawman
    title: Product boundary manifest (strawman)
    canonical_location: docs/product/boundary_manifest_strawman.md
    overview_page: docs/product/boundary_manifest_strawman.md
    owner_dri: "@ahmedyounis"
    owning_lane: docs_public_truth
    review_cadence: per_milestone
    visibility_class: internal
    next_milestone: foundations
    status: seeded
    notes: >
      Strawman that classifies every product capability as local-core,
      self-host-friendly, managed convenience, or out-of-scope. Reserves
      deployment-profile, residual-dependency, data-boundary,
      portability, and local-core-continuity slots per row so later
      claim packets do not retrofit these fields inconsistently. Pairs
      with schemas/product/boundary_manifest.schema.json. A YAML
      machine form under artifacts/product/boundary_manifest.yaml is
      reserved for a later milestone; the strawman is narrative-only
      at this milestone.

# -----------------------------------------------------------------------------
# Review cadence vocabulary.
#
# Enumerated so tooling can validate review_cadence values. The narrative
# overview in docs/governance/control_artifact_index.md explains what each
# cadence implies for engineering, design, QE, docs, support, and release.
# -----------------------------------------------------------------------------
review_cadences:
  - each_change
  - per_milestone
  - each_release

# -----------------------------------------------------------------------------
# Visibility vocabulary.
# -----------------------------------------------------------------------------
visibility_classes:
  - internal
  - public

# -----------------------------------------------------------------------------
# Status vocabulary.
# -----------------------------------------------------------------------------
status_values:
  - seeded
  - outline_only
  - not_yet_seeded
