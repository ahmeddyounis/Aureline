      or not_applicable_structural) plus a per-profile absence-impact
      class and continuity-fallback class. Silent posture defaults
      are a validation failure; every profile is covered by every
      row.

  - id: chronology_row_contract
    title: Chronology event/history-row, timeline-group, and export-preview contract
    canonical_location: docs/ux/chronology_row_contract.md
    overview_page: docs/ux/chronology_row_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative contract binding the four chronology primitives
      (history_row_record, timeline_group_record,
      narrative_summary_card_record, and
      chronology_export_preview_record) to one shared schema, one
      closed action-verb vocabulary, one actor-kind vocabulary, one
      scope-object-kind vocabulary, one provenance-badge vocabulary,
      one detail-link vocabulary with a non-truncating durable-link
      rule for consequential and safety-critical rows, one time-zone
      / absolute-time / relative-time presentation policy, and one
      export-redaction posture that cannot widen redaction relative
      to the live surface. Seats the companion schema at
      schemas/ux/history_row.schema.json and worked fixtures under
      fixtures/ux/history_examples/ covering AI evidence, task
      events, policy blocks, provider sync, publish/revoke, restore/
      recovery, and support/export previews; every fixture renders
      from the shared schema without renaming core fields per
      subsystem. Full timeline UI rendering and event-frequency
      analytics are explicitly out of scope at this revision.

  - id: history_row_schema
    title: Chronology primitive boundary schema
    canonical_location: schemas/ux/history_row.schema.json
    overview_page: docs/ux/chronology_row_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Cross-tool chronology boundary schema. Freezes history_row_record,
      timeline_group_record, narrative_summary_card_record, and
      chronology_export_preview_record with closed vocabularies for
      action_verb (25 values), scope_object_kind (10 values),
      actor_kind (7 values), outcome_class (10 values),
      importance_class (3 values), provenance_badge_class (9 values),
      detail_link_kind (11 values), timeline_group_rule (8 values),
      export_preview_kind (6 values), and export_redaction_posture
      (4 values). Re-exports redaction_class and client_scope from
      ADR-0011 and source_subsystem from the activity event envelope
      without modification. Adding a new vocabulary value is
      additive-minor and bumps history_row_schema_version;
      repurposing an existing value is breaking and requires a new
      decision row.

