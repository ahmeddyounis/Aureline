  - id: output_log_viewer_contract
    title: Output, log, result-grid, and artifact-preview viewer contract
    canonical_location: docs/ux/output_log_viewer_contract.md
    overview_page: docs/ux/output_log_viewer_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative UX contract binding every task-output pane, shell
      scrollback, log viewer, result grid, notebook cell output area,
      test / build dashboard, diagnostic stream, and artifact preview
      surface to one output_viewer_object_record projecting output
      class + size bucket + viewer mode + origin class + trust posture
      + freshness + source identity + run-or-kernel ref + size
      disclosure + truncation + control contract + export path into
      one cross-tool packet. Names the five viewer families
      (output_viewer, log_viewer, result_grid_viewer,
      artifact_preview_viewer, diagnostic_viewer), the eleven-value
      output_class vocabulary, the six-value size_bucket vocabulary,
      the six-value viewer_mode vocabulary (inline, virtualized,
      open_detail, blocked_active_content, textual_fallback,
      snapshot_review), the four-value origin_class vocabulary
      (live_stream, cached_playback, imported_artifact,
      snapshot_capture), the six-value large_output_action_class
      vocabulary, the closed truncation-owner / state / reason triple,
      the closed search-scope / bookmark-scope / textual-fallback
      vocabularies, the sandbox-posture and active-content-policy
      vocabularies. Composes with the live-set review contract by
      reference for every live-stream origin, with trust_class and
      connectivity_state from the safe-preview contract, with
      execution_context_record_ref from the runtime family, with
      preview_snapshot_record from the preview family for artifact
      previews that carry a preview snapshot, and with
      artifact_edit_posture_record from the generated-artifact family
      for imported or generated origins. Rules enforce no shell freeze,
      no hidden truncation, no silent active-content drop, live-stream
      delegation of delivery / buffering / follow / provider-limit
      honesty to the referenced live-set, and trust consistency with
      notebook, preview, and terminal surfaces. Building every output /
      log / result / artifact viewer surface and the rendering pipelines
      that translate producer bytes into pixels are explicitly out of
      scope at this revision.

  - id: output_viewer_object_schema
    title: Output-viewer object boundary schema
    canonical_location: schemas/ux/output_viewer_object.schema.json
    overview_page: docs/ux/output_log_viewer_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Boundary schema for the output_viewer_object_record. additional
      Properties false everywhere with allOf gates forcing live_stream
      origin to cite a live_set_state_ref and null capture_basis, non-
      live origins to carry a capture_basis and a null live_set_state
      _ref, only live_stream to claim authoritative_live freshness,
      size_bucket in {large, very_large, unbounded_stream} to forbid
      no_action_required, unbounded_stream to forbid inline rendering,
      viewer_mode = blocked_active_content to carry a typed textual
      fallback and a typed active_content_blocked_* policy class,
      viewer_mode = textual_fallback to advertise the fallback control,
      viewer_mode = snapshot_review to forbid live_stream origins,
      trust_class = RawText to pair with not_applicable_no_active
      _content sandbox posture, trust_class = IsolatedRemoteActive to
      carry a sandbox posture in {sandbox_isolated, sandbox_restricted,
      sandbox_unavailable}, active_content_allowed to pair with
      TrustedLocalActive or IsolatedRemoteActive, origin_class =
      imported_artifact to carry an artifact-edit-posture projection,
      origin_class = snapshot_capture to keep copy / export scoped to
      named_snapshot_only or metadata_only and follow / jump controls
      in not_applicable, runnable source identities to carry a
      run_or_kernel_ref with a non-not_applicable kind, binary /
      media artifact previews to refuse inline rendering without a
      trust-cleared posture, truncation state = none to pair with
      owner = none and truncation_reason = not_applicable, and non-
      none truncation states to name owner in {client, provider} and
      a reason other than not_applicable. Re-exports trust_class,
      connectivity_state, freshness_class, representation_class,
      copy_scope_class, export_scope_class, buffered_change_visibility,
      follow_mode, artifact_origin_class, provenance_state, default
      _edit_posture, and redaction_class from their home schemas
      without redefinition. Adding a new output_class, size_bucket,
      viewer_mode, origin_class, sandbox_posture_class, active_content
      _policy_class, source_identity_class, run_or_kernel_kind,
      large_output_action_class, truncation state / reason, search
      _scope_class, bookmark_scope_class, or textual_fallback_class
      value is additive-minor and bumps output_viewer_object_schema
      _version; repurposing an existing value is breaking and requires
      a new decision row.

