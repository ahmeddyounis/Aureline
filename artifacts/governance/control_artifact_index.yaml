    notes: >
      Normative cross-tool contract binding every conflict-aware
      surface (inline three-way merge view, structure-aware merge
      view, regenerate-first surface, choose-source-only surface,
      cell-aware notebook merge view, external-tool handoff, evidence
      reader, resume / abort review sheet, change-stack panel, AI
      branch-agent panel, support / export bundle's merge section,
      audit lane) to one conflict_class_record, one conflict_
      resolution_session_record (with ordered conflict_resolution_
      action_record rows), and one or more merge_validation_hint_
      record rows. Pairs with the branch / worktree / history /
      stash contract (docs/vcs/git_state_and_worktree_contract.md)
      and the change-stack / patch-stack / sequence-editor contract
      (docs/vcs/change_stack_contract.md): the merge_conflict_class_
      record_id_ref slots reserved on those contracts become
      consumable through this contract once a conflict-resolution
      session is admitted. Reviewers can tell conflict class,
      source-of-truth, unresolved count, and safe escape path
      before taking action; structured and generated conflicts
      cannot silently degrade into lossy text merges (raw text
      fallback is mechanically forbidden on lockfile, generated,
      binary, and evidence rows; admissible only on structured-
      config rows with an explicit lossy acknowledgement on the
      audit stream); regenerate-first conflicts pin a canonical
      input; external-tool handoff requires a verified round-trip
      before merge-complete; abandon and reopen are reachable
      through the recovery object the session pinned at admission.

