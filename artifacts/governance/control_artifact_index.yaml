    notes: >
      Cross-tool boundary schema for the status_transition_
      packet_record and status_transition_packet_audit_event_
      record shapes frozen in docs/work_items/work_item_
      contract.md. additionalProperties false everywhere.
      allOf gates force mutation_mode = publish_now to cite
      a non-null consequence-preview ref; mutation_mode =
      deferred_publish to cite a non-null publish-later
      queue item ref; mutation_mode = open_in_provider to
      cite a non-null browser-handoff packet ref; mutation_
      mode = local_draft / inspect_only to forbid provider-
      bound apply refs; per-entry route_through_browser_
      handoff_open_in_provider to cite a non-null linked
      _browser_handoff_packet_ref; per-entry queue_for_
      publish_later_deferred and captured_offline_pending_
      drain to cite their matching publish-later queue item
      and offline-handoff packet refs; per-entry permission
      _unknown_pending_actor_resolution to cite a non-null
      account_mapping_binding ref; link / unlink / attach /
      detach / publish-preview transition kinds to cite a
      typed linked_artifact_change_class outside no_artifact
      _change AND a non-null linked_artifact_record_id_ref;
      save_local_draft_only_no_provider_path entries to
      resolve notification side effect to no_notification
      _locally_only; and inspect_only_no_mutation entries
      to resolve to admissible_inspect_only_what_if. Closes
      the silent_provider_mutation_under_local_draft_label_
      forbidden gate that forbids citing any provider-bound
      apply ref under a local-draft / inspect-only mutation
      mode. Re-exports mutation_mode and provider_actor_
      class from the publish-later contract, redaction_class
      from ADR-0010 / ADR-0007. Adding a new record_kind,
      transition_kind_class, transition_action_class,
      notification_side_effect_class, permission_scope_class,
      transition_admissibility_class, linked_artifact_change
      _class, denial_reason, or audit_event_id is additive-
      minor and bumps status_transition_packet_schema_
      version; repurposing an existing value is breaking and
      requires a new decision row.

