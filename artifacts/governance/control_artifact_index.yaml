      change-trigger rule refs. Reuses the frozen
      deployment_profile_vocabulary from
      artifacts/deployment/locality_matrix.yaml and
      artifacts/compat/qualification_matrix_seed.yaml so the three
      registers cite the same profile ids without alias drift.
      Fixtures live under fixtures/governance/deployment_profiles/,
      including one worked narrowing case where a hosted-dependency
      failure narrows the hybrid remote-attach profile without
      turning the desktop into a hidden thin client.

  - id: residual_dependencies
    title: Residual-dependency ledger
    canonical_location: artifacts/governance/residual_dependencies.yaml
    overview_page: docs/governance/deployment_profile_truth.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: per_milestone
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
