    notes: >
      Normative contract freezing the cross-surface disclosure,
      service-opt-in boundary, and onboarding portability rules
      every Start Center, workspace-switcher, open-flow sheet,
      recent-work list, restore card, import picker, first-run
      tour step, welcome banner, account-opt-in card, and
      onboarding prompt surface reads. Freezes one entry_surface_
      row_record naming one closed entry_surface_family (12
      values), one closed account_prompt_class (7 values: no_
      prompt, optional_prompt, deferrable_prompt, required_
      prompt, policy_forced_prompt, unavailable_prompt, not_
      applicable), one closed account_prompt_timing_class (7
      values), one closed boundary_crossing_class (9 values: no_
      boundary_crossed, reads_provider_state, widens_trust,
      touches_credential_store, reaches_remote_resource, attaches_
      external_runtime, emits_managed_telemetry, opens_browser_
      handoff, enters_service_plane) so the ground truth of what
      the row's action actually touches is a declared field
      checked against the prompt class; freezes one account_
      prompt_record shape naming declinability, decline_
      consequence_class (5-value closed set that forbids silent
      degradation of prior local capability by construction),
      active_policy_bundle_ref, policy_forced_reason_code (5
      values), unavailable_envelope_class (6 values), and typed
      next_step_decision_hook resolution hooks; freezes one
      onboarding_portability_state_record naming one closed
      state_portability_class (6 values: portable_profile_state,
      machine_local_diagnostic, device_scoped, account_scoped,
      policy_scoped, ephemeral_session), one closed reset_class
      (5 values), one closed export_class (6 values), one closed
      profile_scope_class (5 values), and a mandatory portability_
      reason free-text anchor so reviewers can tell per-item why
      an onboarding state item lives in portable profile state
      versus machine-local diagnostics versus device / account /
      policy / session scope; seats a canonical state-item table
      binding tour_progress, start-center welcome-banner
      dismissal, first_run_seen_flag, imported_profile_history,
      onboarding_posture, recent_work_metadata, restore_prompt_
      skipped_registry, consent_acknowledgement_log, connected_
      provider_approval_ticket, decode_recovery_ring, and
      session_execution_posture_cache to the correct portability
      class so recent-work metadata stays device-local (never
      leaks across devices), tour progress rides the portable
      profile package, and policy / account-scoped items never
      leak through the portable profile package. Freezes one
      onboarding_portability_manifest_record declaring all twelve
      const-true invariants (no-account floor preserved on every
      seeded startup state; no forced first-run sign-in; privacy-
      reduction preserves Open and Clone; clearing recent work
      does not remove the open-path; no-account rows equal-weight
      with opt-in rows; decline never silently degrades local
      capability; one state item one portability class; portable
      profile state never leaks account-scoped items; recent-work
      metadata is device-scoped; boundary-crossing truth matches
      prompt class; every onboarding state item is declared;
      every policy-forced prompt cites a bundle) so hidden service
      dependencies at first run become schema or policy
      violations rather than UX drift. Re-exports primary_action_
      id, start_center_zone, privacy_reduction_mode, freshness_
      class, absence_class, startup_state tokens, navigation_
      route_id, entry_verb, target_kind, resulting_mode,
      restore_level, missing_target_state, recovery_class, next_
      step_decision_hook, deployment_profile_id, and the
      measurement-surface vocabulary by reference without
      redefinition. Implementing every onboarding flow at the
      launch milestone is explicitly out of scope at this
      revision.

