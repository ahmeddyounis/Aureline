      queueable class, force checkpoint_for_reconciliation steps to
      declare the reconciliation intent, and lock the recorded-macro
      capability set to a closed subset that forbids network /
      process / credential / extension / terminal / debug / notebook /
      settings / policy / trust / AI capabilities mechanically.

