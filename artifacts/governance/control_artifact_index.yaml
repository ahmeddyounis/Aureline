      workflow-bundle, and evidence refs and the full required proof-
      class set (vendor_asserted, customer_provided, runtime_observed,
      policy_declared) each present or not_applicable (runtime_observed
      MUST be present); that supported and community rows carry at
      least one runtime_observed or customer_provided proof entry at
      present or partial; that limited, retest_pending, and
      evidence_stale effective classes carry a non-empty active
      downgrade-reason set; that not_claimed rows carry a non-empty
      exclusion_refs list; that exception_recorded rows carry non-
      empty active downgrade reasons and known-limit refs; and that
      replacement_grade_candidate rows name the superseded row via
      replacement_claim_row_ref. Adding a new claim class, proof class,
      proof-presence value, downgrade trigger, publication destination,
      subject family, release channel class, deployment profile, or
      client scope value is additive-minor and bumps the row
      schema_version; repurposing an existing value is breaking.

