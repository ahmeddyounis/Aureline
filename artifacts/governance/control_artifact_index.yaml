      chrome_moved, recipe_step_target_moved, guided_step_target_
      moved, generator_contract_mismatch, migration_step_
      superseded, known_limit_note_added_or_widened). Override
      rules forbid silent widening, require release-bearing
      overrides to pair with a late-proof exception packet, and
