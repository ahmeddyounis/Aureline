  - id: onboarding_state_contract
    title: Portable onboarding progress, dismissals, and imported-profile history state contract (narrative)
    canonical_location: docs/state/onboarding_state_contract.md
    overview_page: docs/state/onboarding_state_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Normative contract binding every surface that writes, reads,
      exports, deletes, or holds a row of onboarding progress, a
      dismissal, a first-useful-work milestone observation, an
      imported-profile history ledger entry, a rollback reminder,
      or a remembered compatibility notice to one record shape
      carrying one closed storage_lane (8 values: portable_profile_
      body, portable_profile_machine_addendum, workspace_tree,
      machine_local_state, ephemeral_session_memory, policy_bundle_
      cache, credential_store_metadata_only, support_export_scratch),
      one re-exported state_authority_class (4 values), one re-
      exported state_portability_class (6 values), one re-exported
      reset_class (5 values), one re-exported export_class (6
      values), one re-exported profile_scope_class (5 values), one
      closed delete_posture (6 values: clear_allowed, clear_requires_
      preview, clear_requires_preview_and_rollback, clear_denied_
      admin_owned, clear_denied_live_authority, clear_denied_record_
      class_immutable), one closed hold_posture (5 values: not_hold_
      eligible, hold_eligible_per_profile, hold_eligible_per_account,
      hold_eligible_per_policy_bundle, hold_handled_by_authority),
      and one closed support_export_posture (5 values: included_by_
      default, included_metadata_only, opt_in_only, excluded_by_
      default, excluded_always) so every clear-data review, export
      flow, legal-hold registrar, and support-export tool classifies
      the row from the schema alone instead of file-path heuristics.
      Seats a canonical state-item table binding state_item.tour_
      progress, state_item.welcome_tour_page_progress, state_item.
      first_run_checklist_task_progress, state_item.dismissal.
      welcome_banner, state_item.dismissal.onboarding_prompt,
      state_item.dismissal.restore_card_session_only, state_item.
      first_useful_work_milestone, state_item.imported_profile_
      history, state_item.rollback_reminder, state_item.remembered_
      compatibility_notice, state_item.consent_acknowledgement_
      onboarding, and state_item.connected_provider_approval_
      ticket to the correct (storage_lane, state_authority_class,
      state_portability_class, reset_class, export_class, delete_
      posture, hold_posture, support_export_posture) tuple so tour
      progress, welcome-banner acknowledgements, imported-profile
      history, and remembered compatibility notices ride the portable
      profile package with the user, first-useful-work milestones
      and rollback reminder alarms stay device-local, restore-card
      session-only dismissals stay ephemeral and never export,
      managed-policy consent acknowledgements ride the signed-bundle
      lane with local clear denied, and connected-provider approval
      tickets stay beside the credential store as metadata only.
      Declares twelve const-true invariants (one record one storage
      lane; lane matches state authority class; portability class
      matches storage lane; recent-work and milestones are device-
      scoped by default; remembered compatibility notice never binds
      live authority; imported-profile history rides portable or is
      machine scratch; ephemeral session never exports bodies; admin-
      owned rows refuse local clear; credential metadata never
      exports raw handle; every row classifies delete, export, and
      hold; dismissal scope matches lane; every rollback reminder
      has close or resolution) so leakage, dual-homing, and hidden
      workspace writes become schema violations rather than
      implementation-specific drift. Re-exports state_authority_
      class, portability_class, redaction_class, and fidelity_label
      from docs/state/profile_and_state_map.md and schemas/profile/
      portable_profile.schema.json, re-exports state_portability_
      class, reset_class, export_class, profile_scope_class,
      recovery_binding_class, and the state_item_id namespace from
      docs/ux/no_account_local_entry_contract.md and schemas/ux/
      onboarding_portability_state.schema.json, and re-exports
      state-plane / downgrade-reason / preserved-prior-artifact
      vocabulary from docs/state/migration_and_restore_playbook.md.
      UI implementation of onboarding history inspection, transport
      or wire format for the portable profile package, and exact
      retention clocks are named explicitly out of scope at this
      revision.

