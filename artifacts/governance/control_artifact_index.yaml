      session to cite a non-null container_handoff_packet_ref and
      forbid live attach, force replayed_from_container_capture_
      session to cite a non-null container_capture_ref and forbid
      live attach, force devcontainer_provisioned_session and
      managed_workspace_provisioned_container_session to cite a
      non-null devcontainer_profile_record_ref, force every admissible
      _under_approval_ticket attach entry to cite a non-null approval
