      Normative contract binding every AI workflow / surface that
      claims a non-experimental rollout state to one current
      graduation_packet_record carrying the workflow_or_surface_id,
      the bound provider_entry_ref / model_entry_ref / prompt_pack_
      manifest_ref / tool_pack_manifest_ref, the eval-evidence rows
      backing the claim (protected_eval_corpus, red_team_corpus,
      latency_envelope, cost_envelope, parity_harness, fairness_
      audit, user_study, vendor_attestation_only, and no_evidence_
      admitted_with_disclosure kinds), the latency_envelope_class /
      cost_envelope_class buckets, the fallback_posture_class with
      a typed fallback target when the posture pins one, the
      rollback_plan covering provider / model / prompt-pack / tool-
      pack / rollout-state axes, the originating approval-ticket
      ref, and the linked assurance-claim refs that back a stable
      claim. Freezes the six-state rollout vocabulary
      (experimental, shadow, preview, stable, deprecated,
      disabled) on schemas/ai/graduation_packet.schema.json#/$defs/
      rollout_state_class with the rollout-state-pin shape
      (model_rollout_state_record) requiring a current graduation_
