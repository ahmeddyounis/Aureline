      first_useful_work_milestone_record (one observation of a
      surface_first_useful_edit / surface_first_useful_navigation /
      surface_first_save / surface_first_clone / surface_first_
      restore / surface_first_migration_review milestone), imported_
      profile_history_entry_record (one row binding a portable_
      profile_import / handoff_packet_apply / competitor_config_root_
      import / template_or_prebuild_snapshot_apply to its fidelity
      label, rollback checkpoint ref, equivalence map ref, imported_
      at_monotonic, and resolved_state in {kept, rolled_back,
      partial_apply_pending_review, rollback_window_open, rollback_
      window_closed}), rollback_reminder_record (one reminder with
      reminder_kind, bound_history_ref, rollback_window_opens_
      monotonic, rollback_window_closes_monotonic, reminder_state in
      {armed, snoozed_once, resolved_kept, resolved_rolled_back,
      window_closed_expired}, and paired_checkpoint_ref), remembered_
      compatibility_notice_record (one notice with notice_kind,
      acknowledged_by in {user_acknowledged, user_declined, user_
      snoozed_until_reset, policy_suppressed}, optional equivalence_
      map_ref, applies_to_source_schema_version, and reappears_
      rule), and onboarding_state_bundle_record (top-level
      aggregator declaring the twelve const-true invariants and
      binding every concrete record). additionalProperties false
      everywhere and allOf gates force ephemeral_session_memory
      rows to declare remembered_across_restart = false, force
      every other lane to declare remembered_across_restart = true,
      force progress_state in {completed, skipped, expired_by_
      policy} to carry resolved_monotonic, force dismissal_intent =
      dismiss_for_this_session to pair with scope_class = per_
      session, reappears_rule = on_restart, and storage_lane =
      ephemeral_session_memory, force dismiss_never_show_again to
      declare reappears_rule in {never, on_profile_reset, on_policy_
      change}, force first_useful_work_milestone_record to ride
      portable_profile_body or machine_local_state only (never
      workspace_tree), force machine_local_state milestones to
      carry observed_on_device_id_ref, force imported_profile_
      history_entry_record to ride portable_profile_body or
      machine_local_state only, force compatible / manual_review
      fidelity labels to carry rollback_checkpoint_ref and
      equivalence_map_ref, force rollback_window_open resolved_
      state to carry rollback_reminder_ref, force resolved_kept /
      resolved_rolled_back reminder states to carry paired_
      checkpoint_ref, force schema_upgrade_translation_hint /
      extension_equivalence_map_review notices to carry equivalence_
      map_ref, force user_acknowledged / user_declined notices to
      carry acknowledged_monotonic, and force every bundle record
      to carry at least twelve invariant assertions with asserted_
      true = true. Re-exports state_authority_class, portability_
      class, location_root_id, redaction_class, and fidelity_label
      from schemas/profile/portable_profile.schema.json and
      state_portability_class, reset_class, export_class, profile_
      scope_class, recovery_binding_class, and the state_item_id
      namespace from schemas/ux/onboarding_portability_state.schema.
      json without redefinition. Adding a new record kind,
      progress_kind, progress_state, dismissed_surface_family,
      dismissal_intent, scope_class, reappears_rule, milestone_
      kind, import_kind, resolved_state, reminder_kind, reminder_
      state, notice_kind, acknowledged_by, storage_lane, delete_
      posture, hold_posture, or support_export_posture value is
      additive-minor and bumps onboarding_progress_schema_version;
      repurposing an existing value is breaking and requires a
      new decision row.

