      transport, multiplayer editing, CRDT merge, the shared-
      archive viewer, terminal-byte / debug-payload sharing
      protocols, and presenter-handoff UI flows is named
      explicitly out of scope at this revision.

  - id: collaboration_session_state_schema
    title: Collaboration session-lifecycle boundary schema
    canonical_location: schemas/collaboration/session_state.schema.json
    overview_page: docs/collaboration/session_authority_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
    review_cadence: each_change
    visibility_class: public
    next_milestone: foundations
    status: seeded
    notes: >
      Cross-tool boundary schema for the four records frozen in
      the collaboration session-authority contract:
      collaboration_session_record (session_id, current_state_
      class, owner_actor_ref, owner_workspace_identity_ref,
      participant_actor_refs, host_locus_class, transport_class,
      relay_state_class, remote_agent_target_identity_witness_
      ref, sealed_archive_ref, summary_label, freshness_class,
      client_scopes, policy_context, redaction_class, minted_at,
      ended_at), collaboration_session_transition_record (prior_
      state_class, next_state_class, transition_reason_class,
      actor_ref, policy_context), collaboration_session_downgrade_
      record (downgrade_kind_class, local_work_preservation_state_
      class, recovery_path_classes, affected_actor_refs, affected_
      shared_object_refs, sealed_archive_class_inventory,
      policy_context), and collaboration_session_audit_event_
      record (audit_event_id, denial_reason). additionalProperties
      false everywhere. allOf gates force the admitted-transition
      matrix (any pair not enumerated denies with transition_
      illegal_for_session_state), force remote_agent_target_
      identity_witness_ref non-null whenever host_locus_class is
      a remote variant, force solo to carry transport_class =
      local_in_process_no_transport plus relay_state_class =
      no_relay_required_local_session, force archived to carry
      a non-null sealed_archive_ref and ended_at, force archive_
      sealing_initiated downgrades to carry both sealed_archive_
      class_inventory and affected_shared_object_refs, and force
      anchor_target_drift_detected downgrades to carry affected_
      shared_object_refs. Re-exports freshness_class, client_
      scope, and redaction_class from schemas/governance/
      capability_lifecycle.schema.json plus deployment_profile_
      class and workspace_trust_state_class from ADR-0018 / the
      identity family without redefinition. Adding a new
      collaboration_session_state_class, transition_reason_class,
      downgrade_kind_class, local_work_preservation_state_class,
      recovery_path_class, host_locus_class, transport_class,
      relay_state_class, audit_event_id, or denial_reason value
      is additive-minor and bumps session_state_schema_version;
      repurposing an existing value is breaking and requires a
      new decision row.

