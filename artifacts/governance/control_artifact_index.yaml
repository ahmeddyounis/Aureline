      register) and schemas/product/known_limit_note.schema.json
      (cross-tool boundary). Writing every end-user known-limit note
      is explicitly out of scope at this revision.

  - id: known_limit_classes
    title: Known-limit class register, review rubric, and propagation rules
    canonical_location: artifacts/product/known_limit_classes.yaml
    overview_page: docs/product/known_limits_contract.md
    owner_dri: "@ahmeddyounis"
    owning_lane: docs_public_truth
