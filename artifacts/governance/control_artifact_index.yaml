      packet family. additionalProperties false everywhere and
      allOf gates force every packet to carry the docs_public_
      truth_owner and release_owner reviewers, each cause class
      (benchmark_proof_deferred, compatibility_proof_deferred,
      migration_evidence_deferred, docs_pack_refresh_deferred,
      support_export_preview_deferred, claim_evidence_alignment_
      deferred) to carry its named proof-owner reviewer, non-
      trivial support-impact to carry the support_owner reviewer,
      approved / active / proof_landed / expired / superseded
      status to carry an approved_at timestamp, active / proof_
      landed / expired / superseded status to carry an activated_
      at timestamp, proof_landed status to carry a proof_landed_at
      timestamp plus at least one target_proof_evidence_ref with
      reversal_class = land_proof_and_drop_exception, withdrawn
      status to carry a withdrawn_at timestamp, superseded status
      to carry a successor_packet_ref plus reversal_class =
      supersede_with_new_exception, hold_until_proof_lands
      degraded posture to pair with a land_proof_and_drop_
      exception or supersede_with_new_exception reversal, and
