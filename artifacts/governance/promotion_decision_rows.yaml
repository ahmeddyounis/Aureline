    packet_id_field: waiver_packet_id
    packet_id_shape: waiver.protected_metric.<fitness_row_id>
    required_packet_type_id: protected_metric_waiver_packet
    required_packet_profile_ids:
      - performance_readout_bundle
    accountable_owner_role_ids:
      - performance_owner
    concurrence_role_ids:
      - architecture_council
      - product_lead
    conditional_concurrence_role_ids:
      - sponsor
      - shiproom_executive_scope_review
    evidence_bundle_ids:
      - evidence.bundle.protected_metric.waiver
    admissible_statuses:
      - packet_draft
      - in_review
      - approved
      - approved_with_narrowing
      - rejected
      - held_for_packet_refresh
