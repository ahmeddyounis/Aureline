# Promotion and launch-bearing decision row registry.
#
# Scorecards, shiproom packets, operational-readiness reviews, release
# packets, and signoff automation cite these row ids instead of writing
# free-form approval status. Authority and concurrence requirements live
# in artifacts/governance/signoff_matrix.yaml; this file freezes the row
# ids, packet-id fields, evidence-bundle joins, allowed outcomes, and
# degraded-state mappings needed to reconstruct each decision later.

schema_version: 1
registry_id: aureline.governance.promotion_decision_rows
status: seeded
overview_doc: docs/governance/decision_rights_and_signoff_matrix.md
source_signoff_matrix: artifacts/governance/signoff_matrix.yaml

source_refs:
  - artifacts/governance/signoff_matrix.yaml
  - docs/governance/forum_packet_templates.md
  - docs/release/shiproom_runbook.md
  - artifacts/release/promotion_gate_map.yaml
  - artifacts/release/assurance_claim_rows.yaml
  - artifacts/qe/workflow_bundle_ids.yaml

row_id_prefix: governance_decision

row_kind_vocabulary:
  - architecture_freeze
  - waiver
  - cutline_change
  - claim_publication
  - release_promotion
  - lts_line_creation
  - workflow_bundle_decision

reference_surface_vocabulary:
  - milestone_scorecard
  - shiproom_packet
  - operational_readiness_review
  - release_evidence_packet
  - claim_manifest
  - compatibility_report
  - public_proof_packet
  - support_packet
  - forum_packet

decision_status_vocabulary:
  - not_started
  - packet_draft
  - in_review
  - approved
  - approved_with_narrowing
  - held_for_packet_refresh
  - rejected
  - no_go
  - escalated
  - degraded_owner_unresolved
  - degraded_handoff_expired
  - superseded

reconstruction_requirements:
  required_fields:
    - decision_row_id
    - decision_class_id
    - decision_status
    - packet_id
    - signoff_row_ref
    - accountable_owner_role_ids
    - concurrence_role_ids
    - evidence_bundle_ids
    - evidence_ref_or_packet_ref
    - decided_at_utc_or_reviewed_at_utc
    - outcome_rationale
  forbidden_patterns:
    - free_form_status_without_decision_row_id
    - packet_id_without_signoff_row_ref
    - evidence_refs_without_evidence_bundle_id
    - degraded_owner_rendered_as_approved

default_degraded_state_mapping:
  unresolved_owner_state: degraded_owner_unresolved
  expired_temporary_handoff_state: degraded_handoff_expired
  required_projection: >
    Render the degraded status explicitly in scorecards, shiproom
    packets, and operational-readiness reviews. A degraded row is never
    equivalent to approved or approved_with_narrowing.

rows:
  - decision_row_id: governance_decision:architecture_freeze
    decision_class_id: architecture_freeze
    row_kind: architecture_freeze
    signoff_row_ref: artifacts/governance/signoff_matrix.yaml#decision_classes.architecture_freeze
    reference_surfaces:
      - milestone_scorecard
      - operational_readiness_review
      - forum_packet
    packet_id_field: architecture_freeze_packet_id
    packet_id_shape: architecture.freeze.<scope>
    required_packet_type_id: architecture_freeze_packet
    required_packet_profile_ids:
      - architecture_decision_bundle
    accountable_owner_role_ids:
      - chief_architect
      - architecture_council
    concurrence_role_ids:
      - product_lead
      - performance_owner
      - release_owner
    evidence_bundle_ids:
      - evidence.bundle.architecture.freeze
    admissible_statuses:
      - packet_draft
      - in_review
      - approved
      - approved_with_narrowing
      - held_for_packet_refresh
      - escalated
      - degraded_owner_unresolved
      - degraded_handoff_expired
    default_unresolved_status: held_for_packet_refresh
    reconstruction_join_fields:
      - frozen_interface_row_refs
      - architecture_decision_refs
      - affected_lane_refs
      - evidence_bundle_ids
      - signoff_row_ref

  - decision_row_id: governance_decision:protected_metric_waiver
    decision_class_id: protected_metric_waiver
    row_kind: waiver
    signoff_row_ref: artifacts/governance/signoff_matrix.yaml#decision_classes.protected_metric_waiver
