      dependency required.
  - fixture_id: self_hosted_sovereign_baseline
    deployment_profile_id: self_hosted
    fixture_ref: fixtures/governance/deployment_profiles/self_hosted_sovereign_baseline.yaml
    scenario_summary: >
      Customer-operated control plane with customer-managed keys and
      declared adjacent skew window.
  - fixture_id: hybrid_remote_attach_baseline
    deployment_profile_id: enterprise_online
    fixture_ref: fixtures/governance/deployment_profiles/hybrid_remote_attach_baseline.yaml
    scenario_summary: >
      Hybrid remote-attach descriptor with managed AI broker available
      and cross-device companion handoff supported.
  - fixture_id: air_gapped_mirror_only_baseline
    deployment_profile_id: air_gapped
    fixture_ref: fixtures/governance/deployment_profiles/air_gapped_mirror_only_baseline.yaml
    scenario_summary: >
      Air-gapped descriptor with offline trust root and
      companion-handoff explicitly disallowed.
  - fixture_id: managed_cloud_browser_companion_baseline
    deployment_profile_id: managed_cloud
    fixture_ref: fixtures/governance/deployment_profiles/managed_cloud_browser_companion_baseline.yaml
    scenario_summary: >
      Managed-cloud descriptor with companion handoff as the primary
      surface home and vendor-managed keys by default.
  - fixture_id: hybrid_ai_broker_outage_narrows_profile
    deployment_profile_id: enterprise_online
    fixture_ref: fixtures/governance/deployment_profiles/hybrid_ai_broker_outage_narrows_profile.yaml
    scenario_summary: >
      Worked narrowing example. The managed AI broker and browser
      companion notification channel both degrade; the profile narrows
      its AI and companion claims to cached read-only posture while
      local-core editing, save, search, local git, tasks, export, and
      diagnostics remain available_local_safe. The desktop does not
      turn into a hidden thin client.

