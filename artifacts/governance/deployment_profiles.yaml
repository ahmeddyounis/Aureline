#
# Fixtures live under fixtures/governance/deployment_profiles/ and exercise
# one or more rows end-to-end. The narrowing fixture below is the worked
# example required by the acceptance criteria: a hosted dependency failure
# narrows the profile truth without turning the desktop into a hidden thin
# client.
# -----------------------------------------------------------------------------

fixture_index:
  - fixture_id: desktop_local_first_baseline
    deployment_profile_id: individual_local
    fixture_ref: fixtures/governance/deployment_profiles/desktop_local_first_baseline.yaml
    scenario_summary: >
