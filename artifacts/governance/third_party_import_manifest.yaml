    license_expression: Apache-2.0
    upstream_version: workspace_version_0.0.0_candidate_0.8.0-alpha.1
    local_modification_note: First-party source and fixture seed; no third-party bytes are imported by this row.
    update_owner: "@ahmeddyounis"
    artifact_family_linkage:
      - family_key: binaries
        family_classes:
          - ide_binary
          - cli_binary
        artifact_node_refs:
