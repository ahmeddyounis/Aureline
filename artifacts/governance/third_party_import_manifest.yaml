# SPDX-License-Identifier: Apache-2.0
#
# Alpha repository-compliance import manifest.
#
# This manifest is the release-facing projection over the existing
# dependency/import registers and the alpha artifact graph. It does not replace
# those source registers; it binds each claimed alpha artifact family to the
# origin, license, upstream version, local modification posture, update owner,
# DCO posture, and notice/SPDX delta packet that reviewers must inspect.

schema_version: 1
record_kind: alpha_repository_compliance_import_manifest
manifest_id: alpha.repository_compliance.import_manifest
manifest_revision: 1
as_of: "2026-05-14T08:30:00Z"
owner_dri: "@ahmeddyounis"
status: review_required

source_contract_refs:
  alpha_artifact_graph: artifacts/release/alpha_artifact_graph.yaml
  dependency_register: artifacts/governance/dependency_register.yaml
  third_party_import_register: artifacts/governance/third_party_import_register.yaml
  critical_dependency_register: artifacts/governance/critical_dependency_register.yaml
  release_notice_seed: artifacts/governance/release_notice_seed.yaml
  contribution_governance_seed: artifacts/governance/contribution_governance_seed.yaml
  dco_merge_audit: artifacts/governance/dco_merge_audit_alpha.md
  critical_upstream_health_register: artifacts/governance/critical_upstream_health_register.yaml
  notice_delta_packet: artifacts/release/reuse_spdx_notice_delta_alpha.md
  validator: ci/release/validate_import_manifest.py
  dco_validator: ci/release/check_dco_signoff.sh

protected_artifact_family_keys:
  - binaries
  - symbols
  - docs_help_packs
  - schemas
  - support_exports
  - release_evidence
  - update_metadata
  - supply_chain

required_row_fields:
  - row_id
  - source_class
  - origin
  - license_expression
  - upstream_version
  - local_modification_note
  - update_owner
  - artifact_family_linkage
  - dco_signoff_state
  - reuse_spdx_state

source_class_vocabulary:
  - first_party_release_artifact
  - third_party_reserved_import
  - third_party_build_input

dco_signoff_state_vocabulary:
  - signed_or_required_for_new_commits
  - documented_baseline_exception
  - not_applicable_external_reserved_import

reuse_spdx_state_vocabulary:
  - covered_by_repository_default
  - covered_by_repository_default_with_delta_exceptions
  - third_party_notice_pending_first_import
  - provenance_only

notice_outputs:
  source_of_truth_ref: artifacts/governance/third_party_import_manifest.yaml
  delta_packet_ref: artifacts/release/reuse_spdx_notice_delta_alpha.md
  release_notice_seed_ref: artifacts/governance/release_notice_seed.yaml
  notice_emit_rule: >
    Release notes, docs-pack manifests, SBOM placeholders, and provenance
    summaries read these row ids and their source_register/source_id bindings;
    they must not mint a separate notice status table.

