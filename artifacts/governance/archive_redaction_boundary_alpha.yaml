# Canonical alpha archive-search, redaction-boundary, locality, and
# destruction-receipt vocabulary. Admin, support, export, and offboarding
# surfaces cite this file before rendering delete or archive outcomes.

schema_version: 1
artifact_id: archive_redaction_boundary_alpha
status: seeded
owner_dri: "@ahmeddyounis"
human_contract_ref: docs/governance/archive_search_destruction_alpha.md
destruction_receipt_schema_ref: schemas/governance/destruction_receipt_alpha.schema.json
record_class_registry_ref: artifacts/governance/record_class_registry.yaml
record_state_contract_ref: docs/governance/record_state_and_policy_simulation_models.md
retention_deletion_contract_ref: docs/governance/retention_deletion_matrix_contract.md
usage_export_offboarding_contract_ref: docs/governance/usage_export_and_offboarding_contract.md

result_vocabulary:
  - result_class: completed
    label: Completed
    meaning: The requested in-scope destructive or export action completed for eligible refs.
    receipt_rule: A durable receipt or receipt-only metadata ref is required.
  - result_class: partial
    label: Partial
    meaning: Some in-scope refs completed while another subset remains held, retained, local-only, out of scope, or redacted.
    receipt_rule: The receipt or disclosure must list every retained, skipped, outside-scope, manual, or redacted subset.
  - result_class: blocked_by_hold
    label: Blocked by hold
    meaning: An active hold blocked destructive completion for at least one managed ref.
    receipt_rule: No completion claim is allowed; skipped-held refs and the hold verifier must be listed.
  - result_class: policy_retained
    label: Policy retained
    meaning: A retention floor or audit policy retained at least one managed or receipt-only subset.
    receipt_rule: Retained refs, policy version, and retention owner are required.
  - result_class: outside_platform_scope
    label: Outside platform scope
    meaning: The requested object is not under Aureline managed delete, archive-search, or receipt authority.
    receipt_rule: The boundary disclosure must name the outside-scope refs and avoid deletion claims.
  - result_class: manual_local_capture_required
    label: Manual local capture required
    meaning: The object exists only under local user or device control and needs a user-side capture, export, or delete step.
    receipt_rule: Platform receipt fields remain unavailable; manual-local refs and local-only locality are required.
  - result_class: omitted_by_redaction
    label: Omitted by redaction
    meaning: The row or receipt intentionally omits data that would reveal protected payloads or identifiers.
    receipt_rule: The omission reason, redaction profile, and omitted class label remain visible.
  - result_class: not_found
    label: Not found
    meaning: Archive search ran for the declared scope and found no matching governed ref.
    receipt_rule: Reserved for search misses; consumers must not collapse it into completed deletion.

locality_vocabulary:
  - locality_class: local_only
    meaning: Only user or device controlled local materialization is in scope.
  - locality_class: managed_copy
    meaning: A managed copy exists and is governed by retention, hold, and receipt rules.
  - locality_class: archived
    meaning: The object lives in an archive or evidence packet rather than a live mutable store.
  - locality_class: held
    meaning: A hold freezes destructive lifecycle steps without widening read rights.
  - locality_class: receipt_only
    meaning: Only metadata-only receipt or tombstone evidence remains.
  - locality_class: outside_platform_scope
    meaning: The object is controlled by an import source or provider outside Aureline authority.
  - locality_class: redacted_boundary
    meaning: The object is counted or named only through a redaction-safe boundary row.

receipt_state_vocabulary:
  - available
  - pending_after_hold_clear
  - pending_policy_floor
  - not_available_outside_scope
  - manual_local_action_required
  - omitted_by_redaction

redaction_boundary_rules:
  raw_payloads_excluded: true
  included_data_classes_must_be_named: true
  omitted_data_classes_must_be_named: true
  hold_justifications_excluded: true
  raw_policy_bodies_excluded: true
  secret_material_excluded: true
  rule_summary: >
    Boundary rows carry opaque refs, record-class ids, locality, custody,
    policy, and verifier metadata. They do not carry raw payload bodies,
    raw credentials, raw policy bodies, raw prompts, raw URLs, raw tenant
    names, raw billing identifiers, or raw hold justifications.

surface_requirements:
  archive_or_evidence_row_fields:
    - record_class_id
    - retention_owner_ref
    - locality_class
    - searchable
    - exportable
    - receipt_only
    - redaction_boundary_ref
    - chain_of_custody_refs
  destruction_receipt_fields:
    - result_class
    - receipt_state
    - policy_version
    - executed_at
    - verifier_refs
    - skipped_held_refs
    - retained_refs
    - outside_scope_refs
    - manual_local_capture_refs
    - omitted_by_redaction_refs
    - mirror_or_lag_note
  forbidden_copy:
    - deleted_without_receipt
    - fully_deleted_when_held_or_retained
    - remote_deleted_for_local_only
    - redacted_row_silently_absent

boundary_rows:
  - row_id: archive-boundary:support_bundle_archive
    record_class_id: support_bundle_archive
    record_class_ref: artifacts/governance/record_class_registry.yaml#support_bundle_archive
    retention_owner_ref: support_export
    locality_class: archived
    allowed_result_classes:
      - completed
      - partial
      - blocked_by_hold
      - omitted_by_redaction
    archive_search:
      searchable: true
      exportable: true
      receipt_only: false
      posture_class: search_complete
      searchable_fields:
        - support_case_ref
        - record_class_id
        - custody_event_ref
        - manifest_ref
      omitted_fields:
        - support.bundle_body
        - raw.logs
        - secret.material
      coverage_summary: Support bundle archives are searchable by refs and manifests, not raw bundle bodies.
    redaction_boundary:
      boundary_ref: redaction-boundary:support_bundle_archive:metadata_refs
      redaction_profile_ref: docs/governance/storage_and_retention_vocabulary.md
      included_data_classes:
        - record_state.axes
        - receipt.refs
        - audit.refs
      omitted_data_classes:
        - support.bundle_body
        - raw.logs
        - secret.material
      raw_payloads_excluded: true
    receipt_posture:
      default_receipt_state: available
      schema_ref: schemas/governance/destruction_receipt_alpha.schema.json
      mirror_or_lag_rule: No mirror lag may be hidden; pending managed copy purge renders partial.
    consumer_refs:
      - crates/aureline-shell/src/admin_alpha/mod.rs
      - crates/aureline-shell/src/support_seed/mod.rs

  - row_id: archive-boundary:collaboration_evidence_packet
    record_class_id: collaboration_evidence_packet
    record_class_ref: artifacts/governance/record_class_registry.yaml#collaboration_evidence_packet
    retention_owner_ref: operator_admin
    locality_class: held
    allowed_result_classes:
      - completed
      - partial
      - blocked_by_hold
      - omitted_by_redaction
    archive_search:
      searchable: true
      exportable: true
      receipt_only: false
      posture_class: search_complete
      searchable_fields:
        - collaboration_archive_ref
        - hold_ref
        - record_class_id
        - audit_event_ref
      omitted_fields:
        - collaboration.transcript_body
        - participant.raw_identifiers
        - raw.terminal_payloads
      coverage_summary: Held collaboration archives remain searchable as metadata and hold refs only.
    redaction_boundary:
      boundary_ref: redaction-boundary:collaboration_evidence_packet:hold_refs
      redaction_profile_ref: docs/governance/storage_and_retention_vocabulary.md
      included_data_classes:
        - hold.refs
        - record_state.axes
        - audit.refs
      omitted_data_classes:
        - collaboration.transcript_body
        - participant.raw_identifiers
        - raw.terminal_payloads
      raw_payloads_excluded: true
    receipt_posture:
      default_receipt_state: pending_after_hold_clear
      schema_ref: schemas/governance/destruction_receipt_alpha.schema.json
      mirror_or_lag_rule: Held archives cannot enter managed mirror purge until execution re-checks the hold.
    consumer_refs:
      - crates/aureline-shell/src/admin_alpha/mod.rs
      - docs/governance/usage_export_and_offboarding_contract.md

  - row_id: archive-boundary:entitlement_usage_export_packet
    record_class_id: entitlement_usage_export_packet
    record_class_ref: artifacts/governance/record_class_registry.yaml#entitlement_usage_export_packet
    retention_owner_ref: operator_admin
    locality_class: managed_copy
    allowed_result_classes:
      - completed
      - partial
      - policy_retained
      - outside_platform_scope
      - manual_local_capture_required
      - omitted_by_redaction
    archive_search:
      searchable: true
      exportable: true
      receipt_only: false
      posture_class: search_complete
      searchable_fields:
        - usage_export_packet_ref
        - billing_period_ref
        - retention_policy_ref
        - receipt_ref
      omitted_fields:
        - billing.raw_line_items
        - payment.identifiers
        - tenant.directory_payload
      coverage_summary: Usage export packets expose aggregate refs and receipt refs while billing payload detail stays omitted.
    redaction_boundary:
      boundary_ref: redaction-boundary:entitlement_usage_export_packet:aggregate_refs
      redaction_profile_ref: docs/governance/usage_export_and_offboarding_contract.md
      included_data_classes:
        - usage.aggregate_refs
        - retention.policy_refs
        - receipt.refs
      omitted_data_classes:
        - billing.raw_line_items
        - payment.identifiers
        - tenant.directory_payload
      raw_payloads_excluded: true
    receipt_posture:
      default_receipt_state: available
      schema_ref: schemas/governance/destruction_receipt_alpha.schema.json
      mirror_or_lag_rule: Receipts must state whether managed aggregates remain policy-retained after local export copy deletion.
    consumer_refs:
      - docs/governance/usage_export_and_offboarding_contract.md
      - crates/aureline-shell/src/admin_alpha/mod.rs

  - row_id: archive-boundary:destruction_receipt_record
    record_class_id: destruction_receipt_record
    record_class_ref: artifacts/governance/record_class_registry.yaml#destruction_receipt_record
    retention_owner_ref: governance_packets
    locality_class: receipt_only
    allowed_result_classes:
      - completed
      - partial
      - policy_retained
      - blocked_by_hold
      - outside_platform_scope
      - manual_local_capture_required
      - omitted_by_redaction
      - not_found
    archive_search:
      searchable: true
      exportable: true
      receipt_only: true
      posture_class: search_complete
      searchable_fields:
        - receipt_record_id
        - emitted_receipt_ref
        - policy_version
        - verifier_ref
        - record_class_id
      omitted_fields:
        - destroyed_payload_body
        - raw_hold_justification
        - raw_policy_body
      coverage_summary: Receipt records are searchable as custody and policy metadata only.
    redaction_boundary:
      boundary_ref: redaction-boundary:destruction_receipt_record:receipt_metadata
      redaction_profile_ref: docs/governance/archive_search_destruction_alpha.md
      included_data_classes:
        - receipt.metadata
        - custody.refs
        - policy.version
        - verifier.refs
      omitted_data_classes:
        - destroyed_payload_body
        - raw_hold_justification
        - raw_policy_body
      raw_payloads_excluded: true
    receipt_posture:
      default_receipt_state: available
      schema_ref: schemas/governance/destruction_receipt_alpha.schema.json
      mirror_or_lag_rule: Receipt records must preserve any mirror lag note from the action they summarize.
    consumer_refs:
      - schemas/governance/destruction_receipt_alpha.schema.json
      - crates/aureline-shell/src/admin_alpha/mod.rs
