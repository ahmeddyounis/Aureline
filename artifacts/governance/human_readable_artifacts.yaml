# yaml-language-server: $schema=../../schemas/governance/human_readable_artifact_family.schema.json
# Human-readable durable artifact registry (machine-readable form).
#
# This registry exists so every loader, formatter, migration tool, and support
# export surface can answer the same questions without inventing its own rules:
#   - who owns an artifact family and how it is reviewed;
#   - which text-first format is canonical for that family;
#   - where the schema contract lives (or whether it is not yet published);
#   - whether comments, unknown fields, and ordering must be preserved;
#   - whether Aureline may write the file directly, must show a preview first,
#     should regenerate instead of preserving hand edits, or must treat it as
#     inspect-only.
#
# Companion narrative:
#   - docs/governance/human_readable_artifact_registry.md
#
# If this file and the narrative disagree, this file is authoritative for
# tooling and the narrative MUST be updated in the same change.
#
# Do not surface internal planning identifiers in product strings; this
# registry is governance-only.

schema_version: 1

source_specs:
  - .t2/docs/Aureline_PRD.md
  - .t2/docs/Aureline_Technical_Architecture_Document.md
  - docs/config/artifact_format_and_migration_policy.md
  - docs/config/human_edited_artifact_contract.md
  - docs/state/config_and_state_path_map.md
  - docs/state/profile_and_state_map.md
  - docs/state/portable_state_package_contract.md
  - docs/notebooks/notebook_trust_and_roundtrip_preview_contract.md
  - docs/ai/prompt_injection_and_taint_contract.md

# -----------------------------------------------------------------------------
# Editability classes.
#
# Rows below assign exactly one editability class so every surface can decide
# whether it is allowed to write the artifact directly, must show a preview, or
# should refuse writes and offer inspection only.
# -----------------------------------------------------------------------------
editability_classes:
  - id: freely_editable
    summary: >
      Free-form text meant for direct human edits. Aureline may edit only via an
      explicit user action and must avoid background rewrites or normalization.
    aureline_write_posture:
      may_autoformat_without_user_review: false
      may_canonicalize_without_user_review: false
      requires_preview_before_write: false

  - id: structured_safe_editable
    summary: >
      Schema-backed artifacts intended for direct human edits. Writers preserve
      comments, unknown fields, and authored ordering per the row posture.
    aureline_write_posture:
      may_autoformat_without_user_review: false
      may_canonicalize_without_user_review: false
      requires_preview_before_write: false

  - id: review_before_write
    summary: >
      Writes are allowed, but the surface must present a change preview that
      discloses any lossiness, canonicalization, or wider-than-requested edits.
    aureline_write_posture:
      may_autoformat_without_user_review: false
      may_canonicalize_without_user_review: false
      requires_preview_before_write: true

  - id: regenerate_preferred
    summary: >
      Tool-generated but reviewable artifacts. The preferred edit flow is to
      regenerate from the authoritative source with a preview and rollback
      checkpoint rather than hand-editing the artifact.
    aureline_write_posture:
      may_autoformat_without_user_review: true
      may_canonicalize_without_user_review: true
      requires_preview_before_write: true

  - id: inspect_only
    summary: >
      Artifacts that are readable and exportable, but not a general-purpose edit
      surface. Writes route through their owning authority (policy, signed
      bundle, or controlled tool), not arbitrary editors.
    aureline_write_posture:
      may_autoformat_without_user_review: false
      may_canonicalize_without_user_review: false
      requires_preview_before_write: true

# -----------------------------------------------------------------------------
# Artifact-family rows.
#
# One row per durable, human-owned or reviewable artifact family. Rows focus on
# user/profile/workspace durable state and adjacent review artifacts (lockfiles,
# import reports, manifests) rather than internal caches.
# -----------------------------------------------------------------------------
artifact_families:
  - id: human_readable_artifact_registry_yaml
    title: Human-readable durable artifact registry (machine form)
    description: Governance registry that freezes durable artifact editability and preservation posture.
    owner_class: workspace
    authorship_class: workspace_authored
    editability_class: structured_safe_editable
    format_class: yaml
    schema_home: schemas/governance/human_readable_artifact_family.schema.json
    comment_policy: preserve_verbatim
    ordering_policy: stable_order_preserved
    unknown_field_policy: refuse_read
    vcs_review_posture: expected_in_vcs
    portability_expectation: excluded
    canonical_locations:
      - "artifacts/governance/human_readable_artifacts.yaml"
    policy_refs:
      - docs/governance/human_readable_artifact_registry.md
      - docs/config/artifact_format_and_migration_policy.md
    notes: >
      This registry is governance-only. It is consumed by loaders, formatters,
      migration tooling, and support flows to avoid surface-local format rules.

  - id: user_settings_file
    title: User-scope settings file
    description: User-global settings overrides, edited directly by the user.
    owner_class: user
    authorship_class: user_authored
    editability_class: structured_safe_editable
    format_class: jsonc
    schema_home: schemas/config/settings.schema.json
    comment_policy: preserve_verbatim
    ordering_policy: stable_order_preserved
    unknown_field_policy: preserve_verbatim
    vcs_review_posture: not_expected_in_vcs
    portability_expectation: portable
    canonical_locations:
      - "$AURELINE_CONFIG/settings.jsonc"
    policy_refs:
      - docs/config/human_edited_artifact_contract.md
      - docs/config/artifact_format_and_migration_policy.md
      - docs/state/config_and_state_path_map.md
    notes: >
      Writers must preserve user comments and unknown fields. Any write that
      cannot preserve round-trip fidelity must refuse or route through a preview
      and rollback checkpoint.

  - id: machine_specific_settings_file
    title: Machine-scope settings file
    description: Per-device settings overrides that never sync by default.
    owner_class: machine
    authorship_class: user_authored
    editability_class: structured_safe_editable
    format_class: jsonc
    schema_home: schemas/config/settings.schema.json
    comment_policy: preserve_verbatim
    ordering_policy: stable_order_preserved
    unknown_field_policy: preserve_verbatim
    vcs_review_posture: not_expected_in_vcs
    portability_expectation: portable_with_machine_addendum
    canonical_locations:
      - "$AURELINE_CONFIG/machine.settings.jsonc"
    policy_refs:
