# Protected change-budget matrix.
#
# Canonical machine-readable matrix for freeze-era protected decisions.
# It answers two questions for every protected path:
#   1. Is a proposed change allowed in the current phase by default?
#   2. How much exception debt has already accumulated on this path,
#      subsystem, or train?
#
# Companion workflow:
#   docs/governance/change_budget_workflow.md
#
# Canonical packet schema:
#   schemas/governance/exception_packet.schema.json
#
# Legacy compatibility alias:
#   schemas/governance/freeze_exception_packet.schema.json

schema_version: 1
artifact_id: aureline.protected_change_budget
artifact_revision: 1
status: seeded

overview_document: docs/governance/change_budget_workflow.md
packet_schema: schemas/governance/exception_packet.schema.json
legacy_packet_schema: schemas/governance/freeze_exception_packet.schema.json

source_specs:
  - .plans/M00-91.md
  - .t2/docs/Aureline_Milestones_Document.md
  - .t2/docs/Aureline_PRD.md
  - .t2/docs/Aureline_Technical_Architecture_Document.md
  - .t2/docs/Aureline_Technical_Design_Document.md
  - docs/governance/commitment_and_rebaseline_policy.md
  - artifacts/governance/commitment_classes.yaml

seed_accounting_note: >
  No fully instantiated exception packets have landed yet. The dashboard
  seeds below therefore start at zero and do not count the architecture-pack
  FE rows until those rows are converted into packet instances.

exception_classes:
  - id: within_contract_narrowing
    label: Within-contract narrowing
    description: >
      Narrows a frozen claim, surface, or rollout without widening the
      protected decision or weakening the evidence bar.
  - id: instrumentation_or_evidence_refresh
    label: Instrumentation or evidence refresh
    description: >
      Adds traces, counters, proofs, or publication metadata without changing
      the protected contract shape.
  - id: dependency_hygiene_under_frozen_contract
    label: Dependency hygiene under frozen contract
    description: >
      Refreshes an implementation dependency or platform binding while
      preserving the frozen interfaces, hook names, and claimed behavior.
  - id: schema_or_contract_shape_change
    label: Schema or contract shape change
    description: >
      Adds, removes, renames, or repurposes a packet field, hook name, wire
      field, persisted field, or public contract edge.
  - id: hardware_or_corpus_recalibration
    label: Hardware or corpus recalibration
    description: >
      Changes reference hardware rows, benchmark corpora, protected metrics,
      or comparability posture for a protected claim.
  - id: topology_or_ownership_change
    label: Topology or ownership change
    description: >
      Moves canonical homes, changes protected-path ownership, shifts
      work-package mapping, or alters merge-protection posture.
  - id: threshold_easing_or_budget_relief
    label: Threshold easing or budget relief
    description: >
      Makes a protected limit easier to pass or weakens the review bar that
      currently guards the protected path.
  - id: subsystem_broadening
    label: Subsystem broadening
    description: >
      Widens the protected decision beyond its frozen floor, adds a second
      steady-state path, or expands a later-lane family into scope.
  - id: public_claim_or_support_widening
    label: Public claim or support widening
    description: >
      Broadens deployment, support, compatibility, or stable-surface claims
      beyond the evidence and cutline the current phase already supports.

phase_rows:
  - phase_id: m0_m1_truth_establishment
    phase_label: M0-M1 truth-establishment
    default_allowed_changes:
      - architecture shaping inside already-frozen decisions
      - benchmark-harness and proof-lane refinement
      - shell/editor contract closure
      - prototype-only experiments that do not widen public claims
    explicit_exception_class_refs:
      - schema_or_contract_shape_change
      - hardware_or_corpus_recalibration
      - topology_or_ownership_change
      - threshold_easing_or_budget_relief
      - subsystem_broadening
      - public_claim_or_support_widening
    default_decision_forum_refs:
      - architecture_council
    default_review_threshold_ref: phase_default_m0_m1

  - phase_id: m2_alpha_wedge
    phase_label: M2 alpha wedge
    default_allowed_changes:
      - launch-wedge completion on already-owned protected paths
      - trust labeling and route-truth closure
      - search/index usefulness work
      - supportability alpha and narrow archetype proof
    explicit_exception_class_refs:
      - schema_or_contract_shape_change
      - hardware_or_corpus_recalibration
      - topology_or_ownership_change
      - threshold_easing_or_budget_relief
      - subsystem_broadening
      - public_claim_or_support_widening
    default_decision_forum_refs:
      - product_scope_review
    default_review_threshold_ref: phase_default_m2

  - phase_id: m3_beta_hardening
    phase_label: M3 beta hardening
    default_allowed_changes:
      - packaging and migration hardening
      - SDK or CLI stabilization inside already-frozen contracts
      - policy, transport, support-export, and compatibility publication work
    explicit_exception_class_refs:
      - schema_or_contract_shape_change
      - hardware_or_corpus_recalibration
      - topology_or_ownership_change
      - threshold_easing_or_budget_relief
      - subsystem_broadening
      - public_claim_or_support_widening
    default_decision_forum_refs:
      - release_council
    default_review_threshold_ref: phase_default_m3

  - phase_id: m4_rc_stable
    phase_label: M4 RC/stable
    default_allowed_changes:
      - blocker fixes
      - claim narrowing
      - docs and compatibility corrections
      - release-evidence refresh
      - rollback and runbook hardening
    explicit_exception_class_refs:
      - schema_or_contract_shape_change
      - hardware_or_corpus_recalibration
      - topology_or_ownership_change
      - threshold_easing_or_budget_relief
      - subsystem_broadening
      - public_claim_or_support_widening
    default_decision_forum_refs:
      - shiproom_executive_scope_review
    default_review_threshold_ref: phase_default_m4

review_thresholds:
  - id: phase_default_m0_m1
    when: first exception on a protected path during M0 or M1
    forum_refs:
      - architecture_council
    required_packet_fields:
      - protected_budget_ref
      - exception_class
      - review_threshold_ref
      - phase_budget_assessment
      - compensating_evidence
      - budget_debt_snapshot
    default_outcome_bias: protect_frozen_direction_without_widening_claims

  - id: phase_default_m2
    when: first exception on a protected path during M2 alpha
    forum_refs:
      - product_scope_review
    required_packet_fields:
      - protected_budget_ref
      - exception_class
      - review_threshold_ref
      - phase_budget_assessment
      - compensating_evidence
      - budget_debt_snapshot
    default_outcome_bias: finish_alpha_wedge_without_expanding_persona_or_platform_scope

  - id: phase_default_m3
    when: first exception on a protected path during M3 beta hardening
    forum_refs:
      - release_council
    required_packet_fields:
      - protected_budget_ref
      - exception_class
      - review_threshold_ref
      - phase_budget_assessment
      - compensating_evidence
      - budget_debt_snapshot
    default_outcome_bias: harden_existing_claims_without_widening_stable_surface_area

  - id: phase_default_m4
    when: first exception on a protected path during M4 RC or stable
    forum_refs:
      - shiproom_executive_scope_review
    required_packet_fields:
      - protected_budget_ref
      - exception_class
      - review_threshold_ref
      - phase_budget_assessment
      - compensating_evidence
      - budget_debt_snapshot
    default_outcome_bias: default_deny_except_for_blockers_narrowing_or_truth_corrections

  - id: repeated_same_path_second_hit
    when: the current packet is the second exception or waiver on the same protected path in one milestone or across consecutive milestones
    forum_refs:
      - architecture_council
      - release_council
    forced_action: claim_narrowing_or_rebaseline
    threshold_values:
      same_path_prior_exception_count: 1
      same_path_prior_waiver_count: 1

  - id: repeated_same_path_third_hit_or_aged_subsystem
    when: the current packet is the third same-path exception, the protected subsystem has repeated exceptions, or the oldest open exception is aging out
    forum_refs:
      - architecture_council
      - product_scope_review
      - release_council
    forced_action: explicit_correction_work
    threshold_values:
      same_path_prior_exception_count: 2
      repeated_subsystem_exception_count: 2
      oldest_open_exception_age_days: 14

dashboard_feed_fields:
  - field_id: budget_burn_count
    type: integer
    description: >
      Count of open or applied exception packets already recorded on the
      protected path in the current train.
    derivation_hint: exception_packet.budget_debt_snapshot.budget_burn_count
  - field_id: repeated_subsystem_exception_count
    type: integer
    description: >
      Count of repeated exception hits already attributed to the same
      protected subsystem in the current train.
    derivation_hint: exception_packet.budget_debt_snapshot.repeated_subsystem_exception_count
  - field_id: oldest_open_exception_age_days
    type: integer
    description: >
      Age in days of the oldest still-open exception touching the same
      protected subsystem or train.
    derivation_hint: exception_packet.budget_debt_snapshot.oldest_open_exception_age_days
  - field_id: claim_narrowing_triggered
    type: boolean
    description: >
      Whether claim narrowing has already been triggered on the same path,
      subsystem, or train.
    derivation_hint: exception_packet.budget_debt_snapshot.claim_narrowing_triggered
  - field_id: rebaseline_triggered
    type: boolean
    description: >
      Whether re-baselining has already been triggered on the same path,
      subsystem, or train.
    derivation_hint: exception_packet.budget_debt_snapshot.rebaseline_triggered
  - field_id: explicit_correction_work_triggered
    type: boolean
    description: >
      Whether the exception debt has already been converted into an explicit
      correction-work program.
    derivation_hint: exception_packet.budget_debt_snapshot.explicit_correction_work_triggered

