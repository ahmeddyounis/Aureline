protected_paths:
  - path_key: renderer_direction
    title: Renderer direction and hot-path render contract
    protected_subsystem_id: subsystem.renderer_core
    dashboard_scope_ref: subsystem.renderer_core
    decision_refs:
      - artifacts/governance/decision_index.yaml#D-0001
      - docs/adr/0002-renderer-text-stack-and-shaping-fallback.md
    canonical_artifact_refs:
      - artifacts/architecture/renderer_tradeoff_rows.yaml
      - artifacts/render/spike_trace_samples/
      - artifacts/governance/ownership_matrix.yaml#scorecard_lane_index:benchmark_lab
      - artifacts/governance/ownership_matrix.yaml#scorecard_lane_index:accessibility_input_review
    owner_lane_refs:
      - shell_command_system
      - benchmark_lab
      - accessibility_input_review
    baseline_summary: >
      One renderer stack, one shaping contract, one fallback chain, one
      invalidation model, and one canonical hook vocabulary. Narrowing is
      allowed above this floor; per-surface forks and silent hook churn are
      not.
    phase_matrix:
      - phase_id: m0_m1_truth_establishment
        allowed_changes:
          - implement or measure the frozen hook list on the shell spike and protected benchmark corpora
          - refresh renderer dependencies or platform-native shaper implementations without changing the frozen stack or hook names
          - narrow renderer scope above the frozen floor when the ADR already permits it
        exception_class_refs:
          - schema_or_contract_shape_change
          - threshold_easing_or_budget_relief
          - subsystem_broadening
          - public_claim_or_support_widening
        no_go_changes:
          - add a second steady-state renderer backend or per-surface renderer fork
          - rename or repurpose frozen hook ids, accessibility-tree ownership, or invalidation semantics
          - widen the renderer claim beyond the accepted stack without a new decision row
        default_review_threshold_ref: phase_default_m0_m1
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m2_alpha_wedge
        allowed_changes:
          - launch-wedge hardening, fallback-label clarity, and trace completeness within the frozen stack
          - additive platform tuning that preserves the same renderer, shaping, and accessibility posture
        exception_class_refs:
          - schema_or_contract_shape_change
          - hardware_or_corpus_recalibration
          - threshold_easing_or_budget_relief
          - subsystem_broadening
        no_go_changes:
          - new renderer feature families that widen the launch wedge
          - hook-name churn that would invalidate benchmark or accessibility packets mid-alpha
        default_review_threshold_ref: phase_default_m2
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m3_beta_hardening
        allowed_changes:
          - driver, fallback, and packaging hardening under the frozen renderer contract
          - release-evidence refresh for already-claimed renderer surfaces
        exception_class_refs:
          - schema_or_contract_shape_change
          - threshold_easing_or_budget_relief
          - public_claim_or_support_widening
        no_go_changes:
          - any second render path or hot-path contract rewrite
          - new public renderer claims that lack current beta proof
        default_review_threshold_ref: phase_default_m3
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m4_rc_stable
        allowed_changes:
          - blocker fixes, docs corrections, and release-evidence refresh inside the frozen renderer contract
        exception_class_refs:
          - within_contract_narrowing
          - instrumentation_or_evidence_refresh
        no_go_changes:
          - feature additions, schema churn, or deployment-claim widening tied to renderer work
          - threshold easing without a signed shiproom exception
        default_review_threshold_ref: phase_default_m4
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem

  - path_key: text_model
    title: Text model and source-fidelity contract
    protected_subsystem_id: subsystem.text_buffer_core
    dashboard_scope_ref: subsystem.text_buffer_core
    decision_refs:
      - artifacts/governance/decision_index.yaml#D-0002
      - docs/adr/0003-buffer-undo-large-file.md
    canonical_artifact_refs:
      - crates/aureline-text
      - crates/aureline-buffer
      - artifacts/architecture/undo_class_rows.yaml
      - fixtures/text/buffer_decision_cases/
    owner_lane_refs:
      - benchmark_lab
      - release_evidence
    baseline_summary: >
      Standard editable files use the frozen piece-tree model, source
      fidelity remains lossless, and large-file mode preserves the same
      coordinate model while reducing capability explicitly.
    phase_matrix:
      - phase_id: m0_m1_truth_establishment
        allowed_changes:
          - tune measurements and fixtures around the piece-tree and large-file-mode triggers
          - improve decode-recovery, source-fidelity, or coordinate-system evidence without changing semantics
          - tighten large-file guardrails while preserving explicit degraded behavior
        exception_class_refs:
          - schema_or_contract_shape_change
          - threshold_easing_or_budget_relief
          - subsystem_broadening
        no_go_changes:
          - replace the piece-tree with a different normal-path text model
          - weaken source-fidelity guarantees for encoding, BOM, line ending, or original-byte preservation
          - make whole-file load or whole-file analysis the default for large-file mode
        default_review_threshold_ref: phase_default_m0_m1
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m2_alpha_wedge
        allowed_changes:
          - launch-wedge tuning of open, edit, and decode-recovery behavior inside the frozen model
          - additive large-file corpus proof and guardrail calibration that does not ease thresholds
        exception_class_refs:
          - schema_or_contract_shape_change
          - hardware_or_corpus_recalibration
          - threshold_easing_or_budget_relief
        no_go_changes:
          - change the normal-path text model or source-fidelity contract
          - broaden large-file capability without explicit proof and review
        default_review_threshold_ref: phase_default_m2
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m3_beta_hardening
        allowed_changes:
          - compatibility and migration hardening for already-frozen text-model behavior
          - release evidence refresh for decode-recovery and source-fidelity claims
        exception_class_refs:
          - schema_or_contract_shape_change
          - threshold_easing_or_budget_relief
        no_go_changes:
          - normal-path model swaps or late source-fidelity changes
          - silent claim widening on text-correctness or huge-file support
        default_review_threshold_ref: phase_default_m3
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m4_rc_stable
        allowed_changes:
          - blocker fixes, docs corrections, and narrow claim reductions for text-model truth
        exception_class_refs:
          - within_contract_narrowing
          - instrumentation_or_evidence_refresh
        no_go_changes:
          - model swaps, threshold easing, or support-class widening at RC or stable
        default_review_threshold_ref: phase_default_m4
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem

  - path_key: buffer_strategy
    title: Buffer strategy, save pipeline, and recovery semantics
    protected_subsystem_id: subsystem.text_buffer_core
    dashboard_scope_ref: subsystem.text_buffer_core
    decision_refs:
      - artifacts/governance/decision_index.yaml#D-0002
      - docs/adr/0003-buffer-undo-large-file.md
    canonical_artifact_refs:
      - crates/aureline-buffer
      - crates/aureline-vfs
      - artifacts/architecture/undo_class_rows.yaml
      - docs/workspace/mutation_lineage_model.md
    owner_lane_refs:
      - benchmark_lab
      - release_evidence
      - support_export
    baseline_summary: >
      Undo classes, checkpoints, journal replay, atomic-save-first behavior,
      and explicit large-file reductions are frozen. Broad edits remain
      previewable, attributable, and undoable.
    phase_matrix:
      - phase_id: m0_m1_truth_establishment
        allowed_changes:
          - implement save, checkpoint, and recovery hooks under the frozen ordering
          - add preview, rollback, and evidence joins that preserve the same undo taxonomy
          - tune guardrails for journal size and large-file edit reduction without weakening disclosure
        exception_class_refs:
          - schema_or_contract_shape_change
          - threshold_easing_or_budget_relief
          - subsystem_broadening
        no_go_changes:
          - replace atomic-save-first ordering or journal-mediated fallback without a new decision row
          - introduce a third undo compensation posture or make broad edits non-previewable
          - silently drop checkpoints, replay guarantees, or external-change merge disclosure
        default_review_threshold_ref: phase_default_m0_m1
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m2_alpha_wedge
        allowed_changes:
          - launch-wedge tuning for recovery, save participants, and local-history joins inside the frozen semantics
          - additive corpus coverage for broad-write and rollback evidence
        exception_class_refs:
          - schema_or_contract_shape_change
          - hardware_or_corpus_recalibration
          - threshold_easing_or_budget_relief
        no_go_changes:
          - late changes that make refactor, AI apply, or save-participant writes less attributable or less undoable
          - hidden broadening of large-file write capability
        default_review_threshold_ref: phase_default_m2
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m3_beta_hardening
        allowed_changes:
          - migration, compatibility, and support-export hardening inside the frozen save and recovery contract
          - release-evidence refresh for save, undo, and crash-recovery claims
        exception_class_refs:
          - schema_or_contract_shape_change
          - threshold_easing_or_budget_relief
          - public_claim_or_support_widening
        no_go_changes:
          - changes that weaken rollback, checkpoint, or recovery semantics late in beta
          - late support-class widening for large-file or repair behavior
        default_review_threshold_ref: phase_default_m3
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m4_rc_stable
        allowed_changes:
          - blocker fixes, docs corrections, and claim narrowing for buffer, save, and recovery truth
        exception_class_refs:
          - within_contract_narrowing
          - instrumentation_or_evidence_refresh
        no_go_changes:
          - new workflow families on the save or recovery path
          - threshold easing or undo/rollback weakening at RC or stable
        default_review_threshold_ref: phase_default_m4
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem

  - path_key: ipc_event_model
    title: IPC transport, request envelope, and event model
    protected_subsystem_id: subsystem.rpc_reactive_fabric
    dashboard_scope_ref: subsystem.rpc_reactive_fabric
    decision_refs:
      - artifacts/governance/decision_index.yaml#D-0004
      - artifacts/governance/decision_index.yaml#D-0005
      - docs/adr/0004-rpc-transport-and-schema-toolchain.md
      - docs/adr/0005-subscription-envelope-and-invalidation-semantics.md
    canonical_artifact_refs:
      - schemas/rpc/envelope.schema.json
      - schemas/rpc/method_manifest.schema.json
      - schemas/runtime/subscription_envelope.schema.json
      - artifacts/architecture/rpc_tradeoff_rows.yaml
      - artifacts/architecture/subscription_tradeoff_rows.yaml
    owner_lane_refs:
      - shell_command_system
      - benchmark_lab
      - support_export
    baseline_summary: >
      One typed binary transport, one request metadata vocabulary, one frozen
      error taxonomy, and one subscription envelope across shell, CLI, remote,
      and support-export surfaces.
    phase_matrix:
      - phase_id: m0_m1_truth_establishment
        allowed_changes:
          - add methods, events, query families, or stale-reason codes that are purely additive and preserve the frozen envelopes
          - refresh transport implementation details while preserving the same framing, encoding, and hook names
          - improve support-export or observability joins without changing the contract shape
        exception_class_refs:
          - schema_or_contract_shape_change
          - threshold_easing_or_budget_relief
          - subsystem_broadening
        no_go_changes:
          - add a second wire encoding, external IDL, or per-service transport choice
          - invent a new error class outside the frozen taxonomy
          - permit silent event gaps, local freshness heuristics, or envelope-field repurposing
        default_review_threshold_ref: phase_default_m0_m1
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m2_alpha_wedge
        allowed_changes:
          - alpha-wedge completion on top of the frozen envelope and transport vocabulary
          - additive method manifest and subscription-family growth that stays minor-version safe
        exception_class_refs:
          - schema_or_contract_shape_change
          - threshold_easing_or_budget_relief
          - public_claim_or_support_widening
        no_go_changes:
          - cross-cutting schema churn that would invalidate alpha packets or adapters
          - a second control-plane or compatibility surface that bypasses the frozen envelope
        default_review_threshold_ref: phase_default_m2
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m3_beta_hardening
        allowed_changes:
          - compatibility publication, policy hardening, and support-export proof inside the frozen IPC and subscription model
          - additive beta-safe metadata that preserves backward replay and traceability
        exception_class_refs:
          - schema_or_contract_shape_change
          - threshold_easing_or_budget_relief
          - public_claim_or_support_widening
        no_go_changes:
          - late public-interface additions that change the stable meaning of the transport or event model
          - replay-compatibility breaks or envelope rewrites during beta
        default_review_threshold_ref: phase_default_m3
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m4_rc_stable
        allowed_changes:
          - blocker fixes, docs corrections, compatibility notes, and release-evidence refresh under the frozen transport and event model
        exception_class_refs:
          - within_contract_narrowing
          - instrumentation_or_evidence_refresh
        no_go_changes:
          - late schema, SDK, or deployment-path widening through the transport or event fabric
          - any second protocol, hidden translation layer, or support-class broadening
        default_review_threshold_ref: phase_default_m4
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem

  - path_key: benchmark_hardware_and_corpus
    title: Benchmark hardware, corpus, and protected-metric change control
    protected_subsystem_id: subsystem.benchmark_governance
    dashboard_scope_ref: subsystem.benchmark_governance
    decision_refs:
      - artifacts/bench/corpus_change_control.yaml
      - artifacts/perf/reference_hardware_manifest.yaml
      - artifacts/bench/protected_metrics.yaml
    canonical_artifact_refs:
      - docs/benchmarks/corpus_governance.md
      - docs/benchmarks/public_comparison_rules.md
      - docs/governance/benchmark_council_charter.md
      - artifacts/perf/lab_image_manifest.yaml
    owner_lane_refs:
      - benchmark_lab
      - release_evidence
    baseline_summary: >
      Protected benchmark claims depend on named corpus, hardware, lab-image,
      and threshold revisions. Feature work may not smuggle in new
      comparability posture.
    phase_matrix:
      - phase_id: m0_m1_truth_establishment
        allowed_changes:
          - add corpus rows, reference hardware rows, or lab-image metadata with recorded approvals and comparability notes
          - refresh publication-pack or governance metadata without easing thresholds
          - split governance-only updates from feature work or attach an exception packet when they must land together
        exception_class_refs:
          - hardware_or_corpus_recalibration
          - threshold_easing_or_budget_relief
          - public_claim_or_support_widening
        no_go_changes:
          - threshold easing without before-and-after evidence and release-note linkage
          - protected corpus removal without comparability explanation
          - bundling benchmark-governance drift into a feature PR with no explicit exception
        default_review_threshold_ref: phase_default_m0_m1
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m2_alpha_wedge
        allowed_changes:
          - alpha calibration refreshes that preserve comparability disclosures and do not hide regressions
          - publication-pack refinements for already-claimed benchmark lanes
        exception_class_refs:
          - hardware_or_corpus_recalibration
          - threshold_easing_or_budget_relief
          - public_claim_or_support_widening
        no_go_changes:
          - corpus or hardware churn that would let alpha claims outrun evidence
          - hidden threshold easing or methodology drift
        default_review_threshold_ref: phase_default_m2
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m3_beta_hardening
        allowed_changes:
          - compatibility and release-evidence refresh on already-frozen benchmark assets
          - hardware or corpus corrections that preserve or narrow published comparisons
        exception_class_refs:
          - hardware_or_corpus_recalibration
          - threshold_easing_or_budget_relief
          - public_claim_or_support_widening
        no_go_changes:
          - late threshold easing used to rescue a beta candidate
          - benchmark methodology changes that would invalidate beta-to-stable comparability
        default_review_threshold_ref: phase_default_m3
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m4_rc_stable
        allowed_changes:
          - release-evidence refresh, comparability corrections, and narrowed claim language
        exception_class_refs:
          - instrumentation_or_evidence_refresh
          - within_contract_narrowing
        no_go_changes:
          - threshold easing, new benchmark claims, or reference-hardware swaps that broaden the stable story
        default_review_threshold_ref: phase_default_m4
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem

  - path_key: repo_topology
    title: Repository topology and canonical artifact homes
    protected_subsystem_id: subsystem.repo_governance
    dashboard_scope_ref: subsystem.repo_governance
    decision_refs:
      - docs/repo/topology.md
      - artifacts/governance/package_inventory.yaml
      - docs/repo/dependency_rules.md
    canonical_artifact_refs:
      - Cargo.toml
      - docs/README.md
      - artifacts/governance/control_artifact_index.yaml
    owner_lane_refs:
      - docs_public_truth
      - governance_packets
    baseline_summary: >
      Top-level homes, artifact subtrees, crate layout, and move-don't-fork
      rules are canonical. A protected path does not move, split, or gain a
      shadow home in a quiet PR.
    phase_matrix:
      - phase_id: m0_m1_truth_establishment
        allowed_changes:
          - add new files inside existing canonical homes
          - reserve or document new subtrees when the topology map and control-artifact index are updated in the same change
          - tighten dependency-direction notes and path-purpose language
        exception_class_refs:
          - topology_or_ownership_change
          - schema_or_contract_shape_change
          - public_claim_or_support_widening
        no_go_changes:
          - move a canonical subtree without updating the topology map in the same change
          - create a duplicate shadow home for a governed artifact family
          - introduce protected-path dependency cycles or package-group drift that contradict the current topology
        default_review_threshold_ref: phase_default_m0_m1
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m2_alpha_wedge
        allowed_changes:
          - narrow topology clarifications that reduce ambiguity for alpha implementation work
          - additive subtree declarations that preserve the same layering and owner routing
        exception_class_refs:
          - topology_or_ownership_change
          - public_claim_or_support_widening
        no_go_changes:
          - path churn that would re-open the architecture pack's canonical-home assumptions
          - new release-bearing surfaces with no stable home or owner route
        default_review_threshold_ref: phase_default_m2
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m3_beta_hardening
        allowed_changes:
          - packaging or release-owned topology clarifications that do not move protected contract homes
          - documentation corrections that keep the artifact graph canonical
        exception_class_refs:
          - topology_or_ownership_change
          - public_claim_or_support_widening
        no_go_changes:
          - topology rewrites that would invalidate beta docs, release packets, or support routing
          - adding a second canonical home for the same governed asset
        default_review_threshold_ref: phase_default_m3
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m4_rc_stable
        allowed_changes:
          - docs corrections and rollback/runbook clarifications for already-frozen homes
        exception_class_refs:
          - within_contract_narrowing
          - instrumentation_or_evidence_refresh
        no_go_changes:
          - moving protected homes, crate groups, or packet families during RC or stable
          - stable-claim widening by topology change
        default_review_threshold_ref: phase_default_m4
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem

  - path_key: canonical_work_package_ownership
    title: Canonical work-package mapping and protected-path ownership decisions
    protected_subsystem_id: subsystem.ownership_governance
    dashboard_scope_ref: subsystem.ownership_governance
    decision_refs:
      - artifacts/governance/package_inventory.yaml
      - artifacts/governance/ownership_matrix.yaml
      - docs/governance/dri_map.md
      - artifacts/planning/m1_m2_work_breakdown.yaml
    canonical_artifact_refs:
      - CODEOWNERS
      - docs/governance/decision_workflow.md
      - docs/governance/control_artifact_index.md
    owner_lane_refs:
      - governance_packets
      - docs_public_truth
      - release_evidence
    baseline_summary: >
      Protected packages, canonical work packages, DRI and backup coverage,
      waivers, and decision-forum routing are part of release infrastructure.
      Ownership does not drift through chat or implicit reviewer habits.
    phase_matrix:
      - phase_id: m0_m1_truth_establishment
        allowed_changes:
          - add or tighten owner metadata, backup coverage, forum routing, and CODEOWNERS alignment
          - close waivers by adding named backups or clearer path coverage
          - narrow work-package claims so they match the actual protected-path reality
        exception_class_refs:
          - topology_or_ownership_change
          - public_claim_or_support_widening
          - threshold_easing_or_budget_relief
        no_go_changes:
          - leave a protected path ownerless or without protected-merge coverage
          - silently renew a waiver or reduce reviewer depth without an exception packet
          - reassign canonical work-package scope without updating package inventory, ownership matrix, and planning rollups together
        default_review_threshold_ref: phase_default_m0_m1
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m2_alpha_wedge
        allowed_changes:
          - add ownership coverage for new alpha implementation lanes that already have canonical homes
          - narrow scope or owner claims to match alpha reality
        exception_class_refs:
          - topology_or_ownership_change
          - public_claim_or_support_widening
        no_go_changes:
          - widen protected ownership claims without named coverage and forum routing
          - let alpha growth create shadow owner maps outside the canonical files
        default_review_threshold_ref: phase_default_m2
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m3_beta_hardening
        allowed_changes:
          - backup-coverage closure, review-depth hardening, and release-routing corrections
          - explicit claim narrowing when ownership reality falls short of beta expectations
        exception_class_refs:
          - topology_or_ownership_change
          - public_claim_or_support_widening
        no_go_changes:
          - beta ownership drift that weakens protected-path or release-branch coverage
          - late waiver renewal with no claim narrowing, rebaseline, or correction plan
        default_review_threshold_ref: phase_default_m3
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
      - phase_id: m4_rc_stable
        allowed_changes:
          - closing ownership gaps, docs corrections, and rollback/runbook clarifications only
        exception_class_refs:
          - within_contract_narrowing
          - instrumentation_or_evidence_refresh
        no_go_changes:
          - support-class widening or owner-map churn during RC or stable
          - any stable release with new protected paths that lack canonical coverage
        default_review_threshold_ref: phase_default_m4
        extra_review_threshold_refs:
          - repeated_same_path_second_hit
          - repeated_same_path_third_hit_or_aged_subsystem
