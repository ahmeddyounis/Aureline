    object_class: principal_subject
    inspect_support_class: bounded_partial_snapshot
    in_product_mutate_support_class: not_supported
    browser_only_posture_class: browser_only_full_object
    local_draft_support_class: not_applicable
    publish_later_support_class: not_applicable
    callback_or_webhook_requirement_class: optional_freshness_only
    mirror_or_self_host_class: host_pinned_authoritative_only
    claim_strength: design_contract_only
    notes: >-
      Principal-subject management (group membership, role assignment)
      stays in the identity provider's console. The product renders
      acting-identity badges and a browser-handoff sheet; mutation in
      the product is forbidden by contract.
    fixture_refs: []

  - row_id: identity_or_enterprise_provider__consent_flow
    provider_class: identity_or_enterprise_provider
    object_class: consent_flow
    inspect_support_class: bounded_partial_snapshot
    in_product_mutate_support_class: not_supported
    browser_only_posture_class: browser_only_full_object
    local_draft_support_class: not_applicable
    publish_later_support_class: not_applicable
    callback_or_webhook_requirement_class: not_supported
    mirror_or_self_host_class: host_pinned_authoritative_only
    claim_strength: design_contract_only
    notes: >-
      Consent flows are browser-only by contract; the product mints
      a typed browser-handoff packet, never an inline OAuth UI. Auth
      callback returns ride the auth-callback packet, not the
