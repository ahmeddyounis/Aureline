# Provider support matrix seed.
#
# Canonical machine-readable matrix of provider-class x object-class
# rows that turn provider capability claims into typed evidence
# instead of broad "integrated with provider X" wording.
#
# Companion narrative:
#   docs/providers/provider_qualification_packet.md
# Acting-identity, browser-handoff, and packet-field parity:
#   artifacts/qa/provider_handoff_parity_suite.yaml
# Reviewable worked cases per row:
#   fixtures/providers/provider_qualification_cases/
#
# Frozen vocabularies reused here (do not redefine):
#   - provider_class: docs/providers/provider_sync_health_contract.md
#     and schemas/providers/provider_sync_health_view.schema.json
#   - object_class: schemas/providers/provider_sync_health_view.schema.json
#   - mutation_mode: docs/providers/provider_mode_contract.md
#     (local_draft, publish_now, open_in_provider,
#      deferred_publish, inspect_only)
#   - mode_admission_reason: docs/providers/provider_mode_contract.md
#     and schemas/providers/publish_later_record.schema.json
#   - actor_class: schemas/integration/browser_handoff_packet.schema.json
#   - relation_class: docs/providers/provider_mode_contract.md section 7
#     (local_draft, queued_publish, browser_handoff,
#      provider_authoritative_object, cached_read_only_shadow)
#
# Rules.
#   - Every row MUST name exactly one (provider_class, object_class)
#     pair, exactly one inspect_support_class,
#     in_product_mutate_support_class, browser_only_posture_class,
#     local_draft_support_class, publish_later_support_class,
#     callback_or_webhook_requirement_class, and mirror_or_self_host_class.
#   - claim_strength names the level of evidence the row currently
#     carries (`design_contract_only`, `fixture_seeded`,
#     `qualification_drill_passed`, `live_qualification_passed`).
#   - Rows whose claim_strength is `design_contract_only` MUST NOT be
#     promoted to public capability marketing; the qualification packet
#     carries the cited evidence.
#   - Object classes MAY be narrower than the provider class. A
#     provider class with inspect_only support on an object class MUST
#     declare `in_product_mutate_support_class = not_supported` for that
#     object class; the narrower row is honest.
#   - Object classes that ride a different lane (release publish flowing
#     through release evidence, not raw publish_now) MUST cite the
#     routing lane and not invent a parallel mutate path.
#   - Adding a row, an object class, or a capability vocabulary member
#     is additive-minor. Repurposing an existing claim is breaking and
#     requires a new decision row plus an updated qualification packet.
#   - Row ids and drill ids MUST NOT contain milestone slugs.

schema_version: 1
status: seeded

overview_page: docs/providers/provider_qualification_packet.md
parity_suite_source: artifacts/qa/provider_handoff_parity_suite.yaml
qualification_cases_source: fixtures/providers/provider_qualification_cases/

provider_mode_contract_source: docs/providers/provider_mode_contract.md
provider_link_contract_source: docs/providers/provider_link_header_and_handoff_contract.md
connected_account_contract_source: docs/providers/connected_account_registry_contract.md
provider_sync_health_contract_source: docs/providers/provider_sync_health_contract.md
deferred_publish_contract_source: docs/providers/deferred_publish_queue_contract.md
provider_conflict_contract_source: docs/providers/provider_conflict_review_contract.md

related_normative_sources:
  - path: .t2/docs/Aureline_PRD.md
    anchors:
      - "Provider integrations"
      - "Browser handoff"
      - "Acting identity"
  - path: .t2/docs/Aureline_Technical_Architecture_Document.md
    anchors:
      - "Provider plane"
      - "Browser handoff"
      - "Acting identity"
  - path: .t2/docs/Aureline_UI_UX_Spec_Document.md
    anchors:
      - "Provider-linked headers"
      - "Browser handoff sheet"
      - "Acting identity badges"

provider_class_vocabulary:
  - review_or_code_host
  - issue_or_planning_tracker
  - ci_or_check_provider
  - docs_or_portal_provider
  - artifact_registry_or_package_registry
  - release_publisher_provider
  - identity_or_enterprise_provider
  - ai_provider
  - managed_admin_provider
  - callback_or_event_provider

object_class_vocabulary:
  - pull_request
  - issue_or_work_item
  - check_run
  - docs_page
  - release_artifact
  - package_version
  - registry_entry
  - principal_subject
  - admin_surface
  - audit_entry
  - consent_flow
  - install_target
  - tenant_or_org
  - other

inspect_support_class_vocabulary:
  - full_typed_snapshot
  - bounded_partial_snapshot
  - mirror_derived_only
  - not_supported

in_product_mutate_support_class_vocabulary:
  - publish_now_supported
  - deferred_publish_only
  - local_draft_only
  - rides_release_lane
  - not_supported

browser_only_posture_class_vocabulary:
  - full_in_product_alternative
  - browser_only_for_some_actions
  - browser_only_full_object
  - not_applicable

local_draft_support_class_vocabulary:
  - supported
  - not_applicable
  - not_supported

publish_later_support_class_vocabulary:
  - supported
  - parked_publish_now_only
  - not_applicable
  - not_supported

callback_or_webhook_requirement_class_vocabulary:
  - required_for_authoritative_state
  - optional_freshness_only
  - polling_only
  - not_supported

mirror_or_self_host_class_vocabulary:
  - mirror_supported_with_provenance
  - self_host_supported_with_host_match
  - host_pinned_authoritative_only
  - not_applicable

claim_strength_vocabulary:
  - design_contract_only
  - fixture_seeded
  - qualification_drill_passed
  - live_qualification_passed

required_evidence_per_row:
  - rule: every row cites at least one fixture_ref under
      fixtures/providers/provider_qualification_cases/ once
      claim_strength is fixture_seeded or higher.
  - rule: every row whose in_product_mutate_support_class is
      publish_now_supported or deferred_publish_only cites a
      worked publish_later_queue_item_record fixture from
      fixtures/providers/deferred_publish_cases/ or
      fixtures/providers/provider_mode_cases/.
  - rule: every row whose browser_only_posture_class is
      browser_only_for_some_actions or browser_only_full_object
      cites a browser-handoff parity row in
      artifacts/qa/provider_handoff_parity_suite.yaml.
  - rule: every row whose mirror_or_self_host_class is
      mirror_supported_with_provenance cites a sync-health fixture
      under fixtures/providers/provider_sync_health_cases/ that
      exercises the mirror_derived mode or a degraded_import_class
      of mirror_derived.

matrix_rows:
  # ----------------------------------------------------------------
  # review_or_code_host
  # ----------------------------------------------------------------
  - row_id: review_or_code_host__pull_request
    provider_class: review_or_code_host
    object_class: pull_request
    inspect_support_class: full_typed_snapshot
    in_product_mutate_support_class: publish_now_supported
    browser_only_posture_class: browser_only_for_some_actions
    local_draft_support_class: supported
    publish_later_support_class: supported
    callback_or_webhook_requirement_class: required_for_authoritative_state
    mirror_or_self_host_class: self_host_supported_with_host_match
    claim_strength: fixture_seeded
    notes: >-
      Pull-request body, review comments, and merge-decision drafts
      author locally and publish_now or deferred_publish under an
      approval ticket. Branch creation and complex merge resolutions
      route through the browser-handoff sheet with a return anchor.
    fixture_refs:
      - fixtures/providers/provider_qualification_cases/review_or_code_host__pull_request.yaml
      - fixtures/providers/provider_mode_cases/code_host_publish_now_callback_return.json

  - row_id: review_or_code_host__check_run
    provider_class: review_or_code_host
    object_class: check_run
    inspect_support_class: full_typed_snapshot
    in_product_mutate_support_class: not_supported
    browser_only_posture_class: browser_only_for_some_actions
    local_draft_support_class: not_applicable
    publish_later_support_class: not_applicable
    callback_or_webhook_requirement_class: required_for_authoritative_state
    mirror_or_self_host_class: self_host_supported_with_host_match
    claim_strength: design_contract_only
    notes: >-
      Code-host check-run rows are inspect_only on the code-host
      lane. Rerun requests route to ci_or_check_provider rows; this
      row exists so a code-host overlay never collapses check-run
      mutate authority into the code-host claim.
    fixture_refs: []

  - row_id: review_or_code_host__release_artifact
    provider_class: review_or_code_host
    object_class: release_artifact
    inspect_support_class: bounded_partial_snapshot
    in_product_mutate_support_class: rides_release_lane
    browser_only_posture_class: browser_only_for_some_actions
    local_draft_support_class: not_applicable
    publish_later_support_class: parked_publish_now_only
    callback_or_webhook_requirement_class: optional_freshness_only
    mirror_or_self_host_class: self_host_supported_with_host_match
    claim_strength: design_contract_only
    notes: >-
      Code-host releases are seen as bounded partial snapshots
      because authoritative release truth lives on the release
      publisher row. Publishing rides the release lane; raw
      publish_now buttons on this row are forbidden.
    fixture_refs: []

  # ----------------------------------------------------------------
  # issue_or_planning_tracker
  # ----------------------------------------------------------------
  - row_id: issue_or_planning_tracker__issue_or_work_item
    provider_class: issue_or_planning_tracker
    object_class: issue_or_work_item
    inspect_support_class: full_typed_snapshot
    in_product_mutate_support_class: publish_now_supported
    browser_only_posture_class: browser_only_for_some_actions
    local_draft_support_class: supported
    publish_later_support_class: supported
    callback_or_webhook_requirement_class: required_for_authoritative_state
    mirror_or_self_host_class: self_host_supported_with_host_match
    claim_strength: fixture_seeded
    notes: >-
      Issue and work-item bodies, comments, labels, and assignment
      drafts author locally; publishing runs through the typed
      mutation modes. Custom workflow transitions that the API does
      not expose route through the browser-handoff sheet.
    fixture_refs:
      - fixtures/providers/provider_qualification_cases/issue_or_planning_tracker__issue_or_work_item.yaml
      - fixtures/providers/provider_mode_cases/issue_tracker_local_draft_offline_capture.json

  # ----------------------------------------------------------------
  # ci_or_check_provider
  # ----------------------------------------------------------------
  - row_id: ci_or_check_provider__check_run
    provider_class: ci_or_check_provider
    object_class: check_run
    inspect_support_class: full_typed_snapshot
    in_product_mutate_support_class: deferred_publish_only
    browser_only_posture_class: browser_only_for_some_actions
    local_draft_support_class: not_applicable
    publish_later_support_class: supported
    callback_or_webhook_requirement_class: required_for_authoritative_state
    mirror_or_self_host_class: self_host_supported_with_host_match
    claim_strength: fixture_seeded
    notes: >-
      Rerun requests admit through the publish-later queue or the
      browser-handoff sheet. Inline publish_now is forbidden for
      check-run mutations; release-class jobs ride the release lane
      regardless.
    fixture_refs:
      - fixtures/providers/provider_qualification_cases/ci_or_check_provider__check_run.yaml
      - fixtures/providers/provider_mode_cases/ci_rerun_open_in_provider.json

  # ----------------------------------------------------------------
  # docs_or_portal_provider
  # ----------------------------------------------------------------
  - row_id: docs_or_portal_provider__docs_page
    provider_class: docs_or_portal_provider
    object_class: docs_page
    inspect_support_class: full_typed_snapshot
    in_product_mutate_support_class: deferred_publish_only
    browser_only_posture_class: browser_only_for_some_actions
    local_draft_support_class: supported
    publish_later_support_class: supported
    callback_or_webhook_requirement_class: optional_freshness_only
    mirror_or_self_host_class: self_host_supported_with_host_match
    claim_strength: fixture_seeded
    notes: >-
      Docs-page edits, redirects, and feedback comments author
      locally; publishing routes through the deferred-publish queue
      so review and approval still gate the change. Publishing inline
      with publish_now is forbidden on docs surfaces by default.
    fixture_refs:
      - fixtures/providers/provider_qualification_cases/docs_or_portal_provider__docs_page.yaml
      - fixtures/providers/provider_mode_cases/docs_portal_queue_item_account_switch.json

  # ----------------------------------------------------------------
  # artifact_registry_or_package_registry
