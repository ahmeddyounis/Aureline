    fixture_refs: []

unsupported_or_partial_disclosure_rules:
  - rule: a row whose in_product_mutate_support_class is
      `not_supported` MUST disclose that on the provider-linked
      header (header `edit_mode_class = blocked_for_repair` or
      `inspect_only`) and on every export row that cites the object
      class.
  - rule: a row whose browser_only_posture_class is
      `browser_only_full_object` MUST cite a typed
      `browser_handoff_sheet_record` and a
      `local_or_cached_alternative_record`; a raw URL launch is
      forbidden.
  - rule: a row whose mirror_or_self_host_class is
      `mirror_supported_with_provenance` MUST tag every imported
      snapshot with `degraded_import_class = mirror_derived` and
      MUST NOT render that snapshot as authoritative.
  - rule: a partially supported provider path (a single object class
      that is `not_supported` while sibling object classes are
      `publish_now_supported`) MUST be honest in the qualification
      packet; collapsing all rows for the provider class into one
      `publish_now_supported` claim is forbidden.

cadence_guidance:
  targeted_change_validation: >-
    Any change touching provider-linked surfaces, callback envelopes,
    publish-later semantics, browser-handoff routing, or
    acting-identity badges runs the affected matrix rows and the
    affected parity-suite drills before claim wording widens.
  release_candidate_validation: >-
    Every matrix row at `qualification_drill_passed` or higher
    revalidates against its qualification fixture and its
    parity-suite drill; rows still at `design_contract_only` may not
    appear in public capability marketing without an explicit
    capability narrowing in the qualification packet.
