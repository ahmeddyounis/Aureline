    in_product_mutate_support_class: not_supported
    browser_only_posture_class: not_applicable
    local_draft_support_class: not_applicable
    publish_later_support_class: not_applicable
    callback_or_webhook_requirement_class: required_for_authoritative_state
    mirror_or_self_host_class: self_host_supported_with_host_match
    claim_strength: design_contract_only
    notes: >-
      Webhook / event subscriptions are an inbound-only lane; they
      land on the provider callback envelope and never carry inline
