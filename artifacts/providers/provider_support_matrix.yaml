      - fixtures/providers/provider_mode_cases/release_publisher_deferred_publish_preview.json

  # ----------------------------------------------------------------
  # identity_or_enterprise_provider
  # ----------------------------------------------------------------
  - row_id: identity_or_enterprise_provider__principal_subject
