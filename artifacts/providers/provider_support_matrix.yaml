  - row_id: identity_or_enterprise_provider__install_target
    provider_class: identity_or_enterprise_provider
    object_class: install_target
    inspect_support_class: bounded_partial_snapshot
    in_product_mutate_support_class: not_supported
    browser_only_posture_class: browser_only_full_object
    local_draft_support_class: not_applicable
    publish_later_support_class: not_applicable
    callback_or_webhook_requirement_class: optional_freshness_only
    mirror_or_self_host_class: host_pinned_authoritative_only
    claim_strength: design_contract_only
    notes: >-
      Install / app-grant targets render as inspect-only with the
