# ===================================================================
# Recovery-evidence packet shape — frozen here so milestone, release,
# support, and channel-widening reviews attach a packet they can
# read without reinterpretation. The packet is a typed projection of
# the chooser, the checkpoint inventory, and the export-before-reset
# checklist; it is NOT a new record family.
# ===================================================================
recovery_evidence_packet_shape:
  required_fields:
    - drill_id
    - drill_class
    - chooser_id
    - chosen_recovery_level_class
    - selection_criterion_class
    - risk_class
    - reversibility_class
    - retained_artifact_classes
    - discarded_or_deferred_artifact_classes
    - action_chosen_id
    - compare_before_discard_hook_class
    - export_before_reset_linkage_class
    - placeholder_or_downgrade_note_class
    - claimed_profile_id
    - fixture_ref
    - upstream_chooser_record_ref
    - upstream_checkpoint_inventory_record_ref
    - upstream_export_before_reset_checklist_ref
    - upstream_export_verification_result_ref
    - upstream_recovery_scenario_card_ref
    - upstream_hydration_phase_event_refs
    - rerun_expectation_class
    - parity_expectations_proved
  rules:
    - Every required field MUST be present.
      `null` is allowed only on the upstream linkage refs whose
      associated record was not produced for the drill (e.g. a
      drill that does not produce an export-before-reset checklist
      MUST set `upstream_export_before_reset_checklist_ref` to null
      AND set `export_before_reset_linkage_class` to one of
      `not_applicable_no_destructive_action` or
      `not_applicable_evidence_only_inspect`).
    - The packet MUST cite the upstream record refs by opaque id;
      free-text linkage prose is non-conforming.
    - The packet MUST quote `chosen_recovery_level_class` and
      `selection_criterion_class` verbatim from the upstream
      `recovery_level_record` and the
      `selection_criterion_class` enum. Surfaces that mint a
      private level or criterion are non-conforming.
    - The packet MUST list `discarded_or_deferred_artifact_classes`
      explicitly. `nothing_discarded_explicit` is the conforming
      way to record "no discard occurred"; an empty list is
      non-conforming.
    - The packet MUST cite at least one
      `parity_expectations_proved` entry from the
      `parity_expectation_vocabulary`.
    - When `chosen_recovery_level_class` is
      `evidence_only_recovery`, `action_chosen_id` MUST be
      `open_evidence`, `risk_class` MUST be
      `evidence_only_no_state_change`, and the packet MUST NOT
      claim any rehydrated runtime state.
    - When `chosen_recovery_level_class` is `checkpoint_rollback`
      and `risk_class` is
      `mutates_profile_state_with_checkpoint_and_export`, the
      packet MUST cite a non-null
      `upstream_export_before_reset_checklist_ref` and a non-null
      `upstream_export_verification_result_ref`.

# ===================================================================
# Rerun expectation contract — when a new protected surface or state
# artifact family lands, which drills MUST rerun and which MAY ride
# their existing fixture. A protected surface or state-artifact
# change without a rerun decision row is non-conforming.
# ===================================================================
rerun_expectation_contract:
  owner: qa.recovery
  reviewers:
    - reliability.recovery_chooser
    - state.restore_artifact_family
    - support.recovery_evidence
  rerun_expectation_class_vocabulary:
    - rerun_required_protected_surface_changed
    - rerun_required_state_artifact_family_changed
    - rerun_required_chooser_vocabulary_extended
    - rerun_required_export_before_reset_vocabulary_extended
    - rerun_required_claimed_profile_added
    - rerun_optional_narrow_doc_only_change
    - rerun_not_required_planning_metadata_only_change
  rules:
    - Adding a new value to any of `recovery_level_class`,
      `selection_criterion_class`, `risk_class`,
      `expiry_trigger_class`, `inventory_item_class`,
      `effect_breadth_class`, `artifact_class`, or
      `verification_result_class` requires every drill row whose
      `expected_recovery_level_class` or upstream linkage references
      the affected vocabulary to declare a typed
      `rerun_expectation_class` and rerun the drill on every claimed
      profile in `claimed_profile_ids`.
    - Adding a new protected surface or state-artifact family (e.g.
      a new restore-artifact-family member, a new recovery-scenario
      family, or a new collab-restore kind) requires every drill
      that touches the affected scope to declare
      `rerun_required_protected_surface_changed` or
      `rerun_required_state_artifact_family_changed` and rerun on
      every claimed profile.
    - Adding a new claimed desktop profile in
      artifacts/platform/claimed_desktop_profiles.yaml requires
      every drill in this matrix to declare
      `rerun_required_claimed_profile_added` and run once on the
      new profile before its claim status widens.
    - Doc-only narrowing or wording changes that do not extend a
      closed vocabulary or add a protected surface MAY declare
      `rerun_optional_narrow_doc_only_change` and ride the existing
      fixture on the originally claimed profiles.
    - Planning-metadata changes (milestone slugs, schedule notes,
      ownership rotations) declare
      `rerun_not_required_planning_metadata_only_change`. They MUST
      NOT be used to skip a rerun forced by any of the rules above.

# ===================================================================
# Cadence guidance — frozen so support, release, and channel-widening
# reviews use the same cadence vocabulary the rest of the QA seed
# corpus uses (window-display matrix, provider qualification suite).
# ===================================================================
cadence_guidance:
  targeted_change_validation: >-
    Any change touching the restore chooser, the recovery-level
    vocabulary, the checkpoint inventory, the export-before-reset
    checklist, the autosave journal, the local-history restore
    preview, the corruption-rescue compare sheet, the restored-
    collaboration record, the hydration-phase event, or the
    recovery-scenario card runs the affected drills on the affected
    claimed profiles before any release, support, or channel-
    widening claim.
  release_candidate_validation: >-
    Every drill exercises a worked qualification fixture or cited
    sibling fixture on every claimed profile in
    `claimed_profile_ids` before the desktop claim row widens or
    ships. The recovery-evidence packet is the artifact that
    proves the run; ship-readiness reviews cite the packet, not a
    fresh checklist minted in a release lane.

# ===================================================================
# Crash, update, migration, and cross-version drill map — these four
# evidence classes stay distinct rather than collapsing into a single
# "continuity" claim.
# ===================================================================
drill_map_by_evidence_class:
  - evidence_class: crash_recovery
    drill_ids:
      - crash_recovery_exact_session_qualification
      - crash_recovery_dirty_buffer_replay_qualification
      - crash_recovery_evidence_only_fallback_qualification
    must_prove:
      - crash recovery never collapses into the update or
        migration drill class
      - dirty-buffer replay rides the autosave-journal contract
        and never claims save-to-disk
      - evidence-only fallback keeps every retained anchor
        inspectable without rehydrating runtime state
  - evidence_class: failed_update
    drill_ids:
      - failed_update_rollback_after_export_qualification
    must_prove:
      - failed-update rollback runs the export-before-reset
        checklist and the verification result before the rollback
        path executes
      - the recovery-scenario card for `failed_update` is cited
        verbatim and not collapsed into a generic reset
  - evidence_class: failed_import_or_migration
    drill_ids:
      - failed_import_or_migration_qualification
    must_prove:
      - migration drill is distinct from update drill
      - failed migration dry-run artifacts are surfaced as
        discarded-or-deferred classes, not silently dropped
      - the chosen level is `checkpoint_rollback` or
        `context_restore_with_placeholders`, never
        `exact_session_restore`
  - evidence_class: cross_version_or_schema_skew
    drill_ids:
      - schema_skew_compatible_translation_qualification
    must_prove:
      - schema skew is qualified separately from a fresh crash
      - the compatible-translation note is preserved verbatim in
        the evidence packet
      - the chooser does not claim pixel-perfect layout when only
        a compatible translation exists
  - evidence_class: topology_change
    drill_ids:
      - monitor_topology_change_layout_only_qualification
    must_prove:
      - monitor topology change is qualified separately from a
        crash or an update
      - the topology adjustment note is preserved on the evidence
        packet
  - evidence_class: missing_dependency
    drill_ids:
      - missing_extension_host_placeholder_qualification
      - expired_remote_session_placeholder_qualification
    must_prove:
      - missing extension host and expired remote session ride
        distinct drill classes even though both produce
        `context_restore_with_placeholders`
      - placeholder pane slots are retained, not collapsed into
        the surrounding layout
      - live authority is never silently rebound

# ===================================================================
# Drill rows
# ===================================================================
drills:
  - drill_id: crash_recovery_exact_session_qualification
    drill_class: crash_recovery_drill
    title: Crash recovery — exact session restore on a clean reopen
    status: seeded
    expected_recovery_level_class: exact_session_restore
    expected_selection_criterion_class: prior_runtime_survived_compatible_contract
    expected_risk_class: restore_no_rerun_no_reattach
    expected_reversibility_class: exact_undo
    expected_action_chosen: restore_now
    retained_artifact_classes:
      - restore_manifest
      - dirty_buffer_recovery_journal
      - local_history_journal
      - workspace_authority_checkpoint
      - restore_provenance_record
    discarded_or_deferred_artifact_classes:
      - nothing_discarded_explicit
    compare_before_discard_hook_class: no_compare_required
    export_before_reset_linkage_class: not_applicable_no_destructive_action
    placeholder_or_downgrade_note_class: no_placeholder_or_downgrade
    rerun_expectation_class: rerun_required_chooser_vocabulary_extended
    claimed_profile_ids:
      - macos_15_plus_universal
      - windows_11_23h2_plus_x86_64
      - linux_ubuntu_24_04_gnome_wayland_x86_64
      - linux_ubuntu_24_04_gnome_x11_x86_64
      - linux_fedora_current_gnome_wayland_x86_64
      - linux_debian_stable_gnome_x11_x86_64
    parity_expectations:
      - chosen_recovery_level_matches_selection_criterion
      - retained_and_discarded_classes_named_no_silent_omission
      - compare_before_discard_hook_typed
      - chooser_chooser_id_stable_across_surfaces
      - crash_drill_class_distinct_from_update_drill_class
      - placeholder_or_downgrade_note_visible_when_applicable
    must_prove:
      - chooser opens with `exact_session_restore` and the
        deterministic criterion `prior_runtime_survived_compatible_contract`
      - retained-evidence anchors are cited by opaque ref and the
        discarded-class field is the explicit
        `nothing_discarded_explicit` sentinel, never an empty list
      - no destructive action runs; export-before-reset linkage is
        explicitly `not_applicable_no_destructive_action`
      - the same `chooser_id` appears on Start Center, diagnostics,
        and any support-export preview the launch produces
    fixture_ref: fixtures/recovery/qualification_cases/crash_recovery_exact_session_qualification.yaml

  - drill_id: crash_recovery_dirty_buffer_replay_qualification
    drill_class: dirty_buffer_replay_drill
    title: Crash recovery — dirty-buffer replay with compare-to-disk
    status: seeded
    expected_recovery_level_class: dirty_buffer_recovery
    expected_selection_criterion_class: recovery_journal_present_layout_unsafe
    expected_risk_class: writes_user_owned_recovery_state
    expected_reversibility_class: checkpoint_restore
    expected_action_chosen: replay_dirty_buffer_after_compare
    retained_artifact_classes:
      - dirty_buffer_recovery_journal
      - local_history_journal
      - crash_envelope
      - support_bundle_candidate
      - restore_provenance_record
    discarded_or_deferred_artifact_classes:
      - corrupt_restorable_layout_state
    compare_before_discard_hook_class: autosave_compare_to_disk_sheet
    export_before_reset_linkage_class: not_applicable_no_destructive_action
    placeholder_or_downgrade_note_class: evidence_only_layout_quarantined
    rerun_expectation_class: rerun_required_state_artifact_family_changed
    claimed_profile_ids:
      - macos_15_plus_universal
      - windows_11_23h2_plus_x86_64
      - linux_ubuntu_24_04_gnome_wayland_x86_64
      - linux_ubuntu_24_04_gnome_x11_x86_64
      - linux_fedora_current_gnome_wayland_x86_64
      - linux_debian_stable_gnome_x11_x86_64
    parity_expectations:
      - chosen_recovery_level_matches_selection_criterion
      - retained_and_discarded_classes_named_no_silent_omission
      - compare_before_discard_hook_typed
      - placeholder_or_downgrade_note_visible_when_applicable
      - crash_drill_class_distinct_from_update_drill_class
    must_prove:
      - the autosave-compare-to-disk sheet is reachable before any
        replay writes are committed
      - the chooser refuses `claim_save_to_disk` and never claims
        the journal is a save
      - corrupt restorable layout state is named on the
        discarded-or-deferred classes, not silently dropped
