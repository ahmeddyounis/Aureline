# Restore qualification corpus, recovery-evidence packet shape, and
# crash-vs-update-vs-migration-vs-version-skew drill map.
#
# Canonical machine-readable QA seed for proving that recovery is
# qualified as a governed evidence lane rather than a collection of
# ad-hoc restart demos. The seed binds the closed restore-chooser
# recovery-level vocabulary, the closed selection criteria, the
# closed risk-class set, the closed expected-action set, and the
# closed retained / discarded artifact-class set every recovering
# launch must project into one inspectable record before
# downstream review, support, release, or channel-widening surfaces
# attach evidence to it.
#
# Companion narrative:
#   docs/qa/restore_evidence_packet.md
# Reviewable qualification fixtures:
#   fixtures/recovery/qualification_cases/
#
# Frozen vocabularies reused here (do not redefine):
#   - recovery_level_class, selection_criterion_class,
#     forbidden_claim_class, expiry_trigger_class:
#                      schemas/recovery/recovery_level.schema.json,
#                      schemas/recovery/restore_chooser_state.schema.json
#   - risk_class, primary_action_id, companion_action_id,
#     surface_family, startup_state_ref:
#                      schemas/recovery/restore_chooser_state.schema.json
#   - inventory_item_class, scope_class, control_class,
#     effect_breadth_class, control_availability_class:
#                      schemas/recovery/checkpoint_inventory.schema.json
#   - artifact_class, verification_result_class,
#     reset_authorization_state_class:
#                      schemas/recovery/export_before_reset_checklist.schema.json,
#                      schemas/recovery/export_verification_result.schema.json
#   - hydration_phase_class, ready_cue_class, partiality_class:
#                      schemas/recovery/hydration_phase_event.schema.json
#   - restored_collab_kind_class, restoration_posture_class,
#     live_authority_status_class:
#                      schemas/recovery/restored_collab_state.schema.json
#   - recovery_scenario_family_class, safe_remainder,
#     destructive_risk_class:
#                      schemas/recovery/recovery_scenario_card.schema.json
#   - claimed_profile_id:
#                      artifacts/platform/claimed_desktop_profiles.yaml
#
# Rules.
#   - Every drill MUST name one stable drill_id, exactly one
#     drill_class, exactly one expected_recovery_level_class, and
#     exactly one fixture_ref.
#   - Crash, update, migration, and cross-version (schema-skew /
#     build-identity-changed) restore paths MUST live on separate
#     drill rows. A single "continuity" drill that collapses two of
#     these classes is non-conforming.
#   - Every drill MUST cite at least one retained_artifact_class and
#     one discarded_or_deferred_artifact_class entry — even if the
#     discarded entry is `nothing_discarded_explicit` — so the
#     evidence packet never carries silent omissions.
#   - Every drill MUST cite a compare_before_discard_hook_class and
#     an export_before_reset_linkage_class so reviewers can read
#     whether the user had a typed comparison surface and a typed
#     reset-gate reference before any destructive action ran.
#   - Every drill MUST list the claimed_profile_ids it must run on,
#     drawn from artifacts/platform/claimed_desktop_profiles.yaml.
#     A drill that names "all desktop profiles" without listing
#     them is non-conforming.
#   - Drills that ride a placeholder, a downgrade, or a missing
#     dependency MUST cite a placeholder_or_downgrade_note_class so
#     the evidence packet can carry the note verbatim.
#   - Drill ids and case ids MUST NOT contain milestone slugs.
#   - This file is authoritative. If it disagrees with
#     docs/qa/restore_evidence_packet.md, this file wins and the
#     narrative updates in the same change.

