# Window/display continuity verification matrix seed.
#
# Canonical machine-readable QA seed for multi-window, monitor-topology,
# mixed-DPI, fullscreen or snapped restore, off-screen recovery,
# suspend/resume, and restart/reopen continuity on claimed desktop
# profiles.
#
# Companion narrative:
#   docs/qa/multi_window_verification.md
# Concrete scenario fixtures:
#   fixtures/platform/window_display_cases/
#
# Rules.
#   - Every scenario row MUST name one stable scenario_id, at least one
#     scenario_class, one continuity_level_expectation, one
#     focus_visibility_rule, one authority_rebind_posture, and exactly
#     one fixture_ref.
#   - Layout intent, pane order, window role, and visible focus are the
#     contract. Raw pixel coordinates are never authoritative.
#   - Rows that touch terminal, debug, notebook, preview, remote, or
#     managed surfaces MUST distinguish restorable_context from live
#     authority that may need reconnect, rerun, or reauthorization.
#   - Suspend/resume and restart/reopen rows MUST name the
#     session_execution posture each live surface advertises after
#     restore.
#   - Required drill ids are frozen here so release, support, planning,
#     and future automation do not mint parallel names.
#   - If this file and docs/qa/multi_window_verification.md disagree,
#     this file is authoritative and the narrative updates in the same
#     change.
#   - Scenario ids and drill ids MUST NOT contain milestone slugs.

