# Provider acting-identity, browser-handoff parity, and packet-field
# qualification suite seed.
#
# Canonical machine-readable QA seed for proving that:
#   1. acting-identity ("you", "install / bot", "delegated", "policy
#      injected service") never collapses into a generic "Connected"
#      label,
#   2. browser-handoff parity (source context, return anchor, privacy
#      note, degraded alternative) survives desktop -> browser ->
#      desktop on every row that claims browser-only or browser-some
#      posture, and
#   3. revoked-grant, delayed-delivery, host-mismatch, partial-import,
#      and mirror-or-self-host packets carry typed fields so support
#      classes are narrower than the evidence when needed.
#
# Companion narrative:
#   docs/providers/provider_qualification_packet.md
# Provider support matrix this suite qualifies:
#   artifacts/providers/provider_support_matrix.yaml
# Reviewable scenario fixtures:
#   fixtures/providers/provider_qualification_cases/
#
# Frozen vocabularies reused here (do not redefine):
#   - actor_class:     schemas/integration/browser_handoff_packet.schema.json
#   - label_class:     schemas/providers/connected_account_record.schema.json
#                      (acting_identity_badge_record.label_class)
#   - destination_class, return_anchor, replay_posture, redaction_class:
#                      schemas/integration/browser_handoff_packet.schema.json
#   - mode_admission_reason, callback_class:
#                      schemas/providers/publish_later_record.schema.json,
#                      schemas/providers/provider_callback_envelope.schema.json
#   - failure_class, current_mode_class, degraded_import_class:
#                      schemas/providers/provider_sync_health_view.schema.json
#   - support_export_channel_class:
#                      schemas/providers/provider_sync_health_view.schema.json
#
# Rules.
#   - Every drill MUST name one stable drill_id, at least one
#     drill_class, and one parity_expectation. Drills that consume a
#     fixture MUST cite exactly one fixture_ref.
#   - Acting-identity drills MUST cover all five frozen actor classes
#     (`human_account`, `installation_or_app_grant`,
#     `delegated_user_token`, `project_scoped_grant`,
#     `policy_injected_service_identity`). The denied
#     `unknown_actor_class` row is bound by the same schema rules and
#     is exercised in connected_account fixtures, not collapsed into
#     a marketed actor class.
#   - Browser-handoff parity drills MUST exercise both legs (desktop
#     -> browser AND browser -> desktop) and MUST prove source
#     context, return anchor, privacy note, and degraded alternative
#     on the return leg.
#   - Packet-field drills MUST exercise revoked grant, delayed
#     delivery, host mismatch, partial import, AND mirror or
#     self-host routing as separate rows so a single "support failed"
#     copy never disguises a narrower class.
#   - Drill ids and case ids MUST NOT contain milestone slugs.

schema_version: 1
status: seeded

overview_page: docs/providers/provider_qualification_packet.md
support_matrix_source: artifacts/providers/provider_support_matrix.yaml
qualification_cases_source: fixtures/providers/provider_qualification_cases/

connected_account_contract_source: docs/providers/connected_account_registry_contract.md
provider_link_contract_source: docs/providers/provider_link_header_and_handoff_contract.md
provider_mode_contract_source: docs/providers/provider_mode_contract.md
provider_sync_health_contract_source: docs/providers/provider_sync_health_contract.md
deferred_publish_contract_source: docs/providers/deferred_publish_queue_contract.md
provider_conflict_contract_source: docs/providers/provider_conflict_review_contract.md

related_normative_sources:
  - path: .t2/docs/Aureline_PRD.md
    anchors:
      - "Acting identity"
      - "Browser handoff"
      - "Provider integrations"
  - path: .t2/docs/Aureline_UI_UX_Spec_Document.md
    anchors:
