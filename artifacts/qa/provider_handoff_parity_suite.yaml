  - mirror_or_self_host_routing_provenance_visible
  - support_class_narrower_than_evidence_when_needed

cadence_guidance:
  targeted_change_validation: >-
    Any change touching acting-identity badges, browser-handoff
    sheets, callback envelopes, publish-later queue items, or
    sync-health degraded-import vocabulary runs the affected drills
    on the affected matrix rows before claim wording widens.
  release_candidate_validation: >-
    Every drill exercises a worked qualification fixture or cited
    sibling fixture before any provider matrix row is promoted to
    `live_qualification_passed`.

# ===================================================================
# Acting-identity qualification drills
# ===================================================================
acting_identity_drills:
  - drill_id: acting_identity_human_account_qualification
    drill_class: acting_identity_qualification
    actor_class: human_account
    label_class: you_label
    label_surfaces:
      - desktop_provider_badge
      - desktop_surface_header
      - desktop_notification
      - audit_event_payload
      - support_export_row
    parity_expectation: badge_label_matches_actor_on_every_surface
    must_prove:
      - acting-identity badge renders as `you_label` on every
        listed surface, with the human account display label
        intact
      - effective-scope resolution decision row carries
        `actor_class = human_account` and the audit-event payload
        names the same actor class
      - the support export row never collapses the actor class
        into a generic "Connected" label
    fixture_ref: fixtures/providers/provider_qualification_cases/acting_identity_human_account_qualification.yaml

  - drill_id: acting_identity_installation_or_app_grant_qualification
    drill_class: acting_identity_qualification
    actor_class: installation_or_app_grant
    label_class: install_label
    label_surfaces:
      - desktop_provider_badge
      - desktop_surface_header
      - desktop_notification
      - audit_event_payload
      - support_export_row
    parity_expectation: badge_label_matches_actor_on_every_surface
    must_prove:
      - badge renders as `install_label` on the surface that
        actually mutates under the install grant
      - human-side identity (the user that triggered the action)
        is rendered separately and never displayed as the actor
        on the audit-event payload
      - support export row preserves the install subject and
        the human triggerer side-by-side without collapsing
    fixture_ref: fixtures/providers/provider_qualification_cases/acting_identity_installation_or_app_grant_qualification.yaml

  - drill_id: acting_identity_delegated_user_token_qualification
    drill_class: acting_identity_qualification
    actor_class: delegated_user_token
    label_class: delegated_label
    label_surfaces:
      - desktop_provider_badge
      - desktop_surface_header
      - desktop_notification
      - audit_event_payload
      - support_export_row
    parity_expectation: badge_label_matches_actor_on_every_surface
    must_prove:
      - badge renders as `delegated_label` and the delegating
        principal is visible on the badge tooltip and audit-event
        payload
      - effective-scope resolution decision row carries
        `actor_class = delegated_user_token` and pinning rules
        prevent silent fallback to `human_account`
      - the browser-only posture is honored on rows where the
        delegated token is browser-only, not converted to inline
        publish_now
    fixture_ref: fixtures/providers/provider_qualification_cases/acting_identity_delegated_user_token_qualification.yaml

  - drill_id: acting_identity_project_scoped_grant_qualification
    drill_class: acting_identity_qualification
    actor_class: project_scoped_grant
    label_class: project_scoped_grant_label
    label_surfaces:
      - desktop_provider_badge
      - desktop_surface_header
      - desktop_notification
      - audit_event_payload
      - support_export_row
    parity_expectation: badge_label_matches_actor_on_every_surface
    must_prove:
      - badge renders as `project_scoped_grant_label` and the
        project scope (path, repo, project name) is visible on
        every listed surface
      - decision row carries `actor_class = project_scoped_grant`
        and the local-draft-only posture is honored offline
      - support export row preserves the project scope and the
        local-draft-only posture verbatim
    fixture_ref: fixtures/providers/provider_qualification_cases/acting_identity_project_scoped_grant_qualification.yaml

  - drill_id: acting_identity_policy_injected_service_qualification
    drill_class: acting_identity_qualification
    actor_class: policy_injected_service_identity
    label_class: policy_injected_service_label
    label_surfaces:
      - desktop_provider_badge
      - desktop_surface_header
      - desktop_notification
      - audit_event_payload
      - support_export_row
    parity_expectation: badge_label_matches_actor_on_every_surface
    must_prove:
      - badge renders as `policy_injected_service_label` and the
        injecting policy bundle is visible on the audit-event
        payload
      - a policy-epoch roll between issue and validation is
        re-evaluated rather than silently honored
      - support export row preserves the service identity and the
        policy bundle reference verbatim
    fixture_ref: fixtures/providers/provider_qualification_cases/acting_identity_policy_injected_service_qualification.yaml

# ===================================================================
# Browser-handoff parity drills (desktop -> browser -> desktop)
# ===================================================================
browser_handoff_parity_drills:
  - drill_id: browser_handoff_parity_review_anchor_round_trip
    drill_class: browser_handoff_parity
    return_anchor_class: review_anchor
    parity_expectation: browser_to_desktop_returns_to_anchor_with_privacy_note
    leg_coverage:
      - leg: desktop_to_browser
        must_disclose:
          - source_context_summary
          - destination_class_disclosed
          - reason_code_disclosed
          - privacy_or_data_loss_note
          - expected_authority_on_destination
          - replay_posture_disclosed
      - leg: browser_to_desktop
        must_disclose:
          - return_anchor_class
          - source_context_summary
          - privacy_or_data_loss_note
          - degraded_local_or_cached_alternative
    must_prove:
      - the desktop sheet names destination class and reason code
        before the browser is launched
      - the callback envelope returns to the typed
        `review_anchor` and re-binds to the originating local
        object
      - if the browser is unavailable, a typed
        `local_or_cached_alternative_record` is shown on the
        same sheet
    fixture_ref: fixtures/providers/provider_qualification_cases/browser_handoff_parity_review_anchor_round_trip.yaml

  - drill_id: browser_handoff_parity_object_link_anchor_round_trip
    drill_class: browser_handoff_parity
    return_anchor_class: object_link_anchor
    parity_expectation: browser_to_desktop_returns_to_anchor_with_privacy_note
    leg_coverage:
      - leg: desktop_to_browser
        must_disclose:
          - source_context_summary
          - destination_class_disclosed
          - reason_code_disclosed
          - privacy_or_data_loss_note
          - expected_authority_on_destination
      - leg: browser_to_desktop
        must_disclose:
          - return_anchor_class
          - privacy_or_data_loss_note
          - degraded_local_or_cached_alternative
    must_prove:
      - the desktop sheet discloses the destination class as a
        provider admin or registry surface and the privacy
        consequence (e.g., data leaves Aureline scope)
      - return rebinds to the typed `object_link_anchor` on the
        originating provider-linked header
      - degraded fallback (export, copy, inspect-only snapshot) is
        visible if the browser handoff is blocked
    fixture_ref: fixtures/providers/provider_qualification_cases/browser_handoff_parity_object_link_anchor_round_trip.yaml

  - drill_id: browser_handoff_parity_browser_unavailable_degraded_alternative
    drill_class: browser_handoff_parity
    return_anchor_class: object_link_anchor
    parity_expectation: degraded_alternative_visible_when_browser_unavailable
    leg_coverage:
      - leg: desktop_to_browser
        must_disclose:
          - source_context_summary
          - destination_class_disclosed
          - reason_code_disclosed
          - privacy_or_data_loss_note
          - degraded_local_or_cached_alternative
    must_prove:
      - when the system browser is unavailable (managed
        workstation, no default browser, sandbox blocked) the
        sheet renders the typed
        `local_or_cached_alternative_record` (export, copy,
        inspect-only snapshot, queue for later)
      - a publish_later_queue_item with
        `mode_admission_reason = browser_handoff_blocked` is
        minted with the right return-anchor class
      - silent retry is forbidden; the sheet remains explicit
    fixture_ref: fixtures/providers/provider_qualification_cases/browser_handoff_parity_browser_unavailable_degraded_alternative.yaml

# ===================================================================
# Packet-field drills
# ===================================================================
packet_field_drills:
  - drill_id: revoked_grant_packet_field_qualification
    drill_class: revoked_grant_packet
    parity_expectation: revoked_grant_routes_to_repair_not_silent_retry
    required_fields:
      - revoked_grant_subject
      - revoked_grant_cause_class
      - revoked_grant_repair_action_class
    support_export_channels:
      - support_bundle
      - object_handoff_packet
    must_prove:
      - the revoked-grant packet names the revoked subject, the
        typed cause class (org membership loss, scope removed,
        token expired, suspended, host mismatch), and the repair
        action class (relink account, request re-scope, escalate
        to admin)
      - the deferred-publish queue parks the action with
        `awaiting_account_reselection` rather than retrying
        under the revoked grant
      - support export carries the revoked subject and the repair
        action without leaking the raw token or callback body
    fixture_ref: fixtures/providers/provider_qualification_cases/revoked_grant_packet_field_qualification.yaml

  - drill_id: delayed_delivery_packet_field_qualification
    drill_class: delayed_delivery_packet
    parity_expectation: delayed_delivery_visible_with_typed_failure_class
    required_fields:
      - delayed_delivery_event_ref
      - delayed_delivery_failure_class
      - delayed_delivery_retry_state_class
    support_export_channels:
      - support_bundle
      - audit_packet
    must_prove:
      - the delayed-delivery packet names the provider event ref,
        the typed failure class (replay_held, missing_page_detected,
        rate_limited, partial_failure), and the retry state
        (queued, blocked, awaiting_freshness)
      - the sync-health view shows `current_mode_class = delayed`
        and the toast / banner copy quotes the typed mode
      - support export and audit packet cite the same typed mode
        and failure class without inventing a generic "sync failed"
        copy
    fixture_ref: fixtures/providers/provider_qualification_cases/delayed_delivery_packet_field_qualification.yaml

  - drill_id: host_mismatch_packet_field_qualification
    drill_class: host_mismatch_packet
    parity_expectation: host_mismatch_denies_with_typed_repair_action
    required_fields:
      - host_mismatch_observed_host
      - host_mismatch_expected_host
      - host_mismatch_repair_action_class
    support_export_channels:
      - support_bundle
      - admin_assisted_handoff_packet
    must_prove:
      - the host-mismatch packet names the observed host, the
        expected host, and the typed repair action (rebind tenant,
        update connected-provider record, escalate to admin)
      - the callback envelope is denied with
        `denied_host_mismatch` and the publish-later queue item is
        rejected with the same typed reason
      - admin-assisted handoff packet carries the host-mismatch
        evidence without leaking raw provider headers
    fixture_ref: fixtures/providers/provider_qualification_cases/host_mismatch_packet_field_qualification.yaml

  - drill_id: partial_import_packet_field_qualification
    drill_class: partial_import_packet
    parity_expectation: partial_import_visibly_bounded_not_authoritative
    required_fields:
      - partial_import_object_class
      - partial_import_missing_count
      - partial_import_freshness_floor_ref
    support_export_channels:
      - support_bundle
      - audit_packet
      - object_handoff_packet
    must_prove:
      - the partial-import packet names the object class, the
        missing count, and the freshness-floor ref so a partial
        import never masquerades as full
      - the imported snapshot carries
        `partial_vs_full_class = bounded_partial_snapshot` and the
        `degraded_import_class = partial`
      - support export, object-handoff packet, and audit packet
        all preserve the partial bound and the missing count
    fixture_ref: fixtures/providers/provider_qualification_cases/partial_import_packet_field_qualification.yaml

  - drill_id: mirror_or_self_host_routing_packet_field_qualification
    drill_class: mirror_or_self_host_routing_packet
    parity_expectation: mirror_or_self_host_routing_provenance_visible
    required_fields:
      - mirror_or_self_host_routing_class
      - mirror_or_self_host_provenance_summary
      - support_class_narrowing_summary
    support_export_channels:
      - support_bundle
      - migration_note
      - admin_assisted_handoff_packet
    must_prove:
      - the routing packet names the routing class
        (mirror_supported_with_provenance,
        self_host_supported_with_host_match,
        host_pinned_authoritative_only) and a reviewable
        provenance summary
      - mirror-derived snapshots tag every imported overlay with
        `degraded_import_class = mirror_derived` and the support
        bundle preserves the tag
      - the support_class_narrowing_summary names the narrower
        support class when the live evidence does not justify the
        broader provider-class claim
    fixture_ref: fixtures/providers/provider_qualification_cases/mirror_or_self_host_routing_packet_field_qualification.yaml
