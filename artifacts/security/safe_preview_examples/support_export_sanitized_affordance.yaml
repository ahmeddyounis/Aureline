example_id: security.safe_preview.support_export_sanitized_snapshot
schema_version: 1
title: Support export emits a sanitized snapshot or metadata-only envelope only; active content never survives
surface_family: support_export_surface
detector_outcome: sanitize
current_trust_class: SanitizedRich
downgrade_posture: downgrade_to_static_snapshot
downgrade_triggers_observed:
  - support_export_boundary
related_case_id: case:support_export:sanitized_snapshot
related_fixture: fixtures/security/suspicious_content_cases/support_export_sanitized_snapshot.json
related_refs:
  - docs/security/suspicious_content_packet.md
  - docs/security/safe_preview_trust_classes.md
context:
  finding_classes:
    - raw_rendered_divergence
  location_kind: rendered_preview_markup
  annotation_mode: standard_inline
affordance:
  badge_label: Sanitized preview
  warning_label: Rendered preview differs from source
  primary_surface_text: >
    The support export carries a sanitized static snapshot with owner,
    origin, snapshot_age, and the divergence warning preserved. If
    redaction or policy blocks the body, the export narrows to a
    metadata-only envelope and states why.
  primary_action:
    action_id: export_sanitized_snapshot
    representation_label: Export sanitized snapshot
    body_posture: sanitized_static_snapshot
    representation_class: sanitized
    fallback_action_id: export_metadata_only
    fallback_reason: policy_requires_metadata_only
  secondary_actions:
    - action_id: export_metadata_only
      representation_label: Export metadata only
      body_posture: metadata_only_envelope
      representation_class: blocked_metadata_only
      fallback_reason: policy_requires_metadata_only
  disabled_actions:
    - action: export_active_view
      reason: >
        Support/export never carries active content as active. The
        best-case export is a sanitized static snapshot.
    - action: copy_live_remote_body
      reason: >
        Bytes leaving the product use a labeled export action. A
        generic copy path from the support export surface is non-
        conforming.
  required_chrome:
    - trust_class_badge
    - owner_identity
    - origin_identity
    - representation_label
    - snapshot_age
    - suspicious_content_badge
reveal_affordances:
  - warning_badge_in_summary
  - raw_toggle
pass_condition: >
  The exported packet carries owner, origin, snapshot_age, and the
  divergence warning; on redaction failure it narrows to metadata-
  only with a stated fallback_reason. No active-content export path
  is offered.
fail_conditions:
  - The exported packet keeps an active or isolate badge.
  - snapshot_age is missing from the exported envelope.
  - The metadata-only fallback omits metadata_only_reason.
