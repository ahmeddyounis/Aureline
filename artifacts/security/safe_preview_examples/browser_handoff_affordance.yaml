example_id: security.safe_preview.browser_handoff_blocked_execution
schema_version: 1
title: Docs page blocks in-product execution and hands off to the system browser after raw-target inspection
surface_family: docs_help_page
detector_outcome: route_to_system_browser
current_trust_class: SanitizedRich
related_case_id: case:docs:browser_handoff_blocked_execution
related_fixture: fixtures/security/suspicious_content_cases/browser_handoff_blocked_execution.json
related_refs:
  - docs/security/suspicious_content_packet.md
  - docs/security/safe_preview_trust_classes.md
context:
  finding_classes:
    - mixed_script_confusable
    - raw_rendered_divergence
  location_kinds:
    - markdown_source
    - rendered_preview_markup
affordance:
  badge_label: Sanitized preview
  warning_label: Mixed-script confusable link target
  primary_surface_text: >
    The rendered link label does not faithfully communicate the raw
    URL. In-product execution of the target is not allowed. The user
    can inspect the raw target, copy it in raw or escaped form, and
    hand off to the system browser from a labeled action - never a
    generic "Open".
  primary_action:
    action_id: copy_raw
    representation_label: Copy raw link target
    body_posture: exact_source_bytes
    representation_class: raw
  secondary_actions:
    - action_id: copy_escaped
      representation_label: Copy escaped link target
      body_posture: escaped_source_text
      representation_class: escaped
    - action_id: copy_rendered
      representation_label: Copy rendered link label
      body_posture: rendered_view
      representation_class: rendered
    - action_id: export_sanitized_snapshot
      representation_label: Export sanitized snapshot
      body_posture: sanitized_static_snapshot
      representation_class: sanitized
    - action_id: export_metadata_only
      representation_label: Export metadata only
      body_posture: metadata_only_envelope
      representation_class: blocked_metadata_only
      fallback_reason: policy_requires_metadata_only
  handoff_action:
    label: Open in system browser
    routes_to: system_browser
    requires_confirm: true
    confirm_preview:
      shows_raw_target: true
      shows_suspicious_content_warning: true
      shows_owner_origin: true
    notes: >
      The handoff action names the system browser explicitly. It never
      implies that the destination is sanitized or isolated inside the
      product.
  disabled_actions:
    - action: open_in_product_active_preview
      reason: >
        Docs pages never execute linked targets in-product. Any active
        behavior belongs in the system browser.
    - action: generic_open
      reason: >
        A generic "Open" label is forbidden where the handoff target
        is external. The label must name the destination.
  required_chrome:
    - trust_class_badge
    - owner_identity
    - origin_identity
    - publisher_or_host
    - representation_label
    - suspicious_content_badge
reveal_affordances:
  - inline_marker
  - raw_toggle
  - escaped_toggle
  - warning_badge_in_summary
  - owner_origin_chip
pass_condition: >
  The confusable warning and raw link target are visible before the
  handoff confirm, the handoff action is labeled "Open in system
  browser" (never a bare "Open"), and no in-product active-preview
  path is offered for the linked target.
fail_conditions:
  - A generic "Open" button launches the link target without naming the destination.
  - The handoff confirm hides the raw link target or the confusable warning.
  - The linked target is rendered as active content inside the product.
