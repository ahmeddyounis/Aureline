example_id: security.safe_preview.sanitized_rich_docs_markdown_representation
schema_version: 1
title: Docs page keeps raw and rendered Markdown distinct under sanitize outcome
surface_family: docs_help_page
detector_outcome: sanitize
current_trust_class: SanitizedRich
related_case_id: case:docs:markdown_representation
related_fixture: fixtures/security/suspicious_content_cases/docs_help_markdown_representation.json
related_refs:
  - docs/security/suspicious_content_packet.md
  - docs/security/safe_preview_trust_classes.md
context:
  finding_classes:
    - raw_rendered_divergence
  location_kind: markdown_source
  annotation_mode: standard_inline
affordance:
  badge_label: Sanitized preview
  warning_label: Rendered preview differs from source
  primary_surface_text: >
    The rendered Markdown hides source escapes and link syntax that
    remain material for review. Rendered and raw representations are
    labeled separately and never collapse into a single "Copy".
  primary_action:
    action_id: copy_rendered
    representation_label: Copy rendered preview
    body_posture: rendered_view
    representation_class: rendered
  secondary_actions:
    - action_id: copy_raw
      representation_label: Copy raw Markdown
      body_posture: exact_source_bytes
      representation_class: raw
    - action_id: copy_escaped
      representation_label: Copy escaped Markdown
      body_posture: escaped_source_text
      representation_class: escaped
    - action_id: export_sanitized_snapshot
      representation_label: Export sanitized snapshot
      body_posture: sanitized_static_snapshot
      representation_class: sanitized
  disabled_actions:
    - action: run_embedded_active_content
      reason: >
        Docs pages never run active content from the rendered Markdown.
        External targets route to the system browser after raw-target
        inspection.
  required_chrome:
    - trust_class_badge
    - owner_identity
    - origin_identity
    - representation_label
    - suspicious_content_badge
reveal_affordances:
  - raw_toggle
  - escaped_toggle
  - warning_badge_in_summary
  - copy_safe_representation
pass_condition: >
  Rendered and raw Markdown are both reachable on the same surface, the
  divergence warning is visible beside the rendered view, and the
  sanitized export preserves the divergence warning with owner/origin
  attribution.
fail_conditions:
  - Copy rendered appears without Copy raw on a page with raw/rendered divergence.
  - The sanitized snapshot strips the divergence warning from the exported packet.
  - A bare "Copy" button appears without a representation label beside it.
