evidence_window_states:
  - id: current
    meaning: The event or signal is within its accepted freshness window.
    export_effect: may_embed
  - id: reviewable
    meaning: A reviewer may inspect the record and cited evidence for security, support, advisory, or postmortem purposes.
    export_effect: may_export_metadata
  - id: exportable
    meaning: The record may leave its source boundary under the declared destination and redaction profile.
    export_effect: may_embed
  - id: expired
    meaning: The ordinary retention or export window has elapsed; omitted fields require omitted_by_expiry rows.
    export_effect: expired_omission
  - id: redacted
    meaning: Data exists but has been withheld or transformed under a redaction profile.
    export_effect: redacted_summary
  - id: legally_retained
    meaning: A legal, incident, support, or administrative hold preserves metadata or refs beyond ordinary expiry.
    export_effect: legal_hold_metadata_only

field_disposition_rules:
  default_missing_field_meaning: unknown_until_field_disposition_present
  required_dispositions:
    - recorded_and_present
    - not_recorded_by_design
    - omitted_by_redaction
    - omitted_by_expiry
    - omitted_by_policy
    - omitted_by_legal_hold
    - unavailable_source
    - outside_platform_scope
  rules:
    - id: missing_never_means_never_recorded
      statement: >
        A blank or absent field in an export never means the product
        failed to record it unless a field_disposition row says
        not_recorded_by_design.
    - id: redaction_is_visible
      statement: >
        Data withheld by redaction carries omitted_by_redaction plus a
        redaction class or profile ref.
    - id: expiry_is_visible
      statement: >
        Data outside its evidence window carries omitted_by_expiry and
        an evidence_window_ref.
    - id: legal_hold_is_visible
      statement: >
        Held material carries omitted_by_legal_hold or legally_retained
        window state; exports may include metadata refs without embedding
        the held body.
