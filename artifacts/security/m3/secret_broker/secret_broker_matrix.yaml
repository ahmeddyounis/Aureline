# Secret-broker beta matrix.
#
# Declares the profiles, vault/keychain adapters, signature postures, secret
# classes, projection modes, reference modes, lifecycle states, and audit
# outcomes the beta projection must inspect on connected, mirror-only,
# offline, and enterprise-managed beta profiles. The matrix mirrors the
# vocabulary owned by `crates/aureline-auth/src/secret_broker/mod.rs`. Every
# cell stays inspectable from the same record kind across admin, support,
# shell, and reviewer surfaces.

shared_contract_ref: "security:secret_broker_beta:v1"
schema_version: 1

record_kinds:
  page: "security_secret_broker_beta_page_record"
  handle_row: "security_secret_broker_beta_handle_row_record"
  consumer_audit: "security_secret_broker_beta_consumer_audit_record"
  summary: "security_secret_broker_beta_summary_record"
  defect: "security_secret_broker_beta_defect_record"
  support_export: "security_secret_broker_beta_support_export_record"

profiles:
  - token: "connected"
    note: "OS credential store or live enterprise vault available."
  - token: "mirror_only"
    note: "Signed enterprise-vault mirror is the only authority."
  - token: "offline"
    note: "Air-gapped enterprise vault snapshot only."
  - token: "enterprise_managed"
    note: "Managed policy injector materialises narrow authority per call."

vault_adapters:
  - token: "os_keychain"
    managed_authority: false
  - token: "enterprise_vault_managed"
    managed_authority: true
  - token: "enterprise_vault_self_hosted_mirror"
    managed_authority: true
  - token: "enterprise_vault_air_gapped_snapshot"
    managed_authority: true
  - token: "platform_agent"
    managed_authority: false
  - token: "hsm_or_kms_backed"
    managed_authority: true
  - token: "session_memory_cache"
    managed_authority: false
  - token: "managed_policy_injector"
    managed_authority: true

signature_states:
  - token: "verified_live"
    verified: true
  - token: "verified_mirror"
    verified: true
  - token: "verified_manual_import"
    verified: true
  - token: "verified_air_gapped"
    verified: true
  - token: "not_required_local_origin"
    verified: false

reference_modes:
  - token: "handle"
  - token: "session_only"
  - token: "delegated"

projection_modes:
  - token: "alias_only"
  - token: "broker_callback"
  - token: "request_header_signer"
  - token: "ephemeral_fd"
  - token: "bounded_mount"
  - token: "env_var_isolated_child"
  - token: "sign_only"
  - token: "decrypt_only"
  - token: "token_exchange"
  - token: "policy_materialised"
  - token: "inspect_metadata"

secret_classes:
  - token: "ai_provider_token"
  - token: "code_host_token"
  - token: "package_registry_token"
  - token: "database_credential"
  - token: "ssh_key_material"
  - token: "client_certificate"
  - token: "signing_key_material"
  - token: "provider_session"
  - token: "device_secret"
  - token: "ephemeral_operation_token"

lifecycle_states:
  - token: "live"
    fails_closed: false
  - token: "pending_rotation"
    fails_closed: false
  - token: "expiring"
    fails_closed: false
  - token: "expired"
    fails_closed: true
  - token: "revoked"
    fails_closed: true
  - token: "paused_trust_changed"
    fails_closed: true
  - token: "paused_vault_locked"
    fails_closed: true
  - token: "paused_vault_unavailable"
    fails_closed: true

audit_outcomes:
  - token: "granted_handle"
    is_denial: false
  - token: "granted_delegated"
    is_denial: false
  - token: "granted_session_only"
    is_denial: false
  - token: "denied_by_policy"
    is_denial: true
  - token: "denied_by_trust_state"
    is_denial: true
  - token: "denied_by_lifecycle_state"
    is_denial: true
  - token: "denied_by_missing_approval"
    is_denial: true
  - token: "denied_by_plaintext_requested"
    is_denial: true
  - token: "denied_by_silent_in_memory_promotion"
    is_denial: true
  - token: "denied_by_stale_handle_reuse"
    is_denial: true
  - token: "denied_by_public_endpoint_fallback"
    is_denial: true
  - token: "denied_by_expiry"
    is_denial: true
  - token: "denied_by_revocation"
    is_denial: true

defect_kinds:
  - "raw_secret_material_present"
  - "plaintext_persistence_allowed"
  - "silent_in_memory_promotion_allowed"
  - "stale_handle_reuse_allowed"
  - "public_endpoint_fallback_allowed"
  - "handle_ref_missing"
  - "session_ref_missing"
  - "delegated_credential_ref_missing"
  - "managed_authority_missing_signature"
  - "consumer_audit_missing"
  - "consumer_lineage_drift"
  - "denied_audit_missing_reason"
  - "granted_reference_mode_mismatch"
  - "profile_coverage_missing"
  - "profile_token_drift"
  - "vault_adapter_token_drift"
  - "signature_state_token_drift"
  - "projection_mode_token_drift"
  - "reference_mode_token_drift"
  - "secret_class_token_drift"
  - "lifecycle_state_token_drift"
  - "audit_outcome_token_drift"

guardrails:
  - "Beta rows never carry raw secret material."
  - "Beta rows never admit plaintext persistence."
  - "Beta rows never admit silent in-memory promotion."
  - "Beta rows never admit stale handle reuse."
  - "Beta rows never admit undeclared public-endpoint fallback."
  - "Managed-authority vault adapters require a verified signature posture."
  - "Every claimed row must appear in the consumer-identity audit stream."
  - "Denied audit events must carry a denial note."
  - "All four beta profiles must have at least one claimed row."
