# Approval-ticket beta matrix.
#
# Declares the profiles, sandbox profile classes, action classes, side-effect
# classes, capability classes, issuer classes, request-origin classes,
# evaluation outcomes, native-reapproval routes, and defect kinds the beta
# projection must inspect on connected, mirror-only, offline, and
# enterprise-managed beta profiles. The matrix mirrors the vocabulary owned by
# `crates/aureline-auth/src/approval_tickets/mod.rs`. Every cell stays
# inspectable from the same record kind across admin, support, shell, and
# reviewer surfaces.

shared_contract_ref: "security:approval_ticket_beta:v1"
schema_version: 1

record_kinds:
  page: "security_approval_ticket_beta_page_record"
  sandbox_profile_row: "security_approval_ticket_beta_sandbox_profile_row_record"
  capability_envelope_row: "security_approval_ticket_beta_capability_envelope_row_record"
  ticket_row: "security_approval_ticket_beta_ticket_row_record"
  spend_attempt_event: "security_approval_ticket_beta_spend_attempt_event_record"
  summary: "security_approval_ticket_beta_summary_record"
  defect: "security_approval_ticket_beta_defect_record"
  support_export: "security_approval_ticket_beta_support_export_record"

profiles:
  - token: "connected"
    note: "Live provider, helper, and policy paths available."
  - token: "mirror_only"
    note: "Served exclusively from a signed mirror; no public fallback admitted."
  - token: "offline"
    note: "Served from an air-gapped or last-known-good signed bundle."
  - token: "enterprise_managed"
    note: "Signed managed narrowing applied; supervisor-minted authority only."

sandbox_profile_classes:
  - token: "local_only_authority"
    admits_action_classes: ["local_high_risk_action"]
  - token: "provider_mutation_sandbox"
    admits_action_classes: ["external_provider_mutation"]
  - token: "remote_helper_sandbox"
    admits_action_classes: ["helper_backed_remote_mutation"]
  - token: "credential_projection_sandbox"
    admits_action_classes: ["credential_projection"]

action_classes:
  - token: "external_provider_mutation"
  - token: "helper_backed_remote_mutation"
  - token: "local_high_risk_action"
  - token: "credential_projection"

side_effect_classes:
  - token: "provider_review_comment_publish"
    action_class: "external_provider_mutation"
  - token: "provider_issue_update"
    action_class: "external_provider_mutation"
  - token: "provider_ci_rerun"
    action_class: "external_provider_mutation"
  - token: "remote_helper_mutation"
    action_class: "helper_backed_remote_mutation"
  - token: "credential_projection_to_consumer"
    action_class: "credential_projection"
  - token: "local_destructive_action"
    action_class: "local_high_risk_action"

capability_classes:
  - token: "write_provider_review_comment"
  - token: "update_provider_issue"
  - token: "rerun_provider_ci"
  - token: "mutate_remote_helper_target"
  - token: "project_credential_to_consumer"
  - token: "execute_local_high_risk_action"

issuer_classes:
  - token: "shell"
  - token: "policy_service"
  - token: "supervisor"

request_origin_classes:
  intrinsic_issuer_surfaces:
    - token: "user_shell_prompt"
    - token: "policy_decision"
    - token: "supervisor_control_path"
  non_intrinsic_requesting_surfaces:
    - token: "ai_tool_plan"
    - token: "extension_request"
    - token: "cli_script_request"
    - token: "browser_companion_request"
    - token: "remote_helper_request"
    - token: "automation_scheduler_request"

evaluation_outcomes:
  admitted:
    - token: "admitted"
  denied_drift:
    - token: "denied_missing_authority"
    - token: "denied_expired"
    - token: "denied_target_drift"
    - token: "denied_trust_profile_drift"
    - token: "denied_sandbox_profile_drift"
    - token: "denied_policy_epoch_drift"
    - token: "denied_actor_scope_mismatch"
    - token: "denied_capability_envelope_drift"
    - token: "denied_self_authorization_attempted"

native_reapproval_routes:
  - token: "not_required"
  - token: "native_reapproval_sheet"
  - token: "refresh_target_then_reapprove"
  - token: "reauth_then_reapprove"
  - token: "rescope_then_reapprove"
  - token: "inspect_only_denied"

use_postures:
  - token: "single_use"
  - token: "bounded_reuse"

authority_requirements:
  - token: "approval_ticket_required"
  - token: "reviewed_scope_required"
  - token: "ticket_or_reviewed_scope"

defect_kinds:
  guardrail_flips:
    - token: "raw_authority_material_present"
    - token: "self_authorization_attempted"
    - token: "silent_widening_attempted"
    - token: "plaintext_secret_present"
    - token: "public_endpoint_fallback_offered"
    - token: "local_editing_not_preserved"
  envelope_and_sandbox_lineage:
    - token: "envelope_sandbox_class_mismatch"
    - token: "envelope_capability_outside_sandbox"
    - token: "envelope_side_effect_outside_sandbox"
    - token: "envelope_sandbox_ref_unknown"
    - token: "ticket_sandbox_ref_unknown"
    - token: "ticket_envelope_ref_unknown"
    - token: "ticket_lifetime_exceeds_sandbox_budget"
    - token: "ticket_lifetime_mismatch"
    - token: "ticket_expiry_not_after_issuance"
  spend_outcomes:
    - token: "spend_ticket_ref_unknown"
    - token: "spend_admitted_under_drift"
    - token: "spend_denial_missing_audit_ref"
    - token: "spend_denial_reapproval_route_collapsed"
    - token: "spend_admitted_reapproval_route_unexpected"
    - token: "self_authorization_denial_on_intrinsic_issuer"
    - token: "missing_authority_carried_ticket_ref"
    - token: "expired_spend_not_after_expiry"
    - token: "target_drift_matches_ticket_target"
    - token: "sandbox_drift_matches_ticket_sandbox"
    - token: "policy_epoch_drift_matches_ticket_epoch"
    - token: "trust_profile_drift_matches_ticket_trust"
    - token: "envelope_drift_matches_ticket_envelope"
  origin_and_coverage:
    - token: "missing_requesting_surface_ref"
    - token: "profile_coverage_missing"
    - token: "sandbox_profile_coverage_missing"
  token_drift:
    - token: "profile_token_drift"
    - token: "sandbox_profile_class_token_drift"
    - token: "action_class_token_drift"
    - token: "side_effect_class_token_drift"
    - token: "issuer_class_token_drift"
    - token: "request_origin_class_token_drift"
    - token: "use_posture_token_drift"
    - token: "authority_requirement_token_drift"
    - token: "evaluation_outcome_token_drift"
    - token: "native_reapproval_route_token_drift"
    - token: "target_class_token_drift"
    - token: "actor_class_token_drift"
    - token: "auth_source_class_token_drift"
    - token: "capability_class_tokens_drift"
    - token: "side_effect_tokens_drift"
