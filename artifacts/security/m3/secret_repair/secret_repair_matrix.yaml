# Secret-repair beta matrix.
#
# Declares the profiles, backing stores, lock states, denial reasons,
# projection modes, secret classes, repair actions, repair outcomes, and
# defect kinds the beta projection must inspect on connected, mirror-only,
# offline, and enterprise-managed beta profiles. The matrix mirrors the
# vocabulary owned by `crates/aureline-auth/src/keychain_state/mod.rs`. Every
# cell stays inspectable from the same record kind across admin, support,
# shell, and reviewer surfaces.

shared_contract_ref: "security:secret_repair_beta:v1"
schema_version: 1

record_kinds:
  page: "security_secret_repair_beta_page_record"
  lock_state_row: "security_secret_repair_beta_lock_state_row_record"
  denied_projection_row: "security_secret_repair_beta_denied_projection_row_record"
  repair_event: "security_secret_repair_beta_repair_event_record"
  summary: "security_secret_repair_beta_summary_record"
  defect: "security_secret_repair_beta_defect_record"
  support_export: "security_secret_repair_beta_support_export_record"

profiles:
  - token: "connected"
    note: "OS credential store or live enterprise vault available."
  - token: "mirror_only"
    note: "Signed enterprise-vault mirror is the only authority."
  - token: "offline"
    note: "Air-gapped enterprise vault snapshot only."
  - token: "enterprise_managed"
    note: "Managed policy injector materialises narrow authority per call."

backing_stores:
  - token: "os_keychain"
  - token: "enterprise_vault_managed"
  - token: "enterprise_vault_self_hosted_mirror"
  - token: "enterprise_vault_air_gapped_snapshot"
  - token: "platform_agent"
  - token: "hsm_or_kms_backed"
  - token: "session_memory_cache"
  - token: "managed_policy_injector"

lock_states:
  - token: "unlocked"
    requires_repair_action: false
  - token: "locked"
    requires_repair_action: true
  - token: "biometric_required"
    requires_repair_action: true
  - token: "user_password_required"
    requires_repair_action: true
  - token: "hardware_token_required"
    requires_repair_action: true
  - token: "daemon_unreachable"
    requires_repair_action: true
  - token: "adapter_misconfigured"
    requires_repair_action: true
  - token: "vault_snapshot_expired"
    requires_repair_action: true
  - token: "vault_mirror_outage"
    requires_repair_action: true
  - token: "policy_blocked"
    requires_repair_action: true

denial_reasons:
  - token: "backing_store_locked"
    implies_store_lock: true
  - token: "backing_store_unavailable"
    implies_store_lock: true
  - token: "backing_store_signature_missing"
    implies_store_lock: true
  - token: "handle_expired"
    implies_store_lock: false
  - token: "handle_revoked"
    implies_store_lock: false
  - token: "lifecycle_state_failed_closed"
    implies_store_lock: false
  - token: "policy_blocked"
    implies_store_lock: false
  - token: "plaintext_projection_requested"
    implies_store_lock: false
  - token: "stale_snapshot"
    implies_store_lock: false
  - token: "public_endpoint_fallback_requested"
    implies_store_lock: false
  - token: "missing_approval"
    implies_store_lock: false

projection_modes:
  - token: "alias_only"
  - token: "broker_callback"
  - token: "request_header_signer"
  - token: "ephemeral_fd"
  - token: "bounded_mount"
  - token: "env_var_isolated_child"
  - token: "sign_only"
  - token: "decrypt_only"
  - token: "token_exchange"
  - token: "policy_materialised"
  - token: "inspect_metadata"

secret_classes:
  - token: "ai_provider_token"
  - token: "code_host_token"
  - token: "package_registry_token"
  - token: "database_credential"
  - token: "ssh_key_material"
  - token: "client_certificate"
  - token: "signing_key_material"
  - token: "provider_session"
  - token: "device_secret"
  - token: "ephemeral_operation_token"

repair_actions:
  - token: "none_required"
  - token: "prompt_keychain_unlock"
  - token: "prompt_biometric"
  - token: "prompt_user_password"
  - token: "insert_hardware_token"
  - token: "restart_keychain_daemon"
  - token: "restart_credential_agent"
  - token: "reconfigure_vault_adapter"
  - token: "refresh_signed_vault_mirror"
  - token: "import_signed_vault_snapshot"
  - token: "contact_admin_to_unblock_policy"
  - token: "reauth_and_recover_handles"
  - token: "accept_visible_degraded_session_only"

repair_outcomes:
  - token: "awaiting_user"
    is_open: true
    is_terminal: false
  - token: "in_progress"
    is_open: true
    is_terminal: false
  - token: "resolved"
    is_open: false
    is_terminal: true
  - token: "user_declined"
    is_open: false
    is_terminal: true
  - token: "failed_transient"
    is_open: false
    is_terminal: false
  - token: "failed_permanent"
    is_open: false
    is_terminal: true

defect_kinds:
  - "raw_secret_material_present"
  - "plaintext_fallback_attempted"
  - "plaintext_fallback_offered"
  - "plaintext_fallback_taken"
  - "public_endpoint_fallback_offered"
  - "local_editing_not_preserved"
  - "repair_action_missing"
  - "unexpected_repair_action_on_unlocked"
  - "remediation_path_missing"
  - "blocked_consumer_missing"
  - "linked_lock_state_missing"
  - "linked_lock_state_ref_unknown"
  - "linked_row_ref_unknown"
  - "repair_event_unlinked"
  - "terminal_repair_outcome_missing_resolved_at"
  - "open_repair_outcome_unexpected_resolved_at"
  - "profile_coverage_missing"
  - "profile_token_drift"
  - "backing_store_token_drift"
  - "lock_state_token_drift"
  - "repair_action_token_drift"
  - "denial_reason_token_drift"
  - "secret_class_token_drift"
  - "projection_mode_token_drift"
  - "outcome_token_drift"

guardrails:
  - "Non-unlocked lock-state rows MUST declare a typed repair action and a remediation-path ref."
  - "Denied-projection rows MUST identify the blocked consumer, target, scope, and required repair action."
  - "Store-driven denials MUST link the originating lock-state row."
  - "Repair events MUST link a lock-state row or a denied-projection row."
  - "Terminal repair outcomes MUST declare a resolved_at timestamp; open outcomes MUST NOT."
  - "No beta row, audit event, or repair event ever attempts, offers, or takes a plaintext fallback."
  - "No denied-projection row offers an undeclared public-endpoint fallback."
  - "Local editing is preserved through every failure mode."
  - "All four beta profiles must have at least one claimed row."
