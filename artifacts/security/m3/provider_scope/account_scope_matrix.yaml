# Account-scope beta matrix.
#
# Declares the profiles, identity classes, auth sources, lifecycle states,
# requested actions, decision and resolution-reason vocabularies, reapproval
# routes, scope-drift triggers, authority-downgrade actions, and defect kinds
# the beta projection must inspect on connected, mirror-only, offline, and
# enterprise-managed beta profiles. The matrix mirrors the vocabulary owned by
# `crates/aureline-provider/src/account_scope/mod.rs`. Every cell stays
# inspectable from the same record kind across admin, support, shell, and
# reviewer surfaces.

shared_contract_ref: "providers:account_scope_beta:v1"
schema_version: 1

record_kinds:
  page: "providers_account_scope_beta_page_record"
  connected_account_row: "providers_account_scope_beta_connected_account_row_record"
  installation_grant_row: "providers_account_scope_beta_installation_grant_row_record"
  delegated_credential_row: "providers_account_scope_beta_delegated_credential_row_record"
  effective_scope_row: "providers_account_scope_beta_effective_scope_row_record"
  scope_drift_event: "providers_account_scope_beta_scope_drift_event_record"
  summary: "providers_account_scope_beta_summary_record"
  defect: "providers_account_scope_beta_defect_record"
  support_export: "providers_account_scope_beta_support_export_record"

profiles:
  - token: "connected"
    note: "Connected workstation reaching live providers."
  - token: "mirror_only"
    note: "Mirror-only workstation reaching providers through a signed mirror."
  - token: "offline"
    note: "Offline workstation working from imported snapshots."
  - token: "enterprise_managed"
    note: "Enterprise-managed workstation under managed-policy authority."

acting_identity_classes:
  - token: "connected_account"
    note: "Aureline acts as a signed-in human user account."
  - token: "installation_grant"
    note: "Aureline acts under an installation, app, or project-scoped grant."
  - token: "delegated_credential"
    note: "Aureline acts under a delegated credential held on behalf of a user."

auth_sources:
  - token: "human_session"
  - token: "installation_grant"
  - token: "delegated_credential"
  - token: "project_scoped_grant"
  - token: "policy_injected_service"

account_lifecycle_states:
  - token: "active"
    holds_mutation_closed: false
  - token: "reauth_required"
    holds_mutation_closed: true
  - token: "revoked"
    holds_mutation_closed: true
  - token: "suspended"
    holds_mutation_closed: true
  - token: "unreachable"
    holds_mutation_closed: true

installation_grant_lifecycle_states:
  - token: "installed"
    holds_mutation_closed: false
  - token: "uninstalled"
    holds_mutation_closed: true
  - token: "suspended"
    holds_mutation_closed: true
  - token: "scope_narrowed"
    holds_mutation_closed: true
  - token: "secret_expired"
    holds_mutation_closed: true

delegated_credential_lifecycle_states:
  - token: "active"
    holds_mutation_closed: false
  - token: "revoked"
    holds_mutation_closed: true
  - token: "expired"
    holds_mutation_closed: true
  - token: "scope_narrowed"
    holds_mutation_closed: true
  - token: "delegator_lost_grant"
    holds_mutation_closed: true

requested_actions:
  - token: "read_only_inspection"
    proposes_mutation: false
  - token: "human_authored_comment"
    proposes_mutation: true
  - token: "review_decision_publish"
    proposes_mutation: true
  - token: "issue_or_work_item_mutation"
    proposes_mutation: true
  - token: "ci_run_or_check_mutation"
    proposes_mutation: true
  - token: "release_publish"
    proposes_mutation: true
  - token: "credential_projection"
    proposes_mutation: true

authority_decisions:
  - token: "allowed"
    admits_mutation: true
  - token: "denied"
    admits_mutation: false
  - token: "browser_only"
    admits_mutation: false
  - token: "local_draft_only"
    admits_mutation: false

grant_resolution_reasons:
  - token: "allowed"
    is_allowed_family: true
  - token: "allowed_with_downgrade"
    is_allowed_family: true
  - token: "allowed_with_browser_handoff"
    is_allowed_family: true
  - token: "allowed_with_deferred_publish"
    is_allowed_family: true
  - token: "denied_scope_missing"
    is_allowed_family: false
  - token: "denied_policy_bundle"
    is_allowed_family: false
  - token: "denied_workspace_trust"
    is_allowed_family: false
  - token: "denied_actor_class_forbidden"
    is_allowed_family: false
  - token: "denied_freshness_floor"
    is_allowed_family: false
  - token: "denied_revoked"
    is_allowed_family: false
  - token: "denied_suspended"
    is_allowed_family: false
  - token: "denied_approval_ticket_missing"
    is_allowed_family: false
  - token: "denied_step_up_required"
    is_allowed_family: false
  - token: "denied_unknown_actor_class"
    is_allowed_family: false

reapproval_routes:
  - token: "none_required"
  - token: "system_browser_reauth"
  - token: "step_up_authenticator"
  - token: "account_reselection"
  - token: "installation_grant_reconsent"
  - token: "delegated_credential_reissue"
  - token: "browser_handoff"
  - token: "publish_later_deferred"
  - token: "admin_review_or_trust_grant"

scope_drift_triggers:
  - token: "grant_revoked"
  - token: "grant_suspended"
  - token: "scope_narrowed"
  - token: "delegated_credential_expired"
  - token: "installation_secret_expired"
  - token: "actor_class_changed"
  - token: "host_mismatch_detected"
  - token: "tenant_or_org_membership_changed"
  - token: "policy_epoch_rolled"
  - token: "trust_state_downgraded"
  - token: "freshness_floor_drifted"

authority_downgrades:
  - token: "no_downgrade_required"
  - token: "force_inspect_only"
  - token: "force_local_draft_only"
  - token: "force_browser_handoff_only"
  - token: "force_step_up_authenticator"
  - token: "force_account_reselection"
  - token: "force_admin_review"
  - token: "force_disconnect_until_repair"

defect_kinds:
  - "raw_token_material_present"
  - "public_endpoint_fallback_offered"
  - "public_endpoint_fallback_taken"
  - "silent_mutation_authority_widened"
  - "silent_mutation_authority_retained_after_drift"
  - "local_editing_not_preserved"
  - "identity_class_mismatch"
  - "bound_identity_ref_unknown"
  - "bound_identity_class_mismatch"
  - "allowed_decision_on_closed_lifecycle"
  - "allowed_decision_with_non_allowed_reason"
  - "non_allowed_decision_with_allowed_reason"
  - "browser_only_without_handoff_ref"
  - "local_draft_only_without_queue_ref"
  - "allowed_mutation_without_approval_ticket"
  - "non_allowed_decision_missing_reapproval_route"
  - "resolved_scope_not_subset_of_declared"
  - "allowed_resolution_without_resolved_scope"
  - "drift_event_identity_ref_unknown"
  - "drift_event_resolution_ref_unknown"
  - "drift_event_downgrade_missing"
  - "drift_event_reapproval_route_missing"
  - "profile_coverage_missing"
  - "profile_token_drift"
  - "acting_identity_class_token_drift"
  - "auth_source_token_drift"
  - "lifecycle_state_token_drift"
  - "decision_token_drift"
  - "resolution_reason_token_drift"
  - "requested_action_token_drift"
  - "reapproval_route_token_drift"
  - "drift_trigger_token_drift"
  - "drift_downgrade_token_drift"

guardrails:
  - "Each provider-linked row binds exactly one acting-identity class: connected_account, installation_grant, or delegated_credential."
  - "Identity rows MUST NOT carry raw access tokens, raw delegated-token bodies, raw refresh material, raw provider payloads, or raw policy-injector material."
  - "Resolution rows MUST resolve scope to a subset of the provider-declared scope refs on the bound identity row."
  - "Allowed decisions MUST pair with an allowed-family resolution reason; denied/browser-only/local-draft-only decisions MUST pair with a non-allowed-family reason."
  - "Allowed mutations MUST name an approval-ticket ref drawn from the approval-ticket alpha contract."
  - "Resolutions whose decision is not Allowed MUST name a non-NoneRequired reapproval route."
  - "browser_only decisions MUST name a browser-handoff packet ref; local_draft_only decisions MUST name a publish-later queue item ref."
  - "Scope-drift events with a non-benign trigger MUST force a visible authority downgrade and a non-NoneRequired reapproval route."
  - "Identity rows whose lifecycle holds mutation closed MUST NOT bind an Allowed decision."
  - "All four beta profiles must have at least one claimed row."
  - "Support exports preserve identity, resolution, and drift lineage verbatim; raw tokens, raw payloads, and raw policy-injector material are excluded."
