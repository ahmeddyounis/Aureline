# yaml-language-server: $schema=../../schemas/security/secret_class_rows.schema.json
#
# Secret-class rows.
#
# Machine-readable matrix backing ADR 0007
# (docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md).
# Each row names one secret class, the trust-store classes that may hold
# it, the projection modes the broker admits for it, the consumer classes
# that may reference versus reveal it, the support-bundle / evidence-
# packet / profile-export inclusion posture, the minimum audit events,
# the default redaction classes, and the fallback posture when the
# preferred store is unavailable.
#
# Tooling (broker, AI lane, provider lane, registry lane, database
# lane, remote-agent lane, signing / release-evidence lane, importer,
# doctor, support-export, mutation-journal, replay, governance packets)
# may read these rows to avoid inventing parallel vocabulary.
#
# Conformance: every row conforms to
#   schemas/security/secret_class_rows.schema.json
# as a `secret_class_row` record.
#
# Rules:
#   - Plaintext-on-disk storage is never acceptable; every row's
#     fallback_posture.plaintext_file_allowed is false.
#   - `session_memory_cache` is the only long-lived fallback when no
#     persistent secure store is available. Signing-class secrets MUST
#     NOT admit it.
#   - `reveal_on_demand_allowed` is false for signing / session / device
#     / ephemeral classes.
#   - Adding a new class, new store, new projection mode, new denial
#     reason, or new audit event is additive-minor with a schema bump
#     plus a row. Repurposing any existing value is breaking.
#
# adr_source is the canonical human-readable form. If tooling and the
# ADR disagree, the ADR wins and this file must be updated in the same
# change.

schema_version: 1
adr_source: docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md
decision_id: D-0013
decision_register: artifacts/governance/decision_index.yaml

rows:
  - record_kind: secret_class_row
    secret_schema_version: 1
    secret_class: ai_provider_token
    description: >
      API keys, gateway keys, and BYOK session tokens for AI providers.
      Any first-party AI adapter under capability may reference the
      handle; raw reveal is denied by default and requires just-in-time
      consent plus policy when the protocol truly requires raw header
      bearer.
    preferred_trust_store_classes:
      - enterprise_vault_adapter
      - os_keychain
    permitted_trust_store_classes:
      - enterprise_vault_adapter
      - os_keychain
      - managed_policy_injector
      - session_memory_cache
    default_projection_modes:
      - alias_only
      - broker_callback
      - request_header_signer
      - token_exchange
      - inspect_metadata
    reference_set:
      - first_party_adapter
      - cli_subcommand
      - doctor_probe
      - support_exporter
    reveal_set:
      - first_party_adapter
    reveal_posture:
      raw_reveal_default: protocol_required_header_only
      reveal_on_demand_allowed: true
      notes:
        - "Reveal-on-demand is per-handle, high-friction, and user-initiated."
        - "AI tool calls MUST NOT trigger reveal on the user's behalf."
    export_posture:
      support_bundle_inclusion: metadata_only
      evidence_packet_inclusion: excluded
      profile_export_inclusion: alias_only
    audit_minimum_event_ids:
      - secret_handle_issued
      - secret_handle_revoked
      - secret_projection_used
      - secret_projection_failed
      - secret_reveal_started
      - secret_reveal_ended
      - secret_denial
    default_redaction_classes:
      - logs_local
      - traces_local
      - support_bundle
      - ai_context_capture
      - recipe_manifest
      - profile_export
      - mutation_journal_entry
      - save_manifest
    fallback_posture:
      session_memory_cache_allowed: true
      plaintext_file_allowed: false
      notes:
        - "Session-only fallback re-prompts on next process start."
        - "Admin policy may narrow but not widen the fallback allowance."

  - record_kind: secret_class_row
    secret_schema_version: 1
    secret_class: code_host_token
    description: >
      Git host tokens, code-review tokens, and artifact-host tokens
      used by first-party Git, review, and code-host adapters. Raw
      reveal denied unless the protocol requires a raw header bearer;
      no reveal for ambient consumers.
    preferred_trust_store_classes:
      - enterprise_vault_adapter
      - os_keychain
    permitted_trust_store_classes:
      - enterprise_vault_adapter
      - os_keychain
      - managed_policy_injector
      - session_memory_cache
    default_projection_modes:
      - alias_only
      - broker_callback
      - request_header_signer
      - token_exchange
      - inspect_metadata
    reference_set:
      - first_party_adapter
      - cli_subcommand
      - doctor_probe
      - review_surface
      - support_exporter
    reveal_set:
      - first_party_adapter
    reveal_posture:
      raw_reveal_default: protocol_required_header_only
      reveal_on_demand_allowed: true
      notes:
        - "Clipboard projection of a revealed code-host token carries a short clear-on-timeout timer."
    export_posture:
      support_bundle_inclusion: metadata_only
      evidence_packet_inclusion: excluded
      profile_export_inclusion: alias_only
    audit_minimum_event_ids:
      - secret_handle_issued
      - secret_handle_revoked
      - secret_projection_used
      - secret_projection_failed
      - secret_reveal_started
      - secret_reveal_ended
      - secret_denial
    default_redaction_classes:
      - logs_local
      - traces_local
      - support_bundle
      - recipe_manifest
      - profile_export
      - mutation_journal_entry
      - save_manifest
    fallback_posture:
      session_memory_cache_allowed: true
      plaintext_file_allowed: false
      notes:
        - "Session-only fallback re-prompts on next process start."

  - record_kind: secret_class_row
    secret_schema_version: 1
    secret_class: package_registry_token
    description: >
      Package-registry tokens (npm, crates, maven, pip, container
      registries). Referenced by the registry adapter under capability;
      raw reveal denied unless the registry protocol requires it.
    preferred_trust_store_classes:
      - enterprise_vault_adapter
      - os_keychain
    permitted_trust_store_classes:
      - enterprise_vault_adapter
      - os_keychain
      - managed_policy_injector
      - session_memory_cache
    default_projection_modes:
      - alias_only
      - broker_callback
      - request_header_signer
      - token_exchange
      - inspect_metadata
    reference_set:
      - first_party_registry_adapter
      - cli_subcommand
      - doctor_probe
      - support_exporter
    reveal_set:
      - first_party_registry_adapter
    reveal_posture:
      raw_reveal_default: protocol_required_header_only
      reveal_on_demand_allowed: true
      notes:
        - "Reveal for registry tokens is rare; most registry tools accept broker_callback."
    export_posture:
      support_bundle_inclusion: metadata_only
      evidence_packet_inclusion: excluded
      profile_export_inclusion: alias_only
    audit_minimum_event_ids:
      - secret_handle_issued
      - secret_handle_revoked
      - secret_projection_used
      - secret_projection_failed
      - secret_denial
    default_redaction_classes:
      - logs_local
      - traces_local
      - support_bundle
      - recipe_manifest
      - profile_export
      - mutation_journal_entry
      - save_manifest
    fallback_posture:
      session_memory_cache_allowed: true
      plaintext_file_allowed: false
      notes:
        - "Session-only fallback re-prompts on next process start."

  - record_kind: secret_class_row
    secret_schema_version: 1
    secret_class: database_credential
    description: >
      Database passwords, DSN tokens, and warehouse credentials.
      Referenced only by the connection broker; raw reveal denied in
      favour of connection-scoped projection.
    preferred_trust_store_classes:
      - enterprise_vault_adapter
      - os_keychain
    permitted_trust_store_classes:
      - enterprise_vault_adapter
      - os_keychain
      - managed_policy_injector
      - session_memory_cache
    default_projection_modes:
      - alias_only
      - broker_callback
      - ephemeral_fd
      - env_var_isolated_child
      - token_exchange
      - inspect_metadata
    reference_set:
      - first_party_connection_broker
      - doctor_probe
      - support_exporter
    reveal_set: []
    reveal_posture:
      raw_reveal_default: denied
      reveal_on_demand_allowed: false
      notes:
        - "DB credentials never reveal through the UI; connection-scoped projection is the only consumer path."
        - "env_var_isolated_child is used only for legacy CLIs (psql, mysql) invoked in an isolated child."
    export_posture:
      support_bundle_inclusion: metadata_only
      evidence_packet_inclusion: excluded
      profile_export_inclusion: alias_only
    audit_minimum_event_ids:
      - secret_handle_issued
      - secret_handle_revoked
      - secret_projection_used
      - secret_projection_failed
      - secret_denial
    default_redaction_classes:
      - logs_local
      - traces_local
      - support_bundle
      - recipe_manifest
      - profile_export
      - mutation_journal_entry
      - save_manifest
      - terminal_transcript
    fallback_posture:
      session_memory_cache_allowed: true
      plaintext_file_allowed: false
      notes:
        - "Session-only fallback re-prompts; never written to user-level env rc files."

  - record_kind: secret_class_row
    secret_schema_version: 1
    secret_class: ssh_key_material
    description: >
      SSH private keys, deploy keys, and known-hosts supplements.
      Referenced by the agent adapter and the remote adapter; raw
      private-key bytes are never revealed. Reveal-on-demand surfaces
      metadata and offers copy-public-key only.
    preferred_trust_store_classes:
      - platform_agent
      - os_keychain
      - hsm_or_kms_backed
    permitted_trust_store_classes:
      - platform_agent
      - os_keychain
      - hsm_or_kms_backed
      - session_memory_cache
    default_projection_modes:
      - alias_only
      - broker_callback
      - sign_only
      - decrypt_only
      - inspect_metadata
    reference_set:
      - first_party_agent_adapter
      - remote_agent
      - doctor_probe
      - support_exporter
    reveal_set: []
    reveal_posture:
      raw_reveal_default: sign_only_metadata_reveal
      reveal_on_demand_allowed: false
      notes:
        - "UI reveal surfaces fingerprint, public key, and comment only; raw private bytes are never revealed."
        - "Agent-forward is the preferred projection to remote sessions."
    export_posture:
      support_bundle_inclusion: metadata_only
      evidence_packet_inclusion: excluded
      profile_export_inclusion: alias_only
    audit_minimum_event_ids:
      - secret_handle_issued
      - secret_handle_revoked
      - secret_projection_used
      - secret_projection_failed
      - secret_denial
      - secret_trust_store_unlocked
      - secret_trust_store_locked
    default_redaction_classes:
      - logs_local
      - traces_local
      - support_bundle
      - recipe_manifest
      - profile_export
      - mutation_journal_entry
      - save_manifest
    fallback_posture:
      session_memory_cache_allowed: true
      plaintext_file_allowed: false
      notes:
        - "Session-only fallback admits sign-only and decrypt-only projection; never raw private bytes."

  - record_kind: secret_class_row
    secret_schema_version: 1
    secret_class: client_certificate
    description: >
      mTLS client certificates and matching private keys, plus
      smartcard references. Referenced by the transport adapter;
      sign-only projection; raw private-key bytes never revealed.
    preferred_trust_store_classes:
      - platform_agent
      - os_keychain
      - hsm_or_kms_backed
    permitted_trust_store_classes:
      - platform_agent
      - os_keychain
      - hsm_or_kms_backed
      - session_memory_cache
    default_projection_modes:
      - alias_only
      - broker_callback
      - sign_only
      - decrypt_only
      - inspect_metadata
    reference_set:
      - first_party_transport_adapter
      - doctor_probe
      - support_exporter
    reveal_set: []
    reveal_posture:
      raw_reveal_default: sign_only_metadata_reveal
      reveal_on_demand_allowed: false
      notes:
        - "UI reveal surfaces subject, issuer, fingerprint, and expiry only."
    export_posture:
      support_bundle_inclusion: metadata_only
      evidence_packet_inclusion: signature_only
      profile_export_inclusion: alias_only
    audit_minimum_event_ids:
      - secret_handle_issued
      - secret_handle_revoked
      - secret_projection_used
      - secret_projection_failed
      - secret_denial
    default_redaction_classes:
      - logs_local
      - traces_local
      - support_bundle
      - recipe_manifest
      - profile_export
      - mutation_journal_entry
      - save_manifest
    fallback_posture:
      session_memory_cache_allowed: true
      plaintext_file_allowed: false
      notes:
        - "Session-only fallback admits sign-only projection only."

  - record_kind: secret_class_row
    secret_schema_version: 1
    secret_class: signing_key_material
    description: >
      Release signing keys, notarization credentials, and SBOM signers.
      Referenced only by the signing runner or HSM / KMS adapter.
      Material never user-exported and never placed in the session-
      memory fallback; signing without a strong store is denied.
    preferred_trust_store_classes:
      - hsm_or_kms_backed
    permitted_trust_store_classes:
      - hsm_or_kms_backed
    default_projection_modes:
      - alias_only
      - broker_callback
      - sign_only
      - decrypt_only
      - inspect_metadata
    reference_set:
      - first_party_signing_runner
      - doctor_probe
      - support_exporter
    reveal_set: []
    reveal_posture:
      raw_reveal_default: sign_only_metadata_reveal
      reveal_on_demand_allowed: false
      notes:
        - "Signing-class secrets never reveal; signing surfaces return a signature, not the key."
    export_posture:
      support_bundle_inclusion: signed_proof_only
      evidence_packet_inclusion: signature_only
      profile_export_inclusion: excluded
    audit_minimum_event_ids:
      - secret_handle_issued
      - secret_handle_revoked
      - secret_projection_used
      - secret_projection_failed
      - secret_denial
      - secret_rotation_started
      - secret_rotation_completed
      - secret_rotation_failed
    default_redaction_classes:
      - logs_local
      - traces_local
      - support_bundle
      - evidence_packet
      - recipe_manifest
      - profile_export
      - mutation_journal_entry
      - save_manifest
    fallback_posture:
      session_memory_cache_allowed: false
      plaintext_file_allowed: false
      notes:
        - "No signing without hsm_or_kms_backed; session fallback is forbidden for this class (session_fallback_class_forbidden)."

  - record_kind: secret_class_row
    secret_schema_version: 1
    secret_class: provider_session
    description: >
      Refresh tokens and delegated collaboration / remote session
      tokens. Reference limited to the first-party session store;
      rotation is broker-internal and never user-visible.
    preferred_trust_store_classes:
      - os_keychain
      - enterprise_vault_adapter
    permitted_trust_store_classes:
      - os_keychain
      - enterprise_vault_adapter
      - managed_policy_injector
      - session_memory_cache
    default_projection_modes:
      - alias_only
      - broker_callback
      - token_exchange
      - inspect_metadata
    reference_set:
      - first_party_session_store
      - doctor_probe
      - support_exporter
    reveal_set: []
    reveal_posture:
      raw_reveal_default: denied
      reveal_on_demand_allowed: false
      notes:
        - "Session / refresh tokens never reveal through the UI; rotation is broker-internal."
    export_posture:
      support_bundle_inclusion: metadata_only
      evidence_packet_inclusion: excluded
      profile_export_inclusion: alias_only
    audit_minimum_event_ids:
      - secret_handle_issued
      - secret_handle_renewed
      - secret_handle_revoked
      - secret_handle_expired
      - secret_projection_used
      - secret_rotation_started
      - secret_rotation_completed
      - secret_rotation_failed
      - secret_denial
    default_redaction_classes:
      - logs_local
      - traces_local
      - support_bundle
      - profile_export
      - mutation_journal_entry
      - save_manifest
    fallback_posture:
      session_memory_cache_allowed: true
      plaintext_file_allowed: false
      notes:
        - "Session-only fallback re-prompts; degraded posture carries visible badge."

  - record_kind: secret_class_row
    secret_schema_version: 1
    secret_class: device_secret
    description: >
      Device-binding keys, recovery tokens, and passkey / WebAuthn
      credential references. Referenced by the platform adapter;
      reveal denied; sign-only or platform-mediated use only.
    preferred_trust_store_classes:
      - platform_agent
      - os_keychain
      - hsm_or_kms_backed
    permitted_trust_store_classes:
      - platform_agent
      - os_keychain
      - hsm_or_kms_backed
    default_projection_modes:
      - alias_only
      - broker_callback
      - sign_only
      - inspect_metadata
    reference_set:
      - first_party_platform_adapter
      - doctor_probe
      - support_exporter
    reveal_set: []
    reveal_posture:
      raw_reveal_default: denied
      reveal_on_demand_allowed: false
      notes:
        - "Device secrets never reveal; use is platform-mediated."
    export_posture:
      support_bundle_inclusion: metadata_only
      evidence_packet_inclusion: excluded
      profile_export_inclusion: excluded
    audit_minimum_event_ids:
      - secret_handle_issued
      - secret_handle_revoked
      - secret_projection_used
      - secret_projection_failed
      - secret_denial
    default_redaction_classes:
      - logs_local
      - traces_local
      - support_bundle
      - profile_export
      - mutation_journal_entry
      - save_manifest
    fallback_posture:
      session_memory_cache_allowed: false
      plaintext_file_allowed: false
      notes:
        - "Device secrets never serve from the session fallback; unavailable platform authority denies use (session_fallback_class_forbidden)."

  - record_kind: secret_class_row
    secret_schema_version: 1
    secret_class: ephemeral_operation_token
    description: >
      Operation-scoped tokens minted by token-exchange flows. Referenced
      only by the operation's consumer; reveal denied; expiry tied to
      the operation's deadline.
    preferred_trust_store_classes:
      - session_memory_cache
    permitted_trust_store_classes:
      - session_memory_cache
      - managed_policy_injector
    default_projection_modes:
      - alias_only
      - broker_callback
      - request_header_signer
      - inspect_metadata
    reference_set:
      - first_party_adapter
      - first_party_registry_adapter
      - first_party_connection_broker
      - first_party_signing_runner
      - remote_agent
    reveal_set: []
    reveal_posture:
      raw_reveal_default: denied
      reveal_on_demand_allowed: false
      notes:
        - "Ephemeral tokens never reveal; their lifetime is the operation's."
    export_posture:
      support_bundle_inclusion: metadata_only
      evidence_packet_inclusion: metadata_only
      profile_export_inclusion: excluded
    audit_minimum_event_ids:
      - secret_handle_issued
      - secret_handle_expired
      - secret_projection_used
      - secret_denial
    default_redaction_classes:
      - logs_local
      - traces_local
      - support_bundle
      - mutation_journal_entry
      - save_manifest
    fallback_posture:
      session_memory_cache_allowed: true
      plaintext_file_allowed: false
      notes:
        - "Ephemeral tokens live in the session memory cache by design; they do not persist."
