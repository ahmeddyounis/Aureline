# Secret broker, credential-handle, trust-store, and redaction-default
# tradeoff rows.
#
# Machine-readable tradeoff table backing ADR 0007
# (docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md).
# Each row names one decision axis, what the chosen secret-broker /
# trust-store / projection / redaction posture commits to, the rejected
# alternative that came closest, why the chosen posture wins on that
# axis, and the observable signal that would force the row to reopen.
# Tooling (secret-broker crate, provider / registry / database / remote-
# agent adapters, signing runner, AI lane, importer, support-bundle
# exporter, evidence-packet lane, crash reporter, mutation-journal
# lane, review / replay, governance packets) may read these rows to
# avoid inventing parallel vocabulary for the same tradeoff.
#
# Scope rules:
#   - Every row MUST name an axis, a chosen_stack summary, a
#     best_rejected_alternative, at least one supporting
#     source_anchor, and at least one reopen_trigger.
#   - adr_source is the canonical human-readable form. If tooling and
#     the ADR disagree, the ADR wins and this file must be updated in
#     the same change.
#   - Do not re-litigate a rejected alternative by editing its row;
#     open a new decision row instead (see ADR 0007's "Consequences"
#     and "Alternatives considered" sections).

schema_version: 1

adr_source: docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md
decision_id: D-0013
decision_register: artifacts/governance/decision_index.yaml

# -----------------------------------------------------------------------------
# Axis vocabulary.
#
# Every row's `axis` field MUST be one of these. A new axis requires a
# schema bump and a note on the ADR.
# -----------------------------------------------------------------------------
axes:
  - handle_vs_raw_material
  - trust_store_authority
  - plaintext_fallback_posture
  - projection_modes
  - redaction_default_posture
  - reveal_on_demand
  - denial_vs_silent_downgrade
  - audit_surface
  - process_boundary_transport
  - schema_discipline

# -----------------------------------------------------------------------------
# Severity vocabulary for reopen triggers. `blocker` forces a new
# decision row on sight; `watch` logs a row for shiproom review.
# -----------------------------------------------------------------------------
reopen_severity_levels:
  - blocker
  - watch

# -----------------------------------------------------------------------------
# Rows.
# -----------------------------------------------------------------------------
rows:
  - axis: handle_vs_raw_material
    chosen_stack:
      summary: >
        Typed credential_handle values cross every boundary the product
        manipulates (RPC, manifests, recipes, logs, mutation journal,
        save manifests, support bundles). Raw secret material lives
        only inside the broker and inside a narrowly-scoped projection
        target. Handles carry handle_id, secret_class, consumer_identity,
        operation_class, target_ref, workspace_scope, projection_mode,
        issued_at, expires_at, approval_ticket_ref, policy_context,
        source_trust_store, and redaction_class.
      commits:
        - only the broker may mint a credential_handle
        - raw secret bytes MUST NOT cross the RPC boundary
        - handles are safe on RPC, in manifests, in recipes, in logs
        - profiles and recipes reference aliases, not handles
        - handle revocation propagates through a typed event; in-flight
          operations fail closed with secret_handle_revoked
    best_rejected_alternative:
      summary: >
        Pass the raw token directly wherever a function needs it;
        treat secrets as ordinary string arguments.
      rejection_reason: >
        Direct passing leaks raw material into RPC frames, structured
        logs, trace attributes, recipe manifests, sync exports, crash
        dumps, and terminal transcripts. A redaction pass that runs
        after raw material already reached a sink is an apology, not
        a control.
    why_chosen_wins: >
        The handle shape is what keeps raw material inside the broker
        while still letting every consumer read it through a narrow
        projection. Every later lane (provider, registry, database,
        remote, signing, AI, importer) reuses the same handle shape
        instead of inventing its own "token wrapper".
    source_anchors:
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 4378"
        quote: "22.11 Secret broker, credential-handle, and vault-integration architecture"
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 4392"
        quote: "integrations request typed handles carrying scope, consumer identity, operation class, target, workspace, expiry, and allowed projection"
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 4391"
        quote: "raw secret values never land in repo files, portable profiles, workspace state, query history, recipe exports, telemetry, crash dumps, or support bundles by default"
    protected_hot_path_hooks:
      - secret_handle_issued
      - secret_handle_revoked
      - secret_projection_used
    reopen_triggers:
      - id: raw_material_leaked_on_rpc
        severity: blocker
        description: >
          A finding that raw secret bytes traversed the RPC boundary
          (even transiently) invalidates the handle contract and
          forces this row to reopen with a stronger boundary guard.
      - id: handle_field_gap
        severity: watch
        description: >
          A lane requests a handle attribute that the frozen field
          set cannot express without misclassification; the row
          reopens to extend the handle envelope.

  - axis: trust_store_authority
    chosen_stack:
      summary: >
        Six frozen trust-store classes with preferred-to-fallback
        ordering: os_keychain, enterprise_vault_adapter, platform_agent,
        hsm_or_kms_backed, session_memory_cache (fallback only),
        managed_policy_injector. The broker selects the strongest
        authority the host can provide, records the selection, and
        degrades visibly when the preferred class is unavailable.
      commits:
        - os_keychain preferred for user-class secrets on desktop
        - enterprise_vault_adapter preferred for managed-mode tenants
        - platform_agent preferred for SSH / client-cert / device
        - hsm_or_kms_backed required for signing-class secrets
        - session_memory_cache is a degraded fallback with a visible
          non-dismissable surface badge and a re-prompt on next start
        - managed_policy_injector mints an ephemeral credential at call
          time; it is never a long-lived store
    best_rejected_alternative:
      summary: >
        Collapse to a single store (always the OS keychain) and treat
        every other authority as out of scope until asked.
      rejection_reason: >
        Enterprise tenants need a vault adapter, signing flows need
        HSM / KMS, SSH and smartcard flows need agent projection, and
        managed-mode provisioning needs a policy injector. A single
        store forces every flow through a surface that cannot express
        the right unlock model, and the resulting side channels
        re-introduce plaintext.
    why_chosen_wins: >
        The six-class taxonomy matches the four distinct unlock models
        (platform, enterprise, agent, service-mediated) and reserves
        space for the ephemeral and injected cases. Surfaces show the
        active store class and unlock state; support tooling quotes
        them verbatim.
    source_anchors:
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 4390"
        quote: "Broker rules"
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 8783"
        quote: "Appendix BT - Secret Broker, Vault, and Credential-Handle Matrix"
    protected_hot_path_hooks:
      - secret_trust_store_unlocked
      - secret_trust_store_locked
      - secret_trust_store_degraded
      - secret_trust_store_recovered
    reopen_triggers:
      - id: trust_store_class_gap
        severity: blocker
        description: >
          A host class has a legitimate secure-store authority that
          cannot honestly classify as any of the six classes without
          misattribution; the row reopens to extend the taxonomy.
      - id: unlock_state_gap
        severity: watch
        description: >
          A platform expresses an unlock posture the six frozen
          unlock states cannot describe; the row reopens to extend
          the unlock-state set.

  - axis: plaintext_fallback_posture
    chosen_stack:
      summary: >
        Long-lived secrets MUST NOT be written to a plaintext file or
        injected into persistent environment state by the broker. The
        only acceptable fallback when a secure store is unavailable is
        session_memory_cache with the degraded_session_only unlock
        state: process-local, in-memory, session-only, re-prompt on
        next start, visible surface badge, forbidden for signing-class.
      commits:
        - plaintext_file_allowed is false for every secret class
        - degraded_session_only never silently upgrades to persistent
          storage when a store returns
        - degraded_session_only expires on process exit, trust-state
          change, policy-epoch roll, or explicit user lock
        - degraded_session_only forbidden for signing_key_material,
          device_secret, and provider_session
    best_rejected_alternative:
      summary: >
        Accept a plaintext fallback config file (with restrictive
        permissions) when no store is available, so the user can
        keep working across restarts.
      rejection_reason: >
        Plaintext-on-disk is the primary leak path for developer-tool
        secrets: backup providers, file-sync, support-bundle defaults,
        shell-history accidents, misconfigured dotfile repos, and
        accidental commit. "Restrictive permissions" is a posture, not
        a boundary; the file is still copyable, exportable, and
        scannable.
    why_chosen_wins: >
        The session-only fallback keeps the user working without the
        leak and forces a visible re-prompt every session. The broker
        can truthfully answer "where does this secret live" with a
        memory-only answer; support bundles cannot leak a plaintext
        file that does not exist.
    source_anchors:
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 4528"
        quote: "if the OS keychain or trust store is unavailable, Aureline degrades visibly and safely rather than falling back to plaintext secret storage"
    protected_hot_path_hooks:
      - secret_trust_store_degraded
      - secret_trust_store_recovered
    reopen_triggers:
      - id: plaintext_fallback_observed
        severity: blocker
        description: >
          A finding that a plaintext-file fallback was written under
          any codepath invalidates the invariant and forces the row
          to reopen with a stronger boundary guard and a recall plan.
      - id: session_fallback_expiry_gap
        severity: watch
        description: >
          A legitimate expiry trigger is discovered that the four
          frozen expiry conditions do not cover; the row reopens to
          extend the expiry set.

  - axis: projection_modes
    chosen_stack:
      summary: >
        Twelve frozen projection modes: alias_only (default),
        broker_callback, request_header_signer, ephemeral_fd,
        bounded_mount, env_var_isolated_child (last resort, isolated
        child only), sign_only, decrypt_only, token_exchange,
        policy_materialised, inspect_metadata, reveal_on_demand.
        Any projection that cannot name one of these modes is
        rejected with projection_denied_unsupported_mode.
      commits:
        - alias_only is the default on all shareable surfaces
        - env_var_isolated_child never inherits into parent process,
          never persists in support bundles, never inherits into
          unrelated children
        - sign_only and decrypt_only never return raw private bytes
        - bounded_mount is tmpfs-class and lifetime-bound to the
          operation
        - ephemeral_fd is short-lived and anonymous where supported
        - reveal_on_demand is the only user-visible raw-reveal surface
    best_rejected_alternative:
      summary: >
        Let any consumer ask for the raw value "if it needs it"; fall
        back to an environment variable when no better option exists.
      rejection_reason: >
        Unbounded projection and ambient env injection are the leading
        support-bundle and log-leak class. Env inheritance travels into
        crash dumps, child processes, terminal captures, and unrelated
        spawned processes. "If it needs it" is the sentence that
        precedes every retrospective.
    why_chosen_wins: >
        The enumerated modes each name the guard (isolated child,
        tmpfs mount, sign-only, token exchange) that keeps raw
        material inside a boundary, and the broker can refuse the
        thirteenth mode because the thirteenth mode does not exist.
    source_anchors:
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 4394"
        quote: "environment injection is least-visibility by default"
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 8797"
        quote: "BT.2 Handle projection matrix"
    protected_hot_path_hooks:
      - secret_projection_used
      - secret_projection_failed
    reopen_triggers:
      - id: projection_mode_gap
        severity: blocker
        description: >
          A legitimate consumer cannot accept any of the twelve modes
          without losing correctness; the row reopens to extend the
          mode set with a declared guard rule.
      - id: env_projection_leak
        severity: blocker
        description: >
          env_var_isolated_child material is observed escaping its
          isolated child (into a support bundle, a crash dump, or an
          unrelated process); the row reopens to narrow the mode or
          remove it entirely.

  - axis: redaction_default_posture
    chosen_stack:
      summary: >
        Declared redaction class per surface; the default excludes raw
        material. Every surface that emits observable state names one
        of fourteen frozen surface classes (logs_local, traces_local,
        support_bundle, evidence_packet, ai_context_capture,
        recipe_manifest, profile_export, sync, crash_dump,
        mutation_journal_entry, save_manifest,
        replay_or_timeline_capture, terminal_transcript,
        clipboard_projection) and inherits that surface's frozen
        default posture. Overrides narrow collection; they do not
        widen it. Per-surface posture detail lives in
        artifacts/security/redaction_posture_matrix.yaml.
      commits:
        - raw secret bytes never included in logs, traces, support
          bundles, evidence packets, mutation-journal entries, save
          manifests, replay captures, or profile / sync exports
        - "env-var names included in bundles with values redacted to
          '[redacted: <class>]'; admin policy MAY widen env capture
          for a narrow allowlist but values stay redacted"
        - signing-class projection payloads excluded entirely from
          bundles; release evidence flows through evidence-packet
          surface instead
        - recipe / profile surfaces carry alias references only; raw
          literals forbidden on protected recipe surfaces
    best_rejected_alternative:
      summary: >
        Include everything; let the user redact at upload / submission
        time using a preview-and-remove flow.
      rejection_reason: >
        The preview flow is a secondary control at best and imposes an
        unrealistic review burden under time pressure (bug reports,
        incident submissions). Users cannot reliably identify which
        lines carry secret-shape material, especially across log
        interpolations and binary blobs. Collection-time exclusion is
        the primary control.
    why_chosen_wins: >
        Every export surface inherits its redaction class without
        restating it. Support and diagnostics tasks mechanically
        inherit the posture: if the surface is support_bundle, the
        class is metadata_only for broker state and class_only for
        secret references; no per-bundle review policy needed.
    source_anchors:
      - doc: .t2/docs/Aureline_PRD.md
        anchor: "line 3069"
        quote: "10.22 Diagnostic data classes and support-bundle redaction"
      - doc: .t2/docs/Aureline_PRD.md
        anchor: "line 3078"
        quote: "Secret-bearing / high risk ... never included by default; inclusion requires explicit, high-friction opt-in or is prohibited by policy"
      - doc: .t2/docs/Aureline_PRD.md
        anchor: "line 4085"
        quote: "Support bundles or diagnostics leak sensitive data ... default redaction, and high-friction inclusion for risky payloads"
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 8807"
        quote: "BT.3 Default redaction boundaries"
    protected_hot_path_hooks:
      - secret_export_redaction_applied
    reopen_triggers:
      - id: redaction_class_gap
        severity: blocker
        description: >
          A surface cannot honestly name any of the fourteen redaction
          classes without misattribution; the row reopens to extend
          the class set.
      - id: override_widened_silently
        severity: blocker
        description: >
          An override is observed widening collection beyond a class's
          frozen rule without a declared policy bundle; the row
          reopens to close the widening path.

  - axis: reveal_on_demand
    chosen_stack:
      summary: >
        Per-handle, user-initiated, high-friction reveal affordance
        with bounded UI buffer, short class-specific timeout, audible /
        visible indicator, session-ephemeral material (never logged /
        traced / bundled), bounded clipboard lifetime with
        clear-on-timeout, OSC-52 / remote-clipboard denied by default.
        Reveal denied for signing_key_material, device_secret,
        provider_session, ephemeral_operation_token; reveal for
        ssh_key_material and client_certificate surfaces fingerprint
        or public key only.
      commits:
        - reveal requires approval_ticket_ref and fresh re-auth where
          policy requires step-up
        - bulk reveal forbidden; reveal is per-handle only
        - AI agents, extensions, recipes, and remote sessions MUST
          NOT trigger reveal on the user's behalf
        - every reveal emits secret_reveal_started and _ended audit
          events; every clipboard projection emits
          secret_clipboard_projected and _cleared
    best_rejected_alternative:
      summary: >
        Always-on reveal in the developer UI so power users can see
        raw values whenever they need them.
      rejection_reason: >
        Always-on reveal normalises raw material on screen, in
        recordings, in screenshots, in shared-screen demos, and in
        support-ticket attachments. The posture leaks without anyone
        doing anything wrong.
    why_chosen_wins: >
        Per-handle, user-initiated, bounded reveal keeps the power-user
        path (copy an AI key into a sibling tool once) without
        flattening the posture for everyone. The bounded-clipboard +
        audit-event shape gives incident response a clean trail.
    source_anchors:
      - doc: .t2/docs/Aureline_PRD.md
        anchor: "line 3078"
        quote: "explicit, high-friction opt-in or is prohibited by policy"
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 4391"
        quote: "raw secret values never land in repo files, portable profiles, workspace state, query history, recipe exports, telemetry, crash dumps, or support bundles by default"
    protected_hot_path_hooks:
      - secret_reveal_started
      - secret_reveal_ended
      - secret_clipboard_projected
      - secret_clipboard_cleared
    reopen_triggers:
      - id: reveal_on_recording
        severity: blocker
        description: >
          A reveal is observed landing in a screen recording, a
          screenshot attached to a support ticket, or a session
          capture; the row reopens to narrow the reveal surface or
          disable reveal entirely on that class.
      - id: clipboard_timeout_gap
        severity: watch
        description: >
          The class-specific clipboard timeouts do not cover a
          legitimate consumer class; the row reopens to calibrate the
          timeouts per class.

  - axis: denial_vs_silent_downgrade
    chosen_stack:
      summary: >
        Fail closed with a typed denial reason from the frozen set of
        fifteen codes (secret_handle_unknown, secret_handle_revoked,
        secret_handle_expired, trust_store_locked, trust_store_unavailable,
        step_up_required, approval_ticket_missing, policy_denied_projection,
        projection_denied_unsupported_mode, projection_denied_class_rule,
        consumer_capability_mismatch, trust_state_downgraded,
        ai_tool_reveal_denied, remote_broker_scope_mismatch,
        session_fallback_class_forbidden). Every denial emits a
        secret_denial audit event.
      commits:
        - denials never silently retry
        - denials never downgrade projection to a weaker mode
        - surfaces show a typed denial reason and a repair affordance
          (unlock, re-auth, approval, re-acquire)
        - deadline_exceeded and cancelled denial posture mirrors the
          ADR-0004 error taxonomy's no-rewrite rule
    best_rejected_alternative:
      summary: >
        Downgrade to a weaker projection (for example, from sign_only
        to env_var_isolated_child) when the stronger mode is
        unavailable, to keep the workflow moving.
      rejection_reason: >
        Silent downgrade turns a refusal into a leak. Falling back
        from sign_only to env silently ships a signing key into a
        child process; falling back from broker_callback to raw bytes
        defeats the broker's only value. Denial must be visible,
        typed, and auditable.
    why_chosen_wins: >
        Typed denial with a visible repair path gives the user an
        auditable posture ("my operation was refused; here is why;
        here is how to unblock") without normalising the leak. The
        fifteen-code set maps directly to the ADR-0004 error
        taxonomy's policy class.
    source_anchors:
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 4390"
        quote: "Broker rules"
    protected_hot_path_hooks:
      - secret_denial
      - secret_projection_failed
    reopen_triggers:
      - id: denial_reason_gap
        severity: blocker
        description: >
          A legitimate denial case cannot honestly classify as any of
          the fifteen reasons without misattribution; the row reopens
          to extend the denial set.
      - id: silent_downgrade_observed
        severity: blocker
        description: >
          A silent downgrade is observed from any projection mode to
          any weaker mode; the row reopens to close the downgrade
          path.

  - axis: audit_surface
    chosen_stack:
      summary: >
        Structured SecretEvent stream with twenty-four frozen event
        ids (handle issued / renewed / revoked / expired, projection
        used / failed, denial, reveal started / ended, clipboard
        projected / cleared, trust-store unlocked / locked / degraded
        / recovered, rotation started / completed / failed, import
        mapped, export redaction applied, policy epoch rolled, remote
        broker attached / detached, broker health changed). Events
        carry actor, handle id, alias, class, consumer id, target
        ref, projection mode, unlock state, approval-ticket ref,
        trust state, and typed reason; events MUST NOT carry raw
        secret bytes.
      commits:
        - every observable broker action emits exactly one event id
        - support tooling subscribes under inspect_metadata only
        - free-form string interpolation of handles into log bodies
          is forbidden on protected surfaces
    best_rejected_alternative:
      summary: >
        Free-form log strings in each lane; each lane interpolates
        what it needs into its own log format.
      rejection_reason: >
        Free-form interpolation routinely interpolates handles,
        tokens, or headers into log bodies and bypasses the redaction
        pass. Different lanes emit different field names for the
        same concept (handle_id vs token_id vs secret_ref), and
        support tools cannot join them. Every post-hoc redactor
        starts by re-building the vocabulary this row names.
    why_chosen_wins: >
        The structured event stream keeps every lane on one
        vocabulary and one redaction pass. Support tooling quotes
        event ids directly; dashboards pivot on them; incident
        response finds the reveal / denial / rotation trail without
        grepping free-form strings.
    source_anchors:
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 4611"
        quote: "secret-broker, vault-adapter, and handle-issuance state"
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 4653"
        quote: "secret-broker authority classes, handle failure codes, and vault-adapter health"
    protected_hot_path_hooks:
      - secret_handle_issued
      - secret_handle_revoked
      - secret_projection_used
      - secret_denial
      - secret_export_redaction_applied
    reopen_triggers:
      - id: audit_event_gap
        severity: blocker
        description: >
          A legitimate observable broker action cannot honestly
          classify as any of the twenty-four event ids without
          misattribution; the row reopens to extend the event id
          set.
      - id: free_form_interpolation_observed
        severity: blocker
        description: >
          Free-form handle interpolation is observed in a protected
          lane's log output; the row reopens to narrow the
          interpolation path and strengthen the lint.

  - axis: process_boundary_transport
    chosen_stack:
      summary: >
        Raw secret bytes MUST NOT cross an RPC boundary. Handle
        references, aliases, and capability-scoped exchange tokens
        cross; projection resolves at the narrowest side. The broker
        runs in the host process with the strongest trust-store
        authority; remote-agent brokers carry an attach-time
        broker_scope and MAY NOT serve handles bound to the host
        workspace or to a different agent scope. Extension processes
        and untrusted child processes MUST NOT receive raw secret
        material unless a projection mode explicitly permits it and
        the handle's consumer_identity names the extension's
        capability hash. AI tool calls receive handles or aliases
        only.
      commits:
        - crash dumps and core files MUST NOT inherit projected env
          by default; env projection uses env_var_isolated_child
          with coredump redaction enabled on supported platforms
        - mutation-journal entries and save manifests name class,
          alias, and approval-ticket ref; never raw bytes / headers
          / env-var values
        - ai_tool_reveal_denied denial on any AI tool call that
          requests raw secret bytes
    best_rejected_alternative:
      summary: >
        Allow a controlled window for raw secret material to cross
        the RPC boundary when both ends are in the same trust
        domain.
      rejection_reason: >
        "Same trust domain" is a claim; RPC frames are observable on
        the wire (TLS termination logs, tracing middleware, recording
        proxies, crashed middleware dumps). The only honest posture
        is that raw material never leaves the broker process.
    why_chosen_wins: >
        Keeping raw material inside the broker process collapses an
        entire class of leak paths (middleware logging, tracing
        sidecars, recording proxies, broker / agent restart races).
        Handles cross cheaply; raw bytes do not cross at all.
    source_anchors:
      - doc: .t2/docs/Aureline_Technical_Architecture_Document.md
        anchor: "line 4391"
        quote: "raw secret values never land in repo files, portable profiles, workspace state, query history, recipe exports, telemetry, crash dumps, or support bundles by default"
    protected_hot_path_hooks:
      - secret_broker_remote_attached
      - secret_broker_remote_detached
      - secret_broker_health_changed
    reopen_triggers:
      - id: rpc_raw_transit
        severity: blocker
        description: >
          Raw secret bytes are observed crossing any RPC / IPC
          boundary the broker serves; the row reopens with a recall
          and a stronger boundary guard.
      - id: remote_scope_bleed
        severity: blocker
        description: >
          A remote-agent broker is observed serving handles outside
          its attach-time broker_scope; the row reopens to narrow
          the scope contract and fail closed on scope mismatch.

  - axis: schema_discipline
    chosen_stack:
      summary: >
        Rust types in the eventual secret-broker crate are the source
        of truth. The JSON Schema export at
        schemas/security/secret_class_rows.schema.json is the
        cross-tool boundary. No external IDL or codegen toolchain at
        this milestone. Mirrors ADR 0004, ADR 0005, ADR 0006.
      commits:
        - the schema is additive-minor to extend and breaking to
          repurpose
        - the schema enforces plaintext_file_allowed = false as a
          const field for every secret class
        - adding a class / trust-store class / projection mode /
          denial reason / audit event id is a schema bump
        - repurposing any existing value opens a new decision row
    best_rejected_alternative:
      summary: >
        Adopt an external IDL + generator for handle / projection
        payloads so the public SDK boundary is stable from day one.
      rejection_reason: >
        Same argument ADR 0004, ADR 0005, and ADR 0006 make - an
        IDL without a second-language consumer costs more than it
        buys at the foundations milestone; the JSON Schema export
        reserves the integration point for when a second-language
        consumer actually lands.
    why_chosen_wins: >
        Rust types stay the source of truth; every cross-tool
        boundary quotes the published schema; the broker crate, the
        provider / registry / database / remote / signing / AI /
        importer / support-export / crash / mutation-journal /
        review / replay lanes all consume one file.
    source_anchors:
      - doc: docs/adr/0004-rpc-transport-and-schema-toolchain.md
        anchor: "schema discipline section"
        quote: "Rust types are the source of truth; the JSON Schema export is the cross-tool boundary"
      - doc: docs/adr/0006-vfs-save-cache-identity.md
        anchor: "schema discipline axis"
        quote: "No external IDL or code-generator toolchain at this milestone"
    protected_hot_path_hooks: []
    reopen_triggers:
      - id: second_language_consumer_lands
        severity: watch
        description: >
          A second-language consumer of the secret-broker boundary
          schema lands (an extension host surface, a public SDK
          prototype, a remote-agent SDK); the row reopens to
          evaluate an IDL + codegen toolchain against the accumulated
          cross-language cost.
      - id: plaintext_const_breach
        severity: blocker
        description: >
          A schema change proposes relaxing plaintext_file_allowed
          from const false to a variable field; the row reopens with
          a blocker and a threat model before the schema can ship.
