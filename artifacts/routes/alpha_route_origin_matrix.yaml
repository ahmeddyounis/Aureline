# Alpha route-origin matrix for externalized and route-sensitive rows.
#
# This is the canonical machine-readable route/origin packet for the
# alpha support/export lane. Product UI, Help/About, CLI explain output,
# support bundles, incident packets, and release evidence cite these
# tokens rather than minting surface-local route words.

