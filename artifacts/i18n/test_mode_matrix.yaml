      - mixed_direction_technical_content
    locale_tags:
      - ar-IQ
      - he-IL
    surface_groups:
      - shell_workspace_launcher
      - palette_search
      - docs_reader
      - diff_review
      - terminal_output
      - sign_in_and_trust_prompt
      - dense_collection_batch_review
    related_accessibility_locale_row_refs:
      - locale.shared.rtl_mixed_direction_technical_content
    design_rule_refs:
      - rtl.directional_chrome_mirrors_not_literal_tokens
      - rtl.focus_order_tracks_visual_order
      - truncation.high_importance_full_text_route
      - state_labels.scope_severity_action_preserved
    m0_state: degraded
    m0_scope_summary: >
      Directional chrome must mirror correctly and mixed-direction
      technical content must remain copy-safe, but a fully localized RTL
      shell is not yet a defended M0 claim.
    m1_state: claimed
    m1_scope_summary: >
      Launch-critical chrome, docs/help, diff, terminal, and palette
      flows must pass the RTL and mixed-direction suite before broader
      localized-shell claims can widen.
    expected_failure_class_refs:
      - mirrored_icon_or_drawer_order_error
      - ltr_technical_string_mirrored
      - bidi_copy_drift
      - focus_order_regression
      - source_language_escape_hatch_missing
    harness_row_refs:
