# Locale and input-method readiness matrix seed.
#
# Machine-readable source of truth for the M0/M1 locale, layout, and
# input-method baseline. This file complements
# artifacts/accessibility/platform_input_matrix.yaml:
#   - platform_input_matrix.yaml freezes platform-specific AT, locale,
#     and input-path rows.
#   - this matrix freezes cross-surface readiness rows, phase posture,
#     design-rule ids, and harness joins for pseudoloc, RTL/bidi, CJK,
#     IME, dead keys, AltGr, compose, emoji, and fallback continuity.
#
# Rules.
#   - Every readiness row MUST name an M0 and M1 state using the closed
#     readiness-state vocabulary below.
#   - support_class expresses scope breadth and may not be used as a
#     substitute for the explicit phase state.
#   - blocked and unclaimed rows stay explicit so shell, docs, support,
#     and release packets do not infer support by omission.
#   - Dense-surface coverage is required for pseudoloc, RTL, CJK, and
#     IME rows; simple-form-only coverage is non-conforming.

