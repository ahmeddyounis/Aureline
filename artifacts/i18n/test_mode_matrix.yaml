      - input.windows.tsf_primary
      - input.linux.ibus_gnome
    design_rule_refs:
      - font.system_fallback_chain_visible
      - input.composition_keeps_caret_visible
    m0_state: claimed
    m0_scope_summary: >
      Emoji entry survives insertion, fallback, and adjacent-text
      preservation on launch-critical text-entry surfaces.
    m1_state: claimed
    m1_scope_summary: >
      The same emoji behavior extends to broader host-owned text-entry
      surfaces without changing fallback semantics.
    expected_failure_class_refs:
