  - claimed_narrow
  - best_effort
  - unclaimed

readiness_state_vocabulary:
  - claimed
  - degraded
  - blocked
  - unclaimed

readiness_state_meanings:
  - state: claimed
    meaning: >
      The row is inside the defended shell scope for that phase and the
      named harness modes must run before the surface widens.
  - state: degraded
    meaning: >
      A narrow, visible fallback is allowed, but parity is not claimed
      and packets must name the downgrade.
  - state: blocked
    meaning: >
      The product may not imply support. If the row appears in the UI,
      the blocker and safe next route must be explicit.
  - state: unclaimed
    meaning: >
      Outside the defended M0/M1 shell scope. Docs, support, and release
      packets may not imply support.

