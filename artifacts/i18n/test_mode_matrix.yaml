design_rules:
  - rule_id: expansion.chrome_primary_and_state_labels_135
    summary: >
      Launch-critical single-line actions, tabs, section headers, and
      state labels tolerate at least 1.35x source-language width before
      ellipsis or overlap.
  - rule_id: expansion.multiline_reviews_and_banners_160
    summary: >
      Multi-line banners, review summaries, permission sheets, and
      guided steps tolerate at least 1.60x source-language length before
      truncation is considered.
  - rule_id: placeholders.raw_technical_tokens_preserved
    summary: >
      Paths, command ids, flags, hosts, tenants, and counts remain raw
      technical placeholders even when localized prose reorders around
      them.
  - rule_id: rtl.directional_chrome_mirrors_not_literal_tokens
    summary: >
      Directional chrome mirrors, but code spans, terminals, paths,
      hostnames, diffs, and command ids do not.
  - rule_id: rtl.focus_order_tracks_visual_order
    summary: >
      Keyboard and screen-reader traversal still track the visual order
      after mirroring.
  - rule_id: truncation.high_importance_full_text_route
    summary: >
      Approvals, trust prompts, policy blocks, and recovery banners keep
      a full-text route in the same review flow.
  - rule_id: state_labels.scope_severity_action_preserved
    summary: >
      State labels preserve scope, severity, and next-action meaning
      across localization instead of softening into generic status copy.
  - rule_id: font.system_fallback_chain_visible
    summary: >
      Missing glyphs, CJK punctuation, full-width characters, and emoji
      use a visible system fallback chain rather than tofu or silent
      substitution.
  - rule_id: input.composition_keeps_caret_visible
    summary: >
      Candidate windows, inline composition, and the active caret remain
      visible during filtering, overlay changes, and window moves.
  - rule_id: input.multi_cursor_narrows_or_blocks
    summary: >
      Multi-cursor composition narrows to one visible target or blocks
      explicitly when coherent apply is not possible.

readiness_rows:
  - readiness_row_id: readiness.shell.source_language_and_pseudoloc_chrome
    owner_ref: owner.shell_spike
    support_class: claimed
    test_modes:
      - source_language_baseline
      - pseudoloc_expansion
      - locale_fallback_review
    locale_tags:
      - en-US
      - qps-ploc
    surface_groups:
      - shell_workspace_launcher
      - palette_search
      - docs_reader
      - guided_tour_and_onboarding
      - task_run_and_output
      - diff_review
      - sign_in_and_trust_prompt
      - terminal_output
      - dense_collection_batch_review
      - settings_dialogs
    related_accessibility_locale_row_refs:
      - locale.shared.source_and_pseudoloc_shell
    design_rule_refs:
      - expansion.chrome_primary_and_state_labels_135
      - expansion.multiline_reviews_and_banners_160
      - placeholders.raw_technical_tokens_preserved
      - truncation.high_importance_full_text_route
      - state_labels.scope_severity_action_preserved
    m0_state: claimed
    m0_scope_summary: >
      Launch-critical shell, docs/help, review, and trust surfaces must
      render source-language and qps-ploc strings without clipping
      primary actions or hiding fallback state.
    m1_state: claimed
    m1_scope_summary: >
      Editor-adjacent shell chrome, task review, and settings flows stay
      inside the same pseudoloc and fallback baseline; no local override
      vocabulary is allowed.
    expected_failure_class_refs:
      - text_clipped_or_overlap
      - truncation_hides_scope_or_action
      - placeholder_order_drift
      - locale_fallback_hidden
      - translated_state_label_drift
    harness_row_refs:
      - mode.pseudoloc.shell_chrome
      - mode.locale_fallback.row_and_badges

  - readiness_row_id: readiness.shell.rtl_chrome_and_mixed_direction_technical_content
    owner_ref: owner.shell_spike
    support_class: claimed_narrow
    test_modes:
