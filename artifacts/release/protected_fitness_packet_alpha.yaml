# Protected fitness-function review packet for the alpha release-control lane.
#
# This packet is the canonical release-facing projection over the checked-in
# protected fitness catalog, the current hot-path dashboard output, the alpha
# supportability scorecard, and the waiver/freshness fixtures. Consumers should
# read this packet instead of copying dashboard status into release prose.

schema_version: 1
record_kind: protected_fitness_review_packet
packet_id: release.protected_fitness.alpha
packet_revision: 1
packet_state: in_review
as_of: "2026-05-14T00:00:00Z"
owner_dri: "@ahmeddyounis"
evidence_owner: "@ahmeddyounis"
overall_result: evidence_stale
overall_summary: >
  First-paint, input-response, and the save-pipeline timing projection pass on
  the checked-in hot-path dashboard. Warm-start rows have missing observations,
  restore fidelity is still a provisional scenario seed, and the supportability
  scorecard has no measured diagnosis-latency pass yet; the packet therefore
  remains evidence_stale for release widening.

