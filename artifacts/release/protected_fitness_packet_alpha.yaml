  deployment_context:
    - individual_local
  candidate_stage: preview_candidate
  exact_build_identity_ref: artifacts/build/build_identity.json
  exact_build_identity_token: build-id:aureline:dev:0.0.0:unknown:dev:52917c7e2fa0
  review_forum_refs:
    - performance_council
    - release_council
    - security_trust_review
  release_output_refs:
    - output.nightly_benchmark_dashboard
    - output.release_evidence_packet
    - output.support_handoff_packet
  promotion_gate_refs:
    - gate.candidate_envelope
    - gate.public_interface_provenance_and_durability
    - gate.docs_command_route_and_reproducible_release

result_state_vocabulary:
  - passing
  - warning
  - blocked
  - waived
  - waiver_expired
  - evidence_stale
  - provisional

waiver_state_vocabulary:
  - no_active_waiver
  - active_waiver
  - expired_waiver
  - threshold_provisional_pending_council

degrade_rules:
  - rule_id: missing_observation_blocks_passing
    summary: >
      A checked-in dashboard row with missing_observation cannot render as
      passing in this packet, even when the dashboard overall status is PASS.
  - rule_id: pending_measurement_blocks_passing
    summary: >
      A seeded support scorecard with no measured diagnosis-latency pass renders
      evidence_stale until the scenario corpus produces result packets.
  - rule_id: expired_waiver_blocks_passing
    summary: >
      A waiver whose expiry_at is earlier than as_of must render waiver_expired,
      blocked, or evidence_stale; it may not render passing.
  - rule_id: partial_projection_degrades
    summary: >
      A passing CI projection may still render warning when it covers only a
      narrower slice of the protected function contract.

