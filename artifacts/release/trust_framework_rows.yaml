# Supply-chain trust-framework adoption matrix.
#
# Machine-readable companion to
# docs/release/supply_chain_trust_framework_matrix.md. Every row names
# the preferred trust patterns for one artifact family group and the
# deviation policy required when Aureline intentionally does not follow
# that preferred pattern.

schema_version: 1
record_kind: supply_chain_trust_framework_matrix
matrix_id: aureline.supply_chain_trust_framework_matrix
status: seeded

overview_doc_ref: docs/release/supply_chain_trust_framework_matrix.md
exception_schema_ref: schemas/release/provenance_stack_exception.schema.json
artifact_family_map_ref: artifacts/release/artifact_family_map.yaml
release_artifact_graph_ref: docs/release/release_artifact_graph.md
build_farm_policy_ref: docs/release/build_farm_and_remote_cache_policy.md
provenance_baseline_ref: docs/governance/provenance_and_compliance_baseline.md
emergency_distribution_policy_ref: docs/security/emergency_distribution_policy.md
extension_registry_contract_ref: docs/extensions/registry_and_offline_bundle_seed.md
policy_bundle_contract_ref: docs/identity/offline_entitlement_and_policy_seed.md
model_registry_contract_ref: docs/ai/provider_model_registry_contract.md
support_bundle_contract_ref: docs/support/support_bundle_contract.md

artifact_family_group_vocabulary:
  - release_payloads
  - update_metadata
  - extension_distribution_artifacts
  - policy_and_emergency_artifacts
  - docs_and_public_contract_artifacts
  - model_and_ai_artifacts
  - symbol_and_debug_sidecars
  - support_and_release_control_artifacts

trust_pattern_vocabulary:
  - tuf_style_delegated_metadata
  - sigstore_style_identity_backed_signing
  - platform_native_code_signing
  - slsa_style_provenance
  - in_toto_style_attestation
  - spdx_primary_sbom
  - cyclonedx_security_export
  - oci_distribution_or_equivalent_transport
  - content_addressed_identity
  - signed_monotonic_policy_object
  - exact_build_identity_linkage
  - signed_packet_or_digest_pinned_evidence
  - not_applicable

mirror_continuity_vocabulary:
  - origin_digest_and_signature_preserved
  - mirror_may_narrow_not_widen
  - stale_mirror_blocks_widening
  - manual_import_receipt_required
  - offline_bundle_preserves_graph
  - mirror_not_applicable

trust_root_rotation_vocabulary:
  - signed_continuity_statement_required
  - cross_signed_transition_required
  - prior_root_retained_for_declared_overlap
  - break_glass_requires_quorum_and_receipt
  - rotation_not_applicable

emergency_supersedence_vocabulary:
  - signed_successor_manifest_required
  - channel_freeze_or_pause_update_feed
  - revocation_metadata_required
  - kill_switch_or_forced_disable_metadata_required
  - stale_or_superseded_record_remains_visible
  - supersedence_not_applicable

deviation_policy:
  schema_ref: schemas/release/provenance_stack_exception.schema.json
  required_for_any_missing_preferred_pattern: true
  silent_secure_later_bucket_allowed: false
  default_review_forum: security_trust_review
  minimum_required_fields:
    - exception_id
    - owner
    - risk_statement
    - mitigation_plan
    - expiry
    - review_forum
    - compensating_controls

rows:
  - row_id: trust.release_payloads
    artifact_family_group: release_payloads
    status: seeded
    owner_lane: release_evidence
    product_surface_examples:
      - desktop_binary
      - cli_binary
      - sdk_library
      - source_bundle
      - reproducibility_pack
      - sbom
      - signed_attestation
    covered_exact_build_family_classes:
      - ide_binary
      - cli_binary
      - sdk_library
      - source_bundle
      - reproducibility_pack
      - sbom_document
      - signed_attestation
    preferred_trust_patterns:
      - tuf_style_delegated_metadata
      - sigstore_style_identity_backed_signing
      - platform_native_code_signing
      - slsa_style_provenance
      - in_toto_style_attestation
      - spdx_primary_sbom
      - cyclonedx_security_export
      - content_addressed_identity
      - exact_build_identity_linkage
    attestation_expectations:
      - Exact-build identity refs bind source revision, build recipe, input digests, output digests, toolchain, and target platform.
      - Official payloads carry a signed provenance or attestation statement before claim-bearing promotion.
      - SPDX is the primary release SBOM; CycloneDX is emitted when security interchange or enterprise tooling requires it.
      - Clean-room or equivalent reproducibility proof is cited for protected release lanes.
    mirror_continuity:
      - origin_digest_and_signature_preserved
      - mirror_may_narrow_not_widen
      - stale_mirror_blocks_widening
      - offline_bundle_preserves_graph
    trust_root_rotation:
      - signed_continuity_statement_required
      - cross_signed_transition_required
      - prior_root_retained_for_declared_overlap
      - break_glass_requires_quorum_and_receipt
    emergency_supersedence:
      - signed_successor_manifest_required
      - channel_freeze_or_pause_update_feed
      - revocation_metadata_required
      - stale_or_superseded_record_remains_visible
    evidence_inputs:
      - docs/build/exact_build_identity_model.md
      - artifacts/release/provenance_capture_seed.json
      - docs/build/cleanroom_rebuild_lane.md
      - docs/release/release_evidence_packet_template.md
    deviation_requires_exception: true
    release_packet_projection: supply_chain_evidence

  - row_id: trust.update_metadata
    artifact_family_group: update_metadata
    status: seeded
    owner_lane: release_evidence
    product_surface_examples:
      - channel_manifest
      - update_feed_metadata
      - rollback_target
      - install_topology_row
      - revocation_manifest
    covered_exact_build_family_classes: []
    related_control_records:
      - artifacts/release/channel_matrix.yaml
      - artifacts/release/install_topology_matrix.yaml
      - schemas/release/ring_history_packet.schema.json
      - schemas/security/emergency_action_record.schema.json
    preferred_trust_patterns:
      - tuf_style_delegated_metadata
      - sigstore_style_identity_backed_signing
      - content_addressed_identity
      - exact_build_identity_linkage
      - signed_packet_or_digest_pinned_evidence
    attestation_expectations:
      - Update metadata references payload SBOM and attestation refs instead of re-emitting parallel truth.
      - Channel manifests carry immutable target digests, expiry, rollback target, and supersedence refs.
      - Ring-history and release-evidence packets preserve the exact evidence snapshot behind channel movement.
    mirror_continuity:
      - origin_digest_and_signature_preserved
      - mirror_may_narrow_not_widen
      - stale_mirror_blocks_widening
      - manual_import_receipt_required
      - offline_bundle_preserves_graph
    trust_root_rotation:
      - signed_continuity_statement_required
      - cross_signed_transition_required
      - prior_root_retained_for_declared_overlap
      - break_glass_requires_quorum_and_receipt
    emergency_supersedence:
      - signed_successor_manifest_required
      - channel_freeze_or_pause_update_feed
      - revocation_metadata_required
      - stale_or_superseded_record_remains_visible
    evidence_inputs:
      - docs/release/channel_and_branch_contract.md
      - docs/release/ring_progression_policy.md
      - docs/security/emergency_distribution_policy.md
      - docs/release/install_topology_plan.md
    deviation_requires_exception: true
    release_packet_projection: promotion_evidence

  - row_id: trust.extension_distribution_artifacts
    artifact_family_group: extension_distribution_artifacts
    status: seeded
    owner_lane: docs_public_truth
    product_surface_examples:
      - extension_registry_manifest_row
      - official_extension_pack
      - sdk_publication_bundle
      - mirror_continuity_row
      - offline_bundle_manifest_row
    covered_exact_build_family_classes: []
    related_control_records:
      - schemas/extensions/registry_manifest.schema.json
      - artifacts/extensions/channel_promotion_rows.yaml
      - docs/extensions/registry_and_offline_bundle_seed.md
      - docs/extensions/sdk_publication_contract.md
    preferred_trust_patterns:
      - tuf_style_delegated_metadata
      - sigstore_style_identity_backed_signing
      - slsa_style_provenance
      - spdx_primary_sbom
      - cyclonedx_security_export
      - oci_distribution_or_equivalent_transport
      - content_addressed_identity
    attestation_expectations:
      - Verified or enterprise-certified packages carry publisher identity, compatibility, permission, and provenance refs.
      - High-trust extensions submit SPDX or CycloneDX SBOM output as required by the verified tier.
      - Official extension packs use the same release-evidence linkage as other first-party artifacts.
    mirror_continuity:
      - origin_digest_and_signature_preserved
      - mirror_may_narrow_not_widen
      - stale_mirror_blocks_widening
      - manual_import_receipt_required
      - offline_bundle_preserves_graph
    trust_root_rotation:
      - signed_continuity_statement_required
      - cross_signed_transition_required
      - prior_root_retained_for_declared_overlap
    emergency_supersedence:
      - signed_successor_manifest_required
      - revocation_metadata_required
      - kill_switch_or_forced_disable_metadata_required
      - stale_or_superseded_record_remains_visible
    evidence_inputs:
      - docs/extensions/registry_and_offline_bundle_seed.md
      - docs/adr/0012-extension-manifest-permission-publisher-policy.md
      - docs/security/emergency_distribution_policy.md
    deviation_requires_exception: true
    release_packet_projection: advisory_or_revocation_notice

  - row_id: trust.policy_and_emergency_artifacts
    artifact_family_group: policy_and_emergency_artifacts
    status: seeded
    owner_lane: governance_packets
    product_surface_examples:
      - policy_bundle
      - entitlement_snapshot
      - admin_audit_packet
      - emergency_action_record
      - manual_import_receipt
      - trust_root_rotation_bundle
    covered_exact_build_family_classes: []
    related_control_records:
      - schemas/identity/policy_bundle.schema.json
      - schemas/identity/entitlement_snapshot.schema.json
      - schemas/identity/admin_audit_packet.schema.json
      - schemas/security/emergency_action_record.schema.json
      - schemas/security/manual_import_receipt.schema.json
      - artifacts/security/emergency_artifact_relations.yaml
    preferred_trust_patterns:
      - signed_monotonic_policy_object
      - tuf_style_delegated_metadata
      - sigstore_style_identity_backed_signing
      - content_addressed_identity
      - signed_packet_or_digest_pinned_evidence
    attestation_expectations:
      - Policy bundles and emergency records cite signer identity, policy epoch, distribution source, freshness, and supersedence refs.
      - Manual imports emit receipt records with detached-signature verification and signer-continuity state.
      - SBOM output is not applicable unless the policy bundle carries executable payloads.
    mirror_continuity:
      - origin_digest_and_signature_preserved
      - mirror_may_narrow_not_widen
      - stale_mirror_blocks_widening
      - manual_import_receipt_required
    trust_root_rotation:
      - signed_continuity_statement_required
      - cross_signed_transition_required
      - prior_root_retained_for_declared_overlap
      - break_glass_requires_quorum_and_receipt
    emergency_supersedence:
      - signed_successor_manifest_required
      - channel_freeze_or_pause_update_feed
      - revocation_metadata_required
      - kill_switch_or_forced_disable_metadata_required
      - stale_or_superseded_record_remains_visible
    evidence_inputs:
      - docs/identity/offline_entitlement_and_policy_seed.md
      - docs/security/emergency_action_model.md
      - docs/security/emergency_distribution_policy.md
      - artifacts/governance/signing_quorum.yaml
    deviation_requires_exception: true
    release_packet_projection: known_limit_and_disclosure_note

  - row_id: trust.docs_and_public_contract_artifacts
    artifact_family_group: docs_and_public_contract_artifacts
    status: seeded
    owner_lane: docs_public_truth
    product_surface_examples:
      - docs_pack
      - reference_pack
      - schema_export
      - destination_descriptor
      - reviewed_pack_binding
    covered_exact_build_family_classes:
      - docs_pack
      - reference_pack
      - schema_export
    related_control_records:
      - schemas/docs/docs_pack_manifest.schema.json
      - schemas/docs/destination_descriptor.schema.json
      - schemas/docs/late_copy_change_packet.schema.json
      - artifacts/governance/public_truth_parity_matrix.yaml
    preferred_trust_patterns:
      - sigstore_style_identity_backed_signing
      - slsa_style_provenance
      - spdx_primary_sbom
      - oci_distribution_or_equivalent_transport
      - content_addressed_identity
      - exact_build_identity_linkage
    attestation_expectations:
      - Docs packs and schema exports cite source revision, pack revision, docs-version-match, and exact-build refs where applicable.
      - Generated docs, schema exports, and reviewed packs are emitted from the release publication domain when they describe promoted artifacts.
      - SPDX notices cover bundled third-party docs or sample material when present.
    mirror_continuity:
      - origin_digest_and_signature_preserved
      - mirror_may_narrow_not_widen
      - stale_mirror_blocks_widening
      - offline_bundle_preserves_graph
    trust_root_rotation:
      - signed_continuity_statement_required
      - prior_root_retained_for_declared_overlap
    emergency_supersedence:
      - signed_successor_manifest_required
      - stale_or_superseded_record_remains_visible
    evidence_inputs:
      - docs/docs/docs_pack_manifest_contract.md
      - docs/docs/reviewed_pack_and_late_copy_policy.md
      - docs/governance/public_surface_truth_map.md
      - docs/release/release_artifact_graph.md
    deviation_requires_exception: true
    release_packet_projection: docs_help_truth

  - row_id: trust.model_and_ai_artifacts
    artifact_family_group: model_and_ai_artifacts
    status: seeded
    owner_lane: governance_packets
    product_surface_examples:
      - local_model_pack
      - ai_provider_registry_entry
      - model_registry_entry
      - external_tool_registry_entry
      - provider_selection_disclosure
    covered_exact_build_family_classes: []
    related_control_records:
      - schemas/ai/provider_registry.schema.json
      - schemas/ai/model_registry.schema.json
      - schemas/ai/external_tool_registry.schema.json
      - schemas/ai/context_assembly.schema.json
    preferred_trust_patterns:
      - sigstore_style_identity_backed_signing
      - slsa_style_provenance
      - spdx_primary_sbom
      - cyclonedx_security_export
      - oci_distribution_or_equivalent_transport
      - content_addressed_identity
      - signed_packet_or_digest_pinned_evidence
    attestation_expectations:
      - Local-model packs carry pack identity, signer state, license/provenance refs, compatibility, and capability evidence refs.
      - Provider and model registry rows expose identity, lifecycle, deprecation, and audit-event refs without raw model weights or credentials.
      - SBOM or dependency export is required when a model pack ships executable runtime dependencies.
    mirror_continuity:
      - origin_digest_and_signature_preserved
      - mirror_may_narrow_not_widen
      - stale_mirror_blocks_widening
      - manual_import_receipt_required
    trust_root_rotation:
      - signed_continuity_statement_required
      - cross_signed_transition_required
      - prior_root_retained_for_declared_overlap
    emergency_supersedence:
      - signed_successor_manifest_required
      - revocation_metadata_required
      - kill_switch_or_forced_disable_metadata_required
      - stale_or_superseded_record_remains_visible
    evidence_inputs:
      - docs/ai/provider_model_registry_contract.md
      - docs/ai/evidence_replayability_contract.md
      - docs/security/emergency_distribution_policy.md
    deviation_requires_exception: true
    release_packet_projection: known_limit_and_disclosure_note

  - row_id: trust.symbol_and_debug_sidecars
    artifact_family_group: symbol_and_debug_sidecars
    status: seeded
    owner_lane: support_export
    product_surface_examples:
      - ide_debug_symbols
      - cli_debug_symbols
      - source_map_bundle
      - crash_symbols_archive
      - profiler_sidecar
    covered_exact_build_family_classes:
      - ide_debug_symbols
      - cli_debug_symbols
      - source_map_bundle
      - crash_symbols_archive
    related_control_records:
      - schemas/debug/debug_artifact_manifest.schema.json
      - docs/debug/artifact_resolution_seed.md
      - docs/support/exact_build_symbolication_smoke.md
    preferred_trust_patterns:
      - slsa_style_provenance
      - in_toto_style_attestation
      - content_addressed_identity
      - exact_build_identity_linkage
      - signed_packet_or_digest_pinned_evidence
    attestation_expectations:
      - Sidecar manifests cite the originating exact-build identity and the release-artifact graph node.
      - Raw symbol or source-map bytes may remain internal, but the manifest and retention posture stay release-visible.
      - SBOM output is referenced from the paired payload unless the sidecar ships independent executable content.
    mirror_continuity:
      - origin_digest_and_signature_preserved
      - mirror_may_narrow_not_widen
      - stale_mirror_blocks_widening
      - offline_bundle_preserves_graph
    trust_root_rotation:
      - signed_continuity_statement_required
      - prior_root_retained_for_declared_overlap
    emergency_supersedence:
      - signed_successor_manifest_required
      - revocation_metadata_required
      - stale_or_superseded_record_remains_visible
    evidence_inputs:
      - docs/debug/artifact_resolution_seed.md
      - docs/support/exact_build_symbolication_smoke.md
      - docs/release/release_artifact_graph.md
    deviation_requires_exception: true
    release_packet_projection: debug_artifact_manifest

  - row_id: trust.support_and_release_control_artifacts
    artifact_family_group: support_and_release_control_artifacts
    status: seeded
    owner_lane: support_export
    product_surface_examples:
      - support_runbook_bundle
      - release_evidence_packet
      - support_bundle
      - advisory_record
      - revocation_record
      - public_proof_packet
    covered_exact_build_family_classes:
      - support_runbook_bundle
      - release_evidence_packet
    related_control_records:
      - schemas/support/support_bundle.schema.json
      - schemas/support/support_packet_index.schema.json
      - schemas/security/advisory_record.schema.json
      - schemas/qe/public_proof_packet.schema.json
      - docs/release/release_evidence_packet_template.md
    preferred_trust_patterns:
      - sigstore_style_identity_backed_signing
      - content_addressed_identity
      - exact_build_identity_linkage
      - signed_packet_or_digest_pinned_evidence
    attestation_expectations:
      - Release and support packets cite exact-build identity refs, evidence refs, freshness, redaction/export posture, and advisory or revocation refs.
      - Superseded evidence remains visible by stable id; packet readers do not delete or rewrite prior truth.
      - SBOM and attestation refs are quoted from the release payload rows when support packets discuss released bytes.
    mirror_continuity:
      - origin_digest_and_signature_preserved
      - manual_import_receipt_required
      - stale_mirror_blocks_widening
    trust_root_rotation:
      - signed_continuity_statement_required
      - cross_signed_transition_required
      - break_glass_requires_quorum_and_receipt
    emergency_supersedence:
      - signed_successor_manifest_required
      - revocation_metadata_required
      - kill_switch_or_forced_disable_metadata_required
      - stale_or_superseded_record_remains_visible
    evidence_inputs:
      - docs/support/support_bundle_contract.md
      - docs/release/release_evidence_packet_template.md
      - docs/security/severity_matrix.md
      - docs/security/emergency_distribution_policy.md
    deviation_requires_exception: true
    release_packet_projection: release_truth_bundle

