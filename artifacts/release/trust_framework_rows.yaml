  exact_build_family_classes_from_artifact_family_map:
    - ide_binary
    - cli_binary
    - sdk_library
    - ide_debug_symbols
    - cli_debug_symbols
    - source_map_bundle
    - crash_symbols_archive
    - docs_pack
    - reference_pack
    - schema_export
    - sbom_document
    - signed_attestation
    - source_bundle
    - reproducibility_pack
    - support_runbook_bundle
    - release_evidence_packet
  exact_build_family_classes_covered_by_rows:
    - ide_binary
    - cli_binary
    - sdk_library
    - source_bundle
    - reproducibility_pack
    - sbom_document
    - signed_attestation
    - docs_pack
    - reference_pack
    - schema_export
    - ide_debug_symbols
    - cli_debug_symbols
    - source_map_bundle
    - crash_symbols_archive
    - support_runbook_bundle
    - release_evidence_packet
  conceptual_family_groups_covered:
    - release_payloads
    - update_metadata
    - extension_distribution_artifacts
    - policy_and_emergency_artifacts
    - docs_and_public_contract_artifacts
    - model_and_ai_artifacts
