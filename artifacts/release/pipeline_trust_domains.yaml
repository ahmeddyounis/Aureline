      artifact_kind_class: helper_or_agent_build
      artifact_family_class: null
      notes: >
        Helper/agent build payload covered by the runtime_binary node family.
        Concrete artifact families land later; this row freezes the trust path.
    producer:
      trust_domain: release_stable
      component_id: package_builder
      lane_ref: stable_release_lane
      notes: Produced under the stable lane; helper payloads share the same exact-build identity set.
    signer:
      signer_boundary_id: hardened_signing_service
      notes: Helper payload signatures/attestations are produced by the hardened signer boundary.
    publisher:
      publisher_boundary_class: public_channel
      trust_domain: release_stable
      publish_target_refs:
