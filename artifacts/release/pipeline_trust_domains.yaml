# Pipeline trust-domain, signer-boundary, and artifact-publication matrix seed.
#
# Machine-readable companion to
# docs/release/pipeline_trust_domain_and_publication_matrix.md.
#
# This artifact freezes:
# - stable trust-domain ids (reused from pipeline_lane_rules.yaml);
# - signer-boundary ids and the component matrix that binds them; and
# - a seeded artifact-publication row set covering the release artifact
#   families that must remain traceable through build → sign → promote →
#   publish → mirror/offline → revoke paths.

schema_version: 1
map_id: aureline.pipeline_trust_domains
status: seeded

policy_doc_ref: docs/release/pipeline_trust_domain_and_publication_matrix.md
pipeline_lane_rules_ref: artifacts/release/pipeline_lane_rules.yaml
cache_trust_classes_ref: artifacts/release/cache_trust_classes.yaml
artifact_family_map_ref: artifacts/release/artifact_family_map.yaml
artifact_graph_rules_ref: artifacts/release/artifact_graph_rules.yaml
publish_target_contract_ref: docs/release/release_center_object_model_contract.md
publish_target_schema_ref: schemas/release/publish_target.schema.json
mirror_integrity_contract_ref: docs/release/mirror_integrity_and_offline_verification_contract.md
signing_quorum_ref: artifacts/governance/signing_quorum.yaml
provenance_baseline_ref: docs/governance/provenance_and_compliance_baseline.md
exact_build_identity_model_ref: docs/build/exact_build_identity_model.md
cleanroom_rebuild_lane_ref: docs/build/cleanroom_rebuild_lane.md

trust_domain_vocabulary_ref: artifacts/release/pipeline_lane_rules.yaml#trust_domain_vocabulary
trust_domains:
  - trust_domain: untrusted_contributor
    title: Untrusted contributor / developer workstation domain
    publication_lanes:
      - developer_preview
    notes: >
      Includes developer workstation builds and untrusted PR lanes. No
      release-bearing credentials, no cache writes outside PR-local
      caches, and no channel publication.

  - trust_domain: protected_engineering
    title: Protected engineering domain
    publication_lanes:
      - internal_test
    notes: >
      Trusted CI for protected merges. May emit internal evidence and
      content-addressed cache entries; never publishes public channels.

  - trust_domain: release_nightly
    title: Nightly release publication domain
    publication_lanes:
      - internal_test
    notes: >
      Publishes the nightly channel only. Signing and attestation still
      occur via the hardened signing boundary; build workers never hold
      raw signing keys.

  - trust_domain: release_preview
    title: Preview release publication domain
    publication_lanes:
      - internal_test
    notes: >
      Publishes the preview channel only. Treated as pre-stable public
      truth; never uses stable/LTS credentials.

  - trust_domain: release_beta
    title: Beta release publication domain
    publication_lanes:
      - internal_test
    notes: >
      Publishes the beta channel only. Still not support-bearing stable
      truth; used to rehearse stable-candidate coupling rules.

  - trust_domain: release_stable
    title: Stable release publication domain
    publication_lanes:
      - public_stable
    notes: >
      Publishes the stable channel only. Support-bearing publication.
      Promotion, rollback, and revocation actions cite audited release
      center objects and signing-quorum policy.

  - trust_domain: release_lts
    title: LTS release publication domain
    publication_lanes:
      - public_stable
    notes: >
      Publishes the LTS channel only. Requires retention and mirror/offline
      parity that covers the support window.

  - trust_domain: release_hotfix
    title: Emergency hotfix release publication domain
    publication_lanes:
      - emergency_offline
      - public_stable
    notes: >
      Publishes the hotfix channel only. Uses the strictest approvals and
      minimized dependency surface rules.

  - trust_domain: cleanroom_protected
    title: Clean-room rebuild and verification domain
    publication_lanes:
      - internal_test
      - public_stable
    notes: >
      Re-materializes inputs from pinned commits, lockfiles, and reviewed
      toolchain references to provide reproducibility evidence. Never
      publishes channels.

  - trust_domain: release_mirror_or_offline
    title: Mirror and offline publication domain
    publication_lanes:
      - mirror_only
      - emergency_offline
    notes: >
      Produces mirror-continuity receipts, offline bundles, and import
      receipts without advancing authoritative public channels.

signer_boundary_vocabulary:
  - none
  - developer_local_signing_only
  - hardened_signing_service
  - mirror_receipt_signer
  - third_party_publisher

publication_lane_vocabulary:
  - developer_preview
  - internal_test
  - public_stable
  - mirror_only
  - emergency_offline

component_boundary_vocabulary:
  - developer_workstation
  - ci_runner
  - remote_cache
  - signing_service
  - package_builder
  - mirror
  - release_center
  - public_download_surface

component_trust_boundary_matrix:
  - component_id: developer_workstation
    trust_domain: untrusted_contributor
    signer_boundary_id: developer_local_signing_only
    secrets_posture: no_release_credentials
    notes: >
      Developer builds are permitted for local iteration. They never
      become support-bearing public artifacts and cannot publish a
      channel.

  - component_id: ci_runner
    trust_domain: untrusted_contributor
    signer_boundary_id: none
    secrets_posture: no_release_credentials
    notes: >
      Untrusted PR runners. May build/test but holds no channel or
      signing credentials.

  - component_id: ci_runner
    trust_domain: protected_engineering
    signer_boundary_id: none
    secrets_posture: protected_merge_credentials_only
    notes: >
      Protected CI. May write protected caches and emit internal
      evidence; never publishes channels or holds signing keys.

  - component_id: ci_runner
    trust_domain: release_nightly
    signer_boundary_id: none
    secrets_posture: lane_publishing_credentials_only
    notes: >
      Nightly lane runner. Builds and packages under nightly credentials
      and requests signing by digest; raw keys remain isolated.

  - component_id: ci_runner
    trust_domain: release_preview
    signer_boundary_id: none
    secrets_posture: lane_publishing_credentials_only
    notes: Preview lane runner. Same key-custody rules as nightly.

  - component_id: ci_runner
    trust_domain: release_beta
    signer_boundary_id: none
    secrets_posture: lane_publishing_credentials_only
    notes: Beta lane runner. Same key-custody rules as nightly.

  - component_id: ci_runner
    trust_domain: release_stable
    signer_boundary_id: none
    secrets_posture: lane_publishing_credentials_only
    notes: Stable lane runner. Same key-custody rules as other lanes.

  - component_id: ci_runner
    trust_domain: release_lts
    signer_boundary_id: none
    secrets_posture: lane_publishing_credentials_only
    notes: LTS lane runner. Same key-custody rules as stable.

  - component_id: ci_runner
    trust_domain: release_hotfix
    signer_boundary_id: none
    secrets_posture: hotfix_credentials_only
    notes: >
      Hotfix lane runner. Minimized dependency surface and extra
      approvals.

  - component_id: ci_runner
    trust_domain: cleanroom_protected
    signer_boundary_id: none
    secrets_posture: cleanroom_runner_only
    notes: >
      Clean-room rebuild runner. Re-materializes inputs and emits
      reproducibility proof; never publishes a channel.

  - component_id: package_builder
    trust_domain: release_nightly
    signer_boundary_id: none
    secrets_posture: lane_publishing_credentials_only
    notes: >
      Assembles installables and release bundles under nightly lane
      credentials. Signing is requested by digest; raw signing keys
      remain isolated.

  - component_id: package_builder
    trust_domain: release_preview
    signer_boundary_id: none
    secrets_posture: lane_publishing_credentials_only
    notes: >
      Assembles installables and release bundles under preview lane
      credentials. Signing is requested by digest; raw signing keys
      remain isolated.

  - component_id: package_builder
    trust_domain: release_beta
    signer_boundary_id: none
    secrets_posture: lane_publishing_credentials_only
    notes: >
      Assembles installables and release bundles under beta lane
      credentials. Signing is requested by digest; raw signing keys
      remain isolated.

  - component_id: package_builder
    trust_domain: release_stable
    signer_boundary_id: none
    secrets_posture: lane_publishing_credentials_only
    notes: >
      Assembles installables and release bundles under stable lane
      credentials. Signing is requested by digest; raw signing keys
      remain isolated.

  - component_id: package_builder
    trust_domain: release_lts
    signer_boundary_id: none
    secrets_posture: lane_publishing_credentials_only
    notes: >
      Assembles installables and release bundles under LTS lane
      credentials. Signing is requested by digest; raw signing keys
      remain isolated.

  - component_id: package_builder
    trust_domain: release_hotfix
    signer_boundary_id: none
    secrets_posture: hotfix_credentials_only
    notes: >
      Assembles installables and release bundles under hotfix lane
      credentials. Signing is requested by digest; raw signing keys
      remain isolated.

  - component_id: package_builder
    trust_domain: cleanroom_protected
    signer_boundary_id: none
    secrets_posture: cleanroom_runner_only
    notes: >
      Clean-room packaging/assembly used only for verification outputs.
      Never publishes a channel.

  - component_id: remote_cache
    trust_domain: protected_engineering
    signer_boundary_id: none
    secrets_posture: cache_acceleration_only
    notes: >
      Remote cache entries are never authoritative. Admissibility is
      defined by cache_trust_classes.yaml and lane rules.

  - component_id: signing_service
    trust_domain: release_stable
    signer_boundary_id: hardened_signing_service
    secrets_posture: isolated_signing_keys
    notes: >
      Signing happens in an isolated service. Release lanes submit digest
      sets; the service verifies digests before signing.

  - component_id: mirror
    trust_domain: release_mirror_or_offline
    signer_boundary_id: mirror_receipt_signer
    secrets_posture: mirror_operator_receipts_only
    notes: >
      Mirror operators may sign continuity receipts; they never re-sign
      origin artifacts as if they were the origin.

  - component_id: release_center
    trust_domain: release_stable
    signer_boundary_id: hardened_signing_service
    secrets_posture: audited_publication_actions_only
    notes: >
      Release center mutates publish targets (promote/rollback/revoke,
      etc.) using audited actions and signing-quorum policy.

  - component_id: public_download_surface
    trust_domain: none
    signer_boundary_id: none
    secrets_posture: untrusted_distribution_surface
    notes: >
      Public download surfaces distribute bytes but are not trusted to
      author provenance, signatures, or publication truth.

# -----------------------------------------------------------------------------
# Seeded artifact-publication rows.
#
# Each row is intended to validate against:
# schemas/release/artifact_publication_row.schema.json
# -----------------------------------------------------------------------------
artifact_publication_rows:
  - artifact_publication_row_schema_version: 1
    artifact_publication_row_id: artifact_publication_row:ide_binary.developer_preview
    lane_class: developer_preview
    artifact:
      artifact_kind_class: binary
      artifact_family_class: ide_binary
      notes: Developer workstation or PR preview payload.
    producer:
      trust_domain: untrusted_contributor
      component_id: developer_workstation
      lane_ref: contributor_pr_lane
      notes: Local or untrusted builds are permitted for iteration only.
    signer:
      signer_boundary_id: developer_local_signing_only
      notes: Developer signatures are never authoritative for public truth.
    publisher:
      publisher_boundary_class: local_only
      trust_domain: untrusted_contributor
      publish_target_refs: []
      public_download_surface_class: not_applicable
      notes: Stored locally or as ephemeral CI artifacts only.
    retention:
      retention_floor_class: not_applicable
      source_ref: artifacts/release/artifact_family_map.yaml
    revocation_linkage:
      revocation_granularity_class: not_applicable
      source_ref: artifacts/release/artifact_family_map.yaml
    trust_path:
      build_trust_domain: untrusted_contributor
      sign_signer_boundary_id: developer_local_signing_only
      promote_trust_domain: untrusted_contributor
      publish_trust_domain: untrusted_contributor
      mirror_trust_domain: null
      revoke_trust_domain: null

  - artifact_publication_row_schema_version: 1
    artifact_publication_row_id: artifact_publication_row:ide_binary.internal_test
    lane_class: internal_test
    artifact:
      artifact_kind_class: binary
      artifact_family_class: ide_binary
      notes: Nightly/preview/beta validation payload.
    producer:
      trust_domain: release_nightly
      component_id: package_builder
      lane_ref: nightly_release_lane
      notes: Built under lane credentials; no raw signing keys on workers.
    signer:
      signer_boundary_id: hardened_signing_service
      notes: Signatures and attestations are produced by an isolated signer.
    publisher:
      publisher_boundary_class: internal_channel_or_ring
      trust_domain: release_nightly
      publish_target_refs:
        - publish_target:internal.nightly
      public_download_surface_class: not_applicable
      notes: Internal distribution only.
    retention:
      retention_floor_class: paired_release_family_support_window
      source_ref: artifacts/release/artifact_family_map.yaml
    revocation_linkage:
      revocation_granularity_class: exact_build_node_set_or_channel_manifest
      source_ref: artifacts/release/artifact_family_map.yaml
    trust_path:
      build_trust_domain: release_nightly
      sign_signer_boundary_id: hardened_signing_service
      promote_trust_domain: release_nightly
      publish_trust_domain: release_nightly
      mirror_trust_domain: null
      revoke_trust_domain: release_nightly

  - artifact_publication_row_schema_version: 1
    artifact_publication_row_id: artifact_publication_row:ide_binary.public_stable
    lane_class: public_stable
    artifact:
      artifact_kind_class: binary
      artifact_family_class: ide_binary
      notes: Support-bearing stable/LTS payload.
    producer:
      trust_domain: release_stable
      component_id: package_builder
      lane_ref: stable_release_lane
      notes: Built under stable lane; promotion binds to exact-build identity.
    signer:
      signer_boundary_id: hardened_signing_service
      notes: Stable signatures/attestations come only from the hardened signer boundary.
    publisher:
      publisher_boundary_class: public_channel
      trust_domain: release_stable
      publish_target_refs:
        - publish_target:public.stable
      public_download_surface_class: official_public_download
      notes: Published as part of the coupled artifact graph.
    retention:
      retention_floor_class: paired_release_family_support_window_and_open_advisories
      source_ref: artifacts/release/artifact_family_map.yaml
    revocation_linkage:
      revocation_granularity_class: exact_build_node_set_or_channel_manifest
      source_ref: artifacts/release/artifact_family_map.yaml
    trust_path:
      build_trust_domain: release_stable
      sign_signer_boundary_id: hardened_signing_service
      promote_trust_domain: release_stable
      publish_trust_domain: release_stable
      mirror_trust_domain: release_mirror_or_offline
      revoke_trust_domain: release_hotfix

  - artifact_publication_row_schema_version: 1
    artifact_publication_row_id: artifact_publication_row:helper_or_agent_build.public_stable
    lane_class: public_stable
