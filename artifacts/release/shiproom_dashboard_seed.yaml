        risk_ref: RISK-007
      - freeze_exception_id: FE-013
        family_id: hosted_review_merge_policy
        downstream_milestone: M3
        risk_ref: RISK-007
      - freeze_exception_id: FE-014
        family_id: accessibility_locale_review_lanes
        downstream_milestone: M2
        risk_ref: RISK-005
    rule_ref: docs/release/shiproom_runbook.md#exception-logging

  - panel_id: stale_or_missing_evidence
    title: Stale or missing evidence
    panel_status: red
    source_refs:
      - docs/release/release_evidence_packet_example.md
      - artifacts/benchmarks/dashboard_seed/dashboard.json
      - artifacts/governance/claim_manifest_seed.yaml
      - artifacts/governance/evidence_freshness_slos.yaml
      - artifacts/governance/evidence_rerun_triggers.yaml
    stale_items:
      - evidence_id: evidence.seed.benchmark.dashboard
        source_ref: artifacts/benchmarks/dashboard_seed/dashboard.json
        captured_at: "1970-01-01T00:00:00Z"
        stale_after: P0D
        impacts:
          - claim_row:benchmark.publication_truth
          - ff.benchmark_lab_health
      - evidence_id: evidence.seed.benchmark.self_capture
        source_ref: artifacts/benchmarks/dashboard_seed/raw/benchmark_run.seed.self_capture.json
        captured_at: "1970-01-01T00:00:00Z"
        stale_after: P0D
        impacts:
          - claim_row:benchmark.publication_truth
          - claim_row:build.exact_build_identity
    missing_required_proof:
      - missing_ref: current release-evidence packet for coordinated exact-build propagation
        impacts:
          - claim_row:build.exact_build_identity
        source_ref: docs/release/release_evidence_packet_template.md
      - missing_ref: current benchmark-publication packet or reference-capture run
        impacts:
