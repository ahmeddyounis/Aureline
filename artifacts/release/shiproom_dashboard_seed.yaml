        downstream_milestone: M2
        risk_ref: RISK-008
      - freeze_exception_id: FE-005
        family_id: terminal_run_test_debug_semantics
        downstream_milestone: M1
        risk_ref: RISK-006
      - freeze_exception_id: FE-006
        family_id: git_local_vs_provider_and_history_edit_flows
        downstream_milestone: M2
        risk_ref: RISK-008
      - freeze_exception_id: FE-007
