dashboard_posture:
  shiproom_call: no_go
  summary: >
    Milestone truth is reviewable from one dashboard, but release widening
    remains blocked by exact-build closure, stale benchmark proof, and
    seed-only accessibility or locale evidence plus open contract-family
    exceptions.
  blocking_refs:
    - RISK-004
    - RISK-005
    - RISK-008
    - claim_row:build.exact_build_identity
    - claim_row:benchmark.publication_truth
  next_action: >
    Refresh benchmark and exact-build proof, keep downgraded claim rows
    visible, and close or rebaseline the highest-risk open exceptions before
    widening promotion language.

panel_order:
  - readiness_scorecard
  - waivers_and_exceptions
  - stale_or_missing_evidence
  - assumptions_and_dependency_reds
  - claim_manifest_drift
  - public_proof_coverage
  - support_packet_families
  - owner_handoffs

panels:
  - panel_id: readiness_scorecard
    title: Readiness scorecard
    panel_status: red
    source_refs:
      - artifacts/milestones/M0_scorecard.yaml
      - artifacts/milestones/M0_signoff_packet.md
    rows:
      - label: renderer_viability
        status: yellow
        note: Spike is frozen, but native-window and accessibility bridge viability are still carry-forward work.
      - label: benchmark_governance
        status: yellow
        note: Dashboard and nightly lane exist, but no council-approved hardware baseline is seeded.
      - label: ownership
        status: yellow
        note: Protected lanes have a DRI, but all backup coverage still rides one waiver.
      - label: public_truth_seeds
        status: yellow
        note: Claim manifest and parity matrix exist, but exact-build and public-proof rows remain narrowed.
      - label: unresolved_narrowing_decisions
        status: red
        note: Exact-build, shell home, and accessibility decisions still block widening; release posture is now frozen.

  - panel_id: waivers_and_exceptions
    title: Open waivers and freeze exceptions
    panel_status: yellow
    source_refs:
      - artifacts/governance/ownership_matrix.yaml
      - artifacts/milestones/M0_architecture_pack/coverage_and_freeze_exceptions.yaml
    open_waivers:
      - waiver_id: single-maintainer-backup
        posture: active
        expires_on: "2026-10-19"
        summary: Backup-owner coverage for every protected lane still relies on the solo-maintainer waiver.
    open_freeze_exceptions:
      - freeze_exception_id: FE-001
        family_id: language_provider_arbitration
        downstream_milestone: M2
        risk_ref: RISK-008
      - freeze_exception_id: FE-002
        family_id: diagnostics_code_action_convergence
        downstream_milestone: M2
        risk_ref: RISK-008
      - freeze_exception_id: FE-003
