        status: open
        summary: Solo-maintainer posture and the single backup waiver still govern every protected lane.
      - assumption_id: A-0002
        status: open
        summary: macOS and Linux remain the minimum supported developer hosts through first beta.
      - assumption_id: A-0003
        status: open
        summary: One build identity is still expected to cover binaries, docs, schemas, symbols, and rollback metadata.
    dependency_reds:
      - ref: M00-80
        kind: integrator_dependency_not_landed
        status: red
        summary: Still listed as missing in the M0 architecture-pack dependency slice.
      - ref: M00-95
        kind: integrator_dependency_not_landed
        status: red
        summary: Still listed as missing in the M0 architecture-pack dependency slice.
      - ref: M00-197
        kind: integrator_dependency_not_landed
        status: red
        summary: Still listed as missing in the M0 architecture-pack dependency slice.
      - ref: M00-204
        kind: integrator_dependency_not_landed
        status: red
        summary: Still listed as missing in the M0 architecture-pack dependency slice.

  - panel_id: claim_manifest_drift
    title: Claim-manifest drift
    panel_status: red
    source_refs:
      - artifacts/governance/claim_manifest_seed.yaml
      - artifacts/governance/public_truth_parity_matrix.yaml
    rows:
      - claim_row_ref: claim_row:boundary.open_local_vs_managed
        effective_claim_posture: limited
        downgrade_reasons:
          - required_evidence_narrower_than_claim
      - claim_row_ref: claim_row:build.exact_build_identity
        effective_claim_posture: limited
        downgrade_reasons:
          - required_evidence_missing
      - claim_row_ref: claim_row:benchmark.publication_truth
        effective_claim_posture: experimental
        downgrade_reasons:
          - required_evidence_stale
      - claim_row_ref: claim_row:docs.freshness_truth
        effective_claim_posture: claim_bearing
        downgrade_reasons: []
      - claim_row_ref: claim_row:compat.version_skew_truth
        effective_claim_posture: limited
        downgrade_reasons:
          - required_evidence_narrower_than_claim
      - claim_row_ref: claim_row:certification.launch_wedge_typescript_web
        effective_claim_posture: experimental
        downgrade_reasons:
          - required_evidence_missing

  - panel_id: public_proof_coverage
    title: Public-proof coverage results
    panel_status: red
    source_refs:
      - artifacts/governance/claim_manifest_seed.yaml
      - artifacts/governance/source_of_truth_map.yaml
      - docs/governance/drift_blocking_rules.md
      - docs/benchmarks/benchmark_publication_pack_template.md
      - docs/release/certified_archetype_report_template.md
    posture_totals:
      claim_bearing: 1
      limited: 3
      experimental: 2
    rows:
      - claim_row_ref: claim_row:benchmark.publication_truth
        public_proof_channel: required
        effective_claim_posture: experimental
        summary: Public benchmark proof remains methodology-only because the available evidence is seed-only and stale.
      - claim_row_ref: claim_row:certification.launch_wedge_typescript_web
        public_proof_channel: required
        effective_claim_posture: experimental
        summary: Certified-archetype wording remains experimental because the current archetype report is missing.
      - claim_row_ref: claim_row:docs.freshness_truth
        public_proof_channel: advisory
        effective_claim_posture: claim_bearing
        summary: Docs freshness is the only seeded claim row still claim-bearing.

  - panel_id: support_packet_families
    title: Support packet family coverage
    panel_status: yellow
    source_refs:
      - schemas/support/support_packet_index.schema.json
      - docs/support/support_center_concept.md
      - docs/release/shiproom_runbook.md
    rows:
      - packet_family_class: exact_build_support
        current_posture: seeded_contract_only
        primary_schema_refs:
          - schemas/build/exact_build_identity.schema.json
        summary: Correlates build, symbolication, docs/help revision, and release packet truth.
      - packet_family_class: route_origin_reconstruction
        current_posture: seeded_contract_only
        primary_schema_refs:
          - schemas/runtime/execution_context.schema.json
          - schemas/commands/command_descriptor.schema.json
        summary: Preserves command, invocation, route, origin, target, and exposure truth.
      - packet_family_class: known_limit_correlation
        current_posture: seeded_contract_only
        primary_schema_refs:
          - schemas/governance/claim_manifest.schema.json
          - schemas/docs/help_status_badge.schema.json
        summary: Keeps support copy tied to claim rows, known limits, and docs/help version truth.
      - packet_family_class: security_triage
        current_posture: seeded_contract_only
        primary_schema_refs:
          - schemas/security/incident_workspace_packet.schema.json
        summary: Keeps trust-sensitive triage on one incident and export path.
      - packet_family_class: rollback_review
        current_posture: seeded_contract_only
        primary_schema_refs:
          - schemas/state/restore_provenance.schema.json
        summary: Keeps install and state rollback review tied to exact-build and recovery provenance.

  - panel_id: owner_handoffs
    title: Cross-functional handoffs
    panel_status: red
    source_refs:
      - docs/release/shiproom_runbook.md
      - artifacts/milestones/M0_signoff_packet.md
    rows:
      - owner_role: release
        handoff_status: blocked
        next_packet: release-evidence packet refresh
        blocking_refs:
          - RISK-004
          - claim_row:build.exact_build_identity
          - claim_row:benchmark.publication_truth
      - owner_role: support
        handoff_status: hold_for_refresh
        next_packet: support packet family coverage through support_packet_index
        blocking_refs:
          - schemas/support/support_packet_index.schema.json
      - owner_role: docs
        handoff_status: narrowed
        next_packet: claim-manifest and release-note refresh
        blocking_refs:
          - claim_row:build.exact_build_identity
          - claim_row:benchmark.publication_truth
      - owner_role: security
        handoff_status: seeded_only
        next_packet: incident workspace packet if the candidate crosses trust or policy boundaries
        blocking_refs: []
      - owner_role: architecture
        handoff_status: blocked
        next_packet: decision, dependency, and rebaseline review
        blocking_refs:
          - D-0011
          - RISK-008

notes: >
  This seed is intentionally strict: it prefers one blocked dashboard over a
  green summary assembled from stale benchmark proof, open exact-build gaps,
  or hidden freeze exceptions.
