# M3 claim-manifest source matrix.
#
# Milestone-scoped manifest for the M3 governed claim manifest. The
# generator at ci/check_m3_claim_manifest.py reads this file together
# with the canonical claim-manifest seed, the claimed-surface register,
# the cohort/archetype scorecard register, the M3 compatibility report,
# the cohort guardrails, and the version-skew register to emit
# artifacts/release/m3/claim_manifest.json (+ .md) and the validation
# capture.
#
# Tooling reads this file. Reviewers should refresh the matrix or the
# upstream seeds rather than editing the generated JSON or markdown.

schema_version: 1
matrix_id: m3_claim_manifest_matrix
matrix_revision: 1
manifest_id: claim_manifest:m3.beta
manifest_revision: 1
milestone_id: m3
release_channel_scope: beta
manifest_state: draft
as_of: "2026-05-15"
owner: "@ahmeddyounis"
backup_owner: null
backup_waiver: single-maintainer-backup

# Authoritative source seeds. The generator refuses to run if any of
# these is missing, malformed, or names an unknown id.
claim_manifest_seed_source: artifacts/governance/claim_manifest_seed.yaml
claimed_surface_register_source: artifacts/milestones/m3/claimed_surface_register.json
scorecard_register_source: artifacts/milestones/m3/captures/cohort_archetype_scorecard_register.json
compatibility_report_source: artifacts/compat/m3/compatibility_report.json
cohort_guardrails_source: artifacts/milestones/m3/cohort_guardrails.yaml
version_skew_register_source: artifacts/compat/version_skew_register.yaml

# Generator and validation outputs.
generator:
  script_ref: ci/check_m3_claim_manifest.py
  command: python3 ci/check_m3_claim_manifest.py --repo-root .

generated_manifest_json_ref: artifacts/release/m3/claim_manifest.json
generated_manifest_md_ref: artifacts/release/m3/claim_manifest.md
validation_capture_ref: artifacts/release/m3/captures/claim_manifest_validation_capture.json

# Surfaces that consume the generated manifest verbatim. Docs, Help/About,
# support exports, release packets, and partner-facing evaluation kits
# read this list rather than restating claim prose.
consuming_surfaces:
  - docs/milestones/m3/beta_admission_matrix.md
  - docs/release/release_evidence_packet_template.md
  - docs/release/certified_archetype_report_template.md
  - docs/release/compatibility_report_template.md
  - docs/release/m3/reference_workspace_claim_integration.md
  - docs/help/help_about_truth_source.md
  - docs/about/about_provenance_and_boundary_contract.md
  - docs/support/support_center_concept.md
  - docs/governance/claim_manifest_contract.md
  - docs/migration/m3/marketed_switching_rows.md
  - artifacts/milestones/m3/first_useful_work_scorecard.json
  - artifacts/migration/m3/import_diff_and_rollback_packet.md
  - artifacts/migration/m3/restore_provenance_packet.md
  - fixtures/onboarding/m3/first_useful_work/manifest.yaml

# Closed vocabularies the manifest must use. These mirror the
# claim-manifest seed and the docs/help/service-health badge schema so
# every consumer reads one freshness/provenance dialect.
vocabularies:
  freshness_badge_class:
    - authoritative_live
    - warm_cached
    - degraded_cached
    - stale
    - unverified
  provenance_label:
    - project_docs
    - generated_reference
    - mirrored_official_docs
    - curated_knowledge_pack
    - derived_explanation
    - vendor_provider_docs
    - support_runbook
    - external_status_feed
  claim_posture:
    - claim_bearing
    - experimental
    - limited
    - policy_disabled
    - replacement_grade
    - seed_only
    - withdrawn
  support_class:
    - certified
    - supported
    - limited
    - experimental
    - community
    - retest_pending
    - evidence_stale
    - unsupported
  lifecycle_label:
    - preview
    - beta

# Each row binds one M3 claimed beta surface, claimed archetype, or
# canonical claim family to the canonical claim_row(s) that govern it
# and the upstream registers a CI gate must agree with.
#
# row_kind:
#   - canonical_claim_family: row inherits a canonical claim_row from
#     the claim-manifest seed.
#   - beta_surface_binding: row is a claimed beta surface (from
#     claimed_surface_register.json#/claimed_surfaces) that inherits
#     one or more canonical claim rows.
#   - beta_archetype_binding: row is a claimed beta archetype (from
#     claimed_surface_register.json#/claimed_archetype_rows) that
#     inherits one or more canonical claim rows.

rows:
  # --- canonical claim families ------------------------------------------
  - row_id: m3_claim_row:canonical.boundary.open_local_vs_managed
    row_kind: canonical_claim_family
    claim_row_ref: claim_row:boundary.open_local_vs_managed
    freshness_badge_class: warm_cached
    provenance_label: project_docs
    compat_row_refs:
      - compat_row:deployment_profiles.boundary_manifest_truth
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    notes: >
      Canonical open/local versus managed boundary truth. The row stays
      Limited until the boundary manifest graduates from strawman to
      ratified machine-readable form.

  - row_id: m3_claim_row:canonical.build.exact_build_identity
    row_kind: canonical_claim_family
    claim_row_ref: claim_row:build.exact_build_identity
    freshness_badge_class: warm_cached
    provenance_label: project_docs
    compat_row_refs:
      - compat_row:release_identity.exact_build_propagation
      - compat_row:desktop_benchmark_lab.exact_build_identity
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    notes: >
      Exact-build identity publication truth. Narrows to Limited until a
      coordinated release packet and a live running-build publisher exist.

  - row_id: m3_claim_row:canonical.benchmark.publication_truth
    row_kind: canonical_claim_family
    claim_row_ref: claim_row:benchmark.publication_truth
    freshness_badge_class: degraded_cached
    provenance_label: curated_knowledge_pack
    compat_row_refs:
      - compat_row:desktop_benchmark_lab.exact_build_identity
    primary_cohort_refs:
      - cohort:certified_archetype
    notes: >
      Benchmark publication truth. Stays experimental until a current
      public-proof packet lands.

  - row_id: m3_claim_row:canonical.docs.freshness_truth
    row_kind: canonical_claim_family
    claim_row_ref: claim_row:docs.freshness_truth
    freshness_badge_class: warm_cached
    provenance_label: project_docs
    compat_row_refs:
      - compat_row:release_identity.exact_build_propagation
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    notes: >
      Shared docs / Help / About / service-health / support freshness
      vocabulary. Claim-bearing once the badge vocabulary fixtures land.

  - row_id: m3_claim_row:canonical.compat.version_skew_truth
    row_kind: canonical_claim_family
    claim_row_ref: claim_row:compat.version_skew_truth
    freshness_badge_class: warm_cached
    provenance_label: project_docs
    compat_row_refs:
      - compat_row:release_identity.exact_build_propagation
      - compat_row:deployment_profiles.boundary_manifest_truth
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    notes: >
      Shared compatibility and version-skew truth. Narrows to Limited
      while distributed-profile and helper lanes remain seed-only.

  - row_id: m3_claim_row:canonical.certification.launch_wedge_typescript_web
    row_kind: canonical_claim_family
    claim_row_ref: claim_row:certification.launch_wedge_typescript_web
    freshness_badge_class: degraded_cached
    provenance_label: curated_knowledge_pack
    compat_row_refs: []
    primary_cohort_refs:
      - cohort:certified_archetype
    notes: >
      TypeScript web-app launch-wedge claim family. Renders as
      experimental until a current archetype report and bundle
      publication lane land.

  # --- claimed beta surfaces ---------------------------------------------
  - row_id: m3_claim_row:beta_surface.extension_runtime
    row_kind: beta_surface_binding
    beta_surface_ref: beta_surface:extension_runtime
    inherits_claim_row_refs:
      - claim_row:boundary.open_local_vs_managed
      - claim_row:build.exact_build_identity
    freshness_badge_class: warm_cached
    provenance_label: project_docs
    compat_row_refs:
      - compat_row:extension_host.sdk_wit_permission_window
    primary_cohort_refs:
      - cohort:extension_author
    notes: >
      Extension runtime, SDK, and publication path inherit boundary and
      exact-build truth; downgrade rules fire on SDK-breaking change
      without migration or unavailable publication mirror.

  - row_id: m3_claim_row:beta_surface.debug_test_task_model
    row_kind: beta_surface_binding
    beta_surface_ref: beta_surface:debug_test_task_model
    inherits_claim_row_refs:
      - claim_row:docs.freshness_truth
      - claim_row:compat.version_skew_truth
    freshness_badge_class: warm_cached
    provenance_label: project_docs
    compat_row_refs:
      - compat_row:tooling.task_event_envelope
      - compat_row:command_plane.command_descriptor_schema
      - compat_row:remote.attach_envelope_and_drift
    primary_cohort_refs:
      - cohort:certified_archetype
    notes: >
      Debug, test, and task execution model inherits docs/help freshness
      and version-skew truth; downgrades on stale reference workspace
      reports or regressions on certified archetypes.

  - row_id: m3_claim_row:beta_surface.packaging_update_rollback
    row_kind: beta_surface_binding
    beta_surface_ref: beta_surface:packaging_update_rollback
    inherits_claim_row_refs:
      - claim_row:build.exact_build_identity
      - claim_row:boundary.open_local_vs_managed
    freshness_badge_class: warm_cached
    provenance_label: project_docs
    compat_row_refs:
      - compat_row:release_identity.exact_build_propagation
      - compat_row:launcher.local_helper_contracts
      - compat_row:desktop.platform_conformance_profiles
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    notes: >
      Packaging, update, and rollback inherits exact-build truth so
      coordinated artifact sets stay coherent; downgrades on rollback
      drill failure or handler conflict.

  - row_id: m3_claim_row:beta_surface.policy_proxy_transport
    row_kind: beta_surface_binding
    beta_surface_ref: beta_surface:policy_proxy_transport
    inherits_claim_row_refs:
      - claim_row:boundary.open_local_vs_managed
      - claim_row:compat.version_skew_truth
    freshness_badge_class: warm_cached
    provenance_label: project_docs
    compat_row_refs:
      - compat_row:provider.service_api_and_browser_handoff
      - compat_row:deployment_profiles.boundary_manifest_truth
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    notes: >
      Enterprise policy, proxy, and transport baseline inherits
      open/managed boundary and version-skew truth so policy bundles
      stay inspectable.

  - row_id: m3_claim_row:beta_surface.support_export_diagnostics
    row_kind: beta_surface_binding
    beta_surface_ref: beta_surface:support_export_diagnostics
    inherits_claim_row_refs:
      - claim_row:docs.freshness_truth
      - claim_row:compat.version_skew_truth
      - claim_row:build.exact_build_identity
    freshness_badge_class: warm_cached
    provenance_label: support_runbook
    compat_row_refs:
      - compat_row:state.profile_layout_schema
      - compat_row:tooling.task_event_envelope
      - compat_row:remote.attach_envelope_and_drift
      - compat_row:preview_surface.scope_label_handoff_truth
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    notes: >
      Support export, diagnostics, and recovery inherits the same
      docs/help/service-health, version-skew, and exact-build truth as
      the in-product surfaces so partner triage reads one row shape.

  - row_id: m3_claim_row:beta_surface.importer_and_migration
    row_kind: beta_surface_binding
    beta_surface_ref: beta_surface:importer_and_migration
    inherits_claim_row_refs:
      - claim_row:docs.freshness_truth
      - claim_row:compat.version_skew_truth
    freshness_badge_class: warm_cached
    provenance_label: project_docs
    compat_row_refs:
      - compat_row:state.profile_layout_schema
    primary_cohort_refs:
      - cohort:design_partner_managed_pilot
    notes: >
      Importer, migration parity, and known-gap honesty inherits docs
      freshness and schema-epoch truth; downgrades on import-bridge
      regression.

  - row_id: m3_claim_row:beta_surface.compatibility_publication
    row_kind: beta_surface_binding
    beta_surface_ref: beta_surface:compatibility_publication
    inherits_claim_row_refs:
      - claim_row:compat.version_skew_truth
      - claim_row:certification.launch_wedge_typescript_web
    freshness_badge_class: degraded_cached
    provenance_label: curated_knowledge_pack
    compat_row_refs:
      - compat_row:desktop_benchmark_lab.exact_build_identity
      - compat_row:preview_surface.scope_label_handoff_truth
    primary_cohort_refs:
      - cohort:certified_archetype
    notes: >
      Certified-archetype compatibility publication inherits the
      version-skew and launch-wedge claim families; archetype-seed
      stale evidence downgrades to evidence_stale.

  # --- claimed beta archetypes -------------------------------------------
  - row_id: m3_claim_row:beta_archetype.ts_web_app_or_service
    row_kind: beta_archetype_binding
    beta_archetype_ref: beta_archetype:ts_web_app_or_service
    archetype_row_ref: archetype_row:ts_web_app_or_service
    scorecard_ref: archetype_scorecard:ts_web_app_or_service
    inherits_claim_row_refs:
      - claim_row:certification.launch_wedge_typescript_web
      - claim_row:compat.version_skew_truth
    freshness_badge_class: warm_cached
    provenance_label: curated_knowledge_pack
    primary_cohort_refs:
      - cohort:certified_archetype
      - cohort:design_partner_managed_pilot
    notes: >
      TypeScript / JavaScript web app or service archetype inherits the
      launch-wedge claim row and the shared version-skew truth. The
      current reference-workspace report caps the row at Retest pending
      until beta harness results are materialised.

  - row_id: m3_claim_row:beta_archetype.python_service_or_data_app
    row_kind: beta_archetype_binding
    beta_archetype_ref: beta_archetype:python_service_or_data_app
    archetype_row_ref: archetype_row:python_service_or_data_app
    scorecard_ref: archetype_scorecard:python_service_or_data_app
    inherits_claim_row_refs:
      - claim_row:compat.version_skew_truth
      - claim_row:docs.freshness_truth
    freshness_badge_class: warm_cached
    provenance_label: curated_knowledge_pack
    primary_cohort_refs:
      - cohort:certified_archetype
      - cohort:design_partner_managed_pilot
    notes: >
      Python service or data app archetype inherits the shared
      compatibility and docs freshness claim rows pending its own
      certified-archetype claim family. The current reference-workspace
      report caps the row at Retest pending until beta harness results
      are materialised.

  - row_id: m3_claim_row:beta_archetype.java_or_kotlin_service
    row_kind: beta_archetype_binding
    beta_archetype_ref: beta_archetype:java_or_kotlin_service
    archetype_row_ref: archetype_row:java_or_kotlin_service
    scorecard_ref: archetype_scorecard:java_or_kotlin_service
    inherits_claim_row_refs:
      - claim_row:compat.version_skew_truth
    freshness_badge_class: warm_cached
    provenance_label: curated_knowledge_pack
    primary_cohort_refs:
      - cohort:certified_archetype
    notes: >
      Java / Kotlin service archetype inherits version-skew truth. The
      row is capped by the current reference-workspace report and remains
      Retest pending while harness entries are not run.

  - row_id: m3_claim_row:beta_archetype.rust_workspace
    row_kind: beta_archetype_binding
    beta_archetype_ref: beta_archetype:rust_workspace
    archetype_row_ref: archetype_row:rust_workspace
    scorecard_ref: archetype_scorecard:rust_workspace
    inherits_claim_row_refs:
      - claim_row:compat.version_skew_truth
    freshness_badge_class: warm_cached
    provenance_label: curated_knowledge_pack
    primary_cohort_refs:
      - cohort:certified_archetype
    notes: >
      Rust workspace archetype inherits version-skew truth. Its declared
      supported class is capped to Retest pending by the current
      reference-workspace report until harness entries pass.

  - row_id: m3_claim_row:beta_archetype.go_service_or_monorepo_slice
    row_kind: beta_archetype_binding
    beta_archetype_ref: beta_archetype:go_service_or_monorepo_slice
    archetype_row_ref: archetype_row:go_service_or_monorepo_slice
    scorecard_ref: archetype_scorecard:go_service_or_monorepo_slice
    inherits_claim_row_refs:
      - claim_row:compat.version_skew_truth
    freshness_badge_class: warm_cached
    provenance_label: curated_knowledge_pack
    primary_cohort_refs:
      - cohort:certified_archetype
    notes: >
      Go service or monorepo slice archetype is capped by the current
      reference-workspace report and remains Retest pending while harness
      entries are not run.

  - row_id: m3_claim_row:beta_archetype.c_or_cpp_native_project
    row_kind: beta_archetype_binding
    beta_archetype_ref: beta_archetype:c_or_cpp_native_project
    archetype_row_ref: archetype_row:c_or_cpp_native_project
    scorecard_ref: archetype_scorecard:c_or_cpp_native_project
    inherits_claim_row_refs:
      - claim_row:compat.version_skew_truth
    freshness_badge_class: warm_cached
    provenance_label: curated_knowledge_pack
    primary_cohort_refs:
      - cohort:certified_archetype
    notes: >
      C / C++ native project archetype is capped by the current
      reference-workspace report and remains Retest pending while harness
      entries are not run.

# Stale-claim gate: the failure modes the CI generator enforces on every
# row. The vocabulary mirrors claim_manifest_seed.stale_claim_failure_modes
# so docs / Help / About / service-health truth can be blocked uniformly.
ci_gate:
  block_on:
    - row_references_unknown_canonical_claim
    - row_references_unknown_beta_surface
    - row_references_unknown_beta_archetype
    - row_references_unknown_compat_row
    - row_references_unknown_cohort
    - row_references_unknown_scorecard
    - upstream_as_of_drift
    - canonical_claim_row_stale_for_marketed_row
    - effective_claim_posture_widens_beyond_canonical
    - support_class_widens_above_scorecard_effective
    - missing_known_limit_for_active_downgrade
  freshness_floor_for_marketed_row: warm_cached
  upstream_as_of_max_drift_days: 0
