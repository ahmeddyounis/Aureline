# -----------------------------------------------------------------------------
# Frozen vocabularies.
# -----------------------------------------------------------------------------

# Closed artifact-family vocabulary for versioning. Mirrors the
# exact_build_identity artifact_family_class vocabulary but extends it
# with shipped families that ride a shared carrier (schema_export,
# docs_pack, support_runbook_bundle) and need their own versioning row.
artifact_family_class_vocabulary:
  - desktop_shell_binary
  - cli_binary
  - sdk_library
  - remote_agent_binary
  - managed_service_contract
  - extension_api_surface
  - extension_sdk_library
  - marketplace_metadata_schema
  - admin_policy_bundle
  - docs_pack_payload
  - schema_export_payload
  - reference_pack_payload
  - debug_symbols_sidecar
  - source_map_sidecar
  - crash_symbols_archive_sidecar
  - sbom_document_payload
  - signed_attestation_payload
  - source_bundle_payload
  - reproducibility_pack_payload
  - support_runbook_payload
  - release_evidence_packet_envelope

# Closed versioning-model vocabulary. Each model has explicit
# semantics; no row may declare a sixth model without bumping
# schema_version.
versioning_model_class_vocabulary:
  - semver_release
  - semver_with_capability_negotiation
  - schema_epoch_with_additive_minor
  - content_addressed_only
  - content_addressed_with_signed_index
  - calendar_versioned_lts_train
  - coordinated_artifact_set_versioned

# Closed compatibility-capability source vocabulary. Pinned so a
# release-time compatibility report can name the source mechanically.
compatibility_capability_source_class_vocabulary:
  - mixed_version_envelope_negotiation
  - schema_epoch_admission_table
  - signed_index_capability_table
  - coordinated_artifact_set_no_negotiation
  - admin_policy_pin_only

# Closed downgrade-support vocabulary. Pinned so downgrade is never an
# accidental capability.
downgrade_support_class_vocabulary:
  - downgrade_supported
  - downgrade_best_effort
  - downgrade_untested
  - downgrade_unsupported
  - downgrade_requires_coordinated_artifact_set
  - downgrade_requires_admin_or_managed_action

# Closed backward-readability vocabulary. Names whether a newer
# consumer can read older bytes (and vice versa within the supported
# skew). Distinct from downgrade_support: backward_readability is
# whether bytes round-trip; downgrade is whether the running install
# may step backward.
backward_readability_class_vocabulary:
  - bytes_round_trip_within_epoch
  - newer_reads_older_within_skew_window
  - older_reads_newer_only_via_signed_index
  - bytes_not_round_trip_safe_use_export_or_migration
  - not_applicable_immutable_or_content_addressed

# Closed stability-promise vocabulary. Pinned so consumers can resolve
# "is the public API stable?" in O(1).
stability_promise_class_vocabulary:
  - stable_public_api_with_deprecation_window
  - stable_public_api_with_capability_negotiation
  - public_preview_subject_to_change
  - internal_only_no_public_api_promise
  - reserved_no_public_consumers_yet
  - admin_only_contract

# Closed deprecation-window vocabulary. Pinned so deprecations cannot
# be made invisibly short.
deprecation_window_class_vocabulary:
  - none
  - one_minor_release
  - two_minor_releases
  - one_full_lts_window
  - explicit_decision_required

# Closed coordinated-artifact-set membership vocabulary. Rows that ride
# a coordinated artifact set name the set so the rollback atom can be
# read mechanically.
coordinated_artifact_set_class_vocabulary:
  - none
  - coordinated_artifact_set.launcher_and_helpers
  - coordinated_artifact_set.desktop_shell_and_cli
  - coordinated_artifact_set.desktop_shell_and_remote_agent
  - coordinated_artifact_set.docs_pack_and_schema_exports
  - coordinated_artifact_set.support_runbook_and_release_evidence

# Closed channel admission vocabulary. Mirrors
# artifacts/release/channel_matrix.yaml channel_class_vocabulary so a
# row can mechanically pin "this family ships on these channels".
channel_admission_class_vocabulary:
  - dev_local
  - nightly
  - preview
  - beta
  - stable
  - lts
  - hotfix
  - portable_stable
  - portable_preview

# Closed identifier-form vocabulary. Names how the family identifier
# appears in manifests so reviewers can spot version-string drift.
identifier_form_class_vocabulary:
  - semver_string_with_build_metadata
  - schema_epoch_integer
  - content_digest_with_signature
  - calendar_train_label
  - coordinated_artifact_set_label
  - opaque_capability_token

# -----------------------------------------------------------------------------
# Versioning-model rules.
#
# Authoritative semantics for every versioning_model_class_vocabulary
# entry. Tooling reads this to validate row admissibility.
# -----------------------------------------------------------------------------
versioning_model_rules:
  - versioning_model_class: semver_release
    summary: >
      Strict semver MAJOR.MINOR.PATCH applied to a public payload with
      no negotiated capability set. MAJOR is reserved for breaking
      changes; MINOR is additive-only; PATCH is bug-fix-only.
    breaking_change_authority: release_council
    capability_negotiation_admitted: false
    notes: >
      Used for families with a single public surface, no per-channel
      capability projection, and a published deprecation window.

  - versioning_model_class: semver_with_capability_negotiation
    summary: >
      Semver applied to a public payload that ALSO negotiates capability
      via the mixed_version_envelope. The negotiated capability set is
      authoritative within the supported skew window; semver remains the
      human-readable version anchor.
    breaking_change_authority: release_council
    capability_negotiation_admitted: true
    notes: >
      Used for boundary-bearing families (desktop_shell ↔ remote_agent,
      extension API ↔ host) where the wire-level capability set may
      narrow without bumping the marketed major version.

  - versioning_model_class: schema_epoch_with_additive_minor
    summary: >
      Integer schema epoch with explicit additive-minor admission. New
      epoch is breaking; additive minor extends the current epoch with
      backward-compatible fields. No semver string; the schema epoch is
      the version.
    breaking_change_authority: release_council
    capability_negotiation_admitted: true
    notes: >
      Used for schema exports, marketplace metadata, and policy bundles
      where the consumer is a parser, not a human reader.

  - versioning_model_class: content_addressed_only
    summary: >
      Payload identity is its content digest. There is no marketed
      version string; consumers identify the payload by its
      content_addressed_with_signature ref.
    breaking_change_authority: release_council
    capability_negotiation_admitted: false
    notes: >
      Used for sidecars and content-addressed bytes (debug symbols,
      source maps, crash-symbol archives, SBOM bodies, source bundles,
      reproducibility packs).

  - versioning_model_class: content_addressed_with_signed_index
    summary: >
      Content-addressed payload paired with a signed index that maps
      logical names to digests. Consumers read the signed index to
      resolve the current digest; the index is the negotiation surface.
    breaking_change_authority: release_council
    capability_negotiation_admitted: true
    notes: >
      Used for marketplace metadata and admin policy bundles where
      consumers need stable logical names AND verifiable bytes.

  - versioning_model_class: calendar_versioned_lts_train
    summary: >
      Calendar-versioned train label paired with a semver string for
      the underlying payload. Used for the LTS train where the support
      window is calendar-bounded.
    breaking_change_authority: release_council
    capability_negotiation_admitted: true
    notes: >
      Used for the LTS variant of stable-channel families.

  - versioning_model_class: coordinated_artifact_set_versioned
    summary: >
      Family ships only as a member of a coordinated artifact set; its
      version is the set's exact_build_identity_set. No independent
      version is admissible.
    breaking_change_authority: release_council
    capability_negotiation_admitted: false
    notes: >
      Used for the release_evidence_packet envelope and for the
      support_runbook payload that ships only with its paired release
      family.

