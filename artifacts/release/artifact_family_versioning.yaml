# Artifact-family versioning rows.
#
# Ordered by promotion seniority (primary payloads first, sidecars and
# governance envelopes last).
# -----------------------------------------------------------------------------
artifact_family_versioning_rows:

  - id: versioning.desktop_shell_binary
    artifact_family_class: desktop_shell_binary
    versioning_model_class: semver_with_capability_negotiation
    identifier_form_class: semver_string_with_build_metadata
    stability_promise_class: stable_public_api_with_capability_negotiation
    deprecation_window_class: two_minor_releases
    compatibility_capability_source: mixed_version_envelope_negotiation
    skew_window_declaration_ref: skew_window:launcher_and_local_sidecars.coordinated_artifact_set
    coordinated_artifact_set_class: coordinated_artifact_set.launcher_and_helpers
    backward_readability_class: newer_reads_older_within_skew_window
    downgrade_support_class: downgrade_supported
    channel_admission:
      - dev_local
      - nightly
      - preview
      - beta
      - stable
      - lts
      - hotfix
      - portable_stable
      - portable_preview
    same_change_set_obligation:
      - exact_build_and_publication_bundle
      - claim_docs_known_limit_bundle
      - supportability_and_symbolication_bundle
    paired_artifact_family_refs:
      - versioning.debug_symbols_sidecar
      - versioning.cli_binary
      - versioning.docs_pack_payload
    breaking_change_authority: release_council
    notes: >
      Primary desktop payload. Versioned by semver but the wire
      capability set negotiated against the helper agent and remote
      agent rides the mixed-version envelope.

  - id: versioning.cli_binary
    artifact_family_class: cli_binary
    versioning_model_class: semver_with_capability_negotiation
    identifier_form_class: semver_string_with_build_metadata
    stability_promise_class: stable_public_api_with_capability_negotiation
    deprecation_window_class: two_minor_releases
    compatibility_capability_source: mixed_version_envelope_negotiation
    skew_window_declaration_ref: skew_window:launcher_and_local_sidecars.coordinated_artifact_set
    coordinated_artifact_set_class: coordinated_artifact_set.desktop_shell_and_cli
    backward_readability_class: newer_reads_older_within_skew_window
    downgrade_support_class: downgrade_supported
    channel_admission:
      - dev_local
      - nightly
      - preview
      - beta
      - stable
      - lts
      - hotfix
      - portable_stable
      - portable_preview
    same_change_set_obligation:
      - exact_build_and_publication_bundle
      - claim_docs_known_limit_bundle
      - supportability_and_symbolication_bundle
    paired_artifact_family_refs:
      - versioning.desktop_shell_binary
      - versioning.cli_binary  # self-pairing intentional: scripted callers pin CLI version
    breaking_change_authority: release_council
    notes: >
      CLI versioned alongside the desktop shell. The stable CLI exit-
      code family is the wire contract; new exit codes are additive-
      minor and ride the same skew window.

  - id: versioning.sdk_library
    artifact_family_class: sdk_library
    versioning_model_class: semver_release
    identifier_form_class: semver_string_with_build_metadata
    stability_promise_class: stable_public_api_with_deprecation_window
    deprecation_window_class: two_minor_releases
    compatibility_capability_source: mixed_version_envelope_negotiation
    skew_window_declaration_ref: skew_window:extension_host_and_sdk.published_sdk_support_window
    coordinated_artifact_set_class: none
    backward_readability_class: newer_reads_older_within_skew_window
    downgrade_support_class: downgrade_best_effort
    channel_admission:
      - preview
      - beta
      - stable
      - lts
      - hotfix
    same_change_set_obligation:
      - exact_build_and_publication_bundle
      - claim_docs_known_limit_bundle
    paired_artifact_family_refs:
      - versioning.desktop_shell_binary
      - versioning.docs_pack_payload
      - versioning.schema_export_payload
    breaking_change_authority: release_council
    notes: >
      Public SDK library. Strict semver. MAJOR bumps cite a
      deprecation window of at least two minor releases, recorded on
      the claim_docs_known_limit_bundle.

  - id: versioning.remote_agent_binary
    artifact_family_class: remote_agent_binary
    versioning_model_class: semver_with_capability_negotiation
    identifier_form_class: semver_string_with_build_metadata
    stability_promise_class: stable_public_api_with_capability_negotiation
    deprecation_window_class: two_minor_releases
    compatibility_capability_source: mixed_version_envelope_negotiation
    skew_window_declaration_ref: skew_window:desktop_cli_and_remote_agent.declared_adjacent_window
    coordinated_artifact_set_class: coordinated_artifact_set.desktop_shell_and_remote_agent
    backward_readability_class: newer_reads_older_within_skew_window
    downgrade_support_class: downgrade_supported
    channel_admission:
      - nightly
      - preview
      - beta
      - stable
      - lts
      - hotfix
    same_change_set_obligation:
      - exact_build_and_publication_bundle
      - supportability_and_symbolication_bundle
    paired_artifact_family_refs:
      - versioning.desktop_shell_binary
      - versioning.cli_binary
    breaking_change_authority: release_council
    notes: >
      Remote agent ships per channel; desktop ↔ remote agent skew is
      negotiated through the mixed_version_envelope. Out-of-window
      attach refuses with a typed reason rather than degrading silently.

  - id: versioning.managed_service_contract
    artifact_family_class: managed_service_contract
    versioning_model_class: schema_epoch_with_additive_minor
    identifier_form_class: schema_epoch_integer
    stability_promise_class: stable_public_api_with_capability_negotiation
    deprecation_window_class: explicit_decision_required
    compatibility_capability_source: schema_epoch_admission_table
    skew_window_declaration_ref: skew_window:managed_control_plane.current_plus_previous_minor_or_lts
    coordinated_artifact_set_class: none
    backward_readability_class: newer_reads_older_within_skew_window
    downgrade_support_class: downgrade_requires_admin_or_managed_action
    channel_admission:
      - preview
      - beta
      - stable
      - lts
      - hotfix
    same_change_set_obligation:
      - exact_build_and_publication_bundle
      - claim_docs_known_limit_bundle
      - mirror_and_offline_bundle
    paired_artifact_family_refs:
      - versioning.desktop_shell_binary
      - versioning.remote_agent_binary
      - versioning.admin_policy_bundle
      - versioning.schema_export_payload
    breaking_change_authority: release_council
    notes: >
      Managed control plane / hosted service contract. Schema-epoch
      versioned because the wire-side consumer is a parser; the human-
      readable label is derived from the epoch. Downgrade requires an
      admin or managed action because the control plane is shared
      authority.

  - id: versioning.extension_api_surface
    artifact_family_class: extension_api_surface
    versioning_model_class: semver_with_capability_negotiation
    identifier_form_class: semver_string_with_build_metadata
    stability_promise_class: stable_public_api_with_capability_negotiation
    deprecation_window_class: two_minor_releases
    compatibility_capability_source: mixed_version_envelope_negotiation
    skew_window_declaration_ref: skew_window:extension_host_and_sdk.published_sdk_support_window
    coordinated_artifact_set_class: none
    backward_readability_class: newer_reads_older_within_skew_window
    downgrade_support_class: downgrade_best_effort
    channel_admission:
      - preview
      - beta
      - stable
      - lts
      - hotfix
    same_change_set_obligation:
      - exact_build_and_publication_bundle
      - claim_docs_known_limit_bundle
    paired_artifact_family_refs:
      - versioning.desktop_shell_binary
      - versioning.extension_sdk_library
      - versioning.docs_pack_payload
      - versioning.schema_export_payload
    breaking_change_authority: release_council
    notes: >
      Public extension-host API surface. Permission, host-contract
      binding, and effective-permission projection are part of the
      capability set; widening an extension's effective permission
      beyond the manifest declaration is non-conforming.

  - id: versioning.extension_sdk_library
    artifact_family_class: extension_sdk_library
    versioning_model_class: semver_release
    identifier_form_class: semver_string_with_build_metadata
    stability_promise_class: stable_public_api_with_deprecation_window
    deprecation_window_class: two_minor_releases
    compatibility_capability_source: mixed_version_envelope_negotiation
    skew_window_declaration_ref: skew_window:extension_host_and_sdk.published_sdk_support_window
    coordinated_artifact_set_class: none
    backward_readability_class: newer_reads_older_within_skew_window
    downgrade_support_class: downgrade_best_effort
    channel_admission:
      - preview
      - beta
      - stable
      - lts
      - hotfix
    same_change_set_obligation:
      - exact_build_and_publication_bundle
      - claim_docs_known_limit_bundle
    paired_artifact_family_refs:
      - versioning.extension_api_surface
      - versioning.docs_pack_payload
    breaking_change_authority: release_council
    notes: >
      Extension SDK library used by extension authors. Versioned in
      lockstep with the extension API surface major; minors may move
      independently within the supported skew.

  - id: versioning.marketplace_metadata_schema
    artifact_family_class: marketplace_metadata_schema
    versioning_model_class: content_addressed_with_signed_index
    identifier_form_class: schema_epoch_integer
    stability_promise_class: stable_public_api_with_capability_negotiation
    deprecation_window_class: one_minor_release
    compatibility_capability_source: signed_index_capability_table
    skew_window_declaration_ref: skew_window:schema_or_state_bundle.additive_epoch
    coordinated_artifact_set_class: none
    backward_readability_class: older_reads_newer_only_via_signed_index
    downgrade_support_class: downgrade_supported
    channel_admission:
      - preview
      - beta
      - stable
      - lts
      - hotfix
    same_change_set_obligation:
      - exact_build_and_publication_bundle
      - claim_docs_known_limit_bundle
      - mirror_and_offline_bundle
    paired_artifact_family_refs:
      - versioning.extension_api_surface
      - versioning.schema_export_payload
