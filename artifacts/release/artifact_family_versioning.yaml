# Artifact-family versioning matrix.
#
# Machine-readable companion to docs/release/channel_and_branch_contract.md.
# Each artifact_family_versioning_row binds one shipped artifact family
# (desktop shell, CLI, SDK, remote agent, managed service contract,
# extension API surface, extension SDK, marketplace metadata, admin
# policy bundle, etc.) to one closed versioning model, one compatibility-
# capability source, one skew-window declaration, and one downgrade
# posture so versioning and compatibility promises can be stated
# mechanically per family rather than by negotiated prose per release.
#
# Scope. This matrix freezes the per-family versioning rules that
# release, install-topology, support, fleet, mirror, and extension-host
# surfaces read before describing "what version of X may talk to what
# version of Y" or "may this family downgrade in place?" without
# re-deriving the answer per packet. It does NOT implement a packager
# or an SDK; it states the version model and the closed admissibility
# rules every later release lane and every later compatibility envelope
# instance must honour.
#
# Rules.
#   - Every artifact_family_versioning_row MUST name exactly one
#     artifact_family_class drawn from
#     artifact_family_class_vocabulary. Rows may extend an
#     exact_build_identity artifact_family_class with a sub-axis (for
#     example schema_export.extension_api or schema_export.policy_bundle)
#     so families that share the schema_export carrier still resolve to
#     one versioning model.
#   - Every row MUST cite exactly one versioning_model_class drawn from
#     versioning_model_class_vocabulary. Free-text version strings are
#     non-conforming.
#   - Every row MUST cite exactly one compatibility_capability_source.
#     Capability negotiation rides the mixed-version envelope; rows
#     without a capability source cannot negotiate compatibility.
#   - Every row MUST cite a skew_window_declaration_ref into
#     artifacts/compat/skew_windows.yaml. Rows whose family is bound to
#     a coordinated artifact set carry
#     coordinated_artifact_set_only on the skew window.
#   - Every row MUST declare a downgrade_support_class drawn from
#     downgrade_support_class_vocabulary. Downgrade is never an
#     accidental capability.
#   - Every row MUST declare a backward_readability_class so a newer
#     consumer reading older bytes (and an older consumer reading
#     newer bytes within the supported skew) is governed mechanically.
#   - Every row MUST declare a same_change_set_obligation set drawn
#     from artifacts/release/promotion_gate_map.yaml's
#     same_change_set_groups; rows that elide this slot are
#     non-conforming.
#   - Every row MUST declare a stability_promise_class so consumers can
#     resolve "is the public API stable?" in O(1).
#   - Milestone slugs MUST NOT appear in any id, path, or description
#     field.
#   - Adding a vocabulary value is additive-minor and requires bumping
#     schema_version and updating the narrative contract in the same
#     change. Repurposing an existing value is breaking.

schema_version: 1
matrix_id: aureline.release_artifact_family_versioning
status: seeded

contract_doc_ref: docs/release/channel_and_branch_contract.md
channel_matrix_ref: artifacts/release/channel_matrix.yaml
governing_adr_ref: docs/adr/0017-release-posture-artifact-families-and-promotion-gates.md

artifact_family_map_ref: artifacts/release/artifact_family_map.yaml
promotion_gate_map_ref: artifacts/release/promotion_gate_map.yaml
exact_build_identity_schema_ref: schemas/build/exact_build_identity.schema.json
exact_build_identity_model_ref: docs/build/exact_build_identity_model.md
mixed_version_envelope_schema_ref: schemas/compat/mixed_version_envelope.schema.json
skew_windows_ref: artifacts/compat/skew_windows.yaml
version_skew_register_ref: artifacts/compat/version_skew_register.yaml
upgrade_order_contract_ref: docs/compat/upgrade_order_contract.md
qualification_matrix_seed_ref: artifacts/compat/qualification_matrix_seed.yaml
install_topology_matrix_ref: artifacts/release/install_topology_matrix.yaml
state_root_map_ref: artifacts/release/state_root_map.yaml

