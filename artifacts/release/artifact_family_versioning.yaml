# -----------------------------------------------------------------------------
# Schema-level invariants pinned on the matrix.
# -----------------------------------------------------------------------------
invariants:
  - id: artifact_family_class_closed
    description: >
      A row's artifact_family_class MUST be a value in
      artifact_family_class_vocabulary.

  - id: versioning_model_required
    description: >
      A row MUST cite exactly one versioning_model_class. The model's
      semantics are pinned in versioning_model_rules; rows MUST NOT
      override.

  - id: capability_negotiation_admission
    description: >
      A row whose versioning_model_class admits capability negotiation
      MUST cite a compatibility_capability_source other than
      coordinated_artifact_set_no_negotiation. A row whose model
      forbids negotiation MUST cite
      coordinated_artifact_set_no_negotiation.

  - id: skew_window_required
    description: >
      A row MUST cite exactly one skew_window_declaration_ref into
      artifacts/compat/skew_windows.yaml.

  - id: coordinated_set_implies_set_label
    description: >
      A row whose versioning_model_class is
      coordinated_artifact_set_versioned MUST cite a non-none
      coordinated_artifact_set_class.

  - id: content_addressed_implies_no_round_trip
    description: >
      A row whose versioning_model_class is content_addressed_only or
      content_addressed_with_signed_index MUST declare
      backward_readability_class
      not_applicable_immutable_or_content_addressed.

  - id: downgrade_support_required
    description: >
      A row MUST declare a downgrade_support_class. Rows that elide
      the slot are non-conforming.

  - id: backward_readability_required
    description: >
      A row MUST declare a backward_readability_class.

  - id: same_change_set_required
    description: >
      A row MUST declare same_change_set_obligation entries drawn from
      artifacts/release/promotion_gate_map.yaml's
      same_change_set_groups. Rows that elide the slot are
      non-conforming.

  - id: stability_promise_required
    description: >
      A row MUST declare a stability_promise_class. Rows that elide
      the slot are non-conforming.

  - id: deprecation_window_required
    description: >
      A row MUST declare a deprecation_window_class. Rows whose
      stability_promise_class is internal_only_no_public_api_promise
      MAY declare none; every other row MUST declare a non-none
      window.

  - id: channel_admission_subset
    description: >
      A row's channel_admission MUST be a subset of
      channel_admission_class_vocabulary, which mirrors
      artifacts/release/channel_matrix.yaml channel_class_vocabulary.

  - id: paired_family_refs_resolve_within_matrix
    description: >
      Every entry in paired_artifact_family_refs MUST resolve to
      another row id inside this matrix (excepting the explicit
      self-pairing on cli_binary which is permitted).

  - id: extension_api_pairing
    description: >
      versioning.extension_api_surface MUST pair to
      versioning.extension_sdk_library and
      versioning.docs_pack_payload so the SDK and docs move with the
      API surface.

  - id: marketplace_metadata_signed_index
    description: >
      versioning.marketplace_metadata_schema MUST cite
      content_addressed_with_signed_index. Mirrors and private
      registries that weaken the signed index are non-conforming per
      ADR 0012.

  - id: admin_policy_no_silent_widening
    description: >
      versioning.admin_policy_bundle MUST declare
      stability_promise_class admin_only_contract and
      compatibility_capability_source admin_policy_pin_only. Policy
      MUST NOT silently widen an extension's effective permission
      beyond its manifest declaration.

  - id: lts_downgrade_floor
    description: >
      A row whose channel_admission includes lts MUST declare a
      downgrade_support_class compatible with the LTS-floor rollback
      target on artifacts/release/channel_matrix.yaml's channel.lts.

  - id: hotfix_requires_advisory_bundle
    description: >
      A row whose channel_admission includes hotfix MUST list
      advisory_and_revocation_bundle in same_change_set_obligation
      whenever the family is a primary_payload, supply_chain_proof,
      or supportability_payload per artifact_family_map.yaml.

  - id: schema_epoch_additive_minor_admission
    description: >
      A row whose versioning_model_class is
      schema_epoch_with_additive_minor MUST cite a skew window whose
      window_class admits same_schema_epoch_additive_only,
      additive_epoch, or current_plus_previous_minor_or_lts.
