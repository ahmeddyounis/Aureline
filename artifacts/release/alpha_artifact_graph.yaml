# Alpha artifact graph seed for exact-build release evidence.
#
# This is the canonical alpha graph for release evidence collection. The graph
# keeps build roots, provenance inputs, binaries, symbols, docs/help packs,
# schemas, support/export artifacts, and release-center objects joined by the
# same exact-build identity. It is a seed graph: rows whose bytes do not exist
# yet are explicitly labeled as metadata seeds and may not be treated as
# publishable packages.

