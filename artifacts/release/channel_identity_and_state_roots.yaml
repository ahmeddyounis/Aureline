# Channel identity, state-root, and handler-ownership contract.
#
# Machine-readable companion to docs/release/packaging_installation_matrix.md.
# It binds release channels and portable/helper runtime lanes to product
# identity placeholders, durable state roots, update markers, recent-item
# namespaces, file-association ownership, protocol-handler ownership, and
# rollback / downgrade requirements.

schema_version: 1
matrix_id: aureline.channel_identity_and_state_roots
status: seeded

contract_doc_ref: docs/release/packaging_installation_matrix.md
install_artifact_families_ref: artifacts/release/install_artifact_families.yaml
install_topology_matrix_ref: artifacts/release/install_topology_matrix.yaml
state_root_map_ref: artifacts/release/state_root_map.yaml
channel_matrix_ref: artifacts/release/channel_matrix.yaml
install_profile_card_contract_ref: docs/release/install_profile_card_contract.md
fixtures_ref: fixtures/release/install_matrix_cases

related_normative_sources:
  - path: .t2/docs/Aureline_PRD.md
    anchors:
      - "§9.11 Packaging, installation, and rollback matrix"
      - "§9.12 Native OS integration and desktop management requirements"
  - path: .t2/docs/Aureline_Technical_Design_Document.md
    anchors:
      - "§5.2.3 packaging support rules"
      - "Appendix M deployment matrix"
  - path: .t2/docs/Aureline_Technical_Architecture_Document.md
    anchors:
      - "Appendix BA install, portable-mode, and fleet-rollout matrix"
  - path: .t2/docs/Aureline_Milestones_Document.md
    anchors:
      - "§6.18 install topology truth"

channel_identity_class_vocabulary:
  - desktop_channel
  - portable_channel
  - correction_release_inherits_target
  - remote_runtime_channel

handler_default_selection_class_vocabulary:
  - user_or_admin_selected_default
  - admin_selected_default
  - suppressed
  - not_applicable

state_root_policy_class_vocabulary:
  - no_shared_durable_state_across_channels
  - portable_colocated_only
  - inherited_from_target_channel
  - remote_runtime_separate_from_desktop_state
  - shared_read_only_platform_resource

rollback_requirement_class_vocabulary:
  - backup_or_journal_before_state_migration
  - migration_journal_required_for_schema_downgrade
  - repair_flow_required_before_destructive_advice
  - helper_runtime_verified_replace
  - image_layer_digest_rollback
  - inherited_from_target_channel

channel_identity_rows:
  - id: channel_identity.stable
    channel_class: stable
    identity_class: desktop_channel
    product_identity_placeholders:
      windows_product_namespace: product_identity.windows.stable
      macos_bundle_id: bundle_id.macos.stable
      linux_desktop_id: desktop_id.linux.stable
      cli_identity: cli_identity.stable
    durable_state_root_refs:
      - state.per_user_configuration_root.stable
      - state.per_user_recovery_root.stable
      - state.per_user_derived_cache_root.stable
      - state.per_user_keychain_or_secret_store.stable
      - state.per_machine_shared_data_root.stable
      - state.per_machine_admin_policy_root.stable
    update_marker_ref: update_marker.stable
    recent_item_registration_ref: recent_items.stable
    file_association_registration_ref: file_association.stable
    protocol_handler_ref: protocol_handler.stable
    shared_protocol_scheme_ref: protocol_handler.shared_aureline_default
    handler_default_selection_class: user_or_admin_selected_default
    state_root_policy_class: no_shared_durable_state_across_channels
    rollback_requirement_refs:
      - rollback_requirement.backup_before_user_state_migration
      - rollback_requirement.migration_journal_for_schema_change
      - rollback_requirement.repair_flow_before_destructive_support
    install_topology_card_refs:
      - card.windows.x86_64.per_user_installed.stable
      - card.windows.x86_64.per_machine_installed.stable
      - card.windows.x86_64.managed_deployed.stable
      - card.macos.universal_binary.per_user_installed.stable
      - card.macos.universal_binary.per_machine_installed.stable
      - card.macos.universal_binary.managed_deployed.stable
      - card.linux.x86_64.per_user_installed.stable
      - card.linux.x86_64.managed_deployed.stable
    status: proposed

  - id: channel_identity.preview
    channel_class: preview
    identity_class: desktop_channel
    product_identity_placeholders:
      windows_product_namespace: product_identity.windows.preview
      macos_bundle_id: bundle_id.macos.preview
      linux_desktop_id: desktop_id.linux.preview
      cli_identity: cli_identity.preview
    durable_state_root_refs:
      - state.per_user_configuration_root.preview
      - state.per_user_recovery_root.preview
      - state.per_user_derived_cache_root.preview
      - state.per_user_keychain_or_secret_store.preview
    update_marker_ref: update_marker.preview
    recent_item_registration_ref: recent_items.preview
    file_association_registration_ref: file_association.preview
    protocol_handler_ref: protocol_handler.preview
    shared_protocol_scheme_ref: protocol_handler.shared_aureline_default
    handler_default_selection_class: user_or_admin_selected_default
    state_root_policy_class: no_shared_durable_state_across_channels
    rollback_requirement_refs:
      - rollback_requirement.backup_before_user_state_migration
      - rollback_requirement.migration_journal_for_schema_change
      - rollback_requirement.repair_flow_before_destructive_support
    install_topology_card_refs:
      - card.windows.x86_64.side_by_side_preview.preview
      - card.macos.universal_binary.side_by_side_preview.preview
    status: proposed

  - id: channel_identity.lts
    channel_class: lts
    identity_class: desktop_channel
    product_identity_placeholders:
      windows_product_namespace: product_identity.windows.lts
      macos_bundle_id: bundle_id.macos.lts
      linux_desktop_id: desktop_id.linux.lts
      cli_identity: cli_identity.lts
    durable_state_root_refs:
      - state.per_user_configuration_root.lts
      - state.per_user_recovery_root.lts
      - state.per_user_derived_cache_root.lts
      - state.per_machine_shared_data_root.lts
      - state.per_machine_admin_policy_root.lts
    update_marker_ref: update_marker.lts
    recent_item_registration_ref: recent_items.lts
    file_association_registration_ref: file_association.lts
    protocol_handler_ref: protocol_handler.lts
    shared_protocol_scheme_ref: protocol_handler.shared_aureline_default
    handler_default_selection_class: admin_selected_default
    state_root_policy_class: no_shared_durable_state_across_channels
    rollback_requirement_refs:
      - rollback_requirement.admin_pinned_floor_requires_state_journal
      - rollback_requirement.repair_flow_before_destructive_support
    install_topology_card_refs:
      - card.windows.x86_64.per_machine_installed.lts
    status: proposed

  - id: channel_identity.portable_stable
    channel_class: portable_stable
    identity_class: portable_channel
    product_identity_placeholders:
      windows_product_namespace: product_identity.windows.portable_stable
      macos_bundle_id: bundle_id.macos.portable_stable
      linux_desktop_id: desktop_id.linux.portable_stable
      cli_identity: cli_identity.portable_stable
    durable_state_root_refs:
      - state.portable_colocated_root.portable_stable
    update_marker_ref: update_marker.portable_stable
    recent_item_registration_ref: recent_items.portable_stable
    file_association_registration_ref: file_association.portable_stable
    protocol_handler_ref: protocol_handler.portable_stable
    shared_protocol_scheme_ref: null
    handler_default_selection_class: suppressed
    state_root_policy_class: portable_colocated_only
    rollback_requirement_refs:
      - rollback_requirement.portable_colocated_backup_before_replace
      - rollback_requirement.repair_flow_before_destructive_support
    install_topology_card_refs:
      - card.windows.x86_64.portable.portable_stable
      - card.macos.universal_binary.portable.portable_stable
      - card.linux.x86_64.portable.portable_stable
    status: proposed

  - id: channel_identity.portable_preview
    channel_class: portable_preview
    identity_class: portable_channel
    product_identity_placeholders:
      windows_product_namespace: product_identity.windows.portable_preview
      macos_bundle_id: bundle_id.macos.portable_preview
      linux_desktop_id: desktop_id.linux.portable_preview
      cli_identity: cli_identity.portable_preview
    durable_state_root_refs:
      - state.portable_colocated_root.portable_preview
    update_marker_ref: update_marker.portable_preview
    recent_item_registration_ref: recent_items.portable_preview
    file_association_registration_ref: file_association.portable_preview
    protocol_handler_ref: protocol_handler.portable_preview
    shared_protocol_scheme_ref: null
    handler_default_selection_class: suppressed
    state_root_policy_class: portable_colocated_only
    rollback_requirement_refs:
      - rollback_requirement.portable_colocated_backup_before_replace
      - rollback_requirement.repair_flow_before_destructive_support
    install_topology_card_refs: []
    status: proposed

  - id: channel_identity.hotfix
    channel_class: hotfix
    identity_class: correction_release_inherits_target
    inherits_target_channel_identity: true
    allowed_target_channel_classes: [stable, lts]
    durable_state_root_refs: []
    update_marker_ref: inherited_from_target_channel
    recent_item_registration_ref: inherited_from_target_channel
    file_association_registration_ref: inherited_from_target_channel
    protocol_handler_ref: inherited_from_target_channel
    shared_protocol_scheme_ref: inherited_from_target_channel
    handler_default_selection_class: user_or_admin_selected_default
    state_root_policy_class: inherited_from_target_channel
    rollback_requirement_refs:
      - rollback_requirement.inherit_supported_line_state_protection
    install_topology_card_refs: []
    status: proposed

  - id: channel_identity.remote_agent_runtime
    channel_class: remote_agent_runtime
    identity_class: remote_runtime_channel
    product_identity_placeholders:
      runtime_identity: runtime_identity.remote_agent
      capability_envelope: capability_envelope.remote_agent
      image_layer_identity: image_layer_identity.remote_agent
    durable_state_root_refs:
      - remote_state.agent_runtime_root
      - remote_state.agent_capability_cache
      - remote_state.agent_image_layer_root
    update_marker_ref: update_marker.remote_agent_runtime
    recent_item_registration_ref: null
    file_association_registration_ref: null
    protocol_handler_ref: null
    shared_protocol_scheme_ref: null
    handler_default_selection_class: not_applicable
    state_root_policy_class: remote_runtime_separate_from_desktop_state
    rollback_requirement_refs:
      - rollback_requirement.remote_runtime_verified_replace
      - rollback_requirement.remote_capability_renegotiation_after_rollback
    install_topology_card_refs: []
    status: proposed

  - id: channel_identity.remote_helper_runtime
    channel_class: remote_helper_runtime
    identity_class: remote_runtime_channel
    product_identity_placeholders:
      runtime_identity: runtime_identity.remote_helper
      capability_envelope: capability_envelope.remote_helper
      image_layer_identity: not_applicable
    durable_state_root_refs:
      - remote_state.helper_runtime_root
      - remote_state.helper_session_cache
    update_marker_ref: update_marker.remote_helper_runtime
    recent_item_registration_ref: null
    file_association_registration_ref: null
    protocol_handler_ref: null
    shared_protocol_scheme_ref: null
    handler_default_selection_class: not_applicable
    state_root_policy_class: remote_runtime_separate_from_desktop_state
    rollback_requirement_refs:
      - rollback_requirement.remote_runtime_verified_replace
      - rollback_requirement.remote_capability_renegotiation_after_rollback
    install_topology_card_refs: []
    status: proposed

state_root_extensions:
  - id: remote_state.agent_runtime_root
    durable_state_root_class: remote_runtime_root
    authority_class: admin_or_control_artifact
    owning_identity_refs: [channel_identity.remote_agent_runtime]
    shared_across_desktop_channels: false
    diagnostics_visibility_class: exposed_in_support_bundle
    collision_policy: remote_runtime_separate_from_desktop_state
    path_class_placeholder: remote_agent_runtime_root
    status: proposed
  - id: remote_state.agent_capability_cache
    durable_state_root_class: remote_capability_cache
    authority_class: disposable_derived_cache
    owning_identity_refs: [channel_identity.remote_agent_runtime]
    shared_across_desktop_channels: false
    diagnostics_visibility_class: exposed_in_support_bundle
    collision_policy: remote_runtime_separate_from_desktop_state
    path_class_placeholder: remote_agent_capability_cache
    status: proposed
  - id: remote_state.agent_image_layer_root
    durable_state_root_class: remote_image_layer_root
    authority_class: admin_or_control_artifact
    owning_identity_refs: [channel_identity.remote_agent_runtime]
    shared_across_desktop_channels: false
    diagnostics_visibility_class: exposed_in_admin_console_only
    collision_policy: remote_runtime_separate_from_desktop_state
    path_class_placeholder: remote_agent_image_layer_root
    status: proposed
  - id: remote_state.helper_runtime_root
    durable_state_root_class: remote_runtime_root
    authority_class: admin_or_control_artifact
    owning_identity_refs: [channel_identity.remote_helper_runtime]
    shared_across_desktop_channels: false
    diagnostics_visibility_class: exposed_in_support_bundle
    collision_policy: remote_runtime_separate_from_desktop_state
    path_class_placeholder: remote_helper_runtime_root
    status: proposed
  - id: remote_state.helper_session_cache
    durable_state_root_class: remote_session_cache
    authority_class: user_owned_recovery_state
    owning_identity_refs: [channel_identity.remote_helper_runtime]
    shared_across_desktop_channels: false
    diagnostics_visibility_class: exposed_in_support_bundle
    collision_policy: remote_runtime_separate_from_desktop_state
    path_class_placeholder: remote_helper_session_cache
    status: proposed

update_markers:
  - id: update_marker.stable
    source_ref: artifacts/release/state_root_map.yaml#update_markers.stable
    channel_class: stable
    ownership_class: per_channel_under_binary_root
    collision_policy: no_shared_durable_state_across_channels
  - id: update_marker.preview
    source_ref: artifacts/release/state_root_map.yaml#update_markers.preview
    channel_class: preview
    ownership_class: per_channel_under_binary_root
    collision_policy: no_shared_durable_state_across_channels
  - id: update_marker.lts
    source_ref: artifacts/release/state_root_map.yaml#update_markers.lts
    channel_class: lts
    ownership_class: per_channel_under_admin_policy_root
    collision_policy: no_shared_durable_state_across_channels
  - id: update_marker.portable_stable
    source_ref: artifacts/release/state_root_map.yaml#update_markers.portable_stable
    channel_class: portable_stable
    ownership_class: per_channel_under_portable_root
    collision_policy: no_shared_durable_state_across_channels
  - id: update_marker.portable_preview
    source_ref: artifacts/release/state_root_map.yaml#update_markers.portable_preview
    channel_class: portable_preview
    ownership_class: per_channel_under_portable_root
    collision_policy: no_shared_durable_state_across_channels
  - id: update_marker.remote_agent_runtime
    channel_class: remote_agent_runtime
    ownership_class: per_runtime_under_content_addressed_root
    collision_policy: remote_runtime_separate_from_desktop_state
  - id: update_marker.remote_helper_runtime
    channel_class: remote_helper_runtime
    ownership_class: per_runtime_under_content_addressed_root
    collision_policy: remote_runtime_separate_from_desktop_state

recent_item_registrations:
  - id: recent_items.stable
    source_ref: artifacts/release/state_root_map.yaml#recent_item_registrations.stable
    channel_class: stable
    namespace_placeholder: recent_items_stable
  - id: recent_items.preview
    source_ref: artifacts/release/state_root_map.yaml#recent_item_registrations.preview
    channel_class: preview
    namespace_placeholder: recent_items_preview
  - id: recent_items.lts
    source_ref: artifacts/release/state_root_map.yaml#recent_item_registrations.lts
    channel_class: lts
    namespace_placeholder: recent_items_lts
  - id: recent_items.portable_stable
    source_ref: artifacts/release/state_root_map.yaml#recent_item_registrations.portable_stable
    channel_class: portable_stable
    namespace_placeholder: recent_items_portable_stable
  - id: recent_items.portable_preview
    source_ref: artifacts/release/state_root_map.yaml#recent_item_registrations.portable_preview
    channel_class: portable_preview
    namespace_placeholder: recent_items_portable_preview

file_associations:
  - id: file_association.stable
    source_ref: artifacts/release/state_root_map.yaml#file_associations.stable
    channel_class: stable
    registration_class: user_or_admin_selectable_candidate_handler
    default_handler_selection_rule: user_or_admin_selectable_never_last_writer_wins
  - id: file_association.preview
    source_ref: artifacts/release/state_root_map.yaml#file_associations.preview
    channel_class: preview
    registration_class: user_or_admin_selectable_candidate_handler
    default_handler_selection_rule: user_or_admin_selectable_never_last_writer_wins
  - id: file_association.lts
    source_ref: artifacts/release/state_root_map.yaml#file_associations.lts
    channel_class: lts
    registration_class: admin_only_default_handler
    default_handler_selection_rule: admin_only
  - id: file_association.portable_stable
    source_ref: artifacts/release/state_root_map.yaml#file_associations.portable_stable
    channel_class: portable_stable
    registration_class: not_registered
    default_handler_selection_rule: not_applicable
  - id: file_association.portable_preview
    source_ref: artifacts/release/state_root_map.yaml#file_associations.portable_preview
    channel_class: portable_preview
    registration_class: not_registered
    default_handler_selection_rule: not_applicable

protocol_handlers:
  - id: protocol_handler.stable
    source_ref: artifacts/release/state_root_map.yaml#protocol_handlers.stable
    channel_class: stable
    ownership_class: per_channel_suffixed_scheme
    scheme_placeholder: aureline-stable
  - id: protocol_handler.preview
    source_ref: artifacts/release/state_root_map.yaml#protocol_handlers.preview
    channel_class: preview
    ownership_class: per_channel_suffixed_scheme
    scheme_placeholder: aureline-preview
  - id: protocol_handler.lts
    source_ref: artifacts/release/state_root_map.yaml#protocol_handlers.lts
    channel_class: lts
    ownership_class: per_channel_suffixed_scheme
    scheme_placeholder: aureline-lts
  - id: protocol_handler.portable_stable
    source_ref: artifacts/release/state_root_map.yaml#protocol_handlers.portable_stable
    channel_class: portable_stable
    ownership_class: not_registered
    scheme_placeholder: not_applicable
  - id: protocol_handler.portable_preview
    source_ref: artifacts/release/state_root_map.yaml#protocol_handlers.portable_preview
    channel_class: portable_preview
    ownership_class: not_registered
    scheme_placeholder: not_applicable
  - id: protocol_handler.shared_aureline_default
    source_ref: artifacts/release/state_root_map.yaml#shared_scheme_default_resolution
    channel_class: shared
    ownership_class: shared_scheme_with_user_or_admin_default
    scheme_placeholder: aureline
    default_resolution_rule: user_or_admin_selected_default
    forbidden_rule: no_silent_claim_of_shared_scheme

coexistence_rules:
  - id: coexistence_rule.stable_preview_no_shared_state
    applies_to_identity_refs:
      - channel_identity.stable
      - channel_identity.preview
    required_user_or_admin_choice_for_shared_defaults: true
    required_separations:
      - durable_state_roots
      - update_markers
      - recent_item_registrations
      - file_association_candidates
      - protocol_handler_schemes
      - keychain_service_names
    forbidden_behaviors:
      - read_other_channel_mutable_state_by_default
      - write_other_channel_update_marker
      - last_writer_wins_file_association
      - last_writer_wins_shared_protocol_scheme
      - merge_recent_items_without_review
    fixture_refs:
      - fixtures/release/install_matrix_cases/stable_preview_desktop_coexistence.yaml

  - id: coexistence_rule.installed_portable_no_host_mutation
    applies_to_identity_refs:
      - channel_identity.stable
      - channel_identity.portable_stable
      - channel_identity.preview
      - channel_identity.portable_preview
    required_user_or_admin_choice_for_shared_defaults: true
    required_separations:
      - portable_colocated_state_root
      - portable_update_marker
      - portable_recent_items
      - host_file_associations_suppressed
      - host_protocol_handlers_suppressed
      - host_services_suppressed
    forbidden_behaviors:
      - portable_writes_machine_global_state
      - portable_claims_shared_protocol_scheme
      - portable_registers_file_association_by_default
      - portable_uses_installed_update_marker
    fixture_refs:
      - fixtures/release/install_matrix_cases/portable_zip_no_host_mutation.yaml

  - id: coexistence_rule.managed_portable_admin_boundary
    applies_to_identity_refs:
      - channel_identity.stable
      - channel_identity.portable_stable
    required_user_or_admin_choice_for_shared_defaults: true
    required_separations:
      - managed_policy_root
      - managed_fleet_update_marker
      - portable_colocated_state_root
      - portable_recent_items
    forbidden_behaviors:
      - portable_reads_managed_policy_root
      - portable_writes_managed_update_marker
      - managed_uninstall_deletes_portable_root
    fixture_refs:
      - fixtures/release/install_matrix_cases/managed_install_with_portable_neighbor.yaml

  - id: coexistence_rule.package_manager_owns_package_update
    applies_to_identity_refs:
      - channel_identity.stable
      - channel_identity.preview
      - channel_identity.lts
    required_user_or_admin_choice_for_shared_defaults: true
    required_separations:
      - package_manager_package_db
      - aureline_user_state_roots
      - channel_update_marker_disclosure
    forbidden_behaviors:
      - in_product_binary_replacement_when_package_manager_owns_update
      - package_remove_deletes_user_authored_state
    fixture_refs:
      - fixtures/release/install_matrix_cases/linux_package_manager_channel_identity.yaml

  - id: coexistence_rule.remote_helpers_no_desktop_handlers
    applies_to_identity_refs:
      - channel_identity.remote_agent_runtime
      - channel_identity.remote_helper_runtime
    required_user_or_admin_choice_for_shared_defaults: false
    required_separations:
      - remote_runtime_root
      - remote_update_marker
      - desktop_file_associations
      - desktop_protocol_handlers
    forbidden_behaviors:
      - remote_helper_registers_desktop_file_association
      - remote_helper_claims_local_protocol_scheme
      - remote_helper_writes_desktop_recent_items
    fixture_refs:
      - fixtures/release/install_matrix_cases/remote_helper_runtime_rollback.yaml

  - id: coexistence_rule.remote_runtime_capability_negotiation
    applies_to_identity_refs:
      - channel_identity.remote_agent_runtime
      - channel_identity.remote_helper_runtime
    required_user_or_admin_choice_for_shared_defaults: false
    required_separations:
      - capability_envelope
      - runtime_update_marker
      - attach_authorization
    forbidden_behaviors:
      - attach_without_capability_negotiation
      - silent_agent_retarget_after_rollback
      - image_layer_rollback_without_digest_verification
    fixture_refs:
      - fixtures/release/install_matrix_cases/remote_helper_runtime_rollback.yaml

rollback_requirements:
  - id: rollback_requirement.backup_before_user_state_migration
    requirement_class: backup_or_journal_before_state_migration
    state_classes:
      - user_authored_durable_truth
      - user_owned_recovery_state
    required_evidence:
      - backup_snapshot_ref
      - affected_state_root_refs
      - exact_build_identity_ref
  - id: rollback_requirement.migration_journal_for_schema_change
    requirement_class: migration_journal_required_for_schema_downgrade
    state_classes:
      - user_authored_durable_truth
    required_evidence:
      - migration_journal_ref
      - source_schema_version
      - target_schema_version
      - restore_or_repair_action_ref
  - id: rollback_requirement.repair_flow_before_destructive_support
    requirement_class: repair_flow_required_before_destructive_advice
    state_classes:
      - user_authored_durable_truth
      - user_owned_recovery_state
      - admin_or_control_artifact
    required_evidence:
      - repair_transaction_ref
      - denied_destructive_clear_reason
      - preserved_state_root_refs
  - id: rollback_requirement.admin_pinned_floor_requires_state_journal
    requirement_class: migration_journal_required_for_schema_downgrade
    state_classes:
      - user_authored_durable_truth
      - admin_or_control_artifact
    required_evidence:
      - admin_pinned_target_ref
      - migration_journal_ref
      - rollback_approval_ref
  - id: rollback_requirement.portable_colocated_backup_before_replace
    requirement_class: backup_or_journal_before_state_migration
    state_classes:
      - user_authored_durable_truth
      - user_owned_recovery_state
    required_evidence:
      - portable_root_ref
      - colocated_backup_ref
      - extracted_replacement_digest
  - id: rollback_requirement.remote_runtime_verified_replace
    requirement_class: helper_runtime_verified_replace
    state_classes:
      - admin_or_control_artifact
      - disposable_derived_cache
    required_evidence:
      - target_runtime_digest
      - signature_verification_ref
      - previous_runtime_ref
  - id: rollback_requirement.remote_capability_renegotiation_after_rollback
    requirement_class: helper_runtime_verified_replace
    state_classes:
      - admin_or_control_artifact
    required_evidence:
      - capability_envelope_ref
      - attach_session_ref
      - reattach_or_review_only_decision
  - id: rollback_requirement.inherit_supported_line_state_protection
    requirement_class: inherited_from_target_channel
    state_classes:
      - user_authored_durable_truth
      - user_owned_recovery_state
    required_evidence:
      - target_channel_identity_ref
      - supported_line_rollback_requirement_refs

coverage_assertions:
  - id: coverage.desktop_channels_have_handler_rows
    description: >
      Stable, Preview, long-support, portable Stable, and portable
      Preview each resolve to update-marker, recent-item, file-
      association, and protocol-handler rows or an explicit suppressed
      value.
  - id: coverage.portable_channels_have_colocated_roots
    description: >
      Portable channels resolve only to portable_colocated_root rows for
      mutable durable state and cannot reference installed-channel
      mutable roots.
  - id: coverage.remote_runtime_not_desktop_identity
    description: >
      Remote agent and helper runtimes have runtime identity rows,
      runtime roots, and runtime update markers, but no desktop file
      association or protocol-handler ownership.
  - id: coverage.rollback_never_destructive_by_default
    description: >
      Every desktop and portable channel identity carries a backup,
      migration-journal, or repair-flow rollback requirement for
      user-authored state.
