        owning_channel_class: shared_under_user_or_admin_choice
        protocol_handler_ownership_class: shared_scheme_with_user_or_admin_default
        protocol_handler_refs:
          - protocol_handler.shared_aureline_default
        required_operator_choice: shared_protocol_default_channel
        notes: >
          Portable MUST NOT claim the shared scheme; only the
          installed Stable channel may register it as a candidate
          subject to the user/admin default-selection rule.
      - axis: keychain_service_names
        owning_channel_class: stable
        keychain_service_naming_class: per_channel_suffixed_service_name
      - axis: keychain_service_names
        owning_channel_class: portable_stable
        keychain_service_naming_class: portable_colocated_secret_store
        notes: >
          Portable secret-store entries live under the portable root
          and MUST NOT be written into the host keychain.
      - axis: diagnostics_paths
        owning_channel_class: stable
        diagnostics_path_ownership_class: per_channel_diagnostics_export
      - axis: diagnostics_paths
        owning_channel_class: portable_stable
        diagnostics_path_ownership_class: portable_root_only_diagnostics_export
      - axis: host_services_suppressed
        owning_channel_class: portable_stable
        notes: >
          Portable MUST NOT install services or shell hooks on the
          host; the limitation ledger pins the suppression posture.
    collision_risks:
      - portable_writes_machine_global_state
      - portable_claims_shared_protocol_scheme
      - portable_registers_file_association_by_default
      - portable_uses_installed_update_marker
