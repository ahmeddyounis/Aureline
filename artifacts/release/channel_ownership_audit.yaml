# Channel-ownership audit.
#
# Machine-readable companion to
# artifacts/release/install_update_about_truth_packet.md. One audit
# row per side-by-side relation that the install topology admits
# (Stable + Preview, Stable + Beta, Stable + long-support, Preview +
# Beta, installed + portable, three-channel matrix, and
# managed + portable). Each row pins which channel owns the durable
# state roots, update markers, recent-item registrations, file-
# association candidates, protocol-handler schemes, keychain service
# names, and diagnostics paths on a host that runs both channels, and
# pins the shared-state collision risks the pair MUST suppress.
#
# Tooling reads this file; the truth packet is the narrative companion.
# If the two disagree, the packet wins and this file MUST be updated in
# the same change.
#
# Rules.
#   - Every audit row resolves to exactly one
#     side_by_side_relation_class value re-exported from
#     artifacts/release/install_topology_matrix.yaml; no row may invent
#     a new relation class.
#   - Every owning_channel field cites a channel_class re-exported
#     from the install topology matrix.
#   - Every separation_required_for axis cites a class re-exported
#     from artifacts/release/state_root_map.yaml or
#     artifacts/release/channel_identity_and_state_roots.yaml.
#   - Every collision_risk row cites a forbidden_behavior class taken
#     verbatim from the matching coexistence_rule in
#     artifacts/release/channel_identity_and_state_roots.yaml.
#   - Adding an audit row is additive-minor and requires bumping
#     schema_version and updating the truth packet in the same change.
#     Repurposing an existing value is breaking and opens a row in
#     artifacts/governance/decision_index.yaml.

schema_version: 1
audit_id: aureline.channel_ownership_audit
status: seeded

truth_packet_source: artifacts/release/install_update_about_truth_packet.md
install_topology_matrix_source: artifacts/release/install_topology_matrix.yaml
channel_identity_and_state_roots_source: artifacts/release/channel_identity_and_state_roots.yaml
state_root_map_source: artifacts/release/state_root_map.yaml
install_artifact_families_source: artifacts/release/install_artifact_families.yaml
silent_deployment_seed_source: artifacts/release/silent_deployment_seed.yaml
install_profile_card_contract_source: docs/release/install_profile_card_contract.md
install_topology_plan_source: docs/release/install_topology_plan.md
fixtures_ref: fixtures/release/install_truth_cases

related_normative_sources:
  - path: .t2/docs/Aureline_PRD.md
    anchors:
      - "§9.11 Packaging, installation, and rollback matrix"
      - "§9.12 Native OS integration and desktop management requirements"
  - path: .t2/docs/Aureline_Technical_Architecture_Document.md
    anchors:
      - "§25.9 Install, portable-mode, and fleet-rollout architecture"
      - "Appendix BA platform installation matrix and fleet rollout rings"
  - path: .t2/docs/Aureline_UI_UX_Spec_Document.md
    anchors:
      - "§6.12 About, update, and diagnostics surfaces"

