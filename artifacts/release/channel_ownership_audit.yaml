# -----------------------------------------------------------------------------
# Audit-row rules.
# -----------------------------------------------------------------------------
audit_row_rules:
  - id: every_pair_pins_one_relation_class
    description: >
      Every audit row carries exactly one
      side_by_side_relation_class value other than none. The
      none relation is not audited (a single-channel host has no
      cross-channel ownership question).
  - id: every_pair_lists_owning_channels
    description: >
      Every audit row enumerates the channel_class values that share
      the host. Cards admitted by the install topology matrix as
      side_by_side_relation_class != none MUST appear in the
      install_topology_card_refs of the matching audit row.
  - id: every_owning_channel_owns_its_separation_axes
    description: >
      Each audit row declares one ownership_row per separation axis
      naming exactly one owning_channel_class (or "shared_under_user_or_admin_choice"
      for the shared protocol scheme and the default file handler).
      Two channels MUST NOT both own the same axis.
  - id: every_pair_lists_collision_risks
    description: >
      Every audit row enumerates collision_risks taken verbatim from
      the matching coexistence_rule.forbidden_behaviors set in
      artifacts/release/channel_identity_and_state_roots.yaml. A row
      that elides a forbidden_behavior from its coexistence rule is
      non-conforming.
  - id: shared_default_requires_operator_choice
    description: >
      Audit rows whose owning_channel for shared default file handler
      or for the shared protocol scheme is
      shared_under_user_or_admin_choice MUST list the matching
      operator_choice tokens in required_operator_choices.

# -----------------------------------------------------------------------------
# Audit rows.
#
# One row per side-by-side relation. Rows are ordered by relation
# class.
# -----------------------------------------------------------------------------
audit_rows:

  - id: channel_ownership_audit:stable_and_preview
    side_by_side_relation_class: stable_and_preview
    coexisting_channels: [stable, preview]
    coexistence_rule_ref: coexistence_rule.stable_preview_no_shared_state
    install_topology_card_refs:
      - card.windows.x86_64.per_user_installed.stable
      - card.windows.x86_64.per_machine_installed.stable
      - card.windows.x86_64.side_by_side_preview.preview
      - card.macos.universal_binary.per_user_installed.stable
      - card.macos.universal_binary.per_machine_installed.stable
      - card.macos.universal_binary.side_by_side_preview.preview
      - card.linux.x86_64.per_user_installed.stable
    channel_identity_refs:
      - channel_identity.stable
      - channel_identity.preview
    ownership_rows:
      - axis: durable_state_roots
        owning_channel_class: per_channel_isolated
        owning_state_root_refs:
          - state.per_user_configuration_root.stable
          - state.per_user_recovery_root.stable
          - state.per_user_derived_cache_root.stable
          - state.per_user_keychain_or_secret_store.stable
          - state.per_user_configuration_root.preview
          - state.per_user_recovery_root.preview
          - state.per_user_derived_cache_root.preview
          - state.per_user_keychain_or_secret_store.preview
        notes: >
          Stable and Preview own disjoint per-user roots; neither
          channel reads or writes the other channel's roots by default.
      - axis: update_markers
        owning_channel_class: per_channel_isolated
        update_marker_ownership_class: per_channel_under_binary_root
        update_marker_refs:
          - update_marker.stable
          - update_marker.preview
      - axis: recent_item_registrations
        owning_channel_class: per_channel_isolated
        recent_item_registration_class: per_channel_under_user_profile
        recent_item_registration_refs:
          - recent_items.stable
          - recent_items.preview
      - axis: file_association_candidates
        owning_channel_class: per_channel_isolated
        file_association_registration_class: user_or_admin_selectable_candidate_handler
        file_association_refs:
          - file_association.stable
          - file_association.preview
      - axis: protocol_handler_schemes
        owning_channel_class: per_channel_isolated
        protocol_handler_ownership_class: per_channel_suffixed_scheme
        protocol_handler_refs:
          - protocol_handler.stable
          - protocol_handler.preview
      - axis: protocol_handler_schemes
        owning_channel_class: shared_under_user_or_admin_choice
        protocol_handler_ownership_class: shared_scheme_with_user_or_admin_default
        protocol_handler_refs:
          - protocol_handler.shared_aureline_default
        required_operator_choice: shared_protocol_default_channel
      - axis: keychain_service_names
        owning_channel_class: per_channel_isolated
        keychain_service_naming_class: per_channel_suffixed_service_name
        state_root_refs:
          - state.per_user_keychain_or_secret_store.stable
          - state.per_user_keychain_or_secret_store.preview
      - axis: diagnostics_paths
        owning_channel_class: per_channel_isolated
        diagnostics_path_ownership_class: per_channel_diagnostics_export
        diagnostics_export_classes:
          - install_topology_record_available
          - exact_build_manifest_available
          - state_root_audit_available
      - axis: support_bundle_scope
        owning_channel_class: per_channel_isolated
        notes: >
          Support exports stay in the family for whichever channel
          produced the bundle; Stable and Preview support bundles MUST
          NOT be merged.
    collision_risks:
      - read_other_channel_mutable_state_by_default
      - write_other_channel_update_marker
      - last_writer_wins_file_association
      - last_writer_wins_shared_protocol_scheme
      - merge_recent_items_without_review
    required_operator_choices:
      - shared_protocol_default_channel
      - default_file_handler_channel
    fixture_refs:
      - fixtures/release/install_truth_cases/desktop_stable_about_truth.yaml
      - fixtures/release/install_truth_cases/desktop_preview_side_by_side_about_truth.yaml
      - fixtures/release/install_matrix_cases/stable_preview_desktop_coexistence.yaml
    status: proposed

  - id: channel_ownership_audit:stable_and_beta
    side_by_side_relation_class: stable_and_beta
