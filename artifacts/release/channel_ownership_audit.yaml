# -----------------------------------------------------------------------------
# Audit assertions.
#
# Statements a reviewer can check mechanically against the rows above.
# Each assertion projects a rule that the truth packet pins.
# -----------------------------------------------------------------------------
audit_assertions:
  - id: every_admitted_relation_has_an_audit_row
    description: >
      Every side_by_side_relation_class value other than none that
      appears on at least one card in
      artifacts/release/install_topology_matrix.yaml has exactly one
      audit row in this file.
  - id: no_axis_owned_by_two_channels
    description: >
      Within a single audit row, no separation axis carries two
      ownership_rows that name the same owning_channel_class. A pair
      that genuinely shares an axis MUST use
      shared_under_user_or_admin_choice.
  - id: shared_default_handler_requires_explicit_choice
    description: >
      Any audit row whose ownership_rows include a
      shared_under_user_or_admin_choice entry MUST list
      shared_protocol_default_channel and / or
      default_file_handler_channel in required_operator_choices, and
      the matching install summary MUST disclose the choice.
  - id: portable_pairings_suppress_host_axes
    description: >
      Audit rows whose coexisting_channels include a portable channel
      MUST list ownership_rows for host_file_associations_suppressed,
      host_protocol_handlers_suppressed, and host_services_suppressed
      with portable_stable (or portable_preview) as the owning channel
      and registration_class not_registered.
  - id: managed_pairings_pin_admin_boundary
    description: >
      Audit rows whose coexistence_rule_ref is
      coexistence_rule.managed_portable_admin_boundary MUST cite
      managed_policy_root, managed_fleet_update_marker, and
      portable_colocated_state_root ownership rows with disjoint
      owning_channel_class values, and MUST cite
      managed_uninstall_deletes_portable_root in collision_risks.
  - id: collision_risks_are_subset_of_coexistence_forbidden_behaviors
    description: >
      Every collision_risk token in an audit row appears verbatim in
      the matching coexistence_rule.forbidden_behaviors set in
      artifacts/release/channel_identity_and_state_roots.yaml. Tooling
      MAY validate this by joining the two files on
      coexistence_rule_ref.

