      exact_build_identity_ref: null
      build_id: null
      artifact_family_ref: artifact_family.windows.msi
    updater_owner_class: managed_fleet
    binary_root_class: per_machine_program_area
    durable_state_root_refs:
      - state.per_user_configuration_root.stable
      - state.per_user_recovery_root.stable
      - state.per_user_derived_cache_root.stable
      - state.per_machine_shared_data_root.stable
