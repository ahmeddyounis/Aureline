# Install-topology state-root map.
#
# Machine-readable companion to docs/release/install_topology_plan.md
# and artifacts/release/install_topology_matrix.yaml. Pins one
# state_root_record per (durable_state_root_class, channel_class) pair
# every install-profile card reads, plus per-channel separation rules
# for state roots, update markers, recent-item registration, file
# associations, and deep-link / protocol-handler ownership.
#
# Tooling reads this file; docs/release/install_topology_plan.md is
# the narrative companion. If the two disagree, the plan wins and this
# file must be updated in the same change. Concrete per-host-OS paths
# are deliberately deferred to the install lane; this milestone pins
# the class set and the per-channel separation rules so installers,
# diagnostics, repair, and support surfaces read one truth instead of
# inventing a parallel dialect.

schema_version: 1
status: seeded

plan_source: docs/release/install_topology_plan.md
packaging_installation_matrix_source: docs/release/packaging_installation_matrix.md
channel_identity_state_roots_source: artifacts/release/channel_identity_and_state_roots.yaml
install_topology_matrix_source: artifacts/release/install_topology_matrix.yaml
silent_deployment_seed_source: artifacts/release/silent_deployment_seed.yaml
portable_profile_state_map_source: docs/state/profile_and_state_map.md
exact_build_identity_schema: schemas/build/exact_build_identity.schema.json

related_normative_sources:
  - path: .t2/docs/Aureline_Technical_Architecture_Document.md
    anchors:
      - "§25.9 Install, portable-mode, and fleet-rollout architecture"
      - "Appendix BA platform installation matrix and fleet rollout rings"
  - path: .t2/docs/Aureline_Milestones_Document.md
    anchors:
      - "§6.18 install and update behaviour as product truth"
  - path: .t2/docs/Aureline_UI_UX_Spec_Document.md
    anchors:
      - "§6.12 About, update, and diagnostics surfaces"

