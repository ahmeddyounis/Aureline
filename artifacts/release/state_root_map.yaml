# -----------------------------------------------------------------------------
# Per-channel separation rules.
#
# Authoritative list. Every install-profile card whose
# side_by_side_relation_class is any value other than none MUST
# respect every rule below; cards that cannot are non-conforming.
# -----------------------------------------------------------------------------
per_channel_separation_rules:
  - id: state_roots_per_channel
    description: >
      Every durable state root carries exactly one owning_channel unless
      the row is flagged shared_across_channels: true with a named
      reason (for example a platform keychain read-only to Aureline).
      Stable MUST NOT read or write preview durable state roots, and
      vice versa; portable MUST NOT read or write any installed
      channel's durable state roots.
    collision_policy: no_shared_durable_state_across_channels
  - id: update_markers_per_channel
    description: >
      Every channel owns a distinct update-marker file under its own
      binary root or durable state root. No channel reads or writes
      another channel's update-marker. Portable's update marker lives
      under the portable root; it does not touch any machine-global
      update-marker.
    collision_policy: no_shared_durable_state_across_channels
  - id: recent_item_registration_per_channel
    description: >
      Each channel registers recent items under its own channel-
      suffixed namespace. A side-by-side install renders two recent-
      item lists, not one merged list. Portable mode MUST NOT write
      recent-item registrations into any machine-global OS recent-
      items list.
    collision_policy: no_shared_durable_state_across_channels
  - id: file_associations_never_last_writer_wins
    description: >
      Each channel's installer MAY register as a candidate handler for
      a given file extension; the default handler is user- or admin-
      selectable. The installer MUST NOT silently override an existing
      default handler. Portable mode MUST NOT register any file
      association on the host.
    collision_policy: no_shared_durable_state_across_channels
  - id: protocol_handlers_per_channel_suffixed_scheme
    description: >
      Each channel registers its protocol handler under a channel-
      suffixed URL scheme (for example aureline-stable:// and
      aureline-preview://). A shared aureline:// scheme resolves to
      the user-or-admin selected default; installers MUST NOT silently
      claim the shared scheme. Portable mode MUST NOT register any
      protocol handler on the host.
    collision_policy: no_shared_durable_state_across_channels
  - id: silent_deployment_return_code_families_channel_agnostic
    description: >
      Every claimed channel on every claimed install mode resolves
      unattended install, update, pin, rollback, and uninstall
      outcomes into one of the return-code families frozen in
      silent_deployment_seed.yaml. The channel is carried on the
      install-profile card, not the return code; return-code families
      are channel-agnostic.
    collision_policy: no_shared_durable_state_across_channels

# -----------------------------------------------------------------------------
# State-root rows.
#
# One row per (durable_state_root_class, channel_class) pair admitted
# by the install-topology matrix. Rows are ordered by durable-state-
# root class and then by channel.
# -----------------------------------------------------------------------------
state_roots:

  # ---------------------------------------------------------------------------
  # User-authored workspace files (outside the install tree).
  #
  # These are the user's own source files and workspace repository;
  # they live wherever the user puts them. Every channel reads this
  # row because it is the product's hero surface and is not owned by
  # any install tree. The row is flagged shared_across_channels: true
  # because the user's workspace is not per-channel state.
  # ---------------------------------------------------------------------------
  - id: state.user_authored_workspace_files_outside_install_tree
    durable_state_root_class: user_authored_workspace_files_outside_install_tree
    owning_channels: []
    shared_across_channels: true
    shared_reason: >
      The user's workspace repository is not per-channel state; every
      install reads the user's source files from wherever the user
      puts them. No install tree owns this row.
    authority_class: user_authored_durable_truth
    scriptability_class: cli_exposed
    diagnostics_visibility_class: exposed_in_support_bundle
    repair_verify_class: not_repairable
    exact_build_install_diagnostic_class: exact_build_manifest_not_applicable
    path_class_placeholder: user_workspace_repository_root
    collision_policy: shared_across_channels_read_only_platform_resource
    status: proposed

  # ---------------------------------------------------------------------------
  # Per-user configuration root (one row per channel).
  # ---------------------------------------------------------------------------
  - id: state.per_user_configuration_root.stable
    durable_state_root_class: per_user_configuration_root
    owning_channels: [stable]
    shared_across_channels: false
    authority_class: user_authored_durable_truth
    scriptability_class: cli_exposed
    diagnostics_visibility_class: exposed_in_about
    repair_verify_class: doctor_repairable
    exact_build_install_diagnostic_class: exact_build_manifest_present
    path_class_placeholder: per_user_configuration_root_stable
