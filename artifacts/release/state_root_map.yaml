# -----------------------------------------------------------------------------
# Per-channel resource ownership rows.
#
# Non-durable-state resources that still collide across channels:
# update markers, recent-item registration, file associations, deep-
# link / protocol-handler ownership. One row per channel so tooling can
# validate that side-by-side cards do not silently corrupt each other's
# markers.
# -----------------------------------------------------------------------------
update_markers:
  - channel_class: stable
    ownership_class: per_channel_under_binary_root
    path_class_placeholder: update_marker_stable
  - channel_class: preview
    ownership_class: per_channel_under_binary_root
    path_class_placeholder: update_marker_preview
  - channel_class: beta
    ownership_class: per_channel_under_binary_root
    path_class_placeholder: update_marker_beta
  - channel_class: lts
    ownership_class: per_channel_under_admin_policy_root
    path_class_placeholder: update_marker_lts
  - channel_class: portable_stable
    ownership_class: per_channel_under_portable_root
    path_class_placeholder: update_marker_portable_stable
  - channel_class: portable_preview
    ownership_class: per_channel_under_portable_root
    path_class_placeholder: update_marker_portable_preview

recent_item_registrations:
  - channel_class: stable
    registration_class: per_channel_under_user_profile
    namespace_placeholder: recent_items_stable
  - channel_class: preview
    registration_class: per_channel_under_user_profile
    namespace_placeholder: recent_items_preview
  - channel_class: beta
    registration_class: per_channel_under_user_profile
    namespace_placeholder: recent_items_beta
  - channel_class: lts
    registration_class: per_channel_under_user_profile
    namespace_placeholder: recent_items_lts
  - channel_class: portable_stable
    registration_class: per_channel_under_portable_root
    namespace_placeholder: recent_items_portable_stable
  - channel_class: portable_preview
    registration_class: per_channel_under_portable_root
    namespace_placeholder: recent_items_portable_preview

file_associations:
  - channel_class: stable
    registration_class: user_or_admin_selectable_candidate_handler
    default_handler_selection_rule: user_or_admin_selectable_never_last_writer_wins
  - channel_class: preview
    registration_class: user_or_admin_selectable_candidate_handler
    default_handler_selection_rule: user_or_admin_selectable_never_last_writer_wins
  - channel_class: beta
    registration_class: user_or_admin_selectable_candidate_handler
    default_handler_selection_rule: user_or_admin_selectable_never_last_writer_wins
  - channel_class: lts
    registration_class: admin_only_default_handler
    default_handler_selection_rule: admin_only
  - channel_class: portable_stable
    registration_class: not_registered
    default_handler_selection_rule: not_applicable
  - channel_class: portable_preview
    registration_class: not_registered
    default_handler_selection_rule: not_applicable

protocol_handlers:
  - channel_class: stable
    ownership_class: per_channel_suffixed_scheme
    scheme_placeholder: aureline-stable
  - channel_class: preview
    ownership_class: per_channel_suffixed_scheme
    scheme_placeholder: aureline-preview
  - channel_class: beta
    ownership_class: per_channel_suffixed_scheme
    scheme_placeholder: aureline-beta
  - channel_class: lts
    ownership_class: per_channel_suffixed_scheme
    scheme_placeholder: aureline-lts
  - channel_class: portable_stable
    ownership_class: not_registered
    scheme_placeholder: not_applicable
  - channel_class: portable_preview
    ownership_class: not_registered
    scheme_placeholder: not_applicable

shared_scheme_default_resolution:
  shared_scheme_placeholder: aureline
  default_resolution_rule: user_or_admin_selected_default
  default_resolution_forbidden_rule: no_silent_claim_of_shared_scheme
  wrong_target_behavior: return_typed_result_code_do_not_redirect

# -----------------------------------------------------------------------------
# Coverage index.
#
# Cross-reference: every durable_state_root_ref on every install-profile
# card in install_topology_matrix.yaml MUST resolve to a state_root id
# here. Adding a state-root class is additive-minor; adding a channel
