# Reviewer example: state migration, older schema read by a newer binary.
#
# Companion to fixtures/release/skew_cases/state_migration_old_to_new_additive.yaml
# and docs/release/skew_smoke_packet.md.

reviewer_example:
  name: state_migration_old_to_new_additive
  surface: state_schema_migration
  skew_state: repairable
  outcome_label: upgrade_applied_compatible
  promotion_decision: ship_narrowed_claim
  one_paragraph_each:
    which_surface: >
      State-schema migration. Producer and consumer share one additive
      profile_layout schema epoch; the consumer is newer.
    which_state: >
      Repairable. The restore-provenance record labels the restore as
      compatible (not exact) because additive fields were introduced
      after the producer ran; derived indexes regenerate via the
      cache/index repair rung.
    user_experience: >
      The newer build loaded the older profile and layout. Authored
      work, trust, credentials, managed policy, and session-restore
      intent stayed untouched; derived indexes rebuild in the
      background before auto-reopen resumes.
    report_and_support_routing: >
      Quotes compat_row:state.profile_layout_schema and
      skew_case:state.profile_same_epoch_or_additive. Routes through
      exact_build_support plus compatibility_report. Recovery rung:
      recovery_action:cache_reset_candidate.cache_index_repair.
    promotion_decision_rationale: >
      Ship with narrowed claim. Additive migration is supported, but
      release wording MUST say "compatible restore, derived indexes
      regenerate" rather than implying exact parity.

schema_version: 1
record_kind: skew_smoke_case_record
skew_case_id: skew_case:release.state_schema.old_to_new_additive

surface_class: state_schema_migration
skew_state_class: repairable
outcome_label_class: upgrade_applied_compatible
blocked_vs_degraded_class: degraded_capability_subset
promotion_decision_class: ship_narrowed_claim

compatibility_row_ref: compat_row:state.profile_layout_schema
version_skew_register_ref: skew_case:state.profile_same_epoch_or_additive

install_topology_refs: []

state_migration_refs:
  - fixtures/state/migration_cases/profile_restore_compatible_schema_shift.json
  - schemas/state/restore_provenance.schema.json

helper_agent_refs: []

support_packet_routing_classes:
  - exact_build_support
  - compatibility_report

preserved_state_classes:
  - user_authored_files
  - open_buffer_selection
  - workspace_trust_store
  - credential_store
  - managed_policy_overrides
  - session_restore_store

capability_impact_classes:
  - background_rebuild
  - session_restore_auto_reopen

recovery_rung_ref: recovery_action:cache_reset_candidate.cache_index_repair

explanation_fields:
  user_facing_summary: >
    The newer build loaded your older profile and layout. Authored
    work, trust, credentials, managed policy, and session-restore
    intent all remained untouched; derived indexes are being rebuilt
    in the background before auto-reopen resumes.
  compatibility_report_summary: >
    Compatibility report records a compatible restore against the
    profile_layout_schema row with an additive-only window and a
    named degraded capability subset.
  support_summary: >
    Support exports carry the restore-provenance record so reviewers
    can tell why the restore downgraded from exact to compatible.
  promotion_summary: >
    Case ships with a narrowed claim: additive migration is
    supported; release wording MUST NOT imply exact parity.

emitted_at: "2026-04-23T00:00:00Z"
