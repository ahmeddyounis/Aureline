# Reviewer example: side-by-side install, stable and preview channels coexist.
#
# Companion to fixtures/release/skew_cases/side_by_side_stable_preview_coexist.yaml
# and docs/release/skew_smoke_packet.md. Shaped so compatibility
# reports, support exports, and shiproom reviewers can read five
# paragraphs per case without re-describing skew.

reviewer_example:
  name: side_by_side_stable_preview_coexist
  surface: side_by_side_install
  skew_state: compatible
  outcome_label: side_by_side_coexist_ok
  promotion_decision: promote
  one_paragraph_each:
    which_surface: >
      Side-by-side install. Two channels coexist on one host; the
      install-topology matrix pins a non-none side_by_side_relation_class
      on both install-profile cards.
    which_state: >
      Compatible. Both channels own disjoint durable state roots and
      update markers per the state-root map, so no capability is
      narrowed by their coexistence.
    user_experience: >
      Stable and preview channels run together. Each channel keeps
      its own settings, layout, session-restore store, and file
      associations; nothing is merged across channels.
    report_and_support_routing: >
      Quotes compat_row:deployment_profiles.boundary_manifest_truth
      and skew_case:deployment_profiles.shared_profile_ids_and_drill_refs
      from the qualification matrix and version-skew register. Routes
      through exact_build_support plus compatibility_report families.
    promotion_decision_rationale: >
      Promote-eligible. Release evidence cites one install_profile_card
      per channel and both rows appear in the compatibility report
      without narrowing claims.

schema_version: 1
record_kind: skew_smoke_case_record
skew_case_id: skew_case:release.side_by_side.stable_preview_coexist

surface_class: side_by_side_install
skew_state_class: compatible
outcome_label_class: side_by_side_coexist_ok
blocked_vs_degraded_class: not_applicable_compatible
promotion_decision_class: promote

compatibility_row_ref: compat_row:deployment_profiles.boundary_manifest_truth
version_skew_register_ref: skew_case:deployment_profiles.shared_profile_ids_and_drill_refs

install_topology_refs:
  - artifacts/release/install_topology_matrix.yaml#install_profile_card:stable
  - artifacts/release/install_topology_matrix.yaml#install_profile_card:preview
  - artifacts/release/state_root_map.yaml

state_migration_refs: []
helper_agent_refs: []

support_packet_routing_classes:
  - exact_build_support
  - compatibility_report

preserved_state_classes:
  - user_authored_files
  - durable_workspace_indexes
  - workspace_trust_store
  - credential_store
  - managed_policy_overrides
  - session_restore_store

capability_impact_classes: []

recovery_rung_ref: null

explanation_fields:
  user_facing_summary: >
    Stable and preview channels run side by side. Each channel keeps
    its own settings, layout, session-restore store, and file
    associations; nothing is merged across channels.
  compatibility_report_summary: >
    The compatibility report keeps one row per channel sharing the
    deployment-profile vocabulary; both channels report compatible
    skew because state roots and update markers are disjoint.
  support_summary: >
    Support exports stay in the exact-build support family for
    whichever channel produced the bundle; no cross-channel redaction
    rewrite is required.
  promotion_summary: >
    Side-by-side coexistence is promote-eligible. Release packet
    cites one install_profile_card per channel without narrowing
    claims.

emitted_at: "2026-04-23T00:00:00Z"
