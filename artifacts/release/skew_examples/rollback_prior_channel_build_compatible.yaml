# Reviewer example: rollback to a prior channel/build on one host.
#
# Companion to fixtures/release/skew_cases/rollback_prior_channel_build_compatible.yaml
# and docs/release/skew_smoke_packet.md.

reviewer_example:
  name: rollback_prior_channel_build_compatible
  surface: downgrade_upgrade_rollback
  skew_state: compatible
  outcome_label: rollback_applied
  promotion_decision: promote
  one_paragraph_each:
    which_surface: >
      Downgrade/upgrade/rollback. One host rolls back to a previously
      installed build of the same channel (or pivots across channels
      through the rollback-reinstall flow).
    which_state: >
      Compatible. The target build resolves to a coordinated artifact
      set, state-root ownership is preserved, and the rollback
      transaction is reversible.
    user_experience: >
      The prior build is restored. Authored files, trust, credentials,
      managed policy, and the session-restore store remain untouched;
      derived indexes and auto-reopen refresh once the rolled-back
      build is running.
    report_and_support_routing: >
      Quotes compat_row:release_identity.exact_build_propagation and
      skew_case:release_identity.same_artifact_set. Routes through
      exact_build_support plus rollback_review plus compatibility_report.
    promotion_decision_rationale: >
      Promote-eligible. Release evidence cites the prior and target
      exact_build_identity refs plus the rollback atom reference from
      the artifact-family map.

schema_version: 1
record_kind: skew_smoke_case_record
skew_case_id: skew_case:release.rollback.prior_channel_build_compatible

surface_class: downgrade_upgrade_rollback
