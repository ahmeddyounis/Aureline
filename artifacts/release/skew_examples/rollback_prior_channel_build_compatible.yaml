  - exact_build_support
  - rollback_review
  - compatibility_report

preserved_state_classes:
  - user_authored_files
  - open_buffer_selection
  - durable_workspace_indexes
  - workspace_trust_store
  - credential_store
  - managed_policy_overrides
  - session_restore_store
  - support_export_store

capability_impact_classes:
  - background_rebuild
  - session_restore_auto_reopen

recovery_rung_ref: null

explanation_fields:
  user_facing_summary: >
    The prior build is restored. Authored files, trust, credentials,
    managed policy, and the session-restore store stay untouched;
    derived indexes and auto-reopen refresh once the rolled-back
    build is running.
  compatibility_report_summary: >
    Compatibility report records a supported rollback against the
    exact-build-propagation row; coordinated artifact set keeps
    binaries, symbols, docs/help, and release-evidence rows resolving
    through one identity chain.
  support_summary: >
    Support exports route through exact-build support and rollback-
    review so debug symbols and release-evidence linkage stay
    available for both build identities.
  promotion_summary: >
    Promote-eligible. Release evidence cites prior and target
    exact_build_identity refs plus the rollback atom reference.

