explanation_fields:
  user_facing_summary: >
    The older build cannot safely read the newer profile and layout.
    Authored work is preserved, session restore is declined, and the
    user is offered open-without-restore instead.
  compatibility_report_summary: >
    Compatibility report marks the combination unsupported under the
    profile_layout_schema row with outside-window posture
    explicitly_unsupported.
  support_summary: >
    Support exports route through exact-build support and MAY route
    to advisory/revocation when the older build is still live.
  promotion_summary: >
    No-go. Release wording and the shiproom packet MUST cite this
    skew case and route through the advisory or revocation lane.

