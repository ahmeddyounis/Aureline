# Reviewer example: state migration, newer schema presented to an older binary.
#
# Companion to fixtures/release/skew_cases/state_migration_new_to_old_blocked.yaml
# and docs/release/skew_smoke_packet.md.

reviewer_example:
  name: state_migration_new_to_old_blocked
  surface: state_schema_migration
  skew_state: blocked
  outcome_label: downgrade_blocked_newer_schema
  promotion_decision: no_go
  one_paragraph_each:
    which_surface: >
      State-schema migration. Producer is newer than the additive
      tolerance the consumer can interpret; the direction is new-to-
      old.
    which_state: >
      Blocked. The surface refuses to mutate user truth and prefers an
      explicit read-only or declined-restore path rather than a
      silent partial restore.
    user_experience: >
      The older build cannot safely read the newer profile and layout
      state. Authored work is preserved, session restore is declined,
      and the user is offered open-without-restore instead.
    report_and_support_routing: >
      Quotes compat_row:state.profile_layout_schema and
      skew_case:state.profile_excluded_or_admin_owned_treated_as_portable.
      Routes through exact_build_support plus advisory_or_revocation.
      Recovery rung: recovery_action:open_without_restore.session_restore_declined.
    promotion_decision_rationale: >
      No-go for any release path that would promote the older build
      as newer-schema compatible. Release wording MUST cite this skew
      case and route through the advisory/revocation lane.

schema_version: 1
record_kind: skew_smoke_case_record
skew_case_id: skew_case:release.state_schema.new_to_old_blocked

