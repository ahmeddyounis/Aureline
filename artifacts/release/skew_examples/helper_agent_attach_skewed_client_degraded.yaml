# Reviewer example: helper/agent attach against a skewed client, review-only degradation.
#
# Companion to fixtures/release/skew_cases/helper_agent_attach_skewed_client_degraded.yaml
# and docs/release/skew_smoke_packet.md.

reviewer_example:
  name: helper_agent_attach_skewed_client_degraded
  surface: helper_agent_attach
  skew_state: degraded
  outcome_label: attach_degraded_review_only
  promotion_decision: ship_narrowed_claim
  one_paragraph_each:
    which_surface: >
      Helper/agent attach. Both sides are inside the declared adjacent
      window; the client is lagging within that window and the
      capability intersection narrows to review-only.
    which_state: >
      Degraded with a named capability subset: read, search, and
      approval preview keep working; write-capable paths, mutation,
      and AI runtime access stay disabled.
    user_experience: >
      Remote attach connected but narrowed to review-only. Reads,
      search, and approval preview work; writes and AI runtime paths
      stay disabled until the client is updated or the agent is
      narrowed.
    report_and_support_routing: >
      Quotes compat_row:remote.attach_envelope_and_drift and
      skew_case:remote.attach_review_only_downgrade. Routes through
      exact_build_support plus compatibility_report plus
      object_issue_handoff when a specific review-only action is the
      subject.
    promotion_decision_rationale: >
      Ship with narrowed claim. Review-only remote attach is
      supported; release wording MUST NOT imply full mutation parity.

