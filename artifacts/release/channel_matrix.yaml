# Release channel and branch matrix.
#
# Machine-readable companion to docs/release/channel_and_branch_contract.md.
# Each channel_row binds one release channel to one branch class, one
# pipeline lane, one rollback-target band, one downgrade posture, one
# side-by-side admission set, and one freeze-posture admission set. The
# narrative document is the story; this matrix is what tooling reads.
# If the two disagree, the narrative wins and this file must be updated
# in the same change.
#
# Scope. This matrix freezes the channel-and-branch contract so release,
# install-topology, side-by-side, support, and fleet surfaces can resolve
# "which channel is moving, off which branch, into which lane, with what
# downgrade and side-by-side semantics, under what freeze posture?"
# without inventing per-subsystem dialects. It does NOT implement a
# release pipeline or a branch policy enforcer; it states the row shape
# and the closed admissibility rules every later release lane must
# honour.
#
# Rules.
#   - Every channel_row MUST name exactly one channel_class drawn from
#     the schemas/build/exact_build_identity.schema.json release-channel
#     vocabulary (plus the two portable-channel rows the install-topology
#     matrix admits). Inventing a new channel value is breaking and
#     opens a decision row in artifacts/governance/decision_index.yaml.
#   - Every channel_row MUST bind exactly one branch_class_ref into
#     branch_class_vocabulary. Branch classes are not free-text branch
#     names; they are stable refs.
#   - Every channel_row MUST bind exactly one pipeline_lane_ref into
#     artifacts/release/pipeline_lane_rules.yaml. Lane choice is
#     channel-determining at promotion time.
#   - rc_candidate is a review-stage label, not a channel. It does not
#     appear in channel_class_vocabulary; the release_review_stage
#     section pins how an existing channel-bound build set may carry the
#     rc_candidate label.
#   - Every channel_row MUST declare a downgrade_posture_class drawn
#     from the closed downgrade_posture_class_vocabulary. Downgrade is
#     never an accidental capability; rows that elide the slot are
#     non-conforming.
#   - Every channel_row MUST name a last_known_good_repair_path_class
#     drawn from the closed vocabulary so failed updates resolve into
#     one named recovery flow rather than ad hoc rollback prose.
#   - Every channel_row MUST list the freeze postures it remains
#     admissible under. A channel that elides freeze admission is
#     non-conforming.
#   - Side-by-side admission is mechanically derived from
#     state_root_map.yaml: stable and preview do not write each other's
#     durable state roots, update markers, recent-item registrations,
#     file-association handlers, or protocol-handler schemes. Cards
#     that would collide are non-conforming by construction in
#     state_root_map.yaml; this matrix re-declares the admission
#     vocabulary so reviewers can read promotion against one row.
#   - Milestone slugs MUST NOT appear in any id, path, or description
#     field.
#   - Adding a vocabulary value is additive-minor and requires bumping
#     schema_version and updating the narrative contract in the same
#     change. Repurposing an existing value is breaking.

schema_version: 1
matrix_id: aureline.release_channel_matrix
status: seeded

contract_doc_ref: docs/release/channel_and_branch_contract.md
artifact_family_versioning_ref: artifacts/release/artifact_family_versioning.yaml
governing_adr_ref: docs/adr/0017-release-posture-artifact-families-and-promotion-gates.md

artifact_family_map_ref: artifacts/release/artifact_family_map.yaml
promotion_gate_map_ref: artifacts/release/promotion_gate_map.yaml
pipeline_lane_rules_ref: artifacts/release/pipeline_lane_rules.yaml
ring_matrix_ref: artifacts/release/ring_matrix.yaml
