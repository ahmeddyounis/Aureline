install_topology_matrix_ref: artifacts/release/install_topology_matrix.yaml
install_topology_plan_ref: docs/release/install_topology_plan.md
state_root_map_ref: artifacts/release/state_root_map.yaml
silent_deployment_seed_ref: artifacts/release/silent_deployment_seed.yaml
exact_build_identity_schema_ref: schemas/build/exact_build_identity.schema.json
exact_build_identity_model_ref: docs/build/exact_build_identity_model.md
