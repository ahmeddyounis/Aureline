# -----------------------------------------------------------------------------
# Ring promotion evidence.
#
# Minimum evidence required before a build may advance from a ring to
# the next ring. Ring promotion decisions are recorded in
# artifacts/governance/decision_index.yaml; the ring set here is
# authoritative for tooling.
# -----------------------------------------------------------------------------
ring_promotion_evidence:
  - ring: canary
    admissible_channels: [stable, preview, beta]
    required_evidence:
      - install_smoke_every_claimed_platform
      - launch_smoke_every_claimed_platform
      - uninstall_smoke_every_claimed_platform
      - rollback_smoke_every_claimed_platform
      - policy_or_bootstrap_bundle_present_check
      - exact_build_identity_propagation_check
    admissible_rollback_targets:
      - previous_build_same_channel
      - out_of_ring
      - unsupported
  - ring: pilot
    admissible_channels: [stable, preview, beta]
    required_evidence:
      - canary_evidence_present
      - side_by_side_coexistence_drill
      - support_bundle_install_diagnostics_probe
      - deprovision_rollback_drill
    admissible_rollback_targets:
      - previous_build_same_channel
      - last_broad_cut_same_channel
      - unsupported
  - ring: broad
    admissible_channels: [stable, preview]
    required_evidence:
      - pilot_evidence_present
      - green_release_evidence_promotion_per_profile_card
      - current_install_topology_matrix_attached
    admissible_rollback_targets:
      - previous_build_same_channel
      - last_broad_cut_same_channel
      - unsupported
  - ring: lts
    admissible_channels: [lts]
    required_evidence:
      - broad_evidence_present
      - explicit_rollback_target_declared
      - migration_notes_published
      - offline_or_mirror_compatibility_proof_present
      - policy_bundle_compatibility_proof_present
    admissible_rollback_targets:
      - previous_build_same_channel
      - channel_lts_floor
      - admin_pinned_target
      - unsupported

# -----------------------------------------------------------------------------
# Rules pinned on the matrix.
# -----------------------------------------------------------------------------
rules:
  - id: no_shared_durable_state_across_channels
    description: >
      A row whose side_by_side_relation_class is any value other than
      none MUST collide on zero durable state roots with any row of a
      different channel_class. Cross-channel state sharing is only
      admissible on a state_root_map row explicitly flagged
      shared_across_channels: true with a named reason.
  - id: portable_no_machine_global_mutation
    description: >
      A row whose install_mode_class is portable MUST NOT register any
      file association, protocol handler, machine-global recent-item
      list entry, or update marker outside the portable directory.
  - id: no_last_writer_wins_for_associations
    description: >
      A row MUST NOT silently override an existing default file
      association or default protocol handler on the host. Default
      handler selection is user-or-admin-selectable and last-writer-
      wins is forbidden.
  - id: managed_fleet_requires_package_report
    description: >
      A row whose updater_owner_class is managed_fleet MUST carry a
      managed_package_report_class of available or reserved. A row
      with not_applicable is non-conforming.
  - id: external_package_manager_suppresses_in_product_update
    description: >
      A row whose updater_owner_class is external_package_manager MUST
      suppress in-product auto-update and rely on the package manager's
      update path.
  - id: diagnostics_minimum
    description: >
      Every row MUST expose at least install_topology_record_available
      and exact_build_manifest_available. Rows that cannot are
      non-conforming at this milestone.
  - id: rollback_target_must_match_ring
    description: >
      Every row's rollback_target_class MUST be one of the admissible
      rollback targets for the row's rollout_ring_class in
      ring_promotion_evidence. Cards with a mismatched rollback target
      are non-conforming.
  - id: lts_requires_admin_or_managed_updater
    description: >
      A row whose channel_class is lts MUST carry updater_owner_class
      in {admin, managed_fleet, external_package_manager}. lts on a
      user-owned updater is non-conforming.
  - id: exact_build_identity_ref_reserved
    description: >
      Every row MUST carry a running_build_identity_ref slot resolvable
      against schemas/build/exact_build_identity.schema.json. The slot
      is reserved (null) at this milestone; rows that elide the slot
      entirely are non-conforming.

