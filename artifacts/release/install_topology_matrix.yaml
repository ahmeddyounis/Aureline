# Install-topology matrix.
#
# Machine-readable companion to docs/release/install_topology_plan.md.
# One install_profile_card_record per (install_mode_class,
# channel_class, platform_class, architecture_class) tuple. Tooling
# reads this file; the normative plan is the narrative companion. If
# the two disagree, the plan wins and this file must be updated in the
# same change.
#
# Scope. This matrix pins the install-profile card fields that every
# release, fleet, About / Help, support-bundle, and diagnostics surface
# reads before describing "the install" to a human or to an enterprise
# deployment tool. It does NOT implement an installer, updater, or
# fleet tool; it only records the vocabulary and the row shape.
#
# Rules.
#   - Every row MUST name exactly one install_mode_class, channel_class,
#     platform_class, architecture_class, updater_owner_class,
#     binary_root_class, side_by_side_relation_class,
#     rollout_ring_class, silent_install_support_class,
#     managed_package_report_class, publication_posture_class,
#     policy_injection_class, and cli_scriptability_class.
#   - Every row MUST name one or more durable_state_root_refs resolving
#     into state_root_map.yaml; zero durable state roots is
#     non-conforming.
#   - Every row MUST carry a running_build_identity_ref slot into
#     schemas/build/exact_build_identity.schema.json. The slot is
#     reserved (null) at this milestone; the plan pins it for every
#     row so install diagnostics do not re-invent version semantics.
#   - A row whose side_by_side_relation_class is any value other than
#     none MUST collide on zero durable state roots with any other row
#     of a different channel_class. The state-root map enforces this
#     by pinning owning_channels on every row.
#   - Missing fields are validation failures; "version-only fallback"
#     is forbidden by rule (the card resolves into one exact-build
#     identity, not a free-text version string).
#   - Milestone slugs MUST NOT appear in any id, path, or description
#     field.
#   - Adding a vocabulary value is additive-minor and requires bumping
#     schema_version and updating the narrative plan in the same
#     change. Repurposing an existing value is breaking and opens a
#     decision row in artifacts/governance/decision_index.yaml.

schema_version: 1
status: seeded

plan_source: docs/release/install_topology_plan.md
state_root_map_source: artifacts/release/state_root_map.yaml
silent_deployment_seed_source: artifacts/release/silent_deployment_seed.yaml
exact_build_identity_schema: schemas/build/exact_build_identity.schema.json
portable_profile_state_map_source: docs/state/profile_and_state_map.md
boundary_manifest_source: docs/product/boundary_manifest_strawman.md

related_normative_sources:
  - path: .t2/docs/Aureline_Technical_Architecture_Document.md
    anchors:
      - "§25.9 Install, portable-mode, and fleet-rollout architecture"
      - "Appendix BA platform installation matrix and fleet rollout rings"
      - "§B.2 stable CLI exit-code family"
  - path: .t2/docs/Aureline_Milestones_Document.md
    anchors:
      - "§6.18 install and update behaviour as product truth"
  - path: .t2/docs/Aureline_UI_UX_Spec_Document.md
    anchors:
      - "§6.12 About, update, and diagnostics surfaces"
  - path: .t2/docs/Aureline_PRD.md
    anchors:
      - "§9.12 enterprise deployment hooks"

