# This manifest is the release-facing source of truth for the first
# clean-room, mirror-only, deny-all, and offline-verification rehearsal over
# the alpha artifact family. It is deliberately a dry-run packet: it does not
# publish channel pointers, sign package bytes, or claim live advisory or
# revocation freshness when the evidence is only mirrored or bundled.

