publication_postures:
  - posture_id: publication_posture:mirror_only
    posture_class: mirror_only
    connectivity_class: approved_mirror_reachable_no_public_origin
    publication_mutations_allowed: false
    vendor_reachability_required: false
    import_instructions:
      - instruction_id: import_instruction:alpha.mirror_only.import_release_payloads
        action_class: import_from_approved_mirror
        artifact_family_keys:
          - binaries
          - symbols
        command_ref: ci/release/check_alpha_publication_dry_run.py --repo-root . --posture mirror_only --validate-only
        expected_receipt_refs:
          - receipt:alpha.publication.mirror_only.binaries
          - receipt:alpha.publication.mirror_only.symbols
      - instruction_id: import_instruction:alpha.mirror_only.import_docs_policy_notice
        action_class: import_from_approved_mirror
        artifact_family_keys:
          - docs_help_packs
          - policy_bundles
          - support_schemas
          - notices
          - sbom_provenance
        command_ref: ci/release/check_alpha_publication_dry_run.py --repo-root . --posture mirror_only --validate-only
        expected_receipt_refs:
          - receipt:alpha.publication.mirror_only.docs_help_packs
          - receipt:alpha.publication.mirror_only.policy_bundles
          - receipt:alpha.publication.mirror_only.support_schemas
          - receipt:alpha.publication.mirror_only.notices
          - receipt:alpha.publication.mirror_only.sbom_provenance
    verification_receipt_refs:
      - receipt:alpha.publication.mirror_only.binaries
      - receipt:alpha.publication.mirror_only.docs_help_packs
      - receipt:alpha.publication.mirror_only.policy_bundles
      - receipt:alpha.publication.mirror_only.symbols
      - receipt:alpha.publication.mirror_only.support_schemas
      - receipt:alpha.publication.mirror_only.notices
      - receipt:alpha.publication.mirror_only.sbom_provenance
    freshness_limit: PT24H
    degraded_truth:
      - Live service-health, advisory, and revocation truth remain mirror snapshots and cannot be shown as live vendor truth.
      - Public channel pointers are not mutated by this posture.

  - posture_id: publication_posture:deny_all
    posture_class: deny_all
    connectivity_class: network_egress_denied
    publication_mutations_allowed: false
    vendor_reachability_required: false
    import_instructions:
      - instruction_id: import_instruction:alpha.deny_all.use_preloaded_bundle
        action_class: verify_preloaded_local_bundle
        artifact_family_keys:
          - binaries
          - docs_help_packs
          - policy_bundles
          - symbols
          - support_schemas
          - notices
          - sbom_provenance
        command_ref: ci/release/check_alpha_publication_dry_run.py --repo-root . --posture deny_all --validate-only
        expected_receipt_refs:
          - receipt:alpha.publication.deny_all.binaries
          - receipt:alpha.publication.deny_all.docs_help_packs
          - receipt:alpha.publication.deny_all.policy_bundles
          - receipt:alpha.publication.deny_all.symbols
          - receipt:alpha.publication.deny_all.support_schemas
          - receipt:alpha.publication.deny_all.notices
          - receipt:alpha.publication.deny_all.sbom_provenance
    verification_receipt_refs:
      - receipt:alpha.publication.deny_all.binaries
      - receipt:alpha.publication.deny_all.docs_help_packs
      - receipt:alpha.publication.deny_all.policy_bundles
      - receipt:alpha.publication.deny_all.symbols
      - receipt:alpha.publication.deny_all.support_schemas
      - receipt:alpha.publication.deny_all.notices
      - receipt:alpha.publication.deny_all.sbom_provenance
    freshness_limit: PT12H
    degraded_truth:
      - Deny-all verification proves local packet completeness only.
      - Advisory and revocation snapshots become stale at the configured limit and must block stronger claims.

  - posture_id: publication_posture:offline_verification
    posture_class: offline_verification
    connectivity_class: offline_bundle_only
    publication_mutations_allowed: false
    vendor_reachability_required: false
    import_instructions:
      - instruction_id: import_instruction:alpha.offline.import_release_payloads
        action_class: import_offline_bundle
        artifact_family_keys:
          - binaries
          - symbols
        command_ref: ci/release/check_alpha_publication_dry_run.py --repo-root . --posture offline_verification --validate-only
        expected_receipt_refs:
          - receipt:alpha.publication.offline_verification.binaries
          - receipt:alpha.publication.offline_verification.symbols
      - instruction_id: import_instruction:alpha.offline.import_docs_policy_support_notice
        action_class: import_offline_bundle
        artifact_family_keys:
          - docs_help_packs
          - policy_bundles
          - support_schemas
          - notices
          - sbom_provenance
        command_ref: ci/release/check_alpha_publication_dry_run.py --repo-root . --posture offline_verification --validate-only
        expected_receipt_refs:
          - receipt:alpha.publication.offline_verification.docs_help_packs
          - receipt:alpha.publication.offline_verification.policy_bundles
          - receipt:alpha.publication.offline_verification.support_schemas
          - receipt:alpha.publication.offline_verification.notices
          - receipt:alpha.publication.offline_verification.sbom_provenance
    verification_receipt_refs:
      - receipt:alpha.publication.offline_verification.binaries
      - receipt:alpha.publication.offline_verification.docs_help_packs
      - receipt:alpha.publication.offline_verification.policy_bundles
      - receipt:alpha.publication.offline_verification.symbols
      - receipt:alpha.publication.offline_verification.support_schemas
      - receipt:alpha.publication.offline_verification.notices
      - receipt:alpha.publication.offline_verification.sbom_provenance
    freshness_limit: PT12H
    degraded_truth:
      - The bundle remains verifiable without vendor reachability until its freshness limits expire.
      - Live advisory, revocation, and service-health truth intentionally degrades to bundled snapshot state.

