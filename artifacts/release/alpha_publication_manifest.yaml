live_truth_degradation_rules:
  - rule_id: live_truth_degradation:service_health
    truth_class: live_service_health
    offline_or_mirror_state: cached_or_unavailable
    freshness_limit_ref: service_health_snapshot
    required_surface_copy: >
      Service-health data is a cached snapshot under mirror/offline postures;
      live vendor health is unavailable.
  - rule_id: live_truth_degradation:advisory
    truth_class: advisory
    offline_or_mirror_state: bundled_snapshot
    freshness_limit_ref: advisory_snapshot
    required_surface_copy: >
      Advisory metadata is only as fresh as the mirrored or bundled snapshot.
  - rule_id: live_truth_degradation:revocation
    truth_class: revocation
    offline_or_mirror_state: bundled_snapshot_blocks_after_limit
    freshness_limit_ref: revocation_snapshot
    required_surface_copy: >
      Revocation metadata blocks stronger publication claims once the snapshot
      age exceeds the declared limit.

blockers:
  - blocker_id: blocker.publish.package_bytes_missing
    severity: blocker
    blocks_broader_publication: true
    summary: Real signed alpha package bytes have not landed.
    closure_condition: Signed package artifacts enter the graph with digest and signature receipts.
    evidence_refs:
      - artifacts/release/alpha_artifact_graph.yaml
  - blocker_id: blocker.fitness.evidence_stale
    severity: blocker
    blocks_broader_publication: true
    summary: Protected fitness evidence is stale-blocking on the seeded publish target.
    closure_condition: Refresh protected fitness evidence and update the graph target freshness state.
    evidence_refs:
      - artifacts/release/protected_fitness_packet_alpha.yaml
  - blocker_id: blocker.policy.not_in_alpha_artifact_graph
    severity: blocker
    blocks_broader_publication: true
    summary: Policy pack fixtures are mirror/offline-ready but not yet artifact graph nodes.
    closure_condition: Add policy bundle nodes and digest rows to the release artifact graph.
    evidence_refs:
      - schemas/policy/policy_pack_alpha.schema.json
      - fixtures/extensions/review_revocation_alpha/policy_pack_alpha_emergency_disable.json
  - blocker_id: blocker.notice.reserved_imports_pending
    severity: review_required
    blocks_broader_publication: true
    summary: Reserved third-party imports have pending notice text until real bytes are admitted.
    closure_condition: Import bytes with origin digest, license text, local modification note, and generated notice output.
    evidence_refs:
      - artifacts/release/reuse_spdx_notice_delta_alpha.md
      - artifacts/governance/third_party_import_manifest.yaml
  - blocker_id: blocker.docs.mirrored_official_pack_pending
    severity: review_required
    blocks_broader_publication: true
    summary: Mirrored official docs pack is reserved but not yet published as bytes.
    closure_condition: Publish the mirrored docs pack with attribution, digest, and freshness metadata.
    evidence_refs:
      - artifacts/governance/third_party_import_manifest.yaml
      - artifacts/governance/release_notice_seed.yaml
  - blocker_id: blocker.symbols.real_archive_missing
    severity: review_required
    blocks_broader_publication: true
    summary: Symbol and crash-symbol archive rows are fixture-backed, not real sidecar archives.
    closure_condition: Publish symbol sidecars and crash-symbol archive receipts for the exact build.
    evidence_refs:
      - artifacts/support/crash_symbolication_linkage_alpha.md
  - blocker_id: blocker.support.hosted_intake_not_exercised
    severity: review_required
    blocks_broader_publication: false
    summary: Support schema and packet evidence is local; hosted intake is not part of this dry run.
    closure_condition: Add hosted support intake rehearsal or keep the claim local-only.
    evidence_refs:
      - schemas/support/support_bundle_manifest.schema.json
  - blocker_id: blocker.sbom.placeholder_only
    severity: blocker
    blocks_broader_publication: true
    summary: SBOM output is a structural placeholder and must not be represented as SPDX or CycloneDX.
    closure_condition: Replace the placeholder with a standards-conformant SBOM generator and validator report.
    evidence_refs:
      - ci/sbom_provenance.sh
      - artifacts/release/reuse_spdx_notice_delta_alpha.md
  - blocker_id: blocker.attestation.signing_absent
    severity: blocker
    blocks_broader_publication: true
    summary: Release signing and final attestations are absent from the dry run.
    closure_condition: Add signing, attestation, and trust-root receipts for the exact build.
    evidence_refs:
      - artifacts/release/provenance_capture_seed.json

acceptance:
  validation_commands:
    - python3 ci/release/check_alpha_publication_dry_run.py --repo-root . --report artifacts/milestones/m2/captures/alpha_publication_dry_run_validation_capture.json
    - cargo test -p aureline-support --test alpha_publication_dry_run
  protected_proof_refs:
    - artifacts/release/alpha_publication_manifest.yaml
    - artifacts/release/clean_room_rebuild_alpha.md
    - artifacts/release/mirror_offline_publication_dry_run.md
    - artifacts/release/alpha_notice_sbom_provenance_dry_run.md
    - artifacts/milestones/m2/captures/alpha_publication_dry_run_validation_capture.json
  accepted_states:
    - clean_room_rebuild_comparable_with_known_differences
    - mirror_only_deny_all_and_offline_postures_exercised
    - required_artifact_families_covered_in_one_manifest
    - vendor_unreachable_verification_and_live_truth_degradation_declared
    - broader_publication_blockers_named
