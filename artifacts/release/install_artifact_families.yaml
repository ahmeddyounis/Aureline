# Packaging and installation artifact-family matrix.
#
# Machine-readable companion to docs/release/packaging_installation_matrix.md.
# This file freezes the desktop and helper package families before
# installer code lands. It names acquisition paths, updater ownership,
# state-root refs, update-marker refs, handler posture, mirror posture,
# and rollback expectations for every claimed package family.

schema_version: 1
matrix_id: aureline.install_artifact_families
status: seeded

contract_doc_ref: docs/release/packaging_installation_matrix.md
channel_identity_state_roots_ref: artifacts/release/channel_identity_and_state_roots.yaml
install_topology_matrix_ref: artifacts/release/install_topology_matrix.yaml
state_root_map_ref: artifacts/release/state_root_map.yaml
channel_matrix_ref: artifacts/release/channel_matrix.yaml
silent_deployment_seed_ref: artifacts/release/silent_deployment_seed.yaml
