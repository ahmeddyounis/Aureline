rules:
  - id: package_family_explicit_for_every_claimed_lane
    description: >
      Every claimed desktop or helper lane resolves to one artifact
      family row. Generic "desktop installer" or "remote helper"
      labels are not admissible in release evidence.
  - id: package_family_reads_channel_identity
    description: >
      Every artifact family points at one or more channel identity rows
      and state-root refs. Channel, state, update-marker, and handler
      ownership are not inferred from package filenames.
  - id: portable_families_do_not_mutate_host_integrations
    description: >
      Portable ZIP, app ZIP, AppImage portable, and tarball portable
      rows suppress host-wide file associations, protocol handlers,
      services, shell hooks, machine-global recent items, and
      machine-global update markers unless a future opt-in row
      explicitly allows one integration.
  - id: external_package_manager_owns_package_update
    description: >
      DEB, RPM, and package-manager acquired DMG/MSIX rows suppress
      in-product package replacement. Aureline still reports install
      topology and owns per-channel user state roots.
  - id: rollback_preserves_user_authored_state
    description: >
      Any rollback or downgrade that touches user-authored durable
      state requires a backup snapshot, migration journal, or repair
      flow. Destructive support advice is non-conforming.

