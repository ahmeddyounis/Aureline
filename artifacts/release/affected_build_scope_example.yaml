# Exercise-only affected-build scope for the first alpha incident/advisory
# baseline. This artifact is the machine-readable input consumed by the
# support/export projection in `aureline-support`.

schema_version: 1
record_kind: incident_advisory_affected_build_scope
scope_id: release.incident_advisory.alpha.scope_example
status: baseline_exercised
title: Alpha incident advisory affected-build scope example
owner_dri: "@ahmeddyounis"
exercised_at: "2026-05-14T10:00:00Z"

source_contract_refs:
  advisory_template_ref: docs/security/advisory_template_seed.md
  baseline_packet_ref: artifacts/release/incident_advisory_baseline_alpha.md
  advisory_surface_contract_ref: docs/security/advisory_surface_contract.md
  advisory_record_schema_ref: schemas/security/advisory_record.schema.json
  affected_install_assessment_schema_ref: schemas/security/affected_install_assessment.schema.json
  release_support_crosswalk_ref: artifacts/release/release_support_crosswalk.yaml
  exact_build_identity_ref: artifacts/build/build_identity.json
  protected_fitness_packet_ref: artifacts/release/protected_fitness_packet_alpha.yaml
  incident_trail_ref: artifacts/support/crash_symbolication_linkage_alpha.md
  support_bundle_contract_ref: docs/support/support_bundle_contract.md
  update_rollback_sequence_ref: artifacts/release/update_rollback_sequence.yaml

advisory:
  advisory_id: AURELINE-ADV-2026-0201
  severity_class: security_severity.high
  surface_severity_class: high
  disclosure_class: public_on_advisory
  action_state: action_required
  advisory_record_ref: advisory_record.AURELINE-ADV-2026-0201
  advisory_template_ref: docs/security/advisory_template_seed.md
  summary: >
    Exercise-only advisory baseline for a preview renderer crash and a current
    local development build. The exercise proves affected-build scoping,
    current mitigation wording, rollback routing, and known-limit honesty
    without publishing a live customer advisory.
  copy_safe_ids:
    - id_kind: aureline_advisory_id
      id_value: AURELINE-ADV-2026-0201
      copy_state: copy_available
      visibility_class: internal
      source_ref: advisory_record.AURELINE-ADV-2026-0201
    - id_kind: cve_id
      id_value: not_assigned
      copy_state: copy_unavailable_not_assigned
      visibility_class: internal
      source_ref: advisory_record.AURELINE-ADV-2026-0201
    - id_kind: ghsa_id
      id_value: not_assigned
      copy_state: copy_unavailable_not_assigned
      visibility_class: internal
      source_ref: advisory_record.AURELINE-ADV-2026-0201
  affected_install_linkage:
    install_profile_card_refs:
      - card.linux.x86_64.per_user_installed.preview
      - card.macos.universal_binary.side_by_side_preview.preview
    exact_build_identity_refs:
      - build-id:aureline:preview:0.8.0-alpha.1:x86_64-unknown-linux-gnu:release:9f0e7d6c5b4a
      - build-id:aureline:dev:0.0.0:unknown:dev:52917c7e2fa0
    channel_classes:
      - preview
      - dev_local
    publication_posture_classes:
      - online_vendor
      - customer_managed_mirror
    mirror_freshness_class: up_to_date
    offline_expiration_at: null
    local_continuity_note: >
      Local editing, Project Doctor, safe mode, and local support-bundle preview
      remain available while advisory wording and rollback guidance are reviewed.

affected_builds:
  - build_scope_id: affected_build.preview_renderer_panic
    exact_build_identity_ref: build-id:aureline:preview:0.8.0-alpha.1:x86_64-unknown-linux-gnu:release:9f0e7d6c5b4a
    exact_build_identity_source_ref: fixtures/support/incident_trail_alpha/crash_envelope.json
    channel_class: preview
    install_profile_card_refs:
      - card.linux.x86_64.per_user_installed.preview
    installed_match_state: affected_pending_mitigation
    mitigation:
      mitigation_state: mitigation_available
      current_mitigation_summary: >
        Keep the preview renderer crash in local support review, use the
        exact-build symbolication trail, and do not publish raw dump bytes or
        raw stack bodies.
      local_continuity_note: >
        Local editing, file navigation, safe mode, and support-bundle preview
        remain available; the renderer fault domain can be reviewed without a
        broad reset.
      support_packet_refs:
        - support_bundle.alpha_preview.renderer_panic.local_review
        - support.packet.alpha.incident_advisory_baseline
    rollback_route:
      route_class: rollback_or_repin
      rollback_target_ref: rollback.target.preview.previous_verified_build
      rollback_sequence_ref: artifacts/release/update_rollback_sequence.yaml
      checkpoint_ref: checkpoint.update.pre_restart_checkpoint_created
      reversal_class: exact
      user_visible_summary: >
        Revert to the prior verified preview build through the update rollback
        review, preserving authored files, support evidence, advisory history,
        and local recovery state.
      preserved_state_classes:
        - user_authored_files
        - support_export_store
        - crash_envelope_store
        - advisory_history
        - local_recovery_state
    known_limits:
      truth_state: known_limited
      summary: >
        Symbolication linkage is proven on the checked-in preview fixture, but
        diagnosis-latency measurement remains seeded pending measurement.
      known_limit_refs:
        - artifacts/support/crash_symbolication_linkage_alpha.md
        - artifacts/support/diagnosis_latency_scorecard_alpha.yaml
        - artifacts/release/protected_fitness_packet_alpha.yaml
      overclaim_blockers:
        - No measured diagnosis-latency pass is present yet.
        - Raw crash dump upload is outside the current local-first support path.

  - build_scope_id: affected_build.local_dev_current
    exact_build_identity_ref: build-id:aureline:dev:0.0.0:unknown:dev:52917c7e2fa0
    exact_build_identity_source_ref: artifacts/build/build_identity.json
    channel_class: dev_local
    install_profile_card_refs:
      - card.macos.universal_binary.side_by_side_preview.preview
    installed_match_state: matches_current_install
    mitigation:
      mitigation_state: mitigation_available
      current_mitigation_summary: >
        Keep the current local development build inside release/support review;
        do not claim passing protected fitness while the review packet reports
        evidence_stale.
      local_continuity_note: >
        Local editing, Project Doctor, support export preview, and rollback
        review remain available. No managed service reachability is required
        for local evidence review.
      support_packet_refs:
        - support.packet.alpha.incident_advisory_baseline
        - release.protected_fitness.alpha
    rollback_route:
      route_class: rollback_or_hold_publication
      rollback_target_ref: rollback.target.hold_alpha_publication_until_packet_current
      rollback_sequence_ref: artifacts/release/update_rollback_sequence.yaml
      checkpoint_ref: checkpoint.update.review_emitted
      reversal_class: audit_only
      user_visible_summary: >
        Hold wider alpha publication or route through the explicit rollback
        review. Do not describe the current build as healthy until the protected
        packet is refreshed or the claim is narrowed.
      preserved_state_classes:
        - user_authored_files
        - release_evidence_store
        - support_export_store
        - advisory_history
        - local_recovery_state
    known_limits:
      truth_state: evidence_stale
      summary: >
        The protected fitness packet is evidence_stale because warm-start rows
        are missing observations and the supportability scorecard has no
        measured diagnosis-latency pass.
      known_limit_refs:
        - artifacts/release/protected_fitness_packet_alpha.yaml
        - docs/release/protected_fitness_review_alpha.md
        - artifacts/feedback/external_alpha_known_limits.md
      overclaim_blockers:
        - Protected fitness overall result is evidence_stale.
        - Supportability scorecard remains seeded pending measurement.

support_export_contract:
  support_packet_id: support.packet.alpha.incident_advisory_baseline
  redaction_class: metadata_safe_default
  data_class: metadata_only
  raw_private_material_excluded: true
  linked_support_packet_refs:
    - support_bundle.alpha_preview.renderer_panic.local_review
    - release.protected_fitness.alpha
  export_surface_refs:
    - docs/support/support_bundle_contract.md
    - artifacts/release/release_support_crosswalk.yaml
  export_summary: >
    The baseline support projection carries advisory ID, exact-build refs,
    mitigation state, rollback refs, known-limit refs, and support packet refs.
    It excludes raw dumps, raw logs, raw paths, raw command lines, reporter
    identity, private registry URLs, exploit material, and secrets.

acceptance:
  validator_command: cargo test -p aureline-support --test incident_advisory_baseline_alpha
  rust_consumer: crates/aureline-support/src/advisory_baseline/mod.rs
  proof_refs:
    - docs/security/advisory_template_seed.md
    - artifacts/release/incident_advisory_baseline_alpha.md
    - artifacts/release/affected_build_scope_example.yaml
  protected_fixture_refs:
    - fixtures/support/incident_trail_alpha/crash_envelope.json
    - artifacts/release/protected_fitness_packet_alpha.yaml
  accepted_states:
    - affected_builds_named_by_exact_build_identity
    - current_mitigations_declared
    - rollback_route_declared
    - known_limits_declared
    - support_export_projection_metadata_only
