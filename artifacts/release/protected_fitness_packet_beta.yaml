# Protected fitness-function release-candidate packet (beta release lane).
#
# Frozen beta promotion of the protected fitness review packet. This record
# reuses the checked-in alpha review packet verbatim as its base evidence
# (base_packet_ref) and layers release-candidate thresholds on top: one bar
# per catalog-linked protected function, the active-waiver visibility rule,
# and the expired-waiver degradation rule.
#
# The governing rules a consumer can rely on:
#   - A metric over its release-candidate bar without an active waiver may
#     not render as passing or waived; it must degrade.
#   - An over-bar metric held open by an active waiver must keep the waiver
#     record visible and may not render as a clean pass.
#   - An expired waiver degrades the protected function instead of holding
#     it open as passing, warning, or waived.
#
# Consumers read this record (not dashboard prose) for the release-candidate
# threshold posture. Refresh the base review packet and the thresholds in the
# same change set; the typed consumer is aureline_support::fitness.

schema_version: 1
record_kind: protected_fitness_release_candidate_packet
packet_id: release.protected_fitness.beta
packet_revision: 1
packet_state: release_candidate
candidate_stage: beta_release_candidate
as_of: "2026-05-14T00:00:00Z"
owner_dri: "@ahmeddyounis"
evidence_owner: "@ahmeddyounis"
overall_summary: >
  First paint and input-to-paint sit within their release-candidate bars on
  the checked-in evidence. Warm start and restore fidelity remain over their
  bars (pending benchmark-council numerics and missing observations) and
  render degraded rather than passing because no active waiver holds them
  open. The save-pipeline timing projection holds its boolean release bar but
  the packet narrows it to a warning for partial scope.

# The base review packet this record reuses verbatim. The typed consumer
# loads this file, validates it with the alpha consumer unchanged, and then
# applies the release-candidate threshold layer below.
base_packet_ref: artifacts/release/protected_fitness_packet_alpha.yaml

# One release-candidate bar per catalog-linked protected function in the base
# packet. The support-scorecard row carries no catalog row and therefore no
# release-candidate bar.
release_candidate_thresholds:
  - protected_function_ref: ff.warm_start_to_first_paint
    catalog_row_ref: ff.warm_start_to_first_paint
    threshold_mode: to_be_set_by_benchmark_council
    comparator: provisional_bar_pending_council
    release_candidate_bar: warm-start to first-paint p50/p95 bar pending benchmark-council numerics
    measured_value: no warm-start observation captured on the reference hardware matrix
    within_release_candidate_bar: false
    waiver_authority_ref: performance_council

  - protected_function_ref: ff.first_paint
    catalog_row_ref: ff.first_paint
    threshold_mode: absolute_p50_and_p95
    comparator: measured_at_or_below_bar
    release_candidate_bar: first-paint p95 within the reference paint bar
    measured_value: first-paint p95 measured below the reference paint bar on all checked-in rows
    within_release_candidate_bar: true
    waiver_authority_ref: performance_council

  - protected_function_ref: ff.input_to_paint
    catalog_row_ref: ff.input_to_paint
    threshold_mode: absolute_p50_and_p95
    comparator: measured_at_or_below_bar
    release_candidate_bar: input-to-paint p95 within the reference input bar
    measured_value: input-to-paint p95 measured below the reference input bar on all checked-in rows
    within_release_candidate_bar: true
    waiver_authority_ref: performance_council

  - protected_function_ref: ff.vfs_save_conflict_handling
    catalog_row_ref: ff.vfs_save_conflict_handling
    threshold_mode: boolean_gate
    comparator: boolean_must_hold
    release_candidate_bar: compare-before-write must hold and save-mode downgrade without envelope permission must not occur
    measured_value: compare-before-write holds on the checked-in save-pipeline timing projection
    within_release_candidate_bar: true
    waiver_authority_ref: performance_council

  - protected_function_ref: ff.restore_fidelity
    catalog_row_ref: ff.restore_fidelity
    threshold_mode: ratio_gate
    comparator: provisional_bar_pending_council
    release_candidate_bar: restore-fidelity match-rate floor pending benchmark-council numerics
    measured_value: no restore-fidelity scenario emits a match rate yet
    within_release_candidate_bar: false
    waiver_authority_ref: performance_council
