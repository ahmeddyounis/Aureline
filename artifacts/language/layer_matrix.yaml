# Language three-layer model matrix and downgrade rules.
#
# Machine-readable companion to:
#   docs/language/three_layer_model_contract.md
#
# Purpose:
#   - Freeze the three-layer vocabulary so "language support" claims can be
#     made precisely (syntax/structure vs compatibility vs Aureline-owned depth)
#     and audited across UI, docs, review, and AI surfaces.
#   - Freeze downgrade disclosure rules so fallbacks cannot silently present
#     weaker truth as deeper semantics.
#
# Rules:
#   - Surfaces MUST NOT invent additional layer ids or feature-family ids.
#   - If this file and the contract doc disagree, the contract doc wins and
#     this file updates in the same change.
#   - Adding a new feature family is additive-minor and must include at least
#     one new fixture in fixtures/language/layer_cases/.

schema_version: 1

contract_doc_ref: docs/language/three_layer_model_contract.md
fixtures_ref: fixtures/language/layer_cases

upstream_contracts:
  - docs/architecture/language_protocol_router_adr.md
  - docs/language/provider_graph_and_arbitration_contract.md
  - docs/governance/truth_and_degraded_state_vocabulary.md
  - docs/search/search_readiness_vocabulary.md
  - docs/navigation/semantic_navigation_and_rename_contract.md
  - docs/execution/debug_truth_contract.md
  - docs/execution/test_truth_contract.md

axes:
  language_layer:
    description: >
      Frozen language intelligence layers. A surface emits exactly one
      answer_layer_id per protected result, even if multiple providers
      contribute overlays.
    values:
      - layer_1_syntax_structure
      - layer_2_compatibility_breadth
      - layer_3_aureline_semantic_depth

  feature_family:
    description: >
      Frozen feature families that must remain layer-attributable. The ids
      are stable across UI, CLI, AI, docs, review, and support exports.
    values:
      - hover
      - completion
      - diagnostics
      - rename
      - references
      - formatting
      - inlay_hints
      - semantic_tokens
      - debug
      - tests
      - graph_overlays
      - impact_analysis
      - refactor_assistance

  surface_family:
    description: >
      Frozen surface families that must disclose the answering layer or the
      deeper-layer-unavailable reason when operating below the deepest layer.
    values:
      - editor
      - search
      - navigation
      - refactor
      - docs
      - review
      - ai
      - support_export

layer_definitions:
  - layer_id: layer_1_syntax_structure
    label: Syntax and structure
    canonical_job: Syntax trees and local structural UX
    typical_sources:
      - tree_sitter_parse
      - grammar_queries
      - tokenization
    never_imply:
      - workspace_wide_semantics
      - project_model_awareness
      - safe_multi_file_refactor

  - layer_id: layer_2_compatibility_breadth
    label: Compatibility and breadth
    canonical_job: Protocol and toolchain compatibility across ecosystems
    typical_sources:
      - lsp
      - dap
      - formatter_adapter
      - linter_adapter
      - test_adapter
      - build_adapter
    never_imply:
      - aureline_owned_semantic_proof
      - uniform_quality_across_languages
      - framework_build_aware_correctness

  - layer_id: layer_3_aureline_semantic_depth
    label: Aureline-owned semantic depth
    canonical_job: Graph-backed, framework-aware, build-aware semantics
    typical_sources:
      - semantic_workspace_graph
      - framework_packs
      - native_analyzers
      - build_target_awareness
    never_imply:
      - complete_for_unloaded_or_stale_scope
      - evidence_free_claims

feature_family_mapping:
  - feature_family_id: hover
    default_deepest_layer: layer_3_aureline_semantic_depth
    layer_capabilities:
      layer_1_syntax_structure:
        provides:
          - token_kind_and_syntax_node_class
          - doc_comment_extraction_if_grammar_local
        labels_required:
          - answer_layer_id
          - scope_claim_class
      layer_2_compatibility_breadth:
        provides:
          - lsp_hover_payload
          - signature_help_overlay
        labels_required:
          - answer_layer_id
          - provider_disclosure
          - scope_claim_class
      layer_3_aureline_semantic_depth:
        provides:
          - graph_backed_symbol_identity
          - framework_aware_facts
          - build_aware_type_resolution
        labels_required:
          - answer_layer_id
          - provider_disclosure
          - freshness_and_scope_disclosure
    downgrade_rules:
      - when_answer_layer_is_below: layer_3_aureline_semantic_depth
        must_disclose:
          - deeper_layer_unavailable_reason
          - degraded_state_token

  - feature_family_id: completion
    default_deepest_layer: layer_3_aureline_semantic_depth
    layer_capabilities:
      layer_1_syntax_structure:
        provides:
          - keyword_and_snippet_completion
        labels_required:
          - answer_layer_id
      layer_2_compatibility_breadth:
