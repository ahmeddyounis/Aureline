# TypeScript, JavaScript, and web-adjacent launch language-pack alpha.
#
# Canonical artifact for the TS/JS web language-pack lane. Runtime, support,
# docs, and bundle surfaces should consume this packet instead of cloning pack
# state into per-file setup logic.

record_kind: tsjs_web_language_pack_alpha
schema_version: 1
pack_id: language_pack:tsjs_web.alpha
pack_revision: 1
display_name: TypeScript / JavaScript web alpha language pack
channel: external_alpha
claim_depth_class: alpha_limited
support_claim: >
  Enables TypeScript, TSX, JavaScript, JSX, HTML, CSS, JSON, and YAML for the
  local web app or service launch wedge with shared syntax, routed language
  assistance, diagnostics defaults, quality-tool hooks, icons, docs, and
  explicit fallback labels.
claim_boundary: >
  This alpha pack does not claim framework-expert depth, certified archetype
  status, debugger parity, stable broad refactors, or managed-workspace parity.
  Generated, external, stale, or partial provider state must remain labeled and
  mutating actions route through preview.

source_refs:
  - crates/aureline-language/src/tree_sitter/registry.rs
  - crates/aureline-language/src/lsp_router/
  - crates/aureline-language/src/tsjs/
  - crates/aureline-language/src/tsjs/quality/
  - docs/language/tsjs_wedge_alpha.md
  - docs/language/tsjs_quality_alpha.md
  - artifacts/bundles/tsjs_launch_bundle_alpha.yaml
  - artifacts/feedback/external_alpha_known_limits.md

language_rows:
  - language_id: language:typescript
    display_name: TypeScript
    grammar_id: grammar:typescript
    grammar_registry_ref: tree-sitter:launch-language-registry
    file_extensions: [ts, mts, cts]
    support_class: alpha_standard
    default_provider_ref: provider:lsp:typescript:alpha
    diagnostics_profile_ref: diagnostics_profile:tsjs_web.language_service
    formatter_hook_ref: tool_hook:prettier.format_web_document
    icon_ref: icon:file.typescript
    docs_pack_refs:
      - docs_pack:tsjs_web.assistance_alpha
      - docs_pack:tsjs_web.quality_alpha
    known_gap_refs:
      - known_gap:tsjs_web.framework_expert_depth_not_claimed
      - known_gap:tsjs_web.broad_refactor_not_claimed
    fallback_label: TypeScript semantic assistance falls back to syntax-local answers when the language service is unavailable.

  - language_id: language:tsx
    display_name: TSX
    grammar_id: grammar:tsx
    grammar_registry_ref: tree-sitter:launch-language-registry
    file_extensions: [tsx]
    support_class: alpha_standard
    default_provider_ref: provider:lsp:typescript:alpha
    diagnostics_profile_ref: diagnostics_profile:tsjs_web.language_service
    formatter_hook_ref: tool_hook:prettier.format_web_document
    icon_ref: icon:file.tsx
    docs_pack_refs:
      - docs_pack:tsjs_web.assistance_alpha
      - docs_pack:tsjs_web.quality_alpha
    known_gap_refs:
      - known_gap:tsjs_web.framework_expert_depth_not_claimed
      - known_gap:tsjs_web.generated_route_map_not_mutated
    fallback_label: TSX assistance remains source-first and does not mutate component or route metadata without preview.

  - language_id: language:javascript
    display_name: JavaScript
    grammar_id: grammar:javascript
    grammar_registry_ref: tree-sitter:launch-language-registry
    file_extensions: [js, mjs, cjs]
    support_class: alpha_standard
    default_provider_ref: provider:lsp:typescript:alpha
    diagnostics_profile_ref: diagnostics_profile:tsjs_web.language_service
    formatter_hook_ref: tool_hook:prettier.format_web_document
    icon_ref: icon:file.javascript
    docs_pack_refs:
      - docs_pack:tsjs_web.assistance_alpha
      - docs_pack:tsjs_web.quality_alpha
    known_gap_refs:
      - known_gap:tsjs_web.framework_expert_depth_not_claimed
      - known_gap:tsjs_web.broad_refactor_not_claimed
    fallback_label: JavaScript semantic assistance is routed through the TypeScript service when available and labeled as syntax-only otherwise.

  - language_id: language:jsx
    display_name: JSX
    grammar_id: grammar:jsx
    grammar_registry_ref: tree-sitter:launch-language-registry
    file_extensions: [jsx]
    support_class: alpha_standard
    default_provider_ref: provider:lsp:typescript:alpha
    diagnostics_profile_ref: diagnostics_profile:tsjs_web.language_service
    formatter_hook_ref: tool_hook:prettier.format_web_document
    icon_ref: icon:file.jsx
    docs_pack_refs:
      - docs_pack:tsjs_web.assistance_alpha
      - docs_pack:tsjs_web.quality_alpha
    known_gap_refs:
      - known_gap:tsjs_web.framework_expert_depth_not_claimed
      - known_gap:tsjs_web.generated_route_map_not_mutated
    fallback_label: JSX assistance does not imply framework-specific visual editing or route graph certainty.

  - language_id: language:html
    display_name: HTML
    grammar_id: grammar:html
    grammar_registry_ref: tree-sitter:launch-language-registry
    file_extensions: [html, htm]
    support_class: alpha_basic
    default_provider_ref: provider:lsp:web_documents:alpha
    diagnostics_profile_ref: diagnostics_profile:tsjs_web.web_documents
    formatter_hook_ref: tool_hook:prettier.format_web_document
    icon_ref: icon:file.html
    docs_pack_refs:
      - docs_pack:tsjs_web.pack_scope
      - docs_pack:tsjs_web.quality_alpha
    known_gap_refs:
      - known_gap:tsjs_web.html_css_json_yaml_basic_not_framework
    fallback_label: HTML support is syntax, diagnostics, formatting, and inspectable fallback only in this alpha pack.

  - language_id: language:css
    display_name: CSS
    grammar_id: grammar:css
    grammar_registry_ref: tree-sitter:launch-language-registry
    file_extensions: [css]
    support_class: alpha_basic
    default_provider_ref: provider:lsp:web_documents:alpha
    diagnostics_profile_ref: diagnostics_profile:tsjs_web.web_documents
    formatter_hook_ref: tool_hook:prettier.format_web_document
    icon_ref: icon:file.css
    docs_pack_refs:
      - docs_pack:tsjs_web.pack_scope
      - docs_pack:tsjs_web.quality_alpha
    known_gap_refs:
      - known_gap:tsjs_web.html_css_json_yaml_basic_not_framework
    fallback_label: CSS support does not claim framework token, visual designer, or browser-runtime round-trip depth.

  - language_id: language:json
    display_name: JSON
    grammar_id: grammar:json
    grammar_registry_ref: tree-sitter:launch-language-registry
    file_extensions: [json, jsonc]
    support_class: alpha_basic
    default_provider_ref: provider:lsp:web_documents:alpha
    diagnostics_profile_ref: diagnostics_profile:tsjs_web.web_documents
    formatter_hook_ref: tool_hook:prettier.format_web_document
    icon_ref: icon:file.json
    docs_pack_refs:
      - docs_pack:tsjs_web.pack_scope
      - docs_pack:tsjs_web.quality_alpha
    known_gap_refs:
      - known_gap:tsjs_web.html_css_json_yaml_basic_not_framework
    fallback_label: JSON support covers web config editing with raw and structured cues; unknown config semantics stay labeled.

  - language_id: language:yaml
    display_name: YAML
    grammar_id: grammar:yaml
    grammar_registry_ref: tree-sitter:launch-language-registry
    file_extensions: [yaml, yml]
    support_class: alpha_basic
    default_provider_ref: provider:syntax:tree_sitter:web_alpha
    diagnostics_profile_ref: diagnostics_profile:tsjs_web.config_documents
    formatter_hook_ref: tool_hook:prettier.format_web_document
    icon_ref: icon:file.yaml
    docs_pack_refs:
      - docs_pack:tsjs_web.pack_scope
      - docs_pack:tsjs_web.quality_alpha
    known_gap_refs:
      - known_gap:tsjs_web.html_css_json_yaml_basic_not_framework
    fallback_label: YAML support is syntax and formatting-hook scoped; schema-specific framework claims are out of scope.

provider_routes:
  - provider_ref: provider:syntax:tree_sitter:web_alpha
    provider_kind: syntax_parser
    provider_display_label: Tree-sitter syntax engine
    language_ids:
      - language:typescript
      - language:tsx
      - language:javascript
      - language:jsx
      - language:html
      - language:css
      - language:json
      - language:yaml
    capability_classes: [hover, definition, reference, completion, diagnostics, code_action, provenance_explanation]
    surface_classes: [hover, definition, reference, completion, diagnostic, code_action]
    support_class: fallback_only
    expected_health_state: ready
    locality_class: local_in_process
    scope_claim_class: single_file
    scope_limit_classes: [single_file_only]
    fallback_class: no_fallback
    fault_domain_id: shell_interaction_core
    summary: Syntax fallback stays available for all pack languages without claiming semantic breadth.

  - provider_ref: provider:lsp:typescript:alpha
    provider_kind: language_server
    provider_display_label: TypeScript language service
    language_ids:
      - language:typescript
      - language:tsx
      - language:javascript
      - language:jsx
    capability_classes: [hover, definition, reference, rename, completion, diagnostics, signature_help, code_action]
    surface_classes: [hover, definition, reference, rename, completion, diagnostic, signature_help, code_action]
    support_class: authoritative
    expected_health_state: ready
    locality_class: local_sidecar
    scope_claim_class: active_workset
    scope_limit_classes: [active_workset_only, unloaded_roots_omitted, generated_candidates_omitted]
    fallback_class: protocol_to_text
    fault_domain_id: session_scoped_execution_hosts
    summary: TypeScript service owns alpha semantic answers for TS, TSX, JS, and JSX within the active workset.

  - provider_ref: provider:lsp:web_documents:alpha
    provider_kind: language_server
    provider_display_label: Web document language service
    language_ids:
      - language:html
      - language:css
      - language:json
    capability_classes: [hover, completion, diagnostics, formatting]
    surface_classes: [hover, completion, diagnostic, formatting]
    support_class: advisory
    expected_health_state: ready
    locality_class: local_sidecar
    scope_claim_class: single_file
    scope_limit_classes: [single_file_only]
    fallback_class: protocol_to_text
    fault_domain_id: session_scoped_execution_hosts
    summary: HTML, CSS, and JSON language routes are single-file alpha helpers and stay below framework depth.

  - provider_ref: provider:formatter:prettier:web_alpha
    provider_kind: formatter_adapter
    provider_display_label: Prettier formatter hook
    language_ids:
      - language:typescript
      - language:tsx
      - language:javascript
      - language:jsx
      - language:html
      - language:css
      - language:json
      - language:yaml
    capability_classes: [formatting]
    surface_classes: [formatting]
    support_class: authoritative
    expected_health_state: ready
    locality_class: local_sidecar
    scope_claim_class: single_file
    scope_limit_classes: [single_file_only]
    fallback_class: unsupported_no_fallback
    fault_domain_id: extension_and_tool_hosts
    summary: Formatter hook is declared once for all web pack languages and requires preview where mutation safety is not trivial.

  - provider_ref: provider:linter:eslint:web_alpha
    provider_kind: linter_adapter
    provider_display_label: ESLint diagnostics hook
    language_ids:
      - language:typescript
      - language:tsx
      - language:javascript
      - language:jsx
    capability_classes: [diagnostics, code_action]
    surface_classes: [diagnostic, code_action]
    support_class: authoritative
    expected_health_state: ready
    locality_class: local_sidecar
    scope_claim_class: active_workset
    scope_limit_classes: [active_workset_only]
    fallback_class: structured_to_heuristic
    fault_domain_id: extension_and_tool_hosts
    summary: ESLint diagnostics are normalized into the shared diagnostic bus rather than a separate Problems model.

  - provider_ref: provider:test:vitest_jest:web_alpha
    provider_kind: test_adapter
    provider_display_label: Vitest/Jest test adapter hook
    language_ids:
      - language:typescript
      - language:tsx
      - language:javascript
      - language:jsx
    capability_classes: [test_discovery, test_run]
    surface_classes: [test_discovery, test_run]
    support_class: authoritative
    expected_health_state: ready
    locality_class: local_sidecar
    scope_claim_class: test_tree
    scope_limit_classes: [active_workset_only]
    fallback_class: unsupported_no_fallback
    fault_domain_id: session_scoped_execution_hosts
    summary: Test hooks expose rerunnable task-event refs while keeping debug parity out of the language-pack claim.

diagnostics_defaults:
  - diagnostics_profile_ref: diagnostics_profile:tsjs_web.language_service
    language_ids: ["language:typescript", "language:tsx", "language:javascript", "language:jsx"]
    source_family: language_server
    default_severity_class: warning
    default_freshness_class: current
    surface_classes: [editor_inline, search_index, support_export, cli_json]
    summary: Language-service diagnostics stay source-labeled, fresh-or-stale, and support-export visible.

  - diagnostics_profile_ref: diagnostics_profile:tsjs_web.web_documents
    language_ids: ["language:html", "language:css", "language:json"]
    source_family: language_server
    default_severity_class: notice
    default_freshness_class: current
    surface_classes: [editor_inline, support_export, cli_json]
    summary: Web document diagnostics are single-file alpha helpers with explicit fallback to syntax cues.

  - diagnostics_profile_ref: diagnostics_profile:tsjs_web.config_documents
    language_ids: ["language:json", "language:yaml"]
    source_family: editor_structural
    default_severity_class: notice
    default_freshness_class: current
    surface_classes: [editor_inline, support_export, cli_json]
    summary: Config document diagnostics prioritize structural and suspicious-text cues over framework inference.

  - diagnostics_profile_ref: diagnostics_profile:tsjs_web.quality_tools
    language_ids: ["language:typescript", "language:tsx", "language:javascript", "language:jsx", "language:html", "language:css", "language:json", "language:yaml"]
    source_family: linter_formatter_style
    default_severity_class: warning
    default_freshness_class: current
    surface_classes: [editor_inline, support_export, cli_json]
    summary: Formatter and linter findings enter the shared diagnostic bus with provider and profile refs.

  - diagnostics_profile_ref: diagnostics_profile:tsjs_web.tests
    language_ids: ["language:typescript", "language:tsx", "language:javascript", "language:jsx"]
    source_family: runtime_test_or_debug
    default_severity_class: error
    default_freshness_class: current
    surface_classes: [support_export, cli_json]
    summary: Test-adapter signals remain runtime/test evidence and do not impersonate static analysis.

tool_hooks:
  - tool_hook_ref: tool_hook:prettier.format_web_document
    tool_kind_class: formatter
    action_class: format_document
    trigger_class: manual_command
    provider_ref: provider:formatter:prettier:web_alpha
    canonical_command_id: cmd:quality.format_document
    language_ids: ["language:typescript", "language:tsx", "language:javascript", "language:jsx", "language:html", "language:css", "language:json", "language:yaml"]
    rerun_posture_class: rerunnable_after_preview_review
    preview_requirement_class: structured_diff
    safety_class: trivia_safe
    summary: Format-document hook is declared once and must disclose whole-file rewrite posture before mutation.

  - tool_hook_ref: tool_hook:eslint.lint_workset
    tool_kind_class: linter
    action_class: lint_check
    trigger_class: manual_command
    provider_ref: provider:linter:eslint:web_alpha
    canonical_command_id: cmd:quality.lint_workset
    language_ids: ["language:typescript", "language:tsx", "language:javascript", "language:jsx"]
    rerun_posture_class: rerunnable_from_execution_plane
    preview_requirement_class: not_required
    safety_class: read_only_no_mutation
    summary: ESLint read-only diagnostics may rerun from the execution plane when the provider is ready.

  - tool_hook_ref: tool_hook:vitest.discover_tests
    tool_kind_class: test_adapter
    action_class: test_discovery
    trigger_class: test_discovery
    provider_ref: provider:test:vitest_jest:web_alpha
    canonical_command_id: cmd:testing.discover_current_scope
    language_ids: ["language:typescript", "language:tsx", "language:javascript", "language:jsx"]
    rerun_posture_class: rerunnable_from_execution_plane
    preview_requirement_class: not_required
    safety_class: read_only_no_mutation
    summary: Test discovery is execution-context bound and emits normalized task-event refs.

  - tool_hook_ref: tool_hook:vitest.run_current_scope
    tool_kind_class: test_adapter
    action_class: test_run
    trigger_class: test_run
    provider_ref: provider:test:vitest_jest:web_alpha
    canonical_command_id: cmd:testing.run_current_scope
    language_ids: ["language:typescript", "language:tsx", "language:javascript", "language:jsx"]
    rerun_posture_class: rerunnable_from_execution_plane
    preview_requirement_class: not_required
    safety_class: read_only_no_mutation
    summary: Test runs preserve runtime/test diagnostic provenance and rerun posture.

icon_rows:
  - icon_ref: icon:file.typescript
    language_ids: ["language:typescript"]
    icon_symbol: file-type-typescript
    theme_token_ref: color.icon.language.typescript
    summary: TypeScript file icon for tabs, file tree, and quick open.
  - icon_ref: icon:file.tsx
    language_ids: ["language:tsx"]
    icon_symbol: file-type-tsx
    theme_token_ref: color.icon.language.tsx
    summary: TSX file icon for source-first component files.
  - icon_ref: icon:file.javascript
    language_ids: ["language:javascript"]
    icon_symbol: file-type-javascript
    theme_token_ref: color.icon.language.javascript
    summary: JavaScript file icon for tabs, file tree, and quick open.
  - icon_ref: icon:file.jsx
    language_ids: ["language:jsx"]
    icon_symbol: file-type-jsx
    theme_token_ref: color.icon.language.jsx
    summary: JSX file icon for source-first component files.
  - icon_ref: icon:file.html
    language_ids: ["language:html"]
    icon_symbol: file-type-html
    theme_token_ref: color.icon.language.html
    summary: HTML document icon for web document rows.
  - icon_ref: icon:file.css
    language_ids: ["language:css"]
    icon_symbol: file-type-css
    theme_token_ref: color.icon.language.css
    summary: CSS document icon for web style rows.
  - icon_ref: icon:file.json
    language_ids: ["language:json"]
    icon_symbol: file-type-json
    theme_token_ref: color.icon.language.json
    summary: JSON config icon for web configuration rows.
  - icon_ref: icon:file.yaml
    language_ids: ["language:yaml"]
    icon_symbol: file-type-yaml
    theme_token_ref: color.icon.language.yaml
    summary: YAML config icon for web configuration rows.

docs_pack_refs:
  - pack_ref: docs_pack:tsjs_web.pack_scope
    label: TS/JS web language-pack alpha scope
    source_ref: docs/language/tsjs_web_language_pack_alpha.md
    mirrorable: true
    summary: Reviewer-facing page for this pack artifact and first runtime consumer.
  - pack_ref: docs_pack:tsjs_web.assistance_alpha
    label: TS/JS assistance alpha
    source_ref: docs/language/tsjs_wedge_alpha.md
    mirrorable: true
    summary: Hover, definition, references, and rename-preview contract consumed by the pack.
  - pack_ref: docs_pack:tsjs_web.quality_alpha
    label: TS/JS quality alpha
    source_ref: docs/language/tsjs_quality_alpha.md
    mirrorable: true
    summary: Formatter, linter, and test-adapter contract consumed by the pack.
  - pack_ref: docs_pack:tsjs_web.launch_bundle
    label: TS/JS external-alpha launch bundle
    source_ref: artifacts/bundles/tsjs_launch_bundle_alpha.yaml
    mirrorable: true
    summary: Setup bundle that can reference this language pack without duplicating pack state.
  - pack_ref: docs_pack:tsjs_web.known_limits
    label: External alpha known limits
    source_ref: artifacts/feedback/external_alpha_known_limits.md
    mirrorable: true
    summary: Known-limit packet that prevents pack badges from implying certified depth.

trust_and_integrity:
  default_trust_class: RawText
  surface_families:
    - editor_content
    - review_surface
    - support_export_surface
  suspicious_content_classes:
    - bidi_control
    - invisible_formatting
    - mixed_script_confusable
    - raw_rendered_divergence
  copy_export_action_refs:
    - copy_raw
    - copy_escaped
    - export_sanitized_snapshot
  support_export_preserves_labels: true
  suspicious_text_fix_requires_preview: true
  summary: Source, diff, docs, and support-export surfaces preserve raw/rendered, suspicious-text, and trust-class labels.

known_gap_rows:
  - gap_ref: known_gap:tsjs_web.framework_expert_depth_not_claimed
    applies_to_ref: language_pack:tsjs_web.alpha
    support_effect: React, Next, route graph, visual editing, and source-map debug depth remain explicit future overlays.
    fallback_label: Framework-specific answers remain advisory or unavailable unless a later framework pack provides evidence.
    docs_ref: artifacts/feedback/external_alpha_known_limits.md
  - gap_ref: known_gap:tsjs_web.html_css_json_yaml_basic_not_framework
    applies_to_ref: language_pack:tsjs_web.alpha
    support_effect: HTML, CSS, JSON, and YAML rows are web-adjacent alpha support, not expert framework support.
    fallback_label: These files stay syntax, diagnostics, formatting, icons, and docs scoped when no current provider is available.
    docs_ref: docs/language/tsjs_web_language_pack_alpha.md
  - gap_ref: known_gap:tsjs_web.broad_refactor_not_claimed
    applies_to_ref: provider:lsp:typescript:alpha
    support_effect: Rename preview is available, but stable broad refactor breadth is not claimed.
    fallback_label: Multi-file or partial-scope mutations require preview and may be blocked pending refresh or scope review.
    docs_ref: docs/language/tsjs_wedge_alpha.md
  - gap_ref: known_gap:tsjs_web.generated_route_map_not_mutated
    applies_to_ref: language:tsx
    support_effect: Generated routes, declarations, and framework maps are counted and labeled but not silently rewritten.
    fallback_label: Generated candidates are inspectable and blocked from direct mutation unless a later provider proves safe regeneration.
    docs_ref: docs/language/tsjs_wedge_alpha.md
  - gap_ref: known_gap:tsjs_web.external_process_execution_seeded
    applies_to_ref: provider:formatter:prettier:web_alpha
    support_effect: Tool hooks are canonical records; real process execution remains the execution adapter path.
    fallback_label: Missing or blocked tools preserve diagnostics and do not prevent other pack lanes from staying usable.
    docs_ref: docs/language/tsjs_quality_alpha.md

enablement_flows:
  - flow_ref: flow:tsjs_web.open_to_first_useful_result
    title: Open to first useful file, symbol, or web document result
    language_ids: ["language:typescript", "language:tsx", "language:javascript", "language:jsx", "language:html", "language:css", "language:json", "language:yaml"]
    required_provider_refs:
      - provider:syntax:tree_sitter:web_alpha
      - provider:lsp:typescript:alpha
      - provider:lsp:web_documents:alpha
    required_tool_hook_refs: []
    required_docs_pack_refs:
      - docs_pack:tsjs_web.pack_scope
      - docs_pack:tsjs_web.assistance_alpha
    manual_per_file_assembly_required: false
    preview_required_before_mutation: true
    summary: One pack activates web file associations, syntax, routed assistance, icons, docs, and fallback labels.

  - flow_ref: flow:tsjs_web.rename_preview
    title: Rename preview with partial-scope and generated-source labels
    language_ids: ["language:typescript", "language:tsx", "language:javascript", "language:jsx"]
    required_provider_refs:
      - provider:syntax:tree_sitter:web_alpha
      - provider:lsp:typescript:alpha
    required_tool_hook_refs: []
    required_docs_pack_refs:
      - docs_pack:tsjs_web.assistance_alpha
    manual_per_file_assembly_required: false
    preview_required_before_mutation: true
    summary: Rename preview remains a preview packet with rollback posture and no direct silent multi-file mutation.

  - flow_ref: flow:tsjs_web.quality_loop
    title: Format, lint, discover tests, and rerun targeted tests
    language_ids: ["language:typescript", "language:tsx", "language:javascript", "language:jsx", "language:html", "language:css", "language:json", "language:yaml"]
    required_provider_refs:
      - provider:formatter:prettier:web_alpha
      - provider:linter:eslint:web_alpha
      - provider:test:vitest_jest:web_alpha
    required_tool_hook_refs:
      - tool_hook:prettier.format_web_document
      - tool_hook:eslint.lint_workset
      - tool_hook:vitest.discover_tests
      - tool_hook:vitest.run_current_scope
    required_docs_pack_refs:
      - docs_pack:tsjs_web.quality_alpha
    manual_per_file_assembly_required: false
    preview_required_before_mutation: true
    summary: Quality hooks use one diagnostic and execution-plane contract instead of per-file tool setup.

  - flow_ref: flow:tsjs_web.config_document_editing
    title: JSON and YAML web configuration editing
    language_ids: ["language:json", "language:yaml"]
    required_provider_refs:
      - provider:syntax:tree_sitter:web_alpha
      - provider:formatter:prettier:web_alpha
    required_tool_hook_refs:
      - tool_hook:prettier.format_web_document
    required_docs_pack_refs:
      - docs_pack:tsjs_web.pack_scope
      - docs_pack:tsjs_web.known_limits
    manual_per_file_assembly_required: false
