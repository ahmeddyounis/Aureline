# yaml-language-server: $schema=../../schemas/contracts/example_pack_index.schema.json
# Reference contract example pack index.
#
# This file is the machine-readable index of sample payloads used to make
# Aureline's contract-bearing schemas executable for implementers, docs, CI
# validation, and support reproduction. The human overview lives at:
#   docs/contracts/reference_contract_examples_index.md
# Redaction and example-fidelity rules live at:
#   docs/contracts/example_redaction_rules.md
#
# Validation:
# - tools/validate_contract_example_pack.py validates this index and any
#   ci_required examples it references.
# - Payload validation strips fixture-only metadata keys ($schema, __fixture__)
#   before validating against schema_ref.

