# Frozen-surface manifest seed.
#
# This manifest turns M0 "frozen enough to build against" surfaces into
# machine-checkable CI rows. Each row names:
#   - the monitored files that count as a change to the frozen surface,
#   - the validation hooks that must remain live,
#   - the diff metadata that must move in the same change, and
#   - the same-train follow-up packets/docs/rows or waiver paths that
#     keep the change reviewable.
#
# M0 policy note:
#   - Touching this manifest counts as explicit diff metadata while the
#     repository is still seeding dedicated per-surface diff packets.
#   - A changed frozen surface still needs at least one companion update
#     or an explicit waiver/exception touch; a manifest-only edit is not
#     sufficient.

schema_version: 1
manifest_id: frozen_surface.m0.seed.01
title: Frozen-surface manifest seed
status: seeded
as_of: "2026-04-22"
overview_ref: docs/governance/frozen_surface_ci_policy.md
control_artifact_ref: artifacts/governance/control_artifact_index.yaml#frozen_surface_manifests
row_reference_format: artifacts/contracts/frozen_surface_manifest.yaml#<surface_id>

freeze_status_values:
  - frozen
  - provisional

obligation_class_values:
  - claim_or_public_truth
  - docs_help_or_release_copy
  - migration_or_compatibility
  - evidence_or_release_packet
  - support_or_handoff
  - ownership_or_topology
  - waiver_or_exception

validator_entrypoint_refs:
