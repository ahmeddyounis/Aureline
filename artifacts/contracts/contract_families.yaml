# Contract-family registry.
#
# This registry groups Aureline's contract-bearing packets, envelopes, and
# registries into a governed family map. The goal is to prevent parallel
# naming, versioning, and minimum-envelope conventions from drifting across
# command, runtime, tooling, support, design, policy, and export surfaces.
#
# The registry is descriptive and cross-cutting:
# - It does not replace per-family schemas or contract docs.
# - It does provide the "family selection" index every new packet or record
#   should consult before minting a new envelope shape or version dialect.
#
# Companion artifacts:
# - docs/contracts/contract_family_registry.md
# - schemas/contracts/contract_family_registry.schema.json
# - fixtures/contracts/contract_family_examples/
#
# Adding a new contract family:
# - Add a new `contract_family_row` below.
# - Link it to the relevant schema homes, primary docs, and at least one
#   example source.
# - If the family participates in compatibility review, cite the relevant
#   surface ids and/or compat_row ids so later CI and deprecation work can
#   reuse the same mapping.

schema_version: 1
registry_id: aureline.contract_family_registry
status: seeded
as_of: "2026-05-07"

overview_page: docs/contracts/contract_family_registry.md
schema_ref: schemas/contracts/contract_family_registry.schema.json
