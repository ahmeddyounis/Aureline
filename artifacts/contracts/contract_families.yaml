compatibility_surface_inventory_ref: artifacts/governance/compatibility_surfaces.yaml
qualification_matrix_ref: artifacts/compat/qualification_matrix_seed.yaml

minimum_envelope_ledger:
  - rule_id: stable_object_id
    title: Stable object identity
    description: >
      A family that claims machine-readable stability MUST name stable ids
      for its primary objects (packet id, event id, bundle id, record id).
      IDs are opaque tokens; they must be safe to log, safe to export, and
      safe to reference across CLI/headless output, desktop export, support
      bundles, and release packets.

  - rule_id: schema_identity
    title: Schema identity and version fields
    description: >
      A family that claims machine-readable stability MUST expose schema
      identity in-band: record kind and explicit schema version fields.
      Readers must be able to reject unknown or mismatched versions without
      inspecting free-form prose.

  - rule_id: target_context
    title: Target/context binding
    description: >
      A family that claims machine-readable stability MUST bind each payload
      to its target context (workspace, scope, execution context, provider
      scope, or other canonical target identity) so exports and replays do
      not invent ad-hoc provenance labels.

  - rule_id: actor_or_route_identity
    title: Actor and route identity (when relevant)
    description: >
      Consequence-bearing payloads MUST preserve who acted (actor identity)
      and/or how the action was routed (issuing surface, authority class,
      destination class, queue class) so surfaces do not infer intent from
      UI copy or transport details.

  - rule_id: build_or_bundle_refs
    title: Build, bundle, and release linkage (when relevant)
    description: >
      Families that participate in export, support, or release evidence MUST
      preserve exact-build linkage and/or bundle identity references when
      the consumer would otherwise be unable to reproduce or audit the
      payload honestly.

  - rule_id: lifecycle_or_support_class
    title: Lifecycle, support, and confidence posture
    description: >
      Families that can be quoted beyond their immediate producer MUST
      preserve lifecycle/support/confidence posture as typed fields so
      consumers do not overclaim certainty (for example, heuristic best-effort
      outputs masquerading as authoritative results).

  - rule_id: source_language_fallback
    title: Source-language fallback and message-key bindings (when relevant)
    description: >
      When a family carries user-facing labels or message-bearing fields, it
      MUST preserve message keys and source-language fallback posture as
      typed vocabulary. Export and support flows must remain interpretable
      without assuming a single UI locale.

  - rule_id: redaction_and_export
    title: Redaction, omission, and export posture
    description: >
      Families intended for support export, desktop export, CLI structured
      output, or release evidence MUST preserve redaction posture explicitly
      (redaction class, safe-preview trust class, omission summaries, and/or
      retention-by-reference stubs). Raw secrets and raw payloads never cross
      these boundaries.

