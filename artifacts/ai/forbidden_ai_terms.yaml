# Forbidden AI copy terms.
#
# Machine-readable rejection list for trust-sensitive AI surfaces. This file
# does not ban ordinary English globally; it bans these phrases when they
# appear in AI answers, AI suggestions, AI action proposals, validation copy,
# provider-route disclosure, replay explanations, or teaching surfaces in a
# way that overclaims evidence, confidence, freshness, validation, or
# mutation authority.

schema_version: 1
registry_id: ai.copy.forbidden_terms.v1
contract_doc: docs/ai/ai_copy_guardrails_contract.md
approved_terms_ref: artifacts/ai/approved_ai_terms.yaml
fixtures_ref: fixtures/ai/copy_guardrail_cases/

governance:
  owner_roles:
    - Product copy owner
    - AI platform owner
    - Supportability owner
    - Trust and safety owner
  change_rules:
    - Adding a forbidden phrase class is additive when it narrows a known risk and includes a rejected fixture or fixture update.
    - Removing or weakening a forbidden phrase class is breaking and requires copy, supportability, and AI platform review.
    - A phrase may be allowed in documentation that quotes a rejected example only when the fixture marks it as rejected.

forbidden_contexts:
  - trust_sensitive_ai_surface
  - educational_ai_answer
  - action_proposal
  - patch_preview
  - docs_suggestion
  - test_generation_suggestion
  - provider_route_disclosure
  - replay_explanation
  - support_export
  - guided_help

forbidden_terms:
  - term_id: ai.copy.forbidden.perfection_guarantee
    category: perfection_or_guarantee
    phrase_patterns:
      - guaranteed
      - perfect
      - always correct
      - never wrong
      - cannot fail
      - no risk
      - risk-free
      - foolproof
      - bulletproof
    forbidden_when:
      - The copy describes AI-generated, AI-inferred, generated, suggested, draft, or unvalidated output.
      - The copy describes a mutation, validation outcome, or provider route without a bounded evidence record.
    rejection_reason: >
      AI-inferred truth is provisional and cannot promise perfection,
      guaranteed success, or absence of risk.
    replacement_pattern: >
      Use Evidence-backed, Inferred, Low confidence, Validation not run,
      or Needs review with evidence refs and context limits.

  - term_id: ai.copy.forbidden.review_free_mutation
    category: review_free_mutation
    phrase_patterns:
      - auto-apply
      - automatically apply
      - fix automatically
      - no review needed
      - apply without review
      - self-approved
      - self approved
      - one-click fix
      - instant fix
      - merge now
      - push now
    forbidden_when:
      - The action would edit files, run live commands, commit, push, publish, install, deploy, or mutate provider state.
      - The surface has not rendered a review, approval, validation, and recovery path.
    rejection_reason: >
      AI copy cannot bypass interaction-safety, write-scope review,
      approval-ticket, or mutation-journal requirements.
    replacement_pattern: >
      Use Prepare preview, Open diff, Start sandbox run, Needs review,
      or an explicit Apply <object> label backed by the required review
      and approval records.

  - term_id: ai.copy.forbidden.false_validation
    category: false_validation
    phrase_patterns:
      - validated
      - verified
      - tested
      - tests pass
      - passing
      - safe to apply
      - ready to apply
      - production ready
      - approved by validation
    forbidden_when:
      - validation_plan_ref is null.
      - validation outcome is not passed for the declared scope.
      - validation scope is narrower than the copy implies.
    rejection_reason: >
      Validation language is reserved for named validation records and
      exact validation outcomes.
    replacement_pattern: >
      Use Validation not run, Validation running, Validation failed,
      Validation mixed, or Validation passed with the validation plan
      and declared scope.

  - term_id: ai.copy.forbidden.false_exhaustiveness
    category: false_exhaustiveness
    phrase_patterns:
      - complete context
      - full context
      - all files
      - every file
      - entire repo
      - entire project
      - all callers
      - nothing else affected
      - no other changes
      - covers everything
    forbidden_when:
      - The scope record is partial, stale, omitted, sparse, policy-limited, or not present.
      - The copy does not name covered and excluded scope.
    rejection_reason: >
      Scope breadth must come from a scope object, not from model prose.
    replacement_pattern: >
      Use Partial context or Omitted context and name covered scope,
      excluded scope, and the expand or open-detail route.

  - term_id: ai.copy.forbidden.false_freshness
    category: false_freshness
    phrase_patterns:
      - current
      - up to date
      - up-to-date
      - latest docs
      - latest result
      - fresh
      - live
      - real-time
    forbidden_when:
      - The backing freshness class is stale, unverified, degraded_cached, warm_cached, or unknown.
      - The answer uses replayed, imported, mirrored, cached, or provider-returned evidence without a current freshness record.
    rejection_reason: >
      Freshness language must match the governing freshness class and
      degraded-state token.
    replacement_pattern: >
      Use Stale evidence, Partial context, Replayed result, or the
      governing freshness chip with checked-at and refresh route.

  - term_id: ai.copy.forbidden.route_obscuring
    category: route_obscuring
    phrase_patterns:
      - local answer
      - private by default
      - no data left the device
      - first-party only
      - free
      - no cost
      - no retention
      - private model
    forbidden_when:
      - Provider selection disclosure is missing.
      - The provider route, execution locus, region, retention stance, quota, cost, or data-class allowlist contradicts the phrase.
    rejection_reason: >
      Provider route and retention facts must be disclosed from the
      provider-selection record, not implied by brand or tone.
    replacement_pattern: >
      Use Provider routed with provider, model, execution locus, region,
      retention, quota or cost, and data-class disclosure.

  - term_id: ai.copy.forbidden.false_authority
    category: false_authority
    phrase_patterns:
      - policy allows
      - admin approved
      - trust granted
      - permission granted
      - approved by Aureline
      - safe under policy
      - allowed to write
    forbidden_when:
      - The statement is generated by the model instead of a platform-governed policy, trust, approval, or permission record.
      - The relevant policy or approval record is absent or narrower than the copy implies.
    rejection_reason: >
      Models may not self-authorize policy, trust, permission, provider,
      or mutation authority.
    replacement_pattern: >
      Cite the policy, trust, approval-ticket, or permission record and
      render Needs review or Policy blocked when authority is unresolved.

  - term_id: ai.copy.forbidden.confidence_overstatement
    category: confidence_overstatement
    phrase_patterns:
      - certain
      - definitely
      - obviously
      - clearly fixes
      - will fix
      - will work
      - proves
      - understands the repo
      - knows the codebase
    forbidden_when:
      - The statement is AI-inferred, unvalidated, partial, low-confidence, or based on stale/omitted context.
    rejection_reason: >
      AI copy must state evidence and confidence class without pretending
      inference is direct knowledge.
    replacement_pattern: >
      Use Evidence-backed, Inferred, Low confidence, Suggested, or Needs
      review with an evidence reason.

  - term_id: ai.copy.forbidden.explain_action_collapse
    category: explain_action_collapse
    phrase_patterns:
      - explain and apply
      - explain and fix
      - explain then run
      - learn and apply
      - show and change
      - do it
      - fix it
      - make changes
      - continue
      - ok
    forbidden_when:
      - The label is the only control on a trust-sensitive AI surface.
      - The control performs or can lead directly to mutation without an explicit preview, diff, sandbox, review, or approval boundary.
    rejection_reason: >
      Teaching controls and mutation controls must remain separate and
      outcome-specific.
    replacement_pattern: >
      Use Explain, Open source, Prepare preview, Open diff, Start sandbox
      run, or an explicit command-backed mutation label with review
      posture.

  - term_id: ai.copy.forbidden.replay_overclaim
    category: replay_overclaim
    phrase_patterns:
      - replayed exactly
      - reproduced exactly
      - deterministic rerun
      - same result guaranteed
      - fully replayable
    forbidden_when:
      - replay_grade is partial_replay_* or non_replayable_*.
      - provider_availability is not reachable_same_identity_same_version.
      - mutation_status forces a replay downgrade.
    rejection_reason: >
      Replay copy must preserve graded replayability, provider
      availability, and mutation lineage.
    replacement_pattern: >
      Use Replayed result with replay grade, provider availability, and
      mutation status.

review_rules:
  - rule_id: ai.copy.reject_forbidden_term_on_trust_sensitive_surface
    summary: >
      Reject any forbidden phrase that appears on a trust-sensitive AI
      surface unless the fixture explicitly quotes it as a rejected example.
  - rule_id: ai.copy.require_approved_replacement
    summary: >
      Every rejection should suggest at least one approved replacement term
      or action control from artifacts/ai/approved_ai_terms.yaml.
  - rule_id: ai.copy.retain_context_in_accessibility_and_export
    summary: >
      If compact UI hides details, accessibility labels and support/export
      records still preserve evidence refs, confidence, context limits,
      route disclosure, validation state, and next safe action.
