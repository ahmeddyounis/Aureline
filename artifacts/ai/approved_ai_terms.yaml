# Approved AI copy terms.
#
# Machine-readable companion to docs/ai/ai_copy_guardrails_contract.md.
# Product surfaces, fixture reviews, localization, accessibility labels,
# support exports, and future lint tools read this file so high-trust AI
# wording uses one reserved vocabulary instead of surface-local synonyms.

schema_version: 1
registry_id: ai.copy.approved_terms.v1
contract_doc: docs/ai/ai_copy_guardrails_contract.md
forbidden_terms_ref: artifacts/ai/forbidden_ai_terms.yaml
fixtures_ref: fixtures/ai/copy_guardrail_cases/

governance:
  owner_roles:
    - Product copy owner
    - AI platform owner
    - Design systems owner
    - Supportability owner
  change_rules:
    - Adding a term is additive only when it narrows meaning and includes a fixture or fixture update.
    - Repurposing an existing term is breaking; add a replacement term and keep the old term as a deprecated alias.
    - Localized labels must preserve the reserved meaning even when grammar order changes.
    - AI confidence labels must name evidence, context gaps, and validation state instead of softening the claim.

term_domains:
  - confidence_label
  - evidence_label
  - context_disclosure
  - validation_state
  - proposal_state
  - action_control
  - route_disclosure
  - replay_disclosure
  - review_posture

terms:
  - term_id: ai.copy.confidence.evidence_backed
    display_label: Evidence-backed
    term_domain: confidence_label
    reserved_meaning: >
      The AI claim cites at least one authoritative anchor and no known
      contradiction was recorded in the included context.
    required_context:
      - At least one citation anchor, file/symbol ref, run/test ref, or packet ref.
      - Scope covered by the cited evidence.
      - Known omitted, partial, stale, or policy-blocked context when present.
    allowed_surface_classes:
      - assistant_answer
      - educational_ai_answer
      - review_summary
      - action_proposal
      - support_export
    forbidden_uses:
      - Do not use as a guarantee of correctness.
      - Do not use when no authoritative anchor is cited.
      - Do not use to imply validation passed.

  - term_id: ai.copy.confidence.inferred
    display_label: Inferred
    term_domain: confidence_label
    reserved_meaning: >
      The AI connected cited or included evidence into an explanation,
      estimate, or recommendation that is provisional by nature.
    required_context:
      - Evidence basis or included context summary.
      - Reason the statement is inferred rather than directly observed.
    allowed_surface_classes:
      - assistant_answer
      - architecture_explainer
      - review_summary
      - inline_assist
    forbidden_uses:
      - Do not publish as a claim-bearing statement.
      - Do not replace low confidence when limiting evidence is known.

  - term_id: ai.copy.confidence.low_confidence
    display_label: Low confidence
    term_domain: confidence_label
    reserved_meaning: >
      The AI result is below the surface confidence floor because evidence
      is missing, conflicting, stale, partial, omitted, policy-blocked, or
      unvalidated.
    required_context:
      - Specific confidence reason.
      - Safe next action, such as Open source, Prepare preview, Open diff, or Start sandbox run.
      - Direct mutation controls suppressed.
    allowed_surface_classes:
      - assistant_answer
      - action_proposal
      - review_summary
      - docs_suggestion
      - test_generation_suggestion
    forbidden_uses:
      - Do not pair with direct apply as the primary action.
      - Do not omit the limiting reason.

  - term_id: ai.copy.evidence.cited_answer
    display_label: Cited answer
    term_domain: evidence_label
    reserved_meaning: >
      The answer carries one or more citation anchors or source refs for
      repository, docs, runtime, or support truth.
    required_context:
      - Non-empty evidence refs.
      - Source type for each claim family.
    allowed_surface_classes:
      - educational_ai_answer
      - architecture_explainer
      - docs_help
      - support_export
    forbidden_uses:
      - Do not use when the answer includes only model prose.

  - term_id: ai.copy.context.partial_context
    display_label: Partial context
    term_domain: context_disclosure
    reserved_meaning: >
      Only part of the requested or implied scope was included or known.
    required_context:
      - Covered scope.
      - Excluded or unavailable scope.
      - Expand, refresh, or open-detail route when available.
    allowed_surface_classes:
      - assistant_answer
      - search_ai_overlay
      - action_proposal
      - support_export
    forbidden_uses:
      - Do not pair with exhaustive phrases such as all files or entire repo.

  - term_id: ai.copy.context.omitted_context
    display_label: Omitted context
    term_domain: context_disclosure
    reserved_meaning: >
      A context segment was known but excluded from the AI assembly due to
      budget, scope, policy, redaction, freshness, or user choice.
    required_context:
      - Omitted segment class or count.
      - Typed omit reason.
    allowed_surface_classes:
      - assistant_answer
      - prompt_composer
      - support_export
      - replay_explanation
    forbidden_uses:
      - Do not silently drop known omitted context.

  - term_id: ai.copy.context.stale_evidence
    display_label: Stale evidence
    term_domain: context_disclosure
    reserved_meaning: >
      A prior value or docs/reference source is shown past its freshness
      floor.
    required_context:
      - Source class.
      - Last-known-good or checked-at time when available.
      - Stale reason and refresh route.
    allowed_surface_classes:
      - assistant_answer
      - docs_suggestion
      - stale_doc_explanation
      - support_export
    forbidden_uses:
      - Do not call the result current, latest, or up to date.

  - term_id: ai.copy.proposal.suggested
    display_label: Suggested
    term_domain: proposal_state
    reserved_meaning: >
      The AI proposed guidance or a next step that has not been accepted,
      applied, validated, or made authoritative.
    required_context:
      - Evidence refs or context summary.
      - Confidence label.
      - Next safe action.
    allowed_surface_classes:
      - action_proposal
      - inline_assist
      - docs_suggestion
      - test_generation_suggestion
    forbidden_uses:
      - Do not use to imply approval or policy admission.

  - term_id: ai.copy.proposal.draft
    display_label: Draft
    term_domain: proposal_state
    reserved_meaning: >
      Generated content or a generated patch exists outside canonical
      source truth and still needs review before apply or publication.
    required_context:
      - Draft or request workspace ref.
      - Source or diff route.
      - Review or discard path.
    allowed_surface_classes:
      - patch_preview
      - docs_suggestion
      - review_handoff
      - support_export
    forbidden_uses:
      - Do not use for already-applied source.

  - term_id: ai.copy.validation.not_run
    display_label: Validation not run
    term_domain: validation_state
    reserved_meaning: >
      No validation plan has produced an outcome for this AI result.
    required_context:
      - Validation plan missing, skipped, or not applicable reason.
      - Safe validation route when available.
    allowed_surface_classes:
      - action_proposal
      - patch_preview
      - test_generation_suggestion
      - support_export
    forbidden_uses:
      - Do not combine with passed, validated, verified, or safe wording.

  - term_id: ai.copy.validation.running
    display_label: Validation running
    term_domain: validation_state
    reserved_meaning: >
      A named validation plan is in progress and has not produced a final
      outcome.
    required_context:
      - Validation plan ref.
      - Target scope.
    allowed_surface_classes:
      - action_proposal
      - patch_preview
      - run_surface
    forbidden_uses:
      - Do not imply the proposal is ready to apply.

  - term_id: ai.copy.validation.failed
    display_label: Validation failed
    term_domain: validation_state
    reserved_meaning: >
      A named validation plan ran and produced a failed outcome.
    required_context:
      - Validation plan ref.
      - Failure class or evidence ref.
      - Open diff, open source, or repair route.
    allowed_surface_classes:
      - action_proposal
      - patch_preview
      - support_export
    forbidden_uses:
      - Do not pair with ready or safe-to-apply language.

  - term_id: ai.copy.validation.mixed
    display_label: Validation mixed
    term_domain: validation_state
    reserved_meaning: >
      A named validation plan produced both passing and failing or blocked
      outcomes.
    required_context:
      - Included checks and blocked or failed checks.
      - Manual review route.
    allowed_surface_classes:
      - action_proposal
      - patch_preview
      - support_export
    forbidden_uses:
      - Do not collapse to passed.

  - term_id: ai.copy.validation.passed
    display_label: Validation passed
    term_domain: validation_state
    reserved_meaning: >
      A non-null validation plan ref produced a passed outcome for the
      declared scope.
    required_context:
      - Validation plan ref.
      - Declared validation scope.
      - Any excluded checks or stale evidence.
    allowed_surface_classes:
      - action_proposal
      - patch_preview
      - support_export
    forbidden_uses:
      - Do not use when validation_plan_ref is null.
      - Do not imply broader scope than the validation plan covered.

  - term_id: ai.copy.review.needs_review
    display_label: Needs review
    term_domain: review_posture
    reserved_meaning: >
      Human, policy, ownership, write-scope, or trust review remains
      required before mutation, publication, or external action.
    required_context:
      - Review owner or review surface.
      - Blocked action or scope.
    allowed_surface_classes:
      - action_proposal
      - patch_preview
      - publish_handoff
      - support_export
    forbidden_uses:
      - Do not hide the review owner behind generic disabled styling.

  - term_id: ai.copy.action.explain
    display_label: Explain
    term_domain: action_control
    reserved_meaning: >
      Read-only explanation over cited or included context.
    required_context:
      - Evidence or context basis.
      - No mutation side effect.
    allowed_surface_classes:
      - educational_ai_answer
      - guided_help
      - why_unavailable_explainer
      - assistant_answer
    forbidden_uses:
      - Do not run commands, mutate files, grant trust, or apply patches.

  - term_id: ai.copy.action.open_source
    display_label: Open source
    term_domain: action_control
    reserved_meaning: >
      Navigate to the cited source, docs anchor, symbol, diff base, run
      record, or evidence packet without modifying it.
    required_context:
      - Source ref.
      - Read-only navigation route.
    allowed_surface_classes:
      - educational_ai_answer
      - docs_suggestion
      - action_proposal
      - stale_doc_explanation
    forbidden_uses:
      - Do not edit, regenerate, or apply changes.

  - term_id: ai.copy.action.prepare_preview
    display_label: Prepare preview
    term_domain: action_control
    reserved_meaning: >
      Build or refresh a preview, draft, request workspace, or review
      packet without writing to canonical source.
    required_context:
      - Target scope.
      - Preview or request workspace ref when minted.
    allowed_surface_classes:
      - action_proposal
      - docs_suggestion
      - test_generation_suggestion
      - guided_help
    forbidden_uses:
      - Do not write canonical source or perform live mutation.

  - term_id: ai.copy.action.open_diff
    display_label: Open diff
    term_domain: action_control
    reserved_meaning: >
      Open an existing proposed, generated, or previewed diff for review
      without applying it.
    required_context:
      - Diff or preview ref.
      - Review posture.
    allowed_surface_classes:
      - action_proposal
      - patch_preview
      - review_summary
    forbidden_uses:
      - Do not apply the diff or mark it approved.

  - term_id: ai.copy.action.start_sandbox_run
    display_label: Start sandbox run
    term_domain: action_control
    reserved_meaning: >
      Run validation in a declared sandbox, side branch, worktree, or
      ephemeral environment with no live-worktree or external-provider
      mutation.
    required_context:
      - Sandbox or execution-context ref.
      - Side-effect boundary.
      - Validation plan ref when the run validates a proposal.
    allowed_surface_classes:
      - action_proposal
      - test_generation_suggestion
      - run_helper
    forbidden_uses:
      - Do not run against the live worktree.
      - Do not publish, install, deploy, commit, push, or mutate external provider state.

  - term_id: ai.copy.route.provider_routed
    display_label: Provider routed
    term_domain: route_disclosure
    reserved_meaning: >
      The answer or tool result used a governed provider route whose
      provider, model, execution locus, region, retention, quota, and
      data-class facts remain inspectable.
    required_context:
      - Provider selection disclosure ref.
      - Route selection or fallback reason when not the default cheapest qualifying route.
    allowed_surface_classes:
      - assistant_answer
      - action_proposal
      - provider_disclosure
      - support_export
    forbidden_uses:
      - Do not hide remote, BYOK, enterprise gateway, vendor-hosted, or extension-provided route details.

  - term_id: ai.copy.replay.replayed_result
    display_label: Replayed result
    term_domain: replay_disclosure
    reserved_meaning: >
      The answer or action explanation is based on a replay packet with a
      declared replay grade, provider availability, and mutation status.
    required_context:
      - Replay packet ref.
      - Replay grade.
      - Provider availability.
      - Mutation status.
    allowed_surface_classes:
      - replay_explanation
      - support_export
      - review_summary
    forbidden_uses:
      - Do not imply deterministic rerun when the replay grade is partial or non-replayable.
