schema_version: 1

source_backlog: artifacts/planning/m1_m2_work_breakdown.yaml

milestones:
  M1:
    epic_counts:
      total: 8
      committed: 6
      target: 1
      stretch: 0
      parked_hook_only: 1
      explicitly_cut: 0
    critical_path_epics:
      - m1.shell_command_entry_surfaces
      - m1.editor_io_recovery_core
      - m1.navigation_search_workset_truth
      - m1.execution_terminal_target_truth
      - m1.supportability_public_truth_governance_seed
  M2:
    epic_counts:
      total: 9
      committed: 7
      target: 1
      stretch: 0
      parked_hook_only: 1
      explicitly_cut: 0
    critical_path_epics:
      - m2.language_search_graph_alpha
      - m2.tasks_test_debug_execution_alpha
      - m2.supportability_recovery_trust_alpha
      - m2.release_evidence_exact_build_alpha

cross_milestone_critical_path:
  - m1.shell_command_entry_surfaces
  - m1.editor_io_recovery_core
  - m1.navigation_search_workset_truth
  - m1.execution_terminal_target_truth
  - m2.language_search_graph_alpha
  - m2.tasks_test_debug_execution_alpha
  - m2.supportability_recovery_trust_alpha
  - m2.release_evidence_exact_build_alpha

implementation_waves:
  - wave: 1
    window: immediately_after_m0_close
    epics:
      - m1.shell_command_entry_surfaces
      - m1.editor_io_recovery_core
      - m1.navigation_search_workset_truth
      - m1.execution_terminal_target_truth
      - m1.settings_tokens_activity_state
      - m1.supportability_public_truth_governance_seed
    rationale: >
      These rows already have landed M0 prototypes or decided contracts,
      and they define the shared shell, editor, save, search, target,
      and evidence seams every later alpha row reuses.
  - wave: 2
    window: after_m1_shell_editor_truth_stabilizes
    epics:
      - m2.language_search_graph_alpha
      - m2.git_review_daily_loop_alpha
      - m2.tasks_test_debug_execution_alpha
      - m2.onboarding_activity_docs_alpha
      - m2.supportability_recovery_trust_alpha
      - m2.provider_identity_policy_alpha
    rationale: >
      These alpha rows need the M1 shell/editor/workset/target surfaces
      to exist, but they do not require the still-open release or
      extension decisions to start implementation.
  - wave: 3
    window: after_release_and_extension_decisions_close
    epics:
      - m2.profile_sync_portability_alpha
      - m2.release_evidence_exact_build_alpha
      - m2.extension_install_review_alpha
    rationale: >
      These rows need either release-posture/exact-build closure or the
      extension ADR to move beyond hook-only status before they become
      stable alpha commitments.

start_posture:
  ready_now:
    - m1.editor_io_recovery_core
    - m1.navigation_search_workset_truth
    - m1.execution_terminal_target_truth
    - m1.settings_tokens_activity_state
  partially_blocked_now:
    - m1.shell_command_entry_surfaces
    - m1.supportability_public_truth_governance_seed
    - m1.automation_cli_seed
  blocked_now:
    - m1.accessibility_install_review_hooks

immediate_m1_task_clusters:
  start_now:
    - m1.editor.01
    - m1.editor.02
    - m1.editor.03
    - m1.editor.04
    - m1.search.01
    - m1.search.02
    - m1.search.03
    - m1.search.04
    - m1.exec.01
    - m1.exec.02
    - m1.exec.03
    - m1.exec.04
    - m1.settings.01
    - m1.settings.02
    - m1.settings.03
    - m1.settings.04
    - m1.support.01
    - m1.support.02
    - m1.support.04
  partially_blocked:
    - task_id: m1.shell.01
      reason: >
        Work can proceed under the spike-hosted narrowing, but the final
        non-throwaway shell home depends on D-0006.
    - task_id: m1.shell.03
      reason: >
        Shared command metadata can land now, but full keyboard
        completeness depends on D-0007 and DEP-0003.
    - task_id: m1.support.03
      reason: >
        Help/About provenance can start now, but the exact-build-facing
        copy and build-id joins depend on D-0011.
    - task_id: m1.auto.01
      reason: >
        Headless parity can start from the shared command metadata, but
        the long-term shell home still depends on D-0006.
  blocked:
    - task_id: m1.hooks.02
      reason: >
        Command-coverage matrices are blocked on the open keyboard/input
        decision and the missing accessibility/input review packet home.
    - task_id: m1.hooks.04
      reason: >
        DEP-0003 is still open; the review packet family does not yet
        exist in-repo.

decision_blockers:
  - decision_id: D-0006
    title: Shell / command-system contract and non-throwaway home
    status: open
    directly_constrains:
      - m1.shell_command_entry_surfaces
      - m1.automation_cli_seed
    unblock_condition: >
      Accept an ADR for the shell/command home or formally accept the
      spike-hosted narrowing for the full M1 scope.
  - decision_id: D-0007
    title: Keyboard-complete command graph and input model
    status: open
    directly_constrains:
      - m1.shell_command_entry_surfaces
      - m1.accessibility_install_review_hooks
    unblock_condition: >
      Freeze the default keyboard model and coverage surface, then seed
      the review packet family that proves it.
  - decision_id: D-0008
    title: Accessibility bridge and semantic surface contract
    status: open
    directly_constrains:
      - m1.accessibility_install_review_hooks
    unblock_condition: >
      Land the accessibility ADR and the packet home behind DEP-0003.
  - decision_id: D-0010
    title: Release posture — cadence, channels, and rollback
    status: open
    directly_constrains:
      - m2.release_evidence_exact_build_alpha
    unblock_condition: >
      Close the release posture or accept the single-preview fallback
      described in the decision register.
  - decision_id: D-0011
    title: Exact-build identity — one identity across artifact families
    status: open
    directly_constrains:
      - m1.supportability_public_truth_governance_seed
      - m2.release_evidence_exact_build_alpha
    unblock_condition: >
      Close the exact-build ADR and update every alpha artifact family to
      consume the same build identity.
  - decision_id: D-0018
    title: Extension manifest scope, effective permission, publisher continuity, and policy-pack ADR seed
    status: deciding
    directly_constrains:
      - m1.accessibility_install_review_hooks
      - m2.extension_install_review_alpha
    unblock_condition: >
      Promote the extension ADR seed from proposed to accepted or keep
      the extension row explicitly parked.

artifact_and_dependency_gates:
  - gate: DEP-0003
    status: open
    effect: >
      Blocks keyboard-coverage and accessibility packet closure, which in
      turn keeps accessibility truth at hook-only status.
  - gate: missing_dependency_m00_61
    status: missing
    effect: >
      No repository artifact exists for the dependency named in the task
      spec, so no backlog row depends on it directly; if it lands later,
      reassess the rollup and release wave.

commitment_summary:
  committed_rows_must_exit_with:
    - machine-readable evidence owner
    - identified M0 gate artifacts
    - explicit dependency chain
    - critical-path visibility where applicable
  target_rows_may_slip_if:
    - committed rows go yellow
    - decision closure takes longer than the current milestone window
  parked_rows_must_not:
    - be counted toward milestone completion
    - surface as user-facing alpha scope without explicit reclassification
