schema_version: 1

sources:
  - .t2/docs/Aureline_Milestones_Document.md
  - .t2/docs/Aureline_PRD.md
  - .t2/docs/Aureline_Technical_Design_Document.md
  - artifacts/governance/decision_index.yaml
  - artifacts/governance/ownership_matrix.yaml
  - artifacts/governance/dependency_ledger.yaml

commitment_class_source: artifacts/governance/commitment_classes.yaml
dependency_ledger_ref: artifacts/governance/dependency_ledger.yaml

owner_resolution:
  current_repo_owner_dri: "@ahmeddyounis"
  backup_waiver: single-maintainer-backup
  note: >
    Planned owner teams follow the milestone document's team topology so
    the backlog is usable once staffing expands. The current repository
    still resolves every row to the single maintainer through
    artifacts/governance/ownership_matrix.yaml.

commitment_class_vocabulary:
  - Committed
  - Target
  - Stretch
  - Parked / hook-only
  - Explicitly cut

team_legend:
  - Shell/Editor
  - Platform/VFS
  - Tooling/Execution
  - Language Platform
  - QE/Performance
  - Supportability
  - Release
  - Docs/Public Truth
  - Security/Trust
  - UX/Design

contract_gap_note: >
  PRD Appendix Q cites RFC-005, RFC-021, RFC-022, RFC-023, RFC-029,
  RFC-035, RFC-036, RFC-042, RFC-043, RFC-044, and RFC-045 as epic
  prerequisites, but those RFC bodies are not yet authored in-repo.
  Rows below therefore anchor to landed M0 ADRs, prototypes, schemas,
  and decision-register entries, and treat contract freezing as part of
  the first implementation wave instead of as an off-repo blocker.

m0_gates:
  renderer_spike:
    kind: prototype
    status: available
    path_or_ref: crates/aureline-shell-spike/
    note: >
      Headless shell spike with named input, render, frame-timing, and
      zone seams.
  renderer_trace_seed:
    kind: artifact
    status: available
    path_or_ref: artifacts/render/spike_trace_samples/
    note: >
      Byte-stable warm-start, caret, IME, scroll, and full-scene traces.
  shell_spike_notes:
    kind: document
    status: available
    path_or_ref: docs/design/shell_spike_composition_notes.md
    note: >
      Composition-path notes for damage, text-layer boundary, and trace
      ownership.
  buffer_prototype:
    kind: prototype
    status: available
    path_or_ref: crates/aureline-buffer/src/piece_tree/
    note: >
      Piece-tree editing core with grouped undo/redo and snapshot API.
  vfs_prototype:
    kind: prototype
    status: available
    path_or_ref: crates/aureline-vfs/src/
    note: >
      Canonical path, alias-set, watcher, and save-plan prototype.
  save_truth_fixtures:
    kind: fixture_corpus
    status: available
    path_or_ref: fixtures/fs/save_truth_cases/
    note: >
      Structured save, alias, and watcher degradation truth cases.
  benchmark_corpus:
    kind: fixture_manifest
    status: available
    path_or_ref: fixtures/benchmarks/corpus_manifest.yaml
    note: >
      Protected corpus manifest that M1 and M2 traces and scorecards
      should reuse.
  reference_workspaces:
    kind: fixture_seed
    status: available
    path_or_ref: fixtures/workspaces/reference/
    note: >
      Reference workspace seeds for local folders, archetypes, and
      restore scenarios.
  execution_context_contract:
    kind: decided_contract
    status: available
    path_or_ref: docs/adr/0009-execution-context-and-scope.md
    note: >
      Freezes execution-context, target identity, workset/scope, and
      provenance vocabulary.
  settings_contract:
    kind: decided_contract
    status: available
    path_or_ref: docs/adr/0008-settings-definition-and-effective-configuration-resolver.md
    note: >
      Freezes effective settings vocabulary and scope-explicit writes.
  identity_modes_contract:
    kind: decided_contract
    status: available
    path_or_ref: docs/adr/0001-identity-modes.md
    note: >
      Freezes account-free local versus managed identity posture.
  secret_broker_contract:
    kind: decided_contract
    status: available
    path_or_ref: docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md
    note: >
      Freezes credential-handle and redaction defaults.
  provider_approval_contract:
    kind: decided_contract
    status: available
    path_or_ref: docs/adr/0010-connected-provider-browser-handoff-approval-ticket.md
    note: >
      Freezes provider browser handoff, approval-ticket, and publish
      routing vocabulary.
  lifecycle_dependency_contract:
    kind: decided_contract
    status: available
    path_or_ref: docs/adr/0011-capability-lifecycle-and-dependency-markers.md
    note: >
      Freezes Labs/Preview/Beta/Stable states and dependency markers.
  docs_truth_contract:
    kind: decided_contract
    status: available
    path_or_ref: docs/adr/0013-docs-help-service-health-truth.md
    note: >
      Freezes Help/About/service-health provenance and freshness badges.
  search_truth_contract:
    kind: decided_contract
    status: available
    path_or_ref: docs/adr/0014-search-readiness-ranking-result-truth.md
    note: >
      Freezes readiness labels, ranking reasons, hidden-scope, and
      deep-link drift truth.
  interaction_safety_contract:
    kind: contract_seed
    status: available
    path_or_ref: docs/ux/shell_interaction_safety_contract.md
    note: >
      Preview/apply/revert, typed permission prompts, and responsive
      fallback contract.
  safe_preview_contract:
    kind: contract_seed
    status: available
    path_or_ref: docs/security/safe_preview_trust_classes.md
    note: >
      Safe-preview and suspicious-content class vocabulary for risky
      content and install surfaces.
  docs_pack_contract:
    kind: contract_seed
    status: available
    path_or_ref: docs/docs/docs_pack_manifest_contract.md
    note: >
      Docs-pack, source-version, freshness, and stale-example contract.
  route_taxonomy:
    kind: contract_seed
    status: available
    path_or_ref: docs/runtime/origin_target_route_taxonomy.md
    note: >
      Client-origin, target, and route-resolution vocabulary.
  shell_contract_decision:
    kind: open_decision
    status: open
    path_or_ref: artifacts/governance/decision_index.yaml#D-0006
    note: >
      Non-throwaway shell and shared command-system home is not yet
      closed; M1 may proceed under the spike-hosted narrowing only.
  keyboard_input_decision:
    kind: open_decision
    status: open
    path_or_ref: artifacts/governance/decision_index.yaml#D-0007
    note: >
      Full keyboard-complete model is still open; default path is to
      narrow to the default scheme for the beta surface.
  accessibility_decision:
    kind: open_decision
    status: open
    path_or_ref: artifacts/governance/decision_index.yaml#D-0008
    note: >
      Accessibility bridge and semantic surface contract is still open;
      claimed readiness is blocked until it closes.
  accessibility_review_dependency:
    kind: open_dependency
    status: satisfied
    path_or_ref: artifacts/governance/decision_index.yaml#DEP-0003
    note: >
      Accessibility/input review packet family is seeded; later work
      should refresh current evidence rather than inventing a new home.
  release_posture_decision:
    kind: open_decision
    status: open
    path_or_ref: artifacts/governance/decision_index.yaml#D-0010
    note: >
      Channel/cadence/rollback posture remains open; alpha defaults to a
      single preview if unresolved.
  exact_build_decision:
    kind: open_decision
    status: open
    path_or_ref: artifacts/governance/decision_index.yaml#D-0011
    note: >
      One exact-build identity across artifact families remains open;
      current fallback is to reuse the foundations build identity.
  build_reproducibility_baseline:
    kind: baseline
    status: available
    path_or_ref: docs/build/reproducible_build_baseline.md
    note: >
      Pinned toolchain, bootstrap, and build-identity record already
      exist.
  extension_trust_decision:
    kind: deciding_adr_seed
    status: deciding
    path_or_ref: docs/adr/0012-extension-manifest-permission-publisher-policy.md
    note: >
      Extension permission, publisher continuity, and install-review
      vocabulary is still a proposed ADR seed.

epics:
  - id: m1.shell_command_entry_surfaces
    title: Shell, command, and entry-surface foundation
    target_milestone: M1
    commitment_class: Committed
    critical_path: true
    planned_owner_team: Shell/Editor
    evidence_owner_team: QE/Performance
    start_posture: partially_blocked
    source_epic_refs: [EPIC-001, EPIC-004]
    gate_refs:
      - renderer_spike
      - renderer_trace_seed
      - shell_spike_notes
      - shell_contract_decision
      - keyboard_input_decision
      - docs_truth_contract
    dependency_ids:
      - progdep.renderer_native_window_viability
      - progdep.shell_host_keyboard_freeze
    depends_on_epics: []
    summary: >
      Replace the throwaway spike shell with the first daily-dogfood
      command surface, start center, entry verbs, degraded-state
      vocabulary, and activity-center shell chrome.
    done_when: >
      Daily dogfood can begin from a non-demo shell surface with stable
      command IDs, honest entry verbs, and visible degraded-state copy.
    tasks:
      - id: m1.shell.01
        title: Choose the non-throwaway shell home and port the spike layout into it
        planned_owner_team: Shell/Editor
        evidence_owner_team: QE/Performance
        dependency_chain: [renderer_spike, shell_spike_notes, shell_contract_decision]
        can_start_now: true
        blocked_by: [shell_contract_decision]
        planned_deliverables:
          - promote the shell lane out of crates/aureline-shell-spike/ or explicitly accept the spike-hosted narrowing
          - preserve the named input/render/frame seams already exercised by the spike
      - id: m1.shell.02
        title: Build the Start Center and the distinct Open, Clone, Import, and Restore verbs
        planned_owner_team: Shell/Editor
        evidence_owner_team: UX/Design
        dependency_chain: [m1.shell.01, identity_modes_contract]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - first-run and warm-start entry surfaces with no account detour on local rows
          - missing-target and restore placeholder states on the primary shell path
      - id: m1.shell.03
        title: Wire command IDs, disabled reasons, palette rows, and keybinding narration
        planned_owner_team: Shell/Editor
        evidence_owner_team: Docs/Public Truth
        dependency_chain: [m1.shell.01, keyboard_input_decision, docs_truth_contract]
        can_start_now: true
        blocked_by: [keyboard_input_decision]
        planned_deliverables:
          - shared command metadata on shell, palette, and keybinding help surfaces
          - default-scheme keyboard path smoke coverage with explicit blockers for unsupported schemes
      - id: m1.shell.04
        title: Add degraded-state chips, activity-center prototype, and Help/About origin chrome
        planned_owner_team: Shell/Editor
        evidence_owner_team: Docs/Public Truth
        dependency_chain: [m1.shell.02, docs_truth_contract, interaction_safety_contract]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - Warming, Partial, Offline, and Unsupported labels on core shell surfaces
          - durable job row prototype for at least one background task class
          - Help/About pane with Open in browser and explicit embedded-origin chrome

  - id: m1.editor_io_recovery_core
    title: Editor, save, and recovery core
    target_milestone: M1
    commitment_class: Committed
    critical_path: true
    planned_owner_team: Platform/VFS
    evidence_owner_team: QE/Performance
    start_posture: ready
    source_epic_refs: [EPIC-002, EPIC-022]
    gate_refs:
      - buffer_prototype
      - vfs_prototype
      - save_truth_fixtures
      - benchmark_corpus
    dependency_ids: []
    depends_on_epics: []
    summary: >
      Join the piece-tree prototype and the VFS/save prototype into the
      first honest edit, save, restore, and large-file loop.
    done_when: >
      Buffers, save semantics, local history, crash recovery, and
      large-file handoff support hours-long dogfood editing without
      silent data loss.
    tasks:
      - id: m1.editor.01
        title: Stabilize the editor-facing buffer surface and multi-buffer session identity
        planned_owner_team: Shell/Editor
        evidence_owner_team: QE/Performance
        dependency_chain: [buffer_prototype]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - editor-facing API boundary over the piece-tree prototype
          - session-safe buffer identity for restore and mutation tracking
      - id: m1.editor.02
        title: Bridge buffer transactions to the save pipeline and source-fidelity cases
        planned_owner_team: Platform/VFS
        evidence_owner_team: QE/Performance
        dependency_chain: [m1.editor.01, vfs_prototype, save_truth_fixtures]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - compare-before-write, alias-aware save planning, and conflict review
          - encoding, newline, and permissions preservation on the saved path
      - id: m1.editor.03
        title: Land local history, crash journal, and restore placeholders
        planned_owner_team: Platform/VFS
        evidence_owner_team: Supportability
        dependency_chain: [m1.editor.02, reference_workspaces]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - local history and crash-journal foundation
          - restore placeholders that never hide missing targets or unsafe replay
      - id: m1.editor.04
        title: Wire large-file mode handoff, decode recovery, and repair seams
        planned_owner_team: Platform/VFS
        evidence_owner_team: QE/Performance
        dependency_chain: [m1.editor.01, benchmark_corpus]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - large-file classification handoff into the existing prototype lane
          - decode failure and constrained-edit repair seams carried into dogfood surfaces

  - id: m1.navigation_search_workset_truth
    title: Navigation, search, and workset truth foundation
    target_milestone: M1
    commitment_class: Committed
    critical_path: true
    planned_owner_team: Shell/Editor
    evidence_owner_team: QE/Performance
    start_posture: ready
    source_epic_refs: [EPIC-005, EPIC-021]
    gate_refs:
      - vfs_prototype
      - benchmark_corpus
      - reference_workspaces
      - search_truth_contract
      - execution_context_contract
    dependency_ids: []
    depends_on_epics:
      - m1.editor_io_recovery_core
    summary: >
      Deliver file tree, quick open, search shell, path truth, and
      named workset scope chips on reference workspaces before full
      indexing exists.
    done_when: >
      Dogfood users can open, switch, and search real repos with honest
      readiness labels and explicit scope.
    tasks:
      - id: m1.search.01
        title: Ship file tree, quick open, and search shell on reference workspaces
        planned_owner_team: Shell/Editor
        evidence_owner_team: QE/Performance
        dependency_chain: [m1.editor.02, vfs_prototype, reference_workspaces]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - file tree and quick-open foundations over the M0 reference workspaces
          - shell-level search entry point that can survive partial readiness
      - id: m1.search.02
        title: Implement exact, imported, heuristic, and stale readiness labels
        planned_owner_team: Shell/Editor
        evidence_owner_team: Docs/Public Truth
        dependency_chain: [m1.search.01, search_truth_contract]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - first readiness chips and explainability copy on one graph-backed surface
          - no unlabeled fallback from exact to heuristic results
      - id: m1.search.03
        title: Bind path truth, alias inspector, and save-target review to explorer and search
        planned_owner_team: Platform/VFS
        evidence_owner_team: Supportability
        dependency_chain: [m1.search.01, save_truth_fixtures]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - path-truth chip and alias inspector on difficult filesystem cases
          - save-target review flow reachable from explorer and search contexts
      - id: m1.search.04
        title: Seed named worksets, sparse scopes, and scope chips
        planned_owner_team: Tooling/Execution
        evidence_owner_team: QE/Performance
        dependency_chain: [m1.search.01, execution_context_contract]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - named workset artifact seed
          - scope-truth chips on open, quick-open, and search foundations

  - id: m1.execution_terminal_target_truth
    title: Terminal, execution-context, and target-truth seed
    target_milestone: M1
    commitment_class: Committed
    critical_path: true
    planned_owner_team: Tooling/Execution
    evidence_owner_team: Supportability
    start_posture: ready
    source_epic_refs: [EPIC-006, EPIC-023, EPIC-029]
    gate_refs:
      - execution_context_contract
      - provider_approval_contract
      - identity_modes_contract
      - secret_broker_contract
      - route_taxonomy
    dependency_ids:
      - progdep.shell_host_keyboard_freeze
    depends_on_epics:
      - m1.shell_command_entry_surfaces
      - m1.editor_io_recovery_core
    summary: >
      Make terminal and launch-adjacent surfaces share one visible
      execution-context, target, and route vocabulary before tasks and
      debug widen in M2.
    done_when: >
      Terminal, task-prep, debug-prep, and provider-entry points all
      show the same execution-target truth and degrade honestly.
    tasks:
      - id: m1.exec.01
        title: Embed the terminal pane with split, move, restore, and plain-PTY fallback
        planned_owner_team: Tooling/Execution
        evidence_owner_team: QE/Performance
        dependency_chain: [m1.shell.01, renderer_spike]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - embedded terminal foundation on the shared shell surface
          - explicit degrade-to-plain-PTY behavior when richer metadata is unavailable
      - id: m1.exec.02
        title: Surface the execution-context inspector on terminal, task, and debug-prep seeds
        planned_owner_team: Tooling/Execution
        evidence_owner_team: Supportability
        dependency_chain: [m1.exec.01, execution_context_contract]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - shared execution-context inspector
          - first provenance-bearing launch summary on terminal and prep surfaces
      - id: m1.exec.03
        title: Add target, origin, route, and workset chips on launch-capable entry points
        planned_owner_team: Tooling/Execution
        evidence_owner_team: Docs/Public Truth
        dependency_chain: [m1.exec.02, route_taxonomy, provider_approval_contract]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - target/origin badges on terminal, task, debug, remote attach, and provider entry points
          - route truth that never hides desktop versus remote versus managed origin
      - id: m1.exec.04
        title: Wire system-browser auth callback and account-free local versus managed shell vocabulary
        planned_owner_team: Tooling/Execution
        evidence_owner_team: Security/Trust
        dependency_chain: [m1.exec.03, identity_modes_contract, secret_broker_contract]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - system-browser auth callback baseline
          - explicit account-free-local versus managed wording on shell entry surfaces

  - id: m1.settings_tokens_activity_state
    title: Settings, tokens, activity, and materialized-view state
    target_milestone: M1
    commitment_class: Committed
    critical_path: false
    planned_owner_team: UX/Design
    evidence_owner_team: Docs/Public Truth
    start_posture: ready
    source_epic_refs: [EPIC-007]
    gate_refs:
      - settings_contract
      - lifecycle_dependency_contract
      - docs_truth_contract
    dependency_ids: []
    depends_on_epics:
      - m1.shell_command_entry_surfaces
    summary: >
      Land the first effective-settings resolver, shell token system,
      component-state vocabulary, and reactive surface seeds that later
      alpha lanes can extend without churn.
    done_when: >
      Core shell surfaces share one token/state vocabulary and one
      inspectable settings resolution model.
    tasks:
      - id: m1.settings.01
        title: Finish the effective-settings resolver with scope-explicit writes and lock explanations
        planned_owner_team: Platform/VFS
        evidence_owner_team: Docs/Public Truth
        dependency_chain: [settings_contract]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - resolver foundation with shadow-chain inspection
          - scope-explicit writes and locked-write semantics on settings surfaces
      - id: m1.settings.02
        title: Apply theme, density, motion, and component-state tokens to shell foundations
        planned_owner_team: UX/Design
        evidence_owner_team: UX/Design
        dependency_chain: [m1.shell.02, m1.settings.01]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - baseline token coverage on shell, Start Center, search, and trust prompts
          - reduced-motion and density-aware state variants on the initial shell rows
      - id: m1.settings.03
        title: Stand up the first subscription skeleton and readiness-labeled materialized view
        planned_owner_team: Platform/VFS
        evidence_owner_team: QE/Performance
        dependency_chain: [m1.search.02, lifecycle_dependency_contract]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - one shared subscription and materialized-view contract on a graph-backed surface
          - exported exact/imported/heuristic/stale labels for that surface
      - id: m1.settings.04
        title: Seed generated-artifact lineage and lockfile/build-output hints on explorer and search surfaces
        planned_owner_team: Platform/VFS
        evidence_owner_team: Supportability
        dependency_chain: [m1.search.03]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - build output, generated source sibling, and lockfile class hints
          - first lineage-friendly explorer and search affordances

  - id: m1.supportability_public_truth_governance_seed
    title: Supportability, public-truth, and governance seeds
    target_milestone: M1
    commitment_class: Committed
    critical_path: true
    planned_owner_team: Supportability
    evidence_owner_team: Supportability
    start_posture: partially_blocked
    source_epic_refs: [EPIC-014, EPIC-040, EPIC-043]
    gate_refs:
      - benchmark_corpus
      - docs_truth_contract
      - lifecycle_dependency_contract
      - build_reproducibility_baseline
      - exact_build_decision
      - safe_preview_contract
      - interaction_safety_contract
    dependency_ids:
      - progdep.benchmark_hardware_baseline
      - progdep.exact_build_cleanroom_parity
      - progdep.public_truth_freshness_automation
    depends_on_epics:
      - m1.editor_io_recovery_core
      - m1.shell_command_entry_surfaces
    summary: >
      Turn the M0 corpora and governance seeds into the first dogfood
      evidence system, support bundle skeleton, docs/help truth source,
      and boundary/lifecycle scaffolding.
    done_when: >
      Protected-path evidence is generated on nightly cadence, support
      export exists in seed form, and public-truth surfaces stop relying
      on unwritten team memory.
    tasks:
      - id: m1.support.01
        title: Wire hot-path traces, fixture corpora, and protected dashboards
        planned_owner_team: QE/Performance
        evidence_owner_team: QE/Performance
        dependency_chain: [benchmark_corpus, reference_workspaces, renderer_trace_seed]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - startup, typing, save/recovery, trust, and install-topology smoke dashboards
          - artifacts/qa/window_display_matrix.yaml and docs/qa/multi_window_verification.md as the claimed-row seed for suspend/resume, mixed-DPI, and multi-monitor continuity
      - id: m1.support.02
        title: Seed support bundle redaction defaults, recovery ladder, and restore placeholder audit
        planned_owner_team: Supportability
        evidence_owner_team: Supportability
        dependency_chain: [m1.editor.03, safe_preview_contract]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - support/incident bundle manifest skeleton with redaction defaults
          - first recovery-ladder packet and entry/restore placeholder audit
      - id: m1.support.03
        title: Publish Help/About provenance badges and stale-example detection skeleton
        planned_owner_team: Docs/Public Truth
        evidence_owner_team: Docs/Public Truth
        dependency_chain: [docs_truth_contract, exact_build_decision]
        can_start_now: true
        blocked_by: [exact_build_decision]
        planned_deliverables:
          - About/Help/provenance surface tied to source, freshness, and client-scope badges
          - stale-example detection pipeline skeleton and docs-pack CI checks
      - id: m1.support.04
        title: Land boundary-manifest, lifecycle, schema-registry, provider, and experiment seeds
        planned_owner_team: Docs/Public Truth
        evidence_owner_team: Release
        dependency_chain:
          [lifecycle_dependency_contract, provider_approval_contract, identity_modes_contract]
        can_start_now: true
        blocked_by: []
        planned_deliverables:
          - boundary-manifest and capability-lifecycle seed rows for protected surfaces
          - schema-registry, experiments/Labs registry, install-topology/state-root baseline, and critical dependency/import automation seed

  - id: m1.automation_cli_seed
    title: Automation and headless parity seed
    target_milestone: M1
    commitment_class: Target
    critical_path: false
    planned_owner_team: Tooling/Execution
    evidence_owner_team: Docs/Public Truth
    start_posture: partially_blocked
    source_epic_refs: [EPIC-034, EPIC-040]
    gate_refs:
      - shell_contract_decision
      - execution_context_contract
      - docs_truth_contract
    dependency_ids:
      - progdep.shell_host_keyboard_freeze
    depends_on_epics:
