# yaml-language-server: $schema=../../schemas/design/component_conformance_matrix.schema.json
#
# Component conformance matrix.
#
# This matrix names the reusable component families the product relies on and
# publishes:
#   - the per-family packet-section expectations; and
#   - the CI fail-gate contract that rejects launch-critical component packets
#     that omit metric ids or the minimum keyboard/accessibility/screenshot hooks.
#
# This file is intentionally small and compositional: it points at canonical
# contracts (state taxonomy, metrics ledger, token inheritance) rather than
# repeating them.

record_kind: component_conformance_matrix_record
component_conformance_schema_version: 1
matrix_id: component_conformance_matrix:default:01
source_of_truth_refs:
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#appendix-n--critical-component-state-matrix
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#34.2-component-review-checklist
  - docs/design/component_conformance_packet_template.md
  - docs/design/component_state_taxonomy.md
  - docs/design/component_metrics_contract.md
  - docs/design/theme_support_and_inheritance_contract.md
  - docs/design/token_conformance_audit.md
  - artifacts/design/component_metrics_ledger.yaml
  - artifacts/design/token_drift_rules.yaml
packet_fixture_dir_ref: fixtures/design/component_packet_examples/

ci_fail_gate_contract:
  contract_version: 1
  launch_priority_policies:
    - launch_priority_class: launch_critical
      # Dot-paths into the component conformance packet record that must be
      # non-empty for launch-critical components.
      required_nonempty_fields:
        - component_contract_ref
        - state_taxonomy.required_taxonomy_state_classes
        - metric_requirements.metric_ids
        - token_inheritance.token_drift_check_refs
        - appearance_evidence.screenshot_baseline_refs
        - keyboard_evidence.keyboard_journey_refs
        - accessibility_evidence.assistive_technology_refs
      allowed_conformance_posture_classes:
        - fully_conformant
        - conformant_with_disclosed_gaps

    - launch_priority_class: supporting
      required_nonempty_fields:
        - component_contract_ref
      allowed_conformance_posture_classes:
        - fully_conformant
        - conformant_with_disclosed_gaps

    - launch_priority_class: optional
      required_nonempty_fields: []
      allowed_conformance_posture_classes:
        - fully_conformant
        - conformant_with_disclosed_gaps

component_family_rows:
  - component_family_class: button
    family_title: Buttons
    launch_priority_default: launch_critical
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Includes primary/secondary/tertiary/destructive variants and split-button affordances.

  - component_family_class: text_input
    family_title: Text inputs and search fields
    launch_priority_default: launch_critical
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Includes validation, read-only, and loading/pending distinction where applicable.

  - component_family_class: choice_control
    family_title: Choice controls
    launch_priority_default: supporting
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Radios, checkboxes, toggles, and segmented controls; keyboard and accessible-name coverage is mandatory.

  - component_family_class: tabs
    family_title: Tabs
    launch_priority_default: launch_critical
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Includes editor-tab variants (pinned/preview/dirty/read-only/shared).

  - component_family_class: tree
    family_title: Tree rows and tree views
    launch_priority_default: launch_critical
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Current vs selected must remain distinct; hover-only affordances require keyboard parity.

  - component_family_class: list_row
    family_title: List and result rows
    launch_priority_default: launch_critical
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Includes stale/unavailable semantics; rows must remain inspectable when degraded.

  - component_family_class: table
    family_title: Tables and grids
    launch_priority_default: supporting
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Includes column resizing, sort affordances, selection, and cell focus behavior.

  - component_family_class: dialog_or_sheet
    family_title: Dialogs and sheets
    launch_priority_default: launch_critical
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Includes submitting/blocked/error states and focus-return rules.

  - component_family_class: banner
    family_title: Banners
    launch_priority_default: launch_critical
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Degraded and locked banners must name preserved capability and recovery route.

  - component_family_class: toast
    family_title: Toasts
    launch_priority_default: supporting
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Toast layers must not block dialog actions and must remain dismissible by keyboard.

  - component_family_class: status_item
    family_title: Status items
    launch_priority_default: launch_critical
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Active items require an inspect path; busy/reconnect states must be explicit.

  - component_family_class: settings_row
    family_title: Settings rows
    launch_priority_default: launch_critical
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Managed/policy states map to locked; view-only maps to read-only; pending restart must be explicit.

  - component_family_class: permission_sheet
    family_title: Permission sheets
    launch_priority_default: launch_critical
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Permission and trust posture must remain explainable under high contrast and forced colors.

  - component_family_class: badge_or_pill
    family_title: Badges and pills
    launch_priority_default: supporting
    required_section_classes:
      - component_contract
      - state_taxonomy
      - metric_rows
      - token_inheritance
      - appearance_evidence
      - keyboard_evidence
      - accessibility_evidence
      - screenshot_baselines
      - extension_embedded_exceptions
    notes:
      - Badges must expand to plain-language meaning; policy/trust badges map to locked taxonomy state.

launch_critical_packet_refs:
  - component_conformance_packet:button.action_controls:conformant:01
  - component_conformance_packet:badge.status:exception:01

minted_at: "2026-05-05T00:00:00Z"

