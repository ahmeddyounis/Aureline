# ---------------------------------------------------------------------------
# Honesty-review rule rows. The review packet evaluates every honesty
# violation class against every captured row. A non-none violation
# routes to a diff_severity_class of block or block_release per the
# rule below.
# ---------------------------------------------------------------------------
honesty_review_rules:

  - rule_id: corpus:honesty:critical_action_revealed_only_on_hover
    honesty_violation_class: critical_action_revealed_only_on_hover
    diff_severity_class: block_release
    description: A primary or recovery action that reveals only on pointer hover is non-conforming. Hover may add emphasis but never adds new affordances.

  - rule_id: corpus:honesty:critical_action_revealed_only_on_tooltip
    honesty_violation_class: critical_action_revealed_only_on_tooltip
    diff_severity_class: block_release
    description: A primary or recovery action whose label, route, or activation appears only inside a tooltip is non-conforming.

  - rule_id: corpus:honesty:source_explanation_revealed_only_on_hover
    honesty_violation_class: source_explanation_revealed_only_on_hover
    diff_severity_class: block
    description: Source, owner, or trust-state explanations must be persistently disclosed for locked, restricted, and policy_blocked states.

  - rule_id: corpus:honesty:source_explanation_revealed_only_on_tooltip
    honesty_violation_class: source_explanation_revealed_only_on_tooltip
    diff_severity_class: block
    description: Source explanation may not depend on tooltip-only disclosure on locked, restricted, or policy_blocked states.

  - rule_id: corpus:honesty:lock_reason_revealed_only_on_hover
    honesty_violation_class: lock_reason_revealed_only_on_hover
    diff_severity_class: block
    description: Lock or policy reason must be inline; hover-only reasons collapse locked into disabled.

  - rule_id: corpus:honesty:lock_reason_revealed_only_on_tooltip
    honesty_violation_class: lock_reason_revealed_only_on_tooltip
    diff_severity_class: block
    description: Lock or policy reason must be inline; tooltip-only reasons collapse locked into disabled.

  - rule_id: corpus:honesty:freshness_revealed_only_on_hover
    honesty_violation_class: freshness_revealed_only_on_hover
    diff_severity_class: warn
    description: Freshness or staleness must be inline on degraded and stale states; hover-only freshness erodes the degraded-mode pattern.

  - rule_id: corpus:honesty:freshness_revealed_only_on_tooltip
    honesty_violation_class: freshness_revealed_only_on_tooltip
    diff_severity_class: warn
    description: Freshness or staleness must be inline on degraded and stale states; tooltip-only freshness erodes the degraded-mode pattern.

  - rule_id: corpus:honesty:recovery_route_revealed_only_on_hover
    honesty_violation_class: recovery_route_revealed_only_on_hover
    diff_severity_class: block
    description: Recovery routes for blocked, error, restricted, or policy_blocked states must be persistently disclosed.

  - rule_id: corpus:honesty:recovery_route_revealed_only_on_tooltip
    honesty_violation_class: recovery_route_revealed_only_on_tooltip
    diff_severity_class: block
    description: Recovery routes for blocked, error, restricted, or policy_blocked states must be persistently disclosed.

  - rule_id: corpus:honesty:state_label_revealed_only_on_hover
    honesty_violation_class: state_label_revealed_only_on_hover
    diff_severity_class: block
    description: The state label that names the user-visible status must not depend on pointer hover to appear.

  - rule_id: corpus:honesty:state_label_revealed_only_on_tooltip
    honesty_violation_class: state_label_revealed_only_on_tooltip
    diff_severity_class: block
    description: The state label that names the user-visible status must not depend on tooltip-only disclosure.

  - rule_id: corpus:honesty:keyboard_only_focus_loses_state_visibility
    honesty_violation_class: keyboard_only_focus_loses_state_visibility
    diff_severity_class: block_release
    description: A keyboard-only user must see the same state visibility as a pointer user; otherwise the state is unreviewable.

  - rule_id: corpus:honesty:keyboard_only_focus_loses_source_visibility
    honesty_violation_class: keyboard_only_focus_loses_source_visibility
    diff_severity_class: block
    description: Source explanation must remain visible under keyboard-only focus.

  - rule_id: corpus:honesty:keyboard_only_focus_loses_recovery_route
    honesty_violation_class: keyboard_only_focus_loses_recovery_route
    diff_severity_class: block
    description: Recovery routes must remain reachable under keyboard-only focus.

  - rule_id: corpus:honesty:selected_visually_collapses_with_current
    honesty_violation_class: selected_visually_collapses_with_current
    diff_severity_class: block
    description: Selected and current must remain visually distinct; collapsing them is non-conforming under the state-machine schema.

  - rule_id: corpus:honesty:disabled_visually_collapses_with_locked
    honesty_violation_class: disabled_visually_collapses_with_locked
    diff_severity_class: block
    description: Locked must show source and reason; disabled must not be used as a substitute. Collapsing the two routes to component_state_class_unresolved.

  - rule_id: corpus:honesty:read_only_visually_collapses_with_disabled
    honesty_violation_class: read_only_visually_collapses_with_disabled
    diff_severity_class: block
    description: Read-only must preserve inspectable content contrast and name the read-only scope; disabled does not.

  - rule_id: corpus:honesty:color_alone_conveys_state
    honesty_violation_class: color_alone_conveys_state
    diff_severity_class: block_release
    description: Color is never the sole state cue. Routes to color_alone_conveyed_required_meaning in artifacts/design/token_drift_rules.yaml.

  - rule_id: corpus:honesty:reduced_opacity_alone_conveys_state
    honesty_violation_class: reduced_opacity_alone_conveys_state
    diff_severity_class: block_release
    description: Reduced opacity is never the sole indicator of disabled, blocked, loading, or held state.

  - rule_id: corpus:honesty:none
    honesty_violation_class: none
    diff_severity_class: pass
    description: No honesty violation detected on this row.
