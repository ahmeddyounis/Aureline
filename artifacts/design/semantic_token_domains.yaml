      - token_name: al.color.chart.series.regressed
        dark_reference: "#F04438"
        light_parity: "#F04438"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.7
      - token_name: al.color.chart.series.attention
        dark_reference: "#F97316"
        light_parity: "#F97316"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.7
      - token_name: al.color.chart.series.ai_layer
        dark_reference: "#8B5CF6"
        light_parity: "#8B5CF6"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.7

lifecycle_and_freshness_mapping:
  controlled_labels:
    - Ready
    - Warming
    - Partial
    - Stale
    - Rebuilding
    - Restricted
    - Policy blocked
    - Reconnecting
    - Degraded
    - Read-only degraded
    - Unavailable
    - Rollback available
  default_token_mapping:
    Ready:
      semantic_status_token_ref: status.success
      required_non_color_cues:
        - label_chip
    Warming:
      semantic_status_token_ref: status.info
      required_non_color_cues:
        - label_chip
    Partial:
      semantic_status_token_ref: status.warning
      required_non_color_cues:
        - label_chip
    Stale:
      semantic_status_token_ref: status.warning
      required_non_color_cues:
        - label_chip
        - age_label
    Rebuilding:
      semantic_status_token_ref: status.info
      required_non_color_cues:
        - label_chip
    Restricted:
      trust_visual_state_token_ref: trust.restricted_workspace
      required_non_color_cues:
        - shield_icon
        - label_chip
    Policy blocked:
      trust_visual_state_token_ref: trust.policy_locked
      required_non_color_cues:
        - lock_icon
        - label_chip
    Reconnecting:
      semantic_status_token_ref: status.info
      required_non_color_cues:
        - label_chip
    Degraded:
      semantic_status_token_ref: status.warning
      required_non_color_cues:
        - label_chip
    Read-only degraded:
      semantic_status_token_ref: status.warning
      required_non_color_cues:
        - label_chip
        - read_only_scope_label
    Unavailable:
      semantic_status_token_ref: status.danger
      required_non_color_cues:
        - label_chip
    Rollback available:
      semantic_status_token_ref: status.info
      required_non_color_cues:
        - label_chip

