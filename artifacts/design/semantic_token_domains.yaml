  - domain_id: trust_visual_state
    token_family_class: trust_visual_state
    namespace_prefix: trust.
    owns:
      - "restricted workspace / policy lock / remote/collab / AI state / debugging active"
      - "safe-preview trust-class badges"
    override_scopes_allowed:
      - theme_package
      - user_overlay
    override_scopes_forbidden:
      - language_theme
    required_non_color_cues:
      - label_chip
      - icon_glyph
    tokens:
      - token_name: trust.restricted_workspace
        semantic_status_token_ref: status.warning
        notes: "Warning palette + shield icon; never brand gold."
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.4
      - token_name: trust.policy_locked
        semantic_status_token_ref: status.warning
        notes: "Warning palette + lock/shield icon; separate from restricted workspace."
        source_of_truth_ref: artifacts/ux/status_icon_legend.yaml#state_families
      - token_name: trust.remote_target_active
        semantic_status_token_ref: status.info
        notes: "Info palette + host pill; include host label."
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.4
      - token_name: trust.collaboration_active
        semantic_status_token_ref: status.insight
        notes: "Insight palette + presence avatars."
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.4
      - token_name: trust.ai_draft_pending
        semantic_status_token_ref: status.insight
        notes: "Insight palette subtle fill; distinct from review/comment UI."
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.4
      - token_name: trust.ai_applied
        semantic_status_token_ref: status.success
        notes: "Success palette + evidence link."
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.4
      - token_name: trust.index_warming_or_stale
        semantic_status_token_ref: status.info
        notes: "Use info or warning depending on confidence loss; label 'warming/partial/stale/rebuilding'."
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.4
      - token_name: trust.debugging_active
        semantic_status_token_ref: null
        notes: "Interactive blue emphasis + explicit label; not an error state."
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.4
      - token_name: trust.safe_preview.raw_text
        semantic_status_token_ref: null
        notes: "Exact bytes; use 'Raw' badge and raw-view affordance."
        source_of_truth_ref: docs/security/safe_preview_trust_classes.md#rawtext
      - token_name: trust.safe_preview.sanitized_rich
        semantic_status_token_ref: status.info
        notes: "Sanitized render; show 'Sanitized/Preview' badge + raw-view path."
        source_of_truth_ref: docs/security/safe_preview_trust_classes.md#sanitizedrich
      - token_name: trust.safe_preview.trusted_local_active
        semantic_status_token_ref: status.success
        notes: "Active local sandbox; show sandbox marker + capability profile."
        source_of_truth_ref: docs/security/safe_preview_trust_classes.md#trustedlocalactive
      - token_name: trust.safe_preview.isolated_remote_active
        semantic_status_token_ref: status.warning
        notes: "Active remote/web-like surface; show origin/host boundary + permissions."
        source_of_truth_ref: docs/security/safe_preview_trust_classes.md#isolatedremoteactive

