  - domain_id: diff
    token_family_class: color_diff
    namespace_prefix: al.color.diff.
    owns:
      - "diff add/remove/modify/move roles"
    override_scopes_allowed:
      - theme_package
    override_scopes_forbidden:
      - language_theme
    rules:
      - "Never convey diff meaning via hue alone; pair with markers/patterns/labels."
      - "Diff fills must preserve readability of source text."
    tokens:
      - token_name: al.color.diff.added
        dark_reference:
          fill: "rgba(18,183,106,.16)"
          border: "rgba(18,183,106,.50)"
        light_parity:
          fill: "rgba(18,183,106,.10)"
          border: "rgba(18,183,106,.35)"
        base_hue_token_ref: al.color.state.success
      - token_name: al.color.diff.removed
