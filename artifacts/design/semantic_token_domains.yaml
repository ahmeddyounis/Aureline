          border: "rgba(76,151,255,.50)"
        light_parity:
          fill: "rgba(36,93,229,.10)"
          border: "rgba(36,93,229,.35)"
        base_hue_token_ref: al.color.accent.interactive

  - domain_id: chart
    token_family_class: color_chart
    namespace_prefix: al.color.chart.
    owns:
      - "evidence/benchmark chart series roles"
    override_scopes_allowed:
      - theme_package
    override_scopes_forbidden:
