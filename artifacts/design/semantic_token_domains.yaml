# Semantic token-domain ledger and palette contract seed.
#
# Canonical sources:
# - docs/design/semantic_token_domains_and_palette_contract.md
# - docs/design/design_token_component_state_vocabulary.md (token families)
# - .t2/docs/Aureline_UX_Design_System_Style_Guide.md §7 (colour tables)
# - .t2/docs/Aureline_UI_UX_Spec_Document.md (controlled lifecycle vocabulary + safe preview)
# - docs/security/safe_preview_trust_classes.md (trust-class semantics)
#
# This artifact is a machine-readable “meaning ownership” ledger. It answers:
# - which domain owns a colour meaning;
# - which override scopes are allowed; and
# - which default values a theme package should provide for dark/light parity.
#
# It does not ship a finished theme pack.

record_kind: semantic_token_domain_ledger_record
semantic_token_domain_schema_version: 1
ledger_id: semantic_token_domains:default:01
source_of_truth_refs:
  - docs/design/semantic_token_domains_and_palette_contract.md
  - docs/design/design_token_component_state_vocabulary.md
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#4.4
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#5.4
  - docs/security/safe_preview_trust_classes.md
  - artifacts/ux/color_safe_diagnostic_palette.yaml
  - artifacts/ux/status_icon_legend.yaml
minted_at: "2026-05-06T00:00:00Z"

domains:
  - domain_id: theme_semantic
    token_family_class: color_semantic_theme
    namespace_prefix: al.color.
    owns:
      - "base chrome/background/text/border/icon/focus/accent roles"
    override_scopes_allowed:
      - theme_package
      - user_overlay
      - imported_theme
    override_scopes_forbidden:
      - language_theme
    owned_token_patterns:
      - al.color.bg.*
      - al.color.text.*
      - al.color.border.*
      - al.color.icon.*
      - al.color.focus.*
      - al.color.accent.*

  - domain_id: state_hues
    token_family_class: color_semantic_theme
    namespace_prefix: al.color.state.
    owns:
      - "stable hue anchors used by status, diff, and chart domains"
    override_scopes_allowed:
      - theme_package
      - user_overlay
      - imported_theme
    override_scopes_forbidden:
      - language_theme
    tokens:
      - token_name: al.color.state.success
        dark_reference: "#12B76A"
        light_parity: "#12B76A"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.1
      - token_name: al.color.state.warning
        dark_reference: "#F97316"
        light_parity: "#F97316"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.1
      - token_name: al.color.state.danger
        dark_reference: "#F04438"
        light_parity: "#F04438"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.1
      - token_name: al.color.state.info
        dark_reference: "#06AED4"
        light_parity: "#06AED4"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.1
      - token_name: al.color.state.insight
        dark_reference: "#8B5CF6"
        light_parity: "#8B5CF6"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.1

  - domain_id: semantic_status
    token_family_class: semantic_status
    namespace_prefix: status.
    owns:
