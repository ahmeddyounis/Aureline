        dark_reference: "#8B98AB"
        light_parity: "#66758A"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.7
      - token_name: al.color.chart.series.active
        dark_reference: "#4C97FF"
        light_parity: "#245DE5"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.7
      - token_name: al.color.chart.series.improved
        dark_reference: "#12B76A"
        light_parity: "#12B76A"
