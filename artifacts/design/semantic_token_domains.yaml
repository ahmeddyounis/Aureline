      - user_overlay
      - imported_theme
    override_scopes_forbidden:
      - language_theme
    rules:
      - "Status meaning must not rely on hue alone; pair with label/icon/border."
      - "Brand gold is never a state colour."
    tokens:
      - token_name: status.success
        role: foreground
        dark_reference: "#6CE9A6"
        light_parity: "#027A48"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.3
      - token_name: status.success.border
        role: border
        dark_reference: "rgba(18,183,106,.50)"
        light_parity: "rgba(18,183,106,.35)"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.3
      - token_name: status.success.fill
        role: fill
        dark_reference: "rgba(18,183,106,.16)"
        light_parity: "rgba(18,183,106,.10)"
        source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.3

      - token_name: status.warning
