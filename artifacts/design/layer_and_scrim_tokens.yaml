# ---------------------------------------------------------------------------
# Scrim / overlay tokens. One row per frozen scrim_class.
# ---------------------------------------------------------------------------
scrim_tokens:

  - record_kind: scrim_token_record
    design_token_schema_version: 1
    scrim_id: design:scrim:scrim_none
    scrim_class: scrim_none
    source_of_truth_ref:
      source_of_truth_class: layer_scrim_manifest
      source_doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#9.6
      source_revision_ref: style-guide:rev:M0
    alpha: 0.0
    never_sole_state_indicator: true
    preserves_focus_visibility: true
    paired_with_layer: z_base
    short_description: >
      No scrim. Reserved so surfaces can still name the absence of
      a scrim explicitly on a theme row rather than emitting
      default-empty fields.
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"

  - record_kind: scrim_token_record
    design_token_schema_version: 1
    scrim_id: design:scrim:scrim_weak
    scrim_class: scrim_weak
    source_of_truth_ref:
      source_of_truth_class: layer_scrim_manifest
      source_doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#9.6
      source_revision_ref: style-guide:rev:M0
    alpha: 0.40
    never_sole_state_indicator: true
    preserves_focus_visibility: true
    paired_with_layer: z_floating
    short_description: Lightweight overlay for drawers or transient overlays.
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"

  - record_kind: scrim_token_record
    design_token_schema_version: 1
    scrim_id: design:scrim:scrim_strong
    scrim_class: scrim_strong
    source_of_truth_ref:
      source_of_truth_class: layer_scrim_manifest
      source_doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#9.6
      source_revision_ref: style-guide:rev:M0
    alpha: 0.56
    never_sole_state_indicator: true
    preserves_focus_visibility: true
    paired_with_layer: z_dialog
    short_description: Blocking dialog or high-attention isolation.
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"

  - record_kind: scrim_token_record
    design_token_schema_version: 1
    scrim_id: design:scrim:overlay_dim_presentation
    scrim_class: overlay_dim_presentation
    source_of_truth_ref:
      source_of_truth_class: layer_scrim_manifest
      source_doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#9.6
      source_revision_ref: style-guide:rev:M0
    alpha: 0.24
    never_sole_state_indicator: true
    preserves_focus_visibility: true
    paired_with_layer: z_floating
    short_description: >
      Dim the workspace beneath a presentation or follow-mode
      overlay without obscuring the focused interactive control
      (UI/UX Spec §19.2 preserves focus rings and active-region
      cues on the underlying surface).
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"

# ---------------------------------------------------------------------------
# Rendering rules. Later component, embedded-surface, notification, and
# screenshot-diff work reads these rules against emitted layer_order_record
# and scrim_token_record instances.
# ---------------------------------------------------------------------------
rendering_rules:

  - id: no_hard_coded_z_index
    description: >
      Extensions and local features MUST consume the layer_id /
      layer_order_class; they MUST NOT mint hard-coded z-index
      values. A surface that emits a z-index outside the token
      registry is non-conforming.
    failure_event: layer_order_hard_coded_refused
    failure_denial_reason: layer_order_hard_coded

  - id: dialog_and_critical_outrank_menu_and_floating
    description: >
      Dialogs and security-critical sheets always render above
      menus and transient hovers. A surface whose rendered order
      contradicts the ordinal is non-conforming.
    failure_event: design_token_conformance_diff_refused
    failure_denial_reason: layer_order_hard_coded

  - id: toast_never_blocks_dialog
    description: >
      Toasts never obscure the primary action area of an active
      blocking dialog.
    failure_event: design_token_conformance_diff_refused
    failure_denial_reason: layer_order_hard_coded

  - id: z_critical_reserved
    description: >
      z_critical is reserved for trust, auth, or security-critical
      overlays. Extensions MUST NOT stack content at this layer.
    failure_event: layer_order_hard_coded_refused
    failure_denial_reason: layer_order_hard_coded

  - id: scrim_never_sole_state_indicator
    description: >
      Reduced opacity is NEVER the only indicator of a state
      (disabled, blocked, loading, held). A surface that relies
      on a scrim as the sole cue for disabled / blocked / held
      state is non-conforming.
    failure_event: scrim_as_sole_state_indicator_refused
    failure_denial_reason: scrim_used_as_sole_state_indicator

  - id: scrim_preserves_focus
    description: >
      Every scrim preserves focus rings and active-region cues on
      the underlying surface; decorative dimming MUST NOT obscure
      the focused interactive control. A presentation overlay
      that dims the focused control is non-conforming.
    failure_event: design_token_conformance_diff_refused
    failure_denial_reason: scrim_used_as_sole_state_indicator

  - id: no_long_text_opacity_below_contrast_floor
    description: >
      Avoid applying opacity directly to long-form text when the
      result drops below the target contrast thresholds in the
      active theme_support_row_record.
    failure_event: design_token_conformance_diff_refused
    failure_denial_reason: color_alone_conveyed_required_meaning

  - id: schema_version_alignment
    description: >
      All emitted layer_order_record and scrim_token_record
      instances MUST share design_token_schema_version with the
      registry; surfaces lagging behind a schema bump are denied.
    failure_event: design_token_schema_version_bumped
    failure_denial_reason: design_token_schema_version_lagging
