# Layer / portal order and scrim / overlay token seed.
#
# Companion to docs/design/design_token_component_state_vocabulary.md
# and the boundary schema at
# schemas/design/token_export_manifest.schema.json. This file
# seeds the seven frozen layer / portal tokens and the four
# frozen scrim / overlay tokens that shell, docs / help, trust,
# onboarding, and durable-attention surfaces share from M0
# onward.
#
# Layer tokens replace local z-index improvisation across
# features and extensions; scrim tokens replace ad hoc alpha
# values. Both contracts live here (instead of in the style
# guide alone) because later component, embedded-surface,
# notification, and screenshot-diff work must be able to diff
# canonical vocabulary against implementation or fixtures
# without re-inventing the axis names.
#
# Rules:
#   - Every record fragment conforms to
#     schemas/design/token_export_manifest.schema.json.
#   - If this file and the vocabulary doc disagree, the
#     vocabulary doc wins and this file MUST be updated in the
#     same change.
#   - Adding a layer token or scrim token requires a schema bump
#     and a decision-row update; repurposing an existing token
#     is breaking.
#   - Extensions and local features consume the layer token,
#     never the raw ordinal and never a hard-coded z-index.
#   - Reduced opacity is NEVER the only indicator of a state
#     (disabled, blocked, loading, held). Scrim tokens
#     communicate depth and focus, not state.

design_token_schema_version: 1

source_doc_ref: docs/design/design_token_component_state_vocabulary.md
boundary_schema: schemas/design/token_export_manifest.schema.json
style_guide_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md

# ---------------------------------------------------------------------------
# Frozen vocabularies mirrored from the schema. Tooling reads these blocks;
# surfaces MUST NOT mint tokens outside the enumerations below.
# ---------------------------------------------------------------------------

layer_order_classes:
  - z_base
  - z_sticky
  - z_floating
  - z_menu
  - z_dialog
  - z_toast
  - z_critical

scrim_classes:
  - scrim_none
  - scrim_weak
  - scrim_strong
  - overlay_dim_presentation

# ---------------------------------------------------------------------------
# Layer / portal order tokens. One row per frozen layer_order_class.
# ---------------------------------------------------------------------------
layer_order_tokens:

  - record_kind: layer_order_record
    design_token_schema_version: 1
    layer_id: design:layer:z_base
    layer_order_class: z_base
    source_of_truth_ref:
      source_of_truth_class: layer_scrim_manifest
      source_doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#9.7
      source_revision_ref: style-guide:rev:M0
    ordinal: 0
    is_extension_consumable: true
    dialog_and_critical_outrank: true
    toast_never_blocks_dialog: true
    short_description: Canvas, editor, primary panes.
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"

  - record_kind: layer_order_record
    design_token_schema_version: 1
    layer_id: design:layer:z_sticky
