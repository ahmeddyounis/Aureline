  - badge_family_class: readiness
    title: Readiness badges
    description: Ready, warming, partial, stale, and blocked readiness states for entry, search, editor, and trust surfaces.
    consumes_surface_classes: [shell_chrome, editor_canvas, command_palette_and_search, trust_prompt_canvas, support_export]
    support_export_compatible: true
    honesty_fallback_token: readiness_unknown
    required_non_color_cues: [label_text, icon, shape, progress_indicator]
