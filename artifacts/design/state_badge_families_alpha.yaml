    requires_text_shape_fallback: true
    vocabulary_tokens:
      - token: local_only
        role: live_state_token
        label: Local only
        state_class_ref: active_target
        token_refs: { foreground: status.info, border: status.info.border, fill: status.info.fill }
        icon: monitor
        shape: active_target_marker
        screen_reader_label: Local only route
      - token: remote_target
        role: live_state_token
        label: Remote target
        state_class_ref: active_target
        token_refs: { foreground: trust.remote_target_active, border: status.info.border, fill: status.info.fill }
        icon: server
        shape: active_target_marker
        screen_reader_label: Remote target
      - token: route_degraded
        role: degraded_state_token
        label: Route degraded
        state_class_ref: degraded
        token_refs: { foreground: status.warning, border: status.warning.border, fill: status.warning.fill }
        icon: triangle_alert
        shape: notched_status_chip
        screen_reader_label: Route degraded
      - token: route_unknown
        role: honesty_fallback_token
        label: Route unknown
        state_class_ref: error
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_help
        shape: error_badge_with_icon
        screen_reader_label: Route unknown

  - badge_family_class: support_class
    title: Support-class badges
    description: Support posture for alpha wedges, packages, docs, and export rows.
    consumes_surface_classes: [shell_chrome, docs_help_canvas, package_marketplace_canvas, support_export]
    support_export_compatible: true
    honesty_fallback_token: support_unknown
    required_non_color_cues: [label_text, icon, shape]
    requires_text_shape_fallback: true
    vocabulary_tokens:
      - token: supported
        role: live_state_token
        label: Supported
        state_class_ref: readiness_ready
        token_refs: { foreground: status.success, border: status.success.border, fill: status.success.fill }
        icon: badge_check
        shape: support_badge
        screen_reader_label: Supported
      - token: limited
        role: degraded_state_token
        label: Limited
        state_class_ref: degraded
        token_refs: { foreground: status.warning, border: status.warning.border, fill: status.warning.fill }
