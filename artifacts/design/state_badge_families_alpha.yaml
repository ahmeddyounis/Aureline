embedded_surface_inheritance_rows:
  - row_id: embedded_surface.extension_full_inheritance
    owner_kind: extension_ui
    inheritance_posture: inherits_aureline_token_families
    required_disclosure: none
    required_fields: [theme_class, density_class, contrast_class, reduced_motion_posture]
    badge_family_ref: theme_package
  - row_id: embedded_surface.extension_partial_inheritance
    owner_kind: extension_ui
    inheritance_posture: declares_inheritance_gap_when_not_aligned
    required_disclosure: >
      The surface must render a partial-inheritance badge and name the token,
      contrast, density, focus, or reduced-motion gap before shell chrome can
      imply parity.
    required_fields: [gap_class, owner, affected_token_families, fallback_badge_token]
    badge_family_ref: theme_package
