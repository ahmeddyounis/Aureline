        screen_reader_label: Blocked readiness
      - token: readiness_unknown
        role: honesty_fallback_token
        label: Readiness unknown
        state_class_ref: error
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_help
        shape: error_badge_with_icon
        screen_reader_label: Readiness unknown

  - badge_family_class: policy
    title: Policy badges
    description: Policy-allowed, locked, blocked, and inherited policy states.
    consumes_surface_classes: [shell_chrome, trust_prompt_canvas, package_marketplace_canvas, support_export]
    support_export_compatible: true
    honesty_fallback_token: policy_unknown
    required_non_color_cues: [label_text, lock_or_shield_glyph, border, shape]
