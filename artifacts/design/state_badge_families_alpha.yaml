# Alpha token/state, badge-family, and notice-family registry.
#
# This registry joins the existing semantic token ledgers with the launch
# wedge component-state vocabulary. It is the machine-readable contract that
# shell, editor, search, docs/help, package/marketplace, trust, and support
# export consumers read before rendering state chrome.

record_kind: state_badge_family_alpha_registry
state_badge_family_schema_version: 1
registry_id: state_badge_families.alpha.01
owner_dri: "@ahmeddyounis"
minted_at: "2026-05-13T02:40:50Z"

source_of_truth_refs:
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.8
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.16
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#7
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#16.21
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#15.4
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#16.9
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#16.18
  - .t2/docs/Aureline_Technical_Design_Document.md#7.1.17
  - docs/design/design_token_component_state_vocabulary.md
  - docs/design/component_state_taxonomy.md
  - artifacts/design/semantic_token_domains.yaml
  - artifacts/design/component_state_screenshot_corpus.yaml

runtime_consumer_refs:
  - crates/aureline-ui/src/tokens/state_semantics.rs
  - crates/aureline-ui/src/components/state_registry.rs

validator:
  script_ref: ci/check_m2_state_semantics.py
  command: python3 ci/check_m2_state_semantics.py --repo-root .

theme_package_contract:
  supported_theme_classes:
    - dark_reference
    - light_parity
    - high_contrast_dark
    - high_contrast_light
  package_may_override:
    - al.color.*
    - status.*
    - trust.*
  package_must_not_redefine:
    - component_state_vocabulary
    - badge_family_class_vocabulary
    - notice_family_class_vocabulary
    - surface_class_vocabulary
    - severity_or_trust_meaning
  inheritance_rule: >
    A theme package may change appearance through semantic tokens, but it may
    not change what a severity, trust, policy, readiness, lifecycle, support,
    selected, focused, or active-target state means. Those states retain
    text-plus-shape fallbacks across all supported theme rows.

component_state_vocabulary:
  - empty
  - loading
  - pending
  - degraded
  - blocked
  - error
  - completed
  - focus_visible
  - selection
  - active_target
  - trust_restricted
  - policy_locked
  - readiness_ready
  - readiness_partial

badge_family_class_vocabulary:
  - lifecycle
  - route
  - support_class
  - readiness
  - policy
  - trust
  - docs_help
  - package_marketplace
  - support_export
  - theme_package

notice_family_class_vocabulary:
  - info
  - warning
  - degraded
  - blocked
  - restricted
  - success

surface_class_vocabulary:
  - shell_chrome
  - editor_canvas
  - command_palette_and_search
  - docs_help_canvas
  - package_marketplace_canvas
  - support_export
  - trust_prompt_canvas
  - extension_embedded_canvas

non_color_cue_vocabulary:
  - label_text
  - icon
  - border
  - shape
  - progress_indicator
  - lock_or_shield_glyph
  - check_or_selection_marker
  - active_target_marker

component_state_families:
  - state_class: empty
    display_label: Empty
    taxonomy_state_classes: [idle]
    semantic_kind: readiness
    token_refs:
      foreground: al.color.text.secondary
      border: al.color.border.default
      fill: al.color.bg.surface
    icon: inbox
    shape: outlined_panel
    required_non_color_cues: [label_text, icon, shape]
    hue_only_allowed: false
    persistent_disclosure_required: true
    screen_reader_label: Empty state
    copy_rule: Name the missing content and the first useful route.
    distinct_from: [loading, blocked]

  - state_class: loading
    display_label: Loading
    taxonomy_state_classes: [loading]
    semantic_kind: readiness
    token_refs:
      foreground: status.info
      border: status.info.border
      fill: status.info.fill
    icon: loader
    shape: skeleton_or_progress_track
    required_non_color_cues: [label_text, progress_indicator]
    hue_only_allowed: false
    persistent_disclosure_required: true
    screen_reader_label: Loading
    copy_rule: Use for initial fetch, warm-up, or preparation before content is ready.
    distinct_from: [pending, degraded, blocked]

  - state_class: pending
    display_label: Pending
    taxonomy_state_classes: [pending]
    semantic_kind: submitted_action
    token_refs:
      foreground: status.insight
      border: status.insight.border
      fill: status.insight.fill
    icon: clock
    shape: submitted_action_chip
    required_non_color_cues: [label_text, icon]
    hue_only_allowed: false
    persistent_disclosure_required: true
    screen_reader_label: Pending action
    copy_rule: Use only after a user action is staged, queued, or submitted.
    distinct_from: [loading, completed, blocked]

  - state_class: degraded
    display_label: Degraded
    taxonomy_state_classes: [degraded]
    semantic_kind: preserved_capability
    token_refs:
      foreground: status.warning
      border: status.warning.border
      fill: status.warning.fill
    icon: triangle_alert
    shape: notched_status_chip
    required_non_color_cues: [label_text, icon, border]
    hue_only_allowed: false
    persistent_disclosure_required: true
    screen_reader_label: Degraded mode
    copy_rule: Name what still works, what is reduced, the recovery path, and freshness impact.
    distinct_from: [error, blocked, loading]

  - state_class: blocked
    display_label: Blocked
    taxonomy_state_classes: [locked]
    semantic_kind: source_or_policy_lock
    token_refs:
      foreground: status.danger
      border: status.danger.border
      fill: status.danger.fill
    icon: circle_slash
    shape: blocked_badge_with_bar
    required_non_color_cues: [label_text, icon, shape]
    hue_only_allowed: false
    persistent_disclosure_required: true
    screen_reader_label: Blocked
    copy_rule: Name the block source and the least-surprising recovery or inspect route.
    distinct_from: [disabled, degraded, error]

  - state_class: error
    display_label: Error
    taxonomy_state_classes: [warning_error]
    semantic_kind: failure_or_invalid
    token_refs:
      foreground: status.danger
      border: status.danger.border
      fill: status.danger.fill
    icon: circle_x
    shape: error_badge_with_icon
    required_non_color_cues: [label_text, icon, border]
    hue_only_allowed: false
    persistent_disclosure_required: true
    screen_reader_label: Error
    copy_rule: Describe the failed state and the available retry, repair, or diagnostic path.
    distinct_from: [degraded, blocked, warning]

  - state_class: completed
    display_label: Completed
    taxonomy_state_classes: [completed]
    semantic_kind: durable_success
    token_refs:
      foreground: status.success
      border: status.success.border
      fill: status.success.fill
    icon: check
    shape: success_badge_with_check
    required_non_color_cues: [label_text, icon, check_or_selection_marker]
    hue_only_allowed: false
    persistent_disclosure_required: false
    screen_reader_label: Completed
    copy_rule: Use for durable completion, not transient toast-only success.
    distinct_from: [restored, pending]

  - state_class: focus_visible
    display_label: Focus visible
    taxonomy_state_classes: [focus_visible]
    semantic_kind: keyboard_or_assistive_focus
    token_refs:
      foreground: al.color.text.primary
      border: al.color.focus.ring
      fill: al.color.bg.surface
    icon: focus
    shape: focus_ring
    required_non_color_cues: [border, shape]
    hue_only_allowed: false
    persistent_disclosure_required: true
    screen_reader_label: Focused
    copy_rule: Focus must remain visible without hover and without relying on hue.
    distinct_from: [selection, active_target]

  - state_class: selection
    display_label: Selected
    taxonomy_state_classes: [selected]
    semantic_kind: chosen_set_membership
    token_refs:
      foreground: al.color.text.primary
      border: al.color.accent.interactive
      fill: al.color.bg.hover
    icon: check
    shape: selected_fill_and_border
    required_non_color_cues: [border, check_or_selection_marker]
    hue_only_allowed: false
    persistent_disclosure_required: true
    screen_reader_label: Selected
    copy_rule: Selection is durable membership and must remain distinct from focus or current route.
    distinct_from: [focus_visible, active_target]

  - state_class: active_target
    display_label: Active target
    taxonomy_state_classes: [current]
    semantic_kind: current_route_or_execution_target
    token_refs:
      foreground: status.info
      border: status.info.border
      fill: status.info.fill
    icon: target
    shape: active_target_marker
    required_non_color_cues: [label_text, icon, shape, active_target_marker]
    hue_only_allowed: false
    persistent_disclosure_required: true
    screen_reader_label: Active target
    copy_rule: Name the current route, editor, execution target, or detail owner.
    distinct_from: [selection, focus_visible]

  - state_class: trust_restricted
    display_label: Restricted
    taxonomy_state_classes: [restricted, locked]
    semantic_kind: trust_boundary
    token_refs:
      foreground: trust.restricted_workspace
      border: status.warning.border
      fill: status.warning.fill
    icon: shield_alert
    shape: shield_badge
    required_non_color_cues: [label_text, lock_or_shield_glyph, border]
    hue_only_allowed: false
    persistent_disclosure_required: true
    screen_reader_label: Restricted workspace
    copy_rule: Name the trust boundary and what remains available.
    distinct_from: [policy_locked, blocked]

  - state_class: policy_locked
    display_label: Policy locked
    taxonomy_state_classes: [policy_blocked, locked]
    semantic_kind: policy_boundary
    token_refs:
      foreground: trust.policy_locked
      border: status.warning.border
      fill: status.warning.fill
    icon: lock
    shape: lock_badge
    required_non_color_cues: [label_text, lock_or_shield_glyph, border]
    hue_only_allowed: false
    persistent_disclosure_required: true
    screen_reader_label: Policy locked
    copy_rule: Name the policy owner/source and the inspect or request path.
    distinct_from: [trust_restricted, disabled]

  - state_class: readiness_ready
    display_label: Ready
    taxonomy_state_classes: [current]
    semantic_kind: readiness
    token_refs:
      foreground: status.success
      border: status.success.border
      fill: status.success.fill
    icon: circle_check
    shape: readiness_chip
    required_non_color_cues: [label_text, icon]
    hue_only_allowed: false
    persistent_disclosure_required: false
    screen_reader_label: Ready
    copy_rule: Use only when the named surface is actually ready for the claimed action.
    distinct_from: [readiness_partial, degraded]

  - state_class: readiness_partial
    display_label: Partial
    taxonomy_state_classes: [degraded]
    semantic_kind: readiness
    token_refs:
      foreground: status.info
      border: status.info.border
      fill: status.info.fill
    icon: split
    shape: partial_readiness_chip
    required_non_color_cues: [label_text, icon, border]
    hue_only_allowed: false
    persistent_disclosure_required: true
    screen_reader_label: Partially ready
    copy_rule: Name the represented scope and the missing or warming scope.
    distinct_from: [readiness_ready, loading, degraded]

badge_families:
  - badge_family_class: lifecycle
    title: Lifecycle badges
    description: Stable object lifecycle for workspace, command, package, extension, restore, and release surfaces.
    consumes_surface_classes: [shell_chrome, editor_canvas, command_palette_and_search, support_export]
    support_export_compatible: true
    honesty_fallback_token: unknown_lifecycle
    required_non_color_cues: [label_text, icon, shape]
    requires_text_shape_fallback: true
    vocabulary_tokens:
      - token: ready
        role: live_state_token
        label: Ready
        state_class_ref: readiness_ready
        token_refs: { foreground: status.success, border: status.success.border, fill: status.success.fill }
        icon: circle_check
        shape: readiness_chip
        screen_reader_label: Ready
      - token: pending
        role: live_state_token
        label: Pending
        state_class_ref: pending
        token_refs: { foreground: status.insight, border: status.insight.border, fill: status.insight.fill }
        icon: clock
        shape: submitted_action_chip
        screen_reader_label: Pending
      - token: degraded
        role: degraded_state_token
        label: Degraded
        state_class_ref: degraded
        token_refs: { foreground: status.warning, border: status.warning.border, fill: status.warning.fill }
        icon: triangle_alert
        shape: notched_status_chip
        screen_reader_label: Degraded
      - token: blocked
        role: blocked_state_token
        label: Blocked
        state_class_ref: blocked
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_slash
        shape: blocked_badge_with_bar
        screen_reader_label: Blocked
      - token: unknown_lifecycle
        role: honesty_fallback_token
        label: Unknown lifecycle
        state_class_ref: error
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_help
        shape: error_badge_with_icon
        screen_reader_label: Unknown lifecycle state

  - badge_family_class: route
    title: Route and target badges
    description: Local, remote, managed, mirror, and active-target route classes.
    consumes_surface_classes: [shell_chrome, command_palette_and_search, support_export]
