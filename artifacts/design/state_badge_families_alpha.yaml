        shape: partial_readiness_chip
        screen_reader_label: Partial readiness
      - token: blocked
        role: blocked_state_token
        label: Blocked
        state_class_ref: blocked
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_slash
