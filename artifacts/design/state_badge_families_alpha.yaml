        role: live_state_token
        label: Policy allowed
        state_class_ref: readiness_ready
        token_refs: { foreground: status.success, border: status.success.border, fill: status.success.fill }
        icon: shield_check
        shape: shield_badge
        screen_reader_label: Policy allowed
      - token: policy_locked
        role: blocked_state_token
        label: Policy locked
        state_class_ref: policy_locked
        token_refs: { foreground: trust.policy_locked, border: status.warning.border, fill: status.warning.fill }
        icon: lock
        shape: lock_badge
        screen_reader_label: Policy locked
      - token: policy_blocked
        role: blocked_state_token
        label: Policy blocked
        state_class_ref: blocked
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_slash
        shape: blocked_badge_with_bar
        screen_reader_label: Policy blocked
      - token: policy_unknown
        role: honesty_fallback_token
        label: Policy unknown
        state_class_ref: error
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_help
        shape: error_badge_with_icon
        screen_reader_label: Policy unknown

  - badge_family_class: trust
    title: Trust badges
    description: Workspace trust, sanitized preview, active content, and inherited trust-boundary states.
    consumes_surface_classes: [shell_chrome, editor_canvas, docs_help_canvas, trust_prompt_canvas, support_export]
    support_export_compatible: true
    honesty_fallback_token: trust_unknown
    required_non_color_cues: [label_text, lock_or_shield_glyph, border, shape]
    requires_text_shape_fallback: true
    vocabulary_tokens:
      - token: trusted
        role: live_state_token
        label: Trusted
        state_class_ref: readiness_ready
        token_refs: { foreground: status.success, border: status.success.border, fill: status.success.fill }
        icon: shield_check
        shape: shield_badge
        screen_reader_label: Trusted
      - token: restricted
        role: degraded_state_token
        label: Restricted
        state_class_ref: trust_restricted
        token_refs: { foreground: trust.restricted_workspace, border: status.warning.border, fill: status.warning.fill }
        icon: shield_alert
        shape: shield_badge
        screen_reader_label: Restricted
      - token: sanitized
        role: live_state_token
        label: Sanitized
        state_class_ref: readiness_partial
        token_refs: { foreground: trust.safe_preview.sanitized_rich, border: status.info.border, fill: status.info.fill }
        icon: shield
        shape: shield_badge
        screen_reader_label: Sanitized preview
      - token: active_blocked
        role: blocked_state_token
        label: Active content blocked
        state_class_ref: blocked
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_slash
        shape: blocked_badge_with_bar
        screen_reader_label: Active content blocked
      - token: trust_unknown
        role: honesty_fallback_token
        label: Trust unknown
        state_class_ref: error
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_help
        shape: error_badge_with_icon
        screen_reader_label: Trust unknown

  - badge_family_class: docs_help
    title: Docs/help badges
    description: Source, freshness, version-match, and client-scope badges for docs/help and About surfaces.
    consumes_surface_classes: [docs_help_canvas, shell_chrome, support_export]
    support_export_compatible: true
    honesty_fallback_token: unverified
    required_non_color_cues: [label_text, icon, shape]
    requires_text_shape_fallback: true
    vocabulary_tokens:
      - token: authoritative_live
        role: live_state_token
        label: Authoritative live
        state_class_ref: readiness_ready
        token_refs: { foreground: status.success, border: status.success.border, fill: status.success.fill }
        icon: book_check
        shape: docs_badge
        screen_reader_label: Authoritative live docs
      - token: warm_cached
        role: live_state_token
        label: Warm cached
        state_class_ref: readiness_partial
        token_refs: { foreground: status.info, border: status.info.border, fill: status.info.fill }
        icon: archive
        shape: docs_badge
        screen_reader_label: Warm cached docs
      - token: stale
        role: degraded_state_token
        label: Stale
        state_class_ref: degraded
        token_refs: { foreground: status.warning, border: status.warning.border, fill: status.warning.fill }
        icon: history
        shape: notched_status_chip
        screen_reader_label: Stale docs
      - token: unverified
        role: honesty_fallback_token
        label: Unverified
        state_class_ref: error
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_help
        shape: error_badge_with_icon
        screen_reader_label: Unverified docs

  - badge_family_class: package_marketplace
    title: Package and marketplace badges
    description: Package lifecycle, publisher trust, install posture, and policy state across marketplace/package consumers.
    consumes_surface_classes: [package_marketplace_canvas, shell_chrome, docs_help_canvas, support_export]
    support_export_compatible: true
    honesty_fallback_token: package_unverified
    required_non_color_cues: [label_text, icon, shape]
    requires_text_shape_fallback: true
    vocabulary_tokens:
      - token: verified_publisher
        role: live_state_token
        label: Verified publisher
        state_class_ref: readiness_ready
        token_refs: { foreground: status.success, border: status.success.border, fill: status.success.fill }
        icon: badge_check
        shape: package_badge
        screen_reader_label: Verified publisher
      - token: install_pending
        role: live_state_token
        label: Install pending
        state_class_ref: pending
        token_refs: { foreground: status.insight, border: status.insight.border, fill: status.insight.fill }
        icon: clock
        shape: submitted_action_chip
        screen_reader_label: Install pending
      - token: install_blocked
        role: blocked_state_token
        label: Install blocked
        state_class_ref: blocked
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_slash
        shape: blocked_badge_with_bar
        screen_reader_label: Install blocked
      - token: package_unverified
        role: honesty_fallback_token
        label: Package unverified
        state_class_ref: error
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_help
        shape: error_badge_with_icon
        screen_reader_label: Package unverified

  - badge_family_class: support_export
    title: Support-export badges
    description: Export-safe projection of support owner, redaction, readiness, blocked, and degraded states.
    consumes_surface_classes: [support_export, shell_chrome, docs_help_canvas]
    support_export_compatible: true
    honesty_fallback_token: export_state_unknown
    required_non_color_cues: [label_text, icon, shape]
    requires_text_shape_fallback: true
    vocabulary_tokens:
      - token: export_ready
        role: live_state_token
        label: Export ready
        state_class_ref: readiness_ready
        token_refs: { foreground: status.success, border: status.success.border, fill: status.success.fill }
        icon: file_check
        shape: support_badge
        screen_reader_label: Export ready
      - token: redacted
        role: live_state_token
        label: Redacted
        state_class_ref: readiness_partial
        token_refs: { foreground: status.info, border: status.info.border, fill: status.info.fill }
        icon: shield
        shape: support_badge
        screen_reader_label: Redacted export
      - token: export_blocked
        role: blocked_state_token
        label: Export blocked
        state_class_ref: blocked
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_slash
        shape: blocked_badge_with_bar
        screen_reader_label: Export blocked
      - token: export_state_unknown
        role: honesty_fallback_token
        label: Export state unknown
        state_class_ref: error
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_help
        shape: error_badge_with_icon
        screen_reader_label: Export state unknown

  - badge_family_class: theme_package
    title: Theme-package badges
    description: Theme compatibility, inheritance, token-overlay, high-contrast, and deprecated-token states.
    consumes_surface_classes: [shell_chrome, docs_help_canvas, package_marketplace_canvas, support_export, extension_embedded_canvas]
    support_export_compatible: true
    honesty_fallback_token: theme_inheritance_unknown
    required_non_color_cues: [label_text, icon, shape]
    requires_text_shape_fallback: true
    vocabulary_tokens:
      - token: theme_supported
        role: live_state_token
        label: Theme supported
        state_class_ref: readiness_ready
        token_refs: { foreground: status.success, border: status.success.border, fill: status.success.fill }
        icon: palette
        shape: theme_badge
        screen_reader_label: Theme supported
      - token: inherited
        role: live_state_token
        label: Inherited
        state_class_ref: readiness_ready
        token_refs: { foreground: status.success, border: status.success.border, fill: status.success.fill }
        icon: link
        shape: theme_badge
        screen_reader_label: Theme inherited
      - token: partial_inheritance
        role: degraded_state_token
        label: Partial inheritance
        state_class_ref: degraded
        token_refs: { foreground: status.warning, border: status.warning.border, fill: status.warning.fill }
        icon: triangle_alert
        shape: notched_status_chip
        screen_reader_label: Partial theme inheritance
      - token: theme_inheritance_unknown
        role: honesty_fallback_token
        label: Theme inheritance unknown
        state_class_ref: error
        token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
        icon: circle_help
        shape: error_badge_with_icon
        screen_reader_label: Theme inheritance unknown

notice_families:
  - notice_family_class: info
    title: Informational notices
    state_class_ref: readiness_partial
    token_refs: { foreground: status.info, border: status.info.border, fill: status.info.fill }
    required_non_color_cues: [label_text, icon, border]
    icon: info
    shape: inline_notice
    persistent_disclosure_required: false
    copy_rule: Use for non-blocking context with optional detail.

  - notice_family_class: warning
    title: Warning notices
    state_class_ref: degraded
    token_refs: { foreground: status.warning, border: status.warning.border, fill: status.warning.fill }
    required_non_color_cues: [label_text, icon, border]
    icon: triangle_alert
    shape: inline_notice_with_action
    persistent_disclosure_required: true
    copy_rule: Use for degraded capability, trust, or configuration risk with a recovery action.

  - notice_family_class: degraded
    title: Degraded-mode notices
    state_class_ref: degraded
    token_refs: { foreground: status.warning, border: status.warning.border, fill: status.warning.fill }
    required_non_color_cues: [label_text, icon, border]
    icon: triangle_alert
    shape: degraded_banner
    persistent_disclosure_required: true
    copy_rule: Name preserved capability, reduced capability, recovery path, and freshness impact.

  - notice_family_class: blocked
    title: Blocked notices
    state_class_ref: blocked
    token_refs: { foreground: status.danger, border: status.danger.border, fill: status.danger.fill }
    required_non_color_cues: [label_text, icon, shape]
    icon: circle_slash
    shape: blocked_banner
    persistent_disclosure_required: true
    copy_rule: Name the blocked action and source before offering recovery.

  - notice_family_class: restricted
    title: Restricted notices
    state_class_ref: trust_restricted
    token_refs: { foreground: trust.restricted_workspace, border: status.warning.border, fill: status.warning.fill }
    required_non_color_cues: [label_text, lock_or_shield_glyph, border]
    icon: shield_alert
    shape: restricted_banner
    persistent_disclosure_required: true
    copy_rule: Explain the trust boundary and the safe restricted-mode path.

  - notice_family_class: success
    title: Success notices
    state_class_ref: completed
    token_refs: { foreground: status.success, border: status.success.border, fill: status.success.fill }
    required_non_color_cues: [label_text, icon, check_or_selection_marker]
    icon: check
    shape: success_inline_notice
    persistent_disclosure_required: false
    copy_rule: Use only when completion remains reviewable elsewhere if it matters after dismissal.

