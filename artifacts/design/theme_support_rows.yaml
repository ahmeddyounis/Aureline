# Theme support rows and accessibility-posture seed.
#
# Companion to docs/design/design_token_component_state_vocabulary.md
# and the boundary schema at
# schemas/design/token_export_manifest.schema.json. This file seeds
# the four first-party theme rows (dark reference, light parity,
# high contrast dark, high contrast light) and the five
# accessibility / runtime motion postures (standard, reduced,
# low-motion, power-saver, critical-hot-path) that shell, docs /
# help, trust, onboarding, and durable-attention surfaces share
# from M0 onward.
#
# The .t2/docs/Aureline_UX_Design_System_Style_Guide.md sections
# referenced below are the human-facing source of truth for
# concrete per-token values. This file carries the smallest seed
# subset needed so later token-conformance audits can diff
# canonical vocabulary against implementation or fixtures without
# re-inventing the axis names.
#
# Rules:
#   - Every record fragment conforms to
#     schemas/design/token_export_manifest.schema.json.
#   - If this file and the vocabulary doc disagree, the
#     vocabulary doc wins and this file MUST be updated in the
#     same change.
#   - Adding a worked example is additive-minor; adding a theme
#     row or accessibility-posture row requires a schema bump and
#     a decision-row update.
#   - Surfaces quote these rows by id (theme_row_id,
#     posture_id); they MUST NOT re-mint per-theme or per-posture
#     values locally. Copy-only shadow registries are
#     non-conforming.

design_token_schema_version: 1

source_doc_ref: docs/design/design_token_component_state_vocabulary.md
boundary_schema: schemas/design/token_export_manifest.schema.json
style_guide_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md

# ---------------------------------------------------------------------------
# Frozen vocabularies mirrored from the schema. Tooling reads these blocks;
# surfaces MUST NOT mint tokens outside the enumerations below.
# ---------------------------------------------------------------------------

theme_classes:
  - dark_reference
  - light_parity
  - high_contrast_dark
  - high_contrast_light

accessibility_posture_classes:
  - motion_standard
  - motion_reduced
  - motion_low_motion
  - motion_power_saver
  - motion_critical_hot_path

# ---------------------------------------------------------------------------
# Theme support rows. One per frozen theme_class.
# ---------------------------------------------------------------------------
theme_support_rows:

  - record_kind: theme_support_row_record
    design_token_schema_version: 1
    theme_row_id: design:theme:dark_reference
    theme_class: dark_reference
    source_of_truth_ref:
      source_of_truth_class: theme_support_manifest
      source_doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.2
      source_revision_ref: style-guide:rev:M0
    is_reference_theme: true
    is_first_party: true
    is_color_alone_prohibited: true
    token_overrides_namespace: al.color
    minimum_text_contrast_target: 4.5
    minimum_ui_contrast_target: 3.0
    focus_ring_contrast_target: 3.0
    focus_ring_stroke_px: 2
    forced_colors_friendly: true
    overlay_scrim_default: scrim_strong
    example_semantic_tokens:
      - token_name: al.color.bg.canvas
        value_literal: "#0D1117"
        use_hint: application canvas
      - token_name: al.color.bg.subtle
        value_literal: "#111826"
        use_hint: low-elevation surfaces
      - token_name: al.color.bg.surface
        value_literal: "#151E2C"
        use_hint: cards, panels, tab wells
      - token_name: al.color.bg.raised
        value_literal: "#182232"
        use_hint: raised surfaces (menus, focused cards)
      - token_name: al.color.bg.hover
        value_literal: "#203048"
        use_hint: hover or row highlight background
      - token_name: al.color.bg.active
        value_literal: "#21344E"
        use_hint: pressed or selected low-emphasis background
      - token_name: al.color.bg.overlay
        value_literal: "rgba(8,12,18,0.72)"
        use_hint: modal scrim
      - token_name: al.color.text.primary
        value_literal: "#EAF1FA"
        use_hint: primary UI text
      - token_name: al.color.text.secondary
        value_literal: "#B7C3D4"
        use_hint: secondary UI text
      - token_name: al.color.text.muted
        value_literal: "#8B98AB"
        use_hint: muted UI text
      - token_name: al.color.text.inverse
        value_literal: "#0D1117"
        use_hint: text on bright fills
      - token_name: al.color.border.default
        value_literal: "#2A3A52"
        use_hint: default border
      - token_name: al.color.border.strong
        value_literal: "#3B4F6B"
        use_hint: strong boundary border
      - token_name: al.color.icon.default
        value_literal: "#C8D3E2"
        use_hint: default icon color
      - token_name: al.color.icon.muted
        value_literal: "#93A0B2"
        use_hint: muted icon color
      - token_name: al.color.focus.ring
        value_literal: "#4C97FF"
        use_hint: focus ring
      - token_name: al.color.accent.brand
        value_literal: "#F4C95D"
        use_hint: branded emphasis (never used for restricted / policy-locked state)
      - token_name: al.color.accent.interactive
        value_literal: "#4C97FF"
        use_hint: interactive emphasis
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"

  - record_kind: theme_support_row_record
    design_token_schema_version: 1
    theme_row_id: design:theme:light_parity
    theme_class: light_parity
    source_of_truth_ref:
      source_of_truth_class: theme_support_manifest
      source_doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.2
      source_revision_ref: style-guide:rev:M0
    is_reference_theme: false
    is_first_party: true
    is_color_alone_prohibited: true
    token_overrides_namespace: al.color
    minimum_text_contrast_target: 4.5
    minimum_ui_contrast_target: 3.0
    focus_ring_contrast_target: 3.0
    focus_ring_stroke_px: 2
    forced_colors_friendly: true
    overlay_scrim_default: scrim_weak
    example_semantic_tokens:
      - token_name: al.color.bg.canvas
        value_literal: "#F7F9FC"
        use_hint: application canvas
      - token_name: al.color.bg.subtle
        value_literal: "#EEF2F7"
        use_hint: low-elevation surfaces
      - token_name: al.color.bg.surface
        value_literal: "#FFFFFF"
        use_hint: cards, panels
      - token_name: al.color.bg.raised
        value_literal: "#FCFDFE"
        use_hint: raised surfaces (menus, focused cards)
      - token_name: al.color.bg.hover
        value_literal: "#E9F2FF"
        use_hint: hover or row highlight background
      - token_name: al.color.bg.active
        value_literal: "#DCEAFF"
        use_hint: pressed or selected low-emphasis background
      - token_name: al.color.bg.overlay
        value_literal: "rgba(15,23,35,0.30)"
        use_hint: modal scrim
      - token_name: al.color.text.primary
        value_literal: "#111826"
        use_hint: primary UI text
      - token_name: al.color.text.secondary
        value_literal: "#3A4758"
        use_hint: secondary UI text
      - token_name: al.color.text.muted
        value_literal: "#66758A"
        use_hint: muted UI text
      - token_name: al.color.text.inverse
        value_literal: "#FFFFFF"
        use_hint: text on dark fills
      - token_name: al.color.border.default
        value_literal: "#D5DEE8"
        use_hint: default border
      - token_name: al.color.border.strong
        value_literal: "#BFCBDC"
        use_hint: strong boundary border
      - token_name: al.color.icon.default
        value_literal: "#3A4758"
        use_hint: default icon color
      - token_name: al.color.icon.muted
        value_literal: "#6C7B8E"
        use_hint: muted icon color
      - token_name: al.color.focus.ring
        value_literal: "#2F78FF"
        use_hint: focus ring
      - token_name: al.color.accent.brand
        value_literal: "#B8760E"
        use_hint: brand accent (never used for restricted / policy-locked state)
      - token_name: al.color.accent.interactive
        value_literal: "#245DE5"
        use_hint: interactive emphasis
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"
    notes: >
      Light theme is parity-quality, not a legacy or "basic" mode.
      Every shell, docs / help, trust, onboarding, and durable-
      attention surface MUST render equally on dark_reference and
      light_parity; parity conformance diffs run against both.

  - record_kind: theme_support_row_record
    design_token_schema_version: 1
    theme_row_id: design:theme:high_contrast_dark
    theme_class: high_contrast_dark
    source_of_truth_ref:
      source_of_truth_class: theme_support_manifest
      source_doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.2
      source_revision_ref: style-guide:rev:M0
    is_reference_theme: false
    is_first_party: true
    is_color_alone_prohibited: true
    token_overrides_namespace: al.color
    minimum_text_contrast_target: 7.0
    minimum_ui_contrast_target: 4.5
    focus_ring_contrast_target: 4.5
    focus_ring_stroke_px: 2
    forced_colors_friendly: true
    overlay_scrim_default: scrim_strong
    example_semantic_tokens:
      - token_name: al.color.bg.canvas
        use_hint: >
          Deep neutral canvas tuned to meet the 7:1 text-contrast
          target; concrete value frozen in the style guide's high-
          contrast theme section at milestone close.
      - token_name: al.color.text.primary
        use_hint: >
          Near-white primary text meeting the 7:1 target against
          the canvas.
      - token_name: al.color.focus.ring
        use_hint: >
          Focus ring thickened where the platform permits and pinned
          to a 4.5:1 contrast minimum against adjacent surfaces.
      - token_name: al.color.border.default
        use_hint: >
          Borders in high-contrast themes are load-bearing, not
          decorative; they carry state where hue alone would have.
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"
    notes: >
      High contrast is a first-party mode, not a third-party
      afterthought. Borders, shape, and icons carry state; hue
      alone never does. Where the host OS reports a forced-colors
      / system-high-contrast mode, this theme defers to the
      platform colors while preserving Aureline's state
      conveyance rules.

  - record_kind: theme_support_row_record
    design_token_schema_version: 1
    theme_row_id: design:theme:high_contrast_light
    theme_class: high_contrast_light
    source_of_truth_ref:
      source_of_truth_class: theme_support_manifest
      source_doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.2
      source_revision_ref: style-guide:rev:M0
    is_reference_theme: false
    is_first_party: true
    is_color_alone_prohibited: true
    token_overrides_namespace: al.color
    minimum_text_contrast_target: 7.0
    minimum_ui_contrast_target: 4.5
    focus_ring_contrast_target: 4.5
    focus_ring_stroke_px: 2
    forced_colors_friendly: true
    overlay_scrim_default: scrim_weak
    example_semantic_tokens:
      - token_name: al.color.bg.canvas
        use_hint: >
          Near-white canvas tuned to meet the 7:1 text-contrast
          target; concrete value frozen in the style guide's
          high-contrast theme section at milestone close.
      - token_name: al.color.text.primary
        use_hint: >
          Near-black primary text meeting the 7:1 target against
          the canvas.
      - token_name: al.color.focus.ring
        use_hint: >
          Focus ring thickened where the platform permits and
          pinned to a 4.5:1 contrast minimum against adjacent
          surfaces.
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"
    notes: >
      The two high-contrast rows share most structural
      constraints; only the canvas polarity and the scrim default
      differ. Surfaces that wish to ship one high-contrast theme
      first MUST deliver the other by the same milestone.

# ---------------------------------------------------------------------------
# Accessibility / runtime motion postures. One row per frozen posture_class.
# ---------------------------------------------------------------------------
accessibility_postures:

  - record_kind: accessibility_posture_record
    design_token_schema_version: 1
    posture_id: design:posture:motion_standard
    accessibility_posture_class: motion_standard
    source_of_truth_ref:
      source_of_truth_class: accessibility_posture_manifest
      source_doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10
      source_revision_ref: style-guide:rev:M0
    suppresses_motion_families: []
    preserves_focus_visibility: true
    preserves_state_conveyance: true
    engagement_cue: >
      Default posture. No cue required.
    allowed_duration_tokens:
      - motion.instant
      - motion.fast
      - motion.ui
      - motion.panel
      - motion.dialog
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"

  - record_kind: accessibility_posture_record
    design_token_schema_version: 1
    posture_id: design:posture:motion_reduced
    accessibility_posture_class: motion_reduced
    source_of_truth_ref:
      source_of_truth_class: accessibility_posture_manifest
      source_doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10.4
      source_revision_ref: style-guide:rev:M0
    suppresses_motion_families:
      - hover_press_transition
      - panel_sidebar_change
      - dialog_entry
      - cursor_blink
      - terminal_idle_animation
      - ai_working_indicator
      - progress_indicator_loop
      - layout_shift_during_typing
      - dense_pane_state_change
    preserves_focus_visibility: true
    preserves_state_conveyance: true
    engagement_cue: >
      Engaged by the OS reduced-motion preference or by the
      in-product setting that mirrors it. Visible as a settings
      label; does not surface a persistent status item.
    allowed_duration_tokens:
      - motion.instant
      - motion.fast
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"
    notes: >
      Respects the OS reduced-motion preference at minimum.
      Cursor blink, terminal idle animations, and AI "working"
      indicators must disable or simplify.

  - record_kind: accessibility_posture_record
    design_token_schema_version: 1
    posture_id: design:posture:motion_low_motion
    accessibility_posture_class: motion_low_motion
    source_of_truth_ref:
      source_of_truth_class: accessibility_posture_manifest
      source_doc_ref: docs/design/design_token_component_state_vocabulary.md#low-motion-posture
      source_revision_ref: vocab:rev:M0
    suppresses_motion_families:
      - hover_press_transition
      - popover_control_feedback
      - panel_sidebar_change
      - dialog_entry
      - cursor_blink
      - terminal_idle_animation
      - ai_working_indicator
      - progress_indicator_loop
      - layout_shift_during_typing
      - dense_pane_state_change
    preserves_focus_visibility: true
    preserves_state_conveyance: true
    engagement_cue: >
      In-product "Low motion" setting layered on top of
      motion_reduced. Visible as a settings label; the status
      item surfaces only when the posture is engaged without an
      OS reduced-motion preference behind it.
    allowed_duration_tokens:
      - motion.instant
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"
    notes: >
      motion_low_motion is strictly more restrictive than
      motion_reduced. All non-essential motion collapses to
      motion.instant; essential motion (a focus-ring transition,
      a live-region announcement timing) remains only where state
      conveyance would otherwise be lost.

  - record_kind: accessibility_posture_record
    design_token_schema_version: 1
    posture_id: design:posture:motion_power_saver
    accessibility_posture_class: motion_power_saver
    source_of_truth_ref:
      source_of_truth_class: accessibility_posture_manifest
      source_doc_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#31.26
      source_revision_ref: style-guide:rev:M0
    suppresses_motion_families:
      - hover_press_transition
      - popover_control_feedback
      - panel_sidebar_change
      - dialog_entry
      - cursor_blink
      - terminal_idle_animation
      - ai_working_indicator
      - progress_indicator_loop
      - dense_pane_state_change
    preserves_focus_visibility: true
    preserves_state_conveyance: true
    engagement_cue: >
      Engaged by battery saver, thermal pressure, OS low-power
      mode, or a policy cap. Surfaces a subtle status item
      naming the current pressure source (§31.26). No
      full-screen interruption or modal takeover.
    allowed_duration_tokens:
      - motion.instant
      - motion.fast
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"
    notes: >
      motion_power_saver is a runtime posture: engagement is
      observed from the device or the platform, not chosen by the
      user as a motion preference. Releasing the posture when the
      device returns to normal is visible; the posture's engaged
      status is always inspectable while active.

  - record_kind: accessibility_posture_record
    design_token_schema_version: 1
    posture_id: design:posture:motion_critical_hot_path
    accessibility_posture_class: motion_critical_hot_path
    source_of_truth_ref:
      source_of_truth_class: accessibility_posture_manifest
      source_doc_ref: docs/design/design_token_component_state_vocabulary.md#critical-hot-path-posture
      source_revision_ref: vocab:rev:M0
    suppresses_motion_families:
      - hover_press_transition
      - popover_control_feedback
      - panel_sidebar_change
      - dialog_entry
      - progress_indicator_loop
      - layout_shift_during_typing
      - dense_pane_state_change
    preserves_focus_visibility: true
    preserves_state_conveyance: true
    engagement_cue: >
      Engine-internal posture. Not user-facing. Engages when a
      frame budget is already committed (e.g. during input-
      response hot paths such as key-to-paint, completion render,
      scroll); transient motion is suppressed regardless of the
      user's chosen motion posture.
    allowed_duration_tokens:
      - motion.instant
    policy_context:
      policy_epoch: "pe:2026-04-19:01"
      trust_state: trusted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-20T00:00:00Z"
    notes: >
      motion_critical_hot_path layers on top of whatever user-
      facing posture is engaged. It never downgrades motion less
      restrictively than the user's posture; where the user's
      posture already pins motion.instant, this posture is a
      no-op.

# ---------------------------------------------------------------------------
# Parity-audit checklist. Tooling iterates this list to diff emitted
# theme_support_row_record and accessibility_posture_record instances
# against the canonical set.
# ---------------------------------------------------------------------------
parity_audit_checklist:
  - id: every_theme_row_has_parity_posture
    description: >
      Every frozen theme_class MUST have exactly one
      theme_support_row_record in the manifest. A missing row is a
      parity failure.
    failure_event: theme_support_row_repurposed_refused
    failure_denial_reason: theme_class_unresolved
  - id: every_accessibility_posture_has_row
    description: >
      Every frozen accessibility_posture_class MUST have exactly
      one accessibility_posture_record in the manifest.
    failure_event: accessibility_posture_downgrade_refused
    failure_denial_reason: accessibility_posture_silent_downgrade
  - id: no_color_alone_on_any_theme_row
    description: >
      Every theme_support_row_record sets
      is_color_alone_prohibited = true. Conformance diffs the rule
      against every themed surface: state conveyed by hue alone
      is non-conforming.
    failure_event: design_token_conformance_diff_refused
    failure_denial_reason: color_alone_conveyed_required_meaning
  - id: high_contrast_text_contrast_target
    description: >
      Every high_contrast_* theme row pins
      minimum_text_contrast_target at 7.0 or greater. A drift
      below 7.0 is non-conforming.
    failure_event: design_token_conformance_diff_refused
    failure_denial_reason: color_alone_conveyed_required_meaning
  - id: no_brand_gold_on_restricted
    description: >
      Brand gold (al.color.accent.brand) is NEVER used to
      communicate restricted or policy-locked state on any theme.
      Conformance asserts the rule against restricted_workspace
      and policy_locked trust_visual_state values.
    failure_event: brand_gold_on_restricted_refused
    failure_denial_reason: brand_gold_on_restricted_state
  - id: posture_preserves_focus_visibility
    description: >
      Every accessibility_posture_record pins
      preserves_focus_visibility = true. An implementation that
      hides focus rings in a reduced-motion or low-power posture
      is non-conforming.
    failure_event: accessibility_posture_downgrade_refused
    failure_denial_reason: accessibility_posture_silent_downgrade
  - id: schema_version_alignment
    description: >
      All emitted theme-support and accessibility-posture rows
      MUST share design_token_schema_version with the registry;
      surfaces lagging behind a schema bump are denied.
    failure_event: design_token_schema_version_bumped
    failure_denial_reason: design_token_schema_version_lagging
