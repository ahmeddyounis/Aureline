# Supported-mode matrix.
#
# Companion to:
# - docs/design/theme_package_manifest_contract.md
# - schemas/design/theme_package_manifest.schema.json
#
# This artifact is a compact index used by reviewers, QA packets, and
# support exports to narrow appearance claims honestly when a theme package,
# extension surface, or embedded surface cannot claim parity on a given mode.
#
# Rules:
# - Rows MUST use supported_mode_class ∈ {dark, light, hc-dark, hc-light}.
# - Rows MUST keep supported_mode_class aligned with theme_class.
# - Rows MUST pin both the claim-facing refs (theme_package_manifest_ref +
#   theme_package_revision_ref) and the canonical package identity.
# - evidence_path MUST point at a governed repository artifact (fixture,
#   appearance evidence packet, or other contract-owned packet).

supported_mode_matrix_schema_version: 1
source_doc_ref: docs/design/theme_package_manifest_contract.md
manifest_schema_ref: schemas/design/theme_package_manifest.schema.json
companion_contract_refs:
  - docs/ux/theme_and_visual_asset_contract.md
  - docs/design/theme_support_and_inheritance_contract.md
  - docs/design/appearance_evidence_packet_template.md
companion_schema_refs:
  - schemas/ux/theme_package_manifest.schema.json
  - schemas/design/theme_support_row.schema.json
  - schemas/design/extension_ui_appearance_descriptor.schema.json
fixture_dir_ref: fixtures/design/theme_package_cases/
evidence_fixture_dir_ref: fixtures/design/appearance_cases/

supported_mode_vocabulary:
  - mode_class: dark
    theme_class: dark_reference
  - mode_class: light
    theme_class: light_parity
  - mode_class: hc-dark
    theme_class: high_contrast_dark
  - mode_class: hc-light
    theme_class: high_contrast_light

claimant_family_class_vocabulary:
  - first_party_surface
  - imported_theme
  - extension_surface
  - embedded_surface

support_state_class_vocabulary:
  - supported
  - partial
  - unsupported
  - not_claimed
  - denied

rows:
  - row_id: supported_mode_row:first_party:default_aureline:dark:01
    claimant_family_class: first_party_surface
    subject_ref: shell_chrome
    support_state: supported
    theme_package_manifest_ref: theme_package_manifest:default.aureline:01
    theme_package_revision_ref: theme_package_rev:default.aureline:2026-04-29:01
    canonical_package_id: theme_package:first_party.aureline_default:01
    canonical_package_revision_ref: theme_package_rev:first_party.aureline_default:2026-04-26:01
    mode_class: dark
    theme_class: dark_reference
    appearance_manifest_fixture_path: fixtures/design/theme_package_cases/first_party_default_theme_manifest.yaml
    claim_fixture_paths:
      - fixtures/design/theme_support_cases/shell_chrome_dark_reference_supported_claim.yaml
    evidence_path: fixtures/design/appearance_cases/baseline_shell_chrome_tabs_supported.yaml

  - row_id: supported_mode_row:first_party:default_aureline:hc-dark:01
    claimant_family_class: first_party_surface
    subject_ref: shell_chrome
    support_state: supported
    theme_package_manifest_ref: theme_package_manifest:default.aureline:01
    theme_package_revision_ref: theme_package_rev:default.aureline:2026-04-29:01
    canonical_package_id: theme_package:first_party.aureline_default:01
    canonical_package_revision_ref: theme_package_rev:first_party.aureline_default:2026-04-26:01
    mode_class: hc-dark
    theme_class: high_contrast_dark
    appearance_manifest_fixture_path: fixtures/design/theme_package_cases/first_party_default_theme_manifest.yaml
    claim_fixture_paths:
      - fixtures/design/theme_support_cases/inspector_surface_high_contrast_dark_supported_claim.yaml
    evidence_path: fixtures/design/appearance_cases/baseline_shell_chrome_tabs_supported.yaml

  - row_id: supported_mode_row:imported:midnight_horizon:dark:01
    claimant_family_class: imported_theme
    subject_ref: theme_import_pipeline
    support_state: supported
    theme_package_manifest_ref: theme_package_manifest:imported.midnight_horizon:01
    theme_package_revision_ref: theme_package_rev:imported.midnight_horizon:2026-04-26:01
    canonical_package_id: theme_package:imported.midnight_horizon:01
    canonical_package_revision_ref: theme_package_rev:imported.midnight_horizon:2026-04-26:01
    mode_class: dark
    theme_class: dark_reference
    appearance_manifest_fixture_path: fixtures/design/theme_package_cases/imported_midnight_horizon_manifest.yaml
    claim_fixture_paths:
      - fixtures/design/theme_support_cases/imported_translated_theme_mapping_report_with_warnings.yaml
    evidence_path: fixtures/ux/theme_asset_cases/theme_package_imported_translated_with_mapping_report.yaml

  - row_id: supported_mode_row:imported:midnight_horizon:hc-light:01
    claimant_family_class: imported_theme
    subject_ref: theme_import_pipeline
    support_state: unsupported
    theme_package_manifest_ref: theme_package_manifest:imported.midnight_horizon:01
    theme_package_revision_ref: theme_package_rev:imported.midnight_horizon:2026-04-26:01
    canonical_package_id: theme_package:imported.midnight_horizon:01
    canonical_package_revision_ref: theme_package_rev:imported.midnight_horizon:2026-04-26:01
    mode_class: hc-light
    theme_class: high_contrast_light
    appearance_manifest_fixture_path: fixtures/design/theme_package_cases/imported_midnight_horizon_manifest.yaml
    claim_fixture_paths:
      - fixtures/design/theme_support_cases/imported_translated_theme_mapping_report_with_warnings.yaml
    evidence_path: fixtures/ux/theme_asset_cases/theme_package_imported_translated_with_mapping_report.yaml

  - row_id: supported_mode_row:extension:panel_surface:light:01
    claimant_family_class: extension_surface
    subject_ref: extension_surface:example.webview:01
    support_state: partial
    theme_package_manifest_ref: theme_package_manifest:default.aureline:01
    theme_package_revision_ref: theme_package_rev:default.aureline:2026-04-29:01
    canonical_package_id: theme_package:first_party.aureline_default:01
    canonical_package_revision_ref: theme_package_rev:first_party.aureline_default:2026-04-26:01
    mode_class: light
    theme_class: light_parity
    appearance_manifest_fixture_path: fixtures/design/theme_package_cases/first_party_default_theme_manifest.yaml
    claim_fixture_paths:
      - fixtures/design/theme_support_cases/extension_webview_partial_inheritance_descriptor.yaml
    evidence_path: fixtures/design/appearance_cases/extension_partial_inheritance_undeclared_refused.yaml

  - row_id: supported_mode_row:embedded:marketplace_account:hc-dark:01
    claimant_family_class: embedded_surface
    subject_ref: embedded_surface:provider.marketplace.account:01
    support_state: partial
    theme_package_manifest_ref: theme_package_manifest:default.aureline:01
    theme_package_revision_ref: theme_package_rev:default.aureline:2026-04-29:01
    canonical_package_id: theme_package:first_party.aureline_default:01
    canonical_package_revision_ref: theme_package_rev:first_party.aureline_default:2026-04-26:01
    mode_class: hc-dark
    theme_class: high_contrast_dark
    appearance_manifest_fixture_path: fixtures/design/theme_package_cases/first_party_default_theme_manifest.yaml
    claim_fixture_paths:
      - fixtures/design/theme_support_cases/marketplace_account_does_not_inherit_descriptor.yaml
      - fixtures/ux/embedded_boundary_cases/marketplace_account_offline_snapshot_card.yaml
    evidence_path: fixtures/design/theme_support_cases/marketplace_account_does_not_inherit_descriptor.yaml

  - row_id: supported_mode_row:embedded:marketplace_account:hc-light:01
    claimant_family_class: embedded_surface
    subject_ref: embedded_surface:provider.marketplace.account:01
    support_state: not_claimed
    theme_package_manifest_ref: theme_package_manifest:default.aureline:01
    theme_package_revision_ref: theme_package_rev:default.aureline:2026-04-29:01
    canonical_package_id: theme_package:first_party.aureline_default:01
    canonical_package_revision_ref: theme_package_rev:first_party.aureline_default:2026-04-26:01
    mode_class: hc-light
    theme_class: high_contrast_light
    appearance_manifest_fixture_path: fixtures/design/theme_package_cases/first_party_default_theme_manifest.yaml
    claim_fixture_paths:
      - fixtures/design/theme_support_cases/marketplace_account_does_not_inherit_descriptor.yaml
      - fixtures/ux/embedded_boundary_cases/marketplace_account_offline_snapshot_card.yaml
    evidence_path: fixtures/design/theme_support_cases/marketplace_account_does_not_inherit_descriptor.yaml
