  - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.4
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#8.6
  - docs/ux/shell_zone_and_density_contract.md
  - artifacts/ux/shell_metrics.yaml
  - docs/ux/control_family_contract.md
  - artifacts/design/layer_and_scrim_tokens.yaml
minted_at: "2026-05-05T00:00:00Z"

