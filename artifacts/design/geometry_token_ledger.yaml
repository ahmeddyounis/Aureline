  - token_name: density.compact
    density_class: compact
    source_of_truth_ref: artifacts/ux/shell_metrics.yaml#density_rows

  - token_name: density.standard
    density_class: standard
    source_of_truth_ref: artifacts/ux/shell_metrics.yaml#density_rows

  - token_name: density.comfortable
    density_class: comfortable
    source_of_truth_ref: artifacts/ux/shell_metrics.yaml#density_rows

hit_target_floors:
  - hit_target_class: interactive_min
    minimum_px: 28
    token_ref: size.hit.min
    notes: Every interactive target keeps at least this logical hit target.
    source_of_truth_ref: docs/ux/control_family_contract.md#control-families

  - hit_target_class: icon_only_control
    minimum_px: 28
    recommended_default_min_px: 28
    recommended_default_max_px: 32
    recommended_maximum_px: 36
    token_ref: size.hit.min
    notes: Logical hit target matters more than visible glyph size.
    source_of_truth_ref: artifacts/ux/shell_metrics.yaml#metric_rows

  - hit_target_class: row_action
    minimum_px: 28
    token_ref: size.hit.min
    notes: Trailing row actions and inline row toggles preserve the same hit-target floor as icon-only controls.
    source_of_truth_ref: docs/ux/control_family_contract.md#control-families

  - hit_target_class: disclosure_affordance
    minimum_px: 28
    token_ref: size.hit.min
    notes: Disclosure/expand affordances keep a 28 px hit target even when the glyph is 12 px.
    source_of_truth_ref: docs/design/geometry_and_hit_target_contract.md#3.3

  - hit_target_class: resize_handle
    minimum_px: 4
    recommended_default_min_px: 6
    recommended_default_max_px: 8
    notes: Hit area for resize handles/splitter drags; visual line may be thinner.
    source_of_truth_ref: artifacts/ux/shell_metrics.yaml#metric_rows

  - hit_target_class: splitter_hit_target
    minimum_px: 4
    recommended_default_min_px: 6
    recommended_default_max_px: 8
    notes: Splitter hit target uses the same floor as resize handles; density must not reduce it.
    source_of_truth_ref: docs/ux/splitter_contract.md#3-anatomy

component_family_bindings:
  - component_family_class: button
    required_token_refs:
      - size.hit.min
      - size.control.compact
      - size.control.standard
      - size.control.comfortable
      - radius.md
      - stroke.focus.ring
    notes: Buttons may change padding under density but never the hit-target floor.

  - component_family_class: input
    required_token_refs:
      - size.hit.min
      - size.control.compact
      - size.control.standard
      - size.control.comfortable
      - radius.sm
      - stroke.focus.ring
    notes: Inputs keep persistent labels and focus clearance under zoom/text scale.

  - component_family_class: tab
    required_token_refs:
      - size.hit.min
      - size.tab
      - stroke.focus.ring
    notes: Tab overflow occurs before labels become meaningless; close hit targets do not shrink under density.

  - component_family_class: tree
    required_token_refs:
      - size.hit.min
      - size.row.compact
      - size.row.standard
      - size.row.comfortable
      - size.indent.step
      - size.disclosure.glyph
    notes: Tree rows preserve disclosure hit targets and label stability under deep nesting and cramped widths.

  - component_family_class: table
    required_token_refs:
      - size.hit.min
      - size.row.compact
      - size.row.standard
      - size.row.comfortable
    notes: Tables preserve identity/provenance columns and hit targets when density/zoom changes.

  - component_family_class: dialog
    required_token_refs:
      - size.hit.min
      - radius.lg
      - elevation.3
      - opacity.scrim.strong
    notes: Dialogs use elevation.3 and strong scrim; controls keep minimum hit targets.

  - component_family_class: banner
    required_token_refs:
      - size.hit.min
      - space.3
      - space.4
    notes: Banners remain readable; optional actions collapse to overflow before truncating the primary statement.

  - component_family_class: status_item
    required_token_refs:
      - size.hit.min
      - size.statusbar
      - opacity.subtle
    notes: Status items are dense but remain inspectable; secondary details yield space first.
