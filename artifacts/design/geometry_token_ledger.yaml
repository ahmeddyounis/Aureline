# yaml-language-server: $schema=../../schemas/design/geometry_token.schema.json
#
# Geometry token ledger (spacing, sizing, radius, border/stroke, elevation,
# opacity) plus density-derived row/control heights and hit-target floors.
#
# Canonical sources:
# - .t2/docs/Aureline_UX_Design_System_Style_Guide.md §9, §12.4
# - .t2/docs/Aureline_UI_UX_Spec_Document.md §6.3–6.4, §8.6
# - artifacts/ux/shell_metrics.yaml (density rows + hit-target floors)
# - artifacts/design/layer_and_scrim_tokens.yaml (scrim alpha values)
#
# Rules:
# - Surfaces and component contracts cite tokens from this ledger rather than
#   minting per-surface spacing, row heights, or hit-target floors.
# - Density affects only spacing-like tokens; it MUST NOT change command
#   semantics, focus order, information architecture, or state meaning.
# - When zoom/text scale makes a layout cramped, collapse optional detail into
#   overflow before shrinking hit targets below floors or making labels
#   unreadable.

