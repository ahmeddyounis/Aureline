# yaml-language-server: $schema=../../schemas/design/motion_transition.schema.json
#
# Motion token ledger (duration + easing) and semantic role bindings.
#
# Canonical sources:
# - .t2/docs/Aureline_UX_Design_System_Style_Guide.md §10.2–10.4
# - .t2/docs/Aureline_UI_UX_Spec_Document.md §8.7
# - docs/ux/theme_and_visual_asset_contract.md §1.3 / §8
#
# Rules:
# - Surfaces and component contracts cite token names, not raw milliseconds or
#   cubic-bezier literals.
# - Motion is semantic feedback, not decoration: reduced-motion and power-saver
#   postures must preserve state conveyance and focus visibility.

record_kind: motion_token_ledger_record
motion_transition_schema_version: 1
ledger_id: motion_token_ledger:default:01
source_of_truth_refs:
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10.2
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10.3
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10.4
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#8.7
  - docs/ux/theme_and_visual_asset_contract.md#1.3
  - docs/ux/theme_and_visual_asset_contract.md#8
minted_at: "2026-05-05T00:00:00Z"

duration_tokens:
  - token_name: motion.instant
    ms: 0
    use_hint: Reduced-motion or critical hot-path suppression.
    source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10.2
  - token_name: motion.fast
    ms: 80
    use_hint: Hover/press feedback and short emphasis transitions.
    source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10.2
  - token_name: motion.ui
    ms: 120
    use_hint: Popovers and control feedback.
    source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10.2
  - token_name: motion.panel
    ms: 160
    use_hint: Sidebar/panel changes.
    source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10.2
  - token_name: motion.dialog
    ms: 220
    use_hint: Dialog/sheet entry and exit.
    source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10.2

easing_tokens:
  - token_name: ease.standard
    curve: cubic-bezier(.2, .0, .0, 1)
    use_hint: Most UI transitions.
    source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10.3
  - token_name: ease.exit
    curve: cubic-bezier(.4, .0, 1, 1)
    use_hint: Dismissing surfaces.
    source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10.3
  - token_name: ease.enter
    curve: cubic-bezier(.0, .0, .2, 1)
    use_hint: Entering surfaces.
    source_of_truth_ref: .t2/docs/Aureline_UX_Design_System_Style_Guide.md#10.3

# ---------------------------------------------------------------------------
# Semantic role bindings. These are role-level defaults; concrete surfaces
# refine the role via named motion_preset_record instances.
# ---------------------------------------------------------------------------
semantic_transition_roles:
  - role_class: enter
    default_duration_tokens: [motion.ui, motion.panel, motion.dialog]
    default_easing_tokens: [ease.enter]
    notes: >
      Enter transitions clarify origin/continuity. Prefer short fades and small
      transforms; avoid theatrical zoom or long travel.

  - role_class: exit
    default_duration_tokens: [motion.ui, motion.panel, motion.dialog]
    default_easing_tokens: [ease.exit]
    notes: >
      Exit transitions confirm dismissal without stealing attention. Do not
      delay input re-availability on exit; cancellation must be immediate.

  - role_class: emphasis
    default_duration_tokens: [motion.fast]
    default_easing_tokens: [ease.standard]
    notes: >
      Emphasis transitions are subtle (border/opacity changes, not bounce).
      They reinforce feedback without becoming an attention trap.

  - role_class: progress
    default_duration_tokens: [motion.ui]
    default_easing_tokens: [ease.standard]
    notes: >
      Progress motion is optional and must degrade to static equivalents under
      reduced-motion, low-motion, and constrained runtime postures.

  - role_class: attention
    default_duration_tokens: [motion.ui]
    default_easing_tokens: [ease.enter]
    notes: >
      Attention motion (toasts/banners) must never be the only carrier of
      freshness, completion, risk, or blocked state. It must never steal focus.

  - role_class: recovery
    default_duration_tokens: [motion.fast]
    default_easing_tokens: [ease.standard]
    notes: >
      Recovery transitions acknowledge a successful undo/repair without
      introducing new motion where reduced-motion or power-saver postures are
      active.

