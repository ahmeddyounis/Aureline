motion_reduction_rows:
  - row_id: motion_reduction:ai_panel
    surface_class: ai_assist_panel
    standard_motion_family: decorative_entrance_motion
    reduced_motion_substitution: crossfade_only
    power_saver_substitution: suppress_entirely
    critical_attention_cue_preserved: true
    state_cue_ref: artifacts/design/state_badge_families_alpha.yaml#component_state_families
  - row_id: motion_reduction:terminal_panel
    surface_class: terminal_panel
    standard_motion_family: panel_sidebar_change
    reduced_motion_substitution: maintain_essential_keep_simplified
    power_saver_substitution: collapse_to_instant
    critical_attention_cue_preserved: true
    state_cue_ref: artifacts/design/state_badge_families_alpha.yaml#component_state_families
  - row_id: motion_reduction:list_panel
    surface_class: list_panel
    standard_motion_family: dense_pane_state_change
    reduced_motion_substitution: non_motion_state_marker
    power_saver_substitution: collapse_to_instant
    critical_attention_cue_preserved: true
    state_cue_ref: artifacts/design/state_badge_families_alpha.yaml#badge_families
  - row_id: motion_reduction:decorative_shell
    surface_class: decorative_shell_chrome
    standard_motion_family: decorative_entrance_motion
    reduced_motion_substitution: suppress_entirely
    power_saver_substitution: suppress_entirely
    critical_attention_cue_preserved: true
    state_cue_ref: artifacts/design/state_badge_families_alpha.yaml#notice_families

safety_critical_change_gates:
  - gate_id: visual_gate:trust_prompt
    surface_class: trust_prompt_canvas
    change_class: trust_or_policy_token_change
    requires_visual_diff: true
    requires_accessibility_audit: true
    evidence_ref: fixtures/design/m2_state_semantics/trust_notice_families.yaml
  - gate_id: visual_gate:onboarding
    surface_class: onboarding_start_center
    change_class: onboarding_or_import_token_change
    requires_visual_diff: true
    requires_accessibility_audit: true
    evidence_ref: fixtures/design/m2_theme_density_motion/imported_theme_review_before_commit.yaml
  - gate_id: visual_gate:notification
    surface_class: notification_surface
    change_class: durable_attention_token_change
    requires_visual_diff: true
    requires_accessibility_audit: true
    evidence_ref: fixtures/design/theme_support_cases/notification_surface_reduced_motion_partial_claim.yaml

