# M2 appearance visual-diff, accessibility, and review-gate alpha manifest.
#
# This manifest binds dark, light, high-contrast, density, motion, imported-theme,
# and OS-driven appearance evidence to one appearance-session object so launch
# wedge claims remain attributable and reviewable.

record_kind: appearance_visual_diff_alpha_manifest
schema_version: 1
manifest_id: appearance_visual_diff_alpha.m2.01
as_of: "2026-05-13"
owner: "@ahmeddyounis"

appearance_session_ref: appearance_session:profile.default:steady:01
theme_package_manifest_ref: theme_package_manifest:default.aureline:01
theme_package_revision_ref: theme_package_rev:default.aureline:2026-04-29:01
token_state_registry_ref: artifacts/design/state_badge_families_alpha.yaml

source_refs:
  - docs/design/appearance_session_contract.md
  - docs/design/theme_package_manifest_contract.md
  - docs/design/theme_support_and_inheritance_contract.md
  - docs/design/os_appearance_change_matrix.md
  - docs/design/m2_theme_density_motion_alpha.md
runtime_consumer_refs:
  - crates/aureline-ui/src/themes/session.rs
  - crates/aureline-ui/src/themes/package.rs
  - crates/aureline-ui/src/themes/import_review.rs
  - crates/aureline-ui/src/themes/audit.rs
  - crates/aureline-shell/src/bootstrap/native_shell.rs

claimed_theme_classes:
  - dark_reference
  - light_parity
  - high_contrast_dark
  - high_contrast_light
claimed_density_classes:
  - compact
  - standard
  - comfortable
claimed_motion_postures:
  - motion_standard
  - motion_reduced
  - motion_low_motion
  - motion_power_saver

visual_diff_cases:
  - case_id: visual_diff:shell_chrome.dark.standard
    surface_class: shell_chrome
    theme_class: dark_reference
    density_class: standard
    motion_posture: motion_standard
    appearance_session_ref: appearance_session:profile.default:steady:01
    baseline_ref: tests/golden/appearance/shell_chrome/baselines/shell_chrome.dark_reference.standard.motion_standard.png
    comparison_ref: tests/golden/appearance/shell_chrome/token_adoption_baseline.json
    accessibility_audit_ref: fixtures/design/theme_support_cases/shell_chrome_dark_reference_supported_claim.yaml
    semantic_stability_result: stable
    minimum_contrast_result: pass

  - case_id: visual_diff:shell_chrome.light.standard
