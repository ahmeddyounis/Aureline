# Raw-color / non-semantic-token exception registry.
#
# This artifact is the governed escape hatch for first-party product code and
# first-party extensions that temporarily cannot comply with the semantic-token
# conformance gate.
#
# Canonical sources:
# - docs/design/token_conformance_gate.md
# - docs/design/semantic_token_domains_and_palette_contract.md
# - artifacts/design/semantic_token_domains.yaml
# - docs/design/appearance_evidence_packet_template.md
#
# Rules (frozen for this schema version):
# - Every exception is time-bounded (expires_at is required).
# - Every exception must name an owner, rationale, scope, follow-up path, and
#   at least one evidence ref (appearance packet / conformance packet / review
#   artifact).
# - Expired exceptions are treated as blocking drift.

record_kind: raw_color_exception_registry_record
raw_color_exception_schema_version: 1
registry_id: raw_color_exception_registry:seed:01
source_of_truth_refs:
  - docs/design/token_conformance_gate.md
  - docs/design/semantic_token_domains_and_palette_contract.md
  - artifacts/design/semantic_token_domains.yaml
  - docs/design/appearance_evidence_packet_template.md
minted_at: "2026-05-06T00:00:00Z"

closed_vocabularies:
  exception_class:
    - raw_color_literal
    - non_semantic_token_reference
  exception_status:
    - active
    - expired

# The registry starts empty; first-party violations must not land without a
# time-bounded entry.
exceptions: []

