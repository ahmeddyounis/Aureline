# ---------------------------------------------------------------------------
# Power-saver / low-motion review rules. The matrix evaluates these
# rules whenever a coverage row's claimed_accessibility_posture_classes
# includes motion_low_motion or motion_power_saver. Each rule routes
# through one rule_id in artifacts/design/token_drift_rules.yaml.
# ---------------------------------------------------------------------------
power_saver_low_motion_review_rules:

  - rule_id: appearance:posture:power_saver_silent_relax_refused
    appearance_audit_finding_class: power_saver_silent_relax
    severity_class: block
    description: >
      A surface engaged motion_power_saver and silently relaxed
      back to motion_standard before the runtime pressure source
      cleared. Posture release MUST be observable; routes to
      accessibility_posture_silent_downgrade.
    routes_to_rule_id: token_drift_rules:block:accessibility_posture_silent_downgrade

  - rule_id: appearance:posture:low_motion_strips_state_conveyance_refused
    appearance_audit_finding_class: low_motion_strips_state_conveyance
    severity_class: block
    description: >
      A motion_low_motion capture replaced a state-bearing motion
      with no static substitute, leaving the state cue invisible to
      a low-motion user. Routes to
      accessibility_posture_silent_downgrade.
    routes_to_rule_id: token_drift_rules:block:accessibility_posture_silent_downgrade

  - rule_id: appearance:posture:focus_visibility_lost_under_posture_refused
    appearance_audit_finding_class: focus_visibility_lost_under_posture
    severity_class: block
    description: >
      A reduced-motion or power-saver capture hid or thinned the
      focus ring; postures preserve focus visibility unconditionally.
      Routes to accessibility_posture_silent_downgrade.
    routes_to_rule_id: token_drift_rules:block:accessibility_posture_silent_downgrade

  - rule_id: appearance:density:focus_visibility_lost_under_density_refused
    appearance_audit_finding_class: focus_visibility_lost_under_density
    severity_class: block
    description: >
      A density-compact capture reduced focus-ring visibility;
      density modes preserve focus visibility. Routes to
      density_changed_focus_visibility.
    routes_to_rule_id: token_drift_rules:block:density_changed_focus_visibility

  - rule_id: appearance:density:density_changed_information_architecture_refused
    appearance_audit_finding_class: density_changed_information_architecture
    severity_class: block
    description: >
      A density-compact capture removed columns, hid commands, or
      changed information architecture. Density affects spacing-like
      tokens only.
    routes_to_rule_id: token_drift_rules:block:density_changed_information_architecture

# ---------------------------------------------------------------------------
# Extension / embedded inheritance review rules. Reviewers consume these
# rules whenever a coverage row's surface_owner_role_class is
# extension_contributed_surface or embedded_surface_contributed.
# ---------------------------------------------------------------------------
extension_embedded_inheritance_review_rules:

  - rule_id: appearance:inheritance:extension_partial_inheritance_undeclared_refused
    appearance_audit_finding_class: extension_partial_inheritance_undeclared
    severity_class: block
    description: >
      An extension-contributed surface inherited a subset of the
      first-party palette without declaring
      extension_inherits_first_party_palette or
      extension_partial_high_contrast_inheritance. The undeclared
      gap is drift, not coverage.
    routes_to_rule_id: token_drift_rules:block:component_state_class_unresolved
    permitted_inheritance_posture_classes:
      - partial_inherited_extension_first_party_palette
      - partial_inherited_extension_high_contrast

  - rule_id: appearance:inheritance:embedded_partial_inheritance_undeclared_refused
    appearance_audit_finding_class: embedded_partial_inheritance_undeclared
    severity_class: block
    description: >
      An embedded surface inherited the outer chrome's manifest or
      used inert_placeholder for an unmapped role without declaring
      embedded_surface_inherits_outer_chrome or
      embedded_surface_inert_placeholder_for_unmapped_role.
    routes_to_rule_id: token_drift_rules:block:component_state_class_unresolved
    permitted_inheritance_posture_classes:
      - partial_inherited_embedded_outer_chrome
      - partial_inherited_embedded_inert_placeholder

# ---------------------------------------------------------------------------
# Mechanical evaluation order. The evaluator applies these steps per
# coverage row and halts at the first refusal at the row level; per-
# packet evaluation continues independently per row.
# ---------------------------------------------------------------------------
evaluation_order:
  - id: 1_resolve_canonical_refs
    description: >
      Resolve canonical_corpus_row_id against
      artifacts/design/component_state_screenshot_corpus.yaml,
      canonical_theme_support_claim_id against the published
      theme_support_row_claim_record set, and
      canonical_token_export_manifest_ref against
      schemas/design/token_export_manifest.schema.json. Missing
      refs route to source_of_truth_unresolved.
  - id: 2_assert_axis_floors
    description: >
      Confirm the row claims all four theme classes, both
      contrast_standard and contrast_high, at least density_standard,
      at least motion_standard and motion_reduced, and at least one
      text_scale_or_zoom class beyond text_scale_100. Missing axis
      claims route to the matching *_missing_for_claimed_surface
      finding.
  - id: 3_assert_inheritance_posture
    description: >
      For inheritance_posture_class != fully_inherited and
      != explicitly_out_of_scope, confirm the matching
      allowed_inheritance_gap_class is permitted on the surface
      owner per
      artifacts/design/token_drift_rules.yaml#surface_owner_gap_policy.
      Undeclared partial inheritance routes to
      extension_partial_inheritance_undeclared or
      embedded_partial_inheritance_undeclared.
  - id: 4_assert_raw_color_review
    description: >
      For raw_color_exception_status_class != no_raw_color_in_row,
      confirm a decision-row ref or a documented-exception ref is
      attached. raw_color_pending_review and
      raw_color_review_denied route to
      raw_color_exception_unreviewed.
  - id: 5_assert_capture_floor
    description: >
      Confirm required_capture_classes covers every claimed theme,
      contrast, density, posture, and text-scale axis. Missing
      captures hold the row in
      coverage_state_class = partial until the captures land.
  - id: 6_select_gate_state
    description: >
      Pick the row's gate_state_class from the highest-severity
      finding remaining (block_release > block > warn >
      pass_with_disclosed_gap > pass).
  - id: 7_emit_audit_event
    description: >
      Emit an appearance_evidence_packet_row record with
      audit_event_id = design_token_conformance_diff_emitted (pass /
      pass_with_disclosed_gap / warn) or
      design_token_conformance_diff_refused (block / block_release).
