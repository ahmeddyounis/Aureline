# yaml-language-server: $schema=../../schemas/design/contrast_thresholds.schema.json
#
# Contrast threshold ledger.
#
# This artifact publishes named minimum contrast targets for launch-critical
# surface families so accessibility and visual-regression work can validate
# conformance against stable threshold ids instead of screenshot heuristics.
#
# Canonical sources:
# - .t2/docs/Aureline_UI_UX_Spec_Document.md §19.3 (baseline contrast metrics)
# - .t2/docs/Aureline_UX_Design_System_Style_Guide.md §28.3 (same baseline)
# - artifacts/design/theme_support_rows.yaml (per-theme minimum targets)
# - docs/accessibility/visual_adaptation_contract.md (mode/forced-colors rules)
# - docs/design/contrast_and_color_substitution_contract.md (surface-level rules)
#
# Rules:
# - Threshold ids are stable vocabulary and safe to cite from tooling.
# - High-contrast themes raise thresholds; forced-colors preserves meaning via
#   shape/icon/text rather than hue-only changes.
# - Accent tokens used for *classification* may be held to a lower floor than
#   primary text, but primary text/copy and primary code text are always held to
#   the text threshold.

record_kind: contrast_threshold_ledger_record
contrast_threshold_schema_version: 1
ledger_id: contrast_thresholds:default:01
source_of_truth_refs:
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#19.3
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#28.3
  - artifacts/design/theme_support_rows.yaml
  - docs/accessibility/visual_adaptation_contract.md
  - docs/design/contrast_and_color_substitution_contract.md
minted_at: "2026-05-06T00:00:00Z"

threshold_rows:
  - threshold_id: design.contrast.threshold.text.primary
    element_class: text_primary
    measurement_kind: text
    target_by_theme_class:
      dark_reference: 4.5
      light_parity: 4.5
      high_contrast_dark: 7.0
      high_contrast_light: 7.0
    source_of_truth_refs:
      - .t2/docs/Aureline_UI_UX_Spec_Document.md#19.3
      - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#28.3
      - artifacts/design/theme_support_rows.yaml
    notes: >
      Primary UI text, headings, and any recovery- or trust-critical copy. This
      is the default minimum for readable text in standard themes.

  - threshold_id: design.contrast.threshold.text.secondary
    element_class: text_secondary
    measurement_kind: text
    target_by_theme_class:
      dark_reference: 4.5
      light_parity: 4.5
      high_contrast_dark: 7.0
      high_contrast_light: 7.0
    source_of_truth_refs:
      - .t2/docs/Aureline_UI_UX_Spec_Document.md#19.3
      - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#28.3
    notes: >
      Supporting/helper text and secondary labels. Secondary is about hierarchy,
      not about falling below readability targets.

  - threshold_id: design.contrast.threshold.code.text.primary
    element_class: code_text_primary
    measurement_kind: text
    target_by_theme_class:
      dark_reference: 4.5
      light_parity: 4.5
      high_contrast_dark: 7.0
      high_contrast_light: 7.0
    source_of_truth_refs:
      - .t2/docs/Aureline_UI_UX_Spec_Document.md#19.3
    notes: >
      Primary code/editor text (identifiers, literals, comments when used as
      readable prose, diff bodies, terminal transcripts). Diffs, diagnostics,
      and review surfaces MUST NOT reduce this below target via tinted fills or
      overlay dimming.

  - threshold_id: design.contrast.threshold.code.token.accent
    element_class: code_token_accent
    measurement_kind: text
    target_by_theme_class:
      dark_reference: 3.0
      light_parity: 3.0
      high_contrast_dark: 4.5
      high_contrast_light: 4.5
    source_of_truth_refs:
      - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.5
      - docs/accessibility/visual_adaptation_contract.md
    notes: >
      Accent tokens used primarily for classification (keyword/type/function
      coloring, subtle syntax roles, inline-code emphasis). Accent contrast must
      not drop below the UI/graphic threshold; under high-contrast themes,
      accent tokens are lifted before diagnostics, focus, diff, or trust cues
      lose contrast.

  - threshold_id: design.contrast.threshold.chart.mark
    element_class: chart_mark
    measurement_kind: non_text_graphic
    target_by_theme_class:
      dark_reference: 3.0
      light_parity: 3.0
      high_contrast_dark: 4.5
      high_contrast_light: 4.5
    source_of_truth_refs:
      - .t2/docs/Aureline_UI_UX_Spec_Document.md#19.3
      - docs/accessibility/visual_adaptation_contract.md
    notes: >
      Chart marks that carry meaning: lines, markers, bars, threshold rules, and
      selection highlights. Measurement applies to the final rendered mark
      (including any halo/outline/pattern) against the chart background.

  - threshold_id: design.contrast.threshold.diff.region.boundary
    element_class: diff_region_boundary
    measurement_kind: ui_boundary
    target_by_theme_class:
      dark_reference: 3.0
      light_parity: 3.0
      high_contrast_dark: 4.5
      high_contrast_light: 4.5
    source_of_truth_refs:
      - .t2/docs/Aureline_UI_UX_Spec_Document.md#19.3
      - docs/accessibility/visual_adaptation_contract.md
    notes: >
      Diff region boundary cues: change bars, hunk borders, inserted/removed
      gutters, and region outlines. These cues must remain visible in reduced
      chroma and forced-colors contexts (pattern/shape may substitute for hue).

  - threshold_id: design.contrast.threshold.diff.marker_or_glyph
    element_class: diff_marker_or_glyph
    measurement_kind: non_text_graphic
    target_by_theme_class:
      dark_reference: 3.0
      light_parity: 3.0
      high_contrast_dark: 4.5
      high_contrast_light: 4.5
    source_of_truth_refs:
      - docs/accessibility/visual_adaptation_contract.md
    notes: >
      Plus/minus markers, inline change glyphs, and other non-text diff symbols
      that communicate added/removed/modified without relying on hue alone.

  - threshold_id: design.contrast.threshold.badge.text
    element_class: badge_text
    measurement_kind: text
    target_by_theme_class:
      dark_reference: 4.5
      light_parity: 4.5
      high_contrast_dark: 7.0
      high_contrast_light: 7.0
    source_of_truth_refs:
      - .t2/docs/Aureline_UI_UX_Spec_Document.md#19.3
      - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.3
    notes: >
      Badge/pill label text on its fill surface. Compact surfaces still need
      readable labels for severity, trust, and blocked state; icon-only is not
      sufficient for first occurrence or recovery-critical meaning.

  - threshold_id: design.contrast.threshold.badge.boundary
    element_class: badge_boundary
    measurement_kind: ui_boundary
    target_by_theme_class:
      dark_reference: 3.0
      light_parity: 3.0
      high_contrast_dark: 4.5
      high_contrast_light: 4.5
    notes: >
      Badge/pill boundary (stroke) against adjacent chrome. Boundary and shape
      remain the primary cue when reduced-chroma or forced-colors removes fill.

  - threshold_id: design.contrast.threshold.banner.text
    element_class: banner_text
    measurement_kind: text
    target_by_theme_class:
      dark_reference: 4.5
      light_parity: 4.5
      high_contrast_dark: 7.0
      high_contrast_light: 7.0
    source_of_truth_refs:
      - .t2/docs/Aureline_UI_UX_Spec_Document.md#19.3
      - docs/ux/banner_notice_contract.md
    notes: >
      Banner body and action labels. Banners often carry trust/recovery meaning;
      they cannot rely on tinted fills that make copy unreadable.

  - threshold_id: design.contrast.threshold.banner.boundary
    element_class: banner_boundary
    measurement_kind: ui_boundary
    target_by_theme_class:
      dark_reference: 3.0
      light_parity: 3.0
      high_contrast_dark: 4.5
      high_contrast_light: 4.5
    notes: >
      Banner boundary/stroke against surrounding surfaces. High-contrast themes
      treat boundaries as load-bearing state carriers.

  - threshold_id: design.contrast.threshold.focus.indicator
    element_class: focus_indicator
    measurement_kind: focus_indicator
    target_by_theme_class:
      dark_reference: 3.0
      light_parity: 3.0
      high_contrast_dark: 4.5
      high_contrast_light: 4.5
    source_of_truth_refs:
      - .t2/docs/Aureline_UI_UX_Spec_Document.md#19.3
      - artifacts/design/theme_support_rows.yaml
    notes: >
      Focus ring/indicator visibility against adjacent colors and under overlay
      dimming. The target here is a minimum; thicker strokes and dual rings may
      be used to improve focus visibility under forced-colors.

  - threshold_id: design.contrast.threshold.overlay.text
    element_class: overlay_text
    measurement_kind: text
    target_by_theme_class:
      dark_reference: 4.5
      light_parity: 4.5
      high_contrast_dark: 7.0
      high_contrast_light: 7.0
    source_of_truth_refs:
      - artifacts/design/layer_and_scrim_tokens.yaml
      - docs/ux/overlay_layer_contract.md
    notes: >
      Overlay/dialog text on overlay surfaces. Scrim and overlay layering must
      not reduce overlay text below the target.

  - threshold_id: design.contrast.threshold.overlay.boundary
    element_class: overlay_boundary
    measurement_kind: ui_boundary
    target_by_theme_class:
      dark_reference: 3.0
      light_parity: 3.0
      high_contrast_dark: 4.5
      high_contrast_light: 4.5
    notes: >
      Overlay chrome boundary (stroke) against the scrim/canvas. Critical
      overlays use boundary + label + icon; hue-only framing is non-conforming.

