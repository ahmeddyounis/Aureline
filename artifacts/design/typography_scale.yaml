# yaml-language-server: $schema=../../schemas/design/text_role.schema.json
#
# Frozen typography scale rows (`type.*`) used across shell, docs/help,
# editor-adjacent UI, tables, badges, and teaching surfaces.
#
# Canonical sources:
# - .t2/docs/Aureline_UX_Design_System_Style_Guide.md §8.2
# - .t2/docs/Aureline_UI_UX_Spec_Document.md §8.5
# - docs/design/typography_text_contract.md
#
# Rules:
# - Every UI-visible text style maps to one scale row from this file.
# - Adding a new row is additive but requires updating the style guide,
#   this artifact, and the text render-case fixtures together.
# - Surfaces MUST NOT mint intermediate one-off sizes ("13.5 px") or
#   per-surface private rows.

record_kind: typography_scale_record
text_role_schema_version: 1
scale_id: typography_scale:default:01
source_of_truth_refs:
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#8.2
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#8.5
  - docs/design/typography_text_contract.md
minted_at: "2026-05-05T00:00:00Z"

scale_rows:
  - scale_token: type.display
    font_size_px: 32
    line_height_px: 40
    font_weight: 600
    intended_use: internal hero panels only

  - scale_token: type.title.1
    font_size_px: 24
    line_height_px: 32
    font_weight: 600
    intended_use: dialog titles, major settings sections

  - scale_token: type.title.2
    font_size_px: 20
    line_height_px: 28
    font_weight: 600
    intended_use: panel titles, inspectors

  - scale_token: type.title.3
    font_size_px: 18
    line_height_px: 24
    font_weight: 600
    intended_use: subsections

  - scale_token: type.body.lg
    font_size_px: 15
    line_height_px: 22
    font_weight: 400
    intended_use: long-form panels and docs

  - scale_token: type.body.md
    font_size_px: 14
    line_height_px: 20
    font_weight: 400
    intended_use: default UI body

  - scale_token: type.body.sm
    font_size_px: 13
    line_height_px: 18
    font_weight: 400
    intended_use: compact UI body

  - scale_token: type.label.md
    font_size_px: 12
    line_height_px: 16
    font_weight: 600
    intended_use: labels, pills, dense metadata

  - scale_token: type.label.sm
    font_size_px: 11
    line_height_px: 14
    font_weight: 600
    intended_use: micro labels

  - scale_token: type.code.md
    font_size_px: 13
    line_height_px: 20
    font_weight: 400
    intended_use: editor/terminal default

  - scale_token: type.code.sm
    font_size_px: 12
    line_height_px: 18
    font_weight: 400
    intended_use: inlay hints, compact code cells

