# OS appearance live-change matrix.
#
# Companion to:
# - docs/design/os_appearance_change_matrix.md
# - docs/design/appearance_session_contract.md
# - docs/ux/appearance_import_and_checkpoint_contract.md
#
# This artifact is a compact, machine-readable summary of how Aureline
# responds to OS appearance signals (theme, contrast/forced colors, accent,
# text scale, reduced motion) on each *claimed desktop profile* and for each
# surface family.
#
# Rules:
# - This matrix only claims behavior for desktop_profile_id values listed in
#   artifacts/platform/claimed_desktop_profiles.yaml.
# - Rows MUST use axis values from the appearance-session contract.
# - Rows MUST use atomicity_class values from schemas/ux/appearance_checkpoint.schema.json.
# - Embedded/extension-hosted surfaces that cannot participate in a live apply
#   MUST be disclosed as reload-required; leaving stale pixels unmarked is
#   non-conforming.

appearance_live_change_matrix_schema_version: 1

source_doc_ref: docs/design/os_appearance_change_matrix.md
claimed_profile_roster_ref: artifacts/platform/claimed_desktop_profiles.yaml
appearance_session_contract_ref: docs/design/appearance_session_contract.md
appearance_checkpoint_contract_ref: docs/ux/appearance_import_and_checkpoint_contract.md
appearance_checkpoint_schema_ref: schemas/ux/appearance_checkpoint.schema.json
fixture_dir_ref: fixtures/design/os_appearance_transition_cases/

surface_family_class_vocabulary:
  - shell_and_first_party_dialogs
  - embedded_or_extension_surface
  - native_platform_dialog

axis_vocabulary:
  - axis: mode_theme_class
    primary_os_signal_class: os_theme_signal
    notes: OS light/dark preference mapped to the resolved theme class.
  - axis: contrast_mode
    primary_os_signal_class: os_contrast_signal
    secondary_os_signal_classes:
      - os_forced_colors_signal
    notes: High-contrast / forced-colors posture mapped to contrast_mode.
  - axis: accent_source
    primary_os_signal_class: os_accent_signal
    notes: System accent / highlight color mapped to accent_source.
  - axis: text_scale
    primary_os_signal_class: os_text_scale_signal
    notes: System text-scale / accessibility text size mapped to text_scale.
  - axis: reduced_motion_posture
    primary_os_signal_class: os_reduced_motion_signal
    notes: OS reduce-motion preference mapped to reduced_motion_posture.

apply_path_class_vocabulary:
  - apply_live
  - apply_live_checkpointed
  - hold_pending_confirm
  - surface_reload_required
  - full_restart_required
  - platform_signal_unavailable

rows:
