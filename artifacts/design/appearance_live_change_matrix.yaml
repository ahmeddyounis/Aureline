    axis: contrast_mode
    os_signal_class: os_contrast_signal
    apply_path_class: apply_live_checkpointed
    atomicity_class: single_checkpoint_atomic
    disclosure_required: false
    notes: Contrast posture changes mint a revertable checkpoint before applying.

