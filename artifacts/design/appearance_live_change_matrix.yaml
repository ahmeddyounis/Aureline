    axis: text_scale
    os_signal_class: os_text_scale_signal
    apply_path_class: hold_pending_confirm
    atomicity_class: single_checkpoint_atomic
    disclosure_required: true
    notes: OS text-scale changes require an explicit confirm step before apply.

  - row_id: os_appearance_live_change:macos_15_plus_universal:reduced_motion_posture:shell:01
    desktop_profile_id: macos_15_plus_universal
    surface_family_class: shell_and_first_party_dialogs
    axis: reduced_motion_posture
    os_signal_class: os_reduced_motion_signal
