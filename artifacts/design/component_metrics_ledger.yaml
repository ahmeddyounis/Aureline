# yaml-language-server: $schema=../../schemas/design/component_metrics.schema.json
#
# Component metrics ledger.
#
# Goal: keep dense desktop surfaces mechanically aligned on micro-metrics
# (row heights, control heights, icon sizes, indentation rhythm, disclosure
# sizing, hit-target floors, splitter hit areas, focus-ring gutters, and
# status bar spacing budgets) so drift is reviewable without reading CSS or
# widget code.
#
# Canonical sources:
# - .t2/docs/Aureline_UX_Design_System_Style_Guide.md §9.2, §12.3–12.4
# - .t2/docs/Aureline_UI_UX_Spec_Document.md §6.3–6.4
# - docs/design/geometry_and_hit_target_contract.md
# - artifacts/design/geometry_token_ledger.yaml
# - artifacts/ux/shell_metrics.yaml
# - docs/ux/splitter_contract.md
# - docs/ux/status_bar_contract.md
#
# Rules:
# - Components cite metric ids (and referenced tokens) from this file instead
#   of minting private “30 px rows” or bespoke hit targets.
# - Density changes spacing-like metrics only; it MUST NOT reduce
#   accessibility hit-target floors.
# - Exceptions are allowed only when the owning component packet records the
#   justification and the corresponding component-metric case is updated.

record_kind: component_metrics_ledger_record
component_metrics_schema_version: 1
ledger_id: component_metrics_ledger:default:01
source_of_truth_refs:
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#9.2
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#12.3
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#12.4
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.3
  - .t2/docs/Aureline_UI_UX_Spec_Document.md#6.4
  - docs/design/geometry_and_hit_target_contract.md
  - artifacts/design/geometry_token_ledger.yaml
  - artifacts/ux/shell_metrics.yaml
  - docs/ux/splitter_contract.md
  - docs/ux/status_bar_contract.md
minted_at: "2026-05-05T00:00:00Z"

