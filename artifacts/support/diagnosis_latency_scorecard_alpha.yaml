      next_action_class: open_without_restore
      useful_result_summary: >
        The packet explains why restore replay was blocked and gives an
        open-without-restore path while preserving session evidence.
    support_packet_bindings:
      pack_class: diagnosis_context_pack
      support_bundle_manifest_ref: support.bundle.project_doctor.restore
      required_item_ids:
        - support.item.build_identity
        - support.item.policy_trust_state
      exact_build_identity_required: true
      redaction_class: metadata_safe_default
      raw_private_material_excluded: true
    dashboard_bindings:
      dashboard_row_ref: dashboard_row:support_alpha.restore.replay_blocked
      dashboard_family_group: external_alpha_support
      display_state: seeded_pending_measurement
      scorecard_row_ref: scorecard_row:support_alpha.restore.replay_blocked
    no_touch_boundary_set:
      - user_authored_files
      - session_restore_store
      - credential_store

  - row_id: scorecard_row:support_alpha.provider_auth.credential_expired
    scenario_id: support_alpha.scenario.provider_auth.credential_expired
    scenario_family: provider_auth
    title: Provider credential expired before external action
    fixture_ref: fixtures/support/seeded_scenarios_alpha/provider_credential_expired.yaml
    launch_wedges:
      - python_service
      - tsjs_web
    support_contexts:
      - desktop_support_center
      - cli_headless_doctor
    measurement_start_event: support_scenario_started
    measurement_stop_event: first_actionable_result_packet_emitted
    target_seconds: 600
    yellow_seconds: 720
    red_seconds: 900
    expected_result:
      result_packet_class: doctor_finding
      finding_code: doctor.finding.provider_auth.credential_expired
      result_packet_ref: finding:project_doctor:alpha:provider_credential_expired
      support_bundle_ref: support.bundle.project_doctor.provider_auth
      next_action_class: reauthenticate_provider
      useful_result_summary: >
        The packet identifies the provider authority that requires renewal
        and keeps raw credential handles out of the support path.
    support_packet_bindings:
      pack_class: diagnosis_context_pack
      support_bundle_manifest_ref: support.bundle.project_doctor.provider_auth
      required_item_ids:
        - support.item.build_identity
        - support.item.policy_trust_state
        - support.item.secret_broker_state
      exact_build_identity_required: true
      redaction_class: metadata_safe_default
      raw_private_material_excluded: true
    dashboard_bindings:
      dashboard_row_ref: dashboard_row:support_alpha.provider_auth.credential_expired
      dashboard_family_group: external_alpha_support
      display_state: seeded_pending_measurement
      scorecard_row_ref: scorecard_row:support_alpha.provider_auth.credential_expired
    no_touch_boundary_set:
      - user_authored_files
      - credential_store
      - managed_policy_overrides

  - row_id: scorecard_row:support_alpha.crash_loop.extension_quarantine
    scenario_id: support_alpha.scenario.crash_loop.extension_quarantine
    scenario_family: crash_loop
    title: Crash loop enters safe mode and extension quarantine
    fixture_ref: fixtures/support/seeded_scenarios_alpha/crash_loop_extension_quarantine.yaml
    launch_wedges:
      - python_service
      - tsjs_web
    support_contexts:
      - safe_mode_support_center
      - cli_headless_doctor
    measurement_start_event: support_scenario_started
    measurement_stop_event: first_actionable_result_packet_emitted
    target_seconds: 600
    yellow_seconds: 720
    red_seconds: 900
    expected_result:
      result_packet_class: recovery_decision
      finding_code: doctor.finding.extension_host_crash_loop_quarantined
      result_packet_ref: recovery_ladder:decision:extension_quarantine.crash_loop
      support_bundle_ref: support.bundle.project_doctor.extension_host
      next_action_class: open_safe_mode_and_quarantine
      useful_result_summary: >
        The packet names the crash-loop fault domain, safe-mode entry, and
        quarantine decision without attaching raw dumps by default.
    support_packet_bindings:
      pack_class: crash_symbolication_pack
      support_bundle_manifest_ref: support.bundle.project_doctor.extension_host
      required_item_ids:
        - support.item.build_identity
        - support.item.policy_trust_state
