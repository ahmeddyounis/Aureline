      - credential_store
      - installed_extension_marketplace_state
      - workspace_trust_store

quality_gates:
  - gate_id: support.alpha.scorecard.coverage
    gate_class: scenario_family_coverage
    required_state: every_required_family_present
  - gate_id: support.alpha.scorecard.measurement_window
    gate_class: diagnosis_latency_window
    required_state: scenario_start_to_first_actionable_result_packet
  - gate_id: support.alpha.scorecard.redaction
    gate_class: redaction_safety
    required_state: raw_private_material_excluded
  - gate_id: support.alpha.scorecard.consumer
    gate_class: support_packet_and_dashboard_join
    required_state: support_packet_and_dashboard_consume_scorecard_rows

