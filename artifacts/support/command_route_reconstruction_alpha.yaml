support_bundle_projection:
  preview_row:
    support_pack_item_id: support.item.route_origin_alpha_reconstruction
    bundle_section_class: route_and_execution_truth
    artifact_kind_class: command_route_reconstruction_alpha_packet
    source_refs:
      - artifacts/routes/alpha_route_origin_matrix.yaml
      - schemas/transport/transport_decision_alpha.schema.json
      - artifacts/support/command_route_reconstruction_alpha.yaml
      - fixtures/runtime/route_origin_alpha/manifest.yaml
  action_reconstruction_context_mapping:
    command_id: command.command_id
    command_descriptor_ref: command.command_descriptor_ref
    invocation_session_id: command.invocation_session_id
    target_identity_ref: target.target_identity_ref
    action_route_packet_ref: decision_id
    transport_decision_ref: decision_id
    action_origin_class: origin.origin_scope
    action_target_class: target.target_class
    action_route_class: route.route_choice
    action_exposure_class: route.exposure_posture
    origin_scope: origin.origin_scope
    traffic_origin: origin.traffic_origin
    endpoint_class: target.endpoint_class
    target_class: target.target_class
    route_choice: route.route_choice
    egress_class: route.egress_class
    decision_outcome: decision_result.decision_outcome
    route_truth_state: decision_result.route_truth_state
    fallback_posture: fallback.fallback_posture
    actor_ref: actor.actor_ref
    occurred_at: timestamps.decided_at
    policy_source.policy_source_ref: policy.policy_source_ref
    policy_source.source_class: policy.policy_source_class

denial_and_degraded_state_mapping:
  wrong_target:
    outcome: deny_wrong_target
    route_truth_state: denied_wrong_target
    fallback_posture: wrong_target_denied
    required_refs:
      - target.intended_target_ref
      - target.observed_target_ref
      - decision_result.repair_hook_ref
  wrong_origin:
    outcome: deny_wrong_origin
    route_truth_state: denied_wrong_origin
    fallback_posture: wrong_origin_denied
    required_refs:
      - origin.expected_origin_scope
      - origin.traffic_origin
      - decision_result.repair_hook_ref
  hidden_relay:
    outcome: deny_hidden_relay
    route_truth_state: denied_hidden_relay
    fallback_posture: hidden_relay_denied
    required_refs:
      - route.route_choice
      - fallback.declared_to_user
      - fallback.hidden_fallback_detected
  hidden_fallback:
    outcome: deny_hidden_fallback
    route_truth_state: denied_hidden_fallback
    fallback_posture: hidden_fallback_denied
    required_refs:
      - route.prior_route_choice
      - fallback.direct_fallback_allowed
      - fallback.hidden_fallback_detected
  browser_handoff:
    outcome: degraded_route_changed
    route_truth_state: degraded_browser_handoff
    fallback_posture: browser_handoff_required
    required_refs:
      - route.route_change_reason_code
      - target.target_identity_ref

quality_gates:
  - gate_id: route_origin.fixture_coverage
    description: Fixture corpus covers local, provider, browser-handoff, publish-capable, tunnel-exposed, wrong-target, wrong-origin, hidden-relay, and hidden-fallback rows.
    required_projection_ids:
      - local_task_debug
      - provider_preflight
      - browser_handoff_publish
      - publish_pipeline
      - tunnel_exposed_route
      - wrong_target_denied
      - wrong_origin_denied
      - hidden_relay_denied
      - hidden_fallback_denied
  - gate_id: route_origin.support_bundle_reconstructs_without_ui_text
    description: Rust support consumer projects every fixture into action_reconstruction_contexts with transport decision fields and exact-build refs.
    validator_ref: crates/aureline-support/tests/route_origin_alpha.rs
  - gate_id: route_origin.no_raw_material
    description: Raw URLs, hostnames, command bodies, provider payloads, and secret material remain excluded from support/export projection.
    validator_ref: schemas/transport/transport_decision_alpha.schema.json

redaction:
  redaction_class: metadata_safe_default
  raw_material_excluded: true
  excluded_material_classes:
    - raw_endpoint_url
    - raw_hostname
    - raw_command_line
    - request_or_response_body
    - bearer_token
    - cookie
    - private_key
    - provider_payload
  review_widening_requires: operator_only_restricted_export_review

emitted_at: "2026-05-14T00:00:00Z"
