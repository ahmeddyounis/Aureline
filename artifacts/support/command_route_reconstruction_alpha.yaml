# Support/export reconstruction packet for alpha route-origin truth.
#
# This packet is the first support/export consumer of the alpha
# route-origin matrix and alpha transport decision schema. It tells support
# bundles and incident packets how to reconstruct command, target, route,
# policy, actor, timestamps, outcome, and fallback posture without scraping
# UI text.

schema_version: 1
record_kind: command_route_reconstruction_alpha_packet
packet_id: support.command_route_reconstruction.alpha.v1
status: seeded
owner_dri: "@support-export"
as_of: "2026-05-14"

consumes:
  route_origin_matrix_ref: artifacts/routes/alpha_route_origin_matrix.yaml
  transport_decision_schema_ref: schemas/transport/transport_decision_alpha.schema.json
  support_bundle_manifest_schema_ref: schemas/support/support_bundle_manifest.schema.json
  command_invocation_schema_ref: schemas/commands/invocation_session_alpha.schema.json
  route_taxonomy_ref: docs/runtime/origin_target_route_taxonomy.md
  fixture_manifest_ref: fixtures/runtime/route_origin_alpha/manifest.yaml

first_consumers:
  rust_support_module: crates/aureline-support/src/route_origin_alpha/mod.rs
  rust_support_test: crates/aureline-support/tests/route_origin_alpha.rs
  support_bundle_manifest_block: action_reconstruction_contexts
  docs_runtime_projection: docs/runtime/route_origin_alpha.md

packet_contract:
  support_item_id: support.item.route_origin_alpha_reconstruction
  preview_title: Alpha command, route, and origin reconstruction
  preview_bundle_section_class: route_and_execution_truth
  preview_artifact_kind_class: command_route_reconstruction_alpha_packet
  data_class: environment_adjacent
  high_risk_content_class: not_applicable
  default_redaction_state: not_required_metadata
  raw_content_export_allowed: false
  required_manifest_fields:
    - build_identity.exact_build_refs
    - action_reconstruction_contexts[].command_id
    - action_reconstruction_contexts[].invocation_session_id
    - action_reconstruction_contexts[].target_identity_ref
    - action_reconstruction_contexts[].transport_decision_ref
    - action_reconstruction_contexts[].origin_scope
    - action_reconstruction_contexts[].target_class
    - action_reconstruction_contexts[].route_choice
    - action_reconstruction_contexts[].traffic_origin
    - action_reconstruction_contexts[].decision_outcome
    - action_reconstruction_contexts[].fallback_posture
    - action_reconstruction_contexts[].policy_source.policy_source_ref
    - action_reconstruction_contexts[].actor_ref
    - action_reconstruction_contexts[].occurred_at
  absent_fields_must_be_typed:
    - transport_decision_ref
    - target_identity_ref
    - action_route_packet_ref
    - repair_hook_ref

projection_rows:
  - projection_id: local_task_debug
    matrix_row_ref: artifacts/routes/alpha_route_origin_matrix.yaml#route_origin.local_task_debug
    command_family: task
    support_context: local_debug_or_task
    support_item_id: support.item.route_origin_alpha_reconstruction.local_task_debug
    fixture_ref: fixtures/runtime/route_origin_alpha/local_task_debug.yaml
    expected_route_truth_state: route_authoritative
    expected_outcome: allow
    reconstructs_without_ui_text: true
    route_fields:
      - origin_scope
      - target_class
      - route_choice
      - traffic_origin
      - policy_source_class
      - actor_ref
      - decided_at
      - fallback_posture

  - projection_id: provider_preflight
    matrix_row_ref: artifacts/routes/alpha_route_origin_matrix.yaml#route_origin.provider_preflight
    command_family: provider
    support_context: provider_preflight
    support_item_id: support.item.route_origin_alpha_reconstruction.provider_preflight
    fixture_ref: fixtures/runtime/route_origin_alpha/provider_preflight.yaml
    expected_route_truth_state: route_authoritative
    expected_outcome: allow
    reconstructs_without_ui_text: true
    route_fields:
      - origin_scope
      - target_class
      - endpoint_class
      - route_choice
      - egress_class
      - policy_source_class
      - actor_ref
      - decided_at
      - fallback_posture

  - projection_id: browser_handoff_publish
    matrix_row_ref: artifacts/routes/alpha_route_origin_matrix.yaml#route_origin.browser_handoff_publish
    command_family: boundary_handoff
    support_context: browser_handoff
    support_item_id: support.item.route_origin_alpha_reconstruction.browser_handoff_publish
    fixture_ref: fixtures/runtime/route_origin_alpha/browser_handoff_publish.yaml
    expected_route_truth_state: degraded_browser_handoff
    expected_outcome: degraded_route_changed
    reconstructs_without_ui_text: true
    route_fields:
      - origin_scope
      - traffic_origin
      - target_class
      - route_choice
      - route_change_reason_code
      - fallback_posture
