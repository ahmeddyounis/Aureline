  - projection_id: wrong_origin_denied
    matrix_row_ref: artifacts/routes/alpha_route_origin_matrix.yaml#route_origin.wrong_origin_denied
    command_family: provider
    support_context: denial_or_degraded
    support_item_id: support.item.route_origin_alpha_reconstruction.wrong_origin_denied
    fixture_ref: fixtures/runtime/route_origin_alpha/wrong_origin_denied.yaml
