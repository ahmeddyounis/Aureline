  - projection_id: wrong_target_denied
    matrix_row_ref: artifacts/routes/alpha_route_origin_matrix.yaml#route_origin.wrong_target_denied
    command_family: debug
    support_context: denial_or_degraded
    support_item_id: support.item.route_origin_alpha_reconstruction.wrong_target_denied
    fixture_ref: fixtures/runtime/route_origin_alpha/wrong_target_denied.yaml
    expected_route_truth_state: denied_wrong_target
    expected_outcome: deny_wrong_target
    reconstructs_without_ui_text: true
    route_fields:
      - target_match_state
      - intended_target_ref
