# Project Doctor alpha read-only probe pack.
#
# This pack is the support/export baseline consumed by aureline-support.
# Diagnosis probes may read existing metadata, hashes, manifests, health
# events, counters, and consented reachability observations. They do not
# mutate user files, caches, trust, credentials, routes, extensions, or
# external services.

schema_version: 1
record_kind: project_doctor_probe_pack_record
pack_id: project_doctor.probe_pack.alpha.read_only_baseline
title: Project Doctor alpha read-only probe pack
owner_ref: lane:support_export

schema_refs:
  probe_schema: schemas/project_doctor/probe.schema.json
  finding_schema: schemas/project_doctor/finding.schema.json
  support_probe_catalog_schema: schemas/support/probe_catalog_entry.schema.json
  support_doctor_probe_schema: schemas/support/doctor_probe.schema.json
  support_doctor_finding_schema: schemas/support/doctor_finding.schema.json

source_contract_refs:
  - docs/support/project_doctor_contract_alpha.md
  - docs/support/project_doctor_probe_contract.md
  - docs/support/project_doctor_packet.md
  - docs/support/probe_family_matrix.md
  - docs/support/supportability_slo_and_pack_contract.md

default_execution_policy:
  read_only_by_default: true
  permitted_mutability_classes:
    - non_mutating_read_only
    - metadata_write_local_evidence_only
  permitted_admission_classes:
    - admitted_safe_probe
    - admitted_metadata_evidence_only
  forbidden_during_diagnosis: &mutating_side_effects
    - execute_repo_owned_code
    - mutate_cache_or_index
    - mutate_target_or_route
    - mutate_user_files
    - mutate_trust_policy_or_credentials
    - external_service_mutation
    - activate_third_party_extension
    - collect_high_risk_payload
  allowed_local_writes:
    - write_local_evidence_row
    - create_local_preview_manifest
  unknown_state_policy: >
    Probes that cannot establish truth emit typed unknowns or unsupported
    findings; Doctor does not fold them into generic failure text.
  repair_handoff_policy: >
    Probes may name repair candidates, repair previews, runbooks, support
    bundles, and escalation packets, but any mutation is outside diagnosis.

vocabulary_bindings:
  probe_family_class: schemas/support/probe_catalog_entry.schema.json#/$defs/probe_family_class
  probe_class: schemas/support/doctor_probe.schema.json#/$defs/probe_class
  invocation_policy: schemas/support/doctor_probe.schema.json#/$defs/probe_invocation_policy
  severity_class: schemas/support/doctor_finding.schema.json#/$defs/severity_class
  confidence_class: schemas/support/doctor_finding.schema.json#/$defs/confidence_class
  scope_class: schemas/support/doctor_finding.schema.json#/$defs/scope_class
  evidence_source_class: schemas/support/probe_catalog_entry.schema.json#/$defs/evidence_source_class
  signal_class: schemas/support/probe_catalog_entry.schema.json#/$defs/signal_class
  diagnostic_data_class: schemas/support/probe_catalog_entry.schema.json#/$defs/diagnostic_data_class
  support_redaction_class: schemas/support/probe_catalog_entry.schema.json#/$defs/support_redaction_class
  support_pack_inclusion_class: schemas/support/probe_catalog_entry.schema.json#/$defs/support_pack_inclusion_class
  repair_availability_class: schemas/project_doctor/probe.schema.json#/$defs/repair_availability_class

output_routing:
  machine_readable_output_ref: project_doctor.output.alpha.headless_json
  human_readable_output_ref: project_doctor.output.alpha.summary_rows
  shared_finding_vocabulary_ref: "#/finding_vocabulary"
  default_redaction_class: metadata_safe_default
  default_support_pack_inclusion_class: included_by_reference
  route_classes:
    - doctor_headless_json
    - doctor_human_summary
    - support_bundle_manifest_ref
    - runbook_handoff_ref
    - escalation_packet_ref

finding_vocabulary:
  - finding_code: doctor.finding.toolchain_missing_required_component
    severity_class: blocking
    confidence_class: observed_with_gap
    display_severity_class: blocked
    repair_availability_class: preview_only
    unsupported_state_class: none
    summary_key: doctor.finding.toolchain_missing_required_component.summary
    next_action_key: doctor.finding.toolchain_missing_required_component.next_action
  - finding_code: doctor.finding.toolchain_version_out_of_range
    severity_class: degraded
    confidence_class: observed_with_gap
    display_severity_class: degraded
    repair_availability_class: preview_only
    unsupported_state_class: none
    summary_key: doctor.finding.toolchain_version_out_of_range.summary
    next_action_key: doctor.finding.toolchain_version_out_of_range.next_action
  - finding_code: doctor.finding.trust_policy_blocked
    severity_class: blocking
    confidence_class: observed_authoritative
    display_severity_class: blocked
    repair_availability_class: reviewed_repair_available
    unsupported_state_class: none
    summary_key: doctor.finding.trust_policy_blocked.summary
    next_action_key: doctor.finding.trust_policy_blocked.next_action
  - finding_code: doctor.finding.watcher_observe_only_baseline
    severity_class: degraded
    confidence_class: observed_authoritative
    display_severity_class: degraded
    repair_availability_class: preview_only
    unsupported_state_class: none
    summary_key: doctor.finding.watcher_observe_only_baseline.summary
    next_action_key: doctor.finding.watcher_observe_only_baseline.next_action
  - finding_code: doctor.finding.proxy_or_ca_failure
    severity_class: degraded
    confidence_class: inferred_from_evidence
    display_severity_class: warning
    repair_availability_class: preview_only
    unsupported_state_class: none
    summary_key: doctor.finding.proxy_or_ca_failure.summary
    next_action_key: doctor.finding.proxy_or_ca_failure.next_action
  - finding_code: doctor.finding.extension_host_crash_loop_quarantined
    severity_class: blocking
    confidence_class: observed_authoritative
    display_severity_class: blocked
    repair_availability_class: preview_only
    unsupported_state_class: none
    summary_key: doctor.finding.extension_host_crash_loop_quarantined.summary
    next_action_key: doctor.finding.extension_host_crash_loop_quarantined.next_action
  - finding_code: doctor.finding.cache_schema_version_drift
    severity_class: degraded
    confidence_class: observed_with_gap
    display_severity_class: degraded
    repair_availability_class: preview_only
    unsupported_state_class: none
    summary_key: doctor.finding.cache_schema_version_drift.summary
    next_action_key: doctor.finding.cache_schema_version_drift.next_action
  - finding_code: doctor.finding.local_history_integrity_unsupported
    severity_class: unsupported
    confidence_class: unknown_requires_probe
    display_severity_class: warning
    repair_availability_class: unsupported
    unsupported_state_class: unsupported_probe_target
    summary_key: doctor.finding.local_history_integrity_unsupported.summary
    next_action_key: doctor.finding.local_history_integrity_unsupported.next_action
  - finding_code: doctor.finding.wrong_target_detected_requires_reapproval
    severity_class: blocking
    confidence_class: inferred_from_evidence
    display_severity_class: blocked
    repair_availability_class: reviewed_repair_available
    unsupported_state_class: none
    summary_key: doctor.finding.wrong_target_detected_requires_reapproval.summary
    next_action_key: doctor.finding.wrong_target_detected_requires_reapproval.next_action
  - finding_code: doctor.finding.remote_route_unknown_offline
    severity_class: unsupported
    confidence_class: unknown_requires_probe
    display_severity_class: warning
    repair_availability_class: handoff_only
    unsupported_state_class: unsupported_offline_state
    summary_key: doctor.finding.remote_route_unknown_offline.summary
    next_action_key: doctor.finding.remote_route_unknown_offline.next_action
  - finding_code: doctor.finding.probe_evidence_insufficient_for_diagnosis
    severity_class: unsupported
    confidence_class: unknown_requires_probe
    display_severity_class: warning
    repair_availability_class: handoff_only
    unsupported_state_class: none
    summary_key: doctor.finding.probe_evidence_insufficient_for_diagnosis.summary
    next_action_key: doctor.finding.probe_evidence_insufficient_for_diagnosis.next_action

probes:
  - project_doctor_probe_schema_version: 1
    record_kind: project_doctor_probe_record
    probe_id: doctor.probe.execution_context.toolchain_resolution
    probe_code: doctor.probe.execution_context.toolchain_resolution
    probe_family_class: execution_context_toolchains
    probe_version: probe.execution_context.toolchain_resolution.v1
    lifecycle_status: active
    target_scope:
      scope_class: target
      scope_ref: target:active.execution_context
      support_context_classes: &all_contexts
        - desktop
        - cli_headless
        - remote_managed
        - offline_local
    probe_class: read_only_inspection
    diagnosis_posture_default: proving_diagnosis
    invocation_policy: automatic
    read_only_default: true
    mutability_class: non_mutating_read_only
    doctor_admission_class: admitted_safe_probe
    allowed_side_effects: &metadata_reads
      - read_existing_metadata
      - hash_existing_artifact
    forbidden_side_effects: *mutating_side_effects
    evidence_routes:
      - evidence_key: evidence.execution_context.required_toolchain
        source_class: existing_manifest
        signal_class: manifest
        data_class: environment_adjacent
        redaction_class: metadata_safe_default
        support_pack_inclusion_class: included_by_reference
        replayability_class: replayable_from_refs
        output_route_classes:
          - doctor_headless_json
          - doctor_human_summary
          - support_bundle_manifest_ref
        evidence_ref_contract: schemas/runtime/execution_context.schema.json
      - evidence_key: evidence.execution_context.resolution_policy
        source_class: policy_decision
        signal_class: policy_decision
        data_class: metadata_only
        redaction_class: metadata_safe_default
        support_pack_inclusion_class: included_by_default_metadata
        replayability_class: replayable_from_refs
        output_route_classes:
          - doctor_headless_json
          - support_bundle_manifest_ref
        evidence_ref_contract: schemas/governance/policy_decision_explain.schema.json
    output_contract:
      finding_codes:
        - doctor.finding.toolchain_missing_required_component
        - doctor.finding.toolchain_version_out_of_range
      unknown_finding_code: doctor.finding.probe_evidence_insufficient_for_diagnosis
      unsupported_finding_code: doctor.finding.probe_evidence_insufficient_for_diagnosis
      headless_exit_code_class: exit_findings_actionable
      machine_readable_fields: &machine_fields
        - finding_id
        - finding_code
        - rule_id
        - probe_id
        - probe_class
        - diagnosis_posture
        - confidence_class
        - confidence_score
        - affected_scope_class
        - affected_scope_ref
        - root_cause_class
        - evidence_refs
        - remaining_unknowns
        - unsupported_state_class
        - suggested_next_action_id
        - repair_preview_ref
        - support_bundle_ref
        - escalation_packet_ref
        - exit_code_class
    repair_handoff:
      repair_availability_class: preview_only
      repair_candidate_ids:
        - repair.execution_context.reresolve.preview
      repair_preview_ref: repair.preview.execution_context.reresolve
      repair_transaction_schema_ref: schemas/support/repair_transaction.schema.json
      runbook_ref: docs/support/runbook_execution_contract.md#execution-context
      support_bundle_ref: support.bundle.project_doctor.execution_context
      escalation_packet_ref: escalation.packet.project_doctor.execution_context
    human_output:
      title_key: doctor.probe.execution_context.toolchain_resolution.title
      summary_key: doctor.probe.execution_context.toolchain_resolution.summary
      next_action_key: doctor.probe.execution_context.toolchain_resolution.next_action
      unsupported_state_key: doctor.probe.execution_context.toolchain_resolution.unsupported
    source_contract_refs:
      - docs/support/project_doctor_probe_contract.md#probe-catalog-entry
      - docs/support/probe_family_matrix.md#execution_context_toolchains

