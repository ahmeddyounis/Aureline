    symptom_surface_class: policy_denial_surface
    symptom_summary: >
      Managed policy, trust state, or approval expiry denies a user
      action; the surface returns a typed policy-denial reason.
    primary_module_class: project_doctor
    default_first_action_class: open_project_doctor
    secondary_module_classes:
      - field_diagnostics
      - issue_or_escalation_handoff
      - advisory_or_incident_history
    no_upload_first_invariant:
      local_first_path_named: true
      upload_required_for_first_action: false
      summary: >
        First action opens Project Doctor read-only against the
        policy-denial reason; field diagnostics and handoff drafting
        are local-first.
    deployment_context_parity_rows:
      - deployment_context_class: local_only
        availability_class: available
        narrowed_when_summary: Local-only deployments still surface trust-state findings; managed-policy classes are absent by definition.
        alternate_path_summary: not_applicable; local-only renders the same Doctor route.
      - deployment_context_class: managed
        availability_class: available
        narrowed_when_summary: Managed-policy denials render the policy decision id alongside the Doctor finding.
        alternate_path_summary: Managed-admin handoff is named when the user needs a policy review.
      - deployment_context_class: self_hosted
        availability_class: available
        narrowed_when_summary: Self-hosted control plane policies render their policy decision verbatim.
        alternate_path_summary: Self-hosted admin handoff remains available.
      - deployment_context_class: mirrored
        availability_class: available
        narrowed_when_summary: Policy fetches from a mirror surface a typed mirror state; cached policy is read-only.
        alternate_path_summary: Cached policy rows remain readable; mirror state is named.
      - deployment_context_class: offline
        availability_class: available
        narrowed_when_summary: Cached policy rows remain enforced; updates are deferred.
        alternate_path_summary: Local-only review keeps the finding and any handoff draft on the device.
