    route_id: support_center_route:crash_loop_surface.crash_triage
    symptom_surface_class: crash_loop_surface
    symptom_summary: >
      Repeated crashes during startup or session run trigger the
      crash-loop detection threshold.
    primary_module_class: crash_triage
    default_first_action_class: open_crash_triage_card
    secondary_module_classes:
      - safe_mode
      - bisect_or_quarantine
      - support_bundle
      - issue_or_escalation_handoff
    no_upload_first_invariant:
      local_first_path_named: true
      upload_required_for_first_action: false
      summary: >
        First action opens crash triage read-only; safe mode and
        bisect run locally; bundle preview and handoff are local-
        first.
    deployment_context_parity_rows:
      - deployment_context_class: local_only
        availability_class: available
        narrowed_when_summary: not_narrowed; full crash triage and recovery rungs available.
        alternate_path_summary: not_applicable; local-only is the reference surface for crash recovery.
      - deployment_context_class: managed
        availability_class: limited_available
        narrowed_when_summary: Quarantine apply MAY require managed-admin sign-off; safe mode and triage remain available.
        alternate_path_summary: Local quarantine state is preserved for managed-admin sign-off.
      - deployment_context_class: self_hosted
        availability_class: available
        narrowed_when_summary: Self-hosted symbol stores supply symbolication; missing symbols are flagged.
        alternate_path_summary: Stack rendering remains available without symbols.
      - deployment_context_class: mirrored
        availability_class: available
        narrowed_when_summary: Symbol mirror reachability is required for full symbolication; mirror state is typed.
        alternate_path_summary: Cached symbols supply partial symbolication.
      - deployment_context_class: offline
        availability_class: available_local_only
        narrowed_when_summary: Symbol fetches that require network are unavailable offline.
        alternate_path_summary: Locally cached symbols supply best-effort symbolication; the card flags the fidelity gap.
    evidence_preserved_for_escalation:
      scenario_family_ref_optional: extension_or_host_regression
      preserved_evidence_id_classes:
        - crash_envelope_id
        - exact_build_identity_id
        - extension_inventory_id
      summary: >
        Crash envelope, exact-build identity, and extension inventory
        ids travel with the route so the user keeps full evidence if
        the crash escalates.
