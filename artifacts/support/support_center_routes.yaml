# Information-architecture index.
#
# Projects onto support_center_information_architecture_record. Pins
# the closed module, symptom-surface, and deployment-context sets and
# names every card and route the IA expects.
# --------------------------------------------------------------------------

information_architecture_index:
  record_kind: support_center_information_architecture_record
  schema_version: 1
  index_id: support_center_ia:v1
  title: Support Center information architecture index
  summary: >
    Pins the nine top-level Support Center modules, the six symptom-
    surface classes, the five deployment-context classes, the seven
    capability cards in this file, and the six required symptom-to-
    module routes.
  module_classes_required:
    - project_doctor
    - safe_mode
    - bisect_or_quarantine
    - support_bundle
    - crash_triage
    - guided_repair
    - issue_or_escalation_handoff
    - advisory_or_incident_history
    - field_diagnostics
  symptom_surface_classes_required:
    - error_surface
    - blocked_action_surface
    - crash_loop_surface
    - update_failure_surface
    - policy_denial_surface
    - transport_failure_surface
  deployment_context_classes_required:
    - local_only
    - managed
    - self_hosted
    - mirrored
    - offline
  capability_card_refs:
    - support_center_card:project_doctor
    - support_center_card:safe_mode
    - support_center_card:bisect_or_quarantine
    - support_center_card:support_bundle
    - support_center_card:crash_triage
    - support_center_card:guided_repair
    - support_center_card:issue_or_escalation_handoff
    - support_center_card:advisory_or_incident_history
    - support_center_card:field_diagnostics
  route_refs:
    - support_center_route:error_surface.project_doctor
    - support_center_route:blocked_action_surface.project_doctor
    - support_center_route:crash_loop_surface.crash_triage
    - support_center_route:update_failure_surface.advisory_or_incident_history
    - support_center_route:policy_denial_surface.project_doctor
    - support_center_route:transport_failure_surface.field_diagnostics
  no_upload_first_invariant_summary: >
    No Support Center route resolves to an upload-first first action;
    every route names a local-first path and preserves stable
    evidence-id classes for later escalation.
  governance_bindings:
    support_center_concept_ref: docs/support/support_center_concept.md
    support_intake_contract_ref: docs/support/support_intake_and_escalation_contract.md
    scenario_picker_schema_ref: schemas/support/scenario_picker.schema.json
