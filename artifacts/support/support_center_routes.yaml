    deployment_context_parity_rows:
      - deployment_context_class: local_only
        availability_class: available
        narrowed_when_summary: not_narrowed; full Doctor route available.
        alternate_path_summary: not_applicable; local-only is the reference surface.
      - deployment_context_class: managed
        availability_class: available
        narrowed_when_summary: not_narrowed; managed admins do not gate diagnosis.
