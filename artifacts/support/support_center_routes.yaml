    symptom_surface_class: transport_failure_surface
    symptom_summary: >
      Network, proxy, mirror, CA, or remote-helper transport fails;
      the user sees a typed transport-error reason class.
    primary_module_class: field_diagnostics
    default_first_action_class: open_field_diagnostics
    secondary_module_classes:
      - project_doctor
      - guided_repair
      - issue_or_escalation_handoff
    no_upload_first_invariant:
      local_first_path_named: true
      upload_required_for_first_action: false
      summary: >
        First action runs read-only field diagnostics against the
        transport class; trace capture is opt-in. The route refuses
        to recommend an upload-first first action even when the
        symptom is network-bound.
    deployment_context_parity_rows:
      - deployment_context_class: local_only
        availability_class: available
        narrowed_when_summary: Local-only deployments rarely hit transport failures except for opt-in update fetches.
        alternate_path_summary: Local diagnostic capture remains available.
      - deployment_context_class: managed
        availability_class: available
        narrowed_when_summary: Managed proxies and CAs render their reachability state verbatim.
        alternate_path_summary: Managed-admin handoff is available when the failure is policy-bound.
      - deployment_context_class: self_hosted
        availability_class: available
        narrowed_when_summary: Self-hosted runtimes and helpers render their reachability state verbatim.
