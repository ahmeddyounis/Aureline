# Routes (one or more per symptom_surface_class).
#
# These rows project onto support_center_route_record. Every route
# resolves to the narrowest safe diagnostic or repair surface before
# any export-only or handoff-only module, names a local-first first
# action, and preserves a stable evidence-id class for later
# escalation.
