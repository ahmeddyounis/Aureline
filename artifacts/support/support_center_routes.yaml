# Support Center symptom-to-module route table.
#
# Companion to docs/support/support_center_information_architecture.md and
# schemas/support/support_center_capability_card.schema.json. Every
# entry in this file projects onto one
# support_center_route_record (see schema $defs.support_center_route_record);
# every capability_card row projects onto one
# support_center_capability_card_record; and the index row at the
# bottom projects onto one support_center_information_architecture_record.
#
# Rules:
#   - Every route MUST resolve to the narrowest safe diagnostic or
#     repair surface (Project Doctor, safe mode, bisect/quarantine,
#     crash triage, or field diagnostics) before any export-only or
#     handoff-only module.
#   - Every route MUST set no_upload_first_invariant.local_first_path_named
#     to true and no_upload_first_invariant.upload_required_for_first_action
#     to false. A route whose only first action would otherwise require
#     an upload MUST resolve to refuse_route_no_upload_first and defer
#     to a local-only diagnosis or evidence card.
#   - Every route and every card MUST carry exactly one
#     deployment_context_parity_row per deployment_context_class
#     (local_only, managed, self_hosted, mirrored, offline) so a
#     desktop-only or managed-only happy path cannot be implied.
#   - Every route MUST preserve at least one stable evidence-id class
#     so a later escalation packet can reconstruct the case without
#     re-asking the user.
#   - Adding a symptom_surface_class, support_center_module_class, or
#     deployment_context_class is breaking and requires a new decision
#     row in artifacts/governance/decision_index.yaml. Adding a card
#     row, route row, evidence_source_class, local_action_class,
#     export_action_class, or open_related_packet_action_class is
#     additive-minor.

schema_version: 1
artifact_id: aureline.support.support_center_routes.v1
title: Support Center symptom-to-module route table

contract_source: docs/support/support_center_information_architecture.md
schema_source: schemas/support/support_center_capability_card.schema.json

related_docs:
  - docs/support/support_center_concept.md
  - docs/support/support_intake_and_escalation_contract.md
  - docs/support/project_doctor_packet.md
  - docs/support/recovery_ladder_packet.md
  - docs/support/repair_transaction_contract.md
  - docs/support/support_bundle_contract.md
  - docs/support/support_bundle_preview_contract.md
  - docs/support/object_handoff_packet.md
  - docs/support/runbook_execution_contract.md
  - docs/support/diagnostic_artifact_matrix.md

companion_refs:
  scenario_picker_schema_ref: schemas/support/scenario_picker.schema.json
  scenario_matrix_ref: fixtures/support/scenario_matrix.yaml
  escalation_packet_schema_ref: schemas/support/escalation_packet.schema.json
  doctor_finding_schema_ref: schemas/support/doctor_finding.schema.json
  support_bundle_schema_ref: schemas/support/support_bundle.schema.json
  recovery_action_schema_ref: schemas/support/recovery_action.schema.json
  repair_transaction_schema_ref: schemas/support/repair_transaction.schema.json
  object_handoff_packet_schema_ref: schemas/support/object_handoff_packet.schema.json
  runbook_packet_schema_ref: schemas/support/runbook_packet.schema.json

# Closed vocabularies re-exported here for the route table reader.
# The schema is the source of truth for tooling.

support_center_module_vocabulary:
  - project_doctor
  - safe_mode
  - bisect_or_quarantine
  - support_bundle
  - crash_triage
  - guided_repair
  - issue_or_escalation_handoff
  - advisory_or_incident_history
  - field_diagnostics

symptom_surface_vocabulary:
  - error_surface
  - blocked_action_surface
  - crash_loop_surface
  - update_failure_surface
  - policy_denial_surface
  - transport_failure_surface

deployment_context_vocabulary:
  - local_only
  - managed
  - self_hosted
  - mirrored
  - offline

# --------------------------------------------------------------------------
# Capability cards (one per support_center_module_class).
#
# These rows project onto support_center_capability_card_record. The
# IA narrative companion (docs/support/support_center_information_architecture.md)
# walks the same fields in long form.
# --------------------------------------------------------------------------

capability_cards:
  - record_kind: support_center_capability_card_record
    schema_version: 1
    capability_card_id: support_center_card:project_doctor
    support_center_module_class: project_doctor
    title: Project Doctor
    purpose_summary: >
      Run versioned probes against the active workspace, profile, and
      target so the user sees stable finding codes, severity,
      confidence, and repair candidates before any mutation.
    card_posture_class: read_only_diagnosis
    confidence_class: high
    primary_target_record_kind: doctor_finding_record
    primary_target_schema_ref: schemas/support/doctor_finding.schema.json
    aligned_intake_capability_class: doctor
    evidence_sources:
      - evidence_source_class: doctor_probe_output
        primary_target_schema_ref: schemas/support/doctor_finding.schema.json
        summary: >
          Probe output is the canonical diagnosis layer; other cards
          quote it rather than mint parallel finding names.
      - evidence_source_class: exact_build_identity_manifest
        primary_target_schema_ref: schemas/support/support_pack_item.schema.json
        summary: >
          Build identity is rendered alongside every finding so a
          stale docs pack or wrong channel cannot be mistaken for a
          product defect.
    local_actions:
      - open_inspector_only
      - render_evidence_local_only
    export_actions:
      - no_export_action
    headless_availability_class: available
    headless_availability_summary: >
      CLI/headless emits the same finding codes, severity, and
      confidence rows the desktop card renders.
    policy_constraints:
      - policy_constraint_class: no_constraint
        summary: >
          Diagnosis runs read-only; no managed-admin or trust-state
          gate applies before the finding is rendered.
    open_related_packet_actions:
      - open_related_packet_action_class: open_doctor_finding_record
        target_schema_ref: schemas/support/doctor_finding.schema.json
        summary: Hands the user to the canonical Doctor finding record.
      - open_related_packet_action_class: open_recovery_action_record
        target_schema_ref: schemas/support/recovery_action.schema.json
        summary: Names the recovery rung the finding suggests next.
      - open_related_packet_action_class: open_repair_preview_record
        target_schema_ref: schemas/support/repair_preview.schema.json
        summary: Hands a repair candidate to the guided-repair card.
    deployment_context_parity_rows:
      - deployment_context_class: local_only
        availability_class: available
        narrowed_when_summary: not_narrowed; full probe family available on local-only installs.
        alternate_path_summary: not_applicable; local-only is the reference surface for diagnosis.
      - deployment_context_class: managed
        availability_class: available
        narrowed_when_summary: not_narrowed; managed admins do not gate read-only diagnosis.
        alternate_path_summary: not_applicable; full Doctor card available under managed control plane.
      - deployment_context_class: self_hosted
        availability_class: available
        narrowed_when_summary: not_narrowed; self-hosted control plane does not gate read-only diagnosis.
        alternate_path_summary: not_applicable; full Doctor card available with self-hosted runtime.
      - deployment_context_class: mirrored
        availability_class: available
        narrowed_when_summary: Probe families that fetch a docs or symbol mirror surface a mirror_unreachable finding instead of failing silently.
        alternate_path_summary: Mirror cache supplies cached probe metadata; missing entries are flagged as evidence_missing rather than implied present.
      - deployment_context_class: offline
        availability_class: available
        narrowed_when_summary: Probes that require network resolution surface a typed offline finding instead of stalling.
        alternate_path_summary: Local probes (toolchain, watcher, cache, extension host) remain available offline.
    governance_bindings:
      support_center_concept_ref: docs/support/support_center_concept.md
      support_intake_contract_ref: docs/support/support_intake_and_escalation_contract.md
      scenario_picker_schema_ref: schemas/support/scenario_picker.schema.json
      doctor_finding_schema_ref: schemas/support/doctor_finding.schema.json
      support_bundle_schema_ref: schemas/support/support_bundle.schema.json
      object_handoff_packet_schema_ref: schemas/support/object_handoff_packet.schema.json
      repair_transaction_schema_ref: schemas/support/repair_transaction.schema.json
      recovery_action_schema_ref: schemas/support/recovery_action.schema.json
      scenario_matrix_ref: fixtures/support/scenario_matrix.yaml
      support_center_routes_ref: artifacts/support/support_center_routes.yaml
    emitted_at: 2026-05-04T00:00:00Z

  - record_kind: support_center_capability_card_record
    schema_version: 1
    capability_card_id: support_center_card:safe_mode
    support_center_module_class: safe_mode
    title: Safe mode
    purpose_summary: >
      Enter the published safe-mode runtime profile so the user can
      reopen the workspace with extensions, helpers, and non-essential
      services narrowed.
    card_posture_class: mutating_local_disposable_only
    confidence_class: high
    primary_target_record_kind: recovery_action_record
    primary_target_schema_ref: schemas/support/recovery_action.schema.json
    aligned_intake_capability_class: safe_mode
    evidence_sources:
      - evidence_source_class: recovery_action_record
        primary_target_schema_ref: schemas/support/recovery_action.schema.json
        summary: Safe mode is one rung in the recovery ladder; the card opens the rung's record verbatim.
      - evidence_source_class: doctor_probe_output
        primary_target_schema_ref: schemas/support/doctor_finding.schema.json
        summary: Doctor probe output explains why entering safe mode is the suggested rung for the active finding.
    local_actions:
      - narrow_runtime_locally
      - open_inspector_only
    export_actions:
      - no_export_action
    headless_availability_class: available
    headless_availability_summary: >
      CLI/headless renders the same rung record and entry/exit reason
      tokens; entering safe mode is a typed local action, not a hidden
      flag.
    policy_constraints:
      - policy_constraint_class: no_constraint
        summary: Safe mode narrows runtime locally; it does not touch managed policy or trust state.
    open_related_packet_actions:
      - open_related_packet_action_class: open_recovery_action_record
        target_schema_ref: schemas/support/recovery_action.schema.json
        summary: Names the safe-mode recovery rung the user is entering or already inside.
      - open_related_packet_action_class: open_doctor_finding_record
        target_schema_ref: schemas/support/doctor_finding.schema.json
        summary: Quotes the finding that suggested safe mode rather than free-text reasoning.
    deployment_context_parity_rows:
      - deployment_context_class: local_only
        availability_class: available
        narrowed_when_summary: not_narrowed; safe mode is a local runtime profile.
        alternate_path_summary: not_applicable; safe mode runs entirely local-only.
      - deployment_context_class: managed
        availability_class: available
        narrowed_when_summary: Managed admins MAY pin the safe-mode profile but never silently auto-exit it.
        alternate_path_summary: Managed-admin handoff is available if the admin disables safe-mode entry.
      - deployment_context_class: self_hosted
        availability_class: available
        narrowed_when_summary: Self-hosted runtimes MAY narrow remote helpers; safe mode disables them locally first.
        alternate_path_summary: Restricted reopen remains available when safe mode would still require a remote helper.
      - deployment_context_class: mirrored
        availability_class: available
        narrowed_when_summary: Safe mode does not depend on mirror reachability.
        alternate_path_summary: not_applicable; safe-mode entry is independent of mirror state.
      - deployment_context_class: offline
        availability_class: available
        narrowed_when_summary: not_narrowed; safe mode is the reference offline reopen path.
        alternate_path_summary: not_applicable; safe mode is fully available offline.
    governance_bindings:
      support_center_concept_ref: docs/support/support_center_concept.md
      support_intake_contract_ref: docs/support/support_intake_and_escalation_contract.md
      scenario_picker_schema_ref: schemas/support/scenario_picker.schema.json
      doctor_finding_schema_ref: schemas/support/doctor_finding.schema.json
      support_bundle_schema_ref: schemas/support/support_bundle.schema.json
      object_handoff_packet_schema_ref: schemas/support/object_handoff_packet.schema.json
      repair_transaction_schema_ref: schemas/support/repair_transaction.schema.json
      recovery_action_schema_ref: schemas/support/recovery_action.schema.json
      scenario_matrix_ref: fixtures/support/scenario_matrix.yaml
      support_center_routes_ref: artifacts/support/support_center_routes.yaml
    emitted_at: 2026-05-04T00:00:00Z

  - record_kind: support_center_capability_card_record
    schema_version: 1
    capability_card_id: support_center_card:bisect_or_quarantine
    support_center_module_class: bisect_or_quarantine
    title: Bisect or quarantine
    purpose_summary: >
      Narrow the failing surface by isolating one extension or runtime
      host at a time, or by quarantining a known-bad component until
      the user reviews a repair candidate.
    card_posture_class: mutating_local_disposable_only
    confidence_class: medium
    primary_target_record_kind: recovery_action_record
    primary_target_schema_ref: schemas/support/recovery_action.schema.json
    aligned_intake_capability_class: extension_bisect
    evidence_sources:
      - evidence_source_class: recovery_action_record
        primary_target_schema_ref: schemas/support/recovery_action.schema.json
        summary: Bisect and quarantine are recovery rungs; the card opens the rung's record verbatim.
      - evidence_source_class: doctor_probe_output
        primary_target_schema_ref: schemas/support/doctor_finding.schema.json
        summary: The extension-host probe family identifies which extension or host suggested the rung.
    local_actions:
      - narrow_runtime_locally
      - open_inspector_only
    export_actions:
      - no_export_action
    headless_availability_class: available
    headless_availability_summary: >
      CLI/headless exposes the same bisect step sequence and
      quarantine state; entering or advancing the rung is a typed
      action.
    policy_constraints:
      - policy_constraint_class: managed_admin_required_for_apply
        summary: >
          Managed deployments MAY require admin sign-off before a
          quarantined extension is uninstalled or rolled back; the
          card surfaces that gate before apply.
    open_related_packet_actions:
      - open_related_packet_action_class: open_recovery_action_record
        target_schema_ref: schemas/support/recovery_action.schema.json
        summary: Opens the bisect or quarantine rung record with the active step.
      - open_related_packet_action_class: open_doctor_finding_record
        target_schema_ref: schemas/support/doctor_finding.schema.json
        summary: Quotes the finding that suggested bisect or quarantine.
    deployment_context_parity_rows:
      - deployment_context_class: local_only
        availability_class: available
        narrowed_when_summary: not_narrowed; bisect and quarantine run locally on the user's machine.
        alternate_path_summary: not_applicable; local-only is the reference surface for bisect.
      - deployment_context_class: managed
        availability_class: limited_available
        narrowed_when_summary: Quarantine is available; rollback or reinstall may need managed-admin sign-off.
        alternate_path_summary: Managed-admin handoff is available when rollback is gated.
      - deployment_context_class: self_hosted
        availability_class: available
        narrowed_when_summary: Self-hosted control planes MAY pin extension allowlists; bisect respects the pin.
        alternate_path_summary: Local-only review remains available if the pin blocks an isolation step.
      - deployment_context_class: mirrored
        availability_class: available
        narrowed_when_summary: Reinstall pulls from the mirror; mirror unreachability surfaces a typed finding.
        alternate_path_summary: Quarantine alone (no reinstall) remains available offline-from-mirror.
      - deployment_context_class: offline
        availability_class: available_local_only
        narrowed_when_summary: Reinstall is unavailable while offline; bisect and quarantine remain available.
        alternate_path_summary: Quarantine state is preserved for a later online reinstall once connectivity returns.
    governance_bindings:
      support_center_concept_ref: docs/support/support_center_concept.md
      support_intake_contract_ref: docs/support/support_intake_and_escalation_contract.md
      scenario_picker_schema_ref: schemas/support/scenario_picker.schema.json
      doctor_finding_schema_ref: schemas/support/doctor_finding.schema.json
      support_bundle_schema_ref: schemas/support/support_bundle.schema.json
      object_handoff_packet_schema_ref: schemas/support/object_handoff_packet.schema.json
      repair_transaction_schema_ref: schemas/support/repair_transaction.schema.json
      recovery_action_schema_ref: schemas/support/recovery_action.schema.json
      scenario_matrix_ref: fixtures/support/scenario_matrix.yaml
      support_center_routes_ref: artifacts/support/support_center_routes.yaml
    emitted_at: 2026-05-04T00:00:00Z

  - record_kind: support_center_capability_card_record
    schema_version: 1
    capability_card_id: support_center_card:support_bundle
    support_center_module_class: support_bundle
    title: Support bundle
    purpose_summary: >
      Preview, redact, and export a local-first support bundle so
      every artifact, redaction, and exclusion is visible before the
      bundle leaves the device.
    card_posture_class: export_only_local_first
    confidence_class: high
    primary_target_record_kind: support_bundle_preview_item
    primary_target_schema_ref: schemas/support/support_bundle_preview_item.schema.json
    aligned_intake_capability_class: support_bundle
    evidence_sources:
      - evidence_source_class: support_bundle_preview_item
        primary_target_schema_ref: schemas/support/support_bundle_preview_item.schema.json
        summary: Preview rows show every included, excluded, and redacted artifact before export.
      - evidence_source_class: support_pack_item
        primary_target_schema_ref: schemas/support/support_pack_item.schema.json
        summary: Bundle composition reuses the pack-item registry rather than minting new artifact classes.
      - evidence_source_class: exact_build_identity_manifest
        primary_target_schema_ref: schemas/support/support_pack_item.schema.json
        summary: Exact-build identity is preserved in the bundle even after redaction.
    local_actions:
      - open_preview_with_review
      - save_packet_local_only
    export_actions:
      - export_support_bundle
    headless_availability_class: available
    headless_availability_summary: >
      CLI/headless renders the same preview rows and emits the bundle
      to a local file the user can attach later.
    policy_constraints:
      - policy_constraint_class: managed_admin_required_for_export
        summary: >
          Managed deployments MAY require admin sign-off before the
          bundle leaves the device; the preview shows the gate
          before any export action.
      - policy_constraint_class: no_silent_credential_access
        summary: >
          The bundle never reads or rotates credentials; redaction
          shows credential-class fields excluded by default.
    open_related_packet_actions:
      - open_related_packet_action_class: open_support_bundle_preview_item
        target_schema_ref: schemas/support/support_bundle_preview_item.schema.json
        summary: Opens the preview row for one artifact at a time.
      - open_related_packet_action_class: open_object_handoff_packet
        target_schema_ref: schemas/support/object_handoff_packet.schema.json
        summary: Composes the bundle into an object-issue handoff for escalation.
    deployment_context_parity_rows:
      - deployment_context_class: local_only
        availability_class: available
        narrowed_when_summary: not_narrowed; full preview, redaction, and local export available.
        alternate_path_summary: not_applicable; local-only is the reference surface for bundle export.
      - deployment_context_class: managed
        availability_class: limited_available
        narrowed_when_summary: Managed-admin sign-off MAY gate the export action; the preview itself remains available read-only.
        alternate_path_summary: Local-only review keeps the bundle on the device until admin sign-off.
      - deployment_context_class: self_hosted
        availability_class: available
        narrowed_when_summary: Self-hosted control planes MAY redirect the bundle to a self-hosted vendor case path.
        alternate_path_summary: Local-only review is preserved at primary equal prominence regardless of the self-hosted destination.
      - deployment_context_class: mirrored
        availability_class: available
        narrowed_when_summary: Bundle composition does not depend on mirror reachability.
        alternate_path_summary: not_applicable; bundle export is mirror-independent.
      - deployment_context_class: offline
        availability_class: available_local_only
        narrowed_when_summary: Vendor-case and user-upload paths are unavailable while offline.
        alternate_path_summary: Local-only review records the bundle for later handoff once the user is online.
    governance_bindings:
      support_center_concept_ref: docs/support/support_center_concept.md
      support_intake_contract_ref: docs/support/support_intake_and_escalation_contract.md
      scenario_picker_schema_ref: schemas/support/scenario_picker.schema.json
      doctor_finding_schema_ref: schemas/support/doctor_finding.schema.json
      support_bundle_schema_ref: schemas/support/support_bundle.schema.json
      object_handoff_packet_schema_ref: schemas/support/object_handoff_packet.schema.json
      repair_transaction_schema_ref: schemas/support/repair_transaction.schema.json
      recovery_action_schema_ref: schemas/support/recovery_action.schema.json
      scenario_matrix_ref: fixtures/support/scenario_matrix.yaml
      support_center_routes_ref: artifacts/support/support_center_routes.yaml
    emitted_at: 2026-05-04T00:00:00Z

  - record_kind: support_center_capability_card_record
    schema_version: 1
    capability_card_id: support_center_card:crash_triage
    support_center_module_class: crash_triage
    title: Crash triage
    purpose_summary: >
      Open the symbolicated crash envelope, exact-build identity, and
      symbol/source-map fidelity state so the user can tell a product
      crash from a stale-symbol artifact before any export or
      escalation.
    card_posture_class: read_only_diagnosis
    confidence_class: medium
    primary_target_record_kind: crash_envelope
    primary_target_schema_ref: schemas/support/support_pack_item.schema.json
    aligned_intake_capability_class: crash_triage
    evidence_sources:
      - evidence_source_class: crash_envelope
        primary_target_schema_ref: schemas/support/support_pack_item.schema.json
        summary: The symbolicated crash envelope is the canonical record for the crash.
      - evidence_source_class: exact_build_identity_manifest
        primary_target_schema_ref: schemas/support/support_pack_item.schema.json
        summary: Exact-build and symbol fidelity state are rendered alongside the crash so a stale symbol pack cannot be mistaken for a defect.
      - evidence_source_class: doctor_probe_output
        primary_target_schema_ref: schemas/support/doctor_finding.schema.json
        summary: Doctor probe output explains whether the crash matches a known finding family.
    local_actions:
      - open_inspector_only
      - render_evidence_local_only
    export_actions:
      - no_export_action
    headless_availability_class: available_read_only
    headless_availability_summary: >
      CLI/headless renders the symbolicated stack, exact-build, and
      symbol fidelity fields read-only.
    policy_constraints:
      - policy_constraint_class: no_silent_credential_access
        summary: >
          Crash triage never reads memory regions classified as
          credential-bearing; redaction shows the boundary.
    open_related_packet_actions:
      - open_related_packet_action_class: open_crash_envelope
        target_schema_ref: schemas/support/support_pack_item.schema.json
        summary: Opens the symbolicated crash envelope record.
      - open_related_packet_action_class: open_support_bundle_preview_item
        target_schema_ref: schemas/support/support_bundle_preview_item.schema.json
        summary: Composes the crash envelope into a bundle preview before any export.
      - open_related_packet_action_class: open_object_handoff_packet
        target_schema_ref: schemas/support/object_handoff_packet.schema.json
        summary: Composes the crash into an object-issue handoff packet for escalation.
    deployment_context_parity_rows:
      - deployment_context_class: local_only
        availability_class: available
        narrowed_when_summary: not_narrowed; full symbolication available on local-only installs.
        alternate_path_summary: not_applicable; local-only is the reference surface for crash triage.
      - deployment_context_class: managed
        availability_class: available
        narrowed_when_summary: not_narrowed; managed admins do not gate read-only crash triage.
        alternate_path_summary: not_applicable; full crash triage available under managed control plane.
      - deployment_context_class: self_hosted
        availability_class: available
        narrowed_when_summary: Self-hosted symbol stores MUST be reachable for full symbolication; otherwise the card surfaces a stale-symbol state.
        alternate_path_summary: Stack rendering remains available without symbols; the card flags the fidelity gap.
      - deployment_context_class: mirrored
        availability_class: available
        narrowed_when_summary: Symbol and source-map mirror reachability is required for full symbolication.
        alternate_path_summary: Cached symbols supply partial symbolication; missing entries are flagged as evidence_missing.
      - deployment_context_class: offline
        availability_class: available_local_only
        narrowed_when_summary: Symbol fetches that require network are unavailable offline.
        alternate_path_summary: Locally cached symbols supply best-effort symbolication; the card flags the fidelity gap.
    governance_bindings:
      support_center_concept_ref: docs/support/support_center_concept.md
      support_intake_contract_ref: docs/support/support_intake_and_escalation_contract.md
      scenario_picker_schema_ref: schemas/support/scenario_picker.schema.json
      doctor_finding_schema_ref: schemas/support/doctor_finding.schema.json
      support_bundle_schema_ref: schemas/support/support_bundle.schema.json
      object_handoff_packet_schema_ref: schemas/support/object_handoff_packet.schema.json
      repair_transaction_schema_ref: schemas/support/repair_transaction.schema.json
      recovery_action_schema_ref: schemas/support/recovery_action.schema.json
      scenario_matrix_ref: fixtures/support/scenario_matrix.yaml
      support_center_routes_ref: artifacts/support/support_center_routes.yaml
    emitted_at: 2026-05-04T00:00:00Z

  - record_kind: support_center_capability_card_record
    schema_version: 1
