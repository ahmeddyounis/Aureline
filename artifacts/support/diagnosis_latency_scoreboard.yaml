# Project Doctor diagnosis-latency, finding-accuracy, false-safe-repair,
# and escalation-packet-completeness scoreboard seed.
#
# Companion to docs/support/project_doctor_packet.md and the scenario
# matrix at fixtures/support/scenario_matrix.yaml. The scoreboard
# qualifies four row families:
#
#   1. diagnosis_latency                 — time-to-first-diagnosis for
#      each scenario across the probe surfaces Doctor emits to.
#   2. finding_accuracy                  — confusion-matrix shape per
#      probe family with false-positive and false-negative rates.
#   3. false_safe_repair_rate            — rate at which Doctor
#      suggested a repair class whose advertised rollback expectation
#      was not available on the observed system (safety_overclaim)
#      versus the under-claim rate (repair_undersold).
#   4. escalation_packet_completeness    — pass rate of the
#      completeness check defined by the packet doc on each seeded
#      escalation case.
#
# This file is a SEED. Threshold values are deliberately left as
# "to_be_set_by_benchmark_council" at this milestone; numeric budgets
# are ratified by the benchmark-council charter. Reviewers can still
# read the row shape and see HOW diagnosis latency, accuracy, repair
# honesty, and escalation-packet completeness will be qualified later
# instead of treating them as narrative-only supportability truth.
#
# Rules (frozen):
#   1. Every row cites exactly one scenario_row_id from
#      fixtures/support/scenario_matrix.yaml. Rows without a scenario
#      citation are non-conforming.
#   2. Every row cites exactly one measurement_surface_class drawn
#      from the closed vocabulary below. Cross-surface aggregation
#      happens in the evidence packet, not here.
#   3. Every row names a primary_dri_lane resolving to an id in
#      artifacts/governance/ownership_matrix.yaml
#      scorecard_lane_index.
#   4. threshold_state values are drawn from the closed set below;
#      free-form thresholds are non-conforming. Widening a threshold
#      is not done here; it opens a new decision row in
#      artifacts/governance/decision_index.yaml.
#   5. A false_safe_repair_rate row MAY NOT move sideways into a
#      latency or completeness threshold state.
#   6. Milestone slugs MUST NOT appear in any id, metric name,
#      threshold, or surface label.

schema_version: 1
scoreboard_id: support.project_doctor.diagnosis_latency_scoreboard.v1
status: seeded

scenario_matrix_source: fixtures/support/scenario_matrix.yaml
packet_source: docs/support/project_doctor_packet.md
escalation_cases_source: fixtures/support/escalation_packet_completeness_cases
support_bundle_schema_source: schemas/support/support_bundle.schema.json
object_handoff_schema_source: schemas/support/object_handoff_packet.schema.json
benchmark_council_charter: docs/governance/benchmark_council_charter.md

threshold_state_vocabulary:
  - to_be_set_by_benchmark_council
  - must_complete_under_diagnosis_latency_budget
  - must_not_exceed_false_positive_budget
  - must_not_claim_exact_rollback_without_evidence
  - must_export_complete_escalation_packet

measurement_surface_vocabulary:
  - doctor_probe_run_local
  - doctor_probe_run_headless
  - doctor_probe_run_inspector
  - doctor_probe_run_managed

metric_family_vocabulary:
  - diagnosis_latency
  - finding_accuracy
  - false_safe_repair_rate
  - escalation_packet_completeness

qualifying_event_vocabulary:
  - probe_run_started
  - probe_first_finding_emitted
  - probe_all_findings_emitted
  - finding_matched_seeded_ground_truth
  - finding_produced_repair_candidate
  - repair_candidate_preview_opened
  - repair_rollback_evidence_confirmed
  - escalation_packet_exported_complete
  - escalation_packet_refused_export

disqualifying_event_vocabulary:
  - probe_timeout_before_first_finding
  - finding_disagreed_with_seeded_ground_truth
  - repair_rollback_evidence_missing
  - repair_applied_without_preview
  - escalation_packet_missing_required_field
  - escalation_packet_widened_redaction_without_consent

# -----------------------------------------------------------------------------
# Family 1: diagnosis latency.
# Measures time from probe_run_started to probe_first_finding_emitted.
# -----------------------------------------------------------------------------
diagnosis_latency:
  rows:

    - row_id: scoreboard_row:diagnosis_latency.missing_toolchain
      metric_family: diagnosis_latency
      scenario_row_id: scenario_row:missing_toolchain
      measurement_surface_class: doctor_probe_run_local
      qualifying_events:
        - probe_run_started
        - probe_first_finding_emitted
      disqualifying_events:
        - probe_timeout_before_first_finding
      threshold_state: to_be_set_by_benchmark_council
      primary_dri_lane: support_export
      co_review_lanes:
        - product_scope_review
      notes: >
        Time-to-first-diagnosis for a missing-toolchain probe on a
        local workspace. Threshold reserved to the benchmark council.

