# Stale-example audit rows.
#
# Worked seed of open and closed audit rows for stale examples
# detected by the rubric in artifacts/docs/stale_example_rules.yaml
# and projected by the parity packet in
# artifacts/docs/embedded_docs_help_parity_packet.md.
#
# Each row binds a single stale-example incident to:
#   - the artifact_kind and detector_id from the rubric,
#   - the affected surfaces (pane, About, onboarding, support
#     export) so the parity audit can confirm every consuming
#     surface narrowed to the same disclosure,
#   - the action_class the rubric declared (one of
#     label_stale_with_reason, label_needs_review,
#     quarantine_example, suppress_from_surface,
#     block_pack_publishable, require_late_proof_exception_packet),
#   - the remediation owner role and the release impact class so
#     reviewers can route the row to the right release-readiness
#     lane.
#
# Rules:
#   - Every row MUST cite exactly one detector_id from
#     artifacts/docs/stale_example_rules.yaml#detectors.
#   - Every row MUST resolve to one action_class re-exported from
#     artifacts/docs/stale_example_rules.yaml#action_classes; tooling
#     reads this list and MUST NOT emit an action outside it.
#   - Adding a row, remediation_owner_role, release_impact_class, or
#     row_state is additive-minor and bumps schema_version.
#     Repurposing an existing value is breaking and requires a new
#     decision row.
#   - Planning identifiers (milestone names, task IDs) MUST NOT
#     appear in user-facing strings produced from this artifact.
#   - Closed rows retain their closure_audit_event_ref so reviewers
#     can replay the closure decision; deleting a closed row is
#     forbidden.

schema_version: 1
artifact_id: aureline.docs.stale_example_audit_rows
status: seeded

contract_doc: docs/docs/docs_help_pane_contract.md
parity_packet: artifacts/docs/embedded_docs_help_parity_packet.md
detector_rubric: artifacts/docs/stale_example_rules.yaml
docs_pack_manifest_contract: docs/docs/docs_pack_manifest_contract.md
docs_pack_manifest_schema: schemas/docs/docs_pack_manifest.schema.json
help_pane_state_schema: schemas/docs/help_pane_state.schema.json
public_drift_item_schema: schemas/public_truth/public_drift_item.schema.json
late_proof_exception_schema: schemas/docs/late_proof_exception_packet.schema.json

# ---------------------------------------------------------------------------
# Closed remediation-owner-role vocabulary.
#
# Every row MUST declare exactly one remediation_owner_role. Roles are
# re-exported from the public-truth audit ownership taxonomy so the
# parity audit and the release shiproom dashboard read one vocabulary.
# ---------------------------------------------------------------------------
remediation_owner_roles:
  - id: docs_public_truth_owner
    description: >
      Owner of the docs / help / About / service-health public-truth
      lane. Closes pane / About / support-export wording rows.
  - id: docs_pack_publisher
    description: >
      Owner of the docs-pack manifest the example lives in. Closes
      docs-pack-scoped rows (project_docs, generated_reference,
      mirrored_official_docs, curated_knowledge_pack, support_runbook).
  - id: domain_owner
    description: >
      Named domain owner (commands, settings, providers, runtime).
      Closes detector rows whose remediation requires a behavior or
      route change in the owned domain.
  - id: release_owner
    description: >
      Owner of the release train. Closes rows whose remediation rides
      a same-change-set fix or a late-proof exception packet.
  - id: compatibility_owner
    description: >
      Owner of compatibility / support-window rows. Closes rows whose
      remediation narrows or widens compatibility language.
  - id: support_owner
    description: >
      Owner of the support runbook / support-export / support-summary
      lane. Closes rows that affect support-export preview wording.
  - id: i18n_owner
    description: >
      Owner of locale coverage and locale-pack publishing. Closes rows
      whose remediation is an updated locale pack.
  - id: provider_owner
    description: >
      Owner of a vendor-provider integration. Closes vendor_provider_docs
      rows whose remediation requires a provider-side change.

# ---------------------------------------------------------------------------
# Closed release-impact-class vocabulary.
#
# Every row MUST declare exactly one release_impact_class. The class
# tells the shiproom dashboard whether the row blocks the train,
# requires a late-proof exception, requires reviewer narrowing only,
# or is informational.
# ---------------------------------------------------------------------------
release_impact_classes:
  - id: blocks_release
    description: >
      Row gates the next release train; the pack moves to the
      docs_pack_manifest_record publishable_state = blocked posture
      with stale_examples_exceed_threshold or the more specific
      blocking reason the detector declared.
  - id: requires_late_proof_exception
    description: >
      Row may ride the train only under an approved
      late_proof_exception_packet that names the detector, the
      impacted claim row, the degraded wording, and the expiry.
  - id: review_narrows_only
    description: >
      Row does not block the train but reviewer narrowing is required
      before the next pack publish. The pane / About / onboarding /
      support-export surfaces MUST render the typed disclosure on the
      primary surface in the meantime.
  - id: in_release_repair
    description: >
      Same-change-set fix is staged and rides the same train; the
      row remains open until the fix lands and the detector clears.
  - id: informational_drift
    description: >
      Row reflects a known drift that does not narrow user-visible
      truth (for example a screenshot of a moved chip whose
      replacement chip already renders). Surfaces still carry the
      disclosure but the row does not gate a release.

# ---------------------------------------------------------------------------
# Closed row-state vocabulary.
#
# Tooling reads row_state to decide whether the row is open, paired
# with a fix, paired with a late-proof exception, or closed.
# ---------------------------------------------------------------------------
row_states:
  - id: open_unassigned
    description: >
      Row was filed and has not yet been routed to a remediation
      owner.
  - id: open_assigned
    description: >
      Row is routed to a remediation owner; remediation has not
      landed yet.
  - id: open_paired_with_fix
    description: >
      Same-change-set fix is staged and travels with the row.
  - id: open_paired_with_late_proof_exception
    description: >
      Late-proof exception packet is approved and references the row.
  - id: closed_resolved
    description: >
      Detector cleared after remediation landed.
  - id: closed_superseded
    description: >
      Row was superseded by a newer row covering the same incident.
  - id: closed_invalid
    description: >
      Row was filed in error; closure_audit_event_ref captures the
      reviewer decision and the rationale.

# ---------------------------------------------------------------------------
# Closed audited-surface vocabulary.
#
# Every row MUST list at least one affected surface. Surfaces are
# re-exported from the parity packet's lane vocabulary.
# ---------------------------------------------------------------------------
audited_surfaces:
  - id: embedded_docs_help
    description: In-product docs pane, embedded docs-browser body, AI-explanation pane, release-notice pane.
  - id: help_about
    description: Help / About pane and the About card it projects.
  - id: onboarding_guided
    description: Onboarding help overlay, first-run tour, guided-step inline help.
  - id: exported_support_help
    description: Support summary, support export packet, exported help shortcut catalog.
  - id: docs_pack_manifest
    description: Docs-pack manifest example_summary entry that pinned the example.
  - id: shiproom_dashboard
    description: Release shiproom dashboard projection of the row.

