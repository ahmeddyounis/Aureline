# Destination descriptor worked seeds and route-policy rows.
#
# Companion to docs/docs/help_about_service_health_routes.md and the
# boundary schema at schemas/docs/destination_descriptor.schema.json.
# Each descriptor fragment below conforms to the schema and exists so
# Help, About, service health, docs-browser, migration, onboarding,
# provenance, support-export, and community-handoff surfaces can reuse
# one route vocabulary instead of inventing surface-local badges.
#
# Rules:
#   - Every descriptor fragment conforms to
#     schemas/docs/destination_descriptor.schema.json.
#   - If this file and the contract doc disagree, the contract doc wins
#     and this file MUST be updated in the same change.
#   - The browser-handoff reasons used here are the only reasons this
#     descriptor family may expose because they remain screenshot-safe
#     and export-safe.

schema_version: 1
contract_doc: docs/docs/help_about_service_health_routes.md
boundary_schema: schemas/docs/destination_descriptor.schema.json
linked_packets:
  help_status_badge: schemas/docs/help_status_badge.schema.json
  docs_pack_manifest: schemas/docs/docs_pack_manifest.schema.json
  browser_handoff_packet: schemas/integration/browser_handoff_packet.schema.json
  embedded_surface_boundary: schemas/ux/embedded_surface_boundary.schema.json
  exact_build_identity: schemas/build/exact_build_identity.schema.json
  capability_lifecycle: schemas/governance/capability_lifecycle.schema.json
  migration_session: schemas/migration/migration_session.schema.json

axes:
  destination_trust_class:
    values:
      - official_public
      - official_authenticated
      - community
      - local_only
  preferred_route_class:
    values:
      - system_browser
      - embedded_surface
      - device_code
      - local_only
      - offline_cached_snapshot
  availability_state:
    values:
      - available
      - cached_snapshot
      - mirror_only
      - local_only_continuation
      - not_installed
      - version_mismatched
      - unreachable
      - policy_blocked
  external_open_policy:
    values:
      - not_permitted
      - optional_same_object
      - required_primary_route
      - required_fallback_when_in_product_unavailable
  disclosure_mode:
    values:
      - inline_local_or_cached_badge
      - embedded_boundary_card
      - pre_handoff_review
  disclosure_safety_class:
    values:
      - screenshot_safe_export_safe
      - local_only_diagnostic_only

required_product_fields:
  - destination_trust_class
  - owner_class
  - boundary_class
  - disclosure_mode
  - source_descriptor_kind
  - source_ref
  - source_revision_ref
  - display_source_version
  - running_build_identity_ref
  - exact_build_applicability
  - version_match_state
  - support_class
  - client_scopes
  - freshness_class
  - availability_state
  - locale_availability_class
  - available_locales
  - offline_behavior
  - preferred_route_class
  - fallback_route_classes
  - external_open_policy
  - external_destination_class
  - auth_expectation
  - browser_handoff_reason
  - issue_template_support
  - data_exit_boundary

route_rules:
  - route_class: local_only
    disclosure_mode: inline_local_or_cached_badge
    allowed_when: Core build facts, local diagnostics, or local export/save
      flows remain entirely inside the local product boundary.
    notes: Ownership and local-only boundary remain visible inline; no
      hidden browser escape is permitted when the policy says the route
      stays local.
  - route_class: offline_cached_snapshot
    disclosure_mode: inline_local_or_cached_badge
    allowed_when: Cached or mirrored docs/help/notices remain truthful as
      snapshots with visible freshness, mirror, or stale state.
    notes: Offline-cached rows may offer an optional browser path, but
      they may not imply the cached row is live truth.
  - route_class: embedded_surface
    disclosure_mode: embedded_boundary_card
    allowed_when: A host-owned embedded boundary card can quote owner,
      origin, and downgrade state without letting the embedded body
      impersonate native trust chrome.
    notes: Browser fallback becomes mandatory when the embedded surface
      narrows below its declared capability set or policy/certificate
      checks fail.
  - route_class: system_browser
    disclosure_mode: pre_handoff_review
    allowed_when: The destination truth lives outside the product and the
      route requires a typed browser-handoff packet with a safe reason
      code, destination class, and return anchor.
    notes: required_primary_route means the descriptor is browser-first.
  - route_class: device_code
    disclosure_mode: pre_handoff_review
    allowed_when: Authentication or portal access needs a device-code
      exchange rather than an embedded password flow or ambient browser
      mutation.
    notes: Device-code routes carry no export payload beyond the code and
      route metadata; they remain screenshot-safe and export-safe.

