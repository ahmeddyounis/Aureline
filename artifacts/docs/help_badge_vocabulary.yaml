# ---------------------------------------------------------------------------
# Parity-audit checklist. Tooling iterates this list to compare emitted
# help_status_badge_record instances across surfaces.
# ---------------------------------------------------------------------------
parity_audit_checklist:
  - id: same_running_build_identity
    description: >
      Help, About, the docs pane, the service-health view, and
      the support summary MUST all carry the same
      running_build_identity_ref for the running build.
    failure_event: parity_audit_field_missing
    failure_denial_reason: parity_field_missing
  - id: same_about_packet_publisher_payload
    description: >
      Help / About, the docs-browser footer, the CLI status
      row, and the support summary MUST all subscribe to a
      single about_packet_publisher record id; locally derived
      payloads are non-conforming.
    failure_event: about_packet_publisher_unresolved
    failure_denial_reason: about_packet_publisher_unresolved
  - id: same_service_contract_state_per_service
    description: >
      Per-feature panels MUST quote the
      service_health_aggregator's service_contract_state per
      service; minting per-feature service-state values is
      non-conforming.
    failure_event: service_contract_state_changed
    failure_denial_reason: service_contract_mismatch
  - id: same_browser_handoff_reason_subset
    description: >
      Browser handoffs originating from docs / Help / About /
      service-health surfaces MUST quote a reason from the
      browser_handoff_reason_subset; quoting a reason outside
      the subset is non-conforming.
    failure_event: browser_handoff_from_docs_help_service_health_issued
    failure_denial_reason: browser_handoff_reason_outside_subset
  - id: derived_explanation_must_cite
    description: >
      Every derived_explanation badge MUST carry a non-empty
      citation_anchor_refs array that names at least one
      authoritative anchor (docs_page_anchor,
      generated_reference_anchor, symbol_reference_anchor,
      runbook_step_anchor, or release_note_anchor).
    failure_event: derived_explanation_uncited_refused
    failure_denial_reason: derived_explanation_uncited
  - id: vendor_overrides_project_disclosure
    description: >
      Any badge whose source_class = vendor_provider_docs and
      whose vendor_overrides_project = true MUST render the
      typed disclosure on the primary surface (not in a
      tooltip).
    failure_event: vendor_docs_overrode_project
    failure_denial_reason: vendor_docs_overrode_project_without_disclosure
  - id: schema_version_alignment
    description: >
      All emitted badges MUST share help_status_badge_schema_version
      with the registry; surfaces lagging behind a schema bump
      are denied.
    failure_event: help_status_badge_schema_version_bumped
    failure_denial_reason: help_status_badge_schema_version_lagging
