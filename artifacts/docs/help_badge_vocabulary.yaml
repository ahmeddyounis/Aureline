        destination_class: docs_or_portal_web
        reason_code: external_docs_or_runbook
      browser_handoff_reason: external_docs_or_runbook
      external_status_feed: false
      vendor_overrides_project: true
      citation_anchor_refs:
        - docs:anchor:vendor-x:rev-42:topic-y
      lifecycle_label: null
      policy_context:
        policy_epoch: "pe:2026-04-19:01"
        trust_state: trusted
      redaction_class: metadata_safe_default
      minted_at: "2026-04-19T15:02:00Z"
      last_refreshed_at: "2026-04-19T14:50:00Z"

  # -------------------------------------------------------------------------
  # Help / About row, exact build identity, single publisher.
  # -------------------------------------------------------------------------
  - id: help_about_publisher_exact_build_match
    scenario: >
      The Help / About surface renders the about_packet_publisher
      payload (build identity, channel, install mode, provenance,
      open-vs-managed boundary). The badge always renders
      version_match_state = exact_build_match against the running
      build; the publisher would deny render and route to a
      repair hook if the build identity could not be resolved.
    adr_sections_exercised:
      - Source-of-truth ownership (frozen) -> about_packet_publisher
      - Per-surface projection requirements (frozen) -> Help / About row
      - Required parity fields (frozen)
    badge:
      record_kind: help_status_badge_record
      help_status_badge_schema_version: 1
      badge_id: docs:badge:04
      surface_class: help_about
      source_class: generated_reference
      version_match_state: exact_build_match
      running_build_identity_ref: build:running:01
      source_revision_ref: about:publisher:rev-01
      freshness_class: authoritative_live
      client_scopes:
        - desktop_product
        - cli
      service_contract_state: null
      degraded_state_cause: null
      repair_hook_ref: null
      browser_handoff_packet_ref: null
      browser_handoff_reason: null
      external_status_feed: false
      vendor_overrides_project: false
      citation_anchor_refs: []
      lifecycle_label: stable
      policy_context:
        policy_epoch: "pe:2026-04-19:01"
        trust_state: trusted
      redaction_class: metadata_safe_default
      minted_at: "2026-04-19T15:03:00Z"
      last_refreshed_at: "2026-04-19T15:03:00Z"
    notes: >
      The same about_packet_publisher payload is quoted by the
      docs-browser footer, the CLI status row, and the support
      summary. None of those surfaces re-derives any of the
      payload's fields locally; they subscribe to this badge id.

  # -------------------------------------------------------------------------
  # Service-health row, degraded with a typed cause and a repair hook.
  # -------------------------------------------------------------------------
  - id: service_health_degraded_with_repair_hook
    scenario: >
      The service-health view renders the row for the docs-pack
      delivery service, currently degraded because mirror
      continuity is broken. The badge carries the typed
      degraded_state_cause and a repair hook for the operator to
      re-verify the mirror manifest.
    adr_sections_exercised:
      - Service-contract-state vocabulary (frozen)
      - Degraded-state-cause vocabulary (frozen)
      - Per-surface projection requirements (frozen) -> Service-health row
    badge:
      record_kind: help_status_badge_record
      help_status_badge_schema_version: 1
      badge_id: docs:badge:05
      surface_class: service_health
      source_class: support_runbook
      version_match_state: exact_build_match
      running_build_identity_ref: build:running:01
      source_revision_ref: runbook:rev-12
      freshness_class: degraded_cached
      client_scopes:
