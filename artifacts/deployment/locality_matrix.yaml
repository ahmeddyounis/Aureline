# -----------------------------------------------------------------------------
# Consumer bindings.
#
# The matrix exists so these four consumer families resolve against
# one vocabulary rather than inventing parallel locality schemas.
# -----------------------------------------------------------------------------

consumer_bindings:
  support_bundles:
    primary_docs:
      - docs/support/support_bundle_contract.md
      - schemas/support/support_bundle.schema.json
    rule: >
      Support bundles reuse deployment_profile_class,
      region_scope_class, tenant_scope_class, and key_mode_class values
      from the shared vocabulary below and cite drill_id values plus
      local_core_continuity_packet_record packets instead of minting
      private locality fields.
  boundary_manifest:
    primary_docs:
      - docs/product/boundary_manifest_strawman.md
      - schemas/product/boundary_manifest.schema.json
    rule: >
      Boundary-manifest rows map local_core_continuity and
      absence_narrows_to sentences to per-profile retained-local-safe
      and blocked-managed-only claims in this file whenever optional
      services, mirrors, or cached policy/auth truth are in play.
  deployment_drill_catalog:
    primary_docs:
      - docs/deployment/drill_catalog_seed.md
      - artifacts/support/deployment_drill_catalog_seed.yaml
    rule: >
      Drill rows resolve locality posture, control-plane state, and
      data-plane state against this matrix so drill-row review does
      not invent outage taxonomies.
  dr_drill_artifacts:
    primary_docs:
      - docs/release/install_topology_plan.md
      - artifacts/release/install_topology_matrix.yaml
    rule: >
      Future DR drill and failover artifacts cite a
      local_core_continuity_packet_record per exercised posture rather
      than free-text locality claims.

# -----------------------------------------------------------------------------
# Degrade-model mapping.
#
# Binds control-plane service impairment to the data-plane continuity
# that MUST remain true. Surfaces cannot silently collapse a
# control-plane outage into a generic product failure when any
# data-plane row here is still available_local_safe or
# available_mirror_backed.
# -----------------------------------------------------------------------------

degrade_model:
  rule: >
    Every control_plane_service_state value other than healthy MUST
    resolve against a named restore_class and a data-plane continuity
    baseline. Silent "service degraded" copy is forbidden on any
    surface that consumes this matrix.
  mappings:
    - control_plane_service_state: stale_cache
      allowed_restore_classes:
        - continue_local_no_restore
        - replay_cached_snapshot
        - resume_after_reconnect
      minimum_data_plane_baseline:
        - capability_class: local_editing
          state: available_local_safe
        - capability_class: local_save
          state: available_local_safe
        - capability_class: local_search
          state: available_local_safe
        - capability_class: local_git
          state: available_local_safe
        - capability_class: local_export
          state: available_local_safe
    - control_plane_service_state: unavailable
      allowed_restore_classes:
        - continue_local_no_restore
        - replay_cached_snapshot
        - resume_after_reconnect
      minimum_data_plane_baseline:
        - capability_class: local_editing
          state: available_local_safe
        - capability_class: local_save
          state: available_local_safe
        - capability_class: local_export
          state: available_local_safe
    - control_plane_service_state: mirror_only
      allowed_restore_classes:
        - replay_cached_snapshot
        - mirror_snapshot_import
      minimum_data_plane_baseline:
        - capability_class: local_editing
          state: available_local_safe
        - capability_class: local_save
          state: available_local_safe
        - capability_class: local_docs_inspect
          state: available_mirror_backed
        - capability_class: local_export
          state: available_local_safe
    - control_plane_service_state: boundary_recheck_required
      allowed_restore_classes:
        - manual_reconcile_after_boundary_change
      minimum_data_plane_baseline:
        - capability_class: local_editing
          state: available_local_safe
        - capability_class: local_save
          state: available_local_safe
        - capability_class: local_export
          state: available_local_safe

# -----------------------------------------------------------------------------
# Per-profile locality rows.
#
# One row per deployment profile. The per-service posture rows below
# are default claims, not a runtime state. Drill rows and continuity
# packets narrow them against concrete scenarios.
# -----------------------------------------------------------------------------

locality_rows:
  - deployment_profile: individual_local
    title: Individual local device, no managed service claimed
    status: seeded
    locality_posture:
      processing_location_class: on_device_only
      storage_location_class: device_local_disk
      tenant_org_scope_class: single_user_local
      region_scope_class: not_applicable
      retention_class: no_retention_beyond_local_disk
      key_mode_class: os_store
    control_plane_service_posture:
      - service_class: sync_service
        default_state: not_applicable
      - service_class: registry_service
        default_state: not_applicable
      - service_class: relay_service
        default_state: not_applicable
      - service_class: ai_broker_service
        default_state: not_applicable
      - service_class: auth_identity_service
        default_state: not_applicable
      - service_class: policy_service
        default_state: not_applicable
      - service_class: docs_pack_service
        default_state: healthy
      - service_class: catalog_service
        default_state: not_applicable
      - service_class: telemetry_sink_service
        default_state: not_applicable
    data_plane_capability_posture:
      - capability_class: local_editing
        default_state: available_local_safe
      - capability_class: local_save
        default_state: available_local_safe
      - capability_class: local_search
        default_state: available_local_safe
      - capability_class: local_git
        default_state: available_local_safe
      - capability_class: local_tasks
        default_state: available_local_safe
      - capability_class: local_docs_inspect
        default_state: available_local_safe
      - capability_class: local_export
        default_state: available_local_safe
      - capability_class: local_diagnostics
        default_state: available_local_safe
    default_restore_class: continue_local_no_restore
    mirror_or_air_gap_applies: false
    per_profile_drill_refs:
      - benchmark_lab_local_only_capture
    notes: >
      Baseline local-core profile. No managed form is claimed; managed
      control-plane service classes resolve to not_applicable rather
      than unavailable so packets for this profile do not fabricate
      absent services.

  - deployment_profile: self_hosted
    title: Customer-operated control plane, mirror, or registry
    status: seeded
    locality_posture:
      processing_location_class: customer_control_plane
      storage_location_class: customer_control_plane_storage
      tenant_org_scope_class: customer_tenant
      region_scope_class: customer_region_pinned
      retention_class: customer_retention_window
      key_mode_class: customer_managed
    control_plane_service_posture:
      - service_class: sync_service
        default_state: healthy
      - service_class: registry_service
        default_state: healthy
      - service_class: relay_service
        default_state: healthy
      - service_class: ai_broker_service
        default_state: not_applicable
      - service_class: auth_identity_service
        default_state: healthy
      - service_class: policy_service
        default_state: healthy
      - service_class: docs_pack_service
        default_state: healthy
      - service_class: catalog_service
        default_state: healthy
      - service_class: telemetry_sink_service
        default_state: healthy
    data_plane_capability_posture:
      - capability_class: local_editing
        default_state: available_local_safe
      - capability_class: local_save
        default_state: available_local_safe
      - capability_class: local_search
        default_state: available_local_safe
      - capability_class: local_git
        default_state: available_local_safe
      - capability_class: local_tasks
        default_state: available_local_safe
      - capability_class: local_docs_inspect
        default_state: available_local_safe
      - capability_class: local_export
