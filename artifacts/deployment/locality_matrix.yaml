# Locality / tenancy / key-mode / control-plane versus data-plane matrix.
#
# Machine-readable companion to docs/deployment/locality_and_continuity_seed.md.
# Schema companion: schemas/deployment/local_core_continuity_packet.schema.json.
# Fixture companion: fixtures/deployment/continuity_cases/.
#
# One locality_row per deployment profile. Every row pins processing
# location, storage location, tenant/org scope, region scope, retention
# class, and key mode for the profile; per-control-plane-service and
# per-data-plane-capability defaults; and the restore-class posture
# claims for that profile must collapse back to.
#
# Rules:
#   - Every row MUST name exactly one deployment_profile,
#     processing_location_class, storage_location_class,
#     tenant_org_scope_class, region_scope_class, retention_class, and
#     key_mode_class.
#   - Managed, enterprise, and self-hosted rows MUST NOT set
#     tenant_org_scope, region_scope, or key_mode to not_applicable;
#     the schema companion enforces this on continuity packets.
#   - Every row MUST list every control_plane_service_class value
#     under control_plane_service_posture and every
#     data_plane_capability_class value under
#     data_plane_capability_posture. Unknown mappings are validation
#     failures; silent not_applicable is forbidden on managed and
#     enterprise rows.
#   - Adding a vocabulary value is additive-minor and requires bumping
#     schema_version plus updating the narrative seed in the same
#     change. Repurposing a value is breaking and opens a decision row
#     in artifacts/governance/decision_index.yaml.
#   - Drill ids referenced from per_profile_drill_refs MUST resolve
#     against artifacts/support/deployment_drill_catalog_seed.yaml.
#   - Milestone slugs MUST NOT appear in any id, path, or description
#     field.

schema_version: 1
status: seeded

plan_source: docs/deployment/locality_and_continuity_seed.md
packet_schema_source: schemas/deployment/local_core_continuity_packet.schema.json
drill_catalog_source: artifacts/support/deployment_drill_catalog_seed.yaml
drill_catalog_narrative_source: docs/deployment/drill_catalog_seed.md
boundary_manifest_source: docs/product/boundary_manifest_strawman.md
boundary_manifest_schema_source: schemas/product/boundary_manifest.schema.json
support_bundle_schema_source: schemas/support/support_bundle.schema.json
control_artifact_index_source: artifacts/governance/control_artifact_index.yaml

related_normative_sources:
  - path: .t2/docs/Aureline_PRD.md
    anchors:
      - "§5.24 local-first operation"
      - "§5.53 managed control-plane boundary"
      - "§5.57 air-gapped operation"
      - "Appendix AN continuity truth"
  - path: .t2/docs/Aureline_Technical_Architecture_Document.md
    anchors:
      - "§9.6 managed-service separation"
      - "§9.7 local-core resilience"
      - "§9.8 mirror and offline posture"
  - path: .t2/docs/Aureline_Technical_Design_Document.md
    anchors:
      - "§11.4.2 control-plane degrade"
      - "§11.4.3 data-plane degrade"
  - path: .t2/docs/Aureline_UI_UX_Spec_Document.md
    anchors:
      - "§18.31 continuity-strip vocabulary"
      - "§18.42 boundary-recheck surface"
      - "Appendix BL cached truth labelling"

