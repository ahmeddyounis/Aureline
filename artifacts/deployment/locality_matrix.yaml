        default_state: available_local_safe
    default_restore_class: resume_after_reconnect
    mirror_or_air_gap_applies: true
    per_profile_drill_refs:
      - stale_policy_session_cached_local_safe
      - remote_connector_loss_continue_local
      - mirror_import_offline_bundle_replay
    notes: >
      Self-hosted rows MUST carry a concrete tenant, region, and key
      posture. AI broker remains not_applicable by default because the
      self-hosted profile does not assume a hosted inference plane.

  - deployment_profile: enterprise_online
    title: Enterprise online, vendor-managed or customer-federated services
    status: seeded
    locality_posture:
      processing_location_class: customer_or_vendor_control_plane
      storage_location_class: customer_control_plane_storage
