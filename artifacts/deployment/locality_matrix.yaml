  - deployment_profile: managed_cloud
    title: Vendor-operated managed SaaS control plane
    status: seeded
    locality_posture:
      processing_location_class: vendor_control_plane
      storage_location_class: vendor_control_plane_storage
      tenant_org_scope_class: customer_tenant
      region_scope_class: customer_region_pinned
