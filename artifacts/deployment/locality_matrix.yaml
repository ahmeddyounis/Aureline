# -----------------------------------------------------------------------------
# Seeded continuity-case fixture index.
#
# Each continuity_case pins one local_core_continuity_packet_record
# under fixtures/deployment/continuity_cases/. Support, boundary, and
# drill-review tasks cite these ids so concrete cases stay stable
# across future seeds.
# -----------------------------------------------------------------------------

continuity_cases:
  - packet_id: individual_local_baseline
    deployment_profile: individual_local
    fixture_ref: fixtures/deployment/continuity_cases/individual_local_baseline.json
    linked_drill_refs:
      - benchmark_lab_local_only_capture
  - packet_id: self_hosted_stale_policy_session
    deployment_profile: self_hosted
    fixture_ref: fixtures/deployment/continuity_cases/self_hosted_stale_policy_session.json
    linked_drill_refs:
      - stale_policy_session_cached_local_safe
  - packet_id: air_gapped_mirror_only_docs
    deployment_profile: air_gapped
    fixture_ref: fixtures/deployment/continuity_cases/air_gapped_mirror_only_docs.json
    linked_drill_refs:
      - docs_pack_mirror_only_truth
      - mirror_import_offline_bundle_replay
  - packet_id: managed_cloud_relay_disconnect
    deployment_profile: managed_cloud
    fixture_ref: fixtures/deployment/continuity_cases/managed_cloud_relay_disconnect.json
    linked_drill_refs:
      - remote_connector_loss_continue_local
  - packet_id: enterprise_failover_boundary_recheck
    deployment_profile: enterprise_online
    fixture_ref: fixtures/deployment/continuity_cases/enterprise_failover_boundary_recheck.json
    linked_drill_refs:
      - failover_boundary_recheck_future_managed_case
  - packet_id: enterprise_policy_denies_external_export
    deployment_profile: enterprise_online
    fixture_ref: fixtures/deployment/continuity_cases/enterprise_policy_denies_external_export.json
    linked_drill_refs: []

# -----------------------------------------------------------------------------
# Coverage guards.
#
# Tooling SHOULD verify that every vocabulary value is exercised by at
# least one seeded continuity case or per-profile drill ref. The guards
# are advisory at this revision; a later milestone may promote them to
# required CI checks.
# -----------------------------------------------------------------------------

coverage_guards:
  deployment_profile_coverage_required: true
  control_plane_service_state_coverage_required: true
  data_plane_capability_state_coverage_required: true
  restore_class_coverage_required: true
  staleness_class_coverage_required: true
