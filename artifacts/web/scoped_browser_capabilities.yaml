# Scoped browser and web surface capability matrix (machine-readable).
#
# Purpose
#   Freeze what browser-delivered and embedded-webview-like surfaces may
#   do, what they must not do, and what disclosure is required so no web
#   surface silently widens authority, secret scope, or managed/control-
#   plane dependence.
#
# Rules
#   - Any write capability (provider mutation, remote edit, policy
#     changes) must be explicitly permitted by a row and must render the
#     required disclosure. No hidden write authority.
#   - Secret bytes, raw cookies, raw callback URLs, and raw tokens never
#     render into web content; web surfaces reference handles/envelopes
#     only.
#   - Auth is system-browser-first. Silent embedded-webview fallback is
#     forbidden unless an explicit exception register row is active.
#   - Embedded web surfaces do not gain ambient filesystem or device
#     permission authority; all sensitive actions route through host-
#     owned review/permission surfaces.

