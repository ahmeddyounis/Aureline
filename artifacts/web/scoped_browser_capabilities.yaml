  - provider_disclosure.companion_capability_badge_required

copy_export_posture_vocabulary:
  - copy_export.copy_allowed_redaction_applied
  - copy_export.export_by_reference_only
  - copy_export.share_link_policy_gated
  - copy_export.raw_url_copy_forbidden

device_permission_posture_vocabulary:
  - device_permissions.none
  - device_permissions.host_native_only

offline_behavior_posture_vocabulary:
  - offline.snapshot_allowed
  - offline.external_open_only_when_offline
  - offline.local_continuity_required

managed_dependency_posture_vocabulary:
  - managed_dependency.none_required
