# -----------------------------------------------------------------------------
# Vocabularies
# -----------------------------------------------------------------------------

surface_id_vocabulary:
  - docs_viewing
  - auth_handoff
  - preview_and_share
  - incident_and_ci_review
  - admin_flows
  - companion_notifications
  - extension_embedded_web_surfaces

delivery_mode_vocabulary:
  - embedded_webview_in_desktop_shell
  - system_browser_handoff
  - scoped_browser_companion
  - local_core_fallback

write_scope_vocabulary:
  - write_scope.none
  - write_scope.comments_and_approvals_only
  - write_scope.targeted_remote_file_edits_only
  - write_scope.policy_edit_via_host_native_review_only

file_access_posture_vocabulary:
  - file_access.none
  - file_access.host_selected_object_read_only
  - file_access.remote_workspace_scoped_read_write_via_host_commands
  - file_access.user_selected_upload_only

secret_handling_posture_vocabulary:
  - secrets.no_secret_bytes
  - secrets.secret_handles_reference_only
  - secrets.session_scoped_envelope_only
  - secrets.embedded_auth_exception_required

provider_identity_disclosure_vocabulary:
  - provider_disclosure.boundary_card_required
