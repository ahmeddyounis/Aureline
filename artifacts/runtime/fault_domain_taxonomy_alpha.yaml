    host_class_id: desktop_shell
    fault_domain_id: shell_interaction_core
    supervision_owner_host_class: null
    restart_budget_ref: artifacts/runtime/restart_budgets.yaml#/fault_domains/shell_interaction_core
    strike_budget:
      strike_window_class: short_window
      window_seconds: 5
      automatic_restarts_in_window: 0
      backoff_profile_class: no_auto_restart
      budget_exhaustion_behavior: user_relaunch_required
    visible_state_contract:
      nominal_state_class: ready
      degraded_state_class: lost
      quarantine_state_class: lost
      fail_closed_state_class: lost
      recovery_state_class: lost
      user_visible_summary: The desktop shell is never silently restarted; loss is visible app loss with relaunch.
    repair_handoff:
      repair_transaction_ref: null
      repair_transaction_contract_ref: schemas/support/repair_transaction.schema.json
      preview_required_before_mutation: true
      no_repair_reason_class: non_restartable_shell_boundary
    projection_contract:
      support_bundle_item_id: support.item.runtime_fault_domains_alpha
      incident_packet_item_id: incident.item.runtime_fault_domain.desktop_shell
      ui_state_copy_ref: docs/runtime/restart_budget_alpha.md#desktop-shell-lane
