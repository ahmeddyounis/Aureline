# --------------------------------------------------------------------------
# Storage-class rows.
#
# Each row pins class properties against the closed vocabularies above.
# Every class declares at least one inspectable surface. The
# clear_cache_protection_class drives what a generic clear-cache path
# may target.
# --------------------------------------------------------------------------

storage_classes:
  - id: interactive_hot_cache
    typical_contents: >
      Render atlases, viewport caches, quick-open hotsets, open-file
      syntax state, recent-query hot shards, ephemeral preview data.
    admissible_authority_classes:
      - disposable_derived_cache
    admissible_rebuild_cost_classes:
      - medium_rebuild_cost
      - low_rebuild_cost
    admissible_sensitivity_classes:
      - t0_metadata_only
      - t1_low_risk_derived
      - t2_code_bearing_bounded
    admissible_gc_policy_classes:
      - gc_on_version_replace
      - gc_on_pressure_if_unpinned
      - gc_on_explicit_reset_only
    admissible_quota_basis_classes:
      - per_workspace_quota
      - global_device_quota
      - per_class_ceiling
    admissible_pin_source_classes: []
    required_invalidation_fingerprints:
      - workspace_identity_ref
      - producing_schema_version
      - aureline_compatible_version_range
    optional_invalidation_fingerprints:
      - toolchain_env_capsule_hash
      - policy_epoch_ref
      - provider_model_identity_ref
    clear_cache_protection_class: generic_clear_always_allowed
    low_disk_ladder_step: trim_interactive_hot_cache
    inspectable_on_surfaces:
      - storage_inspector
      - workspace_storage_detail
      - clear_data_review
      - low_disk_banner
      - cleanup_history_lane
    default_visible_projection:
      healthy_posture_label: Hot cache ready
      pressure_trimmed_label: Interactive hot cache trimmed
    rationale: >
      Disposable derived state. Safe to trim aggressively and first in
      the low-disk ladder; never at the cost of dirty user buffers or
      an active review context. No pin sources admitted.

  - id: knowledge_cache
    typical_contents: >
      Search shards, graph indexes, language snapshots, embeddings,
      docs indexes.
    admissible_authority_classes:
      - disposable_derived_cache
    admissible_rebuild_cost_classes:
      - high_rebuild_cost
      - medium_rebuild_cost
    admissible_sensitivity_classes:
      - t0_metadata_only
      - t1_low_risk_derived
      - t2_code_bearing_bounded
    admissible_gc_policy_classes:
      - gc_on_version_replace
      - gc_on_pressure_if_unpinned
      - gc_on_explicit_reset_only
    admissible_quota_basis_classes:
      - per_workspace_quota
      - global_device_quota
      - per_class_ceiling
    admissible_pin_source_classes:
      - explicit_user_pin
      - offline_bundle_ref
      - certified_archetype_or_template_ref
    required_invalidation_fingerprints:
      - workspace_identity_ref
      - producing_schema_version
      - aureline_compatible_version_range
    optional_invalidation_fingerprints:
      - toolchain_env_capsule_hash
      - policy_epoch_ref
      - provider_model_identity_ref
    clear_cache_protection_class: generic_clear_with_pin_exclusions
    low_disk_ladder_step: trim_knowledge_cache_rebuildable
    inspectable_on_surfaces:
      - storage_inspector
      - workspace_storage_detail
      - clear_data_review
      - low_disk_banner
      - pin_manager
      - cleanup_history_lane
    default_visible_projection:
      healthy_posture_label: Indexes up to date
      rebuild_pending_label: Indexes rebuilding
      pressure_trimmed_label: Indexes trimmed; rebuild pending
    rationale: >
      Derived but correctness-relevant. Rebuildable; stale entries MUST
      stay visible until rehydrated. Pins cover offline corpora and
      certified template refs.

  - id: artifact_cache
    typical_contents: >
      Updates, extension packages, docs packs, model packs, symbol
      bundles, preview runtimes.
    admissible_authority_classes:
      - disposable_derived_cache
      - admin_or_control_artifact
    admissible_rebuild_cost_classes:
      - high_rebuild_cost
      - medium_rebuild_cost
    admissible_sensitivity_classes:
      - t0_metadata_only
      - t1_low_risk_derived
    admissible_gc_policy_classes:
      - gc_on_version_replace
      - gc_on_pressure_if_unpinned
      - gc_on_explicit_reset_only
    admissible_quota_basis_classes:
      - digest_store_plus_class_ceiling
      - per_class_ceiling
      - global_device_quota
      - per_tenant_quota
    admissible_pin_source_classes:
      - explicit_user_pin
      - explicit_admin_policy_pin
      - release_artifact_graph_ref
      - offline_bundle_ref
      - certified_archetype_or_template_ref
      - policy_bundle_last_known_good_ref
    required_invalidation_fingerprints:
      - producing_schema_version
      - aureline_compatible_version_range
    optional_invalidation_fingerprints:
      - toolchain_env_capsule_hash
      - provider_model_identity_ref
      - policy_epoch_ref
      - workspace_identity_ref
    clear_cache_protection_class: generic_clear_with_pin_exclusions
    low_disk_ladder_step: trim_artifact_cache_unpinned
    inspectable_on_surfaces:
      - storage_inspector
      - workspace_storage_detail
      - clear_data_review
      - low_disk_banner
      - pin_manager
      - cleanup_history_lane
    default_visible_projection:
      healthy_posture_label: Artifact cache healthy
      pressure_trimmed_label: Unpinned artifacts trimmed
      retained_for_evidence_label: Pinned artifact retained
    integrates_with_cache_trust_classes: artifacts/release/cache_trust_classes.yaml
    rationale: >
      Imported content-addressed artifacts retained by digest refs.
      Mirror / offline pins, release manifest refs, and admin-approved
      packs protect entries from generic clear-cache.

  - id: prebuild_environment_cache
    typical_contents: >
      Container layers, toolchain packs, template expansions, dependency
      metadata, environment capsules.
    admissible_authority_classes:
      - disposable_derived_cache
    admissible_rebuild_cost_classes:
      - high_rebuild_cost
      - medium_rebuild_cost
    admissible_sensitivity_classes:
      - t0_metadata_only
      - t1_low_risk_derived
    admissible_gc_policy_classes:
      - gc_on_version_replace
      - gc_on_pressure_if_unpinned
      - gc_on_explicit_reset_only
    admissible_quota_basis_classes:
      - digest_store_plus_class_ceiling
      - per_class_ceiling
      - global_device_quota
    admissible_pin_source_classes:
      - explicit_user_pin
      - explicit_admin_policy_pin
      - offline_bundle_ref
      - certified_archetype_or_template_ref
      - release_artifact_graph_ref
    required_invalidation_fingerprints:
      - toolchain_env_capsule_hash
      - producing_schema_version
      - aureline_compatible_version_range
    optional_invalidation_fingerprints:
      - workspace_identity_ref
      - policy_epoch_ref
    clear_cache_protection_class: generic_clear_with_pin_exclusions
    low_disk_ladder_step: trim_prebuild_environment_unpinned
    inspectable_on_surfaces:
      - storage_inspector
      - workspace_storage_detail
      - clear_data_review
      - low_disk_banner
      - pin_manager
      - cleanup_history_lane
    default_visible_projection:
      healthy_posture_label: Prebuilds ready
      pressure_trimmed_label: Unpinned prebuilds trimmed
    rationale: >
      Derived / imported hybrid. Deletion may widen startup cost or
      break offline continuity; the clear-cache review sheet MUST
      state the consequence.

  - id: evidence_support_cache
    typical_contents: >
      Crash envelopes, traces, review packets, validation artifacts,
      incident bundles, support exports.
    admissible_authority_classes:
      - admin_or_control_artifact
      - user_owned_recovery_state
    admissible_rebuild_cost_classes:
      - authoritative_no_rebuild
      - high_rebuild_cost
    admissible_sensitivity_classes:
      - t0_metadata_only
      - t1_low_risk_derived
      - t2_code_bearing_bounded
      - t3_secret_adjacent_not_reusable_cache
    admissible_gc_policy_classes:
      - never_gc_authoritative
      - gc_on_case_close
      - gc_on_explicit_reset_only
    admissible_quota_basis_classes:
      - policy_bound_evidence_quota
      - retention_policy_only
    admissible_pin_source_classes:
      - explicit_user_pin
      - explicit_admin_policy_pin
      - case_reference_ref
      - review_pack_ref
      - release_artifact_graph_ref
      - support_export_assembly_ref
      - retention_window_ref
      - policy_bundle_last_known_good_ref
    required_invalidation_fingerprints:
      - producing_schema_version
      - aureline_compatible_version_range
    optional_invalidation_fingerprints:
      - workspace_identity_ref
      - toolchain_env_capsule_hash
      - policy_epoch_ref
      - provider_model_identity_ref
    clear_cache_protection_class: protected_requires_class_specific_review
    low_disk_ladder_step: expire_unpinned_evidence_past_retention
    inspectable_on_surfaces:
      - storage_inspector
      - workspace_storage_detail
      - clear_data_review
      - low_disk_banner
      - pin_manager
      - cleanup_history_lane
    default_visible_projection:
      healthy_posture_label: Evidence retained
      retained_for_evidence_label: Retained for open case
      reset_candidate_label: Past retention; eligible for expiry
    export_before_delete_required: true
    rationale: >
      Durable but policy-bounded evidence. Separate quota from
      ordinary cache. Generic clear-cache is refused; only a class-
      specific review flow may clear, and only after
      export-before-delete is offered for authoritative_no_rebuild
      entries.

  - id: user_owned_recovery_state
    typical_contents: >
      Local history, rollback checkpoints, dirty-buffer journals,
      session-restore state, deferred-intent outbox, terminal restore
      metadata.
    admissible_authority_classes:
      - user_owned_recovery_state
    admissible_rebuild_cost_classes:
      - authoritative_no_rebuild
    admissible_sensitivity_classes:
      - t0_metadata_only
      - t1_low_risk_derived
      - t2_code_bearing_bounded
    admissible_gc_policy_classes:
      - never_gc_authoritative
      - gc_on_explicit_reset_only
    admissible_quota_basis_classes:
      - retention_policy_only
    admissible_pin_source_classes:
      - explicit_user_pin
      - retention_window_ref
    required_invalidation_fingerprints:
      - workspace_identity_ref
      - producing_schema_version
      - aureline_compatible_version_range
    optional_invalidation_fingerprints:
      - toolchain_env_capsule_hash
    clear_cache_protection_class: protected_never_generic_clear
    low_disk_ladder_step: user_owned_recovery_state_only_under_explicit_review
    inspectable_on_surfaces:
      - storage_inspector
      - workspace_storage_detail
      - clear_data_review
      - low_disk_banner
      - pin_manager
      - cleanup_history_lane
    default_visible_projection:
      healthy_posture_label: Recovery state preserved
      retained_for_evidence_label: Retained under policy window
    export_before_delete_required: true
    rationale: >
      Authoritative user state held on the user's behalf. NEVER
      ordinary cache GC; NEVER targeted by generic clear-cache. The
      only admissible clear path is an explicit class-specific review
      whose sheet names the newest retained item and offers
      export-before-delete.

# --------------------------------------------------------------------------
# Class invariants.
#
# These are the rules the cache manager, every inspectable surface, and
# every QA fixture validate. Violating any invariant is non-conforming.
# --------------------------------------------------------------------------

class_invariants:
  - id: no_user_authored_durable_truth_as_cache
    description: >
      A manifest declaring authority_class = user_authored_durable_truth
      is refused at cache-manager registration. Surfaces route through
      the profile / state-map storage path instead.
    enforced_at: schema_and_runtime

  - id: user_owned_recovery_state_never_generic_clear
    description: >
      user_owned_recovery_state class carries
      clear_cache_protection_class = protected_never_generic_clear and
      admissible_gc_policy_classes limited to never_gc_authoritative
      and gc_on_explicit_reset_only. A generic clear-cache path MUST
      skip this class.
    enforced_at: schema_and_runtime

  - id: evidence_cache_never_generic_clear
    description: >
      evidence_support_cache carries
      clear_cache_protection_class = protected_requires_class_specific_review.
      A generic clear-cache path MUST skip this class. A class-
      specific review path requires export-before-delete for
      authoritative_no_rebuild entries.
    enforced_at: schema_and_runtime

  - id: pinned_artifact_and_prebuild_skipped_by_default
    description: >
      Under generic clear-cache of artifact_cache or
      prebuild_environment_cache, every entry carrying at least one
      pin_ref whose pin_source_class is in the pinned set is skipped.
      The review sheet names every skipped entry.
    enforced_at: clear_cache_preview_record

  - id: every_class_binds_at_least_one_inspectable_surface
    description: >
      Every storage_classes row declares inspectable_on_surfaces with
      length >= 1. A class whose list is empty is non-conforming.
    enforced_at: artifact_and_schema

  - id: authoritative_no_rebuild_limited_to_evidence_and_recovery
    description: >
      Only evidence_support_cache and user_owned_recovery_state rows
      may declare rebuild_cost_class = authoritative_no_rebuild.
      Disposable or derived classes declaring
      authoritative_no_rebuild are non-conforming.
    enforced_at: artifact_and_schema

  - id: t3_sensitivity_limited_to_evidence
    description: >
      Only evidence_support_cache may admit
      sensitivity_class = t3_secret_adjacent_not_reusable_cache, and
      only for reviewed redacted crash envelopes under opt-in export.
      Registering a non-evidence cache with t3 is non-conforming.
    enforced_at: schema_and_runtime

  - id: correctness_affecting_entries_carry_required_fingerprints
    description: >
      Every cache entry whose class declares required_invalidation_fingerprints
      MUST carry a non-null value for each required key, unless the
      class rationale explicitly marks the key as not_applicable.
    enforced_at: schema_and_runtime

  - id: low_disk_ladder_is_ordered_and_visible
    description: >
      Low-disk eviction follows low_disk_ladder_step order. A drill
      record whose step sequence skips or reorders admissible steps
      without naming the skip reason is non-conforming.
    enforced_at: low_disk_drill_record

  - id: clear_cache_is_class_selective_and_previewable
    description: >
      A clear-cache preview record MUST name selected_class_ids,
      protected_excluded_class_ids, skipped_pinned_entries_count,
      reclaimable_bytes_estimate, and declared_consequences. A
      blanket clear-all path is not admissible.
    enforced_at: clear_cache_preview_record

# --------------------------------------------------------------------------
# Inspectable-surface reservation.
#
# Binds every storage_class_id to the product surfaces that may project
# it. Surfaces MUST render class-labeled rows by projecting these ids;
# a parallel surface-local class vocabulary is non-conforming.
# --------------------------------------------------------------------------

inspectable_surface_reservations:
  - surface: storage_inspector
    projects_classes:
      - interactive_hot_cache
      - knowledge_cache
      - artifact_cache
      - prebuild_environment_cache
      - evidence_support_cache
      - user_owned_recovery_state
    required_projection_fields:
      - storage_class_id
      - total_size_bytes
      - entry_count
      - largest_scope_ref
      - posture
      - pressure_state

  - surface: workspace_storage_detail
    projects_classes:
      - knowledge_cache
      - artifact_cache
      - prebuild_environment_cache
      - evidence_support_cache
      - user_owned_recovery_state
      - interactive_hot_cache
    required_projection_fields:
      - storage_class_id
      - scope_ref
      - size_bytes
      - last_access_at
      - rebuild_cost_class
      - pin_refs
      - sensitivity_class
      - posture

  - surface: clear_data_review
    projects_classes:
      - interactive_hot_cache
      - knowledge_cache
      - artifact_cache
      - prebuild_environment_cache
      - evidence_support_cache
      - user_owned_recovery_state
    required_projection_fields:
      - selected_class_ids
      - protected_excluded_class_ids
      - skipped_pinned_entries_count
      - reclaimable_bytes_estimate
      - declared_consequences
      - export_before_delete_offered
      - recovery_affordance_ref

  - surface: low_disk_banner
    projects_classes:
      - interactive_hot_cache
      - knowledge_cache
      - artifact_cache
      - prebuild_environment_cache
      - evidence_support_cache
      - user_owned_recovery_state
    required_projection_fields:
      - pressure_state
      - current_ladder_step
      - paused_workload_lanes_refs
      - protected_class_ids_not_trimmed
      - open_inspector_action_ref

  - surface: pin_manager
    projects_classes:
      - artifact_cache
      - prebuild_environment_cache
      - evidence_support_cache
      - user_owned_recovery_state
      - knowledge_cache
    required_projection_fields:
      - storage_class_id
      - pin_source_class
      - referenced_object_ref
      - pin_expiry_or_policy_window
      - unpin_path_ref
      - size_bytes

  - surface: cleanup_history_lane
    projects_classes:
      - interactive_hot_cache
      - knowledge_cache
      - artifact_cache
      - prebuild_environment_cache
      - evidence_support_cache
      - user_owned_recovery_state
    required_projection_fields:
      - event_id
      - event_at
      - actor_class
      - selected_class_ids
      - reclaimed_bytes
      - blocked_pinned_entries_count
      - resulting_posture_by_class
      - follow_up_actions_required

# --------------------------------------------------------------------------
# Pin-ref schema-level guards.
#
# Every pin_ref an inspector or clear-cache preview renders MUST carry
# the fields below. Rendering a pin without naming why it exists is
# non-conforming.
# --------------------------------------------------------------------------

pin_ref_required_fields:
  - pin_source_class
  - referenced_object_ref
  - pin_expiry_or_policy_window
  - unpin_path_ref
  - pin_declared_by_actor_class

pin_ref_expiry_rules:
  - pin_source_class: case_reference_ref
    expiry_required: true
    expiry_anchor: case_closure_plus_policy_window
  - pin_source_class: review_pack_ref
    expiry_required: true
    expiry_anchor: review_pack_closure_plus_policy_window
  - pin_source_class: release_artifact_graph_ref
    expiry_required: true
    expiry_anchor: release_ring_retention_window
  - pin_source_class: offline_bundle_ref
    expiry_required: true
    expiry_anchor: offline_bundle_validity_window
  - pin_source_class: certified_archetype_or_template_ref
    expiry_required: true
    expiry_anchor: certification_window
  - pin_source_class: policy_bundle_last_known_good_ref
    expiry_required: true
    expiry_anchor: next_signed_policy_epoch
  - pin_source_class: support_export_assembly_ref
    expiry_required: true
    expiry_anchor: export_assembly_in_flight_only
  - pin_source_class: explicit_user_pin
    expiry_required: false
    expiry_anchor: user_unpin_only
  - pin_source_class: explicit_admin_policy_pin
    expiry_required: false
    expiry_anchor: admin_unpin_only
  - pin_source_class: retention_window_ref
    expiry_required: true
    expiry_anchor: retention_window_elapsed
