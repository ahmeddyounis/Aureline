# Shared storage-class, authority, rebuild-cost, sensitivity, GC-policy,
# quota-basis, pin-source, invalidation-fingerprint, and inspectable-
# surface matrix plus the protected-class invariants.
#
# Companion to docs/runtime/storage_classes_and_gc.md and
# schemas/runtime/cache_entry_manifest.schema.json. The runtime may
# implement these values through different internal cache managers or
# counters, but every surface (storage inspector, workspace-storage
# detail, clear-data review, low-disk banner, pin manager, cleanup
# history lane), support export, QA fixture, admin console, and future
# GC engine MUST project back to the ids declared here.

schema_version: 1
artifact_id: aureline.runtime.storage_classes
title: Runtime storage-class matrix, pin sources, invalidation fingerprints, and protected-class invariants

contract_source: docs/runtime/storage_classes_and_gc.md

related_docs:
  - docs/state/profile_and_state_map.md
  - docs/support/support_bundle_contract.md
  - docs/support/recovery_ladder_packet.md
  - docs/runtime/resource_governor_contract.md
  - docs/runtime/background_queue_contract.md

companion_refs:
  cache_entry_manifest_schema_ref: schemas/runtime/cache_entry_manifest.schema.json
  low_disk_drills_ref: artifacts/runtime/low_disk_drills.yaml
  support_bundle_schema_ref: schemas/support/support_bundle.schema.json
  profile_and_state_map_ref: docs/state/profile_and_state_map.md
  release_cache_trust_classes_ref: artifacts/release/cache_trust_classes.yaml

# --------------------------------------------------------------------------
