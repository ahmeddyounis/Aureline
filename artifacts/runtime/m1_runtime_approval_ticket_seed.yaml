# Runtime approval-ticket seed (M1 authority model for local mutation,
# external mutation, credential projection, and privileged attach).
#
# Machine-readable register of typed approval-ticket profile rows.
# The seed exists so target identity, scope, expiry, actor lineage,
# policy epoch, and revocation posture are first-class across:
#   - the shell prompt that mints local-mutation / privileged-attach
#     tickets,
#   - the policy service that mints credential-projection tickets,
#   - the supervisor that admits provider-plane approval tickets
#     under external-mutation tickets,
#   - the mutation-journal renderer,
#   - the support-bundle exporter, and
#   - any later admin or runtime-authority service (M1: not built;
#     only the contract).
#
# Reviewer-facing landing page:
#   docs/runtime/m1_authority_model.md
#
# Upstream sources the seed projects against (canonical contracts):
#   docs/governance/runtime_authority_contract.md
#   schemas/governance/authority_ticket.schema.json
#   schemas/integration/approval_ticket.schema.json
#
# Row schema:
#   schemas/runtime/approval_ticket.schema.json
#
# Envelope schema:
#   schemas/runtime/m1_runtime_approval_ticket_seed.schema.json
#
# Conformance:
#   - Every example_payload_ref resolves on disk and validates against
#     the row schema.
#   - approval_ticket_profile_id is unique. Adding a row is
#     additive-minor. Removing a row is breaking; narrow by editing
#     the row, not by deletion.
#   - Every row MUST declare exactly one authority_class drawn from
#     the closed M1 set (local_mutation, external_mutation,
#     credential_projection, privileged_attach). The union of the
#     seed's rows MUST cover all four.
#   - external_mutation rows MUST carry at least one inner
#     provider-plane approval_ticket ref on the underlying example
#     payload.
#   - credential_projection rows MUST carry a non-empty
#     projection_mode_ref on the underlying example payload.
#   - privileged_attach rows MUST carry step_up_required_flag = true
#     and a non-empty attach_target_ref on the underlying example
#     payload.
#   - Milestone slugs and task ids MUST NOT appear in any id, ref,
#     label, or note field. Describe what the profile is, not which
#     planning item it came from.

schema_version: 1
status: seeded
as_of: "2026-05-11"

matrix_id: m1_runtime_approval_ticket_seed
owner_dri: "@ahmeddyounis"

overview_page: docs/runtime/m1_authority_model.md
upstream_authority_contract_ref: docs/governance/runtime_authority_contract.md
upstream_integration_approval_ticket_schema_ref: schemas/integration/approval_ticket.schema.json

row_schema_ref: schemas/runtime/approval_ticket.schema.json
build_identity_ref: artifacts/build/build_identity.json
validation_lane_ref: artifacts/qe/test_lane_registry.yaml#fixture_repo_integration

