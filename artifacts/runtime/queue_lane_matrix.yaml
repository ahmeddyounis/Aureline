# additive-minor change that MUST bump schema_version only when it
# changes payload shape; repurposing a value is breaking.
# --------------------------------------------------------------------------

queue_lane_vocabulary:
  - foreground
  - interactive_background
  - maintenance
  - provider_overlay
  - upload_replication

work_class_vocabulary:
  - core_interaction
  - core_navigation
  - short_foreground_task
  - background_knowledge_work
  - optional_assistance
  - upload_and_replication

budget_domain_vocabulary:
  - hot_path_interactive_budget
  - foreground_task_budget
  - knowledge_refresh_budget
  - maintenance_budget
  - provider_overlay_budget
  - replication_budget

workload_lane_vocabulary:
