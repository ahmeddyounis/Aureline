# Shared queue-lane, workload-lane, job-kind, collapse-policy,
# checkpoint-policy, staleness-policy, cancellation-contract, and
# budget-domain matrix plus seeded diagnostic scenarios.
#
# Companion to docs/runtime/background_queue_contract.md and
# schemas/runtime/background_job.schema.json. The runtime may
# implement these values through different internal schedulers or
# counters, but every surface, QA fixture, support export, and
# future scheduler MUST project back to the ids declared here.

schema_version: 1
artifact_id: aureline.runtime.queue_lane_matrix
title: Background-work queue lanes, workload lanes, job kinds, collapse / checkpoint / cancel contracts, and seeded diagnostics

contract_source: docs/runtime/background_queue_contract.md

related_docs:
  - docs/runtime/resource_governor_contract.md
  - docs/perf/efficiency_state_policy.md
  - docs/runtime/execution_context_vocabulary.md
  - docs/runtime/fault_domains_and_restart_policy.md

companion_refs:
  resource_governor_thresholds_ref: artifacts/runtime/resource_governor_thresholds.yaml
  forensic_packet_schema_ref: schemas/runtime/forensic_packet.schema.json
  background_job_schema_ref: schemas/runtime/background_job.schema.json
  execution_context_schema_ref: schemas/runtime/execution_context.schema.json

