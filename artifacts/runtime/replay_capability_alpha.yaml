record_kind: replay_capability_alpha_descriptor
schema_version: 1
descriptor_id: replay-capability:import-viewer:0001
backend:
  backend_family: import_viewer
  backend_version: alpha.1
  adapter_version: aureline-runtime-evidence-alpha.1
supported_ranges:
  - runtime_family: rust
    supported_runtime_range: 1.75.x
    toolchain_family: rustup_stable
    supported_toolchain_range: 1.75.x
support_matrix:
  reverse_step:
    state: unsupported
    reason: Imported bundle lacks deterministic execution history.
  frame_inspection:
    state: limited
    reason: Frame inspection is available only through derived call-tree rows.
  data_inspection:
    state: unsupported
    reason: Raw variable and memory snapshots are not captured in this lane.
  timeline_scrub:
    state: supported
    reason: Timeline scrub is available over immutable imported trace events.
  checkpoint_bookmarks:
    state: limited
    reason: Bookmarks can annotate imported events but cannot resume execution.
lane_state: import_view_only
determinism_caveats:
  - No deterministic scheduler state is present.
  - Kernel, host, and input stream state are not replayable from the imported bundle.
  - Derived flamegraph and timeline views are inspectable evidence, not a live debug session.
overhead_storage_band:
  overhead_class: moderate
  storage_growth_class: bounded_imported_bundle
  cost_note: Storage cost is bounded by the imported trace bundle; live recording is not active.
import_view_only_reason: The alpha baseline can inspect imported trace/profile evidence but does not control a live replay backend.
export_posture:
  data_class: redacted_summary
  redaction_mode: metadata_and_hashes_only
  retention_class: support_bundle_manifest_only
  raw_snapshots_exported_by_default: false
