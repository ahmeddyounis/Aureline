# Runtime replay pack closed vocabularies.
#
# These tokens are the canonical strings emitted on the boundary schema and
# rendered verbatim by every consumer (shell panel, CLI/headless, support
# export). Adding a token is a vocabulary change that must update the
# schema, the reviewer doc, the checked-in fixtures, and the integration
# test together.

replay_fidelity_class:
  - exact
  - compatible
  - layout_only
  - evidence_only

replay_subject_privilege_class:
  - read_only
  - mutating
  - privileged

replay_reopen_decision_class:
  - allow_replay
  - allow_inspect_no_rerun
  - allow_evidence_only_view
  - blocked

replay_pack_artefact_class:
  - transcript_ref
  - runtime_log_ref
  - artifact_blob_ref
  - evidence_packet_ref
  - context_provenance_ref

# Decision invariants reviewers can quote when auditing pack outputs.
invariants:
  - "Mutating or privileged subjects MUST never resolve to allow_replay,\n  regardless of replay fidelity."
  - "Unknown or redaction-unsafe comparator outcomes MUST resolve to\n  reopen_decision == blocked."
  - "Exact and compatible fidelity classes are the only classes that may\n  resolve to allow_replay; layout_only never permits a live rerun."
  - "Evidence-only fidelity may surface the evidence record only;\n  transcripts and logs MAY render but cannot fire on the live target."

# Permission joins used by reviewer dashboards.
permits_runtime_replay:
  fidelity_classes:
    - exact
    - compatible
  privilege_classes:
    - read_only

blocks_live_rerun:
  fidelity_classes:
    - layout_only
    - evidence_only
  privilege_classes:
    - mutating
    - privileged
