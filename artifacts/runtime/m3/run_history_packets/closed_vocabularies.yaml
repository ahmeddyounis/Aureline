#
# These tokens are emitted by the runtime run-lineage boundary and are rendered
# verbatim by desktop UI, activity center, CLI/headless output, and support
# exports. Adding a token is a vocabulary change that must update the schemas,
# reviewer doc, fixtures, and runtime tests together.

