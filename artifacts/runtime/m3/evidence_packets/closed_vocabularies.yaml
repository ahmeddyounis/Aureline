# Runtime evidence packet closed vocabularies.
#
# These tokens are the canonical strings emitted on the boundary schema and
# rendered verbatim by every consumer (shell panel, CLI/headless, support
# export). Adding a token is a vocabulary change that must update the
# schema, the reviewer doc, and the checked-in fixtures together.

runtime_evidence_lane:
  - task
  - test
  - debug
  - runtime

runtime_evidence_kind:
  - task_event
  - test_attempt
  - debug_session
  - runtime_trace_evidence

replay_compatibility_class:
  - compatible_replay
  - compatible_minor_drift
  - incompatible_target_id_changed
  - incompatible_target_class_changed
  - incompatible_toolchain_changed
  - incompatible_capsule_drift
  - incompatible_policy_epoch_regressed
  - incompatible_trust_state_downgraded
  - incompatible_redaction_class
  - unknown_requires_review

replay_incompatibility_reason:
  - target_id_drift
  - target_class_drift
  - toolchain_class_drift
  - toolchain_id_drift
  - environment_capsule_hash_drift
  - environment_capsule_drift_state_regressed
  - policy_epoch_regressed
  - trust_state_downgraded
  - redaction_class_unsafe
  - clean_forward_drift

redaction_class:
  - metadata_safe_default

permits_replay_without_review_classes:
  - compatible_replay
  - compatible_minor_drift

blocks_replay_classes:
  - incompatible_target_id_changed
  - incompatible_target_class_changed
  - incompatible_toolchain_changed
  - incompatible_capsule_drift
  - incompatible_policy_epoch_regressed
  - incompatible_trust_state_downgraded
  - incompatible_redaction_class
  - unknown_requires_review
