# Action origin / target / route / exposure / route-change-reason /
# authority-linkage matrix.
#
# Machine-readable companion to
# docs/runtime/origin_target_route_taxonomy.md. Binds every frozen
# token in the six vocabularies to its minimum packet fields, its
# admissible pairings with the other vocabularies, its required
# redaction class and default export-inclusion posture, and at
# least one conformance test.
#
# This matrix is consumed by:
#   - the command router and shell / CLI / AI dispatcher so every
#     invocation emits one route-truth packet per session,
#   - the ADR-0010 browser-handoff launcher and callback receiver
#     so every handoff is typed and every callback is validated,
#   - the managed-workspace control plane so every control-plane
#     action names its linkage token and exposure class,
#   - the publish pipeline and tunnel exposer so every externally
#     visible action names its exposure class inline,
#   - the support-export, mutation-journal, replay, and
#     evidence-packet exporters so every export quotes the
#     frozen tokens and redaction posture.
#
# Rules:
#   - Every row MUST name one token from the frozen vocabulary, a
#     minimum-field set, the admissible companion classes, the
#     required redaction class and default export-inclusion
#     posture, and at least one conformance test.
#   - If this file and docs/runtime/origin_target_route_taxonomy.md
#     disagree, the doc wins and this file MUST be updated in the
#     same change. If either disagrees with ADR-0009, ADR-0010,
#     ADR-0011, or docs/commands/command_descriptor_contract.md,
#     the ADR / contract wins.
#   - Adding a token to any vocabulary is additive-minor: bump
#     action_route_truth_schema_version, extend this matrix, and
#     update the taxonomy doc in the same change.
#   - Repurposing any existing token is breaking and requires a new
#     decision row in artifacts/governance/decision_index.yaml.

action_route_truth_schema_version: 1

taxonomy_source: docs/runtime/origin_target_route_taxonomy.md
related_adrs:
  - docs/adr/0001-identity-modes.md
  - docs/adr/0004-rpc-transport-and-schema-toolchain.md
  - docs/adr/0005-subscription-envelope-and-invalidation-semantics.md
  - docs/adr/0006-vfs-save-cache-identity.md
  - docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md
  - docs/adr/0008-settings-definition-and-effective-configuration-resolver.md
  - docs/adr/0009-execution-context-and-scope.md
  - docs/adr/0010-connected-provider-browser-handoff-approval-ticket.md
  - docs/adr/0011-capability-lifecycle-and-dependency-markers.md
related_contracts:
  - docs/commands/command_descriptor_contract.md
  - docs/runtime/execution_context_vocabulary.md
  - docs/runtime/target_discovery_and_install_review_taxonomy.md
boundary_schemas:
  - schemas/runtime/execution_context.schema.json
  - schemas/integration/browser_handoff_packet.schema.json
  - schemas/integration/approval_ticket.schema.json
  - schemas/commands/command_descriptor.schema.json

