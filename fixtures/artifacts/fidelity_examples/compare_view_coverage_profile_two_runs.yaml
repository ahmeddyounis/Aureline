record_kind: artifact_fidelity_example
schema_version: 1
case_id: artifact_fidelity.case.compare_view.coverage_profile_two_runs
artifact_family: coverage_profile_artifact
fidelity_row_ref: artifact_fidelity:coverage_profile_artifact
merge_resolution_policy_ref: merge_policy:coverage_profile_artifact

scenario: >
  Two profile captures are selected for comparison. Both have run
  context refs, target refs, profiler tool versions, and compatible
  build identity fields. The surface should compare metrics and
  confounders without offering raw artifact edits.

expected_open_decision:
  default_open_mode: compare_view
  first_class_view: coverage_profile_compare
  interaction_posture: compare_only
  raw_fallback_policy: raw_payload_hidden_by_default

provenance_inputs:
  baseline_run_context_ref: run_context:example:profile:baseline
  current_run_context_ref: run_context:example:profile:current
  target_ref: target:example:renderer
  execution_context_ref: execution_context:example:local
  capture_tool_ref: profiler:pprof:example:v1
  build_identity_match_state: compatible_baseline_build
  included_run_set_ref: profile_run_set:example:baseline_current

required_surface_cues:
  - baseline_current_identity_visible
  - capture_tool_version_visible
  - build_identity_visible
  - likely_confounders_visible
  - raw_capture_export_scope_visible

denied_actions:
  - edit_raw_capture
  - auto_merge_profile_or_coverage_payloads_in_vcs
  - hide_sample_rate_degradation

linked_contract_refs:
  - docs/debug/artifact_resolution_seed.md
  - docs/perf/self_capture_parity.md
  - artifacts/artifacts/debug_fidelity_rows.yaml#artifact_fidelity:coverage_profile_artifact

expected_result: >
  Open in compare view with baseline/current provenance. The compare can
  aggregate declared run-set summaries, but the underlying profile
  artifacts remain compare-only evidence.
