record_kind: artifact_fidelity_example
schema_version: 1
case_id: artifact_fidelity.case.semantic_view.notebook_trusted_outputs_hidden
artifact_family: jupyter_notebook
fidelity_row_ref: artifact_fidelity:jupyter_notebook
merge_resolution_policy_ref: merge_policy:jupyter_notebook

scenario: >
  A notebook opens from a trusted workspace with stable cell ids and a
  known notebook format version. The notebook is editable, but saved
  outputs remain hidden from the default diff and active widget output
  stays sandboxed until explicitly reviewed.

expected_open_decision:
  default_open_mode: semantic_view
  first_class_view: notebook_cell_aware_view
  interaction_posture: editable
  raw_fallback_policy: raw_fallback_read_only

provenance_inputs:
  notebook_format_version: nbformat:4.5
  stable_cell_ids: present
  document_trust_state: document_trust_inherited_from_workspace
  kernel_session_ref: notebook_kernel_session:example:trusted
  execution_context_ref: execution_context:example:notebook
  output_lineage_refs:
    - notebook_output_lineage:example:prior_session

required_surface_cues:
  - cell_identity_visible
  - metadata_filter_state_visible
  - outputs_hidden_by_default
  - active_output_sandbox_state_visible

denied_actions:
  - execute_on_open
  - auto_include_outputs_in_merge
  - strip_unknown_metadata_silently

linked_contract_refs:
  - docs/adr/0022-notebook-document-model-kernel-transport-trust-and-diff-merge.md
  - docs/notebooks/output_viewer_truth_contract.md
  - artifacts/artifacts/debug_fidelity_rows.yaml#artifact_fidelity:jupyter_notebook

expected_result: >
  Open in the cell-aware semantic notebook view. Editing source cells is
  allowed, output inclusion is opt-in, and raw JSON is available only as
  a read-only fallback.
