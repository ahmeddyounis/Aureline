record_kind: artifact_fidelity_example
schema_version: 1
case_id: artifact_fidelity.case.read_only_inspector.crash_core_pending_consent
artifact_family: crash_dump_or_core
fidelity_row_ref: artifact_fidelity:crash_dump_or_core
merge_resolution_policy_ref: merge_policy:crash_dump_or_core

scenario: >
  A core dump exists locally after a crash. Symbolication metadata can be
  inspected, but raw dump export is pending explicit upload consent.

expected_open_decision:
  default_open_mode: read_only_inspector
  first_class_view: crash_viewer_symbolication_report
  interaction_posture: read_only
  raw_fallback_policy: raw_payload_hidden_by_default

provenance_inputs:
  crash_id: crash:example:core_dump
  dump_format: core_dump
  debug_artifact_ref: debug_artifact:example:core_dump_pending_consent
  resolution_state: pending_capture
  mismatch_reason_classes:
    - pending_user_upload_consent
  redaction_class: internal_support_restricted
  support_export_posture: opt_in_only
  symbol_manifest_ref: symbol_manifest:example:pending

required_surface_cues:
  - read_only_note_visible
  - upload_consent_state_visible
  - redaction_class_visible
  - symbolication_state_visible
  - raw_dump_excluded_by_default

denied_actions:
  - edit_dump_bytes
  - upload_raw_dump_without_consent_or_policy
  - symbolize_with_mismatched_symbols

linked_contract_refs:
  - docs/debug/artifact_resolution_seed.md
  - artifacts/support/crash_artifact_retention_seed.json
  - artifacts/artifacts/debug_fidelity_rows.yaml#artifact_fidelity:crash_dump_or_core

expected_result: >
  Open the crash inspector and symbolication report shell. Metadata may
  enter support evidence, but the core body remains local unless consent
  or policy explicitly admits it.
