record_kind: artifact_fidelity_example
schema_version: 1
case_id: artifact_fidelity.case.semantic_view.structured_config_schema_known
artifact_family: structured_config_json
fidelity_row_ref: artifact_fidelity:structured_config_json
merge_resolution_policy_ref: merge_policy:structured_config_json

scenario: >
  A JSON configuration file has a declared schema, a parser version, and
  an unknown-key survival report from the round-trip corpus. It should
  open in semantic view and may offer schema-aware editing.

expected_open_decision:
  default_open_mode: semantic_view
  first_class_view: structured_config_semantic_view
  interaction_posture: editable
  raw_fallback_policy: raw_fallback_allowed_with_loss_warning

provenance_inputs:
  file_identity_ref: file_identity:example:workspace_config
  schema_or_validator_ref: schema:example:workspace_config:v1
  parser_version_ref: parser:json:example:v1
  unknown_key_survival_report_ref: round_trip_report:example:json_unknown_keys_passed
  redaction_class: metadata_safe_default

required_surface_cues:
  - schema_state_visible
  - unknown_key_survival_visible
  - raw_fallback_loss_warning_visible
  - secret_or_policy_redaction_state_visible

denied_actions:
  - auto_merge_when_schema_missing
  - drop_unknown_members_silently
  - expose_secret_values_in_review_rows

linked_contract_refs:
  - docs/review/structured_artifact_review_seed.md
  - artifacts/review/structured_artifact_classes.yaml#review.surface.structured_config_json
  - artifacts/artifacts/debug_fidelity_rows.yaml#artifact_fidelity:structured_config_json

expected_result: >
  Open in the semantic config view. Schema-backed keys may merge where
  semantics are defined, while unknown members survive or block the
  write with an explicit review warning.
