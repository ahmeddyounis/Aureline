# Structured-artifact and debug-fidelity example manifest.
#
# These cases exercise the default_open_mode vocabulary frozen in
# docs/artifacts/structured_artifact_and_debug_fidelity_matrix.md.

schema_version: 1
manifest_id: artifact_fidelity_examples.v1

docs_ref: docs/artifacts/structured_artifact_and_debug_fidelity_matrix.md
fidelity_rows_ref: artifacts/artifacts/debug_fidelity_rows.yaml
merge_resolution_policy_rows_ref: artifacts/artifacts/merge_resolution_policy_rows.yaml

default_open_modes_exercised:
  - semantic_view
  - compare_view
  - read_only_inspector
  - regenerate_review_flow

cases:
  - case_id: artifact_fidelity.case.semantic_view.notebook_trusted_outputs_hidden
    fixture_ref: fixtures/artifacts/fidelity_examples/semantic_view_notebook_trusted_outputs_hidden.yaml
    artifact_family: jupyter_notebook
    expected_default_open_mode: semantic_view
    expected_interaction_posture: editable

  - case_id: artifact_fidelity.case.semantic_view.structured_config_schema_known
    fixture_ref: fixtures/artifacts/fidelity_examples/semantic_view_structured_config_schema_known.yaml
    artifact_family: structured_config_json
    expected_default_open_mode: semantic_view
    expected_interaction_posture: editable

  - case_id: artifact_fidelity.case.compare_view.coverage_profile_two_runs
    fixture_ref: fixtures/artifacts/fidelity_examples/compare_view_coverage_profile_two_runs.yaml
    artifact_family: coverage_profile_artifact
    expected_default_open_mode: compare_view
    expected_interaction_posture: compare_only

  - case_id: artifact_fidelity.case.compare_view.source_map_stale_mapping
    fixture_ref: fixtures/artifacts/fidelity_examples/compare_view_source_map_stale_mapping.yaml
    artifact_family: source_map
    expected_default_open_mode: compare_view
    expected_interaction_posture: compare_only

  - case_id: artifact_fidelity.case.read_only_inspector.native_symbol_mismatch
    fixture_ref: fixtures/artifacts/fidelity_examples/read_only_inspector_native_symbol_mismatch.yaml
    artifact_family: native_symbol_artifact
    expected_default_open_mode: read_only_inspector
    expected_interaction_posture: read_only

  - case_id: artifact_fidelity.case.read_only_inspector.crash_core_pending_consent
    fixture_ref: fixtures/artifacts/fidelity_examples/read_only_inspector_crash_core_pending_consent.yaml
    artifact_family: crash_dump_or_core
    expected_default_open_mode: read_only_inspector
    expected_interaction_posture: read_only

  - case_id: artifact_fidelity.case.regenerate_review.lockfile_solver_conflict
    fixture_ref: fixtures/artifacts/fidelity_examples/regenerate_review_lockfile_solver_conflict.yaml
    artifact_family: lockfile_or_dependency_manifest
    expected_default_open_mode: regenerate_review_flow
    expected_interaction_posture: regenerate_first
