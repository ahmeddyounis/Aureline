record_kind: artifact_fidelity_example
schema_version: 1
case_id: artifact_fidelity.case.regenerate_review.lockfile_solver_conflict
artifact_family: lockfile_or_dependency_manifest
fidelity_row_ref: artifact_fidelity:lockfile_or_dependency_manifest
merge_resolution_policy_ref: merge_policy:lockfile_or_dependency_manifest

scenario: >
  A dependency manifest changed on both sides of a branch merge and the
  lockfile has conflicting solver output. The lockfile should not open
  in a text merge view; the manifest inputs and resolver version are
  pinned for regenerate/review.

expected_open_decision:
  default_open_mode: regenerate_review_flow
  first_class_view: package_graph_compare
  interaction_posture: regenerate_first
  raw_fallback_policy: raw_fallback_read_only

provenance_inputs:
  canonical_manifest_refs:
    - dependency_manifest:example:current
    - dependency_manifest:example:incoming
  resolver_state_ref: resolver_state:example:package_manager
  package_manager_version_ref: package_manager:example:v1
  lockfile_digest_ref: digest:sha256:example_lockfile
  dependency_graph_hash_ref: graph_hash:example:dependency
  platform_factors_ref: platform_factors:example:local

required_surface_cues:
  - canonical_manifest_inputs_visible
  - resolver_version_visible
  - direct_and_transitive_impact_visible
  - raw_text_merge_forbidden_visible
  - validation_tasks_visible

denied_actions:
  - byte_level_auto_merge
  - normalize_solver_output_without_regeneration
  - hide_private_registry_redaction_state

linked_contract_refs:
  - docs/review/structured_artifact_review_seed.md
  - docs/package/package_action_contract.md
  - artifacts/artifacts/debug_fidelity_rows.yaml#artifact_fidelity:lockfile_or_dependency_manifest

expected_result: >
  Open the regenerate/review flow with both manifests and the resolver
  pinned. The accepted result must come from regeneration or explicit
  package graph review, never a silent lockfile text merge.
