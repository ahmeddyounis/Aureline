# Generated-artifact drift, regeneration, and viewer-fallback corpus.
#
# Stable ids for the generated-artifact safe-edit policy. Search, open,
# review, AI, export, and support surfaces should cite these ids and the
# shared posture vocabulary rather than inventing surface-local badges.

schema_version: 1
corpus_id: generated.drift_regeneration_manifest.v1
summary: >
  Reviewer-facing corpus covering clean regenerate, stale generated
  artifact, diverged generated artifact with unknown source, preview
  snapshot mock provenance, mirrored artifact drift, and structured-viewer
  fallback when round-trip-safe editing is not proven.

policy_doc: docs/architecture/generated_artifact_safe_edit_policy.md
boundary_schema: schemas/generated/artifact_edit_posture.schema.json
examples_readme: artifacts/generated/viewer_fallback_examples/README.md
lineage_schema: schemas/workspace/generated_artifact_lineage.schema.json

artifact_class_vocabulary:
  - build_output
  - codegen_source_sibling
  - structured_lockfile
  - notebook_output
  - preview_render_snapshot
  - mirrored_pack_artifact

artifact_origin_class_vocabulary:
  - canonical_source
  - generated_artifact
  - mirrored_artifact
  - imported_artifact
  - preview_projection

provenance_state_vocabulary:
  - not_applicable
  - in_sync
  - stale_inputs
  - generator_changed
  - diverged_from_generator
  - unknown_lineage
  - mock_provenance
  - mirror_drift

default_edit_posture_vocabulary:
  - edit_here
  - edit_canonical_source
  - regenerate_from_source
  - structured_safe_edit
  - inspect_read_only
  - replace_by_mirror_promotion
  - clear_or_reexecute

rebuild_intent_vocabulary:
  - none_required
  - regenerate_recommended
  - regenerate_required_before_authoritative_claims
  - rebuild_required_before_authoritative_claims
  - reexecute_required_for_fresh_output
  - mirror_refresh_required
  - manual_recovery_required

viewer_fallback_state_vocabulary:
  - not_needed
  - compare_only
  - structured_viewer_with_raw_text_fallback
  - structured_viewer_with_raw_bytes_fallback
  - canonical_source_redirect
  - read_only_viewer_only

surface_projection_vocabulary:
  - search_result
  - open_view
  - review_diff
  - ai_context
  - support_export
  - export_packet

cases:
  - case_id: generated.posture.clean_regenerate.codegen_client
    artifact_class: codegen_source_sibling
    artifact_origin_class: generated_artifact
    provenance_state: in_sync
    default_edit_posture: edit_canonical_source
    canonical_source_resolution_state: known
    rebuild_intent_class: none_required
    override_policy_class: declared_full_override_with_divergence
    viewer_fallback_state: not_needed
    required_surface_projections:
      - search_result
      - open_view
      - ai_context
      - export_packet
      - support_export
    example_ref: artifacts/generated/viewer_fallback_examples/codegen_clean_regenerate.json

  - case_id: generated.posture.stale_lockfile.safe_ranges
    artifact_class: structured_lockfile
    artifact_origin_class: generated_artifact
    provenance_state: stale_inputs
    default_edit_posture: structured_safe_edit
    canonical_source_resolution_state: multiple_known
    rebuild_intent_class: regenerate_required_before_authoritative_claims
    override_policy_class: declared_safe_ranges_only
    viewer_fallback_state: not_needed
    required_surface_projections:
      - search_result
      - open_view
      - export_packet
      - support_export
    example_ref: artifacts/generated/viewer_fallback_examples/structured_lockfile_stale_generated.json

  - case_id: generated.posture.diverged_unknown_source.manual_recovery
    artifact_class: codegen_source_sibling
    artifact_origin_class: generated_artifact
    provenance_state: diverged_from_generator
    canonical_source_resolution_state: unknown
    default_edit_posture: inspect_read_only
    rebuild_intent_class: manual_recovery_required
    override_policy_class: declared_full_override_with_divergence
    viewer_fallback_state: read_only_viewer_only
    required_surface_projections:
      - search_result
      - open_view
      - export_packet
      - support_export
    example_ref: artifacts/generated/viewer_fallback_examples/generated_unknown_source_diverged.json

  - case_id: generated.posture.preview_mock_snapshot.redirect
    artifact_class: preview_render_snapshot
    artifact_origin_class: preview_projection
    provenance_state: mock_provenance
    canonical_source_resolution_state: known
    default_edit_posture: inspect_read_only
    rebuild_intent_class: reexecute_required_for_fresh_output
    override_policy_class: not_available
    viewer_fallback_state: canonical_source_redirect
    required_surface_projections:
      - search_result
      - open_view
      - review_diff
      - ai_context
      - support_export
    example_ref: artifacts/generated/viewer_fallback_examples/preview_snapshot_mock_provenance.json

  - case_id: generated.posture.mirror_drift.docs_pack
    artifact_class: mirrored_pack_artifact
    artifact_origin_class: mirrored_artifact
    provenance_state: mirror_drift
    canonical_source_resolution_state: external_known
    default_edit_posture: replace_by_mirror_promotion
    rebuild_intent_class: mirror_refresh_required
    override_policy_class: mirror_promotion_only
    viewer_fallback_state: not_needed
    required_surface_projections:
      - search_result
      - open_view
      - export_packet
      - support_export
    example_ref: artifacts/generated/viewer_fallback_examples/mirrored_docs_pack_drifted.json

  - case_id: generated.posture.notebook_output.viewer_fallback
    artifact_class: notebook_output
    artifact_origin_class: generated_artifact
    provenance_state: in_sync
    canonical_source_resolution_state: known
    default_edit_posture: clear_or_reexecute
    rebuild_intent_class: reexecute_required_for_fresh_output
    override_policy_class: not_available
    viewer_fallback_state: structured_viewer_with_raw_text_fallback
    required_surface_projections:
      - open_view
      - review_diff
      - export_packet
      - support_export
    example_ref: artifacts/generated/viewer_fallback_examples/notebook_output_structured_viewer_fallback.json

  - case_id: generated.posture.build_output.release_binary
    artifact_class: build_output
    artifact_origin_class: generated_artifact
    provenance_state: in_sync
    canonical_source_resolution_state: multiple_known
    default_edit_posture: inspect_read_only
    rebuild_intent_class: rebuild_required_before_authoritative_claims
    override_policy_class: not_available
    viewer_fallback_state: not_needed
    required_surface_projections:
      - search_result
      - open_view
      - export_packet
      - support_export
    example_ref: artifacts/generated/viewer_fallback_examples/build_output_release_binary.json

coverage_contract:
  required_cases:
    - generated.posture.clean_regenerate.codegen_client
    - generated.posture.stale_lockfile.safe_ranges
    - generated.posture.diverged_unknown_source.manual_recovery
    - generated.posture.preview_mock_snapshot.redirect
    - generated.posture.mirror_drift.docs_pack
    - generated.posture.notebook_output.viewer_fallback
    - generated.posture.build_output.release_binary
  required_surface_minimum:
    - search_result
    - open_view
    - export_packet
    - support_export
  policy_rule: >
    Search, review, AI, export, and support/export packets must preserve
    artifact_origin_class, provenance_state, default_edit_posture, and
    do_not_imply_canonical_source without substituting freeform wording
    or surface-specific badges.
