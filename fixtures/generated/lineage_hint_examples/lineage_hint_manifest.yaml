# Row lineage-hint corpus.
#
# Stable case ids for row-level lineage hints on explorer, quick-open,
# full-search, symbol-jump, docs-search, cross-repo, graph-overlay,
# AI-citation, and support / export reference surfaces. Surfaces cite
# these ids and the shared vocabulary below instead of minting surface-
# local row-origin badges.

schema_version: 1
corpus_id: generated.lineage_hint_manifest.v1

summary: >
  Reviewer-facing corpus of row_lineage_hint_record cases covering
  build outputs, clean generated source siblings, diverged generated
  source siblings with unknown canonical source, stale structured
  lockfiles, drifted mirrored docs-pack artifacts, preview render
  snapshots backed by mock data, and notebook outputs that require a
  structured-viewer fallback. Each case joins to a posture record
  under artifacts/generated/viewer_fallback_examples/ and, where
  available, to a generated-artifact lineage record under
  fixtures/workspace/mutation_lineage_examples/.

packet_doc: docs/generated/lineage_hint_packet.md
policy_doc: docs/architecture/generated_artifact_safe_edit_policy.md
posture_schema: schemas/generated/artifact_edit_posture.schema.json
posture_corpus: fixtures/generated/drift_regeneration_manifest.yaml
lineage_schema: schemas/workspace/generated_artifact_lineage.schema.json
search_schema: schemas/search/search_result_truth.schema.json
row_examples_readme: artifacts/generated/explorer_search_rows/README.md

# ---------------------------------------------------------------------
# Frozen row-hint vocabulary. Tooling reads these blocks; row hints
# MUST NOT mint tokens outside the enumerations below. Tokens mirrored
# from the posture schema are cited here for local parity.
# ---------------------------------------------------------------------

row_lineage_hint_schema_version: 1

row_surface_class_vocabulary:
  - explorer_tree_row
  - quick_open_row
  - full_search_row
  - symbol_jump_row
  - docs_search_row
  - cross_repo_result_row
  - graph_overlay_row
  - ai_citation_row
  - support_export_row
  - export_packet_row

row_action_class_vocabulary:
  - open_in_canonical_source
  - regenerate_from_source
  - refresh_mirror
  - clear_or_reexecute
  - open_structured_viewer
  - open_read_only_viewer
  - open_provenance_panel
  - copy_posture_ref

row_chip_token_prefix_vocabulary:
  - origin
  - class
  - drift
  - posture
  - rebuild
  - viewer_fallback
  - override_required

# Tokens below are cited verbatim from the posture schema. A case that
# introduces a value outside these lists must bump the posture schema
# first; this corpus adopts the new token by reference.
artifact_class_vocabulary:
  - build_output
  - codegen_source_sibling
  - structured_lockfile
  - notebook_output
  - preview_render_snapshot
  - mirrored_pack_artifact

artifact_origin_class_vocabulary:
  - canonical_source
  - generated_artifact
  - mirrored_artifact
  - imported_artifact
  - preview_projection

provenance_state_vocabulary:
  - not_applicable
  - in_sync
  - stale_inputs
  - generator_changed
  - diverged_from_generator
  - unknown_lineage
  - mock_provenance
  - mirror_drift

default_edit_posture_vocabulary:
  - edit_here
  - edit_canonical_source
  - regenerate_from_source
  - structured_safe_edit
  - inspect_read_only
  - replace_by_mirror_promotion
  - clear_or_reexecute

rebuild_intent_class_vocabulary:
  - none_required
  - regenerate_recommended
  - regenerate_required_before_authoritative_claims
  - rebuild_required_before_authoritative_claims
  - reexecute_required_for_fresh_output
  - mirror_refresh_required
  - manual_recovery_required

canonical_source_resolution_state_vocabulary:
  - known
  - multiple_known
  - external_known
  - unknown

generator_or_resolver_owner_class_vocabulary:
  - generator
  - resolver
  - kernel
  - preview_runtime
  - mirror_source
  - import_source
  - unknown

forbidden_implication_vocabulary:
  - imply_canonical_source
  - offer_unreviewed_direct_edit
  - omit_provenance_state
  - export_body_without_provenance
  - hide_fallback_reason
  - hide_regeneration_path

redaction_class_vocabulary:
  - metadata_safe_default
  - support_redaction_applied
  - export_redaction_applied

# ---------------------------------------------------------------------
# Required cases. Each case exercises a distinct combination the
# safe-edit policy and the row-hint packet must continue to cover.
# ---------------------------------------------------------------------
cases:

  - case_id: generated.row_hint.build_output.release_binary
    artifact_class: build_output
    artifact_origin_class: generated_artifact
    provenance_state: in_sync
    default_edit_posture: inspect_read_only
    canonical_source_resolution_state: multiple_known
    generator_or_resolver_owner_class: generator
    rebuild_intent_class: rebuild_required_before_authoritative_claims
    viewer_fallback_state: not_needed
    required_row_surfaces:
      - explorer_tree_row
      - quick_open_row
      - full_search_row
      - support_export_row
      - export_packet_row
    required_row_actions:
      - open_read_only_viewer
      - regenerate_from_source
      - open_provenance_panel
    artifact_posture_ref: generated.posture.build_output_release_binary
    posture_example_ref: artifacts/generated/viewer_fallback_examples/build_output_release_binary.json
    row_example_ref: artifacts/generated/explorer_search_rows/build_output_release_binary_row.json
    lineage_example_ref: fixtures/workspace/mutation_lineage_examples/build_output_lineage.json

  - case_id: generated.row_hint.codegen_sibling.clean
    artifact_class: codegen_source_sibling
    artifact_origin_class: generated_artifact
    provenance_state: in_sync
    default_edit_posture: edit_canonical_source
    canonical_source_resolution_state: known
    generator_or_resolver_owner_class: generator
    rebuild_intent_class: none_required
    viewer_fallback_state: not_needed
    required_row_surfaces:
      - explorer_tree_row
      - quick_open_row
      - full_search_row
      - symbol_jump_row
      - ai_citation_row
      - support_export_row
      - export_packet_row
    required_row_actions:
      - open_in_canonical_source
      - regenerate_from_source
      - open_read_only_viewer
      - open_provenance_panel
    artifact_posture_ref: generated.posture.codegen_clean_regenerate
    posture_example_ref: artifacts/generated/viewer_fallback_examples/codegen_clean_regenerate.json
    row_example_ref: artifacts/generated/explorer_search_rows/codegen_source_sibling_clean_row.json

  - case_id: generated.row_hint.codegen_sibling.diverged
    artifact_class: codegen_source_sibling
    artifact_origin_class: generated_artifact
    provenance_state: diverged_from_generator
    default_edit_posture: inspect_read_only
    canonical_source_resolution_state: unknown
    generator_or_resolver_owner_class: unknown
    rebuild_intent_class: manual_recovery_required
    viewer_fallback_state: read_only_viewer_only
    required_row_surfaces:
      - explorer_tree_row
      - quick_open_row
      - full_search_row
      - support_export_row
      - export_packet_row
    required_row_actions:
      - open_read_only_viewer
      - open_provenance_panel
      - copy_posture_ref
    artifact_posture_ref: generated.posture.diverged_unknown_source
    posture_example_ref: artifacts/generated/viewer_fallback_examples/generated_unknown_source_diverged.json
    row_example_ref: artifacts/generated/explorer_search_rows/codegen_source_sibling_diverged_row.json

  - case_id: generated.row_hint.structured_lockfile.stale
    artifact_class: structured_lockfile
    artifact_origin_class: generated_artifact
    provenance_state: stale_inputs
    default_edit_posture: structured_safe_edit
    canonical_source_resolution_state: multiple_known
    generator_or_resolver_owner_class: resolver
    rebuild_intent_class: regenerate_required_before_authoritative_claims
    viewer_fallback_state: not_needed
    required_row_surfaces:
      - explorer_tree_row
      - quick_open_row
      - full_search_row
      - support_export_row
      - export_packet_row
    required_row_actions:
      - open_structured_viewer
      - regenerate_from_source
      - open_in_canonical_source
      - open_provenance_panel
    artifact_posture_ref: generated.posture.structured_lockfile_stale
    posture_example_ref: artifacts/generated/viewer_fallback_examples/structured_lockfile_stale_generated.json
    row_example_ref: artifacts/generated/explorer_search_rows/structured_lockfile_stale_row.json

  - case_id: generated.row_hint.mirrored_pack.drifted
    artifact_class: mirrored_pack_artifact
    artifact_origin_class: mirrored_artifact
    provenance_state: mirror_drift
    default_edit_posture: replace_by_mirror_promotion
    canonical_source_resolution_state: external_known
    generator_or_resolver_owner_class: mirror_source
    rebuild_intent_class: mirror_refresh_required
    viewer_fallback_state: not_needed
    required_row_surfaces:
      - explorer_tree_row
      - quick_open_row
      - full_search_row
      - docs_search_row
      - cross_repo_result_row
      - support_export_row
      - export_packet_row
    required_row_actions:
      - open_read_only_viewer
      - refresh_mirror
      - open_provenance_panel
      - copy_posture_ref
    artifact_posture_ref: generated.posture.mirrored_docs_pack_drifted
    posture_example_ref: artifacts/generated/viewer_fallback_examples/mirrored_docs_pack_drifted.json
    row_example_ref: artifacts/generated/explorer_search_rows/mirrored_docs_pack_drifted_row.json

  - case_id: generated.row_hint.preview_snapshot.mock
    artifact_class: preview_render_snapshot
    artifact_origin_class: preview_projection
    provenance_state: mock_provenance
    default_edit_posture: inspect_read_only
    canonical_source_resolution_state: known
    generator_or_resolver_owner_class: preview_runtime
    rebuild_intent_class: reexecute_required_for_fresh_output
    viewer_fallback_state: canonical_source_redirect
    required_row_surfaces:
      - explorer_tree_row
      - quick_open_row
      - full_search_row
      - ai_citation_row
      - support_export_row
      - export_packet_row
    required_row_actions:
      - open_read_only_viewer
      - open_in_canonical_source
      - clear_or_reexecute
      - open_provenance_panel
    artifact_posture_ref: generated.posture.preview_snapshot_mock_provenance
    posture_example_ref: artifacts/generated/viewer_fallback_examples/preview_snapshot_mock_provenance.json
    row_example_ref: artifacts/generated/explorer_search_rows/preview_snapshot_mock_row.json

  - case_id: generated.row_hint.notebook_output.fallback
    artifact_class: notebook_output
    artifact_origin_class: generated_artifact
    provenance_state: in_sync
    default_edit_posture: clear_or_reexecute
    canonical_source_resolution_state: known
    generator_or_resolver_owner_class: kernel
    rebuild_intent_class: reexecute_required_for_fresh_output
    viewer_fallback_state: structured_viewer_with_raw_text_fallback
    required_row_surfaces:
      - explorer_tree_row
      - quick_open_row
      - full_search_row
      - support_export_row
      - export_packet_row
    required_row_actions:
      - open_structured_viewer
      - clear_or_reexecute
      - open_in_canonical_source
      - open_read_only_viewer
      - open_provenance_panel
    artifact_posture_ref: generated.posture.notebook_output_viewer_fallback
    posture_example_ref: artifacts/generated/viewer_fallback_examples/notebook_output_structured_viewer_fallback.json
    row_example_ref: artifacts/generated/explorer_search_rows/notebook_output_fallback_row.json

# ---------------------------------------------------------------------
# Coverage contract. Every listed case id is required. Every listed
# row surface class must appear on at least one case. Every required
# row action class must appear on at least one case.
# ---------------------------------------------------------------------
coverage_contract:
  required_cases:
    - generated.row_hint.build_output.release_binary
    - generated.row_hint.codegen_sibling.clean
    - generated.row_hint.codegen_sibling.diverged
    - generated.row_hint.structured_lockfile.stale
    - generated.row_hint.mirrored_pack.drifted
    - generated.row_hint.preview_snapshot.mock
    - generated.row_hint.notebook_output.fallback
  required_row_surface_minimum:
    - explorer_tree_row
    - quick_open_row
    - full_search_row
    - support_export_row
    - export_packet_row
  required_row_action_minimum:
    - open_in_canonical_source
    - regenerate_from_source
    - refresh_mirror
    - clear_or_reexecute
    - open_structured_viewer
    - open_read_only_viewer
    - open_provenance_panel
    - copy_posture_ref
  policy_rule: >
    Explorer, quick-open, search, docs-search, cross-repo, graph-
    overlay, AI-citation, support-export, and export-packet row
    emissions MUST preserve artifact_class, artifact_origin_class,
    provenance_state, default_edit_posture, canonical_source_ref,
    generator_or_resolver_identity, rebuild_intent_class,
    row_chip_tokens, do_not_imply_canonical_source, and
    forbidden_implications without substituting freeform wording or
    surface-specific badges. Row hints project the safe-edit posture
    record; they do not replace it.
