  name: offline_triage_snapshot_drained_rejected_freshness_floor
  scenario: >
    Worked offline triage snapshot captured on the iOS native companion
    while the responder was off-network and submitted for drain back to
    the desktop later. The desktop publish-later queue rejected the
    drain with a typed freshness-floor reason because the captured
    work-item-detail freshness state had drifted past the freshness
    floor; the snapshot remains in the chronology rather than being
    silently dropped, and the responder must capture a fresh snapshot
    or admit the drain through a different envelope.
