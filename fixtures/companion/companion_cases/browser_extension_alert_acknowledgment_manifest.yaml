__fixture__:
  name: browser_extension_alert_acknowledgment_manifest
  scenario: >
    Worked companion capability manifest for a Chromium browser
    extension on an enterprise-online deployment. The extension
    inspects alert-page snapshots and incident workspaces and
    acknowledges alerts by reusing the desktop canonical_event_id;
    the extension never mints a private canonical_event_id. The
    notification policy resolves to in_product_only_no_lock_screen_payload
    so OS lock-screen surfaces are denied entirely. Quiet-hours
    inheritance reuses the desktop set without widening; the extension
    MAY narrow locally (e.g. silence collaboration mentions on the
    extension while the desktop still surfaces them).
  exercised_classes_summary:
    companion_surface_class: browser_extension_companion
    companion_platform_class: platform_browser_extension_chromium
    auth_posture_class: browser_handoff_session_only_no_persistent_token
    freshness_posture_class: warm_within_grace_companion_marks_warm
    offline_posture_class: allow_cached_inspection_no_mutation
    notification_policy_class: in_product_only_no_lock_screen_payload
    quiet_hours_inheritance_class: narrow_locally_never_widen_beyond_desktop_set
    target_attach_class: scoped_follow_handoff_via_browser_handoff_packet_only
    deployment_profile_class_set:
      - enterprise_online

companion_capability_manifest_schema_version: 1
record_kind: companion_capability_manifest_record

manifest_id: companion.manifest.browser_extension_alert_acknowledgment

title: Chromium browser extension alert acknowledgment (enterprise online)
summary: >
  Chromium browser extension companion pinned to alert acknowledgment
  by reusing desktop canonical_event_id with in-product-only delivery
  and scoped follow / handoff to system browser via the typed
  browser-handoff packet.

