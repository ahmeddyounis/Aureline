notification_policy_class: in_product_only_no_lock_screen_payload
quiet_hours_inheritance_class: narrow_locally_never_widen_beyond_desktop_set
target_attach_class: scoped_follow_handoff_via_browser_handoff_packet_only

redaction_class: internal_support_restricted

