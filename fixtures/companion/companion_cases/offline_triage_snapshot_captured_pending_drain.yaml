__fixture__:
  name: offline_triage_snapshot_captured_pending_drain
  scenario: >
    Worked offline triage snapshot captured on the iOS native companion
    app while the responder was off-network during a sev3 incident
    inspection. The snapshot reuses the canonical incident_workspace
    record id and the desktop audit_event_id rows from the operational
    chronology; nothing is minted on the companion side. The snapshot
    fails closed at captured_local_only_pending_drain because the
    desktop publish-later / approval-ticket envelope has not yet
    admitted the drain. The freshness posture stamp records that the
    capture was offline and forbids any drain through canonical_event_id
    dismissal reuse.
  exercised_classes_summary:
    snapshot_kind_class: incident_workspace_inspection_snapshot
    referenced_canonical_object_kind_class: incident_workspace_record_target
    drain_state_class: captured_local_only_pending_drain
    drain_admission_class: drain_blocked_pending_target_resolution
    replay_posture_class: request_drain_admit_via_desktop_envelope
    freshness_posture_class: captured_offline_no_live_path_at_capture

