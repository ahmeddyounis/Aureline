# yaml-language-server: $schema=../../../schemas/companion/companion_capability_manifest.schema.json
__fixture__:
  name: mobile_native_approval_request_manifest
  scenario: >
    Worked companion capability manifest for the iOS native companion
    app on a managed-cloud deployment. The manifest pins read-only
    inspection of approval-tickets and work-item details, plus a
    scoped request_approval_via_approval_ticket action gated by
    biometric / local passkey step-up per approval. The companion
    captures the approval request and routes it through the desktop
    approval-ticket envelope rather than minting a parallel approval
    lineage. notification_policy_class resolves to
    lock_screen_safe_scoped_with_workspace_or_session_label so OS
    notifications carry workspace / session label only, never object
    identity. quiet-hours inheritance reuses the desktop set;
    managed-cloud overlay narrowing is admissible.
  exercised_classes_summary:
    companion_surface_class: mobile_native_app_companion
    companion_platform_class: platform_ios_native
    auth_posture_class: managed_workspace_remote_attach_session_handle
    freshness_posture_class: live_authoritative_fresh_within_grace
    offline_posture_class: allow_offline_triage_capture_drain_to_desktop
    notification_policy_class: lock_screen_safe_scoped_with_workspace_or_session_label
    quiet_hours_inheritance_class: managed_admin_quiet_hours_overlay_narrowing_only
    target_attach_class: scoped_follow_handoff_via_browser_handoff_packet_only
    step_up_requirement_class: biometric_or_local_passkey_required_for_each_approval
    deployment_profile_class_set:
      - managed_cloud

