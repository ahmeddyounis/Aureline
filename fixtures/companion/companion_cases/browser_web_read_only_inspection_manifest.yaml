manifest_id: companion.manifest.browser_web_read_only_inspection.self_hosted

title: Browser web companion read-only inspection (self-hosted)
summary: >
  Browser web companion app pinned to read-only inspection of incident
  workspaces, work-item details, review workspaces, runbook packets,
