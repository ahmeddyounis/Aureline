# yaml-language-server: $schema=../../../schemas/diagnostics/problem_evidence_chain.schema.json
record_kind: problem_evidence_chain_record
problem_evidence_chain_schema_version: 1
problem_chain_id: problem-chain:build-output:orders-typecheck:01
chain_state_class: active_current
source_class: normalized_task_event
problem_projection:
  problem_ref: problem:orders-typecheck:status-assignment:01
  problem_row_ref: problems-row:orders-typecheck:status-assignment:01
  diagnostic_cluster_ref: lang:diagcluster:orders-status-assignment:01
  rule_ref: rule:typescript:TS2322
  category_ref: category:typecheck:assignability
  severity_class: error
  user_visible_title: Type mismatch reported by the current build output.
  primary_anchor_ref: anchor:orders-service:status-assignment:current
  summary: The problem row is backed by a current structured build task event and an exact diagnostic cluster.
origin_records:
  - record_kind: task_event_envelope_record
    record_ref: tooling:event:orders-build:diagnostic:status-assignment:01
    source_class: normalized_task_event
    source_truth_ceiling_class: source_truth_preserved
    chain_role_class: origin_output
    emitted_at: "2026-04-29T13:12:20Z"
    summary: Structured build adapter emitted the diagnostic fields and exact anchor for the current execution context.
  - record_kind: diagnostic_cluster_record
    record_ref: lang:diagcluster:orders-status-assignment:01
    source_class: structured_language_diagnostic
    source_truth_ceiling_class: source_truth_preserved
    chain_role_class: primary_problem
    emitted_at: "2026-04-29T13:12:22Z"
    summary: Diagnostic cluster preserves the compiler source and canonical problem row projection.
linked_outputs:
  - output_kind: task_event_envelope
    output_ref: tooling:event:orders-build:diagnostic:status-assignment:01
    event_ref: tooling:event:orders-build:diagnostic:status-assignment:01
    artifact_ref: null
    output_channel_ref: output-channel:orders-build:stderr
    chain_role_class: origin_output
    retention_class: retained_local_support_bundle_only
    retention_ref: raw:orders-build:stderr:slice:status-assignment:01
    summary: Output viewer can open the retained redacted build-output slice that produced the problem row.
  - output_kind: output_viewer_object
    output_ref: output-viewer:orders-build:diagnostics:01
    event_ref: tooling:event:orders-build:diagnostic:status-assignment:01
    artifact_ref: null
    output_channel_ref: output-channel:orders-build:diagnostics
    chain_role_class: supporting_event
    retention_class: retained_local_support_bundle_only
    retention_ref: output-retention:orders-build:diagnostics:01
    summary: The diagnostics output viewer shares the chain id instead of inventing a local problem id.
target_context:
  target_context_class: execution_run
  workspace_ref: workspace:orders-webapp
  execution_context_ref: exec-context:orders-webapp:local-node20:build:01
  target_ref: target:orders-webapp:typecheck
  toolchain_ref: toolchain:node20-typescript
  environment_ref: environment:local-dev:node20
  run_ref: run:orders-webapp:typecheck:20260429:01
  support_or_release_context_ref: null
  summary: Evidence was collected during the current local typecheck run for the orders workspace target.
freshness:
  freshness_class: current
  assessed_at: "2026-04-29T13:12:23Z"
  producer_epoch_ref: epoch:build-graph:orders-webapp:20260429:01
  current_epoch_ref: epoch:workspace:orders-webapp:20260429:01
  stale_after_ref: freshness-floor:build-diagnostics:current-run
  summary: The task event and problem row were emitted under the current accepted workspace and build epochs.
remap_state:
  remap_state_class: exact
  original_anchor_ref: anchor:orders-service:status-assignment:current
  current_anchor_ref: anchor:orders-service:status-assignment:current
  remap_family_ref: remap-family:orders-service:status-assignment
  remap_evidence_ref: remap-evidence:orders-service:status-assignment:exact:01
  summary: The source diagnostic supplied an exact current anchor; no remap was needed.
confidence:
  confidence_class: exact
  label: Exact
  source_truth_ceiling_class: source_truth_preserved
  required_disclosure: Exact source evidence from the structured build task event.
  downgrade_applied: false
  downgrade_triggers: []
  no_stronger_than_refs:
    - tooling:event:orders-build:diagnostic:status-assignment:01
    - lang:diagcluster:orders-status-assignment:01
  summary: The chain may claim exact confidence only because the current structured event supplied the diagnostic fields directly.
correlation_basis:
  correlation_basis_class: same_event_chain
  causality_claim_class: proven_same_source
  equivalence_key_ref: equivalence:orders-typecheck:TS2322:status-assignment
  related_chain_refs: []
  contradictory_evidence_refs: []
  summary: The problem row and output viewer share the same task event lineage.
evidence_refs:
  - evidence_ref_kind: task_event_ref
    evidence_ref: tooling:event:orders-build:diagnostic:status-assignment:01
    chain_role_class: origin_output
    redaction_class: metadata_safe_default
    retention_class: retained_local_support_bundle_only
    included_in_exports:
      - local_diagnosis_view
      - support_bundle
      - release_packet
      - cli_json
    omission_reason_ref: null
    summary: Structured task event is included by ref across local, support, release, and CLI projections.
  - evidence_ref_kind: sanitized_output_slice_ref
    evidence_ref: output-slice:orders-build:stderr:status-assignment:01
    chain_role_class: origin_output
    redaction_class: metadata_safe_default
    retention_class: retained_local_support_bundle_only
    included_in_exports:
      - local_diagnosis_view
      - support_bundle
    omission_reason_ref: null
    summary: Sanitized output slice provides a support-safe backlink to the build output.
  - evidence_ref_kind: diagnostic_ref
    evidence_ref: lang:diagcluster:orders-status-assignment:01
    chain_role_class: primary_problem
    redaction_class: metadata_safe_default
    retention_class: reference_only
    included_in_exports:
      - local_diagnosis_view
      - support_bundle
      - review_packet
      - cli_json
    omission_reason_ref: null
    summary: Diagnostic cluster links the problem row to the same chain id.
collapse_projection:
  collapse_class: no_collapse
  causality_claim_class: proven_same_source
  collapsed_problem_refs: []
  expanded_chain_refs:
    - problem-chain:build-output:orders-typecheck:01
  detail_only_evidence_refs:
    - output-slice:orders-build:stderr:status-assignment:01
  distinct_evidence_preserved: true
  user_copy: One current build diagnostic produced this problem row.
  summary: The row is not collapsed with other signals, but the output backlink remains available in detail view.
export_projection:
  stable_export_refs:
    - support-export:item:orders-typecheck:problem-chain:01
    - release-packet:quality:orders-typecheck:chain-ref:01
  surfaces:
    - surface_class: local_diagnosis_view
      cite_problem_chain_id: true
      cite_confidence_class: true
      cite_origin_records: true
      raw_payload_included: false
      redaction_class: metadata_safe_default
      export_ref: local-diagnosis:orders-typecheck:problem-chain:01
      summary: Local diagnosis cites the chain id and opens the output viewer by ref.
    - surface_class: support_bundle
      cite_problem_chain_id: true
      cite_confidence_class: true
      cite_origin_records: true
      raw_payload_included: false
      redaction_class: metadata_safe_default
      export_ref: support-export:item:orders-typecheck:problem-chain:01
      summary: Support export includes the chain metadata and sanitized output backlink.
    - surface_class: release_packet
      cite_problem_chain_id: true
      cite_confidence_class: true
      cite_origin_records: true
      raw_payload_included: false
      redaction_class: signing_evidence_only
      export_ref: release-packet:quality:orders-typecheck:chain-ref:01
      summary: Release packet cites the chain id and exact confidence without embedding raw output.
  summary: All export surfaces cite the same chain id and confidence class.
chronology:
  created_at: "2026-04-29T13:12:20Z"
  last_updated_at: "2026-04-29T13:12:23Z"
  superseded_by_chain_ref: null
  support_capture_ref: support-capture:orders-typecheck:20260429:01
aggregate_counts:
  origin_record_count: 2
  linked_output_count: 2
  evidence_ref_count: 3
  related_chain_count: 0
  distinct_target_count: 1
  stale_or_imported_evidence_count: 0
  heuristic_or_correlated_evidence_count: 0
policy_context:
  policy_epoch_ref: policy-epoch:trusted-local:20260429:01
  trust_state_ref: trust-state:workspace:trusted
  redaction_profile_ref: redaction-profile:metadata-safe-default
redaction_class: metadata_safe_default
export_safe_summary: Current structured build output, problem row, output viewer, and support/release exports cite one exact problem chain.
