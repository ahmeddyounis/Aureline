# yaml-language-server: $schema=../../../schemas/diagnostics/problem_evidence_chain.schema.json
record_kind: problem_evidence_chain_record
problem_evidence_chain_schema_version: 1
problem_chain_id: problem-chain:placeholder:project-doctor-startup:01
chain_state_class: placeholder_requires_review
source_class: unknown_placeholder
problem_projection:
  problem_ref: problem:placeholder:project-doctor-startup:01
  problem_row_ref: problems-row:placeholder:project-doctor-startup:01
  diagnostic_cluster_ref: null
  rule_ref: null
  category_ref: category:support:startup-diagnosis
  severity_class: unknown
  user_visible_title: Startup issue needs a rerun before cause is known.
  primary_anchor_ref: null
  summary: Placeholder row preserves support triage identity without inventing a diagnostic source.
origin_records:
  - record_kind: unknown_origin_placeholder
    record_ref: origin-placeholder:project-doctor-startup:01
    source_class: unknown_placeholder
    source_truth_ceiling_class: source_truth_unknown
    chain_role_class: placeholder_gap
    emitted_at: null
    summary: No source event, diagnostic cluster, import record, or output slice has been attached yet.
linked_outputs:
  - output_kind: unknown_output_record
    output_ref: output-placeholder:project-doctor-startup:01
    event_ref: null
    artifact_ref: null
    output_channel_ref: null
    chain_role_class: placeholder_gap
    retention_class: intentionally_omitted
    retention_ref: null
    summary: Output is intentionally absent until the user reruns the diagnostic probe or exports support data.
target_context:
  target_context_class: unknown_target
  workspace_ref: workspace:unknown-current
  execution_context_ref: null
  target_ref: null
  toolchain_ref: null
  environment_ref: null
  run_ref: null
  support_or_release_context_ref: support-case:project-doctor-startup:pending
  summary: Target context is not established; rerun must capture execution context before any stronger claim.
freshness:
  freshness_class: unknown_requires_review
  assessed_at: "2026-04-29T17:35:00Z"
  producer_epoch_ref: null
  current_epoch_ref: null
  stale_after_ref: freshness-floor:placeholder:rerun-required
  summary: No source epoch is available, so the placeholder cannot claim current or imported freshness.
remap_state:
  remap_state_class: unknown_requires_review
  original_anchor_ref: null
  current_anchor_ref: null
  remap_family_ref: null
  remap_evidence_ref: null
  summary: No anchor or remap evidence exists for this placeholder.
confidence:
  confidence_class: unknown
  label: Unknown
  source_truth_ceiling_class: source_truth_unknown
  required_disclosure: Cause unknown; rerun the diagnostic probe or attach evidence before taking action.
  downgrade_applied: true
  downgrade_triggers:
    - source_record_missing
    - target_context_missing
    - confidence_unknown_requires_review
  no_stronger_than_refs:
    - origin-placeholder:project-doctor-startup:01
  summary: The chain exists only to preserve triage identity and cannot be upgraded without a new source record.
correlation_basis:
  correlation_basis_class: placeholder_no_cause
  causality_claim_class: unknown
  equivalence_key_ref: null
  related_chain_refs: []
  contradictory_evidence_refs: []
  summary: No correlation, source, or cause has been established.
evidence_refs:
  - evidence_ref_kind: user_report_ref
    evidence_ref: support-report:project-doctor-startup:pending-user-note
    chain_role_class: placeholder_gap
    redaction_class: metadata_safe_default
    retention_class: reference_only
    included_in_exports:
      - local_diagnosis_view
      - support_bundle
    omission_reason_ref: null
    summary: User-visible placeholder note is exportable as triage metadata only.
  - evidence_ref_kind: redaction_report_ref
    evidence_ref: redaction-report:project-doctor-startup:placeholder:01
    chain_role_class: support_export_evidence
    redaction_class: metadata_safe_default
    retention_class: reference_only
    included_in_exports:
      - support_bundle
    omission_reason_ref: null
    summary: Redaction report records that no raw diagnostic output was captured for the placeholder.
collapse_projection:
  collapse_class: placeholder_until_rerun
  causality_claim_class: unknown
  collapsed_problem_refs:
    - problem:placeholder:project-doctor-startup:01
  expanded_chain_refs:
    - problem-chain:placeholder:project-doctor-startup:01
  detail_only_evidence_refs:
    - origin-placeholder:project-doctor-startup:01
    - redaction-report:project-doctor-startup:placeholder:01
  distinct_evidence_preserved: true
  user_copy: Cause unknown; rerun diagnostics or attach evidence before acting.
  summary: Placeholder may appear compactly, but detail view must show that cause and target are unknown.
export_projection:
  stable_export_refs:
    - support-export:item:project-doctor-startup:placeholder-chain:01
  surfaces:
    - surface_class: local_diagnosis_view
      cite_problem_chain_id: true
      cite_confidence_class: true
      cite_origin_records: true
      raw_payload_included: false
      redaction_class: metadata_safe_default
      export_ref: local-diagnosis:project-doctor-startup:placeholder-chain:01
      summary: Local diagnosis uses the unknown confidence class and points to rerun as the safe next action.
    - surface_class: support_bundle
      cite_problem_chain_id: true
      cite_confidence_class: true
      cite_origin_records: true
      raw_payload_included: false
      redaction_class: metadata_safe_default
      export_ref: support-export:item:project-doctor-startup:placeholder-chain:01
      summary: Support bundle includes placeholder metadata and omission reasons without pretending evidence exists.
    - surface_class: cli_json
      cite_problem_chain_id: true
      cite_confidence_class: true
      cite_origin_records: true
      raw_payload_included: false
      redaction_class: metadata_safe_default
      export_ref: cli-json:project-doctor-startup:placeholder-chain:01
      summary: CLI JSON returns the same chain id and unknown confidence vocabulary as the UI.
  summary: Export behavior preserves the placeholder chain and unknown confidence state.
chronology:
  created_at: "2026-04-29T17:35:00Z"
  last_updated_at: "2026-04-29T17:35:00Z"
  superseded_by_chain_ref: null
  support_capture_ref: support-capture:project-doctor-startup:placeholder:01
aggregate_counts:
  origin_record_count: 1
  linked_output_count: 1
  evidence_ref_count: 2
  related_chain_count: 0
  distinct_target_count: 0
  stale_or_imported_evidence_count: 0
  heuristic_or_correlated_evidence_count: 1
policy_context:
  policy_epoch_ref: policy-epoch:local-only:20260429:01
  trust_state_ref: trust-state:workspace:unknown
  redaction_profile_ref: redaction-profile:metadata-safe-default
redaction_class: metadata_safe_default
export_safe_summary: Unknown-cause placeholder preserves triage identity and export refs without source, target, freshness, or anchor claims.
