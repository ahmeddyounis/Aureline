# yaml-language-server: $schema=../../../schemas/diagnostics/problem_evidence_chain.schema.json
record_kind: problem_evidence_chain_record
problem_evidence_chain_schema_version: 1
problem_chain_id: problem-chain:imported-scan:api-token-leak:01
chain_state_class: imported_read_only
source_class: imported_scan_or_report
problem_projection:
  problem_ref: problem:security-scan:api-token-leak:01
  problem_row_ref: problems-row:security-scan:api-token-leak:01
  diagnostic_cluster_ref: lang:diagcluster:api-token-leak:01
  rule_ref: rule:secret-scan:generic-token
  category_ref: category:security:secret-exposure
  severity_class: error
  user_visible_title: Imported scan finding with a matching local rerun.
  primary_anchor_ref: anchor:api-client:token-field:contextual
  summary: Imported scanner evidence remains read-only while the local rerun is linked as comparable current evidence.
origin_records:
  - record_kind: imported_scan_record
    record_ref: import-scan:provider-security:run-7842:finding-19
    source_class: imported_scan_or_report
    source_truth_ceiling_class: source_truth_imported_read_only
    chain_role_class: primary_problem
    emitted_at: "2026-04-28T21:40:00Z"
    summary: Provider scan is authoritative for its imported report but not for current local editor truth.
  - record_kind: task_event_envelope_record
    record_ref: tooling:event:local-secret-rerun:finding-19:01
    source_class: normalized_task_event
    source_truth_ceiling_class: source_truth_derived_from_structured
    chain_role_class: supporting_event
    emitted_at: "2026-04-29T15:04:12Z"
    summary: Local structured rerun found a compatible rule and anchor family under the current workspace context.
  - record_kind: diagnostic_delta_record
    record_ref: lang:diagdelta:provider-scan-vs-local-rerun:api-token:01
    source_class: structured_language_diagnostic
    source_truth_ceiling_class: source_truth_derived_from_structured
    chain_role_class: review_evidence
    emitted_at: "2026-04-29T15:04:18Z"
    summary: Delta record compares the imported scan with the local rerun and preserves mapping drift.
linked_outputs:
  - output_kind: imported_provider_output
    output_ref: provider-output:security-scan:run-7842:finding-19
    event_ref: null
    artifact_ref: artifact:provider-security:scan-report:7842
    output_channel_ref: null
    chain_role_class: origin_output
    retention_class: reference_only
    retention_ref: provider-retention:scan-report:7842
    summary: Imported provider output is cited by reference; raw provider report content is not embedded.
  - output_kind: task_event_envelope
    output_ref: tooling:event:local-secret-rerun:finding-19:01
    event_ref: tooling:event:local-secret-rerun:finding-19:01
    artifact_ref: null
    output_channel_ref: output-channel:local-secret-rerun:diagnostics
    chain_role_class: supporting_event
    retention_class: retained_local_support_bundle_only
    retention_ref: output-retention:local-secret-rerun:diagnostics:01
    summary: Local rerun output is retained as support-scoped structured evidence.
target_context:
  target_context_class: workspace
  workspace_ref: workspace:payments-service
  execution_context_ref: exec-context:payments-service:local-security-rerun:01
  target_ref: target:payments-service:security-scan
  toolchain_ref: toolchain:security-scanner:ruleset-202604
  environment_ref: environment:local-dev:security-tools
  run_ref: run:local-secret-rerun:20260429:01
  support_or_release_context_ref: provider-project:security-scan:payments-service
  summary: Chain joins an imported provider project finding with a current local rerun in the payments workspace.
freshness:
  freshness_class: imported_snapshot
  assessed_at: "2026-04-29T15:04:19Z"
  producer_epoch_ref: epoch:provider-security-scan:run-7842
  current_epoch_ref: epoch:workspace:payments-service:20260429:02
  stale_after_ref: freshness-floor:security-import:provider-scan
  summary: Primary evidence is an imported snapshot; the local rerun is current but does not rewrite the import as local source truth.
remap_state:
  remap_state_class: contextual
  original_anchor_ref: anchor:provider-scan:api-client:token-field:original
  current_anchor_ref: anchor:api-client:token-field:contextual
  remap_family_ref: remap-family:api-client:token-field
  remap_evidence_ref: remap-evidence:provider-scan:api-token:contextual:01
  summary: The imported anchor maps contextually to a current local region; it is not an exact original range.
confidence:
  confidence_class: imported_authoritative
  label: Imported authoritative
  source_truth_ceiling_class: source_truth_imported_read_only
  required_disclosure: Imported evidence from the provider scan, with a separate local rerun comparison.
  downgrade_applied: true
  downgrade_triggers:
    - source_imported_not_local
    - anchor_remapped_or_unmapped
  no_stronger_than_refs:
    - import-scan:provider-security:run-7842:finding-19
    - lang:diagdelta:provider-scan-vs-local-rerun:api-token:01
  summary: The chain can quote imported authority for the scan and local structured comparison, but cannot claim exact local source truth.
correlation_basis:
  correlation_basis_class: imported_local_rerun_match
  causality_claim_class: same_normalized_problem
  equivalence_key_ref: equivalence:secret-scan:generic-token:api-client
  related_chain_refs:
    - problem-chain:local-rerun:api-token-leak:01
  contradictory_evidence_refs: []
  summary: Imported and local results share a normalized rule, effect scope, and anchor family while preserving different origins.
evidence_refs:
  - evidence_ref_kind: imported_scan_ref
    evidence_ref: import-scan:provider-security:run-7842:finding-19
    chain_role_class: primary_problem
    redaction_class: metadata_safe_default
    retention_class: reference_only
    included_in_exports:
      - local_diagnosis_view
      - support_bundle
      - review_packet
    omission_reason_ref: null
    summary: Imported finding ref is exported as metadata and provider identity only.
  - evidence_ref_kind: task_event_ref
    evidence_ref: tooling:event:local-secret-rerun:finding-19:01
    chain_role_class: supporting_event
    redaction_class: metadata_safe_default
    retention_class: retained_local_support_bundle_only
    included_in_exports:
      - local_diagnosis_view
      - support_bundle
      - review_packet
      - cli_json
    omission_reason_ref: null
    summary: Local rerun event lets review compare imported and current evidence without overwriting the imported origin.
  - evidence_ref_kind: remap_evidence_ref
    evidence_ref: remap-evidence:provider-scan:api-token:contextual:01
    chain_role_class: remap_evidence
    redaction_class: metadata_safe_default
    retention_class: reference_only
    included_in_exports:
      - local_diagnosis_view
      - support_bundle
      - review_packet
    omission_reason_ref: null
    summary: Contextual remap evidence is exported so the imported anchor is not displayed as exact.
collapse_projection:
  collapse_class: display_collapse_related_signals
  causality_claim_class: same_normalized_problem
  collapsed_problem_refs:
    - problem:security-scan:api-token-leak:01
    - problem:local-rerun:api-token-leak:01
  expanded_chain_refs:
    - problem-chain:imported-scan:api-token-leak:01
    - problem-chain:local-rerun:api-token-leak:01
  detail_only_evidence_refs:
    - import-scan:provider-security:run-7842:finding-19
    - tooling:event:local-secret-rerun:finding-19:01
    - remap-evidence:provider-scan:api-token:contextual:01
  distinct_evidence_preserved: true
  user_copy: Imported scan and local rerun match the same issue family; imported mapping is contextual.
  summary: Compact rendering may group the rows, but detail view keeps import, local rerun, and remap evidence separate.
export_projection:
  stable_export_refs:
    - support-export:item:payments-security:api-token-chain:01
    - review-pack:payments-security:api-token-chain:01
  surfaces:
    - surface_class: local_diagnosis_view
      cite_problem_chain_id: true
      cite_confidence_class: true
      cite_origin_records: true
      raw_payload_included: false
      redaction_class: metadata_safe_default
      export_ref: local-diagnosis:payments-security:api-token-chain:01
      summary: Local diagnosis shows imported authority, local rerun, and contextual remap badges together.
    - surface_class: support_bundle
      cite_problem_chain_id: true
      cite_confidence_class: true
      cite_origin_records: true
      raw_payload_included: false
      redaction_class: metadata_safe_default
      export_ref: support-export:item:payments-security:api-token-chain:01
      summary: Support bundle exports scan, rerun, and remap refs without embedding provider payloads.
    - surface_class: review_packet
      cite_problem_chain_id: true
      cite_confidence_class: true
      cite_origin_records: true
      raw_payload_included: false
      redaction_class: metadata_safe_default
      export_ref: review-pack:payments-security:api-token-chain:01
      summary: Review packet can reason about imported and local evidence through the same chain id.
  summary: Export surfaces preserve imported and local evidence refs under one chain id.
chronology:
  created_at: "2026-04-28T21:40:00Z"
  last_updated_at: "2026-04-29T15:04:19Z"
  superseded_by_chain_ref: null
  support_capture_ref: support-capture:payments-security:20260429:01
aggregate_counts:
  origin_record_count: 3
  linked_output_count: 2
  evidence_ref_count: 3
  related_chain_count: 1
  distinct_target_count: 1
  stale_or_imported_evidence_count: 1
  heuristic_or_correlated_evidence_count: 0
policy_context:
  policy_epoch_ref: policy-epoch:security-profile:20260429:02
  trust_state_ref: trust-state:workspace:trusted
  redaction_profile_ref: redaction-profile:metadata-safe-default
redaction_class: metadata_safe_default
export_safe_summary: Imported scan evidence and a current local rerun share one chain while preserving imported freshness and contextual remap state.
