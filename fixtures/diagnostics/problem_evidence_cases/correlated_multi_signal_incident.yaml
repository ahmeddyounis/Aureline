# yaml-language-server: $schema=../../../schemas/diagnostics/problem_evidence_chain.schema.json
record_kind: problem_evidence_chain_record
problem_evidence_chain_schema_version: 1
problem_chain_id: problem-chain:incident:checkout-flake:01
chain_state_class: active_current
source_class: heuristic_output_parse
problem_projection:
  problem_ref: problem:incident:checkout-flake:01
  problem_row_ref: problems-row:incident:checkout-flake:01
  diagnostic_cluster_ref: null
  rule_ref: rule:incident-correlation:checkout-timeout-family
  category_ref: category:runtime:test-failure
  severity_class: warning
  user_visible_title: Related checkout failures observed across test and runtime output.
  primary_anchor_ref: null
  summary: The problem row represents a suspected incident family, not an exact source diagnostic.
origin_records:
  - record_kind: task_event_envelope_record
    record_ref: tooling:event:checkout-e2e:test-case-failed:01
    source_class: normalized_task_event
    source_truth_ceiling_class: source_truth_derived_from_structured
    chain_role_class: supporting_event
    emitted_at: "2026-04-29T16:22:11Z"
    summary: Structured test event reported a checkout timeout in the current test run.
  - record_kind: task_event_envelope_record
    record_ref: tooling:event:checkout-e2e:heuristic-log-match:01
    source_class: heuristic_output_parse
    source_truth_ceiling_class: source_truth_inferred_from_output
    chain_role_class: origin_output
    emitted_at: "2026-04-29T16:22:14Z"
    summary: Heuristic output parser matched timeout-shaped runtime output and retained a sanitized backlink.
  - record_kind: evidence_link_record
    record_ref: evidence-link:checkout-e2e:runtime-log-to-test:01
    source_class: normalized_task_event
    source_truth_ceiling_class: source_truth_correlated_not_proven
    chain_role_class: supporting_event
    emitted_at: "2026-04-29T16:22:16Z"
    summary: Evidence link joins the runtime log slice to the failing test attempt without proving root cause.
linked_outputs:
  - output_kind: task_event_envelope
    output_ref: tooling:event:checkout-e2e:test-case-failed:01
    event_ref: tooling:event:checkout-e2e:test-case-failed:01
    artifact_ref: null
    output_channel_ref: output-channel:checkout-e2e:test-events
    chain_role_class: supporting_event
    retention_class: retained_local_support_bundle_only
    retention_ref: output-retention:checkout-e2e:test-events:01
    summary: Structured test-event output remains available as separate evidence.
  - output_kind: task_event_envelope
    output_ref: tooling:event:checkout-e2e:heuristic-log-match:01
    event_ref: tooling:event:checkout-e2e:heuristic-log-match:01
    artifact_ref: null
    output_channel_ref: output-channel:checkout-e2e:runtime-log
    chain_role_class: origin_output
    retention_class: retained_local_support_bundle_only
    retention_ref: raw:checkout-e2e:runtime-log:slice:timeout:01
    summary: Heuristic parser output keeps a raw or sanitized backlink and lower confidence.
  - output_kind: created_artifact
    output_ref: artifact:checkout-e2e:failure-summary:01
    event_ref: tooling:event:checkout-e2e:test-case-failed:01
    artifact_ref: artifact:checkout-e2e:failure-summary:01
    output_channel_ref: null
    chain_role_class: supporting_artifact
    retention_class: retained_local_support_bundle_only
    retention_ref: artifact-retention:checkout-e2e:failure-summary:01
    summary: Failure summary artifact can be included in support export without becoming the source of truth.
target_context:
  target_context_class: execution_run
  workspace_ref: workspace:shop-client
  execution_context_ref: exec-context:shop-client:checkout-e2e:01
  target_ref: target:shop-client:e2e-checkout
  toolchain_ref: toolchain:browser-test-runner:stable
  environment_ref: environment:local-dev:browser-runtime
  run_ref: run:checkout-e2e:20260429:01
  support_or_release_context_ref: null
  summary: Signals were observed during one checkout end-to-end test run on the local browser runtime.
freshness:
  freshness_class: current
  assessed_at: "2026-04-29T16:22:20Z"
  producer_epoch_ref: epoch:test-run:checkout-e2e:20260429:01
  current_epoch_ref: epoch:workspace:shop-client:20260429:03
  stale_after_ref: freshness-floor:test-run:current-attempt
  summary: The signals belong to the current test attempt, but correlation is not proof of one root cause.
remap_state:
  remap_state_class: not_applicable
  original_anchor_ref: null
  current_anchor_ref: null
  remap_family_ref: null
  remap_evidence_ref: null
  summary: Incident row is target-scope only and does not claim an exact file anchor.
confidence:
  confidence_class: correlated_suggestive
  label: Correlated suggestive
  source_truth_ceiling_class: source_truth_correlated_not_proven
  required_disclosure: Correlated, not proven; structured test output and heuristic runtime output remain separate evidence.
  downgrade_applied: true
  downgrade_triggers:
    - heuristic_parser_used
    - correlation_without_causality
  no_stronger_than_refs:
    - tooling:event:checkout-e2e:test-case-failed:01
    - tooling:event:checkout-e2e:heuristic-log-match:01
    - evidence-link:checkout-e2e:runtime-log-to-test:01
  summary: The chain may suggest a shared incident family, but it cannot claim exact causality.
correlation_basis:
  correlation_basis_class: correlated_multi_signal
  causality_claim_class: correlated_not_proven
  equivalence_key_ref: incident-family:checkout-timeout:browser-runtime
  related_chain_refs:
    - problem-chain:test-failure:checkout-timeout:01
    - problem-chain:runtime-log:checkout-timeout:01
  contradictory_evidence_refs: []
  summary: Test failure and runtime output share a target, time window, and failure family, but each signal stays distinct.
evidence_refs:
  - evidence_ref_kind: task_event_ref
    evidence_ref: tooling:event:checkout-e2e:test-case-failed:01
    chain_role_class: supporting_event
    redaction_class: metadata_safe_default
    retention_class: retained_local_support_bundle_only
    included_in_exports:
      - local_diagnosis_view
      - support_bundle
      - cli_json
    omission_reason_ref: null
    summary: Structured test event is cited separately from the heuristic runtime parse.
  - evidence_ref_kind: sanitized_output_slice_ref
    evidence_ref: output-slice:checkout-e2e:runtime-timeout:01
    chain_role_class: origin_output
    redaction_class: metadata_safe_default
    retention_class: retained_local_support_bundle_only
    included_in_exports:
      - local_diagnosis_view
      - support_bundle
    omission_reason_ref: null
    summary: Sanitized runtime output slice backs the heuristic parse.
  - evidence_ref_kind: artifact_ref
    evidence_ref: artifact:checkout-e2e:failure-summary:01
    chain_role_class: supporting_artifact
    redaction_class: metadata_safe_default
    retention_class: retained_local_support_bundle_only
    included_in_exports:
      - support_bundle
      - review_packet
    omission_reason_ref: null
    summary: Failure summary artifact is available for support and review without implying root cause.
collapse_projection:
  collapse_class: correlated_incident_group
  causality_claim_class: correlated_not_proven
  collapsed_problem_refs:
    - problem:test-failure:checkout-timeout:01
    - problem:runtime-log:checkout-timeout:01
  expanded_chain_refs:
    - problem-chain:incident:checkout-flake:01
    - problem-chain:test-failure:checkout-timeout:01
    - problem-chain:runtime-log:checkout-timeout:01
  detail_only_evidence_refs:
    - tooling:event:checkout-e2e:test-case-failed:01
    - output-slice:checkout-e2e:runtime-timeout:01
    - artifact:checkout-e2e:failure-summary:01
  distinct_evidence_preserved: true
  user_copy: Several signals suggest a checkout timeout incident; causality is not proven.
  summary: Compact UI may group the signals, but detail view keeps the structured test event and heuristic output parse distinct.
export_projection:
  stable_export_refs:
    - support-export:item:checkout-e2e:incident-chain:01
    - review-pack:checkout-e2e:incident-chain:01
  surfaces:
    - surface_class: local_diagnosis_view
      cite_problem_chain_id: true
      cite_confidence_class: true
      cite_origin_records: true
      raw_payload_included: false
      redaction_class: metadata_safe_default
      export_ref: local-diagnosis:checkout-e2e:incident-chain:01
      summary: Local diagnosis shows the correlated-suggestive label and separate evidence rows.
    - surface_class: support_bundle
      cite_problem_chain_id: true
      cite_confidence_class: true
      cite_origin_records: true
      raw_payload_included: false
      redaction_class: metadata_safe_default
      export_ref: support-export:item:checkout-e2e:incident-chain:01
      summary: Support bundle includes the chain id, heuristic disclosure, and retained evidence refs.
    - surface_class: review_packet
      cite_problem_chain_id: true
      cite_confidence_class: true
      cite_origin_records: true
      raw_payload_included: false
      redaction_class: metadata_safe_default
      export_ref: review-pack:checkout-e2e:incident-chain:01
      summary: Review packet can expand the grouped incident into distinct test and runtime signals.
  summary: Every export preserves the correlated-suggestive confidence class and causality caveat.
chronology:
  created_at: "2026-04-29T16:22:11Z"
  last_updated_at: "2026-04-29T16:22:20Z"
  superseded_by_chain_ref: null
  support_capture_ref: support-capture:checkout-e2e:20260429:01
aggregate_counts:
  origin_record_count: 3
  linked_output_count: 3
  evidence_ref_count: 3
  related_chain_count: 2
  distinct_target_count: 1
  stale_or_imported_evidence_count: 0
  heuristic_or_correlated_evidence_count: 2
policy_context:
  policy_epoch_ref: policy-epoch:trusted-local:20260429:03
  trust_state_ref: trust-state:workspace:trusted
  redaction_profile_ref: redaction-profile:metadata-safe-default
redaction_class: metadata_safe_default
export_safe_summary: Test failure, heuristic runtime output, and failure artifact are grouped as correlated-suggestive evidence without proving one cause.
