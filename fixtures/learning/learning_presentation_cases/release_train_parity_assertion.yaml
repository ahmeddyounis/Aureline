# yaml-language-server: $schema=../../../schemas/learning/learning_presentation_packet.schema.json
__fixture__:
  name: release_train_parity_assertion
  scenario: >
    Release-train window. Release-readiness audience. The packet
    asserts parity across every consuming surface (guided tour,
    glossary card, architecture map, command-tip pack, learning
    mode, presentation mode, release evidence, support handoff,
    accessibility audit). Includes one presenter handoff and one
    breakaway event with manual rejoin under a shared-to-named-
    audience presentation. classroom_artifact_retention is
    metadata_only_local_redacted. Significance is release-bearing;
    the packet narrows the release-notes claim to the parity scope.
  contract_sections:
    - Frozen vocabulary
    - Truthfulness posture (normative)
    - Audience-redaction pairing (normative)
    - Presentation-role review rules (normative)
    - Layout-restore proof rules (normative)
  exercised_axes:
    audience_redaction_pairing: release_readiness_summary
    change_significance: release_bearing
    parity_floor: every_surface
    presentation_session: shared_to_named_audience
    breakaway_recovery: manual_rejoin_invite_required
