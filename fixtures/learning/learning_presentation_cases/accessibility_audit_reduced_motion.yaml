    Accessibility-audit window. Accessibility-audit audience. The
    packet asserts that guided-tour steps, the architecture map, and
    a presentation session with shared follow disabled all respect
    the user's reduced-motion setting and provide a full keyboard
    route. Layout anchors land on canonical workspace surfaces and
    no private "presentation shell" target is minted. The session is
    local-only-no-share so audience identity is never recorded;
    classroom-artifact retention is empty.
