---
$schema: ../../../schemas/build/source_confidence_chain.schema.json
record_kind: ai_build_confidence_callout_record
source_confidence_chain_schema_version: 1
ai_build_confidence_callout_record_id: ai_build_confidence_callout:wks:aureline:cargo_build_aureline_buffer_compile_error:01
captured_at: 2026-05-04T14:00:00.000Z
workspace_id: wks:aureline
ai_evidence_packet_ref: ai_evidence_packet:wks:aureline:cargo_build_aureline_buffer_compile_error:01:turn_01
build_adapter_confidence_state: native_adapter
narration_basis_class: narrating_native_adapter_authoritative_facts
inherited_confidence_class: authoritative_from_source
inherited_confidence_ceiling_class: authoritative_from_source
required_disclosure_text: AI summary narrates a typed compile error captured by the native cargo runner; confidence is authoritative_from_source over a live cargo JSON stream.
forbidden_claim_set:
  - AI must not claim runtime-role attribution the run did not admit.
  - AI must not assert a fix is verified without a follow-up run that emits a new build_adapter_confidence_state_record.
  - AI must not collapse multiple typed diagnostics into a single inferred root cause without citing the parsed problem-evidence chain.
preserves_callout_in_export: true
source_confidence_chain_record_id_ref: source_confidence_chain:wks:aureline:cargo_build_aureline_buffer_compile_error:01
lineage_refs:
