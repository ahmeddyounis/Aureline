  raw_event_inspector_record_ref: raw_event_inspector:wks:aureline:cargo_build_aureline_buffer_compile_error:01
  parser_fallback_reason_card_record_ref: null
  support_bundle_ref: null
  summary: Callout shares lineage with the packet and the chain; AI evidence packet covers the AI turn.
callout_redaction_class: metadata_and_hashes_only
summary: AI build-confidence callout for the cargo compile error; basis narrating_native_adapter_authoritative_facts; preserves callout in export.
