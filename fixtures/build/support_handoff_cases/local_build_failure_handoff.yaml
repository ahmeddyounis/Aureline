# Multi-document YAML fixture for the local build-failure handoff case.
# Validates against:
#   schemas/build/source_confidence_chain.schema.json (record_kind = build_support_handoff_packet_record)
#   schemas/build/source_confidence_chain.schema.json (record_kind = source_confidence_chain_record)
#   schemas/build/source_confidence_chain.schema.json (record_kind = ai_build_confidence_callout_record)
__fixture__:
  name: local_build_failure_handoff
  scenario: >
    A first-party native cargo runner emits a hard compile error for
    the aureline-buffer crate. The user opens the support handoff
    packet from the build issue card to file a workspace issue with
    the source-confidence chain attached. Confidence state is
    native_adapter; ceiling authoritative_from_source; freshness
    live_streaming; no parser-fallback reason card. The chain links
    the raw_event_inspector_record (raw event), the
    problem_evidence_chain_record (parsed issue), the
    ai_build_confidence_callout_record (AI summary), the
    language_diagnostic_chip_record (diagnostics badge), and the
    support_pack_item (support-packet claim) back to the originating
    run_record (evidence origin). The AI callout discloses that the
    narration is based on native-adapter authoritative facts and
    forbids claims that exceed what the run admitted.
  exercises:
    build_adapter_confidence_state: native_adapter
    confidence_ceiling: authoritative_from_source
    freshness_class: live_streaming
    import_source_class: not_imported
    handoff_intent: file_issue_against_workspace
    chain_floor_reason_class: no_floor_applied
    ai_callout_basis_class: narrating_native_adapter_authoritative_facts
    chain_link_count: 6
  seed_roles:
    - local_build_failure_handoff_packet
    - local_build_failure_source_confidence_chain
    - local_build_failure_ai_confidence_callout
---
$schema: ../../../schemas/build/source_confidence_chain.schema.json
record_kind: build_support_handoff_packet_record
source_confidence_chain_schema_version: 1
build_support_handoff_packet_record_id: build.support_handoff:wks:aureline:run:cargo_build_aureline_buffer_compile_error:01
captured_at: 2026-05-04T14:00:00.000Z
workspace_id: wks:aureline
build_handoff_intent_class: file_issue_against_workspace
build_adapter_confidence_state: native_adapter
confidence_ceiling: authoritative_from_source
freshness_class: live_streaming
import_source_class: not_imported
target_identity:
  target_identity_authority_class: publishing_graph_attached
  target_id_ref: tgt:tooling.target:aureline:aureline_buffer:lib
  publishing_graph_id_ref: graph:tooling.target_graph:aureline:cargo:01
  target_descriptor_ref: descriptor:tooling.target:aureline:aureline_buffer:lib
  summary: aureline-buffer library target resolved through the cargo native graph at packet capture time.
lineage_refs:
  originating_run_ref: run:wks:aureline:cargo_build_aureline_buffer_compile_error:01
  originating_attempt_ref: attempt:wks:aureline:cargo_build_aureline_buffer_compile_error:01:01
  build_adapter_confidence_state_record_ref: build.adapter_confidence:wks:aureline:run:cargo_build_aureline_buffer_compile_error:01
  raw_event_inspector_record_ref: raw_event_inspector:wks:aureline:cargo_build_aureline_buffer_compile_error:01
  parser_fallback_reason_card_record_ref: null
  support_bundle_ref: null
  summary: Packet, chain, and AI callout share originating_run_ref run:wks:aureline:cargo_build_aureline_buffer_compile_error:01.
handoff_actions:
  - handoff_action_class: open_raw_event_inspector_pane
    subject_ref: raw_event_inspector:wks:aureline:cargo_build_aureline_buffer_compile_error:01
    summary: Open the raw-event inspector pane to review the cargo JSON stream and parsed compile-diagnostic events.
  - handoff_action_class: open_originating_run_pane
    subject_ref: run:wks:aureline:cargo_build_aureline_buffer_compile_error:01
    summary: Open the originating run record to inspect queue, host boundary, policy decisions, and outcome.
  - handoff_action_class: open_originating_attempt_pane
    subject_ref: attempt:wks:aureline:cargo_build_aureline_buffer_compile_error:01:01
    summary: Open the originating attempt record to inspect the attempt-level lifecycle and exit code.
  - handoff_action_class: open_target_graph_view
    subject_ref: graph:tooling.target_graph:aureline:cargo:01
    summary: Open the cargo native target graph to confirm aureline-buffer's role and dependents.
  - handoff_action_class: file_workspace_issue_with_chain_attached
    subject_ref: workspace_issue:wks:aureline:cargo_build_aureline_buffer_compile_error:01:draft
    summary: File a workspace issue with the source-confidence chain attached so the chain id stays joinable from the issue.
  - handoff_action_class: copy_source_confidence_chain_refs_to_review_pack
    subject_ref: review_pack:wks:aureline:cargo_build_aureline_buffer_compile_error:01:draft
    summary: Copy the chain refs to the active review pack so the cited evidence travels with the review.
source_confidence_chain_record_id_ref: source_confidence_chain:wks:aureline:cargo_build_aureline_buffer_compile_error:01
ai_build_confidence_callout_record_id_ref: ai_build_confidence_callout:wks:aureline:cargo_build_aureline_buffer_compile_error:01
disclosure_copy: Native cargo runner emitted a typed compile error; ceiling authoritative_from_source over a live cargo JSON stream.
callout_redaction_class: metadata_and_hashes_only
summary: Local build-failure handoff packet for aureline-buffer compile error; chain joins raw inspector, parsed issue, AI summary, badge, and support-packet claim back to the originating run.
