  summary: Packet, chain, and AI callout share originating_run_ref run:wks:aureline:imported_ci_aureline_text_failed_build:01.
handoff_actions:
  - handoff_action_class: open_raw_event_inspector_pane
    subject_ref: raw_event_inspector:wks:aureline:imported_ci_aureline_text_failed_build:01
    summary: Open the raw-event inspector pane to review the imported managed-CI log groups under imported_replay_no_phase timing.
  - handoff_action_class: open_originating_run_pane
    subject_ref: run:wks:aureline:imported_ci_aureline_text_failed_build:01
    summary: Open the imported run record to inspect the imported-event lineage and the import provenance.
  - handoff_action_class: open_imported_scan_record
    subject_ref: imported_scan_record:wks:aureline:imported_ci_aureline_text_failed_build:01:managed_ci_log
    summary: Open the imported scan record so the import path and the artifact-source provenance are reviewable.
  - handoff_action_class: open_support_bundle_export
    subject_ref: support_bundle:wks:aureline:imported_ci_aureline_text_failed_build:01
    summary: Open the support-bundle export that retains the imported events and the chain refs for managed-provider support.
  - handoff_action_class: escalate_to_managed_provider_support_with_chain_attached
    subject_ref: managed_provider_support_intake:wks:aureline:imported_ci_aureline_text_failed_build:01:draft
    summary: Escalate the imported failure to managed-provider support with the source-confidence chain attached.
