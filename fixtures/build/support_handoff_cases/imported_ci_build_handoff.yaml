  target_identity_authority_class: imported_from_managed_ci_artifact
  target_id_ref: tgt:tooling.target:aureline:aureline_text:lib
  publishing_graph_id_ref: graph:tooling.target_graph:aureline:cargo:01
  target_descriptor_ref: descriptor:tooling.target:aureline:aureline_text:lib
  summary: aureline-text library target identity admitted from the imported managed-CI artifact at packet capture time.
lineage_refs:
