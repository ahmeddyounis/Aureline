ai_build_confidence_callout_record_id_ref: ai_build_confidence_callout:wks:aureline:imported_ci_aureline_text_failed_build:01
disclosure_copy: Imported managed-CI artifact replayed read-only; ceiling structured_parse_match; freshness imported_read_only; not re-run locally.
callout_redaction_class: metadata_and_hashes_only
summary: Imported-CI build handoff packet for aureline-text; downgraded to imported_result and escalated to managed-provider support with the chain attached.
