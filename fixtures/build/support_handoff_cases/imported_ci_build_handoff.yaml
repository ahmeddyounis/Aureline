# Multi-document YAML fixture for the remote-build / imported-CI-evidence handoff case.
# Validates against:
#   schemas/build/source_confidence_chain.schema.json (record_kind = build_support_handoff_packet_record)
#   schemas/build/source_confidence_chain.schema.json (record_kind = source_confidence_chain_record)
#   schemas/build/source_confidence_chain.schema.json (record_kind = ai_build_confidence_callout_record)
__fixture__:
  name: imported_ci_build_handoff
  scenario: >
    A managed-CI artifact log for a previous build of the
    aureline-text crate is imported through review and replayed in
    the IDE without being re-run locally. A user opens the support
    handoff packet to escalate the imported failure to managed-provider
    support. Confidence state is imported_result; ceiling
    structured_parse_match; freshness imported_read_only; import
    source managed_ci_artifact; no parser-fallback reason card. The
    AI callout discloses that the narration is based on imported
    read-only facts and forbids claims that re-run the build locally
    without a new originating run. The chain pulls to the imported
    floor.
  exercises:
    build_adapter_confidence_state: imported_result
    confidence_ceiling: structured_parse_match
    freshness_class: imported_read_only
    import_source_class: managed_ci_artifact
    handoff_intent: support_handoff_to_managed_provider
    chain_floor_reason_class: imported_result_caps_at_structured_parse_match
    ai_callout_basis_class: narrating_imported_result_read_only_facts
    chain_link_count: 5
  seed_roles:
    - imported_ci_build_handoff_packet
    - imported_ci_source_confidence_chain
    - imported_ci_ai_confidence_callout
