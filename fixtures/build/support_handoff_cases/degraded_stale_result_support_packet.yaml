# Multi-document YAML fixture for the degraded (stale) result support-packet case.
# Validates against:
#   schemas/build/source_confidence_chain.schema.json (record_kind = build_support_handoff_packet_record)
#   schemas/build/source_confidence_chain.schema.json (record_kind = source_confidence_chain_record)
#   schemas/build/source_confidence_chain.schema.json (record_kind = ai_build_confidence_callout_record)
__fixture__:
  name: degraded_stale_result_support_packet
  scenario: >
    A previously trusted native-cargo build of the aureline-buffer
    crate is now stale_result because the toolchain revision changed
    after the last successful run. The picker chip carries the
    degraded badge; the user opens the support handoff packet from
    the degraded chip to export a support bundle and replay the
    imported evidence in Project Doctor without re-running the build
    locally yet. Confidence state is stale_result; ceiling
    degraded_partial; freshness stale_pending_refresh; the
    parser-fallback reason card (stale-row variant) is linked. The
    AI callout discloses that the narration is based on stale-result
    degraded facts and forbids claims about a fresh run.
  exercises:
    build_adapter_confidence_state: stale_result
    confidence_ceiling: degraded_partial
    freshness_class: stale_pending_refresh
    handoff_intent: replay_for_local_diagnosis
    parser_fallback_reason_card_attached: true
    chain_floor_reason_class: stale_result_caps_at_degraded_partial
    ai_callout_basis_class: narrating_stale_result_degraded_facts
    chain_link_count: 6
  seed_roles:
    - degraded_stale_result_support_packet
    - degraded_stale_source_confidence_chain
    - degraded_stale_ai_confidence_callout
