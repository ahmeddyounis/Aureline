  parser_fallback_reason_card_record_ref: parser_fallback_reason_card:wks:moonbeam_jvm:moonbeam_build_demo:01
  support_bundle_ref: null
  summary: Packet, chain, and AI callout share originating_run_ref run:wks:moonbeam_jvm:moonbeam_build_demo:01.
handoff_actions:
  - handoff_action_class: open_raw_event_inspector_pane
    subject_ref: raw_event_inspector:wks:moonbeam_jvm:moonbeam_build_demo:01
    summary: Open the raw-event inspector pane to review the parsed lines, the discarded lines, and the timing strip.
  - handoff_action_class: open_originating_run_pane
    subject_ref: run:wks:moonbeam_jvm:moonbeam_build_demo:01
    summary: Open the originating run record to inspect the queue, host boundary, and outcome under the moonbeam fallback path.
  - handoff_action_class: open_parser_fallback_reason_card
    subject_ref: parser_fallback_reason_card:wks:moonbeam_jvm:moonbeam_build_demo:01
    summary: Open the parser-fallback reason card to review the recognized fields, the guessed fields, and the missing-evidence axes.
  - handoff_action_class: open_target_graph_view
    subject_ref: graph:tooling.target_graph:moonbeam_jvm:fallback_partial:01
    summary: Open the partial target graph snapshot to confirm which moonbeam targets are admitted.
  - handoff_action_class: file_workspace_issue_with_chain_attached
    subject_ref: workspace_issue:wks:moonbeam_jvm:moonbeam_build_demo:01:draft
    summary: File a workspace issue with the source-confidence chain attached so the parser-fallback disclosure travels with the issue.
  - handoff_action_class: copy_source_confidence_chain_refs_to_support_bundle
    subject_ref: support_bundle:wks:moonbeam_jvm:moonbeam_build_demo:01:draft
    summary: Copy the chain refs to a draft support bundle so the reason card and the inspector lineage are reviewable in support.
source_confidence_chain_record_id_ref: source_confidence_chain:wks:moonbeam_jvm:moonbeam_build_demo:01
ai_build_confidence_callout_record_id_ref: ai_build_confidence_callout:wks:moonbeam_jvm:moonbeam_build_demo:01
disclosure_copy: moonbeam free-form line parser produced two recognized fields, three guessed fields, three missing-evidence axes; ceiling heuristic_best_effort.
callout_redaction_class: metadata_and_hashes_only
summary: Parser-fallback warning handoff packet for the moonbeam build; downgraded to parser_fallback with the reason card attached and chain joinable to support.
