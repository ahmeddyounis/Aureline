# Multi-document YAML fixture for the parser-fallback warning handoff case.
# Validates against:
#   schemas/build/source_confidence_chain.schema.json (record_kind = build_support_handoff_packet_record)
#   schemas/build/source_confidence_chain.schema.json (record_kind = source_confidence_chain_record)
#   schemas/build/source_confidence_chain.schema.json (record_kind = ai_build_confidence_callout_record)
__fixture__:
  name: parser_fallback_warning_handoff
  scenario: >
    The moonbeam JVM build (an unfamiliar tool with no native runner,
    no Build Server Protocol session, no Bazel Build Event Protocol
    stream, and no structured importer match) fell back to a free-form
    line parser. The picker chip carries a parser-fallback warning;
    the user opens the support handoff packet from the warning to
    file a workspace issue against moonbeam tooling. Confidence state
    is parser_fallback; ceiling heuristic_best_effort; freshness
    cold_cached; the parser-fallback reason card is linked. The AI
    callout discloses that the narration is based on parser-fallback
    heuristics and forbids claims that test outcomes parsed from
    free-form output are authoritative.
  exercises:
    build_adapter_confidence_state: parser_fallback
    confidence_ceiling: heuristic_best_effort
    freshness_class: cold_cached
    handoff_intent: file_issue_against_workspace
    parser_fallback_reason_card_attached: true
    chain_floor_reason_class: parser_fallback_caps_at_heuristic_best_effort
    ai_callout_basis_class: narrating_parser_fallback_heuristics
    chain_link_count: 6
  seed_roles:
    - parser_fallback_warning_handoff_packet
    - parser_fallback_source_confidence_chain
    - parser_fallback_ai_confidence_callout
---
$schema: ../../../schemas/build/source_confidence_chain.schema.json
