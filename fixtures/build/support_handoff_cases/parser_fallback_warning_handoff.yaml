import_source_class: not_imported
target_identity:
  target_identity_authority_class: inferred_from_filename_or_directory_convention
  target_id_ref: tgt:tooling.target:moonbeam_jvm:demo:jar
  publishing_graph_id_ref: graph:tooling.target_graph:moonbeam_jvm:fallback_partial:01
  target_descriptor_ref: null
  summary: moonbeam target id inferred from path match against a partial graph; no authoritative descriptor available.
lineage_refs:
  originating_run_ref: run:wks:moonbeam_jvm:moonbeam_build_demo:01
  originating_attempt_ref: attempt:wks:moonbeam_jvm:moonbeam_build_demo:01:01
