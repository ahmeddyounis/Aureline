# Multi-document YAML fixture for the unknown-tool degraded-inspection case.
# Validates against:
#   schemas/build/adapter_confidence_state.schema.json (record_kind = build_adapter_confidence_state_record)
#   schemas/build/raw_event_inspector.schema.json     (record_kind = raw_event_inspector_record)
__fixture__:
  name: unknown_tool_degraded_inspection
  scenario: >
    A user picks 'build' on a workspace that has no native runner, no
    Build Server Protocol session, no Bazel BEP stream, no structured
    importer match, and no convention match. The fallback adapter
    cannot attach (the candidate adapter is blocked by an admin
    policy review). No attempt is admitted; no events are produced.
    The active confidence state is unavailable_result with reason
    no_adapter_attached, ceiling unknown, freshness unknown_freshness;
    the raw-event inspector cites a single no_source_log_observed
    segment and a single unknown_phase timing entry so the picker,
    output pane, and support export still render typed counts and a
    typed phase strip.
  exercises:
    build_adapter_confidence_state: unavailable_result
    confidence_ceiling: unknown
    evidence_source_class: no_evidence_observed
    freshness_class: unknown_freshness
    unavailable_reason_class: no_adapter_attached
    parser_fallback_reason_card_emitted: false
    raw_event_inspector_source_log_class: no_source_log_observed
    raw_event_inspector_phase_class: unknown_phase
  seed_roles:
    - unavailable_result_confidence_state
    - degraded_run_raw_event_inspector
