#   schemas/build/raw_event_inspector.schema.json     (record_kind = raw_event_inspector_record)
__fixture__:
  name: native_adapter_success
  scenario: >
    A first-party native cargo runner builds the aureline-buffer crate
    using cargo --message-format=json over the local toolchain. The
    adapter streams structured events directly; the confidence state
    is native_adapter with ceiling authoritative_from_source, no
    parser-fallback reason card is emitted, and the raw-event
    inspector groups one structured-event stream segment with zero
    discarded lines. The target identity is admitted under a
    publishing graph and the run / attempt lineage is preserved end
    to end.
  exercises:
    build_adapter_confidence_state: native_adapter
    confidence_ceiling: authoritative_from_source
    evidence_source_class: native_runner_streamed_events
    freshness_class: live_streaming
    parser_fallback_reason_card_emitted: false
    raw_event_inspector_total_phases: 5
    raw_event_inspector_discarded_count: 0
  seed_roles:
    - native_adapter_confidence_state
    - native_run_raw_event_inspector
