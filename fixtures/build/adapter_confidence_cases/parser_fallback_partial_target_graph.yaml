  raw_event_inspector_ref: raw_event_inspector:wks:moonbeam_jvm:moonbeam_build_demo:01
  task_event_envelope_id_refs:
    - envelope:moonbeam_build_demo:01:parsed_test_case_outcome_pack
    - envelope:moonbeam_build_demo:01:parsed_exit_code
  support_bundle_ref: null
  summary: Free-form line parser produced two typed event packs over a partial target graph.
