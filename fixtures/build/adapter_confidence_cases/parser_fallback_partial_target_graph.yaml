# Multi-document YAML fixture for the parser-fallback case.
# Validates against:
#   schemas/build/adapter_confidence_state.schema.json (record_kind = build_adapter_confidence_state_record)
#   schemas/build/adapter_confidence_state.schema.json (record_kind = parser_fallback_reason_card_record)
#   schemas/build/raw_event_inspector.schema.json     (record_kind = raw_event_inspector_record)
__fixture__:
  name: parser_fallback_partial_target_graph
  scenario: >
    A workspace pinned to an unfamiliar JVM build tool ('moonbeam')
    has no native runner, no Build Server Protocol session, no Bazel
    Build Event Protocol stream, no structured importer, and no
    convention match. The fallback opaque-preservation adapter
    spawns 'moonbeam build' and a free-form line-oriented parser
    extracts what it can. Two recognized fields are observable
    (test_case_outcome via "OK"/"FAIL" markers, exit_code via the
    final summary line); three fields are guessed (target kind from
    the source path, produced artifact path from convention, target
    id from a path match against a partial target graph); three
    pieces of evidence are missing (no structured event stream, no
    target graph attached, no tool version banner). The reason card
    discloses every axis and offers four openable support artifacts
    including the raw-event inspector. The active state is
    parser_fallback with ceiling heuristic_best_effort.
  exercises:
    build_adapter_confidence_state: parser_fallback
    confidence_ceiling: heuristic_best_effort
    evidence_source_class: free_form_log_line_parse
    parser_fallback_reason_card_emitted: true
    recognized_artifact_count: 2
    guessed_artifact_count: 3
    missing_evidence_count: 3
    openable_support_artifact_count: 4
    raw_event_inspector_includes_inspector_action: true
  seed_roles:
    - parser_fallback_confidence_state
    - parser_fallback_reason_card
    - parser_fallback_raw_event_inspector
