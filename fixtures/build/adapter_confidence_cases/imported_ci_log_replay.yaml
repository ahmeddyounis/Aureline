# Multi-document YAML fixture for the imported-CI-log replay case.
# Validates against:
#   schemas/build/adapter_confidence_state.schema.json (record_kind = build_adapter_confidence_state_record)
#   schemas/build/raw_event_inspector.schema.json     (record_kind = raw_event_inspector_record)
__fixture__:
  name: imported_ci_log_replay
  scenario: >
    A managed CI artifact log for a previous build of the
    aureline-text crate is imported through review and replayed in
    the IDE without being re-run locally. The native runner is not
    re-invoked; the imported events are read structurally out of the
    artifact. The active confidence state is imported_result with
    ceiling structured_parse_match, no parser-fallback reason card
    is emitted, freshness is imported_read_only, and the raw-event
    inspector records the imported event groups under the
    imported_replay_no_phase timing class.
  exercises:
    build_adapter_confidence_state: imported_result
    confidence_ceiling: structured_parse_match
    evidence_source_class: managed_ci_artifact_import
    freshness_class: imported_read_only
    import_source_class: managed_ci_artifact
    parser_fallback_reason_card_emitted: false
    raw_event_inspector_phase_class: imported_replay_no_phase
  seed_roles:
    - imported_result_confidence_state
    - imported_run_raw_event_inspector
---
$schema: ../../../schemas/build/adapter_confidence_state.schema.json
record_kind: build_adapter_confidence_state_record
adapter_confidence_state_schema_version: 1
build_adapter_confidence_state_record_id: build.adapter_confidence:wks:aureline:run:imported_ci_aureline_text_build:01
captured_at: 2026-05-04T13:00:00.000Z
workspace_id: wks:aureline
build_adapter_confidence_state: imported_result
confidence_ceiling: structured_parse_match
evidence_source_class_set:
  - managed_ci_artifact_import
  - structured_importer_export_file
freshness_class: imported_read_only
import_source_class: managed_ci_artifact
stale_reason_class: not_stale
unavailable_reason_class: not_unavailable
evidence_counts:
  structured_event_count: 0
  parsed_line_count: 0
  discarded_line_count: 0
  missing_evidence_count: 0
  imported_event_count: 96
lineage_refs:
  originating_run_ref: run:wks:aureline:imported_ci_aureline_text_build:01
  originating_attempt_ref: attempt:wks:aureline:imported_ci_aureline_text_build:01:01
  publishing_graph_id_ref: graph:tooling.target_graph:aureline:cargo:01
  target_id_ref: tgt:tooling.target:aureline:aureline_text:lib
  raw_event_inspector_ref: raw_event_inspector:wks:aureline:imported_ci_aureline_text_build:01
  task_event_envelope_id_refs:
    - envelope:imported_ci_aureline_text_build:01:imported_outcome_pack
  support_bundle_ref: null
  summary: Imported CI artifact replays 96 typed events for the aureline-text library target.
parser_fallback_reason_card_ref: null
redaction_class: metadata_and_hashes_only
summary: Imported managed-CI build for aureline-text; ceiling capped at structured_parse_match with imported_read_only freshness.
