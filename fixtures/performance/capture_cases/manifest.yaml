schema_version: 1
manifest_id: aureline.performance_capture_cases
contract_doc_ref: docs/performance/profiling_trace_replay_contract.md
capture_session_schema_ref: schemas/performance/capture_session.schema.json
regression_baseline_schema_ref: schemas/performance/regression_baseline.schema.json

cases:
  - case_id: perf.case.cpu_profile_summary_upload_safe
    file: cpu_profile_summary_upload_safe.yaml
    schema_ref: schemas/performance/capture_session.schema.json
    exercises:
      - cpu_profile
      - manifest_with_digests
      - upload_safe_after_redaction
  - case_id: perf.case.memory_sample_local_only
    file: memory_sample_local_only.yaml
    schema_ref: schemas/performance/capture_session.schema.json
    exercises:
      - memory_sample
      - local_only_raw
      - omitted_sensitive_fields
  - case_id: perf.case.render_timeline_partial
    file: render_timeline_partial.yaml
    schema_ref: schemas/performance/capture_session.schema.json
    exercises:
      - render_timeline
      - partial_capture
      - advisory_only_comparison
  - case_id: perf.case.trace_span_support_bundle_ref
    file: trace_span_support_bundle_ref.yaml
    schema_ref: schemas/performance/capture_session.schema.json
    exercises:
      - trace_span_set
      - support_bundle_reference
      - otlp_trace_claim
  - case_id: perf.case.io_capture_summary_only
    file: io_capture_summary_only.yaml
    schema_ref: schemas/performance/capture_session.schema.json
    exercises:
      - io_capture
      - summary_only
      - blocked_sensitive_raw
  - case_id: perf.case.replay_capture_record_only
    file: replay_capture_record_only.yaml
    schema_ref: schemas/performance/capture_session.schema.json
    exercises:
      - replay_capture
      - record_only
      - reverse_step_backend_not_supported
  - case_id: perf.case.regression_baseline_environment_mismatch
    file: regression_baseline_environment_mismatch.yaml
    schema_ref: schemas/performance/regression_baseline.schema.json
    exercises:
      - regression_baseline
      - advisory_only_environment_change
      - variance_note
