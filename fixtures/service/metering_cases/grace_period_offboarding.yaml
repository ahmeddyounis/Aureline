  scenario: >
    The enterprise tenant entered a documented grace_window after a
    seat downgrade. Entitlement is in_grace; the grace-or-offboarding
    card cites the offboarding-export SLO row and the deletion-job
    record. Prompts surface continue-local-work,
    export-usage-summary, export-support-bundle,
    export-offboarding-packet, and delete-data ahead of any
    manage-entitlement, increase-budget, upgrade-plan, or
    add-payment-method prompt. AI evidence retention and local
    export remain available; managed inference that requires
    bounded spend is paused under the grace posture.
  contract_sections:
    - Required surfaces — Grace-period or offboarding card
    - Prompt ordering rules
    - Display-copy invariants

