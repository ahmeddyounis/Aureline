# yaml-language-server: $schema=../../../schemas/service/meter_row.schema.json
__fixture__:
  name: stale_quota_data
  scenario: >
    The managed entitlement-and-usage service has been unreachable
    long enough that the cached AI gateway meter is now beyond its
    freshness floor. The meter row resolves through cached
    measurement authority, surfaces the
    cached_beyond_freshness_floor freshness class, and fails closed
    only for managed inference that requires bounded spend. Local
    edit, save, search, BYOK AI, and the export-usage-summary
    prompt remain available; the upgrade and budget-pressure prompts
    do not precede the export, support, delete, or
    continue-local-work prompts. The forecast block carries
    forecast_unavailable confidence so no numeric projection
    renders.
  contract_sections:
    - Fail-open / fail-closed rules for stale or unreachable metering
    - Required surfaces — Usage and forecast view
    - Prompt ordering rules
    - Display-copy invariants

