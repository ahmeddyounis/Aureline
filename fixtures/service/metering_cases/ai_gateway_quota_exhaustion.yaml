  scenario: >
    The enterprise tenant has reached the daily inference budget on
    the managed AI gateway. The meter row resolves through
    authoritative measurement authority but the linked operating-mode
    card carries a quota_throttle_banner with capacity_state
    quota_exhausted. Managed inference fails closed; AI evidence
    retention, sync, registry, relay, remote, and telemetry families
    remain healthy. The prompt list preserves continue-local-work,
    export-usage-summary, export-support-bundle, and delete-data
    ahead of increase-budget, upgrade-plan, and add-payment-method.
  contract_sections:
    - Required surfaces — Usage and forecast view
    - Prompt ordering rules
    - Display-copy invariants
    - Fail-open / fail-closed rules for stale or unreachable metering

