__fixture__:
  name: personal_vs_org_chargeback_view
  scenario: >
    A signed-in user reaches the AI gateway meter row in
    enterprise_saas mode. The chargeback scope switcher exposes both
    a personal_scope view (the user's BYOK and personal-budget AI
    inference) and an organization_scope view (the enterprise tenant
    chargeback for managed-gateway inference) side-by-side. Personal,
    workspace, and organization usage are not collapsed into a single
    misleading total. The meter is fresh and entitlement is active;
    prompts preserve export and continue-local-work ahead of any
    upgrade or budget-pressure prompt.
  contract_sections:
    - The five questions every meter row answers
    - Required surfaces — Chargeback scope switcher
    - Display-copy invariants
    - Prompt ordering rules

