capacity_guardrail_case_schema_version: 1
case_id: service.capacity_guardrail.preview_share_outage_blocks_new_links_not_local_export
case_title: Preview/share outage blocks new links but preserves local export
expected_decision: block_managed_only_action_and_offer_export

scenario: >
  The preview/share control plane is unreachable (or under boundary
  recheck). New share link issuance is a managed-only action and may fail
  closed, but local export and local-only work must remain available.

inputs:
  family_row_ref:
    file: artifacts/service/capacity_assumption_rows.yaml
    family_id: preview_and_share_family
  observed_state:
    metric: preview_share_reachability
    observed_value: unavailable
    breach_summary: >
      Reachability failure must not be surfaced as whole-product failure.
      New share issuance blocks; local export remains available.

required_behavior:
  must_not_break_local_workflow:
    - Local editing and local export.
  managed_only_action_block:
    - New share link issuance fails closed with a recovery cue.
    - No “share succeeded” state is shown under uncertainty.
  disclosures_required:
    - Provide manual export alternatives.
    - Cite the preview/share family row in the disclosure.

assertions:
  blocks_new_share_links: true
  blocks_local_export: false
  whole_product_failure_copy_used: false

narrative_refs:
  - docs/service/managed_service_capacity_and_cost_guardrails.md

