capacity_guardrail_case_schema_version: 1
case_id: service.capacity_guardrail.metering_unavailable_fail_open_local_work
case_title: Metering unavailable fails open for local work and blocks only bounded spend actions
expected_decision: fail_open_local_safe_with_narrow_fail_closed

scenario: >
  The metering/usage export plane is unavailable. Local work must remain
  available; managed actions requiring bounded spend may fail closed for
  that action only, with explicit disclosure and export alternatives
  where required.

inputs:
  family_row_ref:
    file: artifacts/service/capacity_assumption_rows.yaml
    family_id: metering_and_chargeback_family
  observed_state:
    metric: meter_plane_reachability
    observed_value: unavailable
    breach_summary: >
      Meter plane outage must not create a hidden prerequisite for local
      productivity.

required_behavior:
  must_not_break_local_workflow:
    - Local editing, search, Git, and existing automation.
  narrow_blocking_rules:
    - Managed actions that cannot bound spend fail closed for that action only.
    - Managed actions with documented local fallback route to the fallback with explicit labeling.
  disclosures_required:
    - Usage exports remain reachable where a number is displayed.
    - Prompt ordering keeps continue-local and export actions before billing-pressure prompts.

assertions:
  blocks_local_work: false
  blocks_only_bounded_spend_actions: true
  export_paths_remain_available: true

narrative_refs:
  - docs/service/managed_service_capacity_and_cost_guardrails.md
  - docs/service/metering_and_chargeback_contract.md

