# Structured-artifact review corpus.
#
# Reviewer-facing case manifest for the review_surface_record seed
# frozen in docs/review/structured_artifact_review_seed.md. Each case
# exercises one review_artifact_class row in
# artifacts/review/structured_artifact_classes.yaml and carries one
# expected review surface, merge posture, and visible reason.
#
# Surfaces consuming these cases MUST NOT mint tokens outside the
# enumerations declared in
# schemas/review/review_surface_record.schema.json.

schema_version: 1
corpus_id: review.structured_diff_cases_manifest.v1

summary: >
  Eleven worked cases, one per review_artifact_class, covering
  cell-aware notebook compare with metadata-filter and output-ignore
  presets, schema-supported JSON semantic merge with unknown-field
  survival, YAML structure-aware fallback for undocumented sections,
  TOML semantic merge with comment preservation, lockfile regenerate-
  or-review via the manifest canonical direction, coverage sidecar
  bound to a verified build identity, SBOM compare-only with vendor-
  field survival, source-map compare bound to a debug-artifact entry,
  image perceptual compare with no auto-merge, evidence immutable
  reader, and generated source back-linked to the safe-edit posture
  record.

seed_doc: docs/review/structured_artifact_review_seed.md
matrix_doc: artifacts/review/structured_artifact_classes.yaml
record_schema: schemas/review/review_surface_record.schema.json

related_schemas:
  safe_edit_posture_schema: schemas/generated/artifact_edit_posture.schema.json
  debug_artifact_manifest_schema: schemas/debug/debug_artifact_manifest.schema.json

# ---------------------------------------------------------------------
# Frozen vocabulary (cited for local parity). A case that introduces a
# token outside these lists must bump the schema first; this corpus
# adopts the new token by reference, not duplication.
# ---------------------------------------------------------------------

review_surface_schema_version: 1

review_artifact_class_vocabulary:
  - jupyter_notebook
  - structured_config_json
  - structured_config_yaml
  - structured_config_toml
  - lockfile_or_dependency_manifest
  - coverage_profile_artifact
  - sbom_or_generated_metadata
  - source_map_or_debug_sidecar
  - image_or_design_snapshot
  - evidence_packet
  - generated_source_artifact

merge_posture_class_vocabulary:
  - no_auto_merge
  - semantic_merge_where_safe
  - regenerate_or_review
  - compare_only

posture_reason_class_vocabulary:
  - cell_and_output_identity_at_risk
  - schema_support_proven_with_unknown_field_survival
  - schema_support_partial_structure_aware_only
  - solver_meaning_may_change_under_normalization
  - generated_from_canonical_source
  - round_trip_unproven_for_bytes
  - sidecar_requires_build_identity_match
  - binary_or_opaque_payload
  - evidence_immutability_required

# ---------------------------------------------------------------------
# Cases. Each entry names the review_artifact_class it exercises and
# the fixture file that carries the expected review_surface_record.
# ---------------------------------------------------------------------

cases:
  - case_id: review.case.jupyter_notebook.cell_aware_merge
    review_artifact_class: jupyter_notebook
    fixture_ref: fixtures/review/structured_diff_cases/jupyter_notebook_cell_aware_merge.json
    exercises:
      - "cell_aware_compare_viewer default"
      - "metadata-filter preset preserves Jupyter + aureline namespaces"
      - "output-handling preset ignores outputs by default"
      - "cell_id_stability_required = true"
      - "semantic_merge_where_safe permitted_with_round_trip_corpus"

  - case_id: review.case.structured_config_json.semantic_merge
    review_artifact_class: structured_config_json
    fixture_ref: fixtures/review/structured_diff_cases/structured_config_json_semantic_merge.json
    exercises:
      - "semantic_compare_viewer default"
      - "schema_support_proven_with_unknown_field_survival reason"
      - "required_survival for unknown JSON members"
      - "permitted_where_semantics_defined merge-driver admission"

  - case_id: review.case.structured_config_yaml.structure_aware_fallback
    review_artifact_class: structured_config_yaml
    fixture_ref: fixtures/review/structured_diff_cases/structured_config_yaml_structure_aware_fallback.json
    exercises:
      - "semantic_compare_viewer default"
      - "schema_support_partial_structure_aware_only reason on undocumented sections"
      - "comment / ordering preservation on save"
      - "secrets_or_policy_tokens_may_require_redaction trust constraint"

  - case_id: review.case.structured_config_toml.comment_preservation_merge
    review_artifact_class: structured_config_toml
    fixture_ref: fixtures/review/structured_diff_cases/structured_config_toml_comment_preservation_merge.json
    exercises:
      - "semantic_compare_viewer default"
      - "schema_support_partial_structure_aware_only reason"
      - "comment preservation across semantic merge"
      - "permitted_where_semantics_defined merge-driver admission"

  - case_id: review.case.lockfile_or_dependency_manifest.regenerate_or_review
    review_artifact_class: lockfile_or_dependency_manifest
    fixture_ref: fixtures/review/structured_diff_cases/lockfile_regenerate_or_review.json
    exercises:
      - "structure_aware_compare_viewer default"
      - "regenerate_or_review merge posture"
      - "solver_meaning_may_change_under_normalization reason"
      - "paired_with_canonical_direction manifest->lockfile"
      - "forbidden_until_round_trip_proven merge-driver admission"

  - case_id: review.case.coverage_profile_artifact.sidecar_bind_compare_only
    review_artifact_class: coverage_profile_artifact
    fixture_ref: fixtures/review/structured_diff_cases/coverage_profile_sidecar_bind_compare_only.json
    exercises:
      - "sidecar_bind_viewer default"
      - "compare_only merge posture"
      - "sidecar_requires_build_identity_match reason"
      - "binary_preview_sandboxed trust constraint"
      - "forbidden_compare_only_surface merge-driver admission"

  - case_id: review.case.sbom_or_generated_metadata.compare_only_vendor_survival
    review_artifact_class: sbom_or_generated_metadata
    fixture_ref: fixtures/review/structured_diff_cases/sbom_compare_only_vendor_survival.json
    exercises:
      - "structure_aware_compare_viewer default"
      - "compare_only merge posture"
      - "round_trip_unproven_for_bytes reason"
      - "required_survival for unknown SBOM vendor fields"
      - "untrusted_rich_content_sanitized trust constraint"

  - case_id: review.case.source_map_or_debug_sidecar.debug_artifact_backlink
    review_artifact_class: source_map_or_debug_sidecar
    fixture_ref: fixtures/review/structured_diff_cases/source_map_debug_artifact_backlink.json
    exercises:
      - "sidecar_bind_viewer default"
      - "no_auto_merge merge posture"
      - "generated_from_canonical_source reason"
      - "required_link_to_debug_artifact_manifest backlink"

  - case_id: review.case.image_or_design_snapshot.perceptual_no_auto_merge
    review_artifact_class: image_or_design_snapshot
    fixture_ref: fixtures/review/structured_diff_cases/image_perceptual_no_auto_merge.json
    exercises:
      - "perceptual_or_side_by_side_viewer default"
      - "no_auto_merge merge posture"
      - "binary_or_opaque_payload reason"
      - "binary_preview_sandboxed trust constraint"

  - case_id: review.case.evidence_packet.immutable_reader
    review_artifact_class: evidence_packet
    fixture_ref: fixtures/review/structured_diff_cases/evidence_packet_immutable_reader.json
    exercises:
      - "evidence_reader_viewer default"
      - "no_auto_merge merge posture"
      - "evidence_immutability_required reason"
      - "not_applicable_mirror_or_evidence canonical-source rule"
      - "evidence_read_only_redaction_applies trust constraint"

  - case_id: review.case.generated_source_artifact.safe_edit_backlink
    review_artifact_class: generated_source_artifact
    fixture_ref: fixtures/review/structured_diff_cases/generated_source_safe_edit_backlink.json
    exercises:
      - "structure_aware_compare_viewer default"
      - "regenerate_or_review merge posture"
      - "generated_from_canonical_source reason"
      - "required_link_to_safe_edit_posture_record backlink"
