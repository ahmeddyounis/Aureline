    retention_stance_classes: [bounded_retention_operator_access_only]
    region_posture_classes: [single_region_pinned]
    quota_family_classes: [enterprise_gateway_pooled_quota]
    enterprise_gateway_broker_posture_classes: [customer_operated_enterprise_gateway]
    tainted_return_posture_classes: [always_tainted_external_completion]
    approval_posture_classes: [allowed_with_per_session_prompt]
    deployment_profiles_admitted: [managed_cloud, managed_fleet]
