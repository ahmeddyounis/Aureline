__fixture__:
  name: byok_vendor_direct_provider
  scenario: >
    A user has attached a vendor AI account through the connected-
    provider approval-ticket / browser-handoff flow and registered a
    BYOK route that calls the vendor directly with a user-held API
    key addressed through the secret broker. The provider-registry
    entry names execution_locus_class = byok_remote_vendor_direct,
    auth_mode_class = byok_api_key, transport_class = remote_https,
    region_posture_class = multi_region_pinned, retention_stance_
    class = bounded_retention_with_user_export, tainted_return_
    posture_class = always_tainted_external_completion, and
    approval_posture_class = allowed_with_per_session_prompt. The
    selection disclosure cites the admitting approval-ticket ref so
    the invocation cannot bypass the approval path.
  exercised_contract_sections:
    - section_1_identity_spine
    - section_2_pre_invocation_disclosure
    - section_3_cross_locus_identity_parity
    - section_6_approval_ticket_composition
    - section_7_redaction_posture
  exercised_classes:
    provider_classes: [connected_provider_vendor]
    execution_locus_classes: [byok_remote_vendor_direct]
    transport_classes: [remote_https]
    auth_mode_classes: [byok_api_key]
    retention_stance_classes: [bounded_retention_with_user_export]
    region_posture_classes: [multi_region_pinned]
    quota_family_classes: [per_user_byok_vendor_quota]
    tainted_return_posture_classes: [always_tainted_external_completion]
    approval_posture_classes: [allowed_with_per_session_prompt]
    offline_posture_classes: [online_required]
    cost_visibility_classes: [metered_per_token]
    enterprise_gateway_broker_posture_classes: [no_broker_direct_route]
    audit_event_ids:
      - ai_provider_registry_entry_minted
      - ai_provider_selection_disclosed_before_invocation
