__fixture__:
  name: remote_http_external_tool
  scenario: >
    An enterprise-registered remote MCP server over streamable HTTP
    is admitted as an external tool for managed fleets: every
    invocation rides an enterprise-gateway-brokered service that
    fronts a vendor-side tool-execution endpoint. The registry
    entry names tool_class = enterprise_registered_external_tool,
    tool_transport_class = remote_mcp_over_streamable_http,
    tool_execution_locus_class = enterprise_gateway_brokered_
    service, tool_auth_mode_class = enterprise_gateway_managed_
    credential, tool_output_trust_posture_class = always_tainted_
    remote_service_output, approval_posture_class = requires_admin_
    approval. The invocation disclosure surfaces every required
    chip plus deployment_profile_chip and policy_epoch_chip; the
    invocation spends a pre-approved admin-signed approval ticket
    so it does not bypass the approval / policy / audit path.
  exercised_contract_sections:
    - section_5_external_tools_tainted_by_default
    - section_5_2_same_as_native_permission_model
    - section_5_3_side_effect_and_data_class_containment
    - section_5_4_transport_and_locus_visibility
    - section_7_redaction_posture
  exercised_classes:
    tool_classes: [enterprise_registered_external_tool]
    tool_transport_classes: [remote_mcp_over_streamable_http]
    tool_execution_locus_classes: [enterprise_gateway_brokered_service]
    tool_auth_mode_classes: [enterprise_gateway_managed_credential]
    tool_output_trust_posture_classes: [always_tainted_remote_service_output]
    tool_lifecycle_state_classes: [generally_admitted]
    offline_posture_classes: [online_required]
    approval_posture_classes: [requires_admin_approval]
    allowed_side_effect_classes: [inspect_only, external_reversible_comment]
    region_posture_classes: [single_region_pinned]
    retention_stance_classes: [bounded_retention_operator_access_only]
    invocation_origin_classes: [ai_turn_background_branch_agent]
    audit_event_ids:
      - ai_external_tool_registry_entry_minted
      - ai_external_tool_invocation_admitted
      - ai_external_tool_output_tainted_by_default
