__fixture__:
  name: local_http_external_tool
  scenario: >
    A local loopback HTTP tool is admitted as an external tool: a
    companion service on the user's device exposes a small HTTP
    interface on 127.0.0.1 for running a deterministic lint against
    the workspace. The registry entry names tool_class =
    user_registered_external_tool, tool_transport_class =
    local_http_loopback, tool_execution_locus_class = local_
    companion_service_loopback, tool_auth_mode_class =
    no_auth_loopback_only, tool_output_trust_posture_class =
    always_tainted_external_tool_output, approval_posture_class =
    allowed_with_per_session_prompt. The invocation runs from a
    user palette command (invocation_origin_class = user_palette_
    command) and spends a per-session approval ticket so the
    invocation cannot bypass the approval / policy / audit path.
  exercised_contract_sections:
    - section_5_external_tools_tainted_by_default
    - section_5_4_transport_and_locus_visibility
    - section_7_redaction_posture
  exercised_classes:
    tool_classes: [user_registered_external_tool]
    tool_transport_classes: [local_http_loopback]
    tool_execution_locus_classes: [local_companion_service_loopback]
    tool_auth_mode_classes: [no_auth_loopback_only]
    tool_output_trust_posture_classes: [always_tainted_external_tool_output]
    tool_lifecycle_state_classes: [generally_admitted]
    offline_posture_classes: [offline_only_no_network_egress]
    approval_posture_classes: [allowed_with_per_session_prompt]
    allowed_side_effect_classes: [inspect_only]
    invocation_origin_classes: [user_palette_command]
    disclosure_kinds_surfaced:
      - tool_identity_chip
      - tool_transport_chip
      - tool_execution_locus_chip
      - tool_auth_mode_chip
      - tool_output_trust_posture_chip
      - allowed_side_effect_readout
      - allowed_data_class_readout
      - approval_posture_chip
      - policy_epoch_chip
    audit_event_ids:
      - ai_external_tool_registry_entry_minted
      - ai_external_tool_invocation_admitted
      - ai_external_tool_output_tainted_by_default
