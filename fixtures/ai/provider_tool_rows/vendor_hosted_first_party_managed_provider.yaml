    provider_classes: [first_party_managed]
    execution_locus_classes: [vendor_hosted_first_party_managed]
    transport_classes: [remote_https]
    auth_mode_classes: [vendor_hosted_first_party_managed_credential]
    retention_stance_classes: [no_retention_promised_body_discarded]
    region_posture_classes: [multi_region_pinned]
    quota_family_classes: [vendor_hosted_entitlement_quota]
    enterprise_gateway_broker_posture_classes: [no_broker_direct_route]
    tainted_return_posture_classes: [always_tainted_external_completion]
    approval_posture_classes: [allowed_with_one_time_prompt]
    cost_visibility_classes: [bundled_no_incremental_cost]
    audit_event_ids:
      - ai_provider_registry_entry_minted
      - ai_provider_selection_disclosed_before_invocation
