  scenario: >
    A first-party-operated managed route where Aureline holds the
    vendor contract and the end user never handles a per-vendor
    credential. The provider-registry entry names execution_locus_
    class = vendor_hosted_first_party_managed, auth_mode_class =
    vendor_hosted_first_party_managed_credential, transport_class =
    remote_https, region_posture_class = multi_region_pinned,
    retention_stance_class = no_retention_promised_body_discarded,
    quota_family_class = vendor_hosted_entitlement_quota, and
    approval_posture_class = allowed_with_one_time_prompt. The
    selection disclosure surfaces cost_visibility_chip =
    bundled_no_incremental_cost so the user can see this route is
    covered by the managed entitlement.
  exercised_contract_sections:
    - section_1_identity_spine
    - section_2_pre_invocation_disclosure
    - section_3_cross_locus_identity_parity
    - section_7_redaction_posture
