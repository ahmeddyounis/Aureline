__fixture__:
  name: stdio_mcp_external_tool
  scenario: >
    A user-registered MCP server is admitted as an external tool.
    The tool runs as a local subprocess on the user's device with
    stdio framing; the registry entry names tool_class =
    mcp_server_tool, tool_transport_class = remote_mcp_over_stdio,
    tool_execution_locus_class = local_subprocess_same_device,
    tool_auth_mode_class = signed_manifest_only, tool_output_trust_
    posture_class = always_tainted_external_tool_output, approval_
    posture_class = allowed_with_per_invocation_prompt, and cites
    the admitting approval-ticket ref. The invocation disclosure
    surfaces every required disclosure chip and cites the
    approval-ticket ref for this specific invocation so the
    invocation cannot bypass the approval path; the audit trail
    records ai_external_tool_output_tainted_by_default so reviewers
    can confirm the tainted fence applied to the return.
  exercised_contract_sections:
    - section_5_external_tools_tainted_by_default
    - section_7_redaction_posture
    - section_8_audit_event_reuse
  exercised_classes:
    tool_classes: [mcp_server_tool]
    tool_transport_classes: [remote_mcp_over_stdio]
    tool_execution_locus_classes: [local_subprocess_same_device]
    tool_auth_mode_classes: [signed_manifest_only]
    tool_output_trust_posture_classes: [always_tainted_external_tool_output]
    tool_lifecycle_state_classes: [generally_admitted]
    offline_posture_classes: [offline_preferred_online_bonus]
    approval_posture_classes: [allowed_with_per_invocation_prompt]
    allowed_side_effect_classes: [inspect_only, local_reversible_edit]
    invocation_origin_classes: [ai_turn_inline_composer]
    disclosure_kinds_surfaced:
      - tool_identity_chip
      - tool_transport_chip
      - tool_execution_locus_chip
      - tool_auth_mode_chip
      - tool_output_trust_posture_chip
      - allowed_side_effect_readout
      - allowed_data_class_readout
      - approval_posture_chip
      - policy_epoch_chip
      - workspace_trust_chip
    audit_event_ids:
      - ai_external_tool_registry_entry_minted
      - ai_external_tool_invocation_admitted
      - ai_external_tool_output_tainted_by_default
