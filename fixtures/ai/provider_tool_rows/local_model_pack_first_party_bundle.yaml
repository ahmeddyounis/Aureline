__fixture__:
  name: local_model_pack_first_party_bundle
  scenario: >
    A first-party-bundled local-model pack serves a code-completion
    model family entirely in-process on the user's device with no
    network egress. The provider-registry entry names
    execution_locus_class = local_in_process, region_posture_class =
    local_device_only, retention_stance_class = no_retention_local_only,
    auth_mode_class = signed_manifest_only_local_pack, and
    transport_class = in_process_call. The pack is bundled with the
    first-party binary, verified through a first-party signing
    profile, and trusted as trusted_first_party_bundle. A provider-
    selection disclosure minted before invocation surfaces every
    required disclosure kind plus deployment_profile_chip and
    workspace_trust_chip.
  exercised_contract_sections:
    - section_1_identity_spine
    - section_2_pre_invocation_disclosure
    - section_4_local_model_pack_integrity
    - section_7_redaction_posture
  exercised_classes:
    provider_classes: [first_party_self_hosted]
    execution_locus_classes: [local_in_process]
    transport_classes: [in_process_call]
    auth_mode_classes: [signed_manifest_only_local_pack]
    retention_stance_classes: [no_retention_local_only]
    region_posture_classes: [local_device_only]
    quota_family_classes: [per_user_local_no_limit]
    pack_origin_classes: [first_party_bundled_local_pack]
    pack_verification_state_classes: [verified_signature_valid]
    pack_trust_posture_classes: [trusted_first_party_bundle]
    tainted_return_posture_classes: [trusted_first_party_bundle_output]
    approval_posture_classes: [allowed_without_prompt]
    offline_posture_classes: [offline_only_no_network_egress]
    disclosure_kinds_surfaced:
      - provider_identity_chip
      - model_identity_chip
      - execution_locus_chip
      - region_posture_chip
      - retention_stance_chip
      - data_class_allowlist_readout
      - quota_family_chip
      - transport_class_chip
      - auth_mode_chip
      - deployment_profile_chip
      - workspace_trust_chip
      - tainted_return_posture_chip
    audit_event_ids:
      - ai_local_model_pack_verified
      - ai_local_model_pack_admitted
      - ai_provider_registry_entry_minted
      - ai_provider_selection_disclosed_before_invocation
