__fixture__:
  name: delete_thread_fanout
  scenario: >
    A user invokes "Delete this thread" on a conversation. The request
    clears the user-visible conversation history and any regeneratable
    caches bound to the thread (derived cache + embeddings). Two durable
    classes are intentionally preserved: a retained evidence packet copy
    (because evidence retention is governed outside the AI memory layer)
    and an explicit user pin (because only the user can unpin it).
  exercised_classes:
    ai_memory_classes:
      - conversation_history_user_visible
      - derived_cache_regeneratable
      - embedding_row_regeneratable
      - retained_evidence_packet_copy
      - explicit_saved_memory_user_owned
    request_outcome_class: partially_completed_subset_blocked
    preserved_reason_classes:
      - evidence_packet_overrides
      - user_pin_only_user_can_unpin
