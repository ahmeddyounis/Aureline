# yaml-language-server: $schema=../../../schemas/ai/memory_object.schema.json
__fixture__:
  name: export_user_self_service_fanout
  scenario: >
    A user requests a self-service export of AI-related state. The export
    includes user-visible conversation history and explicit user-pinned
    memory. Workspace-scoped reusable repo facts are included as metadata
    only. Regeneratable caches (derived caches + embeddings) are excluded
    by design but disclosed per class. Retained evidence packets are
    exported through the evidence packet shape, not as generic "AI
    history" rows.
  exercised_classes:
    export_target_class: user_self_service_export
    included_ai_memory_classes:
      - conversation_history_user_visible
      - explicit_saved_memory_user_owned
      - reusable_repo_fact_workspace_scope
      - retained_evidence_packet_copy
    excluded_ai_memory_classes:
      - turn_state_ephemeral
      - derived_cache_regeneratable
      - embedding_row_regeneratable
---
record_kind: ai_memory_export_assembly_record
ai_memory_object_schema_version: 1
export_assembly_id: ai:export-assembly:user-self-service:0001
export_target_class: user_self_service_export
included_classes:
  - ai_memory_class: conversation_history_user_visible
    export_posture_class: exportable_as_user_visible
    row_count_class: row_count_small_under_ten
    memory_object_refs:
      - ai:memory-object:thread-history:0001
  - ai_memory_class: explicit_saved_memory_user_owned
    export_posture_class: exportable_as_user_visible
    row_count_class: row_count_small_under_ten
    memory_object_refs:
      - ai:memory-object:user-pin:0001
  - ai_memory_class: reusable_repo_fact_workspace_scope
    export_posture_class: exportable_metadata_only
    row_count_class: row_count_medium_under_one_hundred
  - ai_memory_class: retained_evidence_packet_copy
    export_posture_class: exportable_as_evidence_packet
    row_count_class: row_count_small_under_ten
excluded_classes:
  - ai_memory_class: turn_state_ephemeral
    exclusion_reason_class: no_rows_present
  - ai_memory_class: derived_cache_regeneratable
    exclusion_reason_class: regeneratable_excluded_by_design
  - ai_memory_class: embedding_row_regeneratable
    exclusion_reason_class: regeneratable_excluded_by_design
policy_context:
  policy_epoch: pe:2026-04-24:01
  trust_state: trusted
  execution_context_id: exec:export:01
redaction_class: metadata_safe_default
minted_at: "2026-05-05T22:25:00Z"

