# yaml-language-server: $schema=../../../schemas/ai/prompt_composer_session.schema.json
__fixture__:
  name: tainted_log_broker_redacted_credential
  scenario: >
    A user runs a /review slash command with a log_span_mention
    pointing at an authentication failure log span. The
    log_span_capture attachment contains a credential handle that
    matches the broker-owned redaction pass. The composer admits
    the attachment with disposition_class =
    redacted_under_broker_pass and trust_posture =
    untrusted_log_capture, with fence strategy
    quoted_as_data_only and the full tainted_usage_constraints
    set. Pre-dispatch disclosure renders
    redacted_attachment_count = 1 and tainted_attachment_count = 1
    verbatim. The typed omission explainer marks the redacted
    bytes as irreversible_denied_always with the safe next action
    select_alternative_target.
  packet_ref: docs/verification/prompt_composer_packet.md
  audit_matrix_row_ref: prompt_composer.edge.tainted_log.broker_redacted_credential
  triggering_disposition: redacted_under_broker_pass
  exercised_axes:
    - attachments_axis
    - tainted_pasted_content_axis
    - required_disclosure_axis
  exercised_contract_sections:
    - prompt_composer_attachment_descriptor
    - prompt_composer_predispatch_disclosure_record
    - tainted_usage_constraints
    - count_disclosure_discipline
    - typed_request_workspace_ref
  omission_explainer:
    what_was_excluded: log_span_capture_with_credential_handle
    why_excluded: redacted_under_broker_pass
    reversible_class: irreversible_denied_always
    safe_next_action_class: select_alternative_target
    explainer_summary: >-
      A log_span_capture body matched the broker-owned credential-
      handle redaction pass. The composer admits the attachment
      with credential bytes redacted; the credential bytes
      themselves are denied_always. User MAY pick an alternative
      log span or dispatch with the redacted capture.
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_mention_descriptor
      - prompt_composer_attachment_descriptor
      - prompt_composer_slash_command_invocation_record
      - prompt_composer_predispatch_disclosure_record
      - prompt_composer_session_audit_event_record
    mention_kinds: [log_span_mention]
    attachment_kinds: [log_span_capture]
    attachment_disposition_classes: [redacted_under_broker_pass]
    trust_postures: [untrusted_log_capture]
    tainted_fence_strategies: [quoted_as_data_only]
    slash_command_classes: [review_slash_command]
    audit_event_ids:
      - composer_turn_draft_attachment_redacted
      - composer_turn_draft_predispatch_disclosure_minted
      - composer_turn_draft_dispatched_inline

