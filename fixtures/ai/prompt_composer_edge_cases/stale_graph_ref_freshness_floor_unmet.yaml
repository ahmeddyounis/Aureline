# yaml-language-server: $schema=../../../schemas/ai/prompt_composer_session.schema.json
__fixture__:
  name: stale_graph_ref_freshness_floor_unmet
  scenario: >
    A user runs an /explain slash command with a
    graph_summary_mention pointing at a precomputed graph summary
    whose source pack is past the declared freshness floor. The
    composer drops the mention with disposition_class =
    omitted_freshness_floor_unmet rather than render stale graph
    context. Pre-dispatch disclosure renders
    omitted_attachment_count = 1 verbatim with a typed omission
    explainer naming the safe next action refresh_freshness_index.
  packet_ref: docs/verification/prompt_composer_packet.md
  audit_matrix_row_ref: prompt_composer.edge.stale_graph_ref.freshness_floor_unmet
  triggering_disposition: omitted_freshness_floor_unmet
  exercised_axes:
    - mentions_axis
    - omitted_context_axis
    - required_disclosure_axis
  exercised_contract_sections:
    - prompt_composer_mention_descriptor
    - prompt_composer_predispatch_disclosure_record
    - omission_dispositions
    - count_disclosure_discipline
    - typed_request_workspace_ref
  omission_explainer:
    what_was_excluded: graph_summary_mention
    why_excluded: omitted_freshness_floor_unmet
    reversible_class: reversible_by_freshness_refresh
    safe_next_action_class: refresh_freshness_index
    explainer_summary: >-
      A graph_summary_mention was dropped because its source pack
      is past the declared freshness floor. User MAY refresh the
      graph index and retry, or dispatch without the stale
      summary.
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_mention_descriptor
      - prompt_composer_slash_command_invocation_record
      - prompt_composer_predispatch_disclosure_record
      - prompt_composer_session_audit_event_record
    mention_kinds: [graph_summary_mention]
    attachment_disposition_classes: [omitted_freshness_floor_unmet]
    slash_command_classes: [explain_slash_command]
    audit_event_ids:
      - composer_turn_draft_attachment_omitted
      - composer_turn_draft_predispatch_disclosure_minted
      - composer_turn_draft_dispatched_inline

