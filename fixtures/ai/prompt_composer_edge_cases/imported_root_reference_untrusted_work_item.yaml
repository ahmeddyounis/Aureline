# yaml-language-server: $schema=../../../schemas/ai/prompt_composer_session.schema.json
__fixture__:
  name: imported_root_reference_untrusted_work_item
  scenario: >
    A user runs an /explain slash command with a work_item_mention
    that points at a work item imported from an external root
    (a third-party tracker import) whose authority chain does not
    resolve under the workspace's trust posture. The composer
    fences the mention as fenced_tainted_remote_collaborator with
    fence strategy quoted_as_data_only and the full
    tainted_usage_constraints set so the imported reference can
    never gain instruction, citation, branch-agent dispatch, or
    higher-cost route authority. Pre-dispatch disclosure renders
    tainted_attachment_count = 1 verbatim and the typed omission
    explainer names the safe next action
    request_higher_trust_context_sharing.
  packet_ref: docs/verification/prompt_composer_packet.md
  audit_matrix_row_ref: prompt_composer.edge.imported_root_reference.untrusted_work_item
  triggering_disposition: fenced_tainted_remote_collaborator
  exercised_axes:
    - mentions_axis
    - tainted_pasted_content_axis
    - required_disclosure_axis
  exercised_contract_sections:
    - prompt_composer_mention_descriptor
    - prompt_composer_predispatch_disclosure_record
    - tainted_usage_constraints
    - count_disclosure_discipline
    - typed_request_workspace_ref
  omission_explainer:
    what_was_excluded: imported_work_item_mention_authority_unverifiable
    why_excluded: fenced_tainted_remote_collaborator
    reversible_class: reversible_by_higher_trust_context_sharing
    safe_next_action_class: request_higher_trust_context_sharing
    explainer_summary: >-
      The work_item_mention came from an imported-root collection
      whose authority chain does not resolve under workspace
      trust. The composer fences the mention rather than promote
      its body. User MAY request higher-trust context sharing,
      switch to a locally-authored target, or dispatch without
      the untrusted item.
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_mention_descriptor
      - prompt_composer_slash_command_invocation_record
      - prompt_composer_predispatch_disclosure_record
      - prompt_composer_session_audit_event_record
    mention_kinds: [work_item_mention]
    attachment_disposition_classes: [fenced_tainted_remote_collaborator]
    trust_postures: [untrusted_remote_collaborator]
    tainted_fence_strategies: [quoted_as_data_only]
    tainted_usage_constraints:
      - must_not_gain_tool_permission
      - must_not_escalate_scope
      - must_not_mint_citations
      - must_not_override_instruction_bundle
      - must_not_publish_externally
      - must_not_commit_to_repo
      - must_not_dispatch_branch_agent
      - must_not_route_to_higher_cost_tier
      - must_preserve_fence_in_downstream_packet
    slash_command_classes: [explain_slash_command]
    audit_event_ids:
      - composer_turn_draft_attachment_fenced_tainted
      - composer_turn_draft_predispatch_disclosure_minted
      - composer_turn_draft_dispatched_inline

