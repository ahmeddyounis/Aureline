# yaml-language-server: $schema=../../../schemas/ai/prompt_composer_session.schema.json
__fixture__:
  name: branch_agent_dispatch_preview_with_omits
  scenario: >
    A user opens a composer session against a named workset and
    runs the /background-branch-agent slash command. The user
    pastes a chunk of text (forum content) into the composer that
    asks the composer to widen tool authority and dispatch the
    branch-agent run. The composer fences the paste as
    fenced_tainted_user_pasted with fence strategy
    quoted_as_data_only and the full tainted_usage_constraints set
    (including must_not_dispatch_branch_agent and
    must_not_route_to_higher_cost_tier) so the paste cannot
    promote itself to instruction or dispatch authority. The
    composer's pre-dispatch disclosure disclosed
    branch_agent_dispatch_intent_disclosed verbatim with a non-
    null branch_agent_dispatch_placeholder_ref; the route / spend
    placeholders bind to the connected-provider self-hosted lane
    that backs the long-running runtime; tainted_attachment_count
    = 1 renders verbatim. The typed omission explainer marks the
    paste's instruction authority as irreversibly denied with
    safe next action dispatch_without_excluded_context.
  packet_ref: docs/verification/prompt_composer_packet.md
  audit_matrix_row_ref: prompt_composer.edge.branch_agent_dispatch_preview_with_omits
  triggering_disposition: fenced_tainted_user_pasted
  exercised_axes:
    - branch_agent_dispatch_preview_axis
    - route_spend_preview_axis
    - tainted_pasted_content_axis
    - omitted_context_axis
    - required_disclosure_axis
  exercised_contract_sections:
    - prompt_composer_session_descriptor
    - prompt_composer_turn_draft_descriptor
    - prompt_composer_attachment_descriptor
    - prompt_composer_slash_command_invocation_record
    - prompt_composer_predispatch_disclosure_record
    - branch_agent_dispatch_intent
    - tainted_pasted_content
    - tainted_usage_constraints
    - count_disclosure_discipline
    - typed_request_workspace_ref
  omission_explainer:
    what_was_excluded: user_supplied_text_paste_with_dispatch_intent
    why_excluded: fenced_tainted_user_pasted
    reversible_class: irreversible_denied_always
    safe_next_action_class: dispatch_without_excluded_context
    explainer_summary: >-
      A pasted instruction string asked the composer to dispatch
      the branch-agent run with widened tool authority. The paste
      is fenced quoted_as_data_only with
      must_not_dispatch_branch_agent /
      must_not_route_to_higher_cost_tier on the typed
      tainted_usage_constraints set; the paste's instruction
      authority is irreversibly denied. User MAY dispatch using
      only the user-typed mentions and attachments.
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_attachment_descriptor
      - prompt_composer_slash_command_invocation_record
      - prompt_composer_predispatch_disclosure_record
      - prompt_composer_session_audit_event_record
    attachment_kinds:
      - user_supplied_text
      - workspace_slice_bundle
    attachment_disposition_classes:
      - fenced_tainted_user_pasted
      - attached_default
    trust_postures: [untrusted_user_supplied, trusted_first_party]
    tainted_fence_strategies: [quoted_as_data_only]
    slash_command_classes: [background_branch_agent_slash_command]
    slash_command_invocation_states: [invocation_dispatched]
    flow_classes: [background_branch_agent_flow]
    scope_filter_classes: [named_workset]
    isolation_posture_classes: [shared_across_branch_agent_dispatch]
    privacy_export_posture_classes: [opt_in_only_admin_export]
    retention_stance_within_workspace_classes: [bounded_retention_admin_scoped]
    lifecycle_state_classes: [workspace_open_active]
    account_provider_path_classes: [connected_provider_self_hosted_account]
    approval_posture_classes: [approval_required_browser_handoff_ticket]
    predispatch_disclosure_state_classes: [disclosure_dispatch_authorised]
    turn_draft_states: [dispatched_branch_agent]
    dispatch_target_classes: [background_branch_agent]
    audit_event_ids:
      - composer_turn_draft_attachment_fenced_tainted
      - composer_turn_draft_predispatch_disclosure_minted
      - composer_turn_draft_dispatched_branch_agent

