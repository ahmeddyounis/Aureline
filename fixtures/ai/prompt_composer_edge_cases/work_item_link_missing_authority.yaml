__fixture__:
  name: work_item_link_missing_authority
  scenario: >
    A user runs an /explain slash command with a
    work_item_relation_mention pointing at a related work item
    whose owning project authority is not on the admin allow-list
    for this workspace. The composer blocks the mention with
    disposition_class = policy_blocked_admin_policy. Pre-dispatch
    disclosure renders policy_blocked_attachment_count = 1
    verbatim with a typed omission explainer naming the safe next
    action request_admin_policy_change.
  packet_ref: docs/verification/prompt_composer_packet.md
  audit_matrix_row_ref: prompt_composer.edge.work_item_link_missing_authority
  triggering_disposition: policy_blocked_admin_policy
  exercised_axes:
    - mentions_axis
    - omitted_context_axis
    - required_disclosure_axis
  exercised_contract_sections:
    - prompt_composer_mention_descriptor
    - prompt_composer_predispatch_disclosure_record
    - omission_dispositions
    - count_disclosure_discipline
    - typed_request_workspace_ref
  omission_explainer:
    what_was_excluded: work_item_relation_mention_authority_missing
    why_excluded: policy_blocked_admin_policy
    reversible_class: reversible_by_admin_policy_change
    safe_next_action_class: request_admin_policy_change
    explainer_summary: >-
      A work_item_relation_mention's owning project authority
      is not on the admin allow-list. User MAY request an admin
      policy change, or dispatch without the blocked relation.
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_mention_descriptor
      - prompt_composer_slash_command_invocation_record
      - prompt_composer_predispatch_disclosure_record
      - prompt_composer_session_audit_event_record
    mention_kinds: [work_item_relation_mention]
    attachment_disposition_classes: [policy_blocked_admin_policy]
    slash_command_classes: [explain_slash_command]
    audit_event_ids:
      - composer_turn_draft_attachment_policy_blocked
      - composer_turn_draft_predispatch_disclosure_minted
      - composer_turn_draft_dispatched_inline

