# yaml-language-server: $schema=../../../schemas/ai/prompt_composer_session.schema.json
__fixture__:
  name: oversized_attachment_budget_omit
  scenario: >
    A user opens a composer session against the current workspace
    root and runs an /explain slash command pointing at one
    attached file_slice and one large file_slice mention that
    exceeds the per-section composer budget. The composer admits
    the smaller file_slice attachment but drops the oversized
    file_slice with disposition_class = omitted_under_budget. The
    pre-dispatch disclosure card renders omitted_attachment_count
    = 1 verbatim and the typed audit event
    composer_turn_draft_attachment_omitted records the drop. The
    typed omission explainer answers what was excluded
    (file_slice_excerpt_attachment), why
    (omitted_under_budget), reversibility
    (reversible_by_user_action), and the safe next action
    (dispatch_without_excluded_context).
  packet_ref: docs/verification/prompt_composer_packet.md
  audit_matrix_row_ref: prompt_composer.edge.oversized_attachment.budget_omit
  triggering_disposition: omitted_under_budget
  exercised_axes:
    - attachments_axis
    - omitted_context_axis
    - required_disclosure_axis
  exercised_contract_sections:
    - prompt_composer_session_descriptor
    - prompt_composer_turn_draft_descriptor
    - prompt_composer_mention_descriptor
    - prompt_composer_attachment_descriptor
    - prompt_composer_slash_command_invocation_record
    - prompt_composer_predispatch_disclosure_record
    - omission_dispositions
    - count_disclosure_discipline
    - typed_request_workspace_ref
  omission_explainer:
    what_was_excluded: file_slice_excerpt_attachment
    why_excluded: omitted_under_budget
    reversible_class: reversible_by_user_action
    safe_next_action_class: dispatch_without_excluded_context
    explainer_summary: >-
      An oversized file_slice_excerpt was dropped under composer
      budget pressure. User MAY narrow the file_slice mention,
      pin a smaller slice, or dispatch without the excluded
      context.
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_mention_descriptor
      - prompt_composer_attachment_descriptor
      - prompt_composer_slash_command_invocation_record
      - prompt_composer_predispatch_disclosure_record
      - prompt_composer_session_audit_event_record
    mention_kinds: [file_slice_mention, file_mention]
    attachment_kinds: [file_slice_excerpt]
    attachment_disposition_classes: [attached_default, omitted_under_budget]
    slash_command_classes: [explain_slash_command]
    slash_command_invocation_states: [invocation_completed_success]
    flow_classes: [explain_flow]
    scope_filter_classes: [current_root]
    isolation_posture_classes: [isolated_per_turn]
    privacy_export_posture_classes: [excluded_by_default_from_support_bundle]
    retention_stance_within_workspace_classes: [retention_tied_to_assembly_lifetime]
    lifecycle_state_classes: [workspace_open_active]
    account_provider_path_classes: [first_party_managed_default_account]
    approval_posture_classes: [approval_already_granted_session_scoped]
    predispatch_disclosure_state_classes: [disclosure_dispatch_authorised]
    turn_draft_states: [dispatched_inline]
    audit_event_ids:
      - composer_turn_draft_attachment_omitted
      - composer_turn_draft_predispatch_disclosure_minted
      - composer_turn_draft_dispatched_inline

