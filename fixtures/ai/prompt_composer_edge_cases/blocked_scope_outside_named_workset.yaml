# yaml-language-server: $schema=../../../schemas/ai/prompt_composer_session.schema.json
__fixture__:
  name: blocked_scope_outside_named_workset
  scenario: >
    A user opens a composer session against a named workset and
    runs an /explain slash command pointing at a file_mention that
    targets a path outside the workset. The composer admits one
    in-scope file_mention and drops the out-of-scope one with
    disposition_class = omitted_outside_scope. Pre-dispatch
    disclosure renders omitted_attachment_count = 1 verbatim with
    a typed omission explainer naming the safe next action
    widen_scope_filter.
  packet_ref: docs/verification/prompt_composer_packet.md
  audit_matrix_row_ref: prompt_composer.edge.blocked_scope.outside_named_workset
  triggering_disposition: omitted_outside_scope
  exercised_axes:
    - mentions_axis
    - omitted_context_axis
    - required_disclosure_axis
  exercised_contract_sections:
    - prompt_composer_mention_descriptor
    - prompt_composer_predispatch_disclosure_record
    - omission_dispositions
    - count_disclosure_discipline
    - typed_request_workspace_ref
  omission_explainer:
    what_was_excluded: file_mention_outside_named_workset
    why_excluded: omitted_outside_scope
    reversible_class: reversible_by_user_action
    safe_next_action_class: widen_scope_filter
    explainer_summary: >-
      A file_mention pointed at a path outside the active named
      workset. User MAY widen the scope filter, switch worksets,
      or dispatch without the excluded mention.
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_mention_descriptor
      - prompt_composer_slash_command_invocation_record
      - prompt_composer_predispatch_disclosure_record
      - prompt_composer_session_audit_event_record
    mention_kinds: [file_mention]
    attachment_disposition_classes: [attached_default, omitted_outside_scope]
    slash_command_classes: [explain_slash_command]
    audit_event_ids:
      - composer_turn_draft_attachment_omitted
      - composer_turn_draft_predispatch_disclosure_minted
      - composer_turn_draft_dispatched_inline

