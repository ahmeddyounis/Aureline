# yaml-language-server: $schema=../../../schemas/ai/prompt_composer_session.schema.json
__fixture__:
  name: provider_link_missing_authority
  scenario: >
    A user runs an /explain slash command with a
    connected_provider_resource_mention pointing at a connected-
    provider resource whose ADR-0010 browser-handoff approval
    ticket has lapsed. The composer blocks the corresponding
    connected_provider_resource_bundle attachment with
    disposition_class = policy_blocked_connected_provider_policy
    and trust_posture = untrusted_connected_provider, with fence
    strategy metadata_only_no_content and the full
    tainted_usage_constraints set on the blocked attachment.
    Pre-dispatch disclosure renders
    policy_blocked_attachment_count = 1 verbatim with a typed
    omission explainer naming the safe next action
    request_approval_ticket.
  packet_ref: docs/verification/prompt_composer_packet.md
  audit_matrix_row_ref: prompt_composer.edge.provider_link_missing_authority
  triggering_disposition: policy_blocked_connected_provider_policy
  exercised_axes:
    - attachments_axis
    - tainted_pasted_content_axis
    - required_disclosure_axis
  exercised_contract_sections:
    - prompt_composer_attachment_descriptor
    - prompt_composer_predispatch_disclosure_record
    - tainted_usage_constraints
    - count_disclosure_discipline
    - typed_request_workspace_ref
  omission_explainer:
    what_was_excluded: connected_provider_resource_bundle_authority_missing
    why_excluded: policy_blocked_connected_provider_policy
    reversible_class: reversible_by_approval_request
    safe_next_action_class: request_approval_ticket
    explainer_summary: >-
      A connected_provider_resource_bundle attachment came from a
      provider whose browser-handoff approval ticket has lapsed.
      User MAY request a fresh approval ticket, or dispatch
      without the blocked bundle.
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_mention_descriptor
      - prompt_composer_attachment_descriptor
      - prompt_composer_slash_command_invocation_record
      - prompt_composer_predispatch_disclosure_record
      - prompt_composer_session_audit_event_record
    mention_kinds: [connected_provider_resource_mention]
    attachment_kinds: [connected_provider_resource_bundle]
    attachment_disposition_classes: [policy_blocked_connected_provider_policy]
    trust_postures: [untrusted_connected_provider]
    tainted_fence_strategies: [metadata_only_no_content]
    slash_command_classes: [explain_slash_command]
    audit_event_ids:
      - composer_turn_draft_attachment_policy_blocked
      - composer_turn_draft_predispatch_disclosure_minted
      - composer_turn_draft_dispatched_inline

