__fixture__:
  name: paused_checkpoint_review
  scenario: >
    The branch-agent session has paused mid-chain at a
    pre_publish_review_checkpoint because the validation plan needs
    explicit reviewer acknowledgement before the proposed diff leaves
    the side worktree. Three hops have completed; the mutation surface
    is mutates_isolated_worktree_only; the must-run test suite passed,
    the must-run lint suite passed, the advisory review check turned
    up two findings the reviewer must acknowledge before resume. The
    session sits in paused_for_checkpoint_review with
    pause_reason_class = paused_for_checkpoint_review.
  exercised_contract_sections:
    - section_1_branch_agent_session
    - section_1_7_pause_cancel
    - section_2_checkpoints
    - section_3_validation_plan
    - section_8_audit_event_reuse
  exercised_classes:
    dispatch_origin_classes: [dispatched_from_composer_turn]
    target_execution_locus_classes: [isolated_side_worktree]
    mutation_surface_classes: [mutates_isolated_worktree_only]
    secret_scope_classes: [bounded_user_scoped_handles]
    session_state_classes: [paused_for_checkpoint_review]
    pause_reason_classes: [paused_for_checkpoint_review]
    landing_posture_classes: [no_self_land_review_required]
    agent_ceiling_classes: [bounded_recursion_and_count_admitted]
    checkpoint_classes:
      - pre_dispatch_plan_checkpoint
      - mid_run_progress_checkpoint
      - pre_mutation_dry_run_checkpoint
      - pre_publish_review_checkpoint
    validation_check_classes:
      - must_run_test_suite
      - must_run_lint_suite
      - advisory_review_check
    observed_outcome_classes:
      - outcome_passed
    audit_event_ids:
      - branch_agent_session_paused
      - branch_agent_session_checkpoint_emitted
      - branch_agent_session_validation_plan_row_observed
