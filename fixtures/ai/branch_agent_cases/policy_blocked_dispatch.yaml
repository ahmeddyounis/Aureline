__fixture__:
  name: policy_blocked_dispatch
  scenario: >
    A composer turn-draft requested a background_branch_agent
    dispatch into a managed_remote_workspace, but the air-gapped
    deployment-profile policy forbids managed_remote_workspace as a
    target locus. The session is minted for audit honesty and lands
    immediately in policy_blocked_pre_dispatch with no chain id, no
    rollups, no per-hop receipts, and no review packet. The audit
    stream emits branch_agent_session_policy_blocked plus a
    branch_agent_session_denial_emitted event citing
    target_execution_locus_unresolved as the typed denial.
  exercised_contract_sections:
    - section_1_branch_agent_session
    - section_8_audit_event_reuse
    - section_8_2_frozen_denial_reason_set
  exercised_classes:
    dispatch_origin_classes: [dispatched_from_composer_turn]
    target_execution_locus_classes: [managed_remote_workspace]
    mutation_surface_classes: [mutation_disabled]
    secret_scope_classes: [secret_scope_policy_blocked]
    session_state_classes: [policy_blocked_pre_dispatch]
    landing_posture_classes: [not_eligible_to_land_blocked]
    agent_ceiling_classes: [no_agent_invocations_admitted]
    audit_event_ids:
      - branch_agent_session_policy_blocked
      - branch_agent_session_denial_emitted
    denial_reasons:
      - target_execution_locus_unresolved
