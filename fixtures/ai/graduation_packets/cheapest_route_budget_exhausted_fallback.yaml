    fallback_after_cheapest_exhausted, route_selection_override_
    reason_class = cheapest_route_budget_exhausted, exhaustion_
    state_class = per_session_budget_exhausted, and the seven
    minimum spend-attribution dimensions. A paired
    graduation_audit_event_record fires route_fallback_taken on the
    ai_graduation audit stream.
  exercised_contract_sections:
    - section_3_budget_and_routing_controls
    - section_4_route_selection_disclosure
    - section_5_exhausted_or_blocked_routes
