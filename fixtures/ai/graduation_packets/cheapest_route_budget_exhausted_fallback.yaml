    route_selection_override_reason_classes: [cheapest_route_budget_exhausted]
    exhaustion_state_classes: [per_session_budget_exhausted]
    fallback_posture_classes: [degrade_to_local_route]
    audit_event_ids:
      - route_fallback_taken
