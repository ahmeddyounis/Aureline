# yaml-language-server: $schema=../../../schemas/ai/graduation_packet.schema.json
__fixture__:
  name: withdraw_to_disabled_packet
  scenario: >
    A previously-stable experimental search-flow workflow is
    withdrawn after a blocking red-team finding. The graduation
    packet binds workflow_or_surface_id = workflow:ai.search_flow,
    promotion_kind = withdraw_to_disabled, target_rollout_state_class
    = disabled, and a rollback_to_disabled_state plan. Eval-evidence
    is empty by design (withdrawal does not require an evidence
    floor). The packet cites an admitting approval-ticket ref and
    the no_fallback_request_fails_with_typed_denial fallback
    posture. A paired model_rollout_state_record pins the workflow
    at disabled; a graduation_audit_event_record records the
    withdrawal.
  exercised_contract_sections:
    - section_1_graduation_packet
    - section_2_rollout_state
    - section_5_exhausted_or_blocked_routes
    - section_6_approval_ticket_composition
    - section_8_audit_event_reuse
  exercised_classes:
    rollout_state_classes: [disabled]
    promotion_kinds: [withdraw_to_disabled]
    fallback_posture_classes: [no_fallback_request_fails_with_typed_denial]
    rollback_plan_kinds: [rollback_to_disabled_state]
    audit_event_ids:
      - graduation_packet_minted
      - graduation_packet_withdrawn
      - model_rollout_state_pinned
