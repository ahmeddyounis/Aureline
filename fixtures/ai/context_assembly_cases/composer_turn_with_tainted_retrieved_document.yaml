# yaml-language-server: $schema=../../../schemas/ai/context_assembly.schema.json
__fixture__:
  name: composer_turn_with_tainted_retrieved_document
  scenario: >
    A user opens a composer session against the current workspace
    root and drafts a turn that mentions a symbol in a workspace
    file, attaches a docs-pack excerpt pulled in by the composer
    plan (authoritative, citation-anchor-backed), and attaches a
    retrieved_document pulled through a connected provider
    (untrusted external). The composer plan resolves the
    assembly: the workspace_symbol is pinned, the docs_pack
    excerpt is included with a citation-anchor ref, the
    retrieved_document is placed as a tainted segment under the
    quoted_as_data_only fence with the full
    tainted-usage-constraint set, a prior-turn carry-over is
    omitted because budget was exceeded, a log excerpt is
    redacted by the broker-owned redaction pass (credential
    handle + user identity projection), and an
    extension_proposed_context segment is policy-blocked because
    the workspace-trust state is restricted. A tool-call return
    from a connected-provider browser handoff flowed into the
    tainted retrieved_document; the tool_call_lineage records
    invoked_tainted_return. Dispatch is inline_composer against
    a first-party managed provider with direct first-party
    routing; metered per-token cost visibility. The evidence
    packet preserves exactly one tainted fence, the required
    citation-anchor coverage (one required, one provided), and
    links the route / spend receipts.
  exercised_contract_sections:
    - segment_class
    - source_class
    - trust_posture
    - tainted_content_fence
    - tainted_usage_constraint
    - instructional_role
    - provider_class
    - route_path_class
    - cost_visibility_class
    - prompt_composer_session
    - prompt_composer_mention
    - prompt_composer_attachment
    - prompt_composer_turn_draft
    - ai_route_plan
    - ai_spend_plan
    - ai_route_receipt
    - ai_spend_receipt
    - ai_tool_call_lineage
    - evidence_packet
  exercised_classes:
    segment_classes: [included, omitted, pinned, redacted, policy_blocked, tainted]
    source_classes:
      - workspace_symbol
      - docs_pack_excerpt
      - connected_provider_payload
      - ai_prior_turn_context
      - log_excerpt
      - extension_proposed_context
    trust_postures:
      - trusted_first_party
      - trusted_authority
      - untrusted_connected_provider
      - unreviewed_derived
      - untrusted_log_capture
      - untrusted_extension_proposed
    tainted_fence_strategies: [quoted_as_data_only]
    tainted_usage_constraints:
      - must_not_gain_tool_permission
      - must_not_escalate_scope
      - must_not_mint_citations
      - must_not_override_instruction_bundle
      - must_not_publish_externally
      - must_not_commit_to_repo
      - must_not_dispatch_branch_agent
      - must_not_route_to_higher_cost_tier
      - must_preserve_fence_in_downstream_packet
    instructional_roles:
      - retrieved_reference
      - attached_data
      - fenced_tainted_data
    provider_classes: [first_party_managed]
    route_path_classes: [direct_first_party]
    cost_visibility_classes: [metered_per_token]
    dispatch_target_classes: [inline_composer]
    tool_call_outcomes: [invoked_tainted_return]
    audit_event_ids:
      - ai_context_assembly_minted
      - ai_context_segment_pinned
      - ai_context_segment_included
      - ai_context_segment_tainted_fenced
      - ai_context_segment_omitted
      - ai_context_segment_redacted
      - ai_context_segment_policy_blocked
      - ai_context_tool_call_invoked
      - ai_context_tainted_return_observed
      - ai_context_route_plan_minted
      - ai_context_spend_plan_minted
      - ai_context_route_receipt_recorded
      - ai_context_spend_receipt_recorded
      - ai_context_turn_draft_dispatched
    evidence_audit_event_ids:
      - ai_evidence_packet_minted
      - ai_evidence_source_reference_recorded
      - ai_evidence_tainted_fence_recorded

