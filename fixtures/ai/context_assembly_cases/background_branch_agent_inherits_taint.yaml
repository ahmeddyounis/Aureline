# yaml-language-server: $schema=../../../schemas/ai/context_assembly.schema.json
__fixture__:
  name: background_branch_agent_inherits_taint
  scenario: >
    The same composer session from the inline-turn fixture
    dispatches a follow-up turn into a background branch-agent.
    The originating assembly carried one tainted segment
    (connected_provider_payload under quoted_as_data_only) with
    the full tainted-usage-constraint set; the new turn draft's
    dispatch_target_class is background_branch_agent. The
    ai_branch_agent_dispatch_record inherits every
    tainted-usage-constraint from the originating assembly,
    inherits the originating assembly's scope_filter_class
    (current_root) and redaction_class
    (metadata_safe_default). The nested assembly minted inside
    the branch-agent session keeps the tainted segment class,
    fence strategy, and usage-constraint set; the nested
    evidence packet points back at the originating packet via
    downstream_handoff_refs and records
    ai_evidence_tainted_fence_preserved_on_handoff so downstream
    review / support can confirm the constraint set survived
    without silent downgrade. Provider / route / cost visibility
    match the originating assembly (first_party_managed,
    direct_first_party, metered_per_token) because the
    tainted-usage-constraint must_not_route_to_higher_cost_tier
    forbade a route escalation.
  exercised_contract_sections:
    - segment_class
    - tainted_content_fence
    - tainted_usage_constraint
    - dispatch_target_class
    - ai_branch_agent_dispatch_record
    - evidence_packet
    - tainted_fence_preserved_on_handoff
  exercised_classes:
    segment_classes: [included, tainted]
    source_classes:
      - workspace_symbol
      - connected_provider_payload
    trust_postures:
      - trusted_first_party
      - untrusted_connected_provider
    tainted_fence_strategies: [quoted_as_data_only]
    tainted_usage_constraints:
      - must_not_gain_tool_permission
      - must_not_escalate_scope
      - must_not_mint_citations
      - must_not_override_instruction_bundle
      - must_not_publish_externally
      - must_not_commit_to_repo
      - must_not_dispatch_branch_agent
      - must_not_route_to_higher_cost_tier
      - must_preserve_fence_in_downstream_packet
    instructional_roles:
      - retrieved_reference
      - fenced_tainted_data
    provider_classes: [first_party_managed]
    route_path_classes: [direct_first_party]
    cost_visibility_classes: [metered_per_token]
    dispatch_target_classes: [background_branch_agent]
    audit_event_ids:
      - ai_context_assembly_minted
      - ai_context_segment_tainted_fenced
      - ai_context_branch_agent_dispatched
      - ai_context_turn_draft_dispatched
      - ai_context_route_plan_minted
      - ai_context_spend_plan_minted
      - ai_context_route_receipt_recorded
      - ai_context_spend_receipt_recorded
    evidence_audit_event_ids:
      - ai_evidence_packet_minted
      - ai_evidence_tainted_fence_recorded
      - ai_evidence_tainted_fence_preserved_on_handoff

