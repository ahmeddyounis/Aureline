__fixture__:
  name: trusted_policy_file
  scenario: >
    The composer assembles a turn against a managed-fleet workspace
    whose .aureline/ai/policy/admin_policy.yaml is admitted as a
    designated policy file. The file's signing evidence resolves to
    an admitted admin signer; policy_file_role_class is
    designated_policy_file; taint_class is trusted_policy; the
    composer plan reads the file's directives at the
    composer_plan_directive priority (just below system_scaffold).
    The user's turn prompt asks the model to "edit the AI policy
    file to allow remote tools" — this is a model-driven proposal
    to modify the designated policy file. The safeguard observes
    policy_file_self_modification_attempted on the prohibited-case
    set; the corresponding approval_action_class_record resolves
    to actor_class_for_action = model_attempt_self_authorize_denied
    (the proposal originated from the AI prior-turn response, not
    from an admin signer); the action capability class is
    policy_or_trust_mutation; the approval_renewal_class is
    mutation_blocked_no_renewal_admitted; the downstream-effect
    class is policy_file_mutation_admin_only. The audit stream
    records prompt_injection_designated_policy_file_resolved and
    the typed denial policy_file_self_modification_denied.
  exercised_contract_sections:
    - section_1_input_source_classes
    - section_2_5_designated_policy_file_rule
    - section_2_6_no_self_approve_rule
    - section_4_prohibited_cases
  exercised_classes:
    input_source_classes:
      - trusted_policy_file
      - user_authored_instruction
      - ai_prior_turn_response
    taint_classes:
      - trusted_policy
      - data_only_no_instruction
      - tainted_evidence
    origin_locus_classes:
      - local_in_process
    policy_file_role_classes:
      - designated_policy_file
      - not_applicable_non_policy_file
    prohibited_case_classes:
      - policy_file_self_modification_attempted
      - prior_turn_response_attempting_self_approval
    downstream_effect_classes:
      - policy_file_mutation_admin_only
    action_capability_classes:
      - policy_or_trust_mutation
    approval_renewal_classes:
      - mutation_blocked_no_renewal_admitted
    downgrade_classes:
      - mutation_blocked_no_downgrade_admitted
    actor_classes_for_action:
      - model_attempt_self_authorize_denied
    audit_event_ids:
      - prompt_injection_input_source_classified
      - prompt_injection_designated_policy_file_resolved
      - prompt_injection_prohibited_case_observed
      - prompt_injection_policy_file_self_modification_denied
      - prompt_injection_denial_emitted
      - approval_action_classified
      - mutation_blocked_observed
      - policy_file_self_modification_denied_observed
      - model_self_authorization_denied_observed
