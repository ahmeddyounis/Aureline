# yaml-language-server: $schema=../../../schemas/ai/tainted_input_source.schema.json
__fixture__:
  name: repo_instruction_conflict
  scenario: >
    The composer assembles a turn against a workspace that carries
    both a repo-authored AGENTS.md-style instruction bundle and a
    signed designated policy file under .aureline/ai/policy/. The
    repo bundle's text proposes to widen which external tools are
    admitted (it asks the composer to allow a remote_https tool to
    write the workspace without approval). The designated policy
    file's directive narrows the same axis (only signed first-party
    local tools may write the workspace; external tools remain
    inspect-only without per-invocation approval). Strict precedence
    in the contract §2.4 resolves the conflict in favour of the
    designated policy file: trusted_policy beats
    repo_instruction_bundle. The composer records a typed denial
    repo_text_widening_attempted on the prompt_injection_taint
    audit stream and the proposal's downstream effect resolves to
    no_downstream_action_proposed (no mutation action is admitted
    on the strength of the repo widening attempt).
  exercised_contract_sections:
    - section_1_input_source_classes
    - section_2_4_context_priority_order
    - section_2_5_designated_policy_file_rule
    - section_4_prohibited_cases
  exercised_classes:
    input_source_classes:
      - trusted_policy_file
      - repo_instruction_bundle_authored
      - user_authored_instruction
      - repository_workspace_content
    taint_classes:
      - trusted_policy
      - trusted_first_party_data
      - data_only_no_instruction
    origin_locus_classes:
      - local_in_process
    policy_file_role_classes:
      - designated_policy_file
      - repo_instruction_bundle_authored
      - not_applicable_non_policy_file
    prohibited_case_classes:
      - repo_text_attempts_capability_widening_alias_for_repo_text_attempts_permission_widening
    downstream_effect_classes:
      - no_downstream_action_proposed
    audit_event_ids:
      - prompt_injection_input_source_classified
      - prompt_injection_taint_class_assigned
      - prompt_injection_designated_policy_file_resolved
      - prompt_injection_prohibited_case_observed
      - prompt_injection_downstream_effect_applied
      - prompt_injection_denial_emitted
