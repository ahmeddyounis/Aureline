    alternative_quota_family_class: per_user_byok_vendor_quota
    comparison_dimension_class: slower_alternative
    selected_outcome_class: not_selected_circuit_open
    redaction_class: metadata_safe_default
    notes_summary: >
      Primary BYOK large-model route was qualifying but the circuit
      opened from recent failures; not selected_circuit_open.
