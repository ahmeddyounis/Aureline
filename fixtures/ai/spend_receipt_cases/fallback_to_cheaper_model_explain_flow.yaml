# yaml-language-server: $schema=../../../schemas/ai/provider_route_receipt.schema.json
__fixture__:
  name: fallback_to_cheaper_model_explain_flow
  scenario: >
    The explain-flow workflow's primary BYOK large-model route hits
    a circuit-open state from recent failures. The route planner
    falls back to a cheaper, slower BYOK small-model route per the
    workflow's fallback posture (degrade_to_byok_route). The route
    receipt cites route_selection_reason_class =
    fallback_after_cheapest_blocked, override reason
    cheapest_route_circuit_open_recent_failures, exhaustion state
    circuit_open_recent_failures, and two model-path comparison
    rows: the selected cheaper-and-slower BYOK small route and the
    not-selected large route. The spend receipt's cost-envelope
    drops from medium-volume metered to low-volume metered;
    was_charged_to_user_class is charged_user_byok_metered.
  exercised_contract_sections:
    - section_1_provider_route_receipt
    - section_2_spend_receipt
    - section_3_model_path_comparison_rows
    - section_4_disclosure_state_matrix
    - section_5_approval_ticket_composition
    - section_6_schema_gates
    - section_8_audit_event_reuse
  exercised_classes:
    run_state_classes: [post_run_completed]
    route_origin_classes: [byok_user_credential]
    outcome_classes: [outcome_success]
    disclosure_state_classes: [post_run_disclosure_completed]
    cost_envelope_classes: [metered_per_token_low_volume_band]
    was_charged_to_user_classes: [charged_user_byok_metered]
    route_selection_reason_classes: [fallback_after_cheapest_blocked]
    route_selection_override_reason_classes: [cheapest_route_circuit_open_recent_failures]
    exhaustion_state_classes: [circuit_open_recent_failures]
    comparison_dimension_classes: [cheaper_alternative, slower_alternative]
    selected_outcome_classes: [selected_this_path, not_selected_circuit_open]
    audit_event_ids:
      - provider_route_receipt_completed_post_run
      - spend_receipt_finalised_post_run
