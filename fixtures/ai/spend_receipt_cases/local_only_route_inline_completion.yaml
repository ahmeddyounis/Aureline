__fixture__:
  name: local_only_route_inline_completion
  scenario: >
    The inline-completion workflow runs against the local-in-process
    provider entry served by a first-party-bundled local-model pack.
    The route is the cheapest qualifying route; no override happens
    and no model-path comparison rows are required. The route receipt
    pairs with a spend receipt whose cost-envelope is bundled-no-
    incremental-cost, whose charge locus is not_charged_local, and
    whose seven minimum spend-attribution dimensions all resolve to
    local-only refs. The run completes successfully under the
    tokens_under_8k token ceiling and wall_time_under_5s wall-time
    ceiling.
  exercised_contract_sections:
    - section_1_provider_route_receipt
    - section_2_spend_receipt
    - section_4_disclosure_state_matrix
    - section_8_audit_event_reuse
  exercised_classes:
    run_state_classes: [post_run_completed]
    route_origin_classes: [stayed_local]
    outcome_classes: [outcome_success]
    disclosure_state_classes: [post_run_disclosure_completed]
    cost_envelope_classes: [bundled_no_incremental_cost]
    was_charged_to_user_classes: [not_charged_local]
    token_ceiling_classes: [tokens_under_8k]
    tool_call_ceiling_classes: [no_tool_calls_admitted]
    wall_time_ceiling_classes: [wall_time_under_5s]
    audit_event_ids:
      - provider_route_receipt_minted_preview
      - provider_route_receipt_completed_post_run
      - spend_receipt_minted_preview
      - spend_receipt_finalised_post_run
