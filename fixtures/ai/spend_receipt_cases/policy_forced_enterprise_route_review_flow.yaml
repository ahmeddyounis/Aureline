route_selection_reason_class: override_more_expensive_route_admitted
route_selection_override_reason_class: policy_pinned_more_expensive_route
exhaustion_state_class: not_exhausted_route_admitted
rollout_state_class: stable
ceiling_summary:
  token_ceiling_class: tokens_under_32k
  tool_call_ceiling_class: bounded_tool_calls_under_4
  wall_time_ceiling_class: wall_time_under_30s
  notes_summary: >
    Enterprise route admitted under coarse 32k-token, four-tool-call,
    30s wall-time bands.
outcome_class: outcome_success
model_path_comparison_rows:
  - record_kind: model_path_comparison_row_record
    provider_route_receipt_schema_version: 1
    comparison_row_id: comparison-row:ai.review_flow:enterprise:selected:0001
    alternative_provider_entry_ref: provider-entry:enterprise_gateway_brokered:review_chat:0001
    alternative_model_entry_ref: model-entry:enterprise_gateway_chat:large:0001
    alternative_execution_locus_class: enterprise_gateway_brokered
    alternative_region_posture_class: single_region_pinned
    alternative_retention_stance_class: bounded_retention_operator_access_only
    alternative_cost_envelope_class: enterprise_pooled_quota_band
    alternative_quota_family_class: enterprise_gateway_pooled_quota
    comparison_dimension_class: equivalent_alternative_parity
    selected_outcome_class: selected_this_path
    redaction_class: metadata_safe_default
    notes_summary: >
      Policy-pinned enterprise gateway route admitted; this is the
      route the receipt records.
  - record_kind: model_path_comparison_row_record
    provider_route_receipt_schema_version: 1
    comparison_row_id: comparison-row:ai.review_flow:byok_cheaper:0001
    alternative_provider_entry_ref: provider-entry:connected_provider_vendor:byok_chat:0001
    alternative_model_entry_ref: model-entry:byok_vendor_chat:general:0001
    alternative_execution_locus_class: byok_remote_vendor_direct
    alternative_region_posture_class: region_unpinned_vendor_default
    alternative_retention_stance_class: unbounded_retention_not_used_for_training
    alternative_cost_envelope_class: metered_per_token_low_volume_band
    alternative_quota_family_class: per_user_byok_vendor_quota
    comparison_dimension_class: cheaper_alternative
    selected_outcome_class: not_selected_policy_pin
    redaction_class: metadata_safe_default
    notes_summary: >
      Cheaper BYOK vendor route was qualifying but admin policy
      pinned the enterprise gateway route; not selected because of
      the policy pin.
route_selection_disclosure_ref: route-selection-disclosure:ai.review_flow:0001
originating_budget_routing_policy_ref: budget-routing-policy:ai.review_flow:0001
originating_graduation_packet_ref: graduation-packet:ai.review_flow:stable:0001
originating_approval_ticket_ref: approval-ticket:ai.review_flow:enterprise_pin:0001
branch_agent_chain_id: ""
branch_agent_hop_index: null
assembly_id_ref: assembly:ai.review_flow:0007
supersedes_route_receipt_refs: []
policy_context:
  policy_epoch: policy-epoch:0042
  trust_state: trusted
  deployment_profile_class: managed_fleet
  execution_context_id: execution-context:ai.review_flow.enterprise:0001
redaction_class: metadata_safe_default
notes_summary: >
  Review-flow run forced onto the enterprise gateway route by admin
  policy; cheaper BYOK vendor candidate was named on the comparison
  row so reviewers can audit the override.
minted_at: "2026-04-24T14:00:00Z"
last_updated_at: "2026-04-24T14:00:08Z"
