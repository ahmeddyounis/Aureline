# yaml-language-server: $schema=../../../schemas/ai/provider_route_receipt.schema.json
__fixture__:
  name: policy_forced_enterprise_route_review_flow
  scenario: >
    The review-flow workflow is forced by admin policy onto an
    enterprise-gateway-brokered route even though a cheaper BYOK
    vendor route would have qualified. The route receipt cites
    route_selection_reason_class =
    override_more_expensive_route_admitted with override reason
    policy_pinned_more_expensive_route, names the cheapest BYOK
    candidate verbatim in two model-path comparison rows (one
    selected_this_path, one not_selected_policy_pin), and binds the
    admitting approval ticket. The spend receipt's charge locus is
    charged_organisation_pooled and lands in the
    enterprise_pooled_quota_band.
  exercised_contract_sections:
    - section_1_provider_route_receipt
    - section_2_spend_receipt
    - section_3_model_path_comparison_rows
    - section_4_disclosure_state_matrix
    - section_5_approval_ticket_composition
    - section_8_audit_event_reuse
  exercised_classes:
    run_state_classes: [post_run_completed]
    route_origin_classes: [enterprise_gateway]
    outcome_classes: [outcome_success]
    disclosure_state_classes: [post_run_disclosure_completed]
    cost_envelope_classes: [enterprise_pooled_quota_band]
    was_charged_to_user_classes: [charged_organisation_pooled]
    route_selection_reason_classes: [override_more_expensive_route_admitted]
    route_selection_override_reason_classes: [policy_pinned_more_expensive_route]
    comparison_dimension_classes: [cheaper_alternative]
    selected_outcome_classes: [selected_this_path, not_selected_policy_pin]
    audit_event_ids:
      - provider_route_receipt_completed_post_run
      - spend_receipt_finalised_post_run
---
