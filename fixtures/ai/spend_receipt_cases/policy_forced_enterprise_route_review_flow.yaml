provider_route_receipt_schema_version: 1
route_receipt_id: route-receipt:ai.review_flow:enterprise_pin:0001
workflow_or_surface_id: workflow:ai.review_flow
display_label: "Review-flow run (policy-pinned enterprise route)"
run_state_class: post_run_completed
disclosure_state_class: post_run_disclosure_completed
provider_entry_ref: provider-entry:enterprise_gateway_brokered:review_chat:0001
model_entry_ref: model-entry:enterprise_gateway_chat:large:0001
prompt_pack_manifest_ref: prompt-pack-manifest:first_party.review:v2.1.0
tool_pack_manifest_ref: tool-pack-manifest:first_party.review:v1.0.4
execution_locus_class: enterprise_gateway_brokered
region_posture_class: single_region_pinned
retention_stance_class: bounded_retention_operator_access_only
quota_family_class: enterprise_gateway_pooled_quota
