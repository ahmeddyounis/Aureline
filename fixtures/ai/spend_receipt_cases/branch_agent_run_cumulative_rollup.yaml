# yaml-language-server: $schema=../../../schemas/ai/provider_route_receipt.schema.json
__fixture__:
  name: branch_agent_run_cumulative_rollup
  scenario: >
    The branch-agent workflow runs three chained AI invocations
    against the local-in-process route. Each hop emits its own
    provider_route_receipt_record and spend_receipt_record, and the
    chain emits one branch_agent_route_rollup_record and one
    branch_agent_spend_rollup_record. The first two hops complete
    successfully; the third hop fails. The aggregate run-state is
    post_run_failed, the aggregate cost-envelope is
    bundled_no_incremental_cost (every hop ran local), and the
    aggregate charge locus is not_charged_local. The chain's
    agent_ceiling_class is bounded_recursion_and_count_admitted; the
    three hops are within the bounded count.
  exercised_contract_sections:
    - section_1_provider_route_receipt
    - section_1_6_branch_agent_rollup
    - section_2_spend_receipt
    - section_2_5_branch_agent_spend_rollup
    - section_4_disclosure_state_matrix
    - section_8_audit_event_reuse
  exercised_classes:
    run_state_classes: [post_run_completed, post_run_failed]
    route_origin_classes: [stayed_local]
    outcome_classes: [outcome_success, outcome_provider_error]
    disclosure_state_classes:
      - post_run_disclosure_completed
      - post_run_disclosure_failed
    cost_envelope_classes: [bundled_no_incremental_cost]
    was_charged_to_user_classes: [not_charged_local]
    agent_ceiling_classes: [bounded_recursion_and_count_admitted]
    audit_event_ids:
      - provider_route_receipt_completed_post_run
      - provider_route_receipt_failed_post_run
      - branch_agent_route_rollup_emitted
      - spend_receipt_finalised_post_run
      - branch_agent_spend_rollup_emitted
