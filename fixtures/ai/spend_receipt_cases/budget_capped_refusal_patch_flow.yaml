__fixture__:
  name: budget_capped_refusal_patch_flow
  scenario: >
    The patch-flow workflow's per-organisation budget cap on the BYOK
    vendor route is exhausted. No fallback route is admitted under
    the policy in force, so the run is refused with a typed
    budget-blocked receipt. The route receipt's run_state_class is
    budget_blocked_refusal, outcome_class is outcome_blocked_by_budget,
    disclosure_state_class is budget_blocked_disclosure, and
    exhaustion_state_class is per_organisation_budget_exhausted. The
    paired spend receipt's was_charged_to_user_class is
    not_charged_run_blocked. The receipt survives in audit / UI
    history.
  exercised_contract_sections:
    - section_1_provider_route_receipt
    - section_2_spend_receipt
    - section_4_disclosure_state_matrix
    - section_5_approval_ticket_composition
    - section_6_schema_gates
    - section_8_audit_event_reuse
  exercised_classes:
    run_state_classes: [budget_blocked_refusal]
    route_origin_classes: [disabled_no_route]
    outcome_classes: [outcome_blocked_by_budget]
    disclosure_state_classes: [budget_blocked_disclosure]
    cost_envelope_classes: [envelope_unknown_unverified_cost]
    was_charged_to_user_classes: [not_charged_run_blocked]
    exhaustion_state_classes: [per_organisation_budget_exhausted]
    route_selection_reason_classes: [no_route_admitted_disabled_with_typed_denial]
    route_selection_override_reason_classes: [cheapest_route_budget_exhausted]
    audit_event_ids:
      - provider_route_receipt_budget_blocked
      - spend_receipt_finalised_blocked
