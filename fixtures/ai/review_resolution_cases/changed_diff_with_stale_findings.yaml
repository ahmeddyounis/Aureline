# yaml-language-server: $schema=../../../schemas/ai/review_resolution_memory.schema.json
__fixture__:
  name: changed_diff_with_stale_findings
  scenario: >
    Two prior findings exist on a hosted_review_object scope. The
    author force-pushes a new head; the scope-freshness watcher
    fires base_or_head_changed_after_run_resolution_outdated on the
    first finding (forcing it into outdated_diff_changed) and
    provider_overlay_refreshed_resolution_rerun_recommended on the
    second (forcing it into rerun_recommended). Neither resolution
    paints itself as visually fresh; both carry
    publish_eligibility_class = publish_blocked_outdated_lifecycle.
    The local store rows record the diff_fingerprint_invalidated
    event so a later session can reconstruct why the resolutions
    became stale.
  exercised_contract_sections:
    - section_1_resolution_memory_state_machine
    - section_2_material_diff_change_rules
    - section_3_local_only_finding_store
  exercised_classes:
    resolution_state_classes:
      - open
      - outdated_diff_changed
      - rerun_recommended
    resolution_actor_classes:
      - provider_overlay_watcher
      - scope_freshness_watcher
    resolution_source_classes:
      - provider_overlay_watcher
      - scope_freshness_watcher
    reopen_eligibility_classes:
      - not_applicable_state_admits_open_action_directly
    publish_eligibility_classes:
      - publish_blocked_outdated_lifecycle
    diff_fingerprint_kinds:
      - head_revision_id_ref
      - base_revision_id_ref
      - provider_pull_or_merge_request_head_ref
      - review_pack_evaluation_input_signature_ref
    transition_trigger_classes:
      - scope_freshness_base_or_head_changed
      - scope_freshness_provider_overlay_refreshed
    material_change_verdict_classes:
      - base_or_head_changed_after_run_resolution_outdated
      - provider_overlay_refreshed_resolution_rerun_recommended
    storage_authority_classes:
      - user_owned_recovery_state
    delete_posture_classes:
      - delete_clears_local_only
    export_posture_classes:
      - exportable_as_user_visible
    retention_posture_classes:
      - workspace_scoped
    delete_request_lifecycle_classes:
      - no_delete_request_pending
    audit_event_ids:
      - review_resolution_minted
      - review_resolution_marked_outdated_after_base_or_head_change
      - review_resolution_rerun_recommended
      - review_resolution_material_diff_change_recorded
      - local_review_findings_store_record_diff_fingerprint_invalidated
