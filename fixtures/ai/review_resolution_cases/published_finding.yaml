# yaml-language-server: $schema=../../../schemas/ai/review_resolution_memory.schema.json
__fixture__:
  name: published_finding
  scenario: >
    A reviewer publishes an evidence-backed risk-or-bug finding as
    a hosted_review_thread_comment under provider_write_admitted
    continuity. The resolution row records published_to_review_destination,
    publish_eligibility_class publish_eligible_provider_write_admitted,
    and an explicit user_action_publish_to_destination state-transition
    row pointing at the bound publish-to-review sheet. The local store
    row preserves the analyzed scope, diff fingerprints, provider/model
    identity, and policy context. The export packet records
    export_records_publish_was_performed.
  exercised_contract_sections:
    - section_1_resolution_memory_state_machine
    - section_3_local_only_finding_store
    - section_4_export_packet
  exercised_classes:
    resolution_state_classes:
      - open
      - published_to_review_destination
    resolution_actor_classes:
      - user_in_active_session
    resolution_source_classes:
      - user_in_active_session
      - review_pack_check_outcome
    reopen_eligibility_classes:
      - reopen_admitted_user
    publish_eligibility_classes:
      - publish_eligible_provider_write_admitted
    diff_fingerprint_kinds:
      - head_revision_id_ref
      - base_revision_id_ref
      - selected_diff_range_signature_ref
      - review_pack_evaluation_input_signature_ref
      - instruction_or_check_source_signature_ref
    transition_trigger_classes:
      - user_action_publish_to_destination
    storage_authority_classes:
      - user_owned_recovery_state
    delete_posture_classes:
      - delete_clears_local_only
    export_posture_classes:
      - exportable_as_user_visible
    retention_posture_classes:
      - workspace_scoped
    delete_request_lifecycle_classes:
      - no_delete_request_pending
    export_publish_state_classes:
      - export_records_publish_was_performed
    export_disclosure_classes:
      - discloses_provider_model_identity_and_publish_state
    audit_event_ids:
      - review_resolution_minted
      - review_resolution_state_transitioned
      - review_resolution_published_to_destination
      - local_review_findings_store_record_minted
      - local_review_findings_store_record_publish_eligibility_changed
      - local_review_findings_export_packet_assembled
