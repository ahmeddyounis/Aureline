  - diff_fingerprint_kind: provider_pull_or_merge_request_head_ref
    diff_fingerprint_ref: provider:pull-request:provider-outage:HEAD
  - diff_fingerprint_kind: review_pack_evaluation_input_signature_ref
    diff_fingerprint_ref: review-pack-eval-signature:provider-outage:01
