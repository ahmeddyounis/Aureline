# yaml-language-server: $schema=../../../schemas/ai/review_resolution_memory.schema.json
__fixture__:
  name: provider_outage
  scenario: >
    The reviewer attempts to publish a finding through a hosted
    destination but the upstream evaluator is out (the third-party
    provider returns a 503 on the rerun call). The scope-freshness
    watcher fires evaluator_outage_resolution_rerun_required, which
    forces the resolution row into rerun_recommended with
    publish_eligibility_class = publish_blocked_outdated_lifecycle.
    The local store row preserves the analyzed scope, diff
    fingerprints, provider/model identity, and policy context for
    a later reattempt; the export packet records
    export_records_publish_blocked_kept_local so support tooling
    can see the outage without claiming publish succeeded.
  exercised_contract_sections:
    - section_1_resolution_memory_state_machine
    - section_2_material_diff_change_rules
    - section_3_local_only_finding_store
    - section_4_export_packet
  exercised_classes:
    resolution_state_classes:
      - open
      - rerun_recommended
    resolution_actor_classes:
      - scope_freshness_watcher
    resolution_source_classes:
      - scope_freshness_watcher
    reopen_eligibility_classes:
      - not_applicable_state_admits_open_action_directly
    publish_eligibility_classes:
      - publish_blocked_outdated_lifecycle
    diff_fingerprint_kinds:
      - head_revision_id_ref
      - base_revision_id_ref
      - provider_pull_or_merge_request_head_ref
      - review_pack_evaluation_input_signature_ref
    transition_trigger_classes:
      - scope_freshness_evaluator_outage
    material_change_verdict_classes:
      - evaluator_outage_resolution_rerun_required
    storage_authority_classes:
      - user_owned_recovery_state
    delete_posture_classes:
      - delete_clears_local_only
    export_posture_classes:
      - exportable_as_user_visible
    retention_posture_classes:
      - workspace_scoped
    delete_request_lifecycle_classes:
      - no_delete_request_pending
    export_publish_state_classes:
      - export_records_publish_blocked_kept_local
    export_disclosure_classes:
      - discloses_provider_model_identity_and_publish_state
    audit_event_ids:
      - review_resolution_minted
      - review_resolution_rerun_recommended
      - review_resolution_material_diff_change_recorded
      - local_review_findings_store_record_minted
      - local_review_findings_export_packet_assembled
