# yaml-language-server: $schema=../../../schemas/ai/prompt_composer_session.schema.json
__fixture__:
  name: background_branch_agent_dispatch
  scenario: >
    A user opens a composer session against a named workset that
    matches a feature branch's diff scope, attaches a diagnostic
    bundle and a workspace_slice_bundle scoped to the diff, and
    runs the /background-branch-agent slash command to launch a
    long-running background branch-agent dispatch. The composer
    requires a connected-provider browser-handoff approval ticket
    (the dispatch will use a connected-provider self-hosted
    account for the long-running runtime). The pre-dispatch
    disclosure surfaces every required field plus
    branch_agent_dispatch_intent_disclosed and the
    branch_agent_dispatch_placeholder_ref. The user reads and
    acknowledges the disclosure, then dispatches; the turn draft
    transitions to dispatched_branch_agent and binds the
    branch_agent_dispatch_ref. Demonstrates a request that
    launches a background branch-agent flow and the typed
    branch-agent-dispatch placeholder discipline.
  exercised_contract_sections:
    - prompt_composer_session_descriptor
    - prompt_composer_turn_draft_descriptor
    - prompt_composer_attachment_descriptor
    - prompt_composer_slash_command_invocation_record
    - prompt_composer_predispatch_disclosure_record
    - branch_agent_dispatch_intent
    - browser_handoff_approval_ticket
    - typed_request_workspace_ref
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_attachment_descriptor
      - prompt_composer_slash_command_invocation_record
      - prompt_composer_predispatch_disclosure_record
      - prompt_composer_session_audit_event_record
    attachment_kinds:
      - diagnostic_bundle
      - workspace_slice_bundle
    attachment_disposition_classes:
      - attached_default
      - pinned_by_user
    slash_command_classes:
      - background_branch_agent_slash_command
    slash_command_invocation_states:
      - invocation_dispatched
    flow_classes: [background_branch_agent_flow]
    scope_filter_classes: [named_workset]
    isolation_posture_classes: [shared_across_branch_agent_dispatch]
    privacy_export_posture_classes: [opt_in_only_admin_export]
    retention_stance_within_workspace_classes: [bounded_retention_admin_scoped]
    lifecycle_state_classes: [workspace_open_active]
    account_provider_path_classes: [connected_provider_self_hosted_account]
    approval_posture_classes: [approval_required_browser_handoff_ticket]
    predispatch_disclosure_state_classes: [disclosure_dispatch_authorised]
    turn_draft_states: [dispatched_branch_agent]
    dispatch_target_classes: [background_branch_agent]
    audit_event_ids:
      - composer_turn_draft_predispatch_disclosure_minted
      - composer_turn_draft_predispatch_disclosure_acknowledged
      - composer_turn_draft_dispatched_branch_agent

