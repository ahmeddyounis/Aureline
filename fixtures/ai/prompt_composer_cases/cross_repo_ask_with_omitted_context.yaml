# yaml-language-server: $schema=../../../schemas/ai/prompt_composer_session.schema.json
__fixture__:
  name: cross_repo_ask_with_omitted_context
  scenario: >
    A user opens a composer session against a named workset that
    spans two repos and runs an /explain slash command with three
    mentions: a symbol_mention in the in-scope repo (attached), a
    docs_anchor_mention pointing at the local docs pack
    (attached, citation-anchor-backed), and a file_mention
    pointing at a file in the second repo that the workset filter
    excludes (omitted_outside_scope). One graph_summary_mention is
    omitted under budget pressure. The pre-dispatch disclosure
    surfaces the typed disclosure fields plus a non-zero
    omitted_attachment_count (2) so the user reads exactly which
    context was dropped before dispatch. Demonstrates the
    cross-repo ask with omitted context, the typed
    disposition_class vocabulary, and the count-disclosure
    discipline.
  exercised_contract_sections:
    - prompt_composer_session_descriptor
    - prompt_composer_turn_draft_descriptor
    - prompt_composer_mention_descriptor
    - prompt_composer_attachment_descriptor
    - prompt_composer_slash_command_invocation_record
    - prompt_composer_predispatch_disclosure_record
    - omission_dispositions
    - count_disclosure_discipline
    - typed_request_workspace_ref
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_mention_descriptor
      - prompt_composer_attachment_descriptor
      - prompt_composer_slash_command_invocation_record
      - prompt_composer_predispatch_disclosure_record
      - prompt_composer_session_audit_event_record
    mention_kinds:
      - symbol_mention
      - docs_anchor_mention
      - file_mention
      - graph_summary_mention
    attachment_kinds:
      - docs_pack_excerpt_attachment
    attachment_disposition_classes:
      - attached_default
      - omitted_outside_scope
      - omitted_under_budget
    slash_command_classes: [explain_slash_command]
    slash_command_invocation_states: [invocation_completed_success]
    flow_classes: [explain_flow]
    scope_filter_classes: [named_workset]
    isolation_posture_classes: [isolated_per_turn]
    privacy_export_posture_classes: [included_metadata_only_in_support_bundle]
    retention_stance_within_workspace_classes: [retention_tied_to_assembly_lifetime]
    lifecycle_state_classes: [workspace_open_active]
    account_provider_path_classes: [first_party_managed_default_account]
    approval_posture_classes: [approval_already_granted_session_scoped]
    predispatch_disclosure_state_classes: [disclosure_dispatch_authorised]
    turn_draft_states: [dispatched_inline]
    audit_event_ids:
      - composer_turn_draft_attachment_omitted
      - composer_turn_draft_predispatch_disclosure_minted
      - composer_turn_draft_dispatched_inline

