# yaml-language-server: $schema=../../../schemas/ai/prompt_composer_session.schema.json
__fixture__:
  name: single_file_ask
  scenario: >
    A user opens a composer session against the current workspace
    root, runs an /explain slash command pointing at a single
    workspace file (a file_mention), and the slash command
    produces the typed file_slice_excerpt attachment for the file
    body. The composer mints a pre-dispatch disclosure card with
    every required disclosure field — scope, target context,
    active account / provider / model, route path, cost
    visibility, approval posture, request_workspace_ref — plus
    the four count fields (zero tainted, zero omitted, zero
    policy-blocked, zero redacted). The user acknowledges the
    disclosure, the draft transitions to dispatched_inline, and
    route / spend plan placeholders are bound. Demonstrates the
    smallest end-to-end composer-session turn that exercises
    mentions, attachments, slash commands, and a complete
    pre-dispatch disclosure.
  exercised_contract_sections:
    - prompt_composer_session_descriptor
    - prompt_composer_turn_draft_descriptor
    - prompt_composer_mention_descriptor
    - prompt_composer_attachment_descriptor
    - prompt_composer_slash_command_invocation_record
    - prompt_composer_predispatch_disclosure_record
    - required_disclosure_fields
    - typed_request_workspace_ref
    - audit_stream
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_mention_descriptor
      - prompt_composer_attachment_descriptor
      - prompt_composer_slash_command_invocation_record
      - prompt_composer_predispatch_disclosure_record
      - prompt_composer_session_audit_event_record
    mention_kinds: [file_mention]
    attachment_kinds: [file_slice_excerpt]
    attachment_disposition_classes: [attached_default]
    slash_command_classes: [explain_slash_command]
    slash_command_invocation_states: [invocation_completed_success]
    approval_posture_classes: [approval_already_granted_session_scoped]
    account_provider_path_classes: [first_party_managed_default_account]
    predispatch_disclosure_state_classes: [disclosure_dispatch_authorised]
    disclosure_field_classes:
      - scope_filter_disclosed
      - target_context_disclosed
      - active_account_disclosed
      - active_provider_disclosed
      - active_model_disclosed
      - route_path_disclosed
      - cost_visibility_disclosed
      - approval_posture_disclosed
      - request_workspace_ref_disclosed
      - tainted_attachment_count_disclosed
      - omitted_attachment_count_disclosed
      - policy_blocked_attachment_count_disclosed
      - redacted_attachment_count_disclosed
    turn_draft_states: [dispatched_inline]
    dispatch_target_classes: [inline_composer]
    audit_event_ids:
      - composer_session_opened
      - composer_turn_draft_opened
      - composer_turn_draft_mention_added
      - composer_turn_draft_attachment_added
      - composer_turn_draft_slash_command_invoked
      - composer_turn_draft_predispatch_disclosure_minted
      - composer_turn_draft_predispatch_disclosure_acknowledged
      - composer_turn_draft_dispatched_inline

