# yaml-language-server: $schema=../../../schemas/ai/prompt_composer_session.schema.json
__fixture__:
  name: tainted_pasted_content
  scenario: >
    A user opens a composer session and pastes a chunk of text the
    composer cannot prove came from a trusted source (a forum
    paste). The composer mints a typed user_supplied_text
    attachment with trust_posture = untrusted_user_supplied,
    disposition_class = fenced_tainted_user_pasted, fence strategy
    = quoted_as_data_only, and the full
    tainted_usage_constraints set so the assembly never lets the
    paste claim instruction authority. The user also references a
    log span that the broker-owned redaction pass redacts because
    it contains a credential handle. The pre-dispatch disclosure
    surfaces tainted_attachment_count = 1 and
    redacted_attachment_count = 1 verbatim. A /review slash
    command fires; the disclosure renders the tainted-content
    posture before the user acknowledges and dispatches inline.
  exercised_contract_sections:
    - prompt_composer_session_descriptor
    - prompt_composer_turn_draft_descriptor
    - prompt_composer_attachment_descriptor
    - prompt_composer_slash_command_invocation_record
    - prompt_composer_predispatch_disclosure_record
    - tainted_pasted_content
    - tainted_usage_constraints
    - count_disclosure_discipline
    - typed_request_workspace_ref
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_mention_descriptor
      - prompt_composer_attachment_descriptor
      - prompt_composer_slash_command_invocation_record
      - prompt_composer_predispatch_disclosure_record
      - prompt_composer_session_audit_event_record
    mention_kinds:
      - log_span_mention
    attachment_kinds:
      - user_supplied_text
      - log_span_capture
    attachment_disposition_classes:
      - fenced_tainted_user_pasted
      - redacted_under_broker_pass
    trust_postures:
      - untrusted_user_supplied
      - untrusted_log_capture
    tainted_fence_strategies: [quoted_as_data_only]
    tainted_usage_constraints:
      - must_not_gain_tool_permission
      - must_not_escalate_scope
      - must_not_mint_citations
      - must_not_override_instruction_bundle
      - must_not_publish_externally
      - must_not_commit_to_repo
      - must_not_dispatch_branch_agent
      - must_not_route_to_higher_cost_tier
      - must_preserve_fence_in_downstream_packet
    slash_command_classes: [review_slash_command]
    slash_command_invocation_states: [invocation_completed_success]
    flow_classes: [review_flow]
    scope_filter_classes: [current_root]
    isolation_posture_classes: [shared_across_session_turns]
    privacy_export_posture_classes: [redacted_in_support_bundle_restricted]
    retention_stance_within_workspace_classes: [bounded_retention_session_bounded]
    lifecycle_state_classes: [workspace_open_active]
    account_provider_path_classes: [first_party_managed_default_account]
    approval_posture_classes: [approval_already_granted_session_scoped]
    predispatch_disclosure_state_classes: [disclosure_dispatch_authorised]
    turn_draft_states: [dispatched_inline]
    audit_event_ids:
      - composer_turn_draft_attachment_fenced_tainted
      - composer_turn_draft_attachment_redacted
      - composer_turn_draft_predispatch_disclosure_minted
      - composer_turn_draft_dispatched_inline

