# yaml-language-server: $schema=../../../schemas/ai/prompt_composer_session.schema.json
__fixture__:
  name: empty_draft
  scenario: >
    A user opens a composer session against the current workspace
    root and starts a turn draft but has not added any mentions,
    attachments, or slash-command invocations yet. No pre-dispatch
    disclosure exists yet because the draft is still in the
    'draft' state. Demonstrates the minimal valid composer
    session: a typed request_workspace_ref echoing the owning
    workspace's posture (current_root scope, isolated_per_turn,
    excluded_by_default_from_support_bundle, retention tied to
    the assembly), a default account / provider / model triple
    rendered for the eventual disclosure, and an empty turn
    draft. The session audit stream records 'opened' and 'draft
    opened' events.
  exercised_contract_sections:
    - prompt_composer_session_descriptor
    - prompt_composer_turn_draft_descriptor
    - request_workspace_ref_disclosed
    - typed_request_workspace_ref
    - audit_stream
  exercised_classes:
    record_kinds:
      - prompt_composer_session_descriptor
      - prompt_composer_turn_draft_descriptor
      - prompt_composer_session_audit_event_record
    flow_classes: [explain_flow]
    scope_filter_classes: [current_root]
    isolation_posture_classes: [isolated_per_turn]
    privacy_export_posture_classes: [excluded_by_default_from_support_bundle]
    retention_stance_within_workspace_classes: [retention_tied_to_assembly_lifetime]
    lifecycle_state_classes: [workspace_open_active]
    account_provider_path_classes: [first_party_managed_default_account]
    approval_posture_classes: [approval_already_granted_session_scoped]
    turn_draft_states: [draft]
    dispatch_target_classes: [inline_composer]
    audit_event_ids:
      - composer_session_opened
      - composer_turn_draft_opened

