# yaml-language-server: $schema=../../../schemas/ai/review_finding.schema.json
__fixture__:
  name: local_diff_review_with_publish
  scenario: >
    A reviewer pins a selected_diff_in_local_workspace scope against
    a local branch and runs the AI review-assist pack. One finding
    is produced (risk_or_bug_concern, severity_medium_advisory,
    confidence evidence_backed, directed by a review_pack_advisory
    check). The reviewer publishes the finding as a
    hosted_review_thread_comment on the bound provider object. The
    broker-owned redaction pass redacts an internal ticket id, the
    attribution carries posted_as_user_with_ai_assist_disclosed,
    and the publish action spends an approval ticket through the
    same path native review tools use.
  exercised_contract_sections:
    - section_1_review_finding_row
    - section_2_review_scope_selector
    - section_3_publish_to_review_sheet
  exercised_classes:
    finding_classes:
      - risk_or_bug_concern
    severity_classes:
      - severity_medium_advisory
    confidence_classes:
      - evidence_backed
    instruction_or_check_source_classes:
      - review_pack_advisory_check
    evidence_link_kinds:
      - affected_file_or_hunk_ref
      - cited_review_pack_check_ref
    lifecycle_states:
      - published_to_review_destination
    local_or_publish_action_classes:
      - publish_to_review_destination
    attribution_classes:
      - posted_as_user_with_ai_assist
    scope_classes:
      - selected_diff_in_local_workspace
    base_head_context_kinds:
      - base_head_revision_pair
    scope_freshness_classes:
      - scope_fresh_no_material_change_since_run
    scope_lineage_classes:
      - freshly_minted_no_predecessor
    rerun_reason_classes:
      - not_a_rerun_initial_run
    outbound_destination_classes:
      - hosted_review_thread_comment
    outbound_content_kinds:
      - review_comment_text
    attribution_state_classes:
      - posted_as_user_with_ai_assist_disclosed
    redaction_note_classes:
      - internal_identifier_redacted
    publish_or_copy_or_export_action_classes:
      - publish_to_destination
    provider_write_continuity_classes:
      - provider_write_admitted
    audit_event_ids:
      - review_scope_selection_minted
      - review_finding_minted
      - review_finding_evidence_link_recorded
      - publish_to_review_sheet_minted
      - publish_to_review_sheet_outbound_preview_rendered
      - publish_to_review_sheet_redaction_pass_completed
      - publish_to_review_sheet_published_to_destination
      - review_finding_published_to_destination
