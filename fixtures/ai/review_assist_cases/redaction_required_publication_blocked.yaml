__fixture__:
  name: redaction_required_publication_blocked
  scenario: >
    The reviewer attempts to publish an inline suggested patch
    (hosted_review_inline_suggested_patch) whose preview contains
    a credential-handle string the broker pass cannot redact
    automatically. The publish-to-review sheet records
    redaction_pass_failed_publish_blocked and routes the action
    to block_publish_redaction_failed_user_must_review. The
    finding stays in the open lifecycle (no publish has occurred);
    the audit stream records
    publish_to_review_sheet_redaction_failed_observed and a typed
    denial redaction_pass_failed_publish_blocked. The user must
    review the broker's findings before any outbound action.
  exercised_contract_sections:
    - section_1_review_finding_row
    - section_2_review_scope_selector
    - section_3_4_redaction_note
    - section_3_5_action_class_and_provider_write_continuity
  exercised_classes:
    finding_classes:
      - dependency_or_security_concern
    severity_classes:
      - severity_high_advisory
    confidence_classes:
      - evidence_backed
    instruction_or_check_source_classes:
      - review_pack_must_run_check
    evidence_link_kinds:
      - affected_file_or_hunk_ref
      - cited_review_pack_check_ref
    lifecycle_states:
      - open
    local_or_publish_action_classes:
      - keep_local
    attribution_classes:
      - kept_local_no_attribution
    scope_classes:
      - whole_branch_against_base
    base_head_context_kinds:
      - base_head_branch_pair
    scope_freshness_classes:
      - scope_fresh_no_material_change_since_run
    outbound_destination_classes:
      - hosted_review_inline_suggested_patch
    outbound_content_kinds:
      - inline_suggestion_patch_preview
    attribution_state_classes:
      - posted_as_user_with_ai_assist_disclosed
    redaction_note_classes:
      - redaction_pass_failed_publish_blocked
    publish_or_copy_or_export_action_classes:
      - block_publish_redaction_failed_user_must_review
    provider_write_continuity_classes:
      - provider_write_admitted
    audit_event_ids:
      - review_scope_selection_minted
      - review_finding_minted
      - publish_to_review_sheet_minted
      - publish_to_review_sheet_outbound_preview_rendered
      - publish_to_review_sheet_redaction_failed_observed
      - publish_to_review_sheet_audit_denial_emitted
    denial_reasons:
      - redaction_pass_failed_publish_blocked
