# yaml-language-server: $schema=../../../schemas/ai/review_finding.schema.json
__fixture__:
  name: hosted_review_stale_base_head_outdated
  scenario: >
    The reviewer initially ran the AI review-assist pack against
    a hosted_review_object scope (a provider-side pull request).
    The author has now force-pushed a new head; the new scope row
    is derived from the prior scope with lineage
    derived_from_prior_scope_base_head_changed and rerun reason
    base_or_head_changed_after_run_rerun_required, and the matching
    finding's lifecycle moves to outdated_diff_changed. The
    finding's local_or_publish_action_class is constrained out of
    publish_to_review_destination by the schema's outdated-lifecycle
    gate; the reviewer must mark_outdated_pending_rerun and request
    a fresh run before publishing anything to the host provider.
  exercised_contract_sections:
    - section_1_review_finding_row
    - section_2_review_scope_selector
    - section_2_3_scope_freshness
    - section_2_4_scope_lineage_and_rerun_reason
  exercised_classes:
    finding_classes:
      - dependency_or_security_concern
    severity_classes:
      - severity_high_advisory
    confidence_classes:
      - inferred
    instruction_or_check_source_classes:
      - review_pack_must_run_check
    evidence_link_kinds:
      - affected_file_or_hunk_ref
      - cited_review_pack_check_ref
      - cited_workspace_diagnostic_capture_ref
    lifecycle_states:
      - outdated_diff_changed
    local_or_publish_action_classes:
      - mark_outdated_pending_rerun
    attribution_classes:
      - kept_local_no_attribution
    scope_classes:
      - hosted_review_object
    base_head_context_kinds:
      - base_provider_pull_or_merge_request
    scope_freshness_classes:
      - scope_base_or_head_changed_after_run_outdated
    scope_lineage_classes:
      - derived_from_prior_scope_base_head_changed
    rerun_reason_classes:
      - base_or_head_changed_after_run_rerun_required
    audit_event_ids:
      - review_scope_selection_minted
      - review_scope_selection_outdated_after_base_or_head_change
      - review_scope_selection_lineage_recorded
      - review_finding_marked_outdated_after_diff_change
