__fixture__:
  name: approve_selected_hunks_apply_audit_proves_subset
  scenario: >
    An AI patch proposal contains three hunks across two files. Validation runs
    pre-approval and is attached to the patch digest. The user approves only a
    single hunk (explicit allowlist). The apply engine materializes only that
    approved hunk, captures an undo checkpoint before commit, writes a mutation
    group, and emits an apply audit record proving the applied hunk set is a
    subset of the reviewed proposal and is within the approved allowlist.
  exercised_contract_sections:
    - invariants_policy_first_review_first
    - validation_attaches_to_patch_digest
    - approve_selected_hunks_allowlist_required
    - apply_only_approved_hunks_audit_proof
