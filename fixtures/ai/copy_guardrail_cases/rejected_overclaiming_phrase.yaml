copy_guardrail_case_schema_version: 1
case_id: ai.copy_guardrail.rejected_overclaiming_phrase
case_title: Rejected overclaiming phrase
surface_class: action_proposal
expected_decision: rejected

scenario: >
  An AI patch proposal tries to present a generated edit as guaranteed,
  fully validated, exhaustive, and review-free while offering a collapsed
  mutation control.

truth_posture:
  truth_class_id: truth_class:ai_inferred_truth
  confidence_term_id: ai.copy.confidence.low_confidence
  freshness_class: unverified
  evidence_refs:
    - patch-draft:ai.generated.config-fix:0003
  context_disclosures:
    - term_id: ai.copy.context.omitted_context
      omitted_reason: plan_default_budget_exceeded
      omitted_scope: Tests and generated artifacts were omitted.
  provider_route:
    term_id: ai.copy.route.provider_routed
    disclosure_ref: provider-selection-disclosure:ai.patch:0021
  validation_state:
    term_id: ai.copy.validation.not_run
    validation_plan_ref: null

proposed_copy:
  title: "Guaranteed fix"
  body: >
    This guaranteed fix safely updates every file and passes all tests.
    No review needed.
  primary_button: "Auto-apply fix"
  secondary_button: "Explain and apply"

violations:
  - forbidden_term_id: ai.copy.forbidden.perfection_guarantee
    matched_phrases:
      - guaranteed
    reason: AI-inferred draft cannot guarantee success.
  - forbidden_term_id: ai.copy.forbidden.false_validation
    matched_phrases:
      - passes all tests
      - safely
    reason: validation_plan_ref is null and validation is not run.
  - forbidden_term_id: ai.copy.forbidden.false_exhaustiveness
    matched_phrases:
      - every file
    reason: tests and generated artifacts were omitted.
  - forbidden_term_id: ai.copy.forbidden.review_free_mutation
    matched_phrases:
      - No review needed
      - Auto-apply fix
    reason: direct mutation requires review and approval posture.
  - forbidden_term_id: ai.copy.forbidden.explain_action_collapse
    matched_phrases:
      - Explain and apply
    reason: explanation and mutation controls are collapsed.

required_replacement:
  summary: >
    Suggested patch draft. Low confidence: tests and generated artifacts
    were omitted. Validation not run. Prepare preview, open the diff, or
    start a sandbox run before apply can be considered.
  controls:
    - term_id: ai.copy.action.prepare_preview
      label: Prepare preview
    - term_id: ai.copy.action.open_diff
      label: Open diff
    - term_id: ai.copy.action.start_sandbox_run
      label: Start sandbox run

assertions:
  expected_rejection: true
  direct_mutation_controls_present: true
  forbidden_terms_present:
    - guaranteed
    - passes all tests
    - every file
    - No review needed
    - Auto-apply fix
    - Explain and apply
  replacement_uses_approved_terms: true

review_notes: >
  Rejected because the copy combines perfection, false validation,
  false exhaustiveness, review-free mutation, and collapsed explain/action
  controls on a low-confidence AI proposal.
