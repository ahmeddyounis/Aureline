copy_guardrail_case_schema_version: 1
case_id: ai.copy_guardrail.educational_answer_with_citations
case_title: Educational AI answer with citations
surface_class: educational_ai_answer
expected_decision: accepted

scenario: >
  A learner asks why a payment handler rejects one request path. The AI
  answer teaches from cited workspace and docs anchors, discloses the
  provider route, and keeps the controls read-only.

truth_posture:
  truth_class_id: truth_class:ai_inferred_truth
  confidence_term_id: ai.copy.confidence.evidence_backed
  freshness_class: authoritative_live
  evidence_refs:
    - source-ref:workspace-symbol:PaymentsHandler.createCharge
    - source-ref:workspace-file:payments-handler-current-slice
    - citation-anchor:docs-pack:payments-guide#create-charge
  context_disclosures:
    - term_id: ai.copy.context.partial_context
      covered_scope: Current workset, one handler symbol, one cited docs anchor.
      excluded_scope: Tests, generated files, and routes outside the active workset.
  provider_route:
    term_id: ai.copy.route.provider_routed
    disclosure_ref: provider-selection-disclosure:ai.education:0001
    displayed_summary: >
      Provider routed: first-party managed provider; model, retention,
      region, and data-class details are available in the provider
      disclosure.
  validation_state:
    term_id: ai.copy.validation.not_run
    validation_plan_ref: null

proposed_copy:
  title: "Why this request path is rejected"
  answer: >
    Based on the cited handler symbol and payments guide, the request is
    rejected before charge creation when amount validation fails.
    Confidence: Evidence-backed for the cited path. Context limits: tests
    and routes outside the active workset were not included.
  citation_labels:
    - "PaymentsHandler.createCharge"
    - "Payments guide: create charge"
  provider_label: "Provider routed"

controls:
  rendered:
    - term_id: ai.copy.action.explain
      label: Explain
      boundary: read_only
    - term_id: ai.copy.action.open_source
      label: Open source
      boundary: read_only_navigation
  suppressed:
    - Prepare preview
    - Open diff
    - Start sandbox run
    - Apply diff

assertions:
  evidence_named_before_confidence: true
  has_non_empty_citations: true
  names_context_limits: true
  discloses_provider_route: true
  separates_explain_from_mutation: true
  direct_mutation_controls_present: false
  forbidden_terms_present: []

review_notes: >
  Accepted because the copy teaches from citations, names the partial
  context, discloses route posture, and does not offer mutation controls.
