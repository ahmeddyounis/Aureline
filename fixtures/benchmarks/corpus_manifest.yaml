# Protected benchmark corpus manifest.
#
# Single machine-readable register of every fixture the benchmark lab, the
# journey harness, the boundary-truth validators, the compatibility
# scoreboards, and the support-export lanes read when they need to name
# "which corpus revision was exercised, on which platform class, against
# which protected journey, under which retention and visibility class".
#
# Consumers MUST resolve fixtures by stable id from this file, never by
# guessing paths. A fixture that no downstream lane reads is non-conforming;
# a fixture that no longer exists but is still cited is a validation failure.
#
# The human-readable companion is docs/benchmarks/fixture_classes.md; that
# document is normative for the corpus-class, size-class, journey-tag,
# support-class, and archetype-tag vocabularies. If the two disagree, the
# document wins and this file is updated in the same change.
#
# Planning / milestone slugs MUST NOT appear in any id, path, tag, or note
# on this file. Identities here will ride into product-adjacent surfaces
# (support bundles, release-evidence claim manifests, benchmark reports).

schema_version: 1
manifest_id: aureline.protected_benchmark_corpus
manifest_revision: 1
vocabulary_source: docs/benchmarks/fixture_classes.md

# -----------------------------------------------------------------------------
# Corpus classes.
#
# The closed set of roles a fixture can play in the benchmark corpus. Every
# fixture entry below carries exactly one `corpus_class`; adding a value is
# additive-minor, renaming is breaking and opens a decision row.
# -----------------------------------------------------------------------------
corpus_classes:
  - microbenchmark_scenario
  - workflow_scenario
  - archetype_seed
  - large_file_trigger
  - recovery_or_restore_scenario
  - reference_workspace
  - boundary_truth_case

# -----------------------------------------------------------------------------
# Protected journeys.
#
# Aligned with docs/benchmarks/spike_metric_names.md and ADR-0002's
# protected-hot-path bucket set. A fixture MAY exercise zero journeys (some
# reference workspaces do); a fixture MUST NOT invent a journey tag outside
# this set.
# -----------------------------------------------------------------------------
protected_journeys:
  - startup
  - first_useful_chrome
  - first_paint
  - input_to_paint
  - render_submission
  - frame_budget
  - placeholder_open
  - placeholder_edit
  - placeholder_save
  - fallback_resolution
  - observability
  - vfs_root_enumeration
  - save_pipeline
  - recovery_journal_write
  - recovery_journal_restore
  - boundary_truth_contract

# -----------------------------------------------------------------------------
# Size classes.
#
# Closed size tiers. Fixtures that are too large to materialise in the repo
# are declared with `size_class: oversize` and MUST carry a synthesis recipe
# on the fixture entry rather than checked-in bytes.
# -----------------------------------------------------------------------------
size_classes:
  - micro          # < 1 KiB
  - tiny           # 1 KiB – 10 KiB
  - small          # 10 KiB – 100 KiB
  - medium         # 100 KiB – 1 MiB
  - large          # 1 MiB – 10 MiB
  - oversize       # > 10 MiB; not materialised in the repo, recipe-only

# -----------------------------------------------------------------------------
# Visibility / retention / license classes.
#
# Visibility mirrors the governance control-artifact index's vocabulary.
# `restricted` is reserved for fixtures that need extra privacy, export, or
# retention review before broader CI use; it MUST NOT be used for fixtures
# that live in this repository.
# -----------------------------------------------------------------------------
visibility_classes:
  - public           # ships with the repository; admissible in public CI
  - internal         # repository-internal control fixture; not a published surface
  - restricted       # requires extra privacy / export / retention review; not in this repo

retention_classes:
  - permanent_seed          # kept across milestones; retirement requires a decision row
  - milestone_scoped        # may be retired between milestones with an audit entry
  - derived_regenerable     # regenerated from a recipe; retirement is bookkeeping only

license_statuses:
  - original_author_aureline_project_mit_0bsd_choice
  - synthetic_no_real_content
  - vendored_with_attribution_pending_notice
  - requires_extra_privacy_review_before_ci

# -----------------------------------------------------------------------------
# Platform and toolchain posture.
#
# Values are closed; a fixture that needs a new posture lands the value here
# and in docs/benchmarks/fixture_classes.md in the same change.
# -----------------------------------------------------------------------------
host_platform_classes:
  - host_independent    # bytes identical across host OS / arch
  - host_dependent      # bytes differ per host (harness records host_os, rustc_target_triple)
  - host_os_pinned      # fixture is pinned to one host OS and declares it

toolchain_assumptions:
  - none
  - synthetic_bytes_no_toolchain
  - rust_toolchain_pinned_v1
  - node_js_declared_only            # manifest declares engine; no install required by the fixture
  - python_interpreter_declared_only # manifest declares interpreter; no venv required by the fixture
  - jvm_toolchain_declared_only      # JDK/build manifest declares versions; no wrapper/cache required by the fixture
  - go_toolchain_declared_only       # Go module/workspace declares version; no module cache required by the fixture
  - c_cpp_toolchain_declared_only    # CMake/preset manifest declares tools; no generated host cache required by the fixture

# -----------------------------------------------------------------------------
# Archetype placeholder tags.
#
# Reserves archetype identities so later certified-workspace and
# compatibility-scoreboard work composes against one vocabulary. The
# task-success corpus seed reserves the matching `fixture.archetype_*` ids;
# where a reference-workspace seed already exists it carries a
# `task_success_corpus_ref` back to that reservation.
# -----------------------------------------------------------------------------
archetype_tags:
  - ts_web_app
  - python_data_app
  - java_or_kotlin_service
  - rust_workspace_self_host
  - go_service_or_monorepo_slice
  - c_or_cpp_native_project
  - misc_folder
  - not_archetype_bound    # fixture is not archetype-sensitive (microbenchmarks, boundary cases)

# -----------------------------------------------------------------------------
# Support classes.
#
# Aligned with the task-success corpus archetype_detection_outcome vocabulary
# and with the archetype program's support tiers. A fixture records which
# support class it is used to exercise so later compatibility and
# certified-workspace lanes can read the corpus by tier.
# -----------------------------------------------------------------------------
support_classes:
  - certified_archetype_match
  - supported_archetype_match
  - community_archetype_match
  - experimental_archetype_match
  - probable_archetype_partial
  - unrecognised_archetype
  - archetype_detection_unavailable
  - not_support_bound            # fixture does not qualify an archetype support tier

# -----------------------------------------------------------------------------
# Evidence-consumer channels.
#
# Every fixture MUST name at least one evidence consumer. A fixture that no
# channel reads is non-conforming.
# -----------------------------------------------------------------------------
evidence_consumer_channels:
  - benchmark_lab.text_stack
  - benchmark_lab.large_file
  - benchmark_lab.bootstrap_entry_parity
  - benchmark_lab.migration_keymap_settings_theme_profile
  - benchmark_lab.certified_archetype_workflows
  - benchmark_lab.vfs_save_pipeline
  - benchmark_lab.recovery_ladder
  - ux_evidence.first_run_audit_packet
  - ux_evidence.migration_dry_run_diff_packet
  - support_bundle.first_run_summary
  - support_bundle.performance_summary
  - support_bundle.crash_recovery_summary
  - support_bundle.recent_work_summary
  - support_bundle.managed_workspace_summary
  - support_bundle.semantic_readiness_packet
  - release_evidence.claim_manifest
  - boundary_truth.save_target_token
  - boundary_truth.semantic_readiness_record
  - boundary_truth.mutation_journal
  - boundary_truth.entry_and_restore_result
  - boundary_truth.generated_artifact_lineage

# -----------------------------------------------------------------------------
# Fixture entries.
#
# Every entry MUST carry: id, corpus_class, path OR resolution_mode,
# size_class, visibility_class, retention_class, license_status,
# toolchain_assumption, host_platform_class, protected_journeys[],
# support_classes[], archetype_tags[], evidence_consumer_channels[], and
# source_revision metadata. `notes` is free-form and optional.
#
# `path` is a repo-relative path to the authoritative fixture when
# resolution_mode is omitted (the default is `concrete_file`). When a
# fixture needs a synthesis recipe instead of checked-in bytes, it declares
# `resolution_mode: recipe_only` and names the recipe.
#
# Ordering: corpus class major; then alphabetical by id within each class.
# -----------------------------------------------------------------------------
fixtures:

  # -- microbenchmark scenarios -----------------------------------------------

  - id: corpus.micro.shaping_smoke_cases
    corpus_class: microbenchmark_scenario
    path: fixtures/text/shaping_smoke_cases.txt
    source_revision:
      origin: original_author_aureline_project
      provenance: authored_in_this_repository
      since_manifest_revision: 1
    size_class: small
    visibility_class: public
    retention_class: permanent_seed
    license_status: original_author_aureline_project_mit_0bsd_choice
    toolchain_assumption: rust_toolchain_pinned_v1
    host_platform_class: host_dependent
    protected_journeys:
      - first_paint
      - input_to_paint
      - fallback_resolution
      - render_submission
      - observability
    support_classes:
      - not_support_bound
    archetype_tags:
      - not_archetype_bound
    evidence_consumer_channels:
      - benchmark_lab.text_stack
    notes: >
      21-case shaping smoke corpus consumed by aureline-bench via the
      committed seed artifact at artifacts/bench/text_stack_metrics_seed.json.
      Host-dependent because rustc_target_triple and host_os are recorded
      in the paired benchmark report.

  - id: corpus.micro.interaction_safety_cases
