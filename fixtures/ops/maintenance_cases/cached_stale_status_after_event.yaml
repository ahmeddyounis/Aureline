  scenario: >
    A post-event reconciliation card after the EU-central tenant
    migration completes. The cached pre-event managed-route status is
    stale; cached approvals and replay queues require explicit review
    before any managed write resumes. The card carries a stale label
    and links the historical migration event so users do not confuse
    the cached snapshot with the live state.
  contract_sections:
    - Notice kind, state, and required disclosure
    - Local-safe continuity is mandatory
    - Historical retention and stale labelling
