    must export pending review drafts and merge intents before the
    freeze deadline if those intents must survive the maintenance
    window offline. Local-first work remains unaffected; the freeze is
    advertised days ahead of the window so the export-before-maintenance
    follow-up has a non-null due_before_at.
  contract_sections:
    - Notice kind, state, and required disclosure
    - Required disclosure on every notice and event
    - Display-copy invariants
