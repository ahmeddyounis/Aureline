__fixture__:
  name: regional_failover_changed_boundary
  scenario: >
    A regional failover rerouted the managed control plane through an
    alternate region. Region, key-ownership route, and endpoint
    identity changed at cutover; residency requires recheck. The
    banner pins both the outage notice and the migration event,
    surfaces the boundary axes, blocks managed lifecycle writes
    pending boundary recheck, and refuses policy-admin writes with
    no safe retry until the new boundary is reviewed.
  contract_sections:
    - Banner trigger kinds (frozen)
    - Reuse rules with upstream notices (frozen)
    - When queued, retryable, blocked, and manual-rerun rows must appear distinctly

schema_refs:
  failover_banner: schemas/ops/failover_banner.schema.json
  local_safe_baseline: schemas/ops/local_safe_baseline.schema.json

