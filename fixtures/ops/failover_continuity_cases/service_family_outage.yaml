__fixture__:
  name: service_family_outage
  scenario: >
    The managed AI broker service is unavailable on the affected
    route. The local-safe baseline remains intact: edit, save,
    search, Git, build/test/debug, export, diagnostics, and cached
    docs reads continue to run locally. Idempotent managed label
    changes queue through the deferred-intent outbox; paid model
    dispatch is refused as authority-changing; support-bundle
    upload is retryable when connectivity returns.
  contract_sections:
    - Banner trigger kinds (frozen)
    - Continuity-action vocabulary (frozen)
    - Local-safe baseline rows (frozen)
    - Display-copy invariants (frozen)

