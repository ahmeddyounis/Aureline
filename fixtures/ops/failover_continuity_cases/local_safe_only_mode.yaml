failover_banner:
  schema_version: 1
  record_kind: failover_banner_record
  banner_id: banner.ref.local_safe_only_mode.2026_04_30
  title: No managed plane is reachable; local work continues
  summary: >
    Every managed service family is offline-local-safe or
    unavailable from this device. Local edits, save, search, Git,
    build, export, and diagnostics keep working; cached docs and
    provider snapshots remain readable under their freshness
    labels; idempotent managed writes queue through the outbox;
    authority-changing writes are refused so they cannot appear to
    defer silently.
  created_at: "2026-04-30T14:10:00Z"
  updated_at: "2026-04-30T14:10:00Z"
  trigger_kind_class: local_safe_only_mode
  impairment_source:
    source_kind_class: connectivity_state_snapshot_record
    outage_notice_ref: null
    maintenance_notice_ref: null
    migration_event_ref: null
    connectivity_snapshot_ref: connectivity_snapshot.ref.local_safe_only_mode.2026_04_30
    outage_state_class: null
    maintenance_state_class: null
    migration_state_class: null
    connectivity_state_class: offline_local_safe
    rationale_summary: >
      The connectivity snapshot pins every managed family as
      offline_local_safe or service_unavailable; no upstream outage
      notice or migration event is the primary source.
  impacted_features:
    control_plane_service_classes: []
    service_family_classes:
      - cached_reads
      - managed_writes
      - provider_publish
      - collaboration_control
      - remote_execution
      - paid_model_dispatch
      - background_refresh
      - upload_replication
      - auth_identity_policy
    feature_summary: >
      All managed write, publish, collaboration-control, remote
      execution, paid model dispatch, background refresh, upload
      replication, and identity refresh paths are unreachable;
      cached reads render under their freshness labels.
  local_safe_baseline_ref: baseline.ref.individual_local.offline_local_safe
  retained_local_safe_capabilities:
    - continue local edits, save, undo, search, Git, build, test, debug, export, and diagnostics
    - open recent workspaces from the on-device list without any managed plane
    - read the local docs pack and cached policy and provider snapshots under their freshness labels
  continuity_action_rows:
    - action_class: idempotent_managed_field_set
      continuity_action_state_class: queued_for_replay
      queue_posture_class: idempotent_outbox_queue
      required_user_step_class: wait_for_reconnect
      queue_or_intent_ref: outbox.ref.local_safe_only_mode.label_writes
      idempotency_key_present: true
      row_summary: Idempotent label and field updates queue through the outbox; replay drains when a managed plane returns.
    - action_class: managed_review_comment_publish
      continuity_action_state_class: queued_for_replay
      queue_posture_class: publish_later_queue
      required_user_step_class: wait_for_reconnect
      queue_or_intent_ref: queue.ref.publish_later.review_comments
      idempotency_key_present: true
      row_summary: Review-comment publish rides the publish-later queue and drains when the managed review service returns.
    - action_class: telemetry_upload
      continuity_action_state_class: queued_for_replay
      queue_posture_class: upload_replication_queue
      required_user_step_class: wait_for_reconnect
      queue_or_intent_ref: queue.ref.upload_replication.telemetry
      idempotency_key_present: false
      row_summary: Telemetry uploads ride the upload replication queue and drain when connectivity returns.
    - action_class: ai_gateway_prompt_submit
      continuity_action_state_class: blocked_pending_reconnect
      queue_posture_class: no_queue_admitted
      required_user_step_class: wait_for_reconnect
      queue_or_intent_ref: null
      idempotency_key_present: false
      row_summary: AI gateway prompts wait for the broker route to return before they can dispatch.
    - action_class: support_bundle_upload
      continuity_action_state_class: retryable_when_connected
      queue_posture_class: no_queue_admitted
      required_user_step_class: wait_for_reconnect
      queue_or_intent_ref: null
      idempotency_key_present: false
      row_summary: Support-bundle upload retries when connectivity returns; the local export remains available now.
    - action_class: paid_model_dispatch_invocation
      continuity_action_state_class: refused_authority_changing
      queue_posture_class: no_queue_admitted
      required_user_step_class: no_step_required
      queue_or_intent_ref: null
      idempotency_key_present: false
      row_summary: Paid model dispatch is refused while the broker is unreachable; quota-consuming calls cannot replay.
    - action_class: collaboration_role_grant_or_revoke
      continuity_action_state_class: refused_authority_changing
      queue_posture_class: no_queue_admitted
      required_user_step_class: no_step_required
