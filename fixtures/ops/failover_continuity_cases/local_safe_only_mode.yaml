__fixture__:
  name: local_safe_only_mode
  scenario: >
    Every managed family resolves offline-local-safe or
    service-unavailable for this deployment: the laptop is offline
    on a long flight, no managed plane is reachable, and no upstream
    outage notice or migration event is the primary source. The
    banner is the user's only durable indication that managed
    action paths are unavailable across the board. The local-safe
    baseline records every launch-critical workflow as available
    locally now; cached docs pack and cached provider snapshots
    render under their freshness labels. Managed writes are
    blocked pending reconnect, idempotent label updates queue
    through the outbox, and authority-changing writes are refused
    so they do not silently appear to defer.
  contract_sections:
    - Banner trigger kinds (frozen)
    - Required disclosure on every banner
    - Local-safe baseline rows (frozen)
    - Reuse rules with upstream notices (frozen)
    - Display-copy invariants (frozen)

schema_refs:
  failover_banner: schemas/ops/failover_banner.schema.json
  local_safe_baseline: schemas/ops/local_safe_baseline.schema.json

