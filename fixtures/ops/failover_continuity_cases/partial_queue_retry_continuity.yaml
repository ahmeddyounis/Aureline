failover_banner:
  schema_version: 1
  record_kind: failover_banner_record
  banner_id: banner.ref.partial_queue_retry.2026_05_04
  title: Hosted review and merge queue are read-only; local work continues
  summary: >
    Hosted review and merge queue are in a planned read-only window;
    the broker is reconciling a small backlog. Local edits, save,
    search, Git, build, export, and diagnostics keep working;
    review-comment publish, merge-queue enqueue, and idempotent
    label updates queue for replay; one earlier idempotent label
    update drained with a target-drift conflict and requires a
    manual rerun; collaboration role-grant is refused.
  created_at: "2026-05-04T08:00:00Z"
  updated_at: "2026-05-04T08:15:00Z"
  trigger_kind_class: planned_maintenance_window
  impairment_source:
    source_kind_class: composite_multiple_records
    outage_notice_ref: null
    maintenance_notice_ref: maintenance_notice.read_only_window_publish_later
    migration_event_ref: null
    connectivity_snapshot_ref: connectivity_snapshot.ref.partial_queue_retry.2026_05_04
    outage_state_class: null
    maintenance_state_class: read_only_window
    migration_state_class: null
    connectivity_state_class: reconciliation_pending
    rationale_summary: >
      The maintenance notice tracks the read-only window for hosted
      review and merge queue; the connectivity snapshot pins
      managed_writes as reconciliation_pending while the publish-later
      queue and outbox drain.
  impacted_features:
    control_plane_service_classes:
      - provider_review_service
      - merge_queue_service
      - ai_broker_service
    service_family_classes:
      - managed_writes
      - collaboration_control
    feature_summary: >
      Hosted review and merge queue are read-only for the planned
      window; idempotent managed writes ride the outbox; AI gateway
      prompts wait for the broker route to return.
  local_safe_baseline_ref: baseline.ref.enterprise_online.partial_queue_retry
  retained_local_safe_capabilities:
    - continue local edits, save, search, Git, build, test, debug, export, and diagnostics
    - read the local docs pack with its freshness label
  continuity_action_rows:
    - action_class: managed_review_comment_publish
      continuity_action_state_class: queued_for_replay
      queue_posture_class: publish_later_queue
      required_user_step_class: wait_for_window_end
      queue_or_intent_ref: queue.ref.publish_later.review_comments
      idempotency_key_present: true
      row_summary: Review-comment publish rides the publish-later queue and drains when the window ends.
    - action_class: merge_queue_enqueue
      continuity_action_state_class: queued_for_replay
      queue_posture_class: publish_later_queue
      required_user_step_class: wait_for_window_end
      queue_or_intent_ref: queue.ref.publish_later.merge_queue
      idempotency_key_present: true
      row_summary: Merge-queue enqueue rides the publish-later queue and drains when the window ends.
    - action_class: idempotent_managed_field_set
      continuity_action_state_class: queued_for_replay
      queue_posture_class: idempotent_outbox_queue
      required_user_step_class: wait_for_window_end
      queue_or_intent_ref: outbox.ref.partial_queue_retry.label_writes
      idempotency_key_present: true
      row_summary: Idempotent label and field updates queue through the outbox; replay drains when managed writes reopen.
    - action_class: idempotent_managed_field_set
      continuity_action_state_class: requires_manual_rerun
      queue_posture_class: drained_with_conflict
      required_user_step_class: reissue_with_fresh_freshness
      queue_or_intent_ref: outbox.ref.partial_queue_retry.label_drift_2026_05_04
      idempotency_key_present: true
      row_summary: An earlier idempotent label update drained with a target-drift conflict; reissue against the current target to apply.
    - action_class: ai_gateway_prompt_submit
      continuity_action_state_class: blocked_pending_reconnect
      queue_posture_class: no_queue_admitted
      required_user_step_class: wait_for_reconnect
      queue_or_intent_ref: null
      idempotency_key_present: false
      row_summary: AI gateway prompts wait for the broker route to finish reconciling before they can dispatch.
    - action_class: support_bundle_upload
      continuity_action_state_class: retryable_when_connected
      queue_posture_class: no_queue_admitted
      required_user_step_class: wait_for_reconnect
      queue_or_intent_ref: null
      idempotency_key_present: false
      row_summary: Support-bundle upload retries when the broker route returns; the local export remains available now.
    - action_class: collaboration_role_grant_or_revoke
      continuity_action_state_class: refused_authority_changing
      queue_posture_class: no_queue_admitted
      required_user_step_class: no_step_required
      queue_or_intent_ref: null
      idempotency_key_present: false
      row_summary: Collaboration role grants and revokes are refused during the read-only window; authority changes cannot queue.
