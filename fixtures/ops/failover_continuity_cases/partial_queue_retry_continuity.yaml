__fixture__:
  name: partial_queue_retry_continuity
  scenario: >
    A planned read-only window for hosted review and merge queue
    crossed a brief broker reconciliation. The publish-later queue
    is admitting review-comment and merge-queue intents; idempotent
    label changes queue through the outbox; an earlier idempotent
    label update already drained with a target-drift conflict and
    now requires a manual rerun; AI gateway prompts wait for
    reconnect; collaboration role-grant is refused as
    authority-changing; the local-safe baseline records every
    launch-critical workflow as available locally now. The banner
    keeps queued, retryable, blocked, and manual-rerun rows visually
    distinct so the reader can see exactly which queue an item is
    in and which require user action.
  contract_sections:
    - Banner trigger kinds (frozen)
    - Continuity-action vocabulary (frozen)
    - When queued, retryable, blocked, and manual-rerun rows must appear distinctly
    - Reuse rules with upstream notices (frozen)
    - Display-copy invariants (frozen)

