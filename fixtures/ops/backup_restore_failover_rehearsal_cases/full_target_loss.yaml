schema_version: 1
record_kind: backup_restore_failover_rehearsal_case
case_id: ops.rehearsal.full_target_loss.missing_workspace_root
outage_class_id: full_target_loss
primary_plane_class: target_authority
scenario: >
  The workspace root or managed target cannot be reached or trusted as the
  same target after reopen. Live target actions stop until the target is
  located, replaced, or restored from a reviewed source.

source_refs:
  - artifacts/ops/outage_taxonomy_alpha.yaml#full_target_loss
  - fixtures/entry/missing_target_recovery_cases/README.md
  - docs/ux/recent_work_and_restore_card_contract.md

plane_observation:
  local_core_state: available_for_review_export_and_recovery
  control_plane_state: account_or_workspace_record_may_be_available
  data_plane_state: unavailable_for_lost_target
  target_authority_state: missing_or_untrusted
  target_reachable: false

expected_product_posture:
  posture_class: restore_or_locate_target_required
  local_core_available: true
  must_surface_local_safe_baseline: true
  must_label_cached_or_optional_state: true
  boundary_review_required: true
  restore_claim_class: exact_restore_requires_matching_target_evidence

expected_recovery_actions:
  - stop_live_target_actions
  - locate_or_replace_target_identity
  - restore_from_reviewed_source
  - escalate_if_target_identity_cannot_be_proved

proof_artifacts:
  - docs/ops/backup_restore_failover_rehearsal_plan.md#restore-destination-review
  - docs/ux/recent_work_and_restore_card_contract.md
  - artifacts/ops/control_plane_vs_data_plane_examples.md

acceptance_assertions:
  live_target_actions_stopped: true
  automatic_reattach_or_rerun_forbidden: true
  destructive_reset_requires_export_review: true
  exact_build_identity_required: true

export_safety:
  metadata_only: true
  raw_payload_exported: false
  raw_tenant_names_exported: false
  raw_urls_or_hostnames_exported: false
  raw_secret_material_exported: false
