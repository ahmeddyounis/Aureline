schema_version: 1
record_kind: backup_restore_failover_rehearsal_case
case_id: ops.rehearsal.local_core_continuity.ai_broker_outage
outage_class_id: local_core_continuity
primary_plane_class: local_core
scenario: >
  Managed AI broker dispatch is unavailable, but local edit, save,
  search, Git, export, diagnostics, and cached docs remain available.

source_refs:
  - artifacts/ops/outage_taxonomy_alpha.yaml#local_core_continuity
  - fixtures/ops/failover_continuity_cases/service_family_outage.yaml

plane_observation:
  local_core_state: available_local_safe
  control_plane_state: optional_managed_service_unavailable
  data_plane_state: local_data_path_healthy
  target_authority_state: unchanged
  target_reachable: true

expected_product_posture:
  posture_class: continue_local_with_limits
  local_core_available: true
  must_surface_local_safe_baseline: true
  must_label_cached_or_optional_state: true
  boundary_review_required: false
  restore_claim_class: no_restore_implied

expected_recovery_actions:
  - continue_local_work
  - export_local_continuity_packet
  - preserve_pre_repair_checkpoint

proof_artifacts:
  - artifacts/managed/local_baseline_proof.yaml
  - docs/ops/failover_continuity_banner_contract.md
  - artifacts/ops/control_plane_vs_data_plane_examples.md

acceptance_assertions:
  local_safe_baseline_visible: true
  queued_and_blocked_actions_distinct: true
  authority_changing_replay_refused: true
  exact_build_identity_required: true

export_safety:
  metadata_only: true
  raw_payload_exported: false
  raw_secret_material_exported: false
