__fixture__:
  name: postmortem_evidence_handoff_bundle
  scenario: >
    Worked, pre-implementation evidence_handoff_bundle_record exported
    from a sev2 incident workspace once the lifecycle resolved to
    resolved_postmortem_pending. The bundle is frozen-no-post-hoc-
    rewrite by default: integrity_class resolves to
    frozen_no_post_hoc_rewrite, superseded_by_bundle_id_ref is null,
    rewrite_admissibility_class resolves to no_post_hoc_rewrite_
    admitted, retention_posture resolves to retained_until_postmortem
    _published_then_archived. The bundle pins the source incident
    workspace id, the immutable_snapshot_at timestamp, an opaque
    integrity_hash, the preserved target context (execution-context /
    deployment-profile / exact-build identity), and closed lists of
    evidence-item, runbook-packet, action-ledger entry, and signal-
    slice refs the responder pinned at snapshot time. A later
    correction would land as a new bundle and supersede this one,
    not by editing this row in place.
  exercised_classes_summary:
    bundle_kind_class: postmortem_bundle_for_review
    integrity_class: frozen_no_post_hoc_rewrite
    rewrite_admissibility_class: no_post_hoc_rewrite_admitted
    handoff_destination_class: no_handoff_local_review_only
    retention_posture_class: retained_until_postmortem_published_then_archived

