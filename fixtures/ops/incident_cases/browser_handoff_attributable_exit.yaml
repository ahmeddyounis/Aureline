    matching action-ledger entry (referenced by id) cites the same
    browser-handoff packet ref; and the workspace exports an
    evidence-handoff bundle of kind
    browser_console_handoff_attributable_exit so the exit is visible
    in the chronology rather than a hidden alternate control plane.
  exercised_classes_summary:
    operational_severity_class: operational_severity.sev2
    lifecycle_state_class: mitigating_in_progress
    alert_source_class: paging_provider_alert
    mutating_action_admission_class: mutating_admitted_under_browser_handoff
    handoff_kind_class: browser_handoff_system_browser
    deployment_profile_class_set:
      - managed_cloud

