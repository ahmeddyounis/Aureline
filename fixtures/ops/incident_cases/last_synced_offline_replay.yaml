    lifecycle_state_class: imported_replay_no_live_lifecycle
    alert_source_class: imported_alert_no_live_source
    alert_freshness_class: imported_snapshot_no_refresh_path
    mutating_action_admission_class: read_mostly_default_no_mutation_admitted
    deployment_profile_class_set:
      - air_gapped

