__fixture__:
  name: last_synced_offline_replay
  scenario: >
    Worked, pre-implementation incident_workspace_record opened from
    an imported replay bundle on the air-gapped deployment profile.
    alert_source_class resolves to imported_alert_no_live_source and
    the alert_id_ref is non-null but resolves through the replay
