__fixture__:
  name: runbook_mutating_under_runtime_approval
  scenario: >
    Worked, pre-implementation runbook_packet_record carrying a
    mitigation_mutating_under_runtime_approval step plus a matching
    action_ledger_entry_record. The runbook applies a typed connection-
    pool size narrowing on the enterprise-online deployment profile:
    the step pins a non-null preview_hash, sandbox_admission_class
    resolves to admissible_under_approval_ticket, approval_admission_
    class resolves to approval_admitted_under_runtime_approval_ticket
    and cites a non-null approval_ticket_ref. The follow-up action-
    ledger entry records the same posture, equal preview_hash and
    applied_preview_hash, outcome_class success_observed, and a
    raw_command_invocation_by_reference raw-ref class so the actual
    command line stays out of the workspace boundary.
  exercised_classes_summary:
    record_kind_runbook: runbook_packet_record
    record_kind_action_ledger: action_ledger_entry_record
    step_intent_class: mitigation_mutating_under_runtime_approval
    sandbox_admission_class: admissible_under_approval_ticket
    approval_admission_class: approval_admitted_under_runtime_approval_ticket
    target_context_class: enterprise_online_runtime_target
    outcome_class: success_observed

# --- runbook_packet_record ---

runbook_packet_schema_version: 1
record_kind: runbook_packet_record

runbook_id: runbook_packet.runbook_mutating_under_runtime_approval.connection_pool_narrow

title: Narrow connection-pool size to clear stalled workers
summary: >
  Under sev2 latency, narrow the runtime connection-pool size by one
  bracket; the change runs through the runtime approval-ticket
  envelope and pins a preview hash before apply.

applicable_severity_class_set:
  - operational_severity.sev2
  - operational_severity.sev3
applicable_deployment_profile_class_set:
  - enterprise_online
default_target_context_class: enterprise_online_runtime_target

step_records:
  - step_id: step.runbook_mutating_under_runtime_approval.inspect
    ordinal: 0
    step_intent_class: diagnostic_inspection_read_only
    title: Inspect current connection-pool size and worker queue depth
    description: >
      Read the current connection-pool size and the worker queue
      depth from the observability collector before mitigating.
    target_context_class: enterprise_online_runtime_target
    sandbox_admission_class: inspect_only_no_mutation
    approval_admission_class: no_approval_required_read_only
    preview_hash: null
    approval_ticket_ref: null
    break_glass_event_ref: null
    browser_handoff_packet_ref: null
    console_handoff_session_ref: null
    automation_recipe_ref: null
    expected_outcome_summary: >
      Pool size and worker queue depth visible; no mutation.
  - step_id: step.runbook_mutating_under_runtime_approval.narrow_pool
    ordinal: 1
    step_intent_class: mitigation_mutating_under_runtime_approval
    title: Narrow the connection-pool size by one bracket
    description: >
      Apply the typed connection-pool narrowing through the runtime
      approval-ticket envelope; pins the preview hash and waits for
      the approval-ticket admit before apply.
    target_context_class: enterprise_online_runtime_target
    sandbox_admission_class: admissible_under_approval_ticket
    approval_admission_class: approval_admitted_under_runtime_approval_ticket
    preview_hash: preview_hash.runbook_mutating_under_runtime_approval.narrow_pool.opaque-1
    approval_ticket_ref: approval_ticket.runbook_mutating_under_runtime_approval.narrow_pool
    break_glass_event_ref: null
    browser_handoff_packet_ref: null
    console_handoff_session_ref: null
    automation_recipe_ref: null
    expected_outcome_summary: >
      Connection-pool size narrowed by one bracket; observability
      collector reports the change within the next sampling window.

policy_context:
  policy_epoch: policy_epoch.ops.pre_implementation.2026.04
  trust_state: trusted
  execution_context_id: execution_context.ops.runbook_mutating_under_runtime_approval

redaction_class: internal_support_restricted

