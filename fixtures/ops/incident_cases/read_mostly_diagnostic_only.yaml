__fixture__:
  name: read_mostly_diagnostic_only
  scenario: >
    Worked, pre-implementation operational incident workspace for a
    sev3 incident opened from a paging-provider alert against the
    self-hosted deployment profile. The responder pins exact-build and
    branch / commit handles at workspace open, attaches one log
    excerpt and one metric window slice (both embedded after the
    broker default redaction pass), pins one bounded resource snapshot
    that resolves to a forensic-packet ref, and consults a runbook
    with diagnostic-inspection-read-only steps only. No mutating
    action-ledger entry is recorded; mutating_action_admission_class
    remains read_mostly_default_no_mutation_admitted; no browser /
    console handoff is recorded; no evidence-handoff bundle is
    exported. Pinned target context is preserved verbatim so a later
    postmortem reader resolves the same identity the responder saw.
  exercised_classes_summary:
    operational_severity_class: operational_severity.sev3
    lifecycle_state_class: open_triage_in_progress
    alert_source_class: paging_provider_alert
    alert_freshness_class: live_capture_fresh
    mutating_action_admission_class: read_mostly_default_no_mutation_admitted
    deployment_profile_class_set:
      - self_hosted

