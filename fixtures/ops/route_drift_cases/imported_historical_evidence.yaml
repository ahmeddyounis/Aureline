# yaml-language-server: $schema=../../../schemas/ops/route_timeline.schema.json
__fixture__:
  name: imported_historical_evidence
  scenario: >
    Imported or offline evidence reopened in a viewer. The inspector must
    label the surface as non-live and preserve the last-known route facts
    without presenting them as current transport state.

record_kind: route_timeline_record
route_timeline_schema_version: 1
route_timeline_id: rt_imported_001

boundary_summary:
  boundary_class: imported_offline_evidence_only
  required_visible_language: "Showing imported or offline evidence"
  actor_source_label: "Support bundle viewer: open evidence"
  target_label: "offline evidence (no live target)"
  data_class_labels:
    - "imported packet metadata only"
  approval_source_class: no_approval_required
  approval_source_label: "no live approval (evidence-only)"
  export_safe_summary: "This view is evidence-only; no live route is active and no mutation authority is implied."

route_truth_ref: route_truth_pkt_offline_001

authority_refs:
  approval_ticket_ref: null
  remembered_decision_ref: null
  browser_handoff_packet_ref: null
  remote_agent_attach_ticket_ref: null

hops:
  - hop_index: 1
    from_node_class: imported_offline_evidence_node
    to_node_class: imported_offline_evidence_node
    from_to_label: "offline evidence -> offline evidence"
    transport_label: "no live transport (imported snapshot)"
    drift_state: unchanged
    note: "original route facts preserved by ref; not treated as current live state"
    network_attribution_ref: null

route_drift_banner: null

event_provenance_rows:
  - record_kind: event_provenance_row_record
    event_provenance_row_schema_version: 1
    event_id: evt_imported_001
    event_kind_class: imported_evidence_event
    origin_lane_class: imported_or_offline_evidence_lane
    origin_lane_label: "Imported evidence lane"
    event_time: "2026-04-29T16:50:00Z"
    snapshot_epoch_label: "import receipt epoch 1"
    links:
      invocation_session_id_ref: null
      run_record_id_ref: null
      attempt_record_id_ref: null
      approval_ticket_ref: null
      remembered_decision_ref: null
      route_truth_ref: route_truth_pkt_offline_001
      network_attribution_ref: null
      browser_handoff_packet_ref: null
      remote_agent_attach_ticket_ref: null
      managed_control_plane_token_ref: null
      mutation_journal_entry_ref: null
      task_event_envelope_trace_id_ref: null
    note: "Evidence-only replay; no live target attach."
    redaction_class: metadata_safe_default

export_preview:
  included_route_facts:
    - "boundary class"
    - "event ids"
    - "original route summary (if known)"
  removed_data_classes:
    - "payload bodies"
    - "tokens"
    - "hostnames"
  packet_id: support_pkt_imported_001
  format_labels:
    - "Markdown + JSON"
  confirm_action_label: "Export redacted packet"

policy_context:
  policy_epoch: "policy-epoch-offline-1"
  trust_state: trusted
  execution_context_id: exec_ctx_offline_001

redaction_class: metadata_safe_default
authored_at: "2026-04-29T16:50:01Z"

