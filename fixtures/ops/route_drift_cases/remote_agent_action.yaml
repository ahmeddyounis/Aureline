# yaml-language-server: $schema=../../../schemas/ops/route_timeline.schema.json
__fixture__:
  name: remote_agent_action
  scenario: >
    A high-impact action executed on a remote workspace agent. The hop
    timeline shows the local-to-remote boundary and preserves stable ids
    for the run and approval lineage.

record_kind: route_timeline_record
route_timeline_schema_version: 1
route_timeline_id: rt_remote_001

boundary_summary:
  boundary_class: local_remote_workspace_agent
  required_visible_language: "Ran on remote workspace"
  actor_source_label: "Editor command: run tests"
  target_label: "remote workspace agent (opaque ref)"
  data_class_labels:
    - "workspace source snapshot"
    - "test command metadata only"
  approval_source_class: remembered_decision_reused
  approval_source_label: "workspace-scoped remembered decision"
  export_safe_summary: "Action executed on a remote workspace agent under the current workspace authority."

route_truth_ref: route_truth_pkt_100

authority_refs:
  approval_ticket_ref: null
  remembered_decision_ref: decision_001
  browser_handoff_packet_ref: null
  remote_agent_attach_ticket_ref: null

hops:
  - hop_index: 1
    from_node_class: local_shell_node
    to_node_class: remote_workspace_agent_node
    from_to_label: "local shell -> remote workspace agent"
    transport_label: "remote RPC"
    drift_state: unchanged
    note: "remote agent identity resolved by witness ref"
    network_attribution_ref: net_attr_001

route_drift_banner: null

event_provenance_rows:
  - record_kind: event_provenance_row_record
    event_provenance_row_schema_version: 1
    event_id: evt_remote_001
    event_kind_class: run_lifecycle_event
    origin_lane_class: remote_workspace_lane
    origin_lane_label: "Remote workspace agent"
    event_time: "2026-04-29T16:20:00Z"
    snapshot_epoch_label: "policy-epoch 1"
    links:
      invocation_session_id_ref: inv_010
      run_record_id_ref: run_010
      attempt_record_id_ref: att_010
      approval_ticket_ref: null
      remembered_decision_ref: decision_001
      route_truth_ref: route_truth_pkt_100
      network_attribution_ref: net_attr_001
      browser_handoff_packet_ref: null
      remote_agent_attach_ticket_ref: null
      managed_control_plane_token_ref: null
      mutation_journal_entry_ref: null
      task_event_envelope_trace_id_ref: trace_010
    note: null
    redaction_class: metadata_safe_default

export_preview:
  included_route_facts:
    - "boundary class"
    - "route truth ref"
    - "run id"
    - "event id"
  removed_data_classes:
    - "payload bodies"
    - "tokens"
    - "hostnames"
  packet_id: support_pkt_remote_001
  format_labels:
    - "Markdown + JSON"
  confirm_action_label: "Export redacted packet"

policy_context:
  policy_epoch: "policy-epoch-1"
  trust_state: trusted
  execution_context_id: exec_ctx_remote_001

redaction_class: metadata_safe_default
authored_at: "2026-04-29T16:20:01Z"

