# yaml-language-server: $schema=../../../schemas/ops/route_timeline.schema.json
__fixture__:
  name: external_provider_request
  scenario: >
    A request that crosses to an external provider. The inspector records
    approval source and stable ids so later support or export review does
    not infer egress from scattered provider badges.

record_kind: route_timeline_record
route_timeline_schema_version: 1
route_timeline_id: rt_provider_001

boundary_summary:
  boundary_class: local_external_provider
  required_visible_language: "Sent to external provider"
  actor_source_label: "AI tool call: request code review"
  target_label: "external provider endpoint (opaque ref)"
  data_class_labels:
    - "selected diff (redacted)"
    - "diagnostics summary (redacted)"
  approval_source_class: approval_ticket_required
  approval_source_label: "approval ticket (scoped, expiring)"
  export_safe_summary: "Request sent to an external provider under an approval ticket; raw payloads excluded by default."

route_truth_ref: route_truth_pkt_200

authority_refs:
  approval_ticket_ref: appr_001
  remembered_decision_ref: null
  browser_handoff_packet_ref: null
  remote_agent_attach_ticket_ref: null

hops:
  - hop_index: 1
    from_node_class: local_shell_node
    to_node_class: external_provider_node
    from_to_label: "local broker -> external provider"
    transport_label: "TLS request"
    drift_state: unchanged
    note: "provider identity and policy source carried by route truth packet"
    network_attribution_ref: net_attr_010

route_drift_banner: null

event_provenance_rows:
  - record_kind: event_provenance_row_record
    event_provenance_row_schema_version: 1
    event_id: evt_provider_001
    event_kind_class: provider_mutation_event
    origin_lane_class: external_provider_lane
    origin_lane_label: "External provider lane"
    event_time: "2026-04-29T16:30:00Z"
    snapshot_epoch_label: "policy-epoch 1"
    links:
      invocation_session_id_ref: inv_020
      run_record_id_ref: run_020
      attempt_record_id_ref: att_020
      approval_ticket_ref: appr_001
      remembered_decision_ref: null
      route_truth_ref: route_truth_pkt_200
      network_attribution_ref: net_attr_010
      browser_handoff_packet_ref: null
      remote_agent_attach_ticket_ref: null
      managed_control_plane_token_ref: null
      mutation_journal_entry_ref: mut_020
      task_event_envelope_trace_id_ref: trace_020
