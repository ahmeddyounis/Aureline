__fixture__:
  name: partially_blocked_run_history
  scenario: >
    History row for the workspace recipe whose second step was denied at
    the approval gate (see fixtures/automation/run_record_cases/recipe_approval_denied.json).
    The first step succeeded; the second irreversible-rewrite step was
    denied with approval_denied_no_approval_path. The history row
    quotes denied_at_approval_gate as result_class. Today the workspace
    has gained a fresh approver, so the rerun-under-current-policy
    resolver returns rerun_under_current_policy_admissible_after_user_grants_fresh_approval
    with blocker_approval_authority_revoked_now still in the list to
    keep the prior denial honest. The safe-summary export is admissible
    only via redacted support bundle.
  seed_roles:
    - declarative_recipe_layer
    - denied_at_approval_gate
    - rerun_under_current_policy_admissible_after_user_grants_fresh_approval
    - safe_summary_export_redacted_payload
  fixture_kinds:
    - automation_run_history_row
    - run_summary_export_record

