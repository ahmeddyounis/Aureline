  name: headless_safe_rerun_history
  scenario: >
    History row for a headless-safe rerun of the workspace audit bundle
    recipe dispatched through the CLI. The original run was the desktop
    recipe-runner dispatch captured in
    fixtures/automation/run_record_cases/recipe_local_read_only_success.json;
    this rerun rode the headless CLI dispatch path against a headless_safe
    shareability record. The rerun completed all three steps; the
    history row pins automation_layer_class headless_safe_run_layer and
    execution_mode_class headless_cli_explicit_dispatch. The
    safe-summary export targets headless offline export so a CI lane
    can preserve the rerun summary without raw step argv.
  seed_roles:
    - headless_safe_run_layer
    - headless_cli_explicit_dispatch
    - completed_all_steps_applied
    - safe_summary_export_offline
  fixture_kinds:
    - automation_run_history_row
    - run_summary_export_record

