# yaml-language-server: $schema=../../../schemas/automation/run_history_row.schema.json
__fixture__:
  name: extension_external_redacted_export_history
  scenario: >
    History row for an extension-authored automation run that dispatched
    through an external runner authority (a host-side IDE extension
    automation handle) and produced two effect-lineage roots. The
    underlying run was not minted by Aureline, so
    underlying_run_record_kind is external_run_handle_only_no_aureline_run_record.
    The original publisher of the extension was revoked between
    dispatch time and rerun-resolver time; the history row resolves
    rerun-under-current-policy to
    rerun_under_current_policy_blocked_publisher_revoked with the
    matching blocker. Open-as-recipe is inadmissible because the
    extension touched a capability that is not admissible to declarative
    recipes. The safe-summary export is admissible only via redacted
    support bundle and explicitly omits the extension/external payload
    bytes.
  seed_roles:
    - extension_or_external_automation_layer
    - extension_or_external_runner_dispatch
    - rerun_under_current_policy_blocked_publisher_revoked
    - safe_summary_export_redacted_payload
  fixture_kinds:
    - automation_run_history_row
    - run_summary_export_record

