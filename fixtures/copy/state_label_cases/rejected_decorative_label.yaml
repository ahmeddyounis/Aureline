record_kind: label_review_case_record
label_term_schema_version: 1
case_id: copy.label.rejected_decorative_label
case_kind: rejected_whimsical_label
case_title: Decorative labels are rejected before they reach product copy
scenario: A prototype proposes Sparkle mode for a partial background-index state and Make project shine for the repair command. The review rejects both because the state hides the controlled Partial and Warming meanings, while the command is not a concrete verb-first outcome.
surfaces_under_review:
  - surface_class: product_ui
    label_class: state_label
    rendered_label: Sparkle mode
    term_id: null
    meaning_statement: Proposed state for a workspace index that is still warming and returning partial results.
  - surface_class: command_palette
    label_class: command_name
    rendered_label: Make project shine
    term_id: null
    meaning_statement: Proposed command label for rebuilding disposable workspace index data.
candidate_labels:
  - candidate_id: candidate.decorative.state_sparkle_mode
    label: Sparkle mode
    label_class: state_label
    surface_class: product_ui
    maps_to_term_id: null
    proposed_meaning: Index is warming and results are partial.
  - candidate_id: candidate.decorative.command_make_project_shine
    label: Make project shine
    label_class: command_name
    surface_class: command_palette
    maps_to_term_id: null
    proposed_meaning: Rebuild disposable workspace index data.
approved_labels:
  - Warming
  - Partial
  - Rebuild workspace index
forbidden_labels:
  - Sparkle mode
  - Make project shine
  - All good
expected_decision:
  decision: rejected
  reasons:
    - Sparkle mode is not a controlled state label and hides whether the surface is Warming, Partial, or Ready.
    - Make project shine does not name the concrete command outcome.
    - All good is a forbidden alias because it hides scope and authority.
  required_follow_up:
    - Use Warming with a Partial detail or reason chip for the state.
    - Use Rebuild workspace index for the command label.
conformance_expectations:
  - Reviewers can reject decorative names mechanically without debating tone.
  - A replacement state label must map to a controlled term.
  - A replacement command label must be verb-first and name the acted-on object.
