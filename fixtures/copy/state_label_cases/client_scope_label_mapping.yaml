record_kind: label_review_case_record
label_term_schema_version: 1
case_id: copy.label.client_scope_mapping
case_kind: client_scope_label_mapping
case_title: Client-scope labels map consistently across surfaces
scenario: A workflow support row appears in product UI, docs, an export header, CLI help, and a support packet. The review accepts the mapping because client scope remains separate from lifecycle and support class, and Browser companion copy keeps its handoff limits visible.
surfaces_under_review:
  - surface_class: product_ui
    label_class: client_scope_label
    rendered_label: Desktop
    term_id: client.desktop
    meaning_statement: The full workflow is qualified in the installed desktop client.
  - surface_class: browser_companion_handoff
    label_class: client_scope_label
    rendered_label: Browser companion
    term_id: client.browser_companion
    meaning_statement: The companion can review and hand off but cannot grant local runtime control.
  - surface_class: documentation
    label_class: client_scope_label
    rendered_label: Desktop + browser companion
    term_id: client.desktop_browser_companion
    meaning_statement: Docs name both the full desktop path and the scoped companion path.
  - surface_class: cli_help
    label_class: client_scope_label
    rendered_label: Headless only
    term_id: client.headless_only
    meaning_statement: The command is qualified for CLI or automation output without a graphical surface.
  - surface_class: support_packet
    label_class: client_scope_label
    rendered_label: Local only
    term_id: client.local_only
    meaning_statement: The packet records that no managed recall, sync, hosted evidence, or server retention participated.
candidate_labels:
  - candidate_id: candidate.client.desktop
    label: Desktop
    label_class: client_scope_label
    surface_class: product_ui
    maps_to_term_id: client.desktop
    proposed_meaning: Full installed desktop client path.
  - candidate_id: candidate.client.browser_companion
    label: Browser companion
    label_class: client_scope_label
    surface_class: browser_companion_handoff
    maps_to_term_id: client.browser_companion
    proposed_meaning: Scoped companion review and handoff path.
  - candidate_id: candidate.client.desktop_browser_companion
    label: Desktop + browser companion
    label_class: client_scope_label
    surface_class: documentation
    maps_to_term_id: client.desktop_browser_companion
    proposed_meaning: Qualified desktop path plus scoped companion path.
  - candidate_id: candidate.client.headless_only
    label: Headless only
    label_class: client_scope_label
    surface_class: cli_help
    maps_to_term_id: client.headless_only
    proposed_meaning: CLI or automation path only.
  - candidate_id: candidate.client.local_only
    label: Local only
    label_class: client_scope_label
    surface_class: support_packet
    maps_to_term_id: client.local_only
    proposed_meaning: No vendor-hosted or managed-service copy participated.
approved_labels:
  - Desktop
  - Browser companion
  - Desktop + browser companion
  - Headless only
  - Local only
forbidden_labels:
  - Web IDE
  - Cloud mode
  - Desktop only
  - Online
expected_decision:
  decision: accepted
  reasons:
    - Each visible label maps to one canonical client-scope term.
    - Browser companion copy does not imply desktop parity.
    - Local only is used only for a value with no managed or hosted participation.
    - Client scope remains separate from support class and lifecycle state.
  required_follow_up: []
conformance_expectations:
  - Web IDE is rejected because it overstates the companion surface.
  - Cloud mode is rejected because managed deployment is not a client-scope label.
  - Desktop only is rejected on new copy because Desktop is the canonical scope label.
