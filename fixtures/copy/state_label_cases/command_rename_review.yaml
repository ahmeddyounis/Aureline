record_kind: label_review_case_record
label_term_schema_version: 1
case_id: copy.label.command_rename_review
case_kind: command_rename_review
case_title: Command rename review keeps one descriptor and a typed alias
scenario: A command previously surfaced as Reindex workspace is renamed for clearer command-palette and CLI help copy. The review accepts Rebuild workspace index because it is verb-first, names the object, and preserves the old phrase only as a typed search alias.
surfaces_under_review:
  - surface_class: command_palette
    label_class: command_name
    rendered_label: Rebuild workspace index
    term_id: null
    meaning_statement: Recreates disposable workspace index data without modifying user-authored files.
  - surface_class: cli_help
    label_class: command_name
    rendered_label: Rebuild workspace index
    term_id: null
    meaning_statement: The human-readable CLI help label points to the same command descriptor as the palette row.
  - surface_class: documentation
    label_class: command_name
    rendered_label: Rebuild workspace index
    term_id: null
    meaning_statement: Docs use the same outcome label and describe the old phrase as a search alias only.
  - surface_class: support_packet
    label_class: command_name
    rendered_label: Rebuild workspace index
    term_id: null
    meaning_statement: Support packet summaries preserve the canonical label so a support engineer can map the event to one command descriptor.
candidate_labels:
  - candidate_id: candidate.command.rebuild_workspace_index
    label: Rebuild workspace index
    label_class: command_name
    surface_class: command_palette
    maps_to_term_id: null
    proposed_meaning: Recreate disposable workspace index data.
  - candidate_id: candidate.command.reindex_workspace_alias
    label: Reindex workspace
    label_class: command_name
    surface_class: command_palette
    maps_to_term_id: null
    proposed_meaning: Legacy search phrase for the same command descriptor.
approved_labels:
  - Rebuild workspace index
forbidden_labels:
  - Refresh workspace
  - Fix workspace
  - Make search smart again
expected_decision:
  decision: accepted_with_alias_review
  reasons:
    - The canonical label is verb-first and names the acted-on object.
    - The legacy phrase remains discoverable only as a typed alias.
    - Palette, CLI help, docs, and support packet copy all resolve to the same descriptor meaning.
  required_follow_up:
    - Register Reindex workspace as a legacy search alias only.
    - Keep CLI help and docs generated from the canonical descriptor label.
conformance_expectations:
  - A reviewer can reject Refresh workspace because it does not say what object is recreated.
  - A reviewer can reject Make search smart again because it is decorative and cannot define a stable command outcome.
  - Support packet copy uses the same label as the product surface.
