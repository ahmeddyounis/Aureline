record_kind: label_review_case_record
label_term_schema_version: 1
case_id: copy.label.state_chip_surface_comparison
case_kind: state_chip_surface_comparison
case_title: State chip comparison rejects reused state word with a second meaning
scenario: A product UI search card and support export use Stale correctly for freshness loss, but a CLI summary proposes Stale to mean the user has not opened the project recently. The review rejects the CLI label because Stale is reserved for freshness or causal continuity loss.
surfaces_under_review:
  - surface_class: product_ui
    label_class: state_label
    rendered_label: Stale
    term_id: state.stale
    meaning_statement: Search results come from a prior snapshot after the freshness floor elapsed.
  - surface_class: support_packet
    label_class: state_label
    rendered_label: Stale
    term_id: state.stale
    meaning_statement: The exported packet records last-known-good search evidence after freshness loss.
  - surface_class: cli_summary
    label_class: state_label
    rendered_label: Stale
    term_id: state.stale
    meaning_statement: Proposed CLI copy says the workspace has not been opened recently, not that evidence freshness was lost.
candidate_labels:
  - candidate_id: candidate.state.stale_ui
    label: Stale
    label_class: state_label
    surface_class: product_ui
    maps_to_term_id: state.stale
    proposed_meaning: Prior data is shown after freshness floor elapsed.
  - candidate_id: candidate.state.stale_cli_wrong_meaning
    label: Stale
    label_class: state_label
    surface_class: cli_summary
    maps_to_term_id: state.stale
    proposed_meaning: Workspace was not opened recently by the user.
approved_labels:
  - Stale
  - Not opened recently
forbidden_labels:
  - Stale
  - Old workspace
  - Dormant
expected_decision:
  decision: rejected
  reasons:
    - The same state word cannot mean freshness loss in UI and support packets but user recency in CLI output.
    - The CLI concept is a descriptive history fact, not the controlled state.stale meaning.
    - A controlled alias review would still need a different visible label because the reserved meaning would collide.
  required_follow_up:
    - Use Not opened recently or an equivalent descriptive phrase for user-recency copy.
    - Keep Stale only for freshness or causal continuity loss.
conformance_expectations:
  - UI and support packet use of Stale remain valid because they share the same reserved meaning.
  - CLI reuse of Stale is mechanically rejected even if the word feels understandable in isolation.
  - Exported support evidence cannot inherit the CLI's second meaning.
