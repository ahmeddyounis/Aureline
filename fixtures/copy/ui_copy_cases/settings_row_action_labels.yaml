record_kind: ui_copy_case_record
ui_copy_lint_rules_version: 1
case_id: copy.ui.settings_row.action_labels
case_kind: settings_row_action_labels
case_title: Settings rows use outcome-specific primary actions
scenario: >
  A settings row edits a controlled value and requires an explicit commit action.
  "Submit" is rejected because it hides what is being applied. The approved label
  names the outcome and remains stable across UI, CLI exports, and support packets.
surface_family: settings_row

copy_under_review:
  action_labels:
    - candidate_id: candidate.vague_submit
      rendered_label: Submit
      expected_decision: rejected
      expected_rule_ids:
        - ui_copy.action_label.vague_standalone_forbidden
      approved_replacement: Save changes
      notes: Submit does not name what will change.
    - candidate_id: candidate.approved_save_changes
      rendered_label: Save changes
      expected_decision: approved
      expected_rule_ids: []
      notes: Outcome-specific and consistent across surfaces.

conformance_expectations:
  - The primary action names the user-visible result, not a generic confirmation.
  - Vague submit/confirm labels do not appear as the entire label on commit actions.

