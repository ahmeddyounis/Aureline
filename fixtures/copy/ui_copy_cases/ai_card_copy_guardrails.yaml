record_kind: ui_copy_case_record
ui_copy_lint_rules_version: 1
case_id: copy.ui.ai_card.copy_guardrails
case_kind: ai_copy_guardrails
case_title: AI cards use proposal language and avoid unsupported certainty
scenario: >
  An AI card proposes a patch. The copy must remain evidence-first and must not
  claim validation, safety, or guaranteed success without a backing validation
  record. Overclaiming language is rejected.
surface_family: ai_card

copy_under_review:
  ai_copy:
    - candidate_id: candidate.overclaiming
      rendered_copy: Fixed the issue. This is safe to apply and tests pass.
      expected_decision: rejected
      expected_rule_ids:
        - ui_copy.ai_copy.overclaiming_forbidden
      approved_replacement: Suggested patch. Validation not run.
      notes: >
        "Fixed", "safe", and "tests pass" are reserved for evidence-backed
        validation outcomes.
    - candidate_id: candidate.approved_proposal_posture
      rendered_copy: Suggested patch. Validation not run.
      expected_decision: approved
      expected_rule_ids: []

conformance_expectations:
  - AI copy uses Suggested/Proposed/Draft for unvalidated output.
  - Validation language appears only when backed by a validation record and declared scope.

