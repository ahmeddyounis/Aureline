record_kind: ui_copy_case_record
ui_copy_lint_rules_version: 1
case_id: copy.ui.trust_prompt.action_labels
case_kind: trust_prompt_action_labels
case_title: Trust prompts avoid standalone vague actions
scenario: >
  A workspace entry route hits a trust prompt. The primary action grants trust
  for the declared scope and must be named explicitly. A standalone "Continue"
  label is rejected because it hides the trust boundary and the resulting scope
  change.
surface_family: trust_prompt

copy_under_review:
  action_labels:
    - candidate_id: candidate.vague_continue
      rendered_label: Continue
      expected_decision: rejected
      expected_rule_ids:
        - ui_copy.action_label.vague_standalone_forbidden
      approved_replacement: Trust this workspace
      notes: Standalone Continue is ambiguous on a trust grant.
    - candidate_id: candidate.qualified_continue_read_only
      rendered_label: Continue read-only
      expected_decision: approved
      expected_rule_ids: []
      notes: >
        This label stays outcome-specific and does not hide a trust grant.
        It is acceptable only when the path performs no trust widening.

conformance_expectations:
  - Trust and scope changes are named in the action label, not implied by surrounding text.
  - The safe alternative is phrased as a distinct outcome, not a generic denial.

