record_kind: ui_copy_case_record
ui_copy_lint_rules_version: 1
case_id: copy.ui.help_error_surface.error_message
case_kind: help_error_surface_error_message
case_title: Help/error surfaces keep scope and next actions explicit
scenario: >
  A help surface cannot fetch a remote assistance payload. The error must name
  what failed, why it likely failed, what still works locally, and one next safe
  action that routes to recovery or export rather than ending at a vague “try
  again later”.
surface_family: help_or_support

copy_under_review:
  error_messages:
    - candidate_id: candidate.vague_try_again_later
      what_failed: Help could not load.
      likely_cause: Network error.
      what_still_works: Local help topics are still available.
      next_safe_action:
        action_label: Try again later
        summary: null
      expected_decision: rejected
      expected_rule_ids:
        - ui_copy.error_message.four_part_required
      notes: The next action is vague and omits a concrete recovery route.

  approved_error_message_record:
    record_kind: error_message_record
    error_message_schema_version: 1
    message_id: ui.error.help.remote_payload.unavailable
    surface_family: help_or_support
    severity: warning
    scope:
      object_label: Help content
      scope_label: null
    what_failed: Remote help content is unavailable.
    likely_cause: The network is unavailable or the help source cannot be reached.
    what_still_works: Local help topics and search still work.
    next_safe_action:
      action_label: Export support bundle
      summary: Export a support bundle for offline review or sharing.
      command_id_ref: cmd:support.export_bundle

conformance_expectations:
  - Help surfaces offer an offline-safe route instead of a dead end when remote content is unavailable.
  - Next actions stay outcome-specific and map to a stable command route when one exists.

