record_kind: ui_copy_case_record
ui_copy_lint_rules_version: 1
case_id: copy.ui.banner.error_message_four_part
case_kind: banner_error_message
case_title: Banner errors include residual capability and next safe action
scenario: >
  A banner reports a connectivity failure that blocks one workflow but does not
  block local work. The error message must say what failed, why it likely failed,
  what still works, and the next safe action. A generic two-part error is rejected.
surface_family: banner_notice

copy_under_review:
  error_messages:
    - candidate_id: candidate.generic_two_part
      what_failed: An error occurred
      likely_cause: Connection failed
      what_still_works: null
      next_safe_action: null
      expected_decision: rejected
      expected_rule_ids:
        - ui_copy.error_message.four_part_required
      notes: Missing residual working state and next safe action.

  approved_error_message_record:
    record_kind: error_message_record
    error_message_schema_version: 1
    message_id: ui.error.remote_connection.unreachable
    surface_family: banner_notice
    severity: error
    scope:
      object_label: Remote connection
      scope_label: null
    what_failed: Could not connect to the remote host.
    likely_cause: The host is unreachable or the network is unavailable.
    what_still_works: Local editing and file browsing still work.
    next_safe_action:
      action_label: Open connection details
      summary: Review connection status and retry when ready.
      command_id_ref: cmd:connections.open_details

conformance_expectations:
  - Banner errors name what still works locally when a failure is partial.
  - The message ends with one primary next safe action, not a vague “try later”.

