record_kind: ui_copy_case_record
ui_copy_lint_rules_version: 1
case_id: copy.ui.toast.action_and_error_copy
case_kind: toast_action_label_and_message
case_title: Toasts avoid generic acknowledgements and route to recovery
scenario: >
  A toast reports a task failure. The toast action label must name the recovery
  route; a generic "OK" action is rejected because it hides what the user can do
  next.
surface_family: toast

copy_under_review:
  action_labels:
    - candidate_id: candidate.generic_ok
      rendered_label: OK
      expected_decision: rejected
      expected_rule_ids:
        - ui_copy.action_label.vague_standalone_forbidden
      approved_replacement: Open output
      notes: OK does not name a recovery action.
    - candidate_id: candidate.approved_open_output
      rendered_label: Open output
      expected_decision: approved
      expected_rule_ids: []

  approved_error_message_record:
    record_kind: error_message_record
    error_message_schema_version: 1
    message_id: ui.error.task.failed.open_output
    surface_family: toast
    severity: error
    scope:
      object_label: Task run
      scope_label: null
    what_failed: The task did not complete.
    likely_cause: The last run reported a failure in the output.
    what_still_works: You can keep editing while the output is reviewed.
    next_safe_action:
      action_label: Open output
      summary: Review the output and rerun when ready.
      command_id_ref: cmd:tasks.open_output

conformance_expectations:
  - Toast actions route to a stable detail surface (output, details, or review) rather than dismissing meaning.
  - The next action label remains outcome-specific across toast and history projections.

