record_kind: microcopy_case_record
microcopy_term_schema_version: 1
case_id: copy.selection.hidden_by_policy
surface_class: selection_bar
scenario: A user selects findings from a review collection, then policy and workset narrowing hide part of the selected identity set. The selection bar and batch action disclose included, hidden-by-policy, and outside-workset counts.
input_truth:
  object_label: findings
  scope_label: explicit custom selection in current review collection
  freshness:
    freshness_class: live_exact
    time_display_policy: relative_primary_exact_in_detail
    observed_at: "2026-04-29T20:03:00Z"
    captured_at: null
    last_known_good_at: null
    label: Selection identities are current for the active review collection.
  counts:
    - term: selected
      status: exact
      value: 20
      display_value: "20"
      reason_label: Stable identities admitted to the selection.
    - term: included
      status: exact
      value: 15
      display_value: "15"
      reason_label: Selected findings eligible for the next review action.
    - term: hidden_by_policy
      status: exact
      value: 3
      display_value: "3"
      reason_label: Selected findings withheld by policy from this surface.
    - term: outside_current_workset
      status: exact
      value: 2
      display_value: "2"
      reason_label: Selected findings currently outside the active workset.
  omissions:
    - term: hidden_by_policy
      count:
        term: hidden_by_policy
        status: exact
        value: 3
        display_value: "3"
        reason_label: Policy-hidden selected findings.
      cause_label: Admin policy narrows this review view.
      inspect_action_ref: command:policy.open_effective_scope
    - term: outside_current_workset
      count:
        term: outside_current_workset
        status: exact
        value: 2
        display_value: "2"
        reason_label: Selected findings outside the current workset.
      cause_label: Active workset excludes two selected identities.
      inspect_action_ref: command:workspace.open_scope_details
required_terms:
  - selected
  - hidden_by_policy
  - outside_current_workset
  - exact
forbidden_claims:
  - "20 selected"
  - "Review selected"
  - "Apply to all selected"
  - "5 hidden"
approved_copy:
  primary_label: "20 selected findings - 3 hidden by policy - 2 outside current workset"
  secondary_label: "The review action includes 15 findings in the current workset."
  action_label: "Review 15 included findings"
  accessible_name: "20 selected findings. 3 are hidden by policy, 2 are outside the current workset, and 15 are included in the next review action."
  export_label: "Selection export: 15 included findings, 3 hidden by policy, 2 outside current workset."
conformance_expectations:
  - The selected count is not used alone because selected membership is not all actionable.
  - Hidden by policy and outside current workset are separate omission reasons.
  - The batch action names findings and included scope.

