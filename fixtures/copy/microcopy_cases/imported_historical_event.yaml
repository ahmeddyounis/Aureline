record_kind: microcopy_case_record
microcopy_term_schema_version: 1
case_id: copy.chronology.imported_historical_event
surface_class: chronology_row
scenario: A support bundle import adds a historical failed deployment event to a chronology. The row names the import actor, failed object, cause, original event time, and import time instead of rendering a one-word outcome.
input_truth:
  object_label: failed deployment event
  scope_label: imported support-bundle chronology
  freshness:
    freshness_class: imported
    time_display_policy: exact_primary_utc
    observed_at: null
    captured_at: "2026-04-29T20:30:00Z"
    last_known_good_at: null
    label: Historical event imported from a signed support bundle; not live provider state.
  counts:
    - term: included
      status: exact
      value: 1
      display_value: "1"
      reason_label: One imported chronology event.
  omissions: []
  chronology:
    actor_label: Audit import
    action_label: recorded
    object_label: failed deployment job deploy-web
    outcome_label: failed
    cause_label: exit code from imported support bundle
    original_event_at: "2026-04-20T08:42:00Z"
    recorded_at: "2026-04-29T20:30:00Z"
    time_display_policy: exact_primary_utc
required_terms:
  - exact
forbidden_claims:
  - "Failed"
  - "Imported"
  - "9 days ago"
  - "Deployment failed"
approved_copy:
  primary_label: "Audit import recorded failed deployment job deploy-web from support bundle"
  secondary_label: "Original event: 2026-04-20 08:42 UTC - Imported: 2026-04-29 20:30 UTC."
  action_label: "Open imported event source"
  accessible_name: "Audit import recorded a failed deployment job named deploy-web from a support bundle. Original event time was 2026-04-20 08:42 UTC and import time was 2026-04-29 20:30 UTC."
  export_label: "Imported chronology event: failed deployment job deploy-web, source support bundle, original event 2026-04-20 08:42 UTC, imported 2026-04-29 20:30 UTC."
  chronology_label: "Audit import recorded failed deployment job deploy-web because the imported bundle reported an exit code."
conformance_expectations:
  - The row includes actor, object, cause, outcome, original event time, and import time.
  - Exact UTC time is primary because imported historical chronology cannot rely on relative time alone.
  - The copy does not imply current live provider state.
