record_kind: microcopy_case_record
microcopy_term_schema_version: 1
case_id: copy.dashboard.stale_health_check
surface_class: dashboard_card
scenario: A dashboard health card renders a cached service-health snapshot after the freshness floor expires. The card avoids healthy/current copy and shows the stale check time.
input_truth:
  object_label: connector health checks
  scope_label: managed connector dashboard
  freshness:
    freshness_class: stale
    time_display_policy: relative_and_exact_same_row
    observed_at: null
    captured_at: "2026-04-29T19:12:00Z"
    last_known_good_at: "2026-04-29T19:12:00Z"
    label: Cached health snapshot is stale; refresh is required before claiming current health.
  counts:
    - term: loaded
      status: cached
      value: 4
      display_value: "4"
      reason_label: Health checks loaded from cached snapshot.
    - term: all_matching
      status: stale
      value: 4
      display_value: "4"
      reason_label: Four checks existed in the stale snapshot; current provider state is not confirmed.
  omissions: []
required_terms:
  - stale
  - cached_data
  - exact
forbidden_claims:
  - "Healthy"
  - "All systems healthy"
  - "Current"
  - "Synced"
approved_copy:
  primary_label: "Health checks stale - 4 cached checks - last checked 18m ago"
  secondary_label: "Refresh before acting on current connector health. Last exact check: 2026-04-29 19:12 UTC."
  action_label: "Refresh health checks"
  accessible_name: "Connector health checks are stale. Four cached checks were last confirmed at 2026-04-29 19:12 UTC."
  export_label: "Health export: stale cached snapshot, 4 checks, last known good at 2026-04-29 19:12 UTC."
conformance_expectations:
  - The card does not use healthy, current, ready, or synced as the primary label.
  - Relative time is paired with exact UTC time because freshness affects trust.
  - Cached and stale states remain visible in export copy.

