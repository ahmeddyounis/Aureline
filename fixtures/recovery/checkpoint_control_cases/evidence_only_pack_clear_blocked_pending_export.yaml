__fixture__:
  name: evidence_only_pack_clear_blocked_pending_export
  scenario: >
    A support-export-preview inspector instance scoped to the
    current machine. The inventory exposes one evidence-only
    recovery pack (a crash envelope and forensic packets that
    survived a corrupt-restorable-state failure). The clear control
    is destructive and disabled until the linked export-before-
    reset checklist resolves to verified — clearing the only copy
    of the evidence pack would destroy support evidence. The
    surface discloses that clearing the pack itself is the rare
    case where evidence retention does not hold and asks the user
    to export first.
  doc_sections:
    - "§2 Inventory-item vocabulary"
    - "§5 Controls"
    - "§5.1 Availability"
    - "§7 Linkage"
    - "§9 Surface rules"

