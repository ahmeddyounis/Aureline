  scenario: >
    A diagnostics-panel inspector instance scoped to the current
    workspace authority. The inventory exposes all four restorable
    families that ride workspace authority (workspace-authority
    checkpoint, window-topology snapshot, dirty-buffer recovery
    journal, local-history journal). Every row is paired with the
    full inspect / export / clear / revert control surface.
    Destructive controls (clear, revert) carry export-before-reset
    linkage and resolve to removes_remembered_state_only effect
    breadth; the disclaimer block names broader workspace content,
    profile settings, and caches by ref.
  doc_sections:
    - "§1 Record model"
    - "§2 Inventory-item vocabulary"
    - "§3 Scope vocabulary"
    - "§4 Inventory item record"
    - "§5 Controls"
    - "§6 Review-language block"
    - "§7 Linkage"
    - "§8 Honesty invariants"

