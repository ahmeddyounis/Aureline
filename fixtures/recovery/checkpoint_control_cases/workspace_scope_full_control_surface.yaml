    - portable_state_package:window_topology.0003.export
    - portable_state_package:local_history.0011.export
  support_bundle_candidate_ref: support_bundle_candidate:diagnostics.workspace.0001

honesty_invariants:
  inventory_class_is_closed: true
  scope_is_explicit: true
  effect_breadth_is_typed: true
  controls_distinguish_inspect_export_clear_revert: true
  destructive_controls_link_export_before_reset: true
