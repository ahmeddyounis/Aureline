review_language:
  removes_remembered_state_only_summary: >
    Inspect, export, revert, and clear controls in this surface
    only touch remembered state — workspace-authority checkpoints,
    window-topology snapshots, dirty-buffer / local-history /
    session-restore journals, portable-state packages, and
    evidence-only recovery packs. Source files, workspace
    manifests, profile defaults, and disposable caches are not
    affected by any control here.
  broader_effect_disclaimers:
    - effect_breadth_class: affects_broader_workspace_content
      linkage_target_class: clear_data_review
      linkage_target_ref: clear_data_review:project-aureline.workspace.0001
      summary: >
        To clear workspace bytes, prebuild caches, or knowledge
        caches, use the linked clear-data review sheet.
    - effect_breadth_class: affects_profile_settings
      linkage_target_class: profile_settings_inspector
      linkage_target_ref: profile_settings_inspector:profile-aureline.0001
      summary: >
        To edit profile defaults or revoke trusted roots beyond
        this checkpoint, use the linked profile-settings inspector.
    - effect_breadth_class: affects_caches
      linkage_target_class: storage_inspector
      linkage_target_ref: storage_inspector:project-aureline.workspace.0001
      summary: >
        To review pinned caches and disposable derived caches, use
        the linked storage inspector.
  remembered_state_definition_const: true
  broader_surface_routing_const: true

