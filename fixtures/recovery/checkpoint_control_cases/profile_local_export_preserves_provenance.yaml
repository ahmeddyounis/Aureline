# yaml-language-server: $schema=../../../schemas/recovery/checkpoint_inventory.schema.json
__fixture__:
  name: profile_local_export_preserves_provenance
  scenario: >
    A docs/help-example inspector instance scoped to profile_local.
    The single inventoried row is a portable-state package the user
    is preparing to export to another device. The export control
    writes a portable-state package preserving producer build,
    schema version, redaction class, included artifact classes,
    exclusions, and downgrade triggers — enough provenance for a
    later restore to explain its fidelity or omission. No
    destructive control; the disclaimer block names the broader
    surfaces by ref.
  doc_sections:
    - "§2 Inventory-item vocabulary"
    - "§4 Inventory item record"
    - "§5 Controls"
    - "§7 Linkage"
    - "§11 Acceptance"

record_kind: checkpoint_inventory_record
checkpoint_inventory_schema_version: 1
inventory_id: ckpt-inventory-profile-export-0003
emitted_at: "mono:7301:10:00:00.0001"

inspector_scope_class: profile_local
inspector_scope_ref: profile:aureline-default.0001

producer_build:
  producer_name: aureline
  producer_version: "0.0.0-dev.7301"
  producer_channel: experimental
  producer_platform_class: macos
  producer_instance_handle: producer_instance:docs_help_example.0001

title: Checkpoint inventory — profile-local export preview
summary: >
  One portable-state package is staged for export. Provenance fields
  ride the package so a later restore can explain fidelity or
  omission deterministically.

inventory_items:
  - item_id: inv-row-portable-state-package-0030
    item_class: portable_state_package
    item_artifact_ref: portable_state_package:profile.aureline.export.0030
    scope_class: profile_local
    scope_ref: profile:aureline-default.0001
    age_class: current_session
    last_written_at: "mono:7301:09:59:45.0011"
    producer_build:
      producer_name: aureline
      producer_version: "0.0.0-dev.7301"
      producer_channel: experimental
      producer_platform_class: macos
      producer_instance_handle: producer_instance:authoritative.0001
    source_schema_version: "portable_state_package.v1"
    fidelity_label_class: compatible_restore
    downgrade_triggers:
      - schema_translation_required
      - excluded_secret_material
    excluded_live_authority_classes:
      - raw_secret_material
      - live_token_or_cookie
      - delegated_approval_or_unspent_ticket
      - machine_unique_handle
    redaction_class: review_required_code_adjacent
    export_posture: export_review_required
    size_estimate_bytes: 8388608
    checksum_state: verified
    signature_state: signed_verified
    restore_provenance_ref: restore_provenance:portable_state_package.0030
    preserved_prior_artifact_refs:
      - preserved_prior_artifact:profile.aureline.0029
    available_control_ids:
      - inv-control-inspect-portable-state-package-0030
      - inv-control-export-portable-state-package-0030
    summary: >
      Portable-state package containing profile defaults, layout
      slots, and stable metadata. Compatible-restore claim;
      schema-translation and secret-material exclusion are the
      named downgrade triggers.

controls:
  - control_id: inv-control-inspect-portable-state-package-0030
    control_class: inspect
    target_item_ids:
      - inv-row-portable-state-package-0030
    target_scope_class: profile_local
    target_scope_ref: profile:aureline-default.0001
    effect_breadth_class: non_destructive_read_only
    availability: available
    enabled: true
    reversibility_class: exact_undo
    evidence_retained_after_action: true
    confirm_label: Inspect portable-state package
    cancel_label: Cancel
    summary: >
      Read-only inspection of the package manifest, redaction
      summary, exclusions, and signer ref.

  - control_id: inv-control-export-portable-state-package-0030
    control_class: export
    target_item_ids:
      - inv-row-portable-state-package-0030
    target_scope_class: profile_local
    target_scope_ref: profile:aureline-default.0001
    effect_breadth_class: non_destructive_read_only
    availability: available
    enabled: true
    reversibility_class: exact_undo
    evidence_retained_after_action: true
    linked_portable_state_package_ref: portable_state_package:profile.aureline.export.0030
    linked_restore_provenance_ref: restore_provenance:portable_state_package.0030
    confirm_label: Export portable-state package
    cancel_label: Cancel
    summary: >
      Write the portable-state package to local storage. Producer
      build, source schema version, redaction class, included
      artifact classes, exclusions, and downgrade triggers are
      preserved so a later restore can name what reopened live,
      what reopened as placeholder, and what was intentionally
      excluded.

review_language:
  removes_remembered_state_only_summary: >
    No destructive control runs from this surface. Inspect and
    export are non-destructive; the package's bytes stay in place.
  broader_effect_disclaimers:
    - effect_breadth_class: affects_broader_workspace_content
      linkage_target_class: clear_data_review
      linkage_target_ref: clear_data_review:profile-aureline.workspace.0001
      summary: >
        To remove workspace bytes or workspace-shared manifests,
        use the linked clear-data review sheet.
    - effect_breadth_class: affects_profile_settings
      linkage_target_class: factory_or_profile_reset_checklist
      linkage_target_ref: ebr:profile_reset.profile-aureline.0001
      summary: >
        To reset profile defaults outright, use the linked
        export-before-reset checklist.
    - effect_breadth_class: affects_caches
      linkage_target_class: storage_inspector
      linkage_target_ref: storage_inspector:profile-aureline.workspace.0001
      summary: >
        To clear caches or release pinned offline bundles, use the
        linked storage inspector.
  remembered_state_definition_const: true
  broader_surface_routing_const: true

linkage:
  restore_provenance_refs:
    - restore_provenance:portable_state_package.0030
  export_before_reset_checklist_refs: []
  clear_data_review_refs:
    - clear_data_review:profile-aureline.workspace.0001
  portable_state_package_refs:
    - portable_state_package:profile.aureline.export.0030
  support_bundle_candidate_ref: support_bundle_candidate:profile_export_preview.0001

honesty_invariants:
  inventory_class_is_closed: true
  scope_is_explicit: true
  effect_breadth_is_typed: true
  controls_distinguish_inspect_export_clear_revert: true
  destructive_controls_link_export_before_reset: true
  clear_actions_remove_remembered_state_only: true
  broader_effects_routed_by_ref: true
  linkage_is_typed: true
