__fixture__:
  name: window_scope_topology_clear_with_disclaimer
  scenario: >
    A settings-inspector instance scoped to the current window. Only
    the window-topology snapshot rides this scope. The clear control
    is enabled (no export-before-reset gate, because the snapshot is
    derivable from the workspace-authority checkpoint and a layout-
    only restore is acceptable). The review-language block names
    broader workspace content, profile settings, and caches by ref
    so the user sees what the clear control deliberately does NOT
    affect.
  doc_sections:
    - "§3 Scope vocabulary"
    - "§4 Inventory item record"
    - "§5 Controls"
    - "§6 Review-language block"
    - "§8 Honesty invariants"

