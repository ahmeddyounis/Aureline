__fixture__:
  name: verified_export_before_reset
  scenario: >
    A factory_reset on the abandoned device of a device_replacement
    scenario. The user has a verified authoritative backup and an
    active managed admin seat. Every exportable user-owned class is
    written to local-only convenience-export bundles, every byte is
    verified, and the reset-authorization gate is authorized_for_reset.
    Caches are not exported (export_not_offered_metadata_only via
    derived_disposable_only posture surfaced as export_offered, then
    user_declined to keep the bundle small) and the seat token is
    externally recoverable through the admin seat. The reset-review
    language demonstrates the four-bucket separation: deleted (none),
    retained on the backup, externally recoverable, and not-exported.
  doc_sections:
    - "§1 Record model"
    - "§4 Per-row checklist fields"
    - "§6 External-recoverability vocabulary"
    - "§8 Verification-result vocabulary"
    - "§10 Reset-review language block"
    - "§13 Honesty invariants"
    - "§15 Record model — export-verification-result"

