__fixture__:
  name: unsupported_evidence_class
  scenario: >
    A seat_loss factory_reset on a managed-tenant device whose
    evidence packets contain policy-bound bodies the convenience-
    export transport refuses to carry. The seat is revoked, so
    seat_or_license_token is not_recoverable_after_reset and the
    admin-seat path is unreachable. The reset-authorization gate
    cannot reach authorized_for_reset; instead it sits at
    blocked_unsupported_class until the user explicitly skips the
    unsupported evidence class via the typed acknowledgement, OR
    chooses escalate_to_support_with_evidence. Workspace, profile,
    layout, local-history, and autosave are exported as the only
    copies on the device. The fixture demonstrates that an
    unsupported evidence class is enumerated under
    unsupported_classes[] (never hidden inside generic copy) and that
    the reset-review language surfaces the unsupported set
    separately.
  doc_sections:
    - "§5 Unsupported-class disclosure"
    - "§6 External-recoverability vocabulary"
    - "§8 Verification-result vocabulary"
    - "§9 Follow-up guidance vocabulary"
    - "§10 Reset-review language block"
    - "§13 Honesty invariants"
    - "§16 Reset-authorization-state vocabulary"

