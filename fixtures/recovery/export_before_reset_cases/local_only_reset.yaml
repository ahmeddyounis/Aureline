__fixture__:
  name: local_only_reset
  scenario: >
    A local-only credential-store reset on a self-hosted device whose
    OS-level keyring is unreadable. The user has no managed admin seat,
    no sync replica, and no authoritative backup of credential bytes.
    The export step covers the surrounding artifacts (workspace state,
    profile defaults, evidence packets) under user_authored_durable
    posture; the credential-store row itself is unsupported because the
    convenience-export transport never carries OS-bound credentials.
    The checklist demonstrates the locally_recoverable_only_no_external_source
    branch: workspace, profile, layout, evidence, local-history, and
    autosave are exported as the only copies on the device, and the
    user records the no-undo acknowledgement before credential_store_reset
    proceeds.
  doc_sections:
    - "§1 Record model"
    - "§2 Reset-kind vocabulary"
    - "§3 Artifact-class vocabulary"
    - "§4 Per-row checklist fields"
    - "§5 Unsupported-class disclosure"
    - "§6 External-recoverability vocabulary"
    - "§10 Reset-review language block"
    - "§13 Honesty invariants"

