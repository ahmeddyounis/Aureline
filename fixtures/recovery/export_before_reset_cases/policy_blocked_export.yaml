__fixture__:
  name: policy_blocked_export
  scenario: >
    A managed-tenant profile-reset where active policy blocks export of
    profile_defaults and credentials at preflight. The user has a
    verified authoritative backup of workspace bytes and an active
    admin seat for the seat_or_license_token. Profile reset cannot
    proceed until the policy review path completes; the verification
    result records blocked_by_policy and the reset-authorization gate
    sits at blocked_by_policy. The fixture demonstrates that a policy
    block is visible under policy_exclusions[] (not hidden behind the
    generic 'Reset blocked' banner) and the reset-review language
    surfaces the policy-excluded classes separately from the deleted
    and retained sets.
  doc_sections:
    - "§1 Record model"
    - "§5 Unsupported-class disclosure"
    - "§7 Export-action vocabulary"
    - "§8 Verification-result vocabulary"
    - "§9 Follow-up guidance vocabulary"
    - "§10 Reset-review language block"
    - "§16 Reset-authorization-state vocabulary"

