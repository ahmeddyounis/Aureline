__fixture__:
  name: extension_regression_bisect_then_quarantine
  scenario: >
    After an update to one extension, the extension host crashes when
    it launches. The user can open the workspace in a narrowed posture
    and then bisect the candidate extensions to isolate the offender.
    The identified extension is quarantined until the user (or managed
    policy) explicitly changes that state.
  doc_sections:
    - "Recovery-rung matrix"
    - "Rung transition rules"

