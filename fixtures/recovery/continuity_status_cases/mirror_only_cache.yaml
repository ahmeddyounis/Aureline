    restore-target row: workspace and layout are covered by the local
    checkpoint, while profile and evidence are reported as missing
    with explicit local-safe guidance to capture an authoritative
    backup.
  doc_sections:
    - "§2 Recovery promise classes"
    - "§7 Restore-target inventory"
    - "§9 Surface rules"

