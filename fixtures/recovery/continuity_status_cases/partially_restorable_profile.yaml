__fixture__:
  name: partially_restorable_profile
  scenario: >
    A managed-tenant profile being restored on a fresh device. The
    sync replica is in sync within the policy window for most
    profile-wide settings, but a missing extension equivalence map
    means a subset of profile state cannot be rehydrated without
    rebuild. Workspace bytes recover from a verified backup; layout
    rehydrates partially because the missing extensions left
    placeholder panes; evidence is covered by the verified backup.
    The card flags the profile and layout targets as
    partially_restorable with explicit local-safe guidance.
  doc_sections:
    - "§7 Restore-target inventory"
    - "§7.1 Restorability states"
    - "§10 Composition with adjacent contracts"

