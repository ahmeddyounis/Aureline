__fixture__:
  name: dirty_buffer_recovery
  scenario: >
    A reopen after an abnormal termination where layout cannot be
    restored safely (corrupt restorable layout state) but the
    autosave / dirty-buffer journal carries unsaved bytes for two
    editors. The chooser opens with dirty_buffer_recovery. The risk
    note is writes_user_owned_recovery_state with checkpoint_restore
    reversibility — restore writes only into local-history /
    autosave / workspace-authority checkpoint state. The chooser
    forbids claim_save_to_disk because the journal is not a save.
    Companion actions compare_to_disk and open_journal are
    available.
  doc_sections:
    - "§2 Recovery-level vocabulary"
    - "§3 Restore-chooser state record"
    - "§5 Retained-evidence links"
    - "§6 Risk note"
    - "§7 Primary actions"
    - "§9 Packet / export linkage"
    - "§10 Honesty invariants"

