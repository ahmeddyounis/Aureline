  checkpoint_refs:
    - checkpoint:migration_checkpoint.0001
    - checkpoint:settings_backup.0001
  docs_help_label: >
    Checkpoint rollback — walk the migration checkpoint after
    capturing a local checkpoint and exporting current state.

accessibility_contract:
  keyboard_reachable_actions: true
  focus_target_ref: focus:chooser.checkpoint_rollback.restore_now
  screen_reader_summary: >
    Checkpoint rollback. Restoring the migration checkpoint
    mutates profile state; a local checkpoint and export are
    required first. Four actions plus Open recovery ladder,
    Export evidence, Open logs.

honesty_invariants:
