# yaml-language-server: $schema=../../../schemas/recovery/restore_chooser_state.schema.json
__fixture__:
  name: exact_session_restore
  scenario: >
    A clean reopen on a workspace whose runtime survived under the
    same compatible state contract: build identity, extension
    manifest digests, monitor topology, and remote-target authority
    all match the prior launch. The chooser opens with
    exact_session_restore. No prior decision is remembered. The risk
    note is restore_no_rerun_no_reattach with exact_undo
    reversibility — restore rehydrates layout, panes, and dirty
    buffers but never reruns commands or reattaches debuggers. The
    chooser explicitly forbids claim_runtime_reattached at the
    crash-loop boundary because no crash occurred; the chooser is a
    routine reopen surface.
  doc_sections:
    - "§1 Record model"
    - "§2 Recovery-level vocabulary"
    - "§3 Restore-chooser state record"
    - "§5 Retained-evidence links"
    - "§6 Risk note"
    - "§7 Primary actions"
    - "§9 Packet / export linkage"
    - "§10 Honesty invariants"

record_kind: restore_chooser_state_record
restore_chooser_state_schema_version: 1
chooser_id: chooser-exact-session-restore-0001
emitted_at: "mono:6112:09:14:02.0001"

surface_family: start_center_chooser
startup_state_ref: "startup_state:reopen_with_pending_restore"

chosen_level_record:
  level_id: level-exact-session-restore-0001
  recovery_level_class: exact_session_restore
  selection_criterion_class: prior_runtime_survived_compatible_contract
  rendered_name: Exact session restore
  what_restores:
    - windows_pane_tree
    - editor_identity
    - dirty_buffers
    - cursor_and_scroll
    - stable_inspectors
    - non_mutating_panels
  what_reopens_as_context_or_placeholder: []
  what_does_not_rerun:
    - tasks
    - tests
    - debug_attach
    - notebook_cells
    - ai_tool_calls
    - publish_or_promote_actions
    - remote_mutations
  forbidden_claims:
    - claim_silent_command_rerun
    - claim_evidence_was_deleted_by_skip
  restore_level_ref: exact_restore
  restore_fidelity_class_ref: exact_restore
  summary: >
    Layout, dirty buffers, and stable inspectors rehydrate. No
    command rerun, no debugger reattach, no remote mutation.

changed_since_failure_summary:
  prior_failure_id: null
  prior_failure_class: null
  prior_recovery_level_record_ref: null
  changed_since_class: []
  summary: >
    No prior failure on this workspace. The chooser is a routine
    reopen surface with no remembered decision in scope.

retained_evidence_links:
  crash_envelope_ref: null
  restore_manifest_ref: restore_manifest:exact-session.0001
  recovery_journal_refs:
    - journal:autosave.exact-session.0001
  local_history_snapshot_refs:
    - local_history_snapshot:editor.0001
  checkpoint_refs: []
  evidence_packet_refs: []
  forensic_packet_refs: []
  support_bundle_candidate_ref: null
  redaction_class: local_only_private
  export_posture: local_first_not_exported
  evidence_retained_after_skip: true
  summary: >
    The restore manifest and the autosave journal are the named
    anchors; nothing was crash-evidence-bound this launch.

risk_note:
  risk_class: restore_no_rerun_no_reattach
  reversibility_class: exact_undo
  requires_pre_action: []
  no_undo_acknowledgement_required: false
  summary: >
    Restore rehydrates layout and dirty buffers only; no command
    rerun, no reattach, no reauth. Skip once and Open clean retain
    evidence.

primary_actions:
  - action_id: restore_now
    rendered_label: Restore now (Exact session restore)
    availability: available
    enabled: true
    preserves:
      - preserve_session_manifest
      - preserve_layout_context
      - preserve_dirty_buffers
      - preserve_evidence
    discards_or_defers:
      - rerun_nothing
    evidence_retained_after_action: true
    requires_confirmation: false
    consequence_summary: >
      Rehydrate the prior session at exact-restore fidelity. No
      task, test, debug, notebook, or remote mutation reruns.
  - action_id: skip_once
    rendered_label: Skip once
    availability: available
    enabled: true
    preserves:
      - preserve_session_manifest
      - preserve_dirty_buffers
      - preserve_evidence
      - preserve_local_history
    discards_or_defers:
      - defer_restore_this_launch
    evidence_retained_after_action: true
    requires_confirmation: false
    consequence_summary: >
      Skip the chooser for this launch only; the restore prompt is
      retained for evidence and the next launch may re-prompt.
  - action_id: open_clean
    rendered_label: Open clean
    availability: available
    enabled: true
    preserves:
      - preserve_evidence
      - preserve_local_history
      - preserve_checkpoint_refs
    discards_or_defers:
      - discard_auto_restore_attempt
    evidence_retained_after_action: true
    requires_confirmation: true
    consequence_summary: >
      Open without restoring the prior session. Evidence, local
      history, and checkpoints remain.
  - action_id: safe_mode
    rendered_label: Safe mode
    availability: available
    enabled: true
    preserves:
      - preserve_evidence
      - preserve_dirty_buffers
      - preserve_session_manifest
      - preserve_checkpoint_refs
      - preserve_local_history
    discards_or_defers:
      - suspend_extension_activation
      - suspend_remote_reattach
    evidence_retained_after_action: true
    requires_confirmation: false
    consequence_summary: >
      Enter the recovery-ladder safe-mode rung. Extensions, remote
      reattach, and AI runtime stay suspended until widened.

companion_actions:
  - action_id: open_recovery_ladder
    availability: available
    enabled: true
    evidence_retained_after_action: true
    rendered_label: Open recovery ladder
    consequence_summary: >
      Open the recovery-ladder packet to inspect rung options.

remembered_choice_expiry:
  was_prior_decision_remembered: false
  expiry_triggered: false
  still_suppressed_until_class: not_suppressed
  summary: >
    No prior remembered decision on this workspace.

packet_export_linkage:
  restore_prompt_ref: restore_prompt:exact-session.0001
  restore_card_ref: restore_card:exact-session.0001
  crash_loop_card_ref: null
  recovery_scenario_card_ref: null
  recovery_ladder_packet_ref: recovery_ladder_packet:default.0001
  support_bundle_candidate_ref: null
  evidence_packet_refs: []
  forensic_packet_refs: []
  local_history_snapshot_refs:
    - local_history_snapshot:editor.0001
  recovery_journal_refs:
    - journal:autosave.exact-session.0001
  checkpoint_refs: []
  docs_help_label: >
    Exact session restore — layout and dirty buffers rehydrate; no
    command rerun, no debugger reattach.

accessibility_contract:
  keyboard_reachable_actions: true
  focus_target_ref: focus:chooser.exact_session_restore.restore_now
  screen_reader_summary: >
    Exact session restore. Four actions: Restore now, Skip once,
    Open clean, Safe mode.

honesty_invariants:
  recovery_level_is_closed: true
  retained_evidence_named: true
  primary_actions_distinct: true
  expiry_is_typed: true
  linkage_is_typed: true
