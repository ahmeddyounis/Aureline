# yaml-language-server: $schema=../../../schemas/recovery/restore_chooser_state.schema.json
__fixture__:
  name: remembered_skip_overridden_by_newly_available_evidence
  scenario: >
    A reopen on a workspace where the user previously chose Skip
    once on a context_restore_with_placeholders chooser. Today's
    chosen level is the same — context_restore_with_placeholders
    — but a new evidence packet (a captured forensic packet for the
    quarantined extension host) was retained between the prior
    decision and this launch. Newly_available_evidence triggers
    expiry; the chooser is shown despite the remembered Skip-once.
    The chooser explicitly cites newly_available_evidence in
    changed_since_class so the user sees why today's prompt
    differs from yesterday's.
  doc_sections:
    - "§4 Changed-since-failure summary"
    - "§5 Retained-evidence links"
    - "§7 Primary actions"
    - "§8 Remembered-choice expiry rules"
    - "§9 Packet / export linkage"
    - "§10 Honesty invariants"
    - "§11 Surface rules"

