risk_note:
  risk_class: restore_no_rerun_no_reattach
  reversibility_class: exact_undo
  requires_pre_action: []
  no_undo_acknowledgement_required: false
  summary: >
    Restore rehydrates layout only; the placeholder pane carries
    the new forensic packet for review.

primary_actions:
  - action_id: restore_now
    rendered_label: Restore now (Context restore with placeholders)
    availability: available
    enabled: true
    preserves:
      - preserve_layout_context
      - preserve_session_manifest
      - preserve_evidence
      - preserve_dirty_buffers
    discards_or_defers:
      - rerun_nothing
      - suspend_remote_reattach
    evidence_retained_after_action: true
    requires_confirmation: false
    consequence_summary: >
      Restore layout. The quarantined extension reopens as a
      placeholder; the new forensic packet is reviewable in-place.
  - action_id: skip_once
    rendered_label: Skip once
    availability: available
    enabled: true
    preserves:
      - preserve_session_manifest
      - preserve_dirty_buffers
      - preserve_evidence
      - preserve_local_history
    discards_or_defers:
      - defer_restore_this_launch
    evidence_retained_after_action: true
    requires_confirmation: false
    consequence_summary: >
      Skip again; the new forensic packet remains retained and the
      chooser will reappear on the next evidence change.
  - action_id: open_clean
    rendered_label: Open clean
    availability: available
    enabled: true
    preserves:
      - preserve_evidence
      - preserve_local_history
      - preserve_checkpoint_refs
    discards_or_defers:
      - discard_auto_restore_attempt
    evidence_retained_after_action: true
    requires_confirmation: true
    consequence_summary: >
      Open clean; evidence remains retained for support and
      diagnostics.
  - action_id: safe_mode
    rendered_label: Safe mode
    availability: available
    enabled: true
    preserves:
      - preserve_evidence
      - preserve_dirty_buffers
      - preserve_session_manifest
      - preserve_checkpoint_refs
    discards_or_defers:
      - suspend_extension_activation
      - suspend_remote_reattach
    evidence_retained_after_action: true
    requires_confirmation: false
    consequence_summary: >
      Enter safe mode; the quarantined extension stays disabled
      and the new forensic packet remains inspectable.

companion_actions:
  - action_id: open_recovery_ladder
    availability: available
    enabled: true
    evidence_retained_after_action: true
    rendered_label: Open recovery ladder
    consequence_summary: >
      Open the recovery-ladder packet for safe-mode and extension-
      quarantine rung detail.
  - action_id: export_evidence
    availability: available
    enabled: true
    evidence_retained_after_action: true
    rendered_label: Export evidence
    consequence_summary: >
      Stage the new forensic packet and the prior evidence packet
      for local export.

