# yaml-language-server: $schema=../../../schemas/recovery/restore_chooser_state.schema.json
__fixture__:
  name: context_restore_with_placeholders
  scenario: >
    A reopen on a workspace whose remote target is unreachable and
    one extension host is missing. Layout, file/editor identity,
    panel positions, and stable metadata can rehydrate, but live
    runtime cannot be claimed; affected panes reopen as
    placeholders. The chooser opens with
    context_restore_with_placeholders. The selection criterion is
    missing_dependency_layout_only because the dependency drift —
    not a schema/version translation — is what lowers fidelity.
    Risk class is restore_no_rerun_no_reattach with exact_undo
    reversibility.
  doc_sections:
    - "§2 Recovery-level vocabulary"
    - "§3 Restore-chooser state record"
    - "§4 Changed-since-failure summary"
    - "§5 Retained-evidence links"
    - "§6 Risk note"
    - "§7 Primary actions"
    - "§9 Packet / export linkage"
    - "§10 Honesty invariants"

record_kind: restore_chooser_state_record
restore_chooser_state_schema_version: 1
chooser_id: chooser-context-restore-placeholders-0001
emitted_at: "mono:6202:11:01:08.0044"

surface_family: start_center_chooser
startup_state_ref: "startup_state:reopen_with_pending_restore"

chosen_level_record:
  level_id: level-context-restore-placeholders-0001
  recovery_level_class: context_restore_with_placeholders
  selection_criterion_class: missing_dependency_layout_only
  rendered_name: Context restore with placeholders
  what_restores:
    - layout_slots
    - panel_positions
    - stable_metadata
    - editor_identity
    - local_text_state
  what_reopens_as_context_or_placeholder:
    - missing_extension_host
    - missing_remote_target
    - layout_only_no_live_runtime
  what_does_not_rerun:
    - tasks
    - tests
    - debug_attach
    - notebook_cells
    - live_runtime_reattach
    - silent_reauth
    - silent_reconnect
  forbidden_claims:
    - claim_runtime_reattached
    - claim_remote_session_reauthed
    - claim_silent_command_rerun
    - claim_pixel_perfect_layout
    - claim_live_readiness_for_placeholder
    - claim_evidence_was_deleted_by_skip
  restore_level_ref: layout_only
  restore_fidelity_class_ref: layout_only
  summary: >
    Layout and editor identity rehydrate; the missing extension
    host and unreachable remote target reopen as placeholders.
    Reconnect and reauth remain explicit user choices.

changed_since_failure_summary:
  prior_failure_id: null
  prior_failure_class: null
  prior_recovery_level_record_ref: null
  changed_since_class: []
  summary: >
    No prior failure or remembered decision in scope; the chooser
    is shown because dependencies drifted between launches.

retained_evidence_links:
  crash_envelope_ref: null
  restore_manifest_ref: restore_manifest:context-restore.0001
  recovery_journal_refs:
