  local_history_snapshot_refs:
    - local_history_snapshot:editor.0011
  checkpoint_refs: []
  evidence_packet_refs:
    - evidence_packet:missing_extension_host.0001
    - evidence_packet:missing_remote_target.0001
  forensic_packet_refs: []
  support_bundle_candidate_ref: null
  redaction_class: local_only_private
  export_posture: local_first_not_exported
  evidence_retained_after_skip: true
  summary: >
    The restore manifest, autosave journal, and two missing-
    dependency evidence packets are the named anchors.

risk_note:
  risk_class: restore_no_rerun_no_reattach
  reversibility_class: exact_undo
  requires_pre_action: []
  no_undo_acknowledgement_required: false
  summary: >
    Restore rehydrates layout and local text state only;
    placeholders do not claim live readiness. Reconnect and reauth
    remain explicit user actions.

primary_actions:
  - action_id: restore_now
    rendered_label: Restore now (Context restore with placeholders)
    availability: available
    enabled: true
    preserves:
      - preserve_layout_context
      - preserve_session_manifest
      - preserve_evidence
      - preserve_dirty_buffers
    discards_or_defers:
      - rerun_nothing
      - suspend_remote_reattach
    evidence_retained_after_action: true
    requires_confirmation: false
    consequence_summary: >
      Restore layout and editor identity. Missing extension host
      and remote target reopen as placeholders.
  - action_id: skip_once
    rendered_label: Skip once
    availability: available
    enabled: true
    preserves:
      - preserve_session_manifest
      - preserve_dirty_buffers
      - preserve_evidence
      - preserve_local_history
    discards_or_defers:
      - defer_restore_this_launch
    evidence_retained_after_action: true
    requires_confirmation: false
    consequence_summary: >
      Skip the chooser for this launch; the prompt is retained for
      evidence.
  - action_id: open_clean
    rendered_label: Open clean
    availability: available
    enabled: true
    preserves:
      - preserve_evidence
      - preserve_local_history
      - preserve_checkpoint_refs
    discards_or_defers:
      - discard_auto_restore_attempt
    evidence_retained_after_action: true
    requires_confirmation: true
    consequence_summary: >
      Open without restoring the prior session. Evidence and local
      history remain.
  - action_id: safe_mode
    rendered_label: Safe mode
    availability: available
    enabled: true
    preserves:
      - preserve_evidence
      - preserve_dirty_buffers
      - preserve_session_manifest
      - preserve_checkpoint_refs
    discards_or_defers:
      - suspend_extension_activation
      - suspend_remote_reattach
    evidence_retained_after_action: true
    requires_confirmation: false
    consequence_summary: >
      Enter safe mode; extensions and remote reattach stay
      suspended until widened.

companion_actions:
  - action_id: open_recovery_ladder
    availability: available
    enabled: true
    evidence_retained_after_action: true
    rendered_label: Open recovery ladder
    consequence_summary: >
      Open the recovery-ladder packet for safe-mode rung detail.
  - action_id: open_logs
    availability: available
    enabled: true
    evidence_retained_after_action: true
    rendered_label: Open logs
    consequence_summary: >
      Open local logs for inspection.

