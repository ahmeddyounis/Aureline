__fixture__:
  name: evidence_only_recovery
  scenario: >
    A reopen after the fault-domain restart budget is exhausted.
    UI state cannot be safely restored; the chooser opens with
    evidence_only_recovery bound to selection criterion
    bounded_restart_exhausted_no_safe_path. The chooser cites a
    recovery-scenario card (workspace_index_corruption) because
    the underlying scenario is large-failure recovery. Risk class
    is evidence_only_no_state_change with exact_undo
    reversibility — opening evidence does not change any state.
    Companion actions export_evidence, open_logs, and
    open_recovery_ladder are available; retry_reopen is disabled
    because the restart budget is exhausted.
  doc_sections:
    - "§2 Recovery-level vocabulary"
    - "§3 Restore-chooser state record"
    - "§5 Retained-evidence links"
    - "§6 Risk note"
    - "§7 Primary actions"
    - "§9 Packet / export linkage"
    - "§10 Honesty invariants"
    - "§11 Surface rules"

