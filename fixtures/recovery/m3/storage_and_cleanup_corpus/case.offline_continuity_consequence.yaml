schema_version: 1
record_kind: storage_cleanup_drill_case_record
case_id: case:storage_cleanup_drill:offline_continuity_consequence
title: Artifact cleanup names the offline-readiness consequence before deleting
drill_class: offline_continuity_consequence
trigger_class: user_requested_cleanup
anchor_scenario_ref: none
anchor_review_id: review.offline_continuity_consequence.v1
anchor_receipt_id: receipt.offline_continuity_consequence.v1
expected_result_class: partial
expected_eviction_priority_order:
  - artifact_cache
expected_skipped_protected_class_ids:
  - evidence_support_cache
  - user_owned_recovery_state
override_protected_class_refs: []
expected_continuity_consequence:
  consequence_class: rebuilt_requires_network
  affected_continuity_class: offline_workspace_readiness
  affected_workspace_ref: workspace.local.aureline_offline_mirror
  consequence_summary: >-
    Clearing the artifact cache will invalidate offline workspace
    readiness for the mirrored workspace until the artifact cache
    refetches from the mirror.
  mitigation_summary: >-
    The review sheet offers an export-before-delete of the offline
    entitlement bundle index so the user can confirm before losing
    offline readiness.
acceptance_assertions:
  - offline_or_certified_evidence_consequence_named_before_delete
  - protected_classes_never_evicted_without_explicit_override
  - support_export_matches_cleanup_history_receipt
  - reopen_inspector_action_present_after_destructive_cleanup
reviewer_summary: >-
  A user-requested artifact cleanup on a mirrored workspace names the
  offline-readiness consequence before deleting and offers an
  export-before-delete affordance. The user-owned offline entitlement
  bundle remains protected.
safety:
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  destructive_resets_present: false
  preserves_user_authored_files: true
  preserves_local_history: true
  preserves_evidence_grade_state: true
references:
  registry_ref: schemas/support/storage_class.schema.json
  review_schema_ref: schemas/support/clear_data_review.schema.json
  receipt_schema_ref: schemas/support/storage_cleanup_receipt.schema.json
  doc_ref: docs/qe/m3/storage_cleanup_drills.md
  matrix_ref: artifacts/support/m3/storage_class_matrix.json
  report_ref: artifacts/support/m3/storage_cleanup_drill_report.md
