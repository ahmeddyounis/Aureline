schema_version: 1
record_kind: storage_cleanup_drill_case_record
case_id: case:storage_cleanup_drill:quota_pressure_managed_explainer
title: Managed quota cap on the knowledge cache is explained, not silenced
drill_class: quota_pressure_managed_explainer
trigger_class: quota_pressure
anchor_scenario_ref: none
anchor_review_id: review.quota_pressure_managed_explainer.v1
anchor_receipt_id: receipt.quota_pressure_managed_explainer.v1
expected_result_class: partial
expected_eviction_priority_order:
  - interactive_hot_cache
  - knowledge_cache
required_low_disk_context:
  state_class: quota_pressure
  paused_work_required: true
  reopen_inspector_required: true
expected_skipped_protected_class_ids:
  - evidence_support_cache
  - user_owned_recovery_state
override_protected_class_refs: []
expected_quota_explainer:
  capped_class_id: knowledge_cache
  quota_source_class: managed_policy
  reason_class: workspace_quota_cap
  consequence_class: rebuilt_with_expensive_local_work
  consequence_summary: >-
    Knowledge cache is capped by a managed workspace policy; eviction
    will trim to the cap and queue a reindex, but no protected class
    is touched.
acceptance_assertions:
  - managed_quota_source_named_in_banner
  - prefetch_and_rebuildable_derived_state_shed_in_documented_order
  - protected_classes_never_evicted_without_explicit_override
  - reopen_inspector_action_present_after_destructive_cleanup
reviewer_summary: >-
  Quota pressure on a workspace-managed knowledge cache opens the
  banner with a named quota source. The user sees the cap, the
  consequence of trimming to it, and the protected classes that stay
  pinned; the receipt records the partial trim and a reopen route.
safety:
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  destructive_resets_present: false
  preserves_user_authored_files: true
  preserves_local_history: true
  preserves_evidence_grade_state: true
references:
  registry_ref: schemas/support/storage_class.schema.json
  review_schema_ref: schemas/support/clear_data_review.schema.json
  receipt_schema_ref: schemas/support/storage_cleanup_receipt.schema.json
  doc_ref: docs/qe/m3/storage_cleanup_drills.md
  matrix_ref: artifacts/support/m3/storage_class_matrix.json
  report_ref: artifacts/support/m3/storage_cleanup_drill_report.md
