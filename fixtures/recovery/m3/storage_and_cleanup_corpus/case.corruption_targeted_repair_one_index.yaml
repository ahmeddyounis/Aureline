schema_version: 1
record_kind: storage_cleanup_drill_case_record
case_id: case:storage_cleanup_drill:corruption_targeted_repair_one_index
title: Rebuild one corrupted knowledge index instead of clearing every cache
drill_class: corruption_targeted_repair_one_index
trigger_class: corruption_repair_request
anchor_scenario_ref: fixtures/support/m3/storage_cleanup/scenario.corruption_repair_prebuild_cache.yaml
anchor_review_id: review.corruption_targeted_repair_one_index.v1
anchor_receipt_id: receipt.corruption_targeted_repair_one_index.v1
expected_result_class: completed
expected_targeted_repair_action:
  action_class: rebuild_one_knowledge_index
  scoped_class_id: knowledge_cache
  scoped_workspace_ref: workspace.local.aureline_core
  preferred_over_action_class: clear_all_caches
  rationale: >-
    Project Doctor flagged a single corrupted knowledge index for one
    workspace; rebuilding only that index keeps the rest of the
    knowledge cache and every other class warm.
expected_skipped_protected_class_ids:
  - evidence_support_cache
  - user_owned_recovery_state
override_protected_class_refs: []
acceptance_assertions:
  - targeted_repair_preferred_over_delete_all
  - prefetch_and_rebuildable_derived_state_shed_in_documented_order
  - protected_classes_never_evicted_without_explicit_override
  - reopen_inspector_action_present_after_destructive_cleanup
reviewer_summary: >-
  A corruption-repair request rebuilds the affected knowledge index
  for one workspace; the inspector explicitly prefers the targeted
  repair over a `clear cache` umbrella and every protected class
  stays pinned.
safety:
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  destructive_resets_present: false
  preserves_user_authored_files: true
  preserves_local_history: true
  preserves_evidence_grade_state: true
