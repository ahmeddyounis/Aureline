schema_version: 1
record_kind: storage_cleanup_drill_case_record
case_id: case:storage_cleanup_drill:cleanup_history_receipt_parity
title: Cleanup-history surface, support export, and receipt agree row-for-row
drill_class: cleanup_history_receipt_parity
trigger_class: low_disk_pressure
anchor_scenario_ref: fixtures/support/m3/storage_cleanup/scenario.low_disk_ordered_eviction.yaml
anchor_review_id: review.low_disk_ordered_eviction.v1
anchor_receipt_id: receipt.low_disk_ordered_eviction.v1
expected_result_class: completed
expected_parity_targets:
  - cleanup_history_row
  - support_export_envelope_row
  - storage_cleanup_receipt_record
expected_parity_fields:
  - receipt_id
  - review_ref
  - executed_at
  - actor_lineage_class
  - trigger_class
  - result_class
  - class_outcomes
  - blocked_pin_rows
  - skipped_protected_class_rows
  - reopen_inspector_action_ref
expected_skipped_protected_class_ids:
  - evidence_support_cache
  - user_owned_recovery_state
override_protected_class_refs: []
acceptance_assertions:
  - support_export_matches_cleanup_history_receipt
  - reopen_inspector_action_present_after_destructive_cleanup
  - protected_classes_never_evicted_without_explicit_override
reviewer_summary: >-
  The cleanup-history row, the support-export envelope row, and the
  storage cleanup receipt all carry the same receipt id, actor,
  trigger, result, class outcomes, blocked pins, skipped protected
  classes, and reopen-inspector action. Any divergence between the
  three surfaces fails the drill.
safety:
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  destructive_resets_present: false
  preserves_user_authored_files: true
  preserves_local_history: true
  preserves_evidence_grade_state: true
references:
  registry_ref: schemas/support/storage_class.schema.json
  review_schema_ref: schemas/support/clear_data_review.schema.json
  receipt_schema_ref: schemas/support/storage_cleanup_receipt.schema.json
  doc_ref: docs/qe/m3/storage_cleanup_drills.md
  matrix_ref: artifacts/support/m3/storage_class_matrix.json
  report_ref: artifacts/support/m3/storage_cleanup_drill_report.md
