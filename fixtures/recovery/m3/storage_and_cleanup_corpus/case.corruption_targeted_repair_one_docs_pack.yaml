schema_version: 1
record_kind: storage_cleanup_drill_case_record
case_id: case:storage_cleanup_drill:corruption_targeted_repair_one_docs_pack
title: Refresh one docs pack instead of dropping the whole artifact cache
drill_class: corruption_targeted_repair_one_docs_pack
trigger_class: corruption_repair_request
anchor_scenario_ref: none
anchor_review_id: review.corruption_targeted_repair_one_docs_pack.v1
anchor_receipt_id: receipt.corruption_targeted_repair_one_docs_pack.v1
expected_result_class: completed
expected_targeted_repair_action:
  action_class: refresh_one_docs_pack
  scoped_class_id: artifact_cache
  scoped_workspace_ref: workspace.profile.docs_packs
  preferred_over_action_class: clear_artifact_cache_for_all_workspaces
  rationale: >-
    Only one docs pack is failing integrity checks; refetching that
    pack keeps the rest of the artifact cache hot and avoids a
    profile-wide refetch over the network.
expected_skipped_protected_class_ids:
  - evidence_support_cache
  - user_owned_recovery_state
override_protected_class_refs: []
acceptance_assertions:
  - targeted_repair_preferred_over_delete_all
  - prefetch_and_rebuildable_derived_state_shed_in_documented_order
  - protected_classes_never_evicted_without_explicit_override
  - reopen_inspector_action_present_after_destructive_cleanup
reviewer_summary: >-
  The repair lane refreshes a single failing docs pack rather than
  invalidating the whole artifact cache. The receipt records the
  scoped refetch and a reopen-inspector action; offline readiness of
  other packs remains intact.
safety:
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  destructive_resets_present: false
  preserves_user_authored_files: true
  preserves_local_history: true
  preserves_evidence_grade_state: true
references:
  registry_ref: schemas/support/storage_class.schema.json
  review_schema_ref: schemas/support/clear_data_review.schema.json
  receipt_schema_ref: schemas/support/storage_cleanup_receipt.schema.json
  doc_ref: docs/qe/m3/storage_cleanup_drills.md
  matrix_ref: artifacts/support/m3/storage_class_matrix.json
  report_ref: artifacts/support/m3/storage_cleanup_drill_report.md
