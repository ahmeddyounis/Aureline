schema_version: 1
record_kind: storage_cleanup_drill_case_record
case_id: case:storage_cleanup_drill:export_before_delete_durable_class
title: Evidence cache override requires export-before-delete to a named local target
drill_class: export_before_delete_durable_class
trigger_class: user_requested_cleanup
anchor_scenario_ref: fixtures/support/m3/storage_cleanup/scenario.evidence_export_before_delete.yaml
anchor_review_id: review.evidence_export_before_delete.v1
anchor_receipt_id: receipt.evidence_export_before_delete.v1
expected_result_class: partial
expected_skipped_protected_class_ids:
  - user_owned_recovery_state
override_protected_class_refs:
  - class_id: evidence_support_cache
    expected_export_before_delete_class: required_before_delete
    expected_export_target_ref: target.support_export.local_bundle
    expected_consequence_class: lost_with_no_rebuild_path
expected_blocked_pin_rows:
  - pin_ref: pin.evidence.active_incident_workspace
    pin_source_class: evidence_hold
    class_id: evidence_support_cache
acceptance_assertions:
  - protected_classes_never_evicted_without_explicit_override
  - offline_or_certified_evidence_consequence_named_before_delete
  - reopen_inspector_action_present_after_destructive_cleanup
  - support_export_matches_cleanup_history_receipt
reviewer_summary: >-
  An admin override of the evidence and support cache cannot run
  without a named local export target. The review sheet records the
  required export-before-delete class, the active incident-pin that
  blocks one row, and the consequence; user-owned recovery state
  remains untouched.
safety:
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  destructive_resets_present: false
  preserves_user_authored_files: true
  preserves_local_history: true
  preserves_evidence_grade_state: false
references:
  registry_ref: schemas/support/storage_class.schema.json
  review_schema_ref: schemas/support/clear_data_review.schema.json
  receipt_schema_ref: schemas/support/storage_cleanup_receipt.schema.json
  doc_ref: docs/qe/m3/storage_cleanup_drills.md
  matrix_ref: artifacts/support/m3/storage_class_matrix.json
  report_ref: artifacts/support/m3/storage_cleanup_drill_report.md
