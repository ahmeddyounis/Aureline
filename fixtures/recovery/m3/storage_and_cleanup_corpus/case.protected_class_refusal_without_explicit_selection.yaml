reviewer_summary: >-
  A request that asks to clear caches without naming classes — and
  would otherwise touch the evidence cache or user-owned recovery
  state — is refused with a `blocked_by_protected_class` consent
  state. No receipt is emitted; no bytes are deleted; the inspector
  routes the user back to a class-selective review sheet.
