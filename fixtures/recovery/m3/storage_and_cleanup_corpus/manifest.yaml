# Storage-cleanup drill corpus manifest.
#
# Drill cases that exercise the M3 storage-truth and cleanup-safety
# contract on top of the storage-class registry, class-selective
# clear-data review sheets, and storage cleanup receipts shipped by the
# storage inspector. Every drill is a closed-vocabulary
# `storage_cleanup_drill_case_record` that binds a triggering trigger
# class, the storage scenario fixture it replays, and the assertions a
# reviewer must see honored after cleanup runs.
#
# This manifest never widens the registry or the receipt schema: it
# only pins the drills the lane MUST keep passing on the claimed
# trigger classes.

schema_version: 1
manifest_id: recovery.m3.storage_and_cleanup_corpus.v1
status: protected
overview_page: docs/qe/m3/storage_cleanup_drills.md
report_ref: artifacts/support/m3/storage_cleanup_drill_report.md
matrix_ref: artifacts/support/m3/storage_class_matrix.json

# Boundary schemas the drills quote verbatim.
registry_schema_ref: schemas/support/storage_class.schema.json
review_schema_ref: schemas/support/clear_data_review.schema.json
receipt_schema_ref: schemas/support/storage_cleanup_receipt.schema.json

# Source contract refs the drills must keep aligned with.
source_contract_refs:
  registry_fixture: fixtures/support/m3/storage_cleanup/registry.yaml
  storage_cleanup_corpus_manifest: fixtures/support/m3/storage_cleanup/manifest.yaml
  storage_cleanup_beta_doc: docs/support/m3/storage_cleanup_beta.md
  storage_inspector_module: crates/aureline-support/src/storage_inspector/mod.rs

# Closed drill-class vocabulary. Adding a new drill class requires
# extending this list, registering a new case file, and updating the
# coverage matrix at `artifacts/support/m3/storage_class_matrix.json`.
required_drill_classes:
  - low_disk_ordered_eviction
  - quota_pressure_managed_explainer
  - prefetch_pause_under_pressure
  - pinned_artifact_protection
  - export_before_delete_durable_class
  - corruption_targeted_repair_one_index
  - corruption_targeted_repair_one_docs_pack
  - corruption_targeted_repair_one_preview_runtime
  - offline_continuity_consequence
  - certified_workspace_evidence_consequence
  - cleanup_history_receipt_parity
  - protected_class_refusal_without_explicit_selection

# Trigger classes the corpus must exercise at least once. Mirrors the
# closed enum in `clear_data_review.schema.json` and
# `storage_cleanup_receipt.schema.json`.
required_trigger_classes:
  - user_requested_cleanup
  - low_disk_pressure
  - quota_pressure
  - corruption_repair_request

# Closed acceptance-assertion vocabulary. Every drill case lists at
# least one assertion from this list.
required_acceptance_assertions:
  - protected_classes_never_evicted_without_explicit_override
  - editing_save_and_local_history_preserved_under_pressure
  - prefetch_and_rebuildable_derived_state_shed_in_documented_order
  - support_export_matches_cleanup_history_receipt
  - reopen_inspector_action_present_after_destructive_cleanup
  - targeted_repair_preferred_over_delete_all
  - offline_or_certified_evidence_consequence_named_before_delete
  - managed_quota_source_named_in_banner
  - clear_all_without_class_selection_is_refused

case_files:
  - case.low_disk_ordered_eviction.yaml
  - case.quota_pressure_managed_explainer.yaml
  - case.prefetch_pause_under_pressure.yaml
  - case.pinned_artifact_protection.yaml
  - case.export_before_delete_durable_class.yaml
  - case.corruption_targeted_repair_one_index.yaml
  - case.corruption_targeted_repair_one_docs_pack.yaml
  - case.corruption_targeted_repair_one_preview_runtime.yaml
  - case.offline_continuity_consequence.yaml
  - case.certified_workspace_evidence_consequence.yaml
  - case.cleanup_history_receipt_parity.yaml
  - case.protected_class_refusal_without_explicit_selection.yaml

required_case_assertions:
  - every_required_drill_class_has_at_least_one_case_file
  - every_case_pins_at_least_one_required_acceptance_assertion
  - every_case_quotes_a_trigger_class_from_the_closed_enum
  - destructive_cleanup_cases_emit_reopen_inspector_action_ref
  - protected_classes_named_in_skipped_protected_class_rows_or_in_an_override_row
  - raw_private_material_excluded_and_ambient_authority_excluded
