schema_version: 1
record_kind: storage_cleanup_drill_case_record
case_id: case:storage_cleanup_drill:pinned_artifact_protection
title: Pinned review artifact and rollback checkpoint block partial cleanup
drill_class: pinned_artifact_protection
trigger_class: user_requested_cleanup
anchor_scenario_ref: fixtures/support/m3/storage_cleanup/scenario.pinned_artifact_blocks_cleanup.yaml
anchor_review_id: review.pinned_artifact_blocks_cleanup.v1
anchor_receipt_id: receipt.pinned_artifact_blocks_cleanup.v1
expected_result_class: partial
expected_blocked_pin_rows:
  - pin_ref: pin.review_artifact.workspace_release_candidate
    pin_source_class: user_pin
    class_id: artifact_cache
  - pin_ref: pin.rollback_checkpoint.workspace_release_candidate
    pin_source_class: rollback_checkpoint_pin
    class_id: user_owned_recovery_state
expected_skipped_protected_class_ids:
  - evidence_support_cache
  - user_owned_recovery_state
override_protected_class_refs: []
acceptance_assertions:
  - protected_classes_never_evicted_without_explicit_override
  - support_export_matches_cleanup_history_receipt
  - reopen_inspector_action_present_after_destructive_cleanup
reviewer_summary: >-
  A user-requested cleanup of the artifact cache is partial because a
  pinned review artifact and a rollback-checkpoint pin block deletion.
  The receipt records both blocked pins, the partial bytes reclaimed,
  and a reopen-inspector action so the cleanup-history surface can
  route back.
safety:
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  destructive_resets_present: false
  preserves_user_authored_files: true
  preserves_local_history: true
  preserves_evidence_grade_state: true
references:
  registry_ref: schemas/support/storage_class.schema.json
  review_schema_ref: schemas/support/clear_data_review.schema.json
  receipt_schema_ref: schemas/support/storage_cleanup_receipt.schema.json
  doc_ref: docs/qe/m3/storage_cleanup_drills.md
  matrix_ref: artifacts/support/m3/storage_class_matrix.json
  report_ref: artifacts/support/m3/storage_cleanup_drill_report.md
