# Extension-bisect beta protected fixture manifest.

schema_version: 1
manifest_id: support.extension_bisect.beta_cases.v1
status: protected
overview_page: docs/support/m3/extension_bisect_beta.md
crate_consumer: crates/aureline-support/src/extension_bisect/mod.rs
schema_ref: schemas/support/extension_bisect.schema.json

scenarios:
  - scenario_id: post_crash_loop_single_suspect
    session_file: post_crash_loop_single_suspect_session.yaml
    step_files:
      - post_crash_loop_single_suspect_step_baseline.yaml
      - post_crash_loop_single_suspect_step_cohort_a.yaml
      - post_crash_loop_single_suspect_step_cohort_b.yaml
      - post_crash_loop_single_suspect_step_exit.yaml
    finding_file: post_crash_loop_single_suspect_finding.yaml
    restore_file: post_crash_loop_single_suspect_restore.yaml

  - scenario_id: regression_suspected_narrow_set
    session_file: regression_suspected_narrow_set_session.yaml
    step_files:
      - regression_suspected_narrow_set_step_baseline.yaml
      - regression_suspected_narrow_set_step_cohort_a.yaml
      - regression_suspected_narrow_set_step_exit.yaml
    finding_file: regression_suspected_narrow_set_finding.yaml
    restore_file: regression_suspected_narrow_set_restore.yaml

  - scenario_id: policy_forced_aborted
    session_file: policy_forced_aborted_session.yaml
    step_files:
      - policy_forced_aborted_step_baseline.yaml
      - policy_forced_aborted_step_aborted.yaml
    finding_file: policy_forced_aborted_finding.yaml
    restore_file: policy_forced_aborted_restore.yaml

required_case_assertions:
  - bisect_sessions_preserve_tested_states_suspected_sets_and_user_visible_findings
  - bisect_disables_only_minimal_scope_and_restores_prior_state_afterward
  - support_packet_excludes_raw_private_content_and_ambient_authority

source_contract_refs:
  recovery_rung_matrix: docs/recovery/recovery_rung_matrix.md
  recovery_action_schema: schemas/support/recovery_action.schema.json
  extension_bisect_schema: schemas/support/extension_bisect.schema.json
  extension_bisect_beta_doc: docs/support/m3/extension_bisect_beta.md
