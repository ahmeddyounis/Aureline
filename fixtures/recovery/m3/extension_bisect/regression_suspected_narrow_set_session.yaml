schema_version: 1
record_kind: extension_bisect_session_record
session_id: extension_bisect_session:regression_suspected:beta_native
session_class: regression_suspected_session
entry_reason_class: extension_regression_suspected
captured_at: "2026-05-15T11:00:00Z"
doctor_finding_ref: doctor.finding.extension_regression_suspected
support_packet_ref: support:extension-bisect-beta:regression-suspected
blast_radius_class: cohort_only
review_gate_class: user_confirmation_required
candidate_extensions:
  - extension_id: extension:vendor.debugger-bridge
    extension_class: third_party_marketplace
    prior_state_class: enabled
    display_label: Debugger bridge extension
  - extension_id: extension:vendor.profiler
    extension_class: third_party_marketplace
    prior_state_class: enabled
    display_label: Profiler extension
  - extension_id: extension:vendor.legacy-codelens
    extension_class: third_party_offline_bundle
    prior_state_class: disabled
    display_label: Legacy code-lens offline bundle
disabled_capability_classes:
  - extension_auto_activation
  - extension_host_launch
  - ai_runtime_access
preserved_capability_classes:
  - local_editing
  - basic_navigation
  - local_search
  - local_diagnostics_export
  - support_bundle_preview
  - project_doctor_surfaces
  - extension_bisect_exit_action
preserved_state_classes:
  - user_authored_files
  - open_buffer_selection
  - durable_workspace_indexes
  - workspace_trust_store
  - credential_store
  - session_restore_store
  - support_export_store
  - extension_prior_state_snapshot
tested_states:
  - tested_state_id: tested_state:regression:baseline
    cohort_id: cohort:baseline
    cohort_member_refs: []
    activation_result_class: no_failure_observed
    reviewer_summary: Baseline launch with no third-party cohort active is clean.
  - tested_state_id: tested_state:regression:cohort_a
    cohort_id: cohort:a
    cohort_member_refs:
      - extension:vendor.debugger-bridge
      - extension:vendor.profiler
    activation_result_class: inconclusive_evidence
    reviewer_summary: Cohort A activation surfaces intermittent diagnostics that cannot be cleanly attributed within the bisect window.
suspected_extension_sets:
  - suspect_set_id: suspect_set:regression:narrow
    confidence_class: narrow_set_suspected
    member_extension_refs:
      - extension:vendor.debugger-bridge
      - extension:vendor.profiler
    narrowing_summary: Two extensions in cohort A remain suspected; bisect concludes without isolating a single suspect.
findings:
  - finding_id: finding:regression:multi_extension_suspected
    finding_class: multi_extension_suspected
    user_visible_summary: Two extensions remain suspected; safe mode is recommended pending further evidence.
restore_plan:
  prior_state_snapshot_ref: snapshot:extension-state:regression_suspected:beta_native
  restore_action:
    action_id: action:extension-bisect.exit-restore-exact
    requires_review: true
    summary: Exit the bisect and restore the prior extension state bit-for-bit.
  restore_conditions:
    - User confirms the multi-suspect finding before further escalation.
    - Prior extension state snapshot still references the same workspace.
evidence:
  - evidence_ref: doctor.finding.extension_regression_suspected
    evidence_kind: project_doctor_finding
    summary: Project Doctor surfaced a regression suspicion for the diagnostic extensions cohort.
  - evidence_ref: evidence:extension-bisect:regression-window
    evidence_kind: regression_window
    summary: Regression window observed across two successive launches before the bisect was admitted.
destructive_resets_present: false
user_owned_state_deleted: false
durable_state_deleted: false
