# Local-history timeline alpha corpus manifest.
# Rows cover compare, restore, and export actions with the shared
# exact / compatible / layout-only / evidence-only fidelity labels.

schema_version: 1
manifest_id: recovery.local_history_timeline.alpha_cases.v1
status: protected
overview_page: docs/state/m3/local_history_timeline_alpha.md
crate_consumer: crates/aureline-history/src/local_history/timeline.rs
support_consumer: crates/aureline-support/src/local_history_timeline.rs
schema_ref: schemas/state/local_history_timeline_alpha.schema.json
report_ref: artifacts/support/m3/local_history_timeline_alpha_report.md

required_fidelity_labels:
  - exact
  - compatible
  - layout_only
  - evidence_only

required_action_classes:
  - compare
  - restore
  - export

case_files:
  - exact_snapshot_restore.yaml
  - compatible_schema_compare.yaml
  - layout_only_placeholder.yaml
  - evidence_only_export.yaml

required_case_assertions:
  - every_required_fidelity_label_has_at_least_one_case
  - every_row_exposes_compare_restore_and_export_actions
  - every_visible_action_carries_the_same_fidelity_label_as_the_row
  - restore_actions_that_write_create_a_new_checkpoint_ref
  - evidence_only_rows_disable_restore_and_keep_export_available
  - evidence_only_rows_do_not_claim_live_session_or_privileged_run_resumption
  - support_export_uses_the_same_fidelity_and_action_vocabulary
  - report_record_excludes_raw_payload_raw_private_material_and_live_authority

source_contract_refs:
  schema: schemas/state/local_history_timeline_alpha.schema.json
  reviewer_doc: docs/state/m3/local_history_timeline_alpha.md
  baseline_report: artifacts/support/m3/local_history_timeline_alpha_report.md
