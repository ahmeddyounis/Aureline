# Repair-transaction preview-skeleton beta protected fixture manifest.

schema_version: 1
manifest_id: support.repair_transaction_preview.beta_cases.v1
status: protected
overview_page: docs/support/m3/repair_transaction_beta.md
crate_consumer: crates/aureline-support/src/repair_transactions/mod.rs
schema_ref: schemas/support/repair_transaction_preview_skeleton.schema.json

scenarios:
  - scenario_id: cache_index_rebuild_single_object
    skeleton_file: cache_index_rebuild_skeleton.yaml
    comparison_files:
      - cache_index_rebuild_comparison_baseline_drift.yaml

  - scenario_id: extension_quarantine_compensating
    skeleton_file: extension_quarantine_skeleton.yaml
    comparison_files:
      - extension_quarantine_comparison_blast_radius.yaml

  - scenario_id: remote_agent_rollback_manual
    skeleton_file: remote_agent_rollback_skeleton.yaml
    comparison_files:
      - remote_agent_rollback_comparison_compensation.yaml

  - scenario_id: escalation_only_no_local_blast
    skeleton_file: escalation_only_skeleton.yaml
    comparison_files:
      - escalation_only_comparison_disposition.yaml

required_case_assertions:
  - skeleton_preserves_transaction_id_and_reversal_class_verbatim
  - skeleton_declares_blast_radius_compensation_checkpoint_and_affected_objects
  - comparison_rows_cancellable_before_any_apply_path_runs
  - support_packet_excludes_raw_private_content_and_ambient_authority

source_contract_refs:
  alpha_repair_module: crates/aureline-support/src/repair/mod.rs
  alpha_repair_schema: schemas/support/repair_transaction.schema.json
  preview_skeleton_schema: schemas/support/repair_transaction_preview_skeleton.schema.json
  repair_transaction_contract: docs/support/repair_transaction_contract.md
  beta_doc: docs/support/m3/repair_transaction_beta.md
