# Crash-loop and restore-fidelity corpus manifest.
#
# This manifest is the protected entry point for the evidence-first corpus that
# keeps repeated-startup recovery and restore honesty from regressing. Each
# drill fixture mirrors the boundary shape declared by
# `crates/aureline-support/src/crash_loop_and_restore_fidelity/mod.rs` and is
# replayed through the real crash-loop recovery center and restore hydrator by
# `crates/aureline-support/tests/crash_loop_and_restore_fidelity_drill.rs`. The
# reviewer-facing projections are the report at
# `artifacts/support/m3/crash_loop_and_restore_fidelity_report.md` and the
# recovery-choice matrix at `artifacts/support/m3/recovery_choice_matrix.json`.

schema_version: 1
manifest_id: support.crash_loop_and_restore_fidelity.v1
status: protected
overview_page: docs/support/m3/crash_loop_and_restore_corpus.md
crate_consumer: crates/aureline-support/src/crash_loop_and_restore_fidelity/mod.rs
drill_harness_test: crates/aureline-support/tests/crash_loop_and_restore_fidelity_drill.rs
report_ref: artifacts/support/m3/crash_loop_and_restore_fidelity_report.md
recovery_choice_matrix_ref: artifacts/support/m3/recovery_choice_matrix.json

# Drill-spec fixtures (one per required condition). Each declares the input
# fixture the harness replays through the owning evaluator.
drill_files:
  - extension_host_crash_loop.yaml
  - bad_layout_restore.yaml
  - missing_extension_panes.yaml
  - unavailable_remote_sessions.yaml
  - offscreen_window_remap.yaml
  - checkpoint_only_recovery.yaml
  - no_silent_rerun_protected_lanes.yaml

# Restore-hydration input fixtures authored for this corpus.
restore_input_fixtures:
  - degraded_restore_request.json
  - offscreen_remap_request.json
  - protected_lane_no_rerun_request.json

# Crash-loop signal input fixtures reused from the crash-loop center corpus.
reused_crash_loop_inputs:
  - fixtures/recovery/m3/crash_loop_center/startup_extension_suspect.yaml
  - fixtures/recovery/m3/crash_loop_center/restore_replay_unsafe.yaml

required_condition_classes:
  - extension_host_crash_loop
  - bad_layout_restore
  - missing_extension_panes
  - unavailable_remote_sessions
  - offscreen_window_remap
  - checkpoint_only_recovery
  - no_silent_rerun_protected_lanes

required_case_assertions:
  - every_required_condition_has_a_drill_and_a_current_evidence_packet
  - crash_loop_signals_route_into_a_bounded_visible_recovery_center
  - missing_dependency_and_unavailable_runtime_surfaces_reopen_as_truthful_placeholders
  - protected_session_lanes_never_replay_silently_during_restore_or_crash_recovery
  - the_matrix_shows_exact_compatible_layout_only_and_evidence_only_outcomes
  - recovery_cards_are_keyboard_complete_screen_reader_labeled_and_reduced_motion_safe

source_contract_refs:
  crash_loop_recovery_schema: schemas/support/crash_loop_recovery.schema.json
  crash_loop_recovery_beta_doc: docs/support/m3/crash_loop_recovery_beta.md
  restore_hydrator_beta_doc: docs/workspace/m3/restore_hydrator_beta.md
  window_topology_snapshot_schema: schemas/workspace/window_topology_snapshot.schema.json
  pane_tree_schema: schemas/workspace/pane_tree.schema.json
  recovery_ladder_alpha_doc: docs/support/recovery_ladder_alpha.md
