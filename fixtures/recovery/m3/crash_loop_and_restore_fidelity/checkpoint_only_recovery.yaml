# Crash-loop / restore-fidelity drill: checkpoint-only recovery.
#
# Replays a real crash-loop signal where restore replay failed repeatedly and
# is unsafe to retry. The recovery center must fall back to an evidence-only
# restore class and keep the recovered draft, the rollbackable checkpoint, and
# the local-history timeline as distinct, inspectable entry points rather than
# silently replaying the blocked session.

