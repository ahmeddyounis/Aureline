# Crash-loop / restore-fidelity drill: no silent rerun across protected lanes.
#
# Replays a window full of privileged live lanes — terminal, task/test runner,
# preview runtime, notebook kernel, collaboration/pipeline authority, debug
# session, and a remote-attach shell whose authority is gone. The hydrator must
# reopen every lane inert with evidence retained, record explicit no-rerun
# guardrails on each live outcome, never re-run a command or kernel, and never
# reacquire authority silently — folding the window to an evidence-only restore.

