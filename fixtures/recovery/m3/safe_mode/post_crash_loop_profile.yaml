schema_version: 1
record_kind: safe_mode_profile_record
profile_id: safe_mode_profile:post_crash_loop:alpha_web
profile_class: post_crash_loop_profile
captured_at: "2026-05-15T08:00:00Z"
doctor_finding_ref: doctor.finding.restore_continuity.replay_blocked
support_packet_ref: support:safe-mode-beta:post-crash-loop
declared_hosts:
  - host_id: safe_mode_host:extension_host:default
    host_class: extension_host
    disposition_class: disabled
    reason_class: startup_crash_loop_detected
    narrowing_summary: Extension host launch is disabled while the startup crash-loop is reviewed.
  - host_id: safe_mode_host:ai_runtime_host:default
    host_class: ai_runtime_host
    disposition_class: disabled
    reason_class: startup_crash_loop_detected
    narrowing_summary: AI runtime host launch is disabled to bound side effects during recovery.
  - host_id: safe_mode_host:remote_helper_host:default
    host_class: remote_helper_host
    disposition_class: disabled
    reason_class: startup_crash_loop_detected
    narrowing_summary: Remote helper auto-attach is disabled until the crash-loop finding is reviewed.
  - host_id: safe_mode_host:background_indexer_host:default
    host_class: background_indexer_host
    disposition_class: narrowed_to_local_only
    reason_class: startup_crash_loop_detected
    narrowing_summary: Background indexer is reduced to local-only reads; rebuilds are deferred until recovery completes.
declared_services:
  - service_id: safe_mode_service:extension_auto_activation
    service_class: extension_auto_activation
    disposition_class: disabled
    reason_class: startup_crash_loop_detected
    narrowing_summary: Third-party extension auto-activation is disabled while safe mode is active.
  - service_id: safe_mode_service:session_restore_auto_replay
    service_class: session_restore_auto_replay
    disposition_class: disabled
    reason_class: unsafe_replay_detected
    narrowing_summary: Restore replay is disabled because Project Doctor flagged continuity as unsafe to replay.
  - service_id: safe_mode_service:background_rebuild
    service_class: background_rebuild
    disposition_class: disabled
    reason_class: startup_crash_loop_detected
    narrowing_summary: Heavy background rebuild work is disabled until the recovery rung clears.
  - service_id: safe_mode_service:telemetry_upload
    service_class: telemetry_upload
    disposition_class: narrowed_to_local_only
    reason_class: startup_crash_loop_detected
    narrowing_summary: Telemetry upload is reduced to local-only buffering while the user reviews the finding.
  - service_id: safe_mode_service:remote_auto_reattach
    service_class: remote_auto_reattach
    disposition_class: disabled
    reason_class: startup_crash_loop_detected
    narrowing_summary: Remote auto-reattach is disabled to avoid resuming a crashing host environment.
declared_surfaces:
  - surface_id: safe_mode_surface:extension_marketplace_panel
    surface_class: extension_marketplace_panel
    disposition_class: narrowed_to_reviewer_view
    reason_class: startup_crash_loop_detected
    narrowing_summary: Extension marketplace panel is reviewer-only; install actions are gated behind safe-mode exit.
  - surface_id: safe_mode_surface:ai_assistant_panel
    surface_class: ai_assistant_panel
    disposition_class: disabled
    reason_class: startup_crash_loop_detected
    narrowing_summary: AI assistant panel is disabled while the AI runtime host is offline.
preserved_capabilities:
  - local_editing
  - basic_navigation
  - local_search
  - local_git_operations
  - local_diagnostics_export
  - support_bundle_preview
  - project_doctor_surfaces
  - safe_mode_exit_action
preserved_state_classes:
  - user_authored_files
  - open_buffer_selection
  - durable_workspace_indexes
  - workspace_trust_store
  - credential_store
  - session_restore_store
  - support_export_store
destructive_resets_present: false
return_path:
  fuller_mode_class: full_mode
  return_action:
    action_id: action:safe-mode.exit-after-review
    requires_review: true
    summary: Exit safe mode after the crash-loop finding is reviewed and normal launch is explicitly chosen.
  restore_conditions:
    - Crash-loop strike window has been reviewed by the user.
    - Project Doctor finding has been acknowledged or escalated.
    - User explicitly chooses normal launch from the recovery surface.
evidence:
  - evidence_ref: doctor.finding.restore_continuity.replay_blocked
    evidence_kind: project_doctor_finding
    summary: Project Doctor classified restore continuity as unsafe to replay during startup.
  - evidence_ref: evidence:safe-mode:startup-strikes
    evidence_kind: restart_budget
    summary: Startup attempts exceeded the configured restart budget; raw stacks and paths are excluded.
