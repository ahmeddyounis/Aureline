reviewer_summary: >-
  Windows expresses bind-mount-equivalent overlays through NTFS junctions
  and reparse points; the alias inspector still records the overlay step
  but the row downgrades to degraded_to_safe_path_only because the junction
  alias_kind is reported via the existing junction primitive rather than
  the bind_mount_alias primitive used on Linux. Silent overwrite is still
  forbidden and the save target review records review_required_before_save.
