reviewer_summary: >-
  Default Linux ext4 is case-sensitive; the case-only drift alias only
  reproduces on a casefold-enabled mount or on an insensitive-preserving
  fuse layer. The suite runs the row against a case-folded scratch root
  and downgrades to yellow_partial_coverage on stock ext4 because the
  inspector reports divergent_unknown_alias instead of the
  case_only_variant chain.
