  macOS does not expose POSIX bind mounts; the equivalent overlay path
  flows through nullfs / firmlinks / DiskArbitration-managed nodes and
  the alias inspector records the source root differently. The save
  target review still records review_required_before_save and the
  conflict surface still forbids silent overwrite, but the row
  downgrades to degraded_to_safe_path_only while platform parity ships.
