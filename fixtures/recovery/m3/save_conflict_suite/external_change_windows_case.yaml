reviewer_summary: >-
  On a Windows desktop, NTFS does not normalize Unicode codepoints the way
  APFS does; concurrent external writes are still detected via the Windows
  object-id / FILE_ID_INFO token, but the NFD/NFC alias step is platform-
  specific. The conflict surface still forbids silent overwrite; the row
  downgrades to yellow_platform_skew because the alias normalization path
  is observed differently on this platform.
