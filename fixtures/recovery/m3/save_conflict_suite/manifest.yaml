# Difficult filesystem, external-change, and save-conflict regression-suite
# manifest. The suite covers external_change, save_conflict, permission_loss,
# alias_drift, and difficult_save_path scenarios on the three claimed
# desktop platform rows (linux_desktop, macos_desktop, windows_desktop)
# and binds each (scenario_class, platform_row_class) tuple to the
# already-claimed filesystem_identity_beta anchor fixture that proves the
# underlying identity contract.

schema_version: 1
manifest_id: recovery.save_conflict_suite.beta_cases.v1
status: protected
overview_page: docs/state/m3/save_conflict_beta_matrix.md
crate_consumer: crates/aureline-vfs/src/save_conflict_suite/mod.rs
schema_ref: schemas/recovery/save_conflict_suite_beta.schema.json
report_ref: artifacts/support/m3/save_conflict_report.md

required_scenario_classes:
  - external_change
  - save_conflict
  - permission_loss
  - alias_drift
  - difficult_save_path

required_platform_row_classes:
  - linux_desktop
  - macos_desktop
  - windows_desktop

case_files:
  - external_change_linux_case.yaml
  - external_change_macos_case.yaml
  - external_change_windows_case.yaml
  - save_conflict_linux_case.yaml
  - save_conflict_macos_case.yaml
  - save_conflict_windows_case.yaml
  - permission_loss_linux_case.yaml
  - permission_loss_macos_case.yaml
  - permission_loss_windows_case.yaml
  - alias_drift_linux_case.yaml
  - alias_drift_macos_case.yaml
  - alias_drift_windows_case.yaml
  - difficult_save_path_linux_case.yaml
  - difficult_save_path_macos_case.yaml
  - difficult_save_path_windows_case.yaml

required_case_assertions:
  - every_required_scenario_class_has_a_row_per_required_platform
  - every_anchor_fixture_ref_resolves_to_a_filesystem_identity_beta_case
  - downgrade_label_is_drawn_from_the_closed_suite_vocabulary
  - open_gaps_are_drawn_from_the_closed_open_gap_class_vocabulary
  - report_record_excludes_raw_private_material_and_ambient_authority

source_contract_refs:
  filesystem_identity_beta_doc: docs/state/m3/filesystem_identity_beta.md
  filesystem_identity_beta_schema: schemas/state/filesystem_identity_beta.schema.json
  filesystem_identity_beta_manifest: fixtures/recovery/m3/filesystem_identity/manifest.yaml
  matrix_doc: docs/state/m3/save_conflict_beta_matrix.md
  baseline_report: artifacts/support/m3/save_conflict_report.md
  schema: schemas/recovery/save_conflict_suite_beta.schema.json
  recovery_ladder_alpha: docs/support/recovery_ladder_alpha.md
