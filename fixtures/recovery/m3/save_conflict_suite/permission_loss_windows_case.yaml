reviewer_summary: >-
  Windows NTFS ACL changes between open and save raise read_only and
  policy_constrained blockers; the save target review refuses the write
  and the conflict surface offers save_as and cancel. The downgrade label
  is yellow_platform_skew because Windows policy_constrained semantics
  (deny ACE / mandatory integrity label) are reported through a different
  primitive than POSIX bits, and the row is degraded_to_safe_path_only
  while platform parity ships.
