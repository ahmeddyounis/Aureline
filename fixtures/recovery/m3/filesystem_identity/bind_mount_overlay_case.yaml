schema_version: 1
record_kind: filesystem_identity_beta_case_record
case_id: case:filesystem_identity_beta:bind_mount_overlay
title: Bind-mount overlay presentation surfaces a divergent unknown alias and refuses silent overwrite
difficulty_class: bind_mount_overlay
root_class: container_mount
trust_state: restricted
captured_at: "2026-05-16T08:15:00Z"
reviewer_summary: >-
  A container bind-mount overlay exposes file:///mnt/overlay/main.rs as the
  presentation path while the canonical mount points at
  file:///work/project/main.rs. The alias inspector records the overlay step
  but the workspace is restricted; the save-target review records
  untrusted_workspace and the conflict-resolution surface offers open_alias_details
  and save_as before any write can land. The support packet preserves the
  same filesystem_identity_ref used by save and conflict-resolution.
alias_inspection:
  presentation_uri: file:///mnt/overlay/main.rs
  canonical_uri: file:///work/project/main.rs
  logical_uri: aureline-ws://ws-fsidbeta/root-overlay/main.rs
  display_label: main.rs
  root_badge: container
  entries:
    - alias_uri: file:///mnt/overlay/main.rs
      alias_kind: bind_mount_alias
      resolution_chain:
        - opened file:///mnt/overlay/main.rs
        - bind-mounted from container overlay
        - canonical file:///work/project/main.rs
      is_canonical: false
      is_presentation: true
    - alias_uri: file:///work/project/main.rs
      alias_kind: bind_mount_alias
      resolution_chain:
        - canonical entry for file:///work/project/main.rs
      is_canonical: true
      is_presentation: false
  distinct_alias_kinds:
    - bind_mount_alias
  presentation_alias_missing: false
save_target_review:
  writes_to_canonical_uri: file:///work/project/main.rs
  path_truth_class: via_bind_mount_alias
  opens_via_alias_kind: bind_mount_alias
  atomic_write_mode: atomic_replace
  save_token_kind: device_inode_generation
  save_token_value: dev:91/ino:540/gen:2
  save_redirects_target: true
  review_required_before_save: true
  review_required_before_rename: false
  blockers:
    - review_required_before_save
    - untrusted_workspace
conflict_resolution:
  compare_outcome: external_change_detected
  review_required: true
  silent_overwrite_forbidden: true
  resolution_actions:
    - open_alias_details
    - compare
    - save_as
    - cancel
support_export_alignment:
  filesystem_identity_ref: fsid:ws-fsidbeta:root-overlay:bind_mount_overlay
  editor_file_identity_ref: fsid:ws-fsidbeta:root-overlay:bind_mount_overlay
  git_file_identity_ref: fsid:ws-fsidbeta:root-overlay:bind_mount_overlay
  restore_file_identity_ref: fsid:ws-fsidbeta:root-overlay:bind_mount_overlay
  mutation_file_identity_ref: fsid:ws-fsidbeta:root-overlay:bind_mount_overlay
  support_export_file_identity_ref: fsid:ws-fsidbeta:root-overlay:bind_mount_overlay
  all_refs_agree: true
safety:
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  destructive_resets_present: false
  preserves_user_authored_files: true
