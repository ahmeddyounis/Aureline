schema_version: 1
record_kind: filesystem_identity_beta_case_record
case_id: case:filesystem_identity_beta:symlink_alias
title: Opening through a symlink alias preserves canonical save target and identity refs
difficulty_class: symlink_alias
root_class: local_posix_like
trust_state: trusted
captured_at: "2026-05-16T08:00:00Z"
reviewer_summary: >-
  Opening file:///ws/link follows the symlink to file:///ws/doc; save lands at
  the canonical object and the alias chain is visible in the inspector. Editor,
  git, restore, mutation, and support-export refs all resolve to the same
  filesystem_identity_ref.
alias_inspection:
  presentation_uri: file:///ws/link
  canonical_uri: file:///ws/doc
  logical_uri: aureline-ws://ws-fsidbeta/root-fsidbeta/doc
  display_label: doc.md
  root_badge: local
  entries:
    - alias_uri: file:///ws/link
      alias_kind: symlink
      resolution_chain:
        - opened file:///ws/link
        - symlink -> file:///ws/doc
        - canonical file:///ws/doc
      is_canonical: false
      is_presentation: true
    - alias_uri: file:///ws/doc
      alias_kind: symlink
      resolution_chain:
        - canonical entry for file:///ws/doc
      is_canonical: true
      is_presentation: false
  distinct_alias_kinds:
    - symlink
  presentation_alias_missing: false
save_target_review:
  writes_to_canonical_uri: file:///ws/doc
  path_truth_class: via_symlink
  opens_via_alias_kind: symlink
  atomic_write_mode: atomic_replace
  save_token_kind: device_inode_generation
  save_token_value: dev:7/ino:300/gen:11
  save_redirects_target: true
  review_required_before_save: false
  review_required_before_rename: false
  blockers: []
conflict_resolution:
  compare_outcome: unchanged
  review_required: false
  silent_overwrite_forbidden: false
  resolution_actions:
    - write
support_export_alignment:
  filesystem_identity_ref: fsid:ws-fsidbeta:root-fsidbeta:symlink_alias
  editor_file_identity_ref: fsid:ws-fsidbeta:root-fsidbeta:symlink_alias
  git_file_identity_ref: fsid:ws-fsidbeta:root-fsidbeta:symlink_alias
  restore_file_identity_ref: fsid:ws-fsidbeta:root-fsidbeta:symlink_alias
  mutation_file_identity_ref: fsid:ws-fsidbeta:root-fsidbeta:symlink_alias
  support_export_file_identity_ref: fsid:ws-fsidbeta:root-fsidbeta:symlink_alias
  all_refs_agree: true
safety:
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  destructive_resets_present: false
  preserves_user_authored_files: true
references:
  adr_ref: docs/adr/0006-vfs-save-cache-identity.md
  vocabulary_doc_ref: docs/filesystem/filesystem_identity_vocabulary.md
  beta_doc_ref: docs/state/m3/filesystem_identity_beta.md
