# yaml-language-server: $schema=../../../schemas/recovery/restored_collab_state.schema.json
__fixture__:
  name: presenter_broadcast_restored_as_local_context
  scenario: >
    The prior session was a presenter broadcast on runbook.md with
    one co-presenter and three observers. The crash boundary closed
    the presenter broadcast channel; the restart restores the
    presenter role badge, the focus-broadcast posture, and the
    follow-target chip as visible local context only. No live
    broadcast resumes; no shared-control authority is implied. A
    fresh broadcast requires the owner to mint a new presenter
    grant.
  doc_sections:
    - "§1 Record model"
    - "§2 Restored-collab-kind vocabulary"
    - "§3 Restoration-posture vocabulary"
    - "§4 Live-authority-status vocabulary"
    - "§5 No-auto-resume directives"
    - "§7 Forbidden-claim vocabulary"
    - "§8 Export-lane classification"
    - "§9 Packet / export linkage"
    - "§10 Honesty invariants"

