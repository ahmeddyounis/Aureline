__fixture__:
  name: shared_terminal_grant_placeholder_pending_explicit_regrant
  scenario: >
    The prior session held one shared-terminal control grant for a
    co-driver. The crash boundary closed the terminal session;
    layout truth is preserved, but the shared-terminal pane reopens
    as a placeholder card pending an explicit grant request. No
    keystroke flows into the prior grantee's terminal; the grant
    cannot reacquire silently.
  doc_sections:
    - "§1 Record model"
    - "§2 Restored-collab-kind vocabulary"
    - "§3 Restoration-posture vocabulary"
    - "§4 Live-authority-status vocabulary"
    - "§5 No-auto-resume directives"
    - "§6 Shared-control reopen posture"
    - "§7 Forbidden-claim vocabulary"
    - "§9 Packet / export linkage"

