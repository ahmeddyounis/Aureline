__fixture__:
  name: route_revocation_revoke_expire_route
  scenario: >
    A previously shared preview route (or remote attach route) is unsafe,
    expired, or revoked by policy. The repair must invalidate the route
    visibly and avoid silently publishing or widening trust as a side effect.
  doc_sections:
    - "Repair-class matrix (semantic contract)"
    - "Rule: no hidden adjacent durable-state mutation"

