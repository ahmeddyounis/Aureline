__fixture__:
  name: profile_corruption
  scenario: >
    A self-hosted profile whose durable-settings store has drifted.
    Doctor's cache_profile_probe detected schema drift and a missing
    keyring index in the profile-store backing file. Workspace bytes,
    the local-history lane, the autosave journal, and evidence
    packets all remain readable. The recovery-scenario card opens
    with investigate_with_project_doctor — read-only, exact-undo,
    non_destructive_read_only — so the user sees what remains safe
    before any reset path runs. Forbidden repair classes from the
    matrix (extension_isolation, extension_rollback_reinstall,
    execution_context_reresolve, remote_runtime_repair) are explicit.
  doc_sections:
    - "§1 Record model"
    - "§2 Scenario families"
    - "§5 First-action vocabulary"
    - "§6 Verb vocabulary and wording rules"
    - "§9 Safe-first-action matrix"
    - "§10 Linkage rules"
    - "§11 Honesty invariants"

