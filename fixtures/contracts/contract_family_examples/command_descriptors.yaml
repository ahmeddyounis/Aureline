$schema: "https://aureline.dev/schemas/contracts/contract_family_registry.schema.json"
record_kind: contract_family_example_record
contract_family_example_schema_version: 1
example_id: command_descriptors_cross_surface
family_id: command_descriptors
title: Command descriptors reused across palette, CLI, and support exports
scenario: >
  Command descriptors and invocation sessions are consumed by UI surfaces
  (palette/menu), CLI/headless structured output, and support handoff/export
  flows. This example points to the canonical command descriptor contract and
  one worked handoff export that cites command ids rather than scraping UI text.
surface_bindings:
  cli_headless_output_refs:
    - docs/automation/cli_surface_contract.md
    - docs/commands/command_descriptor_contract.md
  desktop_export_refs:
    - docs/commands/command_surface_projection.md
  support_bundle_refs:
    - docs/support/object_handoff_packet.md
    - fixtures/support/object_handoff_examples/command_detail_wrong_target.json
  release_packet_refs:
    - docs/release/release_evidence_packet_template.md
  provider_browser_handoff_refs: []

