# yaml-language-server: $schema=../../../schemas/ux/guided_tour.schema.json
__fixture__:
  name: command_backed_action_guided_step
  scenario: >
    A guided tour step teaches an action by anchoring to a stable
    command id rather than a private mutation path. The step also
    retains an upstream docs anchor so reviewers can reconstruct which
    doc guidance the step derived from, even in offline/export contexts.
  exercised_axes:
    anchor_kind: command_id_anchor
    upstream_citation_anchor_refs_non_empty: true
  contract_sections:
    - "All actions route through stable commands"
    - "Derived guidance retains upstream anchors"

records:
