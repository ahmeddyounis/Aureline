    waypoint_refs:
      - "docs:learn:tour:command_backed_step:01:waypoint:01"
    agenda_label: "Use commands, not hidden actions"
    default_locale: en
    source_language_fallback_class: no_fallback_locale_native
    docs_pack_ref: "pack:project:docs:01"
    docs_pack_revision_ref: "pack-rev:project:docs:2026-05-01:01"
    deployment_profile_refs:
      - individual_local
    evidence_hooks_reserved:
      - tour_citation_audit
    policy_context:
      policy_epoch: "pe:2026-05-01:03"
      trust_state: trusted
    redaction_class: metadata_safe_default
    presentation_label: "Command-backed step"
    presentation_subtitle: "Teaches actions through stable command ids."
    minted_at: "2026-05-01T09:20:00Z"

  - record_kind: tour_waypoint_record
    guided_tour_schema_version: 1
