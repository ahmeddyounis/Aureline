    redaction_profile_classes:
      - redaction_strict_metadata_only_on_managed_surfaces
    audit_level_classes:
      - audit_standard_lifecycle_plus_consent_plus_retention
    shared_object_class_policy_classes:
      - comment_anchored_or_thread
      - replay_artifact_metadata_and_events
      - deletion_event_record

