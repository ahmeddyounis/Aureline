# yaml-language-server: $schema=../../../schemas/notebooks/roundtrip_preview.schema.json
__fixture__:
  name: notebook_cell_lossless_roundtrip_local_kernel
  scenario: >-
    A user edits a code cell in a fully trusted notebook with a local
    managed-toolchain kernel available. The structured preview is
    lossless: cell source round-trips exactly and no notebook metadata
    or attachments are rewritten. Trust axes remain distinct (document
    trust vs kernel trust) and output/widget trust are explicitly not
    applicable to this preview.
  seed_section: Lossless preview; local kernel available
  exercised_classes:
    subject_class: notebook_cell
    notebook_trust_rung: fully_trusted_user
    structured_round_trip_risk_class: lossless_roundtrip
    apply_gate_class: allow_apply
  linked_docs:
    - docs/notebooks/notebook_trust_and_roundtrip_preview_contract.md
    - docs/adr/0022-notebook-document-model-kernel-transport-trust-and-diff-merge.md

roundtrip_preview_schema_version: 1
record_kind: structured_round_trip_preview_sheet_record
preview_id: rtpreview.nb.cell.lossless.imports.v1

subject:
  subject_class: notebook_cell
  subject_ref: nb.subject.cell.imports
  display_label: Notebook cell preview (imports cell)
  artifact_class: null
  notebook_document_ref: nb.doc.ml.experiment.01
  cell_id_ref: nb.cell.imports
  output_id_ref: null

trust_posture:
  notebook_trust_rung: fully_trusted_user
  per_cell_trust_overrides: []
  document_trust_state: document_trust_elevated_on_explicit_grant
  kernel_trust_state: kernel_trust_inherited_from_document_trust
  output_trust_state: null
  widget_trust_state: null
  kernel_transport_class: local_managed_toolchain_kernel

authored_source:
  source_format_class: notebook_cell_source_text
  source_artifact_ref: nb.source.cell.imports.v1
  source_fingerprint_ref: hash.nb.cell.imports.source.v1
  authored_summary_label: Authored cell source is the canonical input; no paired-text canonical promotion occurs.

effective_preview:
  preview_representation_class: full_fidelity_preview
  effective_representation_ref: nb.preview.cell.imports.structured.v1
  effective_summary_label: Preview shows the exact cell source and structural metadata; no normalization or degradation is applied.

round_trip:
  structured_round_trip_risk_class: lossless_roundtrip
  irreversibility_flag: false
  disclosure_flag_set: []
  reversal_hint_ref: rtpreview.reversal.exact_undo_supported

