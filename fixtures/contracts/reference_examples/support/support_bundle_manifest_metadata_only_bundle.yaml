# yaml-language-server: $schema=../../../schemas/support/support_bundle_manifest.schema.json
collection_schema_version: 1
record_kind: support_bundle_manifest_record
manifest_id: support.bundle.manifest.metadata_only.local_review
support_bundle_id: support-bundle:metadata-only:0001
title: Metadata-only support bundle preview
build_identity:
  build_id: build-id:aureline:preview:metadata-only:0001
  producer_build_id: build-id:aureline:preview:metadata-only:0001
  product_version: 0.0.0-preview-contract
  release_channel_class: preview
  exact_build_refs:
    - build-id:aureline:preview:metadata-only:0001
collection_context:
  generated_at: "2026-04-29T05:10:00Z"
  actor_class: support_center_preview
  active_redaction_profile_ref: support.redaction.local_first_default
  collection_intent: >
    Preview a local metadata-only support bundle without raw logs,
    traces, code, dumps, shell history, or secret material.
  policy_context:
    policy_epoch: 1
    trust_state: trusted
    policy_bundle_ref: policy-bundle:local-default:0001
  policy_notes:
    - note_id: support.preview.policy.metadata_only.local_default
      severity: info
      source_ref: support.redaction.local_first_default.metadata_core
      note: >
        Local default policy permits metadata-only build and policy
        truth while leaving high-risk classes absent.
preview_items:
  - support_bundle_preview_item_schema_version: 1
    record_kind: support_bundle_preview_item_record
    preview_item_id: support.preview.item.metadata_only.build_identity
    title: Exact build and install identity
    file_section_identity:
      section_id: support.preview.section.build_install
      bundle_section_class: build_and_install_truth
      artifact_kind_class: exact_build_identity_manifest
      preview_label: Exact build metadata
      manifest_path_ref: preview_items[0]
      bundle_member_path_ref: manifest/build_identity.json
      source_refs:
        - docs/build/exact_build_identity_model.md
        - artifacts/support/support_evidence_pack_matrix.yaml#support.item.build_identity
    size_estimate:
      estimated_bytes: 4096
      confidence_class: estimated
      display_label: 4 KB
      size_source_class: collector_estimate
    redaction:
      data_class: metadata_only
      high_risk_content_class: not_applicable
      redaction_class: metadata_safe_default
      redaction_state: not_required_metadata
      visible_high_risk_label: null
      redaction_rule_refs:
        - support.redaction.local_first_default.metadata_core
      redaction_summary_ref: redaction_report:metadata_only
    materialization:
      support_export_posture: included_by_default
      storage_mode: embedded_export_copy
      embedding_state: embedded
      collection_source_class: generated_by_exporter
      body_available_in_preview: true
      representation_label: metadata manifest
      digest_ref: digest:preview-item:metadata-only:build-identity
    deselectability:
      can_deselect: false
      deselection_rule_class: blocked_required_for_diagnosis
      stronger_redaction_available: false
      allowed_stronger_redaction_states: []
      locked_reason: >
        Exact-build identity is required to make the bundle actionable
        and cannot be removed from a shareable manifest.
      warning_required_before_deselect: false
    actionability_impact:
      impact_class: blocks_first_actionable_diagnosis
      affects_first_actionable_diagnosis: true
      warning_required: false
      warning_text: null
      impact_summary: >
        Removing this row would prevent support from matching crash,
        symbol, docs, and release evidence to one build.
    parity_binding:
      support_pack_item_id: support.item.build_identity
      inclusion_rule_ref: support.item.build_identity.included_by_default
      export_manifest_field_ref: preview_items[0]
      preview_decision_ref: review_decisions[0]
      item_digest_ref: digest:preview-item:metadata-only:build-identity
      exact_build_identity_refs:
        - build-id:aureline:preview:metadata-only:0001
      post_export_reconstruction_fields:
        - preview_item_id
        - parity_binding.support_pack_item_id
        - redaction.data_class
        - materialization.embedding_state
        - materialization.digest_ref
    policy_lock:
      locked_by_policy: false
      reason_class: not_locked
      policy_ref: null
      reason_summary: No policy lock applies to metadata-only build identity.
    notes: >
      The row is metadata-only and embedded by default; no raw local
      paths, hostnames, logs, or user content are present.

  - support_bundle_preview_item_schema_version: 1
    record_kind: support_bundle_preview_item_record
    preview_item_id: support.preview.item.metadata_only.policy_trust
    title: Policy fingerprint and trust state
    file_section_identity:
      section_id: support.preview.section.governance
      bundle_section_class: governance_and_export_controls
      artifact_kind_class: policy_fingerprint_summary
      preview_label: Policy and trust summary
      manifest_path_ref: preview_items[1]
      bundle_member_path_ref: manifest/policy_trust.json
      source_refs:
        - docs/policy/admin_policy_and_bundle_cache_contract.md
        - artifacts/support/support_evidence_pack_matrix.yaml#support.item.policy_trust_state
    size_estimate:
      estimated_bytes: 2048
      confidence_class: estimated
      display_label: 2 KB
      size_source_class: collector_estimate
    redaction:
      data_class: metadata_only
      high_risk_content_class: not_applicable
      redaction_class: metadata_safe_default
      redaction_state: not_required_metadata
      visible_high_risk_label: null
      redaction_rule_refs:
        - support.redaction.local_first_default.metadata_core
      redaction_summary_ref: redaction_report:metadata_only
    materialization:
      support_export_posture: included_metadata_only
      storage_mode: embedded_export_copy
      embedding_state: embedded
      collection_source_class: generated_by_exporter
      body_available_in_preview: true
      representation_label: policy summary
      digest_ref: digest:preview-item:metadata-only:policy-trust
    deselectability:
      can_deselect: false
      deselection_rule_class: blocked_required_for_diagnosis
      stronger_redaction_available: false
      allowed_stronger_redaction_states: []
      locked_reason: >
        The manifest must name the policy and trust state that governed
        collection so intake cannot reinterpret defaults later.
      warning_required_before_deselect: false
    actionability_impact:
      impact_class: high
      affects_first_actionable_diagnosis: true
      warning_required: false
      warning_text: null
      impact_summary: >
        Without this row, support cannot tell which policy allowed or
        excluded bundle classes.
    parity_binding:
      support_pack_item_id: support.item.policy_trust_state
      inclusion_rule_ref: support.item.policy_trust_state.included_metadata_only
      export_manifest_field_ref: preview_items[1]
      preview_decision_ref: review_decisions[1]
      item_digest_ref: digest:preview-item:metadata-only:policy-trust
      exact_build_identity_refs:
        - build-id:aureline:preview:metadata-only:0001
      post_export_reconstruction_fields:
        - preview_item_id
        - parity_binding.support_pack_item_id
        - redaction.redaction_state
        - collection_context.policy_context
        - materialization.digest_ref
    policy_lock:
      locked_by_policy: false
      reason_class: not_locked
      policy_ref: null
      reason_summary: No policy lock applies to metadata-only policy summary.
    notes: >
      The row embeds a policy fingerprint and trust class only, not a
      full policy body or user identifiers.

review_decisions:
  - preview_item_id: support.preview.item.metadata_only.build_identity
    support_pack_item_id: support.item.build_identity
    decision_class: included_default
    selected_redaction_state: not_required_metadata
    decided_by_class: default_rule
    decision_reason: Metadata-only exact-build truth is required.
    actionability_warning_ack_ref: null
  - preview_item_id: support.preview.item.metadata_only.policy_trust
    support_pack_item_id: support.item.policy_trust_state
    decision_class: included_default
    selected_redaction_state: not_required_metadata
    decided_by_class: default_rule
    decision_reason: Policy and trust state are included as metadata.
    actionability_warning_ack_ref: null
excluded_classes: []
redaction_report:
  report_id: redaction_report:metadata_only
  redaction_profile_ref: support.redaction.local_first_default
  redaction_pass_ref: redaction-pass:metadata-only:0001
  redaction_states_present:
    - not_required_metadata
  high_risk_items: []
  prohibited_items_confirmed_absent:
    - support.item.raw_secrets
    - support.item.full_shell_history
  applied_rule_refs:
    - support.redaction.local_first_default.metadata_core
  secret_scan_summary:
    scan_state: not_applicable_metadata_only
    detected_marker_count: 0
    raw_secret_values_exported: false
    notes: Metadata-only rows did not request raw content scanning.
  reviewer_visible_summary: >
    The bundle contains only build and policy metadata; high-risk
    classes are absent.
actionability_warnings: []
reopen_after_export_path:
  manifest_member_path: support/manifest.yaml
  local_reopen_ref: support-preview:metadata-only:0001
  product_route_ref: aureline://support/bundles/metadata-only-0001/preview
  can_reopen_without_network: true
  preserved_preview_snapshot_ref: preview-snapshot:support:metadata-only:0001
  notes: >
    The exported manifest can reopen the exact local review snapshot
    without contacting a support service.
preview_export_parity:
  preview_snapshot_ref: preview-snapshot:support:metadata-only:0001
  preview_item_order_digest: digest:preview-order:metadata-only
  export_manifest_digest: digest:export-manifest:metadata-only
  manifest_reconstructs_shared_payload: true
  reconstruction_fields:
    - collection_schema_version
    - build_identity.exact_build_refs
    - preview_items[].preview_item_id
    - preview_items[].redaction
    - review_decisions[]
    - redaction_report
  item_decision_refs:
    - review_decisions[0]
    - review_decisions[1]
  unknown_field_policy: preserve_unknown_unless_redacted
  parity_assertions:
    - preview_items_match_export_manifest_order
    - metadata_only_rows_have_no_hidden_high_risk_switches
    - exact_build_refs_preserved_after_export
emitted_at: "2026-04-29T05:10:01Z"
notes: >
  This case proves that a minimal bundle can be reviewed and exported
  with stable item ids and no hidden high-risk inclusions.
