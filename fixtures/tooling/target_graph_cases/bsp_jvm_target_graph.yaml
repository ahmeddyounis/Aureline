# Multi-document YAML fixture for the BSP v2 JVM target-graph case.
__fixture__:
  name: bsp_jvm_target_graph
  scenario: >
    Build Server Protocol v2 server publishes a streaming target graph
    for a Gradle JVM workspace under a named_workset scope. Adapter
    confidence is authoritative_from_source; snapshot is partially
    streamed pending a completion event; the debug action routes to
    the provider debug console via an open_in_provider_debug_console
    external handoff. Target ids are derived from BSP build-target
    URIs and survive export and reopen.
  exercised:
    adapter_class: build_server_protocol_client
    precedence_class: structured_protocol_authoritative
    snapshot_partial_truth: partial_streamed_pending_completion_event
    snapshot_freshness: live_streaming
    target_id_lineage: preserved_across_export_and_reopen
    debug_external_handoff_kind: open_in_provider_debug_console
  seed_roles:
    - bsp_adapter_descriptor
    - streaming_target_graph_snapshot
    - external_handoff_for_debug_action
    - named_workset_scope
---
