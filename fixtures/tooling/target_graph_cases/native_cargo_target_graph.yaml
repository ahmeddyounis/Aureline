# Multi-document YAML fixture for the native cargo target-graph case.
# Each document carries a record_kind that resolves to one of:
#   schemas/tooling/adapter_descriptor.schema.json
#   schemas/tooling/target_graph_snapshot.schema.json
#   schemas/tooling/target_descriptor.schema.json
__fixture__:
  name: native_cargo_target_graph
  scenario: >
    First-party native cargo task runner publishes a complete target
    graph for the aureline workspace's current_root scope. Adapter
    confidence is authoritative_from_source, snapshot is
    complete_for_workset_scope under live_streaming freshness, target
    descriptors round-trip stable target ids across export and reopen,
    and run / test / build / debug actions all resolve through the
    aureline.native.cargo_runner task-event adapter.
  exercised:
    adapter_class: native_build_runner
    precedence_class: highest_authoritative_native
    snapshot_partial_truth: complete_for_workset_scope
    snapshot_freshness: live_streaming
    target_id_lineage: preserved_across_export_and_reopen
    action_support: supported_authoritative
  seed_roles:
    - native_adapter_descriptor
    - authoritative_target_graph_snapshot
    - target_id_round_trip_export_reopen
    - run_test_build_debug_supported_authoritative
---
$schema: ../../../schemas/tooling/adapter_descriptor.schema.json
record_kind: adapter_descriptor_record
adapter_descriptor_schema_version: 1
adapter_id: aureline.native.cargo_runner
title: Native cargo build adapter (publishes target graph from cargo metadata + runs build / test / bench)
adapter_class: native_build_runner
producer_tool: cargo.metadata
adapter_version: cargo.metadata.adapter.v1
discovery_source_set:
  - manifest_files_in_workspace
  - workspace_lockfile
workspace_scope_compatibility_set:
  - current_root
  - named_workset
  - sparse_slice
  - full_workspace
precedence_class: highest_authoritative_native
adapter_confidence_ceiling: authoritative_from_source
capability_flag_set:
  - publishes_target_graph_snapshot
  - publishes_target_descriptors
  - publishes_target_health_observations
  - supports_run_action
  - supports_test_action
  - supports_build_action
  - supports_debug_action
  - supports_artifact_publication_event
  - supports_target_graph_streaming_updates
  - supports_partial_workset_scope
  - preserves_target_id_across_export_and_reopen
  - preserves_target_id_across_adapter_swap
supported_target_class_set:
  - local_host
  - container_local
  - devcontainer
  - remote_workspace_vm
supported_toolchain_class_set:
  - compiler_toolchain
  - package_manager_runner
  - test_runner_runtime
  - build_driver_runtime
  - debug_adapter_runtime
replacement_posture: may_replace_lower_or_equal_precedence_silently
task_event_adapter_id_refs:
  - aureline.native.cargo_runner
external_handoff_kinds_supported: []
graph_freshness_default_class: live_streaming
notes: >
  Reads cargo metadata for target discovery and the cargo build /
  test / bench event stream for target health observations. Target
  ids are derived from the cargo package id + target name; ids
  survive export / reopen and survive a swap to the structured
  pyproject importer when one workspace contains both manifests.
