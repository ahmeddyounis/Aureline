# Multi-document YAML fixture for the adapter-swap visible-state-change case.
__fixture__:
  name: adapter_swap_visible_state_change
  scenario: >
    Native cargo adapter that previously owned the aureline workspace's
    target graph becomes unavailable (cargo binary missing from the
    active toolchain); the fallback heuristic adapter takes over
    under the same workset_scope. The swap rides an
    adapter_replacement_event_record whose visible_state_change_class
    is confidence_downgrade_disclosed and whose target_id_continuity
    is subset_of_target_ids_preserved (only the targets the heuristic
    inferrer can recognise survive). A new graph snapshot is emitted
    citing supersedes_prior_snapshot_after_adapter_swap and the new
    snapshot's adapter_replacement_event_id_ref. Pickers render the
    confidence-downgrade chip rather than swap silently.
  exercised:
    replacement_kind: downgrade_lower_confidence_takes_over
    visible_state_change_class: confidence_downgrade_disclosed
    target_id_continuity: subset_of_target_ids_preserved
    new_graph_lineage_class: supersedes_prior_snapshot_after_adapter_swap
    new_graph_generation_event_class: after_adapter_swap_visible_state_change
  seed_roles:
    - adapter_replacement_event_record
    - downgrade_lower_confidence_visible_state_change
    - subset_target_id_continuity
    - supersedes_after_swap_graph_lineage
---
$schema: ../../../schemas/tooling/adapter_descriptor.schema.json
record_kind: adapter_replacement_event_record
adapter_descriptor_schema_version: 1
event_id: replacement:aureline_workspace:cargo_to_heuristic:01
captured_at: 2026-04-30T14:20:00.000Z
workspace_id: wks:aureline
workset_scope_class: current_root
previous_adapter_id_ref: aureline.native.cargo_runner
previous_precedence_class: highest_authoritative_native
previous_confidence_class: authoritative_from_source
new_adapter_id_ref: aureline.heuristic.target_inferrer
new_precedence_class: heuristic_best_effort
new_confidence_class: heuristic_best_effort
previous_graph_id_ref: graph:tooling.target_graph:aureline_workspace:cargo:01
new_graph_id_ref: graph:tooling.target_graph:aureline_workspace:heuristic_after_swap:01
replacement_kind: downgrade_lower_confidence_takes_over
visible_state_change_class: confidence_downgrade_disclosed
target_id_continuity: subset_of_target_ids_preserved
summary: Cargo binary became unavailable; heuristic adapter takes over; only targets the heuristic ruleset can recognise survive the swap.
