# Single-document YAML fixture for the inspect-only external-handoff
# target descriptor case.
__fixture__:
  name: inspect_only_external_handoff_target
  scenario: >
    Native adapter publishes an executable_binary target whose run /
    debug actions are owned by an external CI provider's run console;
    the target itself is broken_no_action_admissible because the
    artifact has not yet been built locally and the build action is
    blocked by policy. Every action lands in inspect_only_no_action /
    unsupported_external_handoff_only / blocked_pending_policy_review;
    the picker MUST render the open-in-provider-run-console handoff
    rather than a generic Cannot run label.
  exercised:
    target_kind: executable_binary
    health_state: broken_no_action_admissible
    run_action_state: unsupported_external_handoff_only
    test_action_state: inspect_only_no_action
    build_action_state: blocked_pending_policy_review
    debug_action_state: unsupported_external_handoff_only
    external_handoff_kind: open_in_provider_run_console
  seed_roles:
    - inspect_only_external_handoff
    - broken_no_action_admissible_health
    - non_null_external_handoff_payload
