  - emit_output_pane_header_capability_chip_for_target
  - emit_ai_action_sheet_disclosure_disabling_tool_call
  - emit_review_required_chip_for_target
  - emit_support_export_disclosure_with_capability_loss_summary
drift_reason_class: toolchain_unavailable_in_active_context
linked_adapter_replacement_event_id_ref: replacement:aureline_workspace:cargo_to_heuristic:01
linked_fallback_confidence_record_id_ref: fallback:aureline_workspace:cargo_to_heuristic_downgrade:01
lifecycle_status_card_ref: lifecycle:status_card:aureline_workspace:degraded_after_cargo_loss:01
summary: Cargo binary unavailable; heuristic adapter takes over; debug / test / artifact-publication / streaming / target-id-stability capabilities downgraded; pickers render confidence-downgrade chip and review-required chip; AI action sheets disable structured tool calls.
