# Multi-document YAML fixture for the adapter-downgrade-loses-authoritative-debug case.
__fixture__:
  name: adapter_downgrade_loses_authoritative_debug
  scenario: >
    Native cargo runner that previously owned the aureline workspace's
    target graph becomes unavailable (the cargo binary is missing from
    the active toolchain context). The heuristic target inferrer takes
    over under the same workset_scope. The adapter swap rides
    schemas/tooling/adapter_descriptor.schema.json#adapter_replacement_event_record;
    here we record the matching adapter_drift_event_record, the
    fallback_confidence_record the drift event emitted, and the
    degraded_capability_handoff_record the picker renders for the
    aureline-cli debug action: debug downgrades from
    supported_authoritative to currently_inferred_heuristic_only with
    a review-required chip. Capability loss narrows affordances
    immediately and names the heuristic_target_inferrer adapter class
    plus the toolchain-unavailable reason.
  exercised:
    drift_class: capability_downgrade_disclosed_lower_confidence
    drift_reason_class: toolchain_unavailable_in_active_context
    fallback_source_kind_class: heuristic_target_inferrer_ruleset
    handoff_degraded_capability_class: currently_inferred_heuristic_only
    handoff_affordance_class: render_currently_inferred_chip_with_review_required
    recovery_or_escalation_action_class: install_or_attach_native_runner_via_extension_review
  seed_roles:
    - capability_downgrade_drift_event
    - heuristic_fallback_confidence_record
    - currently_inferred_handoff
---
