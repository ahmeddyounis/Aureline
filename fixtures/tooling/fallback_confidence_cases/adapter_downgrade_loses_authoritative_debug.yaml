captured_at: 2026-04-30T14:20:00.000Z
workspace_id: wks:aureline
workset_scope_class: current_root
workset_scope_ref: scope:aureline:current_root:01
drift_class: capability_downgrade_disclosed_lower_confidence
prior_adapter_state:
  adapter_id_ref: aureline.native.cargo_runner
  adapter_class: native_build_runner
  adapter_confidence_ceiling: authoritative_from_source
  publishing_graph_id_ref: graph:tooling.target_graph:aureline_workspace:cargo:01
  snapshot_freshness_class: live_streaming
  snapshot_partial_truth_class: complete_for_workset_scope
  summary: Native cargo runner active before the cargo binary became unavailable.
current_adapter_state:
  adapter_id_ref: aureline.heuristic.target_inferrer
  adapter_class: heuristic_target_inferrer
  adapter_confidence_ceiling: heuristic_best_effort
  publishing_graph_id_ref: graph:tooling.target_graph:aureline_workspace:heuristic_after_swap:01
  snapshot_freshness_class: warm_cached
  snapshot_partial_truth_class: partial_adapter_degraded_pending_recovery
  summary: Heuristic adapter takes over after cargo binary loss; only targets the heuristic ruleset can recognise survive.
changed_capability_set:
  - capability_flag: supports_debug_action
    change_class: capability_demoted_from_authoritative_to_structured
    summary: Debug action demoted; heuristic adapter cannot drive a structured debug session.
  - capability_flag: supports_test_action
    change_class: capability_demoted_from_structured_to_heuristic
    summary: Test action narrowed to heuristic pytest-style discovery; cargo test no longer reachable.
  - capability_flag: supports_artifact_publication_event
    change_class: capability_removed
    summary: Heuristic adapter does not emit artifact-publication events.
  - capability_flag: supports_target_graph_streaming_updates
    change_class: capability_demoted_from_streaming_to_warm_cached
    summary: Live cargo metadata watcher gone; heuristic adapter polls warm cache.
  - capability_flag: preserves_target_id_across_adapter_swap
    change_class: capability_removed
    summary: Heuristic adapter cannot guarantee aureline-core test ids across the swap.
affected_target_id_refs:
  - tgt:tooling.target:aureline-cli:bin
  - tgt:tooling.target:aureline-core:lib
  - tgt:tooling.target:aureline-core:test
affected_action_class_set:
