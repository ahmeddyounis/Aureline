# Multi-document YAML fixture for the structured-debug-falls-back-to-inspect-only case.
__fixture__:
  name: structured_debug_falls_back_to_inspect_only
  scenario: >
    A BSP v2 server that previously published a Java/JVM target graph
    over the build_server_protocol loses its debug-adapter capability
    mid-session (the BSP server's debug subprotocol is disabled by
    the upstream extension's policy review). The structured
    debug_runnable target falls back to inspect_only. The drift event
    is capability_downgrade_disclosed_capability_removed; the fallback
    record cites missing_debug_action and pairs the loss with the
    attach-build-server-protocol-session-via-extension-review recovery
    action. The degraded_capability_handoff_record renders an
    inspect-only chip with a keyboard-reachable inspect path; AI
    action sheets disable structured debug tool calls; the support
    export carries the full capability-loss summary. No external
    handoff is admissible: BSP debug is owned in-product when
    available, and the recovery is to reattach the session through
    extension review.
  exercised:
    drift_class: capability_downgrade_disclosed_capability_removed
    drift_reason_class: build_server_protocol_session_lost
    fallback_source_kind_class: build_server_protocol_session
    fallback_missing_capability: missing_debug_action
    handoff_degraded_capability_class: inspect_only
    handoff_affordance_class: render_inspect_only_chip_with_keyboard_inspect_path
    recovery_or_escalation_action_class: attach_build_server_protocol_session_via_extension_review
  seed_roles:
    - structured_to_inspect_only_drift_event
    - missing_debug_action_fallback_record
    - inspect_only_handoff_with_keyboard_inspect_path
