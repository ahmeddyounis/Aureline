# Multi-document YAML fixture for the partial-coverage drift case.
__fixture__:
  name: partial_coverage_after_workset_change
  scenario: >
    User narrows the workset scope from current_root to sparse_slice
    (only the aureline-cli crate is in scope). The native cargo
    runner publishes a partial graph for the sparse slice; targets
    outside the slice are explicitly omitted. The drift event is
    capability_set_partial_coverage_change with drift reason
    workset_scope_changed_by_user. The fallback record cites
    partial_truth_demoted_to_partial_adapter_degraded_pending_recovery
    so consumer surfaces never render the partial graph as a full
    graph. Out-of-slice targets receive a degraded_capability_handoff
    of class known_missing_capability_no_recovery_in_context with the
    install-or-attach review chip pointing at "widen workset scope" as
    the recovery action.
  exercised:
    drift_class: capability_set_partial_coverage_change
    drift_reason_class: workset_scope_changed_by_user
    fallback_downgraded_behavior:
      - target_set_narrowed_to_subset_with_review
      - partial_truth_demoted_to_partial_adapter_degraded_pending_recovery
    handoff_degraded_capability_class: known_missing_capability_no_recovery_in_context
    recovery_or_escalation_action_class: widen_workset_scope_via_review
  seed_roles:
    - partial_coverage_drift_event
    - partial_truth_fallback_confidence_record
    - known_missing_handoff_for_out_of_slice_target
