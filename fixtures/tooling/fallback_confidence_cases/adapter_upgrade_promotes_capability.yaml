  - capability_flag: supports_target_graph_streaming_updates
    change_class: capability_promoted_from_warm_cached_to_streaming
    summary: Streaming graph updates resumed under cargo metadata watcher.
  - capability_flag: supports_artifact_publication_event
    change_class: capability_added
    summary: Cargo runner publishes artifact-publication events the heuristic adapter never emitted.
  - capability_flag: preserves_target_id_across_adapter_swap
    change_class: capability_added
    summary: Cargo runner preserves the aureline-cli target id minted by the heuristic adapter.
affected_target_id_refs:
