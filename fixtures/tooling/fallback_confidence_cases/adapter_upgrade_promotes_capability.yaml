linked_fallback_confidence_record_id_ref: fallback:aureline_workspace:heuristic_pre_upgrade_closing:01
lifecycle_status_card_ref: null
summary: Heuristic adapter promoted to native cargo runner after cargo toolchain became available; capability shape widens; AI tool calls re-enabled on next render under the new authoritative ceiling.
