# Multi-document YAML fixture for the adapter-upgrade-promotes-capability case.
# Each document carries a record_kind that resolves to one of:
#   schemas/tooling/fallback_confidence.schema.json
#   schemas/tooling/adapter_drift_event.schema.json
__fixture__:
  name: adapter_upgrade_promotes_capability
  scenario: >
    A workspace previously served by the heuristic target inferrer is
    promoted to the native cargo runner after the user installs the
    cargo toolchain via the extension review surface. The drift event
    is capability_upgrade_admitted_higher_confidence; debug action
    upgrades from heuristic-best-effort to supported-authoritative.
    The picker still emits a visible state change chip on upgrade so
    AI planners and CI overlays render the change. The fallback record
    documents the closing posture (now-resolved missing capabilities,
    recovery path that admitted the upgrade) so support exports show
    a complete capability-loss-and-recovery trail.
  exercised:
    drift_class: capability_upgrade_admitted_higher_confidence
    capability_change_classes:
      - capability_promoted_from_heuristic_to_structured
      - capability_promoted_from_warm_cached_to_streaming
      - capability_added
    required_disclosure_behavior:
      - emit_visible_state_change_chip_in_picker
      - emit_support_export_disclosure_with_capability_loss_summary
    closing_fallback_recovery_action: install_or_attach_native_runner_via_extension_review
  seed_roles:
    - adapter_upgrade_drift_event
    - closing_fallback_confidence_record
    - capability_promoted_set
---
