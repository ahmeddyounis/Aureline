# Multi-document YAML fixture for the adapter-heuristic-fallback drawer case.
__fixture__:
  name: adapter_heuristic_fallback_drawer
  scenario: >
    The native cargo runner that previously owned the aureline-cli
    target's debug action has been replaced by the heuristic target
    inferrer (matching the sibling fixture
    fixtures/tooling/fallback_confidence_cases/adapter_downgrade_loses_authoritative_debug.yaml).
    The picker detail card, AI action sheet detail card, output pane
    header drawer, and command palette result card all open the same
    fallback-confidence drawer for aureline-cli:debug. The drawer's
    drawer_state_class is capability_currently_inferred, the
    capability-loss explanation is
    inferred_from_heuristic_target_inferrer_ruleset, and the primary
    safer-alternative-handoff is
    install_or_attach_native_runner_via_extension_review with a
    secondary external_handoff_copy_command_to_terminal and a
    tertiary rerun_last_known_invocation_via_review.
  exercised:
    drawer_state_class: capability_currently_inferred
    drawer_state_label_text: Currently inferred
    result_class: currently_inferred
    capability_loss_explanation_class: inferred_from_heuristic_target_inferrer_ruleset
    primary_safer_alternative_handoff_class: install_or_attach_native_runner_via_extension_review
    secondary_safer_alternative_handoff_class: external_handoff_copy_command_to_terminal
    tertiary_safer_alternative_handoff_class: rerun_last_known_invocation_via_review
    copy_export_disclosure_class: exported_with_full_capability_loss_disclosure
  seed_roles:
    - heuristic_fallback_drawer
    - install_or_attach_primary_safer_alternative
    - copy_command_secondary_safer_alternative
    - rerun_last_tertiary_safer_alternative
---
$schema: ../../../schemas/tooling/fallback_confidence_drawer.schema.json
record_kind: fallback_confidence_drawer_record
fallback_confidence_drawer_schema_version: 1
drawer_record_id: drawer:aureline_workspace:aureline-cli:bin:debug:currently_inferred:01
captured_at: 2026-04-30T14:20:00.000Z
workspace_id: wks:aureline
workset_scope_class: current_root
workset_scope_ref: scope:aureline:current_root:01
drawer_scope_class: scope_target_action_pair
target_id_ref: tgt:tooling.target:aureline-cli:bin
publishing_graph_id_ref: graph:tooling.target_graph:aureline_workspace:heuristic_after_swap:01
affected_action_class_set:
  - debug
drawer_state_class: capability_currently_inferred
drawer_state_label_text: Currently inferred
result_class: currently_inferred
linked_fallback_confidence_record_id_ref: fallback:aureline_workspace:cargo_to_heuristic_downgrade:01
linked_adapter_drift_event_id_ref: drift:aureline_workspace:cargo_to_heuristic_downgrade:01
linked_degraded_capability_handoff_record_id_ref: handoff:aureline_workspace:aureline-cli:bin:debug:heuristic:01
current_adapter_snapshot:
  adapter_id_ref: aureline.heuristic.target_inferrer
  adapter_class: heuristic_target_inferrer
  adapter_confidence_ceiling: heuristic_best_effort
  publishing_graph_id_ref: graph:tooling.target_graph:aureline_workspace:heuristic_after_swap:01
  snapshot_partial_truth_class: partial_adapter_degraded_pending_recovery
  snapshot_freshness_class: warm_cached
  summary: Heuristic adapter snapshot after the cargo runner became unavailable; debug action driven by ruleset-only inference.
source_kind_class: heuristic_target_inferrer_ruleset
confidence_tier: heuristic_best_effort
capability_loss_explanation:
  capability_loss_explanation_class: inferred_from_heuristic_target_inferrer_ruleset
  capability_loss_explanation_label_text: Inferred from heuristic ruleset
  capability_loss_explanation_sentence: aureline-cli debug is currently inferred by the heuristic target-inferrer ruleset because the native cargo runner is unavailable in the active context; the inferred invocation is a best-effort guess rather than an authoritative cargo metadata read.
  names_active_adapter_class: true
  names_typed_reason: true
safer_alternative_handoff_set:
  - safer_alternative_handoff_class: install_or_attach_native_runner_via_extension_review
    safer_alternative_handoff_label_text: Install or attach native runner (extension review)
    safer_alternative_presentation_class: primary_button_in_drawer
    preserves_current_work: true
    routes_through_safe_review: true
    linked_recovery_or_escalation_action_class: install_or_attach_native_runner_via_extension_review
    external_handoff: null
    rerun_last_invocation: null
    summary: Reattach the native cargo runner via extension review to restore authoritative debug; current work, breakpoints, and session state are preserved.
  - safer_alternative_handoff_class: external_handoff_copy_command_to_terminal
    safer_alternative_handoff_label_text: Copy command to terminal
    safer_alternative_presentation_class: secondary_button_in_drawer
    preserves_current_work: true
    routes_through_safe_review: false
    linked_recovery_or_escalation_action_class: copy_command_to_terminal_external_handoff
    external_handoff:
      handoff_kind: copy_command_to_terminal
      provider_class: system_terminal_emulator
      handoff_payload_ref: handoff_payload:aureline-cli:debug:cargo_run_dash_dash_bin:01
      summary: Copy the inferred cargo run command into the system terminal so the debug attempt runs against the same toolchain the user can see in the shell.
    rerun_last_invocation: null
    summary: Hand the inferred invocation off to the system terminal as a copy-command external handoff; provider owns the run.
  - safer_alternative_handoff_class: rerun_last_known_invocation_via_review
    safer_alternative_handoff_label_text: Rerun last known invocation (review)
    safer_alternative_presentation_class: tertiary_link_in_drawer
    preserves_current_work: true
    routes_through_safe_review: true
    linked_recovery_or_escalation_action_class: rerun_last_known_invocation_via_review
    external_handoff: null
    rerun_last_invocation:
      task_event_envelope_id_ref: task_event:aureline-cli:debug:last_authoritative_invocation:01
      captured_at: 2026-04-29T22:14:11.000Z
      summary: Re-bind to the last authoritative cargo debug invocation captured before the toolchain became unavailable.
    summary: Rerun the last authoritative cargo debug invocation through review rather than guessing a new heuristic invocation.
drawer_consumer_surface_class_set:
  - run_test_build_debug_picker_detail_card
  - quick_open_detail_pane
  - command_palette_result_card
  - output_pane_header_drawer
  - ai_action_sheet_detail_card
  - issue_handoff_prefill_card
  - command_result_message_card
  - support_export_viewer
support_bundle_export_card:
  copy_export_disclosure_class: exported_with_full_capability_loss_disclosure
  copy_export_redaction_class: internal_support_restricted
  includes_capability_loss_explanation: true
  includes_active_adapter_snapshot: true
  includes_safer_alternative_handoff_summary: true
  includes_drift_event_summary: true
  raw_payloads_excluded: true
  summary: Support bundle reproduces the capability-loss explanation, the heuristic adapter snapshot, the drift event summary, and the three safer-alternative-handoff labels in their drawer order.
issue_handoff_prefill_card:
  copy_export_redaction_class: metadata_safe_default
  includes_capability_loss_explanation: true
  includes_active_adapter_snapshot: true
  includes_safer_alternative_handoff_summary: true
  workspace_id_only_no_raw_paths: true
  raw_payloads_excluded: true
  summary: Issue handoff prefill names the workspace by opaque id, cites the heuristic adapter posture, and lists the three safer-alternative-handoff labels with the install-or-attach option marked as primary.
command_result_message_card:
  delivery_surface_class_set:
    - run_test_build_debug_picker_detail_card
    - quick_open_detail_pane
    - command_palette_result_card
    - output_pane_header_drawer
    - ai_action_sheet_detail_card
    - command_result_message_card
  includes_capability_loss_label_text: true
  includes_safer_alternative_handoff_label_text: true
  includes_drawer_state_label_text: true
  raw_payloads_excluded: true
  summary: Command-result messages render Currently inferred, Inferred from heuristic ruleset, and the primary Install or attach native runner (extension review) label across pickers, quick-open, command palette, output pane header, AI action sheet, and command-result message card.
summary: aureline-cli:debug drawer renders Currently inferred posture on the heuristic adapter; primary safer-alternative is to reattach the native cargo runner via extension review; secondary is a copy-command external handoff; tertiary is a review-gated rerun of the last authoritative invocation.
