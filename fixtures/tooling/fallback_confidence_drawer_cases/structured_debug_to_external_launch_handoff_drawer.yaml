# Multi-document YAML fixture for the safer-alternative-handoff drawer
# that hands a structured debug action off to an external launch.
__fixture__:
  name: structured_debug_to_external_launch_handoff_drawer
  scenario: >
    A BSP v2 server's debug-adapter subprotocol becomes unavailable
    mid-session (matching the sibling fixture
    fixtures/tooling/fallback_confidence_cases/structured_debug_falls_back_to_inspect_only.yaml).
    The structured debug_runnable target falls back to inspect_only on
    the picker. The drawer that opens behind the inspect-only chip
    offers a typed safer-alternative handoff from the lost structured
    debug action to an external launch path: the primary safer-
    alternative is external_handoff_copy_command_to_terminal so the
    user can run the same gradle test --debug-jvm invocation against a
    JDWP-attached console; the secondary is
    attach_build_server_protocol_session_via_extension_review so the
    BSP debug subprotocol can be reattached through review; the
    tertiary is escalate_to_workspace_admin_via_policy_review when the
    upstream extension's policy review is the blocker. The drawer's
    drawer_state_class is capability_unavailable_missing_adapter_coverage
    (the BSP server publishes the target but no longer publishes the
    debug-adapter capability), and the capability-loss explanation is
    missing_debug_subprotocol_in_build_server.
  exercised:
    drawer_state_class: capability_unavailable_missing_adapter_coverage
    drawer_state_label_text: Missing adapter coverage
    result_class: known_missing
    capability_loss_explanation_class: missing_debug_subprotocol_in_build_server
    primary_safer_alternative_handoff_class: external_handoff_copy_command_to_terminal
    secondary_safer_alternative_handoff_class: attach_build_server_protocol_session_via_extension_review
    tertiary_safer_alternative_handoff_class: escalate_to_workspace_admin_via_policy_review
    copy_export_disclosure_class: exported_with_full_capability_loss_disclosure
  seed_roles:
    - structured_to_external_launch_drawer
    - copy_command_primary_safer_alternative
    - attach_bsp_secondary_safer_alternative
    - admin_policy_review_tertiary_safer_alternative
---
$schema: ../../../schemas/tooling/fallback_confidence_drawer.schema.json
record_kind: fallback_confidence_drawer_record
fallback_confidence_drawer_schema_version: 1
drawer_record_id: drawer:gradle_jvm:server:debug_runnable:debug:missing_adapter_coverage:01
captured_at: 2026-04-30T16:00:00.000Z
workspace_id: wks:gradle_jvm
workset_scope_class: named_workset
workset_scope_ref: scope:gradle_jvm:named_workset:server:01
drawer_scope_class: scope_target_action_pair
target_id_ref: tgt:tooling.target:gradle_jvm:server:debug_runnable
publishing_graph_id_ref: graph:tooling.target_graph:gradle_jvm:bsp:01
affected_action_class_set:
  - debug
drawer_state_class: capability_unavailable_missing_adapter_coverage
drawer_state_label_text: Missing adapter coverage
result_class: known_missing
linked_fallback_confidence_record_id_ref: fallback:gradle_jvm_workspace:bsp_debug_capability_removed:01
linked_adapter_drift_event_id_ref: drift:gradle_jvm_workspace:bsp_debug_capability_removed:01
linked_degraded_capability_handoff_record_id_ref: handoff:gradle_jvm:server:debug_runnable:debug:inspect_only:01
current_adapter_snapshot:
  adapter_id_ref: aureline.bsp.gradle_jvm
  adapter_class: build_server_protocol_client
  adapter_confidence_ceiling: authoritative_from_source
  publishing_graph_id_ref: graph:tooling.target_graph:gradle_jvm:bsp:01
  snapshot_partial_truth_class: partial_streamed_pending_completion_event
  snapshot_freshness_class: live_streaming
  summary: BSP server still publishing the target graph and run / test / build actions; only the debug-adapter subprotocol is unavailable.
source_kind_class: build_server_protocol_session
confidence_tier: structured_parse_match
capability_loss_explanation:
  capability_loss_explanation_class: missing_debug_subprotocol_in_build_server
  capability_loss_explanation_label_text: Debug subprotocol missing on the active build server
  capability_loss_explanation_sentence: gradle_jvm:server:debug_runnable cannot be debugged in product because the active build-server-protocol client no longer publishes the debug-adapter subprotocol; the BSP server still publishes the target graph and run / test / build actions, so the loss is scoped to the debug action only.
  names_active_adapter_class: true
  names_typed_reason: true
safer_alternative_handoff_set:
  - safer_alternative_handoff_class: external_handoff_copy_command_to_terminal
    safer_alternative_handoff_label_text: Copy command to terminal
    safer_alternative_presentation_class: primary_button_in_drawer
    preserves_current_work: true
    routes_through_safe_review: false
    linked_recovery_or_escalation_action_class: copy_command_to_terminal_external_handoff
    external_handoff:
      handoff_kind: copy_command_to_terminal
      provider_class: system_terminal_emulator
      handoff_payload_ref: handoff_payload:gradle_jvm:server:debug_jvm_attach:01
      summary: Copy the gradle debug-jvm attach invocation into the system terminal so the user can attach a JDWP debugger from outside the IDE while the BSP debug subprotocol is unavailable.
    rerun_last_invocation: null
    summary: External-handoff to the system terminal as a copy-command launch; current breakpoints and source positions are preserved while the debug session moves to an external JDWP attach.
  - safer_alternative_handoff_class: attach_build_server_protocol_session_via_extension_review
    safer_alternative_handoff_label_text: Attach build-server-protocol session (extension review)
    safer_alternative_presentation_class: secondary_button_in_drawer
    preserves_current_work: true
    routes_through_safe_review: true
    linked_recovery_or_escalation_action_class: attach_build_server_protocol_session_via_extension_review
    external_handoff: null
    rerun_last_invocation: null
    summary: Reattach the BSP session through extension review to restore the debug-adapter subprotocol; current work and session state are preserved.
  - safer_alternative_handoff_class: escalate_to_workspace_admin_via_policy_review
    safer_alternative_handoff_label_text: Escalate to workspace admin (policy review)
    safer_alternative_presentation_class: tertiary_link_in_drawer
    preserves_current_work: true
    routes_through_safe_review: true
    linked_recovery_or_escalation_action_class: escalate_to_workspace_admin_via_policy_review
    external_handoff: null
    rerun_last_invocation: null
    summary: Escalate to the workspace admin so the upstream extension's policy review can re-enable the BSP debug subprotocol if extension reattach is not sufficient.
drawer_consumer_surface_class_set:
  - run_test_build_debug_picker_detail_card
  - quick_open_detail_pane
  - command_palette_result_card
  - output_pane_header_drawer
  - ai_action_sheet_detail_card
  - issue_handoff_prefill_card
  - command_result_message_card
  - support_export_viewer
support_bundle_export_card:
  copy_export_disclosure_class: exported_with_full_capability_loss_disclosure
  copy_export_redaction_class: internal_support_restricted
  includes_capability_loss_explanation: true
  includes_active_adapter_snapshot: true
  includes_safer_alternative_handoff_summary: true
  includes_drift_event_summary: true
  raw_payloads_excluded: true
  summary: Support bundle reproduces the missing-debug-subprotocol explanation, the BSP adapter snapshot, the drift event summary, and the three safer-alternative-handoff labels with copy-command marked as primary.
issue_handoff_prefill_card:
  copy_export_redaction_class: metadata_safe_default
  includes_capability_loss_explanation: true
  includes_active_adapter_snapshot: true
  includes_safer_alternative_handoff_summary: true
  workspace_id_only_no_raw_paths: true
  raw_payloads_excluded: true
  summary: Issue handoff prefill names the workspace by opaque id, cites the BSP debug-subprotocol posture, and lists the three safer-alternative-handoff labels.
command_result_message_card:
  delivery_surface_class_set:
    - run_test_build_debug_picker_detail_card
    - quick_open_detail_pane
    - command_palette_result_card
    - output_pane_header_drawer
    - ai_action_sheet_detail_card
    - command_result_message_card
  includes_capability_loss_label_text: true
  includes_safer_alternative_handoff_label_text: true
  includes_drawer_state_label_text: true
  raw_payloads_excluded: true
  summary: Command-result messages render Missing adapter coverage, Debug subprotocol missing on the active build server, and the primary Copy command to terminal label across pickers, quick-open, command palette, output pane header, AI action sheet, and command-result message card.
summary: gradle_jvm:server:debug_runnable drawer renders Missing adapter coverage on the BSP adapter; primary safer-alternative is a copy-command external handoff to a JDWP attach in the system terminal; secondary is to reattach the BSP session through extension review; tertiary is escalation to the workspace admin via policy review.
