    - quick_open_detail_pane
    - command_palette_result_card
    - output_pane_header_drawer
    - ai_action_sheet_detail_card
    - ci_overlay_detail_card
    - command_result_message_card
  includes_capability_loss_label_text: true
  includes_safer_alternative_handoff_label_text: true
  includes_drawer_state_label_text: true
  raw_payloads_excluded: true
  summary: Command-result messages render Blocked by toolchain drift, Toolchain unavailable in active context, and the primary Repair toolchain (extension review) label across pickers, quick-open, command palette, output pane header, AI action sheet, CI overlay, and command-result message card.
summary: orders-service drawer renders Blocked by toolchain drift across all four actions; primary safer-alternative is repair-toolchain via extension review; secondary is install-or-attach native runner; tertiary is widen-scope so the heuristic adapter can cover sibling targets.
