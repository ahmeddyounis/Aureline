# Multi-document YAML fixture for the adapter-drift-after-toolchain-change drawer case.
__fixture__:
  name: adapter_drift_after_toolchain_change_drawer
  scenario: >
    A Java/Maven workspace was running on a native Maven runner with
    authoritative coverage. The user changed the active JDK toolchain
    pin via the workspace settings; the new JDK is unavailable in the
    active context (the corresponding extension pack was disabled by
    a policy review hours earlier and is not yet reattached). The
    native Maven runner cannot resolve a fresh invocation; an adapter
    drift event of class capability_downgrade_disclosed_lower_confidence
    fires with drift_reason_class
    toolchain_unavailable_in_active_context. Run / test / build /
    debug all narrow to a fallback posture across the orders-service
    target. The picker, problems pane, output pane header, AI action
    sheet, CI overlay, and support-bundle export all open the same
    drawer. The drawer's drawer_state_class is
    capability_blocked_by_toolchain_drift, the capability-loss
    explanation is
    blocked_by_toolchain_unavailable_in_active_context, and the
    primary safer-alternative is repair_toolchain_via_extension_review
    with secondary install_or_attach_native_runner_via_extension_review
    and tertiary widen_workset_scope_via_review (in case the user
    wants to fall back to a sibling target the heuristic adapter can
    cover).
  exercised:
    drawer_state_class: capability_blocked_by_toolchain_drift
    drawer_state_label_text: Blocked by toolchain drift
    result_class: blocked_by_environment_or_toolchain_state
    capability_loss_explanation_class: blocked_by_toolchain_unavailable_in_active_context
    primary_safer_alternative_handoff_class: repair_toolchain_via_extension_review
    secondary_safer_alternative_handoff_class: install_or_attach_native_runner_via_extension_review
    tertiary_safer_alternative_handoff_class: widen_workset_scope_via_review
    copy_export_disclosure_class: exported_with_capability_loss_summary_only
    drawer_scope_class: scope_target_all_actions
  seed_roles:
    - toolchain_drift_drawer
    - repair_toolchain_primary_safer_alternative
    - install_or_attach_secondary_safer_alternative
    - widen_scope_tertiary_safer_alternative
---
$schema: ../../../schemas/tooling/fallback_confidence_drawer.schema.json
record_kind: fallback_confidence_drawer_record
fallback_confidence_drawer_schema_version: 1
drawer_record_id: drawer:orders_service_workspace:orders_service:debug_runnable:blocked_by_toolchain_drift:01
captured_at: 2026-04-30T17:05:00.000Z
workspace_id: wks:orders_service
workset_scope_class: named_workset
workset_scope_ref: scope:orders_service:named_workset:server:01
drawer_scope_class: scope_target_all_actions
target_id_ref: tgt:tooling.target:orders_service:server
publishing_graph_id_ref: graph:tooling.target_graph:orders_service:maven_after_toolchain_drift:01
affected_action_class_set:
  - run
  - test
  - build
  - debug
drawer_state_class: capability_blocked_by_toolchain_drift
drawer_state_label_text: Blocked by toolchain drift
result_class: blocked_by_environment_or_toolchain_state
linked_fallback_confidence_record_id_ref: fallback:orders_service_workspace:toolchain_unavailable:01
linked_adapter_drift_event_id_ref: drift:orders_service_workspace:jdk_toolchain_unavailable:01
linked_degraded_capability_handoff_record_id_ref: null
current_adapter_snapshot:
