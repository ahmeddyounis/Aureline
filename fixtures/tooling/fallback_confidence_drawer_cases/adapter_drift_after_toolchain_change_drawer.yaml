  adapter_class: native_build_runner
  adapter_confidence_ceiling: structured_parse_match
  publishing_graph_id_ref: graph:tooling.target_graph:orders_service:maven_after_toolchain_drift:01
  snapshot_partial_truth_class: partial_adapter_degraded_pending_recovery
  snapshot_freshness_class: stale_pending_refresh
  summary: Native Maven runner remains attached but cannot resolve invocations because the pinned JDK toolchain is unavailable in the active context.
source_kind_class: native_runner_active
confidence_tier: degraded_partial
capability_loss_explanation:
  capability_loss_explanation_class: blocked_by_toolchain_unavailable_in_active_context
  capability_loss_explanation_label_text: Toolchain unavailable in active context
  capability_loss_explanation_sentence: orders-service run, test, build, and debug are blocked because the native Maven runner cannot resolve invocations against the pinned JDK toolchain in the active context; the JDK extension pack is currently disabled by an admin policy review.
  names_active_adapter_class: true
  names_typed_reason: true
safer_alternative_handoff_set:
  - safer_alternative_handoff_class: repair_toolchain_via_extension_review
    safer_alternative_handoff_label_text: Repair toolchain (extension review)
    safer_alternative_presentation_class: primary_button_in_drawer
    preserves_current_work: true
    routes_through_safe_review: true
    linked_recovery_or_escalation_action_class: escalate_to_workspace_admin_via_policy_review
    external_handoff: null
    rerun_last_invocation: null
    summary: Open the toolchain-repair extension review to restore the pinned JDK; current work, breakpoints, run profiles, and session state are preserved.
  - safer_alternative_handoff_class: install_or_attach_native_runner_via_extension_review
    safer_alternative_handoff_label_text: Install or attach native runner (extension review)
    safer_alternative_presentation_class: secondary_button_in_drawer
    preserves_current_work: true
    routes_through_safe_review: true
    linked_recovery_or_escalation_action_class: install_or_attach_native_runner_via_extension_review
    external_handoff: null
    rerun_last_invocation: null
    summary: Re-attach a different Maven runner build through extension review when the JDK pin cannot be repaired in the active context.
  - safer_alternative_handoff_class: widen_workset_scope_via_review
    safer_alternative_handoff_label_text: Widen workset scope (review)
    safer_alternative_presentation_class: tertiary_link_in_drawer
    preserves_current_work: true
    routes_through_safe_review: true
    linked_recovery_or_escalation_action_class: widen_workset_scope_via_review
    external_handoff: null
    rerun_last_invocation: null
    summary: Widen the active workset scope through review so the heuristic adapter can cover sibling targets while the toolchain repair is pending.
