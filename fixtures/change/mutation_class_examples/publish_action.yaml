__fixture__:
  name: publish_action
  scenario: >
    A publish action sends data to an external system (registry, remote,
    companion service). The primary effect lands outside local authority.

record_kind: mutation_class_example
mutation_class_examples_schema_version: 1

example_id: mutation_class_example.publish_action.registry_publish
mutation_class: external_effect
title: "Publish action (external effect)"

scenario_summary: >
  Publish actions are external-effect mutations. They require explicit
  target identity and an approval posture, and default to audit-only
  reversal semantics unless a compensating flow is explicitly declared.

expected:
  reversal_class: audit_only
  preview:
    required: true
    minimum_fields:
      - explicit target identity (service/account/remote)
      - side-effect scope summary (what will be published and where)
      - approval posture (ticket id or explicit not-required policy basis)
      - declared reversal class (audit_only)
  approval:
    posture: required
  journal:
    must_set_fields:
      - target_refs includes external_service with logical_ref
      - side_effect_summary.external_targets non-empty
      - policy_context.policy_epoch
      - approval_ref (when approval-gated)
      - reversal_class=audit_only
  support_export:
    must_include:
      - external target identity + approval ref + policy epoch

targets:
  - target_kind: external_service
    identity: logical_ref_required

