__fixture__:
  name: ownerless_expired_mute
  scenario: >
    Expired manual mute whose original owner is missing. The row is
    intentionally degraded: it requires handoff, remains visible in
    release evidence, and blocks stable promotion until a new owner
    renews, lifts, or converts it to explicit waiver-linked debt.
  exercised_classes_summary:
    record_kind: test_quarantine_or_mute_record
    treatment_kind_class: expired_mute
    ui_export_state_class: manually_muted
    owner_state_class: owner_missing_requires_handoff
    release_debt_class: release_blocking_debt
    redaction_class: metadata_and_hashes_only

