# yaml-language-server: $schema=../../../schemas/testing/quarantine_record.schema.json
__fixture__:
  name: time_bounded_quarantine
  scenario: >
    Active time-bounded quarantine for a reproduced flaky test item.
    The row has an owner, backup owner, evidence, expiry, review
    cadence, unblock conditions, waiver linkage, and mandatory
    visibility in scorecards, claim manifests, stable-promotion
    packets, and release evidence packets.
  exercised_classes_summary:
    record_kind: test_quarantine_or_mute_record
    treatment_kind_class: quarantine
    ui_export_state_class: quarantined_pending_investigation
    reason_class: reproduced_flaky_threshold_met
    release_debt_class: waiver_linked_debt
    redaction_class: metadata_and_hashes_only

record_kind: test_quarantine_or_mute_record
quarantine_record_schema_version: 1
treatment_record_id: testing.quarantine.case_eta.active.0001
treatment_kind_class: quarantine
ui_export_state_class: quarantined_pending_investigation
ui_export_label: Quarantined pending investigation

owner:
  owner_state_class: owned_by_team
  owner_actor_ref: actor.test_tooling.lead
  owner_team_ref: team.test_tooling
  backup_owner_ref: actor.release.backup
  owning_policy_ref: null
  handoff_ticket_ref: null
  owner_transfer_due_at: null

reason_class: reproduced_flaky_threshold_met

evidence_linkage:
  primary_evidence_ref: evidence.test.case_eta.flake_window.0001
  evidence_refs:
    - evidence.test.case_eta.flake_window.0001
    - evidence.test.case_eta.local_rerun.0002
  triage_packet_refs:
    - testing.triage.case_eta.flake.0001
  test_session_refs:
    - testing.test_session.local_watch.0001
  test_attempt_refs:
    - testing.test_attempt.local_watch.0001.cycle_2
    - testing.test_attempt.local_watch.0001.cycle_3
  flaky_history_ref: execution.flaky_history.cargo_test.crate_b.case_eta_param_instance_1.0001
  execution_quarantine_record_ref: execution.quarantine.cargo_test.crate_b.case_eta_param_instance_1.0001
  support_export_refs:
    - support.export.test_session.local.watch.0001
  release_evidence_packet_refs:
    - release.evidence_packet.test_trust.preview.0001

scope:
  scope_class: parameterized_instance
  canonical_test_item_refs:
    - canonical_test_item.cargo_test.crate_b.case_eta::param_instance_1
  selector_ref: testing.selector.case_eta.param_instance_1
  target_environment_refs:
    - execution.environment_matrix.local.watch.0001
  release_channel_scope:
    - preview
    - beta
    - stable
  deployment_profile_refs:
    - deployment.profile.desktop_local_first
  scope_summary: Parameterized instance is quarantined only for the named local desktop profile and claimed release channels.

surfaces:
  allowed_muting_surface_classes: []
  mandatory_visibility_surface_classes:
    - test_tree
    - history_row
    - cli_output
    - review_packet
    - support_export
    - release_scorecard
    - claim_manifest
    - stable_promotion_packet
    - release_evidence_packet
  release_visibility_required: true

expiry:
  opened_at: "2026-04-29T09:10:00Z"
  expires_at: "2026-05-13T09:10:00Z"
  lifted_at: null
  expiry_state_class: active_time_bounded
  expiry_trigger_class: absolute_time
  policy_epoch_ref: null
  expiry_summary: Quarantine expires after a two-week investigation window and cannot clear without stable rerun evidence.

review:
  review_cadence_class: before_release_candidate
  last_reviewed_at: "2026-04-29T09:20:00Z"
  next_review_due_at: "2026-05-06T09:20:00Z"
  review_owner_ref: actor.test_tooling.lead
  batch_review_group_ref: testing.quarantine.batch.flaky_window.0001
  batch_review_required: true
  review_summary: Release-candidate review must decide whether to renew, fix, narrow the claim, or close with stable evidence.

unblock_conditions:
  condition_classes:
    - stable_streak_required
    - local_rerun_pass_window_required
    - owner_triage_required
  required_stable_window: P7D
  required_attempt_count: 10
  unblock_evidence_refs: []
  unblock_owner_ref: actor.test_tooling.lead
  unblock_summary: Ten comparable local attempts over seven days must pass before the row can become stable again.

release_packet_treatment:
  counted_in_scorecards: true
  included_in_claim_manifests: true
  included_in_stable_promotion_packets: true
  release_debt_class: waiver_linked_debt
  waiver_refs:
    - waiver.test_quarantine.case_eta.preview.0001
  debt_item_ref: debt.test_quarantine.case_eta.0001
  claim_manifest_row_refs:
    - claim_row.test_trust.desktop_local_first
  scorecard_row_refs:
    - scorecard.test_trust.flaky_quarantine.active_count
  stable_promotion_packet_refs:
    - promotion_packet.test_trust.preview_to_beta.0001
  release_treatment_summary: The row narrows the affected test-trust claim and remains counted as active waiver-linked debt.

automation_controls:
  automation_open_class: automation_may_open_with_assigned_owner
  automation_extension_class: automation_may_extend_once_with_owner_review
  max_auto_extension_count: 1
  current_auto_extension_count: 0
  owner_handoff_required: false
  team_transfer_requires_handoff: true
  silent_indefinite_forbidden: true

prior_treatment_record_refs: []
audit_event_refs:
  - test_quarantine_or_mute_record_published
  - test_quarantine_or_mute_record_release_debt_projected
  - test_quarantine_or_mute_record_batch_review_required
denial_reason_class: null
captured_at: "2026-04-29T09:25:00Z"
redaction_class: metadata_and_hashes_only
approval_ticket_ref: null
notes: Active time-bounded quarantine remains release-visible and owner-backed.
