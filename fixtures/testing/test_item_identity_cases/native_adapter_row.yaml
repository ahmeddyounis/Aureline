__fixture__:
  name: native_adapter_row
  scenario: >
    Native adapter identity row for a local Rust test case. The row
    separates canonical identity from display label, cites logical
    suite and case segments, pins a source span through a VFS source
    ref, names the adapter and framework family, and binds the identity
    to a local execution-context snapshot.
  exercised_classes_summary:
    record_kind: test_item_identity_record
    adapter_kind_class: native_aureline_adapter
    framework_family_class: rust_cargo_test
    identity_durability_class: durable_exact
    selector_export_class: exact_id_selectable

