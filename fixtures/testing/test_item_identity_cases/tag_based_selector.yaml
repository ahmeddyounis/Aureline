# yaml-language-server: $schema=../../../schemas/testing/test_selector_grammar.schema.json
__fixture__:
  name: tag_based_selector
  scenario: >
    Saved selector for tests tagged auth and runnable on the current
    target. The AST combines a tag selector with a capability selector,
    resolves to canonical identities, and records a policy-omitted
    scope without relying on display names.
  exercised_classes_summary:
    record_kind: test_selector_expression_record
    selector_resolution_class: tag_query_match
    target_binding_class: snapshot_target_bound
    selector_import_safety_class: import_safe_no_raw_paths

record_kind: test_selector_expression_record
test_selector_grammar_schema_version: 1
test_selector_expression_record_id: testing.selector.tag.auth.runnable.0001
selector_canonical_digest: digest.selector.tag_auth_and_run.v1
selector_ast:
  operator_class: all_of
  explainability_note: Match auth-tagged tests that are runnable on the bound target.
  children:
    - operator_class: atom
      selector_atom_class: tag
      match_semantics_class: tag_membership
      match_value:
        value_ref: tag.testing.auth
        escaped_value: auth
        value_digest: digest.selector_value.tag.auth
        source_provider_class: null
        parameterized_family_key: null
        parameter_instance_key: null
        trait_capability_class: null
        file_scope_class: null
      explainability_note: Tag membership comes from adapter-normalized test metadata.
    - operator_class: atom
      selector_atom_class: trait_or_capability
      match_semantics_class: trait_or_capability_match
      match_value:
        value_ref: capability.testing.run
        escaped_value: run
        value_digest: digest.selector_value.capability.run
        source_provider_class: null
        parameterized_family_key: null
        parameter_instance_key: null
        trait_capability_class: run
        file_scope_class: null
      explainability_note: Capability match excludes read-only imported rows.
escape_profile:
  escape_profile_id: testing.escape_profile.default.v1
  reserved_character_rule_class: backslash_escape_reserved_ascii
  unicode_normalization_class: nfc_before_escape
  import_context_class: saved_view
  path_policy_class: source_ref_only
  reserved_characters_digest: digest.escape.reserved_ascii.v1
discovery_snapshot_ref: execution.test_discovery_state.local.auth_tests.0001
target_environment_ref: testing.target_environment.local.auth_tests.0001
selector_resolution_class: tag_query_match
target_binding_class: snapshot_target_bound
selector_import_safety_class: import_safe_no_raw_paths
matched_test_item_identity_refs:
  - testing.identity.native.auth_totals.0001
  - testing.identity.native.auth_matrix.family
expanded_from_family_refs:
  - testing.identity.native.auth_matrix.family
remap_record_refs: []
omitted_scope_summaries:
  - omitted_scope_ref: policy.scope.managed_only_auth_rotation
    omission_reason: Managed-only tests are omitted on the local target under current policy.
explainability_notes:
  - Selector matched tag metadata and runnable capability; it did not match display labels.
audit_event_refs:
  - audit_event.test_selector_expression_record.published
  - audit_event.test_selector_expression_record_resolved
denial_reason_class: null
captured_at: "2026-04-29T08:15:00Z"
redaction_class: metadata_and_hashes_only
approval_ticket_ref: null
notes: >
  Saved view remains portable only while the discovery snapshot and
  target binding are compatible.
