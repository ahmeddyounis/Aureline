# yaml-language-server: $schema=../../../schemas/testing/ai_test_generation_gate.schema.json
__fixture__:
  name: ai_test_generation_protected_path_blocked
  scenario: >
    AI proposes a regression test based on uncovered changed code, but
    the patch touches a protected release-bearing test path. Evidence and
    preview exist, selector truth is exact, and the gate still blocks
    automatic landing until owner review.
  exercised_classes_summary:
    record_kind: ai_test_generation_gate_record
    gate_decision_class: blocked_protected_path
    protected_path_restriction_class: protected_path_review_required
    preview_requirement_class: preview_present
    no_automatic_land_class: proposal_only_no_apply
    redaction_class: metadata_and_hashes_only

record_kind: ai_test_generation_gate_record
ai_test_generation_gate_schema_version: 1
ai_test_generation_gate_record_id: testing.ai_test_gate.delta.protected_path.0001

requested_scope:
  requested_scope_class: uncovered_path_scope
  selector_refs:
    - testing.selector.delta.changed_uncovered_paths.0001
  canonical_test_item_refs:
    - canonical_test_item.delta.regression.guard.expected
  source_object_refs:
    - source.object.delta.changed_component
  coverage_merge_result_refs:
    - testing.coverage_merge.delta.changed_paths.0001
  test_session_refs:
    - testing.test_session.local_run.delta.coverage.0001
  target_environment_refs:
    - execution.environment.local.linux.test.0001
  scope_summary: Proposal targets a changed uncovered component through an exact selector record.

cited_evidence:
  - evidence_citation_id: testing.ai_test_gate.evidence.delta.coverage
    evidence_source_class: coverage_merge_result
    evidence_ref: testing.coverage_merge.delta.changed_paths.0001
    freshness_ref: freshness.coverage.delta.changed_paths.current
    supports_requested_scope: true
    evidence_summary: Current changed-path coverage identifies uncovered lines in the requested component scope.
  - evidence_citation_id: testing.ai_test_gate.evidence.delta.review
    evidence_source_class: review_comment
    evidence_ref: review.comment.delta.regression_request.0001
    freshness_ref: freshness.review.delta.current
    supports_requested_scope: true
    evidence_summary: Review evidence requested a regression guard for the changed component behavior.

selector_truth:
  selector_resolution_class: resolved_exact
  selector_widening_class: no_widening
  matched_canonical_test_item_refs:
    - canonical_test_item.delta.regression.guard.expected
  omitted_scope_refs: []
  unresolved_selector_refs: []
  selector_truth_summary: Selector resolves to the intended generated regression guard without widening.

protected_path_review:
  protected_path_restriction_class: protected_path_review_required
  protected_path_refs:
    - protected_path.release_regression_tests
  claimed_stable_path_refs:
    - stable_surface.release_regression_suite
  required_owner_or_reviewer_refs:
    - team.release_quality
    - actor.release_quality.backup
  policy_refs:
    - policy.protected_paths.release_tests
  restriction_summary: Proposed patch touches release-bearing regression tests and requires explicit owner review.

preview_gate:
  preview_requirement_class: preview_present
  preview_completeness_class: partial_due_to_protected_paths
  patch_preview_ref: editor.refactor_preview.delta.ai_generated_test.0001
  review_sheet_ref: review.sheet.delta.ai_generated_test.0001
  rollback_or_checkpoint_refs:
    - checkpoint.ai_test_generation.delta.before_preview.0001
  preview_summary: Patch preview exists, but completeness is blocked by protected-path review requirements.

sandbox_run_plan:
  sandbox_plan_class: sandbox_plan_pending
  side_effect_posture_class: local_write_preview_only
  planned_command_refs:
    - command.test.run.delta.regression_guard.sandbox
  target_environment_refs:
    - execution.environment.local.linux.test.0001
  result_attempt_refs: []
  sandbox_summary: Sandbox execution is pending and cannot be counted as validation success.

gate_decision_class: blocked_protected_path
no_automatic_land_class: proposal_only_no_apply
proposal_branch_or_worktree_ref: null
gate_summary: AI-generated test remains a proposal because protected-path owner review and sandbox result are missing.
audit_event_refs:
  - audit_event.ai_test_generation_gate.published
  - audit_event.ai_test_generation_gate.blocked_protected_path
denial_reason_class: ai_test_generation_gate_must_block_protected_path_without_review
captured_at: "2026-04-29T17:30:00Z"
redaction_class: metadata_and_hashes_only
approval_ticket_ref: null
notes: The gate preserves evidence and preview while refusing automatic landing on a protected path.
