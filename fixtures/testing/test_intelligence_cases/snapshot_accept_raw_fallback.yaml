# yaml-language-server: $schema=../../../schemas/testing/snapshot_acceptance_review.schema.json
__fixture__:
  name: snapshot_accept_raw_fallback
  scenario: >
    Snapshot review for a golden update where one artifact uses raw
    fallback because the structured renderer cannot safely display it.
    Acceptance is per artifact, counts remain visible, and rollback is
    linked to local history.
  exercised_classes_summary:
    record_kind: snapshot_acceptance_review_record
    render_mode_class: mixed_rendered_and_text_fallback
    fallback_reason_class: structured_renderer_unavailable
    acceptance_granularity_class: individual_artifact
    review_state_class: partially_accepted
    redaction_class: metadata_and_hashes_only

record_kind: snapshot_acceptance_review_record
snapshot_acceptance_review_schema_version: 1
snapshot_acceptance_review_record_id: testing.snapshot_acceptance.gamma.raw_fallback.0001
base_snapshot_review_ref: execution.snapshot_review.gamma.golden_serializer.0001
test_session_ref: testing.test_session.local_run.gamma.snapshot.0001
test_attempt_ref: testing.test_attempt.local_run.gamma.snapshot.0001

baseline_identity_class: vcs_committed_baseline
baseline_artifact_event_refs:
  - artifact_event.snapshot.gamma.baseline.rendered_panel
  - artifact_event.snapshot.gamma.baseline.binary_token_map
proposed_artifact_event_refs:
  - artifact_event.snapshot.gamma.proposed.rendered_panel
  - artifact_event.snapshot.gamma.proposed.binary_token_map

render_mode_class: mixed_rendered_and_text_fallback
fallback_reason_class: structured_renderer_unavailable

environment_scope:
  environment_scope_class: local_environment
  target_environment_refs:
    - execution.environment.local.macos.snapshot.0001
  serializer_ref: serializer.gamma.golden.v3
  runtime_ref: runtime.gamma.preview.local.0001
  source_revision_ref: source.revision.workspace.gamma.2026_04_29
  platform_refs:
    - platform.macos.arm64
  theme_or_device_scope_refs:
    - theme.default.dark
    - device.desktop.compact
  data_posture_ref: data.posture.mock_fixture.gamma.0001
  scope_summary: Acceptance applies only to the local macOS compact dark-theme serializer scope.

acceptance_granularity_class: individual_artifact
artifact_counts:
  total_artifact_count: 2
  accepted_count: 1
  rejected_count: 0
  pending_count: 1
  blocked_count: 0
  unreviewable_count: 0
  raw_fallback_count: 1
  text_fallback_count: 0

artifact_review_items:
  - artifact_review_item_id: testing.snapshot_item.gamma.rendered_panel
    subject_artifact_ref: snapshot.artifact.gamma.rendered_panel
    baseline_artifact_event_ref: artifact_event.snapshot.gamma.baseline.rendered_panel
    proposed_artifact_event_ref: artifact_event.snapshot.gamma.proposed.rendered_panel
    artifact_change_class: artifact_updated_minor
    render_mode_class: rendered_pixel_or_perceptual_diff
    fallback_reason_class: not_needed_render_available
    artifact_decision_class: accepted_for_apply
    decision_actor_ref: actor.snapshot_reviewer.primary
    rollback_ref: local_history.snapshot.gamma.rendered_panel.before_accept
    item_summary: Minor rendered diff accepted with a local-history rollback ref.
  - artifact_review_item_id: testing.snapshot_item.gamma.binary_token_map
    subject_artifact_ref: snapshot.artifact.gamma.binary_token_map
    baseline_artifact_event_ref: artifact_event.snapshot.gamma.baseline.binary_token_map
    proposed_artifact_event_ref: artifact_event.snapshot.gamma.proposed.binary_token_map
    artifact_change_class: artifact_updated_major
    render_mode_class: raw_fallback_only
    fallback_reason_class: structured_renderer_unavailable
    artifact_decision_class: decision_pending_review
    decision_actor_ref: null
    rollback_ref: local_history.snapshot.gamma.binary_token_map.before_review
    item_summary: Raw fallback remains pending; reviewer must inspect the bounded metadata summary before any apply.

rollback_availability_class: available_local_history
rollback_or_local_history_refs:
  - local_history.snapshot.gamma.rendered_panel.before_accept
  - local_history.snapshot.gamma.binary_token_map.before_review
review_state_class: partially_accepted
review_summary: One rendered artifact accepted; one raw-fallback artifact remains pending and prevents blind accept-all.
audit_event_refs:
  - audit_event.snapshot_acceptance_review.published
  - audit_event.snapshot_acceptance_review.partial_decision_recorded
denial_reason_class: null
captured_at: "2026-04-29T16:10:00Z"
redaction_class: metadata_and_hashes_only
approval_ticket_ref: null
notes: Raw fallback is visible as degraded review mode and does not imply whole-review acceptance.
