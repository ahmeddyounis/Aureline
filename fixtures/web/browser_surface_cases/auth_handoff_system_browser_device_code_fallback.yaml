__fixture__:
  name: auth_handoff_system_browser_device_code_fallback
  scenario: >
    A sign-in flow prefers system browser handoff, but the browser
    launch is unavailable or blocked. The interstitial offers device-
    code fallback while asserting preserved local work. Silent embedded
    webview fallback is forbidden.
  matrix_row_ref: web_surface_row.auth_handoff.system_browser_first
  references:
    - docs/web/scoped_browser_surface_matrix.md
    - docs/auth/system_browser_callback_packet.md
    - docs/auth/auth_handoff_interstitial_contract.md

handoff:
  auth_flow_class: system_browser
  system_browser_launch_state: blocked_or_unavailable
  fallback_path:
    fallback_class: device_code
    disclosure: >
      Use the device code flow. Local editing/search/Git/tasks remain
      available while sign-in is pending.
  preserved_local_work:
    posture_class: local_work_intact_with_managed_narrowed
    retained_capabilities:
      - edit_save_undo
      - local_search_and_navigation
      - local_git_operations
      - local_tasks_and_tooling
    blocked_capabilities:
      - managed_sync
      - managed_marketplace_install
      - managed_collaboration_join
  forbidden_fallbacks:
    - embedded_webview_silent_fallback
    - embedded_webview_final_approval
  required_disclosure:
    callback_origin_review_present: true
    return_path_label: "Return to Aureline desktop (workspace-bound)"

