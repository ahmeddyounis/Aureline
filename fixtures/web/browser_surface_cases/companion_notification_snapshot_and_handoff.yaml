__fixture__:
  name: companion_notification_snapshot_and_handoff
  scenario: >
    A scoped companion receives a notification about a provider-linked
    object. The companion shows a privacy-preserving snapshot and can
    follow via a typed browser-handoff packet, but cannot confirm
    high-risk approvals inline.
  matrix_row_ref: web_surface_row.companion_notifications.scoped_companion
  references:
    - docs/web/scoped_browser_surface_matrix.md
    - docs/companion/companion_surface_contract.md
    - artifacts/auth/native_approval_boundary_review.yaml

companion:
  delivery_mode: scoped_browser_companion
  notification_payload:
    summary_label: "CI check requires review"
    redaction_class: metadata_and_hashes_only
    raw_provider_url_present: false
    raw_token_present: false
  allowed_actions:
    - open_in_desktop
    - follow_via_browser_handoff_packet
  forbidden_actions:
    - inline_confirm_high_risk_approval
    - launch_local_shell_or_kernel
  handoff:
    requires_typed_packet: true
    fallback_when_packet_missing: "open_in_desktop_only"

