$schema: ../../../schemas/platform/native_file_affordance.schema.json
__fixture__:
  name: suspicious_content_preview_and_transfer_preserve_safe_preview_posture
  scenario: >
    A file containing suspicious content is opened via drag/drop or clipboard path
    paste. The safe-preview trust class and suspicious-content status must remain
    inspectable, and copy/drag-drop semantics must be representation-labeled.
  exercised_axes:
    affordance_class: drag_drop
    target_kind: local_file
    availability_class: exact_available
    trust_state: trusted
    write_posture: blocked_requires_review
  contract_sections:
    - "2.4 Safe-preview status is preserved across handoff"

record_kind: native_file_affordance_case_record
native_file_affordance_schema_version: 1
case_id: platform:native-file-affordance:drag-drop:suspicious-content:01
affordance_class: drag_drop
target_kind: local_file
scenario_summary: Suspicious-content detection and safe-preview trust class remain visible after OS handoff; transfer actions name raw/rendered/escaped representations explicitly.

canonical_backing_refs:
  command_id_ref: "cmd:workspace.open_file"
  object_identity_ref: "obj:vfs:file:suspicious:01"
  system_open_target_packet_ref: null
  deep_link_intent_ref: null
  browser_handoff_packet_ref: null
  save_target_token_ref: "save_token:suspicious-content:01"
  write_review_sheet_ref: "write_review:suspicious-content:01"
  suspicious_content_ref: "suspicious:case:bidi-control:01"
  decode_recovery_review_ref: null

literal_input:
  literal: "/Users/dev/src/confusable.rs"
  format_class: posix_path
  display_label: "confusable.rs"

binding:
  availability_class: exact_available
  external_path_classes:
    - local_volume
  trust_state: trusted
  safe_preview_trust_class: RawText
  suspicious_content_classes:
    - bidi_control
    - invisible_formatting
  outside_expected_scope: false
  alias_disclosure_required: false
  write_posture: blocked_requires_review

expected_behavior:
  review_surface_class: target_review_sheet
  save_token_posture: minted_for_open_or_entry
  must_preserve_identity: true
  must_preserve_safe_preview_status: true
  must_not_write_without_token: true

must_not_happen:
  - "generic Copy action with no representation label despite suspicious-content findings"
  - "drag-drop open bypasses safe-preview posture and allows silent write without review"

evidence_hooks:
  - "docs/security/safe_preview_trust_classes.md"
  - "docs/ux/clipboard_history_contract.md"
  - "docs/ux/native_file_affordance_contract.md"

audit_event_id: platform.system_affordance_case_exercised

