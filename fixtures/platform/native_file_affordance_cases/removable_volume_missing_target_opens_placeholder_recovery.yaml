$schema: ../../../schemas/platform/native_file_affordance.schema.json
__fixture__:
  name: removable_volume_missing_target_opens_placeholder_recovery
  scenario: >
    A removable volume target is requested (system-open or open dialog), but the
    volume is no longer mounted. The product must open a truthful placeholder and
    offer bounded recovery actions rather than silently opening an empty shell.
  exercised_axes:
    affordance_class: native_open_dialog
    target_kind: removable_volume
    availability_class: missing_or_unmounted
    trust_state: trusted
    write_posture: blocked_requires_retarget
  contract_sections:
    - "2.3 No silent wrong-target writes"
    - "4. Out-of-scope paths/URIs and trust scope mismatches"

record_kind: native_file_affordance_case_record
native_file_affordance_schema_version: 1
case_id: platform:native-file-affordance:open-dialog:removable-volume:01
affordance_class: native_open_dialog
target_kind: removable_volume
scenario_summary: Missing removable-volume targets open a placeholder with locate/cached/cancel recovery instead of an empty workspace.

canonical_backing_refs:
  command_id_ref: "cmd:workspace.open_file"
  object_identity_ref: "obj:vfs:placeholder:removable-volume:01"
  system_open_target_packet_ref: null
  deep_link_intent_ref: null
  browser_handoff_packet_ref: null
  save_target_token_ref: null
  write_review_sheet_ref: null
  suspicious_content_ref: null
  decode_recovery_review_ref: null

literal_input:
  literal: "/Volumes/USBDrive/src/app.ts"
  format_class: posix_path
  display_label: "/Volumes/USBDrive/src/app.ts"

binding:
  availability_class: missing_or_unmounted
  external_path_classes:
    - removable_volume
  trust_state: trusted
  safe_preview_trust_class: null
  suspicious_content_classes: []
  outside_expected_scope: false
  alias_disclosure_required: false
  write_posture: blocked_requires_retarget

expected_behavior:
  review_surface_class: placeholder_recovery_surface
  save_token_posture: unavailable_blocks_write
  must_preserve_identity: true
  must_preserve_safe_preview_status: false
  must_not_write_without_token: true

must_not_happen:
  - "missing removable-volume target opens an empty shell with no recovery path"
  - "product guesses a different mount and treats it as the same object"

evidence_hooks:
  - "docs/platform/system_open_target_truth.md#5-external-path-failure-degradation"
  - "docs/ux/desktop_affordance_contract.md#7-desktop-lifecycle-failure-contracts"
  - "docs/ux/native_file_affordance_contract.md"

audit_event_id: platform.system_affordance_case_exercised

