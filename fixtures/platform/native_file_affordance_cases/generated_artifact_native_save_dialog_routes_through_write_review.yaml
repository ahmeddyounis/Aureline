$schema: ../../../schemas/platform/native_file_affordance.schema.json
__fixture__:
  name: generated_artifact_native_save_dialog_routes_through_write_review
  scenario: >
    A user tries to save a generated, read-only artifact via a native save dialog.
    The dialog may be used for picking a destination, but Aureline must preserve
    generated/read-only posture and route through a write-review sheet before any
    overwrite-like action is admitted.
  exercised_axes:
    affordance_class: native_save_dialog
    target_kind: generated_artifact
    availability_class: available_read_only
    trust_state: trusted
    write_posture: blocked_requires_review
  contract_sections:
    - "3.2 Save: pick destination vs prove write safety"

record_kind: native_file_affordance_case_record
native_file_affordance_schema_version: 1
case_id: platform:native-file-affordance:save-dialog:generated-read-only:01
affordance_class: native_save_dialog
target_kind: generated_artifact
scenario_summary: Native save dialog cannot bypass generated/read-only write-review; overwrite risk and recovery posture remain product-visible.

canonical_backing_refs:
  command_id_ref: "cmd:filesystem.save_as"
  object_identity_ref: "obj:artifact:generated-report:01"
  system_open_target_packet_ref: null
  deep_link_intent_ref: null
  browser_handoff_packet_ref: null
  save_target_token_ref: "save_token:generated-artifact:01"
  write_review_sheet_ref: "write_review:generated-artifact:save-as:01"
  suspicious_content_ref: null
  decode_recovery_review_ref: null

literal_input:
  literal: "/Users/dev/Downloads/report.html"
  format_class: posix_path
  display_label: "report.html"

binding:
  availability_class: available_read_only
  external_path_classes:
    - local_volume
  trust_state: trusted
  safe_preview_trust_class: SanitizedRich
  suspicious_content_classes: []
  outside_expected_scope: false
  alias_disclosure_required: false
  write_posture: blocked_requires_review

expected_behavior:
  review_surface_class: write_review_sheet
  save_token_posture: minted_for_save_or_overwrite
  must_preserve_identity: true
  must_preserve_safe_preview_status: true
  must_not_write_without_token: true

must_not_happen:
  - "native save dialog hides generated/read-only posture and implies ordinary overwrite safety"
  - "save proceeds without a write-review sheet when write posture is constrained"

evidence_hooks:
  - "docs/ux/file_state_badge_and_write_review_contract.md"
  - "docs/io/save_target_token_and_write_guarantee_contract.md"
  - "fixtures/platform/system_affordance_cases/native_save_dialog_read_only_boundary.json"

audit_event_id: platform.system_affordance_case_exercised

