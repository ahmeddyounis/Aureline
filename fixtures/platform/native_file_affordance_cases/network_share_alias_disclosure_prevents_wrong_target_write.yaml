$schema: ../../../schemas/platform/native_file_affordance.schema.json
__fixture__:
  name: network_share_alias_disclosure_prevents_wrong_target_write
  scenario: >
    A file is opened from a network share (UNC or mapped drive). Aureline must
    preserve the literal target while disclosing alias truth and binding writes to
    canonical object identity.
  exercised_axes:
    affordance_class: file_association
    target_kind: network_share
    availability_class: exact_available
    trust_state: trusted
    write_posture: writes_allowed
  contract_sections:
    - "2.3 No silent wrong-target writes"
    - "3.3 Reveal-in-shell: identity truth, not path folklore"

record_kind: native_file_affordance_case_record
native_file_affordance_schema_version: 1
case_id: platform:native-file-affordance:file-association:network-share:01
affordance_class: file_association
target_kind: network_share
scenario_summary: Network-share opens disclose alias truth and converge to one canonical target before any write-like action.

canonical_backing_refs:
  command_id_ref: "cmd:workspace.open_file"
  object_identity_ref: "obj:vfs:file:network-share:01"
  system_open_target_packet_ref: "platform:system-open-target:unc-mapped-drive:converges:01"
  deep_link_intent_ref: null
  browser_handoff_packet_ref: null
  save_target_token_ref: "save_token:unc-mapped-drive:01"
  write_review_sheet_ref: null
  suspicious_content_ref: null
  decode_recovery_review_ref: null

literal_input:
  literal: "Z:\\src\\App.ts"
  format_class: windows_drive_path
  display_label: "Z:\\src\\App.ts"

binding:
  availability_class: exact_available
  external_path_classes:
    - network_share_mapped_drive
    - network_share_unc
  trust_state: trusted
  safe_preview_trust_class: null
  suspicious_content_classes: []
  outside_expected_scope: false
  alias_disclosure_required: true
  write_posture: writes_allowed

expected_behavior:
  review_surface_class: none
  save_token_posture: minted_for_open_or_entry
  must_preserve_identity: true
  must_preserve_safe_preview_status: false
  must_not_write_without_token: true

must_not_happen:
  - "network-share aliases open as two independent writable buffers"
  - "reveal-in-shell treats an alias as canonical truth without disclosure"

evidence_hooks:
  - "docs/platform/system_open_target_truth.md"
  - "fixtures/platform/network_share_alias_cases/unc_and_mapped_drive_alias_converges.yaml"
  - "docs/ux/native_file_affordance_contract.md"

audit_event_id: platform.system_affordance_case_exercised

