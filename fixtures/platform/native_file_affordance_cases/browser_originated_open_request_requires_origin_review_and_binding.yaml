$schema: ../../../schemas/platform/native_file_affordance.schema.json
__fixture__:
  name: browser_originated_open_request_requires_origin_review_and_binding
  scenario: >
    A browser-originated open request asks Aureline to open a local file or
    workspace candidate. The request must validate origin/scope and must not
    bypass trust or target review; the literal path/URI is bound before admission.
  exercised_axes:
    affordance_class: browser_originated_open_request
    target_kind: external_uri_or_out_of_scope
    availability_class: unknown
    trust_state: pending_evaluation
    write_posture: blocked_requires_review
  contract_sections:
    - "3.1 Open: selection vs admission"
    - "4. Out-of-scope paths/URIs and trust scope mismatches"

record_kind: native_file_affordance_case_record
native_file_affordance_schema_version: 1
case_id: platform:native-file-affordance:browser-originated:open-request:01
affordance_class: browser_originated_open_request
target_kind: external_uri_or_out_of_scope
scenario_summary: Browser-originated open requests validate origin and route through in-product review; identity binding and trust scope remain explicit.

canonical_backing_refs:
  command_id_ref: "cmd:workspace.open"
  object_identity_ref: "obj:entry:browser-originated:01"
  system_open_target_packet_ref: null
  deep_link_intent_ref: "intent:browser-open-request:01"
  browser_handoff_packet_ref: "browser_handoff:open-request:01"
  save_target_token_ref: null
  write_review_sheet_ref: null
  suspicious_content_ref: null
  decode_recovery_review_ref: null

literal_input:
  literal: "file:///Users/dev/Downloads/project.aureline-workspace"
  format_class: file_uri
  display_label: "project.aureline-workspace"

binding:
  availability_class: unknown
  external_path_classes:
    - unknown
  trust_state: pending_evaluation
  safe_preview_trust_class: null
  suspicious_content_classes: []
  outside_expected_scope: true
  alias_disclosure_required: false
  write_posture: blocked_requires_review

expected_behavior:
  review_surface_class: deep_link_interstitial
  save_token_posture: deferred_until_write
  must_preserve_identity: true
  must_preserve_safe_preview_status: false
  must_not_write_without_token: true

must_not_happen:
  - "browser-originated open request executes without origin validation and in-product review"
  - "file association or protocol handler silently widens workspace trust scope"

evidence_hooks:
  - "docs/ux/desktop_affordance_contract.md"
  - "schemas/platform/deep_link_intent.schema.json"
  - "docs/ux/native_file_affordance_contract.md"

audit_event_id: platform.system_affordance_case_exercised

