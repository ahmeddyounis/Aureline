$schema: ../../../schemas/platform/native_file_affordance.schema.json
__fixture__:
  name: local_file_native_open_dialog_binds_identity
  scenario: >
    A user uses the native open dialog to open a local file. The dialog produces a
    literal path, but Aureline binds the request to canonical identity before any
    write-like affordance is admitted.
  exercised_axes:
    affordance_class: native_open_dialog
    target_kind: local_file
    availability_class: exact_available
    trust_state: trusted
    write_posture: writes_allowed
  contract_sections:
    - "2. Invariants (non-negotiables)"
    - "3.1 Open: selection vs admission"

record_kind: native_file_affordance_case_record
native_file_affordance_schema_version: 1
case_id: platform:native-file-affordance:open-dialog:local-file:01
affordance_class: native_open_dialog
target_kind: local_file
scenario_summary: Native open dialog output is treated as literal input; Aureline binds identity and evaluates trust before any write posture is claimed.

canonical_backing_refs:
  command_id_ref: "cmd:workspace.open_file"
  object_identity_ref: "obj:vfs:file:local:01"
  system_open_target_packet_ref: null
  deep_link_intent_ref: null
  browser_handoff_packet_ref: null
  save_target_token_ref: null
  write_review_sheet_ref: null
  suspicious_content_ref: null
  decode_recovery_review_ref: null

literal_input:
  literal: "/Users/dev/src/app.ts"
  format_class: posix_path
  display_label: "/Users/dev/src/app.ts"

binding:
  availability_class: exact_available
  external_path_classes:
    - local_volume
  trust_state: trusted
  safe_preview_trust_class: null
  suspicious_content_classes: []
  outside_expected_scope: false
  alias_disclosure_required: false
  write_posture: writes_allowed

expected_behavior:
  review_surface_class: none
  save_token_posture: deferred_until_write
  must_preserve_identity: true
  must_preserve_safe_preview_status: false
  must_not_write_without_token: true

must_not_happen:
  - "native dialog result opens a writable buffer without canonical identity binding"
  - "presentation path is silently replaced with a canonical alias in UI"

evidence_hooks:
