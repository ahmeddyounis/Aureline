# Credential store locked on startup — unlock path + continue-local always available.
#
# Reviewer-side conformance case for:
# - docs/platform/native_trust_and_auth_conformance.md §6–§7
__fixture__:
  name: credential_store_locked_on_startup
  scenario: >
    The OS credential store is present but locked or waiting for user interaction
    at startup (Keychain on macOS, Credential Manager equivalent on Windows, Secret
    Service on the claimed GNOME Linux rows). Aureline surfaces a typed lock state,
    offers an unlock action, and continues local editing. Networked actions that
    require stored credentials remain blocked until unlock completes; no plaintext
    persistence fallback is used.
  drill_packet_ref: docs/platform/native_trust_and_auth_conformance.md
  contract_sections:
    - "§2 Shared invariants"
    - "§6 Settings and diagnostics"
  exercised_axes:
    unlock_state: locked
    retry_path_class: resume_after_credential_store_unlock

case_id: native-auth-trust-case:credential-store:locked-startup:01
case_class: credential_store_locked_on_startup
applies_to_claimed_profiles:
  - macos_15_plus_universal
  - windows_11_23h2_plus_x86_64
  - linux_ubuntu_24_04_gnome_wayland_x86_64
  - linux_ubuntu_24_04_gnome_x11_x86_64
  - linux_fedora_current_gnome_wayland_x86_64
  - linux_debian_stable_gnome_x11_x86_64

upstream_fixture_refs:
  credential_state_example: fixtures/auth/credential_state_cases/locked_keychain_on_launch.yaml
  callback_lock_state_example: fixtures/auth/callback_and_lock_state_cases/credential_store_locked_on_launch.json

expected_records_emitted:
  - credential_store_lock_state_record
  - credential_state_record

expected_projection_surfaces:
  - settings.credentials: shows store class + lock state + unlock action
  - auth.browser_handoff_card: continues to show preserved_local_work and continue-local without sign-in
  - support_bundle: includes store class/unlock state only (no credential material)

must_not_happen:
  - represent store lock as a generic error with no typed unlock action
  - block local editing because the credential store is locked
  - persist raw credentials to disk as a workaround

