    summary: Windows managed MSI/MSIX install with admin channel pinning.
  - case_id: scriptable_install_case:macos_mdm_update_deferral
    path: fixtures/platform/scriptable_install_cases/macos_mdm_update_deferral.yaml
    summary: macOS PKG managed deployment with update deferral and policy bundle location.
  - case_id: scriptable_install_case:linux_ubuntu_wayland_mirror_policy
    path: fixtures/platform/scriptable_install_cases/linux_ubuntu_wayland_mirror_policy.yaml
    summary: Ubuntu Wayland managed/offline mirror policy with extension mirror and proxy controls.
  - case_id: scriptable_install_case:portable_archive_removal_boundary
    path: fixtures/platform/scriptable_install_cases/portable_archive_removal_boundary.yaml
    summary: Portable archive extraction/removal boundary with no host mutation.
  - case_id: scriptable_install_case:unsupported_package_manager_gap
    path: fixtures/platform/scriptable_install_cases/unsupported_package_manager_gap.yaml
