schema_version: 1
record_kind: deployment_path_example_record
case_id: deployment_path_example:remote_helper_agent_runtime_disclosure
case_class: remote_helper_agent_deployment_disclosure
scenario_summary: >
  A remote attach diagnostic explains helper and agent runtime delivery
  through signed tarballs or image-layer bundles without implying any
  desktop install or desktop handler ownership.

runtime_profile_refs:
  - remote_linux_target
  - remote_container_target
package_manager_row_refs:
  - pkgmgr.remote.agent_helper_distribution
unsupported_path_refs:
  - unsupported_path.remote_helper.desktop_handler_ownership
  - unsupported_path.remote_helper.unnegotiated_runtime_skew
artifact_family_refs:
  - artifact_family.remote.agent_tarball
  - artifact_family.remote.helper_tarball
  - artifact_family.remote.agent_image_layer_bundle
channel_identity_refs:
  - channel_identity.remote_agent_runtime
  - channel_identity.remote_helper_runtime
state_root_refs:
  - remote_state.agent_runtime_root
  - remote_state.agent_capability_cache
  - remote_state.agent_image_layer_root
  - remote_state.helper_runtime_root
  - remote_state.helper_session_cache

tested_assumptions_to_show:
  distribution_sources:
    - golden_vm_or_container_image
    - internal_mirror
    - managed_fleet_bootstrap
    - private_registry_image_layer
    - on_demand_signed_helper_download
  verification_required:
    - artifact_signature
    - runtime_identity
    - capability_negotiation
    - skew_window
  desktop_claim_boundary:
    - no_local_file_association
    - no_local_protocol_handler
    - no_local_recent_item_registration
    - no_local_desktop_update_marker

surface_projection:
  project_doctor_ui: >
    Show helper or agent runtime identity, source, signature posture,
    and capability-negotiation result. If negotiation is missing or
    stale, mark the runtime unsupported for attach rather than trying a
    silent fallback.
  project_doctor_headless: >
    Emit machine-readable runtime identity, artifact family, capability
    envelope, and unsupported-path refs.
  support_bundle: >
    Include helper/agent artifact family refs, runtime state refs,
    mirror/source posture, and unnegotiated-skew finding when relevant.
  docs_compatibility: >
    Describe helper/agent delivery as remote-runtime-scoped and state
    that it is not a desktop package install lane.

must_not_claim:
  - Remote helper artifacts own desktop file associations.
  - Remote helper artifacts own local protocol handlers.
  - Unknown helper skew can attach without capability negotiation.
  - Remote agent image-layer rollback is equivalent to desktop package rollback.

expected_result: helper_agent_runtime_scope_visible
status: proposed
