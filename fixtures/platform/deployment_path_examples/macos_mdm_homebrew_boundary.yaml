schema_version: 1
record_kind: deployment_path_example_record
case_id: deployment_path_example:macos_mdm_homebrew_boundary
case_class: macos_fleet_and_package_manager_boundary
scenario_summary: >
  A macOS install guide distinguishes the claim-bearing PKG managed
  deployment from a Homebrew/cask acquisition path that is delegated and
  best-effort.

platform_profile_ref: macos_15_plus_universal
deployment_pattern_refs:
  - desktop_management.pattern.macos.managed
  - desktop_management.pattern.macos.external_package_manager
package_manager_row_refs:
  - pkgmgr.macos.mdm_jamf_munki_pkg
  - pkgmgr.macos.homebrew_cask
unsupported_path_refs:
  - unsupported_path.macos.homebrew_update_ownership
  - unsupported_path.macos.offline_bundle
  - unsupported_path.fleet.vendor_specific_console_adapters
artifact_family_refs:
  - artifact_family.macos.pkg
  - artifact_family.macos.notarized_dmg
install_topology_card_refs:
  - card.macos.universal_binary.managed_deployed.stable
  - card.macos.universal_binary.external_package_manager.stable
channel_identity_refs:
  - channel_identity.stable
state_root_refs:
  - state.per_machine_admin_policy_root.stable
  - state.per_machine_shared_data_root.stable
  - state.per_user_configuration_root.stable
  - state.per_user_recovery_root.stable

tested_assumptions_to_show:
  claim_bearing_managed_path: Signed PKG through MDM/Jamf/Munki-style distribution.
  delegated_path: Homebrew/cask acquisition is package-manager-owned.
  policy_source: configuration profile or managed policy bundle where the managed PKG row admits it.
  unsupported_adjacent_path: macOS offline bundle and customer mirror are unsupported.

surface_projection:
  install_guide: >
    Present PKG managed deployment as supported, Homebrew/cask as
    delegated/best-effort, and macOS offline bundle as unsupported.
  about_update_surface: >
    When Homebrew is detected as updater owner, hide product-owned
    package update controls and show package-manager-owned update
    source.
  support_bundle: >
    Include whether the source is managed PKG or Homebrew/cask, the
    relevant package-manager row, and any unsupported path rows.
  field_triage: >
    Route vendor-specific MDM console recipe issues separately from
    package/result/policy contract issues.

must_not_claim:
  - Homebrew-owned update as product-owned update.
  - Homebrew uninstall as product-owned silent uninstall.
  - Vendor-specific MDM console recipes or smart groups.
  - macOS offline-bundle support.

expected_result: managed_pkg_claim_and_homebrew_boundary_visible
status: proposed
