schema_version: 1
record_kind: deployment_path_example_record
case_id: deployment_path_example:windows_per_user_per_machine_winget_gap
case_class: windows_install_authority_disclosure
scenario_summary: >
  Windows docs and diagnostics show per-user, per-machine, managed,
  portable, and offline bundle distinctions while keeping winget as a
  future-work non-claim.

platform_profile_ref: windows_11_23h2_plus_x86_64
deployment_pattern_refs:
  - desktop_management.pattern.windows.individual
  - desktop_management.pattern.windows.managed
  - desktop_management.pattern.windows.portable
  - desktop_management.pattern.windows.offline_or_mirror
  - desktop_management.pattern.windows.external_package_manager
package_manager_row_refs:
  - pkgmgr.windows.intune_gpo_msi_msix
  - pkgmgr.windows.winget
unsupported_path_refs:
  - unsupported_path.windows.winget
  - unsupported_path.fleet.vendor_specific_console_adapters
artifact_family_refs:
  - artifact_family.windows.msi
  - artifact_family.windows.msix
  - artifact_family.windows.signed_portable_zip
install_topology_card_refs:
  - card.windows.x86_64.per_user_installed.stable
  - card.windows.x86_64.per_machine_installed.stable
  - card.windows.x86_64.managed_deployed.stable
  - card.windows.x86_64.portable.portable_stable
  - card.windows.x86_64.offline_bundle.stable
channel_identity_refs:
  - channel_identity.stable
  - channel_identity.portable_stable
state_root_refs:
  - state.per_user_configuration_root.stable
  - state.per_user_recovery_root.stable
  - state.per_machine_shared_data_root.stable
  - state.per_machine_admin_policy_root.stable
  - state.portable_colocated_root.portable_stable

authority_distinctions:
  per_user_install:
    updater_owner: user
    policy_injection: none
    support_statement: Signed MSI/MSIX user install with user-owned update posture.
  per_machine_install:
    updater_owner: admin
    policy_injection: gpo
    support_statement: Signed MSI/MSIX admin install with machine package ownership.
  managed_install:
    updater_owner: managed_fleet
    policy_injection: gpo
    support_statement: Managed MSI/MSIX package with result records and managed package report slot.
  portable_install:
    updater_owner: user_or_none
    policy_injection: none
    support_statement: Signed ZIP with colocated portable state and no machine-global handler claim.
  offline_bundle:
    updater_owner: admin
    policy_injection: gpo
    support_statement: Signed offline bundle with mirror metadata, rollback evidence, and explicit handler preview.
  winget:
    updater_owner: external_package_manager
    support_statement: Future-work non-claim until a dedicated install card and diagnostics path exist.

surface_projection:
  install_guide: >
    Show per-user, per-machine, managed, portable, and offline rows as
    separate choices. Put winget in a "not currently supported" section.
  project_doctor_ui: >
    If winget is detected, emit future-work package-manager finding and
    point to supported MSI/MSIX/ZIP/offline alternatives.
  support_bundle: >
    Include install-profile card ref, updater owner, policy injection
    class, package-manager row, and unsupported-path row where present.

must_not_claim:
  - winget install, update, uninstall, or channel pinning.
  - Portable ZIP machine-global file associations or services.
  - Managed console recipe certification beyond the package/control/result contract.

expected_result: windows_authority_rows_visible_without_winget_overclaim
status: proposed
