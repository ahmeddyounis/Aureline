schema_version: 1
record_kind: deployment_path_example_record
case_id: deployment_path_example:linux_ubuntu_wayland_apt_mirror_disclosure
case_class: linux_distro_package_manager_disclosure
scenario_summary: >
  A support article and Project Doctor output describe an Ubuntu 24.04
  GNOME Wayland managed mirror deployment without implying that Fedora,
  Debian, X11, KDE, KWallet, Flatpak, Snap, or Nix have the same claim.

platform_profile_ref: linux_ubuntu_24_04_gnome_wayland_x86_64
deployment_pattern_refs:
  - desktop_management.pattern.linux_ubuntu_wayland.managed
  - desktop_management.pattern.linux_ubuntu_wayland.offline_or_mirror
package_manager_row_refs:
  - pkgmgr.linux.ubuntu_wayland.apt_deb_mirror
unsupported_path_refs:
  - unsupported_path.linux.managed_outside_ubuntu_wayland
  - unsupported_path.linux.non_gnome_desktop_environment
  - unsupported_path.linux.unnamed_display_stack
  - unsupported_path.linux.kwallet_secret_store
  - unsupported_path.linux.flatpak_snap_nix
artifact_family_refs:
  - artifact_family.linux.deb
  - artifact_family.linux.tarball
install_topology_card_refs:
  - card.linux.x86_64.managed_deployed.stable
  - card.linux.x86_64.offline_bundle.stable
  - card.linux.x86_64.customer_managed_mirror.stable
channel_identity_refs:
  - channel_identity.stable
state_root_refs:
  - state.offline_bundle_mirror_metadata_root.stable
  - state.per_machine_admin_policy_root.stable
  - state.per_machine_shared_data_root.stable
  - state.per_user_configuration_root.stable

tested_assumptions_to_show:
  display_stack: GNOME Wayland with xdg-desktop-portal
  secret_store: Secret Service through libsecret and GNOME Keyring
  input_stack: IBus on the claimed GNOME session
  package_source: APT/DEB private mirror or managed tarball/package row
  mirror_requirement: mirror metadata and policy root are present

surface_projection:
  install_guide: >
    Say "Ubuntu 24.04 GNOME Wayland x86_64 managed mirror" and list the
    DEB/tarball, mirror metadata, policy bundle, and Secret Service
    assumptions. Do not shorten to "Linux managed install."
  project_doctor_ui: >
    If the desktop is not GNOME Wayland or Secret Service is not
    available, emit an unsupported-state finding with the nearest
    matching profile and keep local editing diagnostics available.
  project_doctor_headless: >
    Include platform_profile_ref, package_manager_row_refs, and
    unsupported_path_refs in structured output.
  support_bundle: >
    Include the package-manager row, unsupported-path rows, mirror
    metadata posture, policy epoch, and state-root refs.

must_not_claim:
  - Fedora or Debian managed/mirror parity.
  - Unnamed Wayland/X11 compositors or non-GNOME display stacks.
  - KDE or non-GNOME notification, badge, dialog, deep-link, or secret-store parity.
  - KWallet long-lived secret storage.
  - Flatpak, Snap, or Nix deployment support.
  - Package-manager channel pinning unless joined to the channel identity row.

expected_result: visible_narrow_linux_claim
status: proposed
