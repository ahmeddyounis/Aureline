schema_version: 1
record_kind: desktop_summary_surface_case_record
case_id: desktop_summary_surface_case:linux_gnome_launcher_summary_surfaces_degraded
case_class: linux_gnome_launcher_degraded

scenario_summary: >
  On the claimed GNOME Linux profiles, launcher integration varies by
  desktop environment and configuration. Aureline must disclose parity
  gaps: OS-recents and launcher actions are best-effort, and launcher
  badge/progress mirrors are not claim-bearing. When an affordance is
  unavailable, the product relies on in-product recents, activity
  center, and OS notifications without implying dock/taskbar parity.

platform_profile_refs:
  - linux_ubuntu_24_04_gnome_wayland_x86_64
  - linux_ubuntu_24_04_gnome_x11_x86_64
  - linux_fedora_current_gnome_wayland_x86_64
  - linux_debian_stable_gnome_x11_x86_64

matrix_row_ids:
  - desktop-summary-surface:linux:launcher:recent:01
  - desktop-summary-surface:linux:launcher:jump-action:01
  - desktop-summary-surface:linux:launcher:progress:01
  - desktop-summary-surface:linux:launcher:badge:01

upstream_fixture_refs:
  launcher_recent_replay_denied_case: fixtures/platform/deep_link_replay_cases/dock_recent_replay_denied_target_drifted.yaml
  progress_mirror_record: fixtures/ux/os_notification_cases/dock_taskbar_progress_read_only_mirror.json
  badge_mirror_record: fixtures/ux/os_notification_cases/dock_taskbar_badge_read_only_mirror.json
  route_audit: artifacts/platform/system_affordance_route_audit.md

expected_disclosures:
  must_disclose_unavailable_launcher_affordances: true
  must_not_claim_badge_or_progress_parity_on_gnome_rows: true
  must_preserve_exact_target_or_fail_closed: true
  portable_installs_must_not_mutate_host_shell: true

reviewer_checks:
  - id: recents_best_effort_disclosed
    description: >
      If OS recents are unavailable on the current GNOME profile, the
      product discloses the gap and continues to offer in-product
      recent-work reopen without implying OS parity.
    pass: true
  - id: launcher_actions_inspect_only
    description: >
      Launcher quick actions (when present) are limited to safe reopen/
      inspect command families and never complete mutations from the OS.
    pass: true
  - id: badge_progress_not_claim_bearing
    description: >
      Launcher badge/progress mirrors are unclaimed on the GNOME rows;
      any implementation is best-effort and must degrade without implying
      parity.
    pass: true
  - id: exact_target_or_fail_closed
    description: >
      Any launcher-triggered reopen resolves to the advertised recent-work
      identity or degrades to locate/review while preserving user intent.
    pass: true

status: proposed
