  scenario: >
    A system-browser auth callback for an in-progress workspace
    sign-in arrives a second time after the first callback has
    already been consumed. The replay attempt fails closed with a
    typed denial reason; the user is asked to start a fresh
    sign-in instead of silently completing the consumed callback.
