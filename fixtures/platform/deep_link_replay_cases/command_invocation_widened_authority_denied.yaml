    authority_delta_class: destructive_or_mutating
    replay_posture: replay_denied_origin_mismatch
    policy_resolution_class: denied_replay
  contract_sections:
    - "5. Deep-Link Intent Lifecycle"
    - "6. Review and Denial Rules"

