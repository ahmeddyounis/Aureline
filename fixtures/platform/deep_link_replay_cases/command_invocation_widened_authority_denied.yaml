  name: command_invocation_widened_authority_denied
  scenario: >
    A protocol-handler intent claims a command invocation that
    would widen authority beyond what the in-product object admits
    (a remote rerun of a destructive job from a non-trusted origin).
    The intent fails closed with denied_replay because the origin
    does not match the approval-ticket origin minted in product;
    no fallback silently downgrades to a permissive command.
