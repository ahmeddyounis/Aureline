__fixture__:
  name: browser_return_replay_denied_origin_mismatch
  scenario: >
    A default-browser return intent arrives carrying an origin that
    does not match the origin recorded on the matching browser
    handoff packet. Because the origin is below the trust required
    for the route, the intent fails closed with a typed denial
    reason; the surface offers no permissive fallback and asks the
    user to start a fresh handoff from inside the product surface.
  exercised_axes:
    record_kind: deep_link_intent_record
    source_surface_class: default_browser_callback
    route_class: external_browser_return
    requested_action_class: open_existing_context
    authority_delta_class: external_visibility_widening
    replay_posture: replay_denied_origin_mismatch
    policy_resolution_class: denied_replay
  contract_sections:
    - "5. Deep-Link Intent Lifecycle"
    - "6. Review and Denial Rules"

