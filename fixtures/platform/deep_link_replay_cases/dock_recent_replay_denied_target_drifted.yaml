__fixture__:
  name: dock_recent_replay_denied_target_drifted
  scenario: >
    A dock / taskbar recent entry points at a workspace whose
    durable manifest has moved between channels (the user re-rooted
    the project under the long-support build). The dock recent
    cannot resolve to the exact target; replay denies with a typed
    reason and the surface routes to the matching review sheet so
    the new owning channel is disclosed before any opening.
