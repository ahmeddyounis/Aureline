    record_kind: deep_link_intent_record
    source_surface_class: dock_taskbar_recent
    route_class: workspace_open
    requested_action_class: open_existing_context
    authority_delta_class: trust_boundary_crossing
    replay_posture: replay_denied_target_drifted
    policy_resolution_class: denied_replay
  contract_sections:
    - "5. Deep-Link Intent Lifecycle"
    - "8. Notifications, Badges, and Collaboration Presence"

