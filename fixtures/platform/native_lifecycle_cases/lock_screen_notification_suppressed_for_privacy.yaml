# Lock-screen notification suppressed for privacy.
#
# Reviewer-side native-lifecycle drill case for
# /artifacts/platform/native_lifecycle_drill_packet.md §4
# row drill_case_class = lock_screen_notification_suppressed_for_privacy.
# Binds the upstream system_affordance_case_record for OS notification
# click-through and the upstream notification_suppression_record /
# privacy redaction proof to show that lock-screen delivery degrades
# to a generic, lock_screen_safe payload, durable history is preserved,
# reopen routes through the in-product surface, and high-risk shortcut
# actions are forbidden.
__fixture__:
  name: lock_screen_notification_suppressed_for_privacy
  scenario: >
    A workspace-trust review is escalated to an OS notification while
    the device sits on the lock screen. The OS payload renders as
    lock_screen_safe_generic (category + lifecycle phase only); raw
    URLs, raw provider payloads, and object identity are stripped
    before bytes reach the OS sink. The durable attention item
    remains visible in-product. Reopen on unlock routes through the
    in-product trust review canvas, never through a generic home
    screen, and high-risk actions like Approve or Apply are not
    completable from the lock-screen quick action.
  drill_packet_ref: artifacts/platform/native_lifecycle_drill_packet.md
  contract_sections:
    - "§4 lock_screen_notification_suppressed_for_privacy"
    - "§6 Conformance assertions"
  exercised_axes:
    drill_case_class: lock_screen_notification_suppressed_for_privacy
    lifecycle_state_class: lock_screen_privacy
    expected_state_token: Notification suppressed for privacy
    expected_outcome_class: privacy_narrowed_delivery

case_id: native-lifecycle-case:lock-screen:notification-suppressed:01
drill_case_class: lock_screen_notification_suppressed_for_privacy
lifecycle_state_class: lock_screen_privacy
expected_state_token: Notification suppressed for privacy

upstream_fixture_refs:
  system_affordance_case_record_ref: fixtures/platform/system_affordance_cases/notification_clickthrough_lock_screen_privacy.json
  window_display_verification_case_ref: null
  notification_suppression_record_ref: fixtures/ux/notification_privacy_cases/lock_screen_safe_summary_audit.yaml
  os_notification_case_record_ref: fixtures/ux/os_notification_cases/lock_screen_quick_action_read_only_reopen.json

canonical_backing_refs:
  command_id_ref: cmd:trust.open_review_canvas
  object_identity_ref: obj:trust-review:workspace-payments:01
  canonical_event_id_ref: ux:event:trust-review:workspace-payments:01
  event_lineage_ref: ux:lineage:trust-review:workspace-payments:01

policy_context:
  policy_epoch: pe:2026-04-24:notification:01
  trust_state: restricted
  tenant_or_workspace_scope_ref: scope:workspace:payments

lifecycle_recovery_proof:
  lifecycle_state_class: lock_screen_privacy
  preserves_context: true
  revalidation_required: false
  destructive_cleanup_forbidden: true
  hidden_focus_steal_forbidden: true

privacy_projection:
  in_product_payload_class: source_object_summary_allowed
  os_notification_payload_class: lock_screen_safe_generic
  lock_screen_payload_class: lock_screen_safe_generic
  support_export_payload_class: support_export_metadata_only
  redacted_summary_template_label: >
    Trust review pending
  redaction_template_tokens:
    - "{category}"
    - "{lifecycle_phase}"
  stripped_label_kinds:
    - raw_url
    - raw_provider_payload
    - object_identity_on_lock_screen
    - actor_real_name_on_lock_screen
    - review_diff_excerpt_on_lock_screen

forbidden_shortcut_action_classes:
  - destructive_publish_or_apply
  - secret_or_credential_reveal
  - irreversible_high_blast
  - bypass_review_sheet
  - bypass_approval_workflow
  - direct_mutation_from_lock_screen
  - direct_mutation_from_companion_push
  - policy_override_from_os_shortcut
  - trust_state_change_from_os_shortcut

exact_reopen_linkage_proof:
  reopen_target_kind: review_context
  target_identity_ref: obj:trust-review-canvas:workspace-payments:01
  command_id_ref: cmd:trust.open_review_canvas
  must_resolve_through_in_product_surface: true
  preserves_canonical_event_id: true
  preserves_canonical_object_identity: true

expected_outcome_class: privacy_narrowed_delivery
replay_posture: single_use
fallback_class: open_activity_center

safe_actions:
  - Open trust review (in-product)
  - Snooze until unlocked
  - Acknowledge clears badge only
  - Show held in product

must_not_happen:
  - lock-screen payload exposes review title, tenant identity, or diff excerpt
  - lock-screen quick action approves, applies, or publishes the review
  - reopen lands on a generic home screen
  - durable in-product attention item is cleared by lock-screen dismiss
  - companion push duplicates the OS payload with broader privacy class

audit_event_id: platform.notification_clickthrough_resolved

reviewer_checks:
  - id: payload_class_lock_screen_safe
    description: >
      privacy_payload_class on the lock-screen surface is
      lock_screen_safe_generic; in_product_only would deny on the
      lock-screen surface.
    pass: true
  - id: stripped_kinds_recorded
    description: >
      Every forbidden label kind removed from the payload is recorded
      under privacy_redaction.stripped_label_kinds.
    pass: true
  - id: reopen_in_product
    description: >
      Reopen on unlock lands on the in-product trust review canvas;
      must_resolve_through_in_product_surface is true.
    pass: true
  - id: no_high_risk_shortcut
    description: >
      Approve, Apply, Publish, and similar high-risk actions are not
      surfaced as lock-screen quick actions; they require the
      in-product review sheet or approval workflow.
    pass: true
  - id: durable_history_preserved
    description: >
      The durable attention item and lineage survive lock-screen
      dismiss; only transient OS chrome dismisses.
    pass: true

denial_reasons_avoided:
  - privacy_payload_class_missing_on_lock_screen
  - privacy_payload_class_widened_across_clients
  - raw_body_forbidden_on_os_notification
  - high_risk_shortcut_bypassed_review_sheet
  - reopen_to_generic_home_screen
  - durable_history_cleared_on_transient_dismiss
