__fixture__:
  name: managed_cloud_relay_disconnect_card
  scenario: >
    Managed-cloud control-plane impairment with local-safe data plane.
    The remote relay transport has dropped while sync, registry, AI
    broker, auth, policy, docs, catalog, and telemetry remain healthy.
    Local-tasks blocks pending reconnect; every other local-core
    capability continues as available_local_safe. The card uses two
    separately-rendered summary labels so a control-plane impairment
    does not collapse into generic workspace or runtime failure copy.
    Linked to the existing local_core_continuity_packet fixture for
    the same scenario.
  contract_sections:
    - "§3.4 control_plane_state_summary"
    - "§3.5 data_plane_state_summary"
    - "§6.2 Plane separation never collapses"
    - "§8 Plane-separation rules"
