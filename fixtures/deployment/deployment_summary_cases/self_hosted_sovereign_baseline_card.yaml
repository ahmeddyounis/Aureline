# yaml-language-server: $schema=../../../schemas/deployment/deployment_summary_card.schema.json
$schema: "https://aureline.dev/schemas/deployment/deployment_summary_card.schema.json"
__fixture__:
  name: self_hosted_sovereign_baseline_card
  scenario: >
    Self-hosted / sovereign baseline. Customer-operated control plane
    is healthy, customer-managed keys, customer-pinned region. The
    card carries an online_live_allowed mirror/offline state and
    surfaces two residual-dependency rows (sign_in required against
    customer IdP, ai_provider optional) plus one mirror/offline
    artifact row for the signed policy bundle. The
    implied_sovereign_when_vendor_managed guardrail is asserted so a
    sovereign claim cannot widen into a vendor-managed-keys claim.
  contract_sections:
    - "§3.2 Cross-field locality posture rules"
    - "§3.7 prohibited_implied_claim_class"
    - "§4 The residual-dependency row record"
    - "§5 The mirror/offline artifact row record"
record_kind: deployment_summary_card_record
deployment_summary_schema_version: 1
card_id: "card.deployment.self_hosted_sovereign_baseline"
emitted_at: "2026-04-29T00:00:00Z"
deployment_profile: self_hosted
product_facing_label_class: self_hosted_sovereign
tenant_org_scope_class: customer_tenant
region_scope_class: customer_region_pinned
retention_class: customer_retention_window
key_mode_class: customer_managed
mirror_offline_state_class: online_live_allowed
control_plane_state_summary:
  worst_state_class: healthy
  summary_label: "Customer-operated control plane is reachable; sync, registry, auth, and policy services are healthy."
  impaired_service_classes: []
  healthy_service_classes:
    - sync_service
    - registry_service
    - auth_identity_service
    - policy_service
    - docs_pack_service
    - catalog_service
  service_state_refs: []
data_plane_state_summary:
  worst_state_class: available_local_safe
  summary_label: "Local editing, save, search, Git, tasks, docs inspection, export, and diagnostics are available on device."
  impaired_capability_classes: []
  available_local_safe_capability_classes:
    - local_editing
    - local_save
    - local_search
    - local_git
    - local_tasks
    - local_docs_inspect
    - local_export
    - local_diagnostics
  capability_state_refs: []
residual_dependency_row_refs:
  - "row.dep.self_hosted_sovereign_baseline.sign_in"
  - "row.dep.self_hosted_sovereign_baseline.ai_provider"
mirror_offline_artifact_row_refs:
  - "row.artifact.self_hosted_sovereign_baseline.policy_bundle"
open_details_action:
  action_id: "action.card.self_hosted_sovereign_baseline.open_details"
  label: "Open deployment details"
  target_route_ref: "route.deployment.details.self_hosted"
  scope_class: scope_local_only
  authority_class: user_local_authority
  consent_class: no_consent_required_safe_default
  side_effects:
    - no_side_effect_inspect_only
  preserves_evidence_context: true
  revalidation_on_open: snapshot_open_read_only
  modal_prohibited: true
prohibited_implied_claim_classes:
  - implied_sovereign_when_vendor_managed
  - implied_no_residual_dependency_when_required_present
freshness_posture_ref: "freshness.self_hosted_sovereign_baseline.fresh"
consumer_surfaces:
  - about_panel
  - diagnostics_view
  - support_packet_export
  - admin_audit_export
  - release_evidence_excerpt
  - status_bar_cell
  - cli_text_formatter
redaction_class: metadata_safe_default
export_safe: true
notes: >
  Self-hosted-sovereign baseline. The card forbids the
  implied_sovereign_when_vendor_managed claim because sovereignty
  hinges on customer-managed keys; the schema also forbids self_hosted
  cards from carrying vendor_managed key mode regardless of how a
  surface renders the claim.
