# yaml-language-server: $schema=../../../schemas/deployment/deployment_summary_card.schema.json
$schema: "https://aureline.dev/schemas/deployment/deployment_summary_card.schema.json"
__fixture__:
  name: managed_cloud_baseline_card
  scenario: >
    Managed-cloud SaaS baseline. Vendor-operated control plane,
    vendor-managed keys by default, customer-pinned region, vendor
    retention window. Three required residual hosted dependencies are
    surfaced (ai_provider, browser_handoff,
    hosted_control_plane_reachability), and the card asserts the
    implied_self_hosted_when_managed_cloud and
    implied_managed_independence_when_local_dependent guardrails so a
    managed-cloud claim cannot widen into a self-hosted or
    independent claim.
  contract_sections:
    - "§3 The deployment summary card record"
    - "§3.7 prohibited_implied_claim_class"
    - "§7 Independence-claim guardrails"
record_kind: deployment_summary_card_record
deployment_summary_schema_version: 1
card_id: "card.deployment.managed_cloud_baseline"
emitted_at: "2026-04-29T00:00:00Z"
deployment_profile: managed_cloud
product_facing_label_class: browser_companion_handoff_default_home
tenant_org_scope_class: customer_tenant
region_scope_class: customer_region_pinned
retention_class: vendor_retention_window_default
key_mode_class: vendor_managed
mirror_offline_state_class: online_live_allowed
