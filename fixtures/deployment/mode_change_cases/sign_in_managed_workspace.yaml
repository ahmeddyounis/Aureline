# yaml-language-server: $schema=../../../schemas/deployment/mode_change_review.schema.json
$schema: "https://aureline.dev/schemas/deployment/mode_change_review.schema.json"
__fixture__:
  name: sign_in_managed_workspace
  scenario: >
    A managed-cloud sign-in transition starting from a fresh local-only
    posture. Authority widens with explicit consent into a vendor-
    operated control plane. No cached authority is invalidated because
    no prior managed binding existed. Local artifacts and exports
    remain authoritative on device.
  contract_sections:
    - "§3 The mode-change review record"
    - "§3.10 authority_change_guard"
    - "§5.3 Authority widening requires explicit consent"
    - "§6 Voluntary versus involuntary transitions"
record_kind: mode_change_review_record
mode_change_review_schema_version: 1
review_id: "review.mode_change.sign_in_managed_workspace"
emitted_at: "2026-04-29T00:00:00Z"
transition_class: sign_in
transition_phase: committed
triggered_by_user_action: true
from_posture:
  deployment_profile: individual_local
  product_facing_label_class: desktop_local_first
  tenant_org_scope_class: single_user_local
  region_scope_class: not_applicable
  key_mode_class: os_store
  mirror_offline_state_class: not_applicable
  control_plane_worst_state_class: not_applicable
  data_plane_worst_state_class: available_local_safe
  prohibited_implied_claim_classes: []
  posture_label: "Local-only desktop with no managed binding."
to_posture:
