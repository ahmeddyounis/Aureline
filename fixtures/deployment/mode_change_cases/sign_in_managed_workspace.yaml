  rollback_label: "Sign out to return to local-only mode."
  rollback_action:
    action_id: "action.review.sign_in_managed_workspace.rollback"
    label: "Sign out and return to local-only"
    target_route_ref: "route.account.sign_out"
    scope_class: scope_local_only
    authority_class: user_local_authority
    consent_class: no_consent_required_safe_default
