  - admin_audit_export
  - release_evidence_excerpt
  - cli_text_formatter
  - companion_surface
redaction_class: metadata_safe_default
export_safe: true
disconnect_review_ref: null
linked_managed_session_state_ref: "managed-session:signed_in:0001"
notes: >
  Managed sign-in widens authority with explicit consent. Local edit,
  save, undo, search, and export remain available throughout. No
  cached authority is invalidated because the prior posture was
  local-only.
