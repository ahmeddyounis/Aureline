__fixture__:
  name: offline_transition_dirty_buffers
  scenario: >
    A managed-cloud deployment loses network reachability while the
    user has five unsaved buffers open. The deployment crosses into
    offline grace; managed-only capabilities pause, but local edit,
    save, undo, and user-owned export remain available. A paired
    disconnect review captures the local-continuity statement.
  contract_sections:
    - "§3 The mode-change review record"
    - "§3.5 preserved_local_state"
    - "§3.7 reauth_or_retry_requirements"
    - "§5.1 Local continuity is preserved"
