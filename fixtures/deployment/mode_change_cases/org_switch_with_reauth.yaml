  - row_id: "row.invalidate.org_switch.policy_bundle"
    authority_class: signed_policy_bundle
    invalidation_reason_class: org_changed
    recheck_required: true
    scope_label: "Signed policy bundle scoped to the previous org."
  - row_id: "row.invalidate.org_switch.docs_pack"
    authority_class: signed_docs_pack
    invalidation_reason_class: org_changed
    recheck_required: true
    scope_label: "Signed docs pack scoped to the previous org."
  - row_id: "row.invalidate.org_switch.ai_provider_token"
    authority_class: ai_provider_token
    invalidation_reason_class: org_changed
    recheck_required: true
    scope_label: "AI provider session token scoped to the previous org."
reauth_or_retry_requirements:
