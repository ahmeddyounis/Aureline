# yaml-language-server: $schema=../../../schemas/deployment/mode_change_review.schema.json
$schema: "https://aureline.dev/schemas/deployment/mode_change_review.schema.json"
__fixture__:
  name: org_switch_with_reauth
  scenario: >
    An enterprise-online org switch where the cached managed session,
    signed policy bundle, signed docs pack, and AI provider token for
    the previous org are explicitly invalidated. Reauth is required
    against the new org via system-browser OIDC. Local edit, save,
    undo, and user-owned export remain available throughout.
  contract_sections:
    - "§3 The mode-change review record"
    - "§3.6 invalidated_cached_authority_rows"
    - "§3.7 reauth_or_retry_requirements"
    - "§5.4 Cached authority is invalidated, not silently reused"
    - "§5.5 Reauth or retry pairs with the auth contract"
record_kind: mode_change_review_record
mode_change_review_schema_version: 1
review_id: "review.mode_change.org_switch_with_reauth"
emitted_at: "2026-04-29T00:10:00Z"
transition_class: org_switch
transition_phase: in_progress
triggered_by_user_action: true
from_posture:
  deployment_profile: enterprise_online
  product_facing_label_class: hybrid_remote_attach
  tenant_org_scope_class: customer_tenant
  region_scope_class: customer_region_pinned
  key_mode_class: customer_managed
  mirror_offline_state_class: online_live_allowed
  control_plane_worst_state_class: healthy
  data_plane_worst_state_class: available_local_safe
  prohibited_implied_claim_classes:
