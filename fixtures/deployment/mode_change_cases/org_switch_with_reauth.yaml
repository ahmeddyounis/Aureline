  prohibited_implied_claim_classes:
    - implied_no_residual_dependency_when_required_present
  posture_label: "Enterprise-online workspace bound to the new org pending reauth."
preserved_local_state:
  local_artifacts_safe: true
  edit_save_undo_export_available: true
  no_silent_loss_guarantee: true
  retained_local_capabilities:
    - "Local edit, save, undo, and search remain on device."
    - "User-owned export remains available."
    - "Local Git and local tasks remain available."
  retained_local_artifact_classes:
