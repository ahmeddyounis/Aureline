# yaml-language-server: $schema=../../../schemas/deployment/mode_change_review.schema.json
$schema: "https://aureline.dev/schemas/deployment/mode_change_review.schema.json"
__fixture__:
  name: sign_out_to_local_only
  scenario: >
    A managed-cloud sign-out transition. Authority narrows; the managed
    session, signed policy bundle, signed docs pack, and AI provider
    token are explicitly invalidated with typed reasons. Three unsaved
    buffers are present, so the review surfaces an inspect-only
    export-before-change action. Local edit, save, undo, and user-owned
    export remain available.
  contract_sections:
    - "§3 The mode-change review record"
    - "§3.5 preserved_local_state"
    - "§3.6 invalidated_cached_authority_rows"
    - "§3.8 export_before_change_actions"
    - "§5.4 Cached authority is invalidated, not silently reused"
