schema_version: 1
manifest_id: aureline.workflow.bundle_drift_case_fixtures
contract_doc_ref: docs/workflow/bundle_drift_and_removal_contract.md
bundle_drift_row_schema_ref: schemas/workflow/bundle_drift_row.schema.json
companion_change_preview_schema_ref: schemas/workflow/bundle_change_preview.schema.json
companion_manifest_schema_ref: schemas/workflow/bundle_manifest.schema.json
companion_appearance_checkpoint_schema_ref: schemas/ux/appearance_checkpoint.schema.json

cases:
  - case_id: workflow.bundle_drift.bundle_version_drift_certified_launch
    file: bundle_version_drift_certified_launch.yaml
    drift_state_class: bundle_version_drift
    drift_axis: extension_set
    drift_severity_class: narrowing_review_recommended
    asset_ownership_class: bundle_owned
    claim_narrowing_class: narrows_support_class_one_rung
    successor_bundle_suggestion_class: inherits_manifest_successor_recommendation
    drift_row_state_class: drift_row_open_pending_review
    exercises:
      - drift_state_class_bundle_version_drift
      - drift_axis_extension_set
      - drift_subject_kind_bundle_revision_pin
      - drift_severity_class_narrowing_review_recommended
      - claim_narrowing_class_narrows_support_class_one_rung
      - successor_bundle_suggestion_class_inherits_manifest_successor_recommendation
      - resolve_actions_five_required
      - resolve_adopt_bundle_routes_through_change_preview
      - resolve_rebase_to_bundle_routes_through_change_preview
      - provenance_record_class_bundle_history_event_recorded
      - provenance_record_class_support_export_audit_link

  - case_id: workflow.bundle_drift.missing_artifact_extension_uninstalled
    file: missing_artifact_extension_uninstalled.yaml
    drift_state_class: missing_artifact
    drift_axis: extension_set
    drift_severity_class: narrowing_review_recommended
    asset_ownership_class: bundle_owned
    claim_narrowing_class: narrows_certification_target_pending_retest
    successor_bundle_suggestion_class: no_successor_drift_review
    drift_row_state_class: drift_row_open_pending_review
    exercises:
      - drift_state_class_missing_artifact
      - drift_subject_kind_bundle_component_record
      - claim_narrowing_class_narrows_certification_target_pending_retest

  - case_id: workflow.bundle_drift.local_override_editor_setting
    file: local_override_editor_setting.yaml
    drift_state_class: local_override
    drift_axis: settings_or_token
    drift_severity_class: informational_no_narrowing
    asset_ownership_class: shared_user_overlay_on_bundle
    claim_narrowing_class: no_narrowing_informational
    successor_bundle_suggestion_class: no_successor_drift_review
    drift_row_state_class: drift_row_open_pending_review
    exercises:
      - drift_state_class_local_override
      - drift_axis_settings_or_token
      - asset_ownership_class_shared_user_overlay_on_bundle
      - drift_severity_class_informational_no_narrowing
      - preserved_local_override_summary_ref_required

  - case_id: workflow.bundle_drift.unmanaged_addition_user_extension
    file: unmanaged_addition_user_extension.yaml
    drift_state_class: unmanaged_addition
    drift_axis: extension_set
    drift_severity_class: informational_no_narrowing
    asset_ownership_class: user_owned
    claim_narrowing_class: no_narrowing_informational
    successor_bundle_suggestion_class: no_successor_drift_review
    drift_row_state_class: drift_row_open_pending_review
    exercises:
      - drift_state_class_unmanaged_addition
      - asset_ownership_class_user_owned
      - resolve_action_rendered_state_hidden_not_applicable_for_adopt_and_rebase

  - case_id: workflow.bundle_drift.mirror_mismatch_signed_offline
    file: mirror_mismatch_signed_offline.yaml
    drift_state_class: mirror_mismatch
    drift_axis: compatibility_or_runtime
    drift_severity_class: narrowing_review_required
    asset_ownership_class: bundle_owned
    claim_narrowing_class: narrows_support_class_one_rung
    successor_bundle_suggestion_class: no_successor_drift_review
    drift_row_state_class: drift_row_blocked_review_required
    exercises:
      - drift_state_class_mirror_mismatch
      - mirror_or_offline_packaging_posture_signed_offline_bundle
      - resolve_action_rendered_state_visible_disabled
      - resolve_blocker_class_network_or_mirror_unreachable_blocks_compare
      - resolve_blocker_class_compatibility_blocks_rebase
      - drift_row_state_class_drift_row_blocked_review_required

  - case_id: workflow.bundle_drift.evidence_stale_certification_retest_pending
    file: evidence_stale_certification_retest_pending.yaml
    drift_state_class: evidence_stale
    drift_axis: evidence_link
    drift_severity_class: narrowing_review_required
    asset_ownership_class: bundle_owned
    claim_narrowing_class: narrows_certification_target_pending_retest
    successor_bundle_suggestion_class: no_successor_drift_review
    drift_row_state_class: drift_row_open_pending_review
    exercises:
      - drift_state_class_evidence_stale
      - drift_axis_evidence_link
      - drift_severity_class_narrowing_review_required
      - resolve_blocker_class_evidence_stale_blocks_adopt
