    file: remove_bundle_review_certified_with_overlays.yaml
    drift_state_class: bundle_version_drift
    drift_axis: extension_set
    drift_severity_class: narrowing_review_recommended
    asset_ownership_class: bundle_owned
    claim_narrowing_class: narrows_support_class_one_rung
    successor_bundle_suggestion_class: inherits_manifest_successor_recommendation
    drift_row_state_class: drift_row_superseded_by_remove_bundle_review
    remove_bundle_review_state_class: remove_review_completed_partial_user_data_retained
    exercises:
      - remove_bundle_review_state_class_remove_review_completed_partial_user_data_retained
      - safe_to_remove_class_safe_to_remove_no_user_data
      - safe_to_remove_class_safe_to_remove_user_overlay_preserved
      - safe_to_remove_class_review_required_user_data_co_resident
      - asset_ownership_class_mixed_unknown_provenance
      - retained_local_override_class_override_retained_in_workspace_scope
      - retained_local_override_class_override_inlined_to_user_authored_record
      - drift_row_state_class_drift_row_superseded_by_remove_bundle_review
      - recovery_link_routes_through_apply_time_rollback_checkpoint

  - case_id: workflow.bundle_drift.remove_bundle_review_local_draft
    file: remove_bundle_review_local_draft.yaml
    drift_state_class: unmanaged_addition
    drift_axis: template_or_scaffold_ref
    drift_severity_class: informational_no_narrowing
    asset_ownership_class: user_owned
    claim_narrowing_class: no_narrowing_informational
    successor_bundle_suggestion_class: no_successor_drift_review
    drift_row_state_class: drift_row_superseded_by_remove_bundle_review
    remove_bundle_review_state_class: remove_review_completed_partial_user_data_retained
    exercises:
      - bundle_class_local_draft_bundle
      - safe_to_remove_class_safe_to_remove_user_overlay_preserved
      - safe_to_remove_class_not_safe_to_remove_user_owned
      - retained_local_override_class_override_retained_in_workspace_scope
      - recovery_link_non_reversible_with_justification_local_draft_no_prior_state
      - provenance_record_class_decision_row_link
