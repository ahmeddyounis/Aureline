schema_version: 1
manifest_id: aureline.workflow.bundle_lifecycle_visibility_case_fixtures
contract_doc_ref: docs/workflow/bundle_lifecycle_visibility_contract.md
companion_manifest_schema_ref: schemas/workflow/bundle_manifest.schema.json
companion_drift_row_schema_ref: schemas/workflow/bundle_drift_row.schema.json
companion_badge_freshness_contract_ref: docs/workflow/bundle_evidence_freshness_contract.md
companion_start_center_bundle_surfaces_ref: docs/ux/start_center_bundle_surfaces.md
bundle_successor_rows_ref: artifacts/workflow/bundle_successor_rows.yaml
certification_sheet_schema_ref: schemas/workflow/bundle_certification_sheet.schema.json

cases:
  - case_id: workflow.bundle_lifecycle.stale_certification_retest_needed_visible
    file: stale_certification_retest_needed_visible.yaml
    lifecycle_state_class: evidence_aged
    evidence_age_class: stale_past_window
    retest_needed_posture: retest_required
    exercises:
      - certification_expiry_visible_on_entry_and_support_surfaces
      - certification_sheet_carries_evidence_age_and_retest_posture

  - case_id: workflow.bundle_lifecycle.successor_available_deprecation_visible
    file: successor_available_deprecation_visible.yaml
    lifecycle_state_class: soft_deprecated_with_successor
    successor_recommendation_class: successor_recommended_first_party_native
    exercises:
      - successor_guidance_visible_without_erasing_history
      - successor_row_cites_decision_row_ref

  - case_id: workflow.bundle_lifecycle.mirror_only_offline_pack_visible
    file: mirror_only_offline_pack_visible.yaml
    mirror_or_offline_packaging_posture: mirror_only
    exercises:
      - mirror_only_posture_visible_with_lifecycle
      - offline_or_mirror_unknown_does_not_hide_successor_block

  - case_id: workflow.bundle_lifecycle.removed_extension_missing_artifact_visible
    file: removed_extension_missing_artifact_visible.yaml
    drift_state_class: missing_artifact
    exercises:
      - removed_artifact_family_projects_as_drift_and_narrowing

  - case_id: workflow.bundle_lifecycle.narrowed_support_class_visible
    file: narrowed_support_class_visible.yaml
    claim_narrowing_class: narrows_support_class_one_rung
    exercises:
      - support_class_narrowing_visible_on_bundle_and_support_surfaces

  - case_id: workflow.bundle_lifecycle.local_override_voids_certification_visible
    file: local_override_voids_certification_visible.yaml
    claim_narrowing_class: breaks_certification_target_recall
    exercises:
      - local_override_visible_and_certification_not_silent
      - successor_guidance_does_not_hide_override

