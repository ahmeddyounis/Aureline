schema_version: 1
manifest_id: aureline.workflow.bundle_review_case_fixtures
contract_doc_ref: docs/workflow/bundle_change_review_contract.md
bundle_change_preview_schema_ref: schemas/workflow/bundle_change_preview.schema.json
companion_manifest_ref: schemas/workflow/bundle_manifest.schema.json
companion_appearance_checkpoint_schema_ref: schemas/ux/appearance_checkpoint.schema.json

cases:
