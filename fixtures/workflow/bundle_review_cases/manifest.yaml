    file: fresh_install_certified_launch_bundle.yaml
    preview_intent_class: fresh_install_preview
    bundle_class: launch_bundle
    rollback_checkpoint_linkage_class: single_attributable_workspace_checkpoint
    exercises:
      - preview_intent_class_fresh_install_preview
      - preview_origin_class_start_center_review_bundle_action
      - change_axis_all_thirteen_component_kinds
      - change_axis_settings_or_token
      - change_axis_trust_or_permission_workspace_grant
      - change_axis_compatibility_or_runtime
      - side_effect_envelope_full
      - review_actions_six_required
      - rollback_checkpoint_linkage_single_attributable_workspace_checkpoint

  - case_id: workflow.bundle_review.update_paired_appearance_and_workspace
    file: update_paired_appearance_and_workspace.yaml
    preview_intent_class: update_to_newer_revision_preview
    bundle_class: launch_bundle
    rollback_checkpoint_linkage_class: paired_workspace_and_appearance_checkpoint
    exercises:
