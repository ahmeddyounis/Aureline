__fixture__:
  name: share_link_revoked_with_regenerate
  scenario: >
    Previously-active temporary external share-link record now revoked
    by the user. Resolved state collapses to terminal_unavailable_revoked
    with a typed terminal explanation, a typed regenerate path, and a
    fresh share-sheet record offered as a regenerate target.
    Demonstrates that revoked links never masquerade as current live
    previews.

