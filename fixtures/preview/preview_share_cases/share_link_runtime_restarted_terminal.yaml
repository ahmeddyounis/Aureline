__fixture__:
  name: share_link_runtime_restarted_terminal
  scenario: >
    Previously-active organization-only share-link record whose bound
    preview runtime has now restarted. Lifecycle moves to
    terminal_unavailable_runtime_restart, resolved state collapses to
    terminal_unavailable_runtime_restarted, and a regenerate-after-runtime-restart
    path opens a fresh sheet. Demonstrates the runtime-restart continuity
    rule: an old link cannot resolve to the new runtime.

