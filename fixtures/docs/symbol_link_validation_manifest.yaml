# Docs-browser symbol-linked reference validation corpus.
#
# Stable case ids for the docs_browser_result_record every docs-
# browser row (docs-browser surface, docs pane, AI-explanation
# overlay quoting a row, onboarding step, support-export row, Help /
# About footer) emits. Later docs-browser webview, AI-explanation
# overlay, onboarding, and support-export surfaces should cite these
# ids instead of minting per-surface symbol-link copy, silent
# version-drift resolution, or ambiguous "see docs" chips.
#
# This manifest is the companion roster for
# docs/verification/docs_browser_packet.md. If the two disagree, the
# packet doc wins for reviewer language and the frozen taxonomies
# (docs/adr/0013-docs-help-service-health-truth.md,
# docs/docs/docs_pack_manifest_contract.md,
# docs/docs/help_about_service_health_routes.md,
# docs/adr/0010-connected-provider-browser-handoff-approval-ticket.md,
# docs/adr/0015-embedded-surface-boundary-and-auth-handoff.md) win
# for tooling.
#
# Rules:
#   - Every row MUST cite one result_kind token from the frozen
#     vocabulary. Silent blanks are non-conforming.
#   - Every row MUST cite one symbol_link_resolution_class token and,
#     when the resolution traversed fallback rungs, a non-empty
#     symbol_link_resolution_fallback_chain.
#   - Every row MUST cite one docs_browser_cache_state_class token
#     from the frozen vocabulary.
#   - Every row MUST cite one project_vs_vendor_truth_cue token.
#   - Every row MUST cite one derived_explanation_reuse_state token.
#   - Every row whose browser_handoff_explanation_class is non-null
#     MUST cite one destination_descriptor_ref; raw URLs never live
#     on this manifest.
#   - Adding a case id is additive-minor. Repurposing an id is
#     breaking and requires a new decision row in
#     artifacts/governance/decision_index.yaml.

