    outcome_class: denied_offline_expiration_past
    docs_pack_manifest_ref: fixtures/docs/docs_pack_examples/mirrored_official_docs_offline.json
    pack_id: pack:mirror:lang-stdlib:01
    pack_revision_ref: pack-rev:mirror:lang-stdlib:2026.03.22-01
    source_class: mirrored_official_docs
    cache_state_class: offline_bundle_pinned
    freshness_class: stale
