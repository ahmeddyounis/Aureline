    minted_at: 2026-07-06T09:30:00Z
    offline_expiration_at: 2026-07-05T09:30:00Z
    notes: >
      Offline bundle's monotonic deadline passed; row denies render
      even though the cache still holds bytes. The honest stale
      denial is the correct posture; rendering cached bytes past
      the declared deadline is non-conforming.
    conformance_refs:
      - docs_browser.offline_mirror_drill
      - docs_browser.source_version_cache_honesty
