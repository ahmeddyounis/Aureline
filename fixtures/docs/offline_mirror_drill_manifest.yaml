# Docs-browser offline / mirror drill corpus.
#
# Stable drill ids for the offline_mirror_drill_record the docs
# browser (and any surface that quotes a docs-browser row) emits
# when the canonical owner of a pack is unreachable, when a mirror
# lineage breaks, when a signed offline bundle resolves a row, when
# an offline expiration deadline passes, when a signature re-verify
# is in flight, or when the product must fall through to project
# docs without an empty-state lie.
#
# Later docs-browser webview, AI-explanation overlay, onboarding,
# and support-export surfaces should cite these ids instead of
# minting per-surface offline / mirror copy or silently rendering an
# empty result body when the owner is unreachable.
#
# This manifest is the companion drill roster for
# docs/verification/docs_browser_packet.md and pairs with
# fixtures/docs/symbol_link_validation_manifest.yaml for symbol-link
# resolution coverage. If the manifests and the packet doc disagree,
# the packet doc wins for reviewer language and the frozen
# taxonomies (docs/adr/0013-docs-help-service-health-truth.md,
# docs/docs/docs_pack_manifest_contract.md,
# schemas/docs/docs_pack_manifest.schema.json) win for tooling.
#
# Rules:
#   - Every drill row MUST cite one offline_mirror_drill_outcome_class
#     token from the frozen vocabulary. Empty-state copy without a
#     typed outcome is non-conforming.
#   - Every drill row MUST cite the docs_pack_manifest_record it
#     resolves against (by pack id and pack revision ref) so
#     reviewers can trace the mirror / offline lineage.
#   - Every denied outcome MUST cite one ADR-0013 denial_reason
#     token and a typed repair_hook_ref.
#   - Every deferred outcome MUST set cache_state_class to
#     unknown_pending_reverify.
#   - Adding a drill id is additive-minor. Repurposing an id is
#     breaking and requires a new decision row in
#     artifacts/governance/decision_index.yaml.

schema_version: 1
manifest_id: docs.offline_mirror_drill_manifest.v1
status: seeded

overview_page: docs/verification/docs_browser_packet.md
symbol_link_validation_source: fixtures/docs/symbol_link_validation_manifest.yaml
privacy_review_source: artifacts/docs/privacy_context_sharing_review.md
truth_source_adr_source: docs/adr/0013-docs-help-service-health-truth.md
docs_pack_manifest_contract_source: docs/docs/docs_pack_manifest_contract.md
docs_pack_manifest_schema_source: schemas/docs/docs_pack_manifest.schema.json

reference_fixture_refs:
  - fixtures/docs/docs_pack_examples/project_docs_fresh.json
  - fixtures/docs/docs_pack_examples/mirrored_official_docs_offline.json
  - fixtures/docs/docs_pack_examples/curated_knowledge_pack_partially_stale.json
  - fixtures/docs/docs_pack_examples/support_runbook_newer_than_client.json
  - fixtures/docs/docs_pack_examples/generated_reference_non_publishable.json

offline_mirror_drill_record_fields:
  - drill_id
  - outcome_class
  - docs_pack_manifest_ref
  - pack_id
  - pack_revision_ref
  - source_class
  - cache_state_class
  - freshness_class
  - version_match_state
  - degraded_state_cause
  - denial_reason
  - repair_hook_ref
  - project_docs_fallthrough_ref
  - browser_handoff_explanation_class
  - destination_descriptor_ref
  - citation_anchor_refs_preserved
  - audit_event_ids
  - policy_context
  - redaction_class
  - export_inclusion_posture
  - minted_at

# Frozen vocabularies re-exported so tooling can discover the
# authoritative list without parsing the packet doc.
offline_mirror_drill_outcome_class_vocabulary:
  - graceful_cache_within_window
  - graceful_offline_bundle_recovery
  - graceful_project_docs_fallthrough
  - denied_mirror_continuity_broken
  - denied_signature_unverified
  - deferred_pending_reverify
  - denied_offline_expiration_past

denial_reason_vocabulary:
  - source_class_unresolved
  - version_match_state_unresolved
  - incompatible_drift_detected
  - signature_unverified
  - mirror_continuity_broken
  - pack_quarantined
  - freshness_floor_unmet
  - client_scope_excludes_surface
  - service_contract_mismatch
  - policy_blocked
  - derived_explanation_uncited
  - vendor_docs_overrode_project_without_disclosure
  - about_packet_publisher_unresolved
  - browser_handoff_reason_outside_subset
  - parity_field_missing
  - help_status_badge_schema_version_lagging

audit_event_id_vocabulary:
  - help_status_badge_emitted
  - help_status_badge_refused
  - docs_pack_version_match_changed
  - docs_pack_freshness_downgraded
  - docs_pack_freshness_recovered
  - vendor_docs_overrode_project
  - derived_explanation_cited
  - derived_explanation_uncited_refused
  - service_contract_state_changed
  - service_local_only_engaged
  - service_policy_blocked
  - about_packet_publisher_unresolved
  - browser_handoff_from_docs_help_service_health_issued
  - parity_audit_field_missing
  - help_status_badge_schema_version_bumped

