__fixture__:
  name: not_installed_pack
  scenario: >
    The user navigated to a curated knowledge pack that was referenced from
    the docs index but no copy is resident on this machine. install_state
    is not_installed, cache_class is not_cached_not_installed. The pane
    MUST suppress the body with the typed pack_not_installed denial
    reason and route to a repair hook (here import_offline_onboarding_bundle
    when the deployment is air-gapped, or refresh_freshness for online
    fetch-on-demand); silent fallback to a generic placeholder is
    forbidden.
  exercised_axes:
    pane_role: in_product_docs_pane
    source_class: curated_knowledge_pack
    cache_class: not_cached_not_installed
    install_state: not_installed
    denial_reasons: [pack_not_installed]
    copy_rule_class: not_installed_pack_copy
    renderable: false
  contract_sections:
    - "Cached, mirrored, stale, not-installed, unavailable-locale rules"
    - "State copy rules"
