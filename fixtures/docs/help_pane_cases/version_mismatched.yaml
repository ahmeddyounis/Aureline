__fixture__:
  name: version_mismatched
  scenario: >
    The user opened a support runbook page but the running build is on the
    1.0.x channel and the runbook pack was published against a 1.1.x
    target. version_match_state resolves to incompatible_drift_detected.
    The pane MUST suppress the body with the typed
    incompatible_drift_detected denial reason and route to the
    upgrade_release_channel repair hook; silent render of the runbook
    against the wrong client is forbidden.
  exercised_axes:
    pane_role: in_product_docs_pane
    source_class: support_runbook
    version_match_state: incompatible_drift_detected
    install_state: live_installed_current
    denial_reasons: [incompatible_drift_detected]
    copy_rule_class: version_mismatched_copy
    renderable: false
  contract_sections:
    - "State copy rules"
    - "Cached, mirrored, stale, not-installed, unavailable-locale rules"
