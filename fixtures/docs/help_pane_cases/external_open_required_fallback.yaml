__fixture__:
  name: external_open_required_fallback
  scenario: >
    The embedded docs-browser body cannot render the requested page (the
    embedded surface declined to load the cross-origin document and the
    cached snapshot has expired). The pane offers system-browser as a
    required fallback for the same logical object. pane_role is
    embedded_docs_browser_body, disclosure_mode is embedded_boundary_card,
    external_open_path is required_fallback_when_in_product_unavailable,
    and the screenshot-safe / export-safe browser_handoff_reason is
    external_docs_or_runbook. data_exit_boundary is metadata_only_on_handoff
    so only typed metadata leaves the product.
  exercised_axes:
    pane_role: embedded_docs_browser_body
    source_class: mirrored_official_docs
    external_open_path: required_fallback_when_in_product_unavailable
    browser_handoff_reason: external_docs_or_runbook
    disclosure_mode: embedded_boundary_card
    copy_rule_class: external_open_required_fallback_copy
    renderable: true
  contract_sections:
    - "State copy rules"
    - "External-open and source-of-truth rules"
