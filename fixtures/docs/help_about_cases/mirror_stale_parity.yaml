parity_axes_must_match:
  - source_class
  - exact_build_applicability
  - running_build_identity_ref
  - version_match_state
  - support_class
  - client_scopes
  - freshness_class
  - availability_state
  - degraded_state_cause
  - disclosure_safety_class
  - release_center_exact_build_identity_ref

allowed_axis_disagreements:
  - axis: external_open_policy
    rationale: >
      Docs panes may require a browser fallback when in-product rendering is stale,
      while release center does not offer the open action itself; Help/About and
      service-health may offer optional_same_object to the canonical owner.
  - axis: browser_handoff_reason
    rationale: >
      Release center rows may omit the browser route entirely while still exporting
      the same stale/mirror posture and exact-build backreferences.
  - axis: community_handoff_route
    rationale: >
      Only surfaces that offer community routing populate the community handoff block.
  - axis: release_center_event_ref
    rationale: >
      Only release-bearing surfaces populate release-center event refs; other surfaces
      may carry null while remaining mechanically alignable through the build identity ref.

minted_at: "2026-05-06T18:00:00Z"

