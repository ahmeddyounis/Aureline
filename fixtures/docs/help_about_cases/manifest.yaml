schema_version: 1
manifest_id: aureline.help_about_service_health_parity_cases
parity_packet_ref: docs/docs/docs_help_about_service_health_parity.md
parity_matrix_ref: artifacts/docs/help_parity_matrix.yaml
projection_schema_ref: schemas/docs/help_badge_projection.schema.json

cases:
  - case_id: docs.help_about_service_health.parity.mirror_stale
    file: mirror_stale_parity.yaml
    exercises:
      - source_class.mirrored_official_docs
      - freshness_class.stale
      - degraded_state_cause.freshness_floor_unmet
  - case_id: docs.help_about_service_health.parity.docs_pack_missing
    file: docs_pack_missing_parity.yaml
    exercises:
      - availability_state.not_installed
      - degraded_state_cause.pack_unreachable
  - case_id: docs.help_about_service_health.parity.version_mismatch
    file: version_mismatch_parity.yaml
    exercises:
      - version_match_state.incompatible_drift_detected
      - degraded_state_cause.version_mismatch
  - case_id: docs.help_about_service_health.parity.provider_outage
    file: provider_outage_parity.yaml
    exercises:
      - service_contract_state.unavailable
      - degraded_state_cause.external_status_feed_unreachable
  - case_id: docs.help_about_service_health.parity.community_handoff
    file: community_handoff_parity.yaml
    exercises:
      - community_handoff_route.public_issue_tracker
  - case_id: docs.help_about_service_health.parity.browser_only_page
    file: browser_only_page_parity.yaml
    exercises:
      - external_open_policy.required_primary_route
      - browser_handoff_reason.external_docs_or_runbook
  - case_id: docs.help_about_service_health.parity.cached_out_of_scope_client
    file: cached_out_of_scope_client_parity.yaml
    exercises:
      - client_scopes.cli
      - degraded_state_cause.client_scope_excludes_surface
  - case_id: docs.help_about_service_health.parity.exact_build_mismatch_between_product_and_docs_pack
    file: exact_build_mismatch_between_product_and_docs_pack_parity.yaml
    exercises:
      - release_center_exact_build_identity_ref
      - version_match_state.incompatible_drift_detected

