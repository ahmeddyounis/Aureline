    local_only_or_sync_posture_explicit: true
    repo_pack_read_default: false
    classroom_read_default: false
    telemetry_read_default: false
    exact_reopen_ref: reopen:step:aureline.import.preview-before-apply@learning-pack-rev:aureline.import.cached:2026.05.14-01#en-US
