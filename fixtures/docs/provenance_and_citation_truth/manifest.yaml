record_kind: docs_knowledge_surface_fixture_manifest
schema_version: 1
fixture_set: docs_provenance_and_citation_truth
artifact_ref: artifacts/docs/docs_evidence_packets/provenance_and_citation_truth_packet.json
schema_refs:
  - schemas/docs/docs_node_provenance.schema.json
  - schemas/docs/docs_derived_explanation.schema.json
covered_surfaces:
  - docs_browser
  - glossary_card
  - architecture_map
  - topology_explainer
  - codebase_explainer
  - quick_help
  - docs_backed_search
  - docs_backed_ai
cases:
  - case_id: current-offline-glossary-preserves-citations
    scenario: A pinned glossary card remains current, exposes mirror/offline posture, and keeps exact anchors keyboard inspectable.
    expected_truth_label: current_docs
    expected_mirror_offline_posture: offline_pinned_pack
  - case_id: stale-generated-explainer-downgrades
    scenario: A generated codebase explainer over stale docs downgrades to Retest pending while retaining upstream citations.
    expected_truth_label: retest_pending
    expected_derived_explanation_kind: generated
  - case_id: support-ai-export-preserves-provenance
    scenario: The exported packet retains source version, build date, freshness, locality, anchors, derived labels, and AI/explainer packet refs.
    expected_ai_packet_ref: ai-evidence:docs-backed:architecture-routing
