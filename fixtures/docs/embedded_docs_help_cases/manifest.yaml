schema_version: 1
manifest_id: aureline.embedded_docs_help_cases
parity_packet_ref: artifacts/docs/embedded_docs_help_parity_packet.md
help_pane_state_schema_ref: schemas/docs/help_pane_state.schema.json
destination_descriptor_schema_ref: schemas/docs/destination_descriptor.schema.json
docs_pack_manifest_schema_ref: schemas/docs/docs_pack_manifest.schema.json
about_card_schema_ref: schemas/about/about_card.schema.json
onboarding_pack_state_schema_ref: schemas/docs/onboarding_pack_state.schema.json
public_drift_item_schema_ref: schemas/public_truth/public_drift_item.schema.json

cases:
  - case_id: docs.embedded_help.parity.cached_only_owner_unreachable
    file: cached_only_owner_unreachable_parity.yaml
    exercises:
      - cache_class.cached_snapshot_only_owner_unreachable
      - install_state.remote_unavailable
      - copy_rule_class.cached_snapshot_only_owner_unreachable_copy
      - external_open_path.required_fallback_when_in_product_unavailable
  - case_id: docs.embedded_help.parity.mirror_only_offline
    file: mirror_only_offline_parity.yaml
    exercises:
      - cache_class.mirror_only_verified_offline
      - offline_posture.air_gapped_signed_bundle
      - copy_rule_class.mirror_only_verified_offline_copy
      - external_open_path.not_permitted
  - case_id: docs.embedded_help.parity.stale_example_disclosed_inline
    file: stale_example_disclosed_inline_parity.yaml
    exercises:
      - stale_example_disclosure_class.stale_examples_disclosed_inline
      - copy_rule_class.stale_example_disclosed_copy
      - source_class.curated_knowledge_pack
  - case_id: docs.embedded_help.parity.locale_unavailable_not_installed
    file: locale_unavailable_not_installed_parity.yaml
    exercises:
      - locale_availability_state.requested_locale_not_installed
      - locale_fallback_disclosure_class.surface_suppressed_no_fallback_rendered
      - denial_reasons.locale_missing_not_installed
      - copy_rule_class.unavailable_locale_copy
  - case_id: docs.embedded_help.parity.not_installed_pack
    file: not_installed_pack_parity.yaml
    exercises:
      - cache_class.not_cached_not_installed
      - install_state.not_installed
      - denial_reasons.pack_not_installed
      - copy_rule_class.not_installed_pack_copy
  - case_id: docs.embedded_help.parity.external_open_allowed_optional_same_object
    file: external_open_allowed_optional_same_object_parity.yaml
    exercises:
      - external_open_path.optional_same_object
      - browser_handoff_reason.external_docs_or_runbook
      - data_exit_boundary.metadata_only_on_handoff
      - disclosure_safety_class.screenshot_safe_export_safe
  - case_id: docs.embedded_help.parity.external_open_blocked_by_policy
    file: external_open_blocked_by_policy_parity.yaml
    exercises:
      - policy_limited_behavior.external_open_blocked_by_policy
      - external_open_path.not_permitted
      - copy_rule_class.policy_limited_copy
  - case_id: docs.embedded_help.parity.policy_limited_pane_suppressed
    file: policy_limited_pane_suppressed_parity.yaml
    exercises:
      - policy_limited_behavior.pane_suppressed_by_policy
      - denial_reasons.policy_blocked
      - copy_rule_class.policy_limited_copy
