  severity_class_when_lane_offers_browser_handoff: release_blocking_overclaim
  audited_surface_class_when_lane_hides_narrowing: help_pane
  mismatch_category_class_when_lane_hides_narrowing: known_limit_missing
  severity_class_when_lane_hides_narrowing: same_change_blocker
  narrowing_path_class: public_copy_narrowing
  notes: >
    A lane that offers any browser-handoff action under this
    policy widens past the admin narrowing and routes to
    policy_disabled_hidden at release_blocking_overclaim. A lane
    that hides the policy narrowing in a tooltip drops the
    required known limit and routes to known_limit_missing at
    same_change_blocker.

