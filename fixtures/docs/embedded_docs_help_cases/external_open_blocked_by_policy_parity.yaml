__fixture__:
  name: external_open_blocked_by_policy_parity
  scenario: >
    Admin policy on this deployment forbids browser handoff from
    docs / Help panes. Every consuming lane is otherwise renderable
    against the project's local docs pack but the open-in-browser
    action is blocked by policy. Each lane MUST set
    policy_limited_behavior = external_open_blocked_by_policy,
    external_open_path = not_permitted, browser_handoff_reason = null,
    and the policy narrowing MUST render on the primary surface
    (tooltip-only narrowings are non-conforming on every lane).
  contract_sections:
    - "Parity rules"
    - "State classes covered"
  parity_packet_section: "State classes covered: external_open_blocked_by_policy"

