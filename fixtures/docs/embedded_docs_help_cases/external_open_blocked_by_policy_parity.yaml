allowed_axis_disagreements:
  - axis: source_class
  - axis: version_match_state
    rationale: >
      Pane / onboarding lanes are build-bound on project_docs;
      About / support-export project the About-packet's
      derived_explanation row at not_build_bound. Both lanes
      remain blocked from offering a browser handoff regardless
      of build binding.
  - axis: disclosure_mode
    rationale: >
      Per-surface chrome differs but the policy-narrowing
      disclosure copy is the same.
  - axis: offline_posture
    rationale: >
      Pane / onboarding read the project pack as
      fully_available_offline; About / support-export consume
      the about-packet projection as cached_snapshot_offline.
  - axis: data_exit_boundary
    rationale: >
      Pane / About / onboarding stay no_payload_leaves_product;
      support-export carries user_reviewed_export_packet.

