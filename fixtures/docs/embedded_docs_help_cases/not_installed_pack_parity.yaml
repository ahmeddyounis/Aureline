__fixture__:
  name: not_installed_pack_parity
  scenario: >
    The user navigated to a curated knowledge pack that was
    referenced from the docs index but no copy is resident on this
    machine. The embedded docs / help pane and the onboarding
    overlay MUST suppress the body with pack_not_installed and
    route to import_offline_onboarding_bundle (air-gapped) or
    refresh_freshness (online fetch-on-demand). The Help / About
    pane lists the pack as not-installed in the known-limits row;
    the support-export omits the pack body but cites the missing
    pack id so a support operator sees why the export is
    incomplete. Silent fallback to a generic placeholder is
    forbidden on every lane.
  contract_sections:
    - "Parity rules"
    - "State classes covered"
  parity_packet_section: "State classes covered: not_installed_pack"

