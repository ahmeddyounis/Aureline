allowed_axis_disagreements:
  - axis: renderable
    rationale: >
      Pane / onboarding suppress with pack_not_installed because
      they cannot render the pack body without a resident copy;
      About / support-export remain renderable but list the pack
      as not-installed in the known-limits row and cite the
      missing pack id. Each lane MUST carry copy_rule_class =
      not_installed_pack_copy and the same repair hook kind.
  - axis: denial_reasons
    rationale: >
      Suppressed lanes carry pack_not_installed; About /
      support-export are renderable with the typed not-installed
      disclosure in the known-limits row.
  - axis: disclosure_mode
    rationale: >
      Disclosure mode is per-surface chrome (inline cached badge,
      embedded boundary card, pre-handoff review). The typed
      not-installed disclosure renders on every primary surface.
  - axis: data_exit_boundary
    rationale: >
      Pane / About / onboarding stay no_payload_leaves_product;
      support-export carries user_reviewed_export_packet.

parity_failure_routing:
  drift_item_template_ref: schemas/public_truth/public_drift_item.schema.json
  audited_surface_class_when_lane_renders_placeholder: help_pane
  mismatch_category_class_when_lane_renders_placeholder: projection_broader_than_owner
  severity_class_when_lane_renders_placeholder: release_blocking_overclaim
  audited_surface_class_when_about_drops_known_limit: known_limits_section
  mismatch_category_class_when_about_drops_known_limit: known_limit_missing
  severity_class_when_about_drops_known_limit: same_change_blocker
  narrowing_path_class: public_copy_narrowing
  notes: >
    A lane that silently falls back to a generic placeholder
    (lorem-ipsum body, "see official docs" without citing the
    missing pack id, or a fabricated abstract) widens past the
    not-installed truth and routes to projection_broader_than_owner.
    An About / support-export lane that omits the typed not-installed
    disclosure from the known-limits row routes to known_limit_missing
    at same_change_blocker.

