__fixture__:
  name: stale_example_disclosed_inline_parity
  scenario: >
    A curated knowledge pack is publishable but renders two stale
    examples whose target symbols moved. The pack stays renderable
    (its stale ratio is below the publisher's threshold). Every
    consuming lane (embedded docs / help pane, Help / About,
    onboarding overlay, exported support / help) MUST surface
    stale_example_disclosure_class = stale_examples_disclosed_inline
    on the primary surface; tooltip-only disclosure is forbidden.
    Each lane MUST pin the same stale_example_refs so a parity
    audit can confirm the typed disclosure matches.
  contract_sections:
    - "Parity rules"
    - "State classes covered"
    - "Parity-failure routing"
  parity_packet_section: "State classes covered: stale_example_disclosed_inline"

