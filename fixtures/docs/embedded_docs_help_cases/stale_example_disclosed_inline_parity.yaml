  - source_class
  - version_match_state
  - freshness_class
  - cache_class
  - install_state
  - offline_posture
  - mirror_chain_status
  - locale_availability_state
  - locale_fallback_disclosure_class
  - external_open_path
  - browser_handoff_reason
  - policy_limited_behavior
  - stale_example_disclosure_class
  - stale_example_refs
  - copy_rule_class
  - renderable

allowed_axis_disagreements:
  - axis: disclosure_mode
    rationale: >
      Disclosure mode is per-surface chrome (inline cached badge,
      embedded boundary card for the onboarding overlay, pre-handoff
      review for the support summary). The typed stale-example
      disclosure copy is the same on every primary surface.
  - axis: data_exit_boundary
    rationale: >
      Pane / About / onboarding stay no_payload_leaves_product;
      support-export carries user_reviewed_export_packet because the
      support packet itself is the user-reviewed export envelope.

parity_failure_routing:
  drift_item_template_ref: schemas/public_truth/public_drift_item.schema.json
  audited_surface_class_when_lane_drops_disclosure: help_pane
  mismatch_category_class_when_lane_drops_disclosure: known_limit_missing
  severity_class_when_lane_drops_disclosure: same_change_blocker
  narrowing_path_class: public_copy_narrowing
  notes: >
    A lane that hides the typed stale-example disclosure (renders
    only in a tooltip, suppresses the chip, or restates support
    copy without the disclosure) routes to known_limit_missing at
    same_change_blocker. The audit also writes a row to
    artifacts/docs/stale_example_audit_rows.yaml; see
    stale_example_audit_row_refs below.

stale_example_audit_row_refs:
  - stale_example_audit_row.docs_pack.rename_walkthrough.rename_step.2026q2
  - stale_example_audit_row.docs_pack.format_on_save.setting_default.2026q2

