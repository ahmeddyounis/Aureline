__fixture__:
  name: locale_unavailable_not_installed_parity
  scenario: >
    The user requested the docs pane in pt-BR. The project ships an
    English primary pack but the pt-BR locale-specific pack is
    referenced and not resident. The pane and the onboarding overlay
    MUST suppress the body with locale_missing_not_installed and
    route to install_locale_pack; silent fallback to English is
    forbidden. The Help / About pane and the support-export lane
    degrade to the English primary locale with the typed
    inline_fallback_disclosure_rendered fallback so reviewers can
    see that the surfaces did not silently switch locales.
  contract_sections:
    - "Parity rules"
    - "State classes covered"
  parity_packet_section: "State classes covered: locale_unavailable_not_installed"

