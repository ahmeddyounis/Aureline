allowed_axis_disagreements:
  - axis: locale_availability_state
    rationale: >
      Pane and onboarding overlay denominate the missing locale as
      requested_locale_not_installed (pane is suppressed because it
      cannot render Brazilian Portuguese authoritative content);
      Help / About and exported support / help degrade to
      requested_locale_missing_fallback_to_primary because they
      project a primary-locale About / support-export with the
      typed inline disclosure that the requested locale was missing.
      Both lanes carry copy_rule_class = unavailable_locale_copy.
  - axis: locale_fallback_disclosure_class
    rationale: >
      Pane / onboarding suppress with surface_suppressed_no_fallback_rendered;
      About / support-export render inline_fallback_disclosure_rendered.
      Either typed disclosure satisfies the no-silent-fallback rule.
  - axis: install_state
    rationale: >
      Onboarding sees the locale pack as not_installed; pane / About /
      support-export read the project's primary-locale pack as
      live_installed_current. The locale-specific pack is the missing
      object; the primary pack still resolves.
  - axis: cache_class
    rationale: >
      Onboarding uses warm_cached_within_window for the primary
      pack but the locale-specific pack is not_cached_not_installed
      and is the suppression target; pane / About / support-export
      project the primary pack's warm_cached_within_window. The
      parity check tests the surface's effective render rather than
      the locale-specific pack's cache.
  - axis: renderable
    rationale: >
      Pane / onboarding suppress because pt-BR authoritative truth
      is unavailable; About / support-export render the primary
      locale with the typed disclosure. Each lane MUST emit a
      typed denial reason or a typed locale-fallback disclosure;
      silent fallback is forbidden.
  - axis: denial_reasons
    rationale: >
      Suppressed lanes carry locale_missing_not_installed; About
      and support-export are renderable with the inline fallback
      disclosure and therefore carry no denial reason.

parity_failure_routing:
  drift_item_template_ref: schemas/public_truth/public_drift_item.schema.json
  audited_surface_class_when_lane_silently_falls_back: help_pane
  mismatch_category_class_when_lane_silently_falls_back: projection_broader_than_owner
  severity_class_when_lane_silently_falls_back: release_blocking_overclaim
  narrowing_path_class: public_copy_narrowing
  notes: >
    A lane that silently falls back to the primary locale without
    the typed locale_fallback_disclosure_class fails parity and
    routes to projection_broader_than_owner at
    release_blocking_overclaim; a pane that renders
    authoritative_live in the requested locale when the locale
    pack is missing widens past the canonical owner and routes to
    the same closure.

