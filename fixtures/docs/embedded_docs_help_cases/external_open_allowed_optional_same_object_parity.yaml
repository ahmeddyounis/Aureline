  name: external_open_allowed_optional_same_object_parity
  scenario: >
    The Help / About pane is rendering its known-limits section.
    Source is the about-packet publisher; the canonical owner
    publishes a system-browser route for the same logical object
    (the published About content). Each consuming lane MUST quote
    the same destination descriptor for the optional same-object
    handoff, the same screenshot-safe / export-safe
    browser_handoff_reason (external_docs_or_runbook), and the same
    data_exit_boundary (metadata_only_on_handoff). External-open is
    optional, not required; the in-product render remains the
    canonical truth for this object.
  contract_sections:
    - "Parity rules"
    - "State classes covered"
  parity_packet_section: "State classes covered: external_open_allowed_optional_same_object"

