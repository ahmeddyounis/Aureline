allowed_axis_disagreements:
  - axis: source_class
  - axis: version_match_state
    rationale: >
      Pane / onboarding lanes project the build-bound project_docs
      pack at exact_build_match; About / support-export project
      the about-packet's derived_explanation row at
      exact_build_applicability = not_build_bound (version_match_state
      is null). Both lanes hand off to the same canonical About
      browser route, so the optional same-object route remains
      coherent across lanes.
  - axis: copy_rule_class
    rationale: >
      Pane / onboarding render warm_cached_within_window_copy on
      the build-bound project pack; About / support-export render
      support_export_known_limits_copy because they project the
      About-packet's known-limits row. Both copy classes admit
      the same optional same-object handoff.
  - axis: disclosure_mode
    rationale: >
      Per-surface chrome differs but the optional handoff
      disclosure copy is the same.
  - axis: offline_posture
    rationale: >
      Pane / onboarding read the project pack as
      fully_available_offline; About / support-export consume the
      about-packet projection as cached_snapshot_offline. The
      external-open route stays optional regardless of offline
      posture.
  - axis: data_exit_boundary
    rationale: >
      Pane / About / onboarding lanes carry metadata_only_on_handoff
      for the browser handoff; support-export lane carries
      user_reviewed_export_packet because the support packet is
      itself a user-reviewed export envelope.

parity_failure_routing:
  drift_item_template_ref: schemas/public_truth/public_drift_item.schema.json
  audited_surface_class_when_lane_promotes_route: help_pane
  mismatch_category_class_when_lane_promotes_route: projection_broader_than_owner
  severity_class_when_lane_promotes_route: release_blocking_overclaim
  audited_surface_class_when_lane_drops_handoff_reason: help_pane
  mismatch_category_class_when_lane_drops_handoff_reason: projection_broader_than_owner
  severity_class_when_lane_drops_handoff_reason: release_blocking_overclaim
  narrowing_path_class: public_copy_narrowing
  notes: >
    A lane that promotes external_open_path from optional_same_object
    to required_primary_route without the canonical owner declaring
    browser-primary widens past the owner. A lane that mints a
    handoff reason outside the screenshot-safe / export-safe subset
    also widens past the owner; either failure routes to
    projection_broader_than_owner at release_blocking_overclaim and
    the help-pane state record's denial_reasons includes
    browser_handoff_reason_outside_subset.

