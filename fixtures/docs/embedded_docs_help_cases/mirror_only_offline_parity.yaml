__fixture__:
  name: mirror_only_offline_parity
  scenario: >
    Air-gapped enterprise deployment. Every consuming surface is
    rendering a signed-mirror bundle imported via air-gapped media;
    the live canonical owner is out of scope for this envelope.
    Browser handoff is not permitted by deployment policy. Each lane
    MUST disclose the mirror-only posture inline, MUST quote the
    air-gapped origin label, and MUST NOT advertise an external
    open. Support export carries the air-gapped origin in the
    known-limits row.
  contract_sections:
    - "Parity rules"
    - "State classes covered"
    - "Out-of-scope"
  parity_packet_section: "State classes covered: mirror_only_offline"

