allowed_axis_disagreements:
  - axis: disclosure_mode
    rationale: >
      Disclosure mode is per-surface chrome (inline cached badge,
      embedded boundary card, pre-handoff review). The disclosure
      copy itself remains the air-gapped mirror-only wording.
  - axis: data_exit_boundary
    rationale: >
      Pane / About / onboarding lanes carry no_payload_leaves_product
      because no browser handoff is offered; support-export lane
      carries user_reviewed_export_packet because the support packet
      is itself a user-reviewed export. Both stay inside the
      no-browser-handoff envelope.

