__fixture__:
  name: cached_only_owner_unreachable_parity
  scenario: >
    The mirrored official reference docs were last refreshed against
    the canonical owner two days ago; the owner is currently
    unreachable so every consuming surface is rendering the cached
    snapshot. The four lanes (embedded docs / help pane, Help / About
    pane, onboarding overlay, exported support / help links) MUST
    each disclose cached_snapshot_only_owner_unreachable on the
    primary surface, MUST quote the same screenshot-safe / export-
    safe browser_handoff_reason, and MUST offer the optional same-
    object system-browser fallback for when the owner returns.
  contract_sections:
    - "Parity rules"
    - "State classes covered"
    - "Parity-failure routing"
  parity_packet_section: "State classes covered: cached_only_owner_unreachable"

