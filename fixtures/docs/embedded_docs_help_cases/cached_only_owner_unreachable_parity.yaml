allowed_axis_disagreements:
  - axis: external_open_path
    rationale: >
      Embedded docs / help pane and onboarding overlay declare
      required_fallback_when_in_product_unavailable because the
      cached body is the in-product render that may need a same-
      object browser fallback when the owner returns; Help / About
      and exported support / help lanes declare optional_same_object
      because they always advertise the canonical owner's browser
      route alongside the in-product render. The lanes still quote
      one destination descriptor and one screenshot-safe / export-
      safe browser_handoff_reason.
  - axis: disclosure_mode
    rationale: >
      Disclosure mode is per-surface chrome (inline cached badge for
      the in-product pane, embedded boundary card inside the
      onboarding overlay, pre-handoff review inside Help / About and
      support export). The disclosure copy itself is the same.
  - axis: data_exit_boundary
    rationale: >
      Pane / About / onboarding lanes carry metadata_only_on_handoff
      for the optional / fallback browser route; support-export lane
      carries user_reviewed_export_packet because the support packet
      is itself a user-reviewed export.

parity_failure_routing:
  drift_item_template_ref: schemas/public_truth/public_drift_item.schema.json
  audited_surface_class_when_pane_widens: help_pane
  mismatch_category_class_when_pane_implies_live: projection_broader_than_owner
  severity_class_when_pane_implies_live: release_blocking_overclaim
  narrowing_path_class: public_copy_narrowing
  notes: >
    A pane that picks copy_rule_class = live_authoritative_truth_copy
    while the canonical owner is unreachable widens past the owner
    and routes to release_blocking_overclaim.

