__fixture__:
  name: policy_limited_pane_suppressed_parity
  scenario: >
    Admin policy on this deployment suppresses the entire docs pane
    (for example, vendor-provider docs panes are disabled in this
    tenant). The pane and the onboarding overlay MUST suppress with
    policy_limited_behavior = pane_suppressed_by_policy and
    denial_reasons = [policy_blocked]; the typed repair hook is
    request_admin_policy_change. The Help / About pane and the
    support-export lane remain renderable but MUST cite the policy
    narrowing in the known-limits row so reviewers can see why the
    pane is missing on this deployment.
  contract_sections:
    - "Parity rules"
    - "State classes covered"
  parity_packet_section: "State classes covered: policy_limited_pane_suppressed"

