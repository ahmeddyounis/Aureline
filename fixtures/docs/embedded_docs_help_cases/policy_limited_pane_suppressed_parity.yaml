allowed_axis_disagreements:
  - axis: source_class
  - axis: version_match_state
  - axis: cache_class
  - axis: install_state
  - axis: offline_posture
  - axis: policy_limited_behavior
    rationale: >
      Pane / onboarding lanes are suppressed entirely with
      pane_suppressed_by_policy because the vendor-provider docs
      pane is the suppressed object. About / support-export
      lanes remain renderable as derived_explanation projections
      with surface_narrowed_by_policy and cite the suppressed
      pane in the known-limits row. Both narrowings are typed
      ADR 0008 narrowings.
  - axis: renderable
    rationale: >
      Pane / onboarding suppress (vendor-provider docs are
      disabled on this tenant); About / support-export remain
      renderable because they project the about-packet's
      known-limits row that explains why.
  - axis: denial_reasons
    rationale: >
      Suppressed lanes carry policy_blocked; About /
      support-export are renderable with the typed policy
      narrowing in the known-limits row.
  - axis: disclosure_mode
    rationale: >
      Per-surface chrome differs; the typed policy-narrowing
      disclosure copy is the same.
  - axis: data_exit_boundary
    rationale: >
      Pane / About / onboarding stay no_payload_leaves_product;
      support-export carries user_reviewed_export_packet.

parity_failure_routing:
  drift_item_template_ref: schemas/public_truth/public_drift_item.schema.json
  audited_surface_class_when_about_drops_known_limit: known_limits_section
  mismatch_category_class_when_about_drops_known_limit: known_limit_missing
  severity_class_when_about_drops_known_limit: same_change_blocker
  audited_surface_class_when_pane_silently_renders: help_pane
  mismatch_category_class_when_pane_silently_renders: policy_disabled_hidden
  severity_class_when_pane_silently_renders: release_blocking_overclaim
  narrowing_path_class: public_copy_narrowing
  notes: >
    A pane that renders body content under
    pane_suppressed_by_policy widens past the admin narrowing
    and routes to policy_disabled_hidden at
    release_blocking_overclaim. An About / support-export lane
    that omits the typed policy narrowing from the known-limits
    row drops the known limit and routes to known_limit_missing
    at same_change_blocker.

