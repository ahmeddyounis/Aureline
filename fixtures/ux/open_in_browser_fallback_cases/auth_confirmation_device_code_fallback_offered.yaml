__fixture__:
  name: auth_confirmation_device_code_fallback_offered
  scenario: >
    Auth confirmation card where system-browser sign-in is not available
    on the current profile, so the host offers device-code as the
    auditable fallback. The embedded surface never collects credentials
    and never completes high-risk approvals; any scope grant or step-up
    routes through host-native review.
  exercised_axes:
    surface_family: embedded_auth_confirmation
    boundary_state: live_verified
    permission_class: host_owned_with_native_step_up_required
    browser_fallback_posture_class: device_code_fallback_offered
    fallback_target_class: device_code_companion_card
    auth_flow_class: device_code
  contract_sections:
    - "Per-surface-family card rules / Embedded auth confirmation"
    - "Browser-fallback posture"
    - "No silent embedded fallback"

