# yaml-language-server: $schema=../../../schemas/ux/embedded_boundary_card.schema.json
__fixture__:
  name: extension_hosted_offline_snapshot_external_open_unavailable
  scenario: >
    Extension-hosted embedded surface is offline and can only render a
    cached snapshot. The card makes the offline boundary explicit and
    does not claim an open-in-browser escape hatch that cannot work
    offline; users get inspect/export/continue-local routes instead.
  exercised_axes:
    surface_family: extension_hosted_surface
    boundary_state: offline_snapshot
    permission_class: host_owned_inspect_only
    browser_fallback_posture_class: external_open_unavailable_offline
    fallback_target_class: local_inspect_or_export
  contract_sections:
    - "Per-surface-family card rules / Extension-hosted surfaces"
    - "Offline snapshot degradation"
    - "Browser-fallback posture"

record_kind: embedded_boundary_card_record
embedded_boundary_card_schema_version: 1
card_id: ux:card:open-in-browser:extension-hosted:offline-snapshot:external-open-unavailable
surface_id_ref: ux:surface:embedded-boundary:extension-hosted:offline-snapshot:external-open-unavailable
surface_family: extension_hosted_surface
owner_identity:
  label: Extension surface (publisher-owned)
  class: extension_bundle
publisher_or_service_identity:
  label: Example extension publisher
  class: extension_publisher
origin_identity:
  origin_class: extension_publisher_hosted_web
  origin_label: https://extension-ui.example.invalid
  verification_state: offline_cached
  host_or_domain_label: extension-ui.example.invalid
  origin_ref: id:origin:extension-ui:example
data_boundary_class: extension_publisher_boundary
data_boundary_label: Cached snapshot; live extension-hosted surface is offline.
boundary_state: offline_snapshot
boundary_state_label: Offline snapshot
plain_language_summary: >
  This extension surface is offline and snapshot-only. Live mutation and
  network-backed actions are removed. High-risk approvals remain product-
  owned and are not issued from this embedded surface.
permission_state:
  permission_class: host_owned_inspect_only
  permission_label: Host-owned inspect-only while offline.
  host_native_step_up_required: false
  scope_narrowing_summary: Snapshot-only; mutating actions are removed until connectivity returns.
action_partition:
  - action_id: reload_embedded_surface
    partition_role: embedded_inspect_only
    action_label: Retry when online
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: continue_local_without_surface
    partition_role: product_owned_native
    action_label: Continue without extension surface
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: open_support_evidence
    partition_role: product_owned_handoff
    action_label: Show offline evidence
    renders_in_host_chrome: true
    preserves_object_identity: true
browser_fallback:
  posture_class: external_open_unavailable_offline
  fallback_target_class: local_inspect_or_export
  summary_label: External open is unavailable while offline; use local inspection/export routes.
  return_target_label: Aureline desktop / Extension surface
capability_limitations:
  - live_network_mutation_disabled_when_offline
  - cookies_or_storage_outside_product_boundary
  - cannot_issue_native_approval
reserved_native_surfaces_host_owned:
  - product_security_messaging
  - update_verification
  - workspace_trust_elevation
  - rollback_or_restore_confirmation
  - ai_apply_review
  - high_risk_approval_sheet
layout_constraints:
  - card_visually_distinct_from_embedded_body
  - card_not_obscured_by_embedded_body
  - card_required_fields_never_hover_only
  - card_compact_layout_preserves_required_fields
  - card_actions_render_in_host_chrome
  - embedded_body_cannot_overlap_card_actions
  - card_remains_visible_when_embedded_body_is_withheld
chrome_inheritance_axes:
  - theme_palette_inherits_from_host
  - density_class_inherits_from_host
  - zoom_level_inherits_from_host
  - focus_ring_inherits_from_host
  - reduced_motion_posture_inherits_from_host
  - high_contrast_mode_inherits_from_host
  - forced_colors_mode_inherits_from_host
policy_context:
  identity_mode: self_hosted_org
  policy_epoch: epoch.extension.surface.offline.0204
  trust_state: trusted
  execution_context_id: ctx:extension-ui:offline-snapshot
redaction_class: metadata_safe_default
