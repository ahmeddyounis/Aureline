__fixture__:
  name: docs_help_stale_snapshot_system_browser_first
  scenario: >
    Embedded docs/help pane renders a stale mirrored snapshot. The card
    makes owner/origin/data-boundary truth explicit and offers a typed
    system-browser handoff to the authoritative upstream docs. Any trust
    or approval action referenced by the docs routes back through host-
    native review surfaces rather than completing in the embedded body.
  exercised_axes:
    surface_family: embedded_docs_help
    boundary_state: stale_snapshot
    permission_class: host_owned_inspect_only
    browser_fallback_posture_class: system_browser_first
    fallback_target_class: system_browser_handoff_packet
  contract_sections:
    - "Per-surface-family card rules / Embedded docs/help"
    - "Browser-fallback posture"
    - "Impersonation ban / reserved surfaces"

