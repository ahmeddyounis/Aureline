__fixture__:
  name: marketplace_account_policy_blocked_external_open_blocked
  scenario: >
    Marketplace/account embedded surface is policy-blocked and external
    browser launch is also forbidden. The card stays visible with owner,
    provider identity, and boundary truth, and routes users to policy
    inspection and host-native review instead of offering a fake open-in-
    browser affordance.
  exercised_axes:
    surface_family: embedded_marketplace_or_account
    boundary_state: policy_blocked
    permission_class: no_permission_within_product
    browser_fallback_posture_class: external_open_blocked_by_policy
    fallback_target_class: host_native_review_or_approval
  contract_sections:
    - "Per-surface-family card rules / Embedded marketplace / account"
    - "Browser-fallback posture"
    - "Policy-blocked degradation"

