# Desktop continuity alpha fixture manifest.

fixture_manifest_schema_version: 1
record_family: desktop_continuity_alpha
runtime_packet_record_kind: desktop_continuity_alpha_packet_record
support_export_record_kind: desktop_continuity_support_export_record
matrix_ref: artifacts/ux/desktop_continuity_alpha_matrix.yaml
runtime_surface_ref: crates/aureline-shell/src/desktop_continuity_alpha.rs
runtime_evidence_path: .logs/recovery/desktop_continuity_alpha_latest.json

fixture_files:
  - file: support_export_reconstruction.json
    record_kind: desktop_continuity_support_export_record
    proves:
      - support_export_reconstructs_interruption_cause
      - support_export_reconstructs_continuity_state
      - support_export_reconstructs_recovery_choice
      - support_export_reconstructs_resulting_fidelity
      - support_export_does_not_scrape_ui_text
      - support_export_excludes_raw_secret_material

upstream_fixture_refs:
  native_entry:
    - fixtures/platform/exact_target_reopen_cases/local_file_open_admitted_exact.yaml
    - fixtures/platform/exact_target_reopen_cases/workspace_open_missing_target_denied.yaml
    - fixtures/platform/exact_target_reopen_cases/auth_callback_replay_denied_consumed.yaml
  topology:
    - fixtures/platform/window_display_cases/display_detach_dock_safe_bounds.json
    - fixtures/platform/window_display_cases/mixed_dpi_cross_monitor_reflow.json
    - fixtures/platform/window_display_cases/fullscreen_snapped_restore_intent.json
  lifecycle:
    - fixtures/platform/native_lifecycle_cases/wake_from_sleep_local_context_preserved.yaml
    - fixtures/platform/native_lifecycle_cases/network_transition_remote_unreachable.yaml
    - fixtures/platform/native_lifecycle_cases/removable_volume_loss_root_unavailable.yaml
  credential_store:
    - fixtures/auth/credential_store_interruption_alpha/manifest.yaml

required_row_families:
  - os_entry
  - target_recovery
  - display_topology
  - lifecycle_interruption
  - credential_store_interruption

must_not_happen:
  - generic_home_reopen_discards_original_context
  - offscreen_restore_failure
  - silent_privileged_or_mutating_rerun
  - plaintext_credential_downgrade
  - stale_authority_reuse
  - support_export_requires_ui_text_scraping
