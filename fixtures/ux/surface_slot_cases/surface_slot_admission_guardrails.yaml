# yaml-language-server: $schema=../../../schemas/ux/surface_slot_row.schema.json
__fixture__:
  name: surface_slot_admission_guardrails
  scenario: >
    Worked admission decisions proving protected-slot denial, explicit
    reroute to allowed slots, and placeholder requirements for missing
    extension/provider surfaces.
  contract_sections:
    - protected_slot_denial
    - reroute_to_allowed_slot
    - placeholder_in_same_slot

---
record_kind: surface_slot_admission_decision_record
surface_slot_schema_version: 1
decision_id: decision:surface-slot:01
requested_surface_family_id: surface.extension_view
requested_slot_id: slot.title_context_bar.identity
requesting_actor_kind: extension
outcome: denied_protected_slot
fallback_slot_id: slot.bottom_panel.tool_panels
rationale: >
  The title/context bar slot is protected host-owned identity chrome.
  Extension surfaces cannot occupy it. The shell reroutes extension UI
  to an allowed durable slot (bottom panel, inspector, main workspace,
  or sidebar section) and preserves identity cues in the title bar.

---
record_kind: surface_slot_admission_decision_record
surface_slot_schema_version: 1
decision_id: decision:surface-slot:02
requested_surface_family_id: surface.docs_help
requested_slot_id: status.slot.recovery.primary
requesting_actor_kind: provider_hosted
outcome: denied_protected_slot
fallback_slot_id: slot.right_inspector.contextual_detail
rationale: >
  Recovery-primary status-bar slots are reserved for shell-owned recovery
  truth. Embedded docs/help is rerouted to inspector (or main workspace)
  where host-owned boundary chrome and a keyboard inspection path are
  guaranteed.

---
record_kind: surface_slot_admission_decision_record
surface_slot_schema_version: 1
decision_id: decision:surface-slot:03
requested_surface_family_id: surface.extension_view
requested_slot_id: slot.bottom_panel.tool_panels
requesting_actor_kind: extension
outcome: admitted
fallback_slot_id: null
rationale: >
  Extension panels may be admitted to bottom-panel tool containers via
  the owner contract and extension budgets. The shell retains focus
  return, close/reopen memory, and no-rerun restore posture.

---
record_kind: surface_slot_admission_decision_record
surface_slot_schema_version: 1
decision_id: decision:surface-slot:04
requested_surface_family_id: surface.extension_view
requested_slot_id: slot.bottom_panel.tool_panels
requesting_actor_kind: extension
outcome: placeholder_required
fallback_slot_id: null
rationale: >
  The extension surface is allowed in the slot, but the dependency is
  missing/disabled/quarantined at restore time. The shell preserves the
  slot and renders a placeholder card in the same slot with a close/remove
  path and a restore/re-enable route, rather than collapsing the layout.

