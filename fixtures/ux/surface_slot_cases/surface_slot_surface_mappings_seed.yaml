# yaml-language-server: $schema=../../../schemas/ux/surface_slot_row.schema.json
__fixture__:
  name: surface_slot_surface_mappings_seed
  scenario: >
    Seed surface-to-slot mapping rows. Each surface family declares at
    least one allowed slot and at least one banned slot so downstream
    surfaces can justify composition decisions without inventing new
    slot names.
  contract_sections:
    - surface_to_slot_mapping_rows
    - allowed_and_banned_slots

---
record_kind: surface_slot_surface_mapping_record
surface_slot_schema_version: 1
surface_family_id: surface.docs_help
surface_label: Docs/help reader surface
surface_kind: first_party_or_embedded
allowed_slots:
  - slot.right_inspector.contextual_detail
  - slot.main_workspace.working_set
banned_slots:
  - slot.title_context_bar.identity
  - status.slot.recovery.primary
  - slot.overlay.command_palette
notes: >
  Embedded docs/help requires host-owned boundary chrome and may promote
  from inspector to main-workspace tabs for long-form reading.

---
record_kind: surface_slot_surface_mapping_record
surface_slot_schema_version: 1
surface_family_id: surface.live_preview
surface_label: Live preview surface (runtime-backed)
surface_kind: first_party_or_provider_backed
allowed_slots:
  - slot.main_workspace.working_set
  - slot.right_inspector.contextual_detail
  - slot.bottom_panel.tool_panels
banned_slots:
  - slot.title_context_bar.identity
  - slot.activity_rail.primary_routes
  - status.slot.recovery.primary
  - slot.overlay.dialog_or_sheet
notes: >
  Preview is data-plane truth and cannot displace identity chrome or
  impersonate host-native approval surfaces.

---
record_kind: surface_slot_surface_mapping_record
surface_slot_schema_version: 1
surface_family_id: surface.auth_handoff_confirmation
surface_label: Auth handoff confirmation surface
surface_kind: first_party_host_owned
allowed_slots:
  - slot.overlay.dialog_or_sheet
  - slot.main_workspace.review_surface
banned_slots:
  - slot.title_context_bar.identity
  - slot.sidebar.section_surface
  - status.slot.extension.scoped
notes: >
  Browser-first auth confirmation is host-owned and transient or review
  surface scoped; it is not a general-purpose embedded account view.

---
record_kind: surface_slot_surface_mapping_record
surface_slot_schema_version: 1
surface_family_id: surface.activity_center
surface_label: Activity center durable work surface
surface_kind: first_party
allowed_slots:
  - slot.bottom_panel.tool_panels
  - slot.main_workspace.working_set
banned_slots:
  - slot.title_context_bar.identity
  - slot.activity_rail.primary_routes
  - slot.overlay.command_palette
notes: >
  Durable work requires a durable home; activity center may default to
  the bottom panel and promote to main-workspace review when needed.

---
record_kind: surface_slot_surface_mapping_record
surface_slot_schema_version: 1
surface_family_id: surface.incident_support
surface_label: Incident/support/admin triage surfaces
surface_kind: first_party
allowed_slots:
  - slot.sidebar.section_surface
  - slot.main_workspace.working_set
  - slot.right_inspector.contextual_detail
  - slot.bottom_panel.tool_panels
banned_slots:
  - slot.title_context_bar.identity
  - status.slot.extension.scoped
  - slot.overlay.command_palette
notes: >
  May claim durable slots but must not use transient-only overlays as the
  only route to a blocking action or export.

---
record_kind: surface_slot_surface_mapping_record
surface_slot_schema_version: 1
surface_family_id: surface.extension_view
surface_label: Extension-contributed view/panel surface
surface_kind: extension_surface
allowed_slots:
  - slot.sidebar.section_surface
  - slot.main_workspace.working_set
  - slot.right_inspector.contextual_detail
  - slot.bottom_panel.tool_panels
  - status.slot.extension.scoped
banned_slots:
  - slot.title_context_bar.identity
  - slot.activity_rail.primary_routes
  - status.slot.recovery.primary
  - slot.overlay.command_palette
  - slot.overlay.dialog_or_sheet
notes: >
  Extension surfaces respect shell focus/density/safety rules and are
  denied from protected host-only slots unless explicitly admitted.

---
record_kind: surface_slot_surface_mapping_record
surface_slot_schema_version: 1
surface_family_id: surface.companion_surface
surface_label: Companion surface (out of shell)
surface_kind: companion_surface
allowed_slots:
