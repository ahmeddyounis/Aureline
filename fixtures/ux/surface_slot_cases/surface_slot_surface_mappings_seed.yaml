---
record_kind: surface_slot_surface_mapping_record
surface_slot_schema_version: 1
surface_family_id: surface.toast
surface_label: Toast notification surface instance
surface_kind: first_party
allowed_slots:
  - slot.notification.toast_lane
banned_slots:
  - slot.title_context_bar.identity
  - slot.main_workspace.review_surface
