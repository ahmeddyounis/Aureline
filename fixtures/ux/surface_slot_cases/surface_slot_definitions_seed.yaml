# yaml-language-server: $schema=../../../schemas/ux/surface_slot_row.schema.json
__fixture__:
  name: surface_slot_definitions_seed
  scenario: >
    Seed slot-definition records for the UI composition surface-slot
    matrix. Each record freezes one stable slot id, its protection class,
    extension insertion policy, persistence class, and the owning
    contract refs that downstream surfaces must cite.
  contract_sections:
    - slot_definition_rows
    - protected_slot_rules
    - extension_insertion_policy

---
record_kind: surface_slot_definition_record
surface_slot_schema_version: 1
slot_id: slot.title_context_bar.identity
shell_zone: title_context_bar
slot_label: Title/context bar identity chrome
owner_refs:
  - docs/ux/title_context_bar_contract.md
  - artifacts/ux/shell_metrics.yaml
protection_class: protected_host_only
extension_insertion_policy: prohibited
allowed_content_classes: [identity_chrome]
lifecycle_notes: >
  Required chrome; carries the canonical identity tuple. Must not accept
  workflow-local action strips, toasts, banners, embedded bodies, or
  extension branding.
focus_policy_ref: shell_metrics.zone_rows.title_context_bar.focus_policy
persistence_class: required_chrome_always_present
collapse_overflow_notes: >
  May condense but remains keyboard reachable; must not sheet.

