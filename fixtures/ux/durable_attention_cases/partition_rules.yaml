$schema: ../../../schemas/ux/job_row_retention.schema.json
__fixture__:
  name: partition_rule_completed
  scenario: >
    Default retention rule for the completed partition. Successful
    work stays reviewable across a bounded audit window, then is
    dismissible to history while remaining reviewable through
    history-lane and support-export refs.
  contract_sections:
    - "Activity-center partition retention summary"
    - "Drill rules"
record_kind: job_row_retention_partition_rule_record
job_row_retention_schema_version: 1
partition_rule_id: dur:partition-rule:completed
activity_partition: completed
included_state_classes:
  - completed
retention_window_class: retained_for_completion_audit_window
default_retention_class: keep_until_user_dismiss_to_history
default_dismissibility_class: dismissible_to_history_after_acknowledge
default_release_trigger_class: user_dismiss_to_history
audit_handling_class: history_lane_entry_after_clear
support_export_inclusion_class: always_included_full_lineage
moves_to_partition_on_release: null
stays_reviewable_label: >
  Completed rows stay reviewable across a bounded audit window so
  the user can acknowledge the outcome, attach evidence, or
  export. Dismissing to history preserves the canonical event id
  and the history-lane entry.
transient_chrome_classes_dismissible_without_clearing_row:
  - toast
  - os_badge_app_icon
  - os_notification
  - lock_screen_summary
  - status_item
  - companion_push
durable_history_invariants:
  preserves_canonical_event_id: true
  preserves_durable_object_target_ref: true
  preserves_durable_history: true
  preserves_audit_trail: true
  preserves_critical_safety_tier: true
  transient_chrome_dismissal_does_not_clear_row: true
source_doc_refs:
  - docs/ux/durable_work_contract.md
  - docs/ux/exact_reopen_drill_map.md
