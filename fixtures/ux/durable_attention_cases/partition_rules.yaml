---
$schema: ../../../schemas/ux/job_row_retention.schema.json
__fixture__:
  name: partition_rule_suppressed_held
  scenario: >
    Default retention rule for the suppressed_held partition.
    Held quiet-hours rows release on mode exit as one grouped
    digest. Policy-suppressed rows stay until the policy is
    revoked or the user with policy permission explicitly clears
    the audit row. Durable history is preserved in every mode.
  contract_sections:
    - "Activity-center partition retention summary"
    - "Drill rules"
record_kind: job_row_retention_partition_rule_record
job_row_retention_schema_version: 1
partition_rule_id: dur:partition-rule:suppressed_held
activity_partition: suppressed_held
included_state_classes:
  - quiet_hours_held
  - policy_suppressed
retention_window_class: retained_until_release_digest
default_retention_class: keep_until_release_digest_emitted
default_dismissibility_class: dismissible_after_release_digest
default_release_trigger_class: mode_exit_grouped_digest_release
audit_handling_class: policy_required_audit_trail
support_export_inclusion_class: always_included_full_lineage
moves_to_partition_on_release: completed
stays_reviewable_label: >
  Suppressed and held rows preserve durable history. Quiet-hours
  rows release as one grouped digest on mode exit. Policy-
  suppressed rows stay until the policy is revoked or the user
  with policy permission explicitly clears the audit row.
transient_chrome_classes_dismissible_without_clearing_row:
  - os_badge_app_icon
  - digest_group_row
  - os_notification
  - lock_screen_summary
  - companion_push
durable_history_invariants:
  preserves_canonical_event_id: true
  preserves_durable_object_target_ref: true
  preserves_durable_history: true
  preserves_audit_trail: true
  preserves_critical_safety_tier: true
  transient_chrome_dismissal_does_not_clear_row: true
source_doc_refs:
  - docs/ux/durable_work_contract.md
  - docs/ux/exact_reopen_drill_map.md
  - docs/ux/attention_activity_taxonomy.md
  - artifacts/ux/quiet_hours_policy_matrix.yaml
policy_context:
  policy_epoch: pe:2026-04-30:01
  trust_state: trusted
  execution_context_id: null
minted_at: "2026-05-01T00:00:00Z"
