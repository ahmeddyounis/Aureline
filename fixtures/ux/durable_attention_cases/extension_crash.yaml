__fixture__:
  name: extension_crash
  scenario: >
    The extension host crashed for one extension; recovery is
    staged. The durable attention item carries the last failure
    reason and the recovery action. Toast or OS-notification
    dismissal does not clear the durable row; the row releases
    when the extension recovers or the user dismisses to history.
  exercised_axes:
    state_class: attention_required
    activity_partition: needs_attention
    canonical_reopen_target_kind: attention_item_exact
    release_trigger_class: extension_recovered
  contract_sections:
    - "Per-row drills"
    - "Drill rules"
