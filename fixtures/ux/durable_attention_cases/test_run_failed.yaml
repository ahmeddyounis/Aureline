# yaml-language-server: $schema=../../../schemas/ux/job_row_retention.schema.json
$schema: ../../../schemas/ux/job_row_retention.schema.json
__fixture__:
  name: test_run_failed
  scenario: >
    A workspace test run failed; the row sits in needs_attention
    until the user resolves the failure. Toast and OS-notification
    activations reopen on the canonical attention item; OS-badge
    activations land on the activity_center partition. Dismissing
    toast or OS notification does not clear the durable row.
  exercised_axes:
    state_class: attention_required
    activity_partition: needs_attention
    canonical_reopen_target_kind: attention_item_exact
    release_trigger_class: user_resolve
  contract_sections:
    - "Per-row drills"
    - "Drill rules"
record_kind: job_row_retention_packet_record
job_row_retention_schema_version: 1
retention_packet_id: dur:retention:test_run:needs_attention
corpus_row_id_ref: dur:row:test_run
canonical_event_id_ref: ux:event:test:integration-suite:failed
durable_object_target_ref: obj:test-run:integration-suite
job_row_id_ref: ux:job-row:test:integration-suite:failed
state_class: attention_required
activity_partition: needs_attention
partition_rule_ref: dur:partition-rule:needs_attention
retention_class: keep_until_user_resolve
retention_window_class: retained_with_unread_until_resolved
dismissibility_class: dismissible_to_history_after_resolution
release_trigger_class: user_resolve
transient_chrome_classes_dismissible_without_clearing_row:
  - toast
  - os_badge_app_icon
  - os_notification
  - lock_screen_summary
  - companion_push
canonical_reopen_target_ref: ux:reopen:test:integration-suite:attention
canonical_reopen_target_kind: attention_item_exact
expected_reopen_target_kinds:
  - attention_item_exact
  - durable_job_row_exact
  - activity_center_item
  - history_lane_row
reopen_window_label: >
  The attention item is reachable from every transient mirror
  while the failure is unresolved; activations after dismissal
  to history land on the history-lane row.
audit_handling_class: full_audit_trail_required
audit_trail_refs:
  - audit:durable_job_created:test:integration-suite
  - audit:durable_job_phase_changed:test:integration-suite:failed
support_export_inclusion_class: always_included_full_lineage
raw_private_material_excluded: true
stays_reviewable_label: >
  The failed test row stays in needs_attention until the user
  resolves (re-runs, fixes, or accepts) or dismisses to history.
moves_to_partition_on_release: completed
durable_history_invariants:
  preserves_canonical_event_id: true
  preserves_durable_object_target_ref: true
  preserves_durable_history: true
  preserves_audit_trail: true
  preserves_critical_safety_tier: true
  transient_chrome_dismissal_does_not_clear_row: true
policy_context:
  policy_epoch: pe:2026-04-30:01
  trust_state: trusted
  execution_context_id: exec-context:workspace:test
source_doc_refs:
