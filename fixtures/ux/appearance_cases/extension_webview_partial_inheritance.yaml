__fixture__:
  name: extension_webview_partial_inheritance
  scenario: >
    An extension-hosted webview inherits host theme and reduced-motion
    posture, partially inherits contrast, and does not inherit host
    density. The body publishes theme/contrast support rows so parity
    claims are inspectable rather than inferred from surrounding chrome.
  exercised_axes:
    inheritance_states:
      - inherits
      - partial
      - does_not_inherit
    theme_contrast_support_rows: true
  contract_sections:
    - "extension_surface_appearance_record"
    - "extension and embedded-surface inheritance"

