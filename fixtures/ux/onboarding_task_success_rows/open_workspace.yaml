# Onboarding measurement row — Open workspace (plain Open).
#
# Projects the palette / CLI / File > Open path against the
# protected measurement vocabulary. The path resolves without
# the Start Center first-run scaffolding; the unrecognised-
# archetype outcome is what the row qualifies against.

schema_version: 1
record_kind: onboarding_task_success_measurement_row

measurement_row_id: onboarding.measurement.open_workspace.plain_open_unknown_archetype
onboarding_path_class: open_workspace
entry_route_id: er.plain_open
measurement_surface: surface_first_open
completion_checkpoint_class: first_useful_edit

corpus_row_ref: fuw_row:local_open.plain_open_unknown_archetype
supporting_fixture_ref: fixtures/ux/first_useful_work_cases/plain_open_unknown_archetype.yaml
task_success_corpus_scenario_refs:
  - tsc.plain_open_local_folder_unknown_archetype

expected_first_useful_work_target_surface: tree_plus_readme_or_changed_files
expected_admission_class: admitted
expected_completion_class: completed_first_useful_edit

expected_failure_category_subset:
  - target_kind_unresolved
  - admission_denied_policy
  - admission_denied_trust
  - resulting_mode_silently_downgraded
  - destination_disposition_mismatch

expected_primary_events:
  - entry_verb_resolved
  - target_kind_classified
  - resulting_mode_committed
  - admission_decided
  - first_open_completed

expected_protected_metric_refs:
  - ff.warm_start_to_first_paint

telemetry_default_posture: opt_in_only
privacy_class: privacy_local_only_no_emission
deployment_profile_id: individual_local
owner_dri: "@ahmeddyounis"
co_reviewing_lane: shell_command_system

delayed_success_threshold_envelope:
  monotonic_envelope_class: first_useful_edit_warm_p95
  threshold_state: to_be_set_by_benchmark_council

failure_drill:
  drill_id: open_workspace.failure_category_outside_surface_vocab
  description: >
    Inject the free-form failure category 'mysterious_warmup_stall'
    into the row's expected_failure_category_subset. The lane must
    surface
    onboarding_task_success.failure_category.outside_surface_vocab
    because every failure category MUST quote the closed surface_first_open
    set in docs/product/onboarding_measurement_plan.md §3.2.
  forced_input:
    inject_failure_category: mysterious_warmup_stall
  expected_check_id: onboarding_task_success.failure_category.outside_surface_vocab
  actionable_next_action: >
    Drop the free-form category, or — if the regression class is
    real — promote it through the measurement plan §3.2 closed set
    in the same change. Free-form categories are non-conforming.

notes: >
  Plain-open / unrecognised archetype row. The lane qualifies
  that first-open events resolve through the closed §3.2 vocab
  and that the no-account floor still reaches first-useful-edit.
