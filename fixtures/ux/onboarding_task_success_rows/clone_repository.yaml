# Onboarding measurement row — Clone repository (palette / Start
# Center Clone).
#
# Projects the clone path: post-clone handoff is the first
# useful work; model-gateway opt-in is offered same-weight with
# Continue local and declining keeps the handoff useful.

schema_version: 1
record_kind: onboarding_task_success_measurement_row

measurement_row_id: onboarding.measurement.clone_repository.palette_clone_then_review
onboarding_path_class: clone_repository
entry_route_id: er.clone_or_import
measurement_surface: surface_first_open
completion_checkpoint_class: first_useful_navigation

corpus_row_ref: fuw_row:clone.clone_then_review_remote_repo
supporting_fixture_ref: fixtures/ux/first_useful_work_cases/clone_then_review_remote_repo.yaml
task_success_corpus_scenario_refs:
  - tsc.clone_then_review_remote_repo

expected_first_useful_work_target_surface: post_clone_handoff
expected_admission_class: admitted
expected_completion_class: completed_decline_without_degradation

expected_failure_category_subset:
  - target_kind_unresolved
  - admission_denied_policy
  - admission_denied_trust
  - resulting_mode_silently_downgraded
  - destination_disposition_mismatch

expected_primary_events:
  - entry_verb_resolved
  - target_kind_classified
  - resulting_mode_committed
  - admission_decided
  - first_open_completed

expected_protected_metric_refs:
  - ff.warm_start_to_first_paint

telemetry_default_posture: opt_in_only
privacy_class: privacy_local_only_no_emission
deployment_profile_id: individual_local
owner_dri: "@ahmeddyounis"
co_reviewing_lane: compatibility_ecosystem_review

delayed_success_threshold_envelope:
  monotonic_envelope_class: first_useful_navigation_warm_p95
  threshold_state: to_be_set_by_benchmark_council

failure_drill:
  drill_id: clone_repository.completion_class_unknown
  description: >
    Rewrite the row's expected_completion_class to
    'completed_with_high_confidence' — a value outside the
    schema's closed completion-class enum. The lane must surface
    onboarding_task_success.completion_class.unknown rather than
    silently accept a free-form label.
  forced_input:
    rewrite_expected_completion_class: completed_with_high_confidence
  expected_check_id: onboarding_task_success.completion_class.unknown
  actionable_next_action: >
    Restore the row's expected_completion_class to one of the
    closed values defined in
    schemas/telemetry/m1_onboarding_metrics.schema.json. Free-form
    completion classes are non-conforming; promoting a new value
    requires updating the schema in the same change.

notes: >
  Clone resolves through er.clone_or_import; the first useful
  surface is the post-clone handoff card. The row asserts that
  declining the model-gateway opt-in does not retroactively
  degrade the handoff path.
