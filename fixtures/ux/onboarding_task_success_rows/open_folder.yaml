# Onboarding measurement row — Open folder (Start Center first-run).
#
# Projects the Start Center "Open folder" first-run path against
# the protected measurement vocabulary so the lane can tell first-
# useful-edit from mere app launch on the no-account local-first
# floor. Reuses the floor row in the first-useful-work
# qualification corpus rather than minting a parallel claim.

schema_version: 1
record_kind: onboarding_task_success_measurement_row

measurement_row_id: onboarding.measurement.open_folder.start_center_first_run_local_folder
onboarding_path_class: open_folder
entry_route_id: er.start_center
measurement_surface: surface_first_run
completion_checkpoint_class: first_useful_edit

corpus_row_ref: fuw_row:local_open.first_run_start_center_local_folder
supporting_fixture_ref: fixtures/ux/first_useful_work_cases/first_run_start_center_local_folder.yaml
task_success_corpus_scenario_refs:
  - tsc.first_run_start_center_local_folder

expected_first_useful_work_target_surface: tree_plus_readme_or_changed_files
expected_admission_class: admitted
expected_completion_class: completed_first_useful_edit

expected_failure_category_subset:
  - forced_sign_in_before_useful_local_work
  - entry_verb_collapsed_into_get_started
  - start_center_unreachable
  - network_required_for_local_entry
  - aborted_before_admission

expected_primary_events:
  - first_run_reached
  - first_run_entry_route_selected
  - first_run_admitted

expected_protected_metric_refs:
  - ff.warm_start_to_first_paint
  - ff.first_paint

telemetry_default_posture: opt_in_only
privacy_class: privacy_local_only_no_emission
deployment_profile_id: individual_local
owner_dri: "@ahmeddyounis"
co_reviewing_lane: docs_public_truth

delayed_success_threshold_envelope:
  monotonic_envelope_class: first_useful_edit_warm_p95
  threshold_state: to_be_set_by_benchmark_council

failure_drill:
  drill_id: open_folder.classify_app_launch_as_first_useful_work
  description: >
    Rewrite the row's expected_completion_class to
    completed_first_useful_navigation_only while keeping
    completion_checkpoint_class = first_useful_edit. The lane
    must surface
    onboarding_task_success.first_useful_work_checkpoint.collapsed_into_app_launch
    so reviewers see that the row tried to claim first-useful-edit
    success on a path that only reached first-useful-navigation.
  forced_input:
    rewrite_expected_completion_class: completed_first_useful_navigation_only
  expected_check_id: onboarding_task_success.first_useful_work_checkpoint.collapsed_into_app_launch
  actionable_next_action: >
    Either deliver a first_useful_edit checkpoint on the
    Start-Center floor row (editor + buffer + save + recovery
    journal must be reachable before semantic warm-up) or
    downgrade completion_checkpoint_class to
    first_useful_navigation; never silently classify a navigation-
    only outcome as first-useful-edit success.

notes: >
  Floor row. Asserts that the no-account local-first first-run
  path reaches first-useful-edit, not just first-useful-
  navigation. The lane refuses any redefinition that would let
  "the app launched" satisfy first-useful-work success.
