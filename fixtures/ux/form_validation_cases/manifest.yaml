schema_version: 1
contract_ref: docs/ux/forms_validation_contract.md
schemas:
  form_probe_state: schemas/ux/form_probe_state.schema.json
  staged_review_state: schemas/ux/staged_review_state.schema.json
cases:
  - file: settings_policy_locked_no_apply.yaml
    record_kind: staged_review_state_record
    surface_family: settings_form
    exercises:
      - policy_locked_no_apply
      - policy_blocked_rollup
      - lock_policy_explanation
  - file: connection_setup_pending_probe.yaml
    record_kind: staged_review_state_record
    surface_family: connection_setup_form
    exercises:
      - async_probe_pending
      - hard_block_until_current
      - secret_handle_field
  - file: package_install_stale_probe_ack.yaml
    record_kind: staged_review_state_record
    surface_family: package_action_form
    exercises:
      - stale_validation_acknowledgement
      - package_review_probe_ref
      - apply_requires_ack
  - file: policy_edit_simulation_blocked.yaml
    record_kind: staged_review_state_record
    surface_family: policy_edit_form
    exercises:
      - dry_run_policy_simulation
      - blocking_failed
      - exportable_policy_evidence
  - file: repair_probe_skipped_allowed.yaml
    record_kind: form_probe_state_record
    surface_family: repair_action_form
    exercises:
      - skipped_by_user
      - skipped_allowed_with_reason
      - repair_preview_attribution
  - file: transport_policy_blocked_probe.yaml
    record_kind: form_probe_state_record
    surface_family: network_transport_form
    exercises:
      - policy_blocked_probe
      - gates_apply_by_policy
      - support_export_attribution
  - file: request_runtime_stale_schema.yaml
    record_kind: staged_review_state_record
    surface_family: request_runtime_form
    exercises:
      - stale_schema_snapshot
      - revalidate_before_apply
      - request_runtime_support_handoff
