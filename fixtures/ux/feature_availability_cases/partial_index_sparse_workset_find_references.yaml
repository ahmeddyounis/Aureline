__fixture__:
  name: partial_index_sparse_workset_find_references
  scenario: >
    A find-references workflow on a sparse-checkout workset is partially
    available. The semantic index is warming for files outside the
    sparse slice; references inside the slice are usable, references
    against the unindexed remainder are not. The row renders
    "Partial index" and routes the user to the index status pane. The
    same record fans out to the search row, the empty-state row when
    the search returns no results because of the partial index, the
    command palette entry, and the contextual help trigger.
  exercised_axes:
    availability_state: partial_index
    workflow_capability_class: navigate_find_references
    effective_environment_mode: local_only
    support_class: standard_support
    dependency_marker: index_warming_dependency
  contract_sections:
    - The nine availability states (`partial_index`)
    - The `Why unavailable` handoff classes
    - Cross-surface invariants

