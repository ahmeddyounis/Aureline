__fixture__:
  name: policy_blocked_extension_install
  scenario: >
    Extension install for a marketplace listing is blocked by an
    organization policy bundle that disallows the extension's publisher
    in the active workspace. The row renders "Policy blocked", cites
    the active policy bundle and the matching policy rule, and routes
    to the non-modal policy explainer. The same record fans out to the
    marketplace card, the command palette, the contextual help
    trigger, and the support export row.
  exercised_axes:
    availability_state: policy_blocked
    workflow_capability_class: extension_install_or_manage
    effective_environment_mode: managed_workspace
    support_class: standard_support
    dependency_marker: disabled_by_policy_dependency
  contract_sections:
    - The nine availability states (`policy_blocked`)
    - The `Why unavailable` handoff classes
    - Cross-surface invariants

