__fixture__:
  name: ready_locally_run_tests
  scenario: >
    A run-tests workflow on a local Rust workspace is fully ready: the
    workspace declares the rust archetype, cargo is present at the
    required version, the project graph index is authoritative-live,
    and policy posture is unrestricted. The row renders the "Ready"
    state and forbids any why-unavailable handoff. The same record
    fans out to the run-test picker entry point, the docs help pane,
    the command palette row, and the support export row.
  exercised_axes:
    availability_state: ready
    workflow_capability_class: run_tests
    effective_environment_mode: local_only
    support_class: standard_support
    certified_archetype_state: supported
  contract_sections:
    - The current-readiness object
    - The nine availability states (`ready`)
    - The support-scope badge group
    - Cross-surface invariants

