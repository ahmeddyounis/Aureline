__fixture__:
  name: not_supported_on_managed_remote_companion_voice
  scenario: >
    Voice / dictation workflow exists on the local desktop product and
    on devcontainer attach, but does not exist on the managed remote
    companion-surface client scope: there is no companion-surface
    archetype row for the capability and no certified-archetype claim
    has been published for the remote companion mode. The row renders
    "Not supported", routes to the archetype status / request-support
    flow, and never collapses to "Coming soon" or "Maybe later". The
    same record fans out to the start center entry, the contextual
    help trigger, the issue-template row, and the support export row.
  exercised_axes:
    availability_state: not_supported
    workflow_capability_class: settings_or_profile_action
    effective_environment_mode: companion_surface
    effective_environment_mode_set:
      - local_only
      - devcontainer_or_container
    support_class: best_effort
    certified_archetype_state: not_applicable
  contract_sections:
    - The nine availability states (`not_supported`)
    - The `Why unavailable` handoff classes
    - Explanation rules
    - Cross-surface invariants

