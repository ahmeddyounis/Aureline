__fixture__:
  name: not_certified_in_managed_remote_mode_debug
  scenario: >
    A native debug session for a C/C++ workspace is certified for
    local-only and devcontainer modes but not in the active managed
    remote-attach environment. The row renders "Not certified in this
    mode", lists the modes the workflow IS certified in, and routes
    to the certified-archetype compatibility report row for the
    managed mode. The same record fans out to the debug picker,
    contextual help, the compatibility report row, the migration
    guide row, and the support export row.
  exercised_axes:
    availability_state: not_certified_in_this_mode
    workflow_capability_class: run_debug_session
    effective_environment_mode: managed_workspace
    effective_environment_mode_set:
      - local_only
      - devcontainer_or_container
    support_class: standard_support
    certified_archetype_state: degraded
  contract_sections:
    - The nine availability states (`not_certified_in_this_mode`)
    - The `Why unavailable` handoff classes
    - Explanation rules
    - Cross-surface invariants

