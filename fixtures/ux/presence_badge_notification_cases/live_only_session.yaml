__fixture__:
  name: live_only_session
  case_category: live_session_presence_projection
  scenario: >
    A collaboration session is live and view-first: presence and (optionally)
    follow/presenter state are visible in the in-product collaboration strip and
    may project to a native status-item. The OS projection must not imply shared
    control or recording, and it must not inflate an app-icon badge.
  exercised_axes:
