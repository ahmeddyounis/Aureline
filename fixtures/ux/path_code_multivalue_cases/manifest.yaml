schema_version: 1
contract_ref: docs/ux/path_code_and_multivalue_field_contract.md
schemas:
  path_field: schemas/ux/path_field.schema.json
  code_backed_field: schemas/ux/code_backed_field.schema.json
  multivalue_chip_field: schemas/ux/multivalue_chip_field.schema.json
cases:
  - file: local_vs_remote_path_basis.yaml
    record_kind: path_field_record
    schema_ref: schemas/ux/path_field.schema.json
    exercises:
      - cross_root_authority_disclosure
      - drag_drop_cross_root_review
      - missing_target_unknown_until_resolve
      - lossy_path_separator_normalization
  - file: json_field_comment_preservation_warning.yaml
    record_kind: code_backed_field_record
    schema_ref: schemas/ux/code_backed_field.schema.json
    exercises:
      - json_format_comment_loss_warning
      - schema_hint_loaded
      - lossy_normalization_warning
      - side_by_side_diff_for_broad_change
  - file: hidden_overflow_chip_list_with_duplicates.yaml
    record_kind: multivalue_chip_field_record
    schema_ref: schemas/ux/multivalue_chip_field.schema.json
    exercises:
      - hidden_overflow_count_inspectable
      - case_insensitive_duplicate_warning
      - bulk_paste_promotes_to_review
      - set_canonical_unordered_serialization
