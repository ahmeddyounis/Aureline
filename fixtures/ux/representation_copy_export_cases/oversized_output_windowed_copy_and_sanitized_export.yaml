record_kind: representation_copy_export_case_record
representation_copy_export_schema_version: 1
case_id: case:rep:output_viewer:oversized_windowed_log
content_class: oversized_or_streamed
title: Oversized output windowing parity
scenario: >
  A log/output viewer is windowed and buffered. Copy/export must state the
  scope (visible-only vs loaded set vs snapshot) and disclose that unseen or
  truncated segments were omitted. Support export defaults to a sanitized
  snapshot (or metadata-only if policy blocks the body).
surfaces: [output_viewer, support_export]
metadata_record_ids:
  - meta:rep:output_viewer:copy_raw:visible_window:01
  - meta:rep:support_export:export_sanitized_snapshot:log_tail:01

