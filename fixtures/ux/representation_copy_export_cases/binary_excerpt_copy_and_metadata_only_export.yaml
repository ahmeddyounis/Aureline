case_id: case:rep:rich_preview:binary_excerpt
content_class: binary_or_mixed_bytes
title: Binary excerpt copy and metadata-only export parity
scenario: >
  A binary artifact is opened in a preview surface that can show a bounded
  textual excerpt (e.g. detected strings, hexdump excerpt, or header fields).
  The excerpt must never pretend to be the full artifact bytes. Support export
  defaults to metadata-only for binary bodies.
surfaces: [rich_preview, support_export]
