representation_copy_export_schema_version: 1
case_id: case:rep:suspicious_text:bidi_identifier
content_class: suspicious_text
title: Suspicious identifier copy parity
scenario: >
  A bidi/invisible formatting sequence exists in an identifier. The editor
  must keep a raw copy path for exact-byte reconstruction, but must also
  provide a safe inspection transfer (escaped) that is safe to paste into
  issue reports or chat without replaying control characters.
surfaces: [editor, support_export]
metadata_record_ids:
  - meta:rep:editor:copy_raw:bidi_identifier:01
  - meta:rep:editor:copy_escaped:bidi_identifier:01
  - meta:rep:support_export:export_metadata_only:bidi_identifier:01
notes: Raw copy remains available, but escaped copy is the share-safe default in suspicious-content contexts.

