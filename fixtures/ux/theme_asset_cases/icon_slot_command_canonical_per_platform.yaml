# yaml-language-server: $schema=../../../schemas/ux/icon_slot_map.schema.json
__fixture__:
  name: icon_slot_command_canonical_per_platform
  scenario: >
    The "Reveal in shell" command's canonical icon ships per-platform
    variants because the native metaphor differs across desktops:
    macOS uses a Finder-flavored magnifier, Windows uses an Explorer
    folder-with-arrow, and the two Linux desktop conventions (GTK and
    KDE) ship distinct file-manager metaphors. A universal asset is
    declared as a fallback so a future platform without a declared
    variant renders the universal glyph rather than a blank slot.
    Slot kind command_canonical with command_id_ref pinned, default
    treatment shell_stroke_standard, directionality literal_no_mirror.
    Extension override boundary is extension_may_extend_only (an
    extension may add adjacent variants but not replace the canonical
    metaphor); theme override boundary is theme_may_recolor_only.
    Migration state is frozen.
    Exercises §1.2 icon_slot_map_record, §7 platform-variant coverage
    matrix, §7 command-canonical rules, and invariant 7.
  exercised_axes:
    slot_kind_class: command_canonical
    platform_variant_count: 5
    extension_override_boundary_class: extension_may_extend_only
    theme_override_boundary_class: theme_may_recolor_only
  contract_sections:
    - "§1.2 icon_slot_map_record"
    - "§7 platform-variant coverage"
    - "§7 command-canonical rules"
    - "§9 invariants (7)"

record_kind: icon_slot_map_record
theme_asset_schema_version: 1
slot_id: icon_slot:command.reveal_in_shell
slot_revision_ref: icon_slot_rev:command.reveal_in_shell:2026-04-26:01
slot_kind_class: command_canonical
default_icon_treatment_class: shell_stroke_standard
directionality_class: literal_no_mirror
safety_critical_class: non_safety_critical
platform_variant_coverage:
  - platform_variant_class: desktop_macos
    covered: true
    asset_metaphor_ref: icon_metaphor:command.reveal_in_shell.macos
    platform_native_alias: "macos:reveal_in_finder"
    notes: >
      Magnifier-on-folder metaphor matching the Finder reveal verb.
  - platform_variant_class: desktop_windows
    covered: true
    asset_metaphor_ref: icon_metaphor:command.reveal_in_shell.windows
    platform_native_alias: "windows:reveal_in_explorer"
    notes: >
      Folder-with-arrow metaphor matching the File Explorer reveal verb.
  - platform_variant_class: desktop_linux_gtk
    covered: true
    asset_metaphor_ref: icon_metaphor:command.reveal_in_shell.linux_gtk
    platform_native_alias: "linux_gtk:open_containing_folder"
  - platform_variant_class: desktop_linux_kde
    covered: true
    asset_metaphor_ref: icon_metaphor:command.reveal_in_shell.linux_kde
    platform_native_alias: "linux_kde:open_containing_folder"
  - platform_variant_class: not_applicable_universal
    covered: true
    asset_metaphor_ref: icon_metaphor:command.reveal_in_shell.universal
    notes: >
      Universal fallback metaphor used when the active platform has no
      declared variant.
extension_override_boundary_class: extension_may_extend_only
theme_override_boundary_class: theme_may_recolor_only
migration:
  migration_state_class: frozen
  predecessor_slot_id_refs: []
  successor_slot_id_refs: []
  migration_decision_row_ref: null
  migration_notes: >
    Slot is frozen across all five platform variants.
default_metaphor_ref: icon_metaphor:command.reveal_in_shell.universal
command_id_ref: command:filesystem.reveal_in_shell
semantic_status_class_ref: null
trust_visual_state_class_ref: null
accessible_text_required: true
non_color_cues_required: true
permitted_deployment_profiles:
  - individual_local
  - self_hosted
  - enterprise_online
  - air_gapped
  - managed_cloud
presentation_label: Reveal in shell (per-platform)
policy_context:
  policy_epoch: pe:2026-04-26:01
  trust_state: trusted
redaction_class: metadata_safe_default
minted_at: "2026-04-26T10:00:00Z"
