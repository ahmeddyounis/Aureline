__fixture__:
  name: theme_package_high_contrast_dark_first_party
  scenario: >
    The first-party Aureline theme package, ships built_in_with_product
    and not_applicable_built_in for signature. Covers the four
    first-party theme classes (dark_reference, light_parity,
    high_contrast_dark, high_contrast_light), the three density
    classes, and the full accessibility-posture set including
    motion_critical_hot_path. The package consumes no deprecated tokens
    and serves the full safety-critical preservation list:
    restricted_workspace, policy_locked, debugging_active,
    collaboration_active, remote_target_active, ai_draft_pending,
    ai_applied, index_warming, quiet_hours_active, trusted_full.
    Appearance change is live_apply. Admissible on every deployment
    profile.
    Exercises §1.1 manifest record, §4 built_in distribution and
    signature, §6 full posture coverage, §6 safety-critical
    preservation invariants, and invariants 1 / 2 / 12.
  exercised_axes:
    distribution_class: built_in_with_product
    signature_state: not_applicable_built_in
    theme_class_coverage: all_four_first_party
    accessibility_posture_coverage: full_set
  contract_sections:
    - "§1.1 theme_package_manifest_record"
    - "§4 built-in distribution"
    - "§6 posture coverage and safety-critical preservation"
    - "§9 invariants (1, 2, 12)"

