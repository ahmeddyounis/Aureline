# yaml-language-server: $schema=../../../schemas/ux/theme_package_manifest.schema.json
__fixture__:
  name: theme_package_with_deprecated_token_fallback
  scenario: >
    A community-supplied theme pack rides on the design-token vocabulary
    revision but consumes one token (al.color.text.muted_legacy) that
    the design system has marked deprecated. The pack serves the
    deprecated token through substituted_with_fallback and pins the
    disclosure row to the theme/debug surface and the support packet
    surface so reviewers can see the substitution rather than guessing
    from a screenshot. Distribution is community_supplied with
    unsigned_explicit_acceptance plus a decision row, mirrorability is
    mirror_with_attribution_required, compatibility resolves at
    compatible_minor_drift, and the pack covers the four first-party
    theme classes plus the standard / reduced / low-motion postures.
    Exercises §1.1 manifest record, §4 distribution / signature /
    mirrorability rules, §5 deprecation visibility and reconciliation,
    §6 posture coverage minimum, §6 safety-critical preservation list,
    and invariants 3 / 4 / 12.
  exercised_axes:
    distribution_class: community_supplied
    signature_state: unsigned_explicit_acceptance
    overlay_state: substituted_with_fallback
    deprecated_token_count_nonzero: true
  contract_sections:
    - "§1.1 theme_package_manifest_record"
    - "§4 distribution / signature / mirrorability"
    - "§5 deprecation visibility"
    - "§6 posture coverage and safety-critical preservation"
    - "§9 invariants (3, 4, 12)"

