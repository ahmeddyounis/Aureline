# yaml-language-server: $schema=../../../schemas/ux/motion_preset.schema.json
__fixture__:
  name: motion_preset_state_change_with_reduced_fallback
  scenario: >
    A motion preset wired to the durable-job-row state machine that
    handles the idle -> restricted state change. Default motion uses
    motion.fast + ease.standard for a subtle border / chip emphasis
    transition. Under motion_reduced and motion_low_motion the
    transition substitutes to non_motion_state_marker so the
    restricted chip and shield border still convey the state without
    any motion. Under motion_power_saver the transition collapses to
    motion.instant. Under motion_critical_hot_path the transition is
    suppressed entirely (engine-internal posture). Component-state
    compatibility records the idle -> restricted transition is
    preserved across motion_standard, motion_reduced, motion_low_motion,
    motion_power_saver, and motion_critical_hot_path. Non-motion state
    markers list shape, border, icon, label_chip, and
    iconography_metaphor; hue alone is forbidden. The preset is
    safety_critical (restricted-workspace) and is therefore
    host_owned_no_override at the extension boundary and
    theme_locked_to_first_party_motion at the theme boundary.
    Exercises §1.3 motion_preset_record, §8 reduced-motion fallbacks,
    §8 component-state compatibility, §8 no-hue-only substitution,
    §8 safety-critical preset rule, and invariants 9 / 10 / 11 / 12.
  exercised_axes:
    preset_kind_class: state_change
    semantic_transition_class: state_idle_to_active
    reduced_motion_substitution_classes:
      - non_motion_state_marker
      - collapse_to_instant
      - suppress_entirely
    is_safety_critical: true
  contract_sections:
    - "§1.3 motion_preset_record"
    - "§8 reduced-motion fallbacks"
    - "§8 component-state compatibility"
    - "§8 no-hue-only substitution"
    - "§8 safety-critical preset rule"
    - "§9 invariants (9, 10, 11, 12)"

record_kind: motion_preset_record
