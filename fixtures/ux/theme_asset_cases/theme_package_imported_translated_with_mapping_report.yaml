# yaml-language-server: $schema=../../../schemas/ux/theme_package_manifest.schema.json
__fixture__:
  name: theme_package_imported_translated_with_mapping_report
  scenario: >
    A theme imported from another ecosystem (a VS Code dark theme
    translated through the Aureline import-mapping pipeline). The
    package's distribution_class is imported_translated, signature is
    signed_unverified (the upstream signing root is not chained to the
    Aureline signing root yet), mirrorability is mirror_with_attribution_required,
    compatibility resolves at compatible_minor_drift. The mapping
    report ref is non-null so reviewers can audit which slots were
    translated, which were left unmapped, and which were blocked. The
    package covers dark_reference, light_parity, and high_contrast_dark
    but explicitly does not cover high_contrast_light (declared
    coverage gap). Three tokens are unmapped (no upstream equivalent),
    one is substituted, one is deprecated_with_replacement, and one is
    unsupported_blocked because the upstream value would have redefined
    semantic-status meaning.
    Exercises §1.1 manifest record, §4 imported_translated distribution
    rules, §4 unsigned_explicit_acceptance / signed_unverified posture
    options (here signed_unverified), §5 deprecation visibility on a
    mixed-state set, and invariants 12 / 13.
  exercised_axes:
    distribution_class: imported_translated
    signature_state: signed_unverified
    has_unmapped_tokens: true
    has_blocked_tokens: true
  contract_sections:
    - "§1.1 theme_package_manifest_record"
    - "§4 imported_translated distribution"
    - "§5 deprecation visibility"
    - "§9 invariants (12, 13)"

