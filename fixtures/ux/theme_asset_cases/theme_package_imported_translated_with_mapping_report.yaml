deprecated_token_disclosures:
  - deprecated_token_ref: design:token:al.color.text.muted_legacy
    replacement_token_ref: design:token:al.color.text.secondary
    overlay_state: deprecated_with_replacement
    visibility_required: true
    visibility_surface_refs:
      - surface:theme_debug.deprecated_token_pane
      - surface:import_mapping_report.deprecated_section
    compatibility_note: >
      Imported package consumes the deprecated muted_legacy token; the
      replacement (text.secondary) is named so the import surface and
      the theme/debug surface can both project the substitution.
  - deprecated_token_ref: design:token:al.color.bg.canvas_alt
    replacement_token_ref: design:token:al.color.bg.canvas
    overlay_state: substituted_with_fallback
    visibility_required: true
    visibility_surface_refs:
      - surface:theme_debug.substitution_pane
      - surface:import_mapping_report.substitution_section
  - deprecated_token_ref: design:token:upstream.tab.unfocused
    replacement_token_ref: null
    overlay_state: unmapped_inert
    visibility_required: true
    visibility_surface_refs:
      - surface:import_mapping_report.unmapped_section
    compatibility_note: >
      No Aureline equivalent for the upstream tab.unfocused token;
      surface renders inert until the upstream introduces a mapping or
      the import pipeline ships a translation rule.
  - deprecated_token_ref: design:token:upstream.editor.line_highlight_alpha
    replacement_token_ref: null
    overlay_state: unmapped_inert
    visibility_required: true
    visibility_surface_refs:
      - surface:import_mapping_report.unmapped_section
  - deprecated_token_ref: design:token:upstream.terminal.bell_flash
    replacement_token_ref: null
    overlay_state: unmapped_inert
    visibility_required: true
    visibility_surface_refs:
      - surface:import_mapping_report.unmapped_section
  - deprecated_token_ref: design:token:upstream.statusbar.warning_color_only
    replacement_token_ref: null
    overlay_state: unsupported_blocked
    visibility_required: true
    visibility_surface_refs:
      - surface:import_mapping_report.blocked_section
      - surface:theme_debug.blocked_token_pane
    compatibility_note: >
      Upstream value would have redefined semantic-status warning into
      a hue-only difference; the import pipeline blocks the row rather
      than substituting a near-miss.
