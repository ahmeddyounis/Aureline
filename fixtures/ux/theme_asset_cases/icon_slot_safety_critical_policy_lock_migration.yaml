    trust_visual_state_class_ref: policy_locked
    safety_critical_class: safety_critical_metaphor_continuity_required
    migration_state_class: migrating_with_alias
  contract_sections:
    - "§1.2 icon_slot_map_record"
    - "§7 trust_state ownership"
    - "§7 safety-critical migration metadata"
    - "§7 platform-variant coverage"
    - "§9 invariants (5, 7, 8)"

