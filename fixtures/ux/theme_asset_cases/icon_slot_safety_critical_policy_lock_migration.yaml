    and the migration cites a decision row so reviewers can audit the
    metaphor continuity claim.
    Exercises §1.2 icon_slot_map_record, §7 trust_state ownership
    rules, §7 safety-critical migration metadata, §7 platform-variant
    coverage, and invariants 5 / 7 / 8.
