__fixture__:
  name: icon_slot_directional_chevron_rtl
  scenario: >
    A directional chevron used for breadcrumb / disclosure / submenu
    navigation. Slot kind directional_chevron, default treatment
    shell_stroke_standard, directionality mirror_in_rtl. The slot
    ships one universal asset (not_applicable_universal) and is
    explicitly host_owned_no_override at the extension boundary so an
    extension cannot replace the canonical chevron with a near-miss
    glyph that would read backwards in RTL locales. Theme override
    boundary is theme_may_recolor_only because themes may retint the
    stroke but never replace the glyph itself. Migration state is
    frozen.
    Exercises §1.2 icon_slot_map_record, §7 directionality and
    extension-override boundaries, and invariants 6 / 7.
  exercised_axes:
    slot_kind_class: directional_chevron
    directionality_class: mirror_in_rtl
    platform_variant_class: not_applicable_universal
    extension_override_boundary_class: host_owned_no_override
  contract_sections:
    - "§1.2 icon_slot_map_record"
    - "§7 directionality"
    - "§7 extension-override boundary"
    - "§9 invariants (6, 7)"

