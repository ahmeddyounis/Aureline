# Update install during screen share.
#
# Reviewer-side fixture for
# artifacts/ux/escalation_matrix.yaml row
# ux:arbitration:screen_share_active and the update_install_pending
# active-flow row. The runtime update reaches ready-to-restart while
# the user is sharing their screen. The arbitration row holds the
# audience-visible OS notification, holds the toast, and routes the
# durable_job_row + status_item only. Reboot-required promotion to
# tier_blocking_trust waits until the share ends; until then the
# durable row updates silently.
__fixture__:
  name: update_install_during_screen_share
  scenario: >
    The runtime update finishes downloading and staging while the
    user is sharing their screen with a collaborator. The arbitration
    routes the durable_job_row to "ready_to_restart" and updates the
    status_item; toast, OS notification, and companion push are all
    suppressed under mode_screen_share. Promotion to tier_blocking_trust
    (the reboot-required review sheet) does not fire until the user
    ends the share, so the audience never sees the reboot prompt or
    the workspace identifier.
  arbitration_row_ref: escalation_matrix#ux:arbitration:screen_share_active
  contract_sections:
    - "Arbitration rules §4.2"
    - "Arbitration rules §4.3"
  exercised_axes:
    active_flow_class: screen_share_active
    incoming_interruptibility_tier: tier_durable
    arbitration_outcome_class: delivered_durable_job_row
    escalation_required_trigger: duration_threshold_crossed
    privacy_payload_class: in_product_only
    reopen_target_kind: durable_job_row_exact

audit_binding:
  canonical_event_id: ux:event:update-install:ready-to-restart:01
  event_lineage_id_ref: ux:lineage:update-install:ready-to-restart:01
  canonical_object_target_ref: obj:update-install:runtime:01
  source_subsystem: runtime_power_manager
  actor_identity_ref: id:actor:system:update-installer

active_flow_state_at_decision:
  active_flow_class: screen_share_active
  active_flow_target_ref: obj:collaboration:screen-share:current
  concurrent_active_flow_classes:
    - screen_share_active
    - update_install_pending
  active_quiet_hours_modes:
    - mode_screen_share

arbitration_decision:
  record_kind: interruptibility_arbitration_decision_record
  arbitration_decision_id: ux:arbitration-decision:update-install:screen-share:01
  arbitration_row_id: ux:arbitration:screen_share_active
  active_flow_class: screen_share_active
  incoming_interruptibility_tier: tier_durable
  arbitration_outcome_class: delivered_durable_job_row
  delivery_surface_class: durable_job_row
  surface_escalation_tier: tier.panel_attached_to_surface
  escalation_required_triggers_cited:
    - duration_threshold_crossed
  focus_steal_attempt_classes_denied:
    - update_install_modal_attempted_during_presentation
    - update_install_modal_attempted_during_typing
  interaction_safety_packet_id_ref: ux:interaction-safety-packet:update-install:01
  reopen_target_ref: ux:reopen:update-install:durable
  reopen_target_kind: durable_job_row_exact

suppression_proof:
  record_kind: notification_suppression_record
  suppression_record_id: ux:suppression:update-install:screen-share:01
  intended_delivery_surface_class: os_notification
  intended_privacy_payload_class: lock_screen_safe_generic
  intended_interruptibility_tier: tier_durable
  suppression_class: held_screen_share_mode
  suppression_outcome: routed_durable_only
  active_quiet_hours_modes_at_decision:
    - mode_screen_share
  release_step:
    release_trigger_class: routed_durable_only
    released_to_delivery_surface_class: durable_job_row
    released_with_privacy_payload_class: in_product_only
  preserved_durable_linkback:
    kind: durable_job_row_exact
    target_identity_ref: ux:job-row:update-install:ready-to-restart:01
    is_durable: true
    preserves_canonical_event_id: true
    preserves_canonical_object_identity: true

reboot_required_promotion_plan:
  description: >
    When the user ends the share, the durable row escalates to
    tier_blocking_trust ("Restart to apply update") with
    severity_increased and routes via the interaction-safety review
    sheet. The reboot prompt never appears as a focus-stealing modal
    while the share is active.
  promotion_arbitration_row_id: ux:arbitration:update_install_pending
  promotion_required_escalation_triggers:
    - severity_increased
    - consequence_class_escalated
  promotion_target_arbitration_outcome_class: routed_via_review_sheet

evidence_preservation_proof:
  preserves_durable_history: true
  preserves_critical_safety_tier: true
  required_evidence_kinds_recorded:
    - lineage_escalation_recorded
    - suppression_record_release_recorded
    - audit_trail_record_ref_present
    - badge_record_updated
  retained_record_refs:
    - schemas/ux/notification_suppression_record.schema.json#suppression_record
    - schemas/ux/event_lineage.schema.json#event_lineage_record
    - schemas/ux/job_row.schema.json#job_row_record
    - schemas/ux/activity_event_envelope.schema.json#activity_event_envelope_record

badge_proof:
  badge_class_review_row_ref: ux:badge-review:durable_running_count
  record_kind: badge_record
  badge_class: durable_running_count
  count_delta: 1
  count_basis: deduped_durable_item

reviewer_checks:
  - id: screen_share_suppresses_os_surfaces
    description: >
      mode_screen_share is active. os_notification, os_badge_app_icon,
      companion_push, lock_screen_summary, and toast on
      forbidden_delivery_surfaces; durable_job_row + status_item only.
    pass: true
  - id: durable_only_no_modal_during_share
    description: >
      tier_durable update lands on durable_job_row; reboot-required
      promotion is held until the share ends.
    pass: true
  - id: reopen_lands_on_durable_row
    description: >
      reopen_target_kind is durable_job_row_exact; status_item and
      app-icon badge invocations reopen exactly to the durable row.
    pass: true
  - id: workspace_identifier_not_audience_visible
    description: >
      No OS notification or companion push during the share; the
      audience never sees the workspace identifier or update label.
    pass: true

denial_reasons_avoided:
  - focus_steal_on_protected_path
  - toast_only_forbidden_for_durable_work
  - durable_job_row_missing_for_long_running_work
  - reopen_to_generic_home_forbidden
  - quiet_hours_hold_discarded_durable_history
  - held_event_missing_audit_trail
