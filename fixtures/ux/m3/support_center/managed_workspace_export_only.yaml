# Support Center beta surface fixture: managed workspace; only the
# handoff and escalation packet destinations declare a managed-admin
# gate on apply, while local-only recovery lanes remain accountless.
#
# Projects onto support_center_beta_surface_record from
# schemas/support/support_center_beta.schema.json.

schema_version: 1
record_kind: support_center_beta_surface_record
surface_id: support_center_beta:surface:managed.workspace_export_only
title: Support Center (managed workspace)
summary: >
  Managed-deployment Support Center surface; the local-only recovery
  lanes (safe mode, Project Doctor, bisect, repair preview, bundle
  preview) remain accountless and reachable by keyboard, while only
  the optional handoff and escalation packet destinations declare a
  managed-admin gate on apply.
deployment_context_class: managed
primary_command_id: cmd:support_center.open
primary_keyboard_reach_class: palette_command

launch_action_rows:
  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:managed.enter_safe_mode
    beta_lane_class: safe_mode
    launch_action_class: enter_safe_mode
    command_id: cmd:workspace.enter_safe_mode
    keyboard_reach_classes:
      - palette_command
      - default_keyboard_shortcut
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - workspace_trust_store
      - credential_store
      - session_restore_store
    label: Enter safe mode
    summary: >
      Safe mode is a local-only recovery lane; managed control plane
      does not gate read-only diagnosis or the narrowed profile.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:managed.open_project_doctor
    beta_lane_class: doctor_probe_packs
    launch_action_class: open_project_doctor
    command_id: cmd:project_doctor.open
    keyboard_reach_classes:
      - palette_command
      - panel_focus_chord
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - durable_workspace_indexes
    label: Open Project Doctor
    summary: >
      Project Doctor probe packs run read-only; managed admins do not
      gate read-only diagnosis.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:managed.start_extension_bisect
    beta_lane_class: extension_bisect
    launch_action_class: start_extension_bisect
    command_id: cmd:extension_bisect.start
    keyboard_reach_classes:
      - palette_command
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - workspace_trust_store
      - durable_workspace_indexes
    label: Start extension bisect
    summary: >
      Extension bisect narrows runtime state locally and never
      reaches into managed-admin authority for read-only diagnosis.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:managed.open_repair_preview
    beta_lane_class: repair_transaction_preview
    launch_action_class: open_repair_preview
    command_id: cmd:repair_preview.open
    keyboard_reach_classes:
      - palette_command
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - durable_workspace_indexes
      - workspace_trust_store
    label: Open repair preview
    summary: >
      Repair-transaction preview opens without a managed-admin gate;
      apply is reserved for a later reviewed action.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:managed.preview_support_bundle
    beta_lane_class: support_bundle
    launch_action_class: preview_support_bundle
    command_id: cmd:support.open_local_preview
    keyboard_reach_classes:
      - palette_command
      - panel_focus_chord
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - support_export_store
    label: Preview support bundle
    summary: >
      Support-bundle preview stays local-first under a managed
      control plane; the preview is reviewable without an account or
      hosted intake.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:managed.export_handoff_packet
    beta_lane_class: support_bundle
    launch_action_class: export_object_handoff_packet
    command_id: cmd:support.export_object_handoff_packet
    keyboard_reach_classes:
      - palette_command
    account_requirement_class: managed_admin_account_required_for_handoff
    service_dependency_class: optional_managed_policy_sync
    preserved_state_classes:
      - user_authored_files
      - support_export_store
    label: Export object handoff packet
    summary: >
      Object handoff packet is local-first; managed-admin account is
      only required when the admin opts to apply the handoff inside
      the control plane.

claim_truth_rows:
  - schema_version: 1
    record_kind: support_center_claim_truth_row_record
    row_id: support_center_beta:claim:managed.records_governance
    beta_lane_class: records_governance
    claim_state_class: green_claim_proven
    scorecard_target: m3.beta_lane.records_governance
    evidence_packet_ref: artifacts/support/m3/drill_harness_report.md
    summary: >
      Records-governance lane is proven by the drill harness; managed
      admins can read the chain-of-custody packets the same way
      individual users do.

  - schema_version: 1
    record_kind: support_center_claim_truth_row_record
    row_id: support_center_beta:claim:managed.project_doctor_finding_contract
    beta_lane_class: project_doctor_finding_contract
    claim_state_class: green_claim_proven
    scorecard_target: m3.beta_lane.project_doctor_finding_contract
    evidence_packet_ref: artifacts/support/m3/drill_harness_report.md
    summary: >
      Project Doctor finding-contract beta claim is proven under the
      managed deployment context.

degraded_truth_rows:
  - schema_version: 1
    record_kind: support_center_degraded_truth_row_record
    row_id: support_center_beta:degraded:managed.none
    degraded_truth_class: none_degraded
    active: false
    summary: >
      No degraded state is active on this surface; managed control
      plane is not narrowing the recovery-ladder entries.

export_route_rows:
  - schema_version: 1
    record_kind: support_center_export_route_row_record
    row_id: support_center_beta:export_route:managed.support_bundle_preview
    launch_action_class: preview_support_bundle
    destination_class: support_bundle_preview_local_first
    destination_schema_ref: schemas/support/support_bundle_manifest.schema.json
    local_first_path_named: true
    upload_required_for_first_action: false
    summary: >
      Support-bundle preview remains local-first under managed
      control plane; the preview is reviewable before any export.

  - schema_version: 1
    record_kind: support_center_export_route_row_record
    row_id: support_center_beta:export_route:managed.object_handoff_packet
    launch_action_class: export_object_handoff_packet
    destination_class: object_handoff_packet_draft
    destination_schema_ref: schemas/support/object_handoff_packet.schema.json
    local_first_path_named: true
    upload_required_for_first_action: false
    summary: >
      Object handoff packet is drafted locally; the managed-admin
      account requirement applies only when the admin opts to apply
      the handoff.

  - schema_version: 1
    record_kind: support_center_export_route_row_record
    row_id: support_center_beta:export_route:managed.escalation_packet
    launch_action_class: export_escalation_packet_draft
    destination_class: escalation_packet_draft
    destination_schema_ref: schemas/support/escalation_packet.schema.json
    local_first_path_named: true
    upload_required_for_first_action: false
    summary: >
      Escalation packet is drafted locally; the user reviews
      preserved evidence ids and the scenario family before any
      managed-admin handoff.

no_account_required_for_local_only: true
no_hidden_service_required_for_local_only: true

ia_capability_card_refs:
  - support_center_card:safe_mode
  - support_center_card:project_doctor
  - support_center_card:bisect_or_quarantine
  - support_center_card:support_bundle
  - support_center_card:issue_or_escalation_handoff

ia_route_refs:
  - support_center_route:error_surface.project_doctor
  - support_center_route:policy_denial_surface.project_doctor

governance_bindings:
  support_center_concept_ref: docs/support/support_center_concept.md
  support_center_ia_ref: docs/support/support_center_information_architecture.md
  support_center_routes_ref: artifacts/support/support_center_routes.yaml
  m3_scenario_corpus_ref: docs/support/m3/support_scenario_corpus.md
  recovery_ladder_doc_ref: docs/support/recovery_ladder_alpha.md
  safe_mode_doc_ref: docs/support/m3/safe_mode_beta.md
  extension_bisect_doc_ref: docs/support/m3/extension_bisect_beta.md
  repair_transaction_doc_ref: docs/support/m3/repair_transaction_beta.md
  project_doctor_doc_ref: docs/support/m3/project_doctor_beta.md
  support_bundle_contract_ref: docs/support/support_bundle_contract.md

notes: >
  Reference managed-workspace surface. Local-only recovery lanes
  remain accountless and reachable by keyboard; only the handoff and
  escalation packet destinations declare an admin-apply gate.

