# Support Center beta shell-surface fixture corpus.
#
# Protected entry point for the seeded Support Center beta surface
# scenarios consumed by the shell-side projection at
# `crates/aureline-shell/src/support_center/mod.rs` and the integration
# test at `crates/aureline-shell/tests/support_center_beta_fixtures.rs`.
# Every scenario fixture mirrors the boundary shape declared by
# `schemas/support/support_center_beta.schema.json` and reuses the
# closed beta-lane vocabulary from the M3 support-scenario corpus at
# `crates/aureline-support/src/m3_scenario_corpus/mod.rs`.
#
# Scenarios cover the deployment-context spread the IA expects so a
# desktop-only or managed-only happy path cannot be implied.

schema_version: 1
manifest_id: ux.m3.support_center.surface_corpus.v1
status: protected
overview_page: docs/ux/m3/support_center_beta.md
schema_ref: schemas/support/support_center_beta.schema.json
crate_consumer: crates/aureline-shell/src/support_center/mod.rs
integration_test: crates/aureline-shell/tests/support_center_beta_fixtures.rs

scenario_files:
  - local_only_baseline.yaml
  - post_crash_loop_degraded.yaml
  - managed_workspace_export_only.yaml

required_case_assertions:
  - every_surface_lists_five_launch_actions_covering_safe_mode_doctor_bisect_repair_and_export
  - every_surface_pins_no_account_required_and_no_hidden_service_for_local_only_lanes
  - every_surface_quotes_claim_truth_for_at_least_one_beta_lane
  - every_surface_quotes_at_least_one_degraded_truth_row_even_when_none_are_active
  - every_export_route_names_a_local_first_path_and_refuses_upload_first
  - every_surface_pins_user_authored_files_as_preserved_state_on_every_launch_action
  - support_packet_excludes_raw_private_material_and_ambient_authority

source_contract_refs:
  support_center_concept: docs/support/support_center_concept.md
  support_center_information_architecture: docs/support/support_center_information_architecture.md
  support_center_routes: artifacts/support/support_center_routes.yaml
  m3_scenario_corpus: docs/support/m3/support_scenario_corpus.md
  recovery_ladder_alpha: docs/support/recovery_ladder_alpha.md
  safe_mode_beta: docs/support/m3/safe_mode_beta.md
  extension_bisect_beta: docs/support/m3/extension_bisect_beta.md
  repair_transaction_beta: docs/support/m3/repair_transaction_beta.md
  project_doctor_beta: docs/support/m3/project_doctor_beta.md
  support_bundle_contract: docs/support/support_bundle_contract.md
