# Support Center beta surface fixture: post-crash-loop safe-mode active.
#
# Projects onto support_center_beta_surface_record from
# schemas/support/support_center_beta.schema.json. Reference case for
# a degraded local-only surface entered after a startup crash loop.

schema_version: 1
record_kind: support_center_beta_surface_record
surface_id: support_center_beta:surface:local_only.post_crash_loop_degraded
title: Support Center (safe mode)
summary: >
  Support Center surface while safe mode is active; the surface still
  launches Project Doctor, extension bisect, repair preview, and the
  local-first support-bundle preview, and names the exit-safe-mode
  action verbatim instead of burying it in another panel.
deployment_context_class: local_only
primary_command_id: cmd:support_center.open
primary_keyboard_reach_class: palette_command

launch_action_rows:
  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:post_crash_loop.enter_safe_mode
    beta_lane_class: safe_mode
    launch_action_class: enter_safe_mode
    command_id: cmd:workspace.enter_safe_mode
    keyboard_reach_classes:
      - palette_command
      - default_keyboard_shortcut
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - workspace_trust_store
      - credential_store
      - session_restore_store
    label: Re-enter safe mode
    summary: >
      Re-enter the typed safe-mode profile (same row class as the
      live degraded state) so the user can reconfirm the narrowing
      they are already in without searching for the entry path.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:post_crash_loop.open_project_doctor
    beta_lane_class: doctor_probe_packs
    launch_action_class: open_project_doctor
    command_id: cmd:project_doctor.open
    keyboard_reach_classes:
      - palette_command
      - panel_focus_chord
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - durable_workspace_indexes
    label: Open Project Doctor
    summary: >
      Read the Project Doctor finding that justified the post-crash
      profile; the read-only diagnosis stays available while safe
      mode is active.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:post_crash_loop.start_extension_bisect
    beta_lane_class: extension_bisect
    launch_action_class: start_extension_bisect
    command_id: cmd:extension_bisect.start
    keyboard_reach_classes:
      - palette_command
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - workspace_trust_store
      - durable_workspace_indexes
    label: Start extension bisect
    summary: >
      Narrow the suspect extension set while safe mode is active; the
      bisect preserves the prior extension state captured at session
      start.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:post_crash_loop.open_repair_preview
    beta_lane_class: repair_transaction_preview
    launch_action_class: open_repair_preview
    command_id: cmd:repair_preview.open
    keyboard_reach_classes:
      - palette_command
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - durable_workspace_indexes
      - workspace_trust_store
    label: Open repair preview
    summary: >
      Inspect a typed repair-transaction preview skeleton; the
      preview is cancellable and never carries an apply path the
      user has not reviewed.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:post_crash_loop.open_recovery_ladder
    beta_lane_class: recovery_ladder
    launch_action_class: open_recovery_ladder
    command_id: cmd:recovery_ladder.open
    keyboard_reach_classes:
      - palette_command
      - panel_focus_chord
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - session_restore_store
      - support_export_store
    label: Open recovery ladder
    summary: >
      Open the typed recovery-ladder rung list with the explicit exit
      action so the user can leave safe mode or move to a narrower
      rung without searching docs.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:post_crash_loop.preview_support_bundle
    beta_lane_class: support_bundle
    launch_action_class: preview_support_bundle
    command_id: cmd:support.open_local_preview
    keyboard_reach_classes:
      - palette_command
      - panel_focus_chord
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - support_export_store
    label: Preview support bundle
    summary: >
      Build the local-first support bundle preview while safe mode is
      active; the preview includes the safe-mode profile, recovery
      decision, and Doctor finding without leaving the device.

claim_truth_rows:
  - schema_version: 1
    record_kind: support_center_claim_truth_row_record
    row_id: support_center_beta:claim:post_crash_loop.safe_mode
    beta_lane_class: safe_mode
    claim_state_class: degraded_local_only
    scorecard_target: m3.beta_lane.safe_mode
    evidence_packet_ref: artifacts/support/m3/drill_harness_report.md
    summary: >
      Safe-mode lane is currently active on this device; the claim
      truth row quotes degraded_local_only so the user sees the
      narrowing instead of inferring it from a chrome badge.

  - schema_version: 1
    record_kind: support_center_claim_truth_row_record
    row_id: support_center_beta:claim:post_crash_loop.recovery_ladder
    beta_lane_class: recovery_ladder
    claim_state_class: green_claim_proven
    scorecard_target: m3.beta_lane.recovery_ladder
    evidence_packet_ref: artifacts/support/m3/drill_harness_report.md
    summary: >
      Recovery-ladder rung list is available; the user can move to a
      narrower rung or exit safe mode from the same surface.

  - schema_version: 1
    record_kind: support_center_claim_truth_row_record
    row_id: support_center_beta:claim:post_crash_loop.crash_triage
    beta_lane_class: crash_triage
    claim_state_class: green_claim_proven
    scorecard_target: m3.beta_lane.crash_triage
    evidence_packet_ref: artifacts/support/m3/drill_harness_report.md
    summary: >
      Crash-triage evidence remains reviewable while safe mode is
      active; export remains local-first.

degraded_truth_rows:
  - schema_version: 1
    record_kind: support_center_degraded_truth_row_record
    row_id: support_center_beta:degraded:post_crash_loop.safe_mode_active
    degraded_truth_class: safe_mode_active
    active: true
    exit_command_id: cmd:workspace.exit_safe_mode
    summary: >
      Safe mode is active after the startup crash-loop budget was
      exhausted; the user can leave by invoking the explicit exit
      command rather than hunting for a hidden toggle.

  - schema_version: 1
    record_kind: support_center_degraded_truth_row_record
    row_id: support_center_beta:degraded:post_crash_loop.crash_loop_containment_active
    degraded_truth_class: crash_loop_containment_active
    active: true
    exit_command_id: cmd:workspace.review_crash_loop_containment
    summary: >
      A crash-loop containment record is live; the user can review
      the containment offer and choose a narrower rung explicitly.

export_route_rows:
  - schema_version: 1
    record_kind: support_center_export_route_row_record
    row_id: support_center_beta:export_route:post_crash_loop.support_bundle_preview
    launch_action_class: preview_support_bundle
    destination_class: support_bundle_preview_local_first
    destination_schema_ref: schemas/support/support_bundle_manifest.schema.json
    local_first_path_named: true
    upload_required_for_first_action: false
    summary: >
      Support-bundle preview remains local-first while safe mode is
      active; the preview includes the active recovery decision and
      Doctor finding without contacting any service.

  - schema_version: 1
    record_kind: support_center_export_route_row_record
    row_id: support_center_beta:export_route:post_crash_loop.recovery_packet
    launch_action_class: open_recovery_ladder
    destination_class: recovery_ladder_support_packet
    destination_schema_ref: schemas/support/recovery_ladder_packet.schema.json
    local_first_path_named: true
    upload_required_for_first_action: false
    summary: >
      Recovery-ladder rung list saves a metadata-safe support packet
      locally so a later review can reconstruct which rung the user
      took without re-asking.

no_account_required_for_local_only: true
no_hidden_service_required_for_local_only: true

ia_capability_card_refs:
  - support_center_card:safe_mode
  - support_center_card:project_doctor
  - support_center_card:bisect_or_quarantine
  - support_center_card:crash_triage
  - support_center_card:support_bundle

ia_route_refs:
  - support_center_route:crash_loop_surface.crash_triage

governance_bindings:
  support_center_concept_ref: docs/support/support_center_concept.md
  support_center_ia_ref: docs/support/support_center_information_architecture.md
  support_center_routes_ref: artifacts/support/support_center_routes.yaml
  m3_scenario_corpus_ref: docs/support/m3/support_scenario_corpus.md
  recovery_ladder_doc_ref: docs/support/recovery_ladder_alpha.md
  safe_mode_doc_ref: docs/support/m3/safe_mode_beta.md
  extension_bisect_doc_ref: docs/support/m3/extension_bisect_beta.md
  repair_transaction_doc_ref: docs/support/m3/repair_transaction_beta.md
  project_doctor_doc_ref: docs/support/m3/project_doctor_beta.md
  support_bundle_contract_ref: docs/support/support_bundle_contract.md

notes: >
  Reference post-crash-loop surface. Safe mode and crash-loop
  containment are both active; the user reads the state and the
  explicit exit commands on the same surface that launches the
  recovery actions.

emitted_at: 2026-05-16T00:00:00Z
