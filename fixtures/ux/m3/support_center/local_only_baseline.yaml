# Support Center beta surface fixture: local-only individual install,
# no degraded state active.
#
# Projects onto support_center_beta_surface_record from
# schemas/support/support_center_beta.schema.json. Reference case for
# the local-only deployment context.

schema_version: 1
record_kind: support_center_beta_surface_record
surface_id: support_center_beta:surface:local_only.baseline
title: Support Center
summary: >
  One keyboard-reachable surface that launches safe mode, Project
  Doctor, extension bisect, repair preview, and the support-bundle
  preview without requiring an account or a hosted service.
deployment_context_class: local_only
primary_command_id: cmd:support_center.open
primary_keyboard_reach_class: palette_command

launch_action_rows:
  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:local_only.enter_safe_mode
    beta_lane_class: safe_mode
    launch_action_class: enter_safe_mode
    command_id: cmd:workspace.enter_safe_mode
    keyboard_reach_classes:
      - palette_command
      - default_keyboard_shortcut
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - workspace_trust_store
      - credential_store
      - session_restore_store
    label: Enter safe mode
    summary: >
      Enter the typed safe-mode profile so the user can keep editing
      with extensions and helpers narrowed; the entry preserves
      user-authored files, workspace trust, credentials, and the
      session-restore store.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:local_only.open_project_doctor
    beta_lane_class: doctor_probe_packs
    launch_action_class: open_project_doctor
    command_id: cmd:project_doctor.open
    keyboard_reach_classes:
      - palette_command
      - panel_focus_chord
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - durable_workspace_indexes
    label: Open Project Doctor
    summary: >
      Run the read-only Project Doctor probe packs against the active
      workspace; the user reads stable finding codes, severity, and
      confidence before any mutation.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:local_only.start_extension_bisect
    beta_lane_class: extension_bisect
    launch_action_class: start_extension_bisect
    command_id: cmd:extension_bisect.start
    keyboard_reach_classes:
      - palette_command
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - workspace_trust_store
      - durable_workspace_indexes
    label: Start extension bisect
    summary: >
      Open the typed extension-bisect session so the user can narrow a
      suspect extension set with attributable findings; the bisect
      preserves the prior extension state and never deletes
      user-authored files.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:local_only.open_repair_preview
    beta_lane_class: repair_transaction_preview
    launch_action_class: open_repair_preview
    command_id: cmd:repair_preview.open
    keyboard_reach_classes:
      - palette_command
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - durable_workspace_indexes
      - workspace_trust_store
    label: Open repair preview
    summary: >
      Open the typed repair-transaction preview skeleton so the user
      sees blast radius, compensation class, and affected objects
      before any apply path runs; the preview is cancellable.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:local_only.preview_support_bundle
    beta_lane_class: support_bundle
    launch_action_class: preview_support_bundle
    command_id: cmd:support.open_local_preview
    keyboard_reach_classes:
      - palette_command
      - panel_focus_chord
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - support_export_store
    label: Preview support bundle
    summary: >
      Open the local-first support-bundle preview before any export
      leaves the device; redaction defaults, exact-build identity, and
      excluded classes are visible on the preview itself.

  - schema_version: 1
    record_kind: support_center_launch_action_row_record
    row_id: support_center_beta:action:local_only.export_support_bundle
    beta_lane_class: support_bundle
    launch_action_class: export_support_bundle
    command_id: cmd:support.export_bundle_local_only
    keyboard_reach_classes:
      - palette_command
    account_requirement_class: no_account_required
    service_dependency_class: local_only
    preserved_state_classes:
      - user_authored_files
      - support_export_store
    label: Export support bundle (local file)
    summary: >
      Export the previewed support bundle to a local file on the
      user's device; no upload, no account, and no hosted intake are
      required for the local-only export path.

claim_truth_rows:
  - schema_version: 1
    record_kind: support_center_claim_truth_row_record
    row_id: support_center_beta:claim:local_only.safe_mode
    beta_lane_class: safe_mode
    claim_state_class: green_claim_proven
    scorecard_target: m3.beta_lane.safe_mode
    evidence_packet_ref: artifacts/support/m3/drill_harness_report.md
    summary: >
      Safe-mode beta claim is proven by the drill-harness baseline; the
      surface quotes the same scorecard target the M3 corpus uses.

  - schema_version: 1
    record_kind: support_center_claim_truth_row_record
    row_id: support_center_beta:claim:local_only.extension_bisect
    beta_lane_class: extension_bisect
    claim_state_class: green_claim_proven
    scorecard_target: m3.beta_lane.extension_bisect
    evidence_packet_ref: artifacts/support/m3/drill_harness_report.md
    summary: >
      Extension-bisect beta claim is proven by the drill-harness
      baseline; the user can open the same evidence the release-review
      lane reads.

  - schema_version: 1
    record_kind: support_center_claim_truth_row_record
    row_id: support_center_beta:claim:local_only.repair_transaction_preview
    beta_lane_class: repair_transaction_preview
    claim_state_class: green_claim_proven
    scorecard_target: m3.beta_lane.repair_transaction_preview
    evidence_packet_ref: artifacts/support/m3/drill_harness_report.md
    summary: >
      Repair-transaction preview beta claim is proven by the drill
      harness; comparison-before-apply remains the visible default.

  - schema_version: 1
    record_kind: support_center_claim_truth_row_record
    row_id: support_center_beta:claim:local_only.project_doctor_finding_contract
    beta_lane_class: project_doctor_finding_contract
    claim_state_class: green_claim_proven
    scorecard_target: m3.beta_lane.project_doctor_finding_contract
    evidence_packet_ref: artifacts/support/m3/drill_harness_report.md
    summary: >
      Project Doctor finding-contract beta claim is proven; typed
      finding codes, severity, and confidence ride on every probe
      output the surface opens.

degraded_truth_rows:
  - schema_version: 1
    record_kind: support_center_degraded_truth_row_record
    row_id: support_center_beta:degraded:local_only.none
    degraded_truth_class: none_degraded
    active: false
    summary: >
      No degraded state is active on this surface; the user sees the
      full Support Center launch set with no narrowing.

export_route_rows:
  - schema_version: 1
    record_kind: support_center_export_route_row_record
    row_id: support_center_beta:export_route:local_only.support_bundle_preview
    launch_action_class: preview_support_bundle
    destination_class: support_bundle_preview_local_first
    destination_schema_ref: schemas/support/support_bundle_manifest.schema.json
    local_first_path_named: true
    upload_required_for_first_action: false
    summary: >
      Support-bundle preview is local-first; the user reviews the
      manifest, redaction defaults, and excluded classes before any
      export leaves the device.

  - schema_version: 1
    record_kind: support_center_export_route_row_record
    row_id: support_center_beta:export_route:local_only.support_bundle_export
    launch_action_class: export_support_bundle
    destination_class: support_bundle_preview_local_first
    destination_schema_ref: schemas/support/support_bundle_manifest.schema.json
    local_first_path_named: true
    upload_required_for_first_action: false
    summary: >
      Support-bundle export writes to a local file the user picks; no
      upload, no account, and no hosted intake are required.

  - schema_version: 1
    record_kind: support_center_export_route_row_record
    row_id: support_center_beta:export_route:local_only.doctor_finding
    launch_action_class: open_project_doctor
    destination_class: doctor_finding_record_export
    destination_schema_ref: schemas/support/doctor_finding.schema.json
    local_first_path_named: true
    upload_required_for_first_action: false
    summary: >
      Doctor findings open in the read-only finding inspector; the
      user can save a finding record locally without leaving the
      surface.

no_account_required_for_local_only: true
no_hidden_service_required_for_local_only: true

ia_capability_card_refs:
  - support_center_card:project_doctor
  - support_center_card:safe_mode
  - support_center_card:bisect_or_quarantine
  - support_center_card:support_bundle
  - support_center_card:guided_repair

ia_route_refs:
  - support_center_route:error_surface.project_doctor
  - support_center_route:blocked_action_surface.project_doctor

governance_bindings:
  support_center_concept_ref: docs/support/support_center_concept.md
  support_center_ia_ref: docs/support/support_center_information_architecture.md
  support_center_routes_ref: artifacts/support/support_center_routes.yaml
  m3_scenario_corpus_ref: docs/support/m3/support_scenario_corpus.md
  recovery_ladder_doc_ref: docs/support/recovery_ladder_alpha.md
  safe_mode_doc_ref: docs/support/m3/safe_mode_beta.md
  extension_bisect_doc_ref: docs/support/m3/extension_bisect_beta.md
  repair_transaction_doc_ref: docs/support/m3/repair_transaction_beta.md
  project_doctor_doc_ref: docs/support/m3/project_doctor_beta.md
  support_bundle_contract_ref: docs/support/support_bundle_contract.md

notes: >
  Local-only individual install reference. The surface launches all
  five recovery-ladder entries plus the local-only export path
  without contacting any service.

