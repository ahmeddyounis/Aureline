# yaml-language-server: $schema=../../../schemas/ux/interaction_safety.schema.json
__fixture__:
  name: destructive_bulk_rename_apply
  scenario: >
    A user opens the review / diff canvas to apply a rename
    across 42 workspace files. The review surface mints a preview
    against a basis snapshot (branch "main@9f2c…" plus a search
    query snapshot) and enumerates included / blocked / hidden /
    query-derived members. Between preview and apply the
    underlying query basis drifts (three new matching files land
    on "main"); the surface refuses to silently widen, emits
    apply_basis_drifted, and reopens review. The user re-approves
    against the refreshed preview. Apply commits against the
    preview_packet_ref; validation runs the test plan in the
    changed packages; keep_or_revert names a
    restore_from_checkpoint recovery. The compact-shell
    responsive fallback engages on a narrower window; the surface
    preserves every required visible field for the
    recoverable_durable consequence class. On dismiss focus
    returns to the invoking review row (returned_exact). A
    sanitized copy of the preview summary is exported for the
    evidence packet. No raw paths, raw file bodies, raw diffs,
    raw query text, or raw URLs cross the boundary.
  exercised_surfaces: [review_and_diff_canvas, editor_canvas]
  exercised_classes:
    authority_classes: [user_initiated_local]
    consequence_classes: [recoverable_durable]
    high_risk_preview_classes: [destructive_bulk_mutation]
    preview_apply_revert_phases: [propose, preview, apply, validate, keep_or_revert]
    revert_classes: [restore_from_checkpoint]
    authority_renewal_triggers: [basis_snapshot_drifted]
    batch_scope_classes: [custom_identity_set, query_snapshot_stale]
    batch_member_statuses:
      - included
      - blocked_by_protected_path
      - hidden_stale_membership
      - query_derived
    focus_return_states: [returned_exact]
    responsive_fallback_modes: [full_chrome, compact_shell]
    representation_classes: [sanitized]
    audit_event_ids:
      - interaction_safety_preview_emitted
      - interaction_safety_batch_scope_labelled
      - interaction_safety_apply_basis_drifted
      - interaction_safety_apply_committed
      - interaction_safety_validate_completed
      - interaction_safety_revert_requested
      - interaction_safety_focus_returned
      - interaction_safety_responsive_fallback_engaged
      - interaction_safety_chrome_collapse_field_preserved
      - interaction_safety_copy_export_labelled

