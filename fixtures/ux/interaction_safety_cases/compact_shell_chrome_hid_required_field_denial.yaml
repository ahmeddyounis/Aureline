# yaml-language-server: $schema=../../../schemas/ux/interaction_safety.schema.json
__fixture__:
  name: compact_shell_chrome_hid_required_field_denial
  scenario: >
    A narrow-width window opens the review / diff canvas on an
    external_shared consequence (delete-remote-branch review).
    The responsive fallback ladder engages narrow_width_sheet and
    collapses secondary chrome; in doing so it drops the
    blocked_or_hidden_member_count chip and the
    policy_source_label chip. Because the consequence class is
    external_shared, those classes belong to the required-visible-
    field set at commit. The surface MUST deny the commit with
    chrome_hid_required_field rather than letting the user
    approve against a collapsed chrome. The denial emits a typed
    interaction_safety_denial_emitted event, and the surface
    renders a focus-return record whose state is focus_loss_denied
    with an announcement explaining why focus could not return
    (the commit button was removed by the denial).
  exercised_surfaces: [review_and_diff_canvas]
  exercised_classes:
    authority_classes: [user_initiated_local]
    consequence_classes: [external_shared]
    responsive_fallback_modes: [narrow_width_sheet]
    dropped_required_field_classes:
      - blocked_or_hidden_member_count
      - policy_source_label
    denial_reasons: [chrome_hid_required_field]
    focus_return_states: [focus_loss_denied]
    audit_event_ids:
      - interaction_safety_responsive_fallback_engaged
      - interaction_safety_denial_emitted
      - interaction_safety_focus_return_target_lost

---

# Responsive fallback: dropped required-visible-field classes for an external_shared consequence.
record_kind: responsive_fallback_record
interaction_safety_schema_version: 1
responsive_fallback_id: is:rfb:delete-branch:01
shell_zone: main_workspace
responsive_fallback_mode: narrow_width_sheet
collapsed_chrome_items_ref:
  - is:chrome:inspector-tab:branch-metadata
  - is:chrome:secondary-bar:policy-ribbon
preserved_required_fields:
  - target_identity
  - actor_identity
  - authority_class_label
  - consequence_class_label
  - scope_statement
  - recovery_class_label
  - expiry_or_revocation_claim
  - basis_snapshot_freshness
dropped_fields_if_any:
  - blocked_or_hidden_member_count
  - policy_source_label
minted_at: "2026-04-19T18:00:00Z"

---

