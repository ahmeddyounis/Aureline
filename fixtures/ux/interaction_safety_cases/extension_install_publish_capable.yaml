# yaml-language-server: $schema=../../../schemas/ux/interaction_safety.schema.json
__fixture__:
  name: extension_install_publish_capable
  scenario: >
    A user installs the signed Wasm extension "acme-labs/prose-
    helper" v1.4.2 from the install-update-attach canvas. The
    effective-permission summary (ADR-0012) is quoted by ref; the
    surface mints a permission_prompt_record naming a workspace-
    scoped grant, the productive denial fallback
    ("Continue without extension"), and the revocation path
    ("Settings > Extensions > Active grants"). The install is an
    external / publish-capable path: authority_class is
    user_initiated_local at commit, consequence_class is
    external_shared (extension host gains capabilities), revert
    class is compensating_action (the installed extension can be
    uninstalled but side-effects on future workspace openings do
    not exact-undo). The user grants workspace scope. When
    workspace trust state later flips from trusted to restricted
    the surface emits interaction_safety_authority_renewal_required
    with trigger trust_state_changed and reprompts with a delta
    over the prior grant. A browser-handoff step-up happens
    through the ADR-0010 envelope (no raw URL launch); the
    step-up preview is browser_handoff. Focus returns to the
    invoking install card on dismiss. A sanitized export of the
    publisher-identity row goes into the support bundle. No raw
    artifact bytes, raw signing-key material, raw URLs, raw OAuth
    state, raw ticket bodies, or raw publisher-private data cross.
  exercised_surfaces:
    - install_update_attach_canvas
    - provider_bearing_canvas
  exercised_classes:
    authority_classes: [user_initiated_local, extension_initiated]
    consequence_classes: [external_shared]
    high_risk_preview_classes: [install_or_update, browser_handoff]
    preview_apply_revert_phases: [propose, preview, apply, validate]
    revert_classes: [compensating_action]
    permission_grant_scopes: [workspace]
    authority_renewal_triggers: [trust_state_changed]
    representation_classes: [sanitized]
    focus_return_states: [returned_exact]
    responsive_fallback_modes: [full_chrome]
    audit_event_ids:
      - interaction_safety_permission_prompt_opened
      - interaction_safety_permission_prompt_granted
      - interaction_safety_preview_emitted
      - interaction_safety_safe_preview_engaged
      - interaction_safety_apply_committed
      - interaction_safety_authority_renewal_required
      - interaction_safety_focus_returned
      - interaction_safety_representation_label_rendered
      - interaction_safety_copy_export_labelled

