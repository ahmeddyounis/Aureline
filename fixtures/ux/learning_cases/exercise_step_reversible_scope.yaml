# yaml-language-server: $schema=../../../schemas/ux/guided_tour.schema.json
__fixture__:
  name: exercise_step_reversible_scope
  scenario: >
    An exercise-step waypoint that mutates the workspace under
    reversible scope (the underlying guided_surface_state_record
    declares exercise_mutation_posture = mutates_workspace_after_ack
    in the learnability-cases fixture). The waypoint cites a
    canonical command_id_ref so a reviewer can reconstruct what the
    exercise teaches; the companion learning_progress_record on the
    learning_progress.schema.json records per-profile progress with
    portable export and dont_show_again_per_profile scope. Exercises
    §3 rule 1 (canonical anchor), §4 rules 1, 2, 3
    (progress / dismissal / portability lanes), and §5 evidence hook
    layout_restore_proof.
  exercised_axes:
    record_kinds:
      - tour_waypoint_record
      - learning_progress_record
    waypoint_anchor_kind: command_id_anchor
    layout_target_class: primary_editor
    completion_class: in_progress
    dismissal_class: per_profile_dismissable
    progress_export_class: in_portable_profile_package_redacted
    dont_show_again_scope_class: dont_show_again_per_profile
  contract_sections:
    - "§1.1 tour_waypoint_record"
    - "§1.2 learning_progress_record"
    - "§3 rule 1 (canonical anchor)"
    - "§4 progress / dismissal / portability"

