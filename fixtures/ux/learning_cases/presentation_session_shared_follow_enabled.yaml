    follow_mode_class: presenter_broadcast_follow
    focus_broadcast_posture_class: focus_broadcast_active
    audience_visibility_class: audience_sees_workspace_plus_agenda_rail
    presenter_bar_visibility_class: presenter_bar_hidden_audience_facing
    speaker_note_locality_class: speaker_notes_facilitator_only_local
    layout_anchor_kinds:
      - presenter_bar
      - agenda_or_waypoint_rail
      - spotlight_frame
  contract_sections:
    - "§1.3 presentation_session_record / presentation_layout_anchor_record"
    - "§7 presentation mode rules 1-5"
    - "§8 acceptance mapping (presentation mode with shared follow enabled)"

