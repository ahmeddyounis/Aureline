    presenter_broadcast_follow, focus_broadcast_posture_class =
    focus_broadcast_active, audience_visibility_class =
    audience_sees_workspace_plus_agenda_rail,
    presenter_bar_visibility_class =
    presenter_bar_hidden_audience_facing, speaker_note_locality_class
    = speaker_notes_facilitator_only_local. The follow_target_ref
    pins a follow_target_record on the collaboration follow schema
    and the presenter_state_ref pins a presenter_state_record;
    presentation-mode authority does not confer mutation. Three
    layout anchors land on canonical workspace surfaces (presenter
    bar on primary editor, agenda rail on docs pane, spotlight frame
    on primary editor). presentation_role_review and
    layout_restore_proof evidence hooks are reserved. Exercises §7
    rules 1, 2, 3, 4, 5 and the speaker_note_adjunct_preserves_
    command_identity invariant.
