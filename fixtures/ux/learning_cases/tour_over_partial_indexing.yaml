__fixture__:
  name: tour_over_partial_indexing
  scenario: >
    A learning-mode tour that runs while the workspace index is still
    partial. The guided_tour_record declares
    indexing_readiness_class = partial_index_disclosed; the waypoint
    discloses the partial index in its freshness chip
    (partial_index_disclosed_in_freshness_chip) so the user reads the
    partial-index state rather than mistaking the tour for live
    truth. Exercises §3 rule 5 (partial-index disclosure is explicit)
    and §5 evidence-hook reserve for cached_pack_continuity.
  exercised_axes:
    record_kinds:
      - guided_tour_record
      - tour_waypoint_record
    indexing_readiness_class: partial_index_disclosed
    partial_indexing_disclosure_class: partial_index_disclosed_in_freshness_chip
  contract_sections:
    - "§1.1 guided_tour_record / tour_waypoint_record"
    - "§3 rule 5 partial-index disclosure"
    - "§5 evidence hooks (cached_pack_continuity)"

