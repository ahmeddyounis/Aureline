# yaml-language-server: $schema=../../../schemas/ux/import_review.schema.json
__fixture__:
  name: import_review_portable_state_package_inspect_only
  scenario: >
    User picks Import a portable-state package from the Start Center
    Migration Center but only wants to inspect the package metadata.
    The import review emits one import_review_record with
    inspect_or_write_class = inspect_only_no_write,
    extraction_target_class = ephemeral_inspection_only,
    lossy_mapping_class = no_lossy_mapping,
    machine_local_exclusion_disclosure listing the secrets,
    live-handle, and machine-unique-handle exclusions the package
