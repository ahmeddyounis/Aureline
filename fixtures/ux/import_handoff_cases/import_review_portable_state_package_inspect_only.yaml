record_kind: import_review_record
import_review_schema_version: 1
import_review_id: import-review-portable-state-package-inspect-only-0001
entry_chooser_row_ref: entry-chooser-row-import-portable-state-package-0001
open_flow_sheet_ref: open-flow-sheet-import-artifact-portable-state-inspect-0001
artifact_descriptor_ref: artifact-descriptor-portable-state-package-signed-0001

artifact_class_disclosure:
  artifact_class: portable_state_package
  artifact_descriptor_ref: artifact-descriptor-portable-state-package-signed-0001
  artifact_family_label: "Aureline portable workspace package"
  summary: "First-party portable-state package. Schema-backed; bytes-readable behind redaction."

version_disclosure:
  schema_version_class: schema_version_match
  schema_version_label: "portable_state_package v1"
  producer_continuity_class: same_producer_compatible_build
  producer_label: "Aureline (this build family)"
  producer_build_label: "Aureline 0.1.0 (stable)"
  signature_state: signed_verified
  checksum_state: checksum_available
  summary: "Package was produced by a compatible Aureline build, signed, and checksum verified."

inspect_or_write_disclosure:
  inspect_or_write_class: inspect_only_no_write
  non_durable_label_visible: true
  durable_promotion_requires_review: true
  summary: "Inspect-only review. No bytes land in any temporary or durable location."

extraction_target_disclosure:
  extraction_target_class: ephemeral_inspection_only
  summary: "Package body is read into a process-scoped tmpfs that disappears on cancel or exit."

lossy_mapping_disclosure:
  lossy_mapping_class: no_lossy_mapping
  lossy_item_count_class: zero
  unsupported_item_review_required: false
  summary: "Schema versions match. No items will be dropped or migrated."

machine_local_exclusion_disclosure:
  exclusion_classes:
    - secret_material_excluded
    - live_handle_excluded
    - machine_unique_handle_excluded
    - display_affinity_excluded
  exclusion_count_label: "4 machine-local classes excluded"
  summary: "Package declared and excluded secrets, live handles, machine-unique handles, and display-affinity hints."

cleanup_posture_disclosure:
  cleanup_posture_class: cleanup_on_cancel
  cleanup_label: "Inspection memory is released on cancel or exit"
  summary: "No on-disk staging. Cancel discards the in-memory inspection."

raw_action_disclosure:
  raw_actions_offered:
    - open_raw_inspector
    - export_redacted_summary
    - cancel_no_change
    - reroute_to_compare_before_restore
  summary: "User can open the raw body for inspection, export a redacted summary, cancel, or reroute to compare-before-restore."

handoff_artifact_inspection_ref: handoff-artifact-inspection-portable-state-inspect-0001
post_entry_handoff_card_ref: post-entry-handoff-card-portable-state-inspect-only-0001

review_requirements:
  - no_review_required

trust_unchanged_until_admit: true
no_durable_write_before_review: true
no_state_rehydration_before_review: true
no_portability_claim_before_review: true

fallback_actions:
  - cancel_no_change
  - reopen_previous_workspace
  - return_to_start_center
  - inspect_only

next_step_decision_hooks:
  - compare_before_restore
  - review_migration_report
  - keep_imported_state

presentation_label: "Inspect portable-state package"
presentation_subtitle: "Inspection only. Nothing changes until you choose to apply."
minted_at: "mono:0000:00:00:00.0000"
