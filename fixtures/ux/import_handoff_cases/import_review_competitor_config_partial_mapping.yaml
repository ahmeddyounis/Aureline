__fixture__:
  name: import_review_competitor_config_partial_mapping
  scenario: >
    User picks Import a competitor config root from the Migration
    Center. The competitor mapping translated some items but not
    all; the unsupported items must be reviewed before any apply.
    The import review emits one import_review_record with
    artifact_class = competitor_config_root,
    inspect_or_write_class = write_to_labelled_extraction_staging,
    lossy_mapping_class = competitor_mapping_partial,
    cleanup_posture_class = retain_for_review, machine-local
    exclusions listed. The paired
    handoff_artifact_inspection_record is
    competitor_config_inspection with competitor_mapping_ref set.
    Demonstrates §3.2.5 lossy mapping (competitor branch), §4.2
    competitor inspection class, §4.5 rule 1 (inspection class
    binds to artifact class).
  record_kind_exercised: import_review_record
  doc_sections:
    - "§3.2.5 lossy_mapping_disclosure"
    - "§4.2 handoff_inspection_class (competitor_config_inspection)"
    - "§4.5 Acceptance rule 1"

