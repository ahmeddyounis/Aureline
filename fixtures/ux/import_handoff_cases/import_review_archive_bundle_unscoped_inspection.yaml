# yaml-language-server: $schema=../../../schemas/ux/import_review.schema.json
__fixture__:
  name: import_review_archive_bundle_unscoped_inspection
  scenario: >
    User drops an unscoped archive (a .tar.zst whose schema is not
    yet known to Aureline) on a project window. The drag-drop
    chooser routes to import; the import review emits one
    import_review_record with artifact_class =
    archive_bundle_unscoped, inspect_or_write_class =
    write_to_labelled_inspection_staging, extraction_target_class =
    labelled_inspection_staging, lossy_mapping_class =
    manual_review_required (Aureline cannot automatically classify
    the archive contents). The four "no implicit unpack" booleans
    are true. The paired
    handoff_artifact_inspection_record is
    archive_bundle_inspection with raw_body_inspectable = true.
    Demonstrates §3.5 rule 6 (temporary extraction labelled even
    under the hood), §4.2 archive_bundle_inspection class, §6 rule
    6 (drag-drop is a chooser surface).
  record_kind_exercised: import_review_record
  doc_sections:
    - "§3.5 Acceptance rule 6"
    - "§4.2 archive_bundle_inspection"
    - "§6 Cross-surface invariants (rule 6)"

record_kind: import_review_record
import_review_schema_version: 1
import_review_id: import-review-archive-bundle-unscoped-0001
entry_chooser_row_ref: entry-chooser-row-import-archive-drag-drop-0001
open_flow_sheet_ref: open-flow-sheet-import-artifact-archive-bundle-0001
artifact_descriptor_ref: artifact-descriptor-archive-bundle-unscoped-0001

artifact_class_disclosure:
  artifact_class: archive_bundle_unscoped
  artifact_descriptor_ref: artifact-descriptor-archive-bundle-unscoped-0001
  artifact_family_label: "Unscoped archive (.tar.zst)"
  summary: "Generic archive whose schema is not yet known to Aureline. Inspection-only by default."

version_disclosure:
  schema_version_class: schema_version_unknown
  schema_version_label: "(no declared schema)"
  producer_continuity_class: producer_unknown
  signature_state: unsigned
  checksum_state: unavailable_preflight
  summary: "Producer unknown. Schema undeclared. Signature and checksum unavailable until the user requests them."

inspect_or_write_disclosure:
  inspect_or_write_class: write_to_labelled_inspection_staging
  non_durable_label_visible: true
  durable_promotion_requires_review: true
  inspection_label: "Labelled archive inspection staging (non-durable)"
  summary: "Archive lands in labelled non-durable inspection staging. No items are applied."

extraction_target_disclosure:
  extraction_target_class: labelled_inspection_staging
  extraction_target_label: "~/Aureline/staging/archive-inspect-0001"
  summary: "Bytes land in labelled inspection staging."

lossy_mapping_disclosure:
  lossy_mapping_class: manual_review_required
  lossy_item_count_class: unknown_until_extract
  unsupported_item_review_required: true
  summary: "Archive contents must be reviewed manually; Aureline cannot translate without a declared schema."

machine_local_exclusion_disclosure:
  exclusion_classes:
    - no_exclusions
  summary: "No machine-local exclusions declared at the importer level. The user is responsible for archive contents on inspection."

cleanup_posture_disclosure:
  cleanup_posture_class: cleanup_on_cancel
  cleanup_label: "Archive staging removed on cancel or exit"
  summary: "Cancel or exit removes the inspection staging."

raw_action_disclosure:
  raw_actions_offered:
    - open_raw_inspector
    - reveal_in_filesystem
    - compare_against_active_workspace
    - cancel_no_change
    - discard_inspection
  summary: "User can inspect the archive body, reveal the staging, compare, cancel, or discard."

handoff_artifact_inspection_ref: handoff-artifact-inspection-archive-bundle-0001
post_entry_handoff_card_ref: post-entry-handoff-card-archive-bundle-review-0001

review_requirements:
  - migration_review_required
  - unsupported_item_review_required

trust_unchanged_until_admit: true
no_durable_write_before_review: true
no_state_rehydration_before_review: true
no_portability_claim_before_review: true

fallback_actions:
  - cancel_no_change
  - return_to_start_center
  - inspect_only
  - compare_before_restore

next_step_decision_hooks:
  - compare_before_restore
  - review_unsupported_items
  - review_migration_report

presentation_label: "Inspect archive bundle"
presentation_subtitle: "Schema undeclared. Inspection only; nothing is applied."
minted_at: "mono:0000:00:00:00.0000"
