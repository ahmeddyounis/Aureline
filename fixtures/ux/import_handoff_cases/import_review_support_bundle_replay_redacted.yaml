# yaml-language-server: $schema=../../../schemas/ux/import_review.schema.json
__fixture__:
  name: import_review_support_bundle_replay_redacted
  scenario: >
    Support engineer replays a redacted support bundle inside the
    Support Console. The import review emits one import_review_record
    with artifact_class = support_bundle_replay,
    inspect_or_write_class = write_to_labelled_inspection_staging,
    extraction_target_class = labelled_inspection_staging, machine-
    local exclusions naming the redaction posture, and raw actions
    offering open_raw_inspector and export_redacted_summary. The
    paired handoff_artifact_inspection_record is
    issue_or_support_packet_inspection with redaction_posture_class =
    support_redaction_applied and a support_redaction_policy_ref set.
    Demonstrates §4.5 rule 3 (support packets disclose redaction).
  record_kind_exercised: import_review_record
  doc_sections:
    - "§3 Import review record"
    - "§4 Handoff-artifact inspection record"
    - "§4.5 Acceptance rule 3"

record_kind: import_review_record
import_review_schema_version: 1
import_review_id: import-review-support-bundle-replay-0001
entry_chooser_row_ref: entry-chooser-row-import-support-bundle-0001
open_flow_sheet_ref: open-flow-sheet-import-artifact-support-bundle-0001
artifact_descriptor_ref: artifact-descriptor-support-bundle-redacted-0001

artifact_class_disclosure:
  artifact_class: support_bundle_replay
  artifact_descriptor_ref: artifact-descriptor-support-bundle-redacted-0001
  artifact_family_label: "Aureline support bundle (replay)"
  summary: "Support / issue replay packet. Default support redaction applied at producer."

version_disclosure:
  schema_version_class: schema_version_match
  schema_version_label: "support_bundle v1"
  producer_continuity_class: same_producer_compatible_build
  producer_label: "Aureline (this build family)"
  producer_build_label: "Aureline 0.1.0 (stable)"
  signature_state: signed_verified
  checksum_state: checksum_available
  summary: "Bundle was produced by a compatible Aureline build, signed, redacted at producer."

inspect_or_write_disclosure:
  inspect_or_write_class: write_to_labelled_inspection_staging
  non_durable_label_visible: true
  durable_promotion_requires_review: true
  inspection_label: "Labelled support inspection staging (non-durable)"
  summary: "Bundle body lands in labelled non-durable inspection staging. Replay never modifies the active workspace."

extraction_target_disclosure:
  extraction_target_class: labelled_inspection_staging
  extraction_target_label: "~/Aureline/staging/support-replay-0001"
  summary: "Bytes land in labelled support-replay inspection staging."

lossy_mapping_disclosure:
  lossy_mapping_class: no_lossy_mapping
  lossy_item_count_class: zero
  unsupported_item_review_required: false
  summary: "Replay reads metadata only; no items will be applied."

machine_local_exclusion_disclosure:
  exclusion_classes:
    - secret_material_excluded
    - live_handle_excluded
    - credential_store_only_excluded
    - absolute_path_excluded
  exclusion_count_label: "4 machine-local classes excluded"
  summary: "Bundle redaction excluded secrets, live handles, credential-store entries, and absolute paths."

cleanup_posture_disclosure:
  cleanup_posture_class: cleanup_on_cancel
  cleanup_label: "Inspection staging removed on cancel or exit"
  summary: "Cancel or exit removes the inspection staging."

raw_action_disclosure:
  raw_actions_offered:
    - open_raw_inspector
    - export_redacted_summary
    - export_inspection_bundle
    - reveal_in_filesystem
    - cancel_no_change
    - discard_inspection
  summary: "Support engineer can open the redacted body, export a redacted summary, export an inspection bundle, reveal the staging, cancel, or discard."

handoff_artifact_inspection_ref: handoff-artifact-inspection-support-bundle-0001
post_entry_handoff_card_ref: post-entry-handoff-card-support-bundle-replay-0001

review_requirements:
  - support_redaction_review_required

trust_unchanged_until_admit: true
no_durable_write_before_review: true
no_state_rehydration_before_review: true
no_portability_claim_before_review: true

fallback_actions:
  - cancel_no_change
  - return_to_start_center
  - inspect_only

next_step_decision_hooks:
  - review_unsupported_items
  - keep_imported_state
  - review_migration_report

presentation_label: "Replay support bundle (redacted)"
presentation_subtitle: "Replay never modifies the active workspace. Bundle redaction stays applied."
minted_at: "mono:0000:00:00:00.0000"
