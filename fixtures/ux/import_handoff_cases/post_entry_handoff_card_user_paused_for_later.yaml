record_kind: post_entry_handoff_card_record
post_entry_handoff_card_schema_version: 1
card_id: post-entry-handoff-card-portable-state-extract-0001
import_review_ref: import-review-portable-state-package-extract-0001
handoff_artifact_inspection_ref: handoff-artifact-inspection-portable-state-inspect-0001
handoff_card_status_class: user_paused_for_later

what_aureline_did_not_do_yet:
  not_yet_done_classes:
    - no_durable_write
    - no_state_rehydration
    - no_portability_claim
    - no_trust_grant
    - no_dependency_restore
    - no_extension_recommendation
    - no_hook_or_task_execution
    - no_profile_retarget
    - no_settings_overwrite
    - no_credential_admission
  summary: "Aureline did not write durable bytes, rehydrate state, claim portability, grant trust, restore dependencies, recommend extensions, execute hooks, retarget the active profile, overwrite settings, or admit credentials."

what_remains_blocked_or_optional:
  blocked_or_optional_classes:
    - migration_review_optional
    - trust_review_optional
    - destination_choice_optional
  summary: "Resume the import to choose a destination, review the migration report, and admit trust."

safest_next_action_disclosure:
  safest_next_action_class: set_up_later
  post_handoff_actions_offered:
    - set_up_later
    - inspect_only
    - compare_before_restore
    - keep_imported_state
    - discard_inspection
    - return_to_start_center
  summary: "Set up later is the resumable safe-next-action; inspect-only and compare keep the staging available without applying."

preserved_provenance_disclosure:
  artifact_class: portable_state_package
  provenance_label_class: first_party_signed
  provenance_label: "Aureline portable-state package, signed by Aureline release key"
  producer_label: "Aureline 0.0.9 (stable)"
  artifact_identity_label: "Aureline portable workspace package · first-party signed"
  exact_artifact_identity_preserved: true
  summary: "Artifact identity preserved verbatim for later support / export retrieval."

preserved_exclusions_disclosure:
  exclusion_classes:
    - secret_material_excluded
    - live_handle_excluded
    - machine_unique_handle_excluded
    - absolute_path_excluded
    - display_affinity_excluded
  exclusion_count_label: "5 machine-local classes excluded"
  summary: "Machine-local exclusions preserved verbatim for later support / export retrieval."

trust_unchanged_until_admit: true
no_durable_write_at_handoff: true
no_state_rehydration_at_handoff: true
no_portability_claim_at_handoff: true
later_support_or_export_retrieval_supported: true

fallback_actions:
  - cancel_no_change
  - reopen_previous_workspace
  - return_to_start_center
  - inspect_only
  - set_up_later

next_step_decision_hooks:
  - set_up_later
  - compare_before_restore
  - review_migration_report
  - keep_imported_state

presentation_label: "Import paused — pick up later"
presentation_subtitle: "Staging retained; nothing was admitted. Resume from the Migration Center to apply or discard."
summary: "Import paused for later. Staging retained until you resume, promote to durable, or discard. Trust unchanged; no rehydration; no portability claim."
minted_at: "mono:0000:00:00:00.0000"
