# yaml-language-server: $schema=../../../schemas/ux/post_entry_handoff_card.schema.json
__fixture__:
  name: post_entry_handoff_card_import_failed_pending_recovery
  scenario: >
    A handoff-packet apply failed mid-flight. The
    post_entry_handoff_card_record has handoff_card_status_class =
    import_failed_pending_recovery, safest next action
    roll_back_import, rollback_checkpoint_ref preserved, and the
    four "no implicit" booleans true. The card preserves the
    artifact identity and exclusions for later support retrieval.
    Demonstrates §5.4 rule 2 (failed imports route to roll-back).
  record_kind_exercised: post_entry_handoff_card_record
  doc_sections:
    - "§5 Post-entry handoff card"
    - "§5.4 Acceptance rule 2"

record_kind: post_entry_handoff_card_record
post_entry_handoff_card_schema_version: 1
card_id: post-entry-handoff-card-handoff-packet-compare-0001
import_review_ref: import-review-handoff-packet-compare-0001
handoff_artifact_inspection_ref: handoff-artifact-inspection-handoff-packet-0001
rollback_checkpoint_ref: rollback-checkpoint-pre-import-handoff-0001
handoff_card_status_class: import_failed_pending_recovery

what_aureline_did_not_do_yet:
  not_yet_done_classes:
    - no_durable_write
    - no_state_rehydration
    - no_portability_claim
    - no_trust_grant
    - no_dependency_restore
    - no_extension_recommendation
    - no_hook_or_task_execution
    - no_active_workspace_replacement
    - no_settings_overwrite
  summary: "The apply attempted state changes but failed mid-flight; nothing was committed. Trust, dependencies, extensions, hooks, the active workspace, and settings remain untouched."

what_remains_blocked_or_optional:
  blocked_or_optional_classes:
    - migration_review_blocked
    - rollback_checkpoint_review_blocked
    - unsupported_item_review_blocked
  summary: "Roll back the import to restore the active workspace from the pre-import checkpoint, then review the migration report and unsupported items before retrying."

safest_next_action_disclosure:
  safest_next_action_class: roll_back_import
  post_handoff_actions_offered:
    - roll_back_import
    - review_migration_report
    - review_unsupported_items
    - inspect_only
    - return_to_start_center
  summary: "Roll back to the pre-import checkpoint, review the migration report and unsupported items before retrying."

preserved_provenance_disclosure:
  artifact_class: handoff_packet
  provenance_label_class: first_party_signed
  provenance_label: "Peer Aureline environment, signed by peer release key"
  producer_label: "Aureline 0.0.9 (stable, peer environment)"
  artifact_identity_label: "Peer-environment handoff packet · first-party signed"
  exact_artifact_identity_preserved: true
  summary: "Artifact identity preserved verbatim. A later support retrieval can replay this card."

preserved_exclusions_disclosure:
  exclusion_classes:
    - secret_material_excluded
    - live_handle_excluded
    - machine_unique_handle_excluded
    - credential_store_only_excluded
  exclusion_count_label: "4 machine-local classes excluded"
  summary: "Machine-local exclusions preserved verbatim."

trust_unchanged_until_admit: true
no_durable_write_at_handoff: true
no_state_rehydration_at_handoff: true
no_portability_claim_at_handoff: true
later_support_or_export_retrieval_supported: true

fallback_actions:
  - cancel_no_change
  - reopen_previous_workspace
  - return_to_start_center
  - inspect_only
  - roll_back_import
  - review_migration_report

next_step_decision_hooks:
  - roll_back_import
  - review_migration_report
  - review_unsupported_items
  - keep_imported_state

presentation_label: "Import failed — roll back recommended"
presentation_subtitle: "Pre-import checkpoint retained. Roll back to restore; then review the report before retrying."
summary: "Import failed mid-flight. Trust unchanged, no durable write, no state rehydration, no portability claim. Roll back from the pre-import checkpoint."
minted_at: "mono:0000:00:00:00.0000"
