# yaml-language-server: $schema=../../../schemas/ux/embedded_boundary_card.schema.json
__fixture__:
  name: extension_hosted_cross_origin_limited_card
  scenario: >
    Extension-hosted webview that loaded a cross-origin subframe whose
    DOM and storage are hidden by the runtime. The card names the exact
    reduced capability rather than rendering a generic "limited" badge,
    keeps every action inside embedded-inspect-only or product-owned
    handoff, and offers a system-browser fallback.
  exercised_axes:
    surface_family: extension_hosted_surface
    boundary_state: cross_origin_limited
    permission_class: host_owned_inspect_only
    browser_fallback_posture_class: system_browser_first
    fallback_target_class: system_browser_handoff_packet
  contract_sections:
    - "Per-surface-family card rules / Extension-hosted surface"
    - "Boundary states and required degraded behavior"

record_kind: embedded_boundary_card_record
embedded_boundary_card_schema_version: 1
card_id: ux:card:embedded-boundary:extension-hosted:cross-origin-limited
surface_id_ref: ux:surface:embedded-boundary:extension-hosted:cross-origin-limited
surface_family: extension_hosted_surface
owner_identity:
  label: Acme Cloud extension panel
  class: extension_bundle
publisher_or_service_identity:
  label: Acme Cloud, Inc.
  class: extension_publisher
origin_identity:
  origin_class: cross_origin_subframe
  origin_label: extension://acme-cloud/index.html → https://status.acme.example
  verification_state: cross_origin_limited
  host_or_domain_label: status.acme.example
  origin_ref: id:origin:extension:acme-cloud:status-subframe
data_boundary_class: cross_origin_limited_boundary
data_boundary_label: >
  Cross-origin subframe inside the Acme Cloud extension panel.
boundary_state: cross_origin_limited
boundary_state_label: Cross-origin limited
plain_language_summary: >
  The extension panel can render the Acme status page, but Aureline
  cannot read its DOM or storage. Open in browser to see the full
  page; copy / inspect remains in-product.
permission_state:
  permission_class: host_owned_inspect_only
  permission_label: Host-owned inspect-only across the cross-origin subframe.
  host_native_step_up_required: false
  scope_narrowing_summary: >
    The subframe DOM, cookies, and storage are not accessible to the
    extension or the host shell.
action_partition:
  - action_id: open_in_system_browser
    partition_role: product_owned_handoff
    action_label: Open status page in browser
    renders_in_host_chrome: true
    preserves_object_identity: true
    browser_handoff_packet_ref: id:browser-handoff:extension:acme-status
  - action_id: reload_embedded_surface
    partition_role: embedded_inspect_only
    action_label: Reload extension panel
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: open_support_evidence
    partition_role: product_owned_handoff
    action_label: Show panel diagnostics
    renders_in_host_chrome: true
    preserves_object_identity: true
browser_fallback:
  posture_class: system_browser_first
  fallback_target_class: system_browser_handoff_packet
  summary_label: System browser is the safe path to read the full status page.
  browser_handoff_packet_ref: id:browser-handoff:extension:acme-status
  return_target_label: Aureline desktop / Extension panel
capability_limitations:
  - cross_origin_dom_or_storage_hidden
  - cookies_or_storage_outside_product_boundary
  - cannot_issue_native_approval
reserved_native_surfaces_host_owned:
  - product_security_messaging
  - update_verification
  - workspace_trust_elevation
  - rollback_or_restore_confirmation
  - ai_apply_review
  - high_risk_approval_sheet
layout_constraints:
  - card_visually_distinct_from_embedded_body
  - card_not_obscured_by_embedded_body
  - card_required_fields_never_hover_only
  - card_compact_layout_preserves_required_fields
  - card_actions_render_in_host_chrome
  - embedded_body_cannot_overlap_card_actions
  - card_remains_visible_when_embedded_body_is_withheld
chrome_inheritance_axes:
  - theme_palette_inherits_from_host
  - density_class_inherits_from_host
  - zoom_level_inherits_from_host
  - focus_ring_inherits_from_host
  - reduced_motion_posture_inherits_from_host
  - high_contrast_mode_inherits_from_host
  - forced_colors_mode_inherits_from_host
policy_context:
  identity_mode: account_free_local
  policy_epoch: epoch.extension.acme-cloud.0011
  trust_state: trusted
  execution_context_id: ctx:extension:acme-cloud-status
redaction_class: metadata_safe_default
minted_at: "2026-04-29T23:00:25Z"
