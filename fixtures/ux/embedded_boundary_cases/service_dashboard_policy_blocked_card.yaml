# yaml-language-server: $schema=../../../schemas/ux/embedded_boundary_card.schema.json
__fixture__:
  name: service_dashboard_policy_blocked_card
  scenario: >
    Hosted service dashboard whose embedded body is denied by a
    managed-workspace policy. The card stays visible with provider
    chrome, names the denied capability explicitly, offers
    inspect_policy_reason in host chrome, and routes recovery into a
    host-native review surface rather than rendering a weaker in-page
    substitute.
  exercised_axes:
    surface_family: embedded_service_dashboard
    boundary_state: policy_blocked
    permission_class: host_owned_browser_only
    browser_fallback_posture_class: external_open_blocked_by_policy
    fallback_target_class: host_native_review_or_approval
  contract_sections:
    - "Per-surface-family card rules / Embedded service dashboard"
    - "Boundary states and required degraded behavior"
    - "Browser-fallback posture"
    - "Reserved native surfaces and impersonation ban"

record_kind: embedded_boundary_card_record
embedded_boundary_card_schema_version: 1
card_id: ux:card:embedded-boundary:service-dashboard:policy-blocked
surface_id_ref: ux:surface:embedded-boundary:service-dashboard:policy-blocked
surface_family: embedded_service_dashboard
owner_identity:
  label: Payments dashboard
  class: customer_service_owner
publisher_or_service_identity:
  label: Acme Cloud
  class: customer_service
origin_identity:
  origin_class: customer_or_enterprise_hosted_web
  origin_label: https://console.acme.example/payments-prod
  verification_state: policy_blocked
  host_or_domain_label: console.acme.example
  origin_ref: id:origin:payments-dashboard:policy-blocked
data_boundary_class: customer_control_plane_boundary
data_boundary_label: >
  Hosted dashboard. Embedded render disabled by managed-workspace
  policy.
boundary_state: policy_blocked
boundary_state_label: Policy blocked (in-product render disabled)
plain_language_summary: >
  Managed policy prevents Aureline from rendering this dashboard
  in-product. The card preserves owner, origin, and provider scope and
  routes recovery into the host-native review surface so trust and
  rollback decisions stay product-owned.
permission_state:
  permission_class: host_owned_browser_only
  permission_label: Host-owned, browser handoff only.
  host_native_step_up_required: false
  scope_narrowing_summary: >
    Embedded body is withheld. Inspect policy reason and request a
    host-native review are the only paths.
action_partition:
  - action_id: inspect_policy_reason
    partition_role: product_owned_native
    action_label: Why is this dashboard blocked?
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: open_in_system_browser
    partition_role: product_owned_handoff
    action_label: Open dashboard in browser
    renders_in_host_chrome: true
    preserves_object_identity: true
    browser_handoff_packet_ref: id:browser-handoff:payments-dashboard:policy-blocked
  - action_id: open_support_evidence
    partition_role: product_owned_handoff
    action_label: Show policy evidence
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: continue_local_without_surface
    partition_role: product_owned_native
    action_label: Continue without dashboard
    renders_in_host_chrome: true
    preserves_object_identity: true
browser_fallback:
  posture_class: external_open_blocked_by_policy
  fallback_target_class: host_native_review_or_approval
  summary_label: >
    External open is denied by managed policy. Host-native review is
    the safe recovery path.
  policy_reason_label: >
    Managed-workspace policy disables embedded payments dashboards
    outside an approved review window.
  return_target_label: Aureline desktop / Service dashboard pane
capability_limitations:
  - cannot_issue_native_approval
  - cannot_perform_rollback_or_restore
  - cookies_or_storage_outside_product_boundary
  - cross_origin_dom_or_storage_hidden
reserved_native_surfaces_host_owned:
  - product_security_messaging
  - update_verification
  - workspace_trust_elevation
  - rollback_or_restore_confirmation
  - ai_apply_review
  - high_risk_approval_sheet
layout_constraints:
  - card_visually_distinct_from_embedded_body
  - card_not_obscured_by_embedded_body
  - card_required_fields_never_hover_only
  - card_compact_layout_preserves_required_fields
  - card_actions_render_in_host_chrome
  - embedded_body_cannot_overlap_card_actions
  - card_remains_visible_when_embedded_body_is_withheld
chrome_inheritance_axes:
  - theme_palette_inherits_from_host
  - density_class_inherits_from_host
  - zoom_level_inherits_from_host
  - focus_ring_inherits_from_host
  - reduced_motion_posture_inherits_from_host
  - high_contrast_mode_inherits_from_host
  - forced_colors_mode_inherits_from_host
provider_identity:
  provider_class: managed_admin_provider
  provider_label: Acme Cloud dashboard
  provider_scope_label: Cluster payments-prod
  provider_actor_class: delegated_user_token
  health_state: suspended
  connected_provider_record_id: id:provider:acme-cloud:payments-prod
  health_summary_label: >
    Embedded dashboard suspended by managed policy. Provider session
    remains valid for browser handoff.
policy_context:
  identity_mode: managed_workspace
  policy_epoch: epoch.service-dashboard.policy.0042
  trust_state: restricted
  execution_context_id: ctx:service-dashboard:payments-prod-policy-block
redaction_class: internal_support_restricted
minted_at: "2026-04-30T11:20:00Z"
