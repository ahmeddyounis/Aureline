__fixture__:
  name: service_dashboard_certificate_failed_card
  scenario: >
    Service dashboard whose origin failed certificate verification. The
    embedded body is withheld; the card stays visible with an
    inspect-certificate action and a host-native fallback target. No
    cached live affordance survives the failure.
  exercised_axes:
    surface_family: embedded_service_dashboard
    boundary_state: certificate_failed
    permission_class: host_owned_browser_only
    browser_fallback_posture_class: external_open_blocked_by_policy
    fallback_target_class: host_native_review_or_approval
    origin_verification_state: certificate_failed
  contract_sections:
    - "Per-surface-family card rules / Embedded service dashboard"
    - "Boundary states and required degraded behavior"
    - "Reserved native surfaces and impersonation ban"

record_kind: embedded_boundary_card_record
embedded_boundary_card_schema_version: 1
card_id: ux:card:embedded-boundary:service-dashboard:certificate-failed
surface_id_ref: ux:surface:embedded-boundary:service-dashboard:certificate-failed
surface_family: embedded_service_dashboard
owner_identity:
  label: Aureline service-dashboard adapter
  class: host_product
publisher_or_service_identity:
  label: payments-prod cluster dashboard
  class: connected_provider_service
origin_identity:
  origin_class: connected_provider_hosted_web
  origin_label: https://console.acme.example/payments-prod
