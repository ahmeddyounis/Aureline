  host_or_domain_label: console.acme.example
  origin_ref: id:origin:dashboard:acme-payments-prod
data_boundary_class: customer_control_plane_boundary
data_boundary_label: Customer control-plane dashboard (verification failed).
boundary_state: certificate_failed
boundary_state_label: Certificate verification failed
plain_language_summary: >
  Aureline cannot verify the dashboard's certificate, so the embedded
  body is withheld. Inspect the certificate or open the host-native
  review to decide what to do next.
permission_state:
  permission_class: host_owned_browser_only
  permission_label: Host-owned, browser-only after verification failure.
  host_native_step_up_required: false
  scope_narrowing_summary: >
    All embedded affordances are removed until the certificate is
    accepted by an admin or the trust path is repaired.
action_partition:
  - action_id: inspect_certificate_details
    partition_role: product_owned_native
    action_label: Inspect certificate
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: inspect_policy_reason
    partition_role: product_owned_native
    action_label: Why is this blocked?
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: open_support_evidence
    partition_role: product_owned_handoff
    action_label: Open support evidence
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: continue_local_without_surface
    partition_role: product_owned_native
    action_label: Continue without dashboard
    renders_in_host_chrome: true
    preserves_object_identity: true
browser_fallback:
  posture_class: external_open_blocked_by_policy
  fallback_target_class: host_native_review_or_approval
  summary_label: >
    External open is blocked until the certificate is accepted.
    Host-native trust review is the safe fallback.
  policy_reason_label: Untrusted certificate chain on console.acme.example.
  return_target_label: Aureline desktop / Service dashboards pane
