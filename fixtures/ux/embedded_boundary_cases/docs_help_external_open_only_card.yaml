# yaml-language-server: $schema=../../../schemas/ux/embedded_boundary_card.schema.json
__fixture__:
  name: docs_help_external_open_only_card
  scenario: >
    Embedded docs/help pane backing a curated knowledge pack that has
    been disabled by managed policy. The embedded body is gone; the
    card preserves owner / origin / publisher chrome plus the source-
    version-freshness truth, names the policy reason, and offers
    system-browser handoff with a host-native review fallback so the
    open-in-browser path stays attributable.
  exercised_axes:
    surface_family: embedded_docs_help
    boundary_state: external_open_only
    permission_class: no_permission_within_product
    browser_fallback_posture_class: system_browser_first
    fallback_target_class: system_browser_handoff_packet
    source_class: curated_knowledge_pack
    version_match_state: pre_release_unverified
    freshness_class: unverified
  contract_sections:
    - "Per-surface-family card rules / Embedded docs/help"
    - "Boundary states and required degraded behavior"
    - "Browser-fallback posture"

record_kind: embedded_boundary_card_record
embedded_boundary_card_schema_version: 1
card_id: ux:card:embedded-boundary:docs-help:external-open-only
surface_id_ref: ux:surface:embedded-boundary:docs-help:external-open-only
surface_family: embedded_docs_help
owner_identity:
  label: Aureline docs (curated knowledge pack)
  class: first_party_project
publisher_or_service_identity:
  label: Acme curated docs hub
  class: customer_service
origin_identity:
  origin_class: customer_or_enterprise_hosted_web
  origin_label: https://docs.acme.example/curated
  verification_state: policy_blocked
  host_or_domain_label: docs.acme.example
  origin_ref: id:origin:docs-help:acme-curated
data_boundary_class: customer_control_plane_boundary
data_boundary_label: >
  Curated knowledge pack hosted by Acme. In-product render is disabled
  by managed policy.
boundary_state: external_open_only
boundary_state_label: External open only (in-product render disabled)
plain_language_summary: >
  Aureline cannot render the curated knowledge pack in-product on this
  managed profile. Open the upstream docs in your browser, or request
  a host-native review to bring the pack inside the boundary.
permission_state:
  permission_class: no_permission_within_product
  permission_label: No in-product permission for this docs source.
  host_native_step_up_required: false
  scope_narrowing_summary: >
    The embedded body is withheld. Object identity, source class, and
    version intent are preserved on the card so a later browser or
    review handoff lands on the same docs target.
action_partition:
  - action_id: open_in_system_browser
    partition_role: product_owned_handoff
    action_label: Open curated docs in browser
    renders_in_host_chrome: true
    preserves_object_identity: true
    browser_handoff_packet_ref: id:browser-handoff:docs-help:acme-curated
  - action_id: inspect_policy_reason
    partition_role: product_owned_native
    action_label: Why is this pack disabled in-product?
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: open_support_evidence
    partition_role: product_owned_handoff
    action_label: Show docs handoff evidence
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: continue_local_without_surface
    partition_role: product_owned_native
    action_label: Continue without curated docs
    renders_in_host_chrome: true
    preserves_object_identity: true
browser_fallback:
  posture_class: system_browser_first
  fallback_target_class: system_browser_handoff_packet
  summary_label: >
    System browser is the primary path while the curated pack is
    policy-disabled in-product. Host-native review is the fallback for
    bringing the pack inside the boundary.
  browser_handoff_packet_ref: id:browser-handoff:docs-help:acme-curated
  policy_reason_label: >
    Managed-workspace policy disables embedded curated knowledge packs
    until a release-evidence review accepts the pack version.
  return_target_label: Aureline desktop / Docs pane
capability_limitations:
  - cannot_verify_updates_or_signatures
  - cannot_issue_native_approval
  - provider_scope_may_be_narrower_than_page_claims
  - cookies_or_storage_outside_product_boundary
reserved_native_surfaces_host_owned:
  - product_security_messaging
  - update_verification
  - workspace_trust_elevation
  - rollback_or_restore_confirmation
  - ai_apply_review
  - high_risk_approval_sheet
layout_constraints:
  - card_visually_distinct_from_embedded_body
  - card_not_obscured_by_embedded_body
  - card_required_fields_never_hover_only
  - card_compact_layout_preserves_required_fields
  - card_actions_render_in_host_chrome
  - embedded_body_cannot_overlap_card_actions
  - card_remains_visible_when_embedded_body_is_withheld
chrome_inheritance_axes:
  - theme_palette_inherits_from_host
  - density_class_inherits_from_host
  - zoom_level_inherits_from_host
  - focus_ring_inherits_from_host
  - reduced_motion_posture_inherits_from_host
  - high_contrast_mode_inherits_from_host
  - forced_colors_mode_inherits_from_host
source_truth:
  source_class: curated_knowledge_pack
  version_match_state: pre_release_unverified
  freshness_class: unverified
  running_build_identity_ref: id:build:aureline:running
  help_status_badge_ref: id:help-status-badge:docs-help:acme-curated
  snapshot_age_label: pack version pending review
policy_context:
  identity_mode: managed_workspace
  policy_epoch: epoch.docs-help.curated.0009
  trust_state: restricted
  execution_context_id: ctx:docs-help:acme-curated-policy-block
redaction_class: internal_support_restricted
minted_at: "2026-04-30T11:40:00Z"
