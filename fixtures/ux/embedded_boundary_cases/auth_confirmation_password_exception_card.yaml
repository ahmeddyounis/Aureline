# yaml-language-server: $schema=../../../schemas/ux/embedded_boundary_card.schema.json
__fixture__:
  name: auth_confirmation_password_exception_card
  scenario: >
    Auth confirmation card backed by an active embedded-password
    exception register row. The card carries the exception id, declares
    the lower-trust capability limitation, and keeps host-native
    step-up explicit so high-risk approvals never happen inside the
    embedded surface.
  exercised_axes:
    surface_family: embedded_auth_confirmation
    boundary_state: live_verified
    permission_class: embedded_lower_trust_password_exception
    auth_flow_class: embedded_password_exception
    browser_fallback_posture_class: device_code_fallback_offered
    fallback_target_class: device_code_companion_card
  contract_sections:
    - "Per-surface-family card rules / Embedded auth confirmation"
    - "Permission state"
    - "Reserved native surfaces and impersonation ban"

record_kind: embedded_boundary_card_record
embedded_boundary_card_schema_version: 1
card_id: ux:card:embedded-boundary:auth-confirmation:password-exception
surface_id_ref: ux:surface:embedded-boundary:auth-confirmation:password-exception
surface_family: embedded_auth_confirmation
owner_identity:
  label: Aureline auth handoff (exception lane)
  class: host_product
publisher_or_service_identity:
  label: Legacy enterprise SSO
  class: identity_provider
origin_identity:
  origin_class: customer_or_enterprise_hosted_web
  origin_label: https://sso.legacy-enterprise.example
  verification_state: verified
  host_or_domain_label: sso.legacy-enterprise.example
  origin_ref: id:origin:auth:legacy-enterprise-sso
data_boundary_class: connected_provider_boundary
data_boundary_label: >
  Embedded password exception lane (lower trust).
boundary_state: live_verified
boundary_state_label: Live verified, lower-trust exception lane
plain_language_summary: >
  Legacy SSO does not support a system-browser or device-code path, so
  Aureline collects a password under an active exception. Native
  approval is still required for any high-risk action that follows.
permission_state:
  permission_class: embedded_lower_trust_password_exception
  permission_label: Embedded lower-trust password exception (review owner on file).
  host_native_step_up_required: true
  exception_id_ref: id:auth-exception:legacy-enterprise:0001
  scope_narrowing_summary: >
    Session-refresh only. No scope widening. Native approval gates
    every high-risk action.
action_partition:
  - action_id: view_auth_exception_record
    partition_role: product_owned_native
    action_label: View exception record
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: switch_to_device_code
    partition_role: product_owned_handoff
    action_label: Use device code if available
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: open_in_system_browser
    partition_role: product_owned_handoff
    action_label: Try system browser
    renders_in_host_chrome: true
    preserves_object_identity: true
    browser_handoff_packet_ref: id:browser-handoff:auth:legacy-enterprise
  - action_id: open_support_evidence
    partition_role: product_owned_handoff
    action_label: Show exception evidence
    renders_in_host_chrome: true
    preserves_object_identity: true
browser_fallback:
  posture_class: device_code_fallback_offered
  fallback_target_class: device_code_companion_card
  summary_label: >
    Device-code is offered as the auditable fallback when the legacy
    SSO browser path is unavailable.
  device_code_ref: id:device-code:legacy-enterprise:0001
  return_target_label: Aureline desktop / Auth handoff sheet
capability_limitations:
  - embedded_auth_lower_trust
  - cannot_issue_native_approval
  - cannot_raise_workspace_trust
  - cannot_apply_ai_changes
reserved_native_surfaces_host_owned:
  - product_security_messaging
  - update_verification
  - workspace_trust_elevation
  - rollback_or_restore_confirmation
  - ai_apply_review
  - high_risk_approval_sheet
layout_constraints:
  - card_visually_distinct_from_embedded_body
  - card_not_obscured_by_embedded_body
  - card_required_fields_never_hover_only
  - card_compact_layout_preserves_required_fields
  - card_actions_render_in_host_chrome
  - embedded_body_cannot_overlap_card_actions
  - card_remains_visible_when_embedded_body_is_withheld
chrome_inheritance_axes:
  - theme_palette_inherits_from_host
  - density_class_inherits_from_host
  - zoom_level_inherits_from_host
  - focus_ring_inherits_from_host
  - reduced_motion_posture_inherits_from_host
  - high_contrast_mode_inherits_from_host
  - forced_colors_mode_inherits_from_host
auth_handoff:
  flow_class: embedded_password_exception
  provider_domain_label: sso.legacy-enterprise.example
  reason_label: >
    Legacy SSO does not support browser or device-code flows; password
    entry is allowed only under the active exception.
  return_target_label: Aureline desktop / Auth handoff sheet
  local_continuity_note: >
    Your workspace stays read-only until native approval succeeds.
  exception_id_ref: id:auth-exception:legacy-enterprise:0001
policy_context:
  identity_mode: managed_workspace
  policy_epoch: epoch.auth.exception.legacy-enterprise.0003
  trust_state: restricted
  execution_context_id: ctx:auth:legacy-enterprise-exception
redaction_class: internal_support_restricted
minted_at: "2026-04-29T22:59:40Z"
