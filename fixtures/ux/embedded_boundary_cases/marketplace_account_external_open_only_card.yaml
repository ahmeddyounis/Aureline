__fixture__:
  name: marketplace_account_external_open_only_card
  scenario: >
    Marketplace/account surface narrowed to external-open-only. The
    embedded body is gone; the card preserves owner / origin / publisher
    chrome and offers a device-code companion path for managed-policy
    profiles where browser launch is blocked.
  exercised_axes:
    surface_family: embedded_marketplace_or_account
    boundary_state: external_open_only
    permission_class: no_permission_within_product
    browser_fallback_posture_class: device_code_fallback_offered
    fallback_target_class: device_code_companion_card
  contract_sections:
    - "Boundary states and required degraded behavior"
    - "Browser-fallback posture"
    - "Audit and export rules"

record_kind: embedded_boundary_card_record
embedded_boundary_card_schema_version: 1
card_id: ux:card:embedded-boundary:marketplace-account:external-open-only
surface_id_ref: ux:surface:embedded-boundary:marketplace-account:external-open-only
surface_family: embedded_marketplace_or_account
owner_identity:
  label: Aureline marketplace adapter
  class: host_product
publisher_or_service_identity:
