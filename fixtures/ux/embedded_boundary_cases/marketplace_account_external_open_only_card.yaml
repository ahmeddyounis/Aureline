  permission_label: No in-product permission; external-only.
  host_native_step_up_required: false
  scope_narrowing_summary: >
    No embedded body. Device-code companion preserves object identity
    on the handoff.
action_partition:
  - action_id: switch_to_device_code
    partition_role: product_owned_handoff
    action_label: Open device-code companion
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: copy_device_code
    partition_role: product_owned_handoff
    action_label: Copy device code
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: inspect_policy_reason
    partition_role: product_owned_native
    action_label: Why is in-product disabled?
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: continue_local_without_surface
    partition_role: product_owned_native
    action_label: Continue without marketplace
    renders_in_host_chrome: true
    preserves_object_identity: true
browser_fallback:
