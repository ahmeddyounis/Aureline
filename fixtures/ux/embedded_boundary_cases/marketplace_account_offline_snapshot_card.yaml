# yaml-language-server: $schema=../../../schemas/ux/embedded_boundary_card.schema.json
__fixture__:
  name: marketplace_account_offline_snapshot_card
  scenario: >
    Marketplace/account surface degraded to an offline snapshot. Network
    is unavailable so the embedded body renders as a snapshot-aged view;
    live-mutation claims are removed, browser-fallback posture says
    external open is unavailable while offline, and the action partition
    keeps account-link and billing actions outside the embedded body.
  exercised_axes:
    surface_family: embedded_marketplace_or_account
    boundary_state: offline_snapshot
    permission_class: host_owned_inspect_only
    browser_fallback_posture_class: external_open_unavailable_offline
    fallback_target_class: local_inspect_or_export
  contract_sections:
    - "Per-surface-family card rules / Embedded marketplace / account"
    - "Boundary states and required degraded behavior"
    - "Permission state"

record_kind: embedded_boundary_card_record
embedded_boundary_card_schema_version: 1
card_id: ux:card:embedded-boundary:marketplace-account:offline-snapshot
surface_id_ref: ux:surface:embedded-boundary:marketplace-account:offline-snapshot
surface_family: embedded_marketplace_or_account
owner_identity:
  label: Aureline marketplace adapter
  class: host_product
publisher_or_service_identity:
  label: Acme Cloud account
  class: connected_provider_service
origin_identity:
  origin_class: connected_provider_hosted_web
  origin_label: https://accounts.acme.example
  verification_state: offline_cached
  host_or_domain_label: accounts.acme.example
  origin_ref: id:origin:marketplace:acme-account
data_boundary_class: connected_provider_boundary
data_boundary_label: Provider account surface (offline-cached snapshot).
boundary_state: offline_snapshot
boundary_state_label: Offline snapshot (24 minutes old)
plain_language_summary: >
  Last-known-good Acme Cloud account snapshot. Live mutation is
  unavailable while the network is down. Inspect and copy stay
  in-product; account-link and billing actions wait for a live session.
permission_state:
  permission_class: host_owned_inspect_only
  permission_label: Host-owned inspect-only while offline.
  host_native_step_up_required: false
  scope_narrowing_summary: >
    Account-link, billing, and policy mutations are gated until the
    live session is restored.
action_partition:
  - action_id: reload_embedded_surface
    partition_role: embedded_inspect_only
    action_label: Retry connection
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: open_support_evidence
    partition_role: product_owned_handoff
    action_label: Show offline diagnostics
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: continue_local_without_surface
    partition_role: product_owned_native
    action_label: Continue local-only without account
    renders_in_host_chrome: true
    preserves_object_identity: true
browser_fallback:
  posture_class: external_open_unavailable_offline
  fallback_target_class: local_inspect_or_export
  summary_label: >
    External open is unavailable while offline. Local inspect / export
    is the safe fallback.
  return_target_label: Aureline desktop / Marketplace pane
capability_limitations:
  - live_network_mutation_disabled_when_offline
  - provider_scope_may_be_narrower_than_page_claims
  - cookies_or_storage_outside_product_boundary
reserved_native_surfaces_host_owned:
  - product_security_messaging
  - update_verification
  - workspace_trust_elevation
  - rollback_or_restore_confirmation
  - ai_apply_review
  - high_risk_approval_sheet
layout_constraints:
  - card_visually_distinct_from_embedded_body
  - card_not_obscured_by_embedded_body
  - card_required_fields_never_hover_only
  - card_compact_layout_preserves_required_fields
  - card_actions_render_in_host_chrome
  - embedded_body_cannot_overlap_card_actions
  - card_remains_visible_when_embedded_body_is_withheld
chrome_inheritance_axes:
  - theme_palette_inherits_from_host
  - density_class_inherits_from_host
  - zoom_level_inherits_from_host
  - focus_ring_inherits_from_host
  - reduced_motion_posture_inherits_from_host
  - high_contrast_mode_inherits_from_host
  - forced_colors_mode_inherits_from_host
provider_identity:
  provider_class: managed_admin_provider
  provider_label: Acme Cloud account
  provider_scope_label: org:acme/customer:example, project:payments
  provider_actor_class: delegated_user_token
  health_state: degraded
  connected_provider_record_id: id:provider:acme:account-record
  health_summary_label: Offline snapshot, last live 24 minutes ago.
policy_context:
  identity_mode: self_hosted_org
  policy_epoch: epoch.marketplace.acme.0014
  trust_state: trusted
  execution_context_id: ctx:marketplace:acme-account
redaction_class: metadata_safe_default
minted_at: "2026-04-29T22:56:30Z"
