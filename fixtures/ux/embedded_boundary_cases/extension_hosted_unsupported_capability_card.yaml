# yaml-language-server: $schema=../../../schemas/ux/embedded_boundary_card.schema.json
__fixture__:
  name: extension_hosted_unsupported_capability_card
  scenario: >
    Extension-hosted webview that wants to mutate workspace trust from
    inside its embedded body. The capability is unsupported because
    trust elevation is a native-reserved surface. The card names the
    exact missing capability rather than a generic "limited" badge,
    keeps every action partitioned as embedded_inspect_only or
    product_owned_handoff, and routes the request through host-native
    review.
  exercised_axes:
    surface_family: extension_hosted_surface
    boundary_state: cross_origin_limited
    permission_class: host_owned_inspect_only
    browser_fallback_posture_class: system_browser_first
    fallback_target_class: host_native_review_or_approval
  contract_sections:
    - "Per-surface-family card rules / Extension-hosted surface"
    - "Permission state"
    - "Reserved native surfaces and impersonation ban"
    - "Browser-fallback posture"

record_kind: embedded_boundary_card_record
embedded_boundary_card_schema_version: 1
card_id: ux:card:embedded-boundary:extension-hosted:unsupported-capability
surface_id_ref: ux:surface:embedded-boundary:extension-hosted:unsupported-capability
surface_family: extension_hosted_surface
owner_identity:
  label: Acme Cloud trust panel (extension)
  class: extension_bundle
publisher_or_service_identity:
  label: Acme Cloud, Inc.
  class: extension_publisher
origin_identity:
  origin_class: extension_publisher_hosted_web
  origin_label: extension://acme-cloud/trust-panel.html
  verification_state: cross_origin_limited
  host_or_domain_label: extension://acme-cloud
  origin_ref: id:origin:extension:acme-cloud:trust-panel
data_boundary_class: extension_publisher_boundary
data_boundary_label: >
  Extension-hosted webview surface. Trust mutation is a host-native
  surface and is not delegable.
boundary_state: cross_origin_limited
boundary_state_label: Cross-origin limited (trust elevation unsupported)
plain_language_summary: >
  This extension panel can summarize workspace trust state but cannot
  raise it. Trust elevation is a host-native surface; use the host
  review path to change trust.
permission_state:
  permission_class: host_owned_inspect_only
  permission_label: >
    Host-owned inspect-only across the extension panel.
  host_native_step_up_required: false
  scope_narrowing_summary: >
    The extension may read summaries through the host shell but never
    mutates workspace trust, update verification, rollback, or
    AI-apply state.
action_partition:
  - action_id: reload_embedded_surface
    partition_role: embedded_inspect_only
    action_label: Refresh trust summary
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: inspect_policy_reason
    partition_role: product_owned_native
    action_label: Why can't this panel raise trust?
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: open_in_system_browser
    partition_role: product_owned_handoff
    action_label: Open trust review in browser
    renders_in_host_chrome: true
    preserves_object_identity: true
    browser_handoff_packet_ref: id:browser-handoff:extension:acme-cloud-trust
  - action_id: open_support_evidence
    partition_role: product_owned_handoff
    action_label: Show extension panel diagnostics
    renders_in_host_chrome: true
    preserves_object_identity: true
browser_fallback:
  posture_class: system_browser_first
  fallback_target_class: host_native_review_or_approval
  summary_label: >
    Trust elevation is host-native. The browser handoff is offered
    only for the read-only review path; the mutation itself stays in
    the host review surface.
  browser_handoff_packet_ref: id:browser-handoff:extension:acme-cloud-trust
  return_target_label: Aureline desktop / Trust review surface
capability_limitations:
  - cannot_raise_workspace_trust
  - cannot_issue_native_approval
  - cross_origin_dom_or_storage_hidden
  - cookies_or_storage_outside_product_boundary
reserved_native_surfaces_host_owned:
  - product_security_messaging
  - update_verification
  - workspace_trust_elevation
  - rollback_or_restore_confirmation
  - ai_apply_review
  - high_risk_approval_sheet
layout_constraints:
  - card_visually_distinct_from_embedded_body
  - card_not_obscured_by_embedded_body
  - card_required_fields_never_hover_only
  - card_compact_layout_preserves_required_fields
  - card_actions_render_in_host_chrome
  - embedded_body_cannot_overlap_card_actions
  - card_remains_visible_when_embedded_body_is_withheld
chrome_inheritance_axes:
  - theme_palette_inherits_from_host
  - density_class_inherits_from_host
  - zoom_level_inherits_from_host
  - focus_ring_inherits_from_host
  - reduced_motion_posture_inherits_from_host
  - high_contrast_mode_inherits_from_host
  - forced_colors_mode_inherits_from_host
policy_context:
  identity_mode: managed_workspace
  policy_epoch: epoch.extension.acme-cloud.0023
  trust_state: restricted
  execution_context_id: ctx:extension:acme-cloud-trust-panel
redaction_class: metadata_safe_default
minted_at: "2026-04-30T11:30:00Z"
