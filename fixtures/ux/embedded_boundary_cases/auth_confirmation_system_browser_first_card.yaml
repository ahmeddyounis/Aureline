__fixture__:
  name: auth_confirmation_system_browser_first_card
  scenario: >
    Auth confirmation card using the system browser as the primary
    handoff target. No credentials are collected inside the embedded
    surface. Device-code is named as the auditable fallback if the
    browser path becomes unavailable later.
  exercised_axes:
    surface_family: embedded_auth_confirmation
    boundary_state: live_verified
    permission_class: host_owned_with_native_step_up_required
    auth_flow_class: system_browser
    browser_fallback_posture_class: system_browser_first
    fallback_target_class: system_browser_handoff_packet
  contract_sections:
    - "Per-surface-family card rules / Embedded auth confirmation"
    - "Browser-fallback posture"
    - "Action partition"

record_kind: embedded_boundary_card_record
embedded_boundary_card_schema_version: 1
card_id: ux:card:embedded-boundary:auth-confirmation:system-browser-first
surface_id_ref: ux:surface:embedded-boundary:auth-confirmation:system-browser-first
surface_family: embedded_auth_confirmation
owner_identity:
  label: Aureline auth handoff
  class: host_product
publisher_or_service_identity:
  label: GitHub identity provider
  class: identity_provider
origin_identity:
  origin_class: system_browser_return
  origin_label: System browser → Aureline desktop
  verification_state: verified
  host_or_domain_label: github.com
  origin_ref: id:origin:auth:github-system-browser
data_boundary_class: connected_provider_boundary
data_boundary_label: System browser session, returned to Aureline desktop.
boundary_state: live_verified
boundary_state_label: Live verified
plain_language_summary: >
  Sign in opens in your system browser. Aureline waits for the return
  packet; nothing is typed inside this card. Device-code is the
  auditable fallback if the browser cannot return.
permission_state:
  permission_class: host_owned_with_native_step_up_required
  permission_label: >
    Host-owned with native step-up gating any high-risk approval that
    follows.
  host_native_step_up_required: true
  scope_narrowing_summary: >
    The card never collects passwords. Approval, trust, and apply
    surfaces remain host-native after sign-in.
action_partition:
  - action_id: open_in_system_browser
    partition_role: product_owned_handoff
    action_label: Sign in with system browser
    renders_in_host_chrome: true
    preserves_object_identity: true
    browser_handoff_packet_ref: id:browser-handoff:auth:github
  - action_id: switch_to_device_code
    partition_role: product_owned_handoff
    action_label: Use device code instead
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: retry_auth_handoff
    partition_role: product_owned_native
    action_label: Retry sign-in
    renders_in_host_chrome: true
    preserves_object_identity: true
  - action_id: open_support_evidence
    partition_role: product_owned_handoff
    action_label: Show handoff evidence
    renders_in_host_chrome: true
    preserves_object_identity: true
browser_fallback:
  posture_class: system_browser_first
  fallback_target_class: system_browser_handoff_packet
  summary_label: System browser is the primary sign-in path.
  browser_handoff_packet_ref: id:browser-handoff:auth:github
  return_target_label: Aureline desktop / Auth handoff sheet
capability_limitations: []
reserved_native_surfaces_host_owned:
  - product_security_messaging
  - update_verification
  - workspace_trust_elevation
  - rollback_or_restore_confirmation
  - ai_apply_review
  - high_risk_approval_sheet
layout_constraints:
  - card_visually_distinct_from_embedded_body
  - card_not_obscured_by_embedded_body
  - card_required_fields_never_hover_only
  - card_compact_layout_preserves_required_fields
  - card_actions_render_in_host_chrome
  - embedded_body_cannot_overlap_card_actions
  - card_remains_visible_when_embedded_body_is_withheld
chrome_inheritance_axes:
  - theme_palette_inherits_from_host
  - density_class_inherits_from_host
  - zoom_level_inherits_from_host
  - focus_ring_inherits_from_host
  - reduced_motion_posture_inherits_from_host
  - high_contrast_mode_inherits_from_host
  - forced_colors_mode_inherits_from_host
auth_handoff:
  flow_class: system_browser
  provider_domain_label: github.com
  reason_label: Sign in with your GitHub account in the system browser.
  return_target_label: Aureline desktop / Auth handoff sheet
  local_continuity_note: Your local workspace stays open while you sign in.
policy_context:
  identity_mode: account_free_local
  policy_epoch: epoch.auth.handoff.0007
  trust_state: trusted
  execution_context_id: ctx:auth:github-handoff
redaction_class: metadata_safe_default
