# Route-warning quiet-hours break.
#
# Reviewer-side fixture for
# artifacts/ux/quiet_hours_override_matrix.yaml row
# ux:quiet-hours-override:route_warning_break:01.
__fixture__:
  name: route_warning_quiet_hours_break
  scenario: >
    A provider handoff route becomes unsafe (provider grant
    narrowed, basis snapshot drifted) while the user is in
    mode_presentation. The override row breaks the hold at
    tier_blocking_trust, renders an in-product contextual banner
    plus an attention item, suppresses the OS notification surface
    by audience-visibility rule, and denies reopen until the user
    re-enters the provider grant review canvas. mode_privacy_mode
    and mode_admin_suppression are forbidden.
  override_row_ref: quiet_hours_override_matrix#ux:quiet-hours-override:route_warning_break:01
  contract_sections:
    - "Override rows §route_warning_break"
  exercised_axes:
    override_event_class: route_warning_break
    override_scope_class: active_provider_handoff_session
    allowed_break_target_tier: tier_blocking_trust
    escalation_reason: provider_grant_narrowed
    privacy_payload_class: lock_screen_safe_scoped

audit_binding:
  canonical_event_id: ux:event:provider-handoff:route-warning:session-3:01
  event_lineage_id_ref: ux:lineage:provider-handoff:route-warning:session-3:01
  canonical_object_target_ref: obj:provider-grant:session-3
  source_subsystem: provider_bearing
  actor_identity_ref: id:actor:system:provider-grant-resolver

quiet_hours_state_at_decision:
  active_modes:
    - mode_presentation
  forbidden_for_this_break:
    - mode_privacy_mode
    - mode_admin_suppression

break_proof:
  record_kind: notification_suppression_record
  suppression_record_id: ux:suppression:provider-route-warning:session-3:break
  intended_delivery_surface_class: contextual_banner
  intended_privacy_payload_class: lock_screen_safe_scoped
  intended_interruptibility_tier: tier_blocking_trust
  suppression_class: held_presentation_mode
  suppression_outcome: released_on_escalation
  active_quiet_hours_modes_at_decision:
    - mode_presentation
  release_step:
    release_trigger_class: escalation_to_critical_safety
    released_to_delivery_surface_class: attention_item
    released_with_privacy_payload_class: in_product_only
  preserved_durable_linkback:
    kind: review_sheet
    target_identity_ref: obj:provider-grant-review:session-3:01
    is_durable: true
    preserves_canonical_event_id: true
    preserves_canonical_object_identity: true

escalation_proof:
  record_kind: escalation_step_record
  escalation_reason: provider_grant_narrowed
  escalated_from_tier: tier_durable
  escalated_to_tier: tier_blocking_trust

bypass_protection_proof:
  record_kind: bypass_protection_block
  must_route_through_review_sheet: true
  review_sheet_ref: obj:provider-grant-review:session-3:01
  must_route_through_approval_workflow: false
  approval_workflow_ref: null
  requires_revalidation: true
  revalidation_reason_label: >
    Provider grant narrowed; reopen denies until the user re-enters
    the provider grant review canvas.
  interaction_safety_packet_id_ref: ux:interaction-safety-packet:provider-route-warning:session-3:01

privacy_redaction_proof:
  record_kind: privacy_redaction_block
  applied_payload_class: lock_screen_safe_scoped
  redacted_summary_label: >
    Provider route changed in {workspace_label}
  redaction_template_tokens:
    - "{category}"
    - "{workspace_label}"
    - "{session_label}"
    - "{severity_class}"
  stripped_label_kinds:
    - raw_url
    - raw_provider_payload
    - object_identity_on_lock_screen
  lock_screen_safe: true
  companion_safe: true
  system_notification_safe: true

evidence_preservation_proof:
  preserves_durable_history: true
  preserves_critical_safety_tier: true
  required_evidence_kinds_recorded:
    - lineage_escalation_recorded
    - suppression_record_release_recorded
    - lineage_reopen_recorded
    - audit_trail_record_ref_present
  retained_record_refs:
    - schemas/ux/notification_suppression_record.schema.json#suppression_record
    - schemas/ux/event_lineage.schema.json#event_lineage_record

badge_proof:
  badge_class_review_row_ref: ux:badge-review:security_notices
  record_kind: badge_record
  badge_class: security_notices
  count_delta: 1
  count_basis: deduped_durable_item

reviewer_checks:
  - id: tier_target_blocking_trust
    description: >
      The break resolves to tier_blocking_trust; the active
      workflow cannot continue safely without the interruption.
    pass: true
  - id: typed_escalation_reason
    description: >
      provider_grant_narrowed is recorded on the lineage step.
    pass: true
  - id: revalidation_required_on_reopen
    description: >
      bypass_protection.requires_revalidation is true; reopen
      denies with reopen_denied_requires_revalidation until the
      user re-enters the provider grant review canvas.
    pass: true
  - id: presentation_mode_audience_safe
    description: >
      The OS notification surface is suppressed under
      mode_presentation; the break renders only on the contextual
      banner plus attention item where the audience does not see
      privileged details.
    pass: true

denial_reasons_avoided:
  - quiet_hours_hold_discarded_durable_history
  - quiet_hours_hold_discarded_critical_safety_tier
  - admin_suppression_blocked_critical_safety
  - escalation_reason_missing_on_tier_change
  - privacy_payload_class_widened_across_clients
  - override_justification_generic
