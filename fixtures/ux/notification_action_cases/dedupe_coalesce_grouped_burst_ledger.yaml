__fixture__:
  name: dedupe_coalesce_grouped_burst_ledger
  scenario: >
    Repeated failures from the same root cause coalesce into one grouped
    burst rather than minting surface-local duplicates. The ledger entry
    records a coalesced disposition and carries the grouped-burst id that
    the delivery merged into.
  contract_sections:
    - "Suppression history stays separate from audit history"
    - "Repeated failures coalesce, not duplicate"
  exercised_axes:
    suppression_disposition_class: coalesced
    suppression_reason: dedupe_same_grouped_burst

