__fixture__:
  name: withheld_lock_screen_policy_ledger
  scenario: >
    A lock-screen summary delivery is withheld under privacy mode. The
    suppression ledger records the withheld disposition and preserves a
    durable linkback so the user can reopen into the authoritative surface
    after unlocking, without implying the underlying event vanished.
  contract_sections:
    - "Action grammar §2.7 reopen without shortcut replay"
    - "OS notifications and lock-screen privacy"
    - "Suppression history is not deletion"
  exercised_axes:
    suppression_disposition_class: withheld
    suppression_reason: privacy_mode_active
    delay_until_condition_class: lock_screen_unlock

