# Reopen-with-pending-restore placeholder truth seed.
#
# Companion to docs/ux/entry_restore_truth_audit.md §6.2 and the
# copy-review row ux:startup-state:reopen_with_pending_restore in
# artifacts/ux/startup_state_copy_review.yaml.
#
# Scenario: Shell restarted with a restore_prompt_record pending
# user decision. No pane claims the session is restored yet; the
# advertised restore level rides on the prompt verbatim.
__fixture__:
  name: reopen_with_pending_restore
  startup_state: startup_state:reopen_with_pending_restore
  doc_section: docs/ux/entry_restore_truth_audit.md#6.2
  copy_review_row: ux:startup-state:reopen_with_pending_restore
  scenario: >
    User reopens Aureline after a planned restart. The shell
    emits a restore_prompt_record advertising compatible_restore
    (one extension was updated across the restart); terminal
    panes are marked transcript_restored_not_rerun; a task pane
    is marked rerun_required. No surface claims the session is
    restored before the user commits compare_before_restore /
    open_without_restore / safe_mode.
  exercised_axes:
    entry_verbs_candidate: [restore, open]
    target_kinds_candidate: [workspace_manifest]
    restore_level_advertised: compatible_restore
    restore_level_committed_yet: false
    missing_target_states_exercised:
