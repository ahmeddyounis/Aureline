# Dependency-missing preserve-layout seed.
#
# The key assertion: missing dependencies replace only the affected pane
# with a placeholder and preserve the original pane role + surrounding
# layout; they do not silently delete or relocate panes.
__fixture__:
  name: dependency_missing_preserves_layout
  scenario: >
    On reopen, a required extension/feature pack for one pane is not
    available. Restore preserves the overall pane tree and replaces only
    the contributed surface with a placeholder in the same slot, keeping
    the pane role and stable pane id. Restore surfaces clearly disclose
    that fidelity is layout-only and provide install/locate and
    open-without actions rather than collapsing the layout.
  contract_refs:
    - docs/ux/restore_placeholder_and_recenter_matrix.md
    - docs/workspace/layout_serialization_contract.md#5
    - docs/state/restore_provenance_and_placeholder_contract.md
  exercised_axes:
    topology_change_classes: [dependency_missing, app_reopen]
    restore_fidelity_floor: layout_only
    owner_dialog_recenter: false
    live_surface_no_rerun: false
    dependency_placeholders: true

record_kind: restore_topology_case_record
restore_topology_case_schema_version: 1
case_id: restore-topology:dependency-missing-preserves-layout

topology_change:
  topology_change_classes:
