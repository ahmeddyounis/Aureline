__fixture__:
  name: display_detach_safe_bounds_remap
  scenario: >
    A secondary window was last known on an external display that is not
    connected on reopen. Restore remaps the window into reachable bounds
    on the remaining display, recenters an owned dialog with its owner,
    and records the adjustment in restore history and per-window
    provenance. A terminal pane inside the window restores as
    transcript/evidence-only (no PTY rerun) with explicit no-rerun
    guardrails.
  contract_refs:
    - docs/ux/restore_placeholder_and_recenter_matrix.md
    - docs/ux/window_display_contract.md#4
    - docs/workspace/layout_serialization_contract.md#4
    - docs/workspace/layout_serialization_contract.md#5
  exercised_axes:
    topology_change_classes: [display_removed, safe_bounds_changed]
    restore_fidelity_floor: compatible_restore
    owner_dialog_recenter: true
    live_surface_no_rerun: true
    dependency_placeholders: false

