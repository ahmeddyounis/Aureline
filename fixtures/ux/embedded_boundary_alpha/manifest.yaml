schema_version: 1
manifest_id: fixtures.ux.embedded_boundary_alpha
description: >
  Protected alpha fixtures for host-rendered embedded-surface boundary chrome.
  The shell consumes these cards to prove docs/help, extension webview, and
  marketplace/account surfaces disclose owner, origin, scope, network state,
  service boundary, safe browser fallback, and host-owned high-risk approvals.
card_fixtures:
  - path: fixtures/ux/embedded_surfaces/docs_help_boundary_contract_card.json
    surface_family: embedded_docs_help
    exercised_axes:
      - owner_origin_source_freshness
      - system_browser_handoff
      - high_risk_approval_host_owned
  - path: fixtures/ux/embedded_boundary_alpha/extension_webview_alpha_card.json
    surface_family: extension_hosted_surface
    exercised_axes:
      - owner_origin_scope_network_service_boundary
      - cross_origin_limited
      - system_browser_handoff
      - high_risk_approval_host_owned
  - path: fixtures/ux/embedded_boundary_alpha/marketplace_account_alpha_card.json
    surface_family: embedded_marketplace_or_account
    exercised_axes:
      - owner_origin_profile_account_scope_network_service_boundary
      - stale_provider_session
      - system_browser_handoff
      - high_risk_approval_host_owned
runtime_consumer:
  rust_module: crates/aureline-shell/src/embedded/boundary_alpha.rs
  native_handoff_module: crates/aureline-shell/src/deeplink/native_handoff.rs
  snapshot_record_kind: embedded_boundary_alpha_snapshot_record
  native_handoff_packet_record_kind: native_boundary_handoff_packet_record
  evidence_logs:
    - .logs/recovery/embedded_boundary_alpha_latest.json
    - .logs/recovery/native_boundary_handoff_latest.json
native_handoff_fixtures:
  deep_link_intents:
    - fixtures/platform/exact_target_reopen_cases/local_file_open_admitted_exact.yaml
    - fixtures/platform/exact_target_reopen_cases/workspace_open_missing_target_denied.yaml
    - fixtures/platform/exact_target_reopen_cases/review_handoff_admitted_exact.yaml
    - fixtures/platform/exact_target_reopen_cases/auth_callback_replay_denied_consumed.yaml
  generated_runtime_cases:
    - system_open_workspace_exact
    - dock_taskbar_jump_action_workspace_exact
    - privileged_protocol_command_requires_product_review
  native_file_affordances:
    - fixtures/platform/native_file_affordance_cases/local_file_native_open_dialog_binds_identity.yaml
    - fixtures/platform/native_file_affordance_cases/generated_artifact_native_save_dialog_routes_through_write_review.yaml
    - fixtures/platform/native_file_affordance_cases/removable_volume_missing_target_opens_placeholder_recovery.yaml
required_assertions:
  - embedded surfaces never mint native trust, rollback, update, or AI-apply approvals
  - open-in-browser handoff is host-owned and preserves object identity when offered
  - policy, network, cross-origin, or stale states stay visible as boundary chrome
  - protocol handlers, browser callbacks, recents, dialogs, reveal, and file associations name owner, channel, target, command class, and recovery before execution
