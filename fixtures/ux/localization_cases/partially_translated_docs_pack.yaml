__fixture__:
  name: partially_translated_docs_pack
  scenario: >
    A docs surface is rendered for a user who requested pt-BR. The
    installed pt-BR docs pack covers docs_tour_or_auth_text fully but
    only partially covers glossary_or_terminology_term. The shell
    walks the fallback chain pt-BR -> pt -> en-US, fills the missing
    glossary entries from the en-US pack, and emits this
    locale_fallback_state_record so the reviewer can tell which
    strings came from pt-BR vs the en-US base. The inline source
    language toggle and the docs-pane source-language route remain
    available; command identity does not apply (this is a docs body
    surface, not a command label).
    Exercises §1.3, §5 fallback chain, §7 origin classes
    (requested_locale_partial_with_base_fill), §7 disclosure rule, and
    invariant 5 (fallback_chain_is_disclosed_to_reviewer).
  exercised_axes:
    surface_family: docs_tour_or_auth_text
    fallback_origin_class: requested_locale_partial_with_base_fill
    degraded_localization_state: partial_translation_disclosed
  contract_sections:
    - "§1.3 locale_fallback_state_record"
    - "§5 base_locale_fallback_chain"
    - "§7 fallback origin classes"
    - "§8 invariants (5)"

