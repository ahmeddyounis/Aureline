  scenario: >
    A safety-critical recovery banner is shown for a session whose
    requested locale is fr-CA. The fr-CA pack is not installed on
    this device, so the chain walks fr-CA -> fr -> en-US and renders
    the banner in en-US. Because the banner is
    policy_legal_or_recovery_text, the surface MUST keep
