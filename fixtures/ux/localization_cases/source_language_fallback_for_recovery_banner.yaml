    governed pane rather than relying on translation. The banner
    teaches a recovery command, so the canonical command_id is pinned
    and command_id_preservation_state =
    command_id_unchanged_across_fallback. The banner discloses the
    fallback to the reviewer.
    Exercises §6 policy/legal/recovery rules, §7 source-language
    fallback origin, §7 command-id preservation rule, and invariants
    5 / 6 / 7.
