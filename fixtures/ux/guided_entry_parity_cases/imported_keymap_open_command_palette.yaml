# Imported-keymap parity case. A legacy IDE keymap import binds the
# legacy "open command palette" chord to cmd:command_palette.open
# through keymap_bridge:legacy_ide_alpha:open_command_palette:01.
# A contextual tip and the migration bridge card both resolve to
# the same canonical command and the same keymap bridge record.
__fixture__:
  name: imported_keymap_open_command_palette
  case_category: imported_keymap
  scenario: >
    The user imports a legacy IDE keymap that bound a familiar
    chord to "Show all commands". The keybinding resolver maps the
    chord through keymap_bridge:legacy_ide_alpha:open_command_palette:01
    to cmd:command_palette.open. The contextual tip near the chord
    invocation cites the same bridge ref and canonical command id
    as the migration bridge card. The current shortcut display
    mirrors the resolved binding. No surface invents a parallel
    "Show all commands" alias outside the registry.

