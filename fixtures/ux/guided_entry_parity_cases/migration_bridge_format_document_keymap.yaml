# Migration bridge case for an imported format-document chord that
# is shimmed because legacy macro flags are not portable. The bridge
# card cites the canonical formatter command and the same
# keybinding_resolver bridge ref the contextual tip uses; no
# surface mints a parallel formatter id.
__fixture__:
  name: migration_bridge_format_document_keymap
  case_category: migration_bridge
  scenario: >
    A migrated keybinding invokes Format document. The binding is
    shimmed because the legacy macro applied provider-specific
    flags Aureline cannot preserve outside supported format
    providers. The migration bridge card explains the imported
    behavior, links to docs:anchor:migration:keymap_format_document,
    and resolves to cmd:format.document. The contextual tip near
    the chord invocation cites the same bridge ref. The why-
    unavailable explainer covers the unsupported-flags edge.

