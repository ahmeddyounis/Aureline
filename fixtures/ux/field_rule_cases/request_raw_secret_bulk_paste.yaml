# yaml-language-server: $schema=../../../schemas/ux/field_rule.schema.json
schema_version: 1
record_kind: field_rule_record
field_rule_id: field_rule:request.auth_raw_bearer:001
field_rule_class: raw_secret_input
risk_class: raw_secret_exposure
surface_families:
  - request_workspace
  - support_export
field_display_class: structured_fragment
value_shape_classes:
  - raw_secret_literal
field_label: Authorization header
value_representation:
  storage_class: literal_session_entry
  display_redaction_class: masked_value
  raw_value_allowed_at_rest: false
  raw_value_allowed_in_export: false
  copy_posture: copy_disabled
  value_ref: session_secret_input:request.auth:001
  summary: Raw bearer text is admitted only long enough to convert to a broker handle or deny persistence.
review_affordances:
  - storage_mode_label
  - reveal_friction
  - unsafe_warning
  - redaction_preview
evaluation_context:
  context_required_before_apply: false
  unsafe_when_missing_context: false
  resolver_actor_class: request_runtime
  execution_location_class: request_runtime
  resolution_time_class: review_time
  basis_fields:
    - request_environment
    - policy_epoch
  context_summary: The request runtime can classify the header without sending the request.
validation_hooks:
  - validation_class: local_syntax
    validation_timing_class: sync_non_mutating
    required_for_apply: true
    stale_behavior: not_applicable
    hook_summary: Header shape is parsed locally without contacting the endpoint.
  - validation_class: secret_resolution
    validation_timing_class: sync_non_mutating
    required_for_apply: true
    stale_behavior: block_until_current
    hook_summary: Raw bearer text must be converted to a handle before the request can be saved.
  - validation_class: policy
    validation_timing_class: sync_non_mutating
    required_for_apply: true
    stale_behavior: block_until_current
    hook_summary: Policy may forbid raw bearer admission in committed request files.
unsafe_value_warnings:
  - raw_secret_literal_detected
  - plaintext_export_attempt
  - bulk_paste_requires_review
export_policy:
  default_export_class: excluded
  elevated_export_class: none
  never_export_raw_secret: true
  downgrade_requires_class_change: true
  included_metadata:
    - field_rule_class
    - field_label
    - storage_mode
    - risk_class
    - redaction_report
    - omitted_value_reason
  export_summary: Support export records that a raw bearer value was observed and omitted.
multi_value_policy:
  supports_bulk_paste: true
  supports_drag_drop: false
  duplicate_handling: reject_duplicates
  lossy_normalization_policy: block
  relative_path_basis_policy: not_applicable
  multi_value_summary: Bulk paste is parsed for secret candidates and blocks until each candidate is converted or discarded.
unsafe_value_review:
  required_before_apply: true
  review_surface_class: full_sheet
  scope_authority_fields:
    - actor
    - target
    - credential_scope
    - policy_source
  review_summary: Review explains why raw header text cannot persist and offers handle conversion.
narrative_refs:
  - docs/ux/field_rules_contract.md
  - docs/api/request_workspace_contract.md
  - docs/ux/forms_validation_contract.md
emitted_at: "2026-04-27T10:01:00Z"
__fixture__:
  name: request_raw_secret_bulk_paste
  scenario: A request workspace detects bearer material during bulk paste and blocks saving until it is converted to a handle.
  exercised_axes:
    - raw_secret_denial
    - bulk_paste_requires_review
    - excluded_support_export
