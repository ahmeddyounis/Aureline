schema_version: 1
contract_ref: docs/ux/field_rules_contract.md
schema_ref: schemas/ux/field_rule.schema.json
risk_matrix_ref: artifacts/ux/field_risk_classes.yaml
cases:
  - file: settings_secret_handle_export.yaml
    field_rule_class: secret_handle_field
    surface_family: settings_form
    exercises:
      - handle_ref_only_export
      - reveal_friction
      - no_plaintext_downgrade
  - file: request_raw_secret_bulk_paste.yaml
    field_rule_class: raw_secret_input
    surface_family: request_workspace
    exercises:
      - raw_secret_denial
      - bulk_paste_requires_review
      - excluded_support_export
  - file: repair_relative_path_drop.yaml
    field_rule_class: filesystem_path_ref
    surface_family: repair_flow
    exercises:
      - relative_path_basis
      - drag_drop_target_disclosure
      - path_alias_warning
  - file: transport_uri_endpoint_retarget.yaml
    field_rule_class: uri_endpoint
    surface_family: network_transport_form
    exercises:
      - endpoint_retarget_warning
      - route_policy_context
      - endpoint_summary_export
  - file: notebook_code_expression_review.yaml
    field_rule_class: code_backed_expression
    surface_family: notebook_kernel
    exercises:
      - evaluator_context_required
      - preview_before_apply
      - lossy_normalization_warning
  - file: package_command_template_review.yaml
    field_rule_class: command_template
    surface_family: package_manager_auth
    exercises:
      - shell_interpolation_warning
      - dry_run_preview
      - environment_context
  - file: request_environment_ref_shadowing.yaml
    field_rule_class: environment_ref
    surface_family: request_workspace
    exercises:
      - layer_precedence_visible
      - env_ref_shadowing_warning
      - duplicate_handling
  - file: transport_certificate_ref.yaml
    field_rule_class: certificate_ref
    surface_family: network_transport_form
    exercises:
      - fingerprint_export
      - certificate_expiry_warning
      - policy_source_visible
  - file: provider_resource_duplicate_normalization.yaml
    field_rule_class: provider_resource_identifier
    surface_family: request_workspace
    exercises:
      - duplicate_handling
      - lossy_normalization_warning
      - stable_id_path_required
