# yaml-language-server: $schema=../../../schemas/ux/field_rule.schema.json
schema_version: 1
record_kind: field_rule_record
field_rule_id: field_rule:notebook.assertion_expr:001
field_rule_class: code_backed_expression
risk_class: evaluated_code
surface_families:
  - notebook_kernel
  - support_export
field_display_class: structured_fragment
value_shape_classes:
  - code_fragment
field_label: Cell output assertion
value_representation:
  storage_class: expression_source_ref
  display_redaction_class: redacted_summary
  raw_value_allowed_at_rest: true
  raw_value_allowed_in_export: false
  copy_posture: copy_literal_with_review
  value_ref: expression_source:notebook.assertion:001
  summary: Expression source is versioned by ref and reviewed before running against a kernel.
review_affordances:
  - preview_diff
  - dry_run_preview
  - raw_source_inspection
  - scope_authority_disclosure
  - unsafe_warning
  - lossy_normalization_warning
evaluation_context:
  context_required_before_apply: true
  unsafe_when_missing_context: true
  resolver_actor_class: notebook_kernel
  execution_location_class: notebook_kernel_runtime
  resolution_time_class: run_time
  basis_fields:
    - kernel_identity
    - current_working_directory
    - environment_layer
    - policy_epoch
  context_summary: The expression evaluates in the selected kernel with its working directory and environment.
validation_hooks:
  - validation_class: local_syntax
    validation_timing_class: sync_non_mutating
    required_for_apply: true
    stale_behavior: not_applicable
    hook_summary: Expression syntax is parsed without executing user code.
  - validation_class: schema
    validation_timing_class: sync_non_mutating
    required_for_apply: true
    stale_behavior: block_until_current
    hook_summary: The assertion shape must match the notebook output schema.
  - validation_class: dry_run
    validation_timing_class: dry_run_non_mutating
    required_for_apply: true
    stale_behavior: block_until_current
    hook_summary: Dry run evaluates against captured metadata before live kernel execution is enabled.
unsafe_value_warnings:
  - code_evaluates_with_workspace_authority
  - bulk_paste_requires_review
  - lossy_normalization_detected
export_policy:
  default_export_class: redacted_summary
  elevated_export_class: explicit_user_review
  never_export_raw_secret: false
  downgrade_requires_class_change: false
  included_metadata:
    - field_rule_class
    - field_label
    - evaluation_context
    - risk_class
    - redaction_report
    - omitted_value_reason
    - normalization_report
  export_summary: Support export includes expression ref, evaluator class, and redaction report, not raw source by default.
multi_value_policy:
  supports_bulk_paste: true
  supports_drag_drop: false
  duplicate_handling: preserve_order_with_duplicate_warning
  lossy_normalization_policy: warn_and_preserve_raw_ref
  relative_path_basis_policy: not_applicable
  multi_value_summary: Multiple pasted expressions preserve order and warn if canonical formatting changes source text.
unsafe_value_review:
  required_before_apply: true
  review_surface_class: full_sheet
  scope_authority_fields:
    - actor
    - target
    - workspace_root
    - execution_location
    - policy_source
  review_summary: Review shows evaluator, kernel, environment, and preview result before live run.
narrative_refs:
  - docs/ux/field_rules_contract.md
  - docs/notebooks/notebook_collaboration_contract.md
  - docs/ux/forms_validation_contract.md
emitted_at: "2026-04-27T10:03:00Z"
__fixture__:
  name: notebook_code_expression_review
  scenario: A notebook assertion expression declares kernel evaluation context and dry-run review before live execution.
  exercised_axes:
    - evaluator_context_required
    - preview_before_apply
    - lossy_normalization_warning
