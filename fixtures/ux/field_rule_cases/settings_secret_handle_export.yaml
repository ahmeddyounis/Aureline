# yaml-language-server: $schema=../../../schemas/ux/field_rule.schema.json
schema_version: 1
record_kind: field_rule_record
field_rule_id: field_rule:settings.ai_provider_token:001
field_rule_class: secret_handle_field
risk_class: secret_bearing
surface_families:
  - settings_form
  - support_export
field_display_class: single_value
value_shape_classes:
  - secret_handle_ref
field_label: AI provider token
value_representation:
  storage_class: handle_ref_only
  display_redaction_class: secret_handle_only
  raw_value_allowed_at_rest: false
  raw_value_allowed_in_export: false
  copy_posture: copy_handle_alias
  value_ref: secret_handle:ai_provider:primary
  summary: Token is represented by a broker handle and never by raw secret bytes.
review_affordances:
  - storage_mode_label
  - reveal_friction
  - scope_authority_disclosure
  - redaction_preview
evaluation_context:
  context_required_before_apply: false
  unsafe_when_missing_context: false
  resolver_actor_class: desktop_client
  execution_location_class: local_client
  resolution_time_class: deferred_until_use
  basis_fields:
    - active_profile
    - policy_epoch
  context_summary: Broker projection happens only when the provider adapter requests the handle under policy.
validation_hooks:
  - validation_class: secret_resolution
    validation_timing_class: sync_non_mutating
    required_for_apply: true
    stale_behavior: block_until_current
    hook_summary: The broker handle must exist and match the expected secret class before saving the setting.
  - validation_class: policy
    validation_timing_class: sync_non_mutating
    required_for_apply: true
    stale_behavior: block_until_current
    hook_summary: Managed policy may narrow which provider adapter can use the handle.
unsafe_value_warnings:
  - plaintext_export_attempt
  - policy_narrows_authority
export_policy:
  default_export_class: handle_ref_only
  elevated_export_class: none
  never_export_raw_secret: true
  downgrade_requires_class_change: true
  included_metadata:
    - field_rule_class
    - field_label
    - storage_mode
    - risk_class
    - redaction_report
    - omitted_value_reason
    - authority_scope
  export_summary: Settings and support exports include handle type and omission reason only.
multi_value_policy:
  supports_bulk_paste: false
  supports_drag_drop: false
  duplicate_handling: not_applicable
  lossy_normalization_policy: not_applicable
  relative_path_basis_policy: not_applicable
  multi_value_summary: This token field accepts one handle reference.
unsafe_value_review:
  required_before_apply: true
  review_surface_class: side_sheet
  scope_authority_fields:
    - actor
    - credential_scope
    - policy_source
  review_summary: Review shows storage mode, consumer scope, and reveal policy before apply.
narrative_refs:
  - docs/ux/field_rules_contract.md
  - docs/adr/0007-secret-broker-credential-handle-trust-store-redaction.md
  - artifacts/security/secret_classes.yaml
emitted_at: "2026-04-27T10:00:00Z"
__fixture__:
  name: settings_secret_handle_export
  scenario: A settings form stores an AI provider token as a broker handle and exports only handle metadata.
  exercised_axes:
    - handle_ref_only_export
    - no_plaintext_downgrade
    - reveal_friction
