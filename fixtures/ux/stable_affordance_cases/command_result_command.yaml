# yaml-language-server: $schema=../../../schemas/ux/stable_affordance_row.schema.json
$schema: ../../../schemas/ux/stable_affordance_row.schema.json
__fixture__:
  name: command_result_command
  scenario: >
    A command-backed result card exposes contract-grade follow-up
    affordances so users can share stable ids instead of screenshots:
    copy command id, copy CLI equivalent, open schema/docs, and open a
    support packet path. Migration check is not applicable and degrades
    explicitly rather than disappearing.
  exercised_axes:
    surface_class: command_result
    subject_kind: command
    copy_cli_equivalent: available
    open_schema_docs: available
    open_support_packet: available
  contract_sections:
    - "Stable affordance slots"
    - "Explicit degradation (fallback behavior)"
record_kind: stable_affordance_row_record
stable_affordance_schema_version: 1
row_id: ux:stable_affordance_case:command_result:command:01
surface_class: command_result
subject_kind: command
subject_ref: cmd:workspace.open_folder
projection_surfaces:
  - desktop_ui
  - cli_headless
  - docs_help
  - support_export
fallback_contract_ref: docs/ux/stable_affordance_mapping_contract.md#explicit-degradation-fallback-behavior
affordances:
  copy_command_id:
    slot_class: copy_command_id
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: command_id
        ref_id: cmd:workspace.open_folder
    disabled_reason_summary: null
  copy_cli_equivalent:
    slot_class: copy_cli_equivalent
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: canonical_verb
        ref_id: workspace.open_folder
    disabled_reason_summary: null
  open_schema_docs:
    slot_class: open_schema_docs
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: docs_ref
        ref_id: docs/commands/invocation_result_and_parity_contract.md
      - ref_kind: schema_ref
        ref_id: schemas/commands/result_packet.schema.json
    disabled_reason_summary: null
  run_migration_check:
    slot_class: run_migration_check
    availability_class: disabled_not_applicable
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: contract_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
    disabled_reason_summary: Migration checks are not applicable to this command result subject.
  open_support_packet:
    slot_class: open_support_packet
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: support_packet_ref
        ref_id: support_center_card:support_bundle
      - ref_kind: schema_ref
        ref_id: schemas/support/support_bundle.schema.json
    disabled_reason_summary: null
  copy_issue_or_advisory_ref:
    slot_class: copy_issue_or_advisory_ref
    availability_class: disabled_missing_mapping
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: contract_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
    disabled_reason_summary: No stable issue/advisory ref is associated with this command result subject.
redaction_class: metadata_safe_default
notes: >
  Copy and open affordances quote stable ids and schema refs; raw output and
  ephemeral widget ids do not cross this boundary.
minted_at: "2026-05-06T00:00:00Z"

