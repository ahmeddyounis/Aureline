    command id for the inspection route, open schema/docs for the governing
    policy model, and an explicit support packet path.
  exercised_axes:
    surface_class: policy_denial
    copy_command_id: available
    open_support_packet: available
  contract_sections:
    - "Explicit degradation (fallback behavior)"
