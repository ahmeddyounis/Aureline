  exercised_axes:
    surface_class: diagnostic_finding
    copy_issue_or_advisory_ref: available
    open_support_packet: available
  contract_sections:
    - "Stable affordance slots"
    - "Cross-surface stability invariants"
record_kind: stable_affordance_row_record
stable_affordance_schema_version: 1
