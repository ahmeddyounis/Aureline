# yaml-language-server: $schema=../../../schemas/ux/stable_affordance_row.schema.json
$schema: ../../../schemas/ux/stable_affordance_row.schema.json
__fixture__:
  name: command_result_ui_only_command
  scenario: >
    A UI-only command result still exposes a stable command id and docs/schema
    pivots, but the CLI-equivalent slot is present and disabled explicitly so
    users are not misled into assuming hidden headless support exists.
  exercised_axes:
    surface_class: command_result
    subject_kind: command
    copy_cli_equivalent: disabled_not_applicable
  contract_sections:
    - "Stable affordance slots"
    - "Explicit degradation (fallback behavior)"
record_kind: stable_affordance_row_record
stable_affordance_schema_version: 1
row_id: ux:stable_affordance_case:command_result:ui_only_command:01
surface_class: command_result
subject_kind: command
subject_ref: cmd:ui.show_welcome_tour
projection_surfaces:
  - desktop_ui
  - docs_help
  - support_export
fallback_contract_ref: docs/ux/stable_affordance_mapping_contract.md#explicit-degradation-fallback-behavior
affordances:
  copy_command_id:
    slot_class: copy_command_id
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: command_id
        ref_id: cmd:ui.show_welcome_tour
    disabled_reason_summary: null
  copy_cli_equivalent:
    slot_class: copy_cli_equivalent
    availability_class: disabled_not_applicable
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: docs_ref
        ref_id: docs/commands/shareability_and_automation_contract.md
    disabled_reason_summary: This command is UI-only and has no CLI/headless equivalent.
  open_schema_docs:
    slot_class: open_schema_docs
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: docs_ref
        ref_id: docs/commands/shareability_and_automation_contract.md
      - ref_kind: schema_ref
        ref_id: schemas/commands/shareability_metadata.schema.json
    disabled_reason_summary: null
  run_migration_check:
    slot_class: run_migration_check
    availability_class: disabled_not_applicable
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: contract_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
    disabled_reason_summary: Migration checks are not applicable to UI-only command subjects.
  open_support_packet:
    slot_class: open_support_packet
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: support_packet_ref
        ref_id: support_center_card:support_bundle
    disabled_reason_summary: null
  copy_issue_or_advisory_ref:
    slot_class: copy_issue_or_advisory_ref
    availability_class: disabled_missing_mapping
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: contract_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
    disabled_reason_summary: No stable issue/advisory ref is associated with this UI-only command subject.
redaction_class: metadata_safe_default
notes: >
  The CLI-equivalent slot stays visible but disabled; silent omission would be
  misleading and non-conforming.
minted_at: "2026-05-06T00:00:00Z"

