# yaml-language-server: $schema=../../../schemas/ux/stable_affordance_row.schema.json
$schema: ../../../schemas/ux/stable_affordance_row.schema.json
__fixture__:
  name: support_center_card_advisory
  scenario: >
    A Support Center card tied to an advisory exposes a copyable stable advisory
    reference and a support packet route, plus schema/docs pivots. Command and
    CLI slots are present and explicitly disabled because they are not
    applicable to this subject.
  exercised_axes:
    surface_class: support_center_card
    copy_issue_or_advisory_ref: available
    open_support_packet: available
  contract_sections:
    - "Stable affordance slots"
    - "Cross-surface stability invariants"
record_kind: stable_affordance_row_record
stable_affordance_schema_version: 1
row_id: ux:stable_affordance_case:support_center_card:advisory:01
surface_class: support_center_card
subject_kind: issue_or_advisory
subject_ref: advisory:aureline:deprecation:settings_schema_v1:01
projection_surfaces:
  - support_center
  - desktop_ui
  - cli_headless
  - docs_help
  - support_export
fallback_contract_ref: docs/ux/stable_affordance_mapping_contract.md#explicit-degradation-fallback-behavior
affordances:
  copy_command_id:
    slot_class: copy_command_id
    availability_class: disabled_not_applicable
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: contract_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
    disabled_reason_summary: This Support Center advisory subject is not command-backed; no command id is available to copy.
  copy_cli_equivalent:
    slot_class: copy_cli_equivalent
    availability_class: disabled_not_applicable
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: contract_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
    disabled_reason_summary: CLI equivalence is not applicable to this Support Center advisory subject.
  open_schema_docs:
    slot_class: open_schema_docs
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: docs_ref
        ref_id: docs/support/support_center_information_architecture.md
      - ref_kind: schema_ref
        ref_id: schemas/support/support_center_capability_card.schema.json
    disabled_reason_summary: null
  run_migration_check:
    slot_class: run_migration_check
    availability_class: disabled_not_applicable
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: contract_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
    disabled_reason_summary: Migration checks are not applicable to this Support Center advisory subject.
  open_support_packet:
    slot_class: open_support_packet
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: support_packet_ref
        ref_id: support_center_card:support_bundle
      - ref_kind: schema_ref
        ref_id: schemas/support/support_bundle.schema.json
    disabled_reason_summary: null
  copy_issue_or_advisory_ref:
    slot_class: copy_issue_or_advisory_ref
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: advisory_ref
        ref_id: advisory:aureline:deprecation:settings_schema_v1:01
    disabled_reason_summary: null
redaction_class: metadata_safe_default
notes: >
  Support Center cards are explicitly referenceable: copyable advisory refs and
  contract-pivot affordances prevent screenshot-driven support loops.
minted_at: "2026-05-06T00:00:00Z"

