# yaml-language-server: $schema=../../../schemas/ux/stable_affordance_row.schema.json
$schema: ../../../schemas/ux/stable_affordance_row.schema.json
__fixture__:
  name: deprecation_notice_migration_check
  scenario: >
    A deprecation notice provides contract-grade follow-up affordances: open the
    governing schema/docs, run a migration check that lands on a machine-readable
    report, open the support packet path, and copy the stable advisory ref that
    support and docs can share.
  exercised_axes:
    surface_class: deprecation_notice
    run_migration_check: available
    copy_issue_or_advisory_ref: available
  contract_sections:
    - "Stable affordance slots"
    - "Migration checks land on machine-readable output"
record_kind: stable_affordance_row_record
stable_affordance_schema_version: 1
row_id: ux:stable_affordance_case:deprecation_notice:migration:01
surface_class: deprecation_notice
subject_kind: deprecation_or_lifecycle_notice
subject_ref: deprecation:settings.schema:v1
projection_surfaces:
  - desktop_ui
  - cli_headless
  - docs_help
  - migration_report
  - support_export
fallback_contract_ref: docs/ux/stable_affordance_mapping_contract.md#explicit-degradation-fallback-behavior
affordances:
  copy_command_id:
    slot_class: copy_command_id
    availability_class: disabled_not_applicable
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: contract_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
    disabled_reason_summary: This deprecation notice is not command-backed; no command id is available to copy.
  copy_cli_equivalent:
    slot_class: copy_cli_equivalent
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: canonical_verb
        ref_id: migration.run_check
    disabled_reason_summary: null
  open_schema_docs:
    slot_class: open_schema_docs
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: docs_ref
        ref_id: docs/migration/post_import_validation_contract.md
      - ref_kind: schema_ref
        ref_id: schemas/migration/migration_report.schema.json
    disabled_reason_summary: null
  run_migration_check:
    slot_class: run_migration_check
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: migration_check_ref
        ref_id: cmd:migration.run_check
      - ref_kind: schema_ref
        ref_id: schemas/migration/migration_report.schema.json
    disabled_reason_summary: null
  open_support_packet:
    slot_class: open_support_packet
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: support_packet_ref
        ref_id: support_center_card:support_bundle
      - ref_kind: schema_ref
        ref_id: schemas/support/support_bundle.schema.json
    disabled_reason_summary: null
  copy_issue_or_advisory_ref:
    slot_class: copy_issue_or_advisory_ref
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: advisory_ref
        ref_id: advisory:aureline:deprecation:settings_schema_v1:01
    disabled_reason_summary: null
redaction_class: metadata_safe_default
notes: >
  Deprecation guidance stays grounded by offering a migration check and a stable
  advisory reference instead of relying on release-note prose.
minted_at: "2026-05-06T00:00:00Z"

