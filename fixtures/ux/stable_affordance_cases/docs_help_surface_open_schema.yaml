# yaml-language-server: $schema=../../../schemas/ux/stable_affordance_row.schema.json
$schema: ../../../schemas/ux/stable_affordance_row.schema.json
__fixture__:
  name: docs_help_surface_open_schema
  scenario: >
    A docs/help surface that describes a governed contract surface also exposes
    Open schema/docs and a support packet route. Command/CLI/migration slots are
    present and disabled explicitly rather than being silently omitted.
  exercised_axes:
    surface_class: docs_help_surface
    open_schema_docs: available
  contract_sections:
    - "Stable affordance slots"
    - "Explicit degradation (fallback behavior)"
record_kind: stable_affordance_row_record
stable_affordance_schema_version: 1
row_id: ux:stable_affordance_case:docs_help_surface:schema:01
surface_class: docs_help_surface
subject_kind: schema_or_packet
subject_ref: schema:ux:stable_affordance_row_record
projection_surfaces:
  - docs_help
  - desktop_ui
  - cli_headless
  - support_export
fallback_contract_ref: docs/ux/stable_affordance_mapping_contract.md#explicit-degradation-fallback-behavior
affordances:
  copy_command_id:
    slot_class: copy_command_id
    availability_class: disabled_not_applicable
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: contract_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
    disabled_reason_summary: This docs/help subject is not command-backed; no command id is available to copy.
  copy_cli_equivalent:
    slot_class: copy_cli_equivalent
    availability_class: disabled_not_applicable
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: contract_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
    disabled_reason_summary: CLI equivalence is not applicable to this docs/help schema subject.
  open_schema_docs:
    slot_class: open_schema_docs
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: docs_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
      - ref_kind: schema_ref
        ref_id: schemas/ux/stable_affordance_row.schema.json
    disabled_reason_summary: null
  run_migration_check:
    slot_class: run_migration_check
    availability_class: disabled_not_applicable
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: contract_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
    disabled_reason_summary: Migration checks are not applicable to this docs/help schema subject.
  open_support_packet:
    slot_class: open_support_packet
    availability_class: available
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: support_packet_ref
        ref_id: support_center_card:support_bundle
    disabled_reason_summary: null
  copy_issue_or_advisory_ref:
    slot_class: copy_issue_or_advisory_ref
    availability_class: disabled_missing_mapping
    fallback_behavior: show_disabled_with_reason_and_contract_link
    target_refs:
      - ref_kind: contract_ref
        ref_id: docs/ux/stable_affordance_mapping_contract.md
    disabled_reason_summary: No stable issue/advisory ref is associated with this docs/help schema subject.
redaction_class: metadata_safe_default
notes: >
  Docs/help surfaces are part of the stable contract surface; they must keep the
  mapping explicit so other surfaces can link back reliably.
minted_at: "2026-05-06T00:00:00Z"

