# yaml-language-server: $schema=../../../schemas/ux/contrast_mode_state.schema.json
$schema: "../../../schemas/ux/contrast_mode_state.schema.json"
__fixture__:
  name: reduced_motion_durable_job_progress
  scenario: >
    A durable build job is running while reduced motion and power saver are
    active. Spinner and pulse loops are suppressed, but the row still exposes
    phase, count, cancel, detail, and support-export metadata.
  exercised_axes:
    motion_posture_class: motion_reduced
    resource_posture_class: power_saver
    durable_progress_without_animation: true
  contract_sections:
    - Reduced-Motion Rules
    - Low-Resource And Power-Saving Simplifications
    - Evidence Propagation

record_kind: visual_adaptation_case_record
contrast_mode_schema_version: 1
case_id: ux.visual_adaptation.case.reduced_motion_durable_job_progress
scenario: >
  A user-started build keeps progress understandable without spinner,
  shimmer, pulse, or animated counter movement. Status item, toast, and
  support export all route back to the durable job row.
active_state:
  visual_adaptation_state_ref: ux.visual_adaptation.state.reduced_motion_job.001
  theme_class: dark_reference
  saturation_class: standard
  contrast_strategy_class: standard
  motion_posture_class: motion_reduced
  resource_posture_class: power_saver
  forced_colors_active: false
  adaptation_row_refs:
    - ux.visual_adaptation.row.dark_reference_standard
  contrast_guarantees:
    minimum_text_contrast: 4.5
    minimum_ui_contrast: 3.0
    minimum_focus_contrast: 3.0
    color_alone_prohibited: true
    motion_alone_prohibited: true
    contrast_measurement_ref: null
    notes: Power saver may suppress animation but not progress semantics or actions.
surfaces_under_review:
  - durable_job_row
  - status_item
  - toast
  - support_export
semantic_cue_assertions:
  - semantic_state_class: running
    surface_family: durable_job_row
    visible_label: Running
    semantic_status_class: info
    trust_visual_state_class: none
    token_refs:
      - al.color.state.info
    non_color_cues:
      - text_label
      - progress_text
      - static_progress_bar
      - keyboard_detail_route
    high_contrast_preserved: true
    low_saturation_preserved: true
    grayscale_preserved: true
    reduced_motion_preserved: true
    forced_colors_preserved: true
    accessible_name_parts:
      - Build running
      - 31 of 48 targets
      - Open build details
    detail_route_ref: ux:durable-job:build.debug-profile
    denial_reasons: []
    notes: Progress text and static bar replace spinner and pulse loops.
  - semantic_state_class: waiting
    surface_family: status_item
    visible_label: Build 65%
    semantic_status_class: info
    trust_visual_state_class: none
    token_refs:
      - al.color.state.info
    non_color_cues:
      - text_label
      - progress_text
      - accessible_name
      - keyboard_detail_route
    high_contrast_preserved: true
    low_saturation_preserved: true
    grayscale_preserved: true
    reduced_motion_preserved: true
    forced_colors_preserved: true
    accessible_name_parts:
      - Build running
      - 65 percent
      - Open durable job
    detail_route_ref: cmd:activity.open_job_details
    denial_reasons: []
    notes: Status item reserves width and does not tick every percentage into layout.
reduced_motion_rules:
  - surface_family: durable_job_row
    suppressed_motion_families:
      - progress_indicator_loop
      - skeleton_shimmer
    replacement_cues:
      - text_label
      - progress_text
      - static_progress_bar
      - keyboard_detail_route
    preserves_state_conveyance: true
    allowed_in_power_saver: true
    durable_fallback_ref: ux:durable-job:build.debug-profile
    denial_reasons: []
    notes: The durable row remains the source of truth after any toast or badge is dismissed.
  - surface_family: toast
    suppressed_motion_families:
      - toast_entry_exit
    replacement_cues:
      - text_label
      - static_frame
      - keyboard_detail_route
    preserves_state_conveyance: true
    allowed_in_power_saver: true
    durable_fallback_ref: ux:durable-job:build.debug-profile
    denial_reasons: []
    notes: Toast appears without slide or pulse and links back to the durable row.
compact_surface_assertions:
  - surface_family: status_item
    compact_label: Build 65%
    required_visible_states:
      - running
    non_color_cues:
      - text_label
      - progress_text
      - accessible_name
      - keyboard_detail_route
    keyboard_detail_route_ref: cmd:activity.open_job_details
    accessible_name_parts:
      - Build running
      - 31 of 48 targets
      - Open details
    high_contrast_preserved: true
    grayscale_preserved: true
    reduced_motion_preserved: true
    denial_reasons: []
evidence_propagation:
  visual_adaptation_state_ref: ux.visual_adaptation.state.reduced_motion_job.001
  capture_surface_class: support_packet
  docs_help_capture: true
  exported_evidence: true
  support_packet: true
  screenshot: true
  raw_private_material_excluded: true
  metadata_fields:
    - visual_adaptation_state_ref
    - theme_class
    - saturation_class
    - contrast_strategy_class
    - motion_posture_class
    - resource_posture_class
    - forced_colors_active
    - adaptation_row_refs
    - contrast_mode_schema_version
    - capture_surface_class
    - rendered_at
    - semantic_cue_assertions
  review_label: Reduced motion power-saver progress capture
  notes: Support packet records that animation was intentionally suppressed by user/runtime posture.
assertions:
  visual_mode_switch_preserves_semantic_cues: true
  no_hue_only_state: true
  no_motion_only_state: true
  critical_states_remain_perceivable: true
  compact_surfaces_remain_distinguishable: true
  evidence_carries_visual_mode: true
  notes: Durable job row remains understandable and actionable if the user never sees animation.
policy_context:
  policy_epoch: pe:2026-04-29:visual-adaptation
  trust_state: trusted
  execution_context_id: exec-context:fixture.visual-adaptation.jobs
redaction_class: metadata_safe_default
minted_at: "2026-04-29T12:05:00Z"
narrative_refs:
  - docs/accessibility/visual_adaptation_contract.md
  - docs/ux/durable_work_contract.md
  - artifacts/ux/color_safe_diagnostic_palette.yaml
