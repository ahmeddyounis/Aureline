# yaml-language-server: $schema=../../../schemas/ux/contrast_mode_state.schema.json
$schema: "../../../schemas/ux/contrast_mode_state.schema.json"
__fixture__:
  name: color_safe_diff_diagnostic_combo
  scenario: >
    Low-saturation light review of a diff where added, removed, and modified
    hunks overlap with warning, error, restricted-workspace, and policy-blocked
    state. Every state remains readable in grayscale.
  exercised_axes:
    saturation_class: low_saturation
    diff_states:
      - added
      - removed
      - modified
    diagnostic_states:
      - warning
      - error
    trust_states:
      - restricted_workspace
      - policy_locked
  contract_sections:
    - First-Party Adaptation Rows
    - Token Remap Rules
    - Color-Safe Diagnostic And Diff Cues
    - Evidence Propagation

record_kind: visual_adaptation_case_record
contrast_mode_schema_version: 1
case_id: ux.visual_adaptation.case.color_safe_diff_diagnostic_combo
scenario: >
  Diff, diagnostics, trust, and blocked states retain independent labels,
  shapes, patterns, and detail routes under low-saturation review.
active_state:
  visual_adaptation_state_ref: ux.visual_adaptation.state.color_safe_diff.001
  theme_class: light_parity
  saturation_class: low_saturation
  contrast_strategy_class: standard
  motion_posture_class: motion_reduced
  resource_posture_class: standard
  forced_colors_active: false
  adaptation_row_refs:
    - ux.visual_adaptation.row.low_saturation_light
  contrast_guarantees:
    minimum_text_contrast: 4.5
    minimum_ui_contrast: 3.0
    minimum_focus_contrast: 3.0
    color_alone_prohibited: true
    motion_alone_prohibited: true
    contrast_measurement_ref: null
    notes: Low-saturation review uses labels, markers, and patterns to distinguish states.
surfaces_under_review:
  - diff_view
  - editor_inline
  - diagnostic_list
  - badge_or_pill
semantic_cue_assertions:
  - semantic_state_class: diff_added
    surface_family: diff_view
    visible_label: Added
    semantic_status_class: success
    trust_visual_state_class: none
    token_refs:
      - al.color.diff.added
    non_color_cues:
      - plus_minus_marker
      - border
      - text_label
      - accessible_name
    high_contrast_preserved: true
    low_saturation_preserved: true
    grayscale_preserved: true
    reduced_motion_preserved: true
    forced_colors_preserved: true
    accessible_name_parts:
      - Added line
      - Diff detail available
    detail_route_ref: vcs:diff.hunk.added.001
    denial_reasons: []
    notes: Plus marker and border survive grayscale review.
  - semantic_state_class: diff_removed
    surface_family: diff_view
    visible_label: Removed
    semantic_status_class: danger
    trust_visual_state_class: none
    token_refs:
      - al.color.diff.removed
    non_color_cues:
      - plus_minus_marker
      - stroke_pattern
      - text_label
      - accessible_name
    high_contrast_preserved: true
    low_saturation_preserved: true
    grayscale_preserved: true
    reduced_motion_preserved: true
    forced_colors_preserved: true
    accessible_name_parts:
      - Removed line
      - Diff detail available
    detail_route_ref: vcs:diff.hunk.removed.001
    denial_reasons: []
    notes: Minus marker and removed-line pattern distinguish removal from addition.
  - semantic_state_class: diff_modified
    surface_family: diff_view
    visible_label: Modified
    semantic_status_class: info
    trust_visual_state_class: none
    token_refs:
      - al.color.diff.modified
    non_color_cues:
      - border
      - stroke_pattern
      - text_label
      - accessible_name
    high_contrast_preserved: true
    low_saturation_preserved: true
    grayscale_preserved: true
    reduced_motion_preserved: true
    forced_colors_preserved: true
    accessible_name_parts:
      - Modified line
      - Changed region available
    detail_route_ref: vcs:diff.hunk.modified.001
    denial_reasons: []
    notes: Modified state uses change bar and outline, not yellow-vs-green distinction.
  - semantic_state_class: diagnostic_warning
    surface_family: editor_inline
    visible_label: Warning
    semantic_status_class: warning
    trust_visual_state_class: none
    token_refs:
      - al.color.state.warning
    non_color_cues:
      - icon_glyph
      - underline_pattern
      - text_label
      - accessible_name
    high_contrast_preserved: true
    low_saturation_preserved: true
    grayscale_preserved: true
    reduced_motion_preserved: true
    forced_colors_preserved: true
    accessible_name_parts:
      - Warning
      - Imported finding
    detail_route_ref: diagnostic:warning.imported.001
    denial_reasons: []
    notes: Warning underline style remains distinct from error.
  - semantic_state_class: diagnostic_error
    surface_family: editor_inline
    visible_label: Error
    semantic_status_class: danger
    trust_visual_state_class: none
    token_refs:
      - al.color.state.danger
    non_color_cues:
      - icon_glyph
      - underline_pattern
      - border
      - accessible_name
    high_contrast_preserved: true
    low_saturation_preserved: true
    grayscale_preserved: true
    reduced_motion_preserved: true
    forced_colors_preserved: true
    accessible_name_parts:
      - Error
      - Live diagnostic
      - Quick fix available
    detail_route_ref: diagnostic:error.live.001
    denial_reasons: []
    notes: Error keeps stronger marker and live/fix posture.
  - semantic_state_class: trust_restricted
    surface_family: badge_or_pill
    visible_label: Restricted
    semantic_status_class: warning
    trust_visual_state_class: restricted_workspace
    token_refs:
      - trust.restricted_workspace
    non_color_cues:
      - lock_or_shield_glyph
      - border
      - text_label
      - keyboard_detail_route
    high_contrast_preserved: true
    low_saturation_preserved: true
    grayscale_preserved: true
    reduced_motion_preserved: true
    forced_colors_preserved: true
    accessible_name_parts:
      - Restricted workspace
      - Trust details available
    detail_route_ref: cmd:trust.open_workspace_review
    denial_reasons: []
    notes: Brand color is not used for restricted state.
  - semantic_state_class: blocked
    surface_family: badge_or_pill
    visible_label: Blocked
    semantic_status_class: danger
    trust_visual_state_class: policy_locked
    token_refs:
      - trust.policy_locked
    non_color_cues:
      - lock_or_shield_glyph
      - border
      - text_label
      - keyboard_detail_route
    high_contrast_preserved: true
    low_saturation_preserved: true
    grayscale_preserved: true
    reduced_motion_preserved: true
    forced_colors_preserved: true
    accessible_name_parts:
      - Policy blocked
      - Open policy details
    detail_route_ref: cmd:policy.open_effective_rule
    denial_reasons: []
    notes: Blocked state remains separate from restricted workspace.
reduced_motion_rules:
  - surface_family: diff_view
    suppressed_motion_families:
      - dense_list_reflow
      - chart_transition
    replacement_cues:
      - text_label
      - stroke_pattern
      - keyboard_detail_route
    preserves_state_conveyance: true
    allowed_in_power_saver: true
    durable_fallback_ref: vcs:diff.review.001
    denial_reasons: []
    notes: Diff review does not require animated hunk transitions.
compact_surface_assertions:
  - surface_family: badge_or_pill
    compact_label: Restricted, blocked
    required_visible_states:
      - trust_restricted
      - blocked
    non_color_cues:
      - text_label
      - lock_or_shield_glyph
      - border
      - keyboard_detail_route
    keyboard_detail_route_ref: cmd:surface.inspect_state_summary
    accessible_name_parts:
      - Restricted workspace
      - Policy blocked
      - Diff and diagnostics details available
    high_contrast_preserved: true
    grayscale_preserved: true
    reduced_motion_preserved: true
    denial_reasons: []
evidence_propagation:
  visual_adaptation_state_ref: ux.visual_adaptation.state.color_safe_diff.001
  capture_surface_class: exported_evidence
  docs_help_capture: true
  exported_evidence: true
  support_packet: true
  screenshot: true
  raw_private_material_excluded: true
  metadata_fields:
    - visual_adaptation_state_ref
    - theme_class
    - saturation_class
    - contrast_strategy_class
    - motion_posture_class
    - resource_posture_class
    - forced_colors_active
    - adaptation_row_refs
    - contrast_mode_schema_version
    - capture_surface_class
    - rendered_at
    - semantic_cue_assertions
  review_label: Low-saturation diff diagnostic evidence
  notes: Export packet names low-saturation review so screenshot reviewers do not infer missing color.
assertions:
  visual_mode_switch_preserves_semantic_cues: true
  no_hue_only_state: true
  no_motion_only_state: true
  critical_states_remain_perceivable: true
  compact_surfaces_remain_distinguishable: true
  evidence_carries_visual_mode: true
  notes: Diff, diagnostic, trust, and blocked states remain distinct in grayscale.
policy_context:
  policy_epoch: pe:2026-04-29:visual-adaptation
  trust_state: restricted
  execution_context_id: exec-context:fixture.visual-adaptation.diff
redaction_class: metadata_safe_default
minted_at: "2026-04-29T12:10:00Z"
narrative_refs:
  - docs/accessibility/visual_adaptation_contract.md
  - docs/ux/decoration_precedence_contract.md
  - artifacts/ux/color_safe_diagnostic_palette.yaml
