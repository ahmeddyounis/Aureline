# yaml-language-server: $schema=../../../schemas/ux/voice_mode_state.schema.json
__fixture__:
  name: push_to_talk_local_dictation
  scenario: >
    Push-to-talk local dictation backed by a first-party self-hosted
    speech provider running in-process. execution_locus_class =
    local_in_process_speech, audio_locality_class =
    local_machine_only_in_process, retention_stance_class =
    no_audio_retained_no_transcript_retained. The voice-mode session
    is in dictation_mode_active under push_to_talk_held activation;
    the persistent mic indicator is visible-capture-active; the
    editor integration bridge declares same_undo_stack_as_keyboard_lane
    and same_command_ids_as_keyboard_lane parity. No handoff is
    disclosed because no audio leaves the device. Exercises §3 rule 1
    (handoff disclosure not required for local capture), §3 rule 5
    (editor integration bridge parity), §4 rule 1 (mode separation),
    §4 rule 3 (persistent indicator visible during active capture),
    and §5 rule 1 (audio that does not leave the device needs no
    handoff disclosure).
  exercised_axes:
    record_kinds:
      - speech_provider_entry_record
      - editor_integration_bridge_record
      - voice_mode_session_record
      - mic_indicator_state_record
      - speech_capture_event_record
    speech_provider_class: first_party_self_hosted_speech
    execution_locus_class: local_in_process_speech
    audio_locality_class: local_machine_only_in_process
    voice_mode_class: dictation_mode_active
    activation_class: push_to_talk_held
    undo_stack_parity_class: same_undo_stack_as_keyboard_lane
    command_id_parity_class: same_command_ids_as_keyboard_lane
  contract_sections:
    - "§1.1 speech_provider_entry_record / editor_integration_bridge_record"
    - "§1.2 voice_mode_session_record / mic_indicator_state_record"
    - "§1.3 speech_capture_event_record"
    - "§3 rule 5 editor integration bridge parity"
    - "§4 rule 1 mode separation"
    - "§4 rule 3 persistent indicator visible during active capture"
    - "§5 rule 1 audio not leaving device"

