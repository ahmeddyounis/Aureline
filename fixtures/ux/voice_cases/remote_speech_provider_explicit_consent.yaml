# yaml-language-server: $schema=../../../schemas/ux/voice_mode_state.schema.json
__fixture__:
  name: remote_speech_provider_explicit_consent
  scenario: >
    A BYOK remote speech provider serving dictation with explicit
    user opt-in each session. speech_provider_class = byok_speech,
    execution_locus_class = byok_remote_vendor_direct_speech,
    transport_class = remote_https. A speech_provider_handoff_disclosure_record
    is minted before the call with pre_invocation_disclosure_kind =
    byok_remote_handoff_disclosed; the matching speech_capture_event_record
    declares audio_locality_class = sent_to_byok_remote_vendor_direct
    and consent_class = explicit_user_opt_in_each_session. Exercises
    §3 rule 1 (handoff disclosure required for remote routes), §5
    rule 1 (audio leaving device is disclosed), §5 rule 5 (consent
    declared not inferred), and §3 rule 5 (editor integration bridge
    parity).
  exercised_axes:
    record_kinds:
      - speech_provider_entry_record
      - speech_provider_handoff_disclosure_record
      - editor_integration_bridge_record
      - voice_mode_session_record
      - speech_capture_event_record
    speech_provider_class: byok_speech
    execution_locus_class: byok_remote_vendor_direct_speech
    pre_invocation_disclosure_kind: byok_remote_handoff_disclosed
    audio_locality_class: sent_to_byok_remote_vendor_direct
    consent_class: explicit_user_opt_in_each_session
  contract_sections:
    - "§1.1 speech_provider_handoff_disclosure_record"
    - "§3 rule 1 handoff disclosed before invocation"
    - "§5 rule 1 audio leaving device disclosed"
    - "§5 rule 5 consent class declared"

