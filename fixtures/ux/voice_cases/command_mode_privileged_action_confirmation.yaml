# yaml-language-server: $schema=../../../schemas/ux/voice_mode_state.schema.json
__fixture__:
  name: command_mode_privileged_action_confirmation
  scenario: >
    A voice-mode session in command_mode_active resolving a
    privileged command (capability_scope_class =
    recoverable_durable_mutation, e.g., "rename file across project")
    through a grammar_intent_resolver_record whose voice_intent_record
    sets voice_intent_resolution_class =
    resolves_to_canonical_command_id and pins the canonical command_id_ref.
    command_preview_class = preview_required_for_privileged_actions and
    transcript_correction_posture = correction_required_before_commit;
    a transcript_correction_record is emitted before commit, proving
    the correction-before-commit window held. The editor integration
    bridge declares same_undo_stack_as_keyboard_lane and
    inherits_workspace_trust_state_strict. Exercises §3 rule 4
    (grammar resolves to canonical command), §4 rule 4 (preview
    required for privileged voice action), §4 rule 5 (correction
    window before privileged commit), §4 rule 6 (undo parity), §4
    rule 7 (trust parity), and §4 rule 8 (accessibility announcement
    parity).
  exercised_axes:
    record_kinds:
      - speech_provider_entry_record
      - grammar_intent_resolver_record
      - editor_integration_bridge_record
      - voice_mode_session_record
      - mic_indicator_state_record
      - speech_capture_event_record
      - transcript_correction_record
    voice_mode_class: command_mode_active
    activation_class: manual_command_activation
    command_preview_class: preview_required_for_privileged_actions
    transcript_correction_posture: correction_required_before_commit
    voice_intent_resolution_class: resolves_to_canonical_command_id
  contract_sections:
    - "§1.1 grammar_intent_resolver_record / editor_integration_bridge_record"
    - "§3 rule 4 grammar resolves to canonical command"
    - "§4 rule 4 preview required for privileged voice action"
    - "§4 rule 5 correction window before privileged commit"
    - "§4 rules 6-8 parity with keyboard lane"

