    record_kind: local_speech_pack_entry_record
    speech_provider_entry_schema_version: 1
    pack_id: "ux:voice:pack:byok_user_imported_pack_signature_failed:01"
    pack_origin_class: byok_user_imported_pack
    pack_verification_state_class: signature_failed
    pack_locale: en-US
    supported_feature_classes:
      - dictation_supported
