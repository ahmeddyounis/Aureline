# yaml-language-server: $schema=../../../schemas/ux/speech_provider_entry.schema.json
__fixture__:
  name: speech_pack_unavailable_fallback
  scenario: >
    A local speech pack whose pack_verification_state_class =
    signature_failed forces voice suppression rather than a silent
    remote fallback. The bound speech_provider_entry_record resolves
    speech_provider_class = disabled_no_speech_provider with
    execution_locus_class = disabled_no_locus_speech, transport_class
    = no_transport_disabled, auth_mode_class = no_auth_disabled,
    supported_feature_classes = [none_supported_disabled], and
    allowed_data_classes = [none_disabled]. The corresponding
    voice_mode_session_record is in voice_mode_blocked_by_envelope
    with activation_class = activation_unavailable_in_envelope and
    mic_indicator_class = persistent_indicator_hidden_capture_disabled.
    Exercises §3 rule 2 (signature-verified packs only), §5 rule 6
    (unverified pack forces suppression, not silent remote fallback),
    and §4 voice-mode envelope-blocked posture.
  exercised_axes:
    record_kinds:
      - local_speech_pack_entry_record
      - speech_provider_entry_record
      - voice_mode_session_record
      - mic_indicator_state_record
    pack_verification_state_class: signature_failed
    speech_provider_class: disabled_no_speech_provider
    voice_mode_class: voice_mode_blocked_by_envelope
    mic_indicator_class: persistent_indicator_hidden_capture_disabled
  contract_sections:
    - "§1.1 local_speech_pack_entry_record / speech_provider_entry_record"
    - "§3 rule 2 unverified packs do not serve"
    - "§5 rule 6 fallback when speech pack unavailable"

records:
