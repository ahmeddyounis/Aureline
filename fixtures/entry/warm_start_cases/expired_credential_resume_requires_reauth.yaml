    remains explicit about the required revalidation and the safe fallbacks if
    reauth fails.
  doc_sections:
    - artifacts/entry/warm_start_chooser_contract.md#41-resume-live-workspace-resume_live_workspace
    - artifacts/entry/warm_start_chooser_contract.md#5-exportability-openrestoresupport-continuity

