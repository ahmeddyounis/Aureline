record_kind: open_flow_case_record
open_flow_case_schema_version: 1
case_id: open_flow:open_folder:scope_consequence:01
title: Open folder scope consequence is explicit (replace vs new window vs add root)
scenario_summary: >
  An active workspace exists. The user selects a local folder target. The UI must not
  guess whether to replace the current workspace, open in a new window, or add the
  folder as a new root. All three are distinct, named routes with different evidence.
choices:
  - open_route_id: open_route.open_folder
    choice_label: open_replace_current_workspace
    entry_verb: open
    target_kind: local_folder
    resulting_mode: folder
    command_identity:
      ux_command_id_ref: command.workspace.open_folder
      stable_command_id: cmd:workspace.open_folder
    evidence_emitted:
      open_flow_sheet_record: required
      workspace_switch_preview_record: required_when_dirty_buffers_or_material_delta
      scope_widen_diff_record: not_applicable
  - open_route_id: open_route.open_in_new_window_keep_current_open
    choice_label: open_in_new_window_keep_current_open
    entry_verb: open
    target_kind: local_folder
    resulting_mode: folder
    command_identity:
      ux_command_id_ref: command.workspace.open_folder
      stable_command_id: cmd:workspace.open_folder
    evidence_emitted:
      open_flow_sheet_record: required
      workspace_switch_preview_record: required
      workspace_switch_choice_class: open_target_in_new_window_keep_current_open
      scope_widen_diff_record: not_applicable
  - open_route_id: open_route.add_root_to_active_workspace
    choice_label: add_root_to_active_workspace
    entry_verb: add_root
    target_kind: local_folder
    resulting_mode: workspace_with_roots
    command_identity:
      ux_command_id_ref: command.workspace.add_root_local
      stable_command_id: cmd:workspace.add_root_local
    evidence_emitted:
      open_flow_sheet_record: required
      workspace_switch_preview_record: not_applicable
      scope_widen_diff_record: required_before_commit
surfaces:
  - surface_class: main_menu
    invocation: file_menu_open_folder_with_active_workspace
    requirement: must_render_three_distinct_choices
  - surface_class: command_palette
    invocation: palette_open_folder_with_active_workspace
    requirement: must_render_three_distinct_choices
  - surface_class: workspace_switcher
    invocation: switcher_add_root_affordance
    requirement: must_bind_add_root_choice_only
__fixture__:
  name: open_folder_scope_consequence_disambiguation
  scenario: >
    Multi-root truth requires that “open” vs “open in new window” vs “add as root”
    are never collapsed into one vague “Open …” action. The evidence emitted differs
    (switch preview vs scope widen diff), so the choice must be explicit.
  contract_sections:
    - artifacts/entry/open_flow_truth.md §3
    - artifacts/entry/open_flow_truth.md §4.2
    - artifacts/entry/open_flow_truth.md §4.4
    - artifacts/entry/open_flow_truth.md §4.5

