        timing_class: immediate_action_blocks_apply_until_done
        reapproval_posture_class: commit_covers_execution
        keyboard_reachable: true
    actions_deferred:
      - action_id: starter_action:port_exposure:001
        action_class: port_exposure
        action_sentence: Expose/forward starter-declared development ports after open (no silent shareable routes; exposure posture is disclosed before any route is created).
        side_effect_scope_class: workspace_scope
        execution_commitment_class: aureline_will_execute
        timing_class: deferred_action_runs_after_open
        reapproval_posture_class: commit_covers_execution
        keyboard_reachable: true
