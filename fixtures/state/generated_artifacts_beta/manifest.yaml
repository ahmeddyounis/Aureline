# Generated-artifact lineage and drift-state beta corpus.
# Each packet binds one consumer surface (search, review, ai_context,
# support_export) to one artifact under a closed artifact-family
# vocabulary (build_output, lockfile, preview_render, notebook_output,
# run_result_artifact) and captures generator identity, canonical
# source refs, lineage class, drift state, and default edit posture
# in one metadata-safe object. The default_edit_posture is re-derived
# from lineage_class and the downgrade_label is re-derived from
# drift_state so prose cannot lie about generator identity, and a
# closed downgrade label downgrades a failing row without inventing
# new vocabulary.

schema_version: 1
manifest_id: state.generated_artifacts.beta.v1
status: protected
overview_page: docs/state/m3/generated_artifact_lineage_beta.md
crate_consumer: crates/aureline-reactive-state/src/generated_lineage/mod.rs
schema_ref: schemas/state/generated_artifact.schema.json
report_ref: artifacts/support/m3/generated_artifact_lineage_report.md

required_consumer_surfaces:
  - search
  - review
  - ai_context
  - support_export

required_artifact_families:
  - build_output
  - lockfile
  - preview_render
  - notebook_output
  - run_result_artifact

required_lineage_classes:
  - generated_from_local_source
  - regenerable_lockfile_artifact
  - previewed_from_local_source
  - derived_from_run_artifact
  - imported_external_artifact

packet_files:
  - search_build_output_aligned_packet.yaml
  - review_lockfile_aligned_packet.yaml
  - ai_context_preview_aligned_packet.yaml
  - support_export_notebook_aligned_packet.yaml
  - support_export_run_result_aligned_packet.yaml
  - review_build_output_source_drifted_packet.yaml
  - ai_context_build_output_stale_generated_packet.yaml
  - search_build_output_imported_external_packet.yaml

required_packet_assertions:
  - every_required_consumer_surface_has_at_least_one_packet
  - every_required_artifact_family_appears_in_at_least_one_packet
  - every_required_lineage_class_appears_in_at_least_one_packet
  - at_least_one_packet_declares_a_non_aligned_drift_state
  - aligned_packets_declare_downgrade_label_none_and_no_open_gaps
  - drift_packets_declare_a_closed_downgrade_label_and_at_least_one_open_gap
  - default_edit_posture_is_derived_from_lineage_class
  - downgrade_label_is_derived_from_drift_state
  - evidence_export_preserves_artifact_family_lineage_drift_posture_surface_generator_and_source_refs
  - evidence_export_excludes_raw_payload_raw_private_material_and_ambient_authority
  - safety_baseline_excludes_raw_payload_raw_private_material_and_ambient_authority
  - imported_external_artifact_packets_pin_drift_state_imported_no_local_source

source_contract_refs:
  schema: schemas/state/generated_artifact.schema.json
  reviewer_doc: docs/state/m3/generated_artifact_lineage_beta.md
  baseline_report: artifacts/support/m3/generated_artifact_lineage_report.md
  crate_module: crates/aureline-reactive-state/src/generated_lineage/mod.rs
  support_consumer_module: crates/aureline-support/src/generated_lineage/mod.rs
