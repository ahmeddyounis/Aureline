record_kind: data_class_case
schema_version: 1
case_id: durable_truth_vs_export_risk
description: >
  Demonstrates that durability/authority and export safety are
  orthogonal: a durable object can be unsafe to export, and an export
  packet can be metadata-only while still referencing high-risk bodies
  by opaque id.

objects:
  - object_id: state_object:user_global_settings
    ownership_class: user_authored_durable_state
    authority_class: user_authored_durable_truth
    risk_class: metadata_only
    notes: >
      Exported representations (portable profile, support export, sync
      scope bundle) may carry only redacted previews and semantic ids.
      The underlying durable truth remains user-owned.

  - object_id: state_object:auth_session_secrets
    ownership_class: audit_trust_security_state
    authority_class: admin_or_control_artifact
    risk_class: high_risk
    notes: >
      Secret-bearing material is durable but not export-safe. Default
      posture is exclusion or handle-only projection; raw secret bytes
      never cross a portability, sync, or support boundary.

expected_invariants:
  - durable_does_not_imply_export_safe
  - risk_class_applies_to_boundary_representation
  - raw_secrets_never_exported

