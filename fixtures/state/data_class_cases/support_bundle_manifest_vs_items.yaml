record_kind: data_class_case
schema_version: 1
case_id: support_bundle_manifest_vs_items
description: >
  A support bundle is a container whose manifest stays truthful and
  exportable even when high-risk items are withheld or kept local-only.
  Each item carries its own risk class; the bundle's ownership class
  does not force a single risk class for all contents.

objects:
  - object_id: support_bundle:manifest
    ownership_class: evidence_support_state
    authority_class: user_owned_recovery_state
    risk_class: environment_adjacent
    notes: >
      The manifest enumerates collected items, redaction posture, and
      omission reasons. It is previewable-by-default.

  - object_id: support_bundle:item.execution_context_summary
    ownership_class: derived_disposable_state
    authority_class: disposable_derived_cache
    risk_class: environment_adjacent
    notes: >
      Environment summaries are exportable only after clear preview and
      must avoid raw hostnames, paths, or tokens.

  - object_id: support_bundle:item.crash_dump_or_core
    ownership_class: evidence_support_state
    authority_class: user_owned_recovery_state
    risk_class: high_risk
    notes: >
      Raw dumps/cores are prohibited by default and remain local-only
      unless an explicit opt-in upload path is taken.

expected_invariants:
  - manifest_truthfulness_even_when_bodies_withheld
  - high_risk_items_not_embedded_by_default

