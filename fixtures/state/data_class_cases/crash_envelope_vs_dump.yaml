record_kind: data_class_case
schema_version: 1
case_id: crash_envelope_vs_dump
description: >
  Crash reporting separates a metadata-only envelope from a high-risk
  dump/core body. Tooling must not infer risk class from ownership or
  from the mere presence of a crash reference.

objects:
  - object_id: crash:envelope
    ownership_class: evidence_support_state
    authority_class: user_owned_recovery_state
    risk_class: metadata_only
    notes: >
      The envelope carries build identity, timeline hints, and opaque
      refs to dumps/cores and symbolication inputs.

  - object_id: crash:dump_or_core
    ownership_class: evidence_support_state
    authority_class: user_owned_recovery_state
    risk_class: high_risk
    notes: >
      Raw dumps/cores are local-only by default and require explicit
      opt-in and policy gate to leave the device.

expected_invariants:
  - envelope_can_be_metadata_only_while_referencing_high_risk
  - high_risk_requires_high_friction_export_path

