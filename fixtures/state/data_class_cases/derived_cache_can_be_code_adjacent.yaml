record_kind: data_class_case
schema_version: 1
case_id: derived_cache_can_be_code_adjacent
description: >
  Derived/disposable state can still be code-adjacent or high-risk.
  Exporters must not treat 'derived' as synonymous with 'safe to share'.

objects:
  - object_id: cache:search_index_shard
    ownership_class: derived_disposable_state
    authority_class: disposable_derived_cache
    risk_class: code_adjacent
    notes: >
      A search shard is rebuildable, but may encode filenames, symbol
      names, or derived snippets. Default export is summary-only; any
      body export is opt-in and redaction-heavy.

  - object_id: cache:raw_trace_capture
    ownership_class: derived_disposable_state
    authority_class: disposable_derived_cache
    risk_class: high_risk
    notes: >
      Raw traces can contain token-bearing payloads or user content.
      Default posture is local-only retention; exports must be explicit
      and manifested.

expected_invariants:
  - derived_does_not_imply_export_safe
  - code_adjacent_requires_item_level_opt_in

