record_kind: data_class_case
schema_version: 1
case_id: collaboration_metadata_vs_archive
description: >
  Collaboration surfaces publish metadata-only session state while
  recording/archival artifacts may be code-adjacent or high-risk.
  Export tooling must treat these as separate objects with separate
  risk classes.

objects:
  - object_id: collaboration:session_state
    ownership_class: workspace_authored_durable_state
    authority_class: user_authored_durable_truth
    risk_class: metadata_only
    notes: >
      Session state is designed to be export-safe: ids, roles,
      retention envelope, and opaque refs only.

  - object_id: collaboration:sealed_archive_payload
    ownership_class: evidence_support_state
    authority_class: user_owned_recovery_state
    risk_class: code_adjacent
    notes: >
      Archive payloads may carry selected code snippets or transcript
      excerpts; export is opt-in and must be manifested with redaction
      notes. If the archive contains secret-bearing material, the risk
      class must be raised to high_risk and the export path gated.

expected_invariants:
  - session_metadata_export_safe_by_contract
  - archive_payload_never_assumed_metadata_only

