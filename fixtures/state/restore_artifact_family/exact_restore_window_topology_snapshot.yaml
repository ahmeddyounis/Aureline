# Worked example: window-topology snapshot claiming Exact restore.
#
# Companion to docs/state/restore_artifact_family_contract.md and
# schemas/state/window_topology_snapshot.schema.json.
#
# Pairs with exact_restore_authority_checkpoint.yaml. Both bodies
# declare exact_restore, and the topology packet binds to the same
# checkpoint by workspace_authority_checkpoint_ref. Pane ids, tab
# topology, focus chain, inspectors, and follow state all rehydrated
# without placeholders or topology adjustments.

__fixture__:
  name: exact_restore_window_topology_snapshot
  scenario: >
    The primary window of the rust-service workspace reopened on the
    same machine and the same display. Pane identity, tab order,
    inspectors, follow state, and monitor affinity all matched. No
    placeholder rows and no topology adjustments were required.
  doc_sections:
    - "§3 Window-topology snapshot packet"
    - "§4 Restore-fidelity vocabulary"

record_kind: window_topology_snapshot_record
topology_packet_schema_version: 1
snapshot_id: window-topology-snapshot-clean-resume-0001
window_id: window-rust-service-primary-0001
window_role: primary
topology_family_ref: topology-family-workspace-rust-service-0001
sibling_window_refs: []
producer_build:
  producer_name: aureline
  producer_version: 0.0.0-dev
  producer_channel: experimental
  producer_platform_class: macos
  producer_instance_handle: producer-instance-handle-0101
source_schema_version: window-topology-snapshot-schema-v1
workspace_authority_checkpoint_ref: workspace-authority-checkpoint-clean-resume-0001
pane_tree_schema_version: 1
pane_tree_record_ref: pane-tree-record-rust-service-primary-0001
stable_pane_id_inventory:
  - pane_id: pane-editor-service-rs-0001
    surface_role: editor
    surface_class: text_editor
    hydration_behavior: eager_lightweight
    availability_state: ready
    presentation_spotlighted: false
    follow_anchor_candidate: true
    title_hint: service.rs
  - pane_id: pane-explorer-0001
    surface_role: explorer
    surface_class: explorer_tree
    hydration_behavior: eager_lightweight
    availability_state: ready
    presentation_spotlighted: false
    follow_anchor_candidate: false
    title_hint: workspace explorer
  - pane_id: pane-problems-0001
    surface_role: problems
    surface_class: problems_panel
    hydration_behavior: eager_lightweight
    availability_state: ready
    presentation_spotlighted: false
    follow_anchor_candidate: false
    title_hint: problems
tab_group_topology:
  - group_id: group-editor-0001
    ordered_tab_ids:
      - tab-editor-service-rs-0001
      - tab-editor-readme-0001
    active_tab_id: tab-editor-service-rs-0001
    pinned_tab_ids:
      - tab-editor-service-rs-0001
    close_empty_group: true
visible_inspectors:
  - inspector_id: inspector-outline-0001
    inspector_kind: outline
    target_pane_ref: pane-editor-service-rs-0001
    dock_position: right
    visible: true
focus_chain:
  - target_kind: pane
    target_ref: pane-editor-service-rs-0001
    note: Primary focus when the window was saved.
  - target_kind: tab
    target_ref: tab-editor-service-rs-0001
    note: Active editor tab.
follow_presentation_state:
  follow_mode: independent
  presentation_mode: inactive
  presenter_participant_ref: null
  visible_role_badges: []
  shared_control_badge_visible: false
  audience_breakaway_allowed: true
monitor_affinity_hint:
  affinity_strength: prefer_same_display
  display_class: internal_panel
  last_known_display_ref: display-internal-macbook-0001
  last_known_topology_hash: display-topology-hash-laptop-0001
  preferred_scale_bucket: 2x
  preferred_bounds_hint:
    x: 0
    y: 0
    width: 1680
    height: 1050
  best_effort_only: true
placeholder_behaviors: []
topology_adjustments: []
restore_class: exact_restore
downgrade_triggers: []
emitted_at: "mono:6100:00:00:01.0000"
notes: >
  Window topology rehydrated exactly. Monitor affinity is recorded as
  best-effort metadata only; the restore did not need to remap, snap,
  or recenter to safe bounds.
