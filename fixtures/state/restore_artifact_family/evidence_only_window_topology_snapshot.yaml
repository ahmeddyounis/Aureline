# Worked example: window-topology snapshot claiming Evidence only.
#
# Companion to docs/state/restore_artifact_family_contract.md and
# schemas/state/window_topology_snapshot.schema.json.

__fixture__:
  name: evidence_only_window_topology_snapshot
  scenario: >
    A managed-cloud workspace was opened from a support replay where
    the live runtime is not reachable and no live attach is allowed.
    The packet preserves stable pane ids, tab order, inspectors, and
    focus chain so reviewers can describe what the user saw, but every
    live surface row is recorded as evidence-only with no rerun and no
    silent authority reacquisition.
  doc_sections:
    - "§3 Window-topology snapshot packet"
    - "§4 Restore-fidelity vocabulary"
    - "§5 Placeholder and topology-adjustment behavior"
    - "§6 Live-capability inventory rule"

record_kind: window_topology_snapshot_record
topology_packet_schema_version: 1
snapshot_id: window-topology-snapshot-evidence-only-0001
window_id: window-incident-replay-0001
window_role: incident
topology_family_ref: topology-family-incident-replay-0001
sibling_window_refs: []
producer_build:
  producer_name: aureline
  producer_version: 0.0.0-dev
  producer_channel: experimental
  producer_platform_class: managed_cloud
  producer_instance_handle: producer-instance-handle-0105
source_schema_version: window-topology-snapshot-schema-v1
workspace_authority_checkpoint_ref: workspace-authority-checkpoint-evidence-only-0001
pane_tree_schema_version: 1
pane_tree_record_ref: pane-tree-record-incident-replay-0001
stable_pane_id_inventory:
  - pane_id: pane-editor-incident-0001
    surface_role: editor
    surface_class: text_editor
    hydration_behavior: evidence_only
    availability_state: evidence_only
    presentation_spotlighted: false
    follow_anchor_candidate: false
    title_hint: incident-runbook.md
  - pane_id: pane-terminal-incident-0001
    surface_role: terminal
    surface_class: terminal_view
    hydration_behavior: evidence_only
    availability_state: evidence_only
    presentation_spotlighted: false
    follow_anchor_candidate: false
    title_hint: incident shell
  - pane_id: pane-debugger-incident-0001
    surface_role: debugger
    surface_class: debug_view
    hydration_behavior: evidence_only
    availability_state: evidence_only
    presentation_spotlighted: false
    follow_anchor_candidate: false
    title_hint: incident debugger
tab_group_topology:
  - group_id: group-incident-tools-0001
    ordered_tab_ids:
      - tab-terminal-incident-0001
      - tab-debugger-incident-0001
    active_tab_id: tab-terminal-incident-0001
    pinned_tab_ids: []
    close_empty_group: true
visible_inspectors:
  - inspector_id: inspector-restore-diagnostics-incident-0001
    inspector_kind: restore_diagnostics
    target_pane_ref: null
    dock_position: bottom
    visible: true
focus_chain:
  - target_kind: pane
    target_ref: pane-editor-incident-0001
    note: Last useful focus before replay capture.
follow_presentation_state:
  follow_mode: independent
  presentation_mode: inactive
  presenter_participant_ref: null
  visible_role_badges:
    - observer
  shared_control_badge_visible: false
  audience_breakaway_allowed: false
monitor_affinity_hint:
  affinity_strength: none
  display_class: virtual_display
  last_known_display_ref: null
  last_known_topology_hash: null
  preferred_scale_bucket: other
  preferred_bounds_hint: null
  best_effort_only: true
placeholder_behaviors:
  - pane_id: pane-editor-incident-0001
    placeholder_reason: missing_remote_authority
    safe_actions:
      - reauthenticate
      - open_restricted
      - export_evidence
    evidence_retained: true
    last_known_provenance_label: incident runbook on managed cloud workspace
    note: Editor view is evidence-only; the managed-cloud authority is not reacquired during replay.
  - pane_id: pane-terminal-incident-0001
    placeholder_reason: non_reentrant_live_surface
    safe_actions:
      - rerun_explicitly
      - export_evidence
      - remove_pane
    evidence_retained: true
    last_known_provenance_label: incident shell transcript on managed cloud workspace
    note: Transcript retained; replay never rebinds the PTY.
  - pane_id: pane-debugger-incident-0001
    placeholder_reason: revoked_permission
    safe_actions:
      - reauthenticate
      - open_restricted
      - export_evidence
      - remove_pane
    evidence_retained: true
    last_known_provenance_label: incident debugger session on managed cloud workspace
    note: Debugger capability ticket has been revoked; replay never reattaches.
topology_adjustments:
  - adjustment_class: redocked_to_safe_pane
    affected_pane_ids:
      - pane-editor-incident-0001
    note: Restore-diagnostics inspector redocked to a safe pane to keep the evidence affordances visible.
restore_class: evidence_only
downgrade_triggers:
  - trigger_class: missing_remote_authority
    affected_pane_ids:
      - pane-editor-incident-0001
      - pane-terminal-incident-0001
    note: Managed-cloud authority is not reacquired during incident replay.
  - trigger_class: excluded_live_handle
    affected_pane_ids:
      - pane-debugger-incident-0001
    note: Live debug-session handles never crossed the support-export boundary.
emitted_at: "mono:6104:00:00:00.0000"
notes: >
  Evidence only. Every live surface is recorded as evidence; no rerun,
  no silent authority reacquisition, and no monitor-affinity claim.
  The packet exists so support can describe the topology the user
  saw without implying that any live capability survived.
