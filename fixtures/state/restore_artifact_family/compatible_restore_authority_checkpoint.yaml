# Worked example: workspace-authority checkpoint claiming Compatible
# restore after a producer schema translation.
#
# Companion to docs/state/restore_artifact_family_contract.md and
# schemas/state/workspace_authority_checkpoint.schema.json.

__fixture__:
  name: compatible_restore_authority_checkpoint
  scenario: >
    The workspace was last saved by an older producer build. Trusted
    roots and dirty-buffer journal identities translated through a
    declared compatibility path. A rollback checkpoint and a preserved
    prior artifact ref keep the prior body inspectable for compare
    and export.
  doc_sections:
    - "§2 Workspace-authority checkpoint"
    - "§4 Restore-fidelity vocabulary"

record_kind: workspace_authority_checkpoint_record
checkpoint_schema_version: 1
checkpoint_id: workspace-authority-checkpoint-compatible-0001
workspace_authority_ref: workspace-authority-rust-service-0001
producer_build:
  producer_name: aureline
  producer_version: 0.0.0-dev
  producer_channel: experimental
  producer_platform_class: macos
  producer_instance_handle: producer-instance-handle-0102
source_schema_version: workspace-authority-checkpoint-schema-v0
restore_class: compatible_restore
trusted_root_refs:
  - root_id: root-rust-service-primary-0001
    trust_state: trusted
    scope_ref: trust-scope-workspace-rust-service-0001
    policy_epoch_ref: policy-epoch-stable-0002
    note: Trust state translated through the compatibility path; meaning preserved.
active_workset_ids:
  - workset-rust-service-feature-staging-0001
dirty_buffer_journal_identities:
  - journal_id: journal-dirty-buffer-service-rs-0001
    journal_kind: dirty_buffer_recovery_journal
    last_known_revision_ref: revision-dirty-buffer-service-rs-0002
    frame_count: 3
    note: Three dirty frames remain; recovered as drafts after producer translation.
recovery_journal_refs:
  - recovery-journal-workspace-rust-service-0002
local_history_snapshot_refs:
  - local-history-snapshot-workspace-rust-service-0002
evidence_bundle_refs:
  - evidence-bundle-compatible-translation-0001
excluded_live_authority_classes:
  - raw_secret_material
  - live_token_or_cookie
  - delegated_approval_or_unspent_ticket
  - machine_unique_handle
  - live_process_or_session_handle
  - live_remote_or_kernel_binding
downgrade_triggers:
  - trigger_class: schema_translation_required
    affected_journal_ids:
      - journal-dirty-buffer-service-rs-0001
    affected_workset_ids:
      - workset-rust-service-feature-staging-0001
    note: Producer schema version 0 translated into the current schema along the declared compatibility path.
rollback_checkpoint_ref: rollback-checkpoint-pre-translation-0001
preserved_prior_artifact_refs:
  - preserved-artifact-workspace-authority-pre-translation-0001
emitted_at: "mono:6101:00:05:00.0000"
notes: >
  Compatible restore. The translation preserved the prior body by
  opaque ref so a reviewer can compare or export the pre-apply
  authority state if the equivalence claim is contested.
