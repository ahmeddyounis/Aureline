# Reactive-state and materialized-view invalidation beta corpus manifest.
# Each case binds one materialized view to its class, authority label,
# authority epoch, one subscriber_epoch entry per required consumer surface
# (shell, search, graph, ai, review, support), an epoch_parity_state derived
# from the subscribers, a metadata-safe support_export projection, and a
# closed downgrade label drawn from the reactive-views vocabulary.

schema_version: 1
manifest_id: state.reactive_views.beta_cases.v1
status: protected
overview_page: docs/state/m3/reactive_state_beta.md
crate_consumer: crates/aureline-reactive-state/src/reactive_views/mod.rs
schema_ref: schemas/state/materialized_view.schema.json
report_ref: artifacts/support/m3/reactive_state_beta_report.md

required_view_classes:
  - ephemeral_projection
  - durable_local_materialization
  - exportable_snapshot
  - managed_replicated_view

required_surface_kinds:
  - shell
  - search
  - graph
  - ai
  - review
  - support

case_files:
  - ephemeral_shell_status_aligned_case.yaml
  - durable_workspace_index_aligned_case.yaml
  - exportable_support_snapshot_aligned_case.yaml
  - managed_review_state_drift_case.yaml
  - derived_graph_neighborhood_resync_case.yaml

required_case_assertions:
  - every_required_view_class_has_at_least_one_case
  - at_least_one_case_declares_parity_state_drift_detected_or_awaiting_resync
  - every_required_surface_kind_appears_in_every_case
  - support_export_preserves_view_class_authority_label_authority_epoch_and_subscriber_epochs
  - downgrade_label_is_drawn_from_the_closed_reactive_views_vocabulary
  - open_gaps_are_drawn_from_the_closed_open_gap_class_vocabulary
  - report_record_excludes_raw_private_material_and_ambient_authority

source_contract_refs:
  schema: schemas/state/materialized_view.schema.json
  reviewer_doc: docs/state/m3/reactive_state_beta.md
  baseline_report: artifacts/support/m3/reactive_state_beta_report.md
  subscription_envelope_adr: docs/adr/0005-subscription-envelope-and-invalidation-semantics.md
