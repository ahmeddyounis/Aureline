# Worked example: portable-state package manifest claiming Compatible
# import after a producer schema translation.
#
# Companion to docs/state/portable_state_package_contract.md and
# schemas/state/portable_state_manifest.schema.json.

__fixture__:
  name: compatible_migration_handoff
  scenario: >
    A migration handoff between an older producer build and a newer one
    on the same machine class. The keybindings body and the workspace
    manifest translate through declared equivalence maps. A rollback
    checkpoint and preserved prior artifacts keep the pre-apply bodies
    inspectable for compare and export.
  doc_sections:
    - "§2 Selected sections"
    - "§4 Redaction manifest and machine-local exclusion"
    - "§5 Cross-machine import posture"

record_kind: portable_state_manifest_record
portable_state_manifest_schema_version: 1
manifest_id: portable-state-manifest-migration-handoff-0001
manifest_label: Migration handoff — keybindings and workspace manifest
package_purpose: migration_handoff_export
destination_class: local_file
created_at: "mono:7300:00:00:00.0000"
producer_build:
  producer_name: aureline
  producer_version: 0.0.0-dev
  producer_channel: stable
  producer_platform_class: linux
  producer_instance_handle: producer-instance-handle-export-0002
compatibility_range:
  min_schema_version: portable-state-manifest-v1
  max_schema_version: portable-state-manifest-v1
  channel_floor: stable
  platform_class_allowance: named_classes_only
  named_platform_classes:
    - linux
    - container
    - remote_agent
  compatibility_notes: >
    The handoff is admitted on Linux, container, and remote-agent
    platforms only. Other platform classes downgrade to inspect_only
    until a per-platform compatibility row is added.
sections:
  - section_id: section-keybindings-handoff-0001
    section_class: keybindings
    section_ref: portable-keybindings-body-handoff-0001
    state_plane: portable_settings
    portability_class: portable
    redaction_class: none
    schema_version: keybindings-v0
    last_written_at: "mono:7250:00:00:00.0000"
    fidelity_label: compatible
    stable_pane_id: null
    size_estimate:
      estimated_bytes: 5120
      precision: exact_preflight
    checksum:
      state: checksum_available
      digest_ref: digest-section-keybindings-handoff-0001
      algorithm_hint: sha256
    signature:
      state: signed_verified
      signer_ref: signer-migration-key-0001
      signature_ref: signature-section-keybindings-handoff-0001
    source_refs:
      workspace_authority_checkpoint_ref: null
      window_topology_snapshot_refs: []
      preserved_prior_artifact_refs:
        - preserved-keybindings-pre-translation-0001
      restore_provenance_ref: state-restore-provenance-migration-keybindings-0001
    notes: Translated through the v0 -> v1 keybindings equivalence map.
  - section_id: section-workspace-manifest-0001
    section_class: workspace_manifest
    section_ref: workspace-manifest-body-0001
    state_plane: workspace_shared_manifest
    portability_class: shared_workspace_only
    redaction_class: ui_string_only
    schema_version: workspace-manifest-v0
    last_written_at: "mono:7250:00:00:01.0000"
    fidelity_label: compatible
    stable_pane_id: null
    size_estimate:
      estimated_bytes: 7168
      precision: exact_preflight
    checksum:
      state: checksum_available
      digest_ref: digest-section-workspace-manifest-0001
      algorithm_hint: sha256
    signature:
      state: signed_verified
      signer_ref: signer-migration-key-0001
      signature_ref: signature-section-workspace-manifest-0001
    source_refs:
      workspace_authority_checkpoint_ref: workspace-authority-checkpoint-migration-0001
      window_topology_snapshot_refs: []
      preserved_prior_artifact_refs:
        - preserved-workspace-manifest-pre-translation-0001
      restore_provenance_ref: state-restore-provenance-migration-workspace-manifest-0001
    notes: Workspace manifest translates v0 -> v1 through the equivalence map; review on diff is mandatory.
  - section_id: section-extension-selection-0001
    section_class: extension_selection_inventory
    section_ref: portable-extension-selection-body-0001
    state_plane: portable_settings
    portability_class: portable
    redaction_class: none
    schema_version: extensions-selected-v1
    last_written_at: "mono:7250:00:00:02.0000"
    fidelity_label: exact
    stable_pane_id: null
    size_estimate:
      estimated_bytes: 3072
      precision: exact_preflight
    checksum:
      state: checksum_available
      digest_ref: digest-section-extension-selection-0001
      algorithm_hint: sha256
    signature:
      state: signed_verified
      signer_ref: signer-migration-key-0001
      signature_ref: signature-section-extension-selection-0001
    source_refs:
      workspace_authority_checkpoint_ref: null
      window_topology_snapshot_refs: []
      preserved_prior_artifact_refs: []
      restore_provenance_ref: null
    notes: Extension selection inventory needs no translation between v0 and v1.
redaction_manifest:
  path_redaction: exclude_raw_paths
  host_redaction: exclude_raw_hosts
  raw_secret_exclusion_state: enforced
  raw_credential_exclusion_state: enforced
  raw_command_line_exclusion_state: enforced
  raw_log_exclusion_state: enforced
  raw_source_content_exclusion_state: enforced
  raw_provider_payload_exclusion_state: enforced
  machine_local_exclusion_status: excluded
  rules:
    - rule_id: rule-paths-excluded-handoff-0001
      rule_class: raw_path_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
      reason: Migration handoff packages never carry raw absolute paths.
    - rule_id: rule-hosts-excluded-handoff-0001
      rule_class: raw_host_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
      reason: Migration handoff packages never carry raw hostnames.
    - rule_id: rule-secrets-excluded-handoff-0001
      rule_class: raw_secret_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
      reason: Secret material rides only via the credential store path; never inside this manifest.
    - rule_id: rule-source-content-excluded-handoff-0001
      rule_class: raw_source_content_excluded
      enforcement_state: enforced
      scope_class: workspace_manifest
      redaction_class: ui_string_only
      reason: The workspace manifest body is reduced to UI-string view for review-time display.
machine_local_exclusions:
  - exclusion_id: exclusion-credential-store-handoff-0001
    artifact_class: workspace_authority_checkpoint
    artifact_ref: artifact-credential-store-handles-handoff-0001
    state_plane: non_portable_live_authority
    reason: credential_store_only
    substitute_class: omitted
    redaction_class: exclude_from_export
    note: Credential handles stay on the originating machine.
  - exclusion_id: exclusion-machine-addendum-handoff-0001
    artifact_class: portable_profile_machine_addendum
    artifact_ref: artifact-machine-addendum-handoff-0001
    state_plane: local_context
    reason: local_absolute_path
    substitute_class: metadata_only
    redaction_class: exclude_from_export
    note: Local toolchain hints are not portable; the destination may request a separate machine addendum reexport if needed.
total_size_estimate:
  estimated_bytes: 18432
  precision: exact_preflight
  note: Sum of section estimates plus the manifest body.
checksum:
  state: checksum_available
  digest_ref: digest-package-migration-handoff-0001
  algorithm_hint: blake3
signature:
  state: signed_verified
  signer_ref: signer-migration-key-0001
  signature_ref: signature-package-migration-handoff-0001
import_posture:
  posture_class: compatible
  downgrade_triggers:
    - schema_translation_required
  rollback_checkpoint_ref: rollback-checkpoint-migration-import-0001
  equivalence_map_refs:
    - equivalence-map-keybindings-v0-to-v1-0001
    - equivalence-map-workspace-manifest-v0-to-v1-0001
  preserved_prior_artifact_refs:
    - preserved-keybindings-pre-translation-0001
    - preserved-workspace-manifest-pre-translation-0001
  review_required_section_refs:
    - section-workspace-manifest-0001
  notes: >
    Workspace manifest review is mandatory because diff-against-local
    is the only safe apply path for shared workspace truth. The
    rollback checkpoint covers the keybindings translation as well.
restore_provenance_refs:
  - state-restore-provenance-migration-keybindings-0001
  - state-restore-provenance-migration-workspace-manifest-0001
actions:
  inspect:
    action_id: inspect
    enabled: true
    disabled_reason: not_disabled
    consequence_class: read_only
    target_ref: portable-state-manifest-migration-handoff-0001
  compare:
    action_id: compare
    enabled: true
    disabled_reason: not_disabled
    consequence_class: read_only
    target_ref: compare-handle-migration-handoff-vs-local-0001
  compare_with_local:
    action_id: compare_with_local
    enabled: true
    disabled_reason: not_disabled
    consequence_class: read_only
    target_ref: compare-handle-migration-handoff-vs-local-0001
  compare_with_prior_export:
    action_id: compare_with_prior_export
    enabled: true
    disabled_reason: not_disabled
    consequence_class: read_only
    target_ref: compare-handle-migration-handoff-vs-prior-export-0001
  reexport_redacted:
    action_id: reexport_redacted
    enabled: true
    disabled_reason: not_disabled
    consequence_class: builds_export
    target_ref: reexport-handle-migration-handoff-stricter-redaction-0001
  open_inspect_only:
    action_id: open_inspect_only
    enabled: true
    disabled_reason: not_disabled
    consequence_class: read_only
    target_ref: inspect-only-handle-migration-handoff-0001
  apply_import:
    action_id: apply_import
    enabled: true
    disabled_reason: not_disabled
    consequence_class: requires_rollback
    target_ref: apply-handle-migration-handoff-0001
  cancel_import:
    action_id: cancel_import
    enabled: true
    disabled_reason: not_disabled
    consequence_class: cancels_without_mutation
    target_ref: cancel-handle-migration-handoff-0001
notes: >
  Compatible import. The keybindings body and the workspace manifest
  translated through declared equivalence maps; the workspace manifest
  still requires diff-on-apply review because shared workspace truth
  may not be silently overwritten.
