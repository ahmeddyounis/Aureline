redaction_manifest:
  path_redaction: exclude_raw_paths
  host_redaction: exclude_raw_hosts
  raw_secret_exclusion_state: enforced
  raw_credential_exclusion_state: enforced
  raw_command_line_exclusion_state: enforced
  raw_log_exclusion_state: enforced
  raw_source_content_exclusion_state: enforced
  raw_provider_payload_exclusion_state: enforced
  machine_local_exclusion_status: excluded
  rules:
    - rule_id: rule-paths-excluded-0001
      rule_class: raw_path_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
      reason: Raw absolute paths never cross the machine boundary in user portable exports.
    - rule_id: rule-hosts-excluded-0001
      rule_class: raw_host_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
      reason: Raw hostnames never cross the machine boundary in user portable exports.
    - rule_id: rule-secrets-excluded-0001
      rule_class: raw_secret_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
      reason: Secret material rides only in the OS credential store; the export surface never carries it.
    - rule_id: rule-credentials-excluded-0001
      rule_class: raw_credential_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
      reason: Long-lived credentials stay in the credential store and never cross this manifest.
machine_local_exclusions:
  - exclusion_id: exclusion-credential-store-0001
    artifact_class: workspace_authority_checkpoint
    artifact_ref: artifact-os-credential-store-handles-0001
    state_plane: non_portable_live_authority
    reason: credential_store_only
    substitute_class: omitted
    redaction_class: exclude_from_export
    note: Auth session secrets and long-lived credentials remain in the OS credential store.
  - exclusion_id: exclusion-machine-addendum-0001
    artifact_class: portable_profile_machine_addendum
    artifact_ref: artifact-machine-addendum-toolchain-paths-0001
    state_plane: local_context
    reason: local_absolute_path
    substitute_class: metadata_only
    redaction_class: exclude_from_export
    note: Toolchain path hints stay machine-local; the destination requests reexport_with_machine_addendum if needed.
