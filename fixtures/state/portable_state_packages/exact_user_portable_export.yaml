# Worked example: portable-state package manifest claiming Exact import.
#
# Companion to docs/state/portable_state_package_contract.md and
# schemas/state/portable_state_manifest.schema.json.
#
# A user-initiated portable export between two installations of the same
# producer build. Selected profile defaults, keybindings, snippets,
# themes, command aliases, and selected saved views travel intact.
# Workspace-shared rows, machine-local addenda, and live authority all
# stay out of the package by design and are recorded under
# machine_local_exclusions[].

__fixture__:
  name: exact_user_portable_export
  scenario: >
    Same producer build on both ends, no schema translation, no missing
    dependency, no destination unsupported section. The destination
    enters apply_import with a rollback checkpoint as a safety net but
    no equivalence map is required.
  doc_sections:
    - "§1 Manifest body shape"
    - "§2 Selected sections"
    - "§5 Cross-machine import posture"
    - "§6 Compare and export actions"

