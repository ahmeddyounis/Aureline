# Worked example: portable-state package manifest claiming Inspect-only
# import for a support-review export.
#
# Companion to docs/state/portable_state_package_contract.md and
# schemas/state/portable_state_manifest.schema.json.

__fixture__:
  name: inspect_only_support_review
  scenario: >
    A support-review export crosses the machine boundary so a support
    engineer can compare workspace state against a prior export and
    re-export a redacted copy if needed. The destination MUST NOT
    apply the package; only inspect, compare, re-export, and cancel
    are admitted.
  doc_sections:
    - "§3 Checksum and signature"
    - "§4 Redaction manifest and machine-local exclusion"
    - "§5 Cross-machine import posture"
    - "§6 Compare and export actions"

record_kind: portable_state_manifest_record
portable_state_manifest_schema_version: 1
manifest_id: portable-state-manifest-support-review-0001
manifest_label: Support review export — inspect-only with prior-export compare
package_purpose: support_review_export
destination_class: support_bundle_attachment
created_at: "mono:7500:00:00:00.0000"
producer_build:
  producer_name: aureline
  producer_version: 0.0.0-dev
  producer_channel: stable
  producer_platform_class: linux
  producer_instance_handle: producer-instance-handle-export-0004
compatibility_range:
  min_schema_version: portable-state-manifest-v1
  max_schema_version: portable-state-manifest-v1
  channel_floor: stable
  platform_class_allowance: machine_local_only
  named_platform_classes: []
  compatibility_notes: >
    Support-review packages are reviewable on any platform but apply
    only on the producing installation; off-machine destinations stay
    at inspect-only.
sections:
  - section_id: section-support-evidence-index-0001
    section_class: support_evidence_index
    section_ref: support-evidence-index-body-0001
    state_plane: local_context
    portability_class: local_only
    redaction_class: redact_to_class_label
    schema_version: support-evidence-index-v1
    last_written_at: "mono:7450:00:00:00.0000"
    fidelity_label: layout_only
    stable_pane_id: null
    size_estimate:
      estimated_bytes: 8192
      precision: exact_preflight
    checksum:
      state: checksum_available
      digest_ref: digest-section-support-evidence-index-0001
      algorithm_hint: sha256
    signature:
      state: signed_verified
      signer_ref: signer-support-key-0001
      signature_ref: signature-section-support-evidence-index-0001
    source_refs:
      workspace_authority_checkpoint_ref: workspace-authority-checkpoint-support-review-0001
      window_topology_snapshot_refs:
        - window-topology-snapshot-support-review-0001
      preserved_prior_artifact_refs: []
      restore_provenance_ref: state-restore-provenance-support-review-evidence-0001
    notes: Evidence index references logs, transcripts, and dirty-buffer journal IDs without inlining bodies.
  - section_id: section-restore-provenance-refs-support-review-0001
    section_class: restore_provenance_refs
    section_ref: restore-provenance-refs-bundle-support-review-0001
    state_plane: portable_settings
    portability_class: portable
    redaction_class: redact_value_preserve_shape
    schema_version: restore-provenance-v1
    last_written_at: "mono:7450:00:00:01.0000"
    fidelity_label: exact
    stable_pane_id: null
    size_estimate:
      estimated_bytes: 1024
      precision: exact_preflight
    checksum:
      state: checksum_available
      digest_ref: digest-section-restore-provenance-refs-support-review-0001
      algorithm_hint: sha256
    signature:
      state: signed_verified
      signer_ref: signer-support-key-0001
      signature_ref: signature-section-restore-provenance-refs-support-review-0001
    source_refs:
      workspace_authority_checkpoint_ref: workspace-authority-checkpoint-support-review-0001
      window_topology_snapshot_refs: []
      preserved_prior_artifact_refs:
        - preserved-artifact-prior-support-review-export-0001
      restore_provenance_ref: state-restore-provenance-support-review-summary-0001
    notes: Reference list of prior restore-provenance bodies the support engineer can compare against.
redaction_manifest:
  path_redaction: preserve_for_admin_only
  host_redaction: redact_to_remote_target_handle
  raw_secret_exclusion_state: enforced
  raw_credential_exclusion_state: enforced
  raw_command_line_exclusion_state: enforced
  raw_log_exclusion_state: advisory
  raw_source_content_exclusion_state: enforced
  raw_provider_payload_exclusion_state: enforced
  machine_local_exclusion_status: partial_metadata_only
  rules:
    - rule_id: rule-paths-preserved-admin-only-support-0001
      rule_class: raw_path_excluded
      enforcement_state: advisory
      scope_class: support_evidence_index
      redaction_class: redact_to_class_label
      reason: >
        Path traces are preserved for admin review under the support
        bundle attachment policy; user-visible inspector views still
        redact to class label.
    - rule_id: rule-hosts-redacted-support-0001
      rule_class: raw_host_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: redact_to_class_label
      reason: Host references are reduced to remote-target handles for review.
    - rule_id: rule-logs-advisory-support-0001
      rule_class: raw_log_excluded
      enforcement_state: advisory
      scope_class: support_evidence_index
      redaction_class: redact_to_class_label
      reason: Log excerpts may travel under opt-in policy with class-level redaction.
    - rule_id: rule-secrets-excluded-support-0001
      rule_class: raw_secret_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
      reason: Secret material never crosses the boundary even on support exports.
    - rule_id: rule-credentials-excluded-support-0001
      rule_class: raw_credential_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
      reason: Credentials never cross the boundary even on support exports.
    - rule_id: rule-command-lines-excluded-support-0001
      rule_class: raw_command_line_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
      reason: Raw command lines are excluded; class labels carry the diagnostic intent.
machine_local_exclusions:
  - exclusion_id: exclusion-credential-store-support-review-0001
    artifact_class: workspace_authority_checkpoint
    artifact_ref: artifact-credential-store-support-review-0001
    state_plane: non_portable_live_authority
    reason: credential_store_only
    substitute_class: omitted
    redaction_class: exclude_from_export
    note: Auth and credential bodies stay on the producing machine.
  - exclusion_id: exclusion-trust-approvals-support-review-0001
    artifact_class: workspace_authority_checkpoint
    artifact_ref: artifact-trust-approvals-support-review-0001
    state_plane: non_portable_live_authority
    reason: contains_live_handle
    substitute_class: redacted_summary
    redaction_class: redact_to_class_label
    note: Trust approvals are summarized to class labels; raw approval bodies stay local.
  - exclusion_id: exclusion-machine-handles-support-review-0001
    artifact_class: display_affinity_hints
    artifact_ref: artifact-machine-handles-support-review-0001
    state_plane: local_context
    reason: machine_unique_handle
    substitute_class: metadata_only
    redaction_class: exclude_from_export
    note: Machine-unique handles are recorded as metadata so support can correlate without exposing identifiers.
  - exclusion_id: exclusion-dirty-buffer-journal-support-review-0001
    artifact_class: dirty_buffer_recovery_journal
    artifact_ref: artifact-dirty-buffer-journal-support-review-0001
    state_plane: local_context
    reason: policy_excludes_export
    substitute_class: hash_or_count
    redaction_class: exclude_from_export
    note: Dirty-buffer journal bodies stay local; only counts and hashes travel for support review.
total_size_estimate:
  estimated_bytes: 9216
  precision: exact_preflight
  note: Sum of section estimates plus the manifest body.
checksum:
  state: checksum_available
  digest_ref: digest-package-support-review-0001
  algorithm_hint: blake3
signature:
  state: signed_verified
  signer_ref: signer-support-key-0001
  signature_ref: signature-package-support-review-0001
import_posture:
  posture_class: inspect_only
  downgrade_triggers:
    - destination_unsupported_section
  rollback_checkpoint_ref: null
  equivalence_map_refs: []
  preserved_prior_artifact_refs:
    - preserved-artifact-prior-support-review-export-0001
  review_required_section_refs:
    - section-support-evidence-index-0001
  notes: >
    Support-review export off the producing installation. The
    destination cannot apply; the manifest exists for inspect, compare
    against the prior export, and stricter re-export only.
restore_provenance_refs:
  - state-restore-provenance-support-review-evidence-0001
  - state-restore-provenance-support-review-summary-0001
actions:
  inspect:
    action_id: inspect
    enabled: true
    disabled_reason: not_disabled
    consequence_class: read_only
    target_ref: portable-state-manifest-support-review-0001
  compare:
    action_id: compare
    enabled: true
    disabled_reason: not_disabled
    consequence_class: read_only
    target_ref: compare-handle-support-review-vs-prior-export-0001
  compare_with_prior_export:
    action_id: compare_with_prior_export
    enabled: true
    disabled_reason: not_disabled
    consequence_class: read_only
    target_ref: compare-handle-support-review-vs-prior-export-0001
  reexport_redacted:
    action_id: reexport_redacted
    enabled: true
    disabled_reason: not_disabled
    consequence_class: builds_export
    target_ref: reexport-handle-support-review-stricter-redaction-0001
  open_inspect_only:
    action_id: open_inspect_only
    enabled: true
    disabled_reason: not_disabled
    consequence_class: read_only
    target_ref: inspect-only-handle-support-review-0001
  apply_import:
    action_id: apply_import
    enabled: false
    disabled_reason: inspect_only_posture
    consequence_class: read_only
    target_ref: null
  cancel_import:
    action_id: cancel_import
    enabled: true
    disabled_reason: not_disabled
    consequence_class: cancels_without_mutation
    target_ref: cancel-handle-support-review-0001
notes: >
  Inspect-only posture. The package supports compare against a prior
  support-review export and stricter re-export, but the destination
  MUST NOT apply the package; the typed disabled_reason
  (inspect_only_posture) is the canonical answer to why apply_import
  is unavailable.
