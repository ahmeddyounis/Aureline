  raw_provider_payload_exclusion_state: enforced
  machine_local_exclusion_status: placeholder_only
  rules:
    - rule_id: rule-paths-excluded-layout-export-0001
      rule_class: raw_path_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
      reason: Workspace layout exports never carry raw absolute paths.
    - rule_id: rule-hosts-excluded-layout-export-0001
      rule_class: raw_host_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
