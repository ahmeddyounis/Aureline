    - rule_id: rule-machine-unique-handle-excluded-0001
      rule_class: machine_unique_handle_excluded
      enforcement_state: enforced
      scope_class: all_sections
      redaction_class: exclude_from_export
      reason: Display affinity hints are best-effort metadata only and never travel as authority.
    - rule_id: rule-source-content-redacted-layout-export-0001
      rule_class: raw_source_content_excluded
      enforcement_state: enforced
      scope_class: workspace_manifest
      redaction_class: ui_string_only
      reason: Workspace manifest body is reduced to a reviewable UI-string view.
machine_local_exclusions:
