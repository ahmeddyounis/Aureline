# Worked example: portable-state package manifest claiming Downgraded
# import because the destination cannot apply a missing extension and
# falls outside the channel floor for the layout preset.
#
# Companion to docs/state/portable_state_package_contract.md and
# schemas/state/portable_state_manifest.schema.json.

__fixture__:
  name: downgraded_workspace_layout_export
  scenario: >
    A workspace layout export from the producer's stable channel toward
    a destination on the experimental channel. The portable layout
    preset and the workspace manifest still apply; the saved view that
    depends on a missing extension is excluded; the channel-floor
    violation forces the layout preset to apply with a downgrade
    trigger so the destination knows what was narrowed.
  doc_sections:
    - "§2 Selected sections"
    - "§4 Redaction manifest and machine-local exclusion"
    - "§5 Cross-machine import posture"

