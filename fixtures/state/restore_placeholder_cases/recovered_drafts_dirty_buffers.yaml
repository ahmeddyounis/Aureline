# Worked example: restore-provenance record claiming Recovered drafts.
#
# Companion to docs/state/restore_provenance_and_placeholder_contract.md
# and schemas/state/restore_provenance_record.schema.json.
#
# A workspace-shared manifest bundle reopened after an unclean
# shutdown. Dirty-buffer journals rehydrated as drafts the user must
# compare or accept; preserved prior artifacts retain the prior draft
# state so the rollback note remains reachable. No live missing
# dependencies — the placeholder rows here cover the workspace-
# authority slot that did not rebind so the user can compare the
# rehydrated drafts against the preserved checkpoint.

__fixture__:
  name: recovered_drafts_dirty_buffers
  scenario: >
    A workspace-shared manifest bundle reopened after an unclean
    shutdown. Two dirty-buffer journals rehydrated as drafts that the
    user must compare or accept before they ride as workspace truth.
    The workspace-authority checkpoint required by a third pane was
    not yet available on this machine, so a missing-workspace-authority
    placeholder card preserves the original pane id, role, and surface
    class.
  doc_sections:
    - "§3 Compatibility-restore downgrade vocabulary"
    - "§4 Missing-dependency placeholder cards"
    - "§7 Preserved prior artifacts and rollback notes"

