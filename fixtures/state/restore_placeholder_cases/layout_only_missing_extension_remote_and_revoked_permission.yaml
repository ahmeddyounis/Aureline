# Worked example: restore-provenance record claiming Layout only after
# missing-extension, missing-remote-target, and revoked-permission
# placeholder cards covered three panes.
#
# Companion to docs/state/restore_provenance_and_placeholder_contract.md
# and schemas/state/restore_provenance_record.schema.json.
#
# Window topology, stable pane ids, and tab order survived. Three live
# surfaces could not hydrate: a preview pane needed an extension that
# is not installed, a notebook pane needed a remote kernel that is
# unreachable, and a project-permissions inspector lost its delegated
# approval.
#
# Each missing dependency emits one placeholder card preserving the
# original pane id, role, surface class, evidence posture, and the
# closed recovery actions. Live authority and secret material stay
# recorded as intentional exclusions, distinct from the missing-
# dependency rows.

__fixture__:
  name: layout_only_missing_extension_remote_and_revoked_permission
  scenario: >
    A session-restore manifest reopened after a multi-day gap. Layout
    truth survived, but three live surfaces required dependencies that
    were no longer available: an extension-backed preview, a remote
    notebook kernel, and a delegated approval for a permissions
    inspector. Each pane held its slot as a missing-dependency
    placeholder card with typed recovery actions.
  doc_sections:
    - "§3 Compatibility-restore downgrade vocabulary"
    - "§4 Missing-dependency placeholder cards"
    - "§6 Intentional exclusions"

