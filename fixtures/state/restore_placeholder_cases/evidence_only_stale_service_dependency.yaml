# Worked example: restore-provenance record claiming Evidence only.
#
# Companion to docs/state/restore_provenance_and_placeholder_contract.md
# and schemas/state/restore_provenance_record.schema.json.
#
# A support-recovery bundle reopened on a triage machine. No live
# restore was attempted; only transcripts, snapshots, refs, and
# provenance survived. Every live surface row is covered by a missing-
# dependency placeholder card that names the typed recovery actions.
# Live authority and secret material are recorded as intentional
# exclusions, distinct from the missing-dependency rows.

__fixture__:
  name: evidence_only_stale_service_dependency
  scenario: >
    A support-recovery bundle was opened on a triage machine after the
    upstream environment went offline. Three live surfaces stayed as
    placeholder cards: a debug-session inspector that depended on a
    stale managed service, a docs-pack pane whose content provider is
    deprecated, and a remote-explorer pane whose target is unreachable.
    No live authority was reacquired; the bundle exposes evidence and
    typed recovery actions only.
  doc_sections:
    - "§3 Compatibility-restore downgrade vocabulary"
    - "§4 Missing-dependency placeholder cards"
    - "§6 Intentional exclusions"

