# Worked example: restore-provenance record claiming Compatible
# restore after a portable profile travelled across producer schema
# versions.
#
# Companion to docs/state/restore_provenance_and_placeholder_contract.md
# and schemas/state/restore_provenance_record.schema.json.
#
# Settings, keybindings, and snippets translated through a declared
# equivalence map. A rollback checkpoint and preserved prior artifact
