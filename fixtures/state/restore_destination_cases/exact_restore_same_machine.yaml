# Worked example: restore-destination review claiming Exact restore.
#
# Companion to docs/state/restore_destination_review_contract.md and
# schemas/state/restore_destination_review.schema.json.
#
# A locally-emitted portable-state package reopened on the same
# machine. Every reviewable class round-trips without translation,
# placeholder, review, or overwrite of durable user state. The
# checkpoint-before-overwrite gate is not_applicable because no row's
# treatment overwrites or merges; every row is retained_unchanged or
# omitted. The destination-review outcome is the only one that admits
# a confirm_overwrite action with no checkpoint required.

__fixture__:
  name: exact_restore_same_machine
  scenario: >
    A locally-emitted portable-state package was reopened on the same
    machine where it was produced. Profile defaults, layout topology,
    workspace-shared truth, evidence-packet refs, caches, and
    machine-local assets all round-trip without translation. No row's
    treatment requires a checkpoint and the gate state stays
    not_applicable.
  doc_sections:
    - "§2 Provenance core fields"
    - "§3 Reviewable classes"
    - "§5 Treatment vocabulary"
    - "§6 Destination-review outcome"

