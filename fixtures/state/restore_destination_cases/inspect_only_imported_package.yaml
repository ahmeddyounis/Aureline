# Worked example: restore-destination review claiming Inspect only
# imported package.
#
# Companion to docs/state/restore_destination_review_contract.md and
# schemas/state/restore_destination_review.schema.json.
#
# An imported competitor profile bundle was opened on Aureline. The
# bundle's package_purpose admits inspect_only on this destination
# class; no apply will run. Every reviewable class lands as
# inspect_only_overlay or omitted; the checkpoint gate is
# not_applicable; confirm_overwrite is disabled with
# inspect_only_outcome. Reviewers can still compare against existing
# state and export for record-keeping.

__fixture__:
  name: inspect_only_imported_package
  scenario: >
    An imported competitor profile bundle was opened on a destination
    that admits inspect-only review of foreign packages. Every
    reviewable class lands as inspect_only_overlay or omitted; the
    reviewer can compare and export but cannot confirm overwrite.
  doc_sections:
    - "§5 Treatment vocabulary"
    - "§6 Destination-review outcome"
    - "§8 Review-action set"

