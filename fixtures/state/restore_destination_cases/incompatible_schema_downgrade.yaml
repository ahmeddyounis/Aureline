# Worked example: restore-destination review claiming Incompatible
# schema downgrade.
#
# Companion to docs/state/restore_destination_review_contract.md and
# schemas/state/restore_destination_review.schema.json.
#
# A portable-state package was emitted by a newer producer than the
# destination admits. The producer refused to emit a downgraded schema
# body, so the destination cannot apply it. Every reviewable class
# lands as downgraded_to_compare_only or omitted; the checkpoint gate
# is not_applicable because no apply runs; confirm_overwrite is
# disabled with compatibility_range_outside.

__fixture__:
  name: incompatible_schema_downgrade
  scenario: >
    A portable-state package emitted by a newer producer was opened on
    a destination whose admitted schema range stops below the package
    schema version. The producer refused to emit a downgraded schema
    body. The reviewer can compare and export every class against the
    destination's existing state, but no apply will run.
  doc_sections:
    - "§5 Treatment vocabulary"
    - "§6 Destination-review outcome"
    - "§7 Checkpoint-before-overwrite gate"
    - "§8 Review-action set"

