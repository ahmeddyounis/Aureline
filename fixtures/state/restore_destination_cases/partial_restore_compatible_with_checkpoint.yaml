# Worked example: restore-destination review claiming Partial restore.
#
# Companion to docs/state/restore_destination_review_contract.md and
# schemas/state/restore_destination_review.schema.json.
#
# A portable-state package brought to a different machine. Profile
# defaults translated through a declared equivalence map; workspace
# state was overwritten with the source body and a mandatory
# workspace-authority checkpoint protected the prior body. Layout
# topology survived but two live surfaces stand in as placeholder
# cards (a missing extension and an unreachable remote kernel).
# Caches stay retained (disposable_derived); machine-local assets are
# omitted because the source carried no machine-local body.
#
# The checkpoint-before-overwrite gate is in state created with a
# named workspace-authority-checkpoint ref so confirm_overwrite is
# admitted; the reviewer can roll back to the preserved prior workspace
# body if needed.

__fixture__:
  name: partial_restore_compatible_with_checkpoint
  scenario: >
    A portable-state package was brought to a different machine for
    the same user. Workspace authority was overwritten with the source
    body after a mandatory checkpoint snapshot of the prior body.
    Profile defaults merged through an equivalence map. Two live
    surfaces (a graph-preview pane and a remote python notebook) stand
    in as placeholder rows because their dependencies are unavailable
    on the new machine.
  doc_sections:
    - "§3 Reviewable classes"
    - "§5 Treatment vocabulary"
    - "§6 Destination-review outcome"
    - "§7 Checkpoint-before-overwrite gate"

