# Worked example: restore-after-downgrade packet for a workspace
# task-and-launch-config migration that translated through an
# equivalence map; one task entry escalated to manual review.
#
# Companion to docs/state/durable_state_compatibility_contract.md and
# schemas/state/restore_after_downgrade_packet.schema.json.
#
# A workspace tasks_and_launch_configs body crosses a schema migration
# in which a deprecated launch field maps to two new fields. One task
# entry has both legacy fields populated; the equivalence map cannot
# decide and the row escalates to manual_review_required, keeping the
# preserved body reachable for compare and repair.

__fixture__:
  name: workspace_tasks_compatible_migration_with_backup
  scenario: >
    Workspace-authored durable manifest crosses a destructive migration.
    Most rows translate compatibly; one task entry escalates to manual
    review because the equivalence map cannot decide between two
    candidate fields without user input.
  doc_sections:
    - "§2.2 workspace_authored_durable_state"
    - "§3 Backup-before-migrate matrix"
    - "§4 Restore-after-downgrade packet shape"
    - "§6 Seed cases"

record_kind: restore_after_downgrade_packet_record
restore_after_downgrade_schema_version: 1
