schema_version: 1
record_kind: mutation_journal_case_record
entry_id: journal:tooling_unattributed_metadata_write
title: External tool metadata write whose actor and authority could not be attributed (unattributed)
source_lane: automated_tooling
actor_class: unknown_actor
authority_class: provider_overlay
entry_kind: metadata_write
group_size: 1
affected_paths:
  - .aureline/workspace_state/last_run.json
recovery_class: requires_user_resolution
attribution_state: unattributed
replayability_state: requires_manual_inspection
consumer_surface: crash_report
captured_at: "2026-05-16T10:25:00Z"
reviewer_summary: >-
  After a hard crash, the journal recovered evidence of a metadata
  write under a provider overlay but could not attribute the actor.
  The row downgrades with red_blocks_beta_row, declares recovery as
  requires_user_resolution, and records attribution_pending. The
  crash report quotes the audit fields so a responder can decide
  whether to keep, revert, or quarantine the write rather than
  silently resetting the workspace.
support_export:
  includes_entry_id: true
  includes_source_lane: true
  includes_actor_class: true
  includes_authority_class: true
  includes_recovery_class: true
  includes_replayability_state: true
  includes_affected_paths: true
  raw_payload_excluded: true
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  preserves_user_authored_files: true
downgrade_label: red_blocks_beta_row
open_gaps:
  - gap_class: attribution_pending
    summary: >-
      The crash-recovery journal could not attribute the actor or a
      named tool to this metadata write; the row is blocked from
      automatic recovery until attribution is restored or the user
      explicitly accepts the write.
safety:
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  destructive_resets_present: false
  preserves_user_authored_files: true
references:
  doc_ref: docs/state/m3/mutation_journal_beta.md
  schema_ref: schemas/state/mutation_journal.schema.json
  report_ref: artifacts/support/m3/mutation_journal_beta_report.md
