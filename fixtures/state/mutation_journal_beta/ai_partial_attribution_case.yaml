schema_version: 1
record_kind: mutation_journal_case_record
entry_id: journal:ai_partial_attribution_tool_use
title: AI tool-call write whose tool identity could not be attributed (partial attribution)
source_lane: ai_assistant
actor_class: ai_agent
authority_class: buffer_editor
entry_kind: multi_file_write
group_size: 2
affected_paths:
  - crates/example/src/policy.rs
  - crates/example/src/policy_test.rs
recovery_class: compensation
attribution_state: partially_attributed
replayability_state: requires_manual_inspection
consumer_surface: recovery_ladder
captured_at: "2026-05-16T10:20:00Z"
reviewer_summary: >-
  An AI assistant ran an internal tool call that produced two file
  writes, but the journal could only attribute the actor and the
  authority — the specific tool identity was lost before the journal
  fielded the entry. The row downgrades with yellow_partial_attribution
  and records attribution_pending so the recovery ladder surfaces the
  attribution gap instead of pretending the entry is fully audited.
  Replay requires operator inspection because we cannot yet prove the
  inverse compensation is safe for the missing tool identity.
support_export:
  includes_entry_id: true
  includes_source_lane: true
  includes_actor_class: true
