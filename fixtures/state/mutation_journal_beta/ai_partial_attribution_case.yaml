  includes_recovery_class: true
  includes_replayability_state: true
  includes_affected_paths: true
  raw_payload_excluded: true
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  preserves_user_authored_files: true
downgrade_label: yellow_partial_attribution
open_gaps:
  - gap_class: attribution_pending
    summary: >-
      The journal recorded the AI actor and the buffer-editor
      authority but lost the specific tool identity that performed
      the write; attribution recovery is pending.
safety:
