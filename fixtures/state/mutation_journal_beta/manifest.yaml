# Mutation-journal beta corpus manifest.
# Each case groups one material multi-file or tool-driven write and binds
# it to a source_lane, actor_class, authority_class, entry_kind, recovery
# class (exact_undo, compensation, regeneration, checkpoint_restore,
# requires_user_resolution), attribution_state, replayability_state,
# primary consumer_surface, a metadata-safe support_export projection,
# and a closed downgrade_label drawn from the mutation-journal vocabulary.

schema_version: 1
manifest_id: state.mutation_journal.beta_cases.v1
status: protected
overview_page: docs/state/m3/mutation_journal_beta.md
crate_consumer: crates/aureline-reactive-state/src/mutation_journal/mod.rs
schema_ref: schemas/state/mutation_journal.schema.json
report_ref: artifacts/support/m3/mutation_journal_beta_report.md

required_source_lanes:
  - ai_assistant
  - interactive_refactor
  - automated_tooling

required_recovery_classes:
  - exact_undo
  - compensation
  - regeneration
  - checkpoint_restore

required_consumer_surfaces:
  - incident_packet
  - support_bundle
  - doctor_probe
  - crash_report
  - recovery_ladder

case_files:
  - ai_multifile_extract_method_case.yaml
  - interactive_refactor_rename_case.yaml
  - automated_formatter_pass_case.yaml
  - ai_bulk_paste_checkpoint_restore_case.yaml
  - ai_partial_attribution_case.yaml
  - tooling_unattributed_case.yaml

required_case_assertions:
  - every_required_source_lane_has_at_least_one_case
  - every_required_recovery_class_has_at_least_one_case
  - every_required_consumer_surface_has_at_least_one_case
  - at_least_one_case_declares_attribution_state_partially_attributed
  - at_least_one_case_declares_attribution_state_unattributed
  - support_export_preserves_entry_id_source_lane_actor_class_authority_class_recovery_class_replayability_state_and_affected_paths
  - downgrade_label_is_drawn_from_the_closed_mutation_journal_vocabulary
  - open_gaps_are_drawn_from_the_closed_open_gap_class_vocabulary
  - report_record_excludes_raw_payload_raw_private_material_and_ambient_authority

source_contract_refs:
  schema: schemas/state/mutation_journal.schema.json
  reviewer_doc: docs/state/m3/mutation_journal_beta.md
  baseline_report: artifacts/support/m3/mutation_journal_beta_report.md
