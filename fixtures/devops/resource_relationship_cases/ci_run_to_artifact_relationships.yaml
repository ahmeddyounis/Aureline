      environment_name: staging
      slice_id: services
    source_path: null
    digest_or_generation: overlay:refreshed_at:2026-05-01T14:32:09Z

edges:
  - edge_class: source_to_run
    from_object_id: src:ci:workflow:build_and_deploy
    to_object_id: overlay:ci:run:gha:987654321
    required: true

  - edge_class: run_to_artifact
    from_object_id: overlay:ci:run:gha:987654321
    to_object_id: overlay:ci:artifact:gha:987654321:aureline_cli_linux_x64
    required: true

  - edge_class: env_to_resource_slice
    from_object_id: src:env:staging
    to_object_id: overlay:env_slice:staging:services
    required: true

resource_relationships:
  - relationship_state: authored_to_live
    source_resource:
      truth_class: authored
      resource_ref: src:ci:workflow:build_and_deploy
