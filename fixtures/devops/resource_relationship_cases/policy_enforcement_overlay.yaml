    source_set:
      - path: policy/admission/deny-privileged.rego
        digest: sha256:src-policy-rego-v2
      - path: policy/admission/policy.yaml
        digest: sha256:src-policy-yaml-v1
    tool_identity:
      tool_name: opa
      tool_version: 0.65.0
      tool_digest: sha256:tool-opa-0.65.0
    invalidation_epoch: epoch:policy:admission:2026-05-01T13:05:00Z

objects:
