# Resource-relationship case: policy enforcement overlays.
#
# Exercises:
#   - Source class: policy_and_access_configs
#   - Derived edges: policy_to_target_resource, policy_to_enforcement_result
#   - Explicit no_source_match when the enforcement signal cannot be mapped
#     back to a known source policy.

schema_version: 1

__fixture__:
  name: policy_enforcement_overlay
  scenario: >
    A repo-owned admission policy targets a Kubernetes Deployment and a live
    enforcement signal is observed. When an enforcement event cannot be mapped
    back to a known policy source, the relationship is explicitly recorded as
    no_source_match rather than implied.
  exercised_source_classes:
    - policy_and_access_configs
    - kubernetes_manifests
  exercised_derived_edges:
    - policy_to_target_resource
    - policy_to_enforcement_result
    - object_to_live_resource

matrix_ref: artifacts/devops/resource_relationship_matrix.yaml

generated_objects:
