__fixture__:
  name: blocked_cleanup_pinned_or_protected_event
  scenario: >
    User-initiated clear-data review on a single workspace was
    blocked because every candidate row was either pinned or
    protected. The event_class is cleanup_blocked_pinned_or_protected;
    bytes_reclaimed_total and entries_reclaimed_total are zero;
    the blocked_items_summary names three reasons in product
    terms: blocked_evidence_class_specific_review_required (an
    evidence packet on the workspace), blocked_authoritative_user_owned_clear_refused
    (the local recovery journal), and blocked_user_pinned_indefinite
    (a user-pinned knowledge-cache index). The
    evidence_disclosure_class is
    evidence_class_blocked_class_specific_review_pending so durable
    evidence is not mistaken for ordinary cache eviction. Deployment
    context is local_only_individual.
  contract_sections:
    - "§4 The cleanup-history event record"
    - "§4.4 blocked_items_summary[]"
    - "§9 Cleanup-history vocabulary"
    - "§10 Actor framing"
    - "§11 Deployment-context block"
    - "§12 Cross-record invariants"
    - "§13 Worked acceptance scenarios"
  exercised_axes:
    event_class: cleanup_blocked_pinned_or_protected
    actor_class: user_clear_data_review
    actor_framing_class: user_acted
    evidence_disclosure_class: evidence_class_blocked_class_specific_review_pending
    framing_class: local_only_individual
