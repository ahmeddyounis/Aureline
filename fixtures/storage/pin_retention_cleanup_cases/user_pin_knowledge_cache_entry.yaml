    the live state is never_expires_indefinite, and the only
    admissible unpin path is user_unpin_self. The class is
    disposable knowledge cache, so the evidence-export class is
    not_applicable_disposable and the open_export_path_action is
    null. Deployment context is local_only_individual.
  contract_sections:
    - "§3 The pin / retention entry record"
    - "§5 pin_kind_class to pin_source_class pairings"
    - "§6 Pin-expiry vocabulary"
    - "§7 unpin_path_class"
    - "§8 evidence_export_class"
    - "§10 Actor framing"
    - "§11 Deployment-context block"
    - "§13 Worked acceptance scenarios"
  exercised_axes:
    pin_kind_class: user_pin
    pin_source_class: explicit_user_pin
    pin_expiry_class: expiry_user_unpin_only_indefinite
    expires_at_state_class: never_expires_indefinite
    framing_class: local_only_individual
