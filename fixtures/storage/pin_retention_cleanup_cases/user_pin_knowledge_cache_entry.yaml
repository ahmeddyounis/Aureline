__fixture__:
  name: user_pin_knowledge_cache_entry
  scenario: >
    User-declared indefinite pin on a knowledge-cache search index
    for the single-workspace local profile. The user opened the pin
    manager and pinned the index so it would survive low-disk
    trimming during a long-running review session. Pin source is
    explicit_user_pin, the actor is user_pin_manager_action with
    user_acted framing, the expiry class is
