$schema: "https://aureline.dev/schemas/storage/pin_retention_entry.schema.json"
__fixture__:
  name: offline_bundle_pin_mirror_segment_entry
  scenario: >
    Offline-bundle pin on a mirrored docs-pack segment in a
    mirrored / offline air-gapped install. The pin source is
    offline_bundle_ref, the referenced object is an
    offline_bundle_segment_node, the surface MUST surface the
    mirror_or_offline_pack_visible token and link the matching
    mirror_offline_artifact_row by ref. The actor is the cache
    manager registering the pin under the offline-bundle validity
    window (anchor offline_bundle_validity_window). The expiry
    class is expiry_required_with_anchor and the live state is
    active_within_window. The unpin path is offline_bundle_unpin_required
    so the user cannot release the pin without consulting the
    offline-bundle policy. The class is artifact_cache /
    disposable_derived_cache, so the evidence-export class is
    not_applicable_disposable.
  contract_sections:
    - "§3 The pin / retention entry record"
    - "§3.5 protected_class_visibility[]"
    - "§5 pin_kind_class to pin_source_class pairings"
    - "§6 Pin-expiry vocabulary"
    - "§7 unpin_path_class"
    - "§11 Deployment-context block"
    - "§12 Cross-record invariants"
  exercised_axes:
    pin_kind_class: release_or_offline_bundle_pin
    pin_source_class: offline_bundle_ref
    pin_expiry_class: expiry_required_with_anchor
    expires_at_state_class: active_within_window
    framing_class: managed_policy_air_gapped
