  scenario: >
    Low-disk trimming removed unpinned artifact_cache entries that include symbol bundles.
    When support tooling attempts an exact-build lookup, the required local symbol bundle is
    missing and must be refetched. The packet discloses the dependency and the storage class
    that caused it so supportability never depends on an unspoken cache.
