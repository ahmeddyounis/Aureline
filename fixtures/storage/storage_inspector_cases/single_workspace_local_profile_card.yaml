# yaml-language-server: $schema=../../../schemas/storage/storage_inspector_card.schema.json
$schema: "https://aureline.dev/schemas/storage/storage_inspector_card.schema.json"
__fixture__:
  name: single_workspace_local_profile_card
  scenario: >
    Desktop-local single-workspace baseline. Inspector renders the
    storage card for one workspace on an individual_local deployment.
    Total used is 850 MiB across six classes; the user-owned recovery
    journal is the authority-first largest consumer ahead of the
    larger search-index corpus, prebuild layers, and extension pack;
    evidence support cache sits at zero bytes but stays visible per
    the protected-class visibility guarantee. Quota is a user-local
    per-workspace quota; no admin policy or tenant policy bounds it.
  contract_sections:
    - "§3 The storage-inspector card record"
    - "§3.2 inspector_scope (closed)"
    - "§3.3 quota_or_policy_source (closed)"
    - "§3.5 protected_class_visibility[] (closed)"
    - "§5.4 Authority-aware ordering"
    - "§7.1 Authoritative state is never collapsed into disposable total"
    - "§8 Workspace / profile / tenant scope rules"
record_kind: storage_inspector_card_record
storage_inspector_card_schema_version: 1
card_id: "card.storage.single_workspace_local_profile"
emitted_at: "2026-04-29T00:00:00Z"
inspector_scope:
  scope_class: workspace_only
  scope_ref: "ws.local.aurelia_web"
  scope_label: "Workspace: aurelia/web (local)"
total_used_bytes: 891289600
quota_or_policy_source:
