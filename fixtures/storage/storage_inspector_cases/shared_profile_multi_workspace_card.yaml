__fixture__:
  name: shared_profile_multi_workspace_card
  scenario: >
    Shared user profile with three workspaces on an enterprise online
    deployment. Inspector renders a device_total card. Total used is
    7.20 GiB across six classes. Largest consumers span three distinct
    workspace ids (aurelia/web, aurelia/api, design-tokens), one
    extension pack, and one open support-bundle assembly in flight;
    the support assembly is authoritative-no-rebuild and authority-
    aware ordering puts both user_owned_recovery_state consumers and
    the support-bundle row ahead of the larger disposable caches.
    Quota is the device-governor global ceiling.
  contract_sections:
    - "§3 The storage-inspector card record"
    - "§3.2 inspector_scope (closed)"
    - "§3.5 protected_class_visibility[] (closed)"
    - "§5.4 Authority-aware ordering"
    - "§7.1 Authoritative state is never collapsed into disposable total"
    - "§7.3 Protected classes stay visible"
