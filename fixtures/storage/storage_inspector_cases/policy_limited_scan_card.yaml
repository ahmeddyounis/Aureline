# yaml-language-server: $schema=../../../schemas/storage/storage_inspector_card.schema.json
$schema: "https://aureline.dev/schemas/storage/storage_inspector_card.schema.json"
__fixture__:
  name: policy_limited_scan_card
  scenario: >
    Managed-cloud tenant whose admin policy restricts user-level
    enumeration of evidence_support_cache and the in-flight support-
    bundle assembly. The user-level scan ran without admin consent;
    those classes appear with posture missing and a typed
    low_privilege_admin_consent_required scan reason. The card
    surfaces an admin_storage_console consumer so the request-consent
    affordance is reachable; it does not silently report zero bytes
    for the admin-bound classes. Evidence-class bytes that ARE
    user-visible (e.g. the user's local crash payloads) sit in a
    separate row left unscannable here.
  contract_sections:
    - "§3 The storage-inspector card record"
    - "§3.6 consumer_surface_class (closed)"
    - "§6 The scan-posture block"
    - "§7.6 Stale, partial, and low-privilege scans are surfaced, never hidden"
    - "§7.7 Low-privilege scans surface a consent affordance"
    - "§11 Stale, partial, and low-privilege scans"
