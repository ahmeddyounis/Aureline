__fixture__:
  name: mirror_heavy_offline_install_card
  scenario: >
    Air-gapped install whose artifact_cache and prebuild_environment_
    cache are dominated by signed offline-bundle segments and a
    customer-signed mirror snapshot (docs pack and policy bundle).
    The largest consumers are mirror_snapshot_segment and
    offline_bundle_segment rows, each linked to a deployment-summary
    mirror_offline_artifact_row_record so signer / digest / freshness
    posture is one record. None of the mirror or offline-bundle
    bytes are eligible for a generic clear; clear-cache protection is
    pinned at generic_clear_with_pin_exclusions and a class-specific
    review is the only path.
  contract_sections:
    - "§3 The storage-inspector card record"
    - "§4.3 mirror_or_import_origin_class (closed)"
    - "§7.2 Mirrored, imported, and policy-protected artifacts cannot appear as disposable"
    - "§10 Mirrored / imported / policy-protected artifacts"
