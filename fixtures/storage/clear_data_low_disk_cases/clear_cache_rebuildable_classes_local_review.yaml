# yaml-language-server: $schema=../../../schemas/storage/clear_data_review.schema.json
$schema: "https://aureline.dev/schemas/storage/clear_data_review.schema.json"
__fixture__:
  name: clear_cache_rebuildable_classes_local_review
  scenario: >
    Class-selective clear-data review on the single-workspace local
    profile. The user selected the four disposable classes
    (interactive_hot_cache, knowledge_cache, artifact_cache,
    prebuild_environment_cache). Per-class projection rows render
    rebuilt_after_clear with embedded rebuild-cost hints —
    cheap-to-rebuild for the hot cache, expensive-but-safe for the
    knowledge cache, expensive-but-safe for the artifact cache, and
    expensive-but-safe for the prebuild environment. Protected-class
    refusals enumerate evidence_support_cache (class-specific review
    required) and user_owned_recovery_state (authoritative-user-
    owned clear refused) so neither class can be silently included.
    Recovery / export options offer the class-specific review path.
    Confirm carries removes_disposable_cache,
    removes_rebuildable_derived_state, and
    preserves_authoritative_state. Deployment context is
    local_only_individual.
  contract_sections:
    - "§3 The clear-data review record"
    - "§3.3 protected_class_refusals[]"
    - "§3.4 recovery_export_options[]"
    - "§3.5 confirm_clear_action and cancel_action"
    - "§5 The per-class projection row shape"
    - "§7 The deployment-context block"
    - "§9 Cross-record invariants"
    - "§10 Local-only, mirrored / offline, and managed-policy contexts"
    - "§11 Worked acceptance scenarios"
