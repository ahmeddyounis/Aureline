# yaml-language-server: $schema=../../../schemas/storage/clear_data_review.schema.json
$schema: "https://aureline.dev/schemas/storage/clear_data_review.schema.json"
__fixture__:
  name: policy_protected_evidence_managed_tenant_review
  scenario: >
    Class-selective clear-data review on a managed-tenant install
    (enterprise_online deployment, customer_tenant scope). The user
    selected the four disposable classes; per-class projection rows
    show rebuilt_after_clear with embedded rebuild-cost hints. The
    artifact_cache row carries pinned_excluded bytes for an admin-
    pinned policy bundle and a customer-mirrored docs pack;
    pin_source_breakdown enumerates the explicit_admin_policy_pin
    and offline_bundle_ref pin sources, and the matching
    mirror_or_offline_pin_excluded refusal is listed. The evidence
    row carries blocked_protected_export_required because the open
    case holds an authoritative evidence packet, forcing the
    export_required_before_clear_offered recovery option and the
    irreversible-warning gate on confirm. Deployment context is
    managed_policy.
  contract_sections:
    - "§3 The clear-data review record"
    - "§3.3 protected_class_refusals[]"
    - "§3.4 recovery_export_options[]"
    - "§3.5 confirm_clear_action and cancel_action"
    - "§5 The per-class projection row shape"
    - "§7 The deployment-context block"
    - "§9 Cross-record invariants"
    - "§10 Local-only, mirrored / offline, and managed-policy contexts"
    - "§11 Worked acceptance scenarios"
record_kind: clear_data_review_record
clear_data_review_schema_version: 1
review_id: "review.storage.managed_tenant.policy_protected_evidence.001"
emitted_at: "2026-04-29T04:45:00Z"
parent_card_id_ref: "card.storage.managed_tenant.aurelia_enterprise"
review_scope:
  scope_class: tenant_only
  scope_ref: "tenant.aurelia_enterprise.primary"
  scope_label: "Tenant: aurelia/enterprise (primary)"
selected_class_ids:
  - interactive_hot_cache
  - knowledge_cache
  - artifact_cache
  - prebuild_environment_cache
affected_workspaces:
  - scope_class: tenant_only
    scope_ref: "tenant.aurelia_enterprise.primary"
    scope_label: "Tenant: aurelia/enterprise (primary)"
class_projection_rows:
  - class_projection_row_id: "row.review.mt.interactive_hot_cache"
    storage_class_id: interactive_hot_cache
    class_consequence_state: rebuilt_after_clear
    consequence_state_label_class: label_rebuilt_with_cost
    lost_after_clear_bytes: 0
    rebuilt_after_clear_bytes: 16777216
    retained_unchanged_bytes: 0
    pinned_excluded_bytes: 0
    blocked_protected_bytes: 0
    pin_source_breakdown: []
    rebuild_cost_hint:
      record_kind: rebuild_cost_hint_record
      rebuild_cost_hint_schema_version: 1
      rebuild_cost_class: low_rebuild_cost
      offline_rebuild_risk_class: safe_to_remove_offline
      startup_impact_class: slower_first_open_until_warm
      provenance_continuity_class: not_applicable_disposable_no_provenance
      rebuild_inputs_required:
        - local_workspace_source
      rebuild_safety_summary_class: cheap_to_rebuild_safe_to_remove
      rebuild_explanation: >
        Disposable hot-cache shards rebuild on-demand. First open
        feels slower until the hot cache rewarms.
    affected_entry_refs:
      - "tenant.aurelia_enterprise.primary.hot_cache.viewport_atlas"
    class_label: "Interactive hot cache — aurelia/enterprise"
    consequence_sentence: >
      Hot-cache shards will be removed and rebuilt on-demand.
  - class_projection_row_id: "row.review.mt.knowledge_cache"
    storage_class_id: knowledge_cache
    class_consequence_state: rebuilt_after_clear
    consequence_state_label_class: label_rebuilt_with_cost
    lost_after_clear_bytes: 0
    rebuilt_after_clear_bytes: 209715200
    retained_unchanged_bytes: 0
    pinned_excluded_bytes: 0
    blocked_protected_bytes: 0
    pin_source_breakdown: []
    rebuild_cost_hint:
      record_kind: rebuild_cost_hint_record
      rebuild_cost_hint_schema_version: 1
      rebuild_cost_class: high_rebuild_cost
      offline_rebuild_risk_class: safe_to_remove_offline
      startup_impact_class: slower_first_query_until_reindexed
      provenance_continuity_class: provenance_preserved_rebuild_from_local_truth
      rebuild_inputs_required:
        - local_workspace_source
      rebuild_safety_summary_class: expensive_to_rebuild_but_safe
      rebuild_explanation: >
        Knowledge index rebuilds from on-device tenant workspace
        source. Provenance is preserved.
    affected_entry_refs:
      - "tenant.aurelia_enterprise.primary.knowledge.search_index"
    class_label: "Knowledge index — aurelia/enterprise"
    consequence_sentence: >
      Knowledge index will be removed and rebuilt from local
      workspace source.
  - class_projection_row_id: "row.review.mt.artifact_cache"
    storage_class_id: artifact_cache
    class_consequence_state: pinned_excluded
    consequence_state_label_class: label_pinned_excluded_named
    lost_after_clear_bytes: 0
    rebuilt_after_clear_bytes: 0
    retained_unchanged_bytes: 0
    pinned_excluded_bytes: 524288000
    blocked_protected_bytes: 0
    pin_source_breakdown:
      - pin_source_class: explicit_admin_policy_pin
        pinned_bytes: 209715200
        pin_ref_summary_id: "pin.mt.admin_policy.docs_pack_2026"
        pin_label: "Admin-pinned docs pack — aurelia/enterprise 2026"
        notes: "Admin policy pins the docs-pack mirror segment."
      - pin_source_class: offline_bundle_ref
        pinned_bytes: 314572800
        pin_ref_summary_id: "pin.mt.offline_bundle.toolchain_pack_2026"
        pin_label: "Offline-bundle pin — toolchain pack 2026"
        notes: "Customer-signed offline bundle holds the toolchain pack."
    rebuild_cost_hint:
      record_kind: rebuild_cost_hint_record
      rebuild_cost_hint_schema_version: 1
      rebuild_cost_class: high_rebuild_cost
      offline_rebuild_risk_class: rebuild_requires_mirror_or_offline_bundle
      startup_impact_class: feature_unavailable_until_rebuilt
      provenance_continuity_class: provenance_preserved_rebuild_from_signed_source
      rebuild_inputs_required:
        - customer_signed_mirror
        - offline_bundle_local
      rebuild_safety_summary_class: impossible_to_rebuild_offline
      rebuild_explanation: >
        Pinned mirror and offline-bundle segments are excluded from
        the generic clear. Removing them would require a customer-
        signed mirror or an offline-bundle reload before the
        feature is available again.
    affected_entry_refs:
      - "tenant.aurelia_enterprise.primary.artifact_cache.docs_pack_2026"
      - "tenant.aurelia_enterprise.primary.artifact_cache.toolchain_pack_2026"
    class_label: "Artifact cache — pinned mirror and offline-bundle segments"
    consequence_sentence: >
      Admin-pinned docs pack and offline-bundle toolchain pack are
      excluded from this clear. The pin manager is the admissible
      path to release either pin.
  - class_projection_row_id: "row.review.mt.prebuild_environment_cache"
    storage_class_id: prebuild_environment_cache
    class_consequence_state: rebuilt_after_clear
    consequence_state_label_class: label_rebuilt_with_cost
    lost_after_clear_bytes: 0
    rebuilt_after_clear_bytes: 134217728
    retained_unchanged_bytes: 0
    pinned_excluded_bytes: 0
    blocked_protected_bytes: 0
    pin_source_breakdown: []
    rebuild_cost_hint:
      record_kind: rebuild_cost_hint_record
      rebuild_cost_hint_schema_version: 1
      rebuild_cost_class: medium_rebuild_cost
      offline_rebuild_risk_class: safe_to_remove_offline
      startup_impact_class: slower_first_build_until_prebuilt
      provenance_continuity_class: provenance_preserved_rebuild_from_local_truth
      rebuild_inputs_required:
        - local_workspace_source
      rebuild_safety_summary_class: expensive_to_rebuild_but_safe
      rebuild_explanation: >
        Prebuild environment layers rebuild from local tenant
        workspace source.
    affected_entry_refs:
      - "tenant.aurelia_enterprise.primary.prebuild.toolchain_layer"
    class_label: "Prebuild environment — aurelia/enterprise"
    consequence_sentence: >
      Prebuild environment layers will be removed and rebuilt from
      local workspace source.
  - class_projection_row_id: "row.review.mt.evidence_support_cache.case_held"
    storage_class_id: evidence_support_cache
    class_consequence_state: blocked_protected_export_required
    consequence_state_label_class: label_blocked_protected_export_required
    lost_after_clear_bytes: 0
    rebuilt_after_clear_bytes: 0
    retained_unchanged_bytes: 0
    pinned_excluded_bytes: 0
    blocked_protected_bytes: 67108864
    pin_source_breakdown: []
    rebuild_cost_hint:
      record_kind: rebuild_cost_hint_record
      rebuild_cost_hint_schema_version: 1
      rebuild_cost_class: authoritative_no_rebuild
      offline_rebuild_risk_class: not_rebuildable_after_removal
      startup_impact_class: not_applicable_authoritative_state
      provenance_continuity_class: authoritative_provenance_irreplaceable
      rebuild_inputs_required:
        - no_input_authoritative_state
      rebuild_safety_summary_class: dangerous_to_delete_authoritative
      rebuild_explanation: >
        Authoritative evidence packet held by an open case ref.
        Once cleared, the packet is gone. The class-specific review
        sheet offers an export-before-clear path so the case record
        can be preserved.
    affected_entry_refs:
      - "tenant.aurelia_enterprise.primary.evidence.case_42.crash_envelope"
    class_label: "Evidence support cache — case 42"
    consequence_sentence: >
      Evidence packet is held by an open case. Export the packet
      first; the class-specific review sheet routes the export
      before any clear can proceed.
    linked_class_specific_review_ref: "review.storage.mt.evidence_support_cache.case_42.class_specific"
  - class_projection_row_id: "row.review.mt.user_owned_recovery_state.refusal"
    storage_class_id: user_owned_recovery_state
    class_consequence_state: blocked_protected
    consequence_state_label_class: label_blocked_protected_class_specific_review
    lost_after_clear_bytes: 0
    rebuilt_after_clear_bytes: 0
    retained_unchanged_bytes: 0
    pinned_excluded_bytes: 0
    blocked_protected_bytes: 0
    pin_source_breakdown: []
    rebuild_cost_hint:
      record_kind: rebuild_cost_hint_record
      rebuild_cost_hint_schema_version: 1
      rebuild_cost_class: authoritative_no_rebuild
      offline_rebuild_risk_class: not_rebuildable_after_removal
      startup_impact_class: not_applicable_authoritative_state
      provenance_continuity_class: authoritative_provenance_irreplaceable
      rebuild_inputs_required:
        - no_input_authoritative_state
      rebuild_safety_summary_class: dangerous_to_delete_authoritative
      rebuild_explanation: >
        Authoritative recovery journals on this tenant. Generic
        clear is refused; the class-specific review path is the
        only admissible path.
    affected_entry_refs: []
    class_label: "Local recovery journals — aurelia/enterprise"
    consequence_sentence: >
      Local recovery journals are authoritative. Generic clear is
      refused; route through the class-specific review path.
    linked_class_specific_review_ref: "review.storage.mt.user_owned_recovery_state.class_specific"
protected_class_refusals:
  - refused_class_id: evidence_support_cache
    refusal_class: class_specific_review_required
    linked_class_specific_review_ref: "review.storage.mt.evidence_support_cache.case_42.class_specific"
    linked_pin_manager_route_ref: null
    refusal_label: "Evidence support cache — class-specific review required"
    notes: "Case 42 holds an authoritative evidence packet under retention; export-before-clear is required."
  - refused_class_id: user_owned_recovery_state
    refusal_class: authoritative_user_owned_clear_refused
    linked_class_specific_review_ref: "review.storage.mt.user_owned_recovery_state.class_specific"
    linked_pin_manager_route_ref: null
    refusal_label: "Recovery journals — authoritative-user-owned clear refused"
  - refused_class_id: artifact_cache
    refusal_class: mirror_or_offline_pin_excluded
    linked_class_specific_review_ref: null
    linked_pin_manager_route_ref: "route.storage.pin_manager.aurelia_enterprise"
    refusal_label: "Artifact cache — admin-pinned docs pack and offline-bundle toolchain pack excluded"
    notes: "The pin manager is the admissible path to release either pin."
recovery_export_options:
  - option_class: export_required_before_clear_offered
    option_label: "Export evidence packet before clear (case 42)"
    linked_target_ref: "export.storage.mt.evidence.case_42.crash_envelope"
    notes: "Export the packet first; the class-specific review sheet is gated on a successful export."
  - option_class: recovery_review_offered_class_specific
    option_label: "Open class-specific review for evidence and recovery state"
    linked_target_ref: "review.storage.mt.protected_classes.entry"
  - option_class: pin_release_review_offered
    option_label: "Open pin manager to review the admin and offline-bundle pins"
    linked_target_ref: "route.storage.pin_manager.aurelia_enterprise"
confirm_clear_action:
  action_id: "action.review.mt.confirm_clear"
  label: "Clear selected caches for this tenant"
  target_route_ref: "route.storage.cleanup.mt.aurelia_enterprise"
  scope_class: scope_local_only
  authority_class: user_local_authority
  consent_class: explicit_user_confirm_required
  side_effects:
    - removes_disposable_cache
    - removes_rebuildable_derived_state
    - pauses_pinned_excluded_items
    - preserves_authoritative_state
  preserves_evidence_context: true
  revalidation_on_confirm: snapshot_recompute_on_confirm
  irreversible_warning_required: true
  modal_prohibited: false
cancel_action:
  action_id: "action.review.mt.cancel"
  label: "Cancel and keep everything"
  scope_class: scope_local_only
  authority_class: user_local_authority
  consent_class: no_consent_required_safe_default
  side_effects:
    - no_side_effect_inspect_only
  preserves_evidence_context: true
  modal_prohibited: true
deployment_context:
  deployment_profile: enterprise_online
  mirror_offline_state_class: online_live_allowed
  tenant_org_scope_class: customer_tenant
  framing_class: managed_policy
consumer_surfaces:
  - clear_data_review
  - cleanup_history_lane
  - admin_storage_console
  - support_packet_export
redaction_class: operator_only_restricted
export_safe: true
note: >
  Class-selective clear on the managed-tenant install. Hot, knowledge,
  and prebuild caches will be rebuilt from local source. Admin-pinned
  docs pack and offline-bundle toolchain pack are excluded; the
  evidence packet held by case 42 forces an export before any class-
  specific clear, and the local recovery journal is refused outright.
linked_class_specific_review_refs:
  - "review.storage.mt.evidence_support_cache.case_42.class_specific"
  - "review.storage.mt.user_owned_recovery_state.class_specific"
linked_pin_manager_route_ref: "route.storage.pin_manager.aurelia_enterprise"
linked_cleanup_history_lane_ref: "route.storage.cleanup_history_lane.mt"
linked_deployment_summary_card_ref: "card.deployment.aurelia_enterprise"
