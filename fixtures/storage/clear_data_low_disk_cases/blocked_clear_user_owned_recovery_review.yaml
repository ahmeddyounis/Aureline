# yaml-language-server: $schema=../../../schemas/storage/clear_data_review.schema.json
$schema: "https://aureline.dev/schemas/storage/clear_data_review.schema.json"
__fixture__:
  name: blocked_clear_user_owned_recovery_review
  scenario: >
    User attempted a class-selective clear that included the local
    recovery journal in the selection. The surface refused to
    accept user_owned_recovery_state in selected_class_ids[]; the
    class flows through protected_class_refusals[] with refusal
    class authoritative_user_owned_clear_refused, and the
    matching projection row carries class_consequence_state =
    blocked_protected with the class-specific review link.
    selected_class_ids[] retains only the disposable hot cache the
    surface accepted. Recovery / export options offer the class-
    specific review path so the user is routed through the
    export-before-clear gate. Deployment context is
    local_only_individual.
  contract_sections:
    - "§3 The clear-data review record"
    - "§3.3 protected_class_refusals[]"
    - "§3.4 recovery_export_options[]"
    - "§5.4 Schema-enforced storage-class pairings"
    - "§9 Cross-record invariants"
    - "§11 Worked acceptance scenarios"
