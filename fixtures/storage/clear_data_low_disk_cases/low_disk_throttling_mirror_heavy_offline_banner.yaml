$schema: "https://aureline.dev/schemas/storage/low_disk_banner.schema.json"
__fixture__:
  name: low_disk_throttling_mirror_heavy_offline_banner
  scenario: >
    Disk pressure breaches the degraded floor on a mirror-heavy
    offline install (online_mirror_only). The banner pauses
    speculative fetch and managed replication, then enumerates the
    next ladder steps (interactive hot cache, knowledge cache,
    artifact cache unpinned, prebuild environment unpinned).
    Evidence-expiry and user-owned-recovery-state ladder steps are
    NOT included on this banner because no clear-data review is
    pending. Protected-class visibility tokens stay listed for both
    evidence_support_cache and user_owned_recovery_state. Override
    action opens the clear-data review for this workspace; the
    deployment-context framing is mirrored_or_offline.
  contract_sections:
    - "§4 The low-disk / quota banner record"
    - "§4.3 paused_work_lanes[]"
    - "§4.4 next_eviction_steps[]"
    - "§4.5 protected_class_visibility[]"
    - "§6 Pressure-class and pressure-source vocabularies"
    - "§7 The deployment-context block"
    - "§9 Cross-record invariants"
    - "§10 Local-only, mirrored / offline, and managed-policy contexts"
    - "§11 Worked acceptance scenarios"
