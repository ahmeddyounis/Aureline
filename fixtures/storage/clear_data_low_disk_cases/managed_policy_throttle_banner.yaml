# yaml-language-server: $schema=../../../schemas/storage/low_disk_banner.schema.json
$schema: "https://aureline.dev/schemas/storage/low_disk_banner.schema.json"
__fixture__:
  name: managed_policy_throttle_banner
  scenario: >
    Managed-tenant install. The tenant policy throttles cleanup so
    Aureline cannot pause beyond the disposable / rebuildable
    ladder steps. Banner pressure_class is
    pressure_managed_policy_throttle; pressure_source is
    managed_policy_throttle_active. The override action is
    not_offered_managed_policy_throttle so the user is not
    presented with an action the tenant policy would refuse;
    next_eviction_steps[] does NOT include
    expire_unpinned_evidence_past_retention or
    user_owned_recovery_state_only_under_explicit_review (those
    rungs are reserved for the explicit-review pathway). The
    open-inspector action remains inspect-only. Deployment context
    is managed_policy.
  contract_sections:
    - "§4 The low-disk / quota banner record"
    - "§4.6 override_action"
    - "§6 Pressure-class and pressure-source vocabularies"
    - "§7 The deployment-context block"
    - "§9 Cross-record invariants"
    - "§10 Local-only, mirrored / offline, and managed-policy contexts"
record_kind: low_disk_banner_record
low_disk_banner_schema_version: 1
banner_id: "banner.lowdisk.managed_tenant.policy_throttle.001"
emitted_at: "2026-04-29T05:00:00Z"
parent_card_id_ref: "card.storage.managed_tenant.aurelia_enterprise"
banner_scope:
  scope_class: tenant_only
  scope_ref: "tenant.aurelia_enterprise.primary"
  scope_label: "Tenant: aurelia/enterprise (primary)"
pressure_class: pressure_managed_policy_throttle
pressure_source_class: managed_policy_throttle_active
pressure_started_at: "2026-04-29T04:55:00Z"
pressure_observed_at: "2026-04-29T05:00:00Z"
paused_work_lanes:
  - lane_class: provider_refresh
