    lane_label: "Speculative prefetch — paused by tenant policy"
  - lane_class: pack_refresh
    lane_state: throttled
    lane_label: "Pack refresh — throttled by tenant policy"
next_eviction_steps:
  - stop_speculative_fetch_and_prefetch
  - pause_managed_replication_and_pack_refresh
