# yaml-language-server: $schema=../../../schemas/language/diagnostic_delta.schema.json
record_kind: diagnostic_delta_record
diagnostic_delta_schema_version: 1
diagnostic_delta_id: diag_delta.payments.current_imported_baseline.0001
workspace_ref: workspace.repo.aureline
comparison_class: multi_source_quality_delta

target_scope:
  target_scope_class: changed_files
  scope_ref: scope.review.changed_files.payments
  target_revision_ref: vcs.rev.after_config_refactor
  execution_context_ref: exec_context.local.security_scan.0001
  summary: Delta compares changed-file findings for the payments review scope.

result_sets:
  - result_set_role_class: current_live
    result_set_ref: result_set.local.secret_scan.current.0001
    authority_class: current_live_authoritative
    freshness_class: current
    produced_at: "2026-04-26T19:00:00Z"
    tool_identity_ref: tool.local_secret_scan
    rule_pack_ref: rule_pack.secret_scan.managed.2026_04
    baseline_family_ref: baseline.secret_scan.mainline
    summary: Current local run used the compatible managed rule pack.
  - result_set_role_class: imported_snapshot
    result_set_ref: sarif_import.managed_secret_scan.0001
    authority_class: managed_ci_authoritative_snapshot
    freshness_class: imported_snapshot
    produced_at: "2026-04-26T18:38:00Z"
    tool_identity_ref: tool.managed_secret_scan
    rule_pack_ref: rule_pack.secret_scan.managed.2026_04
    baseline_family_ref: baseline.secret_scan.mainline
    summary: Imported managed CI scan remains a snapshot with matching rule pack.
  - result_set_role_class: baseline_snapshot
    result_set_ref: baseline.snapshot.secret_scan.mainline.0007
    authority_class: baseline_authoritative_snapshot
    freshness_class: recent
    produced_at: "2026-04-25T13:00:00Z"
    tool_identity_ref: tool.managed_secret_scan
    rule_pack_ref: rule_pack.secret_scan.managed.2026_04
    baseline_family_ref: baseline.secret_scan.mainline
    summary: Accepted baseline is compatible with the current and imported result sets.
  - result_set_role_class: suppressed_findings
    result_set_ref: suppression.set.secret_scan.workspace.0003
    authority_class: suppression_governed_interpretation
    freshness_class: current
    produced_at: "2026-04-26T18:55:00Z"
    tool_identity_ref: null
    rule_pack_ref: rule_pack.secret_scan.managed.2026_04
    baseline_family_ref: baseline.secret_scan.mainline
    summary: Workspace suppression set narrows one test-fixture finding.

compatibility:
  comparison_compatibility_class: compatible_with_mapping_drift
  checked_axes:
    - effective_profile
    - tool_identity
    - rule_pack
    - baseline_family
    - target_scope
    - anchor_mapping_family
    - environment_or_execution_context
    - suppression_policy
  blocked_axes: []
  profile_comparison_ref: quality.profile.comparison.security.0001
  mapping_family_ref: anchor_family.payments.secret_token
  summary: Result sets are comparable, with one disclosed remapped anchor.

grouping_rules:
  - group_id: delta_group.secret_scan.payments
    grouping_class: rule_anchor_family
    collapse_class: collapse_display_only
    attribution_class: mixed_attribution_requires_detail
    group_key_ref: anchor_family.payments.secret_token
    summary: Secret-scan rows may collapse for display but keep imported, current, baseline, and suppression refs.
  - group_id: delta_group.secret_scan.fixture_suppression
    grouping_class: suppression_scope
    collapse_class: collapse_under_suppression
    attribution_class: suppression
    group_key_ref: suppression.review.secret_scan.test_fixture.0001
    summary: Suppressed fixture finding groups under the governed suppression record.

delta_counts:
  new_count: 1
  persisting_count: 1
  resolved_count: 1
  suppressed_count: 1
  waived_count: 0
  stale_count: 0
  needs_remap_count: 1
  imported_only_count: 1
  locally_confirmed_count: 1
  remapped_count: 1
  source_moved_count: 0
  unsupported_anchor_count: 0
  generated_anchor_only_count: 0
  compatibility_blocked_count: 0

finding_deltas:
  - finding_delta_id: finding_delta.secret.payments.persisting.0001
    delta_state_class: remapped
    group_id_ref: delta_group.secret_scan.payments
    diagnostic_refs:
      - diag.imported.secret.payments.0001
      - diag.local.secret.payments.0001
    remap_state_ref: diag_remap.secret.payments.remapped.0001
    sarif_import_ref: sarif_import.managed_secret_scan.0001
    baseline_ref: baseline.finding.secret.payments.0001
    suppression_ref: null
    authority_class: locally_confirmed_current
    attribution_class: mixed_attribution_requires_detail
    collapse_class: collapse_display_only
    current_anchor_ref: anchor.payments.config.current_line
    summary: Imported finding persists and was locally confirmed after a disclosed remap.
  - finding_delta_id: finding_delta.secret.payments.new.0001
    delta_state_class: new
    group_id_ref: delta_group.secret_scan.payments
    diagnostic_refs:
      - diag.local.secret.payments.new.0001
    remap_state_ref: null
    sarif_import_ref: null
    baseline_ref: null
    suppression_ref: null
    authority_class: current_live_authoritative
    attribution_class: local_run
    collapse_class: no_collapse
    current_anchor_ref: anchor.payments.new_secret.current_line
    summary: Current local run found a new secret finding absent from the compatible baseline.
  - finding_delta_id: finding_delta.secret.payments.resolved.0001
    delta_state_class: resolved
    group_id_ref: delta_group.secret_scan.payments
    diagnostic_refs:
      - diag.baseline.secret.payments.resolved.0001
    remap_state_ref: null
    sarif_import_ref: null
    baseline_ref: baseline.finding.secret.payments.resolved.0001
    suppression_ref: null
    authority_class: baseline_authoritative_snapshot
    attribution_class: baseline
    collapse_class: collapse_under_baseline
    current_anchor_ref: null
    summary: Baseline finding is absent from the compatible current run and counts as resolved.
  - finding_delta_id: finding_delta.secret.fixture.suppressed.0001
    delta_state_class: suppressed
    group_id_ref: delta_group.secret_scan.fixture_suppression
    diagnostic_refs:
      - diag.local.secret.fixture.0001
    remap_state_ref: null
    sarif_import_ref: sarif_import.managed_secret_scan.0001
    baseline_ref: null
    suppression_ref: suppression.review.secret_scan.test_fixture.0001
    authority_class: suppression_governed_interpretation
    attribution_class: suppression
    collapse_class: collapse_under_suppression
    current_anchor_ref: anchor.fixture.secret.current_line
    summary: Finding remains present but is governed by a bounded workspace suppression.
  - finding_delta_id: finding_delta.route.needs_remap.0001
    delta_state_class: needs_remap
    group_id_ref: null
    diagnostic_refs:
      - diag.framework.route_mismatch.cached.0001
    remap_state_ref: diag_remap.route_mismatch.needs_remap.0001
    sarif_import_ref: null
    baseline_ref: null
    suppression_ref: null
    authority_class: support_replay_read_only
    attribution_class: support_export
    collapse_class: collapse_blocked_requires_review
    current_anchor_ref: null
    summary: Cached route diagnostic needs remap and cannot collapse into current exact findings.

export_projection:
  support_bundle_refs:
    - support.bundle.security_delta.0001
  review_pack_refs:
    - review.pack.payments.quality.0001
  cli_output_refs:
    - cli.output.quality_delta.payments.0001
  release_packet_refs: []
  redaction_class: internal_support_restricted
  summary: Delta packet is exportable to support, review, and CLI with remap and suppression refs preserved.

computed_at: "2026-04-26T19:06:00Z"
summary: Current, imported, baseline, and suppressed findings compare through one packet without hiding remap state.
