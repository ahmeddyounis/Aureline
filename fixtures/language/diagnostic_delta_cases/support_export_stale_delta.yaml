# yaml-language-server: $schema=../../../schemas/language/diagnostic_delta.schema.json
record_kind: diagnostic_delta_record
diagnostic_delta_schema_version: 1
diagnostic_delta_id: diag_delta.support_replay.routes.0001
workspace_ref: workspace.repo.aureline
comparison_class: support_export_vs_current

target_scope:
  target_scope_class: support_export
  scope_ref: support.scope.route_diagnostics.0001
  target_revision_ref: vcs.rev.after_branch_switch
  execution_context_ref: exec_context.support_replay.local.0001
  summary: Support replay compares captured route diagnostics against the current workspace snapshot.

result_sets:
  - result_set_role_class: support_export_snapshot
    result_set_ref: support.export.route_diagnostics.0001
    authority_class: support_replay_read_only
    freshness_class: stale
    produced_at: "2026-04-25T21:00:00Z"
    tool_identity_ref: tool.framework_analyzer
    rule_pack_ref: rule_pack.framework_routes.3_4
    baseline_family_ref: null
    summary: Support export preserves cached diagnostics from the prior branch.
  - result_set_role_class: current_live
    result_set_ref: result_set.framework_routes.current.0002
    authority_class: current_live_authoritative
    freshness_class: current
    produced_at: "2026-04-26T19:12:00Z"
    tool_identity_ref: tool.framework_analyzer
    rule_pack_ref: rule_pack.framework_routes.3_4
    baseline_family_ref: null
    summary: Current route analyzer result set is available but uses a different anchor epoch.

compatibility:
  comparison_compatibility_class: blocked_anchor_mapping_uncertain
  checked_axes:
    - effective_profile
    - tool_identity
    - rule_pack
    - target_scope
    - anchor_mapping_family
  blocked_axes:
    - anchor_mapping_family
  profile_comparison_ref: quality.profile.comparison.routes.0002
  mapping_family_ref: anchor_family.routes.user_param
  summary: Support replay cannot claim resolved or persisting state until stale anchors are remapped.

grouping_rules:
  - group_id: delta_group.routes.stale_support
    grouping_class: rule_anchor_family
    collapse_class: collapse_blocked_requires_review
    attribution_class: support_export
    group_key_ref: anchor_family.routes.user_param
    summary: Support replay rows stay separated from current diagnostics because anchor mapping is blocked.

delta_counts:
  new_count: 0
  persisting_count: 0
  resolved_count: 0
  suppressed_count: 0
  waived_count: 0
  stale_count: 1
  needs_remap_count: 1
  imported_only_count: 0
  locally_confirmed_count: 0
  remapped_count: 0
  source_moved_count: 0
  unsupported_anchor_count: 1
  generated_anchor_only_count: 0
  compatibility_blocked_count: 2

finding_deltas:
  - finding_delta_id: finding_delta.routes.user_param.needs_remap.0001
    delta_state_class: needs_remap
    group_id_ref: delta_group.routes.stale_support
    diagnostic_refs:
      - diag.framework.route_mismatch.cached.0001
    remap_state_ref: diag_remap.route_mismatch.needs_remap.0001
    sarif_import_ref: null
    baseline_ref: null
    suppression_ref: null
    authority_class: support_replay_read_only
    attribution_class: support_export
    collapse_class: collapse_blocked_requires_review
    current_anchor_ref: null
    summary: Captured route finding survives support replay but has no current safe range.
  - finding_delta_id: finding_delta.routes.package_scope.unsupported.0001
    delta_state_class: unsupported_anchor
    group_id_ref: delta_group.routes.stale_support
    diagnostic_refs:
      - diag.framework.package_scope.cached.0001
    remap_state_ref: diag_remap.framework.package_scope.unsupported.0001
    sarif_import_ref: null
    baseline_ref: null
    suppression_ref: null
    authority_class: support_replay_read_only
    attribution_class: support_export
    collapse_class: collapse_blocked_requires_review
    current_anchor_ref: null
    summary: Captured package-scope finding cannot be projected to an editor range and remains scope-only.

export_projection:
  support_bundle_refs:
    - support.bundle.route_diagnostics.replay.0001
  review_pack_refs: []
  cli_output_refs:
    - cli.output.support_replay.routes.0001
  release_packet_refs: []
  redaction_class: metadata_safe_default
  summary: Support replay exports stale and unsupported-anchor counts without upgrading them to current truth.

computed_at: "2026-04-26T19:13:00Z"
summary: Support replay preserves stale diagnostics and blocked remap state as reviewable evidence only.
