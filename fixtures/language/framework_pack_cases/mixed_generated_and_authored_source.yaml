# yaml-language-server: $schema=../../../schemas/language/framework_pack_descriptor.schema.json
record_kind: framework_pack_descriptor_record
framework_pack_descriptor_schema_version: 1
pack_id: framework.pack.api_routes_and_codegen.v1
pack_display_label: API routes + generated client overlay pack
pack_version: 1.0.0
pack_source_class: third_party_signed
ecosystem: python
supported_framework_claims:
  - framework_id: framework.fastapi.v0
    framework_display_label: FastAPI
    supported_overlay_families:
      - route_overlay
      - config_overlay
      - generated_source_overlay
    proving_artifact_classes:
      - workspace_graph_projection
      - framework_manifest
      - generated_artifact_lineage
    claim_summary: Routes and schema contracts are projected into the shared graph; generated client siblings are always lineage-labeled.
supported_overlay_families:
  - route_overlay
  - config_overlay
  - generated_source_overlay
  - debug_overlay
required_contract_bindings:
  - contract_class: workspace_graph
    schema_refs:
      - schemas/graph/workspace_graph_seed.schema.json
    doc_refs:
      - docs/graph/workspace_graph_seed.md
      - docs/graph/provenance_and_confidence_contract.md
    binding_summary: Route facts and generator relations project into shared workspace graph nodes/edges, including generated_from joins.
  - contract_class: search_truth
    schema_refs:
      - schemas/search/search_truth_packet.schema.json
      - schemas/search/search_result_row.schema.json
    doc_refs:
      - docs/search/search_navigation_truth_packet.md
    binding_summary: Search surfaces receive generated-vs-authored truth through shared row lineage hints and search truth packets.
  - contract_class: build_target_events
    schema_refs:
      - schemas/build/raw_event_inspector.schema.json
    doc_refs:
      - docs/build/adapter_confidence_and_event_inspection_contract.md
    binding_summary: Codegen and test targets bind to build-target event envelopes rather than pack-private pipelines.
  - contract_class: docs_pack
    schema_refs:
      - schemas/docs/docs_pack_manifest.schema.json
    doc_refs:
      - docs/docs/docs_pack_manifest_contract.md
    binding_summary: API docs projections use docs-pack publication identity; generated docs artifacts carry lineage refs.
  - contract_class: execution_context
    schema_refs:
      - schemas/runtime/execution_context.schema.json
    doc_refs:
      - docs/runtime/execution_context_vocabulary.md
    binding_summary: Python interpreter/toolchain selection is disclosed through execution-context provenance, not pack-private settings.
  - contract_class: generated_artifact_lineage
    schema_refs:
      - schemas/workspace/generated_artifact_lineage.schema.json
    doc_refs:
      - docs/generated/lineage_hint_packet.md
    binding_summary: Generated client siblings and schema snapshots carry canonical source refs, generator identity, drift state, and edit policy.
  - contract_class: debug_artifact_manifest
    schema_refs:
      - schemas/debug/debug_artifact_manifest.schema.json
      - schemas/build/exact_build_identity.schema.json
    doc_refs:
      - docs/debug/artifact_resolution_seed.md
      - docs/build/exact_build_identity_model.md
    binding_summary: Generated-source mapping packets and debug artifacts join to debug manifest entries and exact build identity when present.
package_manager_identity:
  selected_identity:
    ecosystem: python
    package_manager_family: uv
    package_manager_version: "0.5.0"
    workspace_manager_family: pip_venv_only
    workspace_root_resolution:
      resolution_class: workspace_manifest_ancestor
      workspace_root_ref: workspace:root:pyservice:01
      summary: Workspace root selected by pyproject.toml ancestor resolution.
    manifest_authority:
      entries:
        - authority_class: workspace_manifest
          manifest_ref: fs:identity:pyproject.toml:01
          selected_as_authoritative: true
          summary: pyproject.toml anchors dependency and workspace identity for python semantics.
        - authority_class: lockfile
          manifest_ref: fs:identity:uv.lock:01
          selected_as_authoritative: true
          summary: uv lockfile anchors resolver output for reproducibility and drift detection.
        - authority_class: toolchain_manifest
          manifest_ref: fs:identity:.python-version:01
          selected_as_authoritative: false
          summary: Toolchain manifests are advisory inputs; execution-context provenance is the authority for toolchain resolution.
      selection_summary: uv resolver and uv lockfile govern package semantics; execution context binds toolchain identity and scope.
    execution_context_id: exec:python:service:local:01
    execution_context_provenance_ref: exec:prov:python:service:local:01
    selection_summary: Pack binds route/codegen semantics to uv identity and the resolved python execution context.
  identity_drift: null
lineage_obligations:
  - obligation_class: generated_artifact_lineage_required
    summary: Generated client code, schema snapshots, and rendered docs exports carry generated-artifact lineage records naming canonical sources and generator identity.
  - obligation_class: row_lineage_hint_required
    summary: Explorer and search rows for generated siblings remain labeled via row lineage hints before the file is opened.
  - obligation_class: debug_artifact_manifest_required_for_debug_artifacts
    summary: Generated-source mapping packets and any debug artifacts are surfaced only through debug artifact manifest entries.
captured_at: "2026-05-05T21:31:00Z"
export_safe_summary: Framework pack treats mixed generated-plus-authored source as lineage-bearing artifacts and keeps toolchain and manager identity inspectable.

