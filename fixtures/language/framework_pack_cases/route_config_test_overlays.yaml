# yaml-language-server: $schema=../../../schemas/language/framework_pack_descriptor.schema.json
record_kind: framework_pack_descriptor_record
framework_pack_descriptor_schema_version: 1
pack_id: framework.pack.web_routes_and_tests.v1
pack_display_label: Web framework routes/config/tests pack
pack_version: 1.0.0
pack_source_class: first_party
ecosystem: nodejs
supported_framework_claims:
  - framework_id: framework.react_router.v6
    framework_display_label: React Router v6
    supported_overlay_families:
      - route_overlay
      - config_overlay
      - test_overlay
    proving_artifact_classes:
      - workspace_graph_projection
      - framework_manifest
      - generated_artifact_lineage
    claim_summary: Projects route facts, config roots, and test intent through the shared workspace graph with explicit provenance.
  - framework_id: framework.next_app_router.v1
    framework_display_label: Next.js App Router
    supported_overlay_families:
      - route_overlay
      - config_overlay
      - test_overlay
    proving_artifact_classes:
      - workspace_graph_projection
      - framework_manifest
      - debug_artifact_manifest_entry
    claim_summary: Treats route manifests and debug artifacts as derived evidence that must remain attributable and build-identified.
supported_overlay_families:
  - route_overlay
  - config_overlay
  - test_overlay
  - diagnostics_overlay
required_contract_bindings:
  - contract_class: workspace_graph
    schema_refs:
      - schemas/graph/workspace_graph_seed.schema.json
    doc_refs:
      - docs/graph/workspace_graph_seed.md
      - docs/graph/project_graph_and_indexing_seed.md
    binding_summary: Framework facts project into shared workspace graph nodes/edges; no pack-private route or config graph is allowed.
  - contract_class: search_truth
    schema_refs:
      - schemas/search/search_truth_packet.schema.json
      - schemas/search/search_result_truth.schema.json
    doc_refs:
      - docs/search/search_navigation_truth_packet.md
      - docs/search/search_readiness_vocabulary.md
    binding_summary: Search surfaces consume framework facts only through search truth packets; readiness and degraded state remain explicit.
  - contract_class: build_target_events
    schema_refs:
      - schemas/build/raw_event_inspector.schema.json
      - schemas/build/adapter_confidence_state.schema.json
    doc_refs:
      - docs/build/adapter_confidence_and_event_inspection_contract.md
    binding_summary: Test and run overlays bind to build/test targets and adapter event inspection vocabulary rather than pack-private task ids.
  - contract_class: docs_pack
    schema_refs:
      - schemas/docs/docs_pack_manifest.schema.json
    doc_refs:
      - docs/docs/docs_pack_manifest_contract.md
    binding_summary: Any framework docs projection uses docs-pack publication and identity contracts; no private doc index is authoritative.
  - contract_class: execution_context
    schema_refs:
      - schemas/runtime/execution_context.schema.json
    doc_refs:
      - docs/runtime/execution_context_vocabulary.md
    binding_summary: Pack exposes package/workspace root and toolchain identity through execution-context ids and provenance refs.
  - contract_class: generated_artifact_lineage
    schema_refs:
      - schemas/workspace/generated_artifact_lineage.schema.json
      - schemas/generated/artifact_edit_posture.schema.json
    doc_refs:
      - docs/generated/lineage_hint_packet.md
      - docs/architecture/generated_artifact_safe_edit_policy.md
    binding_summary: Generated route/config artifacts carry lineage refs and safe-edit posture; derived files never masquerade as canonical source.
  - contract_class: debug_artifact_manifest
    schema_refs:
      - schemas/debug/debug_artifact_manifest.schema.json
      - schemas/build/exact_build_identity.schema.json
    doc_refs:
      - docs/debug/artifact_resolution_seed.md
      - docs/build/exact_build_identity_model.md
    binding_summary: Source maps and debug artifacts bind to debug-artifact manifests and exact build identity, not pack-private mapping tables.
package_manager_identity:
  selected_identity:
    ecosystem: nodejs
    package_manager_family: pnpm
    package_manager_version: "9.1.0"
    workspace_manager_family: pnpm_workspaces
    workspace_root_resolution:
      resolution_class: workspace_manifest_ancestor
      workspace_root_ref: workspace:root:webapp:01
      summary: Workspace root selected by pnpm-workspace.yaml ancestor resolution.
    manifest_authority:
      entries:
        - authority_class: workspace_manifest
          manifest_ref: fs:identity:pnpm-workspace.yaml:01
          selected_as_authoritative: true
          summary: Workspace manifest anchors workspaces and member boundaries.
        - authority_class: lockfile
          manifest_ref: fs:identity:pnpm-lock.yaml:01
          selected_as_authoritative: true
          summary: Lockfile defines resolver output and drift detection baseline.
        - authority_class: package_manifest
          manifest_ref: fs:identity:package.json:root:01
          selected_as_authoritative: true
          summary: Root package manifest defines scripts and the package coordinate authority.
        - authority_class: toolchain_manifest
          manifest_ref: fs:identity:.tool-versions:01
          selected_as_authoritative: false
          summary: Toolchain manifest is observed but execution-context provenance remains the authority for toolchain resolution.
      selection_summary: pnpm workspaces and pnpm lockfile govern package/workspace semantics for this pack.
    execution_context_id: exec:language:webapp:local:01
    execution_context_provenance_ref: exec:prov:webapp:local:01
    selection_summary: Pack semantics anchored to pnpm workspace root and local execution-context toolchain selection.
  observed_identities:
    - ecosystem: nodejs
      package_manager_family: npm
      package_manager_version: null
      workspace_manager_family: workspace_manager_unknown_requires_review
      workspace_root_resolution:
        resolution_class: package_manifest_ancestor
        workspace_root_ref: workspace:root:webapp:01
        summary: package-lock.json was observed under the root, but was not selected as authoritative.
      manifest_authority:
        entries:
          - authority_class: lockfile
            manifest_ref: fs:identity:package-lock.json:01
            selected_as_authoritative: false
            summary: package-lock.json is present but not authoritative for this workspace.
        selection_summary: npm lockfile evidence is recorded as non-authoritative.
      execution_context_id: exec:language:webapp:local:01
      execution_context_provenance_ref: exec:prov:webapp:local:01
      selection_summary: Observed npm artifacts do not change the selected pnpm identity.
  identity_drift: null
lineage_obligations:
  - obligation_class: generated_artifact_lineage_required
    summary: Any derived route/config/test manifest or generated helper emitted by the pack carries a generated-artifact lineage record ref.
  - obligation_class: row_lineage_hint_required
    summary: Explorer/search rows for derived artifacts carry a row lineage hint so generated outputs do not render as canonical source.
  - obligation_class: exact_build_identity_required_for_source_maps
    summary: Source maps referenced by the pack bind to an exact build identity before debug or support surfaces may claim mapping quality.
  - obligation_class: debug_artifact_manifest_required_for_debug_artifacts
    summary: Debug artifacts (source maps, generated-source mappings) are surfaced only via debug artifact manifest entries.
captured_at: "2026-05-05T21:30:00Z"
export_safe_summary: Framework pack binds route/config/test overlays to shared contracts and discloses pnpm workspace identity explicitly.

