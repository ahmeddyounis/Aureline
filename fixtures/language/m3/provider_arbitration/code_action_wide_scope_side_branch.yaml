arbitration_decision:
  record_kind: arbitration_decision_record
  arbitration_decision_schema_version: 1
  arbitration_decision_id: lang:arbitration:code_action_side_branch:01
  language_action_lane_class: code_action
  requested_authority_floor_class: authoritative_preferred
  requested_scope_claim_class: active_workset
  requested_subject_ref: symbol:command:export_workspace:01
  provider_order_rows:
    - rank: 1
      provider_id: lang:provider:lsp:tsserver:01
      provider_family: language_server
      provider_role_class: primary_semantic
      provider_health_state_ref: lang:health:code_action_side_branch:tsserver:01
      summary: Language service proposes the cross-file extract refactor.
    - rank: 2
      provider_id: lang:provider:framework:next_routes:01
      provider_family: framework_pack
      provider_role_class: framework_overlay
      provider_health_state_ref: lang:health:code_action_side_branch:framework:01
      summary: Framework pack disagrees on the resulting route binding.
    - rank: 3
      provider_id: lang:provider:ai:local_model:01
      provider_family: ai_assist
      provider_role_class: assist_only
      provider_health_state_ref: lang:health:code_action_side_branch:ai_assist:01
      summary: AI assist contributes an advisory rewrite explanation only.
  chosen_provider_id: lang:provider:lsp:tsserver:01
  confidence_outcome_class: stale
  negotiated_scope_claim_class: active_workset
  negotiated_completeness_class: partial_for_claimed_scope
  negotiated_freshness_class: warm_cached
  disagreement_block:
    conflict_class: edit_safety_disagreement
    disagreement_visibility_class: side_panel_disagreement_inspector
    summary: Language service and framework pack disagree on the post-refactor route safety.
  downgraded_promise_block:
    downgraded_promise_reason_class: stale_cache_reuse
    summary: Cross-file refactor used warm-cached semantic evidence with explicit stale disclosure.
  fallback_label_class: cached_semantic_reuse
  apply_gate_class: side_branch_required
  consumer_routing_rows:
    - consumer_surface_class: editor_chrome
      summary: Editor chrome shows the stale label and side-branch gate.
    - consumer_surface_class: quick_fix_preview
      summary: Quick-fix preview blocks apply until a side-branch review completes.
    - consumer_surface_class: diagnostics_detail
      summary: Diagnostics detail surfaces the edit-safety disagreement.
    - consumer_surface_class: command_result
      summary: Command result names the side-branch requirement and the disagreement.
    - consumer_surface_class: cli_headless_inspect
      summary: CLI inspect prints the cached-semantic fallback and side-branch requirement.
    - consumer_surface_class: support_export
      summary: Support export includes the framework disagreement and AI advisory disclosure.
  linked_record_refs:
    capability_negotiation_packet_ref: lang:negotiation:code_action_side_branch:01
    result_provenance_ref: lang:result:code_action_side_branch:01
    router_decision_ref: lang:router:code_action_side_branch:01
  policy_context:
    policy_epoch: policy:epoch:2026-05-19:01
    trust_state: trusted
    execution_context_id: exec:language:07
  redaction_class: metadata_safe_default
  captured_at: "2026-05-19T17:25:00Z"
  export_safe_summary: >-
    Code-action arbitration accepted a cached-semantic winner but routed
    apply through side-branch review because providers disagreed on edit
    safety.

