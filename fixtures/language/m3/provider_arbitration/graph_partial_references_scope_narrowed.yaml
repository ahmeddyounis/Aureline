      summary: Warm graph proves references for the active workset only.
    - rank: 2
      provider_id: lang:provider:lsp:tsserver:01
      provider_family: language_server
      provider_role_class: secondary_semantic
      provider_health_state_ref: lang:health:refs_scope_narrowed:tsserver:01
