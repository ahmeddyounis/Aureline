        epoch_ref: epoch:graph:warm:01
    policy_context:
      policy_epoch: policy:epoch:2026-05-19:01
      trust_state: trusted
      execution_context_id: exec:language:02
    redaction_class: metadata_safe_default
    captured_at: "2026-05-19T17:05:00Z"
    export_safe_summary: >-
      Graph is ready and live but only covers the active workset; unloaded
      roots remain omitted.
