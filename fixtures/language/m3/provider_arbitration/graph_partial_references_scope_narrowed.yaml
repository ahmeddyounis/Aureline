  downgraded_promise_block:
    downgraded_promise_reason_class: narrowed_to_active_workset
    summary: Requested whole-workspace references narrowed to the active workset because unloaded roots are omitted.
  fallback_label_class: cached_semantic_reuse
  apply_gate_class: preview_required
  consumer_routing_rows:
    - consumer_surface_class: editor_chrome
      summary: Editor chrome renders the narrowed-scope label next to the reference list.
    - consumer_surface_class: quick_fix_preview
      summary: Quick-fix preview shows the partial coverage warning.
    - consumer_surface_class: diagnostics_detail
      summary: Diagnostics detail surfaces the omitted-roots context.
    - consumer_surface_class: command_result
      summary: Command result lists references with explicit partial-scope label.
    - consumer_surface_class: cli_headless_inspect
      summary: CLI inspect prints the scope-narrowed downgrade block.
    - consumer_surface_class: support_export
      summary: Support export includes the omitted-roots disclosure and alternate row.
  linked_record_refs:
    capability_negotiation_packet_ref: lang:negotiation:graph_warm_partial_workspace:01
    result_provenance_ref: lang:result:graph_partial_references:01
    router_decision_ref: lang:router:refs_scope_narrowed:01
  policy_context:
    policy_epoch: policy:epoch:2026-05-19:01
    trust_state: trusted
    execution_context_id: exec:language:02
  redaction_class: metadata_safe_default
  captured_at: "2026-05-19T17:05:00Z"
  export_safe_summary: >-
    Reference arbitration narrowed whole-workspace truth to the active
    workset and gated apply behind preview review.

provider_health_states:
