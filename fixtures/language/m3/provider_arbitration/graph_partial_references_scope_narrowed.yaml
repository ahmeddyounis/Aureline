        summary: Graph references are partial because unloaded roots are omitted.
      - language_action_lane_class: rename
        lane_support_class: partial
        summary: Graph rename coverage drops on unloaded roots.
      - language_action_lane_class: formatting
        lane_support_class: unsupported
        summary: Graph does not serve formatting.
      - language_action_lane_class: organize_imports
        lane_support_class: unsupported
        summary: Graph does not serve organize-imports.
      - language_action_lane_class: code_action
        lane_support_class: heuristic
