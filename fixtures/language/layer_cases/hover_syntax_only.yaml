schema_version: 1
case_id: lang:layer_case:hover:syntax_only:01

feature_family: hover
surface_family: editor

requested_layer_id: layer_3_aureline_semantic_depth
answer_layer_id: layer_1_syntax_structure

available_layers:
  - layer_1_syntax_structure
unavailable_deeper_layers:
  - layer_id: layer_2_compatibility_breadth
    reason_class: provider_unavailable
    summary: No compatibility provider is registered for this file type.
  - layer_id: layer_3_aureline_semantic_depth
    reason_class: warming_or_unindexed
    summary: Semantic graph shard for this scope is warming and cannot claim authority.

downgrade:
  from_layer_id: layer_3_aureline_semantic_depth
  to_layer_id: layer_1_syntax_structure
  degraded_state_token: warming
  summary: Hover renders syntax-local structure only until semantic depth is ready.

required_surface_disclosure:
  must_render:
    - answer_layer_id
    - scope_claim_class
    - degraded_state_token
    - deeper_layer_unavailable_reason
  must_not_imply:
    - workspace_wide_semantics
    - project_model_awareness

