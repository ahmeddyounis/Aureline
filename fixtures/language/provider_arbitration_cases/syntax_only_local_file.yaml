policy_context:
  policy_epoch: policy:epoch:2026-04-25:01
  trust_state: trusted
  execution_context_id: exec:language:01
redaction_class: metadata_safe_default
captured_at: "2026-04-25T17:18:00Z"
export_safe_summary: >-
  Definition resolved through file-local syntax only. The answer is
  authoritative for the current file, not the workspace, and semantic
  providers are disclosed as unavailable.
