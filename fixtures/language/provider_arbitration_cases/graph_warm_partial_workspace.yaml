# yaml-language-server: $schema=../../../schemas/language/capability_negotiation_packet.schema.json
record_kind: capability_negotiation_packet_record
capability_negotiation_packet_schema_version: 1
capability_negotiation_packet_id: lang:negotiation:graph_warm_partial_workspace:01
requested_surface_class: reference
requested_authority_floor_class: authoritative_preferred
requested_scope_claim_class: whole_workspace
requested_subject_ref: symbol:service:payments:handler:01
candidate_provider_snapshots:
  - provider_id: lang:provider:graph:workspace:01
    provider_family: project_graph
    provider_display_label: Shared semantic graph
    provider_role_class: primary_semantic
    surface_support_class: authoritative
    health_state: ready
    freshness_class: authoritative_live
    scope_claim_class: active_workset
    completeness_class: complete_for_claimed_scope
    scope_limit_classes:
      - active_workset_only
      - unloaded_roots_omitted
    locality_class: local_sidecar
    host_identity_ref: host:local:graph:01
    generated_note_classes: []
    notebook_note_classes: []
    current_epoch_bindings:
      - epoch_role_class: workspace_scope
        epoch_ref: epoch:workset:payments:01
      - epoch_role_class: graph_snapshot
        epoch_ref: epoch:graph:warm:01
    candidate_eligibility_class: eligible_primary
    ineligibility_summary: null
    summary: Warm graph admits authoritative references for the active workset only.
  - provider_id: lang:provider:lsp:tsserver:01
    provider_family: language_server
    provider_display_label: TypeScript language service
    provider_role_class: secondary_semantic
    surface_support_class: authoritative
    health_state: degraded
    freshness_class: warm_cached
    scope_claim_class: loaded_slice
    completeness_class: partial_for_claimed_scope
    scope_limit_classes:
      - unloaded_roots_omitted
    locality_class: local_sidecar
    host_identity_ref: host:local:lsp:tsserver:01
    generated_note_classes: []
    notebook_note_classes: []
    current_epoch_bindings:
      - epoch_role_class: workspace_scope
        epoch_ref: epoch:workset:payments:01
      - epoch_role_class: language_project_model
        epoch_ref: epoch:lsp:tsserver:model:07
    candidate_eligibility_class: eligible_alternate
    ineligibility_summary: null
    summary: Language service agrees on some loaded roots but is still below the graph for scope and freshness.
  - provider_id: lang:provider:syntax:treesitter:01
    provider_family: syntax
    provider_display_label: Tree-sitter structural fallback
    provider_role_class: text_fallback
    surface_support_class: fallback_only
    health_state: ready
    freshness_class: authoritative_live
    scope_claim_class: single_file
    completeness_class: complete_for_claimed_scope
    scope_limit_classes:
      - single_file_only
    locality_class: local_in_process
    host_identity_ref: host:local:desktop:01
    generated_note_classes: []
    notebook_note_classes: []
    current_epoch_bindings:
      - epoch_role_class: workspace_scope
        epoch_ref: epoch:workspace:file_local:04
      - epoch_role_class: provider_session
        epoch_ref: epoch:syntax:session:04
    candidate_eligibility_class: eligible_alternate
    ineligibility_summary: null
    summary: Fallback can only cover the active file and is therefore not primary for references.
arbitration_outcome:
  chosen_provider_snapshot:
    provider_id: lang:provider:graph:workspace:01
    provider_family: project_graph
    provider_display_label: Shared semantic graph
    provider_role_class: primary_semantic
    surface_support_class: authoritative
    health_state: ready
    freshness_class: authoritative_live
    scope_claim_class: active_workset
    completeness_class: complete_for_claimed_scope
    scope_limit_classes:
      - active_workset_only
      - unloaded_roots_omitted
    locality_class: local_sidecar
    host_identity_ref: host:local:graph:01
    generated_note_classes: []
    notebook_note_classes: []
    current_epoch_bindings:
      - epoch_role_class: workspace_scope
        epoch_ref: epoch:workset:payments:01
      - epoch_role_class: graph_snapshot
        epoch_ref: epoch:graph:warm:01
    candidate_eligibility_class: eligible_primary
    ineligibility_summary: null
    summary: Warm graph admits authoritative references for the active workset only.
  negotiated_authority_class: authoritative_for_claimed_scope
  conflict_class: none
  downgrade_cue_class: scope_narrowed
  cached_reuse_reason_class: not_applicable
  alternate_provider_rows:
    - provider_id: lang:provider:lsp:tsserver:01
      provider_family: language_server
      reason_not_primary_class: narrower_scope
      summary: Language service is a usable alternate but does not improve scope coverage.
    - provider_id: lang:provider:syntax:treesitter:01
      provider_family: syntax
      reason_not_primary_class: lower_authority
      summary: Syntax fallback is too narrow for cross-file references.
  export_safe_decision_summary: >-
    The request asked for whole-workspace references, but the best fresh
    winner only proved the active workset. The packet records that
    narrowing mechanically.
policy_context:
  policy_epoch: policy:epoch:2026-04-25:01
  trust_state: trusted
  execution_context_id: exec:language:02
redaction_class: metadata_safe_default
captured_at: "2026-04-25T17:20:00Z"
export_safe_summary: >-
  Reference negotiation selected the shared graph as authoritative for
  the active workset while disclosing that unloaded roots prevent a
  whole-workspace claim.
