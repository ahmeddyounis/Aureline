__fixture__:
  name: provider_publish_later_drain_downgrade_on_drift
  scenario: >
    User approves a provider mutation but chooses publish-later. The ticket is spent to
    admit a deferred publish queue item. When a later drain attempt detects target
    drift, the action continues only as a local draft and emits a scope-downgrade
    event with a stable reason code.
  expected_events:
    - approval_ticket_preview_shown
    - approval_ticket_approved
    - approval_ticket_used
    - approval_ticket_scope_downgraded

