__fixture__:
  name: browser_return_revoked_then_replay_blocked
  scenario: >
    A browser handoff ticket is issued and spent to initiate an external flow. While the
    browser is open, the user revokes the ticket (or the underlying authority) from an
    inspectable surface. When the browser return arrives, the system fails closed with a
    replay-blocked event that cites the revocation reason.
  expected_events:
    - approval_ticket_preview_shown
    - approval_ticket_approved
    - approval_ticket_used
    - approval_ticket_revoked
    - approval_ticket_replay_blocked

