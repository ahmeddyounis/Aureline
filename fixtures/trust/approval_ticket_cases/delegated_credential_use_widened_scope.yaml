__fixture__:
  name: delegated_credential_use_widened_scope
  scenario: >
    A narrow credential-projection ticket was approved for a handle-only operation.
    At spend time, the requested operation widens into a higher-risk projection mode.
    The system mints a new ticket, links it via an approval_ticket_widened event, and
    spends the widened ticket.
  expected_events:
    - approval_ticket_preview_shown
    - approval_ticket_approved
    - approval_ticket_widened
    - approval_ticket_used

