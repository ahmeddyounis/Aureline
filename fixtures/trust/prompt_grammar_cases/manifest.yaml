schema_version: 1
contract_ref: docs/ux/prompt_grammar_contract.md
matrix_ref: artifacts/ux/prompt_family_matrix.yaml
trust_prompt_contract_ref: docs/ux/trust_prompt_contract.md

case_fields:
  - case_id
  - prompt_family
  - scenario
  - rendered_prompt
  - required_slots
  - decision_actions
  - same_surface_actions
  - material_change_checks
  - non_conforming_examples

cases:
  - file: destructive_delete_saved_worksets.yaml
    prompt_family: destructive_action
    scenario_class: destructive_delete
    exercises:
      - exact_object_count
      - scope_statement
      - export_before_delete
      - recovery_truth
      - generic_copy_denial
  - file: consent_renewal_widened_retention.yaml
    prompt_family: consent_renewal
    scenario_class: widened_retention_consent_renewal
    exercises:
      - retention_window_widened
      - recording_and_exportability_language
      - policy_owner_named
      - leave_without_widening
      - generic_consent_denial
  - file: approval_expiry_renewal.yaml
    prompt_family: approval_request
    scenario_class: approval_expiry_renewal
    exercises:
      - expired_approval_named
      - changed_approver_scope
      - target_scope_named
      - draft_blocked_path
      - generic_submit_denial
  - file: promote_vs_rollback_review.yaml
    prompt_family: promote_and_rollback_review
    scenario_class: promote_vs_rollback_review
    exercises:
      - promote_target_widening
      - rollback_prior_state
      - distinct_release_verbs
      - evidence_and_export_actions
      - generic_confirm_denial
