# yaml-language-server: $schema=../../../schemas/integrations/provider_mapping_state.schema.json
__fixture__:
  name: repo_inherited_mapping
  scenario: >
    The Aureline workspace has a repo-attached provider link checked
    in at .aureline/provider-link.toml. The issue or planning surface
    binds to the issue tracker board pointed at by that file.
    scope_provenance_class is repository_metadata; the resulting
    project_or_board_mapping_record is in mapping_state_class
    inherited_unconfirmed because the user has not yet confirmed
    sensitive sync modes. The active sync_mode_class is
    comment_or_link_sync, with status_transition_sync also permitted
    by admin policy. The active provider_account_state_record is
    signed_in / inherited_account / seat_active. The default-target
    resolution is repo_metadata_inherited; the
    default_target_explanation reads verbatim from the inherited
    config file and is not inferred from the most recent provider
    callback.
  exercised_contract_sections:
    - "Connected-provider account states (signed_in / inherited_account)"
    - "Project or board mappings — scope provenance repository_metadata"
    - "Default-target resolution — repo_metadata_inherited"
    - "Acceptance: users can tell why a mapping exists, what scope it covers"
  exercised_classes_summary:
    account_state_class: signed_in
    account_kind_class: inherited_account
    scope_provenance_class: repository_metadata
    sync_mode_class: comment_or_link_sync
    mapping_state_class: inherited_unconfirmed
    default_target_resolution_class: repo_metadata_inherited

records:
  - record_kind: provider_account_state_record
    provider_mapping_schema_version: 1
    provider_account_state_id: "provider_account_state:tracker.example:aureline:repo:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    account_state_class: signed_in
    account_kind_class: inherited_account
    actor_class_in_effect: human_account
    actor_subject_ref: "actor:user_a"
    seat_or_plan_state_class: seat_active
    seat_or_plan_summary: "Plan covers comment_or_link_sync and status_transition_sync."
    session_freshness_class: fresh
    default_target_resolution_class: repo_metadata_inherited
    default_target_explanation: >
      Inherited from .aureline/provider-link.toml at HEAD; targets the
      tracker.example board "aureline-product".
    preserved_handoff_state_refs: []
    metadata_safe_export_only: false
    diagnostics_links:
      - diagnostics_link_class: open_default_target_settings
        link_summary: "Open the default-target settings to confirm or override the inherited mapping."
        settings_record_ref: "settings:default_target:tracker.example:aureline:0001"
    active_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260429T100000Z:0001"
      policy_epoch: "policy_epoch:20260426T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260426T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260429T100000Z:0001"
    captured_at: "2026-04-29T10:00:00Z"
    state_summary: >
      Signed in as a human account using a mapping inherited from
      repository metadata; sync modes are admitted under the inherited
      scope.
    redaction_class: metadata_safe_default

  - record_kind: project_or_board_mapping_record
    provider_mapping_schema_version: 1
    mapping_id: "mapping:tracker.example:aureline:board:aureline-product"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    local_scope_ref: "workspace:repo:aureline"
    provider_scope_ref: "provider_scope:tracker.example:aureline:board:aureline-product"
    scope_provenance_class: repository_metadata
    scope_provenance_explanation: >
      Inherited from .aureline/provider-link.toml at HEAD. The file is
      tracked in the repository so every collaborator sees the same
      mapping.
    sync_mode_class: comment_or_link_sync
    permitted_sync_modes:
      - read_only_sync
      - comment_or_link_sync
      - status_transition_sync
      - offline_capture_only
    mapping_state_class: inherited_unconfirmed
    scope_coverage:
      scope_summary: >
        Issues, comments, labels, and status transitions on the
        aureline-product board.
      covered_object_classes:
        - issue_or_work_item
        - comment
        - label
        - status_transition
      metadata_safe_data_classes:
        - title_only
        - id_and_url_handle
        - label_or_status_class_only
        - no_attachment_bytes
      narrowed_by_admin_policy: false
    default_target_resolution_class: repo_metadata_inherited
    default_target_explanation: >
      The default target is the aureline-product board, inherited
      verbatim from the repo-attached provider link.
    preserved_handoff_state_refs: []
    active_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
    diagnostics_links:
      - diagnostics_link_class: open_default_target_settings
        link_summary: "Confirm or override the inherited default target."
        settings_record_ref: "settings:default_target:tracker.example:aureline:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260429T100000Z:0001"
      policy_epoch: "policy_epoch:20260426T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260426T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260429T100000Z:0001"
    captured_at: "2026-04-29T10:00:00Z"
    mapping_summary: >
      Inherited mapping bound to the aureline-product board; awaiting
      user confirmation for sensitive sync modes.
    redaction_class: metadata_safe_default

conformance_tests:
  - id: repo_inherited_mapping_carries_provenance_explanation
    description: >
      A project_or_board_mapping_record whose scope_provenance_class is
      repository_metadata MUST carry a non-empty
      scope_provenance_explanation that names the repo-attached
      mapping verbatim.
  - id: repo_inherited_default_target_explainable
    description: >
      The default_target_resolution_class MUST be
      repo_metadata_inherited and the default_target_explanation MUST
      cite the inherited config; surfaces MUST NOT infer the default
      target from the most recent provider callback.
  - id: inherited_unconfirmed_mapping_admits_sync_modes
    description: >
      An inherited_unconfirmed mapping MAY still carry an active
      sync_mode_class within permitted_sync_modes; the
      inherited_unconfirmed state signals only that sensitive sync
      modes need user confirmation in product UX.
