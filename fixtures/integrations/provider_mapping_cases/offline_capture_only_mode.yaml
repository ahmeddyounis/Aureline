# yaml-language-server: $schema=../../../schemas/integrations/provider_mapping_state.schema.json
__fixture__:
  name: offline_capture_only_mode
  scenario: >
    The issue or planning provider is unreachable. The user files a
    bug report against the workspace. The mapping narrows to
    sync_mode_class offline_capture_only and an
    offline_capture_control_record is minted under metadata-safe
    defaults with capture_publish_intent_class
    publish_when_connectivity_returns. The capture rides a
    publish-later queue item rather than a parallel outbox; loss of
    connectivity does not erase the prepared handoff state and does
    not silently widen export or telemetry scope. Diagnostics links
    point at the offline-capture inbox, the connectivity status item,
    and the publish-later queue review.
  exercised_contract_sections:
    - "Connected-provider account states (offline_with_cached_read_state)"
    - "Project or board mappings — sync_mode_class offline_capture_only"
    - "Offline-capture controls — bug_report under metadata-safe defaults"
    - "Acceptance: connectivity loss does not erase prepared handoff state or widen scope"
  exercised_classes_summary:
    account_state_class: offline_with_cached_read_state
    account_kind_class: active_account
    sync_mode_class: offline_capture_only
    offline_capture_kind_class: bug_report
    capture_metadata_safety_class: metadata_safe_default
    capture_publish_intent_class: publish_when_connectivity_returns

records:
  - record_kind: provider_account_state_record
    provider_mapping_schema_version: 1
    provider_account_state_id: "provider_account_state:tracker.example:aureline:offline:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    account_state_class: offline_with_cached_read_state
    account_kind_class: active_account
    actor_class_in_effect: human_account
    actor_subject_ref: "actor:user_a"
    seat_or_plan_state_class: seat_active
    seat_or_plan_summary: "Plan covers comment_or_link_sync and status_transition_sync."
    session_freshness_class: bounded_stale
    default_target_resolution_class: explicit_user_choice
    default_target_explanation: >
      Last user-confirmed target is the aureline-product board;
      preserved while the provider is unreachable.
    preserved_handoff_state_refs:
      - "publish_later:queue_item:tracker.example:aureline:bug_report:0001"
    metadata_safe_export_only: true
    diagnostics_links:
      - diagnostics_link_class: open_connectivity_status
        link_summary: "Open the connectivity status item to see why the provider is unreachable."
        settings_record_ref: "conn:managed_writes:20260429T100200Z:0001"
      - diagnostics_link_class: open_offline_capture_inbox
        link_summary: "Review captures held offline; they will publish when connectivity returns."
        settings_record_ref: "offline_capture_inbox:tracker.example:aureline:0001"
      - diagnostics_link_class: open_publish_later_queue_review
        link_summary: "Review the publish-later queue items the captures are riding."
        settings_record_ref: "publish_later:queue_review:tracker.example:aureline:0001"
    active_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260429T100200Z:0001"
      policy_epoch: "policy_epoch:20260426T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260426T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260429T100200Z:0001"
    captured_at: "2026-04-29T10:02:00Z"
    state_summary: >
      Provider unreachable; cached read state is bounded-stale and
      exports are pinned to metadata-safe defaults.
    redaction_class: metadata_safe_default

  - record_kind: project_or_board_mapping_record
    provider_mapping_schema_version: 1
    mapping_id: "mapping:tracker.example:aureline:board:aureline-product:offline"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    local_scope_ref: "workspace:repo:aureline"
    provider_scope_ref: "provider_scope:tracker.example:aureline:board:aureline-product"
    scope_provenance_class: user_default
    scope_provenance_explanation: >
      User-default mapping captured before the provider became
      unreachable; held in offline_capture_only mode until
      connectivity returns.
    sync_mode_class: offline_capture_only
    permitted_sync_modes:
      - read_only_sync
      - comment_or_link_sync
      - status_transition_sync
      - offline_capture_only
    mapping_state_class: active
    scope_coverage:
      scope_summary: "Bug reports captured against the aureline-product board."
      covered_object_classes:
        - issue_or_work_item
        - comment
      metadata_safe_data_classes:
        - title_only
        - id_and_url_handle
        - summary_count_only
        - no_attachment_bytes
        - no_user_pii
      narrowed_by_admin_policy: false
    default_target_resolution_class: explicit_user_choice
    default_target_explanation: >
      Default target preserved verbatim from the last user-confirmed
      selection; the offline mode does not change the target.
    preserved_handoff_state_refs:
      - "publish_later:queue_item:tracker.example:aureline:bug_report:0001"
    active_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
    diagnostics_links:
      - diagnostics_link_class: open_offline_capture_inbox
        link_summary: "Review the offline-capture inbox."
        settings_record_ref: "offline_capture_inbox:tracker.example:aureline:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260429T100200Z:0001"
      policy_epoch: "policy_epoch:20260426T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260426T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260429T100200Z:0001"
    captured_at: "2026-04-29T10:02:00Z"
    mapping_summary: >
      Mapping is preserved but narrowed to offline_capture_only while
      the provider is unreachable.
    redaction_class: metadata_safe_default

  - record_kind: offline_capture_control_record
    provider_mapping_schema_version: 1
    capture_control_id: "offline_capture:tracker.example:aureline:bug_report:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    offline_capture_kind_class: bug_report
    capture_metadata_safety_class: metadata_safe_default
    capture_publish_intent_class: publish_when_connectivity_returns
    default_target_resolution_class: explicit_user_choice
    default_target_explanation: >
      Will publish under the last user-confirmed target on the
      aureline-product board when connectivity returns.
    metadata_safe_default_enabled: true
    linked_publish_later_queue_item_ref: "publish_later:queue_item:tracker.example:aureline:bug_report:0001"
    diagnostics_links:
      - diagnostics_link_class: open_offline_capture_inbox
        link_summary: "Review the captured bug reports."
        settings_record_ref: "offline_capture_inbox:tracker.example:aureline:0001"
      - diagnostics_link_class: open_connectivity_status
        link_summary: "See when the provider becomes reachable again."
        settings_record_ref: "conn:managed_writes:20260429T100200Z:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260429T100200Z:0001"
      policy_epoch: "policy_epoch:20260426T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260426T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260429T100200Z:0001"
    captured_at: "2026-04-29T10:02:30Z"
    capture_summary: >
      Captured a bug report under metadata-safe defaults; rides the
      publish-later queue and will drain when connectivity returns.
    redaction_class: metadata_safe_default

conformance_tests:
  - id: offline_state_pins_metadata_safe_export_only
    description: >
      A provider_account_state_record in account_state_class
      offline_with_cached_read_state MUST set
      metadata_safe_export_only to true.
  - id: offline_capture_rides_publish_later_queue
    description: >
      An offline_capture_control_record with capture_publish_intent_class
      publish_when_connectivity_returns MUST cite a non-empty
      linked_publish_later_queue_item_ref so the capture rides the
      existing publish-later queue rather than a parallel outbox.
  - id: offline_mode_preserves_handoff_state
    description: >
      The provider_account_state_record and
      project_or_board_mapping_record MUST carry at least one
      preserved_handoff_state_ref pointing at the publish-later queue
      item the capture rides; loss of connectivity may not erase
      prepared handoff state.
