# yaml-language-server: $schema=../../../schemas/integrations/provider_mapping_state.schema.json
__fixture__:
  name: admin_forced_scope
  scenario: >
    Org admin policy forces the issue or planning surface onto the
    "triage" board and narrows permitted sync modes to read_only_sync
    and comment_or_link_sync (no status-transition sync). The user
    cannot widen the scope. The provider_account_state_record is
    signed_in / admin_forced_target / seat_active. The
    project_or_board_mapping_record is in mapping_state_class active
    with scope_provenance_class admin_policy and
    default_target_resolution_class admin_forced. An
    account_switch_audit_hook_record explains the most recent admin
    policy change that narrowed the previously inherited mapping.
  exercised_contract_sections:
    - "Connected-provider account states (signed_in / admin_forced_target)"
    - "Project or board mappings — scope provenance admin_policy"
    - "Default-target resolution — admin_forced"
    - "Account-switch audit hooks — admin_policy_changed_target"
    - "Acceptance: default targets explainable from mapping provenance"
  exercised_classes_summary:
    account_state_class: signed_in
    account_kind_class: admin_forced_target
    scope_provenance_class: admin_policy
    sync_mode_class: comment_or_link_sync
    mapping_state_class: active
    default_target_resolution_class: admin_forced
    audit_hook_event_class: admin_policy_changed_target

records:
  - record_kind: provider_account_state_record
    provider_mapping_schema_version: 1
    provider_account_state_id: "provider_account_state:tracker.example:aureline:admin:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    account_state_class: signed_in
    account_kind_class: admin_forced_target
    actor_class_in_effect: human_account
    actor_subject_ref: "actor:user_a"
    seat_or_plan_state_class: seat_active
    seat_or_plan_summary: "Plan covers comment_or_link_sync; status-transition sync is denied by org policy."
    session_freshness_class: fresh
    default_target_resolution_class: admin_forced
    default_target_explanation: >
      Org admin policy forces the default target to the triage board.
      Status-transition sync is denied; the user cannot widen this
      scope.
    preserved_handoff_state_refs: []
    metadata_safe_export_only: false
    diagnostics_links:
      - diagnostics_link_class: open_admin_policy_explanation
        link_summary: "Open the admin-policy explanation showing why the default target is admin-forced."
        settings_record_ref: "admin_policy:tracker.example:aureline:default_target:triage"
    active_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260429T100100Z:0001"
      policy_epoch: "policy_epoch:20260426T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260426T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260429T100100Z:0001"
    captured_at: "2026-04-29T10:01:00Z"
    state_summary: >
      Signed in under an admin-forced target; permitted sync modes
      narrowed to read-only and comment-or-link.
    redaction_class: metadata_safe_default

  - record_kind: project_or_board_mapping_record
    provider_mapping_schema_version: 1
    mapping_id: "mapping:tracker.example:aureline:board:triage"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    local_scope_ref: "workspace:repo:aureline"
    provider_scope_ref: "provider_scope:tracker.example:aureline:board:triage"
    scope_provenance_class: admin_policy
    scope_provenance_explanation: >
      Org admin policy at policy_epoch:20260426T000000Z forces the
      target to the triage board and narrows permitted sync modes.
    sync_mode_class: comment_or_link_sync
    permitted_sync_modes:
      - read_only_sync
      - comment_or_link_sync
      - offline_capture_only
    mapping_state_class: active
    scope_coverage:
      scope_summary: >
        Issues and comments on the admin-forced triage board. Status
        transitions and labels are denied by org policy.
      covered_object_classes:
        - issue_or_work_item
        - comment
      metadata_safe_data_classes:
        - title_only
        - id_and_url_handle
        - summary_count_only
        - no_attachment_bytes
        - no_user_pii
      narrowed_by_admin_policy: true
    default_target_resolution_class: admin_forced
    default_target_explanation: >
      Default target is the triage board because admin policy forces
      it. The user cannot widen this scope.
    preserved_handoff_state_refs:
      - "publish_later:queue_item:tracker.example:aureline:triage:0001"
    active_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
    diagnostics_links:
      - diagnostics_link_class: open_admin_policy_explanation
        link_summary: "Show the admin-policy explanation for the forced target."
        settings_record_ref: "admin_policy:tracker.example:aureline:default_target:triage"
      - diagnostics_link_class: open_publish_later_queue_review
        link_summary: "Review queued items still admissible under the narrowed sync modes."
        settings_record_ref: "publish_later:queue_review:tracker.example:aureline:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260429T100100Z:0001"
      policy_epoch: "policy_epoch:20260426T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260426T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260429T100100Z:0001"
    captured_at: "2026-04-29T10:01:00Z"
    mapping_summary: >
      Admin-forced mapping to the triage board; previously inherited
      user-default mapping was held by policy.
    redaction_class: metadata_safe_default

  - record_kind: account_switch_audit_hook_record
    provider_mapping_schema_version: 1
    audit_hook_id: "audit_hook:tracker.example:aureline:admin_policy_changed_target:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    audit_hook_event_class: admin_policy_changed_target
    from_actor_class: human_account
    to_actor_class: human_account
    from_account_state_class: signed_in
    to_account_state_class: signed_in
    from_default_target_resolution_class: user_default_inherited
    to_default_target_resolution_class: admin_forced
    affected_mapping_refs:
      - "mapping:tracker.example:aureline:board:aureline-product"
      - "mapping:tracker.example:aureline:board:triage"
    preserved_handoff_state_refs:
      - "publish_later:queue_item:tracker.example:aureline:triage:0001"
    rationale_summary: >
      Admin policy at policy_epoch:20260426T000000Z narrowed the
      default target to the triage board; the previously inherited
      user-default mapping is held until the user reconciles.
    diagnostics_links:
      - diagnostics_link_class: open_admin_policy_explanation
        link_summary: "Open the admin-policy explanation that narrowed the target."
        settings_record_ref: "admin_policy:tracker.example:aureline:default_target:triage"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260429T100050Z:0001"
      policy_epoch: "policy_epoch:20260426T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260426T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260429T100050Z:0001"
    occurred_at: "2026-04-29T10:00:50Z"
    redaction_class: metadata_safe_default

conformance_tests:
  - id: admin_forced_scope_cites_admin_policy_explanation
    description: >
      A project_or_board_mapping_record whose scope_provenance_class is
      admin_policy MUST carry a non-empty scope_provenance_explanation
      and MUST resolve default_target_resolution_class to admin_forced.
  - id: admin_forced_narrows_permitted_sync_modes
    description: >
      An admin-forced mapping MUST narrow permitted_sync_modes (in
      this scenario, status_transition_sync is excluded) and MUST set
      narrowed_by_admin_policy to true on scope_coverage.
  - id: admin_policy_change_audit_lists_affected_mappings
    description: >
      An admin_policy_changed_target audit hook MUST carry at least
      one affected_mapping_ref so the audit trail explains which
      mappings the policy change narrowed.
