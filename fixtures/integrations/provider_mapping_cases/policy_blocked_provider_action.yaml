# yaml-language-server: $schema=../../../schemas/integrations/provider_mapping_state.schema.json
__fixture__:
  name: policy_blocked_provider_action
  scenario: >
    Org admin policy denies the issue or planning surface from binding
    to any external project or board (for example, a contractor
    tenant that may not file external issues). The
    provider_account_state_record is policy_blocked /
    admin_forced_target with metadata_safe_export_only pinned true.
    The project_or_board_mapping_record is in mapping_state_class
    blocked_by_admin_policy and sync_mode_class offline_capture_only;
    the only admissible authoring path is offline-capture under
    metadata-safe defaults. An offline_capture_control_record for a
    blocked-work note is admitted with capture_publish_intent_class
    publish_after_admin_policy_review so the capture survives until
    admin policy is reconciled.
  exercised_contract_sections:
    - "Connected-provider account states (policy_blocked / admin_forced_target)"
    - "Project or board mappings — blocked_by_admin_policy"
    - "Offline-capture controls — blocked_work_note under publish_after_admin_policy_review"
    - "Acceptance: workflows continue in truthful local-only modes when account posture changes"
  exercised_classes_summary:
    account_state_class: policy_blocked
    account_kind_class: admin_forced_target
    sync_mode_class: offline_capture_only
    mapping_state_class: blocked_by_admin_policy
    offline_capture_kind_class: blocked_work_note
    capture_publish_intent_class: publish_after_admin_policy_review

records:
  - record_kind: provider_account_state_record
    provider_mapping_schema_version: 1
    provider_account_state_id: "provider_account_state:tracker.example:aureline:policy_blocked:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    account_state_class: policy_blocked
    account_kind_class: admin_forced_target
    actor_class_in_effect: human_account
    actor_subject_ref: "actor:user_a"
    seat_or_plan_state_class: seat_active
    seat_or_plan_summary: "Plan covers comment_or_link_sync but admin policy denies all provider actions for this surface."
    session_freshness_class: fresh
    default_target_resolution_class: admin_forced
    default_target_explanation: >
      Org admin policy denies any external project or board target
      for this surface; the only admissible path is local-only
      offline capture under metadata-safe defaults.
    preserved_handoff_state_refs:
      - "publish_later:queue_item:tracker.example:aureline:blocked_work_note:0001"
    metadata_safe_export_only: true
    diagnostics_links:
      - diagnostics_link_class: open_admin_policy_explanation
        link_summary: "Open the admin-policy explanation that denies external provider actions."
        settings_record_ref: "admin_policy:tracker.example:aureline:provider_action_blocked"
      - diagnostics_link_class: open_offline_capture_inbox
        link_summary: "Review captures held until the policy review."
        settings_record_ref: "offline_capture_inbox:tracker.example:aureline:0001"
    active_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260429T100600Z:0001"
      policy_epoch: "policy_epoch:20260426T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260426T000000Z"
      trust_state: restricted
      execution_context_id: "exec_ctx:20260429T100600Z:0001"
    captured_at: "2026-04-29T10:06:00Z"
    state_summary: >
      Admin policy blocks all external provider actions; the surface
      runs in metadata-safe local-only mode.
    redaction_class: metadata_safe_default

  - record_kind: project_or_board_mapping_record
    provider_mapping_schema_version: 1
    mapping_id: "mapping:tracker.example:aureline:blocked:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    local_scope_ref: "workspace:repo:aureline"
    provider_scope_ref: ""
    scope_provenance_class: admin_policy
    scope_provenance_explanation: >
      Org admin policy at policy_epoch:20260426T000000Z denies all
      external project or board bindings for this surface. The local
      scope MAY only run in offline_capture_only mode.
    sync_mode_class: offline_capture_only
    permitted_sync_modes:
      - offline_capture_only
    mapping_state_class: blocked_by_admin_policy
    scope_coverage:
      scope_summary: "Local-only blocked-work notes; no provider scope is admitted."
      covered_object_classes:
        - issue_or_work_item
      metadata_safe_data_classes:
        - title_only
        - summary_count_only
        - no_body
        - no_attachment_bytes
        - no_user_pii
      narrowed_by_admin_policy: true
    default_target_resolution_class: admin_forced
    default_target_explanation: >
      Default target is no_default_local_only; admin policy denies
      any provider target.
    preserved_handoff_state_refs:
      - "publish_later:queue_item:tracker.example:aureline:blocked_work_note:0001"
    active_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
    diagnostics_links:
      - diagnostics_link_class: open_admin_policy_explanation
        link_summary: "Open the admin-policy explanation."
        settings_record_ref: "admin_policy:tracker.example:aureline:provider_action_blocked"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260429T100600Z:0001"
      policy_epoch: "policy_epoch:20260426T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260426T000000Z"
      trust_state: restricted
      execution_context_id: "exec_ctx:20260429T100600Z:0001"
    captured_at: "2026-04-29T10:06:00Z"
    mapping_summary: >
      Mapping is blocked_by_admin_policy; only offline_capture_only
      is admitted.
    redaction_class: metadata_safe_default

  - record_kind: offline_capture_control_record
    provider_mapping_schema_version: 1
    capture_control_id: "offline_capture:tracker.example:aureline:blocked_work_note:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    offline_capture_kind_class: blocked_work_note
    capture_metadata_safety_class: operator_only_restricted
    capture_publish_intent_class: publish_after_admin_policy_review
    default_target_resolution_class: no_default_local_only_fallback
    default_target_explanation: >
      No provider target admitted; the capture is held until admin
      policy review unblocks the surface.
    metadata_safe_default_enabled: true
    linked_publish_later_queue_item_ref: "publish_later:queue_item:tracker.example:aureline:blocked_work_note:0001"
    diagnostics_links:
      - diagnostics_link_class: open_admin_policy_explanation
        link_summary: "Open the admin-policy explanation that holds this capture."
        settings_record_ref: "admin_policy:tracker.example:aureline:provider_action_blocked"
      - diagnostics_link_class: open_offline_capture_inbox
        link_summary: "Review captures held until policy review."
        settings_record_ref: "offline_capture_inbox:tracker.example:aureline:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260429T100600Z:0001"
      policy_epoch: "policy_epoch:20260426T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260426T000000Z"
      trust_state: restricted
      execution_context_id: "exec_ctx:20260429T100600Z:0001"
    captured_at: "2026-04-29T10:06:30Z"
    capture_summary: >
      Captured a blocked-work note under operator-only redaction;
      held until admin policy review.
    redaction_class: operator_only_restricted

conformance_tests:
  - id: policy_blocked_pins_export_metadata_safe
    description: >
      A provider_account_state_record in account_state_class
      policy_blocked MUST set metadata_safe_export_only to true and
      MUST pair with admin_forced_target or local_only_fallback.
  - id: blocked_by_admin_policy_only_offline_capture_only
    description: >
      A project_or_board_mapping_record in mapping_state_class
      blocked_by_admin_policy MUST narrow sync_mode_class to
      offline_capture_only and MUST narrow permitted_sync_modes
      accordingly.
  - id: capture_under_policy_review_rides_publish_later
    description: >
      An offline_capture_control_record with capture_publish_intent_class
      publish_after_admin_policy_review MUST cite a non-empty
      linked_publish_later_queue_item_ref so the capture rides the
      publish-later queue and survives the policy review.
