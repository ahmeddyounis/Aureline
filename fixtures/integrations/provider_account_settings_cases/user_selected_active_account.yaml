# yaml-language-server: $schema=../../../schemas/integrations/provider_account_state.schema.json
__fixture__:
  name: user_selected_active_account
  scenario: >
    The user opens the issue-tracker surface for the first time after
    a fresh install, and explicitly picks the "aureline-product"
    board on tracker.example/aureline as the active account and
    default target. There is no inherited mapping; the user-selected
    active account is the only candidate. The settings record
    captures account_kind_class=active_account with
    account_binding_class=user_selected_active_account, seat_active,
    fresh session, and not_in_cached_shadow. The matching
    default_target_resolution_record for board_context resolves under
    explicit_user_choice with explicit_user_choice_source as the only
    provenance entry. No prior audit hook exists.
  exercised_contract_sections:
    - "Settings record — user_selected_active_account binding"
    - "Default-target resolution — explicit_user_choice / explicit_user_choice_source"
    - "Acceptance: any provider-linked action can explain which target it will use"
  exercised_classes_summary:
    account_state_class: signed_in
    account_kind_class: active_account
    account_binding_class: user_selected_active_account
    seat_or_plan_state_class: seat_active
    cached_offline_shadow_class: not_in_cached_shadow
    default_target_resolution_class: explicit_user_choice
    target_context_class: board_context
    target_provenance_source_class: explicit_user_choice_source

records:
  - record_kind: provider_account_settings_record
    provider_account_settings_schema_version: 1
    settings_record_id: "provider_account_settings:tracker.example:aureline:user_selected:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    linked_provider_account_state_record_ref: "provider_account_state:tracker.example:aureline:user_selected:0001"
    account_state_class: signed_in
    account_kind_class: active_account
    account_binding_disclosure:
      account_binding_class: user_selected_active_account
      binding_summary: >
        Bound by explicit user choice on this surface; no inherited
        repo, user-default, workspace-setting, or org-mapping source
        contributed to this binding.
      linked_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
      linked_inherited_source_ref: ""
    actor_class_in_effect: human_account
    actor_subject_ref: "actor:user_a"
    seat_or_plan_state_class: seat_active
    seat_or_plan_summary: "Plan covers comment_or_link_sync and status_transition_sync."
    session_freshness_class: fresh
    cached_offline_shadow_disclosure:
      cached_offline_shadow_class: not_in_cached_shadow
      shadow_summary: "Surface is rendering against a live, fresh provider account."
      shadow_window_closes_at: null
    default_target_resolution_class: explicit_user_choice
    default_target_explanation: >
      User explicitly selected the aureline-product board as the
      default target for this surface; no inherited or admin source
      contributed to the choice.
    linked_default_target_resolution_record_refs:
      - "default_target_resolution:tracker.example:aureline:board:user_selected:0001"
    preserved_handoff_state_refs: []
    metadata_safe_export_only: false
    diagnostics_links:
      - diagnostics_link_class: open_default_target_settings
        link_summary: "Open the default-target settings to change the user-selected target."
        settings_record_ref: "settings:default_target:tracker.example:aureline:user_a"
      - diagnostics_link_class: open_account_settings
        link_summary: "Open account settings to switch accounts."
        settings_record_ref: "settings:account:tracker.example:aureline:user_a"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260504T100000Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100000Z:0001"
    captured_at: "2026-05-04T10:00:00Z"
    settings_summary: >
      Signed in under a user-selected active account; default target
      is the user-picked aureline-product board.
    redaction_class: metadata_safe_default

  - record_kind: default_target_resolution_record
    default_target_resolution_schema_version: 1
    resolution_record_id: "default_target_resolution:tracker.example:aureline:board:user_selected:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    linked_provider_account_settings_record_ref: "provider_account_settings:tracker.example:aureline:user_selected:0001"
    target_context_class: board_context
    context_summary: "Default board for issue-tracker actions on this workspace."
    local_scope_ref: "workspace:repo:aureline"
    default_target_resolution_class: explicit_user_choice
    default_target_explanation: >
      User explicitly selected the aureline-product board on this
      surface; no other provenance source contributed to the
      selection.
    selected_target_ref: "provider_scope:tracker.example:aureline:board:aureline-product"
    provenance_chain:
      - target_provenance_source_class: explicit_user_choice_source
        selection_outcome_class: selected_default_target
        outcome_summary: >
          User selected this target on the issue-tracker surface
          settings panel; the choice is the only candidate
          considered.
        linked_source_record_ref: "settings:default_target:tracker.example:aureline:user_a"
        candidate_target_ref: "provider_scope:tracker.example:aureline:board:aureline-product"
    unresolved_reason_class: no_unresolved_resolution_succeeded
    narrowed_by_admin_policy: false
    metadata_safe_export_only: false
    linked_default_target_resolution_record_ref: ""
    linked_account_switch_audit_record_ref: ""
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260504T100000Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100000Z:0001"
    captured_at: "2026-05-04T10:00:00Z"
    redaction_class: metadata_safe_default

conformance_tests:
  - id: user_selected_account_carries_explicit_user_choice_source
    description: >
      A provider_account_settings_record under
      account_kind_class=active_account MUST disclose
      account_binding_class=user_selected_active_account, and the
      matching default_target_resolution_record MUST resolve under
      explicit_user_choice with at least one provenance_chain entry
      whose target_provenance_source_class is
      explicit_user_choice_source and whose selection_outcome_class
      is selected_default_target.
  - id: user_selected_account_does_not_widen_export
    description: >
      Even under a user-selected active account, the schema permits
      metadata_safe_export_only=false only when the account is live
      and fresh (cached_offline_shadow_class=not_in_cached_shadow);
      this fixture exercises that admissible path.
