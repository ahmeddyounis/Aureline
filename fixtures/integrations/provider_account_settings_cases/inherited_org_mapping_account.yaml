# yaml-language-server: $schema=../../../schemas/integrations/provider_account_state.schema.json
__fixture__:
  name: inherited_org_mapping_account
  scenario: >
    A new contributor opens the code-host surface in an Aureline
    workspace whose parent org publishes an inherited mapping that
    points the workspace at the codehost.example/aureline org and
    the aureline/product repo. The user has a personal user-default
    account too, but the workspace setting (which carries the org
    mapping inheritance) overrides it. The settings record discloses
    account_kind_class=inherited_account with
    account_binding_class=inherited_org_mapping_account. The
    repo_context default_target_resolution_record resolves under
    workspace_setting_inherited; the provenance_chain shows
    user_default_source overridden_by_higher_provenance and
    workspace_setting_source selected. The
    inherited_org_mapping_source candidate is recorded in the chain
    so audit explains the upstream lineage.
  exercised_contract_sections:
    - "Settings record — inherited_org_mapping_account binding"
    - "Default-target resolution — workspace_setting_inherited with org-mapping lineage"
    - "Acceptance: users can tell why a mapping exists"
  exercised_classes_summary:
    account_state_class: signed_in
    account_kind_class: inherited_account
    account_binding_class: inherited_org_mapping_account
    seat_or_plan_state_class: seat_active
    cached_offline_shadow_class: not_in_cached_shadow
    default_target_resolution_class: workspace_setting_inherited
    target_context_class: repo_context
    target_provenance_source_class: workspace_setting_source

records:
  - record_kind: provider_account_settings_record
    provider_account_settings_schema_version: 1
    settings_record_id: "provider_account_settings:codehost.example:aureline:org_mapping:0001"
    connected_provider_record_id: "conn_prov:codehost.example:aureline:install-1"
    provider_identity:
      provider_class: code_host
      canonical_host: "codehost.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:codehost.example:aureline"
      environment_class: public_saas
    surface_class: code_host_surface
    linked_provider_account_state_record_ref: "provider_account_state:codehost.example:aureline:org_mapping:0001"
    account_state_class: signed_in
    account_kind_class: inherited_account
    account_binding_disclosure:
      account_binding_class: inherited_org_mapping_account
      binding_summary: >
        Bound via an org-level mapping inherited at the workspace
        level; the workspace setting carries the org mapping
        verbatim. The user's local default for codehost.example is
        retained but overridden by the higher-precedence workspace
        setting.
      linked_account_mapping_binding_ref: "account_mapping:codehost.example:aureline:user_b"
      linked_inherited_source_ref: "settings:workspace_setting:codehost.example:aureline:org_mapping_inheritance"
    actor_class_in_effect: human_account
    actor_subject_ref: "actor:user_b"
    seat_or_plan_state_class: seat_active
    seat_or_plan_summary: "Plan covers all sync modes; org mapping does not narrow scope."
    session_freshness_class: fresh
    cached_offline_shadow_disclosure:
      cached_offline_shadow_class: not_in_cached_shadow
      shadow_summary: "Surface is rendering against a live, fresh provider account."
      shadow_window_closes_at: null
    default_target_resolution_class: workspace_setting_inherited
    default_target_explanation: >
      Default target inherited from the workspace setting that
      carries the org-level mapping for codehost.example/aureline.
      The user's user-default mapping is retained but overridden by
      the higher-precedence workspace setting.
    linked_default_target_resolution_record_refs:
      - "default_target_resolution:codehost.example:aureline:repo:org_mapping:0001"
    preserved_handoff_state_refs: []
    metadata_safe_export_only: false
    diagnostics_links:
      - diagnostics_link_class: open_default_target_settings
        link_summary: "Review the inherited workspace-setting target; user-default override available if policy permits."
        settings_record_ref: "settings:workspace_setting:codehost.example:aureline:org_mapping_inheritance"
    origin_disclosure:
      host_identity: "host:device_b"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_b"
      execution_context_id: "exec_ctx:20260504T100100Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100100Z:0001"
    captured_at: "2026-05-04T10:01:00Z"
    settings_summary: >
      Signed in under an inherited org mapping carried by the
      workspace setting; the user's user-default is overridden but
      retained for audit.
    redaction_class: metadata_safe_default

  - record_kind: default_target_resolution_record
    default_target_resolution_schema_version: 1
    resolution_record_id: "default_target_resolution:codehost.example:aureline:repo:org_mapping:0001"
    connected_provider_record_id: "conn_prov:codehost.example:aureline:install-1"
    provider_identity:
      provider_class: code_host
      canonical_host: "codehost.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:codehost.example:aureline"
      environment_class: public_saas
    surface_class: code_host_surface
    linked_provider_account_settings_record_ref: "provider_account_settings:codehost.example:aureline:org_mapping:0001"
    target_context_class: repo_context
    context_summary: "Default repository for code-host actions in this workspace."
    local_scope_ref: "workspace:repo:aureline"
    default_target_resolution_class: workspace_setting_inherited
    default_target_explanation: >
      Default repo resolved from the workspace setting that carries
      the inherited org mapping for codehost.example/aureline. The
      user's user-default is retained for audit but overridden by
      the higher-precedence workspace setting.
    selected_target_ref: "provider_scope:codehost.example:aureline:repo:product"
    provenance_chain:
      - target_provenance_source_class: explicit_user_choice_source
        selection_outcome_class: candidate_only_not_selected
        outcome_summary: >
          The user has not picked a default repo on this surface;
          this candidate is empty.
        linked_source_record_ref: ""
        candidate_target_ref: ""
      - target_provenance_source_class: user_default_source
        selection_outcome_class: overridden_by_higher_provenance
        outcome_summary: >
          User-default mapping for codehost.example exists but is
          overridden by the higher-precedence workspace setting.
        linked_source_record_ref: "settings:user_default:codehost.example:user_b"
        candidate_target_ref: "provider_scope:codehost.example:user_b:repo:fork"
      - target_provenance_source_class: workspace_setting_source
        selection_outcome_class: selected_default_target
        outcome_summary: >
          Workspace setting wins; the setting itself was inherited
          from the org mapping at workspace bind time.
        linked_source_record_ref: "settings:workspace_setting:codehost.example:aureline:org_mapping_inheritance"
        candidate_target_ref: "provider_scope:codehost.example:aureline:repo:product"
      - target_provenance_source_class: inherited_org_mapping_source
        selection_outcome_class: fallback_used_no_higher_provenance
        outcome_summary: >
          Org mapping recorded as upstream lineage; the workspace
          setting is the proximate carrier and was selected.
        linked_source_record_ref: "settings:org_mapping:codehost.example:aureline:product"
        candidate_target_ref: "provider_scope:codehost.example:aureline:repo:product"
      - target_provenance_source_class: admin_policy_source
        selection_outcome_class: candidate_only_not_selected
        outcome_summary: >
          No admin policy narrows or forces a default repo for this
          surface in this workspace.
        linked_source_record_ref: ""
        candidate_target_ref: ""
    unresolved_reason_class: no_unresolved_resolution_succeeded
    narrowed_by_admin_policy: false
    metadata_safe_export_only: false
    linked_default_target_resolution_record_ref: ""
    linked_account_switch_audit_record_ref: ""
    origin_disclosure:
      host_identity: "host:device_b"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_b"
      execution_context_id: "exec_ctx:20260504T100100Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100100Z:0001"
    captured_at: "2026-05-04T10:01:00Z"
    redaction_class: metadata_safe_default

conformance_tests:
  - id: inherited_org_mapping_carries_workspace_setting_winner
    description: >
      A default_target_resolution_record under
      workspace_setting_inherited MUST contain at least one
      provenance_chain entry whose target_provenance_source_class is
      workspace_setting_source and whose selection_outcome_class is
      selected_default_target.
  - id: inherited_org_mapping_records_user_default_override
    description: >
      The provenance_chain MUST cite user_default_source with
      overridden_by_higher_provenance so reviewers can audit the
      override decision verbatim.
  - id: inherited_org_mapping_records_upstream_org_mapping_lineage
    description: >
      The provenance_chain SHOULD cite inherited_org_mapping_source
      with a non-empty linked_source_record_ref so the upstream
      lineage of the workspace setting is auditable.
