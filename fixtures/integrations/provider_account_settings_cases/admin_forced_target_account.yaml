# yaml-language-server: $schema=../../../schemas/integrations/provider_account_state.schema.json
__fixture__:
  name: admin_forced_target_account
  scenario: >
    Org admin policy forces the issue-tracker surface onto the
    triage board on tracker.example/aureline and narrows permitted
    sync modes (no status_transition_sync). The settings record
    discloses account_kind_class=admin_forced_target with
    account_binding_class=admin_forced_account; the
    default_target_resolution_record for board_context resolves
    under admin_forced with admin_policy_source as the winning
    provenance entry, and narrowed_by_admin_policy=true. An
    account_switch_audit_record explains the
    admin_policy_changed_target event with explicit
    scope_change_class=scope_target_remapped_by_admin_policy,
    affected_workflow_classes=[work_item_workflow_target,
    publish_now_workflow_target,
    deferred_publish_workflow_target,
    queue_review_workflow_target],
    queued_draft_disclosure_class=queued_drafts_invalidated_by_target_remap,
    and provider_authority_consequence_class=authority_narrowed_by_admin_policy.
  exercised_contract_sections:
    - "Settings record — admin_forced_account binding"
    - "Default-target resolution — admin_forced / admin_policy_source"
    - "Account-switch audit — admin_policy_changed_target with full disclosure"
    - "Acceptance: account switches leave reviewable audit artifacts"
  exercised_classes_summary:
    account_state_class: signed_in
    account_kind_class: admin_forced_target
    account_binding_class: admin_forced_account
    default_target_resolution_class: admin_forced
    target_context_class: board_context
    target_provenance_source_class: admin_policy_source
    audit_hook_event_class: admin_policy_changed_target
    scope_change_class: scope_target_remapped_by_admin_policy
    queued_draft_disclosure_class: queued_drafts_invalidated_by_target_remap
    provider_authority_consequence_class: authority_narrowed_by_admin_policy

records:
  - record_kind: provider_account_settings_record
    provider_account_settings_schema_version: 1
    settings_record_id: "provider_account_settings:tracker.example:aureline:admin_forced:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    linked_provider_account_state_record_ref: "provider_account_state:tracker.example:aureline:admin_forced:0001"
    account_state_class: signed_in
    account_kind_class: admin_forced_target
    account_binding_disclosure:
      account_binding_class: admin_forced_account
      binding_summary: >
        Org admin policy forces the active account onto the
        organization-managed identity for the triage board; the
        user cannot widen this binding.
      linked_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
      linked_inherited_source_ref: "admin_policy:tracker.example:aureline:default_target:triage"
    actor_class_in_effect: human_account
    actor_subject_ref: "actor:user_a"
    seat_or_plan_state_class: seat_active
    seat_or_plan_summary: "Plan covers comment_or_link_sync; status-transition sync is denied by org policy."
    session_freshness_class: fresh
    cached_offline_shadow_disclosure:
      cached_offline_shadow_class: not_in_cached_shadow
      shadow_summary: "Surface is rendering against a live, fresh provider account."
      shadow_window_closes_at: null
    default_target_resolution_class: admin_forced
    default_target_explanation: >
      Org admin policy forces the default target to the triage
      board; status-transition sync is denied. The user cannot
      widen this scope.
    linked_default_target_resolution_record_refs:
      - "default_target_resolution:tracker.example:aureline:board:admin_forced:0001"
    preserved_handoff_state_refs:
      - "publish_later:queue_item:tracker.example:aureline:product:0001"
    metadata_safe_export_only: false
    diagnostics_links:
      - diagnostics_link_class: open_admin_policy_explanation
        link_summary: "Open the admin-policy explanation showing why the default target is admin-forced."
        settings_record_ref: "admin_policy:tracker.example:aureline:default_target:triage"
      - diagnostics_link_class: open_publish_later_queue_review
        link_summary: "Review queued items invalidated by the admin retarget."
        settings_record_ref: "publish_later:queue_review:tracker.example:aureline:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260504T100200Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100200Z:0001"
    captured_at: "2026-05-04T10:02:00Z"
    settings_summary: >
      Signed in under an admin-forced account binding; permitted
      sync modes narrowed to read-only and comment-or-link.
    redaction_class: metadata_safe_default

  - record_kind: default_target_resolution_record
    default_target_resolution_schema_version: 1
    resolution_record_id: "default_target_resolution:tracker.example:aureline:board:admin_forced:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    linked_provider_account_settings_record_ref: "provider_account_settings:tracker.example:aureline:admin_forced:0001"
    target_context_class: board_context
    context_summary: "Default board for issue-tracker actions in this workspace."
    local_scope_ref: "workspace:repo:aureline"
    default_target_resolution_class: admin_forced
    default_target_explanation: >
      Default target forced by org admin policy to the triage board;
      previous user-default and repo-metadata candidates are
      suppressed by the policy block.
    selected_target_ref: "provider_scope:tracker.example:aureline:board:triage"
    provenance_chain:
      - target_provenance_source_class: explicit_user_choice_source
        selection_outcome_class: suppressed_by_policy_block
        outcome_summary: >
          User-selected target on this surface is suppressed by org
          admin policy.
        linked_source_record_ref: "settings:default_target:tracker.example:aureline:user_a"
        candidate_target_ref: "provider_scope:tracker.example:aureline:board:aureline-product"
      - target_provenance_source_class: repo_metadata_source
        selection_outcome_class: suppressed_by_policy_block
        outcome_summary: >
          Repo-attached provider link is suppressed by org admin
          policy.
        linked_source_record_ref: "repo_metadata:provider_link:tracker.example:aureline:product"
        candidate_target_ref: "provider_scope:tracker.example:aureline:board:aureline-product"
      - target_provenance_source_class: admin_policy_source
        selection_outcome_class: selected_default_target
        outcome_summary: >
          Admin policy at policy_epoch:20260501T000000Z forces the
          default target to the triage board; user cannot widen.
        linked_source_record_ref: "admin_policy:tracker.example:aureline:default_target:triage"
        candidate_target_ref: "provider_scope:tracker.example:aureline:board:triage"
    unresolved_reason_class: no_unresolved_resolution_succeeded
    narrowed_by_admin_policy: true
    metadata_safe_export_only: false
    linked_default_target_resolution_record_ref: "default_target_resolution:tracker.example:aureline:board:user_default_prior:0001"
    linked_account_switch_audit_record_ref: "account_switch_audit:tracker.example:aureline:admin_policy_changed_target:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260504T100200Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100200Z:0001"
    captured_at: "2026-05-04T10:02:00Z"
    redaction_class: metadata_safe_default

  - record_kind: account_switch_audit_record
    provider_account_settings_schema_version: 1
    audit_record_id: "account_switch_audit:tracker.example:aureline:admin_policy_changed_target:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    linked_audit_hook_record_ref: "audit_hook:tracker.example:aureline:admin_policy_changed_target:0001"
    audit_hook_event_class: admin_policy_changed_target
    from_actor_class: human_account
    to_actor_class: human_account
    from_account_state_class: signed_in
    to_account_state_class: signed_in
    from_account_binding_class: inherited_user_default_account
    to_account_binding_class: admin_forced_account
    from_default_target_resolution_class: user_default_inherited
    to_default_target_resolution_class: admin_forced
    from_actor_subject_ref: "actor:user_a"
    to_actor_subject_ref: "actor:user_a"
    scope_change_class: scope_target_remapped_by_admin_policy
    scope_change_summary: >
      Admin policy remapped the default target from the user-default
      aureline-product board to the admin-forced triage board;
      status-transition sync was dropped from permitted modes.
    affected_workflow_classes:
      - work_item_workflow_target
      - publish_now_workflow_target
      - deferred_publish_workflow_target
      - queue_review_workflow_target
    queued_draft_disclosure_class: queued_drafts_invalidated_by_target_remap
    queued_draft_summary: >
      One publish-later queue item targeting the previous board was
      invalidated by the admin retarget; the user must reselect or
      review before drain.
    provider_authority_consequence_class: authority_narrowed_by_admin_policy
    provider_authority_summary: >
      Mutation is admissible only under the narrowed sync modes;
      status-transition sync is denied.
    affected_mapping_refs:
      - "mapping:tracker.example:aureline:board:aureline-product"
      - "mapping:tracker.example:aureline:board:triage"
    preserved_handoff_state_refs:
      - "publish_later:queue_item:tracker.example:aureline:product:0001"
    linked_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
    linked_default_target_resolution_record_refs:
      - "default_target_resolution:tracker.example:aureline:board:admin_forced:0001"
    rationale_summary: >
      Admin policy at policy_epoch:20260501T000000Z narrowed the
      default target to the triage board; the previously inherited
      user-default mapping is held until the user reconciles.
    diagnostics_links:
      - diagnostics_link_class: open_admin_policy_explanation
        link_summary: "Open the admin-policy explanation that narrowed the target."
        settings_record_ref: "admin_policy:tracker.example:aureline:default_target:triage"
      - diagnostics_link_class: open_publish_later_queue_review
        link_summary: "Review the publish-later items invalidated by the admin retarget."
        settings_record_ref: "publish_later:queue_review:tracker.example:aureline:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260504T100150Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100150Z:0001"
    occurred_at: "2026-05-04T10:01:50Z"
    redaction_class: metadata_safe_default

conformance_tests:
  - id: admin_forced_account_pairs_with_admin_forced_resolution
    description: >
      A provider_account_settings_record under
      account_kind_class=admin_forced_target MUST disclose
      account_binding_class=admin_forced_account and resolve
      default_target_resolution_class to admin_forced.
  - id: admin_policy_changed_target_audit_lists_typed_disclosures
    description: >
      An account_switch_audit_record for
      admin_policy_changed_target MUST list at least one
      affected_mapping_ref, set scope_change_class to one of the
      admin-policy-narrowing values, set
      provider_authority_consequence_class to one of
      authority_revoked_by_admin_policy or
      authority_narrowed_by_admin_policy, and set
      to_default_target_resolution_class to admin_forced.
  - id: admin_forced_resolution_marks_narrowed_by_admin_policy
    description: >
      A default_target_resolution_record under admin_forced MUST
      set narrowed_by_admin_policy=true and contain a
      provenance_chain entry whose target_provenance_source_class is
      admin_policy_source with selection_outcome_class
      selected_default_target.
