# yaml-language-server: $schema=../../../schemas/integrations/provider_account_state.schema.json
__fixture__:
  name: expired_seat_cached_read_only
  scenario: >
    The user's provider seat just expired on tracker.example/aureline.
    Cached read state remains visible against the previously-bound
    aureline-product board, but new mutation is denied. The settings
    record discloses account_kind_class=expired_seat with
    account_binding_class=expired_seat_local_only_continuity,
    seat_or_plan_state_class=seat_expired,
    cached_offline_shadow_class=cached_read_only_after_seat_expiry,
    and metadata_safe_export_only=true so cached read state cannot
    silently widen export, telemetry, or AI-evidence scope. The
    board_context default_target_resolution_record preserves the
    user's previously-selected target verbatim under
    explicit_user_choice. An account_switch_audit_record explains
    the seat_state_changed event with
    scope_change_class=scope_held_pending_seat_repair,
    queued_draft_disclosure_class=queued_drafts_paused_pending_seat_repair
    (a publish-later queue item is preserved, awaiting seat repair),
    and provider_authority_consequence_class=authority_lost_with_seat_expiry.
  exercised_contract_sections:
    - "Settings record — expired_seat_local_only_continuity binding"
    - "Cached/offline shadow — cached_read_only_after_seat_expiry"
    - "Account-switch audit — seat_state_changed with full disclosure"
    - "Acceptance: provider-linked workflows continue in cached-read-only mode when seat changes"
  exercised_classes_summary:
    account_state_class: limited_scope
    account_kind_class: expired_seat
    account_binding_class: expired_seat_local_only_continuity
    seat_or_plan_state_class: seat_expired
    cached_offline_shadow_class: cached_read_only_after_seat_expiry
    default_target_resolution_class: explicit_user_choice
    audit_hook_event_class: seat_state_changed
    scope_change_class: scope_held_pending_seat_repair
    queued_draft_disclosure_class: queued_drafts_paused_pending_seat_repair
    provider_authority_consequence_class: authority_lost_with_seat_expiry

records:
  - record_kind: provider_account_settings_record
    provider_account_settings_schema_version: 1
    settings_record_id: "provider_account_settings:tracker.example:aureline:expired_seat:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    linked_provider_account_state_record_ref: "provider_account_state:tracker.example:aureline:expired_seat:0001"
    account_state_class: limited_scope
    account_kind_class: expired_seat
    account_binding_disclosure:
      account_binding_class: expired_seat_local_only_continuity
      binding_summary: >
        Provider seat expired; cached read-only continuity remains
        against the previously-bound board. Mutation is denied
        until the seat is repaired or replaced.
      linked_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
      linked_inherited_source_ref: ""
    actor_class_in_effect: human_account
    actor_subject_ref: "actor:user_a"
    seat_or_plan_state_class: seat_expired
    seat_or_plan_summary: "Seat expired; cached read state remains visible until grace closes."
    session_freshness_class: bounded_stale
    cached_offline_shadow_disclosure:
      cached_offline_shadow_class: cached_read_only_after_seat_expiry
      shadow_summary: >
        Surface is rendering against cached read-only shadow because
        the provider seat expired; metadata-safe defaults are pinned.
      shadow_window_closes_at: "2026-05-11T10:03:00Z"
    default_target_resolution_class: explicit_user_choice
    default_target_explanation: >
      Default target is the user's previously-selected
      aureline-product board, preserved verbatim. Mutation is
      denied; cached read state remains visible.
    linked_default_target_resolution_record_refs:
      - "default_target_resolution:tracker.example:aureline:board:expired_seat:0001"
    preserved_handoff_state_refs:
      - "publish_later:queue_item:tracker.example:aureline:bug_report:0001"
    metadata_safe_export_only: true
    diagnostics_links:
      - diagnostics_link_class: open_seat_or_plan_status
        link_summary: "Open seat or plan status to repair the expired seat."
        settings_record_ref: "settings:seat_status:tracker.example:aureline:user_a"
      - diagnostics_link_class: open_account_settings
        link_summary: "Open account settings to switch accounts if needed."
        settings_record_ref: "settings:account:tracker.example:aureline:user_a"
      - diagnostics_link_class: open_publish_later_queue_review
        link_summary: "Review the publish-later items paused pending seat repair."
        settings_record_ref: "publish_later:queue_review:tracker.example:aureline:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260504T100400Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100400Z:0001"
    captured_at: "2026-05-04T10:04:00Z"
    settings_summary: >
      Seat expired; cached read-only continuity preserved against
      the previously-bound target under metadata-safe defaults.
    redaction_class: metadata_safe_default

  - record_kind: default_target_resolution_record
    default_target_resolution_schema_version: 1
    resolution_record_id: "default_target_resolution:tracker.example:aureline:board:expired_seat:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    linked_provider_account_settings_record_ref: "provider_account_settings:tracker.example:aureline:expired_seat:0001"
    target_context_class: board_context
    context_summary: "Default board for issue-tracker actions; cached read-only during seat expiry."
    local_scope_ref: "workspace:repo:aureline"
    default_target_resolution_class: explicit_user_choice
    default_target_explanation: >
      Default target preserved verbatim from the user's prior
      selection; mutation is denied while the seat is expired.
    selected_target_ref: "provider_scope:tracker.example:aureline:board:aureline-product"
    provenance_chain:
      - target_provenance_source_class: explicit_user_choice_source
        selection_outcome_class: selected_default_target
        outcome_summary: >
          User's prior explicit choice preserved across the seat
          expiry transition; cached read state renders against this
          target until seat is repaired.
        linked_source_record_ref: "settings:default_target:tracker.example:aureline:user_a"
        candidate_target_ref: "provider_scope:tracker.example:aureline:board:aureline-product"
    unresolved_reason_class: no_unresolved_resolution_succeeded
    narrowed_by_admin_policy: false
    metadata_safe_export_only: true
    linked_default_target_resolution_record_ref: ""
    linked_account_switch_audit_record_ref: "account_switch_audit:tracker.example:aureline:seat_state_changed:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260504T100400Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100400Z:0001"
    captured_at: "2026-05-04T10:04:00Z"
    redaction_class: metadata_safe_default

  - record_kind: account_switch_audit_record
    provider_account_settings_schema_version: 1
    audit_record_id: "account_switch_audit:tracker.example:aureline:seat_state_changed:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    linked_audit_hook_record_ref: "audit_hook:tracker.example:aureline:seat_state_changed:0001"
    audit_hook_event_class: seat_state_changed
    from_actor_class: human_account
    to_actor_class: human_account
    from_account_state_class: signed_in
    to_account_state_class: limited_scope
    from_account_binding_class: user_selected_active_account
    to_account_binding_class: expired_seat_local_only_continuity
    from_default_target_resolution_class: explicit_user_choice
    to_default_target_resolution_class: explicit_user_choice
    from_actor_subject_ref: "actor:user_a"
    to_actor_subject_ref: "actor:user_a"
    scope_change_class: scope_held_pending_seat_repair
    scope_change_summary: >
      Provider seat transitioned to seat_expired; mutation modes are
      held pending seat repair while cached read-only state remains
      visible against the previously-selected target.
    affected_workflow_classes:
      - work_item_workflow_target
      - publish_now_workflow_target
      - deferred_publish_workflow_target
      - queue_review_workflow_target
    queued_draft_disclosure_class: queued_drafts_paused_pending_seat_repair
    queued_draft_summary: >
      One publish-later queue item (a bug-report capture) is paused
      pending seat repair; the queue review surface offers reselect
      and discard actions.
    provider_authority_consequence_class: authority_lost_with_seat_expiry
    provider_authority_summary: >
      Mutation denied while the seat is expired; cached read state
      remains visible under metadata-safe defaults until grace
      closes.
    affected_mapping_refs:
      - "mapping:tracker.example:aureline:board:aureline-product"
    preserved_handoff_state_refs:
      - "publish_later:queue_item:tracker.example:aureline:bug_report:0001"
    linked_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
    linked_default_target_resolution_record_refs:
      - "default_target_resolution:tracker.example:aureline:board:expired_seat:0001"
    rationale_summary: >
      Provider seat expired; cached read state preserved against
      the previously-selected target. Repair the seat to restore
      mutation; queued drafts remain held under metadata-safe
      defaults until repair or discard.
    diagnostics_links:
      - diagnostics_link_class: open_seat_or_plan_status
        link_summary: "Repair or replace the expired seat."
        settings_record_ref: "settings:seat_status:tracker.example:aureline:user_a"
      - diagnostics_link_class: open_publish_later_queue_review
        link_summary: "Review queued items paused pending seat repair."
        settings_record_ref: "publish_later:queue_review:tracker.example:aureline:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_a"
      execution_context_id: "exec_ctx:20260504T100330Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100330Z:0001"
    occurred_at: "2026-05-04T10:03:30Z"
    redaction_class: metadata_safe_default

conformance_tests:
  - id: expired_seat_cached_read_only_pins_metadata_safe_export
    description: >
      A provider_account_settings_record under
      account_kind_class=expired_seat with cached_offline_shadow_class
      cached_read_only_after_seat_expiry MUST set
      metadata_safe_export_only=true so cached read state cannot
      silently widen export, telemetry, or AI-evidence scope.
  - id: seat_state_changed_audit_authority_disclosure
    description: >
      An account_switch_audit_record for seat_state_changed MUST set
      provider_authority_consequence_class to one of
      authority_lost_with_seat_expiry,
      authority_lost_with_seat_revoked,
      authority_continues_under_new_actor,
      authority_held_in_cached_read_only_shadow,
      authority_narrowed_by_admin_policy, or
      no_authority_change.
  - id: queued_drafts_paused_cite_handoff_anchor
    description: >
      A queued_draft_disclosure_class outside no_queued_drafts MUST
      cite at least one preserved_handoff_state_ref so the audit
      anchor for prepared handoff state is non-empty.
