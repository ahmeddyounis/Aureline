# yaml-language-server: $schema=../../../schemas/integrations/provider_account_state.schema.json
__fixture__:
  name: account_switch_with_queued_drafts
  scenario: >
    The user (actor:user_a) was signed in on the issue-tracker
    surface with three publish-later queue items targeting the
    aureline-product board. The user explicitly switches to a
    different account (actor:user_c) on tracker.example/aureline.
    The previous bindings are paused pending account-mapping
    binding resolution; the three queued drafts are NOT erased.
    The post-switch settings record discloses
    account_kind_class=active_account with
    account_binding_class=user_selected_active_account; the
    board_context default_target_resolution_record resolves under
    explicit_user_choice for the new account; and an
    account_switch_audit_record explains the account_switched event
    with scope_change_class=scope_invalidated_by_account_switch,
    affected_workflow_classes=[work_item_workflow_target,
    publish_now_workflow_target, deferred_publish_workflow_target,
    queue_review_workflow_target, ai_workflow_provider_target,
    audit_review_workflow_target],
    queued_draft_disclosure_class=queued_drafts_paused_pending_account_resolution,
    and provider_authority_consequence_class=authority_held_pending_account_resolution.
    preserved_handoff_state_refs lists all three queue items so the
    audit anchor proves prepared handoff state survived the switch.
  exercised_contract_sections:
    - "Settings record — user_selected_active_account binding (post-switch)"
    - "Default-target resolution — explicit_user_choice (post-switch)"
    - "Account-switch audit — account_switched with explicit queued-draft and authority disclosures"
    - "Acceptance: account switches preserve queued-draft and authority implications"
  exercised_classes_summary:
    account_state_class: signed_in
    account_kind_class: active_account
    account_binding_class: user_selected_active_account
    default_target_resolution_class: explicit_user_choice
    audit_hook_event_class: account_switched
    scope_change_class: scope_invalidated_by_account_switch
    queued_draft_disclosure_class: queued_drafts_paused_pending_account_resolution
    provider_authority_consequence_class: authority_held_pending_account_resolution

records:
  - record_kind: provider_account_settings_record
    provider_account_settings_schema_version: 1
    settings_record_id: "provider_account_settings:tracker.example:aureline:account_switch:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    linked_provider_account_state_record_ref: "provider_account_state:tracker.example:aureline:account_switch:0001"
    account_state_class: signed_in
    account_kind_class: active_account
    account_binding_disclosure:
      account_binding_class: user_selected_active_account
      binding_summary: >
        Bound by explicit user choice after the account switch; the
        previous binding's queued drafts are paused pending account
        mapping resolution.
      linked_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_c"
      linked_inherited_source_ref: ""
    actor_class_in_effect: human_account
    actor_subject_ref: "actor:user_c"
    seat_or_plan_state_class: seat_active
    seat_or_plan_summary: "New account's plan covers all sync modes."
    session_freshness_class: fresh
    cached_offline_shadow_disclosure:
      cached_offline_shadow_class: not_in_cached_shadow
      shadow_summary: "Surface is rendering against a live, fresh provider account."
      shadow_window_closes_at: null
    default_target_resolution_class: explicit_user_choice
    default_target_explanation: >
      User explicitly chose the aureline-product board on this
      surface as the post-switch default target.
    linked_default_target_resolution_record_refs:
      - "default_target_resolution:tracker.example:aureline:board:account_switch:0001"
    preserved_handoff_state_refs:
      - "publish_later:queue_item:tracker.example:aureline:bug_report:0001"
      - "publish_later:queue_item:tracker.example:aureline:task_update:0001"
      - "publish_later:queue_item:tracker.example:aureline:blocked_work_note:0001"
    metadata_safe_export_only: false
    diagnostics_links:
      - diagnostics_link_class: open_account_switch_audit
        link_summary: "Open the account-switch audit explaining the most recent switch."
        settings_record_ref: "account_switch_audit:tracker.example:aureline:account_switched:0001"
      - diagnostics_link_class: open_publish_later_queue_review
        link_summary: "Review the three queued drafts paused pending account resolution."
        settings_record_ref: "publish_later:queue_review:tracker.example:aureline:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_c"
      execution_context_id: "exec_ctx:20260504T100600Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100600Z:0001"
    captured_at: "2026-05-04T10:06:00Z"
    settings_summary: >
      Signed in as actor:user_c after explicit account switch;
      previous account's three queued drafts paused pending account
      mapping resolution.
    redaction_class: metadata_safe_default

  - record_kind: default_target_resolution_record
    default_target_resolution_schema_version: 1
    resolution_record_id: "default_target_resolution:tracker.example:aureline:board:account_switch:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    linked_provider_account_settings_record_ref: "provider_account_settings:tracker.example:aureline:account_switch:0001"
    target_context_class: board_context
    context_summary: "Default board for issue-tracker actions under the new account."
    local_scope_ref: "workspace:repo:aureline"
    default_target_resolution_class: explicit_user_choice
    default_target_explanation: >
      User explicitly chose the aureline-product board on this
      surface as the post-switch default; the previous account's
      target choice did not carry over.
    selected_target_ref: "provider_scope:tracker.example:aureline:board:aureline-product"
    provenance_chain:
      - target_provenance_source_class: explicit_user_choice_source
        selection_outcome_class: selected_default_target
        outcome_summary: >
          User selected this target on the issue-tracker surface
          settings panel after switching accounts.
        linked_source_record_ref: "settings:default_target:tracker.example:aureline:user_c"
        candidate_target_ref: "provider_scope:tracker.example:aureline:board:aureline-product"
      - target_provenance_source_class: last_used_by_actor_source
        selection_outcome_class: candidate_only_not_selected
        outcome_summary: >
          actor:user_c has no last-used target on this surface;
          this candidate is empty.
        linked_source_record_ref: ""
        candidate_target_ref: ""
    unresolved_reason_class: no_unresolved_resolution_succeeded
    narrowed_by_admin_policy: false
    metadata_safe_export_only: false
    linked_default_target_resolution_record_ref: "default_target_resolution:tracker.example:aureline:board:user_a_prior:0001"
    linked_account_switch_audit_record_ref: "account_switch_audit:tracker.example:aureline:account_switched:0001"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_c"
      execution_context_id: "exec_ctx:20260504T100600Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100600Z:0001"
    captured_at: "2026-05-04T10:06:00Z"
    redaction_class: metadata_safe_default

  - record_kind: account_switch_audit_record
    provider_account_settings_schema_version: 1
    audit_record_id: "account_switch_audit:tracker.example:aureline:account_switched:0001"
    connected_provider_record_id: "conn_prov:tracker.example:aureline:install-1"
    provider_identity:
      provider_class: issue_or_planning
      canonical_host: "tracker.example"
      tenant_or_org_scope: "aureline"
      provider_instance_ref: "provider_instance:tracker.example:aureline"
      environment_class: public_saas
    surface_class: issue_or_planning_surface
    linked_audit_hook_record_ref: "audit_hook:tracker.example:aureline:account_switched:0001"
    audit_hook_event_class: account_switched
    from_actor_class: human_account
    to_actor_class: human_account
    from_account_state_class: signed_in
    to_account_state_class: signed_in
    from_account_binding_class: user_selected_active_account
    to_account_binding_class: user_selected_active_account
    from_default_target_resolution_class: explicit_user_choice
    to_default_target_resolution_class: explicit_user_choice
    from_actor_subject_ref: "actor:user_a"
    to_actor_subject_ref: "actor:user_c"
    scope_change_class: scope_invalidated_by_account_switch
    scope_change_summary: >
      Active account switched from actor:user_a to actor:user_c;
      previous account's bindings are paused pending account-mapping
      binding resolution. The new account picks an explicit default
      target on this surface.
    affected_workflow_classes:
      - work_item_workflow_target
      - publish_now_workflow_target
      - deferred_publish_workflow_target
      - queue_review_workflow_target
      - ai_workflow_provider_target
      - audit_review_workflow_target
    queued_draft_disclosure_class: queued_drafts_paused_pending_account_resolution
    queued_draft_summary: >
      Three publish-later queue items (a bug-report, a task-update,
      and a blocked-work note) targeting the previous account's
      board are paused pending account-mapping binding resolution.
      The queue-review surface offers reselect, drop-after-review,
      and hold-local-only options.
    provider_authority_consequence_class: authority_held_pending_account_resolution
    provider_authority_summary: >
      Provider authority for the previous binding is parked behind
      an account_mapping_binding_record; the new account's
      authority continues independently for new actions.
    affected_mapping_refs:
      - "mapping:tracker.example:aureline:board:aureline-product"
    preserved_handoff_state_refs:
      - "publish_later:queue_item:tracker.example:aureline:bug_report:0001"
      - "publish_later:queue_item:tracker.example:aureline:task_update:0001"
      - "publish_later:queue_item:tracker.example:aureline:blocked_work_note:0001"
    linked_account_mapping_binding_ref: "account_mapping:tracker.example:aureline:user_a"
    linked_default_target_resolution_record_refs:
      - "default_target_resolution:tracker.example:aureline:board:account_switch:0001"
    rationale_summary: >
      User explicitly switched accounts on this surface; previous
      account's three queued drafts are preserved and paused
      pending account-mapping binding resolution. No queued draft
      was erased.
    diagnostics_links:
      - diagnostics_link_class: open_account_switch_audit
        link_summary: "Open the audit trail for the most recent account switch."
        settings_record_ref: "account_switch_audit:tracker.example:aureline:account_switched:0001"
      - diagnostics_link_class: open_publish_later_queue_review
        link_summary: "Review the three queued drafts paused pending account resolution."
        settings_record_ref: "publish_later:queue_review:tracker.example:aureline:0001"
      - diagnostics_link_class: open_account_settings
        link_summary: "Open account settings to review or revert the switch."
        settings_record_ref: "settings:account:tracker.example:aureline:user_c"
    origin_disclosure:
      host_identity: "host:device_a"
      workspace_id: "wks:aureline"
      actor_subject: "actor:user_c"
      execution_context_id: "exec_ctx:20260504T100530Z:0001"
      policy_epoch: "policy_epoch:20260501T000000Z"
    policy_context:
      policy_epoch: "policy_epoch:20260501T000000Z"
      trust_state: trusted
      execution_context_id: "exec_ctx:20260504T100530Z:0001"
    occurred_at: "2026-05-04T10:05:30Z"
    redaction_class: metadata_safe_default

conformance_tests:
  - id: account_switched_audit_carries_typed_disclosures
    description: >
      An account_switch_audit_record for account_switched MUST cite
      to_account_binding_class, queued_draft_disclosure_class,
      provider_authority_consequence_class, and a non-empty
      affected_workflow_classes set.
  - id: account_switch_preserves_queued_drafts
    description: >
      An account_switched audit record under
      queued_draft_disclosure_class
      queued_drafts_paused_pending_account_resolution MUST cite at
      least one preserved_handoff_state_ref so the audit anchor for
      prepared handoff state is non-empty.
  - id: post_switch_settings_record_links_audit_record
    description: >
      The post-switch provider_account_settings_record MUST cite
      the matching account_switch_audit_record via diagnostics
      navigation so users can audit the switch from the settings
      surface.
