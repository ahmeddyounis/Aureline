record_kind: review_pack_record
review_pack_schema_version: 1
review_pack_id: vcs:review_pack:project_default:01
review_pack_class: project_default_pack
review_pack_lifecycle_state: review_pack_active
scope_binding:
  scope_kind: whole_repository_scope
  scope_target_ref: workspace:scope:whole_repo:01
checks:
  - check_id: vcs:review_pack:check:format:01
    review_pack_check_class: format_check
    review_pack_check_enforcement_class: enforced_blocking
    waiver_linkage_class: no_waiver_admissible
    evaluator_descriptor_ref: commands:evaluator:format:01
    summary_label: >-
      Repository format check; enforced blocking with no waiver admissible.
  - check_id: vcs:review_pack:check:lint:01
    review_pack_check_class: lint_check
    review_pack_check_enforcement_class: enforced_blocking_unless_waived
    waiver_linkage_class: waiver_required_owner_signed
    evaluator_descriptor_ref: commands:evaluator:lint:01
    summary_label: >-
      Lint check; blocking unless owner-signed waiver attached.
  - check_id: vcs:review_pack:check:type:01
    review_pack_check_class: type_check
    review_pack_check_enforcement_class: enforced_blocking
    waiver_linkage_class: no_waiver_admissible
    evaluator_descriptor_ref: commands:evaluator:type:01
    summary_label: >-
      Type check; enforced blocking with no waiver admissible.
  - check_id: vcs:review_pack:check:unit_test:01
    review_pack_check_class: unit_test_check
    review_pack_check_enforcement_class: enforced_blocking
    waiver_linkage_class: no_waiver_admissible
    evaluator_descriptor_ref: commands:evaluator:unit_test:01
    summary_label: >-
      Unit test check; enforced blocking with no waiver admissible.
  - check_id: vcs:review_pack:check:ai_review:01
    review_pack_check_class: ai_review_advisory_check
    review_pack_check_enforcement_class: advisory_non_blocking_with_visible_chip
    waiver_linkage_class: no_waiver_admissible
    evaluator_descriptor_ref: commands:evaluator:ai_review:01
    summary_label: >-
      AI review advisory check; non-blocking but surfaces a visible chip.
ownership_rules:
  - ownership_rule_id: vcs:review_pack:ownership:default:01
    ownership_rule_class: ownership_required_review_blocking
    owner_route_ref: governance:owner_route:default_owners:01
    scope_binding:
      scope_kind: whole_repository_scope
      scope_target_ref: workspace:scope:whole_repo:01
    summary_label: >-
      Default owners required-review-blocking on every change.
divergence_labels_required:
  - local_ci_provider_all_match_pass
  - local_ci_provider_all_match_fail
  - local_passes_ci_pending_no_judgement_yet
  - local_passes_ci_failed_user_review_required
  - local_failed_ci_passed_user_review_required
  - local_only_no_external_evaluator_admissible
  - evaluator_unavailable_no_divergence_assessable
  - evaluation_reused_from_export_pinned_to_build_identity
output_artifact_families_required:
  - evaluation_summary_artifact
  - finding_list_artifact
  - audit_event_stream_artifact
imported_bundle_envelope: null
policy_context:
  policy_epoch: pe:2026-04-24:01
  trust_state: trusted
  execution_context_id: exec:01
  workspace_trust_state_class: trusted
client_scopes:
  - desktop_product
  - cli
redaction_class: metadata_safe_default
freshness_class: authoritative_live
summary_label: >-
  Project-default review pack: format / lint / type / unit-test enforced; AI review advisory; default-owner review required.
created_at: "2026-04-24T08:00:00Z"
updated_at: "2026-04-24T08:00:00Z"
archived_at: null
hosted_review_inbox_record_id_ref: null
merge_policy_record_id_ref: null
