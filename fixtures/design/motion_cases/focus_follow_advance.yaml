# yaml-language-server: $schema=../../../schemas/design/motion_transition.schema.json
__fixture__:
  name: focus_follow_advance
  scenario: >
    A focus-advance preset for focus-follow transitions (e.g. stepping through
    a guided flow, moving between fields, or returning focus after a transient
    surface closes). Default motion uses motion.fast + ease.standard for a
    subtle focus-ring transition. Under motion_reduced, motion_low_motion,
    motion_power_saver, and motion_critical_hot_path the motion collapses to
    instant so focus never appears to glide or drift. Focus visibility and
    assistive-tech announcements remain equivalent under every posture.
  exercised_axes:
    preset_kind_class: focus_advance
    semantic_transition_class: focus_ring_advance
    surface_family: focus_follow
  contract_sections:
    - "§5 Low-motion semantic equivalence"

