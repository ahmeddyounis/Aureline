# yaml-language-server: $schema=../../../schemas/design/motion_transition.schema.json
__fixture__:
  name: overlay_dialog_enter
  scenario: >
    A dialog/sheet enter preset used for overlays and spotlight-capable shells.
    Default motion uses a modest opacity + scale/translate composition at
    motion.dialog with ease.enter to clarify layer change without theatrical
    travel. Under motion_reduced the transition degrades to crossfade_only with
    motion.fast to preserve continuity without spatial movement. Under
    motion_low_motion and motion_power_saver the transition collapses to
    motion.instant. Under motion_critical_hot_path the transition is suppressed
    entirely. Focus placement, title labels, and the escape route remain
    equivalent under every posture.
  exercised_axes:
    preset_kind_class: entrance
    semantic_transition_class: surface_reveal
    surface_family: overlay_dialog_or_sheet
    includes_reduced_motion_crossfade: true
  contract_sections:
    - "§2 Token ledger (values of record)"
    - "§3 Semantic transition roles"
    - "§4 Interruption/cancellation and no-layout-shift guardrails"
    - "§5 Low-motion semantic equivalence"

record_kind: motion_preset_record
theme_asset_schema_version: 1
preset_id: motion_preset:overlay.dialog.enter
preset_revision_ref: motion_preset_rev:overlay.dialog.enter:2026-05-05:01
preset_kind_class: entrance
semantic_transition_class: surface_reveal
default_duration_tokens: [motion.dialog]
default_easing_tokens: [ease.enter]
reduced_motion_fallbacks:
  - posture_class: motion_reduced
    substitution_class: crossfade_only
    fallback_duration_token: motion.fast
    fallback_easing_token: ease.standard
    non_motion_state_markers: [shape, border, text]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
    notes: >
      Crossfade-only: no translation or scale. Focus placement and labels remain
      identical.
  - posture_class: motion_low_motion
    substitution_class: collapse_to_instant
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [shape, border, text]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
  - posture_class: motion_power_saver
    substitution_class: collapse_to_instant
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [shape, border, text]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
  - posture_class: motion_critical_hot_path
    substitution_class: suppress_entirely
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [shape, border, text]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
    notes: "Engine-internal posture: suppress transient overlay motion."
component_state_compatibility: []
non_motion_state_markers: [shape, border, text]
no_hue_only_substitution: true
preserves_focus_visibility: true
preserves_state_conveyance: true
