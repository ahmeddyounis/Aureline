# yaml-language-server: $schema=../../../schemas/design/motion_transition.schema.json
__fixture__:
  name: banner_state_change
  scenario: >
    A banner appearance/update preset used for degraded/reconnecting and other
    durable attention cues. Default motion uses motion.ui + ease.standard for a
    subtle opacity/border emphasis that does not animate height. Under
    motion_reduced the transition collapses to motion.instant (no reflow
    animation). Under motion_low_motion, motion_power_saver, and
    motion_critical_hot_path, motion is suppressed or instant. The banner’s
    semantic text and iconography remain present so motion is never the only
    indicator of state, risk, or recovery.
  exercised_axes:
    preset_kind_class: transition
    semantic_transition_class: value_update
    surface_family: banner
    forbids_height_animation: true
  contract_sections:
    - "§4 Interruption/cancellation and no-layout-shift guardrails"
    - "§5 Low-motion semantic equivalence"

record_kind: motion_preset_record
theme_asset_schema_version: 1
preset_id: motion_preset:banner.state_update
preset_revision_ref: motion_preset_rev:banner.state_update:2026-05-05:01
preset_kind_class: transition
semantic_transition_class: value_update
default_duration_tokens: [motion.ui]
default_easing_tokens: [ease.standard]
reduced_motion_fallbacks:
  - posture_class: motion_reduced
    substitution_class: collapse_to_instant
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [border, icon, text]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
    notes: No animated height/reflow; content appears immediately.
  - posture_class: motion_low_motion
    substitution_class: collapse_to_instant
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [border, icon, text]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
  - posture_class: motion_power_saver
    substitution_class: collapse_to_instant
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [border, icon, text]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
  - posture_class: motion_critical_hot_path
    substitution_class: suppress_entirely
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [border, icon, text]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
component_state_compatibility:
  - from_state_ref: design:state:idle
    to_state_ref: design:state:degraded
    preserved_under_postures: [motion_standard, motion_reduced, motion_low_motion, motion_power_saver, motion_critical_hot_path]
    notes: Banner copy/icon/border remain distinct; motion is optional.
non_motion_state_markers: [border, icon, text]
no_hue_only_substitution: true
preserves_focus_visibility: true
preserves_state_conveyance: true
is_safety_critical: false
extension_override_boundary_class: extension_may_replace_with_disclosure
theme_override_boundary_class: theme_may_recolor_only
progress_loop_permitted: false
