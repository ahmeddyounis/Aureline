# yaml-language-server: $schema=../../../schemas/design/motion_transition.schema.json
__fixture__:
  name: toast_enter
  scenario: >
    A toast entry preset for transient acknowledgements. Default motion uses
    motion.ui + ease.enter for a short fade/translate that does not steal focus.
    Under motion_reduced the motion becomes crossfade_only (no travel). Under
    motion_low_motion and motion_power_saver the toast appears instantly. Under
    motion_critical_hot_path the entry motion is suppressed. The toast label,
    icon, and (when present) undo/open-details action remain the primary carrier
    of completion meaning; motion is never required to interpret the event.
  exercised_axes:
    preset_kind_class: entrance
    semantic_transition_class: attention_redirect
    surface_family: toast
    never_steals_focus: true
  contract_sections:
    - "§5 Low-motion semantic equivalence"

record_kind: motion_preset_record
theme_asset_schema_version: 1
preset_id: motion_preset:toast.enter
preset_revision_ref: motion_preset_rev:toast.enter:2026-05-05:01
preset_kind_class: entrance
semantic_transition_class: attention_redirect
default_duration_tokens: [motion.ui]
default_easing_tokens: [ease.enter]
reduced_motion_fallbacks:
  - posture_class: motion_reduced
    substitution_class: crossfade_only
    fallback_duration_token: motion.fast
    fallback_easing_token: ease.standard
    non_motion_state_markers: [icon, text, label_chip]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
    notes: No translation; toast does not steal focus.
  - posture_class: motion_low_motion
    substitution_class: collapse_to_instant
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [icon, text, label_chip]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
  - posture_class: motion_power_saver
    substitution_class: collapse_to_instant
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [icon, text, label_chip]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
  - posture_class: motion_critical_hot_path
    substitution_class: suppress_entirely
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [icon, text, label_chip]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
component_state_compatibility: []
non_motion_state_markers: [icon, text, label_chip]
no_hue_only_substitution: true
