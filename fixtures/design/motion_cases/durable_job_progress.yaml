# yaml-language-server: $schema=../../../schemas/design/motion_transition.schema.json
__fixture__:
  name: durable_job_progress
  scenario: >
    A durable-job progress indicator preset. Default posture permits a tiny
    progress loop (only for progress_indicator presets). Under motion_reduced,
    motion_low_motion, and motion_power_saver the loop is replaced by static
    progress text and completion markers (non_motion_state_marker). Under
    motion_critical_hot_path, motion is suppressed. Completion semantics are
    always readable without motion: the job row carries a label, percent or
    step count, and a stable completed/failed marker when finished.
  exercised_axes:
    preset_kind_class: progress_indicator
    semantic_transition_class: progress_pulse
    surface_family: durable_job_row
    loop_permitted: true
  contract_sections:
    - "§3 Semantic transition roles"
    - "§5 Low-motion semantic equivalence"

record_kind: motion_preset_record
theme_asset_schema_version: 1
preset_id: motion_preset:durable_job.progress_indicator
preset_revision_ref: motion_preset_rev:durable_job.progress_indicator:2026-05-05:01
preset_kind_class: progress_indicator
semantic_transition_class: progress_pulse
default_duration_tokens: [motion.ui]
default_easing_tokens: [ease.standard]
reduced_motion_fallbacks:
  - posture_class: motion_reduced
    substitution_class: non_motion_state_marker
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [text, icon, label_chip]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
    notes: >
      Replace looping pulse with static progress text and a stable completion
      marker.
  - posture_class: motion_low_motion
    substitution_class: non_motion_state_marker
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [text, icon, label_chip]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
  - posture_class: motion_power_saver
    substitution_class: non_motion_state_marker
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [text, icon, label_chip]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
  - posture_class: motion_critical_hot_path
    substitution_class: suppress_entirely
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [text, icon, label_chip]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
component_state_compatibility:
