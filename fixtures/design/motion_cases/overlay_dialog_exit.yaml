# yaml-language-server: $schema=../../../schemas/design/motion_transition.schema.json
__fixture__:
  name: overlay_dialog_exit
  scenario: >
    A dialog/sheet exit preset for overlays that must dismiss without delaying
    input availability. Default motion uses motion.dialog with ease.exit for a
    short fade/scale down that confirms dismissal. Under motion_reduced the
    preset degrades to crossfade_only at motion.fast. Under motion_low_motion
    and motion_power_saver the dismissal collapses to motion.instant. Under
    motion_critical_hot_path the motion is suppressed entirely. Dismissal is
    interruptible: a user-initiated close cancels any in-flight exit motion and
    completes immediately.
  exercised_axes:
    preset_kind_class: exit
    semantic_transition_class: surface_dismiss
    surface_family: overlay_dialog_or_sheet
    requires_interruptible_dismissal: true
  contract_sections:
    - "§3 Semantic transition roles"
    - "§4 Interruption/cancellation and no-layout-shift guardrails"
    - "§5 Low-motion semantic equivalence"

