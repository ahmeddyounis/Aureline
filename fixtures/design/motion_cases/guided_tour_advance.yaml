# yaml-language-server: $schema=../../../schemas/design/motion_transition.schema.json
__fixture__:
  name: guided_tour_advance
  scenario: >
    A guided tour / coachmark step advance preset used by teaching overlays.
    Default motion uses motion.panel + ease.standard for a short transition
    that preserves context (no large travel). Under motion_reduced the preset
    becomes crossfade_only at motion.fast; under motion_low_motion and
    motion_power_saver it resolves instantly. Under motion_critical_hot_path it
    is suppressed. The step title, target label, and focus route remain
    equivalent so the user can complete the tour without motion.
  exercised_axes:
    preset_kind_class: guided_overlay_step
    semantic_transition_class: tour_advance
    surface_family: guided_tour
  contract_sections:
    - "§5 Low-motion semantic equivalence"

record_kind: motion_preset_record
theme_asset_schema_version: 1
preset_id: motion_preset:guided_tour.advance
preset_revision_ref: motion_preset_rev:guided_tour.advance:2026-05-05:01
preset_kind_class: guided_overlay_step
semantic_transition_class: tour_advance
default_duration_tokens: [motion.panel]
default_easing_tokens: [ease.standard]
reduced_motion_fallbacks:
  - posture_class: motion_reduced
    substitution_class: crossfade_only
    fallback_duration_token: motion.fast
    fallback_easing_token: ease.standard
    non_motion_state_markers: [text, border, label_chip]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
    notes: Crossfade-only; no spotlight glide or zoom.
  - posture_class: motion_low_motion
    substitution_class: collapse_to_instant
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [text, border, label_chip]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
  - posture_class: motion_power_saver
    substitution_class: collapse_to_instant
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [text, border, label_chip]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
  - posture_class: motion_critical_hot_path
    substitution_class: suppress_entirely
    fallback_duration_token: null
    fallback_easing_token: null
    non_motion_state_markers: [text, border, label_chip]
    preserves_state_conveyance: true
    preserves_focus_visibility: true
component_state_compatibility: []
non_motion_state_markers: [text, border, label_chip]
no_hue_only_substitution: true
preserves_focus_visibility: true
preserves_state_conveyance: true
is_safety_critical: false
extension_override_boundary_class: host_owned_no_override
theme_override_boundary_class: theme_locked_to_first_party_motion
progress_loop_permitted: false
permitted_deployment_profiles: [individual_local, self_hosted, enterprise_online, air_gapped, managed_cloud]
presentation_label: Guided tour advance
policy_context:
  policy_epoch: pe:2026-05-05:01
  trust_state: trusted
redaction_class: metadata_safe_default
minted_at: "2026-05-05T00:00:00Z"

