# yaml-language-server: $schema=../../../schemas/design/motion_transition.schema.json
__fixture__:
  name: toast_exit
  scenario: >
    A toast exit preset for dismissal (timeout or user action). Default motion
    uses motion.ui + ease.exit for a short fade out. Under motion_reduced the
    exit becomes crossfade_only at motion.fast. Under motion_low_motion and
    motion_power_saver the toast disappears instantly. Under motion_critical_hot_path
    the motion is suppressed. Dismissal is interruptible: explicit user dismissal
    resolves immediately and does not wait for animation completion.
  exercised_axes:
    preset_kind_class: exit
    semantic_transition_class: surface_dismiss
    surface_family: toast
    interruptible: true
  contract_sections:
    - "§4 Interruption/cancellation and no-layout-shift guardrails"

