# yaml-language-server: $schema=../../../schemas/design/theme_portability_record.schema.json
#
# Support export projection: preserves provenance + aggregate counts but
# elides per-slot arrays, emitting a downgrade event that names the
# dropped fact classes. Full-fidelity lanes (profile export / managed
# sync) must carry per-slot notes.
__fixture__:
  name: imported_translated_theme_portability_support_export_projection
  scenario: >
    Support export includes metadata only for themes. The export
    projection preserves provenance and aggregate translation counts but
    elides per-slot unsupported/unresolved arrays, emitting an explicit
    downgrade event so downstream readers can locate the full-fidelity
    record via profile export or managed sync.
  exercised_axes:
    export_destination_class: support_bundle_metadata_export
    downgrade_event_target: support_bundle_metadata_export
    dropped_fact_classes:
      - unsupported_slot_notes_per_slot
      - unresolved_slot_notes_per_slot
  contract_sections:
    - "§3 Carry rules (sync, export, import, support)"

