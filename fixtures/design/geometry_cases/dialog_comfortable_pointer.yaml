#
# Dialogs use the strong scrim and keep minimum hit targets.
__fixture__:
  name: dialog_comfortable_pointer
  scenario: >
    Comfortable-density dialogs use the shared dialog radius and strong scrim
    opacity. Controls inside dialogs keep the minimum hit target even when the
    dialog content reflows under text scale changes.
  exercised_axes:
    component_family: dialog
    density_class: comfortable
    input_mode: pointer
    effective_zoom_percent: 100
    effective_text_scale_percent: 100
  contract_sections:
    - "§3 Density mapping (compact/standard/comfortable)"
    - "§3.1 Minimum interactive hit target (floor)"
    - "§4 Zoom and text-scale behavior"

record_kind: geometry_case_record
geometry_token_schema_version: 1
case_id: geometry_case:dialog:comfortable:pointer:01
component_family_class: dialog
density_class: comfortable
input_mode_class: pointer
effective_zoom_percent: 100
effective_text_scale_percent: 100
token_expectations:
  - token_ref: size.hit.min
    expected_px: 28
  - token_ref: radius.lg
    expected_px: 8
  - token_ref: opacity.scrim.strong
    expected_alpha: 0.56
    notes: Mirrors scrim_strong alpha in layer_and_scrim_tokens.
overflow_guardrails:
  - preserve_focus_ring_clearance_under_zoom
  - move_optional_actions_to_overflow_before_shrinking_hit_targets
minted_at: "2026-05-05T00:00:00Z"

