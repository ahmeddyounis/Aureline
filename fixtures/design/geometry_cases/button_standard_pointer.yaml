#
# Buttons preserve hit targets and focus clearance under density and zoom.
__fixture__:
  name: button_standard_pointer
  scenario: >
    Standard-density button sizing uses the shared control-height token and
    never drops below the minimum hit target. Optional adornment collapses
    before the primary label becomes unreadable.
  exercised_axes:
    component_family: button
    density_class: standard
    input_mode: pointer
    effective_zoom_percent: 100
    effective_text_scale_percent: 100
  contract_sections:
    - "§3 Density mapping (compact/standard/comfortable)"
    - "§3.1 Minimum interactive hit target (floor)"
    - "§5 Collapse-before-truncate and safe overflow (cramped shells)"

