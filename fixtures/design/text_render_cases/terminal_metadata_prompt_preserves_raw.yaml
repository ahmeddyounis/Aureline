# yaml-language-server: $schema=../../../schemas/design/text_role.schema.json
#
# Terminal metadata must never rewrite raw prompts/paths to fit.
__fixture__:
  name: terminal_metadata_prompt_preserves_raw
  scenario: >
    Terminal prompts and metadata are raw-identifier-heavy. When the line
    is constrained, the surface preserves raw bytes and offers horizontal
    scroll and copy-full routes rather than normalizing or eliding content.
  exercised_axes:
    surface_kind: terminal_metadata
    locale_direction: ltr
    effective_text_scale_percent: 100
  contract_sections:
    - "§3 Font fallback, missing glyphs, ligatures, and mixed scripts"
    - "§4 Overflow, truncation, clamping, and copy honesty"

record_kind: text_render_case_record
text_role_schema_version: 1
case_id: text_render_case:terminal_metadata:prompt:01
surface_kind: terminal_metadata
locale_direction: ltr
effective_text_scale_percent: 100
slots:
  - slot_id: prompt
    content_kind_class: raw_identifier
    text_role_class: terminal
    typography_role_token: type.role.monospace
    scale_token: type.code.md
    overflow_behavior_class: preserve_raw
    example_text: "user@host:~/projects/aureline/very/long/path$"
    copy_recovery_routes:
      - horizontal_scroll
      - copy_full_value_action
      - accessible_name_full

  - slot_id: exit_status
    content_kind_class: status_text
    text_role_class: dense_metric
    typography_role_token: type.role.monospace
    scale_token: type.code.sm
    overflow_behavior_class: hide_when_unavailable
    example_text: "exit 127"
    copy_recovery_routes:
      - accessible_name_full
minted_at: "2026-05-05T00:00:00Z"

