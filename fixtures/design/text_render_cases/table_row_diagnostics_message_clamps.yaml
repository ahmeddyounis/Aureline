# yaml-language-server: $schema=../../../schemas/design/text_role.schema.json
#
# Table rows clamp long messages but keep recovery routes.
__fixture__:
  name: table_row_diagnostics_message_clamps
  scenario: >
    Diagnostics tables carry a mix of raw identifiers (file/path),
    dense metrics (line/column), and longer supporting messages. The
    message clamps to a small number of lines inline, then expands or
    opens detail for full review and copy/export fidelity.
  exercised_axes:
    surface_kind: table_row
    locale_direction: ltr
    effective_text_scale_percent: 200
  contract_sections:
    - "§2 Text roles (purpose + policy)"
    - "§4 Overflow, truncation, clamping, and copy honesty"

record_kind: text_render_case_record
text_role_schema_version: 1
case_id: text_render_case:table_row:diagnostics:01
surface_kind: table_row
locale_direction: ltr
effective_text_scale_percent: 200
slots:
  - slot_id: file_path
    content_kind_class: raw_identifier
    text_role_class: code
    typography_role_token: type.role.monospace
    scale_token: type.code.sm
    overflow_behavior_class: truncate_tail
    uses_ellipsis: true
    example_text: "crates/aureline-render/src/pipeline/render_pass_builder.rs"
    copy_recovery_routes:
      - tooltip_or_hover_reveal
      - copy_full_value_action
      - accessible_name_full

  - slot_id: location
    content_kind_class: timestamp
    text_role_class: dense_metric
    typography_role_token: type.role.monospace
    scale_token: type.label.md
    overflow_behavior_class: preserve_raw
    example_text: "line 128, col 42"
    copy_recovery_routes:
      - accessible_name_full

  - slot_id: message
    content_kind_class: supporting_text
    text_role_class: supporting
    typography_role_token: type.role.ui_sans
    scale_token: type.body.sm
    overflow_behavior_class: multi_line_expand
    max_lines: 2
    uses_ellipsis: true
    example_text: >
      The selected symbol resolves to multiple definitions under the current
      build target. Narrow the workspace scope or open the resolver details
      to see candidate roots and their authority.
    copy_recovery_routes:
      - multi_line_expand
      - open_detail_view
      - copy_full_value_action
      - accessible_name_full
