# yaml-language-server: $schema=../../../schemas/design/text_role.schema.json
#
# Status-bar items are space constrained but must remain inspectable.
__fixture__:
  name: status_item_indexing_progress_compact
  scenario: >
    Status items frequently carry short labels and dense numeric values.
    Secondary details yield space first; when truncation occurs the full
    value remains recoverable via tooltip/focus and copy-full routes.
  exercised_axes:
    surface_kind: status_item
    locale_direction: ltr
    effective_text_scale_percent: 100
  contract_sections:
    - "§2 Text roles (purpose + policy)"
    - "§4 Overflow, truncation, clamping, and copy honesty"

record_kind: text_render_case_record
text_role_schema_version: 1
case_id: text_render_case:status_item:indexing:01
surface_kind: status_item
locale_direction: ltr
effective_text_scale_percent: 100
slots:
  - slot_id: status_label
    content_kind_class: status_text
    text_role_class: caption
    typography_role_token: type.role.ui_sans
    scale_token: type.label.md
    overflow_behavior_class: truncate_tail
    uses_ellipsis: true
    example_text: "Indexing: resolving workspace symbols (background)…"
    copy_recovery_routes:
      - tooltip_or_hover_reveal
      - reveal_on_focus
      - accessible_name_full

  - slot_id: status_value
    content_kind_class: progress_summary
    text_role_class: dense_metric
    typography_role_token: type.role.monospace
    scale_token: type.label.md
    overflow_behavior_class: truncate_tail
    uses_ellipsis: true
    example_text: "3,214 files · 1.2M LOC"
    copy_recovery_routes:
      - copy_full_value_action
      - accessible_name_full
minted_at: "2026-05-05T00:00:00Z"

