# Settings rows must keep the real value recoverable under truncation.
__fixture__:
  name: settings_row_long_value_preserve_raw
  scenario: >
    A settings row with a long path-like value keeps the label readable
    via wrapping, preserves the raw value (no normalization), and offers
    a copy-full route even when the visible field is constrained.
  exercised_axes:
