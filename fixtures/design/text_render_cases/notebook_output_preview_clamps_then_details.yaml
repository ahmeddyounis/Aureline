# Notebook output previews clamp heavy text but preserve truth and copy.
__fixture__:
  name: notebook_output_preview_clamps_then_details
  scenario: >
    Notebook output previews often embed code-like, mixed-script, or very
    long lines. Inline previews clamp to a small number of lines but keep
    copy-full and open-detail routes so clipping never destroys export or
    review fidelity.
  exercised_axes:
    surface_kind: notebook_output
    locale_direction: ltr
    effective_text_scale_percent: 150
  contract_sections:
    - "§4 Overflow, truncation, clamping, and copy honesty"

