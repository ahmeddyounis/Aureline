# yaml-language-server: $schema=../../../schemas/design/text_role.schema.json
#
# A tab label carrying a raw file identifier truncates tail with an
# ellipsis, while preserving copy-full-value and an accessible name.
__fixture__:
  name: tab_long_filename_truncates_tail
  scenario: >
    Editor tabs show file identifiers. When space is constrained, the
    label truncates tail (basename remains visible) and exposes copy-full
    and hover/focus recovery so clipping never destroys inspectability.
  exercised_axes:
    surface_kind: tab
    locale_direction: ltr
    effective_text_scale_percent: 100
  contract_sections:
    - "§1 Two-axis typography model"
    - "§4 Overflow, truncation, clamping, and copy honesty"

record_kind: text_render_case_record
text_role_schema_version: 1
case_id: text_render_case:tab:long_filename:01
surface_kind: tab
locale_direction: ltr
effective_text_scale_percent: 100
slots:
  - slot_id: tab_label
    content_kind_class: raw_identifier
    text_role_class: code
    typography_role_token: type.role.monospace
    scale_token: type.body.sm
    overflow_behavior_class: truncate_tail
    uses_ellipsis: true
    example_text: "src/workspace/very_long_feature_name_with_many_parts.rs"
    copy_recovery_routes:
      - tooltip_or_hover_reveal
      - reveal_on_focus
      - copy_full_value_action
      - accessible_name_full
    notes: >
      Truncation never changes underlying bytes. Copy-full provides the
      full identifier even when selection-based copy captures only the
      visible substring.
minted_at: "2026-05-05T00:00:00Z"

