# Fully conformant component conformance packet example.
__fixture__:
  name: button_action_controls_conformant
  scenario: >
    Launch-critical button family packet that binds state taxonomy, metric ids,
    token inheritance, screenshot baselines, keyboard journeys, and assistive
    technology hooks into one auditable record.
  exercised_axes:
    component_family_class: button
    launch_priority_class: launch_critical
  contract_sections:
    - "Identity and scope"
    - "State taxonomy coverage"
    - "Metric references"
    - "Token inheritance and drift gate"
    - "Appearance evidence"
    - "Keyboard and accessibility evidence"

record_kind: component_conformance_packet_record
component_conformance_schema_version: 1
packet_id: component_conformance_packet:button.action_controls:conformant:01
component_id: component.button.action_controls
component_title: Button action controls
component_family_class: button
launch_priority_class: launch_critical
component_contract_ref: component-packet:button.action_controls:seed:01
conformance_posture_class: fully_conformant

state_taxonomy:
  taxonomy_ref: docs/design/component_state_taxonomy.md
  required_taxonomy_state_classes:
    - default
    - hover
    - focus_visible
    - pressed_active
    - disabled
    - pending
  additional_state_notes:
    - Destructive variants bind to warning/error semantics but keep recovery and confirmation explicit.
    - Pending must preserve label meaning and avoid layout shift.

metric_requirements:
  ledger_ref: artifacts/design/component_metrics_ledger.yaml
  metric_ids:
    - metric.button.height.compact
    - metric.button.height.standard
    - metric.button.height.comfortable
    - metric.hit_target.min
    - metric.focus_ring.gutter
    - metric.focus_ring.stroke
  component_metric_case_refs:
    - component_metric_case:button:compact:pointer:01
    - component_metric_case:button:comfortable:pointer:01

token_inheritance:
  token_vocabulary_ref: docs/design/design_token_component_state_vocabulary.md
  theme_inheritance_contract_ref: docs/design/theme_support_and_inheritance_contract.md
  token_conformance_contract_ref: docs/design/token_conformance_audit.md
  token_drift_rules_ref: artifacts/design/token_drift_rules.yaml
  token_drift_check_refs:
    - token-drift:component.button.action_controls:01

appearance_evidence:
  screenshot_baseline_refs:
    - design-screenshot:button.compact.dark_reference_default:01
    - design-screenshot:button.compact.light_parity_default:01
    - design-screenshot:button.compact.high_contrast_dark_default:01
    - design-screenshot:button.compact.high_contrast_light_default:01
  appearance_notes:
    - Focus-visible must remain distinct from hover/selected in every supported theme and density.
    - Disabled and locked semantics never collapse into opacity-only styling.

keyboard_evidence:
  keyboard_journey_refs:
    - keyboard-journey:button.activate_default:01
    - keyboard-journey:button.pending_cancel:01

accessibility_evidence:
  assistive_technology_refs:
    - a11y:button.role_name_state:01
    - a11y:button.dynamic_state_announcements:01
  accessible_name_notes:
    - The accessible name defaults to the visible label text.
    - Icon-only buttons require a tooltip and a stable accessible name.

extension_embedded_exceptions: []

minted_at: "2026-05-05T00:00:00Z"

