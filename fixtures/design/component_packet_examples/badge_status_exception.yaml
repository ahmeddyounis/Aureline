# yaml-language-server: $schema=../../../schemas/design/component_conformance_packet.schema.json
#
# Example packet with an explicit extension inheritance exception.
__fixture__:
  name: badge_status_exception
  scenario: >
    Badge/pill packet that is conformant for first-party surfaces while
    explicitly disclosing an extension-surface inheritance gap for high-contrast
    modes. The gap is allowed only when disclosed and backed by evidence.
  exercised_axes:
    component_family_class: badge_or_pill
    launch_priority_class: launch_critical
  contract_sections:
    - "Identity and scope"
    - "State taxonomy coverage"
    - "Token inheritance and extension disclosure"

record_kind: component_conformance_packet_record
component_conformance_schema_version: 1
packet_id: component_conformance_packet:badge.status:exception:01
component_id: component.badge.status
component_title: Status badge or pill
component_family_class: badge_or_pill
launch_priority_class: launch_critical
component_contract_ref: component-packet:badge.status:seed:01
conformance_posture_class: conformant_with_disclosed_gaps

state_taxonomy:
  taxonomy_ref: docs/design/component_state_taxonomy.md
  required_taxonomy_state_classes:
    - default
    - current
    - pending
    - warning_error
    - locked
    - degraded
  additional_state_notes:
    - Badges expand to plain-language text; hue-only meaning is non-conforming.
    - Policy/trust badges map to locked, not disabled.

metric_requirements:
  ledger_ref: artifacts/design/component_metrics_ledger.yaml
  metric_ids:
    - metric.hit_target.min
    - metric.icon.size.xs
    - metric.icon.size.sm
  component_metric_case_refs: []

token_inheritance:
  token_vocabulary_ref: docs/design/design_token_component_state_vocabulary.md
  theme_inheritance_contract_ref: docs/design/theme_support_and_inheritance_contract.md
  token_conformance_contract_ref: docs/design/token_conformance_audit.md
  token_drift_rules_ref: artifacts/design/token_drift_rules.yaml
  token_drift_check_refs:
    - token-drift:component.badge.status:01

appearance_evidence:
  screenshot_baseline_refs:
    - design-screenshot:badge.status.dark_reference_default:01
    - design-screenshot:badge.status.light_parity_default:01
    - design-screenshot:badge.status.high_contrast_dark_default:01
    - design-screenshot:badge.status.high_contrast_light_default:01
  appearance_notes:
    - Badge meaning must survive forced-colors; the non-color cue is required.

keyboard_evidence:
  keyboard_journey_refs:
    - keyboard-journey:badge.read_expanded_text:01

accessibility_evidence:
  assistive_technology_refs:
    - a11y:badge.role_name_state:01
  accessible_name_notes:
    - The accessible name includes the expanded plain-language badge meaning.
    - When a badge is interactive, the action label must be exposed and keyboard reachable.

extension_embedded_exceptions:
  - exception_id: component_conformance_exception:badge.status:extension_partial_high_contrast:01
    surface_owner_role_class: extension_contributed_surface
    allowed_inheritance_gap_class: extension_partial_high_contrast_inheritance
    rationale: >
      Extension-contributed badges may ship only dark/light palette bindings and
      inherit high-contrast treatment from the host until the extension theming
      contract is fully implemented.
    disclosure_requirement: >
      Extensions must not claim full theme parity when this gap is present; the
      host must disclose the inheritance posture in the extension appearance
      descriptor.
    evidence_refs:
      - extension-parity:badge.status:01
      - extension-appearance-descriptor:badge.status:01

minted_at: "2026-05-05T00:00:00Z"

