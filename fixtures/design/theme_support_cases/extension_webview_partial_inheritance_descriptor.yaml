# yaml-language-server: $schema=../../../schemas/design/extension_ui_appearance_descriptor.schema.json
#
# Extension webview that inherits theme, focus, and reduced-motion from
# the host shell, partially inherits contrast, and does_not_inherit
# density. Two theme/contrast support rows are referenced; the embedded
# boundary card ref is non-null because the surface is webview-backed.
__fixture__:
  name: extension_webview_partial_inheritance_descriptor
  scenario: >
    The Acme Preview Tools webview claims partial parity. Theme, focus,
    and reduced-motion inherit from the host shell; contrast partially
    inherits with one disclosed gap under forced colors; density does
    not inherit. The descriptor cites the audited theme-support rows
    instead of re-minting the support matrix.
  exercised_axes:
    parity_claim_state: partial_claim_with_gaps
    surface_family: embedded_webview_surface
    inheritance_states:
      - inherits
      - partial
      - does_not_inherit
  contract_sections:
    - "§4 Extension/embedded UI appearance descriptor"

