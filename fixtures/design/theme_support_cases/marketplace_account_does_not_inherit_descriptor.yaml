# yaml-language-server: $schema=../../../schemas/design/extension_ui_appearance_descriptor.schema.json
#
# Marketplace/account dashboard surface that explicitly does_not_inherit
# host density and partially inherits theme/contrast. parity_claim_state
# is partial_claim_with_gaps; the descriptor cites the embedded
# boundary card minted by the host shell.
__fixture__:
  name: marketplace_account_does_not_inherit_descriptor
  scenario: >
    The provider-owned marketplace/account surface inherits theme and
    reduced-motion only; contrast partially inherits because the page
    uses provider-side semantic-status colors that differ from the host
    palette under high contrast; density does not inherit because the
    page uses fixed provider rows; focus inherits but exposes one
    documented gap on a deep-linked search field.
  exercised_axes:
    parity_claim_state: partial_claim_with_gaps
    surface_family: marketplace_account_surface
    inheritance_states:
      - inherits
      - partial
      - does_not_inherit
  contract_sections:
    - "§4 Extension/embedded UI appearance descriptor"

