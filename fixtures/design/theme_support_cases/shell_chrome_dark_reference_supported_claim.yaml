# yaml-language-server: $schema=../../../schemas/design/theme_support_row.schema.json
#
# First-party shell-chrome surface declares full parity support for
# dark_reference under contrast_standard, density_standard, and
# motion_standard on the seed theme package. The four per-theme-class
# columns resolve to supported, supported, supported, supported. Two
# evidence refs back the claim.
__fixture__:
  name: shell_chrome_dark_reference_supported_claim
  scenario: >
    The first-party shell-chrome surface ships dark_reference parity on
    the seed Aureline theme package. Light parity, high-contrast dark,
    and high-contrast light are also supported. Density-aware behavior
    affects spacing only and never information architecture, focus
    visibility, or state conveyance. Reduced-motion behavior under
    motion_standard suppresses no families.
  exercised_axes:
    surface_class: shell_chrome
    support_state: supported
    claimed_mode:
      theme_class: dark_reference
      contrast_mode: contrast_standard
      density_class: standard
      accessibility_posture_class: motion_standard
  contract_sections:
    - "§2 Theme/contrast support row"
    - "§5 Source-of-truth token export linkage"

