# yaml-language-server: $schema=../../../schemas/design/contrast_thresholds.schema.json
$schema: "../../../schemas/design/contrast_thresholds.schema.json"
__fixture__:
  name: notification_surface_substitution
  scenario: >
    Notification surfaces (toast/banner/activity mirror) preserve severity and
    recovery meaning under light/dark themes, high contrast, reduced chroma,
    forced colors, print/export, and screenshot/publication capture. Severity
    does not depend on hue alone.
  exercised_axes:
    surface_family: notification_surface
    contexts:
      - interactive_standard
      - high_contrast
      - reduced_chroma
      - forced_colors
      - print_export
      - screenshot_publication
  contract_sections:
    - "§1 Named thresholds (use ids, not screenshots)"
    - "§2 Color substitution ladder"
    - "§3 Severity-color independence"

record_kind: contrast_review_case_record
contrast_threshold_schema_version: 1
case_id: design.contrast.review_case.notification_surface_substitution
case_revision_ref: design.contrast.review_case.notification_surface_substitution:2026-05-06:01
scenario: >
  A failed or blocked action notification renders with explicit label and glyph
  plus a boundary, and maintains readable text. Under reduced chroma/forced
  colors, severity remains visible; a keyboard route opens the durable detail.
surfaces_under_review: [notification_surface]
threshold_assertions:
  - threshold_id_ref: design.contrast.threshold.banner.text
    theme_class: dark_reference
    element_description: Notification copy remains readable on dark surfaces.
  - threshold_id_ref: design.contrast.threshold.banner.text
    theme_class: light_parity
    element_description: Notification copy remains readable on light surfaces.
  - threshold_id_ref: design.contrast.threshold.banner.boundary
    theme_class: dark_reference
    element_description: Notification boundary remains visible without hue-only meaning.
  - threshold_id_ref: design.contrast.threshold.focus.indicator
    theme_class: light_parity
    element_description: Focus indicator on notification action remains visible.
substitution_examples:
  - surface_family: notification_surface
    context_class: reduced_chroma
    summary: >
      Reduce chroma of severity fills; preserve error/warning meaning with icon
      glyph + explicit label and a boundary. The action to open durable details
      remains keyboard reachable.
    required_non_color_cues:
      - text_label
      - icon_glyph
      - border
      - keyboard_detail_route
  - surface_family: notification_surface
    context_class: high_contrast
    summary: >
      High-contrast themes lift severity label, glyph, and boundary; decorative
      fills may flatten before readability or focus visibility is reduced.
    required_non_color_cues:
      - text_label
      - icon_glyph
      - border
  - surface_family: notification_surface
    context_class: forced_colors
    summary: >
      Forced-colors defers to platform colors; notification remains explicit via
      glyph + label + boundary, and avoids relying on “red means error”.
    required_non_color_cues:
      - text_label
      - icon_glyph
      - border
      - keyboard_detail_route
  - surface_family: notification_surface
    context_class: print_export
    summary: >
      Exported evidence that includes notifications uses monochrome-safe label +
      glyph semantics and links back to a durable row; a printed page preserves
      the severity and recovery route.
    required_non_color_cues:
      - text_label
      - icon_glyph
      - keyboard_detail_route
  - surface_family: notification_surface
    context_class: screenshot_publication
    summary: >
      Screenshot/publication capture records the visual posture and preserves
      label + glyph at publication resolution.
    required_non_color_cues:
      - text_label
      - icon_glyph
      - border
severity_independence_assertions:
  - signal_class: error
    required_channels: [text_label, icon_glyph, border]
    notes: Error notification is distinguishable without hue-only styling.
  - signal_class: destructive_action
    required_channels: [text_label, icon_glyph]
    notes: Destructive outcomes are labeled and not conveyed by red styling alone.
source_of_truth_refs:
  - docs/ux/notification_contract.md
  - docs/ux/toast_contract.md
  - docs/ux/banner_notice_contract.md
minted_at: "2026-05-06T00:00:00Z"

