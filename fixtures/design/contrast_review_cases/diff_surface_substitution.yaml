# yaml-language-server: $schema=../../../schemas/design/contrast_thresholds.schema.json
$schema: "../../../schemas/design/contrast_thresholds.schema.json"
__fixture__:
  name: diff_surface_substitution
  scenario: >
    Unified diff surface remains readable and state-correct under light/dark
    themes, high-contrast themes, reduced-chroma/grayscale review, forced-colors
    mode, print/export, and screenshot/publication capture. Added/removed/
    modified meaning does not rely on red/green hue alone.
  exercised_axes:
    surface_family: diff_surface
    contexts:
      - interactive_standard
      - high_contrast
      - reduced_chroma
      - forced_colors
      - print_export
      - screenshot_publication
  contract_sections:
    - "§1 Named thresholds (use ids, not screenshots)"
    - "§2 Color substitution ladder"
    - "§3 Severity-color independence"

record_kind: contrast_review_case_record
contrast_threshold_schema_version: 1
case_id: design.contrast.review_case.diff_surface_substitution
case_revision_ref: design.contrast.review_case.diff_surface_substitution:2026-05-06:01
scenario: >
  Added/removed/modified regions preserve readable code text and distinct state
  cues via plus/minus markers, borders/change bars, and optional patterns.
  Tinted fills never drop readable text below threshold.
surfaces_under_review: [diff_surface]
threshold_assertions:
  - threshold_id_ref: design.contrast.threshold.code.text.primary
    theme_class: dark_reference
    element_description: >
      Diff body text remains readable on added/removed/modified fills in dark
      theme.
    notes: Measure text-on-fill, not text-on-canvas.
  - threshold_id_ref: design.contrast.threshold.code.text.primary
    theme_class: light_parity
    element_description: >
      Diff body text remains readable on added/removed/modified fills in light
      theme (no opacity-fade “disabled diff”).
  - threshold_id_ref: design.contrast.threshold.diff.region.boundary
    theme_class: dark_reference
    element_description: >
      Change bars and hunk boundaries remain visible without hue-only meaning.
  - threshold_id_ref: design.contrast.threshold.diff.marker_or_glyph
    theme_class: light_parity
    element_description: >
      Plus/minus markers and inline change glyphs remain visible on light
      surfaces.
substitution_examples:
  - surface_family: diff_surface
    context_class: reduced_chroma
    summary: >
      Reduce chroma of diff fills; preserve added/removed/modified identity with
      leading plus/minus markers, strong change bars, and (when needed) dashed
      or hatched region boundaries. Labels remain available via a keyboard
      detail route on each hunk.
    required_non_color_cues:
      - plus_minus_marker
      - border
      - pattern
      - text_label
      - keyboard_detail_route
  - surface_family: diff_surface
    context_class: high_contrast
    summary: >
      High-contrast themes lift borders/change bars and ensure diff body text
      remains readable; decorative tint fills may flatten before markers,
      borders, and labels do.
    required_non_color_cues:
      - plus_minus_marker
      - border
      - text_label
  - surface_family: diff_surface
    context_class: forced_colors
    summary: >
      Forced-colors defers to platform colors; diff meaning remains via explicit
      leading markers (+/-/Δ), region outlines, and accessible labels. Hue-only
      “green means added” is prohibited.
    required_non_color_cues:
      - plus_minus_marker
      - border
      - text_label
      - keyboard_detail_route
  - surface_family: diff_surface
    context_class: print_export
    summary: >
      Print/export assumes grayscale. Diff output includes plus/minus markers,
      structural borders, and text labels in the exported representation so a
      printed page preserves meaning.
    required_non_color_cues:
      - plus_minus_marker
      - border
      - text_label
  - surface_family: diff_surface
    context_class: screenshot_publication
    summary: >
      Screenshot/publication capture includes the active theme/adaptation
      posture in the capture metadata and preserves plus/minus markers and
      borders at export resolution.
    required_non_color_cues:
      - plus_minus_marker
      - border
      - text_label
severity_independence_assertions:
  - signal_class: support_state_cue
    required_channels: [plus_minus_marker, border, text_label]
    notes: Added/removed/modified meaning survives grayscale and forced colors.
  - signal_class: warning
    required_channels: [text_label, icon_glyph]
    notes: Suspicious-content or review warnings attached to diff hunks use label + glyph, not hue-only chips.
source_of_truth_refs:
  - docs/accessibility/visual_adaptation_contract.md
  - artifacts/ux/color_safe_diagnostic_palette.yaml
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.6
minted_at: "2026-05-06T00:00:00Z"

