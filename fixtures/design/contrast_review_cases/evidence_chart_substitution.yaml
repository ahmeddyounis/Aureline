# yaml-language-server: $schema=../../../schemas/design/contrast_thresholds.schema.json
$schema: "../../../schemas/design/contrast_thresholds.schema.json"
__fixture__:
  name: evidence_chart_substitution
  scenario: >
    Evidence chart (performance or diagnostics trend) remains interpretable
    under light/dark themes, high contrast, reduced chroma/grayscale review,
    forced colors, and print/export. Series identity and threshold crossings do
    not depend on hue alone.
  exercised_axes:
    surface_family: evidence_chart
    contexts:
      - interactive_standard
      - high_contrast
      - reduced_chroma
      - forced_colors
      - print_export
      - screenshot_publication
  contract_sections:
    - "§1 Named thresholds (use ids, not screenshots)"
    - "§2 Color substitution ladder"
    - "§3 Severity-color independence"

record_kind: contrast_review_case_record
contrast_threshold_schema_version: 1
case_id: design.contrast.review_case.evidence_chart_substitution
case_revision_ref: design.contrast.review_case.evidence_chart_substitution:2026-05-06:01
scenario: >
  Chart marks (lines/bars/markers/threshold rules) reach minimum mark contrast
  via stroke weight, outlines/halos, and patterns when necessary. Series legend
  and direct labels provide non-color redundancy; values remain reachable
  through a keyboard detail route for exact inspection.
surfaces_under_review: [evidence_chart]
threshold_assertions:
  - threshold_id_ref: design.contrast.threshold.chart.mark
    theme_class: dark_reference
    element_description: >
      Chart lines/markers maintain minimum mark contrast against the dark chart
      background.
  - threshold_id_ref: design.contrast.threshold.chart.mark
    theme_class: light_parity
    element_description: >
      Chart lines/markers maintain minimum mark contrast against the light chart
      background (using halos/outlined strokes where needed).
  - threshold_id_ref: design.contrast.threshold.text.secondary
    theme_class: light_parity
    element_description: Axis labels and tick labels remain readable.
substitution_examples:
  - surface_family: evidence_chart
    context_class: reduced_chroma
    summary: >
      Reduce chroma of series colors; preserve identity with line styles
      (solid/dash/dot), distinct marker shapes, and direct labels on hover/focus.
      Threshold crossings include a labeled rule (“Threshold”) plus a marker.
    required_non_color_cues:
      - line_style
      - marker_shape
      - text_label
      - keyboard_detail_route
  - surface_family: evidence_chart
    context_class: high_contrast
    summary: >
      High-contrast themes increase mark contrast and strengthen grid/baseline
      separation. Decorative gradients are removed before series identity or
      threshold rules lose contrast.
    required_non_color_cues:
      - line_style
      - marker_shape
      - text_label
  - surface_family: evidence_chart
    context_class: forced_colors
    summary: >
      Forced-colors uses platform colors; series identity is maintained via
      stroke patterns and marker shapes, with a text legend that does not rely
      on hue names.
    required_non_color_cues:
      - line_style
      - marker_shape
      - text_label
      - keyboard_detail_route
  - surface_family: evidence_chart
    context_class: print_export
    summary: >
      Print/export defaults to monochrome-safe rendering: series use distinct
      patterns/markers and a legend, and threshold rules are labeled. Exported
      charts include data summaries so meaning survives without color.
    required_non_color_cues:
      - line_style
      - marker_shape
      - text_label
  - surface_family: evidence_chart
    context_class: screenshot_publication
    summary: >
      Screenshot/publication capture records theme/adaptation posture and uses
      patterns/markers so series identity survives compression or grayscale
      viewing.
    required_non_color_cues:
      - line_style
      - marker_shape
      - text_label
severity_independence_assertions:
  - signal_class: warning
    required_channels: [text_label, icon_glyph]
    notes: Threshold exceedance includes a label and glyph, not a color-only highlight.
  - signal_class: degraded_mode
    required_channels: [text_label, border]
    notes: Partial/stale data charts label degraded certainty and outline the chart region.
source_of_truth_refs:
  - docs/accessibility/visual_adaptation_contract.md
  - .t2/docs/Aureline_UX_Design_System_Style_Guide.md#7.7
minted_at: "2026-05-06T00:00:00Z"

