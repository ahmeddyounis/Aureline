# yaml-language-server: $schema=../../../schemas/design/contrast_thresholds.schema.json
$schema: "../../../schemas/design/contrast_thresholds.schema.json"
__fixture__:
  name: trust_warning_substitution
  scenario: >
    Trust warning banner remains explicit and distinguishable under light/dark
    themes, high contrast, reduced chroma/grayscale review, forced colors, and
    export/publication contexts. Restricted and policy-locked states do not
    collapse into one hue-only treatment.
  exercised_axes:
    surface_family: trust_warning
    contexts:
      - interactive_standard
      - high_contrast
      - reduced_chroma
      - forced_colors
      - print_export
      - screenshot_publication
  contract_sections:
    - "§1 Named thresholds (use ids, not screenshots)"
    - "§2 Color substitution ladder"
    - "§3 Severity-color independence"

record_kind: contrast_review_case_record
contrast_threshold_schema_version: 1
case_id: design.contrast.review_case.trust_warning_substitution
case_revision_ref: design.contrast.review_case.trust_warning_substitution:2026-05-06:01
scenario: >
  Trust warnings carry a shield/lock glyph plus an explicit label and boundary.
  Background tints may flatten in reduced-chroma contexts, but the glyph, label,
  and boundary remain; focus indicators on actions remain visible under scrim.
surfaces_under_review: [trust_warning]
threshold_assertions:
  - threshold_id_ref: design.contrast.threshold.banner.text
    theme_class: dark_reference
    element_description: Trust warning banner copy remains readable on tinted fills.
  - threshold_id_ref: design.contrast.threshold.banner.text
    theme_class: light_parity
    element_description: Trust warning banner copy remains readable on light surfaces.
  - threshold_id_ref: design.contrast.threshold.banner.boundary
    theme_class: light_parity
    element_description: Banner boundary remains visible without relying on fill hue.
  - threshold_id_ref: design.contrast.threshold.focus.indicator
    theme_class: dark_reference
    element_description: Focus indicator on banner actions remains visible under overlay dimming.
substitution_examples:
  - surface_family: trust_warning
    context_class: reduced_chroma
    summary: >
      Reduce chroma of warning fills; preserve meaning with shield/lock glyph,
      explicit label (“Restricted” / “Policy locked”), and a strong boundary.
      Any “why” route remains keyboard reachable.
    required_non_color_cues:
      - text_label
      - icon_glyph
      - border
      - keyboard_detail_route
  - surface_family: trust_warning
    context_class: high_contrast
    summary: >
      High-contrast themes prioritize label and boundary contrast; tinted fills
      may reduce, but the glyph and label remain dominant.
    required_non_color_cues:
      - text_label
      - icon_glyph
      - border
  - surface_family: trust_warning
    context_class: forced_colors
    summary: >
      Forced-colors defers to platform colors; the banner uses glyph + label +
      boundary so restricted and policy-locked states remain distinct without
      hue reliance.
    required_non_color_cues:
      - text_label
      - icon_glyph
      - border
      - keyboard_detail_route
  - surface_family: trust_warning
    context_class: print_export
    summary: >
      Exported evidence representing trust state includes the label and glyph in
      monochrome-safe form; “restricted” and “policy locked” remain distinct.
    required_non_color_cues:
      - text_label
      - icon_glyph
      - border
  - surface_family: trust_warning
    context_class: screenshot_publication
    summary: >
      Screenshot/publication captures include visual-state metadata and preserve
      the explicit label + glyph at publication resolution.
    required_non_color_cues:
      - text_label
      - icon_glyph
      - border
severity_independence_assertions:
  - signal_class: warning
    required_channels: [text_label, icon_glyph, border]
    notes: Trust warning meaning survives without color perception.
  - signal_class: support_state_cue
    required_channels: [text_label, icon_glyph]
    notes: Restricted and policy-locked remain distinct via glyph + label, not hue-only chips.
source_of_truth_refs:
  - .t2/docs/Aureline_Technical_Design_Document.md#7.1.17
  - artifacts/ux/color_safe_diagnostic_palette.yaml
minted_at: "2026-05-06T00:00:00Z"

