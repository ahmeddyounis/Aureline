  scenario: >
    The OS text scale changes on a claimed GNOME profile. Aureline holds the
    change pending an explicit confirm step to avoid untracked global reflow.
  exercised_axes:
    desktop_profile_id: linux_ubuntu_24_04_gnome_wayland_x86_64
    os_signal_class: os_text_scale_signal
    axis: text_scale
    follow_system_posture: follow_system
  contract_sections:
    - "§4 Follow-system vs override transitions"
    - "§5 Disclosure rules (reload/restart)"

