# OS theme flip applied live on a claimed macOS profile.
__fixture__:
  name: macos_theme_flip_follow_system_live
  scenario: >
    The OS theme preference flips (light → dark) while Aureline is in
    follow-system posture with no active preview.
  exercised_axes:
    desktop_profile_id: macos_15_plus_universal
    os_signal_class: os_theme_signal
    axis: mode_theme_class
    follow_system_posture: follow_system
  contract_sections:
    - "§3 How OS-triggered changes are processed (pipeline)"
    - "§5 Disclosure rules (reload/restart)"

record_kind: os_appearance_transition_case_record
os_appearance_transition_case_schema_version: 1
case_id: os_appearance_transition_case:macos_15_plus_universal:theme_flip_follow_system:01
desktop_profile_id: macos_15_plus_universal

prior_posture:
  follow_system_posture: follow_system
  preview_state: not_previewing

os_signal_event:
  os_signal_class: os_theme_signal
  changed_axes:
    - mode_theme_class
  new_value_summary: prefers_dark

expected_resolution:
  session_revision_event:
    cause_class: os_signal_change
    changed_axes:
      - mode_theme_class
    applied_under_live_class: live_apply_no_review
    checkpoint_required: false
  surface_expectations:
    - surface_family_class: shell_and_first_party_dialogs
      axis: mode_theme_class
      expected_apply_path_class: apply_live
      expected_atomicity_class: single_checkpoint_atomic
      disclosure_required: false
    - surface_family_class: embedded_or_extension_surface
      axis: mode_theme_class
      expected_apply_path_class: surface_reload_required
      expected_atomicity_class: surface_reload_from_single_checkpoint
      disclosure_required: true
      disclosure_summary: Embedded surfaces must either live-inherit or disclose reload required.
    - surface_family_class: native_platform_dialog
      axis: mode_theme_class
      expected_apply_path_class: apply_live
      expected_atomicity_class: single_checkpoint_atomic
      disclosure_required: false

