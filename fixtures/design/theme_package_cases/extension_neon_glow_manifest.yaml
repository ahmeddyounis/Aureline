# yaml-language-server: $schema=../../../schemas/design/theme_package_manifest.schema.json
#
# Extension-contributed theme package: declares only the modes and posture
# coverage it can honestly support.
__fixture__:
  name: extension_neon_glow_manifest
  scenario: >
    Extension theme package declares only dark + light support (no high
    contrast), narrows density coverage, and limits motion posture coverage.
    The supported-mode matrix can consume this declaration to narrow claims
    instead of inferring parity from surrounding chrome.
  exercised_axes:
    provenance_class: extension_contributed
    supported_modes: [dark, light]
    missing_modes: [hc-dark, hc-light]
  contract_sections:
    - "§2 Theme-package appearance manifest record"
    - "§3 Supported-mode matrix"

