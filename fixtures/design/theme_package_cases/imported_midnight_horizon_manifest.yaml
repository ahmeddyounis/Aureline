# yaml-language-server: $schema=../../../schemas/design/theme_package_manifest.schema.json
#
# Imported theme package appearance manifest: declares only the modes and
# posture coverage the import pipeline can support honestly.
__fixture__:
  name: imported_midnight_horizon_manifest
  scenario: >
    Imported-translated package binds its claim-facing refs back to canonical
    package identity and declares explicit supported modes (dark, light,
    hc-dark). High-contrast light is not declared; downstream claims must
    narrow explicitly via the supported-mode matrix.
  exercised_axes:
    provenance_class: imported_translated
    supported_modes: [dark, light, hc-dark]
    missing_mode: hc-light
  contract_sections:
    - "§2 Theme-package appearance manifest record"
    - "§3 Supported-mode matrix"

record_kind: theme_package_appearance_manifest_record
theme_package_manifest_schema_version: 1
appearance_manifest_id: theme_package_appearance_manifest:imported.midnight_horizon:01

theme_package_manifest_ref: theme_package_manifest:imported.midnight_horizon:01
theme_package_revision_ref: theme_package_rev:imported.midnight_horizon:2026-04-26:01

package_id: theme_package:imported.midnight_horizon:01
package_revision_ref: theme_package_rev:imported.midnight_horizon:2026-04-26:01
package_version_label: midnight-horizon-imported-2026.04

provenance:
  provenance_class: imported_translated
  source_ref: theme_import_report:midnight_horizon:2026-04-26:01
  notes: Imported from an external ecosystem; mapping report discloses gaps.

token_sets:
  semantic:
    token_set_ref: theme_token_set:imported.midnight_horizon:semantic:01
    token_set_revision_ref: theme_token_set_rev:imported.midnight_horizon:semantic:2026-04-26:01
    token_set_kind: semantic
    format_class: token_overlay_record
  component:
    token_set_ref: theme_token_set:imported.midnight_horizon:component:01
    token_set_revision_ref: theme_token_set_rev:imported.midnight_horizon:component:2026-04-26:01
    token_set_kind: component
    format_class: token_overlay_record
  syntax:
    token_set_ref: theme_token_set:imported.midnight_horizon:syntax:01
    token_set_revision_ref: theme_token_set_rev:imported.midnight_horizon:syntax:2026-04-26:01
    token_set_kind: syntax
    format_class: token_overlay_record

supported_modes:
  - mode_class: dark
    theme_class: dark_reference
    contrast_targets:
      minimum_text_contrast_target: 4.5
      minimum_ui_contrast_target: 3.0
      focus_ring_contrast_target: 3.0
      focus_ring_stroke_px: 2
      forced_colors_friendly: true
    evidence_path: fixtures/ux/theme_asset_cases/theme_package_imported_translated_with_mapping_report.yaml

  - mode_class: light
    theme_class: light_parity
    contrast_targets:
      minimum_text_contrast_target: 4.5
      minimum_ui_contrast_target: 3.0
      focus_ring_contrast_target: 3.0
      focus_ring_stroke_px: 2
      forced_colors_friendly: true
    evidence_path: fixtures/ux/theme_asset_cases/theme_package_imported_translated_with_mapping_report.yaml

  - mode_class: hc-dark
    theme_class: high_contrast_dark
    contrast_targets:
      minimum_text_contrast_target: 7.0
      minimum_ui_contrast_target: 4.5
      focus_ring_contrast_target: 4.5
      focus_ring_stroke_px: 2
      forced_colors_friendly: true
    evidence_path: fixtures/ux/theme_asset_cases/theme_package_imported_translated_with_mapping_report.yaml

density_defaults:
  default_density_class: standard
  supported_density_classes:
    - standard
    - comfortable
  notes: Imported package not tuned for compact; density claims narrow explicitly.

motion_flags:
  default_accessibility_posture_class: motion_standard
  supported_accessibility_posture_classes:
    - motion_standard
    - motion_reduced
  notes: Imported package does not claim low-motion or power-saver postures.

compatibility_notes:
  - Mapping report discloses unmapped and blocked tokens; high-contrast light is not supported.

policy_context:
  policy_epoch: pe:2026-04-26:01
  trust_state: trusted
redaction_class: metadata_safe_default
minted_at: "2026-04-26T12:00:00Z"

