# yaml-language-server: $schema=../../../schemas/design/theme_package_manifest.schema.json
#
# First-party default theme package appearance manifest: binds the opaque
# theme_package_manifest_ref used by audited claim rows back to canonical
# package identity and per-mode contrast targets.
__fixture__:
  name: first_party_default_theme_manifest
  scenario: >
    First-party default theme package publishes all four supported modes and
    the full density + motion posture sets. The manifest binds the
    theme-support claim refs back to canonical package identity and declares
    three token-set handles: semantic, component, and syntax.
  exercised_axes:
    provenance_class: built_in_with_product
    supported_modes: [dark, light, hc-dark, hc-light]
    density_defaults: standard
    motion_default: motion_standard
  contract_sections:
    - "§2 Theme-package appearance manifest record"

record_kind: theme_package_appearance_manifest_record
theme_package_manifest_schema_version: 1
appearance_manifest_id: theme_package_appearance_manifest:default.aureline:01

theme_package_manifest_ref: theme_package_manifest:default.aureline:01
theme_package_revision_ref: theme_package_rev:default.aureline:2026-04-29:01

package_id: theme_package:first_party.aureline_default:01
package_revision_ref: theme_package_rev:first_party.aureline_default:2026-04-26:01
package_version_label: aureline-default-1.4.0

provenance:
  provenance_class: built_in_with_product
  source_ref: publisher:first_party:theme_pipeline:01
  notes: Built-in theme package published by the first-party theme pipeline.

token_sets:
  semantic:
    token_set_ref: theme_token_set:default.aureline:semantic:01
    token_set_revision_ref: theme_token_set_rev:default.aureline:semantic:2026-04-29:01
    token_set_kind: semantic
    format_class: token_table_yaml
    estimated_token_count: 420
  component:
    token_set_ref: theme_token_set:default.aureline:component:01
    token_set_revision_ref: theme_token_set_rev:default.aureline:component:2026-04-29:01
    token_set_kind: component
    format_class: token_table_yaml
    estimated_token_count: 260
  syntax:
    token_set_ref: theme_token_set:default.aureline:syntax:01
    token_set_revision_ref: theme_token_set_rev:default.aureline:syntax:2026-04-29:01
    token_set_kind: syntax
    format_class: token_table_yaml
    estimated_token_count: 180

supported_modes:
  - mode_class: dark
    theme_class: dark_reference
    contrast_targets:
      minimum_text_contrast_target: 4.5
      minimum_ui_contrast_target: 3.0
      focus_ring_contrast_target: 3.0
      focus_ring_stroke_px: 2
      forced_colors_friendly: true
    evidence_path: fixtures/design/appearance_cases/baseline_shell_chrome_tabs_supported.yaml
    notes: Dark is the reference mode; evidence packet covers the full four-theme floor.

  - mode_class: light
    theme_class: light_parity
    contrast_targets:
      minimum_text_contrast_target: 4.5
      minimum_ui_contrast_target: 3.0
      focus_ring_contrast_target: 3.0
      focus_ring_stroke_px: 2
      forced_colors_friendly: true
    evidence_path: fixtures/design/appearance_cases/baseline_shell_chrome_tabs_supported.yaml

  - mode_class: hc-dark
    theme_class: high_contrast_dark
    contrast_targets:
      minimum_text_contrast_target: 7.0
      minimum_ui_contrast_target: 4.5
      focus_ring_contrast_target: 4.5
      focus_ring_stroke_px: 2
      forced_colors_friendly: true
    evidence_path: fixtures/design/appearance_cases/baseline_shell_chrome_tabs_supported.yaml

  - mode_class: hc-light
    theme_class: high_contrast_light
    contrast_targets:
      minimum_text_contrast_target: 7.0
      minimum_ui_contrast_target: 4.5
      focus_ring_contrast_target: 4.5
      focus_ring_stroke_px: 2
      forced_colors_friendly: true
    evidence_path: fixtures/design/appearance_cases/baseline_shell_chrome_tabs_supported.yaml

density_defaults:
  default_density_class: standard
  supported_density_classes:
    - compact
    - standard
    - comfortable

motion_flags:
  default_accessibility_posture_class: motion_standard
  supported_accessibility_posture_classes:
    - motion_standard
    - motion_reduced
    - motion_low_motion
    - motion_power_saver
    - motion_critical_hot_path

minimum_contrast_note: >
  Dark and light target 4.5:1 for text and 3:1 for non-text UI; both high
  contrast variants target 7:1 for text and 4.5:1 for non-text UI.

compatibility_notes:
  - Canonical first-party theme package backing audited appearance claims.

policy_context:
  policy_epoch: pe:2026-04-29:01
  trust_state: trusted
redaction_class: metadata_safe_default
minted_at: "2026-04-29T10:00:00Z"

