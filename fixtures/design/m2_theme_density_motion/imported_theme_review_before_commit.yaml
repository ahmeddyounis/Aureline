# Imported-theme review projection for the M2 appearance alpha lane.
#
# The source mapping report is the audited report under
# fixtures/design/theme_support_cases/. This projection is the launch-wedge
# review shape: every translated, unsupported, unresolved, and fallback slot is
# visible before commit, and unresolved rows keep the parity claim partial.

record_kind: imported_theme_review_projection
schema_version: 1
projection_id: imported_theme_review_projection:vscode.mirage_light:2026-05-13:01
source_mapping_report_ref: fixtures/design/theme_support_cases/imported_translated_theme_mapping_report_with_warnings.yaml
appearance_session_ref: appearance_session:profile.default:steady:01
appearance_checkpoint_ref: appearance_checkpoint:user.alex:vscode_import:01
rollback_ref: appearance_rollback:user.alex:vscode_import:01

source_tool_summary:
  source_ecosystem: vscode
  source_tool_name: VS Code Theme Bundle
  source_tool_version: "1.86"
  source_theme_identifier: vscode_theme:mirage-light:2.0.1

review_summary:
  translated_slot_count: 2
  substituted_with_fallback_count: 1
  unsupported_slot_count: 1
  unresolved_mapping_count: 2
  blocked_honesty_count: 0
  deprecated_replacement_count: 0
  parity_claim_state: partial_claim_with_gaps
  commit_posture: review_required
  unresolved_slot_count_visible: true
  rollback_action_visible: true

visible_slot_groups:
  - group_id: translated_slots
    mapping_states:
      - translated
    row_count: 2
    visible_before_commit: true
  - group_id: substituted_fallback_slots
    mapping_states:
      - substituted_fallback
    row_count: 1
    visible_before_commit: true
    fallback_token_classes:
      - focus_ring_default
  - group_id: unsupported_slots
    mapping_states:
      - unsupported
    row_count: 1
    visible_before_commit: true
    commit_effect: inert_placeholder
  - group_id: unresolved_slots
    mapping_states:
      - unresolved
    row_count: 2
    visible_before_commit: true
    commit_effect: inert_placeholder

commit_guards:
  - guard_id: parity_claim_requires_zero_unresolved
    applies_to: parity_claim_state
    required_before_full_parity_claim: unresolved_mapping_count == 0
    current_result: blocked_full_parity_claim
  - guard_id: rollback_checkpoint_required
    applies_to: commit
    required_before_full_parity_claim: appearance_checkpoint_ref && rollback_ref
    current_result: pass
  - guard_id: protected_cues_not_color_only
    applies_to: trust_policy_severity_source_integrity
    required_before_full_parity_claim: text_shape_icon_or_border_fallback
    current_result: pass
