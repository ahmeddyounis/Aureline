# Protected fixture manifest for M2 theme, density, motion, and visual-diff alpha.

record_kind: theme_density_motion_fixture_manifest
schema_version: 1
manifest_id: theme_density_motion.m2.01
as_of: "2026-05-13"
owner: "@ahmeddyounis"

appearance_session_ref: appearance_session:profile.default:steady:01
theme_package_manifest_ref: theme_package_manifest:default.aureline:01
visual_diff_manifest_ref: artifacts/design/m2_appearance_visual_diff_alpha/manifest.yaml

required_case_ids:
  - first_party_theme_manifest_full_modes
  - appearance_session_atomic_checkpoint
  - workspace_overlay_roundtrip_inert_unmapped
  - imported_theme_review_before_commit
  - os_forced_colors_reload_disclosed
  - power_saver_motion_floor_preserves_attention
  - launch_wedge_visual_diff_suite

fixture_cases:
  - case_id: first_party_theme_manifest_full_modes
    fixture_ref: fixtures/design/theme_package_cases/first_party_default_theme_manifest.yaml
    exercises_acceptance:
      - theme_package_identity
      - supported_modes
      - density_defaults
      - motion_flags
      - minimum_contrast_metadata
    expected_result: pass

  - case_id: appearance_session_atomic_checkpoint
    fixture_ref: fixtures/design/appearance_session_cases/live_preview_revertable_checkpoint_session.yaml
    runtime_consumer_ref: crates/aureline-ui/src/themes/session.rs
    exercises_acceptance:
      - atomic_apply_or_revert_checkpoint
      - one_session_revision_event
      - no_half_applied_state
    expected_result: pass

  - case_id: workspace_overlay_roundtrip_inert_unmapped
    fixture_ref: fixtures/design/appearance_session_cases/workspace_overlay_overridden_deprecated_unmapped.yaml
    exercises_acceptance:
      - token_overlay_roundtrip
      - unmapped_slots_preserved_inert
      - deprecated_replacement_visible
    expected_result: pass

  - case_id: imported_theme_review_before_commit
    fixture_ref: fixtures/design/m2_theme_density_motion/imported_theme_review_before_commit.yaml
    source_mapping_report_ref: fixtures/design/theme_support_cases/imported_translated_theme_mapping_report_with_warnings.yaml
    runtime_consumer_ref: crates/aureline-ui/src/themes/import_review.rs
    exercises_acceptance:
      - translated_unsupported_fallback_slots_visible
      - unresolved_slot_count_visible
      - parity_not_claimed_without_report
      - rollback_checkpoint_visible
    expected_result: pass

  - case_id: os_forced_colors_reload_disclosed
    fixture_ref: fixtures/design/os_appearance_transition_cases/windows_forced_colors_flip_embedded_reload.yaml
    exercises_acceptance:
      - os_contrast_or_forced_colors_declares_reload_path
      - first_party_shell_apply_live_checkpointed
      - embedded_surface_reload_disclosed
    expected_result: pass

  - case_id: power_saver_motion_floor_preserves_attention
    fixture_ref: fixtures/design/m2_theme_density_motion/power_saver_motion_floor.yaml
    runtime_consumer_ref: crates/aureline-ui/src/motion/mod.rs
    exercises_acceptance:
      - ai_terminal_list_decorative_motion_suppressed
      - critical_attention_cues_not_hidden
      - power_saver_not_less_restrictive_than_reduced_motion
    expected_result: pass

  - case_id: launch_wedge_visual_diff_suite
    fixture_ref: artifacts/design/m2_appearance_visual_diff_alpha/manifest.yaml
    runtime_consumer_ref: crates/aureline-ui/src/themes/audit.rs
    exercises_acceptance:
      - dark_light_high_contrast_visual_diff
      - accessibility_audit_attributed_to_one_session
      - safety_critical_token_change_gate
    expected_result: pass
