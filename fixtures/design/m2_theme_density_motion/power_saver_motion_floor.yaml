# Power-saver and reduced-motion floor for launch-wedge appearance alpha.
#
# This fixture pins how non-essential motion is simplified or suppressed across
# AI, terminal, list, and decorative shell surfaces while critical attention
# cues remain visible through non-motion state markers.

record_kind: power_saver_motion_floor_case
schema_version: 1
case_id: power_saver_motion_floor:launch_wedge:2026-05-13:01
appearance_session_ref: appearance_session:profile.default:steady:01
motion_contract_ref: docs/design/reduced_motion_contract.md
runtime_consumer_ref: crates/aureline-ui/src/motion/mod.rs
state_cue_registry_ref: artifacts/design/state_badge_families_alpha.yaml

posture_precedence:
  motion_standard: 0
  motion_reduced: 1
  motion_power_saver: 2
  motion_low_motion: 3
  motion_critical_hot_path: 4

surface_rows:
  - surface_class: ai_assist_panel
    standard_motion_family: decorative_entrance_motion
    reduced_motion_substitution: crossfade_only
    power_saver_substitution: suppress_entirely
    critical_hot_path_substitution: suppress_entirely
    critical_attention_cue:
      cue_class: ai_draft_pending
      non_motion_cues:
        - icon
        - label_text
        - accessible_name
      preserved: true

  - surface_class: terminal_panel
    standard_motion_family: panel_sidebar_change
    reduced_motion_substitution: maintain_essential_keep_simplified
    power_saver_substitution: collapse_to_instant
    critical_hot_path_substitution: collapse_to_instant
    critical_attention_cue:
      cue_class: terminal_reconnecting_or_blocked
      non_motion_cues:
        - label_text
        - border
        - accessible_name
      preserved: true

  - surface_class: list_panel
    standard_motion_family: dense_pane_state_change
    reduced_motion_substitution: non_motion_state_marker
    power_saver_substitution: collapse_to_instant
    critical_hot_path_substitution: collapse_to_instant
    critical_attention_cue:
      cue_class: row_pending_or_blocked
      non_motion_cues:
        - icon
        - label_chip
        - shape
      preserved: true

  - surface_class: decorative_shell_chrome
    standard_motion_family: decorative_entrance_motion
    reduced_motion_substitution: suppress_entirely
    power_saver_substitution: suppress_entirely
    critical_hot_path_substitution: suppress_entirely
    critical_attention_cue:
      cue_class: status_or_notice_family
      non_motion_cues:
        - label_text
        - icon
        - shape
      preserved: true

acceptance:
  non_essential_motion_disabled_under_power_saver: true
  power_saver_not_less_restrictive_than_reduced_motion: true
  state_conveyance_preserved_without_animation: true
  focus_visibility_preserved: true
