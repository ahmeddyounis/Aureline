# rule.
__fixture__:
  name: honesty_violation_durable_job_color_alone_error
  scenario: >
    A durable job row in the activity center signals failure by
    changing the row tint to red without adding text, icon, or
    border cues. The honesty review fails-closed; the gate
    verdict is block_release because the violation crosses the
    token-conformance boundary.
  corpus_state_class: error
  taxonomy_state_class: warning
  resolved_corpus_row_id: corpus:surface:durable_attention_canvas
  expected_verdict: block_release

