# Baseline corpus row for empty state on the command palette /
# search canvas. The palette has been opened but no query has been
# entered (or the query produced no matches). The empty state
# names the surface, why it is empty now, and the next best
# action; the row stays addressable as idle so screen readers and
# keyboard journeys still land on the surface.
#
# This fixture is a state_diff_baseline packet section; it carries
# one per-row state-evidence row, the per-row honesty-review
# coverage, and the verdict block. It does not emit a diff table
# because there is no previous packet ref.
