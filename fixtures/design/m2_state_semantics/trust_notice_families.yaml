record_kind: state_semantics_fixture_case
state_semantics_fixture_schema_version: 1
case_id: trust_notice_families
surface_class: trust_prompt_canvas
registry_ref: artifacts/design/state_badge_families_alpha.yaml
scenario: >
  Trust and policy prompts use host-owned notice families for restricted,
  blocked, degraded, pending, and completed states.
states:
  - state_class: pending
    required_visible_cues: [label_text, icon]
    forbidden_collapse_targets: [loading]
  - state_class: trust_restricted
    required_visible_cues: [label_text, lock_or_shield_glyph, border]
    forbidden_collapse_targets: [policy_locked]
  - state_class: policy_locked
    required_visible_cues: [label_text, lock_or_shield_glyph, border]
    forbidden_collapse_targets: [trust_restricted]
  - state_class: blocked
    required_visible_cues: [label_text, icon, shape]
    forbidden_collapse_targets: [degraded]
  - state_class: completed
    required_visible_cues: [label_text, icon, check_or_selection_marker]
    forbidden_collapse_targets: [pending]
badge_tokens:
  - family: trust
    token: restricted
  - family: policy
    token: policy_locked
  - family: lifecycle
    token: pending
notice_tokens:
  - family: restricted
    expected_shape: restricted_banner
  - family: blocked
    expected_shape: blocked_banner
  - family: degraded
    expected_shape: degraded_banner
  - family: success
    expected_shape: success_inline_notice
accessibility_assertions:
  - approval_copy_not_webview_owned
  - blocked_reason_persistent
expected_verdict: pass
