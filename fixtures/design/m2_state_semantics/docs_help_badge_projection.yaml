record_kind: state_semantics_fixture_case
state_semantics_fixture_schema_version: 1
case_id: docs_help_badge_projection
surface_class: docs_help_canvas
registry_ref: artifacts/design/state_badge_families_alpha.yaml
scenario: >
  Docs/help renders source freshness, support class, trust, and theme-package
  inheritance from the shared alpha registry rather than a docs-local badge
  list.
states:
  - state_class: loading
    required_visible_cues: [label_text, progress_indicator]
    forbidden_collapse_targets: [pending]
  - state_class: degraded
    required_visible_cues: [label_text, icon, border]
    forbidden_collapse_targets: [blocked]
  - state_class: blocked
    required_visible_cues: [label_text, icon, shape]
    forbidden_collapse_targets: [degraded]
badge_tokens:
  - family: docs_help
    token: authoritative_live
  - family: docs_help
    token: stale
  - family: support_class
    token: limited
  - family: trust
    token: sanitized
  - family: theme_package
    token: inherited
notice_tokens:
  - family: info
    expected_shape: inline_notice
  - family: warning
    expected_shape: inline_notice_with_action
  - family: blocked
    expected_shape: blocked_banner
accessibility_assertions:
  - stale_docs_never_render_as_authoritative
  - support_export_label_parity
expected_verdict: pass
