record_kind: state_semantics_fixture_case
state_semantics_fixture_schema_version: 1
case_id: command_palette_loading_pending_distinct
surface_class: command_palette_and_search
registry_ref: artifacts/design/state_badge_families_alpha.yaml
scenario: >
  Command search streams initial results while a submitted command preview is
  waiting to commit. Loading keeps skeleton/progress copy; pending keeps the
  submitted-action chip and cancel route.
states:
  - state_class: loading
    required_visible_cues: [label_text, progress_indicator]
    forbidden_collapse_targets: [pending, blocked]
  - state_class: pending
    required_visible_cues: [label_text, icon]
    forbidden_collapse_targets: [loading, completed]
badge_tokens:
  - family: readiness
    token: warming
  - family: lifecycle
    token: pending
notice_tokens:
  - family: info
    expected_shape: inline_notice
accessibility_assertions:
  - keyboard_focus_preserved
  - state_label_not_tooltip_only
expected_verdict: pass
