record_kind: state_semantics_fixture_case
state_semantics_fixture_schema_version: 1
case_id: extension_embedded_inheritance_gap
surface_class: extension_embedded_canvas
registry_ref: artifacts/design/state_badge_families_alpha.yaml
scenario: >
  An embedded extension view cannot inherit high-contrast focus tokens. It
  declares the gap and renders the shared partial-inheritance badge instead of
  implying parity through shell chrome.
states:
  - state_class: degraded
    required_visible_cues: [label_text, icon, border]
    forbidden_collapse_targets: [error]
  - state_class: blocked
    required_visible_cues: [label_text, icon, shape]
    forbidden_collapse_targets: [disabled]
  - state_class: focus_visible
    required_visible_cues: [border, shape]
    forbidden_collapse_targets: [selection]
badge_tokens:
  - family: theme_package
    token: partial_inheritance
  - family: trust
    token: trust_unknown
  - family: support_class
    token: limited
notice_tokens:
  - family: warning
    expected_shape: inline_notice_with_action
  - family: blocked
    expected_shape: blocked_banner
inheritance_gap:
  posture: declares_inheritance_gap_when_not_aligned
  affected_token_families: [color_semantic_theme, focus, motion_restriction]
  fallback_badge_token: partial_inheritance
accessibility_assertions:
  - extension_gap_disclosed
  - shell_chrome_does_not_imply_parity
expected_verdict: pass
