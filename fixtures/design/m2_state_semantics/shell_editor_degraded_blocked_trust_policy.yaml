record_kind: state_semantics_fixture_case
state_semantics_fixture_schema_version: 1
case_id: shell_editor_degraded_blocked_trust_policy
surface_class: editor_canvas
registry_ref: artifacts/design/state_badge_families_alpha.yaml
scenario: >
  Editor and shell chrome show a current remote target, a selected file, a
  degraded index, a blocked run action, restricted workspace trust, and a
  separate policy lock without using one warning color for all of them.
states:
  - state_class: active_target
    required_visible_cues: [label_text, icon, active_target_marker]
    forbidden_collapse_targets: [selection, focus_visible]
  - state_class: selection
    required_visible_cues: [border, check_or_selection_marker]
    forbidden_collapse_targets: [active_target, focus_visible]
  - state_class: degraded
    required_visible_cues: [label_text, icon, border]
    forbidden_collapse_targets: [blocked, error]
  - state_class: blocked
    required_visible_cues: [label_text, icon, shape]
    forbidden_collapse_targets: [degraded, disabled]
  - state_class: trust_restricted
    required_visible_cues: [label_text, lock_or_shield_glyph, border]
    forbidden_collapse_targets: [policy_locked]
  - state_class: policy_locked
    required_visible_cues: [label_text, lock_or_shield_glyph, border]
    forbidden_collapse_targets: [trust_restricted, disabled]
badge_tokens:
  - family: route
    token: remote_target
  - family: readiness
    token: partial
  - family: policy
    token: policy_locked
  - family: trust
    token: restricted
notice_tokens:
  - family: degraded
    expected_shape: degraded_banner
  - family: blocked
    expected_shape: blocked_banner
  - family: restricted
    expected_shape: restricted_banner
accessibility_assertions:
  - color_alone_forbidden
  - trust_and_policy_axes_separate
expected_verdict: pass
