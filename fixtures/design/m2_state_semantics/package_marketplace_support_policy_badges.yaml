record_kind: state_semantics_fixture_case
state_semantics_fixture_schema_version: 1
case_id: package_marketplace_support_policy_badges
surface_class: package_marketplace_canvas
registry_ref: artifacts/design/state_badge_families_alpha.yaml
scenario: >
  Package detail and install review rows render publisher trust, install
  lifecycle, support class, policy block, and theme compatibility from the
  shared registry.
states:
  - state_class: pending
    required_visible_cues: [label_text, icon]
    forbidden_collapse_targets: [loading]
  - state_class: blocked
    required_visible_cues: [label_text, icon, shape]
    forbidden_collapse_targets: [degraded]
  - state_class: policy_locked
    required_visible_cues: [label_text, lock_or_shield_glyph, border]
    forbidden_collapse_targets: [disabled]
  - state_class: completed
    required_visible_cues: [label_text, icon, check_or_selection_marker]
    forbidden_collapse_targets: [pending]
badge_tokens:
  - family: package_marketplace
    token: verified_publisher
  - family: package_marketplace
    token: install_pending
  - family: package_marketplace
    token: install_blocked
  - family: support_class
    token: supported
  - family: policy
    token: policy_blocked
  - family: theme_package
    token: partial_inheritance
notice_tokens:
  - family: warning
    expected_shape: inline_notice_with_action
  - family: blocked
    expected_shape: blocked_banner
  - family: success
    expected_shape: success_inline_notice
accessibility_assertions:
  - package_policy_block_has_source_copy
  - install_pending_not_spinner_only
expected_verdict: pass
