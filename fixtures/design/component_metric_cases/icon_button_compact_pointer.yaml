#
# Icon-only controls preserve logical hit targets even when the visible glyph
# is smaller. Compact density uses the minimum hit-target floor.
__fixture__:
  name: icon_button_compact_pointer
  scenario: >
    Compact-density icon button uses a 28 px square hit target while the glyph
    may remain 12–16 px. Tooltip + keyboard parity are handled by the control
    family and button contracts; this fixture freezes geometry only.
  exercised_axes:
    component_surface_class: icon_button
    density_class: compact
    input_mode: pointer
    effective_zoom_percent: 100
    effective_text_scale_percent: 100
  contract_sections:
    - "§2 One metric ledger (values of record)"
    - "§3 Density mapping and exceptions"

