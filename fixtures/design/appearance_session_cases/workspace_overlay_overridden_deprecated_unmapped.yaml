# yaml-language-server: $schema=../../../schemas/design/token_overlay.schema.json
#
# Workspace token overlay with one `inherited`, one `overridden`, one
# `deprecated`, and one `unmapped` entry. The fallback chain ends in an
# `inert_placeholder` for the unmapped entry.
__fixture__:
  name: workspace_overlay_overridden_deprecated_unmapped
  scenario: >
    A workspace overlay supplies a custom focus-ring color (overridden),
    keeps the standard severity-warning token (inherited), points at a
    deprecated brand-accent alias whose replacement is recorded, and
    references an unmapped legacy slot from an old import. Validation
    is `valid_with_warnings` because of the unmapped row; the fallback
    chain is reviewer-visible.
  exercised_axes:
    overlay_scope: workspace
    value_state_classes:
      - inherited
      - overridden
      - deprecated
      - unmapped
    validation_state: valid_with_warnings
  contract_sections:
    - "§4 Token-overlay state contract"

record_kind: token_overlay_record
token_overlay_schema_version: 1
token_overlay_id: token_overlay:workspace.acme:overlay:01
appearance_session_ref: appearance_session:profile.default:steady:01
overlay_scope: workspace
validation_state: valid_with_warnings
entries:
  - entry_id: token_overlay_entry:workspace.acme:focus_ring:01
    token_ref: design:token:focus.ring.outer
    token_family_class: color_state
    value_state_class: overridden
    effective_scope: workspace
    fallback_chain_ref: token_overlay_step:workspace.acme:focus_ring:override
    deprecated_replacement_ref: null
    unmapped_source_slot_ref: null
    validation_state: valid
    notes: Workspace selected a brighter focus ring than the default theme.
  - entry_id: token_overlay_entry:workspace.acme:severity_warning:01
    token_ref: design:token:semantic.status.warning.foreground
    token_family_class: semantic_status
    value_state_class: inherited
    effective_scope: theme_package_default
    fallback_chain_ref: token_overlay_step:workspace.acme:severity_warning:default
    deprecated_replacement_ref: null
    unmapped_source_slot_ref: null
    validation_state: valid
  - entry_id: token_overlay_entry:workspace.acme:brand_accent:01
    token_ref: design:token:brand.accent.deprecated_alias
    token_family_class: color_brand
    value_state_class: deprecated
    effective_scope: workspace
    fallback_chain_ref: token_overlay_step:workspace.acme:brand_accent:deprecated
    deprecated_replacement_ref: design:token:brand.accent.primary
    unmapped_source_slot_ref: null
    validation_state: valid_with_warnings
    notes: Deprecated alias retained for compatibility; replacement is brand.accent.primary.
  - entry_id: token_overlay_entry:workspace.acme:legacy_slot:01
    token_ref: design:token:legacy.import.scrollbar_thumb
    token_family_class: color_neutral
    value_state_class: unmapped
    effective_scope: workspace
    fallback_chain_ref: token_overlay_step:workspace.acme:legacy_slot:inert
    deprecated_replacement_ref: null
    unmapped_source_slot_ref: source_slot:legacy_import:scrollbar_thumb
    validation_state: inert_unresolved
    notes: Legacy slot from an older import with no current target token; preserved as inert.
summary_counts:
  inherited_count: 1
  overridden_count: 1
  deprecated_count: 1
  unmapped_count: 1
fallback_chain:
  - step_id: token_overlay_step:workspace.acme:focus_ring:override
    step_index: 0
    step_scope: workspace
    step_kind: scope_override
    target_token_ref: design:token:focus.ring.outer
    applied: true
    notes: Workspace override resolved at index 0.
  - step_id: token_overlay_step:workspace.acme:severity_warning:default
    step_index: 0
    step_scope: theme_package_default
    step_kind: theme_package_default
    target_token_ref: design:token:semantic.status.warning.foreground
    applied: true
  - step_id: token_overlay_step:workspace.acme:brand_accent:deprecated
    step_index: 0
    step_scope: workspace
    step_kind: deprecated_alias
    target_token_ref: design:token:brand.accent.deprecated_alias
    applied: true
    notes: Deprecated alias resolved; replacement brand.accent.primary is recorded on the entry.
  - step_id: token_overlay_step:workspace.acme:legacy_slot:lookup
    step_index: 0
    step_scope: workspace
    step_kind: scope_override
    target_token_ref: design:token:legacy.import.scrollbar_thumb
    applied: false
    notes: Workspace lookup found no current target token at this index.
  - step_id: token_overlay_step:workspace.acme:legacy_slot:inert
    step_index: 1
    step_scope: workspace
    step_kind: inert_placeholder
    target_token_ref: null
    applied: false
    notes: Chain ended in an inert placeholder; entry is unmapped.
source_import_report_ref: null
rollback_ref: null
notes: Workspace overlay is in steady-state; no rollback is in effect.
policy_context:
  policy_epoch: pe:2026-04-29:01
  trust_state: trusted
redaction_class: metadata_safe_default
minted_at: "2026-04-29T09:00:00Z"
