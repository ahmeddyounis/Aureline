# yaml-language-server: $schema=../../../schemas/design/appearance_session.schema.json
#
# Per-axis live follow-system policy for the default profile. Theme and
# accent track the OS signal live with no review; contrast and density
# changes mint a revertable checkpoint; text scale and follow-system
# posture changes require an explicit confirm step. Reduced-motion
# escalation is live but revertable so a user can opt back to standard
# motion if a power-saver signal misfires.
__fixture__:
  name: live_follow_system_policy_default_profile
  scenario: >
    Default-profile live policy covering all seven appearance axes. No
    axis is policy-blocked; a managed-policy fixture exists separately
    for that case.
  exercised_axes:
    live_apply_no_review:
      - mode_theme_class
      - accent_source
    live_apply_with_revertable_checkpoint:
      - contrast_mode
      - density_class
      - reduced_motion_posture
    confirm_review_required:
      - text_scale
      - follow_system_posture
  contract_sections:
    - "§3 Live follow-system policy"

record_kind: live_follow_system_policy_record
appearance_session_schema_version: 1
live_follow_system_policy_id: live_follow_system_policy:profile.default:01
appearance_session_ref: appearance_session:profile.default:steady:01
axes:
  - axis: mode_theme_class
    live_update_class: live_apply_no_review
    os_signal_class: os_theme_signal
    requires_checkpoint: false
    requires_user_confirm: false
    policy_lock_reason_class: not_locked
    surface_scope: global_appearance
    notes: Theme class follows the OS signal live; explicit user theme selection mints a checkpoint per the user_explicit_setting cause class.
  - axis: contrast_mode
    live_update_class: live_apply_with_revertable_checkpoint
    os_signal_class: os_contrast_signal
    requires_checkpoint: true
    requires_user_confirm: false
    policy_lock_reason_class: not_locked
    surface_scope: global_appearance
    notes: Contrast escalation mints a revertable checkpoint so a misfired OS signal can be rolled back.
  - axis: accent_source
    live_update_class: live_apply_no_review
    os_signal_class: os_accent_signal
    requires_checkpoint: false
    requires_user_confirm: false
    policy_lock_reason_class: not_locked
    surface_scope: global_appearance
  - axis: density_class
    live_update_class: live_apply_with_revertable_checkpoint
    os_signal_class: os_density_signal
    requires_checkpoint: true
    requires_user_confirm: false
    policy_lock_reason_class: not_locked
    surface_scope: global_appearance
    notes: Density changes shift chrome heights; revertable so a user can roll back without restarting.
  - axis: text_scale
    live_update_class: confirm_review_required
    os_signal_class: os_text_scale_signal
    requires_checkpoint: true
    requires_user_confirm: true
    policy_lock_reason_class: not_locked
    surface_scope: profile_appearance
    notes: Text-scale changes require a confirm sheet because the change reflows the entire shell.
  - axis: reduced_motion_posture
    live_update_class: live_apply_with_revertable_checkpoint
    os_signal_class: os_reduced_motion_signal
    requires_checkpoint: true
    requires_user_confirm: false
    policy_lock_reason_class: not_locked
    surface_scope: global_appearance
  - axis: follow_system_posture
    live_update_class: confirm_review_required
    os_signal_class: none
    requires_checkpoint: true
    requires_user_confirm: true
    policy_lock_reason_class: not_locked
    surface_scope: profile_appearance
    notes: Switching follow-system posture is always an explicit user choice with a confirm step; never live.
policy_context:
  policy_epoch: pe:2026-04-29:01
  trust_state: trusted
redaction_class: metadata_safe_default
minted_at: "2026-04-29T09:00:00Z"
