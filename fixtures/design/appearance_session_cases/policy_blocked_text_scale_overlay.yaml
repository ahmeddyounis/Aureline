# yaml-language-server: $schema=../../../schemas/design/token_overlay.schema.json
#
# Managed-policy overlay attempting to override the typography-scale
# token. Managed policy locks `text_scale`, so the overlay validates as
# `blocked_policy` and the entry validation is `blocked_policy`. The
# fallback chain still resolves to the policy-managed value so the
# session can render; the inert step is recorded for the rejected
# attempt.
__fixture__:
  name: policy_blocked_text_scale_overlay
  scenario: >
    A workspace tried to bump the typography scale through a custom
    overlay, but the managed-policy live policy marks `text_scale` as
    `policy_blocked`. The overlay record is emitted with
    `validation_state: blocked_policy` and `overlay_scope:
    policy_managed`; the workspace attempt is rejected with a denial
    note, and the policy-managed scale stays in effect.
  exercised_axes:
    overlay_scope: policy_managed
    validation_state: blocked_policy
    value_state_classes:
      - overridden
  contract_sections:
    - "§3 Live follow-system policy"
    - "§4 Token-overlay state contract"

