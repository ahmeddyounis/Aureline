    summary: >
      Open a workspace, import an external setup, restore recent work,
      and recover from a missing target without losing keyboard reach or
      reviewable truth.
    support_class: claimed
    seeded_result_state: pending_evidence
    platform_review_row_refs:
      - at_matrix.macos.core_shell
      - at_matrix.windows.core_shell
      - at_matrix.linux_gnome.core_shell
    checklist_refs:
      - shell_conformance.open_repo_from_launcher
    tree_row_refs:
      - tree_coverage.shell_workspace_launcher
    surface_groups:
      - shell_workspace_launcher
    locale_row_refs:
      - locale.shared.source_and_pseudoloc_shell
      - locale.shared.rtl_mixed_direction_technical_content
    fixture_refs:
      - fixtures/accessibility/ime_and_text_cases/platform_input_feature_unavailable.yaml
      - fixtures/workspace/entry_restore_examples/open_local_folder.json
      - fixtures/workspace/entry_restore_examples/vs_code_settings_import.json
      - fixtures/workspace/entry_restore_examples/restore_last_session.json
    issue_label_refs:
      - dogfood:accessibility
      - a11y:keyboard
      - a11y:screen-reader
    default_issue_route_classes:
      - oss_bug
      - design_system_defect
    evidence_consumer_channels:
      - accessibility_review_packet
      - release_evidence_packet
      - support_bundle_known_limit_correlation
    notes: >
      The task deliberately names open, import, and restore together so
      later release evidence does not split the same entry flow into new
