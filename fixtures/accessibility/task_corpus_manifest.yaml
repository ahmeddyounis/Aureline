# Accessibility task corpus manifest.
#
# Stable task ids for launch-critical accessibility review work. Future
# benchmark packets, conformance reports, support bundles, and release
# packets should cite these ids instead of inventing per-surface labels.
#
# Rules.
#   - Task ids are stable and must not embed milestone slugs.
#   - Every task MUST name one acceptance-pack family, one or more
#     checklist refs, one or more platform review rows, and one or more
#     evidence-consumer channels.
#   - A task may cite existing fixture files from any subtree, but the
#     task id itself remains the canonical join key for future evidence.

schema_version: 1
manifest_id: aureline.accessibility_task_corpus
manifest_revision: 1
status: seeded

overview_page: docs/accessibility/review_charter.md
packet_template_source: docs/accessibility/a11y_ime_packet_template.md
assistive_tech_matrix_source: artifacts/accessibility/assistive_tech_matrix.yaml
platform_input_matrix_source: artifacts/accessibility/platform_input_matrix.yaml
shell_checklist_source: artifacts/accessibility/shell_conformance_checklist.yaml
tree_coverage_source: artifacts/accessibility/accessibility_tree_coverage_rows.yaml
dogfood_issue_taxonomy_source: docs/governance/dogfood_issue_taxonomy.md
issue_routing_source: artifacts/governance/issue_routing.yaml
release_evidence_packet_source: docs/release/release_evidence_packet_template.md

task_family_vocabulary:
  - command_discovery
  - project_entry_and_restore
  - trust_and_permission
  - docs_and_help
  - execution_review
  - dense_review_collection

support_class_vocabulary:
  - claimed
  - claimed_narrow
  - best_effort
  - unclaimed

result_state_vocabulary:
  - pending_evidence
  - passed
  - degraded
  - blocked
  - failed
  - unclaimed

issue_label_vocabulary:
  - dogfood:accessibility
  - a11y:keyboard
  - a11y:screen-reader
  - a11y:zoom
  - a11y:high-contrast
  - a11y:reduced-motion
  - a11y:ime-input
  - a11y:docs-help
  - a11y:trust-prompt
  - a11y:task-terminal
  - a11y:dense-review

issue_route_class_vocabulary:
