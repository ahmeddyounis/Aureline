      - a11y:keyboard
      - a11y:screen-reader
      - a11y:dense-review
    default_issue_route_classes:
      - design_system_defect
      - oss_bug
    evidence_consumer_channels:
      - accessibility_review_packet
      - release_evidence_packet
      - benchmark_accessibility_acceptance
    notes: >
      Dense-surface review is explicit because accessibility scope must
      include tables, trees, logs, and other non-form-heavy surfaces.
