tasks:
  - task_id: corpus.accessibility.command_discovery.palette_and_quick_open
    acceptance_pack_family_ref: acceptance_pack.accessibility.command_discovery
    task_family: command_discovery
    title: Command discovery through the command palette and quick open
    summary: >
      Open the discovery surface, search while scope or result counts
      change, review disabled reasons, invoke a result, and return focus
      safely.
    support_class: claimed
    seeded_result_state: pending_evidence
    platform_review_row_refs:
      - at_matrix.macos.core_shell
      - at_matrix.windows.core_shell
      - at_matrix.linux_gnome.core_shell
    checklist_refs:
      - shell_conformance.quick_open_palette
    tree_row_refs:
      - tree_coverage.quick_open_palette
    surface_groups:
      - palette_search
    input_row_refs:
      - input.macos.text_input_services
      - input.windows.tsf_primary
      - input.linux.ibus_gnome
    locale_row_refs:
      - locale.shared.source_and_pseudoloc_shell
      - locale.shared.rtl_mixed_direction_technical_content
      - locale.shared.cjk_and_emoji_input
    fixture_refs:
      - fixtures/accessibility/ime_and_text_cases/editor_ime_dead_key_altgr_emoji_commit.yaml
      - fixtures/accessibility/ime_and_text_cases/mixed_direction_technical_strings.yaml
    issue_label_refs:
      - dogfood:accessibility
      - a11y:keyboard
      - a11y:screen-reader
      - a11y:ime-input
    default_issue_route_classes:
      - oss_bug
      - design_system_defect
    evidence_consumer_channels:
      - accessibility_review_packet
      - release_evidence_packet
      - benchmark_accessibility_acceptance
    notes: >
      This task is the stable join point for command-discovery evidence
      in future benchmark, conformance, and release packets.

