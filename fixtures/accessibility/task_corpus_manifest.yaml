  - supportability_issue
  - docs_truth_defect
  - design_system_defect

evidence_consumer_channels:
  - accessibility_review_packet
  - release_evidence_packet
  - compatibility_review_packet
  - benchmark_accessibility_acceptance
  - support_bundle_known_limit_correlation

