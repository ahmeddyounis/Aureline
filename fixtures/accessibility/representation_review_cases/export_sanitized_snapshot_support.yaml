__fixture__:
  name: export_sanitized_snapshot_support
  scenario: >
    A support export includes a sanitized static snapshot of a rich
    preview. Active content is removed, owner and origin metadata remain,
    and metadata-only export is the fallback if the snapshot cannot be
    produced truthfully.
  covers:
    - export_sanitized_snapshot
    - support_export
    - active_content_removed

