text_representation_action_schema_version: 1
action_row_id: security:text_action:support_export:sanitized_snapshot:01
policy_transfer_record_ref: case:support_export:sanitized_snapshot#export_sanitized_snapshot
source_surface_family: support_export
source_trust_class: SanitizedRich
action_id: export_sanitized_snapshot
canonical_label: Export sanitized snapshot
surface_label: Export sanitized snapshot
representation_class: sanitized_snapshot
availability_state: available
availability_conditions:
  - active_content_present
  - active_content_removed
  - sanitized_snapshot_available
  - support_or_security_export_boundary
  - origin_or_owner_verified
defaulting_rule:
