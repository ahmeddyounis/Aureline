# yaml-language-server: $schema=../../../schemas/security/text_representation_action.schema.json
__fixture__:
  name: copy_rendered_docs_preview_divergence
  scenario: >
    A docs preview renders Markdown links and inline code differently
    from the source Markdown. Copy rendered is the primary preview
    action, but Copy raw stays visible because the representations
    differ materially.
  covers:
    - copy_rendered
    - rendered_raw_divergence
    - docs_preview

record_kind: text_representation_action_record
text_representation_action_schema_version: 1
action_row_id: security:text_action:docs_preview:copy_rendered:divergence:01
policy_transfer_record_ref: case:docs_preview:markdown_divergence#copy_rendered
source_surface_family: docs_preview
source_trust_class: SanitizedRich
action_id: copy_rendered
canonical_label: Copy rendered
surface_label: Copy rendered preview
representation_class: rendered
availability_state: available
availability_conditions:
  - rendered_view_available
  - raw_rendered_divergence_present
  - origin_or_owner_verified
  - assistive_label_available
defaulting_rule:
  default_state: primary_default
  reason: The docs preview is a sanitized rich view, so the rendered representation is primary while raw source remains reachable.
payload_posture:
  body_posture: rendered_view
  raw_source_required: false
  active_content_removed: true
  includes_body: true
required_peer_actions:
  - copy_raw
required_disclosure_fields:
  - representation_label
  - source_surface
  - trust_class
  - origin_identity
  - raw_rendered_divergence_note
unavailable_reason: none
parity_surface_refs:
  - docs_preview
  - support_export
  - security_review
review_note: The label does not imply that rendered preview text is the raw Markdown source.
minted_at: "2026-04-29T16:25:00Z"
