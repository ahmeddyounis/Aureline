# yaml-language-server: $schema=../../../schemas/accessibility/locale_fallback_row.schema.json
__fixture__:
  name: mixed_direction_diff_bidi_controls
  scenario: >
    A diff hunk includes RTL prose, an LTR path, and one bidi override
    control. The inspector reports the directionality note, count,
    codepoint classes, and raw / escaped inspection actions without
    normalizing the source.
  covers:
    - bidi_controls
    - mixed_direction_technical_text
    - raw_and_escaped_view_actions

record_kind: mixed_direction_text_inspector_record
locale_fallback_row_schema_version: 1
inspector_id: a11y:text_inspector:diff:bidi_control:01
surface_family: diff
subject_ref: diff:hunk:settings_help_path:line-42
directionality_note: RTL prose with LTR path span and one bidi control
base_direction: mixed
control_character_count: 1
codepoint_class_summary:
  - class_id: bidi_control
    codepoint_count: 1
    sample_escape: U+202E
    severity: warning
    note: Escaped sample records the control without requiring raw private source text.
  - class_id: literal_code_or_path_span
    codepoint_count: 1
    sample_escape: ./src/config/settings.json
    severity: info
    note: The path remains a literal LTR island inside the mixed-direction hunk.
raw_view_action:
  action_id: open_raw_view
  label: Open raw view
  available: true
  default_for_inspector: true
  command_ref: command:text.open_raw_view
escaped_view_action:
  action_id: open_escaped_view
  label: Open escaped view
  available: true
  default_for_inspector: false
  command_ref: command:text.open_escaped_view
path_code_span_preservation:
  preserves_literal_tokens: true
  preserved_token_classes:
    - path
    - code_span
  normalization_posture: preserved_no_normalization
  preservation_note: Literal path and code span are not mirrored or normalized by the RTL paragraph.
visibility_guarantees:
  - dense_layout
  - high_zoom
  - keyboard_only
  - assistive_technology
  - support_export
assistive_access:
  accessible_name: Mixed-direction inspector, one bidi control
  announcement: One bidi control; raw and escaped views available
  keyboard_route: Focus warning marker, then open inspector
  live_region_policy: polite_on_change
  message_id_ref: accessibility.text_inspector.bidi_control
review_note: The hunk remains reviewable as raw and escaped text before any fix preview is offered.
minted_at: "2026-04-29T16:05:00Z"
