# yaml-language-server: $schema=../../../schemas/accessibility/locale_fallback_row.schema.json
__fixture__:
  name: invisible_install_review_inspector
  scenario: >
    An install review package identifier contains an invisible
    formatting character. The trust-decision surface keeps the warning,
    codepoint summary, raw view, and escaped view visible before the
    install action can proceed.
  covers:
    - invisible_characters
    - install_review
    - trust_decision_inspection

record_kind: mixed_direction_text_inspector_record
locale_fallback_row_schema_version: 1
inspector_id: a11y:text_inspector:install:invisible_package_id:01
surface_family: install_review
subject_ref: install:package_id:review-row-7
directionality_note: LTR package id with one invisible formatting character
base_direction: ltr
control_character_count: 1
codepoint_class_summary:
  - class_id: invisible_formatting
    codepoint_count: 1
    sample_escape: "\\u200B"
    severity: blocking
    note: The package id contains a zero-width space and must stay inspectable before trust is granted.
  - class_id: ordinary_text
    codepoint_count: 18
    sample_escape: package-id-redacted
    severity: info
    note: The ordinary token body is redacted in this fixture; the class summary remains sufficient.
raw_view_action:
  action_id: open_raw_view
  label: Open raw package id
  available: true
  default_for_inspector: true
  command_ref: command:security.open_raw_identifier
escaped_view_action:
  action_id: open_escaped_view
  label: Open escaped package id
  available: true
  default_for_inspector: false
  command_ref: command:security.open_escaped_identifier
path_code_span_preservation:
  preserves_literal_tokens: true
  preserved_token_classes:
    - package_id
  normalization_posture: normalization_preview_required
  preservation_note: Any removal of the invisible character requires a previewed identifier change.
visibility_guarantees:
  - dense_layout
  - high_zoom
  - keyboard_only
  - assistive_technology
  - support_export
assistive_access:
  accessible_name: Package id inspector, invisible character present
  announcement: Invisible formatting character present; raw and escaped views available before install
  keyboard_route: Focus package warning, then open inspector
  live_region_policy: assertive_for_trust_decision_only
  message_id_ref: accessibility.text_inspector.invisible_character
review_note: The warning remains on the primary install review row and survives metadata-only export.
minted_at: "2026-04-29T16:10:00Z"
