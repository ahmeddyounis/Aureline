__fixture__:
  name: export_metadata_only_terminal_malformed
  scenario: >
    A terminal transcript segment contains malformed decode recovery
    markers and policy prevents raw transcript bytes from leaving the
    workspace. The export narrows to metadata only and discloses why the
    body is withheld.
  covers:
    - export_metadata_only
    - malformed_text
    - terminal_transcript

record_kind: text_representation_action_record
text_representation_action_schema_version: 1
action_row_id: security:text_action:terminal:metadata_only:malformed:01
policy_transfer_record_ref: case:terminal:malformed_transcript#export_metadata_only
source_surface_family: terminal_transcript
source_trust_class: RawText
action_id: export_metadata_only
canonical_label: Export metadata only
surface_label: Export metadata only
representation_class: metadata_only
availability_state: available
availability_conditions:
  - source_representation_missing
  - policy_blocks_raw_body
  - malformed_decode_or_replacement_present
  - terminal_transcript_available
  - support_or_security_export_boundary
defaulting_rule:
