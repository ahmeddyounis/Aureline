record_kind: language_surface_accessibility_packet
schema_version: 1
contract_id: aureline.accessibility.language_surface_alpha
contract_revision: 1
fixture_id: a11y.language_surface_alpha.parity
owner: accessibility_input_review
review_packet_ref: artifacts/accessibility/m2_language_review.md
docs_ref: docs/accessibility/language_surface_alpha.md
consumer_ref: crates/aureline-shell/src/help/language_surface_accessibility.rs
known_limit_refs:
  - known_limit:external_alpha.scope.claimed_wedges_only
  - known_limit:external_alpha.language_surface_accessibility_synthetic_only
launch_language_refs:
  - alpha_wedge:typescript_javascript
  - alpha_wedge:python
source_refs:
  - docs/accessibility/screen_reader_and_live_region_contract.md
  - docs/accessibility/focus_zoom_and_pointer_independence_contract.md
  - docs/accessibility/visual_adaptation_contract.md
  - docs/language/diagnostic_freshness_and_delta_contract.md
  - docs/language/completion_and_inline_hint_contract.md
  - docs/language/tsjs_wedge_alpha.md
  - docs/language/python_wedge_alpha.md
  - docs/security/trust_class_alpha.md
  - fixtures/language/diagnostic_bus_alpha/bus_cases.json
  - fixtures/editor/assist_sessions_alpha/session_cases.json
  - fixtures/language/tsjs_nav_alpha/wedge_cases.json
  - fixtures/language/python_nav_alpha/wedge_cases.json
  - fixtures/previews/trust_class_alpha/core_surface_packet.json
required_surface_classes:
  - diagnostics
  - completion_assist
  - refactor_preview
required_dimension_classes:
  - keyboard
  - screen_reader
  - reduced_motion
rows:
  - surface_id: language_surface.diagnostics.editor_inline_and_problems
    surface_label: Diagnostics inline markers and Problems rows
    surface_class: diagnostics
    language_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    upstream_contract_refs:
      - crates/aureline-language/src/diagnostics/mod.rs
      - schemas/diagnostics/diagnostic_bus.schema.json
      - docs/language/diagnostic_freshness_and_delta_contract.md
      - docs/accessibility/screen_reader_and_live_region_contract.md
    upstream_fixture_refs:
      - fixtures/language/diagnostic_bus_alpha/bus_cases.json
      - fixtures/language/tsjs_quality_alpha/quality_cases.json
      - fixtures/language/python_quality_alpha/quality_cases.json
    support_export_refs:
      - support:language_surface:diagnostics
    known_limit_refs:
      - known_limit:external_alpha.language_surface_accessibility_synthetic_only
    keyboard:
      review_state: passed
      command_ids:
        - cmd:language.diagnostics.next
        - cmd:language.diagnostics.previous
        - cmd:language.codeAction.open
      route_summary: Navigate diagnostics by keyboard, open details or quick fixes from the focused marker, and return to the originating editor range.
      focus_return_state: returned_exact
      pointer_only_action_count: 0
      route_same_as_pointer: true
      focus_visible: true
      escape_or_cancel_path: true
    screen_reader:
      review_state: passed
      accessible_name_refs:
        - a11y.label.diagnostic.severity
        - a11y.label.diagnostic.source
        - a11y.label.diagnostic.freshness
        - a11y.label.diagnostic.scope
      message_id_refs:
        - a11y.announcement.diagnostic_entered_active_line
        - a11y.announcement.diagnostic_left_active_line
      live_region_policy: polite
      durable_fallback_refs:
        - surface:problems.row
        - surface:editor.status_summary
        - surface:support_export.diagnostic_summary
      announces_source_label: true
      announces_scope_or_partiality: true
      announces_preview_or_apply_posture: true
      no_color_only_state: true
    reduced_motion:
      review_state: passed
      motion_posture_class: motion_reduced
      disabled_motion_refs:
        - motion:diagnostic.pulse
        - motion:inline.marker_transition
        - motion:problems.row_reorder_animation
      static_substitution_refs:
        - static:severity_icon_and_label
        - static:source_freshness_badge
        - static:problem_count_text
        - static:quick_fix_available_label
      meaning_preserved_without_motion: true
      no_motion_only_cue: true
      layout_shift_required: false
    content_integrity:
      source_label_refs:
        - provider:lsp
        - provider:compiler
        - provider:linter
        - provider:imported_scan
      preview_or_review_refs:
        - surface:quick_fix.preview_or_inline_summary
        - docs/language/code_action_contract_alpha.md
      raw_rendered_state_refs:
        - state:diagnostic.structured_metadata_only
        - state:diagnostic.imported_snapshot_label
      no_silent_multi_file_mutation: true
      safe_preview_refs:
        - docs/security/trust_class_alpha.md

  - surface_id: language_surface.completion_assist.typing_loop
    surface_label: Completion list, signature help, and snippet session
    surface_class: completion_assist
    language_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    upstream_contract_refs:
      - crates/aureline-editor/src/assist/mod.rs
      - schemas/assist/completion_item.schema.json
      - docs/language/completion_and_inline_hint_contract.md
      - docs/accessibility/focus_zoom_and_pointer_independence_contract.md
    upstream_fixture_refs:
      - fixtures/editor/assist_sessions_alpha/session_cases.json
      - fixtures/language/completion_hint_cases/auto_import_completion.yaml
      - fixtures/language/completion_hint_cases/generator_backed_snippet.yaml
      - fixtures/language/completion_hint_cases/cached_signature_help.yaml
    support_export_refs:
      - support:language_surface:completion_assist
    known_limit_refs:
      - known_limit:external_alpha.language_surface_accessibility_synthetic_only
    keyboard:
      review_state: passed
      command_ids:
        - cmd:editor.completion.accept
        - cmd:editor.completion.dismiss
        - cmd:editor.snippet.nextPlaceholder
        - cmd:editor.snippet.previousPlaceholder
        - cmd:editor.snippet.cancel
      route_summary: Arrow keys review completion rows, Enter accepts, Escape dismisses, and Tab/Shift+Tab only traverse placeholders while a snippet session is active.
      focus_return_state: returned_exact
      pointer_only_action_count: 0
      route_same_as_pointer: true
      focus_visible: true
      escape_or_cancel_path: true
    screen_reader:
      review_state: passed
      accessible_name_refs:
        - a11y.label.completion.item_source
        - a11y.label.completion.additional_edits
        - a11y.label.signature.active_parameter
        - a11y.label.snippet.placeholder_position
      message_id_refs:
        - a11y.assist.completion.available
        - a11y.assist.signature.parameter
        - a11y.assist.snippet.placeholder
      live_region_policy: polite_or_focused_row
      durable_fallback_refs:
        - surface:editor.assist_status
        - surface:completion.detail_pane
        - surface:support_export.assist_summary
      announces_source_label: true
      announces_scope_or_partiality: true
      announces_preview_or_apply_posture: true
      no_color_only_state: true
    reduced_motion:
      review_state: passed
      motion_posture_class: motion_reduced
      disabled_motion_refs:
        - motion:completion.popup_slide
        - motion:signature.card_transition
        - motion:snippet.placeholder_pulse
      static_substitution_refs:
        - static:completion.active_row_outline
        - static:completion.source_label
        - static:signature.active_parameter_label
        - static:snippet.placeholder_count
        - static:preview_required_badge
      meaning_preserved_without_motion: true
      no_motion_only_cue: true
      layout_shift_required: false
    content_integrity:
      source_label_refs:
        - assist_source_family:language_server
        - assist_source_family:fallback_lexical
        - assist_source_family:snippet
      preview_or_review_refs:
        - surface:completion.additional_edit_preview
        - surface:completion.inline_acceptance_summary
      raw_rendered_state_refs:
        - state:completion.insert_text_ref_only
        - state:snippet.placeholder_contract
      no_silent_multi_file_mutation: true
      safe_preview_refs:
        - docs/security/trust_class_alpha.md

  - surface_id: language_surface.refactor_preview.rename
    surface_label: Rename and refactor preview
    surface_class: refactor_preview
    language_refs:
      - alpha_wedge:typescript_javascript
      - alpha_wedge:python
    upstream_contract_refs:
      - crates/aureline-language/src/tsjs/mod.rs
      - crates/aureline-language/src/python/mod.rs
      - docs/language/tsjs_wedge_alpha.md
      - docs/language/python_wedge_alpha.md
      - docs/accessibility/visual_adaptation_contract.md
    upstream_fixture_refs:
      - fixtures/language/tsjs_nav_alpha/wedge_cases.json
      - fixtures/language/python_nav_alpha/wedge_cases.json
      - fixtures/previews/trust_class_alpha/core_surface_packet.json
    support_export_refs:
      - support:language_surface:rename_preview
    known_limit_refs:
      - known_limit:external_alpha.language_surface_accessibility_synthetic_only
    keyboard:
      review_state: passed
      command_ids:
        - cmd:editor.refactor.rename.preview
        - cmd:editor.refactor.apply
        - cmd:editor.refactor.narrowScope
        - cmd:editor.refactor.exportPatch
        - cmd:editor.refactor.cancel
      route_summary: Open preview, traverse file and warning rows, then apply, narrow scope, export patch, or cancel by keyboard before any mutation.
      focus_return_state: returned_current_batch_or_detail_owner
      pointer_only_action_count: 0
      route_same_as_pointer: true
      focus_visible: true
      escape_or_cancel_path: true
    screen_reader:
      review_state: passed
      accessible_name_refs:
        - a11y.label.refactor.changed_count
        - a11y.label.refactor.generated_count
        - a11y.label.refactor.protected_count
        - a11y.label.refactor.scope
        - a11y.label.refactor.apply_posture
      message_id_refs:
        - a11y.refactor.preview.summary
        - a11y.refactor.preview.warning
        - a11y.refactor.preview.apply_posture
      live_region_policy: polite_for_preview_ready_assertive_for_blocked_apply
      durable_fallback_refs:
        - surface:refactor_preview.tree
        - surface:refactor_preview.warning_rows
        - surface:support_export.refactor_preview_summary
      announces_source_label: true
      announces_scope_or_partiality: true
      announces_preview_or_apply_posture: true
      no_color_only_state: true
    reduced_motion:
      review_state: passed
      motion_posture_class: motion_reduced
      disabled_motion_refs:
        - motion:preview_tree.expand_collapse
        - motion:diff_hunk_transition
        - motion:blocked_warning_pulse
      static_substitution_refs:
        - static:refactor.changed_count
        - static:refactor.generated_count
        - static:refactor.protected_count
        - static:refactor.scope_badge
        - static:refactor.apply_posture_label
      meaning_preserved_without_motion: true
      no_motion_only_cue: true
      layout_shift_required: false
    content_integrity:
      source_label_refs:
        - provider:tsserver
        - provider:pyright
        - scope:active_workset
      preview_or_review_refs:
        - tsjs:rename-preview
        - python:rename-preview
        - surface:refactor_preview.structured_diff
      raw_rendered_state_refs:
        - state:rename_preview.structured_diff
        - state:rename_preview.blocked_generated_readonly_counts
        - state:rename_preview.no_silent_apply
      no_silent_multi_file_mutation: true
      safe_preview_refs:
        - docs/security/trust_class_alpha.md
acceptance:
  all_required_surfaces_present: true
  keyboard_routes_complete: true
  screen_reader_semantics_complete: true
  reduced_motion_meaning_preserved: true
  content_integrity_preview_cues_preserved: true
  known_limits_current: true
