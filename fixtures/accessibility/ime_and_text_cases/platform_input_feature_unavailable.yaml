fixture_id: a11y_text.platform_input_feature_unavailable
title: Unsupported or unavailable input features fail closed with a visible fallback
scenario: >
  When an input feature or accessibility bridge is unavailable, Aureline
  narrows or blocks only the affected route and keeps the failure state
  explicit instead of silently corrupting text or pretending parity.
platform_profile_scope: all_claimed_desktop_profiles
surface_groups:
  - shell_workspace_launcher
  - guided_tour_and_onboarding
  - sign_in_and_trust_prompt
  - settings_dialogs
steps:
  - step_id: missing_input_path
    action: >
      Attempt to use a platform input feature that the active surface
      cannot support coherently, such as composition on a field that has
      lost its target or an unavailable bridge on the current desktop
      row.
    expected_focus_owner: settings_dialogs
    expected_announcement: feature unavailable, blocked, or narrowed route explained explicitly
    expected_text_result: no partial or corrupted text is committed
  - step_id: fallback_route
    action: >
      Follow the offered fallback route, such as switching to a
      supported field, opening input settings, or continuing with a
      keyboard-only review path.
    expected_focus_owner: settings_dialogs
    expected_announcement: fallback route is named and keyboard reachable
    expected_text_result: productive continuation remains available when the owning contract allows it
expected_results:
  allowed_result_states:
    - degraded
    - blocked
    - unclaimed
  failure_class_refs:
    - ime_preedit_loss
    - tree_node_missing
    - announcement_missing
  silent_fallback_forbidden: true
  corrupt_text_forbidden: true
