fixture_id: a11y_text.multi_window_mixed_dpi_composition
title: Composition and focus survive multi-window mixed-DPI changes
scenario: >
  IME composition remains visible and focused when a second window moves
  across monitors with different scale buckets or when an owner dialog
  opens during composition.
platform_profile_scope: all_claimed_desktop_profiles
surface_groups:
  - palette_search
  - dense_collection_batch_review
  - sign_in_and_trust_prompt
input_row_refs:
  - input.macos.text_input_services
  - input.windows.tsf_primary
  - input.linux.ibus_gnome
locale_row_refs:
  - locale.shared.cjk_and_emoji_input
steps:
  - step_id: begin_composition
    action: >
      In a secondary window, start an IME preedit for "検索テスト" in a
      palette or review-comment field.
    expected_focus_owner: palette_search
    expected_announcement: composition active in the secondary window
    expected_text_result: "検索テスト"
  - step_id: move_window_or_dialog
    action: >
      Move the window to a monitor with a different scale bucket or open
      an owner dialog on the moved window while composition remains
      active.
    expected_focus_owner: palette_search
    expected_announcement: focus remains on the active composition target
    expected_text_result: preedit stays visible after the topology change
  - step_id: commit_after_reflow
    action: >
      Commit the composition after the move or dialog recenter event.
    expected_focus_owner: palette_search
    expected_announcement: committed text remains attached to the original target
    expected_text_result: "検索テスト"
expected_results:
  result_state_when_claimed: passed
  failure_class_refs:
    - ime_preedit_loss
    - mixed_dpi_focus_loss
  silent_commit_or_cancel_forbidden: true
  offscreen_dialog_owner_forbidden: true
