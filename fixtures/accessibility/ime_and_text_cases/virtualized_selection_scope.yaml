fixture_id: a11y_dense.virtualized_selection_scope
title: Virtualized selection counts stay truthful through batch review
scenario: >
  A dense, virtualized collection preserves row identity, selected
  counts, blocked or hidden counts, and query-backed scope while the
  viewport changes.
platform_profile_scope: all_claimed_desktop_profiles
surface_groups:
  - dense_collection_batch_review
assistive_technology_refs:
  - at.voiceover.macos.core_shell
  - at.nvda.windows.core_shell
  - at.orca.linux.gnome.core_shell
steps:
  - step_id: select_visible_rows
    action: >
      Select 23 visible rows in a filtered collection whose query
      matches 2,341 total items.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: "23 visible selected"
    expected_text_result: visible-scope label remains explicit
  - step_id: widen_to_query
    action: >
      Expand the selection to all matching query results and scroll far
      enough to force virtualization churn.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: "2,341 matching selected"
    expected_text_result: query-backed scope survives virtualization
  - step_id: open_batch_review
    action: >
      Open the batch review sheet when 6 rows are hidden by policy and 3
      rows are blocked from mutation.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: hidden and blocked counts remain narrated before the action
    expected_text_result: "6 hidden by policy, 3 blocked"
expected_results:
  result_state_when_claimed: passed
  failure_class_refs:
    - virtualized_selection_count_drift
    - announcement_missing
  query_scope_must_remain_explicit: true
  blocked_hidden_counts_must_survive_review_open: true
