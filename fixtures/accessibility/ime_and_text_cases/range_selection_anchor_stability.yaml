fixture_id: a11y_dense.range_selection_anchor_stability
title: Range-selection anchor remains stable through keyboard navigation
scenario: >
  Dense collections preserve the anchor row for range selection until
  the user explicitly clears it, even across large jumps and review
  drill-down.
platform_profile_scope: all_claimed_desktop_profiles
surface_groups:
  - dense_collection_batch_review
assistive_technology_refs:
  - at.voiceover.macos.core_shell
  - at.nvda.windows.core_shell
  - at.orca.linux.gnome.core_shell
steps:
  - step_id: set_anchor
    action: >
      Focus row 5 and begin a range selection with Shift plus ArrowDown.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: anchor established at row 5
    expected_text_result: anchor is explicit and stable
  - step_id: extend_range
    action: >
      Extend the range to row 25 with Shift plus PageDown and then open
      a detail sheet from the focused row.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: selected count updates without changing the anchor
    expected_text_result: range includes rows 5 through 25
  - step_id: return_from_detail
    action: >
      Close the detail sheet and continue extending the range by one row.
    expected_focus_owner: dense_collection_batch_review
    expected_announcement: focus returns to the originating row and the anchor stays at row 5
    expected_text_result: selection becomes rows 5 through 26
expected_results:
  result_state_when_claimed: passed
  failure_class_refs:
    - range_anchor_drift
    - focus_return_regression
  anchor_reset_without_user_action_forbidden: true
