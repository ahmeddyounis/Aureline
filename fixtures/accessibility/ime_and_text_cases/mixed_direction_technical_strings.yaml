fixture_id: a11y_text.mixed_direction_technical_strings
title: Mixed-direction technical strings remain readable and copy-safe
scenario: >
  RTL prose containing LTR flags, paths, hostnames, and command examples
  remains understandable in the UI, in screen-reader narration, and in
  raw or escaped copy flows.
platform_profile_scope: all_claimed_desktop_profiles
surface_groups:
  - docs_reader
  - diff_review
  - terminal_output
  - palette_search
assistive_technology_refs:
  - at.voiceover.macos.core_shell
  - at.nvda.windows.core_shell
  - at.orca.linux.gnome.core_shell
locale_row_refs:
  - locale.shared.rtl_mixed_direction_technical_content
steps:
  - step_id: render_and_read
    action: >
      Render and read the string "--output ./تقارير/build.log" inside an
      RTL paragraph with an inline code span.
    expected_focus_owner: docs_reader
    expected_announcement: RTL prose with an explicit LTR path span
    expected_text_result: "--output ./تقارير/build.log"
  - step_id: inspect_controls
    action: >
      Open the mixed-direction inspector row for the same string and
      review any bidi-control disclosure.
    expected_focus_owner: diff_review
    expected_announcement: bidi isolate count or explicit no-control summary
    expected_text_result: "directionality remains explicit"
  - step_id: terminal_copy
    action: >
      Copy the terminal representation of "ssh dev@مثال.internal --port 2222"
      as raw and as escaped text.
    expected_focus_owner: terminal_output
    expected_announcement: representation choice is narrated before copy
    expected_text_result: "ssh dev@مثال.internal --port 2222"
expected_results:
  result_state_when_claimed: passed
  failure_class_refs:
    - bidi_copy_drift
    - announcement_missing
  exact_text_preservation_required: true
  raw_and_escaped_copy_routes_required: true
