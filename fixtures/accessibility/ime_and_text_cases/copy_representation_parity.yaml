fixture_id: a11y_text.copy_representation_parity
title: Raw, rendered, and escaped copy routes preserve representation truth
scenario: >
  Surfaces that expose multiple copy or export representations keep the
  chosen representation explicit in UI, narration, and exported text.
platform_profile_scope: all_claimed_desktop_profiles
surface_groups:
  - docs_reader
  - diff_review
  - terminal_output
locale_row_refs:
  - locale.shared.source_and_pseudoloc_shell
  - locale.shared.rtl_mixed_direction_technical_content
steps:
  - step_id: docs_copy_modes
    action: >
      From a docs page containing Markdown links and inline code, copy
      the raw Markdown, the rendered preview, and the escaped
      representation in sequence.
    expected_focus_owner: docs_reader
    expected_announcement: each copy action announces raw, rendered, or escaped before completion
    expected_text_result: representation labels remain distinct
  - step_id: diff_copy_modes
    action: >
      From a diff review surface containing bidi and invisible
      formatting markers, copy raw text and escaped text.
    expected_focus_owner: diff_review
    expected_announcement: escaped copy retains the safe representation label
    expected_text_result: directional or invisible controls remain represented honestly
  - step_id: terminal_copy_modes
    action: >
      Copy a terminal line containing ANSI-stripped rendered text and a
      raw transcript export.
    expected_focus_owner: terminal_output
    expected_announcement: transcript copy keeps raw versus rendered explicit
    expected_text_result: rendered copy does not masquerade as raw transcript
expected_results:
  result_state_when_claimed: passed
  failure_class_refs:
    - bidi_copy_drift
    - announcement_missing
  representation_label_required: true
  silent_normalization_forbidden: true
