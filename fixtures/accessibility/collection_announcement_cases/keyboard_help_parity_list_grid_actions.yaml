counts:
  selected_count:
    term: selected
    status: exact
    value: 0
  hidden_member_count:
    term: hidden_selected
    status: exact
    value: 0
  not_loaded_count:
    term: not_loaded
    status: exact
    value: 0
  visible_count:
    term: visible
    status: exact
    value: 42
  loaded_count:
    term: loaded
    status: exact
    value: 42
  matching_count:
    term: matching
    status: exact
    value: 42
  included_count:
    term: included
    status: exact
    value: 0
  blocked_count:
    term: blocked
    status: exact
    value: 0
batch_scope:
  selection_scope_class: visible_range
  action_scope_class: visible_items
  scope_truth_class: client_local_truth
  execution_origin_class: mixed_client_then_provider
  action_scope_label: Update selected visible packages after review.
  announces_visible_vs_all_matching_before_execute: true
  review_surface_ref: sheet.package.inventory.update_review.01
  provider_authority_ref: provider.package.registry.authority.01
virtualization:
  row_mount_state: mounted_visible
  hydration_state: full_row_hydrated
  row_identity_survives_sort_filter_scroll: true
  accessible_indices_come_from_model: true
  unmounted_selected_members_represented: true
  partial_hydration_preserves_scope: true
  mount_index_used_as_identity: false
  rules:
    - row_identity_survives_sort_filter_scroll
    - indices_from_collection_model
    - selection_membership_by_identity
