  position_in_set: 3
  set_size: 42
  row_index: 3
  row_count: 42
  column_index: null
  column_count: 9
  level: null
  index_truth_class: exact
  position_basis_label: Package inventory sorted by update availability.
row_state:
  selected_state: not_selected
  blocked_state: not_blocked
  read_only_state: editable
  current: true
  focused: true
  blocked_reason: none
