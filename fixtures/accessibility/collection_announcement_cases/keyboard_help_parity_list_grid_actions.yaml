  dataset_identity_ref: dataset.package.inventory.epoch.012
  query_basis_ref: filter.package.inventory.updates.01
  prior_snapshot_ref: null
  change_classes:
    - none
  material_change_requires_reannouncement: true
  prior_snapshot_announced_when_used: true
  destructive_action_requires_review_or_denial: true
  reviewed_matching_count:
    term: matching
    status: exact
    value: 42
  current_matching_count:
    term: matching
    status: exact
    value: 42
keyboard_help_actions:
  - action_kind: select_current_row
    command_id_ref: command.collection.select_current
    shortcut_label: Space
    available_help_surfaces:
      - row_accessible_description
      - keyboard_shortcuts_help
      - screen_reader_action_menu
    assistive_description_message_id: a11y.collection.help.select_current
    hover_only_forbidden: true
    screen_reader_action_available: true
  - action_kind: toggle_focused_identity
    command_id_ref: command.collection.toggle_focused_identity
    shortcut_label: Cmd+Space
    available_help_surfaces:
      - keyboard_shortcuts_help
      - command_palette
    assistive_description_message_id: a11y.collection.help.toggle_focused_identity
    hover_only_forbidden: true
    screen_reader_action_available: true
  - action_kind: select_visible_rows
    command_id_ref: command.collection.select_visible_rows
    shortcut_label: null
    available_help_surfaces:
      - command_palette
      - status_or_selection_bar
      - screen_reader_action_menu
    assistive_description_message_id: a11y.collection.help.select_visible_rows
    hover_only_forbidden: true
    screen_reader_action_available: true
  - action_kind: select_loaded_rows
    command_id_ref: command.collection.select_loaded_rows
    shortcut_label: null
    available_help_surfaces:
      - command_palette
      - status_or_selection_bar
    assistive_description_message_id: a11y.collection.help.select_loaded_rows
    hover_only_forbidden: true
    screen_reader_action_available: true
  - action_kind: open_row_details
    command_id_ref: command.collection.open_row_details
    shortcut_label: Enter
    available_help_surfaces:
      - row_accessible_description
      - keyboard_shortcuts_help
      - context_menu
    assistive_description_message_id: a11y.collection.help.open_row_details
    hover_only_forbidden: true
    screen_reader_action_available: true
announcement_policy:
  message_id: a11y.collection.announcement.keyboard_help_parity
  live_region_channel: silent
  delivery_timing: durable_surface_only
  coalescing_strategy: focused_surface_only
  durable_fallback_ref: panel.package.inventory.keyboard_help.01
  raw_private_material_excluded: true
summary_label: Package grid row exposes selection and review commands through keyboard help, command palette, and screen-reader actions.
