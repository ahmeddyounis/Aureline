      urgency_class: status
      delivery_timing: immediate
      interrupts_current_speech: false
      coalescing_strategy: dedupe_same_meaning
      coalesce_window_ms: 1000
      max_announcements_per_burst: 1
      silence_reason: not_silent
      dedupe_key: dedupe.collab.control
      meaning_hash_ref: meaning.collab.control_requested
      supersedes_event_refs: []
    assistive_tech_context:
