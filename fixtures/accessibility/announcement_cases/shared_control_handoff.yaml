# yaml-language-server: $schema=../../../schemas/accessibility/announcement_event.schema.json
record_kind: announcement_case_record
announcement_event_schema_version: 1
__fixture__:
  name: shared_control_handoff
  scenario: >
    Shared control moves from a local user to a named collaborator and
    back. Presence alone never implies control.
  contract_sections:
    - Event types
    - Cross-surface reuse
case_id: a11y.announcement.case.shared_control_handoff
title: Shared-control handoff announces authority changes once
scenario: >
  A collaboration session requests, grants, and revokes shared editor
  control. Authority changes are assertive when local control changes
  and are backed by the session activity lane.
contract_refs:
  - docs/accessibility/screen_reader_and_live_region_contract.md
  - schemas/collaboration/control_grant.schema.json
events:
