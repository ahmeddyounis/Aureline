    announcement_event_type: collaboration_control_requested
    announcement_event_class: collaboration_control
    source_context:
      source_subsystem: collaboration
      surface_family: collaboration_session
      canonical_event_id: event.collab.control.requested
      target_ref: collab.session.current.editor_control
      target_label: Editor control
      scope_label: Shared session
      actor_role_label: Collaborator
      durable_fallback_ref: collab.activity.control
    state_context:
