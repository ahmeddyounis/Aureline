# yaml-language-server: $schema=../../../schemas/accessibility/announcement_event.schema.json
record_kind: announcement_case_record
announcement_event_schema_version: 1
__fixture__:
  name: trust_mode_change
  scenario: >
    A workspace enters restricted mode and later gains trust. The
    announcement names the capability change and a safe next action.
  contract_sections:
    - Event types
    - Live-region policy
case_id: a11y.announcement.case.trust_mode_change
title: Trust-mode changes announce capability and safe continuation
scenario: >
  Opening an unfamiliar workspace changes execution capability. The
  restricted-mode entry is blocking and assertive; the later trust grant
  is polite because the visible trust banner remains durable.
contract_refs:
  - docs/accessibility/screen_reader_and_live_region_contract.md
  - artifacts/accessibility/assistive_tech_coverage_rows.yaml
events:
  - record_kind: announcement_event_record
    announcement_event_schema_version: 1
    announcement_event_id: a11y.event.trust.restricted
    announcement_contract_id: aureline.accessibility.screen_reader_live_region
    announcement_contract_revision: 1
    announcement_event_type: trust_entered_restricted_mode
    announcement_event_class: trust_mode_change
    source_context:
      source_subsystem: workspace_trust
      surface_family: trust_prompt
      canonical_event_id: event.trust.workspace.restricted
      target_ref: workspace.current
      target_label: Current workspace
      scope_label: Workspace
      durable_fallback_ref: trust.banner.current_workspace
    state_context:
      state_label: Restricted mode
      severity_label: Blocking
      state_changed: true
      visible_state_already_covers_change: false
      available_next_actions:
        - Continue
        - Open details
      blocked_reason_label: Trust required before execution
    phrasing:
      message_id: a11y.announcement.trust.restricted_mode
      locale: en-US
      template: "{scope_label} is in restricted mode. {next_action_label}"
      placeholders:
        - name: scope_label
          value_class: scope_label
          example_value: Workspace
        - name: next_action_label
          value_class: action_label
          example_value: Continue
      spoken_example: Workspace is in restricted mode. Continue.
      stable_nouns:
        - workspace
        - restricted mode
      plain_language_next_action: Continue
    live_region_policy:
      channel: assertive
      urgency_class: blocking
      delivery_timing: immediate
      interrupts_current_speech: true
      coalescing_strategy: dedupe_same_meaning
      coalesce_window_ms: 1000
      max_announcements_per_burst: 1
      silence_reason: not_silent
      dedupe_key: dedupe.trust.current_workspace
      meaning_hash_ref: meaning.trust.restricted
      supersedes_event_refs: []
    assistive_tech_context:
      assistive_tech_coverage_row_ref: at_coverage.voiceover.macos.launch_critical_announcements
      platform_review_row_ref: at_matrix.macos.core_shell
      assistive_technology_row_ref: at.voiceover.macos.core_shell
      parity_support_state: partial
      keyboard_traversal_required: true
      zoom_resilience_required: true
      plain_language_action_labels_required: true
    support_export:
      include_in_accessibility_packet: true
      include_in_repro_bundle: true
      announcement_contract_id: aureline.accessibility.screen_reader_live_region
      announcement_contract_revision: 1
      schema_ref: schemas/accessibility/announcement_event.schema.json
      task_corpus_ref: corpus.accessibility.trust.permission_prompt_recovery
      checklist_refs:
        - shell_conformance.sign_in_or_trust_prompt_recovery
      redaction_class: metadata_only
      raw_private_material_excluded: true
      export_field_refs:
        - export.a11y.announcement.contract
        - export.a11y.trust_mode
        - export.a11y.at_row
    minted_at: "2026-04-29T12:10:00Z"

