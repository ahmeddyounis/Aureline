# yaml-language-server: $schema=../../../schemas/accessibility/announcement_event.schema.json
record_kind: announcement_case_record
announcement_event_schema_version: 1
__fixture__:
  name: breakpoint_toggle
  scenario: >
    A keyboard user toggles a breakpoint on and off from the editor
    gutter. The confirmation is concise and reuses the breakpoint list
    vocabulary.
  contract_sections:
    - Event types
    - Stable phrasing
case_id: a11y.announcement.case.breakpoint_toggle
title: Breakpoint toggle announces added and removed states once
scenario: >
  The debug surface and editor gutter project the same breakpoint
  change. The live region confirms the keyboard action once per state
  and avoids a second conflicting list announcement.
contract_refs:
  - docs/accessibility/screen_reader_and_live_region_contract.md
  - artifacts/accessibility/assistive_tech_coverage_rows.yaml
events:
  - record_kind: announcement_event_record
    announcement_event_schema_version: 1
    announcement_event_id: a11y.event.breakpoint.added
    announcement_contract_id: aureline.accessibility.screen_reader_live_region
    announcement_contract_revision: 1
    announcement_event_type: breakpoint_added
    announcement_event_class: breakpoint_change
    source_context:
      source_subsystem: debug_session
      surface_family: editor_gutter
      canonical_event_id: event.debug.breakpoint.line_added
      target_ref: debug.breakpoint.current_line
      target_label: Current line
      scope_label: Editor
      durable_fallback_ref: debug.breakpoints.list
    state_context:
      state_label: Breakpoint added
      state_changed: true
      visible_state_already_covers_change: false
      available_next_actions:
        - Open details
      count_label: 1 breakpoint
    phrasing:
      message_id: a11y.announcement.breakpoint.added
      locale: en-US
      template: "Breakpoint added on {target_label}."
      placeholders:
        - name: target_label
          value_class: bounded_label
          example_value: Current line
      spoken_example: Breakpoint added on current line.
      stable_nouns:
        - breakpoint
        - current line
      plain_language_next_action: Open details
    live_region_policy:
      channel: polite
      urgency_class: status
      delivery_timing: immediate
      interrupts_current_speech: false
      coalescing_strategy: dedupe_same_meaning
      coalesce_window_ms: 500
      max_announcements_per_burst: 1
      silence_reason: not_silent
      dedupe_key: dedupe.breakpoint.current_line
      meaning_hash_ref: meaning.breakpoint.added
      supersedes_event_refs: []
    assistive_tech_context:
      assistive_tech_coverage_row_ref: at_coverage.orca.linux_gnome.launch_critical_announcements
      platform_review_row_ref: at_matrix.linux_gnome.core_shell
      assistive_technology_row_ref: at.orca.linux.gnome.core_shell
      parity_support_state: degraded
      keyboard_traversal_required: true
      zoom_resilience_required: true
      plain_language_action_labels_required: true
    support_export:
      include_in_accessibility_packet: true
      include_in_repro_bundle: true
      announcement_contract_id: aureline.accessibility.screen_reader_live_region
      announcement_contract_revision: 1
      schema_ref: schemas/accessibility/announcement_event.schema.json
      task_corpus_ref: corpus.accessibility.debug.breakpoint_toggle
      checklist_refs:
        - announcement_contract.breakpoint_toggle
      redaction_class: metadata_only
      raw_private_material_excluded: true
      export_field_refs:
        - export.a11y.announcement.contract
        - export.a11y.breakpoint
        - export.a11y.at_row
    minted_at: "2026-04-29T12:20:00Z"

  - record_kind: announcement_event_record
    announcement_event_schema_version: 1
    announcement_event_id: a11y.event.breakpoint.removed
    announcement_contract_id: aureline.accessibility.screen_reader_live_region
    announcement_contract_revision: 1
    announcement_event_type: breakpoint_removed
    announcement_event_class: breakpoint_change
    source_context:
      source_subsystem: debug_session
