# yaml-language-server: $schema=../../../schemas/accessibility/announcement_event.schema.json
record_kind: announcement_case_record
announcement_event_schema_version: 1
__fixture__:
  name: ai_patch_ready_and_apply_success
  scenario: >
    An AI patch becomes ready for review and then applies successfully.
    Both announcements reuse the same contract and export fields.
  contract_sections:
    - Event types
    - Support and export fields
case_id: a11y.announcement.case.ai_patch_ready_and_apply_success
title: AI patch ready and apply success reuse the announcement contract
scenario: >
  The AI patch review surface emits a patch-ready event and an apply
  success event. The success announcement names the review or undo path
  and remains export-safe.
contract_refs:
  - docs/accessibility/screen_reader_and_live_region_contract.md
  - schemas/accessibility/announcement_event.schema.json
events:
