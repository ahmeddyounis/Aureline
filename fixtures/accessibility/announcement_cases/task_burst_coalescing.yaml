record_kind: announcement_case_record
announcement_event_schema_version: 1
__fixture__:
  name: task_burst_coalescing
  scenario: >
    A task burst emits a start, a superseded shard completion, and a
    final failure. The live region must not leave contradictory output
    in the screen-reader queue.
  contract_sections:
    - Live-region policy
    - Fixture expectations
case_id: a11y.announcement.case.task_burst_coalescing
title: Task burst coalescing suppresses superseded intermediate states
scenario: >
  The task runner emits rapid state changes for one canonical task
  target. The start and final failure are meaningful, while an
  intermediate completion is superseded before delivery.
contract_refs:
  - docs/accessibility/screen_reader_and_live_region_contract.md
  - schemas/accessibility/announcement_event.schema.json
