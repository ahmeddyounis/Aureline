# yaml-language-server: $schema=../../../schemas/accessibility/operational_surface_state.schema.json
record_kind: operational_surface_case_record
operational_surface_state_schema_version: 1
__fixture__:
  name: interactive_rebase_sequence
  scenario: >
    An interactive rebase pauses on a conflict at step 3 of 5, exposes
    the closed action set, names a recovery checkpoint, and lets a
    keyboard-only user continue, abort, skip, restore, or review the
    conflict without ambiguity.
  contract_sections:
    - Closed Operational-Surface Families
    - Closed Action Vocabulary
    - Closed State Vocabulary
    - Required Actions Per Surface
    - Required States Per Surface
    - Reuse Rules
    - Live-Region Composition
    - Fixture Expectations
case_id: a11y.op_surface.case.interactive_rebase_sequence
title: Interactive rebase sequence step pauses on conflict with checkpoint
scenario: >
  The sequence editor enters paused_pending_conflict on step 3, the
  recovery contract pins a recovery_object checkpoint, the live-region
  announces the conflict once, and the focused row exposes the closed
  Continue/Abort/Skip/Restore checkpoint/Review conflict actions
  through keyboard-first command routes.
