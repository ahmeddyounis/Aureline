    include_in_repro_bundle: true
    operational_surface_parity_contract_id: aureline.accessibility.operational_surface_parity
    operational_surface_parity_contract_revision: 1
    schema_ref: schemas/accessibility/operational_surface_state.schema.json
    announcement_contract_id_ref: aureline.accessibility.screen_reader_live_region
    tree_node_contract_id_ref: aureline.accessibility.tree_node_taxonomy
    focus_zoom_pointer_contract_id_ref: aureline.accessibility.focus_zoom_pointer_independence
    task_corpus_ref: corpus.accessibility.execution.task_run_review
    checklist_refs:
      - shell_conformance.run_task_and_review_output
    redaction_class: support_packet_redacted
    raw_private_material_excluded: true
    export_field_refs:
      - export.a11y.op_surface.contract
      - export.a11y.op_surface.action
      - export.a11y.op_surface.state
      - export.a11y.op_surface.recovery_object
