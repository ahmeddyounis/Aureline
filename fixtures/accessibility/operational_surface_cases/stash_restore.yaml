# yaml-language-server: $schema=../../../schemas/accessibility/operational_surface_state.schema.json
record_kind: operational_surface_case_record
operational_surface_state_schema_version: 1
__fixture__:
  name: stash_restore
  scenario: >
    A keyboard-only user applies a stash entry, the stash shelf
    announces apply success and recovery path once, and unchanged-row
    repaints stay silent.
  contract_sections:
    - Closed Action Vocabulary
    - Closed State Vocabulary
    - Reuse Rules
    - Live-Region Composition
    - Fixture Expectations
case_id: a11y.op_surface.case.stash_restore
title: Stash apply announces once and exposes Restore checkpoint
scenario: >
  The stash shelf is dirty_pending_review with one stash selected. The
  user invokes Continue (apply) by keyboard, the live region announces
  apply success once, and the surface ends in completed with a
  checkpoint reference for restore. Polling refreshes that do not
  change meaning are suppressed.
contract_refs:
  - docs/accessibility/operational_surface_parity_contract.md
  - schemas/accessibility/operational_surface_state.schema.json
  - docs/accessibility/screen_reader_and_live_region_contract.md
  - docs/accessibility/accessibility_tree_contract.md
  - docs/accessibility/focus_zoom_and_pointer_independence_contract.md
