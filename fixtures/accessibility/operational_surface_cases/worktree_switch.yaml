      parity_state: passed
      evidence_ref: at_coverage.nvda.windows.launch_critical_announcements
    - dimension: accessibility_tree_role_name_state
      parity_state: passed
      evidence_ref: a11y_tree.coverage.list_or_table_rows
    - dimension: full_keyboard_traversal
      parity_state: passed
      evidence_ref: focus_zoom.no_drag_keyboard_equivalence
    - dimension: focus_order_and_return
      parity_state: passed
      evidence_ref: focus_zoom.overlay_focus_return
    - dimension: zoom_50_to_400_percent
      parity_state: passed
      evidence_ref: focus_zoom.high_zoom_launch_layout
    - dimension: larger_text_and_line_height
      parity_state: passed
      evidence_ref: focus_zoom.larger_text_cursor_line_height
    - dimension: plain_language_action_labels
      parity_state: passed
      evidence_ref: shell_conformance.run_task_and_review_output
    - dimension: plain_language_state_labels
      parity_state: passed
      evidence_ref: shell_conformance.run_task_and_review_output
    - dimension: non_color_state_cue
      parity_state: passed
      evidence_ref: shell_conformance.run_task_and_review_output
    - dimension: live_region_dedupe_and_coalesce
      parity_state: passed
      evidence_ref: a11y.event.task_burst_coalescing
    - dimension: durable_fallback_row
      parity_state: passed
      evidence_ref: shell_conformance.run_task_and_review_output
    - dimension: no_drag_only_dependency
      parity_state: degraded
      evidence_ref: no_drag_only.worktree_reorder_debt
      notes: One pointer-only debt row remains; replacement command tracked.
    - dimension: support_export_repro
      parity_state: passed
      evidence_ref: corpus.accessibility.execution.task_run_review
  support_export:
    include_in_accessibility_packet: true
    include_in_repro_bundle: true
    operational_surface_parity_contract_id: aureline.accessibility.operational_surface_parity
    operational_surface_parity_contract_revision: 1
    schema_ref: schemas/accessibility/operational_surface_state.schema.json
