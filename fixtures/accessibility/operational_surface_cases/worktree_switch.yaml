# yaml-language-server: $schema=../../../schemas/accessibility/operational_surface_state.schema.json
record_kind: operational_surface_case_record
operational_surface_state_schema_version: 1
__fixture__:
  name: worktree_switch
  scenario: >
    A keyboard-only user switches between worktrees with a destructive
    preview before commit. The worktree manager exposes Switch target,
    Preview consequence, Restore checkpoint, and Open recovery pane on
    the focused row.
  contract_sections:
    - Closed Action Vocabulary
    - Closed State Vocabulary
    - Reuse Rules
    - Required Actions Per Surface
    - Live-Region Composition
    - Fixture Expectations
case_id: a11y.op_surface.case.worktree_switch
title: Worktree switch previews consequence and exposes recovery
scenario: >
  The worktree manager has two entries. The user keyboards onto the
  inactive entry, invokes Preview consequence, then Switch target. A
  checkpoint is created before the dirty target is replaced. Live
  region announces destructive preview and switch result; row repaints
  on identity check stay silent.
contract_refs:
  - docs/accessibility/operational_surface_parity_contract.md
  - schemas/accessibility/operational_surface_state.schema.json
  - docs/accessibility/screen_reader_and_live_region_contract.md
  - docs/accessibility/accessibility_tree_contract.md
  - docs/accessibility/focus_zoom_and_pointer_independence_contract.md
parity_row:
