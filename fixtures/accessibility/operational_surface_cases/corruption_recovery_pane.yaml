record_kind: operational_surface_case_record
operational_surface_state_schema_version: 1
__fixture__:
  name: corruption_recovery_pane
  scenario: >
    The recovery pane offers a recovery object after a corruption
    detection event. A keyboard-only user can Restore checkpoint,
    Continue, Abort, or Open details with focus return preserved on
    overlay close.
  contract_sections:
    - Closed Action Vocabulary
    - Closed State Vocabulary
    - Reuse Rules
    - Required Actions Per Surface
    - Live-Region Composition
    - Fixture Expectations
case_id: a11y.op_surface.case.corruption_recovery_pane
title: Corruption recovery pane offers checkpoint and preserves focus return
scenario: >
  After a corruption detection event the recovery pane opens in
  recovery_available state with a recovery checkpoint named. The user
  invokes Restore checkpoint via keyboard, the pane transitions
  through recovery_in_progress to completed, the live region
  announces each meaning change once, and focus returns to the
  invoker on overlay close.
