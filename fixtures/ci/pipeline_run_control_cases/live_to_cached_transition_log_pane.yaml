__fixture__:
  name: live_to_cached_transition_log_pane
  scenario: >
    A job log pane that started as live_streaming_provider_tail
    while the workflow run was running. When the run completed the
    provider closed the streaming session. The pane drops to
    live_vs_cached_class = cached_post_run_replay, freshness_class
    drops out of authoritative_live to warm_cached, chunk_state
    drops to static_full_log_loaded, and the record carries a
    non-empty live_to_cached_transition with a typed
    transition_event_ref bound to the run-completed provider event.
    The underlying output_viewer_object_record's origin_class
    flipped from live_stream to cached_playback in the same change.
  exercised_axes:
    live_vs_cached_class: cached_post_run_replay
    freshness_class: warm_cached
    chunk_state: static_full_log_loaded
    pin_state: pinned_step_boundary
    partial_log_semantics: complete_log_in_loaded_window
    raw_export_path_class: exact_export_path_available
    raw_export_scope_class: provider_raw_download
    search_scope_on_pipeline_class: entire_run_full_source_loaded
  contract_sections:
    - "2. Log pane"
    - "2.2 Live-to-cached transition rule (frozen)"

