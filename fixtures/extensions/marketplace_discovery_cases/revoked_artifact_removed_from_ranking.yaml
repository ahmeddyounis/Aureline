# Marketplace discovery case: revoked artifact removed from ranking
# with a denial_no_install_path warning.
#
# Companion to docs/extensions/marketplace_ranking_and_trust_contract.md
# and schemas/extensions/discovery_ranking_reason.schema.json.
# Validates against discovery_result_row.
#
# Exercises: public_registry source class, production channel,
# revoked approval state, removed_from_ranking + popularity_signal_suppressed_due_to_quarantine
# chips, not_in_ranking_review_only discovery position, paired
# warning at denial_no_install_path severity with response
# block_install_no_recovery and the no_recovery_review_only repair
# affordance, fresh revocation snapshot (the freshness is what told
# us the artifact is revoked).

# yaml-language-server: $schema=../../../schemas/extensions/discovery_ranking_reason.schema.json
__fixture__:
  name: revoked_artifact_removed_from_ranking
  scenario: >
    The artifact 'pivot-co/jit-runner' 3.1.0 was promoted to
    production but the publisher signing key was revoked after a
    leak; the registry-manifest row's approval_state_class is now
    revoked. The discovery row resolves to not_in_ranking_review_only;
    detail-page surfaces still render the warning but the install
    path is block_install_no_recovery with the no_recovery_review_only
    repair affordance. Popularity is suppressed.
  contract_section: >
    Discovery-position class; Warnings; Anti-abuse register
  exercised_classes:
    record_kind: discovery_result_row
    registry_source_class: public_registry
    channel_class: production
    approval_state_class: revoked
    trust_claim_source: origin_public_registry
    trust_badge_inheritance_rule: inherits_origin_tier
    compatibility_claim_class: compatible_on_all_declared_targets
    runtime_cost_class: runtime_cost_nominal
    runtime_cost_evidence_class: activation_evidence_packet_present
    bridge_state_class: no_bridge_required_native_match
    revocation_snapshot_age_class: fresh
    discovery_position_class: not_in_ranking_review_only
    anti_abuse_state_id: artifact_revoked_blocking
    warning_class: artifact_revoked
    warning_severity_class: denial_no_install_path
    warning_response_class: block_install_no_recovery

record_kind: discovery_result_row
discovery_ranking_reason_schema_version: 1
discovery_result_row_id: disc-pivot-co-jit-runner-3-1-0-public-revoked
extension_identity: pivot-co/jit-runner
extension_version: 3.1.0
registry_source_class: public_registry
channel_class: production
approval_state_class: revoked
trust_claim_source: origin_public_registry
trust_badge_inheritance_rule: inherits_origin_tier
compatibility_claim_class: compatible_on_all_declared_targets
runtime_cost_class: runtime_cost_nominal
runtime_cost_evidence_class: activation_evidence_packet_present
bridge_state_class: no_bridge_required_native_match
revocation_snapshot_age_class: fresh
ranking_floor_order:
  - ranking_floor_safety_first
  - ranking_floor_compatibility_first
  - ranking_floor_maintainership_first
  - ranking_floor_runtime_cost_first
  - ranking_floor_policy_pinned_first
  - ranking_secondary_popularity
ranking_reason_chip_entries:
  - chip_class: removed_from_ranking
    polarity: suppress_only
    ranking_floor_class: ranking_floor_safety_first
    rendered_label: Removed from ranking
    explanation_label: >
      The registry-manifest row's approval_state_class is revoked.
      Anti-abuse register binds the row to artifact_revoked_blocking:
      denial_no_install_path severity, block_install_no_recovery
      response, position cap not_in_ranking_review_only.
    evidence_refs:
      - anti-abuse-state-artifact-revoked-blocking
      - reg-mf-pivot-co-jit-runner-3-1-0-public-revoked
  - chip_class: anti_abuse_warning_raised
    polarity: negative
    ranking_floor_class: ranking_floor_safety_first
    rendered_label: Artifact revoked
    explanation_label: >
      The publisher signing key was revoked after a leak; the
      revocation snapshot resolved fresh. The artifact has no
      install path until a new signed version is published.
    evidence_refs:
      - rev-snapshot-public-registry-2026-04-24-0001
      - audit-channel-promotion-revoked-pivot-co-jit-runner-3-1-0
  - chip_class: popularity_signal_suppressed_due_to_quarantine
    polarity: suppress_only
    ranking_floor_class: ranking_secondary_popularity
    rendered_label: Popularity signal suppressed
    explanation_label: >
      Popularity counters are suppressed for a revoked artifact so
      legacy traffic does not promote the row before the user sees
      the revocation warning.
    evidence_refs:
      - anti-abuse-state-artifact-revoked-blocking
discovery_position_class: not_in_ranking_review_only
registry_manifest_row_ref: reg-mf-pivot-co-jit-runner-3-1-0-public-revoked
publisher_continuity_ref: pub-pivot-co
policy_pack_applicable_refs:
