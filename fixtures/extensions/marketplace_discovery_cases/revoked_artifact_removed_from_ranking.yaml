  - warning-artifact-revoked-pivot-co-jit-runner-3-1-0
anti_abuse_signal_class_set_observed:
  - rapid_version_republish
audit_event_refs:
  - audit-channel-promotion-revoked-pivot-co-jit-runner-3-1-0
  - audit-registry-manifest-signature-reverified-pivot-co-jit-runner-3-1-0
