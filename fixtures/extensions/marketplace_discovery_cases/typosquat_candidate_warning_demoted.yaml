# Marketplace discovery case: typosquat candidate demoted with a
# blocking-pending-acknowledgement warning.
#
# Companion to docs/extensions/marketplace_ranking_and_trust_contract.md
# and schemas/extensions/discovery_ranking_reason.schema.json.
# Validates against discovery_result_row.
#
# Exercises: public_registry source class, production channel,
# typosquatting_candidate anti-abuse signal raised, warning class
# typosquat_candidate at blocking_install_pending_explicit_acknowledgement
# severity, anti_abuse_warning_raised + suppressed_in_ranking +
# publisher_unverified ranking-reason chips, demoted_warning_visible
# discovery position, runtime_cost_unknown_pending_evidence (newly
# published, no activation packet yet), and the cited anti-abuse
# state row typosquat_candidate_advisory.

# yaml-language-server: $schema=../../../schemas/extensions/discovery_ranking_reason.schema.json
__fixture__:
  name: typosquat_candidate_warning_demoted
  scenario: >
    A newly published 'acmme-labs/prose-helper' 0.0.7 row mimics the
    well-known 'acme-labs/prose-helper'. The registry typosquat
    detector raises typosquatting_candidate; the anti-abuse register
    binds the row to typosquat_candidate_advisory. The discovery row
    resolves to demoted_warning_visible; install requires explicit
    user acknowledgement; the trust badge caps at unverified. The row
    is reachable from search but never above the standard band.
    Popularity counters are suppressed because the anti-abuse signal
    is raised.
  contract_section: >
    Anti-abuse register; Discovery-position class; Disclosure
    invariants
  exercised_classes:
    record_kind: discovery_result_row
    registry_source_class: public_registry
    channel_class: production
    approval_state_class: promoted_to_production
    trust_claim_source: origin_public_registry
    trust_badge_inheritance_rule: inherits_origin_tier
    compatibility_claim_class: compatible_on_all_declared_targets
    runtime_cost_class: runtime_cost_unknown_pending_evidence
    runtime_cost_evidence_class: activation_evidence_packet_absent_pending_first_session
    bridge_state_class: no_bridge_required_native_match
    revocation_snapshot_age_class: fresh
    discovery_position_class: demoted_warning_visible
    anti_abuse_state_id: typosquat_candidate_advisory
    warning_class: typosquat_candidate
    warning_severity_class: blocking_install_pending_explicit_acknowledgement
    warning_response_class: prompt_user_for_explicit_acknowledgement

record_kind: discovery_result_row
