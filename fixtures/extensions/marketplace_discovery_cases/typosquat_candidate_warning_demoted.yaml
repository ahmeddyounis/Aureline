extension_identity: acmme-labs/prose-helper
extension_version: 0.0.7
registry_source_class: public_registry
channel_class: production
approval_state_class: promoted_to_production
trust_claim_source: origin_public_registry
trust_badge_inheritance_rule: inherits_origin_tier
compatibility_claim_class: compatible_on_all_declared_targets
runtime_cost_class: runtime_cost_unknown_pending_evidence
runtime_cost_evidence_class: activation_evidence_packet_absent_pending_first_session
bridge_state_class: no_bridge_required_native_match
revocation_snapshot_age_class: fresh
ranking_floor_order:
  - ranking_floor_safety_first
  - ranking_floor_compatibility_first
  - ranking_floor_maintainership_first
  - ranking_floor_runtime_cost_first
  - ranking_floor_policy_pinned_first
  - ranking_secondary_popularity
ranking_reason_chip_entries:
  - chip_class: anti_abuse_warning_raised
    polarity: negative
    ranking_floor_class: ranking_floor_safety_first
    rendered_label: Anti-abuse warning raised
    explanation_label: >
      The registry typosquat detector raised typosquatting_candidate
      against this row. The anti-abuse register binds the signal to
      typosquat_candidate_advisory: blocking-install pending explicit
      user acknowledgement, position cap demoted_warning_visible.
    evidence_refs:
      - anti-abuse-state-typosquat-candidate-advisory
      - anti-abuse-signal-acmme-labs-prose-helper-typosquat-2026-04-24
  - chip_class: suppressed_in_ranking
    polarity: suppress_only
    ranking_floor_class: ranking_floor_safety_first
    rendered_label: Suppressed in ranking
    explanation_label: >
      Anti-abuse position cap demoted this row to
      demoted_warning_visible. Popularity signals are not credited
      while the anti-abuse signal is raised.
    evidence_refs:
      - anti-abuse-state-typosquat-candidate-advisory
  - chip_class: publisher_unverified
    polarity: negative
    ranking_floor_class: ranking_floor_safety_first
    rendered_label: Publisher unverified
    explanation_label: >
      Anti-abuse register forces trust_badge_unverified_publisher
      regardless of the registry's inherits_origin_tier inheritance
      rule. The badge axis is trust_axis.
    evidence_refs:
      - anti-abuse-state-typosquat-candidate-advisory
      - pub-acmme-labs
  - chip_class: compatibility_match
    polarity: positive
    ranking_floor_class: ranking_floor_compatibility_first
    rendered_label: Compatible on every declared target
    evidence_refs:
      - reg-mf-acmme-labs-prose-helper-0-0-7-public-prod
  - chip_class: maintainership_unknown
    polarity: negative
    ranking_floor_class: ranking_floor_maintainership_first
    rendered_label: Maintainership unknown
    explanation_label: >
      The publisher row has insufficient release / signing history
      to credit maintained_actively or maintained_recently.
    evidence_refs:
      - pub-acmme-labs
  - chip_class: runtime_cost_unknown_pending_evidence
    polarity: neutral
    ranking_floor_class: ranking_floor_runtime_cost_first
    rendered_label: Runtime cost unknown
    explanation_label: >
      No activation-evidence packet has been recorded for this
      version. Discovery does not credit a low- or nominal-cost chip
      on the basis of self-reported counters.
    evidence_refs:
      - activation-evidence-packet-absent-acmme-labs-prose-helper-0-0-7
  - chip_class: popularity_signal_suppressed_due_to_quarantine
    polarity: suppress_only
    ranking_floor_class: ranking_secondary_popularity
    rendered_label: Popularity signal suppressed
    explanation_label: >
      Popularity counters are suppressed while an anti-abuse signal
      is raised; surfacing them would reward the typosquat candidate
      for traffic the namespace did not earn.
    evidence_refs:
      - anti-abuse-state-typosquat-candidate-advisory
discovery_position_class: demoted_warning_visible
