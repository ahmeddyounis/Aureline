# at the safety / compatibility / maintainership / runtime-cost floor.
#
# Companion to docs/extensions/marketplace_ranking_and_trust_contract.md
# and schemas/extensions/discovery_ranking_reason.schema.json.
# Validates against discovery_result_row.
#
# Exercises: public_registry source class, production channel,
# promoted_to_production approval state, origin_public_registry trust
# claim source, inherits_origin_tier inheritance rule,
# compatible_on_all_declared_targets compatibility, runtime_cost_low_nominal
# backed by activation_evidence_packet_present evidence,
# no_bridge_required_native_match bridge state, fresh revocation
# snapshot, and discovery_position_class
# promoted_safe_maintained_compatible_low_cost.

# yaml-language-server: $schema=../../../schemas/extensions/discovery_ranking_reason.schema.json
__fixture__:
  name: public_package_promoted_first_party
  scenario: >
    The extension 'acme-labs/prose-helper' 1.4.2 is published to the
    public registry, has cleared review, and is now in the production
    channel. The publisher is verified, the artifact is compatible on
    every declared target, an activation-evidence packet attests to a
    low_nominal runtime cost, and no anti-abuse signals are raised.
    The discovery row resolves to
    promoted_safe_maintained_compatible_low_cost with the full
    positive chip set (compatibility_match, verified_publisher,
    maintained_actively, low_runtime_cost) and a
    popularity_signal_observed chip strictly behind the four safety /
    compatibility / maintainership / runtime-cost floors.
  contract_section: >
    Default ranking-floor order; Discovery-position class;
    Ranking-reason chips
  exercised_classes:
    record_kind: discovery_result_row
    registry_source_class: public_registry
    channel_class: production
    approval_state_class: promoted_to_production
    trust_claim_source: origin_public_registry
    trust_badge_inheritance_rule: inherits_origin_tier
    compatibility_claim_class: compatible_on_all_declared_targets
    runtime_cost_class: runtime_cost_low_nominal
    runtime_cost_evidence_class: activation_evidence_packet_present
    bridge_state_class: no_bridge_required_native_match
    revocation_snapshot_age_class: fresh
    discovery_position_class: promoted_safe_maintained_compatible_low_cost

