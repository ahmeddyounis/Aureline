__fixture__:
  name: private_registry_org_managed_approved
  scenario: >
    The org-private extension 'globex-internal/release-pilot' 2.7.0
    is published to the workspace's private registry, has been
    managed-approved by the workspace admin, and is pinned by the
    workspace policy pack as the canonical release-pilot tool. The
    publisher row resolves to organisationally-published; the trust
    badge caps at trust_badge_managed_approved (advisory). The row
    resolves to elevated_compatibility_match — above the standard
    band but not promoted_safe_maintained_compatible_low_cost
    because the trust badge is organisationally capped.
  contract_section: >
    Default ranking-floor order; Discovery-position class;
    Ranking-reason chips
