    trust_claim_source: origin_private_registry
    trust_badge_inheritance_rule: capped_at_organisational_on_private_registry
    compatibility_claim_class: compatible_on_all_declared_targets
    runtime_cost_class: runtime_cost_nominal
    runtime_cost_evidence_class: activation_evidence_packet_present
    bridge_state_class: no_bridge_required_native_match
    revocation_snapshot_age_class: fresh
    discovery_position_class: elevated_compatibility_match

