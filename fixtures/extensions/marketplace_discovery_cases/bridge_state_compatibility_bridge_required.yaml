# Marketplace discovery case: bridge-state row that needs a
# compatibility-bridge profile to install.
#
# Companion to docs/extensions/marketplace_ranking_and_trust_contract.md
# and schemas/extensions/discovery_ranking_reason.schema.json.
# Validates against discovery_result_row.
#
# Exercises: public_registry source class, production channel,
# compatibility_bridge_required compatibility, bridge_required_compatibility_bridge_profile
# bridge state, the bridge_state_required + compatibility_bridge_required
# ranking-reason chips at the diagnostic-only and compatibility floors,
# and discovery_position_class standard_compatible_match (admitted via
# the bridge profile but not promoted because the bridge introduces
# disclosure overhead).

# yaml-language-server: $schema=../../../schemas/extensions/discovery_ranking_reason.schema.json
__fixture__:
  name: bridge_state_compatibility_bridge_required
  scenario: >
    The artifact 'lumen-tools/diff-overlay' 1.2.4 declares a host
    contract that is one minor version behind the workspace's
    component-model ABI window. The registry-manifest row binds a
    compatibility-bridge profile so the workspace can install via
    the bridge. Discovery resolves the row to
    standard_compatible_match with a compatibility_bridge_required
    chip and a bridge_state_required diagnostic chip. The trust
    badge is verified_publisher (the publisher continuity is clean);
    the bridge is purely a compatibility concern. No anti-abuse
    signals are raised; the install path is admitted via the bridge
    profile.
  contract_section: >
    Ranking-reason chips; Badges; Bridge-state class
  exercised_classes:
    record_kind: discovery_result_row
    registry_source_class: public_registry
    channel_class: production
    approval_state_class: promoted_to_production
    trust_claim_source: origin_public_registry
    trust_badge_inheritance_rule: inherits_origin_tier
    compatibility_claim_class: compatibility_bridge_required
    runtime_cost_class: runtime_cost_nominal
    runtime_cost_evidence_class: activation_evidence_packet_present
    bridge_state_class: bridge_required_compatibility_bridge_profile
    revocation_snapshot_age_class: fresh
    discovery_position_class: standard_compatible_match

