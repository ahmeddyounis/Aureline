    explanation_label: >
      The artifact's declared host contract is one minor version
      behind this workspace's component-model ABI window. A
      compatibility-bridge profile is bound; install is admitted via
      the bridge but the chip is not promoted into the
      compatibility_match band.
    evidence_refs:
      - reg-mf-lumen-tools-diff-overlay-1-2-4-public-bridge
      - bridge-profile-component-model-abi-minus-one-2026-04-01
  - chip_class: bridge_state_required
    polarity: neutral
    ranking_floor_class: ranking_diagnostic_only_no_score
    rendered_label: Compatibility bridge profile bound
    explanation_label: >
      The bridge profile lives at
      bridge-profile-component-model-abi-minus-one-2026-04-01. The
      bridge does not change the artifact identity; the
      content-address pair is preserved verbatim across install.
    evidence_refs:
