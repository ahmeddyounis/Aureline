#
# Companion to docs/extensions/sdk_publication_contract.md and
# schemas/extensions/sdk_release_bundle.schema.json. Validates against
# docs_pack_export_row.
#
# Exercises: docs_pack_export artifact class, html_static_site format,
# air_gapped_mirror_only mirror class with a non-null
# static_docs_export_ref AND offline_mirror_bundle_ref, general_long_window
# support backed by passing conformance result, and the
# compatible_on_declared_targets badge so the docs surface reads result
# vocabulary verbatim instead of minting a "verified" chip.

# yaml-language-server: $schema=../../../schemas/extensions/sdk_release_bundle.schema.json
__fixture__:
  name: docs_pack_export_air_gapped_static_site
  scenario: >
    The aureline.sdk.worlds line at 0.1.0 publishes an HTML static-site
    docs pack covering the WIT package release and the Rust typed
    bindings. The pack is mirrored exclusively as an air-gapped bundle
    (no public-registry path), carries a sealed static_docs_export_ref,
    and ships under general_long_window support backed by one
    pass_full_matrix conformance run on the in-repo reference host.
    Air-gapped operators install the pack from the offline bundle.
  seed_section: >
    Per-class fields :: docs_pack_export_row; Mirror availability and
    offline bundles; Static docs exports and air-gapped mirror bundles
  exercised_classes:
    record_kind: docs_pack_export_row
