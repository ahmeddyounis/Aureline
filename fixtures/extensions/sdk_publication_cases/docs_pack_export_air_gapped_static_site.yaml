    docs_pack_kind_class: api_reference_html
    docs_format_class: html_static_site
    host_abi_window_class: component_model_abi_window_general_1
    mirror_availability_class: air_gapped_mirror_only
    support_window_class: general_long_window
    compatibility_badge_class: compatible_on_declared_targets

