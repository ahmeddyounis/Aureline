    "acme-core" and carries the verified_publisher trust tier. The
    effective-permission summary shows the declared-vs-effective
    diff produced by the policy-pack narrowings; transitive
    capability inheritance through capability_inherit contributes
    a dependency marker the summary quotes by ref. Nothing in the
    fixture embeds raw artifact bytes, raw signing-key material,
    raw policy-bundle bytes, or raw publisher-private data; every
    such field is an opaque ref.
