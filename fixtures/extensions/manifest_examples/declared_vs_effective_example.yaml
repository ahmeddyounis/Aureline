  scenario: >
    A Wasm component-model extension "acme-labs/prose-helper" at
    version 1.4.2 declares filesystem_read, filesystem_write,
    network_egress, ai_provider_access, and capability_inherit
    permissions. It is delivered as a signed Wasm artifact from
