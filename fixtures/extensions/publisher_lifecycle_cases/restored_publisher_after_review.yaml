# Publisher-lifecycle case: publisher-restoration-after-review
# event clearing a prior quarantine.
#
# Companion to docs/extensions/publisher_lifecycle_and_registry_parity_contract.md,
# schemas/extensions/publisher_lifecycle_event.schema.json, and
# schemas/extensions/registry_parity.schema.json. Validates against
# publisher_lifecycle_event_record (first document),
# installed_package_lifecycle_notification_record (second document),
# and registry_parity_assertion_record (third document).
#
# Exercises: publisher_restoration_after_review event with non-null
# prior_publisher_lifecycle_event_record_ref, trust badge promoted
# back to organisational, anti-abuse register state cleared,
# installed-row notification disposition
# notify_with_required_update_pending so the workspace runs the
# post-restoration update before activation resumes, and a public-
# registry parity assertion resolving parity_held_full_vocabulary_match.

# yaml-language-server: $schema=../../../schemas/extensions/publisher_lifecycle_event.schema.json
__fixture__:
  name: restored_publisher_after_review
  scenario: >
    The moderation review for the prior quarantine of 'rogue-namespace'
    completes with reason moderation_review_concluded_admit. The
    publisher_restoration_after_review event clears the
    publisher_namespace_recently_quarantined_blocking anti-abuse
    register row, promotes the trust badge from
    quarantined_cannot_inherit back to organisational, and cites the
    prior quarantine-engaged event via
    prior_publisher_lifecycle_event_record_ref. The installed-row
    notification disposition is notify_with_required_update_pending
    so the workspace runs the post-restoration update before
    activation resumes; the parity assertion holds full parity.
  contract_section: >
    Fixtures cover verified publisher transfer, abandoned publisher,
    mirror-promoted package, quarantine, and restored publisher
    after review.
  exercised_classes:
    record_kinds:
      - publisher_lifecycle_event_record
      - installed_package_lifecycle_notification_record
      - registry_parity_assertion_record
    lifecycle_event_class: publisher_restoration_after_review
    actor_class: moderation_review
    reason_class: moderation_review_concluded_admit
    effect_on_trust_badge_class: trust_badge_promoted_to_organisational
    effect_on_anti_abuse_state_class: anti_abuse_state_cleared
    installed_package_notification_disposition_class: notify_with_required_update_pending
    parity_overall_state_class: parity_held_full_vocabulary_match

