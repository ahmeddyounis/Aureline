# Publisher-lifecycle case: verified-publisher transfer-completed
# event with installed-row fan-out and a public-registry parity
# assertion.
#
# Companion to docs/extensions/publisher_lifecycle_and_registry_parity_contract.md,
# schemas/extensions/publisher_lifecycle_event.schema.json, and
# schemas/extensions/registry_parity.schema.json. Validates against
# publisher_lifecycle_event_record (first document),
# installed_package_lifecycle_notification_record (second document),
# and registry_parity_assertion_record (third document).
#
# Exercises: publisher_transfer_completed event with successor
# publisher continuity ref, trust badge demoted to organisational on
# every installed copy, installed-row notification disposition
# notify_with_required_review_pending, and a public-registry
# parity assertion resolving parity_held_full_vocabulary_match.

# yaml-language-server: $schema=../../../schemas/extensions/publisher_lifecycle_event.schema.json
__fixture__:
  name: verified_publisher_transfer
  scenario: >
    The verified publisher 'acme-labs' transfers its 'prose-helper'
    namespace to the successor 'acme-labs-next'. The registry
    operator records publisher_transfer_completed with
    successor_publisher_acknowledged as the typed reason; the trust
    badge demotes from verified to organisational on every installed
    copy until the successor publisher's first verification review
    clears. Discovery surfaces render
    maintainership_badge_publisher_transfer_recent and the matching
    publisher_transfer_recent_advisory anti-abuse register row;
    install-review surfaces require explicit user acknowledgement.
    The installed-row at workspace 'globex-internal-acme-default'
    receives a notify_with_required_review_pending notification with
    open_install_review_sheet and consult_workspace_admin repair
    affordances. The public-registry parity assertion resolves
    parity_held_full_vocabulary_match across all ten parity axes.
  contract_section: >
    Publisher transfer or revocation changes trust state visibly
    across discovery, installed rows, and support/export fixtures.
  exercised_classes:
    record_kinds:
      - publisher_lifecycle_event_record
      - installed_package_lifecycle_notification_record
      - registry_parity_assertion_record
    lifecycle_event_class: publisher_transfer_completed
    actor_class: registry_operator
    reason_class: successor_publisher_acknowledged
    effect_on_trust_badge_class: trust_badge_demoted_to_organisational
    effect_on_compatibility_badge_class: compatibility_badge_demoted_to_unknown_pending_reverification
    effect_on_anti_abuse_state_class: anti_abuse_state_engaged
    installed_package_notification_disposition_class: notify_with_required_review_pending
    parity_overall_state_class: parity_held_full_vocabulary_match

---

