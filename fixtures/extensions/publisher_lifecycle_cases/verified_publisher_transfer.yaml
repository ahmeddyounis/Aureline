  - consult_workspace_admin
  - open_publisher_continuity_packet
rendered_label: Publisher transfer requires review before activation resumes
explanation_label: >
  The verified publisher 'acme-labs' transferred the 'prose-helper'
  namespace to the successor 'acme-labs-next'. The trust badge demotes
  from verified to organisational on this installed row until the
  successor publisher's first verification review clears. Open the
  install review sheet to acknowledge the transfer; the workspace
  admin can request a managed-only continuation.
trust_badge_after_event_class: trust_badge_demoted_to_organisational
compatibility_badge_after_event_class: compatibility_badge_demoted_to_unknown_pending_reverification
runtime_cost_badge_after_event_class: runtime_cost_badge_unchanged
denial_reason_class: publisher_transfer_pending_user_acknowledgement
evidence_refs:
  - ple-acme-labs-prose-helper-transfer-completed-2026-04-26
  - signing-continuity-acme-labs-to-acme-labs-next-2026-04-26
audit_event_refs:
  - audit-installed-package-lifecycle-notification-emitted-globex-acme-default-acme-labs-prose-helper-1-4-2
notified_at: 2026-04-26T09:01:00Z
acknowledged_at: null
redaction_class: support_bundle

