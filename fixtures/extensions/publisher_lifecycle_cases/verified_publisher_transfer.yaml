record_kind: installed_package_lifecycle_notification_record
publisher_lifecycle_event_schema_version: 1
installed_package_lifecycle_notification_record_id: ipln-globex-acme-default-acme-labs-prose-helper-1-4-2-transfer
publisher_lifecycle_event_record_ref: ple-acme-labs-prose-helper-transfer-completed-2026-04-26
installed_extension_identity: acme-labs/prose-helper
installed_extension_version: 1.4.2
installed_workspace_ref: workspace-globex-internal-acme-default
installed_registry_source_class: public_registry
