effective_at: 2026-04-26T09:00:00Z
prior_publisher_lifecycle_event_record_ref: ple-acme-labs-prose-helper-transfer-announced-2026-04-19
effect_on_trust_badge_class: trust_badge_demoted_to_organisational
effect_on_compatibility_badge_class: compatibility_badge_demoted_to_unknown_pending_reverification
effect_on_runtime_cost_badge_class: runtime_cost_badge_unchanged
effect_on_anti_abuse_state_class: anti_abuse_state_engaged
anti_abuse_state_row_refs:
  - anti-abuse-state-publisher-transfer-recent-advisory
policy_pack_applicable_refs:
  - policy-acme-org-default-v3
evidence_refs:
  - signing-continuity-acme-labs-to-acme-labs-next-2026-04-26
  - moderation-review-row-acme-transfer-2026-04-19
installed_package_notification_required: true
audit_event_refs:
  - audit-publisher-lifecycle-event-recorded-acme-labs-transfer-completed
denial_reason_class: publisher_transfer_pending_user_acknowledgement
redaction_class: support_bundle

