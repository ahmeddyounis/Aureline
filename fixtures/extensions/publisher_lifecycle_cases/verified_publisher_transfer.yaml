subject_registry_endpoint_ref: endpoint-public-registry-aureline-default
subject_extension_identity: null
subject_extension_version: null
subject_registry_manifest_row_ref: null
mirror_continuity_row_ref: null
lifecycle_event_class: publisher_transfer_completed
actor_class: registry_operator
