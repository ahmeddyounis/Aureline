# Publisher-lifecycle case: mirror-promoted package event with
# capped-inheritance parity assertion.
#
# Companion to docs/extensions/publisher_lifecycle_and_registry_parity_contract.md,
# schemas/extensions/publisher_lifecycle_event.schema.json, and
# schemas/extensions/registry_parity.schema.json. Validates against
# publisher_lifecycle_event_record (first document),
# installed_package_lifecycle_notification_record (second document),
# and registry_parity_assertion_record (third document).
#
# Exercises: mirror_promotion_admitted event with non-null
# mirror_continuity_row_ref, trust badge unchanged (mirror inherits
# origin tier after a fresh recertification), installed-row
# notification disposition notify_only_no_action_required, and an
# approved-mirror parity assertion resolving
# parity_held_with_capped_inheritance.

# yaml-language-server: $schema=../../../schemas/extensions/publisher_lifecycle_event.schema.json
__fixture__:
  name: mirror_promoted_package
  scenario: >
    The approved mirror 'eu-frankfurt-mirror' recertifies its cached
    copy of 'acme-labs/prose-helper' 1.4.2 against the origin signing
    key with a fresh revocation snapshot, and the mirror operator
    records mirror_promotion_admitted with reason
    mirror_continuity_recertified. The trust badge is unchanged
    because the mirror re-verified the origin signature; the parity
    assertion holds with capped inheritance to make the cap visible
    on every consumer surface. Installed copies that resolved through
    the mirror receive a notify_only_no_action_required notification
    so the workspace knows the recertification happened without any
    install action required.
  contract_section: >
    Fixtures cover verified publisher transfer, abandoned publisher,
    mirror-promoted package, quarantine, and restored publisher
    after review.
  exercised_classes:
    record_kinds:
      - publisher_lifecycle_event_record
      - installed_package_lifecycle_notification_record
      - registry_parity_assertion_record
    lifecycle_event_class: mirror_promotion_admitted
    actor_class: mirror_operator
    reason_class: mirror_continuity_recertified
    effect_on_trust_badge_class: trust_badge_unchanged
    effect_on_anti_abuse_state_class: anti_abuse_state_unchanged
    installed_package_notification_disposition_class: notify_only_no_action_required
    parity_overall_state_class: parity_held_with_capped_inheritance

