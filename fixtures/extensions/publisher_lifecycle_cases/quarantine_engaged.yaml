# Publisher-lifecycle case: publisher-quarantine-engaged event with
# install-disabled fan-out across discovery, installed rows, and
# support/export.
#
# Companion to docs/extensions/publisher_lifecycle_and_registry_parity_contract.md,
# schemas/extensions/publisher_lifecycle_event.schema.json, and
# schemas/extensions/registry_parity.schema.json. Validates against
# publisher_lifecycle_event_record (first document),
# installed_package_lifecycle_notification_record (second document),
# and registry_parity_assertion_record (third document).
#
# Exercises: publisher_quarantine_engaged event from the automated
# anti-abuse detector, trust badge forced to
# trust_badge_forced_quarantined_cannot_inherit on every installed
# copy, anti-abuse register row engaged, installed-row notification
# disposition notify_with_install_disabled_pending_review with typed
# denial reason publisher_quarantine_engaged, and a public-registry
# parity assertion resolving parity_held_full_vocabulary_match.

# yaml-language-server: $schema=../../../schemas/extensions/publisher_lifecycle_event.schema.json
__fixture__:
  name: quarantine_engaged
  scenario: >
    The automated anti-abuse detector observes a signing-key
    compromise on the publisher 'rogue-namespace' and engages
    publisher_quarantine_engaged with reason signing_key_compromised.
    The trust badge on every installed copy is forced to
    quarantined_cannot_inherit; the publisher_namespace_recently_quarantined_blocking
    anti-abuse register row is engaged; discovery removes affected
    rows from ranking and renders them in detail-only review;
    installed copies receive a notify_with_install_disabled_pending_review
    notification with open_install_review_sheet, consult_workspace_admin,
    and open_publisher_continuity_packet repair affordances. The
    public-registry parity record resolves
    parity_held_full_vocabulary_match.
  contract_section: >
    Publisher transfer or revocation changes trust state visibly
    across discovery, installed rows, and support/export fixtures.
  exercised_classes:
    record_kinds:
      - publisher_lifecycle_event_record
      - installed_package_lifecycle_notification_record
      - registry_parity_assertion_record
    lifecycle_event_class: publisher_quarantine_engaged
    actor_class: automated_anti_abuse_detector
    reason_class: signing_key_compromised
    effect_on_trust_badge_class: trust_badge_forced_quarantined_cannot_inherit
    effect_on_anti_abuse_state_class: anti_abuse_state_engaged
    installed_package_notification_disposition_class: notify_with_install_disabled_pending_review
    parity_overall_state_class: parity_held_full_vocabulary_match

