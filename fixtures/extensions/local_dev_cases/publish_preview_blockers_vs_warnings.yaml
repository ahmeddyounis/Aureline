# Local dev case: publish preview separates blockers vs warnings.
#
# Companion to docs/extensions/local_dev_and_sideload_contract.md and
# schemas/extensions/publish_preview.schema.json.

# yaml-language-server: $schema=../../../schemas/extensions/publish_preview.schema.json
__fixture__:
  name: publish_preview_blockers_vs_warnings
  scenario: >
    The author prepares to publish an extension. Publish preview shows
    a compact manifest diff, planned release channel, signing identity,
    and the outbound destination descriptor. One schema-validation issue
    blocks publication; docs completeness is a warning.
  seed_section: Publish preview; Blockers vs warnings; Outbound destination
  exercised_classes:
    record_kind: publish_preview_sheet_record
    release_channel_class: preview

publish_preview_schema_version: 1
record_kind: publish_preview_sheet_record
preview_id: publish-preview-acme-labs-syntax-lens-0-2-0
extension_identity: acme-labs/syntax-lens
host_contract_family: wasm_component_model
hot_reload_state: rebuild_required
current_version: 0.1.1
proposed_version: 0.2.0
release_channel_class: preview
signing_identity_ref: sign-id-acme-labs-dev-key-2026-q2
publisher_namespace: acme-labs
manifest_diff:
  - field_path: /permissions
    change_class: modified
    prior_summary: Declared filesystem_read only.
    next_summary: Declares filesystem_read plus network_egress to one host.
  - field_path: /contributions/commands
    change_class: added
    prior_summary: No commands contributed.
    next_summary: Adds two commands (lens.toggle, lens.refresh).
docs_status_class: partial
template_status_class: missing
conformance_status_class: not_run
sample_completeness_class: partial
outbound_destination:
  publish_target_class: public_registry
  destination_descriptor_ref: dest-ext-publish-public-registry-primary
release_blockers:
  - finding_class: manifest_schema_invalid
    check_origin_class: schema_validation
    summary: Manifest fails schema validation (missing required activation events block).
    evidence_refs:
      - schema-err-ext-manifest-2026-04-29-0001
  - finding_class: conformance_not_run
    check_origin_class: conformance_kit
    summary: No conformance run is attached for the proposed publish.
    evidence_refs:
      - conf-missing-acme-labs-syntax-lens-0-2-0
warnings:
  - finding_class: docs_pack_missing
    check_origin_class: docs_completeness
    summary: Docs pack is partial; publish allowed only after acknowledging missing docs coverage.
    evidence_refs:
      - docs-pack-status-acme-labs-syntax-lens-0-2-0
prepared_at: "2026-04-29T15:50:00Z"

