# yaml-language-server: $schema=../../../schemas/extensions/effective_permission_review.schema.json
__fixture__:
  name: policy_narrowed_permissions
  scenario: >
    Extension update review where an admin policy pack narrows a declared
    filesystem_write scope to step-up approval and denies a declared
    shell_execute scope. The review sheet renders the typed diff and the
    narrowing refs without custom prose; the scope diff separates package
    target changes from workspace lockfile impact and policy narrowing.

