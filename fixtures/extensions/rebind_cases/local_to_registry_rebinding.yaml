__fixture__:
  name: local_to_registry_rebinding
  scenario: >
    A local-only extension (unsigned, unverified) is offered a binding to
    a published identity from a public registry. The UI must require an
    explicit rebinding review before the install becomes registry-bound,
    and it must disclose namespace/signer/version/update-channel and the
    trust badge change.
  seed_section: Rebinding review (Bind published identity)
  exercised_classes:
    record_kind: rebind_review_sheet_record
    trigger: local_or_sideload_to_registry_binding

