__fixture__:
  name: build_failed_repro_export
  scenario: >
    Hot reload requires a rebuild, but the build fails. The product keeps
    the last loaded build active where possible and emits a repro export
    packet containing the loaded artifact digest, ABI, conformance state,
    active permissions, crash history, and log artifact summaries.
  seed_section: Repro export packets
  exercised_classes:
    record_kind: extension_repro_export_packet_record
    source_availability_state: build_failed

