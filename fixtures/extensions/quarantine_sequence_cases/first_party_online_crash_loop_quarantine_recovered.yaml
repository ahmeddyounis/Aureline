schema_version: 1
record_kind: extension_lifecycle_sequence_case_record
case_id: extension.lifecycle_sequence.first_party.online.crash_loop_quarantine_recovered
case_class: first_party_online_crash_loop_quarantine_recovered
scenario_summary: >
  A first-party extension activates normally, then enters a crash loop that
  exhausts the bounded restart budget and trips runtime quarantine. The crash-loop
  surface enters safe mode, preserves evidence, and the user/admin clears the
  quarantine after a patched extension build is available. The extension is
  re-enabled via a queued recovery replay and returns to active.

