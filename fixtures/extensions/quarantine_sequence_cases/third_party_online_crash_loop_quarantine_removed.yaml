case_id: extension.lifecycle_sequence.third_party.online.crash_loop_quarantine_removed
case_class: third_party_online_crash_loop_quarantine_removed
scenario_summary: >
  A third-party extension is installed from the public registry, activates, and
  then crashes repeatedly inside the crash-loop window. The runtime quarantine
  trigger fires, the crash-loop surface enters safe mode, and the user runs an
  extension bisect pass to attribute the regression. The user then removes the
  offending extension; evidence remains available for support export.

