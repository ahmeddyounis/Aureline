case_class: third_party_online_runtime_budget_degraded_then_recovered
scenario_summary: >
  A third-party extension is installed from the public registry and activates,
  but sustained budget pressure and restart activity projects a visible degraded
  posture. After the pressure window clears and the next activation stays within
  the declared thresholds, the extension returns to active without quarantine.

