record_kind: extension_lifecycle_sequence_case_record
case_id: extension.lifecycle_sequence.third_party.offline_bundle.crash_loop_quarantine_removed
case_class: third_party_offline_bundle_crash_loop_quarantine_removed
scenario_summary: >
  An extension is restored from an offline bundle in an air-gapped profile. The
  extension later enters a crash loop and is quarantined. The user reopens with
  the extension isolated (without widening trust or contacting external
  registries), confirms removal, and captures a support bundle that preserves the
  offline-bundle provenance and the quarantine trigger evidence.

