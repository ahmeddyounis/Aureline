__fixture__:
  name: viewer_fallback_unsent_work
  scenario: >
    A participant loses edit admission after a policy narrowing. The
    session moves to a participant-degraded topology, future shared
    writes stop, and unsent local edits are preserved in the pending
    outbound proposal queue and local journal for diff/export recovery.
  exercised_contract_sections:
    - "Participant role and share-scope topology"
    - "Unsent local work preservation"
    - "Reconciliation pending review"

records:
  - record_kind: collab_presence_plane_record
    session_topology_schema_version: 1
    presence_plane_id: "collab:presence:viewer-fallback:01"
    session_ref: "collab:session:viewer-fallback:01"
    storage_boundary_class: presence_plane_ephemeral
    presence_state_class: active
    presence_signal_classes:
      - online_status
      - cursor_position
      - selection_range
      - active_pane
    follow_presenter_state_class: follow_paused_local_view
    replay_queue_policy_class: drop_ephemeral_presence_without_replay
    sample_ttl_seconds: 20
    retention_posture_class: not_retained_ephemeral
    summary_label: "Presence remains active, but the downgraded participant's local view is independent."
    minted_at: "2026-04-26T18:10:00Z"
    expires_at: "2026-04-26T18:10:20Z"

  - record_kind: collab_offline_continuation_record
    session_topology_schema_version: 1
    offline_continuation_id: "collab:offline:viewer-fallback:01"
    session_ref: "collab:session:viewer-fallback:01"
    downgrade_state_class: viewer_fallback
    offline_continuation_state_class: reconciliation_pending_review
    local_work_preservation_state_class: preserved_in_pending_outbound_proposal_queue
    recovery_path_classes:
      - rejoin_same_session_viewer_only
      - recover_via_local_journal_diff_export
      - export_local_patch_for_review
    replay_queue_policy_class: queue_explicit_idempotent_proposal_only
    reconciliation_state_class: ready_for_review
    affected_actor_refs:
      - "actor:participant:viewer-fallback:01"
    affected_share_scope_refs:
      - "collab:scope:buffer-projection:viewer-fallback:participant"
    pending_proposal_queue_ref: "collab:proposal-queue:viewer-fallback:01"
    local_journal_ref: "workspace:journal:viewer-fallback:participant"
    policy_epoch_ref: "policy:epoch:viewer-fallback:narrowed"
    summary_label: "Participant is viewer-only; unsent proposals are preserved and require review before replay."
    minted_at: "2026-04-26T18:10:01Z"

  - record_kind: collab_compaction_snapshot_record
    session_topology_schema_version: 1
