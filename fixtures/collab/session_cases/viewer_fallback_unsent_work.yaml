      - "collab:proposal-queue:viewer-fallback:01"
      - "collab:snapshot:viewer-fallback:01"
    captured_export_evidence_refs: []
    presence_plane_ref: "collab:presence:viewer-fallback:01"
    compaction_snapshot_ref: "collab:snapshot:viewer-fallback:01"
    downgrade_state_class: viewer_fallback
    offline_continuation_state_class: reconciliation_pending_review
    reconciliation_state_class: ready_for_review
    retention_posture_class: local_workspace_retained
    redaction_profile_class: redacted_content_refs_only
    summary_label: "Viewer fallback preserves unsent local work and blocks compaction until reviewed."
    minted_at: "2026-04-26T18:10:03Z"
