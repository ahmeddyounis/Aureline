    session_ref: "collab:session:viewer-fallback:01"
    storage_boundary_class: shared_session_artifact
    compaction_state_class: compaction_blocked_unsent_work
    operation_window_policy_class: bounded_by_snapshot_epoch
    snapshot_cadence_class: manual_admin_or_owner_request
    tombstone_gc_class: gc_deferred_for_policy_hold
