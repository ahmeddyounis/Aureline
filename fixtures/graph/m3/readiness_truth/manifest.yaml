# Semantic graph readiness and exact-vs-imported fact label beta corpus.
# Each case binds one graph consumer surface (navigation, ai_context,
# review, support_export) to one claimed fact lane drawn from the closed
# beta vocabulary, the lane the underlying alpha graph fact cue packet
# actually observed, the alpha readiness state, the derived
# claim_alignment_state, a metadata-safe evidence_export projection,
# and a closed downgrade label drawn from the readiness-beta vocabulary.

schema_version: 1
manifest_id: search.graph_readiness.beta_cases.v1
status: protected
overview_page: docs/search/m3/graph_readiness_beta.md
crate_consumer: crates/aureline-graph/src/readiness/beta.rs
schema_ref: schemas/search/graph_readiness_beta.schema.json
report_ref: artifacts/support/m3/graph_readiness_beta_report.md

required_consumer_surfaces:
  - navigation
  - ai_context
  - review
  - support_export

required_fact_lanes:
  - exact_local_graph_fact
  - imported_graph_fact
  - inferred_graph_fact
  - partial_graph_fact
  - stale_graph_fact
  - waiting_on_graph_provider
  - out_of_scope_graph_fact
  - fallback_search_fact

case_files:
  - navigation_exact_local_aligned_case.yaml
  - review_imported_aligned_case.yaml
  - ai_context_inferred_weaker_claim_case.yaml
  - support_export_stale_aligned_case.yaml
  - ai_context_partial_weaker_claim_case.yaml
  - navigation_waiting_weaker_claim_case.yaml
  - navigation_out_of_scope_blocked_case.yaml
  - ai_context_fallback_only_case.yaml
  - navigation_exact_overclaim_blocked_case.yaml

required_case_assertions:
  - every_required_consumer_surface_has_at_least_one_case
  - every_required_fact_lane_appears_as_observed_envelope_lane_in_at_least_one_case
  - at_least_one_case_declares_claim_alignment_state_overclaim_blocked
  - aligned_cases_declare_downgrade_label_none_and_no_open_gaps
  - non_aligned_cases_declare_a_closed_downgrade_label_and_at_least_one_open_gap
  - overclaim_blocked_cases_pin_downgrade_label_red_blocks_beta_row
  - evidence_export_preserves_fact_lane_label_readiness_token_and_consumer_surface_label
  - safety_baseline_excludes_raw_private_material_and_ambient_authority
  - downgrade_label_is_drawn_from_the_closed_readiness_beta_vocabulary
  - open_gaps_are_drawn_from_the_closed_open_gap_class_vocabulary

source_contract_refs:
  schema: schemas/search/graph_readiness_beta.schema.json
  reviewer_doc: docs/search/m3/graph_readiness_beta.md
  baseline_report: artifacts/support/m3/graph_readiness_beta_report.md
  alpha_module: crates/aureline-graph/src/readiness/mod.rs
