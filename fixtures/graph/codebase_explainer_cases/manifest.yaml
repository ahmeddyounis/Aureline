schema_version: 1
manifest_id: aureline.graph.codebase_explainer_cases
contract_doc_ref: docs/graph/codebase_explainer_contract.md
codebase_explainer_packet_schema_ref: schemas/graph/codebase_explainer_packet.schema.json
workspace_graph_seed_ref: schemas/graph/workspace_graph_seed.schema.json
provenance_stamp_schema_ref: schemas/graph/provenance_stamp.schema.json
confidence_rollup_schema_ref: schemas/graph/confidence_rollup.schema.json
topology_map_view_schema_ref: schemas/graph/topology_map_view.schema.json
impact_reason_schema_ref: schemas/graph/impact_reason.schema.json

cases:
  - case_id: graph.codebase_explainer_case.direct_graph_evidence_explainer
    file: direct_graph_evidence_explainer.yaml
    schema: schemas/graph/codebase_explainer_packet.schema.json
    exercises:
      codebase_explainer_packet:
        - claim_disposition.cited_direct_evidence
        - rolled_up_confidence.high
        - floor_reason.no_floor_applied
        - conflict_state.no_conflict
        - citation_count.eq_two
        - citation_classes.includes_symbol_definition
        - citation_classes.includes_file_range
        - omission_ledger_count.zero
        - loaded_scope_state.fully_loaded
        - hidden_counts_all_zero
        - minimum_action_set_present
  - case_id: graph.codebase_explainer_case.partial_imported_evidence_explainer
    file: partial_imported_evidence_explainer.yaml
    schema: schemas/graph/codebase_explainer_packet.schema.json
    exercises:
      codebase_explainer_packet:
        - claim_disposition.cited_partial_imported
        - rolled_up_confidence.medium
        - floor_reason.imported_unverified_caps_at_medium
        - conflict_state.no_conflict
        - imported_root_status_on_at_least_one_citation.imported_signed_upstream_bundle
        - omission_ledger_count.one
        - omission_class.imported_root_unverified
        - loaded_scope_state.imported_root_only_loaded
        - imported_root_count.eq_one
        - preserves_imported_root_chip_set_true_on_at_least_one_export
        - preserves_anchor_drift_chip_set_true_on_at_least_one_export
        - export_preservation_required_on_omission
  - case_id: graph.codebase_explainer_case.downgraded_refusal_insufficient_evidence_explainer
    file: downgraded_refusal_insufficient_evidence_explainer.yaml
    schema: schemas/graph/codebase_explainer_packet.schema.json
    exercises:
      codebase_explainer_packet:
        - claim_disposition.downgraded_refusal_insufficient_evidence
        - rolled_up_confidence.low
        - floor_reason.missing_anchor_pulls_to_low
        - conflict_state.no_conflict
        - citation_count.zero
        - omission_ledger_count.eq_two
        - omission_class.includes_downgraded_refusal_insufficient_evidence
        - omission_class.includes_evidence_missing_anchor_deleted
        - export_preservation_required_on_refusal
        - loaded_scope_state.evidence_missing_loaded
        - evidence_missing_count.eq_one
        - preserves_omission_ledger_set_true_on_at_least_one_export
        - downgraded_refusal_count.eq_one
        - omission_ledger_entry_ref_present
