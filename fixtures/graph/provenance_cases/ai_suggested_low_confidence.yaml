# Multi-document YAML fixture for the AI-suggested-low-confidence provenance case.
# Each document carries a record_kind that resolves to one of:
#   schemas/graph/provenance_stamp.schema.json
#   schemas/graph/confidence_rollup.schema.json
__fixture__:
  name: ai_suggested_low_confidence
  scenario: >
    An AI inference pass suggested a references_symbol edge between two
    helpers in the editor_core crate; a non-AI heuristic
    cross-reference walker found a corroborating import path. The
    primary stamp records source_class ai_inference,
    extraction_or_inference_mode suggested_by_ai_inference, freshness
    authoritative, and an anchor with drift_state
    anchor_present_no_drift. The rollup carries two contributors:
    ai_inference at low (the AI scored its own suggestion as low) and
    cross_reference_walker at medium. Two floors fire — the
    low-contributor floor pulls to low, and the
    ai_inference and inferred_relation caps fire at medium. The
    most-restrictive floor wins and the rolled-up level is low under
    floor_reason low_contributor_pulls_to_low.
  doc_section: §5.4 AI-suggested relation with low confidence
  exercises:
    extraction_or_inference_mode: suggested_by_ai_inference
    imported_root_status: not_imported
    anchor_validity_state: anchor_present_resolves
    source_anchor_drift_state: anchor_present_no_drift
    rolled_up_level: low
    floor_reason: low_contributor_pulls_to_low
    conflict_state: no_conflict
    ai_inference_contributor_present: true
