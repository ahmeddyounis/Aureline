# Multi-document YAML fixture for the stale-build-graph-evidence provenance case.
# Each document carries a record_kind that resolves to one of:
#   schemas/graph/provenance_stamp.schema.json
#   schemas/graph/confidence_rollup.schema.json
__fixture__:
  name: stale_build_graph_evidence
  scenario: >
    A depends_on edge between two crates was last refreshed by a build
    toolchain run that is no longer authoritative; the upstream input
    changed and the source-of-truth manifest moved through a rename
    that resolves through ADR-0006 alias_set. Stamp records freshness
    stale, stale_reason upstream_input_stale, and one anchor with
    drift_state anchor_moved_resolves_via_alias. Rollup carries two
    contributors (build_toolchain at medium, package_resolver at low),
    edge evidence_state stale_relation pulls the rollup to low under
    the stale-relation floor, and the conflict_state records the
    direct/stale split.
  doc_section: §5.3 Stale build-graph evidence
  exercises:
    extraction_or_inference_mode: parsed_from_structured_source
    imported_root_status: not_imported
    anchor_validity_state: anchor_resolves_with_drift
    source_anchor_drift_state: anchor_moved_resolves_via_alias
    rolled_up_level: low
    floor_reason: stale_relation_pulls_to_low
    conflict_state: evidence_state_split_direct_and_stale
---
