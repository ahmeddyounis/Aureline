stale_reason: upstream_input_stale
imported_root_status: not_imported
anchor_drift_observations:
  - anchor_kind: filesystem_identity
    anchor_ref: fs:vol:1:file:5050:gen:4
    anchor_validity_state: anchor_resolves_with_drift
    drift_state: anchor_moved_resolves_via_alias
    last_known_ref: fs:vol:1:file:5050:gen:3
    resolved_ref: fs:vol:1:file:5051:gen:1
    line_range: null
    drift_note: Source manifest moved during a workspace reorganisation; the anchor still resolves through ADR-0006 alias_set onto fs:vol:1:file:5051:gen:1.
supporting_artifact_refs:
  - artifact_class: build_toolchain_run_record
