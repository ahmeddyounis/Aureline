schema_version: 1
manifest_id: aureline.graph.provenance_cases
contract_doc_ref: docs/graph/provenance_and_confidence_contract.md
provenance_stamp_schema_ref: schemas/graph/provenance_stamp.schema.json
confidence_rollup_schema_ref: schemas/graph/confidence_rollup.schema.json
workspace_graph_seed_ref: schemas/graph/workspace_graph_seed.schema.json

cases:
  - case_id: graph.provenance_case.direct_code_evidence
    file: direct_code_evidence.yaml
    exercises:
      provenance_stamp:
        - source_class.symbol_resolver
        - extraction_or_inference_mode.observed_direct_extraction
        - freshness.authoritative
        - imported_root_status.not_imported
        - anchor_validity_state.anchor_present_resolves
        - source_anchor_drift_state.anchor_present_no_drift
      confidence_rollup:
        - rolled_up_level.high
        - floor_reason.no_floor_applied
        - conflict_state.no_conflict
  - case_id: graph.provenance_case.imported_schema_evidence
    file: imported_schema_evidence.yaml
    exercises:
      provenance_stamp:
        - source_class.imported_bundle
        - extraction_or_inference_mode.hydrated_from_imported_bundle
        - freshness.imported
        - stale_reason.imported_from_external
        - imported_root_status.imported_signed_upstream_bundle
        - anchor_validity_state.anchor_resolves_with_drift
        - source_anchor_drift_state.anchor_imported_unverified
      confidence_rollup:
        - rolled_up_level.medium
        - floor_reason.imported_unverified_caps_at_medium
        - conflict_state.no_conflict
  - case_id: graph.provenance_case.stale_build_graph_evidence
    file: stale_build_graph_evidence.yaml
    exercises:
      provenance_stamp:
        - source_class.build_toolchain
        - extraction_or_inference_mode.parsed_from_structured_source
        - freshness.stale
        - stale_reason.upstream_input_stale
        - imported_root_status.not_imported
        - anchor_validity_state.anchor_resolves_with_drift
        - source_anchor_drift_state.anchor_moved_resolves_via_alias
      confidence_rollup:
        - rolled_up_level.low
        - floor_reason.stale_relation_pulls_to_low
        - conflict_state.evidence_state_split_direct_and_stale
  - case_id: graph.provenance_case.ai_suggested_low_confidence
    file: ai_suggested_low_confidence.yaml
    exercises:
      provenance_stamp:
        - source_class.ai_inference
        - extraction_or_inference_mode.suggested_by_ai_inference
        - freshness.authoritative
        - imported_root_status.not_imported
        - anchor_validity_state.anchor_present_resolves
        - source_anchor_drift_state.anchor_present_no_drift
      confidence_rollup:
        - rolled_up_level.low
        - floor_reason.low_contributor_pulls_to_low
        - conflict_state.no_conflict
        - ai_inference_contributor_present
  - case_id: graph.provenance_case.missing_anchor_degradation
    file: missing_anchor_degradation.yaml
    exercises:
      provenance_stamp:
        - source_class.symbol_resolver
        - extraction_or_inference_mode.observed_direct_extraction
        - freshness.stale
        - stale_reason.upstream_input_stale
        - imported_root_status.not_imported
        - anchor_validity_state.anchor_unresolvable
        - source_anchor_drift_state.anchor_deleted_no_replacement
      confidence_rollup:
        - rolled_up_level.low
        - floor_reason.missing_anchor_pulls_to_low
        - conflict_state.no_conflict
      source_anchor_drift_record:
        - audit_event_id.graph_anchor_deleted
