# Single-document YAML proof case for the sparse-workset impact proof.
# Quotes the sparse-workset runtime-domain topology view, the
# editor_core named-workset switcher row / banner, and a synthetic
# explainer packet that cites the workset-narrowed evidence and
# carries the hidden-by-workset and hidden-by-policy axes as typed
# omissions.
__fixture__:
  name: sparse_workset_impact_proof
  scenario: >
    Sparse runtime-domain map under a named workset narrowing to one
    service plus its kernel. Eight other services are workset-
    hidden, two are policy-hidden. The proof case asserts that
    topology, impact, explainer, and scope banner all carry
    loaded_scope_state policy_limited_loaded, the same
    hidden_by_workset_count (8) and hidden_by_policy_count (2),
    imported_root_count zero, anchor_drift_state
    anchor_present_no_drift, and rolled_up_confidence medium for the
    policy-overlay subjects. The scope banner names the active
    named workset and renders hidden_member_list_visible false.
  doc_section: §What this seed freezes — sparse-workset impact
