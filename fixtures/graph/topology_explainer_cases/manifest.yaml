schema_version: 1
manifest_id: aureline.graph.topology_explainer_cases
contract_doc_ref: docs/verification/graph_topology_explainer_packet.md
record_kind: graph_topology_explainer_proof_case_record
record_kind_note: >
  Each proof case quotes one canonical topology-map view, one
  impact-explorer view (where applicable), one cited codebase
  explainer packet, one scope banner, and (where applicable) one
  cross-repo result group by id, then projects the surface-agreement
  field set the verification packet pins. Proof cases are
  cross-surface assertions; they do not redefine the canonical
  record shapes.
upstream_schema_refs:
  - schemas/graph/topology_map_view.schema.json
  - schemas/graph/impact_reason.schema.json
  - schemas/graph/codebase_explainer_packet.schema.json
  - schemas/graph/provenance_stamp.schema.json
  - schemas/graph/confidence_rollup.schema.json
  - schemas/workspace/workset_switcher.schema.json
  - schemas/workspace/cross_repo_result_group.schema.json
imported_root_drift_audit_ref: artifacts/graph/imported_root_drift_audit.yaml

cases:
  - case_id: graph.topology_explainer_proof.full_workspace_topology
    file: full_workspace_topology_proof.yaml
    exercises:
      proof_case:
        - loaded_scope_state.fully_loaded
        - hidden_counts_all_zero
        - imported_root_count.eq_zero
        - anchor_drift_state.anchor_present_no_drift
        - rolled_up_confidence.high
        - claim_disposition.cited_direct_evidence
        - omission_ledger_count.zero
        - cross_surface_invariant.topology_and_explainer_loaded_scope_state_match
        - cross_surface_invariant.hidden_counts_match_across_topology_and_explainer
  - case_id: graph.topology_explainer_proof.sparse_workset_impact
    file: sparse_workset_impact_proof.yaml
    exercises:
      proof_case:
        - loaded_scope_state.policy_limited_loaded
        - hidden_by_workset_count.gt_zero
        - hidden_by_policy_count.gt_zero
        - imported_root_count.eq_zero
        - anchor_drift_state.anchor_present_no_drift
        - rolled_up_confidence.medium
        - claim_disposition.cited_direct_evidence
        - omission_class.hidden_by_workset
        - omission_class.hidden_by_policy
        - cross_surface_invariant.scope_banner_workset_id_matches_topology_active_scope_ref
        - cross_surface_invariant.hidden_member_list_visible_false_under_policy_limited
  - case_id: graph.topology_explainer_proof.imported_root_cited_explainer
    file: imported_root_cited_explainer_proof.yaml
    exercises:
      proof_case:
        - loaded_scope_state.imported_root_only_loaded
        - imported_root_count.eq_one
        - imported_root_status.imported_signed_upstream_bundle
        - anchor_drift_state.anchor_imported_unverified
        - rolled_up_confidence.medium
        - floor_reason.imported_unverified_caps_at_medium
        - claim_disposition.cited_partial_imported
        - omission_class.imported_root_unverified
        - cross_surface_invariant.imported_root_status_matches_across_topology_impact_and_explainer
        - cross_surface_invariant.cross_repo_result_group_carries_imported_root_marker
        - cross_surface_invariant.review_pack_export_preserves_imported_root_chip
  - case_id: graph.topology_explainer_proof.insufficient_evidence_downgrade
    file: insufficient_evidence_downgrade_proof.yaml
    exercises:
      proof_case:
        - loaded_scope_state.evidence_missing_loaded
        - evidence_missing_count.gt_zero
        - anchor_drift_state.anchor_deleted_no_replacement
        - rolled_up_confidence.low
        - floor_reason.missing_anchor_pulls_to_low
        - claim_disposition.downgraded_refusal_insufficient_evidence
        - citation_count.zero
        - omission_class.downgraded_refusal_insufficient_evidence
        - omission_class.evidence_missing_anchor_deleted
        - cross_surface_invariant.refusal_carries_zero_citations
        - cross_surface_invariant.review_pack_export_preserves_omission_ledger
        - cross_surface_invariant.search_surface_renders_evidence_missing_row_state
