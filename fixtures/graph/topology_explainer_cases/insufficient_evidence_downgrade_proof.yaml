    The legacy_helper symbol's source anchor was deleted with no
    replacement; the only candidate impact row inherited the
    missing-anchor floor. The proof case asserts that every
    surface (topology / ownership card / impact / explainer / scope
    banner / search) carries loaded_scope_state
    evidence_missing_loaded, evidence_missing_count >= 1,
    anchor_drift_state anchor_deleted_no_replacement,
