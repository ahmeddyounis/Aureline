__fixture__:
  name: imported_root_cited_explainer_proof
  scenario: >
    An imported signed upstream bundle (vendor:acme:1.3.0) is the
    only contributor to an impact-explorer row and a cited
    explainer over the owned_by edge into the Platform team. The
    proof case asserts that topology, impact, explainer, ownership
    card, scope banner, and cross-repo result group all carry
    loaded_scope_state imported_root_only_loaded,
    imported_root_count >= 1, imported_root_status
    imported_signed_upstream_bundle, anchor_drift_state
    anchor_imported_unverified, rolled_up_confidence medium under
    floor_reason imported_unverified_caps_at_medium, claim
    disposition cited_partial_imported, and an omission ledger
    entry of class imported_root_unverified preserved on every
    lossless export.
  doc_section: §What this seed freezes — imported-root cited explainer
