schema_version: 1
manifest_id: aureline.graph.topology_impact_cases
contract_doc_ref: docs/graph/topology_and_impact_contract.md
topology_map_view_schema_ref: schemas/graph/topology_map_view.schema.json
impact_reason_schema_ref: schemas/graph/impact_reason.schema.json
workspace_graph_seed_ref: schemas/graph/workspace_graph_seed.schema.json
provenance_stamp_schema_ref: schemas/graph/provenance_stamp.schema.json
confidence_rollup_schema_ref: schemas/graph/confidence_rollup.schema.json

cases:
  - case_id: graph.topology_impact_case.full_workset_architecture_topology
    file: full_workset_architecture_topology.yaml
    schema: schemas/graph/topology_map_view.schema.json
    exercises:
      topology_map_view:
        - topology_family_class.architecture_domain_topology
        - presentation_mode.map_canvas
        - loaded_scope_state.fully_loaded
        - hidden_counts_all_zero
        - every_freshness_class_authoritative
        - every_rolled_up_confidence_high
        - every_anchor_drift_state_no_drift
  - case_id: graph.topology_impact_case.sparse_workset_runtime_topology_with_hidden_nodes
    file: sparse_workset_runtime_topology_with_hidden_nodes.yaml
    schema: schemas/graph/topology_map_view.schema.json
    exercises:
      topology_map_view:
        - topology_family_class.runtime_domain_topology
        - presentation_mode.map_canvas
        - loaded_scope_state.policy_limited_loaded
        - hidden_by_workset_count.gt_zero
        - hidden_by_policy_count.gt_zero
        - legend_section_class.policy_overlay_legend
        - filter_class.policy_overlay_filter
        - confidence_legend_includes_medium
  - case_id: graph.topology_impact_case.imported_root_impact_result
    file: imported_root_impact_result.yaml
    schema: schemas/graph/impact_reason.schema.json
    exercises:
      impact_explorer_view:
        - loaded_scope_state.imported_root_only_loaded
        - imported_root_count.eq_one
      impact_explorer_row:
        - reason_class.imported_bundle_rollover
        - rolled_up_confidence.medium
        - floor_reason.imported_unverified_caps_at_medium
        - conflict_state.no_conflict
        - imported_root_status.imported_signed_upstream_bundle
        - anchor_drift_state.anchor_imported_unverified
        - anchor_drift_record_ref_present
        - preserves_imported_root_chip_set_true_on_at_least_one_export
  - case_id: graph.topology_impact_case.partial_evidence_ownership_card
    file: partial_evidence_ownership_card.yaml
    schema: schemas/graph/topology_map_view.schema.json
    exercises:
      ownership_card:
        - topology_family_class.ownership_topology
        - loaded_scope_state.evidence_missing_loaded
        - sections_present_includes_missing_evidence_summary
        - missing_evidence_count.eq_three
        - identity_strip.freshness_class.stale
        - identity_strip.stale_reason.upstream_input_stale
        - covered_edge_strip.anchor_drift_state.anchor_deleted_no_replacement
        - hidden_count_summary.evidence_missing_count.eq_three
