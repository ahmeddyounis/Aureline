# Multi-document YAML fixture for the sparse-workset runtime topology
# with hidden nodes case. Each document carries a record_kind that resolves
# to schemas/graph/topology_map_view.schema.json.
__fixture__:
  name: sparse_workset_runtime_topology_with_hidden_nodes
  scenario: >
    A sparse-slice runtime-domain map under a named workset narrowing to one
    service plus its kernel. The workset hides eight other services
    (hidden_by_workset_count = 8) and a policy projection hides two more
    (hidden_by_policy_count = 2). The view declares loaded_scope_state
    policy_limited_loaded so the schema's allOf gate forces
    hidden_by_policy_known true and forces policy_overlay_legend onto
    legend_sections. The view never claims completeness and renders the
    policy-overlay filter engaged with the named workset id verbatim.
  doc_section: §5.2 Sparse-workset topology with hidden nodes
  exercises:
    topology_family_class: runtime_domain_topology
    presentation_mode: map_canvas
    loaded_scope_state: policy_limited_loaded
    legend_sections_present:
      - topology_family_legend
      - node_class_legend
      - edge_class_legend
      - freshness_legend
      - confidence_legend
      - policy_overlay_legend
    hidden_by_workset_count: 8
    hidden_by_policy_count: 2
    not_loaded_count: 0
    imported_root_count: 0
    policy_overlay_filter_engaged: true
---
