__fixture__:
  name: supported_recorded_session
  scenario: >
    A Linux x86_64 native debug session attached to a recorded rr-style
    capture. The supported runtime is record_replay_supported, the
    recording_state_class is recorded, the chronology_support_class on
    the linked capture session is deterministic_replay, and all four
    reverse-step controls are enabled with availability_reason_class =
