    current_frame_marker, breakpoint, and bookmark overlays. No
    chronology-mismatch banner is shown; recovery action is null.
  exercised_axes:
    runtime_class: native_linux_x86_64
    support_level_class: record_replay_supported
    recording_state_class: recorded
    scrubber_state_class: replay_active
    reverse_step_enabled_count: 4
    chronology_mismatch_state_class: null
  contract_sections:
    - "2. Recording-mode banner"
    - "3. Reverse-step control set"
    - "7. Fixture corpus"

