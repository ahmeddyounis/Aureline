# yaml-language-server: $schema=../../../schemas/debug/recording_mode.schema.json
__fixture__:
  name: expired_capture
  scenario: >
    A debug session reopened against a recording whose capture window's
    expiry_status passed expired. The supported runtime remains
    record_replay_supported but the recording_state_class on the banner
    is expired and the chronology-mismatch banner names recording_expired
    with recovery restart_with_recording. Every reverse-step control
    disables under availability_reason_class = recording_expired and the
    scrubber renders disabled_recording_expired with the
    expired_segment_marker so the expired coverage is visible. Snapshot
    frame rows that point inside the expired recording carry posture_class
    = expired_frame_inadmissible so the rows do not silently disappear.
  exercised_axes:
    runtime_class: native_linux_x86_64
    support_level_class: record_replay_supported
    recording_state_class: expired
    scrubber_state_class: disabled_recording_expired
    reverse_step_disabled_count: 4
    chronology_mismatch_state_class: recording_expired
  contract_sections:
    - "2.3 Recording state"
    - "2.7 Chronology-mismatch state"
    - "3.4 Reverse-step controls"

banner:
  recording_mode_banner_schema_version: 1
  record_kind: recording_mode_banner_record
  banner_id: banner:debug:chronology:expired:001
  debug_session_ref: debug-session:linux-x86-64-rr:expired:004
  capture_session_ref: capture:replay:linux-x86-64-rr:expired:004
  debug_artifact_manifest_ref: null
  supported_runtime:
    runtime_class: native_linux_x86_64
    support_level_class: record_replay_supported
    runtime_label: "Linux x86_64 (rr backend)"
    toolchain_label: "rustc 1.84.0 / lldb-17"
    support_level_note_ref: note:support-level:record-replay:linux-x86-64
  recording_state_class: expired
  recording_state_label: "Recording expired - recapture required"
  overhead_storage:
    overhead_class: not_measured
    storage_band_class: metadata_only
    overhead_note_ref: note:overhead:expired-metadata-only
    storage_note_ref: note:storage:expired-metadata-only
    raw_payload_size_bytes: null
  privacy_export_note:
    redaction_class_ref: redaction:debug:replay-local
    export_posture_class: local_only_no_export
    opt_in_required: false
    privacy_note_ref: note:privacy:expired-no-export
  banner_actions:
    - banner_action_class: start_recording
      action_state_class: enabled
      action_disable_reason_class: null
    - banner_action_class: stop_recording
      action_state_class: disabled_with_reason
      action_disable_reason_class: recording_already_stopped
    - banner_action_class: restart_with_recording
      action_state_class: enabled
      action_disable_reason_class: null
    - banner_action_class: open_capture_settings
      action_state_class: enabled
      action_disable_reason_class: null
    - banner_action_class: open_privacy_disclosure
      action_state_class: enabled
      action_disable_reason_class: null
    - banner_action_class: export_recording_bookmark
      action_state_class: disabled_with_reason
      action_disable_reason_class: recording_expired_recapture_required
    - banner_action_class: share_read_only_session
      action_state_class: disabled_with_reason
      action_disable_reason_class: recording_expired_recapture_required
    - banner_action_class: acknowledge_unavailable_reason
      action_state_class: enabled
      action_disable_reason_class: null
  chronology_mismatch_state_class: recording_expired
  chronology_mismatch_recovery_action_class: restart_with_recording
  summary: "Recording expired; restart with recording to rebuild the chronology."
  minted_at: "2026-04-30T15:07:00Z"

control_set:
  reverse_step_control_schema_version: 1
  record_kind: reverse_step_control_record
  control_set_id: ctrl:reverse-step:expired:001
  recording_mode_banner_ref: banner:debug:chronology:expired:001
  debug_session_ref: debug-session:linux-x86-64-rr:expired:004
  capture_session_ref: capture:replay:linux-x86-64-rr:expired:004
  timeline_scrubber:
    scrubber_state_class: disabled_recording_expired
    event_ordering_class: monotonic_single_host
    marker_classes:
      - breakpoint_marker
      - bookmark_marker
      - recording_start_marker
      - recording_stop_marker
      - expired_segment_marker
    current_frame_time_basis_class: monotonic_offset_from_recording_start
    current_frame_time_label: "Recording window expired"
    current_recording_note_ref: note:current-recording:expired
  snapshot_frame_rows:
    - snapshot_frame_id: snap:frame:expired:0001
      frame_time_label: "+00:00:00.000"
      frame_sequence_index: 0
      thread_or_process_label: "main thread (PID 9911)"
      frame_summary_note_ref: note:frame:expired-start
      mapping_quality_ref: mapping-quality:exact-build:linux-x86-64:expired:0001
      posture_class: expired_frame_inadmissible
    - snapshot_frame_id: snap:frame:expired:0002
      frame_time_label: "+00:00:25.000"
      frame_sequence_index: 1
      thread_or_process_label: "main thread (PID 9911)"
      frame_summary_note_ref: note:frame:expired-mid
      mapping_quality_ref: mapping-quality:exact-build:linux-x86-64:expired:0002
      posture_class: expired_frame_inadmissible
  reverse_step_controls:
    - control_kind_class: step_back_over
      control_state_class: disabled_with_reason
      availability_reason_class: recording_expired
      keyboard_shortcut_label: "Shift+F10"
      current_recording_note_ref: note:reverse-step:expired
    - control_kind_class: step_back_into
      control_state_class: disabled_with_reason
      availability_reason_class: recording_expired
      keyboard_shortcut_label: "Shift+F11"
      current_recording_note_ref: note:reverse-step:expired
    - control_kind_class: step_back_out
      control_state_class: disabled_with_reason
      availability_reason_class: recording_expired
      keyboard_shortcut_label: "Shift+F12"
      current_recording_note_ref: note:reverse-step:expired
    - control_kind_class: reverse_continue
      control_state_class: disabled_with_reason
      availability_reason_class: recording_expired
      keyboard_shortcut_label: "Shift+F5"
      current_recording_note_ref: note:reverse-continue:expired
  summary: "Reverse step disabled across an expired recording window."
  minted_at: "2026-04-30T15:07:00Z"
