# yaml-language-server: $schema=../../../schemas/debug/recording_mode.schema.json
__fixture__:
  name: partial_history_recording
  scenario: >
    A Linux x86_64 native debug session attached to a recording whose
    chronology is partial - the backend dropped a segment while the
    inferior held a non-determinism (a syscall the recorder could not
    snapshot). The capture session's chronology_support_class is
    partial_replay; recording_state_class on the banner remains recorded
    because a coverage region exists, but the chronology_mismatch_state_class
    is history_partial with recovery open_partial_history_only. The
    scrubber is disabled_partial_history and carries the
    partial_history_gap_marker so the gap is visible. The controls all
    disable with availability_reason_class = capture_mode_summary_only -
    summary playback is allowed but stepping is not - so the row stays
    explicit about what the partial recording can support.
  exercised_axes:
    runtime_class: native_linux_x86_64
    support_level_class: record_replay_supported
    recording_state_class: recorded
    scrubber_state_class: disabled_partial_history
    reverse_step_disabled_count: 4
    chronology_mismatch_state_class: history_partial
  contract_sections:
    - "2.7 Chronology-mismatch state"
    - "3.2 Timeline scrubber"
    - "5. Forbidden collapses"

banner:
  recording_mode_banner_schema_version: 1
  record_kind: recording_mode_banner_record
  banner_id: banner:debug:chronology:partial-history:001
  debug_session_ref: debug-session:linux-x86-64-rr:003
  capture_session_ref: capture:replay:linux-x86-64-rr:003
  debug_artifact_manifest_ref: null
  supported_runtime:
    runtime_class: native_linux_x86_64
    support_level_class: record_replay_supported
    runtime_label: "Linux x86_64 (rr backend)"
    toolchain_label: "rustc 1.84.0 / lldb-17"
    support_level_note_ref: note:support-level:record-replay:linux-x86-64
  recording_state_class: recorded
  recording_state_label: "Recorded - partial history"
  overhead_storage:
    overhead_class: moderate
    storage_band_class: small_under_10mb
    overhead_note_ref: note:overhead:rr-moderate
    storage_note_ref: note:storage:rr-small-partial
    raw_payload_size_bytes: 8388608
  privacy_export_note:
    redaction_class_ref: redaction:debug:replay-local
    export_posture_class: summary_export_safe
    opt_in_required: false
    privacy_note_ref: note:privacy:replay-summary-only
  banner_actions:
    - banner_action_class: start_recording
      action_state_class: disabled_with_reason
      action_disable_reason_class: recording_already_active
    - banner_action_class: stop_recording
      action_state_class: disabled_with_reason
      action_disable_reason_class: recording_already_stopped
    - banner_action_class: restart_with_recording
      action_state_class: enabled
      action_disable_reason_class: null
    - banner_action_class: open_capture_settings
      action_state_class: enabled
      action_disable_reason_class: null
    - banner_action_class: open_privacy_disclosure
      action_state_class: enabled
      action_disable_reason_class: null
    - banner_action_class: export_recording_bookmark
      action_state_class: enabled
      action_disable_reason_class: null
    - banner_action_class: share_read_only_session
      action_state_class: disabled_with_reason
      action_disable_reason_class: not_applicable
    - banner_action_class: acknowledge_unavailable_reason
      action_state_class: enabled
      action_disable_reason_class: null
  chronology_mismatch_state_class: history_partial
  chronology_mismatch_recovery_action_class: open_partial_history_only
  summary: "Partial chronology - reverse step disabled, summary playback only."
  minted_at: "2026-04-30T14:11:00Z"

control_set:
  reverse_step_control_schema_version: 1
  record_kind: reverse_step_control_record
  control_set_id: ctrl:reverse-step:partial-history:001
  recording_mode_banner_ref: banner:debug:chronology:partial-history:001
  debug_session_ref: debug-session:linux-x86-64-rr:003
  capture_session_ref: capture:replay:linux-x86-64-rr:003
  timeline_scrubber:
    scrubber_state_class: disabled_partial_history
    event_ordering_class: monotonic_single_host
    marker_classes:
      - breakpoint_marker
      - bookmark_marker
      - recording_start_marker
      - partial_history_gap_marker
      - current_frame_marker
    current_frame_time_basis_class: monotonic_offset_from_recording_start
    current_frame_time_label: "+00:00:42.100 (gap follows)"
    current_recording_note_ref: note:current-recording:partial-history
  snapshot_frame_rows:
    - snapshot_frame_id: snap:frame:partial:0001
      frame_time_label: "+00:00:00.000"
      frame_sequence_index: 0
      thread_or_process_label: "main thread (PID 8842)"
      frame_summary_note_ref: note:frame:partial-start
      mapping_quality_ref: mapping-quality:exact-build:linux-x86-64:partial:0001
      posture_class: recorded_frame_replay_view_only
    - snapshot_frame_id: snap:frame:partial:0002
      frame_time_label: "+00:00:42.100"
      frame_sequence_index: 1
      thread_or_process_label: "main thread (PID 8842)"
      frame_summary_note_ref: note:frame:partial-edge-of-coverage
      mapping_quality_ref: mapping-quality:exact-build:linux-x86-64:partial:0002
      posture_class: recorded_frame_replay_view_only
    - snapshot_frame_id: snap:frame:partial:0003
      frame_time_label: "+00:01:09.500"
      frame_sequence_index: 2
      thread_or_process_label: "main thread (PID 8842)"
      frame_summary_note_ref: note:frame:partial-outside-coverage
      mapping_quality_ref: mapping-quality:exact-build:linux-x86-64:partial:0003
      posture_class: partial_history_frame_outside_recording
  reverse_step_controls:
    - control_kind_class: step_back_over
      control_state_class: disabled_with_reason
      availability_reason_class: capture_mode_summary_only
      keyboard_shortcut_label: "Shift+F10"
      current_recording_note_ref: note:reverse-step:partial-history
    - control_kind_class: step_back_into
      control_state_class: disabled_with_reason
      availability_reason_class: capture_mode_summary_only
      keyboard_shortcut_label: "Shift+F11"
      current_recording_note_ref: note:reverse-step:partial-history
    - control_kind_class: step_back_out
      control_state_class: disabled_with_reason
      availability_reason_class: capture_mode_summary_only
      keyboard_shortcut_label: "Shift+F12"
      current_recording_note_ref: note:reverse-step:partial-history
    - control_kind_class: reverse_continue
      control_state_class: disabled_with_reason
      availability_reason_class: capture_mode_summary_only
      keyboard_shortcut_label: "Shift+F5"
      current_recording_note_ref: note:reverse-continue:partial-history
  summary: "Reverse step disabled across the partial-history gap; summary playback only."
  minted_at: "2026-04-30T14:11:00Z"
