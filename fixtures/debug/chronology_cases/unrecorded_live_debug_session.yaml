# yaml-language-server: $schema=../../../schemas/debug/recording_mode.schema.json
__fixture__:
  name: unrecorded_live_debug_session
  scenario: >
    A live debug session attached to a local process with no record/replay
    backend engaged. The supported runtime advertises
    record_replay_supported but the user has not started a recording yet,
    so recording_state_class = not_recording and capture_session_ref is
    null. The chronology-mismatch banner names recording_not_started with
    recovery start_new_recording. All four reverse-step controls remain
    rendered with control_state_class = disabled_with_reason and
    availability_reason_class = recording_not_started, so the controls
    disable instead of disappearing. The timeline scrubber is
    disabled_no_recording with current_frame_time_basis_class =
    not_applicable_no_recording.
  exercised_axes:
    runtime_class: native_macos_aarch64
    support_level_class: record_replay_supported
    recording_state_class: not_recording
    scrubber_state_class: disabled_no_recording
    reverse_step_disabled_count: 4
    chronology_mismatch_state_class: recording_not_started
  contract_sections:
    - "2. Recording-mode banner"
    - "3. Reverse-step control set"
    - "5. Forbidden collapses"

banner:
  recording_mode_banner_schema_version: 1
  record_kind: recording_mode_banner_record
  banner_id: banner:debug:chronology:unrecorded-live:001
  debug_session_ref: debug-session:macos-arm64-live:002
  capture_session_ref: null
  debug_artifact_manifest_ref: null
  supported_runtime:
    runtime_class: native_macos_aarch64
    support_level_class: record_replay_supported
    runtime_label: "macOS arm64 (lldb + replay-shim)"
    toolchain_label: "rustc 1.84.0 / lldb-17"
    support_level_note_ref: note:support-level:record-replay:macos-arm64
  recording_state_class: not_recording
  recording_state_label: "Not recording - live debug only"
  overhead_storage:
    overhead_class: not_measured
    storage_band_class: metadata_only
    overhead_note_ref: note:overhead:not-measured-no-recording
    storage_note_ref: note:storage:metadata-only-no-recording
    raw_payload_size_bytes: null
  privacy_export_note:
    redaction_class_ref: redaction:debug:live-only
    export_posture_class: summary_export_safe
    opt_in_required: false
    privacy_note_ref: note:privacy:live-debug-only
  banner_actions:
    - banner_action_class: start_recording
      action_state_class: enabled
      action_disable_reason_class: null
    - banner_action_class: stop_recording
      action_state_class: disabled_with_reason
      action_disable_reason_class: recording_already_stopped
    - banner_action_class: restart_with_recording
      action_state_class: enabled
      action_disable_reason_class: null
    - banner_action_class: open_capture_settings
      action_state_class: enabled
      action_disable_reason_class: null
    - banner_action_class: open_privacy_disclosure
      action_state_class: enabled
      action_disable_reason_class: null
    - banner_action_class: export_recording_bookmark
      action_state_class: disabled_with_reason
      action_disable_reason_class: not_applicable
    - banner_action_class: share_read_only_session
      action_state_class: disabled_with_reason
      action_disable_reason_class: not_applicable
    - banner_action_class: acknowledge_unavailable_reason
      action_state_class: enabled
      action_disable_reason_class: null
  chronology_mismatch_state_class: recording_not_started
  chronology_mismatch_recovery_action_class: start_new_recording
  summary: "Live-only session - no chronology until recording starts."
  minted_at: "2026-04-30T13:02:00Z"

control_set:
  reverse_step_control_schema_version: 1
  record_kind: reverse_step_control_record
  control_set_id: ctrl:reverse-step:unrecorded-live:001
  recording_mode_banner_ref: banner:debug:chronology:unrecorded-live:001
  debug_session_ref: debug-session:macos-arm64-live:002
  capture_session_ref: null
  timeline_scrubber:
    scrubber_state_class: disabled_no_recording
    event_ordering_class: unknown_ordering
    marker_classes:
      - breakpoint_marker
    current_frame_time_basis_class: not_applicable_no_recording
    current_frame_time_label: "Recording not started"
    current_recording_note_ref: null
  snapshot_frame_rows: []
  reverse_step_controls:
    - control_kind_class: step_back_over
      control_state_class: disabled_with_reason
      availability_reason_class: recording_not_started
      keyboard_shortcut_label: "Shift+F10"
      current_recording_note_ref: note:reverse-step:recording-not-started
    - control_kind_class: step_back_into
      control_state_class: disabled_with_reason
      availability_reason_class: recording_not_started
      keyboard_shortcut_label: "Shift+F11"
      current_recording_note_ref: note:reverse-step:recording-not-started
    - control_kind_class: step_back_out
      control_state_class: disabled_with_reason
      availability_reason_class: recording_not_started
      keyboard_shortcut_label: "Shift+F12"
      current_recording_note_ref: note:reverse-step:recording-not-started
    - control_kind_class: reverse_continue
      control_state_class: disabled_with_reason
      availability_reason_class: recording_not_started
      keyboard_shortcut_label: "Shift+F5"
      current_recording_note_ref: note:reverse-continue:recording-not-started
  summary: "Reverse-step controls remain visible but disabled - recording not started."
  minted_at: "2026-04-30T13:02:00Z"
