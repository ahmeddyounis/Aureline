# yaml-language-server: $schema=../../../schemas/debug/recording_mode.schema.json
__fixture__:
  name: artifact_mismatch_after_rebuild
  scenario: >
    A debug session reopened after a workspace rebuild produced a new
    binary whose module build_id no longer matches the recording's
    captured module identity. The recording_state_class on the banner
    flips to artifact_mismatch and the chronology-mismatch banner
    cites artifact_mismatch with recovery rebuild_then_recapture. The
    debug_artifact_manifest_ref resolves a manifest entry whose
    mismatch_reason_class is mismatch_module_build_id (drawn from the
    artifact-resolution seed), so the banner names *what* mismatched.
    Every reverse-step control disables under
    availability_reason_class = artifact_mismatch and the scrubber
    renders disabled_artifact_mismatch with the artifact_mismatch_marker.
    Snapshot frame rows that pre-date the rebuild carry posture_class =
    artifact_mismatch_frame_inadmissible so the rows remain visible
    with a typed inadmissible posture.
  exercised_axes:
    runtime_class: native_linux_x86_64
    support_level_class: record_replay_supported
    recording_state_class: artifact_mismatch
    scrubber_state_class: disabled_artifact_mismatch
    reverse_step_disabled_count: 4
    chronology_mismatch_state_class: artifact_mismatch
    artifact_mismatch_token: mismatch_module_build_id
  contract_sections:
    - "2.3 Recording state"
    - "2.7 Chronology-mismatch state"
    - "5. Forbidden collapses"

