schema_version: 1
record_kind: storage_cleanup_scenario_record
scenario_id: support.m3.storage_cleanup.user_requested_hot_and_knowledge_cleanup
title: User-requested cleanup of hot and knowledge caches
trigger_class: user_requested_cleanup
summary: >
  A user opens the storage inspector, selects the interactive hot cache
  and the knowledge cache, confirms the consequence sheet, and reclaims
  bytes while every protected class is skipped and named.

review:
  schema_version: 1
  record_kind: clear_data_review_record
  review_id: review.user_requested_hot_and_knowledge.v1
  presented_at: 2026-05-19T09:30:00Z
  actor_lineage_class: user_invoked_in_shell
  trigger_class: user_requested_cleanup
  selected_class_refs:
    - class_id: interactive_hot_cache
      bytes_in_scope: 268435456
      consequence_class: rebuilt_cheaply_on_demand
      consequence_summary: >
        Interactive hot cache rebuilds during the next interaction
        without network access.
      export_before_delete_class: not_applicable
    - class_id: knowledge_cache
      bytes_in_scope: 1610612736
      consequence_class: rebuilt_with_expensive_local_work
      consequence_summary: >
        Knowledge cache must reindex the active workspaces; expect a
        few minutes of background work before semantic search returns.
      export_before_delete_class: not_applicable
  workspace_scope_rows:
    - workspace_ref: workspace.local.aureline_core
      class_id: knowledge_cache
      bytes_in_scope: 1073741824
      summary: Aureline core workspace knowledge index will rebuild.
    - workspace_ref: workspace.local.aureline_extensions
      class_id: knowledge_cache
      bytes_in_scope: 536870912
      summary: Aureline extensions workspace knowledge index will rebuild.
  protected_class_rows:
    - class_id: evidence_support_cache
      protected_reason_class: evidence_class
      reason_summary: >
        Evidence and support cache is protected by default and excluded
        from ordinary cleanup.
    - class_id: user_owned_recovery_state
      protected_reason_class: user_owned_recovery_state
      reason_summary: >
        User-owned recovery state (local history, rollback checkpoints,
        dirty-buffer journals, offline entitlement bundles, pinned
        review artifacts, last-known-good policy bundles) is excluded
        by default.
  pin_block_rows: []
  consent_state: confirmed
  confirmed_by_ref: actor.local_user.ahmedyounis
  raw_content_exported: false
  redaction_class: metadata_safe_default
  schema_ref: schemas/support/clear_data_review.schema.json
  doc_ref: docs/support/m3/storage_cleanup_beta.md
  storage_class_registry_ref: schemas/support/storage_class.schema.json
  reviewer_summary: >
    User confirmed cleanup of interactive hot and knowledge caches;
    evidence and user-owned recovery state remained protected.

receipt:
  schema_version: 1
  record_kind: storage_cleanup_receipt_record
  receipt_id: receipt.user_requested_hot_and_knowledge.v1
  review_ref: review.user_requested_hot_and_knowledge.v1
  executed_at: 2026-05-19T09:31:14Z
  actor_lineage_class: user_invoked_in_shell
  trigger_class: user_requested_cleanup
  result_class: completed
  class_outcomes:
    - class_id: interactive_hot_cache
      bytes_reclaimed: 268435456
      rebuild_state_class: rebuild_on_demand_cheaply
      rebuild_summary: >
        Interactive hot cache will rebuild during the next interaction;
        no user-visible work is paused.
    - class_id: knowledge_cache
      bytes_reclaimed: 1610612736
      rebuild_state_class: rebuild_on_demand_expensive
      rebuild_summary: >
        Knowledge cache reindex queued for both workspaces; semantic
        search is degraded until the rebuild completes.
  blocked_pin_rows: []
  skipped_protected_class_rows:
    - class_id: evidence_support_cache
      protected_reason_class: evidence_class
      reason_summary: Evidence and support cache excluded from ordinary cleanup.
    - class_id: user_owned_recovery_state
      protected_reason_class: user_owned_recovery_state
      reason_summary: User-owned recovery state excluded from ordinary cleanup.
  reopen_inspector_action_ref: action.storage_inspector.reopen
  raw_content_exported: false
  redaction_class: metadata_safe_default
  schema_ref: schemas/support/storage_cleanup_receipt.schema.json
  doc_ref: docs/support/m3/storage_cleanup_beta.md
  registry_ref: schemas/support/storage_class.schema.json
  review_schema_ref: schemas/support/clear_data_review.schema.json
  reviewer_summary: >
    Cleanup reclaimed 1.75 GiB across hot and knowledge caches; evidence
    and user-owned recovery state remained intact.
