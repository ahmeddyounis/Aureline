schema_version: 1
record_kind: storage_cleanup_scenario_record
scenario_id: support.m3.storage_cleanup.pinned_artifact_blocks_cleanup
title: Pinned review artifact blocks artifact-cache cleanup
trigger_class: user_requested_cleanup
summary: >
  A user attempts to clear the artifact cache, but a pinned review
  artifact and a rollback checkpoint pin both block the deletion. The
  receipt records the blocked pins, the partially reclaimed bytes,
  and a reopen-inspector action.

review:
  schema_version: 1
  record_kind: clear_data_review_record
  review_id: review.pinned_artifact_blocks_cleanup.v1
  presented_at: 2026-05-19T12:00:00Z
  actor_lineage_class: user_invoked_in_shell
  trigger_class: user_requested_cleanup
  selected_class_refs:
    - class_id: artifact_cache
      bytes_in_scope: 2147483648
      consequence_class: rebuilt_requires_network
      consequence_summary: >
        Artifact cache will refetch from providers when the user needs
        the build again.
      export_before_delete_class: not_applicable
  workspace_scope_rows:
    - workspace_ref: workspace.local.aureline_core
      class_id: artifact_cache
      bytes_in_scope: 2147483648
      summary: Aureline core workspace artifact cache in scope.
  protected_class_rows:
    - class_id: evidence_support_cache
      protected_reason_class: evidence_class
      reason_summary: Evidence and support cache excluded by default.
    - class_id: user_owned_recovery_state
      protected_reason_class: user_owned_recovery_state
      reason_summary: >
        Local history, rollback checkpoints, dirty-buffer journals,
        offline entitlement bundles, and pinned review artifacts are
        protected by default.
  pin_block_rows:
    - pin_ref: pin.review_artifact.workspace_release_candidate
      class_id: artifact_cache
      pin_source_class: user_pin
      pin_summary: >
        A pinned review artifact for the workspace release candidate
        blocks deletion until the user unpins it.
    - pin_ref: pin.rollback_checkpoint.workspace_release_candidate
      class_id: user_owned_recovery_state
      pin_source_class: rollback_checkpoint_pin
      pin_summary: >
        A rollback checkpoint pin protects the matching workspace
        recovery state.
  consent_state: confirmed
  confirmed_by_ref: actor.local_user.ahmedyounis
  raw_content_exported: false
  redaction_class: metadata_safe_default
  schema_ref: schemas/support/clear_data_review.schema.json
  doc_ref: docs/support/m3/storage_cleanup_beta.md
  storage_class_registry_ref: schemas/support/storage_class.schema.json
  reviewer_summary: >
    User confirmed cleanup of artifact cache; pinned review artifact
    and rollback checkpoint pins blocked the matching rows.

