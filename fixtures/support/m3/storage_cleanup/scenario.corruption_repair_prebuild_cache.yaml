schema_version: 1
record_kind: storage_cleanup_scenario_record
scenario_id: support.m3.storage_cleanup.corruption_repair_prebuild_cache
title: Corruption repair clears prebuild cache without touching evidence
trigger_class: corruption_repair_request
summary: >
  Project Doctor flagged a stale-or-corrupt prebuild cache. The user
  confirms a class-selective clear that rebuilds the prebuild and
  artifact caches over the network while every protected class stays
  pinned, including the dirty-buffer journals and last-known-good
  policy bundle.

