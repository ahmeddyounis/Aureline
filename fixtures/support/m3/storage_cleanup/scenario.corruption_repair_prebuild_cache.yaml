  schema_version: 1
  record_kind: clear_data_review_record
  review_id: review.corruption_repair_prebuild_cache.v1
  presented_at: 2026-05-19T13:30:00Z
  actor_lineage_class: user_invoked_in_shell
  trigger_class: corruption_repair_request
  selected_class_refs:
    - class_id: prebuild_environment_cache
      bytes_in_scope: 3221225472
      consequence_class: rebuilt_requires_network
      consequence_summary: >
        Prebuild and environment cache will refetch toolchains and
        language runtimes from providers.
      export_before_delete_class: not_applicable
    - class_id: artifact_cache
      bytes_in_scope: 1610612736
      consequence_class: rebuilt_requires_network
      consequence_summary: Artifact cache will refetch on next request.
      export_before_delete_class: not_applicable
  workspace_scope_rows:
    - workspace_ref: workspace.machine.toolchains
      class_id: prebuild_environment_cache
      bytes_in_scope: 3221225472
      summary: Machine-local toolchain cache flagged stale or corrupt.
  protected_class_rows:
    - class_id: evidence_support_cache
      protected_reason_class: evidence_class
      reason_summary: Evidence and support cache stays pinned during repair.
    - class_id: user_owned_recovery_state
      protected_reason_class: dirty_buffer_journal
      reason_summary: >
        Dirty-buffer journals are excluded from repair so unsaved work
        and rollback checkpoints survive.
  pin_block_rows: []
  consent_state: confirmed
