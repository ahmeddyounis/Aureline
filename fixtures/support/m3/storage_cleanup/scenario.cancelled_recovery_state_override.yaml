schema_version: 1
record_kind: storage_cleanup_scenario_record
scenario_id: support.m3.storage_cleanup.cancelled_recovery_state_override
title: User-owned recovery state override is reviewed and cancelled
trigger_class: user_requested_cleanup
summary: >
  A user attempts to override the protected user-owned recovery state.
  The review sheet names every protected class, the consequence is
  flagged as lost_with_no_rebuild_path, and the user cancels. No
  bytes are deleted; the receipt records a cancelled result.

