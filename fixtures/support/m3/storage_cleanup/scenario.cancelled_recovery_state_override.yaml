  trigger_class: user_requested_cleanup
  selected_class_refs:
    - class_id: interactive_hot_cache
      bytes_in_scope: 134217728
      consequence_class: rebuilt_cheaply_on_demand
      consequence_summary: Hot cache rebuilds on next interaction.
      export_before_delete_class: not_applicable
  workspace_scope_rows: []
  protected_class_rows:
    - class_id: evidence_support_cache
      protected_reason_class: evidence_class
      reason_summary: Evidence and support cache excluded by default.
    - class_id: user_owned_recovery_state
      protected_reason_class: user_owned_recovery_state
      reason_summary: >
        Local history, rollback checkpoints, dirty-buffer journals,
        offline entitlement bundles, pinned review artifacts, and
        last-known-good policy bundles cannot be reclaimed without an
        explicit per-item override.
  pin_block_rows: []
