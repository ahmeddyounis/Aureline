  actor_lineage_class: low_disk_eviction_prompt
  trigger_class: low_disk_pressure
  result_class: completed
  class_outcomes:
    - class_id: interactive_hot_cache
      bytes_reclaimed: 536870912
      rebuild_state_class: rebuild_on_demand_cheaply
      rebuild_summary: Hot cache rebuilds on next interaction.
    - class_id: knowledge_cache
      bytes_reclaimed: 2147483648
      rebuild_state_class: stale_until_rebuilt
      rebuild_summary: Semantic search is stale until reindex completes.
    - class_id: artifact_cache
      bytes_reclaimed: 4294967296
