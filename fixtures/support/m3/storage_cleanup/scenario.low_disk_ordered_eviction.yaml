schema_version: 1
record_kind: storage_cleanup_scenario_record
scenario_id: support.m3.storage_cleanup.low_disk_ordered_eviction
title: Low-disk ordered eviction with explained stale state
trigger_class: low_disk_pressure
summary: >
  Disk pressure crosses the critical threshold. The low-disk banner
  explains the ordered eviction (hot cache first, then knowledge, then
  artifact and prebuild caches with review), names paused work, and
  pins protected classes. The receipt records exactly what was trimmed
  and what is now stale.

review:
  schema_version: 1
  record_kind: clear_data_review_record
  review_id: review.low_disk_ordered_eviction.v1
  presented_at: 2026-05-19T10:00:00Z
  actor_lineage_class: low_disk_eviction_prompt
  trigger_class: low_disk_pressure
  selected_class_refs:
    - class_id: interactive_hot_cache
      bytes_in_scope: 536870912
      consequence_class: rebuilt_cheaply_on_demand
      consequence_summary: Hot cache rebuilds on next interaction.
      export_before_delete_class: not_applicable
    - class_id: knowledge_cache
      bytes_in_scope: 2147483648
      consequence_class: rebuilt_with_expensive_local_work
      consequence_summary: Knowledge cache reindex queued.
      export_before_delete_class: not_applicable
    - class_id: artifact_cache
      bytes_in_scope: 4294967296
      consequence_class: rebuilt_requires_network
      consequence_summary: >
        Artifact cache will refetch from providers; expect a network
        round-trip before reproducible build artifacts are warm again.
      export_before_delete_class: not_applicable
  workspace_scope_rows:
    - workspace_ref: workspace.local.aureline_core
      class_id: knowledge_cache
      bytes_in_scope: 2147483648
      summary: Aureline core workspace knowledge cache evicted.
  protected_class_rows:
    - class_id: evidence_support_cache
      protected_reason_class: evidence_class
      reason_summary: >
        Evidence and support cache stays pinned even under low-disk
        pressure so an in-flight incident workspace is preserved.
    - class_id: user_owned_recovery_state
      protected_reason_class: user_owned_recovery_state
      reason_summary: >
        User-owned recovery state stays pinned; local history,
        rollback checkpoints, dirty-buffer journals, offline
        entitlement bundles, and pinned review artifacts are not
        evicted to reclaim disk.
  pin_block_rows: []
  consent_state: confirmed
  confirmed_by_ref: actor.local_user.ahmedyounis
  raw_content_exported: false
  redaction_class: metadata_safe_default
  schema_ref: schemas/support/clear_data_review.schema.json
  doc_ref: docs/support/m3/storage_cleanup_beta.md
  storage_class_registry_ref: schemas/support/storage_class.schema.json
  reviewer_summary: >
    Low-disk eviction confirmed for hot, knowledge, and artifact
    caches; protected classes named and excluded.

receipt:
  schema_version: 1
  record_kind: storage_cleanup_receipt_record
  receipt_id: receipt.low_disk_ordered_eviction.v1
  review_ref: review.low_disk_ordered_eviction.v1
