      - order: 2
        class_id: knowledge_cache
        bytes_evicted: 2147483648
        summary: Knowledge cache trimmed next.
      - order: 3
        class_id: artifact_cache
        bytes_evicted: 4294967296
        summary: Artifact cache trimmed after a confirmation step.
    paused_work_rows:
      - work_ref: work.background.knowledge_reindex
        summary: Knowledge reindex paused until the eviction completes.
      - work_ref: work.background.artifact_prewarm
        summary: Artifact prewarm paused until the next interaction.
    reviewer_summary: >
      Low-disk eviction reclaimed disposable and recreatable caches in
