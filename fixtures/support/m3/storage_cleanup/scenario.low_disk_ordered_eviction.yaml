    - class_id: user_owned_recovery_state
      protected_reason_class: user_owned_recovery_state
      reason_summary: User-owned recovery state pinned under low-disk pressure.
  low_disk_context:
    state_class: critical
    ordered_eviction_steps:
      - order: 1
        class_id: interactive_hot_cache
        bytes_evicted: 536870912
