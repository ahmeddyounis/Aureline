schema_version: 1
record_kind: storage_class_registry
registry_id: support.m3.storage_class_registry.v1
schema_ref: schemas/support/storage_class.schema.json
doc_ref: docs/support/m3/storage_cleanup_beta.md
emitted_at: 2026-05-19T00:00:00Z

entries:
  - schema_version: 1
    record_kind: storage_class_registry_entry
    class_id: interactive_hot_cache
    label: Interactive hot cache
    summary: >
      Disposable session-local cache used to keep the editor responsive
      (recently rendered token streams, recent search lattices, decoded
      thumbnails). Rebuilds within one interaction round-trip.
    scope_class: process_local
    authority_class: runtime_disposable
    rebuild_cost_class: cheap_local
    sensitivity_class: non_sensitive
    gc_policy_class: eviction_eligible
    low_disk_eviction_priority: 1
    protected_default: false
    protected_class_examples: []
    schema_ref: schemas/support/storage_class.schema.json
    doc_ref: docs/support/m3/storage_cleanup_beta.md

  - schema_version: 1
    record_kind: storage_class_registry_entry
    class_id: knowledge_cache
    label: Knowledge cache
    summary: >
      Workspace-derived semantic index of code, docs, and embeddings.
      Rebuilds from local source without network when possible; can be
      large but is recreatable.
    scope_class: workspace_local
    authority_class: workspace_derived
    rebuild_cost_class: expensive_local
    sensitivity_class: metadata_only
    gc_policy_class: eviction_eligible
    low_disk_eviction_priority: 2
    protected_default: false
    protected_class_examples: []
    schema_ref: schemas/support/storage_class.schema.json
    doc_ref: docs/support/m3/storage_cleanup_beta.md

  - schema_version: 1
    record_kind: storage_class_registry_entry
    class_id: artifact_cache
    label: Artifact cache
    summary: >
      Reproducible build artifacts and provider-derived blobs (test
      fixtures, generated bindings, fetched language packs). Often
      requires network to rebuild and is shared across workspaces.
    scope_class: profile_local
    authority_class: provider_derived
    rebuild_cost_class: network_required
    sensitivity_class: metadata_only
    gc_policy_class: eviction_with_review
    low_disk_eviction_priority: 3
    protected_default: false
    protected_class_examples: []
    schema_ref: schemas/support/storage_class.schema.json
    doc_ref: docs/support/m3/storage_cleanup_beta.md

  - schema_version: 1
    record_kind: storage_class_registry_entry
    class_id: prebuild_environment_cache
    label: Prebuild and environment cache
    summary: >
      Toolchain, language-runtime, and prebuild environment artifacts.
      Expensive to recreate and frequently network-bound; eviction
      requires a confirmation step.
    scope_class: machine_local
    authority_class: provider_derived
    rebuild_cost_class: network_required
    sensitivity_class: metadata_only
    gc_policy_class: eviction_with_review
    low_disk_eviction_priority: 4
    protected_default: false
    protected_class_examples: []
    schema_ref: schemas/support/storage_class.schema.json
    doc_ref: docs/support/m3/storage_cleanup_beta.md

  - schema_version: 1
    record_kind: storage_class_registry_entry
    class_id: evidence_support_cache
    label: Evidence and support cache
    summary: >
      Crash reports, support-bundle drafts, repair-transaction journals,
      and incident workspace evidence. Protected so ordinary cleanup
      never silently deletes governance evidence.
    scope_class: profile_local
    authority_class: evidence_grade
    rebuild_cost_class: irrecoverable
    sensitivity_class: evidence_grade
    gc_policy_class: never_evict_silently
    low_disk_eviction_priority: 5
    protected_default: true
    protected_class_examples:
      - evidence.support_bundle.preview.live
      - evidence.repair_transaction.journal
      - evidence.incident_workspace.snapshot
    schema_ref: schemas/support/storage_class.schema.json
    doc_ref: docs/support/m3/storage_cleanup_beta.md

  - schema_version: 1
    record_kind: storage_class_registry_entry
    class_id: user_owned_recovery_state
    label: User-owned recovery state
    summary: >
      Local history, rollback checkpoints, dirty-buffer journals, pinned
      review artifacts, offline entitlement bundles, and last-known-good
      policy bundles. The user owns this class and cleanup must never
      remove it without an explicit per-item override.
    scope_class: user_account_local
    authority_class: user_authored_recovery
    rebuild_cost_class: irrecoverable
    sensitivity_class: private_user_content
    gc_policy_class: never_evict_silently
    low_disk_eviction_priority: 6
    protected_default: true
    protected_class_examples:
      - recovery.local_history.dirty_buffer_journal
      - recovery.rollback_checkpoint.workspace
      - recovery.pin.review_artifact
      - recovery.offline_entitlement_bundle
      - recovery.last_known_good_policy_bundle
    schema_ref: schemas/support/storage_class.schema.json
    doc_ref: docs/support/m3/storage_cleanup_beta.md
