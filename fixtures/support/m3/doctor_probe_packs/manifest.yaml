# Project Doctor beta probe-pack family manifest.
#
# This manifest is the protected entry point for the seven-family doctor
# probe-pack catalog. Each pack fixture mirrors the boundary schema at
# `schemas/support/doctor_probe_pack.schema.json` and is consumed by
# `crates/aureline-doctor/src/probe_packs/mod.rs`.

schema_version: 1
manifest_id: support.doctor_probe_packs.m3_beta_cases.v1
status: protected
overview_page: docs/support/m3/doctor_probe_packs_beta.md

schema_ref: schemas/support/doctor_probe_pack.schema.json
crate_consumer: crates/aureline-doctor/src/probe_packs/mod.rs
support_consumer: crates/aureline-support/src/project_doctor/probe_pack_coverage.rs

catalog_file: catalog.yaml

pack_files:
  - entry_pack.yaml
  - toolchain_pack.yaml
  - search_index_pack.yaml
  - trust_policy_pack.yaml
  - git_pack.yaml
  - provider_pack.yaml
  - restore_pack.yaml

required_case_assertions:
  - catalog_declares_one_pack_per_failure_family
  - every_pack_has_prerequisites_outputs_and_unsupported_state_handling
  - every_output_routes_to_a_recovery_ladder_action
  - coverage_scorecard_reports_all_seven_families_covered

source_contract_refs:
  doctor_probe_packs_beta_doc: docs/support/m3/doctor_probe_packs_beta.md
  doctor_probe_pack_schema: schemas/support/doctor_probe_pack.schema.json
  project_doctor_beta_doc: docs/support/m3/project_doctor_beta.md
  project_doctor_beta_schema: schemas/support/project_doctor.schema.json
  safe_mode_beta_doc: docs/support/m3/safe_mode_beta.md
  extension_bisect_beta_doc: docs/support/m3/extension_bisect_beta.md
  recovery_ladder_alpha_doc: docs/support/recovery_ladder_alpha.md
