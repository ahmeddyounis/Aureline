# M3 beta incident-workspace handoff packet corpus manifest.
#
# This manifest pins the protected fixture corpus consumed by the
# beta incident-workspace handoff template. Every fixture mirrors the
# `IncidentWorkspaceBetaPacket` record kind declared in
# `crates/aureline-support/src/incident_workspace_beta/mod.rs` and the
# JSON-schema boundary at
# `schemas/support/incident_workspace_beta_packet.schema.json`.

schema_version: 1
manifest_id: support.m3.incident_workspace_beta_packets.v1
status: protected
overview_doc: docs/support/m3/incident_handoff_template.md
crate_consumer: crates/aureline-support/src/incident_workspace_beta/mod.rs
artifact_summary: artifacts/support/m3/incident_workspace_packet.md

packet_fixtures:
  - safe_mode_crash_loop_local_only.yaml
  - extension_quarantine_managed_copy.yaml
  - joint_security_support_held_record.yaml

required_case_assertions:
  - every_packet_pins_workspace_target_degraded_state_findings_and_evidence
  - every_packet_distinguishes_local_only_managed_copy_and_held_records
  - support_and_security_read_the_same_packet_for_joint_handoff
  - every_packet_preserves_user_authored_files_and_excludes_raw_private_material
  - claim_state_downgrade_tokens_match_the_attached_custody_classes

source_contract_refs:
  scenario_corpus_doc: docs/support/m3/support_scenario_corpus.md
  incident_workspace_alpha_doc: docs/ops/incident_workspace_contract.md
  drill_harness_report: artifacts/support/m3/drill_harness_report.md
  support_intake_contract: docs/support/support_intake_and_escalation_contract.md
