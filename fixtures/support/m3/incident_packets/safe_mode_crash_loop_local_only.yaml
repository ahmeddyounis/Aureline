schema_version: 1
record_kind: incident_workspace_beta_packet_record
packet_id: support.m3.incident_packet.safe_mode.crash_loop_local_only
title: Safe-mode entry after a startup crash loop, local-only evidence
summary: >
  A blocked user hit the startup crash-loop strike budget and entered a
  typed safe-mode profile. Every evidence artifact remains on the local
  host; support intake reads the same packet without a separate private
  template, and the packet preserves the user's authored files.

handoff_consumer_classes:
  - support_intake_only

workspace_identity:
  workspace_id: workspace:local.individual.workspace_alpha
  workspace_profile_summary: >
    Individual local workspace running the stable channel; no managed
    admin lane is configured.
  preserves_user_authored_files: true

target:
  exact_build_identity_ref: exact_build:aureline.m3.beta.b1
  deployment_profile_class: individual_local
  target_summary: >
    Local stable-channel build of Aureline running on the user's
    workstation; no managed admin sign-off is required for support
    handoff.
  managed_admin_required: false

degraded_state:
  degraded_state_class: startup_crash_loop_detected
  degraded_summary: >
    Three consecutive startup attempts crashed; the recovery ladder
    routed the user into the post-crash-loop safe-mode profile bound to
    a typed Project Doctor finding.
  observed_at: 2026-05-16T08:00:00Z

findings:
  - finding_id: doctor.finding.startup_crash_loop.safe_mode_routed
    finding_class: project_doctor_finding
    finding_summary: >
      The Project Doctor beta finding names the safe-mode profile that
      the recovery ladder routed the user into and the host narrowing
      applied during entry.
    source_ref: crates/aureline-support/src/project_doctor/beta.rs
  - finding_id: safe_mode.profile.post_crash_loop.default
    finding_class: safe_mode_profile_finding
    finding_summary: >
      The typed safe-mode profile pins the disabled extension host, the
      narrowed background indexer, and the preserved local editing and
      diagnostics-export capabilities.
    source_ref: fixtures/recovery/m3/safe_mode/post_crash_loop_profile.yaml

evidence_artifacts:
  - artifact_id: support_bundle_preview.local.alpha
    artifact_class: support_bundle_preview
    custody_class: local_only_artifact
    artifact_summary: >
      The local support-bundle preview lists the metadata-safe rows the
      user can review before any export step.
    artifact_ref: aureline_support::bundle::SupportBundlePreview
  - artifact_id: safe_mode.profile.post_crash_loop.default
    artifact_class: safe_mode_profile_record
    custody_class: local_only_artifact
    artifact_summary: >
      The typed safe-mode profile record carries the narrowed-host,
      narrowed-service, and preserved-capability rows.
    artifact_ref: crates/aureline-support/src/safe_mode/mod.rs
  - artifact_id: incident_workspace_alpha.local.alpha
    artifact_class: incident_workspace_alpha_packet_ref
    custody_class: local_only_artifact
    artifact_summary: >
      The alpha incident-workspace packet pins the workspace, build
      identity, and missing-span rollup the beta packet composes with by
      reference.
    artifact_ref: crates/aureline-incident/src/lib.rs

recovery_options:
  - recovery_option_class: enter_safe_mode
    option_summary: >
      The user is already in safe mode; the recovery ladder leaves the
      explicit exit action available once the finding is reviewed.
  - recovery_option_class: export_support_bundle
    option_summary: >
      The local support-bundle preview is reopenable without a network
      lane; the user can review the redacted rows and then choose to
      export.
  - recovery_option_class: handoff_to_support
    option_summary: >
      Support intake consumes this packet by reference; no upload is
      required while the user reviews the local-only artifacts.

claim_state:
  downgrade_tokens: []
  claim_summary: >
    Every fixture, drill step, and recovery row is intact; the beta
    claim holds with no downgrade in effect.

privacy_baseline:
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  redaction_baseline_summary: >
    Raw logs, command lines, provider payloads, stack frames, secret
    material, and ambient authority do not cross the packet boundary;
    rows carry opaque ids, closed-vocabulary tokens, and reviewable
    summaries only.

references:
  doc_ref: docs/support/m3/incident_handoff_template.md
  schema_ref: schemas/support/incident_workspace_beta_packet.schema.json
  scenario_corpus_doc_ref: docs/support/m3/support_scenario_corpus.md
  incident_workspace_alpha_doc_ref: docs/ops/incident_workspace_contract.md

emitted_at: 2026-05-16T08:01:00Z
