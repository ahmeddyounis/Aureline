# M3 support-scenario corpus and drill-harness manifest.
#
# This manifest is the protected entry point for the seeded
# support-scenario corpus that covers every M3 beta supportability,
# repair, recovery, replay, and governance lane Aureline claims. Each
# scenario fixture mirrors the boundary shape declared by
# `crates/aureline-support/src/m3_scenario_corpus/mod.rs` and is
# consumed by `crates/aureline-support/tests/m3_scenario_corpus_drill.rs`
# plus the metadata-safe drill-harness report at
# `artifacts/support/m3/drill_harness_report.md`.

schema_version: 1
manifest_id: support.m3.scenario_corpus.v1
status: protected
overview_page: docs/support/m3/support_scenario_corpus.md
crate_consumer: crates/aureline-support/src/m3_scenario_corpus/mod.rs
drill_harness_report: artifacts/support/m3/drill_harness_report.md
corpus_lineage_registry: fixtures/registry/corpus_registry.yaml
corpus_freshness_report: artifacts/registry/corpus_freshness_report.json

scenario_files:
  - safe_mode_post_crash_loop_entry_and_exit.yaml
  - extension_bisect_single_suspect_attribution.yaml
  - repair_preview_extension_quarantine_comparison.yaml
  - doctor_probe_pack_entry_open_routing.yaml
  - project_doctor_beta_finding_render_packet.yaml
  - records_governance_held_support_bundle_chain.yaml
  - runtime_replay_pack_layout_only_mutating.yaml

required_beta_lane_classes:
  - safe_mode
  - extension_bisect
  - repair_transaction_preview
  - doctor_probe_packs
  - project_doctor_finding_contract
  - records_governance
  - runtime_replay_packets

required_case_assertions:
  - every_beta_lane_has_at_least_one_seeded_scenario_and_drill_path
  - every_scenario_pins_a_primary_fixture_doc_schema_and_crate_consumer
  - every_scenario_declares_drill_steps_and_expected_artifacts
  - every_scenario_pins_claim_downgrade_rules_for_regression_or_stale_evidence
  - every_scenario_preserves_user_authored_files_and_excludes_raw_private_material
  - drill_harness_report_consumes_the_corpus_rather_than_freeform_notes

source_contract_refs:
  recovery_ladder_alpha_doc: docs/support/recovery_ladder_alpha.md
  diagnosis_latency_scorecard: artifacts/support/diagnosis_latency_scorecard_alpha.yaml
  safe_mode_beta_doc: docs/support/m3/safe_mode_beta.md
  extension_bisect_beta_doc: docs/support/m3/extension_bisect_beta.md
  repair_transaction_beta_doc: docs/support/m3/repair_transaction_beta.md
  doctor_probe_packs_beta_doc: docs/support/m3/doctor_probe_packs_beta.md
  project_doctor_beta_doc: docs/support/m3/project_doctor_beta.md
  records_governance_beta_doc: docs/support/m3/records_governance_beta.md
  runtime_replay_packets_doc: docs/support/m3/runtime_replay_packets.md
