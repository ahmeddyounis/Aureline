    drill_classes:
      - stale_runbook_version
    focus: stale runbook version blocks protected mutation
  - fixture_ref: fixtures/support/m3/runbook_packet_and_handoff/blocked_approval_mitigation.yaml
    drill_classes:
      - blocked_approval
    focus: pending approval blocks protected mutation without spending authority
  - fixture_ref: fixtures/support/m3/runbook_packet_and_handoff/browser_only_vendor_docs_handoff.yaml
    drill_classes:
      - browser_only_vendor_docs
    focus: browser-only vendor docs are reference-only and preserve explicit console handoff metadata
  - fixture_ref: fixtures/support/m3/runbook_packet_and_handoff/redacted_export_bundle.yaml
