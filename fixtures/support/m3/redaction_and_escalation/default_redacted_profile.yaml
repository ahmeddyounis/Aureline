# yaml-language-server: $schema=../../../../schemas/support/export_redaction_profile.schema.json
schema_version: 1
record_kind: support_export_redaction_profile_seed_case_record
case_id: support_export_redaction_profile:extension_or_host_regression.local_only_default
title: Default-redacted local-only export for an extension regression
summary: >
  Default-redacted support export for a stable-channel extension-crash
  claimed row. Build identity, scenario family, doctor finding codes,
  repair history, crash manifest ids, and symbolication report ids stay
  embedded by reference; raw dumps, transcripts, and code attachments
  never cross the boundary.

scenario_family_class: extension_or_host_regression

build_identity:
  exact_build_identity_ref: exact_build:aureline.m3.beta.b1
  release_channel_class: stable
  platform_class: macos_arm64
  producer_build_id: producer:aureline.ci.m3.beta.b1
  product_version: 0.0.0-m3-beta-b1
  build_identity_summary: >
    Stable channel macOS arm64 build pinned to the M3 beta exact-build
    identity.

doctor_finding_codes:
  - doctor.finding.extension_host_crash.regression
  - doctor.finding.extension_quarantine.applied

repair_history_refs:
  - repair_transaction:extension.quarantine.m3.beta.b1
  - recovery_action:extension_isolation.m3.beta.b1

evidence_class_rules:
  - evidence_class: build_identity
    inclusion_class: embedded_metadata_only
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: >
      Exact-build identity stays embedded so support can reconstruct the
      running build without raw paths or binary bodies.
  - evidence_class: channel_and_platform_identity
    inclusion_class: embedded_metadata_only
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: >
      Channel and platform identity stay embedded; raw uname output is
      excluded.
  - evidence_class: scenario_family
    inclusion_class: embedded_metadata_only
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: >
      Scenario family is embedded as a closed token so support can route
      the case without a free-form description.
  - evidence_class: doctor_finding_codes
    inclusion_class: embedded_metadata_only
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: >
      Stable Project Doctor finding codes are embedded; raw finding
      bodies stay out.
  - evidence_class: repair_history_refs
    inclusion_class: embedded_by_reference
    default_data_class_boundary: environment_adjacent
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: >
      Repair history rows cross by stable id, not by transcript body.
  - evidence_class: crash_manifest_refs
    inclusion_class: embedded_by_reference
    default_data_class_boundary: environment_adjacent
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: >
      Crash manifest ids travel by reference; raw dumps stay on the
      local machine.
  - evidence_class: symbolication_report_refs
    inclusion_class: embedded_by_reference
    default_data_class_boundary: environment_adjacent
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: >
      Local exact-build symbolication reports cross by reference so
      support sees the same identity without raw stack bodies.
  - evidence_class: support_bundle_refs
    inclusion_class: embedded_by_reference
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: >
      Support-bundle ids cross by reference so previews stay joinable.
  - evidence_class: incident_workspace_packet_refs
    inclusion_class: embedded_by_reference
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: >
      Incident-workspace packet ids cross by reference; raw packet
      bodies remain governed by their own schema.
  - evidence_class: policy_and_trust_state
    inclusion_class: embedded_metadata_only
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: >
      Policy epoch and trust state ride as closed tokens.
  - evidence_class: raw_crash_dump_payload
    inclusion_class: retained_local_only
    default_data_class_boundary: high_risk
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: >
      Raw crash dumps remain on the local machine; the export carries
      only the manifest ref.
  - evidence_class: raw_trace_capture
    inclusion_class: retained_local_only
    default_data_class_boundary: high_risk
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: >
      Raw trace captures stay local; the export references the trace id.
  - evidence_class: raw_log_excerpt
    inclusion_class: excluded_by_default
    default_data_class_boundary: high_risk
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: >
      Raw log excerpts are excluded by default and require explicit
      review before widening.
  - evidence_class: raw_transcript_excerpt
    inclusion_class: excluded_by_default
    default_data_class_boundary: high_risk
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: >
      Raw transcripts are excluded by default; broaden-evidence review
      is required.
  - evidence_class: code_snippet_attachment
    inclusion_class: excluded_by_default
    default_data_class_boundary: code_adjacent
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: >
      Code-adjacent snippets are excluded by default and never silently
      widened.
  - evidence_class: notebook_cell_attachment
    inclusion_class: excluded_by_default
    default_data_class_boundary: code_adjacent
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: >
      Notebook cells are excluded by default and never silently widened.
  - evidence_class: mutation_journal_excerpt
    inclusion_class: excluded_by_default
    default_data_class_boundary: code_adjacent
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: >
      Mutation-journal excerpts are excluded by default; broaden-
      evidence review required.
  - evidence_class: full_shell_history_capture
    inclusion_class: excluded_always
    default_data_class_boundary: high_risk
    broaden_review_class: prohibited
    carries_raw_body_by_default: false
    rule_summary: >
      Full shell history is never exported by this profile.
  - evidence_class: secret_bearing_material
    inclusion_class: excluded_always
    default_data_class_boundary: high_risk
    broaden_review_class: prohibited
    carries_raw_body_by_default: false
    rule_summary: >
      Secret-bearing material is prohibited and never crosses the
      boundary.
  - evidence_class: ambient_credential_material
    inclusion_class: excluded_always
    default_data_class_boundary: high_risk
    broaden_review_class: prohibited
    carries_raw_body_by_default: false
    rule_summary: >
      Ambient credentials and credential handles never cross the
      boundary.

default_required_evidence_classes:
  - build_identity
  - channel_and_platform_identity
  - scenario_family
  - doctor_finding_codes

crash_linkage:
  crash_manifest_refs:
    - crash_envelope:aureline.m3.beta.b1.extension_host.alpha
  symbolication_report_refs:
    - symbolication_report:aureline.m3.beta.b1.extension_host.alpha
  raw_dump_attached: false
  linkage_summary: >
    Crash manifest and symbolication reports cross by reference; the
    raw dump body stays on the local machine.

destination_posture:
  selected_destination_class: local_only_review
  local_only_path_available: true
  local_only_equal_prominence: true
  destination_summary: >
    The local-only review path is presented at equal prominence with
    any upload path; nothing leaves the machine until the user opts in.

reopen_path:
  reopen_supported: true
  manifest_ref: support_export_reopen_manifest:extension_or_host_regression.local_only_default
  shows_included_classes: true
  shows_excluded_classes: true
  shows_build_identity: true
  shows_destination_class: true
  reopen_summary: >
    The reopen manifest preserves included and excluded class lists,
    build identity, and destination class so the user and support can
    inspect exactly what was shared.

raw_dumps_attached: false
raw_transcripts_attached: false
code_adjacent_attached: false
secret_bearing_attached: false
broaden_evidence_review_ref: null

notes: >
  Default-redacted local-only profile for a stable-facing extension
  crash claim row. The exit gate refuses any widening that would drop a
  default-required evidence class or attach a raw/code-adjacent body.

governance_bindings:
  support_bundle_schema_ref: schemas/support/support_bundle.schema.json
  escalation_packet_schema_ref: schemas/support/escalation_packet.schema.json
  scenario_picker_schema_ref: schemas/support/scenario_picker.schema.json
  doctor_finding_schema_ref: schemas/support/doctor_finding.schema.json
  redaction_default_doc_ref: docs/support/m3/redaction_default_exports.md

emitted_at: 2026-05-19T10:00:00Z
