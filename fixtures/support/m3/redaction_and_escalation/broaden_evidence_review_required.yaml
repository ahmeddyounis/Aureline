# yaml-language-server: $schema=../../../../schemas/support/export_redaction_profile.schema.json
schema_version: 1
record_kind: support_export_redaction_profile_seed_case_record
case_id: support_export_redaction_profile:state_corruption_schema_drift_low_disk_recovery.broaden_evidence_review_required
title: Schema-drift recovery export requires explicit broaden-evidence review
summary: >
  The user attempts to widen the default-redacted profile to embed a
  code-adjacent mutation-journal excerpt; the export is allowed only
  because an explicit broaden-evidence review marker is attached and
  the embedded evidence still excludes raw payloads.

scenario_family_class: state_corruption_schema_drift_low_disk_recovery

build_identity:
  exact_build_identity_ref: exact_build:aureline.m3.beta.b1
  release_channel_class: stable
  platform_class: linux_x86_64
  producer_build_id: producer:aureline.ci.m3.beta.b1
  product_version: 0.0.0-m3-beta-b1
  build_identity_summary: >
    Stable Linux x86_64 build pinned to the M3 beta exact-build
    identity.

doctor_finding_codes:
  - doctor.finding.schema_drift.detected
  - doctor.finding.repair_preview.required

repair_history_refs:
  - repair_transaction:schema_drift.m3.beta.b1.preview

evidence_class_rules:
  - evidence_class: build_identity
    inclusion_class: embedded_metadata_only
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: Build identity stays embedded.
  - evidence_class: channel_and_platform_identity
    inclusion_class: embedded_metadata_only
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: Channel and platform identity stay embedded.
  - evidence_class: scenario_family
    inclusion_class: embedded_metadata_only
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: Scenario family token is embedded.
  - evidence_class: doctor_finding_codes
    inclusion_class: embedded_metadata_only
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: Doctor finding codes are embedded.
  - evidence_class: repair_history_refs
    inclusion_class: embedded_by_reference
    default_data_class_boundary: environment_adjacent
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: Repair transaction ids cross by reference.
  - evidence_class: crash_manifest_refs
    inclusion_class: embedded_by_reference
    default_data_class_boundary: environment_adjacent
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: No crash manifest applies; reference list stays empty.
  - evidence_class: symbolication_report_refs
    inclusion_class: embedded_by_reference
    default_data_class_boundary: environment_adjacent
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: No symbolication report applies; reference list stays empty.
  - evidence_class: support_bundle_refs
    inclusion_class: embedded_by_reference
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: Support-bundle ids cross by reference.
  - evidence_class: incident_workspace_packet_refs
    inclusion_class: embedded_by_reference
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: Incident-workspace packet ids cross by reference.
  - evidence_class: policy_and_trust_state
    inclusion_class: embedded_metadata_only
    default_data_class_boundary: metadata_only
    broaden_review_class: not_required
    carries_raw_body_by_default: false
    rule_summary: Policy epoch and trust state remain embedded.
  - evidence_class: raw_crash_dump_payload
    inclusion_class: retained_local_only
    default_data_class_boundary: high_risk
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: Raw dumps remain local; reviewer chose not to widen.
  - evidence_class: raw_trace_capture
    inclusion_class: retained_local_only
    default_data_class_boundary: high_risk
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: Raw traces remain local; reviewer chose not to widen.
  - evidence_class: raw_log_excerpt
    inclusion_class: excluded_by_default
    default_data_class_boundary: high_risk
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: Raw log excerpts stay excluded.
  - evidence_class: raw_transcript_excerpt
    inclusion_class: excluded_by_default
    default_data_class_boundary: high_risk
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: Raw transcripts stay excluded.
  - evidence_class: code_snippet_attachment
    inclusion_class: excluded_by_default
    default_data_class_boundary: code_adjacent
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: Code snippets remain excluded; reviewer chose not to widen.
  - evidence_class: notebook_cell_attachment
    inclusion_class: excluded_by_default
    default_data_class_boundary: code_adjacent
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: Notebook cells remain excluded.
  - evidence_class: mutation_journal_excerpt
    inclusion_class: embedded_by_reference
    default_data_class_boundary: code_adjacent
    broaden_review_class: requires_explicit_review
    carries_raw_body_by_default: false
    rule_summary: >
      Mutation-journal excerpts cross by reference under an explicit
      broaden-evidence review marker; raw bodies still stay out.
  - evidence_class: full_shell_history_capture
    inclusion_class: excluded_always
    default_data_class_boundary: high_risk
    broaden_review_class: prohibited
    carries_raw_body_by_default: false
    rule_summary: Full shell history is prohibited.
  - evidence_class: secret_bearing_material
    inclusion_class: excluded_always
    default_data_class_boundary: high_risk
    broaden_review_class: prohibited
    carries_raw_body_by_default: false
    rule_summary: Secret-bearing material is prohibited.
  - evidence_class: ambient_credential_material
    inclusion_class: excluded_always
    default_data_class_boundary: high_risk
    broaden_review_class: prohibited
    carries_raw_body_by_default: false
    rule_summary: Ambient credentials are prohibited.

default_required_evidence_classes:
  - build_identity
  - channel_and_platform_identity
  - scenario_family
  - doctor_finding_codes

crash_linkage:
  crash_manifest_refs: []
  symbolication_report_refs: []
  raw_dump_attached: false
  linkage_summary: >
    No crash applies for this scenario; the export rides on the repair
    transaction reference instead.

destination_posture:
  selected_destination_class: managed_admin_handoff
  local_only_path_available: true
  local_only_equal_prominence: true
  destination_summary: >
    Managed-admin handoff is selected explicitly; local-only review
    remains visible at equal prominence.

reopen_path:
  reopen_supported: true
  manifest_ref: support_export_reopen_manifest:state_corruption_schema_drift_low_disk_recovery.broaden_evidence_review_required
  shows_included_classes: true
  shows_excluded_classes: true
  shows_build_identity: true
  shows_destination_class: true
  reopen_summary: >
    The reopen manifest records the broaden-evidence-classes review id
    so a later reviewer can see which class was widened and why.

raw_dumps_attached: false
raw_transcripts_attached: false
code_adjacent_attached: false
secret_bearing_attached: false
broaden_evidence_review_ref: broaden_evidence_review:schema_drift.mutation_journal.opt_in

notes: >
  Widening the mutation-journal evidence class requires a recorded
  broaden-evidence review marker; the export still refuses to embed
  raw bodies or any prohibited classes.

governance_bindings:
  support_bundle_schema_ref: schemas/support/support_bundle.schema.json
  escalation_packet_schema_ref: schemas/support/escalation_packet.schema.json
  scenario_picker_schema_ref: schemas/support/scenario_picker.schema.json
  doctor_finding_schema_ref: schemas/support/doctor_finding.schema.json
  redaction_default_doc_ref: docs/support/m3/redaction_default_exports.md

