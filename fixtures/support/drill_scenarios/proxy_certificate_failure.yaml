# Network, proxy, certificate, and egress drill covering transport
# diagnosis without raw endpoint, header, or credential export.

schema_version: 1
record_kind: support_drill_scenario
scenario_id: support.drill.proxy_certificate_failure
scenario_family: proxy_certificate_failure
title: Enterprise proxy or certificate failure blocks a supportable route
status: seeded

governing_doc_ref: docs/support/supportability_slo_and_pack_contract.md
slo_target_refs:
  - support.slo.first_actionable_diagnosis.common.p90_10m
  - support.slo.first_actionable_diagnosis.network.p90_10m
redaction_check_refs:
  - redaction.check.connection_profiles_no_dsn_headers
  - redaction.check.execution_context_no_raw_env
  - redaction.check.full_shell_history_never_exported
pack_class_refs:
  - diagnosis_context_pack
  - absence_proof_manifest
support_item_ids:
  included_by_default:
    - support.item.build_identity
    - support.item.connection_profiles
    - support.item.secret_broker_state
    - support.item.policy_trust_state
  prohibited_absence_markers:
    - support.item.raw_secrets
    - support.item.full_shell_history

drill_owner:
  primary_lane: security_trust_review
  support_lane: support_export
  release_gate_lane: release_evidence

trigger:
  start_event: probe_run_started
  symptoms:
    - proxy_auth_or_pac_resolution_failure
    - certificate_chain_untrusted
    - blocked_egress_class
  fixture_refs:
    - fixtures/support/pack_inclusion_cases/network_proxy_failure.yaml
    - artifacts/network/proxy_lab_matrix.yaml

expected_first_actionable_diagnosis:
  finding_code: doctor.finding.network_proxy_or_certificate_block
  actionability_class: config_review_policy_refresh_or_escalation
  target_seconds_p90: 600
  required_fields:
    - exact_build_identity_ref
    - connection_class
    - proxy_or_tunnel_posture
    - auth_source_class
    - route_boundary_class
    - transport_reason_class
    - redaction_summary_ref
  no_touch_boundary_set:
    - credential_store
    - managed_policy_overrides
    - workspace_trust_store
    - managed_workspace_control_plane

pack_expectations:
  preview_manifest_required: true
  reopen_manifest_required: true
  exact_build_refs_required: true
  allowed_raw_payloads_by_default: []
  optional_upload_candidates: []
  escalation_packet_minimum:
    - finding_code
    - connection_profile_summary_ref
    - policy_epoch
    - trust_store_class
    - endpoint_class
    - transport_reason_class
    - redaction_summary_ref
    - exact_build_identity_ref
  forbidden_fields:
    - raw_dsn
    - raw_hostnames
    - request_headers
    - credential_values
    - private_keys
    - client_certificate_bodies

claimed_profile_expectations:
  profile_source: artifacts/platform/claimed_desktop_profiles.yaml
  coverage_rule: >
    Run for each claimed operating-system profile that relies on system
    proxy or trust-store behavior. Managed and enterprise rows must
    include the headless surface.
  required_surfaces:
    - desktop_support_center
    - cli_headless_doctor
    - managed_profile_headless

release_gate:
  missing_drill: red_block_release_candidate
  p90_over_600_seconds: yellow_over_target_or_aging
  p90_over_900_seconds: red_block_release_candidate
  raw_endpoint_or_header_exported: red_block_release_candidate
  missing_reopen_manifest: red_block_release_candidate

waiver_path:
  waiver_required: true
  max_expiry_days: 14
  must_narrow_claim: true
  forbidden_for:
    - raw_seeded_secret_leak
    - proxy_or_certificate_bypass_repair
    - managed_policy_silent_widening

notes: >
  The drill proves network diagnosis reports endpoint class and
  transport cause without exporting raw hostnames, request headers,
  client certificates, or credentials.
