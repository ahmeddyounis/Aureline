# Toolchain and execution-context drill covering stale resolver truth,
# previewed re-resolve, and metadata-only support export.

schema_version: 1
record_kind: support_drill_scenario
scenario_id: support.drill.stale_toolchain_context
scenario_family: stale_toolchain_context
title: Stale toolchain context after dependency or activator drift
status: seeded

governing_doc_ref: docs/support/supportability_slo_and_pack_contract.md
slo_target_refs:
  - support.slo.first_actionable_diagnosis.common.p90_10m
  - support.slo.first_actionable_diagnosis.toolchain.p90_10m
redaction_check_refs:
  - redaction.check.execution_context_no_raw_env
  - redaction.check.full_shell_history_never_exported
pack_class_refs:
  - diagnosis_context_pack
  - absence_proof_manifest
support_item_ids:
  included_by_default:
    - support.item.build_identity
    - support.item.execution_context_summary
    - support.item.policy_trust_state
  prohibited_absence_markers:
    - support.item.raw_secrets
    - support.item.full_shell_history

drill_owner:
  primary_lane: support_export
  co_review_lanes:
    - product_scope_review
    - release_evidence

trigger:
  start_event: probe_run_started
  symptoms:
    - resolver_cache_epoch_stale
    - declared_toolchain_version_out_of_range
    - activator_output_no_longer_matches_workspace_manifest
  fixture_refs:
    - fixtures/support/pack_inclusion_cases/missing_toolchain_summary.yaml
    - fixtures/support/escalation_packet_completeness_cases/missing_toolchain_required_component.yaml

expected_first_actionable_diagnosis:
  finding_code: doctor.finding.toolchain_context_stale
  actionability_class: previewed_re_resolve_or_install_candidate
  target_seconds_p90: 600
  required_fields:
    - exact_build_identity_ref
    - toolchain_family
    - toolchain_version
    - resolver_confidence
    - activator_class
    - degraded_reason_class
    - suggested_repair_class
    - redaction_summary_ref
  no_touch_boundary_set:
    - user_authored_files
    - workspace_trust_store
    - credential_store

pack_expectations:
  preview_manifest_required: true
  reopen_manifest_required: true
  exact_build_refs_required: true
  allowed_raw_payloads_by_default: []
  optional_upload_candidates: []
  escalation_packet_minimum:
    - finding_code
    - execution_context_summary_ref
    - resolver_epoch_or_digest
    - toolchain_manifest_ref
    - previewed_repair_candidate_ref
    - redaction_summary_ref
    - exact_build_identity_ref

claimed_profile_expectations:
  profile_source: artifacts/platform/claimed_desktop_profiles.yaml
  coverage_rule: >
    Run on each claimed operating-system profile that publishes a
    launch-language or toolchain support claim. Headless Doctor must
    produce the same finding code as the desktop support surface.
  required_surfaces:
    - desktop_support_center
    - cli_headless_doctor

release_gate:
  missing_drill: red_block_release_candidate
  p90_over_600_seconds: yellow_over_target_or_aging
  p90_over_900_seconds: red_block_release_candidate
  raw_env_value_exported: red_block_release_candidate
  missing_reopen_manifest: red_block_release_candidate

waiver_path:
  waiver_required: true
  max_expiry_days: 14
  must_narrow_claim: true
  forbidden_for:
    - raw_seeded_secret_leak
    - unpreviewed_toolchain_mutation
    - missing_absence_proof_manifest

notes: >
  The drill keeps execution-context diagnosis read-only until a repair
  preview exists, and it proves support does not need raw environment
  variables or full command history to identify stale toolchain state.
