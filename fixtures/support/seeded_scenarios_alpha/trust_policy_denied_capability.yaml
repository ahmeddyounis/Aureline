schema_version: 1
record_kind: support_alpha_seeded_scenario
scenario_id: support_alpha.scenario.trust_policy.denied_capability
title: Trust or policy denied a capability
scenario_family: trust_policy
scorecard_row_ref: scorecard_row:support_alpha.trust_policy.denied_capability
launch_wedges:
  - python_service
  - tsjs_web

starting_condition:
  state_ref: trust:policy.denied.capability
  summary: >
    A workspace capability is blocked by the current trust or policy epoch,
    and the user needs a denial reason plus a safe next step.

trigger:
  start_event: support_scenario_started
  event_ref: scenario_start:trust_policy.denied_capability
  support_context: desktop_support_center

expected_first_actionable_result:
  stop_event: first_actionable_result_packet_emitted
  result_packet_class: doctor_finding
  finding_code: doctor.finding.trust_policy_blocked
  result_packet_ref: finding:project_doctor:alpha:trust_policy_denied_capability
  next_action_class: open_policy_details
  useful_result_summary: >
    Doctor names the deny reason and affected capability, then routes to a
    policy detail or approval review without silently widening trust.

measurement:
  start_event: support_scenario_started
  stop_event: first_actionable_result_packet_emitted
  target_seconds: 600
  yellow_seconds: 720
  red_seconds: 900
  evidence_required_before_stop:
    - exact_build_identity_ref
    - finding_code
    - support_bundle_ref
    - next_action_class

evidence:
  exact_build_identity_ref: exact_build:aureline.alpha.support_scenario.trust_policy
  support_bundle_ref: support.bundle.project_doctor.trust_policy
  support_packet_refs:
    - support.packet.scorecard.trust_policy.denied_capability
  fixture_refs:
    - fixtures/support/project_doctor_alpha/trust_policy_denied_capability.yaml
    - docs/trust/restricted_mode_alpha.md
  support_item_ids:
    - support.item.build_identity
    - support.item.policy_trust_state

safety:
  read_only_diagnosis: true
  raw_private_material_excluded: true
  forbidden_fix_classes:
    - destructive_reset_without_preview
    - widen_workspace_trust
    - publish_route
    - reenable_quarantined_extension_without_preview
    - run_repo_owned_hook_for_diagnosis
  no_touch_boundary_set:
    - user_authored_files
    - workspace_trust_store
    - managed_policy_overrides
    - credential_store

support_packet_expectations:
  pack_class: diagnosis_context_pack
  redaction_class: metadata_safe_default
  exact_build_identity_required: true
  reviewed_preview_required: true
  local_only_path_available: true

dashboard_expectations:
  dashboard_row_ref: dashboard_row:support_alpha.trust_policy.denied_capability
  consumer_ref: support_scenario_scorecard_dashboard

references:
  scorecard_ref: artifacts/support/diagnosis_latency_scorecard_alpha.yaml
  doctor_fixture_ref: fixtures/support/project_doctor_alpha/trust_policy_denied_capability.yaml
  support_bundle_alpha_ref: docs/support/support_bundle_alpha.md
