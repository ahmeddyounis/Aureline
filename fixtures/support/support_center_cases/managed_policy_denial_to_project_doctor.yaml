# Support Center route fixture: managed policy-denial surface → Project Doctor.
#
# Worked example for docs/support/support_center_information_architecture.md
# §Symptom-to-module route contract on a managed deployment context.
# Projects onto support_center_route_record. This case shows a
# managed-fleet user hitting a policy-denial reason on an action
# their admin's policy gates: the route opens Doctor read-only,
# preserves the policy decision id alongside the finding, and names
# managed-admin handoff at primary equal prominence with local-only
# review rather than implying an upload-first vendor-case path.

schema_version: 1
record_kind: support_center_route_record
route_id: support_center_route:managed.policy_denial_surface.project_doctor
symptom_surface_class: policy_denial_surface
symptom_summary: >
  User on a managed-fleet install attempts to widen workspace trust;
  the surface returns a typed managed-policy denial reason.
primary_module_class: project_doctor
default_first_action_class: open_project_doctor
secondary_module_classes:
  - field_diagnostics
  - issue_or_escalation_handoff
  - advisory_or_incident_history

no_upload_first_invariant:
  local_first_path_named: true
  upload_required_for_first_action: false
  summary: >
    First action opens Project Doctor read-only against the policy-
    denial reason; field-diagnostic capture and handoff drafting are
    local-first; managed-admin handoff is named but never required
    before the user reads the finding.

deployment_context_parity_rows:
  - deployment_context_class: local_only
    availability_class: available
    narrowed_when_summary: Local-only deployments do not encounter managed-policy denials; trust-state findings remain available.
    alternate_path_summary: Local-only individual installs route policy-denial-shaped failures through the trust-state probe family.
  - deployment_context_class: managed
    availability_class: available
    narrowed_when_summary: not_narrowed; the managed-policy decision id is rendered alongside the Doctor finding read-only.
    alternate_path_summary: not_applicable; managed is the reference surface for this case.
  - deployment_context_class: self_hosted
    availability_class: available
    narrowed_when_summary: Self-hosted control plane policies render verbatim alongside the finding.
    alternate_path_summary: Self-hosted admin handoff is available at primary prominence.
  - deployment_context_class: mirrored
    availability_class: available
    narrowed_when_summary: Policy fetches from a mirror surface a typed mirror state; cached policy is read-only.
    alternate_path_summary: Cached policy rows remain readable; the route names the missing mirror.
  - deployment_context_class: offline
    availability_class: available
    narrowed_when_summary: Cached policy rows remain enforced; updates are deferred while offline.
    alternate_path_summary: Local-only review keeps the finding and any handoff draft on the device.

evidence_preserved_for_escalation:
  scenario_family_ref_optional: trust_policy_identity_approval_block
  preserved_evidence_id_classes:
    - policy_decision_id
    - doctor_finding_id
    - object_handoff_packet_id
    - exact_build_identity_id
  summary: >
    Managed policy-decision id, Doctor finding id, object-handoff
    packet id, and exact-build identity travel with the route so the
    user keeps the case context if they request a managed-admin
    handoff or draft an escalation packet.

linked_capability_card_ref: support_center_card:project_doctor
governance_bindings:
  support_center_concept_ref: docs/support/support_center_concept.md
  support_intake_contract_ref: docs/support/support_intake_and_escalation_contract.md
  scenario_picker_schema_ref: schemas/support/scenario_picker.schema.json
  doctor_finding_schema_ref: schemas/support/doctor_finding.schema.json
  support_bundle_schema_ref: schemas/support/support_bundle.schema.json
  object_handoff_packet_schema_ref: schemas/support/object_handoff_packet.schema.json
  repair_transaction_schema_ref: schemas/support/repair_transaction.schema.json
  recovery_action_schema_ref: schemas/support/recovery_action.schema.json
  scenario_matrix_ref: fixtures/support/scenario_matrix.yaml
  support_center_routes_ref: artifacts/support/support_center_routes.yaml
notes: >
  Reference managed deployment-context fixture. The route never
  auto-retargets the user onto a managed-admin handoff; managed-
  admin handoff is named at primary prominence alongside local-only
  review so the user retains a visible local-first path.
emitted_at: 2026-05-04T00:00:00Z
