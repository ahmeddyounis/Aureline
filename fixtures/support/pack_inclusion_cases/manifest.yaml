# Diagnostic support-pack inclusion fixture manifest.
#
# Companion to docs/support/diagnostic_artifact_matrix.md and
# artifacts/support/support_evidence_pack_matrix.yaml. Cases show item
# selection, redaction, omission, and opt-in behavior without blanket
# artifact capture.

schema_version: 1
manifest_id: support.pack_inclusion_cases.v1
status: seeded
matrix_ref: artifacts/support/support_evidence_pack_matrix.yaml
schema_ref: schemas/support/support_pack_item.schema.json
default_redaction_profile_ref: support.redaction.local_first_default

case_files:
  - extension_crash_loop.yaml
  - missing_toolchain_summary.yaml
  - renderer_ipc_stall.yaml
  - network_proxy_failure.yaml

required_assertions:
  - every_case_cites_matrix_item_ids
  - every_included_or_omitted_item_names_privacy_class
  - high_risk_items_require_opt_in_or_omission_reason
  - raw_secrets_confirmed_absent
  - full_shell_history_confirmed_absent
  - no_case_uses_blanket_capture
