# Escalation-packet completeness case: incompatible cache / profile.
#
# Companion to docs/support/project_doctor_packet.md §Escalation-packet
# completeness and fixtures/support/scenario_matrix.yaml scenario
# scenario_row:incompatible_cache_profile.

schema_version: 1
case_id: escalation_case:incompatible_cache_profile.schema_drift
scenario_row_id: scenario_row:incompatible_cache_profile
finding_code: doctor.finding.cache_schema_version_drift
handoff_schema_ref: schemas/support/object_handoff_packet.schema.json
scoreboard_row_ref: scoreboard_row:escalation_completeness.incompatible_cache_profile

packet_shape:
  record_kind: object_handoff_packet_record
  support_packet_family_class: object_issue_handoff
  source_surface_class: workspace_diagnostics_sheet
  report_intent_class: support_request
  source_object:
    object_kind_class: cache_or_profile_row
    object_stable_id_required: true
    object_label_required: true

required_fields:
  build_context:
    - exact_build_identity_ref
    - install_mode_class
    - install_channel_class
  scope_and_boundary_context:
    - host_boundary_class
    - workspace_ref
    - deployment_profile_class
  evidence_and_recovery_context:
    - selected_evidence_refs
    - support_bundle_refs
    - recovery_rung_class
    - redaction_choice_class
  destination_context:
    - handoff_route_lane_class
    - handoff_transport_class
    - delivery_state_class
  provenance_bindings_required_refs:
    - scenario_row_ref
    - finding_code_ref
    - support_bundle_ref
    - cache_or_profile_row_ref

typed_unknown_allowed_fields:
  - route_context.invocation_session_id # allowed token: invocation_session_id_not_applicable
  - scope_and_boundary_context.target_identity_ref # allowed token: target_identity_ref_not_applicable
  - build_context.docs_pack_ref # allowed token: docs_pack_ref_unknown

redaction_default_class: metadata_only_embedded
redaction_widening_requires_consent: true

repair_linkage:
  suggested_repair_class: reset_ephemeral_cache
  preview_required: true
  rollback_expectation_class: exact_rollback_available
  repair_transaction_refs_required: true
  checkpoint_refs_required: true

forbidden_fields:
  - evidence_and_recovery_context.raw_profile_contents
  - evidence_and_recovery_context.raw_cache_body

completeness_outcome: complete
notes: >
  Only ephemeral derived caches may be reset. Authoritative profile
  data triggers the sibling finding
  doctor.finding.profile_portability_schema_mismatch, which defers to
  escalation rather than proposing an auto-reset.
emitted_at: 2026-04-23T00:00:00Z
