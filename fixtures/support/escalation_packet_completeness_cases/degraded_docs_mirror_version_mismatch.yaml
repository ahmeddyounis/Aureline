# Escalation-packet completeness case: degraded docs / mirror.
#
# Companion to docs/support/project_doctor_packet.md §Escalation-packet
# completeness and fixtures/support/scenario_matrix.yaml scenario
# scenario_row:degraded_docs_mirror.

schema_version: 1
case_id: escalation_case:degraded_docs_mirror.version_mismatch
scenario_row_id: scenario_row:degraded_docs_mirror
finding_code: doctor.finding.docs_pack_version_mismatch
handoff_schema_ref: schemas/support/object_handoff_packet.schema.json
scoreboard_row_ref: scoreboard_row:escalation_completeness.degraded_docs_mirror

packet_shape:
  record_kind: object_handoff_packet_record
  support_packet_family_class: object_issue_handoff
  source_surface_class: docs_help_surface
  report_intent_class: support_request
  source_object:
    object_kind_class: docs_pack_row
    object_stable_id_required: true
    object_label_required: true

required_fields:
  build_context:
    - exact_build_identity_ref
    - install_mode_class
    - install_channel_class
    - docs_pack_ref
    - docs_version_match_state
  scope_and_boundary_context:
    - host_boundary_class
    - deployment_profile_class
  evidence_and_recovery_context:
    - selected_evidence_refs
    - support_bundle_refs
    - recovery_rung_class
    - repair_transaction_refs
    - checkpoint_refs
    - redaction_choice_class
  destination_context:
    - handoff_route_lane_class
    - handoff_transport_class
    - delivery_state_class
  provenance_bindings_required_refs:
    - scenario_row_ref
    - finding_code_ref
    - support_bundle_ref
    - docs_pack_ref
    - mirror_snapshot_ref

typed_unknown_allowed_fields:
  - route_context.command_id # allowed token: command_id_not_applicable
  - route_context.invocation_session_id # allowed token: invocation_session_id_not_applicable
  - scope_and_boundary_context.target_identity_ref # allowed token: target_identity_ref_not_applicable
  - build_context.docs_pack_ref # allowed token: docs_pack_ref_unknown (only when mirror_snapshot_unknown_revision fires)

redaction_default_class: metadata_only_embedded
redaction_widening_requires_consent: true

repair_linkage:
  suggested_repair_class: refresh_docs_or_mirror_pack
  preview_required: true
  rollback_expectation_class: exact_rollback_available
  repair_transaction_refs_required: true
  checkpoint_refs_required: true

forbidden_fields:
  - evidence_and_recovery_context.raw_docs_authoring_source
  - evidence_and_recovery_context.raw_mirror_snapshot_private_metadata

completeness_outcome: complete
notes: >
  Docs/mirror escalations carry the docs pack ref, version-match
  state, and mirror snapshot id but never include raw docs authoring
  source. Refresh applies only to the governed mirror copy the
  release packet names.
emitted_at: 2026-04-23T00:00:00Z
