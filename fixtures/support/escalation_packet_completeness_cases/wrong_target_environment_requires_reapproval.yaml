# Escalation-packet completeness case: wrong target / environment.
#
# Companion to docs/support/project_doctor_packet.md §Escalation-packet
# completeness and fixtures/support/scenario_matrix.yaml scenario
# scenario_row:wrong_target_environment.

schema_version: 1
case_id: escalation_case:wrong_target_environment.requires_reapproval
scenario_row_id: scenario_row:wrong_target_environment
finding_code: doctor.finding.wrong_target_detected_requires_reapproval
handoff_schema_ref: schemas/support/object_handoff_packet.schema.json
scoreboard_row_ref: scoreboard_row:escalation_completeness.wrong_target_environment

packet_shape:
  record_kind: object_handoff_packet_record
  support_packet_family_class: object_issue_handoff
  source_surface_class: command_detail_sheet
  report_intent_class: support_request
  source_object:
    object_kind_class: command_invocation
    object_stable_id_required: true
    object_label_required: true

required_fields:
  build_context:
    - exact_build_identity_ref
    - install_mode_class
    - install_channel_class
  route_context:
    - command_id
    - invocation_session_id
    - action_origin_class
    - action_target_class
    - action_route_class
    - action_exposure_class
  scope_and_boundary_context:
    - host_boundary_class
    - target_identity_ref
    - workspace_ref
    - deployment_profile_class
    - region_scope
    - tenant_scope
    - key_mode
    - path_truth_class
  evidence_and_recovery_context:
    - selected_evidence_refs
    - support_bundle_refs
    - recovery_rung_class
    - repair_transaction_refs
    - checkpoint_refs
    - redaction_choice_class
    - withheld_artifact_refs
  destination_context:
    - support_route_ref
    - handoff_route_lane_class
    - handoff_transport_class
    - delivery_state_class
    - target_destination_descriptor_ref
  provenance_bindings_required_refs:
    - scenario_row_ref
    - finding_code_ref
    - route_packet_ref
    - support_bundle_ref
    - target_identity_ref

typed_unknown_allowed_fields:
  - build_context.docs_pack_ref # allowed token: docs_pack_ref_unknown

redaction_default_class: support_bundle_by_reference
redaction_widening_requires_consent: true

repair_linkage:
  suggested_repair_class: reapprove_target_or_route
  preview_required: true
  rollback_expectation_class: compensating_action_available
  repair_transaction_refs_required: true
  checkpoint_refs_required: true

forbidden_fields:
  - evidence_and_recovery_context.raw_terminal_history
  - evidence_and_recovery_context.raw_remote_workspace_contents
  - evidence_and_recovery_context.raw_credential_material

completeness_outcome: complete
notes: >
  Wrong-target escalations preserve route-packet, target-identity,
  tenant, region, and key-mode truth while keeping raw terminal
  history and workspace contents withheld. The packet routes to
  private support by default; public lanes require an explicit
  consent marker widening redaction.
emitted_at: 2026-04-23T00:00:00Z
