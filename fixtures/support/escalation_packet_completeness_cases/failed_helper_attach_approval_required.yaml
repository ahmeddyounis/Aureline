# Escalation-packet completeness case: failed helper attach.
#
# Companion to docs/support/project_doctor_packet.md §Escalation-packet
# completeness and fixtures/support/scenario_matrix.yaml scenario
# scenario_row:failed_helper_attach.

schema_version: 1
case_id: escalation_case:failed_helper_attach.approval_required
scenario_row_id: scenario_row:failed_helper_attach
finding_code: doctor.finding.helper_attach_approval_required
handoff_schema_ref: schemas/support/object_handoff_packet.schema.json
scoreboard_row_ref: scoreboard_row:escalation_completeness.failed_helper_attach

packet_shape:
  record_kind: object_handoff_packet_record
  support_packet_family_class: object_issue_handoff
  source_surface_class: remote_helper_attach_sheet
  report_intent_class: support_request
  source_object:
    object_kind_class: remote_helper_attach
    object_stable_id_required: true
    object_label_required: true

required_fields:
  build_context:
    - exact_build_identity_ref
    - install_mode_class
    - install_channel_class
  route_context:
    - command_id
    - invocation_session_id
    - action_origin_class
    - action_target_class
    - action_route_class
    - action_exposure_class
  scope_and_boundary_context:
    - host_boundary_class
    - target_identity_ref
    - deployment_profile_class
    - tenant_scope
    - key_mode
  evidence_and_recovery_context:
    - selected_evidence_refs
    - support_bundle_refs
    - recovery_rung_class
    - repair_transaction_refs
    - checkpoint_refs
    - redaction_choice_class
    - withheld_artifact_refs
  destination_context:
    - support_route_ref
    - handoff_route_lane_class
    - handoff_transport_class
    - delivery_state_class
  provenance_bindings_required_refs:
    - scenario_row_ref
    - finding_code_ref
    - support_bundle_ref
    - helper_attach_ref
    - approval_ticket_ref

typed_unknown_allowed_fields:
  - build_context.docs_pack_ref # allowed token: docs_pack_ref_unknown
  - scope_and_boundary_context.path_truth_class # allowed token: route_anchor_only

redaction_default_class: support_bundle_by_reference
redaction_widening_requires_consent: true

repair_linkage:
  suggested_repair_class: reattach_helper_with_new_approval
  preview_required: true
  rollback_expectation_class: compensating_action_available
  repair_transaction_refs_required: true
  checkpoint_refs_required: true

forbidden_fields:
  - evidence_and_recovery_context.raw_credential_material
  - evidence_and_recovery_context.raw_adapter_session_body
  - evidence_and_recovery_context.raw_terminal_history

completeness_outcome: complete
notes: >
  Helper-attach escalations keep the adapter session id and target
  identity visible while withholding raw credential material and
  adapter session bodies. Doctor does not reattach the helper from
  inside the packet flow; reapproval is a separate repair
  transaction.
