# Escalation-packet completeness case: missing toolchain.
#
# Companion to docs/support/project_doctor_packet.md §Escalation-packet
# completeness and fixtures/support/scenario_matrix.yaml scenario
# scenario_row:missing_toolchain.

schema_version: 1
case_id: escalation_case:missing_toolchain.required_component
scenario_row_id: scenario_row:missing_toolchain
finding_code: doctor.finding.toolchain_missing_required_component
handoff_schema_ref: schemas/support/object_handoff_packet.schema.json
scoreboard_row_ref: scoreboard_row:escalation_completeness.missing_toolchain

packet_shape:
  record_kind: object_handoff_packet_record
  support_packet_family_class: object_issue_handoff
  source_surface_class: command_detail_sheet
  report_intent_class: support_request
  source_object:
    object_kind_class: command_invocation
    object_stable_id_required: true
    object_label_required: true

required_fields:
  build_context:
    - exact_build_identity_ref
    - install_mode_class
    - install_channel_class
  route_context:
    - command_id
    - invocation_session_id
    - action_origin_class
    - action_target_class
    - action_route_class
    - action_exposure_class
  scope_and_boundary_context:
    - host_boundary_class
    - deployment_profile_class
  evidence_and_recovery_context:
    - selected_evidence_refs
    - support_bundle_refs
    - recovery_rung_class
    - redaction_choice_class
  destination_context:
    - handoff_route_lane_class
    - handoff_transport_class
    - delivery_state_class
  provenance_bindings_required_refs:
    - scenario_row_ref
    - finding_code_ref
    - support_bundle_ref

typed_unknown_allowed_fields:
  - route_context.invocation_session_id # allowed token: invocation_session_id_unknown
  - scope_and_boundary_context.target_identity_ref # allowed token: target_identity_ref_not_applicable
  - build_context.docs_pack_ref # allowed token: docs_pack_ref_unknown

redaction_default_class: metadata_only_embedded
redaction_widening_requires_consent: true

repair_linkage:
  suggested_repair_class: install_or_repair_toolchain
  preview_required: true
  rollback_expectation_class: compensating_action_available
  repair_transaction_refs_required: true
  checkpoint_refs_required: true

completeness_outcome: complete
notes: >
  A missing-toolchain escalation stays metadata-only by default: the
  scenario does not cross a trust, target, or helper boundary, so
  support bundles may embed metadata and the exported packet carries
  no raw credentials or route bodies. The toolchain manifest row and
  install/repair preview transaction refs are the authoritative
  evidence.
emitted_at: 2026-04-23T00:00:00Z
