# Escalation-packet completeness case: blocked trust state.
#
# Companion to docs/support/project_doctor_packet.md §Escalation-packet
# completeness and fixtures/support/scenario_matrix.yaml scenario
# scenario_row:blocked_trust_state.

schema_version: 1
case_id: escalation_case:blocked_trust_state.approval_expired
scenario_row_id: scenario_row:blocked_trust_state
finding_code: doctor.finding.trust_state_approval_expired
handoff_schema_ref: schemas/support/object_handoff_packet.schema.json
scoreboard_row_ref: scoreboard_row:escalation_completeness.blocked_trust_state

packet_shape:
  record_kind: object_handoff_packet_record
  support_packet_family_class: object_issue_handoff
  source_surface_class: trust_warning_surface
  report_intent_class: support_request
  source_object:
    object_kind_class: approval_ticket
    object_stable_id_required: true
    object_label_required: true

required_fields:
  build_context:
    - exact_build_identity_ref
    - install_mode_class
    - install_channel_class
  route_context:
    - command_id
    - invocation_session_id
    - action_origin_class
    - action_target_class
    - action_route_class
    - action_exposure_class
  scope_and_boundary_context:
    - host_boundary_class
    - target_identity_ref
    - deployment_profile_class
    - tenant_scope
    - key_mode
  evidence_and_recovery_context:
    - selected_evidence_refs
    - support_bundle_refs
    - recovery_rung_class
    - redaction_choice_class
  destination_context:
    - support_route_ref
    - handoff_route_lane_class
    - handoff_transport_class
    - delivery_state_class
  provenance_bindings_required_refs:
    - scenario_row_ref
    - finding_code_ref
    - support_bundle_ref
    - approval_ticket_ref

typed_unknown_allowed_fields:
  - scope_and_boundary_context.path_truth_class # allowed token: route_anchor_only
  - build_context.docs_pack_ref # allowed token: docs_pack_ref_unknown

redaction_default_class: support_bundle_by_reference
redaction_widening_requires_consent: true

repair_linkage:
  suggested_repair_class: reacquire_trust_approval
  preview_required: true
  rollback_expectation_class: compensating_action_available
  repair_transaction_refs_required: true
  checkpoint_refs_required: true

forbidden_fields:
  # These fields MUST NOT appear in the exported packet for this
  # scenario; inclusion is a redaction violation.
  - evidence_and_recovery_context.raw_credential_material
  - evidence_and_recovery_context.raw_terminal_history
  - evidence_and_recovery_context.raw_approval_ticket_secret

completeness_outcome: complete
notes: >
  Trust-state escalations default to support_bundle_by_reference: the
  exported packet carries ticket ids, policy epoch, and bundle refs,
  but never raw credential material or raw approval-ticket secrets.
  Widening redaction requires a consent marker on the packet.
emitted_at: 2026-04-23T00:00:00Z
