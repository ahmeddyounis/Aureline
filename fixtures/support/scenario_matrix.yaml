# -----------------------------------------------------------------------------
# Promotion.
# -----------------------------------------------------------------------------
promotion_process:
  seed_milestone: foundations
  promotion_forum: support_review
  promotion_rule: >
    Moving a finding_code off status "seeded" or adding a non-observe-
    only repair class outside the frozen vocabulary requires the
    support-review forum. Repurposing an existing finding_code is
    breaking and requires a new decision row in
    artifacts/governance/decision_index.yaml.
  additive_minor_rule: >
    Adding a new finding row under an existing scenario family is
    additive-minor provided the new row reuses existing
    probe_family_class, repair_class, and recovery_rung_class tokens
    and either cites an existing escalation_packet_case_ref or
    explicitly declares null with reason_when_absent.

