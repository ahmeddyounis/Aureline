coverage:
  by_scenario_family:
    missing_toolchain:
      - doctor.finding.toolchain_missing_required_component
      - doctor.finding.toolchain_version_out_of_range
      - doctor.finding.toolchain_observe_only_baseline
    blocked_trust_state:
