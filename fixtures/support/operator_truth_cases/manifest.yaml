schema_version: 1
manifest_id: support.operator_truth_packet_cases.v1
status: seeded

contract_source: docs/support/operator_truth_packet.md
packet_schema: schemas/support/operator_truth_packet.schema.json

rules:
  - Packets are export-safe by construction: raw secrets, raw provider payloads, raw URLs, raw hostnames, raw command lines, raw environment bodies, and raw content bodies do not appear.
  - Every major block is present or explicitly omitted via omitted_block_marker; omissions never masquerade as empty objects.
  - Packets remain joinable to canonical command, route, target-graph, approval, capability, and build identities via stable opaque refs.

case_files:
  - file: local_only_action.yaml
    scenario_class: local_only_action
    coverage:
      - local_route_tokens_present
      - target_graph_state_embedded
      - approval_and_capability_not_applicable_marked
  - file: provider_routed_action.yaml
    scenario_class: provider_routed_action
    coverage:
      - browser_handoff_route_tokens_present
      - host_boundary_cue_browser_handoff_return
  - file: browser_handoff_continuation.yaml
    scenario_class: browser_handoff_continuation
    coverage:
      - authority_linkage_via_browser_handoff_packet
      - invocation_outcome_preserved
  - file: wrong_target_attempt.yaml
    scenario_class: wrong_target_attempt
    coverage:
      - route_change_reason_wrong_target_detected
      - wrong_target_state_requires_reapproval
  - file: reapproval_required_mutation.yaml
    scenario_class: reapproval_required_mutation
    coverage:
      - approval_ticket_and_events_embedded
      - replay_blocked_reason_codes_visible
  - file: missing_capability.yaml
    scenario_class: missing_capability
    coverage:
      - disabled_reason_code_capability_disabled_by_policy
      - capability_sheet_snapshot_embedded
  - file: degraded_local_fallback_after_service_impairment.yaml
    scenario_class: degraded_local_fallback_after_service_impairment
    coverage:
      - connectivity_state_snapshot_embedded
      - managed_workspace_degraded_reason_visible
      - target_graph_hybrid_partial_state_visible

