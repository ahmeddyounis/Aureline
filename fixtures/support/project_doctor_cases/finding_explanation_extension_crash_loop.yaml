# yaml-language-server: $schema=../../../schemas/support/doctor_explanation.schema.json
# Project Doctor explanation seed: extension crash-loop safe-mode handoff.

doctor_explanation_schema_version: 1
record_kind: doctor_explanation_packet_record
explanation_packet_id: doctor.explanation.extension_host.crash_loop_quarantined
finding_id: finding:extension.crash_loop.safe_mode
finding_code: doctor.finding.extension_host_crash_loop_quarantined
rule_id: doctor.rule.extension_runtime.crash_loop_safe_mode

probe:
  probe_id: doctor.probe.extension_runtime.crash_loop
  probe_version: probe.extension_runtime.crash_loop.v1
  probe_catalog_ref: schemas/support/probe_catalog_entry.schema.json#doctor.probe.extension_runtime.crash_loop

confidence:
  confidence_class: observed_authoritative
  confidence_score: 0.98
  confidence_reason_class: corroborated_by_independent_evidence
  remaining_unknowns: []

affected_contract_ids:
  - docs/support/project_doctor_packet.md#seeded-scenario-families
  - fixtures/support/scenario_matrix.yaml#scenario_row:extension_regression
  - docs/support/recovery_ladder_packet.md
  - docs/support/repair_transaction_contract.md
  - docs/support/object_handoff_packet.md
  - docs/support/project_doctor_probe_contract.md

evidence_refs:
  - evidence_ref: evidence:extension.health.crash_loop.0001
    evidence_role_class: primary
    signal_class: health_event
    supports_text_key: doctor.explanation.extension_crash_loop.observed
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
  - evidence_ref: evidence:recovery.safe_mode.session.0001
    evidence_role_class: corroborating
    signal_class: probe_observation
    supports_text_key: doctor.explanation.extension_crash_loop.belief_basis
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
  - evidence_ref: evidence:extension.manifest.version_set.0001
    evidence_role_class: corroborating
    signal_class: manifest
    supports_text_key: doctor.explanation.extension_crash_loop.expected
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_reference
    replayability_class: replayable_from_refs

explanation_text_keys:
  message_catalog_ref: schemas/ux/message_catalog_entry.schema.json#doctor.extension_crash_loop
  title_key: doctor.explanation.extension_crash_loop.title
  summary_key: doctor.explanation.extension_crash_loop.summary
  expected_key: doctor.explanation.extension_crash_loop.expected
  observed_key: doctor.explanation.extension_crash_loop.observed
  belief_basis_key: doctor.explanation.extension_crash_loop.belief_basis
  confidence_key: doctor.explanation.extension_crash_loop.confidence
  next_action_key: doctor.explanation.extension_crash_loop.next_action
  remaining_unknowns_key: doctor.explanation.extension_crash_loop.remaining_unknowns

explanation_factors:
  - factor_id: factor.extension_crash_loop.expected
    factor_class: expected_state
    text_key: doctor.explanation.extension_crash_loop.expected
    evidence_refs:
      - evidence:extension.manifest.version_set.0001
    summary: >
      Extension hosts are expected to start within the strike budget
      declared by the runtime health contract.
  - factor_id: factor.extension_crash_loop.observed
    factor_class: observed_state
    text_key: doctor.explanation.extension_crash_loop.observed
    evidence_refs:
      - evidence:extension.health.crash_loop.0001
    summary: >
      The host exceeded its crash budget and the supervisor opened the
      workspace in safe mode.
  - factor_id: factor.extension_crash_loop.next_action
    factor_class: next_action_reason
    text_key: doctor.explanation.extension_crash_loop.next_action
    evidence_refs:
      - evidence:recovery.safe_mode.session.0001
    summary: >
      Bisect and quarantine keep the suspect host disabled while local
      editing and support export remain available.

governed_next_actions:
  - action_id: action.extension_crash_loop.start_bisect
    action_class: start_extension_bisect
    recommendation_class: primary
    governed_action_ref: recovery_action:extension_bisect.crash_loop
    approval_posture: user_review_required
    rollback_ref: rollback:extension_enablement.previous_state
    checkpoint_ref: checkpoint:extension-bisect:seed
    repair_transaction_ref: repair_transaction:extension_isolation.quarantine_crash_loop
    runbook_ref: docs/support/runbook_execution_contract.md#runbook-step-result-records
    help_article_ref: docs/support/support_center_concept.md
    support_bundle_ref: support_bundle:desktop.safe_mode.extension_crash_loop
    escalation_packet_ref: fixtures/support/escalation_packet_completeness_cases/extension_regression_crash_loop_quarantined.yaml
    reason_key: doctor.explanation.extension_crash_loop.action.start_bisect.reason
  - action_id: action.extension_crash_loop.export_packet
    action_class: create_escalation_packet
    recommendation_class: fallback
    governed_action_ref: escalation_packet:desktop.extension_crash_loop
    approval_posture: user_consent_required
    rollback_ref: null
    checkpoint_ref: null
    repair_transaction_ref: null
    runbook_ref: docs/support/runbook_execution_contract.md
    help_article_ref: docs/support/support_center_concept.md
    support_bundle_ref: support_bundle:desktop.safe_mode.extension_crash_loop
    escalation_packet_ref: fixtures/support/escalation_packet_completeness_cases/extension_regression_crash_loop_quarantined.yaml
    reason_key: doctor.explanation.extension_crash_loop.action.export_packet.reason

repair_handoff:
  safe_mode_ref: recovery_action:safe_mode.crash_loop_entry
  bisect_ref: recovery_action:extension_bisect.crash_loop
  recovery_rung_ref: recovery_rung:extension_bisect
  repair_transaction_refs:
    - repair_transaction:extension_isolation.quarantine_crash_loop
  runbook_refs:
    - docs/support/runbook_execution_contract.md
  help_article_refs:
    - docs/support/support_center_concept.md
  support_bundle_refs:
    - support_bundle:desktop.safe_mode.extension_crash_loop
  escalation_packet_refs:
    - fixtures/support/escalation_packet_completeness_cases/extension_regression_crash_loop_quarantined.yaml
  approval_posture: user_review_required
  rollback_refs:
    - rollback:extension_enablement.previous_state
  checkpoint_refs:
    - checkpoint:extension-bisect:seed
  default_next_action_id: action.extension_crash_loop.start_bisect
  handoff_contract_refs:
    - schemas/support/recovery_action.schema.json
    - schemas/support/repair_transaction.schema.json
    - schemas/support/object_handoff_packet.schema.json
    - schemas/support/runbook_packet.schema.json

no_hidden_probe_side_effects:
  source_probe_catalog_ref: schemas/support/probe_catalog_entry.schema.json#doctor.probe.extension_runtime.crash_loop
  mutability_class: non_mutating_read_only
  doctor_admission_class: admitted_safe_probe
  allowed_side_effects:
    - read_existing_metadata
    - hash_existing_artifact
  forbidden_side_effects:
    - execute_repo_owned_code
    - mutate_cache_or_index
    - mutate_target_or_route
    - mutate_user_files
    - mutate_trust_policy_or_credentials
    - external_service_mutation
    - activate_third_party_extension
    - collect_high_risk_payload
  repair_required_for_mutation: false

packet_status: repair_preview_ready
emitted_at: "2026-04-29T00:00:00Z"
