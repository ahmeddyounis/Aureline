        locally under the managed policy lock.
  prohibited_items_confirmed_absent:
    - support.item.raw_secrets
    - support.item.full_shell_history
  applied_rule_refs:
    - support.redaction.local_first_default.metadata_core
    - support.redaction.local_first_default.high_risk_local
    - policy-bundle:managed-support-narrowing:0044
  secret_scan_summary:
    scan_state: blocked_by_policy
    detected_marker_count: 0
    raw_secret_values_exported: false
    notes: >
      Policy blocked trace payload export before raw trace scanning was
      needed for the shared bundle.
  reviewer_visible_summary: >
    The bundle shares metadata and the trace manifest only; the trace
    payload remains local because policy locked it.
actionability_warnings:
  - warning_id: support-warning:policy-locked:trace-local-only
    preview_item_id: support.preview.item.policy_locked.runtime_trace
    impact_class: medium
    warning_text: >
      The exported bundle may not support first-pass trace diagnosis
      because the high-risk trace payload is retained locally.
    required_before_export: false
    acknowledged_by_ref: null
