    selected_redaction_state: not_required_metadata
    decided_by_class: default_rule
    decision_reason: Metadata-only exact-build truth is required.
    actionability_warning_ack_ref: null
  - preview_item_id: support.preview.item.policy_locked.runtime_trace
    support_pack_item_id: support.item.runtime_traces
    decision_class: omitted_policy_locked
    selected_redaction_state: policy_locked
    decided_by_class: admin_policy
    decision_reason: >
      Managed policy blocks trace payload export and permits only a
      retained local copy plus trace manifest reference.
    actionability_warning_ack_ref: support-warning:policy-locked:trace-local-only
excluded_classes:
  - data_class: high_risk
    high_risk_content_class: raw_trace_or_transcript
    support_pack_item_id: support.item.runtime_traces
    artifact_kind_class: trace_capture
    exclusion_reason_class: policy_denied
    explicit_reason: >
      Trace payload bytes are retained locally because managed policy
      denies export during restricted support mode.
    policy_ref: policy-bundle:managed-support-narrowing:0044
    omission_marker_ref: omission:policy-locked:runtime-trace
redaction_report:
  report_id: redaction_report:policy_locked_trace
  redaction_profile_ref: support.redaction.local_first_default
  redaction_pass_ref: redaction-pass:policy-locked-trace:0001
