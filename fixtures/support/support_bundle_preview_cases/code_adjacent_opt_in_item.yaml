# yaml-language-server: $schema=../../../schemas/support/support_bundle_manifest.schema.json
collection_schema_version: 1
record_kind: support_bundle_manifest_record
manifest_id: support.bundle.manifest.code_adjacent.opt_in
support_bundle_id: support-bundle:code-adjacent-opt-in:0001
title: Code-adjacent support item opt-in preview
build_identity:
  build_id: build-id:aureline:preview:code-adjacent:0001
  producer_build_id: build-id:aureline:preview:code-adjacent:0001
  product_version: 0.0.0-preview-contract
  release_channel_class: preview
  exact_build_refs:
    - build-id:aureline:preview:code-adjacent:0001
collection_context:
  generated_at: "2026-04-29T05:15:00Z"
  actor_class: support_center_preview
  active_redaction_profile_ref: support.redaction.local_first_default
  collection_intent: >
    Preview a bundle where a user intentionally selects a bounded,
    sanitized code-adjacent excerpt after local review.
  policy_context:
    policy_epoch: 2
    trust_state: trusted
    policy_bundle_ref: policy-bundle:local-default:0002
  policy_notes:
    - note_id: support.preview.policy.code_adjacent.item_level_opt_in
      severity: warning
      source_ref: support.rule.code_adjacent_manual_selection
      note: >
        Code-adjacent evidence remains excluded by default and enters
        the bundle only by exact item-level opt-in.
preview_items:
  - support_bundle_preview_item_schema_version: 1
    record_kind: support_bundle_preview_item_record
    preview_item_id: support.preview.item.code_adjacent.build_identity
    title: Exact build and install identity
    file_section_identity:
      section_id: support.preview.section.build_install
      bundle_section_class: build_and_install_truth
      artifact_kind_class: exact_build_identity_manifest
      preview_label: Exact build metadata
      manifest_path_ref: preview_items[0]
      bundle_member_path_ref: manifest/build_identity.json
      source_refs:
        - docs/build/exact_build_identity_model.md
        - artifacts/support/support_evidence_pack_matrix.yaml#support.item.build_identity
    size_estimate:
      estimated_bytes: 4096
      confidence_class: estimated
      display_label: 4 KB
      size_source_class: collector_estimate
    redaction:
      data_class: metadata_only
      high_risk_content_class: not_applicable
      redaction_class: metadata_safe_default
      redaction_state: not_required_metadata
      visible_high_risk_label: null
      redaction_rule_refs:
        - support.redaction.local_first_default.metadata_core
      redaction_summary_ref: redaction_report:code_adjacent_opt_in
    materialization:
      support_export_posture: included_by_default
      storage_mode: embedded_export_copy
      embedding_state: embedded
      collection_source_class: generated_by_exporter
      body_available_in_preview: true
      representation_label: metadata manifest
      digest_ref: digest:preview-item:code-adjacent:build-identity
    deselectability:
      can_deselect: false
      deselection_rule_class: blocked_required_for_diagnosis
      stronger_redaction_available: false
      allowed_stronger_redaction_states: []
      locked_reason: Exact-build identity is required for support intake.
      warning_required_before_deselect: false
    actionability_impact:
      impact_class: blocks_first_actionable_diagnosis
      affects_first_actionable_diagnosis: true
      warning_required: false
      warning_text: null
      impact_summary: >
        Removing build identity would break exact-build joins for the
        selected evidence.
    parity_binding:
      support_pack_item_id: support.item.build_identity
      inclusion_rule_ref: support.item.build_identity.included_by_default
      export_manifest_field_ref: preview_items[0]
      preview_decision_ref: review_decisions[0]
      item_digest_ref: digest:preview-item:code-adjacent:build-identity
      exact_build_identity_refs:
        - build-id:aureline:preview:code-adjacent:0001
      post_export_reconstruction_fields:
        - preview_item_id
        - parity_binding.support_pack_item_id
        - materialization.digest_ref
    policy_lock:
      locked_by_policy: false
      reason_class: not_locked
      policy_ref: null
      reason_summary: No policy lock applies to metadata-only build identity.
    notes: >
      The build row remains metadata-only even when a separate
      code-adjacent item is selected.

  - support_bundle_preview_item_schema_version: 1
    record_kind: support_bundle_preview_item_record
    preview_item_id: support.preview.item.code_adjacent.selected_snippet
    title: User-selected sanitized code excerpt
    file_section_identity:
      section_id: support.preview.section.user_selected_evidence
      bundle_section_class: user_selected_evidence
      artifact_kind_class: code_snippet_attachment
      preview_label: Selected code excerpt
      manifest_path_ref: preview_items[1]
      bundle_member_path_ref: evidence/selected_snippet.redacted.txt
      source_refs:
        - user-selection:editor-range:case-0001
        - artifacts/support/support_evidence_pack_matrix.yaml#support.item.user_selected_code
    size_estimate:
      estimated_bytes: 1536
      confidence_class: upper_bound
      display_label: up to 2 KB
      size_source_class: upper_bound_policy
    redaction:
      data_class: code_adjacent
      high_risk_content_class: not_applicable
      redaction_class: internal_support_restricted
      redaction_state: sanitized_snapshot
      visible_high_risk_label: null
      redaction_rule_refs:
        - support.redaction.local_first_default.review_code
        - support.rule.code_adjacent_manual_selection
      redaction_summary_ref: redaction_report:code_adjacent_opt_in
    materialization:
      support_export_posture: excluded_by_default
      storage_mode: embedded_export_copy
      embedding_state: redacted
      collection_source_class: source_selected_by_user
      body_available_in_preview: true
      representation_label: sanitized selected range
      digest_ref: digest:preview-item:code-adjacent:selected-snippet
    deselectability:
      can_deselect: true
      deselection_rule_class: deselect_allowed_with_actionability_warning
      stronger_redaction_available: true
      allowed_stronger_redaction_states:
        - redacted_summary
        - retained_local_only
        - omitted_pending_opt_in
      locked_reason: null
      warning_required_before_deselect: true
    actionability_impact:
      impact_class: high
      affects_first_actionable_diagnosis: true
      warning_required: true
      warning_text: >
        Removing the selected excerpt may leave support with metadata
        but no local reproduction context for the reported parser issue.
      impact_summary: >
        This exact selected range is the only code-adjacent evidence in
        the bundle; the preview prevents widening beyond the selection.
    parity_binding:
      support_pack_item_id: support.item.user_selected_code
      inclusion_rule_ref: support.rule.code_adjacent_manual_selection
      export_manifest_field_ref: preview_items[1]
      preview_decision_ref: review_decisions[1]
      item_digest_ref: digest:preview-item:code-adjacent:selected-snippet
      exact_build_identity_refs:
        - build-id:aureline:preview:code-adjacent:0001
      post_export_reconstruction_fields:
        - preview_item_id
        - parity_binding.support_pack_item_id
        - redaction.redaction_state
        - materialization.representation_label
        - materialization.digest_ref
        - review_decisions[1]
    policy_lock:
      locked_by_policy: false
      reason_class: not_locked
      policy_ref: null
      reason_summary: >
        Local policy permits this exact sanitized selection after
        explicit item-level opt-in.
    notes: >
      The item is code-adjacent, opt-in only, bounded to one selected
      range, and may be removed or further redacted before export.

review_decisions:
  - preview_item_id: support.preview.item.code_adjacent.build_identity
    support_pack_item_id: support.item.build_identity
    decision_class: included_default
    selected_redaction_state: not_required_metadata
    decided_by_class: default_rule
    decision_reason: Metadata-only exact-build truth is required.
    actionability_warning_ack_ref: null
  - preview_item_id: support.preview.item.code_adjacent.selected_snippet
    support_pack_item_id: support.item.user_selected_code
    decision_class: included_after_opt_in
    selected_redaction_state: sanitized_snapshot
    decided_by_class: user_choice
    decision_reason: >
      The reviewer selected this exact redacted range and did not grant
      surrounding-file or workspace-wide capture.
    actionability_warning_ack_ref: support-warning:code-adjacent:selected-snippet
excluded_classes:
  - data_class: high_risk
    high_risk_content_class: secret_bearing
    support_pack_item_id: support.item.raw_secrets
    artifact_kind_class: raw_secret_capture
    exclusion_reason_class: prohibited_secret_or_token
    explicit_reason: Raw secret values have no support-bundle consent path.
    policy_ref: support.rule.raw_secret_never_export
    omission_marker_ref: omission:code-adjacent:raw-secrets
redaction_report:
  report_id: redaction_report:code_adjacent_opt_in
  redaction_profile_ref: support.redaction.local_first_default
  redaction_pass_ref: redaction-pass:code-adjacent-opt-in:0001
  redaction_states_present:
    - not_required_metadata
    - sanitized_snapshot
  high_risk_items: []
  prohibited_items_confirmed_absent:
    - support.item.raw_secrets
    - support.item.full_shell_history
  applied_rule_refs:
    - support.redaction.local_first_default.metadata_core
    - support.redaction.local_first_default.review_code
    - support.rule.code_adjacent_manual_selection
  secret_scan_summary:
    scan_state: passed_with_redaction_markers
    detected_marker_count: 1
    raw_secret_values_exported: false
    notes: >
      One token-like span inside the selected range was replaced by a
      redaction marker before the sanitized snapshot was admitted.
  reviewer_visible_summary: >
    One code-adjacent row is included only because the reviewer opted
    into the exact sanitized selection; raw secrets remain absent.
preview_classification_summary:
  included_count: 2
  excluded_count: 1
  retained_local_only_count: 0
  prohibited_count: 0
  data_classes_present:
    - metadata_only
    - code_adjacent
    - high_risk
  redaction_states_present:
    - not_required_metadata
    - sanitized_snapshot
  included_support_pack_item_ids:
    - support.item.build_identity
    - support.item.user_selected_code
  excluded_support_pack_item_ids:
    - support.item.raw_secrets
  summary: >
    The preview includes exact-build metadata and one reviewed
    code-adjacent selection while keeping raw secrets excluded.
redaction_controls:
  - control_id: redaction-control:support.item.build_identity
    preview_item_id: support.preview.item.code_adjacent.build_identity
    support_pack_item_id: support.item.build_identity
    default_redaction_state: not_required_metadata
    selected_redaction_state: not_required_metadata
    allowed_narrower_states:
      - redacted_summary
      - retained_local_only
    broadening_requires_review: true
    raw_content_export_allowed: false
    policy_locked: false
    control_note: >
      Reviewer may narrow metadata rows; broadening beyond metadata
      requires a reviewed path.
  - control_id: redaction-control:support.item.user_selected_code
    preview_item_id: support.preview.item.code_adjacent.selected_snippet
    support_pack_item_id: support.item.user_selected_code
    default_redaction_state: omitted_pending_opt_in
    selected_redaction_state: sanitized_snapshot
    allowed_narrower_states:
      - redacted_summary
      - retained_local_only
    broadening_requires_review: true
    raw_content_export_allowed: false
    policy_locked: false
    control_note: >
      Reviewer may retain or omit this row locally; raw content export
      is not available here.
action_reconstruction_contexts: []
actionability_warnings:
  - warning_id: support-warning:code-adjacent:selected-snippet
    preview_item_id: support.preview.item.code_adjacent.selected_snippet
    impact_class: high
    warning_text: >
      Deselecting this row would remove the only reproduction context
      and may reduce the first actionable diagnosis path.
    required_before_export: false
    acknowledged_by_ref: reviewer:local:case-code-adjacent
reopen_after_export_path:
  manifest_member_path: support/manifest.yaml
  local_reopen_ref: support-preview:code-adjacent-opt-in:0001
  product_route_ref: aureline://support/bundles/code-adjacent-opt-in-0001/preview
  can_reopen_without_network: true
  preserved_preview_snapshot_ref: preview-snapshot:support:code-adjacent-opt-in:0001
  notes: >
    Reopening the preview shows the selected range, redaction marker,
    opt-in decision, and no surrounding file context.
preview_export_parity:
  preview_snapshot_ref: preview-snapshot:support:code-adjacent-opt-in:0001
  preview_item_order_digest: digest:preview-order:code-adjacent-opt-in
  export_manifest_digest: digest:export-manifest:code-adjacent-opt-in
  manifest_reconstructs_shared_payload: true
  reconstruction_fields:
    - build_identity.exact_build_refs
    - preview_items[].preview_item_id
    - preview_items[].parity_binding.support_pack_item_id
    - preview_items[].redaction
    - review_decisions[]
    - actionability_warnings[]
    - redaction_report.secret_scan_summary
    - preview_classification_summary
    - redaction_controls[]
    - action_reconstruction_contexts[]
  item_decision_refs:
    - review_decisions[0]
    - review_decisions[1]
  unknown_field_policy: preserve_unknown_unless_redacted
  parity_assertions:
    - code_adjacent_item_requires_item_level_opt_in
    - selected_range_does_not_widen_to_file_or_workspace
    - redaction_marker_survives_export_manifest
emitted_at: "2026-04-29T05:15:01Z"
notes: >
  This case proves code-adjacent evidence can be reviewed locally,
  explicitly opted in, strongly redacted, or removed without hidden
  capture of surrounding source.
