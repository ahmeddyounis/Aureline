# Project Doctor probe-descriptor and finding-card case manifest.

schema_version: 1
manifest_id: support.project_doctor.probe_descriptor_cases.v1
status: seeded
overview_page: docs/support/project_doctor_probe_contract.md

schema_refs:
  doctor_probe_schema: schemas/support/doctor_probe.schema.json
  doctor_finding_card_schema: schemas/support/doctor_finding_card.schema.json
  probe_catalog_entry_schema: schemas/support/probe_catalog_entry.schema.json
  doctor_explanation_schema: schemas/support/doctor_explanation.schema.json
  doctor_finding_schema: schemas/support/doctor_finding.schema.json

contract_refs:
  project_doctor_probe_contract: docs/support/project_doctor_probe_contract.md
  project_doctor_packet: docs/support/project_doctor_packet.md
  recovery_ladder_packet: docs/support/recovery_ladder_packet.md
  repair_transaction_contract: docs/support/repair_transaction_contract.md
  runbook_execution_contract: docs/support/runbook_execution_contract.md
  support_center_information_architecture: docs/support/support_center_information_architecture.md
  supportability_adr: docs/architecture/supportability_adr.md

case_pairs:
  - probe: probe_missing_toolchain_read_only.yaml
    card: finding_card_missing_toolchain.yaml
    scenario_family: missing_toolchain
    probe_family_class: execution_context_toolchains
    probe_class: read_only_inspection
    invocation_policy: automatic
  - probe: probe_trust_policy_block_read_only.yaml
    card: finding_card_trust_policy_block.yaml
    scenario_family: trust_policy_identity_approval_block
    probe_family_class: trust_identity_policy
    probe_class: read_only_inspection
    invocation_policy: automatic
  - probe: probe_filesystem_watcher_health_read_only.yaml
    card: finding_card_filesystem_watcher_exhaustion.yaml
    scenario_family: broken_watcher
    probe_family_class: filesystem_watchers
    probe_class: read_only_inspection
    invocation_policy: automatic
  - probe: probe_proxy_or_ca_environment_check.yaml
    card: finding_card_proxy_or_ca_failure.yaml
    scenario_family: network_ca_proxy_mirror_failure
    probe_family_class: network_proxy_ca_transport
    probe_class: environment_check
    invocation_policy: with_user_consent
  - probe: probe_extension_regression_read_only.yaml
    card: finding_card_extension_regression.yaml
    scenario_family: extension_regression
    probe_family_class: extension_runtime_health
    probe_class: read_only_inspection
    invocation_policy: automatic
  - probe: probe_schema_drift_repair_preview.yaml
    card: finding_card_schema_drift_repair_preview.yaml
    scenario_family: incompatible_cache_profile_schema_drift
    probe_family_class: caches_schema_local_state
    probe_class: repair_preview
    invocation_policy: with_user_consent
  - probe: probe_local_history_corruption_unsafe.yaml
    card: finding_card_local_history_corruption_refusing.yaml
    scenario_family: local_history_corruption
    probe_family_class: caches_schema_local_state
    probe_class: unsafe_or_unsupported
    invocation_policy: never_without_explicit_invocation
  - probe: probe_remote_target_mismatch_simulation.yaml
    card: finding_card_remote_target_mismatch.yaml
    scenario_family: wrong_target_or_environment
    probe_family_class: remote_routes_collaboration
    probe_class: simulation
    invocation_policy: automatic_inferring_only

required_case_assertions:
  - every_descriptor_declares_one_probe_class_from_the_closed_five_set
  - every_descriptor_declares_one_invocation_policy_from_the_closed_five_set
  - automatic_run_gate_is_permitted_only_for_read_only_or_environment_check_or_simulation
  - repair_preview_descriptors_never_apply_only_materialise_local_preview_manifests
  - unsafe_or_unsupported_descriptors_are_never_runnable_from_doctor
  - every_finding_card_declares_one_card_posture_from_the_closed_six_set
  - finding_cards_link_safe_mode_bisect_repair_preview_support_bundle_and_export_packet_refs_or_explicit_null
  - finding_cards_label_unsupported_state_when_diagnosis_posture_is_refusing_unsupported
  - every_descriptor_and_card_carries_exactly_four_headless_parity_rows
  - desktop_and_cli_headless_rows_share_finding_id_finding_code_probe_id_probe_class_and_exit_code_class
  - unimplemented_or_unsupported_rows_are_labelled_rather_than_dropped

notes: >
  These cases are reviewer-facing seeds. They make the Project Doctor
  read-only-by-default rule, the closed probe-class taxonomy, and the
  desktop-versus-headless parity contract concrete before any live
  Doctor runtime exists. Each row carries a deliberate parity gap so
  reviewers can see what is implemented, planned, consent-gated,
  managed-only, or unsupported per support context.
