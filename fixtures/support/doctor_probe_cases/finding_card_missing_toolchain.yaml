# yaml-language-server: $schema=../../../schemas/support/doctor_finding_card.schema.json
# Finding card: missing required toolchain component. Read-only diagnosis
# with a repair-preview handoff. Doctor does not install, upgrade, or
# rewrite PATH; the suggested next action opens the reviewed repair
# preview that carries any mutation.

doctor_finding_card_schema_version: 1
record_kind: doctor_finding_card_record

card_id: doctor_card:missing_toolchain.required_component
finding_id: finding:missing_toolchain.required_component.0001
finding_code: doctor.finding.toolchain_missing_required_component
rule_id: doctor.rule.execution_context.required_component_missing
probe_id: doctor.probe.execution_context.toolchain_resolution
probe_descriptor_ref: fixtures/support/doctor_probe_cases/probe_missing_toolchain_read_only.yaml

card_posture_class: read_only_diagnosis
confidence_class: observed_authoritative
confidence_score: 0.96
diagnosis_posture: proving_diagnosis

affected_scope:
  scope_class: workspace
  scope_ref: workspace:resolved_target.execution_context.0001
  support_context_class: desktop

root_cause_class: missing_toolchain_component

evidence_sources:
  - evidence_ref: evidence:execution_context.required_toolchain.0001
    source_class: existing_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_reference
    replayability_class: replayable_from_refs
    supports_card_field: observed_state
  - evidence_ref: evidence:execution_context.resolution_policy.0001
    source_class: policy_decision
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: belief_basis
  - evidence_ref: evidence:execution_context.expected_toolchain_set.0001
    source_class: existing_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: expected_state

unsupported_state_note:
  unsupported_state_class: none
  note_text_key: doctor.finding_card.missing_toolchain.unsupported_state.none
  remediation_text_key: doctor.finding_card.missing_toolchain.unsupported_state.none.remediation

remaining_unknowns: []

card_text_keys:
  message_catalog_ref: schemas/ux/message_catalog_entry.schema.json#doctor.missing_toolchain
  title_key: doctor.finding_card.missing_toolchain.title
  summary_key: doctor.finding_card.missing_toolchain.summary
  expected_state_key: doctor.finding_card.missing_toolchain.expected_state
  observed_state_key: doctor.finding_card.missing_toolchain.observed_state
  belief_basis_key: doctor.finding_card.missing_toolchain.belief_basis
  confidence_key: doctor.finding_card.missing_toolchain.confidence
  root_cause_key: doctor.finding_card.missing_toolchain.root_cause
  remaining_unknowns_key: doctor.finding_card.missing_toolchain.remaining_unknowns
  next_action_key: doctor.finding_card.missing_toolchain.next_action
  unsupported_state_key: doctor.finding_card.missing_toolchain.unsupported_state

suggested_next_action:
  action_id: action.missing_toolchain.open_repair_preview
  action_class: open_repair_preview
  approval_posture: user_review_required
  reason_text_key: doctor.finding_card.missing_toolchain.next_action.reason
  rollback_ref: rollback:execution_context.previous_resolved_set
  checkpoint_ref: checkpoint:execution_context.toolchain_resolution.seed

linked_handoff_refs:
  safe_mode_ref: null
  bisect_ref: null
  repair_preview_ref: repair_preview:install_or_repair_toolchain.required_component
  repair_transaction_ref: repair_transaction:install_or_repair_toolchain.required_component
  runbook_ref: docs/support/runbook_execution_contract.md
  help_article_ref: docs/support/support_center_concept.md#project-doctor
  support_bundle_ref: support_bundle:desktop.toolchain.missing_component
  export_packet_ref: fixtures/support/escalation_packet_completeness_cases/missing_toolchain_required_component.yaml
  escalation_packet_ref: fixtures/support/escalation_packet_completeness_cases/missing_toolchain_required_component.yaml

headless_parity_rows:
  - support_context_class: desktop
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - repair_preview_ref
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Desktop card surfaces the repair preview link and the support
      bundle link without auto-applying any mutation.
  - support_context_class: cli_headless
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - repair_preview_ref
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
      - preview_diff_pane
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Headless emits the same finding identifiers and repair-preview ref
      as JSON; no interactive affordance is rendered.
  - support_context_class: remote_managed
    parity_class: ui_suppressed_managed_authority_required
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Managed contexts may inspect the diagnosis but the install or
      repair affordance is gated to managed-admin authority.
  - support_context_class: offline_local
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Offline can render the diagnosis and the local support bundle ref;
      the repair preview honours the local-first toolchain mirror.

owner_ref: lane:support_export
emitted_at: "2026-05-04T00:00:00Z"
