# yaml-language-server: $schema=../../../schemas/support/doctor_finding_card.schema.json
# Finding card: extension regression / crash-loop. Read-only diagnosis
# with safe-mode, bisect, repair-preview, and support-bundle handoffs.
# Doctor's read-only-by-default rule applies: any quarantine, rollback,
# or reinstall runs through a reviewed repair transaction, not from
# this card directly.

doctor_finding_card_schema_version: 1
record_kind: doctor_finding_card_record

card_id: doctor_card:extension_regression.crash_loop
finding_id: finding:extension.crash_loop.safe_mode
finding_code: doctor.finding.extension_host_crash_loop_quarantined
rule_id: doctor.rule.extension_runtime.crash_loop_safe_mode
probe_id: doctor.probe.extension_runtime.crash_loop
probe_descriptor_ref: fixtures/support/doctor_probe_cases/probe_extension_regression_read_only.yaml

card_posture_class: read_only_diagnosis
confidence_class: observed_authoritative
confidence_score: 0.97
diagnosis_posture: proving_diagnosis

affected_scope:
  scope_class: extension
  scope_ref: extension:third_party_runtime_host.0001
  support_context_class: desktop

root_cause_class: extension_runtime_regression

evidence_sources:
  - evidence_ref: evidence:extension.health.crash_loop.0001
    source_class: health_event
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: observed_state
  - evidence_ref: evidence:extension.manifest.version_set.0001
    source_class: existing_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_reference
    replayability_class: replayable_from_refs
    supports_card_field: expected_state
  - evidence_ref: evidence:recovery.safe_mode.session.0001
    source_class: probe_observation
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: belief_basis
  - evidence_ref: evidence:extension.crash_envelope.0001
    source_class: crash_envelope
    redaction_class: operator_only_restricted
    support_pack_inclusion_class: review_required_before_export
    replayability_class: replayable_from_hashes_only
    supports_card_field: root_cause

unsupported_state_note:
  unsupported_state_class: none
  note_text_key: doctor.finding_card.extension_regression.unsupported_state.none
  remediation_text_key: doctor.finding_card.extension_regression.unsupported_state.none.remediation

remaining_unknowns: []

card_text_keys:
  message_catalog_ref: schemas/ux/message_catalog_entry.schema.json#doctor.extension_regression
  title_key: doctor.finding_card.extension_regression.title
  summary_key: doctor.finding_card.extension_regression.summary
  expected_state_key: doctor.finding_card.extension_regression.expected_state
  observed_state_key: doctor.finding_card.extension_regression.observed_state
  belief_basis_key: doctor.finding_card.extension_regression.belief_basis
  confidence_key: doctor.finding_card.extension_regression.confidence
  root_cause_key: doctor.finding_card.extension_regression.root_cause
  remaining_unknowns_key: doctor.finding_card.extension_regression.remaining_unknowns
  next_action_key: doctor.finding_card.extension_regression.next_action
  unsupported_state_key: doctor.finding_card.extension_regression.unsupported_state

suggested_next_action:
  action_id: action.extension_regression.start_bisect
  action_class: start_extension_bisect
  approval_posture: user_review_required
  reason_text_key: doctor.finding_card.extension_regression.next_action.reason
  rollback_ref: rollback:extension_enablement.previous_state
  checkpoint_ref: checkpoint:extension-bisect:seed

linked_handoff_refs:
  safe_mode_ref: recovery_action:safe_mode.crash_loop_entry
  bisect_ref: recovery_action:extension_bisect.crash_loop
  repair_preview_ref: repair_preview:extension_isolation.quarantine_crash_loop
  repair_transaction_ref: repair_transaction:extension_isolation.quarantine_crash_loop
  runbook_ref: docs/support/runbook_execution_contract.md#runbook-step-result-records
  help_article_ref: docs/support/support_center_concept.md#bisect-or-quarantine
  support_bundle_ref: support_bundle:desktop.safe_mode.extension_crash_loop
  export_packet_ref: fixtures/support/escalation_packet_completeness_cases/extension_regression_crash_loop_quarantined.yaml
  escalation_packet_ref: fixtures/support/escalation_packet_completeness_cases/extension_regression_crash_loop_quarantined.yaml

headless_parity_rows:
  - support_context_class: desktop
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - safe_mode_ref
      - bisect_ref
      - repair_preview_ref
      - support_bundle_ref
      - escalation_packet_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Desktop renders safe-mode and bisect deep links and the support
      bundle export.
  - support_context_class: cli_headless
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - safe_mode_ref
      - bisect_ref
      - repair_preview_ref
      - support_bundle_ref
      - escalation_packet_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
      - preview_diff_pane
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Headless emits the same identifiers; bisect requires explicit
      invocation through the repair-transaction path.
  - support_context_class: remote_managed
    parity_class: ui_suppressed_managed_authority_required
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - safe_mode_ref
      - bisect_ref
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Managed contexts may inspect; quarantine or rollback runs through
      managed-admin authority.
  - support_context_class: offline_local
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - safe_mode_ref
      - bisect_ref
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Offline reads the local extension health journal and renders the
      same diagnosis as desktop.

owner_ref: lane:support_export
emitted_at: "2026-05-04T00:00:00Z"
