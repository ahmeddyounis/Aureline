# yaml-language-server: $schema=../../../schemas/support/doctor_finding_card.schema.json
# Finding card: remote-target mismatch. The card is a read-only
# diagnosis whose diagnosis_posture is simulating_hypothetical: Doctor
# simulated the target binding against the local target manifest and
# route registry but did not bind, reapprove, or retarget. The
# suggested next action opens a runbook for the reapproval path.

doctor_finding_card_schema_version: 1
record_kind: doctor_finding_card_record

card_id: doctor_card:remote_target_mismatch.binding_simulation
finding_id: finding:remote_target.mismatch.0001
finding_code: doctor.finding.remote_target_binding_mismatch
rule_id: doctor.rule.remote_routes_collaboration.target_binding_mismatch
probe_id: doctor.probe.remote_routes_collaboration.target_binding_simulation
probe_descriptor_ref: fixtures/support/doctor_probe_cases/probe_remote_target_mismatch_simulation.yaml

card_posture_class: read_only_diagnosis
confidence_class: inferred_from_evidence
confidence_score: 0.66
diagnosis_posture: simulating_hypothetical

affected_scope:
  scope_class: route
  scope_ref: route:remote_target.binding.0001
  support_context_class: desktop

root_cause_class: remote_target_mismatch

evidence_sources:
  - evidence_ref: evidence:remote_target.manifest.0001
    source_class: existing_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: observed_state
  - evidence_ref: evidence:remote_target.expected_binding.0001
    source_class: route_decision
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: expected_state
  - evidence_ref: evidence:remote_target.policy_snapshot.0001
    source_class: policy_decision
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: belief_basis
  - evidence_ref: evidence:remote_target.simulation_trace.0001
    source_class: probe_observation
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_reference
    replayability_class: replayable_from_refs
    supports_card_field: remaining_unknowns

unsupported_state_note:
  unsupported_state_class: none
  note_text_key: doctor.finding_card.remote_target_mismatch.unsupported_state.none
  remediation_text_key: doctor.finding_card.remote_target_mismatch.unsupported_state.none.remediation

remaining_unknowns:
  - target_identity_unresolved
  - remote_route_reachability_intermittent

card_text_keys:
  message_catalog_ref: schemas/ux/message_catalog_entry.schema.json#doctor.remote_target_mismatch
  title_key: doctor.finding_card.remote_target_mismatch.title
  summary_key: doctor.finding_card.remote_target_mismatch.summary
  expected_state_key: doctor.finding_card.remote_target_mismatch.expected_state
  observed_state_key: doctor.finding_card.remote_target_mismatch.observed_state
  belief_basis_key: doctor.finding_card.remote_target_mismatch.belief_basis
  confidence_key: doctor.finding_card.remote_target_mismatch.confidence
  root_cause_key: doctor.finding_card.remote_target_mismatch.root_cause
  remaining_unknowns_key: doctor.finding_card.remote_target_mismatch.remaining_unknowns
  next_action_key: doctor.finding_card.remote_target_mismatch.next_action
  unsupported_state_key: doctor.finding_card.remote_target_mismatch.unsupported_state

suggested_next_action:
  action_id: action.remote_target_mismatch.open_runbook
  action_class: open_runbook
  approval_posture: not_required_read_only
  reason_text_key: doctor.finding_card.remote_target_mismatch.next_action.reason
  rollback_ref: null
  checkpoint_ref: null

linked_handoff_refs:
  safe_mode_ref: null
  bisect_ref: null
  repair_preview_ref: null
  repair_transaction_ref: repair_transaction:remote_routes.reapprove_target
  runbook_ref: docs/support/runbook_execution_contract.md
  help_article_ref: docs/support/support_center_concept.md#issue-or-escalation-handoff
  support_bundle_ref: support_bundle:desktop.remote_routes.target_mismatch
  export_packet_ref: fixtures/support/escalation_packet_completeness_cases/wrong_target_or_environment.yaml
  escalation_packet_ref: fixtures/support/escalation_packet_completeness_cases/wrong_target_or_environment.yaml

headless_parity_rows:
  - support_context_class: desktop
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Desktop labels the simulation explicitly so the user does not
      mistake it for a live binding.
  - support_context_class: cli_headless
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Headless emits the simulating diagnosis posture and the runbook
      ref; reapproval still requires explicit invocation.
  - support_context_class: remote_managed
    parity_class: ui_suppressed_managed_authority_required
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Managed contexts can run the simulation; reapproval requires
      managed-admin authority.
  - support_context_class: offline_local
    parity_class: machine_readable_only_no_ui
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
    unimplemented_capability_class: not_yet_implemented_planned
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Offline simulation against a cached route registry is planned;
      the row is labelled rather than dropped silently.

owner_ref: lane:support_export
emitted_at: "2026-05-04T00:00:00Z"
