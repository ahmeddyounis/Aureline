# yaml-language-server: $schema=../../../schemas/support/doctor_finding_card.schema.json
# Finding card: schema drift in local cache state. The card renders the
# finding plus a preview-only repair handoff. The card_posture_class is
# preview_only_no_apply: the card does NOT apply the rebuild, only
# materialises a preview manifest. The reviewed cache rebuild runs
# through the repair-transaction path on explicit invocation.

doctor_finding_card_schema_version: 1
record_kind: doctor_finding_card_record

card_id: doctor_card:schema_drift.cache_rebuild_preview
finding_id: finding:caches.schema_drift.0001
finding_code: doctor.finding.cache_schema_version_drift
rule_id: doctor.rule.caches.schema_version_drift
probe_id: doctor.probe.caches.schema_drift_repair_preview
probe_descriptor_ref: fixtures/support/doctor_probe_cases/probe_schema_drift_repair_preview.yaml

card_posture_class: preview_only_no_apply
confidence_class: observed_authoritative
confidence_score: 0.92
diagnosis_posture: previewing_repair_only

affected_scope:
  scope_class: storage_class
  scope_ref: storage:cache_disposable.schema_v3
  support_context_class: desktop

root_cause_class: schema_drift_local_state

evidence_sources:
  - evidence_ref: evidence:caches.schema_inventory.0001
    source_class: existing_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: observed_state
  - evidence_ref: evidence:caches.expected_schema_version.0001
    source_class: existing_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: expected_state
  - evidence_ref: evidence:caches.repair_preview.0001
    source_class: support_bundle_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_reference
    replayability_class: replayable_from_refs
    supports_card_field: belief_basis

unsupported_state_note:
  unsupported_state_class: none
  note_text_key: doctor.finding_card.schema_drift.unsupported_state.none
  remediation_text_key: doctor.finding_card.schema_drift.unsupported_state.none.remediation

remaining_unknowns:
  - repair_reversal_not_proven

card_text_keys:
  message_catalog_ref: schemas/ux/message_catalog_entry.schema.json#doctor.schema_drift
  title_key: doctor.finding_card.schema_drift.title
  summary_key: doctor.finding_card.schema_drift.summary
  expected_state_key: doctor.finding_card.schema_drift.expected_state
  observed_state_key: doctor.finding_card.schema_drift.observed_state
  belief_basis_key: doctor.finding_card.schema_drift.belief_basis
  confidence_key: doctor.finding_card.schema_drift.confidence
  root_cause_key: doctor.finding_card.schema_drift.root_cause
  remaining_unknowns_key: doctor.finding_card.schema_drift.remaining_unknowns
  next_action_key: doctor.finding_card.schema_drift.next_action
  unsupported_state_key: doctor.finding_card.schema_drift.unsupported_state

suggested_next_action:
  action_id: action.schema_drift.open_repair_preview
  action_class: open_repair_preview
  approval_posture: user_review_required
  reason_text_key: doctor.finding_card.schema_drift.next_action.reason
  rollback_ref: rollback:cache_disposable.previous_schema_state
  checkpoint_ref: checkpoint:cache-schema-drift:seed

linked_handoff_refs:
  safe_mode_ref: null
  bisect_ref: null
  repair_preview_ref: repair_preview:disposable_state_rebuild.cache_schema_drift
  repair_transaction_ref: repair_transaction:disposable_state_rebuild.cache_schema_drift
  runbook_ref: docs/support/runbook_execution_contract.md
  help_article_ref: docs/support/support_center_concept.md#guided-repair
  support_bundle_ref: support_bundle:desktop.caches.schema_drift
  export_packet_ref: fixtures/support/escalation_packet_completeness_cases/incompatible_cache_profile_schema_drift.yaml
  escalation_packet_ref: fixtures/support/escalation_packet_completeness_cases/incompatible_cache_profile_schema_drift.yaml

headless_parity_rows:
  - support_context_class: desktop
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - repair_preview_ref
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Desktop renders the diagnosis and the preview-diff pane behind
      the consent dialog.
  - support_context_class: cli_headless
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - repair_preview_ref
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - preview_diff_pane
      - consent_dialog
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Headless emits the same identifiers and the repair-preview ref;
      apply is never automatic.
  - support_context_class: remote_managed
    parity_class: ui_suppressed_managed_authority_required
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - repair_preview_ref
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - preview_diff_pane
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Managed contexts may inspect the preview manifest; rebuild
      requires managed-admin authority.
  - support_context_class: offline_local
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - repair_preview_ref
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Offline can materialise the preview manifest from locally cached
      schema inventory.

owner_ref: lane:support_export
emitted_at: "2026-05-04T00:00:00Z"
