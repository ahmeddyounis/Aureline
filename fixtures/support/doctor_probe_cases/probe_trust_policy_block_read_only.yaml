# yaml-language-server: $schema=../../../schemas/support/doctor_probe.schema.json
# Probe descriptor: trust/policy read-only inspection. The probe reads
# the trust snapshot, approval-ticket metadata, and policy bundle epoch
# summary to determine whether Doctor is blocked by restricted mode or
# an expired approval. Diagnosis must not refresh entitlements, widen
# trust, or prompt a sign-in flow; the repair handoff owns those steps.

doctor_probe_schema_version: 1
record_kind: doctor_probe_descriptor_record

probe_id: doctor.probe.trust_identity_policy.trust_state_snapshot
probe_version: probe.trust_identity_policy.trust_state_snapshot.v1
probe_class: read_only_inspection
diagnosis_posture_default: proving_diagnosis
invocation_policy: automatic

automatic_run_gate:
  permitted: true
  max_data_class: metadata_only
  max_redaction_class: metadata_safe_default
  must_label_diagnosis_posture: proving_diagnosis
  denial_reason: null

consent_gate:
  consent_required: false
  consent_kind: no_consent_read_only
  consent_text_key: null
  managed_admin_required: false
  high_friction_consent_required: false

probe_catalog_link:
  probe_catalog_ref: schemas/support/probe_catalog_entry.schema.json#doctor.probe.trust_identity_policy.trust_state_snapshot
  mutability_class_ref: non_mutating_read_only
  doctor_admission_class_ref: admitted_safe_probe
  side_effect_attestation_ref: docs/support/project_doctor_probe_contract.md#no-hidden-probe-side-effects

headless_parity_rows:
  - support_context_class: desktop
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Desktop renders the finding with a repair-preview deep link and
      a support-bundle link; no trust mutation occurs during diagnosis.
  - support_context_class: cli_headless
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
      - consent_dialog
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Headless emits the same stable ids; the repair preview remains a
      referenced handoff, not an implicit trust refresh.
  - support_context_class: remote_managed
    parity_class: ui_suppressed_managed_authority_required
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Managed contexts may inspect trust posture; reacquiring approvals
      may require managed-admin authority.
  - support_context_class: offline_local
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Offline mode can still classify the trust snapshot as expired or
      below policy floor and emit typed unknowns for missing remote
      entitlement evidence.

owner_ref: lane:support_export
emitted_at: "2026-05-04T00:00:00Z"

