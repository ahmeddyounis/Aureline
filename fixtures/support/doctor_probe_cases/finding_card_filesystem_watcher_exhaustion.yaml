# yaml-language-server: $schema=../../../schemas/support/doctor_finding_card.schema.json
# Finding card: filesystem watcher stalled or exhausted. Diagnosis is
# read-only; the suggested next action opens the reviewed watcher-reseed
# repair preview and never restarts the watcher implicitly.

doctor_finding_card_schema_version: 1
record_kind: doctor_finding_card_record

card_id: doctor_card:filesystem_watcher.stalled
finding_id: finding:filesystem_watcher.stalled.0001
finding_code: doctor.finding.watcher_stalled_no_events
rule_id: doctor.rule.filesystem_watchers.watcher_stalled_no_events
probe_id: doctor.probe.filesystem_watchers.watcher_health_snapshot
probe_descriptor_ref: fixtures/support/doctor_probe_cases/probe_filesystem_watcher_health_read_only.yaml

card_posture_class: read_only_diagnosis
confidence_class: observed_authoritative
confidence_score: 0.91
diagnosis_posture: proving_diagnosis

affected_scope:
  scope_class: workspace
  scope_ref: workspace:filesystem_watcher.session.0001
  support_context_class: desktop

root_cause_class: watcher_backlog_or_break

evidence_sources:
  - evidence_ref: evidence:filesystem_watcher.health_snapshot.0001
    source_class: health_event
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: observed_state
  - evidence_ref: evidence:filesystem_watcher.backlog_counters.0001
    source_class: metric_counter
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: belief_basis
  - evidence_ref: evidence:filesystem_watcher.root_capabilities.0001
    source_class: existing_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_reference
    replayability_class: replayable_from_refs
    supports_card_field: expected_state

unsupported_state_note:
  unsupported_state_class: none
  note_text_key: doctor.finding_card.filesystem_watcher.unsupported_state.none
  remediation_text_key: doctor.finding_card.filesystem_watcher.unsupported_state.none.remediation

remaining_unknowns: []

card_text_keys:
  message_catalog_ref: schemas/ux/message_catalog_entry.schema.json#doctor.filesystem_watcher
  title_key: doctor.finding_card.filesystem_watcher.title
  summary_key: doctor.finding_card.filesystem_watcher.summary
  expected_state_key: doctor.finding_card.filesystem_watcher.expected_state
  observed_state_key: doctor.finding_card.filesystem_watcher.observed_state
  belief_basis_key: doctor.finding_card.filesystem_watcher.belief_basis
  confidence_key: doctor.finding_card.filesystem_watcher.confidence
  root_cause_key: doctor.finding_card.filesystem_watcher.root_cause
  remaining_unknowns_key: doctor.finding_card.filesystem_watcher.remaining_unknowns
  next_action_key: doctor.finding_card.filesystem_watcher.next_action
  unsupported_state_key: doctor.finding_card.filesystem_watcher.unsupported_state

suggested_next_action:
  action_id: action.filesystem_watcher.open_repair_preview
  action_class: open_repair_preview
  approval_posture: user_review_required
  reason_text_key: doctor.finding_card.filesystem_watcher.next_action.reason
  rollback_ref: rollback:filesystem_watcher.previous_session
  checkpoint_ref: checkpoint:filesystem_watcher.reseed.seed

linked_handoff_refs:
  safe_mode_ref: null
  bisect_ref: null
  repair_preview_ref: repair_preview:restart_watcher_with_reseed.workspace
  repair_transaction_ref: repair_transaction:restart_watcher_with_reseed.workspace
  runbook_ref: docs/support/runbook_execution_contract.md
  help_article_ref: docs/support/support_center_concept.md#project-doctor
  support_bundle_ref: support_bundle:desktop.filesystem_watcher.stalled
  export_packet_ref: fixtures/support/escalation_packet_completeness_cases/broken_watcher_stalled_no_events.yaml
  escalation_packet_ref: fixtures/support/escalation_packet_completeness_cases/broken_watcher_stalled_no_events.yaml

headless_parity_rows:
  - support_context_class: desktop
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - repair_preview_ref
      - support_bundle_ref
      - escalation_packet_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Desktop links to the watcher repair preview; diagnosis remains
      read-only until the user enters the governed repair flow.
  - support_context_class: cli_headless
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - repair_preview_ref
      - support_bundle_ref
      - escalation_packet_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Headless emits the same stable identifiers; no interactive
      affordance is rendered.
  - support_context_class: remote_managed
    parity_class: ui_suppressed_managed_authority_required
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Managed contexts may inspect; watcher restart requires managed
      authority when the workspace is managed.
  - support_context_class: offline_local
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Offline mode can prepare a metadata-only bundle; repair preview
      remains local and requires explicit confirmation before any
      watcher restart.

owner_ref: lane:support_export
emitted_at: "2026-05-04T00:00:00Z"
