# yaml-language-server: $schema=../../../schemas/support/doctor_probe.schema.json
# Probe descriptor: remote-target mismatch simulation. The probe runs a
# read-only "would-this-target-bind" simulation against the existing
# target manifest, route registry, and policy snapshot. It NEVER
# retargets, reapproves, or rebinds a route. The diagnosis_posture is
# simulating_hypothetical so the user can see the simulated outcome
# without believing Doctor proved a live binding.

doctor_probe_schema_version: 1
record_kind: doctor_probe_descriptor_record

probe_id: doctor.probe.remote_routes_collaboration.target_binding_simulation
probe_version: probe.remote_routes_collaboration.target_binding_simulation.v1
probe_class: simulation
diagnosis_posture_default: simulating_hypothetical
invocation_policy: automatic_inferring_only

automatic_run_gate:
  permitted: true
  max_data_class: metadata_only
  max_redaction_class: metadata_safe_default
  must_label_diagnosis_posture: simulating_hypothetical
  denial_reason: null

consent_gate:
  consent_required: false
  consent_kind: no_consent_read_only
  consent_text_key: null
  managed_admin_required: false
  high_friction_consent_required: false

probe_catalog_link:
  probe_catalog_ref: schemas/support/probe_catalog_entry.schema.json#doctor.probe.remote_routes_collaboration.target_binding_simulation
  mutability_class_ref: non_mutating_read_only
  doctor_admission_class_ref: admitted_safe_probe
  side_effect_attestation_ref: docs/support/project_doctor_probe_contract.md#no-hidden-probe-side-effects

headless_parity_rows:
  - support_context_class: desktop
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Desktop labels the card "simulating" rather than "proven" and
      offers a runbook deep link for the reapproval path.
  - support_context_class: cli_headless
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Headless emits diagnosis_posture=simulating_hypothetical so a
      tooling reader cannot mistake the result for a live binding.
  - support_context_class: remote_managed
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Managed contexts can simulate against the managed route
      registry; rebinding requires managed-admin authority.
  - support_context_class: offline_local
    parity_class: machine_readable_only_no_ui
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
    unimplemented_capability_class: not_yet_implemented_planned
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Offline simulation against a cached route registry is planned;
      headless emits the typed-unknown set rather than rendering a
      desktop card.

owner_ref: lane:support_export
emitted_at: "2026-05-04T00:00:00Z"
