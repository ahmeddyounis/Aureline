# yaml-language-server: $schema=../../../schemas/support/doctor_finding_card.schema.json
# Finding card: transport failure attributed to a proxy or CA mismatch.
# The card is a read-only diagnosis with a runbook handoff; no trust
# mutation, certificate install, or proxy override is suggested. The
# desktop and headless surfaces share the same finding identifiers and
# evidence refs.

doctor_finding_card_schema_version: 1
record_kind: doctor_finding_card_record

card_id: doctor_card:proxy_or_ca_failure.transport
finding_id: finding:proxy_or_ca_failure.transport.0001
finding_code: doctor.finding.transport_proxy_or_ca_failure
rule_id: doctor.rule.network_proxy_ca_transport.proxy_or_ca_failure
probe_id: doctor.probe.network_proxy_ca_transport.proxy_or_ca_reachability
probe_descriptor_ref: fixtures/support/doctor_probe_cases/probe_proxy_or_ca_environment_check.yaml

card_posture_class: read_only_diagnosis
confidence_class: observed_with_gap
confidence_score: 0.78
diagnosis_posture: inferring_from_partial_evidence

affected_scope:
  scope_class: device
  scope_ref: device:proxy_environment.0001
  support_context_class: desktop

root_cause_class: proxy_or_ca_failure

evidence_sources:
  - evidence_ref: evidence:network_proxy.reachability_probe.0001
    source_class: probe_observation
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: observed_state
  - evidence_ref: evidence:network_ca.trust_anchor_inventory.0001
    source_class: existing_manifest
    redaction_class: operator_only_restricted
    support_pack_inclusion_class: review_required_before_export
    replayability_class: replayable_from_hashes_only
    supports_card_field: belief_basis
  - evidence_ref: evidence:network.expected_endpoint_set.0001
    source_class: existing_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: expected_state
  - evidence_ref: evidence:network.transport_attempt_log.0001
    source_class: structured_log
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_reference
    replayability_class: replayable_from_refs
    supports_card_field: remaining_unknowns

unsupported_state_note:
  unsupported_state_class: none
  note_text_key: doctor.finding_card.proxy_or_ca_failure.unsupported_state.none
  remediation_text_key: doctor.finding_card.proxy_or_ca_failure.unsupported_state.none.remediation

remaining_unknowns:
  - remote_route_reachability_intermittent
  - secret_redaction_not_verified

card_text_keys:
  message_catalog_ref: schemas/ux/message_catalog_entry.schema.json#doctor.proxy_or_ca_failure
  title_key: doctor.finding_card.proxy_or_ca_failure.title
  summary_key: doctor.finding_card.proxy_or_ca_failure.summary
  expected_state_key: doctor.finding_card.proxy_or_ca_failure.expected_state
  observed_state_key: doctor.finding_card.proxy_or_ca_failure.observed_state
  belief_basis_key: doctor.finding_card.proxy_or_ca_failure.belief_basis
  confidence_key: doctor.finding_card.proxy_or_ca_failure.confidence
  root_cause_key: doctor.finding_card.proxy_or_ca_failure.root_cause
  remaining_unknowns_key: doctor.finding_card.proxy_or_ca_failure.remaining_unknowns
  next_action_key: doctor.finding_card.proxy_or_ca_failure.next_action
  unsupported_state_key: doctor.finding_card.proxy_or_ca_failure.unsupported_state

suggested_next_action:
  action_id: action.proxy_or_ca_failure.open_runbook
  action_class: open_runbook
  approval_posture: not_required_read_only
  reason_text_key: doctor.finding_card.proxy_or_ca_failure.next_action.reason
  rollback_ref: null
  checkpoint_ref: null

linked_handoff_refs:
  safe_mode_ref: null
  bisect_ref: null
  repair_preview_ref: null
  repair_transaction_ref: null
  runbook_ref: docs/support/runbook_execution_contract.md
  help_article_ref: docs/support/support_center_concept.md#field-diagnostics
  support_bundle_ref: support_bundle:desktop.transport.proxy_or_ca_failure
  export_packet_ref: fixtures/support/escalation_packet_completeness_cases/network_ca_proxy_mirror_failure.yaml
  escalation_packet_ref: fixtures/support/escalation_packet_completeness_cases/network_ca_proxy_mirror_failure.yaml

headless_parity_rows:
  - support_context_class: desktop
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Desktop renders the diagnosis with a runbook deep link and the
      support-bundle export ref.
  - support_context_class: cli_headless
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Headless emits the same finding identifiers in JSON and the
      runbook ref as a stable string.
  - support_context_class: remote_managed
    parity_class: ui_suppressed_managed_authority_required
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Managed contexts may inspect the diagnosis; the network probe
      itself requires managed-admin authority.
  - support_context_class: offline_local
    parity_class: ui_suppressed_unsupported
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - unsupported_state_class
      - root_cause_class
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - evidence_drawer
    unimplemented_capability_class: permanently_unsupported
    headless_exit_code_class: exit_unsupported_context
    notes: >
      Offline mode renders the card as unsupported because the
      reachability probe cannot run without a network.

owner_ref: lane:support_export
emitted_at: "2026-05-04T00:00:00Z"
