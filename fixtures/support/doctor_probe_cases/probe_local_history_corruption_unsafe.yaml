# yaml-language-server: $schema=../../../schemas/support/doctor_probe.schema.json
# Probe descriptor: local-history corruption is unsafe_or_unsupported
# from Doctor's perspective. The probe is never run as a Doctor probe
# directly: any rewrite of local history requires the reviewed
# repair-transaction path with high-friction consent and rollback
# checkpointing. The descriptor exists so Doctor can label the failure
# mode and refuse without side effects.

doctor_probe_schema_version: 1
record_kind: doctor_probe_descriptor_record

probe_id: doctor.probe.local_history.corruption_repair
probe_version: probe.local_history.corruption_repair.v1
probe_class: unsafe_or_unsupported
diagnosis_posture_default: refusing_unsupported
invocation_policy: never_without_explicit_invocation

automatic_run_gate:
  permitted: false
  max_data_class: code_adjacent
  max_redaction_class: signing_evidence_only
  must_label_diagnosis_posture: refusing_unsupported
  denial_reason: >
    Local-history rewrites are mutating, code-adjacent, and not
    reversible without a checkpoint; Doctor refuses and labels the
    finding so the user routes through the reviewed repair-transaction
    path.

consent_gate:
  consent_required: true
  consent_kind: high_friction_consent
  consent_text_key: doctor.probe.local_history_corruption.consent_high_friction
  managed_admin_required: false
  high_friction_consent_required: true

probe_catalog_link:
  probe_catalog_ref: schemas/support/probe_catalog_entry.schema.json#doctor.probe.local_history.corruption_repair
  mutability_class_ref: mutates_user_files
  doctor_admission_class_ref: blocked_promote_to_repair
  side_effect_attestation_ref: docs/support/project_doctor_probe_contract.md#no-hidden-probe-side-effects

headless_parity_rows:
  - support_context_class: desktop
    parity_class: ui_suppressed_unsupported
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - unsupported_state_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - preview_diff_pane
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_unsupported_context
    notes: >
      Desktop refuses to run the probe and renders the unsupported
      label with a deep link to the reviewed repair-transaction path.
  - support_context_class: cli_headless
    parity_class: ui_suppressed_unsupported
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - unsupported_state_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - preview_diff_pane
      - consent_dialog
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_unsupported_context
    notes: >
      Headless emits the unsupported finding identifiers and refuses
      with exit_unsupported_context; --apply is rejected.
  - support_context_class: remote_managed
    parity_class: ui_suppressed_unsupported
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - unsupported_state_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - preview_diff_pane
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_unsupported_context
    notes: >
      Managed contexts cannot rewrite local history; the diagnosis
      remains read-only and the repair runs through managed-admin
      review.
  - support_context_class: offline_local
    parity_class: ui_suppressed_unsupported
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - unsupported_state_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - preview_diff_pane
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_unsupported_context
    notes: >
      Offline mode also refuses; the repair-transaction path requires
      a checkpointed rollback and high-friction consent.

owner_ref: lane:support_export
emitted_at: "2026-05-04T00:00:00Z"
