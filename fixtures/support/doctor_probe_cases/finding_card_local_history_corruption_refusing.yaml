# yaml-language-server: $schema=../../../schemas/support/doctor_finding_card.schema.json
# Finding card: local-history corruption detected; Doctor refuses to
# repair from the diagnosis surface. The card is refusing_unsupported:
# it labels the unsupported state and routes the user toward the
# reviewed repair-transaction path with high-friction consent and a
# checkpointed rollback.

doctor_finding_card_schema_version: 1
record_kind: doctor_finding_card_record

card_id: doctor_card:local_history_corruption.refusing
finding_id: finding:local_history.corruption.0001
finding_code: doctor.finding.local_history_corruption_detected
rule_id: doctor.rule.local_history.corruption_detected
probe_id: doctor.probe.local_history.corruption_repair
probe_descriptor_ref: fixtures/support/doctor_probe_cases/probe_local_history_corruption_unsafe.yaml

card_posture_class: refusing_unsupported
confidence_class: observed_with_gap
confidence_score: 0.71
diagnosis_posture: refusing_unsupported

affected_scope:
  scope_class: storage_class
  scope_ref: storage:local_history.workspace_journal
  support_context_class: desktop

root_cause_class: local_history_corruption

evidence_sources:
  - evidence_ref: evidence:local_history.journal_inventory.0001
    source_class: existing_manifest
    redaction_class: signing_evidence_only
    support_pack_inclusion_class: review_required_before_export
    replayability_class: requires_local_retained_artifact
    supports_card_field: observed_state
  - evidence_ref: evidence:local_history.expected_journal_set.0001
    source_class: existing_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: expected_state
  - evidence_ref: evidence:local_history.repair_constraints.0001
    source_class: policy_decision
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: unsupported_state_note
  - evidence_ref: evidence:local_history.checkpoint_inventory.0001
    source_class: existing_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_reference
    replayability_class: replayable_from_refs
    supports_card_field: belief_basis

unsupported_state_note:
  unsupported_state_class: unsupported_high_risk_capture
  note_text_key: doctor.finding_card.local_history_corruption.unsupported_state.high_risk
  remediation_text_key: doctor.finding_card.local_history_corruption.remediation.repair_transaction

remaining_unknowns:
  - repair_reversal_not_proven
  - user_consent_not_collected

card_text_keys:
  message_catalog_ref: schemas/ux/message_catalog_entry.schema.json#doctor.local_history_corruption
  title_key: doctor.finding_card.local_history_corruption.title
  summary_key: doctor.finding_card.local_history_corruption.summary
  expected_state_key: doctor.finding_card.local_history_corruption.expected_state
  observed_state_key: doctor.finding_card.local_history_corruption.observed_state
  belief_basis_key: doctor.finding_card.local_history_corruption.belief_basis
  confidence_key: doctor.finding_card.local_history_corruption.confidence
  root_cause_key: doctor.finding_card.local_history_corruption.root_cause
  remaining_unknowns_key: doctor.finding_card.local_history_corruption.remaining_unknowns
  next_action_key: doctor.finding_card.local_history_corruption.next_action
  unsupported_state_key: doctor.finding_card.local_history_corruption.unsupported_state

suggested_next_action:
  action_id: action.local_history_corruption.refuse_unsupported
  action_class: refuse_unsupported
  approval_posture: high_friction_consent_required
  reason_text_key: doctor.finding_card.local_history_corruption.next_action.reason
  rollback_ref: rollback:local_history.checkpointed_journal
  checkpoint_ref: checkpoint:local_history.repair_seed

linked_handoff_refs:
  safe_mode_ref: null
  bisect_ref: null
  repair_preview_ref: null
  repair_transaction_ref: repair_transaction:local_history.guided_repair_with_checkpoint
  runbook_ref: docs/support/runbook_execution_contract.md
  help_article_ref: docs/support/support_center_concept.md#guided-repair
  support_bundle_ref: support_bundle:desktop.local_history.corruption
  export_packet_ref: fixtures/support/escalation_packet_completeness_cases/incompatible_cache_profile_schema_drift.yaml
  escalation_packet_ref: fixtures/support/escalation_packet_completeness_cases/incompatible_cache_profile_schema_drift.yaml

headless_parity_rows:
  - support_context_class: desktop
    parity_class: ui_suppressed_unsupported
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - unsupported_state_class
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - preview_diff_pane
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_unsupported_context
    notes: >
      Desktop renders the refusal card with the high-friction repair
      route and the support-bundle export ref.
  - support_context_class: cli_headless
    parity_class: ui_suppressed_unsupported
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - unsupported_state_class
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - preview_diff_pane
      - consent_dialog
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_unsupported_context
    notes: >
      Headless emits the refusal identifiers as JSON; --apply is
      rejected.
  - support_context_class: remote_managed
    parity_class: ui_suppressed_unsupported
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - root_cause_class
      - evidence_refs
      - unsupported_state_class
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - preview_diff_pane
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_unsupported_context
    notes: >
      Managed contexts may inspect the refusal; repair requires
      managed-admin authority and a checkpointed rollback.
  - support_context_class: offline_local
    parity_class: ui_suppressed_unsupported
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - root_cause_class
      - evidence_refs
      - unsupported_state_class
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - preview_diff_pane
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_unsupported_context
    notes: >
      Offline also refuses; the repair runs through the local repair
      transaction path with checkpointed rollback.

owner_ref: lane:support_export
emitted_at: "2026-05-04T00:00:00Z"
