# yaml-language-server: $schema=../../../schemas/support/doctor_finding_card.schema.json
# Finding card: blocked by trust/policy posture (expired approval).
# Diagnosis is read-only; the suggested next action opens the reviewed
# reapproval / policy-entitlement repair preview.

doctor_finding_card_schema_version: 1
record_kind: doctor_finding_card_record

card_id: doctor_card:trust_policy.blocked_approval
finding_id: finding:trust_policy.approval_expired.0001
finding_code: doctor.finding.trust_state_approval_expired
rule_id: doctor.rule.trust_identity_policy.trust_approval_expired
probe_id: doctor.probe.trust_identity_policy.trust_state_snapshot
probe_descriptor_ref: fixtures/support/doctor_probe_cases/probe_trust_policy_block_read_only.yaml

card_posture_class: read_only_diagnosis
confidence_class: observed_authoritative
confidence_score: 0.93
diagnosis_posture: proving_diagnosis

affected_scope:
  scope_class: workspace
  scope_ref: workspace:trust_policy.snapshot.0001
  support_context_class: desktop

root_cause_class: blocked_trust_state

evidence_sources:
  - evidence_ref: evidence:trust.approval_ticket.snapshot.0001
    source_class: existing_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_reference
    replayability_class: replayable_from_refs
    supports_card_field: observed_state
  - evidence_ref: evidence:policy.bundle_epoch.summary.0001
    source_class: existing_manifest
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: belief_basis
  - evidence_ref: evidence:policy.denial_code.trust_floor.0001
    source_class: policy_decision
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
    supports_card_field: expected_state

unsupported_state_note:
  unsupported_state_class: none
  note_text_key: doctor.finding_card.trust_policy.unsupported_state.none
  remediation_text_key: doctor.finding_card.trust_policy.unsupported_state.none.remediation

remaining_unknowns: []

card_text_keys:
  message_catalog_ref: schemas/ux/message_catalog_entry.schema.json#doctor.trust_policy
  title_key: doctor.finding_card.trust_policy.title
  summary_key: doctor.finding_card.trust_policy.summary
  expected_state_key: doctor.finding_card.trust_policy.expected_state
  observed_state_key: doctor.finding_card.trust_policy.observed_state
  belief_basis_key: doctor.finding_card.trust_policy.belief_basis
  confidence_key: doctor.finding_card.trust_policy.confidence
  root_cause_key: doctor.finding_card.trust_policy.root_cause
  remaining_unknowns_key: doctor.finding_card.trust_policy.remaining_unknowns
  next_action_key: doctor.finding_card.trust_policy.next_action
  unsupported_state_key: doctor.finding_card.trust_policy.unsupported_state

suggested_next_action:
  action_id: action.trust_policy.open_repair_preview
  action_class: open_repair_preview
  approval_posture: user_review_required
  reason_text_key: doctor.finding_card.trust_policy.next_action.reason
  rollback_ref: rollback:trust_approval_ticket.previous_state
  checkpoint_ref: checkpoint:policy_entitlement_refresh.trust_approval_reacquire.seed

linked_handoff_refs:
  safe_mode_ref: null
  bisect_ref: null
  repair_preview_ref: repair_preview:policy_entitlement_refresh.trust_approval_reacquire
  repair_transaction_ref: repair_transaction:policy_entitlement_refresh.trust_approval_reacquire
  runbook_ref: docs/support/runbook_execution_contract.md
  help_article_ref: docs/support/support_center_concept.md#project-doctor
  support_bundle_ref: support_bundle:desktop.trust_policy.approval_expired
  export_packet_ref: fixtures/support/escalation_packet_completeness_cases/blocked_trust_state_approval_expired.yaml
  escalation_packet_ref: fixtures/support/escalation_packet_completeness_cases/blocked_trust_state_approval_expired.yaml

headless_parity_rows:
  - support_context_class: desktop
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - repair_preview_ref
      - support_bundle_ref
      - escalation_packet_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Desktop links to the reviewed reapproval preview and the support
      bundle without widening trust automatically.
  - support_context_class: cli_headless
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - repair_preview_ref
      - support_bundle_ref
      - escalation_packet_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Headless emits the same stable identifiers; the repair preview ref
      remains a reviewed next step, not an implied trust refresh.
  - support_context_class: remote_managed
    parity_class: ui_suppressed_managed_authority_required
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Managed contexts may inspect; the reapproval flow may require
      managed-admin authority.
  - support_context_class: offline_local
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - suggested_next_action_id
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Offline mode can still render the finding and prepare a local-only
      support bundle; reapproval requires returning online.

owner_ref: lane:support_export
emitted_at: "2026-05-04T00:00:00Z"
