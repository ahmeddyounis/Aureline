# yaml-language-server: $schema=../../../schemas/support/doctor_probe.schema.json
# Probe descriptor: extension regression diagnosis runs read-only
# inspection of extension health events and crash counters. Doctor
# itself does not quarantine, disable, or rollback an extension; the
# repair handoff binds those mutations.

doctor_probe_schema_version: 1
record_kind: doctor_probe_descriptor_record

probe_id: doctor.probe.extension_runtime.crash_loop
probe_version: probe.extension_runtime.crash_loop.v1
probe_class: read_only_inspection
diagnosis_posture_default: proving_diagnosis
invocation_policy: automatic

automatic_run_gate:
  permitted: true
  max_data_class: environment_adjacent
  max_redaction_class: metadata_safe_default
  must_label_diagnosis_posture: proving_diagnosis
  denial_reason: null

consent_gate:
  consent_required: false
  consent_kind: no_consent_read_only
  consent_text_key: null
  managed_admin_required: false
  high_friction_consent_required: false

probe_catalog_link:
  probe_catalog_ref: schemas/support/probe_catalog_entry.schema.json#doctor.probe.extension_runtime.crash_loop
  mutability_class_ref: non_mutating_read_only
  doctor_admission_class_ref: admitted_safe_probe
  side_effect_attestation_ref: docs/support/project_doctor_probe_contract.md#no-hidden-probe-side-effects

headless_parity_rows:
  - support_context_class: desktop
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - safe_mode_ref
      - bisect_ref
      - repair_preview_ref
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Desktop renders the crash-loop diagnosis with safe-mode and
      bisect deep links.
  - support_context_class: cli_headless
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - rule_id
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - safe_mode_ref
      - bisect_ref
      - repair_preview_ref
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
      - preview_diff_pane
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Headless emits the same identifiers in JSON; bisect itself runs
      under the repair-transaction path with explicit invocation.
  - support_context_class: remote_managed
    parity_class: ui_suppressed_managed_authority_required
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - safe_mode_ref
      - bisect_ref
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Managed contexts may inspect; quarantining or rolling back an
      extension still requires managed-admin authority.
  - support_context_class: offline_local
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - root_cause_class
      - evidence_refs
      - suggested_next_action_id
      - safe_mode_ref
      - bisect_ref
      - support_bundle_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Offline mode reads the local extension health journal and emits
      the same crash-loop diagnosis as desktop.

owner_ref: lane:support_export
emitted_at: "2026-05-04T00:00:00Z"
