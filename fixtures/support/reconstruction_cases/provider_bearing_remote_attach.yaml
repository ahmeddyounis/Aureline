# Reconstruction case: provider-bearing remote attach.
#
# Companion to docs/support/reconstruction_drill.md §Scenario classes
# and artifacts/support/reconstruction_checklist.yaml
# scenario_class:provider_bearing_action.
#
# The reviewer is reconstructing a user-visible "remote attach"
# invocation that crossed a managed control plane and a system-browser
# authentication handoff. The packet preserves the typed handoff
# transport, the destination descriptor, and the provider support
# route by typed ref — the reviewer never reads raw provider payloads.

