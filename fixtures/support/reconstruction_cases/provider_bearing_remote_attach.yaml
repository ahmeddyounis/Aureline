  On 2026-04-23 a local user invocation of command
  `workspace.remote.attach` (invocation session
  `invocation-session:workspace.remote.attach:00b2`) ran under
  exact-build
  `build-id:aureline:stable:1.0.3:linux-x86_64:release:aa11bb22cc33`
  on install-mode `managed_deployed`, channel `stable`, reaching
  managed workspace `managed-workspace:payments-prod` through a
  `managed_control_plane_route` with a `system_browser_review`
  handoff to destination `dest:support:official-portal`; docs pack
  `docs-pack:aureline:stable:1.0.3` resolved `exact_build_match`,
  claim row
  `claim-row:workspace.remote.attach.support_class.managed_supported`
  governed the action, and known-limit
  `known-limit:workspace.remote.attach.requires_active_provider_session`
  was bound to the claim.

