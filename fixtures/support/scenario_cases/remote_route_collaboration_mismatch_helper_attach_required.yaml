notes: >
  Remote / route / collaboration mismatch escalations default to
  support_bundle_by_reference. Raw helper session secrets and raw
  route bodies stay local-only; the packet carries helper session id,
  target identity row, route decision row, and reattach-preview
  transaction ref for handoff.
