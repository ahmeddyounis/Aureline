notes: >
  State corruption / schema drift / low-disk recovery escalations stay
  metadata-only by default. The packet preserves the cache schema row,
  the profile provenance row, the disk-capacity row, and the reset-
  preview transaction ref so the user can choose reset, escalation, or
  observe-only without losing case context.
