# Support-intake scenario case: state corruption / schema drift / low-disk recovery.
#
# Companion to docs/support/support_intake_and_escalation_contract.md
# §Scenario families and fixtures/support/scenario_matrix.yaml row
# scenario_row:incompatible_cache_profile.

schema_version: 1
record_kind: support_escalation_packet_seed_case_record
case_id: scenario_case:state_corruption_schema_drift_low_disk_recovery.cache_schema_drift
scenario_family_class: state_corruption_schema_drift_low_disk_recovery
title: Cache schema drift or low-disk recovery required
summary: >
  A derived cache or portable profile has a schema-version or
  provenance mismatch with the current build, or low-disk recovery
  blocked durable writes. Intake routes to a Doctor finding first;
  reset is scoped to the disposable cache and never auto-resets the
  authoritative profile.

finding_codes:
  - doctor.finding.cache_schema_version_drift
  - doctor.finding.profile_portability_schema_mismatch

build_profile_identity:
  exact_build_identity_ref: exact_build:aureline.scenario_seed.state_corruption_schema_drift_low_disk_recovery
  install_mode_class: per_user_installed
  install_channel_class: stable
  deployment_profile_class: individual_local
  managed_admin_required: false
  docs_pack_ref: null
  profile_summary: >
    Per-user installed stable build; cache schema version mismatched
    the loaded build and recovery-rung cache_reset_candidate is
    available.

evidence_references:
  selected_evidence_refs:
    - evidence.support.scenario_seed.cache.cache_schema_row
    - evidence.support.scenario_seed.cache.profile_provenance_row
    - evidence.support.scenario_seed.cache.disk_capacity_row
    - evidence.support.scenario_seed.exact_build_identity
  support_bundle_refs:
    - support_bundle:scenario_seed.state_corruption_schema_drift_low_disk_recovery
  incident_workspace_packet_refs: []
  repair_transaction_refs:
    - repair_transaction:disposable_state_rebuild.cache_index_repair
  checkpoint_refs:
    - checkpoint:scenario_seed.state_corruption_schema_drift_low_disk_recovery.pre_apply
  trace_capture_request_refs: []
  crash_envelope_refs: []
  withheld_artifact_refs: []
  default_data_class_boundary: metadata_only
  redaction_choice_class: metadata_only_default
  redaction_widening_consent_marker: null
  evidence_summary: >
    Cache schema row, profile provenance row, disk-capacity row, and
    exact-build identity are sufficient. No raw indexed content,
    user-authored files, or workspace paths cross the boundary.

reproduction_steps:
  - step_index: 0
    step_class: user_action_observed
    summary: User opened the workspace and durable indexers refused to load.
    evidence_ref: evidence.support.scenario_seed.state_corruption_schema_drift_low_disk_recovery.user_action
    command_id: command:open.workspace
    invocation_session_id: invocation_session:scenario_seed.state_corruption_schema_drift_low_disk_recovery
    captured_at: null
  - step_index: 1
    step_class: background_event_observed
    summary: Doctor probe observed a cache schema version mismatch with the loaded build.
    evidence_ref: evidence.support.scenario_seed.state_corruption_schema_drift_low_disk_recovery.doctor_probe
    command_id: null
    invocation_session_id: invocation_session:scenario_seed.state_corruption_schema_drift_low_disk_recovery
    captured_at: null
  - step_index: 2
    step_class: background_event_observed
    summary: Disk-capacity row observed less headroom than the durable-write floor; recovery rung cache_reset_candidate offered.
    evidence_ref: evidence.support.scenario_seed.state_corruption_schema_drift_low_disk_recovery.disk_event
    command_id: null
    invocation_session_id: null
    captured_at: null
  - step_index: 3
    step_class: actual_outcome_summary
    summary: Workspace stayed in cache_reset_candidate; reset is offered behind a reviewed preview.
    evidence_ref: null
    command_id: null
    invocation_session_id: null
    captured_at: null

recommended_repair_reviews:
  - approved_repair_class: disposable_state_rebuild
    preview_required: true
    repair_transaction_ref: repair_transaction:disposable_state_rebuild.cache_index_repair
    why_safe_summary: >
      Rebuilds only the disposable derived cache named in the finding;
      authoritative profile and user-authored files stay preserved.
    what_may_change_summary: >
      Touches only the disposable derived cache class; durable
      workspace indexes and authored files stay untouched.
    if_declined_rollback_summary: >
      Workspace remains in cache_reset_candidate; user can stay in
      observe-only mode or move to escalation.
    if_declined_evidence_summary: >
      Local-only review retains the support-bundle preview, the cache
      schema row, and the disk-capacity row.
  - approved_repair_class: guided_export_escalation
    preview_required: false
    repair_transaction_ref: null
    why_safe_summary: >
      No state mutation; the packet preserves the gap and routes to
      vendor-case review with the cache evidence already attached.
    what_may_change_summary: >
      Nothing changes locally; the user signals that an authoritative
      profile schema gap may need vendor-case review.
    if_declined_rollback_summary: >
      Cache remains in cache_reset_candidate; the user can return to
      reset later.
    if_declined_evidence_summary: >
      Local-only review records the packet draft so the user can
      escalate later without restating the case.

delivery_posture:
  selected_delivery_path_class: local_only_review
  delivery_state_class: saved_local_only
  local_only_path_available: true
  vendor_case_path_available: true
  user_upload_path_available: true
  managed_admin_handoff_required: false
  private_security_channel_required: false
  delivery_summary: >
    Default selection is local-only review; vendor-case and user-
    initiated upload remain available at the same prominence.

context_parity_rows:
  - support_context_class: desktop
    availability_class: available
    narrowed_when_summary: not_narrowed; full picker, review, and timeline are available on desktop.
    alternate_path_summary: not_applicable; desktop is the reference surface for this scenario.
  - support_context_class: cli_headless
    availability_class: available
    narrowed_when_summary: not_narrowed; CLI exposes the same picker rows and review fields.
    alternate_path_summary: CLI emits the packet to a local file users can attach later.
  - support_context_class: remote_managed
    availability_class: available
    narrowed_when_summary: not_narrowed; cache reset respects managed write authority.
    alternate_path_summary: Local-only review remains available at primary prominence.
  - support_context_class: offline_local
    availability_class: available_local_only
    narrowed_when_summary: Vendor-case handoff is unavailable while offline; local cache reset still works.
    alternate_path_summary: Local-only review records the packet for later handoff once the user is online.

