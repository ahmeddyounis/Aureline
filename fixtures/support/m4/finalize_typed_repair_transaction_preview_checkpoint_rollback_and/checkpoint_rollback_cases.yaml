schema_version: 1
record_kind: finalized_repair_flow_checkpoint_rollback_case_corpus
corpus_id: "support:m4:repair_flow:checkpoint_rollback_cases"
corpus_version: "2026-06-02"
schema_ref: "schemas/support/finalize_typed_repair_transaction_preview_checkpoint_rollback_and.schema.json"
doc_ref: "docs/support/m4/finalize_typed_repair_transaction_preview_checkpoint_rollback_and.md"
cases:
  - case_id: "case:checkpoint_rollback:exact_cache_rebuild"
    flow_class: preview_checkpoint_apply_with_rollback
    checkpoint_class: durable_pre_apply
    rollback_class: exact_restore_from_checkpoint
    compensation_class: no_compensation_needed
    preview_disposition_class: authorized_for_apply
    doctor_finding_ref: "doctor.finding.cache_schema_version_drift"
    impacted_state_classes:
      - disposable_derived_cache
    preserved_state_classes:
      - user_authored_files
      - workspace_trust_store
      - credential_store
    summary: "Exact rollback of cache rebuild from durable checkpoint. No compensation needed."
  - case_id: "case:checkpoint_rollback:compensating_extension_quarantine"
    flow_class: preview_checkpoint_apply_with_compensation
    checkpoint_class: durable_pre_apply
    rollback_class: compensating_restore
    compensation_class: semantic_inverse_compensation
    preview_disposition_class: authorized_for_apply
    doctor_finding_ref: "doctor.finding.extension_crash_loop_detected"
    impacted_state_classes:
      - extension_quarantine_state
    preserved_state_classes:
      - user_authored_files
      - workspace_trust_store
      - credential_store
      - installed_extension_marketplace_state
    summary: "Compensating rollback of extension quarantine by releasing quarantine. Strong acknowledgement required."
  - case_id: "case:checkpoint_rollback:regenerate_toolchain"
    flow_class: preview_checkpoint_apply_with_rollback
    checkpoint_class: ephemeral_pre_apply
    rollback_class: regenerate_from_authoritative_source
    compensation_class: regenerate_from_authoritative_source
    preview_disposition_class: authorized_for_apply
    doctor_finding_ref: "doctor.finding.toolchain_resolution_failure"
    impacted_state_classes:
      - execution_context_handle
    preserved_state_classes:
      - user_authored_files
      - workspace_trust_store
      - credential_store
    summary: "Regenerate toolchain context from authoritative source on rollback."
  - case_id: "case:checkpoint_rollback:manual_remote_agent"
    flow_class: preview_checkpoint_apply_with_compensation
    checkpoint_class: durable_pre_apply
    rollback_class: manual_recovery_path
    compensation_class: manual_followup_required
    preview_disposition_class: authorized_for_apply
    doctor_finding_ref: "doctor.finding.remote_agent_attach_failure"
    impacted_state_classes:
      - remote_agent_runtime_handle
    preserved_state_classes:
      - user_authored_files
      - workspace_trust_store
      - credential_store
      - remote_helper_authorization
    summary: "Manual recovery path for remote agent rollback. User must reattach helper."
  - case_id: "case:checkpoint_rollback:observe_only_audit"
    flow_class: preview_observe_only_audit
    checkpoint_class: no_checkpoint_needed
    rollback_class: no_rollback_not_applicable
    compensation_class: audit_only_no_state_change
    preview_disposition_class: pending_review
    doctor_finding_ref: "doctor.finding.docs_pack_revision_mismatch"
    impacted_state_classes: []
    preserved_state_classes:
      - user_authored_files
      - workspace_trust_store
      - credential_store
      - docs_pack_authoring
    summary: "Observe-only audit of docs-pack mismatch. No checkpoint, rollback, or compensation."
  - case_id: "case:checkpoint_rollback:refused_escalation"
    flow_class: preview_refused_escalation
    checkpoint_class: no_checkpoint_escalation_only
    rollback_class: no_rollback_not_applicable
    compensation_class: audit_only_no_state_change
    preview_disposition_class: refused_escalation_only
    doctor_finding_ref: "doctor.finding.trust_state_below_floor"
    impacted_state_classes: []
    preserved_state_classes:
      - user_authored_files
      - workspace_trust_store
      - credential_store
    summary: "No safe local repair. Escalation packet prepared. No checkpoint or rollback."
notes: |
  Each case demonstrates a valid checkpoint/rollback/compensation triple
  for a specific repair class family. The evaluator uses these cases as
  reference shapes during validation.
