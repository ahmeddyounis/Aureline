- schema_version: 1
  record_kind: evidence_packet_record
  packet_id: evidence:wrong_target_write:001
  diagnosis_packet_id: diagnosis:wrong_target_write:001
  scenario_class: wrong_target_write
  evidence_items:
    - item_id: evi:wrong_target_write:001:log
      evidence_class: log_trace
      redaction_class: metadata_safe_default
      evidence_ref: logs/doctor/wrong_target_write_001.log
      description: Log trace showing the resolved target and the actual write path.
      exact_build_id: aureline-0.0.0+m4.167.test
    - item_id: evi:wrong_target_write:001:state
      evidence_class: state_snapshot
      redaction_class: opt_in_only
      evidence_ref: snapshots/doctor/wrong_target_write_001_state.yaml
      description: Snapshot of the trust store and route manifest at the time of the write.
      exact_build_id: aureline-0.0.0+m4.167.test
  raw_private_material_excluded: true
  ambient_authority_excluded: true
  exact_build_id: aureline-0.0.0+m4.167.test
  notes: Evidence for wrong-target write diagnosis. State snapshot is opt-in only because it may contain path names.

