record_kind: runbook_handoff_truth_packet
schema_version: 1
packet_id: support.runbook_handoff_truth.managed_execution_with_deviation.v1
schema_ref: schemas/support/runbook-step-envelope.schema.json
source_descriptors:
  - record_kind: runbook_source_descriptor
    source_id: source.managed_catalog.enterprise_repair.v1
    source_class: managed_catalog
    authoritative_posture: managed_delegated
    signer_or_source_ref: signer.support.enterprise-admin
    freshness_state: current
    approver_policy_ref: approver-policy.managed-runtime-approval
    export_right: metadata_only
step_envelopes:
  - record_kind: runbook_step_envelope
    step_id: step.managed.verify.scope
    step_class: verify
    target_selector_scope: runtime_target
    approval_requirement: no_approval_required
    destination_class: in_product
    expected_evidence_outputs:
      - evidence_id: evidence.verify.scope
        evidence_class: incident_timeline_entry_ref
        export_ref: export.evidence.verify.scope
    shared_action_envelope: null
    external_handoff: null
  - record_kind: runbook_step_envelope
    step_id: step.managed.mitigate.restart
    step_class: mitigate
    target_selector_scope: provider_object
    approval_requirement: runtime_approval_ticket
    destination_class: in_product
    expected_evidence_outputs:
      - evidence_id: evidence.mitigate.restart
        evidence_class: runbook_step_result_ref
        export_ref: export.evidence.mitigate.restart
      - evidence_id: evidence.approval.restart
        evidence_class: approval_ticket_ref
        export_ref: export.evidence.approval.restart
    shared_action_envelope:
      action_envelope_ref: action-envelope.restart-runtime
      preview_hash_ref: preview-hash.restart-runtime.20260604
      approval_ref: approval.ticket.restart-runtime
      audit_ref: audit.event.restart-runtime
    external_handoff: null
execution_records:
  - record_kind: runbook_step_execution_record
    execution_id: execution.preview.restart-runtime
    step_id: step.managed.mitigate.restart
    incident_timeline_id: timeline.incident.782.step.preview
    actor_ref: actor.support.operator
    result_state: preview_only
    approval_refs: []
    deviation_note_refs: []
    external_console_handoff_refs: []
    evidence_export_links:
      - export.evidence.preview.restart-runtime
  - record_kind: runbook_step_execution_record
    execution_id: execution.approved.restart-runtime
    step_id: step.managed.mitigate.restart
    incident_timeline_id: timeline.incident.782.step.approved
    actor_ref: actor.support.operator
    result_state: approved
    approval_refs:
      - approval.ticket.restart-runtime
    deviation_note_refs: []
    external_console_handoff_refs: []
    evidence_export_links:
      - export.evidence.approval.restart
  - record_kind: runbook_step_execution_record
    execution_id: execution.executed.restart-runtime
    step_id: step.managed.mitigate.restart
    incident_timeline_id: timeline.incident.782.step.executed
    actor_ref: actor.support.operator
    result_state: executed
    approval_refs:
      - approval.ticket.restart-runtime
    deviation_note_refs: []
    external_console_handoff_refs: []
    evidence_export_links:
      - export.evidence.mitigate.restart
  - record_kind: runbook_step_execution_record
    execution_id: execution.deviated.rollback-window
    step_id: step.managed.verify.scope
    incident_timeline_id: timeline.incident.782.step.deviated
    actor_ref: actor.support.operator
    result_state: deviated
    approval_refs: []
    deviation_note_refs:
      - deviation.incident.782.rollback-window
    external_console_handoff_refs: []
    evidence_export_links:
      - export.evidence.deviation.rollback-window
deviation_notes:
  - record_kind: runbook_deviation_note
    deviation_note_id: deviation.incident.782.rollback-window
    departed_step_id: step.managed.verify.scope
    actor_ref: actor.support.operator
    incident_timeline_id: timeline.incident.782.step.deviated
    reason: Operator collected an additional rollback-window check before mitigation because provider health was stale.
    evidence_refs:
      - export.evidence.deviation.rollback-window
handoff_bundles: []
local_follow_ups: []
