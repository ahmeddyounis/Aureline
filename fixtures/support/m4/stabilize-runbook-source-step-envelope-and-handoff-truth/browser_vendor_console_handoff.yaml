record_kind: runbook_handoff_truth_packet
schema_version: 1
packet_id: support.runbook_handoff_truth.browser_vendor_console_handoff.v1
schema_ref: schemas/support/runbook-step-envelope.schema.json
source_descriptors:
  - record_kind: runbook_source_descriptor
    source_id: source.browser.vendor.docs.example.v1
    source_class: browser_only_vendor_documentation
    authoritative_posture: reference_only
    signer_or_source_ref: signer.vendor.example-docs
    freshness_state: browser_only_reference
    approver_policy_ref: approver-policy.reference-only-no-execution
    export_right: reference_only
step_envelopes:
  - record_kind: runbook_step_envelope
    step_id: step.vendor.open.console
    step_class: communicate
    target_selector_scope: browser_vendor_console
    approval_requirement: approval_forbidden
    destination_class: vendor_console
    expected_evidence_outputs:
      - evidence_id: evidence.vendor.handoff
        evidence_class: external_console_handoff_ref
        export_ref: export.evidence.vendor.handoff
    shared_action_envelope: null
    external_handoff:
      handoff_ref: handoff.vendor.console.example
      destination_class: vendor_console
      reason: Vendor control-plane mutation is not implemented in Aureline and must remain an explicit browser handoff.
      return_anchor_ref: follow-up.vendor.console.return-note
execution_records:
  - record_kind: runbook_step_execution_record
    execution_id: execution.vendor.handoff.required
    step_id: step.vendor.open.console
    incident_timeline_id: timeline.incident.901.vendor.handoff
    actor_ref: actor.support.operator
    result_state: handoff_required
    approval_refs: []
    deviation_note_refs: []
    external_console_handoff_refs:
      - handoff.vendor.console.example
    evidence_export_links:
      - export.evidence.vendor.handoff
deviation_notes: []
handoff_bundles:
  - record_kind: runbook_external_handoff_bundle
    handoff_bundle_id: handoff.bundle.vendor.console.example
    destination_class: vendor_console
    reason: Operator must inspect vendor-owned console state in a browser because the source is reference-only.
    return_anchor_ref: follow-up.vendor.console.return-note
    raw_provider_payload_excluded: true
local_follow_ups: []
