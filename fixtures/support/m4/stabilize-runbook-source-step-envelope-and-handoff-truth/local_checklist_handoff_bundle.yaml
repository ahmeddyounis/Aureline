record_kind: runbook_handoff_truth_packet
schema_version: 1
packet_id: support.runbook_handoff_truth.local_checklist_handoff_bundle.v1
schema_ref: schemas/support/runbook-step-envelope.schema.json
source_descriptors:
  - record_kind: runbook_source_descriptor
    source_id: source.repo.workspace.local.recovery.v1
    source_class: repo_local_workspace_local
    authoritative_posture: authoritative
    signer_or_source_ref: signer.repo.maintainers
    freshness_state: current
    approver_policy_ref: approver-policy.local-readonly
    export_right: metadata_only
  - record_kind: runbook_source_descriptor
    source_id: source.mirrored.docs.pack.safe-mode.v1
    source_class: mirrored_docs_pack
    authoritative_posture: authoritative
    signer_or_source_ref: signer.docs.pack
    freshness_state: within_grace
    approver_policy_ref: approver-policy.docs-pack-safe-mode
    export_right: redacted_source_allowed
step_envelopes:
  - record_kind: runbook_step_envelope
    step_id: step.local.checklist.close-follow-up
    step_class: communicate
    target_selector_scope: provider_object
    approval_requirement: no_approval_required
    destination_class: in_product
    expected_evidence_outputs:
      - evidence_id: evidence.local.follow-up
        evidence_class: local_follow_up_ref
        export_ref: export.evidence.local.follow-up
    shared_action_envelope: null
    external_handoff: null
execution_records:
  - record_kind: runbook_step_execution_record
    execution_id: execution.local.follow-up.checked
    step_id: step.local.checklist.close-follow-up
    incident_timeline_id: timeline.incident.944.local.follow-up
    actor_ref: actor.support.operator
    result_state: executed
    approval_refs: []
    deviation_note_refs: []
    external_console_handoff_refs: []
    evidence_export_links:
      - export.evidence.local.follow-up
deviation_notes: []
handoff_bundles:
  - record_kind: runbook_external_handoff_bundle
    handoff_bundle_id: handoff.bundle.provider.ticket.return
    destination_class: provider_control_plane
    reason: Exported follow-up bundle asks the provider owner to review the linked object; local completion does not mutate it.
    return_anchor_ref: follow-up.provider.ticket.return-note
    raw_provider_payload_excluded: true
local_follow_ups:
  - record_kind: runbook_local_follow_up
    follow_up_id: follow-up.provider.ticket.local-check
    provider_object_ownership: provider_owned
    local_completion_state: local_checklist_only
    provider_mutation_claimed: false
    reviewed_command_ref: null
