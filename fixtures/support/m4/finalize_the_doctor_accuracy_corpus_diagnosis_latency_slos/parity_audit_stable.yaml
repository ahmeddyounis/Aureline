# Stable-profile headless/UI parity audit.
#
# Exactly four rows, one per support context. Every row declares which
# machine-readable fields are emitted, which UI affordances are suppressed,
# the capability lifecycle status, and the headless exit code class.

schema_version: 1
record_kind: project_doctor_stable_profile_parity_audit_record
audit_id: parity_audit:stable_profile.v1
profile_name: stable_profile_all_contexts

parity_rows:
  - support_context_class: desktop
    parity_class: full_parity
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - unsupported_state_class
      - suggested_next_action_id
      - safe_mode_ref
      - bisect_ref
      - repair_preview_ref
      - support_bundle_ref
      - escalation_packet_ref
      - exit_code_class
    suppressed_ui_affordances: []
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      Desktop UI renders all affordances and emits the full machine-readable
      field set. This is the reference surface.

  - support_context_class: cli_headless
    parity_class: machine_readable_only_no_ui
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - unsupported_state_class
      - suggested_next_action_id
      - safe_mode_ref
      - bisect_ref
      - repair_preview_ref
      - support_bundle_ref
      - escalation_packet_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
      - preview_diff_pane
      - consent_dialog
      - managed_admin_dialog
      - open_help_link
      - open_runbook_link
      - export_support_packet_link
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_actionable
    notes: >
      CLI headless suppresses all UI affordances but emits the full
      machine-readable field set so findings are replayable across
      surfaces without semantic drift.

  - support_context_class: remote_managed
    parity_class: ui_suppressed_managed_authority_required
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - unsupported_state_class
      - suggested_next_action_id
      - safe_mode_ref
      - bisect_ref
      - repair_preview_ref
      - support_bundle_ref
      - escalation_packet_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - preview_diff_pane
      - consent_dialog
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_blocked_consent_required
    notes: >
      Remote managed context requires managed-admin authority for mutating
      repairs. The diagnosis is emitted but actionable repairs are blocked
      pending authority confirmation.

  - support_context_class: offline_local
    parity_class: machine_readable_only_no_ui
    machine_readable_result_fields:
      - finding_id
      - finding_code
      - probe_id
      - probe_class
      - diagnosis_posture
      - confidence_class
      - confidence_score
      - affected_scope_class
      - affected_scope_ref
      - root_cause_class
      - evidence_refs
      - remaining_unknowns
      - unsupported_state_class
      - suggested_next_action_id
      - safe_mode_ref
      - bisect_ref
      - repair_preview_ref
      - support_bundle_ref
      - escalation_packet_ref
      - exit_code_class
    suppressed_ui_affordances:
      - primary_action_button
      - secondary_action_button
      - evidence_drawer
      - preview_diff_pane
      - consent_dialog
      - managed_admin_dialog
      - open_help_link
      - open_runbook_link
      - export_support_packet_link
    unimplemented_capability_class: implemented
    headless_exit_code_class: exit_findings_advisory_only
    notes: >
      Offline local context emits machine-readable findings but repairs
      that require network access are advisory only. The exit code
      reflects advisory-only status.

notes: >
  This audit covers the four support contexts required by the stable
  lane. Every row includes the six mandatory machine-readable fields
  (finding_id, finding_code, probe_id, probe_class, diagnosis_posture,
  exit_code_class) plus confidence_class so findings are replayable.
