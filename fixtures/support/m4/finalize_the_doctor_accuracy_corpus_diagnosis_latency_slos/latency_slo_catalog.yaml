# Diagnosis-latency SLO catalog — p50 and p95 budgets per scenario and
# measurement surface. Threshold states are initially
# to_be_set_by_benchmark_council so the shape is reviewable before numeric
# targets are frozen.

schema_version: 1
record_kind: project_doctor_latency_slo_catalog_record
catalog_id: doctor.latency_slo_catalog.m4_stable.v1
catalog_version: "1.0.0"
schema_ref: schemas/support/finalize_the_doctor_accuracy_corpus_diagnosis_latency_slos.schema.json
doc_ref: docs/support/m4/finalize_the_doctor_accuracy_corpus_diagnosis_latency_slos.md

latency_rows:
  - row_id: latency:missing_toolchain.local
    metric_family: diagnosis_latency
    scenario_class: missing_toolchain
    measurement_surface: doctor_probe_run_local
    budgets:
      - percentile: p50
        target_ms: 2000
        yellow_ms: 3000
        red_ms: 5000
      - percentile: p95
        target_ms: 5000
        yellow_ms: 7500
        red_ms: 10000
    threshold_state: must_complete_under_diagnosis_latency_budget
    primary_dri_lane: support_export
    co_review_lanes:
      - product_scope_review
    notes: >
      Local toolchain probe must complete quickly because it only checks
      PATH and install roots.

  - row_id: latency:blocked_trust_state.local
    metric_family: diagnosis_latency
    scenario_class: blocked_trust_state
    measurement_surface: doctor_probe_run_local
    budgets:
      - percentile: p50
        target_ms: 500
        yellow_ms: 1000
        red_ms: 2000
      - percentile: p95
        target_ms: 2000
        yellow_ms: 3000
        red_ms: 5000
    threshold_state: must_complete_under_diagnosis_latency_budget
    primary_dri_lane: security_trust_review
    co_review_lanes:
      - support_export
    notes: >
      Trust-state probe is fast because it reads a local store.

  - row_id: latency:broken_watcher.local
    metric_family: diagnosis_latency
    scenario_class: broken_watcher
    measurement_surface: doctor_probe_run_local
    budgets:
      - percentile: p50
        target_ms: 1500
        yellow_ms: 2500
        red_ms: 4000
      - percentile: p95
        target_ms: 4000
        yellow_ms: 6000
        red_ms: 8000
    threshold_state: must_complete_under_diagnosis_latency_budget
    primary_dri_lane: aureline-vfs
    co_review_lanes:
      - support_export
    notes: >
      Watcher probe may retry once before declaring degradation.

  - row_id: latency:incompatible_cache_profile.local
    metric_family: diagnosis_latency
    scenario_class: incompatible_cache_profile
    measurement_surface: doctor_probe_run_local
    budgets:
      - percentile: p50
        target_ms: 1000
        yellow_ms: 1500
        red_ms: 2500
      - percentile: p95
        target_ms: 2500
        yellow_ms: 4000
        red_ms: 6000
    threshold_state: must_complete_under_diagnosis_latency_budget
    primary_dri_lane: support_export
    co_review_lanes:
      - product_scope_review
    notes: >
      Cache-profile probe reads a version file; latency is predictable.

  - row_id: latency:extension_regression.local
    metric_family: diagnosis_latency
    scenario_class: extension_regression
    measurement_surface: doctor_probe_run_local
    budgets:
      - percentile: p50
        target_ms: 3000
        yellow_ms: 5000
        red_ms: 8000
      - percentile: p95
        target_ms: 8000
        yellow_ms: 12000
        red_ms: 15000
    threshold_state: must_complete_under_diagnosis_latency_budget
    primary_dri_lane: compatibility_ecosystem_review
    co_review_lanes:
      - support_export
    notes: >
      Extension regression probe may load the extension host; budget is
      wider than store-read probes.

  - row_id: latency:wrong_target_environment.managed
    metric_family: diagnosis_latency
    scenario_class: wrong_target_environment
    measurement_surface: doctor_probe_run_managed
    budgets:
      - percentile: p50
        target_ms: 2000
        yellow_ms: 3000
        red_ms: 5000
      - percentile: p95
        target_ms: 5000
        yellow_ms: 7500
        red_ms: 10000
    threshold_state: to_be_set_by_benchmark_council
    primary_dri_lane: security_trust_review
    co_review_lanes:
      - support_export
      - product_scope_review
    notes: >
      Managed-profile target probe may query the control plane. Numeric
      target reserved to the benchmark council pending measurement.

  - row_id: latency:failed_helper_attach.managed
    metric_family: diagnosis_latency
    scenario_class: failed_helper_attach
    measurement_surface: doctor_probe_run_managed
    budgets:
      - percentile: p50
        target_ms: 3000
        yellow_ms: 5000
        red_ms: 8000
      - percentile: p95
        target_ms: 8000
        yellow_ms: 12000
        red_ms: 15000
    threshold_state: to_be_set_by_benchmark_council
    primary_dri_lane: security_trust_review
    co_review_lanes:
      - support_export
    notes: >
      Helper attach includes process spawn and health-check timeout.
      Reserved to the benchmark council.

  - row_id: latency:degraded_docs_mirror.local
    metric_family: diagnosis_latency
    scenario_class: degraded_docs_mirror
    measurement_surface: doctor_probe_run_local
    budgets:
      - percentile: p50
        target_ms: 2000
        yellow_ms: 3000
        red_ms: 5000
      - percentile: p95
        target_ms: 5000
        yellow_ms: 7500
        red_ms: 10000
    threshold_state: must_complete_under_diagnosis_latency_budget
    primary_dri_lane: docs_public_truth
    co_review_lanes:
      - support_export
    notes: >
      Docs mirror probe performs an HTTP HEAD request; budget includes
      network timeout.

notes: >
  This catalog seeds p50 and p95 budgets for the M4 stable lane. Rows
  that still carry to_be_set_by_benchmark_council are reviewable in
  shape only; the benchmark council must approve numeric targets before
  they can gate a release candidate.
