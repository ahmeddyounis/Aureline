recovery_ladder_bindings:
- rung_class: safe_mode
  support_class: launch_stable
  requires_review: false
  rung_summary: Safe mode is the current active recovery posture.
  evidence_refs:
  - doctor.finding.restore_continuity.replay_blocked
- rung_class: open_without_restore
  support_class: launch_stable
  requires_review: true
  rung_summary: Open workspace without restoring prior session state.
  evidence_refs:
  - doctor.finding.restore_continuity.replay_blocked
- rung_class: disable_recent_extension
  support_class: launch_stable_below
  requires_review: true
  rung_summary: Disable the most recently changed extension and retry.
  evidence_refs:
  - doctor.finding.restore_continuity.replay_blocked
- rung_class: disable_recent_layout
  support_class: launch_stable_below
  requires_review: true
  rung_summary: Disable the most recently changed profile or layout and retry.
  evidence_refs:
  - doctor.finding.restore_continuity.replay_blocked
- rung_class: open_logs
  support_class: launch_stable
  requires_review: false
  rung_summary: Open the logs folder for local review.
  evidence_refs:
  - evidence:safe-mode:startup-strikes
- rung_class: export_crash_manifest
  support_class: launch_stable
  requires_review: true
  rung_summary: Export the crash manifest as a redacted support bundle.
  evidence_refs:
  - evidence:safe-mode:startup-strikes
- rung_class: report_issue
  support_class: beta_grade_only
  requires_review: true
  rung_summary: Report an issue with attached redacted diagnostics.
  evidence_refs:
  - doctor.finding.restore_continuity.replay_blocked
destructive_resets_present: false
return_path:
  fuller_mode_class: full_mode
  return_action:
    action_id: action:safe-mode.exit-after-review
    requires_review: true
    summary: Exit safe mode after the crash-loop finding is reviewed and normal launch
      is explicitly chosen.
  restore_conditions:
  - Crash-loop strike window has been reviewed by the user.
  - Project Doctor finding has been acknowledged or escalated.
  - User explicitly chooses normal launch from the recovery surface.
evidence:
- evidence_ref: doctor.finding.restore_continuity.replay_blocked
  evidence_kind: project_doctor_finding
  summary: Project Doctor classified restore continuity as unsafe to replay during
    startup.
- evidence_ref: evidence:safe-mode:startup-strikes
  evidence_kind: restart_budget
  summary: Startup attempts exceeded the configured restart budget; raw stacks and
    paths are excluded.
