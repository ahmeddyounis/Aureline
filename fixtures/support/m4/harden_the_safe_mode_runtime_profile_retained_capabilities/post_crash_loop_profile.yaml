declared_hosts:
- host_id: safe_mode_host:extension_host:default
  host_class: extension_host
  disposition_class: disabled
  reason_class: startup_crash_loop_detected
  narrowing_summary: Extension host launch is disabled while the startup crash-loop
    is reviewed.
- host_id: safe_mode_host:ai_runtime_host:default
  host_class: ai_runtime_host
  disposition_class: disabled
  reason_class: startup_crash_loop_detected
  narrowing_summary: AI runtime host launch is disabled to bound side effects during
    recovery.
- host_id: safe_mode_host:remote_helper_host:default
  host_class: remote_helper_host
  disposition_class: disabled
  reason_class: startup_crash_loop_detected
  narrowing_summary: Remote helper auto-attach is disabled until the crash-loop finding
    is reviewed.
- host_id: safe_mode_host:background_indexer_host:default
  host_class: background_indexer_host
  disposition_class: narrowed_to_local_only
  reason_class: startup_crash_loop_detected
  narrowing_summary: Background indexer is reduced to local-only reads; rebuilds are
    deferred until recovery completes.
declared_services:
- service_id: safe_mode_service:extension_auto_activation
  service_class: extension_auto_activation
  disposition_class: disabled
  reason_class: startup_crash_loop_detected
  narrowing_summary: Third-party extension auto-activation is disabled while safe
    mode is active.
- service_id: safe_mode_service:session_restore_auto_replay
  service_class: session_restore_auto_replay
  disposition_class: disabled
  reason_class: unsafe_replay_detected
  narrowing_summary: Restore replay is disabled because Project Doctor flagged continuity
    as unsafe to replay.
- service_id: safe_mode_service:background_rebuild
  service_class: background_rebuild
  disposition_class: disabled
  reason_class: startup_crash_loop_detected
  narrowing_summary: Heavy background rebuild work is disabled until the recovery
    rung clears.
- service_id: safe_mode_service:telemetry_upload
  service_class: telemetry_upload
  disposition_class: narrowed_to_local_only
  reason_class: startup_crash_loop_detected
  narrowing_summary: Telemetry upload is reduced to local-only buffering while the
    user reviews the finding.
- service_id: safe_mode_service:remote_auto_reattach
  service_class: remote_auto_reattach
  disposition_class: disabled
  reason_class: startup_crash_loop_detected
  narrowing_summary: Remote auto-reattach is disabled to avoid resuming a crashing
    host environment.
declared_surfaces:
- surface_id: safe_mode_surface:extension_marketplace_panel
  surface_class: extension_marketplace_panel
  disposition_class: narrowed_to_reviewer_view
  reason_class: startup_crash_loop_detected
  narrowing_summary: Extension marketplace panel is reviewer-only; install actions
    are gated behind safe-mode exit.
- surface_id: safe_mode_surface:ai_assistant_panel
  surface_class: ai_assistant_panel
  disposition_class: disabled
  reason_class: startup_crash_loop_detected
  narrowing_summary: AI assistant panel is disabled while the AI runtime host is offline.
retained_capabilities:
- capability_class: local_editing
  rationale: User-authored files must remain editable so the blocked user can keep
    working.
  support_guidance: You can still open, edit, and save files in your workspace. Syntax
    highlighting and basic IntelliSense for local files remain available.
  explicitly_tested: true
- capability_class: basic_navigation
  rationale: Basic navigation must remain available so the user can move between files.
  support_guidance: File tree, quick open, and go-to-definition for local symbols
    remain available.
  explicitly_tested: true
- capability_class: local_search
  rationale: Local search must remain available so the user can find content in their
    workspace.
  support_guidance: Workspace search and find-in-files remain available for local
    content.
  explicitly_tested: true
- capability_class: local_git_operations
  rationale: Local Git operations must remain available so the user can review and
    commit changes.
  support_guidance: Git status, diff, and commit remain available for local repositories.
  explicitly_tested: true
- capability_class: local_diagnostics_export
  rationale: Diagnostics export must remain available so the user can gather evidence
    for support.
  support_guidance: You can still export diagnostics and review the support-bundle
    preview locally.
  explicitly_tested: true
- capability_class: support_bundle_preview
  rationale: Support-bundle preview must remain available so the user can review what
    would be shared.
  support_guidance: The support-bundle preview surface remains open so you can inspect
    redaction and contents before export.
  explicitly_tested: true
- capability_class: project_doctor_surfaces
  rationale: Project Doctor surfaces must remain reachable so the user can review
    findings.
  support_guidance: Project Doctor remains available so you can review the diagnosis
    that led to safe mode.
  explicitly_tested: true
- capability_class: safe_mode_exit_action
  rationale: Safe-mode exit must remain reachable so the user can explicitly return
    to full mode.
  support_guidance: The safe-mode exit action remains available from the recovery
    surface after review.
  explicitly_tested: true
preserved_state_classes:
- user_authored_files
- open_buffer_selection
- durable_workspace_indexes
- workspace_trust_store
- credential_store
- session_restore_store
- support_export_store
