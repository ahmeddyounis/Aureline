# Recovery-ladder seed case: restricted-mode fallback.
#
# Companion to docs/support/recovery_ladder_packet.md and
# schemas/support/recovery_action.schema.json. Validates against
# recovery_ladder_seed_case_record.

recovery_action_schema_version: 1
record_kind: recovery_ladder_seed_case_record
case_id: recovery_case:restricted_reopen.managed_fallback
scenario_summary: >
  Managed policy, a wrong-target detection, a trust-state drift, or a
  helper attach failure forced a restricted reopen. The user can still
  inspect local state, but remote writes and managed control-plane
  mutations are suspended until reapproval lands. This rung has no
  local reversal path; widening requires a reviewed reapproval flow or
  an escalation packet.
recovery_action_id: recovery_action:restricted_reopen.managed_fallback
rung_class: restricted_reopen
reversal_class: no_undo_export_only

preconditions:
  - >
    Supervisor or Doctor observed route_recovery_required,
    policy_blocked, or manual_review_required on the remote_connectors,
    policy_entitlement_verifier_helpers, or managed control-plane
    surface.
  - >
    Approval ticket, workspace trust posture, or target identity is
    not in a state the user may widen from without explicit review.

preserved_state_classes:
  - user_authored_files
  - open_buffer_selection
  - durable_workspace_indexes
  - workspace_trust_store
  - credential_store
  - remote_helper_authorization
  - managed_policy_overrides
  - support_export_store

lost_capability_classes:
  - remote_helper_attach
  - managed_control_plane_writes
  - workspace_trust_widening
  - telemetry_upload
  - docs_pack_live_fetch

escalation_trigger_classes:
  - no_local_repair_path_available
  - user_denied_next_rung
  - policy_forced_narrower_than_user_request
  - rung_exit_reason_denied_by_policy

linkage_refs:
  support_bundle_case_ref: fixtures/support/support_bundle_examples/recovery_ladder_remote_connector_loss.json
  object_handoff_case_ref: fixtures/support/escalation_packet_completeness_cases/wrong_target_environment_requires_reapproval.yaml
  project_doctor_finding_ref: doctor.finding.wrong_target_detected_requires_reapproval
  repair_transaction_ref: null
  checkpoint_ref: null

explanation_fields:
  preserved_work_summary: >
    Authored files, open buffers, durable indexes, trust posture,
    credentials, remote-helper authorization, managed policy, and any
    already-exported support bundles remain untouched.
  disabled_capability_summary: >
    Remote helper attach, managed control-plane writes, workspace
    trust widening, telemetry upload, and docs-pack live fetch stay
    disabled until an explicit reapproval lands.
  escalation_summary: >
    Escalate to an object-issue handoff packet whenever the rung
    reports no_local_repair_path_available, when the user declines
    reapproval, when managed policy forces a narrower posture than
    the user requested, or when an exit attempt produced a
    denied_by_policy reason.
  user_facing_next_step: >
    Export a recovery-follow-up handoff packet naming the scenario
    row, the Doctor finding code, and the support-bundle ref. Widen
    only through the reapproval flow the handoff packet routes to.

default_redaction_choice_class: support_bundle_by_reference
observe_only_variant_case_ref: recovery_case:restricted_reopen.observe_only_baseline
notes: >
  no_undo_export_only is enforced by the schema: this row declares
  no_local_repair_path_available in its escalation_trigger_classes
  and defaults redaction to support_bundle_by_reference so the
  exported packet carries ticket ids and bundle refs rather than raw
  credential material. See
  fixtures/support/escalation_packet_completeness_cases/wrong_target_environment_requires_reapproval.yaml
  for the matched handoff-case contract.
emitted_at: "2026-04-23T00:00:00Z"
