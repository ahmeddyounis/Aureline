schema_version: 1
record_kind: project_doctor_alpha_probe_scenario
scenario_id: project_doctor.alpha.git_repository_unavailable
title: Git repository baseline unavailable for selected root
family: git_baseline
probe_id: doctor.probe.git.baseline_status
probe_version: probe.git.baseline_status.v1
support_context: desktop

scope:
  scope_class: workspace
  scope_ref: workspace:active.git_root

observed_state:
  problem_class: git_repository_unavailable
  expected_ref: git:status.repository_identity_available
  observed_ref: git:status.not_repository
  expected_key: doctor.git.expected.repository_identity_available
  observed_key: doctor.git.observed.not_repository

evidence:
  - evidence_ref: evidence:git.status_snapshot
    evidence_role: primary
    source_class: existing_manifest
    signal_class: manifest
    data_class: metadata_only
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_reference
    replayability_class: replayable_from_refs
  - evidence_ref: evidence:git.activity.degraded_row
    evidence_role: corroborating
    source_class: health_event
    signal_class: health_event
    data_class: metadata_only
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs

safety:
  read_only_by_default: true
  allowed_side_effects:
    - read_existing_metadata
  forbidden_side_effects:
    - activate_third_party_extension
    - collect_high_risk_payload
    - execute_repo_owned_code
    - external_service_mutation
    - mutate_cache_or_index
    - mutate_target_or_route
    - mutate_trust_policy_or_credentials
    - mutate_user_files
  later_repair_flow_required_for_mutation: true

recovery:
  recovery_action_id: action.git.open_baseline_details
  recovery_action_class: open_git_baseline_details
  repair_availability_class: handoff_only
  repair_candidate_ids: []
  recovery_path_ref: recovery.git.open_baseline_details
  runbook_ref: docs/support/runbook_execution_contract.md#git-baseline
  support_bundle_ref: support.bundle.project_doctor.git_baseline
  escalation_packet_ref: escalation.packet.project_doctor.git_baseline

expected:
  finding_id: finding:project_doctor:alpha:git_repository_unavailable
  finding_code: doctor.finding.git_baseline.repository_unavailable
  recovery_action_class: open_git_baseline_details
