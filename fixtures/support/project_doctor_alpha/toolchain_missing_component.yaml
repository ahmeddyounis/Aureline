schema_version: 1
record_kind: project_doctor_alpha_probe_scenario
scenario_id: project_doctor.alpha.toolchain_missing_component
title: Required toolchain component missing
family: toolchain_detection
probe_id: doctor.probe.toolchain.detection
probe_version: probe.toolchain.detection.v1
support_context: cli_headless

scope:
  scope_class: target
  scope_ref: target:active.execution_context

observed_state:
  problem_class: required_toolchain_missing
  expected_ref: execution-context:toolchain.required_component_present
  observed_ref: execution-context:toolchain.required_component_missing
  expected_key: doctor.toolchain.expected.required_component_present
  observed_key: doctor.toolchain.observed.required_component_missing

evidence:
  - evidence_ref: evidence:execution_context.required_toolchain
    evidence_role: primary
    source_class: existing_manifest
    signal_class: manifest
    data_class: environment_adjacent
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_reference
    replayability_class: replayable_from_refs
  - evidence_ref: evidence:execution_context.resolution_policy
    evidence_role: corroborating
    source_class: policy_decision
    signal_class: policy_decision
    data_class: metadata_only
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs

safety:
  read_only_by_default: true
  allowed_side_effects:
    - read_existing_metadata
    - hash_existing_artifact
  forbidden_side_effects:
    - activate_third_party_extension
    - collect_high_risk_payload
    - execute_repo_owned_code
    - external_service_mutation
    - mutate_cache_or_index
    - mutate_target_or_route
    - mutate_trust_policy_or_credentials
    - mutate_user_files
  later_repair_flow_required_for_mutation: true

recovery:
  recovery_action_id: action.toolchain.reresolve
  recovery_action_class: reresolve_toolchain
  repair_availability_class: preview_only
  repair_candidate_ids:
    - repair.execution_context.reresolve.preview
  recovery_path_ref: repair.preview.execution_context.reresolve
  runbook_ref: docs/support/runbook_execution_contract.md#execution-context
  support_bundle_ref: support.bundle.project_doctor.toolchain
  escalation_packet_ref: escalation.packet.project_doctor.toolchain

expected:
  finding_id: finding:project_doctor:alpha:toolchain_missing_component
  finding_code: doctor.finding.toolchain_missing_required_component
  recovery_action_class: reresolve_toolchain
