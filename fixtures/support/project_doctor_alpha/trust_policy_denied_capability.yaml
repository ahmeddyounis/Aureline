schema_version: 1
record_kind: project_doctor_alpha_probe_scenario
scenario_id: project_doctor.alpha.trust_policy_denied_capability
title: Trust or policy denied launch-wedge capability
family: trust_policy
probe_id: doctor.probe.trust.policy_gate
probe_version: probe.trust.policy_gate.v1
support_context: desktop

scope:
  scope_class: workspace
  scope_ref: workspace:active.trust_policy

observed_state:
  problem_class: trust_policy_denied
  expected_ref: restricted-mode:capability.execution_allowed
  observed_ref: restricted-mode:capability.execution_blocked
  expected_key: doctor.trust_policy.expected.capability_allowed
  observed_key: doctor.trust_policy.observed.capability_blocked

evidence:
  - evidence_ref: evidence:trust.policy_denial
    evidence_role: primary
    source_class: policy_decision
    signal_class: policy_decision
    data_class: metadata_only
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_default_metadata
    replayability_class: replayable_from_refs
  - evidence_ref: evidence:trust.capability_receipt
    evidence_role: corroborating
    source_class: existing_manifest
    signal_class: manifest
    data_class: metadata_only
    redaction_class: metadata_safe_default
    support_pack_inclusion_class: included_by_reference
    replayability_class: replayable_from_refs

safety:
  read_only_by_default: true
  allowed_side_effects:
    - read_existing_metadata
  forbidden_side_effects:
    - activate_third_party_extension
    - collect_high_risk_payload
    - execute_repo_owned_code
    - external_service_mutation
    - mutate_cache_or_index
    - mutate_target_or_route
    - mutate_trust_policy_or_credentials
    - mutate_user_files
  later_repair_flow_required_for_mutation: true

recovery:
  recovery_action_id: action.trust_policy.open_details
  recovery_action_class: open_policy_details
  repair_availability_class: reviewed_repair_available
  repair_candidate_ids:
    - repair.trust.review_approval.preview
  recovery_path_ref: repair.preview.trust.approval_review
  runbook_ref: docs/support/runbook_execution_contract.md#trust-policy
  support_bundle_ref: support.bundle.project_doctor.trust_policy
  escalation_packet_ref: escalation.packet.project_doctor.trust_policy

expected:
  finding_id: finding:project_doctor:alpha:trust_policy_denied_capability
  finding_code: doctor.finding.trust_policy_blocked
  recovery_action_class: open_policy_details
