# Supportability governed-case manifest.
#
# Companion to docs/architecture/supportability_adr.md,
# schemas/support/doctor_finding.schema.json, and
# schemas/support/trace_capture_request.schema.json.

schema_version: 1
manifest_id: support.supportability.cases.v1
status: seeded
overview_page: docs/architecture/supportability_adr.md

schema_refs:
  doctor_finding_schema: schemas/support/doctor_finding.schema.json
  trace_capture_request_schema: schemas/support/trace_capture_request.schema.json
  support_bundle_schema: schemas/support/support_bundle.schema.json
  recovery_action_schema: schemas/support/recovery_action.schema.json
  repair_transaction_schema: schemas/support/repair_transaction.schema.json
  object_handoff_packet_schema: schemas/support/object_handoff_packet.schema.json

case_files:
  - desktop_safe_mode_extension_crash_loop.yaml
  - cli_headless_exact_build_trace.yaml
  - managed_remote_escalation_packet.yaml
  - offline_redaction_support_bundle.yaml

capability_contexts:
  - desktop
  - cli_headless
  - remote_managed
  - offline_local

required_case_assertions:
  - findings_use_shared_doctor_ids
  - probes_are_non_mutating_until_repair
  - support_pack_items_have_inclusion_and_redaction_classes
  - high_risk_artifacts_are_gated_before_export
  - exact_build_identity_is_present_for_trace_capture
  - support_context_capability_map_is_explicit
  - first_actionable_diagnosis_target_is_declared

notes: >
  These cases are reviewer-facing seeds. They show how Doctor findings,
  safe mode, extension bisect, support bundles, escalation packets, and
  trace capture all refer to the same supportability vocabulary rather
  than surface-local terms.
