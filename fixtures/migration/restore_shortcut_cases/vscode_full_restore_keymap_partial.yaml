  muscle_memory_risk_summary:
    highest_risk_class: high
    daily_driver_delta_count: 2
    high_risk_row_count: 1
    summary_notes:
      - Save All gesture moved to <leader> w a on the destination profile.
      - Keybindings chord auto-remapped one shift away from the imported chord.
  claim_narrowing_summary:
    overall_implication_class: narrow_to_documented_remap_only
    narrowing_actions_required:
      - narrow_to_documented_remap_only
      - add_known_limit_row
    summary: Compatible restore with a documented remap row; daily-driver Save All gesture is the user-visible delta.
    rule_refs:
      - narrowing_rule:partial_or_lower_restore_narrows_keymap
      - narrowing_rule:unresolved_conflict_on_daily_driver
    known_limit_refs:
      - known-limit:vs-code-keymap-leader-required
  publication_links:
    docs_help_refs:
      - docs-ref:first-run-import-shortcuts
      - docs-ref:first-run-import-overview
    support_export_refs:
      - support:first-run-vscode-common
    migration_report_refs:
      - migration-report:vs-code-first-run-0001
    claim_manifest_refs:
      - artifacts/governance/claim_manifest_seed.yaml#publication_channels.migration_notes
    compatibility_row_refs:
      - compat_row:command_plane.command_descriptor_schema
    issue_template_refs:
      - docs/governance/dogfood_issue_taxonomy.md
    release_report_refs:
      - docs/release/compatibility_report_template.md
  scoreboard_refs:
    - migration_gap_row:vscode.command_palette.exact
    - migration_gap_row:vscode.save_all.translated
  freshness:
    captured_at: "2026-05-01T08:30:00Z"
    evidence_state: seed_only
    source_revision: fixtures/migration/restore_shortcut_cases/vscode_full_restore_keymap_partial.yaml@1
  emitted_at: "2026-05-01T08:30:00Z"

assertions:
  - id: restore_envelope_present
    statement: The packet carries a typed restore_fidelity_envelope and post-restore validation refs.
  - id: deltas_not_collapsed
    statement: Save All remap is visible as a remapped_gesture row instead of folding into 'imported successfully'.
  - id: narrowing_summary_matches_rules
    statement: The packet's claim_narrowing_summary follows the partial-restore narrowing rule and adds a known-limit row.
