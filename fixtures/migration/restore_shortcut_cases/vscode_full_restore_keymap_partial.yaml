  record_kind: shortcut_delta_digest_packet_record
  shortcut_digest_id: shortcut_delta_digest:vs-code-first-run-0001
  migration_session_ref: migration-session:vs-code-first-run-0001
  source_ecosystem_id: vs_code_code_oss
  importer_outcome_packet_ref: importer-outcome-packet:vs-code-first-run-0001
  shortcut_digest_companion_ref: migration-shortcut-digest:vs-code-first-run-0001
  imported_command_rows:
    - schema_version: 1
      record_kind: shortcut_delta_digest_row_record
      row_id: shortcut_delta_row:vscode-command-palette
      migration_session_ref: migration-session:vs-code-first-run-0001
      source_ecosystem_id: vs_code_code_oss
      domain: command_palette
      imported_command_ref: vscode:workbench.action.showCommands
      imported_command_label: Command Palette
      imported_gesture: Ctrl+Shift+P
      delta_state: imported_exact
      muscle_memory_risk_class: low
      muscle_memory_risk_note: Command Palette gesture lands exact on the destination profile.
      frequency_bucket: daily_driver
      claim_narrowing_implication:
        implication_class: no_narrowing_required
        summary: Default Command Palette chord lands exact on the destination profile.
      docs_help_refs:
        - docs-ref:first-run-import-shortcuts
  remapped_gesture_rows:
    - schema_version: 1
      record_kind: shortcut_delta_digest_row_record
      row_id: shortcut_delta_row:vscode-save-all
      migration_session_ref: migration-session:vs-code-first-run-0001
      source_ecosystem_id: vs_code_code_oss
      domain: editor_basic
      imported_command_ref: vscode:workbench.action.files.saveAll
      imported_command_label: Save All
      imported_gesture: Ctrl+K S
      remapped_gesture: <leader> w a
      remapped_target_command_ref: aureline:command:workspace.save_all
      delta_state: remapped_to_native
      muscle_memory_risk_class: high
      muscle_memory_risk_note: Save All now requires the default leader sequence on the destination profile.
      frequency_bucket: daily_driver
      claim_narrowing_implication:
        implication_class: narrow_to_documented_remap_only
        summary: Save All translates via leader sequence; documented remap row is required.
        rule_refs:
          - narrowing_rule:partial_or_lower_restore_narrows_keymap
      docs_help_refs:
        - docs-ref:first-run-import-shortcuts
      support_export_refs:
        - support:first-run-vscode-common
  conflict_resolution_rows:
    - schema_version: 1
      record_kind: shortcut_delta_digest_row_record
      row_id: shortcut_delta_row:vscode-keybindings-open
      migration_session_ref: migration-session:vs-code-first-run-0001
      source_ecosystem_id: vs_code_code_oss
      domain: other
      imported_command_ref: vscode:workbench.action.openGlobalKeybindings
      imported_command_label: Show Keybindings
      imported_gesture: Ctrl+K Ctrl+S
      remapped_gesture: Ctrl+K Ctrl+Shift+S
      remapped_target_command_ref: aureline:command:keybindings.open
      delta_state: conflict_resolved_remap
      conflict_resolution:
        resolution_class: remapped_imported_to_alternate_chord
        decided_by: automatic_default_policy
        conflict_with_ref: aureline:keybinding:keybindings.open
        preserved_prior_artifact_ref: preserved-artifact:local-keybindings-before-import
        summary: Imported chord collided with an existing target chord; importer auto-remapped to an unused alternate.
      muscle_memory_risk_class: medium
      muscle_memory_risk_note: Keybindings chord moves one shift away; user is informed at apply time.
      frequency_bucket: occasional
      claim_narrowing_implication:
        implication_class: add_explicit_known_limit
        summary: Documented remap row required so users discover the alternate chord.
      docs_help_refs:
        - docs-ref:first-run-import-shortcuts
  unresolved_gap_rows: []
  skipped_rows:
    - schema_version: 1
      record_kind: shortcut_delta_digest_row_record
      row_id: shortcut_delta_row:vscode-telemetry
      migration_session_ref: migration-session:vs-code-first-run-0001
      source_ecosystem_id: vs_code_code_oss
      domain: other
      imported_command_ref: vscode:setting:telemetry.enableCrashReporter
      imported_command_label: telemetry.enableCrashReporter
