# Migration import-diff manifest.
#
# Stable case ids for the import_diff_row_record every migration /
# import / restore surface (migration-center diff rail, first-run
# import review, post-import follow-up, issue-template export,
# support-export row, release-evidence packet) emits. Later
# migration-center, conflict-journal, profile-library, and managed-
# sync surfaces should cite these ids instead of minting per-surface
# migration language, silent "approximate" labels, or an ambiguous
# "restored" chip.
#
# This manifest is the companion roster for
# docs/verification/migration_and_profile_packet.md. If the two
# disagree, the packet doc wins for reviewer language and the frozen
# contracts (docs/migration/migration_center_object_model.md,
# docs/state/migration_and_restore_playbook.md,
# docs/state/profile_and_state_map.md,
# schemas/migration/migration_session.schema.json,
# schemas/migration/importer_outcome.schema.json,
# schemas/state/restore_provenance.schema.json) win for tooling.
#
# Rules:
#   - Every import-diff row MUST cite one interop_result_state token,
#     one fidelity_label token, and one state_plane token from the
#     frozen vocabularies. Silent blanks are non-conforming.
#   - Rows whose outcome_state is imported / mapped / manual_review /
#     bridge_required / unsupported MUST obey the closed mapping in
#     docs/verification/migration_and_profile_packet.md
#     §Lossy-vs-exact migration labels.
#   - Rows whose state_plane_projection is non_portable_live_authority
#     MAY NOT claim outcome_state = imported.
#   - Rows touching user_authored_durable_truth with outcome_state in
#     {mapped, manual_review, bridge_required} MUST cite a non-null
#     preserved_prior_artifact_ref and a non-null
#     rollback_checkpoint_ref.
#   - Sync-conflict rows MUST cite local_side, remote_side,
#     last_common_ancestor_ref (when required), and
#     reviewer_action_required.
#   - Rollback rows MUST project onto one
#     rollback_checkpoint_outcome_class token and MUST cite the
#     restore_record_ref of the session they rolled back.
#   - Adding a case id is additive-minor. Repurposing an id is
#     breaking and requires a new decision row in
#     artifacts/governance/decision_index.yaml.

