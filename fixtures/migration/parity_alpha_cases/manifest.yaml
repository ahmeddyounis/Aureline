schema_version: 1
as_of: "2026-05-12"
owner: "@ahmeddyounis"

manifest_id: migration_parity_alpha_cases
scoreboard_ref: artifacts/migration/m2_parity_scoreboard.yaml
taxonomy_ref: artifacts/migration/import_gap_taxonomy.yaml
diagnostics_packet_ref: docs/migration/import_diagnostics_packet.md

case_vocabulary:
  - native_parity
  - bridged_parity
  - lossy_mapping
  - unsupported_items
  - manual_follow_up
  - retained_import_diagnostics
  - known_gap_issue_template_binding

cases:
  - case_id: native_vscode_settings_keymap
    exercises_parity_state: native_parity
    scoreboard_row_ref: migration_parity_row:tsjs.vscode.settings_keymap.native
    source_fixture_refs:
      - fixtures/migration/import_preview_cases/full_preview_vscode_common.yaml
    expected_retained_diagnostics: true
    expected_taxonomy_gap_refs: []

  - case_id: bridged_vscode_extension_provider
    exercises_parity_state: bridged_parity
    scoreboard_row_ref: migration_parity_row:tsjs.vscode.extension_provider.bridged
    source_fixture_refs:
      - fixtures/migration/compatibility_scorecards/native_alternative_recommendation.json
    expected_retained_diagnostics: true
    expected_taxonomy_gap_refs:
      - import_gap:extension_provider_bridge_not_native

  - case_id: lossy_keymap_chord_remap
    exercises_parity_state: lossy_mapping
    scoreboard_row_ref: migration_parity_row:tsjs.vscode.keymap_chord.lossy
    source_fixture_refs:
      - fixtures/commands/keybinding_conflict_examples/high_frequency_shortcut_diff_after_import.json
    expected_retained_diagnostics: true
    expected_taxonomy_gap_refs:
      - import_gap:keymap_chord_capacity_remap

  - case_id: unsupported_webview_extension
    exercises_parity_state: unsupported_items
    scoreboard_row_ref: migration_parity_row:tsjs.vscode.webview_extension.unsupported
    source_fixture_refs:
      - fixtures/migration/compatibility_scorecards/unsupported_webview_extension.json
    expected_retained_diagnostics: true
    expected_taxonomy_gap_refs:
      - import_gap:extension_runtime_webview_unsupported

  - case_id: manual_followup_jetbrains_run_debug
    exercises_parity_state: manual_follow_up
    scoreboard_row_ref: migration_parity_row:python.jetbrains.run_debug.manual_follow_up
    source_fixture_refs:
      - fixtures/migration/equivalence_cases/jetbrains_run_debug_needs_manual_review.yaml
    expected_retained_diagnostics: true
    expected_taxonomy_gap_refs:
      - import_gap:tasks_run_config_execution_context_review

  - case_id: lossy_python_launch_config
    exercises_parity_state: lossy_mapping
    scoreboard_row_ref: migration_parity_row:python.vscode.launch_config.lossy
    source_fixture_refs:
      - fixtures/migration/equivalence_cases/vscode_task_translated.yaml
    expected_retained_diagnostics: true
    expected_taxonomy_gap_refs:
      - import_gap:tasks_run_config_execution_context_review

  - case_id: retained_diagnostics_export
    exercises_parity_state: retained_import_diagnostics
    scoreboard_row_ref: migration_parity_row:tsjs.vscode.webview_extension.unsupported
    source_fixture_refs:
      - docs/migration/import_diagnostics_packet.md
    expected_retained_diagnostics: true
    expected_revisit_surface_refs:
      - migration_center_history
      - support_export
      - issue_template

  - case_id: known_gap_issue_template_binding
    exercises_parity_state: known_gap_issue_template_binding
    scoreboard_row_ref: migration_parity_row:python.jetbrains.run_debug.manual_follow_up
    source_fixture_refs:
      - artifacts/migration/import_gap_taxonomy.yaml
    expected_retained_diagnostics: true
    expected_taxonomy_gap_refs:
      - import_gap:tasks_run_config_execution_context_review
