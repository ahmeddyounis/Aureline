# Protected import-diff review case for a common VS Code profile lane.
schema_version: 1
case_id: first_run_import.diff_review.vscode_common_retained_report
title: VS Code import diff review creates one rollback checkpoint and retained report links
source_fixture_ref: fixtures/import/m1_classifier_cases/vscode_workspace
destination_workspace_target: profile:default
required_domains:
  - settings
  - shortcuts
  - keymaps
  - themes_and_visuals
  - workspace_profile
required_classifications:
  - exact
  - translated
  - partial
  - shimmed
  - unsupported
required_reopen_surfaces:
  - settings
  - help
  - support_export
required_conflict_inspector_ref: surface:help.keybinding_inspector.conflicts
acceptance:
  every_row_has_before_after_diff: true
  every_row_uses_one_checkpoint: true
  checkpoint_created_before_apply: true
  retained_report_survives_first_run: true
  shortcut_delta_report_reopenable: true
  lossy_and_unsupported_visible_after_apply: true
  shortcut_conflicts_visible_before_apply: true
