# First-run import preview case: full dry-run preview before apply.
schema_version: 1
case_id: first_run_import.full_preview.vscode_common
title: Full preview of a common VS Code profile import
contract_refs:
  - docs/migration/first_run_import_diff_and_rollback_contract.md
  - schemas/migration/import_plan.schema.json
  - schemas/migration/import_diff_preview.schema.json
  - schemas/migration/import_rollback_checkpoint.schema.json
  - schemas/migration/importer_outcome.schema.json
  - schemas/migration/migration_session.schema.json

source_detection:
  source_installations:
    - source_installation_ref: source-installation:vscode-stable
      source_kind: vs_code
      display_name: VS Code
      detection_state: detected
      discovery_method: known_platform_location
      path_availability_class: available_readable
      source_read_posture: manifest_and_schema_only
      source_path_ref: path-ref:vscode-default-profile
      evidence_refs:
        - evidence:first-run-detector-vscode-default
  discovered_profiles:
    - source_profile_ref: source-profile:vscode-default
      source_installation_ref: source-installation:vscode-stable
      profile_label: Default profile
      source_scope: user_profile
      profile_discovery_state: selected
      profile_portability_state: portable_plain
      selected_for_plan: true
      domain_availability:
        - domain: settings
          availability_state: available_for_preview
          estimated_source_item_count: 24
        - domain: shortcuts
          availability_state: available_for_preview
          estimated_source_item_count: 18
        - domain: extensions_and_providers
          availability_state: available_metadata_only
          estimated_source_item_count: 8
        - domain: launch_debug
          availability_state: available_for_preview
          estimated_source_item_count: 2

import_plan:
  import_plan_id: import-plan:first-run-vscode-common
  migration_session_ref: migration-session:first-run-vscode-common
  target_descriptor:
    target_kind: profile_library_entry
    target_ref: target-profile:local-default
    apply_scope: profile_only
    target_owner_class: user_owned_durable_truth
    current_revision_ref: profile-revision:before-first-import
  selected_domains:
    - settings
    - shortcuts
    - extensions_and_providers
    - launch_debug
  write_authority_posture: none_dry_run_only
  dry_run_stability: current_complete
  plan_summary:
    detected_source_count: 1
    unavailable_source_count: 0
    selected_profile_count: 1
    planned_item_count: 7
    blocked_item_count: 1

diff_preview:
  import_diff_preview_id: import-preview:first-run-vscode-common
  source_summary:
    detected_source_count: 1
    selected_profile_count: 1
    unavailable_profile_count: 0
    blocked_source_count: 0
    insufficient_evidence_count: 0
    source_selection_state: selected
  item_counts:
    imported: 3
    mapped: 1
    skipped: 1
    manual_review: 1
    bridge_required: 1
    unsupported: 1
    conflicts: 1
    blocked: 1
    total_rows: 8
  rows:
    - preview_row_id: preview-row:vscode-editor-tab-size
      plan_item_ref: plan-item:vscode-editor-tab-size
      source_profile_ref: source-profile:vscode-default
      source_object_ref: vscode:setting:editor.tabSize
      source_label: editor.tabSize
      domain: settings
      target_object_ref: aureline:setting:editor.tabSize
      outcome_state: imported
      reason_class: exact_equivalent_available
      confidence_class: high
      mapping_basis: exact_identity
      fidelity_label_projection: exact
      state_plane_projection: portable_settings
      rollback_checkpoint_ref: rollback-checkpoint:first-run-vscode-common
      docs_help_refs:
        - docs-ref:first-run-import-settings
    - preview_row_id: preview-row:vscode-command-palette
      plan_item_ref: plan-item:vscode-command-palette
      source_profile_ref: source-profile:vscode-default
      source_object_ref: vscode:keybinding:ctrl+shift+p
      source_label: Command Palette
      domain: shortcuts
      target_object_ref: aureline:keybinding:command_palette.open
      outcome_state: mapped
      reason_class: semantic_equivalent_available
      confidence_class: high
      mapping_basis: semantic_equivalent
      fidelity_label_projection: compatible
      state_plane_projection: portable_settings
      rollback_checkpoint_ref: rollback-checkpoint:first-run-vscode-common
      docs_help_refs:
        - docs-ref:first-run-import-shortcuts
    - preview_row_id: preview-row:vscode-eslint
      plan_item_ref: plan-item:vscode-eslint
      source_profile_ref: source-profile:vscode-default
      source_object_ref: vscode:extension:dbaeumer.vscode-eslint
      source_label: ESLint
      domain: extensions_and_providers
      target_object_ref: aureline:bridge:eslint-capability-layer
      outcome_state: bridge_required
      reason_class: bridge_needed_for_parity
      confidence_class: medium
      mapping_basis: bridge_adapter
      fidelity_label_projection: manual_review
      state_plane_projection: portable_settings
      bridge_requirement_ref: bridge-requirement:eslint-capability-layer
      rollback_checkpoint_ref: rollback-checkpoint:first-run-vscode-common
      docs_help_refs:
        - docs-ref:first-run-import-bridge-required
      export_refs:
        - export:first-run-vscode-common
      support_packet_refs:
        - support:first-run-vscode-common
    - preview_row_id: preview-row:vscode-webview-extension
      plan_item_ref: plan-item:vscode-webview-extension
      source_profile_ref: source-profile:vscode-default
      source_object_ref: vscode:extension:sample.webview-tool
      source_label: Webview tool extension
      domain: extensions_and_providers
      target_object_ref: null
      outcome_state: unsupported
      reason_class: target_feature_not_supported
      confidence_class: high
      mapping_basis: not_applicable
      fidelity_label_projection: manual_review
      state_plane_projection: portable_settings
      rollback_checkpoint_ref: rollback-checkpoint:first-run-vscode-common
      docs_help_refs:
        - docs-ref:first-run-import-unsupported-extension
      export_refs:
        - export:first-run-vscode-common
      support_packet_refs:
        - support:first-run-vscode-common
  conflicts:
    - conflict_id: conflict:vscode-keybinding-reserved-chord
      conflict_class: reserved_shortcut_collision
      source_object_ref: vscode:keybinding:ctrl+k.ctrl+s
      target_object_ref: aureline:keybinding:keybindings.open
      preserved_prior_artifact_ref: preserved-artifact:local-keybindings-before-import
      reviewer_action_required: keep_target
      summary: Imported chord collides with an existing target shortcut.
  unsupported_keys:
    - unsupported_key_id: unsupported-key:vscode-webview-state
      source_profile_ref: source-profile:vscode-default
      source_object_ref: vscode:extension-state:sample.webview-tool
      domain: extensions_and_providers
      reason_class: target_feature_not_supported
      native_alternative_ref: native-alternative:webview-tool-docs
      docs_help_refs:
        - docs-ref:first-run-import-unsupported-extension
  incompatible_items:
    - incompatible_item_id: incompatible:vscode-webview-tool
      item_class: extension
      source_object_ref: vscode:extension:sample.webview-tool
      target_or_alternative_ref: native-alternative:webview-tool-docs
      compatibility_advice_class: unsupported_no_native_equivalent
      blocked_from_apply: true
      summary: Extension runtime state is not imported as native truth.
      docs_help_refs:
        - docs-ref:first-run-import-unsupported-extension
      support_packet_refs:
        - support:first-run-vscode-common
  native_alternatives:
    - native_alternative_id: native-alternative:eslint-native-lint
      alternative_class: native_extension_or_package
      source_object_ref: vscode:extension:dbaeumer.vscode-eslint
      suggested_target_ref: aureline:package:eslint-native-lint
      requires_separate_review: true
      summary: Native lint package can be reviewed after import.
  trust_permission_implications:
    - implication_id: implication:eslint-network-egress
      implication_class: network_egress
      delta_class: requires_separate_review
      policy_epoch_ref: policy-epoch:local-default
      summary: Import records the extension selection but does not grant network egress.
    - implication_id: implication:webview-extension-permission
      implication_class: extension_permission
      delta_class: blocked_would_widen_authority
      policy_epoch_ref: policy-epoch:local-default
      summary: Source extension permissions are not imported or widened.
  rollback_requirements:
    checkpoint_required_before_apply: true
    checkpoint_scope: profile_only
    checkpoint_status: created_ready
    checkpoint_ref: rollback-checkpoint:first-run-vscode-common
    restore_record_ref: migration-restore-record:first-run-vscode-common
    retention_policy_ref: retention-policy:user-owned-recovery-state
  apply_gate:
    apply_gate_class: requires_manual_review
    idempotency_token_ref: idempotency:first-run-vscode-common
    reason_refs:
      - conflict:vscode-keybinding-reserved-chord
      - incompatible:vscode-webview-tool
  support_and_history_links:
    imported_profile_history_ref: import-history:first-run-vscode-common
    onboarding_portability_ref: onboarding-portability:first-run-vscode-common
    docs_help_refs:
      - docs-ref:first-run-import-overview
    export_refs:
      - export:first-run-vscode-common
    support_packet_refs:
      - support:first-run-vscode-common

assertions:
  - id: dry_run_has_no_write_authority
    statement: The plan uses none_dry_run_only and cannot mutate target state.
  - id: blocked_items_remain_source_labeled
    statement: Unsupported and bridge-required extension rows retain source_object_ref, docs, export, and support refs.
  - id: authority_widening_blocked
    statement: Extension permission and network egress changes are not admitted by import apply.
