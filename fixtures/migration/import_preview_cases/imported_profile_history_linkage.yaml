# First-run import preview case: imported-profile history linkage.
schema_version: 1
case_id: first_run_import.history_linkage.onboarding_support
title: Imported-profile history links onboarding, migration center, and support
contract_refs:
  - docs/migration/first_run_import_diff_and_rollback_contract.md
  - schemas/migration/import_diff_preview.schema.json
  - schemas/ux/onboarding_portability_state.schema.json
  - schemas/support/support_packet_index.schema.json

source_detection:
  source_installations:
    - source_installation_ref: source-installation:vim-neovim
      source_kind: vim_or_neovim
      display_name: Vim / Neovim
      detection_state: detected
      discovery_method: known_platform_location
      path_availability_class: available_metadata_only
      source_read_posture: manifest_and_schema_only
      evidence_refs:
        - evidence:first-run-detector-vim-neovim
  discovered_profiles:
    - source_profile_ref: source-profile:neovim-modal
      source_installation_ref: source-installation:vim-neovim
      profile_label: Modal editing profile
      source_scope: user_profile
      profile_discovery_state: selected
      profile_portability_state: portable_plain
      selected_for_plan: true

import_plan:
  import_plan_id: import-plan:first-run-neovim-history
  migration_session_ref: migration-session:first-run-neovim-history
  target_descriptor:
    target_kind: profile_library_entry
    target_ref: target-profile:modal-editing
    apply_scope: profile_only
    target_owner_class: user_owned_durable_truth
  selected_domains:
    - shortcuts
    - profiles_and_layout
    - snippets_and_templates
  write_authority_posture: none_dry_run_only
  dry_run_stability: current_complete

diff_preview:
  import_diff_preview_id: import-preview:first-run-neovim-history
  item_counts:
    imported: 2
    mapped: 2
    skipped: 1
    manual_review: 0
    bridge_required: 0
    unsupported: 1
    conflicts: 0
    blocked: 0
    total_rows: 6
  rows:
    - preview_row_id: preview-row:neovim-modal-profile
      plan_item_ref: plan-item:neovim-modal-profile
      source_profile_ref: source-profile:neovim-modal
      source_object_ref: neovim:modal-profile:default
      source_label: Modal editing profile
      domain: profiles_and_layout
      target_object_ref: aureline:profile-preset:modal-editing
      outcome_state: mapped
      reason_class: capability_mapping_available
      confidence_class: high
      mapping_basis: capability_based
      fidelity_label_projection: compatible
      state_plane_projection: portable_settings
      rollback_checkpoint_ref: rollback-checkpoint:first-run-neovim-history
      docs_help_refs:
        - docs-ref:first-run-import-modal-editing
    - preview_row_id: preview-row:neovim-register-history
      plan_item_ref: plan-item:neovim-register-history
      source_profile_ref: source-profile:neovim-modal
      source_object_ref: neovim:register-history
      source_label: Register history
      domain: profiles_and_layout
      target_object_ref: null
      outcome_state: unsupported
      reason_class: target_feature_not_supported
      confidence_class: high
      mapping_basis: not_applicable
      fidelity_label_projection: manual_review
      state_plane_projection: non_portable_live_authority
      rollback_checkpoint_ref: rollback-checkpoint:first-run-neovim-history
      docs_help_refs:
        - docs-ref:first-run-import-live-authority-excluded
      export_refs:
        - export:first-run-neovim-history
      support_packet_refs:
        - support:first-run-neovim-history
  unsupported_keys:
    - unsupported_key_id: unsupported-key:neovim-register-history
      source_profile_ref: source-profile:neovim-modal
      source_object_ref: neovim:register-history
      domain: profiles_and_layout
      reason_class: target_feature_not_supported
      native_alternative_ref: native-alternative:aureline-clipboard-history
      docs_help_refs:
        - docs-ref:first-run-import-live-authority-excluded
  native_alternatives:
    - native_alternative_id: native-alternative:aureline-clipboard-history
      alternative_class: native_command
      source_object_ref: neovim:register-history
      suggested_target_ref: aureline:command:clipboard.history.open
      requires_separate_review: false
      summary: Native clipboard history is available, but source register history is not imported as live authority.
  rollback_requirements:
    checkpoint_required_before_apply: true
    checkpoint_scope: profile_only
    checkpoint_status: created_ready
    checkpoint_ref: rollback-checkpoint:first-run-neovim-history
    restore_record_ref: migration-restore-record:first-run-neovim-history
    retention_policy_ref: retention-policy:user-owned-recovery-state
  apply_gate:
    apply_gate_class: allowed_checkpoint_ready
    idempotency_token_ref: idempotency:first-run-neovim-history
    reason_refs: []
  support_and_history_links:
    imported_profile_history_ref: import-history:first-run-neovim-history
    onboarding_portability_ref: onboarding-portability:first-run-neovim-history
    docs_help_refs:
      - docs-ref:first-run-import-modal-editing
      - docs-ref:first-run-import-live-authority-excluded
    export_refs:
      - export:first-run-neovim-history
    support_packet_refs:
      - support:first-run-neovim-history

imported_profile_history:
  imported_profile_history_ref: import-history:first-run-neovim-history
  source_profile_ref: source-profile:neovim-modal
  target_profile_ref: target-profile:modal-editing
  migration_session_ref: migration-session:first-run-neovim-history
  import_plan_ref: import-plan:first-run-neovim-history
  import_diff_preview_ref: import-preview:first-run-neovim-history
  outcome_packet_ref: importer-outcome-packet:first-run-neovim-history
  rollback_checkpoint_ref: rollback-checkpoint:first-run-neovim-history
  onboarding_portability_ref: onboarding-portability:first-run-neovim-history
  profile_portability_state: portable_plain
  import_history_state: applied_with_visible_limits
  support_packet_refs:
    - support:first-run-neovim-history
  docs_help_refs:
    - docs-ref:first-run-import-modal-editing
    - docs-ref:first-run-import-live-authority-excluded

onboarding_projection:
  onboarding_portability_ref: onboarding-portability:first-run-neovim-history
  surface_state: imported_profile_available
  next_actions:
    - open_import_summary
    - review_unsupported_items
    - open_rollback_checkpoint
  support_export_default: metadata_safe_default

assertions:
  - id: history_is_not_wizard_local
    statement: Imported-profile history links plan, preview, outcome, checkpoint, onboarding, docs, and support refs.
  - id: live_authority_not_imported
    statement: Register history is unsupported as non-portable live authority and remains visible with an alternative.
