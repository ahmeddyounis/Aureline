schema_version: 1
fixture_id: source_profile_example.vscode_code_oss
source_ecosystem_row_ref: migration_source:vs_code_code_oss
quality_bar_refs:
  - migration_quality:high_fidelity_common_text_workflow_surfaces

source_descriptor:
  source_kind: vs_code
  display_name: VS Code / Code-OSS
  source_version: example-profile
  source_scope: user_profile
  artifact_ref: fixture:source-profile:vscode-code-oss

selected_domains:
  - settings
  - shortcuts
  - themes_and_visuals
  - snippets_and_templates
  - tasks_and_run_configs
  - launch_debug
  - extensions_and_providers
  - workspace_metadata

representative_source_artifacts:
  - artifact_id: vscode.settings
    path_hint: User/settings.json
    import_target_family: settings
  - artifact_id: vscode.keybindings
    path_hint: User/keybindings.json
    import_target_family: keybindings
  - artifact_id: vscode.snippets
    path_hint: User/snippets/javascript.json
    import_target_family: snippets
  - artifact_id: vscode.tasks
    path_hint: .vscode/tasks.json
    import_target_family: tasks
  - artifact_id: vscode.launch
    path_hint: .vscode/launch.json
    import_target_family: launch_configs
  - artifact_id: vscode.extensions
    path_hint: .vscode/extensions.json
    import_target_family: compatible_extensions

expected_import_rows:
  - source_object_ref: vscode:setting:editor.tabSize
    target_object_ref: aureline:setting:editor.tabSize
    domain: settings
    outcome_state: imported
    confidence_class: high
  - source_object_ref: vscode:keybinding:ctrl+shift+p
    target_object_ref: aureline:command:workbench.command_palette
    domain: shortcuts
    outcome_state: mapped
    confidence_class: high
  - source_object_ref: vscode:task:npm-test
    target_object_ref: aureline:task:npm-test
    domain: tasks_and_run_configs
    outcome_state: mapped
    confidence_class: medium
  - source_object_ref: vscode:launch:node
    target_object_ref: aureline:debug-launch:node
    domain: launch_debug
    outcome_state: manual_review
    confidence_class: medium
  - source_object_ref: vscode:extension:dbaeumer.vscode-eslint
    target_object_ref: aureline:extension:eslint-capability-pack
    domain: extensions_and_providers
    outcome_state: bridge_required
    confidence_class: medium

required_reports:
  - migration_center.machine_readable_report
  - support_bundle.migration_report
  - compatibility_report.source_ecosystem_coverage

visible_caveats:
  - Extension suggestions require trust and permission review before install.
  - Workbench layout and extension storage blobs are not imported.
  - Unsupported settings remain visible as skipped or manual-review rows.
