schema_version: 1
fixture_id: source_profile_example.jetbrains_family
source_ecosystem_row_ref: migration_source:jetbrains_family
quality_bar_refs:
  - migration_quality:partial_but_polished_migration
  - migration_quality:medium_fidelity_keyboard_navigation_migration

source_descriptor:
  source_kind: jetbrains_family
  display_name: JetBrains IDEs
  source_version: example-profile
  source_scope: user_profile
  artifact_ref: fixture:source-profile:jetbrains-family

selected_domains:
  - shortcuts
  - themes_and_visuals
  - tasks_and_run_configs
  - launch_debug
  - workspace_metadata
  - settings

representative_source_artifacts:
  - artifact_id: jetbrains.keymap
    path_hint: settingsRepository/keymaps
    import_target_family: keybindings
  - artifact_id: jetbrains.color_scheme
    path_hint: colors
    import_target_family: themes
  - artifact_id: jetbrains.run_configs
    path_hint: runConfigurations
    import_target_family: selected_run_debug_configs
  - artifact_id: jetbrains.project_roots
    path_hint: project model content roots
    import_target_family: project_roots
  - artifact_id: jetbrains.code_style
    path_hint: codeStyles
    import_target_family: code_style_hints

expected_import_rows:
  - source_object_ref: jetbrains:keymap:goto-declaration
    target_object_ref: aureline:command:editor.goto_declaration
    domain: shortcuts
    outcome_state: mapped
    confidence_class: high
  - source_object_ref: jetbrains:color-scheme:darcula-like
    target_object_ref: aureline:theme:imported-token-map
    domain: themes_and_visuals
    outcome_state: mapped
    confidence_class: medium
  - source_object_ref: jetbrains:run-config:application
    target_object_ref: aureline:debug-launch:application
    domain: launch_debug
    outcome_state: manual_review
    confidence_class: medium
  - source_object_ref: jetbrains:project:content-root
    target_object_ref: aureline:workspace:root
    domain: workspace_metadata
    outcome_state: imported
    confidence_class: medium
  - source_object_ref: jetbrains:plugin:unknown-runtime
    domain: extensions_and_providers
    outcome_state: unsupported
    confidence_class: high

required_reports:
  - migration_center.machine_readable_report
  - support_bundle.migration_report
  - compatibility_report.source_ecosystem_coverage

visible_caveats:
  - Plugin runtime parity is not claimed.
  - IDE indexes, caches, and generated project models are not imported as authoritative truth.
  - Run/debug imports require execution-context validation before they can be applied.
