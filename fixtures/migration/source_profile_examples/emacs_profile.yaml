schema_version: 1
fixture_id: source_profile_example.emacs
source_ecosystem_row_ref: migration_source:emacs
quality_bar_refs:
  - migration_quality:medium_fidelity_keyboard_navigation_migration

source_descriptor:
  source_kind: emacs
  display_name: Emacs
  source_version: example-profile
  source_scope: user_profile
  artifact_ref: fixture:source-profile:emacs

selected_domains:
  - shortcuts
  - themes_and_visuals
  - snippets_and_templates
  - workspace_metadata
  - profiles_and_layout

representative_source_artifacts:
  - artifact_id: emacs.keymap
    path_hint: selected keymap profile
    import_target_family: keybindings
  - artifact_id: emacs.command_aliases
    path_hint: selected interactive command aliases
    import_target_family: command_aliases
  - artifact_id: emacs.theme
    path_hint: selected theme
    import_target_family: themes
  - artifact_id: emacs.project_defaults
    path_hint: project root defaults and excludes
    import_target_family: project_defaults
  - artifact_id: emacs.snippets
    path_hint: selected snippet/template directories
    import_target_family: snippets

expected_import_rows:
  - source_object_ref: emacs:keybinding:find-file
    target_object_ref: aureline:command:file.open
    domain: shortcuts
    outcome_state: mapped
    confidence_class: medium
  - source_object_ref: emacs:command-alias:project-find-file
    target_object_ref: aureline:command:quick_open.file
    domain: shortcuts
    outcome_state: mapped
    confidence_class: medium
  - source_object_ref: emacs:theme:selected
    target_object_ref: aureline:theme:imported-token-map
    domain: themes_and_visuals
    outcome_state: manual_review
    confidence_class: medium
  - source_object_ref: emacs:package-runtime:magit
    domain: extensions_and_providers
    outcome_state: unsupported
    confidence_class: high

required_reports:
  - migration_center.machine_readable_report
  - support_bundle.migration_report
  - compatibility_report.source_ecosystem_coverage

visible_caveats:
  - Elisp execution and package runtime parity are not claimed.
  - Arbitrary init-file semantics are not imported as executable configuration.
  - Live buffers, org-mode runtime state, and process state are not imported.
