schema_version: 1
fixture_id: source_profile_example.sublime_textmate
source_ecosystem_row_ref: migration_source:sublime_textmate
quality_bar_refs:
  - migration_quality:high_value_asset_import

source_descriptor:
  source_kind: sublime_textmate
  display_name: Sublime / TextMate
  source_version: example-profile
  source_scope: user_profile
  artifact_ref: fixture:source-profile:sublime-textmate

selected_domains:
  - themes_and_visuals
  - snippets_and_templates
  - workspace_metadata
  - tasks_and_run_configs

representative_source_artifacts:
  - artifact_id: sublime.color_scheme
    path_hint: Packages/User/example.sublime-color-scheme
    import_target_family: themes
  - artifact_id: textmate.snippet
    path_hint: Bundles/Example.tmbundle/Snippets/example.tmSnippet
    import_target_family: snippets
  - artifact_id: textmate.syntax
    path_hint: Bundles/Example.tmbundle/Syntaxes/example.tmLanguage
    import_target_family: syntax_bundles
  - artifact_id: sublime.project
    path_hint: example.sublime-project
    import_target_family: project_roots
  - artifact_id: sublime.build_system
    path_hint: Packages/User/example.sublime-build
    import_target_family: selected_build_task_hints

expected_import_rows:
  - source_object_ref: sublime:color-scheme:example
    target_object_ref: aureline:theme:imported-token-map
    domain: themes_and_visuals
    outcome_state: imported
    confidence_class: high
  - source_object_ref: textmate:snippet:example
    target_object_ref: aureline:snippet:example
    domain: snippets_and_templates
    outcome_state: imported
    confidence_class: high
  - source_object_ref: textmate:syntax:example
    target_object_ref: aureline:syntax-bundle:example
    domain: other
    outcome_state: mapped
    confidence_class: medium
  - source_object_ref: sublime:build-system:custom-command
    domain: tasks_and_run_configs
    outcome_state: manual_review
    confidence_class: low
  - source_object_ref: sublime:package-runtime:custom-plugin
    domain: extensions_and_providers
    outcome_state: unsupported
    confidence_class: high

required_reports:
  - migration_center.machine_readable_report
  - support_bundle.migration_report
  - compatibility_report.source_ecosystem_coverage

visible_caveats:
  - Source package runtime and plugin command execution are not claimed.
  - Build-system hints import only when they map to canonical task records.
  - Syntax-bundle imports require coverage and accessibility reports before claim-bearing use.
