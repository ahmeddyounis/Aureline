schema_version: 1
fixture_id: source_profile_example.vim_neovim
source_ecosystem_row_ref: migration_source:vim_neovim
quality_bar_refs:
  - migration_quality:high_fidelity_editing_feel

source_descriptor:
  source_kind: vim_or_neovim
  display_name: Vim / Neovim
  source_version: example-profile
  source_scope: user_profile
  artifact_ref: fixture:source-profile:vim-neovim

selected_domains:
  - shortcuts
  - profiles_and_layout
  - snippets_and_templates
  - settings

representative_source_artifacts:
  - artifact_id: vim.modal_profile
    path_hint: curated modal profile
    import_target_family: modal_editing_profiles
  - artifact_id: vim.leader_maps
    path_hint: selected leader mappings
    import_target_family: keybindings
  - artifact_id: vim.clipboard_search
    path_hint: search and clipboard defaults
    import_target_family: clipboard_search_defaults
  - artifact_id: vim.snippets
    path_hint: selected snippet directories
    import_target_family: snippets

expected_import_rows:
  - source_object_ref: vim:modal-profile:core
    target_object_ref: aureline:modal-profile:vim-core
    domain: profiles_and_layout
    outcome_state: imported
    confidence_class: high
  - source_object_ref: vim:leader-map:format
    target_object_ref: aureline:command:editor.format_document
    domain: shortcuts
    outcome_state: mapped
    confidence_class: high
  - source_object_ref: vim:option:ignorecase
    target_object_ref: aureline:setting:search.ignoreCase
    domain: settings
    outcome_state: mapped
    confidence_class: high
  - source_object_ref: vim:plugin-state:telescope
    domain: extensions_and_providers
    outcome_state: unsupported
    confidence_class: high

required_reports:
  - migration_center.machine_readable_report
  - support_bundle.migration_report
  - compatibility_report.source_ecosystem_coverage

visible_caveats:
  - Arbitrary Vimscript and Lua plugin execution are not imported.
  - Register history, macro history, and terminal sessions are not imported.
  - Modal parity applies to the source editor surface, not every product surface.
