record:
  record_kind: ""
  schema_version: 0
  preview_id: "preview-truth:notebook:failure-overclaim"
  surface_class: notebook_preview
  surface_class_token: ""
  workspace_ref: "workspace:python-data-local"
  identity_disclosure:
    record_kind: ""
    schema_version: 0
    document_family: notebook_preview_output
    document_family_token: ""
    root_class: generated
    root_class_token: ""
    document_labels:
      - generated_document
      - overlay_projection
    document_label_tokens: []
    presentation_path: "preview://notebook/failure/output"
    logical_identity_ref: "logical:notebook_preview:failure:output"
    canonical_target: "generated:notebook_preview:failure:output"
    canonical_target_hint: "Preview row is derived from notebook output lineage, not the canonical notebook file."
    alias_status: projection
    alias_status_token: ""
    alias_status_label: "Preview path is a generated projection over captured notebook output."
    save_target_class: generated_target
    save_target_class_token: ""
    save_target_label: "Current preview is generated; export or rerun before treating it as a durable file."
    write_posture: export_before_write
    write_posture_token: ""
    write_posture_label: "Export before durable write"
    backing_source_label: "Captured notebook output"
    freshness_label: "Captured prior-session output"
    docs_help_ref: "help:notebook:preview_identity"
  claim_manifest:
    surface_label: "Notebook retained row"
    qualification_class: preview_limited
    qualification_class_token: ""
    visible_qualification_label: "Stable notebook row"
    qualification_evidence_ref: null
    claim_limits:
      - token: "single_notebook_preview_row"
        label: "One retained notebook preview row."
  trust_layers:
    - layer_class: document
      layer_class_token: ""
      trust_state_token: "document_trust_elevated_on_explicit_grant"
      gate_state: permits_action
      gate_state_token: ""
      action_refs:
        - "action:notebook:open"
      gate_explanation_label: "Document is trusted."
      evidence_ref: "evidence:notebook:user_grant"
    - layer_class: runtime
      layer_class_token: ""
      trust_state_token: "kernel_trust_unavailable_no_kernel"
      gate_state: blocks_action
      gate_state_token: ""
      action_refs:
        - "action:notebook:rerun_all"
      gate_explanation_label: "Kernel is unavailable."
      evidence_ref: "execution-context:notebook:remote-kernel-prior"
    - layer_class: output
      layer_class_token: ""
      trust_state_token: "output_trust_captured_from_prior_session"
      gate_state: permits_inspection_only
      gate_state_token: ""
      action_refs:
        - "action:notebook:open_output"
      gate_explanation_label: "Output is captured evidence."
      evidence_ref: "lineage:notebook:output:prior-session"
  structured_state_views: []
  round_trip_risks:
    - risk_id: "risk:notebook:lossy-output"
      subject_ref: "notebook:document:failure"
      risk_class: lossy_output_representation
      risk_class_token: ""
      preview_representation_class: normalised_preview
      preview_representation_class_token: ""
      apply_gate_class: allow_apply
      apply_gate_class_token: ""
      warning_classes: []
      warning_class_tokens: []
      affected_field_paths:
        - "/cells/0/outputs"
      raw_preservation_ref: null
      compare_view_ref: null
      recovery_hint_label: "Lossy output rewrite lacks a visible warning."
  repair_lineage:
    - lineage_id: "lineage:notebook:rerun-missing"
      flow_class: rerun
      flow_class_token: ""
      action_posture: mutates_after_review
      action_posture_token: ""
      checkpoint_ref: null
      mutation_journal_ref: null
      preview_or_repair_packet_ref: null
      actor_ref: "actor:user:local"
      affected_refs:
        - "notebook:cell:failure"
      reversal_class: regenerate
      reversal_class_token: ""
      consequence_label: "Rerun would replace captured output but lineage is missing."
      safe_next_actions:
        - "open review"
  safe_outputs:
    - output_ref: "notebook:output:failure"
      risk_class: oversized_result
      risk_class_token: ""
      disposition: full_render_allowed
      disposition_token: ""
      trust_state_token: "output_trust_captured_from_prior_session"
      preview_ref: null
      deeper_render_action_ref: null
      rerun_action_ref: null
      policy_ref: null
      summary_label: "Oversized output incorrectly renders fully by default."
  support_export_scope_refs:
    - "support:notebook:failure-preview-truth"
expect:
  valid: false
  required_violation_tokens:
    - preview_or_limited_label_missing
    - risk_warning_missing
    - risk_gate_too_permissive
    - repair_lineage_incomplete
    - risky_output_not_safe_previewed
  required_plaintext_snippets:
    - "qualification=preview_limited"
    - "risk=lossy_output_representation"
  required_support_tokens: []
