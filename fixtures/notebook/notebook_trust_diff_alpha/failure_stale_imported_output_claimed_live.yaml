lane:
  record_kind: ""
  schema_version: 0
  lane_id: "notebook-alpha-lane:imported-output-failure"
  prototype_label: bounded_notebook_trust_diff_repair_export
  prototype_label_token: ""
  prototype_label_display: ""
  workspace_id: "workspace:python-data-local"
  trust_axes:
    workspace_trust_state: trusted_workspace
    notebook_trust_rung: fully_trusted_user
    kernel_availability: local_managed_available
    output_trust_state: captured_from_prior_session
    widget_trust_state: not_applicable
    rendered_output_trust_class: SanitizedRich
  document:
    document_id: "notebook:document:imported-output-failure"
    presentation_uri: "workspace://python-data/notebooks/imported-output.ipynb"
    canonical_object_ref: "vfs:canonical:file:python-data:notebooks/imported-output.ipynb"
    route_ref: "route:notebook:open:imported-output-failure"
    nbformat: "nbformat-4.5"
    canonical_ipynb_is_source: true
    metadata_namespaces:
      - namespace: "vendor_capture"
        namespace_kind: unknown_vendor
        namespace_kind_token: ""
        survival_posture: preserve_verbatim
        survival_posture_token: ""
        inventory_ref: "notebook:metadata:vendor-capture"
    attachments: []
  cells:
    - cell_object_id: "notebook:cell-object:imported-output"
      stable_cell_id: "notebook:cell-id:imported-output"
      document_id_ref: "notebook:document:imported-output-failure"
      route_ref: "route:notebook:cell:imported-output"
      content_class: code_cell
      content_class_token: ""
      execution_state: source_changed_output_stale
      execution_state_token: ""
      output_record_ids:
        - "notebook:output:imported:payload"
      attachment_ids: []
  kernel_session:
    kernel_session_id: "notebook:kernel-session:python-local:current"
    document_id_ref: "notebook:document:imported-output-failure"
    execution_context_ref: "execution-context:python-data:uv-env"
    route_ref: "route:notebook:kernel-session:python-local-current"
    kernelspec_ref: "kernelspec:python-3.12-uv"
    lifecycle: ready
    lifecycle_token: ""
    trust_label: "Local managed kernel available"
    environment_fingerprint_ref: "env:fingerprint:python-data:uv-lock"
  outputs:
    - output_record_id: "notebook:output:imported:payload"
      cell_id_ref: "notebook:cell-id:imported-output"
      kernel_session_id_ref: "notebook:kernel-session:python-local:current"
      cell_execution_ref: "notebook:cell-execution:imported:external"
      execution_context_ref: "execution-context:python-data:uv-env"
      freshness: imported_artifact_payload
      freshness_token: ""
      output_trust_state: live_from_current_session
      output_trust_state_token: ""
      widget_trust_state: not_applicable
      widget_trust_state_token: ""
      content_class: rich_output
      content_class_token: ""
      representation_state: sanitized
      representation_state_token: ""
      trust_class: SanitizedRich
      viewer_truth_state_token: "live_output"
      lineage_class_token: "live_output_from_current_session"
      honesty_marker_present: false
      escape_hatches:
        - safe_preview
        - export_raw_source
  review_session:
    review_session_id: "notebook:review-session:imported-output-failure"
    route_ref: "route:review:notebook:imported-output-failure"
    document_id_ref: "notebook:document:imported-output-failure"
    diff_posture_id_ref: "notebook:diff:imported-output-failure"
    review_workspace_ref: "review-workspace:local-git:python-data"
    provider_overlay_state: "local_only_current"
    export_scope_ids:
      - "notebook:export-scope:failure-canonical"
      - "notebook:export-scope:failure-rendered"
      - "notebook:export-scope:failure-raw"
  diff_posture:
    diff_posture_id: "notebook:diff:imported-output-failure"
    review_session_id_ref: "notebook:review-session:imported-output-failure"
    diff_mode: cell_aware
    diff_mode_token: ""
    source_change_count: 0
    metadata_change_count: 1
    output_change_count: 1
    attachment_change_count: 0
    raw_json_fallback_available: true
    metadata_filter_state: "unknown vendor namespaces preserved"
    output_include_state: "imported output must stay labelled"
    affordances:
      - open_cell_aware_diff
      - open_raw_json_fallback
      - toggle_output_inclusion
  repair_actions:
    - repair_action_id: "notebook:repair:inspect-imported-output"
      repair_class_family: observe_only_no_repair
      repair_class_family_token: ""
      apply_mode_class: apply_observe_only_no_write
      apply_mode_class_token: ""
      transaction_reversal_class: audit_only
      transaction_reversal_class_token: ""
      preview_required: false
      repair_preview_ref: "notebook:repair-preview:inspect-imported-output"
      checkpoint_ref: null
      affected_cell_ids:
        - "notebook:cell-id:imported-output"
      affected_output_ids:
        - "notebook:output:imported:payload"
      consequence_label: "Inspect only until the imported output is labelled captured, replayed, or omitted."
      safe_next_actions:
        - "open raw payload scope"
        - "mark as imported evidence"
  export_scopes:
    - export_scope_id: "notebook:export-scope:failure-canonical"
      scope_class: canonical_ipynb
      scope_class_token: ""
      artifact_ref: "artifact:notebook:imported-output.ipynb"
      representation_class: raw
      representation_class_token: ""
      body_posture: exact_source_bytes
      body_posture_token: ""
      output_include_policy_ref: "notebook:include-policy:failure-canonical"
      trust_class: RawText
      stale_or_imported_output_label: "Canonical notebook must label imported output."
    - export_scope_id: "notebook:export-scope:failure-rendered"
      scope_class: rendered_report
      scope_class_token: ""
      artifact_ref: "artifact:notebook:imported-output.rendered.html"
      representation_class: sanitized
      representation_class_token: ""
      body_posture: sanitized_static_snapshot
      body_posture_token: ""
      output_include_policy_ref: "notebook:include-policy:failure-rendered"
      trust_class: SanitizedRich
      stale_or_imported_output_label: "Rendered report must not claim imported output is live."
    - export_scope_id: "notebook:export-scope:failure-raw"
      scope_class: raw_artifact_payload
      scope_class_token: ""
      artifact_ref: "artifact:notebook:imported-output.raw-payloads"
      representation_class: raw
      representation_class_token: ""
      body_posture: exact_source_bytes
      body_posture_token: ""
      output_include_policy_ref: "notebook:include-policy:failure-raw"
      trust_class: RawText
      stale_or_imported_output_label: "Raw payload remains separate from live execution."
  paired_exports:
    - paired_export_id: "notebook:paired-export:failure-percent-script"
      document_id_ref: "notebook:document:imported-output-failure"
      route_ref: "route:notebook:paired-export:failure-percent-script"
      target_format: "percent_script"
      export_state: derived_from_canonical_notebook
      export_state_token: ""
      source_of_truth_scope: canonical_ipynb
      source_of_truth_scope_token: ""
      canonical_direction_ref: "canonical-direction:notebook-to-export-script"
      divergence_state_label: "Derived representation; canonical notebook remains source."
  reproducibility: []
  claim_limits: []
  downgrade_behaviors:
    - "Imported outputs remain evidence-only until a current kernel execution produces fresh output."
expect:
  valid: false
  required_violation_tokens:
    - stale_or_imported_output_masquerades_live
    - missing_stale_output_honesty_marker
  required_export_scopes:
    - canonical_ipynb
    - rendered_report
    - raw_artifact_payload
  required_plaintext_snippets:
    - "freshness=imported_artifact_payload"
    - "viewer=live_output"
