lane:
  record_kind: ""
  schema_version: 0
  lane_id: "notebook-alpha-lane:local-python-report"
  prototype_label: bounded_notebook_trust_diff_repair_export
  prototype_label_token: ""
  prototype_label_display: ""
  workspace_id: "workspace:python-data-local"
  trust_axes:
    workspace_trust_state: trusted_workspace
    notebook_trust_rung: fully_trusted_user
    kernel_availability: local_managed_available
    output_trust_state: captured_from_prior_session
    widget_trust_state: widget_denied_by_default
    rendered_output_trust_class: SanitizedRich
  document:
    document_id: "notebook:document:local-python-report"
    presentation_uri: "workspace://python-data/notebooks/report.ipynb"
    canonical_object_ref: "vfs:canonical:file:python-data:notebooks/report.ipynb"
    route_ref: "route:notebook:open:local-python-report"
    nbformat: "nbformat-4.5"
    canonical_ipynb_is_source: true
    identity_disclosure:
      record_kind: ""
      schema_version: 0
      document_family: notebook_document
      document_family_token: ""
      root_class: local
      root_class_token: ""
      document_labels:
        - durable_local_file
      document_label_tokens: []
      presentation_path: "workspace://python-data/notebooks/report.ipynb"
      logical_identity_ref: "logical:notebook:local-python-report"
      canonical_target: "vfs:canonical:file:python-data:notebooks/report.ipynb"
      canonical_target_hint: null
      alias_status: direct
      alias_status_token: ""
      alias_status_label: "Presentation path is already canonical."
      save_target_class: local_file
      save_target_class_token: ""
      save_target_label: "Next durable write lands on the canonical local notebook file."
      write_posture: editable_canonical_source
      write_posture_token: ""
      write_posture_label: "Editable canonical source"
      backing_source_label: "Local notebook file"
      freshness_label: "Current notebook source"
      docs_help_ref: "help:notebook:document_identity"
    metadata_namespaces:
      - namespace: "kernelspec"
        namespace_kind: jupyter_core
        namespace_kind_token: ""
        survival_posture: preserve_verbatim
        survival_posture_token: ""
        inventory_ref: "notebook:metadata:kernelspec"
      - namespace: "aureline"
        namespace_kind: aureline_owned
        namespace_kind_token: ""
        survival_posture: preserve_verbatim
        survival_posture_token: ""
        inventory_ref: "notebook:metadata:aureline"
      - namespace: "vendor_lab_observer"
        namespace_kind: unknown_vendor
        namespace_kind_token: ""
        survival_posture: preserve_verbatim
        survival_posture_token: ""
        inventory_ref: "notebook:metadata:vendor-lab-observer"
    attachments:
      - attachment_id: "notebook:attachment:intro-diagram"
        cell_id_ref: "notebook:cell-id:intro"
        mime_family: "image"
        payload_ref: "notebook:attachment-payload:intro-diagram"
        roundtrip_posture: preserve_verbatim
        roundtrip_posture_token: ""
        consequence_label: "Attachment preserved with the canonical notebook scope."
  cells:
    - cell_object_id: "notebook:cell-object:intro"
      stable_cell_id: "notebook:cell-id:intro"
      document_id_ref: "notebook:document:local-python-report"
      route_ref: "route:notebook:cell:intro"
      content_class: markdown_cell
      content_class_token: ""
      execution_state: not_run
      execution_state_token: ""
      output_record_ids: []
      attachment_ids:
        - "notebook:attachment:intro-diagram"
    - cell_object_id: "notebook:cell-object:fit-model"
      stable_cell_id: "notebook:cell-id:fit-model"
      document_id_ref: "notebook:document:local-python-report"
      route_ref: "route:notebook:cell:fit-model"
      content_class: code_cell
      content_class_token: ""
      execution_state: source_changed_output_stale
      execution_state_token: ""
      output_record_ids:
        - "notebook:output:fit-model:stdout"
        - "notebook:output:fit-model:chart"
      attachment_ids: []
    - cell_object_id: "notebook:cell-object:widget"
      stable_cell_id: "notebook:cell-id:widget"
      document_id_ref: "notebook:document:local-python-report"
      route_ref: "route:notebook:cell:widget"
      content_class: code_cell
      content_class_token: ""
      execution_state: execution_blocked_by_trust_or_policy
      execution_state_token: ""
      output_record_ids:
        - "notebook:output:widget:controls"
      attachment_ids: []
  kernel_session:
    kernel_session_id: "notebook:kernel-session:python-local:current"
    document_id_ref: "notebook:document:local-python-report"
    execution_context_ref: "execution-context:python-data:uv-env"
    route_ref: "route:notebook:kernel-session:python-local-current"
    kernelspec_ref: "kernelspec:python-3.12-uv"
    lifecycle: ready
    lifecycle_token: ""
    trust_label: "Local managed kernel available"
    environment_fingerprint_ref: "env:fingerprint:python-data:uv-lock"
  outputs:
    - output_record_id: "notebook:output:fit-model:stdout"
      cell_id_ref: "notebook:cell-id:fit-model"
      kernel_session_id_ref: "notebook:kernel-session:python-local:current"
      cell_execution_ref: "notebook:cell-execution:fit-model:current"
      execution_context_ref: "execution-context:python-data:uv-env"
      freshness: live_current_session
      freshness_token: ""
      output_trust_state: live_from_current_session
      output_trust_state_token: ""
      widget_trust_state: not_applicable
      widget_trust_state_token: ""
      content_class: rich_output
      content_class_token: ""
      representation_state: sanitized
      representation_state_token: ""
      trust_class: SanitizedRich
      viewer_truth_state_token: "live_output"
      lineage_class_token: "live_output_from_current_session"
      honesty_marker_present: false
      escape_hatches:
        - safe_preview
        - export_raw_source
    - output_record_id: "notebook:output:fit-model:chart"
      cell_id_ref: "notebook:cell-id:fit-model"
      kernel_session_id_ref: "notebook:kernel-session:python-local:prior"
      cell_execution_ref: "notebook:cell-execution:fit-model:prior"
      execution_context_ref: "execution-context:python-data:uv-env"
      freshness: stale_after_drift
      freshness_token: ""
      output_trust_state: captured_from_prior_session
      output_trust_state_token: ""
      widget_trust_state: not_applicable
      widget_trust_state_token: ""
      content_class: rich_output
      content_class_token: ""
      representation_state: sanitized
      representation_state_token: ""
      trust_class: SanitizedRich
      viewer_truth_state_token: "stale_output"
      lineage_class_token: "captured_output_from_prior_session"
      honesty_marker_present: true
      escape_hatches:
        - safe_preview
        - export_raw_source
    - output_record_id: "notebook:output:widget:controls"
      cell_id_ref: "notebook:cell-id:widget"
      kernel_session_id_ref: null
      cell_execution_ref: null
      execution_context_ref: null
      freshness: widget_blocked_static_fallback
      freshness_token: ""
      output_trust_state: widget_gated
      output_trust_state_token: ""
      widget_trust_state: widget_denied_by_default
      widget_trust_state_token: ""
      content_class: widget_output
      content_class_token: ""
      representation_state: tombstone_static_fallback
      representation_state_token: ""
      trust_class: SanitizedRich
      viewer_truth_state_token: "blocked_widget_output"
      lineage_class_token: "widget_gated_output"
      honesty_marker_present: true
      escape_hatches:
        - safe_preview
        - keep_static_fallback
  review_session:
    review_session_id: "notebook:review-session:local-python-report"
    route_ref: "route:review:notebook:local-python-report"
    document_id_ref: "notebook:document:local-python-report"
    diff_posture_id_ref: "notebook:diff:local-python-report"
    review_workspace_ref: "review-workspace:local-git:python-data"
    provider_overlay_state: "local_only_current"
    export_scope_ids:
      - "notebook:export-scope:canonical-ipynb"
      - "notebook:export-scope:rendered-report"
      - "notebook:export-scope:raw-payload"
  diff_posture:
    diff_posture_id: "notebook:diff:local-python-report"
    review_session_id_ref: "notebook:review-session:local-python-report"
    diff_mode: cell_aware
    diff_mode_token: ""
    source_change_count: 1
    metadata_change_count: 1
    output_change_count: 2
    attachment_change_count: 0
    raw_json_fallback_available: true
    metadata_filter_state: "unknown vendor namespaces preserved"
    output_include_state: "outputs separate from source changes"
    affordances:
      - open_cell_aware_diff
      - open_raw_json_fallback
      - toggle_output_inclusion
      - inspect_metadata_survival
      - inspect_attachment_diff
      - open_repair_preview
  repair_actions:
    - repair_action_id: "notebook:repair:strip-stale-outputs-preview"
      repair_class_family: disposable_state_rebuild
      repair_class_family_token: ""
      apply_mode_class: apply_with_checkpoint
      apply_mode_class_token: ""
      transaction_reversal_class: regenerate
      transaction_reversal_class_token: ""
      preview_required: true
      repair_preview_ref: "notebook:repair-preview:strip-stale-outputs"
      checkpoint_ref: "checkpoint:notebook:before-strip-stale-outputs"
      affected_cell_ids:
        - "notebook:cell-id:fit-model"
        - "notebook:cell-id:widget"
      affected_output_ids:
        - "notebook:output:fit-model:chart"
        - "notebook:output:widget:controls"
      consequence_label: "Would remove stale or widget-gated outputs; rerun is required before outputs become current again."
      safe_next_actions:
        - "open compare before apply"
        - "save clean copy instead"
        - "keep captured outputs"
  export_scopes:
    - export_scope_id: "notebook:export-scope:canonical-ipynb"
      scope_class: canonical_ipynb
      scope_class_token: ""
      artifact_ref: "artifact:notebook:report.ipynb"
      representation_class: raw
      representation_class_token: ""
      body_posture: exact_source_bytes
      body_posture_token: ""
      output_include_policy_ref: "notebook:include-policy:canonical-ipynb"
      trust_class: RawText
      stale_or_imported_output_label: "Canonical notebook preserves captured and stale markers."
    - export_scope_id: "notebook:export-scope:rendered-report"
      scope_class: rendered_report
      scope_class_token: ""
      artifact_ref: "artifact:notebook:report.rendered.html"
      representation_class: sanitized
      representation_class_token: ""
      body_posture: sanitized_static_snapshot
      body_posture_token: ""
      output_include_policy_ref: "notebook:include-policy:rendered-report"
      trust_class: SanitizedRich
      stale_or_imported_output_label: "Rendered report labels stale and widget-blocked outputs."
    - export_scope_id: "notebook:export-scope:raw-payload"
      scope_class: raw_artifact_payload
      scope_class_token: ""
      artifact_ref: "artifact:notebook:raw-output-payloads"
      representation_class: raw
      representation_class_token: ""
      body_posture: exact_source_bytes
      body_posture_token: ""
      output_include_policy_ref: "notebook:include-policy:raw-payload"
      trust_class: RawText
      stale_or_imported_output_label: "Raw payload export is separate from canonical notebook save."
  paired_exports:
    - paired_export_id: "notebook:paired-export:percent-script"
      document_id_ref: "notebook:document:local-python-report"
      route_ref: "route:notebook:paired-export:percent-script"
      target_format: "percent_script"
      export_state: derived_from_canonical_notebook
      export_state_token: ""
      source_of_truth_scope: canonical_ipynb
      source_of_truth_scope_token: ""
      canonical_direction_ref: "canonical-direction:notebook-to-export-script"
      divergence_state_label: "Derived from canonical notebook; overwrite requires review."
  reproducibility:
    - reproducibility_id: "notebook:reproducibility:local-python-report"
      document_id_ref: "notebook:document:local-python-report"
      kernel_session_id_ref: "notebook:kernel-session:python-local:current"
      route_ref: "route:notebook:reproducibility:local-python-report"
      environment_fingerprint_ref: "env:fingerprint:python-data:uv-lock"
      data_snapshot_ref: "data-snapshot:sample-metrics:v1"
      freshness_label: "One stale chart output remains from a prior data snapshot."
  claim_limits: []
  downgrade_behaviors:
    - "No kernel: document remains editable and reviewable; execution actions are disabled."
    - "Trust downgrade: live outputs become captured or stale evidence and widgets stay static."
    - "Round-trip uncertainty: raw JSON fallback remains available and rewrite is refused until compare succeeds."
expect:
  valid: true
  required_violation_tokens: []
  required_export_scopes:
    - canonical_ipynb
    - rendered_report
    - raw_artifact_payload
  required_plaintext_snippets:
    - "identity family=notebook_document root=local labels=[durable_local_file]"
    - "workspace=trusted_workspace"
    - "notebook=fully_trusted_user"
    - "kernel=local_managed_available"
    - "freshness=stale_after_drift"
    - "scope=canonical_ipynb"
    - "scope=rendered_report"
    - "scope=raw_artifact_payload"
    - "repair_preview_only_until_explicit_apply"
