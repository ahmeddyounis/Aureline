fixture_metadata:
  name: remote_polling_fallback
  scenario: >-
    A remote-agent root loses its event stream; the watcher fidelity drops
    to polling_fallback with a 4-second poll interval. The active save uses
    remote_conditional_write but the active root cannot prove freshness
    between polls; compare-before-write becomes recompare_required_each_write.
    The recovery surface is a watch_fidelity_downgrade_review offering retry
    and acknowledge_degraded_guarantee; overwrite is forbidden because the
    fidelity downgrade leaves writes correct only via per-write recompare.
  spec_axis: remote_polling_fallback
