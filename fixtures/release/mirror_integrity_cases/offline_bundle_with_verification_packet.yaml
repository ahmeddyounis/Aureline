# yaml-language-server: $schema=../../../schemas/release/offline_verification_packet.schema.json
$schema: "https://aureline.dev/schemas/release/offline_verification_packet.schema.json"
__fixture__:
  name: offline_bundle_with_verification_packet
  scenario: >
    The Acme Corp sovereign install snapshot bundles the Aureline
    desktop stable 2.3.0 release payload, the matching update
    metadata, the active policy bundle, the reference docs pack, the
    local model pack, and the matching debug-symbol sidecars. The
    bundle also carries the active advisory metadata against the
    legacy_lint_pack family, the revocation against legacy_lint_pack
    1.0.4, and the trust-root rotation state for release-signing root
    v3, all delivered through manual file imports with their
    metadata-chain refs. Packet disclosure summary is
    mixed_local_and_imported because release payload, update
    metadata, policy bundle, and docs pack were verified locally
    while extension and model packs are imported under publisher
    assertion. Refresh path is manual_file_import_refresh.
  contract_sections:
    - "§5 Offline-verification packet"
    - "§5.2 Per-artifact-family coverage"
    - "§5.3 Per-emergency-metadata coverage"
    - "§5.4 Trust-root pointer block"
    - "§7 Manual emergency-import receipts and metadata chains"
offline_verification_packet_schema_version: 1
record_kind: offline_verification_packet_record
packet_id: offline_verification_packet:acme_corp.sovereign_install.snapshot.20260418
emitted_at: "2026-04-30T14:30:00Z"
packet_kind_class: sovereign_install_snapshot
bundle_source:
  bundle_label: "Acme Corp sovereign install snapshot 2026-04-18"
  bundle_ref: bundle:acme_corp.sovereign_install.snapshot.20260418
  bundle_digest_ref: artifact_digest:bundle.acme_corp.sovereign_install.snapshot.20260418
  exported_at: "2026-04-18T07:00:00Z"
  evaluated_at: "2026-04-30T14:30:00Z"
  validity_window_class: within_validity
  valid_until: "2026-05-18T07:00:00Z"
  exporter_role_ref: ownership_role:acme_corp.release_engineering.exporter
  bundle_disclosure: >
    Sovereign install snapshot exported by Acme Corp release
    engineering with a 30-day validity window.
artifact_family_coverage:
  - subject_class: release_payload
    artifact_family_ref: artifact_family:release_payloads.desktop_binary
    included_artifact_count: 1
    verification_row_refs:
      - artifact_verification_row:release_payload.desktop.stable.2_3_0.mirrored_verified
    mirror_integrity_packet_refs:
      - mirror_integrity_packet:release_payload.desktop.stable.2_3_0.acme_corp_mirror.same_artifact
    coverage_disclosure_class: mirrored_through_continuity
    coverage_note: >
      Desktop release payload verified through the Acme Corp mirror
      continuity verifier under the current release-signing root.
  - subject_class: update_metadata
    artifact_family_ref: artifact_family:update_metadata.channel_manifests
    included_artifact_count: 3
    verification_row_refs:
      - artifact_verification_row:update_metadata.stable.channel_manifest.20260429.locally_verified
    mirror_integrity_packet_refs: []
    coverage_disclosure_class: locally_verified
    coverage_note: >
      Channel manifest, timestamp metadata, and snapshot metadata
      verified locally against the current update-metadata root.
  - subject_class: policy_bundle
    artifact_family_ref: artifact_family:policy_bundles.org_signed
    included_artifact_count: 1
    verification_row_refs:
      - artifact_verification_row:policy_bundle.acme_corp.org_policy.v17.locally_verified
    mirror_integrity_packet_refs: []
    coverage_disclosure_class: locally_verified
    coverage_note: >
      Acme Corp org policy bundle v17 verified locally against the
      org policy signer root.
  - subject_class: docs_pack
    artifact_family_ref: artifact_family:docs_packs.reference_pack
    included_artifact_count: 1
    verification_row_refs:
      - artifact_verification_row:docs_pack.reference.2_3_0.locally_verified
    mirror_integrity_packet_refs: []
    coverage_disclosure_class: locally_verified
    coverage_note: >
      Reference docs pack 2.3.0 verified locally against the current
      docs-pack signing root.
  - subject_class: extension_package
    artifact_family_ref: artifact_family:extensions.partner_third_party
    included_artifact_count: 4
    verification_row_refs:
      - artifact_verification_row:extension_package.partner_lint_pack.2_1_0.publisher_asserted
      - artifact_verification_row:extension_package.partner_format_pack.4_2_1.publisher_asserted
    mirror_integrity_packet_refs: []
    coverage_disclosure_class: imported_publisher_asserted
    coverage_note: >
      Partner extension packs are imported with publisher assertion
      only; no local verification has occurred.
  - subject_class: model_or_tool_pack
    artifact_family_ref: artifact_family:models.local_pack
    included_artifact_count: 1
    verification_row_refs:
      - artifact_verification_row:model_or_tool_pack.local.code_assist_v3.publisher_asserted
    mirror_integrity_packet_refs: []
    coverage_disclosure_class: imported_publisher_asserted
    coverage_note: >
      Local code-assist model pack imported with publisher assertion
      only.
  - subject_class: symbol_or_debug_sidecar
    artifact_family_ref: artifact_family:symbols.desktop_binary
    included_artifact_count: 1
    verification_row_refs:
      - artifact_verification_row:symbol_or_debug_sidecar.desktop.stable.2_3_0.locally_verified
    mirror_integrity_packet_refs: []
    coverage_disclosure_class: locally_verified
    coverage_note: >
      Desktop debug-symbol sidecar verified locally and paired with
      the desktop release payload.
emergency_metadata_coverage:
  - propagation_kind_class: advisory_metadata
    revocation_propagation_record_ref: revocation_propagation_record:legacy_lint_pack.1_0_4.advisory.offline_bundle.imported
    manual_import_receipt_refs:
      - manual_import_receipt:legacy_lint_pack.advisory.offline_bundle.20260418
    metadata_chain_ref: metadata_chain:legacy_lint_pack.advisory.acme_corp.20260418
    authoritative_origin_ref: origin:aureline.advisory_distribution
    imported_at: "2026-04-18T07:30:00Z"
    coverage_note: >
      Active advisory against the legacy_lint_pack family imported
      via manual file import on 2026-04-18 with the metadata-chain
      rooted at the Aureline advisory distribution origin.
  - propagation_kind_class: revocation_metadata
    revocation_propagation_record_ref: revocation_propagation_record:legacy_lint_pack.1_0_4.offline_bundle.stale_past_grace
    manual_import_receipt_refs:
      - manual_import_receipt:legacy_lint_pack.1_0_4.offline_bundle.20260418
    metadata_chain_ref: metadata_chain:legacy_lint_pack.1_0_4.acme_corp.20260418
    authoritative_origin_ref: origin:aureline.emergency_distribution
    imported_at: "2026-04-18T07:30:00Z"
    coverage_note: >
      Revocation against legacy_lint_pack 1.0.4 imported via manual
      file import on 2026-04-18; propagation row records the
      stale-past-grace status.
  - propagation_kind_class: trust_root_rotation_metadata
    revocation_propagation_record_ref: revocation_propagation_record:release_signing_root.current.offline_bundle.imported
    manual_import_receipt_refs:
      - manual_import_receipt:release_signing_root.current.offline_bundle.20260418
    metadata_chain_ref: metadata_chain:release_signing_root.current.acme_corp.20260418
    authoritative_origin_ref: origin:aureline.trust_root_distribution
    imported_at: "2026-04-18T07:30:00Z"
    coverage_note: >
      Trust-root rotation state for release-signing root v3 imported
      via manual file import on 2026-04-18 with the metadata-chain
      rooted at the Aureline trust-root distribution origin.
trust_root_pointer_block:
  trust_root_rotation_state_refs:
    - trust_root_rotation_state:release_signing_root.current
    - trust_root_rotation_state:update_metadata_root.current
    - trust_root_rotation_state:policy_signer_root.acme_corp.current
    - trust_root_rotation_state:docs_pack_root.current
  trust_root_freshness_class: warm_cached
  trust_root_disclosure: >
    All four trust-root rotation states bundled with the snapshot;
    freshness is warm cached because the bundle was exported 12 days
    ago.
freshness_envelope:
  bundle_age_class: warm_cached
  revocation_metadata_age_class: stale
  advisory_metadata_age_class: warm_cached
  evaluated_at: "2026-04-30T14:30:00Z"
  freshness_evidence_refs:
    - freshness_evidence:acme_corp.sovereign_install.snapshot.20260430
  freshness_disclosure: >
    Bundle and advisory metadata are warm cached; revocation metadata
    is stale (see linked propagation record). Refresh path is manual
    file import.
disclosure_envelope:
  packet_disclosure_summary_class: mixed_local_and_imported
  refresh_path_class: manual_file_import_refresh
  policy_pin_refs:
    - policy_pin:acme_corp.org_policy.v17.installable_targets
  disclosure_note: >
    Release payload, update metadata, policy bundle, docs pack, and
    debug-symbol sidecar are locally verified; partner extensions and
    local model pack are imported with publisher assertion only.
linkage_envelope:
  artifact_verification_row_refs:
    - artifact_verification_row:release_payload.desktop.stable.2_3_0.mirrored_verified
    - artifact_verification_row:update_metadata.stable.channel_manifest.20260429.locally_verified
    - artifact_verification_row:policy_bundle.acme_corp.org_policy.v17.locally_verified
    - artifact_verification_row:docs_pack.reference.2_3_0.locally_verified
    - artifact_verification_row:extension_package.partner_lint_pack.2_1_0.publisher_asserted
    - artifact_verification_row:extension_package.partner_format_pack.4_2_1.publisher_asserted
    - artifact_verification_row:model_or_tool_pack.local.code_assist_v3.publisher_asserted
    - artifact_verification_row:symbol_or_debug_sidecar.desktop.stable.2_3_0.locally_verified
  mirror_integrity_packet_refs:
    - mirror_integrity_packet:release_payload.desktop.stable.2_3_0.acme_corp_mirror.same_artifact
  revocation_propagation_record_refs:
    - revocation_propagation_record:legacy_lint_pack.1_0_4.advisory.offline_bundle.imported
    - revocation_propagation_record:legacy_lint_pack.1_0_4.offline_bundle.stale_past_grace
    - revocation_propagation_record:release_signing_root.current.offline_bundle.imported
  manual_import_receipt_refs:
    - manual_import_receipt:legacy_lint_pack.advisory.offline_bundle.20260418
    - manual_import_receipt:legacy_lint_pack.1_0_4.offline_bundle.20260418
    - manual_import_receipt:release_signing_root.current.offline_bundle.20260418
  trust_root_rotation_state_refs:
    - trust_root_rotation_state:release_signing_root.current
    - trust_root_rotation_state:update_metadata_root.current
    - trust_root_rotation_state:policy_signer_root.acme_corp.current
    - trust_root_rotation_state:docs_pack_root.current
  offline_continuity_card_refs:
    - offline_continuity_card:acme_corp.sovereign_install.snapshot.20260418.npm
  support_bundle_refs:
    - support_bundle:acme_corp.sovereign_install.snapshot.20260418
  release_evidence_packet_refs:
    - release_evidence_packet:release_payload.desktop.stable.2_3_0
surface_projections:
  - surface_class: mirror_offline_review
    projection_mode_class: full_review_sheet
    required_fields:
      - packet_kind_class
      - validity_window_class
      - valid_until
      - packet_disclosure_summary_class
      - refresh_path_class
      - bundle_age_class
      - revocation_metadata_age_class
      - advisory_metadata_age_class
      - trust_root_freshness_class
      - evaluated_at
    projection_note: >
      Mirror / offline review sheet renders the full packet plus the
      per-coverage-row disclosure plus the per-emergency-metadata
      coverage rows so a sovereign reviewer can see local vs.
      imported vs. stale vs. policy-pinned in one place.
  - surface_class: install_review_sheet
    projection_mode_class: compact_row_plus_proof_chain
    required_fields:
      - packet_kind_class
      - packet_disclosure_summary_class
      - refresh_path_class
      - bundle_age_class
      - revocation_metadata_age_class
      - evaluated_at
    projection_note: >
      Install review sheet shows the packet disclosure summary plus
      the refresh path before the user confirms any install.
  - surface_class: about_provenance_panel
    projection_mode_class: compact_row_plus_proof_chain
    required_fields:
      - packet_kind_class
      - packet_disclosure_summary_class
      - refresh_path_class
      - trust_root_freshness_class
      - evaluated_at
    projection_note: >
      About provenance panel renders the packet disclosure summary
      plus the refresh path so the user can inspect the bundle's
      trust posture without leaving the product.
  - surface_class: support_bundle
    projection_mode_class: support_export_redacted
    required_fields:
      - packet_kind_class
      - packet_disclosure_summary_class
      - refresh_path_class
      - bundle_age_class
      - revocation_metadata_age_class
      - evaluated_at
    projection_note: >
      Support bundle exports the packet disclosure summary plus the
      reconcile path with operator-safe refs.
export_envelope:
  redaction_class: support_redacted
  exportable_to_screenshot: true
  exportable_to_support_bundle: true
  exportable_to_public_proof_packet: false
  exportable_to_offline_review: true
  raw_private_material_excluded: true
  omission_reasons:
    - "Public-proof export is suppressed because the packet enumerates per-customer policy pins and per-import receipts that are operator-internal."
contract_doc_ref: docs/release/mirror_integrity_and_offline_verification_contract.md
channel_matrix_ref: artifacts/release/channel_matrix.yaml
artifact_family_map_ref: artifacts/release/artifact_family_map.yaml
trust_framework_rows_ref: artifacts/release/trust_framework_rows.yaml
notes: >
  Offline bundle with verification packet acceptance case. Sovereign
  install snapshot bundles seven artifact families plus three
  emergency-metadata kinds with their manual-import receipts and
  metadata-chain refs. Packet disclosure summary is mixed local and
  imported; refresh path is manual file import.
