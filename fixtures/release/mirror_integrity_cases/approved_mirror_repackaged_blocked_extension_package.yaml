    A community-published extension partner_lint_pack 2.1.0 has been
    repackaged by an approved community mirror under its own signing
    key. The mirror digest differs from the origin digest and the
    origin signature is no longer present. The mirror MUST NOT serve
    this artifact as the unchanged public artifact. Integrity outcome
    is blocked_repackaged_identity.
  contract_sections:
    - "§3 Mirror-integrity packet"
    - "§3.2 Identity, digest, and signer continuity"
    - "§9 Forbidden collapses"
