# yaml-language-server: $schema=../../../schemas/release/revocation_propagation_record.schema.json
$schema: "https://aureline.dev/schemas/release/revocation_propagation_record.schema.json"
__fixture__:
  name: stale_revocation_metadata_propagation
  scenario: >
    A revocation against a yanked extension version (legacy_lint_pack
    1.0.4) was signed by the authoritative origin two weeks ago but
    the customer offline bundle's last revocation-metadata import is
    past the configured grace window. The propagation status is
    propagated_to_offline_bundle, the propagation age is
    stale_past_grace, and the reconcile actions name a refresh via
    the approved mirror plus a re-verify against the current trust
    root.
  contract_sections:
    - "§4 Revocation-propagation record"
    - "§4.1 Propagation kind, status, age"
    - "§4.5 Reconcile actions"
revocation_propagation_record_schema_version: 1
record_kind: revocation_propagation_record
record_id: revocation_propagation_record:legacy_lint_pack.1_0_4.offline_bundle.stale_past_grace
emitted_at: "2026-04-30T13:30:00Z"
propagation_kind_class: revocation_metadata
subject_envelope:
  subject_class: extension_package
  artifact_family_ref: artifact_family:extensions.partner_third_party
  channel_row_ref: channel.extensions.community
  owner_role_ref: ownership_role:extensions_publisher_program.dri
  subject_disclosure: >
    Revocation against legacy_lint_pack 1.0.4 affecting the partner
    third-party extension family.
authoritative_origin:
  origin_label: "Aureline emergency distribution origin"
  origin_ref: origin:aureline.emergency_distribution
  signer_ref: signer:emergency_signing_root_v2
  signed_at: "2026-04-16T09:00:00Z"
  valid_from: "2026-04-16T09:00:00Z"
  valid_until: null
  supersedes_origin_refs: []
  origin_disclosure: >
    Permanent revocation of legacy_lint_pack 1.0.4 published by the
    Aureline emergency distribution origin under the current
    emergency signing root.
propagation_status_class: propagated_to_offline_bundle
propagation_age_class: stale_past_grace
overlap_window:
  overlap_class: no_overlap
  overlap_starts_at: null
  overlap_ends_at: null
  grace_until: null
  overlap_disclosure: >
    No overlap window applies to a revocation; the revocation takes
    effect at signed_at and remains in force until superseded.
last_imported_state:
  last_seen_state_class: revoked
  last_seen_at: "2026-04-18T07:30:00Z"
  last_imported_via_class: offline_bundle_import
  last_import_receipt_ref: manual_import_receipt:legacy_lint_pack.1_0_4.offline_bundle.20260418
  last_import_disclosure: >
    Last revocation-metadata import on this customer offline bundle
    arrived through an offline-bundle import on 2026-04-18; the
    bundle has not been refreshed since and is now past the
    configured 10-day grace window.
reconcile_actions:
  - action_id: reconcile_action:legacy_lint_pack.1_0_4.refresh_via_approved_mirror
    action_kind_class: refresh_via_approved_mirror
    action_owner_class: org_admin
    deadline_semantics_class: hard_deadline_required
    deadline_at: "2026-05-07T00:00:00Z"
    action_note: >
      Refresh the customer offline bundle's revocation snapshot via
      the Acme Corp approved mirror within seven days; the offline
      bundle cannot continue to admit installs of related extensions
      while the revocation snapshot is past grace.
  - action_id: reconcile_action:legacy_lint_pack.1_0_4.re_verify_against_current_trust_root
    action_kind_class: re_verify_against_current_trust_root
    action_owner_class: org_admin
    deadline_semantics_class: soft_deadline_advisory
    deadline_at: null
    action_note: >
      Re-verify the bundle's signature evidence against the current
      release-signing root v3 after the refresh completes.
linkage_envelope:
  emergency_action_record_refs: []
  revocation_record_refs:
    - revocation_record:legacy_lint_pack.1_0_4
  advisory_record_refs:
    - advisory_record:legacy_lint_pack.1_0_4
  manual_import_receipt_refs:
    - manual_import_receipt:legacy_lint_pack.1_0_4.offline_bundle.20260418
  trust_root_rotation_state_refs:
    - trust_root_rotation_state:release_signing_root.current
  mirror_continuity_event_refs: []
  mirror_integrity_packet_refs: []
  offline_verification_packet_refs:
    - offline_verification_packet:acme_corp.sovereign_install.snapshot.20260418
  artifact_verification_row_refs: []
  support_bundle_refs:
    - support_bundle:acme_corp.legacy_lint_pack.1_0_4.review
surface_projections:
  - surface_class: update_center
    projection_mode_class: full_review_sheet
    required_fields:
      - propagation_kind_class
      - propagation_status_class
      - propagation_age_class
      - last_seen_state_class
      - last_imported_via_class
      - reconcile_action_kind_class
      - deadline_semantics_class
      - deadline_at
    projection_note: >
      Update center renders the stale-past-grace propagation row plus
      the reconcile actions so the user can act on the refresh.
  - surface_class: install_review_sheet
    projection_mode_class: compact_row_plus_proof_chain
    required_fields:
      - propagation_kind_class
      - propagation_status_class
      - propagation_age_class
      - reconcile_action_kind_class
      - deadline_at
    projection_note: >
      Install review sheet shows the propagation row before the user
      confirms an install of any related extension.
  - surface_class: mirror_offline_review
    projection_mode_class: full_review_sheet
    required_fields:
      - propagation_kind_class
      - propagation_status_class
      - propagation_age_class
      - last_seen_state_class
      - last_imported_via_class
      - reconcile_action_kind_class
      - deadline_semantics_class
      - deadline_at
    projection_note: >
      Mirror / offline review sheet renders the full propagation
      record plus reconcile chain.
  - surface_class: support_bundle
    projection_mode_class: support_export_redacted
    required_fields:
      - propagation_kind_class
      - propagation_status_class
      - propagation_age_class
      - reconcile_action_kind_class
      - deadline_at
    projection_note: >
      Support bundle exports the propagation row redacted to
      operator-safe refs.
export_envelope:
  redaction_class: support_redacted
  exportable_to_screenshot: true
  exportable_to_support_bundle: true
  exportable_to_public_proof_packet: false
  exportable_to_offline_review: true
  raw_private_material_excluded: true
  omission_reasons:
    - "Public-proof export is suppressed because the row names a per-customer offline-bundle reconcile state that is operator-internal."
contract_doc_ref: docs/release/mirror_integrity_and_offline_verification_contract.md
channel_matrix_ref: artifacts/release/channel_matrix.yaml
artifact_family_map_ref: artifacts/release/artifact_family_map.yaml
trust_framework_rows_ref: artifacts/release/trust_framework_rows.yaml
notes: >
  Stale revocation metadata acceptance case. Last propagation onto the
  customer offline bundle is past the configured grace window;
  reconcile actions name the refresh path and the deadline.
