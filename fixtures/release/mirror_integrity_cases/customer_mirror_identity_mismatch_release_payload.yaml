# yaml-language-server: $schema=../../../schemas/release/mirror_integrity_packet.schema.json
$schema: "https://aureline.dev/schemas/release/mirror_integrity_packet.schema.json"
__fixture__:
  name: customer_mirror_identity_mismatch_release_payload
  scenario: >
    The Aureline desktop stable 2.3.0 release payload is being served
    through what the deployment policy pinned as the Acme Corp
    enterprise mirror, but the observed customer-mirror identity does
    not match the pinned identity (a different mirror is operating
    under the wrong identity claim). Even though the mirror digest
    matches the origin digest and the origin signature is reused, the
    integrity outcome is blocked_customer_mirror_identity_mismatch
    because a wrong mirror cannot serve traffic under another mirror's
    identity.
  contract_sections:
    - "§3.3 Customer-mirror identity"
    - "§9 Forbidden collapses"
mirror_integrity_packet_schema_version: 1
record_kind: mirror_integrity_packet_record
packet_id: mirror_integrity_packet:release_payload.desktop.stable.2_3_0.acme_corp_mirror.identity_mismatch_blocked
emitted_at: "2026-04-30T12:00:00Z"
