schema_version: 1
record_kind: install_matrix_case_record
case_id: install_matrix_case:linux.package_manager_channel_identity
case_class: package_manager_owned_update
scenario_summary: >
  Linux Stable is installed from a DEB or RPM repository and Preview is
  available through a separate channel-suffixed repository/package
  identity. The package manager owns binary updates and removal, while
  Aureline owns per-channel user state roots and diagnostics.
artifact_family_refs:
  - artifact_family.linux.deb
  - artifact_family.linux.rpm
channel_identity_refs:
  - channel_identity.stable
  - channel_identity.preview
  - channel_identity.lts
install_topology_card_refs:
  - card.linux.x86_64.external_package_manager.stable
  - card.linux.x86_64.managed_deployed.stable
  - card.linux.x86_64.customer_managed_mirror.stable
state_root_refs:
  - state.per_user_configuration_root.stable
  - state.per_user_recovery_root.stable
  - state.per_user_derived_cache_root.stable
  - state.per_machine_admin_policy_root.stable
  - state.offline_bundle_mirror_metadata_root.stable
update_marker_refs:
  - update_marker.stable
  - update_marker.preview
  - update_marker.lts
handler_refs:
  - file_association.stable
  - file_association.preview
  - protocol_handler.stable
  - protocol_handler.preview
coexistence_rule_refs:
  - coexistence_rule.package_manager_owns_package_update
  - coexistence_rule.stable_preview_no_shared_state
expected_result: promote
blocked_if:
  - in_product_update_replaces_package_manager_owned_binary
  - package_remove_deletes_user_authored_state
  - stable_and_preview_share_desktop_entry_identity
  - mirror_metadata_missing_for_air_gap_claim
required_operator_choices:
  - package_repository_channel
  - default_desktop_file_handler_channel
release_summary: >
  DEB and RPM rows are promote-eligible when package-manager ownership,
  repository/mirror metadata, channel-suffixed desktop identity, and XDG
  state roots are explicit.
support_summary: >
  Support exports must distinguish package-manager removal from user
  state backup, repair, or restore.
enterprise_summary: >
  Enterprise mirrors must preserve signed package metadata, channel
  identity, rollback target, and policy-root refs.
evidence_refs:
  - artifacts/release/install_artifact_families.yaml#artifact_family.linux.deb
  - artifacts/release/install_artifact_families.yaml#artifact_family.linux.rpm
  - artifacts/release/channel_identity_and_state_roots.yaml
status: proposed
