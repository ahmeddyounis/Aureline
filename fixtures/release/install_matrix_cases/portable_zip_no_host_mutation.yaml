schema_version: 1
record_kind: install_matrix_case_record
case_id: install_matrix_case:portable.archive_no_host_mutation
case_class: portable_no_machine_global_mutation
scenario_summary: >
  A user extracts a signed portable archive next to an installed Stable
  desktop. The portable copy keeps durable state, update markers, and
  recent-item metadata under the portable root and does not register
  host-wide file associations, protocol handlers, services, shell hooks,
  or credential-store writes.
artifact_family_refs:
  - artifact_family.windows.signed_portable_zip
  - artifact_family.macos.signed_app_zip
  - artifact_family.linux.appimage
  - artifact_family.linux.tarball
channel_identity_refs:
  - channel_identity.stable
  - channel_identity.portable_stable
install_topology_card_refs:
  - card.windows.x86_64.portable.portable_stable
  - card.macos.universal_binary.portable.portable_stable
  - card.linux.x86_64.portable.portable_stable
state_root_refs:
  - state.portable_colocated_root.portable_stable
update_marker_refs:
  - update_marker.portable_stable
handler_refs:
  - file_association.portable_stable
  - protocol_handler.portable_stable
coexistence_rule_refs:
  - coexistence_rule.installed_portable_no_host_mutation
expected_result: promote
blocked_if:
  - portable_writes_installed_channel_state_root
  - portable_writes_machine_global_update_marker
  - portable_registers_file_association
  - portable_registers_protocol_handler
  - portable_installs_service_or_shell_hook
required_operator_choices:
  - optional_import_domains_if_user_requests_import
release_summary: >
  Portable archive rows are promote-eligible when all mutable state and
  markers stay under the portable root and host-wide integrations are
  suppressed.
support_summary: >
  Diagnostics must identify the portable root and must not recommend
  deleting installed-channel state to remove the portable copy.
enterprise_summary: >
  Enterprises may distribute the archive from an internal share, but
  the portable copy remains outside managed package ownership unless a
  separate managed deployment row is added.
evidence_refs:
  - fixtures/release/install_rows/portable_stable_profile_card.json
  - artifacts/release/channel_identity_and_state_roots.yaml
status: proposed
