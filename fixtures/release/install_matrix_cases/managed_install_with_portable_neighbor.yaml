schema_version: 1
record_kind: install_matrix_case_record
case_id: install_matrix_case:managed.portable_neighbor
case_class: managed_and_portable_coexistence
scenario_summary: >
  A managed Stable install is deployed to a fleet host and a user runs a
  portable Stable copy from a separate directory for a temporary task.
  Managed policy roots and fleet update markers stay owned by the
  managed install; the portable copy keeps its state under the portable
  root and does not claim machine-global handlers.
artifact_family_refs:
  - artifact_family.windows.msi
  - artifact_family.windows.msix
  - artifact_family.macos.pkg
  - artifact_family.linux.deb
  - artifact_family.linux.rpm
  - artifact_family.windows.signed_portable_zip
  - artifact_family.macos.signed_app_zip
  - artifact_family.linux.tarball
channel_identity_refs:
  - channel_identity.stable
  - channel_identity.portable_stable
install_topology_card_refs:
  - card.windows.x86_64.managed_deployed.stable
  - card.macos.universal_binary.managed_deployed.stable
  - card.linux.x86_64.managed_deployed.stable
  - card.windows.x86_64.portable.portable_stable
  - card.macos.universal_binary.portable.portable_stable
  - card.linux.x86_64.portable.portable_stable
state_root_refs:
  - state.per_machine_admin_policy_root.stable
  - state.per_machine_shared_data_root.stable
  - state.per_user_configuration_root.stable
  - state.per_user_recovery_root.stable
  - state.portable_colocated_root.portable_stable
update_marker_refs:
  - update_marker.stable
  - update_marker.portable_stable
handler_refs:
  - file_association.stable
  - file_association.portable_stable
  - protocol_handler.stable
  - protocol_handler.portable_stable
coexistence_rule_refs:
  - coexistence_rule.managed_portable_admin_boundary
  - coexistence_rule.installed_portable_no_host_mutation
expected_result: promote
blocked_if:
  - portable_reads_managed_policy_root
  - portable_writes_managed_update_marker
  - managed_uninstall_deletes_portable_root
  - portable_claims_shared_protocol_scheme
required_operator_choices:
  - admin_allowed_import_domains_if_import_requested
  - default_file_handler_channel_if_managed_policy_sets_one
release_summary: >
  Managed and portable rows can coexist only when managed policy/update
  roots and portable colocated roots remain separate.
support_summary: >
  Support exports must show whether the running instance is managed or
  portable and must preserve both roots during uninstall or repair
  guidance.
enterprise_summary: >
  Admin policy may block portable execution, but if portable execution
  is allowed it cannot inherit managed policy or update ownership
  silently.
evidence_refs:
  - artifacts/release/install_topology_matrix.yaml
  - artifacts/release/channel_identity_and_state_roots.yaml
status: proposed
