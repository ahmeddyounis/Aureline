schema_version: 1
record_kind: install_matrix_case_record
case_id: install_matrix_case:macos.bundle_identity_and_scheme
case_class: platform_identity_handler_separation
scenario_summary: >
  macOS Stable is installed from a notarized DMG and Preview is installed
  from a managed PKG. The two app bundles use distinct bundle/update
  identifiers and channel-suffixed protocol schemes. The shared scheme
  resolves only through a user/admin selected default.
artifact_family_refs:
  - artifact_family.macos.notarized_dmg
  - artifact_family.macos.pkg
channel_identity_refs:
  - channel_identity.stable
  - channel_identity.preview
install_topology_card_refs:
  - card.macos.universal_binary.per_user_installed.stable
  - card.macos.universal_binary.side_by_side_preview.preview
  - card.macos.universal_binary.per_machine_installed.stable
state_root_refs:
  - state.per_user_configuration_root.stable
  - state.per_user_configuration_root.preview
  - state.per_user_keychain_or_secret_store.stable
  - state.per_user_keychain_or_secret_store.preview
update_marker_refs:
  - update_marker.stable
  - update_marker.preview
handler_refs:
  - protocol_handler.stable
  - protocol_handler.preview
  - protocol_handler.shared_aureline_default
  - file_association.stable
  - file_association.preview
coexistence_rule_refs:
  - coexistence_rule.stable_preview_no_shared_state
expected_result: promote
blocked_if:
  - stable_and_preview_share_bundle_id
  - stable_and_preview_share_keychain_service_name
  - preview_claims_shared_scheme_during_install
  - managed_pkg_overwrites_user_selected_default_handler
required_operator_choices:
  - shared_scheme_default_channel
  - default_file_handler_channel
release_summary: >
  macOS DMG and PKG rows require notarization/signature evidence plus
  bundle, update, keychain, and scheme identity separation across
  Stable and Preview.
support_summary: >
  Diagnostics must expose the active bundle identity, channel identity,
  scheme owner, and keychain namespace class without exposing secrets.
enterprise_summary: >
  MDM or Jamf may set defaults by policy, but package installation may
  not silently override a user/admin selected default.
evidence_refs:
  - artifacts/release/install_artifact_families.yaml#artifact_family.macos.notarized_dmg
  - artifacts/release/install_artifact_families.yaml#artifact_family.macos.pkg
status: proposed
