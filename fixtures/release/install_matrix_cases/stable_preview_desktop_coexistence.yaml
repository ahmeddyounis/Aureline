schema_version: 1
record_kind: install_matrix_case_record
case_id: install_matrix_case:desktop.stable_preview_coexistence
case_class: side_by_side_channel_coexistence
scenario_summary: >
  One host has a Stable desktop install and a Preview desktop install.
  The installers register channel-specific package identity, state
  roots, update markers, recent-item namespaces, file-association
  candidates, and protocol-handler schemes. The shared protocol scheme
  and default file handlers remain user/admin selected.
artifact_family_refs:
  - artifact_family.windows.msi
  - artifact_family.windows.msix
  - artifact_family.macos.notarized_dmg
  - artifact_family.macos.pkg
channel_identity_refs:
  - channel_identity.stable
  - channel_identity.preview
install_topology_card_refs:
  - card.windows.x86_64.per_user_installed.stable
  - card.windows.x86_64.side_by_side_preview.preview
  - card.macos.universal_binary.per_user_installed.stable
  - card.macos.universal_binary.side_by_side_preview.preview
state_root_refs:
  - state.per_user_configuration_root.stable
  - state.per_user_configuration_root.preview
  - state.per_user_recovery_root.stable
  - state.per_user_recovery_root.preview
  - state.per_user_derived_cache_root.stable
  - state.per_user_derived_cache_root.preview
  - state.per_user_keychain_or_secret_store.stable
  - state.per_user_keychain_or_secret_store.preview
update_marker_refs:
  - update_marker.stable
  - update_marker.preview
handler_refs:
  - file_association.stable
  - file_association.preview
  - protocol_handler.stable
  - protocol_handler.preview
  - protocol_handler.shared_aureline_default
coexistence_rule_refs:
  - coexistence_rule.stable_preview_no_shared_state
expected_result: promote
blocked_if:
  - preview_reads_stable_mutable_state_by_default
  - stable_and_preview_share_update_marker
  - installer_claims_shared_protocol_scheme_without_choice
  - file_association_default_uses_last_writer_wins
required_operator_choices:
  - shared_protocol_default_channel
  - default_file_handler_channel
release_summary: >
  Stable and Preview are promote-eligible only when each channel owns
  distinct state roots, update markers, recent items, handler
  candidates, and channel-specific schemes.
support_summary: >
  Support exports must show which channel produced the install summary
  and must not merge Stable and Preview support bundles or recent-item
  histories.
enterprise_summary: >
  Fleet policy may choose the shared default handler, but the installer
  cannot take it silently.
evidence_refs:
  - docs/release/packaging_installation_matrix.md
  - artifacts/release/install_artifact_families.yaml
  - artifacts/release/channel_identity_and_state_roots.yaml
status: proposed
