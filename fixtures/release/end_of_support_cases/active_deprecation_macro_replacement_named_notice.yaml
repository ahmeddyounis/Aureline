# yaml-language-server: $schema=../../../schemas/release/end_of_support_notice.schema.json
$schema: "https://aureline.dev/schemas/release/end_of_support_notice.schema.json"
__fixture__:
  name: active_deprecation_macro_replacement_named_notice
  scenario: >
    A legacy automation-macro family is actively deprecated with a
    named replacement workflow-bundle. The notice carries a typed
    deprecation cutoff (release version 2.4.0), a factual
    what-still-works projection (existing automations keep running
    until the cutoff), a typed compatibility-drift risk, and a
    safest next step that points the user at the
    compatibility-window report so the row-by-row replacement is
    inspectable. The notice never collapses the deprecation into a
    generic "deprecated" chip; the named replacement is required.
  contract_sections:
    - "§3 Notice-class vocabulary"
    - "§4 Cutoff vocabulary"
    - "§5 Affected scope"
    - "§6 What still works, risk after cutoff, safest next step"
    - "§7 Required surfaces"
    - "§8 Compatibility-window report"
end_of_support_notice_schema_version: 1
record_kind: end_of_support_notice_record
notice_id: end_of_support_notice:automations.legacy_macro_family.deprecation_active
emitted_at: "2026-04-30T09:10:00Z"
notice_class: active_deprecation
notice_severity_class: plan_named_action_within_window
headline_label: "Legacy automation macros deprecated — replaced by the workflow-bundle family"
cutoff_target:
  cutoff_kind_class: exact_release_version
  cutoff_at: null
  cutoff_window_starts_at: null
  cutoff_window_ends_at: null
  cutoff_version_label: "2.4.0"
  cutoff_release_artifact_ref: release_artifact:desktop.stable.2_4_0
  cutoff_summary: >
    The legacy automation-macro family is removed in stable
    2.4.0; the named replacement is the workflow-bundle family.
affected_scope:
  affected_scope_classes:
    - automations_or_macros
    - command_or_action_schemas
  build_identity_refs: []
  channel_row_refs:
    - channel.stable
    - channel.lts
  support_window_badge_refs:
    - support_window_badge:desktop.stable.general_availability.macos_universal
  compatibility_row_refs:
    - compat_row:command_action_schema_envelope
  compatibility_window_report_ref: compatibility_window_report:automations.legacy_macro_family.deprecation_active
  scope_summary: >
    The legacy automation-macro family deprecation narrows
    automation-macro and command-action-schema rows on stable and
    LTS channels.
what_still_works:
  - what_still_works_class: existing_workflows_continue_until_cutoff
    evidence_refs:
      - compat_row:command_action_schema_envelope
    what_still_works_note: >
      Existing legacy macros keep running until the 2.4.0 release
      ships; the deprecation does not break already-saved
      automations during the deprecation window.
  - what_still_works_class: existing_durable_state_remains_owned_by_user
    evidence_refs: []
    what_still_works_note: >
      User-authored macro source remains owned by the user. The
      compatibility-window report names the supported replacement
      surface row-by-row.
risk_after_cutoff:
  - risk_after_cutoff_class: compatibility_drift_against_supported_compatibility_rows
    evidence_refs:
      - skew_register:command_action_schema_envelope
    risk_note: >
      Legacy macro rows fall out of the supported compatibility
      envelope on the 2.4.0 cutoff; the supported replacement is
      the workflow-bundle family.
safest_next_step:
  safest_next_step_class: migrate_extensions_via_compatibility_window_report
  next_step_route_ref: route.compatibility_report.automations.legacy_macro_family
  migration_helper_handoff_ref: null
  compatibility_window_report_ref: compatibility_window_report:automations.legacy_macro_family.deprecation_active
  next_step_summary: >
    Open the compatibility-window report and route each legacy
    macro to the workflow-bundle replacement listed on its row.
required_surface_set:
  - update_center_banner
  - about_panel_banner
  - compatibility_report_banner
  - migration_or_import_workflow_banner
  - release_notes_card
contract_doc_ref: docs/release/end_of_support_and_migration_contract.md
channel_matrix_ref: artifacts/release/channel_matrix.yaml
notes: >
  Active-deprecation posture with a named replacement family.
  Confirms the named_replacement_label rule in the
  compatibility-window report and the migrate-via-report
  safest-next-step.
