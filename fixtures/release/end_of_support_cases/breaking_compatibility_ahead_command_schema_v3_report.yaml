__fixture__:
  name: breaking_compatibility_ahead_command_schema_v3_report
  scenario: >
    Companion compatibility-window report for the breaking-
    compatibility-ahead notice on the command-action schema v3
    epoch. The report carries one category row per affected
    category in the breaking_change_ahead_inspect_and_export_before_ship
    window state, an inspect-only migration-helper handoff (scan,
    preview, dry-run, export environment summary), and the export
    paths required so the breaking change can be inspected and
    exported BEFORE 3.0 ships as stable or LTS truth.
  contract_sections:
    - "§8 Compatibility-window report"
    - "§8.1 Category-window state"
    - "§8.2 Extension-impact-forecast linkage"
    - "§9 Migration-helper handoff"
    - "§10 Export paths"
