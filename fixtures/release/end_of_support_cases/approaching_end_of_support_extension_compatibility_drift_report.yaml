# yaml-language-server: $schema=../../../schemas/release/compatibility_window_report.schema.json
$schema: "https://aureline.dev/schemas/release/compatibility_window_report.schema.json"
__fixture__:
  name: approaching_end_of_support_extension_compatibility_drift_report
  scenario: >
    Companion compatibility-window report for the approaching-EOS
    notice on stable 2.1.x. The report breaks down the affected
    categories (extensions, command-action schemas) row-by-row,
    carries a migration-helper handoff with the seven distinct
    actions (scan, preview, backup, apply, rollback, dry-run,
    export environment summary), and demands a one-click checkpoint
    before apply because the apply alters durable user state and
    the compatibility mode of the build.
  contract_sections:
    - "§8 Compatibility-window report"
    - "§8.1 Category-window state"
    - "§9 Migration-helper handoff"
    - "§9.2 One-click backup or checkpoint requirement"
    - "§10 Export paths"
compatibility_window_report_schema_version: 1
record_kind: compatibility_window_report_record
report_id: compatibility_window_report:desktop.stable.2_1_0.approaching_window_end
emitted_at: "2026-04-30T09:01:00Z"
originating_notice_ref: end_of_support_notice:desktop.stable.2_1_0.approaching_window_end
scope_envelope:
  affected_category_classes:
    - extensions
    - command_or_action_schemas
  build_identity_refs:
    - exact_build:desktop.macos.universal.2_1_0
    - exact_build:desktop.linux.x86_64.2_1_0
  channel_row_refs:
    - channel.stable
  support_window_badge_refs:
    - support_window_badge:desktop.stable.general_availability.macos_universal
  scope_summary: >
    Affected categories on the desktop stable 2.1.x train approaching
    the end of its rolling support window.
category_rows:
  - row_id: compat_window_row:desktop.stable.2_1_0.extensions
    affected_category_class: extensions
    category_window_state_class: approaching_end_of_window_action_within_named_window
    category_label: "Installed extensions"
    compatibility_row_refs:
      - compat_row:extension_host_envelope
    version_skew_register_refs:
      - skew_register:extension_host_envelope
    support_window_badge_refs:
