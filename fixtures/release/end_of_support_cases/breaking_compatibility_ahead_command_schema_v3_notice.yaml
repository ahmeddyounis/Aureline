# yaml-language-server: $schema=../../../schemas/release/end_of_support_notice.schema.json
$schema: "https://aureline.dev/schemas/release/end_of_support_notice.schema.json"
__fixture__:
  name: breaking_compatibility_ahead_command_schema_v3_notice
  scenario: >
    The command-and-action schema epoch is preparing to break from
    v2 to v3 ahead of stable 3.0. The notice fires while the change
    is still in preview / beta — the change has NOT shipped as
    stable or LTS truth yet. The notice carries a calendar-window
    cutoff (the breaking change ships sometime between
    2026-09-01 and 2026-10-15), a factual what-still-works
    projection (no runtime change until the breaking change ships),
    typed risk projections (extension and helper negotiation will
    fail past the cutoff), and a safest next step gated by the
    schema to inspect-and-export-or-pause options. The notice
    points at a compatibility-window report whose export paths are
    non-empty so the breaking change is inspectable BEFORE it
    lands on stable.
  contract_sections:
    - "§3 Notice-class vocabulary"
    - "§4 Cutoff vocabulary"
    - "§5 Affected scope"
    - "§6 What still works, risk after cutoff, safest next step"
    - "§7 Required surfaces"
    - "§8 Compatibility-window report"
    - "§10 Export paths"
end_of_support_notice_schema_version: 1
record_kind: end_of_support_notice_record
notice_id: end_of_support_notice:command_action_schema.v3.breaking_change_ahead
emitted_at: "2026-04-30T09:15:00Z"
notice_class: breaking_compatibility_ahead
notice_severity_class: inspect_export_before_breaking_change_ships
headline_label: "Command and action schema v3 lands in 3.0 — inspect and export before the breaking change ships"
cutoff_target:
  cutoff_kind_class: range_calendar_window
  cutoff_at: null
  cutoff_window_starts_at: "2026-09-01T00:00:00Z"
  cutoff_window_ends_at: "2026-10-15T23:59:59Z"
  cutoff_version_label: "3.0.0"
  cutoff_release_artifact_ref: release_artifact:desktop.stable.3_0_0
  cutoff_summary: >
    Command and action schema v3 ships with stable 3.0 between
    2026-09-01 and 2026-10-15. Until then the change is inspectable
    on preview / beta builds and exportable through the companion
    compatibility-window report.
affected_scope:
  affected_scope_classes:
    - command_or_action_schemas
    - extensions
    - helpers_or_sidecars
    - sdk_or_api
  build_identity_refs:
    - exact_build:desktop.preview.macos.universal.3_0_0_pre1
    - exact_build:desktop.beta.macos.universal.3_0_0_pre1
  channel_row_refs:
    - channel.preview
    - channel.beta
    - channel.stable
    - channel.lts
  support_window_badge_refs:
    - support_window_badge:desktop.preview.experimental.macos_universal
  compatibility_row_refs:
    - compat_row:command_action_schema_envelope
    - compat_row:helper_negotiation_envelope
    - compat_row:extension_host_envelope
    - compat_row:sdk_or_api_surface
  compatibility_window_report_ref: compatibility_window_report:command_action_schema.v3.breaking_change_ahead
  scope_summary: >
    The command-and-action schema v3 epoch break narrows
    command-action schemas, extension host envelope, helper
    negotiation envelope, and the SDK / API surface across the
    preview, beta, and stable / LTS channels.
what_still_works:
  - what_still_works_class: no_runtime_change_until_breaking_change_ships
    evidence_refs: []
    what_still_works_note: >
      Nothing changes at runtime on stable or LTS until 3.0 ships.
      Preview and beta builds carry the v3 epoch behind the
      pre-release support class.
  - what_still_works_class: existing_workflows_continue_until_cutoff
    evidence_refs:
      - compat_row:command_action_schema_envelope
    what_still_works_note: >
      Workflows authored against the v2 schema continue running
      on stable 2.x until the 3.0 cutoff window opens.
  - what_still_works_class: existing_durable_state_remains_owned_by_user
    evidence_refs: []
    what_still_works_note: >
      User-authored command and action source remains owned by
      the user; the v2 source is preserved and re-exportable.
risk_after_cutoff:
  - risk_after_cutoff_class: compatibility_drift_against_supported_compatibility_rows
    evidence_refs:
      - skew_register:command_action_schema_envelope
    risk_note: >
      Command-action schema v2 rows fall out of the supported
      envelope on the 3.0 cutoff; v2-only extensions narrow.
  - risk_after_cutoff_class: helper_or_remote_agent_negotiation_will_fail
    evidence_refs:
      - skew_register:helper_negotiation_envelope
    risk_note: >
      Helper and remote-agent negotiation reject v2-only helpers
      against a v3 client once the breaking change ships.
  - risk_after_cutoff_class: extension_or_marketplace_publication_blocked
    evidence_refs:
      - extension_impact_forecast:command_action_schema.v3.affected_extensions
    risk_note: >
      Extensions that have not republished against the v3 epoch
      will be blocked from new publication after 3.0 ships.
safest_next_step:
  safest_next_step_class: export_environment_summary_then_review_compatibility_window_report
  next_step_route_ref: route.migration_helper.export_environment_summary
  migration_helper_handoff_ref: null
  compatibility_window_report_ref: compatibility_window_report:command_action_schema.v3.breaking_change_ahead
  next_step_summary: >
    Export the environment summary and review the
    compatibility-window report row-by-row before 3.0 ships.
    Inspect, export, and plan; do not migrate yet.
required_surface_set:
  - update_center_banner
  - about_panel_banner
  - compatibility_report_banner
  - migration_or_import_workflow_banner
  - release_notes_card
  - headless_dry_run_output
contract_doc_ref: docs/release/end_of_support_and_migration_contract.md
channel_matrix_ref: artifacts/release/channel_matrix.yaml
notes: >
  Breaking-compatibility-ahead posture exercised against the
  command-and-action schema v3 epoch break. Confirms the gated
  safest-next-step (inspect / export / migrate / pause only) and
  the compatibility-window report's export paths floor.
