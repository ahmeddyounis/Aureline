# yaml-language-server: $schema=../../../schemas/release/end_of_support_notice.schema.json
$schema: "https://aureline.dev/schemas/release/end_of_support_notice.schema.json"
__fixture__:
  name: past_end_of_support_security_only_window_closed_notice
  scenario: >
    A stable desktop build has crossed both the supported-feature
    cutoff and the security-only window. The notice renders the
    four floor surfaces with a factual what-still-works projection
    (read-only inspection remains safe; durable user state remains
    user-owned), typed risk projections (no security updates
    remaining; new-signed-artifact install will be blocked), and
    one safest next step that switches the install to the LTS
    train. The notice does NOT use generic fear copy; it names
    the LTS floor.
  contract_sections:
    - "§3 Notice-class vocabulary"
    - "§4 Cutoff vocabulary"
    - "§6 What still works, risk after cutoff, safest next step"
    - "§7 Required surfaces"
end_of_support_notice_schema_version: 1
record_kind: end_of_support_notice_record
notice_id: end_of_support_notice:desktop.stable.1_4_0.past_security_only_window
emitted_at: "2026-04-30T09:05:00Z"
notice_class: past_end_of_support
notice_severity_class: act_now_to_avoid_compatibility_loss
headline_label: "Stable 1.4.x past end of support — switch to the 2.0 LTS train"
cutoff_target:
  cutoff_kind_class: exact_calendar_date
  cutoff_at: "2026-03-31T23:59:59Z"
  cutoff_window_starts_at: null
  cutoff_window_ends_at: null
  cutoff_version_label: null
  cutoff_release_artifact_ref: release_artifact:desktop.stable.1_4_0
  cutoff_summary: >
    The 1.4.x stable train passed the end of its security-only
    window on 2026-03-31; no further security or feature updates
    will land on this build.
affected_scope:
  affected_scope_classes:
    - desktop_product_build
    - release_channel
  build_identity_refs:
    - exact_build:desktop.macos.universal.1_4_0
    - exact_build:desktop.windows.x86_64.1_4_0
    - exact_build:desktop.linux.x86_64.1_4_0
  channel_row_refs:
    - channel.stable
  support_window_badge_refs:
    - support_window_badge:desktop.stable.1_4_0.past_window
  compatibility_row_refs: []
  compatibility_window_report_ref: null
  scope_summary: >
    Past-end-of-support narrows the desktop stable 1.4.x carrier
    build across all three desktop OS rows.
what_still_works:
  - what_still_works_class: read_only_inspection_remains_safe
    evidence_refs: []
    what_still_works_note: >
      About panel, compatibility report, and support-export
      inspection remain safe; the build still launches and
      renders.
  - what_still_works_class: existing_durable_state_remains_owned_by_user
    evidence_refs: []
    what_still_works_note: >
      Profiles, settings, layout, and workspace state remain owned
      by the user. The cutoff does not delete state.
risk_after_cutoff:
  - risk_after_cutoff_class: no_security_updates_remaining
    evidence_refs:
      - support_policy:stable.rolling_window
    risk_note: >
      No further security updates will land on the 1.4.x train.
      Continued use accumulates risk against future advisories.
  - risk_after_cutoff_class: new_signed_artifact_install_blocked
    evidence_refs:
      - trust_framework_row:desktop.stable.signing_floor
    risk_note: >
      New signed artifacts published after the supported floor
      will refuse to install on the 1.4.x train.
  - risk_after_cutoff_class: helper_or_remote_agent_negotiation_will_fail
    evidence_refs:
      - skew_register:helper_negotiation_envelope
    risk_note: >
      Helper and remote-agent version negotiation will reject the
      1.4.x build once the helper skew window narrows past it.
safest_next_step:
  safest_next_step_class: switch_to_lts_train_or_named_floor
  next_step_route_ref: route.update_center.switch_to_lts_train
  migration_helper_handoff_ref: null
  compatibility_window_report_ref: null
  next_step_summary: >
    Switch to the 2.0 LTS train. The LTS train carries an explicit
    calendar-bounded support window with security updates through
    the published LTS end date.
required_surface_set:
  - update_center_banner
  - about_panel_banner
  - compatibility_report_banner
  - migration_or_import_workflow_banner
  - issue_report_packet
  - support_export_bundle
contract_doc_ref: docs/release/end_of_support_and_migration_contract.md
channel_matrix_ref: artifacts/release/channel_matrix.yaml
notes: >
  Past-EOS posture exercised against a build whose security-only
  window has closed. Confirms the named-LTS-floor safest-next-step
  rather than a generic "upgrade now" call to action.
