# yaml-language-server: $schema=../../../schemas/release/compatibility_window_report.schema.json
$schema: "https://aureline.dev/schemas/release/compatibility_window_report.schema.json"
__fixture__:
  name: active_deprecation_macro_replacement_named_report
  scenario: >
    Companion compatibility-window report for the active-
    deprecation notice on the legacy automation-macro family. The
    report carries a single category row whose state is
    actively_deprecated_with_replacement_named, the named
    replacement label, an extension-impact-forecast ref so the row
    is backed by typed forecast evidence, and a migration-helper
    handoff that drives the user through the named replacement.
    The handoff is migrate-via-report (no apply that mutates
    durable state on this build), so the backup requirement is the
    backup_unsupported_inspect_only_report value.
  contract_sections:
    - "§8 Compatibility-window report"
    - "§8.1 Category-window state"
    - "§8.2 Extension-impact-forecast linkage"
    - "§9 Migration-helper handoff"
    - "§10 Export paths"
compatibility_window_report_schema_version: 1
record_kind: compatibility_window_report_record
report_id: compatibility_window_report:automations.legacy_macro_family.deprecation_active
emitted_at: "2026-04-30T09:11:00Z"
originating_notice_ref: end_of_support_notice:automations.legacy_macro_family.deprecation_active
scope_envelope:
  affected_category_classes:
    - automations_or_macros
    - command_or_action_schemas
  build_identity_refs: []
  channel_row_refs:
    - channel.stable
    - channel.lts
  support_window_badge_refs:
    - support_window_badge:desktop.stable.general_availability.macos_universal
  scope_summary: >
    Legacy automation-macro family deprecated in stable 2.4.0
    with a named workflow-bundle replacement.
category_rows:
  - row_id: compat_window_row:automations.legacy_macro_family
    affected_category_class: automations_or_macros
    category_window_state_class: actively_deprecated_with_replacement_named
    category_label: "Legacy automation macros"
    compatibility_row_refs:
      - compat_row:command_action_schema_envelope
    version_skew_register_refs:
      - skew_register:command_action_schema_envelope
    support_window_badge_refs:
      - support_window_badge:desktop.stable.general_availability.macos_universal
    extension_impact_forecast_refs:
      - extension_impact_forecast:automations.legacy_macro_family.replacement_named
    named_replacement_label: "Workflow-bundle family"
    remediation_summary: >
      Migrate each legacy macro into the workflow-bundle family
      using the named row-by-row replacement table on this
      report.
  - row_id: compat_window_row:automations.command_action_schemas
    affected_category_class: command_or_action_schemas
    category_window_state_class: approaching_end_of_window_action_within_named_window
    category_label: "Command and action schemas"
    compatibility_row_refs:
      - compat_row:command_action_schema_envelope
    version_skew_register_refs:
      - skew_register:command_action_schema_envelope
    support_window_badge_refs: []
    extension_impact_forecast_refs: []
    named_replacement_label: null
    remediation_summary: >
      Command-action schema envelope narrows when the legacy
      macro family is removed; replacement schemas are part of
      the workflow-bundle family.
migration_helper_handoff:
  actions:
    - action_class: scan_environment_read_only
      action_label: "Scan environment"
      action_route_ref: route.migration_helper.scan_legacy_macros
      action_routing_kind_class: interactive_user_initiated
      mutation_class: no_mutation_inspect_only
      preview_diff_ref: null
      checkpoint_ref: null
      rollback_ref: null
      export_artifact_ref: null
      policy_ref: null
      action_summary: >
        Read-only scan of legacy automation macros and the
        command-action schema envelope they consume.
    - action_class: preview_planned_changes_dry_run
      action_label: "Preview replacement plan"
      action_route_ref: route.migration_helper.preview_legacy_macro_replacement
      action_routing_kind_class: interactive_user_initiated
      mutation_class: no_mutation_inspect_only
      preview_diff_ref: import_diff_preview:automations.legacy_macro_family.replacement
      checkpoint_ref: null
      rollback_ref: null
      export_artifact_ref: null
      policy_ref: null
      action_summary: >
        Preview the named-replacement plan row-by-row. No
        durable writes; consumes the import-diff-preview shape.
    - action_class: export_environment_summary_for_review
      action_label: "Export environment summary"
      action_route_ref: route.migration_helper.export_legacy_macros_summary
      action_routing_kind_class: support_export_only
      mutation_class: no_mutation_inspect_only
      preview_diff_ref: null
      checkpoint_ref: null
      rollback_ref: null
      export_artifact_ref: release_evidence_packet:automations.legacy_macro_family.environment_summary
      policy_ref: null
      action_summary: >
        Export the legacy-macro inventory and replacement plan
        for support review.
  backup_requirement:
    backup_requirement_class: backup_unsupported_inspect_only_report
    checkpoint_ref: null
    one_click_route_ref: null
    backup_summary: >
      The handoff omits apply on this report; the user authors
      the replacement themselves against the named workflow-
      bundle family. No durable writes from this packet.
  handoff_summary: >
    Inspect-only handoff (scan, preview, export) for active
    deprecation. The named replacement is in the report; the
    user authors the migration themselves.
export_paths:
  - export_path_class: compatibility_window_report_yaml_export
    export_artifact_ref: export_artifact:automations.legacy_macro_family.deprecation_active.yaml
    export_format_label: "YAML export"
    export_summary: >
      Reviewer-facing YAML export of the named-replacement
      row table.
  - export_path_class: release_evidence_packet_link
    export_artifact_ref: release_evidence_packet:automations.legacy_macro_family.deprecation_active
    export_format_label: "Release-evidence packet link"
    export_summary: >
      Link into the release-evidence packet that carries the
      deprecation rationale and named replacement.
contract_doc_ref: docs/release/end_of_support_and_migration_contract.md
channel_matrix_ref: artifacts/release/channel_matrix.yaml
notes: >
  Active-deprecation report with a named replacement and an
  inspect-only migration-helper handoff.
