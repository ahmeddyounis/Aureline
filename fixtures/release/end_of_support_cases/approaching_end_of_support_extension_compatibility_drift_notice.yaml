# yaml-language-server: $schema=../../../schemas/release/end_of_support_notice.schema.json
$schema: "https://aureline.dev/schemas/release/end_of_support_notice.schema.json"
__fixture__:
  name: approaching_end_of_support_extension_compatibility_drift_notice
  scenario: >
    A stable desktop build is sixty days from the end of its rolling
    support window. Extensions and command-action schemas inside the
    affected scope are starting to drift against the supported
    compatibility rows. The notice renders the four floor surfaces
    with a factual what-still-works projection (existing extensions
    keep loading until the cutoff), a typed compatibility-drift risk
    after cutoff, and exactly one safest next step that routes the
    user through the migration-helper handoff with a one-click
    checkpoint required before apply.
  contract_sections:
    - "§3 Notice-class vocabulary"
    - "§4 Cutoff vocabulary"
    - "§5 Affected scope"
    - "§6 What still works, risk after cutoff, safest next step"
    - "§7 Required surfaces"
end_of_support_notice_schema_version: 1
record_kind: end_of_support_notice_record
notice_id: end_of_support_notice:desktop.stable.2_1_0.approaching_window_end
emitted_at: "2026-04-30T09:00:00Z"
notice_class: approaching_end_of_support
notice_severity_class: plan_named_action_within_window
headline_label: "Stable 2.1.x support ends 2026-06-29 — plan migration this month"
cutoff_target:
  cutoff_kind_class: exact_calendar_date
  cutoff_at: "2026-06-29T23:59:59Z"
  cutoff_window_starts_at: null
  cutoff_window_ends_at: null
  cutoff_version_label: null
  cutoff_release_artifact_ref: release_artifact:desktop.stable.2_1_0
  cutoff_summary: >
    The 2.1.x stable train ends supported-feature updates on
    2026-06-29; security-only updates continue until 2026-12-29.
affected_scope:
  affected_scope_classes:
    - desktop_product_build
    - extensions
    - command_or_action_schemas
  build_identity_refs:
    - exact_build:desktop.macos.universal.2_1_0
    - exact_build:desktop.linux.x86_64.2_1_0
  channel_row_refs:
    - channel.stable
  support_window_badge_refs:
    - support_window_badge:desktop.stable.general_availability.macos_universal
  compatibility_row_refs:
    - compat_row:desktop_build_vs_benchmark_lab
    - compat_row:command_action_schema_envelope
  compatibility_window_report_ref: compatibility_window_report:desktop.stable.2_1_0.approaching_window_end
  scope_summary: >
    Approaching end of support narrows the desktop stable 2.1.x build
    plus the extensions and command-action schema rows that compose
    its supported envelope.
what_still_works:
  - what_still_works_class: existing_workflows_continue_until_cutoff
    evidence_refs:
      - compat_row:desktop_build_vs_benchmark_lab
    what_still_works_note: >
      Existing workflows keep running until 2026-06-29; security-only
      updates continue for six months past the cutoff.
  - what_still_works_class: existing_extensions_continue_until_cutoff
    evidence_refs:
      - compat_row:extension_host_envelope
    what_still_works_note: >
      Already-installed extensions continue loading until the named
      cutoff. New extension publication is unaffected during the
      approaching window.
  - what_still_works_class: existing_durable_state_remains_owned_by_user
    evidence_refs: []
    what_still_works_note: >
      Profiles, settings, layout, and workspace state remain owned
      by the user and untouched by the cutoff.
risk_after_cutoff:
  - risk_after_cutoff_class: compatibility_drift_against_supported_compatibility_rows
    evidence_refs:
      - skew_register:command_action_schema_envelope
    risk_note: >
      The supported compatibility envelope narrows once the rolling
      window ends; rows currently inside the window will fall to the
      best-effort or untested column without a migration.
  - risk_after_cutoff_class: security_only_updates_remaining_no_feature_updates
    evidence_refs:
      - support_policy:stable.rolling_window
    risk_note: >
      Security-only updates continue until 2026-12-29; feature
      updates have stopped on the affected build.
safest_next_step:
  safest_next_step_class: run_migration_helper_handoff_with_required_backup
  next_step_route_ref: route.update_center.run_migration_helper_handoff
  migration_helper_handoff_ref: migration_helper_handoff:desktop.stable.2_1_0.to_2_2_0
  compatibility_window_report_ref: compatibility_window_report:desktop.stable.2_1_0.approaching_window_end
  next_step_summary: >
    Run the migration-helper handoff into the 2.2.x stable train.
    The handoff scans, previews, requires a one-click checkpoint
    of durable state, applies, and exposes a rollback target.
required_surface_set:
  - update_center_banner
  - about_panel_banner
  - compatibility_report_banner
  - migration_or_import_workflow_banner
  - release_notes_card
contract_doc_ref: docs/release/end_of_support_and_migration_contract.md
channel_matrix_ref: artifacts/release/channel_matrix.yaml
notes: >
  Default approaching-EOS posture. Use as the baseline reference
  when adding new approaching-window notices that point at a
  migration-helper handoff with a one-click checkpoint.
