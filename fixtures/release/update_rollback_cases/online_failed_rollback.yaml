schema_version: 1
record_kind: update_rollback_case_record
case_id: release.update_rollback_sequence.online_failed_rollback
case_class: online_failed_rollback
scenario_summary: >
  A stable user stages and restarts into a verified update, but post-restart
  health validation fails (crash loop). The update engine triggers rollback to
  the pre-restart checkpoint, validates the restored build, and captures
  post-rollback evidence for support.

sequence_packet_ref: artifacts/release/update_rollback_sequence.yaml
variant_path_id: update_sequence.online.rollback
variant_class: online_official_feed
outcome_class: update_failed_rolled_back

evidence_refs:
  update_manifest_ref: update_manifest:stable.public.2_4_1
  update_ready_review_ref: update_ready_review:stable.2_4_1.normal_signed
  install_truth_ref: install_truth:windows.per_user.stable
  checkpoint_refs:
    - checkpoint:profile.before_2_4_1
  support_bundle_ref: support_bundle:stable.2_4_1.rollback

