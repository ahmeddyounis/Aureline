  update_ready_review_ref: update_ready_review:preview.2_7_0.side_by_side
  install_truth_ref: install_truth:macos.per_user.preview_side_by_side
  checkpoint_refs:
    - checkpoint:profile.preview.before_2_7_0
  support_bundle_ref: support_bundle:preview.2_7_0.side_by_side_success

