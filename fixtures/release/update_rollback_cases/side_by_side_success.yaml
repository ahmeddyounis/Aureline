schema_version: 1
record_kind: update_rollback_case_record
case_id: release.update_rollback_sequence.side_by_side_success
case_class: side_by_side_success
scenario_summary: >
  A user updates a side-by-side install (preview alongside stable). The sequence
  keeps channel identity and state root isolation explicit, creates a
  pre-restart checkpoint for the preview install only, restarts into the target
  preview build, and captures success evidence.

sequence_packet_ref: artifacts/release/update_rollback_sequence.yaml
variant_path_id: update_sequence.side_by_side.success
variant_class: side_by_side_channel
outcome_class: update_committed_success

