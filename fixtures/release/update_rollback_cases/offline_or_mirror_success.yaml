schema_version: 1
record_kind: update_rollback_case_record
case_id: release.update_rollback_sequence.offline_or_mirror_success
case_class: offline_or_mirror_success
scenario_summary: >
  An enterprise-managed install acquires an update via an approved mirror.
  Mirror integrity and revocation freshness are verified and disclosed before
  staging apply. The update proceeds with a pre-restart checkpoint and commits
  successfully with evidence captured.

sequence_packet_ref: artifacts/release/update_rollback_sequence.yaml
variant_path_id: update_sequence.offline_or_mirror.success
variant_class: offline_or_mirror
outcome_class: update_committed_success

evidence_refs:
  update_manifest_ref: update_manifest:stable.public.2_5_0
  update_ready_review_ref: update_ready_review:stable.2_5_0.normal_signed
  mirror_integrity_packet_ref: mirror_integrity_packet:acme.mirror.ide.2_5_0
  install_truth_ref: install_truth:macos.managed_fleet.stable
  checkpoint_refs:
    - checkpoint:profile.before_2_5_0
  support_bundle_ref: support_bundle:stable.2_5_0.mirror_success

checkpoint_hits:
