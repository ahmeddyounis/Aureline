    emitted_at: "2026-05-04T20:00:00Z"
    owner_role: update_engine
    evidence_refs:
      - update_manifest:stable.public.2_5_0
      - install_truth:macos.managed_fleet.stable

  - checkpoint_id: checkpoint.update.policy_evaluated
