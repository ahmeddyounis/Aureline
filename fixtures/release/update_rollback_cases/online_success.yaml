schema_version: 1
record_kind: update_rollback_case_record
case_id: release.update_rollback_sequence.online_success
case_class: online_success
scenario_summary: >
  A stable user receives a verified in-place update from the official feed.
  The update passes verification, a pre-restart checkpoint is created, the user
  restarts into the target build, and the update is committed with success
  evidence captured for support and release proof.

sequence_packet_ref: artifacts/release/update_rollback_sequence.yaml
variant_path_id: update_sequence.online.success
variant_class: online_official_feed
outcome_class: update_committed_success

evidence_refs:
  update_manifest_ref: update_manifest:stable.public.2_4_0
  update_ready_review_ref: update_ready_review:stable.2_4_0.normal_signed
  install_truth_ref: install_truth:macos.per_user.stable
  checkpoint_refs:
    - checkpoint:profile.before_2_4_0
  support_bundle_ref: support_bundle:stable.2_4_0.update_success

checkpoint_hits:
