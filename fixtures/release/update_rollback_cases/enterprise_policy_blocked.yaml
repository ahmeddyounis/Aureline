schema_version: 1
record_kind: update_rollback_case_record
case_id: release.update_rollback_sequence.enterprise_policy_blocked
case_class: enterprise_policy_blocked
scenario_summary: >
  An enterprise-managed install discovers an update, but policy blocks applying
  it (pinned version / approval required / offline-only). The update-ready
  review is still emitted so the user/admin can see what was blocked and why,
  but the journey stops before acquisition or mutation.

sequence_packet_ref: artifacts/release/update_rollback_sequence.yaml
variant_path_id: update_sequence.enterprise_policy.blocked
variant_class: enterprise_policy_constrained
outcome_class: update_blocked_by_policy

