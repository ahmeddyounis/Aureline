  update_manifest_ref: update_manifest:stable.public.2_5_1
  update_ready_review_ref: update_ready_review:stable.2_5_1.policy_blocked
  install_truth_ref: install_truth:windows.managed_fleet.stable
  policy_decision_ref: policy_decision:update.pinned_version
  support_bundle_ref: support_bundle:stable.2_5_1.policy_blocked

