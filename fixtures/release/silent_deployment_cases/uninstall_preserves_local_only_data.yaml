# yaml-language-server: $schema=../../../schemas/release/silent_deployment_result.schema.json
silent_deployment_result_schema_version: 1
record_kind: unattended_deployment_result_packet
packet_id: silent_deployment_case:uninstall_preserves_local_only_data
scenario_class: uninstall_preservation
scenario_summary: >
  An unattended uninstall removes the binary root and install-owned markers but
  preserves local-only user work and durable user state roots by default. The
  case records the uninstall result plus a machine-readable preservation summary
  so support does not prescribe "delete your config" as the default recovery.
install_profile_card_refs:
  - card.windows.x86_64.per_machine_installed.stable
state_root_refs:
  - state.per_user_configuration_root.stable
  - state.per_user_recovery_root.stable
managed_package_report_refs: null
expected_uninstall_behavior:
  removes:
    - binary_root
    - update_marker.stable
  preserves:
    - state.user_authored_workspace_files_outside_install_tree
    - state.per_user_configuration_root.stable
    - state.per_user_recovery_root.stable
results:
  - silent_deployment_result_schema_version: 1
    record_kind: unattended_deployment_result_record
    result_id: fixture.uninstall.windows.stable.success_preserves_user_state
    result_kind: uninstall
    result_status: success
    return_code_family: success
    return_code_numeric: 0
    install_profile_card_ref: card.windows.x86_64.per_machine_installed.stable
    failure_reason_class: null
    remediation_pointer_class: none
    redaction_class: no_secrets_present
    support_bundle_ref: null
    running_build_identity_ref: null
    policy_injection_context_ref: null
    rollback_evidence_ref: null
    fleet_ring_context_ref: null
    offline_bundle_signature_ref: null
    state_root_refs: null
    managed_package_report_ref: null
    notes: >
      Default uninstall preserves user-authored work and durable user state roots.
      Any clear-data operation is separate, class-selective, and previewable.
status: proposed

