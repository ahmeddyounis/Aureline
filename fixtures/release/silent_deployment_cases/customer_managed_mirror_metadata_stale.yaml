# yaml-language-server: $schema=../../../schemas/release/silent_deployment_result.schema.json
silent_deployment_result_schema_version: 1
record_kind: unattended_deployment_result_packet
packet_id: silent_deployment_case:customer_managed_mirror_metadata_stale
scenario_class: customer_managed_mirror
scenario_summary: >
  An unattended install from a customer-managed mirror fails because mirror
  metadata is stale. The result record resolves into the network_transport family
  and points to the mirror-metadata durable state-root id so fleet tooling can
  reconcile freshness without parsing platform installer output.
install_profile_card_refs:
  - card.linux.x86_64.customer_managed_mirror.stable
state_root_refs:
  - state.offline_bundle_mirror_metadata_root.stable
managed_package_report_refs:
  - fixture.managed_package_report.linux.customer_managed_mirror.stable.seed
results:
  - silent_deployment_result_schema_version: 1
    record_kind: unattended_deployment_result_record
    result_id: fixture.mirror.linux.install.mirror_metadata_stale
    result_kind: install
    result_status: failed
    return_code_family: network_transport
    return_code_numeric: 6
    install_profile_card_ref: card.linux.x86_64.customer_managed_mirror.stable
    failure_reason_class: mirror_metadata_stale
    remediation_pointer_class: refresh_mirror_metadata
    redaction_class: no_secrets_present
    support_bundle_ref: null
    running_build_identity_ref: null
    policy_injection_context_ref: null
    rollback_evidence_ref: null
    fleet_ring_context_ref: null
    offline_bundle_signature_ref: null
    state_root_refs:
      - state.offline_bundle_mirror_metadata_root.stable
    managed_package_report_ref: fixture.managed_package_report.linux.customer_managed_mirror.stable.seed
    notes: >
      The mirror metadata root is the stable join key for diagnosing stale mirror
      state. The result record does not embed filesystem paths.
status: proposed

