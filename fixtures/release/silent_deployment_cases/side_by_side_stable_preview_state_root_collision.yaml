# yaml-language-server: $schema=../../../schemas/release/silent_deployment_result.schema.json
silent_deployment_result_schema_version: 1
record_kind: unattended_deployment_result_packet
packet_id: silent_deployment_case:side_by_side_stable_preview_state_root_collision
scenario_class: side_by_side_stable_preview
scenario_summary: >
  A side-by-side Stable + Preview desktop host attempts an unattended Preview
  update. The updater detects a collision with a Stable-owned durable state root
  and fails closed. The emitted result record references the Preview install
  profile card and cites the colliding stable+preview state-root ids so support
  and fleet tooling can diagnose without reading installer logs.
install_profile_card_refs:
  - card.windows.x86_64.side_by_side_preview.preview
  - card.windows.x86_64.per_machine_installed.stable
state_root_refs:
  - state.per_user_configuration_root.preview
  - state.per_user_configuration_root.stable
managed_package_report_refs: null
results:
  - silent_deployment_result_schema_version: 1
    record_kind: unattended_deployment_result_record
    result_id: fixture.side_by_side.windows.preview.update.state_root_collision
    result_kind: update
    result_status: failed
    return_code_family: internal_failure
    return_code_numeric: 7
    install_profile_card_ref: card.windows.x86_64.side_by_side_preview.preview
    failure_reason_class: state_root_collision
    remediation_pointer_class: inspect_support_bundle
    redaction_class: secrets_redacted_before_emit
    support_bundle_ref: reserved
    running_build_identity_ref: null
    policy_injection_context_ref: null
    rollback_evidence_ref: null
    fleet_ring_context_ref: null
    offline_bundle_signature_ref: null
    state_root_refs:
      - state.per_user_configuration_root.preview
      - state.per_user_configuration_root.stable
    managed_package_report_ref: null
    notes: >
      The Preview updater attempted to touch a Stable-owned durable state root.
      The collision was detected before mutation completed and the operation
      failed closed.
status: proposed

