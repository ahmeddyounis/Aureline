# yaml-language-server: $schema=../../../schemas/release/silent_deployment_result.schema.json
silent_deployment_result_schema_version: 1
record_kind: unattended_deployment_result_packet
packet_id: silent_deployment_case:portable_install_spill_blocked
scenario_class: portable_spill_detected
scenario_summary: >
  A portable install is extracted next to an existing installed Stable row.
  During unattended install, portable-mode detection finds a spill into an
  installed-channel state root (for example a machine-global update-marker or a
  per-user stable configuration write). The portable install fails closed and
  cites the installed-channel state-root ids that would have been corrupted.
install_profile_card_refs:
  - card.windows.x86_64.portable.portable_stable
  - card.windows.x86_64.per_user_installed.stable
state_root_refs:
  - state.portable_colocated_root.portable_stable
  - state.per_user_configuration_root.stable
managed_package_report_refs: null
results:
  - silent_deployment_result_schema_version: 1
    record_kind: unattended_deployment_result_record
    result_id: fixture.portable.windows.install.portable_spill_detected
    result_kind: install
    result_status: failed
    return_code_family: internal_failure
    return_code_numeric: 7
    install_profile_card_ref: card.windows.x86_64.portable.portable_stable
    failure_reason_class: portable_spill_detected
    remediation_pointer_class: reinstall_from_clean_state
    redaction_class: secrets_redacted_before_emit
    support_bundle_ref: reserved
    running_build_identity_ref: null
    policy_injection_context_ref: null
    rollback_evidence_ref: null
    fleet_ring_context_ref: null
    offline_bundle_signature_ref: null
    state_root_refs:
      - state.portable_colocated_root.portable_stable
      - state.per_user_configuration_root.stable
    managed_package_report_ref: null
    notes: >
      Portable mode MUST NOT mutate installed-channel durable state. When a spill
      is detected, the portable install fails closed instead of silently
      corrupting Stable.
status: proposed

