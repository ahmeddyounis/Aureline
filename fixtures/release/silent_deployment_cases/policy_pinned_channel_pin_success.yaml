# yaml-language-server: $schema=../../../schemas/release/silent_deployment_result.schema.json
silent_deployment_result_schema_version: 1
record_kind: unattended_deployment_result_packet
packet_id: silent_deployment_case:policy_pinned_channel_pin_success
scenario_class: policy_pinned_lane
scenario_summary: >
  A managed/fleet Stable install applies an admin-enforced channel pin. The
  silent pin operation emits a structured success record and links to the managed
  package report id so fleet tooling can correlate the policy-controlled pin to
  the installed package inventory without parsing logs.
install_profile_card_refs:
  - card.windows.x86_64.managed_deployed.stable
state_root_refs:
  - state.per_machine_admin_policy_root.stable
managed_package_report_refs:
  - fixture.managed_package_report.windows.managed_deployed.stable.seed
results:
  - silent_deployment_result_schema_version: 1
    record_kind: unattended_deployment_result_record
    result_id: fixture.policy.windows.pin.stable.success
    result_kind: pin
    result_status: success
    return_code_family: success
    return_code_numeric: 0
    install_profile_card_ref: card.windows.x86_64.managed_deployed.stable
    failure_reason_class: null
    remediation_pointer_class: none
    redaction_class: no_secrets_present
    support_bundle_ref: null
    running_build_identity_ref: null
    policy_injection_context_ref: null
    rollback_evidence_ref: null
    fleet_ring_context_ref: null
    offline_bundle_signature_ref: null
    state_root_refs: null
    managed_package_report_ref: fixture.managed_package_report.windows.managed_deployed.stable.seed
    notes: >
      The pin operation is policy-controlled by the install-profile card's policy
      injection class and the admin policy root; the result record remains
      channel-agnostic and carries its install-profile card ref.
status: proposed

