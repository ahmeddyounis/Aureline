# yaml-language-server: $schema=../../../schemas/release/silent_deployment_result.schema.json
silent_deployment_result_schema_version: 1
record_kind: unattended_deployment_result_packet
packet_id: silent_deployment_case:blocked_rollback_by_policy
scenario_class: blocked_rollback
scenario_summary: >
  A managed/fleet Stable install attempts an unattended rollback but admin policy
  blocks the rollback action. The rollback result is machine-readable and
  resolves into the trust_policy_denial family with a closed remediation pointer.
install_profile_card_refs:
  - card.windows.x86_64.managed_deployed.stable
state_root_refs:
  - state.per_machine_admin_policy_root.stable
managed_package_report_refs:
  - fixture.managed_package_report.windows.managed_deployed.stable.seed
results:
  - silent_deployment_result_schema_version: 1
    record_kind: unattended_deployment_result_record
    result_id: fixture.policy.windows.rollback.blocked
    result_kind: rollback
    result_status: failed
    return_code_family: trust_policy_denial
    return_code_numeric: 4
    install_profile_card_ref: card.windows.x86_64.managed_deployed.stable
    failure_reason_class: policy_denied
    remediation_pointer_class: contact_admin
    redaction_class: secrets_redacted_before_emit
    support_bundle_ref: null
    running_build_identity_ref: null
    policy_injection_context_ref: reserved
    rollback_evidence_ref: null
    fleet_ring_context_ref: null
    offline_bundle_signature_ref: null
    state_root_refs: null
    managed_package_report_ref: fixture.managed_package_report.windows.managed_deployed.stable.seed
    notes: >
      Rollback is a managed operation under policy authority. When policy blocks
      the rollback action, the result record surfaces policy denial rather than
      generic failure prose.
status: proposed

