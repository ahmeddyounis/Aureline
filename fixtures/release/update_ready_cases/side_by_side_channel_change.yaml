schema_version: 1
record_kind: update_ready_case_record
case_id: release.update_ready.side_by_side_channel_change
case_class: side_by_side_channel_change
scenario_summary: >
  A stable user stages a Preview build side by side. The review keeps
  stable and preview state roots separate, names handler ownership, and
  downgrades extension claim language because one row is uncertified for
  the Preview channel.
schema_refs:
  update_ready_review: schemas/release/update_ready_review.schema.json
  extension_impact_forecast: schemas/release/extension_impact_forecast.schema.json

