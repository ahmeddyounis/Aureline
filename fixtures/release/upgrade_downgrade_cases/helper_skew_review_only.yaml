schema_version: 1
record_kind: upgrade_downgrade_case_record
case_id: release.helper_skew.review_only
case_class: helper_skew
scenario_summary: >
  A preview client attaches to a remote agent inside the adjacent
  support window, but the agent lacks one mutating capability the client
  expects. Negotiation narrows to review-only and records the dropped
  capability instead of surfacing a generic attach failure.
schema_refs:
  helper_negotiation: schemas/release/helper_version_negotiation.schema.json

helper_negotiation:
  helper_version_negotiation_schema_version: 1
  record_kind: helper_version_negotiation_packet_record
  packet_id: helper_negotiation:preview.attach.review_only
  emitted_at: "2026-04-23T19:10:00Z"
  surface_class: attach_preflight
  operation_class: attach
  client:
    participant_id: participant:desktop.preview.2026-04
    role: client
    component_family: desktop_client
    version: 1.5.0-preview
    contract_version: client@2026-04-preview
    schema_epoch: attach_schema@2026-04
    min_supported_version: client@2026-03
    max_tested_version: client@2026-04
    build_identity_ref: exact_build:ide_binary.preview.2026-04
    artifact_digest_ref: cas:preview/ide/2026-04
    signature_ref: signature:preview.2026-04.ide
    capability_set:
      - file_attach
      - review_only_attach
      - mutating_attach
      - task_event_stream_v2
  helper_or_agent:
    participant_id: participant:remote_agent.stable.2026-03
    role: remote_agent
    component_family: remote_agent
    version: 1.3.2
    contract_version: agent@2026-03
    schema_epoch: attach_schema@2026-03
    min_supported_version: agent@2026-03
    max_tested_version: agent@2026-04
    build_identity_ref: exact_build:remote_agent.2026-03
    artifact_digest_ref: cas:agent/2026-03
    signature_ref: signature:release.2026-03.agent
    capability_set:
      - file_attach
      - review_only_attach
      - task_event_stream_v1
  preflight_gate:
    checked_before_upgrade: false
    checked_before_attach: true
    checked_before_side_by_side_reuse: false
    checked_before_rollback: false
    policy_epoch_ref: policy_epoch:preview.attach.default
    update_manifest_ref: null
    mixed_version_envelope_ref: mixed_version_envelope:desktop_cli_and_remote_agent.partial_feature_narrowing.0004
    skew_window_ref: skew_window:desktop_cli_and_remote_agent.declared_adjacent_window
    version_skew_register_ref: skew_register:remote.attach_envelope_and_drift
    compatibility_row_ref: compat_row:remote.attach_envelope_and_drift
  negotiation:
    version_window_state: compatible_degraded
    decision_class: allow_degraded_review_only
    unsupported_behavior_class: degrade_review_only
    selected_contract_version: agent@2026-03
    required_capabilities:
      - file_attach
      - review_only_attach
    offered_capabilities:
      - file_attach
      - review_only_attach
      - task_event_stream_v1
    negotiated_capabilities:
      - file_attach
      - review_only_attach
    dropped_capabilities:
      - capability: mutating_attach
        reason_class: not_in_helper_set
        reason_note: The agent does not implement mutating attach for this client contract.
      - capability: task_event_stream_v2
        reason_class: outside_support_window
        reason_note: The agent only offers the older task event stream inside the declared window.
    visible_reason: Attach continues in review-only mode; mutating paths are disabled until the agent is upgraded.
  evidence_links:
    update_manifest_ref: null
    exact_build_identity_refs:
      - exact_build:ide_binary.preview.2026-04
      - exact_build:remote_agent.2026-03
    signature_refs:
      - signature:preview.2026-04.ide
      - signature:release.2026-03.agent
    platform_trust_refs: []
    migration_journal_refs: []
    backup_snapshot_refs: []
    repair_transaction_refs: []
    support_packet_refs:
      - support_packet:helper_skew.review_only
  support_export:
    support_packet_family_refs:
      - compatibility_report
      - object_issue_handoff
    redaction_class: support_export_only
    reconstruction_summary: Support sees an explicit degraded capability subset instead of ambiguous attach failure.
  notes: Helper skew case narrows to review-only.

expected_result:
  attach_state: degraded_review_only
  helper_decision: allow_degraded_review_only
  release_summary: >
    Compatibility wording may claim review-only attach in this skew
    case, but must not claim full mutation parity.
