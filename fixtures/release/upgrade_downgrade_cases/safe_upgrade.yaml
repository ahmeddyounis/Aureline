schema_version: 1
record_kind: upgrade_downgrade_case_record
case_id: release.update.safe_upgrade.verified_staged
case_class: safe_upgrade
scenario_summary: >
  A stable user receives a staged update from the official feed. The
  manifest names the desktop artifact, docs pack, release evidence
  packet, signatures, platform trust refs, backup snapshot, migration
  journal, rollback target, and helper negotiation packet. The upgrade
  is automatic because every preflight check passed.
schema_refs:
  update_manifest: schemas/release/update_manifest.schema.json
  helper_negotiation: schemas/release/helper_version_negotiation.schema.json

