schema_version: 1
record_kind: release_status_surface_case
case_id: release.status.revoked_yanked_artifact
case_class: revoked_yanked_artifact
scenario_summary: >
  A previously promoted stable artifact has a trust-affecting revocation
  for update metadata and a registry/marketplace package yank for future
  installs. The status surface keeps revoke and yank as separate verbs,
  names affected state surfaces, preserves history, and links recovery
  to repin and replacement guidance.
schema_refs:
  release_candidate_card: schemas/release/release_candidate_card.schema.json
  promotion_timeline_entry: schemas/release/promotion_timeline_entry.schema.json
  rollback_revocation_panel: schemas/release/rollback_revocation_panel.schema.json

