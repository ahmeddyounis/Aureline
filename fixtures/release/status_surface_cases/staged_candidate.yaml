schema_version: 1
record_kind: release_status_surface_case
case_id: release.status.staged_candidate
case_class: staged_candidate
scenario_summary: >
  A stable candidate is signed and staged, but compatibility evidence is
  stale for one claimed profile. The card keeps the blocker, waiver
  absence, provenance links, next gate, and repin recovery path visible
  before the stable channel can widen.
schema_refs:
  release_candidate_card: schemas/release/release_candidate_card.schema.json
  promotion_timeline_entry: schemas/release/promotion_timeline_entry.schema.json
  rollback_revocation_panel: schemas/release/rollback_revocation_panel.schema.json

