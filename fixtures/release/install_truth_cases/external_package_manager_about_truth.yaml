schema_version: 1
record_kind: install_truth_record
install_truth_id: install_truth:card.macos.universal_binary.external_package_manager.stable
install_profile_card_ref: card.macos.universal_binary.external_package_manager.stable
channel_identity_ref: channel_identity.stable

scenario_summary: >
  A user installs the Stable channel on macOS through an external
  package manager. The install-truth record carries
  updater_owner_class external_package_manager so Update Center MUST
  NOT offer an in-product binary-replacement update path; rollback is
  delegated to the package manager and is recorded as unsupported by
  the in-product rollback affordance. State roots remain isolated to
  the Stable channel.

install_mode_class: per_user_installed
channel_class: stable
platform_class: macos
architecture_class: universal_binary
updater_owner_class: external_package_manager
binary_root_class: external_package_manager_owned_area
binary_root_ref: binary_root:external_package_manager_owned_area_macos_stable

durable_state_root_refs:
  - state_root_ref: state.per_user_configuration_root.stable
    state_root_locality_class: per_user_only
    state_root_ownership_class: single_channel_owned
  - state_root_ref: state.per_user_recovery_root.stable
    state_root_locality_class: per_user_only
    state_root_ownership_class: single_channel_owned
  - state_root_ref: state.per_user_derived_cache_root.stable
    state_root_locality_class: per_user_only
    state_root_ownership_class: single_channel_owned
  - state_root_ref: state.per_user_keychain_or_secret_store.stable
    state_root_locality_class: per_user_only
    state_root_ownership_class: single_channel_owned

side_by_side_relation_class: none
rollback_target_class: unsupported
rollback_target_ref: null

file_association_owner:
  registration_class: user_or_admin_selectable_candidate_handler
  default_handler_selection_rule: user_or_admin_selectable_never_last_writer_wins
  owner_channel_class: stable
  collision_disclosure: >
    The package manager-owned install registers candidate handlers;
    default handler selection remains user- or admin-controlled.

protocol_handler_owner:
  ownership_class: per_channel_suffixed_scheme
  scheme_placeholder: aureline-stable
  shared_scheme_resolution_rule: user_or_admin_selected_default

diagnostics_path_refs:
  - install_topology_record_available
  - exact_build_manifest_available
  - state_root_audit_available

support_bundle_inclusion_class: installed_diagnostics_included
update_marker_ref: update_marker.stable
update_marker_ownership_class: external_package_manager_owned
running_build_identity_ref: null

portable_mode_active: false
portable_mode_limitation_refs: []

channel_ownership_audit_refs: []

surface_projections:
  - surface: launcher
    required_field_refs:
      - install_mode_class
      - channel_class
      - binary_root_class
      - side_by_side_relation_class
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: about
    required_field_refs:
      - install_mode_class
      - channel_class
      - updater_owner_class
      - binary_root_class
      - durable_state_roots
      - side_by_side_relation_class
      - rollback_target_class
      - file_association_ownership
      - protocol_handler_ownership
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#the-install_truth_record-projection
  - surface: update_center
    required_field_refs:
      - channel_class
      - updater_owner_class
      - rollback_target_class
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
    notes: >
      Update Center MUST NOT offer an in-product binary-replacement
      affordance for rows whose updater_owner_class is
      external_package_manager. Update guidance MUST cite the package
      manager's update path.
  - surface: diagnostics_center
    required_field_refs:
      - install_mode_class
      - channel_class
      - binary_root_class
      - durable_state_roots
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: support_bundle
    required_field_refs:
      - install_mode_class
      - channel_class
      - updater_owner_class
      - binary_root_class
      - durable_state_roots
      - rollback_target_class
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections

audit_gate_results:
  record_resolves_to_one_install_profile_card: pass
  channel_identity_pinned: pass
  state_roots_resolve_into_state_root_map: pass
  no_silent_handler_capture: pass
  updater_owner_governs_update_surface: pass
  rollback_target_matches_ring: pass
  diagnostics_minimum: pass
  portable_record_carries_limitation_refs: not_applicable
  side_by_side_record_carries_audit_refs: not_applicable
  running_build_identity_slot_reserved: pass
  no_milestone_or_planning_id_in_user_visible_text: pass

evidence_refs:
  - artifacts/release/install_topology_matrix.yaml#card.macos.universal_binary.external_package_manager.stable
  - artifacts/release/channel_identity_and_state_roots.yaml#channel_identity.stable
  - fixtures/release/install_matrix_cases/linux_package_manager_channel_identity.yaml
status: proposed
