schema_version: 1
record_kind: install_truth_record
install_truth_id: install_truth:card.air_gap_bundle_target.platform_native_any.offline_bundle.stable
install_profile_card_ref: card.air_gap_bundle_target.platform_native_any.offline_bundle.stable
channel_identity_ref: channel_identity.stable

scenario_summary: >
  An admin deploys a signed offline bundle of the Stable channel into
  an air-gapped target. The install-truth record carries the offline-
  bundle mirror metadata state root, exposes mirror-integrity
  diagnostics, and pins admin-owned updater plus per-channel admin-
  policy update marker so About, Update Center, Installer Summary,
  Silent Deployment Summary, Diagnostics Center, and Support Bundle
  all read one truth.

install_mode_class: offline_bundle
channel_class: stable
platform_class: air_gap_bundle_target
architecture_class: platform_native_any
updater_owner_class: admin
binary_root_class: offline_bundle_extracted_program_area
binary_root_ref: binary_root:offline_bundle_extracted_program_area_stable

durable_state_root_refs:
  - state_root_ref: state.per_user_configuration_root.stable
    state_root_locality_class: per_user_only
    state_root_ownership_class: single_channel_owned
  - state_root_ref: state.per_user_recovery_root.stable
    state_root_locality_class: per_user_only
    state_root_ownership_class: single_channel_owned
  - state_root_ref: state.per_user_derived_cache_root.stable
    state_root_locality_class: per_user_only
    state_root_ownership_class: single_channel_owned
  - state_root_ref: state.per_machine_shared_data_root.stable
    state_root_locality_class: per_machine_shared
    state_root_ownership_class: single_channel_owned
  - state_root_ref: state.per_machine_admin_policy_root.stable
    state_root_locality_class: per_machine_shared
    state_root_ownership_class: single_channel_owned
  - state_root_ref: state.offline_bundle_mirror_metadata_root.stable
    state_root_locality_class: offline_bundle_local
    state_root_ownership_class: single_channel_owned

side_by_side_relation_class: none
rollback_target_class: previous_build_same_channel
rollback_target_ref: rollback:offline_bundle_previous_build_same_channel

file_association_owner:
  registration_class: user_or_admin_selectable_candidate_handler
  default_handler_selection_rule: user_or_admin_selectable_never_last_writer_wins
  owner_channel_class: stable
  collision_disclosure: >
    Offline-bundle Stable registers candidate file-association
    handlers; default handler selection remains user- or admin-
    controlled per host policy.

protocol_handler_owner:
  ownership_class: per_channel_suffixed_scheme
  scheme_placeholder: aureline-stable
  shared_scheme_resolution_rule: user_or_admin_selected_default

diagnostics_path_refs:
  - install_topology_record_available
  - exact_build_manifest_available
  - state_root_audit_available
  - support_bundle_available
  - rollback_evidence_available

support_bundle_inclusion_class: offline_bundle_mirror_metadata_included
update_marker_ref: update_marker.stable
update_marker_ownership_class: per_channel_under_admin_policy_root
running_build_identity_ref: null

portable_mode_active: false
portable_mode_limitation_refs: []

channel_ownership_audit_refs: []

surface_projections:
  - surface: launcher
    required_field_refs:
      - install_mode_class
      - channel_class
      - binary_root_class
      - side_by_side_relation_class
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: about
    required_field_refs:
      - install_mode_class
      - channel_class
      - updater_owner_class
      - binary_root_class
      - durable_state_roots
      - side_by_side_relation_class
      - rollback_target_class
      - file_association_ownership
      - protocol_handler_ownership
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#the-install_truth_record-projection
  - surface: installer_summary
    required_field_refs:
      - install_mode_class
      - channel_class
      - binary_root_class
      - durable_state_roots
      - file_association_ownership
      - protocol_handler_ownership
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: silent_deployment_summary
    required_field_refs:
      - install_mode_class
      - channel_class
      - updater_owner_class
      - binary_root_class
      - durable_state_roots
      - rollback_target_class
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: update_center
    required_field_refs:
      - channel_class
      - updater_owner_class
      - rollback_target_class
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: diagnostics_center
    required_field_refs:
      - install_mode_class
      - channel_class
      - binary_root_class
      - durable_state_roots
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: support_bundle
    required_field_refs:
      - install_mode_class
      - channel_class
      - updater_owner_class
      - binary_root_class
      - durable_state_roots
      - rollback_target_class
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections

audit_gate_results:
  record_resolves_to_one_install_profile_card: pass
  channel_identity_pinned: pass
  state_roots_resolve_into_state_root_map: pass
  no_silent_handler_capture: pass
  updater_owner_governs_update_surface: pass
  rollback_target_matches_ring: pass
  diagnostics_minimum: pass
  portable_record_carries_limitation_refs: not_applicable
  side_by_side_record_carries_audit_refs: not_applicable
  running_build_identity_slot_reserved: pass
  no_milestone_or_planning_id_in_user_visible_text: pass

evidence_refs:
  - artifacts/release/install_topology_matrix.yaml#card.air_gap_bundle_target.platform_native_any.offline_bundle.stable
  - artifacts/release/channel_identity_and_state_roots.yaml#channel_identity.stable
  - artifacts/release/state_root_map.yaml
status: proposed
