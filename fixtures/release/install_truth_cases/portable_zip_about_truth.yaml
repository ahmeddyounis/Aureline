schema_version: 1
record_kind: install_truth_record
install_truth_id: install_truth:card.linux.x86_64.portable.portable_stable
install_profile_card_ref: card.linux.x86_64.portable.portable_stable
channel_identity_ref: channel_identity.portable_stable

scenario_summary: >
  A user runs the portable Stable archive next to an installed Stable
  channel on Linux. The portable record cites every limitation row from
  portable_mode_limitations.yaml and projects About, Diagnostics, and
  the support reply template with portable-only diagnostics scope.
  Update Center discloses that the updater is user-owned and that the
  portable copy does not consume any installed channel's update marker.

install_mode_class: portable
channel_class: portable_stable
platform_class: linux
architecture_class: x86_64
updater_owner_class: user
binary_root_class: portable_directory
binary_root_ref: binary_root:portable_directory_portable_stable

durable_state_root_refs:
  - state_root_ref: state.portable_colocated_root.portable_stable
    state_root_locality_class: portable_colocated
    state_root_ownership_class: single_channel_owned

side_by_side_relation_class: installed_and_portable
rollback_target_class: previous_build_same_channel
rollback_target_ref: rollback:portable_extract_replace_self_contained

file_association_owner:
  registration_class: not_registered
  default_handler_selection_rule: not_applicable
  owner_channel_class: null
  collision_disclosure: >
    Portable mode does not register file associations. Installed
    channels keep any user- or admin-selected default handler.

protocol_handler_owner:
  ownership_class: not_registered
  scheme_placeholder: not_applicable
  shared_scheme_resolution_rule: not_applicable

diagnostics_path_refs:
  - install_topology_record_available
  - exact_build_manifest_available
  - state_root_audit_available

support_bundle_inclusion_class: portable_root_only_diagnostics_included
update_marker_ref: update_marker.portable_stable
update_marker_ownership_class: per_channel_under_portable_root
running_build_identity_ref: null

portable_mode_active: true
portable_mode_limitation_refs:
  - portable_limitation:file_association_registration
  - portable_limitation:protocol_handler_registration
  - portable_limitation:service_install
  - portable_limitation:shell_hook_install
  - portable_limitation:machine_global_credential_store_write
  - portable_limitation:machine_global_recent_item_write
  - portable_limitation:machine_global_update_marker
  - portable_limitation:system_wide_path_mutation
  - portable_limitation:autostart_hook_install
  - portable_limitation:kernel_extension_or_privileged_helper_install

channel_ownership_audit_refs:
  - channel_ownership_audit:installed_and_portable
  - channel_ownership_audit:three_channel_matrix
  - channel_ownership_audit:managed_and_portable

surface_projections:
  - surface: launcher
    required_field_refs:
      - install_mode_class
      - channel_class
      - binary_root_class
      - side_by_side_relation_class
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: about
    required_field_refs:
      - install_mode_class
      - channel_class
      - updater_owner_class
      - binary_root_class
      - durable_state_roots
      - side_by_side_relation_class
      - rollback_target_class
      - file_association_ownership
      - protocol_handler_ownership
      - portable_mode_restrictions
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#the-install_truth_record-projection
  - surface: update_center
    required_field_refs:
      - channel_class
      - updater_owner_class
      - rollback_target_class
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: diagnostics_center
    required_field_refs:
      - install_mode_class
      - channel_class
      - binary_root_class
      - durable_state_roots
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: support_bundle
    required_field_refs:
      - install_mode_class
      - channel_class
      - updater_owner_class
      - binary_root_class
      - durable_state_roots
      - rollback_target_class
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections

audit_gate_results:
  record_resolves_to_one_install_profile_card: pass
  channel_identity_pinned: pass
  state_roots_resolve_into_state_root_map: pass
  no_silent_handler_capture: pass
  updater_owner_governs_update_surface: pass
  rollback_target_matches_ring: pass
  diagnostics_minimum: pass
  portable_record_carries_limitation_refs: pass
  side_by_side_record_carries_audit_refs: pass
  running_build_identity_slot_reserved: pass
  no_milestone_or_planning_id_in_user_visible_text: pass

evidence_refs:
  - artifacts/release/install_topology_matrix.yaml#card.linux.x86_64.portable.portable_stable
  - artifacts/release/channel_identity_and_state_roots.yaml#channel_identity.portable_stable
  - artifacts/release/state_root_map.yaml#state.portable_colocated_root.portable_stable
  - artifacts/release/portable_mode_limitations.yaml
  - artifacts/release/channel_ownership_audit.yaml#channel_ownership_audit:installed_and_portable
  - fixtures/release/install_matrix_cases/portable_zip_no_host_mutation.yaml
  - fixtures/release/install_rows/portable_stable_profile_card.json
status: proposed
