schema_version: 1
record_kind: install_truth_record
install_truth_id: install_truth:card.windows.x86_64.per_machine_installed.lts
install_profile_card_ref: card.windows.x86_64.per_machine_installed.lts
channel_identity_ref: channel_identity.lts

scenario_summary: >
  An admin runs the long-support per-machine install of Aureline on
  Windows. The Update Center shows the admin as updater owner and the
  rollback target as the channel long-support floor. File-association
  default selection is admin-only and update markers live under the
  admin policy root. Diagnostics include rollback evidence as a
  support-bundle export.

install_mode_class: per_machine_installed
channel_class: lts
platform_class: windows
architecture_class: x86_64
updater_owner_class: admin
binary_root_class: per_machine_program_area
binary_root_ref: binary_root:per_machine_program_area_lts

durable_state_root_refs:
  - state_root_ref: state.per_user_configuration_root.lts
    state_root_locality_class: per_user_only
    state_root_ownership_class: single_channel_owned
  - state_root_ref: state.per_user_recovery_root.lts
    state_root_locality_class: per_user_only
    state_root_ownership_class: single_channel_owned
  - state_root_ref: state.per_user_derived_cache_root.lts
    state_root_locality_class: per_user_only
    state_root_ownership_class: single_channel_owned
  - state_root_ref: state.per_machine_shared_data_root.lts
    state_root_locality_class: per_machine_shared
    state_root_ownership_class: single_channel_owned
  - state_root_ref: state.per_machine_admin_policy_root.lts
    state_root_locality_class: per_machine_shared
    state_root_ownership_class: single_channel_owned

side_by_side_relation_class: stable_and_lts
rollback_target_class: channel_lts_floor
rollback_target_ref: rollback:channel_lts_floor_admin_pin

file_association_owner:
  registration_class: admin_only_default_handler
  default_handler_selection_rule: admin_only
  owner_channel_class: lts
  collision_disclosure: >
    Long-support file-association default is admin-selectable only.
    Stable on the same host registers candidate handlers under its
    own channel; long-support default selection does not change
    silently when Stable is installed or removed.

protocol_handler_owner:
  ownership_class: per_channel_suffixed_scheme
  scheme_placeholder: aureline-lts
  shared_scheme_resolution_rule: user_or_admin_selected_default

diagnostics_path_refs:
  - install_topology_record_available
  - exact_build_manifest_available
  - state_root_audit_available
  - support_bundle_available
  - rollback_evidence_available

support_bundle_inclusion_class: managed_admin_console_only
update_marker_ref: update_marker.lts
update_marker_ownership_class: per_channel_under_admin_policy_root
running_build_identity_ref: null

portable_mode_active: false
portable_mode_limitation_refs: []

channel_ownership_audit_refs:
  - channel_ownership_audit:stable_and_lts

surface_projections:
  - surface: launcher
    required_field_refs:
      - install_mode_class
      - channel_class
      - binary_root_class
      - side_by_side_relation_class
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: about
    required_field_refs:
      - install_mode_class
      - channel_class
      - updater_owner_class
      - binary_root_class
      - durable_state_roots
      - side_by_side_relation_class
      - rollback_target_class
      - file_association_ownership
      - protocol_handler_ownership
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#the-install_truth_record-projection
  - surface: update_center
    required_field_refs:
      - channel_class
      - updater_owner_class
      - rollback_target_class
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: diagnostics_center
    required_field_refs:
      - install_mode_class
      - channel_class
      - binary_root_class
      - durable_state_roots
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: support_bundle
    required_field_refs:
      - install_mode_class
      - channel_class
      - updater_owner_class
      - binary_root_class
      - durable_state_roots
      - rollback_target_class
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections
  - surface: silent_deployment_summary
    required_field_refs:
      - install_mode_class
      - channel_class
      - updater_owner_class
      - binary_root_class
      - durable_state_roots
      - rollback_target_class
      - diagnostics_export_actions
    wording_source_ref: artifacts/release/install_update_about_truth_packet.md#required-surface-projections

audit_gate_results:
  record_resolves_to_one_install_profile_card: pass
  channel_identity_pinned: pass
  state_roots_resolve_into_state_root_map: pass
  no_silent_handler_capture: pass
  updater_owner_governs_update_surface: pass
  rollback_target_matches_ring: pass
  diagnostics_minimum: pass
  portable_record_carries_limitation_refs: not_applicable
  side_by_side_record_carries_audit_refs: pass
  running_build_identity_slot_reserved: pass
  no_milestone_or_planning_id_in_user_visible_text: pass

evidence_refs:
  - artifacts/release/install_topology_matrix.yaml#card.windows.x86_64.per_machine_installed.lts
  - artifacts/release/channel_identity_and_state_roots.yaml#channel_identity.lts
  - artifacts/release/channel_ownership_audit.yaml#channel_ownership_audit:stable_and_lts
status: proposed
