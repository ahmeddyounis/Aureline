schema_version: 1
record_kind: ring_rollout_fixture_manifest
canonical_packet_ref: artifacts/release/m3/ring_rollout/packet.json
canonical_silent_results_ref: artifacts/release/m3/ring_rollout/silent_deployment_results.json
canonical_state_root_audit_ref: artifacts/release/m3/state_root_audit.md
canonical_support_projection_ref: artifacts/release/m3/ring_rollout/support_export_projection.json
validator_ref: tools/ci/m3/ring_rollout
failure_drill_mutations:
  - mutation_id: ring_vocabulary_diverges
    target_ref: artifacts/release/m3/ring_rollout/packet.json#lanes
    expected_finding: ring_rollout.lane.ring_vocabulary
    summary: Managed and self-serve lane rows must keep the same canary, pilot, broad, and lts vocabulary.
  - mutation_id: prior_package_hidden_after_promotion
    target_ref: artifacts/release/m3/ring_rollout/packet.json#rollout.action.managed.beta.promote_canary_to_pilot
    expected_finding: ring_rollout.action.prior_visibility_after_missing
    summary: A promotion must preserve the prior package as an active package or rollback target.
  - mutation_id: duplicate_active_channel_state
    target_ref: artifacts/release/m3/ring_rollout/packet.json#rollout.action.managed.beta.rollback_pilot_to_prior
    expected_finding: ring_rollout.action.channel_state_ambiguous
    summary: A rollback must leave exactly one active package state for a channel.
  - mutation_id: state_root_audit_drift
    target_ref: artifacts/release/m3/ring_rollout/packet.json#state_root_audit
    expected_finding: ring_rollout.state_root_audit.diagnostic_mismatch
    summary: State-root audit rows must match the exact-build install diagnostics rows.
