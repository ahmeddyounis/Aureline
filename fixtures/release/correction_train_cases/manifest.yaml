schema_version: 1
record_kind: correction_train_fixture_manifest
canonical_packet_ref: artifacts/release/m3/correction_train/packet.json
canonical_schema_ref: schemas/release/correction_train_packet.schema.json
canonical_support_projection_ref: artifacts/release/m3/correction_train/support_export_projection.json
validator_ref: tools/ci/m3/correction_train
failure_drill_mutations:
  - mutation_id: security_hotfix_demoted_to_next_cycle
    target_ref: artifacts/release/m3/correction_train/packet.json#correction_items.0.triage.lane_decision
    payload_path: correction_items.0.triage.lane_decision
    replacement: next_cycle
    expected_finding: triage.security_or_trust_requires_hotfix
    summary: Security and trust-boundary rows cannot be demoted into next-cycle work while supported claims remain affected.
  - mutation_id: affected_stable_backport_missing_decision
    target_ref: artifacts/release/m3/correction_train/packet.json#correction_items.1.backport_matrix.1.decision
    payload_path: correction_items.1.backport_matrix.1.decision
    replacement: not_applicable
    expected_finding: backport_matrix.affected_line_no_decision
    summary: Affected supported stable and long-support lines must record yes, no, or defer.
  - mutation_id: correction_vocabulary_removed
    target_ref: artifacts/release/m3/correction_train/packet.json#support_projection.vocabulary_terms.0
    payload_path: support_projection.vocabulary_terms.0
    replacement: changed_scope
    expected_finding: support_projection.required_vocabulary_missing
    summary: Support and docs surfaces must keep the shared correction vocabulary intact.
