# yaml-language-server: $schema=../../../schemas/release/support_window_badge.schema.json
$schema: "https://aureline.dev/schemas/release/support_window_badge.schema.json"
__fixture__:
  name: stable_supported_general_availability_desktop
  scenario: >
    A general-availability stable desktop build renders its support-
    window badge on the About panel, the update center, an issue /
    report packet, a compatibility report, and a migration / import
    workflow. The badge carries a high-prominence persistent chip,
    the rolling stable support window with concrete start / end
    timestamps, the supported support class backed by a live
    compatibility row, and the general-availability guidance tone.
    Recovery routes through the in-channel rollback path or the
    compatibility report's supported archetype.
  contract_sections:
    - "§3 Channel-identity vocabulary"
    - "§4 Support-class register and refusal states"
    - "§5 Support-window prominence ordering"
    - "§6 Required surfaces"
    - "§7 Scoping rules (archetype, client, OS, deployment, mode)"
    - "§9 Cross-record invariants"
support_window_badge_schema_version: 1
record_kind: support_window_badge_record
badge_id: support_window_badge:desktop.stable.general_availability.macos_universal
emitted_at: "2026-04-30T09:00:00Z"
channel_identity:
  channel_class: stable
  channel_label: "Stable"
  branch_class_ref: stable_train_ref
  exact_build_identity_ref: exact_build:desktop.macos.universal.2_1_0
  channel_row_ref: channel.stable
  badge_prominence_class: high_prominence_persistent_chip
  guidance_tone_class: general_availability_supported
  channel_summary: >
    General-availability desktop build on the stable channel.
    Support window and deprecation timing render before any
    pre-release prose.
support_window:
  support_window_class: rolling_window_stable
  starts_at: "2026-03-15T00:00:00Z"
  ends_at: "2027-03-14T23:59:59Z"
  security_only_until: "2027-09-14T23:59:59Z"
  end_of_support_risk_class: none
  policy_ref: support_policy:stable.rolling_window
  support_window_note: >
    Rolling stable window. Security-only updates continue for six
    months past the supported-features end date.
support_posture:
  support_class: supported
  support_class_label: "Supported"
  support_class_summary: >
    Supported on the desktop product across Windows, macOS, and
    Linux for the local-workstation and remote-agent-attached modes
    on individual-local and enterprise-online deployments.
  evidence_paths:
    - evidence_path_class: compatibility_report_supported
      evidence_refs:
        - compatibility_report:desktop.stable.2_1_0.macos_universal
        - compatibility_row:desktop_build_vs_benchmark_lab
      freshness_floor_ref: evidence_freshness:stable.rolling_window_floor
      evidence_note: >
        Live supported compatibility report. Refreshed within the
        rolling-window freshness floor.
  recovery_guidance:
    - guidance_class: in_channel_rollback_to_previous_build
      guidance_route_ref: route.update_center.rollback_to_previous_build
      guidance_note: >
        Roll back to the previous broad-cut stable build through
        the update center if a regression is observed.
    - guidance_class: open_compatibility_report_and_route_to_supported_archetype
      guidance_route_ref: route.compatibility_report.desktop.stable
      guidance_note: >
        Open the supported-archetype compatibility report when the
        consuming surface needs to verify scope.
  support_class_row_ref: support_class.supported
scope_envelope:
