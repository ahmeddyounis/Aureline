        - compatibility_row:desktop_lts_vs_managed_fleet_baseline
      freshness_floor_ref: evidence_freshness:lts.calendar_window_floor
      evidence_note: >
        Live certified-archetype report. Refreshed at every quarterly
        recertification gate.
