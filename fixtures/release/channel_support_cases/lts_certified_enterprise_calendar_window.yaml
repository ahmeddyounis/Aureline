# yaml-language-server: $schema=../../../schemas/release/support_window_badge.schema.json
$schema: "https://aureline.dev/schemas/release/support_window_badge.schema.json"
__fixture__:
  name: lts_certified_enterprise_calendar_window
  scenario: >
    An LTS desktop build deployed to an enterprise tenant renders
    its certified support-window badge. The certified support class
    is backed by a live certified-archetype report; the explicit
    LTS window carries calendar-bounded start / end / security-only
    timestamps; the badge prominence is the high-prominence
    persistent chip; the guidance tone is the long-term-support
    calendar-bounded copy. Recovery routes through rollback to the
    LTS floor or recertification through the certified-archetype
    report. The badge surfaces on About, the managed-admin update
    center, issue / report packets, the compatibility report, and
    the migration / import workflow.
  contract_sections:
    - "§3 Channel-identity vocabulary"
    - "§4 Support-class register and refusal states"
    - "§5 Support-window prominence ordering"
    - "§6 Required surfaces"
    - "§7 Scoping rules (archetype, client, OS, deployment, mode)"
    - "§9 Cross-record invariants"
support_window_badge_schema_version: 1
record_kind: support_window_badge_record
badge_id: support_window_badge:desktop.lts.enterprise.windows_x86_64
emitted_at: "2026-04-30T09:05:00Z"
channel_identity:
  channel_class: lts
  channel_label: "Long-term support"
  branch_class_ref: lts_train_ref
  exact_build_identity_ref: exact_build:desktop.windows.x86_64.lts.2_0
  channel_row_ref: channel.lts
  badge_prominence_class: high_prominence_persistent_chip
  guidance_tone_class: long_term_support_calendar_bounded
  channel_summary: >
    Long-term-support desktop build on the LTS channel. Calendar-
    bounded support window, certified-archetype report backing,
    admin-policy-rooted update marker.
support_window:
  support_window_class: explicit_lts_window
  starts_at: "2026-01-15T00:00:00Z"
  ends_at: "2029-01-14T23:59:59Z"
  security_only_until: "2030-01-14T23:59:59Z"
  end_of_support_risk_class: none
  policy_ref: support_policy:lts.three_year_calendar
  support_window_note: >
    Explicit three-year LTS support window with one additional
    year of security-only patches. Surfaces MUST quote the
    calendar end-of-support date.
support_posture:
  support_class: certified
  support_class_label: "Certified"
  support_class_summary: >
    Certified for the enterprise developer archetype on Windows
    x86_64 in the enterprise-online deployment profile, local-
