# yaml-language-server: $schema=../../../schemas/release/support_window_badge.schema.json
$schema: "https://aureline.dev/schemas/release/support_window_badge.schema.json"
__fixture__:
  name: preview_experimental_pre_release_unverified
  scenario: >
    A preview channel build renders its support-window badge with the
    experimental support class and the narrowed pre-release support
    window. Badge prominence is medium with disclosure (not the high-
    prominence chip reserved for stable / LTS); the guidance tone is
    the pre-release-unverified copy. The badge cites only runtime-
    observation evidence; recovery routes through in-channel rollback
    or switching to the certified or supported stable mode. The
    badge still surfaces on the five required surfaces so users
    cannot mistake the preview build for stable.
  contract_sections:
    - "§3 Channel-identity vocabulary"
    - "§4 Support-class register and refusal states"
    - "§5 Support-window prominence ordering"
    - "§6 Required surfaces"
    - "§7 Scoping rules (archetype, client, OS, deployment, mode)"
    - "§9 Cross-record invariants"
support_window_badge_schema_version: 1
record_kind: support_window_badge_record
badge_id: support_window_badge:desktop.preview.experimental.linux_x86_64
emitted_at: "2026-04-30T09:10:00Z"
channel_identity:
  channel_class: preview
  channel_label: "Preview"
  branch_class_ref: preview_train_ref
  exact_build_identity_ref: exact_build:desktop.linux.x86_64.preview.2_2_0_pre1
  channel_row_ref: channel.preview
  badge_prominence_class: medium_prominence_chip_with_disclosure
  guidance_tone_class: pre_release_warn_unverified
  channel_summary: >
    Gated pre-release on the preview channel. Renders the pre-
    release-unverified docs version-match state; no public support
    claim beyond runtime observation.
support_window:
  support_window_class: narrowed_window_pre_release
  starts_at: "2026-04-15T00:00:00Z"
  ends_at: "2026-06-15T23:59:59Z"
  security_only_until: null
  end_of_support_risk_class: approaching_window_end
  policy_ref: support_policy:preview.narrowed_window
  support_window_note: >
    Narrowed pre-release window. The badge MUST NOT render this
    window with stable-class prominence; the support claim is
    bounded to runtime observation only.
support_posture:
  support_class: experimental
  support_class_label: "Experimental"
  support_class_summary: >
    Runtime-observed only. Open against the individual-developer
    archetype on Linux x86_64 in local-workstation mode; not
    certified or supported in any other scope.
  evidence_paths:
    - evidence_path_class: experimental_runtime_observation_only
      evidence_refs:
        - runtime_observation:preview.linux_x86_64.smoke_2026_04
      freshness_floor_ref: evidence_freshness:preview.runtime_observation_floor
      evidence_note: >
        Runtime observation against the preview smoke corpus. No
        certified-archetype or supported compatibility row.
  recovery_guidance:
    - guidance_class: in_channel_rollback_to_previous_build
      guidance_route_ref: route.update_center.rollback_to_previous_preview_build
      guidance_note: >
        Roll back to the previous preview build when a regression
        is observed.
    - guidance_class: switch_to_certified_archetype_or_supported_mode
      guidance_route_ref: route.update_center.switch_to_stable_channel
      guidance_note: >
        Switch to the stable channel when a supported claim is
        required for the consuming surface.
  support_class_row_ref: support_class.experimental
scope_envelope:
  archetype_refs:
    - archetype.desktop.individual_developer.local_workstation
  client_classes:
    - desktop_product
  os_families:
    - linux
  deployment_profiles:
    - individual_local
  local_or_remote_modes:
    - local_workstation
required_surface_set:
  - about_panel
  - update_center
  - issue_report_packet
  - compatibility_report
  - migration_or_import_workflow
channel_matrix_ref: artifacts/release/channel_matrix.yaml
support_class_rows_ref: artifacts/release/support_class_rows.yaml
contract_doc_ref: docs/release/channel_support_window_contract.md
notes: >
  Preview / experimental posture exercised against an individual
  Linux developer. Confirms the narrowed-window prominence floor
  and the prohibition on certified or supported claims for preview.
