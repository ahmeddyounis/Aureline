# yaml-language-server: $schema=../../../schemas/release/support_window_badge.schema.json
$schema: "https://aureline.dev/schemas/release/support_window_badge.schema.json"
__fixture__:
  name: not_certified_in_this_mode_remote_agent_attached
  scenario: >
    The desktop product is certified on the local-workstation mode
    but the consuming surface is currently in remote-agent-attached
    mode and there is no certified-archetype report for that scope.
    The badge narrows automatically to not_certified_in_this_mode
    and points the user at the local-workstation certified mode
    rather than refusing silently. The four refusal classes
    (not_certified_in_this_mode, not_configured, disabled_by_policy,
    not_supported) render as four DISTINCT labels; the support
    window is the not-applicable refusal state; the evidence path
    is no_evidence_required_refusal_state; the recovery guidance
    is switch_to_certified_archetype_or_supported_mode.
  contract_sections:
    - "§3 Channel-identity vocabulary"
    - "§4 Support-class register and refusal states"
    - "§4.1 The four distinct refusal states"
    - "§6 Required surfaces"
    - "§7 Scoping rules (archetype, client, OS, deployment, mode)"
    - "§9 Cross-record invariants"
support_window_badge_schema_version: 1
record_kind: support_window_badge_record
badge_id: support_window_badge:desktop.stable.not_certified.remote_agent_attached
emitted_at: "2026-04-30T09:15:00Z"
channel_identity:
  channel_class: stable
  channel_label: "Stable"
  branch_class_ref: stable_train_ref
  exact_build_identity_ref: exact_build:desktop.macos.universal.2_1_0
  channel_row_ref: channel.stable
  badge_prominence_class: high_prominence_persistent_chip
  guidance_tone_class: general_availability_supported
  channel_summary: >
    Stable desktop build. The channel is supported but the
    consuming surface is outside the certified scope envelope for
    this capability; the badge narrows to the not-certified-in-
    this-mode refusal state.
support_window:
  support_window_class: not_applicable_refusal_state
  starts_at: null
  ends_at: null
  security_only_until: null
  end_of_support_risk_class: not_applicable_refusal_state
  policy_ref: null
  support_window_note: >
    No support window applies in this mode. Surfaces MUST NOT mint
    a positive window for a refusal-class badge.
support_posture:
  support_class: not_certified_in_this_mode
  support_class_label: "Not certified in this mode"
  support_class_summary: >
    Certified on local-workstation mode for the individual-
    developer and enterprise-developer archetypes; the consuming
    surface is currently in remote-agent-attached mode and is
    OUTSIDE the certified scope envelope. Switch to local-
    workstation mode for the certified posture.
  evidence_paths:
    - evidence_path_class: no_evidence_required_refusal_state
      evidence_refs: []
      freshness_floor_ref: null
      evidence_note: >
        Refusal-class badge. No evidence required for the
        not-certified-in-this-mode posture itself; the certified
        evidence is on the local-workstation badge instead.
  recovery_guidance:
    - guidance_class: switch_to_certified_archetype_or_supported_mode
      guidance_route_ref: route.update_center.switch_to_local_workstation_mode
      guidance_note: >
        Switch the consuming surface to local-workstation mode to
        pick up the certified support posture.
    - guidance_class: open_certified_archetype_report_for_recertification
      guidance_route_ref: route.compatibility_report.desktop.stable.local_workstation
      guidance_note: >
        Open the local-workstation certified-archetype report for
        the supported scope envelope.
  support_class_row_ref: support_class.not_certified_in_this_mode
