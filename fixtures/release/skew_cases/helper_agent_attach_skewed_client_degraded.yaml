# Skew-smoke seed case: helper/agent attach against a skewed client, review-only degradation.
#
# Companion to docs/release/skew_smoke_packet.md. Projects onto
# schemas/release/compatibility_row.schema.json via the ref below and
# composes with the remote.attach_envelope_and_drift register entry.

schema_version: 1
record_kind: skew_smoke_case_record
skew_case_id: skew_case:release.helper_agent_attach.skewed_client_degraded

surface_class: helper_agent_attach
skew_state_class: degraded
outcome_label_class: attach_degraded_review_only
blocked_vs_degraded_class: degraded_capability_subset
promotion_decision_class: ship_narrowed_claim

scenario_summary: >
  A remote agent advertises the declared adjacent-window contract but
  the client is lagging inside that same window. Attach negotiates the
  capability intersection and narrows to review-only (read, search,
  and approval preview) while write-capable paths, mutation, and AI
  runtime access stay disabled until the client is widened.

preconditions:
  - >
    boundary.remote.agent_attach_envelope holds: both sides are inside
    the declared adjacent window.
  - >
    Capability negotiation succeeded with a non-empty intersection;
    degraded capability subset is not an ambiguous partial load.
  - >
    Visible drift state MUST render on the About / attach surface; a
    silent full-capability claim is non-conforming.

compatibility_row_ref: compat_row:remote.attach_envelope_and_drift
version_skew_register_ref: skew_case:remote.attach_review_only_downgrade

install_topology_refs: []
state_migration_refs: []

helper_agent_refs:
  - boundary.remote.agent_attach_envelope
  - docs/release/compatibility_report_template.md

support_packet_routing_classes:
  - exact_build_support
  - compatibility_report
  - object_issue_handoff

preserved_state_classes:
  - user_authored_files
  - open_buffer_selection
  - workspace_trust_store
  - credential_store
  - remote_helper_authorization
  - managed_policy_overrides
  - session_restore_store

capability_impact_classes:
  - ai_runtime_access
  - background_rebuild
  - managed_control_plane_writes

recovery_rung_ref: null

explanation_fields:
  user_facing_summary: >
    Remote attach connected but narrowed to review-only. You can read,
    search, and preview approvals; write-capable actions and AI
    runtime paths stay disabled until the client is updated or the
    agent is narrowed.
  compatibility_report_summary: >
    The compatibility report records best-effort support against the
    remote attach row with an explicit degraded capability subset;
    outside-window posture is degraded, not unsupported.
  support_summary: >
    Support exports route through the exact-build support family and
    MAY route through the object-issue handoff family when a specific
    review-only action is the subject. The bundle carries the agent
    version, WIT ABI, and permission set.
  promotion_summary: >
    The case ships with a narrowed claim: review-only remote attach is
    supported, but release wording MUST NOT imply full mutation
    parity. The compatibility report cites this skew case verbatim.

notes: >
  This case is the default smoke posture for helper/agent attach when
  the client is skewed inside the adjacent window. It pairs with the
  unknown_probe_required case for combinations outside the adjacent
  window but inside the same major line.
