# Skew-smoke seed case: state migration, old profile/layout schema read by a newer binary.
#
# Companion to docs/release/skew_smoke_packet.md. Projects onto
# schemas/state/restore_provenance.schema.json and
# schemas/release/compatibility_row.schema.json via the refs below.

schema_version: 1
record_kind: skew_smoke_case_record
skew_case_id: skew_case:release.state_schema.old_to_new_additive

surface_class: state_schema_migration
skew_state_class: repairable
outcome_label_class: upgrade_applied_compatible
blocked_vs_degraded_class: degraded_capability_subset
promotion_decision_class: ship_narrowed_claim

scenario_summary: >
  A newer binary reads profile and layout state produced by an older
  binary inside the same additive schema epoch. Additive fields are
  preserved, and the restore downgrades fidelity from exact to
  compatible rather than claiming full parity it did not verify. The
  restore hands off to the cache/index repair rung when derived state
  must be regenerated.

preconditions:
  - >
    boundary.profile.portable_profile_and_layout_restore window holds:
    producer and consumer share one additive profile_layout schema
    epoch.
  - >
    restore_provenance_record fidelity_label is compatible (not exact)
    because additive fields were introduced after the producer ran.
  - >
    Derived indexes require regeneration; the surface MUST cite the
    cache_reset_candidate recovery rung before touching state.

compatibility_row_ref: compat_row:state.profile_layout_schema
version_skew_register_ref: skew_case:state.profile_same_epoch_or_additive

install_topology_refs: []

state_migration_refs:
  - fixtures/state/migration_cases/profile_restore_compatible_schema_shift.json
  - schemas/state/restore_provenance.schema.json

helper_agent_refs: []

support_packet_routing_classes:
  - exact_build_support
  - compatibility_report

preserved_state_classes:
  - user_authored_files
  - open_buffer_selection
  - workspace_trust_store
  - credential_store
  - managed_policy_overrides
  - session_restore_store

capability_impact_classes:
  - background_rebuild
  - session_restore_auto_reopen

recovery_rung_ref: recovery_action:cache_reset_candidate.cache_index_repair

explanation_fields:
  user_facing_summary: >
    The newer build loaded your older profile and layout. Authored
    work, trust, credentials, managed policy, and session-restore
    intent all remained untouched; derived indexes are being rebuilt
    in the background before auto-reopen resumes.
  compatibility_report_summary: >
    The compatibility report records a compatible (not exact) restore
    against the profile_layout_schema row with an additive-only skew
    window. The degraded capability subset (background rebuild, auto-
    reopen) is called out rather than hidden.
  support_summary: >
    Support exports route through the exact-build support family and
    carry the restore-provenance record so reviewers can tell why the
    restore downgraded from exact to compatible.
  promotion_summary: >
    The case ships with a narrowed claim: additive migration is
    supported, but release wording MUST say "compatible restore,
    derived indexes regenerate" rather than implying exact parity.

notes: >
  This case is the default smoke posture for state migration in the
  old-to-new direction inside the additive schema epoch. It is the
  twin of new_to_old_blocked, which pins the opposite direction.
emitted_at: "2026-04-23T00:00:00Z"
