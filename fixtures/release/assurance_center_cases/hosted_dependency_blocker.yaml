schema_version: 1
record_kind: assurance_center_case_record
case_id: release.assurance_center.hosted_dependency_blocker
case_class: hosted_dependency_blocker
scenario_summary: >
  An enterprise-online customer enabled a vendor-hosted AI provider for
  the active workflow. The hosted dependency conflicts with the
  no-vendor-hosted-AI claim, the hosted_dependency_blocker_active
  trigger fires, and the regulated card narrows from supported to
  limited. The card discloses the active blocker, names the
  dependency_class, and routes the surface through the limited copy
  variant with the blocker visible.
schema_refs:
  assurance_claim_card: schemas/release/assurance_claim_card.schema.json

assurance_claim_card:
  assurance_claim_card_schema_version: 1
  record_kind: assurance_claim_card_record
  card_id: assurance_claim_card:regulated_environment_assurance.enterprise_online.hosted_blocker
  claim_row_ref: assurance_claim:regulated_environment_assurance
  claim_subject_family: regulated_environment_assurance
  card_summary: >
    Regulated-environment posture is limited because a vendor-hosted AI
    provider is active for the workflow. The no-vendor-hosted-AI
    component of the claim cannot be rendered until the hosted
    dependency is disabled or replaced with a customer-managed proxy.
  active_claim_state: limited
  declared_claim_state: supported
  effective_claim_state: limited
  active_downgrade_reasons:
    - hosted_dependency_blocker_active
    - caveat_uncovered
  auto_narrowed: true
  scope:
    release_channels:
      - stable
    deployment_profiles:
      - enterprise_online
    client_scopes:
      - desktop_product
      - cli
      - managed_admin_surface
  boundary_linkages:
    key_ownership:
      key_mode_class: customer_managed
      evidence_refs:
        - customer_attestation:enterprise_online.kms_custody
      note: >
        Key custody is customer-managed via customer KMS; the gap is
        the hosted AI provider, not the key model.
    residency:
      tenant_org_scope_class: single_tenant_customer_isolated
      region_scope_class: customer_region_pinned
      retention_class: customer_retention_window
      evidence_refs:
        - artifacts/governance/deployment_profiles.yaml
      note: Residency posture matches customer's region pin and retention policy.
    proxy_egress_posture:
      public_internet_expectation_class: public_internet_optional
      outbound_proxy_class: vendor_endpoint_direct
      evidence_refs:
        - artifacts/governance/residual_dependencies.yaml
      note: >
        Active workflow reaches the vendor AI endpoint directly;
        no-vendor-hosted-AI wording cannot render under this posture.
    update_provenance:
      origin_path_class: official_origin
      exact_build_identity_refs:
        - exact_build:ide.linux.x86_64.enterprise_online.2_1_0
      signature_state: verified
      attestation_state: verified
      note: Update path is official-origin verified.
    mirror_provenance:
      mirror_class: official_mirror
      mirror_freshness_class: current
      evidence_refs:
        - mirror_bundle:official.enterprise_online.signed
      note: Official mirror is current.
    policy_source:
      policy_source_class: signed_local_admin_bundle
      policy_artifact_refs:
        - policy_bundle:enterprise_online.regulated.signed
      policy_epoch_ref: policy_epoch.enterprise_online.regulated
      note: >
        Active policy bundle does not forbid the vendor AI endpoint;
        the bundle would need to land a forbidden-egress rule before
        the no-vendor-hosted-AI wording can render.
    hosted_dependency_blockers:
      - dependency_class: ai_provider
        blocker_state_class: conflicts_with_claim_when_active
        active_for_workflow: true
        evidence_refs:
          - artifacts/governance/residual_dependencies.yaml
        note: >
          Vendor-hosted AI provider is active for the workflow and
          conflicts with the no-vendor-hosted-AI component of the
          regulated claim.
      - dependency_class: hosted_control_plane_reachability
        blocker_state_class: incompatible_in_active_profile
        active_for_workflow: false
        evidence_refs:
          - artifacts/governance/residual_dependencies.yaml
        note: Hosted control plane is not active for this workflow.
  control_proof_rows:
    - control_proof_row_id: control_proof_row:regulated.runtime_observed.archetype.enterprise
      proof_class: runtime_observed
      proof_presence: partial
      verification_state: blocked_by_hosted_dependency
      evidence_refs:
        - certified_archetype_run:enterprise_online.regulated.2026_04_28
      last_verified_at: "2026-04-28T18:30:00Z"
      stale_after: P14D
      note: >
        Archetype run completed but the no-vendor-hosted-AI sub-claim
        is blocked because the AI provider was active for the workflow.
    - control_proof_row_id: control_proof_row:regulated.vendor_asserted.boundary.enterprise
      proof_class: vendor_asserted
      proof_presence: present
      verification_state: verified
      evidence_refs:
        - artifacts/governance/deployment_profiles.yaml
      last_verified_at: "2026-04-28T12:00:00Z"
      stale_after: P30D
      note: Vendor-asserted boundary posture is current.
    - control_proof_row_id: control_proof_row:regulated.customer_provided.attestation.enterprise
      proof_class: customer_provided
      proof_presence: present
      verification_state: verified
      evidence_refs:
        - customer_attestation:enterprise_online.kms_custody
      last_verified_at: "2026-04-27T15:00:00Z"
      stale_after: P90D
      note: Customer KMS custody attestation is current.
    - control_proof_row_id: control_proof_row:regulated.policy_declared.bundle.enterprise
      proof_class: policy_declared
      proof_presence: partial
      verification_state: partial
      evidence_refs:
        - policy_bundle:enterprise_online.regulated.signed
      last_verified_at: "2026-04-28T12:00:00Z"
      stale_after: P30D
      note: >
        Active policy bundle does not declare the no-vendor-hosted-AI
        rule; only the customer-managed-keys rule is declared.
    - control_proof_row_id: control_proof_row:regulated.not_currently_verifiable.certification.enterprise
      proof_class: not_currently_verifiable
      proof_presence: present
      verification_state: unverifiable_at_milestone
      evidence_refs: []
      last_verified_at: null
      stale_after: null
      note: Certification posture remains outside current verification capability.
  exception_or_waiver_rows:
    - exception_row_id: assurance_exception:enterprise_online.hosted_ai.active
      exception_class: hosted_dependency_block
      waiver_packet_ref: null
      applies_to_claim_state: limited
      starts_at: "2026-04-29T08:00:00Z"
      ends_at: null
      expiry_state_class: open_ended
      redaction_class: operator_only_restricted
      publication_destinations:
        - assurance_center
        - help_about
        - support_export
      note: >
        Active hosted-dependency block: vendor-hosted AI provider is
        enabled for the workflow. The block stays open until the
        provider is disabled, replaced with a customer-managed proxy,
        or covered by a signed policy rule.
  freshness:
    captured_at: "2026-04-29T08:05:00Z"
    stale_after: P14D
    freshness_state: known_issues
    next_review_target: hosted-dependency block resolution
  publication_destinations:
    - assurance_center
    - docs_site
    - help_about
    - support_export
    - release_packet
    - migration_notes
  evaluation_packet_refs: []
  owner: "@ahmeddyounis"
  evidence_owner: "@ahmeddyounis"
  rendering_contract:
    active_state_visible: true
    boundary_linkages_visible: true
    control_proof_rows_visible: true
    exception_rows_visible: true
    auto_narrowed_visible: true
    evaluation_export_visible: true
  notes: >
    Hosted-dependency blocker forces the card from supported to limited.
    The exception row makes the active block visible to the operator
    and to support, with operator-only redaction so the active hosted
    dependency does not leak through public surfaces.

expected_surface_contract:
  blocks_no_vendor_hosted_ai_wording: true
  exposes_hosted_dependency_blocker: true
  renders_limited_copy_variant: true
