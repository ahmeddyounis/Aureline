schema_version: 1
record_kind: assurance_center_case_record
case_id: release.assurance_center.evaluation_export_with_redaction
case_class: evaluation_export_with_redaction
scenario_summary: >
  A regulated-review evaluation packet is frozen for handoff to an
  external auditor. The packet bundles the active regulated card and
  the customer-managed-keys card, applies the metadata_safe_default
  redaction profile, and enumerates the closed redacted_field_classes
  list so the recipient can reason about what is excluded. Raw
  signatures, raw attestation payloads, raw policy bodies, and raw
  tenant identifiers do not cross the packet boundary.
schema_refs:
  evaluation_packet: schemas/release/evaluation_packet.schema.json

evaluation_packet:
  evaluation_packet_schema_version: 1
  record_kind: evaluation_packet_record
  packet_id: evaluation_packet:regulated_review.air_gapped.2026_04_28
  packet_class: regulated_review
  packet_state: frozen
  assembled_at: "2026-04-28T18:40:00Z"
  frozen_at: "2026-04-28T18:55:00Z"
  scope:
