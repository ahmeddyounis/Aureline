  exception_index: []
  redaction:
    redaction_state: applied
    applied_redaction_class: metadata_safe_default
    redaction_rules_ref: docs/release/assurance_center_and_regulated_claim_contract.md
    redacted_field_classes:
      - raw_signature
      - raw_attestation_payload
      - raw_key_material
      - raw_tenant_identifier
      - raw_user_identifier
      - raw_hostname
      - raw_path
      - raw_provider_payload
      - raw_secret_material
      - raw_policy_body
      - raw_url
    note: >
      Default-safe redaction applied. Every raw field class enumerated
      here is excluded from the exported packet; reviewers see stable
      handles and refs only.
  handoff:
    recipient_class: auditor
    recipient_label: external auditor handle
    delivery_channel_class: evaluation_artifact
    signed_at: "2026-04-28T18:55:00Z"
    signing_evidence_ref: signing_evidence:regulated_review.air_gapped.2026_04_28
    note: >
      Frozen packet handed off through the evaluation artifact channel
      with a release-pipeline signing-evidence ref. Recipient label is
      a stable handle, not a raw recipient identity.
  freshness:
    captured_at: "2026-04-28T18:55:00Z"
    stale_after: P14D
    freshness_state: current
    next_review_target: next certified-archetype run on regulated profiles
  limitations:
    - This packet does not assert FedRAMP, ISO, or SOC2 authorization.
    - Sovereign-posture certification remains outside Aureline's verification capability.
    - Customer-controlled infrastructure components (KMS, network proxy, mirror host) depend on customer-bearing attestations.
    - Packet freshness expires P14D after capture; downstream readers MUST not project the bundled claims past stale_after.
  owner: "@ahmeddyounis"
  evidence_owner: "@ahmeddyounis"
  rendering_contract:
    claim_card_index_visible: true
    control_proof_index_visible: true
    exception_index_visible: true
    redaction_visible: true
    handoff_visible: true
    limitations_visible: true
  notes: >
    Frozen regulated-review evaluation packet bundling the active
    regulated card and the customer-managed-keys card with default-safe
    redaction. The closed redacted_field_classes list is the only
    enumeration of redaction the recipient needs to read.

expected_surface_contract:
  applies_external_facing_redaction: true
  enumerates_redacted_field_classes: true
  freezes_packet_state_for_handoff: true
