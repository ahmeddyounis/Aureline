      claim_subject_family: regulated_environment_assurance
      active_claim_state: supported
      auto_narrowed: false
      active_downgrade_reasons: []
      control_proof_row_refs:
        - control_proof_row:cmk.vendor_asserted.boundary
        - control_proof_row:cmk.customer_provided.attestation
        - control_proof_row:cmk.runtime_observed.archetype
