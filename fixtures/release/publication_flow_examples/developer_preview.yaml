# yaml-language-server: $schema=../../../schemas/release/artifact_publication_row.schema.json
artifact_publication_row_schema_version: 1
artifact_publication_row_id: artifact_publication_row:publication_flow.developer_preview.ide_binary
lane_class: developer_preview
artifact:
  artifact_kind_class: binary
  artifact_family_class: ide_binary
  notes: Developer preview build produced on a workstation or untrusted runner.
producer:
  trust_domain: untrusted_contributor
  component_id: developer_workstation
