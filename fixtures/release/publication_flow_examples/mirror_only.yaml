# yaml-language-server: $schema=../../../schemas/release/artifact_publication_row.schema.json
artifact_publication_row_schema_version: 1
artifact_publication_row_id: artifact_publication_row:publication_flow.mirror_only.debug_symbols
lane_class: mirror_only
artifact:
  artifact_kind_class: symbols
  artifact_family_class: ide_debug_symbols
  notes: Mirror-only debug distribution with continuity receipts; no public-channel advancement.
producer:
  trust_domain: release_mirror_or_offline
  component_id: mirror
  lane_ref: mirror_or_offline_promotion_lane
  notes: Mirror assembly preserves origin digests and exact-build linkage.
signer:
  signer_boundary_id: mirror_receipt_signer
  notes: Signs mirror continuity receipts; never re-signs origin artifacts as origin.
publisher:
  publisher_boundary_class: mirror_feed_or_offline_bundle
  trust_domain: release_mirror_or_offline
  publish_target_refs:
    - publish_target:customer.mirror.feed
  public_download_surface_class: not_applicable
  notes: Mirror feed publication is auditable but does not mutate public channels.
retention:
  retention_floor_class: paired_release_family_support_window_and_open_advisories
  source_ref: artifacts/release/artifact_family_map.yaml
revocation_linkage:
  revocation_granularity_class: exact_build_node_set
  source_ref: artifacts/release/artifact_family_map.yaml
trust_path:
  build_trust_domain: release_stable
  sign_signer_boundary_id: hardened_signing_service
  promote_trust_domain: release_mirror_or_offline
  publish_trust_domain: release_mirror_or_offline
  mirror_trust_domain: release_mirror_or_offline
  revoke_trust_domain: release_hotfix

