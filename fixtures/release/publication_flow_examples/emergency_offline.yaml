# yaml-language-server: $schema=../../../schemas/release/artifact_publication_row.schema.json
artifact_publication_row_schema_version: 1
artifact_publication_row_id: artifact_publication_row:publication_flow.emergency_offline.offline_bundle_manifest
lane_class: emergency_offline
artifact:
  artifact_kind_class: manifest
  artifact_family_class: update_metadata
  notes: Emergency offline bundle manifest plus verification receipts.
producer:
  trust_domain: release_mirror_or_offline
  component_id: mirror
  lane_ref: mirror_or_offline_promotion_lane
  notes: Emergency offline distribution preserves origin identity and receipts; never invents new origin signatures.
signer:
  signer_boundary_id: mirror_receipt_signer
  notes: Mirror/offline receipts and verification packets are signed for attribution and audit.
publisher:
  publisher_boundary_class: offline_bundle
  trust_domain: release_mirror_or_offline
  publish_target_refs:
    - publish_target:air_gap.bundle
  public_download_surface_class: not_applicable
  notes: Offline bundle distribution does not advance authoritative channel pointers.
retention:
  retention_floor_class: declared_response_window
  source_ref: artifacts/release/artifact_family_map.yaml
revocation_linkage:
  revocation_granularity_class: channel_manifest_or_trust_root
  source_ref: artifacts/release/promotion_gate_map.yaml#advisory_and_revocation_scope_policy
trust_path:
  build_trust_domain: release_hotfix
  sign_signer_boundary_id: hardened_signing_service
  promote_trust_domain: release_mirror_or_offline
  publish_trust_domain: release_mirror_or_offline
  mirror_trust_domain: release_mirror_or_offline
  revoke_trust_domain: release_hotfix

