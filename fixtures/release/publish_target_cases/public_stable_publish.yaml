  occurred_at: "2026-04-29T16:32:00Z"
  notes: Public stable publication preserves one release-center truth model across UI, headless, About, and support.

expected_reconstruction:
  reconstructable_without_screenshots: true
  required_input_refs:
    - release_center:stable.public.publish.2026_04_29
    - publish_target:public.stable
    - update_manifest:stable.public.2_0_0
    - exact_build:ide.linux.x86_64.2_0_0
    - support_bundle:stable.2_0_0.metadata
  expected_action_state: executed
  expected_surface_alignment:
    - release_center
    - headless_publication
    - about_provenance
    - service_health
    - rollback
    - supportability
  reconstruction_note: Stable publication reconstructs from release-center action, target, exact-build refs, update manifest, and support refs.

parity_assertions:
  ui_and_headless_share_release_object_ids: true
  publish_target_class_visible_before_action: true
  auth_source_visible_before_action: true
  dry_run_state_visible_before_action: true
  exact_build_linkage_visible_before_action: true
  support_bundle_linkage_preserved: true
  parity_note: Stable publication has one action id and one target id across surfaces.

notes: Stable publish fixture exercises exact-build, rollback, and About/provenance linkage.
