# yaml-language-server: $schema=../../../schemas/release/release_center_object.schema.json
release_center_object_schema_version: 1
record_kind: release_publication_case_record
case_id: release.publish_target.public_stable_publish
scenario_class: public_stable_publish
scenario_summary: >
  A stable candidate publishes to the public stable update feed with
  current release evidence, immutable artifact identity, mutable channel
  pointer semantics, rollback preview, and About/provenance parity refs.

release_candidate:
  candidate_id: release_candidate:aureline.2_0_0_stable
  version_label: 2.0.0
  channel_family: stable
  current_stage_class: stable_candidate
  artifact_family_refs:
    - artifact_family.ide_binary.linux
    - artifact_family.cli_binary.linux
    - artifact_family.release_evidence_packet
  publish_target_refs:
    - publish_target:public.stable
  evidence_freshness:
    freshness_class: current
    latest_evidence_at: "2026-04-29T16:25:00Z"
    required_evidence_refs:
      - release_evidence:stable.2_0_0
      - compatibility_report:stable.2_0_0
      - cleanroom_rebuild:stable.2_0_0
    waiver_packet_refs: []
    freshness_policy_ref: docs/governance/evidence_freshness_policy.md
    freshness_note: Stable release evidence is current and complete for the public scope.
  rollback_target_ref: release_candidate:aureline.1_9_4_stable
  exact_build_backreferences:
    - artifact_family_class: ide_binary
      artifact_ref: artifact:ide.linux.x86_64.2_0_0
      exact_build_identity_ref: exact_build:ide.linux.x86_64.2_0_0
      build_id: build:release.stable.2_0_0
      digest_refs:
        - digest:ide.linux.x86_64.2_0_0
      provenance_row_refs:
        - provenance:ide.linux.x86_64.2_0_0
      about_provenance_row_refs:
        - about:provenance.ide.linux.x86_64.2_0_0
      support_bundle_refs:
        - support_bundle:stable.2_0_0.metadata

publish_target:
  publish_target_schema_version: 1
  record_kind: publish_target_record
  publish_target_id: publish_target:public.stable
  target_class: stable
  destination_class: public_update_feed
  display_name: Public stable update feed
  visibility_class: public_stable
  audience:
    audience_class: public_stable_user
    audience_ref: audience:public.stable
    deployment_profile_scope:
      - deployment_profile.individual_local
      - deployment_profile.enterprise_online
      - deployment_profile.self_hosted
    resulting_visibility_class: public_stable
    audience_note: Stable users receive this build through the default update feed.
  mutability:
    mutability_class: immutable_version_mutable_pointer
    immutable_fields:
      - artifact_digest
      - exact_build_identity_ref
      - release_evidence_packet
    mutable_fields:
      - stable_channel_pointer
    repin_allowed: true
    yank_allowed: false
    revoke_allowed: true
    mutability_note: Published bytes are immutable; stable pointer movement is a governed repin or rollback action.
  rollback_path:
    rollback_path_class: staged_rollback_manifest
    last_known_good_ref: release_candidate:aureline.1_9_4_stable
    rollback_manifest_ref: update_manifest:stable.rollback.1_9_4
    rollback_window: until the next stable candidate supersedes the rollback atom
    continuity_note: Rollback restores the coordinated binary, docs, evidence, and support sidecar set.
  support_class: public_supported
  auth_source:
    auth_source_class: release_vault_token
    auth_source_ref: authority:release.vault.stable.publisher
    actor_class: release_operator
    authority_policy_ref: artifacts/governance/signing_quorum.yaml#actions.stable_or_lts_promotion
    raw_secret_material_present: false
    disclosure_note: The release operator uses a governed stable publication authority ref; raw token material is absent.
  dry_run:
    availability_class: required_current
    dry_run_ref: dry_run:stable.public.2_0_0
    scope_preview_ref: scope_preview:stable.public.2_0_0
    generated_at: "2026-04-29T16:20:00Z"
    expires_at: "2026-04-29T20:20:00Z"
    diff_summary: Stable channel pointer advances from 1.9.4 to 2.0.0 with coordinated docs and evidence packet refs.
    blocking_findings: []
  evidence_freshness:
    freshness_class: current
    latest_evidence_at: "2026-04-29T16:25:00Z"
    required_evidence_refs:
      - release_evidence:stable.2_0_0
      - cleanroom_rebuild:stable.2_0_0
    waiver_packet_refs: []
    freshness_policy_ref: docs/governance/evidence_freshness_policy.md
    freshness_note: Stable target has no stale or waived evidence.
  exact_build_backreferences:
    - artifact_family_class: ide_binary
      artifact_ref: artifact:ide.linux.x86_64.2_0_0
      exact_build_identity_ref: exact_build:ide.linux.x86_64.2_0_0
      build_id: build:release.stable.2_0_0
      provenance_row_refs:
        - provenance:ide.linux.x86_64.2_0_0
      about_provenance_row_refs:
        - about:provenance.ide.linux.x86_64.2_0_0
      support_bundle_refs:
        - support_bundle:stable.2_0_0.metadata
  surface_parity_links:
    release_center_event_ref: release_center:stable.public.publish.2026_04_29
    headless_command_ref: headless_publish:stable.public.2_0_0
    update_manifest_refs:
      - update_manifest:stable.public.2_0_0
    about_provenance_refs:
      - about:provenance.ide.linux.x86_64.2_0_0
    service_health_refs:
      - service_health:stable.feed.current
    advisory_refs: []
    rollback_record_refs:
      - rollback:stable.1_9_4.last_known_good
    support_bundle_refs:
      - support_bundle:stable.2_0_0.metadata
  pre_action_disclosure:
    target_scope_visible: true
    auth_source_visible: true
    audience_visible: true
    mutability_visible: true
    dry_run_state_visible: true
    rollback_path_visible: true
    exact_build_linkage_visible: true
    support_linkage_visible: true
  notes: Stable target freezes exact-build and rollback disclosure before publication.

publication_action:
