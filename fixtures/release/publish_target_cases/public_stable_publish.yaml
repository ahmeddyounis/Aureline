  record_kind: publication_action_record
  action_id: publication_action:stable.public.publish.2026_04_29
  requested_action_class: publish
  action_state_class: executed
  candidate_ref: release_candidate:aureline.2_0_0_stable
  publish_target_ref: publish_target:public.stable
  source_stage_ref: stage:stable.candidate.2_0_0
  destination_stage_ref: stage:stable.public.2_0_0
  actor_class: release_operator
  auth_source:
    auth_source_class: release_vault_token
    auth_source_ref: authority:release.vault.stable.publisher
    actor_class: release_operator
    authority_policy_ref: artifacts/governance/signing_quorum.yaml#actions.stable_or_lts_promotion
    raw_secret_material_present: false
    disclosure_note: Stable publish uses the same authority ref shown in the target review sheet.
  dry_run:
    availability_class: required_current
    dry_run_ref: dry_run:stable.public.2_0_0
    scope_preview_ref: scope_preview:stable.public.2_0_0
    generated_at: "2026-04-29T16:20:00Z"
    expires_at: "2026-04-29T20:20:00Z"
    diff_summary: Stable channel pointer advances with coordinated artifact graph refs.
    blocking_findings: []
  evidence_freshness:
    freshness_class: current
    latest_evidence_at: "2026-04-29T16:25:00Z"
    required_evidence_refs:
      - release_evidence:stable.2_0_0
      - compatibility_report:stable.2_0_0
      - cleanroom_rebuild:stable.2_0_0
    waiver_packet_refs: []
    freshness_policy_ref: docs/governance/evidence_freshness_policy.md
    freshness_note: Stable publish passes the freshness floor.
  exact_build_backreferences:
    - artifact_family_class: ide_binary
      artifact_ref: artifact:ide.linux.x86_64.2_0_0
      exact_build_identity_ref: exact_build:ide.linux.x86_64.2_0_0
      build_id: build:release.stable.2_0_0
      digest_refs:
        - digest:ide.linux.x86_64.2_0_0
      provenance_row_refs:
        - provenance:ide.linux.x86_64.2_0_0
      about_provenance_row_refs:
        - about:provenance.ide.linux.x86_64.2_0_0
      support_bundle_refs:
        - support_bundle:stable.2_0_0.metadata
  artifact_family_refs:
    - artifact_family.ide_binary.linux
    - artifact_family.cli_binary.linux
    - artifact_family.release_evidence_packet
  release_center_event_ref: release_center:stable.public.publish.2026_04_29
  headless_command_ref: headless_publish:stable.public.2_0_0
  update_manifest_ref: update_manifest:stable.public.2_0_0
  support_bundle_linkage:
    support_bundle_refs:
      - support_bundle:stable.2_0_0.metadata
    support_packet_index_refs:
      - support_packet_index:stable.2_0_0
    supportability_surface_refs:
      - supportability:stable.feed
    redaction_profile_refs:
      - redaction_profile:metadata_safe_default
    support_note: Support packets quote the stable action id and exact-build identity instead of re-keying the release.
  rollback_or_revoke:
    affected_artifact_refs: []
    blast_radius_ref: null
    last_known_good_ref: release_candidate:aureline.1_9_4_stable
    rollback_manifest_ref: update_manifest:stable.rollback.1_9_4
    revocation_record_refs: []
    continuity_note: Rollback target is visible before stable publication.
  break_glass_publication:
    state_class: forbidden_for_action
    break_glass_event_ref: null
    allowed_actor_classes: []
    reason_class: not_applicable
    mandatory_packet_refs:
      incident_or_advisory_refs: []
      evidence_packet_refs: []
      waiver_packet_refs: []
      support_packet_refs: []
    normal_action_comparison: Stable publication may not use break-glass; it waits for ordinary stable quorum.
    reconciliation_target_ref: null
    reconcile_by: null
    post_action_reconciliation_refs: []
    reconciliation_note: No break-glass path is admitted for stable widening.
  surface_parity_links:
    release_center_event_ref: release_center:stable.public.publish.2026_04_29
    headless_command_ref: headless_publish:stable.public.2_0_0
    update_manifest_refs:
      - update_manifest:stable.public.2_0_0
    about_provenance_refs:
      - about:provenance.ide.linux.x86_64.2_0_0
    service_health_refs:
      - service_health:stable.feed.current
    advisory_refs: []
    rollback_record_refs:
      - rollback:stable.1_9_4.last_known_good
    support_bundle_refs:
      - support_bundle:stable.2_0_0.metadata
    evidence_packet_refs:
