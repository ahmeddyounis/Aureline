# yaml-language-server: $schema=../../../schemas/release/release_center_object.schema.json
release_center_object_schema_version: 1
record_kind: release_publication_case_record
case_id: release.publish_target.staged_preview
scenario_class: staged_preview
scenario_summary: >
  A signed preview candidate moves from internal validation to public
  preview. The target discloses audience, auth source, dry-run status,
  mutability, rollback path, and exact-build backreferences before the
  release-center action executes.

release_candidate:
  candidate_id: release_candidate:aureline.2_0_0_preview_3
  version_label: 2.0.0-preview.3
  channel_family: preview
  current_stage_class: internal_ring
  artifact_family_refs:
    - artifact_family.ide_binary.macos
    - artifact_family.cli_binary.macos
    - artifact_family.docs_pack
  publish_target_refs:
    - publish_target:public.preview
  evidence_freshness:
    freshness_class: current
    latest_evidence_at: "2026-04-29T15:10:00Z"
    required_evidence_refs:
      - release_evidence:preview.2_0_0_preview_3
      - ring_history:preview.public_preview.entry
    waiver_packet_refs: []
    freshness_policy_ref: docs/governance/evidence_freshness_policy.md
    freshness_note: Preview evidence was refreshed during the current release review window.
  rollback_target_ref: release_candidate:aureline.2_0_0_preview_2
  exact_build_backreferences:
    - artifact_family_class: ide_binary
      artifact_ref: artifact:ide.macos.universal.2_0_0_preview_3
      exact_build_identity_ref: exact_build:ide.macos.universal.2_0_0_preview_3
      build_id: build:release.preview.2_0_0_preview_3
      digest_refs:
        - digest:ide.macos.universal.2_0_0_preview_3
      provenance_row_refs:
        - provenance:ide.macos.universal.2_0_0_preview_3
      about_provenance_row_refs:
        - about:provenance.ide.macos.universal.2_0_0_preview_3
      support_bundle_refs:
        - support_bundle:preview.2_0_0_preview_3.metadata

publish_target:
  publish_target_schema_version: 1
  record_kind: publish_target_record
  publish_target_id: publish_target:public.preview
  target_class: public_preview
  destination_class: public_update_feed
  display_name: Public preview feed
  visibility_class: public_preview
  audience:
    audience_class: public_preview_user
    audience_ref: audience:public.preview
    deployment_profile_scope:
      - deployment_profile.individual_local
      - deployment_profile.enterprise_online
    resulting_visibility_class: public_preview
    audience_note: Preview users see the candidate after the public preview pointer moves.
  mutability:
    mutability_class: immutable_version_mutable_pointer
    immutable_fields:
      - artifact_digest
      - exact_build_identity_ref
      - version_label
    mutable_fields:
      - preview_channel_pointer
    repin_allowed: true
    yank_allowed: false
    revoke_allowed: true
    mutability_note: Preview artifacts are immutable; the preview pointer may repin to the prior candidate.
  rollback_path:
    rollback_path_class: repin_previous_pointer
    last_known_good_ref: release_candidate:aureline.2_0_0_preview_2
    rollback_manifest_ref: update_manifest:preview.repin.2_0_0_preview_2
    rollback_window: until superseded by next public preview candidate
    continuity_note: Existing preview installs keep local continuity and can be repinned to the previous candidate.
  support_class: preview_supported
  auth_source:
    auth_source_class: ci_oidc_release_identity
    auth_source_ref: authority:ci.preview.publisher
    actor_class: headless_automation
    authority_policy_ref: artifacts/governance/signing_quorum.yaml#actions.preview_or_beta_promotion
    raw_secret_material_present: false
    disclosure_note: Headless automation uses the preview release identity approved for this candidate.
  dry_run:
    availability_class: required_current
    dry_run_ref: dry_run:preview.public.2_0_0_preview_3
    scope_preview_ref: scope_preview:preview.public.2_0_0_preview_3
    generated_at: "2026-04-29T15:08:00Z"
    expires_at: "2026-04-29T19:08:00Z"
    diff_summary: Preview pointer moves from preview.2 to preview.3 with no registry or stable-channel effect.
    blocking_findings: []
  evidence_freshness:
    freshness_class: current
    latest_evidence_at: "2026-04-29T15:10:00Z"
    required_evidence_refs:
      - release_evidence:preview.2_0_0_preview_3
      - compatibility_report:preview.2_0_0_preview_3
    waiver_packet_refs: []
    freshness_policy_ref: docs/governance/evidence_freshness_policy.md
    freshness_note: Required preview evidence is current.
  exact_build_backreferences:
    - artifact_family_class: ide_binary
      artifact_ref: artifact:ide.macos.universal.2_0_0_preview_3
      exact_build_identity_ref: exact_build:ide.macos.universal.2_0_0_preview_3
      build_id: build:release.preview.2_0_0_preview_3
      provenance_row_refs:
        - provenance:ide.macos.universal.2_0_0_preview_3
      about_provenance_row_refs:
        - about:provenance.ide.macos.universal.2_0_0_preview_3
      support_bundle_refs:
        - support_bundle:preview.2_0_0_preview_3.metadata
  surface_parity_links:
    release_center_event_ref: release_center:preview.public.promote.2026_04_29
    headless_command_ref: headless_publish:preview.public.2_0_0_preview_3
    update_manifest_refs:
      - update_manifest:preview.public.2_0_0_preview_3
    about_provenance_refs:
      - about:provenance.ide.macos.universal.2_0_0_preview_3
    service_health_refs:
      - service_health:preview.feed.current
    advisory_refs: []
    rollback_record_refs:
      - rollback:preview.repin.2_0_0_preview_2
    support_bundle_refs:
      - support_bundle:preview.2_0_0_preview_3.metadata
  pre_action_disclosure:
    target_scope_visible: true
    auth_source_visible: true
    audience_visible: true
    mutability_visible: true
    dry_run_state_visible: true
    rollback_path_visible: true
    exact_build_linkage_visible: true
    support_linkage_visible: true
  notes: Public preview publish target used by both release-center UI and headless automation.

publication_action:
  release_center_object_schema_version: 1
  record_kind: publication_action_record
  action_id: publication_action:preview.public.promote.2026_04_29
  requested_action_class: promote
  action_state_class: executed
  candidate_ref: release_candidate:aureline.2_0_0_preview_3
  publish_target_ref: publish_target:public.preview
  source_stage_ref: stage:preview.internal_ring.2_0_0_preview_3
  destination_stage_ref: stage:preview.public_preview.2_0_0_preview_3
  actor_class: headless_automation
  auth_source:
    auth_source_class: ci_oidc_release_identity
    auth_source_ref: authority:ci.preview.publisher
    actor_class: headless_automation
    authority_policy_ref: artifacts/governance/signing_quorum.yaml#actions.preview_or_beta_promotion
    raw_secret_material_present: false
    disclosure_note: Same auth-source class rendered in UI review sheet and headless dry-run output.
  dry_run:
    availability_class: required_current
    dry_run_ref: dry_run:preview.public.2_0_0_preview_3
    scope_preview_ref: scope_preview:preview.public.2_0_0_preview_3
    generated_at: "2026-04-29T15:08:00Z"
    expires_at: "2026-04-29T19:08:00Z"
    diff_summary: Preview pointer moves from preview.2 to preview.3.
    blocking_findings: []
  evidence_freshness:
    freshness_class: current
    latest_evidence_at: "2026-04-29T15:10:00Z"
    required_evidence_refs:
      - release_evidence:preview.2_0_0_preview_3
      - ring_history:preview.public_preview.entry
    waiver_packet_refs: []
    freshness_policy_ref: docs/governance/evidence_freshness_policy.md
    freshness_note: Promotion evidence is current.
  exact_build_backreferences:
    - artifact_family_class: ide_binary
      artifact_ref: artifact:ide.macos.universal.2_0_0_preview_3
      exact_build_identity_ref: exact_build:ide.macos.universal.2_0_0_preview_3
      build_id: build:release.preview.2_0_0_preview_3
      digest_refs:
        - digest:ide.macos.universal.2_0_0_preview_3
      provenance_row_refs:
        - provenance:ide.macos.universal.2_0_0_preview_3
      about_provenance_row_refs:
        - about:provenance.ide.macos.universal.2_0_0_preview_3
      support_bundle_refs:
        - support_bundle:preview.2_0_0_preview_3.metadata
  artifact_family_refs:
    - artifact_family.ide_binary.macos
    - artifact_family.cli_binary.macos
    - artifact_family.docs_pack
  release_center_event_ref: release_center:preview.public.promote.2026_04_29
  headless_command_ref: headless_publish:preview.public.2_0_0_preview_3
  update_manifest_ref: update_manifest:preview.public.2_0_0_preview_3
  support_bundle_linkage:
    support_bundle_refs:
      - support_bundle:preview.2_0_0_preview_3.metadata
    support_packet_index_refs:
      - support_packet_index:preview.2_0_0_preview_3
    supportability_surface_refs:
      - supportability:preview.feed
    redaction_profile_refs:
      - redaction_profile:metadata_safe_default
    support_note: Support can reconstruct preview publication from release-center action, target, and exact-build refs.
  rollback_or_revoke:
    affected_artifact_refs: []
    blast_radius_ref: null
    last_known_good_ref: release_candidate:aureline.2_0_0_preview_2
    rollback_manifest_ref: update_manifest:preview.repin.2_0_0_preview_2
    revocation_record_refs: []
    continuity_note: Repin remains available while the preview pointer is mutable.
  break_glass_publication:
    state_class: not_used
    break_glass_event_ref: null
    allowed_actor_classes: []
    reason_class: not_applicable
    mandatory_packet_refs:
      incident_or_advisory_refs: []
      evidence_packet_refs: []
      waiver_packet_refs: []
      support_packet_refs: []
    normal_action_comparison: Routine preview promotion uses ordinary two-person release control, not break-glass.
    reconciliation_target_ref: null
    reconcile_by: null
    post_action_reconciliation_refs: []
    reconciliation_note: No break-glass reconciliation is required.
  surface_parity_links:
    release_center_event_ref: release_center:preview.public.promote.2026_04_29
    headless_command_ref: headless_publish:preview.public.2_0_0_preview_3
    update_manifest_refs:
      - update_manifest:preview.public.2_0_0_preview_3
    about_provenance_refs:
      - about:provenance.ide.macos.universal.2_0_0_preview_3
    service_health_refs:
      - service_health:preview.feed.current
    advisory_refs: []
    rollback_record_refs:
      - rollback:preview.repin.2_0_0_preview_2
    support_bundle_refs:
      - support_bundle:preview.2_0_0_preview_3.metadata
    evidence_packet_refs:
      - release_evidence:preview.2_0_0_preview_3
  occurred_at: "2026-04-29T15:15:00Z"
  notes: The public preview action is reconstructable from typed release-center refs.

expected_reconstruction:
  reconstructable_without_screenshots: true
  required_input_refs:
    - release_center:preview.public.promote.2026_04_29
    - publish_target:public.preview
    - update_manifest:preview.public.2_0_0_preview_3
    - exact_build:ide.macos.universal.2_0_0_preview_3
  expected_action_state: executed
  expected_surface_alignment:
    - release_center
    - headless_publication
    - about_provenance
    - supportability
  reconstruction_note: The same target id and exact-build refs appear in UI, headless output, and support metadata.

parity_assertions:
  ui_and_headless_share_release_object_ids: true
  publish_target_class_visible_before_action: true
  auth_source_visible_before_action: true
  dry_run_state_visible_before_action: true
  exact_build_linkage_visible_before_action: true
  support_bundle_linkage_preserved: true
  parity_note: Preview promotion has no UI-only or CLI-only publication vocabulary.

notes: Staged preview case for publish-target review sheets and headless dry-run parity.
