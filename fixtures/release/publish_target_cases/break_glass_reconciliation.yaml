# yaml-language-server: $schema=../../../schemas/release/release_center_object.schema.json
release_center_object_schema_version: 1
record_kind: release_publication_case_record
case_id: release.publish_target.break_glass_reconciliation
scenario_class: break_glass_reconciliation
scenario_summary: >
  An admitted emergency containment action disables a compromised
  registry namespace through the emergency channel. The action carries
  a break-glass event ref, mandatory advisory and waiver packet refs,
  support linkage, and a reconciled superseding signed action.

