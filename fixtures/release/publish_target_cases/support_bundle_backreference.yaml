expected_reconstruction:
  reconstructable_without_screenshots: true
  required_input_refs:
    - release_center:stable.rollback.2026_04_29
    - publish_target:public.stable.rollback
    - update_manifest:stable.rollback.1_9_4
    - support_bundle:rollback.2_0_0_to_1_9_4
    - exact_build:ide.linux.x86_64.1_9_4
  expected_action_state: executed
  expected_surface_alignment:
    - release_center
    - headless_publication
    - about_provenance
    - rollback
    - supportability
  reconstruction_note: Support reconstructs the rollback from action id, target id, update manifest, exact-build refs, and support packet index.

parity_assertions:
  ui_and_headless_share_release_object_ids: true
  publish_target_class_visible_before_action: true
  auth_source_visible_before_action: true
  dry_run_state_visible_before_action: true
  exact_build_linkage_visible_before_action: true
  support_bundle_linkage_preserved: true
