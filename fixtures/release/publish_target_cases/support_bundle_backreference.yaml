# yaml-language-server: $schema=../../../schemas/release/release_center_object.schema.json
release_center_object_schema_version: 1
record_kind: release_publication_case_record
case_id: release.publish_target.support_bundle_backreference
scenario_class: support_bundle_backreference
scenario_summary: >
  A stable rollback is reconstructed from a support bundle. The
  release-center action, publish target, update manifest, exact-build
  refs, rollback manifest, support packet index, and redaction profile
  all point to the same publication truth.

