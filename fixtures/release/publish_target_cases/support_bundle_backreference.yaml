  version_label: 2.0.0 rollback to 1.9.4
  channel_family: stable
  current_stage_class: rolled_back
  artifact_family_refs:
    - artifact_family.ide_binary.linux
    - artifact_family.docs_pack
    - artifact_family.release_evidence_packet
  publish_target_refs:
    - publish_target:public.stable.rollback
  evidence_freshness:
    freshness_class: current
    latest_evidence_at: "2026-04-29T18:00:00Z"
    required_evidence_refs:
      - update_manifest:stable.rollback.1_9_4
      - support_bundle:rollback.2_0_0_to_1_9_4
    waiver_packet_refs: []
    freshness_policy_ref: docs/governance/evidence_freshness_policy.md
    freshness_note: Rollback evidence and support reconstruction packet are current.
  rollback_target_ref: release_candidate:aureline.1_9_4_stable
  exact_build_backreferences:
    - artifact_family_class: ide_binary
      artifact_ref: artifact:ide.linux.x86_64.1_9_4
      exact_build_identity_ref: exact_build:ide.linux.x86_64.1_9_4
      build_id: build:release.stable.1_9_4
      digest_refs:
        - digest:ide.linux.x86_64.1_9_4
      provenance_row_refs:
        - provenance:ide.linux.x86_64.1_9_4
      about_provenance_row_refs:
        - about:provenance.ide.linux.x86_64.1_9_4
      support_bundle_refs:
        - support_bundle:rollback.2_0_0_to_1_9_4

publish_target:
  publish_target_schema_version: 1
  record_kind: publish_target_record
  publish_target_id: publish_target:public.stable.rollback
  target_class: stable
  destination_class: public_update_feed
  display_name: Public stable rollback target
  visibility_class: public_stable
  rollout_ring: stable
  audience:
    audience_class: public_stable_user
    audience_ref: audience:public.stable
    deployment_profile_scope:
      - deployment_profile.individual_local
      - deployment_profile.enterprise_online
      - deployment_profile.self_hosted
    resulting_visibility_class: public_stable
    audience_note: Stable users see the channel pointer repinned to the last known good build.
  mutability:
    mutability_class: immutable_version_mutable_pointer
    immutable_fields:
      - target_artifact_digest
      - exact_build_identity_ref
      - rollback_manifest_ref
    mutable_fields:
      - stable_channel_pointer
    repin_allowed: true
    yank_allowed: false
    revoke_allowed: true
    mutability_note: Rollback changes the stable pointer but not the target artifact identity.
  rollback_path:
    rollback_path_class: staged_rollback_manifest
    last_known_good_ref: release_candidate:aureline.1_9_4_stable
    rollback_manifest_ref: update_manifest:stable.rollback.1_9_4
    rollback_window: active until superseded by a repaired stable release
    continuity_note: Rollback preserves docs, support, and evidence refs for the last known good build.
  support_class: public_supported
  auth_source:
    auth_source_class: release_vault_token
    auth_source_ref: authority:release.vault.stable.publisher
    actor_class: release_operator
    authority_policy_ref: artifacts/governance/signing_quorum.yaml#actions.channel_freeze_or_resume
    raw_secret_material_present: false
    disclosure_note: Rollback uses governed stable release authority; no raw credentials appear.
  dry_run:
    availability_class: required_current
    dry_run_ref: dry_run:stable.rollback.1_9_4
    scope_preview_ref: scope_preview:stable.rollback.1_9_4
    generated_at: "2026-04-29T17:55:00Z"
    expires_at: "2026-04-29T21:55:00Z"
    diff_summary: Stable pointer repins from 2.0.0 to 1.9.4 with coordinated support and docs refs.
    blocking_findings: []
  evidence_freshness:
    freshness_class: current
    latest_evidence_at: "2026-04-29T18:00:00Z"
    required_evidence_refs:
      - update_manifest:stable.rollback.1_9_4
      - support_bundle:rollback.2_0_0_to_1_9_4
    waiver_packet_refs: []
    freshness_policy_ref: docs/governance/evidence_freshness_policy.md
    freshness_note: Rollback reconstruction packet is current.
  exact_build_backreferences:
    - artifact_family_class: ide_binary
      artifact_ref: artifact:ide.linux.x86_64.1_9_4
      exact_build_identity_ref: exact_build:ide.linux.x86_64.1_9_4
      build_id: build:release.stable.1_9_4
      provenance_row_refs:
        - provenance:ide.linux.x86_64.1_9_4
      about_provenance_row_refs:
        - about:provenance.ide.linux.x86_64.1_9_4
      support_bundle_refs:
        - support_bundle:rollback.2_0_0_to_1_9_4
  surface_parity_links:
    release_center_event_ref: release_center:stable.rollback.2026_04_29
    headless_command_ref: headless_publish:stable.rollback.1_9_4
    update_manifest_refs:
      - update_manifest:stable.rollback.1_9_4
    about_provenance_refs:
      - about:provenance.ide.linux.x86_64.1_9_4
    service_health_refs:
      - service_health:stable.rollback.active
    advisory_refs: []
    rollback_record_refs:
      - rollback:stable.2_0_0_to_1_9_4
    support_bundle_refs:
      - support_bundle:rollback.2_0_0_to_1_9_4
  pre_action_disclosure:
    target_scope_visible: true
    auth_source_visible: true
    audience_visible: true
    mutability_visible: true
    dry_run_state_visible: true
    rollback_path_visible: true
    exact_build_linkage_visible: true
    support_linkage_visible: true
  notes: Stable rollback target preserves support-bundle linkage before and after action.

