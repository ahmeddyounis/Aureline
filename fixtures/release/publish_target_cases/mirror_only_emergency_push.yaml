    continuity_note: Mirror can supersede the snapshot with a newer signed emergency action or return to the prior verified snapshot.
  support_class: mirror_operator_supported
  auth_source:
    auth_source_class: mirror_operator_receipt
    auth_source_ref: manual_import:customer_a.freeze.2026_04_29
    actor_class: mirror_operator
    authority_policy_ref: docs/security/emergency_distribution_policy.md
    raw_secret_material_present: false
    disclosure_note: Mirror operator presents a manual-import receipt; no vendor channel credential is used.
  dry_run:
    availability_class: supported_current
    dry_run_ref: dry_run:mirror.freeze.customer_a.2026_04_29
