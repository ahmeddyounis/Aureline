    latest_evidence_at: "2026-04-29T17:00:00Z"
    required_evidence_refs:
      - emergency_action:stable.freeze.2026_04_29
      - manual_import:customer_a.freeze.2026_04_29
    waiver_packet_refs: []
    freshness_policy_ref: docs/governance/evidence_freshness_policy.md
