  record_kind: publish_target_record
  publish_target_id: publish_target:customer_mirror.emergency_freeze
  target_class: mirror_feed
  destination_class: customer_mirror_feed
  display_name: Customer mirror emergency freeze feed
  visibility_class: mirror_only
  rollout_ring: mirror_only
  audience:
    audience_class: mirror_operator
    audience_ref: audience:customer_mirror.operators
    deployment_profile_scope:
      - deployment_profile.self_hosted
      - deployment_profile.air_gapped
    resulting_visibility_class: mirror_only
    audience_note: Only mirror-managed and air-gapped admins consume this snapshot.
  mutability:
    mutability_class: mirror_snapshot_supersedable
    immutable_fields:
      - origin_artifact_digest
      - origin_exact_build_identity_ref
      - origin_signature_ref
    mutable_fields:
      - mirror_current_snapshot_pointer
    repin_allowed: true
    yank_allowed: false
    revoke_allowed: true
    mutability_note: Mirror snapshot can be superseded but origin identity and signatures cannot be rewritten.
  rollback_path:
    rollback_path_class: mirror_snapshot_supersedence
    last_known_good_ref: mirror_snapshot:stable.previous_verified
    rollback_manifest_ref: update_manifest:mirror.freeze.supersedence.2026_04_29
