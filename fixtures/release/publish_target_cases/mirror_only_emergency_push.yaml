    headless_command_ref: headless_publish:mirror.freeze.customer_a.2026_04_29
    update_manifest_refs:
      - update_manifest:mirror.freeze.customer_a.2026_04_29
    about_provenance_refs:
      - about:provenance.ide.linux.x86_64.2_0_0
    service_health_refs:
