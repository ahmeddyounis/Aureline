# yaml-language-server: $schema=../../../schemas/release/release_center_object.schema.json
release_center_object_schema_version: 1
record_kind: release_publication_case_record
case_id: release.publish_target.mirror_only_emergency_push
scenario_class: mirror_only_emergency_push
scenario_summary: >
  A customer-managed mirror receives a signed emergency freeze snapshot.
  The action is mirror-only: it preserves origin exact-build identity,
  signer continuity, emergency-action refs, mirror freshness, manual
  import receipt, and support linkage without advancing the public
  stable channel.

