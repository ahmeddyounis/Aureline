# yaml-language-server: $schema=../../../schemas/release/artifact_verification_row.schema.json
$schema: "https://aureline.dev/schemas/release/artifact_verification_row.schema.json"
__fixture__:
  name: mirrored_verified_release_payload_row
  scenario: >
    The same Aureline desktop release payload for stable 2.3.0 was
    retrieved through an enterprise mirror that preserves origin
    signatures. The mirror-continuity verifier validated the
    origin-signed signature, attestation, SBOM, and checksum without
    re-signing them. The verification row binds
    verification_summary_class =
    mirrored_origin_verified_through_continuity, the mirrored
    source-or-origin class with a non-null mirror_ref, and the
    mirror_continuity_verifier. Trust-root pointer resolves to the
    same steady-state release-signing root as the official-verified
    fixture.
  contract_sections:
    - "§3 Verification-row state vocabulary"
    - "§4 Source-or-origin envelope"
    - "§5.1 Signature, attestation, SBOM, checksum"
    - "§5.5 Verifier class"
    - "§7 Mirrored, side-loaded, and offline verification treatment"
    - "§8 Required surface set"
