__fixture__:
  name: rotating_trust_root_dual_signed_overlap_row
  scenario: >
    The Aureline desktop release payload for stable 2.4.0 was signed
    during the active dual-signed overlap window of the
    release-signing root rotation from v3 to v4. The release payload
    carries signatures under both roots; the release-pipeline verifier
    validated both signatures plus the attestation, SBOM, and checksum.
    The verification row binds verification_summary_class =
    rotating_trust_root_pending_review, trust_root_pointer_class =
    trust_root_rotating_dual_signed, and trust_root_rotation_state_ref
    pointing at the dual-signed-overlap rotation state record.
  contract_sections:
    - "§3 Verification-row state vocabulary"
    - "§5.2 Trust-root pointer"
    - "§6.2 Rollout epoch and overlap posture"
    - "§8 Required surface set"
