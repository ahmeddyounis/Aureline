# yaml-language-server: $schema=../../../schemas/release/trust_root_rotation_state.schema.json
$schema: "https://aureline.dev/schemas/release/trust_root_rotation_state.schema.json"
__fixture__:
  name: release_signing_root_current_row
  scenario: >
    The current release-signing trust root for the desktop release-payload
    family. The rotation record describes the steady-state posture: the
    root is current, has rotated once before with a signed continuity
    statement from the predecessor root, and the legacy-grace window of
    that previous rotation has already closed. The verification rows for
    the official-verified and mirrored-verified release payloads bind
    here through trust_root_pointer_class = trust_root_current with
    a null trust_root_rotation_state_ref OR through this rotation
    state's verification_row_refs linkage when the consuming surface
    chooses to surface the rotation history.
  contract_sections:
    - "§5.2 Trust-root pointer"
    - "§6.1 Family identity and current root"
    - "§6.2 Rollout epoch and overlap posture"
    - "§6.3 Continuity statement"
    - "§6.4 Stale-or-rotating state class"
trust_root_rotation_state_schema_version: 1
record_kind: trust_root_rotation_state_record
rotation_state_id: trust_root_rotation_state:release_signing_root.current
emitted_at: "2026-04-30T00:00:00Z"
trust_root_family_class: release_signing_root
current_root:
  root_id: trust_root:release_signing_root.v3
  root_label: "Aureline release signing root v3"
  root_kind_class: sigstore_style_identity_root
  valid_from: "2025-09-01T00:00:00Z"
  valid_until: "2028-09-01T00:00:00Z"
  fingerprint_ref: trust_root_fingerprint:release_signing_root.v3
  issuer_ref: issuer:aureline.release_council
  trust_framework_row_ref: trust_framework_row:release_payloads
rotation_linkage:
  supersedes_root_refs:
    - trust_root_rotation_state:release_signing_root.v2
  revokes_root_refs: []
  successor_root_ref: null
  linked_provenance_stack_exception_ref: null
  rotation_decision_row_ref: decision_index_row:release_signing_root.v3.adoption
  rotation_review_forum_ref: forum:aureline.release_council
continuity_envelope:
  continuity_statement_class: signed_continuity_statement
  continuity_statement_ref: continuity_statement:release_signing_root.v2_to_v3
  continuity_disclosure: >
    The v2 release-signing root signed a continuity statement
    delegating trust to v3; the dual-signed overlap window closed on
    2025-12-01 and the legacy-grace window for v2-signed artifacts
    closed on 2026-03-01.
  overlap_posture_class: single_signed_post_rotation
  overlap_starts_at: null
  overlap_ends_at: null
  legacy_grace_until: null
rollout_envelope:
  rollout_epoch_class: rollout_overlap_ended
  stale_or_rotating_state_class: trust_root_rotated_with_continuity
  rollout_started_at: "2025-09-01T00:00:00Z"
  rollout_overlap_ended_at: "2025-12-01T00:00:00Z"
  rollout_completed_at: null
  next_review_due_at: "2027-03-01T00:00:00Z"
surface_projections:
  - surface_class: release_publication
    projection_mode_class: compact_chip_plus_continuity_summary
    required_fields:
      - current_root.root_id
      - current_root.root_kind_class
      - current_root.valid_from
      - current_root.valid_until
      - rotation_linkage.supersedes_root_refs
      - continuity_envelope.continuity_statement_class
      - continuity_envelope.continuity_statement_ref
      - continuity_envelope.overlap_posture_class
      - rollout_envelope.rollout_epoch_class
      - rollout_envelope.stale_or_rotating_state_class
      - rollout_envelope.next_review_due_at
    projection_note: >
      Release-publication panel renders the rotated-with-continuity
      chip plus the predecessor and continuity-statement refs so the
      reviewer can pivot to the rotation history.
  - surface_class: update_center
    projection_mode_class: compact_chip_only
    required_fields:
      - current_root.root_id
      - current_root.root_kind_class
      - rollout_envelope.stale_or_rotating_state_class
    projection_note: >
      Update-center entry renders the steady-state chip without the
      continuity history (history available through the link).
  - surface_class: install_review_sheet
    projection_mode_class: compact_chip_plus_continuity_summary
    required_fields:
      - current_root.root_id
      - current_root.valid_until
      - continuity_envelope.continuity_statement_class
      - continuity_envelope.overlap_posture_class
      - rollout_envelope.stale_or_rotating_state_class
    projection_note: >
      Install-review sheet renders the continuity summary so the
      installer sees that v3 is the current root and v2 has rotated
      out with continuity preserved.
  - surface_class: about_provenance_panel
    projection_mode_class: full_rotation_review_sheet
    required_fields:
      - current_root.root_id
      - current_root.root_kind_class
      - current_root.valid_from
      - current_root.valid_until
      - rotation_linkage.supersedes_root_refs
      - continuity_envelope.continuity_statement_class
      - continuity_envelope.continuity_statement_ref
      - continuity_envelope.overlap_posture_class
      - rollout_envelope.rollout_epoch_class
      - rollout_envelope.stale_or_rotating_state_class
      - rollout_envelope.next_review_due_at
    projection_note: >
      About provenance panel renders the full rotation review sheet so
      the user can inspect the rotation history without leaving the
      product.
linkage_envelope:
  verification_row_refs:
    - artifact_verification_row:release_payload.desktop.stable.2_3_0.official_verified
    - artifact_verification_row:release_payload.desktop.stable.2_3_0.mirrored_verified
  release_evidence_packet_refs:
    - release_evidence_packet:release_signing_root.v3.adoption
  provenance_badge_refs:
    - provenance_badge:release_payload.desktop.stable.2_3_0.official
  support_bundle_refs:
    - support_bundle:release_signing_root.v3
  mirror_continuity_refs:
    - mirror_continuity:release_signing_root.v3
  advisory_or_compromise_refs: []
  transparency_log_refs:
    - transparency_log:release_signing_root.v3.adoption
export_envelope:
  redaction_class: public_proof_safe
  exportable_to_screenshot: true
  exportable_to_support_bundle: true
  exportable_to_public_proof_packet: true
  exportable_to_offline_review: true
  raw_private_material_excluded: true
  omission_reasons: []
contract_doc_ref: docs/release/artifact_verification_contract.md
trust_framework_rows_ref: artifacts/release/trust_framework_rows.yaml
decision_index_ref: artifacts/governance/decision_index.yaml
notes: >
  Steady-state rotation record for the current release-signing root.
  Bound by the official-verified and mirrored-verified release-payload
  fixtures.
