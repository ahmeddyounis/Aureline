# yaml-language-server: $schema=../../../schemas/release/artifact_verification_row.schema.json
$schema: "https://aureline.dev/schemas/release/artifact_verification_row.schema.json"
__fixture__:
  name: advisory_affected_extension_package_row
  scenario: >
    A verified extension package is affected by an active advisory on
    the artifact family (an upstream dependency advisory that requires
    review even though the artifact's own signature, attestation,
    SBOM, and checksum still validate). The verification row binds
    verification_summary_class = advisory_affected_review_required,
    advisory_or_compromise_class = active_advisory_affecting_family,
    a non-empty advisory_refs array, and the install-review verifier.
    Trust-root pointer resolves to trust_root_current.
  contract_sections:
    - "§3 Verification-row state vocabulary"
    - "§5.4 Advisory-or-compromise class"
    - "§8 Required surface set"
