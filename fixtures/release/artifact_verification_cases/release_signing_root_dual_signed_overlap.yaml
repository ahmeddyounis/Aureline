# yaml-language-server: $schema=../../../schemas/release/trust_root_rotation_state.schema.json
$schema: "https://aureline.dev/schemas/release/trust_root_rotation_state.schema.json"
__fixture__:
  name: release_signing_root_dual_signed_overlap
  scenario: >
    The release-signing trust root is mid-rotation: a successor root
    has been published and is signed by the predecessor root through a
    signed continuity statement, and the rollout is in the active
    dual-signed overlap window. Release artifacts ship with two
    signatures (one under v3, one under v4) so installers anchored on
    either root continue to validate. The rotating-trust-root
    verification row binds here through trust_root_pointer_class =
    trust_root_rotating_dual_signed and trust_root_rotation_state_ref
    pointing at this record.
  contract_sections:
    - "§5.2 Trust-root pointer"
    - "§6.1 Family identity and current root"
    - "§6.2 Rollout epoch and overlap posture"
    - "§6.3 Continuity statement"
    - "§6.4 Stale-or-rotating state class"
trust_root_rotation_state_schema_version: 1
record_kind: trust_root_rotation_state_record
rotation_state_id: trust_root_rotation_state:release_signing_root.v3_to_v4_overlap
emitted_at: "2026-04-30T00:00:00Z"
trust_root_family_class: release_signing_root
current_root:
  root_id: trust_root:release_signing_root.v4
  root_label: "Aureline release signing root v4 (dual-signed overlap)"
  root_kind_class: sigstore_style_identity_root
  valid_from: "2026-04-01T00:00:00Z"
  valid_until: "2029-04-01T00:00:00Z"
  fingerprint_ref: trust_root_fingerprint:release_signing_root.v4
  issuer_ref: issuer:aureline.release_council
  trust_framework_row_ref: trust_framework_row:release_payloads
rotation_linkage:
  supersedes_root_refs:
    - trust_root_rotation_state:release_signing_root.current
  revokes_root_refs: []
  successor_root_ref: null
  linked_provenance_stack_exception_ref: null
  rotation_decision_row_ref: decision_index_row:release_signing_root.v4.adoption
  rotation_review_forum_ref: forum:aureline.release_council
continuity_envelope:
  continuity_statement_class: signed_continuity_statement
  continuity_statement_ref: continuity_statement:release_signing_root.v3_to_v4
  continuity_disclosure: >
    The v3 release-signing root has signed a continuity statement
    delegating trust to v4; release artifacts during the overlap window
    carry signatures under both roots. The overlap window runs from
    2026-04-01 to 2026-07-01.
  overlap_posture_class: dual_signed_overlap
  overlap_starts_at: "2026-04-01T00:00:00Z"
  overlap_ends_at: "2026-07-01T00:00:00Z"
  legacy_grace_until: null
rollout_envelope:
  rollout_epoch_class: rollout_active_overlap_period
  stale_or_rotating_state_class: trust_root_rotating_dual_signed
  rollout_started_at: "2026-04-01T00:00:00Z"
  rollout_overlap_ended_at: null
  rollout_completed_at: null
  next_review_due_at: "2026-07-01T00:00:00Z"
surface_projections:
  - surface_class: release_publication
    projection_mode_class: full_rotation_review_sheet
    required_fields:
      - current_root.root_id
      - current_root.root_kind_class
      - current_root.valid_from
      - current_root.valid_until
      - rotation_linkage.supersedes_root_refs
      - continuity_envelope.continuity_statement_class
      - continuity_envelope.continuity_statement_ref
      - continuity_envelope.overlap_posture_class
      - continuity_envelope.overlap_starts_at
      - continuity_envelope.overlap_ends_at
      - rollout_envelope.rollout_epoch_class
      - rollout_envelope.stale_or_rotating_state_class
      - rollout_envelope.next_review_due_at
    projection_note: >
      Release-publication panel renders the full rotation review sheet
      so the reviewer sees both roots, the continuity statement, and
      the overlap window before approving promotion.
  - surface_class: update_center
    projection_mode_class: compact_chip_plus_continuity_summary
    required_fields:
      - current_root.root_id
      - rotation_linkage.supersedes_root_refs
      - continuity_envelope.overlap_posture_class
      - continuity_envelope.overlap_ends_at
      - rollout_envelope.stale_or_rotating_state_class
    projection_note: >
      Update-center renders the dual-signed overlap chip plus the
      overlap window so the user knows the rotation is in flight.
  - surface_class: install_review_sheet
    projection_mode_class: compact_chip_plus_continuity_summary
    required_fields:
      - current_root.root_id
      - current_root.valid_until
      - rotation_linkage.supersedes_root_refs
      - continuity_envelope.continuity_statement_class
      - continuity_envelope.overlap_posture_class
      - continuity_envelope.overlap_ends_at
      - rollout_envelope.stale_or_rotating_state_class
    projection_note: >
      Install-review sheet renders the dual-signed overlap chip plus
      the continuity summary so the installer sees that this artifact
      is currently signed under both roots.
  - surface_class: about_provenance_panel
    projection_mode_class: full_rotation_review_sheet
    required_fields:
      - current_root.root_id
      - current_root.root_kind_class
      - current_root.valid_from
      - current_root.valid_until
      - rotation_linkage.supersedes_root_refs
      - continuity_envelope.continuity_statement_class
      - continuity_envelope.continuity_statement_ref
      - continuity_envelope.overlap_posture_class
      - continuity_envelope.overlap_starts_at
      - continuity_envelope.overlap_ends_at
      - rollout_envelope.rollout_epoch_class
      - rollout_envelope.stale_or_rotating_state_class
      - rollout_envelope.next_review_due_at
    projection_note: >
      About provenance panel renders the full rotation review sheet so
      the user can inspect the rotation transition without leaving the
      product.
linkage_envelope:
  verification_row_refs:
    - artifact_verification_row:release_payload.desktop.stable.2_4_0.rotating_dual_signed
  release_evidence_packet_refs:
    - release_evidence_packet:release_signing_root.v4.adoption
  provenance_badge_refs:
    - provenance_badge:release_payload.desktop.stable.2_4_0.official
  support_bundle_refs:
    - support_bundle:release_signing_root.v3_to_v4_overlap
  mirror_continuity_refs:
    - mirror_continuity:release_signing_root.v4
  advisory_or_compromise_refs: []
  transparency_log_refs:
    - transparency_log:release_signing_root.v4.adoption
export_envelope:
  redaction_class: public_proof_safe
  exportable_to_screenshot: true
  exportable_to_support_bundle: true
  exportable_to_public_proof_packet: true
  exportable_to_offline_review: true
  raw_private_material_excluded: true
  omission_reasons: []
contract_doc_ref: docs/release/artifact_verification_contract.md
trust_framework_rows_ref: artifacts/release/trust_framework_rows.yaml
decision_index_ref: artifacts/governance/decision_index.yaml
notes: >
  Active dual-signed overlap rotation record for the release-signing
  root. Bound by the rotating-trust-root verification row fixture so a
  consuming surface can route the verification row to this rotation
  state in O(1).
