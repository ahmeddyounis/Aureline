# yaml-language-server: $schema=../../../schemas/release/artifact_verification_row.schema.json
$schema: "https://aureline.dev/schemas/release/artifact_verification_row.schema.json"
__fixture__:
  name: side_loaded_publisher_asserted_extension_row
  scenario: >
    A user side-loaded an extension package from a workspace archive
    on local media. The extension carries a publisher signature claim
    but no local verification has occurred; the install-review verifier
    has not yet validated the signature against the publisher trust
    root. The verification row binds verification_summary_class =
    publisher_asserted, the side_loaded source class with a non-null
    side_load_review_ref, the
    publisher_asserted_no_local_verification verifier, the
    side_loaded_publisher_asserted_only mirror-or-offline class, a
    null verified_at, and a null verification_log_ref. Signature,
    attestation, SBOM, and checksum states all project the
    publisher_asserted projections.
  contract_sections:
    - "§3 Verification-row state vocabulary"
    - "§4 Source-or-origin envelope"
    - "§5.1 Signature, attestation, SBOM, checksum"
    - "§5.5 Verifier class"
    - "§7 Mirrored, side-loaded, and offline verification treatment"
    - "§8 Required surface set"
