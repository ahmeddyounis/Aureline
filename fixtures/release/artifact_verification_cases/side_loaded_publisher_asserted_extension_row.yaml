  verification_log_ref: null
  verification_evidence_refs:
    - publisher_attestation_claim:partner_lint_pack.2_1_0
    - sbom_artifact:partner_lint_pack.2_1_0.spdx_publisher_asserted
  verification_disclosure: >
    Publisher claim only. The signature, attestation, SBOM, and
    checksum are asserted by the publisher; no local verification has
    occurred. The trust-root pointer is unknown until install review
    validates against a configured publisher trust root.
