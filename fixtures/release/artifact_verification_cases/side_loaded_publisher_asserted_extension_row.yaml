      - source_or_origin_class
      - signature_state_class
      - mirror_or_offline_class
      - verified_at
    projection_note: >
      Update-center entry renders the publisher-asserted chip without
      promoting the artifact (no local verification has occurred).
  - surface_class: install_review_sheet
    projection_mode_class: full_review_sheet
