# yaml-language-server: $schema=../../../schemas/release/artifact_verification_row.schema.json
$schema: "https://aureline.dev/schemas/release/artifact_verification_row.schema.json"
__fixture__:
  name: official_verified_release_payload_row
  scenario: >
    The official Aureline desktop release payload for stable 2.3.0 has
    been retrieved from the release pipeline, signed by the current
    release-signing root v3, and validated end to end by the
    release-pipeline verifier (signature, attestation, SBOM, checksum).
    The verification log entry pins the verifier identity and the
    moment of verification. The row binds trust_root_pointer_class =
    trust_root_current with a null trust_root_rotation_state_ref
    because no rotation is in flight; the linked rotation-state record
    documents the steady-state posture if the consuming surface wants
    to surface the rotation history.
  contract_sections:
    - "§3 Verification-row state vocabulary"
    - "§4 Source-or-origin envelope"
    - "§5.1 Signature, attestation, SBOM, checksum"
    - "§5.5 Verifier class"
    - "§7 Mirrored, side-loaded, and offline verification treatment"
    - "§8 Required surface set"
artifact_verification_row_schema_version: 1
