      - advisory_or_compromise_class
      - verified_at
      - verification_log_ref
      - verification_evidence_refs
    projection_note: >
      Release-publication panel renders the full review sheet so a
      reviewer sees the entire proof chain.
  - surface_class: update_center
    projection_mode_class: compact_row_plus_proof_chain
    required_fields:
      - verification_summary_class
      - source_or_origin_class
      - signature_state_class
      - attestation_state_class
      - sbom_availability_class
      - trust_root_pointer_class
      - verified_at
    projection_note: >
      Update-center entry renders the compact row plus the link to the
      proof chain.
  - surface_class: install_review_sheet
    projection_mode_class: compact_row_plus_proof_chain
    required_fields:
      - verification_summary_class
      - source_or_origin_class
      - signature_state_class
      - attestation_state_class
      - sbom_availability_class
      - checksum_state_class
      - trust_root_pointer_class
      - mirror_or_offline_class
      - verified_at
      - verification_log_ref
