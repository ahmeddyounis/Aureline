# yaml-language-server: $schema=../../../schemas/release/release_provenance_crosswalk.schema.json
release_provenance_crosswalk_schema_version: 1
record_kind: release_center_linkage_case_record
case_id: release.linkage.support_bundle_docs_stale
scenario_class: support_bundle_docs_stale_or_unavailable
scenario_summary: >
  A support bundle captured from a released build whose docs pack is
  stale or unavailable at capture time. The provenance line narrows to
  disclose docs staleness; ids stay anchored to the same exact build.
channel_class: stable

exact_build_identity_set:
  primary_exact_build_identity_ref: exact_build:ide.macos.arm64.2_1_0
  related_exact_build_identity_refs: []

release_center_linkage_refs:
  release_candidate_ref: release_candidate:aureline.2_1_0_stable
  release_center_event_ref: release_center:stable.support_capture.docs_stale.2026_05_06
  publish_target_ref: publish_target:public.stable
  update_manifest_ref: update_manifest:stable.2_1_0

surface_refs:
  about_card_ref: about_card:aureline.2_1_0.docs_stale
  service_health_card_ref: whats_new:service_health.stable.2_1_0.docs_stale
  advisory_refs: []
  rollback_record_refs: []
  support_bundle_refs:
    - support_bundle:stable.2_1_0.docs_stale

exact_build_backreferences:
  - artifact_family_class: ide_binary
    artifact_ref: artifact:ide.macos.arm64.2_1_0
    exact_build_identity_ref: exact_build:ide.macos.arm64.2_1_0
    build_id: build:release.stable.2_1_0.macos.arm64
    digest_refs:
      - digest:ide.macos.arm64.2_1_0
    provenance_row_refs:
      - provenance:ide.macos.arm64.2_1_0
    about_provenance_row_refs:
      - about:provenance.ide.macos.arm64.2_1_0
    support_bundle_refs:
      - support_bundle:stable.2_1_0.docs_stale
  - artifact_family_class: docs_pack
    artifact_ref: artifact:docs_pack.2_1_0
    exact_build_identity_ref: exact_build:ide.macos.arm64.2_1_0
    build_id: build:release.stable.2_1_0
    digest_refs:
      - digest:docs_pack.2_1_0
    provenance_row_refs:
      - provenance:docs_pack.2_1_0
    about_provenance_row_refs:
      - about:provenance.docs_pack.2_1_0
    support_bundle_refs:
      - support_bundle:stable.2_1_0.docs_stale

provenance_strings:
  public_provenance_line: >
    Aureline 2.1.0 (stable) — Official — Signature verified — Docs stale/unavailable — exact_build:ide.macos.arm64.2_1_0
  support_bundle_build_truth_note: >
    Build exact_build:ide.macos.arm64.2_1_0 captured with docs pack stale/unavailable; support bundle keeps exact-build refs and narrows docs claims explicitly.

