# yaml-language-server: $schema=../../../schemas/release/release_provenance_crosswalk.schema.json
release_provenance_crosswalk_schema_version: 1
record_kind: release_center_linkage_case_record
case_id: release.linkage.mirrored_release
scenario_class: mirrored_release
scenario_summary: >
  A stable build consumed from an enterprise mirror. The mirror narrows
  freshness/availability but must not mint a new exact-build identity or
  change the provenance line's identity anchor.
channel_class: stable

exact_build_identity_set:
  primary_exact_build_identity_ref: exact_build:ide.linux.x86_64.2_1_0
  related_exact_build_identity_refs:
    - exact_build:cli.linux.x86_64.2_1_0

release_center_linkage_refs:
  release_candidate_ref: release_candidate:aureline.2_1_0_stable
  release_center_event_ref: release_center:stable.mirror.import.2026_05_02
  publish_target_ref: publish_target:mirror_feed.enterprise_a.stable
  update_manifest_ref: update_manifest:stable.enterprise_a.2_1_0

surface_refs:
  about_card_ref: about_card:aureline.2_1_0.enterprise_a
  service_health_card_ref: whats_new:service_health.stable.2_1_0.enterprise_a
  advisory_refs: []
  rollback_record_refs: []
  support_bundle_refs:
    - support_bundle:mirror.enterprise_a.stable.2_1_0

exact_build_backreferences:
  - artifact_family_class: ide_binary
    artifact_ref: artifact:ide.linux.x86_64.2_1_0
    exact_build_identity_ref: exact_build:ide.linux.x86_64.2_1_0
    build_id: build:release.stable.2_1_0.linux.x86_64
    digest_refs:
      - digest:ide.linux.x86_64.2_1_0
    provenance_row_refs:
      - provenance:ide.linux.x86_64.2_1_0
    about_provenance_row_refs:
      - about:provenance.ide.linux.x86_64.2_1_0
    support_bundle_refs:
      - support_bundle:mirror.enterprise_a.stable.2_1_0
  - artifact_family_class: ide_debug_symbols
    artifact_ref: artifact:ide_symbols.linux.x86_64.2_1_0
    exact_build_identity_ref: exact_build:ide.linux.x86_64.2_1_0
    build_id: build:release.stable.2_1_0.linux.x86_64
    digest_refs:
      - digest:ide_symbols.linux.x86_64.2_1_0
    provenance_row_refs:
      - provenance:ide_symbols.linux.x86_64.2_1_0
    about_provenance_row_refs:
      - about:provenance.ide_symbols.linux.x86_64.2_1_0
    support_bundle_refs:
      - support_bundle:mirror.enterprise_a.stable.2_1_0

provenance_strings:
  public_provenance_line: >
    Aureline 2.1.0 (stable) — Mirrored — Signature verified — exact_build:ide.linux.x86_64.2_1_0
  support_bundle_build_truth_note: >
    Build exact_build:ide.linux.x86_64.2_1_0 captured from enterprise mirror; origin identity preserved and support refs remain stable.

