# yaml-language-server: $schema=../../../schemas/release/release_provenance_crosswalk.schema.json
release_provenance_crosswalk_schema_version: 1
record_kind: release_center_linkage_case_record
case_id: release.linkage.hotfix_symbol_update
scenario_class: hotfix_symbol_update
scenario_summary: >
  A hotfix build where debug-symbol / source-map supportability is
  refreshed after initial publication. The supportability artifact refs
  change, but the exact-build identity anchor and release-center linkage
  remain stable.
channel_class: hotfix

exact_build_identity_set:
  primary_exact_build_identity_ref: exact_build:ide.macos.arm64.2_1_1_hotfix
  related_exact_build_identity_refs: []

release_center_linkage_refs:
  release_candidate_ref: release_candidate:aureline.2_1_1_hotfix
  release_center_event_ref: release_center:hotfix.symbol_refresh.2026_05_03
  publish_target_ref: publish_target:public.hotfix
  update_manifest_ref: update_manifest:hotfix.2_1_1

surface_refs:
  about_card_ref: about_card:aureline.2_1_1_hotfix
  service_health_card_ref: whats_new:service_health.hotfix.2_1_1
  advisory_refs: []
  rollback_record_refs: []
  support_bundle_refs:
    - support_bundle:hotfix.2_1_1.symbol_refresh

exact_build_backreferences:
  - artifact_family_class: ide_binary
    artifact_ref: artifact:ide.macos.arm64.2_1_1_hotfix
    exact_build_identity_ref: exact_build:ide.macos.arm64.2_1_1_hotfix
    build_id: build:release.hotfix.2_1_1.macos.arm64
    digest_refs:
      - digest:ide.macos.arm64.2_1_1_hotfix
    provenance_row_refs:
      - provenance:ide.macos.arm64.2_1_1_hotfix
    about_provenance_row_refs:
      - about:provenance.ide.macos.arm64.2_1_1_hotfix
    support_bundle_refs:
      - support_bundle:hotfix.2_1_1.symbol_refresh
  - artifact_family_class: ide_debug_symbols
    artifact_ref: artifact:ide_symbols.macos.arm64.2_1_1_hotfix.v2
    exact_build_identity_ref: exact_build:ide.macos.arm64.2_1_1_hotfix
    build_id: build:release.hotfix.2_1_1.macos.arm64
    digest_refs:
      - digest:ide_symbols.macos.arm64.2_1_1_hotfix.v2
    provenance_row_refs:
      - provenance:ide_symbols.macos.arm64.2_1_1_hotfix.v2
    about_provenance_row_refs:
      - about:provenance.ide_symbols.macos.arm64.2_1_1_hotfix
    support_bundle_refs:
      - support_bundle:hotfix.2_1_1.symbol_refresh
  - artifact_family_class: source_map_bundle
    artifact_ref: artifact:sourcemaps.web.2_1_1_hotfix.v2
    exact_build_identity_ref: exact_build:ide.macos.arm64.2_1_1_hotfix
    build_id: build:release.hotfix.2_1_1.web
    digest_refs:
      - digest:sourcemaps.web.2_1_1_hotfix.v2
    provenance_row_refs:
      - provenance:sourcemaps.web.2_1_1_hotfix.v2
    about_provenance_row_refs:
      - about:provenance.sourcemaps.web.2_1_1_hotfix
    support_bundle_refs:
      - support_bundle:hotfix.2_1_1.symbol_refresh

provenance_strings:
  public_provenance_line: >
    Aureline 2.1.1 (hotfix) — Official — Signature verified — exact_build:ide.macos.arm64.2_1_1_hotfix
  support_bundle_build_truth_note: >
    Build exact_build:ide.macos.arm64.2_1_1_hotfix captured after symbol refresh; updated symbol/source-map refs attached without changing build identity.

