# yaml-language-server: $schema=../../../schemas/release/release_provenance_crosswalk.schema.json
release_provenance_crosswalk_schema_version: 1
record_kind: release_center_linkage_case_record
case_id: release.linkage.revoked_artifact
scenario_class: revoked_artifact
scenario_summary: >
  A stable artifact is revoked after publication. All surfaces keep the
  same exact-build identity refs but narrow the provenance line to
  disclose revocation state and support posture.
channel_class: stable

exact_build_identity_set:
  primary_exact_build_identity_ref: exact_build:ide.windows.x86_64.2_1_0
  related_exact_build_identity_refs: []

release_center_linkage_refs:
  release_candidate_ref: release_candidate:aureline.2_1_0_revoked
  release_center_event_ref: release_center:stable.revoke.2026_05_04
  publish_target_ref: publish_target:public.stable
  update_manifest_ref: update_manifest:stable.2_1_0.revoked

surface_refs:
  about_card_ref: about_card:aureline.2_1_0.revoked
  service_health_card_ref: whats_new:service_health.stable.2_1_0.revoked
  advisory_refs:
    - advisory:security.revocation.2_1_0.windows
  rollback_record_refs:
    - rollback:stable.2_1_0.to.2_0_3
  support_bundle_refs:
    - support_bundle:revocation.stable.2_1_0.windows

exact_build_backreferences:
  - artifact_family_class: ide_binary
    artifact_ref: artifact:ide.windows.x86_64.2_1_0
    exact_build_identity_ref: exact_build:ide.windows.x86_64.2_1_0
    build_id: build:release.stable.2_1_0.windows.x86_64
    digest_refs:
      - digest:ide.windows.x86_64.2_1_0
    provenance_row_refs:
      - provenance:ide.windows.x86_64.2_1_0
    about_provenance_row_refs:
      - about:provenance.ide.windows.x86_64.2_1_0
    support_bundle_refs:
      - support_bundle:revocation.stable.2_1_0.windows

provenance_strings:
  public_provenance_line: >
    Aureline 2.1.0 (stable) — Official — Signature verified — Revoked — exact_build:ide.windows.x86_64.2_1_0
  support_bundle_build_truth_note: >
    Build exact_build:ide.windows.x86_64.2_1_0 captured during revocation; support bundle includes advisory and rollback refs for reconstruction.

