# yaml-language-server: $schema=../../../schemas/release/whats_new_card.schema.json
__fixture__:
  name: cached_release_note_feed
  scenario: >
    An air-gapped enterprise reads release notes for stable 2.1.0
    through an offline-bundle import; the live release-note feed is
    not reachable. The update-detail view is rendered from the
    imported_historical snapshot with a non-current freshness class
    and an explicit stale label, while the four service tiers remain
    separate and the local machine stays healthy.
  linked_docs:
    - docs/release/release_notes_whats_new_service_health_contract.md
    - schemas/release/whats_new_card.schema.json
    - docs/release/release_status_surface_contract.md
    - docs/release/update_and_rollback_contract.md

