    advisory_ref: null
    deprecation_replacement_ref: null
service_health_panel:
  rows:
    - row_id: whats_new_health_row:local_machine.air_gapped_healthy
      service_tier_class: local_machine
      service_label: Local desktop build
      health_state_class: healthy
      data_source_class: live
      freshness_class: current
      outage_notice_ref: null
      maintenance_notice_ref: null
      boundary_truth_disclosure: >
        The local build is healthy and unaffected by the offline
        release-note feed source.
      row_disclosure: >
        Editor, save, search, Git, and local export work normally.
    - row_id: whats_new_health_row:remote_target.none_attached_offline
      service_tier_class: remote_target
      service_label: Remote target
      health_state_class: not_applicable
      data_source_class: live
      freshness_class: not_applicable
      outage_notice_ref: null
      maintenance_notice_ref: null
      boundary_truth_disclosure: >
        No remote target is attached; the row stays explicit so
        air-gap silence is not read as 'all good'.
      row_disclosure: >
        Remote-target health is not applicable for this workflow.
    - row_id: whats_new_health_row:enterprise_control_plane.air_gapped
      service_tier_class: enterprise_control_plane
      service_label: Enterprise control plane
      health_state_class: policy_limited
      data_source_class: offline_bundle
      freshness_class: imported_historical
      outage_notice_ref: null
      maintenance_notice_ref: null
      boundary_truth_disclosure: >
        Air-gapped deployment profile policy-limits live reachability
        to the enterprise control plane; the imported snapshot is the
        only known state.
      row_disclosure: >
        Control-plane state is shown from the imported bundle, not
        live.
    - row_id: whats_new_health_row:optional_addon.air_gapped
      service_tier_class: optional_vendor_hosted_service
      service_label: Optional vendor-hosted add-ons
      health_state_class: policy_limited
      data_source_class: offline_bundle
      freshness_class: imported_historical
      outage_notice_ref: null
      maintenance_notice_ref: null
      boundary_truth_disclosure: >
        Vendor-hosted add-ons are policy-limited under the air-gapped
        deployment profile; the imported bundle records the last-known
        availability state.
      row_disclosure: >
        Vendor-hosted add-ons are policy-limited and the snapshot is
        imported.
  panel_disclosure: >
    All four tiers are explicit; the air-gapped policy posture is
    visible separately from any active outage.
freshness_state:
  data_source_class: offline_bundle
  freshness_class: imported_historical
  last_refreshed_at: "2026-04-22T08:00:00Z"
  stale_after: P30D
  stale_label: >
    Imported offline release-note bundle from 2026-04-22; refresh
    requires importing a newer bundle.
  boundary_truth_disclosure: >
    The imported snapshot can prove what was published as of the
    bundle's import time, but cannot prove live release-feed state.
admin_note:
