    known_limit_refs: []
    migration_guide_ref: null
    admin_action_ref: null
    advisory_ref: null
    deprecation_replacement_ref: null
  - entry_id: whats_new_entry:editor.autosave_default_changed_offline
    change_class: changed
    scope_class: ide_binary
    title: Autosave debounce default changed for new installs
    body: >
      The default autosave debounce changes for new installs; the
      setting remains user reversible and is documented in the
      offline migration guide.
    behavior_change_kind_class: default_changed
    reversibility_class: reversible_via_user_setting
    applies_before_restart: false
    evidence_refs:
      - release_evidence:stable.2_1_0.autosave_default_change
    known_limit_refs:
