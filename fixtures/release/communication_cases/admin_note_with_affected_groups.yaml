__fixture__:
  name: admin_note_with_affected_groups
  scenario: >
    A fleet admin is reviewing the release-communication card for the
    stable 2.1.0 promotion across two fleet rings, two tenants, and a
    sandboxed-extension policy class. The card carries an
    admin_action_required entry asking admins to accept a refreshed
    extension policy bundle, links the named affected groups, and
    routes to fleet-admin and security-officer audiences.
  linked_docs:
    - docs/release/release_notes_whats_new_service_health_contract.md
    - schemas/release/whats_new_card.schema.json
    - docs/admin/org_admin_seat_lifecycle_contract.md
    - docs/release/release_status_surface_contract.md

