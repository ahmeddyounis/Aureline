# yaml-language-server: $schema=../../../schemas/release/whats_new_card.schema.json
__fixture__:
  name: post_upgrade_whats_new_card
  scenario: >
    A user has just upgraded the desktop build from 2.0.4 to 2.1.0 and
    re-opened the editor. The post-upgrade what's-new card surfaces
    additive features, one behavior change, one security advisory, and
    one deprecation, with current freshness and an all-healthy
    service-health snapshot. The card is reopenable from the Help
    menu, command palette, and settings release pane, and it does not
    block typing, save, or recovery.
  linked_docs:
    - docs/release/release_notes_whats_new_service_health_contract.md
    - schemas/release/whats_new_card.schema.json
    - docs/release/release_status_surface_contract.md

whats_new_card_schema_version: 1
record_kind: whats_new_card_record
card_id: whats_new_card:desktop.stable.2_1_0.post_upgrade
card_class: whats_new_post_upgrade
emitted_at: "2026-04-29T17:30:00Z"
card_summary: >
  Stable desktop 2.1.0 is now running. Two additive features, one
  behavior change behind a setting, one security advisory, and one
  deprecation are documented; all four service tiers are healthy.
subject:
  product_name_class: aureline
  channel_class: stable
  version_label: 2.1.0
  prior_version_label: 2.0.4
  exact_build_identity_ref: exact_build:desktop.macos.universal.2_1_0
  release_candidate_card_ref: release_status_card:stable.2_1_0
  update_manifest_ref: update_manifest:stable.public.2_1_0
  subject_disclosure: >
    Card is the post-upgrade what's-new view for stable desktop 2.1.0
    promoted from the public stable channel.
change_entries:
  - entry_id: whats_new_entry:editor.fold_collapse_command
    change_class: new
    scope_class: ide_binary
    title: New collapse-fold-tree command for nested code regions
    body: >
      Adds a command-palette entry that collapses the entire fold tree
      under the current cursor. No prior shortcut or behavior is
      affected.
    behavior_change_kind_class: no_behavior_change
    reversibility_class: reversible_via_user_setting
    applies_before_restart: false
    evidence_refs:
      - release_evidence:stable.2_1_0.editor_fold_command
    known_limit_refs: []
    migration_guide_ref: null
    admin_action_ref: null
    advisory_ref: null
    deprecation_replacement_ref: null
  - entry_id: whats_new_entry:editor.autosave_default_changed
    change_class: changed
    scope_class: ide_binary
    title: Autosave debounce default lowered from 1000 ms to 400 ms
    body: >
      The default autosave debounce changes for new installs; existing
      users keep their current setting. The setting remains user
      reversible from the editor preferences pane.
    behavior_change_kind_class: default_changed
    reversibility_class: reversible_via_user_setting
    applies_before_restart: false
    evidence_refs:
      - release_evidence:stable.2_1_0.autosave_default_change
      - promotion_timeline_entry:stable.2_1_0.autosave_promotion
    known_limit_refs:
      - known_limit:autosave.first_run_setting_migration
    migration_guide_ref: null
    admin_action_ref: null
    advisory_ref: null
    deprecation_replacement_ref: null
  - entry_id: whats_new_entry:supply_chain.advisory_2026_04_19
    change_class: security
    scope_class: supply_chain_artifact
    title: Security advisory 2026-04-19 mitigated in 2.1.0
    body: >
      Mitigates a transitive dependency advisory referenced in the
      supply-chain advisory record. No customer action is required for
      builds taken through the official update feed.
    behavior_change_kind_class: no_behavior_change
    reversibility_class: not_applicable
    applies_before_restart: false
    evidence_refs:
      - release_evidence:stable.2_1_0.advisory_mitigation
    known_limit_refs:
      - known_limit:advisory.2026_04_19.followup_review
    migration_guide_ref: null
    admin_action_ref: null
    advisory_ref: advisory:2026_04_19.transitive_dependency
    deprecation_replacement_ref: null
  - entry_id: whats_new_entry:cli.legacy_init_subcommand_deprecation
    change_class: deprecated
    scope_class: cli
    title: aureline init --legacy is deprecated
    body: >
      The legacy CLI init subcommand is deprecated; the replacement
      subcommand offers the same scaffolding and is documented in the
      destination descriptor that this entry references.
    behavior_change_kind_class: deprecation_warning_only
    reversibility_class: not_applicable
    applies_before_restart: false
    evidence_refs:
      - release_evidence:stable.2_1_0.cli_init_deprecation
    known_limit_refs:
      - known_limit:cli.legacy_init.removal_target
    migration_guide_ref: docs:cli.init.replacement_guide
    admin_action_ref: null
    advisory_ref: null
    deprecation_replacement_ref: cli_subcommand:aureline.init.modern
