# yaml-language-server: $schema=../../../schemas/release/whats_new_card.schema.json
__fixture__:
  name: breaking_change_notice_before_restart
  scenario: >
    Update review is rendering the breaking-change notice for the
    pending stable 3.0.0 upgrade. The build introduces a schema-export
    schema-epoch change that is irreversible after restart, plus a
    workspace-state migration the user must confirm. The notice
    surfaces both as 'migration required' and 'changed (schema
    changed)' entries, links a release-candidate card and an update
    manifest, and is not user-dismissible without reading.
  linked_docs:
    - docs/release/release_notes_whats_new_service_health_contract.md
    - schemas/release/whats_new_card.schema.json
    - docs/release/release_status_surface_contract.md
    - docs/release/update_and_rollback_contract.md

whats_new_card_schema_version: 1
record_kind: whats_new_card_record
card_id: whats_new_card:desktop.stable.3_0_0.breaking_change
card_class: breaking_change_notice
emitted_at: "2026-04-29T17:45:00Z"
card_summary: >
  Stable 3.0.0 introduces a schema-epoch change for schema exports and
  a workspace-state migration. Both must be confirmed before the
  restart that lands the upgrade.
subject:
  product_name_class: aureline
  channel_class: stable
  version_label: 3.0.0
  prior_version_label: 2.1.0
  exact_build_identity_ref: exact_build:desktop.macos.universal.3_0_0
  release_candidate_card_ref: release_status_card:stable.3_0_0
  update_manifest_ref: update_manifest:stable.public.3_0_0
  subject_disclosure: >
    Card is the breaking-change notice for the stable 3.0.0 upgrade
    rendered before restart.
change_entries:
  - entry_id: whats_new_entry:schema_export.schema_epoch_3_0_0
    change_class: changed
    scope_class: schema_export
    title: Schema-export schema-epoch advances from 2 to 3
    body: >
      Schema exports written by 3.0.0 are not readable by 2.x clients;
      consumers MUST regenerate or pin a version-aware reader before
      ingesting schemas produced after upgrade.
    behavior_change_kind_class: schema_changed
    reversibility_class: irreversible_after_restart
    applies_before_restart: true
    evidence_refs:
      - release_evidence:stable.3_0_0.schema_epoch_advance
      - promotion_timeline_entry:stable.3_0_0.schema_epoch_promotion
    known_limit_refs:
      - known_limit:schema_export.epoch3.legacy_consumer_window
    migration_guide_ref: null
    admin_action_ref: null
    advisory_ref: null
    deprecation_replacement_ref: null
  - entry_id: whats_new_entry:workspace_state.migration_3_0_0
    change_class: migration_required
    scope_class: ide_binary
    title: Workspace-state migration required for 3.0.0
    body: >
      The workspace-state store changes shape; an in-place migration
      runs once on first launch and is irreversible after migration
      completes. The migration guide describes a backup-and-rollback
      path for users who need to defer.
    behavior_change_kind_class: schema_changed
    reversibility_class: irreversible_after_migration
    applies_before_restart: true
    evidence_refs:
      - release_evidence:stable.3_0_0.workspace_migration
    known_limit_refs:
      - known_limit:workspace_migration.large_workspace_review
      - known_limit:workspace_migration.shared_state_partial_recovery
    migration_guide_ref: docs:workspace.state_migration_3_0_0
    admin_action_ref: null
    advisory_ref: null
    deprecation_replacement_ref: null
