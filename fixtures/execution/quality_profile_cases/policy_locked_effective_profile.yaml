# yaml-language-server: $schema=../../../schemas/execution/quality_profile.schema.json
__fixture__:
  name: policy_locked_effective_profile
  scenario: >
    The workspace requested its local Rust quality profile, but an
    organization policy pins the formatter and scanner rule pack. The
    effective profile preserves the shadowed workspace/profile sources,
    names the policy lock reason, and exports profile drift so desktop,
    CLI, managed CI, and support surfaces explain the same selection.
  exercised_classes_summary:
    record_kind: effective_quality_profile_record
    surface_class: desktop_on_save
    profile_drift_class: effective_profile_differs
    lock_state_class: policy_locked
    lock_reason_class: admin_policy_pins_rule_pack

record_kind: effective_quality_profile_record
quality_profile_schema_version: 1
effective_quality_profile_id: quality.profile.effective.rust.policy_locked.0001
workspace_ref: workspace.repo.aureline
target_scope_class: workspace
surface_class: desktop_on_save
resolved_at: "2026-04-26T18:40:00Z"
resolution_summary: >
  Managed policy selected the formatter and scanner rule pack; the local
  workspace profile remains visible as a shadowed source.

precedence_stack:
  - precedence_rank: 0
    precedence_layer_class: policy_lock_or_managed_profile
    source_state_class: selected_winner
    source_profile_class: effective_profile
    source_ref: policy.bundle.quality.regulated
    candidate_profile_ref: quality.profile.policy.regulated.rust
    lock_state_class: policy_locked
    lock_reason_class: admin_policy_pins_rule_pack
    downgrade_reason_class: policy_narrowed_mutation
    imported_settings:
      import_format_class: none
      import_mapping_state_class: not_imported
      source_artifact_ref: null
      preserved_raw_payload_ref: null
      unmapped_key_count: 0
      policy_overridden_key_count: 0
      summary: No imported tool config participated in this layer.
    environment_conditions:
      - condition_class: deployment_profile
        state_class: satisfied
        condition_ref: deployment_profile.managed_regulated
        summary: Managed profile requires the pinned rule pack.
    provider_tool_identity_refs:
      - quality.tool.rustfmt.stable
      - quality.tool.secret_scan.managed
    summary: Policy layer pins the formatter channel and scanner rule pack.
  - precedence_rank: 3
    precedence_layer_class: workspace_quality_settings
    source_state_class: shadowed_by_higher_precedence
    source_profile_class: local_profile
    source_ref: workspace.quality.rust.local
    candidate_profile_ref: quality.profile.local.rust
    lock_state_class: unlocked
    lock_reason_class: none
    downgrade_reason_class: none
    imported_settings:
      import_format_class: formatter_native_config
      import_mapping_state_class: exact
      source_artifact_ref: config.rustfmt.workspace
      preserved_raw_payload_ref: raw.config.rustfmt.workspace
      unmapped_key_count: 0
      policy_overridden_key_count: 1
      summary: Workspace formatter config was parsed, but one value was pinned by policy.
    environment_conditions:
      - condition_class: workspace_trust
        state_class: satisfied
        condition_ref: trust_state.workspace_trusted
        summary: Workspace trust permits local formatter execution.
    provider_tool_identity_refs:
      - quality.tool.rustfmt.local
    summary: Workspace profile was valid but shadowed by the policy lock.

effective_tool_bindings:
  - binding_id: quality.binding.formatter.rustfmt.policy
    provider_tool_identity:
      tool_family_class: formatter
      provider_kind_class: external_cli_tool
      locality_class: local_sidecar
      provider_authority_class: local_authoritative
      support_class: first_party_supported
      tool_id: rustfmt
      tool_version: 1.8.0
      adapter_id: aureline.adapter.rustfmt
      adapter_version: 0.1.0
      toolchain_digest: digest.rust.toolchain.stable.1_80
      rule_pack_ref: null
      config_digest: digest.config.rustfmt.policy.0001
      invocation_digest: digest.invocation.rustfmt.policy.0001
    effective_state_class: selected_winner
    lock_state_class: policy_locked
    lock_reason_class: admin_policy_pins_tool
    downgrade_reason_class: policy_narrowed_mutation
    baseline_family_ref: null
    suppression_policy_refs: []
    summary: Formatter command is pinned by policy but still executes locally.
  - binding_id: quality.binding.scanner.secret.policy
    provider_tool_identity:
      tool_family_class: secret_scanner
      provider_kind_class: managed_provider
      locality_class: managed_service
      provider_authority_class: managed_ci_authoritative
      support_class: policy_governed
      tool_id: managed_secret_scan
      tool_version: 2026.04.1
      adapter_id: aureline.adapter.managed_scan
      adapter_version: 0.1.0
      toolchain_digest: digest.scanner.managed.2026_04
      rule_pack_ref: rule_pack.secret_scan.regulated.2026_04
      config_digest: digest.config.secret_scan.policy.0001
      invocation_digest: digest.invocation.secret_scan.policy.0001
    effective_state_class: selected_winner
    lock_state_class: policy_locked
    lock_reason_class: admin_policy_pins_rule_pack
    downgrade_reason_class: policy_narrowed_mutation
    baseline_family_ref: baseline.secret_scan.regulated
    suppression_policy_refs:
      - suppression.policy.regulated.exceptions
    summary: Managed scanner rule pack is policy authoritative for release-bearing scans.

profile_drift:
  profile_refs:
    local_profile_ref: quality.profile.local.rust
    imported_profile_ref: null
    effective_profile_ref: quality.profile.effective.rust.policy_locked.0001
    remote_provider_profile_ref: quality.profile.managed_ci.secret_scan
  profile_drift_class: effective_profile_differs
  profile_fingerprint: digest.quality_profile.effective.rust.policy_locked.0001
  drift_reason_classes:
    - policy_narrowed_mutation
  comparison_ref: quality.delta.profile.local_vs_effective.0001
  summary: Effective profile differs from the local profile because policy pinned scanner and formatter choices.

delta_links:
  scanner_import_session_refs: []
  baseline_snapshot_refs:
    - baseline.secret_scan.regulated
  local_confirmation_refs: []
  quality_result_delta_refs:
    - quality.delta.profile.local_vs_effective.0001
  support_export_refs: []
  release_packet_refs: []

environment_conditions:
  - condition_class: workspace_trust
    state_class: satisfied
    condition_ref: trust_state.workspace_trusted
    summary: Local formatter execution is allowed for this trusted workspace.
  - condition_class: deployment_profile
    state_class: satisfied
    condition_ref: deployment_profile.managed_regulated
    summary: Managed scanner rule pack is required by the active deployment profile.

audit_event_refs:
  - audit.quality_profile.resolved
  - audit.quality_profile.policy_lock_applied
