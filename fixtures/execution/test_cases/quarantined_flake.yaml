# yaml-language-server: $schema=../../../schemas/execution/flaky_history.schema.json
__fixture__:
  name: quarantined_flake
  scenario: >
    Worked, pre-implementation flaky_history_record for a
    parameterized test instance currently classified as
    confirmed-flaky and pinned under an active automated quarantine.
    flaky_classification_class = quarantined_flaky_under_active
    _quarantine; observed_signals lists three typed signals
    (intermittent_pass_then_fail_then_pass, fail_then_pass_under
    _retry_only, host_or_environment_dependent); history_window
    _class = last_n_attempts with history_window_size = 50; the
    outcome_tally pins the per-state attempt counts; a non-null
    quarantine_record_ref pairs the record with the active
    quarantine. canonical_test_item_id is the cross-record join key
    so the flake history persists across discovery refreshes. The
    contract guarantee is that AI-only inference cannot silently
    graduate a test to confirmed flake; this record cites observed
    (non-AI) signals so the AI-anchor rule is not engaged.
  exercised_classes_summary:
    record_kind: flaky_history_record
    flaky_classification_class: quarantined_flaky_under_active_quarantine
    history_window_class: last_n_attempts
    redaction_class: metadata_and_hashes_only

