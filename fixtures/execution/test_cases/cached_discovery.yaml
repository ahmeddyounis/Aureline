# yaml-language-server: $schema=../../../schemas/execution/test_discovery_state.schema.json
__fixture__:
  name: cached_discovery
  scenario: >
    Worked, pre-implementation test_discovery_state_record for a
    local-cached cargo-test discovery tree that is reused from a
    prior run rather than freshly collected. discovery_provenance
    _class = local_cached_discovery_no_fresh_run; discovery_freshness
    _class = stale_partial_discovery because discovery_collected_at
    is older than the freshness floor for cached provenance and
    freshness_floor_breached is true (the contract pins freshness to
    a stale or unknown value past the floor); discovery_scope_class
    = current_root_scope. The contract guarantee is that a stale or
    partial tree cannot silently masquerade as authoritative_live;
    rendering this discovery as fresh would emit the typed denial
    under test_discovery_state_record_must_narrow_when_below
    _authoritative_live. parent_run_ref / parent_attempt_ref are
    null because no fresh local run produced this tree; the next
    rerun-all affordance MUST be narrowed by the renderer until a
    fresh discovery has been collected.
  exercised_classes_summary:
    record_kind: test_discovery_state_record
    discovery_provenance_class: local_cached_discovery_no_fresh_run
    discovery_freshness_class: stale_partial_discovery
    discovery_scope_class: current_root_scope
    host_boundary_class: local_host_runtime
    freshness_floor_breached: true
    redaction_class: metadata_and_hashes_only

