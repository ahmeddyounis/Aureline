# yaml-language-server: $schema=../../../schemas/execution/watch_controller_state.schema.json
__fixture__:
  name: live_local_watch
  scenario: >
    Worked watch_controller_state_record for an event-driven local test
    watch loop. state_class = live, degradation_reason_class = none,
    watcher / adapter / target health are healthy, and the same live
    disclosure is available to inline results, the test tree, CLI, and
    support export.
  exercised_classes_summary:
    record_kind: watch_controller_state_record
    state_class: live
    degradation_reason_class: none
    debounce_policy_class: event_driven_debounce
    batch_policy_class: bounded_batch
    host_boundary_class: local_host_runtime
    redaction_class: metadata_and_hashes_only

record_kind: watch_controller_state_record
watch_controller_state_schema_version: 1
watch_controller_state_record_id: execution.watch_controller.local.live.0001

test_session_ref: execution.test_session.local.watch.0001
selection_ref: execution.test_selection.local.current_root.0001
discovery_state_ref: execution.test_discovery_state.local.current_root.0001
latest_run_ref: execution.run.test_watch.local.0001
latest_attempt_ref: execution.attempt.test_watch.local.0001.attempt_3
context_snapshot_ref: execution.context_snapshot.local.watch.0001

state_class: live
degradation_reason_class: none

debounce_policy:
  debounce_policy_class: event_driven_debounce
  quiet_period_ms: 120
  max_delay_ms: 500
  policy_source_ref: execution.watch_policy.local.default

batch_policy:
  batch_policy_class: bounded_batch
  max_change_count: 40
  max_test_item_count: 120
  max_cycle_age_ms: 2000
  coalescing_key_ref: execution.watch_coalescing.local.current_root

backlog_summary:
  pending_change_count: 0
  pending_test_item_count: 0
  oldest_pending_age_ms: 0
  backlog_budget_breached: false

power_summary:
  power_state_class: normal_power
  power_saver_active: false
  thermal_throttle_active: false
  power_policy_ref: null

remote_summary:
  remote_state_class: local_no_remote
  host_boundary_class: local_host_runtime
  latency_bucket_class: not_applicable_local
  last_heartbeat_at: null
  remote_capability_ref: null

target_health_summary:
  target_health_class: target_healthy
  watcher_health_class: watcher_healthy
  adapter_health_class: adapter_healthy
  target_context_snapshot_ref: execution.context_snapshot.local.watch.0001
  drift_summary_ref: null

last_successful_cycle:
  cycle_id: execution.watch_cycle.local.0001.cycle_3
  attempt_ref: execution.attempt.test_watch.local.0001.attempt_3
  completed_at: "2026-04-25T14:00:12Z"
  cycle_freshness_class: current

pause_summary:
  is_paused: false
  pause_reason_class: not_paused
  paused_at: null
  paused_by_actor_ref: null
  resume_action_ref: null

result_surface_disclosure:
  degradation_visible_to_result_consumers: true
  hidden_diagnostics_only: false
  surface_classes:
    - editor_inline_results
    - test_tree
    - test_summary
    - status_bar
    - cli_output
    - support_export
  status_item_ref: ux.status_item.test_watch.local.live.0001
  support_export_ref: support.export_ref.test_watch.local.live.0001
  disclosure_summary: Live watch state is visible beside every result surface that consumes this controller.

audit_event_refs:
  - watch_controller_state_record_published
  - watch_controller_state_record_state_transitioned
  - watch_controller_state_record_result_surface_disclosure_updated

denial_reason_class: null

captured_at: "2026-04-25T14:00:15Z"
redaction_class: metadata_and_hashes_only
approval_ticket_ref: null

notes: Event-driven local watch is current and has no hidden degradation.
