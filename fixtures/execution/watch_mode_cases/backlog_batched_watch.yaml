# yaml-language-server: $schema=../../../schemas/execution/watch_controller_state.schema.json
__fixture__:
  name: backlog_batched_watch
  scenario: >
    Worked watch_controller_state_record for a controller with pending
    changes beyond cycle budget. state_class = backlog and inline
    results that depend on pending work must show backlog or stale
    posture instead of a clean current badge.
  exercised_classes_summary:
    record_kind: watch_controller_state_record
    state_class: backlog
    degradation_reason_class: backlog_exceeds_cycle_budget
    debounce_policy_class: adaptive_debounce
    batch_policy_class: backlog_drain_batch
    host_boundary_class: local_host_runtime
    redaction_class: metadata_and_hashes_only

