# yaml-language-server: $schema=../../../schemas/execution/watch_controller_state.schema.json
__fixture__:
  name: reduced_container_watch
  scenario: >
    Worked watch_controller_state_record for a container target where
    power and thermal posture reduce batch size but the controller can
    still run. state_class = reduced and the reduction is shown in all
    result-consuming surfaces.
  exercised_classes_summary:
    record_kind: watch_controller_state_record
    state_class: reduced
    degradation_reason_class: power_saver_or_thermal_throttle
    debounce_policy_class: adaptive_debounce
    batch_policy_class: coalesced_batch
    host_boundary_class: container_local_runtime
    redaction_class: metadata_and_hashes_only

record_kind: watch_controller_state_record
watch_controller_state_schema_version: 1
watch_controller_state_record_id: execution.watch_controller.container.reduced.0001

