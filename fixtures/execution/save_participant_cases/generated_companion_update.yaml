# yaml-language-server: $schema=../../../schemas/execution/save_participant_plan.schema.json
__fixture__:
  name: generated_companion_update
  scenario: >
    A canonical API schema save would refresh a generated client
    companion. The generated update is declared by lineage and held for
    preview with a generator checkpoint before any durable write.

record_kind: save_participant_plan_record
save_participant_plan_schema_version: 1
save_participant_plan_id: save_participant.plan.generated_client.0001
workspace_ref: workspace.repo.aureline
trigger_class: explicit_save
target_scope_class: current_file
quality_on_save_plan_ref: on_save.plan.api_schema.generated_sync.0001
save_target_summary:
  logical_document_ref: logical_document.api_schema
  canonical_write_target_ref: save_target.canonical.openapi_schema
  staged_buffer_ref: staged_buffer.openapi_schema.save.0001
  compare_before_write_token_ref: save_token.openapi_schema.0001
  base_revision_ref: file_revision.openapi_schema.before_save
  observed_revision_ref: file_revision.openapi_schema.current
  external_change_event_ref: null
effective_quality_profile_ref: quality.profile.effective.codegen.0001

phase_order:
  - phase_class: preflight
    order_index: 0
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: &none_hooks
      rollback_boundary_class: none_read_only
      pre_apply_checkpoint_ref: null
      post_apply_checkpoint_ref: null
      rollback_plan_ref: null
      mutation_group_ref: null
      local_history_group_ref: null
    summary: Preflight binds canonical source, generated lineage, and participant visibility.
  - phase_class: format_fix
    order_index: 1
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: *none_hooks
    summary: No formatter or fixer is admitted for this generated-sync save.
  - phase_class: generated_artifact_update
    order_index: 2
    may_mutate_staged_buffer: false
    may_write_durable_target: true
    rollback_boundary_class: generator_regeneration_checkpoint
    checkpoint_hooks: &generator_hooks
      rollback_boundary_class: generator_regeneration_checkpoint
      pre_apply_checkpoint_ref: artifact.checkpoint.generated_client.before
      post_apply_checkpoint_ref: null
      rollback_plan_ref: rollback.plan.generated_client.regenerate
      mutation_group_ref: mutation_group.generated_client.sync.0001
      local_history_group_ref: local_history.group.generated_client.sync
    summary: Generated companion update is admitted only through lineage and preview.
  - phase_class: validation
    order_index: 3
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: *none_hooks
    summary: Validation can inspect generated output but not edit it.
  - phase_class: compare_before_write
    order_index: 4
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: *none_hooks
    summary: Compare-before-write must pass for the canonical source before commit.
  - phase_class: durable_write
    order_index: 5
    may_mutate_staged_buffer: false
    may_write_durable_target: true
    rollback_boundary_class: generator_regeneration_checkpoint
    checkpoint_hooks: *generator_hooks
    summary: Durable write is held until the generated companion preview is accepted.
  - phase_class: post_save_indexing_refresh
    order_index: 6
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: *none_hooks
    summary: Post-save refresh remains read-only after a reviewed generated update.

participant_order:
  - step_id: save_participant.step.codegen.client.0001
    order_index: 0
    phase_class: generated_artifact_update
    participant_class: generated_companion_sync
    provider_tool_ref: generator.openapi.client.rust.0001
    output_origin_class: generated_lineage
    output_origin_ref: generated.lineage.openapi_client.0001
    exact_rule_or_config_ref: generator.config.openapi_client.workspace
    fix_safety_class: generated_companion_update
    review_trigger_classes:
      - generated_artifact_impact
    declared_file_effect_summary:
      files_touched: 1
      files_created: 0
      files_deleted: 0
      changed_bytes: 1840
      whole_file_rewrite: true
      generated_artifacts_touched: 1
      protected_paths_touched: 0
      may_touch_outside_visible_file: true
    checkpoint_hooks: *generator_hooks
    timeout_ms: 1500
    run_if_precondition_refs:
      - precondition.generated_lineage_current
      - precondition.generator_available
      - precondition.preview_surface_available
    visible_disclosure: Generated client refresh will rewrite one generated companion from declared lineage.
    summary: Generated companion update is preview-required before durable write.

no_hidden_mutation_guards:
  user_visible_participant_list: true
  ran_skipped_blocked_states_exported: true
  output_origin_exported: true
  exact_rule_or_config_refs_exported: true
  heuristic_or_ai_never_silent: true
  declared_scope_ceiling_enforced: true
  actual_effects_compared_to_plan: true
  post_save_refresh_read_only: true
  summary: Generated output cannot be hidden inside the source save; lineage and preview are mandatory.
review_policy:
  whole_file_rewrite_requires_review: true
  generated_artifact_impact_requires_review: true
  multi_file_edit_requires_review: true
  external_change_race_requires_review: true
  policy_or_trust_narrowing_blocks: true
  heuristic_or_ai_requires_review_when_not_safe_local: true
  summary: Generated companion impact opens review even though the generator is deterministic.
opened_at: "2026-04-29T06:31:00Z"
plan_outcome_class: preview_required
audit_event_refs:
  - audit.save_participant.plan_opened.generated_client
  - audit.save_participant.review_required.generated_client
summary: Generated companion sync is declared, checkpointed, and held for preview before write.
