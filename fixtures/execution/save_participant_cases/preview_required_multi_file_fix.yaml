# yaml-language-server: $schema=../../../schemas/execution/save_participant_plan.schema.json
__fixture__:
  name: preview_required_multi_file_fix
  scenario: >
    A lint fix-all participant can touch the current file and sibling
    modules. The save plan declares workspace scope and opens batch
    preview instead of applying hidden multi-file edits.

record_kind: save_participant_plan_record
save_participant_plan_schema_version: 1
save_participant_plan_id: save_participant.plan.multi_file_fix.0001
workspace_ref: workspace.repo.aureline
trigger_class: fix_all_command
target_scope_class: selected_workset
quality_on_save_plan_ref: on_save.plan.lint_fix_all.preview.0001
save_target_summary:
  logical_document_ref: logical_document.current_module
  canonical_write_target_ref: save_target.canonical.current_module
  staged_buffer_ref: staged_buffer.current_module.fix_all.0001
  compare_before_write_token_ref: save_token.current_module.0001
  base_revision_ref: file_revision.current_module.before_fix
  observed_revision_ref: file_revision.current_module.current
  external_change_event_ref: null
effective_quality_profile_ref: quality.profile.effective.rust.lints.0001

phase_order:
  - phase_class: preflight
    order_index: 0
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: &none_hooks
      rollback_boundary_class: none_read_only
      pre_apply_checkpoint_ref: null
      post_apply_checkpoint_ref: null
      rollback_plan_ref: null
      mutation_group_ref: null
      local_history_group_ref: null
    summary: Preflight expands the selected workset and exposes the multi-file ceiling.
  - phase_class: format_fix
    order_index: 1
    may_mutate_staged_buffer: true
    may_write_durable_target: false
    rollback_boundary_class: workspace_checkpoint_group
    checkpoint_hooks: &workspace_hooks
      rollback_boundary_class: workspace_checkpoint_group
      pre_apply_checkpoint_ref: local_history.group.lint_fix_all.before
      post_apply_checkpoint_ref: null
      rollback_plan_ref: rollback.plan.lint_fix_all.workspace
      mutation_group_ref: mutation_group.lint_fix_all.workspace.0001
      local_history_group_ref: local_history.group.lint_fix_all
    summary: Lint fix-all is workspace-scoped and must be previewed before mutation.
  - phase_class: generated_artifact_update
    order_index: 2
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: *none_hooks
    summary: No generated companion impact is declared for this fix.
  - phase_class: validation
    order_index: 3
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: *none_hooks
    summary: Validation waits for preview acceptance.
  - phase_class: compare_before_write
    order_index: 4
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: *none_hooks
    summary: Compare-before-write is deferred until the preview is accepted.
  - phase_class: durable_write
    order_index: 5
    may_mutate_staged_buffer: false
    may_write_durable_target: true
    rollback_boundary_class: workspace_checkpoint_group
    checkpoint_hooks: *workspace_hooks
    summary: Durable writes across the workset require batch preview acceptance.
  - phase_class: post_save_indexing_refresh
    order_index: 6
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: *none_hooks
    summary: Post-save refresh is read-only after the reviewed batch.

participant_order:
  - step_id: save_participant.step.lint_fix_all.0001
    order_index: 0
    phase_class: format_fix
    participant_class: linter_autofix
    provider_tool_ref: quality.binding.linter.clippy.workspace
    output_origin_class: exact_rule
    output_origin_ref: rule.clippy.module_import_cleanup
    exact_rule_or_config_ref: rule.clippy.module_import_cleanup
    fix_safety_class: workspace_wide_preview_required
    review_trigger_classes:
      - multi_file_edit
    declared_file_effect_summary:
      files_touched: 4
      files_created: 0
      files_deleted: 0
      changed_bytes: 1320
      whole_file_rewrite: false
      generated_artifacts_touched: 0
      protected_paths_touched: 0
      may_touch_outside_visible_file: true
    checkpoint_hooks: *workspace_hooks
    timeout_ms: 2000
    run_if_precondition_refs:
      - precondition.diagnostic_cluster_current
      - precondition.batch_preview_available
      - precondition.workspace_checkpoint_available
    visible_disclosure: Lint fix-all may touch four files and must open batch preview.
    summary: Multi-file lint fix is preview-required and cannot run as hidden save work.

no_hidden_mutation_guards:
  user_visible_participant_list: true
  ran_skipped_blocked_states_exported: true
  output_origin_exported: true
  exact_rule_or_config_refs_exported: true
  heuristic_or_ai_never_silent: true
  declared_scope_ceiling_enforced: true
  actual_effects_compared_to_plan: true
  post_save_refresh_read_only: true
  summary: Multi-file scope, exact rule, checkpoint group, and preview requirement are visible.
review_policy:
  whole_file_rewrite_requires_review: true
  generated_artifact_impact_requires_review: true
  multi_file_edit_requires_review: true
  external_change_race_requires_review: true
  policy_or_trust_narrowing_blocks: true
  heuristic_or_ai_requires_review_when_not_safe_local: true
  summary: Multi-file fix-all cannot auto-apply on save and opens batch preview.
opened_at: "2026-04-29T06:34:00Z"
plan_outcome_class: preview_required
audit_event_refs:
  - audit.save_participant.plan_opened.multi_file_fix
  - audit.save_participant.preview_required.multi_file_fix
summary: Workspace-wide lint fix is held for preview with checkpoint and rule attribution.
