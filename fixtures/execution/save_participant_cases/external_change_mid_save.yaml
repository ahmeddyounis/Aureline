# yaml-language-server: $schema=../../../schemas/execution/save_participant_plan.schema.json
__fixture__:
  name: external_change_mid_save
  scenario: >
    A safe formatter runs on staged content, but compare-before-write
    observes a newer on-disk revision before durable write. The write is
    blocked and routed to external-change review.

record_kind: save_participant_plan_record
save_participant_plan_schema_version: 1
save_participant_plan_id: save_participant.plan.external_change.0001
workspace_ref: workspace.repo.aureline
trigger_class: explicit_save
target_scope_class: current_file
quality_on_save_plan_ref: on_save.plan.external_change.0001
save_target_summary:
  logical_document_ref: logical_document.config_toml
  canonical_write_target_ref: save_target.canonical.config_toml
  staged_buffer_ref: staged_buffer.config_toml.save.0001
  compare_before_write_token_ref: save_token.config_toml.opened
  base_revision_ref: file_revision.config_toml.before_save
  observed_revision_ref: file_revision.config_toml.external_newer
  external_change_event_ref: external_change.config_toml.detected_mid_save
effective_quality_profile_ref: quality.profile.effective.toml.0001

phase_order:
  - phase_class: preflight
    order_index: 0
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: &none_hooks
      rollback_boundary_class: none_read_only
      pre_apply_checkpoint_ref: null
      post_apply_checkpoint_ref: null
      rollback_plan_ref: null
      mutation_group_ref: null
      local_history_group_ref: null
    summary: Preflight opens with a current save-target token.
  - phase_class: format_fix
    order_index: 1
    may_mutate_staged_buffer: true
    may_write_durable_target: false
    rollback_boundary_class: recovery_journal
    checkpoint_hooks: &format_hooks
      rollback_boundary_class: recovery_journal
      pre_apply_checkpoint_ref: recovery_journal.config_toml.before_format
      post_apply_checkpoint_ref: null
      rollback_plan_ref: rollback.plan.config_toml.recovery_journal
      mutation_group_ref: mutation_group.format_on_save.config_toml.0001
      local_history_group_ref: null
    summary: Formatter may mutate the staged buffer before the race is detected.
  - phase_class: generated_artifact_update
    order_index: 2
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: *none_hooks
    summary: No generated update is part of this save.
  - phase_class: validation
    order_index: 3
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: *none_hooks
    summary: Formatter validation completes before compare-before-write.
  - phase_class: compare_before_write
    order_index: 4
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: blocked_no_write
    checkpoint_hooks: &blocked_hooks
      rollback_boundary_class: blocked_no_write
      pre_apply_checkpoint_ref: null
      post_apply_checkpoint_ref: null
      rollback_plan_ref: null
      mutation_group_ref: mutation_group.format_on_save.config_toml.0001
      local_history_group_ref: null
    summary: Compare-before-write detects external drift and stops the durable write.
  - phase_class: durable_write
    order_index: 5
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: blocked_no_write
    checkpoint_hooks: *blocked_hooks
    summary: Durable write is blocked until compare or rebase review resolves.
  - phase_class: post_save_indexing_refresh
    order_index: 6
    may_mutate_staged_buffer: false
    may_write_durable_target: false
    rollback_boundary_class: none_read_only
    checkpoint_hooks: *none_hooks
    summary: Refresh can publish save-blocked state but cannot mutate files.

participant_order:
  - step_id: save_participant.step.formatter.taplo.0001
    order_index: 0
    phase_class: format_fix
    participant_class: formatter
    provider_tool_ref: quality.binding.formatter.taplo.workspace
    output_origin_class: imported_config
    output_origin_ref: quality.config.taplo.workspace
    exact_rule_or_config_ref: quality.config.taplo.workspace
    fix_safety_class: safe_local_text_edit
    review_trigger_classes:
      - not_required
    declared_file_effect_summary:
      files_touched: 1
      files_created: 0
      files_deleted: 0
      changed_bytes: 44
      whole_file_rewrite: false
      generated_artifacts_touched: 0
      protected_paths_touched: 0
      may_touch_outside_visible_file: false
    checkpoint_hooks: *format_hooks
    timeout_ms: 500
    run_if_precondition_refs:
      - precondition.profile_allows_formatter
    visible_disclosure: TOML formatter may update one staged file before final compare.
    summary: Formatter output remains staged because durable write later blocks.
  - step_id: save_participant.step.compare.config_toml.0001
    order_index: 1
    phase_class: compare_before_write
    participant_class: compare_before_write
    provider_tool_ref: null
    output_origin_class: read_only_validation
    output_origin_ref: external_change.config_toml.detected_mid_save
    exact_rule_or_config_ref: null
    fix_safety_class: external_change_conflict_requires_review
    review_trigger_classes:
      - external_change_race
    declared_file_effect_summary:
      files_touched: 0
      files_created: 0
      files_deleted: 0
      changed_bytes: 0
      whole_file_rewrite: false
      generated_artifacts_touched: 0
      protected_paths_touched: 0
      may_touch_outside_visible_file: false
    checkpoint_hooks: *blocked_hooks
    timeout_ms: 50
    run_if_precondition_refs:
      - precondition.compare_before_write_required
    visible_disclosure: On-disk file changed during save; compare or rebase is required.
    summary: Compare-before-write converts the save to external-change review.

no_hidden_mutation_guards:
  user_visible_participant_list: true
  ran_skipped_blocked_states_exported: true
  output_origin_exported: true
  exact_rule_or_config_refs_exported: true
  heuristic_or_ai_never_silent: true
  declared_scope_ceiling_enforced: true
  actual_effects_compared_to_plan: true
  post_save_refresh_read_only: true
  summary: Formatter ran, compare blocked, and the external-change event is visible.
review_policy:
  whole_file_rewrite_requires_review: true
  generated_artifact_impact_requires_review: true
  multi_file_edit_requires_review: true
  external_change_race_requires_review: true
  policy_or_trust_narrowing_blocks: true
  heuristic_or_ai_requires_review_when_not_safe_local: true
  summary: External drift always blocks durable write until review resolves.
opened_at: "2026-04-29T06:33:00Z"
plan_outcome_class: rebase_required
audit_event_refs:
  - audit.save_participant.plan_opened.external_change
  - audit.save_participant.external_change_detected
summary: Save stops after compare-before-write detects a newer external revision.
