# yaml-language-server: $schema=../../../schemas/execution/task_channel.schema.json
__fixture__:
  name: diagnostic_feed_channel
  scenario: >
    Structured diagnostic feed produced by a task attempt. Diagnostics
    are linked to the run and output viewer but remain their own
    channel so diagnostic freshness and result-packet truth do not get
    flattened into task success.
  exercised_axes:
    channel_class: diagnostics_feed
    buffering_policy_class: durable_append_log
    result_packet_ref: execution.result_packet.diagnostics.local_cargo.0001

record_kind: task_channel_record
task_channel_schema_version: 1
task_channel_id: execution.task_channel.diagnostics.local_cargo.0001
channel_class: diagnostics_feed
channel_origin_class: live_local_execution
channel_liveness_class: live_buffering
import_disclosure_class: not_imported_live_channel

parent_refs:
  execution_context_ref: execution_context.local_desktop.cargo_test.workspace_root
  command_invocation_ref: command.invocation.test_run.local_cargo.0001
  terminal_session_ref: execution.terminal_session.local.0001
  parent_run_ref: execution.run.local_cargo_test.0001
  parent_attempt_ref: execution.attempt.local_cargo_test.0001.attempt_0
  task_event_envelope_trace_ref: tooling.task_event.trace.local_cargo_test.0001
  provider_event_ref: null
  imported_ci_run_ref: null

channel_route_refs:
  output_viewer_refs:
    - ux.output_viewer.diagnostics.local_cargo.0001
  result_packet_refs:
    - execution.result_packet.diagnostics.local_cargo.0001
  artifact_event_refs: []
  notification_lineage_refs: []
  support_bundle_refs: []
  history_row_refs:
    - ux.history_row.run.local_cargo_test.diagnostics.0001
  evidence_link_refs:
    - execution.evidence_link.diagnostic_result_packet.0001

stream_policy:
  buffering_policy_class: durable_append_log
  backlog_policy_class: backlog_count_known
  truncation_policy_class: summarize_and_hash_omitted
  max_buffered_event_count: 5000
  max_buffered_byte_count: 4194304
  viewer_sync_required: true
  export_sync_required: true

imported_source: null
provider_overlay: null

retention_class: retained_local_with_replay_opt_in
redaction_class: structured_fields_with_path_redaction
approval_ticket_ref: null
created_at: "2026-04-29T01:01:00Z"
updated_at: "2026-04-29T01:01:06Z"
summary: >
  Live diagnostic feed linked to the task attempt and result packet;
  diagnostic truth remains separate from the task lifecycle channel.
