__fixture__:
  name: notification_mirror_channel
  scenario: >
    Notification mirror channel for a completed run. It does not create
    a new execution identity; it mirrors the task channel into canonical
    event lineage and history rows.
  exercised_axes:
    channel_class: notification_mirror
    notification_lineage_refs:
      - ux.event_lineage.run.local_cargo_test.completed.0001

