__fixture__:
  name: live_terminal_stdout_channel
  scenario: >
    Local terminal stdout channel for a task attempt. The channel is
    live-authoritative, cites terminal/run/attempt/context refs, routes
    to one output viewer and one history row, and requires viewers and
    exports to preserve buffer/truncation posture from task events.
  exercised_axes:
    channel_class: terminal_stdout_stream
    channel_origin_class: live_local_execution
    channel_liveness_class: live_authoritative
    import_disclosure_class: not_imported_live_channel

record_kind: task_channel_record
task_channel_schema_version: 1
task_channel_id: execution.task_channel.local.stdout.0001
channel_class: terminal_stdout_stream
channel_origin_class: live_local_execution
channel_liveness_class: live_authoritative
import_disclosure_class: not_imported_live_channel

parent_refs:
  execution_context_ref: execution_context.local_desktop.cargo_test.workspace_root
  command_invocation_ref: command.invocation.test_run.local_cargo.0001
  terminal_session_ref: execution.terminal_session.local.0001
  parent_run_ref: execution.run.local_cargo_test.0001
  parent_attempt_ref: execution.attempt.local_cargo_test.0001.attempt_0
  task_event_envelope_trace_ref: tooling.task_event.trace.local_cargo_test.0001
  provider_event_ref: null
  imported_ci_run_ref: null

channel_route_refs:
  output_viewer_refs:
    - ux.output_viewer.task_stdout.local_cargo_test.0001
  result_packet_refs: []
  artifact_event_refs: []
  notification_lineage_refs: []
  support_bundle_refs: []
  history_row_refs:
    - ux.history_row.run.local_cargo_test.started.0001
  evidence_link_refs:
