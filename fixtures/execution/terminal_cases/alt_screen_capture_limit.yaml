# yaml-language-server: $schema=../../../schemas/execution/terminal_session.schema.json
__fixture__:
  name: alt_screen_capture_limit
  scenario: >
    Worked terminal-session truth record for a local Bash session that
    has switched to the alternate screen buffer to run a paginator
    (less). host_scope_badge_class = local_host_desktop_pty,
    alt_screen_state_class =
    alt_screen_active_paginator_or_man_page, raw_mode_state_class =
    cbreak_mode_per_keystroke_local_echo_on. The
    active_capability_limits set surfaces three concurrent typed
    chips: alt_screen_active_scrollback_paused (the host pauses
    scrollback navigation while alt-screen is active),
    alt_screen_active_search_disabled_no_grid_capture (find-in-
    scrollback is disabled because the alt-screen grid is not
    captured), and transcript_capture_paused_under_redaction_class
    (transcript capture pauses for the duration of the alt-screen
    program). transcript_capture_posture_class resolves to
    transcript_capture_paused_alt_screen_or_raw_mode_active. Renderers
    MUST narrow the affected affordances to the matching typed chip
    rather than silently dropping them.
  exercised_classes_summary:
    record_kind: terminal_session_record
    host_scope_badge_class: local_host_desktop_pty
    alt_screen_state_class: alt_screen_active_paginator_or_man_page
    raw_mode_state_class: cbreak_mode_per_keystroke_local_echo_on
    active_capability_limits:
      - alt_screen_active_scrollback_paused
      - alt_screen_active_search_disabled_no_grid_capture
      - transcript_capture_paused_under_redaction_class
    transcript_capture_posture_class: transcript_capture_paused_alt_screen_or_raw_mode_active
    live_or_transcript_state_class: live_session_active_with_running_pty
    session_user_impact_label_class: live_session_continues_under_capability_limit
    redaction_class: metadata_and_hashes_only

