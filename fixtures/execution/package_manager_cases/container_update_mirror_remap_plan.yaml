__fixture__:
  name: container_update_mirror_remap_plan
  scenario: >
    Container package update where the package manager would normally use
    a public registry, but policy remaps the source to a customer mirror.
    The plan exposes registry remapping, auth source, mirror-only egress,
    lockfile updates, cache writes, and target context before any write
    or network action.

