remapping:
  registry_remapping_class: direct_origin_to_mirror
  config_source_ref: package_manager.config.policy_overlay
  prior_registry_source_ref: registry.endpoint.public.origin.pnpm
  proposed_registry_source_ref: registry.endpoint.managed.curated.pnpm
  review_required_before_source_change: true
