# yaml-language-server: $schema=../../../schemas/execution/run.schema.json
__fixture__:
  name: partially_complete_outcome
  scenario: >
    Worked outcome-event record for an attempt of a test_run that
    finished with a typed partially-complete result. Five test cases
    passed, two are still pending (a flaky-retry policy is in flight),
    one failed. outcome_event_kind_class = outcome_partially_complete;
    lifecycle_state_class = partially_complete; the contract pins the
    three subset counts (subset_pass_count = 5, subset_fail_count = 1,
    subset_pending_count = 2) so a UI / CLI / support reviewer cannot
    silently collapse this into outcome_passed. side_effect_summary
    _class = side_effects_local_workspace_writes_only (the test run
    wrote coverage and report files into the local workspace but did
    not publish anything irreversible).
  exercised_classes_summary:
    record_kind: outcome_event_record
    outcome_event_kind_class: outcome_partially_complete
    lifecycle_state_class: partially_complete
    side_effect_summary_class: side_effects_local_workspace_writes_only
    redaction_class: metadata_and_hashes_only

record_kind: outcome_event_record
run_schema_version: 1
