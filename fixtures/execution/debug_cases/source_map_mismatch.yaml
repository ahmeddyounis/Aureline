    quality_class: mapping_build_mismatch_resolved_to_different_build
    fallback_action_class: open_no_navigable_target_show_address_only
    evidence_state_class: evidence_resolved_terminal
    mismatch_reasons_count: 2
    redaction_class: metadata_and_hashes_only

