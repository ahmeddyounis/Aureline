__fixture__:
  name: source_map_mismatch
  scenario: >
    Worked, pre-implementation mapping_quality_record for a JavaScript
    frame whose joined debug_artifact_entry_record resolved a candidate
    source map but whose source-map digest disagrees with the running
    bundle's recorded source_map_digest. The resolver records the
    mismatch under the closed mismatch_reason vocabulary
    (mismatch_source_map_digest plus stale_source_map_mapping); the
    contract forbids silent navigation. quality_class resolves to
    mapping_build_mismatch_resolved_to_different_build,
    fallback_action_class resolves to
    open_no_navigable_target_show_address_only, and
    navigation_target.target_kind_class resolves to
    address_only_no_navigable_target. The renderer surfaces the
    typed mismatch chip; "Go to source" is denied.
  exercised_classes_summary:
