__fixture__:
  name: exact_build_local_attach
  scenario: >
    Worked, pre-implementation debug-session truth record for an
    exact-build local attach to a running aureline-shell process. The
    inferior was launched outside the debug session; the debugger
    attached under debug_posture_attach_to_local_process. The session
    is stopped at a breakpoint on the main thread; the topmost three
    frames map to mapping_exact_full_source_and_symbols against a
    locked exact-build identity. Symbol-strip is symbols_full_present
    on the workspace binary, symbols_split_external_resolved on the
    sibling debug-symbols package, and symbols_full_present on libcore
    via the imported-dependency module. Variables view carries one
    pure value, one held-pending-purity getter, and one secret-class
    redaction. Restart is admitted under a fresh command-dispatch
    descriptor; reattach denied while the inferior is still owned;
    rerun denied because the parent run published an outbound network
    write earlier (side-effects_external_network_writes is not the
    irreversible class but rerun authority is wired to the parent
    run's typed answer here). action_authority_summary keeps each
    action's class explicit.
  exercised_classes_summary:
    record_kind: debug_session_record
    debug_posture_class: debug_posture_attach_to_local_process
    stopped_state_class: stopped_at_breakpoint
    host_boundary_class: local_host_runtime
    symbol_strip_summary_full_present_count: 2
    symbol_strip_summary_split_external_resolved_count: 1
    mapping_quality_class_top_frames: mapping_exact_full_source_and_symbols
    restart_authority_class: restart_admitted_under_command_dispatch_descriptor
    rerun_authority_class: rerun_admitted_under_command_dispatch_descriptor
    reattach_authority_class: reattach_denied_no_live_control
    reopen_dump_authority_class: reopen_dump_admitted_inspect_only
    redaction_class: metadata_and_hashes_only

