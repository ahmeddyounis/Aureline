# yaml-language-server: $schema=../../../schemas/execution/debug_session.schema.json
__fixture__:
  name: shared_debug_overlay
  scenario: >
    Worked, pre-implementation debug_session_record for a follower's
    view of a shared-debug overlay on a presenter's live remote
    workspace agent. The follower is rendering frames, variables, and
    watch rows the presenter resolved; the follower's local
    debug_posture_class is debug_posture_live_shared_inspect_only.
    The presenter has not granted step / continue / restart authority,
    so action_authority_summary keeps every value at its denial class
    while preserving the underlying core truth (process tree, frame
    stack mapping_quality_class, variables value-summary classes).
    shared_terminal_control_metadata_ref is required (the shared row
    is non-null); temporary_step_grant_ref is null. The follower's
    auto_rerun_admitted_on_this_record is false; rerun is denied
    because no live control is admitted.
  exercised_classes_summary:
    record_kind: debug_session_record
    debug_posture_class: debug_posture_live_shared_inspect_only
    stopped_state_class: stopped_at_breakpoint
    host_boundary_class: remote_workspace_agent_runtime
    restart_authority_class: restart_denied_no_live_control
    rerun_authority_class: rerun_denied_dump_or_restored_session_inspect_only
    reattach_authority_class: reattach_denied_no_live_control
    reopen_dump_authority_class: reopen_dump_admitted_inspect_only
    redaction_class: metadata_and_hashes_only

