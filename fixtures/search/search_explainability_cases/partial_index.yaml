$schema: ../../../schemas/search/search_explainability_panel.schema.json
record_kind: search_explainability_panel_record
search_explainability_panel_schema_version: 1
panel_id: search:panel:partial_index:01
query_session_id_ref: search:session:partial_index:01
result_identity_id_ref: search:identity:partial_index:auth_policy
search_result_packet_ref: search:packet:partial_index:auth_policy
result_set_id_ref: search:result_set:partial_index:01
planner_pass_id_ref: search:planner:partial_index:01
source_surface_class: global_search
panel_scope_class: freshness_scope_review
ranking_reasons:
  - rank_order: 0
    ranking_reason_class: lexical_fuzzy_match
    explanation_signal_class: prefix_or_fuzzy_match
    source_classes:
      - lexical_index
    explanation_weight_bucket: primary_signal
    visibility_tier: always_visible
    display_copy_token: reason.exact_match
    term_ref: search:term:partial_index:retry
    source_ref: search:shard_snapshot:partial_index:lexical
    explanation_capture_entry_ref: search:explain_entry:partial_index:fuzzy
  - rank_order: 1
    ranking_reason_class: recent_file_bias
    explanation_signal_class: recentness_boost
    source_classes:
      - hot_cache
    explanation_weight_bucket: recency_bias
    visibility_tier: always_visible
    display_copy_token: reason.recentness
    term_ref: null
    source_ref: search:shard_snapshot:partial_index:hot_set
    explanation_capture_entry_ref: search:explain_entry:partial_index:recent
boosted_terms: []
recentness:
  recentness_signals:
    - recent_file
  recentness_visible: true
  recency_window_ref: search:recency_window:partial_index:hot_set
  explanation_capture_entry_refs:
    - search:explain_entry:partial_index:recent
source_mix:
  source_mix_is_complete: false
  provider_limit_disclosed: false
  entries:
    - source_class: lexical_index
      shard_contribution_role: primary_truth_source
      result_count: 6
      freshness_class: degraded_cached
      readiness_state: partial_index
      source_locality_class: local_only
      source_availability_class: partial
      source_ref: search:shard_snapshot:partial_index:lexical
      citation_anchor_refs: []
    - source_class: hot_cache
      shard_contribution_role: supplementary_contributor
      result_count: 2
      freshness_class: authoritative_live
      readiness_state: hot_set_ready
      source_locality_class: local_only
      source_availability_class: ready
      source_ref: search:shard_snapshot:partial_index:hot_set
      citation_anchor_refs: []
freshness_scope:
  readiness_state: partial_index
  freshness_class: degraded_cached
  scope_filter_class: full_workspace
  result_truth_class: heuristic
  semantic_fallback_state: semantic_unavailable_lexical_only
  stale_or_partial_explanation:
    partial_truth_causes:
      - hot_set_only
      - indexing_in_progress
    human_readable_summary: Still indexing the rest of the workspace — these results are partial.
  scope_ref: search:scope:full_workspace
  index_epoch_ref: search:index_epoch:partial_index:01
  graph_epoch_ref: null
  docs_pack_epoch_ref: null
  count_truth_is_partial: true
counts:
  visible_result_count: 8
  matching_result_count: null
  matching_result_count_known: false
  hidden_result_disclosure: null
  hidden_by_filter_count: 0
  policy_blocked_disclosure: null
  provider_limited_count: 0
  unknown_result_count: 6
  count_basis_class: partial_index
approximation_and_partial_notes:
  - note_id: search:panel_note:partial_index:still_indexing
    approximation_note_class: partial_index
    visibility_tier: always_visible
    partial_truth_causes:
      - hot_set_only
      - indexing_in_progress
    summary_copy_ref: copy.partial_index_still_loading
    explanation_capture_entry_ref: search:explain_entry:partial_index:state
same_surface_inspection:
  panel_host_class: global_search_panel
  opened_from: freshness_chip
  origin_result_list_ref: search:result_list:partial_index:01
  same_surface_required: true
  back_to_results_action_ref: action:search:back_to_results:partial_index
  allowed_same_surface_actions:
    - back_to_results
    - rebuild_index
    - inspect_scope
    - show_debug_reasons
    - export_redacted_evidence
  unrelated_handoffs_denied:
    - settings_page
    - debug_console
    - support_only_tool
  focus_return_ref: focus:return:search_panel:partial_index
policy_block_review: null
provider_limit_review: null
visibility_boundary:
  always_visible_fields:
    - primary_ranking_reasons
    - recentness_signals
    - source_mix
    - freshness_class
    - scope_filter_class
    - hidden_result_count
    - policy_blocked_count
    - approximation_notes
    - partial_index_note
  detail_visible_fields:
    - planner_refs
    - shard_snapshot_refs
    - normalized_term_hash_refs
    - export_policy
  opt_in_debug_fields:
    - shard_snapshot_refs
    - normalized_term_hash_refs
    - planner_refs
  support_export_fields:
    - primary_ranking_reasons
    - source_mix
    - freshness_class
    - scope_filter_class
    - unknown_result_count
    - approximation_notes
    - export_policy
  forbidden_fields:
    - raw_query_text
    - raw_document_body
    - raw_symbol_definition
    - raw_absolute_path
    - raw_provider_payload
    - raw_url
    - raw_secret
    - numeric_rank_weight
    - hidden_result_label
    - hidden_result_path
    - support_only_unexplained_heuristic
  debug_mode_default_enabled: false
  support_only_cannot_be_sole_explanation: true
export_evidence:
  export_policy_class: export_visible_summary_only
  raw_material_allowed: false
  hidden_details_export_class: counts_and_reasons_only
  explanation_capture_refs:
    - search:explain:partial_index:auth_policy
  exported_state_fields:
    - primary_ranking_reasons
    - source_mix
    - freshness_class
    - scope_filter_class
    - unknown_result_count
    - approximation_notes
    - export_policy
  export_denial_ref: null
parity_mapping:
  surface_parity_group: global_search
  compatible_source_surfaces:
    - global_search
    - quick_open
    - cli_search
    - support_export
  primary_result_surface_class: full_search
  reusable_explanation_terms:
    - prefix_or_fuzzy_match
    - recentness_boost
    - partial_index_state
  provider_specific_terms_allowed: false
  provider_payload_allowed: false
  missing_provider_disclosure_required: true
  parity_notes_ref: search:parity:partial_index:01
policy_context:
  policy_epoch: pe:2026-04-24:01
  trust_state: trusted
  execution_context_id: exec:search:partial_index
redaction_class: metadata_safe_default
fixture_metadata:
  name: partial_index_search_explainability_panel
  scenario: Global search explains partial index and unknown count state from the result surface.
  exercised_axes:
    - partial_index
    - source_mix
    - recentness
    - unknown_count
    - same_surface_inspection
  contract_sections:
    - Panel Scope
    - Same-Surface Inspection
    - Export And Evidence
