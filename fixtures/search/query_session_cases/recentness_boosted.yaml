        surface_row_ref: search:row:recentness_boosted:router_test
        surface_result_set_ref: search:result_set:recentness_boosted:01
    policy_context:
      policy_epoch: pe:2026-04-24:01
      trust_state: trusted
      execution_context_id: exec:search:recentness_boosted
    redaction_class: metadata_safe_default
    minted_at: "2026-04-24T12:00:01Z"
    last_revalidated_at: "2026-04-24T12:00:01Z"

explanation_captures:
  - record_kind: search_explanation_capture_record
    search_explanation_capture_schema_version: 1
    explanation_capture_id: search:explain:recentness_boosted:router_test
    query_session_id_ref: search:session:recentness_boosted:01
    result_identity_id_ref: search:identity:recentness_boosted:router_test
    search_result_packet_ref: search:packet:recentness_boosted:router_test
    result_set_id_ref: search:result_set:recentness_boosted:01
    planner_pass_id_ref: search:planner:recentness_boosted:01
    source_surface_class: quick_open
    capture_purpose_class: row_reason_chip
    visible_summary:
      primary_explanation_signals:
        - exact_match
        - recentness_boost
      ranking_reason_classes:
        - exact_path_match
        - recent_file_bias
        - recent_edit_bias
      result_truth_class: exact
      readiness_state: hot_set_ready
      freshness_class: authoritative_live
      scope_filter_class: current_root
      semantic_fallback_state: semantic_not_applicable
      hidden_result_disclosure: null
      stale_or_partial_explanation:
        partial_truth_causes:
          - hot_set_only
        human_readable_summary: Still indexing the rest of the workspace — these results are partial.
    explanation_entries:
      - entry_id: search:explain_entry:recentness_boosted:exact
        explanation_signal_class: exact_match
        ranking_reason_classes:
          - exact_path_match
        hidden_scope_reasons: []
        partial_truth_causes: []
        readiness_state: null
        semantic_fallback_state: null
        visibility_tier: always_visible
        contribution_direction: boosted
        display_copy_token: reason.exact_match
        explanation_weight_bucket: primary_signal
        term_ref: search:term:recentness_boosted:router
        source_ref: search:shard_snapshot:recentness_boosted:hot_set
        debug_payload_ref: null
        redacted_detail_ref: null
      - entry_id: search:explain_entry:recentness_boosted:recent
        explanation_signal_class: recentness_boost
        ranking_reason_classes:
          - recent_file_bias
          - recent_edit_bias
        hidden_scope_reasons: []
        partial_truth_causes: []
        readiness_state: null
        semantic_fallback_state: null
        visibility_tier: always_visible
        contribution_direction: boosted
        display_copy_token: reason.recentness
        explanation_weight_bucket: recency_bias
        term_ref: null
        source_ref: search:recency:event:router_test
        debug_payload_ref: search:debug:recentness_bucket:router_test
        redacted_detail_ref: null
    capture_rules:
      always_visible_fields:
        - result_truth_class
        - readiness_state
        - freshness_class
        - scope_filter_class
        - primary_ranking_reasons
      debug_opt_in_fields:
        - rank_weight_buckets
        - debug_payload_opaque_ref
      forbidden_fields:
        - raw_query_text
        - raw_document_body
        - raw_symbol_definition
        - raw_absolute_path
        - raw_provider_payload
        - raw_url
        - raw_secret
        - numeric_rank_weight
        - support_only_unexplained_heuristic
      support_only_cannot_be_sole_explanation: true
    export_rules:
      export_policy_class: local_only_not_exported
      include_debug_refs: false
      raw_material_allowed: false
    policy_context:
      policy_epoch: pe:2026-04-24:01
      trust_state: trusted
      execution_context_id: exec:search:recentness_boosted
    redaction_class: metadata_safe_default
    captured_at: "2026-04-24T12:00:01Z"

expected_assertions:
  - raw query text remains local-only and is not exportable.
  - recentness_boost is always visible because it materially affects order.
  - exact truth class is preserved even though recency affects ranking.
