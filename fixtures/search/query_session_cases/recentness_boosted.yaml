case_id: search_query_session.recentness_boosted
purpose: >
  Quick open keeps raw query material local-only while explaining why a recent
  file outranked another exact-looking match. The result remains exact, but the
  recentness boost is visible and reusable.
schemas:
  query_session: schemas/search/query_session.schema.json
  result_identity: schemas/search/search_result_identity.schema.json
  explanation_capture: schemas/search/search_explanation_capture.schema.json

query_session:
  record_kind: query_session_record
  query_session_schema_version: 1
  query_session_id: search:session:recentness_boosted:01
  source_surface_projection:
    source_surface_class: quick_open
    primary_result_surface_class: full_search
    projected_surface_classes:
      - full_search
    projection_note_ref: search:projection_note:recentness_boosted:01
  query_text:
    query_text_storage_class: volatile_session_only
    query_text_material_class: raw_local_only
    raw_query_text: router test
    query_hash_ref: search:query_hash:recentness_boosted:01
    literal_store_ref: search:literal_store:volatile:recentness_boosted
    locale: en-US
    input_mode: keyboard
    contains_sensitive_literal: false
    secret_detection_state: no_secret_detected
  normalized_query_parse:
    parser_id: search:parser:quick_open
    parser_version: "1"
    query_language_class: fuzzy
    query_classification: text_substring_lookup
    normalized_terms:
      - term_id: search:term:recentness_boosted:router
        term_role: primary_term
        term_material_class: raw_local_only
        raw_term_text: router
        term_hash_ref: search:term_hash:recentness_boosted:router
        term_boost_class: recentness_boosted
        source_span_ref: search:span:recentness_boosted:router
      - term_id: search:term:recentness_boosted:test
        term_role: primary_term
        term_material_class: raw_local_only
        raw_term_text: test
        term_hash_ref: search:term_hash:recentness_boosted:test
        term_boost_class: not_boosted
        source_span_ref: search:span:recentness_boosted:test
    filters:
      - filter_class: scope_filter
        filter_value_ref: search:scope:current_root
        filter_enabled: true
    parse_warning_refs: []
  scope_binding:
    scope_binding_id_ref: search:scope_binding:recentness_boosted:01
    scope_source_class: current_context
    scope_filter_class: current_root
    lane_grouping_id: group:quick_open
    workset_id_ref: null
    root_refs:
      - workspace:root:web
    included_scope_refs:
      - workspace:root:web
    excluded_scope_refs: []
    hidden_result_disclosure: null
    client_scopes:
      - desktop_product
  ranking_profile:
    ranking_profile_id: search:rank_profile:quick_open_recent
    ranking_mode_class: relevance
    stable_ordering_policy_class: selection_stable_during_rerank
    lexical_first: true
    semantic_supplement_allowed: false
    ranking_reason_classes:
      - exact_path_match
      - recent_file_bias
      - recent_edit_bias
    reason_visibility_class: primary_reason_visible
    rank_weight_disclosure_class: weight_bucket_only
    ranker_epoch_ref: search:ranker_epoch:recentness_boosted:01
    debug_detail_available: true
  history_policy:
    history_policy_class: ephemeral_session_only
    history_retention_class: session_only
    sensitive_literal_handling_class: literal_kept_in_local_only_store
    raw_query_export_allowed: false
    synced_history_allowed: false
    query_history_entry_refs: []
    saved_query_id_ref: null
    retention_governance_ref: null
  freshness_state:
    readiness_state: hot_set_ready
    freshness_class: authoritative_live
    semantic_fallback_state: semantic_not_applicable
    stale_or_partial_explanation:
      partial_truth_causes:
        - hot_set_only
      human_readable_summary: Still indexing the rest of the workspace — these results are partial.
    hidden_result_disclosure: null
    last_indexed_at: "2026-04-24T12:00:00Z"
    last_refreshed_at: "2026-04-24T12:00:01Z"
  retrieval_epoch:
    retrieval_epoch_ref: search:retrieval_epoch:recentness_boosted:01
    index_epoch_ref: search:index_epoch:recentness_boosted:01
    graph_epoch_ref: null
    docs_pack_epoch_ref: null
    embedding_epoch_ref: null
    embedder_model_ref: null
    chunker_ref: null
    retrieval_locality_class: local_only
    shard_snapshot_refs:
      - shard_row_id: search_shard_row:quick_open.hot_set_lexical
        shard_snapshot_id: search:shard_snapshot:recentness_boosted:hot_set
        freshness_class: authoritative_live
        readiness_state: hot_set_ready
        captured_at: "2026-04-24T12:00:01Z"
  result_snapshot_refs:
    - result_snapshot_id: search:result_snapshot:recentness_boosted:01
      result_set_id_ref: search:result_set:recentness_boosted:01
      planner_pass_id_ref: search:planner:recentness_boosted:01
      collection_snapshot_id_ref: null
      result_snapshot_capture_class: live_projection
      snapshot_truth_claim_class: current_at_capture_only
      visible_result_count: 6
      hidden_result_count: 0
      result_identity_refs:
        - search:identity:recentness_boosted:router_test
      captured_at: "2026-04-24T12:00:01Z"
  export_sharing_posture:
    share_policy_class: local_only_private
    export_materiality_class: metadata_only
    support_capture_class: not_captured
    snapshot_truth_claim_class: current_at_capture_only
    snapshot_export_fields:
      - snapshot_includes_visible_row_ids_only
      - snapshot_includes_hidden_result_count_disclosure
      - snapshot_includes_ranking_reason_classes
      - snapshot_includes_planner_pass_ref
    local_by_default: true
    export_review_ref: null
    share_denial_ref: null
  running_build_identity_ref: build:running:01
  policy_context:
    policy_epoch: pe:2026-04-24:01
    trust_state: trusted
    execution_context_id: exec:search:recentness_boosted
  client_scopes:
    - desktop_product
  redaction_class: metadata_safe_default
  opened_at: "2026-04-24T12:00:00Z"
  updated_at: "2026-04-24T12:00:01Z"
  closed_at: "2026-04-24T12:00:03Z"

result_identities:
