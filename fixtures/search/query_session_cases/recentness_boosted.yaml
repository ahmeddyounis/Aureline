      search_result_packet_ref: search:packet:recentness_boosted:router_test
      result_fusion_record_ref: search:fusion:recentness_boosted:router_test
      query_session_result_snapshot_ref: search:result_snapshot:recentness_boosted:01
      search_collection_snapshot_ref: null
      saved_query_id_ref: null
      deep_link_id_ref: search:deep_link:recentness_boosted:router_test
    truth_basis:
