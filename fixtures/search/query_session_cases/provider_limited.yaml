case_id: search_query_session.provider_limited
purpose: >
  AI context retrieval inherits a search query while a connected-provider lane is
  unauthorized. Workspace results remain usable, provider omissions are counted,
  and semantic/provider degradation is visible.
schemas:
  query_session: schemas/search/query_session.schema.json
  result_identity: schemas/search/search_result_identity.schema.json
  explanation_capture: schemas/search/search_explanation_capture.schema.json

query_session:
  record_kind: query_session_record
  query_session_schema_version: 1
  query_session_id: search:session:provider_limited:01
  source_surface_projection:
    source_surface_class: ai_context_search
    primary_result_surface_class: ai_explanation_overlay
    projected_surface_classes:
      - full_search
      - ai_explanation_overlay
    projection_note_ref: search:projection_note:provider_limited:01
  query_text:
    query_text_storage_class: volatile_session_only
    query_text_material_class: hashed_terms_only
    query_hash_ref: search:query_hash:provider_limited:01
    literal_store_ref: null
    locale: en-US
    input_mode: automation
    contains_sensitive_literal: false
    secret_detection_state: no_secret_detected
  normalized_query_parse:
    parser_id: search:parser:semantic
    parser_version: "1"
    query_language_class: semantic_concept
    query_classification: ai_evidence_lookup
    normalized_terms:
      - term_id: search:term:provider_limited:concept
        term_role: semantic_concept
        term_material_class: hashed_literal
        term_hash_ref: search:term_hash:provider_limited:concept
        term_boost_class: context_boosted
        source_span_ref: search:span:provider_limited:concept
    filters:
      - filter_class: provider_filter
        filter_value_ref: provider:issues:current_org
        filter_enabled: true
      - filter_class: scope_filter
        filter_value_ref: search:scope:current_root
        filter_enabled: true
    parse_warning_refs: []
  scope_binding:
    scope_binding_id_ref: search:scope_binding:provider_limited:01
    scope_source_class: ai_context_inherited
    scope_filter_class: current_root
    lane_grouping_id: group:ai_explanation
    workset_id_ref: null
    root_refs:
      - workspace:root:app
    included_scope_refs:
      - workspace:root:app
    excluded_scope_refs:
      - provider:issues:current_org
    hidden_result_disclosure:
      hidden_result_count: 12
      count_is_approximate: true
      hidden_scope_reasons:
        - provider_overlay_unauthorised
    client_scopes:
      - desktop_product
      - sdk_or_api
  ranking_profile:
    ranking_profile_id: search:rank_profile:ai_context_provider_limited
    ranking_mode_class: semantic_supplement
    stable_ordering_policy_class: selection_stable_during_rerank
    lexical_first: true
    semantic_supplement_allowed: true
    ranking_reason_classes:
      - lexical_fuzzy_match
      - semantic_embedding_neighbour
      - policy_hidden_placeholder
    reason_visibility_class: detail_sheet_visible
    rank_weight_disclosure_class: weight_bucket_only
    ranker_epoch_ref: search:ranker_epoch:provider_limited:01
    debug_detail_available: true
  history_policy:
    history_policy_class: ephemeral_session_only
    history_retention_class: session_only
    sensitive_literal_handling_class: literal_hashed_with_local_salt
    raw_query_export_allowed: false
    synced_history_allowed: false
    query_history_entry_refs: []
    saved_query_id_ref: null
    retention_governance_ref: null
  freshness_state:
    readiness_state: warm_index
    freshness_class: warm_cached
    semantic_fallback_state: semantic_degraded_lexical_preferred
    stale_or_partial_explanation:
      partial_truth_causes:
        - provider_overlay_unreachable
      human_readable_summary: Connected-provider results are unavailable — showing workspace results only.
    hidden_result_disclosure:
      hidden_result_count: 12
      count_is_approximate: true
      hidden_scope_reasons:
        - provider_overlay_unauthorised
    last_indexed_at: "2026-04-24T10:00:00Z"
    last_refreshed_at: "2026-04-24T10:01:00Z"
  retrieval_epoch:
    retrieval_epoch_ref: search:retrieval_epoch:provider_limited:01
    index_epoch_ref: search:index_epoch:provider_limited:01
    graph_epoch_ref: graph:epoch:provider_limited:01
    docs_pack_epoch_ref: null
    embedding_epoch_ref: embedding:epoch:provider_limited:01
    embedder_model_ref: embedding:model:local-small:01
    chunker_ref: embedding:chunker:code:01
    retrieval_locality_class: local_only
    shard_snapshot_refs:
      - shard_row_id: search_shard_row:semantic_lookup.embedding
        shard_snapshot_id: search:shard_snapshot:provider_limited:embedding
        freshness_class: warm_cached
        readiness_state: warm_index
        captured_at: "2026-04-24T10:01:00Z"
      - shard_row_id: search_shard_row:provider_overlay.issues
        shard_snapshot_id: search:shard_snapshot:provider_limited:issues
        freshness_class: unverified
        readiness_state: index_unavailable
        captured_at: "2026-04-24T10:01:00Z"
  result_snapshot_refs:
    - result_snapshot_id: search:result_snapshot:provider_limited:01
      result_set_id_ref: search:result_set:provider_limited:01
      planner_pass_id_ref: search:planner:provider_limited:01
      collection_snapshot_id_ref: null
      result_snapshot_capture_class: ai_context_pack
      snapshot_truth_claim_class: live_revalidation_required
      visible_result_count: 5
      hidden_result_count: 12
      result_identity_refs:
        - search:identity:provider_limited:workspace_context
      captured_at: "2026-04-24T10:01:00Z"
  export_sharing_posture:
    share_policy_class: local_only_private
    export_materiality_class: hashed_query_and_counts
    support_capture_class: not_captured
    snapshot_truth_claim_class: live_revalidation_required
    snapshot_export_fields:
      - snapshot_includes_hidden_result_count_disclosure
      - snapshot_includes_partial_truth_causes
      - snapshot_includes_ranking_reason_classes
      - snapshot_includes_result_truth_classes
      - snapshot_includes_provider_attribution_chip
      - snapshot_includes_scope_filter_class_pin
      - snapshot_includes_planner_pass_ref
    local_by_default: true
    export_review_ref: null
    share_denial_ref: search:share_denial:provider_limited:provider_auth
  running_build_identity_ref: build:running:01
  policy_context:
    policy_epoch: pe:2026-04-24:01
    trust_state: trusted
    execution_context_id: exec:search:provider_limited
  client_scopes:
    - desktop_product
    - sdk_or_api
  redaction_class: operator_only_restricted
  opened_at: "2026-04-24T10:00:58Z"
  updated_at: "2026-04-24T10:01:00Z"
  closed_at: null

result_identities:
  - record_kind: search_result_identity_record
    search_result_identity_schema_version: 1
    result_identity_id: search:identity:provider_limited:workspace_context
    stable_result_key: srid:ai-context:workspace-only-provider-limited
    object_identity:
      object_kind_class: text_range
      canonical_entity_ref: graph:entity:workspace_context_provider_limited
      object_identity_hash_ref: search:identity_hash:provider_limited:workspace_context
      workspace_id_ref: workspace:current
      root_id_ref: workspace:root:app
      path_identity_ref: path:id:workspace_context
      symbol_anchor_ref: null
      docs_anchor_ref: null
      graph_node_id_ref: graph:node:workspace_context
      provider_resource_id_ref: null
      generated_lineage_ref: null
      command_id_ref: null
      coordinate_span_ref: text:span:workspace_context
    access_kind: cite
    access_state_class: accessible
    source_refs:
      query_session_id_ref: search:session:provider_limited:01
      result_set_id_ref: search:result_set:provider_limited:01
      planner_pass_id_ref: search:planner:provider_limited:01
      search_result_packet_ref: search:packet:provider_limited:workspace_context
      result_fusion_record_ref: search:fusion:provider_limited:workspace_context
      query_session_result_snapshot_ref: search:result_snapshot:provider_limited:01
      search_collection_snapshot_ref: null
      saved_query_id_ref: null
      deep_link_id_ref: search:deep_link:provider_limited:workspace_context
    truth_basis:
      result_truth_class: hybrid
      readiness_state: warm_index
      freshness_class: warm_cached
      semantic_fallback_state: semantic_degraded_lexical_preferred
      ranking_reason_classes:
        - lexical_fuzzy_match
        - semantic_embedding_neighbour
      source_classes:
        - lexical_index
        - embedding_recall
      stale_or_partial_explanation:
        partial_truth_causes:
          - provider_overlay_unreachable
        human_readable_summary: Connected-provider results are unavailable — showing workspace results only.
    count_disclosures:
      visible_result_count: 5
      matching_result_count: null
      matching_result_count_known: false
      hidden_result_disclosure:
        hidden_result_count: 12
        count_is_approximate: true
        hidden_scope_reasons:
          - provider_overlay_unauthorised
      blocked_result_disclosure:
        blocked_result_count: 12
        count_is_approximate: true
        blocked_result_reasons:
          - provider_unauthorised
    drift_and_remap:
      deep_link_drift_state: resolved_exact
      drift_resolution_class: current_resolution_exact
      remap_chain_refs: []
      predecessor_identity_refs: []
      successor_identity_refs: []
      current_resolution_ref: search:resolution:provider_limited:workspace_context
      drift_note_ref: null
    projection_keys:
      - surface_class: ai_context_search
        surface_row_ref: search:row:provider_limited:workspace_context
        surface_result_set_ref: search:result_set:provider_limited:01
    policy_context:
      policy_epoch: pe:2026-04-24:01
      trust_state: trusted
      execution_context_id: exec:search:provider_limited
    redaction_class: operator_only_restricted
    minted_at: "2026-04-24T10:01:00Z"
    last_revalidated_at: "2026-04-24T10:01:00Z"

explanation_captures:
  - record_kind: search_explanation_capture_record
    search_explanation_capture_schema_version: 1
    explanation_capture_id: search:explain:provider_limited:workspace_context
    query_session_id_ref: search:session:provider_limited:01
    result_identity_id_ref: search:identity:provider_limited:workspace_context
    search_result_packet_ref: search:packet:provider_limited:workspace_context
    result_set_id_ref: search:result_set:provider_limited:01
    planner_pass_id_ref: search:planner:provider_limited:01
    source_surface_class: ai_context_search
    capture_purpose_class: ai_context_evidence
    visible_summary:
      primary_explanation_signals:
        - semantic_match
        - provider_limited
        - degraded_index_state
      ranking_reason_classes:
        - lexical_fuzzy_match
        - semantic_embedding_neighbour
      result_truth_class: hybrid
      readiness_state: warm_index
      freshness_class: warm_cached
      scope_filter_class: current_root
      semantic_fallback_state: semantic_degraded_lexical_preferred
      hidden_result_disclosure:
        hidden_result_count: 12
        count_is_approximate: true
        hidden_scope_reasons:
          - provider_overlay_unauthorised
      stale_or_partial_explanation:
        partial_truth_causes:
          - provider_overlay_unreachable
        human_readable_summary: Connected-provider results are unavailable — showing workspace results only.
    explanation_entries:
      - entry_id: search:explain_entry:provider_limited:semantic
        explanation_signal_class: semantic_match
        ranking_reason_classes:
          - semantic_embedding_neighbour
        hidden_scope_reasons: []
        partial_truth_causes: []
        readiness_state: null
        semantic_fallback_state: semantic_degraded_lexical_preferred
        visibility_tier: detail_visible
        contribution_direction: boosted
        display_copy_token: reason.semantic_match
        explanation_weight_bucket: semantic_supplement
        term_ref: search:term:provider_limited:concept
        source_ref: search:shard_snapshot:provider_limited:embedding
        debug_payload_ref: null
        redacted_detail_ref: search:redacted_detail:provider_limited:semantic
      - entry_id: search:explain_entry:provider_limited:provider
        explanation_signal_class: provider_limited
        ranking_reason_classes:
          - policy_hidden_placeholder
        hidden_scope_reasons:
          - provider_overlay_unauthorised
        partial_truth_causes:
          - provider_overlay_unreachable
        readiness_state: index_unavailable
        semantic_fallback_state: semantic_degraded_lexical_preferred
        visibility_tier: always_visible
        contribution_direction: withheld
        display_copy_token: reason.provider_limited
        explanation_weight_bucket: policy_required_inclusion
        term_ref: null
        source_ref: search:shard_snapshot:provider_limited:issues
        debug_payload_ref: null
        redacted_detail_ref: search:redacted_detail:provider_limited:provider
    capture_rules:
      always_visible_fields:
        - result_truth_class
        - readiness_state
        - freshness_class
        - source_class
        - scope_filter_class
        - primary_ranking_reasons
        - hidden_result_count
        - blocked_result_count
        - semantic_fallback_state
      debug_opt_in_fields:
        - shard_snapshot_refs
        - normalized_term_hash_refs
        - provider_latency_bucket
      forbidden_fields:
        - raw_query_text
        - raw_document_body
        - raw_symbol_definition
        - raw_absolute_path
        - raw_provider_payload
        - raw_url
        - raw_secret
        - numeric_rank_weight
        - support_only_unexplained_heuristic
      support_only_cannot_be_sole_explanation: true
    export_rules:
      export_policy_class: local_only_not_exported
      include_debug_refs: false
      raw_material_allowed: false
    policy_context:
      policy_epoch: pe:2026-04-24:01
      trust_state: trusted
      execution_context_id: exec:search:provider_limited
    redaction_class: operator_only_restricted
    captured_at: "2026-04-24T10:01:00Z"

expected_assertions:
  - provider omissions use provider_limited and provider_overlay_unauthorised tokens.
  - workspace results remain usable and do not claim provider coverage.
  - semantic match is detail-visible, while provider limitation is always visible.
