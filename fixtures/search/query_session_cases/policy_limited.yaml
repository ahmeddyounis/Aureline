case_id: search_query_session.policy_limited
purpose: >
  A docs search runs under an admin-narrowed source policy. The session records
  the policy-limited scope, hidden count, redacted query material, and support-
  safe explanation without exposing hidden docs content.
schemas:
  query_session: schemas/search/query_session.schema.json
  result_identity: schemas/search/search_result_identity.schema.json
  explanation_capture: schemas/search/search_explanation_capture.schema.json

query_session:
  record_kind: query_session_record
  query_session_schema_version: 1
  query_session_id: search:session:policy_limited:01
  source_surface_projection:
    source_surface_class: docs_search
    primary_result_surface_class: docs_search
    projected_surface_classes:
      - docs_search
      - support_export
    projection_note_ref: search:projection_note:policy_limited:01
  query_text:
    query_text_storage_class: local_per_device_history
    query_text_material_class: support_redacted
    redacted_query_text: "[redacted docs query]"
    query_hash_ref: search:query_hash:policy_limited:01
    literal_store_ref: null
    locale: en-US
    input_mode: keyboard
    contains_sensitive_literal: true
    secret_detection_state: suspected_secret_redacted
  normalized_query_parse:
    parser_id: search:parser:docs
    parser_version: "1"
    query_language_class: docs_topic
    query_classification: docs_topic_lookup
    normalized_terms:
      - term_id: search:term:policy_limited:topic
        term_role: primary_term
        term_material_class: hashed_literal
        term_hash_ref: search:term_hash:policy_limited:topic
        term_boost_class: not_boosted
        source_span_ref: search:span:policy_limited:topic
      - term_id: search:term:policy_limited:pack_filter
        term_role: scope_filter_term
        term_material_class: operator_only
        term_hash_ref: null
        term_boost_class: not_boosted
        source_span_ref: search:span:policy_limited:filter
    filters:
      - filter_class: scope_filter
        filter_value_ref: search:scope:docs_pack_only
        filter_enabled: true
      - filter_class: docs_pack_filter
        filter_value_ref: docs:pack:approved_only
        filter_enabled: true
    parse_warning_refs:
      - search:parse_warning:policy_limited:redacted_literal
  scope_binding:
    scope_binding_id_ref: search:scope_binding:policy_limited:01
    scope_source_class: policy_narrowed
    scope_filter_class: policy_limited_view
    lane_grouping_id: group:docs_search
    workset_id_ref: null
    root_refs: []
    included_scope_refs:
      - docs:pack:approved_only
    excluded_scope_refs:
      - docs:pack:quarantined_vendor
    hidden_result_disclosure:
      hidden_result_count: 17
      count_is_approximate: false
      hidden_scope_reasons:
        - policy_narrows_source
        - pack_quarantined
    client_scopes:
      - desktop_product
      - managed_admin_surface
  ranking_profile:
    ranking_profile_id: search:rank_profile:docs_policy_limited
    ranking_mode_class: relevance
    stable_ordering_policy_class: selection_stable_during_rerank
    lexical_first: true
    semantic_supplement_allowed: false
    ranking_reason_classes:
      - docs_anchor_match
      - policy_hidden_placeholder
    reason_visibility_class: primary_reason_visible
    rank_weight_disclosure_class: weight_bucket_only
    ranker_epoch_ref: search:ranker_epoch:docs:2026-04-24:01
    debug_detail_available: true
  history_policy:
    history_policy_class: support_capture_redacted
    history_retention_class: support_export_redacted_retention
    sensitive_literal_handling_class: literal_redacted_at_boundary_default
    raw_query_export_allowed: false
    synced_history_allowed: false
    query_history_entry_refs:
      - search:history_entry:policy_limited:01
    saved_query_id_ref: null
    retention_governance_ref: search:retention:support_redacted
  freshness_state:
    readiness_state: fully_indexed
    freshness_class: authoritative_live
    semantic_fallback_state: semantic_disabled_by_policy
    stale_or_partial_explanation:
      partial_truth_causes:
        - policy_blocked_shard
      human_readable_summary: Admin policy narrows the source of results — some scopes are excluded.
    hidden_result_disclosure:
      hidden_result_count: 17
      count_is_approximate: false
      hidden_scope_reasons:
        - policy_narrows_source
        - pack_quarantined
    last_indexed_at: "2026-04-24T09:10:00Z"
    last_refreshed_at: "2026-04-24T09:12:00Z"
  retrieval_epoch:
    retrieval_epoch_ref: search:retrieval_epoch:policy_limited:01
    index_epoch_ref: search:index_epoch:policy_limited:01
    graph_epoch_ref: null
    docs_pack_epoch_ref: docs:epoch:approved_pack:01
    embedding_epoch_ref: null
    embedder_model_ref: null
    chunker_ref: null
    retrieval_locality_class: workspace_mirror
    shard_snapshot_refs:
      - shard_row_id: search_shard_row:docs_search.docs_pack
        shard_snapshot_id: search:shard_snapshot:policy_limited:docs
        freshness_class: authoritative_live
        readiness_state: fully_indexed
        captured_at: "2026-04-24T09:12:00Z"
      - shard_row_id: search_shard_row:docs_search.provider_overlay
        shard_snapshot_id: search:shard_snapshot:policy_limited:quarantined
        freshness_class: unverified
        readiness_state: index_unavailable
        captured_at: "2026-04-24T09:12:00Z"
  result_snapshot_refs:
    - result_snapshot_id: search:result_snapshot:policy_limited:01
      result_set_id_ref: search:result_set:policy_limited:01
      planner_pass_id_ref: search:planner:policy_limited:01
      collection_snapshot_id_ref: search:collection_snapshot:policy_limited:01
      result_snapshot_capture_class: support_quote
      snapshot_truth_claim_class: captured_snapshot_not_current_truth
      visible_result_count: 3
      hidden_result_count: 17
      result_identity_refs:
        - search:identity:policy_limited:approved_doc
        - search:identity:policy_limited:hidden_docs
      captured_at: "2026-04-24T09:12:00Z"
  export_sharing_posture:
    share_policy_class: support_export_redacted_only
    export_materiality_class: redacted_query_and_identity_refs
    support_capture_class: support_full_metadata_no_raw
    snapshot_truth_claim_class: captured_snapshot_not_current_truth
    snapshot_export_fields:
      - snapshot_includes_hidden_result_count_disclosure
      - snapshot_includes_partial_truth_causes
      - snapshot_includes_ranking_reason_classes
      - snapshot_includes_result_truth_classes
      - snapshot_includes_scope_filter_class_pin
      - snapshot_includes_planner_pass_ref
      - snapshot_includes_citation_anchor_refs
      - snapshot_includes_redaction_class_pin
      - snapshot_includes_running_build_identity_pin
      - snapshot_includes_policy_epoch_pin
    local_by_default: true
    export_review_ref: search:export_review:policy_limited:01
    share_denial_ref: null
  running_build_identity_ref: build:running:01
  policy_context:
    policy_epoch: pe:2026-04-24:managed
    trust_state: restricted
    execution_context_id: exec:search:policy_limited
  client_scopes:
    - desktop_product
    - managed_admin_surface
  redaction_class: internal_support_restricted
  opened_at: "2026-04-24T09:11:55Z"
  updated_at: "2026-04-24T09:12:00Z"
  closed_at: "2026-04-24T09:12:10Z"

result_identities:
