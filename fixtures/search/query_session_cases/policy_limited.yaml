      search_result_packet_ref: search:packet:policy_limited:approved_doc
      result_fusion_record_ref: search:fusion:policy_limited:approved_doc
      query_session_result_snapshot_ref: search:result_snapshot:policy_limited:01
      search_collection_snapshot_ref: search:collection_snapshot:policy_limited:01
      saved_query_id_ref: null
      deep_link_id_ref: search:deep_link:policy_limited:approved_doc
    truth_basis:
      result_truth_class: imported
      readiness_state: fully_indexed
      freshness_class: authoritative_live
