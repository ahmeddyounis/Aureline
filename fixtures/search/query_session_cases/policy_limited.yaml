      object_identity_hash_ref: search:identity_hash:policy_limited:approved_doc
      workspace_id_ref: workspace:current
      root_id_ref: null
      path_identity_ref: null
      symbol_anchor_ref: null
      docs_anchor_ref: docs:anchor:approved_policy_note
      graph_node_id_ref: null
      provider_resource_id_ref: null
      generated_lineage_ref: null
      command_id_ref: null
      coordinate_span_ref: null
    access_kind: cite
