explanation_captures:
  - record_kind: search_explanation_capture_record
    search_explanation_capture_schema_version: 1
    explanation_capture_id: search:explain:policy_limited:hidden_docs
    query_session_id_ref: search:session:policy_limited:01
    result_identity_id_ref: search:identity:policy_limited:hidden_docs
    search_result_packet_ref: search:packet:policy_limited:hidden_docs
    result_set_id_ref: search:result_set:policy_limited:01
    planner_pass_id_ref: search:planner:policy_limited:01
    source_surface_class: docs_search
    capture_purpose_class: support_export
    visible_summary:
      primary_explanation_signals:
        - policy_hidden
        - scope_filter_exclusion
      ranking_reason_classes:
        - policy_hidden_placeholder
      result_truth_class: imported
      readiness_state: fully_indexed
      freshness_class: authoritative_live
      scope_filter_class: policy_limited_view
      semantic_fallback_state: semantic_disabled_by_policy
      hidden_result_disclosure:
        hidden_result_count: 17
        count_is_approximate: false
        hidden_scope_reasons:
          - policy_narrows_source
          - pack_quarantined
      stale_or_partial_explanation:
        partial_truth_causes:
          - policy_blocked_shard
        human_readable_summary: Admin policy narrows the source of results — some scopes are excluded.
    explanation_entries:
      - entry_id: search:explain_entry:policy_limited:policy_hidden
        explanation_signal_class: policy_hidden
        ranking_reason_classes:
          - policy_hidden_placeholder
        hidden_scope_reasons:
          - policy_narrows_source
          - pack_quarantined
        partial_truth_causes:
          - policy_blocked_shard
        readiness_state: fully_indexed
        semantic_fallback_state: semantic_disabled_by_policy
        visibility_tier: always_visible
        contribution_direction: withheld
        display_copy_token: reason.policy_hidden
        explanation_weight_bucket: policy_required_inclusion
        term_ref: null
        source_ref: search:shard_snapshot:policy_limited:quarantined
        debug_payload_ref: null
        redacted_detail_ref: search:redacted_detail:policy_limited:hidden_docs
    capture_rules:
      always_visible_fields:
        - result_truth_class
        - readiness_state
        - freshness_class
        - source_class
        - scope_filter_class
        - hidden_result_count
        - blocked_result_count
        - semantic_fallback_state
      debug_opt_in_fields:
        - shard_snapshot_refs
        - planner_stage_refs
      forbidden_fields:
        - raw_query_text
        - raw_document_body
        - raw_symbol_definition
        - raw_absolute_path
        - raw_provider_payload
        - raw_url
        - raw_secret
        - numeric_rank_weight
        - support_only_unexplained_heuristic
      support_only_cannot_be_sole_explanation: true
    export_rules:
      export_policy_class: support_export_metadata_no_raw
      include_debug_refs: false
      raw_material_allowed: false
    policy_context:
      policy_epoch: pe:2026-04-24:managed
      trust_state: restricted
      execution_context_id: exec:search:policy_limited
    redaction_class: internal_support_restricted
    captured_at: "2026-04-24T09:12:00Z"

expected_assertions:
  - hidden docs have a placeholder identity but no hidden labels or content.
  - support export carries policy-hidden explanation tokens and no raw query.
  - captured snapshot is explicitly not current live truth.
