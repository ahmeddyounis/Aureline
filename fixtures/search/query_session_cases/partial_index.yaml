case_id: search_query_session.partial_index
purpose: >
  A global search starts before full indexing completes. The session preserves
  the typed query intent, partial-readiness state, shard snapshot, stable result
  identity, and always-visible partial-index explanation.
schemas:
  query_session: schemas/search/query_session.schema.json
  result_identity: schemas/search/search_result_identity.schema.json
  explanation_capture: schemas/search/search_explanation_capture.schema.json

query_session:
  record_kind: query_session_record
  query_session_schema_version: 1
  query_session_id: search:session:partial_index:01
  source_surface_projection:
    source_surface_class: global_search
    primary_result_surface_class: full_search
    projected_surface_classes:
      - full_search
    projection_note_ref: search:projection_note:partial_index:01
  query_text:
    query_text_storage_class: local_per_device_history
    query_text_material_class: redacted_text
    redacted_query_text: auth retry policy
    query_hash_ref: search:query_hash:partial_index:01
    literal_store_ref: null
    locale: en-US
    input_mode: keyboard
    contains_sensitive_literal: false
    secret_detection_state: no_secret_detected
  normalized_query_parse:
    parser_id: search:parser:default
    parser_version: "1"
    query_language_class: plain_text
    query_classification: text_substring_lookup
    normalized_terms:
      - term_id: search:term:partial_index:auth
        term_role: primary_term
        term_material_class: redacted_literal
        redacted_term_text: auth
        term_hash_ref: search:term_hash:partial_index:auth
        term_boost_class: not_boosted
        source_span_ref: search:span:partial_index:auth
      - term_id: search:term:partial_index:retry
        term_role: primary_term
        term_material_class: redacted_literal
        redacted_term_text: retry
        term_hash_ref: search:term_hash:partial_index:retry
        term_boost_class: not_boosted
        source_span_ref: search:span:partial_index:retry
      - term_id: search:term:partial_index:policy
        term_role: primary_term
        term_material_class: redacted_literal
        redacted_term_text: policy
        term_hash_ref: search:term_hash:partial_index:policy
        term_boost_class: not_boosted
        source_span_ref: search:span:partial_index:policy
    filters:
      - filter_class: scope_filter
        filter_value_ref: search:scope:full_workspace
        filter_enabled: true
    parse_warning_refs: []
  scope_binding:
    scope_binding_id_ref: search:scope_binding:partial_index:01
    scope_source_class: current_context
    scope_filter_class: full_workspace
    lane_grouping_id: group:full_search
    workset_id_ref: null
    root_refs:
      - workspace:root:app
      - workspace:root:packages
    included_scope_refs:
      - workspace:root:app
      - workspace:root:packages
    excluded_scope_refs: []
    hidden_result_disclosure: null
    client_scopes:
      - desktop_product
  ranking_profile:
    ranking_profile_id: search:rank_profile:relevance
    ranking_mode_class: relevance
    stable_ordering_policy_class: selection_stable_during_rerank
    lexical_first: true
    semantic_supplement_allowed: false
    ranking_reason_classes:
      - lexical_fuzzy_match
      - recent_file_bias
    reason_visibility_class: primary_reason_visible
    rank_weight_disclosure_class: weight_bucket_only
    ranker_epoch_ref: search:ranker_epoch:2026-04-24:01
    debug_detail_available: true
  history_policy:
    history_policy_class: local_history
    history_retention_class: local_per_device_recent
    sensitive_literal_handling_class: literal_redacted_at_boundary_default
    raw_query_export_allowed: false
    synced_history_allowed: false
    query_history_entry_refs:
      - search:history_entry:partial_index:01
    saved_query_id_ref: null
    retention_governance_ref: search:retention:local_recent
  freshness_state:
    readiness_state: partial_index
    freshness_class: degraded_cached
    semantic_fallback_state: semantic_unavailable_lexical_only
    stale_or_partial_explanation:
      partial_truth_causes:
        - hot_set_only
        - indexing_in_progress
      human_readable_summary: Still indexing the rest of the workspace — these results are partial.
    hidden_result_disclosure: null
    last_indexed_at: "2026-04-24T08:00:00Z"
    last_refreshed_at: "2026-04-24T08:00:05Z"
  retrieval_epoch:
    retrieval_epoch_ref: search:retrieval_epoch:partial_index:01
    index_epoch_ref: search:index_epoch:partial_index:01
    graph_epoch_ref: null
    docs_pack_epoch_ref: null
    embedding_epoch_ref: null
    embedder_model_ref: null
    chunker_ref: null
    retrieval_locality_class: local_only
    shard_snapshot_refs:
      - shard_row_id: search_shard_row:full_search.per_root_lexical
        shard_snapshot_id: search:shard_snapshot:partial_index:lexical
        freshness_class: degraded_cached
        readiness_state: partial_index
        captured_at: "2026-04-24T08:00:05Z"
      - shard_row_id: search_shard_row:quick_open.hot_set_lexical
        shard_snapshot_id: search:shard_snapshot:partial_index:hot_set
        freshness_class: authoritative_live
        readiness_state: hot_set_ready
        captured_at: "2026-04-24T08:00:05Z"
  result_snapshot_refs:
    - result_snapshot_id: search:result_snapshot:partial_index:01
      result_set_id_ref: search:result_set:partial_index:01
      planner_pass_id_ref: search:planner:partial_index:01
      collection_snapshot_id_ref: null
      result_snapshot_capture_class: streaming_partial
      snapshot_truth_claim_class: current_at_capture_only
      visible_result_count: 8
      hidden_result_count: 0
      result_identity_refs:
        - search:identity:partial_index:auth_policy
      captured_at: "2026-04-24T08:00:05Z"
  export_sharing_posture:
    share_policy_class: local_export_redacted
    export_materiality_class: redacted_query_and_identity_refs
    support_capture_class: not_captured
    snapshot_truth_claim_class: current_at_capture_only
    snapshot_export_fields:
      - snapshot_includes_hidden_result_count_disclosure
      - snapshot_includes_partial_truth_causes
      - snapshot_includes_ranking_reason_classes
      - snapshot_includes_scope_filter_class_pin
      - snapshot_includes_planner_pass_ref
      - snapshot_includes_shard_authority_inventory
      - snapshot_includes_running_build_identity_pin
      - snapshot_includes_policy_epoch_pin
    local_by_default: true
    export_review_ref: search:export_review:partial_index:01
    share_denial_ref: null
  running_build_identity_ref: build:running:01
  policy_context:
    policy_epoch: pe:2026-04-24:01
    trust_state: trusted
    execution_context_id: exec:search:partial_index
  client_scopes:
    - desktop_product
  redaction_class: metadata_safe_default
  opened_at: "2026-04-24T08:00:00Z"
  updated_at: "2026-04-24T08:00:05Z"
  closed_at: null

result_identities:
  - record_kind: search_result_identity_record
    search_result_identity_schema_version: 1
    result_identity_id: search:identity:partial_index:auth_policy
    stable_result_key: srid:workspace-file:auth-policy:partial-index
    object_identity:
      object_kind_class: text_range
      canonical_entity_ref: graph:entity:auth_policy_retry
      object_identity_hash_ref: search:identity_hash:auth_policy_retry
      workspace_id_ref: workspace:current
      root_id_ref: workspace:root:app
      path_identity_ref: path:id:auth_policy
      symbol_anchor_ref: null
      docs_anchor_ref: null
      graph_node_id_ref: graph:node:auth_policy_retry
      provider_resource_id_ref: null
      generated_lineage_ref: null
      command_id_ref: null
      coordinate_span_ref: text:span:auth_policy_retry
    access_kind: open_read
    access_state_class: accessible
    source_refs:
      query_session_id_ref: search:session:partial_index:01
      result_set_id_ref: search:result_set:partial_index:01
      planner_pass_id_ref: search:planner:partial_index:01
      search_result_packet_ref: search:packet:partial_index:auth_policy
      result_fusion_record_ref: search:fusion:partial_index:auth_policy
      query_session_result_snapshot_ref: search:result_snapshot:partial_index:01
      search_collection_snapshot_ref: null
      saved_query_id_ref: null
      deep_link_id_ref: search:deep_link:partial_index:auth_policy
    truth_basis:
      result_truth_class: heuristic
      readiness_state: partial_index
      freshness_class: degraded_cached
      semantic_fallback_state: semantic_unavailable_lexical_only
      ranking_reason_classes:
        - lexical_fuzzy_match
        - recent_file_bias
      source_classes:
        - lexical_index
        - hot_cache
      stale_or_partial_explanation:
        partial_truth_causes:
          - hot_set_only
          - indexing_in_progress
        human_readable_summary: Still indexing the rest of the workspace — these results are partial.
    count_disclosures:
      visible_result_count: 8
      matching_result_count: null
      matching_result_count_known: false
      hidden_result_disclosure: null
      blocked_result_disclosure: null
    drift_and_remap:
      deep_link_drift_state: resolved_exact
      drift_resolution_class: current_resolution_exact
      remap_chain_refs: []
      predecessor_identity_refs: []
      successor_identity_refs: []
      current_resolution_ref: search:resolution:partial_index:auth_policy
      drift_note_ref: null
    projection_keys:
      - surface_class: global_search
        surface_row_ref: search:row:partial_index:auth_policy
        surface_result_set_ref: search:result_set:partial_index:01
    policy_context:
      policy_epoch: pe:2026-04-24:01
      trust_state: trusted
      execution_context_id: exec:search:partial_index
    redaction_class: metadata_safe_default
    minted_at: "2026-04-24T08:00:05Z"
    last_revalidated_at: "2026-04-24T08:00:05Z"

explanation_captures:
  - record_kind: search_explanation_capture_record
    search_explanation_capture_schema_version: 1
    explanation_capture_id: search:explain:partial_index:auth_policy
    query_session_id_ref: search:session:partial_index:01
    result_identity_id_ref: search:identity:partial_index:auth_policy
    search_result_packet_ref: search:packet:partial_index:auth_policy
    result_set_id_ref: search:result_set:partial_index:01
    planner_pass_id_ref: search:planner:partial_index:01
    source_surface_class: global_search
    capture_purpose_class: result_detail_sheet
    visible_summary:
      primary_explanation_signals:
        - prefix_or_fuzzy_match
        - recentness_boost
        - partial_index_state
      ranking_reason_classes:
        - lexical_fuzzy_match
        - recent_file_bias
      result_truth_class: heuristic
      readiness_state: partial_index
      freshness_class: degraded_cached
      scope_filter_class: full_workspace
      semantic_fallback_state: semantic_unavailable_lexical_only
      hidden_result_disclosure: null
      stale_or_partial_explanation:
        partial_truth_causes:
          - hot_set_only
          - indexing_in_progress
        human_readable_summary: Still indexing the rest of the workspace — these results are partial.
    explanation_entries:
      - entry_id: search:explain_entry:partial_index:fuzzy
        explanation_signal_class: prefix_or_fuzzy_match
        ranking_reason_classes:
          - lexical_fuzzy_match
        hidden_scope_reasons: []
        partial_truth_causes: []
        readiness_state: null
        semantic_fallback_state: null
        visibility_tier: always_visible
        contribution_direction: boosted
        display_copy_token: reason.exact_match
        explanation_weight_bucket: primary_signal
        term_ref: search:term:partial_index:retry
        source_ref: search:shard_snapshot:partial_index:lexical
        debug_payload_ref: null
        redacted_detail_ref: search:redacted_detail:partial_index:fuzzy
      - entry_id: search:explain_entry:partial_index:partial
        explanation_signal_class: partial_index_state
        ranking_reason_classes: []
        hidden_scope_reasons: []
        partial_truth_causes:
          - hot_set_only
          - indexing_in_progress
        readiness_state: partial_index
        semantic_fallback_state: semantic_unavailable_lexical_only
        visibility_tier: always_visible
        contribution_direction: neutral
        display_copy_token: reason.partial_index
        explanation_weight_bucket: not_applicable
        term_ref: null
        source_ref: search:shard_snapshot:partial_index:lexical
        debug_payload_ref: null
        redacted_detail_ref: search:redacted_detail:partial_index:state
    capture_rules:
      always_visible_fields:
        - result_truth_class
        - readiness_state
        - freshness_class
        - scope_filter_class
        - primary_ranking_reasons
        - semantic_fallback_state
      debug_opt_in_fields:
        - shard_snapshot_refs
        - normalized_term_hash_refs
        - planner_stage_refs
        - rank_weight_buckets
      forbidden_fields:
        - raw_query_text
        - raw_document_body
        - raw_symbol_definition
        - raw_absolute_path
        - raw_provider_payload
        - raw_url
        - raw_secret
        - numeric_rank_weight
        - support_only_unexplained_heuristic
      support_only_cannot_be_sole_explanation: true
    export_rules:
      export_policy_class: export_visible_summary_only
      include_debug_refs: false
      raw_material_allowed: false
    policy_context:
      policy_epoch: pe:2026-04-24:01
      trust_state: trusted
      execution_context_id: exec:search:partial_index
    redaction_class: metadata_safe_default
    captured_at: "2026-04-24T08:00:05Z"

expected_assertions:
  - session owns the partial-index and freshness truth for every row.
  - support or export must not describe the snapshot as fully indexed.
  - explanation entries use reusable partial_index_state and prefix_or_fuzzy_match terms.
