case_id: search_query_session.hidden_by_filter
purpose: >
  A file search hides matches through a user filter. The session keeps visible,
  matching, and hidden counts separate and records a reusable hidden-by-filter
  explanation.
schemas:
  query_session: schemas/search/query_session.schema.json
  result_identity: schemas/search/search_result_identity.schema.json
  explanation_capture: schemas/search/search_explanation_capture.schema.json

query_session:
  record_kind: query_session_record
  query_session_schema_version: 1
  query_session_id: search:session:hidden_by_filter:01
  source_surface_projection:
    source_surface_class: file_search
    primary_result_surface_class: full_search
    projected_surface_classes:
      - full_search
      - support_export
    projection_note_ref: search:projection_note:hidden_by_filter:01
  query_text:
    query_text_storage_class: local_profile_history
    query_text_material_class: redacted_text
    redacted_query_text: route handler
    query_hash_ref: search:query_hash:hidden_by_filter:01
    literal_store_ref: null
    locale: en-US
    input_mode: keyboard
    contains_sensitive_literal: false
    secret_detection_state: no_secret_detected
  normalized_query_parse:
    parser_id: search:parser:default
    parser_version: "1"
    query_language_class: plain_text
    query_classification: text_substring_lookup
    normalized_terms:
      - term_id: search:term:hidden_by_filter:route
        term_role: primary_term
        term_material_class: redacted_literal
        redacted_term_text: route
        term_hash_ref: search:term_hash:hidden_by_filter:route
        term_boost_class: not_boosted
        source_span_ref: search:span:hidden_by_filter:route
      - term_id: search:term:hidden_by_filter:generated_exclude
        term_role: excluded_term
        term_material_class: operator_only
        term_hash_ref: null
        term_boost_class: not_boosted
        source_span_ref: search:span:hidden_by_filter:exclude
    filters:
      - filter_class: include_ignored_filter
        filter_value_ref: search:filter:ignored_off
        filter_enabled: true
      - filter_class: file_type_filter
        filter_value_ref: search:filter:no_generated
        filter_enabled: true
    parse_warning_refs: []
  scope_binding:
    scope_binding_id_ref: search:scope_binding:hidden_by_filter:01
    scope_source_class: user_selected
    scope_filter_class: current_root
    lane_grouping_id: group:full_search
    workset_id_ref: null
    root_refs:
      - workspace:root:web
    included_scope_refs:
      - workspace:root:web
    excluded_scope_refs:
      - workspace:path_class:generated
      - workspace:path_class:ignored
    hidden_result_disclosure:
      hidden_result_count: 9
      count_is_approximate: false
      hidden_scope_reasons:
        - excluded_by_user_filter
    client_scopes:
      - desktop_product
      - cli
  ranking_profile:
    ranking_profile_id: search:rank_profile:path
    ranking_mode_class: path
    stable_ordering_policy_class: path_deterministic_order
    lexical_first: true
    semantic_supplement_allowed: false
    ranking_reason_classes:
      - exact_name_match
      - lexical_prefix_match
    reason_visibility_class: primary_reason_visible
    rank_weight_disclosure_class: no_numeric_weights
    ranker_epoch_ref: search:ranker_epoch:hidden_by_filter:01
    debug_detail_available: false
  history_policy:
    history_policy_class: saved_query
    history_retention_class: local_profile_recent
    sensitive_literal_handling_class: literal_redacted_at_boundary_default
    raw_query_export_allowed: false
    synced_history_allowed: false
    query_history_entry_refs:
      - search:history_entry:hidden_by_filter:01
    saved_query_id_ref: search:saved_query:hidden_by_filter:01
    retention_governance_ref: search:retention:local_profile
  freshness_state:
    readiness_state: fully_indexed
    freshness_class: authoritative_live
    semantic_fallback_state: semantic_not_applicable
    stale_or_partial_explanation:
      partial_truth_causes:
        - outside_loaded_scope
      human_readable_summary: Results outside the loaded scope are not included.
    hidden_result_disclosure:
      hidden_result_count: 9
      count_is_approximate: false
      hidden_scope_reasons:
        - excluded_by_user_filter
    last_indexed_at: "2026-04-24T11:00:00Z"
    last_refreshed_at: "2026-04-24T11:03:00Z"
  retrieval_epoch:
    retrieval_epoch_ref: search:retrieval_epoch:hidden_by_filter:01
    index_epoch_ref: search:index_epoch:hidden_by_filter:01
    graph_epoch_ref: null
    docs_pack_epoch_ref: null
    embedding_epoch_ref: null
    embedder_model_ref: null
    chunker_ref: null
    retrieval_locality_class: local_only
    shard_snapshot_refs:
      - shard_row_id: search_shard_row:full_search.per_root_lexical
        shard_snapshot_id: search:shard_snapshot:hidden_by_filter:lexical
        freshness_class: authoritative_live
        readiness_state: fully_indexed
        captured_at: "2026-04-24T11:03:00Z"
  result_snapshot_refs:
    - result_snapshot_id: search:result_snapshot:hidden_by_filter:01
      result_set_id_ref: search:result_set:hidden_by_filter:01
      planner_pass_id_ref: search:planner:hidden_by_filter:01
      collection_snapshot_id_ref: search:collection_snapshot:hidden_by_filter:01
      result_snapshot_capture_class: saved_query_snapshot
      snapshot_truth_claim_class: captured_snapshot_not_current_truth
      visible_result_count: 4
      hidden_result_count: 9
      result_identity_refs:
        - search:identity:hidden_by_filter:route_handler
      captured_at: "2026-04-24T11:03:00Z"
  export_sharing_posture:
    share_policy_class: workspace_share_explicit_admit_required
    export_materiality_class: redacted_query_and_identity_refs
    support_capture_class: support_redacted
    snapshot_truth_claim_class: captured_snapshot_not_current_truth
    snapshot_export_fields:
      - snapshot_includes_hidden_result_count_disclosure
      - snapshot_includes_ranking_reason_classes
      - snapshot_includes_result_truth_classes
      - snapshot_includes_scope_filter_class_pin
      - snapshot_includes_planner_pass_ref
      - snapshot_includes_redaction_class_pin
      - snapshot_includes_running_build_identity_pin
      - snapshot_includes_policy_epoch_pin
    local_by_default: true
    export_review_ref: search:export_review:hidden_by_filter:01
    share_denial_ref: null
  running_build_identity_ref: build:running:01
  policy_context:
    policy_epoch: pe:2026-04-24:01
    trust_state: trusted
    execution_context_id: exec:search:hidden_by_filter
  client_scopes:
    - desktop_product
    - cli
  redaction_class: metadata_safe_default
  opened_at: "2026-04-24T11:02:50Z"
  updated_at: "2026-04-24T11:03:00Z"
  closed_at: "2026-04-24T11:04:00Z"

result_identities:
  - record_kind: search_result_identity_record
    search_result_identity_schema_version: 1
    result_identity_id: search:identity:hidden_by_filter:route_handler
    stable_result_key: srid:text-range:route-handler:user-filtered
    object_identity:
      object_kind_class: text_range
      canonical_entity_ref: graph:entity:route_handler
      object_identity_hash_ref: search:identity_hash:hidden_by_filter:route_handler
      workspace_id_ref: workspace:current
      root_id_ref: workspace:root:web
      path_identity_ref: path:id:route_handler
      symbol_anchor_ref: symbol:route_handler
      docs_anchor_ref: null
      graph_node_id_ref: graph:node:route_handler
      provider_resource_id_ref: null
      generated_lineage_ref: null
      command_id_ref: null
      coordinate_span_ref: text:span:route_handler
    access_kind: open_read
    access_state_class: accessible
    source_refs:
      query_session_id_ref: search:session:hidden_by_filter:01
      result_set_id_ref: search:result_set:hidden_by_filter:01
      planner_pass_id_ref: search:planner:hidden_by_filter:01
      search_result_packet_ref: search:packet:hidden_by_filter:route_handler
      result_fusion_record_ref: search:fusion:hidden_by_filter:route_handler
      query_session_result_snapshot_ref: search:result_snapshot:hidden_by_filter:01
      search_collection_snapshot_ref: search:collection_snapshot:hidden_by_filter:01
      saved_query_id_ref: search:saved_query:hidden_by_filter:01
      deep_link_id_ref: search:deep_link:hidden_by_filter:route_handler
    truth_basis:
      result_truth_class: exact
      readiness_state: fully_indexed
      freshness_class: authoritative_live
      semantic_fallback_state: semantic_not_applicable
      ranking_reason_classes:
        - exact_name_match
        - lexical_prefix_match
      source_classes:
        - lexical_index
      stale_or_partial_explanation:
        partial_truth_causes:
          - outside_loaded_scope
        human_readable_summary: Results outside the loaded scope are not included.
    count_disclosures:
      visible_result_count: 4
      matching_result_count: 13
      matching_result_count_known: true
      hidden_result_disclosure:
        hidden_result_count: 9
        count_is_approximate: false
        hidden_scope_reasons:
          - excluded_by_user_filter
      blocked_result_disclosure: null
    drift_and_remap:
      deep_link_drift_state: resolved_exact
      drift_resolution_class: current_resolution_exact
      remap_chain_refs: []
      predecessor_identity_refs: []
      successor_identity_refs: []
      current_resolution_ref: search:resolution:hidden_by_filter:route_handler
      drift_note_ref: null
    projection_keys:
      - surface_class: file_search
        surface_row_ref: search:row:hidden_by_filter:route_handler
        surface_result_set_ref: search:result_set:hidden_by_filter:01
      - surface_class: cli_search
        surface_row_ref: cli:row:hidden_by_filter:route_handler
        surface_result_set_ref: search:result_set:hidden_by_filter:01
    policy_context:
      policy_epoch: pe:2026-04-24:01
      trust_state: trusted
      execution_context_id: exec:search:hidden_by_filter
    redaction_class: metadata_safe_default
    minted_at: "2026-04-24T11:03:00Z"
    last_revalidated_at: "2026-04-24T11:03:00Z"

explanation_captures:
  - record_kind: search_explanation_capture_record
    search_explanation_capture_schema_version: 1
    explanation_capture_id: search:explain:hidden_by_filter:route_handler
    query_session_id_ref: search:session:hidden_by_filter:01
    result_identity_id_ref: search:identity:hidden_by_filter:route_handler
    search_result_packet_ref: search:packet:hidden_by_filter:route_handler
    result_set_id_ref: search:result_set:hidden_by_filter:01
    planner_pass_id_ref: search:planner:hidden_by_filter:01
    source_surface_class: file_search
    capture_purpose_class: cli_explain
    visible_summary:
      primary_explanation_signals:
        - exact_match
        - hidden_by_filter
        - scope_filter_match
      ranking_reason_classes:
        - exact_name_match
        - lexical_prefix_match
      result_truth_class: exact
      readiness_state: fully_indexed
      freshness_class: authoritative_live
      scope_filter_class: current_root
      semantic_fallback_state: semantic_not_applicable
      hidden_result_disclosure:
        hidden_result_count: 9
        count_is_approximate: false
        hidden_scope_reasons:
          - excluded_by_user_filter
      stale_or_partial_explanation:
        partial_truth_causes:
          - outside_loaded_scope
        human_readable_summary: Results outside the loaded scope are not included.
    explanation_entries:
      - entry_id: search:explain_entry:hidden_by_filter:exact
        explanation_signal_class: exact_match
        ranking_reason_classes:
          - exact_name_match
        hidden_scope_reasons: []
        partial_truth_causes: []
        readiness_state: null
        semantic_fallback_state: null
        visibility_tier: always_visible
        contribution_direction: boosted
        display_copy_token: reason.exact_match
        explanation_weight_bucket: primary_signal
        term_ref: search:term:hidden_by_filter:route
        source_ref: search:shard_snapshot:hidden_by_filter:lexical
        debug_payload_ref: null
        redacted_detail_ref: search:redacted_detail:hidden_by_filter:exact
      - entry_id: search:explain_entry:hidden_by_filter:hidden
        explanation_signal_class: hidden_by_filter
        ranking_reason_classes: []
        hidden_scope_reasons:
          - excluded_by_user_filter
        partial_truth_causes:
          - outside_loaded_scope
        readiness_state: fully_indexed
        semantic_fallback_state: semantic_not_applicable
        visibility_tier: always_visible
        contribution_direction: withheld
        display_copy_token: reason.hidden_by_filter
        explanation_weight_bucket: not_applicable
        term_ref: search:term:hidden_by_filter:generated_exclude
        source_ref: search:filter:no_generated
        debug_payload_ref: null
        redacted_detail_ref: search:redacted_detail:hidden_by_filter:hidden
    capture_rules:
      always_visible_fields:
        - result_truth_class
        - readiness_state
        - freshness_class
        - scope_filter_class
        - primary_ranking_reasons
        - hidden_result_count
      debug_opt_in_fields:
        - normalized_term_hash_refs
      forbidden_fields:
        - raw_query_text
        - raw_document_body
        - raw_symbol_definition
        - raw_absolute_path
        - raw_provider_payload
        - raw_url
        - raw_secret
        - numeric_rank_weight
        - support_only_unexplained_heuristic
      support_only_cannot_be_sole_explanation: true
    export_rules:
      export_policy_class: export_redacted_detail
      include_debug_refs: false
      raw_material_allowed: false
    policy_context:
      policy_epoch: pe:2026-04-24:01
      trust_state: trusted
      execution_context_id: exec:search:hidden_by_filter
    redaction_class: metadata_safe_default
    captured_at: "2026-04-24T11:03:00Z"

expected_assertions:
  - visible count and hidden-by-filter count remain separate.
  - CLI explain can cite the same session and result identity as the UI.
  - saved-query snapshot is replay history unless revalidated.
