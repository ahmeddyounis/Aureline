case_id: partial_semantic_warmup.incompatible_shard_rejected
purpose: >
  Startup/reopen path where a prior shard exists but is incompatible with the
  current workspace/config identity (schema mismatch or identity mismatch). The
  system rejects reuse, falls back to metadata-only provisional navigation, and
  records the rejection reason for support and traces.

contract_refs:
  contract_doc: docs/architecture/graph_warmup_and_refinement_contract.md
  contract_artifact: artifacts/search/semantic_refinement_states.yaml

scenario:
  graph_shard_reuse:
    reuse_class: metadata_only
    invalidation_reason: shard_schema_mismatch
    disclosure_summary: >
      Shard reuse rejected due to incompatibility; warm-up rebuild proceeds in
      background. Provisional answers remain explicitly labeled and do not claim
      cached semantic provenance.

expected_refinement:
  refinement_event_kind: readiness_or_freshness_label_changed
  must_not_do:
    - silently reuse an incompatible shard as if it were valid

