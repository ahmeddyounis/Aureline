case_id: partial_semantic_warmup.partially_warmed_roots_mixed_provenance
purpose: >
  Multi-root workspace where only a subset of roots has warmed semantic state.
  The surface presents a hybrid/mixed-provenance posture: some answers are
  graph-backed for warmed roots while other roots remain metadata-only. The
  mixed state must remain mechanically visible; the surface must not render a
  whole-workspace “ready” claim.

contract_refs:
  contract_doc: docs/architecture/graph_warmup_and_refinement_contract.md
  contract_artifact: artifacts/search/semantic_refinement_states.yaml
  search_truth_schema: schemas/search/search_result_truth.schema.json
  query_planner_contract: docs/search/query_planner_contract_seed.md

scenario:
  graph_shard_reuse:
    reuse_class: hybrid_mixed_provenance
    invalidation_reason: shard_scope_narrowed
    disclosure_summary: >
      Some roots are warm/cached; other roots are still warming. The surface
      projects the lowest-confidence readiness across the visible set and keeps
      omitted/unwarmed roots explicit via typed scope/partiality disclosure.

expected_surface_posture:
  full_search:
    must_disclose_hidden_or_omitted_roots: true
    must_not_claim_fully_indexed_for_scope: true

expected_refinement:
  refinement_event_kind: readiness_or_freshness_label_changed

