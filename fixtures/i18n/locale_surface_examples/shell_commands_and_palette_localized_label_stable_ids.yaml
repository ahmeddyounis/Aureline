schema_version: 1
example_id: example.shell_commands_and_palette.localized_label_stable_ids

surface_id: shell_commands_and_palette
localization_sources:
  - core_locale_pack

requested_locale: fr-FR
effective_locale: fr-FR

stable_elements:
  command_id: cmd:core:open_folder
  canonical_verb: workspace.open_folder
  keybinding_path: keybinding:palette.open_folder
  telemetry_keys:
    - telemetry:command_palette.command_invoked
  policy_ids: []

localized_content:
  label: "Ouvrir un dossier"
  palette_help: >
    Ouvre un dossier local pour inspection ou travail. L’action est
    routée par l’identifiant de commande (non traduit).
  stable_token_rendering:
    command_id_rendered_from: command_registry
    keybinding_hint_rendered_from: keybinding_graph
    copy_safe_rendering_required: true

fallback:
  fallback_applied: false
  disclosure_required: false

source_language_access:
  - inline_source_language_toggle
  - copy_safe_command_id_affordance

required_parity_check_refs:
  - parity.command_identity_parity
  - parity.keyboard_path_parity

notes: >
  The translated label may vary by locale, but the command id, canonical
  verb, and keybinding path remain machine-stable. Telemetry keys remain
  stable and do not depend on localized labels.

