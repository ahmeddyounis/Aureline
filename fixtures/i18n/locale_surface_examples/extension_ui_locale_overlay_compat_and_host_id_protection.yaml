schema_version: 1
example_id: example.extension_contributed_ui.overlay_compat_and_host_id_protection

surface_id: extension_contributed_ui
localization_sources:
  - extension_locale_pack_or_companion_overlay

requested_locale: de-DE
effective_locale: en-US

stable_elements:
  extension_namespace_id: ext:namespace:docs_helper:01
  host_stable_identifiers:
    command_ids:
      - cmd:core:open_folder
    setting_ids:
      - editor.font_size
    schema_ids:
      - schemas/ux/message_catalog_entry.schema.json
    telemetry_keys:
      - telemetry:command_palette.command_invoked

localized_content:
  extension_owned_label: "Begleitdokumentation für Symbol öffnen"
  host_owned_label_not_overridden: true

fallback:
  fallback_applied: true
  fallback_origin_class: extension_overlay_incompatible_with_host_build
  disclosure_required: true
  reason: >
    Extension locale overlay declares a compatibility range that does
    not include the running build, so the host falls back to the
    extension’s source language for extension-owned strings and blocks
    any attempt to override host-owned identifiers.

source_language_access:
  - extension_pack_provenance_and_compatibility_panel
  - inline_source_language_toggle

required_parity_check_refs:
  - parity.extension_no_host_override
  - parity.locale_fallback_disclosure

notes: >
  Extension UI strings can localize, but the extension cannot override
  host-owned stable identifiers. Compatibility failures fail closed
  with explicit disclosure.

