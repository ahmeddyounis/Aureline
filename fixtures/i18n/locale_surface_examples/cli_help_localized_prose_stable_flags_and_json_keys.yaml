schema_version: 1
example_id: example.cli_help_doctor.localized_prose_stable_flags_and_json_keys

surface_id: cli_help_doctor
localization_sources:
  - core_locale_pack

requested_locale: ja-JP
effective_locale: ja-JP

stable_elements:
  cli_subcommand_name: workspace open-folder
  cli_flag_literals:
    - --workspace
    - --format=json
    - --locale=neutral
  json_keys:
    - command_id
    - flags
    - path
  error_codes_or_finding_ids:
    - doctor.finding.profile.schema_drift

localized_content:
  help_excerpt: >
    フォルダーを開きます。フラグ `--workspace` と `--format=json` は
    文字通りのトークンであり、翻訳されません。
  machine_output_note: >
    `--format=json` または `--locale=neutral` により、JSON キーと
    canonical ids はロケールに依存せず安定します。
  example_json_output:
    command_id: cmd:core:open_folder
    flags:
      workspace: "--workspace"
      format: "--format=json"
    path: "/repo"

fallback:
  fallback_applied: false
  disclosure_required: false

source_language_access:
  - cli_locale_neutral_output_flag
  - inline_source_language_toggle

required_parity_check_refs:
  - parity.cli_machine_output_stability

notes: >
  Human-facing help prose may localize. Subcommands, flags, JSON keys,
  and finding ids remain machine-stable, and tooling can force a
  locale-neutral output mode.

