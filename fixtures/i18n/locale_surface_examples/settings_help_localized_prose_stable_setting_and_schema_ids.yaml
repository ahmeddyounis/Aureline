schema_version: 1
example_id: example.settings_help_errors.localized_prose_stable_setting_and_schema_ids

surface_id: settings_help_errors
localization_sources:
  - core_locale_pack
  - settings_registry_and_schema_docs

requested_locale: es-ES
effective_locale: es-ES

stable_elements:
  setting_id: editor.font_size
  json_keys:
    - editor.font_size
  schema_ids:
    - schemas/settings/setting_definition.schema.json
    - schemas/settings/effective_setting.schema.json
  error_codes:
    - settings.error.value_out_of_range

localized_content:
  setting_label: "Tamaño de fuente"
  setting_description: >
    Controla el tamaño de fuente del editor. El identificador de la
    configuración se muestra aparte como token técnico (no traducible).
  validation_error_example: >
    Valor inválido para `editor.font_size`. Consulta el esquema
    `schemas/settings/setting_definition.schema.json` para los límites
    permitidos.
  stable_token_rendering:
    setting_id_rendered_from: settings_registry
    schema_id_rendered_from: schema_registry
    copy_safe_rendering_required: true

fallback:
  fallback_applied: false
  disclosure_required: false

source_language_access:
  - inline_source_language_toggle
  - copy_safe_setting_id_and_schema_id_affordance

required_parity_check_refs:
  - parity.settings_schema_identity_parity
  - parity.locale_fallback_disclosure

notes: >
  The setting id and schema ids are not derived from localized prose.
  The UI/CLI renders them from canonical registries as code spans or
  copyable tokens. Localized text may explain the ids, but never mints
  or rewrites them.

