schema_version: 1
example_id: example.docs_tours_auth.localized_text_citation_parity_with_fallback

surface_id: docs_tours_auth
localization_sources:
  - docs_pack_with_locale_overlay

requested_locale: pt-BR
effective_locale: pt-BR

stable_elements:
  docs_anchor_id: docs:anchor:tour:getting_started:open_folder:01
  citation_anchor_ids:
    - cite:anchor:docs:getting_started:open_folder:primary:01
    - cite:anchor:docs:glossary:workspace:open_folder:01
  command_ids_in_examples:
    - cmd:core:open_folder
  recovery_url_or_route_ids:
    - route:auth:recovery:start

localized_content:
  tour_step_title: "Abrir uma pasta"
  tour_step_body_excerpt: >
    Use o comando `cmd:core:open_folder` para abrir uma pasta local.
    As citações permanecem apontando para os mesmos anchors, mesmo que
    parte do texto caia para o idioma-fonte.
  citations_rendered_from:
    citation_anchor_ids: citation_anchor_model
    pack_revision_pins: docs_pack_manifest

fallback:
  fallback_applied: true
  fallback_origin_class: requested_locale_partial_with_base_fill
  fallback_chain_walked:
    - pt-BR
    - pt
    - en-US
  disclosure_required: true

source_language_access:
  - docs_pane_source_language_route
  - inline_source_language_toggle

required_parity_check_refs:
  - parity.docs_citation_anchor_parity
  - parity.locale_fallback_disclosure

notes: >
  Translation overlays must not mint new anchors. Citation anchors and
  docs anchors remain stable across locales and remain resolvable even
  when prose falls back to base/source language.

