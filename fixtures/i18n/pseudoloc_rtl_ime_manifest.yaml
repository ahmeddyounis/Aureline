# Locale/input harness-plan manifest seed.
#
# This manifest names the locale and input-method test modes, seed
# strings, fixture surfaces, expected failure classes, and owners the
# shell/input readiness lane will use. It is intentionally narrow for
# M0: most rows reuse existing accessibility and renderer fixtures
# rather than introducing a second large corpus immediately.
#
# Rules.
#   - test_mode_id and harness_row_id are stable ids. Future packets and
#     issue routing should cite them instead of inventing new labels.
#   - Every harness row MUST name one or more readiness rows from
#     artifacts/i18n/test_mode_matrix.yaml and one owner row.
#   - Existing fixtures from accessibility, docs, renderer, and workspace
#     corpora should be reused before new dedicated locale fixtures are
#     added.

schema_version: 1
manifest_id: aureline.locale_input_harness
manifest_revision: 1
status: seeded

overview_page: docs/i18n/locale_input_readiness.md
test_mode_matrix_source: artifacts/i18n/test_mode_matrix.yaml
platform_input_matrix_source: artifacts/accessibility/platform_input_matrix.yaml
a11y_packet_template_source: docs/accessibility/a11y_ime_packet_template.md
shell_boundary_source: docs/adr/0016-shell-windowing-input-accessibility-boundary.md
renderer_fixture_dir: fixtures/text/renderer_decision_examples
accessibility_fixture_dir: fixtures/accessibility/ime_and_text_cases

owner_rows:
  - owner_id: owner.shell_spike
    owner_dri: "@ahmeddyounis"
    implementation_anchor: crates/aureline-shell-spike
    notes: Shell chrome, layout mirroring, fallback rows, and dense-surface composition.
  - owner_id: owner.render_text_input
    owner_dri: "@ahmeddyounis"
    implementation_anchor: crates/aureline-render
    notes: Text shaping, fallback chains, composition overlays, and text-production paths.
  - owner_id: owner.accessibility_review
    owner_dri: "@ahmeddyounis"
    implementation_anchor: docs/accessibility
    notes: Packet joins, result-state vocabulary, and review-home continuity.
  - owner_id: owner.docs_help
    owner_dri: "@ahmeddyounis"
    implementation_anchor: docs/docs
    notes: Source-language escape hatches, fallback rows, docs/help badges, and translated-surface parity hooks.

seed_strings:
  - seed_string_id: string.primary.open_workspace
    source_text: "Open workspace"
    pseudoloc_text: "[!! Öpen ẁørkspåce !!]"
    notes: Primary launcher action and shell command affordance.
  - seed_string_id: string.primary.restore_last_session
    source_text: "Restore last session"
    pseudoloc_text: "[!! Restøre låst sessiøn !!]"
    notes: Recovery and resume action label.
  - seed_string_id: string.state.policy_blocked
    source_text: "Policy blocked"
    pseudoloc_text: "[!! Pølicy bløcked !!]"
    notes: Safety-critical blocked state that must stay direct.
  - seed_string_id: string.state.read_only_degraded
    source_text: "Read-only degraded"
    pseudoloc_text: "[!! Read-ønly degraded !!]"
    notes: Degraded-state label that must preserve scope and severity.
  - seed_string_id: string.state.rollback_available
    source_text: "Rollback available"
    pseudoloc_text: "[!! Røllback available !!]"
    notes: Recovery state label with action meaning.
  - seed_string_id: string.fallback.locale_chain
    source_text: "Requested pt-BR · showing en-US"
    notes: Locale fallback disclosure row.
  - seed_string_id: string.fallback.open_source_language
    source_text: "Open in source language"
    notes: Required escape hatch for docs/help and translated review surfaces.
  - seed_string_id: string.rtl.path_in_prose
    source_text: "--output ./تقارير/build.log"
    notes: LTR technical path inside RTL prose.
  - seed_string_id: string.rtl.host_flag
    source_text: "ssh dev@مثال.internal --port 2222"
    notes: Mixed-direction hostname and flag string for copy and narration review.
  - seed_string_id: string.cjk.commit
    source_text: "テスト入力"
    notes: IME commit sample used across editor, palette, and settings.
  - seed_string_id: string.cjk.full_width
    source_text: "全角ＡＢＣ １２３"
    notes: Full-width stress string for dense-row and fallback checks.
  - seed_string_id: string.dead_key.e_acute
    source_text: "é"
    notes: Dead-key output sample.
  - seed_string_id: string.altgr.l_stroke
    source_text: "ł"
    notes: Windows AltGr output sample.
  - seed_string_id: string.compose.arrow
    source_text: "→"
    notes: Compose-sequence output sample.
  - seed_string_id: string.emoji.status
    source_text: "Build passed 🧪"
    notes: Emoji insertion plus surrounding-text preservation sample.

fixture_surface_rows:
  - fixture_surface_id: surface.shell.launcher_chrome
    surface_group: shell_workspace_launcher
    description: Launcher title, recent-work rows, fallback row, and primary action strip.
  - fixture_surface_id: surface.shell.palette
    surface_group: palette_search
    description: Palette input, result list, count row, and alternate-action affordances.
  - fixture_surface_id: surface.shell.settings_dialog
    surface_group: settings_dialogs
    description: Settings text field, locale row, and save or dismiss affordances.
  - fixture_surface_id: surface.shell.sign_in_or_trust_sheet
    surface_group: sign_in_and_trust_prompt
    description: Trust prompt, sign-in fallback, blocked state copy, and continue-local route.
  - fixture_surface_id: surface.shell.docs_reader
    surface_group: docs_reader
    description: Docs source strip, citation path, source-language escape hatch, and mixed-direction text.
  - fixture_surface_id: surface.shell.diff_review
    surface_group: diff_review
    description: Review surface with mixed-direction snippets and suspicious-text inspection.
  - fixture_surface_id: surface.shell.terminal_output
    surface_group: terminal_output
    description: Terminal transcript, input field, and raw or escaped copy route.
  - fixture_surface_id: surface.shell.dense_collection_review
    surface_group: dense_collection_batch_review
    description: Dense list or table rows with badges, counts, and blocked-state labels.
  - fixture_surface_id: surface.text.editor
    surface_group: editor
    description: Editor text field or buffer line with composition, fallback, and glyph stress.

harness_rows:
  - harness_row_id: mode.pseudoloc.shell_chrome
    owner_ref: owner.shell_spike
    readiness_row_refs:
      - readiness.shell.source_language_and_pseudoloc_chrome
    test_mode_ids:
      - source_language_baseline
      - pseudoloc_expansion
    locale_tags:
      - en-US
      - qps-ploc
    fixture_surface_refs:
      - surface.shell.launcher_chrome
      - surface.shell.palette
      - surface.shell.settings_dialog
      - surface.shell.sign_in_or_trust_sheet
      - surface.shell.dense_collection_review
    seed_string_refs:
      - string.primary.open_workspace
      - string.primary.restore_last_session
      - string.state.policy_blocked
      - string.state.read_only_degraded
      - string.state.rollback_available
    existing_fixture_refs:
      - fixtures/accessibility/ime_and_text_cases/platform_input_feature_unavailable.yaml
      - fixtures/workspace/entry_restore_examples/open_local_folder.json
      - fixtures/workspace/entry_restore_examples/restore_last_session.json
    expected_failure_class_refs:
      - text_clipped_or_overlap
      - truncation_hides_scope_or_action
      - placeholder_order_drift
      - translated_state_label_drift

  - harness_row_id: mode.locale_fallback.row_and_badges
    owner_ref: owner.docs_help
    readiness_row_refs:
      - readiness.shell.source_language_and_pseudoloc_chrome
      - readiness.locale.fallback_chain_and_locale_pack_contract
    test_mode_ids:
      - locale_fallback_review
    locale_tags:
      - pt-BR
      - en-US
    fixture_surface_refs:
      - surface.shell.settings_dialog
      - surface.shell.docs_reader
      - surface.shell.sign_in_or_trust_sheet
    seed_string_refs:
      - string.fallback.locale_chain
      - string.fallback.open_source_language
      - string.state.policy_blocked
    existing_fixture_refs:
      - fixtures/docs/docs_pack_examples/project_docs_mixed_locale_coverage.json
      - fixtures/docs/docs_pack_examples/project_docs_fresh.json
    expected_failure_class_refs:
      - locale_fallback_hidden
      - source_language_escape_hatch_missing
      - translated_state_label_drift

  - harness_row_id: mode.rtl.shell_chrome
    owner_ref: owner.shell_spike
    readiness_row_refs:
      - readiness.shell.rtl_chrome_and_mixed_direction_technical_content
    test_mode_ids:
