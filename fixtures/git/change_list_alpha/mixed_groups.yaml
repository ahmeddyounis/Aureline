record_kind: git_change_list_alpha_case
schema_version: 1
case_name: mixed_groups
viewport:
  row_limit: 20
  staged_offset: 0
  unstaged_offset: 0
input:
  changes:
    - path: src/app.rs
      status_code: MM
      change_kind: modified
      is_staged: true
      is_unstaged: true
      is_conflicted: false
    - path: src/new.rs
      status_code: A.
      change_kind: added
      is_staged: true
      is_unstaged: false
      is_conflicted: false
    - path: docs/notes.md
      status_code: "??"
      change_kind: untracked
      is_staged: false
      is_unstaged: false
      is_conflicted: false
    - path: src/delete.rs
      status_code: .D
      change_kind: deleted
      is_staged: false
      is_unstaged: true
      is_conflicted: false
    - path: crates/core/src/lib.rs
      original_path: crates/old-core/src/lib.rs
      status_code: R.
      change_kind: renamed
      is_staged: true
      is_unstaged: false
      is_conflicted: false
expected:
  staged_total_count: 3
  unstaged_total_count: 3
  staged_visible_count: 3
  unstaged_visible_count: 3
  staged_virtualized: false
  unstaged_virtualized: false
  first_staged_path: crates/core/src/lib.rs
  first_unstaged_path: docs/notes.md
  required_state_tokens:
    - added
    - deleted
    - modified
    - renamed
    - untracked
  shared_chip_vocabulary: true
