__fixture__:
  name: stale_target_remote_port_forward
  scenario: >
    A remote_port_forward to an upstream gateway has detected that the target
    identity changed (the upstream pod was rescheduled and the witness no
    longer matches). The route is in stale_target lifecycle, downgraded to
    stale_target_inspect_only so viewers see a stale_mirrored_state banner
    instead of a confidently-live one. Reopening requires selecting a new
    target after a retarget review.
  expected:
    controlled_exposure_label: same_device_lan
    audience_class: workspace_members
    auth_source_class: workspace_session_auth
    teardown_state: suspended_no_traffic
    revoke_posture_class: user_self_revoke
    findings: []

