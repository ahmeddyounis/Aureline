__fixture__:
  name: authenticated_org_route_managed_workspace
  scenario: >
    A managed workspace exposes an internal staging app behind organization SSO
    via a managed-workspace tunnel. The route is authenticated_org_route,
    visible to organization members, with a 24-hour expiry and an org-admin
    revoke path. Revoking suspends authenticated sessions; the route stays
    re-openable under the same identity if reapproved.
  expected:
    controlled_exposure_label: authenticated_org_route
    audience_class: organization_members
    auth_source_class: organization_sso
    teardown_state: active
    revoke_posture_class: workspace_admin_revoke
    findings: []

