__fixture__:
  name: same_device_lan_devcontainer_service
  scenario: >
    A devcontainer exposes a frontend service on the same device with LAN
    reachability so a designer using another laptop on the same network can
    inspect the running build. The route is same_device_lan, requires
    workspace-session auth, and is revocable by the user.
  expected:
    controlled_exposure_label: same_device_lan
    audience_class: same_device_lan
    auth_source_class: workspace_session_auth
    teardown_state: active
    revoke_posture_class: user_self_revoke
    findings: []

