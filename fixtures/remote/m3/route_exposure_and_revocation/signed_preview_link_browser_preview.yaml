__fixture__:
  name: signed_preview_link_browser_preview
  scenario: >
    A reviewer shares a signed, time-boxed preview link to a browser-preview
    route hosted by a remote agent. The route is signed_preview_link with a
    1-hour TTL; opening the link in the system browser steps the viewer up.
    Revocation honors the signed-link semantics: revoking invalidates issued
    links, and the route can only be re-opened by issuing a new signed link.
  expected:
    controlled_exposure_label: signed_preview_link
    audience_class: signed_link_holders
    auth_source_class: signed_preview_link
    teardown_state: active
    revoke_posture_class: user_self_revoke
    findings: []

