    A remote SSH alias now resolves to a different canonical target while
    an existing endpoint still owns the previous collision key. The
    attach and endpoint preserve prior target evidence and block until
    the user chooses a target and reissues authority.
  expected_states:
    attach_lifecycle_state: retarget_review_required
    endpoint_lifecycle_state: blocked_collision
    stale_target_label_class: retargeted_pending_review

