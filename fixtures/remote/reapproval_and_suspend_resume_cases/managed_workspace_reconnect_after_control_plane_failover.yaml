__fixture__:
  name: managed_workspace_reconnect_after_control_plane_failover
  scenario: >
    Managed workspace mw:alpha lost its primary control plane due
    to a node failure; the control plane failed over to a secondary
    and is restoring the instance. Reachability is degraded while
    recovery runs. The session holds the prior managed-control-plane
    token, but admin-confirmation policy requires an administrator
    to re-admit the instance after a control-plane failover;
    reapproval is gated on admin_confirmation_required. The
    target_truth_record renders
    managed_workspace_reviewer_label = degraded on top of
    managed_workspace_lifecycle_state = recovering. The route packet
    carries route_change_reason_code =
    route_changed_authority_escalation because authority is
    escalating from user-linked to admin-linked.
  case_id: reapproval.managed_workspace.reconnect_after_control_plane_failover
  exercises:
    managed_workspace_reviewer_label: degraded
    managed_workspace_lifecycle_state: recovering
    managed_workspace_state_transition_reason: control_plane_failure
    reachability_state: degraded
    wrong_target_correction_class: blocked_pending_reapproval
    reapproval_requirement_class: admin_confirmation_required
  related_fixture_refs:
    - fixtures/support/object_handoff_examples/trust_warning_remote_boundary.json
    - artifacts/runtime/managed_workspace_lifecycle.yaml

