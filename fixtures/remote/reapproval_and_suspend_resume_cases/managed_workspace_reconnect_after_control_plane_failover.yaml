conformance_tests:
  - id: failover_overlays_degraded_on_recovering_only
    description: >
      A managed_workspace_reviewer_label of degraded MUST overlay
      managed_workspace_lifecycle_state = recovering only. Overlays
      on paused, suspended, or expired are non-conforming.
  - id: failover_requires_admin_confirmation
    description: >
      A control-plane failover that escalates authority from the
      primary to a secondary token MUST set
      reapproval_requirement_class = admin_confirmation_required.
  - id: failover_preserves_prior_control_plane_token
    description: >
      The prior control-plane token MUST remain under
      prior_target_ref; dropping it on reconnect is non-conforming
      and blocks support-export reconstruction of the failover.
