__fixture__:
  name: managed_workspace_expired_hibernation_window_elapsed
  scenario: >
    Managed workspace mw:alpha was idle past the hibernation window.
    The instance moved from idle_suspended through to hibernated;
    its long-idle snapshot sits in cold storage. Reactivation
    requires re-pull plus a session-ticket refresh because the
    hibernation window aged every live ticket past its refresh
    floor. The target_truth_record renders
    managed_workspace_reviewer_label = expired with
    expiry_reason_class = hibernation_window_elapsed and
    reapproval_requirement_class = session_ticket_refresh_required.
    wrong_target_correction_class = blocked_pending_reapproval keeps
    any launch denied until the refresh and the reactivation land.
  case_id: reapproval.managed_workspace.expired_hibernation_window_elapsed
  exercises:
    managed_workspace_reviewer_label: expired
    managed_workspace_lifecycle_state: hibernated
    managed_workspace_state_transition_reason: hibernation_window_elapsed
    expiry_reason_class: hibernation_window_elapsed
    reachability_state: unreachable
    wrong_target_correction_class: blocked_pending_reapproval
    reapproval_requirement_class: session_ticket_refresh_required
  related_fixture_refs:
    - fixtures/remote/reapproval_and_suspend_resume_cases/managed_workspace_suspend_idle_window.yaml
    - artifacts/runtime/managed_workspace_lifecycle.yaml

