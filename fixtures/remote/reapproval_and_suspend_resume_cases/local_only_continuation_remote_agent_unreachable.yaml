conformance_tests:
  - id: local_only_continuation_drops_managed_cue_to_outer_memory
    description: >
      A local_only_continuation record MUST render
      local_host_boundary as the primary (and sole) cue in the
      active cue stack; any remote / managed cue is preserved only
      as prior memory under prior_target_ref. Claiming
      remote_agent_boundary as an active cue is non-conforming.
  - id: local_only_continuation_names_reason
    description: >
      managed_workspace_reviewer_label = local_only_continuation
      MUST carry a local_only_continuation_reason_class; null is
      non-conforming.
  - id: local_only_continuation_preserves_prior_remote_target_ref
    description: >
      The prior remote-agent target ref MUST remain visible under
      prior_target_ref so reconnection can route back to the same
      remote agent when the broker returns.
  - id: local_only_continuation_no_reapproval_to_hold
    description: >
      Holding local-only continuation requires no reapproval;
      reapproval (if any) is gated on the next record that tries to
      return to the remote / managed target.
