__fixture__:
  name: local_only_continuation_remote_agent_unreachable
  scenario: >
    Remote-agent attach broker became unreachable mid-session.
    Rather than block every surface, the editor continues in a
    reduced-scope local-only mode: the cue stack drops to
    local_host_boundary with the managed-workspace cue preserved
    only as outer memory under prior_target_ref; the record
    renders managed_workspace_reviewer_label =
    local_only_continuation with
    local_only_continuation_reason_class =
    remote_agent_attach_unreachable. Reapproval is not required to
    hold local-only continuation; once remote connectivity returns,
    the shell will mint a fresh target_truth_record and may gate
    reapproval there.
  case_id: reapproval.local_only_continuation.remote_agent_unreachable
  exercises:
    managed_workspace_reviewer_label: local_only_continuation
    managed_workspace_lifecycle_state: null
    local_only_continuation_reason_class: remote_agent_attach_unreachable
    reachability_state: reachable
    wrong_target_correction_class: no_correction_needed
    reapproval_requirement_class: no_reapproval_required
  related_fixture_refs:
    - fixtures/support/object_handoff_examples/trust_warning_remote_boundary.json
    - fixtures/runtime/execution_context_examples/degraded_activator_fallback.json

