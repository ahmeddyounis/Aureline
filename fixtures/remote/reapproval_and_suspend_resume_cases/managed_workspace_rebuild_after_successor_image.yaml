__fixture__:
  name: managed_workspace_rebuild_after_successor_image
  scenario: >
    Managed workspace mw:alpha is retiring because a successor image
    is available. The user confirmed a rebuild onto the new image
    version, which triggered provisioning of a fresh instance
    mw:gamma. The target_truth_record reflects the rebuild: it
    renders managed_workspace_reviewer_label = warming because the
    new instance is still provisioning. The declared capability
    envelope of the successor image differs from the retiring one
    (a new activator was added), so approval-ticket reissue is
    required before launches commit. The prior instance mw:alpha is
    preserved under prior_target_ref so the mutation journal and
    support export can reconstruct the rebuild path.
  case_id: reapproval.managed_workspace.rebuild_after_successor_image
  exercises:
    managed_workspace_reviewer_label: warming
    managed_workspace_lifecycle_state: provisioning
    managed_workspace_state_transition_reason: successor_image_available
    prior_managed_workspace_lifecycle_state: retiring
    reachability_state: warming
    wrong_target_correction_class: corrected_before_commit
    reapproval_requirement_class: approval_ticket_reissue_required
  related_fixture_refs:
    - fixtures/runtime/route_taxonomy_examples/wrong_target_detected_managed_workspace_drift.yaml
    - artifacts/runtime/managed_workspace_lifecycle.yaml

