  - id: rebuild_label_projects_warming
    description: >
      A managed_workspace_reviewer_label of warming MUST project
      onto managed_workspace_lifecycle_state in {provisioning,
      warming}. Overlays on ready, recovering, or expired are
      non-conforming.
  - id: rebuild_requires_approval_ticket_reissue
