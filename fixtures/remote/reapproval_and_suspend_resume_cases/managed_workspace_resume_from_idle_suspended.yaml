__fixture__:
  name: managed_workspace_resume_from_idle_suspended
  scenario: >
    User requests resume on mw:alpha after idle_suspended.
    Instance resumes into ready; filesystem survives from the
    suspension. The managed-session ticket aged past its refresh
    floor while the instance slept, so the resume requires a
    session-ticket refresh before launches commit. The
    target_truth_record enters
    managed_workspace_reviewer_label = ready with
    reapproval_requirement_class = session_ticket_refresh_required
    and wrong_target_correction_class = blocked_pending_reapproval
    until the refresh completes.
  case_id: reapproval.managed_workspace.resume_from_idle_suspended
  exercises:
    managed_workspace_reviewer_label: ready
    managed_workspace_lifecycle_state: ready
    managed_workspace_state_transition_reason: user_requested_resume
    prior_managed_workspace_lifecycle_state: idle_suspended
    reachability_state: reachable_pending_reauth
    wrong_target_correction_class: blocked_pending_reapproval
    reapproval_requirement_class: session_ticket_refresh_required
  related_fixture_refs:
    - fixtures/remote/reapproval_and_suspend_resume_cases/managed_workspace_suspend_idle_window.yaml
    - fixtures/workspace/entry_restore_examples/resume_managed_workspace.json
    - artifacts/runtime/managed_workspace_lifecycle.yaml

