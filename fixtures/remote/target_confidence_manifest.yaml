# Target-discovery confidence, host-boundary, and wrong-target
# reapproval corpus.
#
# Stable case ids for the target-truth records every launch-capable
# surface (task, test, debug, terminal, notebook-kernel, scaffolding,
# AI tool-call, doctor-repair, import-probe, replay-probe) emits.
# Shell routers, support exports, release packets, and later AI /
# execution surfaces should cite these ids instead of minting
# per-surface target prose.
#
# This manifest is the companion roster for
# docs/verification/target_and_host_boundary_packet.md. If the two
# disagree, the packet doc wins for review language and the frozen
# taxonomies (target_discovery_and_install_review_taxonomy.md and
# origin_target_route_taxonomy.md) win for tooling.
#
# Rules:
#   - Every row MUST cite one target_discovery_confidence_class token
#     from the frozen vocabulary. Silent blanks are non-conforming.
#   - Every row MUST cite one wrong_target_correction_class and one
#     reapproval_requirement_class from the frozen vocabulary.
#   - Every row MUST carry an ordered host_boundary_cue_stack made of
#     frozen host_boundary_cue_class tokens.
#   - Every managed-workspace row MUST carry a
#     managed_workspace_lifecycle_state, a
#     managed_workspace_reviewer_label, and an
#     activation_budget_summary_slices summary.
#   - Adding a case id is additive-minor. Repurposing an id is
#     breaking and requires a new decision row in
#     artifacts/governance/decision_index.yaml.

schema_version: 1
manifest_id: remote.target_confidence_manifest.v1
status: seeded

overview_page: docs/verification/target_and_host_boundary_packet.md
host_boundary_matrix_source: artifacts/remote/host_boundary_matrix.yaml
reapproval_cases_dir: fixtures/remote/reapproval_and_suspend_resume_cases
target_discovery_taxonomy_source: docs/runtime/target_discovery_and_install_review_taxonomy.md
origin_target_route_taxonomy_source: docs/runtime/origin_target_route_taxonomy.md
managed_workspace_lifecycle_source: artifacts/runtime/managed_workspace_lifecycle.yaml
action_route_truth_source: artifacts/runtime/action_origin_target_labels.yaml
execution_context_schema_source: schemas/runtime/execution_context.schema.json

reference_fixture_refs:
  - fixtures/runtime/route_taxonomy_examples/wrong_target_detected_managed_workspace_drift.yaml
  - fixtures/runtime/route_taxonomy_examples/local_read_search_in_workspace.yaml
  - fixtures/runtime/route_taxonomy_examples/local_mutating_save_dirty_buffer.yaml
  - fixtures/runtime/execution_context_examples/local_task_launch.json
  - fixtures/runtime/execution_context_examples/remote_ssh_attach.json
  - fixtures/runtime/execution_context_examples/devcontainer_launch.json
  - fixtures/runtime/execution_context_examples/ai_tool_call_sandbox.json
  - fixtures/runtime/execution_context_examples/rejected_prebuild_drift.json
  - fixtures/workspace/entry_restore_examples/resume_managed_workspace.json
  - fixtures/support/object_handoff_examples/trust_warning_remote_boundary.json
  - fixtures/support/object_handoff_examples/command_detail_wrong_target.json

target_truth_record_fields:
  - case_id
  - invocation_session_id
  - execution_context_id
  - target_class
  - action_target_class
  - action_route_class
  - action_exposure_class
  - action_origin_class
  - host_boundary_cue_stack
  - target_discovery_confidence_class
  - divergence_or_inference_reasons
  - adapter_confidence_placeholder
  - reachability_state
  - managed_workspace_lifecycle_state
  - managed_workspace_reviewer_label
  - expiry_reason_class
  - local_only_continuation_reason_class
  - activation_budget_summary_ref
  - wrong_target_correction_class
  - reapproval_requirement_class
  - prior_target_ref
  - prior_route_class
  - route_change_reason_code
  - authority_linkage_class
  - target_evidence_refs
  - freshness_class
  - redaction_class
  - export_inclusion_posture

# Frozen reviewer-facing label projection. Mirrors the table in
# docs/verification/target_and_host_boundary_packet.md.
managed_workspace_reviewer_label_vocabulary:
  - warming
  - ready
  - degraded
  - paused
  - suspended
  - expired
  - local_only_continuation

expiry_reason_class_vocabulary:
  - session_ticket_expired
  - hibernation_window_elapsed
  - retirement_drain_window_completed
  - policy_epoch_rolled
  - kill_switch_tripped
  - successor_image_available

local_only_continuation_reason_class_vocabulary:
  - route_dependency_unreachable
  - managed_control_plane_unreachable
  - remote_agent_attach_unreachable
  - browser_handoff_return_unavailable
  - user_requested_local_fallback
  - admin_requested_local_fallback

wrong_target_correction_class_vocabulary:
  - no_correction_needed
  - corrected_before_commit
  - corrected_after_partial_effect
  - requires_user_confirmation
  - blocked_pending_reapproval

reapproval_requirement_class_vocabulary:
  - no_reapproval_required
  - session_ticket_refresh_required
  - approval_ticket_reissue_required
  - admin_confirmation_required
  - policy_narrowing_required
  - trust_reevaluation_required

adapter_confidence_class_vocabulary:
  - adapter_authoritative_match
  - adapter_probed_consistent
  - adapter_probed_divergent
  - adapter_inferred_from_session
  - adapter_unreachable

adapter_kind_vocabulary:
  - remote_agent_attach
  - remote_ssh_adapter
  - managed_workspace_adapter
  - notebook_kernel_adapter
  - bridged_helper_adapter
  - ai_sandbox_adapter

reachability_state_vocabulary:
  - reachable
  - warming
  - degraded
  - unreachable
  - disabled_by_policy
  - reachable_pending_reauth

rows:

  - case_id: target.local.canonical_declared.exact_match
    intended_coverage: >
      Local exact target. Resolver found a declarative capsule plus
      a pinned toolchain digest. No correction, no reapproval.
    target_truth_record:
      invocation_session_id: "inv:20260423T090000Z:0001"
      execution_context_id: "exec:20260423T090000Z:0001"
      target_class: local_host
      action_target_class: local_host_target
      action_route_class: in_process_route
      action_exposure_class: no_side_effect_local_read
      action_origin_class: user_keystroke_local
      host_boundary_cue_stack:
        - local_host_boundary
      target_discovery_confidence_class: canonical_declared
      divergence_or_inference_reasons: null
      adapter_confidence_placeholder: null
      reachability_state: reachable
      managed_workspace_lifecycle_state: null
      managed_workspace_reviewer_label: null
      expiry_reason_class: null
      local_only_continuation_reason_class: null
      activation_budget_summary_ref: null
      wrong_target_correction_class: no_correction_needed
      reapproval_requirement_class: no_reapproval_required
      prior_target_ref: null
      prior_route_class: null
      route_change_reason_code: canonical_no_route_change
      authority_linkage_class: local_user_keystroke_authority
      target_evidence_refs:
        - "execution_context:exec:20260423T090000Z:0001"
        - "capsule_pin:local.capsule.v1"
      freshness_class: authoritative_live
      redaction_class: metadata_and_hashes_only
      export_inclusion_posture: metadata_safe_default
    conformance_tests:
      - id: local_exact_confidence_preserves_envelope
        description: >
          A canonical_declared local target MUST NOT emit divergence
          reasons and MUST render as freshness_class
          authoritative_live against the capsule digest.
      - id: local_exact_admits_in_process_route
        description: >
          A local_host_target admits in_process_route and
          local_rpc_route; no managed-control-plane or remote-agent
          route is admissible on this row.

  - case_id: target.imported.cached_hint.stale_metadata_detected
    intended_coverage: >
      Imported / cached target hints. A workspace was resumed from
      session restore carrying target hints from the last session;
      resolver could not confirm the hinted toolchain and has to ask
      the user to pick. Imported metadata may be stale.
    target_truth_record:
      invocation_session_id: "inv:20260423T090100Z:0002"
      execution_context_id: "exec:20260423T090100Z:0002"
      target_class: local_host
      action_target_class: local_host_target
      action_route_class: in_process_route
      action_exposure_class: local_only_mutation
      action_origin_class: import_or_restore_session
      host_boundary_cue_stack:
        - local_host_boundary
      target_discovery_confidence_class: inferred_from_ambient
      divergence_or_inference_reasons:
        - ambient_path_only
        - capsule_absent
        - cached_target_hint_lacks_capsule_digest
      adapter_confidence_placeholder: null
      reachability_state: reachable
      managed_workspace_lifecycle_state: null
      managed_workspace_reviewer_label: null
      expiry_reason_class: null
      local_only_continuation_reason_class: null
      activation_budget_summary_ref: null
      wrong_target_correction_class: requires_user_confirmation
      reapproval_requirement_class: trust_reevaluation_required
      prior_target_ref: "target_hint:imported:python.cpython:legacy"
      prior_route_class: in_process_route
      route_change_reason_code: route_unknown_requires_review
      authority_linkage_class: local_user_keystroke_authority
      target_evidence_refs:
        - "session_restore_packet:sess:20260423T090000Z:0002"
        - "cached_target_hint:hint:20260422T1200Z:python"
      freshness_class: warm_cached
      redaction_class: metadata_and_hashes_only
      export_inclusion_posture: metadata_safe_default
    conformance_tests:
      - id: imported_hint_requires_user_confirmation
        description: >
          An imported / cached target with inferred_from_ambient
          confidence MUST drive wrong_target_correction_class
          requires_user_confirmation. Silent pick is non-conforming.
      - id: imported_hint_preserves_prior_hint_ref
        description: >
          The imported hint MUST be preserved under prior_target_ref
          even though no effect has landed; support export MUST
          carry both the hint and the confirmed target.

  - case_id: target.remote_helper.attach.probed_consistent
    intended_coverage: >
      Remote helper attach. A remote-agent attach session is bound;
      adapter probes the remote toolchain and the probe matches the
      declared capability envelope. No correction required.
    target_truth_record:
      invocation_session_id: "inv:20260423T090200Z:0003"
      execution_context_id: "exec:20260423T090200Z:0003"
      target_class: remote_agent
      action_target_class: remote_agent_target
      action_route_class: remote_agent_attach_route
      action_exposure_class: workspace_visible_mutation
      action_origin_class: user_keystroke_local
      host_boundary_cue_stack:
        - local_host_boundary
        - remote_agent_boundary
      target_discovery_confidence_class: probed_consistent
      divergence_or_inference_reasons: null
      adapter_confidence_placeholder:
        adapter_kind: remote_agent_attach
        adapter_confidence_class: adapter_probed_consistent
        adapter_divergence_or_inference_reasons: null
        adapter_authority_envelope_tag: projected_from_execution
        adapter_freshness_class: authoritative_live
        adapter_evidence_refs:
          - "remote_agent_attach_ticket:raat:20260423T090150Z:0003"
          - "remote_agent_probe:probe:20260423T090151Z:0003"
      reachability_state: reachable
      managed_workspace_lifecycle_state: null
      managed_workspace_reviewer_label: null
      expiry_reason_class: null
      local_only_continuation_reason_class: null
      activation_budget_summary_ref: null
      wrong_target_correction_class: no_correction_needed
      reapproval_requirement_class: no_reapproval_required
      prior_target_ref: null
      prior_route_class: null
      route_change_reason_code: canonical_no_route_change
      authority_linkage_class: remote_agent_attach_ticket_linked
      target_evidence_refs:
        - "execution_context:exec:20260423T090200Z:0003"
        - "remote_agent_attach_ticket:raat:20260423T090150Z:0003"
      freshness_class: authoritative_live
      redaction_class: metadata_and_hashes_only
      export_inclusion_posture: operator_only_restricted
    conformance_tests:
      - id: remote_helper_cue_stack_outermost_local
        description: >
          A remote-agent attach MUST stack local_host_boundary
          outermost and remote_agent_boundary inside; collapsing the
          stack into a single cue is non-conforming.
      - id: remote_helper_adapter_confidence_required
        description: >
          A remote-agent target with probed_consistent confidence
          SHOULD carry an adapter_confidence_placeholder; a missing
          placeholder is a seed-packet warning.
      - id: remote_helper_exposure_operator_only
        description: >
          A cue stack containing remote_agent_boundary MUST NOT
          export with metadata_safe_default posture by default.

  - case_id: target.managed_workspace.reconnect.session_ticket_expired
    intended_coverage: >
      Managed workspace reconnect. Instance is reachable but the
      managed-session ticket has expired; resume is blocked pending
      session-ticket refresh.
    target_truth_record:
      invocation_session_id: "inv:20260423T090300Z:0004"
      execution_context_id: "exec:20260423T090300Z:0004"
      target_class: managed_workspace
      action_target_class: managed_workspace_target
      action_route_class: managed_control_plane_route
      action_exposure_class: workspace_visible_mutation
      action_origin_class: user_keystroke_local
      host_boundary_cue_stack:
        - local_host_boundary
        - managed_workspace_boundary
      target_discovery_confidence_class: canonical_materialised
      divergence_or_inference_reasons: null
      adapter_confidence_placeholder:
        adapter_kind: managed_workspace_adapter
        adapter_confidence_class: adapter_authoritative_match
        adapter_divergence_or_inference_reasons: null
        adapter_authority_envelope_tag: projected_from_execution
        adapter_freshness_class: warm_cached
        adapter_evidence_refs:
          - "managed_workspace_instance:mw:beta:0004"
      reachability_state: reachable_pending_reauth
      managed_workspace_lifecycle_state: ready
      managed_workspace_reviewer_label: expired
      expiry_reason_class: session_ticket_expired
      local_only_continuation_reason_class: null
      activation_budget_summary_ref: "abs:20260423T090300Z:0004"
      wrong_target_correction_class: blocked_pending_reapproval
      reapproval_requirement_class: session_ticket_refresh_required
      prior_target_ref: null
      prior_route_class: null
      route_change_reason_code: route_changed_freshness_floor_unmet
      authority_linkage_class: authority_missing_denied
      target_evidence_refs:
        - "execution_context:exec:20260423T090300Z:0004"
        - "managed_workspace_instance:mw:beta:0004"
        - "managed_session_ticket:mst:20260423T080000Z:0004"
      freshness_class: warm_cached
      redaction_class: metadata_and_hashes_only
      export_inclusion_posture: operator_only_restricted
    conformance_tests:
      - id: managed_reconnect_names_expiry_reason
        description: >
          A managed_workspace_reviewer_label of expired MUST carry
          an expiry_reason_class; null is non-conforming.
      - id: managed_reconnect_requires_session_ticket_refresh
        description: >
          A session_ticket_expired expiry MUST pair with
          reapproval_requirement_class = session_ticket_refresh_required
          and wrong_target_correction_class = blocked_pending_reapproval.
      - id: managed_reconnect_preserves_activation_budget
        description: >
          A managed-workspace record in any state other than
          undeclared MUST carry an activation_budget_summary_ref.

  - case_id: target.stale.metadata_rejected.resolver_reports_divergence
    intended_coverage: >
      Stale target metadata. Resolver probed the target but found a
      toolchain digest mismatch; record enters probed_divergent and
      user must reconfirm.
    target_truth_record:
      invocation_session_id: "inv:20260423T090400Z:0005"
      execution_context_id: "exec:20260423T090400Z:0005"
      target_class: local_host
      action_target_class: local_host_target
      action_route_class: in_process_route
      action_exposure_class: local_only_mutation
      action_origin_class: user_keystroke_local
      host_boundary_cue_stack:
        - local_host_boundary
      target_discovery_confidence_class: probed_divergent
      divergence_or_inference_reasons:
        - toolchain_digest_drift
        - capsule_drift_state_rejected_prebuild
      adapter_confidence_placeholder: null
      reachability_state: reachable
      managed_workspace_lifecycle_state: null
      managed_workspace_reviewer_label: null
      expiry_reason_class: null
      local_only_continuation_reason_class: null
      activation_budget_summary_ref: null
      wrong_target_correction_class: requires_user_confirmation
      reapproval_requirement_class: trust_reevaluation_required
      prior_target_ref: "toolchain_digest:python.cpython:sha256:deadbeef"
      prior_route_class: in_process_route
      route_change_reason_code: route_changed_freshness_floor_unmet
      authority_linkage_class: local_user_keystroke_authority
      target_evidence_refs:
        - "execution_context:exec:20260423T090400Z:0005"
        - "capsule_drift_event:drift:20260423T090359Z:0005"
      freshness_class: warm_cached
      redaction_class: metadata_and_hashes_only
      export_inclusion_posture: metadata_safe_default
    conformance_tests:
      - id: stale_target_preserves_divergence_reasons
        description: >
          A probed_divergent record MUST carry a non-empty
          divergence_or_inference_reasons list.
      - id: stale_target_requires_user_confirmation
        description: >
          Toolchain digest drift MUST drive
          wrong_target_correction_class = requires_user_confirmation
          rather than silently accepting the new digest.

  - case_id: target.wrong_target.managed_workspace_drift.reapproval_required
    intended_coverage: >
      Wrong-target detection. Managed workspace drift recycled
      mw:alpha mid-session; the resume is re-pinned to mw:beta. The
      prior approval ticket does not admit the corrected instance
      so approval-ticket reissue is required before commit.
    target_truth_record:
      invocation_session_id: "inv:20260423T090500Z:0006"
      execution_context_id: "exec:20260423T090500Z:0006"
      target_class: managed_workspace
      action_target_class: managed_workspace_target
      action_route_class: managed_control_plane_route
      action_exposure_class: workspace_visible_mutation
      action_origin_class: user_keystroke_local
      host_boundary_cue_stack:
        - local_host_boundary
        - managed_workspace_boundary
      target_discovery_confidence_class: canonical_materialised
      divergence_or_inference_reasons: null
      adapter_confidence_placeholder:
        adapter_kind: managed_workspace_adapter
        adapter_confidence_class: adapter_probed_divergent
        adapter_divergence_or_inference_reasons:
          - managed_workspace_instance_recycled_mid_session
        adapter_authority_envelope_tag: projected_from_execution
        adapter_freshness_class: authoritative_live
        adapter_evidence_refs:
          - "managed_workspace_instance_drift_event:drift:20260423T090459Z:0006"
      reachability_state: degraded
      managed_workspace_lifecycle_state: recovering
      managed_workspace_reviewer_label: degraded
      expiry_reason_class: null
      local_only_continuation_reason_class: null
      activation_budget_summary_ref: "abs:20260423T090500Z:0006"
      wrong_target_correction_class: corrected_before_commit
      reapproval_requirement_class: approval_ticket_reissue_required
      prior_target_ref: "mw:alpha"
      prior_route_class: managed_control_plane_route
      route_change_reason_code: route_changed_wrong_target_detected
      authority_linkage_class: managed_control_plane_token_linked
      target_evidence_refs:
        - "execution_context:exec:20260423T090500Z:0006"
        - "managed_workspace_instance:mw:beta:0006"
        - "managed_workspace_instance_drift_event:drift:20260423T090459Z:0006"
        - "approval_ticket:at:pending:reissue:0006"
      freshness_class: authoritative_live
      redaction_class: metadata_and_hashes_only
      export_inclusion_posture: operator_only_restricted
    conformance_tests:
      - id: wrong_target_preserves_prior_target_ref
        description: >
          A wrong_target_correction_class other than
          no_correction_needed MUST carry prior_target_ref,
          prior_route_class, and a route_change_reason_code that is
          not canonical_no_route_change.
      - id: wrong_target_requires_approval_ticket_reissue
        description: >
          When the corrected target falls outside the prior approval
          ticket's admitted set, reapproval_requirement_class MUST be
          approval_ticket_reissue_required; carry-forward of the
          prior ticket is non-conforming.
      - id: wrong_target_preserves_prior_authority_evidence
        description: >
          The prior approval ticket or managed-control-plane token
          MUST remain in target_evidence_refs; dropping it on
          correction is non-conforming.

# Cross-reference to the reapproval / suspend / resume case corpus.
# Every case id below is backed by a fixture file in
# fixtures/remote/reapproval_and_suspend_resume_cases/.
reapproval_and_suspend_resume_cases:
  - case_id: reapproval.managed_workspace.suspend_idle_window
    file: fixtures/remote/reapproval_and_suspend_resume_cases/managed_workspace_suspend_idle_window.yaml
    reviewer_label: suspended
    lifecycle_state: idle_suspended
    reapproval_requirement_class: no_reapproval_required
  - case_id: reapproval.managed_workspace.resume_from_idle_suspended
    file: fixtures/remote/reapproval_and_suspend_resume_cases/managed_workspace_resume_from_idle_suspended.yaml
    reviewer_label: ready
    lifecycle_state: ready
    reapproval_requirement_class: session_ticket_refresh_required
  - case_id: reapproval.managed_workspace.reconnect_after_control_plane_failover
    file: fixtures/remote/reapproval_and_suspend_resume_cases/managed_workspace_reconnect_after_control_plane_failover.yaml
    reviewer_label: degraded
    lifecycle_state: recovering
    reapproval_requirement_class: admin_confirmation_required
  - case_id: reapproval.managed_workspace.rebuild_after_successor_image
    file: fixtures/remote/reapproval_and_suspend_resume_cases/managed_workspace_rebuild_after_successor_image.yaml
    reviewer_label: warming
    lifecycle_state: provisioning
    reapproval_requirement_class: approval_ticket_reissue_required
  - case_id: reapproval.managed_workspace.expired_hibernation_window_elapsed
    file: fixtures/remote/reapproval_and_suspend_resume_cases/managed_workspace_expired_hibernation_window_elapsed.yaml
    reviewer_label: expired
    lifecycle_state: hibernated
    reapproval_requirement_class: session_ticket_refresh_required
  - case_id: reapproval.local_only_continuation.remote_agent_unreachable
    file: fixtures/remote/reapproval_and_suspend_resume_cases/local_only_continuation_remote_agent_unreachable.yaml
    reviewer_label: local_only_continuation
    lifecycle_state: null
    reapproval_requirement_class: no_reapproval_required
