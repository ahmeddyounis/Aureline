schema_version: 1
manifest_id: remote.suspend_resume_reattach_alpha.v1
status: protected

contract_source: docs/remote/managed_workspace_truth_alpha.md
runtime_consumer: crates/aureline-runtime/src/managed_alpha/mod.rs

rules:
  - The lane is bounded to preview_runtime_inspection and must not imply generic managed-workspace orchestration.
  - Suspend, resume, reattach, and reconnect-required states must remain distinct.
  - Runtime inspection labels must be computed from lifecycle, placement, freshness, reapproval, reachability, and rerun posture.
  - Helper-backed rows must keep boundary truth visible and must not permit mutation while reconnect or reapproval is pending.
  - Local comparison rows are allowed only to prove label parity; they do not create a managed workspace promise.

case_files:
  - file: local_runtime_inspection.yaml
    coverage:
      - local_runtime_label
      - mutation_safe_current_context
  - file: managed_workspace_suspended_no_traffic.yaml
    coverage:
      - suspended_state
      - helper_backed_label
      - stale_inspect_only_preview
      - no_traffic_while_suspended
  - file: managed_workspace_resumed_reauth_required.yaml
    coverage:
      - resumed_state
      - session_ticket_refresh_required
      - resumed_but_inspect_only_until_reauth
  - file: managed_workspace_reattached_same_witness.yaml
    coverage:
      - reattached_state
      - same_witness_mutation_allowed
      - current_context_rerun_safe
  - file: managed_workspace_reconnect_required_stale_witness.yaml
    coverage:
      - reconnect_required_state
      - stale_target_identity
      - blocked_rerun_until_reconnect
