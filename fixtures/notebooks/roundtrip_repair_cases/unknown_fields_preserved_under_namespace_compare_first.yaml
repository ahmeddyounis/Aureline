  scenario: >-
    A structured repair helper observes unknown extension keys in a
    user-owned JSON manifest. The structured writer cannot preserve them
    verbatim, so it proposes a candidate that preserves the unknown block
    under a declared namespace and requires raw preservation + explicit
    compare-before-apply review.
  seed_section: Unknown fields; preserve raw; compare-first
  exercised_classes:
    flow_class: unknown_fields
    risk_class: lossy_structural
    apply_gate_class: require_compare_first_review
    raw_bytes_posture: preserved_in_recovery_journal
  linked_docs:
    - docs/notebooks/structured_roundtrip_repair_contract.md
    - docs/state/feature_scoped_migration_failure_contract.md
    - docs/ux/preview_apply_revert_contract.md

