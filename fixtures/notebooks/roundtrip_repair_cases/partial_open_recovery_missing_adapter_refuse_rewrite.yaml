__fixture__:
  name: partial_open_recovery_missing_adapter_refuse_rewrite
  scenario: >-
    A structured artifact is opened while the workspace is partial-open
    (missing adapters/runtime needed to interpret and re-emit the
    artifact safely). Because impact cannot be enumerated, Aureline
    refuses structured repair rewrites and offers compare-only recovery.
  seed_section: Partial-open; missing adapter; refuse rewrite
  exercised_classes:
    flow_class: partial_open_recovery
    risk_class: round_trip_unavailable
    apply_gate_class: refuse_rewrite
    raw_bytes_posture: preserved_in_open_buffer
  linked_docs:
    - docs/notebooks/structured_roundtrip_repair_contract.md
    - docs/state/feature_scoped_migration_failure_contract.md

