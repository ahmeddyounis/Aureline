# yaml-language-server: $schema=../../../schemas/notebooks/roundtrip_repair_packet.schema.json
__fixture__:
  name: downgrade_compatibility_drop_unsupported_fields_compare_first
  scenario: >-
    A compatibility downgrade candidate drops fields that are unsupported
    by a less-capable environment. This is a lossy structured rewrite,
    so raw preservation and compare-before-apply review are mandatory and
    the dropped fields remain enumerated for support/export.
  seed_section: Downgrade compatibility; drop fields; compare-first
  exercised_classes:
    flow_class: downgrade_compatibility
    risk_class: lossy_structural
    apply_gate_class: require_compare_first_review
    raw_bytes_posture: preserved_in_recovery_journal
  linked_docs:
    - docs/notebooks/structured_roundtrip_repair_contract.md
    - docs/state/feature_scoped_migration_failure_contract.md

roundtrip_repair_schema_version: 1
record_kind: structured_round_trip_repair_packet_record
repair_packet_id: rtrepair.compat.downgrade.drop_unsupported.v1

subject:
  subject_class: structured_manifest
  subject_ref: ws.file.profile_jsonc
  display_label: Structured repair (compatibility downgrade; drop unsupported fields)
  artifact_class: null
  notebook_document_ref: null
  cell_id_ref: null
  output_id_ref: null

authored_source:
  source_format_class: json_manifest
  source_artifact_ref: ws.source.profile_jsonc.v4
  source_fingerprint_ref: hash.ws.profile_jsonc.bytes.v4
  authored_summary_label: Artifact includes fields not supported by the current consumer; downgrade compatibility is offered as an explicit, review-gated rewrite.

availability_context:
  workspace_open_posture: workspace_open_partial
  artifact_open_posture: open_with_warning
  summary_label: Workspace is partial-open (downgraded environment); compatibility downgrade is offered only through compare-first.
  linked_migration_failure_state_ref: ws.migration_failure.downgrade_context.v1

suspect_state:
  suspect_reasons:
    - compatibility_downgrade_requested
    - unsupported_schema_version
  unknown_field_posture: preserve_verbatim
  linked_decode_recovery_review_ref: null
  summary_label: The current consumer cannot interpret some fields; rewrite is allowed only with preserved raw + explicit compare-first review.

raw_preservation:
  raw_bytes_posture: preserved_in_recovery_journal
  preserved_raw_artifact_ref: ws.preserve.raw.profile_jsonc.before_downgrade.v1
  preserved_raw_fingerprint_ref: hash.ws.profile_jsonc.bytes.v4
  preservation_summary_label: Raw artifact bytes are preserved so the downgrade can be reversed exactly by restore.

repair_candidates:
  - candidate_id: rtrepair.candidate.compat.downgrade.drop_unsupported.v1
    flow_class: downgrade_compatibility
    risk_class: lossy_structural
    candidate_artifact_ref: ws.repair.candidate.profile_jsonc.downgraded.v1
    candidate_fingerprint_ref: hash.ws.repair.profile_jsonc.downgraded.v1
    candidate_summary_label: Drop unsupported fields and normalize remaining structure for compatibility with the current environment.
    compare_before_apply:
      compare_view_class: structured_diff
      compare_view_ref: ws.diff.profile_jsonc.downgrade.v1
      compare_summary_label: Compare raw profile vs downgraded candidate; unsupported fields are highlighted as drops.
    change_summary:
      dropped_field_paths:
        - /ai
        - /extensions/experimental
      normalized_field_paths:
        - /
      regenerated_field_paths: []
      preserved_unknown_field_paths: []
      summary_label: Compatibility downgrade drops unsupported fields and normalizes the remainder; the loss is explicit and review-gated.
    rerun_requirement:
      intent_class: manual_recovery_required
      action_ref: null
      summary_label: Manual follow-up may be required to re-enable unsupported features after upgrading to a compatible environment.
    checkpoint:
      checkpoint_required: true
      checkpoint_ref: ws.checkpoint.profile_jsonc.before_downgrade.v1
      summary_label: A checkpoint is created so the exact pre-downgrade artifact can be restored.
    claimed_reversal_class: exact
    apply_gate_class: require_compare_first_review
    linked_roundtrip_preview_sheet_ref: ws.preview_sheet.profile_jsonc.downgrade.v1

