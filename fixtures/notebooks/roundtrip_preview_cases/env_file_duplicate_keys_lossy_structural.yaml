__fixture__:
  name: env_file_duplicate_keys_lossy_structural
  scenario: >-
    A structured env-file editor previews a `.env` round-trip that cannot
    preserve duplicate keys, ordering, or comment placement. This is a
    structural loss: applying the structured form would drop or collapse
    entries. The surface requires compare-first review and preserves raw
    bytes before any mutation.
  seed_section: Env file duplicate keys; structural loss; preserve raw
  exercised_classes:
    subject_class: structured_env_file
    structured_round_trip_risk_class: lossy_structural
    apply_gate_class: require_compare_first_review
    raw_bytes_posture: preserved_until_apply_resolves
  linked_docs:
    - docs/notebooks/notebook_trust_and_roundtrip_preview_contract.md
    - docs/editor/decode_recovery_and_save_consequence_contract.md

