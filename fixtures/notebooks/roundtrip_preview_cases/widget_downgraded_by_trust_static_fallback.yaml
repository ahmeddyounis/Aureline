# yaml-language-server: $schema=../../../schemas/notebooks/roundtrip_preview.schema.json
__fixture__:
  name: widget_downgraded_by_trust_static_fallback
  scenario: >-
    A notebook contains a widget output, but the notebook is only
    structural-only trusted. Widget live binding is denied; the preview
    surface shows a tombstone/static fallback and offers safe next
    actions (keep read-only or admit the widget with an explicit
    confirmation). Trust axes remain distinct: output trust is widget
    gated while widget trust is denied.
  seed_section: Widget trust denied; tombstone preview; safe next actions
  exercised_classes:
    subject_class: notebook_output
    notebook_trust_rung: structural_only_trusted
    output_trust_state: output_trust_widget_gated
    widget_trust_state: widget_trust_denied_by_default
    structured_round_trip_risk_class: lossy_irreversible
    apply_gate_class: require_typed_confirmation
  linked_docs:
    - docs/notebooks/notebook_trust_and_roundtrip_preview_contract.md
    - docs/notebooks/kernel_output_lineage_and_widget_contract.md
    - docs/adr/0022-notebook-document-model-kernel-transport-trust-and-diff-merge.md

roundtrip_preview_schema_version: 1
record_kind: structured_round_trip_preview_sheet_record
preview_id: rtpreview.nb.widget.admission.required.v1

subject:
  subject_class: notebook_output
  subject_ref: nb.subject.output.widget.scatter
  display_label: Widget output preview (static fallback; admission required)
  artifact_class: notebook_output
  notebook_document_ref: nb.doc.visualization.widget_demo.01
  cell_id_ref: nb.cell.widget.scatter
  output_id_ref: nb.output.widget.scatter.01

trust_posture:
  notebook_trust_rung: structural_only_trusted
  per_cell_trust_overrides: []
  document_trust_state: document_trust_inherited_from_workspace
  kernel_trust_state: kernel_trust_inherited_from_document_trust
  output_trust_state: output_trust_widget_gated
  widget_trust_state: widget_trust_denied_by_default
  kernel_transport_class: local_managed_toolchain_kernel

authored_source:
  source_format_class: notebook_ipynb_json
  source_artifact_ref: nb.source.ipynb.widget_demo.01
  source_fingerprint_ref: hash.nb.doc.widget_demo.01.ipynb.v1
  authored_summary_label: Notebook is canonical; widget output exists but live binding is denied at the current trust rung.

effective_preview:
  preview_representation_class: tombstone_preview
  effective_representation_ref: nb.preview.output.widget.scatter.static.v1
  effective_summary_label: Live widget state is suppressed; the preview shows a static/textual fallback with an admission chip.

round_trip:
  structured_round_trip_risk_class: lossy_irreversible
  irreversibility_flag: true
  disclosure_flag_set:
    - external_side_effect
  reversal_hint_ref: null

raw_preservation:
  raw_bytes_posture: preserved_in_open_buffer
  preserved_raw_artifact_ref: nb.preserve.raw.ipynb.before_widget_admit.v1
  preservation_summary_label: Raw notebook bytes remain available while the user decides whether to admit the widget.

rerun_requirement:
  intent_class: none_required
  action_ref: null
  summary_label: No rerun is required to view the static fallback; live binding requires explicit admission.

apply_gate_class: require_typed_confirmation

safe_next_actions:
  - action_class: keep_read_only
    action_label: Keep widget in static fallback (do not admit live binding)
    destination_ref: null
  - action_class: admit_widget_with_preview
    action_label: Admit widget live binding with explicit confirmation
    destination_ref: action.nb.widget.scatter.admit_live_binding
  - action_class: open_authored_source
    action_label: Open the canonical notebook source
    destination_ref: nb.source.ipynb.widget_demo.01

captured_at: "2026-05-06T21:36:10Z"

