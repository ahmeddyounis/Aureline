__fixture__:
  name: alias_set_drift
  scenario: >
    Alias discovery widened after the record was first materialized. The
    presentation path remains stable, but the alias set is no longer complete
    relative to the canonical object. Export, migration, and support surfaces
    must preserve the same readiness state and safe actions rather than silently
    dropping alias evidence.
  doc_section: Semantic-readiness conformance — alias-set drift
  exercises:
    subject.identity.alias_set: required
    semantic_readiness.state: stale
    not_ready_reason: input_digest_stale
record_kind: semantic_readiness_view_record
