# yaml-language-server: $schema=../../../schemas/observability/signal_class_example.schema.json
__fixture__:
  name: install_update_counter_opt_in
  scenario: >
    A user opts into coarse install/update/version counters. The payload
    is aggregate-only and forbids raw content classes, so there is no
    per-counter preview; the gate is the opt-in control plus schema
    review.

signal_class_example_schema_version: 1
record_kind: signal_class_example_record
example_id: signal-class-example.install-update.opt-in
signal_class_id: install_update_active_version_counts
scenario_title: Opt-in install/update/version counters (aggregate-only)
default_collection_postures:
  - local_only
  - explicit_opt_in_upload
upload_preview_requirement: not_required_schema_bound
allowed_payload_notes:
  - Coarse install/update/active-version counts aggregated over declared windows.
  - Version and channel buckets (no raw identifiers beyond declared schema fields).
  - Aggregation window metadata and schema revision for auditability.
forbidden_payload_notes:
  - Code bodies, file paths, prompts, and secrets are forbidden by default.
  - Any per-event raw payload body or free-form field is forbidden by default.
  - Any identifier not declared in the schema is forbidden by default.
linkage:
  schema_registry_entry_refs: []
  privacy_history_event_types:
    - telemetry_opt_in_changed
  support_contract_refs:
    - docs/observability/signal_class_matrix.md
decision_note: >
  Install/update counters are safe to gate via opt-in because the payload
  is aggregate-only and the forbidden-by-default content classes prevent
  accidental content capture.

