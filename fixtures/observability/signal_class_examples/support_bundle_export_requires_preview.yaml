# yaml-language-server: $schema=../../../schemas/observability/signal_class_example.schema.json
__fixture__:
  name: support_bundle_export_requires_preview
  scenario: >
    The user exports a support bundle. Export is always explicit and
    previewed; the preview is the policy gate that binds item inclusion,
    omission markers, and redaction profile selection.

signal_class_example_schema_version: 1
record_kind: signal_class_example_record
example_id: signal-class-example.support-bundle.previewed-export
signal_class_id: support_bundle_transfer_events
scenario_title: Support bundle export/upload is always explicit and previewed
default_collection_postures:
  - export_only_user_initiated
upload_preview_requirement: required_before_any_transfer
allowed_payload_notes:
  - Bundle manifest metadata (sections, item ids, redaction class, storage modes).
  - Inclusion/omission reasons so “not included” is auditable.
  - Upload result receipt separate from telemetry streams.
forbidden_payload_notes:
  - Any background or implicit support upload path is forbidden.
  - Raw bundle bodies must not be forwarded as telemetry events.
  - Unreviewed attachments (unbounded logs, unbounded code) are forbidden by default.
linkage:
  schema_registry_entry_refs:
    - support.bundle_manifest
    - support.bundle_redaction_profile
  privacy_history_event_types:
    - support_bundle_exported
  support_contract_refs:
    - docs/support/support_bundle_preview_contract.md
    - docs/support/support_bundle_contract.md
  record_class_id_refs:
    - support_bundle_archive
decision_note: >
  Support exports are user/admin actions, not background collection. The
  preview is required because it is the only honest way to show what is
  embedded, what is reference-only, what is omitted, and which redaction
  profile governed the result.

