# yaml-language-server: $schema=../../../schemas/observability/signal_class_example.schema.json
__fixture__:
  name: manual_support_evidence_requires_item_selection
  scenario: >
    A user attaches a bounded snippet or selected excerpt to a support
    bundle. Item-level selection and preview are required to prevent
    accidental workspace-wide capture.

signal_class_example_schema_version: 1
record_kind: signal_class_example_record
example_id: signal-class-example.support.manual-evidence
signal_class_id: manual_support_evidence
scenario_title: Manual support evidence requires per-item selection and preview
default_collection_postures:
  - export_only_user_initiated
upload_preview_requirement: required_per_item_selection
allowed_payload_notes:
  - User-selected bounded excerpts with explicit range disclosure and hashes.
  - Redaction summary and omission markers per attachment.
  - Itemized opt-in receipts tied to the support preview session.
forbidden_payload_notes:
  - “Attach the whole workspace” is forbidden by default; attachments must be itemized and bounded.
  - Secret-bearing material is forbidden; only redaction markers are admissible.
  - Full terminal history and clipboard payloads are forbidden by default.
linkage:
  schema_registry_entry_refs:
    - support.bundle_manifest
  privacy_history_event_types:
    - support_bundle_exported
  support_contract_refs:
    - docs/support/support_bundle_preview_contract.md
  record_class_id_refs:
    - support_bundle_archive
decision_note: >
  Manual evidence is allowed only when the user selects exactly what to
  share and can preview/redact it. This prevents a support flow from
  becoming an accidental always-on content capture path.

