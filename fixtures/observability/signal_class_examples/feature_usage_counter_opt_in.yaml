# yaml-language-server: $schema=../../../schemas/observability/signal_class_example.schema.json
__fixture__:
  name: feature_usage_counter_opt_in
  scenario: >
    A user opts into coarse feature-usage counters. The payload remains
    aggregate-only and schema-bound, so there is no per-event preview.

signal_class_example_schema_version: 1
record_kind: signal_class_example_record
example_id: signal-class-example.feature-usage.opt-in
signal_class_id: feature_usage_counters
scenario_title: Opt-in coarse feature-usage counters (no per-event preview)
default_collection_postures:
  - local_only
  - explicit_opt_in_upload
upload_preview_requirement: not_required_schema_bound
allowed_payload_notes:
  - Stable event ids and counters only (no raw payload bodies).
  - Coarse buckets (build flavor, channel, device class) permitted when declared in schema.
  - Aggregation and sampling metadata required so reviewers can reason about representativeness.
forbidden_payload_notes:
  - Any free-text user input, raw search queries, or clipboard content is forbidden by default.
  - File paths, repo names, and raw user identifiers are forbidden by default.
  - Any identifier not declared in the schema is forbidden by default.
linkage:
  schema_registry_entry_refs:
    - telemetry.ux_product_event
    - telemetry.learning_onboarding_event
  privacy_history_event_types:
    - telemetry_opt_in_changed
  support_contract_refs:
    - docs/governance/privacy_history_and_lifecycle_contract.md
    - docs/governance/telemetry_and_support_schema_registry.md
  record_class_id_refs:
    - telemetry_contract_schema
decision_note: >
  Because the schema forbids raw content classes and the payload is
  aggregate-only, per-event preview is unnecessary; the correct gate is
  the explicit opt-in control plus an inspectable schema registry entry.

