# yaml-language-server: $schema=../../../schemas/observability/signal_slice.schema.json
__fixture__:
  name: imported_trace
  scenario: >
    Trace detail slice loaded from an imported artifact. The trace may be
    complete for its declared artifact window, but it has no live refresh
    path and the imported mapping remains unverified by the product.

signal_slice_schema_version: 1
record_kind: signal_slice_record
signal_slice_id: signal_slice.trace.imported.checkout_latency
surface_class: trace_detail
signal_kind_class: trace_window
title: Imported checkout latency trace

source:
  source_class: imported_artifact
  collection_mode_class: imported
  provider_ref: provider_ref.external_trace_archive
  source_instance_ref: source.imported_artifact.trace_archive.checkout_latency
  capture_pipeline_ref: import_receipt.trace_archive.checkout_latency.2026_04_24
  source_boundary_note: >
    Loaded from an imported trace archive; no provider session or live
    refresh path is implied.

time_context:
  time_basis_class: reconstructed_time
  window_start_utc: "2026-04-24T19:12:00Z"
  window_end_utc: "2026-04-24T19:14:30Z"
  display_time_zone_iana: UTC
  display_utc_offset: "+00:00"
  timestamp_envelope_ref: timestamp_envelope.imported_trace.checkout_latency.window
  timezone_boundary_note: >
    Imported timestamps are rendered in UTC because the artifact did not
    carry an attestable local timezone.

freshness:
  freshness_class: imported_no_refresh_path
  evidence_state_classes:
    - complete
  validity_window:
    captured_at: "2026-04-24T19:15:00Z"
    valid_until: null
    freshness_window_duration: null
    evaluated_at: "2026-04-25T09:20:00Z"
  stale_reason_classes:
    - import_has_no_refresh_path
  freshness_boundary_note: >
    Complete for the imported artifact manifest, but not live or
    refreshable from the product.

reduction:
  truncation_class: not_truncated
  sampling_class: not_sampled
  downsample_class: not_downsampled
  dropped_record_count: 0
  sample_rate: null
  original_resolution: null
  rendered_resolution: null
  clip_reason_classes:
    - not_applicable
  reduction_note: >
    Artifact manifest declares no clipping, sampling, or downsampling
    inside the imported trace window.

payload:
  query_or_filter_ref: trace_query.imported.checkout_latency.root_span
  query_hash_ref: query_hash.imported_trace.checkout_latency.root_span.v1
  raw_signal_ref: raw_signal.imported_trace.checkout_latency.archive_ref
  result_count: 318
  unit_or_payload_class: trace spans
  aggregation_class: unaggregated imported span set
  mapping_quality_class: import_mapping_unverified
  summary: >
    Imported span set for checkout latency inspection; source mapping and
    clock synchronization are not re-attested by the product.

correlation_refs:
  - correlation_ref_id: correlation.imported_trace.run
    target_class: run
    target_ref: run.provider.checkout_latency.opaque
    relationship_class: associated_with
    causality_claim_class: association_only_no_causality
    evidence_ref: evidence.imported_trace.run_ref_from_archive
    correlation_note: >
      Run ref came from the imported archive metadata; the product has
      not verified causality.
  - correlation_ref_id: correlation.imported_trace.build
    target_class: build
    target_ref: build.provider.checkout_latency.opaque
    relationship_class: associated_with
    causality_claim_class: association_only_no_causality
    evidence_ref: evidence.imported_trace.build_ref_from_archive
    correlation_note: >
      Build ref is preserved for comparison only.

actions:
  open_raw:
    action_class: open_raw_signal
    availability_class: available_by_reference_only
    action_ref: action.trace_detail.open_imported_artifact_ref
    target_ref: raw_signal.imported_trace.checkout_latency.archive_ref
    redaction_mode_class: by_reference_only
    boundary_note: >
      Opens the imported artifact through the artifact resolver; it does
      not contact a live provider.
  export:
    action_class: export_slice
    availability_class: available_by_reference_only
    action_ref: action.trace_detail.export_imported_trace_ref
    target_ref: export.signal_slice.imported_trace.checkout_latency
    redaction_mode_class: by_reference_only
    boundary_note: >
      Export preserves the import receipt and source refs rather than
      embedding raw span payloads.
  share:
    action_class: share_slice
    availability_class: available_by_reference_only
    action_ref: action.trace_detail.share_imported_trace_ref
    target_ref: share.signal_slice_ref.imported_trace.checkout_latency
    redaction_mode_class: by_reference_only
    boundary_note: >
      Share emits metadata and refs only; reviewers must not treat this
      as live trace data.

export_share:
  exportability_class: exportable_by_reference
  destination_class: local_review
  redaction_mode_class: by_reference_only
  ownership:
    owner_actor_ref: actor.reviewer.imported_trace
    owning_team_ref: team.runtime_support
    reviewer_actor_refs:
      - actor.support.reviewer.trace_import
  structured_timeline_refs:
    - timeline.imported_trace.checkout_latency
  evidence_refs:
    - evidence.imported_trace.import_receipt
    - evidence.imported_trace.archive_manifest
  omission_reason_classes:
    - none
  current_boundary_notes:
    - >
      Export and share preserve imported_no_refresh_path and
      import_mapping_unverified labels.

boundary_notes:
  - >
    Recent-looking span timestamps remain imported artifact timestamps;
    the product does not claim current provider state.
