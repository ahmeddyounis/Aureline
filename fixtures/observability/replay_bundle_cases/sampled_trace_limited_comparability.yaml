# yaml-language-server: $schema=../../../schemas/observability/trace_bundle.schema.json
__fixture__:
  name: sampled_trace_limited_comparability
  scenario: >
    Remote-agent trace sampled by the provider. The bundle remains
    useful for advisory comparison when sampling, hardware, and
    execution-location differences are named and exported.

trace_bundle_schema_version: 1
record_kind: trace_bundle_record
trace_bundle_id: trace_bundle.remote_sampled.scheduler_waits
title: Sampled remote scheduler trace with limited comparability

bundle_identity:
  bundle_uid: trace_bundle.remote_sampled.scheduler_waits
  bundle_digest_ref: digest.trace_bundle.remote_sampled.scheduler_waits.sha256
  bundle_format_profile: trace_bundle_format.aureline.v1
  producer_ref: producer.remote_agent.profiler
  created_at: "2026-04-29T12:20:00Z"
  source_capture_session_ref: capture_session.remote.scheduler_waits
  schema_ref: schemas/observability/trace_bundle.schema.json

capture_scope:
  capture_mode_class: sampled_profile
  source_class: remote_agent
  collection_mode_class: mirrored
  workload_ref: workload.scheduler_waits
  corpus_ref: corpus.reference_backend_medium
  capture_window:
    time_basis_class: event_time
    started_at: "2026-04-29T12:00:00Z"
    ended_at: "2026-04-29T12:05:00Z"
    duration_ms: 300000
  capture_backend_family_ref: backend.remote_agent_sampler.v1
  capture_clock_class: distributed_trace_clock
  downscope_reason_refs:
    - sampling.remote_agent.provider_budget

build_context_identity:
  exact_build_identity_ref: exact_build.remote.scheduler_waits.20260429
  build_id: build.remote.scheduler_waits.445566
  source_revision_ref: git.revision.scheduler_waits.445566
  build_mode: profiled
  execution_context_id: execution_context.remote.scheduler_waits
  target_ref: target.remote_agent.scheduler_service
  workspace_ref: workspace.reference_backend
  workset_ref: workset.scheduler_waits
  runtime_ref: runtime.remote_linux.x86_64
  toolchain_ref: toolchain.rust.stable.remote
  environment_fingerprint_ref: environment.remote_linux_sampled_001
  hardware_profile_ref: hardware.remote_linux_shared
  power_posture_ref: power.remote_unknown
  local_remote_class: remote_workspace

symbol_source_linkage:
  symbol_manifest_ref: symbols.remote.scheduler_waits.445566
  symbol_linkage_state: exact_symbols
  source_map_manifest_ref: null
  source_map_linkage_state: source_map_not_applicable
  mapping_quality_class: exact_match
  unavailable_source_disclosures: []

retention_export_posture:
  record_class_ref: record_class.performance_capture_evidence
  retention_class: support_case_retained
  retained_until: "2026-05-29T00:00:00Z"
  redaction_profile_ref: redaction.performance.remote_sampled
  summary_export_posture: manifest_with_digests
  raw_export_posture: upload_safe_after_redaction
  sensitive_content_class: code_adjacent_possible
  data_class_ceiling: workspace_metadata
  secret_class_ceiling: no_secret_material
  open_format_claims:
    - pprof_profile

analysis_limits:
  truncation_class: not_truncated
  sampling_class: provider_sampled
  downscope_class: provider_projection_downscoped
  unavailable_source_class: all_sources_available
  sample_rate: 0.25
  dropped_event_count: null
  limitation_reason_refs:
    - sampling.remote_agent.provider_budget
    - provider_projection.remote_agent.summary_window
  export_disclosure_note: >
    Export preserves provider_sampled at 0.25 sample rate and marks the
    comparison as advisory because the baseline was full-fidelity local
    evidence.

parity_matrix:
  - execution_location_class: local_desktop
    control_posture_class: observational_timeline_only
    allowed_verbs:
      - inspect_timeline
      - scrub_timeline
      - export_bookmark
    disabled_verbs:
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      Local desktop can inspect sampled remote evidence but cannot
      recover unsampled events or control the remote runtime.
  - execution_location_class: remote_workspace
    control_posture_class: read_only_replay_safe
    allowed_verbs:
      - inspect_timeline
      - scrub_timeline
      - export_bookmark
      - share_read_only_session
    disabled_verbs:
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - restart_with_recording
    parity_note: >
      Remote backend supports read-only timeline review for retained
      sampled evidence.
  - execution_location_class: ci_imported
    control_posture_class: observational_timeline_only
    allowed_verbs:
      - inspect_timeline
      - export_bookmark
    disabled_verbs:
      - scrub_timeline
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      CI may compare the summary only when sampling is preserved as a
      named difference.
  - execution_location_class: managed_trace
    control_posture_class: observational_timeline_only
    allowed_verbs:
      - inspect_timeline
      - export_bookmark
    disabled_verbs:
      - scrub_timeline
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      Managed trace projection is observational unless the provider
      advertises a matching replay backend.

comparison_class:
  comparison_class_schema_version: 1
  record_kind: replay_comparison_class_record
  comparison_class_id: comparison.remote_sampled.scheduler_waits.named_differences
  comparison_class: comparable_with_named_differences
  candidate_bundle_ref: trace_bundle.remote_sampled.scheduler_waits
  baseline_bundle_ref: trace_bundle.local_full.scheduler_waits
  required_ui_label: Comparable with named differences
  required_export_wording: "Comparable with declared differences; review listed axes before treating deltas as regressions."
  claim_posture_class: advisory_delta_only
  named_difference_axes:
    - sampling
    - execution_location
    - hardware_profile
    - power_posture
  comparison_denial_reasons: []
  import_context:
    source_system_ref: null
    import_receipt_ref: null
    imported_at: null
    refresh_posture_class: not_imported

artifact_refs:
  raw_trace_refs:
    - raw_trace.remote_sampled.scheduler_waits
  summary_artifact_refs:
    - summary.remote_sampled.scheduler_waits
  replay_sidecar_refs: []
  digest_refs:
    - digest.trace_bundle.remote_sampled.scheduler_waits.sha256
  support_bundle_refs:
    - support_bundle_ref.remote_sampled.scheduler_waits
  review_packet_refs:
    - review_packet.remote_sampled.scheduler_waits
  release_evidence_refs: []
