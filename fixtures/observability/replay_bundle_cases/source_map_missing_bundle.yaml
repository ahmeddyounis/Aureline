# yaml-language-server: $schema=../../../schemas/observability/trace_bundle.schema.json
__fixture__:
  name: source_map_missing_bundle
  scenario: >
    Instrumented web trace whose source-map bundle is absent. The trace
    remains inspectable as artifact-level evidence, but source-level
    comparison and regression claims are blocked.

trace_bundle_schema_version: 1
record_kind: trace_bundle_record
trace_bundle_id: trace_bundle.web_trace.source_map_missing
title: Web trace with missing source map

bundle_identity:
  bundle_uid: trace_bundle.web_trace.source_map_missing
  bundle_digest_ref: digest.trace_bundle.web_trace.source_map_missing.sha256
  bundle_format_profile: trace_bundle_format.aureline.v1
  producer_ref: producer.local_web_trace_adapter
  created_at: "2026-04-29T11:05:00Z"
  source_capture_session_ref: capture_session.web_trace.checkout_route
  schema_ref: schemas/observability/trace_bundle.schema.json

capture_scope:
  capture_mode_class: instrumented_trace
  source_class: local_process
  collection_mode_class: offline_replay
  workload_ref: workload.web_checkout_route
  corpus_ref: corpus.reference_web_medium
  capture_window:
    time_basis_class: event_time
    started_at: "2026-04-29T11:00:00Z"
    ended_at: "2026-04-29T11:01:45Z"
    duration_ms: 105000
  capture_backend_family_ref: backend.chrome_trace_adapter.v1
  capture_clock_class: monotonic_single_host
  downscope_reason_refs:
    - missing_source_map.web_checkout_bundle

build_context_identity:
  exact_build_identity_ref: exact_build.web_checkout.20260429
  build_id: build.web_checkout.991122
  source_revision_ref: git.revision.web_checkout.991122
  build_mode: release
  execution_context_id: execution_context.web_checkout.local
  target_ref: target.web.preview.checkout_route
  workspace_ref: workspace.reference_web
  workset_ref: workset.web_checkout
  runtime_ref: runtime.node.web_preview
  toolchain_ref: toolchain.node.locked
  environment_fingerprint_ref: environment.web_preview.local_001
  hardware_profile_ref: hardware.reference_macos_arm64
  power_posture_ref: power.ac_nominal
  local_remote_class: local_desktop

symbol_source_linkage:
  symbol_manifest_ref: null
  symbol_linkage_state: symbols_not_applicable
  source_map_manifest_ref: null
  source_map_linkage_state: source_map_missing
  mapping_quality_class: artifact_only
  unavailable_source_disclosures:
    - disclosure_class: source_map_missing
      artifact_ref: artifact.web_checkout.minified_bundle
      required_wording: >
        Source map is missing; Aureline can inspect minified trace
        events but must not claim source-level flamegraph or regression
        attribution.

retention_export_posture:
  record_class_ref: record_class.performance_capture_evidence
  retention_class: local_hot_cache
  retained_until: "2026-05-06T00:00:00Z"
  redaction_profile_ref: redaction.performance.web_trace
  summary_export_posture: manifest_with_digests
  raw_export_posture: local_only_raw
  sensitive_content_class: code_adjacent_possible
  data_class_ceiling: workspace_metadata
  secret_class_ceiling: no_secret_material
  open_format_claims:
    - chrome_trace_json

analysis_limits:
  truncation_class: not_truncated
  sampling_class: not_sampled
  downscope_class: source_unavailable_downscoped
  unavailable_source_class: source_maps_unavailable
  sample_rate: null
  dropped_event_count: 0
  limitation_reason_refs:
    - missing_source_map.web_checkout_bundle
  export_disclosure_note: >
    Export preserves the missing-source-map disclosure and blocks
    source-level comparison claims.

parity_matrix:
  - execution_location_class: local_desktop
    control_posture_class: observational_timeline_only
    allowed_verbs:
      - inspect_timeline
      - scrub_timeline
      - export_bookmark
    disabled_verbs:
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      Local view can inspect the trace timeline, but source navigation is
      artifact-only until the source map is resolved.
  - execution_location_class: remote_workspace
    control_posture_class: metadata_only
    allowed_verbs:
      - inspect_timeline
      - export_bookmark
    disabled_verbs:
      - scrub_timeline
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      Remote consumers receive metadata and the missing-map disclosure.
  - execution_location_class: ci_imported
    control_posture_class: observational_timeline_only
    allowed_verbs:
      - inspect_timeline
      - export_bookmark
    disabled_verbs:
      - scrub_timeline
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      CI comparison is blocked for source-level claims because source-map
      linkage is missing.
  - execution_location_class: managed_trace
    control_posture_class: metadata_only
    allowed_verbs:
      - inspect_timeline
      - export_bookmark
    disabled_verbs:
      - scrub_timeline
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      Managed projection remains metadata-only until a verified source
      map is attached.

comparison_class:
  comparison_class_schema_version: 1
  record_kind: replay_comparison_class_record
  comparison_class_id: comparison.web_trace.source_map_missing.blocked
  comparison_class: not_comparable
  candidate_bundle_ref: trace_bundle.web_trace.source_map_missing
  baseline_bundle_ref: trace_bundle.web_trace.exact_source_map_baseline
  required_ui_label: Not comparable
  required_export_wording: "Not comparable; Aureline may show bundles side by side but must not compute or publish regression claims."
  claim_posture_class: no_claim_allowed
  named_difference_axes: []
  comparison_denial_reasons:
    - missing_source_map
  import_context:
    source_system_ref: null
    import_receipt_ref: null
    imported_at: null
    refresh_posture_class: not_imported

artifact_refs:
  raw_trace_refs:
    - raw_trace.web_checkout.chrome_trace
  summary_artifact_refs:
    - summary.web_checkout.trace_manifest
  replay_sidecar_refs: []
  digest_refs:
    - digest.trace_bundle.web_trace.source_map_missing.sha256
  support_bundle_refs:
    - support_bundle_ref.web_checkout.source_map_missing
  review_packet_refs:
    - review_packet.web_checkout.source_map_missing
  release_evidence_refs: []

