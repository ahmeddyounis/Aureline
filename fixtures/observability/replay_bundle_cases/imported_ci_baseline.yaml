  raw_export_posture: admin_policy_required
  sensitive_content_class: metadata_only
  data_class_ceiling: workspace_metadata
  secret_class_ceiling: no_secret_material
  open_format_claims:
    - perfetto_trace

analysis_limits:
  truncation_class: not_truncated
  sampling_class: not_sampled
  downscope_class: not_downscoped
  unavailable_source_class: all_sources_available
  sample_rate: null
  dropped_event_count: 0
  limitation_reason_refs:
    - import_receipt.ci.startup_latency.1842
  export_disclosure_note: >
    Export preserves the CI import receipt and benchmark-lane refs; it
    does not claim a live CI refresh path.

parity_matrix:
  - execution_location_class: local_desktop
    control_posture_class: observational_timeline_only
    allowed_verbs:
      - inspect_timeline
      - scrub_timeline
      - export_bookmark
    disabled_verbs:
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      Local desktop can inspect and compare the imported baseline but
      cannot replay CI-owned execution.
  - execution_location_class: remote_workspace
    control_posture_class: observational_timeline_only
    allowed_verbs:
      - inspect_timeline
      - export_bookmark
    disabled_verbs:
      - scrub_timeline
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      Remote workspaces see the imported baseline as read-only evidence.
  - execution_location_class: ci_imported
    control_posture_class: observational_timeline_only
    allowed_verbs:
      - inspect_timeline
      - scrub_timeline
      - export_bookmark
    disabled_verbs:
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      CI-imported context can compare against the imported baseline by
      receipt, but live replay controls remain unavailable.
  - execution_location_class: managed_trace
    control_posture_class: metadata_only
    allowed_verbs:
      - inspect_timeline
      - export_bookmark
    disabled_verbs:
      - scrub_timeline
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      Managed views receive the manifest and import receipt only unless
      a managed archive promotion occurs.

