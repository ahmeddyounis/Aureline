# yaml-language-server: $schema=../../../schemas/observability/trace_bundle.schema.json
__fixture__:
  name: exact_local_replay
  scenario: >
    Local record/replay capture with exact build, data, environment,
    hardware, symbols, and source maps matching the comparator. Local
    replay controls are safe; non-local contexts are read-only or
    observational.

trace_bundle_schema_version: 1
record_kind: trace_bundle_record
trace_bundle_id: trace_bundle.local_replay.checkout_hot_path
title: Exact local replay for checkout hot path

bundle_identity:
  bundle_uid: trace_bundle.local_replay.checkout_hot_path
  bundle_digest_ref: digest.trace_bundle.local_replay.checkout_hot_path.sha256
  bundle_format_profile: trace_bundle_format.aureline.v1
  producer_ref: producer.local_profiler.aureline_desktop
  created_at: "2026-04-29T10:15:00Z"
  source_capture_session_ref: capture_session.local_replay.checkout_hot_path
  schema_ref: schemas/observability/trace_bundle.schema.json

capture_scope:
  capture_mode_class: recorded_replay
  source_class: local_process
  collection_mode_class: offline_replay
  workload_ref: workload.checkout_hot_path
  corpus_ref: corpus.reference_backend_medium
  capture_window:
    time_basis_class: event_time
    started_at: "2026-04-29T10:10:00Z"
    ended_at: "2026-04-29T10:12:30Z"
    duration_ms: 150000
  capture_backend_family_ref: backend.rr_native_linux.v1
  capture_clock_class: monotonic_single_host
  downscope_reason_refs: []

build_context_identity:
  exact_build_identity_ref: exact_build.local.checkout_hot_path.20260429
  build_id: build.local.checkout_hot_path.778899
  source_revision_ref: git.revision.checkout_hot_path.778899
  build_mode: release
  execution_context_id: execution_context.local.checkout_hot_path
  target_ref: target.process.checkout_service
  workspace_ref: workspace.reference_backend
  workset_ref: workset.checkout_hot_path
  runtime_ref: runtime.linux.x86_64.native
  toolchain_ref: toolchain.rust.stable.20260429
  environment_fingerprint_ref: environment.local_linux_exact_001
  hardware_profile_ref: hardware.reference_linux_x86_64
  power_posture_ref: power.ac_nominal
  local_remote_class: local_desktop

symbol_source_linkage:
  symbol_manifest_ref: symbols.checkout_hot_path.778899
  symbol_linkage_state: exact_symbols
  source_map_manifest_ref: sourcemap.checkout_hot_path.778899
  source_map_linkage_state: exact_source_map
  mapping_quality_class: exact_match
  unavailable_source_disclosures: []

retention_export_posture:
  record_class_ref: record_class.performance_capture_evidence
  retention_class: pinned_local_evidence
  retained_until: null
  redaction_profile_ref: redaction.performance.local_replay
  summary_export_posture: manifest_with_digests
  raw_export_posture: local_only_raw
  sensitive_content_class: user_content_possible
  data_class_ceiling: user_content_possible
  secret_class_ceiling: secret_names_possible
  open_format_claims:
    - documented_aureline_json

analysis_limits:
  truncation_class: not_truncated
  sampling_class: not_sampled
  downscope_class: not_downscoped
  unavailable_source_class: all_sources_available
  sample_rate: null
  dropped_event_count: 0
  limitation_reason_refs: []
  export_disclosure_note: >
    Replay export includes chronology metadata and digest refs; raw
    sidecar bytes remain local-only unless explicitly attached.

parity_matrix:
  - execution_location_class: local_desktop
    control_posture_class: interactive_replay_safe
    allowed_verbs:
      - inspect_timeline
      - scrub_timeline
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - export_bookmark
      - share_read_only_session
      - restart_with_recording
    disabled_verbs: []
    parity_note: >
      Local backend, build, symbols, source map, and environment match;
      interactive replay controls are safe under local policy.
  - execution_location_class: remote_workspace
    control_posture_class: read_only_replay_safe
    allowed_verbs:
      - inspect_timeline
      - scrub_timeline
      - export_bookmark
      - share_read_only_session
    disabled_verbs:
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_memory
      - restart_with_recording
    parity_note: >
      Remote consumers can inspect the retained replay by reference but
      cannot take live control of the original local process.
  - execution_location_class: ci_imported
    control_posture_class: observational_timeline_only
    allowed_verbs:
      - inspect_timeline
      - export_bookmark
    disabled_verbs:
      - scrub_timeline
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      CI views are observational only because the capture was not
      produced by a CI replay backend.
  - execution_location_class: managed_trace
    control_posture_class: metadata_only
    allowed_verbs:
      - inspect_timeline
      - export_bookmark
    disabled_verbs:
      - scrub_timeline
      - step_forward
      - reverse_step
      - reverse_continue
      - inspect_frame
      - inspect_memory
      - share_read_only_session
      - restart_with_recording
    parity_note: >
      Managed providers receive manifest and digest metadata only unless
      raw replay promotion is approved separately.

comparison_class:
  comparison_class_schema_version: 1
  record_kind: replay_comparison_class_record
  comparison_class_id: comparison.local_replay.checkout_hot_path.exact
  comparison_class: exact_same_code_data_env_hardware
  candidate_bundle_ref: trace_bundle.local_replay.checkout_hot_path
  baseline_bundle_ref: trace_bundle.local_replay.checkout_hot_path.baseline
  required_ui_label: Exact same code, data, environment, and hardware
  required_export_wording: "Compared against an exact-match bundle: code, data, environment, hardware, build, runtime, capture backend, redaction, and capture mode match."
  claim_posture_class: blocking_regression_allowed
  named_difference_axes: []
  comparison_denial_reasons: []
  import_context:
    source_system_ref: null
    import_receipt_ref: null
    imported_at: null
    refresh_posture_class: not_imported

artifact_refs:
  raw_trace_refs:
    - raw_trace.local_replay.checkout_hot_path
  summary_artifact_refs:
    - summary.replay_manifest.checkout_hot_path
  replay_sidecar_refs:
    - replay_sidecar.checkout_hot_path.rr
  digest_refs:
    - digest.trace_bundle.local_replay.checkout_hot_path.sha256
    - digest.replay_sidecar.checkout_hot_path.sha256
  support_bundle_refs: []
  review_packet_refs:
    - review_packet.performance.checkout_hot_path
  release_evidence_refs:
    - release_evidence.performance.checkout_hot_path

