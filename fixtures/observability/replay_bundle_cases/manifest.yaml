schema_version: 1
manifest_id: aureline.observability.replay_bundle_cases
contract_doc_ref: docs/observability/replay_and_trace_bundle_contract.md
trace_bundle_schema_ref: schemas/observability/trace_bundle.schema.json
comparison_class_schema_ref: schemas/observability/replay_comparison_class.schema.json

cases:
  - case_id: observability.replay_bundle.exact_local_replay
    file: exact_local_replay.yaml
    schema_ref: schemas/observability/trace_bundle.schema.json
    exercises:
      - exact_same_code_data_env_hardware
      - recorded_replay
      - interactive_replay_safe
      - all_sources_available
  - case_id: observability.replay_bundle.imported_ci_baseline
    file: imported_ci_baseline.yaml
    schema_ref: schemas/observability/trace_bundle.schema.json
    exercises:
      - imported_external_baseline
      - ci_baseline_import
      - ci_imported_observational_only
      - import_receipt_only
  - case_id: observability.replay_bundle.source_map_missing
    file: source_map_missing_bundle.yaml
    schema_ref: schemas/observability/trace_bundle.schema.json
    exercises:
      - not_comparable
      - source_map_missing
      - source_maps_unavailable
      - source_level_claim_blocked
  - case_id: observability.replay_bundle.sampled_trace_limited_comparability
    file: sampled_trace_limited_comparability.yaml
    schema_ref: schemas/observability/trace_bundle.schema.json
    exercises:
      - comparable_with_named_differences
      - provider_sampled
      - remote_agent
      - advisory_delta_only

