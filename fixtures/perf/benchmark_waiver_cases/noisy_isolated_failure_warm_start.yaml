__fixture__:
  name: noisy_isolated_failure_warm_start
  scenario: >
    The latest qualifying run on ff.warm_start_to_first_paint reported
    a release-floor breach on the macOS reference-laptop envelope, but
    the rolling P14D baseline window shows a high coefficient of
    variation with no consistent direction — the breach is an isolated
    noisy failure rather than chronic drift. Demonstrates the
    distinction the dashboard MUST keep between chronic drift and
    isolated noisy failures: dashboard_row_state_class =
    drift_breaches_release_floor_no_waiver, drift_direction_class =
    noisy_high_variance, noise_class = high_noise_isolated_failure,
    correction_trigger_class = correction_owed_lane_dri (rebaseline
    inspection), recurrence_window_class = first_observation_in_window
    (the noisy failure is not yet a recurrence). A surface that
    collapses this row into a "recurring" chip is non-conforming.
  contract_sections:
    - "§5 Current-state vocabulary"
    - "§7 Drift-triage envelope"
    - "§8 Recurrence envelope"
    - "§9 Correction-trigger envelope"

