__fixture__:
  name: expired_waiver_correction_owed_first_paint
  scenario: >
    A performance-council waiver covered a release-floor breach on
    ff.first_paint on the macOS reference-laptop envelope; the waiver
    expired 2026-04-26 (four days before the evaluation timestamp
    2026-04-30) without renewal. Demonstrates the expired-waiver row
    shape: dashboard_row_state_class =
    drift_breaches_release_floor_expired_waiver, expiry_proximity_class
    = expired_past_due, mitigation_status_class =
    mitigation_blocked_pending_decision, correction_trigger_class =
    correction_owed_decision_forum, correction_owner_role_class =
    performance_council. The dashboard row MUST render on every
    consuming surface; an expired waiver cannot ride into release /
    claim publication while being filed away from the dashboard.
  contract_sections:
    - "§5 Current-state vocabulary"
    - "§6 Waiver envelope"
    - "§9 Correction-trigger envelope"
    - "§12 Review-cycle export parity"

