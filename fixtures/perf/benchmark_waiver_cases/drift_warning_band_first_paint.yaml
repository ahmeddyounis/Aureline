  scenario: >
    First-paint p95 has drifted into the warning band over the rolling
    P14D baseline window on the macOS reference-laptop envelope. No
    active waiver; the protected metric is still inside the warning
    band but trending toward the failure band. Demonstrates the
    drift-inside-warning-band row shape: dashboard_row_state_class =
    drift_inside_warning_band_no_waiver, drift_direction_class =
    regressing, noise_class = low_noise_chronic_drift,
    compare_result_class = drift_within_warning_band. The early-signal
    posture surfaces the chronic-drift cluster before a release-floor
    breach lands; correction work is owed by the lane DRI.
  contract_sections:
    - "§5 Current-state vocabulary"
    - "§7 Drift-triage envelope"
    - "§8 Recurrence envelope"
    - "§9 Correction-trigger envelope"

