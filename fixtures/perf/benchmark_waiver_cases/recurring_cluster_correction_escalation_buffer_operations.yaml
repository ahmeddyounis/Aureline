__fixture__:
  name: recurring_cluster_correction_escalation_buffer_operations
  scenario: >
    ff.buffer_operations has now recorded a fourth release-floor
    breach on the macOS reference-laptop envelope across three
    distinct release lines (foundations stable_2_0, foundations
    preview, and the lts_1_0 backport). Demonstrates the recurring-
    cluster row shape: dashboard_row_state_class =
    drift_breaches_release_floor_active_waiver, recurrence_window_class
    = recurring_across_release_lines, recurrence_count = 4,
    recurring_waiver_cluster_class = recurring_across_quarters,
    repeated_protected_path_regression_class =
    repeated_protected_path_across_release_lines,
    correction_trigger_class = correction_owed_release_council,
    correction_owner_role_class = release_council. The schema's
    allOf block forces release-council escalation when the recurrence
    spans release lines.
  contract_sections:
    - "§5 Current-state vocabulary"
    - "§8 Recurrence envelope"
    - "§9 Correction-trigger envelope"
    - "§12 Review-cycle export parity"

