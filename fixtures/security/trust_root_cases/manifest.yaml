schema_version: 1
contract_ref: docs/security/trust_root_rotation_rehearsal.md

rules:
  - Fixtures are rehearsal-grade, reviewable scenarios; raw key bytes never appear.
  - Each fixture preserves the local-first boundary: local editing continues.
  - Each fixture must have an explicit block/degrade/continue posture.

cases:
  - fixture: signer_compromise_revocation_continuity_broken.yaml
    record_kind: revocation_record
    schema_ref: schemas/security/emergency_action_record.schema.json
    covers:
      - signer_compromise_continuity_broken
      - revocation_blocks_new_trust_bearing_actions_not_local_work
  - fixture: mirror_root_mismatch_blocks_mirror_only_paths.yaml
    record_kind: key_hierarchy_case_record
    schema_ref: schemas/security/key_state.schema.json
    covers:
      - mirror_root_mismatch_requires_recheck
      - mirror_only_profiles_do_not_fall_back
  - fixture: policy_root_rollback_attempt_blocks_policy_distribution.yaml
    record_kind: key_hierarchy_case_record
    schema_ref: schemas/security/key_state.schema.json
    covers:
      - policy_root_rollback_or_mismatch_blocks_widening_policy
      - last_known_good_policy_retained_with_label
  - fixture: customer_managed_key_outage_scoped_to_managed_data.yaml
    record_kind: key_hierarchy_case_record
    schema_ref: schemas/security/key_state.schema.json
    covers:
      - customer_managed_key_outage_scoped
      - ciphertext_and_metadata_exports_still_admissible
  - fixture: offline_rotation_recovery_requires_successor_import.yaml
    record_kind: key_hierarchy_case_record
    schema_ref: schemas/security/key_state.schema.json
    covers:
      - offline_rotation_requires_manual_import_successor
      - offline_continuity_honesty_unknown_offline_allowed

