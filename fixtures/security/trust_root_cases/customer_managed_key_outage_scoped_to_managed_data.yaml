__fixture__:
  name: customer_managed_key_outage_scoped_to_managed_data
  scenario: >
    Customer-managed managed-data keys are unreachable. Protected managed-data
    families fail closed, but local editing and local exports remain available.
    Ciphertext/metadata-only exports remain admissible when plaintext export is
    blocked.
  contract_sections:
    - Customer-managed key behavior (promises)
    - Tenant-scoped envelope encryption (managed data)
    - Local-first degradation rules

record_kind: key_hierarchy_case_record
key_schema_version: 1
case_id: key_hierarchy_case.customer_managed_key_outage_scoped
title: Customer-managed key outage blocks protected managed data only; local work continues
scenario: >
  Customer-managed KMS path unreachable; decrypting protected managed data fails
  closed. Local editing continues; exports remain honest about ciphertext vs.
  plaintext availability.

key_states:
  - record_kind: key_state_record
    key_schema_version: 1
    record_id: key_state.tenant_org_managed_data_keys.customer_unreachable
    key_scope: tenant_org_managed_data_keys
    key_mode: customer_managed
    key_ref: key.ref.tenant.kek.primary
    key_epoch: epoch.0008
    key_state_class: customer_managed_unreachable
    key_state_summary: >
      Customer-managed KMS/HSM path unreachable; protected managed-data actions
      block until explicit recheck completes.
    rotation_planned_at: null
    rotation_started_at: null
    rotation_completed_at: null
    local_editing_continues: true
    affected_action_families:
      - sync_action_family
      - policy_distribution_action_family
      - ai_evidence_retention_action_family
      - offboarding_export_action_family
      - support_export_action_family
    fail_posture: boundary_recheck_required
    notes:
      - Ciphertext and metadata-only exports remain admissible; plaintext export is blocked.

continuity_summary:
  local_editing_continues: true
  retained_local_safe_capabilities:
    - Continue local edit, save, undo, search, Git, and local tooling.
    - Inspect cached managed state as metadata-only records where available.
  blocked_or_degraded_capabilities:
    - Managed sync pauses until key reachability returns.
    - Policy distribution pauses if decrypting the newest bundle is required.
    - Plaintext offboarding export of protected managed data is blocked.

narrative_refs:
