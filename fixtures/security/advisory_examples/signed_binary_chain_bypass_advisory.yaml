advisory_subject_kind: build_binary

severity_class: security_severity.critical

title: >
  Signed-artifact chain: signature verification bypass on the stable Linux IDE binary
summary: >
  A verification-path flaw in the signed-artifact chain permitted a
  forged signature to verify against a legitimate release public key
  on the seeded stable Linux IDE binary. Exploitation required
  local update-cache write, no elevation, and was reachable on
  mirror-managed installs; the signing-material state remained
  signed_verified for the legitimate build.

affected_subjects:
  - subject_kind: build_binary
    subject_id: build-id:aureline:stable:0.7.3:x86_64-unknown-linux-gnu:release:a4d1c3f0e27b
    note: Seeded stable Linux IDE binary exact-build identity observed with verification bypass.
  - subject_kind: signing_material
    subject_id: signing_authority.release_hardware_key_sign.aureline.stable
    note: Verification path, not the signing key itself; signing material is not compromised.

