schema_version: 1
contract_ref: docs/security/emergency_disable_bundle_contract.md
disable_bundle_schema_ref: schemas/security/emergency_disable_bundle.schema.json
local_continuity_card_schema_ref: schemas/security/local_continuity_card.schema.json

rules:
  - Emergency disable bundles are narrow-only and remain inspectable after expiry or supersedence.
  - Precedence stays explicit: emergency disable is the highest ratchet layer and cannot be cleared by local override.
  - Mirror/manual/offline paths preserve freshness and validation vocabulary; they do not pretend to be live-authoritative.
  - Continuity cards must state retained and blocked capabilities plus the next safe recovery action.

cases:
  - fixture: extension_disable_bundle.yaml
    record_kind: emergency_disable_bundle_record
    schema_ref: schemas/security/emergency_disable_bundle.schema.json
    covers:
      - extension_force_disable
      - signed_emergency_bundle_trigger
      - mirror_and_manual_distribution_rows
      - follow_up_requires_successor
  - fixture: provider_route_disable_bundle.yaml
    record_kind: emergency_disable_bundle_record
    schema_ref: schemas/security/emergency_disable_bundle.schema.json
    covers:
      - provider_route_disable
      - minimum_required_version_guidance
  - fixture: channel_freeze_bundle.yaml
    record_kind: emergency_disable_bundle_record
    schema_ref: schemas/security/emergency_disable_bundle.schema.json
    covers:
      - channel_freeze_action
      - emergency_action_linkage_follow_up
  - fixture: mirror_imported_disable_bundle.yaml
    record_kind: emergency_disable_bundle_record
    schema_ref: schemas/security/emergency_disable_bundle.schema.json
    covers:
      - mirror_imported_snapshot_trigger
      - mirrored_stale_past_grace_labels
  - fixture: expired_disable_bundle.yaml
    record_kind: emergency_disable_bundle_record
    schema_ref: schemas/security/emergency_disable_bundle.schema.json
    covers:
      - record_state_expired
      - durable_inspectability_after_expiry
  - fixture: local_continuity_card_signed_bundle.yaml
    record_kind: local_continuity_card_record
    schema_ref: schemas/security/local_continuity_card.schema.json
    covers:
      - continuity_card_from_signed_bundle
      - next_safe_path_import_snapshot
  - fixture: local_continuity_card_admin_override.yaml
    record_kind: local_continuity_card_record
    schema_ref: schemas/security/local_continuity_card.schema.json
    covers:
      - continuity_card_from_admin_override
      - next_safe_path_clear_override

