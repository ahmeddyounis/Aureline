schema_version: 1
contract_ref: docs/security/advisory_history_and_resolution_contract.md
timeline_schema_ref: schemas/security/advisory_timeline_entry.schema.json

rules:
  - Every case is one advisory_history_timeline_record validated by the cited schema.
  - Resolved/superseded/withdrawn advisories remain inspectable; silent disappearance is forbidden.
  - Timeline entries declare per-surface retention so product, docs, and exports do not drift.
  - Mirror/offline projections disclose stale or partial history rather than implying completeness.
  - Records carry opaque refs and reviewable summaries; raw exploit payloads, raw reporter identities, raw hostnames, raw paths, private registry URLs, raw signatures, and secret material do not appear.

cases:
  - fixture: active_emergency_action_timeline.yaml
    record_kind: advisory_history_timeline_record
    schema_ref: schemas/security/advisory_timeline_entry.schema.json
    covers:
      - active_emergency_history
      - current_mitigation_linkage
      - emergency_state_retention
  - fixture: resolved_advisory_downgrade_timeline.yaml
    record_kind: advisory_history_timeline_record
    schema_ref: schemas/security/advisory_timeline_entry.schema.json
    covers:
      - resolved_history_downgrade
      - durable_copy_safe_ids
      - resolved_by_fixed_build_ref
  - fixture: superseded_advisory_chain_timeline.yaml
    record_kind: advisory_history_timeline_record
    schema_ref: schemas/security/advisory_timeline_entry.schema.json
    covers:
      - bidirectional_supersedence
      - superseded_history_retained
  - fixture: mirror_stale_history_view_timeline.yaml
    record_kind: advisory_history_timeline_record
    schema_ref: schemas/security/advisory_timeline_entry.schema.json
    covers:
      - mirror_stale_disclosure
      - partial_history_completeness

