# yaml-language-server: $schema=../../../schemas/security/secret_class_rows.schema.json
__fixture__:
  name: degraded_session_only_fallback
  scenario: >
    The OS keychain is unavailable (libsecret service crashed on a
    Linux host). The broker transitions to session_memory_cache with
    unlock_state = degraded_session_only. Affected classes include
    ai_provider_token, code_host_token, package_registry_token,
    database_credential, and provider_session is explicitly NOT
    affected (provider_session is forbidden from the session-only
    fallback and remains unavailable until the store recovers).
    signing_key_material is NOT in affected_secret_classes because
    signing-class secrets MUST NOT be served from session-only
    fallback at all. The broker emits secret_trust_store_degraded,
    shows a visible non-dismissable surface badge, and forces a
    re-prompt on the next process start; nothing is written to a
    plaintext file.
  adr_section: "Trust-store classes (frozen) - plaintext fallback is not acceptable"
  exercised_classes_summary:
    secret_classes:
      - ai_provider_token
      - code_host_token
      - package_registry_token
      - database_credential
    trust_store_classes:
      - os_keychain
      - session_memory_cache
    unlock_states:
      - degraded_session_only
      - unavailable
    projection_modes: []
    denial_reasons:
      - session_fallback_class_forbidden
    audit_event_ids:
      - secret_trust_store_degraded
      - secret_denial

record_kind: trust_store_posture_record
secret_schema_version: 1
active_trust_store_class: session_memory_cache
unlock_state: degraded_session_only
session_memory_cache_in_use: true
degraded_since: "mono-2026041912-000001"
affected_secret_classes:
  - ai_provider_token
  - code_host_token
  - package_registry_token
  - database_credential
notes:
  - >
    OS keychain (libsecret) unreachable on the current host. The
    broker is running in session_memory_cache fallback; the surface
    shows a visible non-dismissable badge and a re-prompt is
    required on the next process start. Nothing is written to a
    plaintext file.
  - >
    signing_key_material is not in affected_secret_classes because
    signing-class secrets MUST NOT be served from session-only
    fallback; any signing-class request fails closed with
    session_fallback_class_forbidden.
  - >
    provider_session is not in affected_secret_classes because the
    session-only fallback is forbidden for provider_session; refresh
    flows remain unavailable until the persistent store recovers.
  - >
    On recovery the broker transitions to secret_trust_store_recovered;
    it does not silently upgrade the in-memory cache to persistent
    storage. Users re-prompt for each class on their next use.
