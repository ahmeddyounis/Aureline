  owner_class: release_council
  post_incident_review_refs:
    - post_incident_review.freeze.stable_channel.2026-04-24
  follow_up_support_packet_refs:
    - support_bundle.remote_connector_loss.local_first
  resume_condition_note: >
    Stable-channel publication remains frozen until a signed superseding
    action references the recovered exact-build set and the
    post-incident review closes with a resume decision.

enforcement_details:
  affected_capability_refs:
    - capability.auto_update.stable_channel
    - capability.release_promote.stable_channel
  affected_channel_refs:
