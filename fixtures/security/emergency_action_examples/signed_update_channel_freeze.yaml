# yaml-language-server: $schema=../../../schemas/security/emergency_action_record.schema.json
__fixture__:
  name: signed_update_channel_freeze
  scenario: >
    Worked emergency_action_record showing a stable-channel freeze after a
    signed-update compromise investigation. The record ties the freeze to
    the same seeded exact-build identity, install-profile cards, advisory
    id, and incident packet refs already used by the advisory fixtures.
    It also carries live, mirrored, manual-imported, and runtime-preload
    distribution rows so connected, mirrored, and air-gapped profiles can
    inspect the same action without inventing new surface-local fields.
  contract_sections:
    - "Severity and notice state"
    - "Distribution state"
    - "Local continuity"
    - "Surface-consumption rules"
    - "History and reconciliation"

emergency_action_schema_version: 1
record_kind: emergency_action_record

action_id: emergency_action.AURELINE-ACT-2026-0001
action_kind: channel_freeze

severity_class: security_severity.operational_emergency
surface_notice_class: emergency_action_required
reason_class: active_signed_artifact_compromise
urgency_class: immediate
enforcement_posture_class: channel_frozen
record_state: active

title: >
  Stable update channel frozen pending signed-update recovery
summary: >
  Aureline froze the stable update channel while the signed-update
  compromise investigation is active. Existing authenticated binaries
  keep local editing continuity, but update fetch and promote paths stay
  blocked until a superseding recovery action and post-incident review
  land.

affected_subjects:
  - subject_kind: release_channel
    subject_id: release-channel:stable
    note: Stable desktop and CLI update publication is frozen.
  - subject_kind: build_binary
    subject_id: build-id:aureline:stable:0.7.3:x86_64-unknown-linux-gnu:release:a4d1c3f0e27b
    note: Existing seeded stable Linux IDE binary remains locally runnable but must not auto-update.
  - subject_kind: install_profile_card
    subject_id: card.linux.x86_64.customer_managed_mirror.stable
    note: Mirror-managed stable installs must hold update publication until a superseding action lands.

affected_install_linkage:
  install_profile_card_refs:
    - card.linux.x86_64.per_user_installed.stable
    - card.linux.x86_64.managed_deployed.stable
    - card.linux.x86_64.customer_managed_mirror.stable
    - card.air_gap_bundle_target.platform_native_any.offline_bundle.stable
  exact_build_identity_refs:
    - build-id:aureline:stable:0.7.3:x86_64-unknown-linux-gnu:release:a4d1c3f0e27b
  channel_classes:
    - stable
  publication_posture_classes:
    - online_vendor
    - customer_managed_mirror
    - offline_signed_bundle
  mirror_freshness_class: stale_within_grace
  offline_expiration_at: "2026-06-01T00:00:00Z"
  local_continuity_note: >
    Existing authenticated stable installs keep local open/edit/save,
    local Git, and diagnostics continuity. Update fetch, mirror promote,
    and stable-channel publication remain paused until a superseding
    recovery action arrives.

deployment_profile_scope:
  - individual_local
  - self_hosted
  - enterprise_online
  - air_gapped

trigger_source_class: signed_emergency_bundle

signer_continuity:
  continuity_state: same_signer_chain
  current_signer_ref: signing_authority.release_hardware_key_sign.aureline.stable
  previous_signer_refs:
    - signing_authority.release_hardware_key_sign.aureline.stable
  continuity_statement_ref: advisory_record.AURELINE-ADV-2026-0001#continuity.freeze_chain
  last_verified_at: "2026-04-22T18:05:00Z"
  note: >
    Freeze metadata is signed under the current release emergency-control
    chain; no trust-root rotation is in effect for this action.

distribution_statuses:
  - distribution_id: distribution.freeze.live.0001
    source_class: authoritative_origin
    path_class: managed_pull
    freshness_class: authoritative_live
    validation_state: verified_current
    observed_signer_continuity_state: same_signer_chain
    observed_at: "2026-04-22T18:05:00Z"
    receipt_ref: receipt.freeze.live.0001
    supersedes_known_snapshot_ref: null
    note: Connected clients observed the live signed freeze metadata.
  - distribution_id: distribution.freeze.mirror.0001
    source_class: customer_managed_mirror
    path_class: mirror_sync
    freshness_class: mirrored_stale_within_grace
    validation_state: verified_but_stale
    observed_signer_continuity_state: same_signer_chain
    observed_at: "2026-04-22T18:17:00Z"
    receipt_ref: receipt.freeze.mirror_sync.0001
    supersedes_known_snapshot_ref: emergency_action_snapshot.freeze.mirror.previous
    note: >
      Customer mirror carries a verified freeze snapshot, but the mirror
      refresh is still within its grace window behind the authoritative origin.
  - distribution_id: distribution.freeze.manual.0001
    source_class: manual_import_bundle
    path_class: file_import
    freshness_class: manual_snapshot_current
    validation_state: pending_review
    observed_signer_continuity_state: same_signer_chain
    observed_at: "2026-04-22T18:30:00Z"
    receipt_ref: receipt.freeze.manual_import.0001
    supersedes_known_snapshot_ref: null
    note: >
      Air-gapped admin imported the signed freeze file locally; detached
      signature verification succeeded, but the receiving environment
      still records manual snapshot state instead of live authority.
  - distribution_id: distribution.freeze.preload.0001
    source_class: runtime_preload
    path_class: runtime_preload
    freshness_class: unknown
    validation_state: cached_without_revalidation
    observed_signer_continuity_state: same_signer_chain
    observed_at: "2026-04-22T18:32:00Z"
    receipt_ref: receipt.freeze.runtime_preload.0001
    supersedes_known_snapshot_ref: null
    note: >
      Preloaded runtime copy enables immediate bannering even before a
      network refresh completes; freshness remains explicit as unknown.

local_continuity:
  posture_class: local_continuity_narrowed
  note: >
    Local edit/search/Git/task continuity remains available, but stable
    update fetch, publication, and mirror promotion are blocked until
    the superseding recovery action arrives.
  retained_capabilities:
    - Open, edit, and save local workspaces with the current authenticated binary.
    - Use local Git, local tasks, and support export.
    - Inspect the current freeze action, advisory, and support guidance offline.
  blocked_capabilities:
    - Fetch or apply stable-channel updates.
    - Promote new stable artifacts through managed or mirrored lanes.
    - Resume the stable channel before release-council review completes.

required_actions:
  - required_action_id: required_action.freeze.end_user.pause_updates
    actor_class: end_user
    action_class: pause_updates
    blocking_class: required_to_restore_safe_updates
    deadline_semantics: immediate
    deadline_at: "2026-04-22T18:45:00Z"
    note: Disable auto-update for the current stable install until a superseding recovery action is visible.
  - required_action_id: required_action.freeze.mirror_operator.import_snapshot
    actor_class: mirror_operator
    action_class: import_signed_snapshot
    blocking_class: required_for_admin_audit
    deadline_semantics: before_channel_resume
    deadline_at: "2026-04-23T12:00:00Z"
    note: Import the signed freeze snapshot into the mirror and preserve the receipt ref in admin export/support packets.
  - required_action_id: required_action.freeze.support.export
    actor_class: local_admin
    action_class: export_support_packet
    blocking_class: recommended_only
    deadline_semantics: informational_only
    deadline_at: null
    note: Export a support packet if local continuity is narrower than the declared note or the mirror import fails verification.

