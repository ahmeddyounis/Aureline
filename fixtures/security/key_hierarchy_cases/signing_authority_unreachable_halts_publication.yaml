# yaml-language-server: $schema=../../../schemas/security/key_state.schema.json
__fixture__:
  name: signing_authority_unreachable_halts_publication
  scenario: >
    The signing authority used for release/policy publication is unreachable.
    Publication actions fail closed (no unsigned downgrade), but local editing
    and inspection of already-installed artifacts remain available.
  contract_sections:
    - Signing authority (what halts publication)
    - Outage posture for artifact signing keys

record_kind: key_hierarchy_case_record
key_schema_version: 1
case_id: key_hierarchy_case.signing_authority_unreachable
title: Signing authority unreachable; publication fails closed without downgrading trust
scenario: >
  Vendor-managed signing service is unreachable for publication. Local editing
  continues; only publish/distribution actions are blocked.

key_states:
  - record_kind: key_state_record
    key_schema_version: 1
    record_id: key_state.artifact_signing_and_release_keys.unreachable
    key_scope: artifact_signing_and_release_keys
    key_mode: vendor_managed
    key_ref: key.ref.release.signing.root
    key_epoch: epoch.0021
    key_state_class: authority_unreachable
    key_state_summary: >
      Signing service/HSM path is unreachable; publication cannot proceed until
      signing authority recovers.
    rotation_planned_at: null
    rotation_started_at: null
    rotation_completed_at: null
    local_editing_continues: true
    affected_action_families:
      - marketplace_publish_action_family
      - policy_distribution_action_family
    fail_posture: fail_closed_managed_only
    notes:
      - No unsigned artifacts are published; verification state must not be overstated.

continuity_summary:
  local_editing_continues: true
  retained_local_safe_capabilities:
    - Continue local edit, save, search, Git, and local exports.
    - Inspect already-installed artifacts, advisories, and verification state as last known.
  blocked_or_degraded_capabilities:
    - Publishing new signed artifacts (updates/policy/emergency metadata) is blocked until signing authority recovers.

narrative_refs:
  - docs/security/key_hierarchy_and_tenant_encryption_contract.md
  - docs/build/exact_build_identity_model.md
  - docs/release/channel_and_branch_contract.md

