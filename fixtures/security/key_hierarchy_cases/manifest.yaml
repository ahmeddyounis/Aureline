schema_version: 1
contract_ref: docs/security/key_hierarchy_and_tenant_encryption_contract.md
key_scope_rows_ref: artifacts/security/key_scopes.yaml
key_state_schema_ref: schemas/security/key_state.schema.json

rules:
  - Fixtures are short, reviewable scenarios; raw key bytes never appear.
  - Each fixture validates as a key_hierarchy_case_record.
  - Every fixture must preserve the local-first boundary: local editing continues.

cases:
  - fixture: tenant_managed_key_unreachable_blocks_managed_data_only.yaml
    record_kind: key_hierarchy_case_record
    schema_ref: schemas/security/key_state.schema.json
    covers:
      - managed_data_key_outage_scoped_to_managed_data
      - envelope_encryption_metadata_carries_epoch_and_scope
  - fixture: customer_managed_rotation_completed_recheck_required.yaml
    record_kind: key_hierarchy_case_record
    schema_ref: schemas/security/key_state.schema.json
    covers:
      - customer_managed_rotation_recheck_required
      - bounded_action_families_not_whole_product_outage
  - fixture: signing_authority_unreachable_halts_publication.yaml
    record_kind: key_hierarchy_case_record
    schema_ref: schemas/security/key_state.schema.json
    covers:
      - signing_authority_outage_halts_publish_only
      - installed_artifacts_remain_inspectable
  - fixture: offline_trust_root_mismatch_blocks_import.yaml
    record_kind: key_hierarchy_case_record
    schema_ref: schemas/security/key_state.schema.json
    covers:
      - offline_trust_root_mismatch_requires_recheck
      - import_fail_closed_local_work_continues
  - fixture: delegated_credential_issuer_rotation_in_progress.yaml
    record_kind: key_hierarchy_case_record
    schema_ref: schemas/security/key_state.schema.json
    covers:
      - delegated_credential_issuer_rotation_scoped_to_remote_and_gateway_actions
      - delegated_credentials_do_not_widen_refresh_secrets

