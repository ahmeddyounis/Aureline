    triage_status_class: triage_in_progress
    private_triage_workspace_scope: private_security_channel
    intake_route_class: private_github_advisory
    current_mitigation_status_class: mitigation_compensating_control_only
    compensating_control_state_class: compensating_control_applied
    break_glass_state_class: break_glass_not_invoked
    disclosure_posture_class: disclosure_posture_public_on_advisory
    redaction_posture_class: evidence_packet_only
    impacted_deployment_profile_scope:
      - self_hosted
      - enterprise_online
    affected_publication_posture_classes:
      - online_vendor
      - customer_managed_mirror

