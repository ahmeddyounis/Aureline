    Worked, pre-implementation private-triage packet for a self-hosted
    distribution finding. A reviewer finds a capability-gate bypass in
    the per-machine-installed stable IDE binary that lets a restricted
    workspace escalate to trusted execution without operator approval.
    The monitored contact path acknowledges within the high-severity
    clock, opens a private_security_channel triage, reserves an
    advisory id plus a CVE alias (GHSA not yet minted), does not
    invoke break-glass (the compensating control is a capability-gate
    narrowing shipped as a settings-only hardening), and holds the
    packet at public-on-advisory posture while the full fix is
    developed. redaction_posture stays at evidence_packet_only so
    mitigation guidance can ship embedded evidence to operators while
    the advisory is drafted.
  distribution_lane: self_hosted_on_prem
