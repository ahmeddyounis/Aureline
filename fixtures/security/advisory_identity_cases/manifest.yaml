schema_version: 1
contract_ref: docs/security/advisory_identity_and_install_assessment_contract.md
advisory_identity_schema_ref: schemas/security/advisory_identity.schema.json
affected_install_assessment_schema_ref: schemas/security/affected_install_assessment.schema.json

rules:
  - Every case is one boundary record validated by the cited schema.
  - CVE and GHSA identifiers are aliases; the Aureline advisory ID is the stable join key.
  - Copy-safe ids and local mitigation state must be exportable without browser-only resolution.
  - Resolved/superseded state stays reachable via history linkage; silent disappearance is forbidden.
  - Records carry opaque refs and reviewable summaries; raw exploit payloads, raw reporter identities, raw hostnames, raw paths, private registry URLs, raw signatures, and raw secret material do not appear.

cases:
  - fixture: active_advisory_identity.yaml
    record_kind: advisory_identity_record
    schema_ref: schemas/security/advisory_identity.schema.json
    covers:
      - active_advisory_identity
      - copy_safe_ids_available
      - public_visibility
      - stable_alias_family
  - fixture: active_advisory_install_assessment.yaml
    record_kind: affected_install_assessment_record
    schema_ref: schemas/security/affected_install_assessment.schema.json
    covers:
      - affected_install_assessment_minimum
      - mitigation_not_started
      - mirror_freshness_stale_within_grace
      - compensating_control_note
  - fixture: mirror_only_advisory_identity.yaml
    record_kind: advisory_identity_record
    schema_ref: schemas/security/advisory_identity.schema.json
    covers:
      - mirror_only_visibility
      - copy_safe_alias_slots_not_assigned
      - history_active
  - fixture: resolved_advisory_identity_with_history_linkage.yaml
    record_kind: advisory_identity_record
    schema_ref: schemas/security/advisory_identity.schema.json
    covers:
      - resolved_history_linkage
      - durable_reference_fields
      - publication_withdraw_not_required
  - fixture: emergency_disable_advisory_identity.yaml
    record_kind: advisory_identity_record
    schema_ref: schemas/security/advisory_identity.schema.json
    covers:
      - active_emergency_identity
      - emergency_action_linkage
      - revocation_linkage
      - disable_bundle_linkage
  - fixture: emergency_disable_install_assessment.yaml
    record_kind: affected_install_assessment_record
    schema_ref: schemas/security/affected_install_assessment.schema.json
    covers:
      - emergency_disable_assessment
      - mitigation_blocked_by_revocation
      - continuity_note_required

