__fixture__:
  name: active_advisory_install_assessment
  scenario: >
    Local affected-install assessment for one stable per-user Linux lane.
    The record is export-safe and explains install impact without browser dependence.
  motivates:
    - "Affected-install assessment minimum: install/build/channel + mitigation state + mirror freshness + continuity note."
    - "Fixed build or compensating control must be explainable offline."

affected_install_assessment_schema_version: 1
record_kind: affected_install_assessment_record

advisory_identity:
  aureline_advisory_id: AURELINE-ADV-2026-0001
  cve_id: CVE-2026-10001
  ghsa_id: GHSA-aaaa-bbbb-cccc
  additional_alias_refs: []

install_profile_card_ref: card.linux.x86_64.per_user_installed.stable
install_mode_class: per_user_installed
channel_class: stable

exact_build_identity_ref: build-id:aureline:stable:0.7.3:x86_64-unknown-linux-gnu:release:a4d1c3f0e27b

affected_subjects:
  - subject_kind: build_binary
    subject_id: build-id:aureline:stable:0.7.3:x86_64-unknown-linux-gnu:release:a4d1c3f0e27b
    note: Seeded stable Linux IDE binary exact-build identity observed with verification bypass.
  - subject_kind: signing_material
    subject_id: signing_authority.release_hardware_key_sign.aureline.stable
    note: Verification path, not the signing key; signing material not compromised.

