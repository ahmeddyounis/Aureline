fixed_exact_build_identity_ref: null
compensating_control_note: >
  Pause auto-update and require signed snapshot import for managed and mirrored lanes
  until a fixed build identity is promoted.

local_continuity_note: >
  Installs remain able to open, edit, and save local workspaces with the current
  authenticated binary while auto-update is paused; avoid widening network egress
  until the fixed build is verified and mirrored.

assessed_at: "2026-04-28T10:05:00Z"

