__fixture__:
  name: stable_channel_freeze_manual_import
  scenario: >
    Worked manual_import_receipt_record for the stable-channel freeze.
    An air-gapped local admin imported the signed freeze metadata via
    file_import. Detached-signature verification succeeded under the
    same signer chain; the receipt is still pending_operator_confirmation
    because the reviewing admin has not yet committed the narrow-scope
    apply. The receipt_id matches the distribution row's receipt_ref on
    the parent emergency_action_record so mirror-import and admin-export
    surfaces can resolve one stable id.
  contract_sections:
    - "Detached-signature verification contract"
    - "Metadata-chain stub"
    - "Follow-up obligations"
    - "Surface-projection rules"

