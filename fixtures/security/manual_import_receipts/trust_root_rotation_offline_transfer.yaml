manual_import_receipt_schema_version: 1
record_kind: manual_import_receipt_record

receipt_id: receipt.revocation.offline_transfer.0001
receipt_state: active
imported_record_kind: revocation_record

title: >
  Offline transfer of trust-root revocation applied on air-gapped profile
summary: >
  The org admin imported the trust-root rotation revocation onto the
  air-gapped stable profile via offline_transfer. The receiving
  environment honestly reports unknown_offline signer continuity and
  offline_snapshot_unexpired freshness. Local continuity is preserved
  per the parent revocation_record; the receipt records the active
  import_successor_trust_root obligation so the successor trust root
  is imported before any stable artifact is trusted again.

operator:
