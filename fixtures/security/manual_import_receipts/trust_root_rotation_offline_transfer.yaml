follow_up_obligations:
  - obligation_id: obligation.revocation.offline.import_successor
    obligation_class: import_successor_trust_root
    owner_class: org_admin
    deadline_semantics: before_channel_resume
    deadline_at: "2026-04-23T08:00:00Z"
    obligation_note: >
      Import and activate the successor trust root on this air-gapped
      profile before resuming stable verification or publication.
  - obligation_id: obligation.revocation.offline.pin_last_known_good
    obligation_class: pin_last_known_good_until_resolve
    owner_class: org_admin
    deadline_semantics: before_channel_resume
    deadline_at: "2026-04-23T08:00:00Z"
    obligation_note: >
      Keep the last known good authenticated bundle pinned on this
      profile until the successor root is active and the post-incident
      review records that the revoked root no longer gates local trust.
  - obligation_id: obligation.revocation.offline.schedule_review
    obligation_class: schedule_post_incident_review
    owner_class: security_trust_review
    deadline_semantics: next_admin_window
    deadline_at: "2026-04-25T17:00:00Z"
    obligation_note: >
      Post-incident review confirms every claimed air-gapped profile
      has imported the successor root and that the revoked root no
      longer gates live or imported trust.

