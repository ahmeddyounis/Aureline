schema_version: 1
contract_ref: docs/security/secret_class_matrix.md
secret_class_matrix_ref: artifacts/security/secret_classes.yaml
secret_class_schema_ref: schemas/security/secret_class_rows.schema.json

rules:
  - Fixtures are short, reviewable scenarios; raw secret bytes never appear.
  - Each fixture either validates as a secret-broker posture record or a redaction example.
  - Examples are “why focused”: they show storage authority, export posture, and denial behavior mechanically.

cases:
  - fixture: session_only_fallback.yaml
    record_kind: trust_store_posture_record
    schema_ref: schemas/security/secret_class_rows.schema.json
    covers:
      - store_unavailable_degrades_to_session_only
      - export_safe_alias_and_class_only
  - fixture: enterprise_vault_unlocked.yaml
    record_kind: trust_store_posture_record
    schema_ref: schemas/security/secret_class_rows.schema.json
    covers:
      - enterprise_vault_storage_authority
      - raw_reveal_not_implied_by_storage
  - fixture: delegated_identity_policy_injector.yaml
    record_kind: trust_store_posture_record
    schema_ref: schemas/security/secret_class_rows.schema.json
    covers:
      - delegated_identity_materialised_by_policy
      - export_is_metadata_only
  - fixture: policy_denied_raw_reveal.yaml
    record_kind: redaction_example_record
    schema_ref: schemas/security/secret_class_rows.schema.json
    covers:
      - policy_denied_projection_fails_closed
      - audit_event_emitted

