schema_version: 1
contract_ref: docs/security/manual_emergency_import_contract.md
receipt_schema_ref: schemas/security/manual_import_receipt.schema.json
metadata_chain_entry_schema_ref: schemas/security/metadata_chain_entry.schema.json

rules:
  - Manual/mirror/offline imports mint export-safe receipts rather than relying on local logs or operator memory.
  - Metadata chain entries join authoritative origins, receipts, and target scope so offline evidence packets remain reviewable.
  - Freshness/validation labels remain explicit on mirror and offline paths; imported state never pretends to be live-authoritative.
  - Supersedence and expiry are durable states represented by explicit links, not deletion.

cases:
  - fixture: stable_channel_freeze_manual_import.yaml
    record_kind: manual_import_receipt_record
    schema_ref: schemas/security/manual_import_receipt.schema.json
    covers:
      - file_import
      - channel_freeze_metadata
      - pending_operator_confirmation
      - export_safe_digests

  - fixture: stable_channel_freeze_chain_entry.yaml
    record_kind: metadata_chain_entry_record
    schema_ref: schemas/security/metadata_chain_entry.schema.json
    covers:
      - channel_freeze_chain_entry
      - receipt_join_via_chain_id

  - fixture: trust_root_rotation_offline_transfer.yaml
    record_kind: manual_import_receipt_record
    schema_ref: schemas/security/manual_import_receipt.schema.json
    covers:
      - removable_media_transfer
      - trust_root_scope
      - unknown_offline_signer_continuity

  - fixture: trust_root_rotation_chain_entry.yaml
    record_kind: metadata_chain_entry_record
    schema_ref: schemas/security/metadata_chain_entry.schema.json
    covers:
      - trust_root_rotation_chain_entry
      - trust_root_rotation_state_refs_required

  - fixture: preview_helper_extension_mirror_sync.yaml
    record_kind: manual_import_receipt_record
    schema_ref: schemas/security/manual_import_receipt.schema.json
    covers:
      - mirror_sync_import
      - mirrored_stale_past_grace_follow_up
      - disable_bundle_import

  - fixture: preview_helper_extension_mirror_sync_chain_entry.yaml
    record_kind: metadata_chain_entry_record
    schema_ref: schemas/security/metadata_chain_entry.schema.json
    covers:
      - disable_bundle_chain_entry
      - mirrored_stale_past_grace_labeling

  - fixture: preview_helper_extension_manual_import_advisory.yaml
    record_kind: manual_import_receipt_record
    schema_ref: schemas/security/manual_import_receipt.schema.json
    covers:
      - advisory_manual_file_import
      - upstream_mirror_receipt_reference

  - fixture: preview_helper_extension_manual_import_advisory_chain_entry.yaml
    record_kind: metadata_chain_entry_record
    schema_ref: schemas/security/metadata_chain_entry.schema.json
    covers:
      - advisory_chain_entry
      - pending_review_posture

  - fixture: offline_advisory_reimport_superseded.yaml
    record_kind: manual_import_receipt_record
    schema_ref: schemas/security/manual_import_receipt.schema.json
    covers:
      - reimport_supersedence
      - superseded_receipt_durable

  - fixture: offline_advisory_reimport_active.yaml
    record_kind: manual_import_receipt_record
    schema_ref: schemas/security/manual_import_receipt.schema.json
    covers:
      - reimport_supersedence
      - applied_and_overrode_prior_snapshot

  - fixture: offline_advisory_reimport_chain_entry.yaml
    record_kind: metadata_chain_entry_record
    schema_ref: schemas/security/metadata_chain_entry.schema.json
    covers:
      - advisory_chain_entry
      - supersedence_linkage
