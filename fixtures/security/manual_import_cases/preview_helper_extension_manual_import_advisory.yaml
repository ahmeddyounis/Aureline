__fixture__:
  name: preview_helper_extension_manual_import_advisory
  scenario: >
    Worked manual_import_receipt_record for an operator-driven advisory
    import performed after the mirror snapshot was exported. The receipt
    chains from the upstream mirror receipt and remains pending operator
    confirmation so offline evidence packets can prove the import without
    asserting it was applied.
  contract_sections:
    - "Detached-signature verification contract"
    - "Upstream mirror chaining"
    - "Pending review posture"

