    archetype recommendations sourced from import_packet and bundle_metadata. The
    activation is admitted partial: import-state-compare is required before
    restore, so it lives in recommended_soon (not blocked) and the banner is
    recommended_setup_banner with continue_without_class compare_before_restore.
  contract_sections:
    - "§3.4 archetype_recommendation_source_class (import_packet)"
    - "§3.6 continue_without_class (compare_before_restore)"
    - "§5.3 admission_banner_class (recommended_setup_banner)"
