# yaml-language-server: $schema=../../../schemas/workspace/admission_checkpoint.schema.json
$schema: "https://aureline.dev/schemas/workspace/admission_checkpoint.schema.json"
__fixture__:
  name: remembered_route_set_up_later_admission
  scenario: >
    A repeat folder open uses a remembered "set up later" preference. The
    archetype recommendation source resolves to prior_user_choice plus
    detected_facts. blocking_now is empty, optional tasks live under
    optional_user_dismissed and optional_recommended_only, and the banner is
    deferred_setup_banner. continue_without_class resolves to set_up_later as
    a narrowing hint only — no trust widening, no install.
  contract_sections:
    - "§3.4 archetype_recommendation_source_class (prior_user_choice)"
    - "§4.3 Optional-reason classes (optional_user_dismissed)"
    - "§5.3 admission_banner_class (deferred_setup_banner)"
record_kind: workspace_admission_checkpoint_record
admission_checkpoint_schema_version: 1
admission_checkpoint_id: "admission.checkpoint.remembered_route_set_up_later"
emitted_at: "ts.monotonic.remembered_route_set_up_later"
entry_action_ref: "entry.action.open.remembered_repo"
entry_source: folder_or_repo_open
target_kind: local_repo_root
resulting_mode: repo_root
root_identity_class: repo_root_identity
root_identity_ref: "root.identity.remembered_repo"
workspace_scope_ref: "scope.remembered_repo"
trust_state: trusted
trust_review_class: no_trust_review_required
admission_class: admitted
archetype_recommendation_source_classes:
  - prior_user_choice
  - detected_facts
setup_location_classes:
  - local_machine
  - no_execution
readiness_bucket_summary:
  blocking_now_total: 0
  blocking_now_by_reason: []
  recommended_soon_total: 0
  recommended_soon_by_class: []
  optional_later_total: 2
  optional_later_by_reason:
    - optional_reason_class: optional_user_dismissed
      task_count: 1
    - optional_reason_class: optional_recommended_only
      task_count: 1
blocked_setup_tasks: []
optional_setup_tasks:
  - task_ref: "task.remembered.dependency_restore_dismissed"
    task_class: dependency_restore
    task_state: deferred_by_user
    optional_reason_class: optional_user_dismissed
    execution_boundary: local_machine
    side_effects:
      - installs_packages
      - downloads_dependencies
      - contacts_remote
    summary: "Dependency restore was dismissed earlier; it is reachable but not pushed."
  - task_ref: "task.remembered.extension_recommendation"
    task_class: extension_recommendation
    task_state: optional
    optional_reason_class: optional_recommended_only
    execution_boundary: no_execution
    side_effects:
      - no_side_effect
    summary: "Recommended extensions remain available for review."
continue_without_class: set_up_later
plain_open_available: true
ordinary_editing_available: true
blocked_setup_distinct_from_optional: true
prior_user_choice_ref: "user_choice.remembered.set_up_later"
detected_fact_refs:
  - "fact.remembered.previous_choice_present"
  - "fact.remembered.manifest_present"
recommendation_refs:
  - "rec.remembered.review_bundle"
policy_block_refs: []
blocked_setup_refs: []
optional_guidance_refs:
  - "task.remembered.dependency_restore_dismissed"
  - "task.remembered.extension_recommendation"
admission_card_refs:
  - "card.remembered.what_works_now"
  - "card.remembered.deferred_setup"
  - "card.remembered.optional_recommendations"
admission_banner_ref: "banner.remembered.deferred_setup"
summary: "Remembered set-up-later preference is applied as a narrowing hint; no setup runs and ordinary editing is fully available."
