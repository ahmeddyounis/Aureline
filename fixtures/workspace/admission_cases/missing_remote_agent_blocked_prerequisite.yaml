# yaml-language-server: $schema=../../../schemas/workspace/admission_checkpoint.schema.json
$schema: "https://aureline.dev/schemas/workspace/admission_checkpoint.schema.json"
__fixture__:
  name: missing_remote_agent_blocked_prerequisite
  scenario: >
    A review/incident deep link resolves to a remote-attached workspace, but the
    remote agent is unavailable. Aureline cannot anchor a root identity yet; the
    checkpoint sets root_identity_class to no_root_identity_yet, admission_class
    to needs_reconnect, places remote_agent_reconnect in blocking_now with
    blocked_reason blocked_by_missing_prerequisite, and resolves continue_without
    to inspect_only so the user may still anchor the linked review object.
  contract_sections:
    - "§3.2 root_identity_class"
    - "§3.3 trust_review_class"
    - "§4.2 Blocked-reason classes"
    - "§5.1 admission_card_class (prerequisite_repair_card)"
    - "§5.3 admission_banner_class (prerequisite_missing_banner)"
record_kind: workspace_admission_checkpoint_record
admission_checkpoint_schema_version: 2
admission_checkpoint_id: "admission.checkpoint.deep_link_missing_remote_agent"
emitted_at: "ts.monotonic.deep_link_missing_remote_agent"
entry_action_ref: "entry.action.deep_link.review_incident"
entry_source: review_or_incident_deep_link
target_kind: review_or_work_item_deep_link
resulting_mode: inspect_only
root_identity_class: no_root_identity_yet
workspace_scope_ref: "scope.deep_link_review_pending"
trust_state: pending_evaluation
trust_review_class: trust_review_not_applicable
admission_class: needs_reconnect
archetype_recommendation_source_classes:
  - detected_facts
setup_location_classes:
  - remote_agent
  - no_execution
readiness_bucket_summary:
  blocking_now_total: 1
  blocking_now_by_reason:
    - blocked_reason_class: blocked_by_missing_prerequisite
      task_count: 1
  recommended_soon_total: 0
  recommended_soon_by_class: []
  optional_later_total: 1
  optional_later_by_reason:
    - optional_reason_class: optional_additive
      task_count: 1
blocked_setup_tasks:
  - task_ref: "task.deep_link.remote_agent_reconnect"
    task_class: remote_agent_reconnect
    task_state: missing_prerequisite
    blocked_reason_class: blocked_by_missing_prerequisite
    execution_boundary: remote_agent
    side_effects:
      - contacts_remote
      - attaches_runtime
    missing_prerequisite_ref: "prereq.remote_agent.unavailable"
    summary: "The remote agent for this deep link is unavailable; review can be inspected, but live actions wait until the agent reconnects."
optional_setup_tasks:
  - task_ref: "task.deep_link.local_clone_or_handoff_export"
    task_class: deep_link_clone_required
    task_state: optional
    optional_reason_class: optional_additive
    execution_boundary: local_machine
    side_effects:
      - downloads_dependencies
      - contacts_remote
    summary: "Optional: clone or handoff-export for offline review."
continue_without_class: inspect_only
plain_open_available: true
ordinary_editing_available: false
blocked_setup_distinct_from_optional: true
detected_fact_refs:
  - "fact.deep_link.review_object_present"
recommendation_refs: []
policy_block_refs: []
blocked_setup_refs:
  - "task.deep_link.remote_agent_reconnect"
optional_guidance_refs:
  - "task.deep_link.local_clone_or_handoff_export"
admission_card_refs:
  - "card.deep_link.what_works_now"
  - "card.deep_link.blocked_setup"
  - "card.deep_link.prerequisite_repair"
  - "card.deep_link.continue_without"
admission_banner_ref: "banner.deep_link.prerequisite_missing"
summary: "Deep-link review object is anchored read-only. Live actions wait for the remote agent to reconnect; inspect-only is available now."
