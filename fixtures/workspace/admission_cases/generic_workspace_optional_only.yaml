# yaml-language-server: $schema=../../../schemas/workspace/admission_checkpoint.schema.json
$schema: "https://aureline.dev/schemas/workspace/admission_checkpoint.schema.json"
__fixture__:
  name: generic_workspace_optional_only
  scenario: >
    A folder open lands on a generic workspace; no certified or probable
    archetype is available. The admission checkpoint admits the activation,
    leaves blocking_now and recommended_soon empty, and surfaces a single
    optional_later task. ready_to_work_banner is rendered, and
    continue_without_class resolves to set_up_later as a narrowing hint only.
  contract_sections:
    - "§3.5 setup_location_class (no_execution)"
    - "§4.4 Plain open survives an empty-bucket workspace"
    - "§5.3 admission_banner_class (ready_to_work_banner)"
record_kind: workspace_admission_checkpoint_record
admission_checkpoint_schema_version: 2
admission_checkpoint_id: "admission.checkpoint.generic_folder"
emitted_at: "ts.monotonic.generic_folder"
entry_action_ref: "entry.action.open.generic_folder"
entry_source: folder_or_repo_open
target_kind: local_folder
resulting_mode: folder
root_identity_class: filesystem_path_identity
root_identity_ref: "root.identity.generic_folder"
workspace_scope_ref: "scope.generic_folder"
trust_state: pending_evaluation
trust_review_class: no_trust_review_required
admission_class: admitted
archetype_recommendation_source_classes: []
setup_location_classes:
  - no_execution
readiness_bucket_summary:
  blocking_now_total: 0
  blocking_now_by_reason: []
  recommended_soon_total: 0
  recommended_soon_by_class: []
  optional_later_total: 1
  optional_later_by_reason:
    - optional_reason_class: optional_additive
      task_count: 1
blocked_setup_tasks: []
optional_setup_tasks:
  - task_ref: "task.generic.diagnostics_hint"
    task_class: docs_import
    task_state: optional
    optional_reason_class: optional_additive
    execution_boundary: no_execution
    side_effects:
      - no_side_effect
    summary: "Optional diagnostics: project doctor remains a non-blocking entry point."
continue_without_class: set_up_later
plain_open_available: true
ordinary_editing_available: true
blocked_setup_distinct_from_optional: true
detected_fact_refs:
  - "fact.generic.generic_files_only"
recommendation_refs: []
policy_block_refs: []
blocked_setup_refs: []
optional_guidance_refs:
  - "task.generic.diagnostics_hint"
admission_card_refs:
  - "card.generic.what_works_now"
  - "card.generic.optional_recommendations"
admission_banner_ref: "banner.generic.ready_to_work"
summary: "Generic folder is admitted; ordinary editing is fully available and only optional diagnostics remain."
