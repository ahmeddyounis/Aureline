# yaml-language-server: $schema=../../../schemas/workspace/admission_checkpoint.schema.json
$schema: "https://aureline.dev/schemas/workspace/admission_checkpoint.schema.json"
__fixture__:
  name: deployment_profile_locked_blocked
  scenario: >
    A managed envelope pins a required deployment profile, but the active
    profile on the user's device cannot satisfy it. The admission checkpoint
    surfaces a blocking_now task with blocked_reason blocked_by_deployment_profile
    so the deployment_profile_card and deployment_profile_locked_banner render
    instead of generic failure copy. continue_without_class resolves to
    open_minimal so plain editing remains available.
  contract_sections:
    - "§4.2 Blocked-reason classes (blocked_by_deployment_profile)"
    - "§5.1 admission_card_class (deployment_profile_card)"
    - "§5.3 admission_banner_class (deployment_profile_locked_banner)"
record_kind: workspace_admission_checkpoint_record
admission_checkpoint_schema_version: 2
admission_checkpoint_id: "admission.checkpoint.deployment_profile_locked"
emitted_at: "ts.monotonic.deployment_profile_locked"
entry_action_ref: "entry.action.start_from_snapshot.template"
entry_source: folder_or_repo_open
target_kind: template_or_prebuild_snapshot
resulting_mode: open_prebuild_minimal
root_identity_class: template_or_prebuild_identity
root_identity_ref: "root.identity.managed_template_snapshot"
workspace_scope_ref: "scope.managed_template_snapshot"
trust_state: pending_evaluation
trust_review_class: trust_review_pending
admission_class: needs_repair
archetype_recommendation_source_classes:
  - template_default
  - admin_policy
setup_location_classes:
  - managed_workspace
  - no_execution
readiness_bucket_summary:
  blocking_now_total: 1
  blocking_now_by_reason:
    - blocked_reason_class: blocked_by_deployment_profile
      task_count: 1
  recommended_soon_total: 0
  recommended_soon_by_class: []
  optional_later_total: 0
  optional_later_by_reason: []
blocked_setup_tasks:
  - task_ref: "task.profile.profile_unlock_required"
    task_class: policy_review
    task_state: blocked_by_policy
    blocked_reason_class: blocked_by_deployment_profile
    execution_boundary: managed_workspace
    side_effects:
      - widens_trust
      - contacts_remote
    deployment_profile_block_ref: "profile.lock.managed_envelope.profile_required"
    summary: "Activation requires a deployment profile the active user does not currently have; managed envelope pins the profile."
optional_setup_tasks: []
continue_without_class: open_minimal
plain_open_available: true
ordinary_editing_available: true
blocked_setup_distinct_from_optional: true
archetype_ref: "archetype.managed_template.locked"
compatible_bundle_refs: []
detected_fact_refs:
  - "fact.profile.template_default_profile_declared"
  - "fact.profile.admin_policy_pins_profile"
recommendation_refs: []
policy_block_refs:
  - "policyblock.profile.locked_profile_required"
blocked_setup_refs:
  - "task.profile.profile_unlock_required"
optional_guidance_refs: []
admission_card_refs:
  - "card.profile.what_works_now"
  - "card.profile.blocked_setup"
  - "card.profile.deployment_profile"
  - "card.profile.continue_without"
admission_banner_ref: "banner.profile.deployment_profile_locked"
summary: "Managed envelope pins a deployment profile the user lacks; open-minimal remains available while the required profile is unlocked."
