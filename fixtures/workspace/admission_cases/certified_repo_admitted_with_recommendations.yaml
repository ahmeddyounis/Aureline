# yaml-language-server: $schema=../../../schemas/workspace/admission_checkpoint.schema.json
$schema: "https://aureline.dev/schemas/workspace/admission_checkpoint.schema.json"
__fixture__:
  name: certified_repo_admitted_with_recommendations
  scenario: >
    A folder/repo open lands on a certified-archetype match. The admission checkpoint
    admits the activation, surfaces recommendations from detected facts and bundle
    metadata, leaves blocking_now empty, lists recommended_soon and optional_later
    work, keeps ordinary editing available, and resolves continue_without_class to
    set_up_later. Exercises the recommended_setup_card and recommended_setup_banner.
  contract_sections:
    - "§3 Workspace-Admission Checkpoint"
    - "§4.1 Three buckets, never collapsed"
    - "§4.5 Readiness-bucket summary"
    - "§5.1 admission_card_class"
    - "§5.3 admission_banner_class"
record_kind: workspace_admission_checkpoint_record
admission_checkpoint_schema_version: 1
admission_checkpoint_id: "admission.checkpoint.web.certified_repo"
emitted_at: "ts.monotonic.certified_repo_admitted"
entry_action_ref: "entry.action.open.web_repo"
entry_source: folder_or_repo_open
target_kind: local_repo_root
resulting_mode: repo_root
root_identity_class: repo_root_identity
root_identity_ref: "root.identity.web_repo"
workspace_scope_ref: "scope.web_repo"
trust_state: pending_evaluation
trust_review_class: trust_review_pending
admission_class: admitted
archetype_recommendation_source_classes:
  - detected_facts
  - bundle_metadata
setup_location_classes:
  - local_machine
  - no_execution
readiness_bucket_summary:
  blocking_now_total: 0
  blocking_now_by_reason: []
  recommended_soon_total: 1
  recommended_soon_by_class:
    - readiness_task_class: dependency_restore
      task_count: 1
  optional_later_total: 1
  optional_later_by_reason:
    - optional_reason_class: optional_recommended_only
      task_count: 1
blocked_setup_tasks: []
optional_setup_tasks:
  - task_ref: "task.web.extension_recommendation"
    task_class: extension_recommendation
    task_state: optional
    optional_reason_class: optional_recommended_only
    execution_boundary: no_execution
    side_effects:
      - no_side_effect
    summary: "Optional editor extensions are surfaced as a dismissable list."
continue_without_class: set_up_later
plain_open_available: true
ordinary_editing_available: true
blocked_setup_distinct_from_optional: true
archetype_ref: "archetype.ts_web_app.certified"
compatible_bundle_refs:
  - "bundle.web.fullstack.current"
detected_fact_refs:
  - "fact.web.manifest_present"
  - "fact.web.bundle_marker_present"
recommendation_refs:
  - "rec.compare_web_bundle"
policy_block_refs: []
blocked_setup_refs: []
optional_guidance_refs:
  - "task.web.extension_recommendation"
admission_card_refs:
  - "card.web.what_works_now"
  - "card.web.recommended_setup"
  - "card.web.optional_recommendations"
admission_banner_ref: "banner.web.recommended_setup"
summary: "Certified web repo is admitted; dependency restore and extensions remain reviewable, ordinary editing is available now."
