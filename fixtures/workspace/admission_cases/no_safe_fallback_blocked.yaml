# yaml-language-server: $schema=../../../schemas/workspace/admission_checkpoint.schema.json
$schema: "https://aureline.dev/schemas/workspace/admission_checkpoint.schema.json"
__fixture__:
  name: no_safe_fallback_blocked
  scenario: >
    A managed-cloud resume requires re-authentication, the remote agent is
    unavailable, and a managed policy blocks both inspect-only and the local
    fallback. Every safe fallback is itself blocked, so continue_without_class
    resolves to no_continue_without_action_available and the no_safe_fallback
    banner is rendered. The checkpoint cites both a policy block and a blocked
    setup ref so the empty-fallback state is honest, not silent.
  contract_sections:
    - "§3.6 continue_without_class (no_continue_without_action_available)"
    - "§5.3 admission_banner_class (no_safe_fallback_banner)"
    - "§5.5 rule 6 (Continue-without survives)"
record_kind: workspace_admission_checkpoint_record
admission_checkpoint_schema_version: 1
admission_checkpoint_id: "admission.checkpoint.no_safe_fallback"
emitted_at: "ts.monotonic.no_safe_fallback"
entry_action_ref: "entry.action.resume.managed_cloud"
entry_source: restore_last_session
target_kind: managed_cloud_workspace
resulting_mode: resume_live_session
root_identity_class: managed_cloud_identity
root_identity_ref: "root.identity.managed_cloud_workspace"
workspace_scope_ref: "scope.managed_cloud_workspace"
trust_state: pending_evaluation
trust_review_class: trust_revalidation_required
admission_class: needs_reauth
archetype_recommendation_source_classes:
  - admin_policy
  - detected_facts
setup_location_classes:
  - managed_workspace
  - remote_agent
  - browser_handoff
readiness_bucket_summary:
  blocking_now_total: 2
  blocking_now_by_reason:
    - blocked_reason_class: blocked_by_policy
      task_count: 1
    - blocked_reason_class: blocked_by_missing_prerequisite
      task_count: 1
  recommended_soon_total: 0
  recommended_soon_by_class: []
  optional_later_total: 0
  optional_later_by_reason: []
blocked_setup_tasks:
  - task_ref: "task.no_fallback.policy_review"
    task_class: policy_review
    task_state: blocked_by_policy
    blocked_reason_class: blocked_by_policy
    execution_boundary: managed_workspace
    side_effects:
      - widens_trust
      - contacts_remote
    policy_block_refs:
      - "policyblock.no_fallback.inspect_only_blocked"
      - "policyblock.no_fallback.local_fallback_blocked"
    summary: "Managed policy currently blocks both inspect-only and the local fallback paths."
  - task_ref: "task.no_fallback.remote_agent_reconnect"
    task_class: remote_agent_reconnect
    task_state: missing_prerequisite
    blocked_reason_class: blocked_by_missing_prerequisite
    execution_boundary: remote_agent
    side_effects:
      - contacts_remote
      - attaches_runtime
    missing_prerequisite_ref: "prereq.no_fallback.remote_agent.unavailable"
    summary: "Remote agent for the managed workspace is unavailable; revalidation cannot proceed."
optional_setup_tasks: []
continue_without_class: no_continue_without_action_available
plain_open_available: false
ordinary_editing_available: false
blocked_setup_distinct_from_optional: true
detected_fact_refs:
  - "fact.no_fallback.admin_policy_applies"
  - "fact.no_fallback.remote_agent_missing"
recommendation_refs: []
policy_block_refs:
  - "policyblock.no_fallback.inspect_only_blocked"
  - "policyblock.no_fallback.local_fallback_blocked"
blocked_setup_refs:
  - "task.no_fallback.policy_review"
  - "task.no_fallback.remote_agent_reconnect"
optional_guidance_refs: []
admission_card_refs:
  - "card.no_fallback.blocked_setup"
  - "card.no_fallback.policy_narrowing"
  - "card.no_fallback.prerequisite_repair"
admission_banner_ref: "banner.no_fallback.no_safe_fallback"
summary: "Every safe fallback is itself blocked; the user is shown the blocked-setup, policy, and prerequisite cards together with a no-safe-fallback banner."
