# yaml-language-server: $schema=../../../schemas/workspace/admission_checkpoint.schema.json
$schema: "https://aureline.dev/schemas/workspace/admission_checkpoint.schema.json"
__fixture__:
  name: mixed_workspace_boundary_choice_pending
  scenario: >
    A folder open lands on a mixed-or-ambiguous workspace. The user must scope
    the workspace boundary before any setup commits, so user_boundary_choice is
    placed in blocking_now with blocked_reason blocked_by_trust (no setup may
    widen trust until the user picks a boundary). plain_open and editing remain
    available; continue_without_class resolves to open_minimal.
  contract_sections:
    - "§4.1 Three buckets, never collapsed"
    - "§4.2 Blocked-reason classes (blocked_by_trust)"
    - "§5.3 admission_banner_class (partial_setup_banner)"
record_kind: workspace_admission_checkpoint_record
admission_checkpoint_schema_version: 2
admission_checkpoint_id: "admission.checkpoint.mixed_boundary_choice"
emitted_at: "ts.monotonic.mixed_boundary_choice"
entry_action_ref: "entry.action.open.mixed_folder"
entry_source: folder_or_repo_open
target_kind: local_folder
resulting_mode: workspace_candidate
root_identity_class: filesystem_path_identity
root_identity_ref: "root.identity.mixed_folder"
workspace_scope_ref: "scope.mixed_folder_pending_boundary"
trust_state: pending_evaluation
trust_review_class: trust_review_pending
admission_class: trust_review_required
archetype_recommendation_source_classes:
  - detected_facts
setup_location_classes:
  - local_machine
  - no_execution
readiness_bucket_summary:
  blocking_now_total: 1
  blocking_now_by_reason:
    - blocked_reason_class: blocked_by_trust
      task_count: 1
  recommended_soon_total: 1
  recommended_soon_by_class:
    - readiness_task_class: index_warmup
      task_count: 1
  optional_later_total: 1
  optional_later_by_reason:
    - optional_reason_class: optional_freshness_based
      task_count: 1
blocked_setup_tasks:
  - task_ref: "task.mixed.user_boundary_choice"
    task_class: user_boundary_choice
    task_state: pending
    blocked_reason_class: blocked_by_trust
    execution_boundary: no_execution
    side_effects:
      - no_side_effect
    summary: "User must choose a workspace boundary (whole repo, probable project, current folder only, or workset) before setup may run."
optional_setup_tasks:
  - task_ref: "task.mixed.docs_freshness_hint"
    task_class: docs_import
    task_state: optional
    optional_reason_class: optional_freshness_based
    execution_boundary: no_execution
    side_effects:
      - no_side_effect
    summary: "Docs import surfaces a freshness hint; not required for current activation."
continue_without_class: open_minimal
plain_open_available: true
ordinary_editing_available: true
blocked_setup_distinct_from_optional: true
detected_fact_refs:
  - "fact.mixed.multi_root_signals"
  - "fact.mixed.mixed_stack_signal"
recommendation_refs:
  - "rec.mixed.choose_workspace_boundary"
policy_block_refs: []
blocked_setup_refs:
  - "task.mixed.user_boundary_choice"
optional_guidance_refs:
  - "task.mixed.docs_freshness_hint"
admission_card_refs:
  - "card.mixed.what_works_now"
  - "card.mixed.blocked_setup"
  - "card.mixed.recommended_setup"
  - "card.mixed.continue_without"
admission_banner_ref: "banner.mixed.partial_setup"
summary: "Mixed signals require a boundary choice before setup commits; plain editing and minimal open remain available."
