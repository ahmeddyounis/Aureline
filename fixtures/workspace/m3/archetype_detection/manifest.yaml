schema_version: 1
fixture_set_id: workspace_archetype_detection_beta_cases
matrix_ref: artifacts/compat/m3/archetype_detection_matrix.yaml
schema_ref: schemas/workspace/archetype_detection.schema.json
docs_ref: docs/workspace/m3/archetype_detection_and_first_useful_work.md

required_detection_outcomes:
  - certified_archetype_match
  - probable_archetype
  - mixed_or_ambiguous_workspace
  - unknown_or_generic_workspace
  - restricted_or_policy_blocked
  - missing_prerequisite

cases:
  - case_ref: fixtures/workspace/m3/archetype_detection/certified_web_repo.yaml
    full_record_ref: fixtures/workspace/entry_routes/certified_web_repo_open.json
    expected_outcome: certified_archetype_match
    expected_route: explorer_plus_readme_or_changed_files
  - case_ref: fixtures/workspace/m3/archetype_detection/rust_workspace_supported_probable.yaml
    expected_outcome: probable_archetype
    expected_route: explorer_plus_readme_or_changed_files
  - case_ref: fixtures/workspace/m3/archetype_detection/mixed_ts_python_boundary_choice.yaml
    full_record_ref: fixtures/workspace/entry_routes/mixed_workspace_boundary_choice.json
    expected_outcome: mixed_or_ambiguous_workspace
    expected_route: nested_root_choice_sheet
  - case_ref: fixtures/workspace/m3/archetype_detection/generic_folder_plain_open.yaml
    full_record_ref: fixtures/workspace/entry_routes/generic_folder_plain_open.json
    expected_outcome: unknown_or_generic_workspace
    expected_route: generic_shell_with_diagnostics
  - case_ref: fixtures/workspace/m3/archetype_detection/restricted_clone_policy_blocked.yaml
    full_record_ref: fixtures/workspace/entry_routes/restricted_clone_policy_blocked_setup.json
    expected_outcome: restricted_or_policy_blocked
    expected_route: post_clone_handoff
  - case_ref: fixtures/workspace/m3/archetype_detection/missing_remote_agent_deep_link.yaml
    full_record_ref: fixtures/workspace/entry_routes/missing_remote_agent_deep_link.json
    expected_outcome: missing_prerequisite
    expected_route: linked_review_incident_or_work_item

