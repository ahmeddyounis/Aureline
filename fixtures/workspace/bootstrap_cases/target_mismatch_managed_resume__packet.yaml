$schema: ../../../schemas/workspace/bootstrap_packet.schema.json
__fixture__:
  name: target_mismatch_managed_resume__packet
  scenario: >
    Packet-only resume failure fixture for a managed workspace whose
    remembered session witness resolves to a different target during
    revalidation. The packet exercises the target-mismatch reason-code
    family and shows that Aureline denies live attach while preserving
    restricted local evidence and exportable route truth.
  doc_sections:
    - docs/workspace/bootstrap_packet_contract.md §2
    - docs/workspace/bootstrap_packet_contract.md §4

