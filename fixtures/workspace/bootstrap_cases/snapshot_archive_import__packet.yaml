$schema: ../../../schemas/workspace/bootstrap_packet.schema.json
__fixture__:
  name: snapshot_archive_import__packet
  scenario: >
    Bootstrap packet for an unsigned snapshot archive imported from a
    local/offline transfer. The packet shows that extraction completed
    into a read-only staging root, trusted bootstrap is blocked by signer
    review, and offline continuation remains local-only with no implied
    live freshness or public endpoint fallback.
  doc_sections:
    - docs/workspace/bootstrap_packet_contract.md §2
    - docs/workspace/bootstrap_packet_contract.md §4

record_kind: bootstrap_packet_record
bootstrap_packet_schema_version: 1
bootstrap_packet_id: bootstrap-packet-snapshot-acme-payments-0003
created_at: mono:4813:00:05:00.0300

entry_context:
  entry_verb: import
  target_kind: portable_state_package
  source_surface: drag_and_drop
  source_locator_ref: locator-snapshot-acme-payments-0003
  entry_action_ref: entry-action-snapshot-import-0003
  entry_route_case_ref: null
  command_id_ref: command.workspace.import
  summary: Snapshot archive was dropped onto the window for inspect-before-import.

source_identity:
  source_locator_ref: locator-snapshot-acme-payments-0003
  locator_class: snapshot_archive
  acquisition_posture: partially_acquired
  declared_freshness_class: offline_snapshot
  signer_continuity_class: unsigned
  local_identity_ref: fs-identity-snapshot-acme-payments-0003
  source_digest_ref: digest-snapshot-acme-payments-0003
  host_endpoint_ref: null
  source_summary: Unsigned offline snapshot extracted into browse-safe staging.

checkout_context:
  checkout_plan_ref: plan-snapshot-acme-payments-0003
  trust_state: restricted
  trust_stage: signer_review_required
  destination_ref: staging-snapshot-acme-payments-0003
  target_identity_ref: portable-state-package-acme-payments-0003
  browse_safe_actions:
    - inspect_manifest
    - inspect_readme
    - inspect_license
    - diff_before_commit
    - export_evidence_only
  blocked_execution_paths:
    - post_checkout_hook
    - pre_commit_hook
    - generator_install
    - generator_run
    - package_manager_restore
    - package_manager_postinstall_script
    - toolchain_bootstrap
    - workspace_auto_task
    - extension_activation
  bootstrap_queue_ref: null

route_context:
  mirror_public_route_class: air_gapped_media
  public_route_posture: public_route_unavailable_offline
  action_route_class: local_rpc_route
  route_change_reason_code: canonical_no_route_change
  mirror_attestation_ref: null
  manual_import_receipt_ref: manual-import-receipt-snapshot-0003
  network_attribution_ref: null
  route_summary: The archive arrived by offline transfer; no live freshness or public route is implied.

credential_handle_refs: []
bootstrap_queue_item_refs: []

resumability:
  resume_state: completed
  checkpoint_refs:
    - staging-snapshot-acme-payments-0003
  rollback_refs:
    - rollback-discard-staging-snapshot-0003
  read_only_partial_root_refs:
    - fs-identity-snapshot-acme-payments-0003
  reason_codes:
    - import_interrupted_unsigned_or_unverified_bundle
    - offline_continuation_local_only
  available_actions:
    - open_read_only_partial
    - discard_and_restart
    - continue_offline
    - export_evidence
  resume_summary: Extraction completed; only browse-safe offline inspection is available until signer review.

partial_failure:
  outcome_class: waiting_for_prerequisite
  failed_stage: trust_review
  reason_codes:
    - import_interrupted_unsigned_or_unverified_bundle
    - airgap_bundle_missing_attestation
  affected_item_refs: []
  user_visible_summary: Snapshot is unsigned and lacks an offline attestation for trusted bootstrap.

post_open_prerequisites:
  - prerequisite_class: signer_review
    posture: required_before_mutation
    reason_code: missing_prerequisite_trust_review
    blocking: true
    bootstrap_item_ref: null
    repair_hook_ref: signer-review-ticket-snapshot-0003
    summary: Signer review must complete before the archive can mutate a workspace.
  - prerequisite_class: policy_review
    posture: required_before_trusted_bootstrap
    reason_code: airgap_bundle_missing_attestation
    blocking: true
    bootstrap_item_ref: null
    repair_hook_ref: repair-hook-import-attestation-0003
    summary: Offline attestation is missing, so trusted bootstrap stays blocked.

export_rules:
  - destination_class: support_bundle
    export_posture: included_metadata_only
    redaction_class: metadata_safe
    required_field_refs:
      - source_locator_ref
      - checkout_plan_ref
      - manual_import_receipt_ref
      - signer_continuity_class
      - trust_stage
    forbidden_field_classes:
      - raw_archive_bytes
      - raw_absolute_path
      - raw_secret
    summary: Support export includes archive identity, digest refs, signer state, and typed reason codes, not archive bytes.
  - destination_class: migration_diff_view
    export_posture: included_by_reference
    redaction_class: metadata_safe
    required_field_refs:
      - bootstrap_packet_id
      - source_digest_ref
      - read_only_partial_root_refs
      - post_open_prerequisites
    forbidden_field_classes:
      - raw_archive_bytes
      - raw_absolute_path
    summary: Migration diff can cite the read-only staging root and trust prerequisite without copying the archive.

reason_codes:
  - import_interrupted_unsigned_or_unverified_bundle
  - airgap_bundle_missing_attestation
  - offline_continuation_local_only
  - missing_prerequisite_trust_review
support_bundle_refs: []
object_handoff_packet_refs: []
migration_session_refs:
  - migration-session-snapshot-inspect-0003
redaction_summary: Archive bytes and absolute staging paths are omitted; digest and manual-import receipt refs remain.
