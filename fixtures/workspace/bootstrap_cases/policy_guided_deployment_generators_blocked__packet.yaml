$schema: ../../../schemas/workspace/bootstrap_packet.schema.json
__fixture__:
  name: policy_guided_deployment_generators_blocked__packet
  scenario: >
    Bootstrap packet for a managed-fleet clone whose source acquisition is
    allowed but generator install/run and workspace auto-tasks are narrowed
    by admin policy. The packet keeps policy denial, credential-handle
    posture, package-restore prerequisite, and issue/support export rules
    together instead of flattening the outcome into generic setup failure.
  doc_sections:
    - docs/workspace/bootstrap_packet_contract.md §2
    - docs/workspace/bootstrap_packet_contract.md §4

record_kind: bootstrap_packet_record
bootstrap_packet_schema_version: 1
bootstrap_packet_id: bootstrap-packet-policy-guided-clone-0007
created_at: mono:4817:00:17:00.0500

entry_context:
  entry_verb: clone
  target_kind: remote_repository
  source_surface: start_center
  source_locator_ref: locator-policy-guided-clone-0007
  entry_action_ref: entry-action-policy-guided-clone-0007
  entry_route_case_ref: null
  command_id_ref: command.workspace.clone_repository
  summary: Managed workstation clone admitted source acquisition but narrowed setup actions by admin policy.

source_identity:
  source_locator_ref: locator-policy-guided-clone-0007
  locator_class: repo_url
  acquisition_posture: not_yet_acquired
  declared_freshness_class: live_origin
  signer_continuity_class: continuous_with_previous_acquisition
  local_identity_ref: null
  source_digest_ref: null
  host_endpoint_ref: host-endpoint-policy-guided-clone-0007
  source_summary: Live public-origin repository with an admin policy envelope.

checkout_context:
  checkout_plan_ref: plan-policy-guided-clone-0007
  trust_state: trusted
  trust_stage: admitted_trusted
  destination_ref: checkout-destination-internal-tools-0007
  target_identity_ref: target-remote-repository-internal-tools
  browse_safe_actions:
    - inspect_manifest
    - inspect_history
    - inspect_workflows_ci_config
    - inspect_scripts_catalog
    - inspect_dependency_manifest
  blocked_execution_paths:
    - generator_install
    - generator_run
    - workspace_auto_task
    - ai_context_warmup
    - package_manager_postinstall_script
  bootstrap_queue_ref: queue-policy-guided-clone-0007

route_context:
  mirror_public_route_class: public_origin
  public_route_posture: public_route_used
  action_route_class: approval_gated_route
  route_change_reason_code: route_changed_policy_narrowed
  mirror_attestation_ref: null
  manual_import_receipt_ref: null
  network_attribution_ref: network-attribution-policy-guided-clone-0007
  route_summary: Public origin is allowed, but admin policy narrows bootstrap execution after acquisition.

credential_handle_refs:
  - handle_ref: cred-handle-oauth-0007
    handle_class: oauth_handle
    projection_mode: header
    redaction_class: handle_ref_only
    consumer_ref: host-endpoint-policy-guided-clone-0007
    issued_for_reason_codes:
      - policy_denied_execution_path

bootstrap_queue_item_refs:
  - boot-policy-guided-clone-generator-install-0001
  - boot-policy-guided-clone-package-restore-0001

resumability:
  resume_state: never_started
  checkpoint_refs: []
  rollback_refs: []
  read_only_partial_root_refs: []
  reason_codes:
    - policy_denied_execution_path
  available_actions:
    - continue_in_restricted_mode
    - open_minimal
    - set_up_later
    - export_evidence
  resume_summary: Acquisition can proceed, but policy-blocked bootstrap actions remain skipped or deferred.

partial_failure:
  outcome_class: policy_denied
  failed_stage: bootstrap_queue
  reason_codes:
    - policy_denied_execution_path
    - partial_failure_bootstrap_item_failed
  affected_item_refs:
    - boot-policy-guided-clone-generator-install-0001
  user_visible_summary: Generator install is skipped because admin policy blocks generators on this fleet profile.

post_open_prerequisites:
  - prerequisite_class: policy_review
    posture: blocked
    reason_code: policy_denied_execution_path
    blocking: true
    bootstrap_item_ref: boot-policy-guided-clone-generator-install-0001
    repair_hook_ref: repair-hook-admin-policy-review-0007
    summary: Generator install/run remains blocked unless admin policy changes.
  - prerequisite_class: package_restore
    posture: optional_deferred
    reason_code: missing_prerequisite_package_restore
    blocking: false
    bootstrap_item_ref: boot-policy-guided-clone-package-restore-0001
    repair_hook_ref: repair-hook-package-restore-with-postinstall-narrowed-0007
    summary: Dependency restore may run later, but post-install scripts stay narrowed by policy.

export_rules:
  - destination_class: support_bundle
    export_posture: included_by_reference
    redaction_class: handle_ref_only
    required_field_refs:
      - source_locator_ref
      - checkout_plan_ref
      - policy_bundle_ref
      - bootstrap_queue_item_refs
      - credential_handle_ref
    forbidden_field_classes:
      - raw_secret
      - raw_policy_bundle
      - raw_remote_url_with_credentials
    summary: Support export carries the policy bundle ref and item-level outcomes, not raw policy or credential bodies.
  - destination_class: object_handoff_packet
    export_posture: included_by_reference
    redaction_class: metadata_safe
    required_field_refs:
      - bootstrap_packet_id
      - policy_bundle_ref
      - reason_codes
      - affected_item_refs
    forbidden_field_classes:
      - raw_secret
      - raw_policy_bundle
    summary: Issue handoff preserves the reason-code chain for policy-denied bootstrap work.

reason_codes:
  - policy_denied_execution_path
  - partial_failure_bootstrap_item_failed
  - missing_prerequisite_package_restore
support_bundle_refs: []
object_handoff_packet_refs: []
migration_session_refs: []
redaction_summary: OAuth token and raw policy bytes are omitted; handle, policy bundle, and bootstrap item refs are retained.
