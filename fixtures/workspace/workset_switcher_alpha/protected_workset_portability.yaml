record_kind: workset_portability_alpha_fixture_index
schema_version: 1
schema_ref: schemas/workspace/workset_alpha.schema.json
scenario: >
  Protected proof path for the portable workset alpha. A saved
  sparse workset is reopened locally, projected into a workset
  switcher and scope banner, widened only through a scope-diff
  review, and preserved across cross-repo result and peek records
  without flattening workset or root identity into raw paths.
canonical_records:
  durable_workset_artifact_ref: fixtures/workspace/workset_scope_alpha/aureline.workset.jsonc
  workspace_manifest_ref: fixtures/workspace/workset_scope_alpha/workspace_manifest.json
  switcher_ref: fixtures/workspace/workset_cross_repo_cases/multi_repo_workset_switcher.yaml
  warming_banner_ref: fixtures/workspace/workset_cross_repo_cases/warm_vs_cold_scope_switch.yaml
  policy_banner_ref: fixtures/workspace/workset_cross_repo_cases/policy_limited_workset_banner.yaml
  widen_review_ref: fixtures/workspace/scope_widening_cases/widen_current_repo_to_selected_workset.yaml
  blocked_review_ref: fixtures/workspace/scope_widening_cases/blocked_widening_by_trust_or_policy.yaml
  cross_repo_result_group_ref: fixtures/workspace/workset_cross_repo_cases/outside_current_scope_result_group.yaml
  cross_repo_jump_ref: fixtures/workspace/scope_widening_cases/cross_repo_peek_outside_scope.yaml
acceptance:
  saved_artifact_reviewable_text: true
  stable_scope_id_preserved: true
  root_taxonomy_preserved: true
  sparse_or_full_mode_disclosed: true
  switcher_projects_counts_source_readiness_and_actions: true
  widening_requires_scope_diff_review: true
  review_has_confirm_cancel_and_remember_choice: true
  local_remote_headless_reopen_truth_projected: true
  outside_current_scope_markers_preserved: true
  no_whole_workspace_claim_for_narrow_scope: true
verification:
  rust_test: cargo test -p aureline-shell --test workset_switcher_alpha
  schema_drift: ./ci/check_schema_example_drift.sh --scenario fixtures/workspace/workset_switcher_alpha/protected_workset_portability.yaml
