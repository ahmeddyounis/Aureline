__fixture__:
  name: screen_capture_third_party_share
  scenario: >
    Screen capture leaves the device for a BYOK third-party provider
    that performs AI assistance over the captured frames. The
    device-permission row is for screen_capture (not microphone), no
    mic-state pill applies, and the speech-privacy ledger is used to
    record the capture event because the provider returns a
    transcript-equivalent annotation that is treated under the same
    consent / export rules. The transcript export carries
    exported_unredacted_with_explicit_consent and lands on the
    provider handoff destination with the strongest irreversible-
    share warning class (irreversible_third_party_share_outside_tenant).
  exercised_axes:
    record_kinds:
      - device_permission_row_record
      - speech_capture_event_record
      - transcript_export_record
    device_class: screen_capture
    processing_locus_class: byok_remote_provider
    audio_locality_class: audio_unavailable_in_envelope
    transcript_locality_class: transcript_returned_from_remote_provider_ephemeral
    consent_class: explicit_user_opt_in_each_session
    export_destination_class: export_blocked_by_policy_destination
    export_redaction_class: exported_unredacted_with_explicit_consent
    irreversible_share_posture_class: irreversible_third_party_share_outside_tenant
  contract_sections:
    - "Device-permission row"
    - "Capture/export review"
    - "Provider-versus-local processing disclosure"

records:
  - $schema: ../../../schemas/auth/device_permission_row.schema.json
    record_kind: device_permission_row_record
    device_permission_row_schema_version: 1
    permission_row_id: "auth:device_permission:screen_capture:third_party_ai:01"
    device_class: screen_capture
    permission_state_class: granted
    display_label: "Screen recording access"
    permission_reason_label: "AI screen assistance (third-party provider; explicit consent required)"
    actor:
