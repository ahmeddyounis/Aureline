__fixture__:
  name: byok_third_party_provider_capture
  scenario: >
    Capture leaves the device for a BYOK third-party provider outside
    the tenant boundary. The device-permission row, mic-state pill,
    and speech-privacy ledger all disclose byok_remote_provider
    processing locus and provider retention posture under terms. The
    transcript export carries explicit consent_to_provider_processing
    and lands on the export_blocked_by_policy_destination class with
    irreversible_third_party_share_outside_tenant warning posture
    until an enabling decision row admits the path; this fixture
    shows the conformant unredacted-with-explicit-consent row inside
    a deployment that has admitted the path.
  exercised_axes:
    record_kinds:
      - device_permission_row_record
      - mic_state_record
      - speech_capture_event_record
      - transcript_export_record
    processing_locus_class: byok_remote_provider
    audio_locality_class: sent_to_byok_remote_vendor_direct
    transcript_locality_class: transcript_returned_from_remote_provider_ephemeral
    consent_class: explicit_user_opt_in_each_session
    export_destination_class: portable_profile_package_redacted
    export_redaction_class: redacted_partial_with_disclosure
    irreversible_share_posture_class: irreversible_leaves_device_to_third_party_provider
  contract_sections:
    - "Device-permission row"
    - "Mic-state pill"
    - "Capture/export review"
    - "Provider-versus-local processing disclosure"
    - "Browser/device-code handoff card"

