__fixture__:
  name: provider_consent_blocked_no_silent_fallback
  scenario: >
    The user previously consented to a BYOK third-party voice
    provider, but policy now blocks the provider handoff. The OS
    microphone permission is still granted, but capture cannot
    start: the mic-state pill resolves to policy_blocked, the
    speech-privacy ledger records audio_blocked_by_policy with the
    matching denial reason, and the surface MUST NOT silently fall
    back to a local pack or to a different provider. The repair path
    is a typed request_admin_policy_change route quoted on the
    device-permission row.
  exercised_axes:
    record_kinds:
      - device_permission_row_record
      - mic_state_record
      - speech_capture_event_record
      - transcript_export_record
    processing_locus_class: byok_remote_provider
    permission_state_class: policy_blocked
    mic_state_class: policy_blocked
    audio_locality_class: audio_blocked_by_policy
    transcript_locality_class: transcript_blocked_by_policy
    consent_class: consent_blocked_by_policy
    export_destination_class: export_blocked_by_policy_destination
    export_redaction_class: export_blocked_by_policy
    irreversible_share_posture_class: blocked_by_policy_no_share
    denial_reason: speech_privacy_audio_left_device_without_disclosure
  contract_sections:
    - "Device-permission row"
    - "Mic-state pill"
    - "Provider-versus-local processing disclosure"
    - "Capture/export review"

