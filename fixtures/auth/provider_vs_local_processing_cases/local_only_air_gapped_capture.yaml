__fixture__:
  name: local_only_air_gapped_capture
  scenario: >
    Local-only processing inside an air-gapped envelope. The mic
    permission is granted, processing stays on the device, no
    transcript leaves the local user boundary, and every export
    destination resolves to unavailable_in_envelope. The
    speech-privacy ledger forbids any sent_to_* audio locality on
    air-gapped deployment profiles, so the row keeps capture
    reviewable while export remains unavailable.
  exercised_axes:
    record_kinds:
      - device_permission_row_record
      - mic_state_record
      - speech_capture_event_record
      - transcript_export_record
    processing_locus_class: local_device_only
    audio_locality_class: local_machine_only_in_process
    transcript_locality_class: transcript_local_only
    consent_class: implicit_user_initiated_push_to_talk
    export_destination_class: no_export_local_only
    export_redaction_class: redacted_full_transcript_blocked
    irreversible_share_posture_class: reversible_local_only
  contract_sections:
    - "Device-permission row"
    - "Mic-state pill"
    - "Capture/export review"
    - "Provider-versus-local processing disclosure"

