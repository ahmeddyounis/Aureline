__fixture__:
  name: policy_blocked_export_visible_repair
  scenario: >
    Capture is granted under enterprise-managed processing, but
    transcript export is blocked by policy. The mic-state pill stays
    inspectable and the device-permission row remains granted, but
    every transcript export resolves to export_blocked_by_policy on
    the speech-privacy ledger and the surface fails closed visibly
    with the policy_owner_ref quoted. Capture remains reviewable
    while export is unavailable; "blocked" never means "unknown".
  exercised_axes:
    record_kinds:
      - device_permission_row_record
      - mic_state_record
      - speech_capture_event_record
      - transcript_export_record
    processing_locus_class: enterprise_managed_service
    permission_state_class: granted
    mic_state_class: idle
    audio_locality_class: sent_to_enterprise_gateway
    transcript_locality_class: transcript_returned_from_remote_provider_local_persisted
    consent_class: explicit_user_opt_in_remembered_per_profile
    export_destination_class: export_blocked_by_policy_destination
    export_redaction_class: export_blocked_by_policy
    irreversible_share_posture_class: blocked_by_policy_no_share
  contract_sections:
    - "Device-permission row"
    - "Mic-state pill"
    - "Capture/export review"
    - "Provider-versus-local processing disclosure"

