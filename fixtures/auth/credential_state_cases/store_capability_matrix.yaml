    display_label: Browser or device-code handoff
    storage_mode_classes:
      - handle_only
      - delegated
      - session_only
    mapped_trust_store_classes: []
    supported_secret_classes:
      - ai_provider_token
      - code_host_token
      - package_registry_token
      - provider_session
      - ephemeral_operation_token
    supports_long_lived_secrets: false
    supports_handle_reference: true
    supports_raw_secret_storage: false
    supports_session_only_fallback: true
    plaintext_fallback_allowed: false
    allowed_prompt_action_classes:
