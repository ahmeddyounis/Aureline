      - import_credential
      - rebind_handle
    support_export_posture: metadata_only
    automation_export_posture: handle_alias_only
    auditability_note: Handoff rows export provider/org class, callback or device-code envelope refs, expiry, and alias/handle refs only.
    fallback_note: Browser or device-code handoff acquires authority; it does not make raw provider codes or callback payloads portable.
    platform_limitations:
      - Device-code and browser availability depend on provider and policy support.
    surface_redaction_class: metadata_safe_default
    minted_at: "2026-04-29T09:00:00Z"

