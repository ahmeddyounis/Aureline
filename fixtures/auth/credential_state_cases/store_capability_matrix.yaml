    fallback_note: Enterprise policy may route to managed policy injection or session-only fallback where class rules allow.
    platform_limitations:
      - Requires enterprise session and policy bundle freshness.
    surface_redaction_class: metadata_safe_default
    minted_at: "2026-04-29T09:00:00Z"

