    fallback_note: A raw secret observed in a workspace file must migrate to a broker alias before credentialed use is admitted.
    platform_limitations:
      - Reference files are not secure stores and cannot hold raw long-lived material.
    surface_redaction_class: metadata_safe_default
    minted_at: "2026-04-29T09:00:00Z"

