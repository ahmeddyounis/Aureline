# yaml-language-server: $schema=../../../schemas/auth/credential_state.schema.json
__fixture__:
  name: store_capability_matrix
  scenario: >
    Shared capability rows for every store/source class used by the
    credential-state examples. Each row names storage mode, mapped
    broker trust store where applicable, prompt support, export posture,
    auditability, and the no-plaintext-fallback rule.
  contract_sections:
    - Store-capability matrix
    - Export, support, and automation rules
record_kind: store_capability_matrix_record
credential_state_schema_version: 1
matrix_id: credential-store-capability-matrix:auth:initial
contract_ref: docs/auth/credential_state_and_secret_prompt_contract.md
rows:
  - record_kind: store_capability_record
    credential_state_schema_version: 1
    store_capability_id: store-capability:os-keychain
    store_source_class: os_keychain
    display_label: OS keychain
    storage_mode_classes:
      - system_credential_store
      - handle_only
    mapped_trust_store_classes:
      - os_keychain
    supported_secret_classes:
      - ai_provider_token
      - code_host_token
      - package_registry_token
      - database_credential
      - provider_session
    supports_long_lived_secrets: true
    supports_handle_reference: true
    supports_raw_secret_storage: false
    supports_session_only_fallback: false
    plaintext_fallback_allowed: false
    allowed_prompt_action_classes:
      - read_secret
      - write_secret
      - rebind_handle
      - import_credential
      - unlock_store
      - approve_step_up_access
    support_export_posture: metadata_only
    automation_export_posture: handle_alias_only
    auditability_note: Store class, alias, unlock state, and failure refs are exportable; raw material is not.
    fallback_note: If the OS store is unavailable, only a visible session-only broker fallback may be used where class and policy allow.
    platform_limitations:
      - Per-item unlock prompts depend on host platform support.
    surface_redaction_class: metadata_safe_default
    minted_at: "2026-04-29T09:00:00Z"

  - record_kind: store_capability_record
