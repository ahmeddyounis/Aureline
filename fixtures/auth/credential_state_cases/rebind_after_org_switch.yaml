    - secret-event:handle-issued:target-org-successor
  last_checked_at: "2026-04-29T09:22:10Z"
  support_summary: Org switch invalidated old-scope provider authority and produced a successor handle that must be rebound.
policy_context:
  identity_mode: managed_workspace
  policy_epoch: policy-epoch:identity:target-org
  trust_state: trusted
  execution_context_id: execution-context:provider-org-switch
surface_redaction_class: metadata_safe_default
