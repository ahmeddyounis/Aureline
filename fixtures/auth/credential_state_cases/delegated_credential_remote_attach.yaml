# yaml-language-server: $schema=../../../schemas/auth/credential_state.schema.json
__fixture__:
  name: delegated_credential_remote_attach
  scenario: >
    Remote attach uses a service-issued delegated identity scoped to one
    managed devbox session. The delegated credential is time-bounded,
    revocable, and distinct from a local saved secret or forwarded raw
    credential.
  contract_sections:
    - Credential-state vocabulary
    - Store-capability matrix
    - Export, support, and automation rules
  exercised_axes:
    state_class: available
    storage_mode_class: delegated
    origin: service_issued_delegated_identity

record_kind: credential_state_record
credential_state_schema_version: 1
credential_state_id: credential-state:remote:delegated-attach
state_class: available
display_label: Delegated remote credential active
subject:
  target_class: remote_target
  target_ref: remote-target:managed-devbox
  target_label: Managed devbox
  secret_class: ephemeral_operation_token
  scope_ref: remote-session:managed-devbox:active
  scope_label: Active managed devbox session
  audience_label: Remote attach control channel
authority:
  storage_mode_class: delegated
  store_source_class: remote_session_scoped_handle
  credential_origin_class: service_issued_delegated_identity
  authority_ref: credential-authority:remote-control-plane
  alias_ref: credential-alias:remote-devbox:session
  handle_ref: credential-handle:remote-devbox:session
  source_label: Service-issued delegated identity
  delegated_credential_ref: delegated-credential:remote-devbox:session
  policy_owner_ref: policy-owner:remote-platform
  browser_handoff_ref: null
  raw_secret_material_present: false
storage:
  trust_store_class: session_memory_cache
  unlock_state: unlocked
  store_capability_ref: store-capability:remote-session-scoped-handle
  store_verification_state: verified_available
  session_only_downgrade_visible: false
  supports_persistent_long_lived: false
  plaintext_fallback_allowed: false
  storage_note: The delegated identity is scoped to this remote session and expires with the attach authority.
lifetime:
  lifetime_class: time_bounded
  issued_at: "2026-04-29T09:25:00Z"
  expires_at: "2026-04-29T09:55:00Z"
  refresh_after: "2026-04-29T09:50:00Z"
  revocation_path_label: Stop remote credential forwarding
  lifetime_note: The delegated credential is session-scoped and revocable without exposing a local secret.
projection_mode: broker_callback
capability_implications:
