__fixture__:
  name: remote_credential_missing
  scenario: >
    A remote attach target requires SSH or delegated remote authority, but
    no broker alias, agent identity, or delegated credential exists for
    the target. The row blocks attach while preserving local workspace
    work and offering import or browser/device-code acquisition paths.
  contract_sections:
    - Credential-state vocabulary
    - Store-capability matrix
    - Export, support, and automation rules
  exercised_axes:
    state_class: absent
    target_class: remote_target
    store_source_class: no_secure_store

