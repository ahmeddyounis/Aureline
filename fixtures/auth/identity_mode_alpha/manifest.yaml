schema_version: 1
manifest_id: fixtures.auth.identity_mode_alpha
description: >
  Protected alpha fixtures for the account-free local versus self-hosted and
  managed identity-mode baseline.
runtime_consumer:
  rust_module: crates/aureline-auth/src/identity_modes/mod.rs
  shell_consumer: crates/aureline-shell/src/terminal_pane/mod.rs
  packet_record_kind: identity_mode_baseline_packet_record
required_assertions:
  - account-free local mode keeps local core available without account creation
  - self-hosted and managed rows disclose policy source, freshness, entitlement state, and offline behavior
  - offline or stale entitlement states pause managed-only actions with visible recovery
  - current deployment boundary is not broader than the active deployment profile
fixtures:
  - path: fixtures/auth/identity_mode_alpha/baseline_all_modes.json
    exercised_axes:
      - account_free_local_core
      - self_hosted_policy_source
      - managed_authoritative_policy
      - deployment_boundary_disclosure
  - path: fixtures/auth/identity_mode_alpha/managed_grace_pauses_new_managed.json
    exercised_axes:
      - managed_grace_state
      - offline_entitlement_visible_recovery
      - managed_actions_blocked
      - local_core_continues
