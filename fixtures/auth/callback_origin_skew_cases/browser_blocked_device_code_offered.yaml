__fixture__:
  name: browser_blocked_device_code_offered
  scenario: >
    A managed kiosk policy blocks the system-browser launch on this
    deployment. The interstitial keeps the system-browser row honest
    (blocked_with_visible_recovery), pre-discloses the device-code
    companion-card return route as the supported next step, and
    renders the code-expiry label and typed switch_to_device_code
    confirm action. Authority is narrowed visibly with a typed
    recovery; no embedded substitute is offered, and no path is
    advertised that the deployment cannot honour.
  exercised_axes:
    skew_class: browser_launch_policy_blocked_device_code_offered
    resulting_state: pending_review
    safe_recovery_action_class: switch_to_device_code
    authority_change_class: authority_narrowed_visible_recovery_required
    auth_flow_class: device_code
    requested_action_class: resume_existing_session
    callback_origin_class: device_code_poll_origin
    origin_verification_state: verified
    preferred_flow_class: device_code
    embedded_handoff_forbidden: true
  contract_sections:
    - Required interstitial fields
    - Callback-origin review rules
    - Availability disclosure rules
    - Confirm and reject actions

