__fixture__:
  name: expired_callback_after_browser_idle
  scenario: >
    The user opened the system browser, paused, and returned after
    the interstitial's expiry window closed. The interstitial fails
    closed with expired_before_review and the typed
    expiry_or_replay_policy_violation denial reason. Managed
    authority is held until the reviewer reopens; the host shell
    never silently re-prompts with a freshly minted policy after
    expiry. The reject path keeps local work intact; the confirm
    path is a typed retry_in_system_browser, not a silent retry.
  exercised_axes:
    skew_class: expiry_window_closed_before_review
    resulting_state: expired_before_review
    safe_recovery_action_class: retry_in_system_browser
    authority_change_class: authority_unchanged_managed_held_until_revalidation
    auth_flow_class: system_browser
    requested_action_class: refresh_existing_session
    callback_origin_class: loopback_http_origin
    origin_verification_state: verified
    denial_reason_class: expiry_or_replay_policy_violation
    embedded_handoff_forbidden: true
  contract_sections:
    - Required interstitial fields
    - Callback-origin review rules
    - Confirm and reject actions
    - Audit and export rules

