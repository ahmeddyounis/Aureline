__fixture__:
  name: passkey_unavailable_system_browser_fallback
  scenario: >
    The reviewer's platform authenticator is not capable of platform
    passkey on this deployment. The interstitial keeps the passkey
    row honest (unsupported_by_platform_or_authenticator), preserves
    the system-browser-first preferred flow, and pre-discloses the
    loopback callback origin and the typed open_in_system_browser
    confirm action. Authority is narrowed visibly with a typed
    recovery; no embedded passkey substitute is admissible, and the
    deployment never advertises a passkey path it cannot honour.
  exercised_axes:
    skew_class: passkey_unavailable_system_browser_fallback
    resulting_state: pending_review
    safe_recovery_action_class: retry_in_system_browser
    authority_change_class: authority_narrowed_visible_recovery_required
    auth_flow_class: system_browser
    requested_action_class: sign_in_new_session
    callback_origin_class: loopback_http_origin
    origin_verification_state: verified
    passkey_availability: unsupported_by_platform_or_authenticator
    preferred_flow_class: system_browser
    embedded_handoff_forbidden: true
  contract_sections:
    - Required interstitial fields
    - Availability disclosure rules
    - Confirm and reject actions

