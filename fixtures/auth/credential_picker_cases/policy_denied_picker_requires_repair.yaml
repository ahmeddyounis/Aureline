  target_ref: registry:crates:publish
  target_label: Registry publish
  secret_class: package_registry_token
  scope_ref: registry-scope:crates:org
  scope_label: Registry scope (org publish)
  audience_label: Package registry token
selected_option_id: null
options:
  - option_id: picker-option:policy:vault
    option_class: enterprise_secret_store
    availability_class: policy_blocked
    display_label: Enterprise vault
    source_label: Enterprise secret store
    scope_label: Organization-managed scope
    storage_mode_class: enterprise_secret_store
    store_source_class: enterprise_vault_adapter
    credential_origin_class: customer_managed_secret_store
    alias_ref: credential-alias:registry:crates:vault
    handle_ref: null
    delegated_credential_ref: null
    policy_owner_ref: policy-owner:security:secrets
    browser_handoff_ref: null
    expires_at: null
    refresh_after: null
    reveal_policy:
      raw_reveal_default: protocol_required_header_only
      reveal_on_demand_allowed: false
      clipboard_projection_allowed: false
      clipboard_lifetime_seconds: 0
      reveal_note: Policy blocks this vault source for the current scope; reveal is not offered on blocked sources.
    export_rules:
      handles_aliases_source_labels_may_travel: true
      raw_secret_material_may_travel: false
      private_keys_may_travel: false
      refresh_tokens_may_travel: false
      ambient_delegated_credentials_may_travel: false
      support_export_posture: blocked_by_policy
      automation_export_posture: blocked_by_policy
      export_note: Exports include policy owner and denial posture only; raw token bytes are excluded.
    safe_actions:
      primary_action: open_policy_detail
      fallback_actions:
        - request_policy_exception
      escalation_action: contact_admin
      safe_retry_allowed: false
      escalation_note: This source is blocked by policy for the current scope; contact an admin to change policy or grant an exception.
    open_source_of_truth_action:
      action_class: open_enterprise_vault
      action_label: Open enterprise vault policy context
      action_ref: null
    audit_event_refs:
      - secret-event:policy-denied:enterprise-vault
    option_note: Policy blocks this source; the picker surfaces the owner and a repair/escalation path rather than hiding the option.

  - option_id: picker-option:policy:env-pass
