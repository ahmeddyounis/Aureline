      handles_aliases_source_labels_may_travel: true
      raw_secret_material_may_travel: false
      private_keys_may_travel: false
      refresh_tokens_may_travel: false
      ambient_delegated_credentials_may_travel: false
      support_export_posture: metadata_only
      automation_export_posture: denied_until_prompt
      export_note: Exports include alias labels and audit refs only; raw token bytes are excluded.
    safe_actions:
      primary_action: import_credential
      fallback_actions:
        - start_browser_handoff
        - use_device_code_handoff
      escalation_action: contact_admin
      safe_retry_allowed: true
      escalation_note: Import a credential into an approved store or use a brokered handoff path; avoid storing raw tokens in workspace files.
    open_source_of_truth_action:
      action_class: open_os_keychain
      action_label: Open OS keychain entry
      action_ref: null
    audit_event_refs: []
    option_note: No keychain handle exists yet for this publish scope; import or acquire a handle through approved handoff flows.

audit_event_refs:
