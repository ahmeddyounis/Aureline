    open_source_of_truth_action:
      action_class: open_policy_source
      action_label: View policy source-of-truth
      action_ref: null
    audit_event_refs:
      - secret-event:policy-denied:env-passthrough
    option_note: Policy blocks reference-only environment sources for publish actions; the picker must not encourage literal secret entry as a workaround.

  - option_id: picker-option:policy:keychain
    option_class: system_credential_store
    availability_class: absent
    display_label: OS keychain
    source_label: System credential store
