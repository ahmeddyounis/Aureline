    delegated_credential_ref: null
    policy_owner_ref: policy-owner:security:secrets
    browser_handoff_ref: null
    expires_at: null
    refresh_after: null
    reveal_policy:
      raw_reveal_default: protocol_required_header_only
      reveal_on_demand_allowed: false
      clipboard_projection_allowed: false
      clipboard_lifetime_seconds: 0
