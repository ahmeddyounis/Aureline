# yaml-language-server: $schema=../../../schemas/auth/credential_picker_state.schema.json
__fixture__:
  name: policy_denied_picker_requires_repair
  scenario: >
    A registry auth picker shows explicit policy blocks for certain
    sources. The user sees what is blocked, what still works, and how to
    repair or escalate without copying raw secrets into portable state.
  contract_sections:
    - Vault/keychain picker contract
    - Rotation, rebinding, and source switching
  exercised_axes:
    target_class: package_registry
    denial: policy_blocked

record_kind: credential_picker_state_record
credential_picker_schema_version: 1
picker_state_id: credential-picker:registry:policy-block
display_label: Select registry credential source
subject:
