__fixture__:
  name: embedded_origin_disclosure
  scenario: >
    Embedded origin disclosure: an embedded surface shows a host-owned
    origin bar and capability limitations, and it must not impersonate
    native security/auth/update verification surfaces. Capture is denied
    inside the embedded surface until the host-native boundary admits it.
  exercised_axes:
    record_kinds:
      - embedded_surface_boundary_record
      - device_permission_row_record
      - mic_state_record
    embedded_surface_origin_bar: true
    impersonation_ban: true
  contract_sections:
    - "Embedded-webview origin bar (owner/origin chrome)"
    - "Device-permission row"

