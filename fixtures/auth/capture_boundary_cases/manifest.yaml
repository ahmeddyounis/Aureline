schema_version: 1
contract_ref: docs/auth/device_permission_and_capture_boundary_contract.md
device_permission_row_schema_ref: schemas/auth/device_permission_row.schema.json
mic_state_schema_ref: schemas/auth/mic_state.schema.json

rules:
  - Each YAML fixture is a scenario manifest containing a records array.
  - Each scenario includes at least one device_permission_row_record and one mic_state_record.
  - Records are export-safe: no raw audio, raw transcripts, raw URLs, or credential material.
  - Policy-blocked states remain distinct from unavailable states and keep a repair path discoverable.

cases:
  - fixture: local_dictation_preflight.yaml
    covers:
      - local_dictation
      - explicit_processing_locus_disclosure
      - no_retention_default
  - fixture: remote_provider_consent_preflight.yaml
    covers:
      - remote_provider_consent_disclosed_before_listening
      - system_browser_escape_hatch
      - provider_retention_terms_disclosed
  - fixture: privileged_voice_action_needs_confirmation.yaml
    covers:
      - privileged_voice_action_requires_review
      - mic_state_needs_confirmation
      - transcript_correction_path_discoverable
  - fixture: device_code_fallback_handoff.yaml
    covers:
      - device_code_fallback_distinct
      - local_work_continuity_visible
      - cancel_retry_paths
  - fixture: capture_export_review.yaml
    covers:
      - transcript_export_review
      - redaction_disclosure
      - export_vs_metadata_distinct
  - fixture: embedded_origin_disclosure.yaml
    covers:
      - embedded_origin_bar_fields
      - open_in_browser_fallback
      - impersonation_ban_native_reserved_surfaces

