      - enterprise_online
    provider_domain_label: "login.acme.example"
    destination_class_label: "Device code (system-browser launch blocked)"
    callback_correlation:
      correlation_id: "callback_correlation.device_code_fallback.0001"
      pending_session_id: "pending_session.device_code_fallback.0001"
      state_token_alias: "state_alias.device_code_fallback.0001"
      nonce_alias: "nonce_alias.device_code_fallback.0001"
      pkce_challenge_alias: null
      bound_workspace_ref: "workspace.payments_prod"
