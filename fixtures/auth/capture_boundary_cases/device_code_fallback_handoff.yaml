      bound_actor_subject_ref: "actor_subject.sam.acme"
      issued_at: "2026-04-29T16:45:00Z"
      expires_at: "2026-04-29T16:55:00Z"
      replay_posture: "single_use"
      redeemed_at: null
      callback_receipt_ref: null
    return_route:
      return_mode_class: device_code_poll_return
      return_anchor_ref: "return_anchor.device_code_fallback.payments_prod"
      return_target_label: "Aureline desktop – payments-prod workspace"
      return_origin_validation_class: device_code_poll_only
      return_tenant_or_workspace_match_rule: must_match_bound_workspace_and_tenant
      return_policy_check_refs:
        - "policy_check.managed.sign_in.required"
    preserved_local_work:
      posture_class: local_work_intact_with_managed_narrowed
      note: >
        Local editing, save, undo, search, local Git, local tasks, and BYOK AI
        remain available while managed sign-in is incomplete. Managed capabilities
        stay narrowed until device-code completion.
      retained_capabilities:
        - "Open, edit, save, and undo the workspace locally."
        - "Continue working without any browser session active."
        - "Cancel the device-code flow without losing local state."
      blocked_capabilities:
        - "Use managed capabilities that require the managed session."
    recovery_path:
      primary_recovery_action: switch_to_device_code
      fallback_recovery_actions:
        - continue_local_without_sign_in
        - contact_support_with_export
      visible_recovery_required: true
      recovery_copy_label: "Use device code to sign in. Local work stays on this device."
      repair_hook_ref: "repair_hook.device_code_fallback.0001"
    reserved_rows:
      - row_kind: passkey_capable
        row_state: reserved_for_future_row
        applies_to_boundary_class:
          - managed
          - self_hosted
        note: "Passkeys may be available on the system-browser path when browser launch is restored."
      - row_kind: reauth_required
        row_state: reserved_for_future_row
        applies_to_boundary_class:
          - managed
          - restricted_managed_only
        note: "Reserved for the session-expiry / policy-epoch-roll reauth row."
      - row_kind: seat_loss
        row_state: reserved_for_future_row
        applies_to_boundary_class:
          - managed
          - restricted_managed_only
        note: "Reserved for the managed seat-loss row; local work remains representable."
      - row_kind: deprovision_preserves_local_work
        row_state: supported_capability_declared
        applies_to_boundary_class:
          - managed
          - restricted_managed_only
          - grace_degraded_managed
        preserves_local_work: true
        note: "Managed deprovision preserves local work and export."
    browser_handoff_packet_ref: "browser_handoff_packet.device_code_fallback.0001"
    origin_disclosure_ref: "origin_disclosure.device_code_fallback.payments_prod.01"
