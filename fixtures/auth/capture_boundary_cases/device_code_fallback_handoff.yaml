__fixture__:
  name: device_code_fallback_handoff
  scenario: >
    Device-code fallback: browser launch is blocked, so the handoff uses
    device code. The auth handoff packet remains explicit about the flow
    kind, provider identity, return posture, local continuity, and
    recovery actions. Capture stays unavailable until the handoff
    completes.
  exercised_axes:
    record_kinds:
      - auth_callback_packet_record
      - device_permission_row_record
      - mic_state_record
    auth_flow_class: device_code
    return_mode_class: device_code_poll_return
  contract_sections:
    - "Browser/device-code handoff card"
    - "Device-permission row"
    - "Mic-state pill"

records:
  - $schema: ../../../schemas/auth/auth_callback_state.schema.json
    record_kind: auth_callback_packet_record
    auth_callback_state_schema_version: 1
    packet_id: "auth_callback_packet.device_code_fallback.0001"
    auth_flow_class: device_code
    browser_launch_policy_class: system_default_browser_required
    pending_session_state: awaiting_browser_return
    account_boundary_class: managed
    identity_mode: managed_workspace
    deployment_profile_scope:
