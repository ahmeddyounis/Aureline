__fixture__:
  name: remote_provider_consent_preflight
  scenario: >
    Remote speech provider consent preflight: OS microphone permission is
    granted, but capture is unavailable until provider consent is
    completed through a system-browser boundary. The device-permission
    row and mic-state pill both disclose remote processing locus and the
    provider retention posture before listening begins.
  exercised_axes:
    record_kinds:
      - device_permission_row_record
      - mic_state_record
    processing_locus_class: byok_remote_provider
    retention_posture_class: provider_retained_under_terms
    system_browser_escape_hatch: true
  contract_sections:
    - "Device-permission row"
    - "Browser/device-code handoff card"
    - "Mic-state pill"

