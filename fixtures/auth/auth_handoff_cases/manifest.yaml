schema_version: 1
contract_ref: docs/auth/auth_handoff_interstitial_contract.md
auth_handoff_interstitial_schema_ref: schemas/auth/auth_handoff_interstitial.schema.json
embedded_auth_exception_register_schema_ref: schemas/auth/embedded_auth_exception.schema.json

rules:
  - Every interstitial fixture validates as one auth_handoff_interstitial_record.
  - Every register fixture validates as one embedded_auth_exception_register_record.
  - Callback origin, requested action class, provider/domain, target scope, expiry/replay policy, availability disclosure, native-approval boundary, and confirm/reject actions are all present on every interstitial fixture.
  - Embedded auth paths are admissible only when an active register entry is quoted by the interstitial.
  - System-browser, device-code, and passkey availability rows are disclosed honestly; deployments that cannot honour a path MUST NOT advertise it as supported.
  - Raw tokens, raw URLs, raw cookies, raw codes, raw nonces, raw PKCE verifiers, raw passkey material, raw passwords, and raw provider query strings never appear; every reference is opaque-id-aliased.

cases:
  - fixture: system_browser_managed_sign_in_interstitial.yaml
    record_kind: auth_handoff_interstitial_record
    covers:
      - system_browser_first
      - sign_in_new_session
      - loopback_http_origin
      - preserved_local_work_quoted_by_ref
  - fixture: device_code_fallback_interstitial.yaml
    record_kind: auth_handoff_interstitial_record
    covers:
      - device_code_fallback
      - resume_existing_session
      - browser_launch_policy_blocked_with_visible_recovery
      - device_code_poll_origin
  - fixture: passkey_step_up_interstitial.yaml
    record_kind: auth_handoff_interstitial_record
    covers:
      - platform_authenticator_native
      - step_up_authority
      - product_owned_native_required
      - reserved_native_surface_linkage
  - fixture: embedded_session_refresh_exception_register_entry.yaml
    record_kind: embedded_auth_exception_register_record
    covers:
      - embedded_session_refresh
      - session_refresh_only_scope
      - lower_trust_presentation_session_refresh
      - host_native_approval_required
  - fixture: embedded_password_exception_register_entry.yaml
    record_kind: embedded_auth_exception_register_record
    covers:
      - embedded_password_exception
      - legacy_provider_requires_embedded_password
      - no_high_risk_actions_scope
      - no_password_persistence_required
  - fixture: scope_grant_rejected_by_user_interstitial.yaml
    record_kind: auth_handoff_interstitial_record
    covers:
      - scope_grant
      - rejected_by_user
      - product_owned_native_required
      - typed_reject_outcome
  - fixture: callback_origin_mismatch_denied_interstitial.yaml
    record_kind: auth_handoff_interstitial_record
    covers:
      - denied_origin_mismatch
      - callback_origin_mismatch
      - typed_denial_reason
      - preserved_local_work_intact_after_denial
