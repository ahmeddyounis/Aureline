__fixture__:
  name: scope_grant_rejected_by_user_interstitial
  scenario: >
    A scope-grant handoff is presented for review. The reviewer sees
    the requested action class, the provider domain label, the
    callback origin, the target scope, and the typed reject action,
    and rejects the grant with continue_local_without_sign_in. The
    interstitial transitions to rejected_by_user, the preserved-
    local-work assertion remains true, and no embedded fallback or
    silent retry is admissible. Because scope_grant crosses a
    product-owned/native boundary, the confirm action is host-native;
    the rejection is a typed outcome, not a silent abort.
  exercised_axes:
    auth_flow_class: system_browser
    requested_action_class: scope_grant
    interstitial_state: rejected_by_user
    rejection_outcome_class: continue_local_without_sign_in
    product_owned_native_required: true
    embedded_handoff_forbidden: true
  contract_sections:
    - Required interstitial fields
    - Confirm and reject actions
    - Native-approval boundary linkage

