# yaml-language-server: $schema=../../../schemas/auth/auth_handoff_interstitial.schema.json
__fixture__:
  name: passkey_step_up_interstitial
  scenario: >
    A managed step-up is required before a privileged managed action
    can resume. The interstitial pre-discloses the platform-
    authenticator-native return route, the requested action class
    (step_up_authority — which crosses a product-owned/native
    boundary), the target scope, the passkey-capable availability
    posture, and the typed confirm/reject actions reviewers exercise.
    The confirm action lands on a host-native step-up review surface
    rather than any embedded path.
  exercised_axes:
    auth_flow_class: platform_authenticator_native
    requested_action_class: step_up_authority
    callback_origin_class: platform_authenticator_native_origin
    preferred_flow_class: platform_authenticator_native
    passkey_availability: supported
    product_owned_native_required: true
    embedded_handoff_forbidden: true
    interstitial_state: pending_review
  contract_sections:
    - Requested-action review rules
    - Native-approval boundary linkage
    - Availability disclosure rules

