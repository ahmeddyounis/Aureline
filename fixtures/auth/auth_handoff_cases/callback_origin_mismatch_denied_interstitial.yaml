__fixture__:
  name: callback_origin_mismatch_denied_interstitial
  scenario: >
    A returning browser state arrives whose origin does not match the
    pre-disclosed loopback callback the interstitial declared. The
    interstitial fails closed with denied_origin_mismatch and the
    typed callback_origin_mismatch denial reason. The reject action
    routes the user to continue local without sign-in; preserved
    local work remains intact, no embedded fallback is offered, and
    no silent retry to a different origin is admissible.
  exercised_axes:
    auth_flow_class: system_browser
    requested_action_class: sign_in_new_session
    interstitial_state: denied_origin_mismatch
    denial_reason_class: callback_origin_mismatch
    embedded_handoff_forbidden: true
  contract_sections:
    - Callback-origin review rules
    - Confirm and reject actions
    - Audit and export rules

