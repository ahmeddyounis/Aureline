__fixture__:
  name: device_code_fallback_interstitial
  scenario: >
    A managed kiosk policy blocks the system-browser launch on this
    deployment, so the supported handoff is device-code. The
    interstitial pre-discloses the device-code companion-card return
    route, the user-visible expiry label for the short-lived code,
    the requested action (resume the existing managed session), the
    target scope, and the typed confirm/reject actions reviewers
    exercise. Embedded handoff is forbidden; no exception register
    entry is quoted.
  exercised_axes:
    auth_flow_class: device_code
    requested_action_class: resume_existing_session
    callback_origin_class: device_code_poll_origin
    preferred_flow_class: device_code
    system_browser_availability: blocked_with_visible_recovery
    embedded_handoff_forbidden: true
    interstitial_state: pending_review
  contract_sections:
    - Required interstitial fields
    - Callback-origin review rules
    - Availability disclosure rules

