# yaml-language-server: $schema=../../../schemas/auth/embedded_auth_exception.schema.json
__fixture__:
  name: embedded_password_exception_register_entry
  scenario: >
    A legacy enterprise IdP cannot speak system browser, device code,
    or platform passkey for one specific provider domain, so the
    register holds a narrow embedded-password exception. Host-native
    approval is still required for any high-risk action; the lower-
    trust badge, the host-native-approval-still-required cue, and the
    no-password-persistence cue are all required. The entry's scope
    is no_high_risk_actions, so the action classes are bounded to
    sign-in, resume, and refresh; step-up, admin step-up, scope grant,
    org switch, and deprovision acknowledge are forbidden.
  exercised_axes:
    approved_embedded_flow_class: embedded_password_exception
    exception_reason: legacy_provider_requires_embedded_password
    exception_scope_class: no_high_risk_actions
    review_state: active
    host_native_approval_required: true
    no_password_persistence_required: true
  contract_sections:
    - Embedded-auth exception register rules
    - Lower-trust presentation requirements

