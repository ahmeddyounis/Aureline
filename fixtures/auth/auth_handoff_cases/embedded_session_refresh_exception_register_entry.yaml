    - prefer_platform_authenticator_when_supported
    - fallback_to_continue_local_without_sign_in
  no_fallback_admissible: false
  fallback_summary_label: Prefer system browser, then device code, then platform passkey; fall back to embedded session refresh only inside this register entry.
lower_trust_presentation:
