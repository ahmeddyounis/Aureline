# yaml-language-server: $schema=../../../schemas/auth/embedded_auth_exception.schema.json
__fixture__:
  name: embedded_session_refresh_exception_register_entry
  scenario: >
    A managed deployment quotes an active embedded-session-refresh
    exception register entry: an already-authenticated session may
    renew narrowly inside the existing session without password
    collection or scope widening. The fallback rule keeps system
    browser, device code, and platform passkey ahead of the embedded
    path. The host shell renders the lower-trust cues and the visible
    capability limitation set; the entry expires in two weeks and is
    quoted by an interstitial whose auth_flow_class is
    embedded_session_refresh.
  exercised_axes:
    approved_embedded_flow_class: embedded_session_refresh
    exception_reason: session_refresh_without_password_only
    exception_scope_class: session_refresh_only
    review_state: active
    host_native_approval_required: true
  contract_sections:
    - Embedded-auth exception register rules
    - Lower-trust presentation requirements

record_kind: embedded_auth_exception_register_record
embedded_auth_exception_register_schema_version: 1
register_entry_id: embedded-auth-exception-register:session-refresh:0001
boundary_record_exception_id_ref: embedded-auth-exception:boundary-card:session-refresh:0001
