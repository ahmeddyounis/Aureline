__fixture__:
  name: accessible_fallback_device_code
  scenario: >
    A managed sign-in cannot use the platform authenticator on this
    deployment. The state separates authenticator incompatibility from
    network or policy failure, offers device-code or equivalent
    fallback where allowed, and keeps local work available.
  exercised_contract_sections:
    - passkey_availability
    - reauth_requirement_object
    - diagnostic_separation

