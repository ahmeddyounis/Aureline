    deprovisions the account. Seat-bound managed capabilities stop
    promptly, but local files, unsaved edits, local Git, local tasks,
    diagnostics, and user-owned export remain available without a live
    managed seat.
  exercised_contract_sections:
    - seat_removal
    - account_deprovisioning
    - offboarding_export

