__fixture__:
  name: org_switch_preserves_local
  scenario: >
    The user switches from one managed org scope to another. Tenant
    policy requires fresh auth before managed collaboration and hosted
    AI can move to the target org, but the local workspace remains
    editable, saveable, undoable, and exportable.
  exercised_contract_sections:
    - org_switch
    - no_silent_signout
    - diagnostic_separation

