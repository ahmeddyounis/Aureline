schema_version: 1
manifest_id: fixtures.auth.system_browser_alpha
description: >
  Protected alpha fixtures for claimed identity rows that default to
  system-browser auth while exposing device-code and stay-local fallback paths.
runtime_consumer:
  rust_module: crates/aureline-auth/src/system_browser/mod.rs
  shell_consumer: crates/aureline-shell/src/terminal_pane/mod.rs
  packet_record_kind: system_browser_claimed_identity_packet_record
required_assertions:
  - claimed managed or provider-linked rows prefer system-browser auth when policy allows it
  - browser launch denial exposes device-code and stay-local alternatives
  - auth scope denial keeps local work available and does not create a dead end
  - provider/domain scope, timeout or expiry, and local-continuity copy are inspectable
fixtures:
  - path: fixtures/auth/system_browser_alpha/managed_claim_prefers_system_browser.json
    exercised_axes:
      - system_browser_default
      - device_code_available
      - stay_local_available
      - provider_org_scope_visible
  - path: fixtures/auth/system_browser_alpha/browser_blocked_device_code_or_stay_local.json
    exercised_axes:
      - browser_launch_policy_blocked
      - device_code_default
      - stay_local_available
      - native_boundary_ref_reused
  - path: fixtures/auth/system_browser_alpha/scope_denied_stay_local.json
    exercised_axes:
      - auth_denied
      - local_continuation_default
      - no_dead_end_auth_failure
