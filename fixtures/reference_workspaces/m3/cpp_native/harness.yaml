    expected_outcome: pass
    latest_result: not_run
    evidence_outputs:
      - migration_compatibility_scorecard_row

  - harness_entry_id: harness.beta.cpp_native.support_export
    workflow_id: workflow.beta.cpp_native.support_export
    workflow_class: supportability
    command_shape:
      runner: support_export_projection
      action: export_toolchain_compile_database_debug_and_test_summary_without_raw_private_bytes
      raw_command_policy: no_raw_commands_in_fixture
