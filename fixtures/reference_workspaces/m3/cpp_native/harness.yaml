# Beta C/C++ native reference-workspace harness.

schema_version: 1
harness_id: harness.beta.cpp_native
workspace_packet_ref: fixtures/reference_workspaces/m3/cpp_native/workspace.yaml
reference_workspace_id: refws.c_cpp_native_archetype_seed
result_vocabulary:
  - pass
  - fail
  - blocked
  - not_run

harness_entries:
  - harness_entry_id: harness.beta.cpp_native.first_open_configure
    workflow_id: workflow.beta.cpp_native.first_open_configure
    workflow_class: benchmark
    command_shape:
      runner: benchmark_lab
      action: open_workspace_capture_compile_database_and_clangd_readiness
      raw_command_policy: no_raw_commands_in_fixture
    fixture_refs:
      - fixtures/workspaces/reference/c_cpp_native_archetype_seed.json
    expected_outcome: pass
    latest_result: not_run
    evidence_outputs:
      - benchmark_open_trace
      - compile_database_snapshot

  - harness_entry_id: harness.beta.cpp_native.build_run
    workflow_id: workflow.beta.cpp_native.build_run
    workflow_class: run
    command_shape:
      runner: cmake_ninja_runner
      action: configure_build_and_run_default_target
      raw_command_policy: no_raw_commands_in_fixture
    fixture_refs:
      - fixtures/runtime/m3/evidence_packets/local_task_compatible.json
    expected_outcome: pass
    latest_result: not_run
    evidence_outputs:
      - task_event_envelope

  - harness_entry_id: harness.beta.cpp_native.test
    workflow_id: workflow.beta.cpp_native.test
    workflow_class: test
    command_shape:
      runner: ctest_runner
      action: run_single_native_test_target_and_normalize_result
