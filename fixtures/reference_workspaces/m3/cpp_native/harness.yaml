      - task_event_envelope

  - harness_entry_id: harness.beta.cpp_native.debug
    workflow_id: workflow.beta.cpp_native.debug
    workflow_class: debug
    command_shape:
      runner: lldb_or_gdb_adapter
      action: start_debug_target_and_record_symbol_resolution_state
      raw_command_policy: no_raw_commands_in_fixture
    fixture_refs:
      - fixtures/debug/mapping_cases/native_symbol_dwarf_split_symbols_missing.json
      - fixtures/debug/chronology_cases/supported_recorded_session.yaml
    expected_outcome: pass
    latest_result: not_run
