# Beta C/C++ native reference-workspace packet.

schema_version: 1
workspace_packet_id: refws_packet.beta.cpp_native
register_row_ref: m3_reference_workspace:cpp_native
reference_workspace_id: refws.c_cpp_native_archetype_seed
workspace_descriptor_ref: fixtures/workspaces/reference/c_cpp_native_archetype_seed.json
archetype_row_ref: archetype_row:c_or_cpp_native_project
workflow_bundle_ref: launch_bundle:c_or_cpp_native_project.seed
support_claim:
  channel_scope: beta
  declared_support_class: experimental
  target_support_class_at_beta_exit: supported
  beta_claim_posture: limited_until_current_capture

owner:
  owner_dri: "@ahmeddyounis"
  evidence_owner_ref: lane:benchmark_lab
  publication_owner_ref: lane:release_evidence
  privacy_reviewer_ref: lane:docs_public_truth
  backup_owner_ref_or_waiver: waiver:single-maintainer-backup

toolchain_manifest:
  manifest_id: toolchain_manifest.beta.cpp_native
  exact_versions:
    cmake: "3.29.6"
    ninja: "1.12.1"
    clangd: "18.1.8"
    lldb: "18.1.8"
    gdb: "14.2"
  os_arch_coverage_targets:
    - macos_arm64
    - macos_x86_64
    - linux_x86_64
    - windows_x86_64
  mode_coverage:
    supported:
      - local_only
    not_claimed:
      - remote_attach
      - managed_workspace
      - devcontainer
  version_source_ref: fixtures/workspaces/reference/c_cpp_native_archetype_seed.json#declared_toolchain

privacy_license:
  source_class: synthetic
  privacy_class: public_synthetic
  privacy_decision: admit_public
  reviewed_on: "2026-05-17"
  license_status: synthetic_no_real_content
  note: >
    Synthetic CMake/Ninja/clangd shape authored for this repository; no
    vendored library, generated host cache, proprietary symbol file, or
    partner bytes are included.

corpus_refs:
  - corpus.reference.c_cpp_native_archetype_seed
  - corpus.archetype.c_cpp_native_seed
  - corpus.workflow.first_useful_edit_c_cpp_native

protected_workflows:
  - workflow_id: workflow.beta.cpp_native.first_open_configure
    workflow_class: benchmark
    required_harness_entry_ref: harness.beta.cpp_native.first_open_configure
  - workflow_id: workflow.beta.cpp_native.build_run
    workflow_class: run
    required_harness_entry_ref: harness.beta.cpp_native.build_run
  - workflow_id: workflow.beta.cpp_native.test
    workflow_class: test
    required_harness_entry_ref: harness.beta.cpp_native.test
  - workflow_id: workflow.beta.cpp_native.debug
    workflow_class: debug
    required_harness_entry_ref: harness.beta.cpp_native.debug
  - workflow_id: workflow.beta.cpp_native.migration_probe
    workflow_class: migration
    required_harness_entry_ref: harness.beta.cpp_native.migration_probe
  - workflow_id: workflow.beta.cpp_native.support_export
    workflow_class: supportability
    required_harness_entry_ref: harness.beta.cpp_native.support_export

consumer_bindings:
  compatibility_report_refs:
    - artifacts/compat/m3/reference_workspace_register.yaml
    - artifacts/compat/m3/archetype_scorecards/c_or_cpp_native_project.md
  benchmark_refs:
    - fixtures/benchmarks/corpus_manifest.yaml
    - artifacts/benchmarks/m3/protected_fitness_catalog.yaml
  run_test_debug_refs:
    - fixtures/debug/mapping_cases/native_symbol_dwarf_split_symbols_missing.json
    - fixtures/debug/chronology_cases/supported_recorded_session.yaml
    - fixtures/runtime/m3/evidence_packets/local_task_compatible.json
  migration_refs:
    - artifacts/migration/source_ecosystem_rows.yaml#migration_source:vs_code_code_oss
    - artifacts/migration/source_ecosystem_rows.yaml#migration_source:sublime_textmate
  supportability_refs:
    - fixtures/support/escalation_packet_completeness_cases/missing_toolchain_required_component.yaml
    - docs/support/m3/support_scenario_corpus.md
  release_evidence_refs:
    - docs/release/certified_archetype_report_template.md
    - docs/release/release_evidence_packet_template.md

governance:
  corpus_asset_state: protected_product_asset
  register_revision_ref: artifacts/compat/m3/reference_workspace_register.yaml
  freshness_cadence: each_release
  stale_when:
    - workspace_descriptor_changes
    - toolchain_manifest_changes
    - protected_workflow_set_changes
    - archetype_scorecard_expires
  owner_check_required: true
  design_partner_mapping: admissible_as_supplemental_evidence_not_primary_proof
