# Beta Rust workspace reference-workspace packet.

schema_version: 1
workspace_packet_id: refws_packet.beta.rust_workspace
register_row_ref: m3_reference_workspace:rust_workspace
reference_workspace_id: refws.small_rust_self_host_slice
workspace_descriptor_ref: fixtures/workspaces/reference/small_rust_self_host_slice.json
archetype_row_ref: archetype_row:rust_workspace
workflow_bundle_ref: launch_bundle:rust_workspace.seed
support_claim:
  channel_scope: beta
  declared_support_class: supported
  target_support_class_at_beta_exit: supported
  beta_claim_posture: supported_with_current_self_host_slice

owner:
  owner_dri: "@ahmeddyounis"
  evidence_owner_ref: lane:benchmark_lab
  publication_owner_ref: lane:release_evidence
  privacy_reviewer_ref: lane:docs_public_truth
  backup_owner_ref_or_waiver: waiver:single-maintainer-backup

toolchain_manifest:
  manifest_id: toolchain_manifest.beta.rust_workspace
  exact_versions:
    rustc: "1.84.0"
    cargo: "1.84.0"
    rustfmt: "1.84.0"
    clippy: "1.84.0"
  os_arch_coverage_targets:
    - macos_arm64
    - macos_x86_64
    - linux_x86_64
    - windows_x86_64
  mode_coverage:
    supported:
      - local_only
    not_claimed:
      - remote_attach
      - managed_workspace
      - devcontainer
  version_source_ref: rust-toolchain.toml

privacy_license:
  source_class: self_host_slice
  privacy_class: public_sanitised
  privacy_decision: admit_public
  reviewed_on: "2026-05-17"
  license_status: original_author_aureline_project_mit_0bsd_choice
  note: >
    Live repository slice constrained by include/exclude globs. Benchmark
    reports record the resolved commit and file list; no vendored
    dependency tree or private partner bytes are included.

corpus_refs:
  - corpus.reference.small_rust_self_host_slice
  - corpus.workflow.first_useful_edit_rust_self_host

protected_workflows:
  - workflow_id: workflow.beta.rust_workspace.first_open_metadata
    workflow_class: benchmark
    required_harness_entry_ref: harness.beta.rust_workspace.first_open_metadata
  - workflow_id: workflow.beta.rust_workspace.build
    workflow_class: run
    required_harness_entry_ref: harness.beta.rust_workspace.build
  - workflow_id: workflow.beta.rust_workspace.test
    workflow_class: test
    required_harness_entry_ref: harness.beta.rust_workspace.test
  - workflow_id: workflow.beta.rust_workspace.debug
    workflow_class: debug
    required_harness_entry_ref: harness.beta.rust_workspace.debug
  - workflow_id: workflow.beta.rust_workspace.migration_probe
    workflow_class: migration
    required_harness_entry_ref: harness.beta.rust_workspace.migration_probe
  - workflow_id: workflow.beta.rust_workspace.support_export
    workflow_class: supportability
    required_harness_entry_ref: harness.beta.rust_workspace.support_export

consumer_bindings:
  compatibility_report_refs:
    - artifacts/compat/m3/reference_workspace_register.yaml
    - artifacts/compat/m3/archetype_scorecards/rust_workspace.md
  benchmark_refs:
    - fixtures/benchmarks/corpus_manifest.yaml
    - artifacts/benchmarks/m3/protected_fitness_catalog.yaml
  run_test_debug_refs:
    - fixtures/tooling/target_graph_cases/native_cargo_target_graph.yaml
    - fixtures/tooling/task_event_replay/native_cargo_test_case_outcome.json
    - fixtures/debug/chronology_cases/supported_recorded_session.yaml
  migration_refs:
    - artifacts/migration/source_ecosystem_rows.yaml#migration_source:vim_neovim
    - artifacts/migration/source_ecosystem_rows.yaml#migration_source:emacs
  supportability_refs:
    - fixtures/support/escalation_packet_completeness_cases/missing_toolchain_required_component.yaml
    - docs/support/m3/support_scenario_corpus.md
  release_evidence_refs:
    - docs/release/certified_archetype_report_template.md
    - docs/release/release_evidence_packet_template.md

governance:
  corpus_asset_state: protected_product_asset
  register_revision_ref: artifacts/compat/m3/reference_workspace_register.yaml
  freshness_cadence: each_release
  stale_when:
    - rust_toolchain_pin_changes
    - live_repo_slice_globs_change
    - protected_workflow_set_changes
    - archetype_scorecard_expires
  owner_check_required: true
  design_partner_mapping: admissible_as_supplemental_evidence_not_primary_proof
