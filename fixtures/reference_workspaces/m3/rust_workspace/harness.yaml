    expected_outcome: pass
    latest_result: not_run
    evidence_outputs:
      - test_tree_row
      - task_event_envelope

  - harness_entry_id: harness.beta.rust_workspace.debug
    workflow_id: workflow.beta.rust_workspace.debug
    workflow_class: debug
    command_shape:
      runner: cargo_debug_adapter
      action: start_or_replay_supported_recorded_debug_session
      raw_command_policy: no_raw_commands_in_fixture
    fixture_refs:
