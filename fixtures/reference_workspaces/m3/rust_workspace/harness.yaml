# Beta Rust workspace reference-workspace harness.

schema_version: 1
harness_id: harness.beta.rust_workspace
workspace_packet_ref: fixtures/reference_workspaces/m3/rust_workspace/workspace.yaml
reference_workspace_id: refws.small_rust_self_host_slice
result_vocabulary:
  - pass
  - fail
  - blocked
  - not_run

harness_entries:
  - harness_entry_id: harness.beta.rust_workspace.first_open_metadata
    workflow_id: workflow.beta.rust_workspace.first_open_metadata
    workflow_class: benchmark
    command_shape:
      runner: benchmark_lab
      action: open_live_repo_slice_and_capture_cargo_metadata_readiness
      raw_command_policy: no_raw_commands_in_fixture
    fixture_refs:
      - fixtures/workspaces/reference/small_rust_self_host_slice.json
      - fixtures/tooling/target_graph_cases/native_cargo_target_graph.yaml
    expected_outcome: pass
    latest_result: not_run
    evidence_outputs:
      - benchmark_open_trace
      - target_graph_snapshot

  - harness_entry_id: harness.beta.rust_workspace.build
    workflow_id: workflow.beta.rust_workspace.build
    workflow_class: run
    command_shape:
      runner: cargo_runner
      action: build_workspace_slice_with_repo_pinned_toolchain
      raw_command_policy: no_raw_commands_in_fixture
