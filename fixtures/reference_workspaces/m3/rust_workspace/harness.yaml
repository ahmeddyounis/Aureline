  - harness_entry_id: harness.beta.rust_workspace.support_export
    workflow_id: workflow.beta.rust_workspace.support_export
    workflow_class: supportability
    command_shape:
      runner: support_export_projection
      action: export_toolchain_target_graph_and_test_summary_without_raw_private_bytes
      raw_command_policy: no_raw_commands_in_fixture
    fixture_refs:
