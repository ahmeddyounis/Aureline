# Beta Go service reference-workspace packet.

schema_version: 1
workspace_packet_id: refws_packet.beta.go_service
register_row_ref: m3_reference_workspace:go_service
reference_workspace_id: refws.go_service_archetype_seed
workspace_descriptor_ref: fixtures/workspaces/reference/go_service_archetype_seed.json
archetype_row_ref: archetype_row:go_service_or_monorepo_slice
workflow_bundle_ref: launch_bundle:go_service_or_monorepo_slice.seed
support_claim:
  channel_scope: beta
  declared_support_class: experimental
  target_support_class_at_beta_exit: supported
  beta_claim_posture: limited_until_current_capture

owner:
  owner_dri: "@ahmeddyounis"
  evidence_owner_ref: lane:benchmark_lab
  publication_owner_ref: lane:release_evidence
  privacy_reviewer_ref: lane:docs_public_truth
  backup_owner_ref_or_waiver: waiver:single-maintainer-backup

toolchain_manifest:
  manifest_id: toolchain_manifest.beta.go_service
  exact_versions:
    go: "1.22.5"
    delve: "1.23.1"
  os_arch_coverage_targets:
    - macos_arm64
    - macos_x86_64
    - linux_x86_64
    - windows_x86_64
  mode_coverage:
    supported:
      - local_only
    not_claimed:
      - remote_attach
      - managed_workspace
      - devcontainer
  version_source_ref: fixtures/workspaces/reference/go_service_archetype_seed.json#declared_toolchain

privacy_license:
  source_class: synthetic
  privacy_class: public_synthetic
  privacy_decision: admit_public
  reviewed_on: "2026-05-17"
  license_status: synthetic_no_real_content
  note: >
    Synthetic Go module/workspace shape authored for this repository; no
    third-party module cache, private repo layout, customer endpoint, or
    partner bytes are included.

corpus_refs:
  - corpus.reference.go_service_archetype_seed
  - corpus.archetype.go_service_seed
  - corpus.workflow.first_useful_edit_go_service

protected_workflows:
  - workflow_id: workflow.beta.go_service.first_open_module_graph
    workflow_class: benchmark
    required_harness_entry_ref: harness.beta.go_service.first_open_module_graph
  - workflow_id: workflow.beta.go_service.run
    workflow_class: run
    required_harness_entry_ref: harness.beta.go_service.run
  - workflow_id: workflow.beta.go_service.test
    workflow_class: test
    required_harness_entry_ref: harness.beta.go_service.test
  - workflow_id: workflow.beta.go_service.debug
    workflow_class: debug
    required_harness_entry_ref: harness.beta.go_service.debug
  - workflow_id: workflow.beta.go_service.migration_probe
    workflow_class: migration
    required_harness_entry_ref: harness.beta.go_service.migration_probe
  - workflow_id: workflow.beta.go_service.support_export
    workflow_class: supportability
    required_harness_entry_ref: harness.beta.go_service.support_export

consumer_bindings:
  compatibility_report_refs:
    - artifacts/compat/m3/reference_workspace_register.yaml
    - artifacts/compat/m3/archetype_scorecards/go_service_or_monorepo_slice.md
  benchmark_refs:
    - fixtures/benchmarks/corpus_manifest.yaml
    - artifacts/benchmarks/m3/protected_fitness_catalog.yaml
  run_test_debug_refs:
    - fixtures/tooling/task_event_replay/unsupported_source_preserved.json
    - fixtures/runtime/m3/evidence_packets/local_test_policy_advanced_clean.json
  migration_refs:
    - artifacts/migration/source_ecosystem_rows.yaml#migration_source:vs_code_code_oss
    - artifacts/migration/source_ecosystem_rows.yaml#migration_source:vim_neovim
  supportability_refs:
    - fixtures/support/escalation_packet_completeness_cases/missing_toolchain_required_component.yaml
    - docs/support/m3/support_scenario_corpus.md
  release_evidence_refs:
    - docs/release/certified_archetype_report_template.md
    - docs/release/release_evidence_packet_template.md

governance:
  corpus_asset_state: protected_product_asset
  register_revision_ref: artifacts/compat/m3/reference_workspace_register.yaml
  freshness_cadence: each_release
  stale_when:
    - workspace_descriptor_changes
    - toolchain_manifest_changes
    - protected_workflow_set_changes
    - archetype_scorecard_expires
  owner_check_required: true
  design_partner_mapping: admissible_as_supplemental_evidence_not_primary_proof
