# yaml-language-server: $schema=../../../schemas/editor/decode_recovery_review.schema.json
$schema: ../../../schemas/editor/decode_recovery_review.schema.json
__fixture__:
  name: diff_view_raw_rendered_divergence
  scenario: >
    A diff hunk contains mixed-direction technical content with a bidi
    isolate around a path. The bytes decode cleanly, but rendered order
    can mislead review, so raw and escaped choices stay reachable and
    suspicious-text linkage survives export.
  required_coverage:
    - diff_view
    - suspicious_text_linkage
    - mixed_direction_linkage
record_kind: decode_recovery_review_record
decode_recovery_review_schema_version: 1
review_id: editor:decode-review:diff-bidi-raw-rendered:01
emitted_at: "2026-04-29T18:18:00Z"
trigger_surface: diff
subject:
  subject_ref: subject:diff:build-log-path:01
  content_ref: content:diff:build-log-path:hunk:01
  display_label: README.md hunk
  content_kind: diff_hunk
  trust_state: trusted
decode_state:
  detected_encoding: utf8
  detection_source: utf8_heuristic
  bom_state_detected: absent
  newline_mode_detected: lf
  final_newline_detected: present
  decode_recovery_class: clean_decode
  raw_bytes_posture: preserved_in_open_buffer
  raw_bytes_journal_ref: null
byte_findings:
  - finding_id: finding:diff:bidi-isolate-path
    finding_class: valid_text_bytes
    byte_range:
      start: 38
      length: 13
      unit: byte_offset
    raw_bytes_hex: "0xE2 0x81 0xA6 0x2E 0x2F 0x62 0x75 0x69 0x6C 0x64 0xE2 0x81 0xA9"
    rendered_projection: rendered_exactly
    replacement_marker: null
    user_facing_summary: Valid UTF-8 includes a bidi isolate around a relative path; raw and escaped inspection are required in diff review.
decode_attempts:
  - encoding_label: UTF-8
    result: succeeded_lossless
    confidence_level: high
    notes: Decode is clean; review risk comes from directionality, not malformed bytes.
confidence:
  level: high
  reason: heuristic_confident
  summary: Bytes decode as UTF-8, with suspicious directionality handled by the linked inspector.
representation_choices:
  - record_kind: text_representation_choice_record
    text_representation_choice_schema_version: 1
    choice_id: repr:diff:bidi:rendered
    source_review_ref: editor:decode-review:diff-bidi-raw-rendered:01
    source_surface: diff
    representation_class: rendered_text
    projection_posture: rendered_lossless
    availability_state: companion_required
    availability_rule: available_when_decode_lossless
    default_for_surface: true
    requires_raw_bytes: false
    requires_lossless_decode: true
    requires_peer_representations:
      - raw_bytes
      - escaped_text
    transfer_actions:
      - copy_rendered_text
    required_disclosure_fields:
      - representation_label
      - suspicious_text_indicator
      - mixed_direction_summary
      - source_surface
    user_visible_label: Copy rendered text
    availability_summary: Rendered diff text is visible, but raw and escaped peers stay available because directionality can mislead.
  - record_kind: text_representation_choice_record
    text_representation_choice_schema_version: 1
    choice_id: repr:diff:bidi:raw
    source_review_ref: editor:decode-review:diff-bidi-raw-rendered:01
    source_surface: diff
    representation_class: raw_bytes
    projection_posture: exact_source_bytes
    availability_state: available
    availability_rule: always_available_when_raw_bytes_preserved
    default_for_surface: false
    requires_raw_bytes: true
    requires_lossless_decode: false
    requires_peer_representations:
      - escaped_text
    transfer_actions:
      - copy_raw_bytes
      - open_raw_bytes_inspector
    required_disclosure_fields:
      - representation_label
      - suspicious_text_indicator
      - mixed_direction_summary
      - source_surface
    user_visible_label: Copy raw bytes
    availability_summary: Raw bytes allow review to verify logical order.
  - record_kind: text_representation_choice_record
    text_representation_choice_schema_version: 1
    choice_id: repr:diff:bidi:escaped
    source_review_ref: editor:decode-review:diff-bidi-raw-rendered:01
    source_surface: diff
    representation_class: escaped_text
    projection_posture: escaped_codepoints
    availability_state: available
    availability_rule: available_when_escape_projection_possible
    default_for_surface: false
    requires_raw_bytes: true
    requires_lossless_decode: false
    requires_peer_representations:
      - raw_bytes
    transfer_actions:
      - copy_escaped_text
      - open_mixed_direction_inspector
    required_disclosure_fields:
      - representation_label
      - suspicious_text_indicator
      - mixed_direction_summary
      - source_surface
    user_visible_label: Copy escaped text
    availability_summary: Escaped text exposes the bidi isolate code points in review and export.
save_consequence:
  consequence_class: preserve_untouched_raw_bytes
  packet_save_consequence_class: preserve_untouched
  rewrite_class: no_write_needed
  write_posture: inspect_only_no_save_boundary
  requires_user_acknowledgment: false
  bytes_outside_declared_ranges: unchanged
  recovery_class: no_state_change
  disclosure_label: Preserved source fidelity
  save_now_summary: The diff view performs no save; raw bytes are preserved for review.
  post_acknowledgment_packet_save_consequence_class: null
linkage:
  suspicious_text_indicator_refs:
    - suspicious-text:diff:bidi-control:01
  mixed_direction_inspector_refs:
    - mixed-direction:diff:path-span:01
  support_export_packet_refs:
    - support-export:diff:bidi-review:01
  security_review_refs:
    - security-review:diff:bidi-review:01
  source_packet_refs:
    - docs/security/suspicious_content_packet.md
    - docs/editor/decode_recovery_and_save_consequence_contract.md
review_actions:
  - action_id: inspect_raw_bytes
    availability: enabled
    label: Inspect raw bytes
    summary: Opens the exact hunk bytes around the bidi isolate.
  - action_id: copy_escaped_text
    availability: enabled
    label: Copy escaped text
    summary: Copies code point escapes for the suspicious span.
  - action_id: copy_raw_bytes
    availability: enabled
    label: Copy raw bytes
    summary: Copies the exact bytes for security review.
support_export:
  export_required: true
  default_representation_class: escaped_text
  include_raw_bytes: true
  include_escaped_text: true
  include_rendered_text: true
  redaction_posture: body_allowed
  summary: Export keeps the suspicious-text and mixed-direction refs next to the hunk evidence.
invariants:
  - save_consequence_visible_before_write
  - rendered_text_never_substitutes_for_raw_bytes
  - escaped_or_raw_available_when_rendering_can_mislead
  - suspicious_text_links_survive_review_export
