# yaml-language-server: $schema=../../../schemas/research/result_comparison.schema.json
result_comparison_schema_version: 1
record_kind: result_comparison_record
comparison_id: comparison:first_useful_edit:baseline-vs-candidate:2026-04-29
title: "First useful edit baseline versus candidate"
baseline_run:
  experiment_record_ref: experiment:benchmark.first_useful_edit.ts_web:2026-04-15
  run_label: "Baseline reference capture"
  dataset_summary_refs:
    - dataset-summary:protected.ts_web.first_useful_edit:2026-04-15
  exact_build_identity_ref: exact-build:desktop:2026-04-15:benchmark
  hardware_profile_ref: hardware-profile:reference.macos_arm64_laptop.ac
  environment_fingerprint_ref: env-fingerprint:benchmark_lab.macos_arm64.2026-04-15
candidate_run:
  experiment_record_ref: experiment:benchmark.first_useful_edit.ts_web:2026-04-29
  run_label: "Candidate reference capture"
  dataset_summary_refs:
    - dataset-summary:protected.ts_web.first_useful_edit:2026-04-29
  exact_build_identity_ref: exact-build:desktop:2026-04-29:benchmark
  hardware_profile_ref: hardware-profile:reference.macos_arm64_laptop.recalibrated
  environment_fingerprint_ref: env-fingerprint:benchmark_lab.macos_arm64.2026-04-29
comparison_basis:
  comparison_label: data_skewed
  comparison_purpose: public_proof_claim
  basis_summary: >
    The candidate run changed the protected corpus manifest revision and moved
    to a recalibrated reference hardware profile, so public presentation must
    show both changes beside the metric delta.
  metric_schema_ref: metric-schema:benchmark-lab-run-result
  metric_schema_version: 2
axis_deltas:
  - axis: dataset
    state: changed_visible
    baseline_ref: dataset-summary:protected.ts_web.first_useful_edit:2026-04-15
    candidate_ref: dataset-summary:protected.ts_web.first_useful_edit:2026-04-29
    summary_ref: axis-summary:first_useful_edit:dataset:rev6-to-rev7
    presentation_required: true
  - axis: corpus
    state: changed_visible
    baseline_ref: corpus-manifest:aureline.protected_benchmark_corpus:rev6
    candidate_ref: corpus-manifest:aureline.protected_benchmark_corpus:rev7
    summary_ref: axis-summary:first_useful_edit:corpus:rev6-to-rev7
    presentation_required: true
  - axis: hardware
    state: changed_visible
    baseline_ref: hardware-profile:reference.macos_arm64_laptop.ac
    candidate_ref: hardware-profile:reference.macos_arm64_laptop.recalibrated
    summary_ref: axis-summary:first_useful_edit:hardware:recalibrated
    presentation_required: true
  - axis: build
    state: changed_visible
    baseline_ref: exact-build:desktop:2026-04-15:benchmark
    candidate_ref: exact-build:desktop:2026-04-29:benchmark
    summary_ref: axis-summary:first_useful_edit:build:baseline-to-candidate
    presentation_required: true
  - axis: parameters
    state: unchanged
    baseline_ref: params:first_useful_edit:reference:2026-04
    candidate_ref: params:first_useful_edit:reference:2026-04
    summary_ref: axis-summary:first_useful_edit:params:unchanged
    presentation_required: false
metric_rows:
  - metric_id: metric:first_useful_edit:p95-ms
    display_name: "First useful edit p95"
    unit_class: milliseconds
    baseline_value:
      value: 820.4
      value_ref: metric-value:first_useful_edit:p95:baseline
    candidate_value:
      value: 785.1
      value_ref: metric-value:first_useful_edit:p95:candidate
    delta_value:
      value: -35.3
      value_ref: metric-delta:first_useful_edit:p95:candidate-minus-baseline
    delta_direction: improved
    threshold_state: not_comparable
    significance_or_variance_ref: variance-note:first_useful_edit:rev-and-hardware-change
    context_note_ref: context-note:first_useful_edit:not-like-for-like
significance_or_variance:
  method_class: variance_budget
  confidence_class: not_comparable
  confidence_level: null
  variance_class_ref: variance-class:protected-journey:first-useful-edit
  variance_note_ref: variance-note:first_useful_edit:rev-and-hardware-change
  sample_count_summary_ref: sample-summary:first_useful_edit:baseline-vs-candidate
disqualifiers:
  - disqualifier_class: changed_dataset
    severity: narrows_claim
    summary_ref: disqualifier:first_useful_edit:dataset-revision-changed
    visible_in_presentation: true
  - disqualifier_class: changed_hardware
    severity: narrows_claim
    summary_ref: disqualifier:first_useful_edit:hardware-recalibrated
    visible_in_presentation: true
presentation_summary:
  summary_view_id: summary-view:first_useful_edit:public-proof:narrowed
  summary_posture: public_proof_candidate
  allowed_surfaces:
    - public_proof_packet
    - benchmark_report
    - claim_manifest
  headline_ref: headline:first_useful_edit:narrowed-improvement
  required_visible_axes:
    - dataset
    - corpus
    - hardware
    - build
    - disqualifiers
  changed_corpora_visible: true
  changed_hardware_visible: true
  summary_rows:
    - label: "First useful edit p95"
      baseline: "820.4 ms"
      candidate: "785.1 ms"
      delta: "-35.3 ms"
      context_note: >
        Candidate appears faster, but the corpus manifest and hardware profile
        changed, so the public view must present this as narrowed evidence.
    - label: "Corpus manifest"
      baseline: "rev6"
      candidate: "rev7"
      delta: "changed"
      context_note: "Dataset and corpus revision changed between runs."
    - label: "Hardware profile"
      baseline: "reference laptop"
      candidate: "recalibrated reference laptop"
      delta: "changed"
      context_note: "Hardware recalibration is visible next to the result."
linkage:
  - link_kind: experiment_record
    link_ref: experiment:benchmark.first_useful_edit.ts_web:2026-04-15
    required_for_publication: true
  - link_kind: experiment_record
    link_ref: experiment:benchmark.first_useful_edit.ts_web:2026-04-29
    required_for_publication: true
  - link_kind: dataset_summary
    link_ref: dataset-summary:protected.ts_web.first_useful_edit:2026-04-29
    required_for_publication: true
  - link_kind: public_proof_packet
    link_ref: public-proof:benchmark:first_useful_edit:2026-04-29
    required_for_publication: true
  - link_kind: known_limit_note
    link_ref: known-limit:first_useful_edit:corpus-and-hardware-change
    required_for_publication: true
notes_summary: >
  This comparison intentionally keeps the changed corpus and hardware profile
  visible so presentation surfaces cannot imply a like-for-like win.
created_at: "2026-04-29T10:30:00Z"
expires_at: "2026-07-29T00:00:00Z"
