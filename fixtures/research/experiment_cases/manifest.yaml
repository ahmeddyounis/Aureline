schema_version: 1
manifest_id: aureline.research_experiment_cases
contract_doc_ref: docs/research/experiment_provenance_contract.md
experiment_record_schema_ref: schemas/research/experiment_record.schema.json
dataset_summary_schema_ref: schemas/research/dataset_summary.schema.json
result_comparison_schema_ref: schemas/research/result_comparison.schema.json

cases:
  - case_id: research.case.benchmark_public_proof_run
    file: benchmark_public_proof_run.yaml
    schema_ref: schemas/research/experiment_record.schema.json
    exercises:
      - benchmark_run
      - protected_corpus_ref
      - exact_build_identity_ref
      - publishable_public_proof
  - case_id: research.case.customer_redacted_dataset_summary
    file: customer_redacted_dataset_summary.yaml
    schema_ref: schemas/research/dataset_summary.schema.json
    exercises:
      - customer_derived_redacted
      - redacted_identifiers
      - license_restrictions
      - comparability_notes
  - case_id: research.case.public_proof_data_and_hardware_skewed_comparison
    file: public_proof_data_and_hardware_skewed_comparison.yaml
    schema_ref: schemas/research/result_comparison.schema.json
    exercises:
      - data_skewed
      - changed_hardware_visible
      - disqualifiers
      - presentation_safe_summary
  - case_id: research.case.ai_eval_with_waiver
    file: ai_eval_with_waiver.yaml
    schema_ref: schemas/research/experiment_record.schema.json
    exercises:
      - ai_evaluation
      - protected_eval_dataset
      - waiver_refs
      - ai_graduation_packet_link
