# Skew and drift smoke matrix.
#
# This file is the canonical machine-readable seed for the unattended
# skew / drift smoke lane. The lane proves that on the protected
# release surfaces:
#
#   - side-by-side channel coexistence stays compatible only when each
#     channel owns disjoint durable state roots and update markers;
#   - state / schema migrations are honest about direction (additive
#     forward vs. blocked downgrade) and never silently degrade
#     fidelity from exact to compatible without naming it;
#   - helper / agent attach inside the declared adjacent window narrows
#     to the named capability subset rather than claiming full mutation
#     parity;
#   - unknown-window cases route through the explicit probe_required
#     state instead of being collapsed into degraded or blocked;
#   - rollback to a prior coordinated artifact set keeps state-root
#     ownership and exact-build identity attribution intact.
#
# The matrix joins already-frozen sources rather than inventing a
# parallel vocabulary. The runner under
# tests/smoke/skew_drift/ resolves every row's claimed compatibility
# row, skew register case, install-topology and state-root refs, and
# named failure drill against those sources and emits a durable JSON
# capture under artifacts/milestones/m1/captures/.
#
# Rules.
#   - Every row MUST name one stable smoke_row_id, the boundary_family
#     it asserts, the surface_class it exercises, the expected
#     skew_state_class / outcome_label_class / promotion_decision_class,
#     and the underlying compatibility row + skew register case it
#     projects against.
#   - Every row MUST resolve compatibility_row_ref and
#     version_skew_register_ref into the qualification matrix and the
#     skew register; mismatches are non-conforming.
#   - Side-by-side rows MUST resolve install_topology_refs into the
#     install-topology matrix and the state-root map and MUST keep
#     channel-owned state roots disjoint.
#   - State / schema rows MUST cite the additive-or-blocked direction
#     explicitly and a recovery_rung_ref when degraded fidelity is the
#     expected outcome.
#   - Helper / agent rows MUST narrow to the capability_impact_classes
#     set the underlying compatibility row declares; full mutation
#     parity claims under degraded skew are non-conforming.
#   - Every row MUST declare exactly one named failure drill drawn
#     from the matrix failure_drill_id_vocabulary; the drill MUST be
#     reproducible by the runner against pure data.

schema_version: 1
status: seeded
as_of: "2026-05-11"
owner_dri: "@ahmeddyounis"

matrix_id: aureline.compat.skew_drift_smoke_matrix
overview_page: artifacts/compat/m1_skew_drift_report.md

vocabulary_sources:
  qualification_matrix_ref: artifacts/compat/qualification_matrix_seed.yaml
  version_skew_register_ref: artifacts/compat/version_skew_register.yaml
  skew_windows_ref: artifacts/compat/skew_windows.yaml
  install_topology_matrix_ref: artifacts/release/install_topology_matrix.yaml
  state_root_map_ref: artifacts/release/state_root_map.yaml
  envelope_schema_ref: schemas/compat/mixed_version_envelope.schema.json
  dogfood_matrix_ref: artifacts/milestones/m1/dogfood_matrix.yaml

hard_dependency_refs:
  - artifacts/build/build_identity.json
  - artifacts/release/install_topology_matrix.yaml
  - artifacts/release/state_root_map.yaml
  - artifacts/compat/version_skew_register.yaml

validation_lane_ref: artifacts/qe/test_lane_registry.yaml#fixture_repo_integration

# Closed vocabularies the runner enforces.
surface_class_vocabulary:
  - side_by_side_install
  - state_schema_migration
  - helper_agent_attach
  - downgrade_upgrade_rollback

skew_state_class_vocabulary:
  - compatible
  - repairable
  - degraded
  - blocked
  - unknown_requires_probe

outcome_label_class_vocabulary:
  - side_by_side_coexist_ok
  - upgrade_applied_compatible
  - downgrade_blocked_newer_schema
  - attach_degraded_review_only
  - probe_required
  - rollback_applied
  - reconnect_required
  - retest_pending
  - incompatible_restore
  - reinstall_required

promotion_decision_class_vocabulary:
  - promote
  - ship_narrowed_claim
  - pending_probe
  - no_go

boundary_family_vocabulary:
  - launcher_and_local_sidecars
  - desktop_cli_and_remote_agent
  - schema_or_state_bundle
  - browser_companion_and_remote_or_review_session
  - extension_host_and_sdk

failure_drill_id_vocabulary:
  - rewrite_skew_state_to_compatible_under_degraded_attach
  - rewrite_side_by_side_state_root_to_cross_channel
  - rewrite_migration_to_silent_downgrade
  - drop_named_recovery_rung
  - rewrite_outcome_label_to_unknown_vocab

required_surface_class_coverage:
  - side_by_side_install
  - state_schema_migration
  - helper_agent_attach
  - downgrade_upgrade_rollback

# Smoke rows. Each row pins one (boundary_family, surface_class) tuple
# plus the compatibility row and skew register case it projects against.
# The runner refuses unknown vocabulary, missing compatibility rows,
# missing skew register cases, missing install-topology / state-root
# refs, and silent fidelity downgrades.
rows:
  - smoke_row_id: aureline.compat.smoke.side_by_side_stable_preview_coexist
    title: Side-by-side Stable and Preview channels coexist with disjoint durable state roots
    inherited_dogfood_row_id: dogfood.fixture_repo.plain_text_notes
    boundary_family: schema_or_state_bundle
    surface_class: side_by_side_install
    skew_state_class: compatible
    outcome_label_class: side_by_side_coexist_ok
    promotion_decision_class: promote
    compatibility_row_ref: compat_row:deployment_profiles.boundary_manifest_truth
    version_skew_register_ref: skew_case:deployment_profiles.shared_profile_ids_and_drill_refs
    install_topology_refs:
      - card.macos.universal_binary.per_user_installed.stable
      - card.macos.universal_binary.side_by_side_preview.preview
    expected_durable_state_root_refs:
      stable:
        - state.per_user_configuration_root.stable
        - state.per_user_recovery_root.stable
        - state.per_user_derived_cache_root.stable
      preview:
        - state.per_user_configuration_root.preview
        - state.per_user_recovery_root.preview
        - state.per_user_derived_cache_root.preview
    expected_no_cross_channel_state_root_sharing: true
    state_migration_refs: []
    helper_agent_refs: []
    capability_impact_classes: []
    recovery_rung_ref: null
    expected_user_facing_summary: >
      Stable and Preview channels run side by side; each channel keeps
      its own settings, layout, session-restore store, and file
      associations. Nothing is merged across channels.
    expected_compatibility_report_summary: >
      One compatibility-report row per channel; both channels report
      compatible skew because state roots and update markers are
      disjoint.
    smoke_dimension: side_by_side_install
    failure_drill:
      drill_id: rewrite_side_by_side_state_root_to_cross_channel
      description: >
        Replace one of the Preview channel's durable state root refs
        with the Stable channel's state.per_user_configuration_root.stable
        row. The runner must surface
        side_by_side.state_root_owning_channel_collision so the lane
        catches a Preview install reading Stable state.
      forced_input:
        rewrite_preview_state_root:
          from: state.per_user_configuration_root.preview
          to: state.per_user_configuration_root.stable
      expected_check_id: side_by_side.state_root_owning_channel_collision
      actionable_owner_ref: "@ahmeddyounis"
      next_action: >
        Re-align the Preview row's durable state-root refs with the
        Preview-owned state-root rows; cross-channel state sharing is a
        violation of the per-channel separation rules.

  - smoke_row_id: aureline.compat.smoke.state_migration_old_to_new_additive
    title: Newer binary reads older profile / layout state with compatible fidelity
    inherited_dogfood_row_id: dogfood.fixture_repo.nested_source_tree
    boundary_family: schema_or_state_bundle
    surface_class: state_schema_migration
    skew_state_class: repairable
    outcome_label_class: upgrade_applied_compatible
    promotion_decision_class: ship_narrowed_claim
    compatibility_row_ref: compat_row:state.profile_layout_schema
    version_skew_register_ref: skew_case:state.profile_same_epoch_or_additive
    install_topology_refs: []
    state_migration_refs:
      - fixtures/state/migration_cases/profile_restore_compatible_schema_shift.json
      - schemas/state/restore_provenance.schema.json
    helper_agent_refs: []
    capability_impact_classes:
      - background_rebuild
      - session_restore_auto_reopen
    recovery_rung_ref: recovery_action:cache_reset_candidate.cache_index_repair
    expected_migration_direction: additive_old_to_new
    expected_fidelity_label: compatible
    expected_user_facing_summary: >
      Newer build loaded the older profile and layout. Authored work,
      trust, credentials, managed policy, and session-restore intent
      remain untouched; derived indexes regenerate in the background
      before auto-reopen resumes.
    expected_compatibility_report_summary: >
      Compatible (not exact) restore against the profile_layout_schema
      row with an additive-only skew window and a named degraded
      capability subset.
    smoke_dimension: state_schema_migration
    failure_drill:
      drill_id: rewrite_migration_to_silent_downgrade
      description: >
        Rewrite the row's expected_fidelity_label to "exact" while the
        skew_state_class remains "repairable". The runner must surface
        state_migration.silent_fidelity_downgrade because additive
        migration is never exact restore; the compatibility report and
        About surface must say "compatible restore" rather than imply
        exact parity.
      forced_input:
        rewrite_expected_fidelity_label: exact
      expected_check_id: state_migration.silent_fidelity_downgrade
      actionable_owner_ref: "@ahmeddyounis"
      next_action: >
        Restore expected_fidelity_label to "compatible"; additive
        migration must surface as compatible, not exact, even on the
        forward direction.

  - smoke_row_id: aureline.compat.smoke.state_migration_new_to_old_blocked
    title: Older binary refuses newer profile / layout state and offers open-without-restore
    inherited_dogfood_row_id: dogfood.fixture_repo.missing_target_restore
    boundary_family: schema_or_state_bundle
    surface_class: state_schema_migration
    skew_state_class: blocked
    outcome_label_class: incompatible_restore
    promotion_decision_class: no_go
    compatibility_row_ref: compat_row:state.profile_layout_schema
    version_skew_register_ref: skew_case:state.profile_excluded_or_admin_owned_treated_as_portable
    install_topology_refs: []
    state_migration_refs:
      - fixtures/state/migration_cases/support_bundle_manual_review_workspace_conflict.json
      - schemas/state/restore_provenance.schema.json
    helper_agent_refs: []
    capability_impact_classes:
      - session_restore_auto_reopen
      - background_rebuild
    recovery_rung_ref: recovery_action:open_without_restore.session_restore_declined
    expected_migration_direction: blocked_new_to_old
    expected_fidelity_label: declined
    expected_user_facing_summary: >
      Older build cannot safely read the newer profile and layout
      state. Authored work is preserved, session restore is declined,
      and the user is offered open-without-restore instead of a silent
      partial restore.
    expected_compatibility_report_summary: >
      Combination is explicitly_unsupported under the
      profile_layout_schema row; outside-window posture is
      explicitly_unsupported rather than degraded.
    smoke_dimension: state_schema_migration
    failure_drill:
      drill_id: drop_named_recovery_rung
      description: >
        Drop the named recovery_rung_ref so the row no longer points at
        recovery_action:open_without_restore.session_restore_declined.
        The runner must surface state_migration.recovery_rung_missing
        because blocked restore must always route to a concrete
        recovery rung instead of leaving the user without a next step.
      forced_input:
        drop_recovery_rung: true
      expected_check_id: state_migration.recovery_rung_missing
      actionable_owner_ref: "@ahmeddyounis"
      next_action: >
        Restore recovery_rung_ref; blocked restore must always offer
        the open-without-restore rung so authored work is preserved.

  - smoke_row_id: aureline.compat.smoke.helper_agent_attach_skewed_client_degraded
    title: Remote helper / agent attach narrows to review-only inside the adjacent window
    inherited_dogfood_row_id: dogfood.fixture_repo.path_and_encoding
    boundary_family: desktop_cli_and_remote_agent
    surface_class: helper_agent_attach
    skew_state_class: degraded
    outcome_label_class: attach_degraded_review_only
    promotion_decision_class: ship_narrowed_claim
    compatibility_row_ref: compat_row:remote.attach_envelope_and_drift
    version_skew_register_ref: skew_case:remote.attach_review_only_downgrade
    install_topology_refs: []
    state_migration_refs: []
    helper_agent_refs:
      - boundary.remote.agent_attach_envelope
    capability_impact_classes:
      - ai_runtime_access
      - background_rebuild
      - managed_control_plane_writes
    recovery_rung_ref: null
    expected_user_facing_summary: >
      Remote attach connected but narrowed to review-only. Reads,
      search, and approval preview work; writes and AI runtime paths
      stay disabled until the client is updated or the agent is
      narrowed.
    expected_compatibility_report_summary: >
      Best-effort support against the remote attach row with an
      explicit degraded capability subset.
    smoke_dimension: helper_agent_attach
    failure_drill:
      drill_id: rewrite_skew_state_to_compatible_under_degraded_attach
      description: >
        Rewrite the row's skew_state_class to "compatible" while the
        outcome_label_class remains attach_degraded_review_only. The
        runner must surface
        helper_agent_attach.skew_state_not_aligned_with_outcome because
        a review-only attach is never compatible skew; the release
        wording must not silently widen the support claim.
      forced_input:
        rewrite_skew_state_class: compatible
      expected_check_id: helper_agent_attach.skew_state_not_aligned_with_outcome
      actionable_owner_ref: "@ahmeddyounis"
      next_action: >
        Restore skew_state_class to "degraded"; a review-only attach is
        degraded skew, not compatible, regardless of how recently the
        client connected.

  - smoke_row_id: aureline.compat.smoke.helper_agent_attach_unknown_probe_required
    title: Remote helper / agent attach beyond adjacent window holds for probe
    inherited_dogfood_row_id: dogfood.fixture_repo.path_and_encoding
    boundary_family: desktop_cli_and_remote_agent
    surface_class: helper_agent_attach
    skew_state_class: unknown_requires_probe
    outcome_label_class: probe_required
    promotion_decision_class: pending_probe
    compatibility_row_ref: compat_row:remote.attach_envelope_and_drift
    version_skew_register_ref: skew_case:remote.attach_beyond_adjacent_same_major
    install_topology_refs: []
    state_migration_refs: []
    helper_agent_refs:
      - boundary.remote.agent_attach_envelope
    capability_impact_classes:
      - remote_helper_attach
      - ai_runtime_access
      - managed_control_plane_writes
    recovery_rung_ref: null
    expected_user_facing_summary: >
      Current client / agent pairing is outside the declared adjacent
      window but inside the same major line. Attach is not claimed as
      supported, degraded, or blocked yet; a probe will decide before
      the surface widens.
    expected_compatibility_report_summary: >
      Combination recorded as untested against the remote attach row;
      outside-window posture is degraded pending the probe rather than
      a silent fail_closed or an inferred best_effort.
    smoke_dimension: helper_agent_attach
    failure_drill:
      drill_id: rewrite_outcome_label_to_unknown_vocab
      description: >
        Rewrite the row's outcome_label_class to a free-text value
        outside the closed outcome_label_class_vocabulary. The runner
        must surface skew_drift.outcome_label_unknown_class because
        the release-evidence packet must never invent labels outside
        the canonical vocabulary.
      forced_input:
        rewrite_outcome_label_class: attach_probably_fine
      expected_check_id: skew_drift.outcome_label_unknown_class
      actionable_owner_ref: "@ahmeddyounis"
      next_action: >
        Restore outcome_label_class to a value drawn from the closed
        vocabulary so compatibility reports cite the probe_required
        state explicitly.

  - smoke_row_id: aureline.compat.smoke.rollback_prior_channel_build_compatible
    title: Rollback to a prior coordinated artifact set preserves state-root ownership
    inherited_dogfood_row_id: dogfood.fixture_repo.plain_text_notes
    boundary_family: launcher_and_local_sidecars
    surface_class: downgrade_upgrade_rollback
    skew_state_class: compatible
    outcome_label_class: rollback_applied
    promotion_decision_class: promote
    compatibility_row_ref: compat_row:release_identity.exact_build_propagation
    version_skew_register_ref: skew_case:release_identity.same_artifact_set
    install_topology_refs:
      - card.macos.universal_binary.per_user_installed.stable
    expected_durable_state_root_refs:
      stable:
        - state.per_user_configuration_root.stable
        - state.per_user_recovery_root.stable
        - state.per_user_derived_cache_root.stable
    expected_no_cross_channel_state_root_sharing: true
    state_migration_refs: []
    helper_agent_refs: []
    capability_impact_classes:
      - background_rebuild
      - session_restore_auto_reopen
    recovery_rung_ref: null
    expected_user_facing_summary: >
      Prior build is restored. Authored files, trust, credentials,
      managed policy, and the session-restore store stay untouched;
      derived indexes and auto-reopen refresh once the rolled-back
      build is running.
    expected_compatibility_report_summary: >
      Supported rollback against the exact-build-propagation row; the
      coordinated artifact set keeps binaries, symbols, docs/help, and
      release-evidence rows resolving through one identity chain.
    smoke_dimension: downgrade_upgrade_rollback
    failure_drill:
      drill_id: rewrite_outcome_label_to_unknown_vocab
      description: >
        Rewrite the row's promotion_decision_class to a free-text value
        outside the closed promotion_decision_class_vocabulary. The
        runner must surface skew_drift.promotion_decision_unknown_class
        because rollback promotion must always be expressed in the
        closed vocabulary.
      forced_input:
        rewrite_promotion_decision_class: probably_promote
      expected_check_id: skew_drift.promotion_decision_unknown_class
      actionable_owner_ref: "@ahmeddyounis"
      next_action: >
        Restore promotion_decision_class to a value drawn from the
        closed vocabulary so release evidence cites a defended
        decision.

cadence_guidance:
  per_change: >
    Re-run when artifacts/compat/qualification_matrix_seed.yaml,
    artifacts/compat/version_skew_register.yaml,
    artifacts/compat/skew_windows.yaml,
    artifacts/release/install_topology_matrix.yaml, or
    artifacts/release/state_root_map.yaml change.
  nightly: >
    Run on the nightly proof-lane scheduler against this matrix; capture
    the JSON report under artifacts/milestones/m1/captures/.
