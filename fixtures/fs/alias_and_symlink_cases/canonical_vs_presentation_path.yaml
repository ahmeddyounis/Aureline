schema_version: 1
case_id: corpus.fs.alias.presentation_vs_canonical_symlink
case_family: alias_symlink_case
title: Symlinked presentation path resolves to one canonical target
summary: >
  The user opened `file:///ws/config.toml`, but the durable write target is
  `file:///ws/pkg/core/config.toml`. The tab keeps the original spelling for
  chrome while the save token and compare-before-write token point at the
  resolved canonical object.
identity_assertion_state: exact
save_assertion_state: exact
watcher_assertion_state: exact
presentation_path:
  uri: file:///ws/config.toml
  display_label: config.toml
  root_badge: local
logical_workspace_identity:
  workspace_id: ws-aureline-primary
  root_id: root-1
  logical_uri: aureline-ws://ws-aureline-primary/root-1/pkg/core/config.toml
canonical_filesystem_object:
  canonical_uri: file:///ws/pkg/core/config.toml
  normalization_form: nfc
  strongest_identity_token_kind: device_inode_generation
  strongest_identity_token_value: dev:1/ino:303/gen:2
alias_set:
  alias_kinds:
    - symlink
  aliases:
    - alias_uri: file:///ws/config.toml
      alias_kind: symlink
      resolution_chain:
        - opened: file:///ws/config.toml
        - symlink -> pkg/core/config.toml
        - canonical: file:///ws/pkg/core/config.toml
save_target_review:
  required: true
  reason_codes:
    - presentation_path_differs_from_canonical
    - alias_set_non_empty
  compare_before_write_required: true
  primary_action: save_with_compare_before_write
  secondary_actions:
    - open_alias_details
    - cancel
client_can_still_assert:
  - The canonical target and compare-before-write token refer to one durable object.
  - Chrome may preserve the user-opened path without changing write authority.
client_must_not_assert:
  - The symlinked presentation path is an independent writable object.
related_fixture_ids:
  - corpus.fs.identity.symlink_alias

