schema_version: 1
case_id: corpus.fs.alias.hardlink_sibling_shared_authority
case_family: alias_symlink_case
title: Hardlink sibling shares canonical write authority
summary: >
  `file:///ws/bin/tool.sh` and `file:///ws/bin/tool-latest` share one inode.
  The alias set must disclose the sibling so support, review, and save-target
  surfaces can explain why a save through either path updates both names.
identity_assertion_state: exact
save_assertion_state: exact
watcher_assertion_state: exact
presentation_path:
  uri: file:///ws/bin/tool.sh
  display_label: tool.sh
  root_badge: local
canonical_filesystem_object:
  canonical_uri: file:///ws/bin/tool.sh
  strongest_identity_token_kind: device_inode_generation
  strongest_identity_token_value: dev:1/ino:404/gen:5
alias_set:
  alias_kinds:
    - hardlink_sibling
  aliases:
    - alias_uri: file:///ws/bin/tool-latest
      alias_kind: hardlink_sibling
      resolution_chain:
        - opened canonical: file:///ws/bin/tool.sh
        - hardlink sibling observed: file:///ws/bin/tool-latest
        - same inode; writes via either path affect the other
save_target_review:
  required: true
  reason_codes:
    - alias_set_non_empty
    - write_affects_multiple_names
  compare_before_write_required: true
  primary_action: save_with_compare_before_write
  secondary_actions:
    - open_alias_details
client_can_still_assert:
  - One inode-backed object is authoritative for both names.
  - The save token and compare-before-write token still refer to one canonical object.
client_must_not_assert:
  - The hardlink sibling is an unrelated target that can drift independently.
related_fixture_ids:
  - corpus.fs.identity.hardlink_sibling

