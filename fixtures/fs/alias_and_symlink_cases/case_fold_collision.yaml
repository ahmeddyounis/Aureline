schema_version: 1
case_id: corpus.fs.alias.case_fold_collision_insensitive_root
case_family: alias_symlink_case
title: Case-folded spellings converge to one dirty-buffer authority
summary: >
  `file:///ws/src/lib.rs` and `file:///ws/src/Lib.rs` resolve to the same
  canonical object on an insensitive-but-preserving root. The client must
  converge them before save or rename and require a preview for any
  case-only spelling change.
identity_assertion_state: exact
save_assertion_state: exact
watcher_assertion_state: exact
presentation_paths:
  - file:///ws/src/lib.rs
  - file:///ws/src/Lib.rs
canonical_filesystem_object:
  canonical_uri: file:///ws/src/Lib.rs
  strongest_identity_token_kind: device_inode_generation
  strongest_identity_token_value: dev:1/ino:202/gen:7
alias_set:
  alias_kinds:
    - case_only_variant
  aliases:
    - alias_uri: file:///ws/src/lib.rs
      alias_kind: case_only_variant
      resolution_chain:
        - opened: file:///ws/src/lib.rs
        - case-folded on insensitive_preserving root
        - canonical: file:///ws/src/Lib.rs
save_target_review:
  required: true
  reason_codes:
    - alias_set_non_empty
    - case_only_rename_requires_preview
  compare_before_write_required: true
  primary_action: open_rename_preview
  secondary_actions:
    - open_alias_details
    - cancel
rename_matrix_row_refs:
  - rename_matrix.local_apfs_insensitive_preview_required
  - rename_matrix.local_windows_insensitive_preview_required
client_can_still_assert:
  - One canonical object owns the dirty buffer and next save.
  - A case-only rename can be previewed and validated before commit.
client_must_not_assert:
  - Both spellings may remain separate mutable tabs.
  - A case-only rename may report success without collision checks.
related_fixture_ids:
  - corpus.fs.identity.case_only_difference

