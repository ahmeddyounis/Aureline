schema_version: 1
case_id: corpus.fs.alias.unicode_normalization_variant
case_family: alias_symlink_case
title: Unicode-normalized spellings resolve to one canonical object
summary: >
  The opened path uses one normalization form while the canonical object uses
  another. The alias set records the variant explicitly so save, rename,
  search, and support surfaces do not treat the spellings as unrelated files.
identity_assertion_state: exact
save_assertion_state: exact
watcher_assertion_state: exact
presentation_path:
  uri: file:///ws/notes/cafe-nfd.md
  display_label: cafe-nfd.md
  root_badge: local
canonical_filesystem_object:
  canonical_uri: file:///ws/notes/cafe-nfc.md
  normalization_form: nfc
  strongest_identity_token_kind: device_inode_generation
  strongest_identity_token_value: dev:1/ino:505/gen:1
alias_set:
  alias_kinds:
    - unicode_normalization_variant
  aliases:
    - alias_uri: file:///ws/notes/cafe-nfd.md
      alias_kind: unicode_normalization_variant
      resolution_chain:
        - opened: file:///ws/notes/cafe-nfd.md (nfd)
        - normalization folded nfd -> nfc
        - canonical: file:///ws/notes/cafe-nfc.md (nfc)
save_target_review:
  required: true
  reason_codes:
    - alias_set_non_empty
    - normalization_only_rename_requires_preview
  compare_before_write_required: true
  primary_action: open_rename_preview
  secondary_actions:
    - open_alias_details
    - cancel
rename_matrix_row_refs:
  - rename_matrix.local_apfs_unicode_preview_required
client_can_still_assert:
  - The canonical object remains exact for save and external-change checks.
  - Normalization-only spelling changes require an explicit preview.
client_must_not_assert:
  - A normalization-only rename is always safe on every root profile.
related_fixture_ids:
  - corpus.fs.identity.unicode_normalization_variant

