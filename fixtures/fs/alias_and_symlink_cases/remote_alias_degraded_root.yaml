schema_version: 1
case_id: corpus.fs.alias.remote_alias_degraded_root
case_family: alias_symlink_case
title: Remote root keeps object identity while path and watch guarantees degrade
summary: >
  A remote agent exposes one provider object through a remapped mount path.
  The client can still pin a compare-before-write token and provider object
  id, but it must disclose that atomic rename semantics, watch fidelity, and
  canonical path spelling are weaker than on a local root.
identity_assertion_state: degraded
save_assertion_state: degraded
watcher_assertion_state: degraded
presentation_path:
  uri: agent://remote-1/workspace/src/lib.rs
  display_label: lib.rs
  root_badge: remote
logical_workspace_identity:
  workspace_id: ws-aureline-primary
  root_id: root-remote
  logical_uri: aureline-ws://ws-aureline-primary/root-remote/src/lib.rs
canonical_filesystem_object:
  canonical_uri: provider://workspace-77/object/lib.rs
  normalization_form: nfc
  strongest_identity_token_kind: provider_object_id_revision
  strongest_identity_token_value: remote-agent:lib.rs#rev/gen:17
alias_set:
  alias_kinds:
    - remote_alias
  aliases:
    - alias_uri: agent://remote-1/workspace/src/lib.rs
      alias_kind: remote_alias
      resolution_chain:
        - opened through remote mount alias
        - provider object id remains authoritative
        - mount graph may remap the presented path
save_target_review:
  required: true
  reason_codes:
    - degraded_save_guarantee
    - presentation_path_differs_from_canonical
    - watcher_degraded
  compare_before_write_required: true
  primary_action: save_with_compare_before_write
  secondary_actions:
    - open_root_details
    - cancel
rename_matrix_row_refs:
  - rename_matrix.remote_agent_attested_degraded
  - rename_matrix.remote_agent_unattested_unsupported
client_can_still_assert:
  - The provider object id and remote revision token identify the write target.
  - Conditional-write conflicts can prevent blind overwrite.
client_must_not_assert:
  - Local atomic-rename semantics apply on this root.
  - Native watch fidelity or canonical path spelling is stable across reconnects.
related_fixture_ids:
  - corpus.fs.identity.remote_conditional_conflict
  - corpus.fs.identity.watcher_degradation
