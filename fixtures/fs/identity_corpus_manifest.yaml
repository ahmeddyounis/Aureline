# Filesystem identity and save-coordination corpus manifest.
#
# Stable ids for canonical-path truth, alias convergence, save-target review,
# compare-before-write conflicts, and degraded remote-root behavior. Future
# prototype exports, support packets, benchmark lanes, and platform
# conformance work should cite these ids instead of inventing new labels.

schema_version: 1
manifest_id: aureline.fs.identity_corpus
manifest_revision: 1
status: seeded

overview_page: docs/filesystem/filesystem_identity_vocabulary.md
adr_source: docs/adr/0006-vfs-save-cache-identity.md
prototype_readme: prototypes/vfs/README.md
save_truth_fixture_readme: fixtures/fs/save_truth_cases/README.md
alias_fixture_readme: fixtures/fs/alias_and_symlink_cases/README.md
rename_matrix_source: fixtures/fs/case_only_rename_matrix.yaml
save_plan_export_readme: artifacts/fs/save_plan_examples/README.md
save_coordination_examples_readme: artifacts/fs/save_coordination_examples/README.md
difficult_save_review_fixture_readme: fixtures/fs/difficult_save_review_cases/README.md
path_truth_packet_source: docs/fs/path_truth_packet.md
path_truth_examples_readme: artifacts/fs/path_truth_examples/README.md
alias_inspector_examples_readme: artifacts/fs/alias_inspector_examples/README.md

record_family_vocabulary:
  - save_truth_case
  - alias_symlink_case
  - save_coordination_projection
  - case_only_rename_matrix_row
  - save_target_review_case

identity_assertion_state_vocabulary:
  - exact
  - degraded
  - unsupported

save_assertion_state_vocabulary:
  - exact
  - degraded
  - unsupported

watcher_assertion_state_vocabulary:
  - exact
  - degraded
  - unsupported

coordination_result_state_vocabulary:
  - committed
  - blocked_no_write
  - compare_token_mismatch
  - review_required
  - participant_failed

export_contract:
  prototype_export:
    tool: ./tools/vfs_proto.sh --emit-scenarios artifacts/fs/save_plan_examples
    required_fields:
      - corpus_case_id
      - related_fixture_ids
      - rename_matrix_row_refs
      - root_class
      - label
      - expected_outcome
  reviewer_projection_examples:
    directory: artifacts/fs/save_coordination_examples
    requirement: >
      Compact rows cite the same corpus ids as the prototype export and
      state what the client can still assert when guarantees weaken.

