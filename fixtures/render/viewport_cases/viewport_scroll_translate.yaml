fixture_id: render_viewport.viewport_scroll_translate
title: Viewport scroll prefers translate plus strip repaint
scenario: >
  Scrolling a text viewport reuses existing pixels and repaints only the
  newly exposed strip or small correction rects.
platform_profile_scope: all_claimed_desktop_profiles
damage_class_refs:
  - render_damage.viewport_scroll_translate
composition_layer_refs:
  - render_layer.text_and_decoration
current_spike_trace_refs:
  - artifacts/render/spike_trace_samples/scroll_down.json
trigger:
  source: wheel, trackpad, keyboard, or touch scroll in a visible viewport
expected_invalidation:
  should_invalidate:
    windows:
      - active_window
    zones:
      - editor_viewport
    damage_units:
      - viewport_rect
    repaint_semantics: partial_translate_plus_strip
  must_not_invalidate:
    - full_window
    - render_layer.window_chrome_base
    - unrelated_windows
allowed_fallback_state_refs: []
trace_expectations:
  current_spike_hooks:
    - scroll_frame
  required_damage_explanation: scroll translate plus newly exposed strip
notes:
  - If wrap, fold, or sticky-decoration correction is required, the correction remains bounded to the visible strip rather than widening to a full-window repaint.
