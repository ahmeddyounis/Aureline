fixture_id: render_viewport.floating_popup_surface
title: Popup surfaces stay in their own portal layer
scenario: >
  Opening, closing, or moving a completion list, hover card, or similar
  popup invalidates the popup surface and small anchor overlap only.
platform_profile_scope: all_claimed_desktop_profiles
damage_class_refs:
  - render_damage.floating_surface_toggle
composition_layer_refs:
  - render_layer.floating_surface
  - render_layer.menu_surface
  - render_layer.dialog_surface
current_spike_trace_refs: []
trigger:
  source: popup open, close, move, or resize in the active window
expected_invalidation:
  should_invalidate:
    windows:
      - active_window
    zones:
      - popup_surface
    damage_units:
      - surface_rect
    repaint_semantics: partial_rect_only
  must_not_invalidate:
    - full_window
    - unrelated_windows
    - entire_editor_viewport_without_anchor_overlap_explanation
allowed_fallback_state_refs:
  - platform_owned_candidate_window
trace_expectations:
  current_spike_hooks: []
  required_damage_explanation: popup bounds changed or popup visibility toggled
notes:
  - Platform-owned candidate windows are allowed only for IME candidate UI, not for ordinary product popups.
