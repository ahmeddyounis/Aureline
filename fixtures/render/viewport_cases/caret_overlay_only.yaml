fixture_id: render_viewport.caret_overlay_only
title: Caret blink or move stays overlay-only
scenario: >
  The active caret may blink or move, but the renderer updates only the
  caret overlay rect inside the focused text surface.
platform_profile_scope: all_claimed_desktop_profiles
damage_class_refs:
  - render_damage.caret_overlay_only
composition_layer_refs:
  - render_layer.overlay_ephemera
current_spike_trace_refs:
  - artifacts/render/spike_trace_samples/caret_left.json
  - artifacts/render/spike_trace_samples/caret_right.json
trigger:
  source: focused editor caret movement or blink timer
  current_spike_proxy: caret_move hook stands in for blink because the M0 spike has no autonomous blink mark
expected_invalidation:
  should_invalidate:
    windows:
      - active_window
    zones:
      - editor_viewport
    damage_units:
      - overlay_rect
    repaint_semantics: partial_rect_only
  must_not_invalidate:
    - glyph_raster_cache
    - text_layout_cache
    - render_layer.text_and_decoration
    - render_layer.window_chrome_base
    - unrelated_windows
    - full_window
allowed_fallback_state_refs:
  - blink_suppressed_under_reduced_motion
  - hidden_surface_animation_suppressed
trace_expectations:
  current_spike_hooks:
    - caret_move
  required_damage_explanation: caret visibility or position delta only
notes:
  - Blink suppression is allowed only when reduced-motion or hidden-surface policy is already active.
