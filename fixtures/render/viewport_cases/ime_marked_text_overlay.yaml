fixture_id: render_viewport.ime_marked_text_overlay
title: IME marked text stays overlay-only
scenario: >
  Marked-text updates, composition underline changes, and caret-inside-
  preedit movement repaint only the overlay layer even when candidate UI
  is platform-owned.
platform_profile_scope: all_claimed_desktop_profiles
damage_class_refs:
  - render_damage.ime_marked_text_overlay
composition_layer_refs:
  - render_layer.overlay_ephemera
current_spike_trace_refs:
  - artifacts/render/spike_trace_samples/ime_compose.json
trigger:
  source: marked-text or composition underline update
expected_invalidation:
  should_invalidate:
    windows:
      - active_window
    zones:
      - editor_viewport
    damage_units:
      - overlay_rect
    repaint_semantics: partial_rect_only
  must_not_invalidate:
    - glyph_raster_cache
    - text_layout_cache
    - render_layer.text_and_decoration
    - full_window
    - unrelated_windows
allowed_fallback_state_refs:
  - platform_owned_candidate_window
trace_expectations:
  current_spike_hooks:
    - ime_composition_update
  required_damage_explanation: marked-text or composition underline changed
notes:
  - Platform-owned candidate UI does not excuse repainting the base text surface or widening to a full-window repaint.
