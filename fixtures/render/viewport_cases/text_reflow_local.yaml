fixture_id: render_viewport.text_reflow_local
title: Local text reflow stays line-range bounded
scenario: >
  Text insertion, deletion, or wrap change in the active editor
  invalidates only the affected line range and its visible projection.
platform_profile_scope: all_claimed_desktop_profiles
damage_class_refs:
  - render_damage.text_reflow_local
composition_layer_refs:
  - render_layer.text_and_decoration
current_spike_trace_refs:
  - artifacts/render/spike_trace_samples/text_burst_cjk.json
trigger:
  source: text insertion or deletion in the focused text surface
expected_invalidation:
  should_invalidate:
    windows:
      - active_window
    zones:
      - editor_viewport
    damage_units:
      - line_range
      - viewport_rect
    repaint_semantics: localized_reflow
  must_not_invalidate:
    - full_window
    - render_layer.window_chrome_base
    - render_layer.floating_surface
    - unrelated_windows
allowed_fallback_state_refs: []
trace_expectations:
  current_spike_hooks:
    - reflow_line_range
  required_damage_explanation: line range or wrap boundary changed
notes:
  - Widening beyond the local line range requires an explicit bidi or wrap-boundary explanation.
