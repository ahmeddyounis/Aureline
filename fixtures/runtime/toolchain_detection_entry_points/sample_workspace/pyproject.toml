[project]
name = "toolchain-entry-surface-fixture"
requires-python = "3.12.7"
dependencies = [
  "pytest==8.3.4",
  "ruff==0.8.4"
]

[tool.uv]
package = false

[tool.poetry]
name = "toolchain-entry-surface-fixture"
version = "0.1.0"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
