    queue_lane: maintenance
    effective_concurrency_cap: 1
    note: "AI warmup is optional assistance and must defer/collapse under constrained posture."
    instrumentation:
      worker_class: ai_background_jobs
      priority_policy: low_to_medium_budgeted
      yieldability: yield_with_checkpoint
      admission_decision: deferred
      task_kind: ai.model_warmup
      queue_lane: maintenance
      latency_budget_owner: best_effort_background

  - record_kind: scheduling_decision_record
    worker_class_schema_version: 1
