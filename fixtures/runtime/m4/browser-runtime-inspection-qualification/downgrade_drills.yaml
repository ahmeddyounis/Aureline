record_kind: browser_runtime_inspection_downgrade_drills
schema_version: 1
drills:
  - trigger: target_identity_missing
    input_gap: target_identity_bound_false
    expected_finding: stable_target_missing_runtime_truth
    expected_state: blocks_stable
  - trigger: source_map_insufficient
    input_gap: stable_target_source_map_stale
    expected_finding: stable_target_with_insufficient_source_map
    expected_state: blocks_stable
  - trigger: protocol_unavailable
    input_gap: attach_protocol_state_protocol_unavailable
    expected_surface_label: protocol_unavailable
    expected_state: downgraded_below_stable
  - trigger: cross_origin_limited
    input_gap: inspection_data_state_cross_origin_limited
    expected_surface_label: cross_origin_limited
    expected_state: inspect_only
  - trigger: session_stale
    input_gap: session_freshness_state_stale_requires_resync
    expected_surface_label: stale_requires_resync
    expected_state: downgraded_below_stable
  - trigger: mutation_safety_missing
    input_gap: replay_request_approval_review_ref_missing
    expected_finding: mutation_review_unsafe
    expected_state: blocks_stable
  - trigger: redaction_unsafe
    input_gap: raw_source_material_excluded_false
    expected_finding: unsafe_export_material_present
    expected_state: blocks_stable
  - trigger: consumer_surface_missing
    input_gap: optional_surface_manifest_binding_missing
    expected_finding: missing_consumer_surface_coverage
    expected_state: blocks_stable
expect:
  product_copy_downgrades_with_packet: true
  docs_help_downgrades_with_packet: true
  support_export_downgrades_with_packet: true
  optional_surface_manifest_downgrades_with_packet: true
