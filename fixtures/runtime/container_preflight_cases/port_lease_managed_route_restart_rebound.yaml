    evidence_ref: "evidence:managed_api:stdout:live:01"
    support_export_ref: "support:export:managed_api:stdout:01"
    retention_window_ref: "retention:logs:managed_api:stdout:01"
    redaction_class: structured_fields_with_path_redaction
    summary: "Live stdout channel is tied to the managed API service lease."
  - log_channel_class: health_probe_log
    log_state_class: buffered
    service_handle_ref: "runtime:service:managed_api:01"
    task_channel_ref: "execution:task_channel:managed_api:health_probe:01"
    output_viewer_ref: "ux:output_viewer:managed_api_health:01"
    evidence_ref: "evidence:managed_api:health_probe:01"
    support_export_ref: "support:export:managed_api:health_probe:01"
    retention_window_ref: "retention:logs:managed_api:health_probe:01"
