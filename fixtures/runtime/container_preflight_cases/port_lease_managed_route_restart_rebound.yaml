    support_export_ref: "support:export:managed_api:route_audit:01"
    retention_window_ref: "retention:logs:managed_api:route_audit:01"
    redaction_class: support_bundle_scoped
    summary: "Route audit snapshot preserves the rebind event for support replay."
sidecar_visibility:
