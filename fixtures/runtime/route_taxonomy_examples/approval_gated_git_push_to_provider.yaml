__fixture__:
  name: approval_gated_git_push_to_provider
  scenario: >
    Approval-gated publish to a connected provider. The user
    dispatches `git.push_branch` at a keystroke; the proposed
    `local_rpc_route` to the local git binary is escalated to an
    `approval_gated_route` because the command descriptor declares
    `approval_posture_class = second_party_review_required` and the
    action is externally visible. The invocation-session packet
    mints a fresh ADR-0010 approval ticket whose action_class is
    `external_side_effect` and whose high_risk_flags include
    `irreversible_external_effect`; the ticket ref is projected
    onto the route packet as `authority_linkage_ref.approval_ticket_ref`.
    Exposure is `provider_visible_mutation`; the acting
    provider_actor_class is `human_account` linked to a GitHub
    canonical host. The route_change_reason_code names the
    escalation so reviewers can see the route was not the
    originally-proposed local route.
  taxonomy_sections:
    - "Vocabulary 1: action origin class (user_keystroke_local)"
    - "Vocabulary 2: action target class (connected_provider_target)"
    - "Vocabulary 3: action route class (approval_gated_route)"
    - "Vocabulary 4: action exposure class (provider_visible_mutation)"
    - "Vocabulary 5: route-change reason codes (route_escalated_to_approval_required)"
    - "Vocabulary 6: authority-linkage class (approval_ticket_linked)"
  exercised:
    action_origin_class: user_keystroke_local
    action_target_class: connected_provider_target
    action_route_class: approval_gated_route
    action_exposure_class: provider_visible_mutation
    route_change_reason_code: route_escalated_to_approval_required
    authority_linkage_class: approval_ticket_linked

