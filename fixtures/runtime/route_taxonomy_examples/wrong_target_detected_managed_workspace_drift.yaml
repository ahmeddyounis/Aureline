__fixture__:
  name: wrong_target_detected_managed_workspace_drift
  scenario: >
    Wrong-target correction on a managed-workspace resume. A user
    keystroke dispatches `workspace.resume_from_idle`; the command
    router initially resolved against managed workspace instance
    `mw:alpha` (the most-recently-active one) but the managed
    control plane reports the session's ADR-0009 execution context
    is now pinned to `mw:beta` because `mw:alpha` was recycled
    mid-session. The route packet is minted with
    route_change_reason_code = `route_changed_wrong_target_detected`,
    preserves the originally-resolved target under
    `prior_target_ref` and the prior route class under
    `prior_route_class`, and carries the corrected
    `managed_workspace_instance_ref = mw:beta` in
    `action_target_ref`. Authority linkage is the
    managed-control-plane token that admitted the corrected
    instance. Exposure is `workspace_visible_mutation`; the
    exposure disclosure names both instances so reviewers can see
    the correction rather than a silent swap.
  taxonomy_sections:
    - "Vocabulary 1: action origin class (user_keystroke_local)"
    - "Vocabulary 2: action target class (managed_workspace_target)"
    - "Vocabulary 3: action route class (managed_control_plane_route)"
    - "Vocabulary 4: action exposure class (workspace_visible_mutation)"
    - "Vocabulary 5: route-change reason codes (route_changed_wrong_target_detected)"
    - "Vocabulary 6: authority-linkage class (managed_control_plane_token_linked)"
  exercised:
    action_origin_class: user_keystroke_local
    action_target_class: managed_workspace_target
    action_route_class: managed_control_plane_route
    action_exposure_class: workspace_visible_mutation
    route_change_reason_code: route_changed_wrong_target_detected
    authority_linkage_class: managed_control_plane_token_linked

