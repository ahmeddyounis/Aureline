schema_version: 1
contract_ref: docs/admin/deprovision_and_rebind_contract.md
deprovision_handoff_schema_ref: schemas/admin/deprovision_handoff.schema.json
device_rebind_event_schema_ref: schemas/admin/device_rebind_event.schema.json

rules:
  - Every case is one boundary record validated by the cited schema.
  - Identity-loss transitions must not imply local work vanished or was silently uploaded.
  - Dirty buffers, autosave journals, and local history remain intact across deprovision, forced sign-out, and rebind.
  - Support export and offboarding export remain reachable without requiring a live managed seat.
  - Records carry opaque refs and reviewable summaries; raw user identifiers, raw device fingerprints, raw IdP payloads, raw tokens, and raw provider URLs do not appear.

cases:
  - fixture: enterprise_deprovision_preserves_local_work.yaml
    record_kind: deprovision_handoff_record
    schema_ref: schemas/admin/deprovision_handoff.schema.json
    covers:
      - deprovision_handoff
      - local_work_preservation
      - offboarding_export_without_live_seat
      - manual_fallback_contact_admin
  - fixture: account_recovery_completion_handoff_with_rebind_ref.yaml
    record_kind: deprovision_handoff_record
    schema_ref: schemas/admin/deprovision_handoff.schema.json
    covers:
      - account_recovery_completion
      - device_rebind_reference
      - cache_preservation
  - fixture: device_rebind_event_account_recovery.yaml
    record_kind: device_rebind_event_record
    schema_ref: schemas/admin/device_rebind_event.schema.json
    covers:
      - device_rebind_audit_event
      - guidance_capture
      - actor_scope_agreement
  - fixture: forced_signout_export_before_close.yaml
    record_kind: deprovision_handoff_record
    schema_ref: schemas/admin/deprovision_handoff.schema.json
    covers:
      - forced_sign_out
      - export_before_close_guidance
      - offline_support_export_available

