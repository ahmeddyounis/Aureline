# yaml-language-server: $schema=../../../schemas/admin/deprovision_handoff.schema.json
__fixture__:
  name: enterprise_deprovision_preserves_local_work
  scenario: >
    A managed seat is deprovisioned. Managed capabilities are revoked,
    but local work remains available and an offboarding export path is
    still offered without a live managed seat.
  exercised_contract_sections:
    - identity_loss_event_classes
    - local_work_preservation_rules
    - export_paths_remain_reachable
    - manual_fallback

record_kind: deprovision_handoff_record
deprovision_handoff_schema_version: 1
handoff_id: handoff:deprovision:0100
handoff_event_class: deprovision
occurred_at: "2026-05-05T09:10:00Z"
assembled_at: "2026-05-05T09:10:04Z"
actor:
  actor_class: signed_lifecycle_update
  actor_ref: null
  actor_label: Signed lifecycle update
scope:
  tenant_or_org_ref: tenant-or-org:managed:example:0100
  seat_id_ref: seat-id:deprovisioned:0100
  device_id_ref: device-id:local-install:0100
  managed_session_state_ref: managed-session:deprovisioned:0100
  source_seat_id_ref: null
  target_seat_id_ref: null
  previous_device_id_ref: null
policy_context:
  identity_mode: managed_workspace
  deployment_profile_class: enterprise_online
  trust_state: trusted
  policy_epoch: policy_epoch.managed.20260505.0100
  entitlement_epoch: entitlement_epoch.managed.20260505.0100
human_readable_summary: Managed seat deprovisioned; local work remains available and export remains available.
managed_impact_summary: Managed collaboration, sync, and hosted services are revoked for the deprovisioned seat.
local_work_preservation:
  local_continuity:
    edit_local_artifacts: true
    save_local_artifacts: true
    undo_redo_local_artifacts: true
    export_user_owned_artifacts: true
    local_git_available: true
    local_tasks_available: true
    diagnostics_available: true
    retained_local_capabilities:
      - Edit local files.
      - Save local files.
      - Undo and redo local edits.
      - Use local Git.
      - Run local tasks.
      - Export user-owned local artifacts.
      - Export support diagnostics.
    paused_managed_capabilities:
      - Managed collaboration.
      - Managed settings sync.
      - Hosted AI gateway.
      - Managed marketplace publishing.
    continuity_note: Deprovisioning revoked managed capabilities only; local work and user-owned export remain available.
  unsaved_work_state:
    dirty_buffer_count: 3
    unsaved_local_artifacts_present: true
    autosave_journal_preserved: true
    autosave_restore_available: true
    note: Dirty buffers remain editable/saveable and autosave journals remain available after deprovision.
  local_history_state:
    local_history_preserved: true
    local_history_export_available: true
    clear_history_scope_unchanged: true
    note: Local history remains intact and is not cleared by deprovision.
  support_evidence_state:
    support_bundle_export_available: true
    admin_evidence_export_available: true
    offline_without_browser_sign_in_supported: true
    note: Support export and admin evidence export remain available without browser sign-in.
  offline_entitlement_cache_state:
    cache_state_class: revoked_or_invalidated
    entitlement_snapshot_ref: entitlement-snapshot:seat-removed:0100
    last_verified_at: "2026-05-05T09:09:55Z"
    note: The cached entitlement snapshot is preserved for inspection/support export but is not used to grant managed access after deprovision.
export_guidance:
  export_posture_class: offboarding_export_available_without_live_seat
  export_before_close_guidance_shown: false
  export_note: Offboarding export remains available without a live managed seat.
  export_refs:
    - offboarding-export:user-owned-artifacts:0100
    - support-bundle:deprovisioned:0100
manual_fallback:
  posture_class: policy_blocked_requires_admin_assist
  fallback_actions:
    - action_class: continue_local_only
      label: Continue local-only
      note: Local work continues without sign-in.
    - action_class: export_local_work
      label: Export local work
      note: Export user-owned artifacts without a managed seat.
    - action_class: contact_admin
      label: Contact admin
      note: Request seat restore or rebind through an admin-assisted path.
  evidence_available_without_browser_sign_in:
    - entitlement-snapshot:seat-removed:0100
    - policy-bundle:last-known-good:0100
    - support-bundle:deprovisioned:0100
    - audit-export:deprovisioned:0100
  note: When managed recovery is not available, the fallback is local continuation plus export and admin-assisted appeal/rebind.
next_actions:
  - action_class: export_local_work
    label: Export local work
    note: Export user-owned artifacts and a support bundle before switching devices.
  - action_class: continue_local_only
    label: Continue local-only
    note: Keep working locally; managed actions remain unavailable.
  - action_class: contact_admin
    label: Contact admin
    note: Ask an admin to restore or transfer a seat if appropriate.
related_object_refs:
  - managed-session:deprovisioned:0100
  - seat-lifecycle-row:deprovisioned:0100
  - entitlement-snapshot:seat-removed:0100
  - admin-audit-export:deprovisioned:0100
  - support-bundle:deprovisioned:0100
deep_links:
  - link_class: managed_session_state
    route_ref: route-managed-session-state-deprovisioned
    target_record_ref: managed-session:deprovisioned:0100
    label: Open managed session state
    available_offline: true
    unavailable_reason: null
  - link_class: seat_lifecycle_row
    route_ref: route-seat-lifecycle-row-deprovisioned
    target_record_ref: seat-lifecycle-row:deprovisioned:0100
    label: Open seat lifecycle row
    available_offline: true
    unavailable_reason: null
  - link_class: support_bundle
    route_ref: route-support-bundle-deprovisioned
    target_record_ref: support-bundle:deprovisioned:0100
    label: Export support bundle
    available_offline: true
    unavailable_reason: null
redaction_summary:
  redaction_class: metadata_safe_default
  included_data_classes:
    - actor.class
    - tenant.scope
    - seat.ref
    - device.ref
    - local_work_preservation.summary
  omitted_data_classes:
    - user.identifier_raw
    - user.email_raw
    - device.fingerprint_raw
    - idp.payload_raw
    - token.raw
  redaction_note: The handoff uses opaque refs and reviewable summaries; raw identifiers and secrets are omitted.

