# yaml-language-server: $schema=../../../schemas/admin/deprovision_handoff.schema.json
__fixture__:
  name: account_recovery_completion_handoff_with_rebind_ref
  scenario: >
    Account recovery completes and the device is rebound to a recovered
    managed identity. The handoff links to the rebind audit event and
    reiterates that local caches and history remain intact.
  exercised_contract_sections:
    - identity_loss_event_classes
    - manual_fallback
    - device_rebind_audit_event_agreement

record_kind: deprovision_handoff_record
deprovision_handoff_schema_version: 1
handoff_id: handoff:recovery-complete:0110
handoff_event_class: account_recovery_completion
occurred_at: "2026-05-05T10:22:11Z"
assembled_at: "2026-05-05T10:22:15Z"
actor:
  actor_class: end_user
  actor_ref: actor-subject:managed-user:0110
  actor_label: Managed user
scope:
  tenant_or_org_ref: tenant-or-org:managed:example:0110
  seat_id_ref: seat-id:recovered:0110
  device_id_ref: device-id:rebound:0110
  managed_session_state_ref: managed-session:recovered:0110
  source_seat_id_ref: null
  target_seat_id_ref: null
  previous_device_id_ref: device-id:prior-binding:0110
policy_context:
  identity_mode: managed_workspace
  deployment_profile_class: enterprise_online
  trust_state: trusted
  policy_epoch: policy_epoch.managed.20260505.0110
  entitlement_epoch: entitlement_epoch.managed.20260505.0110
human_readable_summary: Account recovery completed and device rebind recorded; local work remains intact.
managed_impact_summary: Managed actions resume under the recovered session scope; any revocation/reauth requirements remain explicit.
local_work_preservation:
  local_continuity:
    edit_local_artifacts: true
    save_local_artifacts: true
    undo_redo_local_artifacts: true
    export_user_owned_artifacts: true
    local_git_available: true
    local_tasks_available: true
    diagnostics_available: true
    retained_local_capabilities:
      - Continue editing local files during recovery.
      - Restore from autosave journal if needed.
      - Use local history and restore previews.
      - Export support diagnostics and user-owned artifacts.
    paused_managed_capabilities:
      - None (recovery completed).
    continuity_note: Recovery completion does not delete local work, autosave journals, or local history.
  unsaved_work_state:
    dirty_buffer_count: 1
    unsaved_local_artifacts_present: true
    autosave_journal_preserved: true
    autosave_restore_available: true
    note: Unsaved work remains available across recovery completion and rebind.
  local_history_state:
    local_history_preserved: true
    local_history_export_available: true
    clear_history_scope_unchanged: true
    note: Local history remains intact; identity recovery does not clear it.
  support_evidence_state:
    support_bundle_export_available: true
    admin_evidence_export_available: true
    offline_without_browser_sign_in_supported: true
    note: Support export remains available regardless of browser/IdP availability.
  offline_entitlement_cache_state:
    cache_state_class: current
    entitlement_snapshot_ref: entitlement-snapshot:recovered:0110
    last_verified_at: "2026-05-05T10:22:10Z"
    note: Entitlement snapshots are signed and cacheable; recovery completion refreshes them without corrupting local state.
export_guidance:
  export_posture_class: local_export_available
  export_before_close_guidance_shown: false
  export_note: Local export is available during and after recovery completion.
  export_refs:
    - local-export:workspace:0110
    - support-bundle:recovery-complete:0110
manual_fallback:
  posture_class: normal_browser_flow_available
  fallback_actions:
    - action_class: start_system_browser_sign_in
      label: Confirm sign-in
      note: Use the system browser to complete any remaining managed sign-in steps.
    - action_class: export_support_bundle
      label: Export support bundle
      note: Export a support bundle if recovery remains degraded or uncertain.
  evidence_available_without_browser_sign_in:
    - device-rebind-event:0110
    - entitlement-snapshot:recovered:0110
    - support-bundle:recovery-complete:0110
  note: If the browser flow is unavailable, local work continues and support export remains available.
next_actions:
  - action_class: acknowledge_and_close
    label: Continue
    note: Recovery completed; continue work with the recovered identity scope.
  - action_class: open_admin_audit_export
    label: Open audit detail
    note: Review the device rebind audit event and related evidence.
related_object_refs:
  - device-rebind-event:0110
  - managed-session:recovered:0110
  - entitlement-snapshot:recovered:0110
  - support-bundle:recovery-complete:0110
deep_links:
  - link_class: device_rebind_event
    route_ref: route-device-rebind-event-0110
    target_record_ref: device-rebind-event:0110
    label: Open device rebind event
    available_offline: true
    unavailable_reason: null
  - link_class: support_bundle
    route_ref: route-support-bundle-recovery-complete
    target_record_ref: support-bundle:recovery-complete:0110
    label: Export support bundle
    available_offline: true
    unavailable_reason: null
redaction_summary:
  redaction_class: metadata_safe_default
  included_data_classes:
    - actor.class
    - tenant.scope
    - seat.ref
    - device.ref
    - rebind.audit_ref
  omitted_data_classes:
    - user.identifier_raw
    - device.fingerprint_raw
    - idp.payload_raw
    - token.raw
  redaction_note: The handoff references the rebind event by opaque id and omits raw identifiers.

