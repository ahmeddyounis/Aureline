__fixture__:
  name: forced_signout_export_before_close
  scenario: >
    An admin forces sign-out for risk response. Managed session tokens are
    invalidated, but local work remains usable. The handoff provides
    export-before-close guidance and an explicit manual fallback path.
  exercised_contract_sections:
    - identity_loss_event_classes
    - export_paths_remain_reachable
    - manual_fallback

record_kind: deprovision_handoff_record
deprovision_handoff_schema_version: 1
handoff_id: handoff:forced-signout:0120
handoff_event_class: forced_sign_out
occurred_at: "2026-05-05T11:40:00Z"
assembled_at: "2026-05-05T11:40:03Z"
actor:
  actor_class: org_admin
  actor_ref: actor-subject:org-admin:0003
  actor_label: Organization admin
