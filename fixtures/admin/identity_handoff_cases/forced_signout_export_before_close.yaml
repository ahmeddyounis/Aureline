  entitlement_epoch: entitlement_epoch.managed.20260505.0120
human_readable_summary: Forced sign-out applied; local work remains available and export-before-close guidance is shown.
managed_impact_summary: Managed session is revoked; managed actions pause until reauth completes.
local_work_preservation:
  local_continuity:
    edit_local_artifacts: true
    save_local_artifacts: true
    undo_redo_local_artifacts: true
    export_user_owned_artifacts: true
    local_git_available: true
    local_tasks_available: true
    diagnostics_available: true
    retained_local_capabilities:
      - Edit local files.
      - Save local files.
      - Undo and redo local edits.
      - Use local Git.
      - Run local tasks.
      - Export user-owned artifacts and support diagnostics.
    paused_managed_capabilities:
      - Managed collaboration.
      - Managed settings sync.
      - Hosted AI gateway.
    continuity_note: Forced sign-out purged managed tokens but did not affect local work or user-owned export.
  unsaved_work_state:
    dirty_buffer_count: 2
    unsaved_local_artifacts_present: true
    autosave_journal_preserved: true
    autosave_restore_available: true
    note: Unsaved edits remain available; export guidance assumes dirty buffers may exist.
  local_history_state:
    local_history_preserved: true
    local_history_export_available: true
    clear_history_scope_unchanged: true
    note: Local history remains intact; forced sign-out does not clear it.
  support_evidence_state:
    support_bundle_export_available: true
    admin_evidence_export_available: true
    offline_without_browser_sign_in_supported: true
    note: Support export remains available even when managed sign-in is blocked.
  offline_entitlement_cache_state:
    cache_state_class: stale_within_grace
    entitlement_snapshot_ref: entitlement-snapshot:last-known-good:0120
    last_verified_at: "2026-05-05T11:35:00Z"
    note: Last-known-good entitlement snapshot is preserved for local-safe operations while managed actions await reauth.
export_guidance:
  export_posture_class: local_export_available
  export_before_close_guidance_shown: true
  export_note: Export local work and a support bundle before closing the workspace or switching devices.
  export_refs:
    - local-export:workspace:0120
    - support-bundle:forced-signout:0120
manual_fallback:
  posture_class: idp_or_browser_unavailable_continue_local_only
  fallback_actions:
    - action_class: start_system_browser_sign_in
      label: Re-authenticate
      note: Use the system browser to re-authenticate if available.
    - action_class: start_device_code_sign_in
      label: Use device code
      note: If the browser flow is blocked, use an alternate device-code recovery path.
    - action_class: continue_local_only
      label: Continue local-only
      note: Local work continues while managed actions remain paused.
    - action_class: export_support_bundle
      label: Export support bundle
      note: Export evidence without relying on browser sign-in.
  evidence_available_without_browser_sign_in:
    - entitlement-snapshot:last-known-good:0120
    - support-bundle:forced-signout:0120
    - audit-export:forced-signout:0120
  note: If reauth is unavailable due to outage or policy, local work and export remain available and an admin can assist.
next_actions:
  - action_class: export_local_work
    label: Export local work
    note: Export user-owned artifacts before closing or switching devices.
  - action_class: start_system_browser_sign_in
    label: Re-authenticate
    note: Re-authenticate to resume managed collaboration and sync.
  - action_class: continue_local_only
    label: Continue local-only
    note: Keep working locally while managed identity is unavailable.
related_object_refs:
