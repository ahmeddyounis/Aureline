    - tenant.scope
    - session.revocation
    - guidance.actions
  omitted_data_classes:
    - user.identifier_raw
    - device.fingerprint_raw
    - idp.payload_raw
    - token.raw
  redaction_note: The handoff is export-safe and omits raw identities, fingerprints, and secrets.

