    decision_class: force_disable
    outcome_class: paused
    decision_reason_class: emergency_disable_applied
    decision_reason_note: Emergency disable applied to prevent use of a compromised extension without requiring a reinstall.
    event_at_utc: "2026-05-05T07:44:55Z"
    mirror_or_offline_posture: manual_snapshot_current
    policy_epoch_ref: policy_epoch.local.20260505.0001
    entitlement_epoch_ref: null
    redaction_summary:
      redaction_class: metadata_safe_default
      included_data_classes:
        - audit.minimum_field_set
        - emergency.metadata
        - audit.refs
      omitted_data_classes:
        - extension.payload
        - secret.material
      redaction_note: Emergency-action metadata is exported without extension bytes or secrets.
    vendor_console_independence_class: fully_independent_local_packet
    browser_handoff:
      handoff_class: not_required
      handoff_ref: null
      handoff_note: No browser handoff is required for baseline explainability.
    related_object_refs:
