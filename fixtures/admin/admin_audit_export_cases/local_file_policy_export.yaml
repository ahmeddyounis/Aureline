      - policy-diff:local-file:0001
    reviewable_summary: A local policy bundle update narrowed privileged actions; the decision is explainable from local evidence without any vendor console.
  - event_id_ref: audit-event:emergency-disable:local:0001
    event_class: revocation_event
    origin_class: local_desktop_or_cli
    actor_class: authenticated_local_admin
    actor_ref: actor-local-admin:0001
    actor_label: Local admin
    tenant_or_org_ref: null
    scope_kind: workspace
    scope_label: Current workspace
    subject:
