policy_epoch_at_export: policy_epoch.local.20260505.0001
entitlement_epoch_at_export: null

retention_window:
  retention_window_class: default_90_days
  retention_period_days: 90
  retention_note: Local bounded audit history defaults to ninety days unless a stricter admin policy configures otherwise.

vendor_console_independence_class: fully_independent_local_packet
origin_class: local_desktop_or_cli

included_event_rows:
  - event_id_ref: audit-event:policy-change:local-file:0001
    event_class: policy_bundle_change
    origin_class: local_desktop_or_cli
    actor_class: authenticated_local_admin
    actor_ref: actor-local-admin:0001
    actor_label: Local admin
    tenant_or_org_ref: null
    scope_kind: workspace
    scope_label: Current workspace
    subject:
      subject_kind: policy_bundle
      subject_id: policy-bundle:local-file:0001
      subject_label: Local policy bundle (inspect-only)
      subject_note: Bundle is reviewable locally; raw rule bodies remain out of export.
    decision_class: narrow
    outcome_class: narrowed
    decision_reason_class: policy_change_published
    decision_reason_note: Local policy bundle updated to narrow privileged actions while preserving local continuity.
    event_at_utc: "2026-05-05T07:40:02Z"
    mirror_or_offline_posture: manual_snapshot_current
    policy_epoch_ref: policy_epoch.local.20260505.0001
    entitlement_epoch_ref: null
    redaction_summary:
      redaction_class: metadata_safe_default
      included_data_classes:
        - audit.minimum_field_set
        - policy.metadata
        - audit.refs
      omitted_data_classes:
        - policy.rule_body
        - bundle.signature_bytes
        - secret.material
      redaction_note: Only policy metadata and opaque refs are exported; raw rule bodies and secrets are omitted.
    vendor_console_independence_class: fully_independent_local_packet
    browser_handoff:
      handoff_class: not_required
      handoff_ref: null
      handoff_note: No browser handoff is required for baseline explainability.
    related_object_refs:
