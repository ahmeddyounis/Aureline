__fixture__:
  name: local_file_policy_export
  scenario: >
    Account-free local export capturing a policy bundle change and an
    emergency disable (revocation) event. The packet is fully explainable
    without any vendor console and states the default audit retention
    window explicitly.
  contract_sections:
    - export_packet_shape
    - vendor_console_independence
    - minimum_field_set
    - retention_window_truth

record_kind: admin_audit_export_record
admin_audit_export_schema_version: 1
export_id_ref: admin-audit-export:local:0001
assembled_at_utc: "2026-05-05T07:55:10Z"

tenant_scope:
  tenant_or_org_ref: null
  tenant_or_org_label: Account-free local
  deployment_profile_scope:
    - individual_local
  install_profile_card_refs: []
  scope_note: Export is local-only and carries no tenant binding.

policy_context:
  identity_mode: account_free_local
  deployment_profile_class: individual_local
  trust_state: trusted
  policy_epoch: policy_epoch.local.20260505.0001
