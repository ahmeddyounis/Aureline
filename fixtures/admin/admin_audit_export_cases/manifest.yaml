schema_version: 1
contract_ref: docs/admin/admin_audit_export_contract.md
admin_audit_export_schema_ref: schemas/admin/admin_audit_export.schema.json

rules:
  - Every case is one boundary record validated by the cited schema.
  - Each export packet preserves tenant scope, policy/entitlement epochs,
    decision reason, origin truth, redaction posture, retention window,
    and explicit vendor-console-independence classification.
  - Browser or hosted-console dependence is explicit as a typed handoff
    note, never an implicit requirement for baseline explainability.

cases:
  - fixture: local_file_policy_export.yaml
    record_kind: admin_audit_export_record
    schema_ref: schemas/admin/admin_audit_export.schema.json
    covers:
      - local_file_policy
      - fully_independent_local_packet
      - policy_change_and_emergency_disable
  - fixture: self_hosted_enterprise_export.yaml
    record_kind: admin_audit_export_record
    schema_ref: schemas/admin/admin_audit_export.schema.json
    covers:
      - self_hosted_enterprise
      - seat_role_device_and_deprovision
      - independent_with_signed_evidence
  - fixture: mirrored_sovereign_export.yaml
    record_kind: admin_audit_export_record
    schema_ref: schemas/admin/admin_audit_export.schema.json
    covers:
      - mirrored_sovereign_deployment
      - approval_narrowing
      - fully_independent_local_packet
  - fixture: managed_org_browser_handoff_export.yaml
    record_kind: admin_audit_export_record
    schema_ref: schemas/admin/admin_audit_export.schema.json
    covers:
      - managed_org_actions
      - vendor_console_required_for_full_detail
      - delete_or_export_lifecycle

