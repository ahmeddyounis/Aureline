# yaml-language-server: $schema=../../../schemas/admin/admin_audit_export.schema.json
__fixture__:
  name: managed_org_browser_handoff_export
  scenario: >
    Managed convenience export capturing a record export lifecycle event
    and a policy change where full detail requires a vendor-console deep
    link. The packet remains export-safe and preserves minimum fields,
    but the dependency is explicit as a required browser handoff.
  contract_sections:
    - vendor_console_independence
    - delete_or_export_lifecycle_events
    - browser_handoff_explicit

record_kind: admin_audit_export_record
admin_audit_export_schema_version: 1
export_id_ref: admin-audit-export:managed:0001
assembled_at_utc: "2026-05-05T07:58:40Z"

tenant_scope:
  tenant_or_org_ref: tenant-or-org:managed:0001
  tenant_or_org_label: Managed tenant
  deployment_profile_scope:
    - enterprise_online
  install_profile_card_refs:
    - install-profile-card:managed:0001
  scope_note: Export is scoped to one managed tenant and its current epochs.

policy_context:
  identity_mode: managed_workspace
  deployment_profile_class: enterprise_online
  trust_state: trusted
  policy_epoch: policy_epoch.managed.20260501.0009
  execution_context_id: exec-managed-admin-export

policy_epoch_at_export: policy_epoch.managed.20260501.0009
entitlement_epoch_at_export: entitlement_epoch.managed.20260501.0009

retention_window:
  retention_window_class: default_90_days
  retention_period_days: 90
  retention_note: Managed default audit retention is ninety days unless tenant policy configures a longer window; exports support independent archival.

vendor_console_independence_class: vendor_console_required_for_full_detail
origin_class: managed_admin_plane

included_event_rows:
  - event_id_ref: audit-event:record-export-ready:managed:0001
    event_class: record_export_ready
    origin_class: managed_admin_plane
    actor_class: system_scheduled_task
    actor_ref: actor-system:export-pipeline
    actor_label: Export pipeline
    tenant_or_org_ref: tenant-or-org:managed:0001
    scope_kind: workspace
    scope_label: Offboarding export
    subject:
      subject_kind: governed_record
      subject_id: governed-record:offboarding-export:0001
      subject_label: Offboarding export ready
      subject_note: Lifecycle is represented by governed record state; payload bytes remain out of the audit export boundary.
    decision_class: export_only
    outcome_class: completed
    decision_reason_class: export_ready
    decision_reason_note: Export payload assembled and ready for consumption; retention and deletion semantics are governed separately.
    event_at_utc: "2026-05-04T19:02:00Z"
    mirror_or_offline_posture: authoritative_live
    policy_epoch_ref: policy_epoch.managed.20260501.0009
    entitlement_epoch_ref: entitlement_epoch.managed.20260501.0009
    redaction_summary:
      redaction_class: operator_only_restricted
      included_data_classes:
        - audit.minimum_field_set
        - record_state.axes
        - audit.refs
      omitted_data_classes:
        - export.payload_bytes
        - raw.logs
        - secret.material
      redaction_note: Export lifecycle is visible via record-state axes and refs; export payload bytes are omitted.
    vendor_console_independence_class: independent_with_signed_evidence
    browser_handoff:
      handoff_class: not_required
      handoff_ref: null
      handoff_note: Record-state lifecycle is explainable from packet and local refs without vendor console.
    related_object_refs:
      - record-state:offboarding-export:0001
      - retention-matrix:offboarding-export:0001
      - support-packet-ref:offboarding-export:0001
    reviewable_summary: A governed record export became ready; the audit export preserves lifecycle state without exposing the export payload.
  - event_id_ref: audit-event:policy-change:managed:0002
    event_class: policy_bundle_change
    origin_class: managed_admin_plane
    actor_class: vendor_managed_automation
    actor_ref: actor-vendor-automation:policy-push
    actor_label: Managed policy push
    tenant_or_org_ref: tenant-or-org:managed:0001
    scope_kind: tenant_or_org
    scope_label: Managed organization
    subject:
      subject_kind: policy_bundle
      subject_id: policy-bundle:managed:0009
      subject_label: Managed policy bundle update
      subject_note: Managed bundle is identified by opaque refs; raw rules remain out of export.
    decision_class: narrow
    outcome_class: narrowed
    decision_reason_class: policy_change_published
    decision_reason_note: Managed policy bundle updated; the export preserves epochs and minimum fields without embedding policy bodies.
    event_at_utc: "2026-05-04T20:20:10Z"
    mirror_or_offline_posture: authoritative_live
    policy_epoch_ref: policy_epoch.managed.20260501.0009
    entitlement_epoch_ref: entitlement_epoch.managed.20260501.0009
    redaction_summary:
      redaction_class: metadata_safe_default
      included_data_classes:
        - audit.minimum_field_set
        - policy.metadata
        - audit.refs
      omitted_data_classes:
        - policy.rule_body
        - bundle.signature_bytes
        - secret.material
      redaction_note: Only policy metadata and refs are exported; raw rule bodies are omitted.
    vendor_console_independence_class: vendor_console_required_for_full_detail
    browser_handoff:
      handoff_class: required_vendor_console_deep_link
      handoff_ref: vendor-console:policy-history:managed:0009
      handoff_note: Full authoring timeline and console-only annotations require an explicit vendor-console deep link; baseline narrowing and epochs are still reconstructable from this packet.
    related_object_refs:
      - admin-audit-packet:policy-bundle-change:managed:0002
      - effective-policy-card:managed:provider-controls:0009
      - policy-diff:managed:0009
    reviewable_summary: A managed policy update narrowed capabilities; the export remains useful offline but explicitly notes console-only detail via typed browser handoff.

human_readable_summary: Managed export includes an offboarding export-ready lifecycle event and a managed policy narrowing; the export is redaction-safe, binds epochs, and makes vendor-console-only detail explicit via required browser handoff rather than hidden dependency.

machine_readable_packet:
  human_summary_ref: human-summary:admin-audit-export:managed:0001
  machine_packet_ref: machine-packet:admin-audit-export:managed:0001
  machine_schema_ref: schemas/admin/admin_audit_export.schema.json
  formats:
    - json_packet
    - markdown_summary
    - support_bundle_reference
  redaction_summary:
    redaction_class: metadata_safe_default
    included_data_classes:
      - audit.minimum_field_set
      - record_state.axes
      - policy.metadata
    omitted_data_classes:
      - export.payload_bytes
      - policy.rule_body
      - secret.material
    redaction_note: Export preserves minimum fields and lifecycle axes; raw payload bytes and secrets are omitted.
  compatible_consumer_classes:
    - admin_audit_reader
    - support_bundle_exporter
    - enterprise_audit_reviewer

redaction_summary:
  redaction_class: operator_only_restricted
  included_data_classes:
    - audit.minimum_field_set
    - record_state.axes
    - policy.metadata
  omitted_data_classes:
    - export.payload_bytes
    - policy.rule_body
    - secret.material
  redaction_note: Export is suitable for enterprise review without exporting secrets or raw policy bodies.

compatible_consumer_classes:
  - admin_audit_reader
  - support_bundle_exporter
  - enterprise_audit_reviewer

export_actions:
  - action_class: open_record_state_event
    label: Open record-state lifecycle
    enabled: true
    route_ref: record-state:offboarding-export:0001
    command_id: ui.open.record_state
    reason: Record-state lifecycle rows provide local explainability for export/deletion flows.
  - action_class: open_source_packet
    label: Open policy source packet
    enabled: true
    route_ref: admin-audit-packet:policy-bundle-change:managed:0002
    command_id: ui.open.admin_audit_packet
    reason: Source packet ref resolves locally for baseline explainability.
  - action_class: open_docs
    label: Open export contract
    enabled: true
    route_ref: null
    command_id: docs.open.admin_audit_export_contract
    reason: Contract explains vendor-console-independence and handoff rules.

