# yaml-language-server: $schema=../../../schemas/admin/audit_event_record.schema.json
__fixture__:
  name: policy_change_event
  scenario: >
    A signed policy bundle narrows the AI provider route for a managed
    workspace. The audit explorer surfaces the policy_change row that
    matches the existing policy decision-history row and effective
    policy card.
  exercised_contract_sections:
    - policy_change_family
    - five_axis_answerability
    - related_object_deep_links

record_kind: audit_event_record
audit_event_explorer_schema_version: 1
event_id_ref: audit-event:policy-change:hosted-provider-controls:0001
event_class: policy_bundle_change
event_family: policy_change

actor:
  actor_class: signed_policy_bundle_source
  actor_id: signed-policy-bundle-source:hosted-provider-controls
  actor_label: Hosted provider controls bundle
  actor_note: A signed policy bundle imported from the managed origin updated provider controls.

target_scope:
  scope_kind: tenant_or_org
  tenant_or_org_ref: tenant-or-org:enterprise:0001
  deployment_profile_scope:
    - enterprise_online
  scope_id: org-current
  scope_label: Current organization
  affected_surface_family: provider_routing
  inheritance_summary: Policy applies to every managed workspace in the current organization.

outcome:
  decision_class: narrow
  outcome_class: narrowed
  outcome_summary: The AI provider selector was narrowed to approved providers without exposing provider secrets.

chronology:
  event_at_utc: "2026-04-25T18:12:41Z"
  monotonic_sequence: 4017
  original_timezone_label: UTC
  render_timezone_hint_class: viewer_local
  skew_class: monotonic_clean

source_system:
  source_class: admin_audit_packet
  source_packet_ref: admin-audit-policy-bundle-change-0001
  source_schema_ref: schemas/identity/admin_audit_packet.schema.json
  mirror_or_offline_posture: authoritative_live
  last_observed_at: "2026-04-25T18:12:02Z"
  source_note: The admin-audit packet for the bundle import is locally available and signature-verified.

policy_context:
  identity_mode: managed_workspace
  deployment_profile_class: enterprise_online
  trust_state: trusted
  policy_epoch: policy_epoch.managed.20260425.0004
  execution_context_id: exec-policy-center-current

policy_epoch_ref: policy_epoch.managed.20260425.0004
entitlement_epoch_ref: entitlement_epoch.managed.20260425.0004

redaction_summary:
  redaction_class: metadata_safe_default
  included_data_classes:
    - policy.metadata
    - audit.refs
    - settings.shape
  omitted_data_classes:
    - policy.rule_body
    - bundle.signature_bytes
    - provider.credentials
  redaction_note: The row carries source refs, value summaries, and audit refs; raw bundle bytes, raw signing material, and provider credentials are omitted.

related_objects:
  - related_class: effective_policy_card
    target_record_ref: effective-policy-card:ai-provider-controls:0001
    target_schema_ref: schemas/admin/effective_policy_card.schema.json
    label: Effective policy card
    available_offline: true
    unavailable_reason: null
  - related_class: policy_diff_view
    target_record_ref: policy-diff-hosted-provider-controls-0001
    target_schema_ref: schemas/admin/effective_policy_card.schema.json
    label: Policy diff
    available_offline: true
    unavailable_reason: null
  - related_class: policy_decision_history_row
    target_record_ref: admin-policy-history-ai-provider-constrained-0001
    target_schema_ref: schemas/admin/effective_policy_card.schema.json
    label: Decision history row
    available_offline: true
    unavailable_reason: null
  - related_class: admin_handoff_export
    target_record_ref: admin-handoff-ai-provider-controls-0001
    target_schema_ref: schemas/admin/effective_policy_card.schema.json
    label: Admin handoff export
    available_offline: true
    unavailable_reason: null

actions:
  - action_class: open_decision_history_row
    label: Open decision history
    enabled: true
    route_ref: route-policy-history-ai-provider-constrained
    command_id: admin.policy.history.open
    reason: The matching decision-history row is locally available.
  - action_class: open_policy_diff
    label: View policy diff
    enabled: true
    route_ref: route-policy-diff-hosted-provider-controls
    command_id: admin.policy.diff.open
    reason: The policy diff view is locally available.
  - action_class: export_machine_packet
    label: Export machine-readable packet
    enabled: true
    route_ref: route-admin-handoff-ai-provider-controls
    command_id: admin.audit.export
    reason: The export pair is locally available and within redaction floor.

reviewable_summary: A signed policy bundle imported by the managed origin narrowed the AI provider selector for the current organization to approved providers; the matching effective policy card, diff, and decision-history row are locally available.
