__fixture__:
  name: tenant_scoped_export_packet
  scenario: >
    A tenant-scoped admin-audit export packet bundles the policy
    change, trust downgrade, collaboration-control grant, failed
    privileged action, and delete-request lifecycle rows so an
    enterprise reviewer can reconstruct each event from the packet
    alone, without a vendor admin console. The export carries the
    bound policy and entitlement epochs and declares
    fully_independent_local_packet vendor-console-independence.
  exercised_contract_sections:
    - tenant_scoped_admin_audit_export
    - vendor_console_independence
    - minimum_field_set
    - reconstructable_from_export_alone

