schema_version: 1
contract_ref: docs/admin/audit_event_explorer_contract.md
audit_event_record_schema_ref: schemas/admin/audit_event_record.schema.json
audit_event_filter_schema_ref: schemas/admin/audit_event_filter.schema.json

rules:
  - Every case is one boundary record validated by the cited schema.
  - Each row answers who, what, where, when, and outcome with the
    same vocabulary the policy center and admin handoff exports use.
  - Stale and offline are first-class state; partial views label
    themselves rather than implying full history.
  - record_delete_requested is distinct from record_delete_completed.
    Holds, retention windows, and operator review can sit between.
  - failed_privileged_action is its own first-class family alongside
    successful events.
  - Records carry opaque refs and reviewable summaries; raw policy
    bundles, raw signing material, raw issuer URLs, raw SCIM
    endpoints, raw mirror hostnames, raw user identifiers, raw email
    or display names, raw subject claims, raw provider payloads, raw
    IP addresses, raw device fingerprints, raw paths, raw tokens,
    raw command lines, and raw secret material do not appear.

cases:
  - fixture: policy_change_event.yaml
    record_kind: audit_event_record
    schema_ref: schemas/admin/audit_event_record.schema.json
    covers:
      - policy_change_family
      - five_axis_answerability
      - related_object_deep_links
  - fixture: trust_downgrade_event.yaml
    record_kind: audit_event_record
    schema_ref: schemas/admin/audit_event_record.schema.json
    covers:
      - trust_change_family
      - workspace_trust_downgrade
      - next_safe_action
  - fixture: collaboration_control_grant_event.yaml
    record_kind: audit_event_record
    schema_ref: schemas/admin/audit_event_record.schema.json
    covers:
      - collaboration_control_grant_family
      - capability_scope_targeting
      - related_object_deep_links
  - fixture: failed_privileged_action_event.yaml
    record_kind: audit_event_record
    schema_ref: schemas/admin/audit_event_record.schema.json
    covers:
      - failed_privileged_action_family
      - stale_past_grace_source_posture
      - first_class_failure_visibility
  - fixture: delete_request_lifecycle_event.yaml
    record_kind: audit_event_record
    schema_ref: schemas/admin/audit_event_record.schema.json
    covers:
      - delete_or_export_lifecycle_family
      - delete_request_distinct_from_completion
      - retention_or_hold_linkage
  - fixture: partial_history_view.yaml
    record_kind: audit_event_history_completeness_record
    schema_ref: schemas/admin/audit_event_filter.schema.json
    covers:
      - partial_history_labelling
      - mirrored_stale_past_grace_posture
      - next_safe_action
  - fixture: tenant_scoped_export_packet.yaml
    record_kind: audit_event_export_record
    schema_ref: schemas/admin/audit_event_filter.schema.json
    covers:
      - tenant_scoped_admin_audit_export
      - vendor_console_independence
      - minimum_field_set
      - reconstructable_from_export_alone
