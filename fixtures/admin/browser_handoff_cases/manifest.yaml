schema_version: 1
contract_ref: docs/admin/browser_handoff_and_surface_parity_contract.md
browser_handoff_record_schema_ref: schemas/admin/browser_handoff_record.schema.json

rules:
  - Every case is one boundary record validated by the cited schema.
  - Browser/vendor-console pivots must keep authority scope, target identity, and return anchor explicit.
  - Parity gaps are disclosed before launch and preserved in export-safe records.
  - Evidence continuity is preserved via stable opaque refs (object refs + history row refs) rather than raw URLs.
  - Records do not contain raw URLs, raw tokens, raw provider payloads, raw user identifiers, or secret material.

cases:
  - fixture: incident_drill_handoff.yaml
    record_kind: browser_handoff_record
    schema_ref: schemas/admin/browser_handoff_record.schema.json
    covers:
      - incident_drill_read_only_overlay
      - evidence_continuity
      - parity_disclosure
  - fixture: admin_policy_review_handoff.yaml
    record_kind: browser_handoff_record
    schema_ref: schemas/admin/browser_handoff_record.schema.json
    covers:
      - policy_review_overlay
      - console_only_detail_disclosure
      - return_anchor
  - fixture: support_packet_portal_handoff.yaml
    record_kind: browser_handoff_record
    schema_ref: schemas/admin/browser_handoff_record.schema.json
    covers:
      - support_packet_delivery
      - export_safe_submission
      - fallback_local_export
  - fixture: offline_self_hosted_non_parity_disclosure.yaml
    record_kind: browser_handoff_record
    schema_ref: schemas/admin/browser_handoff_record.schema.json
    covers:
      - handoff_blocked_unavailable
      - explicit_non_parity_disclosure
      - safe_fallback_export

