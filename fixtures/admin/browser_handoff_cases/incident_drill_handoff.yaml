# yaml-language-server: $schema=../../../schemas/admin/browser_handoff_record.schema.json
__fixture__:
  name: incident_drill_handoff
  scenario: >
    An incident drill is run locally. A browser-based incident viewer is
    opened as a read-only overlay, but the incident identity, evidence
    bundle refs, and chronology remain anchored to local/exportable
    objects. The handoff record makes the authority scope, return
    anchor, and parity posture explicit before launch.
  exercised_contract_sections:
    - browser_handoff_record_minimums
    - incident_viewer_read_only_overlay
    - evidence_continuity
    - parity_disclosure_before_launch

record_kind: browser_handoff_record
browser_handoff_record_schema_version: 1
handoff_id: browser-handoff:incident-drill:0100
handoff_state_class: disclosed_pending_launch
occurred_at: "2026-05-05T10:10:00Z"
assembled_at: "2026-05-05T10:10:02Z"

policy_context:
  identity_mode: managed_workspace
  deployment_profile_class: enterprise_online
  trust_state: trusted
  policy_epoch: policy_epoch.managed.20260505.0100
  entitlement_epoch: entitlement_epoch.managed.20260505.0100

reason:
  reason_code: incident_drill
  reason_note: Open a browser incident viewer as a read-only overlay for drill review; local evidence remains canonical.

destination:
  destination_class: incident_viewer_web
  destination_ref: incident-viewer:drill:0100
  destination_label: Incident viewer (drill)
  browser_handoff_packet_ref: browser-handoff-packet:incident-viewer:0100
  console_handoff_session_ref: null
  destination_note: The viewer is a convenience overlay; it is not the only source of truth for incident identity or evidence.

target_identity:
  target_kind: incident_workspace
  target_ref: incident-workspace:drill:0100
  target_label: Incident drill workspace
  target_note: The viewer must cite the same incident workspace id and evidence bundle ids used by product and exports.

authority_transfer:
  authority_scope_class: read_only_overlay
  authority_transfer_note: The external viewer is read-only; no mitigation mutations are permitted without an attributable handoff envelope and local evidence anchors.

return_anchor:
  return_anchor_class: deep_link_to_target
  return_anchor_ref: incident-workspace:drill:0100
  return_anchor_label: Return to incident workspace
  return_anchor_note: Return to the local incident workspace to review the evidence bundle chronology and export packet.

evidence_continuity:
  primary_object_ref: incident-workspace:drill:0100
  history_row_refs:
    - incident-action-ledger:drill:0100
    - evidence-bundle:incident-drill:0100
  related_object_refs:
    - incident-workspace-packet:drill:0100
    - observability-signal-slice:incident-drill:0100
    - support-bundle:incident-drill:0100
  continuity_note: Product, external viewer, and export surfaces cite the same incident workspace id and evidence bundle ids.

parity_disclosure:
  parity_class: partial_parity_disclosed
  parity_summary: The browser viewer adds convenience visualization, but incident identity and evidence remain anchored locally and exportably.
  parity_gaps:
    - gap_class: detail_only_in_external_surface
      gap_note: The external viewer may show richer visualization, but all contractual identity and chronology fields remain available locally or via export.
      safe_fallback_ref: evidence-bundle:incident-drill:0100

human_readable_summary: Browser incident viewer handoff disclosed for drill review; authority is read-only and evidence continuity remains anchored to local incident workspace objects.

redaction_summary:
  redaction_class: metadata_safe_default
  included_data_classes:
    - handoff.reason_and_destination_class
    - target.identity_refs
    - authority.scope_class
    - return.anchor
    - evidence.refs
  omitted_data_classes:
    - raw.url
    - raw.tokens
    - raw.provider_payload
    - user.identifier_raw
    - secret.material
  redaction_note: The handoff record uses opaque refs and reviewable summaries; raw URLs, tokens, and private payloads are omitted.

