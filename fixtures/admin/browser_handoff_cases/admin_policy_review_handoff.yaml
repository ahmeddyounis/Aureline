# yaml-language-server: $schema=../../../schemas/admin/browser_handoff_record.schema.json
__fixture__:
  name: admin_policy_review_handoff
  scenario: >
    An administrator reviews effective policy in the product, then opens
    a browser policy console to inspect console-only annotations. The
    record discloses the partial-parity gap up front and anchors the
    review back to stable policy and audit refs available locally or via
    export.
  exercised_contract_sections:
    - policy_review_parity
    - console_only_detail_disclosure
    - return_anchor_required

record_kind: browser_handoff_record
browser_handoff_record_schema_version: 1
handoff_id: browser-handoff:policy-review:0200
handoff_state_class: launched
occurred_at: "2026-05-05T10:30:00Z"
assembled_at: "2026-05-05T10:30:03Z"

policy_context:
  identity_mode: managed_workspace
  deployment_profile_class: enterprise_online
  trust_state: trusted
  policy_epoch: policy_epoch.managed.20260505.0200
  entitlement_epoch: entitlement_epoch.managed.20260505.0200

reason:
  reason_code: policy_review
  reason_note: Open a browser policy console to review console-only annotations while keeping effective state and epochs resolvable locally or via export.

destination:
  destination_class: policy_console_web
  destination_ref: vendor-console:policy-history:0200
  destination_label: Policy console
  browser_handoff_packet_ref: browser-handoff-packet:policy-console:0200
  console_handoff_session_ref: null
  destination_note: The policy console is an overlay; effective policy state and minimum history rows remain exportable without console access.

target_identity:
  target_kind: policy_state
  target_ref: effective-policy-card:managed:0200
  target_label: Effective policy card
  target_note: The review remains anchored to the effective policy card and its linked audit rows rather than console page state.

authority_transfer:
  authority_scope_class: read_only_overlay
  authority_transfer_note: The external policy console is used for inspection only; policy mutations remain governed by typed policy/audit records and explicit handoff envelopes.

return_anchor:
  return_anchor_class: open_policy_or_audit_view
  return_anchor_ref: effective-policy-card:managed:0200
  return_anchor_label: Open effective policy card
  return_anchor_note: Return to the effective policy card to inspect source freshness, lock owner, and linked audit rows.

evidence_continuity:
  primary_object_ref: effective-policy-card:managed:0200
  history_row_refs:
    - policy-decision-row:managed:0200
    - audit-event:policy-change:managed:0200
  related_object_refs:
    - policy-diff:managed:0200
    - admin-audit-export:managed:0200
  continuity_note: The console overlay and exported evidence cite the same policy card ref, decision row ref, and audit-event ref.

parity_disclosure:
  parity_class: partial_parity_disclosed
  parity_summary: Console-only annotations are not required for baseline explainability; effective state, epochs, and minimum history rows remain available locally or in export.
  parity_gaps:
    - gap_class: detail_only_in_external_surface
      gap_note: Console-only annotations are visible only in the browser console; the product and exports preserve effective state, epochs, and minimum audit rows.
      safe_fallback_ref: admin-audit-export:managed:0200

human_readable_summary: Browser policy console opened for inspection; effective policy state remains anchored to local policy card and audit refs with console-only detail disclosed up front.

redaction_summary:
  redaction_class: metadata_safe_default
  included_data_classes:
    - handoff.reason_and_destination_class
    - policy.identity_refs
    - audit.minimum_history_row_refs
    - return.anchor
  omitted_data_classes:
    - raw.url
    - raw.tokens
    - policy.rule_body
    - tenant.directory_payload
    - secret.material
  redaction_note: The record preserves refs and summaries only; raw console URLs, tokens, and policy bodies are omitted.

