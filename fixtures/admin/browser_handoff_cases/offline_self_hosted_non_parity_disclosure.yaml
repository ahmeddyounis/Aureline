# yaml-language-server: $schema=../../../schemas/admin/browser_handoff_record.schema.json
__fixture__:
  name: offline_self_hosted_non_parity_disclosure
  scenario: >
    A self-hosted or air-gapped profile cannot reach a vendor console.
    The product discloses the non-parity state before any launch attempt,
    records the blocked handoff, and provides an export-safe fallback
    path to the same underlying audit/policy objects.
  exercised_contract_sections:
    - explicit_non_parity_disclosure
    - handoff_blocked_destination_unavailable
    - fallback_export_path

record_kind: browser_handoff_record
browser_handoff_record_schema_version: 1
handoff_id: browser-handoff:offline-non-parity:0400
handoff_state_class: blocked_destination_unavailable
occurred_at: "2026-05-05T11:22:00Z"
assembled_at: "2026-05-05T11:22:04Z"

policy_context:
  identity_mode: self_hosted_org
  deployment_profile_class: air_gapped
  trust_state: trusted
  policy_epoch: policy_epoch.selfhosted.20260505.0400
  entitlement_epoch: entitlement_epoch.selfhosted.20260505.0400

reason:
  reason_code: explicit_non_parity_disclosure
  reason_note: Disclose that an external vendor console is unavailable in this profile and provide an export-safe fallback for audit/policy truth.

destination:
  destination_class: admin_console_web
  destination_ref: null
  destination_label: Vendor console (unavailable)
  browser_handoff_packet_ref: null
  console_handoff_session_ref: null
  destination_note: This deployment profile does not provide a vendor console surface; the product must not imply that console access exists.

target_identity:
  target_kind: audit_slice
  target_ref: admin-audit-export:self-hosted:0400
  target_label: Admin audit export
  target_note: Audit and policy truth remain reconstructable from export packets and locally resolvable refs without a vendor console.

authority_transfer:
  authority_scope_class: read_only_overlay
  authority_transfer_note: No external authority is available in this profile; inspection occurs through local admin surfaces and export packets only.

return_anchor:
  return_anchor_class: open_export_or_packet
  return_anchor_ref: admin-audit-export:self-hosted:0400
  return_anchor_label: Open admin audit export
  return_anchor_note: Use the local/exportable audit packet to review scope, epochs, and minimum event rows without external console access.

evidence_continuity:
  primary_object_ref: admin-audit-export:self-hosted:0400
  history_row_refs:
    - audit-event:policy-change:self-hosted:0400
    - policy-decision-row:self-hosted:0400
  related_object_refs:
    - effective-policy-card:self-hosted:0400
    - policy-diff:self-hosted:0400
  continuity_note: When the external console is unavailable, the record preserves stable refs to local/exportable audit and policy objects so evidence continuity remains intact.

parity_disclosure:
  parity_class: handoff_blocked_non_parity_disclosed
  parity_summary: External vendor-console access is unavailable in this profile; the product provides an export-safe audit/policy evidence path instead.
  parity_gaps:
    - gap_class: external_surface_unavailable_in_profile
      gap_note: The vendor console surface is not available on air-gapped/self-hosted profiles; rely on local admin surfaces and export packets.
      safe_fallback_ref: admin-audit-export:self-hosted:0400

human_readable_summary: Vendor console handoff blocked on an air-gapped profile; non-parity is disclosed before launch and the audit/policy fallback remains available via export-safe packets.

redaction_summary:
  redaction_class: metadata_safe_default
  included_data_classes:
    - destination.unavailable_disclosure
    - audit.policy.refs
    - return.anchor
    - parity.gap
  omitted_data_classes:
    - raw.url
    - raw.tokens
    - tenant.directory_payload
    - secret.material
  redaction_note: The record states the console is unavailable and preserves only stable refs and reviewable summaries.

