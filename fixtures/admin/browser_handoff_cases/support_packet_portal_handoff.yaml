# yaml-language-server: $schema=../../../schemas/admin/browser_handoff_record.schema.json
__fixture__:
  name: support_packet_portal_handoff
  scenario: >
    A user prepares a support packet and chooses to open a support portal
    in the browser to submit it. The record makes the delivery pivot
    explicit, anchors the submission to stable packet refs, and preserves
    a return anchor back to the local support/export surface so the
    product does not depend on the portal to retain evidence.
  exercised_contract_sections:
    - support_packet_delivery_handoff
    - evidence_continuity_support_bundle
    - return_anchor_to_export

record_kind: browser_handoff_record
browser_handoff_record_schema_version: 1
handoff_id: browser-handoff:support-portal:0300
handoff_state_class: launched
occurred_at: "2026-05-05T11:05:00Z"
assembled_at: "2026-05-05T11:05:06Z"

policy_context:
  identity_mode: account_free_local
  deployment_profile_class: individual_local
  trust_state: trusted
  policy_epoch: null
  entitlement_epoch: null

reason:
  reason_code: procurement_or_support_packet
  reason_note: Open a support portal to submit a prepared support packet; local export remains the canonical evidence copy.

destination:
  destination_class: support_portal_web
  destination_ref: support-portal:submission:0300
  destination_label: Support portal
  browser_handoff_packet_ref: browser-handoff-packet:support-portal:0300
  console_handoff_session_ref: null
  destination_note: Portal submission is optional; the support packet remains available locally for export and offline continuity.

target_identity:
  target_kind: support_packet
  target_ref: support-bundle:local:0300
  target_label: Support bundle
  target_note: Submission references the same support bundle id and redaction posture used by product and exports.

authority_transfer:
  authority_scope_class: limited_mutation_handoff_only
  authority_transfer_note: The portal submission is an external delivery step; it must not be treated as the only copy of evidence or as the only way to inspect packet contents.

return_anchor:
  return_anchor_class: open_export_or_packet
  return_anchor_ref: support-bundle:local:0300
  return_anchor_label: Open support bundle
  return_anchor_note: Return to the local support bundle view to inspect, redact, and re-export the packet without relying on the portal.

evidence_continuity:
  primary_object_ref: support-bundle:local:0300
  history_row_refs:
    - support-packet-index-row:object-handoff:0300
  related_object_refs:
    - object-handoff-packet:0300
    - exact-build:local:0300
    - crash-envelope:local:0300
  continuity_note: The support portal is a delivery endpoint; the canonical evidence remains the local support bundle and its referenced packet refs.

parity_disclosure:
  parity_class: non_parity_explicit
  parity_summary: The support portal is external and not required for baseline explainability; local export remains the contractual evidence path.
  parity_gaps:
    - gap_class: out_of_scope_handoff_only
      gap_note: Submitting to an external portal is out of scope for the local-first product contract; export and support bundles remain available locally.
      safe_fallback_ref: support-bundle:local:0300

human_readable_summary: Support portal handoff launched for packet submission; the record keeps local export as the canonical evidence path and anchors the return to the local support bundle.

redaction_summary:
  redaction_class: metadata_safe_default
  included_data_classes:
    - destination.class
    - support_bundle.ref
    - handoff.reason
    - return.anchor
  omitted_data_classes:
    - raw.url
    - raw.tokens
    - raw.logs
    - user.identifier_raw
    - secret.material
  redaction_note: The handoff record is export-safe and does not embed portal URLs, tokens, or raw evidence bytes.

