__fixture__:
  name: deprovisioning_preserves_local_artifacts
  scenario: >
    A signed lifecycle update deprovisions a managed seat. Managed
    capabilities are revoked, but local edit, save, undo or redo, and
    user-owned export remain available, and an offboarding export
    path that does not require a live managed seat is exposed.
  exercised_contract_sections:
    - seat_deprovisioning
    - distinct_from_local_artifact_deletion
    - offboarding_export_without_live_seat

