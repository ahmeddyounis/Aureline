schema_version: 1
contract_ref: docs/admin/org_admin_seat_and_fleet_contract.md
seat_lifecycle_row_schema_ref: schemas/admin/seat_lifecycle_row.schema.json
fleet_status_row_schema_ref: schemas/admin/fleet_status_row.schema.json

rules:
  - Every case is one boundary record validated by the cited schema.
  - Local edit, save, undo or redo, and user-owned export remain explicit on every record.
  - Standards-based and file-based administration paths appear as peers; both reuse the same freshness, failure, rollback, and auditability vocabulary.
  - Stale, offline, drifted, and quarantined device cohorts are distinct first-class state and are not collapsed into a single bucket.
  - Deprovisioning is visibly distinct from local artifact deletion; offboarding export does not require a live managed seat.
  - Group-to-policy targeting renders as a previewable record with commit gates before any commit.
  - Records carry opaque refs and reviewable summaries; raw directory payloads, raw bundle bytes, raw signing material, raw user identifiers, raw hostnames, and raw URLs do not appear.

cases:
  - fixture: organization_overview_self_hosted.yaml
    record_kind: organization_overview_record
    schema_ref: schemas/admin/seat_lifecycle_row.schema.json
    covers:
      - organization_overview
      - administration_model_parity
      - exportable_evidence_without_vendor_console
  - fixture: file_based_policy_distribution.yaml
    record_kind: directory_provider_card_record
    schema_ref: schemas/admin/seat_lifecycle_row.schema.json
    covers:
      - administration_model_parity
      - directory_provider_card
      - exportable_evidence
  - fixture: scim_drift_targeting_preview.yaml
    record_kind: group_policy_targeting_sheet_record
    schema_ref: schemas/admin/seat_lifecycle_row.schema.json
    covers:
      - directory_drift_detection
      - group_policy_targeting_preview
      - commit_gate_blocking_drift
  - fixture: seat_transfer_preserves_local_artifacts.yaml
    record_kind: seat_lifecycle_row_record
    schema_ref: schemas/admin/seat_lifecycle_row.schema.json
    covers:
      - seat_lifecycle_transitions
      - entitlement_consequences
      - local_continuity_assertion
  - fixture: deprovisioning_preserves_local_artifacts.yaml
    record_kind: seat_lifecycle_row_record
    schema_ref: schemas/admin/seat_lifecycle_row.schema.json
    covers:
      - seat_deprovisioning
      - distinct_from_local_artifact_deletion
      - offboarding_export_without_live_seat
  - fixture: fleet_ring_with_stale_and_offline_devices.yaml
    record_kind: fleet_ring_dashboard_record
    schema_ref: schemas/admin/fleet_status_row.schema.json
    covers:
      - fleet_ring_dashboard
      - stale_and_offline_first_class_states
      - exportable_evidence
