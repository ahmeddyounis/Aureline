# yaml-language-server: $schema=../../../schemas/admin/seat_lifecycle_row.schema.json
__fixture__:
  name: organization_overview_self_hosted
  scenario: >
    A self-hosted deployment renders an organization overview without
    assuming a vendor-only control plane is reachable. Standards-based
    and file-based administration paths appear as peers, and the
    overview cites tenant identity, deployment mode, policy source,
    seat summary, rollout-ring summary, last successful sync, and
    exportable evidence refs.
  exercised_contract_sections:
    - organization_overview
    - administration_model_parity
    - exportable_evidence_without_vendor_console

record_kind: organization_overview_record
org_admin_seat_and_fleet_schema_version: 1
overview_id: organization-overview:self-hosted:0001
title: Self-hosted research tenant overview
tenant_identity:
  tenant_or_org_ref: tenant-or-org:self-hosted:0001
  tenant_label: Self-hosted research tenant
  identity_mode: self_hosted_org
  deployment_profile_class: self_hosted
  policy_epoch: policy_epoch.self_hosted.20260428.0001
  trust_state: trusted
administration_paths:
  - administration_path_class: file_based_policy
    administration_model_class: file_based_signed_bundle
    provider_class: signed_file_based_policy_provider
    standards_class: signed_file_or_bundle_v1
    freshness_class: manual_snapshot_current
    validation_state_class: verified_current
    failure_family_class: none
    rollback_state_class: last_known_good_available
    last_successful_sync_at: "2026-04-28T11:05:00Z"
    next_refresh_due_at: "2026-05-28T11:05:00Z"
    directory_provider_card_ref: directory-provider-card:file-based-policy:0001
    summary: Signed file-based bundle currently governs policy and seat roster.
  - administration_path_class: identity_only
    administration_model_class: standards_oidc_only
    provider_class: oidc_identity_provider
    standards_class: oidc_with_pkce
    freshness_class: authoritative_live
    validation_state_class: verified_current
    failure_family_class: none
    rollback_state_class: not_applicable
    last_successful_sync_at: "2026-04-29T07:30:00Z"
    next_refresh_due_at: null
    directory_provider_card_ref: directory-provider-card:oidc-self-hosted:0001
    summary: OIDC identity provider issues sign-in tokens; provisioning runs through the file-based bundle path.
policy_source_summary:
  policy_bundle_ref: policy-bundle:self-hosted:research
  bundle_version: self_hosted_research_policy@2.4.0
  policy_epoch: policy_epoch.self_hosted.20260428.0001
  signer_continuity_state_class: stable
  last_successful_refresh_at: "2026-04-28T11:05:00Z"
  summary: The signed self-hosted policy bundle is current and signer continuity is stable.
seat_summary:
  total_seat_count: 56
  by_seat_state:
    - seat_state_class: active
      seat_count: 52
      summary: Active research seats.
    - seat_state_class: pending
      seat_count: 2
      summary: Seats awaiting first-time provisioning by the next signed roster.
    - seat_state_class: suspended
      seat_count: 2
      summary: Seats paused pending admin review.
  summary: 52 active seats, 2 pending, 2 suspended.
rollout_ring_summary:
  ring_class: stable
  lane_scope_class: release_channel_population
  fleet_ring_dashboard_ref: fleet-ring-dashboard:self-hosted:stable:0001
  last_successful_promotion_at: "2026-04-25T18:00:00Z"
  summary: The stable channel is the active rollout lane for this tenant.
directory_provider_card_refs:
  - directory-provider-card:file-based-policy:0001
  - directory-provider-card:oidc-self-hosted:0001
fleet_ring_dashboard_refs:
  - fleet-ring-dashboard:self-hosted:stable:0001
active_targeting_sheet_refs: []
exportable_evidence_refs:
  - admin-audit-packet:file-based-policy:import:0001
  - admin-handoff-export:self-hosted:0001
  - support-packet:self-hosted:0001
export_pair:
  human_summary_ref: human-summary:organization-overview:self-hosted:0001
  machine_packet_ref: machine-packet:organization-overview:self-hosted:0001
  machine_schema_ref: schemas/admin/seat_lifecycle_row.schema.json
  formats:
    - markdown_summary
    - json_packet
    - cli_json_stdout
  redaction_summary:
    redaction_class: metadata_safe_default
    included_data_classes:
      - administration.path_class
      - administration.freshness
      - seat.counts
      - audit.refs
    omitted_data_classes:
      - directory.attribute_payload
      - bundle.signature_bytes
      - mirror.hostname_raw
    redaction_note: The packet preserves administration path classes, freshness, seat counts, and audit refs while omitting raw signing material and directory attributes.
  compatible_consumer_classes:
    - desktop_admin_center
    - cli_json_reader
    - support_bundle_exporter
    - admin_audit_reader
deep_links:
  - link_class: directory_provider_card
    route_ref: route-admin-directory-card-file-based
    target_record_ref: directory-provider-card:file-based-policy:0001
    label: Open file-based provider card
    available_offline: true
    unavailable_reason: null
  - link_class: directory_provider_card
    route_ref: route-admin-directory-card-oidc
    target_record_ref: directory-provider-card:oidc-self-hosted:0001
    label: Open OIDC provider card
    available_offline: true
    unavailable_reason: null
  - link_class: fleet_ring_dashboard
    route_ref: route-fleet-ring-dashboard-self-hosted-stable
    target_record_ref: fleet-ring-dashboard:self-hosted:stable:0001
    label: Open stable ring dashboard
    available_offline: true
    unavailable_reason: null
  - link_class: admin_handoff_export
    route_ref: route-admin-handoff-self-hosted
    target_record_ref: admin-handoff-export:self-hosted:0001
    label: Export admin handoff
    available_offline: true
    unavailable_reason: null
local_continuity:
  edit_local_artifacts: true
  save_local_artifacts: true
  undo_redo_local_artifacts: true
  export_user_owned_artifacts: true
  retained_local_capabilities:
    - Edit local files
    - Save local files
    - Undo and redo local edits
    - Export user-owned local artifacts
    - Use local Git
    - Run local tasks in a trusted workspace
  paused_managed_capabilities: []
  continuity_note: Self-hosted administration is current; local edit, save, undo or redo, and export remain available regardless of upstream reachability.
redaction_summary:
  redaction_class: metadata_safe_default
  included_data_classes:
    - administration.path_class
    - administration.freshness
    - seat.counts
    - rollout.ring_class
    - audit.refs
  omitted_data_classes:
    - directory.attribute_payload
    - bundle.signature_bytes
    - mirror.hostname_raw
  redaction_note: The overview preserves path classes, freshness, seat counts, and audit refs while omitting raw signing material, directory attributes, and mirror hostnames.
rendered_summary: A self-hosted research tenant currently runs on a signed file-based bundle path plus OIDC sign-in; standards-based and file-based paths are listed as peers.
