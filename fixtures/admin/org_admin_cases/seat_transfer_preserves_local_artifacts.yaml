__fixture__:
  name: seat_transfer_preserves_local_artifacts
  scenario: >
    A managed seat is transferred from a source seat to a target seat.
    Managed capabilities pause on the source seat and resume on the
    target seat once reauth completes. Local files, unsaved edits,
    local Git, local tasks, and user-owned exports remain available on
    both seats.
  exercised_contract_sections:
    - seat_lifecycle_transitions
    - entitlement_consequences
    - local_continuity_assertion

