    - seat_state_class: pending
      seat_count: 14
      summary: Seats awaiting first-time SCIM provisioning.
    - seat_state_class: suspended
      seat_count: 8
      summary: Seats paused pending admin review.
  summary: Engineering and design groups represent 184 seats; SCIM drift means the live count may not match the local snapshot.
commit_gates:
  - gate_class: signer_continuity_check
    gate_state_class: blocked
    gate_summary: SCIM provider rotated its trust anchor and the local install has not yet observed the new continuity proof.
  - gate_class: mirror_freshness_check
    gate_state_class: passing
    gate_summary: The signed bundle mirror is current.
  - gate_class: manual_admin_approval
    gate_state_class: pending
    gate_summary: Admin approval is held until directory drift is resolved.
  - gate_class: conflicting_policy_resolution
    gate_state_class: passing
    gate_summary: No conflicting policy is currently in force on the affected groups.
preview_continuity:
  unchanged_seat_count: 162
  would_change_seat_count: 22
  would_pause_managed_capabilities:
