  would_revoke_managed_capabilities: []
  local_continuity:
    edit_local_artifacts: true
    save_local_artifacts: true
    undo_redo_local_artifacts: true
    export_user_owned_artifacts: true
    retained_local_capabilities:
      - Edit local files
      - Save local files
      - Undo and redo local edits
      - Export user-owned local artifacts
      - Use local Git
    paused_managed_capabilities: []
    continuity_note: Local edit, save, undo or redo, and export remain available; the preview does not change managed posture.
  summary: Preview would narrow managed AI for 22 seats; no managed posture changes until drift is resolved and gates pass.
