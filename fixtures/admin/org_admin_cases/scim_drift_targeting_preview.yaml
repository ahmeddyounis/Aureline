# yaml-language-server: $schema=../../../schemas/admin/seat_lifecycle_row.schema.json
__fixture__:
  name: scim_drift_targeting_preview
  scenario: >
    A managed deployment uses an OIDC identity provider plus a SCIM
    provisioning provider. The SCIM seat roster has drifted from the
    local install, so a group-to-policy targeting sheet runs in
    previewed dry-run mode and reports drift before any commit.
  exercised_contract_sections:
    - directory_drift_detection
    - group_policy_targeting_preview
    - commit_gate_blocking_drift

record_kind: group_policy_targeting_sheet_record
org_admin_seat_and_fleet_schema_version: 1
targeting_sheet_id: group-policy-targeting-sheet:scim-drift:0001
title: AI provider narrowing targeting preview
tenant_identity:
  tenant_or_org_ref: tenant-or-org:managed:0001
  tenant_label: Managed enterprise tenant
  identity_mode: managed_workspace
  deployment_profile_class: enterprise_online
  policy_epoch: policy_epoch.managed.20260429.0001
  trust_state: trusted
targeting_state_class: blocked
blocker_class: signer_continuity_broken
group_selector_refs:
  - group_ref: group-ref:engineering-platform
    group_class: directory_synced_group
    group_label: Engineering platform group
    directory_provider_card_ref: directory-provider-card:scim-managed:0001
  - group_ref: group-ref:design-systems
    group_class: directory_synced_group
    group_label: Design systems group
    directory_provider_card_ref: directory-provider-card:scim-managed:0001
affected_policy_refs:
