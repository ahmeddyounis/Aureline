    export_availability_class to
    third_party_re_export_outside_aureline_scope, and
    irreversible_share_warning_class to third_party_export_irreversible
    because re-export through Aureline is not admitted. The bound
    delete-path-status row resolves to
    deletion_not_yet_requested_inspectable_only with
    follow_up_wording_class =
    follow_up_third_party_origin_outside_aureline_scope: a delete
    request inside Aureline cannot affect the import-origin copy;
    the user MUST be sent back to the import origin.
  exercised_contract_sections:
    - "Visible-row vocabulary (frozen) — imported_or_support_evidence_packet_row branch"
    - "Required fields per row kind (frozen) — imported packet"
    - "Delete-path status vocabulary (frozen) — inspectable-only branch"
    - "Pre- and post-session inspection rule"
    - "Acceptance-criteria cross-walk bullet 5"
  exercised_classes_summary:
    artifact_row_kinds:
      - imported_or_support_evidence_packet_row
    recording_state_classes:
      - captured_export_available
    retention_owner_classes:
      - third_party_imported_origin
    location_classes:
      - third_party_import_origin
    export_availability_classes:
      - third_party_re_export_outside_aureline_scope
    default_ephemeral_versus_explicit_enable_classes:
      - imported_origin_not_subject_to_default
    legal_hold_note_classes:
      - no_hold
    irreversible_share_warning_classes:
      - third_party_export_irreversible
    delete_path_status_classes:
      - deletion_not_yet_requested_inspectable_only
    follow_up_wording_classes:
      - follow_up_third_party_origin_outside_aureline_scope
    inspection_window_classes:
      - inspectable_before_and_after_session_end
    exported_local_copy_disclosure_classes:
      - no_local_copy_exported

