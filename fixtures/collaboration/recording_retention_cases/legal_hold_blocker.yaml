__fixture__:
  name: legal_hold_blocker
  scenario: >
    A support / regulated session whose full-session recording is
    held under a legal hold issued under an external jurisdiction's
    compliance regime. The recording row resolves to
    stopped_finalized, retention_owner_class to
    admin_signed_managed_surface, location_class to
    hosted_managed_surface_only, and legal_hold_note_class to
    hold_active_user_delete_recorded_not_completed because a user
    delete request was accepted but is not completed. The bound
    delete-path-status row resolves to deletion_blocked_legal_hold
    with delete_path_status_label = "Delete blocked: legal hold",
    follow_up_wording_class = follow_up_legal_hold_review_required,
    hold_kind_class = legal_hold_external_jurisdiction, and
    inspection_window_class = inspectable_before_and_after_session_end.
    The chip MUST surface the hold and the follow-up wording so the
    held artifact cannot masquerade as deleted on any consuming
    surface.
  exercised_contract_sections:
    - "Visible-row vocabulary (frozen) — stopped_finalized branch"
    - "Delete-path status vocabulary (frozen) — legal-hold block branch"
    - "Hold-kind and hold-note rules"
    - "Pre- and post-session inspection rule"
    - "Acceptance-criteria cross-walk bullet 4"
  exercised_classes_summary:
    artifact_row_kinds:
      - recording_or_transcript_or_replay_artifact_row
    recording_state_classes:
      - stopped_finalized
    retention_owner_classes:
      - admin_signed_managed_surface
    location_classes:
      - hosted_managed_surface_only
    export_availability_classes:
      - support_bundle_export_admin_signed
    default_ephemeral_versus_explicit_enable_classes:
      - explicit_enable_policy_forced_admin_signed
    legal_hold_note_classes:
      - hold_active_user_delete_recorded_not_completed
    irreversible_share_warning_classes:
      - no_irreversible_share
    delete_path_status_classes:
      - deletion_blocked_legal_hold
    follow_up_wording_classes:
      - follow_up_legal_hold_review_required
    hold_kind_classes:
      - legal_hold_external_jurisdiction
    inspection_window_classes:
      - inspectable_before_and_after_session_end
    exported_local_copy_disclosure_classes:
      - no_local_copy_exported

