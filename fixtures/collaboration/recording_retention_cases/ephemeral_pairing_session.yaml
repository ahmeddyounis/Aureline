# yaml-language-server: $schema=../../../schemas/collaboration/recorded_artifact_row.schema.json
__fixture__:
  name: ephemeral_pairing_session
  scenario: >
    A two-participant pair-programming session admitted under
    live_only_no_retention. Every visible row on the session
    inspector resolves to default_ephemeral_no_capture or
    never_admitted_at_this_mode, no_retention_owner_live_only, and
    no_location_live_only. Recording, transcript, and replay-artifact
    rows are explicitly never_admitted_at_this_mode. The bound
    delete-path-status rows resolve to
    deletion_not_applicable_live_only_row with
    inspectable_before_session_end_only because the rows describe
    only the active turn. Nothing crosses to a managed surface; the
    chip is honest at every step.
  exercised_contract_sections:
    - "Default-ephemeral versus explicit-enable rule (frozen)"
    - "Visible-row vocabulary (frozen)"
    - "Required fields per row kind (frozen)"
    - "Delete-path status vocabulary (frozen) — live-only branch"
    - "Acceptance-criteria cross-walk bullet 3"
  exercised_classes_summary:
    artifact_row_kinds:
      - presence_or_temporary_control_grant_row
      - comment_or_review_thread_row
      - recording_or_transcript_or_replay_artifact_row
    recording_state_classes:
      - default_ephemeral_no_capture
      - never_admitted_at_this_mode
    retention_owner_classes:
      - no_retention_owner_live_only
    location_classes:
      - no_location_live_only
    export_availability_classes:
      - no_export_available
    default_ephemeral_versus_explicit_enable_classes:
      - default_ephemeral_not_admitted
    legal_hold_note_classes:
      - no_hold
    irreversible_share_warning_classes:
      - no_irreversible_share
    delete_path_status_classes:
      - deletion_not_applicable_live_only_row
    follow_up_wording_classes:
      - no_follow_up_needed
    inspection_window_classes:
      - inspectable_before_session_end_only
    exported_local_copy_disclosure_classes:
      - no_local_copy_exported

