    visible row resolves recording_state_class to capturing_now,
    retention_owner_class to admin_signed_managed_surface,
    location_class to hosted_managed_surface_only,
    default_ephemeral_versus_explicit_enable_class to
    explicit_enable_policy_forced_admin_signed, and
    irreversible_share_warning_class to no_irreversible_share. The
    bound delete-path-status row is
    deletion_not_yet_requested_inspectable_only because nobody has
    asked to delete the recording yet; the user can request a delete
    via follow_up_user_can_request_delete (which will then route
    through the regulated-review hold). Inspection window is
    inspectable_before_and_after_session_end so a participant can
    inspect delete posture both during the active session and after
    the session ends.
  exercised_contract_sections:
    - "Default-ephemeral versus explicit-enable rule (frozen) — explicit_enable_policy_forced_admin_signed"
