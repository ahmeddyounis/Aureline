# yaml-language-server: $schema=../../../schemas/collaboration/session_manifest.schema.json
__fixture__:
  name: control_requested_granted_revoked
  scenario: >
    A guest is admitted view-only and follows a shared debug overlay.
    The guest explicitly requests debug control. The request is recorded
    as a consent event with re_consent_trigger_reason_class =
    temporary_control_grant_requested_debugger. The host mints an
    explicit debug_lane control_grant_record admitting a bounded action
    set (step/continue). The host then revokes the grant immediately and
    non-replayably. No mutating authority is inferred from follow/presence
    or from the join itself.
  exercised_contract_sections:
    - "Control requested triggers consent event (frozen)"
    - "Explicit control grant required (frozen)"
    - "Immediate, non-replayable revocation (frozen)"
  exercised_classes_summary:
    join_outcome_classes:
      - join_admitted_view_only
    re_consent_trigger_reason_classes:
      - temporary_control_grant_requested_debugger
    control_grant_lane_classes:
      - debug_lane
    control_grant_revocation_cause_classes:
      - owner_revoked

