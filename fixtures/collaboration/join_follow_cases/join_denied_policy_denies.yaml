# yaml-language-server: $schema=../../../schemas/collaboration/session_manifest.schema.json
__fixture__:
  name: join_denied_policy_denies
  scenario: >
    A host publishes a live-only collaboration session whose guest-policy
    explicitly forbids public-link admission. A guest attempts to join.
    Policy validation denies the join. The guest still receives a
    pre-join disclosure manifest that makes retention/recording and
    control posture legible before entry. No shared control is implied
    by join intent, follow intent, or presence.
  exercised_contract_sections:
    - "Join-manifest pre-join disclosure (frozen)"
    - "Policy-gated join decision (frozen)"
    - "Retention/recording badge visible pre-join"
    - "No implicit control on denied join"
  exercised_classes_summary:
    manifest_phase_classes:
      - pre_join_disclosure
    join_policy_result_classes:
      - policy_denied
    join_outcome_classes:
      - join_denied
    join_denial_reasons:
      - denied_by_policy_guest_policy

