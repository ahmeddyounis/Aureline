# yaml-language-server: $schema=../../../schemas/collaboration/session_manifest.schema.json
__fixture__:
  name: retention_recording_change_mid_session
  scenario: >
    A guest is admitted view-only into a metadata-audited session whose
    recording row is default-ephemeral (no capture). Mid-session, the
    host enables recording for replayable review. This changes the
    session-policy manifest retention_mode_class to
    replayable_review_or_teaching and mints a re-consent event with a
    visible cue. The recording row transitions to capturing_now under
    explicit enable. The pre-join disclosure is still reconstructable,
    and the mid-session change is reconstructable from policy, recorded-
    artifact, and delete-path rows.
  exercised_contract_sections:
    - "Retention/recording posture visible pre-join"
    - "Mid-session re-consent required on recording_started"
    - "Recorded-artifact row transitions are auditable"
  exercised_classes_summary:
    retention_mode_classes:
      - metadata_audited_no_payload_retention
      - replayable_review_or_teaching
    re_consent_trigger_reason_classes:
      - recording_started

