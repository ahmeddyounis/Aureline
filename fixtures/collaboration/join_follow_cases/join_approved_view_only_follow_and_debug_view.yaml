# yaml-language-server: $schema=../../../schemas/collaboration/session_manifest.schema.json
__fixture__:
  name: join_approved_view_only_follow_and_debug_view
  scenario: >
    A host publishes a metadata-audited collaboration session. A named
    guest requests to join as an observer. Policy validation admits the
    join pending host approval. The join dialog renders the pre-join
    manifest (retention + control posture visible before entry). The
    host approves the join and the guest is admitted view-only. The
    guest subscribes to follow/presenter state and receives a shared
    debug overlay as a debug_session_record with
    debug_posture_live_shared_inspect_only. No control grants exist for
    terminal_lane or debug_lane; follow/presenter state does not imply
    control.
  exercised_contract_sections:
    - "Join-manifest pre-join disclosure (frozen)"
    - "Host approval gates admission (frozen)"
    - "Follow enabled without conferring control"
    - "Shared debug overlay is inspect-only without a grant"
  exercised_classes_summary:
    manifest_phase_classes:
      - pre_join_disclosure
      - post_join_admitted
    join_policy_result_classes:
      - policy_admitted_host_approval_required
    join_outcome_classes:
      - join_admitted_view_only

