# yaml-language-server: $schema=../../../schemas/collaboration/session_policy_manifest.schema.json
__fixture__:
  name: mid_session_re_consent
  scenario: >
    A session admitted as metadata_audited_no_payload_retention is
    amended mid-session to replayable_review_or_teaching because
    the host enabled a transcript. The amended manifest supersedes
    the prior one and a fresh
    collaboration_session_consent_event_record is minted citing
    re_consent_trigger_reason_class = transcript_enabled and
    visible_consent_cue_class =
    mid_session_modal_block_until_acknowledged. A silent change
    would have denied with mid_session_consent_cue_missing; this
    fixture shows the honest path.
  exercised_contract_sections:
    - "Consent cues and mid-session re-consent rules (frozen)"
    - "Acceptance-criteria cross-walk bullet 2"
  exercised_classes_summary:
    retention_mode_classes:
      - metadata_audited_no_payload_retention
      - replayable_review_or_teaching
    re_consent_trigger_reason_classes:
      - transcript_enabled
    visible_consent_cue_classes:
      - join_dialog_inline_disclosure_pre_admit
      - mid_session_modal_block_until_acknowledged

records:
  - record_kind: collaboration_session_policy_manifest_record
    session_policy_manifest_schema_version: 1
    policy_manifest_id: "collab:policy-manifest:amendment:prior:01"
    session_ref: "collab:session:amendment:01"
    host_org_ref: "org:host:01"
    owner_actor_ref: "actor:owner:04"
    participant_actor_refs:
      - "actor:participant:04:01"
      - "actor:participant:04:02"
    guest_actor_refs: []
    role_matrix_profile_class: owner_plus_editors_plus_reviewers
    retention_mode_class: metadata_audited_no_payload_retention
    guest_policy_class: no_guests_admitted_org_members_only
    route_share_policy_class: route_share_enabled_within_org_boundary
    residency_scope_class: org_region_pinned
    redaction_profile_class: redaction_strict_metadata_only_on_managed_surfaces
    audit_level_class: audit_standard_lifecycle_plus_consent_plus_retention
    export_rights:
      owner_actor_export_posture_class: exportable_metadata_only
      participant_actor_export_posture_class: exportable_metadata_only
      guest_actor_export_posture_class: not_exportable_ephemeral_only
      admin_export_posture_class: exportable_metadata_only
    delete_rights:
      owner_actor_delete_posture_class: deletion_completed_receipt_logged
      participant_actor_delete_posture_class: deletion_only_requested_not_yet_completed
      admin_actor_delete_posture_class: deletion_completed_receipt_logged
      legal_hold_overrides_user_delete_request: true
    retention_row_refs:
      - "collab:retention-row:amendment:comment:01"
    archive_refs: []
    active_visible_consent_cue_refs:
      - "collab:consent-event:amendment:pre-admit:01"
    summary_label: "Prior manifest: metadata-audited retention, transcript disabled."
    freshness_class: authoritative_live
    client_scopes: [desktop_product, managed_admin_surface]
    redaction_class: logs_remote
    minted_at: "2026-04-24T14:00:00Z"

  - record_kind: collaboration_session_retention_row_record
    session_policy_manifest_schema_version: 1
    retention_row_id: "collab:retention-row:amendment:comment:01"
