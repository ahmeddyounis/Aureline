# yaml-language-server: $schema=../../../schemas/collaboration/session_policy_manifest.schema.json
__fixture__:
  name: support_regulated_session
  scenario: >
    A support / regulated-review session admitted under
    support_or_regulated_retention_with_hold_eligibility. Recording,
    transcript, and both shared terminal control metadata and
    shared debug control metadata are explicitly opted-in via an
    admin-signed consent cue (policy-forced). A temporary terminal
    control grant is admitted for the duration of the session and
    is itself retained under admin-signed support-bundle posture.
    Every retention row resolves delete posture to
    deletion_blocked_legal_hold; user delete requests are
    disclosed but never complete until the hold clears. Shared
    terminal / debugger retention is NEVER implied by ordinary
    collaboration: the opt-in is visible in opt_in_required_class.
  exercised_contract_sections:
    - "Retention / export / delete matrix (frozen) — support_or_regulated_retention_with_hold_eligibility"
    - "Opt-in rule for shared terminal and shared debugger retention"
    - "Acceptance-criteria cross-walk bullets 3, 4"
  exercised_classes_summary:
    retention_mode_classes:
      - support_or_regulated_retention_with_hold_eligibility
    role_matrix_profile_classes:
      - support_session_host_plus_support_agent
      - regulated_review_with_approver_gate
    guest_policy_classes:
      - public_link_forbidden_by_policy
    audit_level_classes:
      - audit_regulated_admin_signed
    shared_object_class_policy_classes:
      - recording_full_session_replay
      - transcript_text_only
      - shared_terminal_control_metadata
      - shared_debug_control_metadata
      - temporary_control_grant_terminal
      - deletion_event_record
    opt_in_required_classes:
      - opt_in_policy_forced_admin_signed

