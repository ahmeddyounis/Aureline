    guest_policy_classes:
      - approved_guests_with_approval_ticket
    route_share_policy_classes:
      - route_share_enabled_with_audit_trail_required
    residency_scope_classes:
      - multi_region_org_scope
    visible_consent_cue_classes:
      - join_dialog_inline_disclosure_pre_admit
      - mid_session_modal_block_until_acknowledged
    re_consent_trigger_reason_classes:
      - recording_started
    shared_object_class_policy_classes:
      - recording_full_session_replay
      - transcript_text_only
      - replay_artifact_metadata_and_events
      - comment_anchored_or_thread

