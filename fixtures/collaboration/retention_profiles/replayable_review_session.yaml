    opt-in; anchored comments are retained as full payload on each
    participant's local workspace; the session seals into a replay
    artifact retained in the sealed archive only. The join-dialog
    cue names every retained class and the export / delete posture
    for each role. Mid-session recording start surfaces a modal
    cue with re_consent_trigger_reason_class = recording_started.
  exercised_contract_sections:
    - "Retention / export / delete matrix (frozen) — replayable_review_or_teaching"
