# yaml-language-server: $schema=../../../schemas/collaboration/control_grant.schema.json
__fixture__:
  name: debug_grant_admin_signed_retained
  scenario: >
    A regulated-review session (support_or_regulated_retention_with_
    hold_eligibility retention mode) admits a named approver as the
    debug-lane driver under an admin-signed admission and the session's
    policy-manifest consent. The grant admits debug_step_allowed +
    debug_continue_allowed + debug_set_breakpoint_allowed +
    debug_evaluate_watch_expression_allowed under ceiling_mutation_
    within_named_action_set with a bounded-minutes duration. Because
    retention is opt_in_policy_forced_admin_signed on the bound
    session-policy manifest, the grant carries control_grant_durability
    _class = retained_full_payload_admin_signed_opt_in_only citing the
    admin-signed admission and the policy-manifest ref. Mid-grant, the
    approver's workspace trust narrows (admin policy change); the
    revocation record cites workspace_trust_narrowed with immediate-and-
    non-replayable invariants. An in-flight debug_continue_allowed
    action already buffered for the old authority is discarded; the
    disposition label records this.
  exercised_contract_sections:
    - "Control-grant rows (frozen)"
    - "Shared-terminal and shared-debug binding"
    - "Durability vocabulary (frozen)"
    - "Metadata-only vs durable-retained summary"
    - "Control-grant revocation (frozen)"
    - "Acceptance-criteria cross-walk / bullet 2"
  exercised_classes_summary:
    control_grant_lane_classes:
      - debug_lane
    control_grant_scope_classes:
      - grant_scope_named_action_set
    control_grant_duration_classes:
      - duration_bounded_minutes_window
    authority_ceiling_classes:
      - ceiling_mutation_within_named_action_set
    allowed_action_classes:
      - debug_step_allowed
      - debug_continue_allowed
      - debug_set_breakpoint_allowed
      - debug_evaluate_watch_expression_allowed
    required_badge_classes:
      - admin_signed_required
      - approval_ticket_required
    control_grant_durability_classes:
      - retained_full_payload_admin_signed_opt_in_only
    control_grant_revocation_cause_classes:
      - workspace_trust_narrowed
    revocation_immediacy_classes:
      - revocation_immediate_authority_expired_on_mint
    revocation_replay_posture_classes:
      - non_replayable_authority_expired_on_revocation
    control_grant_audit_event_ids:
      - control_grant_minted
      - control_grant_revoked

records:
  - record_kind: control_grant_record
    control_grant_schema_version: 1
    control_grant_id: "collab:grant:debug:regulated:01"
    session_ref: "collab:session:regulated:01"
    grantor_actor_ref: "actor:admin:01"
    grantee_actor_ref: "actor:participant:approver-A"
    control_grant_lane_class: debug_lane
    control_grant_scope_class: grant_scope_named_action_set
    control_grant_duration_class: duration_bounded_minutes_window
    authority_ceiling_class: ceiling_mutation_within_named_action_set
    allowed_action_classes:
      - debug_step_allowed
      - debug_continue_allowed
      - debug_set_breakpoint_allowed
      - debug_evaluate_watch_expression_allowed
    required_badge_classes:
      - admin_signed_required
      - approval_ticket_required
    approval_ticket_ref: "approval-ticket:debug:regulated:01"
    admin_signed_admission_ref: "admin-signed:debug:regulated:01"
    control_grant_durability_class: retained_full_payload_admin_signed_opt_in_only
    bound_shared_object_ref: "collab:shared-object:shared-debug-control:01"
    session_policy_manifest_ref: "collab:policy-manifest:regulated:01"
    policy_context:
      policy_bundle_ref: "policy-bundle:regulated:01"
      policy_epoch_ref: "policy-epoch:regulated:01"
      deployment_profile_class: enterprise_online
      workspace_trust_state_class: trusted
    summary_label: >
      Regulated-review debug-lane grant for approver; admin-signed and
      approval-ticketed; bounded-minutes window; full-payload retention
      under admin opt-in pinned to the session-policy manifest.
    freshness_class: authoritative_live
    client_scopes: [desktop_product, managed_admin_surface]
    redaction_class: evidence_packet_signature
    minted_at: "2026-04-22T13:00:00Z"
    expires_at: "2026-04-22T13:15:00Z"

  - record_kind: control_grant_audit_event_record
    control_grant_schema_version: 1
    audit_event_id_value: "audit:grant:debug:regulated:01:minted"
    session_ref: "collab:session:regulated:01"
    control_grant_ref: "collab:grant:debug:regulated:01"
    audit_event_id: control_grant_minted
    summary_label: >
      Regulated debug-lane grant minted under admin-signed admission.
    freshness_class: authoritative_live
    client_scopes: [managed_admin_surface]
    redaction_class: evidence_packet_signature
    minted_at: "2026-04-22T13:00:00Z"

  - record_kind: control_grant_revocation_record
    control_grant_schema_version: 1
    revocation_id: "collab:grant:debug:regulated:01:revocation:01"
    control_grant_ref: "collab:grant:debug:regulated:01"
    session_ref: "collab:session:regulated:01"
    revoking_actor_ref: "actor:policy-system:01"
    control_grant_revocation_cause_class: workspace_trust_narrowed
    revocation_immediacy_class: revocation_immediate_authority_expired_on_mint
    revocation_replay_posture_class: non_replayable_authority_expired_on_revocation
    in_flight_action_disposition_label: >
      In-flight debug_continue_allowed request buffered for the revoked
      authority is discarded; non-replayable; grantee must re-request
      admission under the new workspace-trust posture.
    policy_context:
      policy_bundle_ref: "policy-bundle:regulated:01"
      policy_epoch_ref: "policy-epoch:regulated:02"
      deployment_profile_class: enterprise_online
      workspace_trust_state_class: policy_degraded
    summary_label: >
      Workspace trust narrowed to policy_degraded; debug-lane grant
      revoked immediately; in-flight action discarded, non-replayable.
    freshness_class: authoritative_live
    client_scopes: [managed_admin_surface]
    redaction_class: evidence_packet_signature
    minted_at: "2026-04-22T13:07:00Z"

  - record_kind: control_grant_audit_event_record
    control_grant_schema_version: 1
    audit_event_id_value: "audit:grant:debug:regulated:01:revoked"
    session_ref: "collab:session:regulated:01"
    control_grant_ref: "collab:grant:debug:regulated:01"
    revocation_ref: "collab:grant:debug:regulated:01:revocation:01"
    audit_event_id: control_grant_revoked
    summary_label: >
      Debug-lane grant revoked by workspace-trust narrowing; immediate,
      non-replayable.
    freshness_class: authoritative_live
    client_scopes: [managed_admin_surface]
    redaction_class: evidence_packet_signature
    minted_at: "2026-04-22T13:07:00Z"
