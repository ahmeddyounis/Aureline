    follow_target_ref: "collab:follow:degraded:post:01"
    audit_event_id: follow_target_superseded
    summary_label: "Observer C follow target superseded to unavailable."
    freshness_class: degraded_cached
    client_scopes: [desktop_product]
    redaction_class: logs_local
    minted_at: "2026-04-22T14:05:01Z"

  - record_kind: follow_and_presenter_audit_event_record
    follow_and_presenter_state_schema_version: 1
    audit_event_id_value: "audit:follow:degraded:posture-applied:01"
    session_ref: "collab:session:degraded:01"
    follow_target_ref: "collab:follow:degraded:fallback:01"
    audit_event_id: degraded_follow_posture_applied
    summary_label: "Invitation-or-handoff fallback posture applied for Observer C."
    freshness_class: degraded_cached
    client_scopes: [desktop_product]
    redaction_class: logs_local
    minted_at: "2026-04-22T14:06:00Z"

  - record_kind: follow_and_presenter_audit_event_record
    follow_and_presenter_state_schema_version: 1
    audit_event_id_value: "audit:input-injection:degraded:denied:01"
    session_ref: "collab:session:degraded:01"
    follow_target_ref: "collab:follow:degraded:post:01"
    audit_event_id: follow_and_presenter_audit_denial_emitted
    denial_reason: hidden_input_injection_forbidden_during_degraded_follow
    summary_label: >
      Hidden-input-injection attempt during degraded follow denied;
      no degraded posture admits input injection into observer surfaces.
    freshness_class: degraded_cached
    client_scopes: [desktop_product]
    redaction_class: logs_local
    minted_at: "2026-04-22T14:05:30Z"
