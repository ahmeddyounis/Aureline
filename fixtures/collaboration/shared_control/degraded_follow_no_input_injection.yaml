# yaml-language-server: $schema=../../../schemas/collaboration/follow_and_presenter_state.schema.json
__fixture__:
  name: degraded_follow_no_input_injection
  scenario: >
    A presenter broadcast session loses live state (relay degradation
    plus presenter transport drop). The observer's follow_target_record
    is superseded by a fresh row with follow_mode_class =
    follow_unavailable_live_state_missing and degraded_follow_posture
    _class = follow_only_summary_readout_offered. A paired
    presenter_state_record carries focus_broadcast_posture_class =
    focus_broadcast_unavailable_degraded_projection. The surface offers
    a follow-only summary readout plus an invitation-or-handoff fallback
    prompt; NO value in the degraded vocabulary admits hidden input
    injection into the observer's buffer, terminal, or debug surface.
    A hypothetical hidden-input-injection attempt is denied with
    hidden_input_injection_forbidden_during_degraded_follow.
  exercised_contract_sections:
    - "Degraded-follow vocabulary (frozen)"
    - "Presenter-state rows (frozen)"
    - "Follow-persistence invariant"
    - "Acceptance-criteria cross-walk / bullet 3"
  exercised_classes_summary:
    follow_mode_classes:
      - presenter_broadcast_follow
      - follow_unavailable_live_state_missing
    follow_target_kind_classes:
      - presenter_broadcast_channel
    presenter_role_classes:
      - presenter
      - observer
    focus_broadcast_posture_classes:
      - focus_broadcast_active
      - focus_broadcast_unavailable_degraded_projection
    degraded_follow_posture_classes:
      - follow_only_summary_readout_offered
      - invitation_or_handoff_fallback_offered
    follow_and_presenter_audit_event_ids:
      - presenter_state_amended
      - follow_target_superseded
      - focus_broadcast_posture_changed
      - degraded_follow_posture_applied
      - follow_and_presenter_audit_denial_emitted
    follow_and_presenter_denial_reasons:
      - hidden_input_injection_forbidden_during_degraded_follow

records:
  - record_kind: follow_target_record
    follow_and_presenter_state_schema_version: 1
    follow_target_id: "collab:follow:degraded:pre:01"
    session_ref: "collab:session:degraded:01"
    observer_actor_ref: "actor:participant:observer-C"
    presenter_state_ref: "collab:presenter-state:degraded:pre:01"
    follow_mode_class: presenter_broadcast_follow
    follow_target_kind_class: presenter_broadcast_channel
    summary_label: "Observer C follows presenter broadcast pre-degradation."
    freshness_class: authoritative_live
    client_scopes: [desktop_product]
    redaction_class: logs_local
    minted_at: "2026-04-22T14:00:00Z"

  - record_kind: presenter_state_record
    follow_and_presenter_state_schema_version: 1
    presenter_state_id: "collab:presenter-state:degraded:pre:01"
    session_ref: "collab:session:degraded:01"
    presenter_actor_ref: "actor:owner:degraded:01"
    co_presenter_actor_refs: []
    observer_actor_refs:
      - "actor:participant:observer-C"
    focus_broadcast_posture_class: focus_broadcast_active
    bound_pane_ref: "pane:editor:degraded:01"
    bound_buffer_ref: "buffer:degraded:01"
    summary_label: "Presenter active pre-degradation."
    freshness_class: authoritative_live
    client_scopes: [desktop_product]
    redaction_class: logs_local
    minted_at: "2026-04-22T14:00:00Z"

  - record_kind: presenter_state_record
    follow_and_presenter_state_schema_version: 1
    presenter_state_id: "collab:presenter-state:degraded:post:01"
    session_ref: "collab:session:degraded:01"
    presenter_actor_ref: "actor:owner:degraded:01"
    co_presenter_actor_refs: []
    observer_actor_refs:
      - "actor:participant:observer-C"
    focus_broadcast_posture_class: focus_broadcast_unavailable_degraded_projection
    supersedes_presenter_state_ref: "collab:presenter-state:degraded:pre:01"
    summary_label: >
      Presenter state amended: focus broadcast unavailable; live state
      missing during relay degradation and owner transport drop.
    freshness_class: degraded_cached
    client_scopes: [desktop_product]
    redaction_class: logs_local
    minted_at: "2026-04-22T14:05:00Z"

  - record_kind: follow_target_record
    follow_and_presenter_state_schema_version: 1
    follow_target_id: "collab:follow:degraded:post:01"
    session_ref: "collab:session:degraded:01"
    observer_actor_ref: "actor:participant:observer-C"
    presenter_state_ref: "collab:presenter-state:degraded:post:01"
    follow_mode_class: follow_unavailable_live_state_missing
    follow_target_kind_class: presenter_broadcast_channel
    degraded_follow_posture_class: follow_only_summary_readout_offered
    supersedes_follow_target_ref: "collab:follow:degraded:pre:01"
    summary_label: >
      Observer C live follow unavailable; read-only summary of recent
