# yaml-language-server: $schema=../../../schemas/collaboration/follow_and_presenter_state.schema.json
__fixture__:
  name: presenter_broadcast_view_only_no_control
  scenario: >
    A session owner assigns themselves as presenter and broadcasts focus
    to two observers. Each observer follows the presenter broadcast
    channel. The observers also receive view-only control grants over
    the presenter focus lane (read-only observe). No observer has any
    control grant over a shared terminal or shared debug surface;
    shared terminal / debug control CANNOT be inferred from the
    presenter-broadcast or co-presenter badge. A denial event
    demonstrates that an attempted inference of terminal control from
    the presenter state is refused with
    control_grant_not_inferable_from_presence_or_presenter_state and
    shared_terminal_or_debug_control_requires_explicit_grant. Records
    from both schemas (follow_and_presenter_state.schema.json and
    control_grant.schema.json) coexist in the records list and are
    discriminated by record_kind.
  exercised_contract_sections:
    - "Presenter-state rows (frozen)"
    - "Follow-target rows (frozen)"
    - "Presenter-authority invariants"
    - "Required-badge vocabulary (frozen)"
    - "Shared-terminal and shared-debug binding"
    - "Acceptance-criteria cross-walk / bullet 3"
  exercised_classes_summary:
    follow_mode_classes:
      - presenter_broadcast_follow
    follow_target_kind_classes:
      - presenter_broadcast_channel
    presenter_role_classes:
      - presenter
      - observer
    focus_broadcast_posture_classes:
      - focus_broadcast_active
    control_grant_lane_classes:
      - presenter_focus_lane
    control_grant_scope_classes:
      - grant_scope_presenter_view_only_no_mutation
    authority_ceiling_classes:
      - ceiling_read_only_no_mutation
    required_badge_classes:
      - owner_explicit_admission_without_ticket_for_view_only_grants
    follow_and_presenter_audit_event_ids:
      - presenter_state_minted
      - follow_target_minted
      - follow_and_presenter_audit_denial_emitted
    control_grant_audit_event_ids:
      - control_grant_minted
      - control_grant_audit_denial_emitted
    follow_and_presenter_denial_reasons:
      - control_grant_not_inferable_from_presence_or_presenter_state
    control_grant_denial_reasons:
      - shared_terminal_or_debug_control_requires_explicit_grant

