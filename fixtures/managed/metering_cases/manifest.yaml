schema_version: 1
contract_ref: docs/managed/metering_and_usage_export_contract.md
quota_state_schema_ref: schemas/managed/quota_state.schema.json
usage_export_row_schema_ref: schemas/managed/usage_export_row.schema.json
cases:
  - fixture: authoritative_ai_quota_fresh.yaml
    record_kind: quota_state_record
    authority_class: authoritative
    covers:
      - fresh_service_authoritative_meter
      - exact_reset_window
      - spend_attribution_dimensions
  - fixture: cached_workspace_meter_beyond_floor.yaml
    record_kind: quota_state_record
    authority_class: cached
    covers:
      - stale_meter_label
      - cached_beyond_freshness_floor
      - managed_action_narrowing
  - fixture: local_estimate_ai_usage_pending_reconciliation.yaml
    record_kind: quota_state_record
    authority_class: estimated
    covers:
      - locally_estimated_usage
      - reconciliation_pending_caveat
      - non_invoice_truth
  - fixture: service_unavailable_usage_gap.yaml
    record_kind: quota_state_record
    authority_class: unavailable
    covers:
      - service_meter_unavailable
      - no_current_amount_claim
      - local_core_non_blocking
  - fixture: policy_suppressed_quota_state.yaml
    record_kind: quota_state_record
    authority_class: policy_suppressed
    covers:
      - policy_suppressed_amount
      - typed_policy_ref
      - no_zero_implied
  - fixture: monthly_authoritative_usage_export_row.yaml
    record_kind: usage_export_row_record
    authority_class: authoritative
    covers:
      - monthly_usage_export
      - scope_and_time_basis_preserved
      - offboarding_available_without_support_ticket
  - fixture: unavailable_gap_usage_export_row.yaml
    record_kind: usage_export_row_record
    authority_class: unavailable
    covers:
      - unavailable_gap_marker
      - nullable_quantity
      - explicit_caveat
  - fixture: policy_suppressed_usage_export_row.yaml
    record_kind: usage_export_row_record
    authority_class: policy_suppressed
    covers:
      - policy_suppressed_marker
      - suppressed_fields
      - export_row_not_omitted
