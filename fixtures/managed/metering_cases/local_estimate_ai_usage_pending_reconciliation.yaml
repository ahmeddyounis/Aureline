  name: local_estimate_ai_usage_pending_reconciliation
  scenario: >
    The client has local AI token counters for a disconnected period,
    but the managed service has not reconciled them yet. The product
    can show an estimate and may choose an estimate-admitted fallback,
    but support and export surfaces cannot treat the amount as final
    service truth.
