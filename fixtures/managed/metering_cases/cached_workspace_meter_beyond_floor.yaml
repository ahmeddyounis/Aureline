__fixture__:
  name: cached_workspace_meter_beyond_floor
  scenario: >
    The remote workspace control-plane meter is reachable only from a
    cached state older than the declared freshness floor. Dashboard and
    support surfaces can quote the cached value, but managed workspace
    creates narrow until a fresh meter is available.
