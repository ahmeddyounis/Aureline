record_kind: managed_truth_alpha_case
schema_version: 1
scenario: >
  One shell snapshot covers claimed managed and provider-linked rows. It
  exposes region, residency, tenant, storage or copy posture, and key
  mode on every row; keeps the provider-linked CI row at provider-default
  residency instead of implying sovereign or customer-pinned boundaries;
  and distinguishes a managed-workspace control-plane outage from a
  healthy local/data-plane continuation.

