schema_version: 1
contract_ref: docs/managed/account_seat_plan_and_exit_contract.md
account_exit_packet_schema_ref: schemas/managed/account_exit_packet.schema.json
cases:
  - fixture: individual_seat_expiry.yaml
    record_kind: account_exit_packet_record
    account_state_class: expired
    covers:
      - individual_account_plan_term_ended
      - grace_window_already_closed
      - access_end_window_open
      - byok_local_ai_alternative
  - fixture: org_suspension.yaml
    record_kind: account_exit_packet_record
    account_state_class: suspended
    covers:
      - org_level_suspension_billing_lock
      - posture_origin_class_org
      - managed_provider_billing_locked
      - read_only_under_suspension
  - fixture: grace_period_warning.yaml
    record_kind: account_exit_packet_record
    account_state_class: grace
    covers:
      - grace_warning_window_open
      - scheduled_plan_downgrade_disclosure
      - export_pathway_named_pre_close
  - fixture: export_before_suspend.yaml
    record_kind: account_exit_packet_record
    account_state_class: grace
    covers:
      - grace_final_warning_window
      - exported_before_close_with_export_ref
      - read_only_consequences_at_suspension
      - distinct_already_exported_versus_still_exportable
  - fixture: self_hosted_alternative_recommendation.yaml
    record_kind: account_exit_packet_record
    account_state_class: offboarding_in_progress
    covers:
      - account_leave_disclosure
      - offboarding_required_dispositions
      - typed_self_hosted_alternative_set
      - deferred_to_self_hosted_or_local_alternatives
