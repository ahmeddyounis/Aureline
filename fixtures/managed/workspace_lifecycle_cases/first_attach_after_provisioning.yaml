__fixture__:
  name: first_attach_after_provisioning
  scenario: >
    A user creates a managed workspace for the first time. Allocation,
    boot, attach, and capsule warming have completed; the workspace is
    now ready and reachable. Persistence posture exposes that uncommitted
    work lives only inside the workspace volume and that processes,
    terminals, kernels, and ports are workspace-only — none are durable
    across phase transitions.
  exercised_contract_sections:
    - lifecycle_phase_vocabulary
    - persistence_posture_matrix
    - continuation_posture
    - retry_posture

