  scenario: >
    The managed-session ticket for a previously-ready workspace
    expired. The workspace is technically reachable pending reauth
    but managed actions are blocked. Local-only continuation surfaces
    stay open while the user reauthenticates; the retry posture
    exposes reauth and local-only continuation as distinct outcomes.
  exercised_contract_sections:
    - lifecycle_phase_vocabulary
    - expiry_block
    - retry_posture
    - continuation_posture

