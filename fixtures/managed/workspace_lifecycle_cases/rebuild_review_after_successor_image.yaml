# yaml-language-server: $schema=../../../schemas/managed/workspace_lifecycle_state.schema.json
__fixture__:
  name: rebuild_review_after_successor_image
  scenario: >
    A successor capsule image is available; the existing instance is
    in the retiring drain window. Rebuild review is required: the
    user MUST acknowledge that committed files and durable evidence
    persist while uncommitted scratch, processes, terminals, ports,
    and kernels are lost across the rebuild. Rebuild and resume are
    distinct retry outcomes; the schema forbids combining them.
  exercised_contract_sections:
    - lifecycle_phase_vocabulary
    - rebuild_block
    - persistence_posture_matrix
    - retry_posture

