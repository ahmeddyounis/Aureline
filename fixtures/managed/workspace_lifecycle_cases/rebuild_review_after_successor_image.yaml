  transitioned_at: "2026-05-04T17:10:00Z"
persistence_posture:
  workspace_files:
    persistence_class: persisted_durable
    note: Committed Git history persists across the rebuild; uncommitted scratch is lost.
  in_progress_processes:
    persistence_class: ephemeral_lost_on_transition
    note: Build, test, and run processes are lost across rebuild.
  terminal_sessions:
    persistence_class: ephemeral_lost_on_transition
    note: Terminal sessions are lost across rebuild.
  forwarded_ports:
    persistence_class: ephemeral_lost_on_transition
