schema_version: 1
contract_ref: docs/managed/managed_workspace_lifecycle_contract.md
workspace_lifecycle_state_schema_ref: schemas/managed/workspace_lifecycle_state.schema.json
cases:
  - fixture: first_attach_after_provisioning.yaml
    record_kind: managed_workspace_lifecycle_state_record
    lifecycle_phase_class: ready
    covers:
      - first_attach_path
      - workspace_attached_continuation
      - persistence_posture_for_ready
  - fixture: suspend_idle_then_resume.yaml
    record_kind: managed_workspace_lifecycle_state_record
    lifecycle_phase_class: suspended
    covers:
      - idle_suspend_persistence_posture
      - regenerated_on_resume_kernels
      - resume_versus_local_only_continuation_distinct_outcomes
  - fixture: expired_workspace_session_ticket.yaml
    record_kind: managed_workspace_lifecycle_state_record
    lifecycle_phase_class: expired
    covers:
      - session_ticket_expiry_block
      - reauth_admissible_outcome
      - local_only_continuation_during_reauth
  - fixture: rebuild_review_after_successor_image.yaml
    record_kind: managed_workspace_lifecycle_state_record
    lifecycle_phase_class: rebuild
    covers:
      - rebuild_review_required
      - committed_versus_uncommitted_persistence_split
      - rebuild_versus_resume_distinct_outcomes
  - fixture: local_only_continuation_after_service_outage.yaml
    record_kind: managed_workspace_lifecycle_state_record
    lifecycle_phase_class: degraded
    covers:
      - control_plane_outage_degraded_block
      - local_only_admissible_surfaces_during_outage
      - typed_managed_action_blocking_class
