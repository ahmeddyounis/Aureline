__fixture__:
  name: suspend_idle_then_resume
  scenario: >
    The managed workspace auto-suspended after the idle window
    elapsed. Filesystem is preserved; processes are suspended and may
    resume; terminals can resume; forwarded ports are lost; notebook
    kernels regenerate on resume. The retry posture exposes resume
    plus local-only continuation as distinct outcomes — not a generic
    "try again" button.
  exercised_contract_sections:
    - lifecycle_phase_vocabulary
    - persistence_posture_matrix
    - continuation_posture
    - retry_posture
    - local_only_continuation_admissible_surfaces

