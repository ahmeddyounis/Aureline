# yaml-language-server: $schema=../../../schemas/managed/workspace_lifecycle_state.schema.json
__fixture__:
  name: local_only_continuation_after_service_outage
  scenario: >
    The managed control plane is unreachable due to a service outage.
    The workspace was previously ready; the instance is presumed
    available but cannot be contacted. The lifecycle phase is degraded
    (control_plane_failure) and the editor continues in local-only
    continuation. Local edit / save / search / Git / tasks / BYOK AI
    surfaces stay open; managed actions are blocked with a typed
    reason rather than a spinner.
  exercised_contract_sections:
    - lifecycle_phase_vocabulary
    - degraded_block
    - continuation_posture
    - local_only_continuation_admissible_surfaces
    - retry_posture

