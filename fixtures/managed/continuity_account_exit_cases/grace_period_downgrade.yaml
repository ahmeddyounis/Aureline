__fixture__:
  name: grace_period_downgrade
  scenario: >
    A managed account is in the final-warning grace window before a
    scheduled plan downgrade. The rehearsal proves every artifact
    kind that flips from read-write to read-only at grace close
    carries a typed deadline drawn from the account-exit packet's
    grace.grace_window_closes_at, names what is already exported,
    names BYOK local AI as a typed reopen path, and preserves local-
    core surfaces across the upcoming downgrade.
  exercised_packet_sections:
    - rehearsal_classes
    - export_before_suspend_matrix
    - deadline_at_drawn_from_grace_close
    - reopen_locally_afterward
    - local_baseline_admissible_surfaces

