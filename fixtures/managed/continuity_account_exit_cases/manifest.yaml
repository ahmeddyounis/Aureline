schema_version: 1
contract_ref: docs/verification/managed_continuity_and_account_exit_packet.md
local_baseline_proof_artifact_ref: artifacts/managed/local_baseline_proof.yaml
inherited_contracts:
  - docs/managed/managed_workspace_lifecycle_contract.md
  - docs/managed/account_seat_plan_and_exit_contract.md
  - docs/admin/org_admin_seat_and_fleet_contract.md
  - docs/integrations/provider_account_mapping_and_offline_capture_contract.md
  - docs/governance/data_portability_and_exit_matrix.md
inherited_schemas:
  - schemas/managed/workspace_lifecycle_state.schema.json
  - schemas/managed/account_exit_packet.schema.json
cases:
  - fixture: suspended_workspace_local_docs_and_review.yaml
    record_kind: managed_continuity_rehearsal_record
    rehearsal_class: managed_workspace_suspended
    covers:
      - workspace_suspended_local_docs_review_continuity
      - export_before_suspend_workspace_files
      - local_baseline_admissible_surfaces_during_suspend
      - reopen_local_review_packets_after_suspend
  - fixture: account_exit_with_export_path.yaml
    record_kind: managed_continuity_rehearsal_record
    rehearsal_class: account_exit
    covers:
      - account_exit_with_typed_export_path
      - access_end_window_open_artifact_dispositions
      - self_hosted_alternative_set
      - reopen_self_hosted_org_deployment
  - fixture: grace_period_downgrade.yaml
    record_kind: managed_continuity_rehearsal_record
    rehearsal_class: plan_grace_downgrade
    covers:
      - grace_warning_window_open
      - scheduled_plan_downgrade_disclosure
      - must_export_before_suspend_with_deadline_at
      - reopen_byok_local_ai_route
  - fixture: local_only_fallback_after_service_outage.yaml
    record_kind: managed_continuity_rehearsal_record
    rehearsal_class: local_only_fallback_after_service_outage
    covers:
      - control_plane_outage_degraded_block
      - full_local_baseline_admissible_surface_set
      - typed_managed_action_blocking_class
      - reopen_local_workspace_files_via_local_host
  - fixture: seat_loss_local_baseline.yaml
    record_kind: managed_continuity_rehearsal_record
    rehearsal_class: seat_loss
    covers:
      - seat_state_deprovisioned_posture_origin_seat
      - account_state_active_local_continuity
      - reopen_account_free_local_deployment
      - reopen_byok_local_ai_route
  - fixture: policy_suspension_local_baseline.yaml
    record_kind: managed_continuity_rehearsal_record
    rehearsal_class: policy_suspension
    covers:
      - posture_origin_class_policy
      - locked_for_review_account_state
      - reopen_signed_file_based_policy
      - reopen_account_free_local_deployment
