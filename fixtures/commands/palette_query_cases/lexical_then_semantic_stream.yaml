case_id: palette_query_session.lexical_then_semantic_stream
purpose: >
  The palette shows recent and lexical command matches first, then admits
  semantic command results later without dropping the selected row, current
  query text, privacy posture, or held split/open-alt modifier intent.
schemas:
  palette_query_session: schemas/commands/palette_query_session.schema.json
  action_footer: schemas/commands/palette_action_footer.schema.json
  result_rows: schemas/commands/palette_result.schema.json

palette_query_session:
  record_kind: palette_query_session_record
  palette_query_session_schema_version: 1
  palette_session_id: palette:session:lexical_semantic:01
  session_state: semantic_streaming
  current_text:
    text_state: editing
    text_material_class: raw_local_only
    text_storage_class: volatile_session_only
    query_text_ref: palette:query_text:volatile:lexical_semantic:01
    raw_query_text_present: true
    raw_query_text: open folder
    redacted_text_ref: null
    query_hash_ref: palette:query_hash:lexical_semantic:01
    locale: en-US
    input_mode: keyboard
    secret_detection_state: no_secret_detected
  provider_set:
    - provider_class: recent_history
      state_class: complete
      result_phase: recent_results_ready
      included_in_active_provider_set: true
      provider_epoch_ref: palette:provider_epoch:recent:01
      result_batch_ref: palette:result_batch:recent:open_folder:01
      truth_label_ref: label:palette.provider.recent.complete
      degrade_reason_ref: null
      visible_result_count: 2
      hidden_result_count: 0
    - provider_class: lexical_command_index
      state_class: complete
      result_phase: lexical_results_ready
      included_in_active_provider_set: true
      provider_epoch_ref: palette:provider_epoch:lexical:01
      result_batch_ref: palette:result_batch:lexical:open_folder:01
      truth_label_ref: label:palette.provider.lexical.complete
      degrade_reason_ref: null
      visible_result_count: 4
      hidden_result_count: 0
    - provider_class: semantic_command_index
      state_class: streaming
      result_phase: semantic_results_streaming
      included_in_active_provider_set: true
      provider_epoch_ref: palette:provider_epoch:semantic:01
      result_batch_ref: palette:result_batch:semantic:open_folder:01
      truth_label_ref: label:palette.provider.semantic.streaming
      degrade_reason_ref: null
      visible_result_count: 1
      hidden_result_count: 0
    - provider_class: keybinding_resolver
      state_class: ready
      result_phase: no_results_yet
      included_in_active_provider_set: true
      provider_epoch_ref: keybinding:epoch:current:01
      result_batch_ref: null
      truth_label_ref: label:palette.provider.keybinding.ready
      degrade_reason_ref: null
      visible_result_count: 0
      hidden_result_count: 0
  ranking_state:
    ranking_state_id: palette:ranking:lexical_semantic:01
    ranking_mode: semantic_supplement
    active_stages:
      - recent_history
      - exact_alias
      - lexical_fuzzy
      - semantic_supplement
      - provider_merge
    stable_ordering_policy: selection_stable_during_stream
    ranking_reason_export_class: reason_classes_only
    ranker_epoch_ref: palette:ranker_epoch:lexical_semantic:01
    semantic_results_may_stream_later: true
    selected_row_stability_required: true
    visible_result_count: 7
    hidden_result_count: 0
  held_modifier_intent:
    intent_class: split_or_open_alt
    footer_action_ref: footer-action:workspace.open_folder:open_split
    input_gesture_ref: gesture:alt_enter
    started_at: "2026-04-29T12:00:02Z"
    preserves_on_stream_update: true
  history_policy:
    history_policy_class: session_only
    history_retention_class: until_palette_close
    query_text_storage_class: volatile_session_only
    max_entries: 0
    max_age_days: 0
    sensitive_literal_handling_ref: policy:palette_history:sensitive_literals:local_only
    raw_query_export_allowed: false
    synced_history_allowed: false
    clear_history_rules:
      - clear_current_session_only
    retention_governance_ref: null
  local_first_retention:
    local_first: true
    storage_class: memory_only
    retention_class: until_palette_close
    max_entries: 0
    max_age_days: 0
    clear_on_workspace_untrust: true
    low_disk_eviction_order_ref: policy:retention:discard_palette_session_before_recovery_state
  redaction_posture:
    redaction_posture_class: local_private
    support_export_class: not_exported
    raw_query_export_allowed: false
    secret_or_path_literals_redacted: true
    review_required_before_export: true
    support_export_material_ref: null
  action_footer_projection:
    action_footer_ref: palette-footer:workspace.open_folder:enabled:01
    default_run_action:
      action_class: primary_run_or_open
      action_ref: footer-action:workspace.open_folder:primary
      enabled_by_current_session: true
      unavailable_reason_ref: null
    alternate_invocation_actions:
      - action_class: open_in_split
        action_ref: footer-action:workspace.open_folder:open_split
        enabled_by_current_session: true
        unavailable_reason_ref: null
      - action_class: open_alternate_target
        action_ref: footer-action:workspace.open_folder:open_alternate_target
        enabled_by_current_session: true
        unavailable_reason_ref: null
    copy_actions:
      - action_class: copy_command_id
        action_ref: footer-action:workspace.open_folder:copy_command_id
        enabled_by_current_session: true
        unavailable_reason_ref: null
      - action_class: copy_cli_headless_form
        action_ref: footer-action:workspace.open_folder:copy_cli_form
        enabled_by_current_session: true
        unavailable_reason_ref: null
    add_to_recipe_action:
      action_class: add_to_recipe
      action_ref: footer-action:workspace.open_folder:add_to_recipe
      enabled_by_current_session: true
      unavailable_reason_ref: null
    inspect_why_not_automatable_action:
      action_class: inspect_why_not_automatable
      action_ref: footer-action:workspace.open_folder:why_not_automatable
      enabled_by_current_session: true
      unavailable_reason_ref: null
    keyboard_menu_docs_cli_consistency_required: true
  lightweight_history:
    history_entry_refs: []
    recent_query_set_ref: null
    history_policy_ref: policy:palette_history:session_only
  transition_rules:
    - from_state: filtering_lexical
      trigger: provider_frame_received
      to_state: lexical_recent_ready
      rank_update_policy: replace_provider_group
      selection_update_policy: select_first_when_none
      preserves_current_text: true
      preserves_held_modifier_intent: true
      preserves_history_policy: true
      preserves_redaction_posture: true
      appended_provider_classes:
        - recent_history
        - lexical_command_index
    - from_state: lexical_recent_ready
      trigger: semantic_batch_received
      to_state: semantic_streaming
      rank_update_policy: rerank_unselected_rows_only
      selection_update_policy: preserve_selected_row
      preserves_current_text: true
      preserves_held_modifier_intent: true
      preserves_history_policy: true
      preserves_redaction_posture: true
      appended_provider_classes:
        - semantic_command_index
    - from_state: semantic_streaming
      trigger: provider_frame_received
      to_state: results_ready
      rank_update_policy: append_group
      selection_update_policy: preserve_selected_row
      preserves_current_text: true
      preserves_held_modifier_intent: true
      preserves_history_policy: true
      preserves_redaction_posture: true
      appended_provider_classes:
        - semantic_command_index
  projection_surfaces:
    - command_palette
    - keybinding_help
    - command_docs
    - cli_help
  opened_at: "2026-04-29T12:00:00Z"
  updated_at: "2026-04-29T12:00:02Z"

assertions:
  - semantic_streaming_does_not_clear_held_alt_enter
  - raw_query_text_is_memory_only_and_not_exported
  - selected_lexical_row_remains_stable_during_semantic_append
