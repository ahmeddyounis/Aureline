case_id: palette_query_session.privacy_safe_export
purpose: >
  A support export captures enough palette context to explain command
  availability and footer semantics without exporting raw query text or local
  recent-history literals.
schemas:
  palette_query_session: schemas/commands/palette_query_session.schema.json
  action_footer: schemas/commands/palette_action_footer.schema.json

palette_query_session:
  record_kind: palette_query_session_record
  palette_query_session_schema_version: 1
  palette_session_id: palette:session:privacy_export:01
  session_state: results_ready
  current_text:
    text_state: committed
    text_material_class: redacted_text
    text_storage_class: volatile_session_only
    query_text_ref: null
    raw_query_text_present: false
    redacted_text_ref: palette:redacted_query:privacy_export:01
    query_hash_ref: palette:query_hash:privacy_export:local_only:01
    locale: en-US
    input_mode: keyboard
    secret_detection_state: suspected_secret_redacted
  provider_set:
    - provider_class: command_registry
      state_class: ready
      result_phase: lexical_results_ready
      included_in_active_provider_set: true
      provider_epoch_ref: palette:provider_epoch:registry:privacy_export:01
      result_batch_ref: palette:result_batch:registry:privacy_export:01
      truth_label_ref: label:palette.provider.registry.ready
      degrade_reason_ref: null
      visible_result_count: 1
      hidden_result_count: 0
    - provider_class: keybinding_resolver
      state_class: ready
      result_phase: no_results_yet
      included_in_active_provider_set: true
      provider_epoch_ref: keybinding:epoch:privacy_export:01
      result_batch_ref: null
      truth_label_ref: label:palette.provider.keybinding.ready
      degrade_reason_ref: null
      visible_result_count: 0
      hidden_result_count: 0
    - provider_class: recent_history
      state_class: policy_blocked
      result_phase: blocked
      included_in_active_provider_set: false
      provider_epoch_ref: null
      result_batch_ref: null
      truth_label_ref: label:palette.provider.recent.blocked_for_export
      degrade_reason_ref: policy:palette_history:recent_hidden_from_support_export
      visible_result_count: 0
      hidden_result_count: 2
  ranking_state:
    ranking_state_id: palette:ranking:privacy_export:01
    ranking_mode: captured_snapshot_order
    active_stages:
      - exact_alias
      - lexical_fuzzy
    stable_ordering_policy: captured_snapshot_order
    ranking_reason_export_class: redacted_reason_refs
    ranker_epoch_ref: palette:ranker_epoch:privacy_export:01
    semantic_results_may_stream_later: false
    selected_row_stability_required: true
    visible_result_count: 1
    hidden_result_count: 2
  held_modifier_intent:
    intent_class: inspect_why_not_automatable
    footer_action_ref: footer-action:labs.open_command_trace:inspect_why_not_automatable
    input_gesture_ref: gesture:footer_enter
    started_at: "2026-04-29T12:20:04Z"
    preserves_on_stream_update: true
  history_policy:
    history_policy_class: session_only
    history_retention_class: until_palette_close
    query_text_storage_class: volatile_session_only
    max_entries: 0
    max_age_days: 0
    sensitive_literal_handling_ref: policy:palette_history:sensitive_literals:redact_for_support
    raw_query_export_allowed: false
    synced_history_allowed: false
    clear_history_rules:
      - clear_current_session_only
    retention_governance_ref: governance:record_class:palette_support_capture
  local_first_retention:
    local_first: true
    storage_class: memory_only
    retention_class: until_palette_close
    max_entries: 0
    max_age_days: 0
    clear_on_workspace_untrust: true
    low_disk_eviction_order_ref: policy:retention:discard_palette_session_before_recovery_state
  redaction_posture:
    redaction_posture_class: support_redacted
    support_export_class: redacted_query_refs
    raw_query_export_allowed: false
    secret_or_path_literals_redacted: true
    review_required_before_export: true
    support_export_material_ref: support:palette:privacy_export:redacted_refs_only
  action_footer_projection:
    action_footer_ref: palette-footer:labs.open_command_trace:blocked:01
    default_run_action:
      action_class: primary_run_or_open
      action_ref: footer-action:labs.open_command_trace:primary
      enabled_by_current_session: false
      unavailable_reason_ref: reason:labs.open_command_trace:capability_disabled_by_policy
    alternate_invocation_actions:
      - action_class: open_alternate_target
        action_ref: footer-action:labs.open_command_trace:alternate_target_disabled
        enabled_by_current_session: false
        unavailable_reason_ref: reason:labs.open_command_trace:ui_only
      - action_class: open_in_split
        action_ref: footer-action:labs.open_command_trace:split_disabled
        enabled_by_current_session: false
        unavailable_reason_ref: reason:labs.open_command_trace:ui_only
    copy_actions:
      - action_class: copy_command_id
        action_ref: footer-action:labs.open_command_trace:copy_command_id
        enabled_by_current_session: true
        unavailable_reason_ref: null
      - action_class: copy_cli_headless_form
        action_ref: footer-action:labs.open_command_trace:copy_cli_form_disabled
        enabled_by_current_session: false
        unavailable_reason_ref: reason:labs.open_command_trace:no_cli_equivalent
    add_to_recipe_action:
      action_class: add_to_recipe
      action_ref: footer-action:labs.open_command_trace:add_to_recipe
      enabled_by_current_session: false
      unavailable_reason_ref: reason:labs.open_command_trace:ui_only_command_not_representable
    inspect_why_not_automatable_action:
      action_class: inspect_why_not_automatable
      action_ref: footer-action:labs.open_command_trace:inspect_why_not_automatable
      enabled_by_current_session: true
      unavailable_reason_ref: null
    keyboard_menu_docs_cli_consistency_required: true
  lightweight_history:
    history_entry_refs:
      - palette:history_entry:privacy_export:inspect_why_not_automatable
    recent_query_set_ref: null
    history_policy_ref: policy:palette_history:support_redacted_session_only
  transition_rules:
    - from_state: results_ready
      trigger: export_requested
      to_state: results_ready
      rank_update_policy: no_rank_change
      selection_update_policy: preserve_selected_row
      preserves_current_text: true
      preserves_held_modifier_intent: true
      preserves_history_policy: true
      preserves_redaction_posture: true
      appended_provider_classes: []
  projection_surfaces:
    - command_palette
    - docs_help
    - cli_help
    - support_export
  opened_at: "2026-04-29T12:20:00Z"
  updated_at: "2026-04-29T12:20:05Z"
  closed_at: "2026-04-29T12:20:05Z"

history_entries:
  - record_kind: palette_query_history_entry_record
    palette_query_session_schema_version: 1
    history_entry_id: palette:history_entry:privacy_export:inspect_why_not_automatable
    captured_from_session_id_ref: palette:session:privacy_export:01
    event_class: result_selected
    query_material:
      text_material_class: redacted_text
      raw_query_text_present: false
      query_hash_ref: palette:query_hash:privacy_export:local_only:01
      redacted_text_ref: palette:redacted_query:privacy_export:01
      command_ref_only: false
    selected_command_id_ref: cmd:labs.open_command_trace
    provider_scope_classes:
      - command_registry
      - keybinding_resolver
    ranking_state_ref: palette:ranking:privacy_export:01
    held_modifier_intent: inspect_why_not_automatable
    footer_action_class: inspect_why_not_automatable
    retention:
      local_first: true
      storage_class: memory_only
      retention_class: until_palette_close
      max_entries: 0
      max_age_days: 0
      clear_on_workspace_untrust: true
      low_disk_eviction_order_ref: policy:retention:discard_palette_session_before_recovery_state
    export_behavior:
      support_export_class: redacted_query_refs
      raw_query_export_allowed: false
      privacy_safe_export_ref: support:palette:privacy_export:redacted_refs_only
      clear_history_effects:
        - deletes_raw_text
        - deletes_hash_refs
        - preserves_audit_minimum
    created_at: "2026-04-29T12:20:04Z"
    last_used_at: "2026-04-29T12:20:04Z"
    use_count: 1

support_export_projection:
  support_packet_ref: support:packet:palette_privacy_export:01
  included_refs:
    - palette:session:privacy_export:01
    - palette:history_entry:privacy_export:inspect_why_not_automatable
    - palette-footer:labs.open_command_trace:blocked:01
    - cmd:labs.open_command_trace
  excluded_material:
    - raw_query_text
    - local_query_hash_salt
    - local_recent_history_literals
    - provider_payloads
  export_truth:
    raw_query_export_allowed: false
    captured_rows_are_session_snapshot_not_live_truth: true
    review_required_before_upload: true

assertions:
  - support_export_has_redacted_query_refs_only
  - copy_id_is_allowed_but_copy_cli_and_recipe_are_disabled_with_reason
  - recent_history_provider_discloses_hidden_count_without_literals
