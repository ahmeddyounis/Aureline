case_id: palette_query_session.bounded_local_history_clear
purpose: >
  Palette recent-query history is local-first, bounded by entry count and age,
  and clear-history deletes raw text, hash refs, and command recents according
  to typed rules rather than acting like a generic cache clear.
schemas:
  palette_query_session: schemas/commands/palette_query_session.schema.json

palette_query_session:
  record_kind: palette_query_session_record
  palette_query_session_schema_version: 1
  palette_session_id: palette:session:bounded_history:01
  session_state: cleared_history
  current_text:
    text_state: cancelled
    text_material_class: not_recorded
    text_storage_class: not_recorded
    query_text_ref: null
    raw_query_text_present: false
    redacted_text_ref: null
    query_hash_ref: null
    locale: en-US
    input_mode: keyboard
    secret_detection_state: no_secret_detected
  provider_set:
    - provider_class: recent_history
      state_class: complete
      result_phase: recent_results_ready
      included_in_active_provider_set: true
      provider_epoch_ref: palette:provider_epoch:recent:bounded_history:01
      result_batch_ref: palette:result_batch:recent:bounded_history:01
      truth_label_ref: label:palette.provider.recent.cleared
      degrade_reason_ref: null
      visible_result_count: 0
      hidden_result_count: 0
    - provider_class: command_registry
      state_class: ready
      result_phase: no_results_yet
      included_in_active_provider_set: true
      provider_epoch_ref: palette:provider_epoch:registry:bounded_history:01
      result_batch_ref: null
      truth_label_ref: label:palette.provider.registry.ready
      degrade_reason_ref: null
      visible_result_count: 0
      hidden_result_count: 0
  ranking_state:
    ranking_state_id: palette:ranking:bounded_history:01
    ranking_mode: recent_first
    active_stages:
      - recent_history
    stable_ordering_policy: captured_snapshot_order
    ranking_reason_export_class: not_exported
    ranker_epoch_ref: palette:ranker_epoch:bounded_history:01
    semantic_results_may_stream_later: false
    selected_row_stability_required: true
    visible_result_count: 0
    hidden_result_count: 0
  held_modifier_intent:
    intent_class: none
    footer_action_ref: null
    input_gesture_ref: null
    preserves_on_stream_update: true
  history_policy:
    history_policy_class: local_profile_recent
    history_retention_class: bounded_local_recent
    query_text_storage_class: local_profile_history
    max_entries: 25
    max_age_days: 14
    sensitive_literal_handling_ref: policy:palette_history:sensitive_literals:redact_or_hash
    raw_query_export_allowed: false
    synced_history_allowed: false
    clear_history_rules:
      - clear_palette_recent_queries
      - clear_command_recents
      - erase_on_workspace_untrust
    retention_governance_ref: governance:record_class:palette_recent_queries
  local_first_retention:
    local_first: true
    storage_class: profile_local_store
    retention_class: bounded_local_recent
    max_entries: 25
    max_age_days: 14
    clear_on_workspace_untrust: true
    low_disk_eviction_order_ref: policy:retention:clear_palette_recents_after_disposable_cache
  redaction_posture:
    redaction_posture_class: metadata_safe_default
    support_export_class: command_refs_only
    raw_query_export_allowed: false
    secret_or_path_literals_redacted: true
    review_required_before_export: true
    support_export_material_ref: support:palette_history:command_refs_only:bounded_history
  action_footer_projection:
    action_footer_ref: palette-footer:history:clear:01
    default_run_action:
      action_class: primary_run_or_open
      action_ref: footer-action:palette_history:clear_primary
      enabled_by_current_session: false
      unavailable_reason_ref: reason:palette_history:cleared
    alternate_invocation_actions:
      - action_class: open_in_split
        action_ref: footer-action:palette_history:open_split_disabled
        enabled_by_current_session: false
        unavailable_reason_ref: reason:palette_history:cleared
    copy_actions:
      - action_class: copy_command_id
        action_ref: footer-action:palette_history:copy_command_id_disabled
        enabled_by_current_session: false
        unavailable_reason_ref: reason:palette_history:no_selected_row
    add_to_recipe_action:
      action_class: add_to_recipe
      action_ref: footer-action:palette_history:add_to_recipe_disabled
      enabled_by_current_session: false
      unavailable_reason_ref: reason:palette_history:no_selected_row
    inspect_why_not_automatable_action:
      action_class: inspect_why_not_automatable
      action_ref: footer-action:palette_history:inspect_clear_rules
      enabled_by_current_session: true
      unavailable_reason_ref: null
    keyboard_menu_docs_cli_consistency_required: true
  lightweight_history:
    history_entry_refs:
      - palette:history_entry:open_folder:01
      - palette:history_entry:clear_history:01
    recent_query_set_ref: palette:recent_query_set:local_profile:01
    history_policy_ref: policy:palette_history:local_profile_recent
  transition_rules:
    - from_state: results_ready
      trigger: clear_history_requested
      to_state: cleared_history
      rank_update_policy: replace_provider_group
      selection_update_policy: clear_selection_on_empty
      preserves_current_text: true
      preserves_held_modifier_intent: true
      preserves_history_policy: true
      preserves_redaction_posture: true
      appended_provider_classes:
        - recent_history
  projection_surfaces:
    - command_palette
    - settings_command_detail
    - support_export
  opened_at: "2026-04-29T12:10:00Z"
  updated_at: "2026-04-29T12:10:06Z"
  closed_at: "2026-04-29T12:10:06Z"

history_entries:
  - record_kind: palette_query_history_entry_record
    palette_query_session_schema_version: 1
    history_entry_id: palette:history_entry:open_folder:01
    captured_from_session_id_ref: palette:session:bounded_history:previous
    event_class: command_invoked
    query_material:
      text_material_class: hashed_terms_only
      raw_query_text_present: false
      query_hash_ref: palette:query_hash:open_folder:local_profile:01
      redacted_text_ref: null
      command_ref_only: false
    selected_command_id_ref: cmd:workspace.open_folder
    provider_scope_classes:
      - recent_history
      - lexical_command_index
    ranking_state_ref: palette:ranking:open_folder:local_profile:01
    held_modifier_intent: default_run
    footer_action_class: primary_run_or_open
    retention:
      local_first: true
      storage_class: profile_local_store
      retention_class: bounded_local_recent
      max_entries: 25
      max_age_days: 14
      clear_on_workspace_untrust: true
      low_disk_eviction_order_ref: policy:retention:clear_palette_recents_after_disposable_cache
    export_behavior:
      support_export_class: command_refs_only
      raw_query_export_allowed: false
      privacy_safe_export_ref: support:palette_history:command_refs_only:open_folder
      clear_history_effects:
        - deletes_raw_text
        - deletes_hash_refs
        - deletes_command_recents
    created_at: "2026-04-29T12:05:00Z"
    last_used_at: "2026-04-29T12:05:00Z"
    use_count: 1
  - record_kind: palette_query_history_entry_record
    palette_query_session_schema_version: 1
    history_entry_id: palette:history_entry:clear_history:01
    captured_from_session_id_ref: palette:session:bounded_history:01
    event_class: history_cleared
    query_material:
      text_material_class: not_recorded
      raw_query_text_present: false
      query_hash_ref: null
      redacted_text_ref: null
      command_ref_only: true
    selected_command_id_ref: null
    provider_scope_classes:
      - recent_history
    ranking_state_ref: palette:ranking:bounded_history:01
    held_modifier_intent: none
    footer_action_class: inspect_unavailability
    retention:
      local_first: true
      storage_class: profile_local_store
      retention_class: bounded_local_recent
      max_entries: 25
      max_age_days: 14
      clear_on_workspace_untrust: true
      low_disk_eviction_order_ref: policy:retention:clear_palette_recents_after_disposable_cache
    export_behavior:
      support_export_class: aggregate_counts_only
      raw_query_export_allowed: false
      privacy_safe_export_ref: support:palette_history:clear_event_count_only
      clear_history_effects:
        - deletes_raw_text
        - deletes_hash_refs
        - deletes_command_recents
        - tombstones_aggregate_counter
    created_at: "2026-04-29T12:10:06Z"
    last_used_at: "2026-04-29T12:10:06Z"
    use_count: 1

recent_query_sets:
  - record_kind: palette_recent_query_set_record
    palette_query_session_schema_version: 1
    recent_query_set_id: palette:recent_query_set:local_profile:01
    owner_scope_ref: profile:local:default
    ordering: most_recent_first
    entry_refs: []
    history_policy:
      history_policy_class: local_profile_recent
      history_retention_class: bounded_local_recent
      query_text_storage_class: local_profile_history
      max_entries: 25
      max_age_days: 14
      sensitive_literal_handling_ref: policy:palette_history:sensitive_literals:redact_or_hash
      raw_query_export_allowed: false
      synced_history_allowed: false
      clear_history_rules:
        - clear_palette_recent_queries
        - clear_command_recents
        - erase_on_workspace_untrust
      retention_governance_ref: governance:record_class:palette_recent_queries
    local_first_retention:
      local_first: true
      storage_class: profile_local_store
      retention_class: bounded_local_recent
      max_entries: 25
      max_age_days: 14
      clear_on_workspace_untrust: true
      low_disk_eviction_order_ref: policy:retention:clear_palette_recents_after_disposable_cache
    export_behavior:
      support_export_class: aggregate_counts_only
      raw_query_export_allowed: false
      privacy_safe_export_ref: support:palette_history:recent_set_count_only
      clear_history_effects:
        - deletes_raw_text
        - deletes_hash_refs
        - deletes_command_recents
        - tombstones_aggregate_counter
    clear_history_rules:
      - clear_palette_recent_queries
      - clear_command_recents
      - erase_on_workspace_untrust
    updated_at: "2026-04-29T12:10:06Z"
    cleared_at: "2026-04-29T12:10:06Z"

assertions:
  - recent_queries_are_bounded_to_25_entries_and_14_days
  - clear_history_removes_raw_text_hash_refs_and_command_recents
  - support_export_contains_counts_or_command_refs_only
