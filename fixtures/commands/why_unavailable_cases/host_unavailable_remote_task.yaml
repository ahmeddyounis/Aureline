    anchor_id: "docs:anchor:remote:task_host_unavailable"
    anchor_kind: docs_page_anchor
  message_template_refs:
    compact: "msg:why_unavailable.host_unavailable.compact"
    short: "msg:why_unavailable.host_unavailable.remote_task.short"
    detail: "msg:why_unavailable.host_unavailable.remote_task.detail"
