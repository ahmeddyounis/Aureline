record_kind: why_unavailable_case_record
why_unavailable_case_schema_version: 1
case_id: "why-unavailable:stale_context:repreview:01"
reason_class_id: stale_context

source_refs:
  grammar_ref: docs/ux/disabled_reason_grammar.md
  class_catalog_ref: artifacts/ux/disabled_reason_classes.yaml#stale_context
  menu_contract_ref: docs/ux/menu_command_bar_contract.md

command:
  command_id: "cmd:git.push_branch"
  command_revision_ref: "cmd-rev:git.push_branch:2026.04.28-01"
  canonical_verb: git.push_branch
  action_label_text: "Push Branch"
  action_label_ref: "label:git.push_branch:primary"
  disabled_reason_codes:
    - basis_snapshot_drifted
  capability_scope_class: externally_visible_mutation

explanation:
  current_cause:
    message_id: "msg:why_unavailable.stale_context.repreview.cause"
    source_text: "{action_label} needs refresh because {scope_label} changed."
    cause_owner_class: basis_snapshot
    machine_reason_refs:
      - disabled_reason_code: basis_snapshot_drifted
      - state_token: Stale
    placeholder_values:
      action_label: "Push Branch"
      scope_label: "branch state"
      relative_time: "3 min ago"
  safe_next_step:
    message_id: "msg:why_unavailable.stale_context.repreview.next_step"
    source_text: "Refresh current context."
    action_kind: command
    command_id: "cmd:git.refresh_branch_status"
    revalidates_gates: true
  alternate_route:
    route_kind: detail_surface
    label_text: "Open source control status"
    command_id: "cmd:scm.open_status"
    lost_capability_text: "Push remains unavailable until the branch preview is current."
    revalidates_gates: true
  explanation_freshness:
    freshness_class: stale_snapshot
    evaluated_at: "2026-04-28T18:20:00Z"
    freshness_text: "Preview was based on branch state from 3 min ago"
  docs_help_anchor_ref:
    pack_id: "pack:project:aureline:01"
    anchor_id: "docs:anchor:git:push_repreview_required"
    anchor_kind: docs_page_anchor
  message_template_refs:
    compact: "msg:why_unavailable.stale_context.compact"
    short: "msg:why_unavailable.stale_context.repreview.short"
    detail: "msg:why_unavailable.stale_context.repreview.detail"
    status_or_banner: "msg:why_unavailable.stale_context.repreview.banner"
    diagnostics: "msg:why_unavailable.stale_context.repreview.diagnostics"
    docs_help: "msg:why_unavailable.stale_context.repreview.docs"
  placeholder_kinds:
    action_label: action_label
    scope_label: scope_label
    relative_time: relative_time

surface_projections:
  command_palette:
    chip_text: "Context changed"
    short_text: "Push Branch needs refresh because branch state changed."
    footer_action: "Refresh branch status"
  menu:
    chip_text: "Context changed"
    disabled_detail: "Refresh branch status or open source control status before pushing."
    why_unavailable_route: command_diagnostics
  status_or_banner:
    heading: "Branch preview is stale"
    body: "Refresh branch status before pushing. Preview was based on branch state from 3 min ago."
  diagnostics:
    reason_class_id: stale_context
    remediation_ref: "diag-remediation:git.push_branch:stale_context:2026.04.28-01"
  docs_help:
    anchor_id: "docs:anchor:git:push_repreview_required"
    preserves_next_step: true
  accessibility_narration:
    text: "Push Branch, context changed. Refresh branch status before pushing."

support_export:
  redaction_class: metadata_safe_default
  export_fields:
    - reason_class_id
    - command_id
    - disabled_reason_code
    - explanation_freshness
    - alternate_route

parity_assertions:
  same_reason_class_across_surfaces: true
  stale_freshness_disclosed: true
  apply_against_stale_context_forbidden: true
