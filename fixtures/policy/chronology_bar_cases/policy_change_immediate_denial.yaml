case_id: chronology_bar.policy_change_immediate_denial
title: Immediate denial replaces a remembered allow
scenario: >
  Admin review applies an immediate deny to a workspace-scoped connected
  provider. The chronology bar must keep effective time, display
  timezone, actor, and ordering explicit so later support and export
  packets do not misread the event as a stale remembered-decision replay.
actor_ref:
  stable_id: admin-policy-review
  display_name: policy admin
  role: admin
event_ref:
  event_kind: policy_change_applied
  event_id: evt-policy-change-immediate-denial-01
  event_label: Workspace access denied
effective_time:
  utc_instant: 2026-04-23T17:30:00Z
  local_iso_with_offset: 2026-04-23T10:30:00-07:00
  timezone_id: America/Los_Angeles
  offset_at_instant: "-07:00"
source_clock_class: local_wall_clock_synchronized
skew_flag: synchronized
ordering:
  ordering_relation: strict_after_anchor
  ordering_anchor_ref: anchor-policy-review-open-01
  event_order_key: policy-change-0001
display:
  primary_label: 2026-04-23 10:30 PDT
  secondary_label: 2026-04-23T17:30:00Z
  relative_label: none
export_representation_rule: both_utc_and_local
rendering_representation: local_with_tz_shadow_utc
support_export_fields:
  - effective_utc_instant
  - display_local_time
  - display_timezone_id
  - actor_ref
  - event_kind
  - event_order_key
timeline_rules:
  must_show_timezone: true
  must_show_actor: true
  must_show_shadow_utc: true
  allow_relative_label: false
  may_sort_by_display_text: false
