case_id: chronology_bar.legal_hold_delete_block
title: Legal hold blocks retention delete
scenario: >
  A retention delete would have run on schedule, but a legal hold keeps
  the record in a blocked state. The chronology bar must preserve the
  blocker actor, the civil time displayed to admins, and the ordering
  anchor tying the block to the delete evaluation.
actor_ref:
  stable_id: legal-hold-service
  display_name: legal hold service
  role: system
event_ref:
  event_kind: delete_blocked_by_hold
  event_id: evt-delete-blocked-by-hold-01
  event_label: Delete blocked by legal hold
effective_time:
  utc_instant: 2026-04-24T00:00:00Z
  local_iso_with_offset: 2026-04-24T01:00:00+01:00
  timezone_id: Europe/London
  offset_at_instant: "+01:00"
source_clock_class: remote_host_wall_clock
skew_flag: skew_bounded
skew_bound_ms: 200
ordering:
  ordering_relation: strict_after_anchor
  ordering_anchor_ref: anchor-retention-sweep-0044
  event_order_key: hold-block-0044
display:
  primary_label: 2026-04-24 01:00 BST
  secondary_label: 2026-04-24T00:00:00Z
  relative_label: none
export_representation_rule: both_utc_and_local
rendering_representation: local_with_tz_shadow_utc
support_export_fields:
  - effective_utc_instant
  - display_local_time
  - display_timezone_id
  - actor_ref
  - event_kind
  - event_order_key
  - ordering_relation
timeline_rules:
  must_show_timezone: true
  must_show_actor: true
  must_show_shadow_utc: true
  allow_relative_label: false
  may_sort_by_display_text: false
