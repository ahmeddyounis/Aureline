case_id: chronology_bar.audit_export_mixed_timezones
title: Audit export preserves mixed-timezone order
scenario: >
  A support audit export is assembled from events observed in different
  timezones. The chronology bar must preserve the mixed-timezone display
  label while exporting one canonical order key for support and audit
  replay.
actor_ref:
  stable_id: support-export-service
  display_name: support export service
  role: system
event_ref:
  event_kind: audit_export_assembled
  event_id: evt-audit-export-assembled-01
  event_label: Audit export assembled
effective_time:
  utc_instant: 2026-04-24T07:40:00Z
  local_iso_with_offset: 2026-04-24T09:40:00+02:00
  timezone_id: Europe/Berlin
  offset_at_instant: "+02:00"
source_clock_class: remote_host_wall_clock
skew_flag: skew_bounded
skew_bound_ms: 100
ordering:
  ordering_relation: total_order_from_canonical_uid
  canonical_sequence_uid: audit-export-00042
  event_order_key: audit-export-00042
display:
  primary_label: 2026-04-24 09:40 CEST
  secondary_label: 2026-04-24T07:40:00Z
  relative_label: none
export_representation_rule: both_utc_and_local
rendering_representation: local_with_tz_shadow_utc
support_export_fields:
  - effective_utc_instant
  - display_local_time
  - display_timezone_id
  - offset_at_instant
  - actor_ref
  - event_kind
  - event_order_key
  - source_clock_class
  - skew_flag
  - ordering_relation
timeline_rules:
  must_show_timezone: true
  must_show_actor: true
  must_show_shadow_utc: true
  allow_relative_label: false
  may_sort_by_display_text: false
  must_preserve_canonical_sequence_uid: true
