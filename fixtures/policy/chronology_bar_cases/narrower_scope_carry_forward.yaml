case_id: chronology_bar.narrower_scope_carry_forward
title: Narrower scope carry-forward remains explicit
scenario: >
  A remembered global allow is carried forward only for one root after a
  policy narrowing review. The chronology bar must preserve the narrowing
  event, the system actor, and the exact scope-bound effective time.
actor_ref:
  stable_id: policy-engine
  display_name: policy engine
  role: system
event_ref:
  event_kind: remembered_decision_narrowed
  event_id: evt-remembered-decision-narrowed-01
  event_label: Remembered allow narrowed to finance root
effective_time:
  utc_instant: 2026-04-23T18:05:00Z
  local_iso_with_offset: 2026-04-23T14:05:00-04:00
  timezone_id: America/New_York
  offset_at_instant: "-04:00"
source_clock_class: local_wall_clock_synchronized
skew_flag: synchronized
ordering:
  ordering_relation: strict_after_anchor
  ordering_anchor_ref: anchor-scope-review-01
  event_order_key: remembered-narrow-0001
display:
  primary_label: 5 minutes after scope review
  secondary_label: 2026-04-23 14:05 EDT
  relative_label: 5 minutes after scope review
export_representation_rule: both_utc_and_local
rendering_representation: relative_with_absolute_shadow
support_export_fields:
  - effective_utc_instant
  - display_local_time
  - display_timezone_id
  - actor_ref
  - event_kind
  - event_order_key
timeline_rules:
  must_show_timezone: true
  must_show_actor: true
  must_show_shadow_utc: true
  allow_relative_label: true
  may_sort_by_display_text: false
