case_id: chronology_bar.future_effective_policy_activation
title: Future-effective policy activation stays timezone-safe
scenario: >
  A deny becomes effective on 2026-04-24 in Europe/Berlin civil time.
  The chronology bar must preserve the future instant and the Berlin
  timezone so remote or export consumers do not misread the change as
  already active in other locales.
actor_ref:
  stable_id: policy-engine
  display_name: policy engine
  role: system
event_ref:
  event_kind: future_policy_activation
  event_id: evt-future-policy-activation-01
  event_label: Workspace access will be denied
effective_time:
  utc_instant: 2026-04-24T07:00:00Z
  local_iso_with_offset: 2026-04-24T09:00:00+02:00
  timezone_id: Europe/Berlin
  offset_at_instant: "+02:00"
source_clock_class: remote_host_wall_clock
skew_flag: skew_bounded
skew_bound_ms: 250
ordering:
  ordering_relation: strict_after_anchor
  ordering_anchor_ref: anchor-future-effective-review-01
  event_order_key: future-policy-0001
display:
  primary_label: 2026-04-24 09:00 CEST
  secondary_label: 2026-04-24T07:00:00Z
  relative_label: tomorrow at 09:00 CEST
export_representation_rule: both_utc_and_local
rendering_representation: local_with_tz_shadow_utc
support_export_fields:
  - effective_utc_instant
  - display_local_time
  - display_timezone_id
  - offset_at_instant
  - actor_ref
  - event_kind
  - event_order_key
timeline_rules:
  must_show_timezone: true
  must_show_actor: true
  must_show_shadow_utc: true
  allow_relative_label: true
  may_sort_by_display_text: false
