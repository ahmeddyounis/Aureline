case_id: chronology_bar.expired_remembered_decision_reprompt
title: Expired remembered decision requires reprompt
scenario: >
  A remembered decision expired after a policy-epoch rollover. The
  chronology bar must show when the reprompt became mandatory, who must
  see it next, and the ordering key tying the reprompt back to the
  evaluation pass that detected expiry.
actor_ref:
  stable_id: policy-engine
  display_name: policy engine
  role: system
event_ref:
  event_kind: remembered_decision_reprompt_required
  event_id: evt-remembered-reprompt-required-01
  event_label: Remembered decision expired; reprompt required
effective_time:
  utc_instant: 2026-04-23T19:15:00Z
  local_iso_with_offset: 2026-04-23T12:15:00-07:00
  timezone_id: America/Los_Angeles
  offset_at_instant: "-07:00"
source_clock_class: local_wall_clock_synchronized
skew_flag: synchronized
ordering:
  ordering_relation: strict_after_anchor
  ordering_anchor_ref: anchor-policy-evaluation-01
  event_order_key: remembered-expiry-0001
display:
  primary_label: 2026-04-23 12:15 PDT
  secondary_label: Reprompt required now
  relative_label: none
export_representation_rule: both_utc_and_local
rendering_representation: local_with_tz_shadow_utc
support_export_fields:
  - effective_utc_instant
  - display_local_time
  - display_timezone_id
  - actor_ref
  - event_kind
  - event_order_key
timeline_rules:
  must_show_timezone: true
  must_show_actor: true
  must_show_shadow_utc: true
  allow_relative_label: false
  may_sort_by_display_text: false
