coverage_contract:
  required_cases:
    - policy.diff.grant_to_deny.connected_provider
    - policy.diff.narrower_scope_carry_forward.connected_provider_root
    - policy.diff.expired_remembered_decision.policy_epoch_rollover
    - policy.diff.future_effective_policy.connected_provider
    - policy.diff.legal_hold_interaction.retention_delete
    - policy.diff.audit_export_chronology.support_bundle
  required_primary_result_classes:
    - exact_change
    - narrower_result
    - expired_memory
    - future_effective_pending
    - blocked_by_hold
  required_diff_severities:
    - informational
    - review_required
    - warning
    - blocking
  policy_rule: >
    Policy previews, remembered-decision explainability views, waiver-
    expiry dashboards, and support/export packets must preserve the same
    primary_result_class, diff_severity, blocker ids, remembered-
    decision audit row, dashboard bucket, and chronology-bar case ref
    rather than substituting prose-only summaries.
