# Policy-simulation diff and chronology corpus.
#
# Stable ids for diffable policy outcomes, remembered-decision
# narrowing, waiver-expiry drift, and chronology-bar export truth.
# Admin previews, support/export packets, and later policy-engine
# integrations should cite these ids rather than inventing prose-only
# exception language.

schema_version: 1
manifest_id: policy.simulation_diff_manifest.v1
status: seeded

overview_page: docs/verification/policy_simulation_packet.md
record_state_model_source: docs/governance/record_state_and_policy_simulation_models.md
record_state_schema_source: schemas/governance/record_state.schema.json
waiver_expiry_schema_source: schemas/governance/waiver_expiry.schema.json
waiver_expiry_dashboard_contract_source: artifacts/policy/waiver_expiry_dashboard_contract.yaml
chronology_bar_cases_dir: fixtures/policy/chronology_bar_cases

reference_fixture_refs:
  - fixtures/governance/record_state_examples/deletion_policy_simulation.json
  - fixtures/governance/record_state_examples/remembered_decision_policy_epoch_bound.json
  - fixtures/governance/record_state_examples/waiver_expiry_policy_epoch_bound.json
  - fixtures/governance/record_state_examples/mixed_chronology_admin_timeline.json

simulation_input_fields:
  - case_id
  - baseline_policy_ref
  - proposed_policy_ref
  - subject_ref
  - scope_ref
  - actor_ref
  - evaluation_utc_instant
  - effective_from_utc_instant
  - remembered_decision_refs
  - waiver_refs
  - chronology_bar_case_ref

simulation_output_fields:
  - primary_result_class
  - secondary_result_flags
  - decision_delta_class
  - diff_severity
  - resulting_posture
  - projected_effect_codes
  - blocked_by_refs
  - remembered_decision_audit
  - waiver_expiry_projection
  - chronology_bar_case_ref
  - audit_export_required_fields

primary_result_class_vocabulary:
  - exact_change
  - narrower_result
  - expired_memory
  - future_effective_pending
  - blocked_by_hold

secondary_result_flag_vocabulary:
  - exact_change_detected
  - narrower_result_detected
  - expired_memory_detected
  - future_effective_detected
  - blocked_by_hold_detected

decision_delta_class_vocabulary:
  - grant_to_deny
  - scope_narrowed_carry_forward
  - remembered_decision_expired
  - future_effective_policy_change
  - blocked_by_legal_hold
  - chronology_export_projection

diff_severity_vocabulary:
  - informational
  - review_required
  - warning
  - blocking

resulting_posture_vocabulary:
  - allow
  - deny
  - allow_narrowed_scope
  - reprompt_required
  - scheduled_policy_change
  - blocked_by_hold

carry_forward_reason_vocabulary:
  - unchanged_subject_and_scope
  - narrowed_scope_with_same_policy_epoch
  - policy_changed
  - policy_epoch_changed
  - expiry_elapsed
  - hold_intercepted

memory_state_vocabulary:
  - none
  - active
  - narrowed
  - expiring_soon
  - expired
  - superseded
  - force_retired_by_policy

waiver_dashboard_bucket_vocabulary:
  - healthy
  - expiring_soon
  - future_effective_pending
  - narrowed_carry_forward
  - expired_reprompt_due
  - blocked_by_hold
  - force_retired_by_policy
  - superseded_pending_cleanup
  - drift_detected

waiver_state_projection_vocabulary:
  - none
  - active
  - expired_silent
  - expired_with_reprompt
  - renewed
  - superseded
  - retired
  - force_retired_by_policy

drift_reason_vocabulary:
  - remembered_decision_expired
  - waiver_expiry_elapsed
  - carry_forward_scope_broader_than_result
  - missing_linked_governed_record
  - policy_epoch_mismatch

audit_export_required_field_vocabulary:
  - effective_utc_instant
  - display_local_time
  - display_timezone_id
  - offset_at_instant
  - actor_ref
  - event_kind
  - event_order_key
  - source_clock_class
  - skew_flag
  - ordering_relation

cases:
  - case_id: policy.diff.grant_to_deny.connected_provider
    title: Workspace allow becomes deny on the same connected provider
    simulation_class: policy_upgrade_simulation
    baseline_policy_ref: policy.connected_provider.workspace.allow.v1
    proposed_policy_ref: policy.connected_provider.workspace.deny.v2
    subject_ref:
      subject_kind: connected_provider_record
      subject_id: cpr-provider-alpha-0019
    scope_ref:
      scope_kind: workspace
      scope_id: ws-aureline
    actor_ref:
      stable_id: admin-policy-review
      display_name: policy admin
      role: admin
    evaluation_utc_instant: 2026-04-23T17:15:00Z
    effective_from_utc_instant: 2026-04-23T17:30:00Z
    remembered_decision_refs:
      - rd-connected-provider-grant-0019
    waiver_refs:
      - we-remembered-decision-pe-bound-0019
    chronology_bar_case_ref: chronology_bar.policy_change_immediate_denial
    simulation_output:
      primary_result_class: exact_change
      secondary_result_flags:
        - exact_change_detected
      decision_delta_class: grant_to_deny
      diff_severity: blocking
      resulting_posture: deny
      projected_effect_codes:
        - would_be_refused_by_policy
        - would_supersede_remembered_decision
      blocked_by_refs: []
      remembered_decision_audit:
        remembered_decision_ref: rd-connected-provider-grant-0019
        baseline_scope: workspace
        proposed_scope: workspace
        carry_forward_scope: none
        carry_forward_reason_class: policy_changed
        memory_state_before: active
        memory_state_after: superseded
      waiver_expiry_projection:
        waiver_ref: we-remembered-decision-pe-bound-0019
        waiver_state_before: active
        waiver_state_after: force_retired_by_policy
        dashboard_bucket: force_retired_by_policy
        drift_reason_codes: []
      audit_export_required_fields:
        - effective_utc_instant
        - display_local_time
        - display_timezone_id
        - actor_ref
        - event_kind
        - event_order_key
    source_fixture_refs:
      - fixtures/governance/record_state_examples/remembered_decision_policy_epoch_bound.json
      - fixtures/governance/record_state_examples/waiver_expiry_policy_epoch_bound.json

