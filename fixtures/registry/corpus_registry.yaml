# Governed corpus lineage registry.
#
# Release, docs, support, compatibility, migration, conformance, and
# benchmark packets read this registry when they need to name which corpus
# or fixture set backs a claim and whether the supporting evidence is still
# fresh enough to publish.

schema_version: 1
registry_id: aureline.corpus_lineage_registry
registry_revision: 1
status: active
as_of: "2026-05-18"
owner: "@ahmeddyounis"
release_channel_scope: beta

freshness_policy_ref: fixtures/registry/evidence_freshness_policy.yaml
intake_checklist_ref: fixtures/registry/corpus_intake_checklist.md
lineage_doc_ref: docs/release/m3/corpus_lineage_and_public_proof.md

validator:
  script_ref: ci/check_corpus_freshness.py
  wrapper_ref: scripts/ci/check_corpus_freshness.py
  latest_report_ref: artifacts/registry/corpus_freshness_report.json
  command: python3 ci/check_corpus_freshness.py --repo-root .
  check_command: python3 ci/check_corpus_freshness.py --repo-root . --check

source_contract_refs:
  protected_benchmark_corpus_manifest: fixtures/benchmarks/corpus_manifest.yaml
  public_benchmark_packet: artifacts/benchmarks/m3/publication_packet/packet.md
  public_proof_index: artifacts/milestones/m3/public_proof_index.md
  reference_workspace_register: artifacts/compat/m3/reference_workspace_register.yaml
  reference_workspace_report: artifacts/compat/m3/reference_workspace_report.json
  compatibility_report: artifacts/compat/m3/compatibility_report.json
  migration_source_rows: artifacts/migration/source_ecosystem_rows.yaml
  migration_scoreboard: artifacts/migration/m3/migration_scoreboard.md
  extension_conformance_report: artifacts/compat/m3/extension_conformance_kit_report.json
  support_scenario_manifest: fixtures/support/m3/scenario_corpus/manifest.yaml
  support_drill_report: artifacts/support/m3/drill_harness_report.md
  release_evidence_template: docs/release/release_evidence_packet_template.md

vocabularies:
  asset_class:
    - protected_benchmark_corpus
    - certified_reference_workspace
    - migration_suite
    - conformance_pack
    - support_scenario_seed
    - external_intake_holding_area
  source_class:
    - synthetic
    - self_host_slice
    - public_sanitised
    - partner_customer_derived
    - design_partner_derived
    - field_derived
  clearance_state:
    - cleared_for_ci_and_public_proof
    - manual_review_only
    - blocked_pending_intake
  declared_claim_state:
    - current
    - methodology_only
    - supported
    - retest_pending
    - limited
    - pass
  stale_effective_state:
    - retest_pending
    - claim_narrowed
    - blocked

corpus_assets:
  - corpus_asset_id: corpus.asset.benchmark.beta_publication_pack
    title: Beta benchmark publication corpus pack
    asset_class: protected_benchmark_corpus
    source_class: synthetic
    owner:
      owner_dri: "@ahmeddyounis"
      evidence_owner_ref: lane:benchmark_lab
      publication_owner_ref: lane:release_evidence
      privacy_reviewer_ref: lane:docs_public_truth
      backup_owner_ref_or_waiver: waiver:single-maintainer-backup
    privacy:
      privacy_class: public_synthetic
      clearance_state: cleared_for_ci_and_public_proof
      approved_for_ci: true
      approved_for_public_proof: true
      intake_record_ref: not_required_synthetic
      license_status: synthetic_no_real_content
      license_clearance: approved_repo_owned_or_synthetic
      redaction_state: approved_no_private_material_present
      retention_class: permanent_seed
      retention_approval: approved_permanent_seed
      reviewed_on: "2026-05-17"
    refresh:
      cadence: each_release
      last_reviewed_on: "2026-05-17"
      next_review_due: "2026-05-31"
      stale_after_days: 14
      rerun_trigger_refs:
        - corpus_or_fixture_revision_changed
        - reference_hardware_image_changed
        - protected_metrics_or_fitness_catalog_changed
        - exact_build_identity_chain_changed
    corpus_ids:
      - corpus.reference.ts_web_app_archetype_seed
