schema_version: 1
record_kind: transport_explainability_case_manifest

contract_source: docs/network/transport_explainability_surface_contract.md
summary_strip_schema: schemas/network/transport_summary_strip.schema.json
endpoint_history_row_schema: schemas/network/endpoint_history_row.schema.json
certificate_detail_card_schema: schemas/network/certificate_detail_card.schema.json

cases:
  - fixture: pac_sourced_proxy.yaml
    case_id: transport_explainability.pac_sourced_proxy
    covers:
      - pac_sourced_proxy
      - org_ca_bundle
      - no_bypass_projection
      - summary_strip
      - endpoint_row
      - certificate_detail_card
  - fixture: custom_ca_trust.yaml
    case_id: transport_explainability.custom_ca_trust
    covers:
      - custom_ca
      - trust_success
      - certificate_detail_card
      - endpoint_row
  - fixture: mirror_unavailable.yaml
    case_id: transport_explainability.mirror_unavailable
    covers:
      - mirror_unavailable
      - stale_mirror
      - no_public_fallback
      - denied_attempt_history
  - fixture: policy_blocked.yaml
    case_id: transport_explainability.policy_blocked
    covers:
      - policy_blocked
      - egress_denied
      - denied_attempt_history
      - repair_policy_refresh
  - fixture: ssh_host_proof_mismatch.yaml
    case_id: transport_explainability.ssh_host_proof_mismatch
    covers:
      - ssh_host_proof_mismatch
      - strict_host_key
      - certificate_detail_card
      - denied_attempt_history
