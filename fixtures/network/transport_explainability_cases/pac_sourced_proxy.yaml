schema_version: 1
record_kind: transport_explainability_case
case_id: transport_explainability.pac_sourced_proxy
source_decision_refs:
  - transport_decision.enterprise_pac_update.allowed
covers:
  - pac_sourced_proxy
  - org_ca_bundle
  - summary_strip
  - endpoint_row
  - certificate_detail_card

summary_strip:
  $schema: ../../../schemas/network/transport_summary_strip.schema.json
  schema_version: 1
  record_kind: transport_summary_strip_record
  summary_strip_id: transport_summary.pac_update.allowed
  source_decision_refs:
    - transport_decision.enterprise_pac_update.allowed
  source_attribution_refs:
    - net_attr.enterprise_online_pac_update_allowed
  connectivity_mode: online_live_allowed
  current_connectivity_sentence: Enterprise online profile is using a PAC-resolved proxy and org CA trust for the update feed.
  effective_proxy_source:
    proxy_resolution_mode: pac_proxy
    proxy_source_class: pac_script
    effective_proxy_ref: effective_proxy.corp_primary
    proxy_config_ref: proxy_config.corp_pac_primary
    pac_script_fingerprint: pac_script:fp_corp_primary_2026_04
    proxy_source_sentence: Corporate PAC selected the effective proxy for this profile.
  trust_ca_state:
    trust_store_source: os_trust_store_plus_org_ca_bundle
    ca_state_class: loaded_current
    org_ca_bundle_fingerprint: org_ca_bundle:fp_corp_primary_2026_04
    pinned_control_plane_trust_refs:
      - pinned_cp_trust.managed_control_plane
    ssh_host_key_default_provenance: not_applicable_non_ssh
    trust_failure_state: none
    trust_ca_sentence: OS trust plus the organization CA bundle satisfied the update trust path.
  policy_source:
    policy_source_class: signed_org_bundle
    policy_freshness_class: policy_current
    active_policy_bundle_ref: policy_bundle.corp_primary
    policy_epoch_ref: policy_epoch.managed.windowed.2026_04_23
    last_policy_refresh_at: "2026-04-23T12:00:00Z"
    policy_source_sentence: The signed organization policy bundle controls update transport.
  mirror_posture:
    label_class: org_approved_origin
    mirror_route_class: no_mirror_direct_origin
    mirror_endpoint_ref: null
    mirror_snapshot_ref: null
    mirror_freshness_class: not_applicable
    public_origin_allowed: false
    mirror_sentence: The update feed is an org-approved origin reached through the PAC proxy.
  degraded_offline_summary:
    degraded_kind: none
    offline_or_deny_all_state: online_live_allowed
    offline_since_at: null
    summary_sentence: No degraded or offline transport state is active for this route.
  recent_endpoint_counts:
    endpoint_total: 1
    recent_allowed_count: 1
    recent_denied_count: 0
    recent_failed_count: 0
    recent_deferred_count: 0
  no_bypass_projection:
    no_bypass_status: no_bypass_enforced
    direct_fallback_allowed: false
    insecure_fallback_allowed: false
    forbidden_bypass_classes:
      - silent_direct_origin_fallback
      - insecure_tls_fallback
      - proxy_resolution_skip
      - cli_desktop_proxy_divergence
    exception_ref: null
    no_bypass_sentence: Direct or insecure fallback is unavailable when PAC or org CA handling fails.
  repair_actions:
    - repair_action_class: inspect_only_no_action
      repair_action_ref: null
      repair_sentence: No repair is required for the selected PAC and trust path.
      no_bypass_safe: true
  endpoint_row_refs:
    - endpoint_row.pac_update.allowed
  certificate_detail_card_refs:
    - certificate_card.pac_update.org_ca_trust
  denied_attempt_history_refs: []
  captured_at: "2026-04-23T12:05:00Z"
  redaction_class: metadata_safe_default
  export_safe: true
  narrative_refs:
    - docs/network/transport_explainability_surface_contract.md
    - schemas/network/transport_summary_strip.schema.json

endpoint_rows:
  - $schema: ../../../schemas/network/endpoint_history_row.schema.json
    schema_version: 1
    record_kind: transport_endpoint_row
    endpoint_row_id: endpoint_row.pac_update.allowed
