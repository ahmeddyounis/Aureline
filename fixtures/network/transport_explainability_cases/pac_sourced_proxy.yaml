    linked_attribution_ref: net_attr.enterprise_online_pac_update_allowed
    component_class: update_client_component
    component_instance_ref: update_client.desktop_primary
    component_label: Update client
    permission_class: core_update
    permission_grant_ref: grant.core_update.managed_policy
    egress_class: org_approved_external
    target_class: update_feed_target
    target_identity_ref: target.update_feed.enterprise_primary
    target_scope_ref: scope.tenant_corp_primary
    auth_mode: mtls_client_cert
    auth_handle_ref: handle.mtls_client_cert.update_primary
    route_summary:
      origin_scope: desktop_client
      route_class: pac_resolved_route
      proxy_resolution_mode: pac_proxy
      mirror_public_label: org_approved_origin
      mirror_route_class: no_mirror_direct_origin
      public_origin_allowed: false
      route_sentence: Desktop update traffic uses the PAC-resolved enterprise proxy.
    last_outcome:
      transport_decision_code: allow
      outcome_class: outbound_allowed_completed
      freshness_class: live_recent
      last_success_at: "2026-04-23T12:05:00Z"
      outcome_captured_at: "2026-04-23T12:05:00Z"
      outcome_sentence: The update manifest route completed through the PAC proxy.
    reason_detail: null
    repair_path: []
    freshness:
      freshness_class: live_recent
      captured_at: "2026-04-23T12:05:00Z"
      stale_after_at: "2026-04-23T18:05:00Z"
      freshness_sentence: Update endpoint state is current for the active policy window.
    certificate_detail_card_ref: certificate_card.pac_update.org_ca_trust
    denied_attempt_history_refs: []
    no_bypass_projection:
      no_bypass_status: no_bypass_enforced
      direct_fallback_allowed: false
      insecure_fallback_allowed: false
      forbidden_bypass_classes:
        - silent_direct_origin_fallback
        - insecure_tls_fallback
        - proxy_resolution_skip
      exception_ref: null
      no_bypass_sentence: This endpoint cannot bypass PAC proxy or org CA validation.
    redaction_class: metadata_safe_default
    export_safe: true
    narrative_refs:
      - docs/network/transport_explainability_surface_contract.md
      - schemas/network/endpoint_history_row.schema.json

certificate_detail_cards:
  - $schema: ../../../schemas/network/certificate_detail_card.schema.json
    schema_version: 1
    record_kind: certificate_detail_card_record
    certificate_detail_card_id: certificate_card.pac_update.org_ca_trust
    source_decision_ref: transport_decision.enterprise_pac_update.allowed
    linked_endpoint_row_ref: endpoint_row.pac_update.allowed
    linked_history_row_ref: null
    server_identity:
      server_identity_ref: server_identity.update_feed.enterprise_primary
      target_class: update_feed_target
      identity_label: Enterprise update feed
      target_scope_ref: scope.tenant_corp_primary
      identity_sentence: The peer identity resolves to the approved enterprise update feed ref.
    trust_material_kind: tls_certificate_chain
    trust_path:
      trust_store_source: os_trust_store_plus_org_ca_bundle
      ca_source_class: org_ca_bundle
      org_ca_bundle_fingerprint: org_ca_bundle:fp_corp_primary_2026_04
      pinned_control_plane_trust_refs:
        - pinned_cp_trust.managed_control_plane
      trust_anchor_refs:
        - trust_anchor.org_ca.corp_primary
      trust_path_sentence: The OS trust store and organization CA bundle validated the server chain.
    pinning_host_key_posture:
      ssh_host_key_provenance: not_applicable_non_ssh
      pinning_state: not_applicable
      host_key_fingerprint: null
      policy_pin_ref: null
      pinning_sentence: SSH host proof is not applicable for this TLS endpoint.
    certificate_lifecycle:
      tls_server_cert_chain_fingerprint: tls_chain:fp_update_feed_enterprise_primary_2026_04
      leaf_certificate_fingerprint: leaf_cert:fp_update_feed_enterprise_primary_2026_04
      issuer_ref: issuer.org_ca.corp_primary
      valid_not_before_at: "2026-04-01T00:00:00Z"
      expires_at: "2026-07-01T00:00:00Z"
      expiry_state: valid
      expiry_sentence: The server certificate is valid for the current policy window.
    client_certificate_posture:
      client_certificate_state: handle_valid
      client_certificate_handle_ref: handle.mtls_client_cert.update_primary
      client_certificate_fingerprint: client_cert:fp_update_primary_2026_04
      client_certificate_expires_at: "2026-06-30T00:00:00Z"
      client_certificate_sentence: The update client certificate handle is present and valid.
    trust_result:
      trust_succeeded: true
      trust_failure_state: none
      policy_rule_ref: policy_rule.transport.update_trust
      result_sentence: Trust succeeded through the organization CA bundle and client certificate handle.
    repair_actions:
      - repair_action_class: inspect_only_no_action
        repair_action_ref: null
        repair_sentence: No trust repair is required for this endpoint.
        no_bypass_safe: true
    secret_material_attestation:
      raw_material_excluded: true
      forbidden_material_classes:
        - raw_certificate_pem
        - raw_ca_bundle_bytes
        - raw_private_key
        - raw_endpoint_name
        - raw_ip_address
        - raw_proxy_credentials
        - raw_token_or_cookie
      attestation_sentence: The card contains opaque fingerprints and refs only.
    captured_at: "2026-04-23T12:05:00Z"
    redaction_class: metadata_safe_default
    export_safe: true
    narrative_refs:
      - docs/network/transport_explainability_surface_contract.md
      - schemas/network/certificate_detail_card.schema.json

denied_attempt_history_rows: []
