      mirror_route_class: mirror_not_applicable
      public_origin_allowed: false
      route_sentence: Policy denied the request before an AI gateway route was selected.
    last_outcome:
      transport_decision_code: deny_policy
      outcome_class: outbound_denied_by_policy
      freshness_class: current_denied
      last_success_at: null
      outcome_captured_at: "2026-04-23T12:30:00Z"
      outcome_sentence: AI context egress is blocked by organization policy.
    reason_detail:
      denial_category: policy
      deny_reason_class: admin_policy_denied
      trust_failure_state: none
      policy_rule_ref: policy_rule.ai_context.workspace_block
      user_setting_ref: null
      reason_sentence: The policy bundle denies AI context egress for this workspace scope.
    repair_path:
      - repair_action_class: refresh_policy
        repair_action_ref: repair_action.policy.refresh
        repair_sentence: Refresh the signed policy bundle or request a narrower approved route.
        retry_context_class: new_policy_context_required
        retry_allowed: false
    freshness:
      freshness_class: current_denied
      captured_at: "2026-04-23T12:30:00Z"
      stale_after_at: "2026-04-23T18:30:00Z"
      freshness_sentence: The denial is current for the active policy epoch.
    certificate_detail_card_ref: null
    denied_attempt_history_refs:
      - history_row.policy_blocked.ai_gateway
    no_bypass_projection:
      no_bypass_status: no_bypass_enforced
      direct_fallback_allowed: false
      insecure_fallback_allowed: false
      forbidden_bypass_classes:
        - extension_ambient_egress
        - generic_network_error_when_typed_reason_known
      exception_ref: null
      no_bypass_sentence: The endpoint cannot retry through another AI route without policy admission.
    redaction_class: metadata_safe_default
    export_safe: true
    narrative_refs:
      - docs/network/transport_explainability_surface_contract.md
      - schemas/network/endpoint_history_row.schema.json

certificate_detail_cards: []

