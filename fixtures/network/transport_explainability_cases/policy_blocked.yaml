schema_version: 1
record_kind: transport_explainability_case
case_id: transport_explainability.policy_blocked
source_decision_refs:
  - transport_decision.policy_blocked.ai_gateway
covers:
  - policy_blocked
  - egress_denied
  - endpoint_row
  - denied_attempt_history

summary_strip:
  $schema: ../../../schemas/network/transport_summary_strip.schema.json
  schema_version: 1
  record_kind: transport_summary_strip_record
  summary_strip_id: transport_summary.policy_blocked.ai_gateway
  source_decision_refs:
    - transport_decision.policy_blocked.ai_gateway
  source_attribution_refs: []
  connectivity_mode: online_live_allowed
  current_connectivity_sentence: Network is online, but policy blocks the AI gateway egress class for this workspace.
  effective_proxy_source:
    proxy_resolution_mode: system_proxy
    proxy_source_class: system_proxy_settings
    effective_proxy_ref: effective_proxy.system_default
    proxy_config_ref: proxy_config.system_default
    pac_script_fingerprint: null
    proxy_source_sentence: System proxy is available but not used because policy denied the request before transport.
  trust_ca_state:
    trust_store_source: os_trust_store
    ca_state_class: not_configured
    org_ca_bundle_fingerprint: null
    pinned_control_plane_trust_refs: []
    ssh_host_key_default_provenance: not_applicable_non_ssh
    trust_failure_state: none
    trust_ca_sentence: Trust did not fail; the block came from policy.
  policy_source:
    policy_source_class: signed_org_bundle
    policy_freshness_class: policy_current
    active_policy_bundle_ref: policy_bundle.corp_primary
    policy_epoch_ref: policy_epoch.managed.windowed.2026_04_23
    last_policy_refresh_at: "2026-04-23T12:10:00Z"
    policy_source_sentence: Signed organization policy denies AI context egress for this workspace scope.
  mirror_posture:
    label_class: no_route_selected
    mirror_route_class: mirror_not_applicable
    mirror_endpoint_ref: null
    mirror_snapshot_ref: null
    mirror_freshness_class: not_applicable
    public_origin_allowed: false
    mirror_sentence: No mirror or origin route was selected after the policy denial.
  degraded_offline_summary:
    degraded_kind: policy_blocked
    offline_or_deny_all_state: online_live_allowed
    offline_since_at: null
    summary_sentence: This is a policy block, not an offline or proxy failure.
  recent_endpoint_counts:
    endpoint_total: 1
    recent_allowed_count: 0
    recent_denied_count: 1
    recent_failed_count: 0
    recent_deferred_count: 0
  no_bypass_projection:
    no_bypass_status: no_bypass_enforced
    direct_fallback_allowed: false
    insecure_fallback_allowed: false
    forbidden_bypass_classes:
      - feature_specific_retry_under_deny_all
      - extension_ambient_egress
      - generic_network_error_when_typed_reason_known
    exception_ref: null
    no_bypass_sentence: AI egress cannot bypass the active organization policy.
  repair_actions:
    - repair_action_class: refresh_policy
      repair_action_ref: repair_action.policy.refresh
      repair_sentence: Refresh policy or request an approved narrower route before retrying.
      no_bypass_safe: true
  endpoint_row_refs:
    - endpoint_row.policy_blocked.ai_gateway
  certificate_detail_card_refs: []
  denied_attempt_history_refs:
    - history_row.policy_blocked.ai_gateway
  captured_at: "2026-04-23T12:30:00Z"
  redaction_class: metadata_safe_default
  export_safe: true
  narrative_refs:
    - docs/network/transport_explainability_surface_contract.md
    - schemas/network/transport_summary_strip.schema.json

endpoint_rows:
