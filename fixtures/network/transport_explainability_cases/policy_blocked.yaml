    permission_class: ai_context_egress
    permission_grant_ref: grant.ai_context.workspace_default
    egress_class: org_approved_external
    target_class: ai_provider_endpoint_target
    target_identity_ref: target.ai_gateway.enterprise_primary
    target_scope_ref: scope.workspace.enterprise_primary
    auth_mode: oauth_delegated_handle
    auth_handle_ref: handle.oauth.ai_gateway
    route_summary:
      origin_scope: desktop_client
      route_class: air_gap_no_network_route
