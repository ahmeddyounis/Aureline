schema_version: 1
record_kind: route_class_example
example_id: route_class.preview.org_shared_allowed

linked_route_class_matrix_ref: artifacts/network/route_classes.yaml#org_shared

source_flow:
  flow_class: preview_share_link
  source_schema: schemas/preview/preview_share_link.schema.json
  share_audience_class: organization_signed_in_only
  share_destination_class: managed_organization_share_endpoint
  share_auth_class: step_up_auth_required

resolution:
  route_exposure_class: org_shared
  ttl_class: policy_window
  ttl_seconds: 86400
  approval_expectation: signed_org_bundle_approved
  approval_evidence_ref: policy_rule.preview.share.organization_only
  revocation_path: admin_policy_revoke

decision:
  decision_class: allowed
  policy_source_class: signed_org_bundle
  policy_epoch_ref: policy_epoch.org.2026_05_01
  reason_sentence: Organization-only share is authenticated, timeboxed by policy, and revocable by admin policy.

support_export_projection:
  required_fields_present:
    - route_exposure_class
    - route_handle_ref
    - audience_scope_ref
    - auth_class
    - revoke_handle_ref
    - policy_source_class
    - policy_epoch_ref
  forbidden_raw_fields_excluded:
    - raw_url
    - raw_token

support_export_example:
  route_exposure_class: org_shared
  route_handle_ref: route_handle.preview.org_share.opaque
  audience_scope_ref: audience_scope.organization.opaque
  auth_class: step_up_auth_required
  revoke_handle_ref: revoke_handle.preview.org_share.opaque
  policy_source_class: signed_org_bundle
  policy_epoch_ref: policy_epoch.org.2026_05_01
