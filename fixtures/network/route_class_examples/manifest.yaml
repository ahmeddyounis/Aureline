schema_version: 1
record_kind: route_class_example_manifest

contract_source: docs/network/route_class_matrix.md
route_class_matrix_source: artifacts/network/route_classes.yaml

cases:
  - fixture: preview_local_only_allowed.yaml
    case_id: route_class.preview.local_only_allowed
    expected_route_exposure_class: loopback_local
    decision_class: allowed
    covers:
      - preview_share
      - local_only
  - fixture: preview_org_shared_allowed.yaml
    case_id: route_class.preview.org_shared_allowed
    expected_route_exposure_class: org_shared
    decision_class: allowed
    covers:
      - preview_share
      - org_shared
      - policy_window_ttl
  - fixture: preview_public_preview_denied_by_default.yaml
    case_id: route_class.preview.public_preview_denied_by_default
    expected_route_exposure_class: public_preview
    decision_class: blocked
    covers:
      - public_preview_denied_default
      - step_up_required
  - fixture: external_guest_relay_allowed.yaml
    case_id: route_class.preview.external_guest_relay_allowed
    expected_route_exposure_class: external_guest
    decision_class: allowed
    covers:
      - external_guest
      - relay_destination
  - fixture: machine_callback_loopback_allowed.yaml
    case_id: route_class.callback.loopback_allowed
    expected_route_exposure_class: machine_callback
    decision_class: allowed
    covers:
      - machine_callback
      - correlation_required
  - fixture: unknown_blocked_requires_review.yaml
    case_id: route_class.unknown.blocked_requires_review
    expected_route_exposure_class: blocked_unknown_requires_review
    decision_class: blocked
    covers:
      - unknown_mapping
      - deny_by_default

