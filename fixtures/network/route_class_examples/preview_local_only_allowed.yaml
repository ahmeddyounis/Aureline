schema_version: 1
record_kind: route_class_example
example_id: route_class.preview.local_only_allowed

linked_route_class_matrix_ref: artifacts/network/route_classes.yaml#loopback_local

source_flow:
  flow_class: preview_share_link
  source_schema: schemas/preview/preview_share_link.schema.json
  share_audience_class: workspace_local_only_no_share
  share_destination_class: local_workspace_anchor_only
  share_auth_class: no_auth_required

resolution:
  route_exposure_class: loopback_local
  ttl_class: ephemeral_session_only
  approval_expectation: end_user_implicit
  revocation_path: local_session_stop

decision:
  decision_class: allowed
  policy_source_class: local_default_policy
  policy_epoch_ref: policy_epoch.local.default
  reason_sentence: Local-only preview anchor is not shareable and terminates on the same device.

support_export_projection:
  required_fields_present:
    - route_exposure_class
    - route_handle_ref
    - policy_source_class
    - policy_epoch_ref
  forbidden_raw_fields_excluded:
    - raw_url
    - raw_token

support_export_example:
  route_exposure_class: loopback_local
  route_handle_ref: route_handle.preview.local_anchor.opaque
  policy_source_class: local_default_policy
  policy_epoch_ref: policy_epoch.local.default
