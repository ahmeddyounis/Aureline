schema_version: 1
record_kind: transport_inspector_case
case_id: transport_inspector.air_gapped_offline_bundle
source_decision_refs:
  - transport_decision.offline_deferred.mirror_refresh
covers:
  - air_gapped_or_mirrored
  - offline_only_mode
  - offline_bundle_mirror
  - export_packet_unavailable_air_gapped

effective_route:
  $schema: ../../../schemas/network/effective_route_state.schema.json
  schema_version: 1
  record_kind: effective_route_state_record
  effective_route_id: effective_route.air_gapped.offline_bundle.deferred
  captured_at: "2026-04-23T12:50:00Z"
  linked_decision_refs:
    - transport_decision.offline_deferred.mirror_refresh
  linked_attribution_refs: []
  linked_endpoint_row_refs: []
  linked_summary_strip_ref: null
  linked_certificate_card_refs: []
  linked_denial_record_refs:
    - transport_denial.air_gapped.offline_only_mode
  endpoint_class_context:
    component_class: mirror_refresh_component
    component_instance_ref: mirror_refresh.docs.air_gapped
    component_label: Air-gapped mirror refresh
    permission_class: mirror_refresh
    permission_grant_ref: grant.mirror_refresh.air_gapped_default
    target_class: mirror_endpoint_target
    target_identity_ref: target.mirror_endpoint.docs_air_gapped
    target_scope_ref: scope.tenant_air_gapped
    egress_class: deny_all
    auth_mode: org_ca_bundle_pinned
    auth_handle_ref: null
  origin_surface:
    origin_scope: local_helper
    inspector_surface_class: support_export_surface
    origin_surface_ref: inspector_surface.support_export.transport
    origin_surface_sentence: The support export surface inspected the deferred refresh route under the air-gapped profile.
  execution_location:
    execution_location_class: air_gap_local_only
    execution_target_ref: device.workstation.air_gapped
    deployment_profile: air_gapped
    identity_mode: account_free_local
    execution_location_sentence: The deferred refresh executes locally under an air-gapped profile with no live network.
  proxy_source:
    proxy_resolution_mode: direct_no_proxy
    proxy_source_class: direct_no_proxy_selected
    effective_proxy_ref: null
    proxy_config_ref: null
    proxy_source_sentence: No proxy is used in the air-gapped profile.
  pac_result:
    pac_state_class: pac_not_in_use
    pac_script_fingerprint: null
    pac_decision_class: pac_decision_not_applicable
    pac_resolved_proxy_ref: null
    pac_result_sentence: PAC is not in use in the air-gapped profile.
  mirror_route_state:
    label_class: offline_bundle_mirror
    mirror_route_class: offline_bundle_derived_mirror_active
    mirror_endpoint_ref: mirror_endpoint.docs_air_gapped
    mirror_snapshot_ref: mirror_snapshot.docs_air_gapped.2026_03_15
    mirror_freshness_class: mirror_within_extended_window
    public_origin_allowed: false
    mirror_state_sentence: The offline bundle-derived mirror is the only allowed source on the air-gapped profile.
  direct_route_eligibility:
    direct_route_allowed: false
    direct_route_eligibility_class: direct_disallowed_offline_or_air_gapped
    exception_ref: null
    eligibility_sentence: Air-gapped profiles forbid direct or public-origin egress.
  trust_posture:
    trust_store_source: air_gap_offline_trust_root
    org_ca_bundle_fingerprint: null
    pinned_control_plane_trust_refs: []
    trust_anchor_refs:
      - trust_anchor.air_gap_offline_root
    ssh_host_key_provenance: not_applicable_non_ssh
    ssh_host_key_fingerprint: null
    client_certificate_state: not_required
    client_certificate_handle_ref: null
    client_certificate_fingerprint: null
    trust_failure_state: none
    trust_posture_sentence: The air-gapped offline trust root is the only trust anchor.
  policy_constraints:
    policy_source_class: offline_policy_bundle
    policy_freshness_class: policy_within_grace
    active_policy_bundle_ref: policy_bundle.air_gapped
    policy_epoch_ref: policy_epoch.air_gapped.2026_03_15
    policy_constraint_classes:
      - mirror_only_required
      - public_origin_forbidden
      - direct_fallback_forbidden
      - offline_grace_window_only
    policy_constraints_sentence: The offline policy bundle requires a mirror-only route under the air-gapped grace window.
  mirror_constraints:
    mirror_constraint_classes:
      - offline_bundle_only
      - mirror_only_no_direct
      - mirror_metadata_signed_evidence_required
    mirror_constraints_sentence: The mirror must be derived from a signed offline bundle under the air-gapped profile.
  canonical_route:
    canonical_route_class: air_gap_no_network_route
    audience_class: end_user_and_admin
    ttl_seconds: null
    ttl_class: no_ttl_applicable
    approval_posture_class: signed_org_bundle_approved
    approval_evidence_ref: offline_bundle_signature.air_gapped
    revocation_class: revocable_admin_policy
    revocation_authority_ref: policy_authority.air_gapped_admin
    canonical_route_sentence: The air-gapped route is approved through the signed offline bundle and revocable by admin policy.
  no_bypass_projection:
    no_bypass_status: no_bypass_enforced
    direct_fallback_allowed: false
    insecure_fallback_allowed: false
    forbidden_bypass_classes:
      - silent_direct_origin_fallback
      - public_origin_on_mirror_only_profile
      - destructive_offline_defer
      - generic_network_error_when_typed_reason_known
    exception_ref: null
    no_bypass_sentence: The air-gapped route forbids direct fallback, public origin, and destructive deferral.
  inspector_actions:
    - inspector_action_class: copy_summary
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_summary.copy_clipboard
      redaction_class: metadata_safe_default
      action_sentence: Copy a privacy-safe summary of the deferred refresh route.
    - inspector_action_class: open_policy_details
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: policy_bundle.air_gapped
      redaction_class: metadata_safe_default
      action_sentence: Open the offline policy bundle behind this route.
    - inspector_action_class: open_trust_proof
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: certificate_card.air_gap_offline_root
      redaction_class: metadata_safe_default
      action_sentence: Open the offline trust-root detail card.
    - inspector_action_class: open_route_history
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: history_window.workspace_recent
      redaction_class: metadata_safe_default
      action_sentence: Open recent decision history for the air-gapped mirror refresh.
    - inspector_action_class: export_packet
      availability_class: unavailable_air_gapped_no_export
      unavailable_reason_class: profile_air_gapped_no_export
      action_target_ref: null
      redaction_class: metadata_safe_default
      action_sentence: Live export of the inspector packet is unavailable on the air-gapped profile.
  remediation_hints:
    - remediation_hint_kind_class: dns_or_mirror_issue
      hint_class: refresh_mirror
      repair_boundary_class: admin_must_repair
      repair_target_ref: mirror_endpoint.docs_air_gapped
      exception_ref: null
      hint_sentence: Refresh the offline bundle mirror through the admin import workflow.
    - remediation_hint_kind_class: admin_vs_user_repair_boundary
      hint_class: admin_must_repair
      repair_boundary_class: admin_must_repair
      repair_target_ref: policy_authority.air_gapped_admin
      exception_ref: null
      hint_sentence: Only an admin can import a refreshed offline bundle on the air-gapped profile.
  route_history_summary:
    history_window_class: workspace_recent
    recent_decision_refs:
      - transport_decision.offline_deferred.mirror_refresh
    recent_attribution_refs: []
    recent_history_sentence: One recent offline-deferred mirror refresh is on file for this workspace.
  redaction_class: metadata_safe_default
  export_safe: true
  narrative_refs:
    - docs/network/transport_inspector_contract.md
    - schemas/network/effective_route_state.schema.json

transport_denial:
  $schema: ../../../schemas/network/transport_denial.schema.json
  schema_version: 1
  record_kind: transport_denial_record
  denial_id: transport_denial.air_gapped.offline_only_mode
  captured_at: "2026-04-23T12:50:00Z"
  source_decision_ref: transport_decision.offline_deferred.mirror_refresh
  linked_effective_route_ref: effective_route.air_gapped.offline_bundle.deferred
  linked_attribution_ref: null
  linked_history_row_ref: history_row.offline_deferred.mirror_refresh
  linked_certificate_card_ref: null
  denial_record_category: offline_only_mode
  denial_category: offline
  transport_decision_code: offline_deferred
  outcome_class: outbound_denied_by_offline_mode
  denial_subject:
    component_class: mirror_refresh_component
    component_instance_ref: mirror_refresh.docs.air_gapped
    permission_class: mirror_refresh
    permission_grant_ref: grant.mirror_refresh.air_gapped_default
    egress_class: deny_all
    target_class: mirror_endpoint_target
    target_identity_ref: target.mirror_endpoint.docs_air_gapped
    target_scope_ref: scope.tenant_air_gapped
    auth_mode: org_ca_bundle_pinned
    auth_handle_ref: null
    origin_scope: local_helper
    route_class: air_gap_no_network_route
    mirror_public_label: offline_bundle_mirror
    mirror_route_class: offline_bundle_derived_mirror_active
    public_origin_allowed: false
    subject_sentence: The air-gapped mirror refresh is deferred until an offline bundle import is available.
  denial_evidence:
    deny_reason_class: air_gap_profile_denied
    trust_failure_state: none
    client_certificate_state: not_required
    mirror_freshness_class: mirror_within_extended_window
    conflict_state_class: proxy_conflict_not_applicable
    offline_state_class: offline_air_gapped_active
    policy_rule_ref: policy_rule.transport.air_gapped_mirror_only
    user_setting_ref: null
    approval_ticket_ref: null
    evidence_sentence: Live network is unavailable; the air-gapped profile defers mirror refresh to an offline bundle import.
  no_bypass_projection:
    no_bypass_status: no_bypass_enforced
    direct_fallback_allowed: false
    insecure_fallback_allowed: false
    forbidden_bypass_classes:
      - silent_direct_origin_fallback
      - public_origin_on_mirror_only_profile
      - destructive_offline_defer
      - generic_network_error_when_typed_reason_known
    exception_ref: null
    no_bypass_sentence: The deferral cannot upgrade to a live or public-origin route under the air-gapped profile.
  required_remediation:
    - remediation_kind_class: offline_deferral_review
      remediation_action_class: inspect_only_no_action
      remediation_target_ref: inspector_summary.copy_clipboard
      repair_boundary_class: end_user_can_repair
      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Inspect the deferred queue locally; no live retry is allowed under air-gapped mode.
    - remediation_kind_class: dns_or_mirror_issue
      remediation_action_class: refresh_mirror
      remediation_target_ref: mirror_endpoint.docs_air_gapped
      repair_boundary_class: admin_must_repair
      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Refresh the offline bundle mirror through the admin import workflow.
    - remediation_kind_class: admin_handoff
      remediation_action_class: request_admin_handoff
      remediation_target_ref: policy_authority.air_gapped_admin
      repair_boundary_class: admin_must_repair
      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Hand off to admin to schedule an offline bundle import.
  export_actions:
    - export_action_class: copy_summary
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_summary.copy_clipboard
      redaction_class: metadata_safe_default
      action_sentence: Copy a privacy-safe summary of the air-gapped deferral.
    - export_action_class: open_policy_details
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: policy_bundle.air_gapped
      redaction_class: metadata_safe_default
      action_sentence: Open the offline policy bundle behind this route.
    - export_action_class: open_trust_proof
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: certificate_card.air_gap_offline_root
      redaction_class: metadata_safe_default
      action_sentence: Open the offline trust-root detail card.
    - export_action_class: open_route_history
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: history_window.workspace_recent
      redaction_class: metadata_safe_default
      action_sentence: Open recent decision history for the air-gapped mirror refresh.
    - export_action_class: export_packet
      availability_class: unavailable_air_gapped_no_export
      unavailable_reason_class: profile_air_gapped_no_export
      action_target_ref: null
      redaction_class: metadata_safe_default
      action_sentence: Live export of the inspector packet is unavailable on the air-gapped profile.
  repair_boundary:
    primary_boundary_class: admin_must_repair
    secondary_boundary_classes:
      - end_user_can_repair
      - support_assisted_repair
    exception_ref: null
    boundary_sentence: Admin owns the offline bundle import; the end user may inspect locally; support can assist with the runbook.
  redaction_class: metadata_safe_default
  export_safe: true
  narrative_refs:
    - docs/network/transport_inspector_contract.md
    - schemas/network/transport_denial.schema.json
