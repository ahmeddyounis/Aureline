      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Refresh the org-approved docs mirror snapshot before retrying.
    - remediation_kind_class: admin_handoff
      remediation_action_class: request_admin_handoff
      remediation_target_ref: policy_authority.corp_admin
      repair_boundary_class: admin_must_repair
      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Hand off to admin to schedule or rotate the docs mirror.
  export_actions:
    - export_action_class: copy_summary
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_summary.copy_clipboard
      redaction_class: metadata_safe_default
      action_sentence: Copy a privacy-safe summary of the stale-mirror denial.
    - export_action_class: open_policy_details
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: policy_bundle.corp_primary
      redaction_class: metadata_safe_default
      action_sentence: Open the signed organization policy that pins docs mirror freshness.
    - export_action_class: open_trust_proof
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: certificate_card.docs_mirror.enterprise_primary
      redaction_class: metadata_safe_default
      action_sentence: Open the certificate detail card for the docs mirror trust path.
    - export_action_class: open_route_history
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: history_window.workspace_recent
      redaction_class: metadata_safe_default
      action_sentence: Open recent decision history for the docs mirror.
    - export_action_class: export_packet
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_packet.transport.docs_update_mirror_only
      redaction_class: metadata_safe_default
      action_sentence: Export a metadata-safe inspector packet for admin review.
  repair_boundary:
    primary_boundary_class: admin_must_repair
    secondary_boundary_classes:
      - support_assisted_repair
    exception_ref: null
    boundary_sentence: Admin owns the mirror snapshot rotation; support can assist with the runbook.
  redaction_class: metadata_safe_default
  export_safe: true
  narrative_refs:
    - docs/network/transport_inspector_contract.md
    - schemas/network/transport_denial.schema.json
