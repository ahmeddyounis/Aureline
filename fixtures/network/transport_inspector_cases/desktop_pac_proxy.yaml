schema_version: 1
record_kind: transport_inspector_case
case_id: transport_inspector.desktop_pac_proxy
source_decision_refs:
  - transport_decision.enterprise_pac_update.allowed
covers:
  - desktop_inspector
  - pac_proxy_resolved
  - org_ca_trust
  - canonical_route_audience
  - inspector_actions_full

effective_route:
  $schema: ../../../schemas/network/effective_route_state.schema.json
  schema_version: 1
  record_kind: effective_route_state_record
  effective_route_id: effective_route.desktop_pac_proxy.update_feed
  captured_at: "2026-04-23T12:05:00Z"
  linked_decision_refs:
    - transport_decision.enterprise_pac_update.allowed
  linked_attribution_refs:
    - net_attr.enterprise_online_pac_update_allowed
  linked_endpoint_row_refs:
    - endpoint_row.pac_update.allowed
  linked_summary_strip_ref: transport_summary.pac_update.allowed
  linked_certificate_card_refs:
    - certificate_card.pac_update.org_ca_trust
  linked_denial_record_refs: []
  endpoint_class_context:
    component_class: update_client_component
    component_instance_ref: update_client.desktop_primary
    component_label: Desktop update client
    permission_class: core_update
    permission_grant_ref: grant.core_update.managed_policy
    target_class: update_feed_target
    target_identity_ref: target.update_feed.enterprise_primary
    target_scope_ref: scope.tenant_corp_primary
    egress_class: org_approved_external
    auth_mode: mtls_client_cert
    auth_handle_ref: handle.mtls_client_cert.update_primary
  origin_surface:
    origin_scope: desktop_client
    inspector_surface_class: desktop_inspector
    origin_surface_ref: inspector_surface.desktop.transport
    origin_surface_sentence: The desktop transport inspector opened the route for the update client.
  execution_location:
    execution_location_class: local_device
    execution_target_ref: device.workstation.primary
    deployment_profile: enterprise_online
    identity_mode: self_hosted_org
    execution_location_sentence: The request executed on the local desktop device under the enterprise online profile.
  proxy_source:
    proxy_resolution_mode: pac_proxy
    proxy_source_class: pac_script
    effective_proxy_ref: effective_proxy.corp_primary
    proxy_config_ref: proxy_config.corp_pac_primary
    proxy_source_sentence: Corporate PAC selected the effective proxy for the update feed.
  pac_result:
    pac_state_class: pac_loaded_current
    pac_script_fingerprint: pac_script:fp_corp_primary_2026_04
    pac_decision_class: pac_decision_use_proxy
    pac_resolved_proxy_ref: effective_proxy.corp_primary
    pac_result_sentence: The PAC script resolved the update feed to the corporate primary proxy.
  mirror_route_state:
    label_class: org_approved_origin
    mirror_route_class: no_mirror_direct_origin
    mirror_endpoint_ref: null
    mirror_snapshot_ref: null
    mirror_freshness_class: not_applicable
    public_origin_allowed: false
    mirror_state_sentence: The update feed is an org-approved origin reached through the PAC proxy without a mirror.
  direct_route_eligibility:
    direct_route_allowed: false
    direct_route_eligibility_class: direct_disallowed_policy
    exception_ref: null
    eligibility_sentence: Policy forbids a direct public fallback when PAC and org CA validation are required.
  trust_posture:
    trust_store_source: os_trust_store_plus_org_ca_bundle
    org_ca_bundle_fingerprint: org_ca_bundle:fp_corp_primary_2026_04
    pinned_control_plane_trust_refs:
      - pinned_cp_trust.managed_control_plane
    trust_anchor_refs:
      - trust_anchor.org_ca.corp_primary
    ssh_host_key_provenance: not_applicable_non_ssh
    ssh_host_key_fingerprint: null
    client_certificate_state: handle_valid
    client_certificate_handle_ref: handle.mtls_client_cert.update_primary
    client_certificate_fingerprint: client_cert:fp_update_primary_2026_04
    trust_failure_state: none
    trust_posture_sentence: The OS trust store plus the organization CA bundle and a valid client certificate handle satisfied trust.
  policy_constraints:
    policy_source_class: signed_org_bundle
    policy_freshness_class: policy_current
    active_policy_bundle_ref: policy_bundle.corp_primary
    policy_epoch_ref: policy_epoch.managed.windowed.2026_04_23
    policy_constraint_classes:
      - direct_fallback_forbidden
      - public_origin_forbidden
    policy_constraints_sentence: The signed organization policy forbids direct fallback and public origin for update transport.
  mirror_constraints:
    mirror_constraint_classes:
      - mirror_not_applicable
    mirror_constraints_sentence: No mirror constraints apply because the route does not use a mirror.
  canonical_route:
    canonical_route_class: pac_resolved_route
    audience_class: end_user_and_admin
    ttl_seconds: 21600
    ttl_class: policy_window
    approval_posture_class: signed_org_bundle_approved
    approval_evidence_ref: policy_rule.transport.update_route
    revocation_class: revocable_admin_policy
    revocation_authority_ref: policy_authority.corp_admin
    canonical_route_sentence: The PAC-resolved route runs under signed-org-bundle approval revocable by admin policy.
  no_bypass_projection:
    no_bypass_status: no_bypass_enforced
    direct_fallback_allowed: false
    insecure_fallback_allowed: false
    forbidden_bypass_classes:
      - silent_direct_origin_fallback
      - insecure_tls_fallback
      - proxy_resolution_skip
      - cli_desktop_proxy_divergence
    exception_ref: null
    no_bypass_sentence: The desktop inspector forbids direct, insecure, or proxy-skipping fallback for this route.
  inspector_actions:
    - inspector_action_class: copy_summary
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_summary.copy_clipboard
      redaction_class: metadata_safe_default
      action_sentence: Copy a privacy-safe summary of the desktop PAC route.
    - inspector_action_class: open_policy_details
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: policy_bundle.corp_primary
      redaction_class: metadata_safe_default
      action_sentence: Open the signed organization policy bundle behind this route.
    - inspector_action_class: open_trust_proof
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: certificate_card.pac_update.org_ca_trust
      redaction_class: metadata_safe_default
      action_sentence: Open the certificate detail card for the org CA trust path.
    - inspector_action_class: open_route_history
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: history_window.session_recent
      redaction_class: metadata_safe_default
      action_sentence: Open recent decision history for the update client.
    - inspector_action_class: export_packet
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_packet.transport.desktop_pac_proxy
      redaction_class: metadata_safe_default
      action_sentence: Export a metadata-safe inspector packet for support review.
  remediation_hints:
    - remediation_hint_kind_class: proxy_pac_mismatch
      hint_class: no_proxy_repair_required
      repair_boundary_class: end_user_can_repair
      repair_target_ref: null
      exception_ref: null
      hint_sentence: No proxy or PAC repair is required for the active route.
    - remediation_hint_kind_class: certificate_trust_failure
      hint_class: no_trust_repair_required
      repair_boundary_class: end_user_can_repair
      repair_target_ref: null
      exception_ref: null
      hint_sentence: No certificate trust repair is required.
    - remediation_hint_kind_class: client_certificate_absence
      hint_class: no_client_cert_repair_required
      repair_boundary_class: end_user_can_repair
      repair_target_ref: null
      exception_ref: null
      hint_sentence: The client certificate handle is present and valid.
    - remediation_hint_kind_class: dns_or_mirror_issue
      hint_class: no_mirror_repair_required
      repair_boundary_class: end_user_can_repair
      repair_target_ref: null
      exception_ref: null
      hint_sentence: No mirror or DNS repair is required.
    - remediation_hint_kind_class: admin_vs_user_repair_boundary
      hint_class: end_user_can_repair
      repair_boundary_class: end_user_can_repair
      repair_target_ref: null
      exception_ref: null
      hint_sentence: Repair authority sits with the end user when no failure is active.
  route_history_summary:
    history_window_class: session_recent
    recent_decision_refs:
      - transport_decision.enterprise_pac_update.allowed
    recent_attribution_refs:
      - net_attr.enterprise_online_pac_update_allowed
    recent_history_sentence: One recent allowed update transport decision is on file for this session.
  redaction_class: metadata_safe_default
  export_safe: true
  narrative_refs:
    - docs/network/transport_inspector_contract.md
    - schemas/network/effective_route_state.schema.json

transport_denial: null
