schema_version: 1
record_kind: transport_inspector_case_manifest

contract_source: docs/network/transport_inspector_contract.md
effective_route_schema: schemas/network/effective_route_state.schema.json
transport_denial_schema: schemas/network/transport_denial.schema.json

cases:
  - fixture: desktop_pac_proxy.yaml
    case_id: transport_inspector.desktop_pac_proxy
    inspector_surface_class: desktop_inspector
    execution_location_class: local_device
    covers:
      - desktop_inspector
      - pac_proxy_resolved
      - org_ca_trust
      - canonical_route_audience
      - inspector_actions_full
  - fixture: cli_headless_manual_proxy.yaml
    case_id: transport_inspector.cli_headless_manual_proxy
    inspector_surface_class: cli_explain_surface
    execution_location_class: headless_runner_host
    covers:
      - cli_headless
      - manual_proxy
      - cli_no_ui_actions
      - parity_with_desktop
  - fixture: remote_target_ssh_workspace.yaml
    case_id: transport_inspector.remote_target_ssh_workspace
    inspector_surface_class: remote_target_inspector
    execution_location_class: remote_target_workspace
    covers:
      - remote_target_inspector
      - ssh_host_proof_failure
      - admin_handoff_required
      - blocked_public_fallback
  - fixture: extension_host_ai_tool_blocked.yaml
    case_id: transport_inspector.extension_host_ai_tool_blocked
    inspector_surface_class: extension_host_inspector
    execution_location_class: extension_sandbox
    covers:
      - extension_host_inspector
      - policy_prohibition
      - extension_route_history_unavailable
  - fixture: ai_broker_route_preview.yaml
    case_id: transport_inspector.ai_broker_route_preview
    inspector_surface_class: ai_broker_preflight
    execution_location_class: local_device
    covers:
      - ai_broker_preflight
      - vendor_published_mirror_route
      - mirror_only_no_direct
      - preflight_no_history_yet
  - fixture: docs_update_mirror_only.yaml
    case_id: transport_inspector.docs_update_mirror_only
    inspector_surface_class: docs_update_inspector
    execution_location_class: local_device
    covers:
      - docs_update_clients
      - mirror_only_profile
      - expired_mirror_metadata
      - blocked_public_fallback
  - fixture: managed_control_plane.yaml
    case_id: transport_inspector.managed_control_plane
    inspector_surface_class: managed_control_plane_inspector
    execution_location_class: managed_service_host
    covers:
      - managed_control_path
      - managed_relay_route
      - admin_only_export
      - managed_service_default_approval
  - fixture: air_gapped_offline_bundle.yaml
    case_id: transport_inspector.air_gapped_offline_bundle
    inspector_surface_class: support_export_surface
    execution_location_class: air_gap_local_only
    covers:
      - air_gapped_or_mirrored
      - offline_only_mode
      - offline_bundle_mirror
      - export_packet_unavailable_air_gapped
