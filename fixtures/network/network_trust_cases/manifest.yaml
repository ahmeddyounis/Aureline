schema_version: 1
record_kind: network_trust_case_manifest

contract_source: docs/network/network_remediation_and_trust_proof_contract.md
remediation_card_schema: schemas/network/network_remediation_card.schema.json
trust_proof_packet_schema: schemas/network/trust_proof_packet.schema.json

cases:
  - fixture: enterprise_proxy_lab_pac_ca_failure.yaml
    case_id: network_trust.enterprise_proxy_lab_pac_ca_failure
    remediation_card_family: pac_evaluation_error
    trust_failure_family_class: proxy_or_pac_resolution_failure
    deployment_profile: managed_cloud
    review_team_class: trust_or_pki_team
    covers:
      - enterprise_proxy_lab
      - pac_evaluation_error
      - locally_verified_org_ca_bundle
      - admin_team_handoff
  - fixture: sovereign_mirror_signer_mismatch.yaml
    case_id: network_trust.sovereign_mirror_signer_mismatch
    remediation_card_family: mirror_freshness_or_signer_mismatch
    trust_failure_family_class: mirror_signer_or_freshness_failure
    deployment_profile: sovereign_mirror_only
    review_team_class: mirror_or_release_team
    covers:
      - sovereign_mirror
      - mirror_signer_mismatch
      - upstream_asserted_freshness
      - mirror_or_release_team_handoff
  - fixture: offline_bundle_verification_failure.yaml
    case_id: network_trust.offline_bundle_verification_failure
    remediation_card_family: mirror_freshness_or_signer_mismatch
    trust_failure_family_class: mirror_signer_or_freshness_failure
    deployment_profile: air_gapped
    review_team_class: admin_team
    covers:
      - air_gapped
      - offline_bundle_verification_failure
      - lab_export_blocked_air_gapped
      - awaiting_offline_bundle_import
  - fixture: self_hosted_target_attach_ssh_host_proof.yaml
    case_id: network_trust.self_hosted_target_attach_ssh_host_proof
    remediation_card_family: ssh_host_proof_mismatch
    trust_failure_family_class: ssh_host_proof_failure
    deployment_profile: self_hosted
    review_team_class: ssh_or_remote_target_team
    covers:
      - self_hosted_target_attach
      - ssh_host_proof_failure
      - admin_must_repair
      - ssh_or_remote_target_team_handoff
