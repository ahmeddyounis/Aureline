case_id: transport_remediation.conflicting_proxy_state
source_decision_refs:
  - transport_decision.enterprise_proxy_resolution.conflict
covers:
  - pac_proxy_mismatch
  - conflicting_proxy_state
  - admin_handoff
  - export_packet_link

remediation_card:
  $schema: ../../../schemas/network/transport_denial.schema.json
  schema_version: 1
  record_kind: transport_denial_record
  denial_id: transport_denial.remediation.conflicting_proxy_state.enterprise_update
  captured_at: "2026-05-06T13:30:00Z"
  source_decision_ref: transport_decision.enterprise_proxy_resolution.conflict
  linked_effective_route_ref: null
  linked_attribution_ref: null
  linked_history_row_ref: null
  linked_certificate_card_ref: null
  denial_record_category: conflicting_proxy_state
  denial_category: proxy
  transport_decision_code: deny_proxy_resolution
  outcome_class: outbound_denied_by_policy
  denial_subject:
    component_class: update_client_component
    component_instance_ref: update_client.desktop_primary
    permission_class: core_update
    permission_grant_ref: grant.core_update.enterprise_policy
    egress_class: org_approved_external
    target_class: update_feed_target
    target_identity_ref: target.update_feed.enterprise_primary
    target_scope_ref: scope.tenant_corp_primary
    auth_mode: org_ca_bundle_pinned
    auth_handle_ref: null
    origin_scope: desktop_client
    route_class: heuristic_unknown_route
    mirror_public_label: no_route_selected
    mirror_route_class: mirror_not_applicable
    public_origin_allowed: false
    subject_sentence: Proxy sources disagree; no safe effective proxy route is selected.
  denial_evidence:
    deny_reason_class: deny_reason_unknown_requires_review
    trust_failure_state: none
    client_certificate_state: not_required
    mirror_freshness_class: not_applicable
    conflict_state_class: pac_proxy_disagrees_with_system_proxy
    offline_state_class: offline_state_not_applicable
    policy_rule_ref: policy_rule.transport.proxy_parity_required
    user_setting_ref: null
    approval_ticket_ref: null
    evidence_sentence: PAC and system proxy sources conflict; admin review is required before retry.
  no_bypass_projection:
    no_bypass_status: no_bypass_enforced
    direct_fallback_allowed: false
    insecure_fallback_allowed: false
    forbidden_bypass_classes:
      - proxy_resolution_skip
      - silent_direct_origin_fallback
      - generic_network_error_when_typed_reason_known
    exception_ref: null
    no_bypass_sentence: Aureline will not skip proxy resolution or silently fall back to direct origin when proxy state is conflicting.
  required_remediation:
    - remediation_kind_class: proxy_pac_mismatch
      remediation_action_class: review_proxy_settings
      remediation_target_ref: null
      repair_boundary_class: admin_must_repair
      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Review PAC and system proxy parity and publish a single effective proxy configuration.
    - remediation_kind_class: admin_handoff
      remediation_action_class: request_admin_handoff
      remediation_target_ref: policy_authority.corp_admin
      repair_boundary_class: admin_must_repair
      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Hand off to the network admin team to resolve the proxy conflict for this profile.
  export_actions:
    - export_action_class: copy_summary
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_summary.copy_clipboard
      redaction_class: metadata_safe_default
      action_sentence: Copy a privacy-safe summary of the proxy conflict.
    - export_action_class: open_policy_details
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: policy_bundle.corp_primary
      redaction_class: metadata_safe_default
      action_sentence: Open policy notes that require proxy parity across surfaces.
    - export_action_class: open_trust_proof
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: certificate_card.enterprise_proxy
      redaction_class: metadata_safe_default
      action_sentence: Open the trust and proxy posture detail card.
    - export_action_class: open_route_history
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: history_window.workspace_recent
      redaction_class: metadata_safe_default
      action_sentence: Open recent route history to compare proxy state across attempts.
    - export_action_class: export_packet
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_packet.transport.conflicting_proxy_state
      redaction_class: metadata_safe_default
      action_sentence: Export a metadata-safe transport packet for admin review.
  repair_boundary:
    primary_boundary_class: admin_must_repair
    secondary_boundary_classes:
      - support_assisted_repair
    exception_ref: null
    boundary_sentence: Proxy conflict requires admin repair; support can assist with evidence capture.
  redaction_class: metadata_safe_default
  export_safe: true
  narrative_refs:
    - docs/network/transport_remediation_contract.md
    - artifacts/network/repair_hint_catalog.yaml
    - schemas/network/transport_denial.schema.json

