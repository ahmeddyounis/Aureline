  - ca_untrusted
  - admin_handoff
  - export_packet_link

remediation_card:
  $schema: ../../../schemas/network/transport_denial.schema.json
  schema_version: 1
  record_kind: transport_denial_record
  denial_id: transport_denial.remediation.certificate_trust_failure.update_feed
  captured_at: "2026-05-06T13:20:00Z"
  source_decision_ref: transport_decision.enterprise_trust.ca_untrusted
  linked_effective_route_ref: effective_route.enterprise_trust.ca_untrusted
  linked_attribution_ref: null
  linked_history_row_ref: history_row.enterprise_trust.ca_untrusted
  linked_certificate_card_ref: certificate_card.enterprise_trust.ca_untrusted
  denial_record_category: certificate_trust_failure
  denial_category: certificate
  transport_decision_code: deny_trust
  outcome_class: outbound_failed_tls_verification
  denial_subject:
    component_class: update_client_component
    component_instance_ref: update_client.desktop_primary
    permission_class: core_update
    permission_grant_ref: grant.core_update.enterprise_policy
    egress_class: org_approved_external
    target_class: update_feed_target
    target_identity_ref: target.update_feed.enterprise_primary
    target_scope_ref: scope.tenant_corp_primary
    auth_mode: org_ca_bundle_pinned
    auth_handle_ref: null
    origin_scope: desktop_client
    route_class: system_proxy_route
    mirror_public_label: org_approved_origin
    mirror_route_class: no_mirror_direct_origin
    public_origin_allowed: false
    subject_sentence: TLS trust verification failed for this org-approved endpoint.
  denial_evidence:
    deny_reason_class: trust_store_verification_failed
    trust_failure_state: ca_untrusted
    client_certificate_state: not_required
    mirror_freshness_class: not_applicable
    conflict_state_class: proxy_conflict_not_applicable
    offline_state_class: offline_state_not_applicable
    policy_rule_ref: policy_rule.transport.org_ca_required
    user_setting_ref: null
    approval_ticket_ref: null
    evidence_sentence: The active trust store did not validate the server certificate chain; insecure fallback is forbidden.
  no_bypass_projection:
    no_bypass_status: no_bypass_enforced
    direct_fallback_allowed: false
    insecure_fallback_allowed: false
    forbidden_bypass_classes:
      - insecure_tls_fallback
      - silent_direct_origin_fallback
      - generic_network_error_when_typed_reason_known
    exception_ref: null
    no_bypass_sentence: Certificate trust failures cannot be bypassed by disabling verification or switching to an undeclared route.
  required_remediation:
    - remediation_kind_class: certificate_trust_failure
      remediation_action_class: add_ca_bundle
      remediation_target_ref: policy_authority.corp_admin
      repair_boundary_class: admin_must_repair
      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Install or publish the required organization CA bundle so TLS verification succeeds.
    - remediation_kind_class: admin_handoff
      remediation_action_class: request_admin_handoff
      remediation_target_ref: policy_authority.corp_admin
      repair_boundary_class: admin_must_repair
      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Hand off to the trust or PKI admin team to review the trust chain under the active policy epoch.
  export_actions:
    - export_action_class: copy_summary
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_summary.copy_clipboard
      redaction_class: metadata_safe_default
      action_sentence: Copy a privacy-safe summary of the certificate trust failure.
    - export_action_class: open_policy_details
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: policy_bundle.corp_primary
      redaction_class: metadata_safe_default
      action_sentence: Open the active policy bundle behind trust-store selection.
    - export_action_class: open_trust_proof
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: certificate_card.enterprise_trust.ca_untrusted
      redaction_class: metadata_safe_default
      action_sentence: Open the certificate detail card for the trust failure evidence.
    - export_action_class: open_route_history
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: history_window.workspace_recent
      redaction_class: metadata_safe_default
      action_sentence: Open recent decision history for this endpoint class.
    - export_action_class: export_packet
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_packet.transport.certificate_trust_failure
      redaction_class: metadata_safe_default
      action_sentence: Export a metadata-safe transport packet for offline review.
  repair_boundary:
    primary_boundary_class: admin_must_repair
    secondary_boundary_classes:
      - support_assisted_repair
    exception_ref: null
    boundary_sentence: Trust store changes require admin repair; support can assist with packet capture.
  redaction_class: metadata_safe_default
  export_safe: true
  narrative_refs:
    - docs/network/transport_remediation_contract.md
    - artifacts/network/repair_hint_catalog.yaml
    - schemas/network/transport_denial.schema.json

