covers:
  - offline_only_mode
  - local_fallback
  - user_continuity
  - export_packet_link

remediation_card:
  $schema: ../../../schemas/network/transport_denial.schema.json
  schema_version: 1
  record_kind: transport_denial_record
  denial_id: transport_denial.remediation.offline_only_mode.mirror_refresh
  captured_at: "2026-05-06T13:05:00Z"
  source_decision_ref: transport_decision.offline_deferred.mirror_refresh
  linked_effective_route_ref: effective_route.offline_deferred.mirror_refresh
  linked_attribution_ref: null
  linked_history_row_ref: history_row.offline_deferred.mirror_refresh
  linked_certificate_card_ref: null
  denial_record_category: offline_only_mode
  denial_category: offline
  transport_decision_code: offline_deferred
  outcome_class: outbound_denied_by_offline_mode
  denial_subject:
    component_class: docs_pack_component
    component_instance_ref: docs_pack.workspace_primary
    permission_class: docs_fetch
    permission_grant_ref: grant.docs_fetch.workspace_default
    egress_class: org_approved_external
    target_class: docs_mirror_target
    target_identity_ref: target.docs_mirror.enterprise_primary
    target_scope_ref: scope.tenant_corp_primary
    auth_mode: org_ca_bundle_pinned
    auth_handle_ref: null
    origin_scope: desktop_client
    route_class: air_gap_no_network_route
    mirror_public_label: customer_operated_mirror
    mirror_route_class: customer_operated_mirror_active
    public_origin_allowed: false
    subject_sentence: Offline-only mode defers the mirror refresh; local editing remains available.
  denial_evidence:
    deny_reason_class: offline_mode_denied
    trust_failure_state: none
    client_certificate_state: not_required
    mirror_freshness_class: mirror_fresh_within_window
    conflict_state_class: proxy_conflict_not_applicable
    offline_state_class: offline_grace_active
    policy_rule_ref: null
    user_setting_ref: setting.network.offline_mode
    approval_ticket_ref: null
    evidence_sentence: Offline-only posture is active; the action is safe to defer but must not claim a live network attempt.
  no_bypass_projection:
    no_bypass_status: no_bypass_enforced
    direct_fallback_allowed: false
    insecure_fallback_allowed: false
    forbidden_bypass_classes:
      - silent_direct_origin_fallback
      - destructive_offline_defer
      - generic_network_error_when_typed_reason_known
    exception_ref: null
    no_bypass_sentence: Offline-only mode forbids hidden fallback and requires explicit retry after connectivity returns.
  required_remediation:
    - remediation_kind_class: offline_deferral_review
      remediation_action_class: inspect_only_no_action
      remediation_target_ref: null
      repair_boundary_class: end_user_can_repair
      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Continue local-only work and retry after leaving offline-only mode.
    - remediation_kind_class: support_packet_export
      remediation_action_class: export_support_packet
      remediation_target_ref: null
      repair_boundary_class: support_assisted_repair
      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Export a metadata-safe transport packet if admin review is needed while offline.
  export_actions:
    - export_action_class: copy_summary
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_summary.copy_clipboard
      redaction_class: metadata_safe_default
      action_sentence: Copy a privacy-safe summary of the offline-only deferral.
    - export_action_class: open_policy_details
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: setting.network.offline_mode
      redaction_class: metadata_safe_default
      action_sentence: Open offline-mode settings and policy notes.
    - export_action_class: open_trust_proof
      availability_class: unavailable_offline_packet_only
      unavailable_reason_class: offline_packet_only_no_live_export
      action_target_ref: null
      redaction_class: metadata_safe_default
      action_sentence: Trust proof is packet-only while offline-only mode is active.
    - export_action_class: open_route_history
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: history_window.session_recent
      redaction_class: metadata_safe_default
      action_sentence: Open recent decision history for this target class.
    - export_action_class: export_packet
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_packet.transport.offline_only_mode
      redaction_class: metadata_safe_default
      action_sentence: Export a metadata-safe transport packet for later review.
  repair_boundary:
    primary_boundary_class: end_user_can_repair
    secondary_boundary_classes:
      - support_assisted_repair
    exception_ref: null
    boundary_sentence: The user can exit offline-only mode; support can assist with evidence export.
  redaction_class: metadata_safe_default
  export_safe: true
  narrative_refs:
    - docs/network/transport_remediation_contract.md
    - artifacts/network/repair_hint_catalog.yaml
    - schemas/network/transport_denial.schema.json
