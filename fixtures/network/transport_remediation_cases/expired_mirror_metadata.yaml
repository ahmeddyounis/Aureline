remediation_card:
  $schema: ../../../schemas/network/transport_denial.schema.json
  schema_version: 1
  record_kind: transport_denial_record
  denial_id: transport_denial.remediation.expired_mirror_metadata.docs_update
  captured_at: "2026-05-06T12:40:00Z"
  source_decision_ref: transport_decision.mirror_only_docs.stale_denied
  linked_effective_route_ref: effective_route.docs_update.mirror_only.stale_denied
  linked_attribution_ref: null
  linked_history_row_ref: history_row.mirror_only_docs.stale_denied
  linked_certificate_card_ref: null
  denial_record_category: expired_mirror_metadata
  denial_category: mirror_unavailable
  transport_decision_code: stale_mirror
  outcome_class: outbound_denied_by_policy
  denial_subject:
    component_class: docs_pack_component
    component_instance_ref: docs_pack.workspace_primary
    permission_class: docs_fetch
    permission_grant_ref: grant.docs_fetch.workspace_default
    egress_class: org_approved_external
    target_class: docs_mirror_target
    target_identity_ref: target.docs_mirror.enterprise_primary
    target_scope_ref: scope.tenant_corp_primary
    auth_mode: org_ca_bundle_pinned
    auth_handle_ref: null
    origin_scope: desktop_client
    route_class: mirror_proxy_route
    mirror_public_label: customer_operated_mirror
    mirror_route_class: mirror_only_no_direct_allowed
    public_origin_allowed: false
    subject_sentence: The approved mirror snapshot is stale beyond the extended freshness window.
  denial_evidence:
    deny_reason_class: freshness_floor_unmet
    trust_failure_state: none
    client_certificate_state: not_required
    mirror_freshness_class: mirror_past_extended_window
    conflict_state_class: proxy_conflict_not_applicable
    offline_state_class: offline_state_not_applicable
    policy_rule_ref: policy_rule.transport.docs_mirror_only
    user_setting_ref: null
    approval_ticket_ref: null
    evidence_sentence: The signed mirror snapshot is past the freshness floor required by policy; public fallback remains forbidden.
  no_bypass_projection:
    no_bypass_status: no_bypass_enforced
    direct_fallback_allowed: false
    insecure_fallback_allowed: false
    forbidden_bypass_classes:
      - silent_direct_origin_fallback
      - public_origin_on_mirror_only_profile
      - generic_network_error_when_typed_reason_known
    exception_ref: null
    no_bypass_sentence: A stale mirror cannot upgrade to a direct public fallback under this profile.
  required_remediation:
    - remediation_kind_class: dns_or_mirror_issue
      remediation_action_class: refresh_mirror
      remediation_target_ref: mirror_endpoint.docs.enterprise_primary
      repair_boundary_class: admin_must_repair
      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Refresh the approved mirror snapshot before retrying.
    - remediation_kind_class: admin_handoff
      remediation_action_class: request_admin_handoff
      remediation_target_ref: policy_authority.corp_admin
      repair_boundary_class: admin_must_repair
      exception_ref: null
      no_bypass_safe: true
      remediation_sentence: Hand off to admin to schedule or rotate the docs mirror.
  export_actions:
    - export_action_class: copy_summary
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_summary.copy_clipboard
      redaction_class: metadata_safe_default
      action_sentence: Copy a privacy-safe summary of the stale-mirror denial.
    - export_action_class: open_policy_details
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: policy_bundle.corp_primary
      redaction_class: metadata_safe_default
      action_sentence: Open the active policy that pins mirror freshness and forbids public fallback.
    - export_action_class: open_trust_proof
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: certificate_card.docs_mirror.enterprise_primary
      redaction_class: metadata_safe_default
      action_sentence: Open the trust detail card for the mirror route.
    - export_action_class: open_route_history
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: history_window.workspace_recent
      redaction_class: metadata_safe_default
      action_sentence: Open recent decision history for the docs mirror.
    - export_action_class: export_packet
      availability_class: available
      unavailable_reason_class: not_applicable_no_unavailability
      action_target_ref: inspector_packet.transport.expired_mirror_metadata
      redaction_class: metadata_safe_default
      action_sentence: Export a metadata-safe transport packet for admin review.
  repair_boundary:
    primary_boundary_class: admin_must_repair
    secondary_boundary_classes:
      - support_assisted_repair
    exception_ref: null
    boundary_sentence: Admin owns mirror rotation; support can assist with the runbook.
  redaction_class: metadata_safe_default
  export_safe: true
  narrative_refs:
    - docs/network/transport_remediation_contract.md
    - artifacts/network/repair_hint_catalog.yaml
    - schemas/network/transport_denial.schema.json

