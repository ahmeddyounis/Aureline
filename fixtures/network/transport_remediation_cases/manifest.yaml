schema_version: 1
record_kind: transport_remediation_case_manifest

contract_source: docs/network/transport_remediation_contract.md
repair_hint_catalog: artifacts/network/repair_hint_catalog.yaml
remediation_card_schema: schemas/network/transport_remediation_card.schema.json

cases:
  - fixture: conflicting_proxy_state.yaml
    case_id: transport_remediation.conflicting_proxy_state
    covers:
      - pac_proxy_mismatch
      - conflicting_proxy_state
      - admin_handoff
      - export_packet_link
  - fixture: expired_mirror_metadata.yaml
    case_id: transport_remediation.expired_mirror_metadata
    covers:
      - expired_mirror_metadata
      - mirror_freshness_floor
      - admin_handoff
      - export_packet_link
  - fixture: certificate_trust_failure.yaml
    case_id: transport_remediation.certificate_trust_failure
    covers:
      - certificate_trust_failure
      - ca_untrusted
      - admin_handoff
      - export_packet_link
  - fixture: client_certificate_absent.yaml
    case_id: transport_remediation.client_certificate_absent
    covers:
      - client_certificate_absent
      - missing_client_certificate
      - admin_handoff
      - export_packet_link
  - fixture: ssh_host_proof_failure.yaml
    case_id: transport_remediation.ssh_host_proof_failure
    covers:
      - ssh_host_proof_failure
      - ssh_host_key_mismatch
      - admin_handoff
      - export_packet_link
  - fixture: dns_split_horizon_mismatch.yaml
    case_id: transport_remediation.dns_split_horizon_mismatch
    covers:
      - dns_split_horizon_mismatch
      - request_dns_review
      - export_packet_link
  - fixture: blocked_public_fallback.yaml
    case_id: transport_remediation.blocked_public_fallback
    covers:
      - blocked_public_fallback
      - no_bypass
      - admin_handoff
      - export_packet_link
  - fixture: offline_only_mode.yaml
    case_id: transport_remediation.offline_only_mode
    covers:
      - offline_only_mode
      - local_fallback
      - user_continuity
      - export_packet_link
