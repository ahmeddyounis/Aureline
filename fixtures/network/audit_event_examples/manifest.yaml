schema_version: 1
record_kind: network_audit_event_example_manifest

permission_matrix_source: artifacts/network/permission_classes.yaml
mirror_offline_matrix_source: artifacts/network/mirror_offline_matrix.yaml
overview_page: docs/network/transport_permission_matrix.md

cases:
  - fixture: core_update_mirror_allowed.yaml
    example_id: audit_event.network.core_update.mirror_allowed
    permission_class: core_update
    audit_requirement_ref: audit.network.artifact_distribution
    covers:
      - enterprise_mirror
      - allow_mirror
      - artifact_digest_ref
      - no_public_origin_fallback
  - fixture: registry_write_denied_no_ticket.yaml
    example_id: audit_event.network.registry_write.no_ticket_denied
    permission_class: registry_write
    audit_requirement_ref: audit.network.registry_publish
    covers:
      - approval_ticket_missing
      - no_offline_mutation
      - publisher_identity_ref
  - fixture: ai_context_egress_denied_policy.yaml
    example_id: audit_event.network.ai_context.policy_denied
    permission_class: ai_context_egress
    audit_requirement_ref: audit.network.ai_context
    covers:
      - provider_entry_ref
      - model_entry_ref
      - deny_policy
      - redaction_policy_ref
  - fixture: ai_tool_egress_org_gateway_allowed.yaml
    example_id: audit_event.network.ai_tool.org_gateway_allowed
    permission_class: ai_tool_egress
    audit_requirement_ref: audit.network.ai_tool
    covers:
      - enterprise_gateway
      - tool_entry_ref
      - approval_ticket_ref
      - org_approved_external
  - fixture: docs_fetch_air_gap_allowed.yaml
    example_id: audit_event.network.docs_fetch.air_gap_allowed
    permission_class: docs_fetch
    audit_requirement_ref: audit.network.docs_pack
    covers:
      - air_gapped
      - offline_bundle_mirror
      - pack_revision_ref
      - mirror_snapshot_ref
  - fixture: remote_connect_ssh_host_key_denied.yaml
    example_id: audit_event.network.remote_connect.ssh_host_denied
    permission_class: remote_connect
    audit_requirement_ref: audit.network.remote_route
    covers:
      - ssh_host_key_mismatch
      - deny_trust
      - target_witness_ref
  - fixture: vcs_network_enterprise_mirror_failed.yaml
    example_id: audit_event.network.vcs_network.enterprise_mirror_failed
    permission_class: vcs_network
    audit_requirement_ref: audit.network.vcs_remote
    covers:
      - enterprise_mirror
      - proxy_unreachable
      - remote_class
      - no_public_origin_fallback
  - fixture: extension_network_missing_permission_denied.yaml
    example_id: audit_event.network.extension_network.missing_permission_denied
    permission_class: extension_network
    audit_requirement_ref: audit.network.extension_egress
    covers:
      - extension_permission_missing
      - local_only
      - no_extension_ambient_egress

