schema_version: 1
record_kind: transport_case_manifest

schema_source: schemas/network/transport_decision.schema.json
packet_seed_source: docs/network/transport_governance_packet_seed.md
proxy_lab_matrix_source: artifacts/network/proxy_lab_matrix.yaml

cases:
  - fixture: enterprise_pac_update_allowed.yaml
    decision_id: transport_decision.enterprise_pac_update.allowed
    covers:
      - pac_proxy
      - custom_ca
      - summary_strip_projection
      - no_bypass_enforced
  - fixture: enterprise_manual_proxy_client_cert_expired.yaml
    decision_id: transport_decision.enterprise_manual_proxy.client_cert_expired
    covers:
      - manual_proxy
      - client_certificate
      - certificate_card_projection
      - no_bypass_enforced
  - fixture: self_hosted_ssh_strict_host_rejected.yaml
    decision_id: transport_decision.self_hosted_ssh.strict_host_rejected
    covers:
      - ssh_strict_host
      - certificate_card_projection
      - denied_attempt_history
  - fixture: mirror_only_docs_stale_denied.yaml
    decision_id: transport_decision.mirror_only_docs.stale_denied
    covers:
      - mirror_only_no_bypass
      - stale_mirror
      - denied_attempt_history
  - fixture: mirror_only_docs_allowed.yaml
    decision_id: transport_decision.mirror_only_docs.allowed
    covers:
      - mirror_only_no_bypass
      - allow_mirror
      - summary_strip_projection
      - no_bypass_enforced
  - fixture: deny_all_ai_gateway_blocked.yaml
    decision_id: transport_decision.deny_all_ai.gateway_blocked
    covers:
      - deny_all_no_bypass
      - denied_attempt_history
      - no_background_retry
  - fixture: offline_deferred_mirror_refresh.yaml
    decision_id: transport_decision.offline_deferred.mirror_refresh
    covers:
      - offline_deferred_idempotent
      - deferred_queue_visibility
      - no_destructive_defer
