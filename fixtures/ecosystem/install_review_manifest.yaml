coverage_contract:
  required_cases:
    - install_review.clean_install.extension_public_registry
    - install_review.transitive_permission_growth.capability_inherit
    - install_review.degraded_compatibility_label.platform_arch
    - install_review.activation_budget_overage.managed_workspace_binding
    - install_review.mirror_offline_catalog_row.offline_bundle_pinned
    - install_review.quarantine_rollback_review.publisher_quarantined
    - install_review.unclaimed_ecosystem_row.host_contract_family
  required_subject_classes:
    - extension_install
    - extension_update
    - bundle_install
    - managed_workspace_binding_install
    - emergency_disable_apply
  required_compatibility_label_states:
    - fully_supported
    - best_effort_supported
    - compatibility_bridge_required
    - unclaimed_ecosystem_row
  required_activation_budget_classes:
    - not_applicable
    - slice_exceeded_with_degradation_marker
  required_rollback_posture_classes:
    - no_rollback_required
    - rollback_pending_admin_confirmation
  required_quarantine_posture_classes:
    - no_quarantine_active
    - quarantined_publisher
  required_catalog_truth_states:
    - live_registry_authoritative
    - offline_bundle_pinned
  policy_rule: >
    Install-review sheets, permission inspectors, support exports,
    claim manifests, and release-evidence packets MUST preserve the
    same install_review_subject_class, install_review_disposition_class,
    compatibility_label_state, activation_budget_class,
    rollback_posture_class, quarantine_posture_class,
    catalog_truth_state, transitive_permission_visibility block, and
    disclosure/irreversibility flag sets rather than substituting
    prose-only summaries or collapsing unsupported, unclaimed, and
    degraded truth into one "install blocked" chip.
