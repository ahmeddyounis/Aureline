# Install-review delta, compatibility-label, activation-budget, and
# rollback/quarantine corpus.
#
# Stable case ids for the install_review_record every install / update
# review surface (install-review sheet, permission inspector, support-
# export row, claim-manifest entry, release-evidence packet, object-
# handoff packet) emits. Later marketplace, mirror, private-registry,
# and extension-manager surfaces should cite these ids instead of
# minting per-surface install language, silent transitive-permission
# growth, or ambiguous "unavailable" chips.
#
# This manifest is the companion roster for
# docs/verification/install_review_packet.md. If the two disagree, the
# packet doc wins for reviewer language and the frozen taxonomies
# (docs/runtime/target_discovery_and_install_review_taxonomy.md,
# docs/adr/0012-extension-manifest-permission-publisher-policy.md,
# docs/adr/0011-capability-lifecycle-and-dependency-markers.md) win for
# tooling.
#
# Rules:
#   - Every row MUST cite one install_review_subject_class token and
#     one install_review_disposition_class token from the frozen
#     ADR-0012 vocabulary. Silent blanks are non-conforming.
#   - Every row MUST cite one compatibility_label_state token from the
#     frozen vocabulary and, when the label is a downgrade, at least
#     one downgrade reason from the frozen downgrade-reason vocabulary.
#   - Every row MUST cite one activation_budget_class token; managed-
#     workspace rows MAY NOT cite not_applicable.
#   - Every row MUST cite one rollback_posture_class token and one
#     quarantine_posture_class token. A row may quote both at once.
#   - Every row MUST cite one catalog_truth_state token; mirror and
#     offline-bundle rows MUST cite a non-null catalog_snapshot_revision_ref.
#   - Adding a case id is additive-minor. Repurposing an id is
#     breaking and requires a new decision row in
#     artifacts/governance/decision_index.yaml.

schema_version: 1
