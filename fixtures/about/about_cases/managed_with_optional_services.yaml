__fixture__:
  name: managed_with_optional_services
  scenario: >
    Stable desktop build connected to the first-party managed control
    plane with the optional managed AI provider and optional managed
    symbol service active for the workflow. The card auto-narrows from
    a declared 'fully_open_local' posture to
    'managed_with_optional_services' because optional managed services
    are active.
  linked_docs:
    - docs/about/about_provenance_and_boundary_contract.md
    - schemas/about/about_card.schema.json

