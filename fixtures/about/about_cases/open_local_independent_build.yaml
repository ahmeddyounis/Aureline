__fixture__:
  name: open_local_independent_build
  scenario: >
    Stable open-source desktop build running locally with no managed or
    optional services active. Signature, attestation, and SBOM are
    verified, no advisories are open for the running build, and the
    community-handoff block names the public issue tracker, public RFC
    forum, private security channel, and private support channel.
  linked_docs:
    - docs/about/about_provenance_and_boundary_contract.md
    - schemas/about/about_card.schema.json
    - docs/governance/issue_routing_matrix.md
    - docs/build/exact_build_identity_model.md

