  channel_class: stable
  build_id: build:release.stable.2_1_0
  running_build_identity_ref: build_identity:desktop.linux.x86_64.air_gapped.2_1_0
  exact_build_identity_ref: exact_build:desktop.linux.x86_64.air_gapped.2_1_0
  tree_state_class: clean_checkout
