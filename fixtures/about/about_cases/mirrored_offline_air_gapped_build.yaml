# yaml-language-server: $schema=../../../schemas/about/about_card.schema.json
__fixture__:
  name: mirrored_offline_air_gapped_build
  scenario: >
    Air-gapped customer running the official desktop build delivered
    through their own offline-bundle import. The mirrored_offline row
    is active with current freshness, no managed or optional service is
    enabled, and the community-handoff block surfaces both public and
    private lanes despite running offline.
  linked_docs:
    - docs/about/about_provenance_and_boundary_contract.md
    - docs/governance/post_install_notice_and_provenance_contract.md
    - docs/governance/issue_routing_matrix.md

about_card_schema_version: 1
record_kind: about_card_record
card_id: about_card:desktop.air_gapped.stable_2_1_0
emitted_at: "2026-04-29T18:38:00Z"
card_summary: >
  Air-gapped customer-mirror build 2.1.0. Mirrored official offline
  posture is active with current freshness; no managed or optional
  services are enabled.
