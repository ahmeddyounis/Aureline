openness_boundary:
  - row_id: about_openness_row:open_local.client_binary
    row_class: open_local
    row_label: Local desktop binary
    openness_class: open_source_local_independent
    service_dependency_class: none
    active_for_workflow: true
    evidence_refs:
      - artifacts/governance/deployment_profiles.yaml
    boundary_disclosure: >
      The desktop binary itself is open-source and runs locally; no
      service dependency is required.
  - row_id: about_openness_row:self_hosted.none_active
    row_class: self_hosted
    row_label: Customer-operated services
    openness_class: not_applicable
    service_dependency_class: none
    active_for_workflow: false
    evidence_refs:
      - artifacts/governance/deployment_profiles.yaml
    boundary_disclosure: >
      No customer-operated services are configured for this air-gapped
      profile beyond the offline mirror itself.
  - row_id: about_openness_row:managed_cloud.forbidden
    row_class: managed_cloud
    row_label: Managed cloud services
    openness_class: not_applicable
    service_dependency_class: none
    active_for_workflow: false
    evidence_refs:
      - artifacts/governance/residual_dependencies.yaml
    boundary_disclosure: >
      Managed cloud services are forbidden in the air-gapped profile.
  - row_id: about_openness_row:mirrored_offline.active
    row_class: mirrored_offline
    row_label: Customer offline mirror
    openness_class: mirrored_official_offline
    service_dependency_class: required
    active_for_workflow: true
    evidence_refs:
      - artifacts/governance/deployment_profiles.yaml
      - manual_import_receipt:enterprise.offline.2026_04_28
    boundary_disclosure: >
      The build is delivered through the customer-operated offline
      mirror; the mirror preserves the official origin identity.
  - row_id: about_openness_row:optional_service.forbidden
    row_class: optional_service
    row_label: Optional add-on services
    openness_class: not_applicable
    service_dependency_class: none
    active_for_workflow: false
    evidence_refs:
      - artifacts/governance/residual_dependencies.yaml
    boundary_disclosure: >
      Optional managed add-ons are forbidden in the air-gapped profile
      and are not enabled.
active_openness_claim: mirrored_official_only
declared_openness_claim: mirrored_official_only
active_narrowing_reasons: []
auto_narrowed: false
community_handoff:
  - row_id: about_handoff_row:public_issue_tracker.oss_bug
    route_class: public_issue_tracker
    privacy_class: public
    disclosure_class: public_immediate
    public_summary_expectation: required
    redaction_class: field_safe_default
    destination_descriptor_ref: destination_descriptor:public_issue_tracker.oss_bug
    intended_for_classes:
      - oss_bug
      - perf_regression
      - docs_truth_defect
    disclosure: >
      Public issue tracker for OSS bugs that do not contain
      air-gapped tenant content. Contributors must move offline before
      filing.
  - row_id: about_handoff_row:public_rfc_forum.public_rfc
    route_class: public_rfc_forum
    privacy_class: public
    disclosure_class: public_immediate
    public_summary_expectation: required
    redaction_class: field_safe_default
    destination_descriptor_ref: destination_descriptor:public_rfc_forum.rfc_pr
    intended_for_classes:
      - public_rfc
    disclosure: >
      Public RFC pull-request lane reachable when the operator is
      offline-with-occasional-egress for review handoff.
  - row_id: about_handoff_row:private_security_channel.security_issue
    route_class: private_security_channel
    privacy_class: private_with_public_advisory
    disclosure_class: public_on_advisory
    public_summary_expectation: required
    redaction_class: security_redaction_raw_allowed_under_pgp
    destination_descriptor_ref: destination_descriptor:private_security_channel.security_intake
    intended_for_classes:
      - security_issue
    disclosure: >
      Private security intake under the published PGP key. The lane
      accepts encrypted submissions even when no live channel exists.
  - row_id: about_handoff_row:private_support_channel.regulated_support
    route_class: private_support_channel
    privacy_class: private_support_only
    disclosure_class: private_indefinite
    public_summary_expectation: forbidden
    redaction_class: support_bundle_redaction_profile
    destination_descriptor_ref: destination_descriptor:private_support_channel.support_intake_offline
    intended_for_classes:
      - supportability_escalation
    disclosure: >
      Private support intake handles regulated-environment cases that
      may carry tenant-bound content; raw uploads are never required.
  - row_id: about_handoff_row:governance_packet_queue.governance_truth
    route_class: governance_packet_queue
    privacy_class: private_with_public_summary
    disclosure_class: public_on_fix
    public_summary_expectation: required
    redaction_class: field_safe_with_route_metadata
    destination_descriptor_ref: destination_descriptor:governance_packet_queue.packet_pr
    intended_for_classes:
      - governance_truth_defect
      - protected_fitness_waiver_request
    disclosure: >
      Governance-packet queue for regulated-environment waivers and
      governance-truth defects.
