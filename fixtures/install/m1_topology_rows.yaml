      unlock_state: locked
      backend_label: Secret Service via libsecret / GNOME Keyring
      visible_failure_label: trust_store_locked
    safe_preview_posture: sanitized_metadata_only
    expected_admissible_surfaces:
      - file_open_and_edit
      - file_save_to_local_disk
      - local_search
      - local_git_read
      - local_git_write
      - support_bundle_export_local_only
      - quick_open
