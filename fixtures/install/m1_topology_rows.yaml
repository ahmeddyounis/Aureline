      forced_input:
        rewrite_trust_state_to_trusted: true
      expected_check_id: trust_policy.degraded_marker_dropped
      actionable_owner_ref: "@ahmeddyounis"
      next_action: >
        Re-confirm the managed shell's policy posture in the trust-state
        matrix; if the workspace is no longer policy-degraded, update
        both the matrix and the smoke row in the same change.

