        Re-add local_search to expected_admissible_surfaces; restricted
        recovery is not a mode that may block local search.

# Cadence guidance for the lane. The runner does not enforce cadence;
# release and CI configuration do. This is informational so reviewers
# know how often the artifact is expected to refresh.
cadence_guidance:
  per_change: >
    Re-run when artifacts/security/trust_state_matrix.yaml,
    artifacts/release/install_topology_matrix.yaml,
    artifacts/release/state_root_map.yaml,
    fixtures/auth/credential_state_cases/store_capability_matrix.yaml,
    artifacts/platform/native_trust_integration_matrix.yaml,
    artifacts/managed/local_baseline_proof.yaml, or
    artifacts/milestones/m1/dogfood_matrix.yaml change.
  nightly: >
    Run on the nightly proof-lane scheduler against this matrix; capture
    the JSON report under artifacts/milestones/m1/captures/.
