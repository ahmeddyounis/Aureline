    expected_install_mode_class: managed_deployed
    expected_channel_class: stable
    expected_side_by_side_relation_class: none
    expected_durable_state_root_refs:
      - state.per_user_configuration_root.stable
      - state.per_user_recovery_root.stable
      - state.per_user_derived_cache_root.stable
      - state.per_machine_shared_data_root.stable
      - state.per_machine_admin_policy_root.stable
    trust_state: trusted_policy_degraded
    shell_mode: managed_signed_in
    credential_store_posture:
      trust_store_class: os_keychain
      unlock_state: unlocked
      backend_label: Credential Manager / DPAPI-backed storage
    safe_preview_posture: trusted_local_active
    expected_admissible_surfaces:
      - file_open_and_edit
      - file_save_to_local_disk
      - local_search
      - local_git_read
      - local_git_write
      - support_bundle_export_local_only
      - quick_open
      - integrated_terminal_manual_open
      - shell_command_palette
      - admin_policy_read
    expected_blocked_surfaces: []
    expected_state_root_inspectable_in_diagnostics: true
    expected_channel_identity_visible: true
    expected_handler_ownership_disclosure_required: true
    claimed_profile_ids:
      - windows_11_23h2_plus_x86_64
    smoke_dimensions_covered:
      - managed_local_versus_managed_vocabulary
    named_failure_drills:
      - flip_trust_policy_to_force_drift
    failure_drill:
      drill_id: flip_trust_policy_to_force_drift
      description: >
        Rewrite the row's trust_state to "trusted" while the row still
        names admin_policy_read. The smoke must continue to enforce the
        policy-degraded floor and refuse to silently widen approvals;
        the runner asserts trust_state.allowed_only_under_policy_degraded
