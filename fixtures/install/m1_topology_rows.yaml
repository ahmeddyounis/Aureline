# Trust-policy and install-topology smoke matrix for the local-first
# dogfood rows.
#
# This file is the canonical, machine-readable seed for the unattended
# trust-policy / install-topology smoke lane. The lane proves that on
# the protected dogfood rows:
#
#   - local-first install profiles remain usable without account sign-in;
#   - state-root and channel identity are inspectable on supported
#     packaging paths without guessing from the filesystem;
#   - trust-state and policy denials surface actionable explanations
#     instead of generic errors;
#   - locked or unavailable credential stores keep local capabilities
#     reachable while pausing only the credentialed surfaces; and
#   - side-by-side channels, handler ownership, and restricted/suspicious
#     preview posture stay explicit on dogfood rows.
#
# The matrix joins already-frozen sources rather than inventing a
# parallel vocabulary. The runner under
# tests/smoke/trust_policy_install_topology/ resolves every row's
# claimed install card, durable state roots, trust state, credential
# store posture, and claimed profile against those sources and emits a
# durable JSON capture under
# artifacts/milestones/m1/captures/.
#
# Rules.
#   - Every row MUST name one stable smoke_row_id, the dogfood row it
#     inherits coverage from, the install_truth_card_id it claims, the
#     declared trust_state, the shell_mode it is asserting, and the
#     credential_store posture it exercises.
#   - Every row MUST resolve install_mode_class, channel_class,
#     side_by_side_relation_class, and durable_state_root_refs into the
#     install-topology matrix and the state-root map; mismatches are
#     non-conforming.
#   - Every row MUST keep the local-baseline admissible-surface floor
#     admitted regardless of trust state or credential posture. Trust
#     denials and policy blocks narrow only the named non-floor
#     surfaces.
#   - Every row MUST declare at least one named failure drill drawn
#     from the row's failure_drill_id_vocabulary; the drill MUST be
#     reproducible by the runner against pure data.
#   - Milestone slugs MUST NOT appear in any id, path, or description
#     field outside this header note.

schema_version: 1
status: seeded
as_of: "2026-05-11"
owner_dri: "@ahmeddyounis"

matrix_id: aureline.install.trust_policy_install_topology_smoke_matrix
overview_page: artifacts/ops/m1_install_topology_smoke_report.md

# Vocabulary reuse pointers. The runner verifies these resolve.
vocabulary_sources:
  trust_state_matrix_ref: artifacts/security/trust_state_matrix.yaml
  install_topology_matrix_ref: artifacts/release/install_topology_matrix.yaml
  state_root_map_ref: artifacts/release/state_root_map.yaml
  credential_state_capability_matrix_ref: fixtures/auth/credential_state_cases/store_capability_matrix.yaml
  claimed_profiles_ref: artifacts/platform/claimed_desktop_profiles.yaml
  native_trust_integration_matrix_ref: artifacts/platform/native_trust_integration_matrix.yaml
  local_baseline_proof_ref: artifacts/managed/local_baseline_proof.yaml
  dogfood_matrix_ref: artifacts/milestones/m1/dogfood_matrix.yaml

# Hard upstream contracts this lane projects against. The lane is not
# allowed to fork these surfaces; it only reads them and asserts truth.
hard_dependency_refs:
  - crates/aureline-shell/src/recovery/safe_mode.rs
  - crates/aureline-auth/src/credential_state/mod.rs
  - crates/aureline-auth/src/browser_callback/mod.rs
  - crates/aureline-shell/src/terminal_pane/mod.rs

# Validation lane bound to this matrix. Lane registration in the proof
# index points at the same QE lane.
validation_lane_ref: artifacts/qe/test_lane_registry.yaml#fixture_repo_integration

# Frozen vocabulary echoed for the runner. These slices stay aligned
# with the canonical sources above.
shell_mode_vocabulary:
  - local_first_no_account
  - managed_signed_in
  - managed_with_local_byok_ai

credential_store_unlock_state_vocabulary:
  - locked
  - unlocking
  - unlocked
  - step_up_required
  - degraded_session_only
  - unavailable

denial_reason_class_vocabulary:
  - blocked_pending_trust
  - quarantine_denied
  - degraded_preview_only
  - approval_required_per_invocation
  - trust_store_locked
  - trust_store_unavailable
  - policy_denied_egress
  - safe_mode_workspace_restricted

safe_preview_posture_vocabulary:
  - sanitized_metadata_only
  - trusted_local_active
  - blocked_pending_trust

failure_drill_id_vocabulary:
  - flip_topology_truth_to_force_drift
  - flip_trust_policy_to_force_drift
  - drop_local_baseline_floor_surface
  - drop_state_root_inspectable_disclosure

# Closed list of admissible surface ids the runner accepts on every
# row. Surfaces not in this list are not allowed to appear in the
# expected_admissible_surfaces or expected_blocked_surfaces blocks.
admissible_surface_class_vocabulary:
  - file_open_and_edit
  - file_save_to_local_disk
  - local_search
  - local_git_read
  - local_git_write
  - support_bundle_export_local_only
  - quick_open
  - integrated_terminal_manual_open
  - integrated_terminal_repo_recipe_launch
  - tasks_run
  - debug_launch
  - notebook_kernel_connect
  - notebook_cell_execute
  - notebook_rich_output_render
  - extension_activation
  - extension_install
  - environment_activator_run
  - scaffold_template_run
  - connected_provider_open
  - connected_provider_tool_call
  - remote_attach
  - mcp_server_launch
  - shell_command_palette
  - admin_policy_read

# Local-baseline floor that MUST remain admitted on every row regardless
# of trust state or credential posture (re-exported from the local-
# baseline proof artifact). The runner refuses to admit a row whose
# expected_blocked_surfaces overlaps the floor.
local_baseline_admissible_surface_floor:
  - file_open_and_edit
  - file_save_to_local_disk
  - local_search
  - local_git_read
  - support_bundle_export_local_only

# Required dimension coverage. Every dimension MUST be exercised by at
# least one row; missing coverage is a lane failure.
required_smoke_dimension_coverage:
  - local_first_no_account_entry
  - managed_local_versus_managed_vocabulary
  - locked_or_unavailable_credential_store
  - policy_blocked_action
  - side_by_side_channels
  - portable_no_host_mutation
  - safe_mode_or_restricted_preview

smoke_dimension_class_vocabulary:
  - local_first_no_account_entry
  - managed_local_versus_managed_vocabulary
  - locked_or_unavailable_credential_store
  - policy_blocked_action
  - side_by_side_channels
  - portable_no_host_mutation
  - safe_mode_or_restricted_preview

# Smoke rows. Each row pins one (install_truth_card_id, trust_state,
# credential_store_posture, shell_mode) tuple plus the dogfood row it
# inherits coverage from. The runner refuses unknown vocabulary, missing
# install cards, missing state-roots, and trust-state mismatches.
rows:
  - smoke_row_id: aureline.install.smoke.local_first_no_account_per_user_stable_macos
    title: Local-first per-user-installed Stable on macOS opens and edits without sign-in
    inherited_dogfood_row_id: dogfood.fixture_repo.plain_text_notes
    install_truth_card_id: card.macos.universal_binary.per_user_installed.stable
    expected_install_mode_class: per_user_installed
    expected_channel_class: stable
    expected_side_by_side_relation_class: stable_and_preview
    expected_durable_state_root_refs:
      - state.per_user_configuration_root.stable
      - state.per_user_recovery_root.stable
      - state.per_user_derived_cache_root.stable
      - state.per_user_keychain_or_secret_store.stable
    trust_state: trusted
    shell_mode: local_first_no_account
    credential_store_posture:
      trust_store_class: os_keychain
      unlock_state: unlocked
      backend_label: Keychain Services
    safe_preview_posture: trusted_local_active
    expected_admissible_surfaces:
      - file_open_and_edit
      - file_save_to_local_disk
      - local_search
      - local_git_read
      - local_git_write
      - support_bundle_export_local_only
      - quick_open
      - integrated_terminal_manual_open
      - shell_command_palette
    expected_blocked_surfaces: []
    expected_state_root_inspectable_in_diagnostics: true
    expected_channel_identity_visible: true
    expected_handler_ownership_disclosure_required: true
    claimed_profile_ids:
      - macos_15_plus_universal
    smoke_dimensions_covered:
      - local_first_no_account_entry
    named_failure_drills:
      - flip_topology_truth_to_force_drift
    failure_drill:
      drill_id: flip_topology_truth_to_force_drift
      description: >
        Rewrite the row's expected_install_mode_class to "portable" while
        the install_truth_card resolves to per_user_installed. The smoke
        runner must surface install_topology.install_mode_class.mismatch
        with an actionable owner pointer instead of treating the row as
        passing.
      forced_input:
        rewrite_expected_install_mode_class: portable
      expected_check_id: install_topology.install_mode_class.mismatch
      actionable_owner_ref: "@ahmeddyounis"
      next_action: >
        Re-run the smoke lane after re-aligning the row's
        expected_install_mode_class with the install_truth_card; if the
        topology truly changed, update the install-topology matrix in
        the same change.

  - smoke_row_id: aureline.install.smoke.managed_signed_in_per_machine_stable_windows
