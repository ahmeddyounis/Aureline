__fixture__:
  name: emergency_remote_degraded_read_only
  scenario: >
    A remote target has a stale allow-list value, but the resolver
    cannot verify the target because a brokered secret and package
    dependency are missing. Policy pins network egress to a managed
    allow-list, and an emergency override disables the setting until
    signed successor evidence clears it. The inspector remains honest:
    the remote row is visible as degraded read-only and the emergency
    row is the final source.
  exercised_axes:
    scopes:
      - product_default
      - workspace_setting
      - remote_target_setting
      - policy
      - emergency_override
    lock_reasons:
      - policy_locked
      - secret_required
      - missing_dependency
      - degraded_read_only
      - emergency_override
    downgrade_reasons:
      - absent_capability
      - stale_effective_read
      - degraded_read_only

