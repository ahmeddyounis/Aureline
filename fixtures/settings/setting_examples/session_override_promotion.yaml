__fixture__:
  name: session_override_promotion
  scenario: >
    The user toggles editor.word_wrap = "on" for the current session
    via the command palette. The override lives at
    session_or_command_override and wins over the user-global value.
    The effective record's source_label names the ephemeral source so
    the user can tell the value is not durable;
    control_stack.expires_at is set to the session end. A session
    override MUST NOT auto-promote to a durable scope. The fixture
    records the ephemeral state; a subsequent explicit 'Save to user
    settings' action would mint a new effective-setting record with
    resolved_scope = user_global (not shown here).
  adr_section: "Scope-broadening rule (frozen) - invariant 3 + session override never auto-promotes"
  exercised:
    scopes: [built_in_default, user_global, session_or_command_override]
    write_intent: allowed
    lock_state: unlocked
    preview_class: safe_apply

