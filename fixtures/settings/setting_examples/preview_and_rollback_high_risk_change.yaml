  name: preview_and_rollback_high_risk_change
  scenario: >
    The user proposes flipping security.network.allow_list to include
    a new outbound host at the workspace scope. The setting's
    preview_class is rollback_checkpoint_and_approval_required; the
    write intent is
    allowed_with_rollback_checkpoint_and_approval, the preview_state
    is 'presented', and last_written.rollback_checkpoint_ref points at
    the mutation-journal checkpoint the resolver will create before
    apply. An ADR-0007 approval ticket is bound to the write; the
    effective record reflects the still-current value until the user
    acknowledges the preview and approves the ticket. The fixture
    validates that the preview / rollback / approval path is typed
    all the way through, so the UI, CLI, audit stream, and support
    bundle render consistent state.
  adr_section: "Preview-class and rollback-checkpoint expectations"
