# Connected-account / provider registry seed rows for the M1 lane.
#
# This matrix is the canonical M1 truth source for the connected-account
# registry, provider descriptor, browser-handoff packet seed, and
# publish-later object-seed shapes. Each row exercises one protected
# provider-linked entry path and pins:
#
#   - a connected_account_registry_entry_record,
#   - the provider_descriptor_record it points at,
#   - the publish_later_object_seed_record set it may mint (zero or more),
#   - optionally a provider_entry_browser_handoff_packet_record (when the
#     entry's mutation_disposition_class is browser_handoff_required or
#     publish_later_required),
#   - a named failure drill with a typed expected_check_id.
#
# Conformance.
#   - Every entry conforms to
#     schemas/providers/connected_account_registry.schema.json.
#   - Every packet seed conforms to
#     schemas/providers/browser_handoff_packet.schema.json.
#   - Closed vocabularies are reused verbatim from the schemas; this
#     matrix does not fork the vocabulary.
#   - The mutation_disposition_class on the entry MUST resolve against
#     the descriptor's supported_capabilities (browser_handoff_required
#     requires supports_browser_handoff; publish_later_required requires
#     supports_publish_later; etc.).
#   - publish_later_required and browser_handoff_required entries MUST
#     cite at least one publish_later_object_seed; inspect_only entries
#     MUST cite none.
#   - The matrix covers every mutation_disposition_class plus the
#     unknown_actor_class repair-only path.

schema_version: 1
status: seeded
as_of: "2026-05-11"

matrix_id: m1_connected_provider_seed_rows
owner_dri: "@ahmeddyounis"

overview_page: docs/providers/m1_connected_provider_seed.md
registry_schema_ref: schemas/providers/connected_account_registry.schema.json
packet_schema_ref: schemas/providers/browser_handoff_packet.schema.json
connected_account_record_schema_ref: schemas/providers/connected_account_record.schema.json
publish_later_record_schema_ref: schemas/providers/publish_later_record.schema.json
integration_browser_handoff_packet_schema_ref: schemas/integration/browser_handoff_packet.schema.json
build_identity_ref: artifacts/build/build_identity.json
validation_lane_ref: artifacts/qe/test_lane_registry.yaml#fixture_repo_integration

mutation_disposition_class_vocabulary:
  - immediate_mutation_in_product
  - browser_handoff_required
  - publish_later_required
  - inspect_only_no_mutation

freshness_class_vocabulary:
  - never_observed
  - fresh
  - stale_within_window
  - expired_beyond_window

registry_entry_status_vocabulary:
  - seeded
  - live_observed
  - degraded_observed
  - unobserved_pending
  - revoked_or_disconnected

publish_later_object_class_vocabulary:
  - local_draft_only
  - queued_publish_pending
  - browser_handoff_pending
  - deferred_publish_in_queue
  - imported_read_only_snapshot

provider_actor_class_vocabulary:
  - human_account
  - installation_or_app_grant
  - delegated_user_token
  - project_scoped_grant
  - policy_injected_service_identity
  - unknown_actor_class

provider_capability_class_vocabulary:
  - supports_immediate_mutation
  - supports_browser_handoff
  - supports_publish_later
  - supports_inspect_only
  - supports_account_switch
  - supports_step_up_authenticator

failure_drill_id_vocabulary:
  - human_account_drill.disposition_not_in_descriptor_capabilities
  - install_grant_drill.publish_later_seed_missing_for_publish_later
  - delegated_credential_drill.browser_handoff_summary_missing
  - project_scoped_drill.inspect_only_seed_present
  - policy_injected_drill.publish_later_queue_item_missing
  - unknown_actor_drill.live_observed_under_unknown_actor

required_mutation_disposition_coverage:
  - immediate_mutation_in_product
  - browser_handoff_required
  - publish_later_required
  - inspect_only_no_mutation

required_actor_coverage:
  - human_account
  - installation_or_app_grant
  - delegated_user_token
  - project_scoped_grant
  - policy_injected_service_identity
  - unknown_actor_class

consumer_bindings:
  named_runtime_consumer:
    consumer_ref: docs/providers/m1_connected_provider_seed.md
    consumed_fields:
      - connected_account_registry_entry_record.mutation_disposition_class
      - connected_account_registry_entry_record.actor_scope.primary_actor_class
      - connected_account_registry_entry_record.freshness.freshness_class
      - connected_account_registry_entry_record.registry_entry_status
      - provider_descriptor_record.supported_capabilities
      - provider_entry_browser_handoff_packet_record.reason_code
      - provider_entry_browser_handoff_packet_record.expected_authority_on_destination
      - publish_later_object_seed_record.publish_later_object_class

