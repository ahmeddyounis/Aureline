__fixture__:
  name: browser_handoff_parity_object_link_anchor_round_trip
  case_id: provider_qualification.browser_handoff_parity_object_link_anchor_round_trip.v1
  scenario: >-
    A managed-admin surface (browser-only by contract) routes
    through the browser-handoff sheet for a billing-policy review.
    Source context, destination class, reason code, privacy note,
    and expected authority are disclosed on the desktop leg; the
    callback envelope returns to the typed `object_link_anchor` on
    the originating provider-linked header. A degraded alternative
    (export, inspect-only snapshot) is visible if the browser leg
    is blocked.
  exercises:
    drill_id: browser_handoff_parity_object_link_anchor_round_trip
    return_anchor_class: object_link_anchor
    parity_expectation: browser_to_desktop_returns_to_anchor_with_privacy_note
    desktop_to_browser_disclosed:
      - source_context_summary
      - destination_class_disclosed
      - reason_code_disclosed
      - privacy_or_data_loss_note
      - expected_authority_on_destination
    browser_to_desktop_disclosed:
      - return_anchor_class
      - privacy_or_data_loss_note
      - degraded_local_or_cached_alternative
cited_records:
  - kind: delegated_credential_binding_record
    fixture_ref: fixtures/providers/connected_account_cases/delegated_credential_browser_only_admin_surface.yaml
    note: >-
      Delegated credential acting on a managed-admin surface;
      `decision_class = browser_only`.
acceptance_proof:
  - claim: desktop -> browser leg discloses destination class and privacy note
    proof: >-
      The sheet names the destination class as a managed-admin
      surface and the privacy note "data leaves Aureline scope".
  - claim: browser -> desktop leg returns to object_link_anchor
    proof: >-
      The callback envelope rebinds to the typed
      `object_link_anchor` on the originating provider-linked
      header.
  - claim: degraded alternative visible on block
    proof: >-
      Export, copy, and inspect-only snapshot are available if the
      browser-handoff sheet is blocked.
