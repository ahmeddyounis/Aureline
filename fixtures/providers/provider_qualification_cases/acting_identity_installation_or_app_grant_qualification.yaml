__fixture__:
  name: acting_identity_installation_or_app_grant_qualification
  case_id: provider_qualification.acting_identity_installation_or_app_grant_qualification.v1
  scenario: >-
    An installation / app grant is the actor on a CI check-run
    rerun. The badge renders as `install_label` on every label
    surface, while the human triggerer is rendered separately. The
    effective-scope decision row carries
    `actor_class = installation_or_app_grant`; the audit-event
    payload preserves the install subject as the actor and the human
    triggerer as the metadata.
  exercises:
    drill_id: acting_identity_installation_or_app_grant_qualification
    actor_class: installation_or_app_grant
    label_class: install_label
    label_surfaces:
      - desktop_provider_badge
      - desktop_surface_header
      - desktop_notification
      - audit_event_payload
      - support_export_row
cited_records:
  - kind: installation_or_app_grant_record
    fixture_ref: fixtures/providers/connected_account_cases/installation_grant_allowed_ci_check.yaml
    note: >-
      Installation grant, badge, and decision row.
      `actor_class = installation_or_app_grant`,
      `decision_class = allowed`.
acceptance_proof:
  - claim: install-vs-human side-by-side
    proof: >-
      Badge tooltip and audit-event payload list the install subject
      as actor and the human triggerer as metadata; collapsing the
      two into a single "user" actor is rejected.
  - claim: support-export preserves both subjects
    proof: >-
      The support-export row carries `actor_class =
      installation_or_app_grant` and a separate `triggered_by_subject`
      field for the human triggerer.
