__fixture__:
  name: review_or_code_host__pull_request
  case_id: provider_qualification.review_or_code_host__pull_request.v1
  scenario: >-
    A code-host provider qualifies for the
    `review_or_code_host__pull_request` matrix row. The pull-request
    body, review-comment drafts, and merge-decision drafts author
    locally; publishing runs through `publish_now` under an approval
    ticket; complex merge-resolution actions route through the
    browser-handoff sheet with a typed `review_anchor` return; and
    sync health is `live` with the cursor current.
  exercises:
    matrix_row_id: review_or_code_host__pull_request
    provider_class: review_or_code_host
    object_class: pull_request
    inspect_support_class: full_typed_snapshot
    in_product_mutate_support_class: publish_now_supported
    browser_only_posture_class: browser_only_for_some_actions
    local_draft_support_class: supported
    publish_later_support_class: supported
    callback_or_webhook_requirement_class: required_for_authoritative_state
    mirror_or_self_host_class: self_host_supported_with_host_match
cited_records:
  - kind: connected_provider_record
    fixture_ref: fixtures/providers/provider_mode_cases/code_host_publish_now_callback_return.json
    note: >-
      Owning connected-provider record and approval-ticket /
      callback-envelope round trip for the publish_now path.
  - kind: provider_scope_resolution_result_record
    fixture_ref: fixtures/providers/connected_account_cases/human_account_link_allowed_review_publish.yaml
    note: >-
      Effective-scope resolution decision row for the human-account
      review publish.
  - kind: provider_sync_health_view_record
    fixture_ref: fixtures/providers/provider_sync_health_cases/code_host_live_mode_no_degradation.yaml
    note: >-
      Sync-health view in `live` mode with cursor current, used to
      confirm the publish_now path is reading from authoritative
      provider truth.
acceptance_proof:
  - claim: per-object honesty
    proof: >-
      The matrix row names `pull_request` only; sibling rows
      `review_or_code_host__check_run` (mutate `not_supported`) and
      `review_or_code_host__release_artifact` (`rides_release_lane`)
      keep the broader provider class honest.
  - claim: typed mutation modes
    proof: >-
      The publish_now action carries a typed approval ticket and a
      `provider_callback_envelope_record` returning to the
      `review_anchor`; raw URL launches and inline OAuth are
      forbidden.
  - claim: callback envelope round trip
    proof: >-
      The cited callback envelope dedup-keys redelivery and binds the
      return to the originating local review draft.
  - claim: support export honesty
    proof: >-
      A support bundle for this row cites the matrix row id, the
      approval ticket id, and the callback envelope id without raw
      bodies.
