__fixture__:
  name: partial_import_packet_field_qualification
  case_id: provider_qualification.partial_import_packet_field_qualification.v1
  scenario: >-
    A CI / check provider sync paginated cursor advances with a
    detected page gap. The partial-import packet names the object
    class (`check_run`), the missing count, and the freshness-floor
    ref so the partial import can never masquerade as full. The
    imported snapshot carries
    `partial_vs_full_class = bounded_partial_snapshot` and the
    `degraded_import_class = partial`; support bundle, object-
    handoff packet, and audit packet preserve the typed bound.
  exercises:
    drill_id: partial_import_packet_field_qualification
    parity_expectation: partial_import_visibly_bounded_not_authoritative
    required_fields:
      - partial_import_object_class
      - partial_import_missing_count
      - partial_import_freshness_floor_ref
    support_export_channels:
      - support_bundle
      - audit_packet
      - object_handoff_packet
cited_records:
  - kind: provider_sync_health_view_record
    fixture_ref: fixtures/providers/provider_sync_health_cases/ci_checks_partial_mode_missing_pages.yaml
    note: >-
      Sync-health view in `partial` mode with
      `missing_page_detected` and the typed degraded-import class
      `partial`.
acceptance_proof:
  - claim: typed packet fields present
    proof: >-
      The partial-import packet names the object class, missing
      count, and freshness-floor ref; rendering the partial import
      as authoritative is forbidden.
  - claim: imported snapshot is visibly bounded
    proof: >-
      The cited snapshot carries
      `partial_vs_full_class = bounded_partial_snapshot` and a
      `degraded_import_class = partial` tag everywhere it appears.
  - claim: support exports preserve the partial bound
    proof: >-
      Support bundle, object-handoff packet, and audit packet all
      preserve the partial bound and the missing count.
