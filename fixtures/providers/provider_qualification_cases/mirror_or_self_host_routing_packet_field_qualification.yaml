__fixture__:
  name: mirror_or_self_host_routing_packet_field_qualification
  case_id: provider_qualification.mirror_or_self_host_routing_packet_field_qualification.v1
  scenario: >-
    An AI provider's conversation history is routed through a
    mirror with provenance. The mirror-or-self-host routing packet
    names the typed routing class
    (`mirror_supported_with_provenance`), a reviewable provenance
    summary, and a typed `support_class_narrowing_summary` that
    narrows the marketed support class to "mirror-derived view"
    rather than authoritative integration. Every imported overlay
    is tagged with `degraded_import_class = mirror_derived`.
  exercises:
    drill_id: mirror_or_self_host_routing_packet_field_qualification
    parity_expectation: mirror_or_self_host_routing_provenance_visible
    required_fields:
      - mirror_or_self_host_routing_class
      - mirror_or_self_host_provenance_summary
      - support_class_narrowing_summary
    support_export_channels:
      - support_bundle
      - migration_note
      - admin_assisted_handoff_packet
cited_records:
  - kind: provider_sync_health_view_record
    fixture_ref: fixtures/providers/provider_sync_health_cases/ai_provider_mirror_derived_mode_offline_capture.yaml
    note: >-
      Sync-health view in `mirror_derived` mode with the typed
      degraded-import class `mirror_derived` on every imported
      overlay.
acceptance_proof:
  - claim: typed packet fields present
    proof: >-
      The routing packet names the typed routing class, a
      reviewable provenance summary, and a
      `support_class_narrowing_summary` so the broader provider-
      class claim never disguises a narrower support truth.
  - claim: degraded-import disclosure
    proof: >-
      Every imported overlay carries
      `degraded_import_class = mirror_derived`; rendering it as
      authoritative is forbidden.
  - claim: support-class narrows when evidence narrows
    proof: >-
      Migration notes and admin-assisted handoff packets cite the
      narrower support class so a reviewer reads the same wording
      a user saw.
