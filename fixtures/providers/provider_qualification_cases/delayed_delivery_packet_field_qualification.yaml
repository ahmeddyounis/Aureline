__fixture__:
  name: delayed_delivery_packet_field_qualification
  case_id: provider_qualification.delayed_delivery_packet_field_qualification.v1
  scenario: >-
    An issue / planning tracker's webhook delivery is held by
    replay-gating after a cursor lag. The delayed-delivery packet
    names the provider-event ref, the typed failure class
    (`replay_held`), and the typed retry state
    (`queued_awaiting_freshness`). The sync-health view shows
    `current_mode_class = delayed`; the toast / banner copy quotes
    the typed mode and never falls back to "sync failed".
  exercises:
    drill_id: delayed_delivery_packet_field_qualification
    parity_expectation: delayed_delivery_visible_with_typed_failure_class
    required_fields:
      - delayed_delivery_event_ref
      - delayed_delivery_failure_class
      - delayed_delivery_retry_state_class
    support_export_channels:
      - support_bundle
      - audit_packet
cited_records:
  - kind: provider_sync_health_view_record
    fixture_ref: fixtures/providers/provider_sync_health_cases/issue_planning_delayed_mode_replay_held.yaml
    note: >-
      Sync-health view in `delayed` mode with the typed failure
      class `replay_held`; cursor `cursor_lagging`.
acceptance_proof:
  - claim: typed packet fields present
    proof: >-
      The delayed-delivery packet names the provider-event ref,
      the typed failure class, and the retry state; "sync failed"
      copy is rejected.
  - claim: sync-health mode visible across surfaces
    proof: >-
      Toast, banner, detail view, CLI inspection, support export,
      and audit packet all quote the typed `delayed` mode and the
      typed failure class.
  - claim: support-class can narrow
    proof: >-
      The support bundle narrows the wider provider-class claim to
      "delayed delivery for this object scope" using the typed
      failure class; the broader provider-class claim is preserved
      separately.
