__fixture__:
  name: acting_identity_delegated_user_token_qualification
  case_id: provider_qualification.acting_identity_delegated_user_token_qualification.v1
  scenario: >-
    A delegated user token is the actor on a managed-admin surface
    (browser-only by contract). The badge renders as
    `delegated_label`; the delegating principal is visible on the
    badge tooltip and on the audit-event payload. The decision row
    carries `actor_class = delegated_user_token` with
    `decision_class = browser_only`; the surface does not silently
    fall back to `human_account` or to `publish_now`.
  exercises:
    drill_id: acting_identity_delegated_user_token_qualification
    actor_class: delegated_user_token
    label_class: delegated_label
    label_surfaces:
      - desktop_provider_badge
      - desktop_surface_header
      - desktop_notification
      - audit_event_payload
      - support_export_row
cited_records:
  - kind: delegated_credential_binding_record
    fixture_ref: fixtures/providers/connected_account_cases/delegated_credential_browser_only_admin_surface.yaml
    note: >-
      Delegated credential, badge, and decision row;
      `actor_class = delegated_user_token`,
      `decision_class = browser_only`.
acceptance_proof:
  - claim: delegated badge on every surface
    proof: >-
      Every listed label surface renders `delegated_label` with the
      delegating principal visible.
  - claim: browser-only posture preserved
    proof: >-
      The decision row pins `browser_only`; an inline publish_now
