__fixture__:
  name: ai_provider__other
  case_id: provider_qualification.ai_provider__other.v1
  scenario: >-
    An AI provider qualifies for the `ai_provider__other` matrix
    row. Conversation records import as mirror-derived snapshots
    tagged with `degraded_import_class = mirror_derived`; local
    drafts stay local; provider-side conversation settings live in
    the provider's own console.
  exercises:
    matrix_row_id: ai_provider__other
    provider_class: ai_provider
    object_class: other
    inspect_support_class: mirror_derived_only
    in_product_mutate_support_class: local_draft_only
    browser_only_posture_class: browser_only_for_some_actions
    local_draft_support_class: supported
    publish_later_support_class: not_supported
    callback_or_webhook_requirement_class: polling_only
    mirror_or_self_host_class: mirror_supported_with_provenance
cited_records:
  - kind: provider_sync_health_view_record
    fixture_ref: fixtures/providers/provider_sync_health_cases/ai_provider_mirror_derived_mode_offline_capture.yaml
    note: >-
      Sync-health view in `mirror_derived` mode with the typed
      `degraded_import_class = mirror_derived` on every imported
      overlay.
acceptance_proof:
  - claim: degraded-import disclosure
    proof: >-
      Every imported conversation snapshot carries
      `degraded_import_class = mirror_derived`; rendering as
      authoritative provider truth is forbidden.
  - claim: typed mutation modes
    proof: >-
      Provider-side conversation settings cannot be mutated in
      Aureline; the surface routes to the browser-handoff sheet for
      provider-managed actions.
  - claim: support-class narrowing
    proof: >-
      Public capability copy MUST narrow to "mirror-derived view of
      provider conversation history"; the broader "AI provider
      integration" claim is rejected without that narrowing.
