__fixture__:
  name: browser_handoff_parity_browser_unavailable_degraded_alternative
  case_id: provider_qualification.browser_handoff_parity_browser_unavailable_degraded_alternative.v1
  scenario: >-
    The system browser is unavailable on a managed workstation. The
    browser-handoff sheet does not silently retry into the browser;
    instead, it renders a typed
    `local_or_cached_alternative_record` (export, copy,
    inspect-only snapshot, queue for later) and admits a
    publish-later queue item with
    `mode_admission_reason = browser_handoff_blocked` carrying the
    correct return-anchor class for a later resume.
  exercises:
    drill_id: browser_handoff_parity_browser_unavailable_degraded_alternative
    return_anchor_class: object_link_anchor
    parity_expectation: degraded_alternative_visible_when_browser_unavailable
    desktop_to_browser_disclosed:
      - source_context_summary
      - destination_class_disclosed
      - reason_code_disclosed
      - privacy_or_data_loss_note
      - degraded_local_or_cached_alternative
cited_records:
  - kind: publish_later_queue_item_record
    fixture_ref: fixtures/providers/provider_mode_cases/issue_tracker_local_draft_offline_capture.json
    note: >-
      Publish-later queue admission with a typed
      `mode_admission_reason = offline_capture` (sibling vocabulary
      member to `browser_handoff_blocked`); the same shape applies
      when the browser is blocked.
acceptance_proof:
  - claim: degraded alternative is visible on the same sheet
    proof: >-
      The browser-handoff sheet renders the typed
      `local_or_cached_alternative_record` rather than silently
      retrying or disappearing.
  - claim: queue item carries the right admission reason
    proof: >-
      A publish-later queue item is admitted with
      `mode_admission_reason = browser_handoff_blocked` and the
      typed return-anchor class for resume.
  - claim: silent retry is forbidden
    proof: >-
      The sheet remains explicit; the action does not auto-retry
      into the system browser when connectivity returns.
