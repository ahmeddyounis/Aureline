__fixture__:
  name: acting_identity_policy_injected_service_qualification
  case_id: provider_qualification.acting_identity_policy_injected_service_qualification.v1
  scenario: >-
    A policy-injected service identity is the actor on a release
    publish. The badge renders as `policy_injected_service_label`;
    the injecting policy bundle is visible on the badge tooltip and
    the audit-event payload. The decision row carries
    `actor_class = policy_injected_service_identity` with
    `decision_class = allowed`; a policy-epoch roll between issue
    and validation re-evaluates the action rather than honoring it
    silently.
  exercises:
    drill_id: acting_identity_policy_injected_service_qualification
    actor_class: policy_injected_service_identity
    label_class: policy_injected_service_label
    label_surfaces:
      - desktop_provider_badge
      - desktop_surface_header
      - desktop_notification
      - audit_event_payload
      - support_export_row
cited_records:
  - kind: policy_injected_service_identity_record
    fixture_ref: fixtures/providers/connected_account_cases/policy_injected_service_identity_release_publish.yaml
    note: >-
      Policy-injected service identity, badge, and decision row;
      `actor_class = policy_injected_service_identity`,
      `decision_class = allowed`.
  - kind: effective_scope_invalidation_event_record
    fixture_ref: fixtures/providers/connected_account_cases/effective_scope_invalidation_policy_epoch_rolled.yaml
    note: >-
      Effective-scope invalidation event class
      `policy_epoch_rolled`; demonstrates that a policy-epoch roll
      invalidates the resolution.
acceptance_proof:
  - claim: badge and policy bundle visibility
    proof: >-
      Every label surface renders `policy_injected_service_label`
      with the injecting policy bundle visible.
  - claim: policy-epoch roll re-evaluates the action
    proof: >-
      The cited invalidation event proves the resolution is
      invalidated when the policy epoch changes.
  - claim: support-export and audit-packet preserve service identity
    proof: >-
      The support-export row and the audit packet name the service
      identity and the injecting policy bundle ref verbatim.
