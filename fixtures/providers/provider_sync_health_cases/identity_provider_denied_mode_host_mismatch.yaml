    mode after the provider returned a different canonical host
    than the connected account names. Previously-imported principal
    overlays are now labelled with a host_mismatch degraded entry
    so the rendered state does not masquerade as fresh canonical
    truth. The correlation block cites the denied event ref and
    the impacted principal overlays.
