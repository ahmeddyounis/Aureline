      - provider_sync_health_view_record
    provider_class: identity_or_enterprise_provider
    current_mode_class: denied
    failure_classes:
      - host_mismatch
    cursor_state_class: cursor_paused
    object_classes:
      - principal_subject
    blast_radius_object_classes:
      - principal_subject
    degraded_import_classes:
      - host_mismatch
    escalation_surface_classes:
      - toast_or_banner
      - detail_view
      - cli_inspection
      - support_export
      - audit_packet
    support_export_channel_classes:
      - support_bundle
      - audit_packet
      - migration_note
    redaction_class: internal_support_restricted

