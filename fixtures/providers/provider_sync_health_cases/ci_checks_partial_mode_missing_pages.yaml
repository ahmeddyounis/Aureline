    partial mode after a missing page was detected mid-stream.
    Some check runs materialised, some did not. The cursor is
    cursor_missing_page_detected, a partial degraded-import entry
    labels the impacted check-run scope, and the typed
    blast-radius row breaks down impacted vs. delayed counts so
    operators can judge the partial scope without reading raw
    logs.
  exercised:
    record_kinds:
      - provider_sync_health_view_record
    provider_class: ci_or_check_provider
    current_mode_class: partial
    failure_classes:
      - missing_page_detected
    cursor_state_class: cursor_missing_page_detected
    object_classes:
      - check_run
    blast_radius_object_classes:
      - check_run
    degraded_import_classes:
      - partial
    escalation_surface_classes:
      - toast_or_banner
      - detail_view
      - cli_inspection
      - support_export
      - audit_packet
    support_export_channel_classes:
      - support_bundle
      - audit_packet
    redaction_class: metadata_safe_default

