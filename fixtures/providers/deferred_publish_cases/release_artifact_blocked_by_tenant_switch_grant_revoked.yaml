__fixture__:
  name: release_artifact_blocked_by_tenant_switch_grant_revoked
  case_id: deferred_publish.release_artifact_blocked_by_tenant_switch_grant_revoked.v1
  scenario: >-
    A release-artifact attach is admitted at ready_for_drain on the
    artifact-registry surface, but a tenant switch invalidates the
    queue item before drain. A typed
    tenant_switched_invalidated continuity event regresses three
    dependencies (account_mapping_resolved, effective_scope_satisfied,
    rescope_completed) and the queue item parks at
    pending_admin_review. A second continuity event records the
    grant revocation that follows the tenant switch. The review
    record holds at blocked_by_actor_unknown with
    cancel_at_user_request disposition; the user is offered a
    typed export_for_admin_assisted_handoff fallback and a
    cancel_queue_item action. The serialization envelope is
    requires_repair_before_restart with restart_safe false because
    the policy-injected service identity has been re-provisioned.
  exercised:
    record_kinds:
      - deferred_publish_queue_item_record
      - deferred_publish_continuity_event_record
      - deferred_publish_review_record
    action_kind: release_artifact_attach
    mutation_mode: deferred_publish
    surface_class: artifact_registry_surface
    queue_state:
      - ready_for_drain
      - pending_admin_review
      - cancelled_by_user
    stale_target_risk_class: target_actor_scope_changed
    dependency_classes:
      - account_mapping_resolved
      - effective_scope_satisfied
      - rescope_completed
      - approval_ticket_admitted
      - consequence_preview_confirmed
    retry_backoff_class: no_retry_manual_only
    reauth_class: admin_re_authorisation_required
    rescope_class: tenant_or_org_scope_realignment_required
    serialization_format_class: requires_repair_before_restart
    continuity_event_classes:
      - tenant_switched_invalidated
      - grant_revoked_invalidated
    review_state_class: blocked_by_actor_unknown
    blocked_reason_class: waiting_actor_resolution
    review_disposition_class: cancel_at_user_request
    review_action_classes:
      - cancel_queue_item
      - export_evidence_packet
    export_or_copy_fallback_class: export_for_admin_assisted_handoff

records:
