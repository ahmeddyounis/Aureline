    serialization_format_class: inline_record_safe
    continuity_event_class: target_freshness_drift_invalidated
    review_state_class: blocked_by_freshness
    blocked_reason_class: waiting_freshness_refresh
    review_disposition_class: hold_for_target_refresh
    review_action_classes:
