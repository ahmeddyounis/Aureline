__fixture__:
  name: identity_provider_blocked_by_policy_review_pending
  case_id: provider_conflict.identity_provider_blocked_by_policy_review_pending.v1
  scenario: >-
    An identity-provider consent-grant acknowledge draft conflicts
    with a remote permission change while admin policy is being
    reviewed. The conflict review reconciles the four typed
    snapshots, names a permission_conflict signal under
    drift_source_class changed_permissions, parks at
    blocked_by_policy, and dispositions to pending while admin
    policy review completes. accept_remote_as_authoritative is
    admissible=false because the review is blocked by policy.
  exercised:
    record_kinds:
      - provider_conflict_review_record
    surface_class: identity_provider_surface
    reviewer_actor_class: admin_reviewer
    review_state_class: blocked_by_policy
    blocked_reason_class: waiting_admin_policy_review
    freshness_class: bounded_stale
    actor_drift_class: actor_unchanged
    scope_drift_class: additional_scopes_required_since_draft
    draft_state_class: draft_unchanged_since_compare
    conflict_classes:
      - permission_conflict
    diff_signal_classes:
      - permission_changed
    drift_source_classes:
      - changed_permissions
    reconcile_action_classes:
      - compare_local_with_remote
      - compare_intended_publish_with_remote
      - rebase_local_on_remote
      - edit_local_draft
      - discard_local_draft
      - export_local_draft
      - open_in_provider
      - accept_remote_as_authoritative
      - escalate_for_admin_review
    resolution_disposition_class: pending
    support_export_channel_classes:
      - audit_packet
      - object_handoff_packet

