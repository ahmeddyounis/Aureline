__fixture__:
  name: ci_check_run_permission_loss_blocked_escalate
  case_id: provider_conflict.ci_check_run_permission_loss_blocked_escalate.v1
  scenario: >-
    A check-run rerun draft conflicts with a remote permission
    change: the actor's effective scope no longer covers the
    rerun action. The conflict review reconciles the four typed
    snapshots, names a permission_conflict signal under
    drift_source_class changed_permissions and a
    status_update_conflict signal under remote_edit_since_import,
    parks the review at blocked_by_permission_loss, and
    dispositions to escalate_for_admin_review. rebase and
    accept_remote_as_authoritative are admissible=false because
    the actor cannot act on the target.
  exercised:
    record_kinds:
      - provider_conflict_review_record
    surface_class: ci_or_checks_surface
    reviewer_actor_class: human_account
    review_state_class: blocked_by_permission_loss
    blocked_reason_class: waiting_permission_repair
    freshness_class: bounded_stale
    actor_drift_class: actor_unchanged
    scope_drift_class: surplus_scopes_since_draft
    draft_state_class: draft_unchanged_since_compare
    conflict_classes:
      - permission_conflict
      - status_update_conflict
    diff_signal_classes:
      - permission_changed
      - status_update_added
    drift_source_classes:
      - changed_permissions
      - remote_edit_since_import
    reconcile_action_classes:
      - compare_local_with_remote
      - compare_intended_publish_with_remote
      - rebase_local_on_remote
      - edit_local_draft
      - discard_local_draft
      - export_local_draft
      - open_in_provider
      - accept_remote_as_authoritative
      - escalate_for_admin_review
    resolution_disposition_class: escalate_for_admin_review
    support_export_channel_classes:
      - support_bundle
      - admin_assisted_handoff_packet

