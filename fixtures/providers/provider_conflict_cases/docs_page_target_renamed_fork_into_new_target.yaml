__fixture__:
  name: docs_page_target_renamed_fork_into_new_target
  case_id: provider_conflict.docs_page_target_renamed_fork_into_new_target.v1
  scenario: >-
    A docs-portal page draft conflicts with a remote rename of
    the target page since the local draft began. The conflict
    review reconciles the four typed snapshots, names a
    target_identity_conflict signal under drift_source_class
    target_identity_drift, and resolves with fork_into_new_target
    so the local draft is forked into the new target object
    identity. rebase_local_on_remote is admissible=false because
    target_identity_conflict is present.
  exercised:
    record_kinds:
      - provider_conflict_review_record
    surface_class: docs_or_portal_surface
    reviewer_actor_class: human_account
    review_state_class: resolved_with_fork_into_new_target
    blocked_reason_class: none
    freshness_class: bounded_stale
    actor_drift_class: actor_unchanged
    scope_drift_class: scope_unchanged
    draft_state_class: draft_unchanged_since_compare
    conflict_classes:
      - target_identity_conflict
      - text_conflict
    diff_signal_classes:
      - target_renamed
      - text_diff
    drift_source_classes:
      - target_identity_drift
      - remote_edit_since_import
    reconcile_action_classes:
      - compare_local_with_remote
      - compare_intended_publish_with_remote
      - rebase_local_on_remote
      - edit_local_draft
      - discard_local_draft
      - export_local_draft
      - open_in_provider
      - fork_into_new_target
      - escalate_for_admin_review
    resolution_disposition_class: fork_into_new_target
    support_export_channel_classes:
      - support_bundle
      - migration_note

