__fixture__:
  name: issue_review_metadata_conflict_edit_local_then_review_again
  case_id: provider_conflict.issue_review_metadata_conflict_edit_local_then_review_again.v1
  scenario: >-
    An issue update draft conflicts with remote review-metadata
    edits (assignees, labels, milestone) since the local draft
    began. The conflict review reconciles the four typed
    snapshots, names a structured_field_conflict and a
    review_metadata_conflict signal pair under drift_source_class
    remote_edit_since_import, and resolves with
    edit_local_then_review_again so the user can hand-merge the
    metadata before re-reviewing.
  exercised:
    record_kinds:
      - provider_conflict_review_record
    surface_class: issue_or_planning_surface
    reviewer_actor_class: human_account
    review_state_class: resolved_with_edit_local
    blocked_reason_class: none
    freshness_class: bounded_stale
    actor_drift_class: actor_unchanged
    scope_drift_class: scope_unchanged
    draft_state_class: draft_modified_since_compare
    conflict_classes:
      - structured_field_conflict
      - review_metadata_conflict
    diff_signal_classes:
      - structured_field_change
      - review_metadata_change
    drift_source_classes:
      - remote_edit_since_import
    reconcile_action_classes:
      - compare_local_with_remote
      - compare_intended_publish_with_remote
      - rebase_local_on_remote
      - edit_local_draft
      - discard_local_draft
      - export_local_draft
      - open_in_provider
      - accept_remote_as_authoritative
      - escalate_for_admin_review
    resolution_disposition_class: edit_local_then_review_again
    support_export_channel_classes:
      - support_bundle

