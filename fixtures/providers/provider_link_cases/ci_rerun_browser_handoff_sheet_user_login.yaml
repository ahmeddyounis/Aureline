    originating_browser_handoff_packet_ref: bhp:ci_provider.rerun:check_run:9912:0001
    originating_provider_link_header_ref: header:ci_provider:check_run:9912:rerun
    connected_provider_record_id: conn_prov:ci.aureline:install:aureline-ci
    actor_class: human_account
    actor_subject: human:ahmeddyounis@ci.aureline
    destination_class: ci_provider_web
    reason_code: publish_requires_browser_auth
    privacy_or_data_loss_consequence_class: requires_provider_login_session
    policy_epoch: policy-epoch:42
    trust_state: trusted
    redaction_class: metadata_safe_default
