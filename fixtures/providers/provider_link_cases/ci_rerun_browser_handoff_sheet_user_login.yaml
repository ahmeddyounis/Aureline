__fixture__:
  name: ci_rerun_browser_handoff_sheet_user_login
  case_id: provider_link.ci_rerun_browser_handoff_sheet_user_login.v1
  scenario: >-
    A CI rerun cannot be triggered in-product because the provider
    requires the user to authenticate in a system browser session
    first. The system mints a browser-handoff sheet rather than a
    generic "Open in browser" affordance: destination class
    ci_provider_web, reason code publish_requires_browser_auth,
    privacy-or-data-loss consequence requires_provider_login_session,
    expected authority human_account, return anchor pointing at the
    originating CI surface, replay posture single_use, replay expiry
    ten minutes from mint, and a typed local-or-cached alternative
    offering deferral to the publish-later queue. Both the sheet and
    its alternative are emitted; the sheet is initially in
    ready_for_user_confirmation and the audit-event record fires
    browser_handoff_sheet_minted.
  exercised:
    record_kinds:
      - browser_handoff_sheet_record
      - local_or_cached_alternative_record
      - browser_handoff_sheet_audit_event_record
    destination_class: ci_provider_web
    reason_code: publish_requires_browser_auth
    privacy_or_data_loss_consequence_class: requires_provider_login_session
    expected_authority_on_destination: human_account
    replay_posture: single_use
    sheet_state_class: ready_for_user_confirmation
    alternative_class: defer_to_publish_later_queue
    sheet_audit_event_id: browser_handoff_sheet_minted
records:
  - record_kind: browser_handoff_sheet_record
    browser_handoff_sheet_schema_version: 1
    sheet_id: sheet:ci_provider:rerun:check_run:9912:0001
    originating_browser_handoff_packet_ref: bhp:ci_provider.rerun:check_run:9912:0001
    originating_provider_link_header_ref: header:ci_provider:check_run:9912:rerun
    connected_provider_record_id: conn_prov:ci.aureline:install:aureline-ci
    destination_class: ci_provider_web
    destination_summary: >-
      ci.aureline run 9912 rerun page — the CI provider requires you
      to confirm the rerun in a browser session.
    destination_object_identity:
      object_class: check_run
      provider_side_id: ci.aureline:run:9912
      provider_host: ci.aureline
      tenant_or_org_scope: aureline
    reason_code: publish_requires_browser_auth
    reason_summary: >-
      Rerunning this check run requires browser authentication on the
      CI provider; the in-product rerun affordance is not available
      under the current grant.
    privacy_or_data_loss_consequence_class: requires_provider_login_session
    privacy_or_data_loss_consequence_summary: >-
      You will sign in to ci.aureline in your system browser; the CI
      provider will see your browser session, your IP, and the run
      identifier you are reruning.
    expected_authority_on_destination: human_account
    expected_authority_summary: >-
      You will be acting as your human account
      (ahmedyounis@ci.aureline) on the destination, not as the
      aureline-ci install grant.
    return_anchor:
      anchor_kind: header_anchor
      anchor_ref: header:ci_provider:check_run:9912:rerun
    replay_posture: single_use
    replay_expires_at: "2026-04-30T09:10:00Z"
    local_or_cached_alternative_refs:
      - alternative:ci_provider:rerun:check_run:9912:defer_publish_later:0001
    approval_ticket_ref: ticket:ci_rerun:check_run:9912:0001
    sheet_state_class: ready_for_user_confirmation
    policy_context:
      policy_epoch: policy-epoch:42
      trust_state: trusted
      execution_context_id: execution-context:ci_provider.rerun:check_run:9912:0001
    minted_at: "2026-04-30T09:00:00Z"
    redaction_class: metadata_safe_default
    sheet_summary: >-
      ci_provider_web · publish_requires_browser_auth · requires
      provider login session · expected authority: you
      (ahmedyounis@ci.aureline) · return to header:ci_provider:check_run:9912:rerun
      · single_use, expires 09:10. Alternative offered: defer to
      publish-later queue.

  - record_kind: local_or_cached_alternative_record
    browser_handoff_sheet_schema_version: 1
    alternative_id: alternative:ci_provider:rerun:check_run:9912:defer_publish_later:0001
    originating_sheet_ref: sheet:ci_provider:rerun:check_run:9912:0001
    alternative_class: defer_to_publish_later_queue
    alternative_summary: >-
      Defer the rerun: admit a publish-later queue item that will
      drain through the typed approval ticket once the browser session
      is available; the queue item carries the rerun consequence
      preview and the originating header anchor.
    linked_record_ref: queue:ci_rerun:check_run:9912:browser_handoff_blocked:0001
    redaction_class: metadata_safe_default

  - record_kind: browser_handoff_sheet_audit_event_record
    browser_handoff_sheet_schema_version: 1
    sheet_audit_event_id: browser_handoff_sheet_minted
    event_time: "2026-04-30T09:00:00Z"
