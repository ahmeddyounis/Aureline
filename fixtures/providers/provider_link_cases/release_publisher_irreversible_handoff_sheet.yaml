__fixture__:
  name: release_publisher_irreversible_handoff_sheet
  case_id: provider_link.release_publisher_irreversible_handoff_sheet.v1
  scenario: >-
    Publishing a release through the release-publisher provider is an
    irreversible_external_publish action. The system mints a browser-
    handoff sheet rather than a generic "Open in browser" affordance:
    destination class release_publisher_web, reason code
    publish_requires_browser_auth, consequence
    irreversible_external_publish (replay posture single_use is
    enforced by schema), expected authority policy_injected_service_
    identity (the policy-injected release publisher), return anchor
    pointing at the originating header, and a typed local-or-cached
    alternative offering admin-assisted handoff so a privileged actor
    can complete the publish out-of-band if the user does not want to
    confirm it now. The user confirms the sheet and the audit event
    fires browser_handoff_sheet_user_confirmed.
  exercised:
    record_kinds:
      - browser_handoff_sheet_record
      - local_or_cached_alternative_record
      - browser_handoff_sheet_audit_event_record
    destination_class: release_publisher_web
    reason_code: publish_requires_browser_auth
    privacy_or_data_loss_consequence_class: irreversible_external_publish
    expected_authority_on_destination: policy_injected_service_identity
    replay_posture: single_use
    sheet_state_class: user_confirmed_pending_launch
    alternative_class: request_admin_assisted_handoff
    sheet_audit_event_id: browser_handoff_sheet_user_confirmed
records:
  - record_kind: browser_handoff_sheet_record
    browser_handoff_sheet_schema_version: 1
    sheet_id: sheet:release_publisher:release:v0.42.0:0001
    originating_browser_handoff_packet_ref: bhp:release_publisher.release:v0.42.0:0001
    originating_provider_link_header_ref: header:release_publisher:release:v0.42.0:publish
    connected_provider_record_id: conn_prov:releases.aureline:policy_injected:release-publisher
    destination_class: release_publisher_web
    destination_summary: >-
      releases.aureline release publisher — the v0.42.0 release will
      be published authoritatively when you confirm in the browser.
    destination_object_identity:
      object_class: release_artifact
      provider_side_id: releases.aureline:release:v0.42.0
      provider_host: releases.aureline
      tenant_or_org_scope: aureline
    reason_code: publish_requires_browser_auth
    reason_summary: >-
      The release-publisher provider requires browser authentication
      under the policy-injected release-publisher service identity to
      authorise irreversible publish.
    privacy_or_data_loss_consequence_class: irreversible_external_publish
    privacy_or_data_loss_consequence_summary: >-
      Publishing v0.42.0 is irreversible: once the publisher confirms,
      the release is announced to subscribers and cannot be retracted
      without a typed compensating release.
    expected_authority_on_destination: policy_injected_service_identity
    expected_authority_summary: >-
      You will be acting as the policy-injected
      release-publisher@policy-epoch:42 service identity on the
      destination; not as your human account.
    return_anchor:
      anchor_kind: header_anchor
      anchor_ref: header:release_publisher:release:v0.42.0:publish
    replay_posture: single_use
    replay_expires_at: "2026-04-30T09:15:00Z"
    local_or_cached_alternative_refs:
      - alternative:release_publisher:release:v0.42.0:admin_assisted:0001
    approval_ticket_ref: ticket:release_publish:v0.42.0:0001
    sheet_state_class: user_confirmed_pending_launch
    policy_context:
      policy_epoch: policy-epoch:42
      trust_state: trusted
      execution_context_id: execution-context:release_publisher.release:v0.42.0:0001
    minted_at: "2026-04-30T09:00:00Z"
    redaction_class: signing_evidence_only
    sheet_summary: >-
      release_publisher_web · publish_requires_browser_auth ·
      irreversible_external_publish · expected authority:
      policy_injected_service release-publisher@policy-epoch:42 ·
      single_use, expires 09:15 · alternative offered: request
      admin-assisted handoff.

  - record_kind: local_or_cached_alternative_record
    browser_handoff_sheet_schema_version: 1
    alternative_id: alternative:release_publisher:release:v0.42.0:admin_assisted:0001
    originating_sheet_ref: sheet:release_publisher:release:v0.42.0:0001
    alternative_class: request_admin_assisted_handoff
    alternative_summary: >-
      Hand the typed sheet to the release-admin queue so a privileged
      release admin can confirm the publish out-of-band; the typed
      sheet (not a raw URL) is what the admin sees.
    linked_record_ref: admin_queue:release_admin:release:v0.42.0:0001
    repair_hook_ref: repair-hook:request-admin-assisted-handoff:release-admin
    redaction_class: signing_evidence_only

  - record_kind: browser_handoff_sheet_audit_event_record
    browser_handoff_sheet_schema_version: 1
    sheet_audit_event_id: browser_handoff_sheet_user_confirmed
    event_time: "2026-04-30T09:01:30Z"
    originating_sheet_ref: sheet:release_publisher:release:v0.42.0:0001
    originating_browser_handoff_packet_ref: bhp:release_publisher.release:v0.42.0:0001
    originating_provider_link_header_ref: header:release_publisher:release:v0.42.0:publish
    connected_provider_record_id: conn_prov:releases.aureline:policy_injected:release-publisher
    actor_class: policy_injected_service_identity
    actor_subject: policy_injected:release-publisher@policy-epoch:42
    destination_class: release_publisher_web
    reason_code: publish_requires_browser_auth
    privacy_or_data_loss_consequence_class: irreversible_external_publish
    policy_epoch: policy-epoch:42
    trust_state: trusted
    redaction_class: signing_evidence_only
