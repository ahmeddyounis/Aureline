cases:
  - file: canonical_packet.yaml
    kind: positive
    expectation: validates_cleanly
    note: >-
      Canonical seeded M5 hold/retention truth packet. Mirrors
      aureline-records::m5_records_policy::seeded_m5_records_policy_packet and is
      asserted equal to it by the crate's
      checked_in_canonical_fixture_matches_seeded_packet test. Exercises every
      legal-hold status (active, indeterminate, cleared), every hold scope, and
      the blocked_by_hold / policy_retained / outside_platform_scope /
      manual_local_capture_required / not_found / omitted_by_redaction pre-action
      outcomes across the eight governed M5 artifact families.
