doc_ref: docs/governance/m5_exception_expiry.md
artifact_ref: artifacts/governance/m5_exception_expiry.md
cases:
  - file: canonical_packet.yaml
    kind: positive
    expectation: validates_cleanly
    note: >-
      Canonical seeded M5 exception/expiry packet. Mirrors
      aureline-policy::m5_exception_expiry::seeded_m5_exception_expiry_packet and
      is asserted equal to it by the crate's
      checked_in_canonical_fixture_matches_seeded_packet test. Covers the AI
      evidence retention waiver, the companion read-only hold review, the sync
      mirror litigation hold, and the offboarding retention-floor remembered
      decision. Every row pins the full actor/object/target/policy-epoch/
      environment scope, carries an explicit expiry and review target, records
      its approval-history lineage with a consistent current state, lists the
      reapproval triggers that revalidate it on drift, and asserts it is bounded
      by an expiry and never widens authority. These rows project into exact
      exception request sheets, approval-history rows, expiry banners, and
      remembered-decision revalidation outcomes that re-review on actor, object,
      target, policy-epoch, or environment drift or on a lapsed expiry.
