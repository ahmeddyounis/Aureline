schema_ref: schemas/governance/m5_policy_impact_simulation.schema.json
doc_ref: docs/governance/m5_policy_impact_simulation.md
artifact_ref: artifacts/governance/m5_policy_impact_simulation.md
cases:
  - file: canonical_packet.yaml
    kind: positive
    expectation: validates_cleanly
    note: >-
      Canonical seeded M5 policy-impact simulation packet. Mirrors
      aureline-records::m5_policy_simulation::seeded_m5_policy_simulation_packet
      and is asserted equal to it by the crate's
      checked_in_canonical_fixture_matches_seeded_packet test. Compares the
      current versus a draft M5 records policy across the eight governed
      artifact families: it exercises changed and unchanged delete/export
      actions, impacted-object summaries that reuse the runtime record classes,
      every expiry effect class (unchanged, extended, shortened, introduced),
      and the completed_to_policy_retained and export_to_omitted_by_redaction
      downgrade paths, while keeping local-only families from claiming any
      managed hold, export, or delete in the draft.
