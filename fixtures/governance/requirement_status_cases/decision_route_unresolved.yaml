  scenario: >
    Foundations milestone-close snapshot held by a single row whose
    decision route is unresolved: the requirement is recognised but
    no forum can be named for the next decision and the accountable
    role does not resolve through the ownership matrix. The row
    renders fail with blocker_class = decision_route_unresolved,
    decision_route_status_class = no_forum_named_degraded, and the
    parent posture is milestone_close_blocked_decision_route_unresolved
    so 'at risk' without a named forum cannot collapse into 'go'.
  contract_sections:
    - "§4 Requirement-state vocabulary"
    - "§5 Blocker-state grammar"
    - "§6 Ownership and decision-route status"
    - "§9 Milestone-close posture"

