__fixture__:
  name: deferred_and_out_of_scope_rows
  scenario: >
    Foundations milestone-close snapshot covering one deferred row
    (an enterprise-tenant onboarding requirement pushed to the
    first-beta milestone) and one out-of-scope row (a feature-train
    rollout preview explicitly excluded by a decision-register
    decision). Both rows remain visible on every consuming surface
    next to the deferral / out-of-scope decisions; the milestone-
    close posture renders as milestone_close_with_named_narrowing
    because every narrowed row is cited.
  contract_sections:
    - "§4 Requirement-state vocabulary"
    - "§7 Narrowing-link grammar"
    - "§9 Milestone-close posture"
    - "§10 Export parity"

