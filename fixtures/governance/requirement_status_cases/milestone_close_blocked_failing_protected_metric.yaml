__fixture__:
  name: milestone_close_blocked_failing_protected_metric
  scenario: >
    Foundations milestone-close snapshot held by a single fail row
    on a protected fitness function. Save-pipeline floor regressed
    on the air-gapped lab profile; the most recent benchmark
    capture is failing; the performance-council card is open and
    nearing its deadline. The milestone-close posture renders as
    milestone_close_blocked because at least one required row is
    in fail with no active waiver and no narrowing in flight.
  contract_sections:
    - "§4 Requirement-state vocabulary"
    - "§5 Blocker-state grammar"
    - "§9 Milestone-close posture"
    - "§10 Export parity"

