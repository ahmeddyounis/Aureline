__fixture__:
  name: foundations_milestone_close_with_named_narrowing
  scenario: >
    Foundations milestone-close snapshot covering five
    representative requirement rows: a clean pass on the renderer
    architecture invariant, a fail on a protected fitness-function
    threshold that has aged out evidence, an integrated-only row on
    the package topology that is gated behind a flag and therefore
    cannot collapse into pass, a narrowed row on the AI broker
    egress class pinned to a known-limit note and a claim row, and
    a waived row on the support drill family riding on a single-
    maintainer-backup waiver. The milestone-close posture renders
    as milestone_close_with_named_narrowing because the rollups
    cite at least one narrowed row but no row is in fail or
    decision_route_unresolved.
  contract_sections:
    - "§2 Snapshot shape"
    - "§3 Requirement-status row shape"
    - "§4 Requirement-state vocabulary"
    - "§5 Blocker-state grammar"
    - "§6 Ownership and decision-route status"
    - "§7 Narrowing-link grammar"
    - "§8 Evidence-link summary and rollups"
    - "§9 Milestone-close posture"
    - "§10 Export parity"

