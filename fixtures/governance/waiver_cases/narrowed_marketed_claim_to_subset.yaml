    Architecture-council waiver covering AI-broker egress against the
    managed-cloud profile was resolved on 2026-04-25 by narrowing the
    marketed claim to the air-gapped and self-hosted archetypes only.
    The register entry pins register_status_class =
    register_narrowed_claim_published, claim_scope_narrowing_class =
    marketed_public_claim_narrowed, decision_history[] cites the
    narrow_claim decision (sponsor = security_trust_review, evidence
    = claim_narrowing_disclosure_evidence), and the linked_claim_or_
    support_impact_refs[] carry both the affected claim row and the
    public proof row that render the narrowed scope.
  contract_sections:
