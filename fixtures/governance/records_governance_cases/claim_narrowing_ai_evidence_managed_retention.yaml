__fixture__:
  name: claim_narrowing_ai_evidence_managed_retention
  scenario: >
    Ad-hoc review window after the AI retained evidence packet
    moves under a tenant-managed retention floor when AI broker
    parity is enabled. The marketed public claim that AI retained
    evidence is "user-controlled and never retained off-device" is
    narrowed to "user-controlled by default; tenant-managed
    retention applies when the AI broker parity profile is enabled."
    The narrowing is published through the claim manifest and the
    public-proof index. The packet is published with the
    public-proof-safe audience so the public claim manifest renders
    only audience-safe summaries and marketed-claim narrowings.
  contract_sections:
    - "§2 Packet shape"
    - "§3 Packet-window vocabulary"
    - "§4 Audience vocabulary"
    - "§5 Redaction-profile vocabulary"
    - "§6 Record-class registry diff"
    - "§7 Retention and legal-hold policy diff"
    - "§11 Linked artifact families"
    - "§12 Change-significance rules"
    - "§13 Consuming-surface parity"

