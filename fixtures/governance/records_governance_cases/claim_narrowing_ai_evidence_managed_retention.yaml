    tenant_legal_hold is admissible.

retention_and_legal_hold_policy_diff:
  retention_matrix_changes:
    - matrix_row_ref: tenant_ai_retained_evidence_managed_archive
      changed_matrix_axis_class:
        - default_retention
        - policy_owner
        - partial_blockers
      before_summary: >
        Managed AI evidence archive followed user-trigger retention
        with no policy floor and policy owner = end_user.
      after_summary: >
        Managed AI evidence archive follows policy-trigger retention
        under a tenant retention floor; policy owner = tenant_admin
        and partial_blockers includes legal_hold.
      change_significance_class: claim_narrowing
      linked_record_class_refs:
        - ai_retained_evidence_packet
  legal_hold_posture_changes: []
  policy_diff_summary: >
    Tenant AI retained evidence archive picks up a tenant-managed
    retention floor and a tenant-admin policy owner; the marketed
    public claim narrows because the user-controlled retention
    promise no longer holds when AI broker parity is enabled.

