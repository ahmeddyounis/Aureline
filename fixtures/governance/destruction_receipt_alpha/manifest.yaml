schema_version: 1
contract_ref: docs/governance/archive_search_destruction_alpha.md
archive_boundary_contract_ref: artifacts/governance/archive_redaction_boundary_alpha.yaml
destruction_receipt_schema_ref: schemas/governance/destruction_receipt_alpha.schema.json
cases:
  - fixture: support_bundle_completed.yaml
    receipt_state: available
    result_class: completed
    covers:
      - durable_receipt_available
      - full_scope_destroyed
      - no_mirror_lag
  - fixture: usage_export_partial_policy_retained.yaml
    receipt_state: available
    result_class: partial
    covers:
      - durable_receipt_available
      - retained_subset_listed
      - local_export_copy_disclosed
  - fixture: collaboration_archive_blocked_by_hold.yaml
    receipt_state: pending_after_hold_clear
    result_class: blocked_by_hold
    covers:
      - no_completion_claim
      - skipped_held_refs_listed
      - hold_verifier_listed
  - fixture: policy_history_retained.yaml
    receipt_state: pending_policy_floor
    result_class: policy_retained
    covers:
      - retained_refs_listed
      - policy_floor_named
      - no_execution_time_claimed
  - fixture: provider_audit_outside_scope.yaml
    receipt_state: not_available_outside_scope
    result_class: outside_platform_scope
    covers:
      - outside_scope_refs_listed
      - provider_origin_boundary_named
      - no_platform_receipt_claimed
  - fixture: local_workspace_manual_capture_required.yaml
    receipt_state: manual_local_action_required
    result_class: manual_local_capture_required
    covers:
      - local_only_refs_listed
      - manual_capture_required
      - no_remote_delete_claimed
  - fixture: redacted_secret_omitted.yaml
    receipt_state: omitted_by_redaction
    result_class: omitted_by_redaction
    covers:
      - omitted_refs_listed
      - redaction_verifier_listed
      - raw_secret_material_absent
