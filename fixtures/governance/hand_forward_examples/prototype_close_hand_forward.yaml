__fixture__:
  name: prototype_close_hand_forward
  scenario: >
    Prototype milestone-close packet showing how dogfood-scope
    artifacts hand forward to alpha. Includes a worked deferral on the
    accessibility-input launch-wedge row to show how a row may sit in
    intentionally_deferred_with_packet without blocking milestone
    close, while a still-open dogfood verification corpus row blocks
    close until refreshed.
  contract_sections:
    - rows.prototype.program_product
    - rows.prototype.ux_design
    - rows.prototype.engineering_architecture
    - rows.prototype.quality_security_accessibility_release
    - rows.prototype.docs_devrel_support
    - overlay.prototype
  linked_docs:
    - docs/governance/cross_functional_deliverable_ledger.md
    - artifacts/governance/milestone_deliverable_ledger.yaml
    - artifacts/governance/externalization_overlay.yaml

record_kind: hand_forward_case
schema_version: 1

fixture_id: prototype_close_hand_forward
producing_milestone: prototype
consumer_milestone: alpha

ledger_rows_closed:
  - ledger_row_id: prototype.program_product.cutline_and_scorecard
    owner_lane_category: program_product
    expected_hand_forward_status: delivered_to_consumer
    handed_forward_artifact:
      canonical_location: artifacts/milestones/
      evidence_id: prototype_scorecard.v1
      cited_by_consumer:
        - alpha.program_product.launch_wedge_claim_manifest
    notes: >
      Prototype scorecard names which protected lanes carry forward
      at full velocity to alpha and which narrow.

  - ledger_row_id: prototype.ux_design.dogfood_design_packets
    owner_lane_category: ux_design
    expected_hand_forward_status: delivered_to_consumer
    handed_forward_artifact:
      canonical_location: artifacts/milestones/
      evidence_id: prototype_dogfood_design_packets.v1
      cited_by_consumer:
        - alpha.ux_design.launch_wedge_design_evidence
    notes: >
      Dogfood-class design packets hand forward to alpha launch-wedge
      design pack; alpha extends, does not re-seed.

  - ledger_row_id: prototype.engineering_architecture.editor_dogfood_truth
    owner_lane_category: engineering_architecture
    expected_hand_forward_status: delivered_to_consumer
    handed_forward_artifact:
      canonical_location: artifacts/governance/stable_surface_inventory.yaml
      evidence_id: editor_dogfood_truth.v1
      cited_by_consumer:
        - alpha.engineering_architecture.launch_wedge_contracts
    notes: >
      Editor-truth packet anchors the alpha launch-wedge contracts;
      surfaces not covered at prototype cannot widen at alpha without
      an exception packet.

  - ledger_row_id: prototype.docs_devrel_support.dogfood_runbook
    owner_lane_category: docs_devrel_support
    expected_hand_forward_status: delivered_to_consumer
    handed_forward_artifact:
      canonical_location: docs/release/shiproom_runbook.md
      evidence_id: dogfood_runbook.v1
      cited_by_consumer:
        - alpha.docs_devrel_support.alpha_release_packet
        - alpha.docs_devrel_support.support_window_statement_alpha
    notes: >
      Runbook anchors the alpha release packet and the alpha support-
      window statement.

  - ledger_row_id: prototype.docs_devrel_support.help_about_truth_prototype
    owner_lane_category: docs_devrel_support
    expected_hand_forward_status: delivered_to_consumer
    handed_forward_artifact:
      canonical_location: docs/help/
      evidence_id: help_about_truth_prototype.v1
      cited_by_consumer:
        - alpha.help_about_launch_wedge
    notes: >
      Help/About wired to manifest at prototype; alpha extends to
      launch-wedge truth without re-architecting the surface.

ledger_rows_blocked:
  - ledger_row_id: prototype.qsar.dogfood_corpus
    owner_lane_category: quality_security_accessibility_release
    actual_hand_forward_status: drafted_pending_review
    expected_hand_forward_status: delivered_to_consumer
    blocking_rule_id: no_silent_function_skip
    blocking_reason: >
      Dogfood verification corpus has draft results but the
      protected-metric row for search query latency has not been
      reviewed at the foundations hardware row. Alpha launch-wedge
      benchmark publication cannot inherit the comparability disclosure
      until the draft is reviewed.
    remediation:
      action: complete_review_and_freshen
      next_status: delivered_to_consumer
      owner: "@ahmeddyounis"
    notes: >
      Worked example of a row that blocks milestone close: prototype
      cannot transition to closed_green until this corpus row reaches
      delivered_to_consumer.

ledger_rows_intentionally_deferred:
  - ledger_row_id: alpha.engineering_architecture.launch_wedge_contracts
    owner_lane_category: engineering_architecture
    actual_hand_forward_status: not_yet_started
    expected_hand_forward_status: not_yet_started
    deferral_packet_ref: null
    notes: >
      Alpha-producing rows are not handed forward at prototype close;
      they are not blocking. Listed here only to make the rule that
      alpha rows are not in scope at prototype close explicit.

# ---- Externalization-overlay rows asserted closed ---------------------------
overlay_rows_closed:
  - overlay_row_id: prototype.help_about_truth
    overlay_class: help_about_truth_prototype
    expected_hand_forward_status: delivered_to_consumer
    cited_by_consumer:
      - alpha.help_about_launch_wedge
    notes: >
      Help/About truth prototype anchors the alpha extension.

  - overlay_row_id: prototype.support_window_dogfood
    overlay_class: support_window_statement
    expected_hand_forward_status: delivered_to_consumer
    cited_by_consumer:
      - alpha.support_window_statement_alpha
    notes: >
      Dogfood-only support-window posture is the parent record; alpha
      extends visibility to external testers.

  - overlay_row_id: prototype.boundary_manifest_dogfood
    overlay_class: boundary_manifest
    expected_hand_forward_status: delivered_to_consumer
    cited_by_consumer:
      - alpha.help_about_launch_wedge
    notes: >
      Dogfood boundary manifest is reused at alpha as the launch-wedge
      manifest's parent.

# ---- Hand-forward rule assertions -------------------------------------------
hand_forward_rule_assertions:
  - rule_id: no_silent_function_skip
    expected: fail
    failing_rows:
      - prototype.qsar.dogfood_corpus
    notes: >
      One QSAR row remains in drafted_pending_review; the rule fails
      until the row is reviewed and refreshed.

  - rule_id: deferral_requires_packet
    expected: pass
    notes: >
      No prototype row uses intentionally_deferred_with_packet;
      foundations and prototype-producing rows that are still open are
      blocked, not deferred.

  - rule_id: consumer_blocks_on_missing_evidence
    expected: hold
    notes: >
      Alpha cannot begin claim-bearing benchmark publication work
      until prototype.qsar.dogfood_corpus is delivered.

  - rule_id: freshness_floor_carries_forward
    expected: pass
    notes: >
      No delivered row has gone stale at hand-forward; the rule holds.

  - rule_id: public_proof_overlay_is_first_class
    expected: pass
    notes: >
      All three prototype overlay rows (help/About, support-window,
      boundary manifest) are delivered.

  - rule_id: scorecard_and_handoff_consume_verbatim
    expected: pass
    notes: >
      Prototype scorecard cites ledger_row_id verbatim; the alpha
      handoff packet cites the same ids.

milestone_close_decision:
  scorecard_status: open
  blocked_by:
    - prototype.qsar.dogfood_corpus
  consumer_open_decision:
    consumer_milestone: alpha
    permitted_to_open: false
    rationale: >
      Alpha cannot open under a defensible launch-wedge cutline until
      the dogfood verification corpus row is reviewed and freshened.
      The blocked row is named explicitly so the milestone-close gate
      is mechanical rather than rhetorical.
