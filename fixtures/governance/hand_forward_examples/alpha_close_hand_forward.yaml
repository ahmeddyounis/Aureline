__fixture__:
  name: alpha_close_hand_forward
  scenario: >
    Alpha milestone-close packet showing how launch-wedge artifacts
    flow forward to first_beta. Demonstrates the externalization
    overlay carrying its full weight: benchmark publication,
    certified-archetype publication, support-window statement, and
    public-proof bundle are all first-class deliverables and all gate
    milestone close. Includes a worked
    intentionally_deferred_with_packet row to show the mechanism.
  contract_sections:
    - rows.alpha.program_product
    - rows.alpha.ux_design
    - rows.alpha.engineering_architecture
    - rows.alpha.quality_security_accessibility_release
    - rows.alpha.docs_devrel_support
    - overlay.alpha
  linked_docs:
    - docs/governance/cross_functional_deliverable_ledger.md
    - artifacts/governance/milestone_deliverable_ledger.yaml
    - artifacts/governance/externalization_overlay.yaml

record_kind: hand_forward_case
schema_version: 1

fixture_id: alpha_close_hand_forward
producing_milestone: alpha
consumer_milestone: first_beta

ledger_rows_closed:
  - ledger_row_id: alpha.program_product.launch_wedge_claim_manifest
    owner_lane_category: program_product
    expected_hand_forward_status: delivered_to_consumer
    handed_forward_artifact:
      canonical_location: artifacts/governance/claim_manifest_seed.yaml
      evidence_id: alpha_claim_manifest.v1
      cited_by_consumer: []
    notes: >
      First_beta hardening cannot widen the public claim surface
      without starting from this manifest verbatim.

  - ledger_row_id: alpha.ux_design.launch_wedge_design_evidence
    owner_lane_category: ux_design
    expected_hand_forward_status: delivered_to_consumer
    handed_forward_artifact:
      canonical_location: artifacts/milestones/
      evidence_id: alpha_launch_wedge_design.v1
      cited_by_consumer: []
    notes: >
      Trust-labeling kit and wedge design packets ground the first_beta
      hardening pass; widening into new wedges is exception-required.

  - ledger_row_id: alpha.engineering_architecture.launch_wedge_contracts
    owner_lane_category: engineering_architecture
    expected_hand_forward_status: delivered_to_consumer
    handed_forward_artifact:
      canonical_location: artifacts/governance/stable_surface_inventory.yaml
      evidence_id: alpha_launch_wedge_contracts.v1
      cited_by_consumer: []
    notes: >
      Surfaces named here become stable-bearing candidates at
      first_beta freeze.

  - ledger_row_id: alpha.qsar.launch_wedge_benchmark_publication
    owner_lane_category: quality_security_accessibility_release
    expected_hand_forward_status: delivered_to_consumer
    handed_forward_artifact:
      canonical_location: artifacts/release/
      evidence_id: alpha_benchmark_publication.v1
      cited_by_consumer: []
    notes: >
      First public performance bars; comparability disclosure cites
      foundations.qsar.benchmark_lab_seed verbatim.

  - ledger_row_id: alpha.qsar.compatibility_archetype_alpha
    owner_lane_category: quality_security_accessibility_release
    expected_hand_forward_status: delivered_to_consumer
    handed_forward_artifact:
      canonical_location: artifacts/governance/compatibility_surfaces.yaml
      evidence_id: alpha_certified_archetype.v1
      cited_by_consumer: []
    notes: >
      Certified-archetype report covers the launch-wedge personas;
      stable-bearing surfaces inherit from this publication.

  - ledger_row_id: alpha.docs_devrel_support.alpha_release_packet
    owner_lane_category: docs_devrel_support
    expected_hand_forward_status: delivered_to_consumer
    handed_forward_artifact:
      canonical_location: artifacts/release/
      evidence_id: alpha_release_packet.v1
      cited_by_consumer: []
    notes: >
      Release packet bundles the claim manifest, docs/state and
      docs/release entries, known-limit notice, support-packet
      bindings, and exact-build identity for the alpha release.

ledger_rows_intentionally_deferred:
  - ledger_row_id: alpha.docs_devrel_support.support_window_statement_alpha
    owner_lane_category: docs_devrel_support
    actual_hand_forward_status: intentionally_deferred_with_packet
    expected_hand_forward_status: intentionally_deferred_with_packet
    deferral_packet_ref: artifacts/release/alpha_support_window_descoping_packet.yaml
    notes: >
      Worked example of an intentional deferral. The alpha team
      published the alpha release without an extended-support window
      statement; instead, the release packet ships with a narrowed
      support posture (community-only) explicitly cited in a
      descoping packet plus an updated cutline row. First_beta MUST
      restore the full support-window statement before it may close
      green.

# ---- Externalization-overlay rows asserted closed ---------------------------
overlay_rows_closed:
  - overlay_row_id: alpha.help_about_launch_wedge
    overlay_class: help_about_truth_prototype
    expected_hand_forward_status: delivered_to_consumer
    cited_by_consumer: []
    notes: >
      Help/About now reflects launch-wedge truth: claim manifest rows,
      benchmark citations, archetype citations, and known-limit notice.

  - overlay_row_id: alpha.benchmark_publication_launch_wedge
    overlay_class: benchmark_publication
    expected_hand_forward_status: delivered_to_consumer
    cited_by_consumer: []
    notes: >
      First public benchmark bars; cited by help/About and the alpha
      release packet.

  - overlay_row_id: alpha.compatibility_publication_launch_wedge
    overlay_class: compatibility_publication
    expected_hand_forward_status: delivered_to_consumer
    cited_by_consumer: []
    notes: >
      Certified-archetype publication; first_beta inherits without
      inventing parallel archetype ids.

  - overlay_row_id: alpha.release_notice_alpha
    overlay_class: release_notice_pack
    expected_hand_forward_status: delivered_to_consumer
    cited_by_consumer: []
    notes: >
      First public release notice on a non-dogfood scope; later
      notices extend rather than re-seed the schema.

  - overlay_row_id: alpha.public_proof_bundle_alpha
    overlay_class: public_proof_bundle
    expected_hand_forward_status: delivered_to_consumer
    cited_by_consumer: []
    notes: >
      Reproducibility bundle accompanying benchmark and archetype
      publications; first_beta hardening cannot inherit alpha bars
      without it.

overlay_rows_intentionally_deferred:
  - overlay_row_id: alpha.support_window_statement_alpha
    overlay_class: support_window_statement
    actual_hand_forward_status: intentionally_deferred_with_packet
    deferral_packet_ref: artifacts/release/alpha_support_window_descoping_packet.yaml
    notes: >
      Mirrors the deferred ledger row. Externalization-overlay
      tooling treats this deferral as accepted only because the
      packet is on file and the cutline row was updated; otherwise
      missing overlay rows fail the same milestone-close gate as
      missing ledger rows.

# ---- Hand-forward rule assertions -------------------------------------------
hand_forward_rule_assertions:
  - rule_id: no_silent_function_skip
    expected: pass
    notes: >
      Every owner-lane category has at least one row in
      delivered_to_consumer; the deferred row is paired with a packet
      and cutline update.

  - rule_id: deferral_requires_packet
    expected: pass
    notes: >
      The deferred support-window statement cites a descoping packet
      and an updated cutline row.

  - rule_id: consumer_blocks_on_missing_evidence
    expected: pass
    notes: >
      First_beta hardening can begin on every alpha-delivered row;
      it must restore the deferred support-window statement before
      it can close green.

  - rule_id: freshness_floor_carries_forward
    expected: pass
    notes: >
      Weekly-cadence rows (benchmark publication, public-proof bundle)
      are within the ceiling at hand-forward.

  - rule_id: public_proof_overlay_is_first_class
    expected: pass
    notes: >
      All five primary alpha overlay rows (help/About, benchmark,
      compatibility, release notice, public-proof bundle) are
      delivered. The deferred support-window row is paired with a
      packet so the rule remains mechanically satisfied.

  - rule_id: scorecard_and_handoff_consume_verbatim
    expected: pass
    notes: >
      Alpha scorecard, the alpha-to-first_beta handoff packet, and
      the public release notice cite the same ledger and overlay row
      ids.

milestone_close_decision:
  scorecard_status: closed_yellow
  blocked_by: []
  closed_yellow_rationale: >
    Alpha closes yellow rather than green to make the deferred
    support-window statement visible. Closing green would hide the
    intentional deferral; closing yellow keeps it on the board until
    first_beta restores the full statement.
  consumer_open_decision:
    consumer_milestone: first_beta
    permitted_to_open: true
    rationale: >
      Every required hand-forward row resolved to either
      delivered_to_consumer or intentionally_deferred_with_packet;
      first_beta may open with the explicit obligation to restore the
      deferred support-window statement.
