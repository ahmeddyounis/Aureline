__fixture__:
  name: delete_blocked_by_hold
  scenario: >
    A user requests deletion of a support bundle and linked AI evidence
    summary, but a legal hold blocks destruction of the managed support
    copy. The summary uses Legal hold and never reports the held data as
    successfully deleted.
  acceptance_refs:
    - delete blocked by hold fixture
    - held data cannot masquerade as deletion
    - stable delete state reuse

