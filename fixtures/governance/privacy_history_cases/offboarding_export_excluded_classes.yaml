__fixture__:
  name: offboarding_export_excluded_classes
  scenario: >
    An admin prepares an offboarding export that includes profiles,
    settings, usage aggregates, and redacted AI evidence summaries, but
    excludes secret material, regenerable caches, and unsynced local
    history that requires manual device capture.
  acceptance_refs:
    - offboarding export with excluded classes
    - export/delete vocabulary reuse
    - AI memory-class resolution
    - remaining local artifacts

