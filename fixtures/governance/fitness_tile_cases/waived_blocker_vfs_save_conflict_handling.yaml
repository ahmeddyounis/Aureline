__fixture__:
  name: waived_blocker_vfs_save_conflict_handling
  scenario: >
    The VFS save / conflict-handling fitness function
    (ff.vfs_save_conflict_handling) is at boolean-gate threshold and
    one of the conflict-outcome rows is in breach on the air-gapped
    lab profile. Rather than block the foundations release, the
    performance council issued an active waiver expiring 2026-06-30
    naming the held release condition. The tile renders waived with
    the waiver authority, the waiver ref, and the future expiry; the
    mitigation class is fixed to waiver_holds_release_until_expiry. The
    waived failure does NOT collapse into a clean pass on any consuming
    surface; release packets, claim manifests, and support exports
    quote the waiver envelope verbatim.
  contract_sections:
    - "§3 State grammar"
    - "§7 Waiver envelope"
    - "§9 Visual and export parity"

