__fixture__:
  name: provisional_row_command_parity
  scenario: >
    The command-graph parity fitness function (ff.command_parity) is a
    provisional row in the catalog. Its data source is
    to_be_wired_by_benchmark_council and no evidence packet has been
    captured. The tile renders passing with evidence_freshness_class
    not_applicable_provisional, the to_be_set_by_benchmark_council
    threshold-mode placeholder, and the
    provisional_no_action_until_seeded mitigation class. The tile
    reserves the id so consuming surfaces render the provisional state
    explicitly rather than treating absence of evidence as a fresh
    pass.
  contract_sections:
    - "§3 State grammar"
    - "§4 Threshold snapshot"
    - "§5 Evidence freshness"

