__fixture__:
  name: fresh_pass_input_to_paint
  scenario: >
    The protected input-to-paint fitness function (ff.input_to_paint) is
    rendered as a passing tile on a fresh benchmark publication packet
    captured against the reference-laptop profile and the protected
    interaction-safety corpus. Threshold p50 / p95 are met; mitigation
    class is no_mitigation_required_passing; no active waiver; no
    partial-profile gap. The tile renders identically on the dashboard,
    the scorecard, the release packet, the support export, and the
    claim manifest.
  contract_sections:
    - "§3 State grammar"
    - "§4 Threshold snapshot"
    - "§5 Evidence freshness"
    - "§9 Visual and export parity"

