__fixture__:
  name: stale_by_trigger_buffer_operations
  scenario: >
    The buffer-operations fitness function (ff.buffer_operations) is
    captured against the protected interaction-safety corpus on
    2026-04-25 with a P14D stale_after window. The packet is still
    inside its time window on 2026-04-30, but the named rerun trigger
    corpus_or_fixture_revision_changed fired between 2026-04-28 and
    2026-04-30. The tile MUST move to evidence_stale even though the
    captured_at + stale_after time window is open. Mitigation class is
    slower_path_active_until_refresh so consuming surfaces render the
    typed slower-path posture instead of retaining a fresh-pass chip.
  contract_sections:
    - "§3 State grammar"
    - "§5 Evidence freshness"
    - "§8 Mitigation notes"

