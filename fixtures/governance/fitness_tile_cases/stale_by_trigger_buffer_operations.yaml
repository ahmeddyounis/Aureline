  captured_at: "2026-04-25T08:00:00Z"
  stale_after: P14D
  expires_at: "2026-05-09T08:00:00Z"
  rerun_trigger_ref: corpus_or_fixture_revision_changed
  freshness_summary: >
    Captured 2026-04-25; the named rerun trigger
