# yaml-language-server: $schema=../../../schemas/governance/fitness_tile.schema.json
$schema: "https://aureline.dev/schemas/governance/fitness_tile.schema.json"
__fixture__:
  name: partial_profile_result_first_paint
  scenario: >
    The first-paint fitness function (ff.first_paint) is captured only
    on the macOS reference-laptop profile this milestone; the Linux
    workstation and Windows laptop rows have not yet been captured.
    The tile MUST render warning rather than passing because the
    declared profile set is broader than the captured set. The
    partial-profile class is single_profile_only, the mitigation class
    is partial_profile_result_pending_full_capture, and consuming
    surfaces render the partial-profile state alongside the threshold
    snapshot so a partial measurement cannot widen silently into a
    full-profile claim.
  contract_sections:
    - "§3 State grammar"
    - "§6 Corpus and profile identity"
    - "§9 Visual and export parity"

fitness_tile_schema_version: 1
record_kind: fitness_tile_record
tile_id: fitness_tile:first_paint.partial_profile.macos_only
fitness_function_row_ref: ff.first_paint
fitness_function_family: startup_and_first_useful_work
evaluated_at: "2026-04-30T17:00:00Z"
tile_state: warning
headline_label: "First paint — partial profile result (macOS only); Linux and Windows pending"

threshold_snapshot:
  threshold_mode_class: absolute_p50_and_p95
  threshold_label: "p50 <= TBD / p95 <= TBD (council); declared on three reference profiles"
  measured_label: "macOS p50 = 95 ms / p95 = 180 ms (Linux and Windows pending capture)"
  snapshot_summary: >
    First-paint measurements are inside the placeholder threshold band
    on the macOS profile; Linux and Windows have not been captured
    this milestone, so the result cannot be projected as a full-
    profile pass.

evidence_freshness:
  evidence_freshness_class: fresh
  evidence_packet_ref: benchmark_publication_pack:first_paint.macos_only.2026_04_29
  captured_at: "2026-04-29T13:30:00Z"
  stale_after: P14D
  expires_at: "2026-05-13T13:30:00Z"
  rerun_trigger_ref: null
  freshness_summary: >
    Captured 2026-04-29 on the macOS reference-laptop profile only;
    inside the P14D window; the partial-profile state is the reason
    for the warning, not freshness.

owner:
  primary_dri: "@ahmeddyounis"
  owning_lane: benchmark_lab
  co_owning_lane: aureline-render
  backup_owner: null
  backup_waiver_ref: single-maintainer-backup

corpus_profile_identity:
  corpus_profile_identity_class: reference_hardware
  corpus_refs:
    - corpus.workflow.startup_warm_to_first_paint
    - corpus.workflow.first_useful_edit_rust_self_host
  profile_pin_ref: reference_laptop:row.macos.m_class.universal
  partial_profile_result_class: single_profile_only
  identity_summary: >
    Captured only on the macOS reference-laptop row; the declared
    reference set also includes Linux x86_64 workstation and Windows
    laptop rows, which have not been captured this milestone.

waiver:
  waiver_authority_class: not_applicable_no_active_waiver
  active_waiver_ref: null
  previous_waiver_ref: null
  waiver_expires_on: null
  waiver_summary: >
    No active waiver. The warning is from a partial-profile gap, not
    from a held release condition.

mitigation_note:
  mitigation_note_class: partial_profile_result_pending_full_capture
  what_users_should_do: >
    Treat published first-paint wording on docs and release surfaces
    as scoped to the macOS profile until Linux and Windows captures
    land.
  what_operators_should_do: >
    aureline-render lane DRI plus benchmark-lab DRI to land the Linux
    and Windows captures and refresh the tile to passing once the
    declared profile set is fully covered.
  mitigation_summary: >
    The macOS profile is inside the threshold band; the Linux and
    Windows rows are outside the captured set; consuming surfaces
    render the partial-profile state rather than widening the macOS
    result to the full declared profile set.

linked_evidence_refs:
  - benchmark_publication_pack:first_paint.macos_only.2026_04_29
  - release_evidence_packet:foundations.startup_lane
linked_scorecard_lane_refs:
  - scorecard_lane:benchmark_lab
  - scorecard_lane:aureline-render

export_fields:
  render_on_dashboard: true
  render_on_scorecard: true
  render_on_release_packet: true
  render_on_support_export: true
  render_on_claim_manifest: true

contract_doc_ref: docs/governance/fitness_dashboard_contract.md
fitness_function_catalog_ref: artifacts/bench/fitness_function_catalog.yaml
state_rows_ref: artifacts/governance/fitness_state_rows.yaml
notes: >
  Partial-profile fixture exercising the single_profile_only class.
  Inverse of fresh_pass_input_to_paint, which is rendered against the
  full declared profile set.
