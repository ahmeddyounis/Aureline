# yaml-language-server: $schema=../../../schemas/governance/fitness_tile.schema.json
$schema: "https://aureline.dev/schemas/governance/fitness_tile.schema.json"
__fixture__:
  name: waiver_expired_first_paint
  scenario: >
    The first-paint fitness function (ff.first_paint) was previously
    held open by an active performance-council waiver that expired on
    2026-04-15 without renewal. The tile is evaluated on 2026-04-30.
    The tile MUST move to waiver_expired and MUST NOT render as
    passing on any consuming surface; the previous waiver ref and the
    expired timestamp are quoted alongside the state token. The
    mitigation class is temporarily_blocked_pending_owner_action so
    the lane DRI and the decision forum are explicit on every surface.
  contract_sections:
    - "§3 State grammar"
    - "§7 Waiver envelope"
    - "§9 Visual and export parity"

fitness_tile_schema_version: 1
record_kind: fitness_tile_record
tile_id: fitness_tile:first_paint.waiver_expired.reference_laptop
fitness_function_row_ref: ff.first_paint
fitness_function_family: startup_and_first_useful_work
evaluated_at: "2026-04-30T16:00:00Z"
tile_state: waiver_expired
headline_label: "First paint — waiver expired 2026-04-15 (performance council, not renewed)"

threshold_snapshot:
  threshold_mode_class: absolute_p50_and_p95
  threshold_label: "p50 <= TBD / p95 <= TBD (council)"
  measured_label: "p50 = 280 ms / p95 = 540 ms (in breach against the prior held threshold)"
  snapshot_summary: >
    First-paint p50 / p95 are still in breach against the prior held
    threshold; without an active waiver, the tile is no longer covered.

evidence_freshness:
  evidence_freshness_class: fresh
  evidence_packet_ref: benchmark_publication_pack:first_paint.2026_04_27
  captured_at: "2026-04-27T11:00:00Z"
  stale_after: P14D
  expires_at: "2026-05-11T11:00:00Z"
  rerun_trigger_ref: null
  freshness_summary: >
    Captured 2026-04-27; inside the P14D benchmark-publication window;
    no rerun trigger has fired. Evidence is fresh; the downgrade is
    from waiver renewal lapse, not from freshness.

owner:
  primary_dri: "@ahmeddyounis"
  owning_lane: benchmark_lab
  co_owning_lane: aureline-render
  backup_owner: null
  backup_waiver_ref: single-maintainer-backup

corpus_profile_identity:
  corpus_profile_identity_class: reference_hardware
  corpus_refs:
    - corpus.workflow.startup_warm_to_first_paint
    - corpus.workflow.first_useful_edit_rust_self_host
  profile_pin_ref: reference_laptop:row.macos.m_class.universal
  partial_profile_result_class: not_partial_full_corpus_run
  identity_summary: >
    Captured on the macOS reference-laptop row against the protected
    startup and first-useful-edit corpora.

waiver:
  waiver_authority_class: performance_council
  active_waiver_ref: null
  previous_waiver_ref: waiver:first_paint.hidden_pane_reveal_drift.2026q1
  waiver_expires_on: "2026-04-15T23:59:59Z"
  waiver_summary: >
    Performance-council waiver expired 2026-04-15 without renewal; the
    held release condition (hidden-pane reveal drift on the macOS
    reference-laptop row) is again uncovered.

mitigation_note:
  mitigation_note_class: temporarily_blocked_pending_owner_action
  what_users_should_do: >
    Treat published first-paint wording on docs and release surfaces
    as narrower than the prior threshold until the lane DRI lands a
    fix or the council renews the waiver.
  what_operators_should_do: >
    aureline-render lane DRI to land the hidden-pane reveal fix or
    request a waiver renewal from the performance council; the tile
    cannot return to passing without one of those events.
  mitigation_summary: >
    A previously waived first-paint failure is again uncovered after
    the waiver expired without renewal; consuming surfaces render the
    waiver_expired token, never a fresh-pass chip.

linked_evidence_refs:
  - benchmark_publication_pack:first_paint.2026_04_27
  - release_evidence_packet:foundations.startup_lane
linked_scorecard_lane_refs:
  - scorecard_lane:benchmark_lab
  - scorecard_lane:aureline-render

export_fields:
  render_on_dashboard: true
  render_on_scorecard: true
  render_on_release_packet: true
  render_on_support_export: true
  render_on_claim_manifest: true

contract_doc_ref: docs/governance/fitness_dashboard_contract.md
fitness_function_catalog_ref: artifacts/bench/fitness_function_catalog.yaml
state_rows_ref: artifacts/governance/fitness_state_rows.yaml
notes: >
  Waiver-renewal-lapse fixture. Inverse of waived_blocker_vfs_save_-
  conflict_handling on the same waiver vocabulary.
