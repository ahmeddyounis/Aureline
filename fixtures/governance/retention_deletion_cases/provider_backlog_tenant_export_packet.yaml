    honesty_note: The packet is mid-purge at the downstream provider and a billing-aggregate subset remains under policy retention; this request is not Delete completed.
  partial_blockers:
    - blocker_id: blocker:provider-backlog:billing-aggregate:opaque
      blocker_class: provider_backlog
      service_surface_ref: provider-purge-queue:billing-aggregate:opaque
      expected_clear_at:
        utc_instant: "2026-04-29T22:30:00Z"
        local_iso_with_offset: "2026-04-29T15:30:00-07:00"
        timezone_id: America/Los_Angeles
        source_clock_class: local_wall_clock_synchronized
      affected_matrix_row_refs:
        - tenant_entitlement_usage_export_packet
      note: Downstream provider replica purge is in flight under the documented backlog window.
    - blocker_id: blocker:policy-retention:billing-minimum
      blocker_class: policy_retention_floor
      policy_ref: artifacts/governance/record_class_registry.yaml#entitlement_usage_export_packet
      expected_clear_at: null
      affected_matrix_row_refs:
        - tenant_entitlement_usage_export_packet
      note: Billing-policy retention keeps a managed aggregate subset; this subset will be named in the destruction receipt.
  handoff_packets:
    - handoff_audience: tenant_admin
      handoff_export_class: matrix_state_only_packet
      exposes_unrelated_private_payloads: false
      redaction_profile_ref: docs/governance/storage_and_retention_vocabulary.md
      included_matrix_row_refs:
        - tenant_entitlement_usage_export_packet
      excluded_matrix_row_refs: []
      summary: Admin handoff packet conveys typed retention/delete state and matrix row id only; raw billing aggregates are not embedded.
  audit_linkage:
    privacy_history_event_refs: []
    governed_record_refs:
      - governed-record:tenant-usage-export:2026-04-cycle
    deletion_job_refs:
      - deletion-job:tenant-usage-export:2026-04-cycle
    destruction_receipt_refs: []
    support_bundle_refs: []
    export_manifest_refs:
      - export-manifest:tenant-acme:usage-export:2026-04-cycle
    policy_refs:
      - policy-bundle:tenant-acme:billing-retention
  honesty_assertions:
    held_or_retained_not_reported_destroyed: true
    raw_payloads_not_embedded: true
    remaining_location_disclosed_when_required: true
    expected_next_state_change_disclosed: true
    handoff_does_not_widen_scope: true
  notes: >
    The combination of provider_backlog and policy_retention_floor
    illustrates how an infrastructure delay and a retention floor can
    coexist on the same request without either masquerading as the
    other.
