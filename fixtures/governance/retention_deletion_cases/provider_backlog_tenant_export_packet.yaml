  remaining_location_disclosure:
    locations:
      - location_class: managed_archive_replicated_pending_purge
        matrix_row_ref: tenant_entitlement_usage_export_packet
        artifact_refs:
          - managed-archive:tenant-acme:usage-export:2026-04-cycle
        summary: The managed archive marked the packet for purge; the downstream provider replica has not yet confirmed deletion.
      - location_class: managed_archive_policy_retained
        matrix_row_ref: tenant_entitlement_usage_export_packet
        artifact_refs:
          - billing-aggregate:tenant-acme:2026-04
