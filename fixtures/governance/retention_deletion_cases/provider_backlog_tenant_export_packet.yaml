  source_ref: admin-console:tenant-acme:usage-exports
  scope:
    scope_class: organization
    scope_refs:
      - tenant:acme
      - usage-export-packet:2026-04-cycle
    matrix_row_refs:
      - tenant_entitlement_usage_export_packet
    scope_note: Scope covers a single tenant entitlement-usage export packet for the April 2026 billing cycle.
  stable_delete_state: delete_requested
  stable_state_label: Delete requested
  completion_claim: delete_requested_not_complete
  requested_at:
    utc_instant: "2026-04-29T18:30:00Z"
    local_iso_with_offset: "2026-04-29T11:30:00-07:00"
    timezone_id: America/Los_Angeles
    source_clock_class: local_wall_clock_synchronized
  updated_at:
