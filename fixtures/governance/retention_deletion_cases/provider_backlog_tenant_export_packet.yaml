__fixture__:
  name: provider_backlog_tenant_export_packet
  scenario: >
    A tenant admin issues a delete for a managed entitlement-usage
    export packet whose downstream provider has a multi-hour purge
    backlog. The local copy is removed and the managed archive marks
    the packet for purge, but the provider replica purge is still in
    flight. The request stays in Delete requested with a
    provider_backlog blocker; the remaining-location disclosure cites
    the replica that has not yet purged.
  contract_sections:
    - matrix_row:tenant_entitlement_usage_export_packet
    - delete_request_state:provider_backlog_delete
  acceptance_refs:
    - provider backlog fixture
    - typed provider_backlog partial blocker
    - managed_archive_replicated_pending_purge remaining location

matrix_row:
  retention_matrix_row_schema_version: 1
  record_kind: retention_matrix_row_record
  row_id: tenant_entitlement_usage_export_packet
  row_label: Tenant-owned entitlement and usage export packet
  ownership_class: tenant_owned
  location_class: managed_authoritative_with_local_cache
  record_class_refs:
    - entitlement_usage_export_packet
  default_retention:
    trigger_class: billing_period_close_or_policy_event
    duration_class: billing_or_contract_term
    retention_floor_present: true
    retention_ceiling_present: true
    retention_notes:
      - Managed aggregates follow finance and audit retention; a billing-period floor blocks early destruction even after a delete request is accepted.
  export_path:
    export_path_class: admin_packaged_export
    manifest_required: true
    raw_secret_excluded_required: true
    scriptable_without_support_ticket: true
    export_format_floor: csv
    documented_path_ref: docs/governance/data_portability_and_exit_matrix.md
    export_path_notes:
      - The export packet is itself the user-visible projection; raw billing payloads remain in the managed aggregate.
  delete_path:
    delete_path_class: managed_delete_with_receipt
    local_and_managed_actions_are_distinct: true
    completion_evidence: destruction_receipt_with_retained_subset
    delete_request_state_schema_ref: schemas/governance/delete_request_state.schema.json
    honors_legal_hold: true
    delete_path_notes:
      - Managed delete completes only after the downstream provider replica purge confirms; a retained-subset receipt names the policy-retained billing aggregate.
  policy_owner:
    retention_owner_class: tenant_admin
    delete_owner_class: operator_admin
    owner_notes:
      - The tenant admin owns retention policy; operator admin gates managed deletes against the billing retention floor.
  schema_notes:
    - note_kind: boundary_schema
      schema_ref: schemas/governance/delete_request_state.schema.json
      summary: Provider-backlog progress is rendered through the shared delete-request state schema.
    - note_kind: service_retention_row
      schema_ref: artifacts/service/retention_rows.yaml
      summary: The managed-service retention row pins the billing-period retention floor and provider purge expectation.
    - note_kind: deletion_job_schema
      schema_ref: schemas/service/deletion_job_record.schema.json
      summary: The managed deletion job emits a retained-subset receipt once the provider replica purge confirms.
    - note_kind: destruction_receipt_schema
      schema_ref: docs/governance/record_state_and_policy_simulation_models.md
      summary: Receipt linkage is governed by the record-state model; the retained billing subset is named explicitly.
  partial_blockers:
    - provider_backlog
    - policy_retention_floor
    - export_pending_hold
  remaining_location_classes:
    - managed_archive_replicated_pending_purge
    - managed_archive_policy_retained
    - destruction_receipt_only
  honesty_assertions:
    held_or_retained_not_reported_destroyed: true
    raw_payloads_not_embedded: true
    local_export_copy_disclosed: true
    policy_owner_named: true
  row_notes:
    - Even after the provider purge completes, a retained billing-aggregate subset remains under policy retention.

delete_request_state:
