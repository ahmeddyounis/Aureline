__fixture__:
  name: legal_hold_blocks_support_archive_delete
  scenario: >
    A user requests deletion of a managed support-bundle archive whose
    case is under an active tenant legal hold. The local copy was
    already deleted; the managed archive cannot be destroyed until the
    hold review clears. The request renders Legal hold, cites the hold
    ref, and lists the managed archive as the remaining held location.
    Held data never claims completion.
  contract_sections:
    - matrix_row:tenant_support_bundle_archive
    - delete_request_state:legal_hold_blocks_delete
  acceptance_refs:
    - legal hold fixture
    - held data cannot masquerade as deletion
    - typed legal_hold partial blocker

