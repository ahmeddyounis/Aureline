    duration_class: regenerable_cache_no_window
    retention_floor_present: false
    retention_ceiling_present: false
    retention_notes:
      - Derived caches are regenerated from primary records; no retention timer applies and no managed mirror exists.
      - Cache invalidation is immediate; the next read repopulates the cache from primary records.
  export_path:
