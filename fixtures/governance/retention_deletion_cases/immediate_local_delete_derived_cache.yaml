    local_and_managed_actions_are_distinct: false
    completion_evidence: not_applicable
    delete_request_state_schema_ref: schemas/governance/delete_request_state.schema.json
    honors_legal_hold: false
    delete_path_notes:
      - Delete invalidates the cache without producing a destruction receipt; the request reaches Delete completed in place.
  policy_owner:
    retention_owner_class: local_user
    delete_owner_class: local_user
    owner_notes:
      - The local user owns both retention and delete authority for personal derived caches.
  schema_notes:
    - note_kind: boundary_schema
      schema_ref: schemas/governance/delete_request_state.schema.json
      summary: Delete-request progress for invalidate-only caches still resolves through the shared delete-request state schema.
    - note_kind: record_class_registry
      schema_ref: artifacts/governance/record_class_registry.yaml
      summary: ai_retained_evidence_packet row anchors the underlying class-level posture this derived cache composes over.
