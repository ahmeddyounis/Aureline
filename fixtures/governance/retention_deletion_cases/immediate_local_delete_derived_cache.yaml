__fixture__:
  name: immediate_local_delete_derived_cache
  scenario: >
    A user invokes "clear AI workspace caches" from the local privacy
    settings sheet. The affected payload is a regenerable derived cache
    (embedding rows and indexed search material), so the delete is an
    invalidate-not-export action that completes in place. No managed
    copy, no hold, no remaining location, no partial blocker.
  contract_sections:
    - matrix_row:derived_cache_user_workspace
    - delete_request_state:immediate_local_delete
  acceptance_refs:
    - immediate local delete fixture
    - derived cache invalidate-only delete path
    - delete completed with no remaining location

