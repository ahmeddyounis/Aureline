  decided_at: null
  state_summary: >
    Decision pending; deadline 2026-06-15 is forty-six days out.
    The fresh capture is in flight on the benchmark lab and
    expected to land inside the review window.

escalation_route:
  escalation_path_class: escalate_to_decision_forum
  decision_forum_ref: forum:benchmark_council
  escalation_chain_role_refs:
