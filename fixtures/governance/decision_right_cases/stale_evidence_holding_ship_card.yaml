__fixture__:
  name: stale_evidence_holding_ship_card
  scenario: >
    A decision-right card on the protected fitness function
    ff.warm_start_to_first_paint is rendered as
    pending_review_within_window. The reason is
    protected_metric_threshold_change because a corpus revision
    fired the stale-by-trigger rerun trigger and the prior
    captured evidence has aged out. The required forum is
    benchmark_council with performance_council concurrence; the
    deadline is more than thirty days out so the card is
    pending_review_within_window. The companion release-truth
    summary (stale_evidence_holding_ship_summary.yaml) renders
    hold_blockers_open with a stale_evidence_count of two and
    routes the export-packet action to
    hold_publish_pending_blocker.
  contract_sections:
    - "§4 Reason-for-review vocabulary"
    - "§5 Required-forum vocabulary"
    - "§6 Decision-right state vocabulary"
    - "§8 Deadline-proximity vocabulary"
    - "§11 Reuse-class vocabulary"
    - "§12 Export parity"

decision_right_card_schema_version: 1
