$schema: "https://aureline.dev/schemas/governance/decision_right_card.schema.json"
__fixture__:
  name: pending_security_review_card
  scenario: >
    A decision-right card on the signed-pack publication egress
    class is rendered as pending security review. The reason is
    security_sensitive_egress_class_change (a contested code-
    signing chain rotation), the required forum is
    security_trust_review with shiproom concurrence required, the
    concurrence outcome is concurrence_partial_pending_remaining_roles,
    the deadline proximity is nearing_deadline_within_seven_days,
    and the card is in pending_review_nearing_deadline. The card
    is not degraded — the lane has a named forum and a named
    accountable owner — but the parent release-truth summary
    (pending_security_review_summary.yaml) renders hold_blockers_open
    because the security review has not closed.
  contract_sections:
    - "§4 Reason-for-review vocabulary"
    - "§5 Required-forum vocabulary"
    - "§6 Decision-right state vocabulary"
    - "§7 Concurrence-outcome vocabulary"
    - "§8 Deadline-proximity vocabulary"
    - "§11 Reuse-class vocabulary"

decision_right_card_schema_version: 1
record_kind: decision_right_card_record
decision_right_card_id: decision_right_card:signed_pack_publication.rotation.pending_security_review
evaluated_at: "2026-04-30T19:00:00Z"

decision_subject:
  decision_subject_class: security_sensitive_egress_class
  subject_ref: egress_class:signed_pack_publication
  lane_ref: scorecard_lane:release_evidence
  protected_path_ref: protected_path:signed_pack_publication
  headline_label: "Signed-pack publication — security review nearing deadline"
  subject_summary: >
    Security-sensitive egress class for signed-pack publication
    covering the code-signing chain, transport-trust posture, and
    supply-chain provenance gates. The lane is gated on a contested
    signing-chain rotation pending the security-and-trust review.

reason_for_review:
  reason_for_review_class: security_sensitive_egress_class_change
  reason_summary: >
    Rotating the code-signing chain from the prior CA bundle to a
    new CA bundle; the rotation alters the signed-pack publication
    egress class and requires security-and-trust review concurrence
    plus shiproom executive scope review before any new signed pack
    can ship on stable.

required_forum:
  required_forum_class: security_trust_review
  decision_forum_ref: forum:security_trust_review
  forum_summary: >
    Security-and-trust review chairs the rotation decision; the
    release council and shiproom executive scope review concur
    because the rotation blocks a stable promotion.

accountable_ownership:
  accountable_owner_role_ref: role:security_lead
  concurrence_role_refs:
    - role:release_owner
    - role:chief_architect
    - role:product_lead
  co_owner_role_refs:
    - role:supply_chain_owner
  linked_waiver_ref: null
  linked_service_ownership_card_ref: service_ownership_card:signed_pack_publication.blocked_escalated
  concurrence_outcome_class: concurrence_partial_pending_remaining_roles
  ownership_summary: >
    Security lead is accountable; the supply-chain owner co-owns
    the rotation. Release owner and chief architect have signed
    off; product lead is pending.

decision_state:
  decision_right_state_class: pending_review_nearing_deadline
  deadline_proximity_class: nearing_deadline_within_seven_days
  target_milestone_ref: milestone:stable_2_1_0_promotion
  target_due_at: "2026-05-06T17:00:00Z"
  decided_at: null
  state_summary: >
    Decision pending; deadline 2026-05-06 is six days out. The
    rotation MUST close before stable 2.1.0 can ship signed-pack
    artifacts on the new chain.

escalation_route:
  escalation_path_class: escalate_to_decision_forum
  decision_forum_ref: forum:security_trust_review
  escalation_chain_role_refs:
    - role:security_lead
    - role:release_owner
    - role:product_lead
    - role:chief_architect
  escalation_summary: >
    If product-lead concurrence does not land before 2026-05-06,
    the decision escalates to security-and-trust review with
    shiproom executive scope review concurrence required before
    any signed-pack publication can ride the new chain.

linked_evidence_refs:
