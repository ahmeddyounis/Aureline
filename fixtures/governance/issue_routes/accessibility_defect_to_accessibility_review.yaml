__fixture__:
  name: accessibility_defect_to_accessibility_review
  scenario: >
    A screen-reader user cannot reach the command-palette dialog via
    keyboard on macOS with VoiceOver in the default locale. Launch
    blocker. Report lands on the public tracker with an a11y:keyboard
    and a11y:screen-reader secondary label; accessibility review owns
    the queue and may force narrowing of launch claims.
  contract_sections:
    - issue_classes.accessibility_defect
    - escalation_paths.public_issue_tracker
  pairs_with: []

record_kind: issue_route_example
schema_version: 1

fixture_id: accessibility_defect_to_accessibility_review
issue_class: accessibility_defect
owner_dri: "@ahmeddyounis"
