__fixture__:
  name: private_partner_case_no_public_summary
  scenario: >
    A partner under a signed NDA reports a compatibility failure on
    their internal monorepo. Raw content stays on the private partner
    channel; compatibility ecosystem review owns triage. At fix time
    the owning forums decide to publish a sanitised summary without
    naming the partner; the case cites the
    private_partner_to_public_sanitised_summary transition before any
    public docs change.
  contract_sections:
    - issue_classes.private_partner_case
    - escalation_paths.private_partner_channel
    - disclosure_transitions.private_partner_to_public_sanitised_summary
  pairs_with:
    - design_partner_case_no_public_summary

record_kind: issue_route_example
schema_version: 1

fixture_id: private_partner_case_no_public_summary
issue_class: private_partner_case
owner_dri: "@ahmeddyounis"
owning_lane: governance_packets
visibility_class: internal
status: seeded

resolved_routing:
  default_route_class: private_partner_channel
  privacy_class: private_partner_only
  disclosure_class: private_indefinite
  public_summary_expectation: none
  redaction_class: partner_contractual_redaction
  owning_forum: compatibility_ecosystem_review

resolved_escalation_chain:
  primary:
    - compatibility_ecosystem_review
  topical:
    - product_scope_review
    - security_trust_review
  release_gate:
    - release_council

filing_contract:
  intake_surface: partner_contractual_channel
  required_report_fields:
    - partner_agreement_ref
    - affected_aureline_surface_id
    - repro_description_under_nda
  forbidden_report_fields:
    - partner_identifier_in_public_surface_without_consent
    - raw_partner_corpus_in_public_mirror

disclosure_transition_cited:
  transition_id: private_partner_to_public_sanitised_summary
  authorised_forum: compatibility_ecosystem_review
  authorised_roles:
    - partner_dri
    - docs_public_truth_dri
  required_records:
    - partner_written_consent_on_file
    - docs_public_truth_update_or_release_note
  required_preconditions:
    - sanitised_summary_reviewed_by_partner

consistency_rule_checks:
  - rule_ref: rule:private_class_never_silently_public
    outcome: satisfied
    evidence: >
      Move from private_partner_only to private_with_public_summary
      cites the private_partner_to_public_sanitised_summary
      transition; no silent move to public.
  - rule_ref: rule:partner_identity_requires_consent
    outcome: satisfied
    evidence: >
      Summary does not name the partner; partner_written_consent_on_file
      is recorded before publication.
  - rule_ref: rule:public_summary_forbidden_requires_transition
    outcome: satisfied
    evidence: >
      Class default public_summary_expectation is none; the sanitised
      summary is authorised by the named transition.
