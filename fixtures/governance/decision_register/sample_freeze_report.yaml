# Sample freeze report.
#
# Deterministic projection of artifacts/governance/decision_register.yaml
# using report:unresolved_past_deadline_as_narrow_scope from
# artifacts/governance/decision_defaults.yaml.
#
# This fixture answers one question: if every currently-open launch
# row reached its applies_on date without closing, what would the
# launch posture be? Every projected row carries the row's
# narrower_default.description verbatim — never "TBD" — so the
# milestone-zero review cycle can see the explicit narrow-scope
# outcome the product would default to on each freeze date.
#
# Hypothetical report_date is the day after every seeded row's
# applies_on. The projection assumes no row closed between
# 2026-04-24 (the seeded date) and the report date.

report_metadata:
  report_id: sample_freeze_report_2026_06_30
  report_date: "2026-06-30"
  source_register: artifacts/governance/decision_register.yaml
  source_defaults: artifacts/governance/decision_defaults.yaml
  projection_rule: report:unresolved_past_deadline_as_narrow_scope
  notes: >
    Generated assuming no register row closed or deferred between
    the 2026-04-24 seed date and the 2026-06-30 report date. Real
    reports regenerate this file against the current register
    state; emitting the literal string TBD is explicitly forbidden
    by report_projection_rules in decision_defaults.yaml.

unresolved_rows_past_deadline:
  - decision_id: LR-0001
    title: Launch language and framework bundle
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze the bundle to the minimum set the staffed lanes can
      defend: Rust as the sole implementation language for
      protected-path code, the existing Cargo workspace layout, no
      additional runtime languages or frameworks admitted into
      first-party crates or tooling, and no additional language
      server, compiler, or runtime promised as a launch-bearing
      first-party surface. Wider bundles reopen as a new launch
      row; they do not ride this row as hidden carry-forward.
    narrower_default_requires_approval_from: []
    auto_fires_without_approval: true
    affected_artifacts:
      - Cargo.toml
      - rust-toolchain.toml
      - artifacts/governance/package_inventory.yaml
      - artifacts/governance/standards_matrix.yaml
      - docs/governance/public_surface_truth_map.md
    scorecard_lane_refs:
      - aureline-render
      - aureline-buffer
      - aureline-vfs
      - aureline-rpc
      - aureline-text
      - governance_packets
    owner_forum: product_scope_review
    public_claim_allowed_posture: >
      Public materials may describe Aureline as a Rust-based
      desktop IDE; no additional launch-bearing languages,
      runtimes, or frameworks may be named in public copy until
      this row closes.

  - decision_id: LR-0002
    title: Deployment profiles launch set
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze the launch-bearing profile set to the five rows already
      seeded in artifacts/governance/deployment_profiles.yaml
      (desktop-local / local-first, self-hosted / sovereign,
      hybrid remote-attach, air-gapped / mirror-only, and
      managed-cloud with browser companion / handoff), and
      freeze the residual-dependency posture per profile to the
      eleven-row ledger in
      artifacts/governance/residual_dependencies.yaml.
    narrower_default_requires_approval_from: []
    auto_fires_without_approval: true
    affected_artifacts:
      - artifacts/governance/deployment_profiles.yaml
      - artifacts/governance/residual_dependencies.yaml
      - docs/governance/deployment_profile_truth.md
    scorecard_lane_refs:
      - docs_public_truth
      - governance_packets
      - release_evidence
    owner_forum: product_scope_review
    public_claim_allowed_posture: >
      Public materials may name the five frozen profiles verbatim
      from the deployment-profile register and the fail-local
      continuity rule; they may not imply a sixth profile, a
      different default home surface, or a thin-client posture
      on the desktop profile.

  - decision_id: LR-0003
    title: Open / local versus managed boundary
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze the boundary at the residual-dependency ledger
      posture: local editing, save, search, local git, tasks,
      export, diagnostics, and docs-inspect stay at
      available_local_safe with no required hosted dependency;
      every optional managed service is gated behind the
      api_capability_row contract with local_core_blocking pinned
      false and live_discovery_against_service forbidden.
    narrower_default_requires_approval_from: []
    auto_fires_without_approval: true
    affected_artifacts:
      - artifacts/governance/deployment_profiles.yaml
      - artifacts/governance/residual_dependencies.yaml
      - artifacts/service/api_surface_rows.yaml
      - openapi/service_api_seed.yaml
    scorecard_lane_refs:
      - docs_public_truth
      - governance_packets
    owner_forum: product_scope_review
    public_claim_allowed_posture: >
      Public materials may claim local-first operation and that
      managed services are optional; they may not imply that
      hosted services are prerequisites for local-core value.

  - decision_id: LR-0004
    title: Command-parity scope across palette, menubar, CLI, and automation
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze launch-bearing command-parity at the keyboard-complete
      command graph already named by D-0006 and D-0007: palette,
      menubar, CLI / headless, and the automation recipe surface
      exercise one command descriptor; AI tool-use and remote-agent
      command routing ride the same descriptor with no parallel
      action vocabulary.
    narrower_default_requires_approval_from: []
    auto_fires_without_approval: true
    affected_artifacts:
      - crates/aureline-shell-spike
      - artifacts/governance/stable_surface_inventory.yaml
      - artifacts/governance/compatibility_surfaces.yaml
    scorecard_lane_refs:
      - shell_command_system
      - accessibility_input_review
    owner_forum: product_scope_review
    public_claim_allowed_posture: >
      Public materials may claim keyboard-complete palette and
      menubar parity and a single command descriptor used by
      palette, CLI, automation, and AI tool-use; they may not
      claim parity across any other surface.

  - decision_id: LR-0005
    title: Docs and source-version publication model
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze launch docs at per-release snapshot publication bound
      to the exact build identity (one docs-pack manifest per
      signed build), with per-surface hand-maintained badges for
      docs / help / service-health and no shared source-class,
      version-match, or freshness-floor vocabulary beyond the
      D-0019 default.
    narrower_default_requires_approval_from: []
    auto_fires_without_approval: true
    affected_artifacts:
      - artifacts/governance/claim_manifest_seed.yaml
      - artifacts/governance/public_truth_parity_matrix.yaml
      - docs/governance/public_surface_truth_map.md
      - docs/governance/canonical_reference_rules.md
    scorecard_lane_refs:
      - docs_public_truth
      - release_evidence
    owner_forum: product_scope_review
    public_claim_allowed_posture: >
      Public materials may claim that docs ride the build's
      signed identity and that each release carries a docs-pack
      manifest; they may not claim a rolling docs channel or
      cross-surface freshness-floor semantics.

  - decision_id: LR-0006
    title: AI provider, model, and spend envelope
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze the AI surface to bring-your-own-key for a single
      named provider class, no managed-broker default at launch,
      no public spend / rate / capacity claim, and a local
      fallback posture that returns "AI provider cached
      last-known-good unavailable" under an explicit stale-cache
      label when the provider is unreachable.
    narrower_default_requires_approval_from: []
    auto_fires_without_approval: true
    affected_artifacts:
      - artifacts/service/api_surface_rows.yaml
      - openapi/service_api_seed.yaml
      - artifacts/governance/claim_manifest_seed.yaml
      - docs/governance/deployment_profile_truth.md
    scorecard_lane_refs:
      - governance_packets
      - docs_public_truth
      - release_evidence
    owner_forum: product_scope_review
    public_claim_allowed_posture: >
      Public materials may claim bring-your-own-key integration
      with one named provider class and local cached
      last-known-good fallback; they may not claim a managed AI
      broker, a multi-provider surface, or a numeric spend or
      rate envelope.

  - decision_id: LR-0007
    title: Exact-build identity and signing quorum
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze signing at the foundations quorum already seeded in
      artifacts/governance/signing_quorum.yaml and the
      one-build-identity rule in decision-index A-0003: a release
      bundle admits only when the official binary, docs-pack,
      schema bundle, SDK artifacts, SBOM, attestation set, symbol
      bundle, and rollback metadata cite the same build identity
      and carry quorum signatures from the named key classes.
    narrower_default_requires_approval_from:
      - release_council
    auto_fires_without_approval: false
    hold_reason: >
      Row holds at deciding until release_council meets and rules,
      per rule:narrow_holds_until_forum_signs_off. Downstream
      release-evidence work requires a freeze-exception packet to
      continue past applies_on.
    affected_artifacts:
      - artifacts/governance/signing_quorum.yaml
      - artifacts/governance/stable_surface_inventory.yaml
      - schemas/release/
      - docs/release/shiproom_runbook.md
    scorecard_lane_refs:
      - release_evidence
      - governance_packets
    owner_forum: release_council
    public_claim_allowed_posture: >
      Public materials may claim one signed build identity per
      release and a named signing quorum; they may not promise
      identity or quorum posture that the seeded row has not
      ratified.

  - decision_id: LR-0008
    title: Identity modes and offline-entitlement posture
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze identity at a single trusted mode: local-only
      identity with workspace-trust gated by the ADR-0018
      restricted-mode posture, offline-entitlement posture = no
      entitlement check required for local-core value, and no
      managed sign-in front door at launch.
    narrower_default_requires_approval_from: []
    auto_fires_without_approval: true
    affected_artifacts:
      - docs/adr/0001-identity-modes.md
      - docs/adr/0018-workspace-trust-and-restricted-mode.md
      - artifacts/service/api_surface_rows.yaml
      - artifacts/governance/stable_surface_inventory.yaml
    scorecard_lane_refs:
      - governance_packets
      - docs_public_truth
    owner_forum: security_trust_review
    public_claim_allowed_posture: >
      Public materials may claim local-only identity and that the
      desktop runs without a required sign-in; they may not claim
      organization-managed or managed sign-in modes at launch.

  - decision_id: LR-0009
    title: Route-disclosure semantics for outbound traffic
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze route disclosure at the api_capability_row contract
      already seeded in artifacts/service/api_surface_rows.yaml
      and openapi/service_api_seed.yaml: every outbound route
      resolves to one capability row with named provider,
      auth-mode, entitlement class, policy-override posture,
      data-class set, local-fallback posture, and offline / cache
      posture.
    narrower_default_requires_approval_from: []
    auto_fires_without_approval: true
    affected_artifacts:
      - artifacts/service/api_surface_rows.yaml
      - openapi/service_api_seed.yaml
      - artifacts/governance/claim_manifest_seed.yaml
      - docs/governance/public_surface_truth_map.md
    scorecard_lane_refs:
      - governance_packets
      - docs_public_truth
    owner_forum: security_trust_review
    public_claim_allowed_posture: >
      Public materials may claim that every outbound route is
      labelled and inspectable through the route-disclosure
      surface, and that AI and telemetry egress name the provider;
      they may not claim a route is opt-in if the capability row
      forbids it.

  - decision_id: LR-0010
    title: Compatibility-bridge scope
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: freeze_lane
    narrower_default_description: >
      Freeze the compatibility-bridge lane at the D-0024 seed:
      no runtime compatibility bridge ships at first beta;
      host_contract_family_unsupported_on_target and
      compatibility_bridge_required_not_present remain
      forbidden-repair denial reasons with no loader; the
      wasm/WIT host admits only the world set named in the
      ADR-0019 seed.
    narrower_default_requires_approval_from:
      - compatibility_ecosystem_review
    auto_fires_without_approval: false
    hold_reason: >
      Row holds at deciding until compatibility_ecosystem_review
      meets and rules, per rule:narrow_holds_until_forum_signs_off.
      The compatibility-bridge lane freezes on applies_on and
      dependent work attaches a freeze-exception packet or holds.
    affected_artifacts:
      - docs/adr/0019-wasm-wit-extension-host-and-capability-worlds.md
      - artifacts/compat/qualification_matrix_seed.yaml
      - artifacts/governance/compatibility_surfaces.yaml
      - wit/
    scorecard_lane_refs:
      - governance_packets
      - release_evidence
    owner_forum: compatibility_ecosystem_review
    public_claim_allowed_posture: >
      Public materials may name the admitted wasm/WIT world set
      and the forbidden-repair denial reasons; they may not claim
      runtime compatibility bridges or imply cross-archetype
      portability at launch.

  - decision_id: LR-0011
    title: Release channels and support windows
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: defer
    narrower_default_description: >
      Defer the full release-channel surface to the release-council
      ruling and narrow the first-beta channel set to two channels:
      preview and beta, with no support-window promise for earlier
      minors and no nightly or insiders claim.
    narrower_default_requires_approval_from:
      - release_council
    auto_fires_without_approval: false
    hold_reason: >
      Row holds at deciding until release_council meets and
      restates freeze_by_date, per
      rule:defer_holds_until_forum_restates_freeze.
    affected_artifacts:
      - docs/adr/0017-release-posture-artifact-families-and-promotion-gates.md
      - artifacts/governance/signing_quorum.yaml
      - docs/release/shiproom_runbook.md
      - docs/release/qualification_cadence.md
    scorecard_lane_refs:
      - release_evidence
      - governance_packets
    owner_forum: release_council
    public_claim_allowed_posture: >
      Public materials may name the preview and beta channels
      only; they may not claim nightly, insiders, stable, or a
      numeric support-window window at launch.

  - decision_id: LR-0012
    title: Benchmark, migration, and public-proof language
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze public-proof language at "no numeric benchmark,
      migration, or compatibility claim at launch"; public
      materials carry qualitative language ("works on",
      "supports", "editable offline") only, and every claim cites
      a claim-manifest row that cites current evidence.
    narrower_default_requires_approval_from:
      - product_scope_review
      - release_council
    auto_fires_without_approval: false
    hold_reason: >
      Row holds at deciding until product_scope_review and
      release_council co-sign, per
      rule:narrow_holds_until_forum_signs_off. Any public claim
      carrying numeric benchmark, migration, or compatibility
      language before sign-off is blocked.
    affected_artifacts:
      - artifacts/governance/claim_manifest_seed.yaml
      - artifacts/governance/public_truth_parity_matrix.yaml
      - docs/governance/claim_manifest_contract.md
      - docs/governance/public_surface_truth_map.md
    scorecard_lane_refs:
      - docs_public_truth
      - release_evidence
      - benchmark_lab
    owner_forum: product_scope_review
    public_claim_allowed_posture: >
      Public materials may describe what the product does
      qualitatively and cite claim-manifest rows with current
      evidence; they may not attach numeric benchmark, migration,
      or compatibility claims.

  - decision_id: LR-0013
    title: Onboarding stable scope
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze onboarding at the minimum traversable flow: open the
      app, open or clone a workspace, create a file, save, exit
      cleanly; no extension-discovery surface, no sign-in flow,
      no onboarding telemetry, and no background-task spawn on
      first run.
    narrower_default_requires_approval_from: []
    auto_fires_without_approval: true
    affected_artifacts:
      - docs/adr/0016-shell-windowing-input-accessibility-boundary.md
      - artifacts/governance/stable_surface_inventory.yaml
      - docs/governance/public_surface_truth_map.md
    scorecard_lane_refs:
      - shell_command_system
      - docs_public_truth
    owner_forum: product_scope_review
    public_claim_allowed_posture: >
      Public materials may describe the minimum traversable flow
      verbatim and note that onboarding rides no background task;
      they may not claim extension-discovery, guided tours, or
      telemetry-assisted onboarding at launch.

  - decision_id: LR-0014
    title: Theme and accessibility certification rows
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: freeze_lane
    narrower_default_description: >
      Freeze the accessibility claim to the ADR-0016 baseline:
      one default theme (no themeable token set claimed at
      launch), WCAG AA contrast on the default theme, keyboard-
      complete command graph per D-0007, screen-reader coverage
      on the semantic surface per D-0008, and no public
      certification claim beyond this set.
    narrower_default_requires_approval_from:
      - accessibility_review
    auto_fires_without_approval: false
    hold_reason: >
      Row holds at deciding until accessibility_review meets and
      rules, per rule:narrow_holds_until_forum_signs_off. The
      accessibility lane freezes and dependent rendering /
      theming work attaches a freeze-exception packet or holds.
    affected_artifacts:
      - docs/adr/0016-shell-windowing-input-accessibility-boundary.md
      - artifacts/governance/stable_surface_inventory.yaml
      - docs/governance/public_surface_truth_map.md
    scorecard_lane_refs:
      - accessibility_input_review
      - design_system_seeds
    owner_forum: accessibility_review
    public_claim_allowed_posture: >
      Public materials may claim keyboard-complete navigation,
      WCAG AA contrast on the default theme, and screen-reader
      coverage on the semantic surface; they may not claim WCAG
      AAA, themeable token sets, or additional certifications at
      launch.

  - decision_id: LR-0015
    title: Durable-attention model
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze durable attention at "no durable-attention claim at
      launch": notifications, companion pings, deferred-intent
      replays, and long-running operations are bounded by the
      user's current session and explicit user-initiated lanes;
      the product does not claim proactive assists, proactive
      notifications outside user-initiated lanes, or a persistent
      background stream.
    narrower_default_requires_approval_from: []
    auto_fires_without_approval: true
    affected_artifacts:
      - docs/automation/recipe_and_macro_contract.md
      - artifacts/governance/claim_manifest_seed.yaml
      - docs/governance/public_surface_truth_map.md
    scorecard_lane_refs:
      - governance_packets
      - docs_public_truth
    owner_forum: architecture_council
    public_claim_allowed_posture: >
      Public materials may describe user-initiated background
      operations (long-running tasks the user started, queued
      automation recipes) and bounded deferred-intent replay
      windows; they may not claim proactive assists or persistent
      background attention.

  - decision_id: LR-0016
    title: Embedded docs, webview, and auth policy
    current_state: open
    applies_on: "2026-06-29"
    narrower_default_posture: narrow
    narrower_default_description: >
      Freeze embedded-surface policy at the D-0021 baseline: only
      static or sanitized docs and help pages may render
      in-process; marketplace, account, dashboard, and auth
      surfaces open in the system browser; no embedded password
      collection; device-code or browser-return handoff is the
      only admitted auth pattern; route disclosure per LR-0009
      fires on every handoff.
    narrower_default_requires_approval_from: []
    auto_fires_without_approval: true
    affected_artifacts:
      - docs/adr/0015-embedded-surface-boundary-and-auth-handoff.md
      - artifacts/service/api_surface_rows.yaml
      - artifacts/governance/claim_manifest_seed.yaml
    scorecard_lane_refs:
      - governance_packets
      - docs_public_truth
    owner_forum: security_trust_review
    public_claim_allowed_posture: >
      Public materials may claim that auth flows ride the system
      browser, that no password collection happens in the IDE
      window, and that embedded surfaces are limited to static or
      sanitized docs / help; they may not claim embedded
      marketplace, account, or dashboard surfaces.

summary:
  total_rows_past_deadline: 16
  auto_fires_without_approval_count: 10
  holds_for_forum_sign_off_count: 6
