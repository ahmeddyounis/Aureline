# Standards adoption evidence bundle (OCI distribution).

schema_version: 1

evidence_case_id: standards_evidence.oci_distribution
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.oci_distribution

owner:
  lane: release_evidence
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.push_pull
    claim_summary: >
      Claim “OCI distribution used for artifact push/pull” (standards-based transport).
    minimum_evidence_bundle:
      - evidence_path_class: example_export_fixture
        requirement: >
          A committed reference artifact and manifest (or captured bytes) that is
          pushed/pulled through an OCI registry in conformance with the pinned spec.
        artifact_refs:
          - target/standards-evidence/oci_distribution/example_artifact_manifest.json
      - evidence_path_class: import_round_trip_fixture
        requirement: >
          A worked push → pull → digest match round-trip proof against at least one
          registry implementation, with a stated equality criterion.
        artifact_refs:
          - target/standards-evidence/oci_distribution/push_pull_round_trip_case.yaml
      - evidence_path_class: conformance_report_artifact
        requirement: >
          Release-evidence packet/report vouching for conformance for a given release train.
        artifact_refs:
          - target/standards-evidence/oci_distribution/conformance_packet.json
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned-version compatibility note naming the adopted distribution/image/artifact
          spec versions and the compatibility window.
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.oci_distribution

