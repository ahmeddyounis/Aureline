# Standards adoption evidence bundle (SARIF).

schema_version: 1

evidence_case_id: standards_evidence.sarif
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.sarif

owner:
  lane: qa_and_verification
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.export
    claim_summary: >
      Claim “exports SARIF” (standards-based export at the pinned SARIF version).
    minimum_evidence_bundle:
      - evidence_path_class: example_export_fixture
        requirement: >
          A committed SARIF log payload that represents the exported shape Aureline
          claims (including the required tool metadata and result mapping posture).
        artifact_refs:
          - target/standards-evidence/sarif/example_export.sarif.json
      - evidence_path_class: upstream_validator_harness
        requirement: >
          A validator harness that checks the committed SARIF example against the
          pinned SARIF JSON schema/version and fails closed on invalid output.
        artifact_refs:
          - target/standards-evidence/sarif/validator_report.json
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned-version compatibility note naming the SARIF version and any
          disclosed narrowing (e.g. “propertyBag-only extensions” posture).
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.sarif

  - claim_vector_id: standards_claim.import_and_export
    claim_summary: >
      Claim “imports SARIF and re-exports in SARIF shape” (round-trip parity claim).
    minimum_evidence_bundle:
      - evidence_path_class: import_round_trip_fixture
        requirement: >
          A committed round-trip fixture demonstrating parse → emit preserves the
          claimed subset (with a stated equality criterion, e.g. normalized JSON).
        artifact_refs:
          - target/standards-evidence/sarif/import_round_trip_case.yaml

