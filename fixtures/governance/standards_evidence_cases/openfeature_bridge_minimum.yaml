# Standards adoption evidence bundle (OpenFeature bridge).

schema_version: 1

evidence_case_id: standards_evidence.openfeature_bridge
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.openfeature

owner:
  lane: governance_and_policy
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.bridge_only
    claim_summary: >
      Claim “OpenFeature-shaped evaluation bridge exists (not native OpenFeature runtime)”.
    minimum_evidence_bundle:
      - evidence_path_class: bridge_disclaimer_doc
        requirement: >
          Narrative disclosure of bridge fidelity posture and the mapping between
          internal flag vocabulary and OpenFeature concepts.
        artifact_refs:
          - docs/governance/feature_flag_policy.md
          - docs/governance/policy_flag_schema_stack.md
      - evidence_path_class: example_export_fixture
        requirement: >
          A committed reference API contract (IDL/docs) for the bridge surface.
        artifact_refs:
          - target/standards-evidence/openfeature/bridge_api_snapshot.md
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned-version compatibility note naming the OpenFeature version range
          (and any admitted narrowing).
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.openfeature

