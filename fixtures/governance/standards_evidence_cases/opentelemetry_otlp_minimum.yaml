# Standards adoption evidence bundle (OpenTelemetry / OTLP).

schema_version: 1

evidence_case_id: standards_evidence.opentelemetry_otlp
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.opentelemetry

owner:
  lane: telemetry_foundation
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.bridge_only
    claim_summary: >
      The product may disclose that an OTLP-shaped export lane is reserved or
      planned, but it must not claim a live OTLP-conformant exporter.
    minimum_evidence_bundle:
      - evidence_path_class: bridge_disclaimer_doc
        requirement: >
          Narrative disclosure of what is and is not claimed for any OTLP-shaped
          export, including schema-registry narrowing constraints.
        artifact_refs:
          - docs/automation/cli_surface_contract.md
          - docs/governance/telemetry_and_support_schema_registry.md
      - evidence_path_class: compatibility_note
        requirement: >
          Pinned posture note for the reserved OTLP export (what signal set is
          intended, and what compatibility window applies once implemented).
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.opentelemetry

  - claim_vector_id: standards_claim.export
    claim_summary: >
      Claim “exports OTLP traces/metrics/logs” (standards-based export).
    minimum_evidence_bundle:
      - evidence_path_class: example_export_fixture
        requirement: >
          A committed representative OTLP export payload (or captured bytes) that
          downstream tooling can parse.
        artifact_refs:
          - target/standards-evidence/opentelemetry/otlp_export_example.bin
      - evidence_path_class: upstream_validator_harness
        requirement: >
          A validator-grade check that the example payload is OTLP-shaped for the
          pinned protocol version (and that semantic conventions are in-scope for
          the claim).
        artifact_refs:
          - target/standards-evidence/opentelemetry/otlp_validator_report.json
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned-version compatibility note (protocol + conventions) with an
          explicit upgrade/migration posture.
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.opentelemetry

