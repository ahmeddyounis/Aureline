# Standards adoption evidence bundle (SemVer).

schema_version: 1

evidence_case_id: standards_evidence.semver
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.semver

owner:
  lane: release_evidence
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.versioning_policy
    claim_summary: >
      Claim “public surface versioning follows SemVer (with disclosed narrowing where applicable)”.
    minimum_evidence_bundle:
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned policy note that states how SemVer applies across schemas, CLI JSON,
          manifests, and saved artifacts, including disclosed narrowing semantics.
        artifact_refs:
          - docs/governance/provenance_and_compliance_baseline.md
          - docs/governance/interface_lifecycle_policy.md
          - artifacts/governance/standards_matrix.yaml#standard.semver
      - evidence_path_class: example_export_fixture
        requirement: >
          At least one representative contract surface that demonstrates the versioning
          anchor (schema_version or SemVer field) and is consumed by tooling.
        artifact_refs:
          - artifacts/governance/decision_index.yaml

