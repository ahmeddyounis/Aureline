# Standards adoption evidence bundle (CommonMark).

schema_version: 1

evidence_case_id: standards_evidence.commonmark
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.commonmark

owner:
  lane: docs_public_truth
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.authoring_and_rendering
    claim_summary: >
      Claim “docs authoring/rendering is CommonMark-based at the pinned version”.
    minimum_evidence_bundle:
      - evidence_path_class: example_export_fixture
        requirement: >
          A committed example Markdown corpus that is rendered by the docs/preview
          pipeline and used as a regression fixture for rendering behavior.
        artifact_refs:
          - target/standards-evidence/commonmark/example_corpus.md
      - evidence_path_class: upstream_validator_harness
        requirement: >
          A conformance harness against a pinned CommonMark test corpus (or a
          validator-grade library suite) that reports pass/fail for the adopted
          baseline.
        artifact_refs:
          - target/standards-evidence/commonmark/conformance_report.json
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned-version compatibility note naming the CommonMark version and
          any admitted additive extensions.
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.commonmark

