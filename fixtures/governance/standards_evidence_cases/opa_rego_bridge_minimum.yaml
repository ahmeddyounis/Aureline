# Standards adoption evidence bundle (OPA/Rego bridge).

schema_version: 1

evidence_case_id: standards_evidence.opa_rego_bridge
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.opa_rego

owner:
  lane: governance_and_policy
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.bridge_only
    claim_summary: >
      Claim “OPA/Rego-shaped bridge exists (not native Rego policy language)”.
    minimum_evidence_bundle:
      - evidence_path_class: bridge_disclaimer_doc
        requirement: >
          Narrative disclosure of bridge fidelity posture and the mapping between
          internal policy-bundle contracts and OPA/Rego concepts.
        artifact_refs:
          - docs/identity/offline_entitlement_and_policy_seed.md
          - docs/governance/policy_flag_schema_stack.md
      - evidence_path_class: example_export_fixture
        requirement: >
          A committed reference payload demonstrating the bridge format and scope.
        artifact_refs:
          - target/standards-evidence/opa_rego/bridge_payload_example.tar.gz
      - evidence_path_class: upstream_validator_harness
        requirement: >
          A validator harness that checks the bridge payloads with OPA tooling (or an
          equivalent conformance-grade checker) when the bridge becomes claim-bearing.
        artifact_refs:
          - target/standards-evidence/opa_rego/validator_report.json
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned-version compatibility note naming the adopted OPA/Rego/bundle
          version range (and any disclosed narrowing).
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.opa_rego

