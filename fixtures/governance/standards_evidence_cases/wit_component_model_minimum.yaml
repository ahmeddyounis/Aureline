# Standards adoption evidence bundle (WIT / Component Model).

schema_version: 1

evidence_case_id: standards_evidence.wit_component_model
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.wasm_component_model_wit

owner:
  lane: extensions
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.abi_contract
    claim_summary: >
      Claim “extension ABI is WIT/component-model based at the pinned ABI range”.
    minimum_evidence_bundle:
      - evidence_path_class: upstream_validator_harness
        requirement: >
          A WIT validation harness exists (lint/format/parse) and runs against the
          pinned WIT packages/worlds in the repository.
        artifact_refs:
          - wit/aureline/
      - evidence_path_class: example_export_fixture
        requirement: >
          A committed WIT package/world snapshot that downstream tooling can use as a
          reference for bindings generation and conformance checks.
        artifact_refs:
          - wit/aureline/
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned ABI/version note describing the adopted component-model range and
          the compatibility window / upgrade posture.
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.wasm_component_model_wit

