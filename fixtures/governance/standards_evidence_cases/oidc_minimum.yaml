# Standards adoption evidence bundle (OIDC).

schema_version: 1

evidence_case_id: standards_evidence.oidc
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.oidc

owner:
  lane: identity_and_auth
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.import_only
    claim_summary: >
      Claim “OIDC authentication supported” (standard-shaped import posture).
    minimum_evidence_bundle:
      - evidence_path_class: bridge_disclaimer_doc
        requirement: >
          Disclosure of the supported profile set (flows, scopes, claims mapping,
          offline posture) and what is explicitly not supported.
        artifact_refs:
          - docs/adr/0001-identity-modes.md
          - docs/identity/offline_entitlement_and_policy_seed.md
      - evidence_path_class: import_round_trip_fixture
        requirement: >
          A worked integration fixture proving an auth flow succeeds against a
          representative provider and that token validation and claim mapping
          obey the declared profile.
        artifact_refs:
          - target/standards-evidence/oidc/auth_flow_round_trip_case.yaml
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned profile/version note describing the supported OIDC surface and
          the compatibility window per release train.
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.oidc

