# Standards adoption evidence bundle (REUSE / per-file SPDX hygiene).

schema_version: 1

evidence_case_id: standards_evidence.reuse
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.reuse

owner:
  lane: docs_public_truth
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.hygiene
    claim_summary: >
      Claim “REUSE/SPDX per-file licensing hygiene enforced”.
    minimum_evidence_bundle:
      - evidence_path_class: upstream_validator_harness
        requirement: >
          A REUSE/SPDX lint run (or equivalent) that fails on missing or invalid
          per-file SPDX identifiers for source-bearing files.
        artifact_refs:
          - CONTRIBUTING.md
          - docs/governance/provenance_and_compliance_baseline.md
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned policy note stating the required headers/markers and allowed
          exception mechanism.
        artifact_refs:
          - docs/governance/provenance_and_compliance_baseline.md

