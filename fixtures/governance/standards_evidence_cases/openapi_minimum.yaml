# Standards adoption evidence bundle (OpenAPI).

schema_version: 1

evidence_case_id: standards_evidence.openapi
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.openapi_3_2

owner:
  lane: automation_and_cli
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.service_description_export
    claim_summary: >
      Claim “service/API surface is described by OpenAPI” (standards-based description).
    minimum_evidence_bundle:
      - evidence_path_class: example_export_fixture
        requirement: >
          A committed OpenAPI document representing the published surface.
        artifact_refs:
          - target/standards-evidence/openapi/service.openapi.yaml
      - evidence_path_class: upstream_validator_harness
        requirement: >
          A validator harness (linter/validator) that checks the OpenAPI document
          against the pinned OpenAPI version and fails closed on invalid output.
        artifact_refs:
          - target/standards-evidence/openapi/validator_report.json
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned-version compatibility note naming the adopted OpenAPI version and
          the compatibility window for consumers.
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.openapi_3_2

