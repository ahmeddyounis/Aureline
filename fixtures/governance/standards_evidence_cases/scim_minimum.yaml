# Standards adoption evidence bundle (SCIM).

schema_version: 1

evidence_case_id: standards_evidence.scim
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.scim

owner:
  lane: identity_and_auth
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.import_only
    claim_summary: >
      Claim “SCIM provisioning supported” (standard-shaped import posture).
    minimum_evidence_bundle:
      - evidence_path_class: bridge_disclaimer_doc
        requirement: >
          Disclosure of supported SCIM resources/operations and any narrowed
          posture (forbidden attributes, required mapping, offline behavior).
        artifact_refs:
          - docs/adr/0001-identity-modes.md
          - docs/identity/offline_entitlement_and_policy_seed.md
      - evidence_path_class: import_round_trip_fixture
        requirement: >
          A worked fixture proving provision → readback matches declared mapping
          and that schema extensions are disclosed when present.
        artifact_refs:
          - target/standards-evidence/scim/provision_round_trip_case.yaml
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned profile/version note describing the supported SCIM surface and
          the compatibility window per release train.
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.scim

