# Standards adoption evidence bundle (SPDX).

schema_version: 1

evidence_case_id: standards_evidence.spdx
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.spdx

owner:
  lane: release_evidence
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.hygiene
    claim_summary: >
      Claim “per-file SPDX identifiers enforced” (licensing hygiene).
    minimum_evidence_bundle:
      - evidence_path_class: upstream_validator_harness
        requirement: >
          A lint/validator run that checks new/modified source-bearing files for
          SPDX-License-Identifier and related required headers/markers.
        artifact_refs:
          - CONTRIBUTING.md
          - docs/governance/provenance_and_compliance_baseline.md
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned policy note describing the hygiene baseline and exceptions posture.
        artifact_refs:
          - docs/governance/provenance_and_compliance_baseline.md

  - claim_vector_id: standards_claim.export
    claim_summary: >
      Claim “exports an SPDX SBOM” (standards-based SBOM document).
    minimum_evidence_bundle:
      - evidence_path_class: example_export_fixture
        requirement: >
          A committed representative SPDX SBOM document emitted by the generator.
        artifact_refs:
          - target/standards-evidence/spdx/example_sbom.spdx.json
      - evidence_path_class: upstream_validator_harness
        requirement: >
          A validator harness that checks the SPDX document against the pinned
          SPDX version/profile and fails closed on invalid output.
        artifact_refs:
          - target/standards-evidence/spdx/validator_report.json
      - evidence_path_class: conformance_report_artifact
        requirement: >
          Release-evidence packet/report that vouches for SPDX conformance for a
          given release train.
        artifact_refs:
          - target/standards-evidence/spdx/conformance_packet.json
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned-version compatibility note naming the SPDX spec version and any
          disclosed narrowing.
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.spdx

