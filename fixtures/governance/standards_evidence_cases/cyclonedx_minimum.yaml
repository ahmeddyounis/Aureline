# Standards adoption evidence bundle (CycloneDX).

schema_version: 1

evidence_case_id: standards_evidence.cyclonedx
standard_row_ref: artifacts/governance/standards_matrix.yaml#standard.cyclonedx

owner:
  lane: release_evidence
  dri: "@ahmeddyounis"

claim_vectors:
  - claim_vector_id: standards_claim.export
    claim_summary: >
      Claim “exports CycloneDX SBOM” (standards-based alternate SBOM format).
    minimum_evidence_bundle:
      - evidence_path_class: example_export_fixture
        requirement: >
          A committed representative CycloneDX JSON document emitted by the generator.
        artifact_refs:
          - target/standards-evidence/cyclonedx/example_sbom.cdx.json
      - evidence_path_class: upstream_validator_harness
        requirement: >
          A validator harness that checks the CycloneDX document against the pinned
          version/profile and fails closed on invalid output.
        artifact_refs:
          - target/standards-evidence/cyclonedx/validator_report.json
      - evidence_path_class: compatibility_note
        requirement: >
          A pinned-version compatibility note naming the CycloneDX version and any
          disclosed narrowing.
        artifact_refs:
          - artifacts/governance/standards_matrix.yaml#standard.cyclonedx

