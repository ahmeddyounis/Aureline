schema_ref: schemas/governance/m5_records_policy_certification.schema.json
doc_ref: docs/governance/m5_records_policy_certification.md
artifact_ref: artifacts/governance/m5_records_policy_certification.md
cases:
  - file: canonical_packet.yaml
    kind: positive
    expectation: validates_cleanly
    note: >-
      Canonical seeded M5 record-governance certification packet. Mirrors
      aureline-records::m5_records_policy_certification::seeded_m5_records_policy_certification_packet
      and is asserted equal to it by the crate's
      checked_in_canonical_fixture_matches_seeded_packet test. Every one of the
      eight governed M5 families certifies with all five lane proofs (record
      class, hold/delete, chronology, policy simulation, exception/expiry)
      observed and current, so the shiproom promotion gate is Promote.
negative_behaviors:
  - id: stale_proof_narrows
    note: >-
      Setting any proof cell freshness to stale (or observed=false) auto-narrows
      the family's verdict to narrowed and, for a release-blocking family, holds
      the shiproom promotion gate. Enforced by the crate test
      stale_proof_narrows_row_and_holds_promotion and recomputed by the Python
      validator's verdict/promotion checks.
  - id: managed_claim_unproven
    note: >-
      A local-only family that claims a managed hold/export/delete is rejected
      (local_only_managed_claim_is_rejected) and narrows via
      managed_claim_unproven.
  - id: cosmetic_done_label
    note: >-
      A narrowed row whose label still reads "certified" is rejected so a surface
      can never render cosmetically clean "done" copy over a narrowed claim
      (cosmetic_done_label_over_narrowed_row_is_rejected).
  - id: upstream_regression
    note: >-
      verify_against_live_packets() cross-checks the same-crate hold/retention
      and policy-simulation packets and the records/policy matrix; a regression
      or proof-source mismatch surfaces a cross-check finding
      (tampered_proof_source_is_caught_by_live_cross_check).
