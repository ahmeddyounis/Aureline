__fixture__:
  name: escalated_new_deployment_promise_at_alpha
  scenario: >
    During the M2 alpha wedge, a stakeholder proposes adding a
    managed-cloud deployment promise to the alpha public-claim
    surface. The change widens scope, restates a public claim, and
    introduces a new deployment profile beyond the staffed launch
    wedge. Milestone scope review escalates to release council, and
    the outcome is a recorded re-baseline that downgrades the new
    deployment promise from Committed to Stretch rather than
    accepting it into alpha.
  contract_sections:
    - phase_change_budget.phase_rows[m2_alpha_wedge]
    - phase_change_budget.burden_of_proof_rubric[rubric_m2]
    - phase_change_budget.forum_routing_rules[scope_or_claim_widening_in_alpha_or_earlier]
    - decision_forum_matrix.phase_forum_routing[m2_alpha_wedge]
    - decision_forum_matrix.escalation_rules[m2_widening_escalates_to_release_council]
  pairs_with:
    - fixtures/governance/change_budget_examples/accepted_alpha_wedge_within_budget.yaml

record_kind: change_budget_example
schema_version: 1

fixture_id: escalated_new_deployment_promise_at_alpha
phase_id_ref: m2_alpha_wedge
phase_label: M2 alpha wedge
example_summary: >
  New managed-cloud deployment promise during alpha. Milestone scope
  review escalates to release council and the deployment row is
  rebaselined to Stretch instead of being accepted into the alpha
  wedge.

representative_change:
  title: Add a managed-cloud deployment promise to the alpha public-claim surface
  protected_budget_ref: artifacts/governance/protected_change_budget.yaml#protected_paths.canonical_work_package_ownership
  exception_class_ref: public_claim_or_support_widening
  protected_path_keys:
    - canonical_work_package_ownership
    - repo_topology
  affected_lane_refs:
    - docs_public_truth
    - release_evidence
    - support_export

change_classification:
  reduces_risk: false
  widens_scope: true
  changes_public_claim: true
  alters_stable_bearing_interface: false
  classification_rationale: >
    Adding a managed-cloud deployment promise widens the staffed
    deployment-profile set, restates the alpha public claim, and
    requires named ownership coverage that does not yet exist. No
    stable-bearing interface moves, but the persona, surface, and
    deployment-profile additions are explicit alpha exception classes.

forum_routing:
  matched_rule_id: scope_or_claim_widening_in_alpha_or_earlier
  decided_by_forum_ref: product_scope_review
  decided_by_forum_label: milestone scope review
  co_sign_forum_refs:
    - release_council
  escalation_forum_refs:
    - release_council
  routing_rationale: >
    Alpha widening that changes a public claim is release-bearing.
    Milestone scope review owns the routing decision but cannot close
    alone — the escalation rule routes the packet to release council
    for the rebaseline outcome.

burden_of_proof:
  rubric_id_ref: rubric_m2
  minimum_evidence_provided:
    - alpha-corpus run cited but no new managed-cloud deployment fixtures available
    - linked scorecard lane row for the proposed managed-cloud lane is absent
    - compensating-evidence record names a stakeholder ask, not a closed evidence owner
  rollback_or_narrowing_provided:
    - revert to the alpha-wedge baseline within one cadence window
    - narrow the change so managed-cloud is not promised in alpha
    - downgrade the managed-cloud row from Committed to Stretch in commitment_classes.yaml
  docs_and_support_impact:
    - alpha public copy must not announce managed-cloud as in-scope; known-narrowing notice updated
    - support routing and issue_routing.yaml entries do not yet exist for managed-cloud and are not opened
    - release-notes draft entry records the deferral, not a new launch promise
  owner_commitment:
    - primary owner not named for the proposed managed-cloud lane
    - evidence owner not named with a closed cadence inside the alpha window
    - commitment-class movement recorded in commitment_classes.yaml as Committed -> Stretch

outcome:
  outcome_class: escalated_then_rebaselined
  outcome_bias_applied: finish_alpha_wedge_without_expanding_persona_or_platform_scope
  decision_summary: >
    Milestone scope review escalates to release council under the
    rule that alpha widening which changes a public claim is
    release-bearing. The two forums jointly decline to admit
    managed-cloud into the alpha wedge. The deployment row is
    rebaselined to Stretch and recorded in commitment_classes.yaml;
    the alpha public copy and known-narrowing notice are updated in
    the same change so the public claim never widens.
  recorded_packet_kind: exception_packet
  recorded_packet_action: applied
  budget_debt_snapshot_delta:
    budget_burn_count: 1
    repeated_subsystem_exception_count: 0
    oldest_open_exception_age_days: 0
    claim_narrowing_triggered: false
    rebaseline_triggered: true
    explicit_correction_work_triggered: false

consistency_rule_checks:
  - rule_ref: rule:alpha_widening_changing_public_claim_escalates_to_release_council
    outcome: satisfied
    evidence: Release council is named as escalation forum and co-sign.
  - rule_ref: rule:no_persona_or_deployment_addition_in_alpha_without_named_coverage
    outcome: satisfied
    evidence: Managed-cloud lane lacks named owner and evidence owner; rebaselined to Stretch.
  - rule_ref: rule:rebaseline_recorded_in_commitment_classes_artifact
    outcome: satisfied
    evidence: Commitment class movement Committed -> Stretch recorded in commitment_classes.yaml.
  - rule_ref: rule:public_claim_does_not_widen_as_side_effect_of_rebaseline
    outcome: satisfied
    evidence: Alpha public copy and known-narrowing notice updated in the same change set.
