__fixture__:
  name: claim_narrowing_support_class_widening_at_beta
  scenario: >
    During M3 beta hardening, a partner asks for large-file mode to
    drop several explicit reductions and behave as a fully editable
    surface across additional file size tiers. The change widens the
    text-and-buffer support class, restates a public claim, and
    cannot be hardened in place inside the frozen contract. Release
    council narrows the public claim instead of widening the support
    class, with architecture council co-sign on the buffer-strategy
    contract.
  contract_sections:
    - phase_change_budget.phase_rows[m3_beta_hardening]
    - phase_change_budget.burden_of_proof_rubric[rubric_m3]
    - phase_change_budget.forum_routing_rules[scope_or_claim_widening_in_beta]
    - phase_change_budget.forum_routing_rules[stable_interface_alteration_anywhere]
    - decision_forum_matrix.phase_forum_routing[m3_beta_hardening]
  pairs_with:
    - fixtures/governance/change_budget_examples/rejected_late_schema_churn_at_rc.yaml

record_kind: change_budget_example
schema_version: 1

fixture_id: claim_narrowing_support_class_widening_at_beta
phase_id_ref: m3_beta_hardening
phase_label: M3 beta hardening
example_summary: >
  Large-file mode support-class widening request for a partner ask.
  Release council narrows the public claim instead, with architecture
  council co-sign on the frozen buffer-strategy contract.

representative_change:
  title: Drop explicit large-file mode reductions and widen the support class for a partner ask
  protected_budget_ref: artifacts/governance/protected_change_budget.yaml#protected_paths.buffer_strategy
  exception_class_ref: public_claim_or_support_widening
  protected_path_keys:
    - buffer_strategy
    - text_model
  affected_lane_refs:
    - support_export
    - release_evidence
    - benchmark_lab

change_classification:
  reduces_risk: false
  widens_scope: true
  changes_public_claim: true
  alters_stable_bearing_interface: true
  classification_rationale: >
    Removing the explicit reductions changes the support class and
    widens the public-claim surface. Persisted journal-replay shape
    would also have to relax to admit the new edit posture, which is
    a stable-bearing interface alteration. The motivation is a
    partner ergonomics request, not a documented user-visible trust
    failure.

forum_routing:
  matched_rule_id: scope_or_claim_widening_in_beta
  also_matched_rule_ids:
    - stable_interface_alteration_anywhere
  decided_by_forum_ref: release_council
  decided_by_forum_label: release council
  co_sign_forum_refs:
    - architecture_council
  escalation_forum_refs:
    - shiproom_executive_scope_review
  routing_rationale: >
    Beta widening of any kind escalates to release council regardless
    of phase default. The stable-bearing interface flag adds a
    mandatory architecture council co-sign on the frozen buffer
    strategy contract.

burden_of_proof:
  rubric_id_ref: rubric_m3
  minimum_evidence_provided:
    - beta-corpus run on the buffer_decision_cases fixture set
    - compatibility report row showing rollback impact on existing partners
    - migration rehearsal note covering journal replay under the relaxed shape
  rollback_or_narrowing_provided:
    - rollback to the prior beta build is documented but expensive across partners
    - claim narrowing recorded in the same packet — large-file mode keeps the explicit reductions and the public claim narrows to call them out
    - explicit deferral to the next major train when the change cannot land safely under the frozen contract
  docs_and_support_impact:
    - docs/state/, docs/release/, and docs/governance/ updated in the same change to reflect the narrower claim
    - support-export and compatibility surfaces refreshed for the narrower support class
    - claim manifest entry updated to publish the narrower truth
  owner_commitment:
    - primary owner plus backup with active coverage on the buffer subsystem
    - evidence owner committed to refresh on every RC build
    - commitment class for the partner ask moves from Target to Stretch and is recorded in commitment_classes.yaml

outcome:
  outcome_class: claim_narrowing
  outcome_bias_applied: harden_existing_claims_without_widening_stable_surface_area
  decision_summary: >
    Release council, with architecture council co-sign, declines to
    widen the support class. Instead, the public claim is narrowed in
    the same packet so the docs, release notes, and claim manifest
    publish the narrower truth together. The partner ask is recorded
    as Stretch for a future train; no stable contract movement
    occurs. The buffer-strategy protected path records its first
    same-path exception of the train, so any subsequent same-path
    packet must choose claim_narrowing or rebaseline by rule.
  recorded_packet_kind: exception_packet
  recorded_packet_action: applied
  budget_debt_snapshot_delta:
    budget_burn_count: 1
    repeated_subsystem_exception_count: 1
    oldest_open_exception_age_days: 0
    claim_narrowing_triggered: true
    rebaseline_triggered: false
    explicit_correction_work_triggered: false

consistency_rule_checks:
  - rule_ref: rule:beta_widening_routes_to_release_council
    outcome: satisfied
    evidence: Release council is the deciding forum.
  - rule_ref: rule:stable_bearing_interface_alteration_requires_architecture_council_co_sign
    outcome: satisfied
    evidence: Architecture council co-sign recorded.
  - rule_ref: rule:beta_no_widening_without_claim_narrowing_or_deferral
    outcome: satisfied
    evidence: Claim narrowing recorded in the same packet.
  - rule_ref: rule:claim_narrowing_updates_claim_manifest_in_same_change
    outcome: satisfied
    evidence: Claim manifest entry updated alongside docs and support routing.
