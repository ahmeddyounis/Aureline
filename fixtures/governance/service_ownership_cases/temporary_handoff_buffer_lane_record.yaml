# yaml-language-server: $schema=../../../schemas/governance/temporary_handoff_record.schema.json
$schema: "https://aureline.dev/schemas/governance/temporary_handoff_record.schema.json"
__fixture__:
  name: temporary_handoff_buffer_lane_record
  scenario: >
    Companion temporary_handoff_record cited by the buffer-lane
    temporary-handoff fixture. The handoff opened 2026-04-01 with
    intended expiry 2026-06-01. Closure routes to
    return_to_primary_dri; escalation defaults to escalate_to_dri
    while the lane stays inside the declared window. The status
    class is handoff_active_inside_window.
  contract_sections:
    - "§11 Temporary-handoff record shape"
    - "§12 Temporary-handoff status vocabulary"
    - "§13 Closure-or-renewal-path vocabulary"

temporary_handoff_record_schema_version: 1
record_kind: temporary_handoff_record
temporary_handoff_id: temporary_handoff:buffer_lane.parental_leave_2026_q2
service_ownership_card_ref: service_ownership_card:buffer_lane.temporary_handoff_active
primary_owner_role_ref: role:buffer_dri
temporary_owner_role_ref: role:buffer_temporary_owner

handoff_chronology:
  started_at: "2026-04-01T09:00:00Z"
  intended_expires_at: "2026-06-01T09:00:00Z"
  closed_at: null
  evaluated_at: "2026-05-04T19:00:00Z"

temporary_handoff_status_class: handoff_active_inside_window

linked_evidence_refs:
  - decision_index:buffer_lane.temporary_handoff_open
  - scorecard_lane:buffer_editor_core

linked_waiver_refs: []
successor_handoff_ref: null
closure_or_renewal_path_class: return_to_primary_dri
escalation_path_class: escalate_to_dri
decision_forum_ref: null
degraded_state_label_class: not_degraded_active

handoff_summary: >
  Buffer-lane DRI is on declared leave from 2026-04-01 through
  2026-06-01; the temporary owner role carries lane decisions inside
  the window; closure routes back to the primary DRI on intended
  return.

export_fields:
  render_on_dashboard: true
  render_on_scorecard: true
  render_on_release_packet: true
  render_on_support_export: true
  render_on_governance_packet: true
  render_on_enterprise_review: true

contract_doc_ref: docs/governance/service_ownership_card_contract.md
service_ownership_card_schema_ref: schemas/governance/service_ownership_card.schema.json
notes: >
  Active temporary handoff inside its declared window. The parent
  card renders as temporary_handoff_active; status class is
  recomputed every time the record is rendered so the chip can
  transition to handoff_nearing_expiry_within_thirty_days as
  intended_expires_at draws near.
