__fixture__:
  name: temporary_handoff_buffer_lane
  scenario: >
    The buffer / editor-core lane (crates/aureline-buffer) carries an
    active temporary handoff. The primary DRI is on parental leave
    starting 2026-04-01 with intended return 2026-06-01. The
    temporary owner role takes ownership of the lane, the handoff is
    inside its declared window with twenty-eight days remaining, and
    the parent card renders as temporary_handoff_active. Closure
    routes to return_to_primary_dri; escalation routes to the
    architecture council if the primary DRI does not return on
    2026-06-01.
  contract_sections:
    - "§4 Accountability-status vocabulary"
    - "§7 Degraded-state-label vocabulary"
    - "§8 Role-based export rules"
    - "§10 Export parity"
    - "§11 Temporary-handoff record shape"
    - "§12 Temporary-handoff status vocabulary"
    - "§13 Closure-or-renewal-path vocabulary"

