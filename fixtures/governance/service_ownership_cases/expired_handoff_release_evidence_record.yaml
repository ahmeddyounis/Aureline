temporary_handoff_record_schema_version: 1
record_kind: temporary_handoff_record
temporary_handoff_id: temporary_handoff:release_evidence_lane.handoff_expired_2026_q1
service_ownership_card_ref: service_ownership_card:release_evidence_lane.handoff_expired
primary_owner_role_ref: role:release_owner
temporary_owner_role_ref: role:release_temporary_owner

handoff_chronology:
  started_at: "2026-01-15T09:00:00Z"
  intended_expires_at: "2026-04-15T09:00:00Z"
  closed_at: null
  evaluated_at: "2026-04-30T19:00:00Z"

temporary_handoff_status_class: handoff_expired_past_due

linked_evidence_refs:
  - decision_index:release_evidence_lane.handoff_open
  - governance_packet:release_evidence_handoff_open

linked_waiver_refs: []
successor_handoff_ref: null
closure_or_renewal_path_class: escalate_to_release_council
escalation_path_class: escalate_to_release_council
decision_forum_ref: forum:release_council
degraded_state_label_class: degraded_handoff_expired

handoff_summary: >
  Release-evidence-lane handoff opened 2026-01-15, intended expiry
  2026-04-15; lapsed without renewal as of 2026-04-30; closure /
  renewal review routes through the release council until the
  primary DRI returns or a successor handoff record is minted.

export_fields:
  render_on_dashboard: true
  render_on_scorecard: true
  render_on_release_packet: true
  render_on_support_export: true
  render_on_governance_packet: true
  render_on_enterprise_review: true

contract_doc_ref: docs/governance/service_ownership_card_contract.md
service_ownership_card_schema_ref: schemas/governance/service_ownership_card.schema.json
notes: >
  Lapsed handoff. The parent card MUST render as degraded on every
  consuming surface; renewal lands a successor record with a fresh
  intended_expires_at and updates the parent card's
  accountability_status_class accordingly.
