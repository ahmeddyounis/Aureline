# yaml-language-server: $schema=../../../schemas/governance/service_ownership_card.schema.json
$schema: "https://aureline.dev/schemas/governance/service_ownership_card.schema.json"
__fixture__:
  name: expired_handoff_release_evidence_lane
  scenario: >
    The release-evidence packet-family lane carried a temporary
    handoff that lapsed without renewal. The handoff opened
    2026-01-15 with intended expiry 2026-04-15; today is 2026-04-30
    so the handoff is past due by fifteen days. The parent card
    transitions to accountability_status_class =
    temporary_handoff_expired and degraded_state_label_class =
    degraded_handoff_expired. The card MUST NOT render as actively
    owned on any consuming surface; closure routes to the release
    council pending renewal or return-to-primary.
  contract_sections:
    - "§4 Accountability-status vocabulary"
    - "§7 Degraded-state-label vocabulary"
    - "§10 Export parity"
    - "§11 Temporary-handoff record shape"
    - "§12 Temporary-handoff status vocabulary"
    - "§13 Closure-or-renewal-path vocabulary"
    - "§14 Reuse rules for protected paths"

service_ownership_card_schema_version: 1
record_kind: service_ownership_card_record
service_ownership_card_id: service_ownership_card:release_evidence_lane.handoff_expired
evaluated_at: "2026-04-30T19:00:00Z"

surface_identity:
  surface_identity_class: packet_family
  surface_ref: packet_family:release_evidence
  lane_ref: scorecard_lane:release_evidence
  protected_path_ref: protected_path:release_evidence
  headline_label: "Release evidence — temporary handoff expired"
  surface_summary: >
    Release-evidence packet family covering /artifacts/release/, the
    qualification cadence, the shiproom runbook, provenance, SBOMs,
    compatibility reports, claim manifests, and rollback / shiproom
    packets.

accountable_ownership:
  primary_owner_role_ref: role:release_owner
  backup_owner_role_ref: role:release_temporary_owner
  co_owner_role_refs: []
  owning_team_label: "Release evidence lane"
  concurrence_role_refs:
    - role:product_lead
    - role:chief_architect
  linked_waiver_ref: null
  accountability_status_class: temporary_handoff_expired
  accountability_summary: >
    The temporary handoff for the release-evidence lane lapsed
    without renewal; the parent card is degraded and MUST NOT
    render as actively owned until the handoff renews or the
    primary DRI returns.

support_posture:
  support_class: supported
  support_window_badge_ref: support_window_badge:release_evidence_lane.supported
  support_posture_summary: >
    Support class remains supported on the release-evidence lane;
    the lapsed handoff degrades the ownership card, not the
    underlying support window posture, but release / claim surfaces
    MUST render the degraded label.

escalation_route:
  escalation_path_class: escalate_to_release_council
  decision_forum_ref: forum:release_council
  escalation_chain_role_refs:
    - role:release_owner
    - role:product_lead
    - role:chief_architect
  escalation_summary: >
    Lapsed-handoff escalations on the release-evidence lane route
    through the release council; the council holds renewal /
    return-to-primary review until ownership is restored.

freshness:
  ownership_freshness_class: stale_by_trigger
  last_reaffirmed_at: "2026-01-15T09:00:00Z"
  stale_after: P30D
  expires_at: "2026-02-14T09:00:00Z"
  rerun_trigger_ref: rerun_trigger:temporary_handoff_lapsed
  freshness_summary: >
    Ownership has not been reaffirmed since the handoff opened
    2026-01-15; the rerun trigger temporary_handoff_lapsed fired
    when intended_expires_at on 2026-04-15 passed without renewal.

linked_evidence_refs:
  - linked_evidence_kind_class: scorecard_lane
    linked_evidence_id: scorecard_lane:release_evidence
  - linked_evidence_kind_class: signoff_row
    linked_evidence_id: signoff_row:stable_release_promotion
  - linked_evidence_kind_class: governance_packet
    linked_evidence_id: governance_packet:release_evidence_handoff_open
  - linked_evidence_kind_class: decision_index_row
    linked_evidence_id: decision_index:release_evidence_lane.handoff_open

temporary_handoff_refs:
  - temporary_handoff:release_evidence_lane.handoff_expired_2026_q1
current_accountability_status: temporary_handoff_expired
degraded_state_label_class: degraded_handoff_expired
degraded_state_summary: >
  The temporary handoff for the release-evidence lane expired
  2026-04-15 without renewal; surfaces MUST render the lapsed-
  handoff chip and route the closure / renewal path to the release
  council.

role_export_rules:
  dashboard_export_class: role_id_with_temporary_handoff_summary
  scorecard_export_class: role_id_with_temporary_handoff_summary
  release_packet_export_class: role_id_with_temporary_handoff_summary
  support_export_class: role_id_with_temporary_handoff_summary
  governance_packet_export_class: role_id_with_temporary_handoff_summary
  claim_manifest_export_class: redacted_role_class_only_no_role_id
  enterprise_review_export_class: role_id_with_temporary_handoff_summary

reuse_class: required_named_accountable_ownership

export_fields:
  render_on_dashboard: true
  render_on_scorecard: true
  render_on_release_packet: true
  render_on_support_export: true
  render_on_governance_packet: true
  render_on_claim_manifest: true
  render_on_enterprise_review: true

contract_doc_ref: docs/governance/service_ownership_card_contract.md
temporary_handoff_record_schema_ref: schemas/governance/temporary_handoff_record.schema.json
notes: >
  Companion temporary_handoff_record is in
  temporary_handoff_record:release_evidence_lane.handoff_expired_2026_q1.
  The card MUST stay degraded on every consuming surface until the
  handoff renews into a successor record or the primary DRI returns.
