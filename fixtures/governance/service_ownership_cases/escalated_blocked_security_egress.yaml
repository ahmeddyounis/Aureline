    the lane is held pending a council decision before any further
    signed-pack publication can ride this card. Escalation routes to
    shiproom because the contested decision blocks a stable
    promotion. Support class downgrades to not_certified_in_this_mode
    while the contested rotation is in flight; the support window
    badge MUST cite the refusal posture.
  contract_sections:
