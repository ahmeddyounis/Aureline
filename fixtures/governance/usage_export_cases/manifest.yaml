schema_version: 1
contract_ref: docs/governance/usage_export_and_offboarding_contract.md
usage_export_packet_schema_ref: schemas/governance/usage_export_record.schema.json
usage_export_row_schema_ref: schemas/managed/usage_export_row.schema.json
offboarding_exit_packet_schema_ref: schemas/governance/offboarding_exit_packet.schema.json
posture_matrix_ref: artifacts/governance/usage_export_posture_matrix.yaml
cases:
  - fixture: managed_lane_export_present.yaml
    record_kind: usage_export_packet_record
    availability_class: present
    covers:
      - managed_lane_usage_export_packet_present
      - quota_families_declared
      - time_basis_scope_and_authority_explicit
  - fixture: entitlement_loss_review_narrowed.yaml
    record_kind: usage_export_packet_record
    availability_class: present
    covers:
      - entitlement_loss_review
      - policy_suppressed_narrowing_instead_of_disappearing
  - fixture: renewal_window_availability_explicit.yaml
    record_kind: usage_export_packet_record
    availability_class: present
    covers:
      - renewal_window_availability_window
      - offboarding_window_not_ambiguous
  - fixture: local_only_absent_baseline.yaml
    record_kind: usage_export_packet_record
    availability_class: absent_no_applicable_metering
    covers:
      - local_only_absence_explicit
      - local_baseline_survives_without_usage_export
  - fixture: downgrade_narrowed_no_coercion.yaml
    record_kind: usage_export_packet_record
    availability_class: present
    covers:
      - downgrade_narrows_fields
      - last_contractual_export_still_available

