__fixture__:
  name: user_scoped_settings_export
  scenario: >
    A user invokes the documented portable-profile export from a
    desktop install to move settings, keybindings, named profiles,
    and snippet libraries to a new machine. The action runs from a
    scriptable path without filing a support ticket. Connected
    provider credentials project as handle_only aliases; raw tokens
    never ride the export.
  contract_sections:
    - rows.settings_keybindings_profiles_snippets
    - rows.profile_library_artifacts

record_kind: portability_case
schema_version: 1

fixture_id: user_scoped_settings_export
case_kind: export
portability_row_refs:
  - settings_keybindings_profiles_snippets
  - profile_library_artifacts

invocation:
  invoker_role: user
  scriptable: true
  support_ticket_required: false
  documented_path_ref: docs/state/profile_and_state_map.md
  invocation_summary: >
    User runs the portable-profile export against a local install.
    No managed call is required; the action succeeds offline.

export_assertions:
  minimum_export_format: json
  manifest_required: true
  raw_secret_excluded_required: true
  credential_storage_mode: handle_only
  artifact_storage_mode: embedded_evidence
  retention_mode: exportable
  raw_secret_excluded_asserted: true

import_assertions:
  unknown_field_rule: preserve_round_trip
  round_trip_supported: true
  notes:
    - Re-importing the artifact into the originating build is contractually a no-op for user-authored fields.
    - Future-build settings keys preserved verbatim; the originating build does not silently drop them on re-import.

scope_assertions:
  admin_user_scope: user_scope_only
  managed_local_dependency: local_authoritative_optional_managed_mirror
  notes:
    - Managed sync is opt-in; the fixture covers the default desktop install where no managed mirror exists.

withdrawal_assertions:
  - scenario: staged_migration
    local_core_workflow_remains_truthful: true
    export_api_remains_truthful: true
  - scenario: self_host_move
    local_core_workflow_remains_truthful: true
    export_api_remains_truthful: true
  - scenario: air_gap_continuity
    local_core_workflow_remains_truthful: true
    export_api_remains_truthful: true
  - scenario: saas_cancellation
    local_core_workflow_remains_truthful: true
    export_api_remains_truthful: true

forbidden_user_facing_phrase_audit:
  - phrase: "saved securely"
    occurrences: 0
  - phrase: "stored safely"
    occurrences: 0
  - phrase: "kept private"
    occurrences: 0
