$schema: "https://aureline.dev/schemas/governance/nightly_report_row.schema.json"
__fixture__:
  name: repeated_protected_path_regression_buffer_operations
  scenario: >
    The recurring benchmark report on ff.buffer_operations captured a
    fresh blocker on the macOS reference-laptop profile after a named
    rerun trigger (corpus_or_fixture_revision_changed) fired on a
    re-baselined corpus revision. This is the second blocker observed
    on this protected path inside the foundations milestone, so the
    repeated_protected_path_regression_class MUST be
    repeated_protected_path_within_milestone with a non-empty
    cluster_member_refs naming the prior nightly-row that captured the
    earlier blocker. The row is rendered as blocked_by_failure with a
    drift_breaches_release_floor compare result and the
    temporarily_blocked_pending_owner_action mitigation class. The
    cluster summary names the protected-path regression as a pattern
    so the weekly governance review can escalate to correction work.
  contract_sections:
    - "§4 Run-state vocabulary"
    - "§5 Compare action and compare result"
    - "§8 Cluster and regression indicators"
    - "§14 Recurring-waiver clustering and repeated-protected-path regression"

