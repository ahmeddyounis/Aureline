# yaml-language-server: $schema=../../../schemas/governance/nightly_report_row.schema.json
$schema: "https://aureline.dev/schemas/governance/nightly_report_row.schema.json"
__fixture__:
  name: partial_run_subset_compatibility_window
  scenario: >
    The recurring compatibility-window report on the desktop /
    extensions / command-action-schema surface set executed only the
    desktop and extensions slices this cycle; the command-action-
    schema slice did not capture because the corpus rev for that
    slice changed mid-run and the rerun was not reattempted before the
    nightly window closed. The row MUST render
    partial_run_subset_only with the partial-profile class
    subset_of_corpus_rows_covered, the mitigation class
    partial_profile_result_pending_full_capture, and a compare action
    that pinned to the desktop / extensions envelope. Consuming
    surfaces render the captured subset rather than widening the row
    into a full-corpus claim.
  contract_sections:
    - "§4 Run-state vocabulary"
    - "§5 Compare action and compare result"
    - "§6 Corpus / profile identity and partial-profile rules"
    - "§9 Export parity"

nightly_report_row_schema_version: 1
record_kind: nightly_report_row_record
nightly_report_row_id: nightly_report_row:compatibility_window.recurring_compat.2026_04_29.subset_capture
report_type_class: recurring_compatibility_report
report_run_chronology:
  started_at: "2026-04-29T23:00:00Z"
  completed_at: "2026-04-29T23:55:00Z"
  run_id: compatibility_window_run:2026_04_29.partial_subset
evaluated_at: "2026-04-30T06:30:00Z"
run_state_class: partial_run_subset_only
headline_label: "Compatibility-window report — partial run (desktop and extensions only; command-action-schema slice pending recapture)"

corpus_profile_identity:
  corpus_profile_identity_class: reference_hardware
  corpus_refs:
    - corpus.compat.desktop_install_matrix
    - corpus.compat.extension_marketplace_listings
  profile_pin_ref: reference_laptop:row.macos.m_class.universal
  partial_profile_result_class: subset_of_corpus_rows_covered
  identity_summary: >
    Captured on the macOS reference-laptop row covering the desktop
    install matrix and extension marketplace listings; the command-
    action-schema corpus did not capture this cycle and remains
    pending recapture.

compare_snapshot:
  compare_action_class: compare_against_prior_baseline
  compare_result_class: no_drift_inside_warning_band
  comparison_envelope_class: reference_hardware
  prior_baseline_packet_ref: compatibility_window_pack:2026_04_22
  compare_summary: >
    Captured slices (desktop install matrix, extension marketplace
    listings) compared cleanly against the prior baseline on the
    macOS reference-laptop envelope; the command-action-schema slice
    was not captured this cycle and is excluded from the comparison.

evidence_freshness:
  evidence_freshness_class: fresh
  evidence_packet_ref: compatibility_window_pack:2026_04_29.partial_subset
  captured_at: "2026-04-29T23:55:00Z"
  stale_after: P14D
  expires_at: "2026-05-13T23:55:00Z"
  rerun_trigger_ref: null
  freshness_summary: >
    Captured 2026-04-29; inside the P14D compatibility-window window;
    the partial-run state is from the missing command-action-schema
    slice, not from freshness.

linked_rule_or_claim_refs:
  - linked_rule_or_claim_kind_class: compatibility_surface_row
    linked_rule_or_claim_id: compatibility_surface:desktop_install_matrix
  - linked_rule_or_claim_kind_class: compatibility_surface_row
    linked_rule_or_claim_id: compatibility_surface:extension_marketplace_listings
  - linked_rule_or_claim_kind_class: claim_manifest_row
    linked_rule_or_claim_id: claim_manifest_row:foundations.compatibility_window

linked_evidence_refs:
  - compatibility_window_pack:2026_04_29.partial_subset
  - release_evidence_packet:foundations.compatibility_window_lane

waiver_queue_item_refs: []

mitigation_note:
  mitigation_note_class: partial_profile_result_pending_full_capture
  what_users_should_do: >
    Treat published compatibility-window claim copy on docs and
    release surfaces as scoped to the desktop and extensions slices
    until the command-action-schema slice is recaptured.
  what_operators_should_do: >
    aureline-compat lane DRI to recapture the command-action-schema
    slice on the next nightly window and refresh this row to
    pass_full_corpus_full_profile when the full slice set is covered.
  mitigation_summary: >
    The desktop and extensions slices passed cleanly; the command-
    action-schema slice was not captured this cycle and is excluded
    from claim copy until the recapture lands.

cluster_indicators:
  recurring_waiver_cluster_class: not_applicable_no_waiver_history
  repeated_protected_path_regression_class: no_regression_first_observation
  cluster_member_refs: []
  protected_path_ref: compatibility_surface:command_action_schema
  cluster_summary: >
    No waiver history on this surface in the rolling observation
    window; this is the first partial-subset observation on the
    command-action-schema slice in the current milestone.

export_fields:
  render_on_dashboard: true
  render_on_scorecard: true
  render_on_release_packet: true
  render_on_support_export: true
  render_on_governance_packet: true
  render_on_claim_manifest: false

contract_doc_ref: docs/governance/nightly_report_and_waiver_queue_contract.md
waiver_expiry_item_schema_ref: schemas/governance/waiver_expiry_item.schema.json
notes: >
  Partial-run-subset fixture. render_on_claim_manifest is false so
  partial-corpus capture does not silently widen claim manifest rows;
  the row is still visible on the dashboard, the scorecard, the
  release packet, the support export, and the governance packet.
