# yaml-language-server: $schema=../../../schemas/governance/waiver_expiry_item.schema.json
$schema: "https://aureline.dev/schemas/governance/waiver_expiry_item.schema.json"
__fixture__:
  name: expired_waiver_first_paint
  scenario: >
    A performance-council waiver covering hidden-pane reveal drift on
    ff.first_paint expired 2026-04-15 without renewal; the queue item
    is evaluated on 2026-04-30. The expiry_proximity_class MUST be
    expired_past_due, the mitigation_status_class MUST be
    mitigation_blocked_pending_decision, and the escalation_path_class
    MUST be escalate_to_decision_forum (in this case the performance
    council itself). The queue item links the nightly-row that captured
    the live waiver_expired_failure state, so the dashboard and the
    weekly governance review render the item alongside the failing
    row rather than after the release review depends on a clean pass.
  contract_sections:
    - "§10 Waiver-expiry queue item shape"
    - "§11 Expiry proximity vocabulary"
    - "§12 Mitigation-status vocabulary"
    - "§13 Open-detail action vocabulary"

waiver_expiry_item_schema_version: 1
record_kind: waiver_expiry_item_record
waiver_expiry_item_id: waiver_expiry_item:first_paint.hidden_pane_reveal_drift.2026q1.expired_past_due
waiver_ref: waiver:first_paint.hidden_pane_reveal_drift.2026q1

waiver_owner:
  primary_dri: "@ahmeddyounis"
  owning_lane: aureline-render
  decision_forum: "performance council"
  backup_owner: null

waiver_authority_class: performance_council
waiver_kind_class: release_floor_breach_waiver

evaluated_at: "2026-04-30T06:00:00Z"
expires_at: "2026-04-15T23:59:59Z"
expiry_proximity_class: expired_past_due

affected_release_or_milestone_refs:
  - release_line:foundations.stable_2_0
  - milestone:foundations.startup_lane

affected_protected_path_refs:
  - ff.first_paint
  - protected_metric:startup_and_first_useful_work.first_paint

mitigation_status_class: mitigation_blocked_pending_decision

linked_evidence_refs:
  - benchmark_publication_pack:first_paint.2026_04_27
