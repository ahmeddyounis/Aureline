nightly_report_row_schema_ref: schemas/governance/nightly_report_row.schema.json
notes: >
  Expired-waiver fixture. Inverse of waiver_nearing_expiry_vfs_save.
  The expired_past_due proximity class forbids
  mitigation_not_required_audit_only and forces a typed escalation
  path; consuming surfaces cannot file the queue item under
  no_escalation_required.
