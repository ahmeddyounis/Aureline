linked_nightly_report_row_refs:
  - nightly_report_row:first_paint.recurring_benchmark.2026_04_29.reference_laptop

recurring_waiver_cluster_class: not_recurring_first_observation
repeated_protected_path_regression_class: no_regression_first_observation
cluster_member_refs: []

open_detail_action_class: open_nightly_report_row_inspector
escalation_path_class: escalate_to_decision_forum

summary: >
  Performance-council waiver expired 2026-04-15 without renewal;
  hidden-pane reveal drift on the macOS reference-laptop row is
  again uncovered. Performance council to decide renewal or retire;
  surfaces render the queue item alongside the nightly-row that
