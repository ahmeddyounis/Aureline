__fixture__:
  name: fresh_recurring_pass_input_to_paint
  scenario: >
    The recurring benchmark report on ff.input_to_paint completed on
    the macOS reference-laptop profile against the protected
    interaction-safety corpus. The compare action graded this run
    against the prior baseline on the same envelope and observed no
    drift. The row is rendered as pass_full_corpus_full_profile, the
    mitigation class is no_mitigation_required_passing, no waiver-queue
    item is attached, and the cluster indicators report
    not_recurring_first_observation /
    no_regression_first_observation. The row renders identically on
    the dashboard, the scorecard, the release packet, the support
    export, the governance packet, and the claim manifest.
  contract_sections:
    - "§3 Report-type vocabulary"
    - "§4 Run-state vocabulary"
    - "§5 Compare action and compare result"
    - "§9 Export parity"

