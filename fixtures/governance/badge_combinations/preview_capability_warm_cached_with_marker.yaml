# yaml-language-server: $schema=../../../schemas/governance/capability_lifecycle.schema.json
__fixture__:
  name: preview_capability_warm_cached_with_marker
  classification: allowed
  scenario: >
    A preview capability delivered on the preview channel with
    one live non_stable_capability_dependency marker. The marker
    narrows effective_support_class from standard_support to
    best_effort (effect_on_parent = narrows_effective_support_
    class) and the evidence owner has not been contacted inside
    the refresh window so freshness composes to warm_cached.
    The certified-archetype axis renders not_applicable because
    the capability is not part of the archetype program. The
    product surface, docs, support export, claim manifest,
    compatibility report, and About / service-health channels
    each render the narrowed axes and cite the marker.
  matrix_doc_ref: docs/governance/capability_axis_matrix.md
  matrix_yaml_ref: artifacts/governance/capability_badge_axes.yaml
  capability_lifecycle_schema_ref: schemas/governance/capability_lifecycle.schema.json

axes:
  axis:lifecycle_state:
    declared: preview
    effective: preview
  axis:support_class:
    declared: standard_support
    effective: best_effort
  axis:release_channel:
    declared: preview_channel
    effective: preview_channel
  axis:client_scope:
    declared:
      - desktop_product
    effective:
      - desktop_product
  axis:freshness_class:
    effective: warm_cached
  axis:certified_archetype_status:
    effective: not_applicable
  axis:dependency_markers:
    effective:
      - marker_kind: non_stable_capability_dependency
        effect_on_parent: narrows_effective_support_class
        reason_code: dependency_state_below_parent_declared_state
        repair_hook_kind: upgrade_release_channel

rendered_on_channels:
  product_surface:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:client_scope
      - axis:freshness_class
      - axis:dependency_markers
    worst_supporting_axis: axis:support_class
    expected_copy_intent: name_the_support_class_narrowing_reason
  docs:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:freshness_class
      - axis:client_scope
      - axis:dependency_markers
    worst_supporting_axis: axis:freshness_class
    expected_copy_intent: name_the_staleness_cause_and_refresh_route
  support_export:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:client_scope
      - axis:freshness_class
      - axis:certified_archetype_status
      - axis:dependency_markers
    worst_supporting_axis: axis:support_class
    expected_copy_intent: preserve_effective_support_class_and_marker_list
  claim_manifest:
    effective_claim_posture: experimental
    active_downgrade_reasons:
      - dependency_state_below_parent_declared_state
  compatibility_report:
    current_state: best_effort
    freshness_state: caveated
  about_service_health:
    service_contract_state: ready
    degraded_state_token: degraded_state:experimental

forbidden_combinations_exercised: []
