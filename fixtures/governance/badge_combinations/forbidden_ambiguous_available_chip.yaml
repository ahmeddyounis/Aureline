# yaml-language-server: $schema=../../../schemas/governance/capability_lifecycle.schema.json
__fixture__:
  name: forbidden_ambiguous_available_chip
  classification: forbidden
  scenario: >
    A rendered badge collapses lifecycle_state, support_class,
    release_channel, client_scope, freshness_class, certified_
    archetype_status, and dependency_markers into a single
    "available" chip without emitting any of the seven axis
    tokens. This is the exact ambiguous single-status chip the
    matrix exists to prevent. A conformance checker reading
    this fixture asserts the expected_denial_reason and
    requires the surface to render one value per axis or the
    axis-specific unresolved_axis token.
  matrix_doc_ref: docs/governance/capability_axis_matrix.md
  matrix_yaml_ref: artifacts/governance/capability_badge_axes.yaml
  capability_lifecycle_schema_ref: schemas/governance/capability_lifecycle.schema.json

rendered_as_single_chip: true
chip_value: available

axes_rendered: []

forbidden_combinations_exercised:
  - forbidden_id: forbidden:ambiguous_single_status_chip
    enforcement: fail_closed
    expected_denial_reason: axis_value_not_in_vocabulary
    reason: >
      A single "available" chip conveys no typed axis value.
      The renderer MUST emit one value per required axis (or
      the axis-specific unresolved_axis token) and MUST NOT
      substitute a collapsed chip.

forbidden_chip_value_set:
  - available
  - unavailable
  - healthy
  - having trouble
  - on
  - off
  - beta
  - stable

rendered_on_channels:
  product_surface:
    expected_outcome: render_refused_because_no_axis_tokens_emitted
  docs:
    expected_outcome: render_refused_because_no_axis_tokens_emitted
  support_export:
    expected_outcome: export_blocked_pending_axis_resolution
  claim_manifest:
    expected_outcome: fail_closed_until_axes_emit_typed_values
  compatibility_report:
    expected_outcome: row_blocked_pending_axis_resolution
  about_service_health:
    expected_outcome: render_refused_because_no_axis_tokens_emitted
