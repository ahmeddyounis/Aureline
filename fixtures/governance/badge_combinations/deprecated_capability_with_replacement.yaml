# yaml-language-server: $schema=../../../schemas/governance/capability_lifecycle.schema.json
__fixture__:
  name: deprecated_capability_with_replacement
  classification: allowed
  scenario: >
    A deprecated capability carrying a populated deprecation_
    window and a replacement_ref. One deprecated_dependency
    marker narrows effective_support_class from standard_
    support to community_supported and signals the replacement
    path. The deprecation window is active (announced_at set,
    earliest_removal_at set, committed_removal_at still null),
    which matches the allowed posture in schemas/governance/
    capability_lifecycle.schema.json. All propagation channels
    render the deprecation posture and cite the replacement_ref.
  matrix_doc_ref: docs/governance/capability_axis_matrix.md
  matrix_yaml_ref: artifacts/governance/capability_badge_axes.yaml
  capability_lifecycle_schema_ref: schemas/governance/capability_lifecycle.schema.json

axes:
  axis:lifecycle_state:
    declared: deprecated
    effective: deprecated
    deprecation_window:
      announced_at: "2026-03-01T00:00:00Z"
      earliest_removal_at: "2026-09-01T00:00:00Z"
      committed_removal_at: null
    replacement_ref: capability:replacement.example_replacement_id
  axis:support_class:
    declared: standard_support
    effective: community_supported
  axis:release_channel:
    declared: stable_channel
    effective: stable_channel
  axis:client_scope:
    declared:
      - desktop_product
      - cli
    effective:
      - desktop_product
      - cli
  axis:freshness_class:
    effective: authoritative_live
  axis:certified_archetype_status:
    effective: not_applicable
  axis:dependency_markers:
    effective:
      - marker_kind: deprecated_dependency
        effect_on_parent: narrows_effective_support_class
        reason_code: dependency_deprecated_within_window
        repair_hook_kind: migrate_to_replacement

rendered_on_channels:
  product_surface:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:client_scope
      - axis:freshness_class
      - axis:dependency_markers
    worst_supporting_axis: axis:lifecycle_state
    expected_copy_intent: name_the_narrowing_marker_and_effective_state
  docs:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:freshness_class
      - axis:client_scope
      - axis:dependency_markers
    worst_supporting_axis: axis:lifecycle_state
    expected_copy_intent: render_deprecation_window_and_replacement_ref
  support_export:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:client_scope
      - axis:freshness_class
      - axis:certified_archetype_status
      - axis:dependency_markers
    worst_supporting_axis: axis:lifecycle_state
    expected_copy_intent: preserve_deprecation_window_and_replacement_ref
  claim_manifest:
    effective_claim_posture: replacement_grade
    active_downgrade_reasons:
      - dependency_deprecated_within_window
    replacement_claim_row_ref: claim_row:replacement.example_replacement_row
  compatibility_report:
    current_state: best_effort
    freshness_state: current
    deprecation_posture:
      state: deprecated
      replacement_refs:
        - capability:replacement.example_replacement_id
  about_service_health:
    service_contract_state: ready
    degraded_state_token: degraded_state:limited

forbidden_combinations_exercised: []
