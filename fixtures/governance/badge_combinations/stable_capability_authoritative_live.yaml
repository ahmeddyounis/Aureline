# yaml-language-server: $schema=../../../schemas/governance/capability_lifecycle.schema.json
__fixture__:
  name: stable_capability_authoritative_live
  classification: allowed
  scenario: >
    A stable, standard-support capability delivered on the
    stable channel with no live dependency markers. The
    desktop product and CLI client scopes are both in effective
    scope and the capability's evidence is authoritative_live.
    Every badge propagation channel (product surface, docs,
    support export, claim manifest, compatibility report, and
    About / service-health) renders the capability without
    narrowing. No forbidden cross-axis combinations are
    exercised.
  matrix_doc_ref: docs/governance/capability_axis_matrix.md
  matrix_yaml_ref: artifacts/governance/capability_badge_axes.yaml
  capability_lifecycle_schema_ref: schemas/governance/capability_lifecycle.schema.json

axes:
  axis:lifecycle_state:
    declared: stable
    effective: stable
  axis:support_class:
    declared: standard_support
    effective: standard_support
  axis:release_channel:
    declared: stable_channel
    effective: stable_channel
  axis:client_scope:
    declared:
      - desktop_product
      - cli
    effective:
      - desktop_product
      - cli
  axis:freshness_class:
    effective: authoritative_live
  axis:certified_archetype_status:
    effective: not_applicable
  axis:dependency_markers:
    effective:
      - no_live_markers

rendered_on_channels:
  product_surface:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:client_scope
      - axis:freshness_class
      - axis:dependency_markers
    worst_supporting_axis: none
    expected_copy_intent: render_effective_axis_values_without_narrowing
  docs:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:freshness_class
      - axis:client_scope
      - axis:dependency_markers
    worst_supporting_axis: none
    expected_copy_intent: render_effective_axis_values_without_narrowing
  support_export:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:client_scope
      - axis:freshness_class
      - axis:certified_archetype_status
      - axis:dependency_markers
    worst_supporting_axis: none
    expected_copy_intent: preserve_effective_axis_values
  claim_manifest:
    effective_claim_posture: claim_bearing
    active_downgrade_reasons: []
  compatibility_report:
    current_state: not_applicable
    freshness_state: current
  about_service_health:
    service_contract_state: ready
    degraded_state_token: null

forbidden_combinations_exercised: []
