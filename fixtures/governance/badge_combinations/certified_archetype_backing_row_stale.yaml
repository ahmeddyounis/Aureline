# yaml-language-server: $schema=../../../schemas/governance/capability_lifecycle.schema.json
__fixture__:
  name: certified_archetype_backing_row_stale
  classification: downgrade
  scenario: >
    A stable capability whose linked certified-archetype row
    was fresh at last publication but whose reference-workspace
    backing row has gone stale. Per the certified-archetype
    narrowing rule, the archetype badge narrows from supported
    through best_effort (stale reference-workspace row); the
    claim manifest downgrades effective_claim_posture to
    limited with active_downgrade_reason stale_evidence_inputs;
    the compatibility report sets freshness_state to retest_
    pending; docs and About / service-health cite the stale
    backing row. This fixture exercises downgrade:certified_
    archetype_backing_row_stale.
  matrix_doc_ref: docs/governance/capability_axis_matrix.md
  matrix_yaml_ref: artifacts/governance/capability_badge_axes.yaml
  capability_lifecycle_schema_ref: schemas/governance/capability_lifecycle.schema.json
  compatibility_row_ref: compat_row:certification.launch_archetype_matrix

axes:
  axis:lifecycle_state:
    declared: stable
    effective: stable
  axis:support_class:
    declared: standard_support
    effective: standard_support
  axis:release_channel:
    declared: stable_channel
    effective: stable_channel
  axis:client_scope:
    declared:
      - desktop_product
    effective:
      - desktop_product
  axis:freshness_class:
    effective: warm_cached
  axis:certified_archetype_status:
    effective: best_effort
    backing_rows:
      - row_kind: hardware_row
        freshness_state: current
      - row_kind: toolchain_row
        freshness_state: current
      - row_kind: reference_workspace_row
        freshness_state: stale
      - row_kind: workflow_row
        freshness_state: current
      - row_kind: platform_profile_row
        freshness_state: current
    narrowing_reason: reference_workspace_row_stale
  axis:dependency_markers:
    effective:
      - marker_kind: freshness_floor_dependency
        effect_on_parent: narrows_effective_freshness_class
        reason_code: freshness_floor_unmet
        repair_hook_kind: refresh_freshness

rendered_on_channels:
  product_surface:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:client_scope
      - axis:freshness_class
      - axis:certified_archetype_status
      - axis:dependency_markers
    worst_supporting_axis: axis:certified_archetype_status
    expected_copy_intent: name_the_stale_backing_row_and_retest_route
  docs:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:freshness_class
      - axis:client_scope
      - axis:certified_archetype_status
      - axis:dependency_markers
    worst_supporting_axis: axis:certified_archetype_status
    expected_copy_intent: narrow_certified_wording_and_link_stale_row
  support_export:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:client_scope
      - axis:freshness_class
      - axis:certified_archetype_status
      - axis:dependency_markers
    worst_supporting_axis: axis:certified_archetype_status
    expected_copy_intent: preserve_narrowed_archetype_status_and_retest_route
  claim_manifest:
    effective_claim_posture: limited
    active_downgrade_reasons:
      - stale_evidence_inputs
      - compatibility_row_degraded
    evidence_refs:
      - compat_row:certification.launch_archetype_matrix
  compatibility_report:
    current_state: best_effort
    freshness_state: retest_pending
  about_service_health:
