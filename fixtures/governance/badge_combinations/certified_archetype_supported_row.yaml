# yaml-language-server: $schema=../../../schemas/governance/capability_lifecycle.schema.json
__fixture__:
  name: certified_archetype_supported_row
  classification: allowed
  scenario: >
    A stable capability backed by a live certified-archetype
    report row whose hardware, toolchain, reference-workspace,
    workflow, and platform-profile backing rows are all fresh.
    The certified_archetype_status axis renders supported; the
    compatibility report current_state is supported; and the
    claim row posture is claim_bearing with the compatibility
    row cited as evidence. This fixture exercises the allowed
    form of the certified-archetype axis; the inverse downgrade
    case is certified_archetype_backing_row_stale.
  matrix_doc_ref: docs/governance/capability_axis_matrix.md
  matrix_yaml_ref: artifacts/governance/capability_badge_axes.yaml
  capability_lifecycle_schema_ref: schemas/governance/capability_lifecycle.schema.json
  compatibility_row_ref: compat_row:certification.launch_archetype_matrix

axes:
  axis:lifecycle_state:
    declared: stable
    effective: stable
  axis:support_class:
    declared: standard_support
    effective: standard_support
    compatibility_row_support_class: certified
  axis:release_channel:
    declared: stable_channel
    effective: stable_channel
  axis:client_scope:
    declared:
      - desktop_product
    effective:
      - desktop_product
  axis:freshness_class:
    effective: authoritative_live
  axis:certified_archetype_status:
    effective: supported
    backing_rows:
      - row_kind: hardware_row
        freshness_state: current
      - row_kind: toolchain_row
        freshness_state: current
      - row_kind: reference_workspace_row
        freshness_state: current
      - row_kind: workflow_row
        freshness_state: current
      - row_kind: platform_profile_row
        freshness_state: current
  axis:dependency_markers:
    effective:
      - no_live_markers

rendered_on_channels:
  product_surface:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:client_scope
      - axis:freshness_class
      - axis:certified_archetype_status
      - axis:dependency_markers
    worst_supporting_axis: none
    expected_copy_intent: render_certified_badge_with_backing_row_refs
  docs:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:freshness_class
      - axis:client_scope
      - axis:certified_archetype_status
      - axis:dependency_markers
    worst_supporting_axis: none
    expected_copy_intent: cite_certified_archetype_report_and_backing_rows
  support_export:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:client_scope
      - axis:freshness_class
      - axis:certified_archetype_status
      - axis:dependency_markers
    worst_supporting_axis: none
    expected_copy_intent: preserve_certified_row_and_backing_refs
  claim_manifest:
    effective_claim_posture: claim_bearing
    active_downgrade_reasons: []
    evidence_refs:
      - compat_row:certification.launch_archetype_matrix
  compatibility_report:
    current_state: supported
    freshness_state: current
    compatibility_row_support_class: certified
  about_service_health:
    service_contract_state: ready
    degraded_state_token: null

forbidden_combinations_exercised: []
