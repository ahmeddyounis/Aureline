# yaml-language-server: $schema=../../../schemas/governance/capability_lifecycle.schema.json
__fixture__:
  name: managed_only_channel_on_managed_admin_surface
  classification: allowed
  scenario: >
    A stable capability delivered on managed_only_channel whose
    effective_client_scopes names managed_admin_surface. A
    managed_only_dependency marker cites managed_only_channel_
    required. The managed-admin surface is inside the effective
    client-scope set, so rendering is admissible. This is the
    inverse of forbidden:managed_only_channel_on_unmanaged_
    surface.
  matrix_doc_ref: docs/governance/capability_axis_matrix.md
  matrix_yaml_ref: artifacts/governance/capability_badge_axes.yaml
  capability_lifecycle_schema_ref: schemas/governance/capability_lifecycle.schema.json

axes:
  axis:lifecycle_state:
    declared: stable
    effective: stable
  axis:support_class:
    declared: standard_support
    effective: standard_support
  axis:release_channel:
    declared: managed_only_channel
    effective: managed_only_channel
  axis:client_scope:
    declared:
      - managed_admin_surface
    effective:
      - managed_admin_surface
  axis:freshness_class:
    effective: authoritative_live
  axis:certified_archetype_status:
    effective: not_applicable
  axis:dependency_markers:
    effective:
      - marker_kind: managed_only_dependency
        effect_on_parent: narrows_effective_release_channel
        reason_code: managed_only_channel_required
        repair_hook_kind: request_managed_access

rendered_on_channels:
  product_surface:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:client_scope
      - axis:dependency_markers
    worst_supporting_axis: axis:release_channel
    expected_copy_intent: name_the_release_channel_narrowing_reason
  docs:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:freshness_class
      - axis:client_scope
      - axis:dependency_markers
    worst_supporting_axis: axis:release_channel
    expected_copy_intent: render_managed_only_disclosure
  support_export:
    axes_rendered:
      - axis:lifecycle_state
      - axis:support_class
      - axis:release_channel
      - axis:client_scope
      - axis:freshness_class
      - axis:certified_archetype_status
      - axis:dependency_markers
    worst_supporting_axis: axis:release_channel
    expected_copy_intent: preserve_managed_only_channel_and_admin_scope
  claim_manifest:
    effective_claim_posture: claim_bearing
    active_downgrade_reasons: []
  compatibility_report:
    current_state: supported
    freshness_state: current
  about_service_health:
    service_contract_state: ready
    degraded_state_token: null

forbidden_combinations_exercised:
  - negated_id: forbidden:managed_only_channel_on_unmanaged_surface
    assertion: rendering_surface_is_managed_admin_surface
