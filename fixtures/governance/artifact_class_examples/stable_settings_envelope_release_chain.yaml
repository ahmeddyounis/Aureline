# yaml-language-server: $schema=../../../schemas/governance/artifact_class_row.schema.json
__fixture__:
  name: stable_settings_envelope_release_chain
  scenario: >
    Worked example showing how a launch-bearing stable-facing service
    contract walks the artifact-class graph end-to-end. ARCH-SVC-002
    is the canonical requirement (protected services expose versioned
    contracts, health, cancellation, and dependency-boundary
    enforcement). The RPC transport ADR and the subscription envelope
    ADR authorize the contract shape; the WIT host world surface
    contract packet freezes the surface; the compatibility report
    binds the surface diff to the retained support window; the
    verification corpus proves the contract; the claim manifest row
    publishes the support window; the migration pack carries the
    upgrade guidance; the shiproom packet carries the go/no-go
    decision. No surface mints a parallel id.
  linked_docs:
    - docs/governance/artifact_hierarchy_and_packet_classes.md
    - schemas/governance/artifact_class_row.schema.json
    - artifacts/governance/packet_class_registry.yaml

example_id: stable_settings_envelope_release_chain
launch_bearing_surface: Protected service versioned contracts and dependency-boundary enforcement
worked_chain:
  - step: 1
    artifact_class_id: requirement_register_and_alias_crosswalk
    canonical_id: ARCH-SVC-002
    canonical_location: artifacts/governance/requirement_register_seed.yaml
    role: >
      Names the canonical launch-bearing requirement. Every downstream
      packet cites ARCH-SVC-002 verbatim rather than minting a per-
      surface "service-stability" slug.
    backlinks_to_classes: []
    cited_by_next_step:
      - architecture_decision_record

  - step: 2
    artifact_class_id: architecture_decision_record
    canonical_ids:
      - "0004-rpc-transport-and-schema-toolchain"
      - "0005-subscription-envelope-and-invalidation-semantics"
    canonical_location: docs/adr/
    role: >
      Authorize the RPC transport, schema toolchain, subscription
      envelope, and invalidation semantics that the protected service
      contract depends on. Both ADRs cite ARCH-SVC-002 by id rather
      than restating the requirement.
    backlinks_to_classes:
      - requirement_register_and_alias_crosswalk
    cited_by_next_step:
      - contract_or_schema_or_interface_packet

  - step: 3
    artifact_class_id: contract_or_schema_or_interface_packet
    canonical_id: "wit.aureline_host_world"
    canonical_location: artifacts/governance/stable_surface_inventory.yaml
    role: >
      Freezes the WIT host world that owns the protected service
      contract: writers/readers, downgrade behavior, dependency
      markers, and deprecation posture. Cites ARCH-SVC-002 and the two
      ADRs as required backlinks; reuses the surface id rather than
      minting a per-release slug.
    backlinks_to_classes:
      - requirement_register_and_alias_crosswalk
      - architecture_decision_record
    cited_by_next_step:
      - compatibility_or_certified_archetype_report
      - verification_corpus_and_benchmark_plan

  - step: 4
    artifact_class_id: compatibility_or_certified_archetype_report
    canonical_id: "wit.aureline_host_world.compat_report"
    canonical_location: artifacts/governance/compatibility_surfaces.yaml
    role: >
      Binds the WIT host world diff for the candidate release to the
      retained support window, deprecation posture, and migration
      guidance. Cites the surface contract packet id and the
      verification corpus id rather than restating their fields.
    backlinks_to_classes:
      - contract_or_schema_or_interface_packet
      - verification_corpus_and_benchmark_plan
    cited_by_next_step:
      - claim_manifest_and_docs_migration_pack
      - runbook_support_or_shiproom_packet

  - step: 5
    artifact_class_id: verification_corpus_and_benchmark_plan
    canonical_id: "verification_packet:wit.aureline_host_world.contract.v2"
    canonical_location: docs/governance/verification_packet_template.md
    role: >
      Proves the WIT host-world contract through CONF and OPSVAL
      evidence: schema-conformance, downgrade behavior, dependency-
      boundary enforcement, and cancellation semantics. Reuses the
      shared evidence id every downstream consumer cites.
    backlinks_to_classes:
      - requirement_register_and_alias_crosswalk
      - contract_or_schema_or_interface_packet
    cited_by_next_step:
      - claim_manifest_and_docs_migration_pack
      - runbook_support_or_shiproom_packet

  - step: 6
    artifact_class_id: claim_manifest_and_docs_migration_pack
    canonical_id: "claim_row:version_skew_truth.wit.aureline_host_world"
    canonical_location: artifacts/governance/claim_manifest_seed.yaml
    role: >
      Publishes the support window and version-skew posture as one
      canonical claim row. Docs, release notes, CLI/help, and
      migration guidance project from this row. The migration pack
      lives under docs/migration/ and reuses the same claim row id.
    backlinks_to_classes:
      - requirement_register_and_alias_crosswalk
      - verification_corpus_and_benchmark_plan
    cited_by_next_step:
      - runbook_support_or_shiproom_packet
      - public_proof_publication_bundle

  - step: 7
    artifact_class_id: runbook_support_or_shiproom_packet
    canonical_id: "shiproom_packet:first_beta_rc1.wit.aureline_host_world"
    canonical_location: docs/release/release_evidence_packet_template.md
    role: >
      Carries the go/no-go decision for the release candidate. Cites
      the verification packet, compatibility report, claim row, and
      migration pack rather than restating their evidence. Stale
      compatibility evidence narrows the support window mechanically.
    backlinks_to_classes:
      - verification_corpus_and_benchmark_plan
      - claim_manifest_and_docs_migration_pack
    cited_by_next_step:
      - public_proof_publication_bundle

  - step: 8
    artifact_class_id: public_proof_publication_bundle
    canonical_id: "public_proof:wit.aureline_host_world.v2"
    canonical_location: docs/program/design_partner_and_public_proof_packet.md
    role: >
      Publishes the reproducibility inputs for downstream reviewers:
      contract packet id, compatibility report id, verification packet
      id, claim row id, exact-build identity, and migration pack ref.
      Reuses every upstream id rather than minting a parallel one.
    backlinks_to_classes:
      - claim_manifest_and_docs_migration_pack
      - verification_corpus_and_benchmark_plan
    cited_by_next_step: []

cross_class_invariants:
  - >
    Every downstream step cites the upstream step's canonical id by id,
    not by prose.
  - >
    A change to the WIT host world surface ripples through the
    compatibility report, verification corpus, claim row, migration
    pack, shiproom packet, and public-proof bundle in one review rather
    than as drift across surfaces.
  - >
    Stale evidence at any step downgrades every later step that cites
    it; the release-use matrix names the per-milestone effect.
