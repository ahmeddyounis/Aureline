# yaml-language-server: $schema=../../../schemas/governance/artifact_class_row.schema.json
__fixture__:
  name: shell_startup_latency_release_chain
  scenario: >
    Worked example showing how the launch-bearing shell-startup latency
    bar walks the artifact-class graph end-to-end. PERF-SHELL-001 is
    the canonical requirement; the renderer ADR authorizes the contract
    shape; the renderer surface contract packet freezes the protected
    interaction path; the renderer benchmark publication pack proves the
    bar; the claim manifest row publishes the bar to docs/help, release
    notes, and CLI/help; the shiproom packet carries the go/no-go
    decision; the public-proof bundle publishes reproducibility inputs
    for downstream reviewers. No surface mints a parallel id.
  linked_docs:
    - docs/governance/artifact_hierarchy_and_packet_classes.md
    - schemas/governance/artifact_class_row.schema.json
    - artifacts/governance/packet_class_registry.yaml

example_id: shell_startup_latency_release_chain
launch_bearing_surface: Shell startup, restore, and quick-open latency
worked_chain:
  - step: 1
    artifact_class_id: requirement_register_and_alias_crosswalk
    canonical_id: PERF-SHELL-001
    canonical_location: artifacts/governance/requirement_register_seed.yaml
    role: >
      Names the canonical launch-bearing requirement. The shell-latency
      bar has one canonical id; every downstream packet cites the id
      verbatim rather than inventing a parallel slug.
    backlinks_to_classes: []
    cited_by_next_step:
      - architecture_decision_record

  - step: 2
    artifact_class_id: architecture_decision_record
    canonical_id: "0002-renderer-text-stack-and-shaping-fallback"
    canonical_location: docs/adr/0002-renderer-text-stack-and-shaping-fallback.md
    role: >
      Authorizes the renderer text stack and shaping fallback that the
      protected interaction path depends on. Cites PERF-SHELL-001 by id
      rather than restating the bar in prose.
    backlinks_to_classes:
      - requirement_register_and_alias_crosswalk
    cited_by_next_step:
      - contract_or_schema_or_interface_packet
      - verification_corpus_and_benchmark_plan

  - step: 3
    artifact_class_id: contract_or_schema_or_interface_packet
    canonical_id: "render.shell_interaction_path"
    canonical_location: artifacts/governance/stable_surface_inventory.yaml
    role: >
      Freezes the renderer surface that owns the protected interaction
      path: forbidden-dependency rules, hot-path contract, and
      downgrade behavior on missing fonts or shaping fallback. Cites
      PERF-SHELL-001 and ADR 0002 as required backlinks.
    backlinks_to_classes:
      - requirement_register_and_alias_crosswalk
      - architecture_decision_record
    cited_by_next_step:
      - verification_corpus_and_benchmark_plan
      - compatibility_or_certified_archetype_report

  - step: 4
    artifact_class_id: verification_corpus_and_benchmark_plan
    canonical_id: "benchmark_publication:shell_startup.cold_open.v3"
    canonical_location: docs/benchmarks/benchmark_publication_pack_template.md
    role: >
      Proves the published latency bar on the canonical hardware row,
      lab-image revision, and protected-metrics revision. Reuses the
      same benchmark evidence id every downstream consumer must cite.
      Cites PERF-SHELL-001 and the renderer surface contract packet by
      id.
    backlinks_to_classes:
      - requirement_register_and_alias_crosswalk
      - contract_or_schema_or_interface_packet
    cited_by_next_step:
      - claim_manifest_and_docs_migration_pack
      - runbook_support_or_shiproom_packet
      - public_proof_publication_bundle

  - step: 5
    artifact_class_id: claim_manifest_and_docs_migration_pack
    canonical_id: "claim_row:benchmark_publication.shell_startup.cold_open"
    canonical_location: artifacts/governance/claim_manifest_seed.yaml
    role: >
      Publishes the bar as one canonical claim row that docs/help,
      release notes, CLI/help, evaluation artifacts, and public-proof
      packets project from. Stale or narrowed evidence flips the
      claim's effective posture rather than letting downstream channels
      keep optimistic copy.
    backlinks_to_classes:
      - requirement_register_and_alias_crosswalk
      - verification_corpus_and_benchmark_plan
    cited_by_next_step:
      - runbook_support_or_shiproom_packet
      - public_proof_publication_bundle

  - step: 6
    artifact_class_id: runbook_support_or_shiproom_packet
    canonical_id: "shiproom_packet:first_beta_rc1"
    canonical_location: docs/release/release_evidence_packet_template.md
    role: >
      Carries the go/no-go decision for the release candidate. Cites
      the verification packet, claim row, and waiver register state
      rather than restating their evidence. A stale bar downgrades the
      release-candidate posture mechanically.
    backlinks_to_classes:
      - verification_corpus_and_benchmark_plan
      - claim_manifest_and_docs_migration_pack
    cited_by_next_step:
      - public_proof_publication_bundle

  - step: 7
    artifact_class_id: public_proof_publication_bundle
    canonical_id: "public_proof:shell_startup.cold_open.v3"
    canonical_location: docs/program/design_partner_and_public_proof_packet.md
    role: >
      Publishes the reproducibility inputs (exact command line, corpus
      revision, hardware row, lab-image revision, protected-metrics
      revision, exact-build identity) that downstream reviewers re-run.
      Reuses the upstream benchmark publication pack id and claim row
      id rather than minting a parallel id.
    backlinks_to_classes:
      - claim_manifest_and_docs_migration_pack
      - verification_corpus_and_benchmark_plan
    cited_by_next_step: []

cross_class_invariants:
  - >
    Every downstream step cites the upstream step's canonical id by id,
    not by prose.
  - >
    Stale evidence at any step downgrades every later step that cites
    it; the release-use matrix names the per-milestone effect.
  - >
    No step introduces a fresh evidence id that does not also live
    upstream.
