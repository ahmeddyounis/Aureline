    evidence_source_class: imported_remote_agent
    current_state_class: retained_artifact_imported_origin
    timezone_basis_class: imported_origin_zone_labeled
    relative_time_basis_class: since_import_window_end
    imported_artifact_disclosure_class: imported_window_disclosed
    mirror_lag_state_class: no_mirror_live_or_imported
    timestamp_envelope_record_kind: timestamp_envelope_record
  contract_sections:
    - "3. Evidence source classes"
    - "4. Current-state classes"
    - "6. Relative-time presentation"
    - "7. Imported-artifact disclosure"
    - "10. Export and support parity"
    - "11. Honesty invariants"

