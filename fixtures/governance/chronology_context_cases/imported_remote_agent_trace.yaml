    A capture-event row carrying a trace span imported from a remote
    agent. The remote clock is unsynchronized and the runtime treats the
    row as a retained artifact of the import window. The relative-time
    label MUST count from the import window end, not from "now"; the
    absolute timestamp renders in UTC under the imported_origin_zone
    basis with the origin zone disclosed; the import window is rendered
    next to the timestamp and a partial-order label is required.
