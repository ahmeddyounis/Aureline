__fixture__:
  name: deletion_timeline_legal_hold
  scenario: >
    A deletion-event row on the deletion timeline for a managed support
    archive whose delete request was admitted but is held open by an
    active legal hold. The row resolves deletion_event_state_class to
    legal_hold and MUST NOT collapse to delete_completed; the bound
    delete_request_state_record carries the held managed copy. Source
    class is mirrored_managed_surface (Aureline mirrors the managed
    archive read-only on the desktop runtime), so a mirror chip is
    rendered alongside the legal-hold chip.
  exercised_axes:
    consumer_row_kind: deletion_event_row
    evidence_source_class: mirrored_managed_surface
    current_state_class: retained_artifact_managed_authoritative
    deletion_event_state_class: legal_hold
    timezone_basis_class: device_local_iana
    relative_time_basis_class: since_now_with_skew_label
    imported_artifact_disclosure_class: not_imported_live_or_local
    mirror_lag_state_class: mirror_lag_within_tolerance
    timestamp_envelope_record_kind: timestamp_envelope_record
  contract_sections:
    - "3. Evidence source classes"
    - "4. Current-state classes"
    - "8. Deletion-event rows"
    - "10. Export and support parity"
    - "11. Honesty invariants"

