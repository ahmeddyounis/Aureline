case_id: support_export_queued_manual
description: >
  Demonstrates that support.bundle_manifest uses queued_for_manual_export across
  all three deployment contexts. Support bundles never flow automatically to any
  endpoint; they are held locally until an explicit user or admin action releases
  them. This is consistent with the support_export_payload family class.

registry_entry_ref: support.bundle_manifest

given:
  context: all
  family_class: support_export_payload
  endpoint_policy_truth_by_context:
    oss_local: queued_for_manual_export
    self_hosted: queued_for_manual_export
    managed_enterprise: queued_for_manual_export

when:
  query: What is the endpoint policy for the support bundle manifest across all contexts?

then:
  endpoint_policy_oss_local: queued_for_manual_export
  endpoint_policy_self_hosted: queued_for_manual_export
  endpoint_policy_managed_enterprise: queued_for_manual_export
  data_leaves_device_automatically: false
  requires_explicit_action_to_export: true

assertions:
  - field: endpoint_policy_truth_by_context.oss_local
    expected: queued_for_manual_export
  - field: endpoint_policy_truth_by_context.self_hosted
    expected: queued_for_manual_export
  - field: endpoint_policy_truth_by_context.managed_enterprise
    expected: queued_for_manual_export
  - field: partial_outcome_marker
    expected: partial_suppressed_by_policy
  - invariant: >
      Support bundles are uniformly user-initiated export artifacts in every
      deployment context. There is no context where they flow automatically.
