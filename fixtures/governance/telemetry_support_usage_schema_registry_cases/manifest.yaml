manifest_id: telemetry_support_usage_schema_registry_cases
description: >
  Worked fixture cases for the stable telemetry, diagnostics, support-export,
  and usage-export schema registry. Each case demonstrates a specific governance
  property enforced by the registry format and the validate_registry() gate.

registry_artifact_ref: artifacts/governance/telemetry_support_usage_schema_registry.json
schema_ref: schemas/governance/telemetry_support_usage_registry.schema.json
rust_validator_ref: crates/aureline-governance/src/telemetry_support_usage_registry/mod.rs

cases:
  - case_id: oss_telemetry_local_only_default
    file: oss_telemetry_local_only_default.yaml
    entry_id: telemetry.ux_product_event
    property: OSS telemetry stays local by default; opt_in_disabled_until_user_consent enforced
    gate: validate_registry passes oss_posture_check

  - case_id: support_export_queued_manual
    file: support_export_queued_manual.yaml
    entry_id: support.bundle_manifest
    property: Support bundles are queued_for_manual_export in all contexts
    gate: endpoint_policy_truth_by_context uniform across all three contexts

  - case_id: usage_export_managed_endpoint
    file: usage_export_managed_endpoint.yaml
    entry_id: usage.metering_export_packet
    property: Usage metering export active only in managed_enterprise context
    gate: partial_outcome_marker is partial_offboarding_window_bounded

  - case_id: diagnostics_local_only_oss
    file: diagnostics_local_only_oss.yaml
    entry_id: diagnostics.crash_payload
    property: Crash diagnostics are local_only in all three deployment contexts
    gate: no context permits remote upload automatically

  - case_id: unlabeled_row_promotion_blocked
    file: unlabeled_row_promotion_blocked.yaml
    entry_id: hypothetical.unlabeled_payload
    property: Shiproom gate rejects rows with missing governance dimensions
    gate: validate_registry returns non-empty Vec<RegistryViolation>
