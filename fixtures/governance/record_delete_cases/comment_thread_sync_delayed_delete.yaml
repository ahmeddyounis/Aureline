__fixture__:
  name: comment_thread_sync_delayed_delete
  scenario: >
    A workspace member deletes a thread of review comments. The local
    copy is removed immediately, but the managed mirror is mid-sync;
    the request stays in Delete requested while a sync_backlog
    blocker gates the next state change. The chronology row is
    rendered from the mirrored managed surface (with a
    since_now_with_skew_label basis), and the remaining-location
    disclosure names the managed mirror that is propagating the
    delete to replicas. Held-vs-completed honesty: the row never
    flips to Delete completed before the destruction receipt
    arrives.
  matrix_row_ref: comment_or_review_thread_row
  contract_sections:
    - "1. Record kinds in scope"
    - "3. Chronology layer"
    - "4. Delete-request progression rows"
    - "5. Remaining-location disclosure rows"
    - "6. Local-vs-hosted distinction"
    - "8. Legal-hold honesty"
    - "10. Vocabulary alignment"
    - "11. Honesty invariants"
  honesty_invariants_asserted:
    - held_or_retained_not_reported_destroyed
    - raw_payloads_not_embedded
    - live_state_not_claimed_on_imported_offline_or_replayed_row
    - expected_next_state_change_disclosed
    - policy_owner_named
    - handoff_does_not_widen_scope

