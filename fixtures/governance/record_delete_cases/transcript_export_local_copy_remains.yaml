    source_clock_class: local_wall_clock_synchronized
  expected_next_state_change:
    change_class: indeterminate_pending_admin
    summary: The next state change requires the user to delete the downloaded local export packet from the device; no clock applies inside Aureline.
  remaining_location_disclosure:
    locations:
      - location_class: local_export_copy
        matrix_row_ref: workspace_user_enabled_transcript_archive
        artifact_refs:
          - local-export:transcript-archive:t8:packet.zip
        summary: The downloaded transcript packet remains on the participant device and is outside the managed delete job.
      - location_class: destruction_receipt_only
        matrix_row_ref: workspace_user_enabled_transcript_archive
        artifact_refs:
          - destruction-receipt:transcript-archive:t8
        summary: Managed archive deleted; only the destruction receipt id remains.
    honesty_note: A downloaded local export copy still exists; this request is not Delete completed and the local file is outside Aureline's delete path.
  partial_blockers:
    - blocker_id: blocker:outside-platform-scope:local-export-packet
      blocker_class: outside_platform_scope
      expected_clear_at: null
      affected_matrix_row_refs:
        - workspace_user_enabled_transcript_archive
      note: The downloaded local export file is outside Aureline policy and requires the user to delete it on the device.
  handoff_packets:
    - handoff_audience: user_self_serve
      handoff_export_class: matrix_state_plus_redacted_summary
      exposes_unrelated_private_payloads: false
      redaction_profile_ref: docs/governance/storage_and_retention_vocabulary.md
      included_matrix_row_refs:
        - workspace_user_enabled_transcript_archive
      excluded_matrix_row_refs: []
      summary: Self-serve packet conveys typed delete state, the destruction receipt id, and the disclosure that the local export packet remains under user control.
  audit_linkage:
    privacy_history_event_refs:
      - privacy.history.transcript_archive.exported_copy_remains_local.2026_04_30_002
    governed_record_refs:
      - governed-record:transcript-archive:t8
    deletion_job_refs:
      - deletion-job:transcript-archive:t8
    destruction_receipt_refs:
      - destruction-receipt:transcript-archive:t8
    support_bundle_refs: []
    export_manifest_refs:
      - export-manifest:transcript-archive:t8
    policy_refs:
      - policy:workspace-retention:design-review-pair
  honesty_assertions:
    held_or_retained_not_reported_destroyed: true
    raw_payloads_not_embedded: true
    remaining_location_disclosed_when_required: true
    expected_next_state_change_disclosed: true
    handoff_does_not_widen_scope: true
  notes: >
    The combination of Exported copy remains local plus a destruction
    receipt only on the managed side illustrates that an exported
    transcript is not a managed delete completion; both the local
    file and the receipt-only managed state remain visible.

