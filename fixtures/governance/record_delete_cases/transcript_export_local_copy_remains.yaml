__fixture__:
  name: transcript_export_local_copy_remains
  scenario: >
    A user-enabled text-only transcript was downloaded to the
    participant's device before the case closed; the operator admin
    then ran the managed delete. The managed archive is destroyed
    but the downloaded local export packet remains under user
    control. The request resolves to Exported copy remains local;
    the collaboration delete-path status resolves to
    deletion_completed_but_exported_local_copy_surviving with the
    follow-up wording follow_up_user_must_delete_local_copy_separately;
    the chronology row pairs the mirrored managed surface with a
    local-export remaining-location entry. A row that flips to
    Delete completed while the local copy survives is non-conforming.
  matrix_row_ref: recording_or_transcript_or_replay_artifact_row
  contract_sections:
    - "1. Record kinds in scope"
    - "3. Chronology layer"
    - "4. Delete-request progression rows"
    - "5. Remaining-location disclosure rows"
    - "6. Local-vs-hosted distinction"
    - "11. Honesty invariants"
  honesty_invariants_asserted:
    - held_or_retained_not_reported_destroyed
    - local_export_copy_disclosed_when_required
    - expected_next_state_change_disclosed
    - policy_owner_named
    - handoff_does_not_widen_scope

