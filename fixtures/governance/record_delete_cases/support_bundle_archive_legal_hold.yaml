__fixture__:
  name: support_bundle_archive_legal_hold
  scenario: >
    A deletion-event row on the deletion timeline for a managed
    support-bundle archive whose delete request was admitted but is
    held open by an active tenant legal hold. The chronology row's
    deletion_event_extras.deletion_event_state_class resolves to
    legal_hold and MUST NOT collapse to delete_completed; the bound
    delete_request_state_record stays in Legal hold and lists the
    held managed archive on the remaining-location disclosure. The
    record kind is the deletion_event_or_audit_row family from the
    packet's matrix.
  matrix_row_ref: deletion_event_or_audit_row
  contract_sections:
    - "1. Record kinds in scope"
    - "3. Chronology layer"
    - "4. Delete-request progression rows"
    - "5. Remaining-location disclosure rows"
    - "6. Local-vs-hosted distinction"
    - "8. Legal-hold honesty"
    - "10. Vocabulary alignment"
    - "11. Honesty invariants"
  honesty_invariants_asserted:
    - held_or_retained_not_reported_destroyed
    - raw_payloads_not_embedded
    - deletion_event_held_row_never_renders_as_completed
    - expected_next_state_change_disclosed
    - policy_owner_named
    - handoff_does_not_widen_scope

