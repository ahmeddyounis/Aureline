__fixture__:
  name: presence_grant_ephemeral_no_capture
  scenario: >
    A pair-programming session presence row for an active participant
    with a temporary debugger control grant. The session is
    default-ephemeral and no recording, transcript, or replay is
    enabled. The chronology row is live system truth on the
    observing runtime; the row admits no delete request because
    nothing is retained. The collaboration row resolves to
    deletion_not_applicable_live_only_row and the delete-request
    state is omitted with a typed reason.
  matrix_row_ref: presence_or_temporary_control_grant_row
  contract_sections:
    - "1. Record kinds in scope"
    - "3. Chronology layer"
    - "4. Delete-request progression rows"
    - "6. Local-vs-hosted distinction"
    - "11. Honesty invariants"
  honesty_invariants_asserted:
    - held_or_retained_not_reported_destroyed
    - raw_payloads_not_embedded
    - live_only_row_must_resolve_to_no_retention_owner_and_no_location

