__fixture__:
  name: transcript_policy_required_delete_completed
  scenario: >
    A regulated review session with admin-signed policy that forces
    structured-captions transcript capture. After the case closes the
    operator admin runs the managed delete; the destruction receipt
    arrives, no local export was downloaded, and the request reaches
    Delete completed with no_remaining_location. The chronology row
    is mirrored from the managed surface during the live session and
    keeps mirror lag within tolerance. Default-ephemeral honesty:
    the recording-state class moved off default_ephemeral_no_capture
    only because the admin-signed policy explicitly admitted capture.
  matrix_row_ref: recording_or_transcript_or_replay_artifact_row
  contract_sections:
    - "1. Record kinds in scope"
    - "3. Chronology layer"
    - "4. Delete-request progression rows"
    - "5. Remaining-location disclosure rows"
    - "6. Local-vs-hosted distinction"
    - "8. Legal-hold honesty"
    - "11. Honesty invariants"
  honesty_invariants_asserted:
    - held_or_retained_not_reported_destroyed
    - raw_payloads_not_embedded
    - recording_must_be_explicit_enable_or_policy_forced
    - raw_code_capture_not_admitted_without_policy_ref
    - expected_next_state_change_disclosed
    - policy_owner_named

