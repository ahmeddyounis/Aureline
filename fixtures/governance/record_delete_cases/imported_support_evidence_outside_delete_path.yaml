__fixture__:
  name: imported_support_evidence_outside_delete_path
  scenario: >
    A support session admits an imported support-evidence packet
    (originally produced by a customer compliance team and handed in
    for context) whose authoritative copy lives at the import origin.
    The chronology row resolves evidence_source_class to
    imported_external_audit_trail, current_state_class to
    retained_artifact_imported_origin, the relative-time basis to
    since_import_window_end, and the timezone basis to
    imported_origin_zone_labeled with the origin zone disclosed. The
    bound delete-path status resolves to
    deletion_not_yet_requested_inspectable_only with follow-up
    wording follow_up_third_party_origin_outside_aureline_scope: a
    delete request inside Aureline cannot affect the import-origin
    copy. The delete-request state is omitted with a typed reason
    because the import origin is outside Aureline's delete path.
  matrix_row_ref: imported_or_support_evidence_packet_row
  contract_sections:
    - "1. Record kinds in scope"
    - "3. Chronology layer"
    - "5. Remaining-location disclosure rows"
    - "6. Local-vs-hosted distinction"
    - "7. Timezone basis"
    - "9. Imported / offline / replayed evidence cannot masquerade as live"
    - "10. Vocabulary alignment"
    - "11. Honesty invariants"
  honesty_invariants_asserted:
    - imported_origin_not_silently_re_owned
    - live_state_not_claimed_on_imported_offline_or_replayed_row
    - raw_payloads_not_embedded
    - handoff_does_not_widen_scope

