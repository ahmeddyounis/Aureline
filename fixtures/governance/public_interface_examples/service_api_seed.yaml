# yaml-language-server: $schema=../../../schemas/governance/version_advertisement.schema.json
__fixture__:
  name: service_api_seed
  scenario: >
    A service/host boundary advertises its API-family contract by
    pointing at the service surface row, the OpenAPI document, and the
    published API version. A consumer can bind to the OpenAPI contract
    and evaluate mixed-version posture through the referenced
    compatibility row and skew-window declaration.
  doc_sections:
    - Version advertisement rules
    - Public surface matrix (families)

record_kind: version_advertisement_record
version_advertisement_schema_version: 1
surface_contract_ref: artifacts/governance/stable_surface_inventory.yaml#provider.service_api_family
stability_label: experimental
running_build_identity_ref: build:running:01
surface_instance_id: service_family:optional_service_api_seed
version_anchors:
  - kind: openapi_document
    ref: openapi/service_api_seed.yaml
    version: null
    version_slot: null
    notes: OpenAPI family document (seed).
  - kind: openapi_version
    ref: openapi/service_api_seed.yaml
    version: 0.0.0-seed
    version_slot: info.version
    notes: OpenAPI info.version published by the service family.
  - kind: compatibility_policy_ref
    ref: artifacts/compat/qualification_matrix_seed.yaml#compat_row:provider.service_api_and_browser_handoff
    version: null
    version_slot: null
    notes: Compatibility row the service family binds to.
compatibility_policy_refs:
  - artifacts/compat/qualification_matrix_seed.yaml#compat_row:provider.service_api_and_browser_handoff
  - artifacts/compat/skew_windows.yaml#skew_window:provider_linked_packet

