# yaml-language-server: $schema=../../../schemas/governance/human_readable_artifact_family.schema.json
__fixture__:
  name: json_portable_profile_export
  scenario: >
    Example registry row for a portable profile export where the on-disk JSON is
    canonicalized for stable diffs and unknown extension blocks are preserved
    according to the portability contract.
