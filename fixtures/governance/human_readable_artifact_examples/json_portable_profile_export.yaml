    - How to use this registry
    - Worked examples

schema_version: 1

artifact_families:
  - id: profile_export_portable
    title: Portable profile export
    description: Example row for a portable JSON profile export artifact.
    owner_class: profile
    authorship_class: user_authored
    editability_class: review_before_write
    format_class: json
    schema_home: schemas/profile/portable_profile.schema.json
    comment_policy: format_disallows_comments
    ordering_policy: canonical_reorder_disclosed
    unknown_field_policy: preserve_under_namespaced_key
    vcs_review_posture: optional_in_vcs
    portability_expectation: portable
    canonical_locations:
      - "*.aureprofile.json"
      - "<user-selected>/profile_export.json"
    policy_refs:
      - docs/state/profile_and_state_map.md
      - docs/config/artifact_format_and_migration_policy.md
      - docs/governance/human_readable_artifact_registry.md
