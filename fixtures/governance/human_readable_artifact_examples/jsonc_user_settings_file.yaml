# yaml-language-server: $schema=../../../schemas/governance/human_readable_artifact_family.schema.json
__fixture__:
  name: jsonc_user_settings_file
  scenario: >
    Example registry row for a user-owned JSONC settings file where comments,
    unknown fields, and key ordering must round-trip without loss.
  doc_sections:
    - How to use this registry
    - Worked examples

schema_version: 1

artifact_families:
  - id: user_settings_file
    title: User-scope settings file
    description: Example row for JSONC, comment-preserving, user-global durable state.
    owner_class: user
    authorship_class: user_authored
    editability_class: structured_safe_editable
    format_class: jsonc
    schema_home: schemas/config/settings.schema.json
    comment_policy: preserve_verbatim
    ordering_policy: stable_order_preserved
    unknown_field_policy: preserve_verbatim
    vcs_review_posture: not_expected_in_vcs
    portability_expectation: portable
    canonical_locations:
      - "$AURELINE_CONFIG/settings.jsonc"
    policy_refs:
      - docs/config/human_edited_artifact_contract.md
      - docs/config/artifact_format_and_migration_policy.md
      - docs/governance/human_readable_artifact_registry.md
    notes: |
      Illustrative `settings.jsonc` payload (shape shown; schema is authoritative):

      ```jsonc
      {
        "$schema": "https://aureline.dev/schemas/config/settings.schema.json",
        "schema_version": 1,
        "artifact_kind": "settings",
        "source_attribution": {
          "artifact_id": "settings.user_global",
          "source_scope": "user_global",
          "owner_class": "user_owned",
          "source_label": "User global settings"
        },
        "settings": {
          // Comments must round-trip without being dropped or reordered.
          "editor.font_size": 14,

          // Unknown extension blocks must round-trip verbatim.
          "x-example.extension": {
            "future_key": true
          }
        }
      }
      ```

