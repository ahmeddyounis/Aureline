__fixture__:
  name: fail_closed_orphan_claim_text_marketplace_card
  scenario: >
    A draft publication run carries a marketplace-discovery card whose
    published copy attempts to attach a claim_row_ref that does not
    resolve in the claim manifest baseline. The binding emits two
    blocking failures: orphan_claim_text and claim_row_not_in_baseline,
    both with permissible_under_narrowed_pass = false. The gate verdict
    is fail_closed; the publication-diff is claim_row_widening_blocked
    because the orphan card would have widened public claim coverage
    past the manifest baseline.
  contract_sections:
    - "§4 Evidence-binding rules"
    - "§5 Evidence resolution"
    - "§6 Destination publication rows"
    - "§7 Publication diff"
    - "§8 Gate verdict"
    - "§11 Audience and redaction vocabulary"

