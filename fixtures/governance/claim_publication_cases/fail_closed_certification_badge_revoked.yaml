__fixture__:
  name: fail_closed_certification_badge_revoked
  scenario: >
    A release-train publication run carries a certified-archetype
    badge for the launch-wedge TypeScript-web claim row whose
    qualification has been revoked. The binding pins
    badge_downgrade_class = badge_revoked and emits one
    badge_revoked_for_path blocking failure with
    permissible_under_narrowed_pass = false; the gate verdict is
    fail_closed; the publication-diff is badge_downgraded_in_run with
    badge_state_changed from certified_current to badge_revoked on the
    certification_badge destination, and copy_narrowed on docs/site
    and help_about destinations because public-proof packet copy
    must reflect the revoked path.
  contract_sections:
    - "§3 Channel vocabulary"
    - "§4 Evidence-binding rules"
    - "§5 Evidence resolution"
    - "§6 Destination publication rows"
    - "§7 Publication diff"
    - "§8 Gate verdict"
    - "§11 Audience and redaction vocabulary"
    - "§12 Linked artifact families"

