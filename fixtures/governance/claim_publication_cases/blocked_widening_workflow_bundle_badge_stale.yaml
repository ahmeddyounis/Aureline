# yaml-language-server: $schema=../../../schemas/governance/claim_publication_binding.schema.json
__fixture__:
  name: blocked_widening_workflow_bundle_badge_stale
  scenario: >
    A release-train publication run attempts to widen the
    certification.launch_wedge_typescript_web claim row's
    workflow-bundle badge from workflow_bundle_provisional to
    workflow_bundle_current; the supporting evidence is stale against
    the must_be_current freshness floor. The binding emits one
    stale_workflow_bundle_badge blocking failure with
    permissible_under_narrowed_pass = true, but the run does not pin a
    badge_downgrade_class that would resolve under narrowed_pass; the
    gate verdict is blocked_widening; the publication-diff is
    badge_widened_blocked; the previously-published provisional badge
    remains.
  contract_sections:
    - "§4 Evidence-binding rules"
    - "§5 Evidence resolution"
    - "§6 Destination publication rows"
    - "§7 Publication diff"
    - "§8 Gate verdict"
    - "§9 Consuming-surface parity"
    - "§12 Linked artifact families"

