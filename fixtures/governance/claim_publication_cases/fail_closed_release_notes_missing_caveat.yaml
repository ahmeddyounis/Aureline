__fixture__:
  name: fail_closed_release_notes_missing_caveat
  scenario: >
    A release-train publication run resolves the canonical
    version-skew-truth claim row against current evidence, but the
    release-notes destination omits the required version-skew-alias
    caveat. The binding emits one
    destination_missing_required_caveat blocking failure with
    permissible_under_narrowed_pass = false; the gate verdict is
    fail_closed; the publication-diff carries claim_row_widening_blocked
    because the release-notes destination's missing caveat would have
    widened the public claim past the version-skew alias rule. The
    previously-published row remains.
  contract_sections:
    - "§4 Evidence-binding rules"
    - "§5 Evidence resolution"
    - "§6 Destination publication rows"
    - "§7 Publication diff"
    - "§8 Gate verdict"
    - "§11 Audience and redaction vocabulary"
    - "§12 Linked artifact families"

