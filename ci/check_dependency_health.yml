# Dependency health check configuration.
#
# This file is consumed by tools/governance/dependency_ingest/check_dependency_health.py
# and is intended to be reusable by any pipeline that needs dependency-governance
# integrity checks (CI gates, local audits, release evidence preparation).

schema_version: 1
config_id: aureline.ci.dependency_health_check

dependency_register_path: artifacts/governance/dependency_register.yaml
third_party_import_register_path: artifacts/governance/third_party_import_register.yaml
release_notice_seed_path: artifacts/governance/release_notice_seed.yaml
upstream_health_scorecard_path: artifacts/governance/upstream_health_scorecard.yaml

# Dependency criticality classes that MUST have upstream-health scorecard coverage.
criticality_require_scorecard:
  - protected_path_release_critical
  - release_engineering_critical
  - benchmark_lab_required
  - repo_operations_required

# Seed posture: enforce that every dependency/import row has a matching notice-seed row.
enforce_release_notice_seed_coverage: true

# Enforce upstream-health scorecard coverage for critical dependencies.
enforce_upstream_scorecard_coverage: true

