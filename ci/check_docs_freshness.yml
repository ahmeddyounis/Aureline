# Docs/snippet freshness scan configuration.
#
# This file is consumed by tools/docs/stale_example_scan/scan_docs_freshness.py
# and is intended to be reusable by any pipeline that needs to enforce
# snippet/example freshness (docs packs, help packs, onboarding, migration).

schema_version: 1
config_id: aureline.ci.docs_freshness_scan

ledger_path: artifacts/docs/snippet_freshness_ledger.yaml

# Explicit paths (or glob patterns) to scan. Keep this list narrowly scoped
# in seed stage; expand by adding additional pack/manifests as they land.
scan_paths:
  - fixtures/docs/docs_pack_examples/project_docs_fresh.json
  - fixtures/docs/learning_tour_cases/command_backed_action_guided_step.yaml
  - artifacts/migration/rollback_checkpoint_examples/checkpoint_created_pre_apply.yaml
  - fixtures/docs/assist_reference_cases/provider_native_browser_handoff.json

include_suffixes: [".json", ".yaml", ".yml", ".md"]

# Glob patterns (repo-relative) to exclude when scan_roots is used.
exclude_globs: []

# Snippet kinds that must be listed in the freshness ledger to pass CI.
require_ledger_for_kinds:
  - docs_pack_example
  - guided_step
  - migration_example
  - provider_handoff

